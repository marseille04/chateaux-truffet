1463.","architecture":"La CELLE -VEZAIS de plan rectangulaire, est flanqué aux angles de deux pavillons carrés, la façade ouest surplombe la vallée de la Vonne et le côté opposé donne sur une cour ouverte. Edifice sobre; la régularité des façades est soulignée par un bandeau mouluré qui sépare les étages. Afin de desservir les chambres de létage, une tour ronde descalier, surmontée d'un toit en cône, est accolée au centre de la façade ouest. Demeure noble, elle possède son pigeonnier, datant du XVIe ou XVIIe siècle, jouxtant lun des pavillons latéraux.                                                  LUSIGNAN, le château, déjà depuis longtemps utilisé comme carrière de pierres, est rasé par le comte de Blossac, l'intendant du Poitou, au XVIIIe siècle, pour en faire un parc public d'agrément : une allée de tilleuls, entourée de jardins, conduit à une terrasse avec une très belle vue sur la vallée. Construit autour d'un étroit promontoire bordé de profondes vallées, il reste cependant du château des pans de murs entiers, plaqués sur les falaises. Il reste, aussi, une partie du donjon, la base de la tour Poitevine, une citerne et lentrée d'un souterrain fermé dont on retrouve peut-être une sortie à proximité de l'église de la ville. Il reste aussi une tour-escalier dans la muraille et les fondations d'un moutardier. Une partie fortifiée par Vauban est devenue successivement prison, école primaire puis syndicat d'initiative.","habitants":"Celle-Vezais Achille de Labarde\r\n        \"","divers":"A Lusignan grav 2-3-4; la Livrée, de  Lavau, du Vezais grav-1                       46° 25' 28\" nord, 0° 11' 18\" est.","gps":"","images":["../image/image_86/86_Celle_Levescaut_1.jpg","../image/image_86/86_Celle_Levescaut_2.jpg","../image/image_86/86_Celle_Levescaut_3.jpg","../image/image_86/86_Celle_Levescaut_4.jpg","../image/image_86/86_Celle_Levescaut_5.jpg"]},"Consult_chateau_formulairea054":{"id":"Consult_chateau_formulairea054","dept":"86","canton":"Châtellerault-2","commune":"St-Rémy sur Creuse","nom":"Chaise_St_Rémy","type":"Château","periode":"XV-XVII","histoire":"CHAISE, a été construit aux XVe et XVIIe siècles (tours carrées, donjon avec mâchicoulis). Dominant la rive gauche de la Creuse, la forteresse fut construite dans la 1ère moitié du XVe siècle par la famille d'Aviau, aujourd'hui chambres d'hôtes","architecture":"CHAISE,  donjon de deux niveaux possédant à l'étage supérieur des mâchicoulis percés dans une galerie de pierre de taille portée sur encorbellements, recouvert d'un toit en ardoise. De celui-ci partent des courtines qui permettaient de circuler autour de l'enceinte. Seule une partie a été conservée après les transformations du XVIIe siècle. Seuls les murs intérieurs possédaient des ouvertures. A la même époque, le pont-levis a été supprimé, et le portail d'entrée agrandi. Une maison d'habitation communiquait avec le donjon par le premier étage, et joignait la seule tour carrée intérieure de l'ensemble.","habitants":"Famille d'Aviau\r\n        \"","divers":"La Chaise ;6° 57' 15\" nord, 0° 41' 44\" est, le château grav-1 à 3","gps":"","images":["../image/image_86/86_Chaise_St_R%c3%a9my_1.jpg","../image/image_86/86_Chaise_St_R%c3%a9my_2.jpg","../image/image_86/86_Chaise_St_R%c3%a9my_3.jpg"]},"Consult_chateau_formulaire9d70":{"id":"Consult_chateau_formulaire9d70","dept":"86","canton":"Vouneuil sous Biard","commune":"Chalandray","nom":"Chalandray_Motte","type":"Château","periode":"XV-XIX","histoire":"CHALANDRAY, quon appelait la seigneurie de la Motte de Chalandray dépendait de la Marche du même nom qui comprenait en outre la Roche de Thénezay. En temps que fief, Chalandray quon appelait aussi fief de Rochefort (parce que la première famille fut celle de Guy de Rochefort), relevait de la châtellerie de Montreuil-Bonnin. Chalandray relevait donc de deux Châtelleries. Au bout de la magnifique voûte de la grande allée, la façade blanche du château de la Bretonnière mérite le détour et rappelle aux vieilles familles la kermesse paroissiale.                                                                                                        TREGUEL, dit aussi de la Motte La construction du château de Tréguel date du XIXe siècle. La propriété aurait appartennue à la famille de Bec de Lièvre de La Fouchardière, mais aucune date précise n'est arrêtée, ce château est une demeure du XIXe siècle située au cur de la France ,  la propriété possède une piscine couverte exceptionnelle  dont la terrasse donne sur le terrain de tennis du château, propriété de Mr et Mme Sarazin. Aménagé en chambre dhôtes.","architecture":"Château de la MOTTE, la première mention connue date de 1389. Le château se compose d'un grand bâtiment rectangulaire, flanqué de deux tours cylindriques sur les angles de la façade sud et d'une tour d'escalier pentagonale vers le milieu de la face opposée. Les deux longs côtés sont percés de grandes croisées richement décorées de fines moulures qui se développent parfois en accolades multiples sur le linteau. Les pignons ont conservé, à la naissance des rampants, deux sculptures de félins en ronde-bosse.  A son dernier palier prend naissance un petit escalier qui desservait une pièce au sommet de la cage et qui est logé dans une tourelle en encorbellement à culot mouluré. Ce château est représentatif d'une série de logis de la deuxième moitié du XVe siècle.                                                                                          Au fil de la Vendelogne si tranquille trône le château de TREGUEL  et le vieux château appelé château de la Motte près du Moulin Neuf. Son architecture témoigne d'un certain souci de l'ornementation. De plan rectangulaire, le château est flanqué à chaque extrémité de deux corps de bâtiment en léger ressaut. Il dispose sur sa façade de loggias à balustres et de fenêtres à meneaux. Certaines de ses baies sont coiffées de frises. L'angle arrière gauche est flanqué d'une belle tour ronde à mâchicoulis, coiffée d'un toit en poivrière.","habitants":"Famille Sarazin\r\n        \r\n        \"","divers":"Chalandray, 46° 39' 42\" nord, 0° 00' 02\" ouest, château de la Motte grav 1-2-3 , Treguel grav 4-5-6.","gps":"","images":["../image/image_86/86_Chalandray_Motte_1.jpg","../image/image_86/86_Chalandray_Motte_2.jpg","../image/image_86/86_Chalandray_Motte_3.jpg","../image/image_86/86_Chalandray_Motte_4.jpg","../image/image_86/86_Chalandray_Motte_5.jpg","../image/image_86/86_Chalandray_Motte_6.jpg"]},"Consult_chateau_formulaireb4a2":{"id":"Consult_chateau_formulaireb4a2","dept":"86","canton":"Loudun","commune":"La Roche Rigault","nom":"Chapelle_Bellouin","type":"Château","periode":"XIV-XVII","histoire":"A deux kilomètres au nord -Est à Rossay le château de Bois Rogue                                                                                                                      CHAPELLE-BELLOUIN,  a été complètement réaménagé lors de la première renaissance par Henri Bohier. Ce dernier était général des finances de François 1er, tout comme son frère, qui a bâti Chenonceau, c'est l'exemple unique d'un château-fort, complètement refait à neuf en introduisant l'architecture Renaissance dans notre pays. Devenu propriété royale, il a été offert par le roi François 1er à la famille de Sourdis qui est restée dans le premier cercle à la cour des Rois de France jusqu'au décès de Gabrielle d'Estrées, leur nièce et fille adoptive. Le comté de la Chapelle Bellouin a été racheté par le cardinal de Richelieu, lorsqu'il a dû élargir son domaine pour devenir duc et pair de France. Le 17 Messidor an XIII, il a été vendu par le duc de Richelieu ministre de Louis XVIII, plus cher que \"l'immense et superbe château de Richelieu\".                                                                                                         BOIS ROGUE  du XIVe siècle est situé dans un parc de cent hectares, le premier seigneur connu est Rogues de Coué. Cette famille conservera le domaine jusqu'au XVe siècle, puis il passera par mariage dans la famille des Sanglier. A la fin du XVIe siècle, Renée Sanglier, par son mariage avec Claude de Chatillon, fait passer la propriété dans la famille Chatillon. Au début du XVIIIe siècle, le château est acheté par la famille de Lignères.","architecture":"CHAPELLE-BELLOUIN,  du XIVe siècle, construit à côté d'une tour du XIIIe siècle dont la partie basse subsiste, et qui a été complètement réaménagé lors de la première renaissance par Henri Bohier. Le donjon, ou châtelet, qui date du milieu du XIIe siècle, fut une tour dobservation semblable à celles de Loudun ou Moncontour. Il a ensuite été rénové à la Renaissance. Le pont-levis, toujours fonctionnel, et les plafonds à caissons, sont témoins de cette transformation,' corps de logis, construit à la Renaissance, mesure plus de 50m de long. La moitié du bâtiment est occupé par une grande salle avec tribune : Nombreux sont ceux qui se demandent pourquoi le château porte ce nom. S'il y a bien une petite chapelle au sein du château, ce nom viendrait en fait, d'une chapelle plus grande qui eut été dans le village, à côté du château.                                     BOIS-ROGUE, une chapelle isolée, une imposante fuie à demi éventrée et les frondaisons d'un vaste parc dénotent l'importance du domaine. Entre la ferme et une maison de maître du XIXe siècle, se trouve une élégante galerie seul vestige d'un ensemble disparu, à moins qu'il ne s'agisse d'un ambitieux projet avorté. La galerie se compose d'une suite régulière de neuf arcades en plein cintre ornées d'une agrafe à la clé et séparées par de fins pilastres ioniques. Les quatre croisées de l'étage aux allèges dessinées en table et aux meneaux  cannelés, sont flanquées de pilastres corinthiens et interrompent la corniche.","habitants":"Famille Henri Bohier.                                                                  Famille Chatillon\r\n        \"","divers":"Chapelle-Bellouin grav1 à 4 ;46° 57' 27\" N, 0° 11' 11\" Est .                  à Rossay le château de Bois Rogue  grav 5-6-7","gps":"","images":["../image/image_86/86_Chapelle_Bellouin_1.jpg","../image/image_86/86_Chapelle_Bellouin_2.jpg","../image/image_86/86_Chapelle_Bellouin_3.jpg","../image/image_86/86_Chapelle_Bellouin_4.jpg","../image/image_86/86_Chapelle_Bellouin_5.jpg","../image/image_86/86_Chapelle_Bellouin_6.jpg","../image/image_86/86_Chapelle_Bellouin_7.jpg"]},"Consult_chateau_formulairec5c3":{"id":"Consult_chateau_formulairec5c3","dept":"86","canton":"Charroux","commune":"Charroux","nom":"Charroux_86","type":"Château","periode":"XV-XVII","histoire":"Ville de Charroux , la tour de Charlemagne, la  Grollière,    Rochemaux,   Chateauneuf, la Roche.                                                                                    CHARROUX, en 1422, le château des comtes de la Marche, malgré ses fortifications, n'est plus que ruines.  Après la guerre de Cent Ans, labbé Jean Chaperon rénove et reconstruit une partie des bâtiments. Les Bourbons héritent du comté de Basse-Marche, et leur rivalité avec les Valois vaut à labbé dobtenir la prépondérance sur le comte en 1481.Au milieu du XVe siècle, la distinction entre Bourg l'Abbé et Bourg le Comte disparait. Le bourg, dorénavant, se dénommera Charroux. La \"nouvelle\" ville continue de profiter de l'affluence des pèlerins et développe ses foires : de  trois siècles plus tôt, au XVIIIe siècle, il y en aura 11 églises et chapelles seront construites ainsi que deux aumôneries. Des activités de tannerie et de textiles se développent, des artisans travaillant le cuir s'installent dans le bourg.   Dressé au bord du côteau dominant la Charente ce château est édifié à l'emplacement d'une forteresse féodale du Xe siècle. Entreprise par Georges d' Aubusson, seigneur de Rochemeaux et sénéchal de Basse Marche, la construction est achevée par sa veuve en 1633. Un soubassement est destiné à rattraper la dénivellation sur la façade orientée vers la vallée .","architecture":"ROCHEMAUX, des XVe et XVIIe siècles, inscrit depuis 1982 pour son élévation et sa toiture,  l'édifice actuel a succédé à un château du XIe siècle. Siège d'une châtellenie relevant du comté de Basse-Marche, le fief est érigé en 1599 en vicomté au profit de Jean Grain, seigneur de Saint Marsault. La disparition du pavillon nord-est a modifié la silhouette sans altérer la correction des proportions. La façade sur cour comporte un rez-de-chaussée surélevé et un étage carré sous comble à lucarnes. La façade la plus imposante regarde la vallée, de très beaux oculi ovales sont percés dans le mur pour éclairer les offices en sous-sol, le décor se concentre sur les lucarnes et sur la porte principale. Précédée d'un perron, celle-ci présente un fronton curviligne. A l'intérieur l'élément le plus remarquable est l'escalier aux volées droites. Cette construction homogène est escortée par une tour circulaire isolée à mi pente, vestige de l'ancienne courtine, et par une chapelle néo-gothique postée dans la cour d'honneur. Le pavillon d'angle restant présent, sur sa face la plus large, des arases de pierre et des contreforts. Le château devait posséder autrefois des ailes partant des pavillons et fermant la cour. Le sous-sol se compose de plusieurs salles agrémentées de cheminées médiévales. Au rez-de-chaussée et à l'étage les cheminées datent du XVIIe siècle.   Dominant le cur du village, la Tour « Charlemagne » perpétue le souvenir de lune des plus puissantes abbayes bénédictines de la France médiévale. Lhistoire de Charroux commence avec son abbaye Saint-Sauveur fondée en 789. Charlemagne et le Comte de Limoges Roger ainsi que sa femme Euphrasie la dotèrent de biens se trouvant dans le Poitou.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"la tour de Charlemagne grav-1-2, la  Grollière,    Rochemaux grav-5,   Chateauneuf pin grav-4, la Roche grav-5. abbaye grav-6 Charroux 46° 08' 43\" nord, 0° 24' 16\" est","gps":"","images":["../image/image_86/86_Charroux_86_1.jpg","../image/image_86/86_Charroux_86_2.jpg","../image/image_86/86_Charroux_86_3.jpg","../image/image_86/86_Charroux_86_4.jpg","../image/image_86/86_Charroux_86_5.jpg","../image/image_86/86_Charroux_86_6.jpg"]},"Consult_chateau_formulaire146c":{"id":"Consult_chateau_formulaire146c","dept":"86","canton":"Chasseneuil-du-Poitou","commune":"Chasseneuil du Poitou","nom":"Chasseneuil_Poitou","type":"Château","periode":"XVII-XVIII","histoire":"quatre châteaux à Chasseneuil du Poitou celui de Maraudeau, de la Ribaudière, de Guignefolle.                                                                                                MARAUDEAU,  est édifié par mademoiselle de Genne, soeur du propriétaire de Guignefolle, et, selon la tradition, à la suite d'un désaccord avec ce dernier. Une propriété appartenant à M. Beauregard de Poitiers.                                                                                        RIBAUDIERE, c'est au tout début du XVIIe siècle que la Ribaudière apparaît dans les archives de la cure de Chasseneuil. Le château actuel ne dénote pas un aussi lointain passé et pourrait remonter à la fin du XVIIIe siècle ou du début du XIXe siècle sur les bases d'une ancienne demeure. Le château de la Ribaudière jouit d'un environnement au décor particulièrement soigné. Le château du clos de la Ribaudière. Emmanuel Lortholary est l'heureux propriétaire.","architecture":"GUIGNEFOLLE, fief  constitué en 1533, il dépendait directement du roi. Il se constituait d'un hébergement noble tout près, la tour d'Anguitard (donjon féodal).  Le tout formant un vaste ensemble au couchant de Chasseneuil. Le seigneur de Guignefolle était un des personnages les plus représentatifs de Chasseneuil, il jouissait de droits honorifiques, le droit de pêche dans le Clain, le droit de passage sur cette rivière, le droit de quintaine, en vertu duquel il dirigeait chaque année, devant son hôtel de Guignefolle et dans les prés du Clain, des jeux de force et d'adresse. Après avoir vu passer de nombreux propriétaires, les derniers seigneurs furent les frères de Beauregard qui l'achetèrent en 1783. Ce fief subsista jusqu'à la Révolution.                                                                                                     MARAUDEAU, en 1864 la construction d'un château, soit le logis actuel, au sud.  Le bâtiment de style néo-gothique; le château-fort est rappelé par les tours aux angles et des fenêtres surmontées d'arcs en accolades.  L'accès est matérialisé par un portail monumental couronné de sphères. Le bâtiment, de plan rectangulaire, est flanqué de deux tours d'angle. La façade, en gouttereau est ordonnancée à trois travées et porte centrale. Les baies disposent d'appuis moulurés. Un bandeau saillant marque l'étage et la ligne de toiture. Le château présente des lucarnes dont les frontons sont ornés de motifs trilobés et des baies avec linteau en accolade.","habitants":"M. Beauregard de Poitiers Famille Emmanuel Lortholary \r\n        \"","divers":"à Chasseneuil du Poitou celui de Maraudeau grav -1, de la Ribaudière grav , de Guignefolle et de Vayres.    46° 39' 07\" Nord, 0° 22' 23\" Est.","gps":"","images":["../image/image_86/86_Chasseneuil_Poitou_1.jpg","../image/image_86/86_Chasseneuil_Poitou_2.jpg","../image/image_86/86_Chasseneuil_Poitou_3.jpg","../image/image_86/86_Chasseneuil_Poitou_4.jpg","../image/image_86/86_Chasseneuil_Poitou_5.jpg","../image/image_86/86_Chasseneuil_Poitou_6.jpg"]},"Consult_chateau_formulairedd10":{"id":"Consult_chateau_formulairedd10","dept":"86","canton":"Civray","commune":"Chatain","nom":"Chatain","type":"Château","periode":"XV-","histoire":"Deux châteaux à Chatain celui de Fond le Bon et de Laleu.           FONT le BOND, mentionné dès la deuxième moitié du XIIe siècle, était le siège d'une très ancienne seigneurie. Le fief de Font-le-Bon dépendait pour moitié de Comporté. A la fin du XVIe ou au début du XVIIe siècle, c'est Nicolas de Verdun qui en est le seigneur.                                                                                                      LALEU   La plus ancienne mention de la seigneurie de l'Aleu remonte au XVIe siècle; le château était déjà possédé par la famille Mondot, qui le conservera pendant trois siècle environ. On trouve une nouvelle mention de l'Aleu en 1643 date à laquelle il appartenait à Messire Jean Mondot, escuyer, sieur de la Loeuf; ce dernier fut condamné le 15 juillet 1670 pour usurpation du titre de noblesse et des rôles. La famille Mondot possède le domaine peu après, puisqu'on trouve en date du 1er février 1712, Jean Mondot,   perdra son titre d'écuyer entre 1712 et 1729, date à laquelle il décéda. Par alliance la seigneurie est transmise à la famille de Rocquard vers 1755, puis aux Moneys.","architecture":"FONT le BOND, l'édification du château doit être attribuée au XVe siècle mais sur des bases qui pourraient remonter deux siècles plus tôt. L'édifice consiste en un corps de logis accosté de trois tours. Le corps principal à deux niveaux apparents sur 4 travées d'ouvertures, est pourvu d'un toit en demi croupe couvert de tuiles plates bordées d'ardoise. Dans un angle se dresse une haute tour ronde, possédant très peu d'ouvertures, mais percée de canonnières. Une seconde tour un peu moins haute et en demi hors uvre, flanque la façade entre les troisième et quatrième travées, et aussi percée de canonnières. Une troisième tour, hexagonale, s'appuie au centre de l'autre façade, contient probablement l'escalier desservant l'étage. Les trois tours sont pourvues de hautes poivrières couvertes d'ardoise                                                                                                                  LALEU  Le château, dont les parties les plus anciennes du logis datent du XVe siècle, se compose d'un corps de logis rectangulaire flanqué à chaque angle d'une tour ronde. Les parties hautes de la demeure ont été remaniées au début du XVIIe siècle, date 1627 inscrite entre les deux rainures du pont levis. De cette époque datent la corniche et les lucarnes à fronton triangulaire. Au XVIIIe siècle c'est les Moneys qui agrandirent portes et fenêtres pour donner plus de clarté.","habitants":"Fond le Bond;Famille de Nicolas de Verdun                                    Laleu; famille Mondot\r\n        \r\n        \"","divers":"à Chatain celui de Fond le Bon grav-1  et de Laleu grav-2","gps":"","images":["../image/image_86/86_Chatain_1.jpg","../image/image_86/86_Chatain_2.jpg"]},"Consult_chateau_formulaire7790":{"id":"Consult_chateau_formulaire7790","dept":"86","canton":"Vivonne","commune":"Château Larcher","nom":"Chateau_Larcher","type":"Vestriges-Château","periode":"XI-XVI","histoire":"A deux kilomètres au nord le château de Lasverre à Aslonnes. LARCHER, cest à la fin du XIe que les seigneurs de Morthemer deviennent propriétaires du château, jusquà lextrême fin du XIIe où cest la très puissante famille des Lusignan qui fait reconstruire au XIIIe siècle le château dont nous voyons actuellement les ruines. Au XIVe, le site castral appartient aux seigneurs dAngle, famille de Pleumartin. Guichard IV dAngle est un personnage important,  entre Jean le Bon et Edouard III. Fin XIV et XVe siècles, il y a un changement de seigneurs par ventes ou mariages : famille de la Vergne, famille de Pons, famille de Chénac, famille Poncet de la Rivière. Au début du XVIe, la famille de Rochechouart-Mortemart prend possession du château, qui fait construire un nouveau château au XVIe siècle.  De 1731 à 1783, le château appartient à la très illustre famille des Saint Georges-Vérac, ayant émigré, le château est vendu comme bien national à la famille Brossac qui le démantèle  et en vend les pierres. Cest ensuite la famille de Cressac qui en est propriétaire de 1818 à 1870. Le château est ensuite acheté par Albert Candide Boutillier du Retail, frère de larchéologue qui habitait le château de Roquillon sur la commune de Château-Larcher. La famille Boutillier du Retail vend ensuite à la famille Foreau. Par héritage, la famille Lex devient propriétaire du site quelle vend à la commune en 1997.","architecture":"LARCHER,  construire un nouveau château au XVIe siècle, le château moyenâgeux étant à cette époque à labandon. En 1840, ce château du XVIe est entièrement rasé. Il nen subsiste quun pan de mur  Après être un temps devenu anglais, le château est démantelé en 1464 sur ordre de Louis XI. Réarmé peu de temps après, le château sera vendu en 1793 et servira de carrière de pierre.  En 1840, ce château du XVIe siècle est entièrement rasé. Il nen subsiste quun pan de mur. Depuis 1912, il est protégé par les M.H.  Le château est constitué d'une enceinte, au sud, marquée par trois tours, un châtelet d'entrée et son église fortifiée, et d'un ouvrage avancé, au nord, en forme d'éperon, doté d'une tour et d'un donjon très abimé. S'il a perdu son allure originelle au XVe siècle, le château conserve un caractère défensif marqué.                                                                      LASVERRE, le prieuré de Laverré date du XIIe siècle. C'était une dépendance de l'abbaye bénédictine de Nouaillé. A la Révolution, le prieuré de Laverré fut vendu à un fermier. Le prieuré a été souvent revendu au cours des XIXe et XXe siècles. Le domaine comprend, à l'Est, des dépendances de plan en U et au Sud-Est, un imposant pigeonnier. Entouré de douves franchies par un pont de pierre, le Prieuré de Laverré se  compose d'un corps de logis flanqué d'une tour carrée. Une tourelle en encorbellement accolée à la tour et coiffée d'un dôme a disparu au début du XXe siècle.","habitants":"Famille des Lusignan                                                                     Famille de Rochechouart-Mortemart \r\n        \"","divers":"A Château Larcher grav 1 à 6                                      Lasverre grav 7 -8","gps":"","images":["../image/image_86/86_Chateau_Larcher_1.jpg","../image/image_86/86_Chateau_Larcher_2.jpg","../image/image_86/86_Chateau_Larcher_3.jpg","../image/image_86/86_Chateau_Larcher_4.jpg","../image/image_86/86_Chateau_Larcher_5.jpg","../image/image_86/86_Chateau_Larcher_6.jpg","../image/image_86/86_Chateau_Larcher_7.jpg","../image/image_86/86_Chateau_Larcher_8.jpg"]},"Consult_chateau_formulairee3da":{"id":"Consult_chateau_formulairee3da","dept":"86","canton":"Châtellerault","commune":"Châtellerault","nom":"Chatellerault","type":"Château","periode":"XV","histoire":"CHATELLERAULT, le château a été construit, en 1423, par Jean VII dHarcourt. Son enceinte comprenait une partie des remparts qui surplombaient la Vienne. La vicomté est transmise à un membre de la famille royale, Châtellerault devient alors un duché et le château une demeure royale; il a été habité par Anne de France (fille de Louis XI) puis il a appartenu à Louise de Savoie, mère de François Ier. Les noces de Jeanne dAlbret, nièce de François Ier, y ont été célébrées en 1541. À partir de la Révolution les trois quarts des bâtiments furent détruits, les bâtiments du XVIe siècle, les jardins et dépendances.                                                     Hôtel SIBYLLES C'est un certain Gaspard d'Auvergne, un érudit et avocat du roi (également connu pour être le traducteur du « Prince » de Machiavel), qui est à l'origine de la construction de cet hôtel. « Il avait été envoyé en Italie, chargé de mission par François 1 er, son emblème, une salamandre, est aussi visible sur la façade. Imprégné de la Renaissance italienne, il arrive à Châtellerault et épouse une riche fille dotée, Pierrette Dupuy, qui lui apporte ce logis. Il fait construire côté jardin cet hôtel particulier contre le logis. »  c'était il y a 24 ans. Depuis, Michèle Cousson, la copropriétaire qui habite au 1 er étage de cette propriété privée.","architecture":"CHATELLERAULT, au XIXe siècle, après restauration, le château devient un hôtel particulier. Il se compose d'un grand corps de logis et d'une aile en équerre côté sud. Le grand logis, composé d'un rez de chaussée, d'un étage noble, puis d'un étage attique, est couvert d'un comble à deux pans en ardoise. A son pignon ouest, se trouve une tour carrée couverte d'un toit en pavillon, complétée d'un logis en appentis avec un pan coupé à l'angle sud ouest, et flanquée côté sud d'une tourelle couverte en poivrière.                                                                                                                  Hôtel SIBYLLES, la copropriétaire qui habite au 1 er étage de cette propriété privée construite durant la première moitié du XVIe siècle (travaux de restauration au XIXe siècle), reste toujours en amour devant ces trois corps de bâtiment (la maison et ses deux ailes), ses façades ornées de sculptures dominant le jardin ou encore la tourelle d'escalier en vis (avec ses marches taillées en biseau) donnant sur la rue Bourbon.","habitants":"Famille deJean VII dHarcourt                                                       Hôtel Sibylles   Michèle Cousson\r\n        \r\n        \"","divers":"86_Chatellerault  grav -1-2-3, Hôtel Sibylle grav 4 et divers châteaux","gps":"","images":["../image/image_86/86_Chatellerault_1.jpg","../image/image_86/86_Chatellerault_2.jpg","../image/image_86/86_Chatellerault_3.jpg","../image/image_86/86_Chatellerault_4.jpg","../image/image_86/86_Chatellerault_5.jpg","../image/image_86/86_Chatellerault_6.jpg","../image/image_86/86_Chatellerault_7.jpg","../image/image_86/86_Chatellerault_8.jpg"]},"Consult_chateau_formulaire2bec":{"id":"Consult_chateau_formulaire2bec","dept":"86","canton":"Loudun","commune":"La Chaussée","nom":"Chaussée","type":"chatreau","periode":"XVI","histoire":"Deux châteaux à la Chaussée celui de Bonnetière et de la Guérinière.                                                                                                  BONNETIERE, il a  connu son apogée au XVIIe siècle lorsque Richelieu décida de coloniser les terres incultes de la Nouvelle France. Au XVIe siècle, la propriété passe aux Vaucelles en 1632 Issac de Razilly  nommé lieutenant général et vice-roi de la Nouvelle-France. En 1685 par alliance passe à la famille Marreau de Boisguerin. En 1807 mariage de Charlotte Elisabeth Marreau de Boisguerin avec Pierre Jean Goudon de la Lande. En 1860, elle est aux Goudon de La Lande, comtes de L'Héraudière, qui pourraient être les commanditaires des aménagements du logis au XIXe siècle.                                                                                                        A quelques  kilomètres de à Guesnes le château de la GUERINIERE, en plein cur de la forêt de Scevolles, a été bâti au début du XIXe siècle par Pierre Confex Lachambre, maire de Loudun, pour servir de rendez vous de chasse.","architecture":"BONNETIERE, situé au coeur du berceau de lAcadie, il connut son apogée au XVIIe siècle, il possède un très beau pigeonnier octogonal du XIVe siècle. La féodalité vous est contée grâce à ce château qui trône majestueusement dans la plaine céréalière du Poitou, loin des clichés sur la vie de châtelain.   De part et d'autre de l'entrée, cantonnée de deux pilastres rectangulaires, un muret et une tour ronde à laquelle est accolé un bâtiment carré délimitent la propriété à l'est. La tour ronde de droite abrite la chapelle néo-gothique aménagée au siècle dernier. Au fond d'une cour, le corps de logis rectangulaire avec deux pavillons latéraux dont la toiture fait décrochement, est limité au nord et au sud par deux adjonctions du XIXe siècle. Le corps central est divisé en trois travées sur deux niveaux. Le pigeonnier octogonal, pouvant dater du XVIIe siècle, est renforcé par des contreforts. Sa toiture repose sur des consoles. Un petit escalier en descente permet d'accéder à l'intérieur de cette fuye dont le sol est en contrebas par rapport au niveau de la cour. Tous les éléments sont encore en place : boulins, échelle pivotante.                                                                                    GUERINIERE, construit d'un seul jet consiste en un corps de logis aux lignes sobres ponctuées de chaînages et de tables en pierre sous les fenêtres. Un pavillon central, marqué d'un ressaut, apporte une touche de noblesse et deux pavillons latéraux, plus bas de toiture, complètent cet édifice tout entier inclus dans une grande perspective d'allées cavalières. Deux corps de bâtiments de communs sont placés au sud du logis.","habitants":"Famille Marreau de Boisguerin\r\n        \"","divers":"à la Chaussée   46° 53' 32\" nord, 0° 05' 39\" est; celui de Bonnetière grav-1-2 et de la Guérinière grav 3.","gps":"","images":["../image/image_86/86_Chauss%c3%a9e_1.jpg","../image/image_86/86_Chauss%c3%a9e_2.jpg","../image/image_86/86_Chauss%c3%a9e_3.jpg"]},"Consult_chateau_formulaire3123":{"id":"Consult_chateau_formulaire3123","dept":"86","canton":"Chauvigny","commune":"Chauvigny","nom":"Chauvigny","type":"Forteresse","periode":"XII-XV-XVI","histoire":"Chauvigny; le château Baronnial du XI et XVIe siècle, Harcourt des XIIe et XVe siècles, Mauléon du XIIIe siècle, Gouzon des XIe et XIIIe siècles, la Tour de Flin de XIIe siècle, auberge de rivière de Chirets chambres d'hôtes .                                                                           EVEQUES de POITIERS, dit HARCOURT, mentionné des 1025, Reconstruit au XIIIe siècle, par Jean II d'Harcourt, c'est le mieux conservé des châteaux chauvinois, A l'angle nord-ouest, un pan de muraille et des bases de construction sont les seuls restes du château neuf bâti vers 1400 par l'évêque Ithier de Martreuil. Vendu comme bien national à la Révolution, lenceinte à peu près rectangulaire, de 39 m sur 29 m, se compose de hautes courtines avec base en talus, autrefois crénelées, flanquées de tourelles rondes pleines. Lentrée, défendue par un assommoir et une herse, est dépourvue de pont-levis. Les meurtrières, à niche de tir, possèdent de trois à six traverses, ce qui est exceptionnel. Le donjon est constitué de deux tours accolées. Au pied de la tour sud, lancienne cave voûtée, a servi de prison jusquau début du XIXe siècle.                                                                                                               GOUZON, la forteresse  est acquise par les évêques de Poitiers, seigneurs de Chauvigny, vers 1350. un procès verbal des visites du domaine de lévêché le déclare entièrement ruiné en 1687. Classé M.H. en 1889, il a été acquis par la commune en 1992 après avoir été soumis à un important programme de consolidation et de restauration, situé au nord de la collégiale Saint-Pierre, il doit son nom au mariage, à la fin du XIIIe siècle, de Blanche de Beaumont qui tenait le fief, avec Guy de Gouzon, originaire du Bourbonnais.","architecture":"EVEQUES de POITIERS, le donjon et la petite enceinte de la fin du XIe siècle ou du début du XIIe siècle, plus tard construction de la grande enceinte, et du logis au début du XVe siècle, à l'intérieur d'une double enceinte. C'est un ouvrage dont subsiste l'important donjon quadrangulaire à contreforts plats du XIIe siècle. Les parties basses sont contenues dans une enceinte polygonale qui comportait les communs. lenceinte à peu près rectangulaire, de 39 m sur 29 m, se compose de hautes courtines avec base en talus, autrefois crénelées, flanquées de tourelles rondes pleines. Lentrée, défendue par un assommoir et une herse, est dépourvue de pont-levis. Les meurtrières, à niche de tir, possèdent de trois à six traverses, ce qui est exceptionnel. Le donjon est constitué de deux tours accolées. Au pied de la tour sud, lancienne cave voûtée, a servi de prison jusquau début du XIXe siècle.  Aujourd'hui, un donjon médiéval et les vestiges du château sont encore visibles, au premier étage, où se trouvait lentrée du donjon, Une petite porte donne sur un escalier à vis qui conduit au logis supérieur. Les parties hautes de la tour ont été remaniées au XVIe siècle.                                                                                                  GOUZON,  Lélévation du donjon, seul élément subsistant du château, témoigne de deux périodes de construction. Un premier état au XIIe siècle révèle un édifice aux dimensions modestes, élargi et surhaussé au XIIIe siècle, on y trouve quatre archères avec niches de tir qui doivent être d'origine, et à l'étage supérieur, trois archères à étrier et traverses décalées qui ont pu être ajoutées au XIVe siècle","habitants":"Les Evêques de Poitiers  Gouzon; famille Guy de Gouzon\r\n        \r\n        \"","divers":"A Chauvigny, 46° 34' 10\" Nord, 0° 38' 51\" Est,  le château baronnial grav de1 à 5, et de Gouzon grav 6-7-8                          Evéques:","gps":"","images":["../image/image_86/86_Chauvigny_1.jpg","../image/image_86/86_Chauvigny_2.jpg","../image/image_86/86_Chauvigny_3.jpg","../image/image_86/86_Chauvigny_4.jpg","../image/image_86/86_Chauvigny_5.jpg","../image/image_86/86_Chauvigny_6.jpg","../image/image_86/86_Chauvigny_7.jpg","../image/image_86/86_Chauvigny_8.jpg"]},"Consult_chateau_formulaire8b0f":{"id":"Consult_chateau_formulaire8b0f","dept":"86","canton":"Chauvigny","commune":"Chauvigny","nom":"Chauvigny_II","type":"Château","periode":"XIII-XV-XVI","histoire":"CHARREAU DE BOUSSEC, si Le Charreau est cité dès 1300 dans les actes de la seigneurie de Dienné et Verrières, il faut attendre le XVIe siècle pour y trouver mention d'une famille Chessé. Par mariage, Le Charreau passe, au XVIIIe siècle, à la famille Fumé qui le conserve jusqu'en 1812, date à laquelle le domaine passe à Jacques de Béchillon. Après avoir été légué aux Thévenard, puis aux Cazalis, Le Charreau sera vendu, au début du XXe siècle, à M. Dupas.                                                                                                                                                      RIVIERE AU CHIRAY, mentionné en 1328 sous le nom de Ripéria, puis en 1400 sous celui de la Rivière au Chirez, c'était un fief relevant de la baronnie de Chauvigny. Jacques Mayaud, procureur du roi au présidial, acquiert en 1630 la maison noble et ses dépendances. Dès les années 1650, François Maisonnier, écuyer, en fait sa demeure.","architecture":"CHARREAU de BOUSSEC La cour carrée est encadrée de trois corps de bâtiments: le logis à l'est et deux bâtiments de communs au nord et au sud. Les entrées charretière et piétonnière en anse de panier, sont surmontées de motifs décoratifs. Le Logis rectangulaire est prolongé par deux ailes, en léger retrait, rejoignant les bâtiments de communs. Il comprend un rez-de-chaussée, un étage et des combles.Guy de Gouzon.  Un agrandissement du logis, effectué vers 1860, les bâtiments et l'entrée datent du XVIIe siècle.                                                         \r\nRIVIERE AU CHIRAY, le portail et la porte piétonne donnent accès à une cour carrée, ceinte de murs et de bâtiments, est cantonnée au nord-est et au sud-est par deux tours circulaires contenant au rez-de-chaussée une salle voûtée avec quatre meurtrières dont deux flanquent les murs ; une pointe vers l'est et la quatrième pointe dans la cour, à l'étage un pigeonnier, couverture en poivrière en tuiles plates. À l'ouest de la cour, un grand corps de logis à rez-de-chaussée, étages et combles éclairés de lucarnes à fronton. Toiture à quatre pentes en tuiles plates. Vers l'ouest, une aile en retour de largeur décroissante, a dû être bâtie en deux fois. Au nord de la cour, les écuries ont de belles portes en anse de panier. Les principaux bâtiments remontent au XVIIe siècle; les boiseries intérieures et lescalier ont été refaits sous Louis XVI.","habitants":"Charreau; famille Chessé                                                          Montléon famille de Montléon                                                     Rivière; Jacques Mayaud\r\n        \"","divers":"Harcourt  46° 34' 8,39\" Nord, 0° 38' 57,05\" Est grav de 1 à 4                             Rivière grav 5","gps":"","images":["../image/image_86/86_Chauvigny_II_1.jpg","../image/image_86/86_Chauvigny_II_2.jpg","../image/image_86/86_Chauvigny_II_3.jpg","../image/image_86/86_Chauvigny_II_4.jpg","../image/image_86/86_Chauvigny_II_5.jpg","../image/image_86/86_Chauvigny_II_6.jpg","../image/image_86/86_Chauvigny_II_7.jpg"]},"Consult_chateau_formulairede60":{"id":"Consult_chateau_formulairede60","dept":"86","canton":"Châtellerault-3","commune":"Chenevelles","nom":"Chenevelles","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux  à Chenevelles celui de la Fond, de la Gabilière et de Soucy.                                                                                                                       LA-FOND,  René d'Argence, écuyer, seigneur du Soucy et de La Valette, aurait échangé sa terre de Jorillac en 1580. Cet échange serait intervenu vingt ans après la construction de la demeure en 1566.                                                                                                                                    LA GABILLIERE, c'est grâce aux archives de la cure de Chenevelles que l'on trouve mentionnée pour la première fois dans la deuxième moitié du XVIe siècle La Gabillière. Sur la commune on trouve une autre demeure construite à la même époque : le château du Soucy. Dans les dépendances, entièrement restaurées.                                                                                                      SOUCY, mention de la \"maison du Soucy\" dès le milieu du XVIe siècle, ancien fief qui relevait de la baronnie de Monthoiron. La famille Lucas en était propriétaire au cours de la deuxième moitié du XVIe siècle, à laquelle succède René Dargence, écuyer, seigneur du Soucy, de La Fond et des Aulges. A XIXe siècle, la propriété appartenait à Jean-Baptiste-Hilaire Gaborit de Montjou. Par mariage avec Marie Gaborit de Montjou, elle passe à Barthélémy de Lombard de Génébral dont la famille le conservera jusqu'au milieu du siècle suivant.","architecture":"GABILLIERE Un château moderne a remplacé l'ancien logis. Sur la commune on trouve une autre demeure construite à la même époque tel que Soucy.                                                                                                                     LA-FOND, c'est un petit Logis qui comporte un rez-de-chaussée, un étage et une toiture à deux pans en ardoise. Il est flanqué côté jardin de deux petites tours rondes, au simple toit conique également en ardoise. Les élégantes petites lucarnes, reposant sur des allèges en pierre, datant sans doute du XVIIe siècle; elles reprennent le rythme des travées de fenêtre des deux façades principales. Les baies des tours, avec leurs moulurations, leurs linteaux saillants retombant sur des culots, dénotent une facture néo-gothique, apport du XIXe siècle. Un ancien pigeonnier à la toiture de tuiles plates flanque la grille d'entrée du domaine.                                                                                      SOUCY,  dans un grand parc planté d'arbres centenaires, le château du Souci s'inscrit dans un magnifique cadre et se reflète dans une très belle pièce d'eau. L'ancienneté de la seigneurie ne fait aucun doute, par contre la construction de la demeure actuelle semble remonter au XIXe siècle.","habitants":"La Fond; René d'Argence.                                                  Gabillière , famille de la Gabillière                                   Soucy; famille de Barthélémy de Lombard \r\n        \"","divers":"à Chenevelles celui de la Fond  grav 1, de la Gabilière grav 2-3 et de Soucy","gps":"","images":["../image/image_86/86_Chenevelles_1.jpg","../image/image_86/86_Chenevelles_2.jpg","../image/image_86/86_Chenevelles_3.jpg","../image/image_86/86_Chenevelles_4.jpg","../image/image_86/86_Chenevelles_5.jpg","../image/image_86/86_Chenevelles_6.jpg"]},"Consult_chateau_formulaireb68e":{"id":"Consult_chateau_formulaireb68e","dept":"86","canton":"Migné Auxances","commune":"Cherves","nom":"Cherves_86","type":"Château","periode":"XIII","histoire":"CHERVES, seigneurie connue à partir du XIIe siècle. Le fief, dépendant de la baronnie de Mirebeau, est mentionné par la suite aux XIIe et XIIIe siècles, Charve, puis Saint-André de Cherves, existe depuis plus d'un millénaire. Appartenant au fief de l'abbaye de Sainte-Croix, le pays fut longtemps le siège de la rivalité des seigneurs et des religieux et cela même après que le duc de Montpensier rasa le donjon à moitié. Il devient par alliance la propriété d'une familles d'occupants anglais pendant la guerre de Cent Ans  les Alliday et appartient aux seigneurs de Cherves, puis à Hugues de Surgères, il est à cette époque le centre d'une châtellenie.","architecture":"CHERVES, le donjon qui jouxte les bâtiments d'habitation présente une construction en moellons rectangulaire cantonnée de quatre tours d'angle. Une grosse tour ronde et une tour polygonale, imbriquées dans des bâtiments récents, donnent à l'ouest sur un petit plan d'eau, vestige des anciennes douves. Au XVe siècle, un logis fut accolé au donjon, ainsi que le porche et les dépendances. Au XVIIe siècle, la haute cour fut entièrement repensée afin d'intégrer un grand logis appuyé sur toute la longueur de la courtine ouest, intégrant le logis précédent. Ce logis a été profondément remanié au XVIIIe siècle, époque à laquelle la grange et le pigeonnier ont été construits. Le logis prit son aspect actuel au début du XXe siècle. Vers 1990, le portail en plein cintre de la grange est remplacé par un portail en béton à portes métalliques.","habitants":"Famille d'Hugues de Surgères,\r\n        \"","divers":"Forteresse de Cherves","gps":"","images":["../image/image_86/86_Cherves_86_1.jpg","../image/image_86/86_Cherves_86_2.jpg","../image/image_86/86_Cherves_86_3.jpg","../image/image_86/86_Cherves_86_4.jpg","../image/image_86/86_Cherves_86_5.jpg"]},"Consult_chateau_formulaire606e":{"id":"Consult_chateau_formulaire606e","dept":"86","canton":"Vouneuil sous Biard","commune":"Chiré en Montreuil","nom":"Chiré_Montreuil","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Chiré-Montreuil  celui de la Chéze, de Chiré et de Piloue.                                                                                                             CHEZE, bâti à Latillé, date du XVIIe siècle,  une seigneurie est attestée dès le Moyen Age. Il est d'une grande unité architecturale avec son puits, à l'intérieur du bâtiment, son colombier rectangulaire adossé à un bâtiment, est entouré d'un parc à l'anglaise, datant du XIXe siècle.                                                                                   CHIRE-MONTREUIL,  du XVe siècle et de la 2e moitié du XVIIe siècle,  est racheté par la commune, en 1992. Des travaux de sauvegarde sont depuis entrepris.\r\nPILOUE, les premières mentions concernant Piloué remontent à 1403. Cet ancien fief relevait de Chiré et appartenait au chapitre de Sainte Radegonde. Parmi ses propriétaires, on retrouve vers 1868 le nom du marquis Aymer de La Chevallerie, le château appartient toujours à cette même famille.","architecture":"CHEZE, le château a été édifié au XVIIe, avec un parc qui comportait un jardin à la française avec deux terrasses. Vers 1860, l'actuel parc à l'anglaise a été créé par un architecte paysagiste parisien. En 1890 le parc est agrandi. Près du château, côté jardin, se trouve une pièce d'eau datant de 1895,  deux ailes de communs délimitent la cour d'honneur et s'appuient sur le corps de logis ; elles sont ponctuées d'un pavillon à chaque extrémité, celui de l'angle sud-ouest abrite le colombier. La façade surmontée d'un toit à croupes, s'ordonne de part et d'autre d'un avant-corps au fronton triangulaire interrompu par une lucarne.                                                                            CHIRE-MONTREUIL, à lorigine, c'est un château féodal à but défensif sans ouverture à lextérieur, à part la porte du châtelet. Des ouvertures sont ménagées à la Renaissance, très vite recluses au moment des guerres de religion, à la suite desquelles le château fut décapité. Le Seigneur de Chiré fait restaurer les murs restants pour disposer dune habitation rendue plus confortable au temps des Jacques du XVIIe siècle. Laissé à labandon, depuis 1974.                                                                  PILOUE, le corps de logis principal comprend cinq travées régulières flanquées de deux bâtiments symétriques. Ceux-ci sont coiffés d'une toiture d'ardoise à deux pans brisés. Au XVIIIe siècle, le château a été prolongé par deux ailes symétriques à l'italienne, avec un fronton et un toit en terrasse et par une chapelle, et les baies des façades ont dû être refaites à la suite d'un incendie. A l'intérieur se trouve un bel escalier de pierre et fer forgé.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Chiré-Montreuil 46° 38' 23\" Nord, 0° 07' 38\" Est, grav 7 - 8 celui de la Chéze-Latillé grav 1 à 3 , de Chiré et de Piloue grav -4-5-6.","gps":"","images":["../image/image_86/86_Chir%c3%a9_Montreuil_1.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_2.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_3.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_4.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_5.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_6.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_7.jpg","../image/image_86/86_Chir%c3%a9_Montreuil_8.jpg"]},"Consult_chateau_formulairec697-2":{"id":"Consult_chateau_formulairec697-2","dept":"86","canton":"Civray","commune":"Surin","nom":"Cibioux_Surin","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Surin, celui de Cibioux et de la Faugerie. CIBIOUX,  certains noms retiennent l'attention : Thomas Suyreau, médecin ordinaire du Roi Louis XI, Boisseguin, gouverneur de Poitiers sous la Ligue, Jean de Reclus, maître d'hôtel de Louis XIV, Isaac de La Cropte, comte de Sainte Abre, à qui revient la construction d'une terrasse en 1787. Durement éprouvé au siècle dernier, laissé à l'abandon, l'édifice a connu une histoire périlleuse pour son intégrité. En fait, par une sorte d'état de grâce, il n'a pas été dénaturé. Le château de Cibioux fut dévasté lors de la Révolution française. Il cessera d'être habité à partir de 1945. Depuis 1979, a fait l'objet de plusieurs campagnes de restauration. La terrasse, la toiture, le mur de soutènement et la balustrade sont inscrits aux M.H. depuis 1983.  C'est devenu aujourd'hui un gite et chambres d'hôtes.                                                                       FAUGERIE, également nommé La Faugeraie, le lieu est mentionné vers l'an 1000 dans le cartulaire de Saint Cyprien et son existence sera de nombreuses fois évoquée aux XVIe, XVIIe et XVIIIe siècles.","architecture":"CIBIOUX, bâti à Surin.le caractère défensif de ce château des XVe, XVIe et XVIIe siècles, avec mâchicoulis et tours féodales, s'estompe au fur et à mesure de la visite, pour devenir une demeure où il fait bon vivre, il est de style Médiéval, avec ses tours, une enceinte médiévale, une chapelle et une belle terrasse dallée du XVIIIe siècle, une porte ogivale, des fenêtres ornées de sculptures Renaissance donnent sur une belle terrasse à balustres du XVIIIe siècle. Héritier d'un premier hôtel noble que la guerre de cent ans a réduit à néant, il doit son visage, à la fois austère et séduisant, et aux campagnes de construction qui s'y sont succédé. Il présente un fort caractère défensif avec ses mâchicoulis et ses tours féodales. Des fenêtres ornées de sculptures de style Renaissance donnent sur une belle terrasse à balustres du XVIIIe siècle. Il transforma la toiture du corps principal à la Mansart.                                                                                    FAUGERIE,  le château de la Faugerie présente deux tours circulaires encadrant l'une des façades d'un corps de logis rectangulaire, une autre, hexagonale et contenant un escalier, flanquant l'autre façade. Sa construction pourrait remonter au XIVe siècle. Le bâtiment est recouvert d'une toiture d'ardoise à deux pans, les tours étant toutes trois dotées de hautes poivrières d'ardoise également. Le logis est prolongé par un long bâtiment de dépendance se terminant par un pavillon pourvu d'un toit en croupe et flanqué d'une tour circulaire à poivrière dans un angle. Les deux sont couverts d'ardoises et de tuiles plates.","habitants":"Cibioux;  Isaac de La Cropte,                                                    Faugrerie; seigneurs locaux\r\n        \"","divers":"à Surin : 46° 04' 44\" Nord, 0° 22' 19\" Est , celui de Cibioux grav 1 à 4 et de la Faugerie grav-5.","gps":"","images":["../image/image_86/86_Cibioux_Surin_1.jpg","../image/image_86/86_Cibioux_Surin_2.jpg","../image/image_86/86_Cibioux_Surin_3.jpg","../image/image_86/86_Cibioux_Surin_4.jpg","../image/image_86/86_Cibioux_Surin_5.jpg"]},"Consult_chateau_formulaireabe3":{"id":"Consult_chateau_formulaireabe3","dept":"86","canton":"Châtellerault-1","commune":"Scorbé-Clairvaux","nom":"Clairvaux_Scorbé","type":"Château-Vestiges","periode":"XII-XV-XVII","histoire":"Deux châteaux à Clairvaux celui de Clairvaux et de la Robinière.                                                                     CLAIRVAUX ,  les seigneurs du haut- Clairvaux figurent au XIe siècle parmi les proches du comte d'Anjou, et possèdent des fiefs en Anjou et Poitou. Richard Coeur de Lion le fait fortifié au XIIe siècle. A la fin du XIIe siècle, leur châtellenie de Clairvaux relève de la vicomté de Châtellerault, au milieu du XVe siècle, les Chabot,  deviennent propriétaire. En 1580 le domaine est acquis par René de Villequier et est érigé en comté. Au XVIIIe siècle le château de Clairvaux est aux mains de Gilles Fouquet, frère du célèbre surintendant de Louis XIV. Il commence la construction d'un château, d'immenses communs encadrant la cour d'honneur, et des pavillons aux angles du rectangle formé par les douves, l'entreprise reste inachevée car il doit suivre son frère dans son exil. Anne d'Aumont se défait du domaine en 1704, vendu à  Étienne Chérade, comte de Montbron. En 1770 son petit-fils Adrien-Etienne de Montbron marquis, bâti le corps de logis actuel, appuyé contre l'aile des Chabot et fait remplacer le pont-levis. Resta plusieurs années dans la famille Opter et en 1964 achat de Clairvaux par la famille Caude.                                                                                                                              ROBINIERES, fief relevant du marquisat de Clairvaux, cette maison noble est bâtie sur la colline du Haut Clairvaux, près  du château féodal. La demeure a été construite au XVIIe siècle.","architecture":"CLAIRVAUX  date des XVe siècles, construit en 1470. conçue de deux corps de logis de style gothique au XVIe siècle les Villequier qui construisirent  le portique d'entrée composé d'un corps de logis, au centre duquel s'ouvre  un porche arrondi et qu'encadrent deux tourelles carrées plus élevées,  et le colombier, la grosse tour, élevée à l'angle sud ouest des deux corps de bâtiments compte un étage supplémentaire acostée d'une tourelle  d'escalier et d'une échauguette sur culot ornés.  A lintérieur le Musée international du jeu déchecs, unique en Europe, il regroupe plus de 3000 pièces en provenance de tous les continents (70 pays représentés), jeux des XVIIIe, XIXe, et XXe siècles. Ce donjon, de lancien château-fort construit au XIe siècle, est cerné de douves et de fossés. Il aurait été entouré de sept tours, dont une seule subsiste. Ce donjon roman à contreforts plats a été agrandi et renforcé à l'est par un puissant mur bouclier. Celui-ci apparaît surélevé en guette, percé de rares archères, son dernier niveau desservi par un escalier en vis de Saint-Gilles, s'ouvrait sur un chemin de ronde hourdé. Après son abandon au XVIe siècle, il est démantelé et ses pierres sont remployées  pour les constructions locales Il est partiellement restauré en 1995.                                                                                                   ROBINIERES, les façades et les toitures ; les douves avec leurs murs de soutènement et remparts et leurs ponts ; le portail d'entrée ; la fuie : inscription par arrêté du 27 juin 1984, maison rectangulaire à 2 étages entourée de douves sèches, d'un pressoir, d'une boulangerie, d'un pigeonnier de 1000 boulins.","habitants":"Clairvaux; Gilles Fouquet, Marquis Adrien-Etienne de Montbron\r\n        \"","divers":"à Clairvaux celui de Clairvaux  grav de 1 à 6 et de la Robinière  grav 7-8                                                                Clairvaux 46° 48' 26\" Nord 0° 24' 45\" Est","gps":"","images":["../image/image_86/86_Clairvaux_Scorb%c3%a9_1.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_2.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_3.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_4.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_5.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_6.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_7.jpg","../image/image_86/86_Clairvaux_Scorb%c3%a9_8.jpg"]},"Consult_chateau_formulaire8d8f":{"id":"Consult_chateau_formulaire8d8f","dept":"86","canton":"Montmorillon","commune":"Lathus Saint-Rémy","nom":"Cluzeau_Lathus","type":"Château","periode":"XIV","histoire":"CLUZEAU, la seigneurie du Cluzeau relevait de la châtellenie de Montmorillon et apparaît dans les textes dès le début du XIVe siècle. L'occupation du site remonte au moins à la période romane, jusqu'au début du XXe siècle était visible. Il a été construit sur l'emplacement d'un ancien fort roman. Le château est cité pour la première fois en 1404 et dépendait de Montmorillon. Les du Breuil, seigneurs du lieu, construisent le château actuel dans la deuxième moitié du XVe siècle. Le donjon de Lenest est le vestige d'un château datant du XIVe. Il est situé à environ 4 km de Lathus, sur la route de Saulgé et situé sur cette commune.   Le château de Cluzeau est inscrit comme M.H.  depuis 1993. Et refuge de Théoline à Cluzeau","architecture":"CLUZEAU, sa configuration est irrégulière en raison du socle rocheux et de la présence de l'ancien donjon. Celui-ci a été remanié au cours du XVIIIe siècle pour le mettre au goût du jour. Le logis est flanqué de deux tours et il est desservi par une tourelle d'escalier. L'élévation se compose d'un rez-de-chaussée et d'un étage. À chaque étage, trois salles ont été aménagées. Une chapelle complète l'ensemble seigneurial. Des souterrains partent du château et servaient de refuge.dans la cour, un fort donjon carré à contreforts ronds, totalement arasé aujourd'hui. La partie nord et ouest de l'enceinte de ce donjon sert maintenant de soubassement à un logis bâti aux XIVe et XVe siècles. Deux grosses tours cylindriques de défense flanquent les murs extérieurs, côté cour, une autre tour cylindrique contient un escalier en vis, accessible par une porte richement ornée. Pratiquement toutes les baies sont d'origine et ont conservé leur remplage mouluré. Quelques cheminées médiévales sont visibles, dont une monumentale. Un escalier en vis donne accès à un enchevêtrement de souterrains creusés dans le roc. Ce château est un exemple typique de remodelage d'un édifice ancien à la fin du Moyen-âge.","habitants":"Famille des  du Breuil\r\n        \"","divers":"a Lathus le château de Cluzeau et le refuge de Théoline","gps":"","images":["../image/image_86/86_Cluzeau_Lathus_1.jpg","../image/image_86/86_Cluzeau_Lathus_2.jpg"]},"Consult_chateau_formulairead79":{"id":"Consult_chateau_formulairead79","dept":"86","canton":"Lésignan","commune":"Coulombiers","nom":"Coulombiers","type":"Château","periode":"XVIII","histoire":"COULOMBIERS, le château, propriété de M. et Mme de Menthière, fut édifié au milieu de XVIIIe siècle pour le marquis du Rousseau de Fayolle à l'exception du pavillon qui jouxte le corps principal sur le côté nord, construit pour le comte Roger de la Mure, grand-père de madame de Menthière. Il était la propriété de la famille de Roquemorel avant d'être transmis à la famille de Menthière.","architecture":"COULOMBIERS, le bâtiment, de plan rectangulaire très allongé, présente une architecture très sobre dont la beauté repose sur l'harmonie des volumes. On distingue trois niveaux éclairés par cinquante deux ouvertures légèrement cintrées parmi lesquelles on compte cinq lucarnes. Sa belle toiture à pans brisés est couverte d'ardoise. Autrefois trois fermes à la Guisserie complétaient les dépendances. Dans les communs on peut voir une grange en forme de chapelle occupée jadis par les soeurs qui accueillaient les pèlerins de Saint-Jacques reçus au château. Au bas de la propriété un pont en bois enjambe le canal. Dans le parc à la Française, très arboré, il reste toujours le coin cabane des enfants et arrières petits enfants des hôtes du château.","habitants":"le comte Roger de la Mure\r\n        \"","divers":"Château du coulombiers","gps":"","images":["../image/image_86/86_Coulombiers_1.jpg"]},"Consult_chateau_formulaire2238":{"id":"Consult_chateau_formulaire2238","dept":"86","canton":"Loudun","commune":"Coussay","nom":"Coussay","type":"Château","periode":"XVI","histoire":"Trois châteaux à Coussay celui de Coussay.                                                                                                            COUSSAY, cest au début du XVIe siècle que Denis Briçonnet,  Armand Du Plessis, futur Cardinal de Richelieu, hérite de son oncle, alors quil vient dêtre nommé Evêque de Luçon en 1607, à lâge de 22 ans. Le Cardinal de Richelieu vient à Coussay pour la première fois en 1608. En 1610, il sy réfugie après son échec auprès de la Reine Régente. En avril 1618, se sentant en danger, il propose son exil qui est accepté, et il quitte Coussay. En mars 1619 il réapparaît. En 1623, absorbé par les affaires de létat, il abandonne son Evêché de Luçon et ne revient plus à son château de Coussay. Quand Richelieu meurt en 1642, Coussay est donné au sieur Jean de Sazilly. Celui-ci y vit pendant une cinquantaine dannées et y donne des fêtes. A la mort de Jean de Sazilly, les prieurs cessent dhabiter Coussay, et labbaye confie terres et château à un Fermier Général. De 1710 à 1791 quatre Fermiers sy succèdent. Au moment de la Révolution, le château est vendu comme bien national, lacquéreur se révélant insolvable, Bonaparte reprend le château comme Sénatorerie. A la Restauration, le château redevient bien de la Couronne. En 1830, il est vendu à un fermier des environs. De 1830 à 1903, plusieurs propriétaires se succèdent, le château est utilisé comme ferme et comme grange et se délabre. En 1903, il est vendu à Louis Tristant, notaire à Mirebeau, arrière-grand-père des propriétaires actuels. Il effectue alors les travaux indispensables au sauvetage de l'édifice.","architecture":"COUSSAY comprend un corps principal flanqué de quatre tours dont l'une, plus élevée, servait à la fois de guet et de donjon. Au sommet de cette dernière, sont conservées les consoles qui soutenaient le hourd. Le bâtiment qui forme le corps central ne comporte qu'un rez-de-chaussée dont l'accès se fait par deux perrons. L'enceinte extérieure des promenades, esplanades et jardins qui entouraient le château, est limitée par des murs crénelés, amortis aux angles par de petites guettes en pierre formant poivrières en encorbellement. Le pavillon d'entrée s'appuie au bâtiment de la fontaine. Son premier étage a servi de justice de paix depuis François Ier. L'accès à la salle de justice se faisait par un petit escalier en vis à gauche de la fontaine. La fontaine, qui alimente les douves, présente un motif Renaissance. Éléments protégés MH : le rez-de-chaussée (intérieur et extérieur) du pavillon du XVIe siècle avec la fontaine ; la tourelle d'escalier située au midi : classement par arrêté du 14 février 1924. Le château à l'exception des parties classées : inscription par arrêté du 18 juin 1935. Les façades et les toitures du pavillon de la fontaine, du porche du corps de garde ; l'escalier qui se trouve à l'intérieur du pavillon de la fontaine ; les façades et les toitures du château proprement dit avec ses douves et les pavillons d'angle ainsi que l'oratoire de Richelieu à l'intérieur du château : classement par arrêté du 10 août 1949.","habitants":"Cardinal Armand Du Plessis,\r\n        \"","divers":"Château de Coussay","gps":"","images":["../image/image_86/86_Coussay_1.jpg","../image/image_86/86_Coussay_2.jpg","../image/image_86/86_Coussay_3.jpg","../image/image_86/86_Coussay_4.jpg","../image/image_86/86_Coussay_5.jpg","../image/image_86/86_Coussay_6.jpg","../image/image_86/86_Coussay_7.jpg","../image/image_86/86_Coussay_8.jpg"]},"Consult_chateau_formulaire8889":{"id":"Consult_chateau_formulaire8889","dept":"86","canton":"Loudun","commune":"Coussay","nom":"Coussay_86","type":"Maison-forte","periode":"XV-XVI","histoire":"Dans cet article la tour de Ry et des Roches de Coussay                                                                              TOUR de RYE, le logis fut construit dans les premières années de la Renaissance, cependant, une tour du XVe siècle, origine du nom, a dû préexister au logis du XVIe et aux communs des XVIIe-XVIIIe siècles. Le logis, entouré de douves, est construit selon un axe nord-sud. La tour ronde est accolée à un bâtiment rectangulaire au nord du logis, selon un axe est-ouest.                                                  ROCHES au début du XVe siècle, un acte notarié mentionne l'existence des Roches de Longefons. On retrouve le fief, qui relevait de Richemont, cité dans les archives de la famille de Marconnay qui le possédait à la fin du XVIe siècle. Construit sur des bases anciennes, peut-être du XI siècle, il fut abattu sur ordre de Richelieu, c'est un officier de Napoléon Ier qui lui donna son aspect actuel.","architecture":"TOUR de RYE, une rangée de bâtiments de communs rectangulaires, avec pigeonnier rond, ferment le front ouest de la cour, la tour ronde est à mâchicoulis couverts, à deux étages, avec cheminées et traces de peintures murales. Le logis forme un rectangle appuyé de deux tours rondes au sud-est et au sud-ouest. Lucarnes Renaissance à couronnement pyramidé, cantonnées d'amortissements en forme de candélabres. Porte fortifiée dont il ne reste que deux contreforts qui devaient soutenir deux tourelles en encorbellement, encadrant une bretèche (disparue) sur consoles. L'élévation est a été agrandie pour former une galerie à l'étage du XVIIIe siècle, bouchée au XIXe siècle, êtres sillonnée de colonnes.                                                                                          ROCHES Le château se compose de deux corps de bâtiment distincts. Le premier à trois niveaux d'ouvertures et sa toiture à quatre pans est couverte d'ardoise. Il est flanqué de deux tourelles en surplomb couvertes par les longs pans du toit. Il présente à côté des traces encore visibles de ce qui devait être une porte sans doute du XVe siècle (gâble couronné d'un fleuron), une porte réaménagée au Premier Empire. Le second corps est couvert de tuiles. Celui-ci est plus bas, seulement deux niveaux apparents. Sur sa façade, au ras de la toiture, on aperçoit des consoles.","habitants":"Roches; Famille des Richemont\r\n        \"","divers":"A Coussay  tour de Ry grav de 3 à 8 et des Roches grav 1-2","gps":"","images":["../image/image_86/86_Coussay_86_1.jpg","../image/image_86/86_Coussay_86_2.jpg","../image/image_86/86_Coussay_86_3.jpg","../image/image_86/86_Coussay_86_4.jpg","../image/image_86/86_Coussay_86_5.jpg","../image/image_86/86_Coussay_86_6.jpg","../image/image_86/86_Coussay_86_7.jpg","../image/image_86/86_Coussay_86_8.jpg"]},"Consult_chateau_formulairea971":{"id":"Consult_chateau_formulairea971","dept":"86","canton":"Châtellerault-3","commune":"Coussay-les-Bois","nom":"Coussay_Bois","type":"Château","periode":"XV-XIX","histoire":"A Coussay les Bois le château de la Vervolière, de La Grelandière du XIXe siècle,  du Turrault du  XIXe siècle.                                 VERVOLIERE; Il appartenait aux du Plessis, ancêtres du cardinal de Richelieu. C'est un bel ensemble avec dans la cour, une remarquable porte de style gothique. Cette châtellenie est lancien fief des du Plessis, berceau de la famille du cardinal de Richelieu. Durant la guerre de Cent Ans, les places fortes autour de La Roche Posay furent cédées en garantie aux Anglais suite au traité de Brétigny, leur reconquête est entreprise en 1369 par Kerlouet et Du Guesclin. Après cette période troublée, le château dût être reconstruit par Geoffroy Du Plessis et François Du Plessis. Le château appartient au XVIIIe siècle aux Frécelle de Bregy puis aux Chartier de Coussay. La marquise de La Rochejaquelin entreprend des travaux intérieurs au début du XIXe siècle.                                                                                                               TURRAULT, du XIXe siècle,  il est difficile  de  savoir  s'il  s'agissait  d'un  fief  ou  d'une  simple métairie pendant l'ancien Régime. Peu de temps avant l'année 1830, il est habité par André Eutrope Bourdin, originaire de la région de Brie en Seine-et-Marne, son épouse Rose Robin, et leurs enfants. En 1844, Louise Bourdin, l'une des filles de la famille,  est  propriétaire  du  Turreau.  Elle  y  réside  avec  son époux  André  Douady,  maire  de  la  commune  à  la  fin  du  XIXe siècle,  et  leurs  enfants.  En  1852,  la  propriété  est  vendue  à Clément Drouault, propriétaire à Lésigny, qui fait reconstruire le  logis  vers  1858.  Composé  dun  grand  corps  de  bâtiment flanqué de pavillons hauts, le logis présente une architecture sobre dépourvue de décor.","architecture":"GRELANDIERE, c'est un corps de bâtiment rectangulaire, pourvu d'un toit en croupe couvert de tuiles plates. Il présente deux niveaux apparents et un en surcroît sous les combles, par un escalier droit à rampe en pierre. La porte d'entrée est surmontée d'un fronton triangulaire dont l'angle supérieur est brisé par un il-de-buf. Trois travées d'ouvertures au premier niveau et cinq au deuxième animent la façade du logis. Elles ont un appui saillant et trois d'entre elles, au deuxième niveau, se prolongent en interrompant l'avant toit par des lucarnes au linteau cintré qui éclairent les combles.                                                  VERVOLIERE, un bel ensemble avec dans la cour, une remarquable porte de style gothique C'est un ensemble pittoresque de bâtiments, commencés au XIe siècle et achevés au XVe siècle (tours à mâchicoulis, fuie), groupés autour d'une cour centrale. L'une des tours abrite un escalier qui a la particularité d'être à rampe droite. Bien que dune taille modeste il semble être le plus ancien de France. Dans la chapelle, dédiée à Saint Michel, subsistent quelques traces de peintures murales datant du XVe siècle. On peut voir également les substructions d'une enceinte et de tours se reliant au bâtiment principal. Sur la cour intérieure s'ouvrait une chapelle, un pavillon d'escalier et une galerie (détruite) qui communiquait par une petite porte avec la salle voûtée de la tour. A droite de l'entrée de cette tour, des corbelets supportent des mâchicoulis de défense. En face se trouve la porte très ornée de l'escalier.","habitants":"Famille du cardinal de Richelieu                                         Famille André Eutrope Bourdin\r\n        \"","divers":"A Coussay les Bois, Vervolière grav 1 à 4   Grelandière grav 5, Bois-Montjoie grav-6","gps":"","images":["../image/image_86/86_Coussay_Bois_1.jpg","../image/image_86/86_Coussay_Bois_2.jpg","../image/image_86/86_Coussay_Bois_3.jpg","../image/image_86/86_Coussay_Bois_4.jpg","../image/image_86/86_Coussay_Bois_5.jpg","../image/image_86/86_Coussay_Bois_6.jpg"]},"Consult_chateau_formulaire14ed":{"id":"Consult_chateau_formulaire14ed","dept":"86","canton":"Loudun","commune":"Ranton","nom":"Curcay_Ranton","type":"Forteresse","periode":"XIV","histoire":"CURCAY sur DIVE, donjon de 1350, restes de l'ancien château construit pour Huet de Curçay, classé M.H. depuis 1965.  Le donjon, consolidé au XVe siècle, faisait partie d'une forteresse du XIIe dont il ne reste que des ruines. Le seigneur de Curçay, qui devait tomber en héros à Poitiers, aux pieds de Jean-le-Bon, avec la fleur de la chevalerie poitevine, fit édifier son château « afin  que sa tour et sa forteresse puissent tenir la frontière du pays loudunais à l'encontre des Anglais.                                                                                                     RANTON, le médiéval château de Ranton est un château fort construit en 1340, au début de la guerre de cent ans entre la France et l'Angleterre. Le château possède deux appartements superbement meublée  et trois autres chambres doubles confortables avec salles de bain pour la location dans un cadre charmant, profiter des jardins privatifs avec mobilier de jardin et barbecue et utilisation de la piscine d'eau salée chauffée. Le château est respectueux de l'environnement tant pour l'eau chaude et le chauffage.","architecture":"CURCAY sur DIVE, commencé à la fin du XIVe siècle, ce château est édifié pour défendre la région contre les Anglais. Le corps de logis fut détruit au cours des guerres de Religion. Tour carrée, l'ancien donjon était raccordé, avant les guerres de Religion, à un édifice plus vaste dont il reste des traces de l'accrochement, une cheminée XVe ainsi que la base d'une tour ronde. Echauguettes aux angles, corbeaux et mâchicoulis. Un escalier à vis dessert l'intérieur, voûté sur croisées d'ogives.                           RANTON,  érigé au XIVe siècle, entouré de douves sèches. Sa porte d'entrée est flanquée de deux hautes tours à mâchicoulis. Le château est protégé par une vaste enceinte octogonale avec des tours. Sa restauration débute après la seconde guerre mondiale, avec la vente du château à l'artiste sculpteur Dominique Piéchaud et à sa femme. Le château est revendu en 1969.","habitants":"sculpteur Dominique Piéchaud\r\n        \"","divers":"Tour à Ranton sur Dive","gps":"","images":["../image/image_86/86_Curcay_Ranton_1.jpg","../image/image_86/86_Curcay_Ranton_2.jpg","../image/image_86/86_Curcay_Ranton_3.jpg","../image/image_86/86_Curcay_Ranton_4.jpg","../image/image_86/86_Curcay_Ranton_5.jpg","../image/image_86/86_Curcay_Ranton_6.jpg","../image/image_86/86_Curcay_Ranton_7.jpg"]},"Consult_chateau_formulairea3c0":{"id":"Consult_chateau_formulairea3c0","dept":"86","canton":"Lusignan","commune":"Curzay sur Vonne","nom":"Curzay_Vonne","type":"Château","periode":"XIV","histoire":"CURZAY, Guillaume III de Curzay édifie la première des constructions qui se succédèrent avant de former le château actuel  l'édification des bâtiments qui composent le domaine et à Denise de Curzay qui fit aveu de la seigneurie du même nom au Comte de Poitiers en 1258. Probablement faut-il attribuer au XIVe siècle. Au XVe siècle à la famille Ratault,  d'alliances en descendances, le domaine échut d'abord à la famille de Marconnay seigneur de la Chaize vers la fin du XVIe siècle. il fut ensuite vendu en 1682  à Pierre Rioult conseiller secrétaire du roi. les successeurs de la marquise de l'hôpital ne cesseront d'embelir le domaine  et en 1782 le château passe aux Duval comte de Chassenon jusqu'en 1991, les descendants portent le titre  de vicomtes de Curzay de Lothe, ces derniers conservent la propriété et ont transformé une partie depuis 1990 en hôtel, est inscrit comme M.H. depuis 1927. En 1940, le château fut réquisitionné puis occupé jusqu'en 1942 par l'armée allemande. C'est au colonel  L'Hotte, dont l'épouse était l'héritière directe du domaine, et à ses descendants que l'on doit le recueil historique de la vie du château. L'embellissement du domaine et la rénovation des bâtiments ont été entrepris depuis 1994.","architecture":"CURZAY, du XIVe siècle l'édification des bâtiments qui composent le domaine, il était à la fois maison-forte, sinon château-fort, habitation seigneuriale et bâtiment d'exploitation. La grande allée face au château n'existait pas encore,  au début du XIXe siècle, le domaine fit l'objet de nombreuses transformations, en particulier le parc anglais, aménagé par Bülher. Les dépendances furent dotées de ferme modèle, serre, orangerie, écuries. L'ensemble prit sa physionomie actuelle qui comporte le château du XVIIIe amputé de l'aile nord (détruite vers 1865), l'aile sud des communs de la même époque que le château, la chapelle modifiée au XIXe siècle dans le style néo-gothique, les dépendances à l'arrière des communs, comprenant des bâtiments de différentes époques (XIVe, XVIe, XVIIIe siècles) restaurés au XIXe siècle, une grange avec ses deux tours médiévales et un jardin potager. L'embellissement de la propriété et la rénovation des bâtiments ont été entrepris depuis 1994. Aujourd'hui membre de \"l'Association Relais et Châteaux\", Curzay a vocation à rester pour longtemps encore un lieu de sérénité, de calme et d'harmonie.  Les façades et les toitures de l'aile Sud des communs, la grange dimiére, la chapelle et le bâtiment situé à l'ouest de la grange, du château de Curzay le sont depuis 1983.","habitants":"Famille Ratault                                                                           Famille de Marconnay\r\n        \"","divers":"Curzay  46° 29' 0,78\" Nord, 0° 2' 57,52\" Est","gps":"","images":["../image/image_86/86_Curzay_Vonne_1.jpg","../image/image_86/86_Curzay_Vonne_2.jpg","../image/image_86/86_Curzay_Vonne_3.jpg","../image/image_86/86_Curzay_Vonne_4.jpg","../image/image_86/86_Curzay_Vonne_5.jpg"]},"Consult_chateau_formulaire14f6":{"id":"Consult_chateau_formulaire14f6","dept":"86","canton":"Loudun","commune":"Dercé","nom":"Dercé","type":"Château","periode":"XIV-XV-XVI","histoire":"Trois châteaux à Dercé celui de Brault, de Baslou et de la Girardière.                                                                                                                           BASLOU  appartient depuis le début du XVe siècle aux Tiercelin. En 1531 Côme Tiercelin, seigneur de La Roche du Maine.                                                                              BRAULT, dans les archives de la commanderie de Loudun, le fief de Brault est mentionné dès le milieu du XVe siècle sous le nom de Berault. Probablement édifié au XVIe siècle, le château de Brault offre un aspect particulièrement agréable et un état de conservation remarquable.                                                                                    GIRARDIERE La famille Champigné Mottet, connue dès le XIVe siècle, posséda et habita la Girardière de 1660 à 1830. remonte dans ses parties les plus anciennes au milieu du XVe siècle et remanié au XIXe siècle. Il présente un plan en U, le corps de logis possède, au nord, une façade Directoire avec trois niveaux d'ouvertures ouvrant sur la cour intérieure fermée par une grille néo-gothique. Sa façade sur parc, est ornée sous toiture d'un entablement interrompu par cinq lucarnes. Ses ouvertures et la porte offrent des décors du XIXe siècle. En retour d'équerre, côté est, le bâtiment le plus ancien à toiture à deux pans est accolé à une tour hexagonale et prolongé d'un autre plus récent avec toiture en croupe, faisant pavillon et venant s'appuyer sur le corps principal. Au XIXe siècle, son pendant, côté ouest, fut ajouté et présente plusieurs fenêtres à meneaux doubles et simples.","architecture":"BASLOU, comporte deux bâtiments perpendiculaires: l'un à l'est, flanqué de deux tours à mâchicoulis et l'autre, au sud, transformé et diminué d'un étage. Une tour d'escalier occupe l'angle rentrant. L'enceinte, à l'exception d'une tour, et les fossés ont disparu. Si l'on met à part les transformations du XIXe siècle, l'édifice paraît homogène; les constructeurs ont seulement utilisé des murs plus anciens dans le bâtiment sud, Baslou est un édifice de style gothique. Le décor des mâchicoulis, la mouluration des fenêtres originelles et des cheminées conservées à l'intérieur du logis Est, sont gothiques.                                                                                                            BRAULT, de plan rectangulaire, le corps de logis principal présente deux niveaux apparents . La façade sur cour est percée de nombreuses fenêtres à meneaux sur quatre travées, chacune de ces dernières étant surmontée par une lucarne en façade interrompant l'avant-toit, elles mêmes surmontées d'un fronton triangulaire en pierre. Deux portes permettent l'accès au logis, l'une ornée d'un fronton en segment d'arc, l'autre s'ouvrant en plein cintre. Le logis est recouvert d'une toiture d'ardoise. La façade sur cour au sud-est, est cantonnée de deux tours circulaires au toit conique d'ardoise également. Le logis forme avec les divers bâtiments de communs une cour fermée dans laquelle se trouve un haut pigeonnier rond.","habitants":"Baslou Famille de  Tiercelin                                                     Girardière, famille Champigné Mottet\r\n        \"","divers":"à Dercé château  de Brault grav 1-2, de Baslou grav 8 et de la Girardière de 3 à 7.","gps":"","images":["../image/image_86/86_Derc%c3%a9_1.jpg","../image/image_86/86_Derc%c3%a9_2.jpg","../image/image_86/86_Derc%c3%a9_3.jpg","../image/image_86/86_Derc%c3%a9_4.jpg","../image/image_86/86_Derc%c3%a9_5.jpg","../image/image_86/86_Derc%c3%a9_6.jpg","../image/image_86/86_Derc%c3%a9_7.jpg","../image/image_86/86_Derc%c3%a9_8.jpg"]},"Consult_chateau_formulaire5a92":{"id":"Consult_chateau_formulaire5a92","dept":"86","canton":"Jaunay-Clan","commune":"Dissay","nom":"Dissay","type":"Forteresse","periode":"XV-XVIII","histoire":"Deux châteaux à Dissay celui de Dissay et de Montigny.                   DISSAY, était la résidence d'été des évêques de Poitiers, a été construit à la fin du XVe siècle par Pierre d'Amboise. Claude Husson  a l'honneur de recevoir le roi François Ier son épouse la reine Claude ainsi que la reine mère Louis de Savoie. le château reçu d'autres personnalités. Au XVIIIe siècle  à Monseigneur de Beaupoil de Saint-Aulaire évêques de Poitiers entreprend de nombreuses transformations du corps de logis. Puis acheté en 1850 par le comte Fruchard ancêtre des propriétaires
