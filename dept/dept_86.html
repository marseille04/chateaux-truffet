ommune":"Vouneuil sous Biard","type":"Château","img":"../image/image_86/86_Vouneuil_Biard_II_1.jpg"},{"id":"Consult_chateau_formulairebf0f","nom":"Vouneuil_Biard_III","commune":"Vouneuil sous Biard","type":"Château","img":"../image/image_86/86_Vouneuil_Biard_III_1.jpg"},{"id":"Consult_chateau_formulaire8fb8","nom":"Vouneuil_Vienne","commune":"Vouneuil sur vienne","type":"Château","img":"../image/image_86/86_Vouneuil_Vienne_1.jpg"},{"id":"Consult_chateau_formulaire7eff","nom":"Yversay","commune":"Yversay","type":"Château","img":"../image/image_86/86_Yversay_1.jpg"}];const FULL={"Consult_chateau_formulaire524d":{"id":"Consult_chateau_formulaire524d","dept":"86","canton":"Pmigné-Auxances","commune":"Thurageau","nom":"Abain","type":"Vestiges","periode":"XV-XVI","histoire":"ABAIN, le fief d'Abin relevait de la Tour de Massognes. Les Montléon sont les premiers seigneurs connus, dont Louis qui fut aussi seigneur de Touffou. Fille et héritière de Louis et de Sibylle Chapperon, dame d'Abain jusqu'à sa mort, Claude de Montléon épousa en 1519 Jean Chasteigner, seigneur de La Roche-Posay et apporta le château d'Abain à cette illustre famille du Poitou, les Chasteignier pourvus de charges importantes, méritaient pleinement leur titre de hauts et puissants seigneurs, ils donnèrent nombre d'hommes distingués, dont Louis, qui combattit dans les rangs catholiques à Jarnac et Moncontour.","architecture":"ABAIN, tours construites au XVe et XVIe siècles, corps de logis du XVIIe siècle, seuls restent actuellement une tour et les parties agricoles, le reste ayant été détruit au début du XXe siècle. Le château d'Abain est inscrit comme M.H. depuis 1925, pour sa tour.","habitants":"Famille de Claude de Montléon \r\n        \"","divers":"Tour de Massognes à Abain  46° 46' 08\" nord, 0° 14' 36\" est","gps":"","images":["../image/image_86/86_Abain_1.jpg"]},"Consult_chateau_formulaire8732":{"id":"Consult_chateau_formulaire8732","dept":"86","canton":"Lussac les Châteaux","commune":"Adriers","nom":"Adriers","type":"Maison forte","periode":"XV-XIX","histoire":"A Adriers trois châteaux  celui de Combe, de Méssignac et de Monterban.                                                                                                      COMBE, les archives du Prieuré du Teil nous font connaître lexistence de la terre de la Combe au cours de la deuxième moitié du XVe siècle (1479).                                                                                      MESSIGNAC, construit au début du XIXe siècle. Il a reçu des restaurations sous le Premier Empire, sans entraîner une modification de son aspect.                                                                         MONTERBAN   Mademoiselle Séraphine de Monterban la représenté en aquarelle.","architecture":"COMBE, le château actuel, plan symétrique, à larchitecture classique rigoureuse est visible de nos jours et date du quatrième quart du XIXe siècle et a été agrandi et modifié vers 1930, il possède une chapelle funéraire, la porte gothique de la chapelle et une cheminée proviennent d'une maison de Niort.                                                            MESSIGNAC, construit au début du XIXe siècle, date 1824 sur la porte d'entrée. de plan symétrique est composé dun grand corps de logis flanqué de chaque côté de deux avant-corps. De facture classique, on remarque dabord ses proportions harmonieuses dans ses façades Est et Ouest. Les restes de douves et de murs attestent dun site beaucoup plus ancien, ce sont là des traces dun château-fort, cité à la fin du XIIIe siècle.                                                   MONTERBAN, le château actuel ne semble par antérieur au XIXe siècle mais le gros-oeuvre et les tours sont peut être antérieurs. Les ruines dun château, sans doute beaucoup plus tardif, vers 1835, sont le seul souvenir qui nous soit parvenu, cétait un édifice de plan symétrique à l'élévation ordonnancée, flanqué de deux tours, ruiné actuellement.","habitants":"Mademoiselle Séraphine de Monterban, et seigneurs locaux\r\n        \"","divers":"A Adriers trois châteaux  celui de Combe, de Méssignac grav 1,  de Monterban grav 2.","gps":"","images":["../image/image_86/86_Adriers_1.jpg","../image/image_86/86_Adriers_2.jpg"]},"Consult_chateau_formulaire209f":{"id":"Consult_chateau_formulaire209f","dept":"86","canton":"Lusignan","commune":"Anché","nom":"Anché","type":"Château","periode":"XVII","histoire":"Trois châteaux à Anché celui d'Anché des Cèdres, de Fonsalmois pas d'informations pour ces deux derniers et de Villenon.                                                                            ANCHE, le fief d'Anché, apparu dans le cartulaire de Saint-Cyprien dès le Xe siècle, relevait de Bois-Coursier à Marnay (le château de Bois Coursier fut le lieu d'inspiration pour Charles Perrault pour écrire le Petit chaperon rouge). Du début du  XIIe à la seconde moitié du XVIe siècle, le fief dAnché a appartenu à la famille du même nom. Trois membres de cette famille sont restés célèbres : Robert dAnché qui émigre avec les anglo-normands ; Guillaume dAnché, frère du poète Pierre dAnché ; Claude du Bellay du Plessis dAnché, protestant qui fuit la France en 1682. Jusqu'à la Révolution, le château d'Anché faisait partie des châtellenies de Château-Larcher, Lusignan et de Couhé.                                                                                                                           VILLENON   cet ancien fief de haute justice, relevant du château de Marigny-Chêmerault, est cité dès 1489. Les armes de la famille de la Béraudière se retrouvent au-dessus du portail d'entrée. Les Aubanneau, de Fleurac, le comte de Theil et les Saluces se succèdent dans la demeure, qui détint le fief de la première moitié du XVIe siècle. Elles pourraient appartenir à Philippe de la Béraudière, premier seigneur de Villenon, marié vers 1530 à Françoise de Vivonne, et encore vivant en 1548, ou à son fils François, marié en 1570 avec Adrienne Frotier. La couronne qui surmonte lécu pourrait faire allusion à la nouvelle seigneurie ou, plutôt, servir de marque de noblesse adoptée sans aucun droit spécifique.","architecture":"VILLENON, le corps de logis, en fond de cour, est délimité à l'est et à l'ouest par des bâtiments à caractère agricole. Le mur de clôture, au sud, est orné d'un portail avec un gâble en accolade décoré de choux frisés et de marcassins. Une porte piétonne en plein cintre se trouve à sa droite. Des tours rondes délimitent le domaine. A l'ouest, deux tours rapprochées doivent marquer l'emplacement d'une ancienne entrée. La tour nord-est renferme un pigeonnier et sa salle basse a dû servir de chapelle. Le logis offre une élévation sur deux niveaux sous toiture à deux pentes de faible inclinaison. Quelques baies sont du XVe siècle mais la plupart des ouvertures remontent au XVIIIe siècle. A l'intérieur, deux cheminées datant du XVIIIe siècle.","habitants":"Famille d'Anché                                                                          Villenon famille de la Béraudière\r\n        \"","divers":"Trois châteaux à Anché  46° 20' 38\" nord, 0° 16' 08\" est celui d'Anché des Cèdres grav 1, de Fonsalmois grav-2, Villenon grav-3 .","gps":"","images":["../image/image_86/86_Anch%c3%a9_1.jpg","../image/image_86/86_Anch%c3%a9_2.jpg","../image/image_86/86_Anch%c3%a9_3.jpg"]},"Consult_chateau_formulaire88aa":{"id":"Consult_chateau_formulaire88aa","dept":"86","canton":"Montmorillon","commune":"Angles sur Anglin","nom":"Angles_Anglin","type":"Vestiges","periode":"X-XV","histoire":"ANGLES sur ANGLIN,  le château d'Angles-sur-l'Anglin surveille la frontière du Poitou depuis le Xe siècle . Il est acheté par l'évêque Guillaume de Bruges à la famille de Lezay à la fin du XIIIe siècle et restera propriété de l'évêché jusqu'à la révolution. Guichard IV, seigneur d'Angles est nommé sénéchal de Saintonge durant la guerre de Cent Ans et il est nommé maréchal de Guyenne quand le Poitou devient anglais en 1356. Le château d'Angles-sur-l'Anglin est repris aux anglais sans combat par Bertrand Du Guesclin en 1372. Au XVe siècle les évêques effectuent d'importants travaux. Hugues de Comparel fait construire le château neuf et Guillaume de Charpagne qui lui succède poursuit les travaux. Puis, durant les périodes troublées que sont les XVIe siècle et XVIIe siècle, le château est pris par les protestants, puis par les ligueurs, par les royaux puis les frondeurs. Ensuite, il est délaissé par les évêques.\r\nDevenu carrière publique à la Révolution, il est acheté en 1923 par la société des antiquaires de l'Ouest, puis par la commune en 1986. Il a été classé M.H. le 10 février 1926.","architecture":"ANGLES sur ANGLIN, du côté de la rivière, deux tours flanquent le bastion qui les unit. La tour du second plan encadre, avec une autre tour, une petite porte de style ogival, surmontée d'une muraille. Cette porte ne présente pas de trace de pont-levis. Elle devait faire communiquer le château avec la ville de façon à livrer passage aux habitants en cas d'attaque. L'accès au château se fait par une première cour triangulaire. Sur la droite, un rempart surélevé comportait un chemin de ronde et unissait la tour d'angle de l'entrée à la tour crénelée faisant face à l'Anglin. Le grand donjon ferme la première cour qu'il sépare complètement d'une autre plus grande. De style roman de la fin du XIIe siècle, il est rectangulaire et flanqué d'une tourelle formant contrefort. Une autre semblable se trouve presque au milieu du parement. A l'angle, une tour plus importante est reliée à la tour médiane par un avant-corps, sorte de bastion creux communiquant avec le donjon par une porte. Cet avant-corps contenait peut-être un escalier permettant d'accéder à la salle supérieure du donjon. Sur les faces intérieures du donjon se voit une suite de créneaux formant couronnement, dont il ne reste que la base. Un chemin de ronde permettait d'y accéder. Au rez-de-chaussée, une salle servait de magasin. Du côté de la route, la cour principale est fermée par une courtine qui unit le donjon à la tour à gauche de l'entrée du château","habitants":"Famille de Lezay\r\n        \"","divers":"Vestiges  dela forteresse d'Angles sur Anglin 46° 41' 38\" nord, 0° 52' 59\" est","gps":"","images":["../image/image_86/86_Angles_Anglin_1.jpg","../image/image_86/86_Angles_Anglin_2.jpg","../image/image_86/86_Angles_Anglin_3.jpg","../image/image_86/86_Angles_Anglin_4.jpg","../image/image_86/86_Angles_Anglin_5.jpg","../image/image_86/86_Angles_Anglin_6.jpg"]},"Consult_chateau_formulaire8b51":{"id":"Consult_chateau_formulaire8b51","dept":"86","canton":"Loudun","commune":"Angliers","nom":"Angliers","type":"Château","periode":"XVII","histoire":"A Angliers le château d'Angliers et celui de St-Cassien.      ANGLIERS; un inventaire de 1680 fait mention dun marché concernant le château dAngliers, passé entre le Prieur de Chalais Nicolas le Boistel, traitant selon toute vraisemblance en lieu et place de son beau-frère Abraham Gaultier, seigneur de Villevert et de Rigny, Trésorier des guerres de France et de Lorraine, 1er Seigneur de ce château, et René Laurent Maître Architecte.  Vaste demeure de la fin du XVIIe siècle dont elle porte le beau cachet, sa partie centrale est agrémentée dun dôme surmonté dun campanile.  La « petite histoire » rapporte que le constructeur de ce château, courtisan de Louis XIV fut inquiété puis chassé de la Cour pour la suivante raison : le plomb des toitures brillait si magnifiquement au soleil quil donnait lapparence de largent.  Toujours est-il que cette demeure changera de famille et fut acquise dès le 17 septembre 1697 par le Marquis François Frézeau de la Frézelière déjà Seigneur de Monts sur Guesnes, lieutenant Général de lArtillerie Royale qui mourut dans nos murs le 2 mai 1702 à lâge de 79 ans.\r\nST-CASSIEN, le donjon appartient au XIIe siècle à Philippe de Saint-Cassien et, au début du XIIIe siècle, à Briand de Saint Cassien qui l'aurait fait fortifier pour résister aux Anglais. Il passe ensuite aux Fontenay, aux Beauvau puis au Cardinal de Richelieu. Ce dernier aurait fait abattre une tour d'angle et démolir l'escalier. Ce donjon, comme ceux de Berrie, Bournand, Ranton ou Curçay, est surtout marqué par le XIVe siècle.","architecture":"ST-CASSIEN, le donjon, dominant la vallée de la Briande, il occupe l'angle nord-est d'une cour fermée de bâtiments. Le corps de logis, appuyé sur son élévation postérieure de tours rondes, forme l'aile est. D'abord donjon carré cantonné de tours rondes et pleines, il est ensuite agrandi de deux tours accolées. Trois hautes lucarnes à fronton triangulaire somment quatre niveaux d'élévation protégés au sud est par un large mâchicoulis, la tour nord a été refaite au XIXe siècle                                                                                                           ANGLIERS ;  Les façades et toitures du château, et des bâtiments qui encadrent la cour d'honneur, l'allée axiale du château, tels que figurés sur le plan joint à l'arrêté  inscription par arrêté du 6 décembre 2017. La commune dAngliers fit lacquisition de la partie centrale actuellement Mairie et Agence Postale en 1923.","habitants":"Angliers;Marquis François Frézeau de la Frézelière    St-Cassien\r\n        \"","divers":"A Angliers  46° 56' 41\" nord, 0° 07' 03\" est.          le château d'Angliers grav-1et celui de St-Cassien grav de 2 à 4.","gps":"","images":["../image/image_86/86_Angliers_1.jpg","../image/image_86/86_Angliers_2.jpg","../image/image_86/86_Angliers_3.jpg","../image/image_86/86_Angliers_4.jpg"]},"Consult_chateau_formulaire1e7c":{"id":"Consult_chateau_formulaire1e7c","dept":"86","canton":"Châtellerault-2","commune":"Antran","nom":"Antran","type":"Maison forte","periode":"XV","histoire":"Quatre châteaux à Antran; la Boussée, la Gatinalière, Maison-neuve, la Moralinière le fort de Valençay ( voir article pour ses trois derniers.                                                                                                BOUSSEE AVAILLES , en 1423, le fief de La Boussée d'Availles appartenait à la famille de Gain. Aujourd'hui   famille du colonel Hery.","architecture":"BOUSSEE AVAILLES, elle est composée d'une avant-cour basse, puis d'une cour haute qui était la cour d'honneur du château médiéval. Logis d'honneur de ce dernier, ce corps de logis principal constitué d'un rez-de-chaussée, d'un étage et d'un comble, avec un toit à deux pans, se retourne en équerre dans une aile d'un étage se terminant par un toit en croupe ; une tour carrée, construite hors uvre dans l'angle intérieur, abrite l'escalier. La façade sud, sur cour, présente des fenêtres à simple appui mouluré, et des lucarnes à fronton cintré. La baie d'entrée de l'escalier médiéval offre une ornementation gothique.  Le logis construit en léger retrait côté sud, date sans doute de la fin du XVIIe siècle, il se raccorde à l'aile en retour par une grande tour médiévale.                                                              GATINALIERE est mentionnée en 1444.  La construction du logis principal et tous les autres corps de bâtiments date du XIXe siècle. Date 1837 sur le logis principal comprenant un rez-de-chaussée et un étage, couvert d'un toit à la Mansard en ardoise, et percé de lucarnes. Un avant corps en légère saillie est flanqué de deux ailes composées de deux travées présentant les mêmes saillies. Les deux communs les plus proches, bâtis de part et d'autre, et parallèlement au logis principal, sont couverts de toits à croupes en ardoise. Bien que de style XVIIe siècle, le décor de tête de cheval et de grappes de raisin sur les deux frontons, permet de dater leur construction avec celle du château.","habitants":"Boussée; famille de Gain\r\n        \"","divers":"Quatre châteaux à Antran; la Boussée Grav 1-2-3, la Gatinalière Grav-4.  Gatinagnière 46° 51' 12\" Nord, 0° 32 39\" Est","gps":"","images":["../image/image_86/86_Antran_1.jpg","../image/image_86/86_Antran_2.jpg","../image/image_86/86_Antran_3.jpg","../image/image_86/86_Antran_4.jpg"]},"Consult_chateau_formulairefdf8":{"id":"Consult_chateau_formulairefdf8","dept":"86","canton":"Châtellerault-2","commune":"Antran","nom":"Antran_2","type":"Château","periode":"XV","histoire":"MAISON-NEUVE, dès 1452, existence du fief de la Maison Neuve relevant de la haute justice de La Motte d'Usseau,                        MORALIERE,    pas d'information historique.","architecture":"MAISON-NEUVE, aujourd'hui c'est une demeure élevée dans un site boisé. L'édifice, constitué d'un étage et d'un comble percé de lucarnes, dont la décoration est typique de la fin du XIXe siècle, est flanquée au sud-ouest d'un pavillon de deux étages au toit à quatre pans en ardoise. Au sud-est, une aile en équerre d'un étage, surmonté d'un comble, se termine au sud, sur la façade principale, par un avant corps percé de fenêtres sur chaque pan. La façade à l'est est ornée par une niche en partie centrale, et abritant une statue en pied. Deux portes-fenêtres flanquent cette élégante niche.                                                                             LA MORALIERE, l'entrée à l'est de la propriété est marquée par deux petites tours jumelles flanquées de deux petits pavillons. On pénètre dans une cour bordée parallèlement par des communs à rez-de-chaussée et étage du XIXe siècle au nord, et par une suite de bâtiments au sud. Le logis est constitué d'un rez-de-chaussée et d'un étage, surmonté d'un grand toit à croupes en ardoise percé d'une grande lucarne à fronton triangulaire. La façade, bâtie en pierre et en moellons, ouverte au sud, côté jardin, à cinq travées régulières. C'est une tour hexagonale de deux étages qui vient l'achever. A l'ouest, un pavillon en saillie, élevé sur deux étages, est surmonté d'un comble à deux pignons sur lequel broche une lucarne. Les tourelles à faux mâchicoulis, les meneaux et traverses de toutes les fenêtres, la corniche également à faux mâchicoulis,","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Maison-Neuve grav-1, la Moralinière grav 2-3.","gps":"","images":["../image/image_86/86_Antran_II_1.jpg","../image/image_86/86_Antran_II_2.jpg","../image/image_86/86_Antran_II_3.jpg"]},"Consult_chateau_formulaire883f":{"id":"Consult_chateau_formulaire883f","dept":"86","canton":"Chauvigny","commune":"Archigny-Bellefonds","nom":"Archigny","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Archigny celui de Talbardières et de Tourne-Poêle à Bellefonds à cinq kilomètres au sud -est                                                                      TALBARDIERES, la première mention du fief, qui relevait de la baronnie de Monthoiron, apparaît en 1512. A partir de la fin du XVIe siècle, la seigneurie s'identifie à la famille Lucas de Vangueil qui occupe d'importants offices de finance à Châtellerault et à Poitiers.","architecture":"TALBARDIERES,  la demeure, située en bordure de la vallée de l'Ozon de Chenevelles, est entourée de nombreuses dépendances et d'une petite chapelle fondée par droit de patronage en 1619 : ses parties hautes ont été reprises mais subsistent les baies d'origine. Le logis, de plan massé, est un bâtiment rectangulaire du XVIIe siècle, flanqué de deux tours carrées d'apparence médiévale, alignées sur la façade antérieure et disposées en retrait du côté du jardin. Le parement des tours s'oppose au petit appareil du corps central. Le couronnement en mâchicoulis des tours, d'un bel effet plastique, répond à une fonction plus féodale que guerrière; en effet seule une bouche-à-feu permettait un tir de flanquement. La façade sur jardin a conservé des ouvertures anciennes.                                       TOURNE POELE, actuel n'a plus grand chose en commun avec le lieu mentionné dès 1581 et dont il a repris le toponyme. L'édifice, au cur d'un magnifique parc, doit sa construction au XIXe siècle et bénéficie de l'art de vivre de l'époque.","habitants":"Famille Lucas de Vangueil \r\n        \"","divers":"Deux châteaux à Archigny 46° 40' 27\" nord, 0° 39' 09\" est. celui de Talbardières grav 1-2 et de Tourne-Poêle grav 3-4 à Bellefonds","gps":"","images":["../image/image_86/86_Archigny_1.jpg","../image/image_86/86_Archigny_2.jpg","../image/image_86/86_Archigny_3.jpg","../image/image_86/86_Archigny_4.jpg"]},"Consult_chateau_formulaired54b":{"id":"Consult_chateau_formulaired54b","dept":"86","canton":"Loudon","commune":"Ceaux-en-Loudon","nom":"Artigny","type":"Château","periode":"XVI","histoire":"Deux châteaux à Artigny celui d'Artigny et de Bois Goulu   à quelques kilomètres au sud  à Pouant \r\nARTIGNY,  première mention  dès 1556  appartenait à Jean Scollin. Au XVIIe siècle, il passa à la famille de La Tremblay, qui vendit Artigny à Charles-August de Mondion en 1697, ses descendants furent seigneurs d'Artigny jusqu'à la Révolution. Vers 1793, Charles-Léopold de Mondion occupait le château et n'émigra pas et à la mort de son père, il en devint propriétaire. Son petit-fils, Armand Maximilien, fit reconstruire, à la fin du XIXe siècle, une grande partie du château. Avec le décès, le 26 juin 1965, de la dernière des de Mondion, Aliette-Marie-Marthe, le domaine sortit de cette famille.                                                BOIS-GOULU, c'était le siège d'un ancien fief relevant de la châtellenie de Pouant et que l'on retrouve mentionné dès le milieu du XVe siècle, le château du Bois Goulu fut la propriété de la famille Coiffier de Ruze.","architecture":"ARTIGNY, le château est composé de deux parties, une ancienne remontant  au XVIe siècle, et l'autre datant de l'important chantier du XIXe siècle. Ces deux constructions se distinguent nettement par leur différence d'élévation; la première étant plus basse que la seconde. La plate forme du château formant un vaste quadrilatère est entourée de douves toujours en eau.                                                                                                     BOIS-GOULU, deux tours carrées aux toits en pavillon couverts de tuiles plates encadrent le beau portail à grille en fer forgé.","habitants":"Artigny; Famille de La Tremblay                                            Bois Goulu; famille Coiffier de Ruze\r\n        \"","divers":"Deux châteaux à Artigny celui d'Artigny grav 1-2 et de Bois Goulu grav 3-4","gps":"","images":["../image/image_86/86_Artigny_1.jpg","../image/image_86/86_Artigny_2.jpg","../image/image_86/86_Artigny_3.jpg","../image/image_86/86_Artigny_4.jpg"]},"Consult_chateau_formulaire99e4":{"id":"Consult_chateau_formulaire99e4","dept":"86","canton":"Civray","commune":"Asnois","nom":"Asnois_Vienne","type":"Château","periode":"XVI-XIX","histoire":"A Asnois: château de Beauregard, de Beuvrie ,de Châteauneuf et de Roche                                                                                               BEUVRIE, il ne reste rien, si ce n'est une tour carrée, qui domine la Charente. Il s'agissait en fait d'une enceinte polygonale protégeant un bâtiment carré divisé en trois pièces. Un méandre du fleuve longeait le château sur presque un demi cercle.                                                                                                               ROCHE, petit château du XIXe siècle dit de Charroux, construit à la demande des familles Cartier-Bresson, Oberthur et Chevrier, longtemps utilisé comme rendez-vous de chasse.\r\nBEUVRIE, il ne reste rien, si ce n'est une tour carrée, qui domine la Charente. Il s'agissait en fait d'une enceinte polygonale protégeant un bâtiment carré divisé en trois pièces. Un méandre du fleuve longeait le château sur presque un demi cercle.\r\n CHATEAUEUF; Château moderne, situé au coeur d'un grand parc arboré.De petites lucarnes égaient une architecture plutôt stricte.                                                                                                                     Mt-LAURIER Cette demeure n'est pas un château, mais plutôt une ferme fortifiée. On retrouve donc des vestiges de fortifications, tels qu'une tour, percée de canonnière, et qui garde une imposante entrée à deux ouvertures.","architecture":"BEAUREGARD, fortifié est construit en un seul jet à la fin du XIVe ou le début du XVe siècle. C'est un quadrilatère flanqué de grosses tours rondes. La tour arrière droite est de dimension plus importante que les autres et semble dater de la construction du château. A l'intérieur, des cheminées à manteau droit porté par des jambages plats et une belle salle voûtée au rez-de-chaussée. Des aménagements intérieurs et des restaurations remontant au XIXe siècle sont bien visibles: lambris, vitraux, crénelages et nouveaux percements. Cette demeure, qui commandait l'accès à la Charente, devait être entourée de fossés à l'origine, subsiste encore les restes d'un pont-levis. La propriété comprend également une magnifique tour-pigeonnier.                                                                   Beauregard Le château est une maison-forte qui semble avoir été bâtie d'un seul jet sans doute dans la seconde moitié du XVIe siècle. Hormis les reprises et ajouts du XIXe siècle, la construction est homogène. En contrebas se trouve la fuye","habitants":"Roche Famille Cartier-Bresson\r\n        \"","divers":"A Asnois: château de Beauregard grav de 4 à 7 de Beuvrie grav 8, de Châteauneuf grav 9  et de Roche grav 1-2-3","gps":"","images":["../image/image_86/86_Asnois_Vienne_1.jpg","../image/image_86/86_Asnois_Vienne_2.jpg","../image/image_86/86_Asnois_Vienne_3.jpg","../image/image_86/86_Asnois_Vienne_4.jpg","../image/image_86/86_Asnois_Vienne_5.jpg","../image/image_86/86_Asnois_Vienne_6.jpg","../image/image_86/86_Asnois_Vienne_7.jpg","../image/image_86/86_Asnois_Vienne_8.jpg","../image/image_86/86_Asnois_Vienne_9.jpg"]},"Consult_chateau_formulaire0bf7":{"id":"Consult_chateau_formulaire0bf7","dept":"86","canton":"Lusignan","commune":"Rouillé","nom":"Augerie","type":"Château","periode":"XIII-XV","histoire":"AUGERIE, bâti au XIIIe siècle pour Guillaume Pouvreau, le château était flanqué de hautes murailles mais il fut détruit pendant la guerre de Cent Ans. En 1585, Pierre Moysen, sieur de La Guyonnière, épouse en secondes noces Françoise Pouvreau, lAugerie passe alors dans la famille Moysen. Charles Moysen fils de Pierre, en devient seigneur et épouse une protestante, Judith de Ladvocat, le lieu servit dasile à la Réforme. Ils prêchaient dans leur château et y célébraient les cérémonies. Lédit de 1577 accordait en effet à tous les seigneurs hauts-justiciers lautorisation du culte dans leurs châteaux. En 1633 le chapitre de Saint-Hilaire de Poitiers accuse Charles Moysen de détourner les eaux de la fontaine de Crieul. Il lui enjoint de faire combler les grands fossés quil a fait creuser tout autour de lAugerie et de démolir le pont-levis quil a fait édifier à lentrée.","architecture":"AUGERIE La maison actuelle est constituée dun corps de logis rectangulaire accolé à deux tours, lune est circulaire couverte dun cône dardoise et lautre est carrée avec un toit en pavillon également en ardoise.","habitants":"Famille de Guillaume Pouvreau\r\n        \"","divers":"Château d'Augerie","gps":"","images":["../image/image_86/86_Augerie_1.jpg"]},"Consult_chateau_formulairefab9":{"id":"Consult_chateau_formulairefab9","dept":"86","canton":"Migné auxances","commune":"Avanton","nom":"Avanton","type":"Château","periode":"XVII","histoire":"AVANTON , en septembre 2000, André et Viviane Youx deviennent les nouveaux propriétaires et réalisent les travaux durgence, avec la reconstruction de laile détruite : nouveau toit, nouveaux étages, plafonds à la française, fenêtres à meneaux et lucarne sculptée sur la face nord vont redonner une nouvelle vie au château. Le château est inscrit au M.H. depuis 1927.","architecture":"AVANTON, bâti sur limmense cave du premier niveau, qui constitue probablement la salle de chapitre dune commanderie des Hospitaliers de l'ordre de Saint-Jean de Jérusalem, le corps central du château est édifié au milieu du XVIe siècle par François Aubert. Le corps de logis principal est surtout remarquable par son pavillon central qui contient lescalier rampe sur rampe et est agrémenté de deux tourelles en encorbellement. Les façades offrent une ordonnance symétrique, éclairées dorigine par des fenêtres à meneaux. La porte dentrée monumentale, décalée du fait de lescalier, est très large, suivant les modèles utilisés sous la première Renaissance, et porte la couleur rouge « cochenille évasée ». Le château a connu deux dommages : un premier en 1869, quand laile nord sécroule, et le deuxième en 1922, quand la même aile est de nouveau détruite par un feu de cheminée.  Il a été complété au XVIIe siècle par des pavillons en retour, et a connu plusieurs étapes de transformation.  Au XVIIIe siècle, des cheminées sculptées ont été ajoutées en même temps que les meneaux ont été en partie supprimés.  Son architecture élancée avec une chambre haute entourée d'échauguettes sur la cour d'Honneur, et des lucarnes sculptées et un escalier florentin sur la partie arrière le font remarquer de loin.Les pavillons XVIIe sont ornés de pots-à-feu et de sculptures au-dessus des fenêtres.  La dernière restauration depuis 2001 a redonné au château son lustre d'antan.","habitants":"André et Viviane Youx \r\n        \"","divers":"Château d'Avanton 46° 39' 49\" nord, 0° 18' 16\" est","gps":"","images":["../image/image_86/86_Avanton_1.jpg","../image/image_86/86_Avanton_2.jpg"]},"Consult_chateau_formulaired8e7":{"id":"Consult_chateau_formulaired8e7","dept":"86","canton":"Vouneuil sous Biard","commune":"Ayron","nom":"Ayron","type":"Manoir","periode":"XV","histoire":"AYRON, la seigneurie d'Ayron, relevait de Montreuil-Bonnin, fief de haute justice, appartenait en 1311 à Guillaume d'Ayron, d'Aimery, maire de Poitiers en 1362, des Rivault, propriétaires entre le milieu du XVe siècle et  XVIe siècle, et de la famille Jouslard, depuis Philippe, maire de Poitiers en 1596, jusqu'à la Révolution. Des démêlés opposèrent l'abbaye de Sainte-Croix et le châtelain qui revendiquait les prérogatives de moyenne et basse justice sur toute l'étendue de la paroisse.","architecture":"AYRON  est un château bâti à Ayron, la construction du château d'Ayron date du 4ème quart du XVe siècle. Le château d'Ayron a été construit sur un site qui domine la Vallée de la Vendelogne. Le logis de forme rectangulaire est défendu par 2 tours rondes, accolées à la façade Sud. Les combles d'origine ont disparu dans un incendie en 1951. Le château d'Ayron possède un beau portail d'entrée avec un arc en accolade. La récente affectation du château en gîte rural a transformé radicalement les intérieurs. Il subsiste des vestiges de l'ancienne entrée fortifiée et des bâtiments de communs, les façades ont été inscrites aux M.H. depuis le 21/12/1999.","habitants":"Famille Jouslard\r\n        \"","divers":"Château d'Ayron    46° 39\" 30,21\" Nord, 0° 04\" 34,79\" Est","gps":"","images":["../image/image_86/86_Ayron_1.jpg","../image/image_86/86_Ayron_2.jpg"]},"Consult_chateau_formulaireb968":{"id":"Consult_chateau_formulaireb968","dept":"86","canton":"Chauvigny","commune":"Chapelle-Viviers","nom":"Beaudinière","type":"manoir- Tour","periode":"XVII","histoire":"CHAPELLE VIVIERS, les vestiges les plus anciens sont ceux du Prieuré du Theil aux Moines, qui dépendait de l'abbaye de Tiron dans le Perche. La tour subsistante faisait partie du logis prieural du XIIe siècle.                                                                                                Le château du Theil au Servant nommé en 1620 comme fief relevant du marquisat de Lussac, est maintenant un édifice composite du début du XIXe, mais il a conservé son moulin (XVIIIe siècle).                                                                                                           Le fief de la Baudinière apparaît dans le cartulaire du Theil aux Moines dès 1500. (Escalier classé).","architecture":"BEAUDINIERE, est mentionné pour la première fois en 1500. La construction actuelle remonte au XVIIe siècle et a été remaniée en 1904. La Beaudinière est constituée d'un corps de logis central cantonné de deux pavillons en retour d'équerre. Entre ces pavillons, le sol forme une terrasse surélevée par rapport à la cour comprise entre deux corps de communs allongés. La façade principale s'élève sur deux niveaux plus un étage de comble à lucarnes à frontons triangulaires. A l'intérieur, les pièces se distribuent à partir d'un vestibule central où se trouve l'escalier à volées droites avec repos intermédiaire. L'étage conserve une cheminée de la seconde moitié du XVIIe siècle. La Beaudinière est une gentilhommière typique des métairies répandues dans le sud-est de la Vienne, l'Indre et le Limousin.","habitants":"Seigneur Locaux\r\n        \"","divers":"Château de Beaudinière et la tour du prieuré à la Chapelle-Viviers","gps":"","images":["../image/image_86/86_Beaudini%c3%a8re_1.jpg","../image/image_86/86_Beaudini%c3%a8re_2.jpg","../image/image_86/86_Beaudini%c3%a8re_3.jpg"]},"Consult_chateau_formulaire747f":{"id":"Consult_chateau_formulaire747f","dept":"86","canton":"Jaunay-Clan","commune":"Beaumont","nom":"Beaumont_86","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Beaumont dont la tour de Beaumont, de Baudiment et de Rouhet.\r\nBAUDIMENT, la famille Baldimento est mentionnée au 1060 dans le cartulaire de Saint Cyprien de Poitiers donnant son nom au lieu. Isabeau de Baldiment épouse en 1362 Jean de Thorue. La seigneurie passe ensuite par mariage aux des Francs puis aux Neufchèze en 1472, pour finir aux mains des La Rochethulon en 1680, qui la conservèrent jusqu'à la fin du XIXe siècle. C'est sans doute aux Neufchèze que l'on doit sa reconstruction dans le dernier quart du XVe siècle. Placé sur une élévation qui domine la vallée de la rive gauche du Clain,                                                          ROUHET, en 1443, Pierre de Combarel reçut l'autorisation de fortifier sa demeure. Après le mariage de sa fille avec Jean de La Béraudière, la propriété resta dans la famille jusqu'au XIXe siècle. Pierre de Combarel, neveu de l'évêque de Poitiers, fut un des compagnons de batailles de Jeanne d'Arc, et fut prisonnier avec elle à Compiègne. Une de ses descendantes, Louise de la Béraudière eut un fils naturel d'Antoine de Bourbon, demi-frère de Henri IV, Charles de Bourbon.                                                                Tour de BEAUMONT Dans la deuxième moitié du XVe siècle, la famille de La Lande, devenue propriétaire de la seigneurie par alliance avec la famille de Brisay, transforma le donjon défensif en demeure confortable, afin de l'habiter. Au XVIIe siècle, le château abandonné par la famille de Neufchèze, seigneur de Baudiment, fut démantelé.","architecture":"BAUDIMENT, se compose dun rez-de-chaussée, dun étage supérieur et de mansardes. Restauré à lintérieur dans le style moderne, il est encore flanqué de trois tours anciennes, lune au nord, carrée, avec mâchicoulis et créneaux, la seconde, au sud, ronde et aussi couronnée de créneaux et de mâchicoulis et la troisième, à louest, octogonale et ornée de créneaux. Sa porte, ogivale en lancette, sert dentrée principale au corps de logis.                                                                                                                       Tour de BEAUMONT  donjon dit de Saint Cyr  a été bâti dans un but défensif, avec des murs de plus de deux mètres d'épaisseur. Une tour carrée hors uvre, contenant un escalier dans une cage octogonale, fut ajoutée. L'encadrement de la porte et les consoles des marches d'escalier sont ornés de sculptures caractéristiques du gothique flamboyant. A l'intérieur, les pièces furent séparées en deux pour plus de confort.  À une centaine de mètres devant la tour de Beaumont se trouve une motte castrale avec un second donjon roman effondré et remblayé. Seul un angle de mur reste visible.                                                                                                               ROUHET, le corps de logis et le donjon subirent des transformations aux XVIe et XVIIe siècles. Charles de Bourbon, qui avait été élevé avec le futur roi de France au château de Pau, fit édifier au Rouhet une tour à créneaux et un escalier sur le modèle de celui de Pau. De cette propriété, il subsiste la tour construite sous Charles de Bourbon et l'aile sud-ouest dite aile Louis XIII.","habitants":"Beaudiment; famille Baldimento                                              Rouhet; Famille de Jean de La Béraudière                                Tour de Beaumont;  famille de Brisay\r\n        \"","divers":"Trois châteaux à Beaumont dont la tour de Beaumont, de Baudiment grav 1-2-3- 4  de la tour  grav  5-6.","gps":"","images":["../image/image_86/86_Beaumont_86_1.jpg","../image/image_86/86_Beaumont_86_2.jpg","../image/image_86/86_Beaumont_86_3.jpg","../image/image_86/86_Beaumont_86_4.jpg","../image/image_86/86_Beaumont_86_5.jpg","../image/image_86/86_Beaumont_86_6.jpg"]},"Consult_chateau_formulaire3cd0":{"id":"Consult_chateau_formulaire3cd0","dept":"86","canton":"Jaunay-Clan","commune":"Beaumont","nom":"Beaumont_86_II","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux dans cet article celui de la Magdeleine  et de Puychevrier.                                                                                                 MAGDELEINE, le bâtiment, complété par un caveau taillé dans la roche, accueille les tombes et les stèles funéraires des Seigneurs successifs de Beaudiment jusqu'au XIXe siècle. Parmi ceux-ci, la chapelle conserve les gisants de Pierre de Nuchèze et Charlotte de Brizay mariés en 1514. Pierre de Nuchèze est mort au combat.                                                                                        PUYCHEVRIER, le fief de Puychevrier apparaît dans les textes dès le milieu du XIIIe siècle. Il relevait de la châtellenie de Beaumont et appartenait au chapitre de Notre Dame la Grande de Poitiers.","architecture":"MAGDELEINE,  l'édifice est une ancienne chapelle funéraire dont la fondation remonterait à la fin du XIVe siècle. Elle présente un important décor néo-gothique du XIXe siècle.                                                           PUYCHEVRIER,  construction attribuable au XVIIIe siècle, le château actuel a grande allure et se trouve très bien entretenu. Il présente un plan en L  à  l'architecture rigoureuse mais ne nuit en rien à son charme. Une toiture à croupes, couverte de tuiles plates, recouvre l'ensemble. Le logis comporte deux niveaux apparents et un sous les combles. Sa façade principale est animée par sept travées de baies légèrement cintrées à appui saillant, quatre d'entre elles étant surmontées d'une imposante lucarne sur façade interrompant l'avant toit. La porte d'entrée à deux battants, est légèrement cintrée. En retour d'équerre, un autre corps de logis vient s'appuyer contre le premier et, dans l'angle, une terrasse a été aménagée. Subsistent à Puychevrier de magnifiques pièces voûtées, probablement d'anciennes salles d'armes.","habitants":"Magdeleine;   Pierre de Nuchèze                                         Puychevrier; châtellenie de Beaumont \r\n        \"","divers":"la Magdeleine  grav   1-2 et de Puychevrier grav 3, et les vestiges  de Rouhet à St-Cyr  grav 4-5-6.","gps":"","images":["../image/image_86/86_Beaumont_86_II_1.jpg","../image/image_86/86_Beaumont_86_II_2.jpg","../image/image_86/86_Beaumont_86_II_3.jpg","../image/image_86/86_Beaumont_86_II_4.jpg","../image/image_86/86_Beaumont_86_II_5.jpg","../image/image_86/86_Beaumont_86_II_6.jpg"]},"Consult_chateau_formulaire276d":{"id":"Consult_chateau_formulaire276d","dept":"86","canton":"Loudun","commune":"Berrie","nom":"Berrie","type":"Château","periode":"XIII-XV","histoire":"BERRIE   à la fin du XIe siècle, Berrie relève de la baronnie de Loudun et donc de l'Anjou. A la mort du dernier seigneur de Berrie, en 1274, il passe aux mains des seigneurs d'Amboise. Ces derniers, également vicomtes de Thouars, conservent la châtellenie jusqu'au milieu du XVe siècle. Elle revient ensuite à la famille de La Trémoille, et après avoir appartenu aux La Trémoille, le château est cédé en 1695 à la famille de Dreux Brézé. Le bâtiment ne subira pas de dommages à l'époque révolutionnaire mais dans la seconde moitié du XIXe siècle, un descendant de la famille de Dreux Brézé fait réaliser d'importants remaniements.","architecture":"BERRIE, a été construit sur une plate-forme ovale entouré d'un fossé dont la contrescarpe est creusée de souterrains et d'habitations troglodytiques. Par des douves sèches, on accède aux vastes caves, dont une hypostyle en rotonde. Des restes de peintures murales du XVe siècle sont conservés dans la chapelle castrale, fondée vers 1200-1250. Les salles du château sont d'époque romane, à voûté brisée et à arc doubleaux. Les salles médiévales sont en piliers, arcatures et silos.\r\n L'ensemble du château et de la parcelle sur laquelle il a été construit ont été classés M.H. le 3 octobre 1997.","habitants":"Famille de La Trémoille,\r\n        \"","divers":"Château de Berrie","gps":"","images":["../image/image_86/86_Berrie_1.jpg","../image/image_86/86_Berrie_2.jpg","../image/image_86/86_Berrie_3.jpg","../image/image_86/86_Berrie_4.jpg"]},"Consult_chateau_formulairef17c":{"id":"Consult_chateau_formulairef17c","dept":"86","canton":"Chasseneuil-du-Poitou","commune":"Bignoux","nom":"Bignoux","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à Bignoux celui de Fromage pas d'historique, de Lirec et de Martin.                                                                                    \r\nLIREC, est désigné comme hameau et bois en 1322. Le fief, relevant de l'abbaye de Saint-Hilaire de La Celle, fut tenu par les Resty jusqu'à la fin du XVe siècle, puis, après 1563, par la famille de Lauzon. De grands travaux furent entrepris de 1624 à 1640 par Christophe de Lauzon qui a \"le tout est aplani et changer de forme pour embellir la dite maison de Lirec\".                                                               MARTIN, il ne subsiste aucune trace de la \"maison de maîstre\" citée en 1791 comme appartenant au sieur de Boislambert. Le domaine est vendu comme bien national en 1794.","architecture":"FROMAGE, la première mention du château date de 1258, cette demeure noble assez modeste, élevée en petit appareil, a été arasée et remaniée. Le bâtiment a subi bien des transformations au cours des temps, le logement secondaire décrit dans un texte de 1798, a été complètement transformé. Il subsiste de château de Fromage un logis de plan rectangulaire, aux angles renforcés de petits contreforts semi-circulaires. La porte est ouverte au rez-de-chaussée, sous un grand arc brisé. L'édifice est actuellement en cours de remaniements.                LIREC, le logis a été très remanié au début du XXe siècle, et le logement des domestiques et l'écurie datent de cette période. Le logis actuel comprend un corps central à trois travées et un étage carré, couvert d'un toit à longs pans à croupes. Il est encadré de deux ailes plus basses, couvertes d'un toit à longs pans à pignon couvert. Une aile en retour, côté cour, s'appuie sur une tour circulaire coiffée d'un toit conique. L'élévation sur parc est précédée d'une terrasse bordée d'une balustrade.                                         MARTIN, les bâtiments actuels ne sont pas antérieurs à la deuxième moitié du XIXe siècle. L'élévation antérieure du logis présente neuf travées : un corps central de 3 travées, couvert d'un toit à longs pans, encadré de deux ailes, de trois travées, formant pavillons, couvert  d'un toit à longs pans en croupes. Les élévations latérales sont à trois travées. La chapelle a sa façade en pignon, percée d'une porte en plein cintre surmontée d'une baie jumelle. Elle est éclairée de trois baies latérales. Les écuries ont des encadrements semi-circulaires en brique.","habitants":"Lirec; Famille de Lauzon.                                                    Martin;sieur de Boislambert\r\n        \"","divers":"A Bignoux le château de Fromage  grav-1 de Lirec grav 2 et de Martin grav-3","gps":"","images":["../image/image_86/86_Bignoux_1.jpg","../image/image_86/86_Bignoux_2.jpg","../image/image_86/86_Bignoux_3.jpg"]},"Consult_chateau_formulairecf28":{"id":"Consult_chateau_formulairecf28","dept":"86","canton":"Migné Auxances","commune":"Blaslay","nom":"Blaslay","type":"Château","periode":"XIV-XVI-XIX","histoire":"Trois châteaux à Blaslay celui de la Chaume, de la Mauvinière et de Tillou.                                                                                                                          La CHAUME  Pas d'historique.                                                                                                                                              MAUVINIERE, est mentionné dès le XIVe siècle et appartient à la famille Fouchier. La propriété passa aux Lestang, seigneurs de Ry qui la vendirent à la fin du XVIe siècle à Pierre de Billi qui la conserva peut de temps, elle fut à la famille de Duguie qui l'occupa jusqu'à la fin du XVIIe siècle.  Le château fut restauré par la famille Labbé au XIXe siècle.                                                                          TILLOU, le fief de Tillou relevait de la prévôté de Blaslay. On le trouve mentionné dès le début du XVIe siècle (1509).","architecture":"La CHAUME, petite place forte à lancienne frontière entre l'Anjou et Poitou, autrefois ferme fortifiée, le château La Chaume, construit au XIVe siècle, présente une façade austère en bel appareillage de moellons. Le corps principal de bâtiment est accolé à une grosse tour circulaire (il possédait quatre tours à l'origine) percée d'archères. Le toit pointu dorigine a été remplacé, comme ce fut souvent le cas, par un toit plat pentu.                                                                                            MAUVINIERE, la partie ancienne, au sud, malgré les remaniements, présente une belle façade avec une grande lucarne à pignon sculpté, et est précédée dune terrasse à balustrade ajourée. Deux tours, l'une ronde, l'autre carrée, sont percées d'archères canonnières à orifice rond et embrasure carrée. Sur le faîtage deux girouettes en ferronnerie. Côté ouest sur cour, la porte d'entrée de la tour carrée est en anse de panier. En retour d'équerre, au nord, un bâtiment, scandé de trois travées de baies à meneaux est couvert un toit d'ardoise à croupes. Au XIXe siècle fut ajouté un bâtiment plus grand présentant les mêmes fenêtres à meneaux que loriginal.                                       TILLOU, le corps de logis profondément modifié, présente quelques vestiges anciens. Cette demeure, flanquée dune tour semblable à celle du château de La Chaume, est malheureusement en train de sécrouler. Le bâtiment est visible de la route.","habitants":"Mauvinière ; famille Fouchier\r\n        \r\n        \"","divers":"Blaslay;  46° 44' 12\" nord, 0° 14' 44\" est.                                          vestiges de Chaume grav 1-2-3 Mauvinière grav-4-5, Tillou grav 6.","gps":"","images":["../image/image_86/86_Blaslay_1.jpg","../image/image_86/86_Blaslay_2.jpg","../image/image_86/86_Blaslay_3.jpg","../image/image_86/86_Blaslay_4.jpg","../image/image_86/86_Blaslay_5.jpg","../image/image_86/86_Blaslay_6.jpg"]},"Consult_chateau_formulairef65a":{"id":"Consult_chateau_formulairef65a","dept":"86","canton":"Chasseneuil-du-Poitou","commune":"Lavoux","nom":"Bois_Doucet","type":"Château","periode":"XIV-XVI","histoire":"BOIS DOUCET, en 1522 François Milcendeau est seigneur du lieu. En 1603, le domaine passe aux Rogiers. La date 1610 sur l'aile nord du logis indique l'aménagement des baies sur la cour, dans le goût de la Renaissance. En 1635, la famille de Resty est propriétaire du château et le conservera jusqu'au XVIIIe siècle. Au début du XIXe siècle, Madame de Menou, fille du marquis de Vitré (famille de Resty) vend Bois-Doucet au général baron Meunier, grand-père de M. De Monmartin.  Aujourd'hui chambre d'hôtes par la famille Getten.","architecture":"BOIS DOUCET, le logis du château du Bois-Dousset appelé aussi château du Bois-Doucé est un château bâti à Lavoux,    sa construction date du XIVe au XVIe siècle, se présente un plan en U. Le corps central, à l'ouest, se compose d'un sous-sol, d'un étage carré et d'un étage de comble avec toit à longs pans à croupes et sa façade est ordonnancée. L'aile contient l'escalier en pierre avec son toit à l'impériale. L'aile nord, composée de caves, d'un étage carré et d'un comble à surcroît a un toit à longs pans et une élévation sur cour à travées, il a été agrandi au XVIIe siècle et se trouve entouré de douves. Le château du Bois-Doucet comprend une aile de style Renaissance, avec des ouvertures richement ornées. Son corps de logis, de style plus classique, abrite un bel escalier de pierre. Les portes du rez-de-chaussée sont plaquées de pilastres qui supportent, au-dessus de l'architrave, un fronton sculpté,inscrit aux M.H. en 1966.","habitants":"Famille de Resty\r\n        \"","divers":"Lavoux château de Bois-Doucet 46° 35' 18\" Nord et 0° 29' 57\" Est","gps":"","images":["../image/image_86/86_Bois_Doucet_1.jpg","../image/image_86/86_Bois_Doucet_2.jpg"]},"Consult_chateau_formulaireaa93":{"id":"Consult_chateau_formulaireaa93","dept":"86","canton":"Montmorillon","commune":"Bois-Morand-Antigny","nom":"Boismorand","type":"Château","periode":"XV","histoire":"BOISMORAND, appelé aussi château de Bois-Morand est un château bâti au lieu-dit de Bois-Morand, à Antigny, la construction du château de Boismorand date de 1470 à 1490 puis au XIXe siècle, pour Jean de Moussy, Seigneur de La Contour.","architecture":"BOISMORAND, le logis qui date du XVe siècle, était défendu, à lOuest, par 3 tours rondes, et à lEst, par une tour ronde en avancée. Le bâtiment rectangulaire hors uvre abrite la chapelle gothique.  Ses peintures murales datent du XVIe siècle et ornent l'oratoire. Elles sont classées par liste de 1862 et par arrêté du 18/10/1913. Les deux ailes des communs avec leurs dispositifs intérieurs, à l'exception toutefois de la tour ronde sise dans la cour d'honneur ; les jardins avec leurs fabriques (orangerie, château d'eau sont inscrits aux M.H. le 22 juin 1994. Les anciennes serres et les jardins à la française ont été aménagés à la fin du XIXe siècle. Le logis en totalité, la tour, le mur d'enceinte ainsi que la parcelle P318 sur laquelle ils se situent sont inscrits aux M.H.le 12/12/2002. Au fil des siècles, le château de Boismorand et ses annexes ont étés rénovés, modifiés, tout en restant dans son charme d'antan. Le château est classé aux M.H. Il appartient à une société privée.","habitants":"Famille de Jean de Moussy\r\n        \"","divers":"Boismorand : 46° 32' 09\" Nord, 0° 51' 17\" Est","gps":"","images":["../image/image_86/86_Boismorand_1.jpg","../image/image_86/86_Boismorand_2.jpg","../image/image_86/86_Boismorand_3.jpg"]},"Consult_chateau_formulaire5c61":{"id":"Consult_chateau_formulaire5c61","dept":"86","canton":"Chasseneuil du Poitou","commune":"Bonnes","nom":"Bonnes_86","type":"Château","periode":"XIII-XIV","histoire":"Trois châteaux à Bonnes , la Tour d'Ardennes, Loubressay et Touffou (voir article)                                                                                               TOUR ARDENNES  Les origines de ce donjon de plaine sont mal connues. Il est généralement rattaché à la seigneurie de Loubressay et daterait du XIIe siècle. Il a été remanié au fil du temps et est devenu une habitation rurale. Bâtiment de plan carré irrégulier : les côtés font de 8 à 10 mètres. Il est cantonné de tours pleines semi-circulaires faisant office de contreforts. Un souterrain refuge, \r\nLOUBRESSAY   Le fief, qui dépendait de la baronnie de Chauvigny, est mentionné dès 1310, mais la construction actuelle incombe à la famille de La Barre, propriétaire des lieux de 1699 à 1817. Deux dates gravées 1715 et 1720, ainsi qu'une inscription désignent le commanditaire, Ernest Joseph de La Barre. L'édifice se développe sur une longueur de 47 mètres, entre une cour d'honneur et une cour arrière bordée de dépendances. Les tours d'angle, où figuraient les armes des Couhé, à la tête du domaine entre 1563 et 1662, ont été partiellement conservées. De même, subsiste le portail percé dans le mur de la cour des communs, deux portes piétonnes à fronton cintré flanquant une grande porte à fronton coupé, où se lisait la date de 1520, époque à laquelle la famille de Marans détenait la seigneurie.Aujourd'hui résidence secondaire du général  de Flavian de Brosssia.","architecture":"TOUR d'ARDENNES   composé de deux pièces reliées par des galeries, est pratiqué dans son sous-sol. L'extérieur et l'intérieur ont été remaniés à l'époque ou l'on a fait de cette petite forteresse du moyen-âge une maison d'habitation au milieu du XIXe siècle. Primitivement, il n'y avait d'ouverture à l'étage inférieur qu'une porte ogivale, maintenant murée, au nord, et des meurtrières. Autrefois, ainsi que l'indique l'existence de vieilles baies dans le haut, la tour n'était pas seulement un lieu de refuge mais une demeure féodale.                                                                                                           LOUBRESSAY Le château est au centre de parcelles rayonnantes autour de lui et formant une sorte d'ovale. Le logis, appuyé de tours sur l'élévation ouest, occupe la partie occidentale d'une cour rectangulaire fermée de murs adossés de bâtiments. A l'est se développe un long bâtiment qui possédait deux tours rondes à ses extrémités. Au sud, un bâtiment implanté en biais abrite un cellier et une bâtisse plus petite avec escalier extérieur, devant laquelle se trouve un puits. La cour est fermée au nord par un mur au centre duquel s'ouvre une grande porte flanquée de deux portes plus petites. L'édifice s'élève sur deux niveaux : rez-de-chaussée et étage de comble. Le rez-de-chaussée est rythmé de onze portes-fenêtres et fenêtres. L'étage sous toit à pans brisés est éclairé par onze lucarnes à pignons alternativement triangulaires ou trilobés. L'élévation est est plus sobre. Son alignement n'est interrompu que par l'escalier hors-oeuvre placé au centre de la composition. Sept baies au rez-de-chaussée sont sommées de lucarnes à frontons-pignons triangulaires. Un appendice a été ajouté au XIXe siècle contre le mur nord de la cage d'escalier. A l'intérieur, la salle principale est ornée de panneaux et de niches en stuc.","habitants":"Famille de La Barre\r\n        \"","divers":"A Bonnes la tour d'Ardennes et Loubressay grav 2-3","gps":"","images":["../image/image_86/86_Bonnes_86_1.jpg","../image/image_86/86_Bonnes_86_2.jpg","../image/image_86/86_Bonnes_86_3.jpg"]},"Consult_chateau_formulaire53fe":{"id":"Consult_chateau_formulaire53fe","dept":"86","canton":"Chauvigny","commune":"Bonneuil-Matours","nom":"Bonneuil_Matours","type":"Château","periode":"XIX","histoire":"Deux châteaux à Bonneuil-Matours, Crémault et Marièville.                                                 CREMAULT, ancien fief de haute justice relevant de La Tour-Maubergeon, Crémault est attesté en 1522. Les Montléon, seigneurs de Touffou, tenaient le fief de Crémault, puis passa aux Chasteigner de La Roche Posay. Après avoir à nouveau changé de mains pour aboutir aux de Bessay, la terre fut érigée en comté au XVIIe siècle. Inhabitée lors de la Révolution.                                     MARIEVILLE, château représentatif du Second Empire, édifié en 1855 par l'architecture Lubac, ferme modèle en 1874. Il a été construit pour madame Laurence, fllle du maire de Poitiers, Diverses signatures relevées sur les plafonds peints signalent ses décorateurs: Lachaise père et fils, peintres en 1864, et les Flondins.","architecture":"CREMAULT,  l'habitation très humide fut utilisée comme salpêtrerie, l'époque troublée ayant créé de très gros besoins de poudre. Crémault est un très bel exemple de gentilhommière poitevine de la première moitié du XIXe siècle, assise près de la Vienne, avec cour, au milieu d'un large parc et comportant de nombreuses dépendances. Le corps de logis principal rectangulaire au toit d'ardoise à deux pans est encadré de deux ailes, formant pavillon, aux toits d'ardoise en croupe. Une terrasse a vraisemblablement été ajoutée sur la façade donnant sur la Vienne. L'élément le plus intéressant est le monumental portail d'entrée de la cour d'honneur. Ce portail se trouvait à l'origine au château de Traversay, puis a été transféré, à une date inconnue, au château de Crémault lorsque ces deux édifices appartenaient au même propriétaire.                                                                                                                        MARIEVILLE. Bâti en tuffeau dans un style évoquant la Renaissance, le plan rectangulaire est cantonné de quatre tourelles d'angles. Une importante sculpture orne les élévations, surtout à l'ouest. Le décor sculpté est fait de rinceaux, fruits, têtes, palmes, coquilles, masques, animaux.","habitants":"Crémault  Famille des Montléon                                  Marièville, Madame Laurence\r\n        \"","divers":"Crémault grav 1-2-3 46° 40' 57\" Nord, 0° 34' 17\" Est                             Marièville grav 4-5","gps":"","images":["../image/image_86/86_Bonneuil_Matours_1.jpg","../image/image_86/86_Bonneuil_Matours_2.jpg","../image/image_86/86_Bonneuil_Matours_3.jpg","../image/image_86/86_Bonneuil_Matours_4.jpg","../image/image_86/86_Bonneuil_Matours_5.jpg"]},"Consult_chateau_formulaire0641":{"id":"Consult_chateau_formulaire0641","dept":"86","canton":"Montmorillon","commune":"Bourg-Archambault","nom":"Bourg_Archambault","type":"Forteresse","periode":"XIII-XV","histoire":"A  5 kilomètres à l'Est à Brigueil la Chantre le château de Mareuil.                                                                                                                 BOURG-ARCHAMBAULT, est un château bâti à Bourg-Archambault,  les deux logis seront réunis par Pierre de Sacierges, évêque de Luçon, seigneur des lieux à partir de 1494. Un premier édifice du XIIIe siècle, aujourdhui rasé, a été remplacé par la forteresse actuelle à partir de 1478 grâce à Poncet de Rivière, chambellan de Louis XI. Au milieu du XIXe siècle, le château est acheté par la famille Augier de Crémiers qui fera restaurer lensemble et ajouter les trois tours de façade.                                                                                                                          MAREUIL, date du XVe siècle. Il a été restauré au XIXe siècle. C'est un ancien fief relevant de la baronnie de Montmorillon. Le château domine la vallée de l'Asse, comme l'ancienne forteresse de Peutro ou le château ruiné de Fleix. ces forteresses construites à la fin du Moyen Age sont un témoignage du climat d'insécurité lié à la position frontalière de Brigueil entre le Poitou anglais et la Berry français, à la guerre de Cent Ans et à la présence des Grandes Compagnies.   Aujourd'hui Chambres d'hôtes","architecture":"BOURG-ARCHAMBAULT, très bien conservé, est constitué de 2 parties: l'une médiévale et l'autre plus récente, entourées de douves. Le château est composé d'une enceinte flanquée de tours, d'un châtelet d'entrée et d'un logis très restauré, qui date du XIXe siècle. Le château de Bourg-Archambault actuel a été construit, pour Poncet de Rivière, Chambellan du roi de France Louis XI, sur l'emplacement d'un ancien édifice, rasé. Le château a été construit en 1478. L'enceinte, de plan trapézoïdal, occupe un terre-plein ceint de douves. Au Nord, le châtelet d'entrée était jadis protégé par un double pont-levis et une ligne de mâchicoulis. Aux quatre angles de l'enceinte, s'élève une tour pourvue de canonnières, élément militaire repérable aussi sur les deux tours du châtelet. Le système de défense est remarquable grâce à une enceinte élevée au XVe siècle et flanquée de six tours. Se dresse sur la façade sud, deux logis : l'un résidentiel situé à l'est, et l'autre, militaire, fut construit à l'ouest. Ce dernier communiquait par un pont-levis avec la Tour Sud-Ouest, isolée, qui servait de donjon, a été classé aux M.H. en 1986, pour ses parties anciennes, le reste a été classé, aux M.H. en 1927.                                                                                                        MAREUIL, Brigueil-le-Chantre est un ancien bourg fortifié dont subsistent deux portes du XIVe siècle et la base d'un donjon carré du XIIe siècle dont le haut s'est effondré au XVIIIe siècle.  Il est possible de voir les restes du château du XVIIe siècle avec une tour couverte de bardeaux. C'est une technique de couverture dont il ne subsiste que peu d'exemples.","habitants":"Famille Augier de Crémiers \r\n        \"","divers":"Bourg Archambault; 46° 23' 00\" Nord, 1°00' 13\" Est                           Mareuil  grav-6-7","gps":"","images":["../image/image_86/86_Bourg_Archambault_1.jpg","../image/image_86/86_Bourg_Archambault_2.jpg","../image/image_86/86_Bourg_Archambault_3.jpg","../image/image_86/86_Bourg_Archambault_4.jpg","../image/image_86/86_Bourg_Archambault_5.jpg","../image/image_86/86_Bourg_Archambault_6.jpg","../image/image_86/86_Bourg_Archambault_7.jpg"]},"Consult_chateau_formulaire4c57":{"id":"Consult_chateau_formulaire4c57","dept":"86","canton":"Loudun","commune":"Bournand","nom":"Bournand","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Bournand la Motte Chandeniers et Esternes  à cinq kilomètres à Saix                                                                                                 ESTERNES, la première mention du château date de 889. Les archives montrent que le château appartenait aux chanoines de Saint-Hilaire en 942, au prieuré de Saint-Ladre en 1379, puis à l'abbaye de Fontevrault en 1467. En 1881, le général Delaveau s'installe au château d'Esternes et lui apporte des modifications architecturales. De nos jours, la propriété appartient à la famille Marteling, qui a également reconstitué le vignoble.                                            A l'ouest de loudun; la MOTTE-CHANDENIERS, c'est au milieu d'une grande masse de bois que s'élève le château, ancien fief qui relevait du roi. Dès le XIIIe siècle cette seigneurie, appelée la Motte de Bauçay était possédée par l'illustre famille de Bauçay. A la mort de Marie de Bauçay le château de la Motte fut attribuée à Jean de Rochechouart puis possédée par François de Rochechouart. En 1668, ruiné, à bout de ressources, il dut l'abandonner à ses créanciers, qui le vendirent à Marie de Rochechouart, sa sur. Elle ne le garda pas longtemps et le vendit à Nicolas de Lamoignon, seigneur de Basville dont le fils Guillaume-Urbain de Lamoignon, comte de Courson, était engagiste de Loudun. Détruit à la Révolution, quand François Hennecart le racheta en 1809.","architecture":"ESTERNES,  de plan en U à un et deux niveaux pavillons en angles à toits deux pans et fenêtres jumelées au premier étages  Pavillons d'entré saillant avec  mâchicoulis  et lucarne centrale à fronton triangulaire ainsi que sur les deux autres lucarnes accolés à ce pavillon, tourelle centrale et une imposante tour ronde crénelée à mâchicoulis  à trois niveaux  défini par des cordon et fenêtres à meneau.                                                                                                     Motte CHADENIERS, détruit à la Révolution, le château primitif était ruiné. Il entreprit de le restaurer et de lui redonner sa splendeur passée. Le domaine qui l'entoure fut aussi aménagé. Malheureusement il ne reste plus que les murs car il fut détruit par un incendie en 1932.","habitants":"Motte -Chadeniers; Jean de Rochechouart                            Esternes; famille Marteling\r\n        \"","divers":"Château d'Esternes à Bournand et de la Mothe Chandeniers","gps":"","images":["../image/image_86/86_Bournand_1.jpg","../image/image_86/86_Bournand_2.jpg","../image/image_86/86_Bournand_3.jpg","../image/image_86/86_Bournand_4.jpg","../image/image_86/86_Bournand_5.jpg","../image/image_86/86_Bournand_6.jpg","../image/image_86/86_Bournand_7.jpg","../image/image_86/86_Bournand_8.jpg"]},"Consult_chateau_formulaire9e8d":{"id":"Consult_chateau_formulaire9e8d","dept":"86","canton":"Châtellerault-3","commune":"Vicq sur Gartempe","nom":"Brosse_Vicq","type":"Château","periode":"XV6XVI","histoire":"BROSSE, les premières mentions faites du fief de La Brosse remontent à 1532. Le premier seigneur connu est René de Grailly, seigneur de La Brosse vers 1581. Le château passa ensuite à la famille de Verdillac jusqu'en 1694, date à laquelle la petite-fille du sieur de Verdillac épousa Louis le Picard de Philippeaux, cette famille conserva la propriété jusqu'à la Révolution, puis elle fut vendue comme bien national à Anne Fleury, femme Legrand.","architecture":"BROSSE,  le château et ses dépendances sont situés en plein   champ, sur le plateau qui domine les vallées de l'Anglin et de la Gartempe, de plan rectangulaire couvert d'une toiture à croupes en tuiles plates. Il est flanqué au sud d'une tour circulaire coiffée d'une poivrière, jouxtant un mur de clôture perpendiculaire, dans lequel est percé un portail double. Cette tour reçoit une bretèche de pierre et on y voit des archères canonnières pouvant dater du XVe siècle. Elle peut constituer le seul souvenir d'un château fortifié du Moyen-Age.","habitants":"Famille de René de Grailly\r\n        \"","divers":"Château de la Brosse","gps":"","images":["../image/image_86/86_Brosse_Vicq_1.jpg","../image/image_86/86_Brosse_Vicq_2.jpg","../image/image_86/86_Brosse_Vicq_3.jpg"]},"Consult_chateau_formulairec981":{"id":"Consult_chateau_formulairec981","dept":"86","canton":"Lusignan","commune":"Brux","nom":"Brux","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Brux celui d'Epanvilliers de  de Chéméraux,  de Morcière et de Raffinière.                                                                                                                                         EPANVILLIERS, a été construit au XVIe siècle par la famille Montalembert d'Essé  et a été remanié par la famille de Tryon au XVIIIe siècle, style Louis XIV, il est resté la propriété des descendants de Gabrielle de Montalembert, début du XVIe siècle, jusqu'au début du XIXe siècle. Achat d'une partie du château par Mr Jean René Lorzil (Instituteur) en 1974, restauration de l'intérieur, ouverture au public, introduction des classes du patrimoine et revente de toutes les parties assemblées, en 1995, à Mr Rordorf. En 2012, établissement d'un Musée du jeu ancien par Mr Berchtold Rordorf propriétaire depuis 1995. La restauration du château d'Epanvilliers a été réalisé par l'actuel propriétaire.                                                                                    MORCIERE, à été édifié par Louis-Sincère Auguy, chef de bataillon, vers le milieu du XIXe siècle. Son fils, Henri Auguy, premier conseiller général du canton de Couhé, lui succédera avant que le château ne soit cédé, en 1903 à M. Chauveau, notaire à Poitiers.                                                                                                    RAFFINIERE, Famille Rivaud de la Raffinière Olivier Macoux Rivaud né au château de la Raffinière le 2 août 1875, décédé le 16 octobre 1938 à Paris. Il présida notamment, la société financière des caoutchoucs fondée par Rivaud frères. Il est nommé en décembre 1929, par la quasi-unanimité de ses collègues, président du syndicat de la Coulisse, et des banquiers en 1931.","architecture":"EPANVILLIERS, du  XVIIe siècle-XVIIIe siècle a été édifié vers 1530, le corps de logis principal de plan rectangulaire à neuf travées, trois niveaux avec série de mansardes doucement arrondies sur comble, toit brisé à la mansart  accolé aux extrémités de pavillons carrée à quatre niveaux, lucarnes sur toit brisés.                                                                                              CHEMERAULT,  du XVe-XVIe siècle, un premier édifice rectangulaire au nord, flanqué d'une tour au sud, cette aile presque détruite a dû être reconstruite en partie à la fin du XIXe siècle ou au début du XXe siècle. Un deuxième bâtiment a été plaqué à l'est, en retour d'équerre, d'une tour à demi ruinée au sud-ouest et d'un portail d'entrée classique. La façade orientale est divisée en deux travées séparées par trois fenêtres superposées, moulurées et à meneau et traverse en pierre. La façade occidentale, moins homogène, est percée d'ouvertures différentes, dont une fenêtre avec moulures en réemploi. Elle est flanquée, vers le nord, de la tour d'escalier en moellon à demi arasée.                                                                                               MORCIERE, l'édifice de plan en U, est caractéristique des constructions du Second Empire, deux bâtiments rectangulaires pourvus de toits d'ardoise à croupes sont reliés par un 3 ème dont le toit en terrasse est doté d'une balustrade de pierre. Les deux angles sont cantonnés de tours rondes à poivrière d'ardoise. Deux pavillons jouxtent les extrémités des deux corps principaux. Diverses constructions à usage de dépendances, une serre originale et un très beau et vaste parc complètent la propriété.","habitants":"Epanvilliers; Famille Montalembert                                       Morcière; Louis-Sincère Auguy\r\n        \"","divers":"Quatre châteaux à Brux celui d'Epanvilliers grav 1-2  de Chéméraux grav-3,  de Morcière grav-4 et de Raffinière grav-5                                                                                                      Brux: 46° 15' 23\" Nord et 0° 11' 24\" Est","gps":"","images":["../image/image_86/86_Brux_1.jpg","../image/image_86/86_Brux_2.jpg","../image/image_86/86_Brux_3.jpg","../image/image_86/86_Brux_4.jpg","../image/image_86/86_Brux_5.jpg"]},"Consult_chateau_formulaire03ab":{"id":"Consult_chateau_formulaire03ab","dept":"86","canton":"Vouneuil sous Biard","commune":"Béruges","nom":"Béruges","type":"Château","periode":"XII-XVII-","histoire":"Quatre châteaux dans cet article concernant Beruges dont celui de Béruges, d'Epinay de Raudières , de Raudières Montcorbin et Visais dans article suivant pour ces trois derniers.                                                                                BERUGES, il existe plusieurs châteaux à Béruges. Cest le plus connu car il est le plus proche du bourg, au nord. Il date du XVIIe mais surtout du XVIIIe. Cest un bâtiment rectangulaire avec quatre niveaux coté vallée avec toits multiples et échauguettes. Vendu en 1792 comme bien national et subit une dernière transformation en 1876.    \r\nEPINAY,  est mentionné dès 1324. Il s'agit d'une ancienne dépendance de l'abbaye de Fontaine le Comte. Le premier seigneur mentionné est Jean de la Fontaine en 1638. Le château est plus tardif, il a été construit en 1856. Puis le général Martineau fait ajouter deux ailes au logis et construit une buanderie et une sellerie, en 1873 et 1874.                                                        La RAUDIERE, le premier seigneur connu de la Rouhaudière, vers 1449, est Jacques de Puyloyer, époux de Catherine d'Authon, soeur du seigneur de Béruges. Une inscription gravée sur un linteau de la porte indique que M. Thévenet a fait édifier la demeure en 1641. Il subsiste de cette époque les parties basses du logis et le pigeonnier. En 1652, René de La Fontaine, maire de Poitiers et seigneur de l'Epinay en est propriétaire. En 1675, le domaine est acquis par l'avocat René Penin. Vers 1850, Ferdinand Lacroix propriétaire depuis 1838.","architecture":"TOUR de BERUGES, connue depuis 1125 la tour était en possession du puissant Hugues X de Lusignan, comte de la Marche. Celui-ci sétant rebellé contre son suzerain Alphonse comte du Poitou et frère du roi Louis IX  larmée royale encercla la tour, la prit et la démantela en mai 1242.  Cest une petite construction militaire de 15 à 20 m de long à cinq côtés, avec un puissant éperon triangulaire. Face au village deux tours encadrent lunique entrée de la forteresse qui comprenait deux niveaux couverts et sans doute une terrasse au sommet. \r\nEPINAY, logis de plan symétrique à cinq corps de bâtiments: un corps central et deux ailes à un étage avec toit en croupe, couvert d'ardoise et de part et d'autre des ailes en rez-de-chaussée avec étage de comble et toit à longs pans brisés. La façade de la partie centrale présente 3 travées et une porte centrale. Les communs et les dépendances sont séparés au nord et au sud. En contrebas du parc, en bordure de la Boivre, se trouve une noria qui, actionnée par un animal de trait, permettait de faire monter l'eau.                                                                                               RAUDIERES, il date de 1641 et fut complètement achevé vers 1850. Le bâtiment dhabitation est bordé des deux cotés par des écuries se faisant face et terminées par un pavillon.Cet espace est clos par des douves sèches et une grille du XIIIe siècle. Vers 1850, fut  bâtie des pavillons aux extrémités, rehausser la partie centrale du logis et édifier une nouvelle chapelle dans le style néo-gothique. La cour d'honneur est ainsi allongée et son côté sud bordé par un saut-de-loup avec un portail au centre.","habitants":"Epinay; Jean de la Fontaine\r\n        \"","divers":"A Béruges  celui  de Béruges grav-2, d'Epinay grav-3 de Raudière grav- 1","gps":"","images":["../image/image_86/86_B%c3%a9ruges_1.jpg","../image/image_86/86_B%c3%a9ruges_2.jpg","../image/image_86/86_B%c3%a9ruges_3.jpg"]},"Consult_chateau_formulaireac14":{"id":"Consult_chateau_formulaireac14","dept":"86","canton":"Vouneuil sous Biard","commune":"Béruges","nom":"Béruges_II","type":"Château","periode":"XV-XVII","histoire":"COMMANDERIE,  le fief de Grand Boussay, qui relevait de la seigneurie de Béruges, aurait été donné par Guillaume de Belon aux moines de l'abbaye de Fontaine-le-Comte à la fin du XIIe siècle.   Dans la deuxième moitié du XVIIe siècle le propriétaire, Jean Pénin, avocat à Poitiers, possède également la Raudière. A la Révolution le domaine est vendu comme bien national.  En 1889, la Commanderie est restaurée par Eugène Boyer (inscription portée sur un vitrail), architecte à Poitiers, à la demande de Gabriel Lacroix, également propriétaire de la Raudière. De 1912 à 1914 Adrien Auteroche fait agrandir l'édifice vers l'ouest dans le même style.                                                  MONTCORBIN, le site du Mont, dominant les vallées de la Boivre et de la Torchaise, était occupé dès l'époque gallo romaine. Dans la falaise, des cavités creusées dans la roche ont pu servir d'abri à diverses périodes. Le fief du Mont relevait de la châtellenie de Montreuil-Bonnin et de la seigneurie de Béruges. Le premier seigneur connu est Jehan Rossignol, écuyer et seigneur du Mont en 1407.                                                                        VISAIS, en 1366, Visais dépendait de la seigneurie de Béruges. Jean de Morière, seigneur du Verger, possédait un hôtel à Visais lorsqu'il fut nommé maire de Poitiers en 1784. Le 17 mai 1791, lors de l'adjudication des biens nationaux, il acquiert les terres alentour qui appartenaient aux chanoines de Saint Hilaire. En 1808, sa fille, Jeanne-Alexandrine épousa François-Marie-Claude Tudert dont les descendants  possèdent toujours le domaine.","architecture":"COMMANDERIE  Il se compose d'un logis à plusieurs corps de bâtiments et de communs séparés, perpendiculaires au sud ouest, la façade sud du logis s'élève sur trois niveaux et présente quatre travées avec quatre lucarnes au niveau du toit. A l'angle sud-est, une tour d'escalier hexagonale, percée de trois fenêtres, est adossée. Dans l'angle formé par ce décrochement s'élève une tour d'escalier de plan rectangulaire. Dans la partie ancienne, deux travées d'ouvertures, une dans la partie centrale et deux dans la partie ouest comportant des lucarnes.                                                                                                      MONTCORBIN, hôtel noble du Mont est cité en 1485, il s'agit  de l'ancien logis (détruit) qui bordait jadis la cour à l'ouest et qui figure encore sur le plan cadastral de 1830, encadré par deux corps de bâtiments moins profonds, celui du nord flanqué d'une tour d'angle. Au XIXe siècle, les propriétaires successifs de la demeure font construire et agrandir le nouveau logis.                                                                            VISAIS. en 1830 des bâtiments autour d'une cour fermée, à l'ouest de laquelle plusieurs bâtiments annexes parmi lesquels un four à chaux et des logements. L'ensemble a été reconstruit dans la seconde moitié du XIXe siècle.  Le logis est constitué de plusieurs corps de bâtiment à un étage, recouverts de toits en ardoise dans lesquelles se trouvent des lucarnes. Le corps principal est encadré par des ailes dissymétriques. Son élévation sud-est présente un avant-corps central saillant, à toiture indépendante dans lequel ouvre la porte. Dans l'angle Est se trouve une chapelle à chevet polygonal surmontée d'une flèche. Contre les ailes sud-ouest se trouve une tour ronde à trois niveaux d'ouvertures, couverte d'un toit conique.","habitants":"Commanderie ; Eugène Boyer                                            Montcorbin; Jehan Rossignol,                                                 Visais; Jean de Morière\r\n        \"","divers":"Béruges ; Commanderie grav 1. Montcornin grav 2-3 Visais grav 4-5","gps":"","images":["../image/image_86/86_B%c3%a9ruges_II_1.jpg","../image/image_86/86_B%c3%a9ruges_II_2.jpg","../image/image_86/86_B%c3%a9ruges_II_3.jpg","../image/image_86/86_B%c3%a9ruges_II_4.jpg","../image/image_86/86_B%c3%a9ruges_II_5.jpg"]},"Consult_chateau_formulairecb61":{"id":"Consult_chateau_formulairecb61","dept":"86","canton":"Lusignan","commune":"Celle-l","nom":"Celle_Levescault","type":"Château","periode":"XII-XVI","histoire":"A deux kilomètres de Lusignan à la Celle l'Evescaut château de la Livraie . La tour de guet est le seul vestige de l'ancien château épiscopal. Château de Lavau, dont la porte est inscrite comme M.H depuis 1935.  la Grange et Mauprié (voir article).                                                                                                                                                                                      CELLE-VEZAIS, une habitation existait sur le site, daprès les textes, le 18 mai 1698 fut enterré Achille de Labarde, notaire de la baronnie de Celle lEvescault, décédé en la maison seigneuriale de Cellevezais. Ensuite le domaine passe par alliance à la famille Bellot et depuis la propriété appartient toujours à cette famille. Cest Emile Bellot qui fit bâtir l'actuel château. En 1860, il entreprend de gros travaux de construction, achevés plus tard par son fils Roger. Pendant la deuxième guerre mondiale, il sera très endommagé et des aménagements auront lieu dans les années 1950.                                                             LIVRAY, il relève alors du fief de la Gralière, dépendant de la châtellenie de Lusignan. C'est de cette époque que datent les fondations de la demeure actuelle et fut érigée durant le XVIIIe siècle. Vers 1765, on lui ajouta un étage ainsi qu'une première aile droite, la deuxième ne fut construite que plus tard. Cette construction fut terminée au XIXe siècle.                                                                                                                                                            LUSIGNAN,  est probablement l'un des plus grands châteaux forts construits en France. Il fut le siège des seigneurs de Lusignan dont des membres de la famille furent roi de Chypre et de Jérusalem notamment Amaury II de Lusignan. En 1308, le château passe dans le domaine royal. A la fin du 14e siècle, travaux réalisés par Jean de Berry,  qui se poursuivent jusqu'en
