deux ailes en retour se terminant par des pavillons; celui de gauche abrite la chapelle aux baies néo-Renaissance.                                          PIOLANT, Le château, à deux logis parallèles qui en font un ensemble massé, est une construction du XVIIe siècle basée sur une ancienne forteresse, il est cantonné aux angles de quatre pavillons. Le logis principal du XVIIe siècle, de deux niveaux, couvert d'un grand comble à la française. La façade opposée sur la cour d'entrée, présente un avant-corps de deux travées qui en marque l'axe. Une tourelle engagée restant de l'ancienne forteresse se trouve sur la façade nord.","habitants":"Fontaine;  famille de Benais  et Benjamin d'Auberi                                                   Piolant; famille d'Aviau\r\n        \"","divers":"à Dangé Saint-Romain celui de Piolant  grav 1-2 et de la Fontaine grav 3-4-5.","gps":"","images":["../image/image_86/86_Piolant_Fontaine_1.jpg","../image/image_86/86_Piolant_Fontaine_2.jpg","../image/image_86/86_Piolant_Fontaine_3.jpg","../image/image_86/86_Piolant_Fontaine_4.jpg","../image/image_86/86_Piolant_Fontaine_5.jpg"]},"Consult_chateau_formulaire34f3":{"id":"Consult_chateau_formulaire34f3","dept":"86","canton":"Poitiers","commune":"Poitiers","nom":"Poitiers_Chateaux","type":"Palais- Châteaux","periode":"XIII-XIV","histoire":"Poitiers; palais et châteaux divers  dont Coursec et Vaumoret pas d'information historique pour les châteaux.                MIRAUDERIE, la Minauderie apparaît dans le dernier tiers du XVIe siècle, le château est relevé par Godefroy Chevalier qui fait bâtir un édifice à neuf dans les années 1638-1639. Un puits,  Le XIXe siècle a remanié les perrons et fait disparaître les salons, l'unité de style n'en est pas affectée.                                                                                                                                                       VAUMORET, chambres d'hôtes par la famille  Vaucamp.","architecture":"MINAUDERIE, apparaît dans le dernier tiers du XVIe siècle. Un puits, des substructions et quelques remplois attestent l'existence d'une construction antérieure. Un portail s'ouvre sur un mur d'enceinte délimité par deux pavillons carrés et couronné de merlons. Les ailes de communs détachées du logis, concourent à l'effet monumental de l'ensemble. Le corps de logis, rectangulaire et simple en profondeur, associe un rez-de-chaussée surélevé à une toiture à lucarnes, la façade, d'une parfaite lisibilité architecturale, est donné par le regroupement des ouvertures en trois travées verticales. L'élévation donnant sur le parc obéit aux mêmes règles de composition subtilement modulées.","habitants":"Poitiers 46° 34' 59\" nord, 0° 20' 32\" est .                               Vaumoret; famille  Vaucamp                                      Mirauderie; Godefroy Chevalier \r\n        \"","divers":"châteaux divers  dont Coursec et Vaumoret Blossac grav-1 .              46° 34' 35\" nord, 0° 20' 05\" est.                                               Coussec grav-4                                                                          Minauderie  46° 34' 58\" Nord, 0° 20' 33\"   Est    grav 2 .                                              Beaucé 46° 34' 47\"  nord, 0° 20' 30\" est     grav 3.                                  Normandoux grav_7","gps":"","images":["../image/image_86/86_Poitiers_Chateaux_1.jpg","../image/image_86/86_Poitiers_Chateaux_2.jpg","../image/image_86/86_Poitiers_Chateaux_3.jpg","../image/image_86/86_Poitiers_Chateaux_4.jpg","../image/image_86/86_Poitiers_Chateaux_5.jpg","../image/image_86/86_Poitiers_Chateaux_6.jpg","../image/image_86/86_Poitiers_Chateaux_7.jpg","../image/image_86/86_Poitiers_Chateaux_8.jpg","../image/image_86/86_Poitiers_Chateaux_9.jpg"]},"Consult_chateau_formulaired9b1":{"id":"Consult_chateau_formulaired9b1","dept":"86","canton":"Poitiers","commune":"Poitiers","nom":"Poitiers_Patrimoine","type":"Patrimoines","periode":"XII-XIV-XV","histoire":"POITIERS, Partir sur les traces d'Aliénor d'Aquitaine, de Radegonde, découvrir l'évolution urbaine de Poitiers a toujours été une ville forte. C'est à l'époque médiévale que Poitiers devient une redoutable place forte. Le château, oeuvre de Philippe Auguste, après 1204, est élevé au confluent de la Boivre et du Clain, ce qui explique le choix d'un plan triangulaire flanqué de trois tours, il est totalement repris par Jean de Berry à la fin du XIVe siècle. Guy de Dammartin le transforme en un somptueux palais. L'édifice est presque totalement détruit. Il ne reste que le premier niveau de la tour nord-ouest, dite du Sanitat, qui appartient par ses critères architecturaux, archères, voûte d'ogives à six branches du XIIIe siècle. Henri II Plantagenêt commence la grande enceinte de 6,5 km qui entoure l'éperon. A son apogée, cette dernière possède soixante à quatre-vingts tours et six portes monumentales au XVIe siècle. Il subsiste le rempart sud-ouest avec la tour à l'Oiseau et la tour de Vouneuil du XIIe siècle, puis à l'ouest la tour Aymar de Beaupuy et la tour du Cordier du XIVe siècle, au nord la tour Bénisson du XIVe siècle et la tour vers Rochereuil de 1507.","architecture":"POITIERS; Éléments protégés MH : les restes de l'enceinte limités aux parties suivantes : porte de la Tranchée (entrée de la ville), y compris les deux pavillons à gauche et à droite de ladite porte (à gauche, pavillon d'octroi ; à droite, magasins de la pompe à incendie et locaux y attenant) ; anciens murs de clôture de la Promenade de Blossac depuis la porte de la Tranchée jusqu'à la tour dite à l'oiseau inclusivement ; le front de la Tranchée depuis les ateliers Proux jusqu'à la tour à Prieur ou tour Achard qui pointe vers la Boivre, tour comprise ; les trois tours de l'ancien château, au confluent de la Boivre et du Clain ; les douves comprises entre l'usine Savale et la porte Achard : classement par arrêté du 11 janvier 1921. La tour Aymard de Beaupuy sise près de l'ancien moulin du Pont-Achard sur la Boivre : inscription par arrêté du 18 mai 1926.                  Les châteaux représentés sont de construction classiques du XVII-XVIIIe siècle.                                                                                                Edifié entre 1869 et 1875, lhôtel de ville de Poitiers est le point final dun vaste projet durbanisation du centre-ville. Avec sa majestueuse façade de style néo-renaissance, lédifice est un monument majeur représentatif des goûts du second Empire. A lintérieur, lescalier dhonneur met en scène lascension du visiteur vers la loggia.                                                                                        Ancien palais des comtes de Poitou-ducs dAquitaine, le palais de Justice de Poitiers est un témoignage du style architectural appelé « gothique angevin ». La grande salle d'apparat dite « salle des Pas Perdus » est réédifiée par la famille Plantagenêt un peu avant 1200. Elle demeure aujourd'hui l'un des plus remarquables exemples d'architecture civile médiévale en France.","habitants":"Jean de Berry et Guy de Dammartin \r\n        \"","divers":"Poitiers,Remparts grav-1.  Hotel de ville- préfecture  grav 2-3.                Palais de justice 46° 34' 59\" nord, 0° 20' 32\" est.                                         Hotel fleury grav 4         Palais des comtes grav-5                        Tour de Vouneil grav 6, Tour Cordier grav 7.  Vaumoret grav-8 .","gps":"","images":["../image/image_86/86_Poitiers_Patrimoine_1.jpg","../image/image_86/86_Poitiers_Patrimoine_2.jpg","../image/image_86/86_Poitiers_Patrimoine_3.jpg","../image/image_86/86_Poitiers_Patrimoine_4.jpg","../image/image_86/86_Poitiers_Patrimoine_5.jpg","../image/image_86/86_Poitiers_Patrimoine_6.jpg","../image/image_86/86_Poitiers_Patrimoine_7.jpg","../image/image_86/86_Poitiers_Patrimoine_8.jpg","../image/image_86/86_Poitiers_Patrimoine_9.jpg"]},"Consult_chateau_formulaire3e00":{"id":"Consult_chateau_formulaire3e00","dept":"86","canton":"Loudun","commune":"Prinçay","nom":"Princay","type":"Château","periode":"XVII","histoire":"Deux châteaux à Prinçay celui de Haute-Porte et de la Roche du Maine.                                                                                                                 HAUTE-PORTE,  ancienne maison-forte devenue manoir au XVIIe siècle était la propriété des Acquets, seigneurs de Haute-Porte, après la Révolution, on trouve dans la place les Demarcay et les Milori.                                                                                                            ROCHE du MAINE   La forteresse est mentionnée dès le milieu du XIIIe siècle mais le château actuel est un élégant manoir du tout début de la Renaissance. Il présente le privilège rare de n'avoir jamais été remanié au cours des siècles. C'est donc un témoignage authentique des premières architectures influencées par la renaissance italienne. Enfin, le centre de la façade est ornée d'une statue équestre, probablement celle de Charles Tiercelin, qui bien que conservant des caractéristiques médiévales, dénote d'une mode italianisante.   De retour des guerres d'Italie, le seigneur de la Roche du Maine, Charles Tiercelin, emploie des artistes italiens à la construction de son château, à l'instar de François Ier. Il en résulte un château d'aspect fortifié, avec ses tours à meurtrières, ses créneaux et mâchicoulis, son pont-levis et ses douves sèches.","architecture":"HAUTE-PORTE,   Bien restaurée, comprenant le colombier à pied (1 100 boulins), la tour de garde, la cave voûtée, le four à pain, une buanderie, et un jardin. L'édifice comprend un porche à double entrée accosté d'une tour ronde qui date du XVIe siècle. Le corps de bâtiment rectangulaire a pour décor deux lucarnes et une porte axiale en plein cintre. A l'intérieur se trouvent deux cheminées du XVIIe siècle.                                                                                               ROCHE du MAINE, la façade est percée de fenêtres qui ouvrent directement sur une galerie ouverte, au premier niveau et une galerie fermée, au second. Dès que l'on pénètre dans la cour, le château devient une élégante demeure aux fenêtres à meneaux largement ouvertes et sculptées. Il ne s'agit plus d'un des sombres châteaux des siècles précédents comme on peut le constater dans la salle d'honneur éclairée de quatre grandes ouvertures. On accède à la salle de réception située à l'étage, par un escalier à vis dans la tour d'angle, la vaste salle occupe toute la surface de l'aile. Près de l'entrée domine une belle cheminée sculptée en tuffeau, comme tout le bâtiment et le sol est recouvert d'un carrelage à décor de \"roues\" qui présente l'avantage d'être presque entièrement d'époque. Autre avantage d'avoir ici un château non remanié, la salle d'honneur a conservé ses volets intérieurs en marqueterie du XVIe siècle. Il s'agit là d'un fait rare qui fait du château un petit joyau élevé à la première Renaissance.","habitants":"Roche du Maine; Charles Tiercelin,\r\n        \"","divers":"A Prinçay; Hauteporte grav 1 à 4, Roche du Maine grav 5-6-7","gps":"","images":["../image/image_86/86_Princay_1.jpg","../image/image_86/86_Princay_2.jpg","../image/image_86/86_Princay_3.jpg","../image/image_86/86_Princay_4.jpg","../image/image_86/86_Princay_5.jpg","../image/image_86/86_Princay_6.jpg","../image/image_86/86_Princay_7.jpg","../image/image_86/86_Princay_8.jpg","../image/image_86/86_Princay_9.jpg"]},"Consult_chateau_formulaire6622":{"id":"Consult_chateau_formulaire6622","dept":"86","canton":"Loudun","commune":"Verrue","nom":"Purnon","type":"Château","periode":"XVII","histoire":"PURNON, le château et ses communs sont construits de 1771 à 1785 vraisemblablement à lemplacement dun château primitif par monsieur Achard de la Haye colonel des armées du roi qui lors de la Révolution, il émigra mais son épouse invoquant ses droits de communauté réussit a garder. Au XIXe siècle Purnon a appartenu au comte de Goyon et échoue par alliance  aux Montesquiou Fézensac. En 1893 acheté par le marquis de Roquequaire, toujours dans cette famille.","architecture":"PURNON, le château de Purnon massif avec ses pavillons d'angle son appareil de brique et de pierre, ses combles en forme de dôme et ses communs furent construits, de 1771 à 1785, à la place d'un ancien château primitif. Une longue avenue aménagée en 1812, des terrasses et l'ordonnance des communs apportent à ce beau château, une allure majestueuse, oculi de l'attique ou s'inscrit un fronton triangulaire couronne la porte centrale et des portes latérales. Le château de Purnon est protégé aux M.H. avec ses communs, ses terrasses, ses douves, et sa grille d'entrée, depuis 1995.","habitants":"comte de Goyon \r\n        \"","divers":"Château de Purnon à Verrue","gps":"","images":["../image/image_86/86_Purnon_1.jpg","../image/image_86/86_Purnon_2.jpg","../image/image_86/86_Purnon_3.jpg"]},"Consult_chateau_formulaire929b":{"id":"Consult_chateau_formulaire929b","dept":"86","canton":"Lussac les châteaux","commune":"Queaux","nom":"Queaux","type":"Château","periode":"XV-XVI-XIX","histoire":"A Queaux  le château de l'Angellerie, de Fougeret (voir article) de la Messellières  (voir article de Sablonières et de Chamousseau.                                                                                                                                                           \r\nANGELLERIE, Fief relevant du marquisat du Vigeant, le château de L'Angellerie apparaît dans les textes au cours du XVIe siècle. Perché sur un coteau, le logis, restauré au XIXe siècle, montre encore une jolie porte à accolade et écusson. L'édifice se compose d'un étage carré, le gros-oeuvre : calcaire ; moellon et enduit, élévation à travées surmontée de toit à longs pans et croupe recouvert de tuiles plates et tuiles creuses.                                                                             CHAMOUSSEAU est un château bâti à Queaux, dans le . Il appartenait à la famille Frotier de La Messelière, au milieu du XVe siècle. La construction du château de Chamousseau comprenait un corps de logis défendu par 3 tours rondes, dont la plus grosse était percée de canonnières. Aujourd'hui, il ne subsiste plus du château de Chamousseau qu'une partie de son logis et sa tour ronde.","architecture":"SABLONNIERES, était un ancien fief mentionné par les archives de la cure de Queaux au milieu du XIX siècle. Construit au cours du XIX· siècle en a repris le toponyme. La date (1868) est inscrite en chiffres romains dans un écusson au-dessus de la porte d'entrée. L'édifice possède un étage carré et un étage de comble, le gros-oeuvre: calcaire; moellon et enduit, élévation à travées surmontée d'un toit à longs pans couvert d'ardoise.","habitants":"Messelières; Guy Frottier\r\n        \"","divers":"Chamousseau grav 2 : 46° 19' 40\" Nord et 0° 40' 07\" Est                        Merveillère grav-3                                                                            Puirajoux grav-4                                                                                    Sablonnières-Grav-5","gps":"","images":["../image/image_86/86_Queaux_1.jpg","../image/image_86/86_Queaux_2.jpg","../image/image_86/86_Queaux_3.jpg","../image/image_86/86_Queaux_4.jpg","../image/image_86/86_Queaux_5.jpg"]},"Consult_chateau_formulaired2c7":{"id":"Consult_chateau_formulaired2c7","dept":"86","canton":"Lussac les châteaux","commune":"Fan-Bouresse","nom":"Rigaudière_86","type":"Vestiges-tour","periode":"XV","histoire":"RIGAUDIERE, en raison du caractère résidentiel de cette tour dépourvue d'élément défensif, on peut supposer qu'elle fut construite dans la seconde moitié du XVe siècle, possédée par les Cléret, seigneurs de La Rigaudière dès la fin du XIVe siècle.","architecture":"RIGAUDIERE, l'imposante tour, à l'aspect rustique avec ses parements en moellons renforcés aux angles, adopte un plan quadrangulaire et comprend trois étages desservis par l'escalier en vis logé dans la tourelle d'angle circulaire. Chaque salle unique des différents niveaux est éclairée par des ouvertures concentrées sur une seule face de l'édifice, qui comprend la porte d'entrée et les quatre fenêtres chanfreinées dont une seule a gardé ses meneaux. Deux latrines, auxquelles on accédait par un petit couloir, subsistent encore. La tour est menacée de disparition; toiture effondrée, de même que les planchers des différents niveaux, on peut s'interroger sur l'intérêt que représente son inscription à l'Inventaire des M.H.  car à cette date la tour possédait encore sa toiture et il était encore possible de circuler dans ses vastes salles.","habitants":"Famille des Cléret\r\n        \"","divers":"Vestiges du château de Rigaudière à Fan Bouresse","gps":"","images":["../image/image_86/86_Rigaudi%c3%a8re_86_1.jpg","../image/image_86/86_Rigaudi%c3%a8re_86_2.jpg","../image/image_86/86_Rigaudi%c3%a8re_86_3.jpg"]},"Consult_chateau_formulaireb339-2":{"id":"Consult_chateau_formulaireb339-2","dept":"86","canton":"Châtellerault-2","commune":"Buxeuil","nom":"Roche_Amenon","type":"Château","periode":"XVII-XVIII","histoire":"ROCHE AMENON, appellation donnée au XIIIe siècle, le bâtiment central a été construit peu avant la Révolution. En 1809, le comte de Vaucelles donne à l'édifice sa physionomie actuelle en l'augmentant de deux ailes s'ouvrant en éventail dans une cour fermée, limitée par des douves séchées, une chapelle et une conciergerie.","architecture":"ROCHE AMENON, présente un corps de bâtiment central, encadré de deux pavillons, et les deux ailes latérales en éventail dans la cour d'honneur ont été construites au XIXe siècle, le pavillon de droite daterait de la reconstruction du XVIIIe  siècle, et celui de gauche de l'Empire, après le rachat par le comte de Vaucelle. La façade opposée qui donne sur la Creuse est de caractère plus simple. Cependant un large fronton incurvé est percé d'une fenêtre cintrée dont le décor évoque les manières de faire de la première moitié du XIXe siècle. Au nord-ouest se trouve la chapelle et au sud-est, la conciergerie. Du côté sud-est est visible une fuye en brique et pierre remaniée à plusieurs époques.","habitants":"Comte de Vaucelle\r\n        \"","divers":"Château de la Roche Amenon à Buxeuil","gps":"","images":["../image/image_86/86_Roche_Amenon_1.jpg","../image/image_86/86_Roche_Amenon_2.jpg","../image/image_86/86_Roche_Amenon_3.jpg","../image/image_86/86_Roche_Amenon_4.jpg","../image/image_86/86_Roche_Amenon_5.jpg"]},"Consult_chateau_formulaireda4b":{"id":"Consult_chateau_formulaireda4b","dept":"86","canton":"Civray","commune":"Magné","nom":"Roche_Gencay","type":"Château","periode":"XV-","histoire":"ROCHE-GENCAY, ce château de la Roche-Gençay, sa construction s'étend de fin du XVe au XVIIIe siècle. Le parc a été dessiné par Le Nôtre.  La seigneurie a appartenu aux d'Appelvoisin, s'alliant aux familles poitevines et tourangelles. Après la mort de Briand d'Appelvoisin, c'est à Guillaume, son frère, époux d'Anastasie de la Béraudière que l'on doit l'achèvement des deux dernières travées; sans se soucier de l'unité de la façade, il introduit fenêtres et lucarnes Renaissance.  Au XVIe siècle  la seigneurie passe à Claude de Villequier seigneur de la Guerche qui à épousé Renée d'Appelvoisin leur fils Georges  commandant de la ligue, les Rilhac  recueillent la Roche en héritage qui cèderont en 1608 le domaine à Pierre de Brilhac maire de Poitiers en 1614  et obtient le titre de vicomté. En 1753  le château est acquis par le marquis de Créqui lieutenant des armées du roi. Durant la Révolution c'est son gendre le comte de Milon qui sera le dernier vicomte de Gencay,  le château confisqué racheté en sous main par son propriétaire qui le revend en 1799 aux demoiselles de Revigliasc de Veynes qui épousa le vicomte de Buzeny-Pavant et ensuite le marquis de Vareillles Sommières. en 1853 don à un  neveu le comte de Briey époux de Berthe de la Fare, leur fille Jeanne épouse en 1882 Alfred Michel comte de Perredon, son fils Géraud de Perredon  créa le musée de l'Ordre de Malte dans les dépendances.","architecture":"ROCHE-GENCAY,  les Appelvoisin firent édifier aux XVe siècle, il ne subsiste aujourd'hui que le bâtiment principal et la chapelle, les travaux du XIXe siècle ayant fait disparaître enceinte et fossés, d'un corps de logis allongé était flanqué à l'origine de quatre tours. Une des plus belles demeures seigneuriales du département par l'harmonie de son ensemble. Sa façade présente des sculptures de style gothique flamboyant et de style renaissance.  Le château de La Roche domine majestueusement la vallée de La Belle.  L'intérieur du château a été profondément modifié aux XVIIIe et XIXe siècles. La chapelle, construite vers 1530, accueille de magnifiques vitraux. Décoration intérieure du XVIIIe siècle. Le parc a été dessiné par Le Nôtre.   La chapelle, construite en 1530, a connu des transformations en 1870 pour accueillir de magnifiques vitraux signés par Maréchal de Metz, peintre et maître verrier, chef de file de l'Ecole de Metz. Un des communs du XVIIe siècle abrite le Musée de l'Ordre de Malte, unique en France.  Ce Musée a été créé par le comte Géraud Michel de Pierredon, Bailli de l'Ordre de Malte, ancien hospitalier et représentant de l'ordre auprès du gouvernement français. Le Musée retrace l'histoire des Chevaliers de l'Ordre de Saint Jean de Jérusalem, de Rhodes et de Malte des origines à nos jours à travers des cartes, des médailles, des armures et des films.","habitants":"Famille d'Appelvoisin et au marquis de Créqui\r\n        \"","divers":"Roche Gençay à Magné  46° 21' 51,76\" Nord et 0° 24' 4,18\" Est","gps":"","images":["../image/image_86/86_Roche_Gencay_1.jpg","../image/image_86/86_Roche_Gencay_2.jpg","../image/image_86/86_Roche_Gencay_3.jpg","../image/image_86/86_Roche_Gencay_4.jpg"]},"Consult_chateau_formulaire299b":{"id":"Consult_chateau_formulaire299b","dept":"86","canton":"Loudun","commune":"Roiffé","nom":"Roche_Martel","type":"Château","periode":"XII-XV","histoire":"ROCHE-MARTEL ou Marteau, au début du XVe siècle, la prestigieuse forteresse est en ruine. C'est alors qu'il tombe dans le patrimoine de la famille Martel. Ils y engagent un vaste chantier de reconstruction. La forteresse reprend des formes dignes d'une demeure seigneuriale. Afin de marquer encore un peu plus de leur empreinte cette nouvelle bâtisse, les Martel lui donne leur nom. Le château de la Roche Martel entre ainsi dans l'histoire. Les changements de propriétaires s'enchaînent dans les siècles suivants. Le château est alors rarement habité. Pendant un long moment, il sert carrément de bâtiment d'exploitation agricole. A la fin du XIXe siècle, il est racheté par un notaire.La demeure est finalement inscrite à des M.H. en 2005.  Le château de la Roche Martel abrite aujourd'hui des chambres d'hôtes de Dominique de Cornutier.","architecture":"ROCHE-MARTEL, les premières constructions de la Roche-Marteau auraient été érigées au XIe siècle. Le fils aîné d'Aliénor d'Aquitaine, Henri le Jeune, y aurait résidé. Le château, qui conserve des éléments essentiellement de la fin du Moyen-Age, est doté d'un châtelet d'entrée compris entre deux tours, avec double porte à pont-levis défendu par de nombreuses archères canonnières. Au sommet, une ligne de mâchicoulis sur consoles est partiellement conservée. Le mur d'enceinte est protégé par une échauguette montée sur contrefort et conserve deux bouches-à-feu. Au sud se trouvent les vestiges de deux tours. Contre l'enceinte, les ruines d'une chapelle sont adossées à un petit logis voûté d'ogives et desservi par un petit escalier en vis hors-oeuvre. Le logis, de plan en L, est organisé de part et d'autre d'une tour d'escalier en vis et a reçu, au 19e siècle, une tour néo-gothique. L'aile sud présente, en façade nord, une galerie en bois dont il ne semble plus exister d'exemple comparable dans les châteaux de la région.","habitants":"Famille Martel.\r\n        \"","divers":"A Roiffé le château de Roche-Martel","gps":"","images":["../image/image_86/86_Roche_Martel_1.jpg","../image/image_86/86_Roche_Martel_2.jpg","../image/image_86/86_Roche_Martel_3.jpg","../image/image_86/86_Roche_Martel_4.jpg","../image/image_86/86_Roche_Martel_5.jpg","../image/image_86/86_Roche_Martel_6.jpg","../image/image_86/86_Roche_Martel_7.jpg"]},"Consult_chateau_formulaire4c18":{"id":"Consult_chateau_formulaire4c18","dept":"86","canton":"Châtellerault-3","commune":"La Roche-Posay","nom":"Roche_Posay","type":"Château","periode":"XVII-XIX","histoire":"ROCHE-POSAY, la seigneurie de La Roche-Posay appartient aux barons de Preuilly, en Touraine, dès l'an mil. Ils ont élevés un château au pied duquel s'est développé un bourg. datant de 1810, il est aujourd'hui occupé par le casino.\r\nDonjon du XIe siècle : il a été classé comme M.H. en 1942 et il est le seul vestige de l'ancien château. Ouvert à l'occasion de rares manifestations, il est habituellement fermé au public                                                       VALCREUSE, fut construit vers 1850 dans un style éclectique influencé par la Belle Époque et l'Art Nouveau. En juin 1940, le régiment du 4e zouaves retarde lavance des troupes allemandes en faisant sauter le pont de La Roche Posay sur la Creuse, ce qui permet dévacuer lor entreposé à la Banque de France de Poitiers. Quelques jours plus tard la ligne de démarcation traversait La Roche Posay. La preuve des bombardements est encore visible sur les murs Nord, Ouest et sud du château.","architecture":"ROCHE-POSAY; les parties les plus anciennes du château peuvent être datées d'après leurs caractéristiques architecturales du XIe siècle, Tour de 23 m de haut, comporte 4 niveaux, un chemin de ronde et des mâchicoulis. Ses murs épais de 2.5 mètres sont percés d'ouvertures de défense et d'éclairage. Ce château est centré sur un donjon roman, protégé par une petite enceinte arasée. Cette tour presque carrée est construite en bel appareil de pierres de taille de calcaire. Les murs très épais sont renforcés par des contreforts plats, l'élévation extérieure est marquée par un léger ressaut horizontal. Le donjon est aujourd'hui accessible, au rez-de-chaussée, par une porte percée à l'époque moderne. Les deux premier niveaux, couverts de voûtes en arc de cloître, ont été aménagés au XVIIIe siècle. Cette tour romane ne présente donc à l'origine qu'un unique niveau habitable, elle semble davantage avoir été construite pour surveiller et marquer la présence des seigneurs de ce lieu, que pour leur servir de résidence.","habitants":"Roche-Posay; barons de Preuilly                                       \r\n        \"","divers":"Roche Posay, 46° 47' 09\" nord, 0° 48' 43\" est grav de 1 à 4.                             Buissière grav-5. Casino grav-6. La Guerche grav-7.     Valcreuse grav-8-9","gps":"","images":["../image/image_86/86_Roche_Posay_1.jpg","../image/image_86/86_Roche_Posay_2.jpg","../image/image_86/86_Roche_Posay_3.jpg","../image/image_86/86_Roche_Posay_4.jpg","../image/image_86/86_Roche_Posay_5.jpg","../image/image_86/86_Roche_Posay_6.jpg","../image/image_86/86_Roche_Posay_7.jpg","../image/image_86/86_Roche_Posay_8.jpg","../image/image_86/86_Roche_Posay_9.jpg"]},"Consult_chateau_formulaire7734":{"id":"Consult_chateau_formulaire7734","dept":"86","canton":"Migné-Auxances","commune":"Mirebeaux","nom":"Rochefort_86","type":"Château","periode":"XV","histoire":"BEAUVAIS,  Il ne subsiste du château ancien qu'un corps de bâtiment en L , autrefois défendu par plusieurs tours et entouré par des fossés. Ce corps de bâtiment se compose d'un fragment de courtine dans laquelle est aménagée une très belle entrée fortifiée, d'une tour d'angle sur laquelle s'articule une longue courtine. L'ensemble de l'édifice, construit en calcaire, est de qualité inégale. Les courtines sont constituées de moellons et de pierres équarries, la grosse tour d'angle et le châtelet d'entrée sont très bien appareillés. Ces éléments assuraient l'essentiel de la défense de ce château de plaine, dont le rôle militaire pendant le Moyen-Age semble avoir été très mineur. La capacité défensive de la place était faible. Un soin particulier a été apporté à l'entrée fortifiée, elle se compose de deux contreforts hémi-circulaires, qui encadrent un massif dans lequel est ouverte une porte basse étroite en arc brisé, autrefois équipée d'un pont-levis encastrable.                    ROCHEFORT,  appartint aux familles dArgenson et de Xaincoins, avant dêtre donné en 1449 par le roi Charles VII à Guillaume Gouffier, seigneur de Bonnivet. Ce dernier le vendit en 1464 à Jean de Moulins, maire de Poitiers. Incendié peu après, le château fut reconstruit et fortifié vers 1474 avec lautorisation de René dAnjou. Il restera la propriété de la famille de Moulins pendant plusieurs siècles.","architecture":"ROCHEFORT le corps principal se compose de deux ailes en équerre, reliées par une tour polygonale hors uvre. Les fenêtres, croisées à meneaux, demi-croisées ou petites baies, sont réparties au gré de la distribution intérieure. Seule une lucarne au sud est de style Louis XIII. La distribution et l'agencement des pièces d'habitation sont marqués par la recherche du confort avec des cheminées dont plusieurs remontent au XVe siècle. La chapelle est l'objet d'un traitement privilégié: longue de deux travées voûtées d'ogives et éclairée par des baies. Les plus belles portes du logis, l'une intérieure et l'autre extérieure, lui sont réservées.","habitants":"Famille dArgenson\r\n        \"","divers":"Château de Rochefort","gps":"","images":["../image/image_86/86_Rochefort_86_1.jpg","../image/image_86/86_Rochefort_86_2.jpg","../image/image_86/86_Rochefort_86_3.jpg"]},"Consult_chateau_formulaire5dcc":{"id":"Consult_chateau_formulaire5dcc","dept":"86","canton":"Jaunay-Clan","commune":"Marigny-Brisay","nom":"Roches_Marigny","type":"Chaâteau","periode":"XIX","histoire":"ROCHES-MARIGNY,   le château fut au cours des XIXe et XXe siècles, propriété des familles Delalande, Cesbron aieul du romancier Gilbert Cesbron, Marot et Meuly.","architecture":"ROCHES-MARIGNY,   un premier édifice en 1334. Aujourd'hui cette imposante demeure bourgeoise, flanquée de quatre tours d'angle carrées, une tour cylindrique à l'ouest et une autre octogonale au sud, resplendit dans un beau parc aux arbres séculaires, dans lequel a été rapporté un arc magnifiquement décoré de 3,50 mètres de large et de 3 mètres de haut. Malgré ces origines anciennes, l'édifice actuel ne paraît pas remonter au delà du XIXe siècle. Le logis principal présente un plan en L dont l'angle est orienté à l'est. Il est recouvert d'un toit d'ardoise à croupes, son volume est rythmé de six tours avec toit d'ardoise à croupes pour les quatre tours carrées, toit d'ardoise à base circulaire pour la tour ronde à l'ouest et à base octogonale pour la tour sud. Les deux corps de logis ont trois niveaux apparents, les tours en ont quatre.","habitants":"Famille Delalande\r\n        \"","divers":"Château de la Roche Marigny à Marigny-Brisay","gps":"","images":["../image/image_86/86_Roches_Marigny_1.jpg","../image/image_86/86_Roches_Marigny_2.jpg","../image/image_86/86_Roches_Marigny_3.jpg","../image/image_86/86_Roches_Marigny_4.jpg","../image/image_86/86_Roches_Marigny_5.jpg"]},"Consult_chateau_formulairec92f-2":{"id":"Consult_chateau_formulairec92f-2","dept":"86","canton":"Vivonne","commune":"Roches-Prémarie-Andillé,","nom":"Roches_Prémarie","type":"Château","periode":"XIV","histoire":"ROCHES-PREMARIE,  la terre des Roches située après le Ruisseau des Dames, était régie par  l'Abbaye de Montierneuf de Poitiers. Le château était le siège de cette seigneurie et une chambre était réservée en permanence au seigneur. Ce château a abrité une garnison anglaise lors de la bataille de Nouaillé-Maupertuis en 1356.                                                                                      Nouaillé-Maupertuis, site Abbatial, lancienne abbaye bénédictine de Nouaillé est riche dun patrimoine qui illustre plusieurs siècles darchitecture : léglise Saint-Junien, d'époque romane, dotée dun bel ensemble mobilier du XIIe siècle, deux ailes de bâtiments conventuels (XIIe et XVIIIe siècles), le logis abbatial et les ouvrages défensifs édifiés à la fin du Moyen Âge.","architecture":"ROCHES-PREMARIE, pour pénétrer dans le parc du château, il faut passer entre deux tours. On se trouve alors devant la façade ouest du quadrilatère par laquelle se pratique l'accès à la cour centrale. - Le château actuel, aux tours crénelées, était le siège de cette seigneurie et une chambre était réservée en permanence au seigneur. Ce château de Prémarie, avec son donjon du XIVe siècle, a abrité la garnison anglaise lors de la bataille de Nouaillé-Maupertuis en 1356.  Les bâtiments d'habitation, à un étage, se situent sur les faces ouest et nord, et d'autres bâtiments s'étendent sur la face sud alors que le quadrilatère est fermé par une courtine à l'est. Les quatre tours aux angles présentent de rares vestiges de postes de tir mais ont été passablement remaniées. Deux autres tours flanquent la façade ouest en formant un châtelet d'entrée, et sont couronnées par un parapet crénelé sur faux mâchicoulis et la porte qu'elles protègent est surmontée de deux fentes censées loger les flèches d'un pont-levis imaginaire.","habitants":"Abbé de l'Abbaye de Montierneuf\r\n        \"","divers":"Chateau de Nouaillé Maupertuis grav 3, des Planches grav 4","gps":"","images":["../image/image_86/86_Roches_Pr%c3%a9marie_1.jpg","../image/image_86/86_Roches_Pr%c3%a9marie_2.jpg","../image/image_86/86_Roches_Pr%c3%a9marie_3.jpg","../image/image_86/86_Roches_Pr%c3%a9marie_4.jpg","../image/image_86/86_Roches_Pr%c3%a9marie_5.jpg","../image/image_86/86_Roches_Pr%c3%a9marie_6.jpg","../image/image_86/86_Roches_Pr%c3%a9marie_7.jpg"]},"Consult_chateau_formulaire1d30-2":{"id":"Consult_chateau_formulaire1d30-2","dept":"86","canton":"Loudun","commune":"St-Leger de Montbrilais","nom":"Rouvraye","type":"Château","periode":"XV-XIX","histoire":"ROUVRAYE; les plus anciennes traces du château remontent au Moyen-Age. Dès le XVe siècle, le château est le fief d'une seigneurie poitevine et protégeait Loudun des guerres. Au XVIe siècle de profondes modifications architecturales présentes encore aujourd'hui : façade Renaissance, galeries, pigeonnier, cave, château inscrit au M.H. en 2007.","architecture":"ROUVRAYE,  se compose d'un ensemble de constructions édifiées entre le XVIe et le XIXe siècle sur la commune, l'architecture du bâtiment notamment la charpente laisse à penser qu'un premier bâtiment remonte à la fin du Moyen-Age et fut un château de défense avec ses tours, ses imposantes murailles, ses douves sèches. La fin de la guerre de cent-ans puis des religions  permettent au logis seigneurial de devenir une demeure de plaisance avec la construction d'une belle façade  Renaissance et transformation de une des tours en un pigeonnier. le château en forme de U s'élève sur un étage d'un côté il se dresse sur deux niveaux d'un autre à l'aplomb d'un jardin dans une cour basse intérieure, sur celle -ci s'élève une belle façade Renaissance du XVIe siècle des galeries inférieures.","habitants":"Seigneur locaux\r\n        \"","divers":"Château de Rouvraye","gps":"","images":["../image/image_86/86_Rouvraye_1.jpg","../image/image_86/86_Rouvraye_2.jpg","../image/image_86/86_Rouvraye_3.jpg"]},"Consult_chateau_formulaire360a":{"id":"Consult_chateau_formulaire360a","dept":"86","canton":"Chasseneuil-du-Poitou","commune":"Montamisé","nom":"Sarzec","type":"Château","periode":"XIX","histoire":"SARZEC Choquin de SARZEC Archéologue, à qui sont dues la plupart des découvertes en Chaldée et dont deux salles du Louvre portent le nom, Choquin de SARZEC, né le 11 août 1832, était le propriétaire du château de SARZEC, qu'il acquit en 1880, à Montamisé. Il vécut dans la propriété familiale de la Carrelière, au siècle dernier et est enterré dans le cimetière communal. De 1864 à 1868, il est \"directeur du gaz\" de la compagnie \"Lebon\" à Alexandrie, au titre \"d'ingénieur civil\".son père était propriétaire à l'époque du château de La Carlière. L'histoire retiendra le nom d'Ernest de Sarzec, montamiséen d'adoption en référence à l'achat d'un château sur la commune de Montamisé mais pas seulement puisque ce fut le dernier des grands consuls de Mésopotamie puis ce féru d'archéologie va jeter toutes ses forces dans de multiples campagnes de fouilles. C'est alors qu'il va découvrir un des plus grands trésors de la civilisation sumérienne jusqu'à épuisement et donnera son dernier soupir à 69 ans dans une clinique de Poitiers. C'était en 1901.Le 1er août 1899, il fut élevé au grade de ministre plénipotentiaire de deuxième classe. Le 31 mai 1901, Ernest Choquin de SARZEC mourait dans une clinique, à POITIERS, à l'âge de 68 ans. Sa femme Marie-Jeanne Charlotte, née GUILLET D'ESCRAVAYAT, qui l'avait accompagné, dans tous ses voyages, partageant ses fatigues et dangers, mourut cinq semaines plus tard, le 5 juillet 1901, dans son château de SARZEC, à l'âge de 52 ans. Leur fils Henry avait 20 ans.","architecture":"SARZEC, la première mention de Sarzec date de 1065 environ, date à laquelle est cité un certain Johannes de Cerset. En 1253, le fief de Cersay ou Sersey est de nouveau mentionné, appartenant à l'abbaye Saint-Jean de Montierneuf de Poitiers. L'ancien château apparaît sur le cadastre de 1817, entouré par un parc. De cet ancien domaine ne subsistent que le portail, la chapelle, l'essentiel des écuries et, dans le château actuel construit en 1882, la base des murs et un sous-sol. Le parc a également conservé, dans sa partie nord, son organisation générale. Le château clos de mur, est entouré au nord et à l'est par un parc. Il comprend un corps principal à deux étages carrés et façade en pignon. Il est flanqué de plusieurs tours. La plupart des baies possèdent un linteau en accolade et un encadrement saillant. Tous les toits sont surmontés d'épis de faîtage. La tour Est de plan carré, ouvre à l'est par une travée, prolongée par une lucarne sur le versant à fronton triangulaire. La tour sud, de plan carré, comprend deux étages et un étage en surcroît. Ce dernier est entouré d'un mâchicoulis couvert.","habitants":"Choquin de SARZEC \r\n        \"","divers":"Château de Sarzec à Montamisé","gps":"","images":["../image/image_86/86_Sarzec_1.jpg","../image/image_86/86_Sarzec_2.jpg","../image/image_86/86_Sarzec_3.jpg"]},"Consult_chateau_formulaireccea":{"id":"Consult_chateau_formulaireccea","dept":"86","canton":"Poitiers-5","commune":"Martaizé","nom":"Sautonne","type":"Château","periode":"XV-XVII","histoire":"SAUTONNE, un château primitif aurait été édifié à Sautonne au XVe siècle et transformé à la fin du XVIIe siècle. Il ne reste plus beaucoup aujourd'hui d'éléments visibles de ces constructions. En 1919, une laiterie est installée dans l'aile ouest du château pour y produire du fromage . En 1954, est installé un atelier de production de lait en poudre. Le 1er mars 1959, le propriétaire de la laiterie, M. Catineau la donne en gérance à la société la Cloche d'Or jusqu'au 28 février 1962, après quoi la Cloche d'Or s'installe à Loudun. La laiterie continue de tourner lentement puis s'arrête quelques années plus tard. En 1964, une partie du bâtiment, délaissé, s'écroule. Vendu, en 1970, le nouveau propriétaire en entreprend sa restauration.","architecture":"SAUTONNE, c'est une importante construction rectangulaire constituée au nord de trois corps de bâtiment en U. Au sud, la façade est cantonnée de deux tours cylindriques. Les toits en poivrière des tours, le dôme central et son campanile soulignent la symétrie et donnent à l'ensemble une remarquable allure classique. La chapelle du château est située dans la tour de gauche de la façade antérieure et était décorée de remarquables boiseries du XVIIIe siècle.","habitants":"Famille de M. Catineau \r\n        \"","divers":"Château de Sautonne à Martaizé","gps":"","images":["../image/image_86/86_Sautonne_1.jpg","../image/image_86/86_Sautonne_2.jpg","../image/image_86/86_Sautonne_3.jpg"]},"Consult_chateau_formulaire8a41":{"id":"Consult_chateau_formulaire8a41","dept":"86","canton":"Chasseneuil en Poitou","commune":"Savigny sous Faye","nom":"Savigny_Faye","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Savigny celui de Savigny , de la Plaine et de Saires.                                                                                                                 PLAINE, la Plaine à Savigny sous Faye, la famille de Vaucelles possédait La Plaine en 1605, aujourd'hui c'est un château Louis Philippe qui s'offre au regard,                                                                                                                          SAIRES, à deux kilomètres au nord  Le fief de Saires relevait du château de Loudun. Il est connu au XIe siècle dans le cartulaire de Noyers.                                                                                                        SAVIGNY , relevait de l'archiprêtre de Faye-la-Vineuse, duché pairie de Richelieu. De 1830 à 1840, Moyse Emile de Cougny fait construire ce château dans le style Renaissance. La famille de Cougny restera à Savigny jusqu'en 1965, date à laquelle la propriété est vendue à des parisiens pour y passer leur retraite. Ils possèdent le château jusquen 1989, le revendant le 30 juin à des Anglais qui ont passé 15 années à le transformer en hôtel de luxe.                                                                                                                    SAVIGNY-LEVESCAUT, la chapelle du château de la Touche, consacrée en 1653,  montre le corps du manoir en arrière plan, desservi par une allée centrale qui traverse une large cour herbeuse au premier plan. La chapelle est située à gauche. À sa droite, on devine un bassin carré. Le parc arboré se situe à l'arrière du corps de logis et n'est pas visible sur la photo.","architecture":"PLAINE, composé d'un corps de logis rectangulaire à deux niveaux, couronné d'un toit à croupes en ardoise, il a été construit dans un esprit classique. Un pavillon flanqué d'une tourelle a été édifié en symétrie. Une corniche sur larges modillons cannelés court sur l'ensemble du bâtiment et donne une unité à l'ensemble. Chaque partie a des toitures indépendantes. Les bandeaux du rez-de-chaussée sont plus importants que ceux du premier étage. Des pilastres à refends marquent chacune des saillies de l'avant-corps et des pavillons latéraux. Des lucarnes à fronton pignon portent un arc trilobé ; l'apparition du gothique est assez curieuse. Tout de blanc, avec sa façade scindée, l'édifice apparaît comme un beau château, digne de réconcilier les amateurs avec le XIXe siècle.                                                                                                                   SAIRES, dans le bourg de Saires, on aperçoit un beau petit château, datant probablement du XVIIIe siècle, flanqué d'une tour polygonale à poivrière et d'une échauguette à dôme de pierre.                                                                                                                                              SAVIGNY, c'est une magnifique demeure de pierres blanches, le vaste corps de bâtiment cantonné aux angles de tours rondes au sud et carrées au nord. Une tour octogonale dominant l'ensemble, construite hors-uvre au nord, abrite l'escalier, est couronnée d'un chemin de ronde reposant sur mâchicoulis. Les tours sud sont surélevées d'un étage et couronnées d'une toiture conique. La façade principale aux fenêtres à meneau, aux linteaux néo-gothiques et aux lucarnes à frontons pignons, possède un avant corps en légère saillie. Deux tourelles en encorbellement reposent sur de gros contreforts.","habitants":"Plaine; famille de Vaucelles                                                     Savigny; famille de Cougny \r\n        \"","divers":"Château de la Plaine grav 1 à 4, de la Saires grav-5, de Savigny-Levescault grav 7","gps":"","images":["../image/image_86/86_Savigny_Faye_1.jpg","../image/image_86/86_Savigny_Faye_2.jpg","../image/image_86/86_Savigny_Faye_3.jpg","../image/image_86/86_Savigny_Faye_4.jpg","../image/image_86/86_Savigny_Faye_5.jpg","../image/image_86/86_Savigny_Faye_6.jpg","../image/image_86/86_Savigny_Faye_7.jpg"]},"Consult_chateau_formulaire7c16-2":{"id":"Consult_chateau_formulaire7c16-2","dept":"86","canton":"Civray","commune":"Sommières du Clain","nom":"Sommières_Clain","type":"Château","periode":"XVII","histoire":"Trois châteaux à Sommières dont celui de Sommières de Vareilles et du Parc à Romagne                                                                             SOMMIERES, l'aménagement du château actuel est attribué à Jules Hardouin Mansart sans preuve sérieuse. Le bâtiment résulte de travaux entrepris de 1673 à 1687 par la famille de Langlade, proche de Mazarin et de Fouquet,   Il a été construit entre 1673 et 1687 sur les plans de l'architecte Mansart, et selon la tradition, sur l'ordre de Louis XIV (1638-1715) pour y abriter l'exil de la marquise de Montespan.  le château aurait été destiné à accueillir Madame de Montespan qui s'installa en fait dans le château d'Oiron. Le domaine fut acquis par la famille de Labroue de Vareilles en 1722. Le château abrite une remarquable série de portraits des membres des familles de Rochechouart-Mortemart (Mme de Montespan et sa sur labbesse de Fontevraud entre autres) et de La Broüe de Vareilles Sommières , datant du XVIIe siècle au XXe siècle. Actuellement le domaine appartient au Marquis de Vareille-Sommière.                                                                                                                                 A cinq kilomètres à l'ouest à Romagne le château du Parc, le reste de la commune, la plus grande partie, dépendait de la châtellenie de Romagne dont les terres, unies à celles de la châtellenie de Champagné, appartenaient au chapitre de Saint-Hilaire de Poitiers. Puis la plupart des terres de la châtellenie de Romagne vont devenir le fief du Parc et de Boisvert dépendant du comté de Civray. Il semble quEtourloubier fut également un fief pendant un temps assez bref.","architecture":"VAREILLES  Le château domine le village.Le château de Sommières-du-Clain est inscrit comme M.H. depuis 1988, pour sa cour, ses communs, l'ouvrage fortifié, ses fossés, sa grille et le mur de soutènement, c'est un bâtiment d'apparence austère, protégé par des fossés secs et précédé de communs de fort belle allure. Les communs sont, aujourd'hui, occupés par une ferme. Le château se caractérise par sa sobriété toute classique et par l'équilibre de ses volumes.                                                                    PARC 1939, cest de nouveau la guerre. La commune accueille de nombreux mosellans évacués ainsi que lEcole Normale de Filles de Metz qui sinstalle au château du Parc. Après la défaite de 1940, les normaliennes et leurs professeurs, malgré les pressions allemandes, refuseront de regagner la Lorraine annexée et resteront au Parc jusquen 1945.","habitants":"Sommière; Jules Hardouin Mansart, famille de Langlade,\r\n        \"","divers":"à Sommières dont celui de Vareilles grav-1 à 4 et du Parc à Romagne grav 5- 6","gps":"","images":["../image/image_86/86_Sommi%c3%a8res_Clain_1.jpg","../image/image_86/86_Sommi%c3%a8res_Clain_2.jpg","../image/image_86/86_Sommi%c3%a8res_Clain_3.jpg","../image/image_86/86_Sommi%c3%a8res_Clain_4.jpg","../image/image_86/86_Sommi%c3%a8res_Clain_5.jpg","../image/image_86/86_Sommi%c3%a8res_Clain_6.jpg"]},"Consult_chateau_formulaire85e3":{"id":"Consult_chateau_formulaire85e3","dept":"86","canton":"Poitiers-5","commune":"Saint-Benoit","nom":"St_Benoit","type":"Château","periode":"XV-XIX","histoire":"A St-Benoit deux châteaux celui de St-Benoit et de Fief-Clairet.  ST BENOIT, au début du XIXe siècle un nouveau logis est bâti un peu plus au sud ainsi que des bâtiments de ferme autour de l'ancien logis. Le nouveau logis était un bâtiment rectangulaire à un étage, avec deux ailes latérales en rez-de-chaussée et couvertes en terrasse. Au tout début du XXe siècle, le château est remanié: ailes surélevées, toitures refaites, pour M. Lecointre, notable de Poitiers. Des boiseries, récupérées dans son hôtel de Poitiers, démoli pour faire place à l'ancien marché. Le parc, qui remontait autrefois jusqu'à La Mérigotte, est aménagé selon les plans de M. Boisard. Des espèces rares y sont plantées (cyprès d'Asie, cèdre, platane d'Orient). Deux kiosques en bois et torchis recouverts de chaume sont construits. Depuis 1993 le château appartient à la famille de Proyart de Baillescourt, Mme de Proyart étant une Lecointre. Le château est simple en profondeur, ses élévations sont couvertes d'un enduit imitant des bossages. Les couvertures du château, de l'ancien logis et des communs sont en ardoise.","architecture":"FIEF CLAIRET, la construction du château incombe à Charles Irland de Beaumont, issu d'une famille irlandaise installée en Écosse puis fixée à Poitiers à la fin du XVe siècle. Le bâtiment, d'une remarquable unité de style, se présente comme un rez de jardin sous comble, aux façades sobrement dessinées. Le corps de logis est flanqué de deux ailes en retour qui délimitent la cour d'honneur. Les lucarnes, alternativement à fronton et en il de buf, sont accostées de volutes discrètement baroques. L'étroitesse du corps de bâtiment pouvait gêner, d'autant que le comble brisé, s'il produisait un effet de majesté, restait inhabitable. Aussi, l'aile orientale fut-elle agrandie dans la seconde moitié du XVIIIe siècle. C'est alors l'apogée du domaine dont les bois proches sont aménagés en parc. Passé par filiation des Irland de Bazoges à la famille du Breuil Hélion de La Guéronnière, Le Fief Clairet a conservé son identité en dépit de son intégration au tissu urbain.","habitants":"St-Benoit; famille de Proyart de Baillescourt                                 Fief-Clairet; Charles Irland de Beaumont\r\n        \"","divers":"A Saint-Benoit deux châteaux celui de St-Benoit grav 1-2 et de Fief-Clairet grav 3-4.","gps":"","images":["../image/image_86/86_St_Benoit_1.jpg","../image/image_86/86_St_Benoit_2.jpg","../image/image_86/86_St_Benoit_3.jpg","../image/image_86/86_St_Benoit_4.jpg"]},"Consult_chateau_formulaire4014":{"id":"Consult_chateau_formulaire4014","dept":"86","canton":"Châtellerault-1","commune":"Saint-Genest d","nom":"St_Genest_Ambière","type":"Château","periode":"XII-XIV-XV","histoire":"Trois châteaux  à saint-Genest d'Ambière, celui d'Abin, de Pouet et de Puygarreau.                                                                                            ABIN,  seigneurie mentionnée dès 1390. La Seigneurie d'Abin était un fief de haute justice qui relevait du Duché de Châtellerault.                                                                                                                                                                                                                            POUET, il était possédé par la famille des Cars du Pouet, issu de Pierre Martin des Cars, chevalier, seigneur du Pouet et Elisabeth Perrine de Goussé sa femme. Le château, bien entretenu, possède une longue allée bordée de deux rangées d'arbres, menant jusqu'à la grille de la propriété.                                                                  PUYGARREAU, Fille de Henri II, demi-soeur de François II, Charles IX, Henri III et belle soeur d'Henri IV, Diane de France réunit en 1588 tous les notables de Châtellerault et servit d'intermédiaire entre Henri III et Henri de Navarre, futur Henri IV, de là, l'Edit de Nantes put être rédigé. Edifice inscrit aux M.H. par arrêté du 24 octobre 1988.","architecture":"ABIN Le logis est formé de deux bâtiments en L, tours médiévales jumelle de l'une de ses façades. A ce premier corps de bâtiment une seconde construction datant du XVIIe siècle est venue compléter l'ensemble actuel resté intact, avec son oratoire et ses douves alimentées par un ruisseau. Les façades ont été remaniées au XVIIIe siècle. L'intérieur conserve un escalier Louis XIII en pierre à balustres, un autre en bois de la même période, et une cheminée monumentale. La passerelle, qui enjambe les douves côté ouest, est de Gustave Eiffel, offerte par ce dernier en cadeau de mariage au propriétaire. L'accès à la cour d'honneur s'effectue par un pont à trois arches, du début du XVIIe siècle. Le portail à piliers ioniques date du XIXe siècle. Un gros pigeonnier rond en pierre de taille s'élève à l'ouest.                                                                                                           PUYGARREAU, datant du XIIe siècle, il a été fortifié à partir de 1434. C'est l'une des dernières demeures féodales édifiées dans la région. Le château possède en partie intact une salle de garde avec croisées d'ogives, un donjon contenant un puits, un escalier à vis, des douves sèches, de vastes caves voûtées pour l'extraction de tuffeau et un pigeonnier du XVIIe siècle. Ce château est isolé de la basse-cour par deux lignes de fossés, creusés dans le tuffeau, dans lesquels ont été aménagées les caves. En 1684, un procès-verbal donne une description des communs entourant le château, déjà livré à la ruine.\r\n   POUET,  le château actuel est constitué d'un corps de logis qui vient s'appuyer sur une tour à poivrière et des communs datant du XVe siècle. Cette tour possède un chemin de ronde intérieur, pour surveiller la vallée en contrebas.","habitants":"Seigneurie d'Abin.                                                                        Famille des Cars du Pouet.                                                      Puygareau; Fille de Henri II,\r\n        \"","divers":"à Saint-Genest d'Ambière, celui d'Abin grav 1 à 4, de Pouet  grav 5-6 et de Puygarreau grav 7-8.","gps":"","images":["../image/image_86/86_St_Genest_Ambi%c3%a8re_1.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_2.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_3.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_4.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_5.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_6.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_7.jpg","../image/image_86/86_St_Genest_Ambi%c3%a8re_8.jpg"]},"Consult_chateau_formulaire9010-2":{"id":"Consult_chateau_formulaire9010-2","dept":"86","canton":"Châtellerault-2","commune":"Saint-Gervais-les-Trois-Clochers","nom":"St_Gervais_3_Clochers","type":"","periode":"","histoire":"Trois châteaux à st-Gervais celui de Beaufort, d'Eschenaux de la Pasquerie et de Vigneaux  du XIXe siècle.                                                                                                 BEAUFORT relevait de la baronnie de La Touche et le lieu est connu depuis le milieu du XIVe siècle (1340), le mur d'enceinte et ses deux tours carrées peuvent remonter à cette époque. Une imposante tour porche, construite au XVIIe siècle, au toit en pavillon pourvu d'une lucarne à fronton en segment d'arc permet l'accès à la cour du logis. Parties agricoles du XIXe siècle.                                                    TOUCHE, le lieu dit est mentionné dès 1065. En 1464, le site est occupé par une forteresse ancienne environnée de douves et dépendante du duché de Châtellerault. Les bâtiments actuels semblent avoir été reconstruits au XVIIIe siècle. Joseph Cadet, munitionnaire du Roi au Canada, rentré après 1763, achète plusieurs propriétés dans le Châtelleraudais, dont La Touche le 27 janvier 1767. Après sa mort, La Touche d'Avrigny sera adjugée à Paris le 24 mars 1792.","architecture":"LA PASQUERIE, au milieu du XVIe siècle, les archives de la baronnie de Luain mentionnent le fief de La Pasquerie. S'il y avait là un logis, il a été remplacé au XIXe siècle par un château moderne dont l'architecture est très représentative du goût de l'époque, avec un beau parc à l'anglaise entouré d'arbres centenaires                                                                                                         TOUCHE, actuellement la propriété est divisée en trois parties et un chemin coupe la cour par le milieu, le logement sud-est a été remanié dans le quatrième quart du XXe siècle et la partie centrale des communs ouest a été détruite. Cour rectangulaire fermée au nord par un mur et entourée de corps de bâtiment sur les trois autre côtés. Le corps de logis principal, à sous sol et deux étages carrés, occupe l'angle nord ouest. Des dépendances se développent en bordure est et ouest de la cour et deux logements, à un étage carré, s'élèvent symétriquement en bordure sud de cette cour. Le pilier d'un ancien portail est conservé en bordure nord.","habitants":"Touche; Joseph Cadet\r\n        \"","divers":"St-Gervais  46° 54' 06\" nord, 0° 24' 30\" est. celui de Beaufort grav 4. Escheneau grav 6 . la Pasquerie grav de 1 à 3.  Vigneaux grav 5  Touches grav 7.","gps":"","images":["../image/image_86/86_St_Gervais_3_Clochers_1.jpg","../image/image_86/86_St_Gervais_3_Clochers_2.jpg","../image/image_86/86_St_Gervais_3_Clochers_3.jpg","../image/image_86/86_St_Gervais_3_Clochers_4.jpg","../image/image_86/86_St_Gervais_3_Clochers_5.jpg","../image/image_86/86_St_Gervais_3_Clochers_6.jpg","../image/image_86/86_St_Gervais_3_Clochers_7.jpg"]},"Consult_chateau_formulaire5d65":{"id":"Consult_chateau_formulaire5d65","dept":"86","canton":"Chasseneui du Poitou","commune":"St-Julien d","nom":"St_Julien_Ars","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à St-Julien celui de St-Julien dt celui de Jardres.                                                                             ST-JULIEN d'ARS, au Xe siècle, la terre, devenue la seigneurie de Saint Julien, appartenait à Ebles Manzer, comte de Poitou. A sa mort, la comtesse Angèle, son épouse, en fit don au monastère de la Sainte Trinité de Poitiers. Un acte d'hommage conservé dans le chartier du monastère fut rendu le 20 décembre 1310 par Guillaume Cléret. L'édifice y est désigné \"maison noble et hostel des Clairetz\". En 1687, le château et la terre passent à la famille de St-Varant, et par mariage, à la famille de La Frémaudière. Un acte d'hommage du 27 juillet 1762, cite messire René Augsutin Boinet seigneur de la maison noble du fief de Clariet à Saint Julien. Joseph Boinet vend le domaine à M. Pallu du Bellay en 1805, et par la suite, la fille de ce dernier le vendra à M. Cadoret de Beaupréau. Celui-ci cédera le château en 1861 à Mme la comtesse de Beauchamp, née Lanet. Le logis semble avoir été presque entièrement reconstruit vers 1867. L'escalier en vis de l'aile est porte les dates de sa restauration : 1906-1907. Vers 1960, le château est acheté par une communauté de bénédictines qui l'occuperont jusqu'en 1999.","architecture":"ST-JULIEN d'ARS,  le logis semble avoir été presque entièrement reconstruit vers 1867. L'escalier en vis de l'aile est porte les dates de sa restauration : 1906-1907, le château présente un corps de bâtiment rectangulaire, couvert d'un toit à longs pans à croupes, cantonné d'échauguettes à toit conique. Sur les élévations nord et sud sont greffés deux pavillons rectangulaires , les quatre de taille différente. Le corps central est desservi par un escalier intérieur, tournant à retours avec jour, en pierre. L'aile Est, dite le donjon, est desservie par un escalier en vis en pierre. Quelques pièces ont conservé leurs boiseries, leurs cheminées et leurs sols du XIXe siècle. Un salon du rez-de-chaussée a un plafond à caissons peint aux armes de la famille de Beauchamp. La bibliothèque a conservé tout son aménagement.                                                                                                       JARDRES, de styles classique, corps de logis rectangulaire à deux niveaux  et attiques toit  en croupes accolés de pavillons aux extrémités de même niveaux","habitants":"Famille de St-Varant\r\n        \"","divers":"Château de st-Julien et de Jardres à St-Julien d'Ars","gps":"","images":["../image/image_86/86_St_Julien_Ars_1.jpg","../image/image_86/86_St_Julien_Ars_2.jpg","../image/image_86/86_St_Julien_Ars_3.jpg"]},"Consult_chateau_formulairea13e-2":{"id":"Consult_chateau_formulairea13e-2","dept":"86","canton":"Civray","commune":"St_Martin d","nom":"St_Martin_Ars","type":"Château","periode":"XV-XVIII","histoire":"ST-MARTIN D'ARS, le château est élevé pour l'essentiel en deux temps, au XVe et au XVIIIe siècles. Se sont succédé en qualité de seigneur Pierre de Salignac en 1483, Julien Le Buf, Jacques de Greaulme, puis Jean de Moussy en 1609. Les Lambertye donnent à l'édifice sa physionomie actuelle. En 1789, le comte de Lambertye est député de la noblesse du Poitou aux États généraux.                                                                                                                 L'ABBAYE, la fondation royale de labbaye de chanoines de Saint-Augustin est attribuée par la tradition à lun des maris dAliénor dAquitaine, Louis VII ou Henri II Plantagenêt.","architecture":"ST_MARTIN D'ARS, la vaste avant-cour, limitée par une grille dessinant de savantes inflexions, fermée aux abords de la cour d'honneur par des portails latéraux et dotés d'ailerons à volutes, contribue à en anoblir cette belle demeure. L'aile de communs atteste la vocation agricole du domaine. Des douves en eau se déversant dans le Clain circonscrivent une plate-forme que cantonnent de hautes tours,  les meurtrières furent transformées en canonnières et une salle de la tour sud ouest convertie en chapelle. Le logis est un bâtiment rectangulaire appuyé aux deux tours qui regardent la rivière. La confrontation entre l'héritage médiéval et les principes de la composition classique a produit une uvre d'architecture équilibrée et harmonieuse.                                                                                                                            ABBAYE, le XIIIe siècle fût une ère prospère au monastère ; mais la guerre de cent ans, les guerres de religion et la révolution nont pas permis à labbatiale de résister ; alors que deux ailes du bâtiment monastique du XVIIIe siècle ont été consolidées et habitées. A la Révolution, labbaye fut vendue comme bien national et transformée en demeure privée.","habitants":"le comte de Lambertye\r\n        \"","divers":"Château de Saint-Martin et Abbaye","gps":"","images":["../image/image_86/86_St_Martin_Ars_1.jpg","../image/image_86/86_St_Martin_Ars_2.jpg","../image/image_86/86_St_Martin_Ars_3.jpg","../image/image_86/86_St_Martin_Ars_4.jpg","../image/image_86/86_St_Martin_Ars_5.jpg","../image/image_86/86_St_Martin_Ars_6.jpg","../image/image_86/86_St_Martin_Ars_7.jpg","../image/image_86/86_St_Martin_Ars_8.jpg","../image/image_86/86_St_Martin_Ars_9.jpg"]},"Consult_chateau_formulaire8f54-2":{"id":"Consult_chateau_formulaire8f54-2","dept":"86","canton":"Lussac les châteaux","commune":"St-Maurice la Clouère","nom":"St_Maurice_Clouère","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à saint-Maurice de Clouère celui de l'Audonière, de Galmoisin de la Guillonière, de la Vacherie et du Pin.                                                                         AUDONNIERE, le château de l'Audonnière est un château bâti à Saint Maurice-la-Clouère,  Au XVe siècle, se trouvait un château féodal qui appartenait à la « Dame de L'Audonnière ». Ce château fut remplacé au XVIIIe siècle par ce nouveau château de plaisance Louis XV situé dans un parc et surplombant un canal alimenté par la Clouère. \r\nLa VACHERIE, la plus ancienne mention d'un seigneur de La Vacherie remonte à 1552, la terre appartient alors à Antoine de Couhé dont la famille possède encore le domaine en 1573. Le château adopte un plan rectangulaire, cantonné sur sa façade sud de trois tours circulaires. L'une d'entre elles, située à l'extrémité Ouest, et le corps de bâtiment qu'elle flanque sont de construction récente, ils ont été édifiés au début du XXe siècle par Paul Chevallier Rufigny dans un style néo-Renaissance. En revanche les deux autres tours et le bâtiment qu'elles encadrent semblent remonter au XVe siècle comme l'attestent les canonnières obstruées. La chapelle seigneuriale primitive fut détruite et remplacée au début du XIXe siècle par une construction accolée au logis. Les abords de la demeure furent modifiés: une grange fut bâtie au nord en 1818.","architecture":"GALMOISIN La construction du château de Galmoisin date de la 2eme moitié du XVIIe siècle. Le logis est  fermée par une cour délimitée au Nord et au Sud, par 2 ailes plus basses de communs, celle du Sud se termine par une chapelle. A la fin du XIXe siècle, le logis a été agrandi au sud. Les intérieurs ont été remaniés à la fin du XVIIIe siècle et au XIXe. construit au XVIIe siècle pour des notables poitevins. Une grille en fer forgé donne accès à une cour d'honneur. Il est possible de visiter les extérieurs du château : la terrasse, les écuries, la sellerie, est inscrit aux M.H. depuis le 13/11/1989                                                               PIN  attestée dès le XIe siècle, la Terra dei Pino abrite un grand château dont la construction de certaines parties semble remonter au haut Moyen-Age. A la fin du XIXe siècle, la propriété était aux mains du baron du Verrier et vivait une période d'opulence. L'élément le plus ancien est une tour rectangulaire pourvue d'un toit en croupe couvert de tuiles plates, datable du XIe siècle. Faiblement éclairée, elle conserve l'allure d'un donjon. Au dessus du deuxième niveau, ses murs portent encore la trace des hourdis de bois caractéristiques du Moyen-Age, qui auraient supporté un chemin de ronde. Aux XVe et XVIe siècles, un corps de bâtiment lui a été accolé sur l'un de ses côtés. Sa toiture à longs pans couverts de tuiles plates est divisée au milieu de sa longueur. La façade donnant sur la Clouère est percée de huit travées de baies dont certaines ont gardé leur traverse de bois, cette aile se termine par une haute tour circulaire couverte d'un cône d'ardoise.","habitants":"Dame de L'Audonnière                                                                      La Vacherie; Famille Antoine de Couhé                    Galmoisin; seigneur local\r\n        \"","divers":"à Saint-Maurice de Clouère : 46° 22' 47\" Nord, 0° 24' 46\" Est. celui de l'Audonière grav 1, de Galmoisin grav 2-3 , de Guillonière grav -7 de la Vacherie grav 5-6 et du Pin grav -4.","gps":"","images":["../image/image_86/86_St_Maurice_Clou%c3%a8re_1.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_2.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_3.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_4.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_5.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_6.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_7.jpg","../image/image_86/86_St_Maurice_Clou%c3%a8re_8.jpg"]},"Consult_chateau_formulaire6b26":{"id":"Consult_chateau_formulaire6b26","dept":"86","canton":"Civray","commune":"Saint-Pierre d","nom":"St_Pierre_Exideuil","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à saint-Pierre d'Exideuil celui de Leray et celui d'Estang.                                                                                                                 ESTANG, dans les archives de la famille Jousserant, on trouve mention de L'Estang à l'extrême fin du XVIe siècle.                              LERAY  Un porche monumental, fortifié par un registre de mâchicoulis, surgit des frondaisons et annonce le château campé sur un promontoire dominant la Charente. La devise surmonte la porte piétonne \"Spes mea deus. Fait en 1605\" dénote la sensibilité huguenote de Jean Jousserand, qui exerça un temps la capitainerie de Civray. Le fief fut maintenu dans cette famille du XIVe siècle jusqu'en 1718. D'autres inscriptions millésimées, gravées sur une lucarne de l'imposante tour-pigeonnier: \"Refait à la suite des merveilleuses misères de 1572 à 1573\" et sur le fronton de la porte du logis: \"je suis refait l'an 1611\", révèlent l'ampleur de la reconstruction qui accompagna et suivit les guerres de Religion. Le colonel  Hugues  de Boudemange 1923 - 1988   Berndette Andrave née de Coudenhove 1946 - 2003 Henri de Coudenhove 1920 - 2008.","architecture":"LERAY, de l'édifice le plus ancien reste une haute tour d'angle sur laquelle s'appuient deux bâtiments en équerre délimitant une cour intérieure. C'est depuis la rivière que se saisit le mieux l'articulation générale : l'aile la plus longue, assise sur le soubassement rocheux, se développe en hauteur, l'étroitesse de la tour signale la présence d'un escalier en vis accessible par une porte Renaissance en anse de panier.                                                                                                                      ESTANG  à l'extrême fin du XVIe siècle, mais il n'est question que d'une maison rurale. Le château aurait été bâti au XIXe siècle sur les ruines d'une construction féodale, si la période de construction est exacte, l'existence d'un château primitif n'est pas prouvée. Un portail à portes piétonnière et charretière permet d'accéder à une cour encadrée de bâtiments de dépendances, prolongés par une tour-porche monumentale. Celle-ci bien que portant la date 1768, appartient à la campagne de construction du XIXe siècle et la pierre datée pourrait être un réemploi. Le château consiste en un corps de logis rectangulaire, flanqué d'une tour circulaire couverte d'une poivrière d'ardoise posée sur les faux mâchicoulis dans l'un de ses angles. Ce bâtiment est prolongé par un autre corps de logis massif au toit en terrasse couronné d'une sorte de chemin de ronde crénelé sur mâchicoulis, ce qui lui donne quelque peu l'aspect d'un donjon.","habitants":"Estang ; Colonel  Hugues  de Boudemange.                        Leray ; famille Jousserant,\r\n        \"","divers":"à Saint-Pierre d'Exideuil celui de Leray grav -1-2-3 et celui d'Estang grav 4-5","gps":"","images":["../image/image_86/86_St_Pierre_Exideuil_1.jpg","../image/image_86/86_St_Pierre_Exideuil_2.jpg","../image/image_86/86_St_Pierre_Exideuil_3.jpg","../image/image_86/86_St_Pierre_Exideuil_4.jpg","../image/image_86/86_St_Pierre_Exideuil_5.jpg"]},"Consult_chateau_formulaire6f05-2":{"id":"Consult_chateau_formulaire6f05-2","dept":"86","canton":"Montmorillon","commune":"St-Pierre de Maillé","nom":"St_Pierre_Maillé","type":"Château","periode":"XV-XVI","histoire":"trois châteaux à la Roches de Maillé celui de la Roche de Gué  de la Boutinière et des Cottets.                                                                        ROCHE à GUE,  était le siège d'un ancien fief avec haute justice qui relevait de la baronnie d'Angles. Guillaume de Couhé avec N. Aguayt, héritière de La Roche Aguayt vers 1290, la seigneurie passa aux Couhé et ceux ci la conservèrent jusqu'au milieu du XVIIe siècle, puis on y trouve la famille Thiauge et, à la fin du même siècle les de Laage. Au milieu du XVIIIe siècle, les d'Harembure en sont seigneurs et, peu avant la Révolution, la Roche-Aguet appartient à la famille de Margeret.                                                           BOUTINIERE, était un fief avec droit de haute justice qui dépendait de La Motte d'Usseau et dont l'existence est attestée dès le début du XIVe siècle.                                                                                                    DES COTTETS, pas d'information historique.","architecture":"BOUTINIERE, au milieu des champs, la vieille bâtisse a conservé une haute tour accolée à la façade.                                                                                                                 DES COTTETS, a été construit au XIXe siècle dans le style des châteaux Renaissance. A proximité du château, la grotte des Cottets, fouillée à plusieurs reprises.                                                   ROCHE à GUE, on doit attribuer l'apparence actuelle du château aux XVe et XVIe siècles, le corps de logis principal a deux niveaux sur sa façade Est. Il est cantonné d'un pavillon en retour d'équerre à l'angle sud-est. Il est couvert d'une haute toiture à deux pans en ardoise. Une haute tour ronde au toit conique d'ardoise, pourvue d'un lanternon, se trouve à l'angle nord-ouest ; elle est prise entre le bâtiment et une aile en retour d'équerre en saillie. L'édifice surplombe la Gartempe et jouit d'un point de vue exceptionnel sur le moulin qui partage son nom.","habitants":"Roche;  famille Thiauge\r\n        \r\n        \"","divers":"à la Roches de Maillé; 46° 45' 22,68\" Nord 0° 52' 26,76\" Est;            celui de la Roche de Gué  de la Boutinière grav 1 et des Cottets grav-2.","gps":"","images":["../image/image_86/86_St_Pierre_Maill%c3%a9_1.jpg","../image/image_86/86_St_Pierre_Maill%c3%a9_2.jpg","../image/image_86/86_St_Pierre_Maill%c3%a9_3.jpg"]},"Consult_chateau_formulaire352b":{"id":"Consult_chateau_formulaire352b","dept":"86","canton":"Montmorillon","commune":"Saint-Pierre de Maillé","nom":"St_Pierre_Maillé_II","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Saint-Pierre de Maille celui de la Guittière et celui de Jutreau.                                                                                                                              GUITTIERE  était un fief de haute justice qui dépendait de La Roche-Aguet. Au XVIe siècle, il a été la propriété de François Bizeau, écuyer, seigneur de La Guittière. Il est transmis ensuite, par alliance, à Pierre de La Tousche d'Avrigny. En 1701, Hubert de La Tousche, écuyer et seigneur de la Guitière épouse Marie Couhé de Lusignan. Le château est devenu par héritage la propriété de la famille d'Hardivilliers.\r\nJUTREAU  Il est fait mention du château en 1250. Guy de Corbière  y habitait. Cet ancien fief dorigine féodale, relevait de la baronnie dAngles.","architecture":"GUITTIERE,  construit au XIVe siècle, puis remanié au cours des siècles, au dessus d'un site creusé de grottes à priori occupées depuis le paléolithique supérieur. En 1792, le domaine est vendu comme bien national. Deux restaurations complètes ont été menées, l'une en 1887 par l'architecte de Roques, l'autre de 1893 à 1906 par Auguste Martin. Une petite aile au sud ainsi que trois tours, s'articulent sur le corps de logis principal de la fin du Moyen-Age, marqué par les interventions néo-gothiques de style Troubadour. Plus au sud, une chapelle à nef unique fut construite à la fin du XVe siècle. Un grand mur d'enceinte et une porte monumentale contrôlaient le flanc sud ouest de la falaise. Ce mur formait un angle et se prolongeait vers le nord en intégrant une tour ronde. A l'ouest subsistent également les restes d'une tour massive.                                                                       JUTREAU, il comprenait le château la tuilerie, la ferme et le moulin. C'est un imposant château de style médiéval dont la construction date du XVe siècle. Ses tours ont été bâties au XIIIe siècle. C'est au XVe siècle que sera construit le pavillon oriental.Le pavillon le plus ancien, au Nord-Est de lensemble des bâtiments, remonte  au XVe siècle. Le grand corps de bâtiment fut repris à différentes époques. Le château de Jutreau est inscrit au titre des M.H. depuis le 17/04/1935.","habitants":"Guittière; famille d'Hardivilliers,                                                       Jutreau,Guy de Corbière \r\n        \r\n        \"","divers":"à Saint-Pierre de Maille celui de la Guittière grav 1-2-3 et celui de Jutreau grav-4.","gps":"","images":["../image/image_86/86_St_Pierre_Maill%c3%a9_II_1.jpg","../image/image_86/86_St_Pierre_Maill%c3%a9_II_2.jpg","../image/image_86/86_St_Pierre_Maill%c3%a9_II_3.jpg","../image/image_86/86_St_Pierre_Maill%c3%a9_II_4.jpg"]},"Consult_chateau_formulaire3853":{"id":"Consult_chateau_formulaire3853","dept":"86","canton":"Châtellerault-2","commune":"Sérigny","nom":"Sérigny","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Sérigny celui de Launay de la Touche et Saint-Bonnet.                                                                                                                  LAUNAY, on pénètre dans une avant cour bordée de deux ailes de communs, couverts d'une toiture à deux pans. Deux pavillons symétriques constitués d'un étage et couverts en pavillon en marquent le départ ; l'aile gauche se termine par une grosse tour, ornée d'une corniche de mâchicoulis décoratifs, abrite la chapelle. Au seuil de la cour d'honneur, des douves en eau cernent la plate-forme sur laquelle est bâti Launay. Ce château aurait été construit au XVIe siècle sur des bases anciennes, mais les façades actuelles présentent une belle restauration du XIXe siècle. Le corps de logis de deux niveaux, surmonté d'une toiture à croupes. Une porte centrale est l'élément riche de la façade, avec ses ébrasements ornés de petites colonnes, son ouverture en anse de panier, ses larges voussures reposant sur de petits culots.                                                                                                                 TOUCHE, cité en 1427, le château de La Touche est composé d'une cour fermée encadrée de communs sur trois côtés et fermée par le corps de logis principal. Le logis, d'une élévation de deux étages carrés, est coiffé d'un toiture à croupes en ardoise. Un pavillon  l'accoste en saillie sur la cour. C'est une belle demeure édifiée au XVIIe siècle, datable grâce à ses lucarnes à fronton arrondi et ailerons, et à ses fenêtres en arc surbaissé. La volumétrie des lucarnes et le dimensionnement des fenêtres assurent une construction typique du XVIIe siècle.","architecture":"Saint-BONNET, anciennement tour de Germigné, le château devint celui de Saint-Bonnet avec sa reconstruction à la fin du XVe siècle. De cette époque, le château a conservé son volume, et une façade fortifiée à l'est. Le grand corps de logis est-ouest de deux niveaux est couvert d'une haute toiture d'ardoise à deux pans. A l'est, son pignon est flanqué de deux belles tours rondes en encorbellement, ces tours sont couronnées de mâchicoulis portés par de superbes consoles à triple ressaut, formant le chemin de ronde. Le même dispositif se poursuit sur le pignon joignant les deux tours. Une toiture à l'impériale couvre la tour sud, en opposition à la toiture conique de la tour nord-est, très simple; elle abrite un escalier. Des canonnières alternent avec de petites baies rectangulaires dans les parements des tours de petites archères alternent avec des créneaux et des lucarnes à fronton dans le chemin de ronde. Les fenêtres du pignon Est ont conservé leur décor de pilastres. Tous ces éléments architecturaux rendent aimable cette construction guerrière, et confirment la Renaissance.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Sérigny celui de Launay grav -1 à 5  de  Saint-Bonnet grav-6-7-8  et la Touche grav 9.","gps":"","images":["../image/image_86/86_S%c3%a9rigny_1.jpg","../image/image_86/86_S%c3%a9rigny_2.jpg","../image/image_86/86_S%c3%a9rigny_3.jpg","../image/image_86/86_S%c3%a9rigny_4.jpg","../image/image_86/86_S%c3%a9rigny_5.jpg","../image/image_86/86_S%c3%a9rigny_6.jpg","../image/image_86/86_S%c3%a9rigny_7.jpg","../image/image_86/86_S%c3%a9rigny_8.jpg","../image/image_86/86_S%c3%a9rigny_9.jpg"]},"Consult_chateau_formulaire3cad":{"id":"Consult_chateau_formulaire3cad","dept":"86","canton":"Châtellerault","commune":"Châtellerault","nom":"Targé","type":"Château","periode":"XVI","histoire":"TARGE, Dame Jeanne de Targé prend en mains le devenir du château et grâce à la fortune de ses trois maris,  Au XVIe, la famille des Turpin de Crissé réaménage intérieurement le château qui, faute de moyens financiers va à nouveau subir de graves dommages. A partir de 1763, le marquis Louis Nicolas de Pérusse des Cars, déjà propriétaire de Monthoiron, entreprend la rénovation de lédifice pour en faire une demeure dagrément. Ce qui existe actuellement est le château quont connu le marquis et sa femme. En 1793, à la vente des biens nationaux, le château est vendu à la fi
