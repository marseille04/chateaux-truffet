              BIERSON, cité dès 1489 dans un fief appartenant à l'abbaye de Bonnevaux, relevant de la châtellenie de Vivonne. Le château aurait brûlé au XIXe siècle, mais a été reconstruit entre 1850 et 1856, en conservant quelques éléments de l'édifice plus ancien, par la famille Majou de la Rousselière. L'élévation principale ouest est de style néo-XVIIe mêlé à quelques éléments de style néo-XVIIIe et présente deux pavillons latéraux en avancée sous toiture à croupe assortie de lucarnes en il-de-buf. Le corps de logis central est découpé par un pavillon hors uvre sommé d'une haute toiture. A l'intérieur, l'édifice présente des salons et salles à manger lambrissés et un escalier en bois tournant éclairé par un vitrail réalisé au début du XXe siècle, présentant une femme nue à sa toilette, est une des rares oeuvres exécutées dans le domaine civil par le maître verrier parisien Henri Carot.                                                                                                    BONNETIERE  début du XVIe siècle, le flef des Bonnetières relevait de la châtellenie de Clavière. Il subsiste aujourd'hui, portant le nom de cette ancienne seigneurie, un château ne paraissant pas antérieur au XIXe siècle.                                                                                 MARCAY, le château primitif fut construit autour des années 1150, dévasté par les huguenots, il est restauré à partir de 1597.","architecture":"BONNETIEREs, il s'agit d'une haute construction rectangulaire à trois niveaux apparents, recouverte d'un toit d'ardoise à croupes et présente trois travées d'ouvertures. On accède à la porte d'entrée après avoir gravi quelques marches de pierre. De part et d'autre, lui sont accolés deux pavillons carrés couverts à l'identique. Chacun de ces pavillons est un peu plus bas que le corps de logis principal et présente une travée de baies sur deux niveaux, le 3ème est éclairé par une lucarne.                                                  BONNEVAUX, une partie fut démolie, le reste a été transformé en château aux XVIIIe et XIXe siècles incluant l'ancienne galerie du cloître. Ce vaste château, à deux niveaux couvert d'ardoise, se compose d'un corps de logis flanqué de part et d'autre d'une aile saillante à ses deux extrémités. Les deux ailes renferment des salles voûtées et des escaliers en vis, les ouvertures et sa façade furent modifiées au XIXe siècle. Les murs du logis, percés d'ouvertures en travée, sont dépourvus de décoration, peut-être par respect du lieu. La galerie du cloître est accolée à la face nord du corps de logis principal.                                                     MARCAY, entouré autrefois de douves, qui subsistent en partie à l'est, précédé au nord par une vaste cour entourée de communs, le château est constitué par un bâtiment principal qui se développe entre deux grosses tours cylindriques, couronnées d'un chemin de ronde avec créneaux et mâchicoulis. Du côté sud, deux ailes en retour d'équerre s'ajoutent au bâtiment principal, aboutissant chacune à une tour polygonale. Percements et toitures ont été refaits au XVIIe siècle. vestiges de fossés à l'est. Au sud-ouest, escaliers remaniés.","habitants":"Bierson; famille Majou de la Rousselière.\r\n        \"","divers":"à Marcay dont celui de Marcay grav-1-2-8-9, de Bierson grav -4 5 de la Bonnetieres grav-6, la Badenière grav 3 et de Bonnevaux grav 5-6 .                                                                  Marcay 46° 27' 49\" nord, 0° 13' 51\" est","gps":"","images":["../image/image_86/86_Marcay_1.jpg","../image/image_86/86_Marcay_2.jpg","../image/image_86/86_Marcay_3.jpg","../image/image_86/86_Marcay_4.jpg","../image/image_86/86_Marcay_5.jpg","../image/image_86/86_Marcay_6.jpg","../image/image_86/86_Marcay_7.jpg","../image/image_86/86_Marcay_8.jpg","../image/image_86/86_Marcay_9.jpg"]},"Consult_chateau_formulaireaccf":{"id":"Consult_chateau_formulaireaccf","dept":"86","canton":"Lusignan","commune":"Sanxay","nom":"Marconnay","type":"Château","periode":"XIV","histoire":"MARCONNAY, date du XVe siècle. Il est à la fois de style gothique et de style Renaissance. La seigneurie de Marconnay était aux mains de la famille Lévesque de 1369 au moins jusqu'en 1683. Puis, par achat, elle entra dans les possessions de Charlotte de Vernoux, jusqu'en 1719. Charlotte de Vernoux était une des dames de compagnie de Mme de Montespan. À cette date, il est ravagé par un incendie. Le château est alors, laissé aux mains des fermiers généraux, la poterne et le corps de logis sont classés comme M.H. depuis 1929 tandis que les douves, le pont, les parties bâties correspondant aux courtines l'ont été en 2005. Il a été classé M.H. en 1929 et 2005","architecture":"MARCONNAY, isolé par des douves en eau, le château consiste en une enceinte quadrangulaire abritant le logis et les dépendances. Un pont dormant en pierre à deux arches franchit les douves et donne accès au pavillon d'entrée. Ce dernier, coiffé d'un toit bombé couronné d'un édicule, compte deux portes en plein cintre, l'une charretière et l'autre piétonne. Il était initialement protégé par deux ponts-levis à flèches et défendu par des mâchicoulis. Le pavillon d'entée date du XVIIe siècle. Deux tours circulaires flanquent la muraille et sont munies de canonnières datées du XVe siècle. Le logis comprend un corps de bâtiment rectangulaire du XVe siècle qui s'appuie contre une tour d'escalier polygonale ainsi qu'une aile en retour d'équerre inachevée, élevée au XVIIe siècle. Celle-ci présente une très belle porte d'entrée, cantonnée de deux fines colonnes qui supportent un entablement et deux fenêtres à meneaux dont une lucarne, encadrées de pilastres cannelés.","habitants":"Famille Lévesque \r\n        \"","divers":"Château de Marconnay","gps":"","images":["../image/image_86/86_Marconnay_1.jpg","../image/image_86/86_Marconnay_2.jpg","../image/image_86/86_Marconnay_3.jpg","../image/image_86/86_Marconnay_4.jpg"]},"Consult_chateau_formulaire8150":{"id":"Consult_chateau_formulaire8150","dept":"86","canton":"Jaunay-Clan","commune":"Marigny-Brisay","nom":"Marigny_Brisay","type":"Château","periode":"XIV-XVI-XVII","histoire":"MARIGNY-BRISAY;  on trouve 8 autres châteaux et 6 manoirs     Quatre châteaux à Mailleterie, de la Tour de Signy du Cour du Puy et de Mare.  \r\nMAILLETERIE, est mentionné dès le XVIIe siècle, de puissants contreforts épaulent l'enceinte du logis encore défendu par une imposante tour cylindrique à poivrière couverte d'ardoise. Cette tour classée aux M.H. articule un double bâtiment de tuffeau a vocation défensive. Le site fut sans doute un relais des templiers si lon en croit les trois tombeaux découverts dans lune des caves attenantes. Acquis en 1809 par Marianne Baillet. La propriété appartient actuellement à Pierre Brochet. Le château a été la propriété d'un peintre allemand célèbre, Paul Loskill qui y avait installé son atelier.                                                                                            MONTFAUCON,  une première construction remontant sans doute au XIVe siècle, aujourd'hui vestiges                                             TOUR DE SIGNY, un document de 1123 fait état dune paroisse nommée Margniaco, un autre évoquant la \"Ecclesia de Margniaco Juxta Castrum Bellimontis\" en 1133. La paroisse devint Marigny-Brizay en 1733.  Du château de La Tour Signy, détruit au XIXe siècle, subsiste un magnifique portail monumental qui correspond au style Henri IV. La beauté des vestiges encore visibles laisse imaginer la richesse architecturale du château lui-même, contrastant ainsi avec la relative sobriété des châteaux et manoirs voisins.","architecture":"COUR du PUY  remontent aux XVe et XVIIe siècles ; une pierre portant la croix de Malte est datée 1643. La propriété comporte des communs, des parties agricoles et un pigeonnier. un étage carré escalier hors-oeuvre ; escalier en vis : calcaire toit à longs pans\r\nMARE, les origines remontent au XVIe siècle. Le domaine a souvent changé de mains et aussi d'aspect au cours des temps. Il a appartenu à Nicolas de sainte-Marthe qui fut échevin de Poitiers en 1613 et lieutenant général de la sénéchaussée. Le bâtiment actuel a été bâti en englobant un petit manoir dénommé le petit fou. Une tour hexagonale, dont le mouvement tournant des baies dénote la fonction, se dresse sur l'élévation nord. Elle appartient, ainsi que la partie attenante à deux étages, au petit manoir du XVIe siècle. Son escalier en vis introduit à une chambre dont la cheminée est ouvragée dans le style Louis XIII. Le logis principal donne au sud sur des jardins à la Française et un vaste panorama. La façade d'exécution soignée, porte la marque du classicisme, les lucarnes et les ils de buf, répartis en alternance et remontés au XIXe siècle, interrompent la corniche. On voit dans la cour nord un imposant pigeonnier carré surmonté d'un clocheton. Plusieurs métairies y étaient rattachées ainsi que des bois et vignes, signes de sa vocation agricole.","habitants":"Mailleterie Marianne Baillet\r\n        \"","divers":"MARIGNY-BRISAY;  Mailleterie grav-8, de Montfaucon grav 4-5-6 ,  Cour du Puy grav -7  de Mare grav 2-3.","gps":"","images":["../image/image_86/86_Marigny_Brizay_1.jpg","../image/image_86/86_Marigny_Brizay_2.jpg","../image/image_86/86_Marigny_Brizay_3.jpg","../image/image_86/86_Marigny_Brizay_4.jpg","../image/image_86/86_Marigny_Brizay_5.jpg","../image/image_86/86_Marigny_Brizay_6.jpg","../image/image_86/86_Marigny_Brizay_7.jpg","../image/image_86/86_Marigny_Brizay_8.jpg"]},"Consult_chateau_formulaire008f":{"id":"Consult_chateau_formulaire008f","dept":"86","canton":"Jaunay-Clan","commune":"Marigny- Brizay","nom":"Marigny_Brizay_II","type":"Château","periode":"XIV-XVI-XIX","histoire":"Dans cet article trois châteaux celui des Roches (voir article), Lavauguyot, Bourg-Joly et la Fuye.                                                          La FUYE, ce château est une massive construction carrée flanquée de tours aux angles et entourée deau. Laile gauche porte la date 1710 et laile droite la date 1572, un écusson chargé de trois merlettes est fréquemment répété sur les lucarnes. Ce fief était possédé au XVe siècle par Huet Bureau, dont la fille Jeanne épousa Jean dAvailloles en 1463. En 1533, le seigneur était Georges de Razilly et de 1559 à 1591 ce fief appartenait aux de Leignes, suivant un aveu rendu à Jeanne de Montmorency, veuve de Louis de la Trémoille, par François de Leignes seigneur de la Fuye, gentilhomme de la maison du roi, celui-ci reconnaissait tenir de la dame de Berrie à foi et hommage simple à un roussin de service à nuance dhomme \"ma maison et place forte de la Fuye, il avait haute, moyenne et basse justice.  La seigneurie fut cédée le 18 avril 1591 par François de Leignes à Léonard Langlois, sieur de Bel Estat, gentilhomme servant de la reine mère du Roi, il fut assassiné à Oiron, le 7 décembre 1605.                                                                                                                                                                              LAVAUGUYOT,  la passion d'un scientifique, Mr Brochet, versée dans l'oenologie, a convaincu plusieurs personnes.                         VALETTE,  ancienne maison-forte, transformée à la Renaissance, puis au XVIIIe siècle et entièrement remaniée au XIXe siècle, le corps de logis a conservé dans sa partie Est d'anciens murs de refend, mais a perdu à l'autre extrémité une aile. Deux élévations, dotées d'un étage carré et d'un comble habitable, la façade sud affiche une ordonnance tout en simplicité, la façade sur cour doit son effet monumental à une tour-escalier hexagonale à la double fonction utilitaire et symbolique. La porte, sommée d'un entablement et d'un fronton à coquille, est une reconstitution qui s'inspire de vestiges authentiques situés dans le parc.","architecture":"BRIZAY, le logis et la ferme ont été construits au XIXe siècle. Il subsiste également des vestiges d'un ancien bâtiment pouvant dater du XVe siècle. Propriété qui possède trois hectares de vignes du Haut-Poitou a été délaissée par son propriétaire américain. En effet les vignes sont revenues à l'état sauvage, envahies de végétation ; le propriétaire préférant l'élevage de chiens, mais depuis la saisie médiatique d'une soixantaine de chiens et de chiots, il doit s'expliquer en justice sur la détention sans autorisation d'une meute très importante.                                                                            BOURG-JOLY, c'est un petit château construit au XIXe siècle, de plan symétrique, à l'allure très classique, composé d'un corps de bâtiment central encadré de deux tours carrées, au toit en pavillon, faisant légèrement saillie. Les deuxième, et les troisième niveaux sous combles sont séparés par un bandeau de pierre. Le gros-oeuvre de calcaire et revêtement, élévation ordonnancée, surmontée d'un toit à longs pans et croupe. Couverture : tuile mécanique, ardoise et tuile creuse                                                       FUYE, ce château est une massive construction carrée flanquée de tours aux angles et entourée deau. Laile gauche porte la date 1710 et laile droite la date 1572, un écusson chargé de trois merlettes est fréquemment répété sur les lucarnes,  de style Louis XIII  qui a été sérieusement remanié à la fin du XVIIIe siècle, juste après la Révolution. Issus de la riche bourgeoisie locale, les nouveaux propriétaires se sont attachés à donner un nouvel éclat au domaine en modifiant le bâtiment. C'est essentiellement sur la façade que l'architecte de l'époque a concentré ses efforts, dénaturant quelque peu le château.             LAVAUGUYOT de plan symétrique élévation ordonnancée  deux étages carrés, calcaire , toit à longs pans  en croupe en  ardoise et tuile creuse.","habitants":"Roches; Familles De Lalande\r\n        \r\n        \"","divers":"Bourg-Joli grav 1              Fuye  grav 2-3      Lavauguyot grav 4 Roches  grav 5               Valette grav 6                 Tourette grav 7","gps":"","images":["../image/image_86/86_Marigny_Brizay_II_1.jpg","../image/image_86/86_Marigny_Brizay_II_2.jpg","../image/image_86/86_Marigny_Brizay_II_3.jpg","../image/image_86/86_Marigny_Brizay_II_4.jpg","../image/image_86/86_Marigny_Brizay_II_5.jpg","../image/image_86/86_Marigny_Brizay_II_6.jpg","../image/image_86/86_Marigny_Brizay_II_7.jpg"]},"Consult_chateau_formulaire0b9c":{"id":"Consult_chateau_formulaire0b9c","dept":"86","canton":"Châtellerault-2","commune":"Vellèches","nom":"Marmande_86","type":"forteresse","periode":"XII","histoire":"MARMANDE, est une des plus importantes et plus anciennes forteresses de la région. Son premier seigneur, Acharie, se rencontre en 1070. Les barons de Marmande appartenaient aux plus puissantes familles de Touraine, parmi les huit vassaux directs de l'évêque de Tours. Parmi eux, Louis de Navarre, maréchal de France en 1365, et Jean de Sancerre, sénéchal en 1385. Au XVIe siècle, Bonaventure Gillier, écuyer, rend hommage pour la baronnie de Marmande à François 1er, sa famille y demeure jusqu'en 1730 date à laquelle Marc René de Voyer d'Argenson achète la seigneurie. Elle restera dans sa famille jusqu'au début du XIXe siècle.","architecture":"MARMANDE, la construction primitive date du XIe siècle: il semblerait qu'il en reste les fossés, les tours et le mur d'enceinte au Nord et à l'Ouest. Ce mur est particulièrement épais comme on peut le constater dans la maison d'habitation. De la deuxième période de construction date le donjon carré, un corps de logis lui fut accolé. Une guette octogonale du XIVe siècle affirmait par sa hauteur tant sa fonction de surveillance que la puissance de la baronnie.","habitants":"Louis de Navarre,                                                                           Marc René de Voyer d'Argenson \r\n        \"","divers":"Vestige et tour à Marmande","gps":"","images":["../image/image_86/86_Marmande_86_1.jpg","../image/image_86/86_Marmande_86_2.jpg","../image/image_86/86_Marmande_86_3.jpg","../image/image_86/86_Marmande_86_4.jpg","../image/image_86/86_Marmande_86_5.jpg"]},"Consult_chateau_formulairef167":{"id":"Consult_chateau_formulairef167","dept":"86","canton":"Vivonne","commune":"Marnay","nom":"Marnay_86","type":"Château","periode":"XIV","histoire":"Trois châteaux  à Marnay le château de Gué,   de la Maugue, du Bois Coursier, et de la Touche.                                                                                                         MAUGUE, la première mention de la seigneurie date de 1447, un premier château, qui relève du château Larcher, fut acquis à la famille Taveau par un certain Jacques Jude, de la bourgeoisie poitevine des échevins ou maires de Poitiers. En 1504 Madeleine Jude, héritière, épouse Pierre de Montsorbier qui devient alors seigneur de Maugué et leur petite-fille, Renée de Montsorbier l'apportera, en 1538, à son époux, Florent de Blom, seigneur de Chambon, d'Écrouzilles et autres lieux, et restera pendant trois siècles à Maugué. Les terres dépendantes de la seigneurie de Maugué se trouvent dans les paroisses de Château-Larcher, Marnay et Vivonne. La dernière héritière, Louise Caroline de Blom, apporte le domaine à Emmanuel Hunault de La Chevalerie qu'elle épouse en 1830. Après leur mort, vers 1875, leurs héritiers vendent Maugué à la famille de Beauregard dont la présence est assez brève avant que s'installent les ancêtres des propriétaires actuels.                                  GUE, en 1470, cet édifice appartenait à la famille Dumont, pour passer, à la fin du XVIe siècle, à la famille Aubanneau. En 1654, François Aubanneau vend le Gué à Gaspard Riguet, procureur au présidial. Sa petite fille épouse de Claude François Boynet en hérite vers 1715. Le domaine devient propriété de la famille de Cressac en 1785 et les actuels occupants en sont les descendants.  le deuxième château qui date  de Gaspard Riguet du XVIIe siècle construit par le vicomte de madame la marquise du Lau  née Madeleine de Cressac et héritière du Gué.","architecture":"BOIS-COURSIER, aux XIIe et XIVe siècle, la propriété appartenait à Barthélémy ou Jean de Boiscourcier. A la fin du XIVe siècle, la seigneurie est acquise par la famille Rivaud, seigneur d'Ayron. Ils y resteront jusqu'au milieu du XVIIe siècle malgré les changements de noms car l'héritage s'étant fait par les filles essentiellement. En 1689, Bois-Coursier est acheté par Gaspard Riguet , sa fille Antoinette-Amice, épouse en 1696 François Boynet, seigneur de la Touche. En 1785, Bois Courcier devient la propriété de la famille de Cressac qui la conservera jusqu'aux environs de 1870, date où le domaine est vendu.                                                                                                GUE,  la façade est coupée en son centre par une tour. De chaque côté de la façade, à l'est se trouve un pigeonnier et à l'ouest une chapelle. Le second château fut édifié peu après 1850 par le volonté de madame la marquise du Lau,  ce château, dit le château neuf, de dimensions modestes, mais d'allure rappelant un certain style romantique à la mode de l'époque, est situé un peu en retrait, à l'ouest de l'ancien château.                                                                           TOUCHE, c'est un peu avant 1450 que la terre de la Touche fut la propriété de Jarnet Gervain. Sa nièce Ythière Gervain en hérita et l'offrit à son mari Jean Favereau. Il fit construire pour son fils Michel, le premier château de la Touche, au XVIe siècle. Le château ira en 1604  à  Renée d'Elbenne, qui l'offrit à son fils, qui vécu au château et le fit réaménager. Le château de la Touche restera en bon état jusqu'à la fin du XIXe siècle puis il fut démoli et reconstruit. Le château de la Touche appartient depuis à la famille Cressac.","habitants":"Maugué  famille de Beauregard.                                     Famille de Pierre de Montsorbier                                                 Bois, famille de Jean de Boiscourcier\r\n        \"","divers":"à Marnay le château de Gué grav 1-2,   de la Maugue grav 5-6, du Bois Coursier grav 3-4, et de la Touche grav 7.    Touche 46° 23' 49\" Nord, 0° 20' 36\" Est","gps":"","images":["../image/image_86/86_Marnay_86_1.jpg","../image/image_86/86_Marnay_86_2.jpg","../image/image_86/86_Marnay_86_3.jpg","../image/image_86/86_Marnay_86_4.jpg","../image/image_86/86_Marnay_86_5.jpg","../image/image_86/86_Marnay_86_6.jpg","../image/image_86/86_Marnay_86_7.jpg"]},"Consult_chateau_formulaire4ba7":{"id":"Consult_chateau_formulaire4ba7","dept":"86","canton":"Vouneuil sous Biard","commune":"Quincay","nom":"Masseuil_Quincay","type":"Château","periode":"XV","histoire":"MASSEUIL la forteresse de Masseuil fut construite à partir de 1443 dun commun accord entre le chapitre Saint-Hilaire le Grand, les habitants de Masseuil et Rémi dAnjou, roi de Jérusalem et de Sicile. Un traité passé le 7 avril 1443 latteste. Cette forteresse permit au chapitre de Saint-Hilaire, alors parvenu à son apogée, de mettre à labri ses gens et ses biens les plus vulnérables.","architecture":"MASSEUIL, à lorigine, la forteresse comprenait une vaste enceinte, entourée de douves profondes, une porte fortifiée avec un pont-levis, et des bâtiments à lintérieur, servant de refuges. Le château fut démoli vers 1580 puis reconstruit peu après. Deux tours denceinte sont encore dépoque  du XVe siècle  et sont classées à lInventaire des M.H.","habitants":"chapitre de Saint-Hilaire\r\n        \"","divers":"Château de Masseuil à Quincay","gps":"","images":["../image/image_86/86_Masseuil_Quincay_1.jpg","../image/image_86/86_Masseuil_Quincay_2.jpg","../image/image_86/86_Masseuil_Quincay_3.jpg"]},"Consult_chateau_formulairee866":{"id":"Consult_chateau_formulairee866","dept":"86","canton":"Lusignan","commune":"Lusignan","nom":"Mauprié_Cour","type":"Château","periode":"XV-XVII","histoire":"MAUPRIE, relevant du château de Lusignan, Mauprié faisait partie d'un réseau de succursales organisé autour de la maison mère de Lusignan. Il fut à l'origine une maison-forte destinée à servir d'avant poste à la forteresse de Lusignan. Le 23 août 1379, Guyon Gourjault, seigneur de Mauprié et de La Gonterie, avoue tenir du duc d'Auvergne et de Berry, comte de Poitou, à cause du château de Lusignan, à foi et hommage à de Mortemain, un hébergement à Mauprié, des cens et coutumes en la ville de Lusignan et au Payré, Maisoncelle, un hébergement à la Gonterie, six hébergements à Jazeneuil, les villages de la Rémondière et de la Jumeau, le lieu de la Sagrie, le moulin de Jazeneuil et l'hommage  de Georges Charel prête-aumônier de la maison Dieu de la Font de Cé. En 1402, Jean Gourjault est le seigneur de Mauprié. Il épouse en 1406 la fille de Louis de Fesdeau, seigneur de la Millière. Leur fils Jehan, hérita en 1429 de la seigneurie de la Millière. En 1520, un autre Jean Gourjault devient seigneur de la Millière et de Mauprié. Sous la tutelle de sa mère, Catherine Régnier, il est élevé par cette dernière dans les idées nouvelles de la Réforme. La famille Gourjault demeurera à Mauprié jusqu'à la deuxième moitié du XIXe siècle, il n'a cessé d'appartenir à sa descendance. Il s'élève sur l'emplacement d'une ancienne maison-forte du XIVe siècle. Un incendie survenu dans la nuit du 26 au 27 octobre 1800 ravage Mauprié.","architecture":"A cinq KM au nord-ouest a Jazeneuil le château de la COUR, est inscrit comme M.H. depuis 1937 pour son élévation. C'est une demeure fortifiée du XVe siècle ou une maison forte plus quun château. Il occupe une position en surplomb des méandres de la Vonne. Le logis de la Cour est implanté sur une ancienne villa romaine. L'entrée  se fait par une vaste grille dont les montants supportent des vases de pierre du XVIIIe siècle. En face, bâtiment avec, au centre, une tour ronde faisant saillie. A gauche, servitudes dans lesquelles sont engagés six corbeaux XVIIIe siècle et un linteau. A droite, autres servitudes avec deux corbeaux du XVIIIe. Ces corbeaux représentent une tête de bélier, un lapin rongeant une feuille, une tête de boeuf, une tête de lion, une tête humaine portant des lunettes, une tête barbue et une tête de démon. Le linteau représente deux sirènes dans une couronne de feuillage.                                        MAUPRIE, un nouveau château ne tardera pas à voir le jour, établi vers 1836, Mauprié possède un nouveau logis. C'est un édifice de plan rectangulaire, flanqué aux angles de deux pavillons carrés et présente cinq travées de baies régulières sur deux niveaux d'habitation. Les sous combles sont éclairés par des lucarnes à frontons ronds. A l'entrée du château,  présente un colombier à pied rond, il présentait un nombre important de boulins disposés depuis le rez-de-chaussée jusqu'en haut de l'édifice. Au début du XXe siècle, M. Delaballe fait ajouter un étage, percer le grenier de lucarnes et remplace les tuiles par de l'ardoise.","habitants":"Mauprié; famille de  Jean Gourjault                                       La Cour, seigneur local\r\n        \"","divers":"Château de Mauprié et de Cour à Jazeneuil","gps":"","images":["../image/image_86/86_Maupri%c3%a9_cour_1.jpg","../image/image_86/86_Maupri%c3%a9_cour_2.jpg"]},"Consult_chateau_formulaire40af":{"id":"Consult_chateau_formulaire40af","dept":"86","canton":"Lussac les châteaux","commune":"Queaux","nom":"Messelière","type":"Vestiges","periode":"XII-XIX","histoire":"MESSELIERE,  la forteresse fut attaquée par surprise par Guy de Blom, seigneur de Ressonneau, qui, après s'y être retranché, l'incendia et le détruisit en 1357. Reconstruit vers 1450 par Guy Frotier, est situé à la limite de la commune de Moussac-sur-Vienne, la date de la première construction du château de la Messelière est inconnue. La châtellenie appartient à la famille Faugère à partir de la seconde moitié du XIIIe siècle. Elle fut transmise par alliance vers 1420 à la Frotier de La Messelière, toujours propriétaire de nos jours.  inscrit comme M.H. depuis 1930. toujours propriétaire de nos jours.","architecture":"MESSELIERE, daterait de 1460 environ, de cette époque reste le donjon carré à trois étages flanqué aux angles de quatre tours couronnées de mâchicoulis, le logis attenant ne semble pas antérieur au XVIIe siècle. Ce donjon est construit dans la tradition de la fin du XIVe siècle issue du château de Vincennes; le retour au plan quadrangulaire, plus habitable, où les salles centrales sont desservies par des espaces résidentiels annexes logés dans les tourelles d'angle. Des réaménagements ont été entrepris au XVIIIe siècle: percement de grandes fenêtres, et création de terrasses et de jardins au pied du donjon. Abandonné au XIX siècle, en ruine, l'édifice a été restauré récemment. le donjon se présente actuellement comme une construction carrée à trois étages, flanquée aux angles par quatre tours rondes couronnée de mâchicoulis.                                 MOUSSAC, outre les logis de La Carte et des Roches du XVIe siècle pour leurs parties les plus anciennes), Moussac conserve quelques témoignages de ces périodes avec les deux pierres tombales de chevaliers anonymes (début XIIIe siècle), ornées dune épée et dune lance, actuellement sur la place de léglise ; lune dentre elles était conservée au XIXe siècle près du château des Roches.","habitants":"Messelère; famille Faugère\r\n        \"","divers":"Vestiges du château de Messelière","gps":"","images":["../image/image_86/86_Messeli%c3%a8re_1.jpg","../image/image_86/86_Messeli%c3%a8re_2.jpg","../image/image_86/86_Messeli%c3%a8re_3.jpg","../image/image_86/86_Messeli%c3%a8re_4.jpg","../image/image_86/86_Messeli%c3%a8re_5.jpg"]},"Consult_chateau_formulairef4ee":{"id":"Consult_chateau_formulairef4ee","dept":"86","canton":"Poitiers-4","commune":"Mignaloux-Beauvoir","nom":"Mignaloux","type":"Château","periode":"XVII","histoire":"deux châteaux à Mignaloux celui de Cigogne et de la Touches et de Beauvoir chambre d'hôtes de la famille  Hubau.                                                                           CIGOGNE, du XVIIe siècle, il a toutefois pu être élevé sur des éléments plus anciens, comme le laissent penser les restes d'escalier à vis dans le logis, et trois meurtrières à la base de la tour-pigeonnier. Pierre Roatin, seigneur des lieux, acquiert par échange avec le prieur de Mignaloux \"terre située devant la grande porte de la maison de la Cigogne\", ce qui laisse penser que la cour était déjà fermée par un portail. Le logis a fait l'objet de reprises au milieu du XIXe siècle, surtout au niveau de la toiture et de la lucarne côté Est qui porte la date 1853. L'aile nord des communs a disparu semble-t-il dès le XIXe siècle, il reste des ouvertures murées qui permettaient de passer de cette aile vers le logis. La tour pigeonnier qui terminait l'aile nord s'est effondrée en 1936 et n'a pas été reconstruite, mais l'ensemble a depuis été reconstruit à l'identique.                               TOUCHES, le lieu-dit des Touches est mentionné dès 1404, comme fief relevant de la Tour Maubergeon. Elles constituent une seigneurie, donnée par le duc de Berry, qui gouverne le Poitou de 1372 à 1416, à son receveur Jehan Macé également échevin de Poitiers. A la mort du duc de Berry, le roi de France reprit le Poitou, c'est à lui-même que les seigneurs des Touches durent faire hommage jusqu'à la Révolution. Les aveux qu'ils rendent au Roi indiquent que 3 autres domaines de Mignaloux Beauvoir dépendaient des Touches: le Deffend, les Rosiers et Beau-Bâton.","architecture":"TOUCHES, le logis du château est de plan en L, et comprend trois volumes distincts, notamment par leur toiture. Sur un corps de bâtiment allongé se greffe en retour à l'ouest, une aile le surmontant d'un niveau, et à l'est un pavillon à l'élévation similaire mais saillant aux deux tiers du corps principal. La partie centrale se distingue nettement par un traitement en pierre de taille tandis que le reste de l'édifice est en moellons. Son élévation sur cour présente six travées sur deux niveaux, avec des baies en plein cintre au rez-de-chaussée et des fenêtres rectangulaires à l'étage. L'élévation est couronnée par une balustrade, par rapport à laquelle la toiture est en retrait. Ce corps central se poursuit au delà du pavillon, mais cette fois avec élévation différente, plus simple, sans balustrade notamment. L'aile ouest et le pavillon qui encadrent cette partie centrale comportent trois et deux travées. Un premier étage est surmonté d'un étage de comble, ouvrant par des lucarnes pendantes; les toitures présentent une forte pente, avec de hautes cheminées et des épis de faîtage. Les élévations sur jardin font l'objet d'un traitement sobre. Une serre à structure métallique est accolée à l'aile ouest, vers le sud. A l'ouest du château, les communs présentent une architecture soignée et régulière. Au sud-est du château on observe une tour qui abritait peut-être un château d'eau. Plus au sud une mare rectangulaire aux bords empierrés subsiste, jouxtée au nord par un ancien potager clos de murs, ouvrant par un portail.","habitants":"Cigogne; famille Pierre Roatin\r\n        \"","divers":"à Mignaloux celui de Cigogne grav-3,  de la Touche grav 4 et de Beauvoir grav 1-2","gps":"","images":["../image/image_86/86_Mignaloux_1.jpg","../image/image_86/86_Mignaloux_2.jpg","../image/image_86/86_Mignaloux_3.jpg","../image/image_86/86_Mignaloux_4.jpg"]},"Consult_chateau_formulairefcbd":{"id":"Consult_chateau_formulairefcbd","dept":"86","canton":"Migné Auxances","commune":"Migné-Auxances","nom":"Migné_Auxances","type":"Château","periode":"XV-XVII","histoire":"A Migné deux châteaux  Auxances et Salvert.                                     AUXANCES, vers la fin du XIe siècle, Foucault, sire de la Roche, édifie un château. Au creux dun méandre de lAuxance, à lorée du village, le donjon contrôle le passage à gué de la rivière. Le fief relève de la Tour Maubergeon. Transmis au sein de la famille de La Roche-Foucault, l'édifice connaît à partir de 1434 maints propriétaires, différents statuts et plusieurs phases de construction.                                                                                                         SALVERT, mentionné en 1277, est un ancien fief relevant de l'abbaye de Montierneuf. L'édifice actuel date du XVIIe siècle et la chapelle fut bénie en 1706. En 1839, l'accès se fait à l'est, constitué d'une allée bordée d'arbres et l'organisation des bâtiments principaux est également celle que nous voyons actuellement, avec une cour bordée à l'ouest par le logis, entre deux ailes de communs séparées, celle du nord ouvrant à l'arrière sur une autre cour entourée de constructions.","architecture":"AUXANCES, construit à la charnière des XIe et XIIe siècles, le donjon dAuxances aux murs épais a été remanié. De plan carré, il sélève sur plus de dix mètres en six niveaux. Une tour descalier et une poivrière à toits coniques sont accolées à la structure coiffée dun toit à quatre pans. Au sommet le chemin de ronde sur mâchicoulis présente une alternance de meurtrières et de petites baies avec un décor de moulures. Au XVe siècle, le donjon et la basse-cour sont ceinturés de fausses-braies et de fossés. Durant les guerres de religion, le château est le théâtre de violents affrontements. Du XVIe au XVIIIe siècle, des bâtiments cantonnés de quatre tours viennent avoisiner le donjon, ce qui confère à lensemble lactuelle forme déquerre, de douves et dun pont-levis. En 1957, la communauté du Mont-Carmel en devient propriétaire el le convertit en monastère. Les bâtiments du château furent très modifiés lors de cette transformation.                                                  SALVERT est acheté en 1841 par Pauline Dauvilliers qui avec l'abbé Gaillard y installe en 1842 la congrégation des soeurs de Sainte-Philomène, transforme la propriété en colonie agricole pour orphelins. En 1846 l'aile nord des communs est surélevée pour accueillir un dortoir. Son rez-de-chaussée est remanié plus tard pour accueillir des logements. En 1882, le château compte 29 ouvertures et deux portes cochères. Une serre est élevée en 1887, puis une lingerie en 1889. Au nord-est, l'ancienne métairie, accueille un nouveau bâtiment en 1884.","habitants":"Auxances; Famille de La Roche-Foucault                                           Salvert; Famille de Pauline Dauvilliers \r\n        \"","divers":"A Migné-Auxances le château dit de Tour Pacques  grav 1 à 4, Salvert grav 5-6","gps":"","images":["../image/image_86/86_Mign%c3%a9_Auxances_1.jpg","../image/image_86/86_Mign%c3%a9_Auxances_2.jpg","../image/image_86/86_Mign%c3%a9_Auxances_3.jpg","../image/image_86/86_Mign%c3%a9_Auxances_4.jpg","../image/image_86/86_Mign%c3%a9_Auxances_5.jpg","../image/image_86/86_Mign%c3%a9_Auxances_6.jpg"]},"Consult_chateau_formulaire72e8":{"id":"Consult_chateau_formulaire72e8","dept":"86","canton":"Migné Auxances","commune":"Migné Auxances","nom":"Migné_Auxances_II","type":"Château","periode":"XIV","histoire":"MALAGUET,  est mentionné dès 1328. Il s'agit d'un ancien fief relevant de la Tour de Maubergeon, qui a appartenu à la famille Sauvestre, puis à celle des Pidoux dont les armes sont sculptées, avec la date gravée 1608, au-dessus d'un portail. En 1794, le domaine est vendu comme bien national. En 1839 il appartenait au général Demarçay, baron d'Empire et député de la Vienne, puis il passe à son fils Camille Demarçay, né en 1815, qui fut aussi député, puis maire de Migné Auxances en 1878 et en 1885. C'est lui qui fait construire le logis et réaménager la propriété.  Sur le plan cadastral de 1839, des constructions figurent à l'emplacement de la plupart des bâtiments actuels mais la cour était séparée en deux parties par un corps de bâtiment aujourd'hui détruit et le logis actuel, à l'écart au nord, n'existait pas.","architecture":"MALAGUET est un vaste domaine planté de nombreuses variétés d'arbres, traversé par l'Auxance et circonscrit par un long mur de clôture pourvu de cinq entrées constituées d'un portail à piliers en maçonnerie avec grille. Celui-ci est placé entre deux tours dont l'une présente des canonnières alors que l'autre, à droite, est pratiquement détruite. Une partie du long bâtiment établi à l'ouest de ce portail présente des baies à encadrement chanfreiné et un appui de fenêtre mouluré pouvant dater du XVe siècle. Un autre bâtiment à l'ouest, conserve une porte à linteau en accolade et une fenêtre à encadrement à cavet. Dans son prolongement se trouve une ancienne chapelle pouvant dater du XVIIe siècle.Les bâtiments sont dans la partie ouest du domaine, au-dessus de l'Auxance, une nouvelle construction est déclarée en 1856, il s'agit  du logis, au nord, dont une lucarne porte la date 1851. Une autre construction est déclarée en 1873. Dans la seconde moitié du XIXe siècle, une partie des bâtiments a été remaniée ou reconstruite, un séchoir à tabac et un réservoir d'eau sont édifiés. En 1882, la partie sud était déclarée avoir 19 ouvertures et une porte cochère et le logis au nord doté de 34 ouvertures. Au XXe siècle il a accueilli un foyer de jeunes filles.","habitants":"famille Sauvestre\r\n        \"","divers":"Château de Malaguet à Auxances","gps":"","images":["../image/image_86/86_Mign%c3%a9_Auxances_II_1.jpg","../image/image_86/86_Mign%c3%a9_Auxances_II_2.jpg"]},"Consult_chateau_formulaire0e6c-3":{"id":"Consult_chateau_formulaire0e6c-3","dept":"86","canton":"Civray","commune":"Château Garnier","nom":"Monchandy","type":"Château","periode":"XV-XVI","histoire":"MONCHANDY,  au fil des ans, être réunis sous la mouvance dun même seigneur, la châtellenie elle, restera jusquà la période Révolutionnaire rattachée au site du Pin. Se succéderont diverses familles nobles, les Couraud en 1600 et les Frotier propriétaires des lieux jusqu'à la fin du XVIIIe siècle.","architecture":"MONCHANDY, l'édifice, encore parfaitement conservé, napparaît dans les archives quau début du XVe siècle. Un fait ressort toutefois de lensemble des archives :  Le corps de logis principal, décalé par rapport à l'axe de l'entrée, est un bâtiment rectangulaire, flanqué de trois tours, dont l'une, donnant sur la cour intérieure, abrite un escalier en vis. Quelques encadrements chanfreinés ou moulurés, notamment celui d'une porte adjacente, entourée d'un tore en accolade et timbré d'un écusson muet, appartiennent au premier manoir, reconstruit dans le dernier tiers du XVIe siècle. L'intérieur a conservé des boiseries de style Louis XIII. Le même décor de panneaux à dessin géométrique se retrouve dans le pavillon d'entrée et dans le logis.","habitants":"Famille des Couraud\r\n        \"","divers":"Monchandy; 46° 15' 35\" nord, 0° 25' 36\" est","gps":"","images":["../image/image_86/86_Monchandy_1.jpg","../image/image_86/86_Monchandy_2.jpg"]},"Consult_chateau_formulairee5e4":{"id":"Consult_chateau_formulairee5e4","dept":"86","canton":"Loudun","commune":"Moncontour","nom":"Moncontour","type":"Vestiges tour","periode":"XII-XV","histoire":"MONCONTOUR, château fort construit par le comte Foulques Nerra au XIe siècle, et remanié au XVe siècle. Le château apparaît dans les textes vers 1119. Au XIIIe siècle, il est successivement la propriété des Lusignan, des Parthenay, des Sainte-Maure et passe au XIVe siècle à la famille Craon. Il est pris par Du Guesclin en 1372 et réparé,   Bertrand du Guesclin et Geoffroy Martel y écrivirent même de belles pages de lhistoire de France. Au XVe siècle, il est aux mains des Chabot, puis des Chastillon. Devenu au XVIe siècle le siège d'une baronnie relevant de Saumur, il voit, après la bataille de 1569, son rôle militaire s'estomper.","architecture":"MONCONTOUR, ancienne forteresse construite vers 1040 , le donjon de Moncontour est un véritable trésor du XIe siècle, rendu célèbre par les guerres et les sièges qui sy sont répétés au fil des siècles. La toiture, reconstituée dans le cadre de la restauration ainsi que lescalier intégré dans lépaisseur des murs sont à découvrir. Si la vue offerte depuis lesplanade constitue déjà un voyage, que peut-on dire alors du panorama proposé depuis le sommet. Abandonné peu à peu, il sert de carrière de pierres. Autour du donjon, vestiges du château et de l'église des XIIIe-XIVe siècles, avec un décor peint de la même époque.","habitants":"Famille Craon\r\n        \r\n        \"","divers":"Château-fort de Moncontour","gps":"","images":["../image/image_86/86_Moncontour_1.jpg","../image/image_86/86_Moncontour_2.jpg"]},"Consult_chateau_formulaire68d7":{"id":"Consult_chateau_formulaire68d7","dept":"86","canton":"Châtellerault-2","commune":"Mondion","nom":"Mondion","type":"gentilhommière","periode":"XV-XVIII","histoire":"MONDION, la première mention d'un seigneur à Mondion est trouvée en 1383, en la personne de Régnault de Mondion. En 1457, Tristan L'Hermite, prévôt de Louis XI, épousa Guillemette de Mondion et devint le seigneur du lieu. Aujourd'hui, on peut découvrir deux châteaux non loin de l'église, le château datant du XVe siècle, et une demeure du XVIIIe siècle. Tristan L'Hermite en fit édifier un pour chacun de ses fils, Pierre et Louis, qu'il leur légua en 1457.","architecture":"MONDION, cette gentilhommière est flanquée d'une tour d'escalier hexagonale portant sur un pan coupé une petite bretèche qui assure sa défense. L'escalier à vis est éclairé à chaque révolution par une petite fenêtre. La façade opposée possède, à son extrémité nord-est, une tour ronde, à mâchicoulis et crénelée, couverte d'un toit conique. La façade aux baies à meneaux moulurés, le grand comble droit à simple pignon et ses hautes cheminées lui confèrent une homogénéité rare. Au XVIIIe siècle, les seigneurs abandonnèrent le vieux château de Mondion, lui préférant un nouveau bâtiment, d'architecture assez simple, allongé, de deux niveaux percés de baies légèrement incurvées, coiffé d'un toit à la Mansart en ardoise percé de petites lucarnes. Le péristyle néo-classique à colonnes ioniques est venu au début du XIXe siècle solenniser l'entrée de la demeure.","habitants":"Famille de Tristan L'Hermite\r\n        \"","divers":"Gentilhommière  à Mondion","gps":"","images":["../image/image_86/86_Mondion_1.jpg","../image/image_86/86_Mondion_2.jpg","../image/image_86/86_Mondion_3.jpg"]},"Consult_chateau_formulaire1b29":{"id":"Consult_chateau_formulaire1b29","dept":"86","canton":"Chauvigny","commune":"Monthoiron","nom":"Monthoiron","type":"Château","periode":"XVII","histoire":"Trois châteaux à Monthoiron celui de Monthoiron de Brassioux de la Salle.\r\nLA SALLE mentionné en 1544, relevait de la baronnie d'Angles. Le château qui appartenait au XVIIIe siècle à la famille La Bussière, passe dans la deuxième moitié de ce siècle aux mains de la famille de Morin par le mariage de Marie-Rosalie de La Bussière avec Pierre de Morin.                                                                 BRASSIOUX, le fief de Brassioux dépendait de la baronnie de Monthoiron et il est mentionné dans les archives de cette seigneurie dans la première moitié du XVe siècle.                                     MONTHOIRON, occupé par la famille de Turpin Crissé jusqu'au XVIIIe siècle. En 1857, le château est victime d'un incendie.","architecture":"BRASSIOUX, imposant bâtiment rectangulaire, accosté de deux pavillons faisant saillie. Il présente trois niveaux apparents et un en surcroît sous les combles. Trois travées de baies régulières légèrement cintrées ouvrent sa façade à la lumière, les pavillons en comptent une. La séparation entre les premier et deuxième niveaux est joliment soulignée par une pierre finement sculptée entre les ouvertures. Le corps principal est pourvu d'un toit à deux pans et les deux pavillons de toits à croupes; l'ensemble est recouvert d'ardoise. La propriété comprend également un pigeonnier carré, au toit pyramidal orné d'un lanternon d'ardoise et d'une lucarne, dont le premier niveau est percé d'une porte charretière en plein cintre.                                   MONTHOIRON; seules subsistent les deux tours, la tour carrée en bon état et la tour ronde, à demi ruinée. La tour carrée située à l'angle sud ouest du château date du XVe siècle, au deuxième étage, se trouve une salle voûtée en berceau avec peintures murales du XVIe ou du XVIIe siècle . A quelques dizaines de mètres isolée, la tour ronde date probablement du XVIe siècle, elle possède trois niveaux desservis par un escalier à vis. Le château reconstruit au XIXe siècle, est composé d'un corps de logis et de deux pavillons, et présente en façade un décor assez disparate, avec des pilastres, de fausses corniches en damier, à métopes de carreaux de faïence et des mascarons circulaires                                                                                                                   La SALLE   Il se compose d'un corps principal cantonné de deux tours cylindriques imposantes et une aile en retour d'équerre. Les belles lucarnes à piédroits en volute et fronton triangulaire rehaussé d'une acrotère en boule, et les oculi en lucarne ornent la toiture de tout l'édifice, le colombier rond couronné d'une toiture originale porte la date 1633. Mais en revanche, il se pourrait que les deux tours à toiture en poivrière soient plus anciennes.","habitants":"La Salle; famille La Bussière                                      Monthoiron; famille de Turpin\r\n        \"","divers":"Château de Monthoiron grav 1-2, de Brassioux grav-3, la tour du fort grav-4  la salle grav 5","gps":"","images":["../image/image_86/86_Monthoiron_1.jpg","../image/image_86/86_Monthoiron_2.jpg","../image/image_86/86_Monthoiron_3.jpg","../image/image_86/86_Monthoiron_4.jpg","../image/image_86/86_Monthoiron_5.jpg"]},"Consult_chateau_formulairefb0c":{"id":"Consult_chateau_formulairefb0c","dept":"86","canton":"Montmorillon","commune":"Montmorillon","nom":"Montmorillon_86","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Montmorillon dont celui de Montmorillon, de la Lande, et de Grandmont.                                                                                                  MONTMORILLON, la ville apparaît vers 1080, et il est nécessaire pour le duc d'Aquitaine de contrôler la zone frontière entre Poitou, Marche et Limousin. Un château est bâti sur la falaise qui domine la Gartempe.                                                                            LA LANDE, appelé en premier le château des Goudon de Buf, il fut donné en dot aux Goudon de l'Héraudière, vers 1550, qui le gardèrent depuis et prirent le nom de Goudon de Lalande de l'Héraudière. Lieu de mémoire de la Résistance, lieu du Comité de Libération unifié de la Vienne le 4 août 1944, il propose de nombreux documents allant du XVe siècle à 1945. Sa place dans l'histoire, il l'a acquise lors de la Seconde Guerre mondiale, devenant le QG de maquis du Montmorillonnais.  Le châtelain Guy Goudon de La Lande,  Son père, officier d'artillerie capturé en 1940, étant toujours prisonnier en Allemagne. La propriété est dans la famille depuis 1670.                                                                                         GRANDMONT, le 5 juin 1209, Itier, seigneur de Magnac, donne au prieur de Grandmont tous ses droits sur un terrain sis au bord de la Gartempe ayant appartenu à sa grand-mère, Anaïs, épouse de Bertrand de Montmorillon. Les bâtiments restants furent vendus à la fin du XVIIe siècle à M. Douadic, Conseiller du Roi près la Sénéchaussée. Puis, le bien fut vendu à M. Bastide de Rancon qui le vendra en 1733 à M. Viguier des Cosses.","architecture":"MONTMORILLON, se compose d'une motte encore parfaitement identifiable.  La tour-porte située au sud de la chapelle Saint-Laurent est le seul vestige de ces fortifications; elle est défendue par une bretèche. Sa physionomie, notamment la voûte du rez-de-chaussée, autorise une datation du XIVe siècle; la tourelle d'escalier a été rajoutée au XVe siècle. En février 1523, renforcement de  quatorze tours et sept portes. Une tour fut construite vers 1880 par M. l'abbé Chabant sur l'emplacement de l'ancien château féodal de Montmorillon. Rénovation en 1960.                                                                              GRANDMONT, le corps de logis rectangulaire encadré de deux ailes en saillie de Mme Vassor, contiguës au bâtiment subsistant. La porte est couronnée d'un fronton cintré brisé enserrant deux blasons, la façade donne sur une 1ère cour à laquelle on accède par une porte charretière encadrée de deux portes piétonnes, dont une murée. Deux longs corps de bâtiment viennent s'appuyer contre l'aile ouest.                                                                                            La LANDE; maison forte dont la construction date du XVIe au XIXe siècle. Elle fut transformée en château néogothique au XIXe siècle. Au XVIe siècle,  se composait d'une maison rectangulaire, appuyé pour une de ses façades contre une grosse tour carrée et sur l'autre, à une tour ronde abritant un escalier à vis. Les travaux de réfection de 1875 respectèrent les deux tours et le pigeonnier à mâchicoulis. Le château n'est pas protégé aux M.H.","habitants":"Lande ;Famille de Goudon de l'Héraudière                        Grandmont; Famille de Bertrand de Montmorillon\r\n        \"","divers":"à Montmorillon   46° 23' 51\" Nord et 0° 54' 08\" Est                                 Montmorillon grav 1-2-3, de la Lande grav 5-6, et de Grandmont grav 4.","gps":"","images":["../image/image_86/86_Montmorillon_86_1.jpg","../image/image_86/86_Montmorillon_86_2.jpg","../image/image_86/86_Montmorillon_86_3.jpg","../image/image_86/86_Montmorillon_86_4.jpg","../image/image_86/86_Montmorillon_86_5.jpg","../image/image_86/86_Montmorillon_86_6.jpg"]},"Consult_chateau_formulairee847":{"id":"Consult_chateau_formulairee847","dept":"86","canton":"Vouneuil sous Biard","commune":"Montreui-Bonnin","nom":"Montreuil_Bonnin","type":"Vestiges-Forteresse","periode":"XI-XV-XVIII","histoire":"MONTREUIL-BONNIN, au XIe siècle possession des comtes de Poitou, passe au XIIe siècle au Plantagenet en 1204 entre dans la mouvance des rois de France. En tout état de cause il existait en 1235 ou 1238, date d'une inscription qui y a été gravée en hébreu par un prisonnier juif, un certain Samuel de Baslou. En 1346 le château est brûlé par le comte de Derby et les ouvriers de l'atelier sont pendus aux créneaux, mais en 1375, Du Guesclin reprend Montreuil-Bonnin aux Anglais. Jean, duc de Berry, achète le château en 1377 et à sa mort en 1416, Montreuil-Bonnin revient à la couronne de France. En 1423 Charles VII donne le château à un capitaine écossais, Laurent Vernon, pour payer la rançon d'un de ses proches. Le château est incendié trois fois par les troupes d'Henri IV pendant les guerres de religion au XVIe siècle. Le comte de Malicorne, royaliste, assiège le château tenu par les rebelles ligueurs en 1593.Le logis élevé au XVe siècle par les Vernon, sera remanié au XVIIe siècle lorsqu'il deviendra la propriété des Saint Simon de Courthomer, après avoir été aux de La Noue. La terre, confisquée au comte d'Artois exilé, sera vendue en 1795 à Claude-Marie Bonnefond qui, afin de récupérer les matériaux démolira les charpentes, les couvertures, les parties supérieures des tours et des courtines, ainsi que le logis médiéval. A la Révolution en 1793, En 1836, le château fut sauvé de la ruine totale par Félix Dupuis-Vaillant qui l'acquit afin d'en assurer sa restauration.","architecture":"MONTREUIL-BONNIN, cette forteresse adopte la forme d'un quadrilatère irrégulier, au XIIIe siècle reconstruction du Donjon de 33 mètres de haut,  l'ensemble à la forme d'un quadrilatère assez régulier, domine la rive gauche de la Boivre et offre sur la face sud un escarpement utilisé comme défense naturelle. Dans l'histoire médiévale, les châteaux-forts avaient une fonction militaire primordiale. Par sa position stratégique la forteresse de Montreuil-Bonnin remplissait la fonction de bouclier pour la ville de Poitiers, l'enceinte de la forteresse est flanquée de cinq tours cylindriques, elle avait aussi un rôle défensif car le château abritait un important atelier monétaire  A la Révolution en 1793, vente et démantèlement du château. Du logis médiéval détruit, ne subsistent plus que deux élégantes fenêtres géminées. on accède au château par un châtelet d'entrée cantonné par deux tours semi-circulaires. l'édifice à conservé ses deux étages et sa terrasse ainsi que les rainures dans lesquels venaient se loger les flèches du pont-levis, les bâtiments  encore habités aujourd'hui construit au XVe siècle dont le corps principal est éclairé par des baies à meneaux, comporte un rez-de-chaussées et deux étages et un comble orné d'une élégante lucarne, à l'extrémité ouest une terrasse crénelée.","habitants":"Famille de Saint Simon de Courthomer et  Félix Dupuis-Vaillant \r\n        \"","divers":"Vestiges à Montreuil Bonnin","gps":"","images":["../image/image_86/86_Montreuil_Bonnin_1.jpg","../image/image_86/86_Montreuil_Bonnin_2.jpg","../image/image_86/86_Montreuil_Bonnin_3.jpg","../image/image_86/86_Montreuil_Bonnin_4.jpg","../image/image_86/86_Montreuil_Bonnin_5.jpg","../image/image_86/86_Montreuil_Bonnin_6.jpg"]},"Consult_chateau_formulaire9d08-2":{"id":"Consult_chateau_formulaire9d08-2","dept":"86","canton":"Loudun","commune":"Monts sur Guesne","nom":"Monts_Guesne","type":"Château","periode":"XIII-XV-XIX","histoire":"Trois châteaux à Monts sur Guesne celui de la Gillardière, de Monts de Beaumont et de la Maurinière.                                         BEAUMONT, dans la deuxième moitié du XVe siècle, la famille de La Lande, devenue propriétaire de la seigneurie par alliance avec la famille de Brisay, transforma le donjon défensif en demeure confortable, afin de l'habiter.   Au XVIIe siècle,  le château abandonné par la famille de Neufchèze, seigneur de Baudiment, fut démantelé.                                                                         MONTS, un seigneur de Monts est mentionné dès le début du XIIe siècle. La seigneurie est au XIIIe siècle dans la famille des Odart qui en est propriétaire jusqu'au début du XVe siècle. Le château accueille en mars 1480 le Roi Louis XI qui accorde peu après, le droit de chastel et chastellerie et haute justice. La construction de la tour ronde et de l'aile principale sud, témoignent de cette période fastueuse vers 1500. La terre de Monts est achetée, vers 1589, par Louise de Savonnières, épouse de Martin du Bellay. Charles du Bellay, endetté, doit céder en 1651 son château à Madeleine de Savonnières, veuve d'Isaac Frézeau de la Frézelière. La terre est érigée en marquisat en 1655.","architecture":"La MAURINIERE,  est une belle petite demeure dont la construction ne semble pas remonter au-delà du XIXe siècle. La Maurinière présente une façade cantonnée de tours circulaires à poivrières d'ardoise et une travée centrale en saillie desservie par un perron à balustrade.                                                               BEAUMONT, le donjon de Beaumont a été bâti dans un but défensif, avec des murs de plus de deux mètres d'épaisseur.  Une tour carrée hors uvre, contenant un escalier dans une cage octogonale, fut ajoutée. L'encadrement de la porte et les consoles des marches d'escalier sont ornés de sculptures caractéristiques du gothique flamboyant. A l'intérieur, les pièces furent séparées en deux pour plus de confort.                   GILLARDIERE   de plan en U à deux niveaux toit en croupe avec lucarnes, tours ronde en angle intérieure.                                                                                                           MONTS,  remarquable de la fin du XVe siècle, serti dans la belle pierre blanche de tuffeau. Le style gothique est représenté par la façade nord richement ouvragée et la tour de l'escalier où l'on peut découvrir une exceptionnelle frise sculptée représentant des scènes de chasse. On peut y découvrir également une très belle tour de guet et une charpente de grande facture.","habitants":"Beaumont ;  famille de La Lande                                          Monts; famille des Odart\r\n        \"","divers":"à Monts sur Guesne celui de la Gillardière grav 9, de Monts grav 5-6-7, Beaumont grav 1 à 4 ,  la Maurinière grav-8.","gps":"","images":["../image/image_86/86_Monts_Guesne_1.jpg","../image/image_86/86_Monts_Guesne_2.jpg","../image/image_86/86_Monts_Guesne_3.jpg","../image/image_86/86_Monts_Guesne_4.jpg","../image/image_86/86_Monts_Guesne_5.jpg","../image/image_86/86_Monts_Guesne_6.jpg","../image/image_86/86_Monts_Guesne_7.jpg","../image/image_86/86_Monts_Guesne_8.jpg","../image/image_86/86_Monts_Guesne_9.jpg"]},"Consult_chateau_formulairecd36":{"id":"Consult_chateau_formulairecd36","dept":"86","canton":"Chauvigny","commune":"Valdivienne","nom":"Morthemer","type":"Forteresse","periode":"X-XIII-XIX","histoire":"MORTHEMER, du Xe siècle jusqu'à la Révolution, trois grandes familles vont posséder le domaine, par le jeu des héritages. Depuis 936, les Morthemer sont cités comme signataires, donateurs ou souscripteurs, dans de nombreuses chartes d'Abbayes. Leur signature apparaît toujours après celle des Vicomtes. Au XIIIe siècle, le château est transmis à la famille Sénéchal. Ensuite il revient en 1347 à la famille Taveau par Jean Taveau, Conseiller du Duc de Berry. Cette famille resta propriétaire du domaine plus de trois siècles. En 1993, le château a été vendu à un descendant de la branche cadette des Taveau, Antoine Duchalard de Taveau, toujours propriétaire à ce jour. Le château a fait l'objet d'une restauration au XIXe siècle, les travaux ont été confiés, à partir de 1865 par le baron Soubeyran, financier et député, à l'achitecte Boeswillwald, disciple de Eugène Viollet-le-Duc. En 1993, le château a été vendu à un descendant de la branche cadette des Taveau?: Antoine Duchalard de Taveau, toujours propriétaire à ce jour.","architecture":"MORTHEMER,  date du XIIe siècle, mais il a fait l'objet d'une restauration abusive par l'architecte Boeswillwald, disciple de Viollet-le-Duc au XIXe siècle. Il est inscrit comme M.H. depuis 1927 d'abord pour le donjon, puis pour l'ensemble des bâtiments depuis 2008.Leur signature apparaît toujours après celle des « Vicomtes ». Leur prédominance s'étend sur?: Morthemer, Dienné, Fleuré, Lhommaizé, Lussac, Mazerolles, Verrière.  Le château se compose de deux parties : le donjon, qui était à l'origine une tour carrée de cinq étages, et un bâtiment rectangulaire appelé petit château qui jouxte la nef de l'église Notre Dame depuis le XVIIe siècle. Au nord, le site est clos par un corps de bâtiment organisé de part et d'autre d'un pavillon d'entrée ouvrant sur le parc du château.","habitants":"Famille Sénéchal\r\n        \"","divers":"La tour de Morthemer 46° 30' 29\" nord, 0° 38' 16\" est","gps":"","images":["../image/image_86/86_Morthemer_1.jpg","../image/image_86/86_Morthemer_2.jpg","../image/image_86/86_Morthemer_3.jpg","../image/image_86/86_Morthemer_4.jpg"]},"Consult_chateau_formulaireeb97":{"id":"Consult_chateau_formulaireeb97","dept":"86","canton":"Poitiers-5","commune":"Ligugé","nom":"Mothe_Poitou","type":"Château","periode":"XV-XVII","histoire":"La MOTHE, construit au tout début du XVe siècle par Monseigneur Simon Mourraut, Commissaire de la Recette et de lEmploi des deniers communs de la Ville de Poitiers. A la fin du XVe siècle, le domaine de la Mothe entra dans la famille d'Yvon du Fou, Gouverneur du Poitou et capitaine de Louis XI, et en 1526, Melchior des Prez, Seigneur de Montpezat et du Fou, en devint le propriétaire. En 1613, Godefroy Poussineau, Trésorier de France à Poitiers, acheta le domaine à Emmanuel de Parme, la famille Poussineau en demeurera propriétaire durant plusieurs générations. Il connut des transformations importantes durant le XVIIe siècle : rajout de la galerie avec colonnes et agrandissement du château. Il devint en 1850 propriété de la famille Paulze dIvoy de la Poype, descendants dHugues Capet. Puis en 1900, Joseph Laveissière, patron de lentreprise « Escaut-et-Meuse » spécialisée dans la sidérurgie, fit lacquisition du domaine pour villégiature. Cest en 2011 que le château de la Mothe en Poitou devient la propriété de la famille Brunet-Vincent.","architecture":"La MOTHE, dressé au sommet dune colline au sud de Poitiers depuis plus de 600 ans, le château de la Mothe en Poitou bénéficie dun panorama magnifique sur la vallée et les bois environnants. le château ressemblait en ce temps à un manoir composé dun corps de logis avec deux pavillons. létang en contrebas de la vallée fut créé à cette époque. Durant un peu plus de vingt ans, au début du XXe siècle, la famille Laveissière fit réaliser de nombreuses transformations à la Mothe en Poitou avec création du salon dhonneur, de la tour de la chapelle et de la chapelle, puis rajout dun salon sur laile Est et construction des terrasses donnant sur la vallée. En dépit des adjonctions successives, le château a conservé une belle homogénéité architecturale.","habitants":"Monseigneur Simon Mourraut et de la famille Paulze dIvoy de la Poype\r\n        \"","divers":"Château de la Mothe en Poitou","gps":"","images":["../image/image_86/86_Mothe_Poitou_1.jpg","../image/image_86/86_Mothe_Poitou_2.jpg","../image/image_86/86_Mothe_Poitou_3.jpg","../image/image_86/86_Mothe_Poitou_4.jpg","../image/image_86/86_Mothe_Poitou_5.jpg","../image/image_86/86_Mothe_Poitou_6.jpg","../image/image_86/86_Mothe_Poitou_7.jpg"]},"Consult_chateau_formulaire595a":{"id":"Consult_chateau_formulaire595a","dept":"86","canton":"Lussac les Châteaux","commune":"Mouterre Silly","nom":"Mouterre_Silly","type":"Château","periode":"XV","histoire":"Trois châteaux à Mouterre-Silly celui de la Bâtie, de la Fuye et de Nué.                                                                                                                    BATIE, était la propriété de la famille Sarazin de Montaigu puis le domaine aurait appartenu à un prince de la famille d'Orléans, un membre de la famille Sanglier y aurait gardé en otage Louis Sforza, prisonnier de François 1er.                                                           La FUYE, ce fief était possédé au XVe siècle par Huet Bureau, dont la fille Jeanne épousa Jean dAvailloles en 1463. En 1533, le seigneur était Georges de Razilly et de 1559 à 1591 ce fief appartenait aux de Leignes, suivant un aveu rendu à Jeanne de Montmorency, veuve de Louis de la Trémoille, par François de Leignes seigneur de la Fuye, gentilhomme de la maison du roi,  il avait haute, moyenne et basse justice et avait droit davoir pour la punition et correction de ses sujets pousteau, chenettes et coliers. La seigneurie fut cédée le 18 avril 1591 par François de Leignes à Léonard Langlois, sieur de Bel Estat, gentilhomme servant de la reine mère du Roi, il fut assassiné à Oiron, le 7 décembre 1605.                                                                                                     NUE manoir du XIXe siècle avec tour du XVe siècle chambre d'hôtes de  monsieur Arthur Schmidt  et de madame Guezennec","architecture":"BATIE, construit à la place d'un édifice plus ancien, le château de La Bâtie est une belle demeure du XVIIe siècle, reconstruit sous le 1er Empire après avoir été incendié.                                                      La FUYE, est une massive construction carrée flanquée de tours aux angles et entourée deau. Laile gauche porte la date 1710 et laile droite la date 1572, un écusson chargé de trois merlettes est fréquemment répété sur les lucarnes.","habitants":"Batie; famille Sarazin de Montaigu                                          La Fuye Famille de Léonard Langlois\r\n        \"","divers":"à Mouterre-Silly celui de la Bâtie grav 3, de la Fuye grav 1 -2 et de Nué grav-4.","gps":"","images":["../image/image_86/86_Mouterre_Silly_1.jpg","../image/image_86/86_Mouterre_Silly_2.jpg","../image/image_86/86_Mouterre_Silly_3.jpg","../image/image_86/86_Mouterre_Silly_4.jpg"]},"Consult_chateau_formulaire6e01":{"id":"Consult_chateau_formulaire6e01","dept":"86","canton":"Châtellerault","commune":"Naintré","nom":"Naintré","type":"Château","periode":"XV","histoire":"Le site archéologique du VIEUX-POITIERS est localisé sur les communes de Cenon-sur-Vienne et de Naintré. Ce site connaît une occupation dès la période du Néolithique avec la présence d'un menhir. Son utilisation se prolonge au cours de l'Age du fer. À l'époque gallo-romaine, le Vieux-Poitiers, également connu sous le nom de Briva, devient un vicus appartenant à la Civitas des Pictones. Au cours de cette période antique, plus précisément le Haut Empire, l'essentiel de la parure monumentale de cette agglomération secondaire est mit en place. Cet ensemble urbain est notamment constitué d'un théâtre.                                                                                                           NAINTRE,  Guillaume d'Insay est, en 1350, le premier seigneur connu de Naintré. Au début du XVe siècle, le fief appartient aux Levrault, et reste dans cette famille jusqu'au milieu du XVIIe siècle. Les descendants vendent leur château et émigrent au Canada. De \" l'hostel et forteresse\" de Naintré mentionné à partir du milieu du XVe siècle.","architecture":"VIEUX-POITIERS, La ville gallo-romaine de \"Vetus Pictavis\" construite il y a près de 2000 ans, est située au confluent de la Vienne et du Clain. La ville s'étendait sur près de 70 hectares .\r\nAu sud-est, le théâtre de 10 000 places et mesurant 116 mètres de diamètre, offrait un panorama imprenable sur les monuments antiques de la ville. Les populations de la ville et des alentours venaient profiter des représentations qui se déroulaient sur la scène du théâtre.                                                                                         NAINTRE  la tour est le seul élément qui est conservé, c'est une construction homogène en bel appareil de calcaire. De plan presque carré, elle est renforcée aux angles de contreforts plats qui portent des tourelles cylindriques en encorbellement. Seul l'angle sud ouest est doté d'une tourelle d'escalier quadrangulaire. Cette tour présente trois étages éclairés de grandes fenêtres tardives, le sommet est couronné d'un chemin de ronde continu en encorbellement, il a été repris, comme la toiture. La tour a été englobée au XVIIIe siècle dans un logis en équerre assez simple, organisé sur deux niveaux. Il est doté, à l'ouest, de deux tours d'angle rondes.","habitants":"Famille de Levrault\r\n        \"","divers":"Vestiges du vieux château  dit vieux Poitiers et le château de Naintré.","gps":"","images":["../image/image_86/86_Naintr%c3%a9_1.jpg","../image/image_86/86_Naintr%c3%a9_2.jpg","../image/image_86/86_Naintr%c3%a9_3.jpg","../image/image_86/86_Naintr%c3%a9_4.jpg","../image/image_86/86_Naintr%c3%a9_5.jpg"]},"Consult_chateau_formulaireafaf":{"id":"Consult_chateau_formulaireafaf","dept":"86","canton":"Châtellerault-2","commune":"Les Ormes","nom":"Ormes_Falaise","type":"Château","periode":"XVI-XVII","histoire":"ORMES-FALAISE, même personnage, le château de Falaise vous présente aussi l'histoire de la famille de Gannes ministre de la guerre de Louis XV, ami de Diderot et d'Alembert qui lui dédièrent l'Encyclopédie.  En 1642, Antoine Martin Pussort, oncle de Colbert, fait l'acquisition de la terre des Ormes. Il obtient l'élévation de cette terre en baronnie. Le château des Ormes  était au XVIe siècle occupé par la famille de Marans, de Poisay-le-Joli. Après avoir appartenu à différents seigneurs, la baronnie des Ormes est achetée en 1729, par le comte Marc-Pierre d'Argenson, alors conseiller d'Etat qui devint, après cette acquisition, ministre et secrétaire d'État à la guerre et Surintendant des Postes. En 2000, le château de Falaise et son domaine ont été rachetés par le Dr Sydney Abbou, médecin gynécologue parisien, passionné d'art et d'histoire, attaché à la restauration du patrimoine. Ce dernier a entrepris, depuis, une vaste campagne de restauration avec l'appui des collectivités locales. Ce n'est que le 8/03/1836, que le château de Falaise sera rattaché à la commune Les Ormes, abrite également un musée.  Le château de Falaise a abrité des hôtes célèbres dont Voltaire.","architecture":"ORMES-FALAISE, le château consiste  dans sept bâtiments  contigus, organisés autour d'une cour d'honneur ornée de parterres à la française, le corps central dans le style italien précéder du côté cour d'une colonnade. Aujourd'hui la cour  entourée de deux pavillons du XVIIIe siècle, le pavillon central avec avant corps coiffé d'un fronton représentant Cérès relie par deux ailes basses. les pavillons sont rectangulaires à deux niveaux toit à la mansart avec lucarnes sur comble. Le château des Ormes a été classé aux M.H. depuis 2012.","habitants":"Famille de Marans\r\n        \"","divers":"Château d'Ormes  46° 58' 31\" Nord, 0° 36' 06\" Est","gps":"","images":["../image/image_86/86_Ormes_Falaise_1.jpg","../image/image_86/86_Ormes_Falaise_2.jpg","../image/image_86/86_Ormes_Falaise_3.jpg","../image/image_86/86_Ormes_Falaise_4.jpg"]},"Consult_chateau_formulairee412-2":{"id":"Consult_chateau_formulairee412-2","dept":"86","canton":"Lussac les châteaux","commune":"Persac","nom":"Persac","type":"Château","periode":"XV","histoire":"Trois châteaux à Persac celui de la Mothe, de la Brulonière et de la Pillatière château du  XVIIe-XIXe siècles, parc et chapelle pas d'autres informations pour ce dernier.                                                                          BRULONIERE, ce château doit son nom à la famille Brulon, propriétaires connus dès le XIVe siècle. Il est fortifié au XVe siècle puis remanié à de nombreuses reprises. Un des propriétaires fut à la fin du XIXe siècle le vicomte Emile de la Besge très connu dans la région en tant que grand chasseur de loups et créateur dune race de chiens pour cette chasse.                                                                                            MOTHE,  Antoine de Feydeau est l'auteur de la reconstruction, vers 1440, du château ruiné pendant la guerre de Cent Ans. Le château restera dans la famille Feydeau du XVe siècle jusqu'en 1633. Le XVIIe siècle voit la seigneurie de La Mothe passer successivement aux familles de Nuchèze, Le Maistre, Le Camus et d'Estampes. Vers 1900, le comte Frémy achète la propriété et construit au sud de l'ancien bâtiment un logis néo-flamboyant.","architecture":"BRULONIERE . Le château est doté d'une enceinte trapézoïdale, dont subsistent deux tours circulaires d'angle ouest, munies de multiples bouches à feu. Le Logis médiéval occupe le côté Est de l'enceinte. Il présente la configuration typique de la seconde moitié du XVe siècle avec grand corps rectangulaire flanqué de deux tours cylindriques sur les angles extérieurs et accosté d'une tour ronde d'escalier en vis vers le milieu de la façade sur cour. Les tours, à poivrière en ardoise, sont davantage symboliques que défensives mais celles des angles sont dotées d'archères canonnières. De nombreuses fenêtres anciennes rythment les façades, et les croisées ont gardé de minutieuses moulures. Deux portes d'entrée médiévales, sur la tour d'escalier et sur la façade ouest, ont fait l'objet d'un soin particulier.                                                                                                          MOTHE, reconstruit pendant la première moitié du XVe siècle. En 1440, c'était une maison carrée flanquée de quatre piliers ronds aux angles, avec deux étages au-dessus du cellier, de larges fossés alimentés en eau par un canal et enjambés par un pont. L'actuelle tour d'escalier serait de la seconde moitié du XVe siècle et un corps de bâtiment a été rajouté à la fin du XIXe siècle pastichant le reste de l'édifice,  l'intérieur comprend cinq niveaux, le dernier, actuellement sous combles, pouvant à l'origine avoir été une terrasse. Ils étaient tous desservis, depuis l'escalier en vis, par des portes parfois ornées d'une accolade sur le linteau.                                                                             PILLATIERE, de plan en équerre à quatre niveaux flanqué d'un donjon carré et d'une tour carrée à l'angle extérieur à l'opposée.","habitants":"Mothe famille Feydeau\r\n        \"","divers":"à Persac  46° 20' 42\" nord, 0° 42' 23\" est.  Château de la Mothe grav-1-2-3, de la Brulonnière grav 4-5-6  et de la Pillatière grav-7,  Villars grav_8","gps":"","images":["../image/image_86/86_Persac_1.jpg","../image/image_86/86_Persac_2.jpg","../image/image_86/86_Persac_3.jpg","../image/image_86/86_Persac_4.jpg","../image/image_86/86_Persac_5.jpg","../image/image_86/86_Persac_6.jpg","../image/image_86/86_Persac_7.jpg","../image/image_86/86_Persac_8.jpg"]},"Consult_chateau_formulaire09b5":{"id":"Consult_chateau_formulaire09b5","dept":"86","canton":"Poitiers","commune":"Fontaine le Comte","nom":"Piliers_Fontaine","type":"Château","periode":"XV-XVII","histoire":"PILIERS, la première mention du domaine des Piliers, appelé aussi \"les Deffends\", date 1250. A cette époque ce fief relève de l'abbaye de Fontaine le Comte. En 1515, achetés par François Ardouin, les bâtiments alors en ruines, sont restaurés. Le domaine des Piliers s'étend lorsqu'il devient successivement la propriété des familles Rataud, et Acquet, puis celle de Maitre Louis de Sausay. Il faut attendre Pierre Guyon, maire de Poitiers en 1636, pour que le château soit reconstruit. Il est alors représentatif des châteaux du XVIIe siècle avec sa façade principale sur cour entourée de communs et accessible par le porche orné des armes des Guyon.","architecture":"PILIERS,  entre 1920 et 1925, d'importants travaux furent faits au logis, portant sur les lucarnes, le perron et l'entrée, le pavillon latéral qui fut surélevé, la construction d'une galerie au sud, la restauration de la chapelle et des tours d'angles. Comme tous les logis du XVIIe construits aux abords de Poitiers par la noblesse, les Piliers se composent d'un logis en fond de cour, laquelle est entourée de trois ailes de communs et ouverte par un porche axial. Le logis comprend un corps central d'un niveau, agrandi d'une galerie à arcades au sud ; deux pavillons et deux tours rondes. Ces tours donnent sur le nord où l'élévation est agrémentée d'une terrasse entourée d'une balustrade. Le décor se cantonne aux nombreuses lucarnes à ailerons, frontons triangulaires et acrotères à boules, ainsi qu'aux portes sous frontons cintrés. Les pièces d'apparat s'ouvrent au nord sur un jardin entouré de fossés et dans lequel se trouve une colonne sommée d'une urne.","habitants":"Famille de François Ardouin\r\n        \"","divers":"Château de Piliers","gps":"","images":["../image/image_86/86_Piliers_Fontaine_1.jpg","../image/image_86/86_Piliers_Fontaine_2.jpg","../image/image_86/86_Piliers_Fontaine_3.jpg","../image/image_86/86_Piliers_Fontaine_4.jpg"]},"Consult_chateau_formulairef6dc":{"id":"Consult_chateau_formulairef6dc","dept":"86","canton":"Montmorillon","commune":"Pindray","nom":"Pindray","type":"Château","periode":"XII-XV-XIX","histoire":"Deux châteaux à Pindray dont celui de Pindray et de Pruniers.                                                                              PINDRAY, le fief de Pindray avait droit de haute justice, citée dès la fin du XIe siècle, la seigneurie relevait du château de Montmorillon. Il existait à Pindray un château-fort des XIe et XIIe siècles. Cette première construction fut détruite vers la fin du XVIe siècle, au cours des guerres de Religion. Le 28 mai 2012 la presse annonce que le château a entièrement brûlé,  Le propriétaire du château, Moïse Lecourt, viendra sur les lieux pour constater l'ampleur du drame. Ce magnifique édifice n'était pas occupée au moment de l'incendie. Son propriétaire qui demeure à Beauvais, venait régulièrement dans la Vienne pour entretenir le château.                                                                           PRUNIERS  ce monument classé est cité en 1290 mais sa construction, telle quelle apparaît de nos jours, sest étalée entre le XIIe et le XVe siècles.  Propriétaire actuel monsieur Schmit.","architecture":"PINDRAY, un château bâti au cours du XIXe siècle a repris le toponyme. Le corps principal, de plan rectangulaire, est flanqué de pavillons aux angles et d'une grosse tour circulaire à poivrière sur l'un de ses petits côtés. La travée centrale de sa façade est surmontée d'un haut toit d'ardoise ponctué par un lanternon. L'ensemble offre un jeu de volumes dans les toitures particulièrement réussi. Les trois niveaux d'ouvertures sont séparés par des bandeaux de pierre. Le château jouit en outre d'un environnement très agréable.                                                                                                      PRUNIERS, à cette époque, une enceinte entourait lédifice qui comprend, en outre, des communs et une chapelle reconstruite au XIXe siècle. Le château se présente comme une forteresse rectangulaire flanqué aux angles de tourelles pleines. Dans une chambre on remarque une peinture murale assez importante, la seule fresque civile de la Vallée de la Gartempe, constituée de motifs géométriques, de blasons, de motifs dinspiration arabisante, ce qui permet de penser quelle constitue un souvenir de retour de croisade. Au sud du château se trouve un pigeonnier du XVIe siècle qui présente la particularité dêtre à demi enterré et cinq marches permettent dy accéder. Dans les murs, 1024 boulins témoignent de limportance du domaine autrefois. Sur le toit on peut voir une girouette représentant une tête de loup tirant la langue.","habitants":"Pindray; Moïse Lecourt                                                                     Pruniers; monsieur Schmit.\r\n        \"","divers":"à Pindray  celui de Pindray grav 4-5 et de Pruniers grav 1-2-3.                            Pruniers: 46° 27' 56,16\" Nord 0° 51' 18,36\" Est","gps":"","images":["../image/image_86/86_Pindray_1.jpg","../image/image_86/86_Pindray_2.jpg","../image/image_86/86_Pindray_3.jpg","../image/image_86/86_Pindray_4.jpg","../image/image_86/86_Pindray_5.jpg"]},"Consult_chateau_formulairecf1c":{"id":"Consult_chateau_formulairecf1c","dept":"86","canton":"Châtellerault-2","commune":"Dangé St-Romain","nom":"Piolant_Fontaine","type":"Château","periode":"XVII","histoire":"Deux châteaux à Dangé Saint-Romain celui de Piolant et de la Fontaine.                                                                                                            LA FONTAINE, était le fief de la famille de Benais. En 1610, Benjamin d'Auberi du Maurier achète le domaine. Huguenot intègre, il servit fidèlement Louis XIII qui le nomma ambassadeur à La Haye en 1614. Pendant son absence, les troupes du prince de Condé pillèrent et saccagèrent la demeure. A son retour, en 1624, Benjamin d'Auberi entreprit sa reconstruction.  Ayant franchi sans encombre la Révolution, l'édifice fut rénové en 1860 par le marquis d'Aubéri, descendant direct du constructeur,  la tradition y est maintenue par sa descendance.                                                                                                    PIOLANT  Il semble que les terres appartenaient à l'origine à un Espagnol du nom de Raynaldus de Podio Ollant qui donna son nom à Piolant. Au XVIe siècle, possession de François d'Aviau qui épousa Marie de Ceppède, une espagnole, de la lignée de la célèbre Thérèse d'Avila. Parmi les membres de la famille d'Aviau, une des femmes épousa, en 1628, Jean d'Annagnac, gouverneur de Châtellerault, qui devint seigneur de Piolant. En 1828, Balzac trouva refuge dans cette propriété qui appartenait alors à Raoul Cassin de Kainlys.","architecture":"LA FONTAINE,  précédé de deux communs parallèles cantonnés de tourelles, le château de La Fontaine se présente comme un bâtiment Louis XIII restauré par un architecte du Second Empire, une source alimente toujours les anciennes douves. Ouvert sur le côté Est et formant un U autour d'une cour carrée, le château reprend à peu près les bases médiévales. Il est flanqué de
