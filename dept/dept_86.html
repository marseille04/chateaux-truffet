lle de monsieur de Pérusse des Cars en reste propriétaire. En 1859, cest la famille dHarambure qui occupe les lieux. Puis on note les noms de Mr et Mme Bergeon et Mr et Mme Rocher. Ces derniers vendent à Jean Mairé en 1963.","architecture":"TARGE, du château du XIIe siècle, il ne subsiste plus que les soubassements du donjon sur lesquels la boulangerie a été construite. Ce château, qui a beaucoup souffert pendant la guerre de Cent Ans, a été reconstruit au XVIe siècle,  un édifice remarquable avec fortifications, fossés, pont-levis, tours, corps de logis donjon comme le montre une estampe fort connue de Chastillon, datant de 1595.","habitants":"marquis Louis Nicolas de Pérusse des Cars\r\n        \"","divers":"Château de Target_46° 47' 20\" nord, 0° 34' 33\" est","gps":"","images":["../image/image_86/86_Targ%c3%a9_1.jpg","../image/image_86/86_Targ%c3%a9_2.jpg","../image/image_86/86_Targ%c3%a9_3.jpg","../image/image_86/86_Targ%c3%a9_4.jpg"]},"Consult_chateau_formulaire1816-2":{"id":"Consult_chateau_formulaire1816-2","dept":"86","canton":"Aux Trois-Moutiers","commune":"Aux Trois-Moutiers","nom":"Ternay","type":"Château","periode":"XV-","histoire":"TERNAY, sa construction commence en 1439, à l'initiative du chevalier Bertrand de Beauvau conseiller du roi René d'Anjou et ami de Jacques Coeur , qui veut l'offrir à la princesse Françoise de Brézé,  malheureusement complice d'un assassinat contre Jacques d'Arsac seigneur, les Beauvau en 1579 perdent le domaine au profit des d'Arsac.  le château devient en 1647 par alliance la  propriété des d'Aviau de Ternay,  sans descendance la marquise de Ternay lointaine sa  descendance légue tout ses biens en 1830 les d'Aviau de Piolant héritent de Ternay Charles Marie d'Aviau de Ternay, 1er du nom, entreprend d'importants travaux de restauration sous la conduite de l'architecte Ojam entre 1861 et 1884 , toujours dans la famille","architecture":"TERNAY, aucun document écrit ne signale la présence d'une construction défensive moyenâgeuse sur ce plateau dominant la vallée de la Dive, mais la tradition orale mentionne qu'une forteresse aurait été détruite durant la guerre de Cent Ans et les fondations de l'actuel bâtiment semblent très anciennes. Château reconstruit dès 1439 (donjon en 1439, construction hexagonale de proportion remarquable et en 1444 la chapelle, merveille de l'art gothique, dentelle de sculpture) par Bertrand de Beauveau, conseiller du Roi René d'Anjou, bâtiment de la forme d'un quadrilatère irrégulier enfermant une cour intérieure avec deux galeries superposées, une tour à chaque angle, le tout ceint d'un profond fossé et d'une forte muraille. C'est à la fin du XVIIe siècle que la famille d'Arsac réalise des travaux sur l'aile ouest du château avec la construction d'un corps de bâtiment avec toiture à la Mansart pour agrandir la surface habitable puis au début du XVIIIe siècle un pigeonnier-porche. entre 1861 et 1884, (écuries construites de 1861 à 1867, aménagement des salons, reprise des maçonneries, destruction du pigeonnier, des communs, comblement des fossés). Modification de l'aile ouest du château en supprimant le toit à la Mansart et modification des ouvertures des ailes nord et sud. Les travaux se terminent vers 1880 pour donner au château son aspect d'aujourd'hui.","habitants":"Famille de d'Aviau de Ternay\r\n        \"","divers":"Château de Ternay  47° 02' 10\" Nord et 0° 03' 03\" Ouest","gps":"","images":["../image/image_86/86_Ternay_1.jpg","../image/image_86/86_Ternay_2.jpg","../image/image_86/86_Ternay_3.jpg","../image/image_86/86_Ternay_4.jpg","../image/image_86/86_Ternay_5.jpg","../image/image_86/86_Ternay_6.jpg","../image/image_86/86_Ternay_7.jpg"]},"Consult_chateau_formulaire5d37":{"id":"Consult_chateau_formulaire5d37","dept":"86","canton":"Châtellerault-1","commune":"Thurey","nom":"Thurey","type":"Château","periode":"XIII-XV-XVII","histoire":"Trois châteaux à Thuré la Massardière le Merveillière  et la Plante. La Barbelinière, Bouchet  et Genauraye dans autre article                                                                                                    MERVEILLIERE,  elle est habitée par la famille de Fremond depuis au moins douze générations. Pierre Fremond, fermier des moulins de Chatellerault, acquéreur de la Merveillière entre 1511 et 1550. Pierre serait, selon la tradition familiale, le fils naturel de François 1er.                                                                                  LA PLANTE, cette authentique maison de famille a été construite en 1810 par les ancêtres des propriétaires actuels. L'élégance classique de la demeure, l'agrément paisible du parc de dix hectares et le charme des aménagements intérieurs font de cette demeure un lieu de séjour privilégié. Très ancien fief qui relevait du duché de Châtellerault. Il appartint au XVe siècle au vicomte de Châtellerault, le comte d'Harcourt. En 1437 il l'octroya à son écuyer, François Marais. Le domaine fut réuni au marquisat de Clairvaux en 1768.","architecture":"MASSARDIERE, la construction  de la Massardière date du XVe, VIe et XVIIe siècle, est partiellement inscrit aux M.H. avec son mur à quatre arcades du bâtiment du Sud, le bâtiment situé en arrière, la tourelle d'escalier située à l'Est de la galerie, la poterne d'entrée de l'Ouest, le colombier cylindrique. Les façades et les toitures de l'ensemble des bâtiments qui entourent la cour, la terrasse, le perron, le bois clos, la prairie et l'étang qui se trouvent en contrebas, classés aux M.H. le 24.03.1962.                                                                                                       MERVEILLIERE, la construction du château actuel s'est effectuée aux XVIIe et XIXe siècles. En 1666, construction du corps de logis. La Merveillière comprend trois pièces au rez-de-chaussée, un palier et deux chambres au premier étage. En 1683, construction de la chapelle au rez-de-chaussée, bénite le 25 octobre. A la fin du XIXe siècle est ajoutée devant la maison, une façade avec deux pièces au rez-de-chaussée. Deux chambres sont adjointes au premier étage, ainsi qu'une sous pente au grenier; un peu plus tard, sont construits un petit salon et une chambre au-dessus, un vestibule et une terrasse.","habitants":"Merveilliere; famille de Pierre Fremond,                                           La Plante, François Marais\r\n        \"","divers":"à Thurey grav 1-2 la Massardière grav 3-4-5 le Merveillière  et la Plante grav 6-7. La Massardière 46° 49' 59\" Nord, 0° 27' 37\" Est","gps":"","images":["../image/image_86/86_Thurey_1.jpg","../image/image_86/86_Thurey_2.jpg","../image/image_86/86_Thurey_3.jpg","../image/image_86/86_Thurey_4.jpg","../image/image_86/86_Thurey_5.jpg","../image/image_86/86_Thurey_6.jpg","../image/image_86/86_Thurey_7.jpg"]},"Consult_chateau_formulaire11f6-3":{"id":"Consult_chateau_formulaire11f6-3","dept":"86","canton":"Chatellerault","commune":"Thurey","nom":"Thurey_Vienne","type":"Château","periode":"XV-XVII-XIX","histoire":"A quelques kilomètres au nord-ouest ouest  à Sossais le chäteau de Bouchet.                                                                                         BARBELINIERE, le fief de la Barbelinière dépendait de la baronnie de Thuré. Jean de Marconnay fortifie le château à la fin du XVe siècle. C'est l'architecte Lubac qui remanie l'édifice sous le Second Empire en lui donnant des allures Renaissance. Au XVIIe siècle, le seigneur est Pierre Certany, écuyer et officier de finance. A la fin du XVIIIe siècle, Joseph Cadet devient propriétaire ; il est l'ancien munitionnaire du Roi à Montréal. Il achète la propriété  en 1766. Le pigeonnier date du XVIIe siècle et semble avoir connu quelques remaniements, cependant ses boulins sont conservés. A l'intérieur, sur une pierre qui semble être un remploi, est gravée la date : 1515. L'orangerie et la chapelle pourraient dater du XVIIIe siècle. Le logis actuel a conservé des murs d'origine mais il a été agrandi et ses élévations ont été reconstruites au XIXe siècle. Les arbres permettent de dater le parc du XIXe siècle.Château surplombant la commune de Thuré. Il est situé dans un parc où se trouvent un pigeonnier, une maison de gardien et un corps de ferme de plan en L. Le château se prolonge, sur sa façade nord est, par une orangerie et une chapelle. Les pavés de l'orangerie proviendraient de cales de navires et auraient servi à lester des bateaux. Les quatre tours d'angles sont plus élevées que la toiture du logis. Une cheminée d'influence italienne, classée MH, est située au rez-de-chaussée, dans la partie nord-ouest du château.","architecture":"BOUCHET, dans son parc paysager, Le Bouchet offre une belle unité dont on doit probablement attribuer sa construction à la famille Champigny Dupont au XIXe siècle. L'édifice présente un plan rectangulaire, cantonné à deux angles de tours polygonales en appareillage de brique et de pierre de taille. Il est couvert d'un toit en croupe en ardoise. La travée centrale comprend la porte d'entrée à décor sculpté et forme un avant-corps légèrement en saillie. Elle est surmontée d'un fronton triangulaire sculpté se terminant par une lucarne. De part et d'autre s'ouvrent deux travées de baies jumelées sur 2 niveaux séparés par un bandeau de pierre, chacune de ces travées étant surmontée d'une lucarne sur toit à fronton triangulaire                                                                                                GENAURAYE  Le terme Genauraye aurait ainsi évolué par la Genouroie en 1437 qui relevait du duché de Châtellerault; en 1483, la Genouraye ; en 1576, la Genoraye relevant de la cure de Thuré ; en 1763, la Genaurais, fief relevant du duché de Châtellerault. Le terme Genauraye viendrait de Juniperetum (de junipereus, genévrier). Le château de La Genauraye, situé sur la commune de Thuré, appartenait au début du XIXe siècle à M. et Mme Borreau. En 1896, le domaine a été racheté par la famille Bedel (acte reçu à l'époque par Maître Pichon, notaire à Châtellerault). Demeure de l'écrivain Maurice Bedel (1883-1954), prix Goncourt en 1927.","habitants":"Barbelinière; famille de Pierre Certany.                           Bouchet; famille Champigny Dupont.                                                Genauraye; M. et Mme Borreau\r\n        \"","divers":"Château de Barbelinière grav 1 de Bouchet grav 2-3","gps":"","images":["../image/image_86/86_Thurey_Vienne_1.jpg","../image/image_86/86_Thurey_Vienne_2.jpg","../image/image_86/86_Thurey_Vienne_3.jpg"]},"Consult_chateau_formulaire352a":{"id":"Consult_chateau_formulaire352a","dept":"86","canton":"Chasseneuil du Poitou","commune":"Bonnes","nom":"Touffou","type":"Château","periode":"XIV-XVII-XIX","histoire":"TOUFFOU, construit sur une terrasse artificielle de la rive gauche de la Vienne, entouré de bois, le château constitue un trapèze cantonné de tours. Mentionné en 1127, la seigneurie appartient aux Ogers. Le premier donjon peut remonter à cette période. Le second donjon sera construit environ 50 ans plus tard. Au XIIIe siècle, par mariage, le domaine passe à la famille de Montléon. A la fin du XIVe siècle, des aménagements sont effectués aux donjons. Au XVe siècle, le château appartient aux Chasteigner et restera dans cette famille jusqu'en 1821. Les donjons sont réunis, l'enceinte et ses quatre tours sont élevées (les tours Saint-Jean, de la chapelle, de l'Hostellerie, Saint-Georges).  En 1794, les scellés sont mis sur la propriété mais le domaine sera remis à l'héritier en 1803 qui le vendra en 1821 à la famille de Greaulme. En 1897, il est à la famille de Vergie qui l'occupera jusqu'en 1966, date à laquelle il devient propriété de David Ogilvie.","architecture":"TOUFFOU,  fait l'objet de campagnes régulières d'entretien, d'aménagements et de restaurations. En 1560, une aile est bâtie entre la tour St Georges et le donjon auquel elle est reliée par un corps de logis contenant un escalier, à cette même date sont remaniés la tour et le pavillon de l'hostellerie. Hors les douves, au nord-ouest est construite l'hostellerie. Durant la première moitié du XVIe siècle, l'escalier de la tour Saint-Jean est refait. Au XVIIe siècle, divers aménagements sont effectués dont les fenêtres de la façade sud du donjon et la porte de la tour Saint-Jean.Ainsi le grand escalier a été restauré entre 1905 et 1936, les niveaux supérieurs de la tour de l'Hostellerie reconstruits entre 1937 et 1940, les murs de soutènement consolidés en 1999. Des jardins ont été créés, au quatrième quart du XXe siècle, à l'emplacement du potager qui figure sur l'ancien plan cadastral de 1819. Construit sur une terrasse artificielle de la rive gauche de la Vienne, et entouré de bois, le château constitue un trapèze cantonné de tours. Des douves sèches l'entourent au sud et à l'ouest tandis que des murs de soutènement délimitent des terrasses au nord et à l'est. Au centre se trouve un donjon double relié par une tour d'escalier à une grande aile en retour d'équerre à l'ouest. Sous les deux ponts levis se trouvent des caponnières ainsi que sous les terrasses nord et est. Deux puits alimentent le château. Une aumônerie et des communs sont situés en dehors des douves. Deux tours en ruine, dite \"glacière\" et de la \"poissonnerie\" complètent l'ensemble.","habitants":"Famille de Greaulme\r\n        \"","divers":"Touffou 46° 37' 00\" Nord et 0° 35' 23\" Est","gps":"","images":["../image/image_86/86_Touffou_1.jpg","../image/image_86/86_Touffou_2.jpg","../image/image_86/86_Touffou_3.jpg","../image/image_86/86_Touffou_4.jpg","../image/image_86/86_Touffou_5.jpg","../image/image_86/86_Touffou_6.jpg"]},"Consult_chateau_formulairecd17":{"id":"Consult_chateau_formulairecd17","dept":"86","canton":"Lussac les châteaux","commune":"Civaux","nom":"Tour_Cognum","type":"Vestiges -Château","periode":"XV","histoire":"TOUR-COGNUM, le nom est dérivé de celui de la famille des bâtisseurs du XIe siècle, les Conienses.                                                  A cinq Kilomètres au nord-Est à la Chapelle-Viviers le château de la BEAUDINIERE   était un fief mentionné pour la première fois en 1500 dans le cartulaire du prieuré du Theil aux Moines. Le château est un édifice rural sans prétention, l'extrême simplicité des façades est juste tempérée par les lucarnes situées dans l'axe des fenêtres des grandes pièces. Une cour inclinée vers l'Est est encadrée sur trois côtés par des bâtiments : le logis à lest, des communes au nord et au sud. Le logis se compose d'un bâtiment rectangulaire, flanqué de deux pavillons faisant saillie vers la cour. L'ensemble comporte un rez-de-chaussée, un étage et des combles. La toiture à quatre pentes est couverte en tuiles plates. Les lucarnes ont un fronton triangulaire surmonté, d'une boule. Les bâtiments de communs, à rez-de-chaussée et étage, ont une toiture à quatre pentes en tuiles plates. L'ensemble paraît remonter au XVIIe siècle. La Baudinière est une gentilhommière typique des métairies répandues dans le sud-est de la Vienne, l'Indre et le Limousin.","architecture":"TOUR-COGNUM, vestiges, cette tour carrée apparaît comme un des exemples les plus précoces des donjons romans de l'ouest de la France. Un contrefort semi circulaire est construit sur le milieu de chaque face. Seul celui de la face est monté jusqu'au sommet. Sur les autres faces, le parement ne présente pas les traces d'arrachement. La tour est bâtie sur quatre niveaux, séparés par des planchers. Le rez-de-chaussée, où se trouve l'accès actuel, était aveugle à l'origine. Comme le second niveau, qui est éclairé par deux étroites fentes de jour, il servait de réserve. La porte d'entrée originelle, couverte en plein cintre, est percée sur la face sud, au 3ème niveau. L'espace résidentiel est limité au dernier étage, qui seul possède de larges ouvertures. La baie géminée romane, ouverte à l'ouest, vers la rivière, est la plus ancienne. Le logis dont les ruines sont adossées à la tour daterait du XVe siècle. Il n'en subsiste qu'un pan de mur, dans le prolongement de la face sud.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges à Civaux","gps":"","images":["../image/image_86/86_Tour_Cognum_1.jpg"]},"Consult_chateau_formulaire9610":{"id":"Consult_chateau_formulaire9610","dept":"86","canton":"Chauvigny","commune":"Availles en Chatellerault","nom":"Tour_Oyré","type":"Château","periode":"XV","histoire":"A Availles en Chatellerault le château fort de la Groie du XVe siècle et XVIe siècle, et manoirs : La Vallière XVe siècle ; La Corgère ; Le Pâtureau XVe siècle.                                                                                                                           PATOUREAU, on trouve mention du Patureau, relevant du duché de Châtellerault, pour la première fois en 1493. Ce manoir fut érigé par Claude Descolliers, et devint propriété de la famille Chasteigner dans la deuxième moitié du XVIIe siècle.                                                                                                          TOUR-OYRE, construit au XVe siècle pour Raoul de Faye, oncle dAliénor dAquitaine, est vendu comme bien national à la Révolution, morcelé, le domaine passe au XIXe siècle à Ludovic Halevy puis à Charles Gounod. La famille Treuille en sera propriétaire à la fin du XIXe siècle, passa au  comte Adrien Treuille et ses descendants aujourd'hui au comte Maurice Treuille qui l'a transformé en chambres d'hôtes","architecture":"PATUREAU, ne enceinte en moellons comportant une tour-pigeonnier carrée à l'angle nord est et un portail en pierre de taille formé d'une porte cochère sommée d'un arc surbaissé et d'une porte piétonnière à fronton triangulaire, le tout orné de pilastres, entoure le manoir caractéristique de la fin de la guerre de Cent Ans, qui fut agrandi au siècle suivant. La façade du côté jardin a conservé sur la tour carrée des traces du système défensif composé de meurtrières à rotule. Le corps de logis principal, composé d'un rez-de-chaussée, d'un étage et d'un étage sous combles, avec pour la façade côté cour, deux lucarnes hautes et une tourelle hexagonale en demi uvre à baies chanfreinées abritant l'escalier, possède des éléments de décoration gothiques. Une tour hexagonale sert de liaison aux restes des bâtiments construits sur cour.                                                TOUR-OYRE, son réalisé des travaux, notamment sur la façade sud. Le château s'inscrit dans un vaste parc. Le logis de plan rectangulaire est sous toiture à longs pans à pente aiguë entre deux pignons. Sa façade Est est la plus typée; cantonnée de deux tours carrées à mâchicoulis couverts sous toiture en pavillon. La tour sud-est compte une travée tandis que la tour nord-est est éclairée de deux travées de baies sur quatre niveaux interrompant le chemin de ronde. L'intérieur est très marqué par le réaménagement réalisé au XIXe siècle. A l'écart, une grange pourrait correspondre à un bâtiment ancien.","habitants":"Patoureau;famille Chasteigner,                                                    tour Oyré; famille Treuille\r\n        \"","divers":"Tour Oyré grav 1 à 5   Patureau grav 6 à 8 .                        Availles;46° 46' 08\" nord, 0° 34' 11\" est","gps":"","images":["../image/image_86/86_Tour_Oyr%c3%a9_1.jpg","../image/image_86/86_Tour_Oyr%c3%a9_2.jpg","../image/image_86/86_Tour_Oyr%c3%a9_3.jpg","../image/image_86/86_Tour_Oyr%c3%a9_4.jpg","../image/image_86/86_Tour_Oyr%c3%a9_5.jpg","../image/image_86/86_Tour_Oyr%c3%a9_6.jpg","../image/image_86/86_Tour_Oyr%c3%a9_7.jpg","../image/image_86/86_Tour_Oyr%c3%a9_8.jpg"]},"Consult_chateau_formulaireff8d":{"id":"Consult_chateau_formulaireff8d","dept":"86","canton":"Montmorillon","commune":"La Trimouille","nom":"Trimouille","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux à la Trimouille celui de Bas-Peu et de Ry-Chazerat à Journet, de Régnier et de Rivière.                                                                                                                                         REGNIER, était un ancien fief avec droit de haute justice qui dépendait du château Guillaume dans l'lndre. Le fief est mentionné dès la fin du XVe siècle et il  fait état de la tour et maison-forte de Reigné. Aujourd'hui chambres d'hôtes de la famille Liniers.                                                                                                        RIVIERE, apparu en 1401 sous le nom de Sidrac, La Rivière, arrière-fief de la baronnie de Montmorillon, appartient à la famille Loube. En 1436 est cité le lieu et forteresse. Du milieu du XVe siècle jusqu'à la Révolution, la famille de Ravenel ou de Raveneau possède la seigneurie.                                                                          A cinq K.m. à l'ouest le château de Bas-Peu et de Ry-Chazerat à Journet;   ce château est une ancienne maison féodale, connue autrefois sous le nom du Puy Jousserand et relevant de la Maison-Dieu de Montmorillon. Des remaniements furent réalisés au XVIIIe siècle. La chapelle a été construite au XIXe siècle par la famille Oiron. Le château appartenait à la fin du XIXe siècle à Gabrielle de Nuchèze épouse de Maurice Frotier de La Messelière, marquis de La Messelière. Le bâtiment, de plan régulier, se compose d'un étage carré et un étage de comble. Le gros-oeuvre en calcaire, moellon et enduit, élévation à travées surmontée d'un toit à longs pans et croupe recouvertd en ardoise.","architecture":"REGNIER, le château actuel, de style néo-gothique, remonte à la deuxième moitié du XIXe siècle. C'est un corps de logis au toit d'ardoise à croupes, auquel sont accolées au sud, deux ailes dissymétriques en retour d'équerre. L'élévation nord est encadrée de deux tourelles hors uvre, celle à l'angle nord est ayant reçu une porte du XVe siècle en provenance du château primitif. A l'intérieur de chacun des angles formés par le bâtiment central et les deux ailes, on trouve deux autres tours rondes en uvre. La façade sud possède 5 travées d'ouvertures sur deux niveaux et 3 lucarnes à fronton triangulaire. L'aile sud ouest est couverte d'un toit en bâtière, son mur pignon est surmonté de 3 édicules ronds qui sont probablement des cheminées. L'aile sud-est a un toit en croupe, une lucarne sous toiture qui éclaire les combles. Les quatre tours circulaires sont couvertes d'une poivrière d'ardoise.                                                          RIVIERE, se compose d'un logis rectangulaire flanqué de six tours (celle du sud-est a disparu) construit dans le premier tiers du XVe siècle par Herbert Loube  et protégé alors par une enceinte aujourd'hui détruite ; il a subi d'importantes modifications qui ont dénaturé sa physionomie médiévale. A la fin du XVe siècle, est ajoutée au sud-ouest une aile comportant une chapelle au rez-de-chaussée; la porte est très soignée (gâble, pinacles) et présente un beau décor floral. Un ensemble de bâtiments de l'époque moderne s'étend à l'est de la construction médiévale, délimitant par sa disposition au nord et au sud une vaste cour.","habitants":"Rivière; famille Loube                                                                         Bas-Peu: famille Oiron\r\n        \"","divers":"à la Trimouille -Chazerat à Journet grav 1-2, de Régnier et de Rivière grav 3 à 6. Trimouille  46° 28' 02\" nord, 1° 02' 29\" est","gps":"","images":["../image/image_86/86_Trimouille_1.jpg","../image/image_86/86_Trimouille_2.jpg","../image/image_86/86_Trimouille_3.jpg","../image/image_86/86_Trimouille_4.jpg","../image/image_86/86_Trimouille_5.jpg","../image/image_86/86_Trimouille_6.jpg"]},"Consult_chateau_formulairef465":{"id":"Consult_chateau_formulairef465","dept":"86","canton":"Châtellerault-2","commune":"Usseau","nom":"Usseau","type":"Forteresse","periode":"XV-XVIII","histoire":"Trois châteaux à Usseau celui de la Motte d'Usseau de Boulinière et de Romeneuil.                                                                                                  BOULINIERE, manoir du XVe siècle transformé en chambres d'hôtes.                                                                                                          MOTTE D'USSEAU, en 1065 Gosbertus qualifié de seigneur d'Usseau, en 1449 le château passe à Geoffroy du Bec  qui reconstruit le château au XVIIIe siècle Jacques Carré qualifié de seigneur de Motte d'Usseau  sa fille Françoise-Celeste-Charlotte apporte le domaine en dot à Louis-André de Viart , le dernier seigneur de la Motte Henri-Louis de Viart ayant émigré à la Révolution  les biens sont vendus, sa fille parvient à les racheter qu'elle lègue à sa mort en 1850 à l'une de ses cousines madame de Jousserand  née Menou qui revend le domaine en 1863 à monsieur Huliot qui le cède en 1863 à  la congrégation de Picpus. Sept ans plus tard M. Eugène Coudrin achète la Motte qui appartient aujourd'hui  à la famille Bardin qui l'on aménagé en chambres d'hôtes","architecture":"MOTTE D'USSEAU, édifice construit dans la seconde moitié du XVe siècle.  Une portion de fresques représentait le château et l'église du bourg, était ornée d'un blason avec une inscription gothique. Les autres interventions remontent au XVIIIe siècle avec des  travaux intérieurs  mits au goût du jour et de décoration. Entre 1863 et 1870, travaux effectués par les moines, sur l'élévation ouest du logis qui a été percée. Les piédroits qui la cantonnaient ont été enlevés au XXe siècle. La galerie voûtée d'arêtes supportant une terrasse à laquelle on accède par un escalier conduisant au premier étage date également de cette période de travaux. Les moines ont entrepris des travaux à l'intérieur du logis au XIXe avec réfection de la charpente, des plafonds et des murs de refend.                                                                                                                 REMENEUIL, petite forteresse sur son tertre rocheux sous-terrain, le château est  construit au XIVe- XVe siècle mais remanié ensuite tout au long de son histoire jusqu'au XIXe siècle. La légende locale rapporte que l'avant garde sarrasine qui fut massacrée par le Grand Charles Martel n'a pu être sauvée à temps par le reste du corps armé qui suivait, car retardé par la marche sur les fastidieuses collines de Remeneuil, ces derniers arrivés trop tard ne purent que constater le massacre et prirent la décision de faire demi-tour. Remeneuil doit son nom au toponyme \"Romanoculus\" en raison de la présence des troupes romaines dirigées par César lui-même, ce dernier aurait alors établit son camp provisoirement sur le site lors de sa traversée de la vallée de la Veude.","habitants":"Motte Usseau; Famille de Geoffroy du Bec  \r\n        \"","divers":"à Usseau celui de la Motte d'Usseau grav de1 à 7, de Boulinière grav 9 et de Romeneuil grav-8.","gps":"","images":["../image/image_86/86_Usseau_1.jpg","../image/image_86/86_Usseau_2.jpg","../image/image_86/86_Usseau_3.jpg","../image/image_86/86_Usseau_4.jpg","../image/image_86/86_Usseau_5.jpg","../image/image_86/86_Usseau_6.jpg","../image/image_86/86_Usseau_7.jpg","../image/image_86/86_Usseau_8.jpg","../image/image_86/86_Usseau_9.jpg"]},"Consult_chateau_formulaire2466":{"id":"Consult_chateau_formulaire2466","dept":"86","canton":"Lussac les châteaux","commune":"Usson du Poitou","nom":"Usson_Poitou","type":"Château","periode":"XV-XVIII","histoire":"La commune d'Usson compte douze châteaux, Arton, Badevilain, Busseroux,   la Guéronnière du XVIIe siècle. Arzac, Bagné, Butière , Paillerie, petite et grande Epine, de Vaux et Usson, pas d'info pour ces derniers .                                                                                                                    ARTON, a été restauré dès le XVe siècle. Il a été descendu de deux étages au début du XXe siècle. Des douves, en partie bouchés aujourd'hui, entouraient le château et ses bâtiments. le château d'Artron présente encore de nombreux beaux vestiges, il appartient depuis décembre 1953 à la famille Pelletier.                                                                                                     BADEVILAIN, a été édifié à la fin du XVIIIe siècle sur l'emplacement d'un château médiéval. Sa façade arrière s'ouvre sur une terrasse à balustrade et donne accès à un jardin à la française bordé par le ruisseau des Pluches. L'édifice est composé d'un corps de logis rectangulaire, avec une toiture à pans brisés en ardoise. Le château est flanqué de deux pavillons rectangulaires couverts d'un toit à croupes et d'ardoise, les deux pavillons faisant légèrement saillie sur les deux façades. Côté cour la façade d'honneur présente deux niveaux et un en surcroît sous les combles, aussi bien pour le bâtiment principal que pour le pignon des pavillons qui le flanquent. Au XXe siècle Louis de Baglion réalise la construction de la terrasse et les beaux décors des deux travées centrales. Le fief de Badevillain apparaît dans les textes vers le milieu du XVe siècle. Il relevait du Comté de Civray. La terre de Badevillain, achetée au XVIe siècle, demeurera propriété des de Nuchèze jusquau XIXe siècle puis elle passera par mariage dans la famille Baglion de La Dufferie.","architecture":"BUSSEROUX, est attesté dès le XIe siècle et relevait du comté de Civray. Hélie de Chabanais est le premier seigneur connu au milieu du XVe siècle. La propriété resta dans cette famille jusqu'à Françoise de Chabanais, épouse de Jean de La Cassaigne. Sans héritier, le château passa à Louis de La Barre à la fin du XVIe siècle et Marie de La Barre, sa fille, l'apporta à son mari, Louis Vidard et il appartint aux Vidard jusqu'en 1785, à cette époque la propriété fut vendue à François Emmanuel Bernard du Breuil-Hélion de la Guéronnière, petit-fils de Madeleine Vidard. Le château fut peut- être construit au XVIe siècle sur des substructions antérieures. De belle allure féodale avec ses deux tours, ses fenêtres à meneaux, et ses grandes cheminées, l'édifice fut restauré au tout début du XXe siècle, pour Henri Salmon, ancien préfet.                                               GUERONNIERE, en 1644, les nouveaux propriétaires décident de faire un château répondant à l'architecture de ce siècle en remplacement d'un édifice d'origine médiévale. En 1887, l'architecte Cléry fut commandité pour y apporter des modifications, réalisées en 1888. L'orangerie est démolie, autrefois située dans l'alignement de l'aile sud-ouest du logis et reliée par un mur à la chapelle en avant de la cour d'honneur. Une grille accolée à l'angle de la tour nord-ouest marquait le passage entre la cour d'honneur et la cour des communs. L'orangerie est reconstruite plus à l'écart, au sud du logis, en 1899.","habitants":"Arton, famille Pelletier.                                                               Badevilain; famille de Nuchèze.                                                        Busseroux; famille de  Jean de La Cassaigne\r\n        \"","divers":"La commune d'Usson compte douze châteaux, Arton grav 1, Badevilain grav 2-3, Busseroux,   la Guéronnière grav 4-5. Arzac, Bagné, Butière grav -6","gps":"","images":["../image/image_86/86_Usson_Poitou_1.jpg","../image/image_86/86_Usson_Poitou_2.jpg","../image/image_86/86_Usson_Poitou_3.jpg","../image/image_86/86_Usson_Poitou_4.jpg","../image/image_86/86_Usson_Poitou_5.jpg","../image/image_86/86_Usson_Poitou_6.jpg","../image/image_86/86_Usson_Poitou_7.jpg"]},"Consult_chateau_formulaire067f-2":{"id":"Consult_chateau_formulaire067f-2","dept":"86","canton":"Châtellerault-2","commune":"Antran","nom":"Valencay","type":"Château","periode":"XV-XVII","histoire":"VALANCAY, le nom de Valençay vient du nom latin valens désignant le premier occupant du site. La terre fut donné par le comte Guillaume Fier A Bras à sa femme Emma, mais celle-ci en fit don à l'abbaye Saint Cyprien, tout en conservant l'usufruit de son vivant (jusqu'en 1200). La propriété passe à l'abbaye de La Celle avant de revenir au XIVe siècle à un seigneur laïque, Pierre du Rivau, mentionné seigneur de Valençay. Tué à la bataille de Crécy en 1346, il détenait également les terres de Clairvaux, du Peu et de La Picherie. Après la famille Boyn, à partir du XVIe siècle c'est une famille de notables poitevins, les Courtinier, qui choisirent Valençay comme propriété de campagne jusqu'en 1716. Parmi eux, Pierre, écuyer, receveur général en 1565, puis son fils, Pierre, maire de Poitiers en 1574, et Mathurin trésorier de France. A partir de la deuxième moitié du XIXe siècle, ce château appartint à un Châtelleraudais célèbre, Alfred Hérault, député de la Vienne, à qui l'on doit une histoire de Châtellerault en quatre volumes propriété  du commandant de Laugier -Vullyamos.","architecture":"VALANCAY, est un logis de trois niveaux, dont deux d'habitation, à comble droit terminé par deux pignons, flanqué aux angles de tours rondes montant de fond couronnées de mâchicoulis. Le 3ème niveau, de l'ancien chemin de ronde, a été transformé tardivement en habitation. Les deux tours à couverture conique sont surmontées d'un chemin de ronde, côté vallée, tandis que les deux tours opposées subsistent en terrasse. Des douves ont été en partie comblées. Un réseau de galeries aurait été établi pour le relier à la vallée et aux châteaux avoisinants notamment le château de La Motte à Usseau. De la construction la plus ancienne reste une tour carrée à l'angle nord-est. Au XVIIe siècle, pour des besoins de confort, fut ajouté deux ailes en retour d'équerre au bâtiment et des beaux communs. A cette époque, un pigeonnier de 1750 boulins fut construit, qu'on peut voir encore aujourd'hui et en bon état.","habitants":"Famille d'Alfred Hérault\r\n        \"","divers":"Valençay 46° 52' 27,65\" Nord, 0° 32' 52,59 est                     Fort 46° 52' 41\" nord, 0° 32' 14\" est","gps":"","images":["../image/image_86/86_Valencay_1.jpg","../image/image_86/86_Valencay_2.jpg"]},"Consult_chateau_formulaire4974":{"id":"Consult_chateau_formulaire4974","dept":"86","canton":"Migné Auxances","commune":"Varennes","nom":"Varennes_Ry","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Varennes celui de Ry et celui de Vilaine.                           RY,   la forteresse de Ry, dominant ses marais, appartenait en 1198 à Hugues de Ry, chevalier, allié aux Brisay et aux Fouchier. En 1454 par mariage de Pérette de Ry avec Héliot de Lestang il passe à cette famille. Vendu en 1679 à Pierre David, receveur des tailles protestant qui abjura peu après, il passe par mariage à Alexis Beufvier, marquis des Pallignies. Les Beufvier épousent des filles du marquis de Soulièvres. Restauré en 1825 avec le milliard des émigrés, le château devient au XIXe siècle un domaine rural, avant d'être acheté en 1922 par la famille Guillard et restauré.","architecture":"RY, le château actuel a de la noblesse, mais c'est du Louis XIII version 1825. La façade éclatante de blancheur entre deux pavillons en forte avancée est la partie la plus remarquable. Elle donne sur une terrasse qui domine le parc par un large escalier. L'arrière est occupé par une longue galerie qui jadis abritait un billard. L'environnement gagnerait à être mis en harmonie avec cette demeure pleine d'allure.                                                                                                                 VILAINE, construit au XVIIe siècle, puis remanié au XIXe siècle, est planté dans un écrin de verdure, véritable havre de paix. La ferme et le pigeonnier remontent au XVIe siècle. C'est une propriété de caractère, idéalement situé au carrefour des châteaux de la Loire, des Marais Poitevin et de la Côte Atlantique, les chambres d'hôtes de charme sont une promesse dun séjour des plus agréables.","habitants":"Ry, Famille  d'Héliot de Lestang                                         Vilaine\r\n        \"","divers":"à Varennes celui de Ry et celui de Vilaine grav 4-5-6","gps":"","images":["../image/image_86/86_Varennes_Ry_1.jpg","../image/image_86/86_Varennes_Ry_2.jpg","../image/image_86/86_Varennes_Ry_3.jpg","../image/image_86/86_Varennes_Ry_4.jpg","../image/image_86/86_Varennes_Ry_5.jpg","../image/image_86/86_Varennes_Ry_6.jpg"]},"Consult_chateau_formulaire1fb7":{"id":"Consult_chateau_formulaire1fb7","dept":"86","canton":"Chauvigny","commune":"Leignes sur Fontaine","nom":"Vaucour","type":"Château","periode":"XV","histoire":"VAUCOUR  Au début du XVe siècle, existait une famille Blanchet de Vaucour, puis beaucoup plus tard, le château aurait appartenu au comte Goufreau de Blom puis successivement aux époux Maurin, Rebic et Métivier.","architecture":"VAUCOUR, avait certainement un rôle de refuge; une population pouvait s'abriter et résister quelques jours à une bande armée, en période troublée. Sa construction pourrait remonter à la fin du XVe ou au début du XVIe siècle. Plus tard il a dû devenir une résidence, sans exclure toute préoccupation de défense. Sil nest pas très original, le plan de Vaucour est peu répandu pour un aussi petit ouvrage, et il est unique dans le pays Chauvinois. Cette tour carrée, dont les côtés, sils allaient jusquau sommet des angles droit, mesureraient huit mètres de longueur, est cantonnée de quatre tourelles en éperon : les becs de ces derniers sinscrivent dans un carré de 11,50 m de côté. Le tracé permet un flanquement parfait des côtés saillants de chaque tourelle par le tir de lembrasure extérieure de la tourelle opposée. Tout angle mort est supprimé.","habitants":"Famille Blanchet de Vaucour\r\n        \"","divers":"Forteresse de vaucour","gps":"","images":["../image/image_86/86_Vaucour_1.jpg","../image/image_86/86_Vaucour_2.jpg","../image/image_86/86_Vaucour_3.jpg"]},"Consult_chateau_formulaire856f":{"id":"Consult_chateau_formulaire856f","dept":"86","canton":"Jaunay-Clan","commune":"St-Georges lés Baillargeaux","nom":"Vayres_86","type":"Château","periode":"XIV-XVII","histoire":"VAYRES, des jardins à la française, abritant un immense pigeonnier qui date de 1656, offert par Anne d'Autriche, enserrent la bâtisse. Vayres fut, jusqu'à la Révolution, un fief épiscopal très important. Les seigneurs de Vayres avaient droit de haute et de basse justice.   Au bout d'une allée, le châtelet avec ses deux tours rondes, reconstruites par les seigneurs de Gennes au XVIIe siècle, conserve l'appareillage de l'ancienne forteresse. En contrebas, dans les jardins à la française, le pigeonnier (ou fuie) a des dimensions imposantes. Il accueille 2 620 boulins. Il aurait été offert par la reine Anne d'Autriche (1601-1666) en remerciement de l'accueil qu'elle reçut au château en compagnie du cardinal Mazarin (1602-1661) et de son fils Louis XIV (1638-1715), en 1656. aujourd'hui propriété de M. J. de Beaumont.","architecture":"VAYRES,  château fort de 1392 (restent les deux tours encadrant le logis), reconstruit au XVIe siècle, restauré et décoré au XVIIe siècle. Certains éléments évoquent l'architecture médiévale, comme le châtelet d'entrée ou les mâchicoulis qui surmontent les tours. date des XVe et XVIIe siècles. La façade et la toiture sont inscrites comme M.H.  depuis 1959. Le classement du jardin date de 1966 et la fuie du château de 1994, les pentes qui conduisent au Clain. Le domaine occuperait le site d'une ancienne villa gallo-romaine et un certain Varius lui aurait donné son nom. Le manoir actuel se dresse à l'emplacement d'un château fort roman.  Château fort de 1392 (restent les deux tours encadrant le logis), reconstruit au XVIe siècle, restauré et décoré au XVIIe siècle. Certains éléments évoquent l'architecture médiévale, comme le chatelet d'entrée ou les mâchicoulis qui surmontent les tours. Des jardins à la française, abritant un immense pigeonnier qui date de 1656, enserrent la bâtisse. Vayres fut, jusqu'à la Révolution, un fief épiscopal très important. Les seigneurs de Vayres avaient droit de haute et de basse justice.","habitants":"seigneurs locaux\r\n        \"","divers":"Château de Vayres à St-Georges lés Baillargeaux","gps":"","images":["../image/image_86/86_Vayres_86_1.jpg","../image/image_86/86_Vayres_86_2.jpg","../image/image_86/86_Vayres_86_3.jpg","../image/image_86/86_Vayres_86_4.jpg","../image/image_86/86_Vayres_86_5.jpg"]},"Consult_chateau_formulaired096":{"id":"Consult_chateau_formulaired096","dept":"86","canton":"Jaunay-Clan","commune":"Vendeuvre","nom":"Vendeuvre_86","type":"Château","periode":"XIV-","histoire":"A Vendeuvre le château de Bonnivet, la Font, Roches,  la tour de Mirandes, Chézeaux  et Greve  (voir article suivant )                                                                                            ROCHES, le domaine appartient à Jacques d'Ausseure, maire de Poitiers, depuis la fin du XIVe siècle.  Le plus célèbre des propriétaires fut le général Chemineau qui connait la gloire dans l'armée Napoléonienne. La Restauration le fit chevalier de Saint Louis et commandant de la Vienne, la Charente et les Deux Sèvres. Il l'aménagea en y apportant quelques éléments de confort.                                                                                                             TOUR de MIRANDES  sont classées M.H.depuis 1981. est un haut-lieu archéologique. Le site a été découvert en 1825. Le site s'étend sur plusieurs centaines d'hectares, et a d'abord été occupé par les Celtes, puis par les Romains. La ville antique, qui occupait 120 hectares, a dû disparaître lors des grandes invasions. La ville sest développée à proximité dune voie romaine qui la reliait à Poitiers. Elle a servi de carrière au Moyen Âge. Le site a été  fouillé depuis les années 1960; ont pu être ainsi découverts les vestiges d'un temple, un forum, un amphithéâtre de 7 000 places.","architecture":"BAILLANT   Fief mentionné dès 1592, l'actuel château de Baillant a été construit au XIXe siècle, il s'agit d'une belle demeure avec combles, caves, escalier monumental et un petit cours d'eau pour limiter la propriété. Les chambres dhôtes à la décoration chic et contemporaine sont réparties à létage du château et peuvent être réservé à la nuitée ou plus.                                                                                          BONNIVET, abbaye incendiée. \r\n LA FONT: il date du XVIIIe siècle, cest un logis rectangulaire massif avec un niveau en sous-sol. Un escalier à deux rampes permet daccéder directement au premier étage. La toiture est en ardoise.\r\nROCHES qui est classé M.H. depuis 1983, En 1516, il est autorisé à élever une maison forte. La cour, un quadrilatère flanqué de massives tours rondes montre l'influence médiévale de même que les douves sèches et le châtelet d'entrée qui ressemble au château de Dissay avec ses deux tours. Un chemin de ronde couvert, crénelé et doté de mâchicoulis protège le pont-levis. Le corps de bâtiment s'intercale entre le châtelet et la tour d'angle où se trouve la chapelle. Prévu pour l'habitation il est muni de larges cheminées. Les fenêtres à meneaux et les lucarnes sculptées nous rappellent l'influence du château de Bonnivet tout proche. A l'arrière, une tour est vouée aux fonctions domestiques, l'autre est une fuye. Les deux confirment leur fonction défensive avec leurs canonnières.","habitants":"Roche; Famille de Jacques d'Ausseure.\r\n        \"","divers":"A Vendeuvre le château de Baillant  grav 6-7-8 .                     Bonnivet grav 5, la Font grav 9, Roches grav 1 à 4,  la tour de Mirandes,","gps":"","images":["../image/image_86/86_Vendeuvre_86_1.jpg","../image/image_86/86_Vendeuvre_86_2.jpg","../image/image_86/86_Vendeuvre_86_3.jpg","../image/image_86/86_Vendeuvre_86_4.jpg","../image/image_86/86_Vendeuvre_86_5.jpg","../image/image_86/86_Vendeuvre_86_6.jpg","../image/image_86/86_Vendeuvre_86_7.jpg","../image/image_86/86_Vendeuvre_86_8.jpg","../image/image_86/86_Vendeuvre_86_9.jpg"]},"Consult_chateau_formulairefb84":{"id":"Consult_chateau_formulairefb84","dept":"86","canton":"Jaunay-Clan","commune":"Vendoeuvre du Poitou","nom":"Vendoeuvre_II","type":"Château","periode":"XV- XVI","histoire":"CHEZEAUX, on trouve mention de ce lieu pour la première fois en 938, cétait alors un fief relevant de la baronnie de Grisse à Chéneché. Le domaine appartint successivement à trois familles, les Chabot jusquau XVe siècle, les Constant jusquau XIXe siècle, les de Lauzon jusquà récemment puisquune Madame de Lauzon fut conseillère municipale à Vendeuvre vers 1960. L'actuel château remplace la maison noble médiévale et fut construite par la famille Constant au XVIIIe siècle.                                        GREVE, on trouve une mention du lieu au milieu du XVIe siècle dans les archives de la seigneurie de Chéneché. La Grève était un fief qui relevait du fief d'Allemagne.","architecture":"CHEZEAUX,  Il était constitué de bâtiments s'organisant autour d'une cour fermée, il ne reste que deux tours, une carrée à l'angle nord est et une ronde à l'angle nord-ouest. La façade principale du château est orientée vers le midi avec 16 grandes fenêtres sur deux niveaux, le toit en ardoise est orné de trois lucarnes de pierre, sobrement sculptées. Le propriétaire actuel est le docteur de Boissière qui acheta la propriété en 1971.                                           GREVE, Il pourrait s'agir d'un ancien relais de poste dont la construction semble dater du XIIIe siècle dans sa majeure partie, avec remaniements aux XVIe et XVIIe siècles. Fermant le côté nord d'une cour rectangulaire, c'est un corps de logis avec toit en croupe couvert d'ardoise dont la façade sur cour est animée par une haute tour centrale carrée couverte à l'identique du bâtiment, la tour est surmontée d'une girouette et contient la porte d'entrée. Devant le logis, au sud-est, se dresse un beau pigeonnier circulaire, contenant 700 boulins, couvert d'un cône d'ardoises et de tuiles plates. Un portail encadré de pilastres ornés de têtes de lions permet l'accès à la cour. Les lignes pures et la symétrie des volumes donnent à La Grève beaucoup d'allure et c'est un bonheur de constater l'état de conservation dans lequel ses propriétaires l'entretiennent.","habitants":"Chazeaux  Famille des chabots et les Lauzon                               Gréve; fief d'Allemagne\r\n        \"","divers":"Chézeaux  et Greve","gps":"","images":["../image/image_86/86_Vendeuvre_II_1.jpg","../image/image_86/86_Vendeuvre_II_2.jpg"]},"Consult_chateau_formulaireaea2":{"id":"Consult_chateau_formulaireaea2","dept":"86","canton":"Vivonne","commune":"Vernon","nom":"Vernon","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à Vernon celui du Breuil et celui de Vernon. et à trois kilomètres à l'est à Diéné le château de la Guillonnière                                                                                 BREUIL, mentionné des 1403. Reconstruction de la demeure au XVIIe siècle.                       \r\nVERNON, la première mention d'un hommage rendu par le seigneur du Breuil de Vernon remonte à 1404. Au XVIIe siècle, la reconstruction de l'édifice incombe à la famille de La Lande, d'extraction échevinale depuis René, maire de Poitiers en 1606.                                                              GUILLONNIERE, l'origine du château est très ancienne. Il est mentionné dans un document de 1534. La Seigneurie de la Guillonnière dépendait de la Baronnie de Mortemer. Un siècle plus tard le propriétaire, Jacques Audebert est Maire de Poitiers. Au XVIIIe siècle, La Guillonnière appartient à Michel Mathias, Antoine Pays-Mellier, Trésorier de France. Au XIXe siècle, les familles Nicolas des Fossettes, de la Rinière et Collin de l'Hortet en sont propriétaires.","architecture":"GUILLONNIERE, A la fin du XIXe siècle et au début du XXe siècle, La Guillonnière fut une exploitation agricole consacrée à l'élevage et à la viticulture. Elle n'est plus en exploitation, mais il subsiste de belles dépendances: écuries, orangerie, pigeonnier, granges et porcherie ayant une grande harmonie architecturale. Durant la deuxième Guerre Mondiale, La Guillonnière vit des heures sombres et devient un Quartier Général d'officiers Allemands. Pratiquement inhabité depuis la guerre, le château de La Guillonnière revit grâce aux propriétaires actuels qui le restaurent totalement.                                                                                                                BREUIL,  se compose d'un corps principal et de deux ailes en retour d'équerre enserrant une courette. Une des tours rondes demi hors oeuvre qui cantonnaient l'ensemble, a disparu au XIXe siècle lors de l'adjonction d'une aile à l'ouest. Deux portes identiques se font face dans la cour intérieure, ouvrant chacune sur un escalier à volées droites. Une salle en bout d'aile, s'orne de peintures sur bois représentant des allégories, des scènes champêtres et des ruines antiques. \r\nVERNON, le portail monumental s'impose, la porte cochère se distingue par son arc en bossages et sa corniche. Le château occupe le côté nord d'une longue cour rectangulaire bordée de communs, composé d'un corps de logis principal et de deux ailes en retour d'équerre enserrant une courette. Les élévations comprennent trois niveaux avec les ouvertures des hauts combles revêtus de tuiles plates et d'ardoises. L'entourage des baies est très soigné: chambranles moulurés, appuis et plates bandes, tables en pierre de taille. La façade donnant sur le parc a conservé une lucarne à meneau sommée de deux volutes réunies par un fleuron stylisé. .","habitants":"Famille de La Lande\r\n        \"","divers":"à Vernon celui du Breuil et celui de Vernon  grav 1 à 4                          à Diéné le château de la Guillonnière  grav 5","gps":"","images":["../image/image_86/86_Vernon_1.jpg","../image/image_86/86_Vernon_2.jpg","../image/image_86/86_Vernon_3.jpg","../image/image_86/86_Vernon_4.jpg","../image/image_86/86_Vernon_5.jpg"]},"Consult_chateau_formulaired489":{"id":"Consult_chateau_formulaired489","dept":"86","canton":"Loudon","commune":"Bournand","nom":"Verrières_Bourmand","type":"Château","periode":"XIV-","histoire":"A  BOURNAND, le château actuel est situé au centre du village, dans un beau parc paysager.                                                                    VERRIERES, a appartenu au marquis Banyul de Monférré, l'Octroi remonte au XIVe siècle, deux autres bâtiments, une réplique de l'octroi du XVIIIe siècle et un château renaissance appartiennent à des propriétaires différents. Le tout fait partie d'un ensemble dont la partie la plus ancienne et la plus remarquable est l'octroi fortifié.","architecture":"VERRIERES,  l'édifice est édifié selon le principe de symétrie de l'architecture classique, il se compose de trois parties distinctes réparties autour d'une cour. Un corps de logis central à deux niveaux présente une façade rythmée par des fenêtres, sous arcs plein cintre au rez-de-chaussée et quadrangulaires à l'étage. La partie centrale, légèrement saillante, comporte l'entrée surmontée d'un balcon. La façade sur jardin, quasiment identique, avec simplification des ouvertures. Le bâtiment central est encadré de deux ailes en retour contenant les communs, une chapelle et, au second niveau, des appartements. Au sud, un ensemble de bâtiments formant une cour, prolongée par  des vestiges de la forteresse du XVIIe siècle. Succédant eux-mêmes à un édifice du XIVe siècle ces derniers déterminent une enceinte flanquée de deux tours circulaires et d'une échauguette. L'entrée s'effectue au nord par une porte fortifiée surmontée d'une salle de garde en encorbellement cantonnée de tourelles et dotée de mâchicoulis.                                                                                                  BOURNAND, c'est un bâtiment d'une grande sobriété présentant un plan en L. Le corps de logis principal, rectangulaire, est couvert d'une haute toiture d'ardoise à deux pans. Il possède trois niveaux apparents et deux tours carrées, couvertes d'ardoise, lui sont accolées; l'une est prolongée à son extrémité par un bâtiment de dépendances, l'autre se trouve dans l'angle formé par un second corps de logis en retour d'équerre. L'ensemble, remanié au XIXe siècle, possède un charme certain.","habitants":"Verrières,marquis Banyul de Monférré\r\n        \r\n        \r\n        \"","divers":"Bournand grav 1-2                                                                        Verrières grav 3 à 7","gps":"","images":["../image/image_86/86_Verri%c3%a8res_Bournand_1.jpg","../image/image_86/86_Verri%c3%a8res_Bournand_2.jpg","../image/image_86/86_Verri%c3%a8res_Bournand_3.jpg","../image/image_86/86_Verri%c3%a8res_Bournand_4.jpg","../image/image_86/86_Verri%c3%a8res_Bournand_5.jpg","../image/image_86/86_Verri%c3%a8res_Bournand_6.jpg","../image/image_86/86_Verri%c3%a8res_Bournand_7.jpg"]},"Consult_chateau_formulaire06f6":{"id":"Consult_chateau_formulaire06f6","dept":"86","canton":"Montmorillon","commune":"Villemort","nom":"Villemort","type":"Château","periode":"XVI","histoire":"VILLEMORT, son histoire qui se déroule sur huit siècles, débute dans le relevé des fiefs de 1292 ; il appartenait alors à la Maison de Crevant. Villemort a connu plusieurs propriétaires : Bertrand du Lys (Saint-Georges) ; Jacques Cur, puis, au fil du temps, les familles dAssy, de Menou du Mée, Delaporte de Montval et de Chabrillan qui en furent les possesseurs jusquà la Révolution. Parmi les évènements marquants, on peut faire figurer le siège de 1568 par Charles de Barbançois, seigneur de Sarzay, chef des armées catholiques et royales. Quand Marceline et Raymond Darrigo ont fait lacquisition du château de Villemort, en 1967, à l'ouest de st Germain, le château appartient au début à la famille de Poix, passe ensuite à la famille de Bouëx, depuis 1850 transmis deux fois côté femmes. Il n'a jamais été vendu. Il appartient à la famille de la Rochetulon.  aujourd'hui à Marceline Darrigo.","architecture":"VILLEMORT, les murs des tours remontent au XIIIe siècle. Corps central et partie haute des tours datent de 1600-1610. Depuis peu de remaniements. Tuile plate remplacée par de l'ardoise au milieu XIXe siècle. Après 1826 est bâti l'élément nord qui contient un escalier monumental. Inscription latine extraite de la Bible psaume 126-1 sur le linteau d'une cheminée remployée comme linteau de porte élévation nord.","habitants":"Famille dAssy,\r\n        \"","divers":"Villemort  46° 33' 08\" nord, 0° 55' 23\" est","gps":"","images":["../image/image_86/86_Villemort_1.jpg"]},"Consult_chateau_formulaire3b0a":{"id":"Consult_chateau_formulaire3b0a","dept":"86","canton":"Vivonne","commune":"Vivonne","nom":"Vivonne","type":"Château","periode":"XIV-XVII","histoire":"A Vivonne le château de Carrelière,  Cercigny, de la Planche, de Bonnevaux, de Roquillon et de Varennes pas d'info pour ces deux derniers.                                                                                         CARRELIERE, le premier seigneur connu à La Carrelière au XVIIe siècle est Estienne Roger, écuyer. La propriété passera dans la famille Berland. Louis Berland, chevalier de l'ordre de Malte, et son épouse, Madeleine Tesnon, qui la lèguèrent en 1781, à Alexandre-Pierre Choquin de Sarzec, époux de Esther Aubineau d'Insay. A la Révolution, le domaine sera vendu comme bien national à Jacques Souchaud.                                                                                                    CERCIGNY, propriété mentionnée pour la première fois en 1303, associée à la famille de Rochechouart qui la conservera jusqu'au XVIIIe siècle. Le château, en partie détruit pendant la guerre de Cent Ans et les guerres de religion, ne fut plus habité jusqu'au XVIIe siècle, époque de la reconstruction d'une partie de la demeure. Au XVIIIe siècle, la propriété revient par alliance aux Frotier de La Coste-Messelière. Après la Révolution, le château passe dans les mains de plusieurs propriétaires. Enfin, en 1890 la famille Majou de La Debutrie en fait l'acquisition; elle l'habite encore aujourd'hui.                                                                                      PLANCHES, cette demeure seigneuriale a été construite par Pierre Régnier, maire de Poitiers en 1516, restaurée quatre siècles plus tard par la famille Aymer de La Chevalerie. Malgré son ascension sociale sous le règne de Louis XII, Pierre Régnier, docteur régent à la faculté de droit, limite ses ambitions.   Dans un second temps, son fils Louis, procède à l'allongement du logis,   augmenté d'une nouvelle salle.","architecture":"CARRELIERE, un plan rectangulaire, la façade est interrompue par une tour carrée demi hors uvre. Le bâtiment principal, à deux niveaux apparents et cinq travées d'ouvertures irrégulières, est doté d'une toiture à deux pans couverte d'ardoise. La tour carrée possède un niveau supplémentaire et pourvue d'un toit à croupes avec à son faîte un lanternon d'ardoise surmonté d'une girouette. A l'un des angles une autre tour carrée mais plus basse, avec toit arasé couvert de tuiles canales. A l'arrière, une petite échauguette en brique, posée sur culot, est coiffée d'un dôme couvert d'ardoise.                                                                                                                       CERCIGNY, l'édifice est composé d'un bâtiment central, ancien châtelet d'entrée du XIVe siècle et réaménagé au XIXe siècle et de trois ailes rectangulaires disposées bout à bout en arc de cercle. Ces ailes furent entièrement remodelées au XIXe siècle et XXe siècle. La chapelle N-D de la Consolation fut bénie le 28 octobre 1678. Le pigeonnier rond est considéré comme le plus grand de la Vienne (3300 boulins).                                                             PLANCHES,  limite ses ambitions à un corps de logis rectangulaire, simple en profondeur, divisé en deux par un mur de refend et plaqué contre une forte tour.  Les cheminées monumentales sont adaptées à l'ampleur des pièces. Les croisées de l'étage portent la marque de la première Renaissance. Élie, le cadet, fait construire à l'angle sud ouest une tour carrée ornée d'un petit cabinet en saillie accessible par une vis qui complète le système de circulation. L'échauguette à dôme n'est pas le seul ornement de ce pavillon dont la porte extérieure s'enrichit de pilastres classiques. Terrasses ouvertes sur le paysage, frondaisons et futaies dessinent le cadre de ce château de plaisance.","habitants":"Cercigny;  famille de Rochechouart \r\n        \"","divers":"A Vivonne 46° 45' 22,68\" Nord 0° 52' 26,76\" Est, le château de Carelière grav 1,  Cercigny grav 2, de la Planche grav 3, de Badonières-7, de Roquillon grav-4  et de Varenne grav-5-6 Bretinières _9 Touche grav-8","gps":"","images":["../image/image_86/86_Vivonne_1.jpg","../image/image_86/86_Vivonne_2.jpg","../image/image_86/86_Vivonne_3.jpg","../image/image_86/86_Vivonne_4.jpg","../image/image_86/86_Vivonne_5.jpg","../image/image_86/86_Vivonne_6.jpg","../image/image_86/86_Vivonne_7.jpg","../image/image_86/86_Vivonne_8.jpg","../image/image_86/86_Vivonne_9.jpg"]},"Consult_chateau_formulaire299e":{"id":"Consult_chateau_formulaire299e","dept":"86","canton":"Vouneuil sous Biard","commune":"Vouillé","nom":"Vouillé","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Vouillé celui de Grandmaison et celui de Périgny.                                                                                                         \r\n GRANDMAISON,  remonte au XVe siècle, il aurait servi de relais de chasse au roi de France, François 1er.                                            PERIGNY, le château actuel, rebaptisé en 1860 par la propriétaire de l'époque, Madame Hunault de la Chevalerie. Par testament, le Chapître de Sainte-Radegonde hérite de la propriété pour quelques centaines d'années seulement. L'impôt trop élevé oblige le clergé à se séparer de Périgny. Plusieurs propriétaires se succèdent dont 5 générations de Foy de Peyraud qui disparaissent pendant la révolution de 1789.\r\nL'élément dominant est un escalier sculpté dans la pierre du pays et orné d'un blason aux armes de la famille.Ce clin d'oeil sur le passé de Périgny laisse penser que le rôle important, joué au cours des âges, ne s'arrête pas avec le XXe siècle. En 1973, le château est transformé par Mme et Mr Brossard en hôtel-restaurant. En Août 2007, Kerstin et Thierry Baratte  deviennent les nouveaux propriétaires après Jeanine et Philippe Bini qui ont dirigé cet établissement durant 8 ans, c'est devenu un Hôtel-Restaurant de standing.  Les propriétaires en sont Kerstin et Thierry Baratte.","architecture":"GRANDMAISON, est composée d'un corps de logis rectangulaire comprenant 3 niveaux. Le dernier niveau est un comble percé d'une lucarne à meneaux. Le bâtiment est flanqué sur la cour d'une grosse tourelle octogonale d'escalier, coiffée d'un toit pointu, sous la base duquel sont percées des ouvertures, juste au-dessus d'une corniche, la porte de cette tourelle est encadrée de piédroits et surmontée d'une accolade fleuronnée. Au-dessus, dans une partie accordant la tour au corps de bâtiment, se trouve une fenêtre à accolade.                                                                                         PERIGNY, au Moyen-Age, il s'agissait d'une maison forte devenue une ferme de plan rectangulaire, cour fermée avec quatre tours d'angle. Elle commandait le gué de Charbonneau et la route du sel venant du vieux Poitiers en direction de Niort, route celtique. Par la suite, à la fin du XVIe siècle fut bâti, le vieux château flanqué de ses quatre tours d'angle est abandonné aux fermiers pendant que les nouveaux châtelains édifient dans les goûts romantiques et sous l'influence de Viollet-Le-Duc, un château d'opérette.","habitants":"Grandmaison     François  1er                                                                                     Périgny,  Madame Hunault de la Chevalerie\r\n        \"","divers":"à Vouillé celui de Grandmaison grav 1 et celui de Périgny                         grav 2-3-4 Périgny  46° 38' 29\" Nord, 0° 10' 11\" Est","gps":"","images":["../image/image_86/86_Vouill%c3%a9_1.jpg","../image/image_86/86_Vouill%c3%a9_2.jpg","../image/image_86/86_Vouill%c3%a9_3.jpg","../image/image_86/86_Vouill%c3%a9_4.jpg"]},"Consult_chateau_formulaire838b":{"id":"Consult_chateau_formulaire838b","dept":"86","canton":"Vouneuil sous Biard","commune":"Vouneuil sous Biard","nom":"Vouneuil_Biard","type":"Château","periode":"XIV-XV-XVIII","histoire":"Dans cet article deux châteaux, Bernagout et Maison-Neuve  à Vouneuil  sous Biard.   Dans article suivant  le château de Boivre du Creps de Boivre  et des Quatre Vent, du Grand-Beauvoir Grand Marais et Sablonière.                                                                            BERNAGOUT, cet ancien fief relevant de la Chaise-de-Biard est mentionné dès 1324 sous le nom de Bernagou.  Au XVIIIe siècle, Philippe François Legier, écuyer du roi et seigneur de la Roche, de la Mothe de Maillerais et de La Laurencière, en est propriétaire. A sa mort en 1770, il le lègue à sa fille Marie-Anne-Angélique. Celle-ci épouse Jean-Louis Aubineau d'Insay, écuyer du Roi, seigneur de la Sigone et de la Roche, trésorier de France à Poitiers. Vendu en 1812, le château passe à la famille du Patural puis par mariage, à la famille de Touzalin. En 1865 M. du Patural fait installer un barrage sur le ruisseau des Fontaines pour faire mouvoir une machine hydraulique élevant l'eau à la hauteur de son habitation. A partir du XIXe siècle, quatre fermes dépendent du château: Laporte, le Lac de Bernagout, la Droiterie et le Linot.                                                                                          MAISON NEUVE, mentionné en 1406  puis en 1526 comme dépendance du chapitre de la cathédrale de Poitiers. Le 25 novembre 1759 la chapelle qui est dans la Maisonneuve appartenant à monsieur René Degenne, bénite sous l'invocation de Sainte Magdeleine par M. Degenne Prestre, chanoine de la cathédrale, docteur.","architecture":"BERNAGOUT, la comparaison entre les plans cadastraux de 1831 et de 2004 montre que la configuration générale, l'allée rectiligne, la plupart des bâtiments disposés autour des deux cours et la fuie sont conservés. Le logis, comme la fuie, semble avoir été bâti au XVIIe siècle. Les pavillons latéraux sont des adjonctions postérieures. Certains corps de bâtiment ont été reconstruits ou agrandis, notamment celui qui est situé au sud-est de la cour. En outre, plusieurs ont été construit après 1831. Parmi ces constructions nouvelles, le logement de la ferme de Laporte dont la façade antérieure semble dater du deuxième quart du XIXe siècle en raison de l'ordonnance générale. Mais la façade arrière comporte un linteau de porte et un encadrement de fenêtre en accolade qui peuvent être des remplois. Un séquoia de taille importante, espèce introduite en France au milieu du XIXe siècle, est planté dans le parc. Des réfections ont été réalisées récemment.                                                                                                MAISON-NEUVE, les ailes du logis semblent avoit été construites en 1798, alors que le corps de bâtiment central a été reconstruit en 1802.  au devant du logis s'étend une cour fermée par des bâtiments avec un passage à l'ouest et, plus à l'ouest, un ensemble de bâtiments aujourd'hui détruit qui correspond soit au château primitif. A l'emplacement de ces bâtiments et d'une partie de ceux qui fermaient la cour avait été aménagée une vaste avant-cour avec allée centrale, bordée de communs au nord et au sud et d'un mur avec un portail à l'ouest. Au début du XIXe siècle le domaine appartient aux  Rochebrochard.","habitants":"Bernagout; Famille de  Philippe François Legier                       Maison neuve;  Monsieur René Degenne\r\n        \"","divers":"Bernagout grav-1 et Maison-Neuve  à Vouneuil  sous Biard 46° 43' 12\" nord, 0° 30' 34\" est","gps":"","images":["../image/image_86/86_Vouneuil_Biard_1.jpg","../image/image_86/86_Vouneuil_Biard_2.jpg"]},"Consult_chateau_formulairea883-3":{"id":"Consult_chateau_formulairea883-3","dept":"86","canton":"Vouneuil sous Biard","commune":"Vouneuil sous Biard","nom":"Vouneuil_Biard_II","type":"Château","periode":"XVI-XIX","histoire":"BOIVRE, de style néo-Renaissance construit à la fin du XIXe siècle; c'est la famille de Lestang qui, en 1942, l'a vendu à l'État. Château de plan en U où se découpent de multiples décrochements. La façade principale, régulière et symétrique, présente un pavillon d'entrée. Le rez-de-chaussée, légèrement surélevé, est surmonté d'un premier étage et d'un étage de comble. La façade antérieure compte, elle, quatre niveaux, puisqu'elle comprend un étage de soubassement traité sous la forme d'un portique décoré de bossages portant un balcon. Le corps principal est cantonné d'une part par une tour quadrangulaire à pans  et d'autre part par une tour circulaire dans laquelle s'enroule l'escalier menant au balcon.                            GRAND-BEAUVOIR, ancien fief relevant d'Auzance,  mentionné à partir du XVe siècle: Beauvoir est cité en 1404 dans le Grand Gautier, puis Beauvoys en 1496 par les archives de l'abbaye Saint Jean de Montierneuf de Poitiers. Au XVIIIe siècle, Pierre Laurent Clément Manguin de Joumé, écuyer du roi, est seigneur de Beauvoir. Au début du XIXe siècle, le château appartient à la famille Poumailloux avant de passer à la famille Degove. Une plaque commémorative indique que Marthe et Marie Degove ont posé la 1ère pierre du château le 8 mars 1856. Au XXe siècle, le domaine appartient à la famille Collet, puis aux Roty. La propriété est vendue en1942 à la ville de Poitiers en vue de devenir une colonie de vacances, il est remanié par M. Fournier, architecte, (hormis le gros-oeuvre et la charpente). Depuis 1975, le château accueille un centre aéré.","architecture":"CREPS DE BOIVRE, construit sur les ruines dun château du XIIIe dominant la Boivre, le nouveau château a été construit vers 1865. En 1942, le domaine est récupéré par lEtat pour y installer un centre régional sportif dans le but de former les maîtres déducation populaire et des animateurs des mouvements de jeunesse. Après la Libération, des travaux sont entrepris pour construire de nombreuses installations sportives. Devenu Centre Régional dEducation Physique et Sportive, le « Creps » a vu passer de nombreux et prestigieux athlètes français                                                                                          QUATRE VENT , figurent au XVIIIe siècle . Selon l'acte de vente passé le 15 février 1760 par devant maître Ribault, notaire royal à Poitiers,  était une métairie dépendante de la seigneurie de La Sablonière, liée aux terres de La Marchande et de La Gannerie.  Par héritage de Marie-Anne Durant de La Pastellière, en 1823, devient la propriété des Nicolas de Sigon, magistrats à Poitiers. Le 24 novembre 1839 un acte de maître Deloynes,  indique que la propriété est composée \"d'une maison de maître avec en clôture une métairie appelée la Marchande, une autre dite la Gannerie\". A la fin du XIXe siècle, les bâtiments existants ont été détruits pour faire place à l'édifice actuel bâti pour la famille Nicolas de la Rinière. Vers 1925, M. de la Rinière fait modifier le logis. Le château, à haute toiture en ardoise et façade ordonnancée.","habitants":"Boivre,famille de Lestang                                                                     Gd-Beauvoir  famille Poumailloux  \r\n        \"","divers":"le château de Boivre grav-1-2  du Creps de Boivre grav 4-5 et des Quatre Vent grav-3, du Grand-Beauvoir grav-6","gps":"","images":["../image/image_86/86_Vouneuil_Biard_II_1.jpg","../image/image_86/86_Vouneuil_Biard_II_2.jpg","../image/image_86/86_Vouneuil_Biard_II_3.jpg","../image/image_86/86_Vouneuil_Biard_II_4.jpg","../image/image_86/86_Vouneuil_Biard_II_5.jpg","../image/image_86/86_Vouneuil_Biard_II_6.jpg"]},"Consult_chateau_formulairebf0f":{"id":"Consult_chateau_formulairebf0f","dept":"86","canton":"Vouneuil sous Biard","commune":"Vouneuil sous Biard","nom":"Vouneuil_Biard_III","type":"Château","periode":"XV-XIX","histoire":"SABLONIERE, est mentionnée  en 1418 comme dépendance du chapitre de Saint Hilaire de Poitiers, appartient à Charles Philippe Durant, écuyer, seigneur de La Pastelière.                                                                                  GRAND-MAZAIS  élégante maison de maître à la Mansart, édifiée à la fin du XVIIe siècle, relais château de la famille Carcel","architecture":"SABLONIERE,   les bâtiments, ont été reconstruits  dans la seconde moitié du XIXe siècle. En 1885 Henri de Sazilly étant propriétaire, une nouvelle chapelle est édifiée,situé dans un vaste parc et accompagné de communs. Le logis, de plan rectangulaire, est prolongé par un corps de bâtiment qui le relie à une chapelle. Sa façade est ordonnancée, à cinq travées, avec porte centrale en plein cintre à encadrement mouluré. La travée centrale est encadrée par deux tours engagées, plus hautes que le logis lui-même et couvertes d'un toit conique. Les appuis des fenêtres sont moulurés et une corniche couronne les murs. Entre les deux tours, la fenêtre de l'étage est surmontée de faux créneaux. Le mur de chevet de la chapelle est percé d'une haute baie couverte d'un arc brisé.","habitants":"Gd-Beauvoir  famille Poumailloux \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Grand Marais grav 1-2 et Sablonière grav 3.","gps":"","images":["../image/image_86/86_Vouneuil_Biard_III_1.jpg","../image/image_86/86_Vouneuil_Biard_III_2.jpg","../image/image_86/86_Vouneuil_Biard_III_3.jpg"]},"Consult_chateau_formulaire8fb8":{"id":"Consult_chateau_formulaire8fb8","dept":"86","canton":"Chauvigny","commune":"Vouneuil sur vienne","nom":"Vouneuil_Vienne","type":"Château","periode":"XVII","histoire":"CHITRE Pendant la Révolution, le pillage et un incendie en firent une ruine, les habitants du voisinage se mirent à exploiter, comme dans une carrière, les belles pierres des tours et des murailles, Chitré aurait fini par disparaître, si sa bonne étoile ne lavait fait tomber entre les mains dEdmond Treuile en 1855. Cest son fils, Raoul, qui entreprit sa restauration à partir de 1878, en respectant le style Renaissance.                                                                      CHITRE, en 1372 le fort de Chitré fut attribué par Pierre de Vieux Bourg à un de ses lieutenants, Jean de Kerlouet, qui mourut quatre ans plus tard au cours du siège de Niort. En 1378 il en fut dépossédé suite à son refus dapprouver la confiscation du duché de Bretagne par le roi de France. En six ans, Chitré changea  5 fois de propriétaire pour aboutir, en 1378, entre les mains de Pierre de Vieux Bourg qui le céda la même année à Guy Turpin de Crissé. Cette famille le conserva pendant près de cinq cents ans. Endommagé durant la guerre de Cent-ans, Chitré fut reconstruit, vers le milieu du XIVe par Charles Tiercelin de la Roche du Maine. Au début du XVIe siècle, la fille ainée de Jacques Turpin épouse Charles Tiercelin de la Roche du Maine, un des grands capitaines de François 1er.","architecture":"DU-FOU,  Yvon du Fou, gouverneur du Poitou, capitaine de Louis XI.  Le roi en récompense, le fit épouser Anne Mourraut, fille du maire de Poitiers, héritière de la seigneurie de lArmenteresse. Le Roi fit reconstruire une place forte qui portera le nom de sa famille \"Fou\".  François-Gabriel-Thibaud de La Brousse, Marquis de Verteillac, Baron de la Tour-Blanche, époux de Charlotte-Jeanne-Félicité-Elisabeth. Au XVIIe siècle, il appartient à la famille Appelvoisin de la Roche du Maine. Charles Tiercelin dAppelvoisin de la Roche du Maine possède déjà le château de Chitré mais il préfère le quitter pour celui du Fou  y mourut le 26 octobre 1854. Cette famille posséda Le Fou jusquà la Révolution, le dernier représentant ayant été guillotiné en 1793. En 1853 la propriété est vendue au comte de Campagne. Aujourdhui en partie reconstruit, cest une demeure où loge un descendant du comte de Campagne.  Installé sur une plate-forme cernée de profondes douves sèches, accessible par un haut châtelet implanté latéralement, cantonné de grosses tours rondes. Au XVIIIe siècle, le chemin de ronde sur mâchicoulis fut supprimé, les toitures abaissées, les percements régularisés, la courtine sud abattue, ouvrant ainsi la forteresse sur le paysage. Il a souffert d'un bombardement durant la seconde guerre mondiale mais a été restauré depuis. Du château du Fou il reste les douves, les vestiges de la poterne d'entrée avec ses deux tours et la tourelle d'escalier avec sa voûte.Les parties les plus curieuses de ce château sont l'escalier d'honneur, les anciennes cuisines, les sous-sols avec des voûtes dont les nervures viennent finir sur des têtes d'hommes aux oreilles de chiens.","habitants":"Chitré; Famille de Guy Turpin de Crissé                                         Du-Fou famille Appelvoisin de la Roche du Maine\r\n        \"","divers":"Château de Chitré grav 7-à-8 .                                                    Château du Fou grav de 1 à 6                                                         46° 43' 12\" nord, 0° 30' 34\" est","gps":"","images":["../image/image_86/86_Vouneuil_Vienne_1.jpg","../image/image_86/86_Vouneuil_Vienne_2.jpg","../image/image_86/86_Vouneuil_Vienne_3.jpg","../image/image_86/86_Vouneuil_Vienne_4.jpg","../image/image_86/86_Vouneuil_Vienne_5.jpg","../image/image_86/86_Vouneuil_Vienne_6.jpg","../image/image_86/86_Vouneuil_Vienne_7.jpg","../image/image_86/86_Vouneuil_Vienne_8.jpg","../image/image_86/86_Vouneuil_Vienne_9.jpg"]},"Consult_chateau_formulaire7eff":{"id":"Consult_chateau_formulaire7eff","dept":"86","canton":"Migné Auxances","commune":"Yversay","nom":"Yversay","type":"Château","periode":"XIII-XVI","histoire":"YVERSAY, le titre de seigneur d'Yversay apparaît au XVIe siècle. La maison noble d'Yversay passe au IIIe siècle aux mains de la famille Jouslard. Philippe Jouslard a été député du Poitou et maire de Poitiers en 1465. De nouveaux propriétaires et d'autres restaurations à la fin du XIXe siècle, se sont succédé dans cette propriété située dans un parc au nord et une cour au sud fermée par des bâtiments de communs.","architecture":"YVERSAY, une ancienne entrée à bossages est sommée d'un pigeonnier (1849). Le logis sobre, rectangulaire, s'élève sur deux niveaux sous une toiture à pans brisés, le brisis est éclairé par des lucarnes. Les détails sont soignés: tables, corniche, et encadrement des baies. L'élévation postérieure, assise sur une terrasse, voit ses deux pavillons latéraux marquer une avancée plus sensible que l'élévation sur cour. L'intérieur se distingue par un beau décor XVIIIe siècle : lambris, gypseries, et cheminées.   Édifié au milieu du XIIIe siècle, par la famille Jouslard, le château d'Yversay est un bel exemple des « maisons des champs » de l'aristocratie poitevine, au siècle des lumières, est inscrit aux M.H. depuis 1988.","habitants":"Famille Jouslard\r\n        \"","divers":"Yversay  46° 40' 49,8\" Nord, 0° 12' 54,65\" Est","gps":"","images":["../image/image_86/86_Yversay_1.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','86 — Vienne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
