 actuels arrière petit fils le baron Lassat de Meynard.   L'édifice nous est parvenu pratiquement dans son entier, hormis une restauration. L'ancienne collégiale fut détruite pour être remplacée par un mur de courtine décoré de pinacles.     Propriétaire actuel monsieur de Lassat.                                         MONTIGNY, cité dans une charte de 1400, Montigny est le fief des Blandin. date du XIXe siècle. De 1685 se succèdent Louis, Alexis puis Pierre Blandin. Ils épousent des filles Morisset, Villiers, Proust de La Grimaudière, avocat en Parlement. Demoiselle Marthe Blandin a en 1767, financé l'autel et la statue de la Vierge en l'église Saint-Philibert de Messais. Le domaine est acheté après la Révolution par Pierre Lanlaud, souche de quatre générations de notaires et conseillers généraux de Moncontour.","architecture":"DISSAY, le plan primitif comportait un vaste quadrilatère flanqué aux angles de quatre grosses tours rondes. Deux côtés étaient occupés par le corps de logis, un troisième par la chapelle de la collégiale et par la porte d'entrée défendue par deux tours. Le quatrième côté devait probablement être occupé par les communs. La chapelle particulière de l'évêque était aménagée dans l'une des tours d'angle adjacente à la collégiale. Des douves ceinturent la construction. Au XVIIIe siècle, certaines modifications furent apportées à ce plan. La face sud fut supprimée pour ménager un accès direct à des communs construits en dehors des douves. Sur la face nord, une partie du bâtiment du XVe siècle fut remplacée par une construction comportant une galerie.   La visite permet dadmirer la cour intérieure et la tourelle d'angle polygonale. Elle abrite un escalier se terminant par une voûte en palmier. A voir la chapelle qui abrite un bel exemple de fresques du XVIe siècle et les beaux vitraux du XVIe siècle. Une promenade dans le parc, dessiné par l'architecte paysagiste André Le Nôtre, conduit le visiteur sur les traces de François Ier ou Louis XIV, qui furent reçus en ce domaine.                                                                            MONTIGNY, de plan carré à trois niveaux conçu en six pavillons accolés  à toitures en croupe  en ardoises  avec lanternon sur toit central.  Flanqué sur angle gauche d'une tourelle toit en poivrière  et en façade dans l'encadrement du pavillon d'entré d'échauguette à toit en poivrières. A l'orée d'un bois, dominant des étangs, doté d'une terrasse et de pins-parasols, est une longue maison des champs, aux pièces ornées de boiseries Louis XIII et, plus loin, un somptueux pigeonnier carré, couronné d'un toit pyramidal à lanternon ajouré.","habitants":"Dissay Famille du  comte Fruchard                                   Montigny famille des Blandin.\r\n        \"","divers":"à Dissay celui de Dissay grav de1 à 7 et de Montigny grav 8","gps":"","images":["../image/image_86/86_Dissay_1.jpg","../image/image_86/86_Dissay_2.jpg","../image/image_86/86_Dissay_3.jpg","../image/image_86/86_Dissay_4.jpg","../image/image_86/86_Dissay_5.jpg","../image/image_86/86_Dissay_6.jpg","../image/image_86/86_Dissay_7.jpg","../image/image_86/86_Dissay_8.jpg"]},"Consult_chateau_formulaire1cd4":{"id":"Consult_chateau_formulaire1cd4","dept":"86","canton":"Lusignan","commune":"Saint-Sauvant","nom":"Faljoie","type":"Château","periode":"XVI-XVII","histoire":"FALJOIE,  les seigneurs de Faljoie érigent un château fort, clos et fortifié, héritier direct des mottes castrales, avec une fonction plus symbolique que défensive. La première trace écrite dun homme habitant la seigneurie de Faljoie est celle dHugo de Faljoie, en 1248, et sans nul doute lun des premiers seigneurs du lieu. Faljoie réapparaît dans les archives le 23 février 1411, appartenant à deux frères, Jehan et Simon Baions, qui effectuent un échange de propriétés. Simon reçoit de son frère la moitié de leur hôtel et l'hébergement de Faljoie. En 1423, cest Jean Lauvergnat, seigneur de Luché, qui tient lhébergement de Faljoie. Au début du XVIIIe siècle, après trois siècles sans éléments historiques Faljoie appartient à la famille de La Broüe de Vareilles, le seigneur de Faljoie est la dame de Monts née Marguerite de la Broüe de Vareilles, mariée à Gabriel Le Pelletier, baron de Monts et ensuite à François Chardeboeuf, seigneur dEtruchat. Marguerite de la Broüe meurt en 1737 sans postérité, la seigneurie revint à son neveu, François de la Broüe de Vareilles. Mais criblé de dettes, il vend Faljoie, pour payer un carrossier pour le prix dune chaise milanaise. Jean-Robert-Louis Bellivier, écuyer, seigneur de Prin, acquiert Faljoie en 1752. Depuis, le domaine na cessé dappartenir à sa descendance.","architecture":"FALJOIE, se présente aujourdhui sous la forme dun logis organisé autour dune cour intérieure fermée. Lentrée est encadrée de deux tours circulaires. Des bâtiments destinés aux animaux prolongent cette dernière, dans sa partie gauche. Le corps de bâtiment principal est flanqué dune aile en retour déquerre à sa gauche et dune grange à sa droite. Les deux tours dentrée, équipées de canonnières, peut-être rajoutées, seraient du XVIIe siècle. Elles firent fonction de pigeonnier. Le bâtiment principal, de plan rectangulaire allongé, est percé sur deux niveaux, de cinq travées de baies régulières. Lensemble est recouvert dun toit dardoises. A lorigine, lédifice sétalait sur un seul niveau et cest au milieu du XIXe siècle quHenri de Prin le surélève dun étage. La cave voûtée, sous laile gauche, laisse à penser que cétait ici que se trouvait le logis primitif de Faljoie.","habitants":"Famille de La Broüe de Vareilles,\r\n        \"","divers":"Château de Faljoie à saint-Sauvant","gps":"","images":["../image/image_86/86_Faljoie_1.jpg","../image/image_86/86_Faljoie_2.jpg"]},"Consult_chateau_formulaire7433":{"id":"Consult_chateau_formulaire7433","dept":"86","canton":"Civray","commune":"Saint-Saviol","nom":"Feuilletrie","type":"Château","periode":"XIV-XX","histoire":"FEUILLETRIE, la Feuilletrie était le siège dune seigneurie qui, du XIVe siècle jusquen 1789, a toujours appartenu à la même famille, les de Bessac. La noblesse de cette famille fut prouvée par une enquête faite en octobre 1245. La descendance masculine des de Bessac sarrête à la Révolution avec René-Jacques. Son fils Charles émigra et il est probable que ses deux frères en firent autant. Marie-Elisabeth-Félicité de Bessac épousa Jean-Baptiste de Brillac (de Nouzières) vers 1790. Le  château de la Feuilletrie, est aujourdhui dans la famille du Dr. Wicker, qui la sauvé de la ruine.","architecture":"FEUILLETRIE, château actuel, bâti au XXe siècle, fut reconstruit sur les fondations de lancienne demeure, comme beaucoup dautres. Il en reste des communs. Autrefois, le château était un bâtiment à deux étages percé de fenêtres carrées à meneaux croisés et flanqués à lun de ses angles dune tourelle ronde avec moucharabiehs; maison noble avec fuye, cour et servitudes.                                                                                                                         Le COMLOMBIER, de plan en U à deux niveaux accolé de deux pavillons carrés aux extrémités flanqué d'une série de lucarnes sur combles brisés.","habitants":"Famille, les de Bessac  Famille du Dr. Wicker,\r\n        \"","divers":"A St-Saviol le château de la Feuilletrie gra 1 à 3, le Colombier grav 4.","gps":"","images":["../image/image_86/86_Feuilletrie_1.jpg","../image/image_86/86_Feuilletrie_2.jpg","../image/image_86/86_Feuilletrie_3.jpg","../image/image_86/86_Feuilletrie_4.jpg"]},"Consult_chateau_formulaire5f3a":{"id":"Consult_chateau_formulaire5f3a","dept":"86","canton":"Lussac les Châteaux","commune":"Queaux","nom":"Fougeret","type":"Château","periode":"XV-XVII","histoire":"FOUGERET, le lieu est cité dès 1337 avec un certain Hélias de Fougerec. Dès 1416, les sources évoquent le chastel noble de Fougeré, fief de Haute Justice. Cette année 1337 est lannée de la déclaration de la guerre de cent ans entre le royaume de France et dAngleterre. Philippe VI de Valois et Edouard III sont en lice. Fougeret est occupé et peut être bâtit, par une des plus anciennes familles de France, les Frotier.  C'est certainement à la fin du second Empire, que les Robin Médard ont décidé de mettre le château au goût du jour. Si la disparition logique du château précède de la Révolution, celui de Fougeret, dont le propriétaire en 1792, un Brun Puyrajoux, bourgeois, allait bien profiter de la vente des Biens Nationaux pour senrichir, sinscrit dans la veine de ces rénovations qui réinterprètent le Moyen-Âge en portant au paroxysme du fantasme les droits et une idée de la noblesse de sang. Propriétaire famille Geffroy.","architecture":"FOUGERET est désormais la mise en scène de lhistoire des familles y ayant vécu et de celle qui ose le moderniser, le contextualiser durant la période faste, pour la bourgeoisie, du Second Empire. Les transformations de la demeure sont à la mesure de leurs moyens financiers qui devaient être importants. Le pouvoir devait devenir visible et même lisible dans le paysage par delà la Vienne doù Fougeret, trônant sur une falaise de 38 mètres, assied les restes de sa féodalité. La fonction défensive féodale nest pas entièrement conjurée. Les seuls éléments architecturaux extérieurs originels restants sont les bretèches, et deux fenêtres à meneaux.   A cette période de lhistoire, Fougeret est désormais définitivement aux mains de la bourgeoisie.\r\nFestival lété avec tir à larc, reconstitution de village et de camp militaire, concerts et théâtre, joutes à cheval, scènes de vie au château et démonstrations de métiers anciens.","habitants":"Famille de  Robin Médard \r\n        \"","divers":"Fougeret;  46° 20' 20\" Nord et 0° 40' 28\" Est","gps":"","images":["../image/image_86/86_Fougeret_1.jpg","../image/image_86/86_Fougeret_2.jpg","../image/image_86/86_Fougeret_3.jpg","../image/image_86/86_Fougeret_4.jpg","../image/image_86/86_Fougeret_5.jpg"]},"Consult_chateau_formulairee6b3":{"id":"Consult_chateau_formulairee6b3","dept":"86","canton":"Lussac les Châteaux","commune":"Gencay","nom":"Gencay","type":"Vestiges-Châteaux","periode":"XIII-XIX","histoire":"Deux châteaux à Gencay dont celui de Gencay, et de Verneuil. GENCAY, vestiges vers 1025, la puissante famille seigneuriale, les Rancon, s'y fixa. Le château fut peut-être détruit lors d'un incendie ou on le jugea inadapté aux nouvelles techniques de la guerre. Quoi qu'il en soit, peu après la victoire Française de Taillebourg en 1242, Geoffroy de Rancon, fidèle vassal de Louis IX et de son frère Alphonse de Poitiers, bâtit un nouveau château, qui permettra de défendre tout le sud du comté. En 1260, après l'extinction de la famille Rancon, le château revient par alliance aux seigneurs de L'Ile natifs de Touraine. Bouchard VIII et Barthélémy de L'Ile sont fait prisonniers avec le Roi Jean le Bon, lors de la bataille de Maupertuis en 1356. Dès lors, le château est occupé par Adam Chel d'Agorisses, capitaine du prince de Galles. Il sera repris en 1375 par Bertrand Du Guesclin, après un siège de deux années.","architecture":"GENCAY, vestiges  lieu de défense naturel, l'éperon rocheux était une place stratégique idéale pour la construction d'une forteresse au XIIIe siècle. Bel exemple d'architecture du Moyen-Age, tout est conçu pour la défense et l'attaque. Le châtelet d'entrée, les courtines et les tours exploitent les qualités naturelles du terrain et rendaient ce château imprenable. Un pont fixe récemment édifié à l'emplacement du pont-levis relie de nouveau la ville aux fortifications.                                                                                                        VERNEUIL  Le château de Verneuil est beaucoup moins célèbre que le château de Gençay, son illustre voisin du XIIIe siècle, la bâtisse règne au milieu d'un vaste parc, dominant l'étang  au bord de la Clouère,  On ne connait aujourd'hui rien de la récente histoire du bâtiment. L'édifice de plan rectangulaire compte trois niveaux, dont un étage sous combles. La décoration assez pauvre témoigne d'un certain éclectisme propre à la fin du XIXe ou au début du XXe siècle, mais l'inspiration médiévale semble l'emporter dans le travail des ouvertures baies à un ou deux meneaux sous un cordon en accolade et décor de trilobes sur les pignons de lucarnes.","habitants":"Gencay; Famille de Rancon                                                  Verneuil; famille de Verneuil\r\n        \"","divers":"à Gencay dont celui de Gencay, et de Verneuil grav 7.","gps":"","images":["../image/image_86/86_Gencay_1.jpg","../image/image_86/86_Gencay_2.jpg","../image/image_86/86_Gencay_3.jpg","../image/image_86/86_Gencay_4.jpg","../image/image_86/86_Gencay_5.jpg","../image/image_86/86_Gencay_6.jpg","../image/image_86/86_Gencay_7.jpg"]},"Consult_chateau_formulaire7ee4":{"id":"Consult_chateau_formulaire7ee4","dept":"86","canton":"Migné auxances","commune":"Cheneché","nom":"Gilles_de_Rais","type":"Maison-forte","periode":"XV-XVII","histoire":"GILLES de RAIS, deux seigneurs pouvant avoir subi une telle sanction; le premier est Simon Burleigh, chevalier anglais gouverneur de Loudun sous l'occupation anglaise qui a combattu les français et qui était marié à Marguerite de Beauçay. Il fut condamné pour trahison et décapité dans la tour de Londres en 1388. Le second n'est autre que le fils de Marie de Craon, Gilles de Rais, le tristement célèbre compagnon de Jeanne d'Arc condamné à mort en 1440 pour félonie et les meurtres d'au moins 140 enfants. En 1485, Louis Bâtard du Maine et sa femme Anne de la Trémoille ont fait entreprendre des travaux entre les deux tours ouest et au-dessus de la porte d'entrée ou ils ont fait aménager des pièces d'habitation. En 1670 on trouve dans un aveu de Jacques de Mesgrigny une description partielle du château.","architecture":"GILLES de RAIS,  composé de grosses tours et pavillons avec pont-levis, remparts, mâchicoulis et fossés à fond de cuve excepté les deux premières tours portail et entrée du château qui sont devers l'église du lieu avec le fossé de devant.   Il est difficile de préciser quand ce château a été construit. Les bouches à feu visibles sur les tours qui flanquent l'entrée sont caractéristiques du XVe siècle. A l'origine, dans les écrits du XIe siècle, sont mentionnés un fort \"chinipiacum castrum\" et une église \"ecclesia Santi Vicenti\". Ce premier château a été remplacé par le château des sept Tours, de forme pentagonale, avec sept tours à mâchicoulis, reliées les unes aux autres par d'épaisses murailles. Pour mieux assurer sa défense, il était entouré de douves alimentées en eau par un bras de la Pallu. La partie habitée s'étendait de la tour Ouest à la tour Nord-Ouest et se poursuivait au-dessus de la porte d'entrée jusqu'à la tour du Trésor (Nord). Celle du Sud-Ouest abritait le moulin, celle du Sud le colombier, celle du Sud-Est la prison et celle du nord-est les archives. Deux dates sont retenues pour l'arasement des tours, sanction courante et confiscation de la seigneurie en cas de condamnation.","habitants":"Famille de Marie de Craon, Gilles de Rais\r\n        \"","divers":"la maison forte de Gilles de Rais à Chéneché","gps":"","images":["../image/image_86/86_Gilles_de_Rais_1.jpg","../image/image_86/86_Gilles_de_Rais_2.jpg"]},"Consult_chateau_formulaire113c-2":{"id":"Consult_chateau_formulaire113c-2","dept":"86","canton":"Vivonne","commune":"Gizay","nom":"Gizay","type":"Château","periode":"XIV-","histoire":"Deux châteaux à Gizay dont celui de Chambonneau, de Ferrière pas d'info historique et  de Roussières.                                                                                            CHAMBONNEAU ou château de Camboniac est un château fort à Gizay, Il date du XIVe siècle. Son premier propriétaire était Jean Frotier de Melzéard et Mahaut de Vivonne. Cette ancienne forteresse est de styles : Médiéval et Renaissance. Le roi Jean le Bon aurait passé sa première nuit, au château , lors de sa captivité, quant il fut fait prisonnier par les Anglais. Ardent ligueur et échevin de Poitiers, François Palustre achète le château en 1578.  C'était un château fort, militaire et civil. Il appartient aujourd'hui à la familles de Beaucorps-Crequy - Lozouet de Beaucorps-Créquy. Sous Napoléon, le château fut racheté par monsieur de La Chaslerie. Le château de Chambonneau est inscrit aux M.H. depuis 1964.  jardins à la Française et de ses communs.\r\nROUSSIERES   n'étaient pas le siège d'un fief, la maison rurale des Roussières est cependant connue grâce aux archives de la cure de Gizay dès le milieu du XVIe siècle. C'est un bel édifice d'allure classique du XIXe siècle, dont l'architecture fait preuve d'un sens aigu de l'harmonie et de la simplicité.","architecture":"CHAMBONNEAU. labbaye de Ligugé vendit le domaine et un premier château fort y fut construit par Philippe VI de Valois au début du XIVe siècle, il servait de lieu de défense au pied de la colline pour profiter de la rivière. Les tours atteignaient 17 m de haut et le donjon carré 36 m de haut. Cette impressionnante place forte abrita Jean II le Bon après sa capture par les Anglais en septembre 1356. Elle appartint par la suite à cinq familles nobles dont les seigneurs de Gençay.  Sous Louis XI, des travaux furent entrepris, courtine et tours furent abattus côté ouest et lon y construisit des logis de chaque côté du châtelet. Vendu au XVIe siècle, le château fut réaménagé  d'un autre corps de logis. Finalement, les deux tours du châtelet furent définitivement détruites en 1953. Laspect massif du château de Chambonneau impose le respect.                                                                               ROUSSIERES, le château se compose d'un corps de logis principal à cinq travées d'ouvertures. Trois de ces travées sont à deux niveaux et présentent des baies à encadrement en pierre de taille avec linteau et appui. Les deux autres offrent les mêmes ouvertures aux deux premiers niveaux mais en possèdent un troisième sous le toit, éclairé de lucarnes sur toit à fronton triangulaire. Deux corps latéraux prolongent ce bâtiment à l'est et à l'ouest. Ils comportent une travée sur deux niveaux. L'un d'entre eux héberge la chapelle. Un perron de quelques marches donne accès à la demeure. Les trois corps de logis possèdent un toit en croupe couvert d'ardoise. Situé dans un magnifique parc paysager.","habitants":"Famille de Jean Frotier de Melzéard \r\n        \"","divers":"à Gizay    46° 27' 24,12\" Nord et 0° 26' 17,88\" Est. dont celui de Chambonneau grav 1 à 4, de Ferrière grav 7 et  de Roussières grav 5-6:","gps":"","images":["../image/image_86/86_Gizay_1.jpg","../image/image_86/86_Gizay_2.jpg","../image/image_86/86_Gizay_3.jpg","../image/image_86/86_Gizay_4.jpg","../image/image_86/86_Gizay_5.jpg","../image/image_86/86_Gizay_6.jpg","../image/image_86/86_Gizay_7.jpg"]},"Consult_chateau_formulaired4c6":{"id":"Consult_chateau_formulaired4c6","dept":"86","canton":"Loudun","commune":"Sammarçolles","nom":"Grande_Jaille","type":"Château","periode":"XVI","histoire":"LA GRANDEJAILLE, communément admise, l'attribution de la construction à Nicolas Coustureau, président de la Chambre des comptes de Bretagne, fait de ce château de plaine une oeuvre de la fin du XVIe siècle.  Une autre hypothèse attribue la plus grande partie de la demeure actuelle à René de La Jaille mort en 1557, dont les ancêtres étaient seigneurs du lieu depuis 1300.Lorsqu'il fait l'acquisition en 2006 du château de la Grande-Jaille à Sammarçolles, Bruno Chanetz se fait la promesse d'écrire sur cette magnifique demeure et sur ses différents propriétaires.                                                                                                                 A 1 Kilomètres au sud -Est Messemé                                                    MESSEME, construit au XVe siècle sur une motte féodale, le château de La Motte Messemé appartient toujours à la famille que l'on trouve à ses origines. Cette famille de Messemé est connue depuis le XIIe siècle. Fondé par les Messemé, il ne changea de mains qu'une seule fois pour passer aux d'Outrelavoye. C'est Henri-Louis de Messemé qui racheta le château au milieu du XVIIIe siècle, le domaine ne sortira plus de la famille et de sa descendance.","architecture":"LA GRANDEJAILLE, est une construction antérieure à 1555 et connut différents travaux d'aménagement entre 1617 et 1627.  Le pavillon d'entrée se distingue par une arche et  sa façade en pierre de taille et échauguettes et lucarne centrale,   ce pavillon est fermé par un portail aux menuiseries anciennes et communique avec la cour par un passage voûté d'arêtes. Cette aile sert de logement et de dépendances et a conservé l'essentiel de sa modénature.  Certains éléments du décor extérieur et intérieur, notamment les portes du logis, les peintures de la cheminée de la grande salle, évoquent les raffinements d'un magnérisme en vogue sous Henri III et encore au temps de Henri IV. Quoi qu'il en soit, les travaux se poursuivirent jusque dans le décennie 1640. Le logis est un bâtiment rectangulaire simple en profondeur, cantonné de tours circulaires et entouré sur trois côtés de douves sèches. La façade sur cour est ajourée de travées de baies flanquées de pilastres ioniques, les lucarnes au riche fronton portant blason, sont percées de baies en plein cintre.                                                                              MESSEME, fut remanié au XIXe siècle, se présente sous la forme d'un logis rectangulaire flanqué sur une façade de deux fines tourelles à poivrière et, sur l'autre, de deux des anciennes tours rondes. Il ferme un des côtés du terre-plein entouré de fossés toujours en eau dont les deux autres tours du château primitif, séparées du bâtiment, marquent les angles. Le domaine a gardé un pigeonnier rond au toit conique de tuiles plates éclairé de lucarnes, le sommet est pourvu d'un lanternon d'ardoise.","habitants":"Famille de Nicolas Coustureau\r\n        \"","divers":"deux châteaux Grande Jaille 4 à 8 et Méssémé grav 1-2-3","gps":"","images":["../image/image_86/86_Grande_Jaille_1.jpg","../image/image_86/86_Grande_Jaille_2.jpg","../image/image_86/86_Grande_Jaille_3.jpg","../image/image_86/86_Grande_Jaille_4.jpg","../image/image_86/86_Grande_Jaille_5.jpg","../image/image_86/86_Grande_Jaille_6.jpg","../image/image_86/86_Grande_Jaille_7.jpg","../image/image_86/86_Grande_Jaille_8.jpg"]},"Consult_chateau_formulaireb14d":{"id":"Consult_chateau_formulaireb14d","dept":"86","canton":"Lusignan","commune":"Celle-l","nom":"Grange_86","type":"Château","periode":"XVIII-XIX","histoire":"GRANGE;  Dans un registre du 21 janvier 1721 fut inscrit le baptême de François, fils de Jean Baptiste de La Grange, écuyer, seigneur de la Vassauderie (Quinçay). Le lieu-dit de La Grange apparaît en 1747 sur la carte de Cassini, mais on n'a pas à ce jour trouvé de logis noble ou de château dans les textes anciens. Dans la première moitié du XIXe siècle, la propriété est à Hyacinthe Duval, docteur en médecine et maire de Celle-l'Evescault, il effectue de nombreux travaux. En 1846, il habite La Grange avec sa femme, Mme Victorine Pion. Entre 1866 et 1872, la famille Babinet devient propriétaire à La Grange. Cette famille du Poitou compte parmi elle des avocats et des professeurs de droit et de sciences de grande valeur. En 1872, le domaine est partagé entre Louis Joseph Babinet, sa femme Lucy Bonneau du Chesne de Beauregard, et Lucy Aminthe Prieur Marçay, veuve de Louis Adrien Babinet. Elle habite le château avec son fils Hubert-Joseph Babinet, âgé de deux ans. Par alliance, la propriété passe à la famille Prieur Marçay et reste jusqu'au début de la seconde moitié du XXe siècle. Vers 1970, M. et Mme Ellie, orfèvres à Poitiers, achètent le château, mais ne l'habiteront pas et le vendront un an après leur achat à l'actuel propriétaire, M. Gargouil.","architecture":"GRANGE, la construction du château peut être datée au XVIIIe ou XIXe siècle, mais dans son architecture intérieure, des éléments antérieurs comme la porte surmontée d'un linteau en accolade caractéristique du XVe siècle, et un pavage très ancien installé sur le sol de la cuisine, ces éléments font penser que l'actuel château de la Grange fut édifié sur des fondations d'un édifice antérieur. Le logis s'organise selon un plan en L. Il est doté d'une tour carrée débordante dans son angle intérieur. Chaque corps de logis possède un toit à croupes couvert d'ardoises et présente quatre travées sur trois niveaux, plus un sous comble. L'ensemble est éclairé par de nombreuses ouvertures. La tour carrée possède quatre niveaux ouverts par une fenêtre.","habitants":"Jean Baptiste de La Grange                                                     Famille Prieur Marçay\r\n        \"","divers":"Château de Grange","gps":"","images":["../image/image_86/86_Grange_86_1.jpg","../image/image_86/86_Grange_86_2.jpg"]},"Consult_chateau_formulaire1b93-2":{"id":"Consult_chateau_formulaire1b93-2","dept":"86","canton":"Vivonne","commune":"Dienné","nom":"Guillonière","type":"Château","periode":"XVI","histoire":"GUILLONNIERE  l'origine du château est très ancienne. Il est mentionné dans un document de 1534. La Seigneurie de la Guillonnière dépendait de la Baronnie de Mortemer. Un siècle plus tard le propriétaire, Jacques Audebert est Maire de Poitiers. Au XVIIIe siècle, La Guillonnière appartient à Michel Mathias, Antoine Pays-Mellier, Trésorier de France. Au XIXe siècle, les familles Nicolas des Fossettes, de la Rinière et Collin de l'Hortet en sont propriétaires.","architecture":"GUILLONNIERE    A la fin du XIXe siècle et au début du XXe siècle, La Guillonnière fut une exploitation agricole consacrée à l'élevage et à la viticulture. Elle n'est plus en exploitation, mais il subsiste de belles dépendances: écuries, orangerie, pigeonnier, granges et porcherie ayant une grande harmonie architecturale. Durant la deuxième Guerre Mondiale, La Guillonnière vit des heures sombres et devient un Quartier Général d'officiers Allemands. Pratiquement inhabité depuis la guerre, le château de La Guillonnière revit grâce aux propriétaires actuels qui le restaurent totalement.","habitants":"Famille de Jacques Audebert \r\n        \"","divers":"Château de la Guillonière à Dienné","gps":"","images":["../image/image_86/86_Guilloni%c3%a8re_1.jpg","../image/image_86/86_Guilloni%c3%a8re_2.jpg"]},"Consult_chateau_formulaireb252":{"id":"Consult_chateau_formulaireb252","dept":"86","canton":"Châtellerault-2","commune":"Ingrandes","nom":"Ingrandes_86","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Ingrandes, château de la Bariollières, de Borde et de la Groie\r\n BARIOLLIERES,   précédé d'un parc d'agrément, le château paraît dater de la fin du XVIIIe siècle.                                                                        BORDE,   pas d'information historique.                                                                                                           LA-GROIE, relève du duché de Châtellerault, qui appartient à la famille d'Allogny, Chambellan et maître d'hôtel de Louis XI. Au XVe siècle construction d'une forteresse de forme carrée avec douves et pont-levis. En 1661, érection en marquisat, l'entrée est couronnée d'un fronton arrondi qui date de cette époque, les armoiries du XVIIe siècle y sont sculptées. La Roche, sieur de Céry, entreprend au XVIIIe siècle d'importants travaux de reconstruction. En 1789, elle est vendue comme bien national après son abandon. Au XIXe siècle, modifications importantes pour la famille Creuze qui transforme les bâtiments en exploitation agricole.","architecture":"BARIOLLIERES, bâti sur deux niveaux et couvert d'un toit à deux croupes d'ardoise, sa façade est animée d'un bel avant-corps à pans coupés. Deux ailes latérales, aux toitures cachées par un bandeau, prolongent le niveau du rez de chaussée et sont percées de fenêtres regroupées verticalement deux par deux. Indépendamment de l'escalier et de la terrasse rapportée au XIXe siècle, le corps central avec ses portes-fenêtres latérales et sa fenêtre d'axe au rez-de-chaussée présente un style proche de l'esprit des architectes de la Restauration ou de l'époque Louis-Philippe. Une aile en équerre avec le corps de logis principal, couverte d'une toiture à deux longs pans d'ardoise présente des baies au décor mouluré de la première Renaissance ; elle date de 1524. Une tour carrée, bâtie hors uvre au nord et accolée à cette aile, abrite l'escalier .                                                                                                                      BORDES, le grand corps de bâtiment est composé de deux niveaux avec un toit à croupes en ardoise. La façade, agrémentée d'un avant-corps en saillie couvert par un toit à pavillon, est flanquée au premier étage de tourelles couvertes de toits coniques. Des ailes en retrait, de trois niveaux, couvertes de toits à pavillon, sont flanquées de tours coiffées de toits coniques. Quatre tourelles en encorbellement, des fenêtres à meneaux, des lucarnes à fronton brisé et les pilastres, sont des éléments architecturaux glanés dans des édifices d'époques diverses, montrant le goût des amateurs du XIXe siècle.                                                                                                             LA-GROIE, vers 1800, la bâtisse sert de carrière de pierre. Des bâtiments parallèles, un logis de fermier au nord, et des dépendances agricoles au sud, avec rez-de-chaussée et un étage, flanquent l'aile de l'entrée qui est cantonnée d'une tour à chaque extrémité, ces tours à mâchicoulis sont des vestiges du château du XVe siècle.","habitants":"Famille d'Allogny\r\n        \"","divers":"à Ingrandes, château de la Bariollières grav 1-2, de Borde grav-7 et de la Groie grav 3 à 6","gps":"","images":["../image/image_86/86_Ingrandes_86_1.jpg","../image/image_86/86_Ingrandes_86_2.jpg","../image/image_86/86_Ingrandes_86_3.jpg","../image/image_86/86_Ingrandes_86_4.jpg","../image/image_86/86_Ingrandes_86_5.jpg","../image/image_86/86_Ingrandes_86_6.jpg","../image/image_86/86_Ingrandes_86_7.jpg"]},"Consult_chateau_formulaire8056":{"id":"Consult_chateau_formulaire8056","dept":"86","canton":"Vivonne","commune":"Iteuil","nom":"Iteuil","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Iteuil celui d'Aigne de Troussaye, de la Gruzalière et de Bernay ces deux derniers dans l'article suivant.\r\nAIGNE, c'est sur l'emplacement d'une villa gallo-romaine que ce château-fort a été construit par Jean II de Vivonne. La seigneurie dAigne dépendit un certain temps de la puissante famille des Lusignan dont lun deux, Guy, devint roi de Chypre et de Jérusalem. Après un long passage aux mains des Vivonne, François de Barbezières, comte de Chémeraul en devint propriétaire à la fin du XVIe siècle. Cest ce puissant seigneur, ami du Roi Henri III, et ensuite sa sur Françoise de Constance qui firent restaurer les constructions, entre 1600 et 1610, en partie détruites par les Guerres de Religion en 1569. Le portail n'est pas à son emplacement d'origine. Il viendrait d'un édifice de Poitiers, détruit au XIXe siècle, peut-être l'ancienne église des Augustins, sculpté par les frères Girouard, sculpteurs poitevins célèbres au XVIIe siècle. Des statues ou trophées devaient surmonter l'entablement. Vers la fin du XXe siècle, une dernière restauration eut lieu, nous laissant ce bijou que nous pouvons admirer aujourdhui.","architecture":"TROUSSAYE , fut édifié en 1872 à lemplacement dune métairie et à quelques dizaines de mètres des ruines dune ancienne abbaye de lordre de Grandmont. Elle sintégrait dans un camp situé en limite  de Poitiers, les retranchements de ce camp sont toujours apparents, cest tout près de ce lieu que les envoyés de Sainte-Radegonde et de Saint-Junien, chargés réciproquement dannoncer la mort de leur maître se rencontrèrent le 13 août 587, lun venant de Poitiers lautre de Chaunay, leur maître étant mort le même jour à la même heure. A lendroit précis de cette rencontre, on éleva une croix que lon appela \"Croix de la rencontre\" ou \"Croix de la montre\". Plus tard une chapelle fut bâtie et vers 1150, les moines de Grandmont y fondèrent un prieuré. De nos jours encore, un champ sappelle champ de lAbbaye et le bois qui longe ce champ.","habitants":"Aigne; Famille de  François de Barbezières                                \r\n        \"","divers":"à Iteuil celui d'Aigne grav 1-2-3 de Troussaye grav-4","gps":"","images":["../image/image_86/86_Iteuil_1.jpg","../image/image_86/86_Iteuil_2.jpg","../image/image_86/86_Iteuil_3.jpg","../image/image_86/86_Iteuil_4.jpg"]},"Consult_chateau_formulairee9c3":{"id":"Consult_chateau_formulairee9c3","dept":"86","canton":"Vivonne","commune":"ITeuil","nom":"Iteuil_II","type":"Château","periode":"XV-XVI","histoire":"BERNAY, aurait été édifié vers lan 1400 par un certain Denis Gillier, écuyer, seigneur des Forges, membre dune puissante famille de la région. Il dresse toujours au pied du coteau sa fière silhouette dantan. Avec ses murs vieillis par le temps et sa toiture aux pentes rapides, il semble avoir défié les ans, peut-être na-t-il pas comme son voisin du village (château d'Aigne), subi loutrage des guerres de Religion. Au début du XXe siècle, il fut vendu et dépouillé de son décor sculpté et de son mobilier.                                                                                                               La GRUZALIERE,  les armes de lun des premiers propriétaires, un trésorier du Roi Henri IV, figurent toujours au-dessus dune porte. Cest lui qui a décoré le mur de laile gauche par leffigie Royale en bois de noyer, dans lattente dit-on, dune visite du souverain au Poitou, dont Ravaillac anéantit le projet en 1610.  Au temps où le roi dAngleterre possédait lAquitaine ce donjon surveillait la vallée et route daccès vers le sud. Lorsque Charles V entreprit la reconquête du Poitou, Duguesclin mit le siège devant Château-Larcher et en profita pour détruire les postes anglais du voisinage, cest ainsi que fut pris, en 1368, le château de Clavière (la clef) dont le nom est resté à la forêt qui sétendait  vers louest et le sud.","architecture":"BERNAY, il reste aujourd'hui un corps de logis en L, entouré de dépendances et d'un pigeonnier. Le corps de bâtiment, cantonné dans l'angle ouest d'une tour contenant un escalier en vis, a conservé des fenêtres gothiques des XVe et XVIe siècles. A l'intérieur, dans l'aile nord, les deux pièces du premier étage renferment encore leurs cheminées gothiques et coussièges. De même, le deuxième étage de l'aile sud a gardé une cheminée gothique. De la chapelle, il ne subsiste qu'une abside à chevet plat voûtée sur croisée d'ogives. Même si sa chapelle en ruine ne se visite plus, de même que le site, le touriste qui emprunte lune ou lautre des routes de la vallée a toujours un regard bienveillant vers cette noble demeure témoin de lhistoire.                                                                                                                      La GRUZALIERE,  date du milieu du XVIe siècle et comporte une chapelle. A lorigine et jusquau XIVe siècle, sélevait sur la butte située à 200 mètres de la maison actuelle, un château-fort appelé \"château de Clavière\" dont il reste de nos jours la base hexagonale dune tour cerclée dune douve sèche. Au centre de la tour, subsiste toujours lentrée dun souterrain effondré.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Iteuil de la Gruzalière grav 2-3 et de Bernay grav-1","gps":"","images":["../image/image_86/86_Iteuil_II_1.jpg","../image/image_86/86_Iteuil_II_2.jpg","../image/image_86/86_Iteuil_II_3.jpg","../image/image_86/86_Iteuil_II_4.jpg"]},"Consult_chateau_formulaire8495":{"id":"Consult_chateau_formulaire8495","dept":"86","canton":"Chasseneuil du Poitou","commune":"Jardres","nom":"Jardres","type":"Château","periode":"XV-XVI-XIX","histoire":"MONTLOUIS, le fief  relevait de la baronnie de Chauvigny. Le premier seigneur connu en est Louis d'Harcouet, surnommé \" Louiset\". En juin 1447, il obtient l'autorisation du roi de fortifier Montlouis. De la grosse tour entourée de douves du XVe siècle, il ne reste qu'une grande salle voûtée souterraine. Le 1er octobre 1875, joseph de Larclause acquiert Montlouis et y installe une ferme école qui formera de nombreux élèves jusqu'en 1914                                                                                               EPINOUX, le fief  relevait de la seigneurie  de Clavière. Mentionné en 1400, il appartient aux XVe et XVIe siècles à une famille florentine, les Del Bene, devenue Delbenne ou dElbenne.Le 30 janvier 1605, Renée dElbenne épouse Samuel Béchillon à qui elle apporte lEpinoux.Leur descendance le conserve jusquau début du XVIIIe siècle.Plusieurs branches de Béchillon deviendront seigneurs de Pressec, de la Rivière aux Chirets, du Charreau de Boussec.\r\nPRESSEC, le fief relève alors de la baronnie épiscopale  de Chauvigny. En 1538, Pressec est acquis par Louise Porcheron qui fait construire le manoir tel quil subsiste actuelleme. Le 7 mai 1663, la seigneurie de Pressec est achetée par Louis Béchillon, seigneur de lEpinoux, et reste propriété de sa descendance jusquà la révolution.","architecture":"EPINOUX   Le manoir na pratiquement rien conservé dorigine ; reconstruit au XIXe siècle, il se présente en un bâtiment rectangulaire sobre à sept travées de fenêtres avec un étage.                                                                                                                     MONTLOUIS, actuel a remplacé au XIXe siècle l'édifice construit au XVe siècle et dont le plan figure sur l'ancien cadastre napoléonien. Le manoir actuel se présente comme un bâtiment rectangulaire avec un étage dont le corps principal est flanqué de deux ailes latérales.                                                    PRESSEC , la mention la plus ancienne connue, en 1309, donne le toponyme de Prissec. Le gros uvre date de 1541. Deux contrats notariés du 10 juin 1542 concernent les marchés de construction dune tour ronde et de la charpente du logis, ses portes et ses fenêtres.Le corps principal est un rectangle qui occupe le côté ouest dune cour, coupé par un couloir central où lon accède  par une tour ronde qui flanque le côté oriental. Celle-ci contient  un escalier à vis qui permet daccéder au rez-de-chaussée surélevé, et au grenier dont la charpente est en coque de bateau renversée. Une tour occupe langle extérieur nord-ouest.Les communs du côté sud sont en majeure partie anciens, XVIè ou XVIIè siecle. Ils sont divisés, presquen leur milieu par un porche, épaulé par deux demi-tours pleines. Immédiatement à lest du porche une grange et une étable équilibrent lensemble. Les bâtiments à louest du porche abritent un four à pain et une servitude.","habitants":"Montlouis; famille de Louis d'Harcouet                                              Epinoux,Famille Charreau de Boussec                                   Pressec, famille de Louis Béchillon,\r\n        \"","divers":"A Jardres,  Montlouis grav 1                                                       Epinoux grav 2                                                                          Pressec grav 3","gps":"","images":["../image/image_86/86_Jardres_1.jpg","../image/image_86/86_Jardres_2.jpg","../image/image_86/86_Jardres_3.jpg"]},"Consult_chateau_formulaire0dfb":{"id":"Consult_chateau_formulaire0dfb","dept":"86","canton":"Jaunay-Clan","commune":"Jauney-Clan","nom":"Jauney_Clan","type":"Château","periode":"XVI-XVIII","histoire":"Trois château à Jauney-Clan le château Couvert, la Chartreuse et l'hôtel de ville                                                                                                COUVERT, ce château première renaissance, est édifié par François Fumé, maire de Poitiers, Couvert apparaît en 1520, protégé par des fossés, il s'isolait dans un vaste enclos abritant des communs,  La Révolution fut une période périlleuse pour l'intégrité du monument. Deux ailes courtes en retour d'équerre se trouvaient sur la cour, mais ont disparu durant la seconde moitié du XIXe siècle. Au rez-de-chaussée, les fenêtres sont ornées de chapiteaux à volutes en corne de bélier, avec l'abaque orné d'un motif végétal ou d'un masque. La base de l'escalier en vis se situait sur l'élévation ouest. Parmi les familles qui se sont succédé à château Couvert on retient dans la lignée des Fumé, les Foudras, les Tudert qui seront dépossédés de leur bien à la Révolution. L'ordre de Malte a trouvé nombre de chevaliers dans ces familles. Tombé dans l'oubli et livré à la ruine, le château a été entièrement restauré par un couple d'artistes, Pierre Magré et Danielle Grimaldi Magré.                                                                                                                        La CHARTREUSE, le château fut, depuis le XVIIIe siècle, la maison de campagne d'une famille de magistrats royaux, les Mignot de Plans. Le domaine passa successivement dans les mains de leurs descendantes, Mme de Fontaines et Mme de Bodard de La Jacopière. Il fut de 1882 à 1892, le siège d'une entreprise de tissage créée par monsieur Ronsse. En 1901, le château devient la propriété de M. Mongruel qui le modifia pour lui donner son aspect actuel. Depuis 1926 la Chartreuse est la propriété de la famille Charlet.","architecture":"COUVERT, la restauration dura une vingtaine d'années, lui permettant de retrouver ses volumes proches de l'original. L'édifice se compose d'un corps de logis rectangulaire, cantonné de deux tours rondes sur sa façade postérieure. Deux ailes courtes en retour d'équerre se trouvaient sur la cour, mais ont disparu durant la seconde moitié du XIXe siècle. Au rez-de-chaussée, les fenêtres sont ornées de chapiteaux à volutes en corne de bélier, avec l'abaque orné d'un motif végétal ou d'un masque. La base de l'escalier en vis se situait sur l'élévation ouest.                                                                                                                      JAUNAY-CLAN,    l'hôtel de ville   est aménagé dans les communs d'un château renaissance.                                                                                                         La CHARTREUSE, les parements de pierre sont constitués d'éléments accrochés et clavetés, procédé mis en uvre dans le dernier quart du XIXe siècle.  Une grille ouvragée, dessinée par Ernest Mongruel, ouvre la demeure. La construction présente un corps central à trois travées, de part et d'autre duquel s'élèvent deux sortes de pavillons construits sur le même plan et matérialisés par un chaînage de pierre vertical. En avant de la façade antérieure est construite une terrasse dont l'accès se fait par des escaliers latéraux ou un escalier central. Le parc entoure la demeure devant laquelle se trouve un grand bassin. Entre la maison et les communs, des massifs de fleurs ont été plantés, ainsi que le long de l'allée qui conduit à une charmille dont la plantation remonte à l'origine de la propriété.","habitants":"Chartreuse; Mme de Bodard de La Jacopière                         Couvert; Famille de François Fumé\r\n        \r\n        \"","divers":"à Jauney-Clan 46° 41' 12\" Nord et 0° 22' 22\" Est,  le château Couvert grav 2-3-4, la Chartreuse grav -1 et l'hôtel de ville .","gps":"","images":["../image/image_86/86_Jauney_Clan_1.jpg","../image/image_86/86_Jauney_Clan_2.jpg","../image/image_86/86_Jauney_Clan_3.jpg","../image/image_86/86_Jauney_Clan_4.jpg"]},"Consult_chateau_formulaireb37a-2":{"id":"Consult_chateau_formulaireb37a-2","dept":"86","canton":"Civray","commune":"Joussé","nom":"Joussé","type":"Château","periode":"XVI","histoire":"JOUSSE, en 1489, Ithier du Theil obtint de Charles VIII l'autorisation de fortifier sa maison. Le relief armorié qui surmontait le bahut à consoles du portail et orne désormais la façade, est le blason des de Moussy, en 1575 alliés à la famille du Theil. L'acquisition de la seigneurie en 1629 par Isaac Barbarin, seigneur du Bost, constitue un jalon historique d'autant que cette famille conserve la propriété jusqu'au milieu du XVIIIe siècle.","architecture":"JOUSSE, est un édifice flanqué de deux tours donnant sur la place du bourg, sinistré en 1944, il fut détruit par son propriétaire. Seul le bas-relief sculpté avec armoiries de la double porte d'entrée fut récupéré pour être apposé sur la façade du logis du XVIIe siècle. Ce logis, de plan rectangulaire, qui s'appuie sur les deux tours rondes qui marquaient les angles de la courtine médiévale. Si celles-ci ont conservé quelques éléments défensifs et des ouvertures de taille et forme diverses, les façades à cinq trames ont été régularisées par un fenestrage homogène. Les trois lucarnes dont l'une porte la date 1844, donnent sur un comble couvert d'une magnifique charpente à l'aspect de carène renversée.","habitants":"Famille du Theil\r\n        \"","divers":"Château de Joussé","gps":"","images":["../image/image_86/86_Jouss%c3%a9_1.jpg"]},"Consult_chateau_formulaire1365":{"id":"Consult_chateau_formulaire1365","dept":"86","canton":"Migné Auxances","commune":"Chéneché","nom":"Labarom","type":"Château","periode":"XV-XVII","histoire":"LABAROM, les familles Lucault et Bridieu s'y succédèrent jusqu'à la Révolution. Une gravure de 1699 de Gaignières ainsi que plusieurs inventaires permettent d'ébaucher une histoire des transformations de cette demeure qui possédait à l'origine une façade sud cantonnée d'une tour crénelée, mais les guerres et le temps sont passés par là. Aujourd'hui chambres d'hôtes.","architecture":"LABAROM, fut construit sur un site où se trouve une fontaine, appelée à l'époque gallo romaine, la fontaine Barum, d'où l'origine du nom du château. Les premières constructions datent de 1490. De cette époque, il reste une tour carrée à mâchicoulis à laquelle est maintenant accolé un bâtiment dont la construction remonte au milieu du XVIIe siècle. La façade sud n'a pas changé depuis cette époque. Vers 1730, l'immeuble a été doublé sur toute la longueur de la façade nord. Des douves et une cour fermée partant de cette aile sont visibles sur le cadastre du XIXe siècle. A l'origine, l'ensemble du château était beaucoup plus imposant mais les guerres et le temps sont passés par là.","habitants":"Famille Lucault\r\n        \"","divers":"Labarom 46° 45' 06\" nord, 0° 16' 28\" est","gps":"","images":["../image/image_86/86_Labarom_1.jpg","../image/image_86/86_Labarom_2.jpg","../image/image_86/86_Labarom_3.jpg","../image/image_86/86_Labarom_4.jpg","../image/image_86/86_Labarom_5.jpg"]},"Consult_chateau_formulairee60c":{"id":"Consult_chateau_formulairee60c","dept":"86","canton":"Montmorillon","commune":"Nalliers","nom":"Lauzon_Nalliers","type":"Maison-Forte","periode":"XVI","histoire":"LAUZON, le château de Lauzon nommé aussi \"Le petit Nalliers\" a été construit au début du XVIe siècle par la famille du même nom.  La famille de Lauzon a conservé le château jusquà la fin du XVIIe siècle et ensuite il fut propriété de la famille de Boismorand et devint, par héritage, la propriété de M. de Lanauze, puis vendu à la famille Guillemain.                                                  A Lauzon trois manoirs, celui de la Caillerie , de la Cochonerie, et de Crouzat.","architecture":"LAUZON, cest une maison-forte qui comprend un logis principal sur trois niveaux, des combles, une aile en retour et une aile accolée. Côté ouest une tour ronde est couverte d'un cône de tuiles plates. Lensemble des toitures est également couvert de tuiles plates. On peut remarquer de nombreuses ouvertures chanfreinées, quelques unes à meneau. Les maisons fortes affirmaient la prééminence du seigneur sur son territoire. Elles perdaient toutefois le caractère militaire des châteaux forts, même si elles conservent les apparences de fortification comme des douves.                                                                                        La COCHONIERE, maison forte de plan rectangulaire à deux niveaux  toit en croupes recouvert de tuiles  accolé d'une tour ronde à trois niveaux.","habitants":"Famille de Lauzon \r\n        \"","divers":"Château de Lauzon et la maison forte de la Cochonière","gps":"","images":["../image/image_86/86_Lauzon_Nalliers_1.jpg","../image/image_86/86_Lauzon_Nalliers_2.jpg"]},"Consult_chateau_formulairecde4":{"id":"Consult_chateau_formulairecde4","dept":"86","canton":"","commune":"Lavausseau","nom":"Lavausseau","type":"Manoir","periode":"XVII","histoire":"LAVAUSSEAU  La commanderie de Lavausseau appartenait à lordre des hospitaliers de Saint Jean de Jérusalem, actuel Ordre de Malte, dont la présence dans le village est attestée dès le XIIe siècle. Une commanderie était un logis, qui abritait une communauté de frères, ainsi quun domaine rassemblant un ensemble de possessions. Jusquà leur disparition, au 18ème siècle, les commanderies assuraient lentretien des garnisons situées en Terre Sainte (également, selon les époques, à Chypre, à Rhodes ou à Malte) et le bon fonctionnement des uvres hospitalières.","architecture":"LAVAUSSEAU,  au niveau local, une commanderie sapparentait à une seigneurie laïque ordinaire. Lordre assurait la protection de ses paysans et villageois. Il rendait la justice, levait limpôt et faisait travailler ses terres.Les commanderies étaient construites sur un modèle sensiblement identique. Elles étaient composées dun château rustique, dune chapelle et de communs comprenant granges, écuries, fournil, celliers et pressoirs. Un document de 1703 donne une description de ce type pour la commanderie de Lavausseau : soit un corps de logis autrefois entouré dune muraille de 20 pieds de haut (environ 6,50 mètres) et dont laccès se faisait par un pont levis, la présence dune écurie, dune chapelle, dune grange et de la grange aux chapitres où étaient stockées les recettes des impôts.","habitants":"lordre des hospitaliers\r\n        \"","divers":"Manoir de Lavausseau","gps":"","images":["../image/image_86/86_Lavausseau_1.jpg","../image/image_86/86_Lavausseau_2.jpg"]},"Consult_chateau_formulaireb811":{"id":"Consult_chateau_formulaireb811","dept":"86","canton":"Châtellerault-1","commune":"Lencloitre","nom":"Lencloitre","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Lencloitre  celui de Boutière et de Grand-Cour.                                                                                  BOUTIERE  Dès le Moyen-Age, entre 1106 et 1109, le prédicateur itinérant Robert d'Arbrissel fonde, sur ce territoire, un prieuré appelé Claustrum farundie. La terre appartient alors au Seigneur Amery, Vicomte de Châtellerault, avec moulin, cédé pour toujours à Dieu et à Don Robert par un seigneur propriétaire voisin, Renaud de Piolent.                                                                                      La GRAND-COUR est un ancien fief relevant de la baronnie de Mirebeau, la première mention apparaît en 1470 dans les archives du prieuré de Lencloître. Le château fut bâti en 1821 pour M. de Montaubin, ancien colonel de Napoléon Ier. Vers 1870 la Grand-Cour appartenait à Léon et Marthe Castex qui possédaient une très importante collection de sculptures antiques, médiévales et classiques. Décédés, les collections furent dispersées et le site changea plusieurs fois de propriétaire.","architecture":"BOUTIERE le Prieuré dépend de l'Abbaye de Fontevrault, maison mère de l'Ordre Fontevriste, en pays Saumurois. De chaque côté s'élèvent deux couvents, un pour les femmes et un pour les hommes, placé comme à Fontevrault sous les ordres de l'abbesse générale et des prieurés locaux, une chapelle Saint-Jean et des jardins. La Boutière était connue au milieu du XVIe siècle dans les archives du couvent de Lencloitre. Le château actuel ne semble pas remonter au-delà du XIXe siècle. Entouré d'un parc et de nombreuses dépendances, il a été restauré récemment.                                                                                                                  La GRAND-COUR, de plan rectangulaire cantonné de deux pavillons carrés en retrait. Il est surmonté de hautes toitures à lucarnes et d'un beffroi agrémenté d'une terrasse octogonale en bois et d'un campanile. La façade principale est décorée aux angles de pilastres ioniques soutenant la corniche. Les fenêtres de celle-ci sont ornées de vitraux, certains un premier étage, présentant des portraits de l'empereur Napoléon 1er.","habitants":"Famille de Léon et Marthe Castex \r\n        \"","divers":"Grand-Cour grav 1-2                                                                   Boutiére grav-3","gps":"","images":["../image/image_86/86_Lencloitre_1.jpg","../image/image_86/86_Lencloitre_2.jpg","../image/image_86/86_Lencloitre_3.jpg"]},"Consult_chateau_formulaired26d":{"id":"Consult_chateau_formulaired26d","dept":"86","canton":"Loudun","commune":"Les Trois-Moutiers","nom":"Les_Trois_Moutiers","type":"Château","periode":"XVI-XVII","histoire":"cinq châteaux sur la commune, la Roche-Vernaize, les Eaux Melles, Lantray et Chandoiseau, article suivant   pour ces deux derniers.                                                                                                                                                                                                          ROCHE VERNAIZE, cité en 1246 dans les archives du chapitre de Saint-Hilaire et en 1479 dans celles de la commanderie de Loudun, La Roche Vemaise était le siège d'une ancienne seigneurie qui dépendait de la baronnie de Baussay. Deux beaux portails à bossages et à frontons brisés donnent accès à la cour de ce beau logis qui possédait autrefois un jardin à la Française. Bien que restauré au XIXe siècle, le château a conservé son apparence du début du XVIIe siècle.","architecture":"EAUX-MELLES, apportée en dot par Macée d'Oiseaumelle, cette terre constituée initialement en franc-alleu serait entrée vers 1220 dans la maison de Rasilly. Elle devient le second berceau de cette famille de Touraine dont le représentant le plus connu est Isaac, chevalier de Malte et gouverneur de l'Acadie, né ici en 1587. Le fief qui relevait du château de Loudun, est transmis en 1716 par Blanche-Colombe, sur du marquis de Rasilly, aux de Mougon qui le conserve jusqu'à la Révolution. Le logis, qui porte la marque d'une Renaissance parvenue à maturité, occupe les côtés ouest et sud d'une cour intérieure au tracé irrégulier. Le pavillon élevé sur l'angle dans la première moitié du XIXe siècle aurait remplacé une tour ronde. D'autres modifications sont intervenues depuis : construction d'une orangerie dans le jardin et d'un chenil de plan centré dans la cour, déplacement du portail d'entrée, plantation d'un beau parc avec bassins. La chapelle, fondée en 1538, est située dans la partie nord de l'aile ouest.                                                                                 ROCHE VERNAIZE, le corps de bâtiment est composé de pavillons qui s'individualisent chacun par une toiture indépendante, comme au château de Cheverny, ces jeux de volumes s'enrichissent de curieuses tourelles en surplomb aux angles de la façade sur cour et, du côté de la façade sur jardin, de deux pavillons rectangulaires en saillie. Les élévations s'animent de jambes harpées qui soulignent les travées de fenêtres et les angles. Des lucarnes à fronton, encadrées de volutes, éclairent les combles.","habitants":"Roche;baronnie de Baussay                                                               Eaux-Melles ; Macée d'Oiseaumelle                              \r\n        \"","divers":"Château des Roches Vernaize grav 1-2-3, des Eaux Melles grav-4","gps":"","images":["../image/image_86/86_Les_Trois_Moutiers_1.jpg","../image/image_86/86_Les_Trois_Moutiers_2.jpg","../image/image_86/86_Les_Trois_Moutiers_3.jpg","../image/image_86/86_Les_Trois_Moutiers_4.jpg"]},"Consult_chateau_formulairecd6a":{"id":"Consult_chateau_formulairecd6a","dept":"86","canton":"Loudun","commune":"Les trois Moutiers","nom":"Les_Trois_Moutiers_II","type":"Château","periode":"XV-XVI-XVIII","histoire":"CHAMPDOISEAU, non loin de la Motte Chandeniers et sur le bord d'un ruisseau a été édifié le château de Chandoiseau qui relevait de Verrières à un roussin de service ; il a été possédé par Emar I Odart en 1253 ; à Pierre Odart en 1285, à Aimar II en 1319, à Guion en 1405, à Jean en 1459 et Isabeau Odart, mariée à N. de Corguilleray; Thomas de Corguilleray en 1469 ; Philippe de Savigny en 1518 ; à Charles de Telligny en 1565; Gislebert Chasteigner en 1569, Renée Le Proust, veuve de Jacques de Sainte-Marthe en 1591, à Louis de Sainte Marthe mort en 1640, François de Sainte Marthe père de Claude qui, après s'être marié, entra dans les ordres et se retira à Chandoiseau puis à Port-Royal et de François de Sainte-Marthe, bailli de Loudun. Aujourd'hui cette propriété dépend de la commune de Bournand.                                                                                                            LANTRAY, dès la fin du XVe siècle, le hameau et les bois de Lantraye étaient mentionnés dans les textes. Au lieu-dit Lantray un château portant le même nom pourrait être attribuée au XVIIe ou XVIIIe siècle.","architecture":"CHAMPDOISEAU, manoir en forme de quadrilatère avec deux tourelles, une ronde et une hexagonale comportant un rez-de-chaussée, un étage et un comble. Au premier étage, présence de quatre cheminées du XVe siècle, dont l'une est surmontée d'un écu dans un polylobe sculpté. Les combles possèdent une belle charpente en carène renversée et trois cheminées.                                           LANTRAY, de plan rectangulaire, le corps de logis principal est couvert d'ardoise avec toiture en croupe. La façade sur cour, à l'est, est éclairée par cinq travées de baies régulières sur deux niveaux apparents et un sous les combles. La travée centrale est encadrée par deux colonnes doriques et les deux niveaux sont séparés par un bandeau de pierre. Au centre de la façade, la porte d'entrée est ornée d'un écusson armorié. Le château est accolé à l'angle nord-est à une tour carrée, présentant un toit en croupe couvert d'ardoise, dont la base pourrait être un vestige d'une construction antérieure fortifiée. Elle est éclairé par une belle fenêtre à meneau et traverse avec un linteau mouluré. Cette tour est cantonnée à l'angle sud est d'une petite échauguette au toit en poivrière, couvert d'ardoise.","habitants":"Chandoiseau; Louis de Sainte Marthe \r\n        \"","divers":"Château de Champdoiseau grav 3-4 et de Lantray","gps":"","images":["../image/image_86/86_Les_Trois_Moutiers_II_1.jpg","../image/image_86/86_Les_Trois_Moutiers_II_2.jpg","../image/image_86/86_Les_Trois_Moutiers_II_3.jpg","../image/image_86/86_Les_Trois_Moutiers_II_4.jpg"]},"Consult_chateau_formulairee144":{"id":"Consult_chateau_formulairee144","dept":"86","canton":"Montmorillon","commune":"Liglet","nom":"Liglet","type":"Château","periode":"XV-XVI-XIX","histoire":"Quatre chateaux à Liglet celui de l'Abbaye de Fontromond de Poiron, de de Bergeault et de Verger.\r\nABBAYE, dépendait autrefois de l'abbaye de Fontgombault  qui possédait le prieuré de Fontmorond tout proche.                                                                                                                                                    FONTROMOND, plusieurs fiefs, laïcs et religieux, se partageaient les terres de Liglet sous lAncien Régime : la Tour de Liglet, le Corcheron, Courtevraud, le Poiron, Bois-Grenier, le Verger, la Gerbaudière, Peugible, la Marcolière, Peucot et Leigners, la Jacquetière et Fontmorond. Le château de Fontmorond a été construit dans le quatrième quart du XVIIIe siècle. Agrandissement au milieu du XIXe siècle et aménagement extérieur vers 1925.  \r\nPOIRON, le lieu est cité dès 1328. Ce fief relevait de Courtevraud. Au XVe siècle Guillemin Bordes, fils naturel du seigneur de Courtevraud, est seigneur du Poiron. Du XVIe au XVIIe siècle, la famille Bardin Durivault succède à la famille Bordes. Le château actuel a été édifié dans le quatrième quart du XIXe siècle pour M. Dessaux à lemplacement dun bâtiment plus ancien. Christian de Monplanet, petit-fils de M. Dessaux, a été maire de Liglet de 1912 à 1919 et de 1925 à 1929. Le château du Poiron était encore récemment alimenté en eau par un système de bélier hydraulique.","architecture":"ABBAYE, c'est un corps de logis rectangulaire de faible dimension pourvu d'un toit à deux pans couvert de tuiles plates. Il présente une travée d'ouverture sur trois niveaux apparents. Cette travée est encadrée par deux hautes tours rondes dont l'une a conservé son toit en poivrière couvert en tuiles plates. La seconde, au sommet arasé, est percée d'une travée de baies sur trois niveaux.                                                                                                                      BERGEAULT, a été construit dans le premier quart du XIXe siècle, vers 1810.  Il comporte dix boulins dans sa partie supérieure. La partie inférieure servait sans doute pour lélevage danimaux de basse-cour ou bien de lieu de stockage, élévation à travées,  un étage carré.                                                                                                VERGER, le Verger était le siège d'un fief qui relevait de la baronnie de La Trimouille. C'est aujourd'hui un château dont la construction semble pouvoir être du XIXe siècle. Un long corps de logis rectangulaire à deux niveaux apparents et un en surcroît sous le toit est percé de six travées de baies aux deux premiers niveaux, le troisième étant éclairé par quatre lucarnes, deux en il-de-buf, deux surmontées d'un fronton triangulaire. La toiture, à croupes, est couverte d'ardoise. Ce bâtiment est accolé à un pavillon couvert à l'identique et une tour ronde masque la jonction des deux corps de logis. Elle est couverte d'un cône d'ardoise. Deux autres tours circulaires à poivrières d'ardoise encadrent la façade arrière. A l'autre extrémité du logis principal, un bâtiment à toiture d'ardoise à deux pans, percé d'une fenêtre en plein cintre, abrite la chapelle. Un beau parc entoure la propriété.","habitants":"Poiron; famille Bardin Durivault\r\n        \r\n        \r\n        \"","divers":"à Liglet. 46° 30' 37\" nord, 1° 05' 07\" est. celui de l'Abbaye de Fontromond  grav-1 de Poiron grav -2, de de Bergeault grav 3-4 et de Verger grav 5-6-7.","gps":"","images":["../image/image_86/86_Liglet_1.jpg","../image/image_86/86_Liglet_2.jpg","../image/image_86/86_Liglet_3.jpg","../image/image_86/86_Liglet_4.jpg","../image/image_86/86_Liglet_5.jpg","../image/image_86/86_Liglet_6.jpg","../image/image_86/86_Liglet_7.jpg"]},"Consult_chateau_formulaire3131":{"id":"Consult_chateau_formulaire3131","dept":"86","canton":"Poitiers-5","commune":"Ligugé","nom":"Ligugé","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Ligugé celui de Reauté et de Reynière.                 REAUTE, au XVIIe siècle, Catherine Duclos, veuve d'un contrôleur des greniers à sel de Paris, et son gendre Jacques Desanges, procureur au présidial, entreprennent de constituer un domaine à partir d'une métairie située à Ligugé. La propriété est anoblie en 1622 mais l'indispensable fuie n'est érigée qu'en 1653. Jacques Desanges fils, avocat, vend en 1664 La Réauté à l'échevin Claude Légier qui la transmet à son fils en 1696.                                                                                                                              REYNIERE, autrefois Régnière, était un fief dépendant de celui de Simault, lui-même relevant de Lusignan. Au milieu du XIXe siècle le domaine passe aux mains de la famille de Clock, originaire de Hollande, dont elle ne sortira plus. Le château actuel ne remonte pas au delà du XIXe siècle et peut être attribué aux de Clock. Il remplace une construction entourée d'un jardin à la française.","architecture":"REAUTE, l'édifice décrit en 1622 est en trois corps de bâtiment à toitures indépendantes. Les deux ailes en retour attestent la volonté du constructeur de préserver l'harmonie générale. L'ensemble, de composition classique, s'inscrit dans la tradition décorative du XVIIe siècle. Un portail, plein cintre, s'ouvre dans l'arrondi du mur. L'élévation sur cour s'ordonne de part et d'autre d'un corps central de trois travées, simple en profondeur et coiffé d'un toit d'ardoises à croupes. Un comble brisé recouvre les pavillons latéraux. La travée médiane se distingue par un parement en bossage continu qui forme un léger ressaut et se poursuit à l'étage au-dessus de la corniche. Les dépendances sont appuyées le long du mur au sud du portail, côté cour. Elles formaient un L mais sont aujourd'hui limitées à un seul bâtiment restauré au XIXe siècle. D'autres servitudes, et notamment un lavoir, sont en outre accolées au nord de l'aile en retour d'équerre du logis et à l'ouest.                     REYNIERE, est composé d'un pavillon central, rectangulaire, auquel deux tours carrées sont accolées. A la jonction des tours au pavillon, une tour circulaire en demi hors uvre s'élève couverte d'une demi poivrière d'ardoise. Le logis principal et ses deux tours circulaires ont deux niveaux et un sous le toit. Les tours carrées présentent trois niveaux et un bandeau de pierre sépare les deuxième et troisième niveaux. Le parc comprend un colombier rond au toit en cône, éclairé par une lucarne.","habitants":"Reauté, Jacques Desanges                                                  Reynière;  famille de Clock \r\n        \"","divers":"à Ligugé celui de Reauté et de Reynière grav 6","gps":"","images":["../image/image_86/86_Ligug%c3%a9_1.jpg","../image/image_86/86_Ligug%c3%a9_2.jpg","../image/image_86/86_Ligug%c3%a9_3.jpg","../image/image_86/86_Ligug%c3%a9_4.jpg","../image/image_86/86_Ligug%c3%a9_5.jpg","../image/image_86/86_Ligug%c3%a9_6.jpg"]},"Consult_chateau_formulaire15a0":{"id":"Consult_chateau_formulaire15a0","dept":"86","canton":"Civray","commune":"Linazay","nom":"Linazay_Magnou","type":"Château","periode":"XIV-","histoire":"MAGNOU, le fief du Magnou de Linazay remonte au XIVe siècle. Dès 1339, il est cité dans les Hommages rendus à Jean de Berry, comte de Poitou et duc dAquitaine, en tant que propriété de Jehan Pichot. Le domaine est ensuite mentionné en 1405 comme habité par Jean Jousserand, puis dès 1422 comme propriété de la famille Eschallé, cette puissante famille originaire de Bretagne qui dominera le territoire jusquau milieu du XVIIIe siècle. À partir de 1757, le domaine entre en possession de la famille Jousserand  qui est également à la tête du logis de La Chaux jusquau lendemain de la Révolution. Au cours du XIXe siècle, le logis passe aux mains de la famille Belcastel, puis, au siècle suivant, il a appartenu à Jean-Marie-Joseph Merron. Les actuels propriétaires en sont John et Renée Barron, qui sont notamment à linitiative de la procédure de classement à lInventaire des M.H..                                                          La CHAUX, aux XVe et XVIe siècles, le domaine appartient aux familles Buffefeu puis Babignon ; il est ensuite transmis par mariage aux familles Dexmier puis de Vivonne.Dans la seconde moitié du XVIIe siècle, Jacob de Jousserand acquière la propriété. Elle reste en possession des familles Jousserand, puis de Menou, jusquà la fin du XIXe siècle. Marie-Joséphine-Anne de Fleury, comtesse de Menou, est contrainte de vendre vers 1887-1891, suite aux mésaventures rocambolesques de son fils Léo, puis au décès de son mari. Cest alors Frédéric-Auguste Baribeau qui se porte acquéreur du domaine, qui restera en possession de la famille au cours du XXe siècle. Kathryn et Jon Dobson sont les actuels propriétaires du logis, les terres appartenant toujours à la famille Baribeau.","architecture":"MAGNOU, il est percé dune porte cochère et dune porte piétonne. Au dessus des arcs en anse de panier, les frontons ont été brisés, et les sculptures et armoiries martelées. Le portail ouvre laccès à une cour ceinturée par les bâtiments des dépendances. Le corps de logis est flanqué dune tour ronde. De part et dautre de la tour, lédifice témoigne de deux phases de construction distinctes, aux XVe et XVIe siècles.La tour centrale abrite lescalier à vis. Elle est percée au rez-de-chaussée de deux archères-canonnières à fente de visée simple. La porte était ornée dun parement décoratif, dont le souvenir est évoqué par Pierre-Amédée Brouillet en 1865 : « porte en ogive ornée jadis de crosses végétales et dun écusson qui ont été martelés ». À la fin du XVIe siècle, lextension vers le sud témoigne dune volonté dadapter le bâtiment à une fonction plus résidentielle.                                                                            La CHAUX, le corps de logis principal , de plan quadrangulaire, est construit en pierre calcaire recouverte dun enduit. La couverture est en tuiles. La façade, très sobre, est dénuée dornements et présente deux niveaux délévation. Lordonnancement des fenêtres a connu plusieurs remaniements par les différents propriétaires en vue daméliorer le confort de la résidence. En 1865, Pierre-Amédée Brouillet évoque ainsi les anciennes ouvertures du logis : « Ses fenêtres carrées étaient, jadis, divisées par des meneaux en pierre »Les deux tourelles, accolées au nord-est et au sud-ouest du logis, confèrent une dimension verticale à la construction. Elles nont pas de fonction défensive ; ce sont des éléments qui imitent les codes de larchitecture militaire médiévale.","habitants":"famille Eschallé\r\n        \"","divers":"A Linazay le château de la Chaux  grav 1 et de Magnou grav 2-3","gps":"","images":["../image/image_86/86_Linazay_Magnou_1.jpg","../image/image_86/86_Linazay_Magnou_2.jpg","../image/image_86/86_Linazay_Magnou_3.jpg"]},"Consult_chateau_formulairec22e":{"id":"Consult_chateau_formulairec22e","dept":"86","canton":"Loudun","commune":"Loudon","nom":"Loudon","type":"Vestiges foreteresse","periode":"XIII-XIV-XVI","histoire":"trois châteaux à Loudon dont le fort Loudon , de Beaurepaire et de Bois-Gourmond                                                                               BEAUREPAIRE, Jean du Pin, receveur du roi à Loudun, fut le premier propriétaire connu au début du XVIe siècle. Le domaine appartenait au XVIIe siècle à René de Lescure, sieur du Breuil, qui vendit le domaine en 1620 à Guye Malherbe, veuve de Daniel Montault, avocat, et à Jean Montault, procureur à Loudun, et en 1629, Guye céda sa part à Jean.  La famille Montault était de l'Église réformée, Charles Montault, sieur de Beaurepaire, fut un des 1ers protestants de Loudun à abjurer vers 1687. Charles Montault fut maire de cette ville de 1693 à 1702.                                                                                                                            BOIS-GOURMOND, place forte sans doute bâtie au XIVe siècle, puis remaniée à la fin du Moyen Age et au XVIe siècle. uvre de Guillaume Gormont, chargé de maintenir l'ordre à une époque de guerres, à l'écart, sur une hauteur, il est d'aspect austère.                                                                                                                    FORT-LOUDON,   Foulques Nerra dit \"le Faucon Noir\", comte d'Anjou entreprit la construction du château au XIe siècle (1040),","architecture":"BEAUREPAIRE,  le château était décrit avec deux grands corps de logis distincts, avec plusieurs dépendances, un colombier en pierre de taille, couvert d'ardoise, une fontaine et deux clos de vigne, enfermés de muraille.  L'entrée, crénelée, avec ses portes cochères et piétonnes, est très ancienne, le reste du bâtiment doit dater de la fin du XIXe siècle.                                                                                               BOIS-GOURMOND,  le château est encore clos et puissamment fortifié, son caractère de défense militaire affirmé. Son enceinte s'apparente à un quadrilatère avec un angle seulement en renforcement, le donjon de plan carré, est muni de tours cylindriques et polygonales.                                                                   FORT-LOUDON, la Tour Carrée a servi de poste dobservation, elle est un des vestiges d'une vaste forteresse. Les murs atteignent 31 m de haut, avec 2 m d'épaisseur. Du haut de la tour se développe une vue circulaire sur toute la région.  Le dispositif de défense comprit aussi un donjon circulaire, plus tardif, faisait partie de l'ensemble.  L'ensemble était intégré dans un bâtiment plus vaste appelé palais royal qui constituait une véritable forteresse qui fut démantelée sous Louis XIII à la demande de Richelieu.","habitants":"Beaurepaire; famille Montault.                                                     Bois Gourmond, Guillaume Gormont\r\n        \r\n        \"","divers":"à Loudon dont le fort Loudon grav 8 -9, de Beaurepaire et de Bois-Gourmond grav de 2 à 7    Loudon : 47° 00' 36,9\" Nord, 0° 04' 48,61\" Est","gps":"","images":["../image/image_86/86_Loudon_1.jpg","../image/image_86/86_Loudon_2.jpg","../image/image_86/86_Loudon_3.jpg","../image/image_86/86_Loudon_4.jpg","../image/image_86/86_Loudon_5.jpg","../image/image_86/86_Loudon_6.jpg","../image/image_86/86_Loudon_7.jpg","../image/image_86/86_Loudon_8.jpg","../image/image_86/86_Loudon_9.jpg"]},"Consult_chateau_formulairec6e3":{"id":"Consult_chateau_formulairec6e3","dept":"86","canton":"Lussac les Châteaux","commune":"Lussac les Châteaux","nom":"Lussac_chateaux","type":"Vestiges-châteaux","periode":"XIII-XIV","histoire":"Trois châteaux à Lussac; Le Castel, chambres d'hôtes et de la Fouchardière.                                                                                        FOUCHARDIERE à Sillars,  le domaine de la Fouchardière est très vieux, puisque l'on a retrouvé des textes le signalant, remontant au XIIIe et XIVe siècle. Pendant plusieurs siècles il fut géré par la famille de Savatte, puis par la famille Coral dont un des membres avait épousé en 1654 Diane de Savatte. Vendu pendant la Révolution comme bien national, il passa entre les mains de divers propriétaires. En 1850, le général Ladmirault, sénateur de la Vienne, rachète la propriété. Délaissant le vieux château qui se trouvait à l'emplacement dit de la Réserve, le général regroupa autour du château actuel, qu'il fit construire, environ 350 hectares de terres. A la mort du général en 1898, le domaine fut exploité jusqu'en 1930 par sa fille, Mme de Rochebrochard, qui sans poursuivre l'oeuvre de création réalisée par son père, réussit à maintenir la propriété dans un état convenable  La Fouchardière fut divisée en deux en 1949; une partie comprenant environ 200 hectares. Le château revint au comte de Brosse, époux d'une nièce de Mme Rochebrochard, qui dilapida le patrimoine, l'autre partie étant exploitée par trois fermes s'étendant sur environ 150 hectares. Vendu à un Corse M. Bozzi, le château et le domaine ne connurent pas de nouveaux investissements. En 1960, le propriétaire actuel M. Forestier, acheta la Fouchardière dans un très mauvais état.","architecture":"LUSSAC,  le château aurait été construit vers 780. Le seigneur de Lussac était vassal du comte de La Marche et devait défendre cette zone frontalière avec le Poitou. Il n'est indiqué pour la première fois dans les archives en 1065 comme appartenant à la famille Conis de Saint Germain. De nombreux détails visibles permettraient encore, mais pour combien de temps, à un castellologue de proposer une date de construction. Pendant deux siècles il appartiendra à deux familles. Durant la guerre de Cent Ans Du Guesclin reprit le château aux Anglais. En 1492 aménagement de l'étang. En 1519 Renée Geoffroy héritière du château, épouse François de Rochechouart Mortemart, le château formait un gros quadrilatère avec tours d'angle chemin de ronde et souterrains. Sa masse imposante se dessinait entre l'étang et le village. Le château fut saccagé par les troupes de l'Amiral de Coligny en 1569 et démantelé par la population qui se servit de ses pierres pour construire les habitations.","habitants":"Famille de Savatte                                                                                 Le général Ladmirault                                                                            Lussac; famille Conis de Saint Germain\r\n        \"","divers":"à Lussac grav-5 ; Le Castel grav-3-4, chambres d'hôtes et de la Fouchardière grav 1-2.","gps":"","images":["../image/image_86/86_Lussac_Chateaux_1.jpg","../image/image_86/86_Lussac_Chateaux_2.jpg","../image/image_86/86_Lussac_Chateaux_3.jpg","../image/image_86/86_Lussac_Chateaux_4.jpg","../image/image_86/86_Lussac_Chateaux_5.jpg"]},"Consult_chateau_formulaired745":{"id":"Consult_chateau_formulaired745","dept":"86","canton":"Châtellerault-3","commune":"Lesigny","nom":"Lésigny","type":"Château","periode":"XVII","histoire":"Deux châteaux à Lésigny celui d'Allogny , de Boutelaye et la Rocreuse.\r\nALLOGNY  est construit sur une hauteur, qui domine la vallée de la Creuse. Ce château médiéval a donné son nom à la famille d'Aloigny, une des plus distinguées de la noblesse du Poitou; une de ses branches cadettes posséda le château de Boismorand. Le fief mouvait de Châtellerault. La famille d'Alloigny conservera la propriété jusqu'à la fin du XVIIe siècle; Louis, premier marquis de La Groye en fit encore hommage en 1673, son fils Louis Gabriel en 1682. La branche aînée, de La Groye, s'éteignit dans les 1ères années du XVIIIe siècle, l'édifice passa en diverses mains: Alexandre Millon, maître des requêtes de l'Hôtel en 1719, Claude-René Fumée, lieutenant général en la sénéchaussée de Châtellerault, son fils Jean-Henri en 1756, et ensuite leurs héritières.                                                                                   ROCREUSE à Mairé , le château fut construit dans la seconde moitié du XIXe siècle et son inauguration eut lieu en 1876. C'est à Ludovic Veneau, qui fut maire de Mairé durant une quarantaine d'années, que l'on doit Rocreuse.","architecture":"ALLOGNY, à une partie médiévale, comprenant une tour semi-octogonale, a été accolé un corps de logis du XVIe siècle moins austère. Le pont-levis subsistait à la fin de l'Ancien Régime.\r\nROCREUSE à Mairé, grand amateur des réalisations d'Eugène Viollet-le-Duc, il fit élever à l'emplacement d'un bois un grand château. Également propriétaire du château de Mairé, il le vendit lorsque la construction de Rocreuse fut achevée. Prés de la moitié du territoire de la commune est occupé par le domaine de chasse et le parc du château lequel surplombe toujours la Creuse. Pendant de nombreuse années le domaine a fait vivre la plus grande partie de la population de Mairé qui y était employée à divers tâches (les femmes au service au château et les hommes l'entretien, la surveillance et l'exploitation du domaine). La famille Veneau conservera le domaine jusqu'en 1945, date à laquelle il sera vendu à la famille des propriétaires actuels.","habitants":"Allogny; famille d'Alloigny                                                        Rocreuse, famille de   Ludovic Veneau\r\n        \r\n        \r\n        \"","divers":"à Lésigny celui d'Allogny  grav 3-4-5, de Boutelaye grav 7-8   et la Rocreuse grav 1-2.","gps":"","images":["../image/image_86/86_L%c3%a9signy_1.jpg","../image/image_86/86_L%c3%a9signy_2.jpg","../image/image_86/86_L%c3%a9signy_3.jpg","../image/image_86/86_L%c3%a9signy_4.jpg","../image/image_86/86_L%c3%a9signy_5.jpg","../image/image_86/86_L%c3%a9signy_6.jpg","../image/image_86/86_L%c3%a9signy_7.jpg","../image/image_86/86_L%c3%a9signy_8.jpg"]},"Consult_chateau_formulaire823a":{"id":"Consult_chateau_formulaire823a","dept":"86","canton":"Vivonne","commune":"Marçay","nom":"Marcay","type":"Château","periode":"XII-XVI-XIX","histoire":"Trois châteaux à Marcay dont celui de Marcay, de Bierson de la Bonnetieres, la Badenière et de Bonnevaux.
