"Villiers_Vilotte","commune":"Pouillenay","type":"Château","img":"../image/image_21/21_Villiers_Vilotte_1.jpg"},{"id":"Consult_chateau_formulaire0214","nom":"Vitteaux","commune":"Vitteaux","type":"Château","img":"../image/image_21/21_Vitteaux_1.jpg"}];const FULL={"Consult_chateau_formulaire016e":{"id":"Consult_chateau_formulaire016e","dept":"21","canton":"Nuits-St-Georges","commune":"Agencourt","nom":"Agencourt","type":"Château","periode":"XVII","histoire":"AGENCOURT; au XIIIe siècle, résidence des seigneurs d'Agencourt, en 1280, Nicolas de Corberon ou Courbeton reconnait détenir en fief, la troisième partie des dîmes d'Agencourt. La seigneurie est au XVe siècle, possession de la famille de Vichy, puis aux seigneurs de Saint-Martin d'Agencourt, qui la garderont jusqu'en 1705 au décès sans descendance de François de Saint-Martin. Elle passe, par alliance en 1710 de Gabrielle-Claudine-Marguerite de Saint-Martin d'Agencourt, au marquis de Spada. Se succèdent Jacques Pelletier de Cléry, la famille des Du Plessis, et de 1779 à la Révolution Française, les Desormes-Duplessis. Au milieu du XVIIe siècle, il fut un relais de chasse relativement important où d'ailleurs Louis XIII  aurait fait une halte. En 1793, les sommets de quelques tours ont été détruits. Au XIXe siècle, le père Rey, fondateur  de la colonie de Cîteaux, acheta le château pour y  établir un noviciat des soeurs de Saint Joseph d'Oullins, lesquelles en 1878, en firent une providence pour les orphelines et les filles pauvres.","architecture":"Agencourt; Aujourd'hui, il ne subsiste  du château que des vestiges de douves, un corps de bâtiment du début du  XVIIe siècle, ainsi que des écuries  datant de l'époque du relais de chasse.  En 1320, la maison forte est appelée \"maison\", en 1422 \"château \", en 1424 \"maison forte \", puis forteresse en 1433 et 1470, avec pont-levis, fossés, tours et autres fortifications, et en 1539 «\"maison seigneuriale\", avant de devenir au XVIIe siècle un relais de chasse. Notons que ces écuries ont été très récemment classées monuments historiques, l'intérêt de ces écuries est essentiellement d'ordre architectural. Elles possèdent de jolies voûtes soutenues  par une vingtaine de colonnettes. Signalons enfin, pour terminer, l'existence d'un blason datant de 1607, en partie martelé, certainement par la furie révolutionnaire de 1792-1793;. Au XIXe siècle, s'y établit un noviciat des surs de Saint Joseph d'Oullins, dans les bâtiments reconstruits vers 1650 et au XXe siècle, elle devient maison familiale rurale.","habitants":"Nicolas de Corberon\r\n        \"","divers":"A Agencourt reste d'une maison forte et d'un relais de poste du XVIIIe siècle.","gps":"","images":["../image/image_21/21_Agencourt_1.jpg","../image/image_21/21_Agencourt_2.jpg","../image/image_21/21_Agencourt_3.jpg","../image/image_21/21_Agencourt_4.jpg"]},"Consult_chateau_formulaire4b65":{"id":"Consult_chateau_formulaire4b65","dept":"21","canton":"Sombernon","commune":"Agey","nom":"Agey","type":"Château","periode":"XVI-XVII","histoire":"AGEY; Ce château a été bâti et conservé dans la famille d'Agey jusqu'au XVIIe siècle. En 1662, il appartenait à Edme de Sommièvre, baron d'Ampilly. En 1671, il fut vendu à Hilaire Bernard de Mouhy, puis en 1714 à la famille Fuligny-Damas qui le reconstruisirent et l'entourèrent de jardins. En 1785, il est vendu à Jean-Vivant Micault de Courbeton, en 1806  à Charles-Marie-Luc Mareschal de Charentenay et il est toujours conservé dans cette famille.","architecture":"Château dAgey, les bâtiments du XVI-XVIIe siècle répartis autour de deux cours sont nombreux : corps principal, logement des domestiques, écuries, communs, remises, orangerie et un superbe colombier. Le logis est en fait formé de deux corps, un corps allongé surmontée d'un toit à croupes  avec la cage d'escalier couverte d'un dôme dans oeuvre et une tour carrée. Devant le château, de l'autre côté du chemin s'étendait un splendide parc et les jardins à la française aujourd'hui transformés en pré et une allée de marronniers et d'arbres divers qui reste un lieu privilégié de promenade.                                                                              Les ruines du château-fort de MARIGNY mangées par la végétation se découpent sur un éperon rocheux dominant la vallée de l'Ouche entre Saint-Victor et Barbirey, dont-un château transformé en hôtel restaurant.","habitants":"Famille d'Agey\r\n        \"","divers":"Château d'Agey","gps":"","images":["../image/image_21/21_Agey_1.jpg","../image/image_21/21_Agey_2.jpg","../image/image_21/21_Agey_3.jpg"]},"Consult_chateau_formulaire2d0e":{"id":"Consult_chateau_formulaire2d0e","dept":"21","canton":"Genlis","commune":"Aiseray","nom":"Aiseray","type":"Château","periode":"XVIII","histoire":"AIZERAY; en 1287 le fief vendue à Eudes de Biessey par le Duc de Bourgogne Robert II, en 1388 la propriété de Jean de Lugny,  passe en 1417 à Jean de Tenarre. En 1457 ce dernier concède une partie de la motte en arrière fief à Josserand de Bèze.  L'abbé qui en avait hérité vend ses biens à un parent, Bénigne de Cirey. En 1552  la motte est passée par mariage à la famille Millet. En 1613  la maison seigneuriale passe par mariage à Claude Bossuet qui devient seigneur d'Aiserey. En  1670  Jacques Bossuet (fils de Claude), très endetté, a abandonné sa seigneurie d'Aiserey à Claude Pouffier, l'un de ces créanciers. En 1685  la veuve de ce dernier achète les biens de Michel Millières avec la moitié du second château pour son fils Hector Bernard  Pouffier qui  entreprend la construction du château en 1732,  il meurt en 1736 sans héritier et lègue ses biens à la doyenneté du parlement. Le parlement achève la construction du château en 1748 et  comble les fossés. A la Révolution en 1789, le château devient bien national  administré comme tel . En 1796, il est acheté  par Martin Léjéas. Il reste la propriété de la famille Léjéas, puis des De Royère jusqu'en 1994. La même année, les communs du château sont achetés et restaurés  par la commune qui les cède en crédit-bail à l'atelier Parot (maître verrier, créateur et restaurateur de vitraux). Le château est acheté par l'atelier Parot qui effectue sa restauration pour le transformer en centre culturel.","architecture":"Aizeray; château du XVIIIe siècle, corps de logis rectangulaire à deux niveaux et attiques séparés par un pavillon surélevé d'un étage en sailli sur la partie façade et arrière aux angles coupés. Donjon du XIIe siècle.","habitants":"Hector Bernard  Pouffier\r\n        \"","divers":"Château d'Aizerai et donjon du XIIe siècle.","gps":"","images":["../image/image_21/21_Aiseray_1.jpg","../image/image_21/21_Aiseray_2.jpg","../image/image_21/21_Aiseray_3.jpg"]},"Consult_chateau_formulaire6c3f":{"id":"Consult_chateau_formulaire6c3f","dept":"21","canton":"Précy-sous-Thil","commune":"Aisy-sous-Thil","nom":"Aisy_sous_Thil","type":"Château","periode":"XV","histoire":"AISY sous-Thil; château a été bâti à la fin du XVe siècle par la famille de Drée, sur le même plan que Commarin. En 1515, il passa par mariage à la famille de Clugny. Malheureusement, il fut en partie démantelé pendant la Révolution Française.Il est constitué d'un parc à la française. Au XVIIIe siècle ce sont les Dubois d'Aisy qui en deviennent propriétaires. Puis en 1826, il est passé à Louis-Amédée Perrot de Chazelles, le château fut conservé au sein de cette famille jusqu'en 1943, avant d'être acheté par l'Etat  pour y fonder un établissement médical.D'autres châteaux dans le canton voir articles.","architecture":"Aisy sous Thil;  Logis principal construit au début du XVIe siècle, modifié dans sa partie droite à la fin du XIXe siècle  lucarne pendante à encadrement en brique et agrandi à la même époque par l'adjonction d'une grange, transformée à une date plus récente en atelier par le percement d'une grande baie vitrée, à droite de la porte charretière, le rez-de-chaussée surélevé, l'étage carré et l'étage de comble.","habitants":"Famille de Drée\r\n        \"","divers":"Château d'Aisy,  d'autres châteaux dans le canton voir articles, Tavannes et Bon Espoir.","gps":"","images":["../image/image_21/21_Aisy_sous_Thil_1.jpg","../image/image_21/21_Aisy_sous_Thil_2.jpg","../image/image_21/21_Aisy_sous_Thil_3.jpg","../image/image_21/21_Aisy_sous_Thil_4.jpg"]},"Consult_chateau_formulaired27f":{"id":"Consult_chateau_formulaired27f","dept":"21","canton":"Beaune","commune":"Aloxe-Corton","nom":"Aloxe_Corton","type":"Château","periode":"XVII","histoire":"CORTON ANDRE; Dès le début du VIe siècle, limplantation du christianisme avait favorisé lextension de la vigne par la création dimportants domaines rattachés aux abbayes. Ainsi l'abbaye de Cîteaux (créée en 1098) avec des plantations en Côte-d'Or. En l'an 1395, Philippe le Hardi décida daméliorer la qualité des vins et interdit la culture du Gamay au profit du Pinot noir dans ses terres. Enfin en 1416, Charles VI fixa par un édit les limites de production du vin de Bourgogne. A  la mort de Charles le Téméraire, le vignoble de Bourgogne fut rattaché à la France, sous le règne de Louis XI. Les  vignobles proche de Nuits et de Beaune, furent achetés en 1973 par Pierre André qui créa un grand domaine viticole et le château prit le nom de Corton André.  Aujourd'hui musée de la tonnellerie.                                                      Château de Corton transformé entre 1885 et 1890 en lieu et place de très anciens bâtiments qui appartenaient à la famille Vergnette de la Motte, depuis plusieurs siècles. Et, encore avant, à l'Abbaye de Cîteaux.                                                                                  Le château de GRANCEY, Louis Latour château viticole de grand cru construit à partir de 1749, les caves et cuverie en 1834.","architecture":"Aloxe-Corton, possède trois châteaux : Château de Corton-Grancey construit à partir de 1749. Les caves et cuverie en 1834.(Voir article)\r\nChâteau Corton André, fin XIXe siècle, a remplacé une belle maison du XVIIIe siècle, il présente une remarquable toiture  flamande aux tuiles vernissées, fut acheté en 1923 par Pierre André qui créa un grand domaine viticole.                                    Grancey, corps de logis rectangulaire à deux niveaux et attiques, pavillons rectangulaires à  un niveau en façades saillants sur angles.","habitants":"Corton André \r\n        \"","divers":"Château d'Aloxe-Corton et de Grancey.","gps":"","images":["../image/image_21/21_Aloxe_Corton_1.jpg","../image/image_21/21_Aloxe_Corton_2.jpg","../image/image_21/21_Aloxe_Corton_3.jpg","../image/image_21/21_Aloxe_Corton_4.jpg","../image/image_21/21_Aloxe_Corton_5.jpg"]},"Consult_chateau_formulaire0eaf":{"id":"Consult_chateau_formulaire0eaf","dept":"21","canton":"Arnay-le-Duc","commune":"Antigny-Foissy","nom":"Antigny_Foissy","type":"Château","periode":"XVII","histoire":"ANTIGNY; au XIIIe siècle à la famille d'Antigny, puis passa par alliance à Philippe de  Montagu  leur fille, mariée à Thierry de Montbéliard, leur fils, Richard, seigneur au XIIIe siècle, sans héritier mâle, la fille de ce dernier, Jeanne, fut la troisième femme  de Noyers, maréchal de France, son  fils, Jean  fut gouverneur de Bourgogne. Il transmit Antigny en 1362 à son  fils, de Noyers qui le laissa à ses deux enfants Louis de Noyers et Marguerite mariée en 1409  à Guy de La Trémouille. Louis à sa mort sans descendance en 1415, la baronnie un moment partagée, revint à sa soeur, puis au fils de celle-ci, Louis de La Trémouille, qui mourut à Antigny en 1467. Le domaine échut alors à sa nièce Guillemette de Vergy, fille de sa soeur Claude et  Charles de Vergy dont le contrat de mariage avait prévu cette dévolution en 1435. Guillemette de Vergy prit pour époux le fils de la seconde femme de son père, Guillaume de Pontailler, hérita d'Antigny en 1474, se remaria en 1476 avec Claude de Toulongeon. Elle se rallia en 1477 au parti de Marie de Bourgogne et se vit confisquer ses  biens  au profit de son gendre, Jacques de Dinteville et en 1481, de son fils Jean de Pontailler, lequel finalement en hérita peu avant de mourir en 1514. Il laissa Antigny à son fils Claude de Pontailler qui s'empressa de vendre le bien à son cousin Gérard de Vienne mari de Bénigne de Dinteville. Dans le même temps Gérard de Vienne, qui descendait des premiers seigneurs d'Antigny, rachetait à Claude de Pontailler, baron de Flagey, frère de Jean, les droits auxquels il pouvait prétendre. Antigny resta entre les mains de ses descendants jusqu'au mariage en 1651 d'Alexandrine de Vienne avec Claude de Damas. Les Damas le conservèrent jusqu'en 1802 date de la vente par François-Jacques de Damas à un architecte de Vitteaux nommé Perrier. Plusieurs propriétaires se succédèrent au  cours du XIXe siècle avant que le château ne soit acquis et restauré par M. et Mme Tyler, parents du propriétaire.                                                       Dans une commune au sud château de Lacanche.","architecture":"Antigny; Château  de Foissy du XII-XVIIe siècle  jardin à la française, le château d'Antigny actuel date de 1629 construit sur  les vestiges  importants bâtiments fortifiés du Moyen-Age  font aujourd'hui le bonheur des amoureux d'architecture médiévale avec son donjon bâti sur une colline et surtout sa tour d'angle presque intacte, elle possède encore tous ses mâchicoulis.                   Château de Lacanche corps de logis rectangulaire à deux niveaux et attiques flanqué de deux pavillons saillants rectangulaires de même niveaux.","habitants":"Claude de Pontailler\r\n        \"","divers":"Château d'Antigny avec sa tour du XVe siècle, et de Lacanche","gps":"","images":["../image/image_21/21_Antigny_Foissy_1.jpg","../image/image_21/21_Antigny_Foissy_2.jpg","../image/image_21/21_Antigny_Foissy_3.jpg","../image/image_21/21_Antigny_Foissy_4.jpg","../image/image_21/21_Antigny_Foissy_5.jpg","../image/image_21/21_Antigny_Foissy_6.jpg"]},"Consult_chateau_formulairecc87":{"id":"Consult_chateau_formulairecc87","dept":"21","canton":"Mirabeau","commune":"Arceau","nom":"Arceau_Arcelot","type":"Château","periode":"XVIII-XIX","histoire":"ARCEAU-ARCELOT; fief ancien, il a appartenu  successivement à divers seigneuries, les Mailly et  les Couste et échoit au Guéribout en 1674 qui firent érigé en marquisat pour Alphonse de Gueribout, le domaine passera ensuite à la famille Masseau qui le revendront en 1720 aux Verchère dont Philibert conseiller au parlement de Bourgogne laissera son château féodal de 1217 pour construire en 1761  à peu de distance le nouveau château de style nèo-classique par l'architecte  Thomas Dumorey. En 1870 à la mort du dernier des Verchère par succession le domaine passe à un neveu  Ernest Carrelet de Loisy, aujourd'hui toujours dans cette famille Patrice de Loisy marquis  d'Arcelot, le château a reçu régulièrement le général Lyautey familier des propriétaires de l'époque.","architecture":"Arceau; Château du XIXe siècle de style nèo-classique, bâtiment d'habitation  de plan rectangulaire, flanqué de deux ailes basses en avancées  sur la façade antérieure. Rez-de-chaussée desservi, à l'arrière, par un escalier en fer à cheval et murs de moellons enduits,  soubassement à bossages à Anglet  façade postérieure, travées latérales, orangerie dans l'aile gauche, toit à croupes sur le corps central, en terrasse sur les ailes. Communs au nord, de plan en T . Tour de plan carré, en pierre et brique, avec une horloge. Dans l'angle du bâtiment principal et de l'aile droite, toit en pavillon sur la tour. Chouette en demi relief sur le pan coupe de la tour.       Arcelot; château construit en 1761-1765 de style Louis XV corps central  en saillie à un étage toits à la Mansart, le centre est occupé par un avant corps divisant chacune des façades, encadré de deux pavillons primitifs à toits brisés percés d'oeils-de-boeuf, Une orangerie sera construite en 1810, un parc a été dessiné dans un style à l'anglaise par la paysagiste Jean-Marie Morel.","habitants":"Ernest Carrelet de Loisy\r\n        \"","divers":"Deux châteaux dans la commune Arceau et Arcelot","gps":"","images":["../image/image_21/21_Arceau_Arcelot_1.jpg","../image/image_21/21_Arceau_Arcelot_2.jpg","../image/image_21/21_Arceau_Arcelot_3.jpg","../image/image_21/21_Arceau_Arcelot_4.jpg","../image/image_21/21_Arceau_Arcelot_5.jpg"]},"Consult_chateau_formulaired8b8":{"id":"Consult_chateau_formulaired8b8","dept":"21","canton":"Pouilly-en-Auxois","commune":"Arconcey","nom":"Arconcey_Chatellenot","type":"Château","periode":"XVII","histoire":"ARCONCEY, fief de la famille de Jaucourt.           \r\nCHATELLENOT, à quelques kilomètres de  la commune d'Aconcey;  le château démarre sous la famille de la Loge  avec le seigneur Guillaume de Chatellenot, , Guy de Chatellenot. Il est fait mention de l'écuyer Jehan de Chateullonnet (de Chatellenot) dans une compagnie de 24 écuyers et 4 chevaliers lors de la campagne d'Écosse de 1384 en compagnie du comte de Montagu, seigneur de Marcilly, sous le commandement de Jean de Vienne, amiral de France, puis passa à la famille Le Belin de Châtellenot (président tribunal de commerce de Melun). puis la famille Gerin (Militaires, imprimeur et inventeur, Dijon). On doit de grandes découvertes à Eugène Gérin : ailes d'avions à géométrie variable, roue de sécurité sur automobiles, etc.réquisitionné comme bien national à la Révolution, Le château est alors vendu aux enchères et passera ensuite de mains en mains jusquen 1972 quand une famille entreprend de le restaurer.","architecture":"Arconcey; La maison forte médiévale, dont il ne restait plus qu'une tour à la fin du XVIIIe siècle, a entièrement disparu. Une demeure de plaisance fut bâtie à l'emplacement de la forteresse en 1696 et embellie au siècle  suivant, elle se composait d'un grand corps de logis avec un péristyle central et un pavillon aux extrémités. Ce château, dont deux bâtiments étaient encore visibles en 1840, a disparu à la fin du XIXe siècle. Il subsiste un important alignement de dépendances agricoles de la première  moitié du XVIIIe siècle, divisé en plusieurs parcelles et remanié au XIXe siècle. A l'extrémité nord-est de cet ensemble se trouve une maison de maître de la seconde moitié du XVIIIe siècle, isolée par un portail et une grille de la même époque.                                                Le château de Châtellenot a été construit sur un éperon rocheux au sommet du village de Châtellenot, d'abord la porte fortifiée et son pont levis puis un imposant donjon au XVIe siècle. Des remaniements majeurs à la Révolution sont à signaler, le donjon a été abattu et le fossé sec taillé dans le roc partiellement comblé. Les vestiges d'un jardin à la française subsistent (pergola). Un puits taillé dans le roc à une profondeur de près de 60 m est remarquable. Au château de Châtellenot, un pigeonnier remarquable a été construit dans la partie supérieure de la tour du XIVe siècle qui marquait lentrée du château fort, Lors de la Révolution Française, le donjon et des éléments architecturaux remarquables sont dégradés ou détruits.","habitants":"Guillaume de Chatellenot\r\n        \"","divers":"Vestiges du château de Chatellenot (tour).","gps":"","images":["../image/image_21/21_Arconcey_Chatellenot_1.jpg","../image/image_21/21_Arconcey_Chatellenot_2.jpg","../image/image_21/21_Arconcey_Chatellenot_3.jpg","../image/image_21/21_Arconcey_Chatellenot_4.jpg","../image/image_21/21_Arconcey_Chatellenot_5.jpg","../image/image_21/21_Arconcey_Chatellenot_6.jpg"]},"Consult_chateau_formulaire92d0-2":{"id":"Consult_chateau_formulaire92d0-2","dept":"21","canton":"Nuits-St-Georges","commune":"Nuits-St-Georges","nom":"Argilly","type":"Maison forte","periode":"XV","histoire":"ARGILLY;  Jean II Quarré, reçut en 1416, le fief de La Mothe d'Argilly de Jean sans Peur, Duc de Bourgogne qui l'autorisa à prendre tous le bois nécessaire pour la construction de sa maison de La Mothe.\r\nPierre Ranvial était châtelain du château d'Argilly dans l'année 1454. Dans la même année, il a été anobli.","architecture":"Argilly, motte féodale  du château des ducs de Bourgogne.\r\nLa maison de plaisance pour la chasse devint dès le XIIe siècle un château de 14 tours , il fut détruit en 1590, il ne s'est jamais remis de ses ruines. Un autre relais de chasse datant du XVIe siècle  atteste un riche passé d'Antilly . Ferme fortifiée du XVIe siècle, reste de l'ancien château, tourelle d'escalier à vis hexagonale, baies en accolade, cheminées monumentales, plafonds à la française.","habitants":"Pierre Ranvial \r\n        \"","divers":"Maison forte et remparts. Motte féodale et tourelles du château fort d'Antilly et ferme fortifié du XVIe siècle","gps":"","images":["../image/image_21/21_Argilly_1.jpg","../image/image_21/21_Argilly_2.jpg","../image/image_21/21_Argilly_3.jpg","../image/image_21/21_Argilly_4.jpg"]},"Consult_chateau_formulaire5650":{"id":"Consult_chateau_formulaire5650","dept":"21","canton":"Arnay-le-Duc","commune":"Arnay-le-Duc","nom":"Arnay_le_Duc","type":"Château","periode":"XV","histoire":"ARNAY-le-Duc; Dès le XIe siècle, Arnay devient le siège d'une importante seigneurie, la ville doit son titre de \"duc\" aux ducs de Bourgogne qui l'aurait rachetée en 1342. Le château des princes de condé dit manoir de \"Juilly\", bâti sous François Ier par Charles Merlan de Beaumont, receveur des finances, seigneur de Juilly, il est occupé par les Merlan jusqu'en 1562. En 1562, la famille Chabot-Charny le récupère en paiement pour dettes. En 1570, le futur Henri IV s'arrêta au château à l'occasion de la bataille d'Arnay-le-Duc. De 1634 à 1654, le château passe au troisième prince de Condé. En 1655 il devient la propriété d'Henri de Lorraine, comte d'Harcourt puis en 1678, de Charles de Lorraine, vicomte de Marsan. En mai 1747, le château sert de prison pour des soldats hollandais. En 1792, durant cette période,utilisé pour usage municipal et les dames de Saint-Cyr acquirent le château, il sert de salle de bal d'où les roturiers sont exclus.\r\nA la Révolution  vendu comme bien national, il devient alors une usine textile. De 1792 à 1865, le château passe de main en main, dépouillé de son mobilier et de ses sculptures, De 1865 à 1957, une usine de limes prend possession des lieux et va devenir le principal employeur d'Arnay. La société Proutat-Michot-Thomeret, manufacture de limes, râpes et outils, va acquérir une réputation internationale, en étant primée aux expositions universelles de Paris et Londres. Le château est dénaturé par de nombreux édifices industriels. Depuis 2011 monsieur Albert Renaudin demeure le dernier tailleur de limes à la main de France, activité qu'il ne pratique plus qu'à titre démonstratif.                                 \r\n A quelques kilomètres au nord-ouest à Jouey, le château de Promenois du XVIIIe siècle et plus à l'est le château de Musigny.","architecture":"Arnay-le-Duc, dominant la vallée de l'Arroux, ruines féodales, la tour de la Motte-Forte du XIIe siècle  appelé \"ancien château des Princes de Condé\", seul vestige, la grosse tour ronde du XVe siècle couronnée de mâchicoulis et le  château des princes de Condé élégante demeure seigneuriale du XVIe siècle, qui fut rénové de 1958 à 1967, par  la commune, et détruit les bâtiments inutiles  se compose  d'une tour polygonale et de deux corps de logis était surmonté  d'un trés beau portail qui fut malheureusement démonté au XIXe siècle dans la cour du château on peut voir les restes de l'ancien rempart qui daterait du Xe siècle. Depuis 1967, il abrite un centre professionnel éducatif.\r\nLe château a été inscrit monument historique le 26 mai 1926. Il ne se visite qu'à l'occasion des journées du patrimoine, on entre seulement dans une salle et dans la tour polygonale.       Promenois, château du XVIIIe siècle, un corps de logis à six travées de deux niveaux et attiques.                                            Mussigny, corps de logis rectangulaire  à deux niveaux flanqué de tours rondes aux extrémités à toits en poivrières.","habitants":"monsieur Albert Renaudin\r\n        \"","divers":"Ruines féodales, tour de la motte forte, château des princes de Condé, Château dfe Mussigny et de Prémenois à Jouey. La ferme fortifiée à Arnay","gps":"","images":["../image/image_21/21_Arnay_le_Duc_1.jpg","../image/image_21/21_Arnay_le_Duc_2.jpg","../image/image_21/21_Arnay_le_Duc_3.jpg","../image/image_21/21_Arnay_le_Duc_4.jpg","../image/image_21/21_Arnay_le_Duc_5.jpg","../image/image_21/21_Arnay_le_Duc_6.jpg","../image/image_21/21_Arnay_le_Duc_7.jpg","../image/image_21/21_Arnay_le_Duc_8.jpg","../image/image_21/21_Arnay_le_Duc_9.jpg"]},"Consult_chateau_formulaireeb59":{"id":"Consult_chateau_formulaireeb59","dept":"21","canton":"Sombernon","commune":"Aubigny-les-Sombernon","nom":"Aubigny_St_Anthot","type":"Château","periode":"XVI","histoire":"AUBIGNY-les-Sombernon: Un château reconstruit par les  Dumeix,les  de Pot, les  Damas,et les Rochechouart,          A quelques kilomètres château à Saint-ANTHOT, plusieurs seigneurs, dont une lignée portait le nom de Saint-Anthot, ils se partagèrent le fief jusqu'au XVIIe  siècle. Alors la terre fut tout entière réunie  entre les mains de la famille de Sommièvre, puis elle passa, par alliance, aux La Madeleine de Ragny et, au début du XVIIIe siècle, aux Massol qui rebâtirent le château en  conservant une tour mentionnée aux XVIe et XVIIe siècle. En 1865, ce château fut vendu à la famille Raviot   qui le restaura, bâtit par souci de symétrie une seconde tour.","architecture":"Aubigny-les-Sombernon.  bâti dès le XIIe siècle, puis il fut reconstruit   au XVIe siècle.sur les restes de l'édifice que nous voyons actuellement, hélas en mauvais état.\r\nLe donjon carré en pierres à bossage avec meurtrières et deux murs en équerre datent semble-t-il de 1548, cette date étant gravée sur la clef de voûte.\r\nLe château est propriété de la commune et bien que ruiné a encore fière allure.\r\nDans l'église paroissiale Saint-Paul, toute proche se trouve une sculpture de Gabrielle de Rochechouart.\r\nSt-Anthot,  château du XVIIIe siècle, corps de logis rectangulaire,à deux niveaux flanqué aux extrémités de pavillons carrés en retour d'équerre à deux étages, toit à hauts pans, sur la façade  deux tourelles, toits en poivrières.","habitants":"Gabrielle de Rochechouart \r\n        \"","divers":"Château d'Aubigny et vestiges du château de Saint-Anthot","gps":"","images":["../image/image_21/21_Aubigny_St_Anthot_1.jpg","../image/image_21/21_Aubigny_St_Anthot_2.jpg","../image/image_21/21_Aubigny_St_Anthot_3.jpg"]},"Consult_chateau_formulairefaf5":{"id":"Consult_chateau_formulairefaf5","dept":"21","canton":"Seurre","commune":"Auvillars-sur-Saône","nom":"Auvillars_Broin","type":"Château","periode":"XVII","histoire":"AUVILLARS-sur-Saône;  Un fief est attesté dès le XIIIe siècle à Auvillars, au XIVe siècle une maison forte s'y trouvait. En 1409 Jean de Saint Hilaire, bailli des foires de Châlon, y bâtit un château qui passa dans la famille des Courcelles, en 1640,  la terre est vendu à Louis Gallois, capitaine des gardes du corps du prince de Condé, qui transforma le château dévasté en 1636 et le légua en 1678 à son neveu Edme Gontier. Les Gontier restèrent maîtres d'Auvillars jusqu'à la fin de l'ancien régime. BROIN; A quelques kilomètres d'Auvillars , le château de  Broin, le corps de bâtiment principal a été construit en 1747 pour Philippe de Cronembourg, les communs semblent dater de cette campagne de construction. Les deux ailes du château ont été ajoutées en 1785 pour la famille des Seguin  de Broin qui firent sculpter leurs armoiries sur la porte du bâtiment principal, deux  lions tenant les armes de la famille de Seguin de Broin.","architecture":"Auvillars, du château perché du XVe siècle  il ne reste plus que le corps de passage et la tour de plan oblong, au milieu du XVIIe siècle, le corps de bâtiment principal du château actuel  vint se greffer à l'arrière des parties subsistantes de l'édifice précédent, dévasté en 1636 ; le pont du potager, situé à l'ouest de la cour nord, est daté de 1681 ; le château fut remanié au XIXe siècle  et agrandi par la construction du pavillon Est, les parties agricoles, le lavoir et le colombier datent du  XIXe siècle. L'édifice comporte un corps principal de plan rectangulaire à un étage carré et un étage de comble, la façade nord-est en brique apparente, la façade sud-est enduite, le colombier et les parties agricoles composées d'un logement, des écuries et des locaux de l'exploitation viticole forment un bâtiment de plan en L.                                                Broin; le corps central à deux niveaux, fronton triangulaire en façade et deux pavillons sur les côtés à deux niveaux également. Logis de toit à croupe, communs couverts d'un toit brisé.","habitants":"Famille des Courcelles\r\n        \"","divers":"Ruines féodales de la Rochère et château d'Auvillars et de Broin.","gps":"","images":["../image/image_21/21_Auvillars_Broin_1.jpg","../image/image_21/21_Auvillars_Broin_2.jpg","../image/image_21/21_Auvillars_Broin_3.jpg","../image/image_21/21_Auvillars_Broin_4.jpg","../image/image_21/21_Auvillars_Broin_5.jpg","../image/image_21/21_Auvillars_Broin_6.jpg","../image/image_21/21_Auvillars_Broin_7.jpg"]},"Consult_chateau_formulairef364":{"id":"Consult_chateau_formulairef364","dept":"21","canton":"Auxonne","commune":"Auxonne","nom":"Auxonne_Flammerans","type":"Château","periode":"XVII","histoire":"AUXONNE; En 1479 le roi Louis XI qui venait de rattacher la Bourgogne à la couronne  ordonna la construction de la forteresse d'Auxonne, qui passera en 1493 à Maximilien d'Autriche l'Artois, le Charolais et la Comté,  Auxonne, ville frontière qui perd ses fonctions au XVIIe siècle n'empêche que des rénovations seront effectuées aux XVIIe siècle selon les principes de Vauban, la place abritera une garnison jusqu'à la Révolution. Racheté par la ville en 1960 le château est restauré. A l'intérieur, le musée Bonaparte conserve les souvenirs du jeune Napoléon Bonaparte lorsqu'il était lieutenant au Régiment de la Fère et élève à l'école d'artillerie  entre 1788 et 1791.                                                          FLAMMERANS;  A quelques kilomètre au nord d'Auxonne. château de Flammerans du XVIIIe siècle, en 1732 Philippe de Suremain devient seigneur de Flammerans et entreprend vers 1746 la construction du château actuel sur les vestiges d'un fortin. A la Révolution, le château déclaré bien national sera vendu aux enchères. Bonaparte, alors jeune officier à Auxonne, aurait dormi au château. Différentes familles se succéderont et en 1999, Catherine et Guy, actuels propriétaires, succombent au charme de la bâtisse, après de longs travaux, ils ouvrent les portes de leur demeure pour partager avec les hôtes.","architecture":"Auxonne; Ancien château féodal de 1479, repris par Vauban au XVIIe siècle, bâtis sous Louis XI après la défaite de Charles le Téméraire et achevés sous ses successeurs après la conquête du Duché de Bourgogne, et le seul qui soit encore debout en dépit de transformations ultérieures, le château comporte un corps de caserne datant de Louis XII et François Ier qui constitue peut-être le plus ancien bâtiment de caserne bâti à cet usage, cinq tours d'angles reliées par d'épaisses courtines, les deux tours accolées des Moulins, la tour de Beauregard, la tour du Pied de Biche, et la tour Notre-Dame. Cette dernière est la plus massive, avec trois niveaux voûtés, ses 20 mètres de diamètre, ses 22 mètres de hauteur et ses murs épais de 6 mètres à la base. Cette enceinte médiévale couvrait un périmètre de 2600 mètres et comprenait 23 tours et tournelles et un pont fortifié. La porte de Comté, à l'Est de la ville, la tour de Belvoir, musée  de la fortification, il ne subsite aujourd'hui que trois tours. La porte Royale du XVIIe siècle.\r\nLa tour du Signe sur laquelle on peut voir une salamandre, emblème de François Ier.  L'Arsenal d'Artillerie du XVIIe siècle servant initialement à fournir des affûts de canon, Il a été construit par Vauban entre 1689 et 1693.  Hôtel de Ville, édifice en brique du XVe siècle avec un toit d'ardoises, ancien logis des Ducs de Bourgogne. Il est de style néogothique et devint la propriété de la ville d'Auxonne en 1811 qui effectua des changements sur la façade 1857-1858.\r\nFlammerans, château du XVIIIe siècle corps de logis à trois niveaux et attiques flanqué de deux pavillons saillants  aux extrémités de même niveau.","habitants":"Maximilien d'Autriche l'Artois\r\n        \"","divers":"Ville fortifiée d'Auxonne avec ses tours restantes, arsenal, ancien château féodal, Mairie château de Flammerans.","gps":"","images":["../image/image_21/21_Auxonne_Flammerans_1.jpg","../image/image_21/21_Auxonne_Flammerans_2.jpg","../image/image_21/21_Auxonne_Flammerans_3.jpg","../image/image_21/21_Auxonne_Flammerans_4.jpg","../image/image_21/21_Auxonne_Flammerans_5.jpg","../image/image_21/21_Auxonne_Flammerans_6.jpg","../image/image_21/21_Auxonne_Flammerans_7.jpg","../image/image_21/21_Auxonne_Flammerans_8.jpg"]},"Consult_chateau_formulaireceea":{"id":"Consult_chateau_formulaireceea","dept":"21","canton":"Vitteaux","commune":"Avosnes","nom":"Avosnes","type":"Maison forte","periode":"XV","histoire":"AVOSNES; seigneurie entre Vitteaux et Sombernon qui appartenait aux Templiers de Bure par donation  faite en 1147 par Guy de Sombernon et Varnier de Drée, en présence d'Eudes, fils du duc de Bourgogne, de Jean de Mont-Saint-Jean, de Jean de Chaudenay, d'Aymon Roux de Dijon, de Varnier d'Agey, et de l'évêque de Langres Godefroy, plusieurs de leurs frères portant le nom d'Avosne, diocèse de Langres, sont désignés dans le procès, entre autres Guillaume d'Avona, Célerier de la maison d'Uncey. Le château fort d'Avosnes, ancien, fut bâti vers 1544 par Simon et Denis Potot, fermiers du grand prieur de Champagne, seigneurs d'Avosnes. Ensuite le château passa à la famille Boillot au XVIIe siècle, puis c'est la famille Guillaume qui en est propriétaire, en 1725 c'est la famille Driot qui l'acheta, et jusqu'en 1932 le conserva grâce à la dernière représentante de cette lignée. Actuellement ce sont les de Girval qui en sont les propriétaires.                               Dans la commune plusieurs maisons fortes tel que  Villeferry et Marcellois.","architecture":"Avosnes, château du XVIe siècle avec une tour carrée, le château de Villeferry en forme de U  à deux niveaux flanqué de quatre  tours,  trois rondes et une carrée en angles. Un donjon carré à Arnay sous Vitteaux.","habitants":"Monsieur Denis Potot\r\n        \"","divers":"Château d'Avosnes, de Villeferry et maison forte de Marcellois","gps":"","images":["../image/image_21/21_Avosnes_1.jpg","../image/image_21/21_Avosnes_2.jpg","../image/image_21/21_Avosnes_3.jpg","../image/image_21/21_Avosnes_4.jpg","../image/image_21/21_Avosnes_5.jpg","../image/image_21/21_Avosnes_6.jpg"]},"Consult_chateau_formulaire9a81":{"id":"Consult_chateau_formulaire9a81","dept":"21","canton":"Sombernon","commune":"Barbirey-sur-Ourchy","nom":"Barbirey","type":"Château","periode":"XVIII","histoire":"BARBIREY; le fief dépendait depuis le Moyen-Age de la baronnie de Marigny. En 1633 un acte notarié mentionne l'existence à Barbirey d'une \"maison seigneuriale à 4 tours \".\r\n Début XVIIe siècle le château est habité par Ph. de Rochechouard, seigneur de Barbirey, avant qu'il ne succède à son frère Jean comme baron de Marigny. Au XVIIIe siècle, le banquier Jean Paris de Monmartel, acquiert la terre Marigny, A la fin du XVIIIe siècle Paris-de-Montmartel fera démolir le château de Marigny pour reconstruire celui de Barbirey, à son décès, son fils, le marquis de Brunoy, fait reconstruire le logis actuel, à la fin du XIXe siècle, le château est acquis par Raymond de Blic et son épouse, Marie de Foucauld, sur du Père Charles de Foucauld, qui y passa plusieurs séjours. Acheté par le Président du Parlement de Bourgogne de-Grosbois, en 1783, il passera, après la Révolution, aux familles Tardy, Denizot, Bouchard. Le parc du château étant  tombé à l'abandon, Dr. Roland Garaudet lacquiert en 1989 et le fera renaître.","architecture":"Barbirey; le château a été construit  avec les pierres du  fort ruiné  de Marigny deux corps de logis rectangulaire intercalé par un pavillon central avec tours rondes. En 1633 un acte notarié mentionne l'existence à Barbirey d'une \"maison seigneuriale à quatre tours. Elle a traversé les vicissitudes des siècles. De nos jours propriété privée, elle est connue sous le nom de \"Château de Barbirey\". Son parc et ses jardins se visitent.","habitants":"Jean Paris de Monmartel\r\n        \"","divers":"Château de Barbirey","gps":"","images":["../image/image_21/21_Barbirey_1.jpg","../image/image_21/21_Barbirey_2.jpg","../image/image_21/21_Barbirey_3.jpg","../image/image_21/21_Barbirey_4.jpg"]},"Consult_chateau_formulairea120":{"id":"Consult_chateau_formulairea120","dept":"21","canton":"Mirebeau","commune":"Beaumont-sur-Vingeanne","nom":"Beaumont_Vingeanne","type":"Château","periode":"XVIII","histoire":"BEAUMONT sur Vingeanne;  La baronnie de Beaumont devient la propriété des Saulx-Tavannes en 1607. Le château est édifié en 1723 par l'abbé Claude Jolyot de 1670 à 1762,  docteur en théologie, chapelain du roi Louis XV de France, et fils de François Jolyot, gérant des biens de la famille de Saulx-Tavannes. A la mort de Claude Jolyot en 1762 le château passe à son neveu François Clesquin dont la fille de ce dernier  épouse un conseiller au parlement de Bourgogne, Joseph-Gabriel-Antoine Juillet de Saint-Pierre. Propriété érigé en duché au XVIIIe siècle, passe la Révolution sans problème, transmise par alliance de Marie-Joséphine Juillet de Saint-Pierre avec Germain Ligier passe  en 1816 en héritage au fils Gabriel-Onésime qui devient baron, membre du Jockey-Club jusqu'en 1884, ce dernier a partagé son lieu d'habitation avec son château voisin d'Oisilly, légua Beaumont  à l'une de ses filleules mademoiselle Gillet de Valbreuse future baronne de Tavernost, en 1892 à son décés le château et vendu au marquis de Montmort qui restaure l'édifice  afin d'obtenir son classement aux Monuments Historiques en 1948.","architecture":"Beaumont;  Il existait au XVIe siècle à Beaumont un puissant château élevé au Moyen-Age, aujourd'hui petit château d'un abbé de cour, corps de logis rectangulaire avec sous-sol à moitié apparent, et deux niveaux avec balustrades sur balcon et sur bordure de toitures à tuiles polychromes. fronton triangulaire plein cintre en façade et  deux avants corps latéraux  sur la façade antérieure, escaliers à double révolution, entouré d'un grand parc. Réfection des décors sculptés des balustrades, reconstruction partielle des communs au XIXe siècle. \r\n Château restauré en 1936 puis à partir de 1942. Logis, communs, parties agricoles implantés à flanc de colline, en bordure du village, au sud.  Logis précédé d'une cour d'honneur ouverte par une porte cochère et une porte piétonne.","habitants":"abbé Claude Jolyot\r\n        \"","divers":"Ruines féodales et château de Beaumont sur Vingeanne","gps":"","images":["../image/image_21/21_Beaumont_Vingeanne_1.jpg","../image/image_21/21_Beaumont_Vingeanne_2.jpg","../image/image_21/21_Beaumont_Vingeanne_3.jpg"]},"Consult_chateau_formulaire04c6":{"id":"Consult_chateau_formulaire04c6","dept":"21","canton":"Beaune","commune":"Beaune","nom":"Beaune","type":"Château","periode":"XV","histoire":"BEAUNE. Suite à la guerre de Cent-Ans de 1337 à 1453, et à la mort du duc de Bourgogne Charles le Téméraire à la bataille de Nancy en 1477, le roi Louis XI de France entreprend de rallier l'état bourguignon à la France. Après avoir conquis le 2 juillet 1478, Beaune à la duchesse Marie de Bourgogne fille héritière de Charles le Téméraire, il fait construire ce château doté de cinq importantes tours et de fortifications en 1479 pour  contrôler Beaune. Les rois Charles VIII de France 1470-1498 puis Louis XII de France 1462-1515 fait renforcer la construction du château pour contrôler Beaune puis pour contrôler les routes de Dijon et de Seurre.\r\nA la Révolution Française toutes les parties du château qui peuvent rappeler la royauté sont détruites. En 1820, Bernard Bouchard rachète le château de Beaune et y installe jusqu'à ce jour, le siège de son domaine viticole Bouchard père et fils, crée en 1731.                                                                                              Dans la commune le château de Challanges transformé en hôtel restaurant.                                                                              Monastère de Beaune date du IVe siècle, devient en 2009 musée des beaux arts. Ce  lieu créé au XIIIe siècle par les ordres des mendiants ou de nombreux moines des Cordeliers, Jacobains, Chartreux, Capucins y séjournèrent, également au XVIIe siècle les établissements pour les ursulines, les Minimes et les Carmélites, le couvent des ursulines transformé en hôtel de ville et celui des minimes en bibliothèque municipale.","architecture":"Beaune, aujourd'hui il ne subsiste que quatre tours du château, ainsi que des parties du rempart du XIIIe siècle supportant les boulevards circulaires. De nombreux hôtels particuliers du XVIe siècle, la maison de Champy de 1720, les hospices à toitures vernissées fondé en 1443 par Nicolas Rolin, chancelier du duc de Bourgogne. Hôtel des ducs de Bourgogne abrite le musée du vin construit au XVe siècle possède une cour intérieure  avec tourelle à toits pointu, La rue du château coupe la propriété en deux mais des caves souterraines traversent sous la voie publique entre les deux parties.","habitants":"Louis XII de France\r\n        \"","divers":"Beaune, ancienne fortifications hôtel de Saulx, hôtel Dieu, le beffroi, couvent des cordeliers, hôtel des ducs de Bourgogne et le château de Challanges.","gps":"","images":["../image/image_21/21_Beaune_1.jpg","../image/image_21/21_Beaune_2.jpg","../image/image_21/21_Beaune_3.jpg","../image/image_21/21_Beaune_4.jpg","../image/image_21/21_Beaune_5.jpg","../image/image_21/21_Beaune_6.jpg","../image/image_21/21_Beaune_7.jpg","../image/image_21/21_Beaune_8.jpg","../image/image_21/21_Beaune_9.jpg"]},"Consult_chateau_formulaired8d2":{"id":"Consult_chateau_formulaired8d2","dept":"21","canton":"Précy-sous-Thil","commune":"Nan-sous-Thil","nom":"Beauregard","type":"Château","periode":"XVII","histoire":"BEAUREGARD; Nan-sous-Thil  fief relevant au XIVe siècle du château de Thil, fief des Digoine au XIVe siècle seigneur de Ternant, transmis en part à Antoinette de Ternant qui épousa en 1516 Loys de Bresche de la Trémoille, ces derniers vendirent en 1585 la moitié de la seigneurie à Andrenant de Pracontal et en 1601 la seigneurie est acquise par la famille Bretagne notable à Saulieu ferroniers et marchands de grelots dont leur descendance Claude Bretagne  1523-1604 seigneur de Nan, d'Orain et de Laborde. son fils appelé également Claude meurt en 1616 laissant un fils Pierre-François qui fit reconstruire le château en 1671, sa descendance Jean-Marie  conseiller  du roi en hérita aura deux filles dont Marie-Charlotte qui apporta au XVIIIe siècle  par alliance le domaine à Edme-Etienne-François Champion conseiller au parlement de Bourgogne qui prend le nom de \"Nansouty\" déformation de Nan-sous-Thil, dans la ligné de cette famille  le célèbre général d'empire qui parvient à traverser sans encombre la Révolution mais le lieutenant colonel Pierre-Marie-Eugène Champion de Nansouty ruiné par des engagements dans l''industrie  se sépare de Beauregard en 1845 vendu à monsieur de Suremain de Saiseray, puis passa ensuite aux Gresley, puis aux Jollet pour finir à la famille Bonoron qui le transforme en chambres d'hôtes.","architecture":"Beauregard; château d'origine style féodal flanqué de quatre tours entouré d'un mur d'enceinte et défendu par un pont-levis reconstruit en 1671 dans l'ancienne enceinte,  corps de logis rectangulaire à deux niveaux et attiques, flanqués de  deux tours carrées détachées, les communs composés de deux corps perpendiculaires, l'un  se termine par  une tour ronde, l'autre par une tour carrée.  Beauregard,  remanié au XVIIe siècle sur un ancien château du XIIIe siècle le château de Beauregard domine le petit village de Nan-sous-Thil situé au cur des paysages vallonnés de l'Auxois, situé au milieu d'un parc arboré de 10 ha, avec petit bassin et pièces d'eau, le jardin paysager se composent d'arbustes, de nombreuses vivaces, hydrangéas et collection de rosiers, le tout au milieu de bordures et topiaires de buis. Une tour de garde du XIIIe siècle avec toiture de lave domine le potager et une petite fabrique du XIXe siècle borde la vigne, membre de l'association des parcs et jardins de Bourgogne. Tour de guet du XIIIe siècle.  Le jardin est  restauré par les propriétaires actuels, monsieur et madame Bernard Bonoron, daprès un plan du XVIIIe siècle.","habitants":"Claude Bretagne\r\n        \"","divers":"Château de Beauregard.","gps":"","images":["../image/image_21/21_Beauregard_1.jpg","../image/image_21/21_Beauregard_2.jpg","../image/image_21/21_Beauregard_3.jpg","../image/image_21/21_Beauregard_4.jpg","../image/image_21/21_Beauregard_5.jpg"]},"Consult_chateau_formulaire9172":{"id":"Consult_chateau_formulaire9172","dept":"21","canton":"Montigny-sur-Aube","commune":"Belan-sur-Ources","nom":"Belan_Mosson","type":"Château","periode":"XIX","histoire":"BELAN-sur-Ources : Château du XIXe siècle, construit par le  baron d'Herlincourt pour sa petite fille Mlle de Maupas en cadeau de mariage  écuries, chenil, portail d'entrée du château, grille, pavillon de gardien, mur de clôture en demi-lune.                                                      \r\nDans les villages voisins Mosson château tour, et château de Courban,(voir article) ainsi que dans la commune de Prusly sur Ource château de Crépan transformé en hôtel restaurant.","architecture":"Belan sur Ources; Château du XIXe siècle, de forme rectangulaire à trois niveaux flanque de quatre tours carrées en angles surélevé par attiques, fronton sur façades principales.                                        Château de Crépan de forme rectangulaire à deux niveaux.                    Château de Mosson corps de logis rectangulaire à trois niveaux avec attiques toits à la Mansard et deux tours rondes et pavillons aux extrémités.","habitants":"Baron d'Herlincourt\r\n        \"","divers":"Château de Belan, de Mosson, de Prusly et de Crépan","gps":"","images":["../image/image_21/21_Belan_Mosson_1.jpg","../image/image_21/21_Belan_Mosson_2.jpg","../image/image_21/21_Belan_Mosson_3.jpg","../image/image_21/21_Belan_Mosson_4.jpg","../image/image_21/21_Belan_Mosson_5.jpg","../image/image_21/21_Belan_Mosson_6.jpg","../image/image_21/21_Belan_Mosson_7.jpg"]},"Consult_chateau_formulairea668":{"id":"Consult_chateau_formulairea668","dept":"21","canton":"Mirebeau","commune":"Belleneuve","nom":"Belleneuve","type":"Château","periode":"XV","histoire":"BELLENEUVE;  En 1449, Perrenot Berbisey, bourgeois de Dijon, acquit à Belleneuve une motte ceinturée de fossés. L'un de ses descendants, Thomas Berbisey, procureur au Parlement de Bourgogne, y rebâtit  en 1572 un château constitué d'un  donjon, une basse-cour et  un pont-levis donnant accès à une porterie. Après la mort du dernier des Berbisey, le château fut vendu en 1760, par ses héritiers, à Pierre Seguin, déjà propriétaire de La Motte d'Ahuy le Désert sur le territoire de Belleneuve, qui en confia la transformation, en 1762, à l'architecte Jean Antoine Caristie. Belleneuve  passa à sa fille Nicole, épouse de Vivant-Mathias Villedieu de Torcy. Le château appartenait depuis le milieu du XIXe siècle à la famille Chevreul qu'il réalisa en 1889 des travaux de restauration, par  l'architecte Oeschlin. Des travaux récents ont restitués l'état antérieur des toitures.   Aujourd'hui transformé en chambres d'hôtes.","architecture":"Belleneuve, bâtiments implantés à l'ouest du village, entre l'Albane et son affluent, le ruisseau de Charmey, accès au château par un pont dormant, logis de plan rectangulaire comprenant un sous-sol, rez-de-chaussée surélevé,  pavillons de plan carré à étage en angles, l'ensemble des toits vernissés. Des travaux récents ont restitués l'état antérieur des toitures.\r\nUn pavillon de chasse en pan de bois hourdé de brique sur soubassement en pierre, au nord ouest, grotte artificielle\r\n au nord, ferme du château à l'est accessible de la rue du château par un portail découvert, porte charretière en arc segmentaire accostée d'une porte piétonne entre la basse-cour et le château.","habitants":"Seigneur Bernard Barbisy\r\n        \"","divers":"Château de Belleneuve","gps":"","images":["../image/image_21/21_Belleneuve_1.jpg","../image/image_21/21_Belleneuve_2.jpg","../image/image_21/21_Belleneuve_3.jpg"]},"Consult_chateau_formulaire1d5f":{"id":"Consult_chateau_formulaire1d5f","dept":"21","canton":"Nuits-St-Georges","commune":"Broncourt-le-Bois","nom":"Bercheres","type":"Château","periode":"XV","histoire":"BERCHERE; A quelques kilomètres d'Agencourt, à Broncourt le Bois était au départ une simple maison seigneuriale au milieu du XVe siècle appartenant à la famille Le-Goux  de la Berchère, originaire de Nuits St-Georges. En 1634, Pierre Legault, premier président du parlement de Bourgogne, fait reconstruire le château.\r\nAu XVIIe siècle, le cardinal de Retz Jean-François Paul de Gondi, hérite du château puis le revend en 1644 au chevalier et premier président du parlement de Bourgogne, Pierre Legoux de la Berchère. Joseph Blancheton en est le dernier seigneur.  En 1738, la Berchère est vendue à la famille Joly de Bévy.  Aujourd'hui le château transformé en hôtel.","architecture":"La Berchère était au départ une simple maison seigneuriale presque entièrement reconstruit au XVIe siècle, corps de logis central  entouré de deux ailes en retour. Il est établi sur un terre-plein rectangulaire entouré de douves. L'aile  présente sur la cour  une façade ordonnancée  d'ordres superposés. La galerie du rez-de-chaussée  possède un plafond en pierre  partiellement décoré de caissons sculptés. La tour sud, de plan semi-circulaire, possède encore des ouvertures gothiques, un bel escalier en vis  et quelques vestiges témoignent d'un bâtiment médiéval. A l'intérieur une chapelle décorée de stucs fut aménagée au XVIIIe siècle. L'aile ouest a été reconstruite récemment  et l'aile Est est dotée d'une belle façade, ordonnancé et au rez-de-chaussée d'une galerie.","habitants":"Famille Le-Goux  de la Berchère\r\n        \"","divers":"Château de Berchères.","gps":"","images":["../image/image_21/21_Bercheres_1.jpg","../image/image_21/21_Bercheres_2.jpg","../image/image_21/21_Bercheres_3.jpg","../image/image_21/21_Bercheres_4.jpg","../image/image_21/21_Bercheres_5.jpg","../image/image_21/21_Bercheres_6.jpg","../image/image_21/21_Bercheres_7.jpg","../image/image_21/21_Bercheres_8.jpg"]},"Consult_chateau_formulaire9303":{"id":"Consult_chateau_formulaire9303","dept":"21","canton":"Jenlis","commune":"Bessey-les-Citeaux","nom":"Bessey","type":"Château","periode":"XVIII","histoire":"BESSEY les Citeaux,  s'élevait en 1502  le manoir d'Othon de Baissey.\r\nAu Moyen-Age, un descendant des Ducs de Bourgogne, qui était Abbé de Citeaux et comte de Baissey, fit construire son château de l'autre côté du parc, sur l'autre rive de la rivière \"la Vouge\". Ce comte de Baissey  n'a pas eu de descendant et cette construction abandonnée pendant deux siècles a été détruite par les eaux, le terrain étant très marécageux et dilapidée par des visiteurs indésirables.\r\nC'est au XVIIIe siècle que le seigneur des lieux, le capitaine de Laval, a reconstruit la bâtisse actuelle en utilisant les matériaux des anciens vestiges qui étaient récupérables. Mais cette fois, la construction a été réalisée sur vide sanitaire afin d'éviter la remontée des eaux.\r\nEn l'année 1730, le capitaine de Laval a cédé le château au sieur Clopin de Bessey, lequel, afin de se différencier de ses prédécesseurs, avait changé l'orthographe du nom.\r\nEn 1789, Jean Baptiste Clopin de Bessey embrassa les \"idées du jour\" et fut nommé juge de paix du canton d'Aiserey, et pour prouver sa foi révolutionnaire, choisi alors le prénom de \"Potiron\".\r\nLa demeure a ensuite appartenu de longues années à la comtesse de Falière et à sa famille, et a été acquise ensuite par la famille de madame Aubert en 1961.","architecture":"Bessey; est principalement le site actuel du château, a connu plusieurs constructions importantes depuis dix siècles environ.\r\nà l'emplacement du château actuel,  l'architecture du château se rapporte tout à fait au XVIIIe siècle. Il s'agit d'une belle bâtisse, aux multiples pièces, avec perrons, couverture d'ardoises, vaste corps de bâtiment encadré de deux retours prononcés, le tout dans un magnifique parc de cinq hectares arrosé par \"la Vouge\". De nombreux arbres sont tricentenaires.","habitants":"Capitaine de Laval\r\n        \"","divers":"Château de Bessey les Citeaux","gps":"","images":["../image/image_21/21_Bessey_1.jpg","../image/image_21/21_Bessey_2.jpg"]},"Consult_chateau_formulaire019f":{"id":"Consult_chateau_formulaire019f","dept":"21","canton":"Mirebeau","commune":"Beze","nom":"Beze_Noiron","type":"Château","periode":"XV","histoire":"BEZE, fief des rois de France. Le roi Charles IV de France mort sans héritier, Philippe VI de France et Edouard III d'Angleterre prétendent au trône. En 1125, la famille de Montsaugeon qui possédait la châtellenie de Mirebeau, mais qui n'avait plus d'héritier, céda ses droits au duc de Bourgogne Hugues II le Pacifique. En 1350, Jean II le Bon succède à son père Philippe VI.  En 1364, à Charles V de France . Ce nest quen 1369 que Du Guesclin parvient à sen débarrasser. En 1714, naissance de François Clément. Il est le fils du sieur Claude Blaise Clément, bailli des terres et des seigneuries dépendant de labbaye de Bèze et de demoiselle Didière Moniot.  Félix Adrien Kir, dit le chanoine Kir, affecté à Bèze en 1910. En 1914, il part en guerre pour rejoindre une unité médicale aux armées.","architecture":"Beze; Plusieurs châteaux dans cette vallée; Les vieilles fortifications sont devenues inefficaces. La pauvreté sinstalle.Sous l'impulsion de Simon de Torcenay, Abbé de Bèze, des fossés sont creusés avec douves et pont-levis. Les tours carrées sont remplacées par des tours rondes couronnées de mâchicoulis et de créneaux. Elles sont aménagées en prison et percées de meurtrières. Les vieux souterrains sont remis en état. Bèze est alors réputé invulnérable. Une garnison y réside en permanence et le guet est fait jour et nuit. De cette forteresse, il ne reste que deux des grosses tours dangle des remparts, la « tour dOysel » et la « tour de chaux ».  À Mirebeau, un château, duquel subsistent deux tours et une partie des murailles, ainsi que des traces de remparts de la ville, se situent le long de la Bèze. Cette ancienne tour datant du IXe siècle faisait partie des fortifications entourant le village au Moyen-Âge. Elle est presque totalement détruite. Elle est appelée tour des Francs parce quelle était occupée et défendue par des francs-tireurs.","habitants":"sieur Claude Blaise Clémen\r\n        \"","divers":"Château de Beze et la tour d'Oisel. De nombreux châteaux dans cette vallée tel que Blagny Noiron etc dont certains sont avec article.","gps":"","images":["../image/image_21/21_Beze_Noiron_1.jpg","../image/image_21/21_Beze_Noiron_2.jpg","../image/image_21/21_Beze_Noiron_3.jpg","../image/image_21/21_Beze_Noiron_4.jpg","../image/image_21/21_Beze_Noiron_5.jpg","../image/image_21/21_Beze_Noiron_6.jpg"]},"Consult_chateau_formulaire7131":{"id":"Consult_chateau_formulaire7131","dept":"21","canton":"Mirebeau","commune":"Beire-le-Châtel","nom":"Biere_Brognon","type":"Château","periode":"XVII","histoire":"BEIRE le CHATEL; l'origine remonte au début du XIIIe siècle, alors dotée d'une tour, datant de Guillaume de Vergy, seigneur de Mirebeau. Au début du XIVe siècle, la seigneurie appartenait à la famille de Prangey, lesquels la transmit aux Baudoncourt qui la conservère jusqu'à la fin du XVe siècle, elle fut acquise en 1678 par François Badoux, président de la chambre des comptes de Dijon. En 1698, à son décès, son fils revendit Beire fief qui passa par voie de succession, en 1791, à Étienne Le Belin, et en 1832, au baron Louis-Edouard de Salvaing de Boissieu, né à Beire en 1871, officier et homme politique français, qui fit rebâtir et décorer la chapelle en 1842. Vers 1880, ses descendants modifièrent le bâtiment principal, le château devenu propriété  de la commune.                Au cours de la période révolutionnaire de la Convention Nationale (1792-1795), la commune a porté le nom de Beire-le-Grand.  Lorsque les héritiers reprennent le château en 2002 en piteux état, durent le vendre à la société Saqqara qui le restaure en quatorze appartements de grand standing.                                            BROGNON. A 10 km de Dijon, et a quelques kilomètres de Bèire le Châtel  le Château de Brognon, construit en 1749 pour le premier président du parlement de Bourgogne au milieu d'un parc à l'anglaise de 50 hectares, est resté depuis ce temps dans la même famille.","architecture":"Beire le châtel, château ou maison-forte du XIIIe- XVe- XVIIe-XIXe siècle, inscription par arrêté du 9 novembre 1977 pour façades et toitures des deux pavillons d'entrée et de la partie Est du corps de bâtiment principal et de la tour-chapelle.                                \r\n   Ferme de la Chaume, ancien château XVIe siècle un donjon carré à cinq niveaux  accolé à une chapelle  du XVIIe siècle, le corps de logis rectangulaire à façade arrondie avec fronton à deux niveaux accolé aux extrémités de deux tours rondes crénelées intercalées de tourelles. Ses descendants, vers 1880, modifièrent le bâtiment principal, ajoutèrent deux tours rondes et deux tourelles, transformèrent les parties hautes de la tour carrée en séchoir  à houblon, comblèrent les fossés, encore en eau au XVIIIe siècle.  Le donjon aujourd'hui abrite des appartements et la petite tour est occupée par une chapelle. Brognon; corps de logis rectangulaire à deux niveaux et attiques fronton triangulaire sur avant-corps saillant en façades.","habitants":"Baron Louis-Edouard de Salvaing de Boissieu\r\n        \"","divers":"Château de Bière le Chatel et le manoir de Brognon","gps":"","images":["../image/image_21/21_Biere_Brognon_1.jpg","../image/image_21/21_Biere_Brognon_2.jpg","../image/image_21/21_Biere_Brognon_3.jpg","../image/image_21/21_Biere_Brognon_4.jpg","../image/image_21/21_Biere_Brognon_5.jpg","../image/image_21/21_Biere_Brognon_6.jpg","../image/image_21/21_Biere_Brognon_7.jpg","../image/image_21/21_Biere_Brognon_8.jpg"]},"Consult_chateau_formulairea2b6":{"id":"Consult_chateau_formulairea2b6","dept":"21","canton":"Précy-sous-Thil","commune":"Bierre-lès-Sémur","nom":"Bierre_les_Semur","type":"Château","periode":"XVIII","histoire":"BIERRE-lès-Semur; Les archives ayant disparu, il est impossible de préciser l'histoire de la construction de ce château,  élevé par Marc-Antoine II Chartraire de Montigny, trésorier général des Etats de Bourgogne de 1749.","architecture":"Bierre lès Semur;  la construction semble remonter aux années 1775-1785, beau et vaste château orné de bosquets, statues, pièces d'eau, jardin à l'anglaise, avec un parc immense, ménagerie, faisanderie, corps de logis à trois niveaux et attiques flanqué de chaque côté de pavillons carrés de mêmes niveaux.","habitants":"Marc-Antoine II Chartraire de Montigny\r\n        \"","divers":"Château de Biere lès Semur","gps":"","images":["../image/image_21/21_Bierre_les_Semur_1.jpg"]},"Consult_chateau_formulaire0c74":{"id":"Consult_chateau_formulaire0c74","dept":"21","canton":"Baigneux-les-Juifs","commune":"Billy-les-Chanceaux","nom":"Billy_les_Chanceaux","type":"Château","periode":"XVIII","histoire":"BILLY les Chanceaux, château bâti vers 1628 et reconstruit dans la deuxième moitié du XVIIIe siècle. Il fut remanié au XIXe siècle, médaillon avec monogramme sur la façade antérieure et le portail (couronne de laurier). Construction de la ferme de la fin du XVIIIe siècle avec des parties agricoles très remaniées ultérieurement, à l'exception de la grange.","architecture":"Billy les Chanceaux;  Corps de logis rectangulaire, très allongé à trois niveaux avec tour inférieur sur les extrémités.    A deux kilomètres le manoir d'Oigny château à deux étages carrés et étage de comble en moellons de calcaire enduit.","habitants":"\"","divers":"Château de Billy les Chanceaux et le manoir d'Oigny","gps":"","images":["../image/image_21/21_Billy_les_Chanceaux_1.jpg","../image/image_21/21_Billy_les_Chanceaux_2.jpg","../image/image_21/21_Billy_les_Chanceaux_3.jpg"]},"Consult_chateau_formulaire2863":{"id":"Consult_chateau_formulaire2863","dept":"21","canton":"Mirebeau","commune":"Blagny-sur-Vingeance","nom":"Blagny_Oisilly","type":"Château","periode":"XVIII","histoire":"BLAGNY sur Vingeanne, ancienne dépendance de l'abbaye de Bèze, le château de Blagny sur Vingeanne, propriété de la famille de Saulx en 1607, fut vraisemblablement détruit par l'armée de Gallas qui saccagea le village à plusieurs reprises, château reconstruit  au XVIIIe siècle. Dans la commune le château de Rigny transformé en hôtel restaurant                                    OISILLY; La commune était divisée en trois  seigneuries : Chamblan, Montarean et Ozilly, avec trois châteaux forts, détruits lors du passage des troupes du général Gallas. Elles furent par la suite réunies.\r\n Un certain frère Jean, Antoine de Bourbon, comte de Moret, 1607-1692, fils naturel de Henri IV et de Jacqueline de Breuil, a vécu quelque temps au XVIIe siècle dans un ermitage situé dans une caverne au milieu d'un bois dépendant du village d'Oisilly, où il forma 13 jeunes novices.","architecture":"Blagny sur Vingeanne, bâtiments implantés en bordure du village, au sud-est, sur trois côtés d'une cour rectangulaire ouverte sur la rue par un portail découvert en fer forgé, bâtiment d'habitation à l'arrière de la cour dans l'axe du portail, comprenant un rez-de-chaussée de plain-pied et un étage de comble, corps central à trois travées, en avancée, élévation postérieure identique, porte axiale en plein-cintre.    Oisilly; édifié au XVIIIe siècle, bâtiments des communs postérieurs à 1838, à l'exception du colombier  et de l'orangerie contemporains du château, aile gauche du logis reconstruite à l'identique après un incendie survenu en 1864. Château situé en bordure du village, au sud est, bâtiments d'habitation de plan en U implantés sur les trois côtés d'une cour carrée fermée sur la rue par une grille en fer forgé portail axial découvert, bâtiment  principal comprenant un rez-de-chaussée de plain pied sur cave et un étage carré, élévation antérieure à dix  travées, travées axiales couronnées d'un fronton cintré brisé avec horloge au tympan, entre deux travées à décors de bossages en table et balustrade.  L'aile gauche du château fut reconstruite suite à un incendie survenu en 1864.","habitants":"Famille de Saulx\r\n        \"","divers":"Château de Blagny et d'Oisilly","gps":"","images":["../image/image_21/21_Blagny_Oisilly_1.jpg","../image/image_21/21_Blagny_Oisilly_2.jpg","../image/image_21/21_Blagny_Oisilly_3.jpg","../image/image_21/21_Blagny_Oisilly_4.jpg","../image/image_21/21_Blagny_Oisilly_5.jpg"]},"Consult_chateau_formulaired387":{"id":"Consult_chateau_formulaired387","dept":"21","canton":"Sombernon","commune":"Blaisy-Haut et Bas","nom":"Blaisy","type":"Château-fort","periode":"X-XIV","histoire":"BLAISY-Bas ou Blaisy-la-Ville, les deux noms furent utilisés à une époque reculée. Le nom viendrait du mot celte Blays désignant le loup (lieu fréquenté par). Si le nom est cité dans l'histoire au IXe siècle, au XIVe siècle le village appartenait pour moitié aux Crecey, pour l'autre moitié aux Blaisy.                                                  BLAISY-HAUT ; Le premier château aurait été construit dès le Xe siècle à l'extrémité d'un ancien éperon barré. Il appartint à la famille de Blaisy jusqu'en 1508, date du mariage de Suzanne de Blaisy avec Christophe de Rochechouart. Au cours de cette période, il fut reconstruit entre 1470 et 1486 par Claude II de Blaisy.  En 1533, Gabrielle de Rochechouart l'apporta en dot à François Pot, puis en 1603, il fut saisi par Christophe Pot et adjugé à son créancier Jean Jacquot, receveur général des finances en Bourgogne, qui le laissa peu après à  sa fille, laquelle avait épousé Antoine Ier Joly, greffier en chef du parlement de Dijon. Antoine II Joly, président au grand conseil, acheva, entre 1679 et 1699 l'édification d'un nouveau château à l'emplacement de l'ancienne basse-cour et fit ériger la terre en marquisat en 1695. En 1782, lorsque Philiberte-Emilienne Joly de Blaisy s'y installa, le château était en mauvais état, elle le rendit à nouveau habitable et le confia à l'architecte Jean Antoine\r\n Caristie la reconstruction des deux ponts dormants. Les Joly de Blaisy s'éteignirent en la personne de Marie-Renée  mariée à Jean-Louis Remond de Montmort qui reçut le fief en 1787, mais il fut confisqué quelques années plus tard. Il fut sauvé  par Monsieur Rouget.","architecture":"Blaisy-Haut; Construction du XIIIe siècle  sur un éperon rocheux  dominant la vallée de Loze, les parties les plus anciennes des constructions actuelles datent de la fin du XVe siècle, et concernent l'enceinte crénelée, la tour porche, le corps de passage et une tourelle hexagonale. Ses constructions furent regroupées au XVIIe siècle autour de l'ancienne basse-cour, le logis au point le plus large de l'éperon tandis que l'arrière était plantée une allée d'arbres  qui devait aboutir au XVIIIe siècle à une salle de Jeu.","habitants":"Famille de Blaisy\r\n        \"","divers":"Château de Blaisy Haut","gps":"","images":["../image/image_21/21_Blaisy_1.jpg","../image/image_21/21_Blaisy_2.jpg","../image/image_21/21_Blaisy_3.jpg","../image/image_21/21_Blaisy_4.jpg"]},"Consult_chateau_formulaire79d7":{"id":"Consult_chateau_formulaire79d7","dept":"21","canton":"Semur-en-Auxois","commune":"Vic-le-Chassenay","nom":"Bourbilly","type":"Château","periode":"XIV","histoire":"BOURBILLY, au XIIIe siècle passa aux Thil et aux  Beaujeu, Marguerite de Beaujeu veuve de Jacques de Savoie, comte du Piemont qui  fit  achever en 1379 la construction,  au XIVe siècle connaît une  renaissance, en 1404 le fils de Marguerite de Beaujeu Louis de Savoie, prince d'Achaïe vend  le domaine à Pierre de la Trémoille qui passe ensuite aux comtes de Joigny et arrive en 1448 à Claude de Montagu qui le  transmet en 1467 à sa fille Jeanne-Françoise Frémiot, épouse d'Hugues de Rabutin. En 1592  cette demeure fut acquise par le baron de Chantal Christophe de Rabutin, ancêtre de la belle marquise,  châtelaine de Bourbilly , il a toujours été habité depuis sa construction, en 1603 la veuve rencontre François de Sales deviendra la Sainte-Jeanne de Chantal, le château passa à son fils Celse Benigne meurt peu après son mariage, sa fille n'est autre que la future madame de Sévigné.  Le château sera vendu en 1719 par la petite-fille madame de Simiane à Guy Chartraire de Saint-Aignan, succédé par son neveu  Guy de Ragny en 1732 qui terminera ses jours en prison, querelle entre voisins,  le château passe à un de ses cousins, puis acquis en 1795 par Augustin Pomme qui fit démolir le donjon et la tour carrée sur le centre de la façade ouest, changement de nouveau en 1814 Antoine Rigobert de Caux  l'acquiert et y installe un haras, mais n'habite pas le château transformé en ferme, sa fille épouse  Ernest de Franqueville, le château échoit à son petit-fils Charles de Franqueville  qui  réalisera  la restauration, passe  Jean Darcy et à son fils le colonel Roger Darcy toujours dans cette famille de la baronne Edouard de Crépy.","architecture":"Bourbilly; vers 1250 construction de la maison forte sur les terres de Bourbilly ce vénérable château est l'un des plus anciens de Bourgogne  les travaux de réhabilitations de lancienne maison forte, démantelée en 1793. sera amputé à la Révolution du pont levis et privé de ses fossés, en 1805 démolition du donjon et la tour carrée sur le centre de la façade ouest et restauration totale du château en 1867 à 1871 rajout d'un pavillon rectangulaire flanqué de quatre tours à toits coniques à l'emplacement du donjon. Après le violent incendie de 1952, la chapelle réhabilitée restera un intéressant   témoignage de notre époque. Elle accueille le \"Paradisus\", portraits de trente propriétaires peints par  le baron Edouard  de Crépy qui en est toujours propriétaire.              Château de Thost quadrilatère flanqué de tours rondes en angles.             Château de la Rochette corps de logis en L avec tour carré en angle intérieur.","habitants":"Jacques de Savoie\r\n        \"","divers":"Château des Bourbilly. Dans  la commune le château de la Rochette et à  deux kilomètre au sud le château de Thostes.","gps":"","images":["../image/image_21/21_Bourbilly_1.jpg","../image/image_21/21_Bourbilly_2.jpg","../image/image_21/21_Bourbilly_3.jpg","../image/image_21/21_Bourbilly_4.jpg","../image/image_21/21_Bourbilly_5.jpg","../image/image_21/21_Bourbilly_6.jpg","../image/image_21/21_Bourbilly_7.jpg","../image/image_21/21_Bourbilly_8.jpg"]},"Consult_chateau_formulairecf60":{"id":"Consult_chateau_formulairecf60","dept":"21","canton":"Venarey-les-Laumes","commune":"Boux-sous-Salmaise","nom":"Bouzot","type":"Château","periode":"XVI","histoire":"BOUZOT;  Partagée entre plusieurs seigneurs, parmi lesquels figurent, de 1470 à 1530, les Du Bois de Posanges, la terre semble avoir été unifiée vers 1530 par Claude de Damas de Villiers. Dès 1538, elle fut vendue à Philibert  Cothier qui la céda, en 1542, à Antoine d'Orge, seigneur de Villeberny. En 1580 on la retrouve entre les mains de  Pierre de Choiseul. En 1710 sur un certain Boucquin de Magny. passera ensuite à Jacques de Lestrade de la cousse seigneur  de Boux Pressilly, Borde, Bouzot et de la Tour-Charotte capitaine  dans le régiment des Tournon Poitou à son décès  en 1762 le fief passa à sa fille qui avait épousé Jacques de Poussy qui en devient propriétaire.","architecture":"Bouzot; Il n'est pas possible de savoir qui a construit, sans doute au milieu du XVIe siècle, corps de logis rectangulaire à deux niveaux et attiques face à  de grandes dépendances, l'insolite porte monumentale  du château de Bouzot.","habitants":"Claude de Damas de Villiers\r\n        \"","divers":"Dans la commune le château de Boux et de Bouzot avec porte monumentale.","gps":"","images":["../image/image_21/21_Bouzot_1.jpg","../image/image_21/21_Bouzot_2.jpg"]},"Consult_chateau_formulairea08d":{"id":"Consult_chateau_formulairea08d","dept":"21","canton":"Liernais","commune":"Brazey-en-Morvan","nom":"Brazey","type":"Château","periode":"XVI","histoire":"BRAZEY, En 1666, François René de Jaucourt dont la famille possédait la seigneurie de Brazey depuis le début  du XVIe siècle.  La Révolution a laissé des traces indélébiles sur l'édifice qui appartenait aux Comeau de Charny depuis 1768.  Le corps de logis central fut démoli et remplacé par des communs, au linteau de la porte est mentionnée la date de 1791. Du bâtiment originel ne fut conservée que la carcasse des deux ailes qui servaient d'exploitation agricole depuis la vente  par les Comeau de Charny en 1865. Après un siècle de transformations successives, seule l'aile droite a été restaurée en 1975 et 1976 par M et Mme Jules Roy qui furent propriétaires de 1974 à 1978. \r\nAu hameau de Montot , une belle maison bourgeoise a été construite en 1857, elle a appartenu à la famille de La Grange dont François, célèbre reporter animalier, repose au cimetière de Brazey.","architecture":"Brazey; Le château date de 1315. Reconstruit le château actuel sur les fondations du château médiéval qu'il avait fait détruire. Il a été restauré en 1666 par un bâtiment central et deux ailes en retour d'équerre qui délimitent une cour carrée, il était entouré de douves dont il ne reste que le fossé antérieur, les tours sur les angles externes des ailes  les échauguettes sur les angles postérieurs et le porche détruit en 1940 marquait le caractère défensif du  château, à une époque où les seigneurs protestants n'avaient pas oubliés les guerres de religion.  La construction est à un seul niveau,  elle se compose d'un rez-de-chaussée surmonté de combles élevés  qu'éclairent des lucarnes rectangulaires et circulaires, seule l'aile droite comporte un étage de soubassement voûté d'arêtes qui ouvre de plain-pied à l'est et abrite les cuisines, l'aménagement intérieur  a été remodelé au XVIIIe siècle ainsi qu'en témoignent les cheminées et leur trumeau. Il a été restauré en 1666. On peut voir encore les restes de l'enceinte fossoyée de l'ancien château fort.","habitants":"François René de Jaucourt \r\n        \"","divers":"Château de Brazey et de Montot","gps":"","images":["../image/image_21/21_Brazey_1.jpg","../image/image_21/21_Brazey_2.jpg","../image/image_21/21_Brazey_3.jpg","../image/image_21/21_Brazey_4.jpg"]},"Consult_chateau_formulaireca2a":{"id":"Consult_chateau_formulaireca2a","dept":"21","canton":"Dijon","commune":"Bressey-sur-Tille","nom":"Bressey","type":"Château","periode":"XVIII","histoire":"BRESSEY sur TILLE; Après avoir appartenu aux sires de Bressey, puis à la famille de Champlitte-Pontailler, les terres échoient, au milieu du XVIIIe siècle, à la famille Lemulier de Quercize, un de ses membres, Jean-François , conseiller honoraire au Parlement de Bourgogne, fait faire une première extension du château, d'un style Louis XIV, , qui réalisa l'unité du fief en 1755, agrandit un château.\r\nDe mai 1786 à août 1788, son fils Jean, fait appel à l'architecte Jean Caristie, qui double la largeur du château et le réoriente, en faisant ériger une nouvelle façade, de style néoclassique, en direction de Dijon.\r\nSous la Révolution, la famille émigre et le château est réquisitionné et mis en vente comme bien national. Cependant, les Lemulier parviennent à récupérer l'édifice et à le transmettre à leurs descendants. Jean Lemulier de Bressey, élu député de la noblesse  aux Etats Généraux de 1789, s'y est distingué pour avoir été l'un des rares députés, avec le comte de Lévis et Cazales, à s'opposer en juin 1790 à la disparition de la noblesse héréditaire mais surtout pour son engagement dans le comité sur la question de la traite  des noirs, l'opportunité  de son abolition  et ses conséquences, avec un succès  bien plus grand que le fameux Mirabeau sur le même sujet. Malgré l'émigration, et la vente des biens nationaux, les enfants de Lemulier de Bressey  ont pu reprendre leur maison qui s'est toujours transmise, depuis, par mariage aux marquis d'Agrain, aux barons de Rivière et  aux enfants de ces derniers de Boissieu, Dumas de Mascarel, Duguet et de Bouillé.","architecture":"Bressey. Le château du XVIIIe siècle de forme rectangulaire, suit une architecture classique. Son plan aurait été dessiné par Charles de Brosses, président du Parlement de Bourgogne. Les façades sont percées par deux rangées de grandes fenêtres à petits carreaux et une rangée de lucarnes, la toiture, peu pentue, est faite d'ardoise et cernée d'une corniche à balustres, l'entrée de l'allée de Dijon est flanquée d'un pavillon, jouxtant une grande grille de fer forgée et la clôture du parc, le jardin, fait à la française,\r\nDans le grand-salon est un ensemble de boiseries et de sculptures de la main de Jérôme Marlet, employé peu avant aux ornements du parlement de Bourgogne. Jean Lemulier de Bressey  qui doublera le château dans sa largeur  en le réorientant avec une nouvelle façade tournée vers Dijon, d'où le tracé d'un grand parc avec des allées cavalières, un jeu de canaux et des jardins de buis taillés.","habitants":"Jean Lemulier de Bressey\r\n        \"","divers":"Château de Bressey.","gps":"","images":["../image/image_21/21_Bressey_1.jpg","../image/image_21/21_Bressey_2.jpg","../image/image_21/21_Bressey_3.jpg"]},"Consult_chateau_formulaire12e7":{"id":"Consult_chateau_formulaire12e7","dept":"21","canton":"Genlis","commune":"Bretenière","nom":"Breteniere_Chazeuil","type":"Château","periode":"XVIII","histoire":"BRETENIERE; Dans la deuxième moitié du XVIIIe siècle, le nouveau propriétaire du domaine de Bretenière, Simon Ranfer,  rase la maison forte que défendait un double fossé, une porte barbacane et une grosse tour  carrée,  pour en faire une résidence de plaisance,  entourée d'espaces verts. Celle-ci est achevée en 1770. Au XIXe siècle, ses descendants doublent le bâtiment côté parc avec deux ailes en retour. Puis, vers 1840,  ils ajoutent  une salle en rotonde. Un logement de gardien  et une ferme sont également construits.                                                             \r\nNon loin de cette commune le château de  CHAZEUIL, construit au XIVe siècle, en ruine jusqu'au milieu du XXe siècle.","architecture":"Bretenière; C'est une ancienne maison-forte du XVIIIe siècle transformée en demeure de plaisance à partir de 1770. Le bâtiment est doublé côté parc avec deux ailes en retour, puis l'ajout d'une salle en rotonde vers 1840. Il comprend également un vestibule et un escalier d'honneur ornés de bas-reliefs. Au milieu du XIXe siècle, le parc est aménagé et une ferme de style néo-toscan est construite.\r\nLe château et ses dépendances, enclos, communs,  la ferme et le château de Bretenière sont accessibles par des grilles ouvrant sur une vaste cour.  Ensemble architectural composé  d'une part d'un château entouré de son parc à l'anglaise  et d'autre part une maison de gardien et   d'une ferme comportant plusieurs bâtiments.  La glacière du  château est conservée dans le parc.  Château de Chazeuil; corps de logis rectangulaire à quatre niveaux, toiture en croupe, accolé d'une tour carrée, parc limité d'un mur sur lequel se trouve une tour carrée style pigeonnier et d'une tour ronde en angle.","habitants":"Simon Ranfer\r\n        \"","divers":"Château de Bretenière et maison forte de Chazeuil","gps":"","images":["../image/image_21/21_Breteniere_Chazeuil_1.jpg","../image/image_21/21_Breteniere_Chazeuil_2.jpg","../image/image_21/21_Breteniere_Chazeuil_3.jpg","../image/image_21/21_Breteniere_Chazeuil_4.jpg","../image/image_21/21_Breteniere_Chazeuil_5.jpg","../image/image_21/21_Breteniere_Chazeuil_6.jpg","../image/image_21/21_Breteniere_Chazeuil_7.jpg","../image/image_21/21_Breteniere_Chazeuil_8.jpg"]},"Consult_chateau_formulaire84a9":{"id":"Consult_chateau_formulaire84a9","dept":"21","canton":"Gevrey-Chambertin","commune":"Brochon","nom":"Brochon","type":"Château","periode":"XIX","histoire":"BROCHON; Au XIVe siècle, Philippe le Hardi, premier duc Valois de Bourgogne et fils du roi de France Jean II le Bon, fait don à l'ordre des Chartreux d'un domaine situé à Brochon. Il s'agissait de bâtiments renforcés, ainsi que d'autres constructions, cernés par les vignes.   Au XVIIe siècle, des terres de ce domaine, le \"Crais-Billon\", sont achetées par Melchior Jolyot, originaire de Nuits-Saint-Georges, greffier en chef de la chambre des comptes de Bourgogne et de Bresse, et père de Prosper Jolyot de Crébillon, dit \"Crébillon père\". Le nom de ce petit  fief  est transformé en Crébillon ; il serait une des sources de la revendication nobiliaire des Jolyot. En 1804, Étienne Liégeard, membre d'une vieille famille dijonnaise proche des milieux bonapartistes, fait l'acquisition d'une partie du domaine. En 1843, son fils, Jean-Baptiste Liégeard (1811-1887), futur maire de Dijon, agrandit celui-ci. Finalement, en 1879, le petit-fils d'Étienne, Stéphen Liégeard (1830-1925), ancien homme politique, écrivain et poète en vue, complète l'ensemble. Fortuné, il rachète le reste des terres à la famille Darcy. Il y fait bâtir le château de style néo-renaissance de 1895 à 1899. Le château ne resta pas longtemps dans la famille, car Gaston,  le fils de Stephen, célibataire et son neveu, seul héritier, le refusa. Au décès de son fils Gaston Liégeard mort en 1953  L'Etat hérita du domaine et le lycée fu
