ulien avec Jacques de Thésut,  réunit entre leurs mains la totalité de la terre à la fin du XVIe siècle, et y bâtit un manoir qui fut rasé lorsque  Guillaume de Thésut  lui substitua en 1769, une nouvelle demeure. Il y installa une bibliothèque très riche,   avec une collection archéologique, un cabinet d'histoire naturelle et des tableaux, confisqué et vidé durant la période révolutionnaire, le château de Verrey passa ensuite entre les mains de plusieurs propriétaires qui en  firent disparaître les jardins.","architecture":"Verrey; maison forte  quadrilatère flanqué de tours rondes. Le château de forme rectangulaire à deux niveaux avant corps saillant surmonté d'un fronton triangulaire.","habitants":"Guillaume de Thésut\r\n        \"","divers":"Château et maison forte à Verrey","gps":"","images":["../image/image_21/21_Verrey_1.jpg","../image/image_21/21_Verrey_2.jpg","../image/image_21/21_Verrey_3.jpg","../image/image_21/21_Verrey_4.jpg"]},"Consult_chateau_formulaire6e33":{"id":"Consult_chateau_formulaire6e33","dept":"21","canton":"Mirebeau","commune":"Biere-le-Châtel","nom":"Vesvrotte","type":"Château","periode":"XVII","histoire":"VESVROTTE, château construit au XVIIe siècle, colombier construit en 1732, date portée dans un cartouche, au-dessus de la porte haute au sud, chapelle construite au XVIIIe siècle, partie antérieure du logis rebâtie en 1842 dans le style Troubadour par Jean-Philippe Suisse pour le comte de Pierre Richard de Vesvrotte dont les  armoiries figurent au fronton de l'orangerie. En 1967, le logis inhabité, possédait toujours des cheminées. La façade  sculptée par Louis Joseph Moreau, démontée et vendue aux enchères.","architecture":"Vesvrotte,  du XIIIe siècle, remanié au cours des siècle inscription par arrêté du 9 novembre 1977 pour façades et toitures des deux pavillons d'entrée et de la partie Est du corps de bâtiment principal et de la tour-chapelle, corps de logis rectangulaire à deux niveaux toiture en croupe fronton central sur la façade portes et fenêtres du rez-de-chaussée à fronton arrondies, le bâtiment possède deux pavillons saillants sur les côtés  à toits pyramidal et échauguettes en angles de chaque pavillon.","habitants":"comte Pierre Richard de Vesvrotte\r\n        \"","divers":"Château de Vesvrotte","gps":"","images":["../image/image_21/21_Vesvrotte_1.jpg","../image/image_21/21_Vesvrotte_2.jpg","../image/image_21/21_Vesvrotte_3.jpg"]},"Consult_chateau_formulaire7b77":{"id":"Consult_chateau_formulaire7b77","dept":"21","canton":"Liernais","commune":"Vianges","nom":"Vianges","type":"Maison forte","periode":"XVIII","histoire":"VIANGES, Charles-Laure de Mac-Mahon, deuxième marquis d'Éguilly en 1775, marquis de Vianges, Saint-Max en Meurthe-et-Moselle était un général puis homme politique français des XVIIIe et XIXe siècle.  Le château existerait depuis le XIVe siècle, construit par la famille de Vianges, mais on ne connaît pas sa date précise. Puis passa aux mains de la famille de Cussigny, Philipe Saladin de Cussigny, s'engagea dans d'importantes transformations du domaine seigneurial au XVIIe siècle. En 1704 le domaine fut acquis par Claude de  Morey qui le changea en marquisat,en 1723, et en 1755 la famille de Mac Mahon en est propriétaire et c'est le duc de Magenta qui possède le château de Vianges. Charles-Laure de Mac-Mahon, en 1775  deuxième marquis d'Éguilly et de Vianges, Saint-Max,  était un général, puis homme politique français des XVIIIe et XIXe siècle.                                   A quelques kilomètres au sud à Manlay l'église ancien château féodal.","architecture":"Vianges; Maison forte du XVIIIe siècle en forme de L à deux niveaux avec une tourelle centrale en façade.                                                Manlay, il reste de la féodalité les deux tours rondes d'entrées et le donjon arasé qui sert de clocher","habitants":"famille de Mac Mahon\r\n        \"","divers":"Gentihommière de Vianges","gps":"","images":["../image/image_21/21_Vianges_1.jpg","../image/image_21/21_Vianges_2.jpg","../image/image_21/21_Vianges_3.jpg","../image/image_21/21_Vianges_4.jpg"]},"Consult_chateau_formulaireecd5-2":{"id":"Consult_chateau_formulaireecd5-2","dept":"21","canton":"Précy-sous-Thil","commune":"Précy-sous-Thil","nom":"Vic_sous_Thil","type":"Forteresse","periode":"XIII","histoire":"VIC-sous-Thil; La lignée des Thil apparaît en 1007, le seigneur Miles de Thil fonde le prieuré de Précy sous Thil. Le prestige de la famille s'accroit avec le seigneur Guy de Thil à la fin du XIIe siècle. Il siégeait à la cour d'Eudes III en 1193. La seigneurie  de Thil connait son apogée avec Jean II de Thil qui succéde à son père en 1319. En 1340, le seigneur Jean de Thil est nommé connétable et chef des armées de Eudes IV duc de Bourgogne. Jean de Thil meurt en 1354 laissant une fille et un fils, Jean III de Thil. La lignée des Thil s'éteint  en 1507 avec la mort du dernier descendant mâle. Aux Thil succéderont  les Sayve en 1628, famille de noblesse récente qui abandonnera Thil aux environs de 1640 lorsque Richelieu ordonnera le démantèlement de Thil. Il se bornera à détruire le pont-Levis.                                                                    D'autres château dans le canton voir articles.","architecture":"Vic-sous-Thil, considéré comme lune des plus anciennes forteresses de France, est situé à la limite du Morvan et de lAuxois, sur une colline de 500 m daltitude environ.le donjon du 14e siècle, ses murs ont une épaisseur de 2,20 mètres. Il est constitué de pierres de taille. Il a fallu détruire les bâtiments de la haute cour pour le construire. Au premier étage nous y trouvons une magnifique chambre avec une très belle cheminée, deux  fenêtres avec leurs bancs de pierre.","habitants":"Jean de Thil                                                                           \r\nFamille de Drée\r\n        \"","divers":"Vestiges du château féodal, donjon de l'Espionne d'Auxois et maison forte de Brouillard","gps":"","images":["../image/image_21/21_Vic_sous_Thil_1.jpg","../image/image_21/21_Vic_sous_Thil_2.jpg","../image/image_21/21_Vic_sous_Thil_3.jpg","../image/image_21/21_Vic_sous_Thil_4.jpg","../image/image_21/21_Vic_sous_Thil_5.jpg","../image/image_21/21_Vic_sous_Thil_6.jpg"]},"Consult_chateau_formulaire3fd8":{"id":"Consult_chateau_formulaire3fd8","dept":"21","canton":"Baigneux-les-Juifs","commune":"Villaines-en-Duesmois","nom":"Villaines","type":"Vestiges","periode":"XIII","histoire":"VILLAINES; La première mention du château remonte à 1002, dans une charte de l'abbaye de Flavigny. A partir de 1253, Hugues IV, duc de Bourgogne, le reconstruit. Ensuite le château passe de mains en mains, dont celles du prince de Condé. Ce fut la résidence d'été des ducs de Bourgogne. Il a été démantelé entre  1709 et 1710 et ensuite vendu comme carrière de pierres.","architecture":"Villaines en Duesmois; reconstruit au XIIIe siècle, seule les quatre tours rondes subsistent, non remanié de ce château. En 1360, renforcement de la défense du château à l'arrivée des grandes compagnies. Entre 1373 et 1390, construction d'une chapelle, de logements et ouvertures de fenêtres flamandes,  Il reste   quatre puissantes tours qui laissent imaginer la disposition des lieux et la toute puissance des seigneurs de l'époque. Aux minces archères, on a préféré au XVe siècle des canonnières aménagées à la base des tours, lorsque fut répandu l'usage de la poudre.","habitants":"Hugues IV, duc de Bourgogne\r\n        \"","divers":"Ruines féodales de Chalvosson et château ducal","gps":"","images":["../image/image_21/21_Villaines_1.jpg","../image/image_21/21_Villaines_2.jpg","../image/image_21/21_Villaines_3.jpg","../image/image_21/21_Villaines_4.jpg","../image/image_21/21_Villaines_5.jpg","../image/image_21/21_Villaines_6.jpg"]},"Consult_chateau_formulairec7f0":{"id":"Consult_chateau_formulairec7f0","dept":"21","canton":"Saulieu","commune":"Villargoix","nom":"Villargoix","type":"Château","periode":"XV","histoire":"VILLARGOIX, l'ancien château de Villargoix a été fondé par la famille de Mineure  au XIIIe siècle. Cette terre est passé par mariage à la famille de Sivry, qui a fait construire l'actuel château à la fin du XVe siècle ou  au début du XVIe siècle.  Il est resté dans la famille jusqu'en 1550, puis un bourgeois de Saulieu l'a acheté, et il est revenu dans la famille  par alliance d' Antoinette de La Plume, veuve de Guy de Sivry en 1621.  Elle a fait hérité son petit-fils, Roger de Balathier en 1663, la propriété est restée aux mains des descendants jusque fin XVIIIe siècle. En 1788 le château appartenait à Regnault César Louis de Choiseul, duc de Praslin, pair de France, maréchal aux armées du Roi,  ambassadeur à Naples. Roger, marquis de Balathier-Lantage, chevalier de Saint-Jean de Jérusalem, né  en 1787, décédé en 1864, à Villargoix. Marié en 1813, à Paris, avec Rose de Thieffries-Beauvois, née en 1794, Berchères sur Vesgre Eure,  décédée en 1881, au château de Villargoix.","architecture":"Villargoix; en forme de U du XVe siècle à deux niveaux et attiques, tourelle en angle intérieur et tour ronde sur ailes prolongé par des tourelles carrées à l'entrée.","habitants":"famille de Sivry\r\n        \"","divers":"Château de Villargoix","gps":"","images":["../image/image_21/21_Villargoix_1.jpg","../image/image_21/21_Villargoix_2.jpg"]},"Consult_chateau_formulaire73d6":{"id":"Consult_chateau_formulaire73d6","dept":"21","canton":"Précy-sous-Thil","commune":"Dompière-en-Morvan","nom":"Villars_Fontaine","type":"Château","periode":"XV","histoire":"VILLARS, seigneurie de Courcelles-lès-Semur réalisé au XVe siècle pour doter la fille naturelle de Jean de La Trémouille, le domaine de Villars acquit son autonomie réelle à la fin du XVIIe siècle,  seulement quand, après de multiples tribulations, il fut attribué à Marie-Jacqueline Desgeorges qui épousa   François Damoiseau. Vendu à plusieurs reprises  au cours du XVIIIe siècle, il fut finalement acheté, en 1767,  par François de Chastenay qui entreprit de doter d'une modeste demeure seigneuriale, ce petit fief, il se ruina  et dut le vendre dès 1791, à Marie-Claude Champion, ancien maire d'Avallon. Le domaine changea de mains  à plusieurs reprises au cours du XIXe siècle, avant d'être acquis en 1921 par René de Burtel de Chassey.","architecture":"Villars du XVIIIe siècle, façades et toitures en croupes, escalier principal avec sa rampe en fer forgé, antichambre et salon au rez-de-chaussée.","habitants":"Jean de La Trémouille\r\n        \"","divers":"Château de Villars-Fontaine","gps":"","images":["../image/image_21/21_Villars_Fontaine_1.jpg","../image/image_21/21_Villars_Fontaine_2.jpg","../image/image_21/21_Villars_Fontaine_3.jpg"]},"Consult_chateau_formulaire43c8":{"id":"Consult_chateau_formulaire43c8","dept":"21","canton":"Vitteaux","commune":"Villeberny","nom":"Villeberny","type":"Château","periode":"XVI","histoire":"VILLEBERNY, le château est sans doute celui de la famille d'Orge qu'ils possédèrent dès le début du XVe siècle, une partie de la seigneurie et qui semble être parvenue à réunir entre ses mains la totalité de celle ci à la fin du XVIe siècle.  Dernière de sa lignée, Edmée d'Orge, apporta Villeberny et son château à peine achevé  à son mari Gabriel de  Saint-Belin en 1600. Leurs descendants en restèrent maîtres jusqu'à la fin de l'ancien régime.                         A quelques kilomètres au nord ouest un château à Villy en Auxois, corps de logis rectangulaire flanqué de deux pavillons aux extrémitées, l'ensemble à deux niveaux.","architecture":"Villeberny, le château comporte un corps de logis rectangulaire et une aile en retour d'équerre, trois tours carrées à chaînages d'angle, flanquent l'extrémité sud du corps de logis et les deux angles extérieurs de l'aile, le  corps de logis a été remanié aux XVIIIe et XIXe siècle, la cour est limitée à l'Est par un mur percé d'une porte cochère en plein cintre qui la sépare des communs.","habitants":"Gabriel de  Saint-Belin\r\n        \"","divers":"Château de Villeberny et château à Villy en Auxois","gps":"","images":["../image/image_21/21_Villeberny_1.jpg","../image/image_21/21_Villeberny_2.jpg","../image/image_21/21_Villeberny_3.jpg"]},"Consult_chateau_formulaireadd7":{"id":"Consult_chateau_formulaireadd7","dept":"21","canton":"Nuits-St-Georges","commune":"Villers-la-Faye","nom":"Villers_la_Faye","type":"Château","periode":"XV","histoire":"VILLERS la Faye, il  entre dans les ordres en 1782, sans enthousiasme, car on ne lui laisse pas le choix : il est issu d'une famille nombreuse et c'est la seule position qu'on lui offre. Jusqu'en 1790 il est maître de l'Oratoire du comte d'Artois, futur Charles X, avec lequel il a de bonnes relations.\r\n Sous la Révolution, il est obligé d'émigrer et il en profite pour se défroquer sans regret pour l'état ecclésiastique. À son retour, il réussit à récupérer ses biens confisqués sous la Révolution par une faveur du ministre de la justice. Mais comme il est devenu une personne non accepté à Mâcon, il s'installe à l'Isle-Adam où il achète le 8 juin 1810 une propriété voisine du domaine de Cassan. Il y rencontre le comte Michel Regnaud de Saint-Jean d'Angély, alors propriétaire de l'abbaye du Val, qui lui accorde son soutien politique.\r\nDans la commune de Villiers la Faye deux châteaux viticoles le domaine de Bernardot et de Villerot.","architecture":"Villers la Faye dans le village, vestige du château du XVe siècle ,une tour et une magnifique cour intérieure avec son puits.","habitants":"Famille de Villers la Faye\r\n        \"","divers":"Château de Villers la Faye","gps":"","images":["../image/image_21/21_Villers_la_Faye_1.jpg","../image/image_21/21_Villers_la_Faye_2.jpg","../image/image_21/21_Villers_la_Faye_3.jpg"]},"Consult_chateau_formulaire35a3":{"id":"Consult_chateau_formulaire35a3","dept":"21","canton":"Châtillon-sur-Seine","commune":"Villiers-le-Duc","nom":"Villiers_le_Duc","type":"Château","periode":"XVII","histoire":"VILLIERS le DUC; L'ancien château de Villiers a été édifié en 1153 par le duc Eudes III, mais il fut brûlé et endommagé en 1477, il n'en n'est resté qu'une partie. Construite en 1622 par Pierre des Barres, conseiller d'état et président du parlement de Bourgogne En 1624, la seigneurie que   Pierre des Barres acheta, président au  parlement de Bourgogne sur un fief hérité de son grand-père paternel Marc Fyot, seigneur de Villiers-le-Duc. Au décès de son fils, Bernard des Barres, le fief est passé sous le contrôle de sa  belle-fille, Antoinette de Beauclerc, qui l'avait racheté entre temps à Louise d'Orléans en 1676, et c'est à cette  époque qu'elle a fait construire  le château actuel. Puis par mariage  il est passé à la famille de Beauffremont  et vendu en 1720 à Guillaume Le Brun de Dinteville, ensuite en 1748 à Pierre Morel de Bréviande, dont les descendants le possèdent toujours. Famille Morel de Villiers, c'est Claude Morel appartenant à une ancienne famille de Châtillon-sur-Seine, qui, anobli en 1755 par la charge de président trésorier de France en la généralité de Bourgogne et de Bresse, a acquis les seigneuries de Villiers-le-Duc et de Vanvey, ses descendants sont toujours propriétaires du château.","architecture":"Villiers le Duc, cette demeure est construite en 1622, corps de logis rectangulaire à deux niveaux flanqué de deux pavillons saillants  sur les côtés, dépendances à l'arrière.","habitants":"Pierre des Barres\r\n        \"","divers":"Château de Villier le Duc","gps":"","images":["../image/image_21/21_Villiers_le_duc_1.jpg","../image/image_21/21_Villiers_le_duc_2.jpg","../image/image_21/21_Villiers_le_duc_3.jpg"]},"Consult_chateau_formulaire7991":{"id":"Consult_chateau_formulaire7991","dept":"21","canton":"Venarey-les-Laumes","commune":"Pouillenay","nom":"Villiers_Vilotte","type":"Château","periode":"XV","histoire":"VILLIERS, le fief d'Athie Villiers est né du rassemblement d'une série de fiefs minuscules réalisé par Guillaume, Alexandre et Claude de Damas, de 1448 à 1544. Le château fut construit par eux sur un emplacement vierge de toute construction  entre 1482 et 1554. Dès la fin du XVIe siècle, il ne fut plus habité que par des fermiers  des seigneurs successifs, les Senailly-Damas, ensuite les Fuligny-Damas, qui le vendirent en 1767 à Philibert Guenichot de Nogent. Au XIXe siècle, ont disparu  les ailes sud et est, la tour circulaire  qui flanquait l'angle qu'elles formaient et la chapelle qui se trouvait à quelques mètres à l'est.","architecture":"Villiers-Vilotte; château quadrangulaire à deux niveaux flanqué en façade de deux tours carrées  et deux pavillons saillants sur parc.","habitants":"Famille de Damas\r\n        \"","divers":"Château de Villiers et de Vilotte sur Ource","gps":"","images":["../image/image_21/21_Villiers_Vilotte_1.jpg","../image/image_21/21_Villiers_Vilotte_2.jpg","../image/image_21/21_Villiers_Vilotte_3.jpg"]},"Consult_chateau_formulaire0214":{"id":"Consult_chateau_formulaire0214","dept":"21","canton":"Vitteaux","commune":"Vitteaux","nom":"Vitteaux","type":"Château","periode":"XV","histoire":"VITTEAUX,  Antoine du Prat, Baron de Vitteaux, ligueur contre le Roi Henri IV il fit agrandir le château et les remparts de la ville, il ne fit sa soumission quen traitant avec Henri IV de souverain à souverain. Hubert Languet, diplomate français protestant né en 1518 dans l'actuel maison Bélime  qui fut édifiée au XIIe siècle par Mathilde de Courtenay, châtelaine de Vitteaux. Remarquable pour ses fenêtres géminées à tympans trilobés.\r\nVILLEFERRY, au nord de Vitteaux Maison forte quadrilatére flanqué de tours rondes en angles et un donjon à Arnay sous Vitteaux.","architecture":"Vitteaux conserve des vestiges de fortifications, témoins dun passé belliqueux, et de belles maisons médiévales et Renaissance, groupées autour des halles du XIIIe siècle, des fortifications de cette époque consistent ici en un fossé creusé le long d'un mur de pierres double dont l'espace entre les deux rangs était comblé avec de la terre, le mur est flanqué de quatre tour, la tour de Guet, construite sur une ancienne tour du château  tour de la prison, elle offre un superbe panorama sur Vitteaux et léperon barré de Myard, les fossés du château creusés dans le roc qui peuvent faire jusqu'à 6 mètres de profondeur, l'ancienne entrée du château dont ne subsiste plus que les soubassements des deux tours rondes qui encadraient un pont-levis.\r\nTour octogonale de la place du 8 Mai 1945, cette tourelle descalier desservait des maisons médiévales aujourdhui disparues.","habitants":"Hubert Languet\r\n        \"","divers":"Vestiges des fortifications de vitteaux et les restes du château des ducs","gps":"","images":["../image/image_21/21_Vitteaux_1.jpg","../image/image_21/21_Vitteaux_2.jpg","../image/image_21/21_Vitteaux_3.jpg","../image/image_21/21_Vitteaux_4.jpg","../image/image_21/21_Vitteaux_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','21 — Côte-d'Or'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
