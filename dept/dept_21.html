pelle l'autre la cuisine et un cellier voûté, un corps de logis est venu s'ajouter au XVIIIe siècle au donjon, deux tours rondes  du XVIe siècle dont une sert toujours d'habitation.","habitants":"Louis Bichot Morel de Corberon\r\n        \"","divers":"Château de Quemigny","gps":"","images":["../image/image_21/21_Quemigny_1.jpg","../image/image_21/21_Quemigny_2.jpg","../image/image_21/21_Quemigny_3.jpg","../image/image_21/21_Quemigny_4.jpg","../image/image_21/21_Quemigny_5.jpg"]},"Consult_chateau_formulaired486-2":{"id":"Consult_chateau_formulaired486-2","dept":"21","canton":"Montbard","commune":"Quincerot","nom":"Quincerot","type":"Château","periode":"XVII","histoire":"QINCEROT, Cité au Xe siècle par une villa gallo-romaine et  maison forte au XIIIe siècle fut complétée par des enceintes, propriété des Chastellux seigneurie légué à des vassaux familiaux, les Quincy, les sires de Bierry, les cadets de la maison de  Noyers au XIVe siècle aux Blaisy, aux Seigny et à la Perrière, aux seigneurs du Brouillard qui en deviennent propriétaire, passera aux Aulnay, l'épouse de Robert d'Aulnay, Martine Stuart lègue le fief à une nièce de son mari Madeleine d'Aulnay épouse  d'Antoine de Veilhan, écuyer, seigneur de Pannecors et baron de Digoine, leur  fille par alliance l'apporte  à Gabriel d'Haranguier, seigneur d'Henneville. Remanié par Roland d'Haranguier, seigneur  d'Henneville et gouverneur du château de Semur, capitaine  pour Henri IV de la forteresse de Semur. émigrent et biens confisqués à la Révolution. Racheté à l'état de ruine en 1871 par Alphonse de Quincerot général de cavalerie, sa famille y réside encore.","architecture":"Qincerot, gardienne de la vallée de l'Armançon, de l'an mille à la Révolution, la maison forte du XIIIe siècle fut remanié, enceinte quadrangulaire cantonnée de quatre tours carrées en angles dont-une ronde, corps de logis accolé au donjon qui remanié au XVI et XVIIe siècle, cour haute  et basse, escalier d'honneur, cours ornées de jardins de topiaires.","habitants":"Alphonse de Quincerot\r\n        \"","divers":"Château de Quincerot","gps":"","images":["../image/image_21/21_Quincerot_1.jpg","../image/image_21/21_Quincerot_2.jpg","../image/image_21/21_Quincerot_3.jpg"]},"Consult_chateau_formulaire935a":{"id":"Consult_chateau_formulaire935a","dept":"21","canton":"Nuits-St-Georges","commune":"Quincey","nom":"Quincey","type":"Château","periode":"XVII","histoire":"QUINCEY le Vicomte, cité en 1255 ce château médiéval  appartenait à ses origines aux Seigneurs de Quincey dont le fief relevait directement des ducs de Bourgogne. En partie ruiné sous Charles VII, puis rasé sous Louis XI, il est rebâti en 1487 par le seigneur dÉguilly et de Grosbois.  Au XVIIe siècle, le château reconstruit après lincendie de 1572 échoit à Claude-Léonor Damas au marquis de Thianges, puis au duc de Mortemart.  Le château  est cédé en 1706 à Antoine Cortois baron d'Artignat, seigneur de Carnailles, Jambles, Pressigny et autres lieux dont le fils conseiller au parlement,  Après lincendie de 1707, Antoine Cortois fit reconstruire le château  sur les mêmes fondations après la mort  de Claude-Antoine Cortois le château est en indivision entre ses deux fils  Barthélémy et Antoine ce dernier au retour d'immigration vend Quincey en 1794 à Bernard Damotte receveur général des finances le passe à sa fille qui a épousé le baron Lejeas, en 1863 vendu à monsieur Esdouhard  puis  vendu en 1904 à un industriel Jean-Baptiste Rollet qui le revend à la comtesse de Simony. Après tout ces  propriétaires la famille Coignard-Dollinger le racheta en 1995 qui ont su le restaurer à maintes reprises.","architecture":"Quincey; château reconstruit  du XVIIIe siècle a un long et riche passé, qui remonte au XIIIe siècle il fut remanié au cours des ans sa reconstruction se limite par trois corps de logis, dont un le central rectangulaire à deux niveaux et attiques flanqué de chaque côté de pavillons  de même hauteur coiffés de toits brisés.                           Le parc, autrefois aménagé par Le Nôtre a été transformé en parc à langlaise.","habitants":"Claude Léonor Damas\r\n        \"","divers":"Château de Quincey ancienne maison forte du XVe siècle","gps":"","images":["../image/image_21/21_Quincey_1.jpg","../image/image_21/21_Quincey_2.jpg","../image/image_21/21_Quincey_3.jpg","../image/image_21/21_Quincey_4.jpg","../image/image_21/21_Quincey_5.jpg"]},"Consult_chateau_formulaireac5f":{"id":"Consult_chateau_formulaireac5f","dept":"21","canton":"Saulieu","commune":"La Roche-en-Brenil","nom":"Roche_en_Brenil","type":"Château","periode":"XVI","histoire":"ROCHE en BRENIL.  Au XIIe siècle  le domaine appartenait en 1287 à Guy de la Roche de Breny puis passa au Dyo Palatin baron puis marquis de Montpeyroux-Bourbon que sa descendance firent construire le château actuel à la fin du XVIe siècle, le dernier marquis de Montperoux lieutenant  général meurt sans enfant en 1714 le conserveront pendant quatre siècles, donnèrent au château l'aspect actuel,  le dernier marquis de Montperroux, lieutenant général meurt sans enfant, sa soeur est héritière, madame d'Anlezy  vendit le domaine à Guy Sallier, doyen du grand conseil, le gardèrent quatre générations, il fut acquis en 1841 par  Charles, Forbes, comte de Montalembert (1810-1870), maître décole et pair de France né au lendemain de la Révolution Française, Charles de Montalembert lutta toute sa vie pour la défense des libertés civiles, politiques et religieuses, fervent défenseur du régime parlementaire, il siège tout dabord à la cour des Pairs, puis à lassemblée Nationale comme élu du département du Doubs.  Membre de lAcadémie Française, il laisse une uvre importante faite de nombreux discours politiques, une vie de sainte Élisabeth de Hongrie écrite à 23 ans, une histoire des Moines dOccident, et une abondante correspondance échangées avec des personnalités marquantes de son temps tels que Balzac, Michelet, Victor Hugo, Lamartine. Yves Afonso acteur français né en 1944 à Saulieu, y a passé son enfance. Le château appartient, aujourdhui encore, à lun des descendants de Montalenbert.","architecture":"Le château de La Roche-en-Brenil, bâti au XIIe siècle, a longtemps été une forteresse ; reconstruit  au XVIe siècle remanié au XVIIIe siècle, il prenait la suite dune tour de défense beaucoup plus ancienne située au nord-est en contrebas du parc, composé dun logis principal et de quatre tours reliées entre elles par dépaisses et hautes murailles, il était protégé par ses douves. On y entrait par un pont-levis situé à lentrée Nord de la cour, proche du donjon., les nécessités de la défense ayant disparu, le château devient une résidence dagrément, la tour Nord et une partie des murs sont alors abattus, ouvrant ainsi à la vue sur lAuxois. On perce les façades de larges fenêtres, un sacellum (petit sanctuaire) est accolé à la façade principale et de nouveaux bâtiments, moins solennels, sont construits à louest, appuyés sur le mur denceinte, le pont dormant, à larrière du château.\r\n En 1841, Charles de Montalembert sauve le château de La Roche de la démolition en le rachetant à des marchants de biens qui projettent de le détruire pour en faire une carrière de pierres. Il restaure le château et crée le parc, dit à langlaise.","habitants":"Baron  Dyo Palatin\r\n        \"","divers":"Ruines féodales du château de la Roche en Brenil et de Montalembert","gps":"","images":["../image/image_21/21_Roche_en_Brenil_1.jpg","../image/image_21/21_Roche_en_Brenil_2.jpg","../image/image_21/21_Roche_en_Brenil_3.jpg","../image/image_21/21_Roche_en_Brenil_4.jpg","../image/image_21/21_Roche_en_Brenil_5.jpg","../image/image_21/21_Roche_en_Brenil_6.jpg"]},"Consult_chateau_formulairee1cc":{"id":"Consult_chateau_formulairee1cc","dept":"21","canton":"Aignay-le-Duc","commune":"Rochefort-sur-Brevon","nom":"Rochefort-Brevon","type":"Château","periode":"XIX","histoire":"ROCHEFORT-BREVON, son existence est attestée en 1235,  il appartenait alors au sire du Puiset, personnage dont les descendants prirent  au XIVe siècle le nom de Rochefort. Il passa par mariage, au début du XVIe siècle, aux Chandio  qui le revendirent en 1556 à Denis de Gellan. Antoine de Gellan, en 1598, le légua à Louise de Moléon, épouse de Joachim de Chastenay, les Chastenay en furent maîtres jusqu'en 1721,  une première vente le mit alors entre les mains de François de Lieutain, une seconde, en 1724, entre celles d'Emiland Chartraire de Romilly. Peu après  cette vente, vers 1730, un incendie le détruisit. Les Chartraire, qui le conservèrent   jusqu'à la fin du XVIIIe siècle, ne le rebâtirent pas. Vers 1820, on édifia, à son emplacement une maison de deux étages. Le domaine échut ensuite aux familles Bazile, Barrachin et, enfin, à la famille  de Froissard de Broissia.                                     BROISSIA. En 1888, le comte de Broissia confia à l'architecte parisien Sanson le soin de construire, sur une arête rocheuse voisine, une vaste demeure complétée en 1896 par des écuries, un jardin en terrasse, une orangerie et un parc.","architecture":"Rochefort-Brevon, château primitif était situé à l'est du château actuel, sur un petit éperon rocheux qui domine l'église et l'étang oriental, l'ancien château des comtes de Rochefort ayant brûlé en 1730, il ne reste plus que le colombier. Au début du XlXe siècle on édifia au même emplacement dominant l'étang un petit château qui passe pour avoir été transporté pierre par pierre depuis le val des Choues ou était la maison prieurale. Le domaine échut alors  à des maitres de forges les Bazile . Ce qui reste des anciennes constructions du Comte de Rochefort. L'ensemble des châteaux, du parc et des étangs a été inscrit en 1943 parmi les sites protégés.                                                                         \r\n Château de Broissia; corps de logis rectangulaire à deux niveaux et attiques flanqué de deux pavillons de même niveau.","habitants":"Famille Chartraire\r\n        \"","divers":"Château de Rochefort sur Bevron et de Broissia","gps":"","images":["../image/image_21/21_Rochefort_Brevon_1.jpg","../image/image_21/21_Rochefort_Brevon_2.jpg","../image/image_21/21_Rochefort_Brevon_3.jpg","../image/image_21/21_Rochefort_Brevon_4.jpg","../image/image_21/21_Rochefort_Brevon_5.jpg","../image/image_21/21_Rochefort_Brevon_6.jpg","../image/image_21/21_Rochefort_Brevon_7.jpg","../image/image_21/21_Rochefort_Brevon_8.jpg"]},"Consult_chateau_formulaire146f":{"id":"Consult_chateau_formulaire146f","dept":"21","canton":"Montbard","commune":"Asnières-en-Montagne","nom":"Rochefort_Asnieres","type":"Vestiges","periode":"XII","histoire":"ROCHEFORT, ce château mentionné, dès le XIIe siècle, en 1229 aux seigneur de Rochefort, passera sous linfluence des comtes de Nevers, des comtes de Tonnerre, du duc de Bourgogne et du Roi de France. Acheté en 1485 par Jacques Coictier, chambellan du Roi Louis XI, qui donne sa forme actuelle au château. En 1638, le domaine passe aux mains de Louis de Pernes, puis à Denis Languet,  procureur général du parlement de Dijon, la famille de la Guiche l'achète en 1661, lors de la Révolution, voit le château nationalisé il est obligée d'émigrer, leur sera restitué à leur retour à la restauration. Aux XVIIe et XVIIIe siècle, le château devient un lieu de plaisance, et de nouvelles ouvertures sont percées pour donner de la lumière, une terrasse est aménagée autour du logis seigneurial avec elle un jardin à la française vient agrémenter le tout. Au XVIIe siècle, le bâtiment d'entrée est modifié et transformé en  ferme, le pont-levis laisse place à un pont dormant. Depuis 2002, lassociation \"les Clefs de Rochefort\" semploie à sa sauvegarde et à sa restauration.","architecture":"Rochefort, cité dès le XIIe siècle, situé sur un éperon rocheux, il est formé de deux parties, le logis seigneurial et les communs. Plusieurs forteresses se sont succéder avant le château actuel construit entre la fin du Moyen-Âge et la Renaissance (1480-1520).  sur les vestiges d'un château féodal.\r\nCest à la fois un château de défense (fossé, pont-levis, canonnières, tours) et un château de plaisance. Son architecture reflète sa situation au carrefour de plusieurs territoires historiques. Le début du XIXe siècle, marque le point de départ du démantèlement du château, en effet à partir des années 1806-1807, le château est vidé de ses meubles, boiseries, fenêtres et de ses toitures. La toiture d'une des tours a servi à couvrir une partie du château de Nuits-sur-Armançon et la tour sud-ouest aurait servi  comme remploi dans le couvent des Ursulines de Montbard. et en  2002 avec la création de l'association des \"Clefs de Rochefort\" pour la sauvegarde du château qui signe un bail avec la famille de Laguiche.","habitants":"seigneur de Rochefort\r\n        \"","divers":"Vestiges du fort féodal de Rochefort","gps":"","images":["../image/image_21/21_Rochefort_Asnieres_1.jpg","../image/image_21/21_Rochefort_Asnieres_2.jpg","../image/image_21/21_Rochefort_Asnieres_3.jpg","../image/image_21/21_Rochefort_Asnieres_4.jpg","../image/image_21/21_Rochefort_Asnieres_5.jpg","../image/image_21/21_Rochefort_Asnieres_6.jpg","../image/image_21/21_Rochefort_Asnieres_7.jpg","../image/image_21/21_Rochefort_Asnieres_8.jpg"]},"Consult_chateau_formulaire93f6":{"id":"Consult_chateau_formulaire93f6","dept":"21","canton":"Nolay","commune":"Rochepot","nom":"Rochepot","type":"Forteresse","periode":"XVI","histoire":"ROCHEPOT, du seigneur de Montagu Alexandre de Bourgogne (1170-1205) fils du duc Hugues III de Bourgogne  En 1403 de retour de croisades, le seigneur Régnier Pot,  chambellan du duc Philippe II de Bourgogne et chevaliers de la Toison d'Or achète le château, alors nommé « château de La Roche Nolay » et lui donne son nom puis le transmet à son fils le seigneur Jacques Pot qui le transmet à son tour à son fils le seigneur Philippe Pot. En 1530 le maréchal de France Anne de Montmorency qui possède plus de 130 châteaux, en devient propriétaire qui passe à la famille de Silly par alliance qui le garderont jusqu'en 1640 passe ensuite  par héritage au cardinal de Retz Jean-François Paul de Gondi hérite du château puis le revend en 1644 au chevalier et premier président du parlement de Bourgogne Pierre Legoux de la Berchère. jusqu'en 1751, puis la seigneurie érigée en comté pour Joseph-Philibert Blancheton en est le dernier seigneur.\r\nConfisqué  à la Révolution Française le château renommé château de La Roche Fidèle, est déclaré bien national puis est en partie démantelé par des démolisseurs. Privé de son donjon, le laisse à l'abandon, le domaine passe de main en main, et en 1893 Cécile Carnot épouse du président de la République Sadi Carnot achète les ruines et les offres à son fils aîné, le colonel dinfanterie Sadi Carnot (1865-1948) qui entreprend durant 25 ans une importante restauration historique méticuleuse dans lesprit du XVe siècle, aujourd'hui propriété  de monsieur  Malinoski Ukrainien qui l'acquit à la famille Sadi Carnot en 2018, mais le laisse à l'abandon, dommage espérons que l'état le prenne en charge.\r\nMOLINOT: à quelques kilomètre de Rochepot château construit en 1346  et attesté en 1348 dans une reprise de fief par Jean de Frolois, seigneur du lieu.","architecture":"Le château de la Rochepot cité en 1180 est une forteresse  construite sur un éperon rocheux  sur les bases d'une maison forte incendié  au XIIIe siècle, remplacé par un château fort de style néogothique-bourguignon remanié au XVe siècle, rajout d'une grosse tour ronde entreprend de nombreux travaux dont un puits de soixante-dix mètres de profondeur toujours visible,  A la Révolution perd sa tour, puis entièrement restauré au XIXe siècle, avec tuiles vernissées.                                                                               Molinot, il ne subsiste qu'une tour d'angle, construction de l'aile des communs  reconstruction de la partie supérieure  de la tour transformée en colombier  dans la première moitié  du XVIIe siècle. Corps de   logis  du XIVe siècle, le château fut  démantelé vers 1760; dans le parc il reste un  colombier, des communs,  une écurie et un fenil le tout entouré d'une enceinte avec un bel ouvrage d'entrée.","habitants":"seigneur Philippe Pot\r\n        \r\n        \"","divers":"Château de Rochepot et de Molinot","gps":"","images":["../image/image_21/21_Rochepot_1.jpg","../image/image_21/21_Rochepot_2.jpg","../image/image_21/21_Rochepot_3.jpg","../image/image_21/21_Rochepot_4.jpg","../image/image_21/21_Rochepot_5.jpg","../image/image_21/21_Rochepot_6.jpg","../image/image_21/21_Rochepot_7.jpg"]},"Consult_chateau_formulaire9c14-2":{"id":"Consult_chateau_formulaire9c14-2","dept":"21","canton":"Châtillon-sur-Seine","commune":"Brémur-et-Vaurois","nom":"Rocheprise_Aisey","type":"Château","periode":"XVII","histoire":"ROCHEPRISE; Château construit  au XVe siècle quand la seigneurie de Rocheprise fut constituée par  la famille de Martigny sur les terres de la seigneurie de Brémur qui appartenait aux ducs de Bourgogne depuis 1337  transmis aux Pradines, aux Martigny puis aux Agey et  en 1551,  mise en place d'un pont-levis en même temps  que de petits fossés sont creusés et en 1613,  Louis XIII autorise Melchior d'Agey à conserver le caractère défensif du château, passera aux Sommyère, puis aux Legrand et à François de Ligny, époux de Jeanne Bart, puis passe à Pierre Hilaire Debruyère, lieutenant général du bailliage et trésorier de France dont le fils sera maire de Chatillon sur Seine et député de la Côte d'Or, le château se trouva pendant une longue période à l'abandon et fut acquis par monsieur Clery, son gendre  le colonel Moret  fait bâtir la partie  donnant sur la vallée et restaure l'ensemble du bâtiment, le château passe à Jules Moret de Rocheprise, gendre de monsieur Jacques Bollinger fondateur de la maison de champagne de ce nom  et depuis toujours dans sa descendance.","architecture":"Rocheprise, cet édifice est situé à flanc de coteaux, dominant la Seine sa construction  d'architecture fortifiée date du  XVe siècle  et une reconstruction du corps de logis , ouvrage d'entrée remanié au   XVIIe siècle. A la fin du XIXe siècle,  construction d'un château néo- gothique,  sur les ruines du château fort, la partie la plus ancienne se trouve  au côté opposé de la vallée flanquée de deux petites tours rondes en angles à son centre une tour porche coiffée d'un toit en pavillon,  une cour intérieure,  le corps de logis reconstruit au XIXe siècle  sa façade domine la vallée de la Seine inclut deux anciennes tours, l'une carrée l'autre de plan circulaire, les bâtiments qu'elles encadrent s'ordonnent autour d'un étroit pavillon central en saillie, la partie ancienne de la forteresse est la porte d'entrée sont bien conservée.","habitants":"Pierre-Hilaire Debruyère  Charles de Saulx\r\n        \"","divers":"Château de Rocheprise à Aisey","gps":"","images":["../image/image_21/21_Rocheprise_Aisey_1.jpg","../image/image_21/21_Rocheprise_Aisey_2.jpg","../image/image_21/21_Rocheprise_Aisey_3.jpg","../image/image_21/21_Rocheprise_Aisey_4.jpg","../image/image_21/21_Rocheprise_Aisey_5.jpg","../image/image_21/21_Rocheprise_Aisey_6.jpg","../image/image_21/21_Rocheprise_Aisey_7.jpg"]},"Consult_chateau_formulaire62aa-2":{"id":"Consult_chateau_formulaire62aa-2","dept":"21","canton":"Fontaine-Française","commune":"St-Maurice-de-Vingeanne","nom":"Romagne","type":"Commanderie","periode":"XV","histoire":"ROMAGNE, en 1144, Jean de Courchamp fait une donation de terres. En 1191, lors de la troisième croisade, au siège de Saint-Jean-dAcre, Guy de Vergy donne  aux frères de la milice du Temple de la Romagne, pour la rédemption de son âme et de celle de ses parents, une portion de terre quil possédait près dAutrey-lès-Gray, avec des pâturages et des bois. En 1227, cest la dame Agnès de Saint-Maurice qui donne aux frères, avec laccord de ses enfants, Jacques, Laurent et Elisabeth, le four et le moulin du village. La Romagne prend une part importante dans l'implantation templière en Franche-Comté. En 1309, pendant le procès, c'est Regnaut Mignart de Mussy, qui donne au gouvernement les biens du Temple en la baillie de Bures et de la Romagne qui gère le domaine.\r\n À la disparition des Templiers, la Romagne devient une commanderie de l'ordre des chevaliers de Saint-Jean de Jérusalem, elle est remanié et fortifié à la fin du XVe siècle par le commandeur Pierre de Bosredon. Aujourd'hui transformé en chambres d'hôtes par la famille Quenot.","architecture":"ROMAGNE; Au bord de la Vingeanne, commanderie à Romagne du XIIe siècle avec pont-levis porte à deux tours rondes à niveaux différents, remanié au XVIe siècle, construit dans un style d'époque  corps de logis rectangulaire à deux niveaux flanqué d'une tour ronde sur un angle,  Il ne reste rien de la période templière.  Lancien château  fait lobjet dun classement au titre des monuments historiques depuis 1962.","habitants":"Regnaut Mignart de Mussy\r\n        \"","divers":"Commanderie de Romagne devenue château","gps":"","images":["../image/image_21/21_Romagne_1.jpg","../image/image_21/21_Romagne_2.jpg","../image/image_21/21_Romagne_3.jpg","../image/image_21/21_Romagne_4.jpg","../image/image_21/21_Romagne_5.jpg"]},"Consult_chateau_formulaire1d24":{"id":"Consult_chateau_formulaire1d24","dept":"21","canton":"Sombernon","commune":"Grobois-en-Montagne","nom":"Rose_Grosbois","type":"Château","periode":"XVI","histoire":"ROSE-GROBOIS; Les bâtiments les plus anciens auraient été bâtis au XVIe siècle,  à l'emplacement d'une maison forte qui avait appartenu aux Vienne, aux Bauffremont puis à Claude d'Eguilly, par Etienne   Bernardon, conseiller au parlement de Dijon, qui possédait la terre en 1580. Dans leur prolongement, son petit-fils, Nicolas Perreney, président au parlement  de Dijon, édifia vers 1700 le château Rose qui tire son  nom de la couleur du crépi qui en recouvre les murs. Le dernier Perreney, Claude-Irénée, fit au milieu du  XVIIIe siècle transformer les communs pour abriter la bibliothèque du procureur au parlement, Louis Quarré de Quintin, dont il avait hérité et qu'il continua d'enrichir jusqu'à sa mort survenue en 1840. Ni lui ni son père n'émigrèrent, aussi purent-ils conserver la totalité de leurs biens. Le château rose fut restauré en 1835,  puis à la fin du XIXe siècle, Jeanne d'Harcourt, comtesse de La Tour du Pin, fit élever une aile en retour d'équerre d'esprit néo-gothique.","architecture":"Rose-Grobois à l'origine maison forte,  ensemble de bâtiment  dont la couleur du crépi est rose d'où le nom; corps de logis rectangulaire avec fronton plein cintre.","habitants":"Nicolas Perreney\r\n        \"","divers":"Château de Grosbois dit le château rose","gps":"","images":["../image/image_21/21_Rose_Grobois_1.jpg","../image/image_21/21_Rose_Grobois_2.jpg"]},"Consult_chateau_formulaire183e-3":{"id":"Consult_chateau_formulaire183e-3","dept":"21","canton":"Fontaine-Française","commune":"St-Seine-sur-Vingeanne","nom":"Rosieres","type":"Forteresse","periode":"XVI","histoire":"ROSIERES, au XIe siècle siège d'un domaine rural, de la famille d'Autrey, vassal des ducs de Bourgogne, passera en 1294 à Regaud de Saint-Seine chevalier issu de la famille de Beaumont en 1321  Pierre de St-Seine construit la maison forte qui restera dans cette famille jusqu'au XVIe siècle, qui passera à Claude de Faucher écuyer, seigneur de Savoyeul et de Lenoncourt à ce passage cède Rosière à Arnouldt   de Grey écuyer seigneur de Couchey,  en 1562  passe à Humbert de Haraucourt chevalier seigneur de Saint-Seine, passe ensuite à Jean de Baron  écuyer, seigneur d'Atticourt qui par alliance sa fille le passe à Pierre de Sacquenay qui le cède à Louis de Audebert. En 1636, le château fut incendié par les armées de  Gallas. Il fut alors reconstruit par Jean Maillard, conseiller au parlement de Dijon. Au XVIIe siècle par héritage passe à Claude-Bernard de Maillard,et  par donation en 1728 à Jean Verchère écuyer ce dernier le cède à Jean Chauteau, écuyer secrétaire du Roi, en 1752 à un parent de Maillard, Benigne le Gouz seigneur de St-Seine président au parlement de Bourgogne, ces derniers le conserveront jusqu'en 1980, acquis par la famille Bergerot leur fils Bertrand en hérite en 1985, le restaure et en 1992 le transforme en chambres d'hôtes.","architecture":"Rosières, situé sur les coteaux qui dominent la vallée de la Vingeanne, entouré des bâtiments d'exploitation agricole, le château est une ancienne forteresse construite en 1321. fortifié a été conçu pour protéger la frontière entre la Bourgogne et la Franche-Comté  pour surveiller la voie qui reliait labbaye de Bèze au Comté. De construction massive de plan rectangulaire aux épaisses murailles, avec trois échauguettes aux angles, une seule subsiste, avec des fossés qui existe encore. Les derniers vestiges  de cette propriété militaire sont le donjon du XIVe siècle de quatre étages, 19 mètres de haut rectangulaire couronné de mâchicoulis et  d'un chemin de ronde en encorbellement, accolé d'un pavillon d'habitation construit au XVIIe siècle, la majeure partie de l'enceinte, le pont-levis supprimé ont été détruit au XIXe siècle. Il ne reste plus que les deux tours nord du château du XVIe siècle qui fut brûlé par les armées de Gallas en 1636. Il est reconstruit sous sa forme actuelle au XVIIIe siècle.","habitants":"Humbert de Haraucourt\r\n        \"","divers":"Forteresse de Rosières","gps":"","images":["../image/image_21/21_Rosieres_1.jpg","../image/image_21/21_Rosieres_2.jpg","../image/image_21/21_Rosieres_3.jpg","../image/image_21/21_Rosieres_4.jpg","../image/image_21/21_Rosieres_5.jpg","../image/image_21/21_Rosieres_6.jpg","../image/image_21/21_Rosieres_7.jpg","../image/image_21/21_Rosieres_8.jpg"]},"Consult_chateau_formulaire69cd":{"id":"Consult_chateau_formulaire69cd","dept":"21","canton":"Arnay-le-Duc","commune":"Clomot","nom":"Rouset_Clomot","type":"Château","periode":"XIV","histoire":"ROUSSET, à la fin du  XIVe siècle Jehan de Roussay originaire d'Arconcey devenu chambellan du duc d'Orléans, fait construire une maison forte à laquelle il donne son nom, il s'agissait d'une résidence de plaisance en même temps siège d'une très vaste exploitation agricole. En effet les villages d'Essey, d'Arconcey, d'Allerey, de Mouillon, d'Avincey et de Chatellenot dépendent de cette seigneurie qui est érigée en comté. Au milieu du XVe siècle Roussay passa à Jean de Massily, et au début du XVIe siècle, à Hugues du Bois. Après des successions difficiles, Roussay échoit à la fin du XVIe siècle à la puissante famille de Damas qui possédait une grande partie de l'Auxois. Le château passe par succession, en 1625, entre les mains de Jean de Villers la Faye qui épouse en 1626 Madeleine de Bourbon-Busset de la puissante famille de Bourbon. Il restaure alors le Roussay dans l'état où il est actuellement en se servant des pierres des ruines du vieux château de Buxillon.  Depuis, la famille de Villers la Faye, de très vieille noblesse d'épée, marque de son empreinte la commune. Le  dernier marquis de Villers la Faye, Raoul, mort en 1936  fut maire de Clomot pendant 50 ans. Aujourd'hui propriété d'Antonin Guyon.","architecture":"Rousset, château construit au XVe siècle  en deux édifices distincts se terminant chacun par une imposante tour carrée, à l'origine formait un quadrilatère, grille d' entrée, écuries et maison du gardien, façades et toitures des granges et remises et du logis du corps de garde et de la poterne d' entrée, glacière, il reste dans la commune les vestiges d'un troisième château enceinte et tour.","habitants":"Jean de Massily                                                                        famille de Damas \r\n        \"","divers":"Château de Rousset et tour de Clomot","gps":"","images":["../image/image_21/21_Rousset_Clomot_1.jpg","../image/image_21/21_Rousset_Clomot_2.jpg"]},"Consult_chateau_formulaire8397":{"id":"Consult_chateau_formulaire8397","dept":"21","canton":"Vitteaux","commune":"Saffres","nom":"Saffres","type":"Maison forte","periode":"XVI","histoire":"SAFFRES; le nom de Saffres provient  du nom de \"Cinq-Freux\"  famille seigneuriale du XIe siècle, cité en 1160 par l'alliance du seigneur de Saffres  qui passera par héritage et alliance jusqu'en 1400 et toujours par alliance  passa à Antoine de Saigny qui épousa Isabelle de Saffres, dans cette famille jusqu'en 1533, aux  Cléron par Marie de Saigny épousa Othenin de Cléron, par alliance le château restera dans cette famille  jusqu'en 1616, passera ensuite par vente aux Robelin et en 1714 par alliance aux Lanquet et par cession en 1751 aux d'Andelot.","architecture":"Saffres, Maison forte quadrangulaire à deux niveaux  flanqué de quatre tours rondes.","habitants":"seigneur de Saffres\r\n        \"","divers":"Maison forte de Saffres","gps":"","images":["../image/image_21/21_Saffres_1.jpg"]},"Consult_chateau_formulaireba22":{"id":"Consult_chateau_formulaireba22","dept":"21","canton":"Venarey-les-Laumes","commune":"Salmaise","nom":"Salmaise","type":"Forteresse","periode":"XIV","histoire":"SALMAISE, du XIIe siècle par les sires de Mont-St-Jean.  En 1331, Etienne de  Mont Saint- Jean, qui s'était rebellé contre le duc de Bourgogne Hugues IV, dut la lui céder. Les ducs firent de Salmaise le chef lieu d'une châtellenie et améliorèrent considérablement le château.","architecture":"Salmaise, c'est un ancien lieu de défense dont le nom viendrait de l'installation, au temps de l'empereur Constantin,  appartenant à une peuplade de la vallée du Danube,  il y avait une forteresse dès le Xe siècle. Elle fut reconstruite, au XIIe siècle, l'actuel propriétaire a dégagé ce qui restait des murailles et restauré une tourelle d'escalier, un logis.","habitants":"Maréchal Philippe de Hochberg \r\n        \"","divers":"Château de Salmaise","gps":"","images":["../image/image_21/21_Salmaise_1.jpg","../image/image_21/21_Salmaise_2.jpg","../image/image_21/21_Salmaise_3.jpg","../image/image_21/21_Salmaise_4.jpg"]},"Consult_chateau_formulaire9462":{"id":"Consult_chateau_formulaire9462","dept":"21","canton":"Nolay","commune":"Santenay","nom":"Santenay","type":"Château","periode":"XIV","histoire":"SANTENAY; la forteresse  appartenait  à Philippe le Hardi, fils du Roi de France Jean le Bon et premier Valois, duc de la Grande Bourgogne  (1342-1404), c'est pourquoi on l'appelle couramment château Philippe le Hardi. Son mariage avec Marguerite de Flandre  permit à la Bourgogne de s'étendre au nord avec l'actuelle Belgique et Hollande apportant la richesse liée à l'activité maritime commerciale importante de cette dernière. Santenay appartenait en 1483 à Guillaume de Sercey puis il est passé entre de multiples propriétaires. La terre est érigée en marquisat par les Legoux en 1644.  En 1739, le château est devenu la propriété de la famille Parigot qui a entreprit des travaux de restauration, et  par mariage  il est passé dans la famille de Drée, qui en 1919 a vendu ses domaines de Santenay. Aujourd'hui il est une société d'exploitation viticole.","architecture":"Santenay; Sur un coteau de vignobles dans le village de Santenay, se dresse le château majestueuse demeure seigneuriale des IXe, XIIe, XVIe siècles, façades et toitures de l'aile Est et de l'annexe qui la prolonge et du colombier.                                                            Les châteaux du Crée de Renault et du Haut style moderne du XXe siècle. Celui de Philippe le Hardi dit du Haut du XVe siècle corps de logis rectangulaire à trois niveaux  accolé d'un donjon à quatre niveaux.","habitants":"Philippe le Hardi\r\n        \"","divers":"Château de Santenay et dans la commune le château  de Crée, de Renault et du Haut.","gps":"","images":["../image/image_21/21_Santenay_1.jpg","../image/image_21/21_Santenay_2.jpg","../image/image_21/21_Santenay_3.jpg","../image/image_21/21_Santenay_4.jpg","../image/image_21/21_Santenay_5.jpg","../image/image_21/21_Santenay_6.jpg"]},"Consult_chateau_formulaire867f":{"id":"Consult_chateau_formulaire867f","dept":"21","canton":"Saulieu","commune":"Saulieu","nom":"Saulieu","type":"Château","periode":"XVI","histoire":"SAULIEU, aux  XIIIe siècle, la famille féodale de Saulieu, vassal des évêques d'Autun, dirige la ville, Guillaume I vers 1147 chevalier, Guillaume II vers 1198 chevalier, seigneur de Montbron, vicomte de Saulieu, Geoffroy vers 1252  chevalier, vicomte  de Saulieu, puis Guillaume III vers 1276 chevalier, vicomte  de Saulieu. L'unique fille de Guillaume III, dernière représentante de la branche aînée des vicomtes, épouse Ponce de Trechery la  vend en 1288. En 1359, pendant la guerre de cent ans, la ville fut brûlée par les troupes anglaises.","architecture":"Saulieu,  Sa réputation hôtelière et gastronomique, illustrée au plus haut niveau par Alexandre Dumaine puis Bernard Loiseau. La bourgade a une basilique du XIIe siècle. réputée pour ses chapiteaux, son musée. On y découvre une tour vestige des fortifications du XIVe siècle.","habitants":"marquis de Montpeyroux\r\n        \"","divers":"Vestiges de remparts, tour d'Auxois, de Saulx Tavannes et porte Nôtre-Dame à Saulieu","gps":"","images":["../image/image_21/21_Saulieu_1.jpg","../image/image_21/21_Saulieu_2.jpg","../image/image_21/21_Saulieu_3.jpg","../image/image_21/21_Saulieu_4.jpg"]},"Consult_chateau_formulairecadf":{"id":"Consult_chateau_formulairecadf","dept":"21","canton":"Gevrey-Chambertin","commune":"Saulon-la-Rue","nom":"Saulon","type":"Château","periode":"XVII","histoire":"SAULON-la-Rue, en 1488, Charles VIII l'érigea en comté avec droits seigneuriaux, sentence du Bailli de Dijon qui maintient à monsieur Bonffal, avocat du Roi au parlement, Seigneur de Saulon, en 1538  Pierre Bonffal, écuyer, Seigneur de Saulon, donne à bail le moulin du château à monsieur Boichot, en 1651  à M Pierre-François-Bernard Legrand chevalier président au parlement, comte de Saulon.\r\nEn 1775 au Comte de Perrigny à cause de sa seigneurie le comte de Saulon la Rue, en 1776, Antoine Cagne comte de Perrigny,  seigneur de Saulon la Rue, en 1793  vend  lensemble de la propriété, provenant de lémigré  Anne de Clermont-Perrigny dit Montoison, la propriété a été fractionnée en 178 lots vendus séparément.\r\nEn 1795, achat par monsieur Claude Tiffet, propriétaire à Saulon-la-Rue de la plus grande partie de lancienne propriété de lémigré Clermont-Perrigny.","architecture":"Saulon-la-Rue, château du XIV-XVIIe siècle  et dépendance consistant en un corps de logis, appentis, buanderie, chambre à four , deux pavillons d'hébergement, cours, tous les bâtiments que nous trouvons tout autour du château existaient déjà en 1643. En 1656  incendie du château.\r\nDeux grands bâtiments, l'un à gauche, l'autre à droite, nommés, écuries, deux pavillons devant le château.","habitants":"Seigneur de Saulon\r\n        \"","divers":"Château de Saulon","gps":"","images":["../image/image_21/21_Saulon_1.jpg","../image/image_21/21_Saulon_2.jpg","../image/image_21/21_Saulon_3.jpg","../image/image_21/21_Saulon_4.jpg"]},"Consult_chateau_formulaire95f6":{"id":"Consult_chateau_formulaire95f6","dept":"21","canton":"Beaune","commune":"Savigny-les-Beaune","nom":"Savigny les Beaune","type":"Château","periode":"XVI","histoire":"SAVIGNY; Bâti vers 1340 par Jean de Frolois, maréchal de Bourgogne,  Jean Bouhier  en 1635, restera dans cette famille  jusqu'en 1689, son fils Bénigne  en 1671 et marque son passage en faisant construire le \"Petit Château\". Jean Bouhier, entrera à l'Académie Française en 1727. Après la mort de Charles le Téméraire, le seigneur de Savigny rallia la cause de Marie de Bourgogne.  C'est dans ce château que la duchesse du Maine fut exilé par le régent. En 1689, à la famille De Migieu, puis par alliance au général comte de la Loyère et à ses descendants. Son fils, Comte de la Loyère, dont le petit-fils, Joseph de Pesquidoux, l'académicien naquit à Savigny en 1869, fut président du comité viticulture de la Côte d'Or de 1854 à 1879. Depuis monsieur Pont cultive les vignes et possède un musée de moto, voiture, avion, matériel vinaire etc.","architecture":"Savigny-lès-Beaune,  construit vers 1340, il est détruit sur ordre de Louis XI. Reconstruit au XVIIe siècle et comportant des parties construites au XIXe siècle, il accueille de nos jours plusieurs musées, consacrés à la voiture Abarth, à la moto, à l'aviation militaire et au matériel viticole.                                                   \r\nLe manoir de Savigny-lès-Beaune, en 1635, fera construire le grand escalier intérieur du même modèle que celui construit par Mansart au château de Maisons-Laffitte.","habitants":"Famille Bouhier                                                                                Famille de Monsieur Pons \r\n        \"","divers":"Château de Savigny et dans la commune le manoir de Nicolay du XVII-XVIIIe siècle, manoir de Savigny le Sec et de Savigny sous Malin.","gps":"","images":["../image/image_21/21_Savigny_Beaune_1.jpg","../image/image_21/21_Savigny_Beaune_2.jpg","../image/image_21/21_Savigny_Beaune_3.jpg","../image/image_21/21_Savigny_Beaune_4.jpg","../image/image_21/21_Savigny_Beaune_5.jpg","../image/image_21/21_Savigny_Beaune_6.jpg","../image/image_21/21_Savigny_Beaune_7.jpg"]},"Consult_chateau_formulaire952f-2":{"id":"Consult_chateau_formulaire952f-2","dept":"21","canton":"Semur-en-Auxois","commune":"Semur-en-Auxois","nom":"Semur","type":"Vestiges","periode":"XIII","histoire":"SEMUR, des ducs de Bourgogne, Robert II, en 1276 ,  place forte de l'Auxois, Semur est fidèle aux ducs de Bourgogne, en 1478, les troupes françaises de Louis XI investissent la ville et l'occupent.\r\n En 1589, Semur connaît son ultime siège. Durant les guerres de la Ligue, la ville est géré par  le maréchal de Tavannes. Henri IV décide le démantèlement des fortifications en 1602. La ville perd sa vocation défensive pour devenir la capitale du bailliage d'Auxois, elle le restera jusqu'en 1926, où la sous-préfecture est transférée à Montbard.\r\n Au cours de la période révolutionnaire de la convention nationale (1792-1795).","architecture":"Semur, vestiges des fortifications du XIV-XVe siècle, la porte Sauvigny, du XVe siècle qui marquait jadis l'entrée du bourg. château féodal du XIIIe siècle, l'édifice quadrangulaire est établi devant la porte Guillier du XIVe siècle.\r\n Le château fort, également dit le Donjon, reconstruit au XIIIe siècle, après son démantèlement au XVIIe siècle, les principaux éléments visibles de nos jours sont les quatre tours d'angle circulaires de l'ancienne citadelle, la tour de l'Orle d'Or, la plus imposante par sa hauteur de 44 mètres et par ses murs dont la base a 5 mètres d'épaisseur, sa lézarde date de 1602 et son sommet était autrefois cerclé de métal doré, elle est le siège depuis 1904 de la société des sciences de Semur-en-Auxois,  la tour de la Gehenne,  la tour de la Prison,  la tour Margot, derrière le théâtre, la promenade des remparts, récemment restaurée et qui offre une très belle vue sur l'Armançon.","habitants":"Duc Philippe le Hardi \r\n        \"","divers":"Vestiges des fortifications du XVe siècle château féodale avec tours rondes, château de la Montille et de l'Orle d'or Musée","gps":"","images":["../image/image_21/21_Semur_1.jpg","../image/image_21/21_Semur_2.jpg","../image/image_21/21_Semur_3.jpg","../image/image_21/21_Semur_4.jpg","../image/image_21/21_Semur_5.jpg","../image/image_21/21_Semur_6.jpg","../image/image_21/21_Semur_7.jpg"]},"Consult_chateau_formulaire03c4-2":{"id":"Consult_chateau_formulaire03c4-2","dept":"21","canton":"Montbard","commune":"Senailly","nom":"Senailly","type":"Château","periode":"XIX","histoire":"SENAILLY, en 1394 Odot de Senailly, écuyer  et seigneur. En 1401 est construite la ferme fortifiée au centre du village actuel dont on a retrouvé un plan daté de 1711, établi par Estienne Pernet, arpenteur d'Autun. Après avoir franchi le pont, on accédait à une grande cour, entourée de bâtiments, logement des fermiers, greniers, étables, pressoirs, il y a aussi le colombier et une chapelle. Au XVIIe siècle  le fief leur revient et Senailly forma une seule et même seigneurie avec Saint-Germain jusqu'en 1789. Ce n'est qu'après la Révolution que les communes se séparèrent et devinrent autonomes, Senailly a été l'une des premières La maison seigneuriale fut restaurée en 1888.  Mme Teyssère l'ancienne propriétaire du château élevait des chevaux de course dans l'immense domaine, à sa mort en 1916, elle  lègue ses biens à son neveu, le comte d'Heursel, ce dernier revint à Senailly en 1936, il vendait le château et ses dépendances et partait au Brésil. Rachetée par un industriel Alsacien, M. Würsteisen. En 1981, une partie est transformée en  salle des fêtes. Puis en 1994, elle accueille une classe de maternelle qui est suivie dune seconde en 2007.","architecture":"Senailly, à l'entrée de Senailly, une grande bâtisse appelée le château, construit fin XIXe début XXe siècle, corps de logis rectangulaire à deux niveaux et attiques, avant corps légèrement saillant avec fronton triangulaire. La bâtisse connut alors quelques modifications mais surtout des améliorations, notamment l'installation de l'eau courante, la ville de Pantin  en prenait possession en 1958 et la transformait en site d'accueil pour les enfants de sa cité.","habitants":"Odot de Senailly\r\n        \"","divers":"Château de Senailly","gps":"","images":["../image/image_21/21_Senailly_1.jpg","../image/image_21/21_Senailly_2.jpg"]},"Consult_chateau_formulaire73bc":{"id":"Consult_chateau_formulaire73bc","dept":"21","canton":"Sud-Beaune","commune":"Ladoix-Serrigny","nom":"Serrigny","type":"Château","periode":"XV","histoire":"SERRIGNY, Maison forte construite  au  XIIIe siècle et donnée en 1316 par le duc de Bourgogne à Jean de Frolois. Des Frolois elle passa aux Mello, puis en 1439, à Pierre de Bauffremont, chambellan du duc de Bourgogne, qui la trouva en très fort mauvais état. La  situation ne s'améliora sans doute pas sous les familles qui s'y succédèrent jusqu'à ce qu'elle parvienne, à la fin du XVIIe siècle, entre les mains de Pierre Brunet de Chailly, président à la chambre des comptes de Paris, qui  la fit entièrement reconstruire en 1700. Par alliances le château échut aux marquis de Clermont-Montoison puis, en 1908, au comte Félix de Mérode à qui une visite à la Rochepot inspira l'édification des deux tours extérieures.","architecture":"Serrigny; à l'origine était une vaste maison forte ceinte de douves, construite  au XIIIe siècle, corps de logis rectangulaire à deux niveaux et attiques tour ronde dans le parc.","habitants":"Pierre de Bauffremont\r\n        \"","divers":"Le château de Sérigny et le manoir de Mérode avec son pigeonnier.","gps":"","images":["../image/image_21/21_Serrigny_1.jpg","../image/image_21/21_Serrigny_2.jpg","../image/image_21/21_Serrigny_3.jpg","../image/image_21/21_Serrigny_4.jpg","../image/image_21/21_Serrigny_5.jpg","../image/image_21/21_Serrigny_6.jpg"]},"Consult_chateau_formulairef786":{"id":"Consult_chateau_formulairef786","dept":"21","canton":"Semur-en-Auxois","commune":"Souhey","nom":"Souhey","type":"Château","periode":"XVIII","histoire":"SOUHEY,  au XIVe siècle, la seigneurie de Souhey est partagée entre différentes familles, mais l'ancien château est  attestée en 1370. Les Coutier parvinrent au XVIe siècle à s'en rendre seuls maîtres. Les Damas de Crux obtinrent la seigneurie par mariage et firent rasés l'ancienne maison pour en construire un nouveau  château en 1756. Mais  22 ans plus tard, ils durent le vendre et Souhey passa entre divers propriétaires. En 1923 le parc a été rasé.","architecture":"Souhey, château en forme de T, deux corps de logis rectangulaire à deux niveaux, l'un formant un pavillon saillant,et  à l'opposé tour ronde à trois niveaux toiture  en dôme avec clocheton.","habitants":"Famille des Damas\r\n        \"","divers":"Maison forte  de Souhey","gps":"","images":["../image/image_21/21_Souhey_1.jpg","../image/image_21/21_Souhey_2.jpg","../image/image_21/21_Souhey_3.jpg"]},"Consult_chateau_formulairefd96":{"id":"Consult_chateau_formulairefd96","dept":"21","canton":"Vitteaux","commune":"Soussey-sur-Brionne","nom":"Soussey","type":"Château","periode":"XIII","histoire":"SOUSSEY sous Brionne à quelques kilomètres  : XIIIe siècle, XVIe siècle et XVIIe siècle car les différents bâtiments furent ajoutés au fur et à mesure,. La vie d'une famille seigneuriale y est reconstituée avec meubles et mannequins. Les autres bâtiments qui se répartissent autour de la cour datent du XVIe siècle. Dans le parc coule une rivière au bord de laquelle se trouve un colombier. Le château habité peut se visiter en partie sur rendez-vous. Jardin à la française dans la cour intérieure. Parc à l'anglaise autour du château.","architecture":"Soussey, au-delà de la porte charretière, on aperçoit la maison-tour du XIIIe siècle, vénérable donjon carré avec tourelle d'escalier à vis coiffé d'un toit en tuiles.","habitants":"Szeigneur de Soussey\r\n        \"","divers":"Maison forte à Soussey avec son donjon.","gps":"","images":["../image/image_21/21_Soussey_1.jpg","../image/image_21/21_Soussey_2.jpg","../image/image_21/21_Soussey_3.jpg","../image/image_21/21_Soussey_4.jpg"]},"Consult_chateau_formulaire8794":{"id":"Consult_chateau_formulaire8794","dept":"21","canton":"Dijon","commune":"St-Apollinaire","nom":"St_Apollinaire","type":"Château","periode":"XV","histoire":"ST-APOLLINAIRE, à une famille de chevaliers de ce nom.  Au milieu du XVe siècle, Pierre Baudot, maire de Dijon, démolit la vieille maison  pour élever une demeure  plus luxueuse. Un siècle plus tard, le château passe en possession de la famille Tabourot des Accords, le colombier est édifié  durant le XVIe siècle. La congrégation des dames du Refuge  font l'acquisition du château  en 1731. L'édifice passe aux mains des Ursulines en 1762, vendu comme bien national à la Révolution, passa au XIXe siècle à monsieur Champi antiquaire à Dijon, puis  acquis par la ville en 1931 afin d'y installer une école et aujourd'hui l'hôtel de ville.            Dans la commune une redoute a été construite situé à la limite entre les communes de Saint-Apollinaire et de Dijon, est aujourd'hui un lieu de promenade.","architecture":"St-Apollinaire; au XIe siècle, une motte entourée de douves le château est agrandi en 1938. L'ensemble se compose d'une juxtaposition de  bâtiments de différentes époques, le corps principal de forme rectangulaire, étendu par une adjonction récente en bordure des douves en eau, avoisine une grosse tour carrée flanquée d'un bâtiment et d'une tour d'escalier,  très remanié et on ne distingue guère les parties anciennes des parties plus récentes à l'exception des ajouts récents à l'arrière du bâtiment  tourelle d'escalier en métal, un colombier de plan hexagonal complète l'ensemble, les différents niveaux sont marqués par des bandeaux de  pierres moulurés, la porte d'entrée située en hauteur ainsi que la fenêtre sont surmontées d'un décor.","habitants":"Pierre Baudot\r\n        \"","divers":"Château de Saint-Apollinaire, ruines féodales et redoute","gps":"","images":["../image/image_21/21_St_Apollinaire_1.jpg","../image/image_21/21_St_Apollinaire_2.jpg","../image/image_21/21_St_Apollinaire_3.jpg","../image/image_21/21_St_Apollinaire_4.jpg","../image/image_21/21_St_Apollinaire_5.jpg"]},"Consult_chateau_formulaireec75":{"id":"Consult_chateau_formulaireec75","dept":"21","canton":"Montbard","commune":"St-Remy","nom":"St_Remy_Buffon","type":"Château","periode":"XVI","histoire":"ST-REMY, son origine semble remonter à une seigneurie qui appartenait  aux comtes de Montbard et que le duc de Bourgogne Hugues IV donna en 1234 à l'abbaye de Fontenay, l'édifice primitif fut largement remanié par  le dernier abbé, Jacques de Jaucourt, qui construisit après 1540, le logis où résidèrent le plus souvent les  abbés commendataires.  Vendus comme biens nationaux à la Révolution, les bâtiments furent utilisés comme exploitation agricole jusqu'à notre époque, restaurés que vers 1930 par leur dernier propriétaire.                                                                         BUFFON, les grandes forges  construite par le célèbre naturaliste, Buffon, en 1768. Un complexe intégré qui regroupe  les ateliers de la forge pour fabriquer le fer, utilisant la force hydraulique aux roues permettant de faire fonctionner les soufflets pour les hauts fourneaux, les marteaux pour l'affinerie et pour les lavoirs à minerai, les logements des ouvriers à six mètres au-dessus de la rivière ainsi qu'un potager, une ferme et un verger pour permettent à leur famille et au maître de forge de vivre en autarcie.","architecture":"St-Remy; corps de logis rectangulaire, deux ailes en retour, l'ensemble à deux niveaux flanqué de deux tours carrées  dont une avec toits pyramidal.                                                          \r\n Buffon; complexe de forge du XVIIIe siècle avec four pavillon et dépendances avec systèmes de refroidissement, ainsi ont été accessibles, la cour d'honneur, les logements des ouvriers et du maître  pratiquement dans le même état qu'au XVIIIe siècle, et le jardin avec son orangerie, cette grande forge est un rare exemple de plan rigoureux de l'architecture régionale  du XVIIIe siècle alliée à une harmonie générale de l'ensemble que l'on ressent particulièrement en entrant dans la forge par un escalier majestueux.","habitants":"Jacques de Jaucourt\r\n        \"","divers":"Château de Saint-Rémy et le complexe des forges de Buffon","gps":"","images":["../image/image_21/21_St_Remy_Buffon_1.jpg","../image/image_21/21_St_Remy_Buffon_2.jpg","../image/image_21/21_St_Remy_Buffon_3.jpg","../image/image_21/21_St_Remy_Buffon_4.jpg","../image/image_21/21_St_Remy_Buffon_5.jpg","../image/image_21/21_St_Remy_Buffon_6.jpg","../image/image_21/21_St_Remy_Buffon_7.jpg"]},"Consult_chateau_formulaire9c09":{"id":"Consult_chateau_formulaire9c09","dept":"21","canton":"Fontaine-Française","commune":"St-Seine-sur-Vingeanne","nom":"St_Seine_sur_Vingeanne","type":"Château","periode":"XV","histoire":"ST-SEINE sur VINGEANNE, le château appartient à un dispositif complexe composé de trois châteaux situés de part et d'autre de la Vingeanne,  mis en place dès le XIIe siècle par la famille de Saint-Seine, et auquel devait s'ajouter au XIVe siècle la maison forte de Rosières, proche de la frontière comtoise. Au cours des siècles qui suivirent, la terre fut divisée en quatre fiefs dont les sorts furent différents et l'histoire très confuse. En 1580, le fief de Saint Seine l'Eglise échut à la famille Maillard. En 1636, le château fut incendié par les armées de  Gallas. Il fut alors reconstruit par Jean Maillard, conseiller au parlement de Dijon, qui le légua à son neveu,  Benoît-Etienne Legouz, lequel le vendit en 1728 à son cousin Bénigne-Germain Legouz. Celui-ci reconstitua, par achats successifs, l'ancienne seigneurie et son fils transforma le château à la fin du XVIIIe siècle. Il n'est  plus sorti depuis des mains de la famille Legouz de Saint Seine.","architecture":"St-Seine sur Vingeanne Le château de Saint-Seine, au milieu du village, comporte des tours d'époque médiévale ainsi que des bâtiments d'époque plus récente.\r\nMaison forte de Saint-Seine la Tour : la base d'une grande tour rectangulaire est le seul élément en subsistant.                           St-Seine sur Vingeanne   Il ne reste plus que les deux tours Nord du château du XVIe siècle qui fut brûlé par les armées de Gallass en 1636. Il est reconstruit sous sa forme actuelle au XVIIIe siècle, situé à proximité de l'église, protégé par de hauts murs et ses deux tours il domine la vallée de la Vingeanne. Le parc avec son orangerie descend en pente douce vers la prairie qui borde la rivière.","habitants":"Benoît-Etienne Legouz,\r\n        \"","divers":"Château de Saint-Seine sur Vingeanne et le manoir de l'abbaye","gps":"","images":["../image/image_21/21_St_Seine_sur_Vingeanne_1.jpg","../image/image_21/21_St_Seine_sur_Vingeanne_2.jpg","../image/image_21/21_St_Seine_sur_Vingeanne_3.jpg","../image/image_21/21_St_Seine_sur_Vingeanne_4.jpg"]},"Consult_chateau_formulaire233d-2":{"id":"Consult_chateau_formulaire233d-2","dept":"21","canton":"Vitteaux","commune":"Ste-Colombe-en-Auxois","nom":"Ste_Colombe_Auxois","type":"Château","periode":"XV","histoire":"SAINTE-COLOMBE,  en 1604, les terres et seigneuries de Marigny-le-Cahouët, la Roche-Vanneau et Sainte-Colombe sont la propriété de François Juvénal des Ursins, marquis de Traînel et chevalier de l'Ordre du Saint-Esprit  depuis 1599, et de son épouse, Guillemette Dorgemont. Le domaine est ensuite cédé à Michel du Faur de Pibrac et à Claude d'Étampes, son épouse.  Au XVe siècle, les terres de Sainte-Colombe appartenaient aux ducs de Bourgogne, Jacques Filsjean, gouverneur de la chancellerie du parlement de  Bourgogne fait bâtir en 1640 le château à proximité de l'église. Le village se développe autour de l'ascension sociale de la famille Filsjean, comptant parmi elle plusieurs conseillers du Roi aux Etats de Bourgogne. En 1775  la famille Filsjean est compromise dans les spéculations de la guerre des farines et Jean-Charles Filsjean est mis à mort par la population de Vitteaux sous la Révolution. Le château revient à de lointains cousins,  est utilisé comme exploitation agricole, il connait une phase de dégradation importante a gravée au début du XXe siècle. Il est racheté par des fermiers, leurs descendants, Madeleine et Camille, nés aux château, ont fait  confiance à l'association Arcade qui, depuis, restaure ce bel ensemble architectural.","architecture":"Sainte Colombe; du XVIIe siècle  deux corps de logis de plan en L à deux niveaux et attiques, pavillons saillants de forme carré et dépendances entourant la cour, transformé en ferme.","habitants":". Jacques Filsjean,\r\n        \"","divers":"Le château de Sainte Colombe en Auxois","gps":"","images":["../image/image_21/21_Ste_Colombe_Auxois_1.jpg","../image/image_21/21_Ste_Colombe_Auxois_2.jpg","../image/image_21/21_Ste_Colombe_Auxois_3.jpg","../image/image_21/21_Ste_Colombe_Auxois_4.jpg"]},"Consult_chateau_formulaire9c8b":{"id":"Consult_chateau_formulaire9c8b","dept":"21","canton":"Pouilly-en-Auxois","commune":"Ste-Sabine","nom":"Ste_Sabine","type":"Château","periode":"XVI","histoire":"STE-SABINE, une modeste maison seigneuriale appelée la maison de Fussey du XVIe siècle. Vers 1630, Gaspard  de Messey entreprend la construction d'un château, en 1693, la seigneurie est acquise par la famille Parisot, qui la conserve jusqu'en 1760.  Mis sous séquestre en 1792 le château est ensuite vendu à Nicolas Guillaume Bazire, il le revend à Pierre Rocault  en 1798,  En 1831, passe à son fils Jean-Baptiste  et vers 1850, son petit-fils le reconstruit  moderne. Aménagés en hôtel en 1960, les bâtiments ont fait l'objet en 1990 d'une importante rénovation pour être convertis en hôtel de luxe et une vaste salle à manger a été construite devant l'étage de soubassement du corps principal.","architecture":"Le château de Sainte-Sabine est situé sur le territoire d'un ancien monastère qui s'est transformé peu à peu en seigneurie. Un premier château fut construit vers 1630,  en 1760  rajout de l'aile nord, dont le dessin de la façade sur cour est conservé,  ainsi qu'un projet de construction d'une antichambre et d'un escalier  sur les fondations ruinées de l'aile Est, vers 1810 fait combler les fossés  démolit le colombier et vers 1850 le château a été modernisé et reconstruit de façon à en faire une résidence de loisirs  avec pavillons d'angle. La cheminée de la salle des gardes porte la date 1863 seuls les pavillons nord ouest et sud ouest encadrant le portail d'entrée semblent avoir été conservés. \r\nDepuis 1960, il s'est transformé en résidence hôtelière, il est entouré d'un très beau parc animalier agrémenté d'un étang.","habitants":"Gaspard  de Messey \r\n        \"","divers":"Château de Sainte-Sabine","gps":"","images":["../image/image_21/21_Ste_Sabine_1.jpg","../image/image_21/21_Ste_Sabine_2.jpg","../image/image_21/21_Ste_Sabine_3.jpg","../image/image_21/21_Ste_Sabine_4.jpg","../image/image_21/21_Ste_Sabine_5.jpg","../image/image_21/21_Ste_Sabine_6.jpg","../image/image_21/21_Ste_Sabine_7.jpg"]},"Consult_chateau_formulaireff39":{"id":"Consult_chateau_formulaireff39","dept":"21","canton":"Fontaine-lès-Dijon","commune":"Talant","nom":"Talant","type":"Vestiges","periode":"XV","histoire":"TALANT, château des ducs de Bourgogne, jusquau XIIe siècle, le Mons de Talant, situé aux portes de Dijon et appartenant au domaine de labbaye de Saint-Bénigne fut un lieu inhabité,  en 1208, Eudes III entreprit la construction de la forteresse de Talant dans le but dassurer un abri plus sûr à ses trésors et à ses archives quen son palais ducal de Dijon. Il fonda au nord du château une ville neuve fortifiée et un prieuré pour quelques moines de Saint-Bénigne. Jean sans Peur, fils aîné de Philippe le Hardi, rentrant de la croisade en 1396, rapporta en trophée la  Vierge de saint Luc  quil offrit à Talant. Elle est exposée dans léglise. En 1585, les partisans des Guise semparèrent par ruse de la forteresse.","architecture":"Talant; lenceinte terminée  de 1100 mètres de long flanquée de 33 tours, Eudes III y accueillit tous les serfs qui fuyaient loppression de leur seigneur, et notamment les paysans attirés par la liberté et le travail affranchi de toute entrave. En 1216, il accorda aux habitants le droit de sadministrer eux-mêmes en promulguant  la charte de Commune » les dispense dimpôt et de service militaire. Des 33 tours adossées à lenceinte, la tour de la «Confrairie» a, seule, été sauvée de la démolition. Après son retour aux mains du Roi, en 1598, l'adjudication fut faite de la démolition du château et des remparts de la ville. Le travail est achevé en 6 mois et Talant fut réduit à la condition de simple village.","habitants":"Jean sans Peur\r\n        \"","divers":"Ruines féodales, cellier de l'ancien château ducal","gps":"","images":["../image/image_21/21_Talant_1.jpg"]},"Consult_chateau_formulairee1b2":{"id":"Consult_chateau_formulairee1b2","dept":"21","canton":"Pontailler-sur Saône","commune":"Talmay","nom":"Talmay","type":"Château","periode":"XVIII","histoire":"TALMAY, la seigneurie cité au IIIe siècle des seigneurs de Champlite de Pontailler, Guillaume de Pontailler maréchal de Bourgogne,  fit au XIIIe siècle construire la forteresse carrée à bretèches, cette famille s'éteint en 1685, la seigneurie passe à Pierre Ier Filsjean,  seigneur de Talmay,  conseiller au parlement  de Bourgogne, et de la chambre des comptes  de Paris, le fils de Filsjean dit Filsjean II entreprend la reconstruction conservant l'ancien édifice, le donjon et à sa mort en 1791 sans postérité  le château passe à des collatéraux et en 1824 à Pierre-Auguste Floret maître de forges à Pesmes. Passe en 1847 par héritage au Baron Thénard membre de l'académie des sciences, toujours dans la descendance par la famille Berdeaux Montrieux.","architecture":"Talmay.  Dans le village même, entre deux bras de la Vingeanne, c'est un château construit en 1762, de trois corps de maison et quatre tours  garni de fossés tout autour, après modification au  XVIIe siècle sont conservé la grosse tour carrée  du XIIIe siècle, qui a reçu plus tard un toit en pyramide symbole du pouvoir féodal son toit pointu est surmonté d'une lanterne, le corps de logis construction imposante, bâtiment central flanqué sur la façade sud de deux courtes ailes en retour d'équerre, façade précédée d'une terrasse ouvre sur une vaste avant-cour  bordée de communs,  on accède à l'étage du corps de logis et à la chapelle par un escalier monumental . Le corps de logis classique coiffé d'un toit en croupes recouvert de tuiles vernissées sur un étage en soubassement et deux étages, fronton triangulaire surmonte l'avant-corps central de chaque façade.  Les pièces du donjon sont ornées de boiseries et de mobilier XVIIe siècle.","habitants":"Guillaume de Pontailler                                                      \r\n   Filsjean II \r\n        \"","divers":"Château de Talmay avec son donjon du XIIIe siècle","gps":"","images":["../image/image_21/21_Talmay_1.jpg","../image/image_21/21_Talmay_2.jpg","../image/image_21/21_Talmay_3.jpg"]},"Consult_chateau_formulaireec27":{"id":"Consult_chateau_formulaireec27","dept":"21","canton":"Mirebeau","commune":"Tanay","nom":"Tanyot","type":"Château","periode":"XVIII","histoire":"TANYOT, une maison forte est attestée en 1550 par un terrier de la terre de Taniot. En 1587, Jean Pouffier, marchand à Dijon, achète le domaine à Humbert de Rochefort et y construit un pavillon. En 1594,  un violent orage abattit un beau pavillon  que M. Pouffier père avait fait dresser depuis quelques temps en sa seigneurie de Tanyot.  Un procès-verbal de visite de feux,  dressé en 1643, fait état de la maison du seigneur. Vers 1745, Alexandre de Moyria, lieutenant-colonel au régiment de Fouquet, et Elisabeth de Courcelles, son épouse, acquièrent la terre de Tanyot et y font construire un château moderne. Pierre François Gauthier s'en porte acquéreur en 1773 et fait  édifier une partie des communs.   A la fin du XVIIIe siècle, le domaine revient à la famille de Masson d'Autume à laquelle il appartient toujours.","architecture":"Tanyot, château du XVIIIe siècle, corps de logis rectangulaire à deux niveaux et attiques flanqués d'un pavillon sur l'aile gauche et de deux longs bâtiments de dépendance en équerres sur la façade avant formant une cour fermée par un portail . Aucune modification notable du plan depuis 1838.","habitants":"Elisabeth de Courcelles\r\n        \"","divers":"Château de Tanyot","gps":"","images":["../image/image_21/21_Tanyot_1.jpg","../image/image_21/21_Tanyot_2.jpg"]},"Consult_chateau_formulaireadbe":{"id":"Consult_chateau_formulaireadbe","dept":"21","canton":"Châtillon-sur-Seine","commune":"Aisey-sur-Seine","nom":"Tavannes_Aisey","type":"Château","periode":"XVIII","histoire":"TAVANNES, Château construit entre 1735 et 1744 pour Charles de Saulx, vicomte de Tavannes,  à l'emplacement d'une maison dont la tourelle d'escalier, datant du XVe ou XVIe siècle, fut conservée.       Dans la commune le château de Bon-Espoir qui doit son nom à une ancienne chapelle disparue transformé en h^tel restaurent de classe  par Sabine et Philippe de Brossia  transformé en hôtel restaurant.","architecture":"le château de Tavannes à l'emplacement d'une maison dont la tourelle d'escalier, datant du XVe ou XVIe siècle, fut conservée, construction des pavillons d'entrée entre 1742 et 1744, château de plan régulier en L, réutilisant l'étage de soubassement  de la maison précédente, avec sa tourelle d'escalier située dans l'angle et desservant le rez-de-chaussée surélevé, l'étage carré et l'étage de comble.                                                                                       Bon-Espoir,   château du XVIIe siècle corps de logis rectangulaire flanqué de quatre tourelles carrées toutes deux  reliées par un pavillon à niveau inférieur prolongé en façade.","habitants":"Charles de Saulx\r\n        \"","divers":"Château de Tavannes et de Bon-Espoir","gps":"","images":["../image/image_21/21_Tavannes_Aisey_1.jpg","../image/image_21/21_Tavannes_Aisey_2.jpg","../image/image_21/21_Tavannes_Aisey_3.jpg","../image/image_21/21_Tavannes_Aisey_4.jpg"]},"Consult_chateau_formulairef27d":{"id":"Consult_chateau_formulairef27d","dept":"21","canton":"Venarey-les-Laumes","commune":"Thenissey","nom":"Thenissey","type":"Château","periode":"XVII","histoire":"THENISSEY, cité en 1240 forteresse du fief des seigneurs de Thenissey, passa à la famille de Tournelle, de Buc et de Bournonville et  au début du XIVe siècle lorsque Guillaume Poinçot, homme de  loi dont la famille avait fait fortune dans l'élevage et le commerce des moutons, acquit une partie de la seigneurie. Son fils Guillaume se rendit maître de l'ensemble , vers 1470, son petit-fils y bâtit une tour forte, et son arrière-petit-fils troqua vers 1510 le nom de Poinceot contre celui de Gellan. La famille de Gellan garda Thenissey  jusqu'au mariage, en 1595, de Péronne de Gellan  avec Daniel d'Edouard. Deux générations plus tard, en 1663, le domaine passa par alliance à la famille du marquis de Clugny qui édifia entre 1718 et 1736, un nouveau château à quelque distance de la  tour des Poinçot. \r\n Les Clugny s'éteignirent fin XVIIIe siècle en la personne de Charles-Louis de Clugny dont la veuve, Marie-Charlotte-Alexandrine de Lannoy, comtesse du Saint-Empire porta les biens à son second époux, Jean-Dominique de Tulle, marquis  de Villefranche en 1793, et demeure encore dans cette famille.","architecture":"Thenissey, d'une forteresse au XIIe siècle, se transforma en maison forte, dit le vieux château  reconstruit vers 1470, et de nouveau reconstruit en 1720 de plan rectangulaire coiffée d'un toit en croupes couvert de tuiles bourguignonnes quatre niveaux, corps de logis rectangulaire de style très dépouillé, baigné sur trois côtés par de belles douves, et fossés un avant corps surmonté d'un fronton triangulaire  à pans coupés arrondis donnant sur un pont escalier de pierre, face au château  côté parc ancien château du XVe siècle  à mâchicoulis surmonté dans sa partie centrale d'une partie surélevée avec tourelle.                                             \r\nMaison forte dit la tour de Marmonts, à  dix kilomètres  de Gissey-sous-Flavigny , édifice construit au début du XIIIe et XVIe siècle, a caractère défensif, présence d'archères à étrier, La partie du XVIe siècle, sur la façade sud,  une tourelle ronde  avec escaliers à vis,  défendue  par plusieurs canonnières, et sur la façade postérieure une tour carrée, salle voûtée en croisée d'ogives. Dans la commune un château du XVIIIe siècle exploitation agricole.","habitants":"Marquis de Clugny\r\n        \"","divers":"Château de Thenissey, maison forte des Marmonts à Gissey sous Flavigny","gps":"","images":["../image/image_21/21_Thenissey_1.jpg","../image/image_21/21_Thenissey_2.jpg","../image/image_21/21_Thenissey_3.jpg","../image/image_21/21_Thenissey_4.jpg","../image/image_21/21_Thenissey_5.jpg"]},"Consult_chateau_formulairec7b4":{"id":"Consult_chateau_formulairec7b4","dept":"21","canton":"Saulieu","commune":"Thoisy-la-Berchère","nom":"Thoisy_la_Berchere","type":"Château","periode":"XV","histoire":"THOISY; Cité au XIe siècle, propriété de la famille de Mont-Saint-Jean, le fief de Thoisy, fut vendu en 1271 à Etienne de Bagé évêque d'Autun, rebatit au XVe siècle par le cardinal Rolin évêque d'Autun, puis ayant été donné en 1567 à Nicolas de Marcilly-Cypierre, le passe à son frère Philibert, ancien gouverneur du Roi Charles IX, le fils de Philibert, Humbert  seigneur du Breuil et de Thoissy-Cipierre époux d' Alphonsine de Gondi nièce du cardinal de Retz, à sa mort  sa veuve fit de nouvelles  transformations qui s'achevèrent en 1610, le fils du couple Charles sans enfant en 1628, le domaine  fut acquis par Jean-Baptiste.  Le Goux de La Berchère, premier président au parlement de Dijon qui acquiet les seigneuries de la Roche-Pot et de Dinteville, dont la lignée s'éteignit par son petit-fils Louis en 1737. La seigneurie par Henriette-Louise de Beauvau marquise de Choiseul au bénéfice de son petit-fils,  Renaud-César-Louis de Choiseul-Praslin, dont la petite-fille épousa en  1815 Charles de Beauvau-Craon. En 1844, Etienne de Beauvau-Craon, qui venait d'en hériter, entreprit la  restauration du château alors inhabitable et l'aménagement d'un parc à l'anglaise, oeuvre qui fut menée à  son terme en 1893 par sa fille Hélène, mariée en 1869 au marquis de Montboissier-Canillac. le domaine échoua à une nièce Berthe de Wignancourt, comtesse de Durfort et par héritage est transmis à la famille de Voguë.","architecture":"Thoisy-la-Berchère est célèbre pour son château premier édifice au XIe siècle, modifié  au début du XIIIe siècle, il fut rebâti au XVe siècle, a subit de nombreux remaniements aux cours des ans, long corps de logis de style renaissance recouvert d'un crépi rosé de forme rectangulaire à trois niveaux et attiques en façades deux  tours une ronde, une carrée aux angles et de deux tourelles octogonales  en saillies, côté parc. A l?'intérieur de la demeure, se trouve encore une galerie de tapisseries parmi lesquelles on peut voir la tapisserie à l?'Oiseau que Charles le Téméraire emportait toujours dans ses expéditions.  Les jardins avaient été dessinés par Friant et Buller.","habitants":"Nicolas de Marcilly-Cypierre\r\n        \"","divers":"Château de Thoisy-la-Berchère","gps":"","images":["../image/image_21/21_Thoisy_la_Berchere_1.jpg","../image/image_21/21_Thoisy_la_Berchere_2.jpg","../image/image_21/21_Thoisy_la_Berchere_3.jpg","../image/image_21/21_Thoisy_la_Berchere_4.jpg"]},"Consult_chateau_formulaire0622":{"id":"Consult_chateau_formulaire0622","dept":"21","canton":"Bligny-sur-Ouche","commune":"Thorey","nom":"Thorey","type":"Château","periode":"XVI","histoire":"THOREY; Un château, si ce dernier date du XIXe siècle et appartient actuellement à la famille Villeroy de Galhau, il est construit sur l'emplacement d'un château plus ancien dont subsistent deux tourelles du XVIe siècle remanié au XIXe siècle l'une à l'est et l'autre à l'ouest du château actuel, un pigeonnier du XVIe siècle, et les soubassements d'un bâtiment fort en contre-bas sous l'actuel château à l'ouest.","architecture":"Thorey ; maison forte rectangulaire à deux niveaux et attiques flanqué de tours rondes à toits en poivrières en angles.   Le château du Colombier à deux kilomètres, idem corps de logis rectangulaire et attiques flanqué de tours rondes en angles.","habitants":"Famille Villeroy de Galhau\r\n        \"","divers":"Château de Thorey et du Colombier","gps":"","images":["../image/image_21/21_Thorey_1.jpg","../image/image_21/21_Thorey_2.jpg"]},"Consult_chateau_formulairec9a6-2":{"id":"Consult_chateau_formulairec9a6-2","dept":"21","canton":"Nolay","commune":"Thury","nom":"Thury","type":"Château","periode":"XIV","histoire":"THURY, en 1226, Arnulphe de Monestoy fut le premier habitant du château d'Epinac. C'est en 1395, que le dernier seigneur du lieu Hugues de Monestoy mourut au cours d'une croisade. Puis arriva le seigneur de Molinot : Beauffremont et ce jusqu'en 1429. Puis débuta le long règne des Rollin en1429. Puis vint le règne des Pernes vers 1600 et ce jusqu'en 1694, avec l'arrivée de Roger de Clermont-Tonnerre. Charles Gaspard de Clermont-Tonnerre fut le dernier comte d'Epinac de 1781 à 1789, date de la Révolution Française. Passera dans différentes familles.","architecture":"Le château d'Epinac de cette époque subsiste seulement une maison forte située en haut du village  ainsi qu'une dépendance du château située dans le bas du village, une grosse tour ronde à mâchicoulis et un donjon carré.                                                                                 Dans la commune la mairie de style féodale et  le château de Bonpassage deux corps de logis rectangulaire à deux niveaux.","habitants":"Arnulphe de Monestoy\r\n        \"","divers":"Château d'Epinac et la mairie de style féodal et  le château de Bonpassage","gps":"","images":["../image/image_21/21_Thury_1.jpg","../image/image_21/21_Thury_2.jpg","../image/image_21/21_Thury_3.jpg"]},"Consult_chateau_formulaire7236":{"id":"Consult_chateau_formulaire7236","dept":"21","canton":"St-Seine-l`Abbaye","commune":"Turcey","nom":"Turcey","type":"Château","periode":"XV","histoire":"TURCEY,  au XIIe siècle, apparaît le fief de la Tour de Turcey.  Au début du XVIIe siècle, le château  est rebâti par Etienne de Loisie, de cette époque date le décor peint de la chapelle. A la fin du XVIIIe siècle,  le château est laissé à l'abandon puis vendu comme bien national en 1792. Il est ensuite utilisé comme ensemble  agricole. En 1897, deux cheminées du corps de logis sont vendues et remontées à Dijon, l'une au Palais de Justice, l'autre au lycée Carnot.","architecture":"Turcey; au XVe siècle, le château comportait sur une motte  une enceinte surmontée d'un chemin de ronde, une tour et une grange,   avec tour poterne trace de support du pont-levis.","habitants":"Etienne de Loisie\r\n        \"","divers":"Maison forte de Turcey avec porte féodale","gps":"","images":["../image/image_21/21_Turcey_1.jpg","../image/image_21/21_Turcey_2.jpg","../image/image_21/21_Turcey_3.jpg","../image/image_21/21_Turcey_4.jpg"]},"Consult_chateau_formulaire7573":{"id":"Consult_chateau_formulaire7573","dept":"21","canton":"Is-sur-Tille","commune":"Dienay","nom":"Veil_Picard","type":"Château","periode":"XVII","histoire":"VEIL-PICARD, le premier propriétaire était M. Noël. qui a fait construire la partie centrale du château et les premiers corps de bâtiments, deux frères portant ce même nom, Antoine et Victor qui étaient tous deux, maîtres de forge à Diénay, Villecomte, Is-sur-Tille et à Til-Châtel. Le deuxième propriétaire fut Jean-Eugène Lemoine, il était marchand épicier en 1837 et devint percepteur en 1838.  a fait réaliser l'aile gauche au bâtiment existant ainsi qu'une partie des étangs, les îles et le pont rustique. A sa mort, dans les dernières années du XIXe siècle, ses enfants ont vendu la propriété à Léon César Veil-Picard, membre d'une riche famille de banquiers de Besançon et fait ajouter une troisième aile au bâtiment. Il fut maire de Diénay de 1912 à 1921 C'est Guy Babault, membre de l'institut de France, du muséum d'histoire naturelle et explorateur, qui devint le propriétaire suivant en 1925. Un incendie détruit en partie le château. Théodore Bellaïgue l'achète en 1926. Il était industriel à Villecharles et  Diénay. Il revend la propriété à Amédé-Henri Pouletty qui laissera la  propriété à l'abandon. Avec la faillite de ce propriétaire, le domaine est mis en vente aux enchères publiques en 1936, L'immense domaine tombe dans l'oubli jusqu'en 1962  c'est-à-dire jusqu'au rachat d'Eric Lescure, héritier de la famille fondatrice de l'entreprise SEB, qui en était le dernier propriétaire avant la reprise par la société Pierre et Vie.","architecture":"Le château de Veil-Picard couvre une superficie actuelle de 14 hectares de terre et 3 hectares d'étang, le tout clos par des murs, vu l'état de ruine très avancé, tout sera rasé de la toiture jusqu'au niveau du sol, seule les caves et les fondations originales seront conservées. Durant la démolition du château, Eric Lescure a fait reconstruire une nouvelle villa sur l'assise de l'ancien château.  Eric Lescure était présent pour surveiller de très près non pas les travaux, mais pour découvrir une boîte contenant un trésor qui avait été caché dans un mur. Effectivement, la boîte a été bel et bien retrouvée, mais la déception fut grande car la boîte était vide, le trésor avait disparu. Le mystère de ce trésor reste encore entier aujourd'hui.","habitants":"Monsieur Noël                                                                                    Jean-Eugène Lemoine\r\n        \"","divers":"Château de Veil-Picard et la villa pastorale","gps":"","images":["../image/image_21/21_Veil_Picard_1.jpg","../image/image_21/21_Veil_Picard_2.jpg","../image/image_21/21_Veil_Picard_3.jpg","../image/image_21/21_Veil_Picard_4.jpg"]},"Consult_chateau_formulaire6839":{"id":"Consult_chateau_formulaire6839","dept":"21","canton":"Beaune","commune":"Mursault","nom":"Velle","type":"Forteresse","periode":"XIII","histoire":"VELLE, le château de la Velle est situé à Meursault,  du XIIIe siècle,   appelé Castel de Villeneuve, du nom de Guéret de Villeuneuve, un de ses propriétaires à la fin du XVIIIe siècle. Il passa dans les mains de nombreux seigneurs jusqu'à ce que les huguenots en prennent possession au XVIe siècle. Cette propriété appartient à la famille Darviot, vignerons depuis neuf générations, on trouve des Darviot à Beaune comme vignerons avant la Révolution de 1789.","architecture":"Velle, château du XIIIe siècle dont le corps de logis rectangulaire à deux niveaux  flanqué sur sa façade avant de trois pavillons saillants carrés deux similaires le troisième inférieur à l'opposé, l'ensemble fermé par des murs  avec maintenance en fond de cour.","habitants":"Guéret de Villeuneuve\r\n        \"","divers":"Château féodal de Velle","gps":"","images":["../image/image_21/21_Velle_1.jpg","../image/image_21/21_Velle_2.jpg","../image/image_21/21_Velle_3.jpg","../image/image_21/21_Velle_4.jpg","../image/image_21/21_Velle_5.jpg"]},"Consult_chateau_formulaire2dd1":{"id":"Consult_chateau_formulaire2dd1","dept":"21","canton":"Arnay-le-Duc","commune":"St-Pierre-de-Vaux","nom":"Vellerot","type":"Château","periode":"XIX","histoire":"VELLEROT, établi sur les vestiges dun château féodal,  épargné pendant la Révolution¸ il fût mis sous scellés de 1794 à 1804. En 1824, il est acheté à madame de Mareille par le comte Casimir de Villiers La Faye , chevalier de lOrdre de Malte. Au cours du XIXe siècle des dynasties de chasseurs côte-doriens se forgèrent dans la louveterie. Les Villers La Faye feront partie de ce mouvement à Clomot et à Vellerot. Nous leur devons certainement la création de la grande salle de chasse et de la tour de lhorloge  vers 1860. En 1872, le château est vendu à monsieur Henri Belime. En 1919, il est acquis par madame Rateau, à sa mort, il est donné à lévêché de Dijon, en vue de la création dune maison de repos pour les prêtres. A partir de 1979, lassociation du Renouveau en devient locataire et y fonde une  école de vie, qui deviendra la communauté rurale de Vellerot en 1986, puis en 1997 une résidence sociale.","architecture":"VELLEROT, établi sur les vestiges dun château féodal, il surplombe la commune de Saint-Pierre en Vaux, de constructions récentes en plusieurs bâtiments avec porche d'entrée, tour ronde à droite toits en poivrières, corps de logis à gauche en deux parties à deux niveaux intercalé et dans l'angle arrière une tourelle hexagonale,   les fenêtres à létage sont alors ornées de briques vernissées,  important travaux de mise aux normes ont été réalisés par lassociation en 1997-1998.","habitants":"Comte Casimir de Villiers La Faye \r\n        \r\n        \"","divers":"Château de Vellerot","gps":"","images":["../image/image_21/21_Vellerot_1.jpg","../image/image_21/21_Vellerot_2.jpg","../image/image_21/21_Vellerot_3.jpg"]},"Consult_chateau_formulairef12c":{"id":"Consult_chateau_formulairef12c","dept":"21","canton":"Venarey-les Laumes","commune":"Venarey-les Laumes","nom":"Venarey","type":"Château","periode":"XV","histoire":"VENAREY; Une famille de Venarey a tenu la seigneurie du XIIIe au XIVe siècle, avec Guy en 1212, Guillaume chevalier parti en Terre Sainte en 1231, Etienne en 1324, lequel reconnaît  sa maison-forte de Venarey.  Les droits féodaux passent ensuite à Guy de Tour en 1371, puis à la famille de Crecy au XVe siècle, Jean de Bruneau possédant la seigneurie en 1618 par sa femme Anne de Crecy. Les familles de Montal, de la Rivière, de Morges détiennent les droits aux XVIIe siècle et XVIIIe siècle.","architecture":"Venarey,   c'est un élégant manoir fortifié construit entre 1480 et 1554 , une courte galerie à arcades borde  un côté  la cour intérieure toutes les ouvertures sont en accolade.                             Château  construit en 1730 par Mme de  Brun  à M. de Bataille fils capitaine au régiment Dauphin, sur l'emplacement de l'ancien château seigneurial dont la douve est encore visible au sud du bâtiment, corps de logis rectangulaire à trois niveaux et attiques, fronton triangulaire saillant plein cintre en façade.","habitants":"Famille Damas de Cormaillon\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Maison forte de Venarey","gps":"","images":["../image/image_21/21_Venarey_1.jpg","../image/image_21/21_Venarey_2.jpg"]},"Consult_chateau_formulaire2882":{"id":"Consult_chateau_formulaire2882","dept":"21","canton":"Venarey-les-Laumes","commune":"Verrey-sous-Salmaise","nom":"Verrey","type":"Château","periode":"XVI","histoire":"VERREY; La famille de Thésut apparue à Verrey en 1550 lors du mariage de Bénigne J
