image/image_21/21_Dumesnil_Magnin_4.jpg","../image/image_21/21_Dumesnil_Magnin_5.jpg","../image/image_21/21_Dumesnil_Magnin_6.jpg","../image/image_21/21_Dumesnil_Magnin_7.jpg","../image/image_21/21_Dumesnil_Magnin_8.jpg"]},"Consult_chateau_formulaire472b":{"id":"Consult_chateau_formulaire472b","dept":"21","canton":"Aignay-le-Duc","commune":"Echalot","nom":"Echalot_Tarperon","type":"Château","periode":"XIX","histoire":"ECHALOT; seigneurie des Chastenay, Charles de Foucault, l'ermite  de Tamanrasset fit plusieurs séjours dans le château de cette seigneurie  dominant un petit étang.                                      Au hameau de Beaunotte le château de Tarperon de Soisick de Champsavin est à lorigine une forge où lon travaille le fer de 1630 à 1848. La maison de maître lui faisant face est construite fin XVIIIe siècle, quelques dizaines dannées avant quun aïeul  lagrandisse en manoir, transformé en chambres d'hôtes par cette même famille.","architecture":"Dans la commune d'Echalot la maison  Brisset construite en 1840 vit naître en 1843 Noël-Henri Rossin général de division qui se distinguera pendant la guerre de 1870, cette demeure fut transformé en hôpital chirurgical clandestin des forces françaises FFI pendant la dernière guerre.                                         \r\n Tarperon; manoir du XVIe siècle, corps de logis rectangulaire à deux niveaux et attiques flanqués de pavillons carrés aux extrémités et d'une tour ronde en angle.","habitants":"Noël-Henri Rossin\r\n        \"","divers":"Château d'Echalot et maison forte de Tarperon","gps":"","images":["../image/image_21/21_Echalot_Tarperon_1.jpg","../image/image_21/21_Echalot_Tarperon_2.jpg","../image/image_21/21_Echalot_Tarperon_3.jpg"]},"Consult_chateau_formulairec9da":{"id":"Consult_chateau_formulairec9da","dept":"21","canton":"Bligny-sur-Ouche","commune":"Ecutigny","nom":"Ecutigny","type":"Maison forte","periode":"XV","histoire":"ECUTIGNY; cité comme maison forte en 1168 par la seigneurie d'Ecutigny; Pierre d'Ecutigny vassaux  des seigneurs de Noyers sous l'autorité du baron d'Antigny, ce fief passa à Jean Peauldoye puis à Aubert Lobbat, son fils Philippe a transformé l'habitation en 1450 en château-fort, passa à Louis Breschart époux de Jeanne Lobbat, passera ensuite à Charles de Mypont  dont la petite-fille, Catherine le passa par alliance à  Antoine de Salins qui ce dernier se ruina à construire le château de Coraboeuf à sa mort  sa veuve en 1596 cède Ecutigny à Jean Jaquot trésorier de France et toujours par alliance de sa fille à Antoine Joly greffier en chef du parlement de Bourgogne et futur député des états généraux de 1614 Antoine fit reconstruire le corps de logis et apporta de nombreux aménagements pour lui donner son aspect actuel. le dernier de la lignée est Jean-Louis Malteste qui se sépare du château en le vendant à Charles Archdeacon,  agent de change parisien qui l'utilisera comme domaine agricole, puis passera en 1850 aux le Jeune toujours domaine agricole, puis aux Reffait et aux Chodron de Courcel et acquis en 1989 par monsieur Rochet qui fait revivre le château.","architecture":"Ecutigny; Maison forte à l'origine transformé en château-fort en 1450, quadrilatère cerné de douves, avec basse-cour à l'ouest relié par un pont-levis, une tour circulaire à l'angle nord-ouest, tourelle d'escalier située dans l'angle rentrant des corps de bâtiments. Le bâtiments en forme de L à trois niveaux, le corps de logis du XVIIIe siècle au sud fait face à l'entrée principale, un gros pavillon carré flanqué en angle sud-ouest, les murs d'enceinte ont été détruit.","habitants":"Aubert Lobbat\r\n        \"","divers":"Maison forte d'Ecutigny","gps":"","images":["../image/image_21/21_Ecutigny_1.jpg","../image/image_21/21_Ecutigny_2.jpg","../image/image_21/21_Ecutigny_3.jpg","../image/image_21/21_Ecutigny_4.jpg","../image/image_21/21_Ecutigny_5.jpg"]},"Consult_chateau_formulaire2d09":{"id":"Consult_chateau_formulaire2d09","dept":"21","canton":"Pouilly-en-Auxois","commune":"Eguilly","nom":"Eguilly_Blancey","type":"Château","periode":"XII","histoire":"EGUILLY; Par le biais des mariages, la propriété changea à plusieurs reprises de propriétaires et appartient à la famille d'Eguilly puis de Choiseul et Mac Mahon. En 1983, Roger Aubry, ancien négociant dart, et son épouse Françoise achètent le château tombé à l'abandon, restauré, il est devenu un centre international d'art moderne et contemporain\r\nBLANCEY, château  du XVIe siècle, l'édifice, qui n'est pas documenté avant l'époque moderne, le bas-relief portant la date 1584,  situé au-dessus du portail est sans doute en remploi. transformé en logis de France par Jean -Yves Silvestre.","architecture":"Éguilly, Construit sur le site dun château de bois gallo-romain, une voie gallo-romaine traverse dailleurs toujours actuellement la cour du château, la place forte du XIIe siècle aux solides remparts et aux six tours est progressivement aménagée vers le XVe siècle pour servir de lieu de résidence à un archevêque, les anciennes douves que l'on passe sur un pont dormant pour atteindre les restes de l'entrée qui porte les traces des rainures du pont-levis. Un portail et une porte piétonne permettent de passer l'enceinte trapézoïdale, flanquée par quatre tours, deux rondes qui dateraient du XIIe siècle et deux carrées. Un des bâtiments des communs est flanqué de deux tours circulaires percées de canonnières et de fenêtres de tir. Le logis de plan en L, comporte un étage et un étage de combles aux lucarnes à fronton triangulaire. \r\nBlancey, bâti à l'extrémité ouest du village, le château  se compose d'un corps de logis flanqué d'une tour demi hors oeuvre et de dépendances encadrées de deux tours circulaires, présente des vestiges d'une maison forte de la fin du Moyen-Age, le mur où s'inscrit le portail conserve la trace d'un ouvrage d'entrée défendu par un pont-levis à flèches et trois tours circulaires flanquent les bâtiments, dont deux au moins possèdent des éléments défensifs, le bas-relief portant la date 1584,  situé au-dessus du portail est sans doute en remploi. Le logis actuel paraît dater de la première moitié du XVIIe siècle, le bâtiment des communs et le portail isolé, du XVIIIe siècle.","habitants":"Famille d'Eguilly\r\n        \"","divers":"Forteresse d'Eguilly et château de Blancey","gps":"","images":["../image/image_21/21_Eguilly_Blancey_1.jpg","../image/image_21/21_Eguilly_Blancey_2.jpg","../image/image_21/21_Eguilly_Blancey_3.jpg","../image/image_21/21_Eguilly_Blancey_4.jpg","../image/image_21/21_Eguilly_Blancey_5.jpg","../image/image_21/21_Eguilly_Blancey_6.jpg"]},"Consult_chateau_formulaire9b67":{"id":"Consult_chateau_formulaire9b67","dept":"21","canton":"Nuits-St-Georges","commune":"Nuits-St-Georges","nom":"Entre_deux_Monts","type":"Château","periode":"XIV","histoire":"ENTRE-Deux-MONTS, cité au XIe siècle, les ducs de Bourgogne en furent les propriétaires de la ferme appelée \"Grange\" dont les revenus sont affectés aux  moines de l'abbaye de Citeaux. Passa aux XIVe siècle à Pierre d'Epernay sa descendance  les Chaumergy y firent construire la maison forte, par héritage la famille de Menessaire firent en 1550  édifier les ailes latérales. Le fief fut cédé en 1564 à Etienne Barbier d'Entre-deux-Monts riche bourgeois que sa descendance fit construire le corps de logis principal en 1641-1644, sous le règne de Louis XIV Jacques  Barbier trésorier de France à Dijon, en 1748 cette famille possède les  seigneuries  de Concoeur et de Corboin et celle de Ruelle cette famille prendra le nom de Barbier de Ruelle. A la Révolution Hubert-Toussaint-Joseph de Barbier président à la chambre des comptes de Dijon émigre avec son fils, les biens sont confisqués mais ces derniers purent arrêter la vente et récupérèrent leur biens  garderont le château jusqu'en 1856 qui passera à Louis Rocaut et depuis 1939 appartient à monsieur  Georges Postansque, père du propriétaire actuel.","architecture":"Entre-deux-Monts, au hameau de Concoeur, ferme au XIe siècle, maison forte au XIVe siècle puis château de trois corps de bâtiment remanié au XVI et XVIIe siècle, possédant en fond de cour un corps de logis principal à deux niveaux deux pavillons  perpendiculaires saillants aux extrémités et deux ailes en retour  construite en 1650 avec deux pavillons carrés toits à quatre pans coiffés de clocheton, était entouré de douves  qui subsiste encore sur trois côtés.","habitants":"Pierre d'Epernay \r\n        \"","divers":"Forteresse d'Entre-deux-Monts","gps":"","images":["../image/image_21/21_Entre_deux_Monts_1.jpg","../image/image_21/21_Entre_deux_Monts_2.jpg","../image/image_21/21_Entre_deux_Monts_3.jpg","../image/image_21/21_Entre_deux_Monts_4.jpg"]},"Consult_chateau_formulairee7f6-2":{"id":"Consult_chateau_formulairee7f6-2","dept":"21","canton":"Semur-en-Auxois","commune":"Epoisses","nom":"Epoisses","type":"Forteresse","periode":"XIII","histoire":"EPOISSES, résidence royale aux temps des mérovingiens, rois de Bourgogne qui   vivaient depuis le VIe siècle dans une villa, où la reine Brunehaut y séjourna.  Les ducs de Bourgogne  l'échangèrent en 1189 contre le château  de Montbard, fief des ducs de Bar. Le fief d'Epoisses passe en 1237 aux Mello qui firent construire la forteresse et la conserveront jusqu'en 1421, passa par alliance à la famille de Montagu, famille sans héritier.  Charles le Téméraire duc de Bourgogne le donna a son chancelier Guillaume Hugonnet qui périt tragiquement en 1477 pour avoir négocié la Bourgogne au Roi de France. Le château est saisi par Louis XI qui le donna  en 1478 au maréchal  de Hochberg seigneur d'Epoisses qui le remania en demeure agréable, sa fille Jeanne épouse le duc de Longueville, petit-fils de Dunois, bâtard d'Orléans, à sa mort le château passa  à son cousin Jacques de Savoie comte de Genevois, duc de Nemours qui s'en sépare en 1560 au profit de Imbert de la Platrière, maréchal de Bourdillon, mort sans postérité légua le château à sa nièce  Françoise de la Platrière épouse  de Louis d'Aussienville baron de Révillon, et fut occupé par les ligueurs entre 1589 et 1593. Erigé en marquisat en 1613 par succession et alliance  par  sa fille aux  La Grange d'Arquien et toujours par alliance à  Guillaume de Perch comte de Guitaut,  toujours dans cette famille, malgré la vente par le comité du salut public de la moitié du mobilier et la destruction de la moitié du château à la Révolution. Au XIXe siècle le château reçu des hôtes  illustres ( Henri IV, Châteaubriand, le duc d'Aumale et la marquise de Sévigné qui en fut l'hôte, etc ).","architecture":"Epoisses, ancienne forteresse  du XIIIe siècle dans les plaines de l'Auxois  construit sur l'emplacement d'une ancienne villa mérovingienne. La  forteresse reconstruite au XIXe siècle édifice octogonale irrégulier flanqué de sept tours dont quatre subsistent, fut avec double système de fortifications renforcés par les sept tours d'angles, certaines tours  ont conservé leur bases,  il reste de celle-ci la tour dite de  Bourdillon du Xe siècle, vaste basse-cour cantonnée de demi-tour comprenant une église et un colombier, commandant l'accès au château, entouré de douves avec un pont dormant aujourd'hui. Ce château a souffert des guerres de Religion et de la Révolution détruit a moitié, Au XVIIIe siècle la première partie de l'enceinte fut rasé pour faire une terrasse, reste face à la cour  deux bâtiments  disposé en fer à cheval cantonné de quatre tours.","habitants":"Seigneurs de Mello\r\n        \"","divers":"Forteresse d'Epoisses","gps":"","images":["../image/image_21/21_Epoisses_1.jpg","../image/image_21/21_Epoisses_2.jpg","../image/image_21/21_Epoisses_3.jpg","../image/image_21/21_Epoisses_4.jpg","../image/image_21/21_Epoisses_5.jpg","../image/image_21/21_Epoisses_6.jpg"]},"Consult_chateau_formulaire4a73-2":{"id":"Consult_chateau_formulaire4a73-2","dept":"21","canton":"Recey-sur-Ource","commune":"Essarois","nom":"Essarois_Montmoyen","type":"Château","periode":"XVII","histoire":"ESSAROIS; Le château a été construit à la fin du XVIe siècle par Jean Gaillard, bourgeois de Châtillon sur Seine devenu seigneur de Maisey et Montigny-Montfort, son fils Antoine, qui avait, après 1560, achevé de transformer en  fief le domaine  constitué  depuis le début de ce même siècle  par la famille Du Sel aux dépens des  seigneurs de Rochefort, dont la maison seigneuriale jouxtait l'église. Louise de Moléon, veuve de Joachim de  Chastenay, l'acquit en 1611, fit creuser des fossés dont l'existence semble avoir été éphémère, et obtint le droit de guet et de garde jusqu'alors dû par les habitants au château de Rochefort.  Qui c'est derniers  sont restés dans la maison de Chastenay jusqu'au milieu du XIXe siècle.                                                                                        A quelques kilomètre au sud, MONTMOYEN, château passa à une colonie puis racheté en 1985 après avoir été à l'abandon pendant vingt ans à Monsieur Hamy.","architecture":"Essarois, élégant petit château du XVIIe siècle, trois corps de logis, à deux niveaux et attiques, pavillons carrés en angles formant  deux ailes en retour d'équerre et coiffé d'un toit percé de  mansardes, a conservé un bel escalier de pierre, vestige d'une demeure renaissance.                                                           Montmoyen; Situé au centre du village , Château construit entre 1632 et 1647 de style Louis XIII,  le château du XVIIe siècle est composé dun corps de logis et de deux ailes en retour disposés en U. Derrière sétend un vaste parc dont le dessin  est attribué à Le Nôtre. Suite à une donation à une colonie des transformations l'on défigurés et perdis ses décors intérieures, situé au centre du village à côté dune église gothique avec de belles gargouilles.","habitants":"Jean Gaillard\r\n        \"","divers":"Château d'Essarois et de Montmoyen","gps":"","images":["../image/image_21/21_Essarois_Montmoyen_1.jpg","../image/image_21/21_Essarois_Montmoyen_2.jpg","../image/image_21/21_Essarois_Montmoyen_3.jpg","../image/image_21/21_Essarois_Montmoyen_4.jpg"]},"Consult_chateau_formulaire79d5":{"id":"Consult_chateau_formulaire79d5","dept":"21","canton":"Aignay-le-Duc","commune":"Etalante","nom":"Etalente","type":"Château","periode":"XV","histoire":"ETALANTE, a dabord fait partie du domaine des ducs de Bourgogne capétiens, puis du domaine royal, de nouveau dans le domaine ducal au XVe siècle, et enfin lorsque la Bourgogne fut rattachée à la France, Etalante rentra dans le domaine royal. Le roi confia la gestion dAignay et dEtalante à un seigneur engagiste. Les seigneurs  successifs nont jamais résidé à Etalante sauf le dernier, Claude Etienne.                                                             A Etalante maison forte de la Pothière du XVe siècle, était un rendez-vous de chasse du prince de condé, devenu ferme.","architecture":".\r\nEtalante; le bâtiment actuel du château présente des éléments du XVe et XVIe siècle et a profondément été remanié au XVIIIe siècle, quand les deux tourelles ont été rajoutées.Il domine le village de Etalante. \r\nPothière, maison forte ferme avec tour carrée, un cadran solaire sur angle.","habitants":"Claude Etienne\r\n        \"","divers":"Château d'Etalante et maison forte de Pothières","gps":"","images":["../image/image_21/21_Etalante_1.jpg","../image/image_21/21_Etalante_2.jpg","../image/image_21/21_Etalante_3.jpg","../image/image_21/21_Etalante_4.jpg","../image/image_21/21_Etalante_5.jpg"]},"Consult_chateau_formulairea026":{"id":"Consult_chateau_formulairea026","dept":"21","canton":"Gevrey-Chambertin","commune":"Etang-Vergy","nom":"Etang_Vergy","type":"Château","periode":"XVI","histoire":"ETANG-VERGY; Avec les autres possessions bourguignonnes, Vergy sera intégré au domaine royal en 1477, à la mort de Charles le Téméraire. Le château est aussitôt cédé à Guillaume IV de Vergy-Autrey par Louis XI. En 1609, suite à la participation du duc de Mayenne, gouverneur de la Bourgogne, à la Ligue de 1589, Henri IV fait entièrement raser le château. Gabrielle de Vergy, dame de Fayel. Elle est, selon la légende, l'amante de Raoul de Coucy. Celui-ci, avant de mourir en Terre Sainte, chargea son écuyer de porter, après sa mort, son cur à la dame qu'il aimait. L'écuyer fut surpris par l'époux au moment où il s'acquittait de sa mission. Pour se venger, il prit le cur et le fit manger à sa femme, qui, instruite trop tard de son malheur, jura de ne plus prendre de nourriture et se laissa mourir de faim. Cette aventure a fourni à Pierre Laurent de Belloy le sujet de sa tragédie Gabrielle de Vergy. Jean III de Vergy, sénéchal maréchal et gouverneur du comté de Bourgogne. Antoine de Vergy (1375-1439), comte de Dammartin, chambellan du roi, maréchal de France, chevalier de la Toison dOr.\r\nAujourd'hui le château de Charmont société civile immobilière.          TERNANT, le principal propriétaire et seigneur de la terre de Ternant fut du XI au XVIIe siècle, le chapitre de Vergy, auquel  succéda celui de Nuits, qui vendit en 1675, à Louis de Pélissier, déjà propriétaires d'autres biens à Ternant, c'est  lui qui est le constructeur de la  maison basse seigneuriale, bâtie sur les fondations d'une  demeure détruite en 1560, puis les Pélissier vendirent le fief en 1740 à Amé-François Chavansot Berbis. En 1773,  le propriétaire en était André-Charles Dubard, conseiller à la cour des comptes, sa veuve dut vendre la demeure comme bien national à la famille Lagneau. Autres châteaux Saint-Père, Congé et l'Hulotière.","architecture":"Etang-Vergy; Du château des Vergy détruit au XVe siècle , il ne reste plus rien, dans la commune le château de Charmont petit manoir à deux niveaux et attiques  flanqué de deux tourelles en façade, le château de Saint-Père corps de logis rectangulaire à deux niveaux avec avant corps en façade plein cintre à trois niveaux, le château de Congé  et le château de la Hulotière corps de logis rectangulaire à un niveau et attiques flanqué de deux pavillons saillants aux extrémités à toiture vernissé, hôtel. Ternant corps de logis rectangulaire à deux niveaux.","habitants":"Guillaume IV de Vergy-Autrey                                                    \r\nLouis de Pélissier\r\n        \"","divers":"Ruines féodales  et château de Charmont, château d'Etang-Vergy, deTernant, de Saint-Père de la Hulotière.","gps":"","images":["../image/image_21/21_Etang_Vergy_1.jpg","../image/image_21/21_Etang_Vergy_2.jpg","../image/image_21/21_Etang_Vergy_3.jpg","../image/image_21/21_Etang_Vergy_4.jpg","../image/image_21/21_Etang_Vergy_5.jpg","../image/image_21/21_Etang_Vergy_6.jpg"]},"Consult_chateau_formulairef236":{"id":"Consult_chateau_formulairef236","dept":"21","canton":"Gevrey-Chambertin","commune":"Fenay","nom":"Fenay_Saulon","type":"Château","periode":"XVII","histoire":"FENAY-SAULON, au XIVe siècle Fénay et Saulon sont la propriété du seigneur de Talmay, notamment Hugues de Pontailler. Au XVe siècle, les seigneurs de Saulon, à la famille de Saulx, dominent aussi Fénay. Ainsi, Étard de Saulx, également seigneur d'Orain, mort en 1477. Domois, dont-il existe un petit château, le lieu est toujours dépendant des seigneurs de Perrigny,  de Bauffremont puis aux Rolin. En 1576, la seigneurie de Saulon est reprise par Jean de Neufchese, fils de Bénigne de Saulx, suit le statut de Perrigny et change plusieurs fois de mains à l'occasion de mariages, Nicolas Chambellan épouse l'héritière désargentée Suzanne Rolin,  puis, après 1583 aux d'Épinac, Gaspard d'Épinac et Pernes Claude, fille de Gaspard d'Épinac, épouse le colonel d'infanterie Louis de Pernes en 1620. Au début du XVIIe siècle, la seigneurie de Saulon, avec Fénay et une petite partie de Chevigny, achetée à Neufchese par Jean Morin, lieutenant général au baillage de Dijon. En 1650, Nicolas Gagne, trésorier général de la généralité de Bourgogne, achète à Claude d'Épinac, veuve de Louis de Pernes, les domaines de Domois et de Perrigny, sa famille sera alors appelée Gagne de Perrigny, erigée en comté, celui-ci est rapidement réuni au comté de Saulon par Antoine-Jean Gagne qui rassemble ainsi tous ses fiefs en un seul domaine. Le comte n'ayant pas d'enfant, toutes ces seigneuries passent, à son décès en 1783, au jeune Anne-Charles de Clermont (1773-1855), de la lignée des marquis de Montoison, maison de Clermont-Tonnerre. Destiné à la carrière militaire, ce seigneur émigre à la Révolution pour combattre dans l'armée des princes. Le fief est transmis l'année suivante à Jacques Legrand, fils de Bénigne et président à la chambre des comptes de Dijon.","architecture":"Saulon la chapelle proche de Fenay.  La première maison forte de Layer a sans doute été bâtie à la fin du XIIe siècle, sur une butte circulaire  entourée d'un double fossé,  appartenant  au duc Hugues de Laye. Une tour carrée fut édifiée au XIIIe siècle. La terre passa ensuite à divers personnages avant d'appartenir au début du XVIe siècle à Jeanne de Saint-Seine qui bâtit contre la tour une tourelle d'escalier en brique qui desservait également  un bâtiment contigu en bois. Des constructions en pierre furent substituées aux bâtiments de bois au cours du  XVIe siècle. Au XVIIe siècle Layer appartient à la famille de La Tournelle ensuite, au XVIIIe siècle, aux Gagne de Perrigny. La maison forte est devenue le centre d'une exploitation agricole depuis le début du XIXe siècle.  Fenay-Saulon; Le monticule avoisinant la fontaine de Chevigny pourrait représenter l'emplacement d'un château des seigneurs de Chaudenay, c'est peut-être sur ce mamelon qu'à été construit le fort de Beauregard.                                                             \r\n  Saulon  date du XIV- XVIIe siècle, offrant une vue sur le jardin du corps de logis rectangulaire à trois niveaux avec attiques flanqués aux extrémités de deux pavillons saillants de mêmes niveaux.","habitants":"maison de Clermont-Tonnerre\r\n        \"","divers":"Château de Saulon et fort de Beauregard à Fenay","gps":"","images":["../image/image_21/21_Fenay_Saulon_1.jpg","../image/image_21/21_Fenay_Saulon_2.jpg","../image/image_21/21_Fenay_Saulon_3.jpg"]},"Consult_chateau_formulairece7d-2":{"id":"Consult_chateau_formulairece7d-2","dept":"21","canton":"Gevrey-Chambertin","commune":"Fixin","nom":"Fixin_Perriere","type":"Maison forte","periode":"XVIII","histoire":"PERRIERE manoir à Fixin; Jules Violle, inventeur du calorimètre à refroidissement, principe de base de la bouteille isotherme, décédé le 12 septembre 1923 à Fixin.\r\n Claude Noisot (1757-1861), ancien grenadier de l'empereur, sous-adjudant-major du bataillon Napoléon Bonaparte à l'île d'Elbe, il donna son nom au musée et parc Noisot dans lequel a été construit un musée en réduction une approche de la villa Elboise de San-Martino et la célèbre sculpture de son ami François Rude. Le  réveil de Napoléon à l'immortalité.  Mort à Fixin le 14 avril 1861, il aurait voulu être enterré debout sabre au clair face à l'empereur mais les difficultés rencontrées pour creuser la fosse dans le rocher très dur ne permit pas de satisfaire cette dernière volonté. Le grenadier dut être couché au cur du parc qui porte désormais son nom.","architecture":"Manoir de la Perrière;  du XIVe siècle, corps de logis rectangulaire à un niveau et attique tourelle sur face avant.","habitants":"Claude Noisot \r\n        \"","divers":"Château de la Perrière à Fixin","gps":"","images":["../image/image_21/21_Fixin_Perriere_1.jpg","../image/image_21/21_Fixin_Perriere_2.jpg","../image/image_21/21_Fixin_Perriere_3.jpg"]},"Consult_chateau_formulairefbd8":{"id":"Consult_chateau_formulairefbd8","dept":"21","canton":"Venarey-les-Laumes","commune":"Flavigny-sur-Ozerain","nom":"Flavigny","type":"Forteresse","periode":"XIII","histoire":"FLAVIGNY; Dès l'origine, Flavigny est le centre d'une région s'étendant sur un vaste territoire ( Dijon-Langres-Autun). C'est une seigneurie ecclésiastique, qui mettra en place sa juridiction et son administration financière. Les abbés qui se succèdent à la tête de l'abbaye exercent à la fois le  pouvoir temporel et le pouvoir politique qui, souvent prend le pas sur la mission religieuse.\r\nLe village tient aussi son origine d'une abbaye bénédictine fondée en 719 par Wideradus, fils de Corbon, le chef burgond du peuple germano-scandinave, puis rénovée au XVe siècle par Quentin Ménard, archevêque de Besançon et natif du lieu. C'est la règle bénédictine écrite par Saint-Benoît de Nursie au VIe siècle qui organise la vie quotidienne des moines. En 1590, Henri IV crée un parlement rival de celui de Dijon, qui ne le reconnaît pas pour roi, à Flavigny, où se rendent les parlementaires qui lui sont fidèles. L'hôtel particulier du marquis de Souhey, construit en 1700, est aujourd'hui occupé par les moines bénédictins de l'abbaye Saint-Joseph de Clairval.  Dans le même temps, nobles et bourgeois se font bâtir de fastueuses demeures tel le logis du grand bailli d'Auxois qui en 1848 deviendra le noviciat des frères prêcheurs fondé par le dominicain Lacordaire.","architecture":"Flavigny; On entre par la porte du Bourg du XIVe siècle, en longeant un moment l'ancien hôtel particulier de Coutier de Souhey, beau bâtiment du XVIIIe siècle, aujourd'hui devenu l'abbaye bénédictine St Joseph de Clairval.                                            Les XIVe et XVe siècle voient se poursuivre les travaux de fortifications et de constructions, la porte du Bourg et son pont-levis sont bâtis au XVe siècle, les demeures avec tourelles d'escalier en pierre de taille en sont le témoignage, la ville est en expansion jusqu'à la Renaissance.                                         L'abbaye bénédictine  de Saint-Pierre, fondée  au VIIIe siècle, a été reconstruite au XVIIe siècle. Elle comporte des vestiges d'époque carolingienne, la crypte Sainte-Reine.","habitants":"Seigneurie ecclésiastique\r\n        \r\n        \"","divers":"Village fortifié de Flavigny sur Ozerain","gps":"","images":["../image/image_21/21_Flavigny_1.jpg","../image/image_21/21_Flavigny_2.jpg","../image/image_21/21_Flavigny_3.jpg","../image/image_21/21_Flavigny_4.jpg","../image/image_21/21_Flavigny_5.jpg","../image/image_21/21_Flavigny_6.jpg"]},"Consult_chateau_formulaire1228-2":{"id":"Consult_chateau_formulaire1228-2","dept":"21","canton":"Semur-en-Auxois","commune":"Flée","nom":"Flee","type":"Château","periode":"XVIII","histoire":"FLEE;  Construit en 1760 dans le style parisien par Louis Dupille de Saint-Séverin, trésorier du roi Louis XV. Le château fut le lieu de fêtes et de réceptions fastueuses, il fut malmené à la Révolution, et une aile fut démolie en 1932, puis il tomba en décrépitude,  mais sauvé de la ruine en 1980 par Mr et Mme   Bach, qui le restaurent avec goût et dans le respect de l'art.                                                                    A deux kilomètre le château de Roilly Marcault.","architecture":"Flée château du XVIIIe siècle,  dominant un parc de 10 hectares, le château vous livre le romantisme et le charme du siècle des lumières de lancien Duché de Bourgogne. Lescalier dhonneur est très particulier car il comporte une marche par siècle et le perron donne accès à létage noble du XVIIIe siècle,  escalier monumental de dix-huit marches.                                                              Roilly-Marcault corp de logis rectangulaire à deux niveaux et attiques, dans la partie central avant corps en légère saillit avec fronton triangulaire, sur les extrémités pavillons saillants de même niveaux.","habitants":"Mr et Mme  Bach\r\n        \"","divers":"Château de Flée et de Roilly-Marcault","gps":"","images":["../image/image_21/21_Flee_1.jpg","../image/image_21/21_Flee_2.jpg","../image/image_21/21_Flee_3.jpg","../image/image_21/21_Flee_4.jpg","../image/image_21/21_Flee_5.jpg","../image/image_21/21_Flee_6.jpg","../image/image_21/21_Flee_7.jpg"]},"Consult_chateau_formulaire88f1":{"id":"Consult_chateau_formulaire88f1","dept":"21","canton":"Fontaine-Française","commune":"Fontaine-Française","nom":"Fontaine_Francaise","type":"Château","periode":"XVIII","histoire":"FONTAINE-FRANCAISE: Cité au Xe siècle propriété de la famille de Flouvent, qui ces derniers firent construire la forteresse au XIe siècle, le fief passa en 1228 à l'évêché de Langres puis par alliance à Guillaume de Vergy, à la mort du dernier des Vergy en 1427 le fief revient  à Henriette de Vergy qui épouse successivement Jean Ier de Longwy puis Jean de Vienne. L'héritier du fief sera son petit fils Jean II de Longwy qui résidera au château de Pagny, le château sera en indivis entre Jean III de Longwy et son frère Claude de Longwy évêques de Langres et cardinal de Givry. La succession passera à Françoise de Longwy qui passera par alliance à Phillibert de Chabot-Brion, comte de Charny amiral de France restera dans sa descendance et sera légué à Marie de Loménie femme de Jacques Chabot. Marie le transmet à sa fille de son premier mariage Andrée de Vivonne  qui passera par alliance à François de la Rochefoucauld,  le vend  en 1656  à Antoine d'Arnaud, le légua à Cathetine de Mazel sa nièce, leur fille héritière  le passe par alliance à Louis Ier de la Tour-du-Pin de la Charce. En 1748 leur petite-fille Anne-Madeleine-Louise-Charlotte de la Tour-du-Pin hérite et l'apporte par alliance à Marie-François Boullioud de Saint-Julien, receveur général du clergé qui fit reconstruire le château de 1754-1761. Le château devient un centre  d'une vie artistique et mondaine lieu de rencontre de philosophe (Voltaire, Mme Récamier et Mme Staël) et en 1820 à la mort de madame de Saint-Julien le château revient à l'un de ses petits neveux René III de la Tour du Pin Gouvernet de la Charce époux d'une fille du prince de Monaco, Honorine de Grimaldi, leur fils fit d'importants travaux en 1840 passera par succession aux comtes Chabrillan et aujourd'hui à la comtesse de Caumont La Force, née Chabrillan.","architecture":"Fontaine-Française, de maison forte au Xe siècle passa en forteresse au XIe siècle, agrandit en 1228 et détruit pour être reconstruite par l'architecte parisien Souhard  entre 1754 et 1761 de style classique avec empreinte sévère d'un corps de logis au centre évoquant une école militaire  avec imposant dôme de plan carré qui domine sur l'une et l'autre façade  un avant-corps à fronton triangulaire, l'édifice, flanqué de deux courtes ailes en retour sur la cour d'honneur, est précédé d'un bel escalier à double révolution, côté jardin, le corps de logis central élevé sur soubassement  de trois niveaux, et édification des communs en 1767 avec un  parc, n'a subit aucun problème à la Révolution, le château fut restauré de 1843 à 1848.","habitants":"Marie-François Boullioud de Saint-Julien\r\n        \"","divers":"Château de Fontaine Française","gps":"","images":["../image/image_21/21_Fontaine_Francaise_1.jpg","../image/image_21/21_Fontaine_Francaise_2.jpg","../image/image_21/21_Fontaine_Francaise_3.jpg","../image/image_21/21_Fontaine_Francaise_4.jpg"]},"Consult_chateau_formulaire7a34-2":{"id":"Consult_chateau_formulaire7a34-2","dept":"21","canton":"Montbard","commune":"Marmagne","nom":"Fontenay","type":"Abbaye","periode":"XII","histoire":"FONTENAY: Sous son abbatiat, en 1131, Fontenay fonde labbaye des Écharlis. Il reçoit, vraisemblablement en 1145, Ebrard ou Everard de Calne, évêque de Norwich , ancien chapelain du roi Henri Ier de Beauclerc, qui se retire à Fontenay, Le troisième abbé est Arnaud de Bourgogne . Bien qu'absent des généalogies ducales, certains auteurs font de lui un fils du duc Hugues II de Bourgogne, et donc un frère du duc Eudes II de Bourgogne, de Henri, évêque d'Autun et de Gautier, évêque de Langres. En 1170, le pape Alexandre III  confirme l'abbaye dans ses biens et permet aux moines d'élire un abbé. À cette époque un hôtel particulier est bâti à Montbard pour cet abbé, le Petit Fontenet, qui sera plus tard occupé par Buffon. En 1269, Fontenay devient abbaye royale. Les rois Jean II, puis Charles VIII, et Louis XII continueront ces largesses. Malgré cette protection royale, elle est pillée à plusieurs reprises pendant les guerres qui ravagent la Bourgogne. Elle jouit d'une influence croissante jusqu'au XVIe siècle. Mais l'instauration du régime supprime l'élection des abbés par les moines au profit de l'arbitraire royal, marque le début du déclin. L'hôtel particulier de Montbard, le Petit Fontenet est vendu en 1768 au naturaliste Buffon qui y installe sa bibliothèque et son laboratoire de chimie. La Révolution ne chasse qu'une dizaine de moines de l'abbaye alors qu'elle en avait abrité plusieurs centaines. En 1791, l'abbaye est vendue, avec toutes ses terres à Claude Hugot qui la transforme en papeterie. En 1820, elle devient la propriété d'Élie de Montgolfier. En 1906, l'abbaye est rachetée par Édouard Aynard, grand-père d'Andrée Putman, banquier lyonnais et amateur d'art. \r\n En 2006, elle est toujours la propriété de la famille Aynard. On peut en visiter une grande partie.","architecture":"Fontenay, aux XIIe et XIIIe siècle, l'abbaye est très prospère, les moines y développent des activités métallurgiques et sidérurgiques À partir du XVIIIe siècle, l'abbaye de Fontenay n'est plus que l'ombre de ce qu'elle avait été, les moines sont obligés, faute de pouvoir l'entretenir financièrement, de détruire le réfectoire. Entre 1905 et 1911 de grands travaux de restauration sont entrepris pour lui rendre son aspect médiéval. Les usines sont démolies, le sol de l'église dégagé sur 80 cm et l'aile gauche du cloître est remontée pierre par pierre. En 1981, l'abbaye est inscrite au patrimoine mondial de l'UNESCO.","habitants":"Famille Aynard de Montgolfier\r\n        \"","divers":"Abbaye cistercienne de Fontenay","gps":"","images":["../image/image_21/21_Fontenay_1.jpg","../image/image_21/21_Fontenay_2.jpg","../image/image_21/21_Fontenay_3.jpg","../image/image_21/21_Fontenay_4.jpg"]},"Consult_chateau_formulaire20a2":{"id":"Consult_chateau_formulaire20a2","dept":"21","canton":"Venarey-les-Laumes","commune":"Frolois","nom":"Frolois","type":"Château","periode":"XV","histoire":"FROLOIS; cette demeure fut au Xe siècle le berceau de la puissante famille de Frolois, elle fut transmise par alliance aux Grancey, aux Vergy et aux Pontaillier Talmay,  vendue en 1507 à Guy de Rochefort,  chancelier de France. En 1683,  Pierre Duban de la Feuillée,  lieutenant général des Armées Royales acquit la baronerie, une des plus ancienne de Bourgogne, que le Roi Louis XIV érigea en comté en 1684.  Intérieur chaleureux où chaque époque a laissé son empreinte. Au premier étage chambre d'Antoine de Vergy,   Guy de Crécy (1894-1944), résistant français, plus jeune lieutenant de France à la guerre de 1914, dénoncé à Frolois, déporté et mort au camp de concentration de Neuengamme (Allemagne).","architecture":"Frolois, situé sur un promontoire rocheux surplombant la vallée du Vau, ancien château fort construit sur un éperon rocheux, entouré de deux étages de remparts en terrasse.  Le fossé a sec, entourant l'église et le château, a été comblé au XIXe siècle, d'époque Renaissance. Au rez-de-chaussée, salle du XVIIe siècle et grand salon du XVIIIe siècle.  le château comprend un corps de logis avec une aile occupée au premier étage par la chambre d'Antoine de Vergy. Au rez-de-chaussée.","habitants":"Seigneur de Frolois\r\n        \"","divers":"forteresse de Frolois perchée","gps":"","images":["../image/image_21/21_Frolois_1.jpg","../image/image_21/21_Frolois_2.jpg","../image/image_21/21_Frolois_3.jpg","../image/image_21/21_Frolois_4.jpg"]},"Consult_chateau_formulaire3237":{"id":"Consult_chateau_formulaire3237","dept":"21","canton":"Nolay","commune":"St-Aubin","nom":"Gamay","type":"Château","periode":"XIII","histoire":"GAMAY, le château fort fut construit vers la fin du XIIIe siècle, puis passa entre divers propriétaires avant d'être saisi et  vendu en l'an III sous Claude-Etienne Bernard de Sassenay, quatorze habitants de la commune entreprirent la démolition  de la maison forte. Le restant fut racheté à la fin du XIXe siècle  par la famille de Chauvigny de Blot, qui en entreprit la restauration. La maison forte de Gamay était la possession du chancelier Nicolas Rolin.","architecture":"Gamay, château fort avec cour, enceinte, fossé, donjon, colombier. Il s'agit d'une maison forte bourguignonne, demeure seigneuriale du XIIIe siècle, date de construction du donjon et du corps de logis remanié au XVe siècle lors de l'ajout de l'aile basse. La tourelle d'escalier a été construite après. Le château a été transformé en ferme et les bâtiments construits au XIXe siècle sont représentatifs de l'architecture rurale de cette époque.","habitants":"Famille de Chauvigny de Blot\r\n        \"","divers":"Château de Gamay","gps":"","images":["../image/image_21/21_Gamay_1.jpg","../image/image_21/21_Gamay_2.jpg"]},"Consult_chateau_formulaire3204":{"id":"Consult_chateau_formulaire3204","dept":"21","canton":"Is-sur-Tille","commune":"Gemeaux","nom":"Gemeaux","type":"Château","periode":"XVIII","histoire":"GEMEAUX,  les premiers seigneurs furent les évêques de Langres. Puis Gemeaux appartient successivement en 1050 à la maison de Til-Châtel, en 1280  à la famille de Grancey. Puis subit  les coquillards, voleurs et assassins en 1450   et enfin, en 1513, les envahisseurs suisses. En 1680, Jean Mochot achète la seigneurie de Gemeaux au marquis  de Vitteaux, et il se fit construire une nouvelle demeure au bas du village. Son fils, Jacques, la vendit en 1711 à Jean-Claude Loppin, conseiller au parlement, dont le fils, Charles-Catherine, l'agrandit et l'embellit, de 1740 à 1749, sur des plans de l'architecte Verniquet et en aménagea les jardins. La décoration intérieure et extérieure a, de nouveau, été modifiée au XIXe siècle par la famille Loppin qui a conservé le château jusqu'en 1970.","architecture":"Gemeaux; Le château fort de Gemeaux fut achevé en 1305. Il comprenait une enceinte de pierre avec créneaux, flanquée de plusieurs tours. Deux portes dont l'une avec pont-levis, donnait l'une sur le village. Une description de 1686 indique le château en ruine.   La place forte de Gemeaux connut de nombreuses attaques et occupations. La guerre de cent ans et ces pilleurs  en 1360, puis les barbares et leur occupation de 1437 à 1444.                                     Château du XVIIIe siècle corps de logis rectangulaire à deux étages et attiques flanqué de quatre tourelles carrées en angles avec prolongement d'un étage balconnet en accolade à ses tourelles.","habitants":"Jean-Claude Loppin\r\n        \"","divers":"Ruines féodales et château de Gemeaux","gps":"","images":["../image/image_21/21_Gemeaux_1.jpg","../image/image_21/21_Gemeaux_2.jpg","../image/image_21/21_Gemeaux_3.jpg"]},"Consult_chateau_formulairecc00":{"id":"Consult_chateau_formulairecc00","dept":"21","canton":"Genlis","commune":"Genlis","nom":"Genlis","type":"Château","periode":"XVIII","histoire":"GENLIS, le fief dépendait du féodal à la Révolution aux  seigneurs de Mirebeau, au XIe siècle  à travers les seigneurs de Janly, passa à la maison de Mailly, aux de Montmorot, aux de Tenarre, aux de Faulquier, aux de Bousseval, aux du Blé, aux de Nagu qui achetèrent le domaine, aux de Valon qui entreprennent la construction en 1680 et aux de Fyot qui  la terminèrent  en 1742, transformé en marquisat, ces derniers durent émigrés à la Révolution  et en 2005 le maire accorde la transformation du château en  centre médico-psychologique.                                   A quelques kilomètres au sud le château de Marliens dans la commune de ce nom, appartenait fin XIXe siècle au baron de Jessé de Levas, vieille famille de la chevalerie française de la province du Languedoc.","architecture":"Genlis, de la maison forte  des seigneurs il ne reste plus rien, seul le château moderne du XVII-XVIIIe siècle au centre de la ville  à deux niveaux et attiques, un avant corps à deux niveaux s'est dressé sur la façade ouest  avec fronton triangulaire.                                        Marliens, corps de logis rectangulaire à deux niveaux et attiques, toitures à la Mansard, pigeonnier dans le parc.","habitants":"Famille Fyot\r\n        \"","divers":"Château de Genlis et de Marliens","gps":"","images":["../image/image_21/21_Genlis_1.jpg","../image/image_21/21_Genlis_2.jpg","../image/image_21/21_Genlis_3.jpg","../image/image_21/21_Genlis_4.jpg","../image/image_21/21_Genlis_5.jpg","../image/image_21/21_Genlis_6.jpg"]},"Consult_chateau_formulaire6a2d-2":{"id":"Consult_chateau_formulaire6a2d-2","dept":"21","canton":"Gevrey-Chambertin","commune":"Gevrey-Chambertin","nom":"Gevrey_Chambertin","type":"Forteresse","periode":"XV","histoire":"GEVREY-CHAMBERTIN,  au XIe siècle le domaine de Gevrey devient la propriété de l'abbaye de Cluny, en 1280, Yves de Chazan abbé terminera la construction  de la fortification de l'édifice, pour sauvegarder le vignoble attestée depuis le XIe siècle malgré cela des pillages et des destructions de 1569 à 1576, qui entraîneront en 1578 une reconstruction de nouveaux bâtiments qui tomberont en ruines à la fin du XVIIIe siècle. Vendu comme bien national en 1791, il est acquis par des particuliers et finalement racheté en 1860 par la famille Masson qui fait fructifier le vignoble et a fait des agrandissements de communs. Acquit en  2012 par un investisseur chinois, Louis Ng Chi Sing, propriétaire de salles de jeux à Macao. Le nouveau propriétaire monsieur R.Masson a déclaré son intention de restaurer le château et a confié la gestion des vignes au domaine d'Armand Rousseau, un des viticulteurs de la commune.","architecture":"Gevrey-Chambertin, forteresse  du X-XVe siècle quadrangulaire fut remaniée après les multiples ravages et incendies des XIIe et XIIIe siècles, pour ses raisons, vers 1257, de fortifier l'ancien prieuré. Celui-ci devient un \"castrum\" avec fossés remplis d'eau, pont-levis, prisons et hautes murailles portant chemin de ronde. Souvent ravagé et pillé, même incendié mais restauré à plusieurs reprises, il conserve le caractère sévère et rude de l'architecture romane bourguignonne. Ce château se caractérise par une grosse tour carré de cinq étages  ayant perdu ses créneaux, couverte de tuiles plates situé à l'angle sud-est de l'enceinte, un bâtiment rectangulaire avec arcades soutenant l'étage relié à une autre tour carrée, le corps de logis, rectangulaire pourvue d'une tourelle d'escalier hors-oeuvre.","habitants":"abbé Yves de Chazan\r\n        \"","divers":"Forteresse de Gevrey-Chambertin","gps":"","images":["../image/image_21/21_Gevrey_Chambertin_1.jpg","../image/image_21/21_Gevrey_Chambertin_2.jpg","../image/image_21/21_Gevrey_Chambertin_3.jpg","../image/image_21/21_Gevrey_Chambertin_4.jpg","../image/image_21/21_Gevrey_Chambertin_5.jpg"]},"Consult_chateau_formulaire3ea2":{"id":"Consult_chateau_formulaire3ea2","dept":"21","canton":"Nuits-St-Georges","commune":"Gilly-les-Citeaux","nom":"Gilly_les_Citeaux","type":"Abbaye","periode":"XIV","histoire":"GILLY,  ancien prieuré de bénédictins sous la coupe de Germain, évêque de Paris, Gilly fut bien plus tard  vendu aux cisterciens voisins. Au XVIe siècle, Nicolas Boucherat II,  abbé de Cîteaux, décida d'en faire  une maison de plaisance. Lui ayant succédé  en 1625, Pierre de Nivelle  poursuivit l'oeuvre d'embellissement. En 1790, les propriétés des moines cisterciens furent déclarées bien national. Plusieurs propriétaires se succédèrent, installant des fermiers et des ouvriers dans l'abbatiale, en 1818 acquis par le célèbre financier Ouvrard pour son fils Julien qui devient également propriétaire de Clos-Vougeot, en 1861 les Rochechouart ses neveux et héritiers qui le transmettent à la famille Grangier, utilisé comme ferme jusqu'en 1974 acquit par  le conseil général de la Côte d'Or pour le restaurer et le transformer en château-théâtre, en  1978, classé monument historique.\r\n En 1985, René et Simone Traversac achètent la demeure et effectuent des travaux pour la restaurer et la transformer en hôtel confortable et luxueux,  en septembre 1988.","architecture":"Gilly; cette demeure cistercienne du XIVe siècle  fortifié et reconstruite au XVIIe siècle sur l'emplacement de l'ancienne bâtisse, entourée de douves est composé de sept pavillons carrés et restauration  des bâtiments agricoles, sur le front-Est un long bâtiment  à un étage est relié, par une courte aile en retour d'équerre, au logis abbatial élevé sur deux étages carrés et un étage de comble, l'aile nord aujourd'hui détruite possédait la porte d'entrée, défendue par un pont-levis,  de vastes pièces de réception, dun restaurant à croisées dogives  soutenues par des piliers élancés, situé dans lancien cellier des moines, dune terrasse, un jardin à la française bordé par la Vouge, petite rivière bucolique, un restaurant le Clos Prieur.","habitants":"Nicolas Boucherat II\r\n        \"","divers":"Château de Gilly les Citeaux","gps":"","images":["../image/image_21/21_Gilly_les_Citeaux_1.jpg","../image/image_21/21_Gilly_les_Citeaux_2.jpg","../image/image_21/21_Gilly_les_Citeaux_3.jpg","../image/image_21/21_Gilly_les_Citeaux_4.jpg"]},"Consult_chateau_formulairec0e5":{"id":"Consult_chateau_formulairec0e5","dept":"21","canton":"Dijon","commune":"Corcelles-les-Monts","nom":"Gouville","type":"Château","periode":"XVI","histoire":"GOUVILLE, au XVIe siècle propriété de la famille de Macheco , puis de la famille Joly au XVIIe siècle, le domaine dit \"La  Grange du Pré\" ou \"Rente du Prey\", ne prit que la dénomination de \"Gouville\", qu'au XVIIIe siècle Goux-Ville jusqu'en 1778. Bénigne Legouz de Gerland, grand bailli d'épée du Dijonnais, seigneur de Jancigny et Gerland, l'acheta en 1747 à Hector-Bernard Joly, fils de Georges-Bernard Joly, conseiller au parlement de Bourgogne.  Legouz de Gerland vendit Gouville en 1759 à Mme de Chintré, née Henriette Marie de l'Oriol. Dès lors, il resta la propriété de la famille de l'Oriol jusqu'en 1869, date à laquelle mademoiselle Kolly de Montgazon, née   Duport de l'Oriol, le céda à M. Darcy, dont les propriétaires actuels sont les descendants.","architecture":"Gouville, corps de logis rectangulaire à deux niveaux et attiques flanqué de quatre pavillons carrés en angles à toits pointus.","habitants":"Famille Joly\r\n        \"","divers":"Château de Gouville","gps":"","images":["../image/image_21/21_Gouville_1.jpg"]},"Consult_chateau_formulairea244":{"id":"Consult_chateau_formulairea244","dept":"21","canton":"Grancey-le-Château-Neuvelle","commune":"Grancey-le-Château-Neuvelle","nom":"Grancey_Courlon","type":"Château","periode":"XVII","histoire":"GRANCEY. Au Moyen-Age, le fief  dépendait des évêques de Langres, après être assiégé et ruiné de 1112 à 1113 par les  ducs de Bourgogne qui s'en approprièrent  et l'inféodèrent. Ponce de Grancey connétable de Bourgogne le reconstruisit, puis fut démantelée en 1434 et laissé à l'abandon par ces propriétaires, les Châteauvillain, les La Baume Montrevel, puis les Hautemer de Fervaques qui firent érigés la terre en duché en 1611. La fille de Guillaume de Fervaques maréchal hérite de Grancey en 1613, passa par alliance à Pierre Rouxel de Médavy maréchal également, Jacques-Léonor Rouxel second maréchal de Médavy  entreprend  en 1642 de relever le château ruiné, ce château resta dans cette famille jusqu'en 1730 dont la veuve du dernier des Médavy le  vend   à sa nièce Marie-Catherine Aubert qui le léguera à son frère le marquis de Tourny, intendant à Bordeaux, passera par héritage en 1788 à la famille de Mandat, toujours dans la famille du baron  des Mandat-Grancey.                                                                  \r\n Dans le canton BARJON, MEIX dont je n'ai pas d'informations et les vestiges de SALIVES, trois communes assez proche l'une de l'\"autre. Salives il ne reste que le donjon et les remparts, d'une longueur de 1,4 km, ils enserrent la ville qui était le siège du prieuré de Valduc, fondé en 1246 et où les ducs de Bourgogne y possédaient un château fort.                                        \r\n COURLON, dans la commune,  était en 1750 la propriété de la famille de le Bouleur.","architecture":"Grancey;  Construit sur les restes d'un château fort plusieurs fois rebâti du XII au XVIe siècle, première reconstruction de la forteresse à la fin du XIIe siècle dominant la vallée de la Haute-Tille, reste d'une plate forme cantonnée de tours arasées  datant du Xe siècle qui sert d'assises, démantelée  en 1434 et laissé à l'abandon, reconstruit de nouveau au XVIIIe siècle, de plan rectangulaire  de style versaillais à deux niveaux avec attiques, toit plat avec balustrade supportant aux angles des trophées en amortissement, le corps de logis côté cour  possède un avant-corps surmonté d'un fronton triangulaire et est flanqué de deux pavillons saillants, façade opposée possède à son centre  des fenêtres circulaires  et les façades  sud et nord   toute deux un avant-corps surmonté d'un fronton triangulaire.   Barjon et Le Meix avaient chacun un château,                                                     BARJON vestiges, ruines et reste  de deux tours , l'une ronde à mâchicoulis, l'autre rectangulaire.                                          SALIVES Le joli village de Salives a conservé les restes de l'enceinte construite au XIIIe siècle flanquée de treize tours circulaires qui le ceinturait, ils furent remaniés au XVe siècle. Ces remparts et tours dégradés par le poids des ans, ont fait l'objet d'une superbe restauration de la part de la commune qui les ayant rachetés les a admirablement rénovés, des portes agrémentées de tours à bossage rustique permettaient l'entrée dans le village, la plus remarquable est la porte de Montarmet.                               COURLON; corps de logis rectangulaire à deux niveaux et attiques flanqués de tours rondes.","habitants":"Jacques-Léonor Rouxel\r\n        \"","divers":"Château de Grancey la Neuvelle, village fortifié de Grancey, vestiges de Barjon-Meix, forteresse de Salives et le château de Courlon","gps":"","images":["../image/image_21/21_Grancey_Courlon_1.jpg","../image/image_21/21_Grancey_Courlon_2.jpg","../image/image_21/21_Grancey_Courlon_3.jpg","../image/image_21/21_Grancey_Courlon_4.jpg","../image/image_21/21_Grancey_Courlon_5.jpg","../image/image_21/21_Grancey_Courlon_6.jpg","../image/image_21/21_Grancey_Courlon_7.jpg","../image/image_21/21_Grancey_Courlon_8.jpg","../image/image_21/21_Grancey_Courlon_9.jpg"]},"Consult_chateau_formulaire7fd7":{"id":"Consult_chateau_formulaire7fd7","dept":"21","canton":"Venarey-les-Laumes","commune":"Grignon","nom":"Grignon_Orain","type":"Forteresse","periode":"XII","histoire":"GRIGNON. La présence d'un château y est attesté en l'an mil. Au début du XIIe siècle, lorsque les derniers comtes  eurent disparus, le château passa aux mains du duc de Bourgogne Hugues II, puis fut l'objet de la constante  sollicitude de ses successeurs jusqu'à ce que Philippe le Hardi en fasse don à Georges de La Trémouille en 1379. Il échut ensuite par mariage à Jean de Chalon en 1424. Les Chalon le rebâtirent et le conservèrent   jusqu'en 1511. Il appartint ensuite aux Dinteville qui n'y résidèrent pas, puis en 1623 aux Clugny qui, ruinés  le revendirent en 1693, à François Bretagne seigneur d'Orain, lequel préféra habiter l'élégante demeure que son grand-père avait fait construire, vers 1635, au pied du village et dont seul reste le corps de logis central.  La forteresse, encore pourvue de multiples tours au début du XVIIe siècle, tomba peu à peu en ruine. Des  Bretagne elle passa, en l'an IV aux  Nansouty, et fut cédée en 1876 à des bénédictins qui tentèrent, jusqu'en 1901 le sauvetage. Acquise en 1913 par un architecte, elle a fait l'objet d'une restauration tandis que les  derniers vestiges du donjon étaient nivelés. Depuis 1965, M. Soulard s'efforce de restituer au château son allure originelle tout en le rendant habitable.                                ORAIN; Le 24 avril 1673, demoiselle Pierrette Bouchard, veuve de Charles Bretagne, habite à Orain le château.","architecture":"Grignon, façades et toitures de la porte d'entrée avec le poste de garde et de la tour de défense située à l'angle nord-est, façade est entre la porte d'entrée et la tour, inscription par arrêté du 16 août 1976                                                                                            Orain; composé d'un corps de bâtiment, accompagné de deux ailes formant une cour dans le milieu, fermé par un mur d'appuis  avec une porte en fer et le tout entouré de  fossé; dans la construction des bâtiments il n'y a aucun détail de fortification ni même de féodalité, ils sont bâtis simplement  de style moderne.","habitants":"Georges de La Trémouille\r\n        \"","divers":"Château de Grignon et D'Orain","gps":"","images":["../image/image_21/21_Grignon_Orain_1.jpg","../image/image_21/21_Grignon_Orain_2.jpg","../image/image_21/21_Grignon_Orain_3.jpg","../image/image_21/21_Grignon_Orain_4.jpg"]},"Consult_chateau_formulaire4d53":{"id":"Consult_chateau_formulaire4d53","dept":"21","canton":"Dijon","commune":"Is-sur-Tille","nom":"Is_sur_Tille_Courtivon","type":"Château","periode":"XVIII","histoire":"IS-SUR-TILLE, nos lointains ancêtres figurent ceux de Châteauvillain, du bâtard de Bourbon et sa bande d'écorcheurs et du Bernois Jacques de Vatteville à la tête de l'armée des suisses venue mettre à sac la Bourgogne. Is-sur-Tille était, au début du XIVe siècle, divisé en de nombreuses seigneuries. Le duc de Bourgogne, l'évêque duc de Langres, l'abbé de Saint-Bénigne de Dijon figuraient parmi les principaux maîtres de la place, ainsi que le Roi de France, auquel les habitants de la ville, dans un acte courageux, demandèrent protection en 1312.\r\nPhilippe-le-Bel ne laissa pas échapper une si belle occasion de contrer la puissance du duc de Bourgogne, accepta la seigneurie qui lui était spontanément proposée par les habitants. Cette période d'indépendance par rapport aux puissances locales prit fin une quinzaine d'années plus tard, lorsque le duc de Bourgogne, Eudes IV, redevint maître d'Is-sur-Tille à la suite de procès longs et dispendieux , Madame Lecompasseur de Courtivron vint se constituer prisonnière avec ses enfants, le château de Courtivron et la ferme du Fossé. Quelques patriotes pressés procédèrent à la vente des biens de l'hôpital d'Is-sur-Tille, alors qu'un arrêté de l'administration départementale en avait suspendu la vente.\r\nCOURTIVRON   Les plus anciens seigneurs connus de Courtivron sont les Saulx, auxquels la terre fut donnée par le duc de  Bourgogne au début du XIIe siècle. L'existence d'une maison forte y est attestée au XIVe siècle. A la fin du XVe siècle, elle passa des Saulx aux  Vienne puis à diverses familles avant de constituer en 1583, la dot de Françoise de Malain lors de son union avec Claude Le Compasseur, les descendants l'ont conservés jusqu'à la Révolution.                                                                              Au XIXe siècle, on aménagea des filatures et tissages dans les dépendances du château, celui-ci fut racheté et  restauré par les Compasseur en 1892. A quelques kilomètres au sud le château de Villecomte dans la commune du même nom.","architecture":"Is-sur-Tille,  riche de son histoire, la ville possède un patrimoine limité par des destructions nombreuses jusqu'au XVIIIe siècle. Parmi les bâtiments remarquables figurent l'église du XIIe siècle, et un château du XVIIe siècle. Des constructions plus récentes, telles que l'hôtel de ville, ne sont pas sans intérêt dans cette commune le château de la Tour transformé en hôtel restaurant, la villa Roger  l'hôtel  de Courtivron   Courtivron, donjon et douves subsistèrent lorsqu'on bâtit aux XVIIe siècle et XVIIIe siècle la belle demeure aux lignes austères, corps de logis rectangulaire à deux niveaux flanqué en plein cintre de façade du donjon carré à mâchicoulis et toit pointu presque hors-oeuvre.                                     \r\n Villecomte; corps de logis rectangulaire à deux niveaux et attiques  flanqué de deux pavillons saillants aux extrémités, tour carré dans le parc.","habitants":"Seigneurs de Courtivon\r\n        \"","divers":"Château d'Is-sur-Tille et forteresse de Courtivon","gps":"","images":["../image/image_21/21_Is_sur_Tille_Courtivon_1.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_2.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_3.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_4.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_5.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_6.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_7.jpg","../image/image_21/21_Is_sur_Tille_Courtivon_8.jpg"]},"Consult_chateau_formulaire512d":{"id":"Consult_chateau_formulaire512d","dept":"21","canton":"Baigneux-les-Juifs","commune":"Jours-les-Baigneux","nom":"Jours","type":"Château","periode":"XVI","histoire":"JOURS, cité au XIIIe siècle en maison forte tenue par les seigneurs de Brancion, cédé en 1259 à Hugues IV duc de Bourgogne, au XIVe siècle le seigneur Claude d'Anglure officier de carrière, avant de mourir en 1566 eu le temps de transformer  un nouveau corps de logis avec des ailes latérales tout en gardant  courtines et fossés, château reconstruit entre 1542 et 1566 pour Claude d'Anglure et sa seconde épouse Isabeau de Joyeuse à qui fut dédiée la tour Joyeuse c'est sa fille, Jeanne de Corbie qui fit  achever les travaux, et les aménagements de la chapelle. Le domaine passe en 1652 par donation à Elisabeth-Louise d'Haraucourt, la marquise  du Chatelet qui s'en sépare  en 1717 au profit de François Espiard de Vernot lequel  le cède en 1743 à  Charles Legrand de Sainte-Colombe, ses héritiers les Dumonchet  qui le cèdent en 1788 à Charles Antoine de Cluny époux de Josephine-Constance de Hamel-Bellenglisse, Antoine émigre à la Révolution son épouse demande le divorce pour récupérer sa dote elle s'établit au château qui sera vendu en 1812 à la famille Maltête, cédé ensuite à la famille Louchard et transformé en ferme échappe à la ruine et aux impôts par la suppression des portes et fenêtres et par le rachat en 1964  des propriétaire actuels qui l'ont transformé.","architecture":"Jours,  forteresse médiévale détruite, de la maison forte à l'origine  ou fut rajouté au XVIe siècle un corps de logis tout en gardant les courtines et les fossés, se compose d'un corps de bâtiment de plan rectangulaire coiffé d'un toit à croupes, un rez-de-chaussée, un étage carré et un étage de comble, il est flanqué à l'angle sud-est d'une tour ronde à deux étages coiffée d'un toit en dôme dite tour de Joyeuse, façade à six travées la centrale est décentrée en légère saillie formant un avant corps, trace des rainures symbolisant le pont-levis inexistant, malheureusement les fenêtres ont perdues leurs meneaux, les lucarnes à fronton triangulaires éclairent les combles, canonnières percées à la base des murs, les courtines et les fossés ont été supprimé au XVIIIe siècle. Ordonnance de la façade postérieure inspirée de celle du château d'Ancy-le-Franc due à Serlio, escalier monumental à décor de stuc, scènes de la légende d'Hercule, cheminée à décor d'atlantes et de cariatides, vendue à la fin du XIXe siècle. Blason aux armes d'Anglure et de Joyeuse sur la façade antérieure, disparu.","habitants":"Seigneur Claude d'Anglure\r\n        \"","divers":"Château et manoir à Jours les Baigneux","gps":"","images":["../image/image_21/21_Jours_1.jpg","../image/image_21/21_Jours_2.jpg","../image/image_21/21_Jours_3.jpg","../image/image_21/21_Jours_4.jpg"]},"Consult_chateau_formulaire0b72":{"id":"Consult_chateau_formulaire0b72","dept":"21","canton":"Précy-sous-Thil","commune":"Lacour-d`Arcenay","nom":"Lacour_Arcenay","type":"Château","periode":"XVII","histoire":"LACOUR-ARCENAY, il appartenait en 1367 à Jean de Sainte-Croix, chevalier. Catherine de Cousant reprit le fief en 1406, par aliance aux Savigny en Revermont toujours par alliance en 1424 à Pierre de La Baume, chevalier, sire d'Hilan, dans cette famille jusqu'en 1539, passa à Guy Sallier, jusqu'en  1599 et la laissa à Antoine, son fils qui en jouissait en 1614. Ce fief appartenait, quelques années plus tard à Jean de Richeteau, mort en 1636, ce gentilhomme le transmit à son fils Henri qui mourut lui-même neuf ans après sans laisser de postérité bien qu'il eut épousé successivement Claude de Meun de La Ferté et Jeanne de Noyvin. La baronnie passa alors à Françoise de Richeteau, sa sur, femme de Gabriel de Ruel, écuyer, seigneur de Montécot, du Plessis, de Fonteny, en 1645 la baronnie de Lacour à Claude Espiard, aumônier ordinaire du Roi. Par son testament, en 1668, il institua son héritier universel, son neveu, Claude Espiard, seigneur de Clamerey, le légataire avait épousé, le 7 novembre 1657, Marthe Jomey, fille de Pierre, bourgeois de Saulieu dont il eut six enfants. Claude II, l'aîné, baron de Lacour, seigneur de Blanot, s'unit en 1680, à Constance Catin, dame de Genoux-en-Bresse qui lui donna cinq héritiers. Claude-Bernard, l'un d'eux lui succéda en 1711 et repassa aux Lacour, en 1750, à Claude-Bernard-Philibert, son fils, conseiller au parlement, lors de son mariage avec Jeanne-Geneviève Pioret dont il n'eut pas de postérité. À sa mort,  la baronnie retourna à son père qui la laissa enfin à Jean-Baptiste-Pierre-Lazare Espiard de Mâcon, son gendre. Jean-Baptiste-Alexandre, fils de ce dernier, la légua en 1839, à Louis de Comeau, son neveu, né du mariage de Sébastien-Joseph avec Eugénie Espiard, lequel avait épousé,  douze ans auparavant, Azeline de Champflour, fille du maire de Moulins en Bourbonnais, dont il eut deux filles, Louise-Mathilde, l'une d'elle s'est unie au comte Henry de Thy, aujourd'hui possesseur du château de Lacour, l'autre, Jeanne-Alice, a épousé Louis Guyard de Changey.","architecture":"Lacour d'Arcenay; Le château, reconstruit au XVIIe siècle sur les ruines dun château médiéval, qui fut détruit par les ligueurs au   XVIe siècle  dont il subsiste quelques vestiges. Particulièrement harmonieux avec son plan en U, entouré de douves en eau, il se compose dun corps central encadré de deux pavillons dangle rectangulaires, eux mêmes complétés par deux ailes, chacune terminée par une tour ronde. Laccès du château seffectue depuis la place du village par une allée enjambant  les douves. Deux murs bas en \"fer à cheval\" encadrent lentrée et soutiennent les terres de la cour dhonneur. On pénètre dans le château au centre dans le \"grand vestibule\" restauré au XIXe siècle, en traversant Est-Ouest","habitants":"Jean de Richeteau\"","divers":"deux châteaux et maison forte de Lacour d'Arcenay","gps":"","images":["../image/image_21/21_Lacour_Arcenay_1.jpg","../image/image_21/21_Lacour_Arcenay_2.jpg","../image/image_21/21_Lacour_Arcenay_3.jpg"]},"Consult_chateau_formulairea387":{"id":"Consult_chateau_formulairea387","dept":"21","canton":"Laignes","commune":"Laignes","nom":"Laignes_Larrey","type":"Château","periode":"XV","histoire":"LAIGNES-LARREY; Proche de Laignes, c'est vraisemblablement à l'emplacement d'une forteresse antérieure que Eudes de Grancey avait reçu le fief de Larrey de son épouse. Constance de Larrey, bâtit vers 1230 une forteresse qui inquiéta à la fois le duc  de Bourgogne, l'évêque de Langres et le comte de Nevers. Les Grancey conservèrent cette terre jusqu'à la fin du  XVe siècle. Elle passa alors à Marie de Grancey et Claude Toulongeon  qui reconstruisirent en partie le château endommagé par les armées de Louis XI puis aux Clermont d'Anjou et aux Grammont. Elle fut vendue en 1650 à  Abraham de Fabert qui la fit ériger en marquisat, mais la céda  en 1661 à Pierre Lenet, conseiller d'Etat, lequel modifia le corps de logis et une partie des communs. En 1780, nouvelle vente au prince de Condé, qui en fit don à l'hôpital de Chantilly.  Au sud château du Puits dans la commune du même nom.","architecture":"Laignes, cette tour de défense qui subsiste est le seul vestige des remparts de Laignes, elle est située à proximité de la chapelle Sainte-Marguerite sur la route de Tonnerre, à l'entrée ouest de la ville, elle est en excellent état, recouverte d'un toit de laves, on peut y voir ses archères, un blason ornait le haut de cette tour, il a été martelé, sans doute à la Révolution.                                       Larrey; Le domaine fut dispersé après la Révolution. Le logis fut transformé en une belle demeure bourgeoise, avec un  parc de style paysager, typique de la fin du XIXe siècle, avec grotte, pont de rocaille et cascade artificielle. Acquis  par la Ville en 1978, il a été restauré et ouvert au public en 1982 . Les façades et toitures du bâtiment principal situé à lest de la cour intérieure, y compris ses deux tours dentrée ainsi que la tourelle descalier.                    Puits; corps de logis rectangulaire à trois niveaux.","habitants":"fief de Larrey\r\n        \"","divers":"Villages fortifié  de Laignes, château  de Larrey et manoir du Puits","gps":"","images":["../image/image_21/21_Laignes_Larrey_1.jpg","../image/image_21/21_Laignes_Larrey_2.jpg","../image/image_21/21_Laignes_Larrey_3.jpg","../image/image_21/21_Laignes_Larrey_4.jpg","../image/image_21/21_Laignes_Larrey_5.jpg","../image/image_21/21_Laignes_Larrey_6.jpg","../image/image_21/21_Laignes_Larrey_7.jpg"]},"Consult_chateau_formulaire2acc":{"id":"Consult_chateau_formulaire2acc","dept":"21","canton":"St-Seine-l`Abbaye","commune":"Lamargelle","nom":"Lamargelle","type":"Château","periode":"XV","histoire":"LAMARGELLE; Château construit dans le style néo-classique,  en bordure de l'Ignon embelli et fortifié au XVe siècle par labbé Pierre II de Fontenette. Les abbés ladoptent comme lieu de plaisance et y abritent les archives de leur communauté à partir de 1830, sur les parcelles du Pré de Pont et la Côte Haute, par Aubin d'Artis (1800-1882) et sa femme née Félicie Petitot (1795-1863). Le parc à langlaise fut restauré vers 1884, par Albert Brun Dartis (1854-1897).  Passé à la famille Chatouillot, qui le conserva pendant près dun siècle, le château fut revendu en 2001 et demeure une propriété privée.                                                                                  A quelques kilomètres le château de Frénois.","architecture":"Lamargelle, château construit dans le style néo-classique,. Il prend la forme dun important quadrilatère agrémenté de quatre pavillons dangles mansardés. Ses deux façades principales sont rythmées par les saillies des pavillons dangles et dun corps de logis central coiffé dun fronton triangulaire, de nombreux ornements de pierre sculptée complètent le décor, tel que frontons au-dessus des fenêtres, balustrades de pierre, pots couverts répartis sur la ligne des toits, la façade sur le parc est ornée dun portique central à quatre colonnes doriques à partir de 1830,  cest une petite forteresse flanquée de quatre tours et entourée de fossés, l'édifice médiéval est transformé en maison d'habitation à la Révolution, puis partiellement détruit à partir de 1874.","habitants":"Monsieur Aubin d'Artis\r\n        \"","divers":"Ruines féodales et manoir de Lamargelle et de Frénois","gps":"","images":["../image/image_21/21_Lamargelle_1.jpg","../image/image_21/21_Lamargelle_2.jpg","../image/image_21/21_Lamargelle_3.jpg"]},"Consult_chateau_formulaire11d6-2":{"id":"Consult_chateau_formulaire11d6-2","dept":"21","canton":"Dijon","commune":"Lantenay","nom":"Lantenay","type":"Château","periode":"XVII","histoire":"LANTENAY, les ducs de Bourgogne possédaient  un château fort sur la colline, cette seigneurie est acquise par Jean Bouhier, conseiller au parlement de Dijon possédait déjà le château  de Savigny les Beaune hérite de son père Jean commence vers 1655 la construction de la résidence, décède en 1671, son fils aîné Benigne hérite de Savigny  Lantenay revient à Benoit-Bernard  qui lui décède en 1682, c'est donc le fils de Benoit-Bernard qui termine la construction du château, qui sera vendu comme bien national à la Révolution, acquis par François Richet pour le compte de Joseph Vêtu marchand à Dijon. En 1799 les propriétaires de Lantenay font par moitié entre Claude Antoine Prieur dit \"Prieur de la Côte d'Or\" qui cédera sa part à  Jean-Jacques Drappier époux de la fille de Joseph Vêtu, le domaine passe entièrement à la famille Vêtu et en 1852 la veuve de Pierre Vêtu qui s'était remarié à un Italien Hercule Tavani se défait de la propriété au profit du comte d'Esclaibles, ce dernier  abandonne le château pour s'installer à Lyon  le laissant  aux mains des troupes de Garibaldi qui le pillèrent, et, en 1877 le comte d'Esclaibles revend Lantenay à son beau-frère Louis-Joseph-Félix de Girval, et à sa mort  le château est cédé en 1893 à Marius Duché industriel nommé en 1890 président de la chambre de commerce française de Londres.  Aujourd'hui propriété de la famille Zeller.","architecture":"Lantenay; un château fort sur la colline, subsiste quelques vestiges, reste d'un donjon et d'une chapelle du XIIIe siècle et au XVIIe siècle. Construit entre 1655 -1700, se compose  de deux corps de bâtiments, deux ailes en équerre, corps de logis principal élevé sur un soubassement, un rez-de-chaussée, un étage carré et un étage de comble côté village un avant-corps dans lequel s'encadre une porte charretière ou subsiste au-dessus des traces de pont-levis  deux pavillons carré côté sud et fronton triangulaire sur les travées intérieures, dans la cour intérieure, un nymphée incorporé dans un grand mur de soutènement d'une terrasse à balustres. Ce mur a été complètement restauré entre 1987 et 1999. On a reconstitué la décoration faite au XVIIIe siècle par Antoine Bouhier. Dans le parc à l'anglaise aménagé au XIXe siècle, on voit le colombier et l'ancienne chapelle, tous deux recouverts de laves et un pavillon XVIIe.                                                         \r\nChâteau de Velars-sur-Ouche, quadrilatère flanqué de tours carrées à trois niveaux et attiques. Château de Pingeat du XIXe siècle, en forme de U à deux niveaux, attiques et fronton, tours rondes en angles à toits en poivrières et tour central avec clocheton sur le toit. Château Debost du XVIe siècle, quadrangulaire à deux niveaux et attiques  fronton sur parc et tours rondes sur les côtés.","habitants":"seigneur Benoit-Bernard \r\n        \"","divers":"Ruines féodales, château de Lantenay et au sud de Lantenay les châteaux de Velars-sur-Ouche, Pingeat  et Debost.","gps":"","images":["../image/image_21/21_Lantenay_1.jpg","../image/image_21/21_Lantenay_2.jpg","../image/image_21/21_Lantenay_3.jpg","../image/image_21/21_Lantenay_4.jpg","../image/image_21/21_Lantenay_5.jpg","../image/image_21/21_Lantenay_6.jpg"]},"Consult_chateau_formulaire095c-2":{"id":"Consult_chateau_formulaire095c-2","dept":"21","canton":"Semur-en-Auxois","commune":"Lantilly","nom":"Lantilly","type":"Château","periode":"XVII","histoire":"LANTILLY, dominant la plaine de Laumes, face au site historique d'Alésia, construit par Charles de Chaugny en 1709, acquis en 1775 par lancêtre des propriétaires actuels, ses salons garnis de nombreux souvenirs de famille.","architecture":"Lantilly; Le château construit , sur lemplacement dune forteresse, est dune grande pureté architecturale, le corps central du bâtiment comporte un avant corps en hémicycle, flanquée de deux ailes dans le même alignement l'ensemble percée de nombreuses baies rectangulaires qui lui ont valu le surnom de château aux cent fenêtres, il n'a jamais été remanié depuis sa construction, entouré de doubles enceintes de douves, de l'enceinte extérieure subsiste une tour ronde,  parc  à la française avec jardin  d'agrément, serre, orangerie et un potager qui a reçu  le label jardin remarquable, des topiaires d'ifs et  de buis structurent les différentes parties du jardin.","habitants":"Charles de Chaugy\r\n        \"","divers":"Château de Lantilly","gps":"","images":["../image/image_21/21_Lantilly_1.jpg","../image/image_21/21_Lantilly_2.jpg","../image/image_21/21_Lantilly_3.jpg","../image/image_21/21_Lantilly_4.jpg"]},"Consult_chateau_formulaireaada":{"id":"Consult_chateau_formulaireaada","dept":"21","canton":"Liernais","commune":"Liernais","nom":"Liernais","type":"Château","periode":"XVI","histoire":"LIERNAIS; Jusqu'au XIIe siècle, le fief de Liernais appartenait au Duché de Bourgogne. À l'exception des hameaux de La Guette, Paquier Rousseau, Vesvres et La Queue-Caillot qui restèrent en Bourgogne, le village fut ainsi rattaché au Nivernais jusqu'à la Révolution.      Louis IV, duc de Nevers et son épouse Henriette de Clèves affectionnaient leur résidence de Liernais.  La seigneurie du pays, avec titre de châtellenie appartenait, en 1207, à Mathilde de Bourgogne, comtesse d'Auvergne, dame de Liernais qui le légua au prieur de Bar-le-Régulier en mémoire de l'anniversaire de son fils Guillaume, mais celui-ci fit en 1210 un échange de terre avec le comte de Nevers.                                                                Comme de nombreuses villes et villages de la région, notamment Saulieu et Autun, Liernais fut envahi, peut-être pillé ou détruit par les Sarrasins.","architecture":"Liernais, le château et la « tour forte » de Liernais, construit à l'emplacement actuel de l'église, On l'appelle vieux château une ferme médiévale avec pigeonnier, près d'un étang, sur la route de l'Huis-Néault, à quelques mètres de la voie romaine.\r\nLe château des Trois Épis, manoir du XIXe siècle situé non loin du vieux château et qu'on appelle abusivement du même nom.\r\nLe château Ballivet-de Réglois, du XIXe siècle appartient encore à la famille du même nom.\r\nUne autre ferme avec pigeonnier, plus récente du XVIIIe siècle, se trouve également à la sortie du bourg sur le chemin de l'étang de la Gravotière, lieu des promenades digestives dominicales des Liernaisiens.","habitants":"Mathilde de Bourgogne\r\n        \"","divers":"Château de Liernais, dans la commune plusieurs châteaux mis à part celui des comtes de Nevers  celui  de la Buchère, de Cenfosse, de Veullerot, des Trois-Epis et de Ballivet de Réglois.","gps":"","images":["../image/image_21/21_Liernais_1.jpg","../image/image_21/21_Liernais_2.jpg","../image/image_21/21_Liernais_3.jpg","../image/image_21/21_Liernais_4.jpg","../image/image_21/21_Liernais_5.jpg","../image/image_21/21_Liernais_6.jpg"]},"Consult_chateau_formulaire41bf":{"id":"Consult_chateau_formulaire41bf","dept":"21","canton":"Genlis","commune":"Longecourt-en-Plaine","nom":"Longecourt","type":"Château","periode":"XV","histoire":"LONGECOURT;  La seigneurie citée dès le XIIIe siècle. Le domaine appartient alors à Robert de Boisleux ou Beaulieu. En 1298, cette seigneurie est acquise par le duc Robert II de Bourgogne. Sa fille, Marie, épouse Édouard Ier, comte de Bar, en 1310  Eudes IV, frère de Marie, en 1323, il transfère la seigneurie de Longecourt à son beau-frère. La seigneurie est provisoirement rattachée à la châtellenie ducale voisine de Rouvres (1415-1436). Le problème est résolu par René  d'Anjou \"Le Bon Roi René\" en 1436 avec la vente de la seigneurie à Jean de Fribourg, maréchal de Bourgogne,seigneur à Champlitte.  La famille de Baissey  hérite de la seigneurie en 1459. Jean de Baissey était alors déjà seigneur d'Izeure, il meurt à la bataille de Morat en 1476. Son fils, Antoine (1460-1509), également baron de Til-Châtel, connait une carrière militaire conséquente. Longecourt participe à l'histoire troublée de la fin du XVIe siècle. En 1564, Catherine de Médicis, accompagné du jeune roi Charles IX, fait étape au château.  Le dernier seigneur de la famille de Baissey est Gaspard, par un contrat de 1586, il institue comme héritier le marquis de Varennes  François de Nagu, qui reprend le fief en 1620.  la seigneurie passera à Gilles Berthet, maître d'hôtel du Roi puis trésorier général des états de Bourgogne  attesté entre 1646 et 1651. Le fief est repris en 1654 par Alexandre de Nagu, prieur commendataire de Saint-Marcel-lès-Chalon et tuteur du jeune Joseph, marquis de Varennes.  En 1680, Alexandre-Joseph de Nagu-Varennes revend la seigneurie à Jacques Berbis.  En 1753, Nicolas-Philippe Berbis, capitaine de cavalerie au régiment de Grammont, succède à son père, la dernière descendante des Berbis  épouse en 1820, Benigne-Etienne le Gouz de Saint-Seine, ancêtres des propriétaires actuels le comte Bertrand de Saint-Seine.","architecture":"Longecourt, au beau milieu du village , dans un joli parc, à proximité de l'Oucherotte est entouré de douves que franchissent trois ponts dormants, s'élève majestueusement le château de Longecourt-en-Plaine, la bâtisse a une longue histoire, une première maison forte de plaine, avec fossés et pont-levis, est construite sur les fondations d'une ancienne motte féodale de 1445, le château, alors délaissé, est en très mauvais état, des prisons sont établies au château, reconstruction, en briques vers 1495. En 1753 Les Berbis transforment le château en une véritable demeure de plaisance dans l'air du temps, un corps de bâtiment est abattu, modifiant l'aspect corps de logis principal avec deux corps en retour d'équerre, en forme de U, avec de nombreuses ouvertures sur les façades réhaussées d'un étage attiques  avec rangée d'oculus  sur la façade nord, un fronton circulaire  aux armes des Berbis somme d'avant corps de la façade sud. L'embellissement est bientôt achevé au milieu du XVIIIe siècle. À la Révolution, un projet prévoit un temps d'y implanter une manufacture d'étoffes de laine en 1793, le village et surtout le château sont occupés par les Allemands en 1870.  Durant le XXe siècle, une nouvelle occupation a lieu entre 1940 et 1944.","habitants":"Le Bon Roi René\r\n        \"","divers":"Château de Longecourt","gps":"","images":["../image/image_21/21_Longecourt_1.jpg","../image/image_21/21_Longecourt_2.jpg","../image/image_21/21_Longecourt_3.jpg"]},"Consult_chateau_formulaire5585":{"id":"Consult_chateau_formulaire5585","dept":"21","canton":"Chenove","commune":"Longvic","nom":"Longvic_Beauregard","type":"Château","periode":"XV","histoire":"LONGVIC; Le château de Longvic daterait du début du XVe siècle. rendez-vous de chasse aux princes de Condé, le château de Longvic fut reconstruit par un comte d'empire du XIXe siècle. Dans les années 1960, l'édifice a été mis à la disposition de la maison des  jeunes et de la culture qui s'est installée dans un bâtiment contemporain à l'arrière de la propriété. La description présente une maison seigneuriale à laquelle est jointe une ferme au lieu-dit Coron.  Au cours du XVIIIe siècle, le château de Beauregard devient la résidence d'été des évêques de Dijon qui y font construire le château actuel, dont une bonne partie a été détruite au XIXe siècle. Au moment de la Révolution Française, ce bien ecclésiastique fut confisqué et vendu aux enchères.  Beauregard, dont le nom provient de sa situation en hauteur et de ses points de vue, est mentionné au  début du XVIIe siècle.","architecture":"Longvic, se compose d'un corps de logis principal à trois niveaux. Les baies de la travée centrale  sont surmontées aux deux premiers niveaux d'une corniche et au troisième niveau d'un fronton triangulaire, ce  bâtiment est encadré par deux ailes, les baies du rez-de-chaussée comportent un linteau cintré, l'ensemble  des toitures brisées est couvert d'ardoise  la maison  de l'enfance qui conserve de beaux arbres centenaires Beauregard, dont le nom provient de sa situation en hauteur et de ses points de vue, est mentionné au début du XVIIe siècle.                                  Château de la Noue ensemble de bâtiments, corps de logis à deux étages situé au centre d'une vaste propriété, toitures percées de lucarnes à linteau cintré toit en croupes à tuiles plates du XIXe siècle centre interprofessionnel.                                         Longvic; un ancien manoir et sa ferme actuellement centre équestre, en 1735, une partie des constructions à la Colombière servait à l'exploitation d'une ferme.                                             Le fort de Beauregard fait partie d'un ensemble de fortifications établies autour de Dijon après la guerre franco-prussienne, il est intégré dans un système de défense des frontières de l'Est con
