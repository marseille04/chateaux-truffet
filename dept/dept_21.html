çu par le général Séré de Rivières, construit entre 1877 et 1881.","habitants":"princes de Condé\r\n        \"","divers":"Le château de Longvic, de la Noue,  la ferme de Coron fut vendue en lot dissocié ancien manoir ferme centre équestre et  de Beauregard","gps":"","images":["../image/image_21/21_Longvic_Beauregard_1.jpg","../image/image_21/21_Longvic_Beauregard_2.jpg","../image/image_21/21_Longvic_Beauregard_3.jpg","../image/image_21/21_Longvic_Beauregard_4.jpg"]},"Consult_chateau_formulaire77d1-2":{"id":"Consult_chateau_formulaire77d1-2","dept":"21","canton":"Bligny-sur-Ouche","commune":"Lusigny-sur-Ouche","nom":"Lusigny","type":"Château","periode":"XVII","histoire":"LUSIGNY, dépendance au XIIIe siècle, de la baronnie d'Antigny, la terre de Lusigny appartenait en 1290 à Guillaume  de Montaigu. elle passa ensuite aux Vienne qui la conservèrent jusqu'en 1602. Jacques de Vienne la vendit alors à Jean de Montet dont le petit-fils la céda, en 1684, à Bernard de Royer. A la suite d'une nouvelle vente, Nicolas de Ganay en devint propriétaire en 1748. Ses descendants s'y maintiennent jusqu'en 1912. Le château, après être  passé ensuite entre diverses mains, appartient depuis 1932 à la famille de Varine-Bohan. Le château transformé en chambres d'hôtes.                                                                                  Dans les environs à Bligny le château du Colombier  transformé également en Hôtel.","architecture":"Lusigny;  le château Imposant, corps de logis rectangulaire à quatre niveaux flanqués de deux pavillons rectangulaires saillants aux extrémités l'ensemble de même niveaux.   L'existence d'une tour  forte est attestée en 1469. En 1518, il y avait là un château fort, cerné de fossés dont l'unique accès était   précédé d'un pont-levis, il fut entièrement transformé à la fin du XVIIe siècle, les fossés, qui existaient encore en 1755, furent comblés quelques années plus tard. Le Colombier quadrilatère  à deux niveaux  flanqué de tours rondes en angle et pavillon d'entré saillant.","habitants":"Bernard de Royer\r\n        \"","divers":"Château de Lusigny, dans les environs à Bligny le château du Colombier et de Pomey","gps":"","images":["../image/image_21/21_Lusigny_1.jpg","../image/image_21/21_Lusigny_2.jpg","../image/image_21/21_Lusigny_3.jpg","../image/image_21/21_Lusigny_4.jpg","../image/image_21/21_Lusigny_5.jpg"]},"Consult_chateau_formulairebd6b":{"id":"Consult_chateau_formulairebd6b","dept":"21","canton":"Is-sur-Tille","commune":"Lux","nom":"Lux","type":"Château","periode":"XV","histoire":"LUX, au XIIe siècle le fief  appartenait aux sires de Til Châtel qui le  partagèrent avec l'évêque de Langres, puis il fut céder aux ducs de Bourgogne qui l'inféode aux Til Châtel, que Guy de Til Châtel vassal des duc de Bourgogne  fit construire une maison forte à l'instigation  de l'évêque de Langres, le domaine  passera à Odot de Malain descendant de banquiers enrichis, sa descendance  entreprend d'important travaux et en 1513 la construction du donjon. Edme de Malain, baron de Lux chevalier de Saint-Esprit meurt en 1612 assassiné au cours d'un duel opposait au duc de Guise, son domaine est saisi, adjugé à Roger de Saint-Lary, duc de Bellegarde gouverneur de Bourgogne qui restaure le château grandement ruiné, suite à un complot le domaine est donné en 1646 à Henri de Bourbon prince de Condé qui décède peu après, son cousin Louis II de Bourbon achève la reconstruction et le cédera en 1668 à Claude de Housset intendant des finances du roi, sans héritier le château passe à sa nièce en 1683 à Marie-Catherine Daguesseau son époux étant Charles-Marie de Saulx de Tavannes qui le garderont par héritages jusqu'en 1861 qui entre-temps, il fut saisi  et vendu aux enchères, Charles-Marie-Casimir de Saulx-Tavannes parvient  à récupérer ses biens qui passeront en 1861 à sa fille unique la comtesse de Greppi, puis par alliance aux princes de Gonzague, puis aux ducs de Soragna et en 1979 à Jean-Marie Barré.","architecture":"Lux, une maison forte au XIIe siècle, remanié en 1530 en forteresse avec la construction du donjon, puis château  dont l'ensemble  s'élevait sur un terre-plein cerné de douves alimentait par les eaux du Thille, se composait  en quadrilatère ceint de murailles couronnées  d'un chemin de rondes couverts et de trois autres tours rondes, un pont-levis à l'entrée donnant sur le logis  à l'Est se trouvant entre deux tours, des travaux de remaniements se sont effectués au cours des ans et lors des changements de propriétaires. Quatre tours demeurent de l'ancien château certaines semble dater du XVe siècle encadrent le château renaissance, à chaque extrémité une tour carrée dans le parc une tour de guet du XIIIe siècle, les fossés comblés au XIXe siècle.","habitants":"Odot de Malain\r\n        \"","divers":"Château de Lux","gps":"","images":["../image/image_21/21_Lux_1.jpg","../image/image_21/21_Lux_2.jpg"]},"Consult_chateau_formulaire58e9":{"id":"Consult_chateau_formulaire58e9","dept":"21","canton":"Sombernon","commune":"Malain","nom":"Malain_Baulme","type":"Vestiges","periode":"XIII","histoire":"MALAIN. cité au XIe siècle, la seigneurie de Mâlain-Sombernon, Guido de Médiolano   descendant de Gozelin  seigneur de Sambernon dont la forteresse passera à Jeanette de Sombernon qui l'apportera en dot  à Guillaume de Montagu  qui ce dernier fit construire la forteresse sur l'éperon rocheux qui domine le village. Dans cette famille jusqu'au XVe siècle passera par alliance de Catherine fille de Jean de Sombernon avec Guillaume de Villersexel, passera ensuite par alliance en 1436 au Beaufremont, qui en seront dépossédé quelques temps pour avoir pris  le parti de Marguerite de Bourgogne contre Louis XI, les biens reviendront à sa mort à son fils et aux petit-fils, Claude abbé d'Acey, puis évêque de Troyes, ce dernier ayant investi dans d'autres châteaux  Dans la partie de Catherine suivirent les familles Villiers-Sexel, Bauffremont et Sercey.\r\nDans la partie de Jeanne suivirent les familles Rougemont, Ruffey et Mâlain. contraint en 1598 de céder la baronnie de Malain à son créancier, Denys Brulart, président au parlement de Dijon qui l'abandonnera peu après au profit de Sombernon. cette famille possédait un château neuf à Sombernon, laissèrent la forteresse à l'abandon le dernier de la descendance des Brulart en 1763,  ses biens seront transmis à son neveu  Gaspard-Nicolas de Vichy-Champron, le fils de ce dernier  Abel-Claude-Marie seigneur de Malain sera tué en 1793 à Lyon.                                     A quelques kilomètres le château de la Baulme la Roche, le château de Castel-Fleury transformé en hôtel restaurant par la famille Fournier et le château de la Serrée du XVIIIe siècle à Mesmont au sud-ouest de Malain, une maison forte s'y trouve également.","architecture":"Château fort de Mâlain, édifice médiéval construit au XIIIe siècle, au flanc d'une colline ovale surplombant le vallon de Savigny, fait l'objet de plusieurs remaniements, activement restauré au XVe siècle  qui firent édifier une grosse  tour ronde, le corps de logis tout comme la grosse tour sont percée dans les parties supérieures de baies rectangulaires, au sud un mur d'enceinte flanqué de deux avancées triangulaires en arêtes arrondies, depuis 1985 par des bénévoles. Il appartient maintenant à la mairie de Mâlain et au groupe archéologique du Mesmontois.                                            Baulme la Roche,  corps de logis rectangulaire à deux niveaux  et attiques flanqué de deux  pavillons aux extrémités saillants sur les deux façades  rectangulaires et d'un donjon plein cintre, l'ensemble toiture à tuiles vernissées.                                                   \r\n Castel Fleury corps de logis carré à  deux niveaux flanqué de deux tourelles carrées en façade.","habitants":"Guillaume de Montagu\r\n        \"","divers":"Vestiges de Malain manoir du Castel-Fleury et de Baulme la roche","gps":"","images":["../image/image_21/21_Malain_Baulme_1.jpg","../image/image_21/21_Malain_Baulme_2.jpg","../image/image_21/21_Malain_Baulme_3.jpg","../image/image_21/21_Malain_Baulme_4.jpg","../image/image_21/21_Malain_Baulme_5.jpg","../image/image_21/21_Malain_Baulme_6.jpg","../image/image_21/21_Malain_Baulme_7.jpg","../image/image_21/21_Malain_Baulme_8.jpg","../image/image_21/21_Malain_Baulme_9.jpg"]},"Consult_chateau_formulaire266c":{"id":"Consult_chateau_formulaire266c","dept":"21","canton":"Beaune","commune":"Mavilly","nom":"Mandelot","type":"Château","periode":"XIX","histoire":"MANDELOT, château, d'une puissante famille de Beaune, les Bataille qui ont donné leur nom à lune des portes fortifiées de la ville, possédait le château et de nombreuses fermes et terrains à Mandelot, Mavilly, Laucey, Cussy-la-Colonne, Bouze et une partie de Savigny.  Cette famille Bataille sappellera plus tard par alliance « Bataille de Mandelot ». Après la Révolution, le château vendu comme bien national aux fermiers qui lexploitaient. Au cours du XIXe siècle, la famille Bouchard achète le château, Théodore Bouchard, lun des propriétaires des vins \"Bouchard père et fils\" avec ses frères, reçoit le château en héritage, dune de ses tantes, la sur Agathe Moine, religieuse hospitalière à Beaune. \r\nThéodore Bouchard  entreprend de gros travaux de restauration avec sa femme Louise Bréart, dans les années 1870, sans descendance, cède son château à son frère Antonin qui est larrière grand-père de mademoiselle Dromard. Jeanne Bouchard, la fille dAntonin, hérite du domaine. Celle-ci épouse Raoul Ferrand  maire de Mavilly-Mandelot.  leur fille Jeanne-Françoise le reçoit en héritage elle épouse  Pierre Dromard, et à leur fils Robert il hérite  des fermes de Mandelot et Laucy. Mademoiselle Dromard, lactuelle propriétaire, héritera de sa mère du château et des vignes, et de son oncle Robert Ferrand qui navait pas de descendance la ferme de Mandelot. La ferme de Laucy ayant été vendue auparavant à la famille Jacotot.","architecture":"Mandelot, dans les années 1870, le château est refait complètement, un balcon est ajouté, Corps de logis rectangulaire à trois niveaux et attiques  flanqué de deux tours carrées à trois niveaux, tourelle à l'arrière.","habitants":"Théodore Bouchard  \r\n        \"","divers":"Château de Mandelot","gps":"","images":["../image/image_21/21_Mandelot_1.jpg","../image/image_21/21_Mandelot_2.jpg"]},"Consult_chateau_formulaired42c":{"id":"Consult_chateau_formulaired42c","dept":"21","canton":"Venarey-les-Laumes","commune":"Marigny-le-Cahouet","nom":"Marigny_Cahouet","type":"Forteresse","periode":"XIV","histoire":"MARIGNY le Cahouët, connue dès le IXe siècle. Au XIIIe siècle, la seigneurie  fut cédé à Eudes de Montagu, seigneur de Chagny, qui accorda aux habitants les mêmes privilèges qu'à ceux de Chagny et constitua la baronnie qu'il transmit à ses descendants. Agnès de Montagu l'apporta en dot à Eudes de Villars, en 1361, d'où elle passa successivement aux La Baume-Montrevel, aux Avaugour, aux Châteauvilain, aux d'Orgemont, aux Jouvenel des Ursins, pour arriver aux Pibrac, qui la conservèrent jusqu'aux premières années du règne de Louis XV. Baudry de Marigny cette famille, qui compte plusieurs maîtres aux comptes, et deux conseillers au parlement de Paris, a possédé plusieurs seigneuries et fiefs en toute justice en Bourgogne, dans les bailliages de l'Auxois et de la Montagne, notamment les terres de Marigny-le-Cahouët, de Villaines en Duesmois, de Vaugimois. André Baudry, grand maître des eaux et forêts, était, en 1750, seigneur  de Coulemier-le-Sec, et du fief de Fyot, dépendant de Villaines.  Siraudin fils propriétaire, au XIXe siècle. Aujourd'hui propriété de M. Marcel Rougé.","architecture":"Marigny. Les ruines du château-fort  se découpent sur un éperon rocheux dominant la vallée de l'Ouche entre Saint-Victor et Barbirey, le nouveau fort construit au XIIe siècle au fond de la vallée devient une puissante forteresse au XIVe siècle, il subit des transformations jusqu'au XIXe siècle, il est entièrement restauré dans son aspect du XVe siècle, c'est un long quadrilatère flanqué à ses angles de quatre tours carrées  dont trois sont placées en oblique, pont-levis pour le passage des douves, un des deux corps de logis en équerre comporte une galerie à pan de bois du XVIe siècle, le portail a été construit lors de la restauration du château en style néo-gothique, au milieu du XIXe  siècle, pris entre deux piliers cantonnés de pinacles, il est construit au centre du mur de clôture entourant la  demi-lune d'entrée, sur les piliers sont gravés  les noms de l'architecte et  de l'entrepreneur, deux vantaux  en fer forgé et une porte piétonne dans l'un des vantaux le composent, le mur de clôture est constitué d'un mur-bahut et de grille séparé par des piliers.","habitants":"Eudes de Villars\r\n        \"","divers":"Forteresse de Marigny le Cahouet","gps":"","images":["../image/image_21/21_Marigny_Cahouet_1.jpg","../image/image_21/21_Marigny_Cahouet_2.jpg","../image/image_21/21_Marigny_Cahouet_3.jpg","../image/image_21/21_Marigny_Cahouet_4.jpg","../image/image_21/21_Marigny_Cahouet_5.jpg","../image/image_21/21_Marigny_Cahouet_6.jpg","../image/image_21/21_Marigny_Cahouet_7.jpg"]},"Consult_chateau_formulairef57a":{"id":"Consult_chateau_formulairef57a","dept":"21","canton":"Aignay-le-Duc","commune":"Mauvilly","nom":"Mauvilly","type":"Château","periode":"XV","histoire":"MAUVILLY, château du XVIe siècle  qui fut remanié par les comtes d'Ivory au, appartenait autrefois au bailliage de Châtillon et au diocèse d'Autun, fut un temps une ancienne baronnie au mains des ducs de Bourgogne, puis a appartenu à divers seigneurs dont les Blaisy et les Chastenay, les Febvre de Gurgy puis aux vicomtes d'Ivory.","architecture":"Mauvilly, château du XVIe siècle  qui fut remanié par les comtes d'Ivory au XVIIIe siècle, quadrilatère entouré de douves, corps de logis très longs a un niveau et attiques, flanqué de tours rondes à toits en poivrières et restant d'une tour arasée, la construction moderne fait partie de la chapelle, pigeonnier dans le parc  tour ronde.","habitants":"vicomtes d'Ivory\r\n        \"","divers":"Château de Mauvilly","gps":"","images":["../image/image_21/21_Mauvilly_1.jpg","../image/image_21/21_Mauvilly_2.jpg","../image/image_21/21_Mauvilly_3.jpg","../image/image_21/21_Mauvilly_4.jpg","../image/image_21/21_Mauvilly_5.jpg","../image/image_21/21_Mauvilly_6.jpg"]},"Consult_chateau_formulaire9606":{"id":"Consult_chateau_formulaire9606","dept":"21","canton":"Pouilly-en-Auxois","commune":"Meilly-sur-Rouvres","nom":"Meilly_Villeneuve","type":"Château","periode":"XV","histoire":"MEILLY sur Rouvre, la terre de Meilly a été détachée du domaine ducal par Hugues IV qui la vendit, en 1340, à Guillaume Gallois de La Baume. Elle passa ensuite à Renaud de Gellan puis, dès le XVe siècle, aux La Palud Bouligneux qui y bâtirent une forteresse dont la présence est attestée en 1460. Ils substituèrent à celle-ci une belle demeure au milieu du XVIIe siècle. Meilly fut vendu en 1734, à Jean-Charles Coste de Champeron, président à la cour des aides de Paris, puis, en 1764, à Jean Paris de Montmartel dont les héritiers le possédaient en 1789.                                                       VILLENEUVE;  A trois kilomètre de Meilly à Essey, cité pour la première fois en 1372 alors qu'il appartenait à Hugues de Pontailler,  le château ne resta jamais longtemps entre les mains d'une même famille. Il fut transformé par les  Vienne qui le possédèrent de 1500 à 1580, par Daniel de Bellujon, qui en fut maître de 1617 à 1669 et par les Saint-Quantin du Bled  de 1670 à 1780. Les principaux travaux semblent se situer autour de 1620 à 1740. Une restauration générale, due à la famille de Champeaux, est intervenue en 1855. Les travaux effectués pour le comte de Blet au milieu du XVIIIe siècle ont peut-être concerné la façade ouest, dont les fenêtres sont différentes, mais surtout  les communs et l'aménagement des extérieurs.","architecture":"Meilly sur Rouvre, une maison forte à l'origine à laquelle succède au XVe siècle une  forteresse de plan quadrangulaire dont il ne subsiste que quelques vestiges. L'édifice actuel a été construit au milieu du XVIIe siècle. Le bâtiment isolé des écuries semble avoir été construit au début du XIXe siècle, avec remploi d'éléments du XVIIe siècle  dans la partie centrale.  Du château médiéval subsiste la base d'une tour circulaire, incluse dans un mur de soutènement bordant la  partie  conservée des douves, au sud-est du logis, celui-ci est flanqué à l'est d'un corps de passage en  pierre de taille dont l'élévation antérieure présente deux rainures de pont-levis à flèche. \r\n Villeneuve, l'édifice entouré d'un large fossé franchi au sud par un pont dormant, le logis se compose  de trois corps de bâtiment, un corps central au nord, une aile en retour d'équerre  à l'ouest et une aile à 45° à l'est, il est flanqué sur les angles extérieurs de quatre tours hexagonales, une tour  demi-hors-oeuvre un peu plus haute s'élève au centre de la façade nord du corps central, la façade sud du corps principal, dont la travée centrale en grand appareil est couronnée d'un fronton cintré, est précédée d'un escalier à montées divergentes donnant accès à une large terrasse.","habitants":"Guillaume Gallois de La Baume                                                          Hugues de Pontailler\r\n        \"","divers":"Château de Villeneuve à Meilly sur Rouvre","gps":"","images":["../image/image_21/21_Meilly_Villeneuve_1.jpg","../image/image_21/21_Meilly_Villeneuve_2.jpg","../image/image_21/21_Meilly_Villeneuve_3.jpg","../image/image_21/21_Meilly_Villeneuve_4.jpg","../image/image_21/21_Meilly_Villeneuve_5.jpg","../image/image_21/21_Meilly_Villeneuve_6.jpg"]},"Consult_chateau_formulaireb993":{"id":"Consult_chateau_formulaireb993","dept":"21","canton":"Beaune","commune":"Auxey-Duresses","nom":"Melin","type":"Château","periode":"XV","histoire":"MELIN, construit en 1551 par la famille Rozereau, le château fut ensuite racheté par la famille Brunet de Monthélie à la fin du XVIIe siècle qui agrandit alors le château, en 1960, la paroisse dAubervilliers devient propriétaire du château et tous les étés le fait revivre  avec le père Lecoeur, des animateurs et une centaine denfants. Cest en 1999 que la demeure est acquise par les propriétaires actuels, Hélène et Arnaud Derats, qui réalisent alors une restauration totale du château, parallèlement, ils reprennent lexploitation viticole familiale, comprenant des vignes situés en Côte de Beaune et Côtes de Nuit. Transformé en hôtel.","architecture":"Melin,  en édifiant notamment un second logis face au premier, flanqué dune aile en retour déquerre reliant les deux constructions, lensemble des trois bâtiments rectangulaires, dotés chacun dune tour escalier, sorganise en fer à cheval autour dune cour carrée.","habitants":"famille Brunet de Monthelie\r\n        \"","divers":"Château de Melin","gps":"","images":["../image/image_21/21_Melin_1.jpg","../image/image_21/21_Melin_2.jpg","../image/image_21/21_Melin_3.jpg","../image/image_21/21_Melin_4.jpg","../image/image_21/21_Melin_5.jpg"]},"Consult_chateau_formulaire2d21":{"id":"Consult_chateau_formulaire2d21","dept":"21","canton":"Liernais","commune":"Ménessaire","nom":"Menessaire","type":"Château","periode":"XIII","histoire":"MENESSAIRE, les premiers seigneurs issue de la maison de Bourgogne dont leurs habitations étaient à l'emplacement actuel du château, une alliance se passa en 1296 elle fut la baronnie la plus étendue du Morvan, interrompue par la guerre de cent ans. Elle fut vendue  en 1414 à Guillaume de Cluny duc de Bourgogne  qui ce dernier la revendit  à Jean de Vaulx, dont la fille épousa  Jean de Fussey qui récupérèrent Ménessaire en 1578  apparentée à la famille de Condé et fut érigée en marquisat en 1668.  En 1772 le château fut vendu à Gaspard le Compasseur de Créqui de Montfort marquis de Courtivon et en 1794 fut racheté par Léger Guyotat famille bourgeoise de Ruisselles et ensuite abandonné aux pillages, en 1972 acheté par Bernard Paul  Mainçon qui créa l'association le \"Morvan Féodal\".","architecture":"Château de Ménessaire du XIIIe? au XVIIIe siècle, malgré les guerres de religion et pillages le château est maintenu surtout par l'association le \"Morvan Féodal\", composé d'un corps de logis rectangulaire à deux niveaux accolé d'une tour carré  saillante de même niveau, possédait des douves et pont-levis remplacé par un pont dormant datant du XVIe siècle ainsi que les tours rondes.","habitants":"Guillaume de Cluny \r\n        \"","divers":"Château de Menessaire","gps":"","images":["../image/image_21/21_Menessaire_1.jpg","../image/image_21/21_Menessaire_2.jpg","../image/image_21/21_Menessaire_3.jpg"]},"Consult_chateau_formulaire2213":{"id":"Consult_chateau_formulaire2213","dept":"21","canton":"Venarey-les-Laumes","commune":"Menetreux-le-Pitois","nom":"Menetreux","type":"Château","periode":"XVI","histoire":"MENETREUX le Pitois; Le village abrite un château  construit vers 1578 par Claude de la Trémouille-Bresche. Nommé  Chatelet-Maisonfort, le château fut en grande partie rasé, sauf une tour ronde et une tour carrée et reconstruit par le baron Charles-Claude de Vichy à la fin du XVIIIe siècle. Des bâtiments devant servir de ferme modèle furent ajoutés à grands frais en 1884 par M. Cuhaut. Vendue en 1930 à la société du métro de Paris, la propriété a longtemps servi de maison de repos et abrite actuellement une colonie de vacances pour les enfants des employés de la RATP, gérée par la fondation « Les Enfants du Métro de Paris ».","architecture":"Menetreux, de ce château construit en 1578 qui fut en partie détruit au XVIIe siècle reconstruit présente une belle allure sur sa colline, d'un corps de logis en forme de U flanqué d'une tourelle sur un angle intérieur, ce dernier possède des grandes dépendances.","habitants":"Claude de la Trémouille-Bresche\r\n        \"","divers":"Château de Menetreux le Pitois","gps":"","images":["../image/image_21/21_Menetreux_1.jpg","../image/image_21/21_Menetreux_2.jpg","../image/image_21/21_Menetreux_3.jpg","../image/image_21/21_Menetreux_4.jpg"]},"Consult_chateau_formulairea0bd":{"id":"Consult_chateau_formulairea0bd","dept":"21","canton":"Fontaine-lès-Dijon","commune":"Messigny","nom":"Messigny_Vantoux","type":"Château","periode":"XVII","histoire":"MESSIGNY-VANTOUX, dès le XIIe siècle le fief appartenait  aux barons de Saulx, la forteresse fut détruite en 1673,  Jean de Berbisey premier président du parlement de Dijon  rachète le fief en 1700  fait élever le château actuel  de 1700 à 1704, et prend le titre de baron de Saulx-Vantoux,  le premier président du parlement de Bourgogne, il mourut en 1748 sans héritier, alors il légua par testament toute sa fortune et son domaine, à la charge de premier président au parlement. Jean Philippe Fyot de la Marche y réside de 1757 à 1775 remplacé par Charles de Brosses et par le président le Gouz de Saint-Seine y résidera jusqu'à la Révolution, vendu comme bien national passe dans diverses mains avant d'être acquis en 1838 par la famille Detourbet et monsieur Emmanuel de Blic en hérite et le vend en 1899 au  comte Xavier le Gouz de Saint-Seine.","architecture":"Château de Vantoux du XVIIIe siècle, construit en 1700-1704  de plan carré à deux étages et attiques celui-ci est surmonté d'une balustrade ornée aux angles de quatre statues représentant les saisons, toit pyramidal la façade possède  un avant corps central en légère saillie que couronne un fronton triangulaire, balcon à balustrade au premier étage, et remarquable  décor sculpté des façades de plan cubique, balustrade ornée aux angles de groupes sculptés, terrasse, cour d'honneur, douves, communs, parc boisé. Maison de Claude Hoin.                                                                  Maison seigneuriale du XVIe siècle, à Messigny.\r\nChâteau de Norges corps de logis à trois niveaux avec tour carré à quatre niveaux.                                                                            Château de Saussy, manoir quadrilatère flanqué d'une tour ronde et trois carrées, domaine transformé en un centre équestre.","habitants":"Jean hilippe Fyot de la Marche\r\n        \"","divers":"Château de Ventoux à Messigny, dans la commune le château de Plombières et à l'est de Messigny à Norges la Ville  un château du XVIIe siècle dit de Norges, plus au nord à Saussy château de Charmes transformé en centre équestre.","gps":"","images":["../image/image_21/21_Messigny_Vantoux_1.jpg","../image/image_21/21_Messigny_Vantoux_2.jpg","../image/image_21/21_Messigny_Vantoux_3.jpg","../image/image_21/21_Messigny_Vantoux_4.jpg","../image/image_21/21_Messigny_Vantoux_5.jpg"]},"Consult_chateau_formulaire0bfd":{"id":"Consult_chateau_formulaire0bfd","dept":"21","canton":"Nuits-St-Georges","commune":"Meursault","nom":"Meursault_Citeaux","type":"Château","periode":"XV","histoire":"MEURSAULT, le domaine et son château appartenait jadis a l'abbaye de Cluny pour son vin.  Les moines de Cîteaux sont devenus propriétaires des vignes  en 1098, par donation du duc  Eudes Ier de Bourgogne à l'abbé Robert de Molesme, fondateur de l'Abbaye de Citeaux. En 1666, propriété de Pierre de Blancheton, avocat au parlement de Bourgogne, il le restera jusqu'à la Révolution. Au début du XIXe siècle, la propriété fut agrandie par  la famille Serre,  qui effectua des modifications architecturales et qui développera  le domaine viticole   Par le jeu des successions,  le domaine fut légué au comte de Moucheron  qui le laissera à son fils aîné, Etienne.  A cette époque,  il représentait environ  le quart de sa surface actuelle. En 1973,  André Boisseaux,  fondateur du  Kriter, racheta le château et le restaura.\r\nCITEAUX, Ce domaine  fut la propriété de l'Abbaye de Cîteaux jusqu'à sa vente comme bien national en 1792.  Les constructions restèrent inchangées jusqu'en 1865 date à laquelle le nouveau propriétaire, Jules Bernard, fit  bâtir  l'actuel château, au-dessus des constructions des moines. C'est en 1995 que Philippe et Liliane Bouzereau, alors viticulteurs à Meursault, firent l'acquisition du château de  Cîteaux pour y établir le siège de leur exploitation familiale.                                                                                     TAILLY, Demeure ancestrale dont les origines remontent avant le  XVIIIe siècle par lédification du «Pavillon de chasse » puis du château au XIXe siècle sous Napoléon III, propriété de la famille Champy, la plus ancienne maison de vin de Bourgogne et de ses héritiers successifs, château viticole de Christine Cabaret transformé également en chambres d'hôtes.","architecture":"Meursault, Hôtel de Ville,  est le château de Meursault remonte au XIe siècle, ancien château fort bâti en 1337, démantelé en 1474, ses murs furent remanié au XV-XVIII-XIXe siècle, on peut reconnaître sur la façade ouest, une partie du donjon, haute façade murale grise  noyée dans les constructions postérieures,  l'habitation du XVe siècle subsiste en partie, elle a conservé son bel escalier de pierre, et ses fenêtres à meneaux qui ornent la façade principale. Le toit de tuiles vernissées et un bâtiment adjacent ont été édifié au XIXe siècle lorsque les services municipaux s'y installèrent.  C'est aujourd'hui un des plus beaux domaines viticoles de Bourgogne.                                         Citeaux; c'est dans la vigne connue sous le nom du Vieux Clos, située dans le parc du château de Cîteaux, que les celliers et les granges furent construits à la fin du XIIe siècle, ce domaine fut vendu comme bien national en 1792. Le parc du château fut à nouveau planté en vigne comme jadis et les caves du XIIe siècle furent elles aussi restaurées.                                                \r\nTailly;  demeure ancestrale dont les origines remontent avant le  XVIIIe siècle .","habitants":"Pierre de Blancheton\r\n        \"","divers":"Château de Meursault de Citeaux et de Tailly","gps":"","images":["../image/image_21/21_Meursault_Citeaux_1.jpg","../image/image_21/21_Meursault_Citeaux_2.jpg","../image/image_21/21_Meursault_Citeaux_3.jpg","../image/image_21/21_Meursault_Citeaux_4.jpg","../image/image_21/21_Meursault_Citeaux_5.jpg","../image/image_21/21_Meursault_Citeaux_6.jpg","../image/image_21/21_Meursault_Citeaux_7.jpg","../image/image_21/21_Meursault_Citeaux_8.jpg","../image/image_21/21_Meursault_Citeaux_9.jpg"]},"Consult_chateau_formulaire8876":{"id":"Consult_chateau_formulaire8876","dept":"21","canton":"Aignay-le-Duc","commune":"Minot","nom":"Minot","type":"Château","periode":"XV","histoire":"MINOT, le château primitif fut construit probablement au XIe siècle, il aurait été détruit lors des combats qui opposèrent Charles le Téméraire aux troupes royales (1474-1477). Sur son emplacement Antoine de Vaudrey  et Marguerite de Chauffoux bâtirent  un château à la fin du XVe siècle. Le château actuel fut édifié vers 1660 1661 par Marie de Longueval, il a conservé deux tours circulaires et une bretèche du château du XVe siècle. Acquis  en 1694 par les Mairetet qui construisirent les communs. Remanié en 1809.","architecture":"Minot, le château actuel fut édifié au XVIIe siècle, corps de logis à deux niveaux et attiques il a conservé deux tours circulaires arasées et une bretèche du château du XVe siècle.","habitants":"Antoine de Vaudrey \r\n        \"","divers":"Châterau de Minot","gps":"","images":["../image/image_21/21_Minot_1.jpg","../image/image_21/21_Minot_2.jpg"]},"Consult_chateau_formulairee493":{"id":"Consult_chateau_formulairee493","dept":"21","canton":"Mirebeau","commune":"Mirebeau-sur-Beze","nom":"Mirebeau_Beze","type":"Château","periode":"XV","histoire":"MIREBEAU, le château de Mirebeau, attesté en 1015, en 1125, la famille de Montsaugeon qui possédait la châtellenie de Mirebeau, mais qui n'avait plus d'héritier, céda ses droits au duc de Bourgogne Hugues II le Pacifique. Les seigneurs des bourgs et villages de la région Mirebeau, Pontailler-sur-Saône, Heuilley-sur-Saône,  durent alors prêter serment au duc confirmant ainsi leur rattachement au duché de Bourgogne. Le château plusieurs fois détruit, aurait été reconstruit au début du XVIe siècle par Philippe Chabot, amiral de France,  passa aux  de Vergy et aux de Bauffremont,  en 1728, fait état d'un château et maison forte, appartenant à Louis Bénigne de Bauffremont.                           Tour d'OYSEL à Bèze, la tour d'Oysel est un vestige de l'enceinte fortifiée de l'Abbaye fondée par le Duc Amalgaire, elle fut reconstruite à partir de 1429 par l'abbé Simon de Torcenay dont les armes figurent sur le haut de la tour, elle fut transformé en pigeonnier au XVIIIe siècle.\r\nLe monastère n'a pas survécu aux guerres, en particulier par le pillage des troupes de Gallas en 1636. En plus de la tour d'Oysel reste des ruines féodales deux tours du XIIIe siècle et quatre chateaux; Blagny,  Noiron, Rosière et Mirebeau.","architecture":"Mirebeau;  et plusieurs fois détruit, reconstruit au début du XVIe siècle château construit au XVIIIe siècle, plan actuel identique à celui de 1838, château et dépendances implantés en bordure du village au sud ouest. Logis de plan rectangulaire cantonné de tours de plan carré de même hauteur, corps en appentis adossés aux murs de petit pan, façade antérieure du corps central  à trois travées, façade postérieure  à cinq travées, porte antérieure à piédroits à bossages à anglet couronnée d'un fronton cintré, murs enduits, toit à longs pans, à croupes, sur le corps principal, en pavillon sur les tours, épis de faîtage, devant la façade du logis, colombier de plan circulaire.","habitants":"Amiral Philippe Chabot\r\n        \"","divers":"Château de Mirebeau, le château moderne, restes d'enceinte et de deux tours de l'ancien château fort de  Precy sous Thil.","gps":"","images":["../image/image_21/21_Mirebeau_Beze_1.jpg","../image/image_21/21_Mirebeau_Beze_2.jpg","../image/image_21/21_Mirebeau_Beze_3.jpg","../image/image_21/21_Mirebeau_Beze_4.jpg"]},"Consult_chateau_formulaireeab8":{"id":"Consult_chateau_formulaireeab8","dept":"21","canton":"Précy-sous-Thil","commune":"Missery","nom":"Missery","type":"Château","periode":"XIII","histoire":"MISSERY; La présence d'un château déjà ancien est cité  en 1360, date à laquelle surgit une contestation entre le  sire de Mont-Saint-Jean et son vassal de Missery à propos de sa fortification. Il en est à nouveau question et 1460 alors que le fief constitue l'essentiel de la dotation de l'hôpital de Dracy St-Loup. A la fin du XVe siècle, il est acquis par Jean de Malain. Les Malain s'y maintiennent jusqu'à la fin du XVIe siècle, il passe, par héritage, à François de La Plume et, par alliance, à Bernard Bernard, président au parlement de Bourgogne, auquel succède en 1710 son neveu. En 1753, le domaine saisie, est adjugé à Jean-Claude-Baptiste de Suremain de  Flammerans, conseiller au parlement de Bourgogne, qui rase la forteresse médiévale, en bon état, et bâtit un  château achevé en 1762. Ses héritiers le conservent jusqu'en 1921.","architecture":"Missery, château construit au XVIe siècle, corps de logis rectangulaire à deux niveaux et attiques deux pavillons saillants et fronton plus deux tours rondes sur les flans.","habitants":"Sire de Mont-Saint-Jean\r\n        \"","divers":"Château de Missery","gps":"","images":["../image/image_21/21_Missery_1.jpg","../image/image_21/21_Missery_2.jpg"]},"Consult_chateau_formulaire2a7d":{"id":"Consult_chateau_formulaire2a7d","dept":"21","canton":"Pouilly-en-Auxois","commune":"Mont-St-Jean","nom":"Mont_St_Jean","type":"Forteresse","periode":"XIV","histoire":"MONT-SAINT-JEAN, cité comme place forte du Xe siècle jusqu'au XIVe siècle, le siège d'une importante châtellenie du duché de Bourgogne,  pour Guillaume II de Mont St-Jean. Passa en baronnie, et ces seigneurs prenaient le titre de sires. La famille de Mont St-Jean s'éteignit au XIVe siècle. Hugues III dernier seigneur, sa fille aînée, Jeanne, transmet par alliance le fief à la famille de Pierre de Thil seigneur de Saint -Beury. En 1413, le fief de Mont St-Jean passe à la famille d'Anglure en la personne de Ogier d'Anglure par alliance avec Alixe de Toucy, fille de Guye de Mont St-Jean, sur de Jeanne. En 1427, Claude de Beauvoir, seigneur de Chastellux rachète  à Jean d'Anglure, fils de Ogier. En 1442, il le revend  à Pierre de Bauffremont, seigneur de Charny et de Molinot, conseiller et chambellan du duc de Bourgogne, sénéchal et maréchal de Bourgogne. En 1443, Pierre de Bauffremont épouse Marie de Bourgogne. En 1456, Philippe le Bon, duc de Bourgogne érige en comté les terres de Charny, Mont St-Jean, Montfort,au profit de Pierre de Bauffremont. Faute d'héritier, le fief passe successivement dans les maisons de Luxembourg, et de Chalon. En 1534,  Philiberte de Luxembourg, veuve de Jean de Chalon, fit donation du Mont St-Jean et de tout le comté de Charny à l'amiral Chabot. Son fils Léonor, reprit le fief  et fit construire vers 1570, le manoir de Gincey. La baronnie  reste dans cette famille jusqu'en 1656. En 1761, Louis-Charles de Lorraine décède, sa veuve, Marie-Louise-Julie-Constance de Rohan appelée Madame la comtesse de Brionne hérite de la baronnie de Mont Saint-Jean. En 1778, elle vend le comté de Charny  à la maison royale de Saint Louis établie à Saint Cyr, mais se réserve le titre de comtesse de Charny qui appartient aujourd'hui à la famille royale d'Italie.  La Révolution  les dames de Saint Cyr ne jouirent pas longtemps de ces immenses propriétés. Le comté de Charny fut démembré, Mont-Saint-Jean acquis par le Dr V.Renard.","architecture":"Mont-St-Jean; Forteresse juché sur une colline sentinelles depuis l'antiquité, quadrilatère flanqué de quatre tours rondes et d'un donjon du XIIIe siècle le village s'entoura  de remparts dont-il ne reste que quelques traces ainsi que  la forteresse vestiges d'un ancien logis ornés  de leurs tourelles d'escaliers, construit au Xe siècle. L'ensemble est peu remanié, plusieurs fenêtres,  dont une croisée, ont été percées à la fin du XVe siècle  ou au début du XVIe siècle, les créneaux de l'une des tours du donjon et les fenêtres de tir sont visiblement tardifs. Au XVIIIe siècle, la cour nord-est était occupée par des jardins réguliers, les anciens fossés ont été aménagés en promenades,  porte gallo-romaine, réaménagée dès le Xe siècle  et tenue par les Vergy pendant trois siècles, garde laspect typique de la forteresse médiévale, ce bel ensemble castral domine toujours la vallée du Serein avec ses éléments défensifs puissants, basse-cour, courtines, tours de flanquement, cornières, fossés, puits et citerne et un donjon rectangulaire cantonné de tours circulaires. Lieu de prière, il abrite léglise paroissiale dans la cour et une chapelle dans le donjon.","habitants":"Guillaume II de Mont St-Jean\r\n        \"","divers":"Vestiges de la forteresse de Mont-st-Jean et le manoir de la Roche","gps":"","images":["../image/image_21/21_Mont_St_Jean_1.jpg","../image/image_21/21_Mont_St_Jean_2.jpg","../image/image_21/21_Mont_St_Jean_3.jpg","../image/image_21/21_Mont_St_Jean_4.jpg","../image/image_21/21_Mont_St_Jean_5.jpg","../image/image_21/21_Mont_St_Jean_6.jpg","../image/image_21/21_Mont_St_Jean_7.jpg","../image/image_21/21_Mont_St_Jean_8.jpg","../image/image_21/21_Mont_St_Jean_9.jpg"]},"Consult_chateau_formulaire7aaa":{"id":"Consult_chateau_formulaire7aaa","dept":"21","canton":"Montbard","commune":"Montbard","nom":"Montbard","type":"Château","periode":"XV-XVII","histoire":"MONTBARD, au Moyen Âge, elle est une ville importante disposant de son château fort. En 1070, Aleth, la mère de Bernard de Clairvaux y est  naît. Le futur Saint-Bernard a pour oncle le comte de Montbard. En 1231 elle est érigée au rang de commune par le duc de Bourgogne Hugues IV. Elle devient ensuite un lieu de fréquents séjours des ducs Valois de Bourgogne. En 1590, elle est assiégée par le comte de Tavannes, lieutenant d'Henri IV, qui combat le duc de Nemours. En 1707, le naturaliste Georges-Louis Leclerc, comte de Buffon, y est naît. En 1813, Jean-Andoche Junot, duc d'Abrantès, général et ami de longue date de l'empereur Napoléon Ier, meurt à demi-fou à Montbard, dans la maison de son père.                                                                          \r\n BEURIZOT; Château de Verchizy, au cours de la période révolutionnaire de la convention nationale (1792-1795), la commune, alors nommée Saint-Beury, a porté le nom de Bellevue-sur-Armançon. C'est en 1889 que la commune a adopté son nom actuel.\r\nMALAISY, se trouve au coeur de la vallée de Fontenay hameau de Fain  Malaisy est une demeure du XVIIe siècle, entourée d'un parc de 15 ha agrémenté d'animaux; transformé en un hôtel restaurant.","architecture":"MONTBARD, Vestiges du château de Rougemont, ancien château des ducs de Bourgogne, il rencontre pour la deuxième fois le personnage historique, Louis-Georges Leclerc (1707-1778), comte de Buffon, talentueux porte-parole du siècle des lumières, né à Montbard où il séjournait six mois par an malgré ses fonctions parisiennes, de l'ancienne enceinte des remparts de Montbard, il reste peu de choses.                                                                               La tour de l'Aubespin.                                                                \r\nLe Château de Malaisy a été remanié au XVIIIe siècle avec la construction d'une tour et de ses dépendances.","habitants":"Comte de Tavannes\r\n        \"","divers":"Vestiges de la forteresse de Montbard tour de l'Aubepin, vestiges du fort de Rougemont, le manoir de Malaisy et de Senailly","gps":"","images":["../image/image_21/21_Montbard_1.jpg","../image/image_21/21_Montbard_2.jpg","../image/image_21/21_Montbard_3.jpg","../image/image_21/21_Montbard_4.jpg","../image/image_21/21_Montbard_5.jpg","../image/image_21/21_Montbard_6.jpg","../image/image_21/21_Montbard_7.jpg","../image/image_21/21_Montbard_8.jpg"]},"Consult_chateau_formulairec83a":{"id":"Consult_chateau_formulairec83a","dept":"21","canton":"Gevrey-Chambertin","commune":"Urcy","nom":"Montculot","type":"Château","periode":"XV","histoire":"MONTCULOT, château du XVe siècle, agrandi à partir de 1751, l'édifice est inachevé lorsque Louis-François de Lamartine  l'acquiert  en 1760. Il décore l'intérieur et  aménage les jardins. Son neveu, Alphonse de Lamartine, y vient à  partir de 1801 et en hérite en 1826, mais doit le vendre en 1831.  Montculot sera vendu au baron de Montureux.","architecture":"Le château est formé d'un plan rectangulaire, à rez-de-chaussée, étage carré et combles couverts d'un toit à brisis et terrassons, flanqué d'une aile en retour d'équerre contenant l'ancienne chapelle. Les pièces sont ornées de boiseries et de cheminées en marbre XVIIIe siècle, le portail, la cour et le jardin.","habitants":"Louis-François de Lamartine\r\n        \"","divers":"Château de Montculot","gps":"","images":["../image/image_21/21_Montculot_1.jpg","../image/image_21/21_Montculot_2.jpg"]},"Consult_chateau_formulaire1342":{"id":"Consult_chateau_formulaire1342","dept":"21","canton":"Montbard","commune":"Montigny-Montfort","nom":"Montfort_Montigny","type":"Vestiges","periode":"XI","histoire":"MONTFORT, c'est au XIe siècle qu'un premier château aurait été édifié par Bernard de Montfort, vers 1289, le château est reconstruit par Géraud de Maulmont, chanoine et archidiacre de Limoges, conseiller du roi de France Philippe IV le Bel.   Par mariages et successions, le château revient en dot à Jeanne de Vergy qui épouse en 1340 Geoffroy Ier de Charny, leur petite fille Maguerite épouse en 1400 Jean de Bauffremont qui décède à la bataille d'Azincourt en 1415, c'est son neveu Pierre de Bauffremont qui hérite du château de Montfort. La petite fille de Pierre de Bauffremont, Philiberte se maria avec Jean de Chalon prince d'Orange.  Le château est alors mis sous séquestre par François Ier à partir de 1521 pour refus d'en rendre hommage au roi.  En 1530, René de Chalon hérite des biens de son oncle Philibert de Chalon, biens qu'il léguera à son cousin Guillaume d'Orange-Nassau, puis passa à sa fille  Emélia d'Orange-Nassau (Amélie).  Le 14 février 1688, les petites filles d'Amélie d'Orange-Nassau vendent le château à François-Michel le Tellier marquis de Louvois, secrétaire d'état de la guerre de Louis XIV.  En 1691, à la mort de François Michel Le Tellier son fils Louis François Marie Le Tellier marquis de Barbezieux lui succède. Puis en 1701 sa fille Marie Margdelaine épouse du duc d'Harcourt hérite du château et des terres de Montfort.  En 1731, le duc et la duchesse d'Harcourt revendent la baronnie de Monfort à Frédéric de la Forest en 1817, une descendante de la famille de la Forest  le cède  à Jean Baptise Lefaivre, ancien domestique au château. En 1985, racheté par Jean Marie Fériès et son épouse, qui entreprirent leurs réhabilitations.  En 1996, l'association MONS FORTI prit la relève de M. et Mme Fériès. En 2011, le château de Montfort est cédé par Mme Fériès  à la commune de Montigny-Montfort.","architecture":"Montfort;  construit sur un plateau rocheux à 317 mètres d'altitude il domine les trois vallées du Dandarge, de la Ronce et de la Louère.\r\n Il était constitué à l'origine de sept tours dont trois semi-octogonales donnant sur une vaste basse-cour, ceinte de remparts et de tours semi-circulaires, un profond fossé et le pont-levis, le château développait une cour intérieure pavée, entourée de vastes bâtiments nobles, salle des gardes voûtée, salle seigneuriale,, chapelle, appartements et  cave. \r\nAujourdhui, du château subsistent, limposante muraille Sud de 30 mètres de haut et ses trois tours semi-octogonales dont celle appelée « tour Amélie » qui possède deux belles salles voûtées très bien restaurées, en croisée dogive avec clé de voûte, la salle des gardes et ses trois imposants départs de colonne, la cour intérieure pavé, mais également les remparts, la basse-cour et le pigeonnier.","habitants":"Bernard de Montfort\r\n        \"","divers":"Vestiges du château fort de Montigny Montfort","gps":"","images":["../image/image_21/21_Montfort_Montigny_1.jpg","../image/image_21/21_Montfort_Montigny_2.jpg","../image/image_21/21_Montfort_Montigny_3.jpg"]},"Consult_chateau_formulaire3726":{"id":"Consult_chateau_formulaire3726","dept":"21","canton":"Beaune","commune":"Monthelie","nom":"Monthelie","type":"Château","periode":"XVI","histoire":"MONTHELIE; Terre de l'abbaye de Cluny depuis le XIe siècle, Monthélie fut vraisemblablement aliéné au XVIe siècle puisqu'on  trouve successivement les seigneurs de  la famille Maugeard vers 1560 et les du Blé d'Uxelles à partir de 1570. Elle fut cédée en 1733 à l'apothicaire beaunois François Fromageot qui en fit  dot à sa fille lorsqu'elle épousa François Brunet d'Antheuil, tous deux rebâtirent le château en 1746. La famille Brunet le conserva une centaine d'années puis il passa aux Suremain, Drouas, du Chezaud et Surget avant de revenir à la famille de Suremain en 1903. A quelques kilomètres de Monthelie le château de Saint-Romain, Initialement propriété des seigneurs de Saint-Romain sa présence est attestée au XIIe siècle, il est ensuite acquis par les ducs de Bourgogne au XIVe siècle. Il est démantelé à la Révolution Française.","architecture":"Monthelie, construit au XVIIIe siècle corps de logis rectangulaire à deux niveaux et attiques flanqués aux extrémités de deux pavillons saillants toiture de l'ensemble  à la Mansard. A quelques kilomètres de Monthelie le château de Saint-Romain, les ruines du vieux château qui domine le village du haut d'un éperon rocheux offrant une superbe vue.","habitants":"Famille Maugeard\r\n        \"","divers":"Château de Monthelie et vestiges du château de Saint-Romain","gps":"","images":["../image/image_21/21_Monthelie_1.jpg","../image/image_21/21_Monthelie_2.jpg","../image/image_21/21_Monthelie_3.jpg"]},"Consult_chateau_formulairee0c1":{"id":"Consult_chateau_formulairee0c1","dept":"21","canton":"Montigny-sur-Aube","commune":"Montigny-sur-Aube","nom":"Montigny","type":"Château","periode":"XVIII","histoire":"MONTIGNY sur Aube, au XIIe siècle les seigneurs de Montigny firent édifier une nouvelle forteresse au centre du bourg sur une petite motte, en 1501 achat du fief par  Hélion d'Amoncourt seigneur de Piepape, Jean d'Amoncourt proche du cardinal Giry fait rebâtir de 1537 à 1552 le château, en 1665 Philiberte dAmoncourt épouse Antoine de Barillon de Morangis, maître des requêtes et ambassadeur extraordinaire du roi en Angleterre. En 1697, Louis XIV élève la seigneurie de Montigny en marquisat, en remerciement de ses bons et loyaux services, après sa mort la seigneurie passa à sa fille madame de Choiseul Beaupré qui s'en sépare en 1710  au profit de la famille de Gaumont qui cette dernière  la revend  en 1724,  à René-Charles de Maupeou, président au parlement de Paris, père du chancelier qui hérita le château en 1775. À sa mort, il lègue la propriété à son frère, lieutenant général des armées du roi, qui la  vend en 1784 à Bénigne-Joseph Vaillant, comte de Savoisy.  En 1794, un incendie semble avoir ravagé les trois quarts de la propriété, obligeant Philippe Vaillant de Savoisy, fils  de Bénigne Joseph, à des travaux de démolition en 1817. Joseph Gustave Le Bas du Plessis, par son mariage avec  la fille de Philippe de Savoisy, devient le nouveau propriétaire des lieux en 1862. Les Vaillant de Savoisy  entreprennent  dimportants travaux de  restauration.  En raison d'un revers de fortune, leur fille Anne se voit obligée de vendre le domaine en 1901, entraînant la disparition des archives. André Martin, soyeux lyonnais, devient lacquéreur de la demeure.  Les allemands occuperont le domaine au cours de la seconde guerre mondiale.  Edmée-Pierre Hermitte en est le propriétaire depuis 1956. À sa mort en 1982, M. Mirmand achète le domaine avant de le vendre à son tour, en 2002, à Marie-France Menage-Small, actuelle propriétaire.                                                                      A quelques kilomètres au sud le château de Courban transformé en hôtel restaurant par la famille  Vandendriessche,  et au nord le château de Gervolles, de Mornay et de Veuxhaules au sud.","architecture":"Montigny; dit de Martin, à l'origine une maison forte sur le site dès le XIIe siècle, le  château fut  construit  sur l'emplacement d'un château médiéval dont subsiste seule une tour circulaire très remanié, du château édifié au XVIe siècle de style renaissance, autour d'une cour rectangulaire avec quatre corps de bâtiment, qu'un incendie a partiellement  détruit à la Révolution, plusieurs bâtiment rasés en 1817 et une partie des fossés comblés côté sud,  ne subsiste plus que l'aile sud et la tour nord-ouest,  se compose d'un corps de logis rectangulaire  à deux niveaux et attique et deux tours d'angles et douves, à l'angle nord-ouest de l'enceinte un châtelet d'entrée  flanquée d'une  tourelle cylindrique appelé \"tour rouge\" abritant la chapelle.\r\nCourban; corps de logis rectangulaire à deux niveaux et attiques.                                                                                 Gervolles, corps de logis rectangulaire à trois niveaux et attiques flanquait de deux pavillons rectangulaires légèrement en retrait.","habitants":"Vaillant de Savoisy \r\n        \r\n        \"","divers":"Château de Montigny et a quelques kilomètres au sud le château de Courban et au nord le château de Gervolles, de Mornay et de Veuxhaules au sud.","gps":"","images":["../image/image_21/21_Montigny_1.jpg","../image/image_21/21_Montigny_2.jpg","../image/image_21/21_Montigny_3.jpg","../image/image_21/21_Montigny_4.jpg","../image/image_21/21_Montigny_5.jpg","../image/image_21/21_Montigny_6.jpg","../image/image_21/21_Montigny_7.jpg"]},"Consult_chateau_formulairee00c-2":{"id":"Consult_chateau_formulairee00c-2","dept":"21","canton":"Fontaine-Française","commune":"Villeneuve-sur-Vengeanne","nom":"Montigny_Mornay","type":"Maison forte","periode":"XV","histoire":"MONTIGNY-MORNAY; Fief de l'évêque de Langres relevant du comté de Montsaugeon, Mornay fut concédé à un laïc dès le début du XIIIe siècle. Divers seigneurs se partagèrent ensuite la terre, qui fut réunie en 1618 seulement entre les mains de Guillaume de St-Aubin dont le tombeau est conservé au château. Ce personnage déclarait en 1621 possédait une maison seigneuriale pourvue d'une prison. A la fin du XVIIe siècle, après avoir subi les ravages des troupes de Gallas, la seigneurie fut à nouveau partagée entre les descendants de Guillaume de St-Aubin, situation qui cessa vers 1750 lorsque l'ensemble fut racheté par la famille de Mauny, qui conserva le château jusqu'en  1870 et y effectua d'importants travaux de restauration vers 1830.   En 1870, il fut vendu à Pierre Potet qui entreprit diverses transformations, il supprima la chapelle et rehaussa la tour nord ouest. Propriété totalement restaurée en 1972 par la famille Maier-Dionissoti.","architecture":"Montigny-Mornay à l'origine maison forte on y effectua d'importants travaux de restauration vers 1830.   En 1870, il fut vendu à Pierre Potet qui entreprit diverses transformations Château de Mornay avec chapelle (XIIe et XVIIIe-XIXe siècles). Propriété totalement restaurée en 1972.","habitants":"Guillaume de St-Aubin\r\n        \"","divers":"Château de Montigny et de  Mornay","gps":"","images":["../image/image_21/21_Montigny_Mornay_1.jpg","../image/image_21/21_Montigny_Mornay_2.jpg","../image/image_21/21_Montigny_Mornay_3.jpg"]},"Consult_chateau_formulairedf13":{"id":"Consult_chateau_formulairedf13","dept":"21","canton":"Dijon","commune":"Dijon","nom":"Montmusard","type":"Château","periode":"XVIII","histoire":"MONTMUSARD, en 1765, l'architecte Charles De Wailly, alors peu connu, reçut la commande d'une maison de plaisance aux environs de Dijon, au lieu-dit Montmusard (ou Montmuzard), au milieu d'un vaste domaine, pour un parlementaire bourguignon, Claude-Philibert Fyot de la Marche. Lorsque celui-ci mourut en 1768, il avait dû s'endetter lourdement pour la construction de son château. Son fils, Jean-Philippe, premier président du parlement de Bourgogne, termina le château en 1760, s'y installa et y donna des fêtes magnifiques mais, en butte à de sérieuses difficultés financières, il ne put entretenir l'édifice. Sans doute malade, il démissionna de ses fonctions et mourut en 1772. Le domaine passa à sa sur, Marie-Madeleine, qui le vendit à un riche négociant d'Arc-lès-Gray, Jacques Demay. Sa fille en hérita en 1779 et le transmit en 1784 à son fils aîné, Claude-Hubert Antony. Celui-ci mura une partie des ouvertures et vendit la coupole en plomb en 1793, puis fit abattre les deux tiers de l'édifice vers 1795. Un nouveau corps de logis fut édifié entre les deux ailes, donnant au château une forme de T. En 1867, le domaine fut morcelé, le passage du chemin de fer et la construction de la gare Porte-Neuve amputèrent le parc de sa partie sud, le reste fut loti et donna naissance à un nouveau quartier de Dijon, ce qui subsiste du château, au milieu d'un parc boisé de 3 hectares, abrite depuis 1926 une école privée.","architecture":"Montmusard; construit entre 1765 et 1769 par Charles de Wailly  le château de Montmusard a été partiellement détruit à la fin du XVIIIe par son propriétaire,  Claude Hubert Antony,  il fit démolir les deux tiers de l'édifice  vers 1795 et transforma en corps de logis le passage entre les deux anciennes ailes.   L'ensemble du parc et des jardins couvrait plus de 74 ha. Dès 1867, dans la partie occidentale du domaine, des  lotissements remplacèrent les anciens jardins, qui furent encore amputés au sud lors de l'installation de la ligne   de chemin de fer et de la gare Porte-Neuve. La ville acquit ensuite 45 hectares de la partie orientale pour établir  le parc des sports en 1933.","habitants":"Claude-Philibert Fyot de la Marche\r\n        \"","divers":"Château de Montmusard à Dijon","gps":"","images":["../image/image_21/21_Montmusard_1.jpg","../image/image_21/21_Montmusard_2.jpg","../image/image_21/21_Montmusard_3.jpg","../image/image_21/21_Montmusard_4.jpg","../image/image_21/21_Montmusard_5.jpg"]},"Consult_chateau_formulaire8409":{"id":"Consult_chateau_formulaire8409","dept":"21","canton":"St-Jean-de-Losnes","commune":"Trouhans","nom":"Montrichard","type":"Château","periode":"XIX","histoire":"MONTRICHARD, ayant hérité en 1744 de la terre de Trouhans, Jean-Baptiste Durand de Romilly à  léguée à Gilles  Germain-Richard de Ruffey, président au parlement de Bourgogne, laissa en 1794 ses biens à ses deux enfants,  Marie Thérèse, veuve de Jean François de Siffredy, et Charles-Richard de Vesvrotte. Un partage intervint, au prix d'un long procès, qui fit des Siffredy les maîtres du château de Trouhans, aujourd'hui disparu. C'est alors que Charles Richard de Vesvrotte fit bâtir sur les terres de Murgey, qui lui étaient échues, un deuxième château qu'il  destinait à son fils ruiné.  Il avait été confié aux entrepreneurs dijonnais Nicolas Palluet et Pierre Guigre.","architecture":"Montrichard,  un deuxième château  a était reconstruit, inspirée des villas italiennes, fut achevée en 1829,  a la suite d'un incendie, des toits bas ont été substitués aux terrasses à garde-corps pleins portant des statues et des vases d'ornement. Corps de logis rectangulaire à deux niveaux et attiques avec avant corps en façade plein cintre élevé d'un étage.","habitants":"Jean-Baptiste Durand de Romilly\r\n        \"","divers":"Château de Montrichard","gps":"","images":["../image/image_21/21_Montrichard_1.jpg","../image/image_21/21_Montrichard_2.jpg"]},"Consult_chateau_formulaire65be":{"id":"Consult_chateau_formulaire65be","dept":"21","canton":"Dijon","commune":"Quetigny","nom":"Motte_Quetigny","type":"Château","periode":"XVI","histoire":"MOTTE. Après avoir été la propriété de l'Eglise, Quétigny est en proie aux nouveaux envahisseurs du XVIe siècle, reîtres puis ligueurs y sèment ruine et désolation. Sans préjudice des troupes de Gallas. Des hauteurs de Talant et de la tour du logis du roi, on voyait l'affreux spectacle d'un incendie de vingt lieues, dévorant toute la plaine jusqu'au bord de la Saône. Vient la Révolution. Les pauvres gens de Quétigny deviennent propriétaires de leurs terres. Plus tard, les troupes de réserve campent sur le territoire du village avant d'aller vaincre à Marengo.  sous le Second Empire, les allemands reviennent dans la plaine, sous l'occupation prussienne, en 1842, on jette bas l'édifice roman de Saint-Martin, en forme de croix latine et surmonté d'une tour carrée.","architecture":"La Motte; On ne sait que peu de choses sur le château de la Motte, qui, entre 1744 et 1785, mentionne  la présence du château que complètent un \"pavillon et trois avenues de  tilleuls\", on voit le corps de logis encadré par deux autres bâtiments situés de   part et d'autre d'une cour centrale, devenu dans la seconde moitié du XXe siècle un pôle social, quelques bâtiments lui ont été adjoints en 1998, reprenant un vocabulaire défensif, la tour massive évoque un donjon. Le château est constitué d'un corps principal flanqué de deux avant-corps, l'édifice est composé de deux niveaux. Le corps principal comporte trois travées, il est couvert d'une toiture de tuiles vernissées polychromes formant un décor géométrique, les arcs des baies du niveau inférieur adoptent un profil en anse de panier, les fenêtres du niveau supérieur ont un profil plat. La lumière est donné dans les combles par trois lucarnes. Un jardin à la française a été dernièrement aménagé.","habitants":"Seigneur de Quetigny\r\n        \"","divers":"Château de la Motte Quetigny","gps":"","images":["../image/image_21/21_Motte_Quetigny_1.jpg"]},"Consult_chateau_formulaire14b5":{"id":"Consult_chateau_formulaire14b5","dept":"21","canton":"Saulieu","commune":"Motte-Ternant","nom":"Motte_Ternant","type":"Vestiges","periode":"XII","histoire":"MOTTE-TERNANT,  Le château aurait appartenu à Gabrielle dEstrées, favorite dHenri IV. La rumeur lui attribue la « chausse rose » quelle aurait perdu non loin dici, lors dune promenade galante en compagnie du Roi , lieu qui porterait ce nom depuis. Guillaume, seigneur de Ternant, rend hommage au comte de Nevers Louis Ier de Dampierre en 1285 pour  la grande cour de Ternant et les villes de Mulot, Salais , Perrigny, Mézeray, Rigny, Hiry, et quelques autres. Guy, sire de Ternant, en fait autant en 1310. Les Ternant gardèrent cette seigneurie plusieurs siècles, Claude de Ternant, fils du précédent, écuyer, chambellan du roi, est  seigneur de la Motte et de Ternant, sans descendant. Au début du XVIe siècle, la baronnie de la Motte-Ternant passe aux mains de Guillaume de Pontailller, époux de Claudine de Ternant, sur de Claude, puis de Gilbert de Graçay, seigneur de Champeroux et époux d'Isabeau de Ternant, et son autre sur. Ce couple a des enfants dont Jean de Graçay, seigneur de Ternant, qui se maria avec Jehanne de La Châtre.\r\n Toute trace du nom de famille de Ternant lié au village et au château de Ternant disparaît.","architecture":"Motte-Ternant. Vestiges de la tour de Gabrielle dEstrée :\r\nActuel château privé, lancien prieuré situé à Val Croissant fut fondé en 1216 par Guillaume de Mont Saint-Jean. Il sagissait auparavant dun monastère comprenant des cloîtres et un préau, accompagné dune église construite au XIVe siècle. Il ne reste que quelques départs de voûtes dans les bâtiments de ferme, qui servaient d'accueil pour des colonies de vacances.               Château du Val Croissant, corps de logis rectangulaire à deux niveaux pavillons flanqués de tourelles,  situé entre Thomirey, Villargoix et Chazelle-en-Morvan.","habitants":"Claude de Ternant\r\n        \"","divers":"Château de Ternant,  de Val-Croissant et vestiges de la Motte Ternant","gps":"","images":["../image/image_21/21_Motte_Ternant_1.jpg","../image/image_21/21_Motte_Ternant_2.jpg","../image/image_21/21_Motte_Ternant_3.jpg","../image/image_21/21_Motte_Ternant_4.jpg"]},"Consult_chateau_formulaire0c4b":{"id":"Consult_chateau_formulaire0c4b","dept":"21","canton":"Pouilly-en-Auxois","commune":"Marcilly-Ogny","nom":"Ogny_Sussey","type":"Château","periode":"XVII","histoire":"OGNY, une maison forte est cité à Ogny dès le début du XIVe siècle, rebâti vers 1620 pour Vincent Robelin,  président au parlement,, fait reconstruire le château hérité de Bernard de Colombier. Cette demeure, dont le premier propriétaire était Claude Rigoley - Baron dOgny, le château fut  modernisé au XVIIIe siècle,. Situé à l'extrémité nord du hameau, le château est établi sur une plate forme bordée d'un fossé  sur trois côtés, un mur d'escarpe surmonté d'un cordon est conservé à l'est, l'édifice se compose d'un corps de logis au nord-ouest, d'un pavillon à l'est et d'un colombier de plan carré au sud-est, le logis est formé   d'un corps central en rez de chaussée avec comble à surcroît entre  deux pavillons à un étage carré,  il est couvert de tuile plate, de même que le pavillon nord-est.                                                    A cinq kilomètres la ville de Sussey possède le  vestige de l'ancienne tour du château. Elle porte aussi le nom de \"la prison\", puisque c'est ici que l'on détenait les prisonniers. On y voit encore les meurtrières, à noter que le blason de Sussey reprend cet élément architectural, qu'est la vieille porte du château.","architecture":"Ogny; deux châteaux du XVIIe siècle classique, dont-un construit en 1620 corps de logis central à deux niveaux entre deux pavillons surélevés, toits en croupes. L'autre château corps de logis rectangulaire à deux niveaux toits en croupe Sussey,  vestiges d'une tour prison porte à arcade.  fut sérieusement endommagé par les Huguenots. Sur le plan cadastral de 1845, seules subsistaient quatre tours aux angles dune plate-forme rectangulaire. Cette bâtisse a été récemment restaurée de belle manière en lui redonnant les volumes perdus lors de différentes transformations.","habitants":"Vincent Robelin\r\n        \"","divers":"Maison forte d'Ogny-Sussey et vestiges féodal porte à Sussey","gps":"","images":["../image/image_21/21_Ogny_Sussey_1.jpg","../image/image_21/21_Ogny_Sussey_2.jpg","../image/image_21/21_Ogny_Sussey_3.jpg","../image/image_21/21_Ogny_Sussey_4.jpg","../image/image_21/21_Ogny_Sussey_5.jpg","../image/image_21/21_Ogny_Sussey_6.jpg"]},"Consult_chateau_formulaire41e9-2":{"id":"Consult_chateau_formulaire41e9-2","dept":"21","canton":"Aignay-le-Duc","commune":"Origny","nom":"Origny","type":"Vestiges","periode":"XIV","histoire":"ORIGNY, du château qui fut construit au XIVe siècle et remanié aux XVI et XVIIe siècle, il ne reste hélas que les trois tours  qui se dressent en bordure du pays sur la vallée, celle du nord est abritait la chapelle. Bon nombre de seigneurs se sont succéder à Origny, le dernier au moment de la Révolution, fut Claude-Charles de Damas, colonel au régiment dInfanterie Auxerrois, gouverneur de la Martinique et des Iles sous le Vent, époux de Marie Antoinette de Montcalm fille du célèbre général qui se battit pour défendre le Canada et mourut devant Québec.","architecture":"Origny, du château du XIVe siècle il ne reste que des vestiges","habitants":"Claude-Charles de Damas\r\n        \"","divers":"Vestiges du château d'Origny","gps":"","images":["../image/image_21/21_Origny_1.jpg","../image/image_21/21_Origny_2.jpg","../image/image_21/21_Origny_3.jpg","../image/image_21/21_Origny_4.jpg","../image/image_21/21_Origny_5.jpg","../image/image_21/21_Origny_6.jpg","../image/image_21/21_Origny_7.jpg"]},"Consult_chateau_formulaire0f96":{"id":"Consult_chateau_formulaire0f96","dept":"21","canton":"Chenovre","commune":"Ouges","nom":"Ouges","type":"Château","periode":"XVI","histoire":"OUGES;   Le château dOuge est un manoir villageois, petite  maison forte, dont la construction a été achevée en 1590 par une famille au service des Habsbourg, les Lullier.  Le bâtiment et le domaine sont aujourd'hui loués à l'année par des particuliers par l'agence nationale pour l'amélioration de l'habitat.","architecture":"Ouge, manoir   achevé en 1590   les deux tourelles et l'agencement symétrique et régulier du corps  principal sont des aménagements du XIXe siècle. L'édifice à plan en U et les dépendances, bâtiment de plan rectangulaire et colombier de plan carré sont situés  en bordure de voie. Un important  parc boisé cerné d'un mur de clôture en pierre se développe  au Nord de la propriété. L'entrée principale dans le domaine  se fait par une cour face  à la demeure flanquée à l'arrière par   deux tourelles d'angle. L'ensemble des toitures présente une variété dans les formes et les matériaux employés. \r\nDans la commune le château de Chambret.","habitants":"Famille des Lullier\r\n        \"","divers":"Château d'Ouges et  de Chambret.","gps":"","images":["../image/image_21/21_Ouges_1.jpg","../image/image_21/21_Ouges_2.jpg"]},"Consult_chateau_formulaire2150":{"id":"Consult_chateau_formulaire2150","dept":"21","canton":"Seurre","commune":"Pagny-le-Château","nom":"Pagny","type":"Château","periode":"XV","histoire":"PAGNY, château fort, en briques, construit au XIIe siècle pour la famille de Vienne, était entouré d'épaisses murailles, la chapelle fondée en 1297 par Philippe de Vienne fut  reconstruite à la fin du XVe siècle ou au début du XVIe siècle pour Gérard de Longvy, elle reçut ensuite un décor Renaissance  comprenant le portail  sculpté daté 1533,  le clocheton de la façade occidentale  et les chapiteaux  historiés de la nef dont l'un est daté 1536. Le nouveau château que fit construire vers 1530 l'amiral Chabot était composé d'un logis de plan carré à trois étages, accompagné de tours et de pavillons. A cette époque, le parc du château fut agrandi et embelli, notamment par une grotte ornée de rocailles. La chapelle a perdu, au XIXe siècle, une grande partie de son décor sculpté et de son mobilier dont les pièces les plus importantes se trouvent aujourd'hui au musée de Philadelphie et au musée du Louvre Jean de Vienne, général et amiral de France, né à Dole en 1341 et mort à Nicopolis (Bulgarie) en 1396, habita durant de longues années dans l'ancien château fort de Pagny-le-Château. Son tombeau est d'ailleurs dans la chapelle,  accompagné de tours et de pavillons. Du château détruit en 1774 il ne reste qu'une partie des dépendances remaniées au XIXe siècle. On peut toujours cependant y admirer les tombeaux de Jean de Vienne, Jeanne de Vienne et Jean de Longvy. Les propriétaires,Mr et Mme ZIEGLER ont transformé le bâtiment d'habitation en gîte d'étape.","architecture":"Le château fort de Pagny en briques, construit au XIIe siècle était entouré d'épaisses murailles surmontées de créneaux et cantonnées de tours rondes, il fut détruit, puis reconstruit vers 1530 par l'amiral Chabot, le château était alors composé d'un logis à trois étages accompagné de tours et de pavillons. Du château détruit en 1774, il ne reste qu'une partie des dépendances.  Quant à la chapelle fondée en 1297 par Philippe de Vienne, elle fut reconstruite entre le XVe siècle et le XVIe siècle pour Gérard de Longvy. Elle reçut un décor de la Renaissance, comprenant le portail sculpté daté de 1533, le clocheton de la façade et les chapiteaux historiés de la nef. Au XIXe siècle, une grande partie de son décor sculpté et de son mobilier disparut : aujourd'hui, on retrouve les pièces les plus importantes au musée de Philadelphie (États-Unis) et au musée du Louvre à Paris. On peut cependant y admirer les tombeaux de Jean et Jeanne de Vienne, ainsi que celui de Jean de Longvy.","habitants":"Famille de Vienne\r\n        \"","divers":"Château de Pagny","gps":"","images":["../image/image_21/21_Pagny_1.jpg","../image/image_21/21_Pagny_2.jpg","../image/image_21/21_Pagny_3.jpg"]},"Consult_chateau_formulairebcf8":{"id":"Consult_chateau_formulairebcf8","dept":"21","canton":"Sud-Beaune","commune":"Vignoles","nom":"Pasquier_Vignoles","type":"Château","periode":"XIX","histoire":"PASQUIER. Les seigneurs de Vignoles ont leur résidence dans le château du Pasquier. Le 29 juillet 1789, les Beaunois en armes occupent le château qui appartient alors au marquis dAgrain. Acheté par Alfred de Vergnette de Lamotte, maire de Beaune de 1851 à 1852 et son épouse Jeanne Nodot en 1854. La propriété est mise en vente par Guy Vergnette de la Motte en 1970. Lacquisition de ce domaine est déclarée dutilité publique par la Ville de Beaune qu'il le transforme en un lieu culturel.","architecture":"Pasquier,deux châteaux à Vignoles, lactuel château est construit au cours du XIX e siècle, à proximité du château existant, et sert de résidence principale Les armes des familles Vergnette et Nodot sont représentées sur le fronton, un bâtiment principal de construction  empire dont laile nord a été endommagée durant la guerre 1939-1945, un bâtiment annexe qui sert de logement pour les gardiens et un bâtiment de dépendances.","habitants":"Alfred de Vergnette de Lamotte\r\n        \"","divers":"Château de Pasquier à Vignolles","gps":"","images":["../image/image_21/21_Pasquier_Vignoles_1.jpg","../image/image_21/21_Pasquier_Vignoles_2.jpg","../image/image_21/21_Pasquier_Vignoles_3.jpg"]},"Consult_chateau_formulaire282d":{"id":"Consult_chateau_formulaire282d","dept":"21","canton":"Dijon","commune":"Plombières-les-Dijon","nom":"Plombieres","type":"Château","periode":"XVII","histoire":"PLOMBIERES; En 1654, Jean Gauthier, conseiller du Roi Louis XIV, maître à la chambre des comptes, reçoit la propriété de ses parents. Il sy retire en 1660 pour se consacrer à létude des sciences, il sattache à reconstruire une des plus belles maisons de campagne de lépoque à en juger par la description enthousiaste du Mercure Galant en 1679. La maison de M. Gauthier, en 1701, à la mort de Jean Gauthier, sa soeur Pierrette lui succéda. Anoblie par son mariage avec Jean de Cluny, conseiller du Roi elle porta le titre de dame de la Roche et Vausandrey, en 1702 Pierrette Gauthier, en 1712 Pierre de la Mare, petit-fils de Philibert de la Mare. En 1783 François Sirice Melchior, comte de Vogüe frère de Monseigneur de Vogüe. En 1791 monsieur Auguste Martin dOizilly, sa veuve, Marie Marguerite Papillon dOisilly lègue la maison à la fille de sa femme de chambre, Mme Sicardet. En 1848 Mme Sicardet propose sa propriété à la commune aux fins dinstaller la nouvelle maison commune et les écoles primaires. En 1858 Jules Grenier Gustelle se rend acquéreur de la propriété et fait reconstruire une très belle maison bourgeoise. En1876 cette propriété a appartenu aux familles Grenier Troubat, avant dappartenir depuis 1988 à la famille Tourtet, Jean-Claude Tourtet fit rénové lensemble des bâtiments et conservé la partie ancienne pour y aménager des chambres dhôtes.","architecture":"Plombières, château remanié au XIXe siècle, corps de logis rectangulaire à deux niveaux et attiques toiture vernissée,  accolé en angles d'une petite tour ronde, à l'opposée prolongé d'un bâtiment rectangulaire à niveau inférieur.","habitants":"Jean-Claude Tourtet\r\n        \"","divers":"Château de Plombières","gps":"","images":["../image/image_21/21_Plombieres_1.jpg","../image/image_21/21_Plombieres_2.jpg","../image/image_21/21_Plombieres_3.jpg"]},"Consult_chateau_formulaire5fcb":{"id":"Consult_chateau_formulaire5fcb","dept":"21","canton":"Beaune","commune":"Pommard","nom":"Pommard","type":"Château","periode":"XVII","histoire":"POMMARD. En 1726, messire Vivant de Micault, fermier général directeur des poudres, écuyer et secrétaire du Roy Louis XVI  y fit construire un château ainsi que lensemble des bâtiments dexploitation viticoles que lon trouve encore aujourdhui. En 1763, le sieur Claude Marey rachète le domaine. Pressentant les soubresauts de 1789, Nicolas Joseph, son fils, cède alors le château Micault à un officier tout  en conservant les vignes, la Révolution passe et épargne le domaine. En 1795, Nicolas-Joseph Marey épouse Emilie Monge, fille du physicien Gaspard Monge, fondateur de lécole polytechnique et comte de Peluse. La famille devient Marey Monge, ne pouvant racheter le château Micault, Nicolas-Joseph Marey construit un nouveau château. La famille de Blic, hérite de la famille Marey-Monge, le revend en 1932, en même temps que le Clos-de-Tart.\r\nEn 1855, reconnaissance suprême, Jules Lavalle, le premier à inventorier les vins de Bourgogne, classe le  Clos du château de Pommard  dans les  première cuvée, équivalent des  premiers crus  actuels. En 1936, la famille Laplanche issue dune vieille famille vigneronne fait lacquisition du domaine. En rachetant, en 1966, le château Micault, Jean-Louis Laplanche, le célèbre psychanalyste, et son épouse Nadine, redonnent son  unité au château de Pommard. En 2003, Maurice Giraud, amoureux de la vigne et passionné du terroir, fait lacquisition de ce fabuleux domaine.","architecture":"Pommard,  deux châteaux  ont été bâtis sur un domaine, le premier, construit de 1726 à 1750 par Vivant Micault le second  est l'oeuvre de Claude Marey qui  racheta le domaine en 1763, et le transmet par la suite à son fils Nicolas-Joseph Marey qui le  fit construire  en 1802. L'empereur Napoléon Ier en fait un de ses hauts lieux de villégiature au XIXe siècle. Pommard, corps de logis rectangulaire à deux niveaux et attiques sur un toit à la Mansard et le château de Micault, corps de logis rectangulaire flanqué de pavillon carré.","habitants":"Messire Vivant de Micault\r\n        \"","divers":"Château de Pommard et de Micault, de Commaraine du XVIIIe siècle et de  Colliers du XIIe siècle","gps":"","images":["../image/image_21/21_Pommard_1.jpg","../image/image_21/21_Pommard_2.jpg","../image/image_21/21_Pommard_3.jpg","../image/image_21/21_Pommard_4.jpg","../image/image_21/21_Pommard_5.jpg"]},"Consult_chateau_formulairee455":{"id":"Consult_chateau_formulairee455","dept":"21","canton":"Vitteaux","commune":"Posanges","nom":"Posanges","type":"Maison forte","periode":"XIII","histoire":"POSANGES, cité en 1243 par le fief de Heslin de Wavrin qui s'en défait au profit du duc Hugues IV de Bourgogne et passe en 1299 à Eudes de Frolois, puis en 1391 Erard de Lézigné qui possédait une partie de la seigneurie, passa ensuite  dans diverses familles pour être acquise en 1437 par Guillaume Dubois, bailli d'Auxois maître d'hôtel de Philippe III le Bon a reconstruit le château entre 1445 et 1453,  c'est son fils qui a terminé le chantier en 1490. Joachim Dubois  accusé d'avoir assassiné Antoine de la Perrière dut  laissé inhabité le domaine gardé par les fermiers des  Damas. Puis Posanges a été acheté en 1561 par la famille de Cléron, restera dans la descendance d'Arvier de Cléron jusqu'en 1704 passe à Bénigne de Torcey veuve  d'un  Balathier-Lantages, dont la fille le revendit  en 1714 aux ursulines de Vitteaux qui le garderont jusqu'à la Révolution, en 1792 acquis par un ancien conseiller au grenier de sel de Semur puis passe à un docteur de Vitteaux et à d'autres propriétaires et en 1960 par monsieur Cuvelier qui y installe une manufacture de tissus et finalement racheté en 1974 par monsieur Roland Remoissenet.                                                                    A trois kilomètres de Posanges le village de Marcilly et Dracy, fortifié avec portes et tours.","architecture":"Posanges, au XIIIe siècle maison forte puis remplacé par un château affecte la forme trapézoïdale légèrement allongé du nord-est au sud-ouest, et enfermé entre quatre murailles ou courtines d'égale hauteur et parfaitement parallèles. Percées de rares et étroites meurtrières et, sur la face sud-ouest, de trois larges fenêtres à embrasures évasées, ces courtines sont commandées aux angles par des  tours rondes, les fossés larges et profonds  sont aujourd'hui à sec, la façade principale a son aspect au nord Est, la grande porte à cintre surbaissé qui la divise en deux parties  est la seule qui donne accès dans la place, elle était précédée d'un pont-levis, à gauche s'ouvre la poterne ou guichet autrefois destiné aux piétons, ce qui frappe tout d'abord à Posanges, c'est le parfait état de conservation de l'édifice, les matériaux étaient  excellents, de telle sorte  que le temps n'a pu entamer  ses épaisses murailles, ainsi Posanges peut-être considéré comme le spécimen d'un genre de construction très nombreuses en Bourgogne au XVe siècle.","habitants":"Guillaume Dubois\r\n        \"","divers":"Château de Posanges et villages fortifié de Marcilly et de Dracy","gps":"","images":["../image/image_21/21_Posanges_1.jpg","../image/image_21/21_Posanges_2.jpg","../image/image_21/21_Posanges_3.jpg","../image/image_21/21_Posanges_4.jpg","../image/image_21/21_Posanges_5.jpg","../image/image_21/21_Posanges_6.jpg","../image/image_21/21_Posanges_7.jpg"]},"Consult_chateau_formulaire6989-2":{"id":"Consult_chateau_formulaire6989-2","dept":"21","canton":"Pouilly-en-Auxois","commune":"Pouilly-en-Auxois","nom":"Pouilly","type":"Château","periode":"XIV","histoire":"POUILLY, dès le IXe siècle  était la propriété des ducs de Bourgogne jusqu'à la fin  du XVe siècle, le château  a connu diverses familles, les Vienne, les Stainville, les Legoux de La Berchère et les Gagne de Perrigny qui ont songés à le détruire pour en reconstruire un autre. Le château actuel fut bâti vers 1761 sur les plans de Jean Antoine Caristie, avec peut-être la collaboration de l'architecte Edme Verniquet. Bénigne Legoux de Saint-Seine  en était le propriétaire peu avant la Révolution, mais ne l'a gardé très peu de temps,  confisqué comme bien national. En 1809, c'est le chimiste Jean-Baptiste Mollerat qui l'achète et entreprend la destruction d'une partie  pour établir des bâtiments industriels. Ces dernières constructions ont été laissés à l'abandon, le château et son  parc ont été remis en état à partir de 1910.                          Le clos de Pouilly est un exemple de maison de campagne de la noblesse parlementaire puis de la bourgeoisie locale. À l'origine une villa puis au XIe siècle un petit fief tenu par les seigneurs de Pouilly. Au XVIe siècle ce domaine rentre dans le patrimoine de la famille Bouhier de Lantenay jusqu'à la Révolution.","architecture":"Pouilly. La forteresse a été construite dès le IXe siècle et était la propriété des ducs de Bourgogne jusqu'à la fin du XVe siècle. La terrasse et les deux tourelles d'angle bordant la Saône, qui auraient été construites en 1475 pour Charles de Stainville sont les seuls vestiges du château médiéval. Le pavillon ouest du logis fut   ajouté au début du XIXe. La chapelle et les autres bâtiments sont postérieurs à 1824.","habitants":"les Gagne de Perrigny\r\n        \"","divers":"Château de Pouilly. Dans la commune plusieurs châteaux; Chailly  voir article, Commarin voir article, Sainte-Sabine voir article.","gps":"","images":["../image/image_21/21_Pouilly_1.jpg","../image/image_21/21_Pouilly_2.jpg","../image/image_21/21_Pouilly_3.jpg"]},"Consult_chateau_formulairedda2":{"id":"Consult_chateau_formulairedda2","dept":"21","canton":"Aignay-le-Duc","commune":"Quemigny-sur-Seine","nom":"Quemigny","type":"Château","periode":"XVIII","histoire":"QUEMIGNY, au début du XIIIe siècle propriété des ducs de Bourgogne, inféodé aux seigneurs portant le nom de Quemigny au XVe siècle, il appartient à Richard Dures, puis en 1465 à la famille de Vingles dont Pierre qui à épousé  Isabeau de Ternay, cette famille  gardera la seigneurie  jusqu'en 1632, puis passera aux Daubenton, aux Baillet de Vaugrenant, aux Viart, aux Fournier et à Jean de Bruant des Carrières qui le cède en 1731 à Louis Bichot Morel de Corberon maître des comptes en 1739  a épousé Jeanne Marie Pasquier,  Corberon cède en 1757 la seigneurie de Quemigny et celle de Duesme à Louis Guénichon, puis à Louis Guy de Guénichon en 1875  ou le domaine est vendu à l'abbé Pery qui le lègue à une de ses nièces, madame Bézine  en 1950 le  vend à monsieur Hochdoerffer qui le restaure  aujourd'hui propriété  de madame Laurençot.","architecture":"Quemigny, la  reconstruction date du XVIIIe siècle confirmé du donjon, haute tour carrée à fenêtres à meneaux, deux bâtiments bas l'un abritant plusieurs pièces dont la cha
