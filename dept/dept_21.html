t crée en 1962 , ce château abrite depuis  le lycée Stéphen-Liégeard; L'ensemble se compose aujourd'hui du château, du parc, d'un bâtiment moderne d'enseignement jouxtant un internat et de quelques bâtiments annexes.\r\nLa roseraie en voie de reconstitution.","architecture":"Brochon, en 1879, Liégeard fait démolir les derniers bâtiments des Chartreux exceptée la \"Tour Crébillon\". Le chantier du château démarre en 1895 pour s'achever,  en 1899. Le décor, lui, est achevé en 1902. Dans un style néo-renaissance des châteaux de la Loire, en forme d'un L composé de deux corps principaux reliés par un pavillon.le corps de logis nord,de plan rectangulaire est élevé sur un sous-sol, il comprend un rez-de- chaussée, un étage carré et un étage de comble, du côté ouest flanqué d'une tour carrée, terminée d'une terrasse entourée de balustre et que surmonte un pavillon octogonal dont la toiture supporte un lanternon, le pavillon central, plus élevé, est coiffé d'un haut toit en pavillon percé d'une lucarne à fenêtres jumelées. Adossé au pavillon l'aile orientale élevée sur un rez-de-chaussée, un étage carré et un étage de comble. Le corps de logis est flanqué  sur des angles nord-est et sud-est  avec tourelles en encorbellement à son angle sud-ouest tour ronde renfermant un escalier à vis  et elle-même cantonnée d'une mince tourelle coiffée d'un lanternon. Les bâtiments modernes, construits en 1962 pour le lycée,","habitants":"Stéphen-Liégeard\r\n        \"","divers":"Château de Brochon.","gps":"","images":["../image/image_21/21_Brochon_1.jpg","../image/image_21/21_Brochon_2.jpg","../image/image_21/21_Brochon_3.jpg","../image/image_21/21_Brochon_4.jpg","../image/image_21/21_Brochon_5.jpg","../image/image_21/21_Brochon_6.jpg"]},"Consult_chateau_formulairec773":{"id":"Consult_chateau_formulairec773","dept":"21","canton":"Gevrey-Chambertin","commune":"Broindon","nom":"Broindon","type":"Château","periode":"XVII","histoire":"BROINDON; Château construit pour l'essentiel au XVIIe siècle  pour Claude Gaillard, président de la  cour des comptes de Dijon. Quelques remaniements au XIXe siècle, notamment dans le parc.   Dans le parc subsiste le choeur d'une chapelle du XIIe siècle, bâtie vers 1100, ornée de peintures murales et conservant des chapiteaux sculptés d'époque romane.  A quelques kilomètres au sud-est à Epernay sous Gevrey un château du XVe siècle.","architecture":"Broindon, ancienne maison forte du XVIIe siècle, construction en forme de U à deux niveaux et attiques .                                     Epernay sous Gevrey quadrangulaire flanqué de tours carrées.","habitants":"Claude Gaillard\r\n        \"","divers":"Château de Broindon et de la maison forte d'Epernay sous Gevrey","gps":"","images":["../image/image_21/21_Broindon_1.jpg","../image/image_21/21_Broindon_2.jpg","../image/image_21/21_Broindon_3.jpg"]},"Consult_chateau_formulaire75e2":{"id":"Consult_chateau_formulaire75e2","dept":"21","canton":"Bligny-sur-Ouche","commune":"La Bussière-sur-Ouche","nom":"Bussiere_Loizerolle","type":"Château","periode":"XIII","histoire":"BUSSIERE;  Le château de Bussière est l'Abbaye classé aux relais et château  L'Abbaye de la Bussière fut fondée en 1131 par Étienne Harding, un anglais  abbé de Cîteaux. Le domaine est racheté par le baron Léonce Hely d'Oissel à la fin du XIXe siècle, et sa restauration est confiée à l'architecte Charles Suisse et au sculpteur Xavier Schanosky. Héritière du baron, sa fille, la marquise de Ségur, devenue veuve et sans descendance en fit don en 1921, à l'évêché de Dijon pour qu'il accueille des retraites spirituelles.Les bâtiments ont été rachetés en 2005 et restaurés pour créer un château-hôtel de luxe, membre du réseau Relais et Châteaux, dans un parc de 7 hectares.. L'abbaye de La Bussière fait l'objet d'un classement au titre des monuments historiques depuis le 22 novembre 1981.                                    \r\nLOIZEROLLE; le château date de la moitié du XIXe siècle, le site a abrité une abbaye, en partie résidence des moines qui rejoignirent l'abbaye actuelle de La Bussière-sur-Ouche.\r\n Depuis le 22 novembre 1981.Henri Vincenot (1912-1985) Le colonel Roger Flamand (1920-2010), grand officier de la Légion dhonneur, ancien maire. Les murs en briques roses ont été conservés par leurs récents propriétaires, Joy et Martin Cummings,","architecture":"Bussière;  autrefois fortifié, possédait un château, vestiges après un incendie, vers 1130.                                                  \r\nL'Oizerolle est situé à l'extrême Nord de La Bussière-sur-Ouche le site a abrité une abbaye, le château de Lizerolle en brique rose date de la moitié du XIXe siècle,  car elles sont mises en valeur par le soleil. Le château et ses dépendances grange et calvaires classés, Le site a abrité une abbaye,chapelle Saint-Sylvestre, habitations des anciens fermiers, prés, potager, bois, etc. sont implantés sur près de 26 hectares.\r\nEn 1988, la grange monastique, Dîmierre et le calvaire ont été inscrits à l'inventaire supplémentaire des monuments historiques.","habitants":"Étienne Harding\r\n        \"","divers":"Château de l'Oizerolle et abbaye de Buissière.","gps":"","images":["../image/image_21/21_Bussiere_Loizerolle_1.jpg","../image/image_21/21_Bussiere_Loizerolle_2.jpg","../image/image_21/21_Bussiere_Loizerolle_3.jpg","../image/image_21/21_Bussiere_Loizerolle_4.jpg","../image/image_21/21_Bussiere_Loizerolle_5.jpg","../image/image_21/21_Bussiere_Loizerolle_6.jpg","../image/image_21/21_Bussiere_Loizerolle_7.jpg","../image/image_21/21_Bussiere_Loizerolle_8.jpg","../image/image_21/21_Bussiere_Loizerolle_9.jpg"]},"Consult_chateau_formulaireea2b":{"id":"Consult_chateau_formulaireea2b","dept":"21","canton":"Venarey-les-Laumes","commune":"Bussy-le-Grand","nom":"Bussy_Rabutin","type":"Château","periode":"XV","histoire":"BUSSY-RABUTIN; Bussy ancienne seigneurie du XIIIe siècle, le château de Bussy-Rabutin a été fondé au XIIe siècle par Renaudin de Bussy. Passa vers 1380 au Rochefort qui le firent reconstruire au XVe siècle, l'un d'eux, surnommé   Antoine de Chandio lieutenant de la compagnie des hommes d'armes de Bayard entreprit de le moderniser, ramena des artistes italiens qui travaillèrent à la cour de Charles VIII, son petit-fils Antoine réalisa des aménagements renaissances.\r\nRacheté en 1602 par le baron François de Rabutin qui le remanie  après avoir fait rasé le donjon, son petit fils Roger, comte de Bussy, cousin de Marie Chantal de Rabutin marquise de Sévigné, homme de guerre et écrivain hérite, fin libertin et jouisseur espiègle, ses satires de moeurs amoureuses n'épargne pas même le roi  ce qui l'emmène à la Bastille.  après sa libération en 1666. De retour en son château en exil  pour égayer la marquise de Monglat, sa maîtresse, il écrit son \"Histoire amoureuse des Gaules\", il collectionne les portraits (dont 200 à 300 tableaux  tout en écrivant ses mémoires. Après sa mort en 1693,  le château passera  par mariages et ventes successives  en 1835 au comte de Sarcus qui  obtient le classement du château comme monument historique en 1862  commence sa restauration. L'État l'achète en 1929.","architecture":"Bussy-Rabutin; Le château du XIIe siècle a été totalement modifié en plusieurs périodes de travaux à partir du XVe siècle, remanié sous Henri II puis sous Louis XIII, ce château quadrilatère possédait un donjon détruit  en 1600 et eu des remaniements au cours des ans, entouré de fossés en eau, il se présente comme un logis avec deux ailes de la Renaissance qui relient deux des tours au corps du bâtiment principal encadrant une cour d'honneur, l'extrémité de ses ailes et les deux angles du logis étant cantonnés de tours rondes à toits pointus dont deux terminant par des lanternes, le logis est à un étage avec un toit couvert d'ardoises et percé de lucarnes, la cour d'honneur est entourée de galeries aux décors typiques de la première Renaissance Française tandis que la façade du logis est représentative du milieu du XVIIe siècle possède un fronton triangulaire, coupé, surmonté d'un fronton cintré.","habitants":"Renaudin de Bussy Marie Chantal de Rabutin\r\n        \"","divers":"Château de Bussy-Rabutin","gps":"","images":["../image/image_21/21_Bussy_Rabutin_1.jpg","../image/image_21/21_Bussy_Rabutin_2.jpg","../image/image_21/21_Bussy_Rabutin_3.jpg","../image/image_21/21_Bussy_Rabutin_4.jpg","../image/image_21/21_Bussy_Rabutin_5.jpg"]},"Consult_chateau_formulaireeb6e":{"id":"Consult_chateau_formulaireeb6e","dept":"21","canton":"Dijon","commune":"Dijon","nom":"Castel_Colombiere","type":"Gentilhommière","periode":"XVII","histoire":"CASTEL-COLOMBIERE; En 1672 le castel de la Colombière dont le parc  est créé au bord de l'Ouche par le prince de Condé, gouverneur de Bourgogne Louis II de Bourbon-Condé, le Grand Condé, 1621-1686. Il est relié au centre ville de Dijon par « les Allées du Parc ».Le  fils du précédent, le duc d'Enghien et gouverneur de Bourgogne Henri Jules de Bourbon-Condé (1643-1709) fait construire le « Castel de la Colombière » de l'autre coté de l'Ouche relié par une passerelle au parc dont il poursuit l'aménagement avec le paysagiste Antoine de Maerle, élève et disciple d'André Le Nôtre, jardinier paysagiste du Roi Louis XIV de France.","architecture":"Le Castel de la Colombière de Dijon en Côte-d'Or est un château du XVIIe siècle associé à l'origine au parc de la Colombière de 33 hectares. Il héberge à ce jour le centre équestre  lÉtrier de Bourgogne , association loi de 1901 c'est le plus important centre équestre de Bourgogne en nombre de licencié avec près de 500 membres.","habitants":"prince de Condé\r\n        \"","divers":"Château de Castel-Colombière à Dijon.","gps":"","images":["../image/image_21/21_Castel_Colombiere_1.jpg","../image/image_21/21_Castel_Colombiere_2.jpg","../image/image_21/21_Castel_Colombiere_3.jpg","../image/image_21/21_Castel_Colombiere_4.jpg","../image/image_21/21_Castel_Colombiere_5.jpg"]},"Consult_chateau_formulairecd5c":{"id":"Consult_chateau_formulairecd5c","dept":"21","canton":"Pouilly-en-Auxois","commune":"Chailly-sur-Armançon","nom":"Chailly","type":"Château","periode":"XVI","histoire":"CHAILLY; Au XIIe siècle fief de la famille de la Boulaye, passe par alliance aux Bourbon Boulaye, restera dans cette famille un siècle, en 1400 Guillaume des Loges épouse  Agnés Bourbon de la Boulaye devient propriétaire, son fils  Jean, Seigneur de Loges, son petit-fils Hugues II Bailli d'Autun et Montcenis épouse en 1528 Claude de Rabutin, il aura deux fils et en seconde noce avec Charlotte du Mesnil un fils Simon  sans héritier passa à son beau frère Louis de Chastellux général des armées, qui  a épousé Anne des Loges à sa mort revient à sa fille Antoinette qui a épousée en 1578  Anatole-Louis de Pontarlier seigneur de Châtillon en Bazois passa à leur fille qui a épousée  en 1588 Edme de Rochefort marquis de Pleuvant a la mort de Edme la seigneurie passa à ses deux fils  Roger qui mourut à Philsbourg en 1644 passa à son frère François-Roger  qui le transmet a ses filles dont-une a épousé  Nicolas de Chaugy mais elle vendit le château en 1665 acheté par Pierre  Lenet  seigneur de Meix, revendu ensuite  en 1672 aux  Brunet seigneur et baron de Chailly son fils Jean-Baptiste épouse Marie de Cadolu leur fils Pierre sans enfant le château revient à sa soeur  qui a épousé Charles de Tillet  reste dans cette famille jusqu'en 1803 le revende à Auguste Gollard  qui le gardera jusqu'en 1888 .En 1789, le Château fut protégé contre les excès révolutionnaires, car son domaine est exploité par un fermier de seigneurie, Augustin Godard, maire de Chailly et  lieutenant Criminel à Arnay-le-Duc. Celui-ci racheta le château en 1796, avant qu'il ne soit revendu à la famille Chalon en 1888. En 1987 Yasuhiko Sata, a fait réhabiliter le château  et le transforme en un hôtel restaurant de luxe.","architecture":"Chailly;  Etait au XIIe siècle, une simple maison-forte, Construit au XVIe siècle,en fit une véritable forteresse la transforma en demeure Renaissance,  une façade rectiligne flanquée de deux grosses tours rondes vers la campagne et sur la cour de larges baies à croisillons bien alignées et deux tours hexagonales hors oeuvres occupées par des escaliers, aspect que le château a conservé, dotée de quatre tours et d'un pont-levis de plan rectangulaire long corps de logis à un étage , la façade avec frise sculptée donnant sur cour flanqué de deux tourelles d'escalier de plan hexagonal.","habitants":"Anatole-Louis de Pontarlier\r\n        \"","divers":"Château de Chailly","gps":"","images":["../image/image_21/21_Chailly_1.jpg","../image/image_21/21_Chailly_2.jpg","../image/image_21/21_Chailly_3.jpg","../image/image_21/21_Chailly_4.jpg","../image/image_21/21_Chailly_5.jpg"]},"Consult_chateau_formulaire06ba":{"id":"Consult_chateau_formulaire06ba","dept":"21","canton":"Châtillon-sur-Seine","commune":"Chamesson","nom":"Chamesson","type":"Château","periode":"XVIII-XIX","histoire":"CHAMESSON; Les Seigneurs de Chamesson fondèrent au XIIIe siècle le couvent des Cordeliers à Châtillon-sur-Seine. En 1560 une forge et un fourneau sont construits à Chamesson. Se succédèrent les familles Mesgrigny, Bruslart, Vichy, Leboeuf et Daguin Nicolas Bruslart affranchit la commune de Chamesson en 1682. Nicolas Bruslart était un homme dun rare mérite. Nommé premier président du parlement de Bourgogne, en 1657, à lâge de 33 ans, il montra dans les affaires une fermeté qui le place au rang des plus grands magistrats.\r\nVers 1830 lancien château est détruit pour être remplacé par la bâtisse actuelle, propriété de la famille Daguin cédé en 1923 à un marchand de biens, puis à un boucher parisien et à la famille Richard actuel propriétaire.                                                        AMPILLY le SEC. Agréable maison bourguignonne, le château fût la demeure des seigneurs dAmpilly. Construit au XVIIIe siècle par les Sommyèvre.  A lépoque, il  possédait une chapelle castrale élevée par Félicien de Sommyèvre et  bénite en 1700. Vers 1828, il fût remanié en partie par M. Cousturier, le salon était décoré de beaux tableaux de maîtres présentant des paysages et vues  locales. Le château est aujourdhui une propriété privée.","architecture":"Chamesson, château du XVIIIe siècle corps de logis rectangulaire à deux niveaux et attiques et pigeonnier dans le parc.                 Ampilly le sec; construit au XVIIIe siècle, le château présente un grand corps de bâtiment avec pavillons dangle.","habitants":"Nicolas Bruslart                                                                    Félicien de Sommyèvre \r\n        \"","divers":"Château de Chamesson et d'Ampilly le Sec.","gps":"","images":["../image/image_21/21_Chamesson_1.jpg","../image/image_21/21_Chamesson_2.jpg","../image/image_21/21_Chamesson_3.jpg"]},"Consult_chateau_formulaire5342":{"id":"Consult_chateau_formulaire5342","dept":"21","canton":"Mirebeau","commune":"Champagne-sur-Vingeanne","nom":"Champagne_Vingeanne","type":"Château","periode":"XVI","histoire":"CHAMPAGNE, le fief de  Champagne, est flanquée de tours, et à  le droit d'user de sel blanc ; château construit à la fin du XVIe siècle, remanié au XVIIIe siècle puis au XIXe siècle. Château situé en bordure du village à l'ouest, au confluent de la rivière la Vingeanne et du ruisseau le Soirsan.","architecture":"Champagne, bâtiment principal de plan rectangulaire cantonné de tours circulaires demi hors-oeuvre et flanqué de corps  latéraux corps bas, sous appentis, au même alignement à droite, corps gauche, en renfoncement plus haut, couvert d'un toit à croupe, corps principal, simple en profondeur, comprenant un rez-de-chaussée, surélevé à l'arrière, sur cave, un étage carré  et un étage de comble, porte axiale antérieure à encadrement à bossages,  toit à longs pans, ailes basses, en retour d'équerre sur la façade antérieure, abritant un logis en rez-de-chaussée. Bâtiment isolé, au sud, comprenant une grange entre un logis et une écurie, porte charretière en plein cintre, remise sous appentis, vivier alimenté par la Vingeanne, partiellement comblé.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Champagne sur Vingeanne.","gps":"","images":["../image/image_21/21_Champagne_Vingeanne_1.jpg","../image/image_21/21_Champagne_Vingeanne_2.jpg","../image/image_21/21_Champagne_Vingeanne_3.jpg","../image/image_21/21_Champagne_Vingeanne_4.jpg"]},"Consult_chateau_formulairea6b1":{"id":"Consult_chateau_formulairea6b1","dept":"21","canton":"Vitteaux","commune":"Champrenault","nom":"Champrenault_Verrey","type":"Château","periode":"XV","histoire":"CHAMPRENAULT,  la maison forte citée dès 1247  appartient aux seigneurs de Saffres puis, en 1328, à  Guillaume Dubois, en 1370 à Jean de Vienne et, à partir de 1469 et durant plus d'un siècle, aux Malain à qui  l'on doit sans doute la tour d'escalier et les baies à linteaux en accolade. Elle appartient ensuite à de multiples propriétaires.                                                                  \r\nVERREY sous Salmaise, à 5 Km autour de Champrenault, château de la famille de Thésut apparue à Verrey en 1550 lors du mariage de Bénigne Julien avec Jacques de Thésut, réunit entre leurs mains la totalité de la terre à la fin du XVIe siècle, et y bâtit un manoir qui fut rasé lorsque  Guillaume de Thésut  lui substitua en 1769, une nouvelle demeure. Il y installa une bibliothèque très riche, avec une collection archéologique, un cabinet d'histoire naturelle et des tableaux. Confisqué et vidé durant la période révolutionnaire, le château de Verrey passa ensuite entre les mains de plusieurs propriétaires.                                                          Le château de BUSSY la Pesle Le château est divisé en trois parties, du XIIe au XIXe siècle. Il est actuellement en cours de restauration sous l'égide de Marion et Gonzague Laurenty, propriétaire.","architecture":"Champrenault ce manoir possède un donjon ou tour carré de 4 étages accolé à un manoir plus récent.                                                      Le château de Bussy-la-Pesle s'étend majestueusement au centre de ce village de charme, en plein coeur d'une forêt bourguignonne profonde et de caractère. Paisible, le village se blottit dans le creux d'une vallée typique de la région.  Des chambres d'hôtes sont prévues à l'horizon 2013.","habitants":"Famille Malain\r\n        \"","divers":"Château de Champrenault (tour), château de Verrey et de Bussy la Pesle.","gps":"","images":["../image/image_21/21_Champrenault_Verrey_1.jpg","../image/image_21/21_Champrenault_Verrey_2.jpg","../image/image_21/21_Champrenault_Verrey_3.jpg","../image/image_21/21_Champrenault_Verrey_4.jpg","../image/image_21/21_Champrenault_Verrey_5.jpg"]},"Consult_chateau_formulaire2ed1":{"id":"Consult_chateau_formulaire2ed1","dept":"21","canton":"Beaune","commune":"Chandon-en-Braille","nom":"Chandon","type":"Château","periode":"XVI","histoire":"CHANDON de Briailles; dit aussi la maison Theureau petit château construit entre 1564 et 1628 par la famille Forneret bourgeois de Beaune et entre 1690 et 1705 a était reprit par la famille Theureau fermier général  de la baronnie de Savigny, aux Theureau de Bouilland par alliance et  puis revendu à la famille de la Brebis de Corcelles  jusqu'en 1767, ensuite à divers propriétaires et en 1834 acheté par Pierre Guillemont, conseiller à la cour royal de Dijon, leur fille Iréne épouse Charlemagne-Emile Maupas préfet de police sous le second empire, impliqué dans le coup d'état  du 2 décembre 1851 de Louis Napoléon Bonaparte. Le domaine sera vendu à madame Vyau Baudreuil de Fontenay qui le transmet à sa petite-fille la comtesse Chandon de Briailles toujours dans la descendance  par alliance aux de Nicolay  comte  qui exploite le domaine viticole.","architecture":"Chandon de Briailles, demeure de plan rectangulaire, élevée sur un sous-sol et un rez-de-Chaussée surélevé d'un étage carré et  de comble éclairé par des lucarnes à ailerons, en façades les travées centrales forment un avant corps avec fronton triangulaire marquant à demi un toit en pavillon.","habitants":"Famille Forneret \r\n        \"","divers":"Château de Chandon","gps":"","images":["../image/image_21/21_Chandon_1.jpg"]},"Consult_chateau_formulaire8f19":{"id":"Consult_chateau_formulaire8f19","dept":"21","canton":"Vitteaux","commune":"Charny","nom":"Charny","type":"Château-fort","periode":"XII","histoire":"CHARNY, dès 1193, le château de Charny fit l'objet d'une convention entre le duc de Bourgogne, Eudes III, et Etienne de Mont-Saint-Jean qui l'inféoda peu après à son frère Pons, lequel dut, en 1215, passer avec le duc un nouvel accord. La famille de Charny issue de Pons de Mont St-Jean, conserva le fief jusqu'au XIVe siècle. Par mariages il passa en 1360 à Philippe de Jonvelle, puis aux Bauffremont. En 1534, Philiberte de Luxembourg, issue des Bauffremont, en fit don à son petit-neveu, Philippe Chabot, amiral de France. Les Chabot en jouirent jusqu'en 1779. Il fut alors vendu aux dames de Saint Cyr.","architecture":"Charny, en 1658 cette puissante forteresse possédait encore dix tours  des courtines de 3 mètres d'épaisseur surmontées d'un chemin couvert, un grand corps de logis à deux ailes, des fossés larges et profonds, une basse-cour  le tout en fort mauvais état. Un siècle plus tard,  il ne subsistait plus que la chapelle, le four banal, deux tours et des pans de murailles.","habitants":"Etienne de Mont-Saint-Jean \r\n        \"","divers":"Vestiges féodals perchés de Charny","gps":"","images":["../image/image_21/21_Charny_1.jpg"]},"Consult_chateau_formulaired38d":{"id":"Consult_chateau_formulaired38d","dept":"21","canton":"Fleurey-sur-Ouche","commune":"Pont-de-Pany","nom":"Chassagne_(la)","type":"Manoir","periode":"XIX","histoire":"LA CHASSAGNE, cest lhistoire dune dynastie, au Moyen-Age, quatre grands noms vont se succéder et mener la Bourgogne à son apogée. Issus de la maison des Valois, Philippe le Hardi, Jean Sans Peur, Philippe le Bon et Charles le Téméraire sattachent a faire prospérer le territoire et les richesses de la Bourgogne, quitte à sattirer les foudres du pouvoir royal. Cette grande saga familiale prend fin alors que Charles le Téméraire tente de semparer de la Lorraine. Aujourdhui, le prestige des ducs na pas quitté Dijon ni son palais. Acheté par Victor Masson fils d'un négociant en vins  de Beaune et cousin  germain du physicien Antoine Masson. Victor travaille deux ans à Paris avec Louis Hachette, puis rachète le fonds de la Librairie Didot, s'associe avec Nicolas Crochard et crée en 1838 la librairie médicale et scientifique Masson, en 1860 Victor laisse la succession à son fils Georges et Victor décédera en 1879 après avoir fait appel à Edouard André  pour aménager le parc à l'anglaise, le château sera vendu peu après par ses héritiers à la famille Vignon qui le restaure pour un hôtel de luxe. Construit sous la restauration  par Alfred Vignon pour un rendez-vous de Chasse.                                  Dans la commune le domaine de Pany, dit la maison St-Bernard manoir du XVIIIe siècle  qui a appartenu au diocèse de Pont de Pany a servit de colonie de vacances, racheté par le père Tattevin pour un collège et depuis 2010 transformé en hôtel restaurant.","architecture":"La Chassagne construit en 1815, est une élégante résidence campagnarde du XIXe siècle, un corps de logis de plan rectangulaire comprenant un avant corps à toiture indépendante, une mince tourelle dont la partie supérieure est appareillée en lits de brique de deux teintes différentes. Au côté Est un autre bâtiment fait saillie sur les deux façades son toit s'appuie sur deux pignons découverts sur lesquels la brique et la pierre sont disposées en bandes alternées. Des travaux de restauration en 1989 composé d'un corps de logis de plan rectangulaire comportant un avant  corps à toitures indépendantes, côté Est, un autre bâtiment fait saillie sur les deux façades.                                  Le domaine de Pany manoir du XVIIIe siècle à deux niveaux et attiques, fronton triangulaire.","habitants":"Antoine Masson\r\n        \"","divers":"Château de la Chassagne et manoir de Pany","gps":"","images":["../image/image_21/21_Chassagne_(la)_1.jpg","../image/image_21/21_Chassagne_(la)_2.jpg","../image/image_21/21_Chassagne_(la)_3.jpg","../image/image_21/21_Chassagne_(la)_4.jpg","../image/image_21/21_Chassagne_(la)_5.jpg"]},"Consult_chateau_formulairec11f":{"id":"Consult_chateau_formulairec11f","dept":"21","canton":"Nolay","commune":"Chassagne-Montrachet","nom":"Chassagne_Montrachet","type":"Château","periode":"XIX","histoire":"CHASSAGNE-MONTRACHET; Château viticole de la famille Picard domaine familial de 32 ha , propriétaire également de 4 domaines en Côte Chalonnaise, transformé également en chambre d'hôtes.","architecture":"le Château de Chassagne-Montrachet situé au cur du vignoble, possède de magnifiques caves des XIe et XIVe siècles.   Le château possédant deux corps de logis à deux niveaux la partie centrale de même niveau et le bâtiment servant la partie viticole.","habitants":"Famille picard\r\n        \"","divers":"Château de Chassagne Montrachet","gps":"","images":["../image/image_21/21_Chassagne_Montrachet_1.jpg","../image/image_21/21_Chassagne_Montrachet_2.jpg"]},"Consult_chateau_formulaire444d":{"id":"Consult_chateau_formulaire444d","dept":"21","canton":"Pouilly-en-Auxois","commune":"Châteauneuf-en-Auxois","nom":"Chateauneuf_Auxois","type":"Forteresse","periode":"XII","histoire":"CHATEAUNEUF, construit en 1132 par Jean de Chaudenay pour son fils  Jehan qui en prit possession en 1175 et devient  Jean I de Châteauneuf. Au  XIIe siècle, face aux menaces, ils bâtissent  la puissante enceinte autour du donjon. Le règne de la famille sachève après neuf générations avec une fin tragique en 1456,  lorsque Catherine de Châteauneuf, dernière héritière est brûlée vive pour lempoisonnement de son second mari, Jacques dHaussonville.\r\nEn 1457, Philippe le Bon, duc de Bourgogne, attribue alors la forteresse à son conseiller Philippe Pot, seigneur de la Rochepot, également chevalier de lOrdre de la Toison d'or et chevalier de Saint-Michel. À la mort de Philippe Pot en 1494, sans descendance, le château revient à son frère Guyot Pot, puis a son neveu Régnier et à sa nièce Anne épouse de Guillaume de Montmorency et mère  du connétable Anne de Montmorency. La veuve de ce dernier, Madeleine de Savoie fait don du château à son fils Charles mort sans postérité en 1612 lègue le château à sa nièce Madeleine de Montmorency épouse d'Henri de Luxembourg duc de Piney et prince de Tingry, les filles, mesdames de Clermont-Tonnerre et de Ventadour, vendent le château en 1627 à Charles de Vienne, comte de Commarin, pour rester dans les mains de cette famille pendant 150 ans. En 1767, Louis Henri de Vienne se sépare de lédifice, vendu à Jean Pâris de Montmartel, banquier d'un des fameux frères Pâris, le fils de Montmartel le marquis de Brunoy vend le château à Jean-François de Damas marquis d'Antigny propriétaire de Commarin. Le fils de Jacques-François de Damas de retour après la restauration fut  duc, reprit châteauneuf et le passe à sa fille. Le château est alors vendu aux enchères et passera ensuite de mains en mains jusquen 1936 quand le château passa par alliance comte Georges de Vogüé ce dernier le  donne à lÉtat. \r\nDepuis le 1er janvier 2008, la forteresse est propriété du conseil régional de Bourgogne à linitiative de son président François Patriat.","architecture":"Châteauneuf; dominant le paysage de l'Auxois, première construction en 1132 sur un éperon rocheux du donjon carré, noyau initial au XIIe siècle sur le site qui était composé d'une maison forte. Au XIII-XVe siècle construction de l'enceinte  renforcée de tours, défendue par un profond fossé taillé dans le roc, et d'un pont-levis, chemin de ronde que supportent des mâchicoulis et du grand corps de logis accolé au donjon dans un style gothique flamboyant, la façade sur cour interrompue à son centre par une tourelle d'escalier hexagonale, comporte au rez-de-chaussée et au premier étage de croisées surmontées d'arcs en accolade, le toit à forte pente est chevauché de lucarnes à pignons triangulaires. Un bâtiment fut également édifier à gauche de l'entrée semblable à celle du logis et doté de courtines et de consoles supportant des galeries de bois vers l'intérieur.","habitants":"Seigneur Philippe Pot\r\n        \"","divers":"Village fortifie vestiges de remparts et important château de Chateauneuf en Auxois.","gps":"","images":["../image/image_21/21_Chateauneuf_Auxois_1.jpg","../image/image_21/21_Chateauneuf_Auxois_2.jpg","../image/image_21/21_Chateauneuf_Auxois_3.jpg","../image/image_21/21_Chateauneuf_Auxois_4.jpg","../image/image_21/21_Chateauneuf_Auxois_5.jpg","../image/image_21/21_Chateauneuf_Auxois_6.jpg","../image/image_21/21_Chateauneuf_Auxois_7.jpg"]},"Consult_chateau_formulaire4398":{"id":"Consult_chateau_formulaire4398","dept":"21","canton":"Châtillon-sur-Seine","commune":"Châtillon-sur-Seine","nom":"Chatillon_sur_Seine","type":"Vestiges","periode":"XII","histoire":"CHATILLON-sur-SEINE; Place forte  du duché de Bourgogne face au royaume de France, fut construite au XIIe siècle et XIVe siècle. Elle fut détruite en 1598 par le roi Henri IV à la demande des Chatillonnais exaspérés par le passage continuel des armées.\r\nLe château privé du duc de Marmont maréchal, duc de Raguse et pair de France, héros incontournable de Châtillon-sur-Seine ,  demeure du maréchal d'empire et ami de Napoléon qui fut destitué pour trahison et qui fut le Q.G de Joffre pendant la première guerre mondiale, et maison de vacances des descendants d'Achille Maître, grande personnalité de Châtillon au XIXe siècle.             Dans la commune le château du Philandrier, hôtel particulier de Guillaume Philandrier (1505-1563), humaniste et ecclésiastique, né à Châtillon, y hébergea. aujourd'hui transformé en musée, et  au nord dans la commune à Pothières le château du même nom, transformé en maison de retraite.","architecture":"Châtillon sur Seine; L'ancien château visible de loin s'explore par la rue Saint-Vorles. Vestiges du château des ducs de Bourgogne, vestiges de tour de l'enceinte et porte monumental  et la maison Philandrier aujourd'hui musée du Châtillonnais. Cette porte monumentale était la porte principale du bourg de Chaumont située sur la route de Paris, elle a été démolie en 1746 parce qu'elle n'était pas dans l'axe de la route et reconstruite en 1765 sous la forme d'un arc de triomphe à voûte en plein cintre en souvenir du passage de Louis XV à Châtillon.                                                      Dans la commune le château de Marmont du XIXe siècle avec tour du XVe siècle, le château du petit Versailles et l'hôtel particulier  de Philandrier.","habitants":"maréchal Marmont\r\n        \"","divers":"Vestiges de Châtillon sur Seine, le châteaudes ducs de Bourgogne ruinés, de Rochefort, le château de Philandier, le petit Versailles et de Marmont","gps":"","images":["../image/image_21/21_Chatillon_sur_Seine_1.jpg","../image/image_21/21_Chatillon_sur_Seine_2.jpg","../image/image_21/21_Chatillon_sur_Seine_3.jpg","../image/image_21/21_Chatillon_sur_Seine_4.jpg","../image/image_21/21_Chatillon_sur_Seine_5.jpg","../image/image_21/21_Chatillon_sur_Seine_6.jpg","../image/image_21/21_Chatillon_sur_Seine_7.jpg","../image/image_21/21_Chatillon_sur_Seine_8.jpg","../image/image_21/21_Chatillon_sur_Seine_9.jpg"]},"Consult_chateau_formulairea7c7":{"id":"Consult_chateau_formulairea7c7","dept":"21","canton":"Bligny-sur-Ouche","commune":"Chaudeney-le-Château","nom":"Chaudenay","type":"Château-fort","periode":"XII","histoire":"CHAUDENEY;   le château fut bâti au milieu du XIIe siècle par Jean de Chaudenay dont la famille s'éteignit au début du XIVe siècle. Il passa ensuite, par voie de successions ou de mariages, à des cadets ou à des filles de familles puissantes  telles que les Vienne, les Mello, les Saulx, les Damas, les La Plu-Bouligneux pour, finalement, échoir au second maréchal de Médavy qui dut le vendre en 1721. En 1755, il fut acquis par Jacques-Antoine Adelon dont les ancêtres  avaient fait fortune comme fermiers de la seigneurie. Ce sont ses lointains descendants qui le cédèrent, en 1952,  à M. Robert Thayer. Celui-ci en a entrepris la restauration.","architecture":"Chaudenay; le château présente les vestiges d'un imposant château fort construit au XIIe siècle, défendu par six tours, ils en subsistent trois notamment celle qui devait servir de donjon carré et tour octogonale, restaurer depuis son achat en 1955 par monsieur Robert H.Thayer.","habitants":"Jean de Chaudenay\r\n        \"","divers":"Vestiges du château de Chaudenay","gps":"","images":["../image/image_21/21_Chaudenay_1.jpg","../image/image_21/21_Chaudenay_2.jpg","../image/image_21/21_Chaudenay_3.jpg","../image/image_21/21_Chaudenay_4.jpg","../image/image_21/21_Chaudenay_5.jpg","../image/image_21/21_Chaudenay_6.jpg","../image/image_21/21_Chaudenay_7.jpg"]},"Consult_chateau_formulaireca0f":{"id":"Consult_chateau_formulaireca0f","dept":"21","canton":"Dijon","commune":"Chevigny-St-Sauveur","nom":"Chevigny","type":"Château","periode":"XVII","histoire":"CHEVIGNY,  le château est l'oeuvre de Pierre Ier de Rigoley  En 1707, il fit aménager une chapelle dans la partie centrale du premier étage du logis, il fit également planter des allées d'arbres conduisant au bois  transformé par la suite en parc. Au Nord, des jardins furent aménagés jusqu'à la Norges et au Sud une glacière  surmontée d'un petit Temple d'Amour en bois . \r\n Avant 1820, les communs furent abattus et le fossé partiellement comblé. Les bâtiments de service situés à gauche de l'entrée de la propriété ont été construits  au milieu du XIXe siècle. Ils sont l'oeuvre  de la famille de Montillet de Grenand  qui a possédé le domaine jusqu'en 1891. Depuis,  4 propriétaires se sont succéder : l'anglais Camel \r\n  de 1914 à 1928, l'avocat Fabien Cirier, la compagnie du gaz de Dijon et l'AFPA depuis 1957.","architecture":"Chevigny; le château est l'oeuvre de Pierre Ier de Rigoley  qui fit percer des baies entre les deux tours et  bâtir un nouveau corps de logis d'un style assez simple au XVIIe siècle.  Les communs aujourd'hui disparus s'alignaient entre deux tours des remparts, l'ensemble était ceinturé par les  fossés  et deux ponts dormants accédant l'un sur la basse-cour à l'Est  et l'autre sur la porte principale,  face à  l'Ouest Les origines du château  remontent au XIIIe siècle. Son principal système défensif était constitué d'un fossé et de remparts formés de buttes de terres surmontées d'une palissade et renforcées par des tours rondes  d'angle et de quelques autres dispositifs militaires.L'intérieur de l'enceinte était occupé au Sud  par l'habitation seigneuriale,  fortifiée elle-même par d'imposantes tours  et par des bâtiments d'exploitation au Nord. Dans sa  forme actuelle. Les plans montrent lévolution de larchitecture des châteaux construits au XVIIIe siècle devenus de belles demeures , mais qui conservent les symboles du logis seigneurial médiéval. Il reproduit le perron des palais médiévaux où lon prêtait serment et par lequel les vassaux ou compagnons atteignaient laula, ici la salle dassemblée, comme dans les châteaux de la noblesse dépée. Il prolonge le lieu de pouvoir.","habitants":"Pierre Ier de Rigoley \r\n        \"","divers":"Château de Chevigny","gps":"","images":["../image/image_21/21_Chevigny_1.jpg","../image/image_21/21_Chevigny_2.jpg","../image/image_21/21_Chevigny_3.jpg"]},"Consult_chateau_formulaire9468":{"id":"Consult_chateau_formulaire9468","dept":"21","canton":"Semur-en-Auxois","commune":"Millery","nom":"Chevigny_Millery","type":"Vestiges","periode":"XII","histoire":"CHEVIGNY; au XIIIe siècle Chevigny appartenait aux Comtes d'Auxonne. Au moins depuis Étienne II, mort en Juillet 1173, puis à son fils Étienne III, mort en 1241,  transmis ensuite jusqu'à son petit-fils Jean de Chalon. La terre de Chevigny passe ensuite dans les mains de diverses familles. On y trouve la famille Cicon en 1312, la famille Champdivers en 1460 , un Louis de Tallant et parmi ses héritiers, Jean de Monthureux en 1624. Enfin, en 1777, il a retrouvé un Ferdinand François Duchamp comme propriétaire et finalement, par héritage Mr Patrouillet Deservillers.\r\n Aujourd'hui ce sont Mr et Mme Roland Berthet, propriétaires,","architecture":"Chevigny-Millerey, le mauvais état de conservation de ce château féodal montre que l'édifice a mal supporté l'outrage du temps. Certains corps de bâtiment sont malheureusement encore presque à l'état de ruine.  le corps de logis est parfaitement restauré et à l'extérieur ce sont les fossés côtés sud qui ont été recreusés. Le plan ci-contre vous permet de découvrir qu'à l'intérieur de son enceinte, en forme de trapèze, se trouvait une grosse tour carrée et deux tours rondes. L'imposant donjon quadrangulaire du XIVe siècle,  était pourvu d'une herse. Un pont-levis prolongé par un petit pont de pierre  toujours en place permettait de franchir les fossés.","habitants":"Comtes d'Auxonne\r\n        \"","divers":"Vestiges du château de Millery","gps":"","images":["../image/image_21/21_Chevigny_Millery_1.jpg","../image/image_21/21_Chevigny_Millery_2.jpg","../image/image_21/21_Chevigny_Millery_3.jpg","../image/image_21/21_Chevigny_Millery_4.jpg","../image/image_21/21_Chevigny_Millery_5.jpg","../image/image_21/21_Chevigny_Millery_6.jpg"]},"Consult_chateau_formulairef56f-2":{"id":"Consult_chateau_formulairef56f-2","dept":"21","canton":"Sud-Beaune","commune":"Chorey","nom":"Chorey","type":"Château","periode":"XVII","histoire":"CHOREY;  en 1348 Jean de Frolois, seigneur de Molinot reçoit une partie des biens de Marguerite de Gergy qui était à l'époque une maison forte, à sa mort en 1366 elle passe à sa fille unique Marguerite épouse de Jean sire de Châtillon en Bazois, veuve en 1371 remarié à Guichard Dalphin sire de Jaligny baron de la Feurtey-Chauderonet sénéchal du Nivernais, les biens reviennent à la famille de Frolois, de Chorey, de Serrigny de Pernand et  aux d'Aloxe. Chorey qui abritait  une garnison n'avait pas une grande importance pour ses seigneurs abrité également les fermiers. Et en 1697 le domaine passe à une famille de parlementaires dijonnais les Bourrée, puis par alliance passe à Antide de Mignieu qui achètera par la même occasion le château de Savigny, devenu président au parlement de Bourgogne fait reconstruire le château et la ferme de Chorey , meurt en 1717 laissant ses biens de Chorey et Savigny à son fils Abraham-François, reste dans la famille. Chorey et Varennes échoient à la fille d'Anselme de Mignieu Amélie-Joséphine-Catherine qui a épousée Etienne Gassot de la Vienne devenu veuve cède Chorey à l'ancien fermier du marquisat de Savigny,  Etienne-Girard Frapillon passera ensuite au XIXe siècle à la famille Germain qui exploite le domaine viticole.","architecture":"Chorey; Cette forteresse faisait partie des possessions d'un fidèle des ducs de Bourgogne, à l'origine maison forte construite au XIVe siècle devenu château au XVe siècle, se présentait à l'origine comme un quadrilatère flanqué aux angles de tours reliées par des  courtines, à l'intérieur de la cour, le corps de logis  rectangulaire à trois travées fut élevé au XVIIIe siècle. L' ensemble grange, écuries et pressoirs  de cet ensemble il ne reste que deux tours dont l'une est transformée en colombier, suppression du pont-levis et douves en 1835.","habitants":"Antide de Mignieu \r\n        \"","divers":"Château de Chorey","gps":"","images":["../image/image_21/21_Chorey_1.jpg","../image/image_21/21_Chorey_2.jpg","../image/image_21/21_Chorey_3.jpg","../image/image_21/21_Chorey_4.jpg","../image/image_21/21_Chorey_5.jpg","../image/image_21/21_Chorey_6.jpg","../image/image_21/21_Chorey_7.jpg"]},"Consult_chateau_formulaire6065":{"id":"Consult_chateau_formulaire6065","dept":"21","canton":"Nuits-St-Georges","commune":"Vougeot","nom":"Clos_Vougeot","type":"Château","periode":"XVI","histoire":"CLOS-VOUGEOT; Au XIIe siècle, les moines cisterciens de l'importante abbaye de Cîteaux, propriétaires du Clos-Vougeot grâce à des dons de riches seigneurs bourguignons et d'achats faits par l'abbaye entre 1109 et 1115, y cultivent la vigne, en 1551, l'abbé de Cîteaux, Dom Jean XI Loisier, ajoute aux bâtiments existants un manoir renaissance.\r\nL'abbaye de Cîteaux et ses immenses domaines dont le Clos-Vougeot sont confisqués le 13 février 1790 lors de la Révolution française et déclarés biens nationaux. Le domaine est vendu, passe dans diverses mains,  en 1820 à Julien Ouvrard propriétaire du château de Gilly, puis il est laissé à l'abandon pendant une grande partie du XIXe siècle, jusqu'en 1889 où il est acquis par Léonce Bocquet, un richissime négociant en vin, qui le fait restaurer. En 1920, le château et le clos sont rachetés par Étienne Camuzet, député de Côte-d'Or et important propriétaire vigneron de Vosne-Romanée, qui conserve le clos et vend le château le 29 novembre 1944 à la société civile des Amis du château du Clos de Vougeot, qui accorde aux membres dirigeants de la Confrérie des Chevaliers du Tastevin, créée en 1934, un bail de 99 ans.                                      A quelques kilomètres au sud un  château à Vosne-Romanée au centre du village remanié au XIXe siècle.","architecture":"Clos-Vougeot;  cité dès le XIIe siècle, construit en 1551 deux ailes en équerres,  les corps de logis rectangulaires est à deux  étages et un étage sous combles, accolée de deux pavillons carrés, les toits sont percés de lucarnes ornementées de style renaissance. Ils construisent la cuverie avec quatre pressoirs à cabestan monumentaux en bois de chêne ainsi que le grand cellier d'une capacité de 2000 pièces de vins. Depuis cette date, le château du Clos-Vougeot, au milieu de 50 hectares de vignes, est un des hauts lieux de la promotion internationale des vins de Bourgogne et de gastronomie bourguignonne, animé par la confrérie des Chevaliers du Tastevin qui ne possède aucune vigne. Le vignoble du clos est partagé par plus de 80 propriétaires.    Vosne-Romanée construit au XIXe siècle, corps de logis rectangulaire à deux niveaux accolé de deux pavillons rectangulaire saillants aux angles et d'un avant corps saillant sur façade principale surmonté d'un étage avec fronton.","habitants":"abbé de Cîteaux\r\n        \"","divers":"Château de Clos-Vougeot et de Vosne-Romanée.","gps":"","images":["../image/image_21/21_Clos_Vougeot_1.jpg","../image/image_21/21_Clos_Vougeot_2.jpg","../image/image_21/21_Clos_Vougeot_3.jpg","../image/image_21/21_Clos_Vougeot_4.jpg","../image/image_21/21_Clos_Vougeot_5.jpg","../image/image_21/21_Clos_Vougeot_6.jpg","../image/image_21/21_Clos_Vougeot_7.jpg","../image/image_21/21_Clos_Vougeot_8.jpg"]},"Consult_chateau_formulairefb96":{"id":"Consult_chateau_formulairefb96","dept":"21","canton":"Gevrey-Chambertin","commune":"Collonges-les-Bevy","nom":"Collonges_Bevy","type":"Château","periode":"XVIII","histoire":"COLLONGES; Le château de Collonges a été bâti vers 1720 par Louis Georges de Massol à l'emplacement d'une forteresse antérieure, fort mal connue, dont on conservera les fossés que franchissaient trois ponts dormants. Des jardins à la française s'étendaient au nord et occupaient la cour intérieure. A la fin du XVIIIe siècle il fut vendu au capitaine de  Gassendy sous les ordres de Bonaparte qui avait été à Auxonne. Sa fille unique épousa Claude-Joseph Marey,  maire de Nuits. Le propriétaire actuel est l'héritier de la dernière des Marey Monge. En 1874 celui-ci a fait combler les fossés, substitué un parc à l'anglaise aux jardins à la française, et plaqué une galerie contre la façade nord.\r\nLe propriétaire actuel, Romuald de Haut de Sigy.","architecture":"Collonges; Cet élégant château fin XVIIe siècle  couvert de tuiles multicolores et agrémenté d'une terrasse reposant sur une galerie percée de grandes baies possède un beau décor, la chapelle et le pigeonnier sont logés dans des tours du XVIIe siècle.  Le château a une vocation de conservation patrimoniale,  Les façades et les toitures ont été entièrement refaites en 1985. .\r\nColonges Manoir du XVIIIe siècle. entouré d'un parc à la française, construit sur les restes d'un plus ancien dont subsistent deux tours du XVIIe siècle utilisées en colombier et chapelle. Lors des restaurations du XIXe siècle, ajout d'une galerie en façade.","habitants":"Louis Georges de Massol\r\n        \"","divers":"Château de Collonges les Bevy","gps":"","images":["../image/image_21/21_Collonges_Bevy_1.jpg","../image/image_21/21_Collonges_Bevy_2.jpg","../image/image_21/21_Collonges_Bevy_3.jpg"]},"Consult_chateau_formulairea96d":{"id":"Consult_chateau_formulairea96d","dept":"21","canton":"Pouilly-en-Auxois","commune":"Commarin","nom":"Commarin","type":"Château","periode":"XIV","histoire":"COMMARIN; A l'origine  au XIIIe siècle était une maison forte, les seigneurs des lieux les Sombernon, descendance des Boson beau-frère du roi Charles le Chauve, et fondateur de la première maison ducale de Bourgogne. Aubert, Gauthier puis Pierre de Commmarin se succèdent et  passe en 1346 à un neveu  Jean de Cortiamble qui en hérite chambellan  du duc de Bourgogne qui fit reconstruire le château à la fin du XIVe siècle. sa fille aînée en hérite qui épouse Jean de Dinteville, le château passera à leur petit-fils Jacques de Dinteville sa fille épouse Benigne  en 1500 Gérard de Vienne gouverneur de Beaune Commarin est  érigé en 1588 en comté en faveur d'Antoine de Vienne, en 1620  Charles Ier de Vienne entreprend de remanier la demeure que terminera  Charles II de Vienne et son épouse Anne de Chastellux.  Le château passe en 1725 à Jacques de Damas, marquis d'Antigny par alliance avec Marie Judith de Vienne, puis en 1780 la succession passe à Charles-Daniel de Talleyrand-Périgord par l'alliance de leur pretite-fille Marie Victoire Eléonore qui sera la mère du futur évêque d'Autun, après la Révolution le domaine retourne à Charles de Damas gentilhomme à la cour de Charles X nommé duc , sa fille Zephirine  fit passer en 1802  le château par alliance au comte Charles de Voguë  le comte et la comtesse Bertrand de Voguë représentent la vingt-sixième génération de propriétaires. Toujours dans cette famille.","architecture":"Commarin; Tout dabord évoqué comme villa romaine, le lieu devient maison forte, puis au XIVe siècle château fort. De cette époque qui a laissé lorganisation générale de lédifice, subsistent deux larges tours circulaires ainsi quune chapelle englobée maintenant dans laile Est. Au XVe et XVIIIe siècles, le château a été progressivement transformé en résidence dagrément, se constitue d'un bâtiment régulier et relativement symétrique à inspiration classique, le corps de logis central au fronton richement décoré est flanqué de deux ailes, l'aile Louis XIII à lEst et aile Louis XIV à lOuest terminées chacune par une grosse tour ronde du XIVe siècle. Une écurie prolonge laile Louis XIII. Lensemble est ceint par de larges douves prolongées de deux pièces deau et entouré dun parc à langlaise de cinq hectares avec de beaux communs et de larges perspectives. Le château na jamais été vendu, et par alliances successives, il a pu être associé aux noms les plus nobles de la Bourgogne. Il a échappé aux guerres et aux pillages de la Révolution.","habitants":"Jean de Cortiamble\r\n        \"","divers":"Château de Commarin","gps":"","images":["../image/image_21/21_Commarin_1.jpg","../image/image_21/21_Commarin_2.jpg","../image/image_21/21_Commarin_3.jpg","../image/image_21/21_Commarin_4.jpg"]},"Consult_chateau_formulairec771":{"id":"Consult_chateau_formulairec771","dept":"21","canton":"Liernais","commune":"St-Martin-de-la-Mer","nom":"Conforgien","type":"Château-fort","periode":"XIV-XVI","histoire":"CONFORGIEN; Guillaume de Clugny, baron de Conforgien est probablement né au château de Conforgien, hameau de St Martin de la Mer, vers 1540. Conforgien fait ses premières armes sous les ordres de Coligny. Il est blessé au siège de Poitiers en 1569. Conforgien est de nouveau en Suisse fin 1600. La victoire de Monthoux lui est attribuée.\r\nEn 1602, il défendit vaillamment la ville de Genève contre les troupes de Charles Emmanuel de Savoie, quil défit. Aussi les Genevois, reconnaissants, déposèrent son armure dans leur arsenal, comme un monument perpétuel de sa valeur. Le Conseil de Genève le rappela de nouveau en avril 1603, pour remplacer Monsieur de Villars à la tête des troupes. Il prêta serment le 19 avril. Mais la paix était proche. Elle fut signée le 21 juillet par le Traité de St Julien. En 1605, les églises de Bourgogne le choisissent comme leur député à l'Assemblée politique de Châtellerault, en lui donnant pour collègues Armet et Du Noyer, sieur de Joncy.   En 1616, le Conseil de Genève lui offre de nouveau le commandement des troupes de la république. Mais il répondit négativement à en invoquant son grand âge et ses infirmités.\r\nDe son mariage avec Charlotte de Saint-Belin, Guillaume de Clugny eut une fille nommée Marie-Madelaine, qui épousa Jean de Refuge.","architecture":"Conforgien, château-fort, une puissante tour carrée de trois étages flanquée au nord d'un  corps de logis plus moderne à deux étages. L'ensemble est en cours de restauration, avec un projet de redonner   au donjon son apparence d'autrefois. La tour carrée, quoique ses deux derniers étages aient été affectés d'un effondrement volontaire réalisé en 1874,  mal racheté par un toit à 2 pans,  n'a subi que très peu  de modifications. L'étage de soubassement,  qui s'ouvre  au nord par une large porte à linteau sur coussinet est divisé en deux pièces rectangulaires orientées nord sud et  voûtées en plein-cintre.  Cet étage dessert quatre archères canonnières à ébrasement interne et trou de visée inférieur, réparties à raison  d'une par façade,  la canonnière nord étant bouchée  par la construction du corps de bâtiment  du XVIe siècle. La  porte de bois qui sépare les deux salles de l'étage a gardé ses ferrures anciennes,  et son battant est percé d'un  orifice de tir à encoche de calage, ce qui permettait d'accueillir les visiteurs indésirables en se retranchant dans la  salle du fond. À l'est, du côté du hameau  et du chemin d'accès, le Château de Conforgien est précédé d'un puits et d'une basse-cour flanquée au nord et au sud de deux bâtiments de ferme du XVIIIe et du début du XXe siècle. \r\nEn rase campagne dans un beau cadre surplombant un étang, le château féodal servait de refuge aux protestants. Actuellement inoccupé, on n'en voit que les extérieurs. Situé à proximité du chemin Bibracte Alesia.","habitants":"Guillaume de Clugny\r\n        \"","divers":"Ruines féodales et maison forte de Conforgien","gps":"","images":["../image/image_21/21_Conforgien_1.jpg","../image/image_21/21_Conforgien_2.jpg"]},"Consult_chateau_formulaire7a2d":{"id":"Consult_chateau_formulaire7a2d","dept":"21","canton":"Nolay","commune":"Ivry-en-Montagne","nom":"Coraboeuf","type":"Forteresse","periode":"XI","histoire":"CORABOEUF; cité dès le XIe siècle par la famille de Coraboeuf qui le posséderons jusqu'au XVe siècle passera à la famille de Salins qui cette dernière s'éteint  vers 1615, le domaine est acheté par la famille Edouard, passe ensuite par alliance aux Saint-Martin d'Argencourt, puis aux Spada, et en 1763  le domaine sera cédé par Charles de Spada  à Jean Baptiste de Richard de Curtil qui obtiendra la nomination en marquisat en 1776, la seigneurie d'Ivry et prendra le nom de Richard d'Ivry qui restera dans la ligné jusqu'à nos jours par les descendants les Lauriston-Boubers.","architecture":"Coraboeuf;  maison forte au XIe siècle sur un terre plein ou il fut ajouté au XVe siècle un donjon défensif  a toit ardoisé flanqué de quatre échauguettes en encorbellement enfermé dans des remparts entourés de Fossés encore à demi comblés de nos jours ainsi qu'un de rempart  qui délimitait la cour, le château fut incendié en 1576, les bâtiments  habitables occupent les côtés nord et Est de la plate-forme, une tour porche coiffé d'un haut toit en pavillon pour l'accès à la cour et le corps du  bâtiment construit sous le second empire.","habitants":"famille de Salins\r\n        \"","divers":"Château de Coraboeuf","gps":"","images":["../image/image_21/21_Coraboeuf_1.jpg","../image/image_21/21_Coraboeuf_2.jpg","../image/image_21/21_Coraboeuf_3.jpg","../image/image_21/21_Coraboeuf_4.jpg","../image/image_21/21_Coraboeuf_5.jpg","../image/image_21/21_Coraboeuf_6.jpg","../image/image_21/21_Coraboeuf_7.jpg","../image/image_21/21_Coraboeuf_8.jpg"]},"Consult_chateau_formulaire7bc6":{"id":"Consult_chateau_formulaire7bc6","dept":"21","canton":"Sud-Beaune","commune":"Corcelles-des-Arts","nom":"Corcelles_Masse","type":"Forteresse","periode":"XII","histoire":"CORCELLES; ce fief  passa entre  les mains de plusieurs familles, tels que les Grancey et les Malain. Partagée ensuite et les ventes aboutirent au XVIe siècle à un émiettement de la seigneurie en une quarantaine de parts que le chapitre de Notre-Dame de Beaune tenta de réunifier. En 1618, Jean-Baptiste Bernardon parvint à tout rassembler, mais il n'eut pas d'héritier direct, aussi de nouveaux partages et une nouvelle vente intervinrent jusqu'à ce que, en 1767, Claude Berbis soit enfin seul seigneur, son fils Henri Jules lui succéda et conserva Corcelles jusqu'au XIXe siècle. Les de Ferrières (XVe et XVI e siecle). Les de Berbis, qui arrivèrent au château de Corcelles au début du XVIIIe siècle. Pierre de Berbis fut conseiller de ¨Philippe le Bon, maître des requêtes en son hôtel. Il fut l'un des négociateurs de la paix d'Arras en 1434 et maire de Dijon , ce qui lui valut d'être anobli par Philippe le Bon, ainsi que sa postérité.                                                                        \r\nMASSE, ce château abrita à partir du XIVe siècle la famille Loppin, qui le reconditionne, roturiers puis petite noblesse, trois d'entre eux furent maires de Beaune, un autre chanoine à la collégiale Notre-Dame de Beaune, d'autres magistrats.","architecture":"Corcelles; Petit château très harmonieux et parfaitement entretenu.  A lorigine une « motte » au XIe siècle, à laquelle le Prieuré St Etienne de Beaune avait adjoint une  celle, ou cour du moine. La grosse tour carrée de la maison forte du XIIe siècle se dresse fièrement, entourée de tours rondes, tourelles, courtines, le tout disposé autour dune cour carrée. Le pont-levis, les douves, le pigeonnier rappellent sa vocation défensive au Moyen-Age, mais une transformation importante au XVIe siècle en fit une superbe demeure seigneuriale agréable à habiter.\r\nLa  basse-cour entourée de dépendances dont la plupart datent du XVIe siècle, constitue, avec le corps de logis, un ensemble architectural remarquable et assez rare. A travers tant de tribulations la demeure a conservé l'essentiel des caractéristiques qui étaient les siennes lors de sa construction du XIIIe au XVe siècle.                                                                             \r\n Château de Masse,  édifié au temps de Louis XIV pour remplacer lancien château vétuste. Ensemble bien ordonnancé, de style classique, formé de deux pavillons symétriques et tout à fait comparables, dont lun était destiné à lhabitation et lautre au chai. Ceinturé de murs, avec beau porche dentrée, tours dangles, grandes dépendances, cette propriété restaurée à lidentique est habitée.","habitants":"Claude Berbis\r\n        \"","divers":"Forteresse de Corcelles et château de Masse","gps":"","images":["../image/image_21/21_Corcelles_Masse_1.jpg","../image/image_21/21_Corcelles_Masse_2.jpg","../image/image_21/21_Corcelles_Masse_3.jpg","../image/image_21/21_Corcelles_Masse_4.jpg","../image/image_21/21_Corcelles_Masse_5.jpg","../image/image_21/21_Corcelles_Masse_6.jpg","../image/image_21/21_Corcelles_Masse_7.jpg"]},"Consult_chateau_formulairec7d0":{"id":"Consult_chateau_formulairec7d0","dept":"21","canton":"Nuits-St-Georges","commune":"Corgoloin","nom":"Corgoloin_Moux","type":"Château","periode":"XVI","histoire":"CORGOLOIN; développe rapidement au temps des ducs Capétiens de Bourgogne.                                              CHAUME;  Cité médiévale fortifiée. Renaud II, seigneur Abbé fera construire une première enceinte fortifiée, pour protéger l'abbaye et la ville. C'est au XIIIe siècle, que la porte du Val, entrée principale du village sera édifiée. Cette porte ferme le village par cette rue.  Lors  des guerres du Moyen-Age, les échevins de Corgoloin se constituèrent en otages pour que les compagnies épargnent les habitants. Ils furent pendus et Corgoloin pillé, plusieurs hameaux ou lieux-dits  ont vu s'ériger de belles bâtisses.                            MOUX; La mention explicite d'une maison forte à Moux apparaît pour la première fois en 1559. En fait, le lieu était peuplé dès le XIIIe siècle et une seigneurie semble s'y être constituée  à la fin du XVe siècle, à partir d'un  démembrement de la châtellenie ducale d'Argilly. La famille de Salins a possédé Moux de 1474 à 1564 et c'est à elle  que l'on peut attribuer  la construction du manoir. Moux passa à la famille de La Cologne puis fut vendu, en 1623, à Claude de Saint-Belin, seigneur  de Cussigny. Jusqu'à la Révolution, le sort de cette  petite seigneurie fut lié à celui de Cussigny.","architecture":"Le village de Corgoloin se développe rapidement au temps des ducs capétiens de Bourgogne.  plusieurs hameaux ou lieux-dits  ont vu s'ériger de belles bâtisses dont La Chaume, cité médiévale fortifiée Le village était autrefois un village de marchands et d'artisans; l'héritage légué par ces riches marchands se retrouve dans l'architecture, avec de nombreux bâtiments bâtis entre le XIIe et le XVIIIe siècle, château du XVIIIe siècle, sur des bases plus anciennes. corps de logis rectangulaire à trois niveaux avec ailes en retour de même niveaux.                                                 Moux; manoir, corps de logis carré à deux niveaux accolé d'une tourelle ronde  et d'un pavillon à deux  niveaux,  l'ensemble ceituré avec tours rondes en angles. Chapelle, fossés et dispositifs de défense  avaient disparu au XVIIIe siècle.","habitants":"famille de La Cologne\r\n        \"","divers":"Château de Chaume et manoir de Moux-Corgolain et de Cussigny sur Comblachien.","gps":"","images":["../image/image_21/21_Corgoloin_Moux_1.jpg","../image/image_21/21_Corgoloin_Moux_2.jpg","../image/image_21/21_Corgoloin_Moux_3.jpg","../image/image_21/21_Corgoloin_Moux_4.jpg","../image/image_21/21_Corgoloin_Moux_5.jpg","../image/image_21/21_Corgoloin_Moux_6.jpg","../image/image_21/21_Corgoloin_Moux_7.jpg"]},"Consult_chateau_formulaire8309":{"id":"Consult_chateau_formulaire8309","dept":"21","canton":"Gevrey-Chambertin","commune":"Couchey","nom":"Couchey","type":"Château","periode":"XV","histoire":"COUCHEY, l'existence d'une maison forte appartenant à Ponce Chanlard est attestée à Couchey dès le début du XIIIe siècle. De 1252 à 1394, elle appartient à la famille Le Pitois, puis la seigneurie fut partagée et la maison forte échut à Jean de Saulx. Les Saulx la renforcèrent et construisirent la tour nord-Est. Pierre de Bauffremon  recueillit leur héritage en épousant Anne de Saulx, puis le transmit à la famille de Longvy. Claude de Longvy, cardinal de Givry, et son neveu, l'amiral Philippe Chabot, qui a épousé Françoise de Longvy achevèrent la transformation de la maison forte en  château, le premier ayant aménagé le corps de logis occidental vers 1556, le 2ème ayant, dès 1626, édifié la tour  Amiral à l'angle sud-est.  En 1652, il passa à Jean de Mesgrigny dont le fils le vendit dès 1696 à Jacques Languet, trésorier de France,  qui, après en avoir fait abattre à hauteur d'appui la courtine orientale, l'abandonna à sa fille François-Josephe, femme de Claude Henri Remond. Celle-ci fit appel à des maçons d'Aubusson pour le modifier et le  restaurer, vers 1720. En 1777, son petit-fils, Bénigne-Charles Fevret de Saint-Mesmin, en devint propriétaire. Les Pansiot en fut propriétaire fermier du seigneur ces derniers ayant émigrés. Saisi en 1792, le château fut vendu au citoyen Demoulin qui fit commerce de tous les matériaux utilisables,  puis revendit les bâtiments et dépendances en trois lots.","architecture":"Couchey, un peu en retrait de la route des grands crus au fond d'une impasse maison forte au XIIIe siècle  transformé en château au XIVe siècle  et eu des améliorations au cours des siècles suivants. Ce sont les moines de l'abbaye de Bèze qui ont les premiers cultivés la vigne, et ce dès le VIIe siècle au moins. il fut remanié aux XVe et XVIe siècles, restes d'un ancien château fort avec tour et fossés profonds.","habitants":"Jean de Saulx\r\n        \"","divers":"Maison forte de Couchey château de Beaufremont et de Jean de la Coste","gps":"","images":["../image/image_21/21_Couchey_1.jpg","../image/image_21/21_Couchey_2.jpg","../image/image_21/21_Couchey_3.jpg"]},"Consult_chateau_formulaire30de":{"id":"Consult_chateau_formulaire30de","dept":"21","canton":"Montbard","commune":"Courcelles-les-Montbard","nom":"Courcelles","type":"Château","periode":"XV","histoire":"COURCELLES; Le premier seigneur connu de Courcelles est, en 1297, Jean de Frolois, qui est le constructeur de la maison forte citée en 1316. Confisquée en 1477 par les sires de Pontailler puis restituée à   l'un deux en 1481, pour passer peu après à Claude de Saint-Anthost et Nicolas de Crécy, elle restera ensuite  partagée entre deux seigneurs jusqu'en 1765, date à laquelle Charles Damas de Cormaillon en deviendra le  seul propriétaire. Son fils émigrera, d'où l'ouverture d'une succession fort complexe.","architecture":"Courcelles,  élevé à la fin du XIIIe siècle, le château a cessé d'être habité  est devenu le centre de deux exploitations agricoles dès le XVe siècle, avant d'être démantelé au XVIIIe siècle et de perdre ses fossés, corps de logis rectangulaire à deux niveaux et attiques, un pavillon carré flanqué sur l'angle droit de même niveau.            Plusieurs châteaux celui de Malaisy transformé en hôtel restaurant. Le château de Nogent les Montbard, corps de logis rectangulaire à deux niveaux et attiques  flanqué de tours rondes aux angles à toitures en poivrières.","habitants":"Jean de Frolois\r\n        \"","divers":"Château de Courcelles,  dans la commune le château de Malaisy et au nord ouest le château de Nogent les Montbard dans cette commune du même nom.","gps":"","images":["../image/image_21/21_Courcelles_1.jpg","../image/image_21/21_Courcelles_2.jpg","../image/image_21/21_Courcelles_3.jpg","../image/image_21/21_Courcelles_4.jpg","../image/image_21/21_Courcelles_5.jpg","../image/image_21/21_Courcelles_6.jpg"]},"Consult_chateau_formulaire2d50":{"id":"Consult_chateau_formulaire2d50","dept":"21","canton":"Semur-en-Auxois","commune":"Courcelles-les-Semur","nom":"Courcelles_Souhey","type":"Château","periode":"XV","histoire":"COURCELLES les Semur,  le château, construit à partir du XIIIe siècle, appartient aux seigneurs de Courcelles, puis aux ducs de Bourgogne, qui y font  de nombreux séjours, et  à différentes familles. Il est réaménagé, notamment aux  XVe et XVIIe siècles. Propriété d'Arnoult de Courcelles en 1250, cette seigneurie passe au XIVe siècle entre les mains de divers seigneurs plus ou moins illustres; Eude VI de Bourgogne, Philippe le Hardi qui le vend en 1378 à Guy IV de la Tremoille. Guillaume de Saulx Tavannes en 1576, Charles Louis de Montsaulnin marquis de Montal en 1745 en furent les principaux propriétaires. De leur présence, il reste une ancienne et imposante maison forte attestée dès 1372 où y séjourna à diverses reprises le duc de Bourgogne. Sur l'emplacement de la maison forte un château renaissance a été érigé. Il en reste un logis en équerre, des restes d'enceinte quadrangulaire, des tourelles carrées et des douves pleines d'eau, ainsi que les armoiries de Guy de la Trémoille dont le blason orne désormais la page d'accueil de ce site.\r\nSOUHEY; Au XIVe siècle, la seigneurie de Souhey est partagée entre différentes familles, mais l'ancien château est  attestée en 1370. Les Coutier parviennent au XVIe siècle à s'en rendre seul maître. Les Damas de Crux obtiennent la seigneurie par alliance et firent rasés l'ancienne maison pour en construire un nouveau  château en 1756. Mais 22 ans plus tard, ils durent le vendre et Souhey passa entre divers propriétaires.Pauline de Meyronnet Chateauneuf née le 22 août 1802 à Aix, décédée au château de Souhey près Semur  le 11 avril 1882, âgée de 80 ans, épouse en octobre 1818, Achille de Pechepeyrou-Comminges de Guitaut, dit le comte Achille de Guitaut, propriétaire, En 1923 le parc a été rasé.","architecture":"Courcelles, un château attesté dès la fin du XIIe siècle et érigé sur un plateau dominant le village, qui malgré les outrages et les vicissitudes du temps, demeure un édifice imposant, il a gardé son aspect de forteresse compacte défendue de grosses tours d'angle carrées entourée de larges fossés encore partiellement en eau. Depuis cette époque jusqu'en 1997, il sert d'exploitation agricole. Il est situé à l'écart  du village dans un site encore préservé. Les bâtiments, édifiés sur une terrasse de plan circulaire entouré de douves, sont cantonnés de tours arasées et répartis autour d'une cour. En 1794, pour satisfaire à l'arrêté du directoire du district de Semur en Auxois en date du 2 frimaire, une partie du château est démantelée, notamment la porte d'entrée comportant un pont dormant prolongé d'un pont \" levis\".                                   \r\nSouhey; corps de logis rectangulaire en forme de T à deux niveaux, pavillon saillant sur aile gauche avant et arrière et tour ronde de même niveau à toit en parabole avec lanternon.","habitants":"seigneurs de Courcelles\r\n        \"","divers":"Château de Courcelles les Semur et la maison forte de Souhey","gps":"","images":["../image/image_21/21_Courcelles_Souhey_1.jpg","../image/image_21/21_Courcelles_Souhey_2.jpg","../image/image_21/21_Courcelles_Souhey_3.jpg","../image/image_21/21_Courcelles_Souhey_4.jpg","../image/image_21/21_Courcelles_Souhey_5.jpg","../image/image_21/21_Courcelles_Souhey_6.jpg","../image/image_21/21_Courcelles_Souhey_7.jpg","../image/image_21/21_Courcelles_Souhey_8.jpg","../image/image_21/21_Courcelles_Souhey_9.jpg"]},"Consult_chateau_formulaire3b21":{"id":"Consult_chateau_formulaire3b21","dept":"21","canton":"Pouilly-en-Auxois","commune":"Créancey","nom":"Creancey","type":"Château","periode":"XVII","histoire":"CREANCEY; Cité au XIIIe siècle par une maison forte, possession de Mahaud de Belleux seigneur de Créancey, qui la vend en 1235 à Hugues IV duc de Bourgogne qui ce dernier  en fait don  à l'une de ses filles  épouse du sire de Beaufremont, puis au XVe siècle  la seigneurie passa à Jacques Pot seigneur de la Roche, cette famille conserve la seigneurie jusqu'en 1507 qui passera aux Châteauvillain et en 1571 à Jacques Malyon bourgeois de Dijon qui la revend aux Chabot-Charny  à la fin du XVIe siècle. Elle appartenait à Marguerite de Brasey, veuve de Henry de Sercey, et dépendait de la baronnie de Charny, et acquise, peu avant 1638, par Antoine Comeau, garde des sceaux du parlement de Bourgogne, qui y bâtit vers 1650 un château. Il resta aux mains de la famille Comeau jusqu'en 1716, passa à Philibert des Maillard, sur qui  il fut mis en décret en 1738 au profit de Jacques-Philippe Fyot de La Marche, et fut racheté en 1754 par Joseph-Nicolas Comeau. Au début du XIXe siècle, il échut à la famille de Montille qui lui  fit subir quelques transformations et le conserva jusqu'en 1940. Occupé par l'armée allemande de 1940 à 1944 le château perd une grande partie de ses décors, longtemps abandonné  il est racheté en 1994 par monsieur Bruno de Wulf qui le remanie.","architecture":"Créancey, construit sur l'emplacement d'une maison forte dans les années 1650,  que défendait deux tours rondes et des fossés, le logis est constitué  d'un corps central rectangulaire  flanqué de deux pavillons plus hauts, en avancée sur les deux façades. Le corps central comprend  un rez-de-chaussé voûté, un étage carré et un comble à surcroît éclairé par des lucarnes passantes, dont la partie supérieure  donne jour  à un second étage de comble, les frontons des lucarnes sont triangulaires au centre et cintrés aux extrémités. Les trois niveaux de l'élévation sont marqués par un bandeau régnant au niveau de l'appui des fenêtres.","habitants":"Jacques Malyon\r\n        \"","divers":"Château de Créancey","gps":"","images":["../image/image_21/21_Creancey_1.jpg","../image/image_21/21_Creancey_2.jpg"]},"Consult_chateau_formulairecaed":{"id":"Consult_chateau_formulairecaed","dept":"21","canton":"Nuits-St-Georges","commune":"Corgoloin","nom":"Cussigny_Comblanchien","type":"Château","periode":"XVII","histoire":"CUSSIGNY; La première mention d'une maison forte à Cussigny apparaît en 1356, date à laquelle elle fut attaquée par  une compagnie anglaise. La partie centrale du corps de logis, souvent désignée dans les textes sous le nom de  donjon, est peut-être l'ancienne tour, très remanié, de cette maison forte, elle passa, au début du XVe siècle de la famille de Cussigny à la famille de Nanteux puis, par mariage, à celle de Brasey en 1474 et, enfin, par des successions complexes, à Simon de Saint-Belin à la fin du XVIe siècle. La fille de Claude de Saint-Belin  reçut Cussigny en dot lorsqu'elle épousa, en 1673, André Des Barres. Leur petit-fils Henri-Bénigne fit rebâtir le  château vers 1742. En 1764, le domaine fut acquis par Claude Pierre Poulletier de Perrigny qui le revendit, en  1788, à Bénigne Antoine Carrelet de Loisy. Au début du XIXe siècle, la famille de Loisy fit démolir l'aile nord et sans doute, les deux dernières tours d'angle en raison de leur mauvais état.                                                                                     Dans les environs à l'ouest le château dit de \"Grande Carrière\" à Comblanchien transformé en hôtel restaurant.","architecture":"Cussigny; Façades et toitures du château à l'exclusion de la tour carrée située au sud-ouest qui n'est pas ancienne ; chapelle ; pigeonnier, Cour d'honneur,   Comblachien corps de logis rectangulaire à deux niveaux et attiques sur assise renforcées, pavillons de même niveaux saillants en façades formant un U toiture à la Mansard avec lucarnes à fronton.","habitants":"Famille de Cussigny\r\n        \"","divers":"Château de Cussigny et de Comblachien","gps":"","images":["../image/image_21/21_Cussigny_Comblanchien_1.jpg","../image/image_21/21_Cussigny_Comblanchien_2.jpg","../image/image_21/21_Cussigny_Comblanchien_3.jpg","../image/image_21/21_Cussigny_Comblanchien_4.jpg","../image/image_21/21_Cussigny_Comblanchien_5.jpg"]},"Consult_chateau_formulaire2c4d":{"id":"Consult_chateau_formulaire2c4d","dept":"21","canton":"Dijon","commune":"Dijon","nom":"Dijon","type":"Patrimoine","periode":"XIII-XIV","histoire":"DIJON; Au  XIe siècle, ville forte entouré de murs gallo-romains, restes de l'ancien castrum de Dijon.  A la mort du Roi de France en 1031, son fils Henri Ier renonce à la Bourgogne cède  le duché  à son frère Robert Ier.  début de trois siècles de règne capétien à Dijon. Les ducs  possèdent un château (actuelle mairie de Dijon) et y exercent avant tout un pouvoir de justice. En 1183 au duc Hugues III . Dijon connaît une période brillante sous les quatre ducs Valois de Bourgogne, qui règnent de 1363 à 1477. Elle est la capitale du duché de Bourgogne, ensemble d'États qui s'étendent jusqu'aux Pays-Bas. Le duc Philippe le Hardi (1364-1404) est le premier duc de la dynastie des Valois et prend possession de Dijon, sur ordre du Roi, en 1363. Il fonde à Dijon sa nécropole dynastique, la chartreuse de Champmol, dont il fait un foyer d'art. Jean Ier sans Peur (1404-1419) lui succède. Le duc Philippe III le Bon (1419-1467) reconstruit l'hôtel ducal. Louis XI ordonne le transfert à Dijon du parlement de Bourgogne, qui se trouvait à Beaune. Il fait aussi construire à Dijon un château, à l'emplacement de l'actuelle place Grangier, la duchesse Marie de Bourgogne (1457-1482), alors âgée de 20 ans et fille unique du duc Charles le Téméraire, épouse Maximilien Ier du Saint-Empire. En 1513, l'empereur Maximilien espère récupérer le duché de Bourgogne, fait de la cité une ville parlementaire, où la noblesse de robe édifie des hôtels particuliers. Dijon, perdant son statut de ville frontière, peut à nouveau s'agrandir. Sous l'administration des princes de Condé et gouverneurs de Bourgogne la ville se transforme, une place Royale actuelle place de la Libération est aménagée devant l'ancien Palais des ducs de Bourgogne, qui est lui-même remanié et agrandi. La rue Condé, actuelle rue de la Liberté, est percée. Les princes de Condé créent le vaste parc de la Colombière et son castel reliés à la ville par une avenue plantée d'arbres.","architecture":"Dijon, son patrimoine s'est bâti au fil des siècles, avec des édifices publics comme le Zénith ou l'Auditorium ou à travers des bâtiments de haute technologie comme la tour Elithis. Le « vieux Dijon » ou centre historique comporte d'innombrables maisons anciennes, hôtels parlementaires. Pour la plupart, ces monuments datent du Moyen-Âge. Des réalisations modernes, datant du XIXe siècle, de type « hausmannien », complètent ce patrimoine dijonnais. La ville compte ainsi en son centre des rues bordées d'édifices médiévaux ayant évolué au sein des anciennes limites du castrum de Dijon d'héritage romain. Au XVIIe siècle et au XVIIIe siècle, deux grands architectes de cour, Jules Hardouin-Mansart, puis Jacques V Gabriel, redessinent une partie du centre de la ville. Le premier crée la place Royale, devant l'ancien palais des ducs, qu'il remodèle. Gabriel poursuit cette uvre. Les hôtels privés témoignent de l'architecture du XVIIe et XVIIIe siècles, comme l'hôtel de Vogüé 1610, l'hôtel Chartraire de Montigny ou l'hôtel Bouhier de Lantenay actuellement la préfecture. Du castrum de Dijon IIIe siècle ne subsiste que la tour dite du Petit Saint-Bénigne.\r\nLes remparts médiévaux ont laissés malheureusement peu de traces, la voie ferrée passe sur l'ancien rempart dit de la Miséricorde. Rue de l'Hôpital, il subsiste des vestiges du bastion de Guise, qui constituait l'angle sud-ouest du rempart, rue de Tivoli et rue Berlier, deux pans de murs sont également encore préservés.La porte Guillaume, située place Darcy, s'élève à l'emplacement d'une porte fortifiée des remparts de la ville. Elle fut érigée en 1788 par Caristie, selon les plans de Jean-Philippe Maret, en l'honneur du prince de Condé.","habitants":"Ducs de Bourgogne\r\n        \"","divers":"Palais des la place de la Libération, le palais des ducs, la tour, la porte Guillaume, le château de Near, la prison-tribunal, la tour Mairie et la prefecture","gps":"","images":["../image/image_21/21_Dijon_1.jpg","../image/image_21/21_Dijon_2.jpg","../image/image_21/21_Dijon_3.jpg","../image/image_21/21_Dijon_4.jpg","../image/image_21/21_Dijon_5.jpg","../image/image_21/21_Dijon_6.jpg","../image/image_21/21_Dijon_7.jpg","../image/image_21/21_Dijon_8.jpg","../image/image_21/21_Dijon_9.jpg"]},"Consult_chateau_formulaire2de3":{"id":"Consult_chateau_formulaire2de3","dept":"21","canton":"Aignay-le-Duc","commune":"Duesme","nom":"Duesme","type":"Vestiges","periode":"XIII","histoire":"DUESME; Forteresse bâtie à l'extrémité d'un éperon rocheux, ayant appartenu aux seigneurs de Duesme du XIIIe siècle au XIVe siècle, puis aux ducs de Bourgogne avant de devenir la possession de seigneurs engagistes après la  réunion à la couronne.","architecture":"Duesme,  les guerres de Religion dégradent l'édifice, entraînant son démantèlement en 1595, sur ordre de Henri IV, puis sa démolition en 1763. Trois fossés entourent le château, appartenant à des  périodes différentes. Le premier date du néolithique. Au-delà du second  se trouvait l'entrée fortifiée, les  dépendances et  la chapelle dont la crypte conserve des éléments gallo-romains. Le donjon se  dressait au-delà du troisième fossé.","habitants":"Seigneurs de Duesme\r\n        \"","divers":"Vestiges du château de Duesme","gps":"","images":["../image/image_21/21_Duesme_1.jpg","../image/image_21/21_Duesme_2.jpg"]},"Consult_chateau_formulairee6b9":{"id":"Consult_chateau_formulairee6b9","dept":"21","canton":"St-Jean-de-Losnes","commune":"Brazey-en-Plaine","nom":"Dumesnil_Magnin","type":"Château","periode":"XVIII","histoire":"MAGNIN; Pierre Philippon,  fait construire en 1746 le « Château Magnin»  A la suite du mariage de l'héritière de la famille Philippon, le patrimoine revient à la famille Magnin dont Joseph en est le membre le plus illustre, Joseph Magnin (1824-1910), député, sénateur inamovible, gouverneur de la banque de France, vic-président du Sénat, ancien ministre de l'agriculture et du commerce, ancien ministre des finances, ancien président du conseil général de la Côte-d'Or. Légués à lEtat par les enfants de Joseph Magnin, ils ont été laissés pratiquement sans entretien pendant de nombreuses années. Le domaine a été acquis par la commune de Brazey en Plaine en 1972.                                 DUMESNIL La construction du « château Pottecher », vaste demeure du XIXème siècle édifiée dans un parc de trois hectares et demie, est due à Pierre-Abraham-Jules Bonniot de Salignac. Ce magistrat gascon épouse en 1834 Laure Philippon et entre dans la famille Magnin-Philippon. Après sa mort en 1883, le château est acquis par Charles Pottecher, riche avocat parisien qui lui donne son nom  au XVIIIe siècle propriété de la famille du Mesnil, anoblie à la fin de l'Ancien régime. A la Révolution, Jean-Baptiste Jobard du Mesnil est républicain, capitaine de la Garde Nationale. Il est ensuite fait baron par Napoléon Ier. Leur fils Jean-Baptiste Dumesnil, capitaine de la Garde Nationale sous la Révolution, anobli une seconde fois par Napoléon le 20 août 1909 avec le titre de Baron. Marié avec Claudine Eléonore Raffatin, décédé en 1859\r\n L'actuel château Dumesnil a été transformé radicalement au début du XIXe siècle par le baron Anne Jean-Baptiste Eugène du Ménil,baron d'Empire fils de Jean-Baptiste, magistrats, passionné d'astronomie et d'égyptologie. Le bâtiment est un curieux mélange de style classique et oriental. Il fut acquis par la commune en 1904.                                                                                        MAGNY; A quelques kilomètres de Brazey, pas d'historique sur le château du XVIIIe siècle sinon lieu de gastronomie de luxe.","architecture":"Magnin, corps de logis rectangulaire à deux niveaux et attiques prolongé sur les côtés par des ailes à un niveau, du   XVIIIe siècle et son superbe parc à langlaise de 5,5 hectares. Le bâtiment en briques, situé près de l'actuelle église, doté de curieuses tuiles faîtières en forme d'animaux, bâtiment très ancien, a fait l'objet de réaménagements importants entre le XVIIe et le XIXe siècle et n'a plus l'aspect d'un édifice médiéval.                                   \r\nDomaine Dumesnil a été édifié au XVIIIe siècle. La transformation du château date du XIXe siècle, le bâtiment est un curieux mélange de style classique et oriental. L'ensemble est complété par un pigeonnier du XVIIIe siècle, près de la chapelle et, face au château, par un parc où se trouve une tour ayant sans doute servi d'observatoire. Acquis par la municipalité en 1905, le château a été restauré et aménagé en 1906, ainsi que dans les années 1960, en bureau de poste, perception et salle de danse, plus de cinq hectares, remonte au XIe siècle pour sa partie la plus  ancienne, façades et toitures, escalier intérieur avec sa rampe en fer forgé, salon au rez-de-chaussée avec son décor.","habitants":"Pierre Philippon et Pierre-Abraham-Jules Bonniot de Salignac\r\n        \"","divers":"Château de Magnin de Dumesnil et de Magny.","gps":"","images":["../image/image_21/21_Dumesnil_Magnin_1.jpg","../image/image_21/21_Dumesnil_Magnin_2.jpg","../image/image_21/21_Dumesnil_Magnin_3.jpg","../
