es. Il fut la demeure d'Alexis de Tocqueville qui en hérita avec son épouse Marie. Il le fit restaurer de 1833 à 1857. Alexis de Tocqueville (1805-1859), se retira dans le château familial, en 1851, pour y poursuivre son uvre littéraire. Il abrite également quelques uvres classées.","architecture":"TOCQUEVILLE, ce château a été construit au XVIe siècle, modifié au XVIIIe siècle, et augmenté au XIXe siècle en 1894 du pavillon d'inspiration Renaissance au sud.  Alexis de Tocqueville en 1836 en hérite  et  a aménagé le parc. L'avenue a été plantée en 1843 et la pièce d'eau a été créée en 1845. En 1954, un incendie a détruit en partie les décors intérieurs, épargnant le bureau de Tocqueville et l'important chartrier du château. Le hall d'entrée, les deux salons du rez de chaussée, l'ancienne chambre d'Alexis de Tocqueville : inscription par arrêté du 24 septembre 1965. La façade du XVIIIe siècle et la toiture correspondante, les façades et les toitures des communs, la maison du gardien à l'exclusion des adjonctions modernes, les restes du pigeonnier : classement par arrêté du 17 août 1979. Les façades et toitures du château, l'escalier, le chartrier, la bibliothèque d'Alexis de Tocqueville au premier étage avec son décor, le portail d'entrée, façades et toitures des bâtiments dits la menuiserie, la petite boulangerie et la petite laiterie, la fontaine du jardin nord avec son bassin : classement par arrêté du 17 décembre 1993. Le parc et le  château : inscription par arrêté du 30 octobre 2000.                                         En 1896, une aile rectangulaire est ajoutée par le Comte Christian, petit neveu dAlexis et arrière grand-père du propriétaire actuel, Jean Guillaume de Tocqueville.","habitants":"Famille de Clérel de Tocqueville\r\n        \"","divers":"Château de Tocqueville                                                              GPS : 49° 40' 1,41\" Nord, 1° 19' 44,27\" Ouest","gps":"49° 40' 1,41\" Nord, 1° 19' 44,27\" Ouest","images":["../../jctruffet.com/image/image_50/50_Tocqueville_1.jpg","../../jctruffet.com/image/image_50/50_Tocqueville_2.jpg"]},"Consult_chateau_formulaire06d9":{"id":"Consult_chateau_formulaire06d9","dept":"50","canton":"Condé-sur-Vire","commune":"Torigni sur Vire","nom":"Torigni_Matignon","type":"Château","periode":"XVI","histoire":"MATIGNON, ancien fief de deux descendants de Guillaume le Conquérant, cette très belle demeure a appartenu pendant plus de trois siècles à la célèbre famille des Matignon. Le premier château fortifié appartenant à la riche famille Gouyon, seigneurs de Matignon, originaires de Bretagne, fut presque entièrement rasé au début du XVIe siècle. En 1715 mariage de Jacques- Léonor-François de Matignon et de Louise-Hippolyte Grimaldi. Elle est le lieu de naissance de Jacques Ier de Monaco. Elle fut le fief de la famille de Matignon dont il demeure l'aile sud du château, En 1817 le château est acquis par la commune, réaménagée entièrement après le bombardement de 1944 (collection de tapisseries d'Aubusson et de meubles régionaux). Musée Arthur Le Duc, contemporain des Claudel et des Rodin. Ce sculpteur méconnu est très présent en Normandie, à Paris et au-delà. Ancienne cour aux canons aménagée en jardin public.  Le château porte le nom de la maison des Matignon, comtes de Torigny, seigneurs de Matignon, originaires de Bretagne. Parmi ses membres on relève notamment Jacques II de Goyon de Matignon.                                                                               A dix K.M.au nord-Est à  Lamberville le château de LAMBERVILLE du XVIII chambres d'hôtes de François et Elisabeth de Brunville.","architecture":"MATIGNON-TORIGNI,  un nouveau château date du XVIe siècle fut bâti, abandonnant le style défensif pour être transformé en résidence seigneuriale. Se présente aujourd'hui sous la forme d'un bâtiment haut d'un étage sur rez-de-chaussée, que flanquent deux pavillons (1650) surmontés de larges frontons triangulaire dont les tympans sont sculptés d'attributs militaires, d'armoiries et de trophées . L'emploi de pierre pourpre, poudingue issu des carrières de Troisgots, avec ses joints de calcaire blanchâtre et dont les lignes horizontal, donne à la façade un caractère harmonieux.  Le château des Matignon était alors constitué de 3 ailes en U dont il ne reste aujourd'hui que l'aile méridionale et quatre pavillons y étaient joints. Le domaine était entouré par un enclos de fossés secs. Mis aux enchères en 1805, le château des Matignon et son domaine furent vendus à un marchand de biens, qui fit morceler la propriété. Le domaine possédait un mobilier important, composé de tableaux et de belles tapisseries d'Aubusson. En 1944, un incendie ravagea le château provoquant la perte de plusieurs pièces classées à titre d'objets.  Aujourd'hui, le château des Matignon abrite la Mairie de Torigni-les-Villes et un Musée a été consacré à Arthur Le Duc, sculpteur français de la ville.  Classement par liste de 1840.","habitants":"Famille des Matignon\r\n        \"","divers":"à Torigny sur Vire château de Matignon grav 1-2-3 Lamberville Grav-4  Gps 49° 02' 3,15\" Nord, 0°58'44,11\" ouest     49° 02' 08\" nord, 0° 58' 46\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Torigni_Matignon_1.jpg","../../jctruffet.com/image/image_50/50_Torigni_Matignon_2.jpg","../../jctruffet.com/image/image_50/50_Torigni_Matignon_3.jpg","../../jctruffet.com/image/image_50/50_Torigni_Matignon_4.jpg"]},"Consult_chateau_formulaire80ca":{"id":"Consult_chateau_formulaire80ca","dept":"50","canton":"Valognes","commune":"Omonville-Anneville","nom":"Tourps","type":"Manoir","periode":"XV-XVIII","histoire":"TOURPS, le fief de Samson d'Anneville était considérable, puisqu'il s'étendait sur Le Vicel, Réville, Montfarville, Barfleur, Sainte Geneviève, Valcanville et Saint Floxel. En 1450, le château du Tourps revint à Jean de la Cour. Dans la même paroisse, au Tourps, près de la chapelle Saint-Gilles, se tenait, le jour de la fête de ce saint, une foire dont les produits appartenaient à l'abbaye de Lessay. Un arrêt du parlement de Rouen, du 21 juillet 1657, termina une contestation de préséance entre Nicolas de Saint-Germain, sieur du Breuil, qui possédait le fief dominant, situé dans la paroisse d'Anneville, et Bon-Christophe de la Cour, sieur du Tourps, qui possédait le fief du Tourps, dans la même paroisse. Le parlement maintint le sieur de Saint-Germain en sa qualité de patron honoraire dans ses droits honorifiques de l'église, au droit de son fief du Breuil, à Anneville. Quant au sieur du Tourps, il fut condamné à faire enlever son banc et ses armes.","architecture":"TOURPS, le logis et les communs, comme la maison d'Anneville au sud-est du bourg, par-delà la Saire, ont été largement reconstruits au XVIIIe siècle. Bâtisse  oblong à deux niveaux toits à deux pans avec tour carré décalée sur la droite  la cour immense entourée de bâtiment de dépendances.  Éléments protégés MH : les façades et les toitures du château, le salon et la chambre attenante avec leurs décors, et l'escalier ; les façades et les toitures de l'ensemble des bâtiments (logis manable, communs, chapelle, pavillon de jardin); le potager et ses murs de clôture: inscription par arrêté du 25 août 2005.","habitants":"Famille de Jean de la Cour\r\n        \"","divers":"Manoir de Tourps \r\ngps 49° 38' 35\" N, 1° 16' 13\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Tourps_1.jpg","../../jctruffet.com/image/image_50/50_Tourps_2.jpg"]},"Consult_chateau_formulairec4c2":{"id":"Consult_chateau_formulairec4c2","dept":"50","canton":"Valognes","commune":"Valognes","nom":"Valognes","type":"Chateaux","periode":"XVI-XVII","histoire":"Deux châteaux à Valognes dont Valognes et Beaumont.                       BEAUMONT, en 1722, Pierre Jallot de Beaumont, mousquetaire du roi et fils de corsaire, hérite de son oncle une demeure à Valognes. Il décide de la transformer en une somptueuse résidence dhiver, digne de sa fortune et de sa position. Valognes est alors un haut lieu mondain dès les premiers frimas, les nobles délaissent leur demeure côtière, battue par les vents, pour cette petite ville où ils mènent grand train, multipliant bals et réceptions. Pour mener à bien son ambitieux projet, Pierre de Beaumont fait appel à larchitecte Raphaël de Lozon, qui remanie profondément le bâtiment et crée un beau pavillon central afin de compenser les décalages liés à la dénivellation du terrain. Les travaux, commencés en 1767, sachèvent en 1771. Lozon meurt à lhôtel de Beaumont le 22 juin 1771. En 1793, au moment de la Révolution, Marie Bonaventure de Beaumont, le fils de Pierre de Beaumont, émigre en compagnie de son beau-frère, Jacques du Mesnildot. Une fois rentré en France, il sétablit en Lorraine, abandonnant lhôtel de Beaumont à son triste sort.                                                                            CLOS DU COTENTIN, du Moyen-âge (forteresses de Bricquebec et de Saint-Sauveur-le-Vicomte), les manoirs de la Renaissance et lart religieux (dont les abbayes de Valognes, Bricquebec et Saint-Sauveur-le-Vicomte), que les hôtels particuliers valognais des XVIIe et XVIIIe siècles, les musées (Musée du Cidre de Valognes, musée Barbey dAurevilly de Saint-Sauveur-le-Vicomte) et le patrimoine littéraire (Gilles de Gouberville, Jules Barbey dAurevilly).","architecture":"BEAUMONT, en effet, après avoir été pillé, lhôtel de Beaumont devient une maison de détention puis est occupé par les Prussiens en 1818. A la fin du XIXe siècle, Sophie du Mesnildot, arrière-petite-nièce de Marie Bonaventure de Beaumont, vend lhôtel à M. Debains, qui le revend quelques années plus tard au Comte de Froidefond de Florian, diplomate originaire de la région. La chambre dHélène est nommée en mémoire de son épouse, Hélène du Pouget de Nadaillac, qui neut pas denfant. Le neveu du comte, Xavier de Florian, hérite donc de lhôtel. Pendant la seconde guerre mondiale, les officiers de santé de la Wehrmacht sinstallent dans les chambres tandis que le reste de lhôtel devient le mess des officiers. Le maréchal Rommel y est reçu lors dune cérémonie officielle. En juin 1944, lhôtel de Beaumont est gravement endommagé par les bombardements alliés. A la Libération, Xavier de Florian laisse lhôtel, alors dans un état désastreux, à sa nièce, la Comtesse Charles des Courtils. Elle est aidée dans sa tâche par son fils aîné, Henri des Courtils, dont lépouse, Claire du Pouget de Nadaillac, nest autre que larrière petite-nièce de la Comtesse de Florian.                                                                    SAVIGNY chambres d'hôtes.                                           GRANDVAL-CALIGNY    Hôtel                           VALOGNES, la construction du château de Valognes date de 1750.À partir de 1354, Charles le Mauvais fait construire un nouveau château  et s'y installe. Du Guesclin lui fait le siège. Par la suite, et jusqu'à la Guerre de Cent ans, le château subit plusieurs sièges et passe de mains des Anglais et des Navarrais à celles des Français, et réciproquement huit jours après, la démolition  commence. On peut encore voir « un grand donjon, des courtines, cinq grosses tours avec des fossés de soixante pieds de profondeur, tel à peu près qu'ils étaient au XVe siècle » en 1689]. Le château est détruit, mais il reste encore la porte, le pont, six grandes courtines et le donjon. En 1771, Robert de Hesseln note : « actuellement, on achève de détruire toutes ces ruines ;","habitants":"seigneurs locaux\r\n        \"","divers":"Deux châteaux à Valognes dont Valognes gra-1-2 et Beaumont grav 3-4-5. Grandval grav 4   Savigny grav 5-6  GPS : 49° 28' 09\" Nord, 1° 30' 33\" Ouest                                                        Valognes gps49° 30' 28\" N, 1° 28' 13\" O","gps":"49° 28' 09\" Nord, 1° 30' 33\" Ouest","images":["../../jctruffet.com/image/image_50/50_Valognes_1.jpg","../../jctruffet.com/image/image_50/50_Valognes_2.jpg","../../jctruffet.com/image/image_50/50_Valognes_3.jpg","../../jctruffet.com/image/image_50/50_Valognes_4.jpg","../../jctruffet.com/image/image_50/50_Valognes_5.jpg","../../jctruffet.com/image/image_50/50_Valognes_6.jpg"]},"Consult_chateau_formulaire8386":{"id":"Consult_chateau_formulaire8386","dept":"50","canton":"Carentan","commune":"St-Germain de Varreville","nom":"Vaugoubert_50","type":"Chateaux","periode":"XVIII","histoire":"A Saint Germain de Varreville;                                                            VAUGOUBERT, du XIXe siècle, plus rien ne subsiste des anciens bâtiments. Dans le parc, un pigeonnier est refait sur une ossature ancienne. Il a appartenu sous la Révolution à François Darot, écuyer, ancien gendarme des gardes du roi. On trouve comme ayant été appelé à l'assemblée des trois ordres, à Coutances, en 1789, le président de Bermonville, seigneur de Saint-Germain-de-Varreville, Robert de Gourmont de Saint-Clair, seigneur du fief du Mesnil, en la paroisse de Saint-Germain-de-Varreville, et Alexis-Christophe d'Arot, écuyer, chevalier de Vaugoubert, capitaine d'artillerie au régiment de Strasbourg, à Saint-Germain-de-Varreville. Le château de Vaugoubert, de plan régulier à un étage carré, a été bâti dans la deuxième moitié du XVIIIe siècle. Les remises, les écuries, le colombier et le pavillon datent du XIXe siècle.","architecture":"VAUGOUBERT, il date  du XVIIIe siècle et du XIXe siècle. La construction du château de Vaugoubert date du XIXe siècle. Il ne reste plus rien des anciens bâtiments. Dans le parc, un pigeonnier a été restauré sur une ossature ancienne. Le château de Vaugoubert a appartenu, sous la Révolution, à François Darot, écuyer et ancien gendarme des gardes du roi. Le château de Vaugoubert est privé et fermé au Public. Il y a 2 autres châteaux à Saint-Germain-de-Varreville à découvrir : le château de Gourmont du  (XVIIIe siècle) et le Château de Clamorgan ou de Mesnil  (XVIIIe siècle).","habitants":"Famille de françois Darot\r\n        \"","divers":"A Saint Germain de Varreville; Vaugaubert     GPS : 49° 26' 16\" Nord, 1° 15' 26\" Ouest","gps":"49° 26' 16\" Nord, 1° 15' 26\" Ouest","images":["../../jctruffet.com/image/image_50/50_Vaugoubert_50_1.jpg","../../jctruffet.com/image/image_50/50_Vaugoubert_50_2.jpg"]},"Consult_chateau_formulaireead6-2":{"id":"Consult_chateau_formulaireead6-2","dept":"50","canton":"La Hague","commune":"Vauville","nom":"Vauville","type":"Château","periode":"XVII-XVIII","histoire":"VAUVILLE, Richard de Vauville entreprit en 1163 la construction d'un château fort dont il ne reste plus que le donjon. Il bâtit également le prieuré de Saint Hermel situé sur une colline au nord-est de Vauville. Ce prieuré dépendait de l'abbaye de Cerisy la Forêt. C'est vers cette même époque que l'on peut situer la construction de l'église de Vauville contigue au château, dont elle faisait autrefois partie. On perd la trace des seigneurs de Vauville  lors de la guerre de Cent Ans (une branche de la famille s'établit en Angleterre ; l'un deux, Lord Waxell fut vice roi des Indes. Les bâtiments actuels, formés de deux corps de logis construits à l'angle droit, reliés par la tour, furent érigés fin XVIe ou début du XVIIe siècle, édifié en pierre du pays avec des murs qui par endroits ont près d'un mètre d'épaisseur, avec ses fenêtres à meneaux, et ses larges cheminées, le château de Vauville, couvert d'une toiture en schiste, demeure un des plus beaux exemples de l'architecture des maisons fortes du Nord Cotentin. Les lucarnes, surmontées d'une étoile et du soleil levant stylisé, indiquent l'appartenance au fief royal.","architecture":"VAUVILLE,  du caractère défensif de la construction d'origine, il subsiste la tour principale, le mur d'enceinte circulaire et la douve qui entoure le château. Le pigeonnier, construit en 1732, à l'extérieur du mur d'enceinte, est caractéristique des bâtiments d'accompagnement de l'édifice principal. Il contient plus de mille cases (ou boulins). Le frère de l'Amiral de Tourville fut propriétaire du château ainsi que le général Le Marois, aide de camp de Napoléon. En 1837, Polydor le Marois détruisit la poterie où mourut le Bienheureux Thomas Elye, aumônier de Saint-Louis. Sous sa forme actuelle, ce sont les mêmes propriétaires qui depuis plus de cent ans entretiennent et restaurent le château. Lors de la seconde Guerre Mondiale, la demeure fut pillée et fortement endommagée. L'exceptionnel jardin botanique occupe plus de 40 000 m². Abritant plus de 900 espèces de l'hémisphère austral, le jardin entoure le château dans une ambiance subtropicale tout à fait surprenante.\r\nÉléments protégés MH : le jardin botanique : inscription par arrêté du 20 novembre 1992.","habitants":"l'Amiral de Tourville\r\n        \"","divers":"Château de Vauville gps 49° 38' 08\" N, 1° 50' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Vauville_1.jpg","../../jctruffet.com/image/image_50/50_Vauville_2.jpg","../../jctruffet.com/image/image_50/50_Vauville_3.jpg","../../jctruffet.com/image/image_50/50_Vauville_4.jpg"]},"Consult_chateau_formulaire9b89":{"id":"Consult_chateau_formulaire9b89","dept":"50","canton":"Carentan","commune":"Vierville","nom":"Vierville","type":"Château","periode":"XVIII","histoire":"VIERVILLE,  Après la Révolution Charles-François Lebrun fera l'acquisition du château, la façade est couronnée d'épis de faîtage en terre cuite et de tuiles faîtières à arceaux croisés. A l'ouest se trouvent une avant-cour et une cour d'honneur à deux pavillons. A l'Est est disposé le jardin clos de murs. A l'intérieur on remarque un important ensemble de décorations , cheminées de marbre, lambris, frises de stuc, etc. Éléments protégés MH : le château avec ses décors intérieurs, y compris le bâtiment contigüe au pignon sud, en totalité ; les façades et les toitures des deux pavillons de la cour d'honneur ; le portail d'entrée avec ses piliers ; le colombier ; les façades et les toitures des communs à l'exclusion du logis attenant au colombier, le jardin d'agrément avec ses murs de clôture et ses portes : inscription par arrêté du 24 novembre 1997.","architecture":"VIERVILLE, date du XVIIIe siècle. Ce château a été construit dans la première moitié du XVIIIe siècle (avant 1744). A l'Ouest se trouve une avant-cour et une cour d'honneur à deux pavillons. A l'intérieur, on remarque un important ensemble de décorations (lambris, frises de stuc, cheminées de marbre, etc.). Le château de Vierville est inscrit aux M.H. depuis le 24/11/1997.  Le château du XVIIIe siècle de style classique, érigé sur des soubassements plus ancien, se présente sous la forme d'un corps de logis, haut d'un étage sur un rez-de-chaussée surélevé avec un pavillon central encadré de pilastres d'arêtes, surmonté d'un fronton triangulaire, et précédé d'un perron. Dans l'immense cave ont peut voir un four de boulangerie.","habitants":"Charles-François Lebrun \r\n        \r\n        \"","divers":"Château de Vierville     GPS : 49° 21' 30,88\" Nord, 1° 14' 45,3\" Ouest","gps":"49° 21' 30,88\" Nord, 1° 14' 45,3\" Ouest","images":["../../jctruffet.com/image/image_50/50_Vierville_1.jpg"]},"Consult_chateau_formulaire1fc5":{"id":"Consult_chateau_formulaire1fc5","dept":"50","canton":"Villedieu-les-Poêles","commune":"Villedieu les poeles","nom":"Villedieu_Poeles","type":"Château","periode":"XVIII","histoire":"VILLEDIEU, la construction du château date de 1780. C'est un authentique château du XVIIIe siècle en parfait entretien. Il a une superficie de 500m2 habitable. Le château de Villedieu est composé d'une belle entrée avec un escalier, de salles de réception, d'une vaste cuisine et d'un bureau. A l'étage, il y a 12 chambres dont 7 avec une salle de bains/WC, et un bureau. Des dépendances (garages, atelier, 9 boxes). Une maison de gardien de 3 pièces louées. Terrain 16,7ha, une avenue plantée, un bois, un étang, un tennis et une magnifique vue dégagée et imprenable sur le bocage normand.","architecture":"VILLEDIEU,  le 1er janvier 2016, Rouffigny intègre avec Villedieu-les-Poêles, créée sous le régime juridique des communes nouvelles instauré par la loi  du 16 décembre 2010 de réforme des collectivités territoriales.  et le chef-lieu de la commune nouvelle.","habitants":"Seigneur locaux\r\n        \r\n        \r\n        \"","divers":"château de Villedieu    grav 2-3-4  GPS : 48° 50' 19\" Nord, 1° 13' 21\" ouest  hôtel de ville grav 1  Rouffigny grav 5","gps":"48° 50' 19\" Nord, 1° 13' 21\" ouest  hôtel de ville grav 1  R","images":["../../jctruffet.com/image/image_50/50_Villedieu_Poeles_1.jpg","../../jctruffet.com/image/image_50/50_Villedieu_Poeles_2.jpg","../../jctruffet.com/image/image_50/50_Villedieu_Poeles_3.jpg","../../jctruffet.com/image/image_50/50_Villedieu_Poeles_4.jpg","../../jctruffet.com/image/image_50/50_Villedieu_Poeles_5.jpg"]},"Consult_chateau_formulaire4350-2":{"id":"Consult_chateau_formulaire4350-2","dept":"50","canton":"Carentan","commune":"Houesville","nom":"Vivier_Houesville","type":"Château","periode":"XVI-XVII","histoire":"VIVIER,  pendant les guerres religieuses qui désolèrent le pays dans le cours du XVIe siècle, les seigneurs d'Houesville et de Cosqueville furent massacrés par les protestants. En 1599, on trouve noble à Houesville, Charles Varroc, sieur de Houesville. Dans le cours du XVIIe siècle, l'un des membres de la famille de Varroc était seigneur d'Houesville. Au milieu du XVIIIe siècle, Pierre Claude de Varroc, chevalier, seigneur de Houesville, vend à Thomas Alexandre \"un ténement appelé la ferme du Vivier, consistant en maison manables, cellier, grange, charetiérie, étable, boulangerie, cour, deux jardins et un circuit de terre au bout du plus grand des deux jardins\". Lors du mariage de René Nicolas Frigoult avec Jacqueline. Le Perchois en 1763 le domaine du Vivier passa dans la famille Frigoult de Liesville. Le corps central du logis, de plan régulier à un étage carré, avec deux ailes en retrait, a été édifié au XVIIIe siècle; des remaniements et adjonction de pavillons effectués au XIXe siècle.","architecture":"VIVIER,  le 21 aôut 1754,  Pierre Claude de Varroc, chevalier, seigneur et patron de Houesville, demeurant à Saint-Germain-en-Laye le 25 aôut 1754. C'est par le mariage de René Nicolas FRIGOULT avec Jacqueline le Perchois  en 1763 que la terre du Vivier passa dans la famille Frigoult de LIiesville. Le château du Vivier était aussi appelé le Château des Pavillons à cause de deux pavillons, situés à l'entrée du parc, ils ont été rasé en 1958. Le château se compose d'un corps central et de deux ailes en retrait sur ce corps principal. Le 17 juin 1814, le général russe Kraproski, commandant le 3éme régiment de grenadiers de la Garde impériale, logea avec son épouse, sa fille, son aide de camp et 18 domestiques au château du Vivier. En 1943, un soldat Allemand s'est noyé accidentellement dans les douves qui se trouvait aux pavillons.","habitants":"Famille de Charles Varroc\r\n        \r\n        \"","divers":"à Houesville château de Vivier gps 49° 21' 03\" nord, 1° 17' 16\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Vivier_Houesville_1.jpg","../../jctruffet.com/image/image_50/50_Vivier_Houesville_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','50 — Manche'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
