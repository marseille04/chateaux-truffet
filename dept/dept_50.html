puté de moitié après la mort de son créateur, en 1897, avec une transformation de cette partie, cédée en pâturages. Une association « Les Amis du Jardin de Bellenau » se charge de valoriser l'espace. Le parc fut créé par Pierre-Étienne-Joseph Lafosse (1828-1897). Le château de Belleneau est inscrit aux M.H. Le parc est ouvert au Public en attendant la réhabilitation du château de Belleneau. Les annexes ont été transformées en gîte d'hôtes. Le parc a une superficie de 2 ha. Le parc est ouvert au Public et les annexes ont été transformées en gîte d'hôtes. Dans l'espace aménagé, le propriétaire acclimate des espèces végétales « rares et exotiques ».                                                               HAUBOURG Incontestablement, par ses spécificités architecturales,.Le manoir de Haubourg se présente sous la forme d'un logis rectangulaire flanqué de deux pavillons qui s'éclairent par des fenêtres étroites. La charretterie comporte trois arches en plein cintre reposant sur des colonnes. On accède au domaine par une porte charretière.                             RAMPAN, ce manoir a été reconstruit au lendemain de la guerre de Cent Ans, au début du XVIe siècle. L'ensemble des communs date des XVIe et XVIIe siècles.","habitants":"Bel-Esnauly; famille Lafosse                                                      Haubourg; Léonard Rouxelin\r\n        \"","divers":"Deux châteaux dans cet article; Bel-Esnault grav-1 et Hauboug grav-2-3 et le manoir de Rampan grav -4.GPS : 49° 20' 00\" Nord, 1° 15' 16\" Ouest","gps":"49° 20' 00\" Nord, 1° 15' 16\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Come_du_Mont_1.jpg","../../jctruffet.com/image/image_50/50_St_Come_du_Mont_2.jpg","../../jctruffet.com/image/image_50/50_St_Come_du_Mont_3.jpg","../../jctruffet.com/image/image_50/50_St_Come_du_Mont_4.jpg"]},"Consult_chateau_formulaire55f9-2":{"id":"Consult_chateau_formulaire55f9-2","dept":"50","canton":"Pont-Hébert","commune":"ST-Fromond","nom":"ST_Fromond","type":"Vestiges","periode":"XIII-XIV-XV","histoire":"RIVIERE, situé  sur la rivière de Vire, le \"château de la Rivière de Montenay, aux douves et fossés , dépendait de la demi-baronnie de l'Honneur du Hommet-la-Rivière, dont le chef était assis au Hommet et qui fut érigée en comté par lettres de février 1651. De cette demi-baronnie, jadis unie à l'autre moitié, et annexée à la connétablie de Normandie, dont les du Hommet furent, pendant plusieurs générations, titulaires, relevaient immédiatement les fiefs nobles de Saint-Fromond, la Motte-d'Airel, Amigny, le Mesnil-Véneron, Cavigny, Moon-en-Bessin, Blagny, Saint-Pierre-d'Arthenay, Soulle-Arthenay, Soulle, la Rocque, Fierville, le Chastel, Thère, Maubec, le Campgrain et Langlet. Le premier seigneur de la Rivière dont le nom soit parvenu jusqu'à nous est Geoffroy de Montenay, qui vivait à la fin du XIIIe siècle. Grâce aux Archives de la Manche, nous savons qu'en 1285, Gaufridus de Monteneio, dominus de Riparia Sancti Fromondi, promit aux religieux du prieuré, l'assiette, sur son fief, de vingt sols tournois de rente, en récompense des oblations de la chapelle qu'il devait construire dans son manoir. Ce château, s'il était fortifié au XIIIe siècle, avait cessé de l'être, car, en juin 1400, autorisation fut donnée par Charles VI à Isabeau de Meulent, dame de Thieuville, possédant, en sa terre et baronnie du Hommet, un hostel appelé l'hostel de la Rivière, lequel est assis en belle (cour) et notable d'ancienneté, de faire fortifier ledit hostel et mettre en tel estat qu'il soit et puisse estre deffensable, et estre gardé et emparé en temps de guerre. Ce fief de la Rivière demeura dans la même famille jusqu'en 1462, époque à laquelle Jean de Montenay se vit contraint de s'en dessaisir. Il fut acheté par Christophe de Cerisay, seigneur de Vesly.","architecture":"RIVIERE; son fils et héritier, Guillaume de Cerisay, écuyer, secrétaire du roi, naquit à Carentan, et Toustain de Billy le met au rang des hommes remarquables originaires de cette ville,  En 1473, le Roi Louis XI, par lettres patentes données à Melun au mois de novembre, lui accorda haute justice en sa baronnie du Hommet, avec pouvoir de commettre des officiers, un lieutenant, un vicomte, un tabellion et autres\". C'est lui, croyons-nous, qui fit construire le château actuel de la Rivière, commencé peut-être par son père. Il fit également construire le chur de l'église de Vesly, dont il était seigneur. Carentan lui doit aussi son église que les guerres et le temps avaient ruinée. Une ruine, subitement se dresse au tournant d'un sentier; deux tours massives flanquant une porte cochère, large et cintrée, accompagnée de sa poterne et surmontée d'une haute fenêtre à meneaux de pierre; des pans de remparts dominant des fossés à demi comblés, et dans un angle, un colombier, en forme de donjon trapu, étalant sa masse de pierre grise, envahie de lierre. En entrant dans la cour, on voit une ferme à tuiles rouges adossée aux vieux murs d'enceinte, et les restes d'un élégant manoir de la fin du quinzième siècle. Les fenêtres, sculptées de minces nervures, ont, pour vitraux, les nuages; des escaliers en vrille, taillés dans l'épaisseur des murs, s'élancent, éperdus, pour n'aboutir à rien, et une fluette tourelle, largement éventrée, laisse entrevoir, au travers de son épais rideau de verdure, une plate-forme crénelée, maintenant séparée du monde par l'éboulement de l'escalier. Une vingtaine de marches conduisent à ce qui fut le premier étage; toute une végétation vivace, semée par les vents du ciel, y pousse à l'aventure, et fait de ce coin de la ruine une sorte de jardin suspendu. le château appartient à des propriétaires anglais.","habitants":"Geoffroy de Montenay\r\n        \"","divers":"Château de la Rivière à St-Fromond \r\ngps 49° 14' 42\" N, 1° 06' 56\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_St_Fromond_1.jpg","../../jctruffet.com/image/image_50/50_St_Fromond_2.jpg","../../jctruffet.com/image/image_50/50_St_Fromond_3.jpg","../../jctruffet.com/image/image_50/50_St_Fromond_4.jpg"]},"Consult_chateau_formulaire512b-2":{"id":"Consult_chateau_formulaire512b-2","dept":"50","canton":"Agon-Coutainville","commune":"Saint-Germain sur Sèvres","nom":"St_Germain_Sèvres","type":"Vestiges","periode":"XIII-","histoire":"St-GERMAIN-sur Sèvres dit aussi le Vicomte.  La famille de Costentin de Tourville, a possédé le domaine et le château de Saint-Germain. Jean-Baptiste-César de Costentin, comte de Tourville, et neveu de l'amiral, épousa Charlotte-Renée de Camprond de Saint-Germain. Le château de Saint-Germain passa dans la famille du Mesnildot, par le mariage de l'un de ses membres avec la fille de Renée-Charlotte de Camprond. Une demoiselle du Mesnildot le porta dans la famille de Vaubadon par son mariage avec Le Tellier de Vaubadon qui, en 1789, était encore seigneur de Saint-Germain-le-Vicomte et de Gourbesville. Madame de Vaubadon l'a vendu à M. de Goulhot dont le fils, M. de Goulhot de Saint-Germain, sénateur, le possède aujourd'hui,","architecture":"St-GERMAIN, le château de Saint-Germain-le-Vicomte a été retouché à différentes époques. On remarque des portes, des fenêtres avec des arcades en accolade, annonçant le XVIe siècle. Les tours ont subi des retouches; deux placées en encorbellement, se terminent par un toit conique couronné de deux personnages, Adam et Eve, qui font office d'épi. entouré de douves en eau, en brique et pierre, implanté en bordure du marais de la Sèvre, a perdu les deux tiers de son déploiement initial. Desservi par un châtelet (disparu), l'édifice, de plan régulier en U, se déployait sur trois des côtés de la parcelle qu'il protégeait, le côté nord étant naturellement défendu par les marais. Au sud-ouest, bien que partiellement ruinée, la tour hexagonale est la seule encore présente sur les trois qui cantonnaient les angles extérieurs de l'édifice. Au sud-est, lui répondent les vestiges du corps de logis, dont le rez-de-chaussée appareillé en pierre de taille contraste avec la brique des étages supérieurs. Si l'étroitesse et la sobriété sont de mise pour les ouvertures du rez-de-chaussée, marquant ainsi l'aspect encore défensif de la bâtisse, les ouvertures des étages sont plus larges et reçoivent des moulurations plus riches. De la chapelle, de plan rectangulaire, ne subsistent que les murs en petit appareil de grès rose.  Éléments protégés MH : les restes du château : inscription par arrêté du 13 décembre 1950.","habitants":"famille du Mesnildot\r\n        \r\n        \r\n        \"","divers":"château de  Saint-Germain sur Sèvres                                                                          Gps  49° 13' 54\" N, 1° 21' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_St_Germain_S%c3%a8vres_1.jpg","../../jctruffet.com/image/image_50/50_St_Germain_S%c3%a8vres_2.jpg","../../jctruffet.com/image/image_50/50_St_Germain_S%c3%a8vres_3.jpg","../../jctruffet.com/image/image_50/50_St_Germain_S%c3%a8vres_4.jpg","../../jctruffet.com/image/image_50/50_St_Germain_S%c3%a8vres_5.jpg"]},"Consult_chateau_formulaire52e9":{"id":"Consult_chateau_formulaire52e9","dept":"50","canton":"Valognes","commune":"Saint Germain de Tournebut","nom":"St_Germain_Tournebut","type":"Château","periode":"XV-","histoire":"BRISETTE, le château de la Brisette appartient depuis lors à cette même famille  depuis plus de 200 ans.  Le château de la Brisette est une propriété du XVIIIe siècle, elle est composée d'une façade principale qui se reflète dans son étang. Sur les cotés deux pavillons en légère avancée et sur l'arrière les anciennes écuries. Il fût acquis par le comte du Trésor en 1774 et le légat à sa fille qui épousa Amédée Bertin de la Hautière, depuis les propriétaires portent toujours ce nom..","architecture":"BRISETTE, le château de la Brisette appartient depuis lors à cette même famille  depuis plus de 200 ans, C'est un château remarquable car il possède une façade identique à l'avant et à l'arrière. Ses caves ne sont visibles que de l'arrière puisqu'elles sont enterrées côté jardin. Il était autrefois entouré d'un bois, aujourd'hui disparu.  Autour d'un environnement boisé offrant de belles promenades autour des étangs, l'orangerie à disposition pour vos réceptions. est une demeure, du XVIIIe siècle, qui se dresse, dans le Cotentin, sur la commune de Saint-Germain-de-Tournebut  fait lobjet dune inscription partielle au titre des monuments historiques par arrêté du 16 avril 1975. Seules les façades et toitures du château, des communs et de la chapelle sont protégées. Éléments protégés MH : les façades et les toitures du château, des communs et de la chapelle : inscription par arrêté du 16 avril 1975.                                                                              TORNEBUT, le château est un exemple de grande exploitation agricole de l'ancien Régime. Il existait déjà en 1248 et a appartenu à plusieurs générations de familles nobles. Cette ferme manoir remonte au XIIIe siècle avec des bâtiments du XVIe siècle et XVIIIe siècle qui encadrent une cour carrée et un jardin intérieur. Elle fut la demeure du Général Baron Baillod au Ier Empire. Visite de la cour et du moulin à pomme, cèdre du Liban remarquable. Actuellement le bâtiment est en mauvais état, bien que les nouveaux propriétaires souhaitent lui redonner ses lettres de noblesse.","habitants":"Amédée Bertin de la Hautière                                                 Tournebut; Général Baron Baillod\r\n        \"","divers":"à  Saint Germain de Tournebut; Brisette GPS : 49° 31' 18\" Nord, 1° 23' 34\" Ouest","gps":"49° 31' 18\" Nord, 1° 23' 34\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Germain_Tournebut_1.jpg","../../jctruffet.com/image/image_50/50_St_Germain_Tournebut_2.jpg"]},"Consult_chateau_formulaire142f":{"id":"Consult_chateau_formulaire142f","dept":"50","canton":"Saint-Hilaire-du-Harcouët","commune":"St Hilaire du Harcouet","nom":"St_Hilaire_Harcouet","type":"Château","periode":"XVI","histoire":"Trois châteaux dans cet article; Jardin,  la Chaize et Parigny.                                                                                          St-HILAIRE,  en 1450 les soldats de Charles VII reprennent la place et la restituent aux derniers propriétaires. Au début du XVIIe siècle le château est vendu à Jean de Poillé  (mort en 1625 ou 1626). Les derniers Poillé font restaurer le château au début XVIIIe siècle : « sa façade avait été revêtue sur tout son développement d'une nouvelle armure à grand appareil d'un granit brun-roux qui lui donnait un aspect sombre et sévère. Sa porte principale, haute de dix pieds a été transportée et se voit encore à l'entrée du cimetière communal. À chacun de ses angles, quatre tours rappelaient l'ancienne forteresse. Celles du couchant avaient une physionomie imposante, tandis que celles du levant étaient plutôt des tourelles d'ornement.»  Charles-Marie du Bourblanc d'Apreville (1766-1839) est le dernier seigneur de Saint-Hilaire, mais il réside surtout dans son château de Saint-Symphorien-des-Monts. Après la Révolution, le château est loué à la commune qui y installe la mairie et le collège.\r\nAu XIXe siècle, les héritiers de Charles-Marie du Bourblanc d'Apreville, des cousins, vendent le château à Abel Cahour, marchand de biens ;  en 1863, on démolit les derniers pans de murs du château par mesure de sécurité.La porte monumentale du château est déplacée à l'entrée du nouveau cimetière construit en 1821 rue de Paris.                                                                                             Et à un K.M. au nord à PARIGNY,   Joli manoir dont les parties les plus anciennes datent du XVIe siècle, le corps de bâtiment central datant du XVIIIe siècle. Les communs, les façades, le pigeonnier, l'escalier (date de Henri IV), les salons offrent le plus d'intérêt. Éléments protégés MH : les façades et les toitures ; l'escalier avec sa rampe à balustres en bois ; le salon ; la salle de billard au rez-de-chaussée avec leur décor et le colombier : inscription par arrêté du 26 avril 1976.","architecture":"La CHAIZE, les Loges Marchis à quatre K.M. de  Saint-Hilaire d'Harcouêt  le manoir et la chapelle présentent des proportions et une architecture caractéristique de la région du sud de la Manche. Une forteresse fut construite à cet emplacement sous les premiers ducs de Normandie afin de défendre le val d'Airon contre les Bretons et la Manceaux. Cette position était entourée d'eau de trois côtés. Sur le quatrième côté existaient des défenses accessoires dont les douves sont encore visibles. Le manoir fut reconstruit à la fin du XVe siècle. Une chapelle Renaissance fut édifiée à cette date et reliée au manoir par un mur de défense qui fut démantelé sous Richelieu. Le manoir actuel résulte d'une restauration entreprise de 1817 à 1824 et ne garde plus du XVIe siècle qu'une tour d'escalier et l'amorce d'un bâtiment modernisé sous la restauration. La tour polygonale à la base, passe au plan carré par l'intermédiaire de deux culs de lampe. Éléments protégés MH : les façades et les toitures du manoir, du corps de garde et des communs ; la chapelle : inscription par arrêté du 28 février 1978.                                                                                          JARDIN, le manoir a été construit dans la deuxième moitié du XVIe siècle et la chapelle fut élevée au XVIIIe siècle. Les façades et les toitures du manoir du Jardin et de sa chapelle sont inscrits par arrêté du 27 décembre 1974. Les glycines s'étirent du haut en bas des remparts, caressant les eaux des douves qui encerclent la vieille demeure. Un lieu remarquable mais dont la tranquillité est menacée par le projet de contournement sud-ouest de Saint-Hilaire-du-Harcouët. Le tracé, retenu par les services du Conseil général, passe au nord de la propriété de l'Ange et transgresse le périmètre de protection de 500 mètres par les Monuments Historiques. Une association a vue le jour pour la mise en valeur et la préservation du Manoir du Jardin et de son parc paysager.Éléments protégés MH : les façades et les toitures du manoir et de sa chapelle.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Trois châteaux à st Hilaire grav-7; Jardin grav -5-6,  la Chaize grav -1  et Parigny grav-2-3-4.  gps 48° 34' 42\" nord, 1° 05' 27\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_St_Hilaire_Harcou%c3%abt_1.jpg","../../jctruffet.com/image/image_50/50_St_Hilaire_Harcou%c3%abt_2.jpg","../../jctruffet.com/image/image_50/50_St_Hilaire_Harcou%c3%abt_3.jpg","../../jctruffet.com/image/image_50/50_St_Hilaire_Harcou%c3%abt_4.jpg","../../jctruffet.com/image/image_50/50_St_Hilaire_Harcou%c3%abt_5.jpg","../../jctruffet.com/image/image_50/50_St_Hilaire_Harcou%c3%abt_6.jpg"]},"Consult_chateau_formulairee085":{"id":"Consult_chateau_formulairee085","dept":"50","canton":"Saint-Hilaire-du-Harcouët","commune":"Saint-James","nom":"St_James","type":"Château","periode":"XVIII-XIX","histoire":"deux châteaux à dans cet article ; Paluelle et l'hôtel de ville de st-James.                                                                                                    PALUELLE, le dernier des marquis de La Paluelle s'éteignit au XVIIe siècle; transmis par héritage depuis quatre siècles,le château appartenait jusqu'au milieu du XXe siècle au marquis de Belloy de Saint-Liénard et à Mme Blandin de Chalain.  Jacques Michel de Carbonel, chevalier, marquis de Canisy, seigneur de La Paluelle, Guéhébert, présentateur du prieuré de la Rouelle et curé de Guéhébert, adresse un mémoire pour Pierre Sudaine, abbé de l'abbaye Sainte-Geneviève de Paris, contre Pierre Paul Mordant d'Héricourt, chanoine régulier de la Congrégation de France, concernant la vacance du prieuré de la Rouelle et la cure de Saint-Sulpice de Guéhébert. M. et Mme Saliot, père et fils. Jean-Christophe de La Haye Saint-Hilaire et son épouse Constance Milstein, organisateurs d'un concours de saut d'obstacles en septembre sur le domaine de La Paluelle et restaurateurs de ce château pendant cinq ans. Le château appartenait jusqu'au milieu du XXe siècle au marquis de Belloy de Saint-Liénard et à Mme Blandin de Chalain. Aujourd'hui le domaine est la propriété du comte Jean Christophe de La Haye Saint Hilaire, qui a réalisé pendant cinq années une restauration hors norme, et il est allé chiner dans 17 pays à la recherche de meubles uniques, de perles rares pour meubler et décorer les intérieurs de la demeure. Grâce à lui, chaque année est organisé un des plus beaux concours équestres de la région. Il appartient aujourd'hui à un descendant de la famille La Haye-Saint-Hilaire dont le berceau est situé à Saint-Hilaire-des-Landes.","architecture":"PALUELLE,  le château de la Paluelle, avec des terrasses bordées de balustres, comprend une suite de bâtiments dont un pavillon daté de 1632, l'aile gauche remonte à Louis XI. A l'arrière du château, un très beau parc et un perron avec escalier à double révolution.  Château de Paluelle date du XVe au XVIIe siècle, domine la vallée du Beuvron, qui serpente à ses pieds. Le château de La Paluelle possède un immense parc remarquable où se déroule un jumping renommé, et son parc. Les façades, les toitures du château, de ses communs, la cour d'honneur en terrasse et le parc sont inscrits aux M.H.  inscription par arrêté du 30 janvier 1967.                                                                                                                     Hôtel de ville de St-JASMES,  est en pleine restructuration depuis 2019. Cette ancienne demeure fut la résidence dHippolyte Morel, ancien maire de Saint-James et président du conseil général de la Manche pendant trente-quatre ans de 1888 à 1922.","habitants":"Comte Jean Christophe de La Haye Saint Hilaire\r\n        \r\n        \"","divers":"Trois châteaux à dans cet article ; Paluelle grav-2-3      et l'hôtel de ville de st-James  grav-1                                                        GPS : 48° 31' 31,8\" Nord, 1° 18' 55,43\" Ouest","gps":"48° 31' 31,8\" Nord, 1° 18' 55,43\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_James_1.jpg","../../jctruffet.com/image/image_50/50_St_James_2.jpg","../../jctruffet.com/image/image_50/50_St_James_3.jpg"]},"Consult_chateau_formulairee855":{"id":"Consult_chateau_formulairee855","dept":"50","canton":"Saint-Lô","commune":"Saint-Lö","nom":"St_Lo","type":"Vestiges-Forteresse","periode":"XIV-XV-XVI","histoire":"Cinq châteaux à St-Lô; dont st-Lô, Bosdel, Bois-Marcel, Vaucelle et Couespellière.                                                                                             BOSDEL, les premiers propriétaires connus du manoir de Bosdel sont Thomas Jourdain et Jean de Conteville au début du XIVe siècle qui jouèrent un rôle important dans la cité. Passé par mariage aux Gourfaleur de Bonfossé, le manoir fut vendu en 1583 à Ponthus Vincent, sieur de la seigneurie, constructeur de la partie XVIe siècle qui est lexploitation agricole. La propriété passa en 1633 aux Vaultier, officiers de justice, puis en 1681, par mariage, à Nicolas Henry, sieur de la Beaumerie, bienfaiteur de lhôtel-Dieu et commanditaire de la partie moderne à la fin du XVIIe siècle. En 1744, Marie-Anne Henry du Bôdel épouse Antoine Vieillard de Boismartin, brillant avocat au Conseil supérieur de Bayeux, maire de Saint-Lô. Son descendant, lavocat Huet, restaura le manoir, au milieu du XIXe siècle qui passa par la suite par héritage dans la famille Vaugrente.                                                                                                    SAINT-LO, . On attribue à Charlemagne, lors de sa venue dans la région en l'An 800, les premières fortifications pour protéger la ville des invasions normandes. Les remparts de bois furent remplacés par d'épaisses murailles de pierre ne protégeant pas toujours l'enclos lors de nombreux sièges et batailles, en particulier au XVIe siècle. La tour des Beaux-Regards domine le flanc le plus escarpé du Rocher. Elle offre de son sommet un vaste panorama de la Vire et de ses quartiers riverains. La tour de la Poudrière, seul vestige subsistant de la citadelle, présente encore l'amorce du mur très épais qui fermait l'enclos du côté du Neufbourg.Éléments protégés MH : les vestiges des remparts : inscription par arrêté du 12 décembre 1945. La poterne : inscription par arrêté du 22 octobre 1937, propriété de la commune.","architecture":"BOIS-MARCEL, construit en 1609 dans l'esprit de la Renaissance, le manoir de Bois-Marcel est un petit bijou architectural.  flanqué de deux tourelles en encorbellement; à l'arrière, une tour carrée contient l'escalier. Il appartenait au milieu du XXe siècle à M. et Mme Regnault. Et malgré les bombardements de 1944 qui ne l'ont pas épargné, il est encore aujourd'hui un formidable témoignage du compromis architectural entre classicisme et gothique. Le corps de logis rectangulaire flanqué de deux tourelles en encorbellement abrite aujourd'hui une collection de mobiliers accumulés par l'ancien propriétaire, Raymond Regnault, ancien président de la Soci été d'Archéologie de la Manche et spécialiste du XVIe siècle, décédé en 1966.                                                                                                     VAUCELLE   L'édification du château de La Vaucelle, qui fut une splendide habitation, fut exécutée par la famille Boucard, au XVe siècle. Pierre Boucard, sieur du Mesnil-Amey et Richard Boucard, sieur de La Vaucelle, furent reconnus nobles par Raymond Montfort, en 1463 ces deux seigneurs, qui étaient fort riches, eurent encore un autre frère, Jean Boucard, évêque d'Avranches, de 1453 à 1484. Ce fut positivement ce prélat qui bâtit, orna et dota la chapelle très connue de La Vaucelle, dédiée à Sainte Pétronille, pour la quelle les populations avaient une dévotion toute particulière. Jean Boucard fit sa résidence à La Vaucelle, qui fut un très beau palais épiscopal. Il est très admissible dès lors que Charles IX ait pu, avec sa mère, la reine Catherine de Médicis, occuper au château de La Vaucelle une pièce que l'on y désignait, paraît-il, sous le nom de Chambre du Roi. Éléments protégés MH : le pigeonnier et le mur à créneaux nord : inscription par arrêté du 11 juillet 1975.                                                       COUESPELLIERE   au nord -Est de st lo à Cerisy la Forêt , construction du château de la Couespellière date du XVIe au XIXe siècle.","habitants":"Bosdel, Marie-Anne Henry du Bôdel                                     ST-Lo: Charlemagne                                                                      Bois-Marcel; famille Régnault                                    Vaucelle; famille Boucard\r\n        \"","divers":"Cinq châteaux à St-Lô; dont St-Lô remparts citadelle Grav 1-2-3-4, Bosdel, Bois-Marcel grav 5, Vaucelle grav 6-7 et Couespellière.GPS : 49° 11' 42\" Nord, 0° 56' 12\" Ouest                                                                                      Vaucelle  GPS : 49° 06' 41\" Nord, 1° 06' 26\" Ouest","gps":"49° 11' 42\" Nord, 0° 56' 12\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_L%c3%b4_1.jpg","../../jctruffet.com/image/image_50/50_St_L%c3%b4_2.jpg","../../jctruffet.com/image/image_50/50_St_L%c3%b4_3.jpg","../../jctruffet.com/image/image_50/50_St_L%c3%b4_4.jpg","../../jctruffet.com/image/image_50/50_St_L%c3%b4_5.jpg","../../jctruffet.com/image/image_50/50_St_L%c3%b4_6.jpg","../../jctruffet.com/image/image_50/50_St_L%c3%b4_7.jpg"]},"Consult_chateau_formulaire61b8":{"id":"Consult_chateau_formulaire61b8","dept":"50","canton":"Agon-Coutainville","commune":"St-Malo de la Lande","nom":"St_Malo_de _la_Lande","type":"Château","periode":"XV-XVI-XVIII","histoire":"St-MALO de-la-Lande,   le fief de Saint-Malo, avec extension sur le Homméel, Blainville, Linverville et Gonneville, appartenait à Guillaume de Bordes, seigneur du lieu. Il y avait aussi trois moulins, deux à blé et un autre à foulon pour serges et draps. Tous les trois appartenaient à Guillaume de Bordes. La famille de Bordes était noble par quatre degrés. Le corps de bâtiment remonterait aux XVe et XVIe siècles. Il a subi diverses transformations au cours des XVIIe, XVIIIe et XIXe siècles, dont un remaniement complet de ses plans de circulation au XVIIe siècle. Un escalier en vis subsiste sur l'élévation postérieure. Au XVIIe siècle, un nouvel escalier en bois, à jour carré aéré est construit. La salle des gardes a conservé sa cheminée, sa crédence, ses ouvertures et ses éléments peints.","architecture":"St-MALO  de plan en équerre à deux niveaux  sur soubassements toits en croupes en ardoises. Éléments protégés MH : les façades et les toitures du manoir ; la salle des gardes avec son aménagement intérieur ; le colombier ; les haies talutés : inscription par arrêté du 1er septembre 2004.","habitants":"famille de Bordes\r\n        \r\n        \"","divers":"Château de Saint-Malo de la Lande gps 49° 04' 15\" nord, 1° 32' 25\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_St_Malo_de_la_Lande_1.jpg","../../jctruffet.com/image/image_50/50_St_Malo_de_la_Lande_2.jpg","../../jctruffet.com/image/image_50/50_St_Malo_de_la_Lande_3.jpg"]},"Consult_chateau_formulaireeb6b":{"id":"Consult_chateau_formulaireeb6b","dept":"50","canton":"Pont-Hébert","commune":"Le Dézert","nom":"St_Ortaire","type":"Manoir","periode":"XV-XVI-XVII","histoire":"St-ORTAIRE, Guillaume de La Mare (1451-1525), à qui on attribue  la reconstruction du manoir « sa formation humaniste,  avec Geoffroy Herbert  expliqueraient alors la qualité architecturale de lédifice et spécialement celle des cheminées », Charles Fierville précise que Guillaume de la Mare faisait partie de la chancellerie du Roi Charles VIII, « qui l'aimait beaucoup à cause de son talent poétique et de l'habileté avec laquelle il écrivait »  attestent de ses liens avec la cour de France. La propriété est vendue en 1614 à Michel Martin, riche drapier de Saint-Lô, dont les héritiers vendront le bien en 1654 pour le racheter 3 ans plus tard); on peut lire sur lacte de vente une description de la propriété : le manoir, consistant en maison manable, pressoir, grange et étables. Suit une longue liste de pièces de terre. Le manoir deviendra propriété, entre autres, de Armand-Jérôme Bignon, bibliothécaire du roi Louis XV et Jérome-Joseph-Marie Grimaldi de Monaco. La mise à disposition récente  du plan Napoléonien de 1823, permet de confirmer la présence dune double enceinte protégeant lensemble. À savoir : un premier mur de protection encerclant la face Nord du manoir et la chapelle, appuyée par une tour à son Nord-Ouest (aujourdhui disparue). Cette cour était accessible par un double portail dentrée à lEst de la chapelle. Une deuxième enceinte était formée au Nord par des hauts talus et au Sud par un fossé toujours existant, « la Lime de St Ortaire ». Il est à noter la disparition dune autre tour (de plan carré) accolée sur la face Nord du manoir.","architecture":"St-ORTAIRE, remontent au début du XVIe siècle. La chapelle, qui fut remaniée au XVIIe siècle, était le lieu d'une dévotion populaire consacrée à Saint-Ortaire. Le manoir Saint-Ortaire, avec sa salle basse double en élévation et la salle haute, permet de comprendre l'organisation d'un logis seigneurial de la fin du Moyen-Age et du début de la Renaissance dans la Manche. Il est restauré par la dynamique déléguée des V.M.F. pour la Manche, Madame Sinikka Gallois et son époux. « Le corps de logis principal est constitué dune vaste salle centrale, lun des rares exemples dédifice à salle basse double en élévation (4,95 m) conservé pratiquement intact . ».On y accède directement de lextérieur par une grande porte surmontée dun linteau en double accolade. Une superbe cheminée monumentale en pierre rouge locale se situe sur le mur pignon Est, flanquée à droite par un escalier tournant menant à la chambre dentresol, muni dun judas, qui surmonte un cellier demi enterré.  Dans langle sud-ouest de la grande salle centrale, une belle porte à linteau en accolade conduit à l'ancienne cuisine. Une porte située en face de la porte dentrée principale donne accès à un bel escalier en vis logé dans une tour polygonale adossée à la façade postérieure. lédifice et spécialement celle des cheminées ». « La présence en façade dun écu très érodé sur lequel se devine le tracé dune croix constitue, un critère fiable dattribution de la construction à un membre de la famille de La Mare.  Les carreaux à fleur de lys retrouvés dans une des chambres contemporaine de cette période.   La qualité de lensemble ainsi que son intérêt historique ont permis son inscription aux M.H. le 25 juin 2004. La restauration du manoir et de la chapelle, débutant en 2002, a été primée par les Vieilles Maisons Françaises, le conseil général de la Manche, la Fondation Langlois, et la Fondation du patrimoine.","habitants":"Famille de Guillaume de la Mare et  Jérome-Joseph-Marie Grimaldi de Monaco \r\n        \"","divers":"Manoir de St-Ortaire à le Dézert\r\nGps 49° 11' 38\" N, 1° 10' 21\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_St_Ortaire_1.jpg","../../jctruffet.com/image/image_50/50_St_Ortaire_2.jpg","../../jctruffet.com/image/image_50/50_St_Ortaire_3.jpg"]},"Consult_chateau_formulaire880a":{"id":"Consult_chateau_formulaire880a","dept":"50","canton":"Pont-Hébert","commune":"St_Pierre de Sémilly","nom":"St_Pierre_de_Sémilly","type":"Château","periode":"XVI-XVII","histoire":"ST-PIERRE-SEMILLY,  la forteresse demeure possession anglaise dans les mains du Roi qui en confie la garde à des hommes de confiance. Henri 1er Beauclerc, Henri II et Richard-Cur-de-Lion y effectuent plusieurs séjours. Revenue à la couronne de France en 1204, la châtellenie est concédée par Saint-Louis à Richard de Parfouru en 1259, à titre de ferme perpétuelle. Une de ses petites filles épouse en 1330 le chevalier Jean III de Mathan, faisant entrer le domaine dans cette famille qui le conservera tout au long de lhistoire. Devenue inutile après la guerre de cent ans, la forteresse est rasée et un nouveau manoir seigneurial est construit à peu de distance sur le rempart nord du village. Cest Georges 1er de Mathan (1528-1592), gouverneur de la ville et du château de Saint-Lô qui fait construire le château actuel. A la fin du XVIIe siècle, à la famille de  Louis de Mathan,  Au milieu du XVIIIe siècle, son fils, Bernardin de Mathan effectue les mêmes travaux sur lavenue sud, lavenue du cadet et lavenue nord. Au XIXe siècle, Georges de Mathan transforme lespace de lancien château médiéval en parc avec une promenade autour des étangs et remplace les ormes des avenues par des hêtres. Les tempêtes de 1987 et de 1999 mettent à mal les plantations dalignements couchant les vieux hêtres des avenue.Éléments protégés MH : le château en totalité : inscription par arrêté du 19 décembre 1944. propriété du marquis de Mathan.","architecture":"ST-PIERRE SEMILLY,  Sur une éminence dominant le gué, un vaste ovale protégé par des levées de terre et des fossés abrite une basse-cour et lenceinte dun donjon. La place puissante est conçue pour représenter le pouvoir ducal puis royal anglais. Les étangs sont  créés à cette époque avec la construction dune digue-chaussée sur lancien gué. Ils participent à la défense du château et servent de viviers pour les habitants du lieu. A louest de la forteresse, le bourg, protégé par une seconde enceinte, se développe autour de léglise. entouré de murs, le château domine le village. Son imposant pavillon dentrée, percé de portes charretière et piétonne, est coiffé dune haute toiture en ardoise à quatre pans. Au fond de la cour, le logis principal regarde vers le sud où les ruines du donjon sont cachées par la végétation. Cette demeure du XVIe siècle est une construction élégante et massive qui sélève sur un entresol et deux étages. Dans laxe de la façade, un escalier monte vers une terrasse à balustrade qui court sur toute la longueur. La toiture pentue est découpée de hautes lucarnes à fronton et de puissantes souches de cheminées. En retour vers la route, laile des communs ferme la cour dhonneur, ornée de parterre de gazon. Au nord du château, une prairie, un verger de pommiers et une terrasse érigée sur lancien rempart, sétendent à lintérieur des murs. Tout le nord du site est occupé par des prairies qui sétendent jusquaux remparts du village, aujourdhui cachés par un bois touffu. A louest du château, une grande ferme à cour carrée étire ses bâtiments jusquà léglise, petit édifice à clocher carré et nef unique à la magnifique façade sud romane. En dessous, les maisons du bourg sétagent sur les pentes, vers les étangs, en toile de fond, lancien rempart boisé entoure le village.","habitants":"Famille de Louis de Mathan\r\n        \r\n        \"","divers":"Château de Saint-Pierre de Sémilly. GPS : 49° 07' 15,82\" Nord, 1° 00' 13,03\" Ouest","gps":"49° 07' 15,82\" Nord, 1° 00' 13,03\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Pierre_S%c3%a9milly_1.jpg","../../jctruffet.com/image/image_50/50_St_Pierre_S%c3%a9milly_2.jpg","../../jctruffet.com/image/image_50/50_St_Pierre_S%c3%a9milly_3.jpg"]},"Consult_chateau_formulaire184d":{"id":"Consult_chateau_formulaire184d","dept":"50","canton":"Val-de-Saire","commune":"Saint-Pierre l","nom":"St_Pierre_Eglise","type":"Manoir-Château","periode":"XVI-XIX","histoire":"Trois châteaux à St-Pierre l'Eglise dont celui de St-Pierre, de Fontenay et celui  d'Imbranville.                                                                ST PIERRE L'EGLISE, au début du XVIe siècle, les Clamorgan possédaient une \"forte maison\" à pont-levis à l'emplacement de la pièce d'eau près de l'église. Vendue en 1566 au sieur Richard Castel de Rauville, sa descendance eut à affronter, pendant la dernière Guerre de Religion, Jean De Raffoville, seigneur de Denneville et ardent bagarreur. La maison-forte fut incendiée et l'incendiaire fut condamné par le Parlement de Normandie à verser 6000 écus, qui permirent de construire un manoir à l'emplacement des actuels communs du château. Erigé en baronnie par Anne d'Autriche en 1644, le domaine vit naître Charles-Irénée Castel, abbé de Saint Pierre Eglise. Le château actuel est élevé au milieu du XVIIIe siècle sur un sous-sol vouté et comprend un rez-de-chaussée éclairé par de hautes baies vitrées séparé de son étage par un long linéament de pierre. Le corps de logis, légèrement saillant et surmonté d'un fronton sculpté, est bordé par deux pavillons. Ce vaste bâtiment d'habitation est entouré d'un parc de 56 ha planté de hêtres et ceint de hauts murs. Le domaine est une propriété privée. Mme Chantal de Blangy, Éléments protégés MH : le château : inscription par arrêté du 6 janvier 1930. Le portail d'entrée ; les façades et les toitures des deux pavillons d'entrée ;  inscription par arrêté du 28 septembre 1970.                                                                                            FONTENAY à Clitourps à quelques K.M. au sud-Est. La construction du Manoir de Fontenay date du XVIe au XVIIe siècle. Ce manoir est représentatif des manoirs fortifiés du XVIe siècle en Val de Saire. Le Manoir de Fontenay est inscrit partiellement aux M.H.","architecture":"IMBRANVILLE  à la pointe de Barfleur à Gatteville le Phare, date de   1853. est devenu une colonie de vacances. La légende raconte : en 1720 très exactement, qu'une belle marquise avait un fils à marier. La Marquise d'Aigneaux lui fit rencontrer tous les plus beaux partis de la région. Hélàs, le jeune marquis restait de glace. Aucune des demoiselles que lui présentait sa chère mère ne trouvait grâce à ses yeux. Par un beau mois de juillet le jeune et beau Marquis d'Aigneaux s'éclipse pour les vacances dans un petit manoir que sa mère avait fait construire dans le Val de Saire, prés du petit village de Gatteville-Phare. Un beau jour, ou était-ce une nuit, peut-être à l'heure où blanchit la campagne, notre jeune garçon se retrouva soudainement face à face avec la plus délicieuse des jeunes filles, une jeune roturière. Et cest là que lhistoire rejoint les légendes de Tristan et Iseult ou de Roméo et Juliette. En effet, sa mère ne pouvant se résoudre à ce que son fils épouse une roturière, fit tout ce qui était possible pour séparer les amoureux. Alors, de colère, la marquise d'Aigneaux, renia son fils, le déshérita et le bannit de ses terres. Aigrie et ridée par les aléas de la vie, elle fit don du manoir au Roi. Mais son fils ne pouvait le supporter. Dans la défiance quil manifestait à sa mère, il lui devenait indispensable de le racheter. Ce quil fit au prix fort ! Mais il en fut ruiné ! Le manoir va traverser ensuite les siècles sans encombres, épousant les soubresauts de lHistoire de France et devenir la magnifique propriété que l'on connaît aujourd'hui! En 1952, il était dans un bien piètre état lorsque la ville d'Equeurdreville, à la recherche d'un lieu pour organiser des colonies de vacances pour les enfants, décide de lacheter.","habitants":"Seigneurs locaux\r\n        \"","divers":"Trois châteaux à St-Pierre l'Eglise dont celui de St-Pierre grav-1-2, de Fontenay grav -3 et celui  d'Imbranville grav-4.                  Fontenay GPS : 49° 39' 21\" Nord, 1° 22' 16\" Ouest                                                 Imbranville  GPS : 49° 41' 10\" Nord, 1° 17' 01\" Ouest","gps":"49° 39' 21\" Nord, 1° 22' 16\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Pierre_Eglise_1.jpg","../../jctruffet.com/image/image_50/50_St_Pierre_Eglise_2.jpg","../../jctruffet.com/image/image_50/50_St_Pierre_Eglise_3.jpg","../../jctruffet.com/image/image_50/50_St_Pierre_Eglise_4.jpg"]},"Consult_chateau_formulaire1777":{"id":"Consult_chateau_formulaire1777","dept":"50","canton":"Villedieu-les-Poêles","commune":"Saint-Pois","nom":"St_Pois","type":"Château","periode":"XVIII","histoire":"SAINT-POIS,  sous les ducs de Normandie, les Servain possédaient la seigneurie de Saint-Pois. C'est d'eux que vient la dénomination de Saint-Pois ou Saint Pair le Servain, constamment donnée à la paroisse dans les anciens titres. Richard Servain est cité sur la liste des seigneurs du comté qui jurèrent fidélité à Philippe-Auguste. En 1418, Henri V donna le domaine de Saint Pair le Servain à Henri Wilton. Mais en 1463, il était possédé par Jean d'Auray. Le château actuel a été construit à la fin du XVIIe ou au début du XVIIIe siècle.\r\nÉléments protégés MH : les façades et les toitures, à l'exclusion des bâtiments récents de l'aile sud ; l'escalier avec sa rampe en fer forgé ; le grand salon avec son décor.","architecture":"Château de Saint-Pois est un château bâti à Saint-Bois,  Sa construction au début du XVIIIe siècle. Il est inscrit partiellement aux M.H. depuis le 24/05/1974 pour son escalier, son salon, son élévation, sa rampe d'appui et son décor intérieur. Le château de Saint-Pois appartient à une société civile immobilière. Le château de Saint-Pois est privé, fermé au public. Il existe aussi sur la commune à découvrir : Château de Beaulieu, du XVIIIe, près de l'église de Taillepied et le château du Lude, de style victorien.          St-POIS, deux fermes-manoirs sont sur le territoire communal : la Vieille Cour, du XVe siècle, et la Cour neuve, du XVIe siècle. Le château de Beaulieu, parfois décrit en liaison avec la commune, est aussi sur Saint-Sauveur-le-Vicomte, près de l'église Saint-Jean-Baptiste.  Manoir de la Cour neuve : dans le mur des communs est inséré un petit blason armorié qui figure les armes de la famille Poërier. La porte monumentale de ce manoir du XVIe siècle est surmontée d'armoiries martelées. En 1620, Vercingétorix Poërier, écuyer, seigneur de Taillepied, épouse Françoise Bazan.","habitants":"Famille des Servain\r\n        \"","divers":"Château de Saint-Pois                                                                        GPS : 48° 44' 58\" Nord, 1° 04' 01\" Ouest","gps":"48° 44' 58\" Nord, 1° 04' 01\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Pois_1.jpg","../../jctruffet.com/image/image_50/50_St_Pois_2.jpg","../../jctruffet.com/image/image_50/50_St_Pois_3.jpg"]},"Consult_chateau_formulaire79f5":{"id":"Consult_chateau_formulaire79f5","dept":"50","canton":"Pont-Hébert","commune":"Bérigny","nom":"St_Quentin_Delle","type":"Château","periode":"XIII-XIV","histoire":"ST QUENTIN D'ELLE  Le château primitif de Saint-Quentin-d'Elle a été construit au XIIIe-XIVe siècle, la demeure du XVIIIe siècle appartenant à la famille Levard, est dût au même architecte que le bel hôtel de Beaumont à Valognes et le château de Pont Rilly à Négreville. Pendant la Seconde Guerre Mondiale, une partie des terres galloises des Saint-Quentin accueille l'aérodrome de Thornehill d'où sont  partis des avions le 6 juin 1944 pour libérer la Normandie, et parmi elle, la petite chapelle de Saint-Quentin-d'Elle, transformée en écurie par les Allemands.  Logeant des religieuses de Cherbourg, puis les armées allemandes et américaines, le château ne garde que des marques de rafales comme seules traces de la Seconde Guerre Mondiale. Le château est ensuite abandonné. Peu endommagé pendant la guerre, il tombe en ruines avant dêtre racheté par un industriel ayant des attaches familiales à Bérigny, Michel Levard, en 1974. La demeure est alors restaurée. La restauration sera longue, il n'y a plus de porte ni de fenêtres, les planchers sont détruits, la couverture du toit est très abîmée, les cheminées sont effondrées.","architecture":"ST-QUENTIN D'ELLE, les façades, architecture typique du Bessin, les toitures du château, le hall dentrée et l'escalier avec sa rampe en fer forgé sont inscrits au titre des monuments historiques depuis le 4 mars 1975. Ecurie de Saint-Quentin-d'Elle. Le château compte plusieurs communs. Comme une écurie du XIXe siècle construite pour la chasse à courre, ou l'ancien manoir qui fut l'habitat des familles de Saint-Quentin avant la construction du château actuel. Les façades et les toitures du vieux manoir et des remises, la chapelle et le sol de l'ancien cimetière sont inscrits depuis le 18 mars 1993.\r\nDans le domaine  du château, un long mur de cent mètres s'étend sans vraiment de but. Il ne devait à l'origine qu'être le premier d'un rectangle, représenté sur le cadastre napoléonien, comme un immense potager, qui n'a finalement jamais vu le jour. Le mur du potager inabouti.\r\nDans la chapelle, trône un vitrail à leffigie de Saint-Quentin, en clin dil à une statue en bois du saint, du XVIIIe siècle, désormais dans l'église de Bérigny. Le martyr chrétien du IIIe siècle a donné son nom à deux villages manchois : Saint-Quentin-sur-le-Homme et Saint-Quentin-d'Elle.","habitants":"famille Levard\r\n        \r\n        \r\n        \"","divers":"Château de St_Quentin d'Elle à Bérigny                                                       gps 49° 11' 38?\" N, 1° 10' 21\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_St_Quentin_Delle_1.jpg","../../jctruffet.com/image/image_50/50_St_Quentin_Delle_2.jpg","../../jctruffet.com/image/image_50/50_St_Quentin_Delle_3.jpg"]},"Consult_chateau_formulaire5f4b":{"id":"Consult_chateau_formulaire5f4b","dept":"50","canton":"Agon-Coutainville","commune":"ST-Sauveur Lendelin","nom":"ST_Sauveur_Lendelin","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, le Grand-Taute et Moncuit.      GRAND TAUTE  a été construit à la fin du XVIe siècle par Jean le Coq, officier de justice. Le bâtiment est édifié en schiste grossièrement appareillé. Il comprend un corps de logis rectangulaire avec deux tours d'escaliers, l'une à l'extrême gauche et l'autre à la partie gauche de la façade arrière. Le bâtiment a subit des modification au cours des siècles notamment la création de deux fenêtres modernes à droite au rez-de-chaussée et à l'étage. En façade, on remarque le chevauchement des niveaux : la partie de droite comprend deux niveaux, et celle de gauche trois. Un système défensif protégeait la demeure contre toute intrusion ennemie, (grilles protégeant les soupiraux, trous de fusils, mâchicoulis intérieurs). Les premiers occupants du manoir appartenaient à la famille Petiot. Un Simon Le Petiot, Vicomte de bailliage, subit une sévère réprimande en 1359, car il avait été reçu chevauchant de concert avec une troupe anglaise. Aux XVIIIe et XIXe siècles succédèrent aux Lecoq, les familles Le Breton de Beaucoudray, Tardif de Vauclair et Verdun de la Crenne.\r\nÉléments protégés MH : les façades et les toitures ainsi que le plafond et la cheminée de la grande salle du rez-de-chaussée ; la façade et la toiture ainsi que le mécanisme du pressoir : inscription par arrêté du 11 août 1975. Le logis ; le pressoir ; la boulangerie ; les écuries et la grange ; la pièce d'eau et les douves qui la prolongent ; l'assiette de l'ancien jardin : inscription par arrêté du 4 juin 1993.","architecture":"GRAND TAUTE, construction du manoir du Grand Taute date du XVIe siècle. C'est un manoir du XVIe siècle avec un pressoir ancien, non daté, qui abrite un tour à pommes en granit et une presse à longue étreinte. Les façades et toitures, le plafond et la cheminée de la grande salle du rez-de-chaussée, la façade et toiture ainsi que le mécanisme du pressoir, sont inscrits aux M.H. depuis le 11/08/1975.                                                                                       A cinq K.M. à l'Est à Montcuit le château de MONTCUIT Ce manoir a été construit au XVIe et XVIIe siècle. Les documents mentionnent l'existence du jardin d'agrément dès 1639. Un premier parterre, le jardin d'agrément proprement dit, se développe face à l'élévation postérieure de la maison. La douve Est, plus large, devait faire office de vivier. Un petit pont donne accès au petit parterre servant d'espace de transition entre le grand parterre et l'ancien potager. Un mur en exèdre, percé en son centre par un escalier à sept émarchements, délimite le petit parterre du vaste potager placé en terrasse. Une terrasse plantée de tilleuls permet la promenade à l'est du potager. Le jardin de Montcuit se situe dans la tradition des jardins réguliers en terrasse, très caractéristiques du XVIIe siècle. Montcuit possède en outre un réseau hydraulique important. Son Jardin d'agrément, son jardin potager, son installation hydraulique, ses douves, son verger, l'orangerie, l'allée datent du XVIIe siècle sont inscrits aux M.H. depuis le 28/03/2008.","habitants":"Gd-Taute;  famille Petiot Montcuit\r\n        \"","divers":"Deux châteaux dans cet article , le grand-Taute grav 1-2-3 et Moncuit  grav-4.   Montcuit GPS : 49° 7' 15,81\" Nord, 1° 20' 1,6\" Ouest","gps":"49° 7' 15,81\" Nord, 1° 20' 1,6\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Sauveur_Lendelin_1.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Lendelin_2.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Lendelin_3.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Lendelin_4.jpg"]},"Consult_chateau_formulaire157b":{"id":"Consult_chateau_formulaire157b","dept":"50","canton":"Bricquebec","commune":"Saint-Sauveur-le-Vicomte","nom":"St_Sauveur_Vicomte","type":"Château","periode":"XIII-XIX","histoire":"Trois châteaux dans cet article le Beaulieu, le Lude et St-Sauveur le Vicomte.                                                                                                            BEAULIEU,   ancien château fort est de style médiéval. Le château de Beaulieu date des XIe et XIIe siècles. Il fut assiégé, deux fois, durant la Guerre de Cent Ans. Il subsiste l'enceinte fortifiée flanquée de tours et un donjon massif. Les ruines du château de Beaulieu ont été classées aux M.H. depuis 1840.                                                               Le LUDE,  à Saint Sauveur le Vicomte, à été bâti en 1862 après l'incendie du précédent. C'est l'oeuvre des architectes cherbourgeois Geufroy et Drancey pour les Le Marois. Cette famille tient depuis le XIXe siècle une place éminente dans l'histoire du Cotentin. Ils commandèrent la construction d'édifices remarquables, tel   l'hôtel de la rue Blanche en 1829, par l'architecte Pellechet, ou l'hôtel édifié par Henri Parent avenue d'Antin dans le quartier des Champs Elysées pour le sénateur Jules Polydor, comte Le Marois en 1865 et enfin le château de Pépinvast. Le château du Lude témoigne du retour de l'esprit gothique et renaissance. Les alentours de cette belle demeure sont délicieux; les jardins et le parc descendent presque jusqu'au bord de la Douve. Au loin on aperçoit les bois du Lude, puis la vallée.                                                                    ST-SAUVEUR LE VICOMTE, est célèbre pour son château-fort qui entra véritablement dans l'histoire lors des guerres de Cent Ans. Le seigneur, à cette époque, était Geoffroy d'Harcourt qui se révéla d'abord partisan du roi de France, puis de l'Anglais. Après la mort de Geoffroy d'Harcourt, le roi de Navarre et les Anglais occupèrent la presqu'île du Cotentin jusqu'au traité de Brétigny, c'est-à-dire depuis 1356 jusqu'à 1360. Après ce traité, Edouard III disposa du domaine de Saint-Sauveur en faveur de Jean de Chandos, qui en prit possession en 1361.","architecture":"ST-SAUVEUR LE VICOMTE, Jean de Stokes, lieutenant s'intitulait capitaine de Saint-Sauveur ; les fortifications furent augmentées, et on fit du château une place d'armes importante; une partie de l'abbaye fut même détruite parce qu'elle pouvait nuire à la défense de la place. Après la mort de Jean de Chandos, arrivée sans qu'il laissât d'héritiers, ses domaines en Normandie furent saisis par Edouard III, qui confia la garde de Saint-Sauveur à Guillaume de Latinier, lequel choisit pour lieutenant Thomas de Catteston. Les Anglais continuèrent d'occuper le château de Saint-Sauveur et le gardèrent jusqu'à l'année 1375; mais la garnison anglaise pillant et dévastant le pays, Charles V chargea Jean de Vienne, amiral de France, d'en faire le siège. Jean de Vienne vint au printemps de l'an 1375, mettre le siège devant Saint-Sauveur-le-Vicomte, avec tous les barons et chevaliers de Bretagne et de Normandie. La garnison, après un siège long et meurtrier, demanda à capituler; il fut convenu que si, dans un délai de six semaines, elle n'obtenait aucun secours du roi d'Angleterre, elle rendrait la place, et se retirerait sauf leurs corps et leurs biens. Le roi d'Angleterre n'ayant envoyé aucun secours, les capitaines anglais abandonnèrent la place et gagnèrent la mer à Carentan. Aujourd'hui, il ne reste qu'une enceinte fortifiée, flanquée de tours construit dans la première moitié du XIV siècle, dominée par un imposant donjon qui a servit de prison. Des travaux ont été entrepris visant à restaurer le donjon, la courtine nord et les remparts. Au rez-de-chaussée existe encore une très belle salle voûtée, soutenue par un pilier central. Au XVII un hospice est aménagé à l'intérieur du château.   M.H. 1840.","habitants":"Geoffroy d'Harcourt\r\n        \"","divers":"Trois châteaux dans cet article le Beaulieu, le Lude et St-Sauveur le Vicomte.     GPS : 49° 23' 11\" Nord, 1° 31' 41\" Ouest","gps":"49° 23' 11\" Nord, 1° 31' 41\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Sauveur_Vicomte_1.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Vicomte_2.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Vicomte_3.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Vicomte_4.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Vicomte_5.jpg","../../jctruffet.com/image/image_50/50_St_Sauveur_Vicomte_6.jpg"]},"Consult_chateau_formulaire3bcf":{"id":"Consult_chateau_formulaire3bcf","dept":"50","canton":"Val-de -Saire","commune":"St-Vaast-la-Hougue","nom":"St_Vaast_la_Hougue","type":"Fort_ tour","periode":"XVII-XVIII","histoire":"TATIHOU, Tour Vauban;  Les fortifications de la Hougue et de Tatihou (à partir de 1694). Les tours de Tatihou et de la Hougue sont inscrites, avec onze autres sites fortifiés par Vauban, au patrimoine mondial de l'humanité le 7/07/2008. Dans la typologie des fortifications de Vauban, en fonction des différentes frontières géographiques à défendre, en loccurrence en mer, le système des deux tours représente la protection d'un mouillage. Le feu de Saint-Vaast-la-Hougue est placé à l'extrémité de la jetée, au sommet d'une tourelle octogonale métallique en fonte et fer de 11 mètres de haut. Il a été mis en service le 25/07/1865. Laissée peu à peu à labandon au cours du XVIIIe siècle, cet ensemble est profondément remanié à partir de 1860 : des douves sont creusées, une poudrière est construite.","architecture":"TATIHOU , les travaux des tours d'artillerie et d'observation commencent le 11 juin 1694, deux ans après la bataille de la Hougue et la défaite française, sous la direction de l'ingénieur Benjamin de Combes. En 1699, lorsque Vauban inspecte la côte normande, les travaux sont achevés. Elles perdront rapidement toute utilité. Les pièces d'artilleries et les garnisons sont repositionnés sur d'autres sites. Les tours servent alors de magasin à poudre ou pour abriter des vivres. Les tours étaient protégées par un pont-levis. Percées de meurtrières et coiffées d'une plate-forme d'artillerie pouvant recevoir six canons. Elles sont pourvues d'une citerne, de magasins à vivre et de leur propre poudrière.\r\nLa tour de Tatihou est haute de 27 mètres et a un diamètre à sa base de 26 mètres, et celle de la Hougue à respectivement 20 mètres de hauteur et 16 mètres à sa base.","habitants":"Vauban\r\n        \"","divers":"à St-Vaast-la-Hougue; Tatihou                                                    GPS : 49° 35' 15,45\" Nord, 1° 16' 05,15\" Ouest","gps":"49° 35' 15,45\" Nord, 1° 16' 05,15\" Ouest","images":["../../jctruffet.com/image/image_50/50_St_Vaast_la_Hougue_1.jpg","../../jctruffet.com/image/image_50/50_St_Vaast_la_Hougue_2.jpg","../../jctruffet.com/image/image_50/50_St_Vaast_la_Hougue_3.jpg","../../jctruffet.com/image/image_50/50_St_Vaast_la_Hougue_4.jpg"]},"Consult_chateau_formulairecb3d":{"id":"Consult_chateau_formulairecb3d","dept":"50","canton":"Carentan","commune":"Sainte-Marie du Mont","nom":"Ste_Marie_du_ Mont","type":"Château","periode":"XV au XIX","histoire":"Quatre châteaux à Ste-Marie du Mont dont celui de ste-Marie de L'Islet, de Gosselin, de Haudenville, de Brécourt et de Vieuville.                                                                              STE MARIE du MONT  Le château fait partie des édifices les plus anciens du Cotentin. A l'origine, simple construction de bois, le site a vu se bâtir très vite un château-fort en pierre, entouré de douves, que la famille aux Epaules agrandit au gré des circonstances. La forteresse allait jouer un grand rôle de tous les conflits, qui ensanglantèrent la Normandie et la Manche en particulier. La lignée des \"Aux Epaules\" fut un rempart contre les Anglais, pendant la guerre de Cent Ans, et un centre de résistance, lors des guerres de Religions. Ces dernières achevées, l'édifice fut reconstruit entre 1600 et 1607 pour Henri Robert aux Epaules à l'emplacement de ce château-fort. Selon une gravure (anonyme et sans date), il consistait en deux bâtiments massifs parallèles flanqués de deux \"tourelles\" et précédés d'un fossé. Confisqué à la Révolution, le château fut vendu  comme bien national puis exploité comme carrière avant de terminer sa vie en bâtiments agricoles. Récemment restauré, au centre du bourg on peut admirer une belle porte charretière et une porte piétonne qui permettent l'accès à la cour d'honneur.  Éléments protégés MH : le porche d'entrée ; les façades et les toitures du châtelet subsistant avec ses dépendances: inscription par arrêté du 8 février 1984.                              Manoir à Sainte-Marie-du-Mont : la terre du manoir fit partie des biens du maréchal prince de Soubise, vendus en 1821. À la fin du 19e siècle, la famille Gosselin possédait simultanément le manoir, à la Rivière et le manoir de Brucheville.","architecture":"GOSSELIN: le manoir fit partie des biens du maréchal prince de Soubise, vendus en 1821. À la fin du XIXe siècle, la famille Gosselin possédait simultanément le manoir, à la Rivière et le manoir de Brucheville.\r\nHAUDIENVILLE, manoir du XVI e siècle, aujourd'hui séparé par un mur de clôture qui divise le manoir en deux propriétés. Ce remarquable manoir possédait une chapelle fondée en 1660. Son logis est une vaste construction comprenant un corps de bâtiment rectangulaire flanqué d'un pavillon.   Le logis construit au XVIe siècle est un édifice comprenant un corps de bâtiment rectangulaire flanqué d'un pavillon, le manoir a été augmenté et surhaussé au XVIIIe siècle et ensuite restauré en 1882. Subsistent un portail du XVIe siècle, une lucarne du XVIIe siècle et la chapelle fondée en 1660 par Charles Le Sage, seigneur d'Haudienville est transformée en bergerie. Le bâtiment est actuellement divisé en deux propriétés.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Sept châteaux à Ste-Marie du Mont dont celui de ste-Marie grav-1-2-3 , de Gosselin grav-4, de Haudenville,                                 Ste Marie GPS : 49° 22' 41,44\" Nord, 1° 13' 26,23\" Ouest                                                                                                                                                       Ste marie du mont 49° 22' 44.45\" N, 1° 13' 34.20\" ouest","gps":"49° 22' 41,44\" Nord, 1° 13' 26,23\" Ouest","images":["../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_1.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_2.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_3.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_4.jpg"]},"Consult_chateau_formulairecfea":{"id":"Consult_chateau_formulairecfea","dept":"50","canton":"Carentan","commune":"Sainte-Marie du Mont","nom":"Ste_Marie_du_Mont_II","type":"Château","periode":"XVII-XIX","histoire":"BLAINVILLE;     Le moulin et les dépendances agricoles (étable et fenil) datent du XVIIe siècle. Le logis et le colombier furent construits à la fin du premier quart du XVIIIe siècle datés par l'inscription suivante : \"en 1724 RT \"Le Sieur a fait la grande maison et cette volière\". La charretterie date du XIXe siècle.  Elévation à travées à un étage carré  escalier dans-oeuvre ; escalier tournant à retours avec jour, calcaire ; moellon sans chaîne en pierre de taille ; enduit partiel , toit à longs pans en croupe ; pignon toit en pavillon en ardoise.                                                                                                      L'ISLET, c'est un des plus anciens châteaux du Cotentin. La construction initiale du château de l'Islet, un simple fortin en bois fut remplacé par un château-fort, qui comprenait des fossés, des donjons, un ponts-levis etc. Il fut démoli par Robert-aux-Épaules au début du XVIIe siècle et remplacé par un château, comprenant deux corps de logis identiques bordant les deux côtés opposés d'une cour fermée entourée de douves. Ce dernier fut abandonné au XVIIIe siècle. Le château de l'Islet fut ensuite partiellement détruit, au moment de la Révolution. Il reste peu de vestiges qui en attestent.","architecture":"BRECOURT, manoir du  XVIIe siècle première position terrestre remportée par les troupes américaines débarquant sur la plage d'Utah Beach\r\nA BLAINVILLE, manoir de FRANQUEVILLE, manoir de MARDELLE,  manoir de RIVIERE manoir du XVIe siècle , le logis est construit en moellon de calcaire et couvert par un toit en ardoises à pignons découverts. C'est un long bâtiment flanqué d'une tour d'escalier polygonale hors-uvre. De belles dépendances agricoles sont datées de 1793.\r\nVIEUVILLE, manoir , son nom a évolué de Viéville (après 1656), puis la Vieuville. Entre 1656 et 1699, Jean Mouton, époux de Mlle Françoise de Hauchemail, héritière du manoir, entreprirent d'importants travaux de rénovation. De l'ancien manoir subsistent quelques vestiges du XVIIe siècle qui retiennent l'attention, dont un long bâtiment agricole abritant une charretterie et une écurie remarquables.                                                                                A l'est de Ste-Marie REUVILLE  Vers 1070, le fief de Boutteville était considérable, Gautier qui en était seigneur, dépendait de l'honneur de Sainte-Mère-Église, et devait au Roi le service de deux chevaliers. Le château et le haras ont été construits au XIXe siècle, les communs datent du XVIIIe siècle.","habitants":"Famille de Jean Mouton Famille de Gautier\r\n        \"","divers":"Six châteaux dans cet article, Blainville grav 1-2, de Brecourt grav-6,   de L'Islet grav-5,  de Vieuville  Grav-4 , et de Reuville grav-3                                                                                              Ste marie du mont 49° 22' 44.45\" N, 1° 13' 34.20\" W                              Islet  GPS : 49° 22' 41\" Nord, 1° 13' 24\" Ouest                                                    Reuville GPS : 49° 23' 24,4\" Nord, 1° 14' 26,9\" Ouest","gps":"49° 22' 41\" Nord, 1° 13' 24\" Ouest","images":["../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_II_1.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_II_2.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_II_3.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_II_4.jpg","../../jctruffet.com/image/image_50/50_Ste_Marie_du_Mont_II_5.jpg"]},"Consult_chateau_formulaire90d9":{"id":"Consult_chateau_formulaire90d9","dept":"50","canton":"ST-Lô","commune":"Prétôt ste Suzanne","nom":"Ste_Suzanne_Prétot","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à ste Suzanne dont celui de Ste-Suzanne et Prétot.                                                                                                   STE-SUZANNE-PRETOT, en 1605, labbaye de Blanchelande fief de Charles Richier une portion de leur fief de Taillepied. Charles Richier donna son fief de Sainte-Suzanne à René Le Cesne, seigneur de Nègreville et de Pontrilly, chambellan du roi et bailli de Cotentin. En 1621, René Le Cesne le transmit à Jacques Jallot, seigneur de Saint Rémy des Landes; en 1647, ses fils Nicolas et Jacques Jallot vendirent le fief de Sainte-Suzanne à Jacques et Richard de Mauconvenant. Le bâtiment principal a été édifié pour François-Bonaventure-Corentin de Mauconvenant, comte de Sainte Suzanne de 1780 à 1783. Avec sa femme, il fut incarcéré à la Conciergerie, mais relâché en 1795, son fils Bonaventure né en 1767, qui émigra, fut tué à Quiberon en 1795; il laissa une fille, Amélie-Cécile-Charlotte, née en 1789. Le fils de César-René, César Corentin Ferry de Choiseul, vicomte de Choisel, hérita du château de Sainte-Suzanne. il neut pas denfant, mais sa veuve, Jeanne Adélaïde Valentine de La Croix de Castries, racheta la propriété en 1867; à sa mort en 1890, il fut repris par la nièce de la Vicomtesse de Choiseul, Geneviève-Marie-Stéphanie de La Croix de Castries, qui avait épousé le comte Henry-Marie-François-Xavier de Hauteclocque, tué en 1914. L'édifice fut ensuite propriété du fils (François), puis du petit-fils (Wallerand) de Henry de Hauteclocque jusquen 1997. Cette année-là, le château fut transmis à Laurence de Hauteclocque, la fille du comte Wallerand de Hauteclocque et lépouse de Hervé de Tréglodé. Ainsi Sainte Suzanne est dans la même famille depuis 1647, le domaine est demeuré dans la même famille, les patronymes ayant changé au gré des alliances.","architecture":"STE SUZANNE, le château constitue un domaine remarquable en raison de la majesté de son parc et de lélégance du l'édifice principal du XVIIIe siècle, lancien manoir se trouvait au milieu de la cour dhonneur; en 1780, lentrepreneur fut enjoint de le démolir et de réemployer tous les matériaux. Le nouveau bâtiment est en briquettes rouges, seuls les encadrements des ouvertures, le fronton, la corniche et les bandeaux sont en pierre de taille. Son allure est à la fois sévère et riante : sévère par la symétrie de ses lignes, dans le style Louis XVI, et riante par le jeu du coloris de ses matériaux. Des deux bâtiments des communs le plus intéressant est celui du nord, il renferme des pièces qui étaient utilisées jusquà la seconde guerre mondiale : une ancienne boulangerie, dont limposante cheminée atteste quelle fut utilisée pour le château et les alentours. Dans les communs au sud, une vaste pièce servait à la fabrication du cidre, le tour à piler a servi jusquà la dernière guerre.\r\nPRETOT: il comprend un logis principal du XVIIe siècle16 et une chapelle de style flamboyant avec son abside renforcée par des contreforts. On accède au château par une porterie monumentale avec une unique porte charretière en arc légèrement surbaissé du XVIe siècle16 encadrée par deux tours engagées qui s'éclairent aujourd'hui par des fenêtres à meneaux. Aujourd'hui propriété du vicomte de Malézieu.","habitants":"Jacques et Richard de Mauconvenant.\r\n        \"","divers":"Deux châteaux à ste Suzanne dont celui de ste -Suzanne et Prétot grav-4   GPS : 49° 18' 28\" Nord, 1° 26' 00\"   Ste Suzanne  49° 19' 29\" nord, 1° 26' 14\" ouest","gps":"49° 18' 28\" Nord, 1° 26' 00\"   Ste Suzanne  49° 19' 29\" nord","images":["../../jctruffet.com/image/image_50/50_Ste_Suzanne_Pr%c3%a9tot_1.jpg","../../jctruffet.com/image/image_50/50_Ste_Suzanne_Pr%c3%a9tot_2.jpg","../../jctruffet.com/image/image_50/50_Ste_Suzanne_Pr%c3%a9tot_3.jpg","../../jctruffet.com/image/image_50/50_Ste_Suzanne_Pr%c3%a9tot_4.jpg"]},"Consult_chateau_formulaire575b":{"id":"Consult_chateau_formulaire575b","dept":"50","canton":"Quettreville-sur-Sienne","commune":"Quettreville sur Sienne","nom":"Surcouf_Quettreville","type":"Château","periode":"XVI","histoire":"SURCOUF-QUETTREVILLE, le manoir passe à la famille d'Anneville. que Ursin d'Anneville construisit La chapelle en 1460.  Quelques siècles plus tard, la famille Davy du Perron qui compte parmi ses membres Jacques Davy du Perron s'en porte acquéreur.« Le fief de Quettreville appartenait dans le XVIIe siècle à Thomas David , alors patron et seigneur du lieu. Il fut vendu à Julien Le Poupinel de la Besnardière, secrétaire du roi et conseiller au siège présidial du Cotentin. Antoine-Charles-Julien-Jean Le Poupinel, officier de dragons au régiment de la Reine, le possédait encore en 1789. Il prenait le titre de seigneur et patron de Quettreville, et de seigneur des fiefs de la Porte à Saint-Nicolas-de-Coutances. Le manoir de Quettreville appartient  en 1853 à madame Surcouf, veuve de l'amiral Surcouf. Le capitaine corsaire Robert Surcouf y fait de fréquents séjours avec sa nombreuse famille (8 enfants). Il organise chaque année la fête des « frères de la côte », les corsaires normands et bretons. En 1860, le petit fils de Surcouf vend le manoir à un marchand de biens de Coutances. Des agriculteurs s'y succèdent jusqu'en 1930, année de l'arrivée de la famille Doublet qui exploite le domaine jusqu'en 2010. En 2013, la famille Lange (Sylvie, Patrice et leurs quatre enfants) achète le manoir dans le but de le mettre en valeur. En août 2014, elle y organise une grande fête de la chasse. Le manoir, avec ses dépendances  la chapelle fondée en 1460,  est inscrit au M.H. le 22 décembre 2016. Philippe Lange met le manoir en vente en septembre 2019 . En 2020, il décide finalement de le conserver.","architecture":"SURCOUF-QUETTREVILLE,  cette demeure historique de la Manche remonte au dernier tiers du XVIe siècle et a été agrandie et aménagé vers 1740. Jean de Grimouville (1398-1443), baron de Gouville, est à lorigine de sa construction : la partie la plus ancienne du manoir à savoir le logis, la grange dîmière et les communs. Ensuite cest la famille dAnneville qui récupérera le manoir auquel elle adjoindra une chapelle en 1460. Parmi les propriétaires successifs il faudra compter sur un secrétaire du roi et conseiller au siège présidial du Cotentin, un officier de dragons au régiment de la reine mais aussi à un corsaire célèbre. Des agriculteurs sy succédèrent ensuite jusquen 1930, année de larrivée de la famille Doublet qui exploite le domaine jusquen 2010. L e manoir de Quettreville, dit aussi manoir de Surcouf, est à vendre. Cest le cabinet immobilier Le Nail, spécialisé dans les belles demeures qui est en charge du dossier. Lacheteur éventuel peut acquérir lensemble des bâtiments avec, au choix, les 7,34 ha qui les entourent. .Éléments protégés MH : le manoir en totalité avec ses dépendances (y compris la chapelle, la boulangerie, les vestiges du mur denceinte et des portails, le réseau hydraulique) ainsi que le sol et les vestiges en sous-sol : inscription par arrêté du 22 décembre 2016.","habitants":"famille Davy du Perron \r\n        \"","divers":"Château de Surcouf  à Quettreville  Gps 48° 58' 43\" N, 1° 28' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Surcouf_Quettreville_1.jpg","../../jctruffet.com/image/image_50/50_Surcouf_Quettreville_2.jpg","../../jctruffet.com/image/image_50/50_Surcouf_Quettreville_3.jpg"]},"Consult_chateau_formulaireff2e":{"id":"Consult_chateau_formulaireff2e","dept":"50","canton":"Créances","commune":"Surville","nom":"Surville","type":"Château","periode":"XVI","histoire":"SURVILLE, petit village du littoral ouest du Cotentin est idéalement situé face aux îles anglo-normandes (Jersey et Guernesey). Il se situe au sud de la station balnéaire de Carteret (12 km) et à seulement 6 km de Portbail (le plus beau havre du Cotentin).\r\nLe château de Surville est situé en bord de mer, le long des dunes (havre de Surville) dans un site protégé. Les 12 hectares de la propriété s'étendent le long de la route touristique qui va du Mont Saint-Michel à Cherbourg. Le château de Surville vous accueille dans son écrin de verdure, en bord de mer, sur la côte ouest du Cotentin. Son parc de 10 hectares laissera libre cours à toutes vos fantaisies. Le château de Surville dispose également d'une écurie, est un lieu privilégié pour vos fêtes de famille, vos séminaires, journées portes ouvertes, dîners d'entreprise et spectacles.","architecture":"SURVILLE, Le bâtiment remonte au début du XVIe siècle et a conservé une grosse tour carrée flanquée d'une gracieuse échauguette à toit pointu. Une façade ancienne (XVIe et XVIIe siècles) côté jardin contraste avec une façade plus récente du XVIIIe siècle, côté cour. A l'intérieur de la demeure, de belles cheminées, deux beaux escaliers (l'un à vis et l'autre droit) et de nombreux motifs de décoration viennent ornementer l'ensemble.","habitants":"\"","divers":"Château de Surville  gps \r\n49° 17' 00\" nord, 1° 38' 53\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Surville_1.jpg","../../jctruffet.com/image/image_50/50_Surville_2.jpg","../../jctruffet.com/image/image_50/50_Surville_3.jpg","../../jctruffet.com/image/image_50/50_Surville_4.jpg","../../jctruffet.com/image/image_50/50_Surville_5.jpg"]},"Consult_chateau_formulaire7049":{"id":"Consult_chateau_formulaire7049","dept":"50","canton":"Carentan","commune":"Sébeville-Turqueville","nom":"Sébeville","type":"Château","periode":"XVI-XVII","histoire":"SEBEVILLE, en 1649, François Cadot, seigneur du lieu, comptait parti les gentilshommes fidèle au roi, assiégés dans le château de Valognes par le frondeur, François de Matignon. En 1719, le marquis de Sébeville, Charles-Frédéric Kadot fait édifier le château en intégrant une construction antérieure. Après la Révolution Charles-François Lebrun fera l'acquisition du château.  En 1809, Charles Louis Alexandre de Polignac en hérite par un legs d'Alexandrine d'Espinay-Saint-Luc, descendante, par sa mère, des Kadot de Sébeville. Aujourd'hui  le comte de Gontaut-Biron en est le propriétaire. Le 28 juillet 1813, devant notaire à Paris, le prince Charles-François Lebrun de 1739-1824) achète le château, avec son étang, sa basse-cour, son écurie, son pressoir, son colombier et la ferme du château.","architecture":"SEBEVILLE, du château primitif, il subsiste notamment dans l'angle sud-est une tour du XVIe siècle coiffée en forme de cloche. Quand au château du XVIIIe siècle, il se présente sous la forme d'un long corps de logis, haut d'un étage sur rez-de-chaussée avec un pavillon central en légère saillie, encadré de pilastres darêtes surmonté d'un fronton triangulaire. Des mascarons sculptés ornent les ouvertures. Les parties anciennes des communs du XVe siècle, sont à arcades. Éléments protégés MH : les trois cheminées subsistantes du château ; les façades et les toitures de la partie ancienne avec les arcades des communs : inscription par arrêté du 31 juillet 1979. Les façades et les toitures du château. A l'angle sud-est, une tour du XVIe siècle atteste la présence d'un édifice antérieur. Les communs datent du XVIIe siècle. L'édifice, de plan régulier, se compose d'un étage de soubassement et un étage carré. Le gros oeuvre calcaire; moellon; enduit partiel et granite, élévations ordonnancées, surmontées de toit à longs pans; croupe ; pignon couvert et toit à l'impériale, couverts d'ardoise. : classement par arrêté du 31 juillet 1979.","habitants":"Charles-Frédéric Kadot\r\n        \r\n        \"","divers":"Château de Sebeville 49° 23' 15\" nord, 1° 17' 16\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_S%c3%a9beville_1.jpg","../../jctruffet.com/image/image_50/50_S%c3%a9beville_2.jpg","../../jctruffet.com/image/image_50/50_S%c3%a9beville_3.jpg"]},"Consult_chateau_formulaire1a26-2":{"id":"Consult_chateau_formulaire1a26-2","dept":"50","canton":"Valognes","commune":"Tamerville","nom":"Tamerville","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux Tamerville; Bellaunay, Ste-Yverie et St-Joseph. SAINTE-YVERIE, un dénommé Nicolas Mahie, qualifié de noble homme, figure en 1587 dans les registres paroissiaux de Valognes avec le titre de \"sieur de Saint Yves\". Il appartenait peut-être à la même famille que maître François Mahie, prêtre, qui figure également dans les registres paroissiaux de Valognes en 1582. Il a notamment appartenu à l'abbé Lelégard, ancien conservateur des Antiquités et objets d'art de la Manche, puis à Mr Bodin, entrepreneur, spécialisée dans la rénovation de monuments historiques, qui a entièrement rénové le manoir, dans les années 1980. Le bâtiment bénéficie d'une inscription au titre des M.H. depuis le 30 décembre 1986.  Niché au fond d'un chemin, comme le sont beaucoup de manoirs dans le cotentin, le manoir de la Sainte- Yverie bénéficie d'un environnement calme et boisé ou repos et détente vous attendent. Ainsi, pour des ballades à pied, un chemin pédestre vous guidera vers les sous bois. Situé au coeur du cotentin, vous avez accès à des sites comme : les côtes de La Hague, les ports de Barfleur, Saint Vaast La Houge, Carteret ou Portbail n'auront plus de secret pour vous.","architecture":"BELLAUNAY, ancienne demeure seigneuriale, le manoir de Bellauney a été édifié entre les XV et XVIe siècles sur les ruines d'un monastère au cur du Cotentin , les principaux sites de la Presqu'île sont à proximité : Plages du Débarquement, Hautes falaises du Nez de Jobourg, Barfleur \"beau village de France\" St Vaast la hougue et ses tours Vauban classées au patrimoine de l'UNESCO Toutes les chambres sont dans le manoir, chacune raconte une période de son histoire  médiévale , Louis XV , normande (XIXe siècle)   Hôtel restaurant de monsieur Desfauteaux.      SAINTE-YVERIE, de ce fait, il regorge de trésors cachés qui font le charme de ces bâtiments d'antan. Ainsi, l'on peut y découvrir une cheminée d'époque, de nombreuses corniches en pierre parfois sculptées comme autour de cette porte. La tourelle, quant à elle, est constituée d'un escalier également en pierre tournant sur lui même pour accéder aux étages supérieurs de la bâtisse assurant un point de vue imprenable de la campagne bas normande dans ses plus beaux atours.                                                        St-JOSEPH,  Hôtel restaurant offrant une vue sur sa piscine privée, le  château  est situé à Tamerville.","habitants":"Famille de Nicolas Mahie Bellaunay; monsieur Desfauteaux. \r\n        \"","divers":"Trois châteaux Tamerville; \r\ngps 49° 32' 13\" N, 1° 29' 00\" Ouest\r\nBellaunay grav 1-2, Ste-Yverie  grav-3-4 et St-Joseph grav-5.","gps":"","images":["../../jctruffet.com/image/image_50/50_Tamerville_1.jpg","../../jctruffet.com/image/image_50/50_Tamerville_2.jpg","../../jctruffet.com/image/image_50/50_Tamerville_3.jpg","../../jctruffet.com/image/image_50/50_Tamerville_4.jpg","../../jctruffet.com/image/image_50/50_Tamerville_5.jpg"]},"Consult_chateau_formulairec73d":{"id":"Consult_chateau_formulairec73d","dept":"50","canton":"Val-de-Saire","commune":"Tocqueville","nom":"Tocqueville","type":"Château","periode":"XV-XIX","histoire":"TOCQUEVILLE, construit au XVe siècle par la famille de Hénnot, cette dernière l'échangea en 1472 avec Richard du Mesnil, écuyer. Françoise du Mesnil apporta Tocqueville en mariage à Jean Le Verrier, avocat du roi au bailliage de Valoignes,  il fait ajouter en 1562, le corps de bâtiment situé à l'ouest de la demeure. En 1661 ils échangèrent le domaine avec Marie Jallot veuve de Hervé Clérel seigneur d'Auville. Au XVIIe siècle et au début du XVIIIe siècle le manoir fut agrandi par Bernard Clérel de Tocqueville. Hervé  son fils  épousa Louise-Madeleine  de Rosanbo descendante de Vauban, leur troisième fils  Alexis de Tocqueville tombe sous le charme du château familial inhabité depuis un demi-siècle en hérita au décès de sa mère, en 1856 il obtint qu'il lui revienne en  s'y installant. Sa femme dirigea les travaux d'aménagement et de restauration. L'avenue est plantée en 1843, un bassin creusé en 1845 et un Jardin Anglais créé en 1856. Ce domaine lui permet d'entamer une carrière politique dans la Manche en 1839. En 1894, on y adjoint un pavillon méridional de style Renaissance. Le chartrier et la bibliothèque d'Alexis de Tocqueville, constitué par son aïeul, Bernard Bonaventure de Tocqueville, de 2 500 ouvrages des XVIIe et XVIIIe siècl
