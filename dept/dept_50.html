 armées, se retirera au château de Courcy,  Ruiné par l'ampleur des travaux, il meurt sur ses terres en 1791. Le château est alors vendu afin de régler les créances aux Ferrand qui en font don à leur fille Adélaïde-Madeleine qui épouse Guillaume-Jacques Lepron de la Fossardière, magistrat, leur fille Sophie-Françoise porte  Courcy à Antoine-Claude Prémont substitut du roi, leur fils Alfred-Armand conseiller général du canton meurt en 1898. l'année suivante le domaine  est acquis par monsieur Pothuau qui le revend en 1913 à monsieur Villemot, en 1935,acquit par le docteur Gatellier, chirurgien parisien.  Pendant la Seconde Guerre mondiale le château sorti épargné du conflit. En 2018 il était toujours la possession de Jean Gatellier.","architecture":"COURCY, le château a été construit au XVIIe siècle. Ce qui frappe lors de sa visite, c'est son aspect empreint de sobriété. Formé d'un long corps central cerné de deux ailes très courtes, il possède un étage. Le rez-de-chaussée, légèrement surélevé, permettait de jouir sans réserve du jardin, pavillon central à deux niveaux toit en croupes  fronton triangulaire.  Quelques fantaisies dans la construction atténuent la rigueur classique des bâtiments comme ces arêtes d'angle des deux pavillons formant les ailes de la demeure principale qui sont en pierre rectangulaires formant pilastres. La décoration intérieure a été réalisée de la fin du XVIIe siècle au début du XIXe siècle.                                                                                                   FRANCVILLE, près du château actuel, bâti au XVIIe siècle on a découvert les traces d'un exploratorium ou vigie romaine nommé les Castiaux. Des lettres patentes du Roi de l'an 1740 portent union de plusieurs terres, fiefs, seigneuries, domaines et héritages au marquisat de Fontenay, obtenues par le sieur Henry Le Berceur, marquis de Fontenay. Le marquisat de Fontenay se composait des paroisses de Fontenay, Saint-Marcouf, Emondeville et Azeville. La terre et le marquisat de Fontenay entrèrent dans la famille de Blangy par le mariage de Marie-Anne-Françoise Le Berceur, nièce de Henri Le Berceur, chevalier, marquis de Fontenay, avec Pierre-Marie-Maximilien Le Vicomte, marquis de Blangy, qui fut chevalier de Saint-Louis.   Du château du XVIIe siècle, il subsiste un pavillon d'entrée percé d'une haute porte voûtée et quatre niches qui pourraient avoir abrité des statues. De chaque côté de ce pavillon, des communs qui se terminent par des tourelles coiffées en poivrières. Quand au château actuel, il date du XIXe siècle.  Éléments protégés MH : les façades et les toitures des communs et de la chapelle : inscription par arrêté du 21 octobre 1970.","habitants":"Courcy; Famille de Berseur.                                                   Francville ; marquis de Fontenay.\r\n        \"","divers":"Deux châteaux dans cet article, Courcy grav 1-2-3-4-5 et Francville grav-6.   Courcy  GPS : 49° 29' 36\" Nord, 1° 18' 38\" Ouest                                                                                          Francville  GPS : 49° 29' 21\" Nord, 1° 18' 56\" Ouest","gps":"49° 29' 36\" Nord, 1° 18' 38\" Ouest","images":["../../jctruffet.com/image/image_50/50_Fontenay_sur_Mer_1.jpg","../../jctruffet.com/image/image_50/50_Fontenay_sur_Mer_2.jpg","../../jctruffet.com/image/image_50/50_Fontenay_sur_Mer_3.jpg","../../jctruffet.com/image/image_50/50_Fontenay_sur_Mer_4.jpg","../../jctruffet.com/image/image_50/50_Fontenay_sur_Mer_5.jpg","../../jctruffet.com/image/image_50/50_Fontenay_sur_Mer_6.jpg"]},"Consult_chateau_formulaire090b":{"id":"Consult_chateau_formulaire090b","dept":"50","canton":"Cherbourg","commune":"Cherbourg","nom":"Fort_Cherbourg","type":"Fort","periode":"XVIII-XIX","histoire":"CHERBOURG, est situé en bordure de mer, sans rade naturelle ni promontoire rocheux pouvant assurer par des bastions sa protection.Une digue fut alors construite et, à ses extrémités, des bastions armés en permanence assuraient la défense du port et de la rade ainsi constituée. A l'ouest s'élevait le fort de Querqueville prolongé par celui de Chavagnac, puis, sur la digue elle-même, le fort de l'ouest - la batterie Napoléon dénommée par la suite fort central - le fort de l'Est et enfin la batterie de l\"ile Pelée. A l'époque de sa création, il fallait protéger efficacement contre les assauts répétés de la mer et surtout contre un éventuel agresseur les navires qui venaient y mouiller. La digue se présente aujourd'hui, sur les 3700 mètres de sa longueur, sous la forme d'un ouvrage mixte : digue à talus à pente très douce vers le large, d'une largeur de 100 mètres à la base, couronnée par une muraille en maçonnerie, reposant sur un soubassement en béton d'une largeur moyenne de 10 mètres. Le parapet culmine côté mer à 3.75 mètres au-dessus des plus hautes eaux. FORT du HOMET à partir de 1779 (sur l'emplacement d'une batterie du XVII siècle). Fort de l'Ile PELEE, construit de 1779 à 1792.  Système défensif de la rade de Cherbourg - passe de l'est.  Fort  CHAVAGNAC, à partir de 1854. Système défensif de la rade de Cherbourg. passe de l'ouest.               Forts des MUSOIRS  Est et Ouest de la digue, à partir de 1851. Système défensif de la rade de Cherbourg, protection des passes.   Fort CENTRAL de la digue à partir de 1793. Système défensif de la rade de Cherbourg, vers le large. Le fort du ROULE est un ensemble de fortifications françaises et allemandes construit au XIXe siècle et XXe siècle sur la montagne du Roule, à Cherbourg-en-Cotentin.","architecture":"Fort de QUERQUEVILLE  à  partir de 1787. Système défensif de la rade de Cherbourg.Le FORT La construction en est décidée par Louis XVI en juin 1786. Construit sur la pointe de Querqueville, le fort est destiné à assurer la défense de la rade de Cherbourg, et notamment de la passe de l'Ouest. Les travaux commencent en 1787 , sur l'emplacement d'un fortin semi-circulaire de la Guerre de Sept ans. Mais dès l'année suivante une complication vient perturber les plans des concepteurs. On découvre en effet qu'à l'emplacement initialement prévu des rochers moins profonds qu'on ne l'avait imaginé empêcheront les navires de fort tonnage d'emprunter la passe. On éloigne donc l'ouverture, d'un bon kilomètre. Problème, les canons du fort ne couvrent plus la passe et seront donc d'aucune utilité. Le fort perd « son intérêt opérationnel avant d'être terminé.  À l'origine, ses canons devaient se répartir sur trois étages, comme à l'île Pelée. Mais, au final, le fort ne sera doté que d'une batterie circulaire voûtée et casematée, pouvant recevoir 53 fûts, qui est achevée en 1795. Cette batterie est surmontée d'une batterie à ciel ouvert, destinée surtout à recevoir ultérieurement des mortiers de gros calibre. En 1852, le fort reçoit son armement et une caserne est construite pour accueillir officiers et matelots.","habitants":"Louis XVI , Vauban\r\n        \"","divers":"Fort de Querqueville grav-7-9 à Cherbourg GPS 49° 37' 50\" Nord, 1° 36' 50\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Fort_Cherbourg_1.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_2.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_3.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_4.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_5.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_6.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_7.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_8.jpg","../../jctruffet.com/image/image_50/50_Fort_Cherbourg_9.jpg"]},"Consult_chateau_formulaireff55":{"id":"Consult_chateau_formulaireff55","dept":"50","canton":"Créances","commune":"Coigny","nom":"Franquetot","type":"Château","periode":"XVIII","histoire":"FRANQUETOT, à l'origine, cet édifice fut l'oeuvre d'une famille Guillotte qui l'acquirent en 1528  et qui avait été anoblie par le Roi Henri II, époux de Catherine de Médicis. Sous le Roi Henri IV, Louis Guillotte  réuni les fiefs de Coigny et de Franquetot devient seigneur de Franquetot et épouse Louise de Montmorency. Un peu plus tard, il prenait le nom de Coigny dont il avait acheté le fief, son petit-fils maréchal de France.   Plus tard, Marie-François-Henri de Franquetot (1737  1821), petit-fils de François De Franquetot  2°Duc de Coigny et pair de France, obtint en 1785 la réunion de Pretot à son duché de Coigny, il fut aussi grand bailli de Caen, gouverneur des Invalides, député de la noblesse en 1789, émigra durant la Révolution en Angleterre. Gustave de Franquetot  1768-1865 petit-fils de Marie et François de Franquetot 3iéme et dernier duc de Coigny, pair de france se marie en 1822 avec une anglaise Henriette Dalrymple-Hamilton. de cette union naquirent 4 filles, parmi lesquelles :  Jeanne-Louise de Coigny (1824-1896), épouse en 1846 John Darlymple (1819-1903), Comte de Stair.    Fanny  de  Coigny  (1826-1900),  épouse  en  1852  Sydney  Pierrepont  (1825-1900), comte Manvers.   La comtesse de Beauchamp conserva Franquetot jusqu'en 1928 qui sera vendu à la comtesse de Castéja qui remis le château en état, actuelle propriétaire les Barrigue de Fontainieu.","architecture":"FRANQUETOT, un premier château a été brulé pendant les guerres de Religion, de celui qui fut bâti sous le règne de Henri IV  seule une aile a été conservée.  Le château actuel date de la première moitié du XVIIIe siècle, à l'exception de l'aile gauche sur la cour d'honneur qui fut construite au lendemain des guerres de Religion et dont le style Renaissance a été repris pour l'ensemble du château. Le bâtiment est composé d'un rez-de-chaussée, d'un étage et d'un grenier éclairé de lucarnes. Corps de bâtiment rectangulaire, avant-corps central à fronton, deux ailes en retour d'équerre et combles à lucarnes. Plan en fer a cheval : les deux bâtiments en équerre sont des XVIe et XVIIe siècles et les deux de droite datent du milieu XVIIIe siècle, construits dans le style des précédents. La chapelle est ornée de boiseries XVIIIe, vestiges des murs des écuries du XVIIIe siècle et vaste parc.  Éléments protégés MH : les façades et les toitures du château et de ses anciennes écuries : inscription par arrêté du 16 juillet 1968.","habitants":"Famille de Guillotte\r\n        \"","divers":"Château de Franquetot à Coigny   gps 49° 19' 56\" N, 1° 23' 34 Ouest.","gps":"","images":["../../jctruffet.com/image/image_50/50_Franquetot_1.jpg","../../jctruffet.com/image/image_50/50_Franquetot_2.jpg","../../jctruffet.com/image/image_50/50_Franquetot_3.jpg"]},"Consult_chateau_formulaire655b":{"id":"Consult_chateau_formulaire655b","dept":"50","canton":"Bricquebec","commune":"Bricquebec","nom":"Galleries","type":"Château","periode":"XVI","histoire":"GALLERIES, édifié dans le second quart du XVIe siècle en remplacement de la résidence seigneuriale contenue dans les limites de l'ancienne enceinte castrale. La construction du nouveau bâtiment était achevée lors du décès de Jacqueline d'Estouteville. L'édifice est également mentionné dans son état d'achèvement,  se référant aux années 1553 à 1560. Sa fille, Adrienne d'Estouteville qui avait épousé, en 1534, François de Bourbon, abandonne avec son époux l'antique forteresse au profit de cette nouvelle résidence, plus confortable où elle séjourne, notamment pour chasser. Quand elle quitte Paris, elle est toujours accompagnée d'une nombreuse suite d'une centaine de personnes comprenant : cuisiniers, écuyers, femmes de chambres, pages, etc. Dans son journal Gilles de Gouberville fait cas de fréquentes visites au château, apportant des chevreaux ou des chapons, ou pour diner avec Madame. C'est, Marie II de Saint-Pol, la petite-fille de Jacqueline, qui fait construire sur la façade ouest. Plus tard, Marie d'Orléans de Longueville (1625-1707) cèdera, les terres de Bricquebec, d'Orglandes et de Blosville, à son cousin le maréchal de Matignon, que la famille embellira au fil des ans. Une descendante du maréchal de Matignon, Anne-Louise de Matignon (1774-1846) y résidait encore en 1788, année où elle est mariée au duc de Montmorency (Anne-Charles-François de Montmorency).\r\nPar la suite le château devint la résidence de la famille Lemarois qui l'habitait encore en 1982. Cette famille est la descendante d'un frère du célèbre général de division du Premier Empire, Jean Le Marois (1776-1836), né à Bricquebec.","architecture":"GALLERIES, le château Renaissance des Galleries, typique des demeures du XVIe siècle, se présente sous la forme d'un long rez-de-chaussée surélevé comprenant de nombreuses pièces en enfilade.  La façade qui donne à l'est est accessible par un perron rectangulaire central de quelques marches plates. Ses deux rangées de fenêtres s'inscrivent dans des arcs cintrés reposant sur des pilastres réguliers. Les beaux chapiteaux des pilastres décorés à l'italienne sont analogues, bien qu'un peu moins larges, à ceux de la galerie en arrondie qui entoure le château de Chambord. Cette façade comporte à gauche une galerie de huit travées avec des colonnes fines et rondes avec des chapiteaux inspirés de la nature, partie la plus ancienne datant de la Renaissance, et vestige de la galerie d'origine ouverte aux quatre vents avec le toit soutenu par des colonnes. La partie droite de huit travées également, plus tardive, ou les pilastres carrés ont remplacé les colonnes et dont les chapiteaux arborent des têtes d'animaux ou de moines, et non plus des guirlandes de fleur. L'autre façade s'ouvre sur un jardin à la française. On rejoint le vestibule central par un escalier en fer à cheval à double révolution, précédant une petite loggia soutenue par quatre colonnes à chapiteaux corinthiens et coiffée d'un toit à l'impérial, qui agrémente cette construction entourée d'un beau parc, et qui n'est pas sans rappeler celles des châteaux de La Cour à Flottemanville et des Montgommery à Ducey. Éléments protégés MH : les façades et les toitures, y compris escalier en fer-à-cheval, loggia : inscription par arrêté du 22 février 1958.","habitants":"Famille d'Estouteville\r\n        \"","divers":"Château de Galleries à Bricquebec   Gps 49° 28' 18? N, 1° 38' 03? Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Galleries_1.jpg","../../jctruffet.com/image/image_50/50_Galleries_2.jpg","../../jctruffet.com/image/image_50/50_Galleries_3.jpg","../../jctruffet.com/image/image_50/50_Galleries_4.jpg"]},"Consult_chateau_formulaire5a20":{"id":"Consult_chateau_formulaire5a20","dept":"50","canton":"Saint-Hilaire-du-Harcouët","commune":"Argouges","nom":"Gault","type":"Château","periode":"XV-XVII-XIX","histoire":"GAULT, désigné probablement dans une charte du père de Guillaume le Conquérant, par le mot Goolt, l'abbé Desroches, dans son histoire du Mont Saint-Michel et du Diocèse d'Avranches, remarque avec raison que le Domesday-Book ne contient pas les noms des seigneurs normands qui habitaient la frontière de Bretagne, exception faite cependant pour le seigneur du Gault. A noter que le parc du château du Gault est inscrit au pré-inventaire des jardins remarquables. Location de gîtes dans le Petit château et la Tour du Gault.","architecture":"GAULT,  est une demeure historique de la Manche située à Argouges dans la commune de Saint-James. Voisines de la forteresse médiévale de Montaigu, les terres du Gault appartenant au XVe siècle à la famille Le Carpentier, ont plusieurs propriétaires successifs avant que François de la Binolaye l'achète en 1642. Le Gault passe en 1741 dans la famille Piton par le mariage de Marie Cécile de La Binolaye avec François Piton. Les Piton du Gault se transmettent la propriété jusqu'au mariage d'Odile Piton du Gault avec Maxime de Coniac (1913-2003), conseiller général du canton de Saint-James . Loïc de Coniac, maire délégué d'Argouges et son épouse en sont actuellement propriétaires. Près des étangs, la ferme est en partie reconstruite au XIXe siècle ; il reste cependant un vieux logis à la cheminée monumentale datant du XVIe siècle et abandonné ensuite aux fermiers.  Une nouvelle demeure est construite au XVIIe siècle, modifiée au XVIIIe et agrandie dans la deuxième moitié du XIXe avec l'ajout d'une aile néo-médiévale abritant les cuisines, l'office et les logements des domestiques. Le parc du château du Gault est inscrit au pré-inventaire des jardins remarquables. L'ancien logis et l'aile de style néo-médiéval sont loués en gîtes meublés.","habitants":"famille Le Carpentier\r\n        \"","divers":"Château de Gault à Argouges   Gps 48° 28' 47.5\" N, 1° 23' 17\" Ouest.","gps":"","images":["../../jctruffet.com/image/image_50/50_Gault_1.jpg","../../jctruffet.com/image/image_50/50_Gault_2.jpg","../../jctruffet.com/image/image_50/50_Gault_3.jpg","../../jctruffet.com/image/image_50/50_Gault_4.jpg","../../jctruffet.com/image/image_50/50_Gault_5.jpg"]},"Consult_chateau_formulaire5500":{"id":"Consult_chateau_formulaire5500","dept":"50","canton":"Val-de-Saire","commune":"Le Vast","nom":"Germonière","type":"Château","periode":"XVIII-XIX","histoire":"GERMONIERE, la construction du château de la Germonière date de 1803. Son propriétaire initial était Philippe Fontenilliat. Celui-ci créa, en 1803, l'ancienne filature de coton. Il fit construire le logis, perpendiculaire à l'allée, un parc, réunit les chutes des 3 moulins, et fit bâtir un canal de fuite. La filature fut transmise, par héritage en 1858, à Louis-Hippolyte Rangeard de La Germonière. En 1892, l'usine ferma et les bâtiments industriels furent rasés. Le lieu fut alors reconverti en espace d'agrément par Raoul-Hippolyte-Edmond Rangeard de La Germonière : un nouveau logis avec plan en U donnant sur le parc a été construit contre le logement patronal de 1803, par l'architecte Trolliet.","architecture":"GERMONIERE, l'ancienne filature de coton est créée en 1803 par Philippe Fontenilliat, négociant à Rouen. Il édifie le logis perpendiculaire à l'allée, un parc, réunit les chutes des trois moulins, construit un canal de fuite. Lors de la fermeture de l'usine en 1892, les bâtiments sont détruits et le lieu est reconverti en espace d'agrément, un nouveau logis avec plan en U donnant sur le parc est construit contre le logement patronal de 1803 par l'architecte Trolliet. Le jardin est restructuré. Le réseau hydraulique a fait l'objet d'une mise en scène par la création de perspectives.\r\nÉléments protégés MH : le parc avec l'ensemble de ses aménagements hydrauliques, l'île et la grande allée : inscription par arrêté du 28 mars 2008.","habitants":"Famille de Philippe Fontenilliat\r\n        \"","divers":"Château de la Germonière à le Vast.   GPS : 49° 37' 17,49\" Nord, 1° 21' 30,33\" Ouest","gps":"49° 37' 17,49\" Nord, 1° 21' 30,33\" Ouest","images":["../../jctruffet.com/image/image_50/50_Germoni%c3%a8re_1.jpg","../../jctruffet.com/image/image_50/50_Germoni%c3%a8re_2.jpg","../../jctruffet.com/image/image_50/50_Germoni%c3%a8re_3.jpg"]},"Consult_chateau_formulaire3c12":{"id":"Consult_chateau_formulaire3c12","dept":"50","canton":"Val-de-Saire","commune":"Gonneville","nom":"Gonneville","type":"Forteresse","periode":"XVI-XVII","histoire":"GONNEVILLE, un donjon et deux tours de garde. Ce château avait été édifié par les Courcy, il est devenu célèbre pour avoir hébergé plusieurs fois les ducs de Normandie, rois d'Angleterre et on garde surtout le souvenir des passages de Jean sans Terre en 1203. Il fût détruit au milieu du XVIe siècle par les Pirou qui ont bâti le château actuel. Les avant-corps de l'entrée, ont été construits en 1641 par les Jallot de Beaumont. Le château est confisqué à la famille de Berruyer en octobre 1792. Il est restitué en 1814 à ses propriétaires, de retour d'émigration, ruinés.  En 1842, le château est acheté aux surs de Berruyer par une certaine dame Lambert et son fils, convaincue qu'un trésor se cache dans sa nouvelle demeure, Aglaë Lambert, née Marmion, commence en 1846 à détruire des parties importantes du château, sans rien trouver. Ruinée, Mme Lambert voit ses biens saisis en 1849 et vendus aux enchères. Les acheteurs sont le marquis Médéric de Chivré et son épouse, née Alix Doynel de la Sausserie, qui mourront dans le lieu, respectivement en 1881 et en 1907. Le 8 décembre 1954, le baron Nadal de Montfort, alors directeur adjoint de la mutualité agricole des Pyrénées-Orientales, et sa femme Régine, achètent le château , confie le baron de Montfort Il fut la résidence de la Famille de Barthès de Montfort.","architecture":"GONNEVILLE, la construction  date du XVIe au XVIIe siècle, a un donjon du XIVe siècle et un logis du XVIIIe siècle.Les dégâts sont considérables : les deux corps de bâtiment qui reliaient le château au donjon et à la grande tourelle sont rasés ; la façade elle-même est « mutilée  les deux corps de bâtiment qui reliaient le donjon au château et à la tourelle furent démolis par ordre de dame Lambert qui pensait y trouver un trésor et la chapelle Saint Jean subit le même sort.  La façade fut mutilée, des fenêtres à croisillons et à meneaux sculptés, des lucarnes et des cheminées détruites. Une poterne défend l'entrée du château entouré de douves en eau. Autour du château, se trouve un parc planté de bois et clos de murs. Les jardins en terrasse renferment un chêne-liège impressionnant. Le château est occupé par l'armée allemande pendant la seconde guerre mondiale . Le maréchal Rommel y séjourne en mai 1944. Alors directeur adjoint de la Mutualité agricole des Pyrénées-Orientales. Le couple habite le château en 1983 . Des travaux de restauration importants y sont entrepris, qui dureront plusieurs décennies. « Pour acheter ce château et l'entretenir, il nous a fallu de l'inconscience, de la persévérance et un peu d'orgueil » . Le château a été inscrit aux M.H. depuis 1972. Éléments protégés MH : les façades et les toitures du château, y compris les deux pavillons d'angle et les restes de l'ancien château (poterne défendait jadis un pont- levis, donjon, cinq tours) ; les façades et les toitures des communs, y compris la boulangerie et le fruitier ; les douves avec leur pont : inscription par arrêté du 27 septembre 1972. Chambre d'hôte et location des salles de séminaire et de réception ou mariage, également tournages de film .","habitants":"famille de Berruyer\r\n        \"","divers":"Château de Gonneville à Gonneville gps 49° 38' 18\" N, 1° 28' 01\" Ouest.","gps":"","images":["../../jctruffet.com/image/image_50/50_Gonneville_1.jpg","../../jctruffet.com/image/image_50/50_Gonneville_2.jpg","../../jctruffet.com/image/image_50/50_Gonneville_3.jpg","../../jctruffet.com/image/image_50/50_Gonneville_4.jpg","../../jctruffet.com/image/image_50/50_Gonneville_5.jpg"]},"Consult_chateau_formulairec8b8":{"id":"Consult_chateau_formulairec8b8","dept":"50","canton":"Carentan","commune":"Gourbesville","nom":"Gourbesville","type":"Château","periode":"XVIII","histoire":"GOURBESVILLE, le fief a appartenu à une ancienne famille, mentionnée au XIIe siècle, dans un acte de donation à l'abbaye de Montebourg. Après la fondation du Prieuré de Néville,  en 1730, le château comprenait \"un corps de logis, avec un gros pavillon y tenant, une grande écurie, un autre pavillon au bout, une boulangerie, étable et poulailler y joignant, le tout couvert d'ardoise, plus un colombier couvert d'ardoise, un autre corps de logis, pareillement couvert d'ardoise, une grange et un cellier couvert de paille\" ; portail du XVIe siècle; pavillon du début du XVIIe siècle; château et colombier détruits vers le milieu du XIXe siècle; transformation des communs peu avant 1907 pour y aménager un logis,  incendié en 1944, mais reconstruit depuis cette date de plan régulier,  élévation à travées, deux étages carrés ; étage de comble, escalier hors-oeuvre,  escalier en vis, gros oeuvre : calcaire  moellon sans chaîne en pierre de taille, toit à longs pans ; pignon couvert ; pignon découvert ; flèche conique ; flèche carrée,\r\nen  ardoise ; schiste en couverture ; tuile mécanique.                         Le manoir de la COUR de Gourbesville ou « petit château » du XVIe??XXe siècle. Il a été reconstruit après la Seconde Guerre mondiale. Un de ses accès passe par une barrière charretière. Le manoir est daté du XVe siècle  avec de nombreux remaniements jusqu'à une période récente. Les bâtiments annexes arborent d'intéressant décors. Il est recensé à l'Inventaire général du patrimoine culturel.","architecture":"GOURBESVILLE, en 1163, suite à la donation faite par Pierre de Beaumont à l'abbaye, on trouve comme témoin Guillaume de Gouberville. En 1240, Jacques de Gouberville, fils de Pierre de Gouberville, est mentionné dans une charte de l'abbaye Notre-Dame du Vu de Cherbourg. En 1256, Geoffroy de Gouberville, fils de Guillaume, confirme les donations faites par son aïeul Jacques. Le livre noir (1251-1278) cite comme patron de l'église de Gouberville Gaufridus de Guibervilla. La famille de Gouberville se trouve, vers la fin du XIVe siècle, sans héritier mâle. Une fille épousa en 1392 un certain Guillaume Picot, originaire du Bessin, qui demanda et obtient de la Cour des comptes, l'attribution du fief de Gouberville et d'y adjoindre son nom. En 1463, Montfaut qui enquête sur titres de noblesse, pour le compte du roi, en pays Bessin, reconnaît noble Guilaume Picot, troisième du nom. A son décès, en 1490, ses deux fils mineurs, seront confiés à leur mère Tassine, en garde noble. Elle décèdera en 1517, Jean, l'aîné de ses deux fils, seigneur de Russy et de Houtteville, choisit la carrière ecclésiastique, gardant les bénéfices de Russy et de Gouberville. Le second fils, Guillaume, cinquième du nom, sire de Gouberville et de Percy, reçut la charge de lieutenant du grand maître des eaux et forêts de Normandie. Il épouse Jeanne du Fou, dame du Mesnil-au-Val, fille de Guillaume du Fou, capitaine du château de Cherbourg. Jeanne du Fou met au monde Gilles de Gouberville, François de Sorteval, Guillaume (décède à Paris alors qu'il est étudiant), Louis, Guillonne (mariée à Jean de la Bigne, seigneur du bailliage de Caen), Renée Dame de Saint-Nazer par son mariage avec Jacques du Moncel, et Tassine, qui épousa le sieur des Essarts. Le Château de Gouverville actuel date de 1853. Mr Noël est le propriétaire actuel du Château de Gouberville.","habitants":"Guillaume de Gouberville\r\n        \"","divers":"Château de Gourbesville                                                                GPS : 49° 41' 12\" Nord, 1° 19' 00\" Ouest","gps":"49° 41' 12\" Nord, 1° 19' 00\" Ouest","images":["../../jctruffet.com/image/image_50/50_Gourbesville_1.jpg","../../jctruffet.com/image/image_50/50_Gourbesville_2.jpg"]},"Consult_chateau_formulaire1e98":{"id":"Consult_chateau_formulaire1e98","dept":"50","canton":"Le Pieux","commune":"Barneville_Carteret","nom":"Graffard","type":"Manoir","periode":"XIV XV","histoire":"deux châteaux dans cet article; Graffard et les Sirènes.     GRAFFARD, sa construction date d'avant 1360 à 1575. C'était une demeure fortifiée. Son propriétaire initial était la Famille de Graffart. En 1360, le Manoir de Graffard est aux mains des Anglais qui demandent 2 000 écus pour le rendre aux Français, par le Traité de Brétigny. En 1415, Robert Le Fèvre de Graffard est cité. Pierre Pitteboult (Pittebout) . Ses propriétaires actuels sont Mr et Mme Maurice Pezet.  Éléments protégés MH : le logis, y compris la partie ruinée avec les caves voûtées d'arêtes et la porte rustique, et les éléments décoratifs dispersés dans la cour ; les façades et les toitures des communs, y compris les murailles de clôture, les tourelles, le porche, le potager et ses murs de clôture : inscription par arrêté du 16 juin 1995.","architecture":"GRAFFARD, cette construction, réalisée pendant les guerres de religion, a été précisément datée par inscription (1574-1575). Le corps de bâtiment principal a partiellement été ruiné au XIXe siècle. Le potager a été aménagé au XVIIIe siècle. Du Moyen-Age, il reste peu de vestiges, sinon une partie de l'enceinte extérieure. Elle se présente sous une forme carrée de 65 mètres de côté. Le logis (1574-1575) en partie ruiné, au XIXe siècle, s'appuie sur un des côtés de l'enceinte et fait face à l'entrée. Cette ferme-manoir est ancien château du Moyen Age, inscrit partiellement aux M.H. depuis 1995,  le château des Sirènes, construit et habité par le peintre Adolphe Lalyre, puis vendu à Henry Franklin-Bouillon.","habitants":"Famille de Graffart\r\n        \"","divers":"deux châteaux dans cet article; Graffard et les Sirènes.  GPS : 49° 22' 52\" Nord, 1° 45' 10\" Ouest","gps":"49° 22' 52\" Nord, 1° 45' 10\" Ouest","images":["../../jctruffet.com/image/image_50/50_Graffard_1.jpg"]},"Consult_chateau_formulairedc6f":{"id":"Consult_chateau_formulairedc6f","dept":"50","canton":"Granville","commune":"Granville","nom":"Grainville","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Granville celui de Grainville, la Crète et Dior.                                                                             GRAINVILLE, en 1252, il passe dans la riche famille d'Argouges par le mariage de Jeanne de Granville avec Raoul d'Argouges. De l'époque médiévale, il subsiste, sur ce site, l'ancienne église de Saint-Nicolas-près-Granville, datant du XIVe siècle, remaniée et désaffectée au XIXe siècle lors de la construction de la nouvelle église. Des peintures murales du 15e siècle représentant la Vierge et l'Enfant et un donateur menacé par l'aiguillon de la mort, qui se trouvent sur le mur nord de la nef, près de l'arc triomphal, sont classées au M.H. depuis 1957 . Le château actuel est reconstruit à partir d'un logis plus ancien aux XVIIIe et XIXe siècles par les Picquelin. En novembre 1793, après le siège de Granville, dix-sept Vendéens sont massacrés et leurs corps jetés dans une sorte de caverne d'un petit bois dans l'enceinte du château avant d'être inhumés, pour certains, dans le cimetière de Saint-Nicolas. Le colombier, les façades, toitures, escalier intérieur avec sa rampe en bois du manoir de la Clémentière ainsi que celles de l'ancienne église sont inscrits monument historique depuis 1980.\r\nLe domaine est la propriété de la famille de Paul de Gibon. bâti au XVe siècle, le parc et la demeure sont masqués par de hauts murs ceinturant l'ensemble de la propriété. Celle ci appartenait au comte Paul de Gibon, historien de sa cité natale et des îles Chausey. Aujourd'hui  à monsieur de Charville.","architecture":"CRETE;  c'est un cadre exceptionnel pour vos réceptions, mariages ou séminaires. Cette magnifique demeure, privatisée pour vous, avec son vaste parc entouré par la mer, est l'endroit idéal pour organiser des événements de prestige comme les : mariages, séminaires, congrès, assemblées générales et réceptions. Le château de la Crête permet d'accueillir 200 personnes assises, dans les salons, du rez-de-chaussée, d'où la vue sur la Baie du Mont Saint-Michel, Cancale et les Iles Chausey est imprenable.  Draye Olivier et Catherine.                                                          DIOR, dans les années 1930, la commune de Granville rachète la villa et prévoit de la raser pour créer un plan d'eau. Le projet est finalement abandonné et un jardin public ouvre en 1938. Sur l'impulsion de Jean-Luc Dufresne, la transformation en musée se fera en plusieurs étapes dans les années 1990. Celui-ci sera géré par l'association Présence de Christian Dior à partir de 1993, avec le soutien financier de Dior, notamment d'Elizabeth Flory chargée du patrimoine chez Dior, ainsi que d'autres donateurs. Le musée est le seul labellisé « musée de France » exclusivement consacré à un couturier. Dans les années 2000, la roseraie est réaménagée.                                                                                                          A  une dizaine de K.M au sud Est à Lucerne d'outremer château logis abbatial du XVIIe siècle.","habitants":"Granville; famille de Gibon                                                       Crète famille draye\r\n        \r\n        \"","divers":"Deux châteaux à Granville celui de Grainville grav 1-2, la Crètegrav-3-4 et Dior grav-5                                             . Grainville   GPS: 48° 49' 47,24\" Nord, 1° 33' 57,1\" Ouest                                                               crete GPS : 48° 50' 17\" Nord 1° 35' 13\" Ouest","gps":"48° 49' 47,24\" Nord, 1° 33' 57,1\" Ouest","images":["../../jctruffet.com/image/image_50/50_Grainville_1.jpg","../../jctruffet.com/image/image_50/50_Grainville_2.jpg","../../jctruffet.com/image/image_50/50_Grainville_3.jpg","../../jctruffet.com/image/image_50/50_Grainville_4.jpg","../../jctruffet.com/image/image_50/50_Grainville_5.jpg"]},"Consult_chateau_formulaire439a":{"id":"Consult_chateau_formulaire439a","dept":"50","canton":"Coutances","commune":"Gratot","nom":"Gratot","type":"Forteresse","periode":"XIII-XIV","histoire":"GRATOT, le premier château de Gratot fut construit au XIVe siècle a appartenu pendant cinq siècles à la famille dArgouges, entré par alliance en 1251 et ce, jusquen 1777. Il devint au XVIIIe siècle le siège dun marquisat  par la famille d'Argouges, Barons de Gratot depuis 1251. Bâti, remanié et agrandi au cours des sept siècles de son histoire, au XVIIIe siècle  Gratot érigé en marquisat, c'est en 1771 que la Famille d'Argouges vendra le château à Luc-Marie du Homméel, puis à Guillaume-François  Douessey,  au XIXe siècle le domaine passe aux familles Quesnel d'Hector puis aux Quesnel de la Morinière avant d'être acquis par l'éditeur Lemarre. Vendu à des marchands de bien en 1924 inhabité tombe en ruine.                            C'est à partir de 1968, grâce au courage de nombreux bénévoles que sa rénovation fut entreprise, Gratot va retrouver, peu à peu, son aspect antérieur. Éléments protégés MH : les ruines du château ; les façades et les toitures des communs avec la poterne d'entrée ; les douves: classement par arrêté du 4 août 1970.","architecture":"GRATOT,  la construction date du XIIIe siècle, de style Médiéval,  il fut maintes fois transformé jusqu'à son apogée au XVIIIe siècle, avant d'être laissé à l'abandon au XIXe siècle et, de devenir aujourd'hui un lieu touristique. Le château de Gratot a été remanié au XVe et XVIe siècle, na jamais été un château comme les autres, riche des apports architecturaux de chaque époque. Ses murs parlent toujours du temps dAndaine, la fée des sources claires. Il subira de nombreuses modifications jusqu'au XVIIIe siècle, il servira d'entrepôt pour y mettre à l'abri le fourrage des fermiers du secteur.  Laissé à l'abandon au XIXe siècle par ses différents propriétaires qui  se sont succéder sans entretenir l'édifice qui est tombé lentement en ruine, envahi par le lierre et abandonné au début du XXe siècle. Il subsiste des douves profondes et une grande porte carrée flanquée de deux poternes défensives. La cour d'honneur est ceinte de bâtiments trapus percés de trous de meurtrières. La demeure ségnieuriale révèle quelques prémices de la Renaissance. L'originalité du château de Gratot réside dans la belle tour polygonale dont le sommet carré en encorbellement est agrémenté d'une magnifique fenêtre Renaissance dans l'axe du toit à bâtière épousant un magnifique galbe orné d'acanthes.  Il a été mainte fois transformé, jusqu'à son apogée au XVIIIe siècle, avant d'être laissé à l'abandon au XIXe siècle. Aujourd'hui, c'est devenu un lieu touristique. En 2003, le château du Gratot a reçu près de 12 600 visiteurs,  est ouvert au Public et se visite,  inscrit aux M.H. depuis 1970. Il existe aussi le Manoir de Chanteloup à découvrir sur la commune (XVIe siècle).","habitants":"Famille dArgouges\r\n        \"","divers":"Château de Gratot                                                                                                           GPS: 49° 04' 06,6\" Nord, 1° 29' 23,42\" Ouest","gps":"49° 04' 06,6\" Nord, 1° 29' 23,42\" Ouest","images":["../../jctruffet.com/image/image_50/50_Gratot_1.jpg","../../jctruffet.com/image/image_50/50_Gratot_2.jpg","../../jctruffet.com/image/image_50/50_Gratot_3.jpg","../../jctruffet.com/image/image_50/50_Gratot_4.jpg","../../jctruffet.com/image/image_50/50_Gratot_5.jpg","../../jctruffet.com/image/image_50/50_Gratot_6.jpg"]},"Consult_chateau_formulaire1aef":{"id":"Consult_chateau_formulaire1aef","dept":"50","canton":"Le Mortainais","commune":"Sourdeval","nom":"Haut_Launay","type":"Château","periode":"XIX","histoire":"HAUT-AUNAY, le château du Haut-Aunay dit aussi château Labiche est une demeure historique de la Manche, situé à Sourdeval. Jules Labiche, futur sénateur de Sourdeval, construit ce château en 1860 dans un style néo-classique. Joseph Labiche, en devient propriétaire après le décès de son oncle, Jules.  Lors de la Libération, Mademoiselle Coquoin, la directrice, fait aménager un abri dans un ancien souterrain du château; ainsi, du 2 au 13 août 1944,  91 enfants et leurs encadrants y restent protégés des combats. Le château appartient ensuite au Bureau de bienfaisance de Sourdeval, puis aux Renault, aux Gibbs et enfin aux Kelly.","architecture":"HAUT-AUNAY,  propriété privée, il ne se visite pas. cette demeure fut construite vers 1860 dans un style néo-classique par Jules Hyacinthe Romain Labiche, Sénateur et Conseiller Général de 1871 à 1904. Grâce à M. Labiche, la ligne de chemin de fer sera ouverte en 1887. Suite à son décès, le château appartint successivement à son neveu Joseph Labiche, au Bureau de Bienfaisance de Sourdeval. Entre temps, la bâtisse servit de lieu de colonie de vacances, dailleurs en 1944, au moment du Débarquement un groupe denfants y séjournait et les 91 enfants et leurs encadrants restèrent dans le souterrain du château du 2 au 13 août 1944.","habitants":"Jules Hyacinthe Romain Labiche\r\n        \"","divers":"Château  du Haut-Aunay à Sourdeval                                                              gps 48° 43' 24\" nord, 0° 55' 15\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Haut_Aunay_1.jpg","../../jctruffet.com/image/image_50/50_Haut_Aunay_2.jpg"]},"Consult_chateau_formulaire2586":{"id":"Consult_chateau_formulaire2586","dept":"50","canton":"Créances","commune":"La Hayes du Puits","nom":"Hayes_du_Puits","type":"Forteresse-Vestiges","periode":"XI-XIII-XV","histoire":"Trois châteaux dans cet article  la Hayes du Puits, et Surville.                                                                                           LA HAYES DU PUITS, le château fort de La Haye du Puits dont il ne reste que le donjon, édifié sur une motte féodale ou castrale aurait été construit au XIe siècle par Turstin Haldup, dorigine scandinave et baron de La Haye du Puits. Au XIIe siècle, la forteresse est le fief de Richard le La Haye dont l'épouse Mathilde de Vernon fonde l'abbaye de Blanchelande. La guerre de Cens Ans terminée, la baronnie changea de maître puisque l'on retrouve en 1491, Christophe de Cerisay, futur bailli du Cotentin, qui se porte acquéreur de La Haye du Puits. Le château a changé de nombreuses fois de propriétaire. Il a même appartenu aux pauvres du IXe arrondissement de Paris, qui lavaient reçu en legs en 1875. La partie Nord, la plus ancienne, fut rachetée par M. Dauvin dont un membre de la famille la léguée à Mlle Lecanu qui lhabite depuis 1947. Lautre partie, vendue à part, a été endommagée en 1944 et a subi des transformations. Elle appartient depuis  2005, à M. Bataille qui la aménagée en appartements. Seule la tour carrée a été restaurée avec un toit semblable à loriginal, la tour Renaissance a conservé son aspect initial. De l'important château il ne reste qu'un Pavillon carré accosté d'une tour polygonale. La baronnie de la Haye du Puits était aux mains d'Arthur de Magneville au XVIe siècle, puis aux Motteville et aux Caillebot de la Salle.\r\n classement par liste de 1840.                                                                      DONJON HAYE, est l'un des plus anciens de La Manche (XIe siècle). Il est le seul vestige du château fort (et de ses douves) qui surplombait autrefois les environs.  Sur place, un panneau explicatif accompagne la découverte.","architecture":"La HAYE du PUITS, du XIe et XIIe siècles, était bâti sur une motte féodale d'une hauteur variant entre 6 et 7 mètres. Il n'en subsiste que des vestiges. La plupart des murailles se sont écroulées dès 1850. Le reste du château a également subi des destructions pendant la bataille de La Haye-du-Puits en 1944. Seul le donjon, remanié au XVe siècle, percement des baies et couronnement de mâchicoulis, est encore visible actuellement : c'est une tour carrée denviron 5 mètres de côté pour une hauteur totale de plus de 20 mètres à partir de la route. À lintérieur, l'escalier en colimaçon compte 72 marches. La tour de plan carré est percée d'une large porte en arc brisé. On y voit encore les fentes servant à la manuvre du pont-levis. Des arrachements de courtines présents sur les deux flancs de la tour laisse suggérer la chemise disparue. Nous serions donc en présence d'une motte fortifiée du type shell-Keep, type peu courant dans la région.Il reste par contre en face de la rue un « second château », ancien manoir, qui fut construit par Arthur de Magneville au début du XVIe siècle et remanié au XVIe?-?XVIIe siècle. L'ensemble fut construit de l'autre côté des douves et donne par sa composition une impression de « basse-cour ». L'édifice comporte plusieurs tours et une cave avec des voûtes. Une porte ouvragée permet d'accéder à la tourelle.   A dix K.M. à l'ouest à SURVILLE un château; petit village du littoral ouest du Cotentin est situé face aux îles anglo-normandes (Jersey et Guernesey).  Le château de Surville est en bord de mer, le long des dunes (havre de Surville) dans un site protégé.  Le château de Surville est loué pour fêter vos événements (mariages, baptêmes, séminaires, etc.).","habitants":"Haye; Christophe de Cerisay\r\n        \"","divers":"Trois châteaux dans cet article  la Hayes du Puits, le donjon et Surville.                                                                                     Surville  GPS: 49° 16' 51,2\" Nord, 1° 39' 21,16\" Ouest","gps":"49° 16' 51,2\" Nord, 1° 39' 21,16\" Ouest","images":["../../jctruffet.com/image/image_50/50_Hayes_du_Puits_1.jpg","../../jctruffet.com/image/image_50/50_Hayes_du_Puits_2.jpg","../../jctruffet.com/image/image_50/50_Hayes_du_Puits_3.jpg","../../jctruffet.com/image/image_50/50_Hayes_du_Puits_4.jpg"]},"Consult_chateau_formulaire2426":{"id":"Consult_chateau_formulaire2426","dept":"50","canton":"Quettreville-sur-Sienne","commune":"Hyenville","nom":"Hyenville","type":"Manoir","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Hyenville et des Marais. HYENVILLE, l'héritage du fief se transmet de père en fils ou de frère à frère en cas d'absence de postérité; les propriétaires n'habitent pas tous le manoir puisqu'ils disposent d'une autre propriété sur la commune de la lande d'Airou En 1679, Marie de Grimouville, fille du seigneur de Hyenville, épouse Louis Tanquerez de La Montbrière. Le couple obtient en dot sans doute, la ferme de la Girardière de Haut. Le manoir de Hyenville reste aux Grimouville jusqu'en 1733 date à laquelle l'héritière, Julienne de Grimouville, sans descendance, le vend ; Castel et la Roque. déjà détentrice de la seigneurie de Guéhébert. C'est en 1750 que Louis-Antoine Tanquerey de la Montbrière, petit fils de l'heureux bénéficiaire de la dot rachète aux descendants des Cauvet la seigneurie de Hyenville reconstituant ainsi une grande partie du domaine initial. Louis Antoine Tanquerez de la Montbrière n'habitait pas à Hyenville mais résidait dans son hôtel particulier de Coutances à côté de l'actuel Chambre des métiers, il y meurt en 1791 et laissant à son fils Charles Antoine, qui résidait à la Girardière de Haut, la seigneurie de Hyenville. Ce dernier ne profita guère de l'héritage puisque 3 ans plus tard, il fut guillotiné. Après récupération, sa veuve et ses deux filles conservèrent la propriété de la Girardière de Haut mais le manoir de Hyenville fut vendu en 1802 au bénéfice d'un avocat nommé Capel puis la propriété fut acquise par les familles Blondel, Legoubin, et Livory avant d'être achetée en 1964 par M.et Mme Monsallier. Pendant plusieurs décennies, Mme Monsallier a restauré avec goût et passion ce manoir qui nécessitait une rénovation complète. Pour la qualité des travaux entrepris, et a obtenu en 1990, le prix départemental des Vieilles Maisons Françaises.","architecture":"DES MARAIS, Hyéronyme Davy, écuyer sieur des Marets\", mort à Hyenville en 1671 est le premier propriétaire connu, il était un des fils du seigneur de Quettreville. Dans un acte notarié de 1694, on mentionne un \"Jacques Delamare, sieur des Maresqs \". Des inscriptions sur les poutres indiquent Jean Belin comme propriétaire en 1723 et 1725.  Au début du XIXe siècle, la propriété appartient au célèbre corsaire Robert Surcouf qui possédait également le manoir de Quettreville-sur-Sienne où il séjournait de temps à autre notamment à l'occasion de la foire de la Sainte Anne pour procéder à la vente de son bétail. A sa mort en 1827, sa femme, Marie-Catherine de Maisonneuve, hérite du manoir des Marais. Elle le vend 14 ans plus tard au maire de Longueville, Antoine Le Bailly, capitaine au long cours. Un négociant de Coutances (Elie Deslandes) rachète la propriété en 1863 puis elle passe ensuite à la famille Ledreney dont la propriétaire actuelle est une descendante.  D'un point de vue archéologique, on peut relever quelques éléments intéressants. A l'intérieur trois cheminées dont deux au rez-de-chaussée et une troisième, la plus intéressante, au premier dans une pièce inhabitée qui était devenue la chambre à grains. Trois poutres datées, une dans la grange : par Jean Belin 1727 , une seconde dans la partie centrale de la maison :  Fait faire par Mme Surcouf l'an 1839  et la troisième située à l'extrémité sud de la maison :  par Jean Belin 1725. La porte qui, au rez-de-chaussée, donne accès à la tour d'escalier possède des moulurations d'un style gothique flamboyant. Éléments protégés MH : les façades et les toitures du bâtiment d'habitation, de la grange accolée au nord et de l'ancienne chapelle ; le puits : inscription par arrêté du 7 avril 1975.","habitants":"Hyenville; famille de Julienne de Grimouville                                         Des Marais; Famille de Jacques Delamare\r\n        \r\n        \"","divers":"Deux châteaux dans cet article; Hyenville grav 3-4 et des Marais grav 1-2.                                                                     Gps   48° 59' 39\" nord, 1° 28' 07\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Hyenville_1.jpg","../../jctruffet.com/image/image_50/50_Hyenville_2.jpg","../../jctruffet.com/image/image_50/50_Hyenville_3.jpg","../../jctruffet.com/image/image_50/50_Hyenville_4.jpg","../../jctruffet.com/image/image_50/50_Hyenville_5.jpg"]},"Consult_chateau_formulaireae4e":{"id":"Consult_chateau_formulaireae4e","dept":"50","canton":"St-Lô","commune":"Hébécrevon","nom":"Hébécrevon","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Castel et la Roque.                                CASTEL, le château est bâti par Jean du Chastel, écuyer, sieur du Chastel, mort en 1622, fils de Charles du Chastel, issu d'une ancienne famille de la noblesse normande, et de confession protestante. Son fils, Jacques du Chastel, sieur de la Bucaille, est l'héritier de cette terre et devient châtelain à la mort de son père. Des cinq enfants qu'il eut avec son épouse Diane Le Canu, dame de Basmaresq, fille de Pierre Le Canu, sieur de Basmaresq, seul Louis du Chastel, sieur d'Hébécrevon, de la Renaudière et du Chastel, atteint l'âge adulte et hérita du domaine. Le château fut ensuite cédé, en 1691, à Georges Dancel, écuyer, sieur de Saint-Jean-du-Corail, fils de Jacques Dancel, époux d'Anne de La Lande, nièce de Louis du Chastel.   La construction du château Le Castel date du XVIe siècle. Il est privé, fermé au public,  est une construction sévère aux fenêtres rares avec quatre tours carrées aux angles. Le dernier rejeton de la famille du Chastel le vendit en 1690, et par héritage il passa successivement aux familles Desmaretz de Monchâton, d'Auxais et de Marescot.\r\nÉléments protégés MH : inscription par arrêté du 1er avril 1946.","architecture":"La ROQUE, première mention du fief  en 1394 tenu par les Breuilly  et avant 1590 par la famille Hue son fils Michel conseiller au parlement de Rouen construisit le petit château du XVIIe siècle est niché dans un écrin de verdure au milieu d'un parc fleuri très soigné. Michel décède en 1641  A la génération suivante l'ainé Thomas Hue devient par héritage seigneur de Mironmesnil fonde une branche qui sera illustrée par un garde des sceaux sous le règne de Louis XVI. La Roque  revient pour sa part à un frère cadet, Louis capitaine de chevaux légers, c'est sa petite-fille, Jeanne-Marie épouse en premières noces de Pierre-François Mauviel, puis remariée avec Pierre-François Rocher qui devient à la mort de Thomas en 1766, l'héritière du domaine. Après Marie-Pierre-Thomas  Mauviel victime de la Terreur. La Roque  passe à Françoise-Alexendrine-Aurore Mauviel devenue par alliance madame  Pinel de Vauval. En 1870  le domaine est cédé à Pierre-Eugène Gambillon  chef à la préfecture, le château connaîtra plusieurs propriétaires; les Bonnet de Moreilhan de Polhes et acquis en 1978 par la famille Raymond Delisle qui  ont choisi de faire partager à leurs hôtes après l'avoir restauré. Ils ont commencé l'aménagement du domaine puisque la propriété avait subi de gros dommages pendant la guerre. Le château se composait d'un corps de logis rectangulaire flanqués sur les angles extérieurs de deux pavillons coiffés de toiture en forte pente et prolongé à l'est, côté cour par deux ailes en retour d'équerre, le corps de logis central en légère saillie précédé sur la façade arrière d'un escalier à double révolution.   Éléments protégés MH : les façades et les toitures des bâtiments formant le château : inscription par arrêté du 1er avril 1946.  Chambres d'hôtes, suites et restaurant toute l'année.","habitants":"Famille du Chastel                                                                     Roque;  famille Hue\r\n        \r\n        \r\n        \"","divers":"Deux châteaux à Hébécrevon;                                                        Castel grav 1-2,  la Roque grav 3-4-5.                                        GPS : 49° 07' 29\" Nord, 1° 11' 02\" Ouest","gps":"49° 07' 29\" Nord, 1° 11' 02\" Ouest","images":["../../jctruffet.com/image/image_50/50_H%c3%a9b%c3%a9crevon_1.jpg","../../jctruffet.com/image/image_50/50_H%c3%a9b%c3%a9crevon_2.jpg","../../jctruffet.com/image/image_50/50_H%c3%a9b%c3%a9crevon_3.jpg","../../jctruffet.com/image/image_50/50_H%c3%a9b%c3%a9crevon_4.jpg","../../jctruffet.com/image/image_50/50_H%c3%a9b%c3%a9crevon_5.jpg"]},"Consult_chateau_formulaireb850":{"id":"Consult_chateau_formulaireb850","dept":"50","canton":"Carentan","commune":"Picauville","nom":"Isle_Marie","type":"Château","periode":"XIII-XVII","histoire":"L'ISLE MARIE. vers 1026-1027, Richard III concède en douaire à sa fiancée la duchesse Adèle plusieurs propriétés dont la forteresse du Homme. En 1033, le duc de Normandie, Robert, vend la forteresse à sa sur Adelise, épouse de Regnault de Bourgogne, qui sera donné en jouissance à Néel de Saint-Sauveur, lors de la révolte de 1047. En 1240 Robert Bertran en était le seigneur, puis la famille d'Aigneaux, et rentra par alliance en 1379 dans la famille Aux Épaules. En 1649, pendant la Fronde, François de Matignon, lieutenant-général de Normandie, s'empare du château du jeune Gigault de Bellefonds. Le château était entré dans le patrimoine des Bellefonds, en 1607, à la suite du mariage de son grand-père, avec Jeanne Aux Épaules, fille du seigneur protestant de Sainte-Marie-du-Mont. Bernardin Gigault, marquis de Bellefonds, gentilhomme de la chambre du roi, lieutenant-général des armées royales en Italie (1663), maréchal de France (1668), n'aura de cesse d'agrandir son domaine. En 1810 Léonor George Feuillye de Riou épouse  Marie Marguerite Louise Sophie d'Aigneaux. En 1900 Guillaume-Paul  D'Aigneaux héritier de l'Isle-Marie par legs de sa tante. Il fut la possession de Bernardin Gigault de Bellefonds, passa à la famille du comte de la  Houssay, il propose des chambres et suites décorées de manière individuelle et offrant une vue sur la campagne normande ainsi que le parc du Bessin.","architecture":"L'ISLE MARIE, le premier château fut bâti vers 996  L'Isle-Marie est située dans une dépression marécageuse qui barre l'accès du clos du Cotentin d'est en ouest. L'enceinte circulaire entourée d'un fossé, appelée Le Holme, pourrait être l'ancien château attesté en 1026. L'ensemble comprend divers bâtiments: un ancien château-fort remanié en 1900, un corps de logis du XVIIe siècle, un colombier, un bâtiment à usage d'hôpital pour soldats invalides daté de 1675 et une chapelle de 1673 attribuée à Jules Hardouin Mansart. Le domaine a conservé les vestiges d'une enceinte bastionnée à \"la Vauban\", en étoile, plantée d'arbres, à usage de terrain de jeu et de jardin panoramique. Cette enceinte et les canaux ont été en partie démolis en 1830 pour être remplacés par un parc à l'anglaise. Le château se compose   d'un corps de logis de plan carré que flanque à chaque angles une tour ronde, cinq bâtiments à usage dépendances jouxtent cet ensemble entouré d'une muraille crénelée défendue par de nombreuse tourelles et précédée de fossés.\r\nÉléments protégés MH : l'enceinte du XIe siècle ; le corps de logis du XVIIe siècle ; les façades et les toitures de la chapelle, du cimetière et son enclos; les façades et les toitures de l'hôpital des invalides, et l'escalier intérieur et sa cage; le colombier; deux pavillons de jardin, le parc, les bois : inscription par arrêté du 13 septembre 2001,  chambres d'hôtes.","habitants":"famille dAigneaux \r\n        \"","divers":"L'isle Marie à Picauville  GPS : 49° 22' 05\" Nord, 1° 21' 34\" Ouest","gps":"49° 22' 05\" Nord, 1° 21' 34\" Ouest","images":["../../jctruffet.com/image/image_50/50_Isle_Marie_1.jpg","../../jctruffet.com/image/image_50/50_Isle_Marie_2.jpg","../../jctruffet.com/image/image_50/50_Isle_Marie_3.jpg","../../jctruffet.com/image/image_50/50_Isle_Marie_4.jpg","../../jctruffet.com/image/image_50/50_Isle_Marie_5.jpg"]},"Consult_chateau_formulairec2e1-2":{"id":"Consult_chateau_formulairec2e1-2","dept":"50","canton":"Bréhal","commune":"Longueville","nom":"Longueville","type":"Château","periode":"XVII","histoire":"LONGUEVILLE, un d'Arundel qui, sans doute, appartenait à l'une des familles d'Arundel qui, après la conquête, jouèrent un grand rôle en Normandie et en Angleterre, a possédé le fief de Longueville, dépendant de la baronnie de Saint-Pair, appartenant à l'abbaye du Mont-Saint-Michel. On trouve comme seigneurs de Longueville, aux XVIIe et XVIIIe siècles, Claude de Mary, écuyer, et Paul-Bernard de Mary, chevalier de Saint-Louis. Le château de Longueville, construit au XVIIe siècle, n'offre rien de remarquable. Il est précédé de belles avenues de peupliers et possède un grand parc arboré avec son étang. En 1825, il était encore habité par Anne-Henriette Duchemin de la Vaucelle, fille de Jean-Baptiste Duchemin de la Vaucelle, écuyer, et de Jacqueline de Saint-Gilles. Elle avait épousé Anne Bon de Mary de Longueville, écuyer, capitaine de cavalerie.","architecture":"LONGUEVILLE, est une demeure historique située à Longueville.Il est situé à 1,7 km au nord-est du bourg. On y accède par une avenue de peupliers. Il est entouré d'un grand parc arboré, complété par un étang. \r\nIl abrite un remarquable pigeonnier, inscrit aux Monuments historiques le 7 avril 1975   Éléments protégés MH : le pigeonnier : inscription par arrêté du 7 avril 1975, chambres d'hôtes.","habitants":"familles d'Arundel\r\n        \"","divers":"Longueville GPS 8° 51' 50\" N, 1° 32' 00\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Longueville_1.jpg","../../jctruffet.com/image/image_50/50_Longueville_2.jpg","../../jctruffet.com/image/image_50/50_Longueville_3.jpg","../../jctruffet.com/image/image_50/50_Longueville_4.jpg"]},"Consult_chateau_formulairec25f":{"id":"Consult_chateau_formulairec25f","dept":"50","canton":"Pont-Hébert","commune":"Cavigny","nom":"Mare_Cavigny","type":"château","periode":"XVII","histoire":"La MARE, le château de la Mare fut construit en 1630 pour Guillaume de La Mare, recteur de l'Université de Caen. Le domaine a appartenu à Michel de Saint-Martin, recteur de l'Université, victime en 1687 d'une cérémonie burlesque apparentée à celle du Bourgeois gentilhomme. Le bâtiment a été remanié au XIXe siècle, par la famille Gigault de Bellefond.","architecture":"La MARE, la construction du château date du XIXe siècle. Le château de la Mare est de style néogothique. Il est situé au 35 avenue de Kairon dans la partie balnéaire de la commune de Jullouville, à quelques mètres de la mare de Bouillon qui n'est, cependant, pas sur la même propriété. Le Château de la Mare est un château privé, fermé au Public.Éléments protégés MH : le château en totalité : inscription par arrêté du 14 mars 1944. Deux groupes de fours à chaux : inscription par arrêté du 23 avril 1992.","habitants":"Michel de Saint-Martin\r\n        \"","divers":"Château de la Mare à Cavigny                                                     GPS : 48° 46' 29\" Nord, 1° 33' 57\" Ouest","gps":"48° 46' 29\" Nord, 1° 33' 57\" Ouest","images":["../../jctruffet.com/image/image_50/50_Mare_Cavigny_1.jpg","../../jctruffet.com/image/image_50/50_Mare_Cavigny_2.jpg"]},"Consult_chateau_formulaire966b":{"id":"Consult_chateau_formulaire966b","dept":"50","canton":"St-Lô","commune":"Marigny-le-Lozon","nom":"Marigny_Lozon","type":"Château","periode":"XV-XVI-XVIII","histoire":"Trois châteaux dans cet article; Hubertant, et Mesnil-Amey , Bouillon à Hauteville.                                                                                       HUBERTANT,  ensemble manorial de la fin du XVe siècle ou du début du siècle suivant                                                                                    A cinq K.M au nord ouest   BOUILLON à  Hauteville la Guichard  est le berceau des rois normands dItalie et de Sicile. Cest dici que, vers 1036, les fils dun modeste seigneur, Tancrède de Hauteville, partent à la conquête de lItalie du Sud et de la Sicile où ils donnent naissance à un puissant royaume.   Les propriétaires, Corinne et Patrick Harel, institutrice et agriculteur laitier, ont été récompensés par les VMF en 2000 pour les restaurations de la demeure réalisées depuis 10 ans. En 2013, la mort dans l'âme, le couple est contraint de vendre à RTE car la ligne haute tension passe à 50 mètres près de la propriété.                                                MESNIL-AMEY , les bâtiments d'habitation ont été reconstruits au XVIIIe siècle par la famille  Viel de Grasmont.","architecture":"HUBERTANT,   cet ensemble manorial date de la fin du XVe siècle ou du début du XVIe siècle. Il est composé d'un double porche d'entrée charretier et piétonnier, d'une ferme, de communs et d'un corps de logis du XVIe siècle. Ce dernier a conservé 2 tours circulaires percées de 9 bouches à feu et de baies à meneaux en bois, avec leurs volets intérieurs et leurs vitraux d'origine. L'ancien escalier à vis a été remplacé au début du XVIIe siècle par un grand escalier central à cage carrée et rampe à balustres. De nombreux aménagements intérieurs ont été réalisés au XVIIIe siècle (parquets, cheminées, lambris). Les façades, les toitures, l'escalier, les 4 cheminées dont 3 au premier étage et 1 au deuxième étage, sont inscrits aux M.H. depuis le 26/03/2002. C'est un musée aujourd'hui, ouvert au Public.                                                                                     A cinq K.M au nord ouest   BOUILLON à  Hauteville la Guichard  Dans le bocage coutançais, visite d'une ancienne ferme seigneuriale du XVIe siècle (structure, architecture, fonctionnement). Explications de l'évolution de l'agriculture au cours des siècles.                                                                               MESNIL-AMEY vers Marigny , de cet ancien château fort subsiste la porte d'entrée défendue par une bretèche et encadrée de deux tours.","habitants":"Tancrède de Hauteville,\r\n        \"","divers":"Trois  châteaux dans cet article; Hubertant grav 5,  Mesnil-Amey grav-3-4, et Bouillon grav-2                                                             à Hauteville GPS : 49° 8' 48,26\" Nord, 1° 17' 15,65\" Ouest                                          Montfort GPS : 49° 10' 49,54\" Nord, 1° 15' 27,76\" Ouest","gps":"49° 8' 48,26\" Nord, 1° 17' 15,65\" Ouest","images":["../../jctruffet.com/image/image_50/50_Marigny_Lozon_1.jpg","../../jctruffet.com/image/image_50/50_Marigny_Lozon_2.jpg","../../jctruffet.com/image/image_50/50_Marigny_Lozon_3.jpg","../../jctruffet.com/image/image_50/50_Marigny_Lozon_4.jpg","../../jctruffet.com/image/image_50/50_Marigny_Lozon_5.jpg"]},"Consult_chateau_formulairecd7e-2":{"id":"Consult_chateau_formulairecd7e-2","dept":"50","canton":"Cherbourg-Octeville-3","commune":"Martinvast","nom":"Martinvast","type":"Forteresse","periode":"XVI","histoire":"MARTINVAST-BEAUREPAIRE   Le premier château fut ruiné par la guerre de cent ans et reconstruit de 1579 à 1581 par Barthole du Moncel, avec une aile encadrée de deux gros pavillons carrés saillants et bastionnés. Des constructions médiévales qui pouvaient subsister, il ne conserva que le donjon. Il était alors entouré de douves et de marécages. De 1820 à 1867, un de ses descendants, le comte Alexandre du Moncel, maréchal de camp et Pair de France, le restaura pour le rendre habitable et le flanqua de quatre tours, il supprima les douves et assécha les marécages. En 1867 il fut vendu au baron Arthur de Schickler, banquier de la famille royale de Prusse à Berlin, qui le transforma en château néo-gothique par l'adjonction d'une galerie médiévale au nord et l'édification d'une aile du même style qui reliait le donjon à la construction du XVIe siècle. L'architecte chargé de la transformation fut l'anglais William Henry White. En 1944, la construction du XVIe siècle fut entièrement brûlée par une bombe anglaise tandis qu'une bombe américaine détruisait la moitié de l'aile néo-gothique construite au XIXe siècle. Après la guerre, la comtesse Hubert de Pourtales, fille du Baron Arthur de Schickler, sépara des ruines la partie de l'aile néo-gothique intacte. Il fallut attendre son acquisition en 1962 par son petit-fils, le comte Christian de Pourtales Schickler, pour voir entreprendre tout d'abord en 1967 la restauration de l'aile Est du XVIe siècle, puis à partir de 1995, la construction d'une galerie de liaison destinée à relier cette aile avec la partie intacte du château du XIXe siècle. Le parc du château est l'un des plus beaux de Normandie.","architecture":"MARTINVAST-BEAUREPAIRE, dit Beaurepaire est appelé aussi le château de Martinvast, domaine de Beaurepaire en 1528, la famille de Thieuville, qui portait d'argent à deux bandes de gueules, accompagnées de sept coquilles de même, possédait la seigneurie de Hardinvast. En 1646, la famille Blondel possédait cette seigneurie, et portait d'argent à la fasce d'azur chargée d'un croissant d'or accosté d'une boule et demie de même, accompagnée de neuf hermines de sable, quatre en chef et cinq en bas. Ce château construit dans la première moitié du XIXe siècle possède un domaine agricole à l'anglaise et est également situé en partie sur la commune de Martinvast.  Inscription  du 28 décembre 1992 Les façades et les toitures de l'ensemble des bâtiments, à l'exclusion des bâtiments contemporains; l'obélisque et le moulin à vent; cette dernière inscription protège également le parc de 100 hectares (avec l'ensemble de ses aménagements paysagers et hydrauliques). Il est composé de bois, prairies, étangs et d'une cascade. Il est, en partie, situé aussi sur Hardinvast. C'est un château fort de style néo-gothique. Sa construction a débuté au XVIe et s'est achevée au XIXe siècle. Son parc fait 100 Ha, propose la location de ses salles pour vos évènements et ses chambres d'hôtes.","habitants":"Famille du comte Barthole du Moncel\r\n        \"","divers":"Martinvast, Beaurepaire GPS : 49° 35' 22\" Nord, 1° 39' 31\" Ouest :   Gps  49° 28' 32\" Nord, 1° 25'0\" Ouest","gps":"49° 35' 22\" Nord, 1° 39' 31\" Ouest :   Gps  49° 28' 32\" Nord","images":["../../jctruffet.com/image/image_50/50_Martinvast_1.jpg","../../jctruffet.com/image/image_50/50_Martinvast_2.jpg","../../jctruffet.com/image/image_50/50_Martinvast_3.jpg","../../jctruffet.com/image/image_50/50_Martinvast_4.jpg","../../jctruffet.com/image/image_50/50_Martinvast_5.jpg","../../jctruffet.com/image/image_50/50_Martinvast_6.jpg","../../jctruffet.com/image/image_50/50_Martinvast_7.jpg","../../jctruffet.com/image/image_50/50_Martinvast_8.jpg"]},"Consult_chateau_formulaire0a6b":{"id":"Consult_chateau_formulaire0a6b","dept":"50","canton":"Pont-Hébert","commune":"Airel","nom":"Mesnil_Vitey","type":"Manoir","periode":"XV","histoire":"MESNIL- VITEY, ce manoir fut édifié à la fin du XVe siècle par la famille d'Acher, Il fut construit sur l'emplacement probable d'une fortification des premiers temps de la domination normande, cette acquisition conféra à la famille de la noblesse les d'Acher, en vertu d'un édit de Louis XI qui déclarait nobles les propriétaires de francs-fiefs. Il fut habité au XVIIe siècle par le poète Jean Regnault de Segrais, membre de l'Académie française. Au milieu du XXe siècle, il appartenait au comte et de la comtesse Hurault de Ligny. Au XXe siècle, elle est la propriété de l'homme politique Jean Michel Guérin du Boscq de Beaumont\r\nÉléments protégés MH : les façades et les toitures, les vestiges du mur d'enceinte inscrits par arrêté du 22 novembre 1949","architecture":"MESNIL-VITEY,  date du XVe siècle, la maison-forte fut bâtie, pour Lucas Acher, à la fin du XVe siècle. Un système de douves, alimentées par les eaux de l'ancien bras de la Vire toute proche, permettait d'entourer le manoir, constituant un premier système de défense. Il était placé à un endroit stratégique, il défendait le pont Saint-Louis. Il subsiste aujourd'hui deux ailes reliées par une tour octogonale découronnée, des fenêtres à meneaux et des linteaux en accolade. Pendant la révolution, le manoir fut démantelé et son donjon crénelé rasé à hauteur du toit par ordre du district de Saint-Lô. Une enceinte quadrangulaire entourée de douves détruite à la Révolution, dont il subsiste des vestiges de mur crénelé, abrite deux bâtiments  en équerre. Une tourelle polygonale d'escalier en occupe l'angle intérieur. Au-dessus de la porte d'entrée, se trouvent les armoiries de Lucas Acher : « d'azur à la face d'argent, accompagnée de 3 écus d'or, 2 en tête, 1 en pointe ». Les façades du Manoir du Mesnil-Vitey, toitures et vestiges du mur d'enceinte, ont été inscrits aux M.H. depuis le 22/11/1949. C'est un manoir transformé en chambres d'hôtes dans un cadre agréable.","habitants":"famille d'Acher\r\n        \"","divers":"Château de Mesnil-Vitey à Airel:                                                                       GPS : 49° 13' 8,42\" Nord, 1° 4' 55,47\" Ouest","gps":"49° 13' 8,42\" Nord, 1° 4' 55,47\" Ouest","images":["../../jctruffet.com/image/image_50/50_Mesnil_Vitey_1.jpg","../../jctruffet.com/image/image_50/50_Mesnil_Vitey_2.jpg"]},"Consult_chateau_formulaire2d7e":{"id":"Consult_chateau_formulaire2d7e","dept":"50","canton":"Condé-sur-Vire","commune":"Tessy sur Vire","nom":"Millerie","type":"Château","periode":"XV-XVI","histoire":"MILLERIE, le château primitif est construit aux XVe et XVIe siècles par la famille Le Moussu. Il est remanié au XVIIe siècle par Jean-Baptiste Pinel du Hamel, avec l'aide de son père et de son frère, tous trois architectes du Roi  du prince de Monaco. Le parc possède deux arbres classés au label départemental des arbres remarquables:  un cèdre du Liban d'une hauteur de 20 mètres et d'une envergure de 10 mètres, daté de 1820, et un cèdre de l'Atlas, haut de 20 mètres et d'une envergure de 13 mètres, daté de la fin du XIXe siècle. Au milieu du XXe siècle la propriété appartenait à M. Noël.","architecture":"MILLERIE, le château de la Millerie comporte deux pavillons encadrant un corps central dominé par un fronton classique et conserve de hauts toits d'ardoise, est une demeure historique de la Manche située à Tessy-Bocage. Le château primitif est construit aux XVe et XVIe siècles, présente un fronton classique et des hauts toits en ardoise. Il est entouré de deux pavillons, encadrant le corps de logis central.","habitants":"famille Le Moussu\r\n        \r\n        \"","divers":"Château de la Millerie à Tessy sur Vire                                                         Gps  48°58'22.0\"N 1°03'38.6\"ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Millerie_1.jpg","../../jctruffet.com/image/image_50/50_Millerie_2.jpg"]},"Consult_chateau_formulaire703d":{"id":"Consult_chateau_formulaire703d","dept":"50","canton":"Pontorson","commune":"Mont-St-Michel","nom":"Mont_St_Michel","type":"Forteresse","periode":"XIII","histoire":"Deux châteaux dans cet atricle le Mont-st-Michel et Roche Torin.                                                                                    MONT-ST-MICHEL elle tire son nom de l'îlot rocheux consacré à Saint-Michel où sélève aujourdhui labbaye du Mont-Saint-Michel. Larchitecture du Mont-Saint-Michel et sa baie en font le site touristique le plus fréquenté de Normandie et l'un des dix plus fréquentés en France, premier site après ceux d'Île-de-France avec près de deux millions et demi de visiteurs chaque année. Une statue de saint-Michel placée au sommet de léglise abbatiale culmine à 157,10 mètres au-dessus du rivage. Élément majeur, l'abbaye et ses dépendances sont classées au titre des M.H. par la liste de 1862  (60 autres constructions étant protégées par la suite) ; l'îlot et le cordon littoral de la baie figurent depuis 1979 sur la liste du patrimoine mondial de lUNESCO ainsi que le moulin de Moidrey depuis 2007. Par ailleurs le mont bénéficie d'une seconde reconnaissance mondiale en tant qu'étape des chemins de Saint-Jacques-de-Compostelle en France pour « les pèlerins du Nord de l'Europe (qui) passaient par le Mont lorsqu'ils se rendaient en Galice ». En 2018, la commune comptait 30 habitants, appelés les Montois. L'îlot du mont Saint-Michel est devenu au fil du temps un élément emblématique du patrimoine français.                                                                                        A Courtils le manoir de la ROCHE-TORIN à cinq K.M. à l'est transformé en chambres d'hôtes par la famille Barreaux.","architecture":"MONT-ST-MICHEL, apparaît comme une montagne circulaire qui semble saffaisser sous la pyramide monumentale qui la couronne. On voudrait prolonger sa cime en une flèche aiguë qui monterait vers le ciel (la flèche actuelle ne date que de 1899), dominant son dais de brouillards ou se perdant dans une pure et chaude lumière. De vastes solitudes lenvironnent, celle de la grève ou celle de la mer, encadrées dans de lointaines rives verdoyantes ou noires. L'enceinte fortifiée de la ville est commencée à la suite des largesses de saint Louis venu en pèlerinage en 1254, avec l'édification de la tour du Nord. le village, à cette époque, beaucoup plus petit, groupait ses maisons tout en haut du rocher près de l'entrée de l'abbaye. L'enceinte urbaine date des XIIIe?-XVIe siècle. Elle est destiné à protéger le mont et son abbaye, notamment lors de la guerre de Cent Ans. Cette enceinte, qui ne ceinturait que le sommet du Mont, entre la tour du Nord, l'église paroissiale et les murs du logis abbatial, sera achevée par l'abbé Guillaume du château. Les remparts urbains que l'on voit aujourd'hui sont pour l'essentiel luvre de l'abbé Robert Jollivet, qui fera plus tard allégeance au roi Henri V d'Angleterre. Ils seront complétés vers 1430 par le capitaine Louis d'Estouteville (la barbacanne du Roi) et au XVIe siècle par Gabriel du Puy, lieutenant du Mont pour le roi François Ier (éperon de la tour Boucle, porte de l'Avancée, tour Gabriel.","habitants":"Mont Louis d'Estouteville                                                                      Roche  famille Barreaux\r\n        \"","divers":"Deux châteaux dans cet atricle le Mont-st-Michel et Roche Torin grav-7.            Le Mont Saint-Michel  gps 48° 38' 10\" nord, 1° 30' 41\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Mont_St_Michel_1.jpg","../../jctruffet.com/image/image_50/50_Mont_St_Michel_2.jpg","../../jctruffet.com/image/image_50/50_Mont_St_Michel_3.jpg","../../jctruffet.com/image/image_50/50_Mont_St_Michel_4.jpg","../../jctruffet.com/image/image_50/50_Mont_St_Michel_5.jpg","../../jctruffet.com/image/image_50/50_Mont_St_Michel_6.jpg","../../jctruffet.com/image/image_50/50_Mont_St_Michel_7.jpg"]},"Consult_chateau_formulaire84d7":{"id":"Consult_chateau_formulaire84d7","dept":"50","canton":"Val-de-Saire","commune":"Montfarville","nom":"Montfarville","type":"Manoir","periode":"XVI","histoire":"MONTFARVILLE, le roi d'Angleterre, Jean sans Terre, aurait séjourné, à plusieurs reprises, au château de Montfarville situé au hameau du Castel. Ce château a été détruit le 13 juillet 1346, au lendemain du sacre de Saint-Vaast et la veille de celui de Barfleur, par Edouard III et son fils le Prince Noir. Depuis, un manoir a été édifié sur la motte féodale. Les seigneurs de Montfarville appartenait à la famille Folliot, lignage dont est issu Gilbert Folliot, évêque de Londres de 1163 à 1187. \" Il y a un manoir château à Montfarville, longtemps chambres d'hôtes, c'est devenue une résidence privée. Le château accueillait des hôtes de marque comme en 1200 Jean sans Terre. Vers 1560 le château appartenait aux du Parc. Sous Henri III en 1589 il fut incendié par des ligueurs. On le rebâtit à nouveau tel qu'il est aujourd'hui . Madame de Crenays et son mari habitaient aussi le château de Montfarville. Elle y fut même assiégée en 1589 par les Ligueurs, parce que ses deux fils servaient dans le parti du roy, et elle aurait péri ainsi que sa petite-fille, Jacqueline du Parc, si ses vassaux n'étaient venus à son secours.","architecture":"MONTFARVILLE,  ce manoir fut bâti sur les contreforts d'un château  Le manoir actuel de Montfarville a dû remplacer un château à motte, clos de murs et de fossés, et qui fut détruit en 1356. On sait que les Anglais, dans leurs guerres contre la France, dans le 14e siècle, pillèrent, brûlèrent et dévastèrent, entre autres châteaux, celui de Montfarville. On remarquait encore, il y a quelques années, les traces des fossés, les restes de la motte de l'ancien château et de sa chapelle, fondée par Guillaume Folliot, vers la fin du XIIe siècle. On trouve, dans le courant du XVIIe siècle, les Duparc comme seigneurs châtelains de Montfarville.","habitants":"famille Folliot et  Madame de Crenays \r\n        \"","divers":"Château de Montfarville            gps 49° 39' 16\" nord, 1° 16' 11\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Montfarville_1.jpg","../../jctruffet.com/image/image_50/50_Montfarville_2.jpg","../../jctruffet.com/image/image_50/50_Montfarville_3.jpg"]},"Consult_chateau_formulaire95e7-2":{"id":"Consult_chateau_formulaire95e7-2","dept":"50","canton":"Saint-Lô","commune":"Rémilly-sur-Lozon","nom":"Montfort_Rémilly","type":"Vestiges","periode":"XV-XVI","histoire":"MONTFORT, le château actuel, qui a connu son apogée au XVIIe siècle, a été construit, à partir de 1522, par la famille Marquetel de Montfort qui le conservera jusqu'en 1755. La famille Marquetel de Montfort, est une famille de magistrats bas-normands anoblie en 1478, dans un style intermédiaire, empruntant au Moyen-Âge son allure générale mais avec de grandes fenêtres à meneaux préfigurant les châteaux de style Louis XIII et Renaissance. En 1522, le seigneur Marquetel de Montfort fait l'acquisition du fief de Mons  et décide de construire à l'emplacement d'un ancien manoir une nouvelle demeure. En 1755, meurt au château le dernier représentant de la famille, Laurent-Félix de Marquetel.  Une partie du château est dès cette époque très dégradé, notamment le manoir qui avait servi de base au nouveau château. Vers le milieu du XVIIIe siècle, le château est entre les mains d'un certain Lempereur, qui envisagea de le restaurer, mais il ne donna pas suite à son projet et le château continua à se délabrer au fil du temps. L'un de ses descendant, vers 1840, fit abattre les murs les plus atteints par les intempéries et le château transformé en carrière de pierres. Épargné lors de la Seconde Guerre mondiale, le château, sans entretien, tombe néanmoins en ruine.","architecture":"MONTFORT, ce château a la particularité de ne pas posséder de parties anciennes, vestiges d'une forteresse construite sur une motte. L'origine de ce premier château est restée inconnue, peut-être y avait-il une famille de Montfort, seigneur du lieu au moyen-âge. Le château date de la Renaissance, fin du XVe et début du XVIe siècle. Il a été en grande partie détruit au XIXe siècle. La partie subsistante comporte un élégant porche d'entrée, un logis seigneurial ainsi que des communs d'aspect plus modeste. Vers l'Est, ne subsistent que les substructions de l'ancienne chapelle castrale. A l'Ouest près d'un mur d'enceinte extérieur, se trouve un beau colombier. L'enceinte formait un quadrilatère dont restent les façades ouest et sud. L'entrée principale, au sud, devait supporter un pont-levis, car les trous des chaînes de relevée sont encore visibles. Une autre porte, plus petite et munie d'une herse, est située à sa gauche. Ces deux portes sont en parfait état de conservation. Les vestiges du château ont fait lobjet de restauration à partir de 1990  .En 1980, l'association les Amis du château de Montfort l'achète. Il n'y a alors plus aucun plancher, ni toiture. Les pièces sont encombrées de gravats, et des arbres qui poussent à l'intérieur. Dès lors, l'association entreprend d'importants travaux de restauration, charpentes, maçonnerie, couverture, plancher, carrelage et met en place des chantiers de jeunes en difficulté avec l'association Rempart. En 2020, la maison de garde, la porterie et les communs ont été restaurés et accueille des expositions. De la partie seigneuriale, dont il ne reste qu'un tiers des bâtiments d'origine, elle est restée en l'état, Éléments protégés MH : le château de Montfort (ensemble des ruines) : inscription par arrêté du 29 décembre 1978.","habitants":"famille, de Marquetel de Montfort\r\n        \"","divers":"Vestiges du châteaux de Montfort à Rémilly-sur-Lozon.                                      gps  49° 11' 30\" N, 1° 16' 13\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_1.jpg","../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_2.jpg","../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_3.jpg","../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_4.jpg","../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_5.jpg","../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_6.jpg","../../jctruffet.com/image/image_50/50_Montfort_R%c3%a9milly_7.jpg"]},"Consult_chateau_formulairee61b":{"id":"Consult_chateau_formulairee61b","dept":"50","canton":"La Hague","commune":"Urville-Nacqueville","nom":"Nacqueville","type":"Château","periode":"XVI","histoire":"NACQUEVILLE, cest Jean V de Grimouville qui bâtit le premier château, au début du XVIe siècle. Demeurée dans cette famille  jusquen 1685, la propriété est achetée par Bernardin Mangon, sieur du Coudray, en 1689. Le nouveau maître des lieux, souhaitant mettre la vieille demeure au goût du jour, fait reconstruire laile droite du logis et abattre les hautes murailles dont il conserve toutefois la poterne dentrée. Transmis par héritage, Nacqueville échoit, en
