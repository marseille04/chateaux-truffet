1833, à Emilie Erard de Saint-Rémy qui épouse peu après Hippolyte Clérel, comte de Tocqueville. A cette époque, latmosphère du domaine est encore champêtre. Le manoir apparaît comme un corps de ferme qui ne sinscrit pas encore dans un cadre paysager. Le comte de Tocqueville fait reconstruire la partie centrale du château et fait appel à un paysagiste anglais pour créer un parc romantique autour. Après la modification du tracé de lallée dentrée, sur le coteau nord, les travaux commencent vers 1835. Les cours deau sont utilisés pour aménager des cascades et une fontaine, létang est recentré pour devenir le miroir des bâtiments. De vastes pelouses, plantées darbres dornement, de rhododendrons et dhortensias, entourent lensemble. La vallée, en aval, est dégagée pour offrir une perspective vers la mer, tandis que les coteaux environnants sont plantés de feuillus et de conifères. Lécrin du château semble enfermé, tel un îlot de calme et de beauté, dans une couronne boisée qui lisole du monde. Il ne se découvre quau débouché de la longue allée dentrée, bordée de pins, en un seul coup dil embrassant tout le panorama.","architecture":"NACQUEVILLE, en 1857,  Après les décès dHippolyte de Tocqueville et de son épouse, le domaine est acheté, en 1880, par Hildevert Hersent, ingénieur en hydraulique renommé. Celui-ci modernise le château et améliore le système hydraulique en régulant les eaux par une série de barrages et de vannes. Hildevert Hersent fait construire, à lentrée du parc, un pavillon de concierge et un lavoir en rocaille sur la rivière des Castelets. Près du château, des rocailleurs sont mis à contribution pour embellir les cascades, créer une grotte et bâtir un kiosque dans les bois. En 1919, le domaine revient à lun de ses fils, Jean Hersent, qui entretient la propriété jusquà la seconde guerre mondiale. En 1943, le château est occupé par larmée allemande.  En 1944, larmée américaine bouleverse le parc pour y installer un état-major et des baraquements de GIs. Les pelouses sont nivelées, la rivière canalisée est recouverte, 20 hectares de prairies sont transformés en cité et un camp de prisonniers est installé sur le plateau en lisière des bois. En 1946, Marcel Hersent récupère la propriété dans un état catastrophique. Le château est en ruine, le parc est saccagé et les bois sont très endommagés. Pendant plus de 10 années, il va sattacher à effacer les dommages causés par la guerre. En 1962, fier de son uvre, il ouvre le parc au public. Demeuré dans la famille Hersent, le château de Nacqueville retrouve peu à peu son ambiance originelle, grâce aux efforts accomplis, depuis la guerre, par les générations successives.  Éléments protégés MH : la porte à pont-levis flanquée de deux tours: inscription par arrêté du 16 mai 1944. Le parc avec l'ensemble de ses aménagements hydrauliques : inscription par arrêté du 20 novembre 1992.","habitants":"famille Grimouville et famille Hersent\r\n        \"","divers":"Nacqueville GPS : 49° 39' 44\" Nord, 1° 43' 23\" Ouest","gps":"49° 39' 44\" Nord, 1° 43' 23\" Ouest","images":["../../jctruffet.com/image/image_50/50_Nacqueville_1.jpg","../../jctruffet.com/image/image_50/50_Nacqueville_2.jpg","../../jctruffet.com/image/image_50/50_Nacqueville_3.jpg","../../jctruffet.com/image/image_50/50_Nacqueville_4.jpg","../../jctruffet.com/image/image_50/50_Nacqueville_5.jpg"]},"Consult_chateau_formulaire9736":{"id":"Consult_chateau_formulaire9736","dept":"50","canton":"Carentan","commune":"Neuville-au-Plain","nom":"Neuville_au_Plain","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article ; Grandval et Marieville.            GRANDVAL, château construit par un fils de Charles Claude Audrey avant 1746 à l'emplacement d'un ancien manoir encore habité en 1729 ; propriété des Bauquet de Granval dans la première moitié du XIXe siècle.                                                                                                         A deux K.M, à L'Est Mareivlle  à Beuzeville le Plain .                       MARIEVILLE   situé au lieu-dit le château de Beuzeville, ce château dit aussi manoir de Mariéville, possède un corps de logis de plan régulier construit dans la première moitié du XVIe siècle. Il est composé d'un étage de soubassement, un étage carré et étage en surcroit, des percements ont été effectué au cours du XVIIIe siècle.\r\nÉléments protégés MH : les façades et les toitures du château, à l'exclusion du bâtiment attenant façade est ; les façades et les toitures des communs : inscription par arrêté du 25 août 2005.","architecture":"GRANDVAL, l'édifice, de plan symétrique, se compose d'un étage carré. Le gros-oeuvre est en calcaire; moellon et enduit, élévations ordonnancées surmontées de toit à longs pans; pignon couvert; croupe; toit en pavillon, couverts d'ardoise.Éléments protégés MH : le château avec son décor intérieur ; les communs ; le parc avec ses murs ; le potager avec ses douves et la cour d'honneur avec ses murs de clôture : inscription par arrêté du 6 septembre 1993.","habitants":"Charles Claude Audrey\r\n        \"","divers":"Deux châteaux dans cet article ; Grandval grav-1 et Marieville grav-2.   Grandval  GPS : 49°25'47,46\" Nord, 1°19'49,95\" Ouest                                                                                       Marieville GPS : 49° 25' 46,26\" Nord, 1° 17' 1,08\" Ouest","gps":"49°25'47,46\" Nord, 1°19'49,95\" Ouest","images":["../../jctruffet.com/image/image_50/50_Neuville_au_Plain_1.jpg","../../jctruffet.com/image/image_50/50_Neuville_au_Plain_2.jpg"]},"Consult_chateau_formulairec489":{"id":"Consult_chateau_formulairec489","dept":"50","canton":"Saint-Lô-d","commune":"Saint-Lô-d","nom":"Parc_St_Lo","type":"Château","periode":"XV","histoire":"PARC, le toponyme, le Parc suggère lexistence dun parc seigneurial à lépoque médiévale. Lactuel domaine du Parc dOurville, pour sa plus grande partie, était le Parc seigneurial du château dOlonde. Il en aurait été détaché pour constituer le domaine réservé dun nouveau fief noble crée au profit dun cadet de famille. Ce démembrement qui a pu avoir lieu entre 1205, année où Philippe-Auguste, nouveau maître de la Normandie, donna Olonde à son fidèle serviteur Richard dArgences et 1220, année où le registre des fiefs de Philippe-Auguste nous apprend que Guillaume dArgences tenait la quatrième partie dun fief de chevalier prés dOlonde. Le plus ancien aveu du roi pour le fief du Parc mentionne que son possesseur doit au roi le service, au château du Plessis, dun homme armé durant dix jours. Collibeaux de Criquebeuf rendit aveu au roi pour le Parc dOurville, le 14 novembre 1403. Il était membre de la célèbre famille dEstouteville. Henri V dAngleterre confisqua le fief du Parc et le donna à Jehan dArgouges à cause de la rébellion de Collibeaux de Criquebeuf. Le 31 août 1429, un accord passé entre Jean dArgouges et Thomas de Clamorgan fut confirmé à Vernon par loncle du roi Henry V dAngleterre, Jean, régent du royaume de France et duc de Bedford. Par cet accord, Jean dArgouges quitta, transporta et délaissa le fief du Parc à Thomas de Clamorgan, son beau-frère. En 1436, il fut maintenu dans la possession de ses biens propres par le roi de France Charles VII, mais tenu de restituer à leur anciens propriétaires les biens que les anglais lui avaient concédés. Cependant il était encore seigneur du Parc en 1438, année où il rendit aveu pour ce fief. En cette même année 1438, il est dit seigneur du Parc dans un document concernant les salines de Portbail.","architecture":"PARC, le fief du Parc fut restitué aux enfants de Collibeaux de Criquebeuf : Simon dEstouteville, seigneur de Criquebeuf, Chamelles, Missy, Brucourt, du Han, dAnneville et du Parc et Perrette dEstouteville, dame de Criquebeuf, Chamelles, Missy, Brucourt, du Han, dAnneville et du Parc. Perrette dEstouteville, dame du Parc et autres lieux, épousa Richard de la Rivière, seigneur de Gouvis. Plusieurs membres de cette famille se sont distingués dans les armées du roi de France pendant la guerre de Cent-Ans. Bertran de la Rivière, fils de Richard et de Perette dEstouteville, seigneur du Parc, Anneville, Criquebeuf, la Fère, Missy et Saint-Germain du Crioult, fut reconnu noble à Ourville (Saint-Lô dOurville) par Montfaut en 1463. Il épousa Jeanne de Briqueville, fille de Roger, seigneur de Laune. Leur fils, Jacques de la Rivière, seigneur du Parc et Anneville, épousa Marguerite du Mesnildot. François de la Rivière, seigneur du Parc (aveu du 15 avril 1514) qui produit sa généalogie le 14 juillet 1523 à Valognes. Le 4 Brumaire an VII (25 octobre1798) vente du Parc par Anne Eustache Rose Charlotte Osmond, veuve de M. le marquis de Sainte-Suzanne, demeurant à Golleville, à M. Jean François Coquoin, magistrat, demeurant à Bricquebec. (En réalité, le marquis avait émigré, ils divorcèrent pour les besoins de la cause et se remarièrent en 1802). Aujourd'hui c'est un ensemble architectural médiéval unique à découvrir : un ensemble défensif exceptionnel. \r\nÉléments protégés MH : le corps de logis principal avec son aile en retour, en totalité ; l'ensemble défensif à l'ouest du logis ; les façades et les toitures du pressoir et du moulin ; la chapelle, en totalité ; dans la basse-cour : les façades et les toitures de la grange, des communs ouest et des deux charretteries, ainsi que le porche ; les douves, le vivier et le jardin fossoyé : inscription par arrêté du 27 novembre 2000.","habitants":"Divers seigneurs\r\n        \r\n        \"","divers":"Château du Parc à St-Lo d'Ourville Gps 49° 06' 41? N, 1° 06' 26? Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Parc_St_Lo_1.jpg","../../jctruffet.com/image/image_50/50_Parc_St_Lo_2.jpg","../../jctruffet.com/image/image_50/50_Parc_St_Lo_3.jpg","../../jctruffet.com/image/image_50/50_Parc_St_Lo_4.jpg","../../jctruffet.com/image/image_50/50_Parc_St_Lo_5.jpg","../../jctruffet.com/image/image_50/50_Parc_St_Lo_6.jpg"]},"Consult_chateau_formulaire198d":{"id":"Consult_chateau_formulaire198d","dept":"50","canton":"Créances","commune":"Pirou","nom":"Pirou","type":"forteresse","periode":"XII","histoire":"Deux châteaux dans cet article Pirou et Forges à Gouville.                   PIROU, forteresse du XIIe siècle, l'une des plus populaires du cotentin, prétend rattacher l'origine de ce château fort aux invasions scandinaves. Un chevalier de Pirou participa à la conquête de l'Angleterre et reçu un domaine dans le Somerset où sa famille fonda Stoke Pero. Suite aux sièges de la guerre de cent ans, le château fort fut restauré au XVe, XVIIe et XVIIIe siècle.  En son état actuel, le château fort édifié sur une île au milieu d'un étang artificiel, conserve des remparts du XIIe et du XIVe siècle dans sa partie la plus ancienne. Pour y accéder, il faut franchir cinq portes fortifiées en tournant autour de la douve centrale où se trouvent la boulangerie bâtie au XVIIIe siècle, par la famille de Vassy, le pressoir, la salle des Plès, la chapelle seigneuriale Saint Laurent et les anciennes écuries. Une basse-cour mène à l'intérieur de l'enceinte par un pont de pierre, il a remplacé le pont-levis au XVIIe siècle. Les remparts protègent le vieux logis du début du XVIIe siècle à l'Est et le neuf logis du début du XVIIIe siècle au sud. Du donjon subsiste, à l'Ouest, la terrasse surélevée. Sous l'égide de l'Abbé Marcel Lelégard, la Fondation Abbaye de la Lucerne en 1981 acquisition du château par la fondation\"abbaye de la Lucerne\" qui poursuit sa reconstruction.","architecture":"Au sud de Pirou à Gouville sur mer le château des Forges;                               FORGES de Dorothée Desbois, le domaine du château des Forges sétend sur 6500 m² de verdure et clos de jolis murs en pierre. Chambres d'hôtes , corps de logis central de plan rectangulaire sour soubassement à trois étages avec combles, l'édifice est accolée de pavillons sur flanc droit et gauches sur soubassement et saillant deux étages toits en croupes.                                                                                  PIROU,   il date du XIIe siècle et est d'époque médiévale. Le château appartient depuis à l'Abbaye de la Lucerne, est privé, mais reste ouvert à la visite. Le château de Pirou est un château fort construit au XIIe siècle (le plus ancien de Normandie) en achèvement de restauration : une des deux uvres maîtresses, avec l'abbaye de La Lucerne. La maçonnerie est à l'ancienne, les charpentes et plafonds sont remarquablement réalisés par les ateliers Aubert-Labansat et les toitures sont en lauzes. Il est inscrit aux M.H. depuis le 4/07/1968. Éléments protégés MH : les façades et les toitures ; les abords du château : inscription par arrêté du 4 juillet 1968.","habitants":"Pirou; Famille de Vassy \r\n        \"","divers":"Deux châteaux dans cet article Pirou et Forges à Gouville grav 6.  GPS : 49° 10' 00\" Nord, 1° 34' 04\" Ouest.","gps":"49° 10' 00\" Nord, 1° 34' 04\" Ouest.","images":["../../jctruffet.com/image/image_50/50_Pirou_1.jpg","../../jctruffet.com/image/image_50/50_Pirou_2.jpg","../../jctruffet.com/image/image_50/50_Pirou_3.jpg","../../jctruffet.com/image/image_50/50_Pirou_4.jpg","../../jctruffet.com/image/image_50/50_Pirou_5.jpg","../../jctruffet.com/image/image_50/50_Pirou_6.jpg"]},"Consult_chateau_formulaire95f2":{"id":"Consult_chateau_formulaire95f2","dept":"50","canton":"Bricquebec","commune":"Négreville","nom":"Pont_Rilly","type":"Château","periode":"XVIII","histoire":"PONT-RILLY, un premier manoir, assez modeste, a dû se constituer au temps de Richard Le Cesne, bailli de Cotentin de 1577 à 1590. En 1765, Hyacinthe-Paul-Charles de la Houssaye, marquis dOurville, marié avec Ambroisine Doisnel de Montécot, charge Pierre-Raphaël de Lozon, architecte à Saint-Lô, de transformer le château. A partir de Juillet 1944 et jusqu'à la fin de la guerre, le château fut le quartier général de l'Advance Section of Com Z.","architecture":"PONT-RILLY, une chapelle, un pavillon, des étables, des granges, un moulin et une boulangerie ont été ajoutés en 1774 pour rendre l'ensemble plus harmonieux. L'intérieur du château est resté inchangé depuis le XVIIIe siècle : parquet de Versailles, magnifiques boiseries et cheminées en marbre dans chaque chambre, le tout meublé avec des meubles anciens. Il a été négligé pendant presque un siècle quand, en 1982, le dévouement de ses propriétaires actuels, Jean-Jacques et Annick Roucheray le sauvèrent d'un déclin certain. Ils ont rénové le château avec les règles de l'Art et lui firent retrouver les splendeurs de la gloire passée. La construction du château de Pont-Rilly date du XVIIIe siècle. Éléments protégés MH : le château : les façades et les toitures, y compris la terrasse ; le vestibule et la cage d'escalier ;  Les façades et les toitures du pavillon Est. Chapelle. Façades et toitures des remises et des écuries ; la serre ; les façades et les toitures du moulin et de ses dépendances ; les façades et les toitures de la boulangerie ; le colombier ; les façades et les toitures des bâtiments de la ferme ; l'avenue d'honneur, la cour d'honneur, la basse-cour et le parc ordonnancé avec les ponts, les canaux et le décor architectural : inscription par arrêté du 26 juillet 1985.","habitants":"Hyacinthe-Paul-Charles de la Houssaye, \r\n        \"","divers":"Chârteau de Pont-Rilly à Négreville GPS : 49° 29' 23\" Nord 1° 32' 50\" Ouest","gps":"49° 29' 23\" Nord 1° 32' 50\" Ouest","images":["../../jctruffet.com/image/image_50/50_Pont_Rilly_1.jpg","../../jctruffet.com/image/image_50/50_Pont_Rilly_2.jpg"]},"Consult_chateau_formulaire6c77":{"id":"Consult_chateau_formulaire6c77","dept":"50","canton":"Bréhal","commune":"St-Jean des Champs","nom":"Pont_Roger","type":"Château","periode":"XVII","histoire":"PONT-ROGER, un premier château construit au XIIe siècle a brûlé. Il était sur lemplacement de la motte du manoir de Saint-Jean-des-Champs, doù les Lamotte de Pont-Roger ont tiré leur nom. Cette famille donne un défenseur au Mont Saint-Michel au XVe siècle, il y était avec un membre de la famille de Bricqueville. Pancrace de la Motte fait construire le château actuel en 1691. François-Claude de Bricqueville, propriétaire du château sous la Révolution, doit émigrer en Angleterre,  à son retour en avril 1796, il découvre sa femme dansant avec les républicains; arrêté un peu plus tard, il est fusillé à Coutances. Cette famille donna un défenseur au Mont Saint-Michel au XVe siècle, il y était avec un membre de la famille de Bricqueville dont un des descendants, Armand de Bricqueville, propriétaire du château sous la Révolution. Le domaine appartenait au milieu du XXe siècle à M. Alain Charveriat.","architecture":"PONT-ROGER, belle demeure construite vers 1690, annoncée par une belle grille. Ce château sest élevé sur lemplacement de la motte du manoir de Saint-Jean-des-Champs, doù les Lamotte de Pont-Roger ont tiré leur nom. Surplombant un étang, le château est précédé par une cour dhonneur fermée par une grille imposante : une grande allée continuait autrefois vers lest en prolongeant la vue. À chaque extrémité de la grille se dresse un pavillon : celui du sud contient la chapelle. Le bâtiment, coiffé dun toit à la Mansard, est constitué dun corps central en faible avancée surmonté dun fronton triangulaire et encadré par deux pavillons.\r\nLa façade sur le jardin, avec son beau perron à double révolution, est assez différente : lajout de persiennes au XIXe siècle lui donne un aspect beaucoup plus horizontal. Les façades et les toitures du château, des deux pavillons d'entrée dont un refermant la chapelle et du bâtiment sud des communs avec ses deux tours, et le portail d'entrée avec sa grille, sont inscrits au titre des M.H. depuis le 13 février 1975.","habitants":"famille de Bricqueville \r\n        \"","divers":"à St-Jean des Champs château de Pont-Roger gps 48° 49' 39\" nord, 1° 27' 53\"  ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Pont_Roger_1.jpg","../../jctruffet.com/image/image_50/50_Pont_Roger_2.jpg","../../jctruffet.com/image/image_50/50_Pont_Roger_3.jpg"]},"Consult_chateau_formulaire1c59":{"id":"Consult_chateau_formulaire1c59","dept":"50","canton":"Les Pieux","commune":"Portbail","nom":"Portbail","type":"Château","periode":"XII-","histoire":"Trois châteaux à Portbail; Dicq, Lanquetot et Montfiquet.                DICQ, le fief du Dicq sétendait sur Portbail, Gouey, Saint Lô dOurville, Saint Jean et Saint Georges de la Rivière et le Mesnil. A lorigine, il dépendait de la baronnie de Néhou. En 1283, à la suite du partage de cette baronnie, il fut inclus dans la baronnie dite dOrglandes. Mais à la fin du XIVe siècle, il relevait directement du roi. Lactuel manoir du Dicq a été construit par Pierre du Castel, écuyer, seigneur de La Balle dAubigny qui avait acheté la terre du Dicq en 1549. Il a été remanié par les Vivien à la fin du XVIe siècle puis par les Poërier de Portbail au début du XVIIe siècle. Gilles Poërier épousa Suzanne Vivien, fille de Pierre Vivien, et par ce mariage devint seigneur du Dicq. La cour est entièrement fermée par des constructions à laspect trapu et solide, munis par endroits de solides et massifs contreforts. La façade sur cour est percée de fenêtres dont les meneaux ont disparu. A la partie gauche du logis, un escalier extérieur mène, quand on a franchi la porte à fronton triangulaire, dans une grande salle dotée d'une imposante cheminée à colonnettes, chapiteaux corinthiens et corniche. Éléments protégés MH : la cheminée Renaissance : inscription par arrêté du 10 novembre 1928.","architecture":"LANQUETOT, le plus ancien possesseur connu est Roger de Lanquetot, chevalier, qui, au XIIIe siècle, céda à labbaye de Lessay tout le droit quil avait ou prétendait avoir en léglise Notre-Dame de Portbail et en ses chapelles parce que labbé de Lessay, patron du prieuré et de léglise Notre-Dame de Portbail, lui laissait la liberté de bâtir une chapelle en son manoir de Lanquetot. En 1615, noble homme Jean Besnard échangea la terre et le manoir de Lanquetot avec Gilles Poërier, seigneur du Dicq, contre dautres héritages. A la veille de la révolution, Lanquetot appartenait à François Bonnaventure Corentin de Mauconvenant, marquis de Sainte-Suzanne et son frère Adolphe-Charles de Mauconvenant, chevalier puis marquis de sainte-Suzanne. Le fief de Lanquetot dépendait de celui du Parc à Saint-Lô-dOurville. Le seigneur de Lanquetot devait au seigneur du Parc, le jour de la Saint-Hilaire, 30 sols de rente censive quil devait apporter au manoir du Parc.                                                                        MONTFIQUET, il a appartenu aux Montfiquet, sieurs de Montigny                ( Yvetot-Bocage ) et de Saint-Siméon  ( Portbail ), qui avaient pour armes un écu  » dargent au léopard passant de sable « . Ces armoiries se voyaient autrefois sur un vitrail du manoir de Portbail. Elles se voient encore actuellement au-dessus de la porte piétonne du manoir de Montigny à Yvetot-Bocage. Un Montfiquet aurait été chevalier, en 1066, dans la troupe de Néel de Saint-Sauveur lors de la conquête de lAngleterre. Cependant, la noblesse des Montfiquet, sieurs de Montigny et Saint-Siméon, date seulement du XVIe siècle: lors de la recherche de Chamillard, en 1666, les Montfiquet font remonter leur noblesse à Richard de Montfiquet qui vivait vers 1550 à Saint-Martin de Blagny.\r\nLe dernier des Montfiquet, Jean Antoine, neut que deux filles: Marie Louise qui épousa François Hervé de Lemperière, écuyer, seigneur de Rouville ( Orglandes ) et Susanne Françoise, dame de Montigny, qui épousa René Joseph Philippe, sieur de Marcambie.","habitants":"Famille de Poërier de Portbail                                   Lanquetot,  François Bonnaventure                                          Famille de Montfiquet\r\n        \"","divers":"Trois châteaux à Portbail; Dicq, Lanquetot et Montfiquet.   GPS : 49° 22' 06\" Nord, 1° 40' 00\" Ouest","gps":"49° 22' 06\" Nord, 1° 40' 00\" Ouest","images":["../../jctruffet.com/image/image_50/50_Portbail_1.jpg","../../jctruffet.com/image/image_50/50_Portbail_2.jpg","../../jctruffet.com/image/image_50/50_Portbail_3.jpg","../../jctruffet.com/image/image_50/50_Portbail_4.jpg"]},"Consult_chateau_formulaire4c85":{"id":"Consult_chateau_formulaire4c85","dept":"50","canton":"Val-de-Saire","commune":"Le Vicel","nom":"Pépinvast","type":"Château","periode":"XVI","histoire":"PEPINVAST,   à la date du 22 décembre 1605, un aveu rendu par François d'Aigremont, écuyer, sieur , indique que Pépinvast était une noble et franche vavassorie de onze cents vergées, avec manoir et maison. Grâce à ce tènement et vavassorie, ledit d'Aigremont était franc coutumier aux forêts du roi, en la vicomté de Valognes. Le château, lune des plus belles résidences de Normandie, rappelle, par son parc et par sa construction, les grands domaines anglais. La nature sest prêtée aux efforts des Le Marois. Propriétaires de Pépinvast, ils nont cessé, depuis cette époque, de lembellir et de lagrandir.  En 1819, Jean-Léonor-François, comte Le Marois achetait le château à M. dAigremont du Vicel, descendant dune ancienne famille. Dans le grand vestibule du château, aboutit un escalier monumental, présentant au bas de ses marches deux tigres en bois sculpté, uvre de lartiste Cain. On a édifié dans cette pièce une superbe cheminée, reproduction identique de la cheminée du château de Blois. En 1887, le comte Le Marois ajoutait encore, dans la même partie du château, une rotonde qui communique avec la grande galerie située près du vestibule. Ces deux pièces ne forment plus quun grand salon aujourdhui, orné dun plafond divisé en trois parties et peint sur toile par lartiste japonais Yamamoto.","architecture":"PEPINVAST, la propriété est surtout célèbre par son haras qui jette un véritable éclat sur lélevage,  composé de bâtiments fort bien aménagés et entouré de cent hectares dherbages, ce haras fut créé en 1871, à 800 mètres du château, sur la route de la Lande-Saint-Jean. Il commença par lélevage des chevaux de demi-sang et produisit de très bons chevaux de service et plusieurs bêtes de trot, comme Tam-Tam. De tels résultats font honneur à l'initiative du comte Jean-Polydor Le Marois, décédé le 26 décembre 1889. Il avait épousé Mademoiselle Marie-Mathilde Landon de Longeville, dont il eut deux enfants: Jane-Albertine-Marie Le Marois, qui épousa, en 1889, le comte André de Ganay, et Albert-Polydor, comte Le Marois. Il faut signaler que dans le parc de Pépinvast se trouve un camp romain, connu sous le nom de Castiaux de Pépinvast, appelé dans le pays Camp de César. Enfin, lannée suivante, on construisit, à peu de distance du château, les écuries et les remises de Pépinvast, avec sellerie de luxe, et lon plaça sur la façade, au-dessus de la marquise, un groupe en bronze, le sanglier attaqué par un chien, qui a figuré à lexposition de 1889. Éléments protégés MH : la sellerie, le lavoir et la terrasse avec ses murs dans le parc : inscription par arrêté du 20 novembre 1992.","habitants":"Famille de François d'Aigremont\r\n        \r\n        \"","divers":"Château de Pépinvast; GPS : 49° 37' 35\" Nord, 1° 20' 07\" Ouest","gps":"49° 37' 35\" Nord, 1° 20' 07\" Ouest","images":["../../jctruffet.com/image/image_50/50_Pepinvast_1.jpg"]},"Consult_chateau_formulairede27":{"id":"Consult_chateau_formulairede27","dept":"50","canton":"La Hague","commune":"Querqueville","nom":"Querqueville","type":"Château","periode":"XVII-XVIII","histoire":"QUERQUEVILLE, bâti vers 1730 dans la vallée des Floris. Il est brièvement occupé, en 1758, par les Anglais lors de leur débarquement offensif en Normandie. En 1777, il est la possession de Jean-Baptiste, Pierre et Auguste Bardou, avant de passer à la famille de Couville. En 1811, Napoléon Ier lorsqu'il qui vint à Saint-Lô et à Cherbourg le visite et aurait déclaré qu'il en ferait volontiers sa résidence d'été, ce qui n'eut jamais lieu. Au milieu du XIXe siècle, le château est la possession d'Henri Lucas de Couville. Depuis 1935, il est la propriété de la commune de Querqueville qui a décidé d'y établir la mairie.","architecture":"QUERQUEVILLE, se présente sous la forme d'un long bâtiment quadrangulaire, composé de caves à demi enterrées, d'un rez-de-chaussée surélevé et d'un étage. Sa façade s'agrémente en son milieu d'un large pavillon peu saillant, que borde deux pilastres en pierres de granit surmonté d'un fronton triangulaire. Il est percé au rez-de-chaussée d'une porte centrale à laquelle on accède par un perron en léger fer à cheval et à l'étage d'une seule grande fenêtre. Les deux ailes comporte deux registres de quatre fenêtres à arc surbaissé de chaque côté. À chaque extrémité de ces ailes, un pavillon à une fenêtre au rez-de-chaussée et une fenêtre à l'étage rappelle le pavillon central. Le toit avec sa pente moyenne laisse dépassé huit souches de cheminées. Les combles prennent le jour en façade par trois petites lucarnes assez simples. Deux dans chacune des deux ailes et une dans les pavillons d'extrémité.\r\nLa largeur assez peu commune du château, comporte également, un pavillon central, sous fronton triangulaire percé de deux fenêtres au rez-de-chaussée ainsi qu'à l'étage. De ce coté ce qui simule les ailes n'a que la largeur d'une fenêtre à chaque niveau et une lucarne de chaque côté dans la toiture. Comme partout ailleurs, les fenêtres sont à linteaux surbaissés.","habitants":"Famille Bardou et famille de Couville.\r\n        \"","divers":"Château de Querqueville gps 49° 39' 39\" N, 1° 42' 02\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Querqueville_1.jpg","../../jctruffet.com/image/image_50/50_Querqueville_2.jpg"]},"Consult_chateau_formulaire2422":{"id":"Consult_chateau_formulaire2422","dept":"50","canton":"Valognes","commune":"Quinéville","nom":"Quineville","type":"Château","periode":"XVII-XVIII","histoire":"QUINEVILLE,  appartenait au XIIe siècle à l'illustre famille de Montauban, qui conserva ce fief jusqu'à la guerre de Cent Ans. Le château de Quinéville a débuté en 1712 avec la construction du nouveau château, commandité par Guillaume Dancel, sur les voûtes de lancienne bâtisse du XIIe et XIIIe siècle qui avait accueilli en 1692 Jacques II Stuart et Marie de Modene, roi et reine dAngleterre lors de la Bataille de la Hougue. Le château de Quinéville, par jeu des successions et des accords matrimoniaux, rentre dans le patrimoine d'une riche famille de la région de Cherbourg, les Dancel qui le conserva pendant plus de 200 ans. En 1815, acquit par le comte Louis Du Mesnildot qui le restaure et l'agrémente d'un beau fronton Nord. Pendant la seconde guerre mondiale, alors que la propriété appartient à Mr de Vallois, le château de Quinéville est réquisitionné par lArmée allemande qui y installa son état-major. En 1942, le Maréchal Rommel ainsi que Hermann Goering et Joseph Goebbels y séjournèrent, lors de linspection du mur de lAtlantique. Lors du débarquement, le château de Quinéville fut très endommagé du côté Est  et de son grand escalier et ses communs furent incendiés. En 1976, Mme Lenoir-Lemaire rachèta le château dE Quinéville et entama une grande campagne de restauration. Afin de financer lentretien du château, celui-ci devint un hôtel-restaurant. En 2017, le château est acquis par la fondation Stiching sous la gouverne de Hans Musegaas. Ce Néerlandais passionné de châteaux, les gère et les restaure depuis plus de 20 ans. Il a apporté un nouveau souffle au château de Quinéville en le transformant en un lieu de vie, est devenu un hôtel-restaurant de standing avec une belle façade.","architecture":"QUINEVILLE, situé au cur du bocage Normand à proximité des légendaires plages du D-day, le château est une étape incontournable pour ceux qui veulent découvrir les richesses et l'histoire de pays Normand en alliant authenticité et confort. A partir de 1565 jusqu'à la Révolution,  Durant la Révolution le château allait être plus ou moins saccagé. Sur un parc de 12 hectares avec plan d'eau, le château construit au début du XVIIIe, résidence de James II Stuart, a conservé son âme et ses richesses historiques : une cheminée gallo-romaine, un pigeonnier, une glacière et une tour moyenâgeuse dans le parc, fouillis de fleurs. sur la cour d'honneur  le corps de logis à deux niveaux est encadré par deux ailes en retour d'équerre, en forte avancée, l'ensemble est construit  sur un sous sol occupant la surface totale du château, les toitures en croupes avec noues, en ardoises , le milieu de la façade est occupé par un corps central à trois travées, décoré par deux pilastres à colonnes ioniques  et surmontées d'un fronton triangulaire aux armes  de la famille Mesnildot et Monti. Un balcon en fer forgé de style Louis XV surplombe la porte d'entrée,  la façade arrière donnant sur le parte le pavillon central avec ses trois travées surmonté d'un fronton triangulaire sans sculpture, un escalier extérieur à double révolution accède la partie centrale.    Les jardins et les monuments du château sont ouverts au public. Hôtel restaurant.","habitants":"famille Jacques II Stuart et de Mesnildot et Monti \r\n        \r\n        \"","divers":"Château de Quinéville  GPS : 49° 30' 40,82\" Nord, 1° 17' 47,25\" Ouest","gps":"49° 30' 40,82\" Nord, 1° 17' 47,25\" Ouest","images":["../../jctruffet.com/image/image_50/50_Quin%c3%a9ville_1.jpg","../../jctruffet.com/image/image_50/50_Quin%c3%a9ville_2.jpg","../../jctruffet.com/image/image_50/50_Quin%c3%a9ville_3.jpg","../../jctruffet.com/image/image_50/50_Quin%c3%a9ville_4.jpg"]},"Consult_chateau_formulairefc83":{"id":"Consult_chateau_formulairefc83","dept":"50","canton":"Bricquebec","commune":"Rauville la Place","nom":"Rauville_la_Place","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article; Cour, Carreaux et Garnetot. GARNETOT,   manoir de Garnetot du XVIe siècle, inscrit au titre des M.H. depuis le 5 décembre 1979. Ce manoir est caractéristique du Cotentin. Un château s'élevait au XIVe siècle, fortifié de 1327 à 1347 par Edouard III d'Angleterre. Il était occupé par la garnison anglaise de Saint-Sauveur-le-Vicomte. Jean de Vienne reprit la forteresse en 1374. Les dates de construction du manoir s'échelonnent du XVe au XVIIe siècle. Il a conservé un aspect défensif avec cinq tours et des douves. L'ensemble comprend un bâtiment principal dont toutes les ouvertures ont été percées au XVIe siècle. Au sud, une tour d'escalier flanquée d'une échauguette a perdu son couronnement. Au nord, deux tours plus modestes se dressent de part et d'autre du pont. Sur la façade principale, une porte du XVIIe siècle avec un fronton interrompu par un blason, donne accès au manoir. A l'est de ce bâtiment se dresse un pavillon carré. Sur ce pavillon s'appuie perpendiculairement, au nord, un bâtiment orné d'une tour d'escalier en façade. Au XVIIe siècle, sur la façade arrière à l'ouest, un pavillon fut ajouté, se rattachant au bâtiment principal par une tour à moitié engagée, et d'une aile en saillie du XVe siècle sous laquelle un passage voûté donne accès au pavillon. Éléments protégés MH : les façades et les toitures ; le porche d'entrée : inscription par arrêté du 5 décembre 1979.","architecture":"COUR; manoir , siège de la seigneurie de Rauville au moins dès le XIIIe siècle, le manoir d'origine est remanié au XVIIe siècle. Il arbore une façade de style Louis XIII, avec des frontons triangulaires qui surmontent les fenêtres. C'est à la Cour que serait née la mère de Gilles de Gouberville.\r\nCARREAUX:  au Haut du Mont, haute demeure érigée dans le dernier quart du XIXe siècle en face d'un manoir du XVIe siècle. À l'origine, à la place du château du Mont-de-la-Place, il existe un manoir nommé « manoir des Carreaux », demeure de la famille Folliot des Carreaux. Il appartient  à Jean Folliot de Fierville, avocat au Parlement, seigneur des Carreaux, puis à son fils, Jean Folliot de Fierville (1605-1649), conseiller au Parlement, substitut du procureur du Roi en lélection de Valognes et enfin à Jean-François Folliot (1632-1678), mort quelques mois après l'incendie de sa maison des Carreaux, en 1677, « où tous les titres et papiers de famille furent consumés ». Son fils Jean-Jacques Folliot de Fierville (1670-1743) fit construire lhôtel de la Grimonnière, rue de Wéléat à Valognes, entre 1720 et 1722. Inhumé dans léglise des Cordeliers à Valognes, il est le dernier à porter le titre de sieur des Carreaux. Les générations suivantes ne portent plus le titre de seigneur des Carreaux. Parmi les fils de Jean-Jacques, Jean-Thomas Folliot (1699-1756), écuyer et capitaine général des canonniers gardes-côtes de Portbail Carteret, est seigneur de Fierville-les-Mines, il est inhumé dans le chur de léglise. Il est le grand-père paternel de Charles Folliot de Fierville (1819-1881), personnalité militaire. En 1871, pratiquement deux siècles après la destruction du manoir des Carreaux, les demoiselles Élia et Clotilde Ferrand de la Conté font construire le château du Mont-de-la-Place.","habitants":"Edouard III d'Angleterre famille Folliot des Carreaux.\r\n        \"","divers":"Trois châteaux dans cet article; Cour grav-1-2, Carreaux grav-3 et Garnetot grav-4-5-6 à Rauville la Place. Rauville gps 49° 23' 18\" nord, 1° 30' 17\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Rauville_la_Place_1.jpg","../../jctruffet.com/image/image_50/50_Rauville_la_Place_2.jpg","../../jctruffet.com/image/image_50/50_Rauville_la_Place_3.jpg","../../jctruffet.com/image/image_50/50_Rauville_la_Place_4.jpg","../../jctruffet.com/image/image_50/50_Rauville_la_Place_5.jpg","../../jctruffet.com/image/image_50/50_Rauville_la_Place_6.jpg"]},"Consult_chateau_formulaire0008":{"id":"Consult_chateau_formulaire0008","dept":"50","canton":"Cherbourg","commune":"Cherbourg en cotentin","nom":"Ravalet","type":"Château","periode":"XVI","histoire":"RAVALET, c'est un château, de style Renaissance, construit en 1562 à 1575. Ce château est en schiste bleu. Il est depuis la propriété de la Ville de Cherbourg-en-Cotentin, appartenait au domaine royal. Il fut vendu par François Ier. Jean II de Ravalet, seigneur de Tourlaville, l'acquie et fit construire sur le manoir dont seules les ruines de l'ancien donjon demeure, un château Renaissance, qu'il offrit à son neveu, Jean III. Il abrita les amours incestueuses de Julien et Marguerite de Ravalet, enfants de Jean III, qui leur valurent d'être décapités en place de Grève, à Paris, le 2/12/1603. Suite de graves problèmes financiers, les Ravalet vendirent le domaine à Charles de Franquetot, en 1653, qui fit améliorer l'aménagement intérieur avant de mourir, assassiné, sous les coups de son valet de chambre. Il passa ensuite de propriétaires en propriétaires, dont les Boudet de Crosville et les Fouquet de Réville, devenant une ferme, en 1661. Hervé Clérel de Tocqueville, père d'Alexis de Tocqueville, en furent les nouveaux propriétaires en 1777. Son petit-fils, René Clérel de Tocqueville, châtelain et maire de la commune, fit rénover le château, aménager le parc, la grotte et les jardins et fit construire une grande serre. Mais il fut contraint de le revendre en 1906. Utilisé comme hôpital durant la Première Guerre mondiale, le château est inscrit à l'inventaire des M.H. en 1930. La ville de Cherbourg se porte acquéreur du domaine en 1935. Il est occupé par l'armée allemande durant la Seconde Guerre mondiale et les troupes américaines à la Libération. Le château des Ravalet est inscrit aux M.H. depuis 1996.","architecture":"RAVALET, est une demeure caractéristique de la Renaissance cotentinoise avec ses fenêtres à meneaux, portes à moulures, lucarnes à volutes, comme celle de Chanteloup. Il se présente sous la forme d'un bâtiment massif et rectangulaire, que cernent plusieurs tourelles d'angles circulaires. Deux niveaux de combles, ont été ajoutés dans la seconde moitié du XIXe siècle. Sur l'arrière, une tour porte le nom des « Quatre-Vents ». Le décor se compose de lucarnes et de pilastres corinthiens. C'est Augustin-René de Tocqueville qui dès 1871, avec l'aide de son architecte, Gabriel Malençon a donné au château son aspect actuel. Ils restaurent notamment, toute la façade ouest, avec la tour ronde et la tour carrée au nord, et sur la façade est, la tour du pignon est, carrée, crénelée à son sommet avec mâchicoulis et échauguettes, réminiscence du Moyen-Âge, mode très en vogue au XIXe siècle. On peut voir ses armes, « d'argent à la fasce de sable accompagnée en chef de trois merlettes de sable et de trois tourteaux d'azur (alias de gueules) en pointe, 2 et 1  » qu'il fit graver sur la tour ronde accompagnées de celles de sa femme Marie-Augustine Crombez, qu'il a épousé en 1863. À l'intérieur, au premier niveau, on peut voir la salle des gardes et la salle à manger. Le grand escalier, logé dans la tour des vents, doté d'une ornementation représentant un cur percé d'une flèche, dessert les trois étages. Le premier étage abrite le grand et petit salon, ainsi que la « chambre bleue » qui passe pour avoir été la chambre de Marguerite de Ravalet, Les murs et le plafond sont décorés de saynètes champêtres et romantique. Donnant sur la cour d'honneur, la face sud est ornée de deux tours cylindriques. La face nord, surplombant l'étang, est moins homogène avec des tours et des ouvertures sans aucune logique. L'ensemble est bâti en pierre de schiste bleue, à lexception des encadrements des portes et fenêtres qui sont en pierre de Valognes.","habitants":"Jean II de Ravalet\r\n        \"","divers":"à Cherbourg; Ravalets GPS : 49°37'47\" Nord, 1°34'00\" Ouest","gps":"49°37'47\" Nord, 1°34'00\" Ouest","images":["../../jctruffet.com/image/image_50/50_Ravalet_1.jpg","../../jctruffet.com/image/image_50/50_Ravalet_2.jpg","../../jctruffet.com/image/image_50/50_Ravalet_3.jpg","../../jctruffet.com/image/image_50/50_Ravalet_4.jpg","../../jctruffet.com/image/image_50/50_Ravalet_5.jpg","../../jctruffet.com/image/image_50/50_Ravalet_6.jpg"]},"Consult_chateau_formulaired0d4":{"id":"Consult_chateau_formulaired0d4","dept":"50","canton":"Carentan","commune":"Ravenoville","nom":"Ravenoville","type":"Château","periode":"XVIII","histoire":"RAVENOVILLE  Fort de Ravenoville (XIXe siècle), bâti sur une ancienne redoute carrée en maçonnerie datant de 1689. L'enceinte ainsi que l'ancien corps de garde intérieur ont été profondément modifiés.\r\nManoir-ferme de Surville : manoir des (XVIe??XIXe siècle), défendu par des douves , il comprend une belle porte double, encore avec son heurtoir, ainsi qu'une belle tour carrée avec échauguette                                      . RAVENOVILLE  a été construit dans la deuxième moitié du XVIIIe siècle sur une ancienne redoute carrée en maçonnerie datant de 1689. L'enceinte ainsi que l'ancien corps de garde intérieur ont été profondément modifiés. Communs et colombier ont été bâtis dans la deuxième moitié du XVIIe siècle. L'édifice se compose d'un étage de soubassement, d'un étage carré et d'un étage de comble, le gros-oeuvre en calcaire, brique et appareil mixte, élévation ordonnancée surmonté de toit à longs pans, croupe, toit en pavillon, toit polygonal et toit à longs pans brisés, recouverts d'ardoises et de tuiles mécaniques  . Le château fut, en partie détruit, en 1944. Il fut rasé en 1955. Les communs et le colombier datent du XVIIe, le pigeonnier est de forme octogonal. Le château de Ravenoville est inhabité depuis le XXe siècle. Le mariage de la blancheur de la pierre calcaire et de la brique rouge est original et surtout inattendu. Le château de Ravenoville est une propriété privée, fermé au Public. Il existe aussi sur la commune à découvrir : Fort de Ravenoville (XIXe), bâti sur une ancienne redoute carrée en maçonnerie de 1689, le manoir-ferme de Surville (XVIe / XIXe), avec sa belle porte double, et son heurtoir, et une belle tour carrée.","architecture":"Domaine de RAVENOVILLE, offrez-vous une réception grandiose en choisissant de célébrer votre mariage au domaine de Ravenoville. Laissez-vous séduire par cet havre de verdure à seulement quelques minutes des plages et organisez votre réception dans ce somptueux domaine aux accents romantiques. Composée de deux élégantes maisons, d'un jardin à la française bordé de douves et d'un magnifique parc de 5 hectares possédant son propre étang, cette propriété historique est l'endroit rêvé pour y fêter le plus beau jour, dans une atmosphère magique, situé à quelques encablures des plages du débarquement, est une magnifique propriété historique du XVIIe siècle composée de trois remarquables maisons : un pigeonnier, un manoir et un pavillon au cur d'un jardin à la française bordé de douves en eau et dun parc de 5 hectares.Le Domaine est situé contre la belle église du XIVe siècle, permettant la célébration religieuse de votre mariage au sein même du domaine.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Ravenoville le château grav 4-5-6 et le domaine grav  1-2-3  GPS : 49° 27' 24\" Nord, 1° 16' 14\" Ouest","gps":"49° 27' 24\" Nord, 1° 16' 14\" Ouest","images":["../../jctruffet.com/image/image_50/50_Ravenoville_1.jpg","../../jctruffet.com/image/image_50/50_Ravenoville_2.jpg","../../jctruffet.com/image/image_50/50_Ravenoville_3.jpg","../../jctruffet.com/image/image_50/50_Ravenoville_4.jpg","../../jctruffet.com/image/image_50/50_Ravenoville_5.jpg","../../jctruffet.com/image/image_50/50_Ravenoville_6.jpg"]},"Consult_chateau_formulaire9166":{"id":"Consult_chateau_formulaire9166","dept":"50","canton":"Coutances","commune":"Regnéville sur mer","nom":"Regnéville","type":"Vestiges forteresse","periode":"XII-XIV-XVI","histoire":"REGNEVILLE, la première mention de l'existence du château de Regnéville figure dans un texte de 1141 qui énumère les biens immobiliers des successeurs de Guillaume le Conquérant. Ediffié pour protéger le port de Regnéville et son trafic, ce château fut reconstruit à plusieurs reprises, notamment au XIVe siècle par Charles le Mauvais. C'est cette reconstruction qui subsiste aujourd'hui. L'intérêt du port et de sa forteresse fut tel que le roi se réserva pendant plus de trois siècles leur propriété. Regnéville fut fief royal jusqu'à la fin du XVe siècle. En effet, les besoins financiers de la royauré allaient obliger le roi, Charles VIII, à se séparer du château et de son domaine en 1486. La forteresse allait passer de mains en mains pour atterrir en 1603 dans le patrimoine d'Isaac de Piennes, un protestant des Flandres établi en Normandie depuis 1558. Son fils Henri de Piennes, s'illustra au siège de la Rochelle, place forte protestante, dans les rangs de l'armée royale et catholique. L'édifice fut démantelé sur ordre de Richelieu en 1637, car il craignant qu'il ne serve à abriter à nouveau des conspirateurs protestants.                                A Régneville le manoir de CRUX  Le manoir de Crux est une demeure historique de la Manche située à Regnéville-sur-Mer.Il est situé au sud du village d'Incleville. Construit au XVIIe siècle .\r\nIl est inscrit sur la liste des monuments historiques le 20 mai 1975, notamment pour ses façades et ses toitures","architecture":"Le DONJON  de Regnéville, avec sa silhouette caractéristique, est devenu au fil des ans le symbole de la cité et son imposante masse domine les vestiges du château. Il n'en subsiste qu'un angle. Malgré une architecture archaïque pour lépoque, le donjon de plan carré semble bien avoir été érigé au XIVe siècle. Il reprend le plan carré et les contreforts dangle si caractéristiques des monuments ou des donjons romans de Caen, Falaise ou Norwich. Implantée dans langle nord-est de la haute-cour du château, cétait une tour rectangulaire dune trentaine de mètres de haut, dont lépaisseur des murs dépassait les trois mètres. Quatre étages, dont trois voûtés, étaient desservis par un escalier à vis, refait au XVIe siècle, encore visible de nos jours. Au rez-de-chaussée, une cave servait à entreposer les réserves. Au XVIe siècle, Roulland de Gourfaleur fait percer des baies dans les flancs ouest et sud du donjon. Ces ouvertures débouchaient sur un balcon supporté par une paire de grands corbeaux doubles en granit. Éléments protégés MH : l'ensemble des vestiges formant la basse-cour, y compris les sols : inscription par arrêté du 1er décembre 1989. Les ruines du donjon et l'ensemble des vestiges formant la haute-cour, y compris les sols : classement par arrêté du 13 septembre 1991.","habitants":"patrimoine d'Isaac de Piennes\r\n        \"","divers":"Château de Régnéville et le donjon. GPS: 49° 00' 33,21\" Nord,1° 32' 11,75\" Ouest                                                          Crux  grav- 5gps 49° 01' 37\" N, 1° 32' 08\" Ouest","gps":"49° 00' 33,21\" Nord,1° 32' 11,75\" Ouest","images":["../../jctruffet.com/image/image_50/50_Regn%c3%a9ville_1.jpg","../../jctruffet.com/image/image_50/50_Regn%c3%a9ville_2.jpg","../../jctruffet.com/image/image_50/50_Regn%c3%a9ville_3.jpg","../../jctruffet.com/image/image_50/50_Regn%c3%a9ville_4.jpg","../../jctruffet.com/image/image_50/50_Regn%c3%a9ville_5.jpg"]},"Consult_chateau_formulaire3fb3":{"id":"Consult_chateau_formulaire3fb3","dept":"50","canton":"Grainville","commune":"Chausey","nom":"Renault_Chausey","type":"Forteresse","periode":"XV-XVI","histoire":"RENAULT, le constructeur Louis Renault passa beaucoup de temps dans l'Ile de Chausey et investit beaucoup d'argent dans l'archipel, au point d'être considéré comme un bienfaiteur. le 17/06/2015, le Prince Albert II de Monaco a salué les sauveteurs en mer, et s'est dirigé vers le château Renault, où il a été reçu par les propriétaires des lieux. Jean-Michel Thévenin vient donc de publier Louis Renault et Chausey. Un ouvrage passionnant dans lequel on apprend les circonstances de la découverte de larchipel normand par lindustriel, son coup de foudre immédiat, sa boulimie de possession, qui le poussa à acquérir immédiatement quelque chose sur lîle, la restauration du vieux fort et son incroyable modernité.","architecture":"RENAULT, construction du château Renault était une vieille forteresse construite en 1550 sous Henri III, reconstruite et redémolie, plusieurs fois. En 1920, il ne restait plus que 4 morceaux de murs branlants. Cette reconstruction a été très rapide, le premier coup de pioche fut donné en janvier 1923 et à Pâques 1924, le château Renault était habité, chauffé et éclairé. Il a fallu 14 mois pour finaliser cette gigantesque restauration, une véritable performance pour lépoque. Il ny avait alors ni eau courante, ni électricité, ni moyens mécaniques. L'archipel de Chausey est l'une des merveilles de la Manche,  débarqué à Chausey un jour dété de 1920, le célèbre industriel y lassera, aux creux des chemins ombragés, un souvenir qui perdure. Cet ouvrage abondamment illustré de photos de lépoque, montre comment Renault fit restaurer magnifiquement, en un an à peine, ce fort datant du XVIe siècle où il fit sa maison, gratifia léglise dun clocher, le village des Blainvillais de toiture, et les habitants dune campagne de vaccination. Il montre aussi litinéraire dun homme plus économe que les Normands eux-mêmes et qui, sa vie durant, séchina à appliquer, avec des bonheurs divers, son génie de la mécanique aux bateaux quil adorait et dont il peupla larchipel.","habitants":"Louis Renault     et le Prince Albert II de Monaco\r\n        \r\n        \"","divers":"Château de Renault à Chausey  GPS : 48° 52' 51\" Nord, 1° 49' 07\" Ouest","gps":"48° 52' 51\" Nord, 1° 49' 07\" Ouest","images":["../../jctruffet.com/image/image_50/50_Renault_Chausey_1.jpg","../../jctruffet.com/image/image_50/50_Renault_Chausey_2.jpg","../../jctruffet.com/image/image_50/50_Renault_Chausey_3.jpg","../../jctruffet.com/image/image_50/50_Renault_Chausey_4.jpg"]},"Consult_chateau_formulaire2744":{"id":"Consult_chateau_formulaire2744","dept":"50","canton":"Les Pieux","commune":"Rozel","nom":"Rozel","type":"Château","periode":"XIV","histoire":"ROZEL,  Jérôme Frédéric Bignon, légitimiste sous la Restauration, fait couvrir l'ensemble des tours et le colombier de couronnements de créneaux et merlons, et d'un belvédère. Il dote également le château de bâtiments de service. Les aménagements ont préservé l'ancien système de défense des tours ainsi que l'ancien logis avec sa chambre de tir. La cohérence se lit dans le plan et dans l'implantation des bâtiments sans oublier l'aspect paysager avec le jardin clos et ses deux pavillons. Ancienne propriété de Bertrand du Rozel, compagnon de Guillaume le Conquérant, adossé à un large vallon boisé, le château fait face à la mer. La diversité des éléments architecturaux composant le domaine du Rozel confère à ce lieu une atmosphère alliant laustérité des manoirs en granit du Cotentin au charme des ruines romantiques.\r\nManoir du Rozel XVIIIe siècle, inscrit MH (depuis 2005), s'élève un peu en retrait de la côte, au nord-ouest du Cotentin. Il fut remanié au cours des siècles, notamment aux XVIIIe et XIXe siècles. Une double porte charretière et piétonne ouvre sur la cour. La famille Bignon après la Révolution, fit couronner les tours de créneaux et d'un Belvédère. Une allée latérale menant au château est séparée du potager par un haut mur. Elle longe les bâtiments agricoles, dont le pressoir à pommes.","architecture":"ROZEL, la construction  date du XIIIe-XIVe-XVIe-XVIIIe siècle. Jérôme-Frédéric Bignon, légitimiste sous la Restauration, fit couvrir l'ensemble des tours et le colombier de couronnements de créneaux et merlons et d'un belvédère. Il dota également le château du Rozel de bâtiments de service.  Le château entouré de ses nombreuses dépendances, ayant laspect dun village fortifié, sur six hectares de parc avec rivière et bois.  Les aménagements ont préservé l'ancien système de défense des tours ainsi que l'ancien logis avec sa chambre de tir. Le château du Rozel est actuellement mis en vente. Il comporte 40 pièces, 40 chambres et un terrain de 6 Ha. Le château du Rozel est inscrit aux M.H. depuis 14/09/2005.          Éléments protégés MH : les façades et les toitures de l'ensemble des bâtiments du domaine, y compris l'emprise du jardin avec ses murs de clôture et ses pavillons : inscription par arrêté du 14 septembre 2005.","habitants":"Rozel, famille Bignon\r\n        \"","divers":"Château de Rozel  GPS : 49° 29' 22,97\" Nord, 1° 49' 42,04\" Ouest","gps":"49° 29' 22,97\" Nord, 1° 49' 42,04\" Ouest","images":["../../jctruffet.com/image/image_50/50_Rozel_1.jpg","../../jctruffet.com/image/image_50/50_Rozel_2.jpg"]},"Consult_chateau_formulaire56b5":{"id":"Consult_chateau_formulaire56b5","dept":"50","canton":"Coutances","commune":"Cambernon","nom":"Réaux_Cambernon","type":"Manoir","periode":"XVI","histoire":"REAUX, le manoir des Réaux est une construction rurale du XVIe siècle, en pierre de Cambernon, flanquée de deux tours à ses angles opposés, présentant autrefois une couverture de chaume et des lucarnes arrondies.  Le manoir des Réaux aurait fait partie du domaine royal. L'élément le plus intéressant reste un escalier de pierre à deux volées droites et le mur d'échiffre. Cette demeure fit certainement partie du domaine royal.   Éléments protégés MH : les façades (sauf perron de la façade antérieure), les toitures et l'escalier intérieur, chambres dhôtes.","architecture":"REAUX  flanquée de  2 tours à ses angles opposés, et présentait autrefois une couverture de chaume et des lucarnes arrondies. L'élément le plus intéressant reste un escalier de pierre à 2 volées droites et le mur d'échiffre. Les éléments inscrits par les M.H. du manoir des Réaux sont les façades, sauf le perron de la façade antérieure, les toitures, l'escalier intérieur, sont protégés aux M.H. depuis le 11/09/1989. Le manoir des Réaux est privé, fermé au Public. Un autre manoir se trouve sur la commune à découvrir : le Manoir du Val (XVIe siècle).","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château des Réaux à Cambernon GPS : 49° 04' 49\" Nord, 1° 23' 08\" Ouest","gps":"49° 04' 49\" Nord, 1° 23' 08\" Ouest","images":["../../jctruffet.com/image/image_50/50_R%c3%a9aux_Cambernon_1.jpg","../../jctruffet.com/image/image_50/50_R%c3%a9aux_Cambernon_2.jpg"]},"Consult_chateau_formulaire74c4":{"id":"Consult_chateau_formulaire74c4","dept":"50","canton":"Val-de-Saire","commune":"Réville","nom":"Réville","type":"Manoir","periode":"XVI-XVII","histoire":"Deux manoirs dans cet article ; Réville et Crasvillerie.                           REVILLE, édifice d'origine médiévale, en ruines au début du XVIe siècle, reconstruit du XVIe au XVIIIe siècle, ensemble presque reconstruit en 1595, puis à la fin du XVIIe siècle (deux élévations sont datées 1683). Un gros pavillon abritant un salon Louis XV a été bâti de 1737 à 1739. Les communs datent peut être de la fin du XVIIe siècle.  Éléments protégés MH : les façades et les toitures du château ; les façades et toitures des communs ; le colombier ; la grille d'entrée et ses piliers ; les sauts-de-loup : inscription par arrêté du 5 septembre 1997.","architecture":"CRASVILLERIE,   le manoir fut peut être édifié par le corsaire François Le Clerc dit « Jambe de bois ». Pour ses services sous les rois de France Henri II et François Ier, il fut anobli en 1551. Le manoir de la Crasvillerie est une ancienne demeure fortifiée, du XVIe siècle, remaniée à plusieurs reprises, qui se dresse sur la commune de Réville dans le département de la Manche, en région Normandie. Le logis, y compris les cheminées ainsi que lassiette des sols, sont inscrits au titre des monuments historiques par arrêté du 7 octobre 2019. Très remanié, le manoir possède notamment de l'époque de sa construction une chambre de guet située dans sa tour polygonale doù l'on pouvait surveiller la mer.","habitants":"Seigneurs locaux\r\n        \"","divers":"Deux manoirs dans cet article ; Réville et Crasvillerie grav-2.  Gps   49° 38' 16\" N, 1° 15' 25\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_R%c3%a9ville_1.jpg","../../jctruffet.com/image/image_50/50_R%c3%a9ville_2.jpg"]},"Consult_chateau_formulairea5e3":{"id":"Consult_chateau_formulairea5e3","dept":"50","canton":"Pontorson","commune":"Sacey","nom":"Sacey","type":"Vestiges","periode":"XII-XV","histoire":"SACEY,  le château qui précédait celui dont les restes sont encore visibles, se situait à la Tourelle en raison notamment dune situation admirable. Le château semble avoir été abandonné durant plus dun siècle par les de Saint-Hilaire, ce qui expliquerait que les Malemains aient ressenti le besoin de le remplacer et de choisir un passage fréquenté par les Bretons et bénéficiant deaux abondantes. Vers 1495, Gilles Couvran fit le voeu de bâtir une chapelle au château. La réunion de la Bretagne à la France rendant alors inutiles les forteresses, le châtelain choisit de transformer le corps de garde. La chapelle acquit ainsi une forme de tourelle aux murs épais et fut dotée dune cheminée et dune lucarne donnant sur le rempart. Sur une colline baignée par la Dierge, la forteresse de Charuel construite par Robert Ier, duc de Normandie, qui était devenue un des postes les plus importants de sa ligne de défense, fut démolie par un descendant de Gilles de la Paluelle après la réunification. Éléments protégés MH : la chapelle dite chapelle de Notre-Dame-de-Pitié et les douves qui la bordent : inscription par arrêté du 31 mars 1992, propriété de la commune.","architecture":"SACEY, a un riche passé historique. Sur son territoire s'élevait, sur une étendue de cinq kilomètres, une forteresse et deux châteaux fortifiés. Le territoire ne fut pas simplement le théâtre de guerres entre châteaux, mais aussi celui de combats entre deux provinces. Se situant à la frontière de la Bretagne, le village se trouva souvent en première ligne des nombreux conflits qui opposèrent les Normands et les Bretons et prit fréquemment l'allure d'un vaste champ de bataille.                                              CHARUEL, le château de Charuel est une ancienne maison forte, du XIe siècle, dont les vestiges sont situés  sur une crête dominant la rivière, à l'ouest du bourg, face au château d'Antrain en territoire breton le château de Charuel, élevé face au territoire breton par le duc de Normandie Robert le Magnifique, père de Guillaume le Conquérant, se situait sur une crête dominant la rivière, à l'ouest du bourg. Bertrand Du Guesclin en fut le capitaine en 1357. Il possèdera également le château-fort de Pontorson, par don du roi Charles VI en 1376. Détruit, il n'en subsiste aujourd'hui qu'une enceinte quadrangulaire.","habitants":"Sacey, Gilles Couvran\r\n        \"","divers":"Deux vestiges de manoir à Sacey ; Sacey la tour et Chabuel                        gps  48° 30' 34\" nord, 1° 27' 00\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Sacey_1.jpg","../../jctruffet.com/image/image_50/50_Sacey_2.jpg","../../jctruffet.com/image/image_50/50_Sacey_3.jpg"]},"Consult_chateau_formulaired49e":{"id":"Consult_chateau_formulaired49e","dept":"50","canton":"Quettreville-sur-Sienne","commune":"Montpinchon","nom":"Salle_50","type":"Manoir","periode":"XIV","histoire":"La SALLE, il est fait mention d'un manoir, à lemplacement du château actuel, dans le Pouillé du diocèse de Coutances de 1332 comme propriété de Guillaume de Pirou. Le domaine, clos de fossés, comporte chapelle, colombier, jardins, viviers et étang. Le donjon initial, attribué aux seigneurs de la famille Cambernon est complété dun logis seigneurial par ceux de la famille Martel. A une date inconnue ont été ajoutées deux ailes en équerre. Cette construction se situe entre le 2 mars 1714 date à laquelle Louis III Caillebot, marquis de la Salle, fait un descriptif du château existant, et le 13 novembre 1758, date à laquelle les constructions récentes sont mentionnées lors dun inventaire de mobilier. Le 6 frimaire An V,  la Salle est vendue en indivision à Jacques Le Campion, de Granville et Pierre Brugères de Coutances. En août 1826, il est mis fin à lindivision et la propriété est répartie en deux lots. Les bâtiments dus aux Caillebot sont réduits dun étage et leur couverture refaite. Aujourdhui, restaurés, ils conservent beaucoup de caractère et sont devenus une hostellerie.","architecture":"La SALLE, cette construction date de 1714, date à laquelle Louis III Caillebot, marquis de la Salle, fait un descriptif du château existant, et le 13/11/1758, date à laquelle les constructions récentes sont mentionnées. Marie-Louis IV Caillebot de la Salle, son fils, à qui lon doit la construction des 2 ailes, séjourne pour la dernière fois, au château de la Salle, au printemps 1789 pour ne pus y revenir. En 1792, est annoncé la vente des biens du Marquis de la Salle et du château pour le 9 novembre. Cependant, faute dacheteur, ce nest qu'en  1796, que le château est vendu en indivision, à Jacques Le Campion, de Granville et Pierre Brugères de Coutances. Au cours des décennies suivantes, la propriété sachemine lentement vers son déclin. Les 2 ailes abritèrent des prisonniers espagnols et furent ravagées par un incendie. Le cadastre de 1829 mentionne des ruines à leur emplacement. En août 1826, il est mis fin à lindivision et la propriété est répartie en deux lots. Les bâtiments dus aux Caillebot sont réduits dun étage et leur couverture refaite. Aujourdhui, restaurés, ils gardent beaucoup de caractère et sont devenus une « hostellerie ». Les bâtiments dont la construction est due aux Martel et aux Cambernon ont été, à nouveau, séparés en 2 lots et abritent 2 fermes. Bien que très modifiées au XIXe siècle, ils gardent quelques éléments des constructions dorigine : les fenêtres en accolades, les cheminées et les blasons.","habitants":"Guillaume de Pirou                                                                famille Martel\r\n        \"","divers":"à Montpinchon château de la Salle                                     GPS : 49° 1' 19,13\" Nord, 1° 18' 34,66\" Ouest","gps":"49° 1' 19,13\" Nord, 1° 18' 34,66\" Ouest","images":["../../jctruffet.com/image/image_50/50_Salle_50_1.jpg","../../jctruffet.com/image/image_50/50_Salle_50_2.jpg"]},"Consult_chateau_formulaireeaa0":{"id":"Consult_chateau_formulaireeaa0","dept":"50","canton":"Avranches","commune":"Sartilly","nom":"Sartilly","type":"Château","periode":"XVI","histoire":"BREQUIGNY, ce manoir a été construit sur un fief très ancien, datant de l'époque féodale. La terre de Bréquigny appartenait à Henri de Champeaux. Tenu du roi, le fief sétendait sur Bréquigny et Champeaux. Vendu aux de La Hache, le fief de Brécquigny, fut détaché de Champeaux au milieu du XVIe siècle et acheté par Pancrace Louvel. Originaire de Montmartin, les Louvel étaient dancienne noblesse. Par succession, le manoir passa ensuite aux du Homméel qui le conservèrent jusquà la Révolution.                                A quelques K.M à  Saint-Jean le Thomas,  Des HAUTS    Le château actuel a été construit en 1830 sur le site d'un château médiéval d'où l'inspiration de la décoration intérieure. Les parfums des fleurs et plantes exotiques embaument les jardins, vous trouverez le printemps en hiver. Mimosas, palmiers, cordillines font de ce lieu paradisiaque une oasis de paix face à l'immensité de la baie et face au Mont-Saint-Michel, dans un jardin du bout de la mer qu'aurait aimé peindre Monet, le château baigné de soleil est niché à l'abri des vents, à flanc d'un coteau boisé d'où de toute part, en vue panoramique, vous admirerez la \"Merveille de l'occident\"chambres d'hôtes  et a cinq K.M. au nord à la LUCERNE  d'OUTREMER, château transformé en hôtel restaurant de Sylvie et Frédéric","architecture":"BREQUIGNY, le manoir possède encore les meurtrières caractéristiques des constructions féodales, mais ayant été construit au début de la Renaissance, il possède des caractères typiques de cette époque, notamment des échauguettes à poivrières encorbellées et des baies rectangulaires. A l'intérieur, une magnifique cheminée de stuc, qui est répertoriée à l'inventaire supplémentaire des monuments historiques. C'est une propriété privée mais il est bien visible du chemin de randonnée qui serpente à proximité. Éléments protégés MH : les façades et les toitures ; la grande pièce à l'étage avec sa cheminée : inscription par arrêté du 1er décembre 1980.","habitants":"Famille de Henri de Champeaux. \r\n        \r\n        \"","divers":"deux château à Sartilly; Bréquigny  grav-1-2 et les Hauts  grav-3 la Lucerne d'Outremer grav -4-5-6      Gps \r\n48° 45' 09\" nord, 1° 27' 25\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Sartilly_1.jpg","../../jctruffet.com/image/image_50/50_Sartilly_2.jpg","../../jctruffet.com/image/image_50/50_Sartilly_3.jpg","../../jctruffet.com/image/image_50/50_Sartilly_4.jpg","../../jctruffet.com/image/image_50/50_Sartilly_5.jpg","../../jctruffet.com/image/image_50/50_Sartilly_6.jpg"]},"Consult_chateau_formulaire0549":{"id":"Consult_chateau_formulaire0549","dept":"50","canton":"Coutances","commune":"Saussey","nom":"Saussey","type":"Manoir","periode":"XVI-XVII","histoire":"Trois châteaux à Saussey dont; Saussey , Argences et Plessis.                                                                             SAUSSEY, le manoir actuel a été construit au XVIIe siècle. A l'origine, le seigneur du lieu, le chevalier de Saussey a très certainement, comme les 40 autres vassaux du Coutançais, répondu à l'appel du duc qui s'en allait guerroyer outre Manche en 1066. Le fief restera la propriété de la famille de Saussey jusqu'au XVe siècle. Vers 1608 construction du manoir actuel sur l'emplacement d'un château plus ancien. Les hautes toitures d'ardoises, les cheminées et son aile en retour d'équerre trahissent à l'évidence les styles Henri IV et louis XIII. Restauré par son dernier propriétaire, antiquaire et collectionneur, le manoir abrite désormais un superbe musée où voisinent de la verrerie antique des 1er et IVe siècles et des pièces rares des arts français de la table. Cet ensemble est complété par une collection de faïences du XIXe siècle. Le visiteur pourra se promener à loisir dans un très beau jardin entourant le manoir ou rosiers, fuschias, hortensias prospèrent à l'ombre de haies de buis.                                                                                                ARGENCES, le manoir a été construit de 1607 à 1815. entouré de neuf jardins. Le colombier, daté de 1612, fait partie des rares spécimens de colombier de plan rectangulaire subsistant encore dans la région. Il subsiste dans son contexte architectural du début du XVIIe siècle. Composé de bâtiments organisés autour d'une cour, bâti le long de la douve, il fait office de mur d'enceinte et apparaît comme un signal distinctif symbolisant les droits seigneuriaux. Le manoir possède un ensemble de constructions qui s'ordonnent autour d'une cour fermée. De Caroline et de Philippe Lecardonnel.","architecture":"PLESSIS, bâti en majeure partie entre 16082 et 1747 à l'emplacement d'un château primitif, est l'un des plus anciens du sud Coutancais. Il fut la propriété de plusieurs familles dont en premier, celle très ancienne de Saussey, mentionnée au XIIIe siècle dans plusieurs chartes, qui conservera le fief jusqu'au XVe siècle. Il échoit par mariage dans les mains de la puissante famille de la Roque, puis à la suite d'un héritage, le fief est la possession de la famille de Pellevé qui à la fin du XVIe siècle l'échange avec Guy de Cointe, avocat du roi au bailliage de Coutances. Son neveu, Charles Le Moyne, qui en a hérité, vend en 1645 le fief de Saussey et ses droits. À partir de cette date et jusqu'à la Révolution, le manoir et le fief auront des propriétaires différents. Le manoir passe par mariage des Le Moyne au Mary de Bactot. Jacques Nicolas Louis de Mary de Bactot, fils des propriétaires, curé de Champ-du-Boult depuis 1776, sera chassé de sa paroisse est contraint de regagner le manoir familial. Celui-ci avait, en 1793, épousé sa bonne, Marie-Thérèse Vauvert avec qui il eu trois enfants dont deux filles qui finirent vieilles filles. Vendu au début du XIXe siècle, de 1891 à 1930 il abrite un ouvroir tenu par trois religieuses de la congrégation de la Miséricorde de Saint-Sauveur-le-Vicomte. Il est vendu en 1930 et, en 1932, la propriété est séparée en deux lots : le manoir d'un côté, la ferme de l'autre. Le manoir est acquis en 1960 par Jacques Langelier, qui en était encore le propriétaire en 2018. Le manoir du Plessis, avec ses hautes toitures d'ardoise, ses cheminées et son aile en retour d'équerre caractéristiques des styles Henri IV et Louis XIII, a subi peu de modifications depuis le XVIIe siècle. Construit autour d'une cour séparée à l'ouest, de la ferme et de la basse-cour, et entouré d'un jardin à la française, la façade avant du manoir présente des épis de faîtage et des lucarnes à capucine.","habitants":"Argences, Caroline et de Philippe Lecardonnel.                    Saussey, famille de Saussey\r\n        \"","divers":"Trois manoirs dans cet article ; argences grav 2-3-4 grav 5-6; Saussey  grav 1 et Plessis                                                               Plessis gps 49° 00' 36\" N, 1° 25' 55\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Saussey_1.jpg","../../jctruffet.com/image/image_50/50_Saussey_2.jpg","../../jctruffet.com/image/image_50/50_Saussey_3.jpg","../../jctruffet.com/image/image_50/50_Saussey_4.jpg","../../jctruffet.com/image/image_50/50_Saussey_5.jpg","../../jctruffet.com/image/image_50/50_Saussey_6.jpg"]},"Consult_chateau_formulairee253":{"id":"Consult_chateau_formulairee253","dept":"50","canton":"Valognes","commune":"Yvetôt-Bocage","nom":"Servigny","type":"Château","periode":"XVII","histoire":"SERVIGNY,  le château a été construit au XVIIe siècle, à l'emplacement d'un ancien édifice dont il reste une tourelle d'escalier du XIVe sur la façade sud. Sa façade nord laisse percevoir l'influence de la Renaissance. Deux pilastres du XVIIe siècle encadre le pignon au sud aux fenêtres à meneaux. Le château a été remanié au XIXe siècle par l'architecte Barthélémy pour la famille Abaquesné de Parfouru, actuellement à Sylvie Gosselin-Grard","architecture":"SERVIGNY, le château a été remanié au XIXe siècle. l'intérieur conserve les cheminées du XVIIe siècle et un escalier avec rampe de fer du XVIIIe siècle. Le beau et vaste parc à l'anglaise de six hectares est agrémenté de fabriques réalisées au XIXe siècle: un petit manoir, une chapelle, un temple de Neptune, un lavoir et un puits. Ce château connu surtout pour avoir été le cadre de la signature, le 26 juin 1944 par le général Karl von Schlieben, de la reddition de Cherbourg, dit traité de Servigny. Resté dans la même famille depuis sa construction. Éléments protégés MH : les façades et les toitures, le salon du premier étage avec son décor : inscription par arrêté du 7 novembre 1979.","habitants":"famille Abaquesné de Parfouru                                                      Sylvie Gosselin-Grard                        \r\n        \"","divers":"Château de Sevigny à Yvetôt-Bocage\r\n gps 49° 29' 24\" nord, 1° 30' 13\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Servigny_1.jpg","../../jctruffet.com/image/image_50/50_Servigny_2.jpg"]},"Consult_chateau_formulaire5ec7-2":{"id":"Consult_chateau_formulaire5ec7-2","dept":"50","canton":"Les Pieux","commune":"Barneville_Carteret","nom":"Sirènes","type":"Château","periode":"XVIII","histoire":"SIRENES, il fut construit et habité par le peintre Adolphe Lalyre, puis vendu à Henry Franklin-Bouillon. C'est en 1900 que fut achevé la construction d'une grande villa, située sur le cap de Carteret qui comportait à l'époque peu de construction. Le propriétaire de cette villa est un parisien, Adolphe Lalire dit La Lyre, un peintre célèbre âgé de 52 ans, très connu, arrivé à sa maturité. Venu pour la première fois à Carteret, en 1872, il nétait encore quun jeune peintre débutant. Il tomba sous le charme de la région. Il revint, au Grand Hôtel de la Mer (ouvert en 1883) et y acheta un terrain en 1897.  Après la Première Guerre mondiale, la vie devint plus difficile, les prix augmentèrent, et ses toiles se vendirent moins bien. La Lyre dut se résoudre à vendre son château en viager, à son voisin, ami, député puis ministre, Franklin Bouillon. Après la mort du peintre, Marthe La Lyre sa femme, continuera dy habiter, partageant lannée entre Courbevoie où son mari avait conservé un atelier et Carteret. Malheureusement, la villa fut réquisitionnée par les Allemands et pillée. De nombreuses toiles disparurent et ne furent jamais retrouvées.","architecture":"SIRENES,  en 1899, Adolphe Lalyre achète un terrain à Carteret, il y fait construire une maison quil appelle « le château des Sirènes ». Achevée en 1903, cest lui-même qui a dessiné les plans de ce « château » avec sa tour crénelée et un immense atelier aux larges baies vitrées qui lui offre une vue imprenable sur le havre de Carteret et la plage de Barneville jusquà Portbail.  Cest lui qui fit les plans du château , avec sa tour crénelée, dont la vue est imprenable sur le havre de Carteret et la plage qui se déroule de Barneville à Portbail et au- delà. Il nomme cette maison « le château des Sirènes » Il se ménage un vaste atelier aux larges baies vitrées, éclairé par une immense verrière qui laisse entrer au maximum la lumière. La salle à manger est immense, la cheminée permet de cuire un mouton entier. Sur le mur, il fit accrocher une toile de 7 m de long sur 4 m 50 de haut : lenlèvement de lAmour par les Sirènes.","habitants":"Adolphe Lalyre\r\n        \r\n        \"","divers":"à Barneville-Carteret château des Sirènes.                                                     GPS : 49° 22' 52\" Nord, 1° 45' 10\" Ouest","gps":"49° 22' 52\" Nord, 1° 45' 10\" Ouest","images":["../../jctruffet.com/image/image_50/50_Sir%c3%a8nes_1.jpg","../../jctruffet.com/image/image_50/50_Sir%c3%a8nes_2.jpg"]},"Consult_chateau_formulairee2e5":{"id":"Consult_chateau_formulairee2e5","dept":"50","canton":"Les Pieux","commune":"Sotteville","nom":"Sotteville","type":"Château","periode":"XVI-XIX","histoire":"deux construction à Sotteville dont Sotteville et Métot.                  SOTTEVILLE, bâti entre 1593 et 1610, dont il ne reste aucun renseignement concernant une fondation qui remonterait au haut Moyen-Age. Il devait probablement comporter à l'origine quatre pavillons, dont deux subsistent. Le décor est caractéristique de l'école cotentinaise. Un pavillon a été accolé au XIXe siècle à l'extrémité nord-est du pavillon central. Le château a été modernisé dans les années 1900. Les meneaux disparus au XVIIIe siècle ont été refaits à ce moment là, et un pavillon façon XVIIe a été ajouté contre le pignon nord. La cour est bordé de communs datant de la fin du XVIe siècle, écuries, colombiers, grange et chapelle. Le parc a été transformé en parc à l'anglaise vers 1899.  Éléments protégés propriété de monsieur de Larturière. MH : les façades et toitures du château ; les façades et les toitures des communs, les façades et les toitures du château, à l'exclusion de celles du pavillon nord-est ; les façades et les toitures des communs : inscription par arrêté du 12 octobre 1964. Les façades et les toitures de la ferme ; le parc, tel qu'il est délimité sur le plan annexé à l'arrêté, comprenant le système hydraulique (lavoir, pièce d'eau et canal), le jardin potager et ses murs de clôture, les jardins en terrasses et leur serre, les avenues de Face et de l'Eglise : inscription par arrêté du 21 décembre 2000. Le corps de logis du château : inscription par arrêté du 13 février 2002. Les trois cheminées de la cuisine, de la salle des gardes et de la salle à manger ; les deux colombiers et la boulangerie, en totalité ; les façades et les toitures des communs entourant la cour d'honneur, y compris celles de la grange attenante au colombier nord : classement par arrêté du 13 février 2002.","architecture":"A cinq K.M. à l'Est à Tréauville le château de Métot La construction du METOT date du XVIIe siècle. Il est inscrit partiellement aux M.H. depuis le 12/05/1975 pour les façades, les toitures du Manoir de Métot, les communs et le porche d'entrée. Il se situe au Nord-Ouest du territoire de Tréauville, à 1,4 km au Nord-Est de la centrale nucléaire de Flamanville. Le manoir de Métot est une propriété privée, fermée au public. Il y a à découvrir aussi à Tréauville : Le Manoir de Tréauville, sur la route des Pieux à Diélette qui a été peint par Jean-François Millet (Le manoir de Tréauville près de Gréville), le manoir de la Houssairie du 4ème quart du XVe siècle, le manoir de la Gioterie du XVIe siècle et la Forte-Maison : elle serait l'une des plus anciennes maison rurale du Cotentin. Il subsiste à l'intérieur des vestiges médiévaux.","habitants":"Sotteville; monsieur de Larturière.                                                Métot;\r\n        \"","divers":"deux construction à Sotteville dont Sotteville grav 1-2-3 et Métot grav 4-5.                                                                               Métot GPS : 49° 32' 47\" Nord, 1° 51' 27\" Ouest          Sotteville gps  49° 32' 50\" N, 1° 45' 26\" Ouest.","gps":"49° 32' 47\" Nord, 1° 51' 27\" Ouest          Sotteville gps","images":["../../jctruffet.com/image/image_50/50_Sotteville_1.jpg","../../jctruffet.com/image/image_50/50_Sotteville_2.jpg","../../jctruffet.com/image/image_50/50_Sotteville_3.jpg","../../jctruffet.com/image/image_50/50_Sotteville_4.jpg","../../jctruffet.com/image/image_50/50_Sotteville_5.jpg"]},"Consult_chateau_formulaire2002-2":{"id":"Consult_chateau_formulaire2002-2","dept":"50","canton":"Carentan","commune":"Saint-Côme-du-MonT","nom":"St_Come_du_Mont","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Bel-Esnault et Hauboug et le manoir de Rampan.                                                                                      BEL-ESNEAULT, le château est situé au coeur d'un parc paysagé romantique de trois hectares datant du XIXe siècle. De 1717 à 1903, le château Bellenau a appartenu à la famille Lafosse. Pierre-Etienne-Joseph Lafosse, né en 1828 à Saint-Côme du Mont, a fait un jour le rêve d'un parc extraordinaire, derrière la demeure familiale, planté d'arbres rares et aménagé de jardins d'eau, d'îles, de folies et de grottes. Sur une période de près de 40 ans, il est parvenu à transformer les marais en un environnement unique. Il a introduit et acclimaté pour la première fois dans le Cotentin, connu pour ses micro-climats, des plantes rares et exotiques. Il a également imaginé et conçu toute une série d'îles et de cours d'eau qui sont connectés entre eux par des ponts ou accessibles en barque. Arbres et arbustes ont été plantés pour former des bosquets que l'on traverse grâce à un réseau de chemins sinueux à explorer. Transformé en chambres d'hôtes par la famille Grandin, éléments protégés MH : le parc du château (fabrique, grotte, belvédère) : inscription par arrêté du 19 mai 2010.                                               HAUBOURG, remonte au premier tiers du XVIIe siècle. Lhistoire de son édification et des familles propriétaires qui sy sont succéder mérite de sy intéresser. Haubourg a été bâti vers 1630 par Léonard Rouxelin, avocat en la vicomté de Carentan. Son père, Richard, termina sa carrière en tant que Lieutenant-général en la vicomté de cette même ville, étant le premier notable de sa famille établi à Saint-Côme. Cest à partir de Richard, que sétablit la filiation des Rouxelin sur cette commune. Son fils, Léonard, afin dasseoir sa renommée, se titra en 1602 Sieur de Haubourg.","architecture":"BEL-ESNEAULT, apelé aussi le Château du Bel-Esneau est un château bâti à Carentan-les-Marais,   La famille Joseph-Lafosse acquiert la terre en 1752. Un membre de cette famille, Pierre-V-Étienne Joseph-Lafosse (1828-1897) entreprend l'aménagement d'un parc après qu'il entre en possession de son héritage en 1848. Les travaux d'aménagement du parc durent 40 ans. Le parc fut am
