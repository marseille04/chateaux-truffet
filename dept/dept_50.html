const FULL={"Consult_chateau_formulaire39a0":{"id":"Consult_chateau_formulaire39a0","dept":"50","canton":"Saint-Lô","commune":"Agneaux","nom":"Agneaux","type":"Château","periode":"XIII-XV-XIX","histoire":"Deux châteaux dans cet article Agneaux et la Palière.                  AGNEAUX,  en 1428, Richard d'Esquay, fils de Reignier d'Esquay, est seigneur d'Agneaux et de Caenchy. À sa mort, en 14601, il laisse quatre filles, dont la seconde, Girette d'Esquay, épouse de Raoul de Sainte-Marie. Ce dernier mourut en 1496, laissant un fils, Jean de Sainte-Marie, époux de la sur de Bertin de Silly, chambellan de Louis XI. De cette union naquit un autre Jean de Sainte-Marie, gouverneur de Saint-Lô jusqu'en 1563. Son frère aîné, Nicolas de Sainte-Marie, chevalier de l'ordre du Roi, gentilhomme de sa chambre, capitaine des châteaux de Valognes et de Granville, est quant à lui seigneur d'Agneaux et mourut en 1591. Parmi ses enfants, ce fut Jacques de Sainte-Marie, gouverneur de Granville et des îles Chausey, chevalier de Saint-Michel, gentilhomme de la Chambre des rois Henri IV et Louis XIII, qui reçut le fief d'Agneaux. Avec son épouse, Catherine de Harlus, il eut un fils Jacques II de Sainte-Marie qui mourut en 1641. Son fils aîné, Jacques III de Sainte-Marie lui succède et meurt à Granville en 1664, dont il était le gouverneur. Lui succède, son fils François-Louis de Sainte-Marie, issu d'un premier mariage avec Madelaine Boutin, qui mourut jeune, tout comme son premier fils Nicolas-Thomas de Sainte-Marie, le second leur succéda. On trouve ensuite, Jean-Jacques-René de Sainte-Marie, qui était page du roi en 1720 et, qui, en 1728, à la mort de son père, hérite des titres de seigneur d'Agneaux et marquis de Sainte-Marie. Il avait épousé Catherine Jacquier de Viels-Maisons. Jean-Jacques-René de Sainte-Marie, deuxième du nom, fils du précédent et de Catherine, ancien capitaine au régiment d'Orléans, chevalier de Saint-Louis, seigneur d'Agneaux, épouse, en 1774, Louise-Françoise Pestalozzi, et mourut en 1787, laissant plusieurs enfants.","architecture":"AGNEAUX , le premier propriétaire de ce château, qui nous soit bien connu, est Herbert dAgneaux, qui vivait au milieu du XIe siècle, et qui est cité dans la charte de dotation de la cathédrale de Coutances. A été construit au XIIIe siècle et désigné depuis cette époque jusquen 1790, sous le nom de Cour ou manoir dAgneaux. Assis sur un rocher escarpé à 60 pieds au-dessus de la rivière, il était imprenable de ce côté et la disposition du terrain devait rendre presque inutile une tour avancée, dont on voit encore les ruines dans les broussailles, au bord de la vallée. De lautre côté, il était défendu par des murs, un pont-levis, des tours et autres ouvrages ordinaires, qui existaient entiers en 1770. Ce château qui appartient à M. le marquis Théobald de Sainte-Marie, est dans la position la plus pittoresque avec ses hautes et blanches murailles perchées sur un schiste grisâtre et sa gothique chapelle, à laquelle le lierre a fait une verdoyante ceinture. transformé en hôtel restaurant par Christian Groult.\r\nÉléments protégés MH : la ferme : inscription par arrêté du 2 avril 1946. Les façades et les toitures du château (à l'exclusion de celles de l'aile du XIXe siècle) : inscription par arrêté du 3 mai 1974.                                                La PALIERE, le château fut construit dans les années 1835-1836 par un architecte du nom de Harou Romain pour le comte de Bernardin Gigault de Bellefonds. En effet, c'est en 1910 que Pierre de Gouville, maire d'Agneaux de 1935 à 1971, prend possession du château suite à un héritage. C'est en 1981 que la commune d'Agneaux en fait l'acquisition. L'édifice accueille l'hôtel de ville depuis 1983. Dans le parc un lavoir et des arbres classés par l'office national des forêts.","habitants":"Agneaux; marquis Théobald de Sainte-Marie                                    La Palière;  comte de Bernardin Gigault de Bellefonds\r\n        \"","divers":"Deux châteaux dans cet article Agneaux grav 2-3-4 et la Palière grav 1.                                                                             Agneaux GPS : 49° 07' 15,08\" Nord, 1° 07' 12,79\" Ouest","gps":"49° 07' 15,08\" Nord, 1° 07' 12,79\" Ouest","images":["../../jctruffet.com/image/image_50/50_Agneaux_1.jpg","../../jctruffet.com/image/image_50/50_Agneaux_2.jpg","../../jctruffet.com/image/image_50/50_Agneaux_3.jpg","../../jctruffet.com/image/image_50/50_Agneaux_4.jpg"]},"Consult_chateau_formulairea2b3":{"id":"Consult_chateau_formulairea2b3","dept":"50","canton":"Agon-Coutainville","commune":"Agon-Coutainville","nom":"Agon_Coutainville","type":"Manoir","periode":"XV-XVI-XVII","histoire":"trois châteaux dans cet article, Coutainville et Agon et Flague.                                                                         COUTAINVILLE, le manoir de Coutainville en granit, a été construit à la fin du XVe ou au du début du XVIe siècle, est une ancienne maison-forte (ou maison rurale). Cette demeure fut le fief de Jean de Costentin, seigneur de Tourville et de Coutainville. Ce manoir est situé entre Cherbourg et la baie du Mont Saint-Michel en face des îles Anglo-Normandes et propose cinq chambres d'hôtes.\r\nÉléments protégés MH : le manoir de Coutainville en totalité : inscription par arrêté du 24 juin 1937.","architecture":"AGON, date des XVIIe et XVIIIe siècles, c'est une magnifique maison forte, de 1920, en granit, de style Anglo-Normand, qui fut, autrefois, la résidence d'un marchand d'estampes et libraire à Paris, rénové au début du siècle. Le château d'Agon est proche des plages de sable fin d'Agon-Coutainville, du Mont Saint-Michel, en Normandie. Le château d'Agon est inscrit aux M.H. depuis 1937. Il existe 3 autres châteaux sur la commune, dont le château de la Noë-Chesnaie, le château les Pins, et le château de la Flague ainsi que le manoir de Coutainville du XVe siècle, inscrit aux M.H.","habitants":"fief de Jean de Costentin\r\n        \"","divers":"trois châteaux dans cet article , Agon-Coutainville, grav 1-2- et Flague  grav-3  GPS : 49° 02' 32\" Nord, 1° 34' 36\" Ouest                                                            Manoir Coutainville GPS : 49° 03' 13\" Nord, 1° 35' 16\" Ouest                   Flague GPS : 49° 02' 32\" Nord, 1° 34' 36\" Ouest","gps":"49° 02' 32\" Nord, 1° 34' 36\" Ouest","images":["../../jctruffet.com/image/image_50/50_Agon_Coutainville_1.jpg","../../jctruffet.com/image/image_50/50_Agon_Coutainville_2.jpg","../../jctruffet.com/image/image_50/50_Agon_Coutainville_3.jpg"]},"Consult_chateau_formulaire8051":{"id":"Consult_chateau_formulaire8051","dept":"50","canton":"Carentan","commune":"Amfreville","nom":"Amfreville","type":"Château","periode":"XV-XVI-XVIII","histoire":"deux château dans cet article, Amfreville et Bernarville.      AMFREVILLE, ensemble féodal dont la fondation remonte à Guillaume Le Conquérant.  En 1189, le seigneur d'Amfreville était Richard de Reviers, seigneur de Vernon et de Néhou. Le fondateur de l'abbaye de Montebourg toute proche. En 1226, « Amfreville » appartenait à Guillaume de Reviers. Elle tomba dans les mains de la Famille Avenel, qui possédait également la baronnie des Biards, en Avranchin : Amfreville et les Biards restèrent dans cette famille jusqu'en 1503. Amfreville entra ensuite dans le patrimoine de la Famille de Tardes, puis dans celle de la Famille du Poërier de Portbail, (seigneurs du Portbail), et enfin des Davy, originaires de la région de Périers.  La seigneurie d'Amfreville fut élevée en marquisat au XVIIe siècle en faveur de Charles-François Davy d'Amfreville, lieutenant-général des armées de Louis XIV, et compagnon d'armes du comte de Tourville à la bataille de la Hougue. En 1789, la seigneurie et le château d'Amfreville appartenaient à la Famille du Mesnildot. Château d'Amfreville  est inscrit aux M.H. depuis 1965                                                  BERNARVILLE,  date du XIXe siècle, est un château entouré d'un beau parc.","architecture":"AMFREVILLE, la construction date de la fin du XVe, XVIe et XVIII siècle. Il a été fortement remanié au XVIIIe siècle.   Une douve ceinturait l'ensemble des bâtiments du château dont il reste la poterne d'entrée, une partie du corps de logis et la chapelle. Après la Révolution, une grande partie du château fut abandonnée puis détruite. Chapelle de la fin du XIVe siècle autrefois dédiée à Notre-Dame-de-la-Coudre, désaffectée ; ouvrage d'entrée du XVe siècle ; logis ancien du XVIe siècle ; logis neuf construit au XVIIIe siècle, peut-être vers 1740 par l'architecte Louis Dacier ; communs en partie reconstruits au XXe siècle.Éléments protégés MH : la poterne, la chapelle, et le bâtiment attenant à la chapelle: inscription par arrêté du 30 mars 1965. Il existe 3 châteaux à découvrir sur la commune : Le château d'Amfreville,  de l'Isle-Marie (IMH),  de Bernaville,  Et 4 manoirs : le manoir de La Haule (XVIe siècle),  le manoir de Vains (puissant manoir avec ses belles portes de chêne anciennes et sa grosse tour)et le manoir de La Cour de Gourbesville (XVIe-XXe siècles), reconstruit après la Seconde Guerre Mondiale. Le vieux corps du bâtiment date de 1 000 ans.","habitants":"Famille du Poërier de Portbail,\r\n        \"","divers":"deux château dans cet article, Amfreville  Grav-1  et Bernarville    grav-2-3-4.                                                              Amfreville  GPS : 49° 24' 56\" Nord, 1° 23' 04\" Ouest           Bernarville grav  GPS : 49° 22' 47\" Nord, 1° 25' 03\" Ouest","gps":"49° 24' 56\" Nord, 1° 23' 04\" Ouest           Bernarville gra","images":["../../jctruffet.com/image/image_50/50_Amfreville_1.jpg","../../jctruffet.com/image/image_50/50_Amfreville_2.jpg","../../jctruffet.com/image/image_50/50_Amfreville_3.jpg","../../jctruffet.com/image/image_50/50_Amfreville_4.jpg"]},"Consult_chateau_formulairecf65":{"id":"Consult_chateau_formulairecf65","dept":"50","canton":"Condé-sur-Vire","commune":"Domjean","nom":"Angotière","type":"Château","periode":"XVI-XIX","histoire":"ANGOTIERE, le fils du marquis de Sédouy morcelle ensuite le domaine et vend à plusieurs acquéreurs. Les communs, dévolus à lagriculture, ne sont plus entretenus, le château et le parc souffrent également et les tempêtes de 1987 et 1999 couchent de nombreux arbres dornement. En 2009, lAngotière est acquis par les propriétaires actuels. Ils rachètent également les bâtiments et les terres avoisinantes afin de reconstituer lancienne propriété. Le château, le colombier, la maison du gardien sont restaurés et le parc retrouve un peu de son lustre dantan.Ici, cest un haut coteau boisé qui ne souvre que pour laisser apparaître une ancienne carrière et son petit bâtiment dexploitation. En bordure de la Vire, le paysage est magnifique avec la vallée encaissée aux pentes couvertes de bois. En trois ans seulement, les nouveaux propriétaires  ont sauvé le domaine. Le parc a retrouvé une belle allure et tous les abords font lobjet de soins attentifs. Il leur a fallu consentir bien des efforts pour arriver à ce résultat. Sil est aujourdhui à la hauteur de leurs investissements, il reste encore bien des travaux à effectuer. La vocation de ce site est de donner encore longtemps à voir ce bel exemple de propriété de maitre, caractéristique du bocage de la Manche, en belvédère de la Vire, Éléments protégés MH : la cheminée datée de 1717 dans la salle à manger ; la cheminée du début du XVIe siècle dans la cuisine: classement par arrêté du 12 septembre 1969.","architecture":"ANGOTIERE,  cest une imposante construction de poudingue chaînée de granit, un peu austère, qui sélève sur deux niveaux et entresol. Sa toiture dardoises est animée par des lucarnes à croupes et de puissantes souches de cheminées. Au centre, un perron à double émmarchement mène à létage noble percé de hautes baies. La façade est flanquée au nord dun massif, à pavillon carré à haute toiture à quatre pans et, au sud, dune tour ronde coiffée dun toit en poivrière. Sur la pelouse, des topiaires de thuyas et de buis animent les abords et conduisent vers lancien colombier. Derrière un rideau darbres, celui-ci sélève sur un terrain accidenté. Depuis peu, son toit a retrouvé le chaume qui le couronnait autrefois. Plus haut, cachés par une haie, les anciens bâtiments agricoles forment une cour rectangulaire. Sils sont hors deau aujourdhui, ils nen attendent pas moins une restauration plus complète. La façade de la ferme, maintes fois remaniée, a conservé de magnifiques encadrements de baies, énormes blocs de poudingue pourpré.  Au centre, une allée le traverse, bordée par des parterres rectangulaires soulignés de bordures de lavandes. Les autres parcelles du site sont occupées par des labours et des prairies qui enserrent la propriété sur les pentes les moins raides. En rive droite de la Vire, le site suit la route de la Chapelle-sur-Vire. Ici, cest un haut coteau boisé qui ne souvre que pour laisser apparaître une ancienne carrière et son petit bâtiment dexploitation.","habitants":"marquis de Sédouy \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château d'Angotière à Domjean. 49° 00' 00\" N, 1° 03' 25\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Angoti%c3%a8re_1.jpg","../../jctruffet.com/image/image_50/50_Angoti%c3%a8re_2.jpg","../../jctruffet.com/image/image_50/50_Angoti%c3%a8re_3.jpg"]},"Consult_chateau_formulaire109b":{"id":"Consult_chateau_formulaire109b","dept":"50","canton":"Agon-Coutainville","commune":"Anneville sur saire","nom":"Anneville_sur_Saire","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux dans cet article; Anneville et Tourps.                       ANNEVILLE, les terres et seigneurie d'Anneville-en-Saire étaient au XIVe siècle dans la famille Sauvage de Villers, en effet, on trouve que le 4 août 1399, Jean de Villers, chevalier, dit Sauvage, rend aveu au roi de son fief d'Anneville. Cette terre, lors de l'occupation anglaise, dans le XVe siècle, fut confisquée par Henri V, roi d'Angleterre, qui la donna à un anglais nommé Jean Cherwin. Geffroy Herbert, évêque de Coutances, acheta, en 1498, de Jeanne de France, veuve de l'amiral de Bourbon, le fief d'Anneville. Le château fut pillé, brûlé et dévasté par les Anglais, lors des guerres avec la France, pendant le XIVe siècle, l'édifice était situé près de la rivière de Saire, il fut pris en 1591 par les troupes de Henri IV. Le château actuel a été construit dans la deuxième moitié du XVIIIe siècle. Château dit Maison d'Anneville et ses communs datent de la seconde moitié du XVIIIe siècle. Éléments protégés MH : les façades et les toitures du château et de ses communs : inscription par arrêté du 5 mai 1975.                                                                                      A deux K.M. au sud  le château des  FORGES chambres d'hôtes de Dorothée Desbois  à Gouville sur mer et le château de l'Edf colonie.","architecture":"TOURPS, le fief de Samson d'Anneville était considérable, puisqu'il s'étendait sur Le Vicel, Réville, Montfarville, Barfleur, Sainte Geneviève, Valcanville et Saint Floxel. En 1450, le château du Tourps revint à Jean de la Cour. Dans la même paroisse, au Tourp, près de la chapelle Saint-Gilles, se tenait, le jour de la fête de ce saint, une foire dont les produits appartenaient à l'abbaye de Lessay. Un arrêt du parlement de Rouen, du 21 juillet 1657, termina une contestation de préséance entre Nicolas de Saint-Germain, sieur du Breuil, qui possédait le fief dominant, situé dans la paroisse d'Anneville, et Bon-Christophle de la Cour, sieur du Tourps, qui possédait le fief du Tourps, dans la même paroisse. Le parlement maintint le sieur de Saint-Germain en sa qualité de patron honoraire dans ses droits honorifiques de l'église, au droit de son fief du Breuil, à Anneville. Quant au sieur du Tourps, il fut condamné à faire enlever son banc et ses armes. Le logis et les communs, comme la maison d'Anneville au sud-est du bourg, par-delà la Saire, ont été largement reconstruits au XVIIIe siècle. Éléments protégés MH : les façades et les toitures du château, le salon et la chambre attenante avec leurs décors, et l'escalier ; les façades et les toitures de l'ensemble des bâtiments (logis manable, communs, chapelle, pavillon de jardin); le potager et ses murs de clôture: inscription par arrêté du 25 août 2005.","habitants":"fief d'Anneville et le fief de Samson  Jean de la Cour\r\n        \"","divers":"Deux châteaux dans cet article; Anneville grav-1-2 et Tourps grav-3-4.    GPS : 49° 38' 12,95\" Nord, 1° 17' 7,41\" Ouest","gps":"49° 38' 12,95\" Nord, 1° 17' 7,41\" Ouest","images":["../../jctruffet.com/image/image_50/50_Anneville_sur_Saire_1.jpg","../../jctruffet.com/image/image_50/50_Anneville_sur_Saire_2.jpg","../../jctruffet.com/image/image_50/50_Anneville_sur_Saire_3.jpg","../../jctruffet.com/image/image_50/50_Anneville_sur_Saire_4.jpg"]},"Consult_chateau_formulaire4591":{"id":"Consult_chateau_formulaire4591","dept":"50","canton":"Quettreville-sur-Sienne","commune":"Annoville","nom":"Annoville","type":"Château","periode":"XVII","histoire":"ANNOVILLE, situé à une centaine de mètres de la route reliant Montmartin-sur-Mer et Granville, le château d'Annoville domine les plages d'Annoville et de Hauteville-sur-Mer sur la Côte des Havres. La famille Michel d'Annoville-Tourneville le fait édifier au XVIIe siècle, avec notamment du granite de Chausey acheminé depuis le Havre de Regnéville-sur-Mer.  Le château voit s'y rencontrer une partie de la noblesse bas-normande : alliés aux grandes familles du temps, notamment à celle de Tourville, les Michel d'Annoville-Tourneville y donnent des fêtes particulièrement brillantes. Jusqu'à 1935, les boiseries de son vestibule ainsi que le lustre en fer forgé pesant environ une tonne et les grandes tapisseries de sa salle des fêtes témoignent encore de ces splendeurs passées À la mort de Pierre Charles Léonor Michel, premier maire dAnnoville en 1789, le château est transmis à son fils aîné : Florent Michel d'Annoville, maire de Muneville-sur-Mer. Le fils-cadet de celui-ci, Nicolas Louis Michel, en hérite (son frère aîné, Léonor Henri, étant mort avant son père), lequel retransmet le château à son unique fils : Charles Marie. À la suite de la disparition en mer de ce dernier en 1879 comme lieutenant de vaisseau (dans le naufrage de la batterie flottante l'Arrogante près de Hyères), le château passe à son fils unique, Marie Charles Louis Raoul, qui ny réside pas.","architecture":"ANNOVILLE, après avoir été déserté durant une trentaine dannées à partir de la guerre franco-allemande de 1870, le château est habité par Georges Michel d'Annoville, un des fils de Pierre Charles Ferdinand Michel d'Annoville (celui-ci étant cousin-germain de Nicolas Louis Michel Michel d'Annoville). Après la mort en 1910 de lépouse de Georges Michel d'Annoville, Lokoma Amelot de chaillou (indienne tehuelche de Patagonie adoptée par la famille Amelot de Chaillou), le château est habité par Paul Dutasta (chef de cabinet du ministre des Affaires étrangères Stephen Pichon), qui y reçoit à plusieurs reprises Georges Clemenceau.\r\nMarie Charles Louis Raoul Michel d'Annoville (fils unique de Charles Marie Michel d'Annoville ci-avant), consul de France au Luxembourg en 1907, meurt sans héritier en 1916 dans les combats de louvrage de Thiaumont lors de la bataille de Verdun (comme sous-lieutenant au 294e régiment d'infanterie). Le château revient alors à sa mère : Marie Charlotte Léonie Le Pelletier d'Angoville (veuve de Charles Marie Michel d'Annoville ci-avant). À la mort de cette dernière en 1930, le château est vendu par la famille Le Pelletier d'Angoville. À partir de 1935, la majeure partie de son contenu est dispersée, notamment un tableau représentant le maréchal de France Anne Hilarion de Costentin de Tourville qui est transmis à la famille Desgrées du Loû à Nantes.En 2003, le château est racheté par Pierre de Castellane (1960-2018) qui le restaure, redessine et replante le jardin. Il en fait un lieu culturel en ouvrant la propriété pour des expositions, des spectacles et des conférences.","habitants":"famille Michel d'Annoville-Tourneville \r\n        \"","divers":"Château d'Annoville   48° 58' 02\" nord, 1° 32' 12\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Annoville_1.jpg","../../jctruffet.com/image/image_50/50_Annoville_2.jpg"]},"Consult_chateau_formulaire1714":{"id":"Consult_chateau_formulaire1714","dept":"50","canton":"Val-de-Saire","commune":"Aumeville_Lestre","nom":"Aumeville_Lestre","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Trois châteaux dans cet article; Aumeville, la Hougue et Tourville.                                                                         AUMEVILLE; Cette paroisse d'Aumeville-Lestre, dont le seigneur prenait le titre de Capitaine général de toute la côte, relevait de l'intendance de Caen, de l'élection et de la sergenterie de Valognes. Le château a été construit en 1756, c'est une vaste construction de style Louis XV encadrée de deux ailes en retour avec un beau perron en fer à cheval. Il a appartenu à la puissante famille Davy. Le parc possède un  jardin avec une terrasse en terre-plein et un étang ; le jardin est inscrit au pré-inventaire des jardins remarquables.                                                                TOURVILLE,   Construction classique du XVIIIe siècle, le château remplace un édifice plus ancien dont témoignent les deux communs bordant l'avant-cour.","architecture":"TOURVILLE, L'ensemble des fonctions du grand domaine subsiste (verger, boulangerie, chenil). Un parc a été dessiné, avec un grand parterre délimité au sud par un saut-de-loup, qui permet de continuer la perspective jusqu'à la route de l'ancienne église.\r\nÉléments protégés MH : les façades et les toitures du château, l'escalier avec sa cage, la cour d'honneur avec sa terrasse, l'assiette du jardin avec le parterre d'agrément, le saut de loup, la perspective et l'allée, boulangerie avec son bief consistant en un canal aérien maçonné, le potager avec ses murs de clôture: inscription par arrêté du 13 septembre 2006.                                                                                                                                  La HOUGUE, manoir construit au XVIe siècle ayant appartenu à Lucas de Nehou (fondateur de fabrique de verre à La Glacerie et fondateur de Saint-Gobain). Il a découvert le principe des vitres. Le palais des glaces de Versailles est créé avec cette manufacture. Mais elle fut détrônée par les Siciliens qui ont découvert comment faire des vitres plus grandes que les vitraux. Le manoir est flanqué de trois tours dont l'une est essentiellement défensive, présence d'arquebusières mobiles unique dans la région (voir photo ci-dessous), la pierre creusée d'un trou de serrure tourne pour avoir un angle plus grand. Perron montoir à cheval. Le Manoir possède une partie de ses douves et des murs défensifs. A l'intérieur de l'édifice les armoiries de Lucas de Néhou sont présentes sur les cheminées monumentales. Les extérieurs de la propriété sont ouverts au public.","habitants":"famille Davy et  Lucas de Nehou et Seigneurs locaux\r\n        \"","divers":"Trois châteaux dans cet article; Aumeville grav 1-2, la Hougue grav-4-5-6  et Tourville grav-3. Tourville  GPS : 49° 31' 07\" Nord, 1° 19' 45\" Ouest                                                        Lestre 49° 31' 34\" nord, 1° 20' 06\" ouest                                                       Aumeville 49° 32' 22\" nord, 1° 19' 17\" ouest","gps":"49° 31' 07\" Nord, 1° 19' 45\" Ouest","images":["../../jctruffet.com/image/image_50/50_Aumeville_Lestre_1.jpg","../../jctruffet.com/image/image_50/50_Aumeville_Lestre_2.jpg","../../jctruffet.com/image/image_50/50_Aumeville_Lestre_3.jpg","../../jctruffet.com/image/image_50/50_Aumeville_Lestre_4.jpg","../../jctruffet.com/image/image_50/50_Aumeville_Lestre_5.jpg","../../jctruffet.com/image/image_50/50_Aumeville_Lestre_6.jpg"]},"Consult_chateau_formulairef498":{"id":"Consult_chateau_formulairef498","dept":"50","canton":"Carentan","commune":"Auvers","nom":"Auvers","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux dans cet article Auvers ert Donville à Meautis  à un K.M  au sud                                                                                                          AUVERS,  en 1208, le fief dAuvers, distrait de la baronnie de Saint-Sauveur, appartenait à Richard dHarcourt, possesseur de cette baronnie. En 1282, Raoul dHarcourt, seigneur dAuvers, reconnaît que labbaye de Saint-Sauveur a le patronage de léglise. Pendant loccupation anglaise Raoul dAuvers devait deux hommes darmes à la baronnie de Waringefort ; Robert dAuvers fournissait à Guillaume, comte de Warwick, le service de trois archers dans le Warwickshire, et Hugues dAuvers le même nombre dans le Northamptonshire. En 1590, les seigneurs dAuvers et de Plain-marais senferment avec leur frère Antoine dOrglandes, baron de Briouze, dans Avranches, qui tenait pour la Ligue contre larmée royale commandée par le duc de Montpensier, la ville capitula.  Mr et Mme Bucaille                                         AUVERS,  Aujourd'hui, il ne reste du château d'Auvers que son pavillon central, haut de trois niveaux toit à l'impérial, qui abrite le siège des Ecuries d'Auvers, un centre équestre, qui organise des concours de chevaux internationaux. Les façades et les toitures des restes subsistants du château, les dépendances, et le pavillon d'entrée sont inscrits aux M.H. depuis le 2/11/1970.","architecture":"DONVILLE, à Meaitis  est une propriété dont les traces remontent au XIe siècle et qui a été refaite, à l'époque de Louis XV.  de Plan en U , c'est une masse d'une grande finesse et unique dans le parc des Marais du Cotentin et du Bessin. Les Visites au choix se font sur 2 thèmes : la bataille de Bloody Gulch avec les parachutistes de la 101ème airborne (débarquement) et l'Histoire du Manoir de Donville  (corps de logis avec façades, toitures, boiseries intérieures, charretterie, bâtiment de la cour d'honneur). Le Mémorial archéologique unique en France, le Mémorial de Bloody Gulch, avec les vestiges du champ de bataille, la salle d'exposition et les pièces. La visite évoque l'épreuve de Mr et Mme Bucaille ayant survécu à cette terrible bataille évoquée dans la série \"Band of Brothers\". Des évènementiels sont proposés chaque année : en Juin a lieu un spectacle inter-actif de cinéma théâtre de nuit, avec un camp de reconstitution US (chars, véhicules allemands). En Septembre et Octobre ont lieu des soirées aux chandelles, dans le cadre des Journées du Patrimoine  et à la Toussaint. Manoir de Donville, en bauge du XVIIIe siècle, inscrit aux M.H. en 2011.","habitants":"Famille  d'Auvers\r\n        \"","divers":"Deux châteaux dans cet article Auvers grav-2-3-4 et Donville grav-1 à Meautis  à un K.M  au sud    GPS : 49° 18' 00\" Nord, 1° 19' 20\" Ouest   Donville   GPS : 49° 17' 47,95\" Nord, 1° 16' 55,52\" Ouest","gps":"49° 18' 00\" Nord, 1° 19' 20\" Ouest   Donville   GPS : 49° 17","images":["../../jctruffet.com/image/image_50/50_Auvers_1.jpg","../../jctruffet.com/image/image_50/50_Auvers_2.jpg","../../jctruffet.com/image/image_50/50_Auvers_3.jpg","../../jctruffet.com/image/image_50/50_Auvers_4.jpg","../../jctruffet.com/image/image_50/50_Auvers_5.jpg"]},"Consult_chateau_formulaire297b":{"id":"Consult_chateau_formulaire297b","dept":"50","canton":"Avranches","commune":"Avranches","nom":"Avranches","type":"Château; vestiges forteresse","periode":"XI-XVII","histoire":"A Avranches vestiges de la forteresse,  le château d'Apilly,  le Champ du Genet  et de Vains.                                                                                              AVRANCHES, le château  a été construit vers 950 par Onfroi Le Dane, sur les vestiges de l'ancienne enceinte romaine. Situé sur un rocher, la forteresse pouvait surveiller la baie du Mont-Saint-Michel et les divers envahisseurs ne s'y trompèrent pas et l'occupèrent ; Celtes avec les Abrincates, Romains, Saxons, puis Francs. Une succession d'enceintes et de fossés y ont été ajoutés. Le donjon roman a malheureusement disparu au siècle dernier. Le haut de la courtine constitue une plate-forme au même niveau que la terrasse. Un schéma, réalisé par le chanoine Pigeon, montre de quelle manière le donjon et la courtine étaient reliés. A Avranches les vestiges et château du Champs du genet, il est impossible d'accéder à la terrasse depuis l'intérieur de la bâtisse. Des passages ont été obstrués après un affaissement du niveau supérieur de l'édifice, à une époque indéterminée. Aujourd'hui, au sommet d'un mur de courtine crénelé, on découvre un panorama sur la baie et la vallée de la Sée, au cur des différents quartiers Avranchinais.\r\nAPPILY  Le comte Jean-Baptiste du Quesnoy, seigneur d'Apilly, y meurt le 7 août 1768, à 69 ans. Hervé de Saint-Germain y réside au XIXe siècle. Arthur Gustave de Clinchamp, officier de cavalerie, commandant le 1er bataillon des mobiles de la Manche, s'y marie le 19 octobre 1863, avec Charlotte Saint-Germain du Houlme, et leur fille Geneviève de Clinchamp y naît le 17 novembre 1864.  La comtesse Edna de Clinchamp, née Lewis, y meurt le 29 août 1932, à 49 ans.En 1943, fuyant les bombardements sur Cherbourg, une centaine d'élèves de l'école du Sacré-Cur s'y réfugient, jusqu'à leur retour à Cherbourg en août 1944.","architecture":"DONJON d'AVRANCHES, aurait été construit au commencement du XIe siècle, lors de l'installation du premier comte, Robert d'Avranches, fils illégitime du Duc Richard Ier. Élevé sur les restes d'un castellum romain, il n'avait pas de fonction résidentielle, vu ses dimensions peu considérables (relevées par le chanoine Pigeon vers 1880-1890). Le donjon a été traversé, en 1848, par une rue nouvelle prolongeant la rue d'Office, devenue, aujourd'hui, la rue de la Belle-Andrine. Ce qu'il restait ce qui subsistait du donjon s'est effondré en 1883. Une courtine, située entre le donjon roman disparu et la Tour du Promenoir, ornée de créneaux au début du XXe siècle, est souvent présentée à tort comme l'ancien donjon. Éléments protégés MH : la tour située derrière l'Hôtel de Ville : inscription par arrêté du 14 mai 1937.                                                                                        A deux K.M au nord à St-Senier sous Avranches  le château D'APILLY,  le château est gravement endommagé en 1944 par un incendie accidentel provoqué par des occupants américains, après la libération. \"et de CHAMP du GENET Chambres d'hôtes.                                                                                     A un K.M. au nord ouest à Vains VAINS, manoir, est une de ces demeure du XVIIe siècle, qui succédèrent aux forteresses du Moyen-Age. C'est une de ces habitations du seigneur devenu homme de cour, comme le manoir de la Champagne. Les tours ont disparu, et ont été remplacées par le pavillon carré au toit aigu et aplati. Le fossé est moins profond, le pont-levis a fait place au pont dormant, la meurtrière est devenue une fenêtre, la porte étroite, devenue porte d'honneur, s'est agrandie en s'exhaussant sur son perron. Cette transformation éclate dans l'équipement militaire du noble au XVIIe siècle. Vains a eu ses seigneurs, en 1197 le seigneur était Robert de Verni. Radulfus de Veim est souscrit à la charte de donation du Fougerai, en Bacilly, en 1186. A la fin du XIIIe siècle, Raoul de Théville, évêque d'Avranches, était seigneur de Vains. Éléments protégés MH : le logis ; la chapelle ; le bâtiment dit corps de garde : inscription par arrêté du 27 décembre 1994.","habitants":"Comte, Robert d'Avranches\r\n        \"","divers":"A Avranches  vestiges de la forteresse grav 1 à 5  le château d'Apilly grav 6, le Champ du Genet grav-7  et Vains grav 8-9                     Avranvches GPS : 48° 41' 13,67\" Nord, 1° 21' 41,57\" Ouest      Apilly: 48°41'54.5\"N 1°19'30.7\" Ouest                                            Champ 48°40'45.9\"N 1°17'24.2\" Ouest","gps":"48° 41' 13,67\" Nord, 1° 21' 41,57\" Ouest      Apilly: 48°41'","images":["../../jctruffet.com/image/image_50/50_Avranches_1.jpg","../../jctruffet.com/image/image_50/50_Avranches_2.jpg","../../jctruffet.com/image/image_50/50_Avranches_3.jpg","../../jctruffet.com/image/image_50/50_Avranches_4.jpg","../../jctruffet.com/image/image_50/50_Avranches_5.jpg","../../jctruffet.com/image/image_50/50_Avranches_6.jpg","../../jctruffet.com/image/image_50/50_Avranches_7.jpg","../../jctruffet.com/image/image_50/50_Avranches_8.jpg","../../jctruffet.com/image/image_50/50_Avranches_9.jpg"]},"Consult_chateau_formulaire2bd1":{"id":"Consult_chateau_formulaire2bd1","dept":"50","canton":"Le Mortainais","commune":"Barenton","nom":"Barenton","type":"Manoir","periode":"XIX","histoire":"BONNEFONTAINE, construction datant du XIXe siècle,  a été acquis par la commune de Barenton., propriété de la commune depuis le début des années 1950.  Il a accueilli la brigade de gendarmerie de 1954 à septembre 1985. Après le déménagement de celle-ci.","architecture":"BONNEFONTAINE, l'édifice, possède un 1er étage qui a été loué à Létablissement de travail protégé de Barenton (E.T.P.), pour lhébergement des résidents de létablissement, puis le S.S.I.A.D (service de soins intercommunal à domicile). le rez de chaussée a accueilli la bibliothèque municipale jusquau mois de mars 2005 et le point public de 1992 à octobre 2013.","habitants":"La commune\r\n        \"","divers":"Château de Bonnefotaine à le Mortainais grav -1-2 Gps  48° 35' 58.00\" N, 0° 49' 56.48\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Barenton_1.jpg","../../jctruffet.com/image/image_50/50_Barenton_2.jpg","../../jctruffet.com/image/image_50/50_Barenton_3.jpg"]},"Consult_chateau_formulaire70db":{"id":"Consult_chateau_formulaire70db","dept":"50","canton":"Val-de-Saire","commune":"Barfleur","nom":"Barfleur","type":"Château","periode":"XVI-XVII","histoire":"trois monuments dans cet article Barfleur, Cour ste-Catherine  et le Conquérant.                                                                                           BARFLEUR  À la fin du XVIe siècle, Henri IV ordonna la destruction des fortifications. Le 29 mai 1692 a lieu la bataille de la Hougue ou bataille de Barfleur, lors de la Guerre de la Ligue d'Augsbourg. L'amiral Tourville, qui commande la flotte française, repère la flotte anglo-néerlandaise au large de Barfleur et, conformément à ses ordres et malgré une infériorité numérique de deux contre un, l'attaque. Dans un premier temps, les Français résistent et tiennent les Anglo-Néerlandais en échec, leur infligeant la perte de navires contre aucun côté français. Toutefois, la côte normande ne dispose d'aucun port pouvant abriter la flotte à l'issue du combat et Tourville ordonne le repli vers les côtes bretonnes.                                                            Le COUR SAINTE CATHERINE du passé médiéval de la cité, il ne reste presque rien excepté la cour Sainte-Catherine où se trouve la seule maison du Moyen-Age a peu prés complété. Elle a conserve une entrée cochère en arc surbaissée, une porte avec linteau en accolade, une fenêtre à meneaux et un bel escalier extérieur.\r\nSAINT-PIERRE-EGLISE de M. et Mme de Blangy  Bâti au XVIIIe siècle, le château de Saint-Pierre-Eglise, inscrit M.H., est entouré dun grand parc et ceint de murs épais. D'un style très pur, la sobriété de son architecture extérieure est rehaussée par la qualité de sa décoration intérieure : élégantes boiseries et parquets Versailles. Dans cette propriété privée, des salons peuvent être loués pour des séminaires ou des évènements particuliers (mariage, cocktail).","architecture":"BARFLEUR, cependant, la manuvre est contrariée par la bascule des courants du raz de Barfleur, du raz du cap Lévi et du raz Blanchard, sur la côte nord du Cotentin. Trois navires s'échouent à Cherbourg, dont le navire-amiral de Tourville Soleil Royal. Douze vaisseaux doublent la pointe de Barfleur et mouille, au soir du 31 mai dans la rade de la Hougue. Sans défense terrestre, les navires sont détruits par les Anglo-Néerlandais.                                                                Le CONQUERANT,  est une maison d'hôtes de charme par monsieur Delorme Néde,  du XVIIe siècle ou furt construit le navire qui porta Guillaume  à la conquête de l'Angleterre, située au cur du bourg de Barfleur, à 50 mètres du port. La ville a conservé peu d'édifices datant du Moyen-Âge et de la Renaissance, hormis : un colombier du XVe siècle sur la digue de la grande grève, dernier vestige d'un manoir seigneurial entièrement détruit, et la Cour Sainte-Catherine de la fin du XVe, début du XVIe siècle.","habitants":"Seigneur locaux\r\n        \"","divers":"trois monuments Barfleur grav-4, Cour ste-Catherine grav-1-2 et le Conquérant grav-3.    49° 40' 13\" nord, 1° 15' 53\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Barfleur_1.jpg","../../jctruffet.com/image/image_50/50_Barfleur_2.jpg","../../jctruffet.com/image/image_50/50_Barfleur_3.jpg","../../jctruffet.com/image/image_50/50_Barfleur_4.jpg"]},"Consult_chateau_formulaire13f2":{"id":"Consult_chateau_formulaire13f2","dept":"50","canton":"Les Pieux","commune":"Barneville_Carteret","nom":"Barneville_Carteret","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux dans cet article; Carteret, Chimay, Caillemont  et Douits.                                                               CARTERET,  Barbey dAurevilly, écrivain, enfant, y est venu en vacances chez les Lefebvre dAnneville (Hyacinthe Robert Lefebvre dAnneville, [1741-1826], fut le dernier seigneur de Carteret et Maire de la commune sous lEmpire). Barbey a situé dans ce manoir la deuxième partie de son roman « Une vielle maîtresse »,.ce manoir est une construction de la première moitié du XVIIIe siècle à lemplacement dun manoir plus ancien remontant au moins au XVIe siècle, dont il reste une porte à linteau en accolade et un escalier à vis intérieur. Le constructeur de lactuel manoir est  Robert Henri Le Rossignol, lieutenant général au bailliage de Saint-Sauveur-le-Vicomte, maître des Eaux et Forêts de Bricquebec, qui avait acheté la terre de Carteret en 1718.                                                                      CHIMAY, Fin 1911, laméricaine Clara Ward, fille dun millionnaire du Michigan, achète avec son quatrième mari litalien Albano Casellato  afin dy construire le château de Chimay sur les plans de larchitecte Roberti. Clara Ward obtient son titre de princesse de Chimay en épousant un prince belge désargenté en 1890. La construction du château dura 2 ans, de 1912 à 1914 et il fut aussitôt réquisitionné pour loger les jeunes soldats belges en transit. Clara Ward décède en 1916. Elle nhabitera jamais son château. En 1927, la bâtisse est transformée en « Hôtel pension du château » de 40 chambres. De 1946 jusquen 1976, le château de Chimay sera rebaptisé « château Patrick » et servira de colonie de vacances aux enfants dArgentan. Il aura plusieurs propriétaires mais la gestion restera pendant ces 30 ans à la paroisse dArgentan. Au milieu des années 80, le château est mis en vente. Une thalassothérapie est envisagée mais le projet tombe à leau. Il faut attendre 1989 pour que le château de Chimay soit transformé en hôtel-restaurant mais en 1994 laffaire fait faillite. Il est aussitôt acheté par une société civile immobilière (SCI) qui le transformera, lagrandira et le divisera en plusieurs appartements.","architecture":"CAILLEMONT, est un imposant bâtiment historique en pierre situé sur la côte normande, en face des îles Anglo-normandes. Ce manoir du XVIIIe siècle, chambre d'hôtes des propriétaires, Catherine et Eric Fouché.               DOUITS 1889, les affaires de Léon Jules de La Roche-Courbon, ne devinrent guère brillantes. Il navait pas remboursé la totalité de ses dettes à la société Générale ni à un grand nombre de particuliers.\r\n Douits, hypothéqué, fut saisi le 19 janvier 1900 et vendu aux enchères. Le château et le parc furent acquis le 14 mai 1900 par un de ses cousins, Henri Camille Gache de Courbon-Blenac, dit de la Roche-Courbon, Henri de Courbon-Blénac fit vendre le château aux enchères le 30 décembre 1903. Il fût acquis  par Auguste Hialrion Bressand  (alias Bressan), premier promoteur de Barneville plage en 1896. Le 5 aout 1916, le château fût de nouveau proposé aux enchères et adjugé  à Michel Lemoigne, négociant à Portbail, seul enchérisseur. Le 11 aout 1925, Michel Lemoigne vendit la propriété  à Clara Hélène Barker veuve de William-Nathaniel Berkeley, domiciliée à New-York et à Ellen Douglas Hoge demeurant à Wheeling chacune pour une moitié. Ellen Hoge céda sa demi -part à Mme Berkeley , le 28 février 1927. Le château des Douits sinistré pendant la 2eme guerre mondiale, fut vendu le 25 février 1949, par Clara Berkeley à la commune de Carteret. Le château sera transformé en Mairie avec 4 logements.Le 20 septembre 1947, le conseil municipal de Carteret décida que lavenue des Douits porterait le nom davenue Berkeley dans lattente de la construction dun groupe scolaire dans le parc derrière le château qui devait  porter le nom de groupe Berkeley et que Clara Berkeley serait honorée du titre de citoyenne dhonneur de Carteret en remerciement de la compréhension dont elle avait fait preuve lors des négociations sur le prix de vente (vu qui na pas eu de suit, près la fusion des communes de Barneville-sur-mer et de Carteret, effective au 1er janvier 1965, sous la dénomination de Barneville-Carteret, le château est devenu « mairie-annexe de Carteret.","habitants":"Chimay, Clara Ward                                                                                 Douits Léon Jules de La Roche-Courbon\r\n        \r\n        \"","divers":"Trois châteaux dans cet article; Carteret grav-1, Chimay grav 2-3 Caillemont  grav 5 et Douits grav-4.  GPS : 49° 22' 55 74\" Nord, 1° 45' 20,65\" Ouest","gps":"49° 22' 55 74\" Nord, 1° 45' 20,65\" Ouest","images":["../../jctruffet.com/image/image_50/50_Barneville_Carteret_1.jpg","../../jctruffet.com/image/image_50/50_Barneville_Carteret_2.jpg","../../jctruffet.com/image/image_50/50_Barneville_Carteret_3.jpg","../../jctruffet.com/image/image_50/50_Barneville_Carteret_4.jpg","../../jctruffet.com/image/image_50/50_Barneville_Carteret_5.jpg"]},"Consult_chateau_formulaire6d88":{"id":"Consult_chateau_formulaire6d88","dept":"50","canton":"Carentan","commune":"Beuzeville la Bastille","nom":"Beuzeville_Bastille","type":"Château","periode":"XIV-XVIII","histoire":"deux châteaux dans cet article; Plain-Marais et Catelet.                PLAIN-MARAIS,  du XIVe,  possède de belles tourelles qui datent du XIVe siècle. En 1410, Jean d'Arclais, seigneur de Montboscq, en est le capitaine. En 1429, c'est au tour de Jean de Talbot d'occuper la place. Le château, comme le Câtelet, relevaient de la châtellenie de Varenguebec. C'est vers la fin du XVIe siècle, que la famille de Saint-Simon entreprit d'importants travaux dans le château. Propriétaires du XVe au XIXe siècle, on peut voir leurs armoiries sculptées. Chateaubriand (1768-1848) aurait séjourné et écrit une partie de ses Mémoires d'outre-tombe au château de Plain-Marais, lors d'une visite à sa nièce, Antoinette de Chateaubriand, épouse d'Alfred de Beaufort, propriétaire du château. Pendant la Révolution, les républicains tentèrent d'arrêter la marquise Andrée -Louise-Aimée de Thiboutot, épouse du propriétaire des lieux, Olivier Le Clerc de Juigné. il est aujourd'hui la possession du comte Jean d'Aigneaux.","architecture":"CATELET, le Cathelet fut repris par les Anglais, en 1449. Une partie de son enceinte était encore visible au XIXe siècle. En septembre 1374, Jean de Vienne fit renforcer les bastides de Pierrepont, sur la Commune de Saint-Sauveur-de-Pierrepont, et de Pont-l'Abbé sur les communes de Picauville et Étienville et de Beuzeville, dans le cadre du siège de Saint-Sauveur-le-Vicomte. Le Câtelet fut repris aux Anglais en 1449. Le Câtelet, comme le château de Plain-Marais, relevaient de la châtellenie de Varenguebec. Le Câtelet se présente sous la forme d'une plate-forme circulaire, de 35 mètres de diamètre environ, formée de terre amassée. Le plateau central est bordé par un parapet bas en moellons et forme un cercle. Les fossés à sa base pouvaient être remplis à volonté.                                                              PLAIN-MARAIS  c'est une ancienne maison forte de style médiéval. Le château de Plain Marais, servait de résidence seigneuriale autrefois. Perché sur une colline, domine le marais. Il est entouré de douves, a été bâti pendant la guerre de cent ans : il consistait alors en une maison-forte entourée de hautes murailles et de fossés secs qui se remplissaient en fonction de l'inondation des marais. Dans la seconde moitié du XVIIe siècle, le château a été entouré d'une plate-forme bastionnée à la Vauban. Les quatre angles de la plate-forme ont été bastionnés et surmontés d'échauguettes. Trois vastes bassins semi-circulaires ont été installés au centre des côtés ; ils sont entourés de degrés de pierre supportant des statues. Il s'agit d'un ensemble décoratif inspiré des fortifications classiques.","habitants":"Plain;  famille de Saint-Simon                                                 Catelet, Famille de Jean de Vienne\r\n        \"","divers":"deux châteaux dans cet article; Plain-Marais grav 1-2-3 et Catelet.   Catelet GPS : 49° 21' 32\" Nord, 1° 21' 36\" Ouest                                          Plain GPS : 49° 21' 12,94\" Nord, 1° 22' 18,61\" Ouest","gps":"49° 21' 32\" Nord, 1° 21' 36\" Ouest","images":["../../jctruffet.com/image/image_50/50_Beuzeville_Bastille_1.jpg","../../jctruffet.com/image/image_50/50_Beuzeville_Bastille_2.jpg","../../jctruffet.com/image/image_50/50_Beuzeville_Bastille_3.jpg"]},"Consult_chateau_formulaireb997":{"id":"Consult_chateau_formulaireb997","dept":"50","canton":"Agon-Coutainville","commune":"Feugères","nom":"Bois_Perron","type":"Manoir","periode":"XVI","histoire":"Deux manoirs dans cet article ; Bois et Perron.                                        BOIS,  situé entre les cours deau Sèves et Taute, le manoir tire son nom de la seigneurie dont il dépendait et qui appartenait aux Davy du Perron depuis la fin du XIVe siècle. Elevé au XVIe siècle,  par Pierre Jean Davy, cinquième sieur du Bois, conseiller du roi à Coutances, le manoir est transmis par les femmes en 1689 à la famille Le Trésor de La Bazière puis en 1797 aux Prey de Launay qui se sont illustrés tout au long du XVIIIe siècle comme officiers du Présidial de Coutances. Au décès en 1833, dHélène Louise Charlotte du Prey de Launay, le domaine entre dans la famille de son mari, les Ferrand de la Conté. Leurs descendants sont encore aujourdhui propriétaires du manoir. Organisé autour dune cour fermée, le manoir comprend un logis dhabitation et un vaste ensemble agricole. Les nombreux éléments de défense encore présents, notamment les douves occidentales, la vingtaine déguets et les canonnières situées à droite du portail, attestent que le manoir avait du moins à ses débuts, une vocation de maison-forte.                                                                    A cinq  K.M. à l'ouest à St-Aubin du Perron, le manoir du PERRON ce domaine plein de charme accueillera vos plus beaux événements privés ou professionnels : mariages etc. Au cur dun écrin de verdure de 40 hectares mêlant bois, prairies et étang, vous serez entièrement chez vous au château du Perron. Vous accéderez au château par son allée majestueuse, ornée darbres centenaires.","architecture":"BOIS, le premier logis manorial est un bâtiment à deux niveaux dont les ouvertures, notamment les fenêtres à meneaux, témoignent de réminiscences médiévales. Les ondulations du toit et la forme des lucarnes rappellent que la couverture était originellement en chaume ; elle na été en effet remplacée par une toiture en ardoises quau milieu du XXe siècle. Contemporain de ce premier logis qui servait également détable, et situé en face de lui, un remarquable ensemble de bâtiments agricoles a été bâti en pierre et bauge ; il est composé dune étable-fenil et dune écurie-charretterie en retour. Le pressoir qui jouxte immédiatement le logis, remonte également au XVIe siècle. Un deuxième logis, au caractère monumental plus affirmé, est construit en pierre au cours du XVIIe siècle et vient fermer la cour à louest. Il se présente comme un bâtiment à deux niveaux doté à ses extrémités de deux pavillons carrés en saillie. Il est remanié en 1870 : une aile en retour incorporant le pavillon sud et lancienne chapelle est construite à cette date. Éléments protégés MH : les façades et les toitures de l'ensemble des bâtiments constituant le manoir, à savoir le logis principal, le logis secondaire et les dépendances agricoles s'ordonnant autour de la cour, ainsi que les murs de clôture du jardin potager, l'étang et les fossés : inscription par arrêté du 2 février 2012.","habitants":"Ferrand de la Conté\r\n        \"","divers":"Deux manoirs dans cet article ;  gracv-2 et Perron-2-3.    gps \r\n49° 09' 06\" nord, 1° 19' 09\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Bois_Perron_1.jpg","../../jctruffet.com/image/image_50/50_Bois_Perron_2.jpg","../../jctruffet.com/image/image_50/50_Bois_Perron_3.jpg"]},"Consult_chateau_formulaireece5":{"id":"Consult_chateau_formulaireece5","dept":"50","canton":"Saint-Hilaire-du-Harcouët","commune":"St-James","nom":"Boucéel","type":"château","periode":"XVIII","histoire":"BOUCEEL, remonte au début du XIIe siècle. Il avait été attribué à la famille Pigace par Richard III duc de Normandie, quatre familles sy sont succéder. Les propriétaires successifs du château furent Charles le Fournier de Bernaville, gouverneur de la Bastille, de 1708 à 1718. Il passa ensuite à la famille Le Fauconnier, mousquetaires du roi, qui émigrèrent. En 1763 le marquis de Montecot s'en porte acquéreur. En 1792, fut alors saisi et racheté au milieu du XIXe siècle, par la famille d'Aigneaux. Ils l'occupèrent jusqu'à la seconde guerre mondiale.  Cest le troisième château sur le domaine, construit en 1763. Pendant la Révolution, le marquis de Montécot avait officiellement émigré. Son épouse demanda le divorce en 1792 pour devenir la propriétaire du domaine et éviter la confiscation de leurs biens. Le marquis devenu colonel dans larmée des Chouans se cacha durant des années dans le château. En 1896 achat de Bouceel par les  Roquefeuil-Cahuzac.  Lors de la deuxième guerre Mondiale, le château a été occupé par des officiers de la Wermacht pendant lété 1940 et y sont restés que quelques mois car le château navait pas lélectricité à cette époque.  Comte et Comtesse Régis de Roquefeuil l'ont transformé en chambres d'hôtes.\r\nÉléments protégés MH : les façades et les toitures ; la salle à manger, la bibliothèque, le boudoir et le grand salon du rez-de-chaussée avec leur décor ; la chapelle : inscription par arrêté du 30 décembre 1986.","architecture":"BOUCEEL, a été construit au XVIIIe siècle. Il est doté d'une chapelle. Ce château est une malouinière, composée d'un corps de logis de plan rectangulaire prolongé de deux pavillons d'un seul niveau,avant corps arrondi marqué par un fronton triangulaire deux ailes basses ont leur toits cachés  par une balustrade le domaine de Boucéel remonte au début du XIIe siècle. Le château actuel, construit en 1763, inscrit ISMH, est une demeure familiale.  En 1794, il y eut de très violents combats entre larmée Républicaine \"les Bleus\" et les Chouans. Lors dun combat gagné par les Bleus, ils brûlèrent tout ce qui se trouvait à lintérieur du château,  La famille d'Aigneaux le fit agrandir, moderniser, fit construire une orangerie et une chapelle, dans le parc. De 1942 jusqu'au printemps 1944, le château fut  la propriété d'un industriel cherbourgeois et  ensuite réquisitionné par les Allemands qui y installèrent le PC de Falley. Le 17/05/1944, le Général Rommel en tournée d'inspection du Mur de l'Atlantique, fut reçu à 11 heures du matin, au château de Bernaville par le général Wilhelm Falley, site dun violent combat pendant la Révolution Française, le chef chouan du Boisguy y passa la nuit du 5/12/1795. A lintérieur, superbes boiseries, parquets à caissons, mobilier de style, portraits de famille, sont associés avec goût au confort moderne et aux salles de bains très raffinées, son île, ses grands arbres séculaires et sa chapelle du XVe siècle.","habitants":"famille d'Aigneaux Comte et Comtesse Régis de Roquefeuil,\r\n        \"","divers":"Château de Boucéel à st-James   GPS : 48° 33' 57\" Nord, 1° 21' 57\" Ouest","gps":"48° 33' 57\" Nord, 1° 21' 57\" Ouest","images":["../../jctruffet.com/image/image_50/50_Bouc%c3%a9el_1.jpg","../../jctruffet.com/image/image_50/50_Bouc%c3%a9el_2.jpg","../../jctruffet.com/image/image_50/50_Bouc%c3%a9el_3.jpg","../../jctruffet.com/image/image_50/50_Bouc%c3%a9el_4.jpg","../../jctruffet.com/image/image_50/50_Bouc%c3%a9el_5.jpg"]},"Consult_chateau_formulaireaa8c":{"id":"Consult_chateau_formulaireaa8c","dept":"50","canton":"Bricquebec","commune":"Golleville","nom":"Bretonnière","type":"Château","periode":"XVIII","histoire":"BRETONNIERE,   Louis de La Couldre de La Bretonnière en devient propriétaire en 1791 sans y résider. Ses descendants en ligne féminine possédaient toujours ce château dans les années 1970. Le fief du Mesnil en Golleville possédait au XVIIe siècle logis, chapelle et grand bâtiment de commun. Si le logis était assez caractéristique de l'architecture cotentinaise avec ses meneaux et traverses plats, en revanche l'appareillage alterné en damier brique et pierre constitue un cas assez isolé dans la région. Peu après, un colombier en brique fut construit contre la chapelle. Un nouveau corps de logis est accolé au premier au XVIIIe siècle. Château classique de plan massé, élevé dans le prolongement d'une grande allée d'accès. De belles douves en hémicycle viennent ceinturer un jardin d'agrément.","architecture":"BRETONNIERE, il date du XVIIIe siècle, ses communs du XVIIe siècle.\r\nUne première inscription au titre des monuments historiques est intervenue le 11 septembre 2009 pour les façades et toitures du logis, ainsi que dans la partie du logis du XVIIIe siècle, l'escalier avec sa cage et les pièces de réception du rez-de-chaussée , la chapelle, le colombier, le grand commun, la cour d'honneur, les façades et les toitures des deux pavillons de jardin et de la maison du jardinier, l'ensemble des murs du domaine, l'ensemble du système hydraulique,  l'assiette du jardin potager et du jardin d'agrément,  l'allée d'accès et les haies doubles tâlutées, inscription par arrêté du 15 mars 2010.","habitants":"Louis de La Couldre de La Bretonnière\r\n        \"","divers":"Château de Bretonnièrre à Godeville GPS : 49°26'10,63\" Nord, 1°30'11,58\" Ouest","gps":"49°26'10,63\" Nord, 1°30'11,58\" Ouest","images":["../../jctruffet.com/image/image_50/50_Bretonni%c3%a8re_1.jpg","../../jctruffet.com/image/image_50/50_Bretonni%c3%a8re_2.jpg","../../jctruffet.com/image/image_50/50_Bretonni%c3%a8re_3.jpg"]},"Consult_chateau_formulaired673":{"id":"Consult_chateau_formulaired673","dept":"50","canton":"Bricquebec","commune":"Bricquebec","nom":"Bricquebec","type":"Vesties-Châteaux","periode":"XII-XVIII-XIX","histoire":"Trois châteaux dans cet article Bricquebec, St-Blaise et Darnetal.                                                                            BRICQUEBEC, propriété de la famille Bertran du Xe siècle jusqu'au XIVe siècle, le château appartiendra à Robert VII Bertran, nommé maréchal de France en 1326 et mort en 1348.  Le château est transmis par mariage à la famille Paisnel puis aux d'Estouteville. Donné par Henry V au Comte de Suffolk en 1418, il sera rendu en 1450 à Louis II d'Estouteville. Dans le second quart du XVIe siècle, le château est abandonné en tant que résidence par les d'Estouteville au profit du château des Galleries, nouvellement construit à proximité de l'enceinte. En 1534 la seigneurie passe   par mariage à François de Bourbon, comte de Saint-Pol,  peu à peu délaissé. le vieux château sort  de la seigneurie, passée aux Longueville, aux Matignon, puis aux  Montmorency . Au XIXe siècle  le château est acquis par la commune qui le restaure.                                                      ST-BLAISE, a est édifié à la fin du XVIIIe siècle. Adjonction d'un pavillon et construction d'un haras en dépendance dans la deuxième moitié du XIXe siècle. Une cheminée du XVIIe siècle, provenant du château de Sotteville, en remploi dans une salle du rez-de-chaussée. L'édifice conserve un jardin d'hiver de la seconde moitié du XIXe siècle. L'édifice de plan régulier en H, se compose d'un rez-de-chaussée, un étage carré et un étage de comble. Gros-oeuvre en moyen appareil et calcaire, élévations ordonnancées coiffées de toit à longs pans ; pignon couvert et croupe recouverts d'ardoise. Cartouches sculptés sur le fronton central. Saint-Blaise conserve un jardin d'hiver aménagé dans la deuxième moitié du XIXe siècle. Propriété  de Fernet Roost.","architecture":"BRICQUEBEC, le logis seigneurial, composé de deux bâtiments séparés (aula et camera), est édifié dans le dernier quart du XIIe siècle. La partie restante du logis (aula), primitivement composée d'une grande halle de plein pied avec bas-côté attenant, a été divisé en deux niveaux au cours du XVe siècle et son bas-côté supprimé au milieu du XIIIe siècle. Du second bâtiment ne reste que le sous-sol doté d'un voûtement postérieur à sa construction et datant du XVe siècle. La chapelle romane, détruite, est attestée par une charte de confirmation de 1271. Le donjon, édifié en remplacement d'une structure en bois dans la première moitié du XIVe siècle, est établi sur une motte dont l'origine pourrait remonter à la fondation de la seigneurie de Bricquebec, vers le milieu du XIe siècle. L'ouvrage d'entrée principale avec sa tour-porte en saillie sur l'enceinte, a été remplacé une porte maçonnée plus ancienne, dans la première moitié du XIVe siècle, à l'époque où l'on construisait le donjon. La courtine est le résultat de plusieurs périodes de construction. Elle fut remaniée au début du XVe siècle, lors de l'établissement d'un bastion sur son flanc sud. Aux XIVe et XVe siècles, plusieurs bâtiments sont venus s'accoler contre la courtine. Entre le donjon et la grande salle du logis, une importante maison du XVe siècle existait encore à l'état de vestiges au début du XIXe siècle. Un second bâtiment, sur deux niveaux, de la première moitié du XVIIe siècle communiquant avec la courtine et la tour sud-est, existe encore à l'état de vestiges entre les deux édifices constituants les éléments du logis seigneurial du XIIe siècle.Éléments protégés MH : les restes du château : classement par liste de 1840.                                                  DARNETAL à Negreville au nord Est. La construction du château de Darnetal date du XIXe siècle.","habitants":"Bricquebec, Famille  d'Estouteville                                             St Blaise , Fernet Roost.\r\n        \"","divers":"Trois châteaux dans cet article Bricquebec grav 1 à 5  , St-Blaise grav-6  et Darnetal grav-7.                    GPS :40° 28' 13\" Nord, 1° 37' 57\" Ouest","gps":"40° 28' 13\" Nord, 1° 37' 57\" Ouest","images":["../../jctruffet.com/image/image_50/50_Bricquebec_1.jpg","../../jctruffet.com/image/image_50/50_Bricquebec_2.jpg","../../jctruffet.com/image/image_50/50_Bricquebec_3.jpg","../../jctruffet.com/image/image_50/50_Bricquebec_4.jpg","../../jctruffet.com/image/image_50/50_Bricquebec_5.jpg","../../jctruffet.com/image/image_50/50_Bricquebec_6.jpg","../../jctruffet.com/image/image_50/50_Bricquebec_7.jpg"]},"Consult_chateau_formulairedab0":{"id":"Consult_chateau_formulairedab0","dept":"50","canton":"Les Pieux","commune":"Bricquebosq","nom":"Bricqueboscq","type":"château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article; Bricqueboscq et Grand-Maison.                                                                        BRICQUEBOSCQ, la grande maison a été construite à la fin du XVe siècle ou au début du XVIe siècle par les comtes de Thieuville, dont lun fonda la chapelle en 1640. Après quatre siècles dans cette même famille, la demeure devient en 1800, par lintermédiaire dun mariage, la propriété des comtes de Blangy. Après le décès de Maximilien de Blangy, mort en 1923 sans descendant, la demeure est achetée par les grands-parents de Mme  Letablier, une famille d'exploitant agricole.                                                                                    GRAND-MAISON, c'est une maison forte datant fin du XVe siècle ou du début du XVIe siècle, comprenant un corps de bâtiment flanqué de deux pavillons carrés, les quatre échauguettes d'angle en poivrières, la toiture conique, les hautes cheminées de pierre et le clocheton forment un ensemble très caractéristique de cette grande maison, du XVIIe siècle fut élevée par Nicolas de Thieuville. Du XVIe siècle date le corps central avec fenêtres à meneaux chanfreinés. La façade postérieure comprend une grosse tour d'escalier avec un pigeonnier au dernier niveau. De la fin du XVIe ou au début du XVIIe siècle deux gros pavillons d'angle avec échauguettes, clocheton et chapelle. Au début du XVIIIe siècle, transformation d'un grand nombre de baies et suppression de leurs meneaux. Aménagements intérieurs au XIXe siècle, avec boiseries et carrelages, et construction d'une partie des communs.\r\nÉléments protégés MH :  les façades et les toitures du château ; la chapelle : classement par arrêté du 5 octobre 1982.","architecture":"BRICQUEBOSCQ  à Vesly est une construction monumentale du début du XVIe siècle, entourée d'une ferme encore en exploitation. Ce manoir est l'un des plus bel exemple de construction rurale du XVIe siècle en Cotentin, dont les éléments gothiques comme les clochetons, de hautes cheminées ou les échauguettes ont été conservés au fil des propriétaires. Le corps central, du début du XVIe siècle, qui s'éclaire par des fenêtres à meneaux chanfreinés est flanqué de deux pavillons d'angles pourvus d'échauguettes et percées de meurtrières. La façade arrière comprend une grosse tour d'escalier avec un pigeonnier au dernier niveau.  Au début du XVIIIe siècle, de nombreuses baies ont été transformées entrainant la suppression de leurs meneaux. Une partie des communs a été ajoutée au XIXe siècle. Le corps de bâtiment rectangulaire est flanqué de deux tours d'angle dont l'une abrite le colombier en activité. La construction, bien que massive, est fantaisiste, avec des travées et des niveaux divers, mais l'ensemble est harmonieux, extrêmement soigné avec des détails décoratifs originaux, notamment les lucarnes avec fronton triangulaire et l'appareillage des cheminées.  On a là un véritable conservatoire de formes et la vision de ce que pouvait être la vie dans cette ferme sous l'Ancien Régime et jusqu'à la dernière guerre, lorsqu'une vingtaine d'ouvriers agricoles y vivaient en parfaite symbiose avec les maîtres. Éléments protégés MH : les façades et les toitures du logis, ainsi que le muret de la cour ; les façades et les toitures des communs sud et nord ; les vestiges du porche ouest : inscription par arrêté du 5 mars 2001.","habitants":"Famille de Letablier\r\n        \"","divers":"Deux châteaux dans cet article; Bricqueboscq  grav-1et Grand-Maison grav 2-3-4.   Gps \r\n49° 32' 36\" N, 1° 43' 46\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Bricquebosq_1.jpg","../../jctruffet.com/image/image_50/50_Bricquebosq_2.jpg","../../jctruffet.com/image/image_50/50_Bricquebosq_3.jpg","../../jctruffet.com/image/image_50/50_Bricquebosq_4.jpg"]},"Consult_chateau_formulaireff47-2":{"id":"Consult_chateau_formulaireff47-2","dept":"50","canton":"Valognes","commune":"Brix","nom":"Brix","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article Bruce , Mont-Epinguet et Val.                                                                                         BRUCE CASTLE  le site de lactuelle propriété Bruce Castle, que senracine le passé de la famille royale dÉcosse.  bâti sur les terres ancestrales des rois, sur le site dune forteresse achevée au XIIe siècle, Bruce Castle, datant du XVIIIe siècle, est entouré dun beau parc et dun bois de 10 ha, « L'emplacement a été racheté au XIXe siècle par une autre   famille de Brix. On entreprend la construction du château actuel en 1914, tout près du site de lancienne forteresse. Bâti sur une partie de l'ancienne basse cour, dans le style français XVIIIe, le château sera privé de son pavillon droit, car en 1916, période de guerre, la construction ne peut être financée dans sa totalité et doit être interrompue. La demeure fraîchement érigée est alors reliée à un petit corps de ferme datant de 1784, telle quelle se présente actuellement où vous trouverez calme et détente. Hugues et Anne-Rose Fontanet seront heureux de vous y accueillir pour vous faire découvrir les richesses de cette région située au coeur de la presquîle du Cotentin et découvrir leurs chambres d'hôtes.  Anne-Rose et Hugues Fontanet.","architecture":"LUTHUMIERE manoir reconstruit au XVe siècle. Le premier château est construit, après 1180, par Guillaume de Brix. C'est en ces lieux que naquit Catherine-Thérèse de Goyon de Matignon-Thorigny, petite fille de la duchesse d'Estouteville, et épouse de Jean-Baptiste Colbert de Seignelay. Au décès de sa mère, elle reçut les seigneuries d'Yvetot, de la Haye-d'Ectot, et de Carteret.                                                                                              MONT-EPINGUE  Hôtel restaurant,  le château fut bâti sous le Premier Empire au début du XIXe siècle, dont il arbore le style au centre d'un plateau. En 1917 il est acquis par Lucien Ratti, propriétaire du grand magasin de Cherbourg, que les héritiers vendirent en 1958.\r\nVAL, le manoir est niché au fond dune verte vallée, accessible par une longue allée bordée de vieux châtaigniers. Les fondations originelles, les niches creusées dans les murs épais, les caves, sont la mémoire encore vivante du passé de cet édifice construit au XVIe siècle. A quelques pas du manoir, dans le parc, se trouvent de nombreuses variétés darbres incluant des vieux cèdres du Liban et un imposant hêtre rouge. Près de la demeure une source datant de 1753, un petit mais ravissant bois et un pigeonnier comprenant 1045 nichoirs, qui date également du XVIe siècle. Éléments protégés MH : le colombier : inscription par arrêté du 17 mars 1975. Chambres d'hôtes.","habitants":"famille de Brix\r\n        \"","divers":"quatre châteaux dans cet article Bruce grav 1-2-3-4 et Val grav 5. et Mont-Epinguet gra 6-7  luthumiere grav -8                                                       GPS : 49° 32' 43\" Nord, 1° 34' 44\" Ouest","gps":"49° 32' 43\" Nord, 1° 34' 44\" Ouest","images":["../../jctruffet.com/image/image_50/50_Brix_1.jpg","../../jctruffet.com/image/image_50/50_Brix_2.jpg","../../jctruffet.com/image/image_50/50_Brix_3.jpg","../../jctruffet.com/image/image_50/50_Brix_4.jpg","../../jctruffet.com/image/image_50/50_Brix_5.jpg","../../jctruffet.com/image/image_50/50_Brix_6.jpg","../../jctruffet.com/image/image_50/50_Brix_7.jpg","../../jctruffet.com/image/image_50/50_Brix_8.jpg"]},"Consult_chateau_formulairea0be":{"id":"Consult_chateau_formulairea0be","dept":"50","canton":"Isigny-le-Buat","commune":"Brécey","nom":"Brécey","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux à Brécey; la Brisolière, la Sémondière et Vassy.                                                                              BRISOLIERE, le nom de Brécey napparaît quau cours du XVe siècle. Le premier bourg se situe à lendroit actuellement nommé le Vieux Bourg, antérieur aux invasions normandes, au croisement des voies romaines dAvranches à Vire et du Cotentin à Rennes. Le château de la Brisolière est un édifice construit au XVIIIe siècle, remaniée au XIXe siècle, élevé pour le comte de Brécey et occupée par ses descendants jusqu'à la fin du XXe siècle. Cette famille a été liée au monde artistique par un mariage avec les Durand-Ruel à la fin du XIXe siècle. Renoir a campé des membres de cette famille.                                    VASSY, construit de 1613 à 1620 par la famille de Vassy sur le modèle des châteaux de Ducey; Sotteville, Chiffrevast et Crosville sur Douve, le château de Vassy comprenait à l'origine un grand corps de logis avec deux ailes latérales, cour d'honneur, jardins et avenues. Vidé de son mobilier à la Révolution, il fit l'objet de démolitions partielles au XIXe siècle, les deux ailes latérales servirent de carrière de pierre, les cheminées monumentales furent enlevées, retaillées et remontées au château de Bonnefontaine, près d'Antrain en Ille-et-Vilaine et au château Saint-Blaise à Bricquebec, les jardins, avenues et plans d'eau disparurent également. En 1910, il fut acquis par la famille de Larturière qui entreprit de le sauver. Il a conservé un bel escalier tournant à six noyaux, à volées simples et doubles alternantes, en brique et en granit, avec des balustres carrées en pierre de Vernon, construit au début du XVIIe siècle. classement M.H. par arrêté du 8 septembre 2000.","architecture":"SEMONDIERE, la Semondière est quelque peu antérieure au Logis,  édifiée au XVIe siècle,  était la résidence d'une branche de la famille de Brécey appelée, pour la distinguer des autres, les \"Brécey-Sémondière\". Les armoiries se retrouvent sur l'écusson qui orne le linteau de la porte d'honneur. Cette maison-forte, bâtie en chiste et granit,  la plus ancienne construction du canton, est entourée de douves et possède une tourelle d'angle et fut la résidence, pendant près de deux siècles, de la famille de Marie-Louise de Brécey, épouse de Jean de Julienne, grand collectionneur, mécène et ami du célèbre peintre Watteau qui fit son portait, exposé aujourd'hui au musée de Valenciennes. Les trois ouvertures dans la toiture, en chien assis, datent de l'époque Empire. L'intérieur possède encore de très nombreux aspects de pur style Louis XIII provincial qui sont restés intacts grâce aux faux plafonds, coffrages et revêtements de briques dans les cheminées qui cachaient le tout. La situation de la Sémondière, au creux d'un vallon, la rend visible de toute part.","habitants":"Comte de Brécey                                                                                    famille de Vassy\r\n        \"","divers":"Trois châteaux à Brécey; la Brisolière, la Sémondière grav-1-2 et Vassy grav_3-4. Brecey GPS : 48° 42' 33\" Nord, 1° 10' 14\" Ouest","gps":"48° 42' 33\" Nord, 1° 10' 14\" Ouest","images":["../../jctruffet.com/image/image_50/50_Br%c3%a9cey_1.jpg","../../jctruffet.com/image/image_50/50_Br%c3%a9cey_2.jpg","../../jctruffet.com/image/image_50/50_Br%c3%a9cey_3.jpg","../../jctruffet.com/image/image_50/50_Br%c3%a9cey_4.jpg"]},"Consult_chateau_formulaireb299":{"id":"Consult_chateau_formulaireb299","dept":"50","canton":"Saint-Lô-2","commune":"Canisy","nom":"Canisy","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article Canisy, Montmiriel et Bonfosse.                                                                              CANISY, au XIIe siècle les premiers seigneurs succèdent  les Carbonnel, qui le conserveront jusqu'au XVIIIe siècle. qui passera en héritage en 1752 aux Faudoas. La construction du XVIe siècle attribuée en partie à François Gabriel, l'ancêtre des architectes royaux.  pour  Hervé Carbonnel. Au XIXe siècle passe aux Kergolay qui c'est dernier le réaménage pour Gabriel et Hervé de Kergorlay. Ils ont créé vers 1830, avec l'aide du paysagiste Châtelain, un parc d'agrément avec ferme modèle romantique dans le goût des parc à l'anglaise, ce parc a été repris sous la conduite d'Achille Duchêne, vers 1925, dans le goût classique de l'époque.                                           MONTMIRIEL, le château fut bâti à la fin du XIXe siècle (1898) par Alphonse Lemerre grand éditeur de l'époque, il édita les uvres de Verlaine, Rimbaud, Jules Renard ou Alfred de Musset pour n'en citer que quelques uns. Pendant la première guerre mondiale, le château sert d'hôpital pour les soldats blessés au front.. Sous l'occupation, pendant la deuxième guerre mondiale, il est occupé par la Wermacht et les officiers supérieurs de l'armée allemande. A l'issue du conflit, Montmireil redevient un lieu occupé par les ecclésiastiques.                                                                                                 A deux K.M. au sud à St-Martin de BONFOSSE, les seigneurs de Bonfossé appartenaient au XVIe siècle à la famille de Gourfaleur. Jean de Gourfaleur est cité dans les textes dès 1555. On le retrouve comme capitaine de Saint-Lô (1574-1584) puis en 1586. Le manoir construit à la fin du XVIe siècle, témoigne de la présence d'un maître d'oeuvre à la notoriété régionale importante, François Gabriel, dont les bâtiments de ferme semblent porter l'empreinte avec les bossages caractéristiques de son style.  inscription par arrêté du 25 février 2003.","architecture":"CANISY, d'origine médiévale, transformé au cours des XVIe, XVIIIe et XIXe siècles, se présentait jadis comme un quadrangulaire flanqué de tours aux angles deux des côtés furent incendiés en 1740, iil reste trois tours d'angle.  Le château est entouré d'un parc de 30 ha et d'un domaine agricole de 300 hectares. Le parc a été créé dans la première moitié du XVIIe siècle, complété à la fin du XVIIe siècle et dans le courant du XVIIIe siècle. Le parc, avec son ruisseau (la Joigne), son étang, ses avenues, ses perspectives, ses bois et ses pâturages ; les façades et les toitures des bâtiments de service du château comprenant l'orangerie, les serres, les écuries et les remises, à l'exclusion du bâtiment moderne, le potager du château avec ses murs de clôture, y compris du petit bâtiment situé à l'angle ouest,  dans la ferme de Saint-Gilles, de la grange, la laiterie avec son aménagement intérieur, le potager circulaire  de l'ancien pavillon du jardinier,  dans la ferme de la Mesnagerie,  du bâtiment d'entrée avec son porche, de l'ensemble des bâtiments du moulin de Canisy et du moulin de Saint-Gilles, inscription par arrêté du 9 juin 2005.   Des éléments remarquables de l'exploitation subsistent : près du château, les anciennes remises et écuries, l'orangerie, les serres, et le potager attenant, construits vers 1832 par l'architecte départemental Harou Romain, les écuries de la ferme de la Mesnagerie (1854), la grange de la ferme de Saint Gilles et le potager circulaire (vers 1850), les moulins de Saint-Gilles (1815) et de Canisy.    Éléments protégés MH : le château : classement par arrêté du 8 septembre 1945.","habitants":"Canisy; Famille de Kergolay                                     Montmiriel Famille d'Alphonse Lemerre                                                 Bonfosse; famille de Gourfaleur.\r\n        \"","divers":"Trois châteaux dans cet article Canisy grav-1-4-5-6-7-8-9, Montmiriel grav-2 et Bonfosse grav-3. Canisy GPS : 49° 04' 42,21\" Nord, 1° 10' 15,71\" Ouest","gps":"49° 04' 42,21\" Nord, 1° 10' 15,71\" Ouest","images":["../../jctruffet.com/image/image_50/50_Canisy_1.jpg","../../jctruffet.com/image/image_50/50_Canisy_2.jpg","../../jctruffet.com/image/image_50/50_Canisy_3.jpg","../../jctruffet.com/image/image_50/50_Canisy_4.jpg","../../jctruffet.com/image/image_50/50_Canisy_5.jpg","../../jctruffet.com/image/image_50/50_Canisy_6.jpg","../../jctruffet.com/image/image_50/50_Canisy_7.jpg","../../jctruffet.com/image/image_50/50_Canisy_8.jpg","../../jctruffet.com/image/image_50/50_Canisy_9.jpg"]},"Consult_chateau_formulaire36dd":{"id":"Consult_chateau_formulaire36dd","dept":"50","canton":"Carentan","commune":"Les Veys","nom":"Cantepie","type":"Château","periode":"XVI-XVII","histoire":"CANTEPIE, le manoir de Cantepie a été restauré à l'initiative du Conseil Général de la Manche. Des investisseurs américains ont racheté en février 2015 le manoir de Cantepie au conseil général de la Manche avec le but d'en faire un lieu touristique destiné à une clientèle américaine, visitant les sites du débarquement. Le manoir de Cantepie a été racheté, Il est également prévu l'ouverture d'un restaurant gastronomique dans les locaux, qui servaient, autrefois, de restaurant. Les travaux ont débuté, une fois que les services du parc naturel régional des marais du Cotentin et du Bessin furent déménagés.","architecture":"CANTEPIE, ancienne ferme-manoir du début du XVIe siècle. Les parties les plus anciennes du manoir datent du milieu du XVIe siècle. A la jonction des deux corps principaux du logis, une tour octogonale, flanquées de deux tourelles d'escalier sont les signes distinctifs de l'autorité seigneuriale et du caractère noble de la bâtisse. Au XVIIe siècle, le manoir de Cantepie s'est agrandi d'une grande charretterie à 5 arcades en plein cintre. A l'opposé, le bâtiment s'agrandit au début du siècle et se dote d'une deuxième tour d'escalier, rendant les niveaux des logis indépendants les uns des autres, ainsi qu'une petite tourelle défensive, seul vestige du portail d'entrée de l'époque. Aux XVIIIe et XIXe siècles, des dépendances forment un second corps de bâtiment, en équerre, réservé à l'usage agricole. Le mur d'enceinte a été bâti au XIXe siècle, ainsi que plusieurs restaurations comme l'attestent certains ornements, du style néo-gothique. Au XVIIe siècle, le manoir s'agrandit d'une grande charretterie à cinq arcades en plein cintre. A l'opposé, le bâtiment s'agrandit au début du siècle et se dote d'une deuxième tour d'escalier, rendant les niveaux des logis indépendants les uns des autres, ainsi qu'une petite tourelle défensive, seul vestige du portail d'entrée de l'époque. Aux XVIIIe et XIXe siècles, des dépendances forment un deuxième corps de bâtiment, en équerre, réservé à l'usage agricole.\r\nÉléments protégés MH : les façades et les toitures du logis ; les deux tours d'escalier ; les deux cheminées du XVIIe siècle situées dans la partie centrale (l'une au rez-de-chaussée, l'autre à l'étage) ; les façades et les toitures des communs ; les vestiges de la tour d'entrée : inscription par arrêté du 26 août 1988, restauré à l'initiative du Conseil Général de la Manche.","habitants":"gérant locale\r\n        \"","divers":"château à les Veys; Cantepie grav 1 à 5 GPS : 49° 18' 24,44\" Nord, 1° 09' 43,5\" Ouest","gps":"49° 18' 24,44\" Nord, 1° 09' 43,5\" Ouest","images":["../../jctruffet.com/image/image_50/50_Cantepie_1.jpg","../../jctruffet.com/image/image_50/50_Cantepie_2.jpg","../../jctruffet.com/image/image_50/50_Cantepie_3.jpg","../../jctruffet.com/image/image_50/50_Cantepie_4.jpg","../../jctruffet.com/image/image_50/50_Cantepie_5.jpg"]},"Consult_chateau_formulairec9f9":{"id":"Consult_chateau_formulairec9f9","dept":"50","canton":"Saint-Lô-2","commune":"Carantilly","nom":"Carantilly","type":"Château","periode":"XVIII","histoire":"CARANTILLY, la construction du château date du XVIIIe siècle, sur les fondations d'un manoir plus ancien. Il est l'uvre, vers 1720, pour la grande partie centrale de Louis de Coudreau de Planchoury, seigneur de Carantilly (1676-1768) et de son gendre Thomas Honoré de Mons, et pour les ailes latérales de Léonor de Mons, petit-fils du premier (1726-1795). Les façades du château sont classées au titre des M.H. depuis le 4/09/1978, les toitures, l'escalier intérieur en fer forgé, plusieurs pièces et les communs ont été inscrits à la même date et de nombreuses dépendances ont été inscrites le 11/09/1986.","architecture":"CARANTILLY, le château et les communs datent du XVIIIe siècle. La ferme et la basse-cour sont des XVIIIe et XIXe siècles. Le pressoir, attesté en 1796, est bâti en plan rectangulaire, en schiste et en terre; il
