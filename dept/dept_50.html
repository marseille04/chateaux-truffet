 présente une avancée pour le logement de la vis et abrite un tour à pommes à roue de bois et une presse à longue étreinte. Éléments protégés MH : les façades du château : classement par arrêté du 4 septembre 1978. les toitures du château ; les façades et les toitures des communs ; l'escalier avec sa rampe en fer forgé ; les pièces suivantes avec leur décor : le petit et le grand salon, la salle à manger, la chambre et le boudoir au rez-de-chaussée, la chambre bleue, les deux chambres au sud et une chambre au nord au premier étage : inscription par arrêté du 4 septembre 1978. La ferme et la basse-cour : les façades et les toitures de la maison d'habitation et du chenil, de la grange et de la charretterie, de l'étable, de l'écurie et de la boulangerie, de la maison du régisseur dite maison de l'Etang et du lavoir ; le mur reliant l'écurie àl'étable ; le mur d'entrée reliant la maison d'habitation à la grange ; les murs du potager ; dans la basse-cour : le pressoir et son équipement, le mur reliant le pressoir au commun ouest du château ; les façades et les toitures de la porcherie : inscription par arrêté du 11 septembre 1986.","habitants":"Louis de Coudreau de Planchoury\r\n        \r\n        \r\n        \r\n        \"","divers":"Château à carantilly à Carentilly    gps\r\n49° 03' 58\" N, 1° 14' 34\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Carantilly_1.jpg","../../jctruffet.com/image/image_50/50_Carantilly_2.jpg"]},"Consult_chateau_formulaire736c":{"id":"Consult_chateau_formulaire736c","dept":"50","canton":"Val-de-Saire","commune":"Carneville","nom":"Carneville","type":"Château","periode":"XVI-XVII","histoire":"CARNEVILLE, la construction date du XVIIe siècle. Les Symon de Carneville construisirent un premier manoir, en 1640 et un second, en 1699. Il fut agrandi en 1725 quand la boulangerie fut bâtie. Le Château de Carneville fut édifié vers 1755 pour François-Hervé Symon, sur le modèle de celui de Saint-Pierre-Église. Puiis le chateau changera de propriétaire et ira dans les mains de la Famille Clérel de Tocqueville. Le Château de Carneville sera revendu, en 2011, par Hélène de Tocqueville, à un antiquaire. Les nouveaux propriétaires engagent des aménagements pour ouvrir au Public, le parc du château. Le Château de Carneville actuel date du XVIIIe. Il est classé aux M.H. depuis 1975. Les communs et la boulangerie sont plus anciens et bénéficient d'une inscription aux M.H. Un chêne millénaire est présent dans le parc du château, situé au croisement de deux chemins. Il serait lié à la pratique de culte ancien. En 2015, le Prix Hélie de Noailles,  a récompensé un jeune repreneur et a été attribué à Guillaume Garbe. Le château de Carneville a été retenu pour bénéficier du loto du Patrimoine en mai 2018.","architecture":"CARNEVILLE, dès 1640, François Simon de Carneville fait construire un manoir avec une tour pigeonnier à l'arrière, et un très rare exemplaire descalier couvert ayant conservé sa charpente d'origine. En 1755, François Hervé Simon de Carneville fait bâtir le château que nous pouvons voir aujourd'hui. Précédé d'une vaste cour d'honneur ce château témoigne avec discrétion et élégance du rang social du constructeur. La cour des communs fut agrémentée au XIXe siècle de différents bâtiments, notamment avec l'écurie de 1895, aujourd'hui la \"salle du canal\". A noter que sur l'une des pierres maçonnées de la façade de cet édifice porte le millésime \"1078\". Il s'agit d'une pierre de réemploi, venant certainement de l'église du XIe siècle du village entièrement reconstruite à la fin du XIXe siècle. Les façades et les toitures et les pièces suivantes avec leur décor : la salle à manger, le bureau et le petit salon au rez-de-chaussée, la chambre située au-dessus du petit salon à l'entresol, les cheminées des chambres avec leur trumeau : classement par arrêté du 28 juillet 1975.","habitants":"Famille de  Symon de Carneville\r\n        \"","divers":"Carneville Gps 49° 39' 38\" N, 1° 26' 40\" O GPS : 49° 39' 39,46\" Nord, 1° 26' 38,41\" Ouest","gps":"49° 39' 39,46\" Nord, 1° 26' 38,41\" Ouest","images":["../../jctruffet.com/image/image_50/50_Carneville_1.jpg","../../jctruffet.com/image/image_50/50_Carneville_2.jpg"]},"Consult_chateau_formulaire5719":{"id":"Consult_chateau_formulaire5719","dept":"50","canton":"Carentan","commune":"Carquebut","nom":"Carquebut","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article, Franquetot et du Val à Chef du pont.                                                                                                                     FRANQUETOT, logis et sa tour ; façades et toitures des communs en retour d'équerre ; boulangerie ; façades et toitures de l'aile ancienne et de la ferme voisine ; potager transformé en jardin d'agrément et ses murs de clôture ; murs fermant la cour et leurs portails ; portail nord dans le prolongement du potager ; étang : inscription par arrêté du 1er juin 1995  Le décor peint date du début du XVIIe siècle. Le parc a été aménagé dans la seconde moitié du XIXe siècle par le botaniste Pierre-Etienne-Joseph Lafosse.","architecture":"VAL, à un K.M.au nord à Chef du Pont VAL c'est la famille d'Osber qui fit construire le château du Val, près du port de Briolet et non loin de la petite rivière du Merderet. Ce château était entouré de magnifiques avenues de hêtres et de chênes, plantés par les moines d'un monastère qui existait à Chef du Pont pendant le XIIe siècle. Le colombier du château porte la date de l'an 1702. C'est dans ce château que fut arrêté, pendant la terreur, le comte de Bricqueville, émigré, qui était venu demander asile à son ami, M. le Sauvage d'Houesville, propriétaire du Val par sa femme, née d'Osber. En 1828, c'est Monsieur Tostain, ingénieur des ponts et chaussées qui en est propriétaire. Le château du Val est une demeure classique, reconstruite dans le troisième quart du XVIIIe siècle et la première moitié du XIXe siècle, qui présente une décoration sobre avec un large pavillon central surmonté dun fronton triangulaire, des ouvertures en plein cintre et des lucarnes ovales.","habitants":"Val; amille d'Osber\r\n        \"","divers":"Deux châteaux dans cet article, Franquetot grav 1 et du Val  grav 2-3-4 à Chef du pont.    GPS : 49° 23' 04\" Nord, 1° 20' 39\" Ouest","gps":"49° 23' 04\" Nord, 1° 20' 39\" Ouest","images":["../../jctruffet.com/image/image_50/50_Carquebut_1.jpg","../../jctruffet.com/image/image_50/50_Carquebut_2.jpg","../../jctruffet.com/image/image_50/50_Carquebut_3.jpg","../../jctruffet.com/image/image_50/50_Carquebut_4.jpg"]},"Consult_chateau_formulaire300b":{"id":"Consult_chateau_formulaire300b","dept":"50","canton":"Quettreville-sur-Sienne","commune":"Cérisy la Salle","nom":"Cerisy_Dangy","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Cerisy, Cerisy la Salle et Dangy.                                     CERISY la SALLE , le château et la ferme ont été construits au début du XVIIe siècle  sa construction est attribuée à Jean Richier. À la Révolution, le dernier des Richier a émigré et le château a été déclaré \"bien national\". Acheté en 1819 par Joseph Savary, né à Notre-Dame-de-Cenilly, ancêtre des propriétaires actuels, il accueille depuis 1952 le centre culturel international.\r\nLe site est classé M.H. \"en raison de la qualité architecturale et de la grande cohérence de l'ensemble, en tant que haut lieu de la culture et de l'histoire, y compris celle de la pensée moderne\".Le Centre culturel international de Cerisy poursuit une aventure familiale initiée en 1910 par Paul Desjardins avec les Décades de Pontigny en Bourgogne. Dirigé aujourd'hui par Edith Heurgon et Dominique Peyrou avec le concours de toute la famille, et d'une équipe efficace et dévouée. Les boiseries du XVIIIe siècle qui proviennent du logis abbatial de Pontigny, furent montées vers 1950 dans un salon du premier étage. Propriété de Mme Heurgon-Desjardins.","architecture":"DANGY à quelques K.M. à l'Est La construction du château de Dangy date du XVIIIe siècle. Louis-Julien Yon au XVIIIe siècle, fut le dernier seigneur de Dangy et de Saint-Hilaire.                                                                                             CERISY la SALLE, devenu un centre culturel international, sa construction date de 1605 et 1620, sous Louis XIII. Il accueille depuis 1952, de nombreux colloques, en cours d'année. Composé d'un bâtiment central flanqué de quartre pavillons et d'un escalier en saillie. Les communs comprennent une grange sur cave, une tour carrée servant de pigeonnier, une charretterie à trois arcades, une laiterie, des étables. A l'intérieur du château, on notera l'escalier monumental, les cheminées en granit de la grande salle, devenue bibliothèque et de l'ancienne cuisine, actuellement salle à manger, le plafond à poutres peintes de la bibliothèque en vogue sous Louis XIII, qui représentent notamment des cucurbitacées et le plafond d'un petit salon construit et peint probablement à la fin du XVIIe siècle. A l'intérieur du château, dans la grande salle, se trouve un décor peint représentant des légumes et des fleurs. Le château de Cerisy-la-Salle est devenu un Centre Culturel International ou des colloques ont lieu, chaque année. Leurs actes donnent souvent lieu à une publication. Le château de Cerisy-la-Salle est classé le 4/07/1995 aux M.H. L'Association des Amis de Pontigny-Cerisy, reconnue d'utilité publique en 1972, est actuellement présidée  par Jean-Baptiste de Foucauld, inspecteur général des finances honoraire.","habitants":"Jean Richier\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux à Cerisy, Cerisy la Salle grav-1-2-3 et Dangy grav-4-5.     Cerisy PS : 49° 10' 39\" Nord, 0° 56' 12\" Ouest                Dangy GPS : 49° 02' 42\" Nord, 1° 13' 29\" Ouest","gps":"49° 02' 42\" Nord, 1° 13' 29\" Ouest","images":["../../jctruffet.com/image/image_50/50_Cerisy_Dangy_1.jpg","../../jctruffet.com/image/image_50/50_Cerisy_Dangy_2.jpg","../../jctruffet.com/image/image_50/50_Cerisy_Dangy_3.jpg","../../jctruffet.com/image/image_50/50_Cerisy_Dangy_4.jpg","../../jctruffet.com/image/image_50/50_Cerisy_Dangy_5.jpg"]},"Consult_chateau_formulaired5b8":{"id":"Consult_chateau_formulaired5b8","dept":"50","canton":"Créances","commune":"Millières","nom":"Champagne_50","type":"Chateaux","periode":"XVII","histoire":"CHAMPAGNE,  le manoir de la Champagne, possède un magnifique portail assez curieux, à l'entrée de la cour qui précède la maison d'habitation, qui date du règne de Louis XIII, ou des premières années de celui de Louis XIV. On remarque sous ce portail deux portes cintrées, l'une haute et assez large pour le passage des voitures, et l'autre petite à l'usage des personnes à pied. La famille du Saussey, qui depuis plusieurs siècles possède le domaine de la Champagne, est une des plus anciennes du pays, et elle figure comme appartenant à l'ancienne chevalerie normande. Au nombre des seigneurs normands qui accompagnèrent le duc Guillaume à la conquête de l'Angleterre, on trouve le seigneur de Saussay ou le sieur du Saucey, chevalier, seigneur de Servigny, qui fit aveu de son fief en 1406. Cette ancienne famille est aujourd'hui dignement représentée par M. Alphonse du Saussey et par ses deux frères, M. Constant du Saussey et M. Charles du Saussey.Éléments protégés MH : le portail avec son mur : inscription par arrêté du 6 février 1995.","architecture":"CHAMPAGNE , son portail et la porte cochère date du milieu du XVIIe. Le manoir a été construit au milieu du XVIIe siècle. Son portail est percé d'une porte charretière et d'une porte piétonne. Sa modénature est soignée. Le portail avec son mur est inscrit comme M.H. depuis le 6/02/1995. Le manoir de La Champagne est bordé par un jardin de 1 500 mètres carrés. C'est, aujourd'hui, une demeure hôtelière labellisée « Gîte de France ».","habitants":"Famille du Saussey\r\n        \r\n        \"","divers":"Château de Champagne à la Millières   GPS : 49° 10' 17,44\" Nord, 1° 27' 31,74\" Ouest","gps":"49° 10' 17,44\" Nord, 1° 27' 31,74\" Ouest","images":["../../jctruffet.com/image/image_50/50_Champagne_50_1.jpg","../../jctruffet.com/image/image_50/50_Champagne_50_2.jpg"]},"Consult_chateau_formulaireefeb":{"id":"Consult_chateau_formulaireefeb","dept":"50","canton":"Avranches","commune":"Bacilly","nom":"Chantore_Mont_St-Michel","type":"Manoir","periode":"XVIII","histoire":"Deux châteaux  dans cet article; Chantore et Baudonnière.   CHANTORE  date de 1780, par un seigneur de Chantore. Le dessin, les plantations du parc très riche en arbres exotiques, sont dus à M. Angot, député dAvranches, qui y passa une partie de sa vie, dans le charme de relations élégantes et intellectuelles. Ce fief de la Roussellière avait appartenu à la Maison de Guiton, jusquau XVIe siècle. Lancien château était dans les prés, au bord du Lerre, où quelques débris en rappellent encore le souvenir. Auprès, dans la cour de la Champagne, fut trouvé un trésor, il y a quelques années. Par un contraste assez ordinaire alors, un Roussel était parmi les défenseurs du Mont-Saint-Michel contre les Anglais. il était sans doute de ces Roussel qui donnèrent leur nom à une sergenterie dAvranches, où Montfaut les trouva nobles. Une visite privée et commentée par le propriétaire.                                                                  BAUDONNIERE  la Baudonnière est idéal pour accueillir des évènements regroupant de grands groupes.  Tout au long de votre séjour, vous aurez accès aux 20 hectares du domaine incluant deux étangs, des ruisseaux et une forêt qui vous garantiront des promenades vivifiantes. Vous saurez vite vous ressourcer grâce notamment à nos animaux domestiques en semi-liberté sur la propriété. Cest un cadre splendide pour se déconnecter et se relaxer.","architecture":"CHANTORE  Vous visiterez le grand salon, le salon bleu, le salon chinois, la bibliothèque,  Des surprises, on en retrouve aussi dans ce parc. «Quand il est édifié au XVIIIe siècle, tout est conçu pour étonner le visiteur. En témoigne le travail important lié à leau. Quatorze cascades, deux lacs et un château deau «avec laspect dune ruine: fissures, grotte et visage de fantôme, le tout construit à la main et resté en létat. «Lédifice reste bien solide» , Bernard Legal, son propriétaire actuel. Construit en 1780, le château et son parc ont traversé les époques, passant dun propriétaire à un autre. À lorigine une demeure du seigneur de Chantore, il est passé entre les mains de cinq familles. Bernard Legal et Iñaki de Groiburu ont restauré les lieux en se fiant aux archives quils ont trouvées.","habitants":"Famille de  M. Angot\r\n        \"","divers":"Deux châteaux  dans cet article; Chantore  grav 1-2  et Baudonnière grav 3-4.   GPS : 48° 42' 04\" Nord, 1° 26' 27\" Ouest","gps":"48° 42' 04\" Nord, 1° 26' 27\" Ouest","images":["../../jctruffet.com/image/image_50/50_Chantore_Mont_St_Michel_1.jpg","../../jctruffet.com/image/image_50/50_Chantore_Mont_St_Michel_2.jpg","../../jctruffet.com/image/image_50/50_Chantore_Mont_St_Michel_3.jpg","../../jctruffet.com/image/image_50/50_Chantore_Mont_St_Michel_4.jpg"]},"Consult_chateau_formulaireb9be":{"id":"Consult_chateau_formulaireb9be","dept":"50","canton":"Le Mortainais","commune":"Chaulieu","nom":"Chaulieu","type":"Manoir","periode":"XVII","histoire":"CHAULIEU, le premier nom associé au château est celui des Bourget dont un Thomas, sieur de St Germain de Tallevende vers 1552. Le neveu de ce dernier, Pierre, qui bâti la cour de Chaulieu sur l'emplacement d'un autre château. sa construction date de 1628, 1669 à 1750. Inhabité durant 100 ans, le château de Chaulieu construit sous Henry IV est un magnifique monument. Joliment restauré mais jamais habité depuis, il est aujourdhui vidé de son contenu.  En 1709, Chaulieu devient la propriété de Jacques de Carbonnel issu d'une famille bourgeoisie caennaise. En 1742, une Marguerite-Jacqueline de Carbonnel épouse un Gabriel-Jacques de Calmesnil qui le vendra en 1753, à Julien des Rotours, seigneur de la Lande-Valmont. Cette famille l'occupera jusqu'en 1989, date à laquelle M. et Mme Cenni l'acquièrent et le restaurent, car victime de l'abandon de ses divers propriétaires, et surtout de la dernière guerre.","architecture":"CHAULIEU, sa construction date de 1628, 1669 à 1750, le château, de plan rectangulaire, est composé d'un étage flanqué de deux échauguettes défensives à culot. le toit, haut et pointu, porte la marque du style Renaissance. L'étage présente trois fenêtres à meneaux à l'aplomb des trois belles lucarnes du toit. Devant le château figure encore le pavillon de garde du XVIe siècle.  Un de ses piliers supporte un décor en pierre sculptée le couronnant.  Le château fait lobjet dune inscription partielle au titre des monuments historiques par arrêté du 25 juillet 1973. Seules les façades et toitures du château, de l'ancienne chapelle et des anciennes écuries ainsi que la cheminée de la grande salle au rez-de-chaussée sont protégées. Des douves, ainsi que la porte située à l'ouest du domaine, avec un de ses piliers supportant un décor en pierre sculptée, complètent cet ensemble.","habitants":"Famille de Jacques de Carbonnel\r\n        \"","divers":"Château de Chaulieu  GPS: 48° 44' 08\" Nord, 0° 51' 43\" Ouest","gps":"48° 44' 08\" Nord, 0° 51' 43\" Ouest","images":["../../jctruffet.com/image/image_50/50_Chaulieu_1.jpg","../../jctruffet.com/image/image_50/50_Chaulieu_2.jpg"]},"Consult_chateau_formulaire5e3e":{"id":"Consult_chateau_formulaire5e3e","dept":"50","canton":"Cherbourg","commune":"Cherbourg","nom":"Cherbourg","type":"Château","periode":"XV-XVI","histoire":"deux châteaux à Cherbourg, Cité de la mer  et Octeville.                      OCTEVILLE,  Une longue avenue traversant la partie nord du parc mène au château.  Celui-ci, dont la partie la plus ancienne date de 1580, fut transformé au milieu du XIXe siècle en château néo-gothique par l'architecte anglais William Henry White (architecte, en autres, du château de Bizy). Endommagé par les bombardements en 1944, il fut restauré par l'actuel propriétaire.\r\nUn peu à l'écart du château, les bâtiments d'une ferme modèle (une des plus modernes et importantes de France dans les  années 1820) qui fut ferme-école au milieu du XIXe siècle et dont les seize bâtiments sont aujourd'hui autant de maisons d'habitation.Un haras construit en 1867 avec ses appareillages particuliers : lits de schiste gris et de brique rouge alternant avec de gros moellons de pierre froide et des toitures en ardoise de même nature que les boxes des communs du château. Rien n'y manque : grandes allées sinueuses, bosquets, plusieurs étangs  dont celui aux nénuphars, une île et une rivière, un arborétum de plus de deux-cents espèces, essentiellement des conifères exotiques et enfin, de nombreux massifs de rhododendrons, hortensias et autres plantes poussant dans la terre de bruyère.","architecture":"CHERBOURG, on ne connaît pas avec précision la date de construction du château. On sait en revanche qu'il a été édifié à l'emplacement d'un camp romain, grâce à Vauban, qui y a trouvé des restes de maçonneries de cette époque lorsqu'il est venu l'inspecter en 1688  Les fortifications de Cherbourg aux XIXe et XXe siècles,  sont aménagées et renforcées, suivant les évolutions de lartillerie, du Consulat à la fin du XIXe siècle. En 1858, Napoléon III inaugure les installations de larsenal. Base navale pendant la guerre de 1870, puis base de flottilles de surveillance et port de ravitaillement pendant la Première Guerre mondiale, le site est incorporé en 1942 dans le Mur de lAtlantique alors que la ville est sous occupation allemande. Le port militaire fortifié est doté de nombreux bunkers. Après la bataille de la Libération, il est reconstruit et modernisé.                               La CITE de La MER, dans un véritable palais du jeu et de la science, les pôles sous-marin et océan plongent les aventuriers dans les profondeurs de la mer. La découverte du plus grand sous-marin visitable au monde, le bien nommé Redoutable, est littéralement passionnante. Ne pas manquer lattraction « On a marché sous la mer ». 2012 : 100 ans après lescale mythique du Titanic à Cherbourg, La Cité de la Mer vous ouvre aussi les portes dun parcours permanent dédié au paquebot et à lémigration.","habitants":"Seigneurs locaux\r\n        \"","divers":"Trois châteaux à Cherbourg ; Octeville     49° 38' 20\" nord, 1° 37' 30\" ouest ,, 1° 39' 32\" Ouest.","gps":"","images":["../../jctruffet.com/image/image_50/50_Cherbourg_1.jpg","../../jctruffet.com/image/image_50/50_Cherbourg_2.jpg"]},"Consult_chateau_formulairedf7d":{"id":"Consult_chateau_formulairedf7d","dept":"50","canton":"Valognes","commune":"Tamerville","nom":"Chiffrevast","type":"Château","periode":"XVII","histoire":"CHIFFREVAST,  a été construit, en 1618, pour Henri de Chiffrevast, sur l'emplacement des ruines d'un ancien château fort. Sa construction a été achevée en 1718. Il appartiendra ensuite à Hervé Eustache dAnneville, seigneur de Chiffrevast, qui y fit réaliser des jardins remarquables. Lan XI, le consul Lebrun, duc de Plaisance et pair de France, littérateur et homme politique, en devient sen porte acquéreur. Il échoit ensuite à Napoléon Daru, époux de Charlotte Camille Le Brun de Plaisance (1820-1895), fille d'Auguste Charles Lebrun, baron de Plaisance et petite-fille du consul. Il a ensuite appartenu à Eugène Bretel (1842-1933) , à la fin du XIXe siècle. Celui-ci ayant fait fortune, l'industriel racheta le château de Chiffrevast, qu'il fit meubler et décorer avec goût. Son neveu Raoul Le Doux (1875-1970) en héritera en 1933. Le château appartient aujourd'hui à la Famille le Doux. Le château de Chiffrevast est classé aux M.H.","architecture":"CHIFFREVAST,  ce château a été construit au début du XVIIe siècle et achevé en 1618, puis a été transformé au cours du XVIIIe siècle, dans l'esprit du XVIIe siècle. C'est un château de forme rectangulaire, cantonné de 4 tours en bastion. Entre 1649 et 1728, il a été doté de dépendances et entouré de jardins. Il s'élève au centre d'un vaste parc à l'anglaise, recomposé au XIXe siècle.Éléments protégés MH : le potager ; le parc avec ses bois, ses herbages, ses étangs, ses statues et aménagements hydrauliques : inscription par arrêté du 26 octobre 1993. Les façades et les toitures du château et de l'ensemble des bâtiments du parc de Chiffrevast, Cest au XIXe siècle que le vaste parc à lAnglaise, près de 30 hectares, sera admirablement recomposé. Une glacière se cache au fond du parc. Le 23/10/2006, le mobilier du château a été vendu aux enchères à l'Hôtel Drouot à Paris par l'étude Beaussant-Lefèvre et rapporta 3,4 millions d'euros, avec 417 000 euros pour la tapisserie « L'audience du prince » datait du XVIIIe siècle, les vestiges du lavoir et la fontaine, la cour d'honneur avec son escalier ; les douves sèches avec leurs murs et leur pont ; les portes d'entrée avec leurs piliers et leurs grilles ; les murs de clôture du potager ; le décor architectural du parc avec ses murs d'enceinte, piliers et balustrades : classement par arrêté du 18 mars 1996.","habitants":"Hervé Eustache dAnneville\r\n        \"","divers":"Château de Chiffrevast à Tamerville GPS : 49° 31' 59\" Nord, 1° 27' 08\" Ouest","gps":"49° 31' 59\" Nord, 1° 27' 08\" Ouest","images":["../../jctruffet.com/image/image_50/50_Chiffrevast_1.jpg","../../jctruffet.com/image/image_50/50_Chiffrevast_2.jpg","../../jctruffet.com/image/image_50/50_Chiffrevast_3.jpg","../../jctruffet.com/image/image_50/50_Chiffrevast_4.jpg"]},"Consult_chateau_formulaireff9e":{"id":"Consult_chateau_formulaireff9e","dept":"50","canton":"Créances","commune":"Coigny","nom":"Coigny","type":"Château","periode":"XVII","histoire":"COIGNY, en raison des nombreuses destructions dues à l'école d'agriculture, installée en 1886 jusqu'en 1920, cet édifice pose question. Néanmoins, la présence d'embrasures de tir au bas des tours indique son utilité défensive. Lorsque le comte de Coigny eut acheté la baronnie de Varenguebec, et qu'elle fut réunie au duché de Coigny, la haute justice de cette baronnie fut aussi transférée à Coigny. En 1784, elle fut transférée de nouveau à Prétot, dont le duc de Coigny venait de faire l'acquisition. Elle y était encore au moment de la Révolution. Les deux derniers baillis furent Le Danois, sieur de la Meslinerie, et après lui Charles-François-Louis Caillemer. M. Caillemer, né à Carentan le 15 septembre 1737 fut, avant la Révolution, avocat et bailli de Coigny; en 1789, il fit partie, comme membre du tiers-état, de l'Assemblée des trois ordres du grand bailliage du Cotentin.\r\nÉléments protégés MH : les cheminée Renaissance du premier étage : classement par arrêté du 30 mars 1978,  chambres dhôtes.","architecture":"COIGNY, les bâtiments existant dans une vaste cour, à gauche de l'entrée de celle du vieux manoir, leurs portes cintrées, plusieurs de leurs toits élevés et à pente rapide, leurs cheminées et tous les autres caractères qu'ils présentent, annoncent la première moitié du XVIIe siècle. La cour d'honneur, où l'on arrivait par un pont, était entourée de fossés pleins d'eau, cette sentinelle avancée de toutes les anciennes demeures seigneuriales était défendue par une enceinte carrée à murailles très épaisses, et à chaque angle s'élevait une petite tourelle ou vigie dont la partie inférieure était carrée. La façade du château est au sud, une partie de ses murs est en pierres d'appareil; il était flanqué, à chaque angle, d'une tourelle dont on reconnaît encore l'entrée. Plusieurs de ses fenêtres sont divisées par des croix en pierre; celles du rez-de-chaussée sont de forme elliptique, et la lumière arrive par voie oblique. Au centre du château qui se composait de deux pavillons principaux dont l'un a été détruit, se développait un escalier en forme de fer à cheval. Les appartements auxquels il conduisait s'accèdent par des portes dont le cintre est bâti en pierres carrées et cannelées, et dont la clef de voûte est couverte de fleurs ou présente une figure chevelue. On voit, au rez-de-chaussée, une salle dans laquelle se trouve une piscine ornée d'une tête d'ange. On remarque deux cheminées dont l'une à pilastres cannelés et l'autre couverte de figures qui, de leur bouche, laissent tomber des fruits et des raisins grappés. Une troisième, dans une salle au premier, qui est très remarquable par les sculptures qui la couvrent; son genre d'ornementation, et tous ses autres accessoires, annoncent les derniers temps de l'époque de la renaissance.","habitants":"Charles-François-Louis Caillemer\r\n        \"","divers":"Château de Coigny     GPS: 49° 19' 19,27\" Nord, 1° 22' 58,85\" Ouest","gps":"49° 19' 19,27\" Nord, 1° 22' 58,85\" Ouest","images":["../../jctruffet.com/image/image_50/50_Coigny_1.jpg","../../jctruffet.com/image/image_50/50_Coigny_2.jpg","../../jctruffet.com/image/image_50/50_Coigny_3.jpg","../../jctruffet.com/image/image_50/50_Coigny_4.jpg","../../jctruffet.com/image/image_50/50_Coigny_5.jpg"]},"Consult_chateau_formulaire89ca":{"id":"Consult_chateau_formulaire89ca","dept":"50","canton":"St-Hilaire-du-Harcouet","commune":"Grandparigny-Milly","nom":"Coquerel_Milly","type":"Château","periode":"XV-XVIII-XIX","histoire":"Deux châteaux  à Coquerel dont; Coquerel et Milly.                         COQUEREL,  date du XIXe siècle. C'est une ancien maison de maître sous l'ancien régime. Le Manoir de Coquerel fut réaménagé au XIXe siècle par les familles Mézange de Saint-André et Arthur Legrand. Depuis 1939, la demeure est devenue la propriété du distillateur René Gilbert. Réquisitionnée en juillet 1944 par l'administration d'occupation et les Allemands qui fuient l'avancée des Américains, le Manoir de Coquerel échappa à une tentative de destruction, par le feu. Les Allemands emmenèrent avec eux des résistants captifs comme les frères de Rocquefeuil de Vergoncey, et le père trappiste Haupais, mort en déportation à Kassel le 7/03/1945. Le Manoir de Coquerel est le Siège des Calvados du Domaine du Coquerel, est une cidrerie-distillerie située à quelques kilomètres du Mont Saint-Michel. Nous sommes le premier producteur indépendant de Calvados.  La visite se fait dans un de nos chais de vieillissement où nous expliquons aux visiteurs les secrets de la fabrication de nos Calvados.","architecture":"MILLY, est une demeure historique de la Manche, située à Grandparigny dans l'ancienne commune de Milly. Il est construit au XVIII siècle sur les restes d'un ancien manoir dont on a conservé les cuisines avec leur cheminée monumentale et les poutres du XVe siècle.\r\nLes communs, construits avec de nombreuses pierres de réemploi de l'ancien manoir, possèdent des linteaux armoriés. Il est entouré d'un parc arboré avec étang ; un chemin le relie directement à l'église qui est l'ancienne chapelle du château. C'est toujours la demeure de la famille du Hamel de Milly qui a fourni cinq maires à la commune : Alexandre (1767-1816), Alphonse (1802-1860), René  (1834-1893), Maurice  (1867-1934) et Xavier (1899-1987).","habitants":"famille de  Mézange de Saint-André                                              Milly, famille du Hamel de Milly\r\n        \"","divers":"Deux châteaux dans cet article; Coquerel et Milly                                  gps \r\n48° 36' 08\" nord, 1° 01' 12\" ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Coquerel_Milly_1.jpg","../../jctruffet.com/image/image_50/50_Coquerel_Milly_2.jpg","../../jctruffet.com/image/image_50/50_Coquerel_Milly_3.jpg"]},"Consult_chateau_formulaire0e7f":{"id":"Consult_chateau_formulaire0e7f","dept":"50","canton":"Agon-Coutainville","commune":"Gonfreville","nom":"Cour_Gonfreville","type":"Château","periode":"XVI","histoire":"trois châteaux à Gonfrerie, la Cour  et la cour de Reigneville et Crampond à Gorges.                                                                                         LA COUR , le manoir remonte au XVIe siècle et a appartenu à François Le Roux, sieur de Gonfreville, trésorier de France à Caen en 1640. L'ensemble comprend l'église, le porche, les communs et le manoir. Le porche du XVIe siècle est percé d'une porte piétonne et d'une porte charretière moulurées. La porte piétonne est surmontée d'une niche d'esprit gothique. Les bâtiments d'exploitation, de la même époque, présentent, pour celui de l'ouest, trois fenêtres jumelées séparées par un meneau. La demeure  est en forme de L. A l'angle des deux bâtiments se dresse une tour d'escalier à pans coupés, garnie de petites fenêtres chanfreinées. Une seconde tour a disparu en 1944. A l'intérieur, toutes les portes ouvrant sur l'escalier ont un arc en accolade, ainsi que les portes du rez-de-chaussée. Celle donnant sur le départ de l'escalier a un blason et deux feuilles de chêne sculptées.Éléments protégés MH : les façades et les toitures du manoir et de ses communs : inscription par arrêté du 14 novembre 1977.","architecture":"La cour à REIGNEVILLE , le manoir de La Cour, situé à Reigneville-Bocage, plus  petit bourg de la Manche, au beau milieu des prés, avec 28 habitants, est un témoin capital de la Renaissance en Cotentin, plus précisément du courant maniériste. Le logis, construit sur quatre niveaux, possède une tourelle sur l'angle sud-est construite en petites briques.\r\nÉléments protégés MH : le manoir de la Cour : inscription par arrêté du 2 octobre 1995.                                                                                                                CRAMPOND à Gorges , à 1 K.M. au nord, le fief de Camprond, dont le manoir se trouve au sud-ouest de léglise, appartenait en 1390 à Thomas de Camprond, en 1518 à Jacques de Camprond, en 1554 à Eustache de Camprond, en 1586 à François de Camprond, sieur de Gorges et de Blihoust (Bléhou), et en 1688 à Nicolas de Camprond. Ces seigneurs se qualifiaient de seigneurs de Gorges : leur fief, en 1762 et 1767, appartenait au marquis dOurville, qui avait recueilli leur héritage. Le logis conserve une cheminée qui trouve son modèle parmi le vocabulaire décoratif de la seconde Renaissance française, diffusé durant tout le XVIIe siècle en Normandie et particulièrement en Cotentin.Éléments protégés MH : les façades et les toitures du logis ; la grande cheminée au rez-de-chaussée (lieu-dit manoir de Camprond) : inscription par arrêté du 11 septembre 2009.","habitants":"Crampond à gorges\r\n        \"","divers":"trois châteaux à Gonfrerie, la Cour  et la Cour de Reigneville grav-1-5-6 et Crampond  grav 2-3-4 à Gorges. Gps 49° 14' 24\" N, 1° 23' 34\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Cour_Gonfreville_1.jpg","../../jctruffet.com/image/image_50/50_Cour_Gonfreville_2.jpg","../../jctruffet.com/image/image_50/50_Cour_Gonfreville_3.jpg","../../jctruffet.com/image/image_50/50_Cour_Gonfreville_4.jpg","../../jctruffet.com/image/image_50/50_Cour_Gonfreville_5.jpg","../../jctruffet.com/image/image_50/50_Cour_Gonfreville_6.jpg"]},"Consult_chateau_formulaire1adc":{"id":"Consult_chateau_formulaire1adc","dept":"50","canton":"Bricquebec","commune":"St-Martin le Herbert","nom":"Cour_St_Martin","type":"Château","periode":"XVII","histoire":"COUR Le manoir, typique de l'architecture défensive, est édifié au XIVe siècle, par Jean d'Orglandes, seigneur de Saint-Martin-le-Hébert. En 1610, Guillaume Plessard, fils de Richard Plessard, procureur du roi en la vicomté de Valognes entre en possession du manoir à la suite d'un échange avec Jacques d'Orglandes. En 1612, il épouse Catherine d'Orglandes, de la famille des anciens seigneurs du lieu. Guillaume modifie les bâtiments existants et en bâti de nouveaux dont un important colombier et le pavillon neuf, affirmant ainsi son autorité seigneuriale.","architecture":"COUR, le manoir dit La Cour est un des plus prestigieux ensembles du département de la Manche.On accède au manoir par une porterie, jadis équipée d'un pont-levis, qui a été refaite au XVIIe siècle. Inscrite dans un quadrilatère, La Cour, constitue un ensemble composite bâti entre les XVe et XVIIe siècles. Le logis se présente comme un bâtiment à deux étages. Il s'éclaire par des fenêtres à meneaux surmontées de frontons. Une salle basse occupe le rez-de-chaussée avec notamment un lavoir intérieur. ils sont entourés sur trois côtés de douves encore en eau. Leur construction s'échelonne du XVIe au XVIIIe siècle, mais la majeure partie des éléments authentiques peut être datée de la reconstruction du logis, vers 1630. Les fenêtres à meneaux plats présentent encore des vitres à plomb. Certaines salles ont conservé leurs boiseries et les sols sont revêtus de pavages de qualité, en schiste et pierre calcaire. La plupart des cheminées sont typiques de la fin du XVIe siècle. Un lavoir intérieur, de forme octogonale, occupe la base de la tour sud-ouest. A l'est et à l'ouest du portail d'entrée se situent deux colombiers. Le jardin se présente comme un jardin clos à quatre terrasses qui comportait les trois éléments d'un jardin nourricier :  \r\n les intérieurs de l'ensemble des bâtiments et leurs décors, en totalité ;  la cour d'honneur ; les douves et les ponts reliant le logis au jardin.","habitants":"Famille de  Jacques d'Orglandes\r\n        \"","divers":"a St-Martin le Herbert château de Cour  gps 49°30'31.62\"N, 1°36'42.11\"ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Cour_St_Martin_1.jpg","../../jctruffet.com/image/image_50/50_Cour_St_Martin_2.jpg","../../jctruffet.com/image/image_50/50_Cour_St_Martin_3.jpg","../../jctruffet.com/image/image_50/50_Cour_St_Martin_4.jpg"]},"Consult_chateau_formulaire87b3":{"id":"Consult_chateau_formulaire87b3","dept":"50","canton":"Pontorson","commune":"Aucey la Plaine","nom":"Crenne","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux dans cet article; Crenne et Guépéroux.                          CRENNE, la construction du Château de la Crenne date de 1851 à 1858, sur un ancien manoir seigneurial, entouré de vaste prairies. L'architecte rennais était Jacques Mellet. La décoration intérieure a été réalisée par Auguste Louis Jobbé-Duval et le parc fut dessiné par Paul de Lavenne, comte de Choulot - Paul de Choulot. C'est à la fin du XIVe siècle que la Famille de Verdun vient s'installer au château de la Crenne. Dès le XIe siècle, elle résidait à Verdun-en-Boucey et possédait les terres et seigneuries de Barenton. Elle est toujours propriétaire du château de la Crenne au XXIe siècle. De nombreux membres de cette famille devinrent célèbres : Durant la Guerre de Cent Ans, Guillaume de Verdun fut l'un des 79 défenseurs du Mont-Saint-Michel. Robert de Verdun, son fils, fut le premier à porter le titre de seigneur de la Crenne, gouverneur en 1468 de Saint-James-de-Beuvron. Il épousa Jehanne Guiton, la fille de Jean Guiton, lui aussi, un ardent défenseur du Mont-Saint-Michel. Jean-René de Verdun de la Crenne, né à la Crenne en 1741, fut Major Général de la Marine.","architecture":"CRENNE, dans le château de la Crenne est né le chef d'escadre, Verdun de La Crenne, illustré spécialement par le voyage scientifique qu'il fit avec Borda et Pingré, sur la Flore ; il alla en Russie aider Catherine II dans l'organisation de sa marine, prit part à l'expédition franco-espagnole contre Gibraltar en 1782 ; après cette campagne, il alla prendre le commandement de la station des Antilles, et, en 1788, devenu chef d'escadre et chef de division, il entra dans le conseil supérieur de la marine. La Révolution arriva : il se retira en Espagne, rentra en France vers 1800, et vint mourir, en 1805, au lieu de son berceau. Michel de Verdun, mort en 2016 , fut Maire d'Aucey-la-Plaine.Château de la Crenne : construit en 1852 et occupé par la famille de Verdun .                                       GUEPEROUX, ancien du XVIIe siècle et nouveau (Louis XVI), habité par le marquis de Verdun (privé).Le château du Guépéroux (fin XVIIIe). Site du « Gué Perroux », ancien passage à gué traversant le Couesnon. Il existait un poste de garde au Moyen Âge, du XVIIIe siècle, ancien du XVIIe siècle et un nouveau de style Louis XVI, habité par le marquis de Verdun .","habitants":"Crenne; Comte de Choulot  et à Gueoéroux le  marquis de Verdun \r\n        \"","divers":"Deux châteaux dans cet article; Crenne grav  1-2 et Guépéroux grav-3 .  GPS : 48° 31' 38\" Nord, 1° 28' 41\" Ouest      : 48°30'49.2\"N 1°29'51.7\"ouest","gps":"48° 31' 38\" Nord, 1° 28' 41\" Ouest      : 48°30'49.2\"N 1°29'","images":["../../jctruffet.com/image/image_50/50_Crenne_1.jpg","../../jctruffet.com/image/image_50/50_Crenne_2.jpg","../../jctruffet.com/image/image_50/50_Crenne_3.jpg"]},"Consult_chateau_formulaire714e-2":{"id":"Consult_chateau_formulaire714e-2","dept":"50","canton":"Bricquebec","commune":"Crosville sur Douvre","nom":"Crosville","type":"Château","periode":"XV","histoire":"CROSVILLE, il appartenait à la famille Boudet qui devait le conserver pendant plusieurs siècles. Jean Boudet, écuyer, était seigneur de Crosville en 1463. On ne connaît l'histoire de Crosville qu'à partir de la seconde moitié du XVe siècle,  construction du donjon et de la double porte de la cour, le château ne fut fortifié qu'à cette époque.  Cette famille s'est élevée dans la hiérarchie de la noblesse locale à la fin du règne de Henri IV et sous le règne de Louis XIII, et a procédé à la construction ou reconstruction de la plus grande partie du château, notamment du logis principal. Jean II de Crosville construit le donjon et de la double porte de la cour, ce bâtiment est représentatif de l'architecture provinciale de styles gothiques, Renaissance et classiques. Dans la  grande salle du premier étage se trouve un décor peint de scènes mythologiques s'inspirant des Métamorphoses d'Ovide. Des éléments d'origine ont été conservés, l'escalier central monumental à double volée, les pavages, les cheminées, les plafonds et l'assiette du jardin clos avec ses murs de clôture. Il est transformé en greniers et bâtiment agricole vers 1800.  Éléments protégés MH : le château, en totalité ; les façades et les toitures des communs, ainsi que les deux cheminées du commun Est ;  la cour ; l'assiette du jardin et ses murs de clôture ; la porterie et sa tourelle ; les 2 pavillons d'angle du jardin : classement par arrêté du 6 décembre 2000.","architecture":"CROSVILLE, ie château sombre dans l'oubli. Plusieurs générations de fermiers se succèdent, En 1932, M. et Mme Auguste Lefol et leurs dix enfants arrivent comme fermiers locataires  habitant seulement l'aile droite et engrangent foin, céréales dans les somptueuses salles, les communs et le château dont les salles abandonnées servent de poulailler et de réserve. C'est Emile, un des enfants qui reprend la suite en 1965 avec sa femme Paulette. Jusqu'à cette époque, le propriétaire assurait les travaux de maintien au niveau des toits. Vers 1970, les révisions ne servent plus à rien et les toitures se dégradent, il faut du neuf. Devant le refus de la part du propriétaire d'engager des travaux, il est classé \"M.H.\". Dix ans passent, et les toits fuient de partout, les charpentes pourrissent, les sols se dégradent et en 1980, c'est la mise en vente.  La fille du fermier . Au bout de cinq ans de mise en vente, elle réussit à les décider, ils s'endettent lourdement. Devenus châtelains, ils ne changent rien à leur mode de vie et continuent à exploiter la ferme à vocation laitière. Michèle prend son bâton de pèlerin, décide l'ouverture au public, dépose des dossiers pour trouver le financement des travaux des toitures. Il faut faire vite car la ruine menace. Mais grâce à son enthousiasme, tout le monde tombe sous le charme de ce couple infernal. Associations et Fondations Nationales lui donnent de l'argent pour commencer les travaux, ainsi la première tranche démarre en 1986, l'Etat verse 50% et le Département 25%. Il est très rare de voir un tel acharnement pour sauver son patrimoine. Une association est créée \"les amis du château de Crosville\", elle a pour but d'animer et de promouvoir l'édifice. Désormais chaque année de pâques à octobre, des expositions et des animations ponctuent la saison.","habitants":"Famille de  Boudet de Crosville\r\n        \r\n        \"","divers":"Crosville sur Douvre château de Crosville                                                     GPS : 49° 27' 19\" Nord, 1° 29' 41\" Ouest","gps":"49° 27' 19\" Nord, 1° 29' 41\" Ouest","images":["../../jctruffet.com/image/image_50/50_Crosville_1.jpg","../../jctruffet.com/image/image_50/50_Crosville_2.jpg","../../jctruffet.com/image/image_50/50_Crosville_3.jpg","../../jctruffet.com/image/image_50/50_Crosville_4.jpg","../../jctruffet.com/image/image_50/50_Crosville_5.jpg"]},"Consult_chateau_formulaire97df":{"id":"Consult_chateau_formulaire97df","dept":"50","canton":"Pont-Hébert","commune":"Cérisy la Forêt","nom":"Cérisy_la_Forêt","type":"Château","periode":"XVI-XVII","histoire":"A Cérisy La Forêt château de la Boulaye  et le Rochers.                       BOULAYE du XVIIe siècle. il s'agit d'un ancien château seigneurial reconstruit aux XVIIe et XVIIIe siècles. Pendant la bataille de Normandie, il abrite le quartier général de la 2e division d'infanterie américaine. Le général Eisenhower et Omar Bradley viennent y encourager les soldats américain. La construction du château de la Boulaye date du XVIIe au XVIIIe siècle. Le château de la Boulaye abrita le quartier général de la 2eme division d'Infanterie Américaine. Le Général Eisenhower et Omar Bradley vinrent y encourager les soldats américains. La construction du château de Cerisy-la-salle date de 1605 et 1620 (sous Louis XIII). La ferme et le château de Cerisy-la-Salle ont été construits au début du XVIIe siècle (deux linteaux de la ferme datent de 1613 ou 1617, et 1625). La construction est attribuée à Jean Richer, commanditaire du château.","architecture":"Ferme-manoir Les Rochers XVIe siècle- CHAMBRES D'HÔTES ET GITE - D'HÔTES , les Rochers est un manoir qui trouve ses origines fin du XVIe siècle. Cette ancienne ferme fortifiée a été complètement rénovée pendant 10 ans, en conservant les extérieurs dans l'état original. A l'intérieur les vieilles pierres sont contrastées par des oeuvres d'art contemporain et le mobilier classique du XXe siècle, à partir de l'Art Deco jusqu'au design moderne.","habitants":"Jean Richer\r\n        \r\n        \r\n        \"","divers":"A Cérisy La Forêt château de la Boulaye  grav 1-2-3  et le Rochers grav 4-5.                                                la Boulaye gps 49°10'38.9\"N 0°56'12.3\"W                                        Rochers  : gps 49°10'58.8\"N 0°56'37.1\"W","gps":"","images":["../../jctruffet.com/image/image_50/50_C%c3%a9risy_la_For%c3%aat_1.jpg","../../jctruffet.com/image/image_50/50_C%c3%a9risy_la_For%c3%aat_2.jpg","../../jctruffet.com/image/image_50/50_C%c3%a9risy_la_For%c3%aat_3.jpg","../../jctruffet.com/image/image_50/50_C%c3%a9risy_la_For%c3%aat_4.jpg","../../jctruffet.com/image/image_50/50_C%c3%a9risy_la_For%c3%aat_5.jpg"]},"Consult_chateau_formulaire1522":{"id":"Consult_chateau_formulaire1522","dept":"50","canton":"Créances","commune":"Denneville","nom":"Denneville","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux à Denneville dont; Denneville, D'Omonville et Olonde.                                                                                              DENNEVILLE, la famille de Denneville fut anoblie en 1551, dans la personne de Jean et de Georges Eustace de Denneville ; elle porte dazur à la fasce dor, accompagnée de trois roses dargent, deux en chef et une en pointe. Eustace de Denneville, né à Denneville, un des membres de la famille de Denneville, avait la seigneurie de la paroisse dans la première moitié du XVIIe siècle. Après avoir appartenu à cette famille, le château passa par héritage dans la famille de Beaudrap jusquen 1920. Il fut acheté par des fermiers puis vendu à la mairie de Villejuif afin d'accueillir une colonie de vacances. Il a été abandonné quelques temps et appartient aujourdhui à monsieur Alain qui semble vouloir le restaurer. Reconstruit aux XVIIe et XVIIIe siècles, la façade du bâtiment à deux étages est très large. Un avant-corps central surmonté dun fronton triangulaire est encadré de deux corps de bâtiment puis de deux pavillons latéraux légèrement avancés et dune tour à toit conique à gauche. La façade se reflète dans le plan deau creusé récemment devant la façade et sur les côtés.                                            A Cinq K.M. au nord à Canville la Roque OLONDE, l'édifice est constitué d'éléments d'époques différentes qui se juxtaposent les uns aux autres: vestiges du château du XIIe siècle; vestiges de la reconstruction du début du XVIe siècle (dont deux tours carrées); le logis est reconstruit au XVIIIe siècle ; assiette de l'ancien jardin du XVIIIe siècle et le bois.","architecture":"D'OMONVILLE  à port-bail sur mer  Cette demeure, dont la partie la plus ancienne est du XVIe siècle, est édifiée au centre d'une cour d'honneur entourée de douves en eau et présente à l'arrière un jardin à la française. Au XIXe siècle, les bâtiments de services ou communs furent reconstruits en arc de cercle sur un terre plein dominant légèrement la cour du château. Celui-ci est le siège de la \"Grande Loge de l'Ordre de la Rose-Croix\". C'est de ce château que les enseignements rosicruciens sont envoyés à tous les membres de France, de Belgique, de Suisse, du Québec, d'Afrique francophone, des Territoires et des Départements d'Outre-Mer. Après avoir appartenu à la famille d'Omonville, ce château devint la propriété de Mr Lemouton puis de Mr de Carmesnil, allié à la famille Clamorgan-Taillefer. II a appartenu ensuite à la famille de la Groutière dont plusieurs membres sont inhumés dans le cimetière de Denneville puis depuis 1937, à la famille de la Fournière qui l'occupe aujourd'hui. Il a subi d'importants dommages en 1944 au moment de l'affrontement entre allemands et américains.                                                                                     OLONDE, éléments protégés MH : l'assiette de l'ancien château y compris les douves et la motte, l'ensemble des bâtiments castraux, à savoir les vestiges du château du XIIe siècle, les façades et toitures des corps de logis du XVIe siècle et du XVIIIe siècle, les tours ouest et nord, à l'exclusion des communs modernes ; les façades et les toitures du commun est surplombant la douve, les latrines : inscription par arrêté du 29 novembre 2000.","habitants":"famille de Denneville,       famille d'Omonville\"","divers":"deux châteaux à Denneville dont; Denneville-Breuil grav -1-2, D'Omonville  grav 3  et Olonde grav 4-5.                                                    Denneville  Ouest      Denneville GPS : 49° 18' 50\" Nord, 1° 39' 32\" Ouest                                                  Breuil GPS : 49° 18' 50\" Nord, 1° 39' 32\" Ouest","gps":"49° 18' 50\" Nord, 1° 39' 32\" Ouest","images":["../../jctruffet.com/image/image_50/50_Denneville_1.jpg","../../jctruffet.com/image/image_50/50_Denneville_2.jpg","../../jctruffet.com/image/image_50/50_Denneville_3.jpg","../../jctruffet.com/image/image_50/50_Denneville_4.jpg","../../jctruffet.com/image/image_50/50_Denneville_5.jpg"]},"Consult_chateau_formulaire4f22-2":{"id":"Consult_chateau_formulaire4f22-2","dept":"50","canton":"Avranches","commune":"Dragey-Ronthon","nom":"Dragey_Ronthon","type":"Château","periode":"XV-XVIII","histoire":"Deux châteux dans cet artcle Brion et Potrels.                                         POTRELS, la construction du Manoir de Potrels date du XVe avec son porche à 2 tours circulaires, son pigeonnier octogonal, ses poutres peintes et ses boiseries de style Louis XIII. De la ferme fortifiée du XVe siècle, il reste l'entrée de la cour gardée par deux tourelles percées de meurtrières et un colombier orthogonal. Le Manoir de Potrel possède une salle d'honneur, au premier étage, ornée d'un ensemble de boiseries et poutres peintes du 3e quart du XVIIe siècle. Au XVIIe siècle, le manoir de Potrels est acheté lors de son exil en France par George de Carteret (1609-1679), bailli de Jersey, vice-amiral de la Royal Navy et fondateur de la Caroline du Nord, l'un des 8 lords, propriétaires de Caroline et du New Jersey. Le 27/11/1933, les cheminées, boiseries et plafond de la salle d'honneur du manoir sont inscrits au titre des monuments historiques. Le manoir avec l'ensemble de ses décors intérieurs (escalier, portes, cheminées, charpente, façades et toitures des deux tourelles d'entrée et du bâtiment octogonal contigü) est inscrit par arrêté du 31 octobre 1990. Il existe un autre manoir à découvrir sur la commune : le manoir de Brion du XVIe, remanié au XXe siècle.","architecture":"BRION, le château est un ancien prieuré bénédictin dépendant de l'Abbaye du Mont-Saint-Michel fondé en 1066 par Raoul  de Beaumont, abbé du Mont-Saint-Michel. De nombreux grands personnages royaux y ont séjourné, notamment le Roi Charles VI en 1393, Louis XI en 1462 et François 1er en 1532. Le château est une charmante construction dans le style gothique flamboyant. construit vers 1510  pour servir de logis abbatial  à Guillaume de Lamps. Au milieu du XXe siècle la propriété appartenait au comte Jean de Rolland. Sept chambres d'hôtes.  Il date du XIe au XIVe siècle. C'est un ancien prieuré bénédictin de l'abbaye du Mont-Saint-Michel. Il est situé dans l'Avranchin (Manche), à mi-chemin des bourgs de Genêts et de Dragey (commune de Dragey-Ronthon, sur le territoire de laquelle il est bâti) et a été fondé en 1137 par saint Bernard de Clairvaux. Plusieurs rois et membres de la cour de justice royale sont restés au manoir de Brion lors de leur pèlerinage au Mont-Saint-Michel, dont Charles VI en 1393, Louis XI en 1462 et François Ier en 1532. L'explorateur Jacques Cartier a été aussi présenté à François Ier au manoir de Brion avant son voyage au Canada en 1534, d'où le nom d'une des îles de la Madeleine appelée l'île Brion. L'auteur britannique Vincent Cronin y résida à la fin de sa vie. Depuis, le Manoir historique de Brion est composé de 4 chambres d'hôtes datant du XIe siècle.","habitants":"Brion; comte Jean de Rolland                                                             Potrels;  George de Carteret \r\n        \"","divers":"Deux châteux dans cet artcle Brion grav 1-2-3-4 et Potrels grav-5.                                                                                                     Brion  GPS : 48° 41' 47\" Nord, 1° 29' 36\" Ouest                                                 Potrels GPS: 48° 42' 42,58\" Nord, 1° 30' 19,07\" Ouest","gps":"48° 41' 47\" Nord, 1° 29' 36\" Ouest","images":["../../jctruffet.com/image/image_50/50_Dragey_Ronthon_1.jpg","../../jctruffet.com/image/image_50/50_Dragey_Ronthon_2.jpg","../../jctruffet.com/image/image_50/50_Dragey_Ronthon_3.jpg","../../jctruffet.com/image/image_50/50_Dragey_Ronthon_4.jpg","../../jctruffet.com/image/image_50/50_Dragey_Ronthon_5.jpg"]},"Consult_chateau_formulaire073e":{"id":"Consult_chateau_formulaire073e","dept":"50","canton":"Pontorson","commune":"Ducey les Cheris","nom":"Ducey_les_Cheris","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux dans cet article; Montgommery et Montgothier.                                                            MONTGOMMERY, se situe près de la Sélune, est l'uvre de Gabriel II de Montgommery, fils du célèbre Gabriel Ier de Montgommery (1526-1574), qui blessa mortellement Henri II, roi de France, lors d'un tournoi. La seigneurie de Ducey est entrée dans la famille des Montgommery en 1521 lors du mariage de Jacques Ier de Montgommery issu d'une vieille famille normande, avec Claude de la Boissière, héritière des terres de Ducey. Après la mort de Gabriel Ier, son fils Gabriel II décide de reconstruire le château de Ducey. Les travaux débutent en 1608 et cessent en 1635 à la mort de Gabriel II. en 1712 mort du dernier des Montgommery le domaine est repris par Pierre Rollée conseiller du roi, puis aux Poilvilain et en 1779 aux Campi. En 1830, au début de la Révolution des Trois Glorieuses, le Prince Jules de Polignac, ministre des finances de Charles X, en fuite, est caché dans le château de Ducey par le comte de Semallé, son propriétaire qui le transmet par héritage aux Guéhéneuc de Boishue avant d'échoir à la famille de Préaulx. Amputé  depuis le second Empire d'une partie de son corps central  et de son pavillon nord, le château est cédé en 1922 à une société industrielle  qui installe une distillerie dans le parc du château. En 1984, la commune de Ducey rachète le château, laissant place à un jardin. le pressoir du château de Ducey est aménagé en bibliothèque municipale. inscrites depuis le 14/06/1990.","architecture":"Isigny le Buat à dix K.M. au sud est de Ducey le château de Montgothier.                                                                    MONTGOTHIER, la seigneurie de Montgothier, apparue au XIe siècle, et fut divisée en deux, entre les XVe et XVIIe siècles. Le Logis de Montgothier échoit par succession aux Gouin, entre 1653 et 1663. Jean de Gouin, Capitaine du régiment d'Avranches, réunit les deux fiefs, Montgothier et Athys, en 1724, et lance les travaux de construction du corps principal du logis, entre 1722 et 1728. Il y adjoint les communs entre 1728 et 1732. Blanche Colombe du Quesnoy, arrière-petite-fille de Jean de Gouin, épousa Prudent du Bouëxic de la Diennais, en 1804. Le logis resta longtemps inhabité. Il devint une ferme au début du XIXe siècle. En 1914, le capitaine du Bouëxic a sous ses ordres Paul Vauprès ; de retour de la guerre, le capitaine propose à l'agriculteur un bail rural sur les terres du logis. Ce dernier s'y installa en 1921. Son fils André, né en 1928, prit le relais et la famille sauva le Logis, de l'abandon. Paul Vauprès, titulaire de la médaille militaire, plusieurs fois maire de la commune, entre 1941 et 1968, accueillit, Jean-Paul Rouland, en juin 1944. Depuis 1970, le Logis de Montgothier est la propriété de Denis Gautier-Sauvagnac qui l'a fait rénover, en s'appuyant sur les artisans locaux. Les familles Vauprès et Gautier-Sauvagnac cohabitent de 1977 à 1982, date où les Vauprès s'installent dans les communs rénovés avant de les quitter en 2009. De 1993 à 2007, le terrain attenant accueille les Féériques de Mongothier, spectacle son et lumière à succès.","habitants":"Montgommery; famille Montgommery                                  Montgothier; Famille de Guoin\r\n        \r\n        \"","divers":"Deux châteaux dans cet article Montgommery grav 1-2-3-4  et Montgothier grav-5. GPS : 48° 37' 14\" Nord, 1° 17' 38\" ouest                                                Montgothier     GPS : 48° 37' 08\" Nord, 1° 10' 17\" Ouest","gps":"48° 37' 14\" Nord, 1° 17' 38\" ouest","images":["../../jctruffet.com/image/image_50/50_Ducey_les_Ch%c3%a9ris_1.jpg","../../jctruffet.com/image/image_50/50_Ducey_les_Ch%c3%a9ris_2.jpg","../../jctruffet.com/image/image_50/50_Ducey_les_Ch%c3%a9ris_3.jpg","../../jctruffet.com/image/image_50/50_Ducey_les_Ch%c3%a9ris_4.jpg","../../jctruffet.com/image/image_50/50_Ducey_les_Ch%c3%a9ris_5.jpg"]},"Consult_chateau_formulaire4b4d":{"id":"Consult_chateau_formulaire4b4d","dept":"50","canton":"La Hague","commune":"Urville-Nacqueville hague","nom":"Dur_Ecu","type":"Châteu","periode":"XVI","histoire":"DUR-ECU, le manoir de Dur-Écu a été reconstruit au XVIe siècle sur des bases plus anciennes. Endommagé en 1944, il fut restauré par trois générations de propriétaires. Jean Heuzé, noble d'ancienneté, était, en 1595, sieur de Gréville, Urville et en possession du manoir de Dur-Écu. À la fin du XVIe et au début du XVIIe siècle, Thomas Lesdos, avocat en la Vicomté de Valognes et bailli de la Haute Justice de l'abbaye du Vu, partisan du roi Henri IV, se qualifie sieur de Dur-Écu. C'est lui qui uvra à ce que la ville de Cherbourg demeure dans l'obédience royale. Il mourut en 1632. Louis II de Grimouville s'intitule ensuite seigneur de Dur-Écu, mais célibataire à sa mort en 1685, le manoir fait retour aux Lesdos qui vendent Dur-Écu en 1708 à Jean-Hervé Mangon qui le revend en 1783 à Pierre Lesourd, directeur des aides à Valognes. Ensuite ce sont les Folliot d'Urville qui possèderont Dur-Écu jusqu'à la Révolution. En 1808, le manoir est la possession de Jean-Louis Le Moigne. Lors de la Seconde Guerre mondiale, début juin 1944, le manoir est gravement endommagé à la suite de bombardements visant une station d'écoute allemande installée à proximité. Après la guerre Marie-Hélène René-Bazin avec son fils le restaurera. C'est Jean René-Bazin qui « invente » le donjon, s'inspirant de celui de Vauville, dessinant une tour plus large que la tour initiale où deux personnes ne pouvaient se croiser. Les travaux durèrent 50 ans et il est encore aujourd'hui la propriété de la famille René-Bazin.","architecture":"DUR-ECU.  est inscrit partiellement aux M.H. pour ses façades, sa toiture et son pigeonnier, depuis 30/12/1982. C'est un site classé depuis le 19/01/96,  privé, fermé au Public. Il y a aussi sur la commune à découvrir : le château de Beaumont (1597, en partie détruit en 1944, restauré depuis), le Manoir de la Madeleine (fin XVIe), IMH), le Manoir de la Grand'Cour au hameau Gardin, avec son escalier intérieur de style Louis XIII et le château de Branville du XVIIe et XIXe siècle. Le site de Dur-Écu a été très anciennement occupé. II est à présumer qu'une station romaine y existait déjà, car au début du XIXe siècle on y découvrit une meule romaine et des briques provenant d'un foyer de la même époque. De même, deux colonnes romaines, en réemploi, ont servi de soutien à l'entablement de la cheminée monumentale de la cuisine. Cet entablement portait jadis des armoiries qui ont été bûchées à la Révolution. La haute tour du donjon est flanqué d'une mince tourelle d'escalier se terminant par un toit en poivrière qui domine le dernier étage à l'air libre du donjon couronné à son faîte par une rangée complète de mâchicoulis. L'ensemble pourrait dater du XVIe et avoir été repercé de fenêtres longues au début du XVIIe siècle, à trois niveaux. Le logis assez étroit s'insère entre deux tours d'angles rondes couverte en poivrière et comporte un rez-de-chaussée surélevé percé de fenêtres à meneaux et un seul étage. L'ensemble a conservé un caractère défensif évident dû à l'époque des guerres de Religion ou, plus encore, à la crainte d'un retour offensif et toujours possible des Anglais. À l'intérieur, on peut voir dans la grande salle une cheminée monumentale.","habitants":"Famille de Mme Bazin   et Louis II de Grimouville \r\n        \"","divers":"Château à Urville château de Dur-Ecu grav 3-4-5  Brainville grav 1-2                                                                                            Gps 49° 40' 36\" N, 1° 45' 22\" Ouest","gps":"","images":["../../jctruffet.com/image/image_50/50_Dur_Ecu_1.jpg","../../jctruffet.com/image/image_50/50_Dur_Ecu_2.jpg","../../jctruffet.com/image/image_50/50_Dur_Ecu_3.jpg","../../jctruffet.com/image/image_50/50_Dur_Ecu_4.jpg","../../jctruffet.com/image/image_50/50_Dur_Ecu_5.jpg"]},"Consult_chateau_formulairef6ec":{"id":"Consult_chateau_formulairef6ec","dept":"50","canton":"Bréhal","commune":"Equilly","nom":"Equilly","type":"Manoir","periode":"XVII","histoire":"EQUILLY, en 1237, ce fief dépend alors du comté de Mortain, cest \"un logis de noble maître, bon seigneur, une fière fieffée ferme\". Jusquau XVIIe siècle les Sainte-Marie sont les seigneurs du lieu. En 1610, Pierre de Sainte-Marie agrandit la demeure et agrémente lensemble dun jardin à litalienne avec terrasses et bassins alimentés par leau de la fontaine Sainte-Anne. propriété de la famille de Sainte-Marie. Le logis passe au marquis d'Auvers en 1651, puis à l'armateur malouin Gilles Vasse en 1747. Les Regnault de Prémesnil la possèdent au XIXe siècle.  A louest du manoir,  Après avoir été pendant des siècles le fief des Sainte-Marie, Equilly connaît de nombreux propriétaires, héritiers ou acquéreurs du domaine : vieille noblesse, capitaine de frégate, armateur de Granville, fabricant de papier parisien et officiers supérieurs de larmée.","architecture":"EQUILLY, s'agit d'un rare ensemble complet d'une ancienne seigneurie de la baie du Mont-Saint-Michel : logis principal, parc avec pièce d'eau et étang, basse cour , avenue, chapelle et grange à dîmes.\r\nLa bâtisse est d'abord un petit château-fort de défense, probablement entouré de douves, La cuisine, partie la plus ancienne datée de 1243, possède une cheminée monumentale. L'escalier majestueux mène à la chambre de l'amiral Charles Regnault de Prémesnil et à un salon de style Empire, avec des boiseries aux nombreuses portes, s'ouvrant en éventail pour créer un théâtre. Un parquet a été posé durant la Seconde Guerre mondiale au dessus d'un parquet de Versailles. Le site, composé du logis dont l'accès se fait par un double escalier et une terrasse, d'un moulin, d'un parc avec un bassin napoléonien, et d'un bois, est classé depuis  en avril 1947, le domaine est classé parmi les sites. Le périmètre de protection inclut le vallon boisé du Doucoeur à louest, la longue allée plantée jusquau D 372 à lest, ainsi que les terres à louest et à lest du manoir. Le logis lui-même est en dehors de la protection mais léglise Sainte-Anne, son cimetière et son presbytère y figurent. Le rapport établi pour le classement mentionne surtout lallée daccès au manoir et ses deux triples alignements de vieux hêtres. Le vallon du Doucoeur, encaissé et étroit, est alors formé de prairies dominées par des bois sur les pentes.  Cest un ensemble qui a de la grandeur par ses lignes darbres majestueux et de lintimité par certains aspects du manoir et des bois.\r\nDepuis la restauration du logis, commencée en 2005, les propriétaires proposent chambres et table d'hôtes.","habitants":"Famille de Sainte-Marie\r\n        \"","divers":"Château d'Equily grav 1 à 4","gps":"","images":["../../jctruffet.com/image/image_50/50_Equilly_1.jpg","../../jctruffet.com/image/image_50/50_Equilly_2.jpg","../../jctruffet.com/image/image_50/50_Equilly_3.jpg","../../jctruffet.com/image/image_50/50_Equilly_4.jpg"]},"Consult_chateau_formulaired059":{"id":"Consult_chateau_formulaired059","dept":"50","canton":"Bricquebec","commune":"Etienville","nom":"Etienville","type":"Château","periode":"XV-XVI","histoire":"ETIENVILLE,  situé autour de léglise, le domaine comprend, le presbytère fortifié construit en 1450, le château datant de 1635 puis restauré au XIXe siècle et son parc, et le parc botanique du Presbytère sur deux hectares. Le parc et ses jardins sont une réalisation qui sétend sur deux hectares et un kilomètre le long du domaine seigneurial dEtienville. On y entre par la porte cochère du monument. Dès lentrée, la variété des fleurs et des arbustes, le mélange des couleurs, la paix qui règne dans cet ensemble vous surprend. En fond, les bâtiments classés du Presbytère, de léglise et du château. Dans le marais le passage de la voie romaine, les cigognes et les animaux en liberté. chambres d'hôtes\r\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 17 mars 1975.","architecture":"LA COUR, la construction du château d'Etienville date du XVIe, XVIIIe et XIXe siècle. Le château est ouvert au Public. Anne et Philippe Gilliéron seront heureux de vous accueillir dans le Domaine Seigneurial restauré dEtienville, sur les bords dun Marais paisible où les animaux sont en liberté, et dans un lieu chargé dhistoire. Le château d'Etienville est inscrit aux M.H. depuis le 17/03/1975 - Les façades et toitures du château sont protégées aux M.H.","habitants":"Seigneurs locaux\r\n        \"","divers":"Deux châteaux à Etienville; Etienville  grav  2-3-4-5 et Cour grav-1 La cour                                                                     GPS : 49° 22' 32,82\" Nord, 1° 26' 04,78\" Ouest                                                         GPS : 49° 22' 35,6\" Nord, 1° 26' 3,52\" Ouest","gps":"49° 22' 32,82\" Nord, 1° 26' 04,78\" Ouest","images":["../../jctruffet.com/image/image_50/50_Etienville_1.jpg","../../jctruffet.com/image/image_50/50_Etienville_2.jpg","../../jctruffet.com/image/image_50/50_Etienville_3.jpg","../../jctruffet.com/image/image_50/50_Etienville_4.jpg","../../jctruffet.com/image/image_50/50_Etienville_5.jpg"]},"Consult_chateau_formulaireb1b6":{"id":"Consult_chateau_formulaireb1b6","dept":"50","canton":"Saint-Hilaire-du-Harcouët","commune":"Mesnillard","nom":"Faucherie","type":"Manoir","periode":"XVI","histoire":"FAUCHERIE,   Guillaume Cordon, sieur de la Lande, conseiller élu au comté de Mortain le rachète en 1583. Il fut anobli 10 ans plus tard et ses fils, Jacques et Julien, prennent le nom de La Faucherie en 1697. Jacques Cordon, écuyer, sieur,  devenu de la Faucherie en le 1er septembre 1627, épouse, en 1618, Yvonne de Vaufleury, doù : Gilles, né vers 1620, écuyer, seigneur de la Faucherie, sans alliance, Jean, né vers 1622, vivant en 1666, Etienne, né vers 1625, vivant en 1666, Jacques puis Jeanne qui épouse vers 1640-1650, Noël Duhamel de la Blanchère, sieur du Boisroussel, procureur à Mortain. Son deuxième fils Jacques de la Faucherie, écuyer, seigneur du manoir de la Faucherie, né vers 1637, épouse, à Mondeville le 4 octobre 1677, Jeanne Morin de Vauguerin, fille de Jacques (écuyer) et Barbe Le Petit, doù : Suzanne, épouse le 3 juillet 1707 Etienne Pitot, sieur de la Harie. Emmanuel, décédé en 1707, Françoise, née au Mesnillard le 8 mars 1682, mariée, au Mesnil-Gilbert le 5 mai 1704, avec Louis Jouaut, sieur de Gourgoux, né vers 1676, fils de Nicolas, sieur de Logerie, et de Jeanne Turpin, de Saint-Laurent de Cuves, Suzanne, épouse le 3 juillet 1707 Etienne Pitot, sieur de la Harie, fils de feu Julien et de Marie Le Boucher, de Tinchebray (Orne), et enfin Mathieu. Le nom de la Faucherie s'éteint en 1827, lors du mariage d'Eulalie de la Faucherie avec Armand du Mesnil. Transmis par les femmes, le Manoir de  la Faucherie reste dans la lignée familiale de Guillaume Cordon. Le Manoir de la Faucherie fut la demeure de l'historien Joseph de Robillard de Beaurepaire (1830-1906). propriétaire actuel la famille Rouquérol, manoir, monument historique, est une maison forte du XVI° siècle.","architecture":"FAUCHERIE; à l'origine, ancienne maison-forte du XVIe siècle à caractère défensif, avec meurtrières, et entourée de douves, disparues aujourdhui. c'est probablement lui qui fit construire le manoir actuel.   larrière du manoir a conservé son caractère austère, des transformations successives ont embelli la façade avec notamment les fenêtres agrandies, échauguette à colombages, balcon, corbeaux sous toiture. Sur la tour carrée, à larrière, on note trois latrines, une à chaque étage, disposées de façon décalée qui donnaient sur les douves.Le Manoir de la Faucherie est composé d'un corps de logis qui occupe le centre. Il est flanqué d'une grosse tour où se trouve logé l'escalier. Au corps du logis a été ajouté un bâtiment où l'on trouve la cuisine et qui est orné à l'angle Sud-Est, à la hauteur du premier étage, d'une échauguette. A l'extrémité opposée a été élevé un pavillon saillant, renfermant un petit salon et une chambre. Le manoir est inscrit aux M.H. depuis 1989. C'est un manoir privé, fermé au Public.","habitants":"Famille de Guillaume Cordon,\r\n        \"","divers":"A Mesnillard château de la Faucherie; GPS : 48° 37' 37,5\" Nord, 1° 05' 8,5\" Ouest","gps":"48° 37' 37,5\" Nord, 1° 05' 8,5\" Ouest","images":["../../jctruffet.com/image/image_50/50_Faucherie_1.jpg","../../jctruffet.com/image/image_50/50_Faucherie_2.jpg","../../jctruffet.com/image/image_50/50_Faucherie_3.jpg","../../jctruffet.com/image/image_50/50_Faucherie_4.jpg"]},"Consult_chateau_formulaireff41":{"id":"Consult_chateau_formulaireff41","dept":"50","canton":"Les Pieux","commune":"Flamanville","nom":"Flamanville","type":"Forteresse","periode":"XV-XVII","histoire":"FLAMANVILLE, la seigneurie est  acquise en 1406  de l'abbé mitré de Blanchelande par Colin de Bazan  venu d'Espagne au XIVe siècle. Guillaume de Bazan gentilhomme de la chambre du roi nommé baron par Henri IV, son fils Hervé épouse  en secondes noces en 1652 Agnès Molé petite fille du gardes des sceaux, fait construire au XVIIe siècle  pour Hervé Basan, sur les vestiges d'un ancien manoir seigneurial du XIe siècle. La seigneurie en 1610 érigée en baronnie. et en 1654 en marquisat  en 1666 mort de Hervé de Bazan laisse à Jean-René héritier au titre de marquis et lieutenant général des armées du roi, sans descendance mâle. Elisabeth Basan, en 1732 épouse Jean-Joseph  Lecomte de Nonant, marquis de Raray  Ce dernier mourut e à 27 ans le domaine passa a sa tante madame de Bruc , l'ami de Jean-Jacques Rousseau et la marquise de Bruc, héritière du château qu'elle parvient à préserver durant la Révolution et le légua en 1820   au marquis de Sesmaisons qui réaménage le parc dans un style anglais.  En 1888 passe à Charles Milcent, le gendre de ce dernier  le passa à André Rostand et  depuis 1986, la commune de Flamanville en devient propriétaire; entretien et restaure cet édifice du XVIIe siècle. Éléments protégés MH : le château en totalité : inscription par arrêté du 6 janvier 1930.                                                                                                            Manoir de BEL-AIR  transformé en hôtel restaurant par  monsieur Morel.","architecture":"FLAMANVILLE, Le château, l'édifice présente un plan et un ordonnancement symétrique qui accentue sa sévérité. Les différentes parties du bâtiment se développent sur la cour dhonneur autour dun pavillon central percé de nombreuses fenêtres et de lucarnes surmontées dun fronton triangulaire. Fortifié, flanqué de tours crénelées, les bâtiments et la grande cour d'honneur sont entourés de douves. Deux pavillons dentrée, dans laxe des galeries bordent une douve en eau. ensemble complexe de bâtiments, en granit gris de Flamanville, se présente sous la forme d'un corps de logis, flanqué de deux pavillons sur la cour d'honneur, qui a réemployé une tour de l'édifice primitif du XVe siècle, l'autre ayant été rapportée au XVIIIe siècle, ainsi que des pans de murs de l'ancienne maison forte. La façade principale est surplombée par un petit campanile avec le blason de la famille de Sesmaisons, propriétaires du château à partir de 1820. Dans la cour du manoir médiéval on peut encore voir un escalier qui permettait aux cavaliers de monter plus facilement à cheval.  Le château est entouré d'un parc de 24 hectares, de bois et d'étangs qui sont le cadre de nombreuses manifestations. 900 variétés de dahlias se prélassent en toute quiétude : dahlias cactus, dentelles, pompon, balle, fleurs anémone. Pour les néophytes, ce jardin est un émerveillement de tous les instants.","habitants":"Flamanville; Famille Basan\r\n        \"","divers":"Château de Flamanville  grav 1 à 4 et le manoir de Bel-air grav-5 GPS : 49° 31' 35,8\" Nord, 1° 52' 8\" Ouest","gps":"49° 31' 35,8\" Nord, 1° 52' 8\" Ouest","images":["../../jctruffet.com/image/image_50/50_Flamanville_1.jpg","../../jctruffet.com/image/image_50/50_Flamanville_2.jpg","../../jctruffet.com/image/image_50/50_Flamanville_3.jpg","../../jctruffet.com/image/image_50/50_Flamanville_4.jpg","../../jctruffet.com/image/image_50/50_Flamanville_5.jpg"]},"Consult_chateau_formulaireef17":{"id":"Consult_chateau_formulaireef17","dept":"50","canton":"La Hague","commune":"Flottemanville Bocage","nom":"Flottemanville_Urville","type":"Manoir","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article; Flottemanville, Hermenez et Urville.                                                                                                   FLOTTEMANVILLE, situé au cur de la presqu'île du Cotentin dans le bocage valognais, le château de Flottemanville offre charme, calme et présente une architecture intéressante. Construit au milieu du XIIIe siècle, il subit des transformations au XVe siècle avec la construction de la chapelle, les deux tours octogonales gothiques ainsi que la loggia du pur style Rennaissance italien, qui en fait son originalité. Tout comme le chevalier Bayard, venez profiter de ces lieux, chambres d'hôtes et gîtes.                                                                                      Au sud à deux K.M. URVILLE  construit par le seigneur local pas d'information historique. \r\nHERMENEZ, au château d'Hemevez, à Valognes, des vestiges sont encore visibles de loccupation allemande. Et chacun conserve la mémoire des sept parachutistes américains fusillés.","architecture":"FLOTTEMANVILLE, en plein bocage,  en pierre de Valognes. Elle a traversé le temps sans dommage et les transformations des XVIe et XVIIIe siècles ont scellé lharmonie de ce château particulier aux tours octogonales. La chambre Napoléon III souvre sur une ravissante loggia Renaissance italienne. L'atmosphère est romantique et l'accueil est dune grande cordialité. Cette belle demeure de Flottemanville, a été construite en pierre de Valognes.                                                                                                   URVILLE, le manoir date du tout début du XVIe siècle. Construit en pierre de taille blanche dans un style gothique flamboyant, les bâtiments en équerres occupent l'angle d'une cour fermée par d'importants bâtiments de communs. Le logis en L, est articulé autour d'une tourelle d'angle. Il s'éclaire par des fenêtres à meneaux. On accède à l'aile gauche par une porte en plein cintre, et on peut voir au rez-de-chaussée de ce bâtiment une fenêtre ornée d'accolades, et au-dessus, à l'étage une fenêtre à meneaux richement sculptée et surmontée au niveau des combles par une lucarne à double fenêtre.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Trois châteaux dans cet article; Flottemanville, Hermenez grav 1 et Urville grav 2-3-4    GPS : 49° 28' 28\" Nord, 1° 27' 19\" Ouest","gps":"49° 28' 28\" Nord, 1° 27' 19\" Ouest","images":["../../jctruffet.com/image/image_50/50_Flottemanville_Urville_1.jpg","../../jctruffet.com/image/image_50/50_Flottemanville_Urville_2.jpg","../../jctruffet.com/image/image_50/50_Flottemanville_Urville_3.jpg","../../jctruffet.com/image/image_50/50_Flottemanville_Urville_4.jpg"]},"Consult_chateau_formulaire44e5":{"id":"Consult_chateau_formulaire44e5","dept":"50","canton":"Valognes","commune":"St_Marcouf","nom":"Fontenay_St_Marcouf","type":"Château","periode":"XVIII","histoire":"FONTENAY, au décès de Richard Le Berceur, survenu le 27 juillet 1661, son fils aîné, Hervé Le Berceur, hérite des terres de Fontenay, le cadet, Guillaume, héritant du château de Courcy. C'est Henri Le Berseur (1677-1762), marquis de Fontenay, capitaine général de la capitainerie de la côte, et futur grand-bailli d'épée du Cotentin, qui en 1712, fera poser la première pierre du château. En 1762, à sa mort, le château est achevé. Ses parterres, ses pièces d'eau, sa riche cour d'honneur, en font le « Versailles du Cotentin ». Sans descendance, c'est sa nièce, Marie-Anne Le Berseur, qui porte le domaine dans la famille de Blangy, à la suite de son mariage, en 1752, avec Pierre-Marie-Maximilien Le Vicomte, marquis de Blangy (1718-1789}, dernier grand-bailli d'épée du Cotentin. Leur fils, Pierre-Henri-Marie Le Vicomte de Blangy (1756-1823), reprendra la succession de son père et reconstituera le patrimoine familial, dont les descendants continueront les embellissements. Il sera l'un des rares châteaux à être épargnés pendant la Révolution ; cependant, la Seconde Guerre mondiale lui sera fatale. Au milieu du XXe siècle il appartenait à la comtesse de Germiny.","architecture":"FONTENAY, le château de Fontenay se distingue par ses deux ailes basses à l'italienne; et possède un corps central marqué par quatre colonnes qui soutiennent le balcon, sa construction date du XVIIIe siècle.  Le château fut bombardé en 1944. Il reste un  parc dessiné par Le Notre, toujours entretenu. C'est Henri Le Berseur (1677  1762), marquis de Fontenay, capitaine général de la capitainerie de la côte, et futur grand-bailli d'épée du Cotentin, qui en 1712, fera poser la première pierre du château. En 1762, à sa mort, le château est achevé. Ses parterres, ses pièces d'eau, sa riche cour d'honneur, en font le « Versailles du Cotentin ».  Le château avant sa destruction se présentait sous la forme d'un corps de logis haut d'un étage sur rez-de-chaussée, surmonté d'un étage de combles. Deux pavillons bas le flanquait de part et d'autre. Un escalier permettait d'accéder à la porte d'entrée encadrée par 4 colonnes à chapiteaux, supportant un balcon.","habitants":"Famille de Berceur et Famille de Blangy\r\n        \r\n        \"","divers":"château de Fontenay à st Marcouf; GPS : 49° 28' 38\" Nord, 1° 19' 11\" Ouest","gps":"49° 28' 38\" Nord, 1° 19' 11\" Ouest","images":["../../jctruffet.com/image/image_50/50_Fontenay_St_Marcouf_1.jpg","../../jctruffet.com/image/image_50/50_Fontenay_St_Marcouf_2.jpg"]},"Consult_chateau_formulaire8cb4":{"id":"Consult_chateau_formulaire8cb4","dept":"50","canton":"Valognes","commune":"Fontenay-sur-Mer","nom":"Fontenay_sur_Mer","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article, Courcy et Francville.                       COURCY, en 1532 appartenait à la famille Le Berseur,  Hervé et Guillaume  en hérite, à la mort de leur père  en 1611, le cadet, Guillaume Le Berseur hérita du manoir de Courcy. L'aîné, Hervé Le Berseur, recevait les terres de Fontenay sises à Saint-Marcouf. Vers 1653, Guillaume reconstruisit l'antique demeure, comme latteste une pierre portant cette date. Le château passe entre les mains de la famille Hellouin, à la suite du mariage de la fille de Guillaume avec Nicolas Hellouin, trésorier de France, à Caen. Au XVIIe siècle, sous le règne de Louis XV, Henri-Auguste Hellouin, marquis de Courcy, nommé en 1753, commandant des troupes royales en Corse, promu, en 1780, lieutenant général des
