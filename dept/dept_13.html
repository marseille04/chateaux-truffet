rseille  le manoir qui fut construit était au XVIe siècle, maison de campagne des évêques de Marseille, mais en 1567 Mgr Ragueneau dut vendre la seigneurie pour payer la cote part imposé par Charles IX,  le domaine acheté par la famille Beausset jusqu'en 1812 puis par le général Mathieu de Gardanne toujours dans la descendance. Le village a été crée au VIIe siècle qui deviendra le refuge  le l'Antique Portos  Carsicis entre le V et le XIIe siècle, une forteresse avec remparts fut construite.  En 1402 à Brantes au pied du Ventoux, en présence de son épouse Alix de Baux Oddon de Villars fit donation à son neveu Philippe de Levis de différents  fiefs  dont Roquefort, le Castellet,  Cassis et Port-Miou dépendances de la baronnie d'Aubagne.                            Roquefort fit partie de la seigneurie des Baux jusqu'en 1426 puis des évêques de Marseille en 1474 et a la famille d'Albertas . En 1505 passa au marquis de Villeneuve chevalier du baron de Trans devient marquis  et prend possession du château de Roquefort il n'y mit jamais les pieds dans ce château seul sa descendance qui épousa au château demoiselle du Beausset  en 1665 mais le château commençait a tomber en ruine malgré cela les Villeneuve développeront la viticulture  et les fours à Chaux. La commune est constitué en 1789 avec le fief des Julhans (voir article), le château de Barbanau domaine viticole de Cerciello et Simonini.","architecture":"Roquefort la Bedoule; Ruines du château des sires des Baux du XIIIe siècle,  ruines également de l'ancien  village du X au XIIe siècle dont  il ne reste que quelques vestiges.","habitants":"famille d'Albertas\r\n        \"","divers":"Vestiges du château de Roquefort la Bédoule, château de Barbanau","gps":"","images":["../../jctruffet.com/image/image_13/13_Roquefort_Bedoule_1.jpg","../../jctruffet.com/image/image_13/13_Roquefort_Bedoule_2.jpg","../../jctruffet.com/image/image_13/13_Roquefort_Bedoule_3.jpg","../../jctruffet.com/image/image_13/13_Roquefort_Bedoule_4.jpg","../../jctruffet.com/image/image_13/13_Roquefort_Bedoule_5.jpg"]},"Consult_chateau_formulaire10c0":{"id":"Consult_chateau_formulaire10c0","dept":"13","canton":"Eyguières","commune":"Eyguières","nom":"Roquemartine_Eyguieres","type":"Vestiges","periode":"XII","histoire":"ROQUEMARTINE; Au XIVe siècle sur la colline à deux kilomètres d'Eyguières, le \"castellas\" de la reine Jeanne des comtes de Provence, passa à la famille d'Albe de Roquemartine.                 Au XIV et XVe siècle aux sire d'Albe de Roquemartine.                            EYGUIERES; Au cours du XIIIe siècle Geril seigneur d'Eyguières prit le partie des seigneurs des Baux contre le comte de Provence,  pour cela il fut dépossédé de son fief.                                                Le château et les fortifications furent endommagés. Plus tard Jaume d'Eyguières  en 1384 se fit remarquer au pillage de Roquemartine et de son château, il eu la tête tranchée en place d'armes le sept septembre 1385. Eyguières fut marqué par les  guerres de religion,  la seigneurie donné en 1416 à Jean de Sade  par le comte de Provence Louis II pour service rendu notamment pour son rôle de président, Balthazar de Sade avec Anne Hugolin, dont Guillaume qui mena une lutte sans merci contre les religionnaires,  ses exactions furent telles que le parlement de Grenoble le condamna à mort  il fut sauvé par l'édit de Nantes La famille de Sade a marqué l'histoire pendant quatorze générations.  En 1672 le domaine élevé en marquisat passe à la famille  Bennecorse de  Lubières  dont les héritiers occupèrent la demeure seigneuriale dit le château des \"Grimaldi\", des vestiges encore visibles.","architecture":"Roquemartine à Eyguières sur la falaise dénudée à 2 Kilomètres d'Eyguières le castellas premier château du Xe siècle des sires d'Albe de Roquemartine considérait comme un lieu agréable rappelle le château des Baux.","habitants":"la reine Jeanne \r\n        \"","divers":"Vestiges du château de Roquemartine","gps":"","images":["../../jctruffet.com/image/image_13/13_Roquemartine_Eyguieres_1.jpg","../../jctruffet.com/image/image_13/13_Roquemartine_Eyguieres_2.jpg","../../jctruffet.com/image/image_13/13_Roquemartine_Eyguieres_3.jpg","../../jctruffet.com/image/image_13/13_Roquemartine_Eyguieres_4.jpg","../../jctruffet.com/image/image_13/13_Roquemartine_Eyguieres_5.jpg","../../jctruffet.com/image/image_13/13_Roquemartine_Eyguieres_6.jpg"]},"Consult_chateau_formulairef129":{"id":"Consult_chateau_formulairef129","dept":"13","canton":"St-Rémy-de-Provence","commune":"St-Rémy-de-Provence","nom":"Roussan","type":"Château","periode":"XVIII","histoire":"ROUSSAN;  Propriété de Bertrand de Nostradamus capitaine  chevalier  au XIVe siècle, fit faire d'importants travaux sur une bâtisse \"le mas de Roussan\"  de 1558 à 1596. En 1606 son petit fils confia à un cousin éloigné \"Melchior Jacques de Joannis de Nochère\" puis par héritage passa  de Diane de Joannis de Roussan   (amie de madame de Sévigné) en 1701 à Jean-Antoine de Servan de Tarascon,  puis à son neveu ou il voulut avec son épouse dame Dupoirier digne et noble dame qui consacra sa vie aux pauvres et aux malades de Saint-Rémy de Provence.  En 1848 la famille Bouchand de Bussy remania la bâtisse  et fut vendu à la famille Roussel qui l'on transformé en hôtel restaurant actuellement.","architecture":"Roussan; mas remanié au fils des ans, bâtisse carrée à trois niveaux avec fronton en façade.  Belle serre ornementale dans le parc.","habitants":"Monsieur Bertrand de Nostradamus\r\n        \"","divers":"Château de Roussan","gps":"","images":["../../jctruffet.com/image/image_13/13_Roussan_1.jpg","../../jctruffet.com/image/image_13/13_Roussan_2.jpg"]},"Consult_chateau_formulaire266c-2":{"id":"Consult_chateau_formulaire266c-2","dept":"13","canton":"Aix-en-Provence","commune":"Puyricard","nom":"Seuil","type":"Château","periode":"XVII","histoire":"SEUIL; construit par Antoine de Michaelis puissante famille  au XVIIe siècle conseiller du roi à la cour des comptes et des  finances et procureur du pays d'Aix, le domaine passa  à la famille Carreau de Gaschereau famille de Juristes et membre du conseil souverain de la Martinique depuis le début du XVIIIe siècle jusqu'en 1858; ce domaine aujourd'hui  est transformé en chambres d'hôtes.","architecture":"Seuil; Au pied de la Trévaresse  le château est une ancienne bastide importante transformée en 1660 à deux niveaux en forme de U, deux tours rondes en façade dont la porte est entouré dans l'encadrement d'un fronton brisé frappé aux armes des Michaelis.","habitants":"famille Carreau de Gaschereau\r\n        \"","divers":"Château de Seuil","gps":"","images":["../../jctruffet.com/image/image_13/13_Seuil_1.jpg","../../jctruffet.com/image/image_13/13_Seuil_2.jpg"]},"Consult_chateau_formulaire6e18-2":{"id":"Consult_chateau_formulaire6e18-2","dept":"13","canton":"Orgon","commune":"St-Andiol","nom":"St_Andiol","type":"Château","periode":"XVI","histoire":"SAINT-ANDIOL; le seigneur Albe de Roquemartine  reçoit le fief de l'archevêque d'Arles  le territoire de Saint-Andiol, le Ier octobre 1225 les moines et les abbayes ne pouvant plus protéger  leurs biens et la population. C'est donc cette famille d'Albe qui construira le château à la fin du XIVe siècle début XVe siècle. Ce fief passera par alliance à la famille Varadier qui élèvera la seigneurie au rang de marquisat, le 26 Juin 1514 Jérome qui n'est pas encore seigneur achète à Saint-Vincent une maison avec cour il s'agit de l'actuelle mairie, elle fut ensuite habité par son frère Etienne, racheté par Monsieur Villard en 1650 pour en faire un relais de poste ou de nombreuses personnalités y passèrent des nuits tel que la souverain pontif Pie VII en 1812 et le maréchal Brune en 1815. Le  château  passera par alliance à la famille d'Estourmel qui remaniera à l'aspect actuel.   Aujourd'hui centre socioculturel ( bibliothèque  municipale et salle des fêtes.) Au sud de Saint-Andiol le château de St-Estéve transformé en hôtel restaurant.","architecture":"Saint-Andiol; château  du XIVe siècle remanié au cours des siècles, à trois niveaux, fronton plein cintre en façade avec escalier en fer à cheval et tour carrée à l'arrière, hôtel Varadier  du XVe siècle actuellement hôtel de Ville.","habitants":"Famille Varadier \r\n        \"","divers":"Château de St-Andiol","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Andiol_1.jpg","../../jctruffet.com/image/image_13/13_St_Andiol_2.jpg","../../jctruffet.com/image/image_13/13_St_Andiol_3.jpg"]},"Consult_chateau_formulairee55b":{"id":"Consult_chateau_formulairee55b","dept":"13","canton":"Marseille","commune":"Marseille","nom":"St_Antoine_Marseille","type":"Château","periode":"XV","histoire":"Saint-ANTOINE; ce château signalé par la famille de Marcel Pagnol lors du tournage du film le \"château de ma mère\"  raconte que sa famille traversait régulièrement le parc pour allait à la Treille.         Ce château a été acheté en 1762 par Joseph Isoard ainsi que le château de la Minarde  à la Barasse.  En 1792 Jean-Baptiste  Isoard héritier avocat  remanie le château est le nomme La Rousse.  En 1842 Louis d'Alayer de Castemore achète le domaine, en 1867 François Philippe rachète à son tour et le revend à Monsieur Joseph Blanc en 1894.  Il appartient en 1908 au comte Guy de Robien et il y fait rajouter deux ailes et le renomme Saint-Antoine, passera pour une dizaine d'année de 1921 à 1931 à monsieur Xaxier Fine homme d'affaire puis racheté par la société d'électrochimie de la Barasse pour loger ses employés et après la fermeture de l'usine en 1958 le château est racheté par la ville de Marseille,  aujourd'hui il serait à l'abandon  malgré son inscription au M-H en 1967 quel est son avenir, l'association Saint-Antoine se mobilise pour la sauvegarde.","architecture":"St-Antoine; Dans la plaine de l'Huveaune  ce château est composé d'un corps de logis rectangulaire à trois niveaux accolé d'une tour  rectangulaire en retrait à quatre niveaux fronton en calotte et pavillon à deux niveaux en saillit à l'opposé l'ensemble à toits plats.","habitants":"Joseph Isoard\r\n        \"","divers":"Château Saint-Antoine","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Antoine_Marseille_1.jpg","../../jctruffet.com/image/image_13/13_St_Antoine_Marseille_2.jpg","../../jctruffet.com/image/image_13/13_St_Antoine_Marseille_3.jpg"]},"Consult_chateau_formulairee499":{"id":"Consult_chateau_formulairee499","dept":"13","canton":"Lambesc","commune":"St-Cannat","nom":"St_Cannat","type":"Vestiges","periode":"XIII","histoire":"ST-CANNAT; Au XIIe siècle propriété de l'archevêque Pierre  Castrini-Santi-Cannati, un siècle plus tard rébellion des villageois contre leur archevêques  et se tourne vers le baron  des Baux de Provence, puis vers le roi de Sicile    (Frédéric III d'Aragon et éventuellement Louis XIII).   Les Templiers s'installent sur les lieux et dans le château de Montauronne du XIIIe siècle qui sera transformé en 1845 en ferme modèle d'enseignement agricole. Dans la commune le château de Beaupré propriété du baron Double depuis quatre générations, la famille  connu sous le nom Double de Saint-Lambert anobli au XIVe siècle originaire de l'Ile de France, était,  au départ armateurs  s'installèrent à Saint-Cannat dans le relais à chevaux qui est devenu le château de Beaupré ont eu dans leur famille  des personnalités tel que Vital Double secrétaire de François Ier, Joseph et Portal en 1832 à l'académie de médecine, Léopold né en 1812  collectionneur de renom,  en 1890 le baron Emile arrière grand-père du propriétaire actuel à planté les premiers plans de vigne devenu vignoble de renom.","architecture":"Saint-Cannat: Ruines du château des évêques de Marseille du XII e et XVIe siècle. Beaupré de plan rectangulaire à deux niveaux avec attiques.","habitants":"Baron  des Baux de Provence\r\n        \"","divers":"Château des bailly de Suffren","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Cannat_1.jpg","../../jctruffet.com/image/image_13/13_St_Cannat_2.jpg"]},"Consult_chateau_formulaire978b":{"id":"Consult_chateau_formulaire978b","dept":"13","canton":"Istres","commune":"St-Chamas","nom":"St_Chamas","type":"Vestiges","periode":"XII-XV","histoire":"ST-CHAMAS; Le village est divisé en deux parties par une colline percée de grottes qui servirent d'habitats troglodytiques.  Boson le comte de Provence cède le fief au Xe siècle aux archevêques d'Arles dont Ithier possédait le château et les vestiges  de Sanctus-Amantius.  Au XVe siècle s'élevait sur le mont du Baou  un château qui a cette époque était encore très habitable pour recevoir en 1564 Catherine de Médicis et le jeune roi de France Charles IX âgé de 14 ans accompagné du duc d'Anjou le futur Henri III  le duc d'Alençon petit cousin du duc de Navarre le futur Henry IV.","architecture":"St-Chamas; il  reste plus des vestiges Gréco-Romain que des vestiges  du XVe siècle;  oppidum, aqueduc de Roquefaron, pont Flavien du I er siècle avant J.C à arche unique ( 21,40 x 6,20m ) est une place forte dont   il reste des vestiges des murailles médiévales dont une  porte sur le mont du Baou et des vestiges de fortifications.","habitants":"archevêques d'Arles\r\n        \"","divers":"Vestiges du château de Saint-Chamas et arches du pont Flavien sur la Touloubre","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Chamas_1.jpg","../../jctruffet.com/image/image_13/13_St_Chamas_2.jpg","../../jctruffet.com/image/image_13/13_St_Chamas_3.jpg"]},"Consult_chateau_formulaire8a6d":{"id":"Consult_chateau_formulaire8a6d","dept":"13","canton":"Arles","commune":"St-Martin-de-Craux","nom":"St_Martin_de_Craux","type":"Château","periode":"XV","histoire":"ST MARTIN de CRAUX; Apparaît dans l'histoire au XIIe siècle  avec un bourg fortifié qui dépendait des seigneurs d'Arles et des seigneurs des Baux. En 1355 Raymond VII comte de Toulouse  envahit la Camargue et pousse les habitants à l'extérieur,  village abandonné de ses habitants pendant un siècle. Le retour commença à la renaissance en 1438 possession des chapitres les Fachiers (Chanoines), en 1713 arriva de nombreux émigrés italiens et espagnols pour l'usine d'explosif \"la dynamite\" qui se développa à l'occasion de la première guerre mondiale, elle eu malheureusement une grosse perte par une explosion qui détruit une partie de l'usine.                                                                          Dans la commune plusieurs châteaux; château de Vergière qui fut transformé en hôtel restaurant par la famille Pincède, château Villepail avec beau jardin  et château de la Laure.","architecture":"St-Martin de Crau;  Château de Vergières demeure du XVIIIe siècle à deux niveaux  fronton central en façade, attique avec ouverture en oeil de buf et pavillons saillants sur les extrémités. Château de Laure  et de Villepail.","habitants":"les Fachiers \r\n        \"","divers":"Château de Vergières et de Laure.","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Martin_de_Craux_1.jpg","../../jctruffet.com/image/image_13/13_St_Martin_de_Craux_2.jpg"]},"Consult_chateau_formulaire1591-2":{"id":"Consult_chateau_formulaire1591-2","dept":"13","canton":"Istres","commune":"St-Mitre-les-Remparts","nom":"St_Mitre_les_Remparts","type":"Vestiges","periode":"XII","histoire":"ST-MITRE; Cité au IXe siècle, fort de Saint-Mitre qui fut transformé en forteresse au XIIe siècle par les archevêques d'Arles. En 1395 pillé par les brigands menés par le seigneur des Baux,  Raymond de Turenne qui dévasta Saint-Blaise, les habitants abandonnèrent leur site pour se réfugier à Saint-Mitre durent agrandir le château et le fortifier par de nouveaux remparts de 12 mètres de haut, mais au fils du temps, il ne reste aujourd'hui que quelques vestiges de remparts,  porte nord dit ( porte d'Istres)  porte sud dit de ( Martigues) et maison du consul de 1654 adossée aux remparts. En 1457  l'archevêque d'Arles  cède ses droits au roi René d'Anjou.","architecture":"St-Mitre les Remparts, situé sur un éperon rocheux, le village du IVe siècle  à conservé ses remparts du XVe siècle et de nombreux hôtels particuliers du XVe et XVIe siècle et le site Saint-Blaise ou un premier rempart grossier  entoure la ville aujourd'hui lieu de fouilles archéologiques.","habitants":"archevêque d'Arles\r\n        \"","divers":"Remparts de St-Mitre","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Mitre_les_Remparts_1.jpg","../../jctruffet.com/image/image_13/13_St_Mitre_les_Remparts_2.jpg","../../jctruffet.com/image/image_13/13_St_Mitre_les_Remparts_3.jpg","../../jctruffet.com/image/image_13/13_St_Mitre_les_Remparts_4.jpg","../../jctruffet.com/image/image_13/13_St_Mitre_les_Remparts_5.jpg"]},"Consult_chateau_formulaire1335":{"id":"Consult_chateau_formulaire1335","dept":"13","canton":"Peyrolles-en-Provence","commune":"St-Paul-les-Durance","nom":"St_Paul_les_Durance","type":"Château","periode":"XV","histoire":"SAINT-PAUL-les-Durance;  nommé Saint-Paul de Fougassier;  Le fief dépendait de l'abbaye de Saint-André les Avignon, jusqu'au XIVe siècle, un brigand  nommé Cadelet des Amenés en prit possession, reprit par sieur Perissol, à la mort de ce dernier le fief  tombe dans le domaine royal et est inféodé en 1340 par la reine Jeanne à Raymond d'Agoult comte de Sault qui conserveront le domaine jusqu'en 1576,  par successions et alliances passe aux familles de Cabre, érigeait en marquisat passa aux  de Thomassin, de Valori et en 1921 à Anne-Marie-Josephine-Françoise-Gabrielle Bosset Roquefort duchesse d'Arbaud de Hamède  qui cette dernière vendit le château à la commune qui en a fait la mairie.","architecture":"Saint-Paul les Durance; bâtiment imposant rectangulaire avec donjon saillant et tourelle carrée en angle intérieur, porte d'entrée avec bretèches.","habitants":"Raymond d'Agoult\r\n        \"","divers":"Château de St-Paul les Durance","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Paul_les_Durance_1.jpg","../../jctruffet.com/image/image_13/13_St_Paul_les_Durance_2.jpg","../../jctruffet.com/image/image_13/13_St_Paul_les_Durance_3.jpg","../../jctruffet.com/image/image_13/13_St_Paul_les_Durance_4.jpg","../../jctruffet.com/image/image_13/13_St_Paul_les_Durance_5.jpg","../../jctruffet.com/image/image_13/13_St_Paul_les_Durance_6.jpg"]},"Consult_chateau_formulaire3376":{"id":"Consult_chateau_formulaire3376","dept":"13","canton":"Arles","commune":"St-Rémy-de-Provence","nom":"St_Remy_de_Provence","type":"Vestiges","periode":"V-X","histoire":"ST-REMY; Au pied des Alpilles, ville du IIIe siècle avant JC antique de Glanum. Un riche patrimoine témoigne l'âge de fer gréco-romain par l'antique Glanum construit au VIe siècle avant J-C, monuments et fouilles archéologiques, le mausolée de Jules  bâti vers 30 avant J-C et l'arc de triomphe et musée.  Lors  de la seconde partie de l'âge de fer au VII-VI avant J-C un castrum fut construit, au Xe siècle un fort dit de Romanin fut occupé par les Maures puis au Moyen-Age sous la dynastie Carolin, fief de l'abbaye de Saint-André de Villeneuve les Avignon vers 1200 un château fut construit par la confrérie \"l'oeuvre du pont \"  et c'est par alliance que Raymond de Gaudelme devient seigneur de Romanin en 1203 en épousant Estéphanette de Gaudelme.   Dans ce château  la reine de France Marie de Blois y séjourna ainsi que d'autres personnalités importantes tel que Frédéric de Barberousse, pendant cent cinquante ans une belle  vie  s'y déroula.                            Révolte des habitants lors du passage de Charles II, puis à Louis II d'Anjou, en 1480 au comté de Provence qui se rattache à la France, en 1643 Louis XIII fait don de la ville aux Grimaldi pour prix de son alliance la gardera jusqu'à la Révolution.                            Les ALPILLES; Du mas des Gaillard au château des Alpilles l'histoire traverse des siècles est a appartenu à un chevalier au XIIIe siècle. La famille des Fléchon au XVIe siècle ensuite à Charles Gaillard au XVIIe siècle, la famille Blain un siècle plus tard en 1825 Pierre Paul Blain fit construire la maison de maître appelé château. Il reçurent Amédée Pichot Gruzot, Lamartine, Thiers etc.  La famille Bon l'acquière en 1979 qui le restaure avec sa fille pour en faire un hôtel restaurant de luxe.","architecture":"St-Rémy de Provence; dans la vieille ville comme vestiges, l'enceinte circulaire, il reste les remparts  du XIVe siècle qui à l'origine avait quatorze portes, porte et maison natale de Nostradamus, ruines du Castellas du Romanin médiéval, ruines du château de Lagoy XVIIIe siècle ( voir article), la collégiale St-Martin, les hôtels d'Almeran-Maillane, Mistal de Mondragon, hôtel de Sade et Lagoy.                                                                                Le Glanum et les antiques (arc triomphal), le mausolée des Jules, monuments funéraires le plus conservé au monde romain.                         Dans les environs de la commune la tour Cardinal, maison forte du XVIe siècle, le château Pirredon ancienne abbaye, le château Roussan XVIIIe siècle (voir article) et le château des Alpilles du XIXe siècle.","habitants":"Raymond de Gaudelme\r\n        \"","divers":"Des Romains; Glanum, arc triumphal, et mausolée, remparts dans ville, tour et château de Roussan etc","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_1.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_2.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_3.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_4.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_5.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_6.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_7.jpg","../../jctruffet.com/image/image_13/13_St_Remy_de_Provence_8.jpg"]},"Consult_chateau_formulaire3247":{"id":"Consult_chateau_formulaire3247","dept":"13","canton":"Roquevaire","commune":"Peypin","nom":"St_Savournin_Peypin","type":"Vestiges","periode":"XII","histoire":"ST-SAVOURNIN; Au Moyen-Age, dépendait de l'abbaye de Saint-Victor qui érige une église en prieuré, les archevêques d'Arles cédèrent les terres  de l'abbaye au XIIe siècle aux seigneurs d'Auriol, en 1553 le sénéchal de Marseille Baltazar  Catin, vassal achète les droits des seigneurs d'Auriol en 1567. Le domaine est vendu aux seigneurs de Cabriès,  en 1755 la seigneurie passe aux seigneurs de Fuveau puis à la famille de Villiers.    Entre 1803 et 1830  la comtesse Jacops d'Aigremont originaire d'Anvers  finança la ville pour remembrer ces propriétés, en 1993 le comte d'Aigremont habite toujours la commune en plus possède un domaine sur la commune d'Allauch. Du château de Montespin de 1715 il fut détruit en 1977 reste de ruines.                                            PEYPIN; Au XIIe siècle le seigneur d'Auriol Pierre Bremont fit construire le château  ceci créa des conflits avec l'abbaye de Saint-Victor, sa descendance les Esparron en conservent les droits  jusqu'au début du XVe siècle et le château fut détruit à la fin du XVIe siècle par le duc d'Epernon.                                                      Dans la commune le château de Valdonne reconstruit au XVIIe siècle certainement par la famille de Léon Gérin-Ricard au hameau de Saint-Savournin, ce château aujourd'hui racheté par le groupe Perottino en 2010 pour une résidence hôtelière de George Perottino maire de Cadolive.","architecture":"St-Savournin; Le castellas qui était construit de 1045 à 1138 sur les hauteurs du village contre le flan massif de l'étoile fut détruit par la ligue en 1576 à 1593, il ne reste peu de vestiges.  Le deuxième château probablement construit après la destruction du Castellas  début XVIIe siècle le troisième château date du XVIIe siècle comprenant quatre tours englobant une cour intérieure , il était situé à l'entrée du village.                                                                       Peypin. Vestiges importants du castellas féodal du XIIIe siècle dominant le village.                                                                       Le château de Valdonne, bâtisse rectangulaire à deux niveaux  du XVIIe siècle.","habitants":"Auriol Pierre Bremont                                                          \r\ncomtesse Jacops d'Aigremont\r\n        \"","divers":"Vestiges du château de Saint-Savournin et château de Valdonne;","gps":"","images":["../../jctruffet.com/image/image_13/13_St_Savournin_Peypin_1.jpg","../../jctruffet.com/image/image_13/13_St_Savournin_Peypin_2.jpg","../../jctruffet.com/image/image_13/13_St_Savournin_Peypin_3.jpg","../../jctruffet.com/image/image_13/13_St_Savournin_Peypin_4.jpg","../../jctruffet.com/image/image_13/13_St_Savournin_Peypin_5.jpg"]},"Consult_chateau_formulairee383":{"id":"Consult_chateau_formulairee383","dept":"13","canton":"Tarascon","commune":"Tarascon","nom":"Tarascon","type":"Château","periode":"XV","histoire":"TARASCON; Dés le XIIIe siècle le fief appartenait aux comtes de Provence par Charles Ier d'Anjou, en 1380 passe à  Louis Ier d'Anjou  fils de la reine Jeanne   comtesse d'Anjou et  reine de Naples,  puis en 1400  Louis II d'Anjou roi de Naples, de Sicile, de Jérusalem,  comte du Maine et de Provence qui entreprend la construction du nouveau château que termina, le roi René Ier le Bon (1409-1480) duc d'Anjou comte de Provence roi détrôné de Naples, en hérite du duc d'Anjou ou il séjourna de 1447 à 1449 et y fait retour en 1470 jusqu'à la fin de sa vie en 1480 ou il y tint une cour la plus brillante d'Europe,  à la mort du roi René Charles du Maine en hérita; lors du passage de la Provence au royaume de France . François Ier y passa en 1516, Charles IX en 1564 et Richelieu y séjourna en 1642. Le château fut transformé en prison, il accueillera dans ses cellules Cinq Mars compagnon de Louis XIII et son complice de Thou. Ce château est acheté par l'état en 1926.           Dans la commune au Nord, le château Sausse, le château Gaillard, au Sud le château Goblet avec portail du XVIIe siècle et le château du Grand Castellet. A Tarascon hôtel de ville  du XVe siècle à fenêtres à meneaux.","architecture":"Tarascon; Sur le bord du Rhône, en 1400 commença la construction de la forteresse gothique sur les bases d'une forteresse qui fut détruite par Du Guesclin en 1368 entouré d'un fossé, énorme bâtisse quadrilatère avec architecture défensive haut de 48 mètres, trois tours carrées sont reliées par des courtines à deux tours rondes avec terrasse. Reste de vestiges de remparts comprenant porte Saint-Jean du XVIIIe siècle portes de Jarnéques du XVIe siècle et de la Condamine du XIVe siècle et vestiges de la tour Gabriel.","habitants":"Roi-René\r\n        \"","divers":"Château du roi René à Tarascon","gps":"","images":["../../jctruffet.com/image/image_13/13_Tarascon_1.jpg","../../jctruffet.com/image/image_13/13_Tarascon_2.jpg","../../jctruffet.com/image/image_13/13_Tarascon_3.jpg","../../jctruffet.com/image/image_13/13_Tarascon_4.jpg","../../jctruffet.com/image/image_13/13_Tarascon_5.jpg","../../jctruffet.com/image/image_13/13_Tarascon_6.jpg","../../jctruffet.com/image/image_13/13_Tarascon_7.jpg","../../jctruffet.com/image/image_13/13_Tarascon_8.jpg","../../jctruffet.com/image/image_13/13_Tarascon_9.jpg"]},"Consult_chateau_formulaire37f3":{"id":"Consult_chateau_formulaire37f3","dept":"13","canton":"Aix-en-Provence","commune":"Le Tholonet","nom":"Tholonet","type":"Château","periode":"XVII","histoire":"Le THOLONET; Fut la propriété des archevêques d'Aix, puis des de Jarente, des Albertas et à partir de 1637 des Gallifet, Alexandre de Gallifet seigneur du Tholonet et président au parlement d'Aix. Sa descendance  gardera deux cent cinquante ans, qui cette dernière avait acquis des propriétés sur l'île de St-Dommingue (Haïti) assurèrent de bons revenus pour mener un bon train de vie,  à la Révolution Louis François de Gallifet  émigre en Italie, le domaine vendu comme bien national en 1795. Racheta à son retour en 1802, il sera maire du Tholonet en 1808, jusqu'à l'événement de Louis Philippe, son petit-fils le célèbre général de Gallifet délaisse le Tholonet  trés occupé par sa carrière militaire cède le domaine à sa soeur Madame  d'Imécourt et en 1887 le vend à un industriel marseillais qui le restaure et le revend en 1913 à la famille Bovis et en  1959 appartient à la compagnie du canal de Provence qui en fait son siège.                                                                                   Aujourd'hui une école professionnelle.","architecture":"Tholonet; au pied de la montagne de la Sainte-Victoire, en 1642  construction de style à l'italienne de la demeure de plaisance, corps de logis central à trois niveaux accolé de deux pavillons à  deux étages toits plats,  deux ailes en retour d'équerre, dont une à disparu au XIXe siècle lors d'un incendie, malheureusement incendié à nouveaux dernièrement et reconstruit aussitôt.","habitants":"Alexandre de Gallifet \r\n        \"","divers":"Château du Tholonet","gps":"","images":["../../jctruffet.com/image/image_13/13_Tholonet_1.jpg","../../jctruffet.com/image/image_13/13_Tholonet_2.jpg","../../jctruffet.com/image/image_13/13_Tholonet_3.jpg"]},"Consult_chateau_formulairee65f-2":{"id":"Consult_chateau_formulairee65f-2","dept":"13","canton":"Trests","commune":"Trests","nom":"Trests","type":"Vestiges","periode":"X","histoire":"TRESTS: Cité au Xe siècle, le roi de Bourgogne-Provence Conrad dit le Pacifique  ( 937-993 ) donne le fief de Trests à un de ses proches Arlulf fils du comte de Vienne, les descendants  deviennent vicomtes de Marseille  et construisirent des fortifications autour du castrum  de Saint-Michel (château des Arlulf).  Au XII et XIIIe siècle une branche de la famille vicomtale  construisit les premiers bâtiments du château qui sera remanié à plusieurs reprises en forteresse militaire la plus importante de la vallée de l'Arc au Moyen-Age.     Au XIIIe siècle passa au seigneur Burgondion d'Algoult.  A partir du XVIe siècle période de déclin, le château d'Arlulf fut abandonné par ses seigneurs.                        En 1536 l'empereur  Charles Quint  ravage la Provence et endommage le château, c'est le sac de Trests \"Rassacapi de très\" et de nouveau assiégés  pendant les guerres de religion en 1590 par le seigneur d'Ampus libéré par le seigneur  de Carcés catholique  ( bataille de Peynier nuit du 29 juillet 1590 ).                     Au XVIe siècle les derniers descendants des vicomtes de Marseille vend la baronnie de Trests à Christophe de Foresta médecin du roi jusqu'au début du XVIIe siècle plusieurs seigneurs se partagent les droits sur Trests, les Foresta, les de Covet.                                    Dans la commune le château Coussin qui doit son nom à Jean Baptiste  Coussin, à  l'origine à la famille Sumière qui s'était installé dans la région en 1238 dont Gabriel Sumière thèse de doctorat à l'université d'Aix faisait parti de la noblesse, fit transaction en 1554 entre Honoré Sumière et les barons de Trests  qui ses derniers transmettent le domaine au Coussin, ancien propriétaire et avocat à la cour d'Aix il fut acheté en 1903  par Jean-Baptiste Gautier le domaine toujours dans la descendance.","architecture":"Trests. Forteresse militaire  construite au XIIIe siècle remanié en château au XVe siècle et les remparts de la ville au XIVe siècle avec des portes qui s'ouvrent dans des cours carrées du XIVe siècle, l'ensemble fut plusieurs fois remanié au cours des siècles suivants, le château possède encore des mâchicoulis, des archères et une couronne de plateforme crénelée, il ne reste que quatre tours sur les huit  et le portail de Saint-Jean, de Pourières, Puyloubier et la Clastre ont été démoli au XIXe siècle, une partie du fossé est encore visible.","habitants":"Famille d'Arlulf\r\n        \"","divers":"Château  et remparts de Trests, château de Coussin et de Ferry-Lacombe","gps":"","images":["../../jctruffet.com/image/image_13/13_Trests_1.jpg","../../jctruffet.com/image/image_13/13_Trests_2.jpg","../../jctruffet.com/image/image_13/13_Trests_3.jpg","../../jctruffet.com/image/image_13/13_Trests_4.jpg","../../jctruffet.com/image/image_13/13_Trests_5.jpg","../../jctruffet.com/image/image_13/13_Trests_6.jpg","../../jctruffet.com/image/image_13/13_Trests_7.jpg","../../jctruffet.com/image/image_13/13_Trests_8.jpg"]},"Consult_chateau_formulairefe50":{"id":"Consult_chateau_formulairefe50","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Valmante","type":"Château","periode":"XVIII","histoire":"VALMANTE; Joseph Grandval industriel marseillais surnommé \"le roi du sucre\" entreprend dans la banlieue de Marseille la construction en 1855 du château du Redon son nom de l'époque, malheureusement ce dernier décède en 1872, de ses enfants seul  Alphonse président de la chambre de commerce, et en 1893 le domaine est vendu à Louis Mante fils naturel d'un armateur Marseillais Victor Régis, Louis épousa Juliette Rostand soeur de Edmond Rostand écrivain.                                                             Le château prend le nom de Valmante qui  eu une belle époque de célèbres soirées musicales et poétiques, la petite fille de Mante Marie-Claude épouse l'écrivain  Claude Mauriac.                      Décès de Louis Mante en 1939 et en 1942 le château est réquisitionné par les allemands sert de résidence à l'amiral Mensch, puis en 1944  abrite le P.C. de la base américaine ou se rencontreront en 1945 les généraux Eisenhower, Marshall, Montgomery et Bradley, libéré en 1946 reste habité par Juliette Mante jusqu'en 1956, vendu aux enchères, racheté en 1957 par une société immobilière qui lotit le parc, le bâtiment restauré en 1959 devient un centre  de rééducation.  Dans ce château occupé aujourd'hui par les locaux administratifs avait accueilli Anna de Noailles et Sarah Bernhardt.","architecture":"Valmante; Construit au XVIIIe siècle en pierre blanche deux niveaux et attiques surmonté d'une corniche et d'une balustrade, le centre de la façade, rythmée par des bandeaux moulurées  et par des chaînes de refend, se dessine un avant corps à trois travées qui abrite le salon, ce château perd de son charme  entouré aujourd'hui d'immeubles.","habitants":"Monsieur Joseph Grandval\r\n        \"","divers":"Château de Valmante","gps":"","images":["../../jctruffet.com/image/image_13/13_Valmante_1.jpg","../../jctruffet.com/image/image_13/13_Valmante_2.jpg"]},"Consult_chateau_formulaire6c80":{"id":"Consult_chateau_formulaire6c80","dept":"13","canton":"Aix-en-Provence","commune":"Lambesc","nom":"Valmousse","type":"Château","periode":"XVI","histoire":"VALMOUSSE:  La ville de Lambesc était sous la jurédiction des seigneurs de la Barben jusqu'à ce que Louis XIV  érige la seigneurie en faveur du marquis de Balthazar de Bézieux président de la chambre du parlement de Provence, ce dernier fit construire en 1704 Valmousse, le dernier seigneur mourut sans postérité en 1774 le château passa la Révolution sans dommage, passa ensuite entre les mains de plusieurs propriétaires, échut au début du XIXe siècle à Hugues Paul de Queylar, correspondant de l'institut de France; son fils Paulin  trés lié à Granet qui y séjourna (peintre).  En 1875 le domaine fut racheté par François Rivoire président du Tribunal de commerce de Marseille. Racheté en 2000 et les nouveaux propriétaires l'ont rénovés pour en faire des chambres d'hôtes.","architecture":"Valmousse; Corps de logis rectangulaire  à deux niveaux fronton triangulaire plein cintre en façade.","habitants":"Balthazar de Bézieux\r\n        \"","divers":"Château de Valmousse","gps":"","images":["../../jctruffet.com/image/image_13/13_Valmousse_1.jpg","../../jctruffet.com/image/image_13/13_Valmousse_2.jpg","../../jctruffet.com/image/image_13/13_Valmousse_3.jpg"]},"Consult_chateau_formulaireb08d":{"id":"Consult_chateau_formulaireb08d","dept":"13","canton":"Aix-en-Provence","commune":"Vauvenargues","nom":"Vauvenargues","type":"Château","periode":"XVI","histoire":"VAUVENARGUES; Cité pour la première fois au XIe siècle  sous le nom de Vallis Véranica qui est le fief des comtes de Provence à la maison d'Anjou à partir de 1246  à la mort  du roi René Ier d'Anjou  passera à la couronne de France,  la seigneurie de Vauvenargues est acquise au XVIe siècle par la famille de Clapiers, conseiller à la cour des comptes d'Aix qui fit édifier le château actuel, en 1644 le château subit des transformations en style Louis XIII.  En 1722 en récompense de son attitude courageuse durant la peste qui frappa la région en 1720, la seigneurie est érigé en marquisat par Louis XV  au profit de Joseph de Clapiers marquis de Vauvenargues, son fils aîné Luc célèbre moraliste qui fera une carrière militaire,  mais eut les jambes  gelées pendant les guerres de Bohême, et presque aveugle par la petite vérole, fit un passage à Vauvenargues assez court, habitera à Paris avec le soutient de ses amis Voltaire, Marmontel et Mirabeau ou il s'éteindra en 1747 à l'âge de trente deux ans.                                A la Révolution le château est acquis par le père du cardinal  d'Isoard, archevêque de Lyon.   En 1958 Pablo Picasso achète le domaine s'installe avec son épouse Jacqueline Roques, Pablo  décèdera à Mougins mais sera inhumé au château de Vauvenargues.","architecture":"Vauvenargues; construit au XVIe siècle sur une enceinte primitive du XIVe siècle sur un éperon rocheux imposante bâtisse carrée avec  deux tours circulaires sur deux angles, dans l'une d'elle  se trouve un oratoire qui contient le corps de Saint-Séverin, don du pape Pie VII au cardinal d'Isoard. enceinte du XIVe siècle, échauguettes et chemin de ronde confèrent au château qui lui donne  une allure militaire, remanié au XVIIe siècle de style Louis XIII,  porte d'entrée Louis XIII  avec fronton et médaillon.","habitants":"Famille de Clapiers\r\n        \"","divers":"Château de Vauvenargues","gps":"","images":["../../jctruffet.com/image/image_13/13_Vauvenargues_1.jpg","../../jctruffet.com/image/image_13/13_Vauvenargues_2.jpg","../ en 1523 aux Quiqueran .  Mais les guerres de religion les obligent d'abandonner le château au profit du baron Hubert de Vins qui ce dernier meurt quelques temps après et retour des Quiqueran, Honoré de Quiqueran eu un conflit lors de ses sorties nocturnes en ville qui le poussa au crime, ne survit pas a son forfait, son épouse Suzanne de Féraud assume jusqu'au procès en 1617 qui exige que les biens soient  vendus aux enchères qui furent rachetés par l'époux d'une nièce de son défunt mari. A la mort de la nièce  Marguerite de Quiqueran, le château revient à la veuve de son frère qui achève de lapider la fortune familiale, les héritiers appauvris les biens restant seront à la fin du XVIIIe siècle dispersés entre plusieurs propriétaires à la famille Le Blanc co-seigneur  avec la famille Gaillard, mais le château est devenu inhabitable.                            La Révolution mis fin à ce château liquidation des biens des derniers seigneurs en 1790 fut racheté en 1794 par Monsieur Micoulin  qui s'empressa de détruire le château.","architecture":"Ventraben; forteresse était imposante encadré de tours et de remparts et totalement inaccessible par l'ouest  construite au XIIe siècle sur un piton rocheux en paliers successifs,  remanié en travaux de modernisation et d'agrandissement au XVI  XVIIe siècle, inhabitable après la Révolution aujourd'hui en ruines (pans de murs) classé monument historique.","habitants":"famille des Baux\r\n        \"","divers":"Vestiges du château de Ventabren","gps":"","images":["../../jctruffet.com/image/image_13/13_Ventabren_1.jpg","../../jctruffet.com/image/image_13/13_Ventabren_2.jpg","../../jctruffet.com/image/image_13/13_Ventabren_3.jpg","../../jctruffet.com/image/image_13/13_Ventabren_4.jpg","../../jctruffet.com/image/image_13/13_Ventabren_5.jpg"]},"Consult_chateau_formulaire98c5":{"id":"Consult_chateau_formulaire98c5","dept":"13","canton":"Eyguières","commune":"Vernègues","nom":"Vernegues","type":"Vestiges","periode":"XIII","histoire":"VE let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','13 — Bouches-du-Rhône'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
