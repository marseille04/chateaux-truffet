t des mers pour le cardinal de Richelieu et seigneur de Bouc-Bel-Air, c'est lui qui entrepris les réparations du château fortifié dont les restes sont dans le village de Bouc-Bel-Air, il y fit de nombreux achats de terrain pour les jardins, au décès de son fils Reynaud en 1678 qui avait en 1673 épousé Magdeleine de Séguiran ; Marc Antoine d'Albertas entre en possession des terres de Bouc-Bel-Air, par l'alliance de leur fils Reynaud en 1673 avec Magdeleine de Séguiran, un château fut prévu  par son fils Jean-Baptiste d'Albertas mais jamais été commencé par contre un parc magnifique fut créé en 1750 à 1780 est existe toujours. La descendance Alfred d'Albertas partagent depuis 1949 avec son fils Jean la restauration du Jardin.                                                   \r\nLe domaine de Gratiane du XIXe siècle  résidence de l'Archevêque de Marseille.","architecture":"Bouc-Bel-Air. vestiges du château primitif dans le village qui fut édifié au VIIIe siècle afin de résister aux invasions sarrasines .","habitants":"Henri de Séguiran\r\n        \"","divers":"Bouc-Bel-Air, jardins d'Albertas et domaine de la Gratianne.","gps":"","images":["../../jctruffet.com/image/image_13/13_Bouc_Bel_Air_1.jpg","../../jctruffet.com/image/image_13/13_Bouc_Bel_Air_2.jpg","../../jctruffet.com/image/image_13/13_Bouc_Bel_Air_3.jpg","../../jctruffet.com/image/image_13/13_Bouc_Bel_Air_4.jpg","../../jctruffet.com/image/image_13/13_Bouc_Bel_Air_5.jpg"]},"Consult_chateau_formulaire549b":{"id":"Consult_chateau_formulaire549b","dept":"13","canton":"Tarascon","commune":"Boulbon","nom":"Boulbon","type":"Vestiges","periode":"XII","histoire":"BOULBON; dans la plaine de la petite Crau, sur un rocher vestiges du XIIe siècle construit par le seigneur Béranger de Boulbon, puis aménagé pour une résidence plus confortable. A la mort d'Archambaud de Boulbon dernier du nom en 1361, la seigneurie revient à sa soeur Ermesende qui épouse successivement Guy Alberti, neveu du pape Innocent VI puis Jean de Ripéria. cette forteresse fut assiégé par Raymond de Turenne en 1380 la seigneurie revient  à Géoffroy le Meingre, dit Boucicot ce dernier meurt en 1451 après avoir assiégé l'antipape Benoit XIII dans son palais à Avignon.   La seigneurie passa à plusieurs propriétaires dont le roi René avant d'échoir en 1526 à la famille d'Oraison. Erigé en comté au XVIIe siècle et en 1674 la seigneurie passe à Julie de Forbin de la Roque, veuve de René de Raoux seigneur de Saint-André dont les descendants seront nommées Raousset-Boulbon qui le garderont jusqu'à la Révolution, le château fut saccagé et  vu l'ampleur des dégâts Emile Henri de Raousset-Boulbon renonça à la remise en état, depuis ce temps à l'état de ruines à la mort du dernier descendant  en 1956 , l'ensemble subsistant donjon et enceinte crénelée passe en héritage aux Bonaparte-Wyse qui le possède encore aujourd'hui.","architecture":"Boulbon; dans la plaine de la petite Crau, sur un rocher vestiges du XIIIe siècle qui se confonde avec la roche, cette forteresse était au XVe siècle une résidence confortable, l'agrandissent d'un logis formé de deux corps de bâtiment, malgré les remaniements aux fils des ans, fut malheureusement saccagé à la Révolution, il ne reste que le donjon, une tour ronde crénelée et des pans de murs crénelées également.","habitants":"seigneur Béranger de Boulbon\r\n        \"","divers":"Vestiges du château féodal de Boulbon.","gps":"","images":["../../jctruffet.com/image/image_13/13_Boulbon_1.jpg","../../jctruffet.com/image/image_13/13_Boulbon_2.jpg","../../jctruffet.com/image/image_13/13_Boulbon_3.jpg","../../jctruffet.com/image/image_13/13_Boulbon_4.jpg","../../jctruffet.com/image/image_13/13_Boulbon_5.jpg","../../jctruffet.com/image/image_13/13_Boulbon_6.jpg","../../jctruffet.com/image/image_13/13_Boulbon_7.jpg"]},"Consult_chateau_formulaire041b":{"id":"Consult_chateau_formulaire041b","dept":"13","canton":"Marseille","commune":"St-Menet","nom":"Buzine","type":"Château","periode":"XIX","histoire":"BUZINE; Immortalisé dans le \"Château de ma mère\"  ou Pagnol tout son amour pour celle qui disparut quand il avait 15 Ans, entre Allauch et Aubagne, dans le parc des sept collines il y tourna une quinzaine de film. Le château tira son nom d'un certain Buzin qui en devint propriétaire au XVIIe siècle il fut remplacé au XIXe siècle par le château actuel dans le style Louis XIII.   En 1941 Marcel Pagnol l'achète pour y installer sa société de films et finit par le céder en 1973 à un promoteur.","architecture":"Buzine; dans le massif de l'étoile, à cheval sur les territoires  de Marseille, d'Allauch et d'Aubagne le château de Buzine remanié dernièrement, bâtisse à trois niveaux, pavillon central accolé aux angles de pavillons à niveau inférieur.","habitants":"Marcel Pagnol\r\n        \"","divers":"Château de Buzine","gps":"","images":["../../jctruffet.com/image/image_13/13_Buzine_1.jpg","../../jctruffet.com/image/image_13/13_Buzine_2.jpg","../../jctruffet.com/image/image_13/13_Buzine_3.jpg"]},"Consult_chateau_formulairea27a":{"id":"Consult_chateau_formulairea27a","dept":"13","canton":"Gardanne","commune":"Cabries","nom":"Cabries_Callas","type":"Château","periode":"XVI","histoire":"CABRIES; Ancienne place forte,  possession de l'Abbaye de Saint-Victor de Marseille,  au Xe siècle, puis fief des Cabries et des Tribillane, dépendait ensuite à Raymond Béranger V comte de Provence, qui a l'époque les notables s'abritèrent dans le château  de Cabries, les paysans restèrent dans leurs terres de Callas. La seigneurie de Cabries passa  à la maison de Porcelets, à la famille d'Agoult, à la famille des Vintimille et passa dans différentes mains en 1708, la famille de Capriani de Cabries vend  à sieur Boyer notable de Marseille, puis passa aux Morellet de la Roquette dont l'un de ces descendants Gaspard Louis sera pendu à la Révolution. Racheté en 1934 par Edgar Mélik  une partie du château abrite aujourd'hui son exposition  (musée Edgar Mélik).  Le château fut acheté par la commune et l'ouvre au public à partir de 1980.      CALLAS; L' historique de Callas est  identique à celle de Cabries le hameau fut reconnut en 1859 le nom fut donné par Louise Garavagne descendante de la branche  de Louis Baltazar Dauphin  qui fut épargné  à la Révolution possédait également  la seigneurie de Tribellane.  Le château de Callas construction du XIXe siècle  est une création d'Arnaud de Villeneuve d'Esclapon, comte de Provence qui est utilisé pour diverses manifestations populaires.               Dans la commune la maison de Tribellane du XIIe siècle.","architecture":"Cabries; ancienne place forte fortifié château du XVIe siècle trois corps de logis entourant une cour d'honneur. était autrefois entourée d'une enceinte fortifiée du XIIe siècle des points encore visible dans les rues, grande porte ogivale sur la partie nord donne accès à la cour intérieure.                                                                                           Callas; château construit au XIXe siècle à trois niveaux style renaissance deux tours rondes et donjon carré à créneaux","habitants":"Famille des Cabries \r\n        \"","divers":"Vestiges à Cabries et château de Callas","gps":"","images":["../../jctruffet.com/image/image_13/13_Cabries_Callas_1.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_2.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_3.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_4.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_5.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_6.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_7.jpg","../../jctruffet.com/image/image_13/13_Cabries_Callas_8.jpg"]},"Consult_chateau_formulaired146":{"id":"Consult_chateau_formulaired146","dept":"13","canton":"Peyrolles-en-Provence","commune":"St-Paul-les-Durance","nom":"Cadarache","type":"Manoir","periode":"XV","histoire":"CADARACHE; Ancienne communauté  médiévale qui à appartenu au chevalier de Malte, en 1370 Georges de Montmal propriétaire du premier château qui fut détruit au XIVe siècle. Le fief passa au XIVe siècle aux comtes de Provence,  le château fut construit en 1475  par Louis de Villeneuve marquis de Trans, il fut ambassadeur de France  à Rome,  passa ensuite aux Valbelle et aux Castellane, et à la mort du dernier des Castellane devient relais de chasse, connaîtra divers propriétaires et en 1919 appartient au commissariat de l'énergie atomique qui la transformé en hôtellerie pour les étrangers qui viennent en stage.","architecture":"Cadarache; manoir avec donjon carrée entouré de dépendances.","habitants":"Louis de Villeneuve\r\n        \"","divers":"Maison forte de Cadarache","gps":"","images":["../../jctruffet.com/image/image_13/13_Cadarache_1.jpg","../../jctruffet.com/image/image_13/13_Cadarache_2.jpg"]},"Consult_chateau_formulaired0e2":{"id":"Consult_chateau_formulaired0e2","dept":"13","canton":"Salon-de-Provence","commune":"Lançon-de-Provence","nom":"Calissanne","type":"Château","periode":"XVII","histoire":"CALISSANNE; Sur le site Celto-Ligure de l'oppidum de Saleyon de Constantine (IVe siècle avant JC). Mille hectares en plantations vignes et oliviers. Au XIIIe siècle  fief de Hugues des Baux qui le cède aux Hospitaliers de Saint-Jean de Jérusalem, le fief passa aux XVIIe siècle au de Leidet famille de parlementaires, conseiller et président au parlement d'Aix et premier seigneur de Calissanne  qui y firent construire le château actuel, puis passa à un industriel marseillais monsieur Masson en 1821. transformé en exploitation commerciale viticole et hôtel.","architecture":"Calissanne, bâtisse quadrangulaire flanquée de tours rondes coiffées de coupole fut construit au XVIIe siècle, remanié au XIXe siècle.","habitants":"Famille Leidet\r\n        \"","divers":"Château de Calissane","gps":"","images":["../../jctruffet.com/image/image_13/13_Calissanne_1.jpg","../../jctruffet.com/image/image_13/13_Calissanne_2.jpg","../../jctruffet.com/image/image_13/13_Calissanne_3.jpg","../../jctruffet.com/image/image_13/13_Calissanne_4.jpg"]},"Consult_chateau_formulaire3bf9":{"id":"Consult_chateau_formulaire3bf9","dept":"13","canton":"Ciotat","commune":"Cassis","nom":"Cassis","type":"Château","periode":"XIV","histoire":"CASSIS, au Ve siècle  Carcisis, les invasions barbares conduisent les habitants à se réfugier sur les hauteurs, ensuite à l'intérieur d'un castrum, fief  rattaché à l'archevêché de Marseille, immense territoire qui comptait 79 fiefs qui passa  aux seigneurs des Baux, Hugues des Baux fit construire le château sur le mamelon rocheux dominant la mer.   Le 4 avril 1402 à Brantes  Odon de Villars  fit donation à l'occasion de son mariage avec Alix de Baux à son neveu  Philippe de Levis des fiefs de Brantes, de Plaisans, des seigneuries de St-Marcel, de Roquefort, du Castellet, Cassis et port Miou.  En 1426 à l'extension de la famille des Baux permet à Louis II comte de Provence de récupérer le château et le bourg en 1473 le transmet à l'évêque de Marseille qui retrouve leurs droits seigneuriaux qu'ils possédaient avant 1223 et qu'ils conserveront jusqu'à la Révolution. Transformé en chambres d'hôtes par un industriel marseillais Jean Louis Causin.","architecture":"Cassis; Sur une butte rocheuse en bord de mer, vestiges de la  forteresse, l'enceinte abrité le village,  château  reconstruit au XVe siècle avec corps de logis rectangulaire attenant aux remparts élément le plus important sur l'ensemble de la construction avec tour carré en angle, les tours furent arasées au XVIIIe siècle.","habitants":"Hugues des Baux\r\n        \"","divers":"Château féodal de Cassis","gps":"","images":["../../jctruffet.com/image/image_13/13_Cassis_1.jpg","../../jctruffet.com/image/image_13/13_Cassis_2.jpg","../../jctruffet.com/image/image_13/13_Cassis_3.jpg","../../jctruffet.com/image/image_13/13_Cassis_4.jpg","../../jctruffet.com/image/image_13/13_Cassis_5.jpg"]},"Consult_chateau_formulaire253d":{"id":"Consult_chateau_formulaire253d","dept":"13","canton":"Marignane","commune":"Sausset-les-Pins","nom":"Charles_Roux","type":"Château","periode":"XIX","histoire":"CHARLES-ROUX (1841-1918) industriel à Marseille usine de savon,  et armateur, fit une carrière de député des Bouches du Rhône et administrateur de la compagnie du canal de Suez, de la Banque de France et  président de la compagnie transatlantique. Son fils François Charles Roux, a était l'initiateur de l'exposition coloniale de Marseille en 1906 dont-il fut le commissaire général suite à cela un buste sur piédestal fut installé dans le salon des artistes français. Il fit construire le château qui porte son nom à Sausset et termina sa carrière comme conseillé général en 1895. le château aujourd'hui vendu à huit propriétaires qui possèdent chacun un appartement.","architecture":"Château Charles Roux construit en 1855 grand corps de logis à trois niveaux, galeries reliant  un  pavillon carré en angles sur façade côté mer.","habitants":"Charles Roux\r\n        \"","divers":"Château de Charles Roux","gps":"","images":["../../jctruffet.com/image/image_13/13_Charles_Roux_1.jpg","../../jctruffet.com/image/image_13/13_Charles_Roux_2.jpg","../../jctruffet.com/image/image_13/13_Charles_Roux_3.jpg","../../jctruffet.com/image/image_13/13_Charles_Roux_4.jpg"]},"Consult_chateau_formulaire9c47":{"id":"Consult_chateau_formulaire9c47","dept":"13","canton":"Lambesc","commune":"Charleval","nom":"Charleval","type":"Château","periode":"XVIII","histoire":"CHARLEVAL; Sur des terres que possédaient quatre grandes familles et sur les terres de la propriété de la famille de Jesse.   Les Carioli-Vallis qui possédait ces terres en arrière fief par Charles de Lorraine en faveur de la maison d'Arquier un héritier César de Cadenet fut à l'origine de la fondation \"Charleval\" il y avait un relais de chasse qui fut transformé en château reconstruit en style renaissance en 1741  et remanié par son dernier acquéreur Monsieur de Bonnefoy en 1860 qui lui donna l'aspect actuel.                               Dans la commune le château de  Bonneval du XVIIe siècle de Ruffo de Bonneval de la Fare comte de Sinopoli de Calabre   arriva en 1334, Guillaume de Ruffo  chevalier et seigneur de nombreux fiefs, chambellan du roi et capitaine général en 1355, un  domaine lui fut transmis par le roi Robert d'Anjou, François Ier accorda la modification de leur nom de Ruffo en Roux et cette famille eut les honneurs de la cour  jusqu'au XVIIe siècle et  en 1760 Louis XV érige les terres de la Fare en marquisat en faveur de Pierre Joseph Hilarion de Roux seigneur de Bonneval et de la Fare. Château  de Sainte-Croix.","architecture":"Charleval; château de style néo-gothique  du XIXe siècle, corps de logis rectangulaire a trois niveaux avec attique flanqué de quatre  tours rondes à toits en poivrière.","habitants":"César de Cadenet\r\n        \"","divers":"Château de Charleval, de Bonneval et de Sainte Croix","gps":"","images":["../../jctruffet.com/image/image_13/13_Charleval_1.jpg","../../jctruffet.com/image/image_13/13_Charleval_2.jpg","../../jctruffet.com/image/image_13/13_Charleval_3.jpg","../../jctruffet.com/image/image_13/13_Charleval_4.jpg","../../jctruffet.com/image/image_13/13_Charleval_5.jpg","../../jctruffet.com/image/image_13/13_Charleval_6.jpg","../../jctruffet.com/image/image_13/13_Charleval_7.jpg","../../jctruffet.com/image/image_13/13_Charleval_8.jpg"]},"Consult_chateau_formulaire87cb":{"id":"Consult_chateau_formulaire87cb","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Chateau_d_If","type":"Fort","periode":"XVI","histoire":"Château d'If; Château fort,qui servit  de mouillage aux pirates aux contrebandiers, aux pêcheurs et prison d'état. Sous le règne de François Ier  en 1516 celui-ci envisage de construire une citadelle et en 1524 ordonne de construire la forteresse pour surveiller la rade et protéger Marseille, elle fut aménagé en armements  et garnison en 1531, puis occupé par les protestants, puis libéré part l'édit de Nantes. N'ayant jamais été menacé par l'ennemi deviendra prison d'état, le premier prisonnier le chevalier Anselme condamné en 1582 pour complot contre le roi Henri III, Louis XIV en 1660 le visite avec Mademoiselle de Montpensier. Plusieurs huguenots passèrent parfois vingt-cinq ans enfermés;  Le comte de Mirabeau y fut emprisonné en 1774 ainsi que le marquis de Sade et en 1848 les communards.       En 1851 au coup d'état de Napoléon III  des opposants républicains furent emprisonnés, et en 1880 fermeture de prison, le château est cédé au ministère de la Culture.                          En 1846 Alexandre Dumas  publie le livre  qui immortalise le château d'If par l'histoire du comte de Monté-Cristo  ce qui développera les visites touristiques sur cette forteresse et cela continue.   En 1860 visite de Madame de Grignan.","architecture":"Château d'If; forteresse; corps de logis quadrangulaire flanqué d'un donjon rond crénelé et de deux tours rondes en façade crénelées également construite en 1524 sur une assise rocheuse de 300 mètres sur 180 qui sera augmenté en 1660 par des fortifications\" Vauban\" en 1701.","habitants":"François Ier\r\n        \r\n        \"","divers":"Forteresse dit château d'If","gps":"","images":["../../jctruffet.com/image/image_13/13_Chateau_d_If_1.jpg","../../jctruffet.com/image/image_13/13_Chateau_d_If_2.jpg","../../jctruffet.com/image/image_13/13_Chateau_d_If_3.jpg","../../jctruffet.com/image/image_13/13_Chateau_d_If_4.jpg"]},"Consult_chateau_formulaire56ec":{"id":"Consult_chateau_formulaire56ec","dept":"13","canton":"Trests","commune":"Châteauneuf-le-Rouge","nom":"Chateauneuf_le_Rouge","type":"Château","periode":"XVI","histoire":"CHATEAUNEUF le Rouge; au XIIe siècle possession de l'abbaye de Saint-Victor de Marseille; le château neuf a remplacé le vieux château vestige au-dessus de l'actuel vigie.  Propriété au XIV au XVIe siècle de la famille de Rodulf  et du XVII au XVIIIe siècle à la seigneurie de la famille Gautier de Gerenton,   puis par alliance le château revient à la famille de Montaigu dont de nombreux descendants seront maire entre le XVIII-XIXe siècle.  Monsieur de Remusat vendit le château en 1986 c'est Fernand Bailau qui le racheta et en 1988 la commune le racheta et y installe la mairie dans le bâtiment principal.","architecture":"Châteauneuf le Rouge prendra ce nom en 1585 par la couleur du sol (Bauxite) corps de logis rectangulaire à trois niveaux.","habitants":"famille de Rodulf\r\n        \"","divers":"Château de Châteauneuf le Rouge","gps":"","images":["../../jctruffet.com/image/image_13/13_Chateauneuf_le_Rouge_1.jpg","../../jctruffet.com/image/image_13/13_Chateauneuf_le_Rouge_2.jpg","../../jctruffet.com/image/image_13/13_Chateauneuf_le_Rouge_3.jpg","../../jctruffet.com/image/image_13/13_Chateauneuf_le_Rouge_4.jpg"]},"Consult_chateau_formulaireb812":{"id":"Consult_chateau_formulaireb812","dept":"13","canton":"Arles","commune":"Châteaurenard","nom":"Chateaurenard","type":"Vestiges","periode":"XII","histoire":"CHATEAURENARD, après l'expulsion des Sarrasins de Provence par Guillaume Ier  Reynardus seigneur de Châteaurenard fit construire une imposante forteresse sur la colline du Griffon  mi-bois mi-pierre dit  \"Castel  Reynardus\" qui devient Castel-Renard puis Châteaurenard, Guillaume meurt en croisade sa veuve  en fait don au  comte de Provence, ce fut Ildefonse Ier roi d'Aragon comte de Provence qui prend possession de Châteaurenard  et décide de remplacer la structure en bois en confiant cette mission à sa maîtresse, la belle Jordane, qui réussira et organisera des rencontres de l'histoire de d'arts et  poétiques.    Le château passa au XIVe siècle aux Gentelmi de Tarascon, sénéchal de Provence, puis passe en 1420 à Laugier Sapor seigneur de Châteaurenard qui entreprend des remaniements, rajout d'un troisième étage,  le château passa en 1497 aux de Vesc, puis par alliance en 1548 au comte de Sault, en 1630  la baronnie est acheté par François Aymar président de la cour des comptes et de nouveau par alliance passe successivement en 1727 à la famille Thomassin, en 1781 aux Valori. En 1792 le château est confisqué par le régiment des marseillais venu pacifier la région. Le château subira  d'énormes dégâts même démoli pour récupération des pierres, il fut racheté par la ville en 1921, aujourd'hui abrite le musée de l'histoire locale et médiévale.","architecture":"Châteaurenard , Sur la colline du Griffon,  cette forteresse fut commencé au Xe siècle mi-bois mi-pierre remanié au XIIe siècle  et au XVe siècle après la guerre de cent ans, surélévation  du corps de logis mais  les tours furent démantelés en 1597  et fut complètement détruites à la Révolution laissant deux tours dont une semi-éventrée, les bases des deux autres et quelques murs de l'enceinte rectangulaire.","habitants":"Guillaume Ier de  Reynardus\r\n        \"","divers":"Vestiges du château féodal de châteaurenard","gps":"","images":["../../jctruffet.com/image/image_13/13_Chateaurenard_1.jpg","../../jctruffet.com/image/image_13/13_Chateaurenard_2.jpg","../../jctruffet.com/image/image_13/13_Chateaurenard_3.jpg","../../jctruffet.com/image/image_13/13_Chateaurenard_4.jpg","../../jctruffet.com/image/image_13/13_Chateaurenard_5.jpg","../../jctruffet.com/image/image_13/13_Chateaurenard_6.jpg","../../jctruffet.com/image/image_13/13_Chateaurenard_7.jpg"]},"Consult_chateau_formulairec230":{"id":"Consult_chateau_formulairec230","dept":"13","canton":"La Ciotat","commune":"La Ciotat","nom":"Ciotat_Ceyreste","type":"Château","periode":"XVI","histoire":"La CIOTAT; Le fief  de la Ciotat et Ceyreste appartenait au Xe siècle  aux vicomtes de Marseille, une branche de la famille des Baux jusqu'en 1365, puis dépendait des moines jusqu'en 1429 et à l'abbaye de Saint-Victor de Marseille.  Des co-seigneurs gérèrent l'administration jusqu'en 1675.                                                          Un fort  Béroard fut construit au XVIe siècle ainsi que les fortifications du XVIIe siècle.                                                            Dans la commune le château des Baumelles qui appartenait à l'abbaye de Saint-Victor de Marseille, bastide entourée d'une enceinte flanquée de tourelles construite au XIXe siècle, centre d'exploitation vinicole.                                                      \r\nChâteau des Clos des Plages  maison familiale des frères Lumière transformé en château en 1853 ou ils tournèrent leur premier film \"l'arroseur arrosé\" et \"le déjeuné de bébé\".","architecture":"La Ciotat; dans cette ville tour octogonale de l'ancien couvent des ursulines, hôtel de ville style renaissance, vestiges des fortifications du XVIIe siècle, fort de Bérouard et de Saint-Antoine, porte de 1628, ruines du fort Saint  Pierre sur l'ile verte. Ceyreste vestiges du châteaux des sires des Baux de la première moitié du XIIIe siècles.                                                                            Le château des Clos  des Plages; construction moderne, corps de logis rectangulaires à quatre niveaux terminant par des terrasses  à balustres, avant corps d'entrée avec terrasse également.","habitants":"Famille des Baux                                                                    \r\nFrères Lumière \r\n        \"","divers":"Château des Beaumelles, domaine des Clos des frères Lumière.","gps":"","images":["../../jctruffet.com/image/image_13/13_Ciotat_Ceyreste_1.jpg","../../jctruffet.com/image/image_13/13_Ciotat_Ceyreste_2.jpg","../../jctruffet.com/image/image_13/13_Ciotat_Ceyreste_3.jpg","../../jctruffet.com/image/image_13/13_Ciotat_Ceyreste_4.jpg","../../jctruffet.com/image/image_13/13_Ciotat_Ceyreste_5.jpg"]},"Consult_chateau_formulaire209b":{"id":"Consult_chateau_formulaire209b","dept":"13","canton":"Salon-de-Provence","commune":"Cornillon-Confoux","nom":"Cornillon_Confoux","type":"Vestiges","periode":"X-XI","histoire":"CORNILLON; Cité au Xe siècle; cornellum doit son nom à la famille  Cornilli, au XII dépendait des seigneurs des Baux comte de Provence, puis fief de la seigneurie des archevêques d'Arles et de Montmajour partagé avec différents co-seigneurs.                            Le château fort important comprenait l'église de style roman, un autre château fut construit au XVe siècle sur les vestiges de l'ancien certainement par les moines de Montmajour. En 1869 le château fut vendu à la commune qui le transforma en mairie et école.                                                                                        Dans la commune château des Lys du XIII  reconstruit au XVIIIe siècle en style renaissance appelé aussi château de Confoux dont un seigneur était Claude de Milan.","architecture":"Cornillon; dans le village perché dont il ne reste une tour de l'ancien château, un autre château fut construit au XVe siècle sur les vestiges de l'ancien, des remparts furent construits et un deuxième mur d'enceinte.","habitants":"Seigneurs des Baux\r\n        \"","divers":"Château de Cornillon","gps":"","images":["../../jctruffet.com/image/image_13/13_Cornillon_Confoux_1.jpg","../../jctruffet.com/image/image_13/13_Cornillon_Confoux_2.jpg","../../jctruffet.com/image/image_13/13_Cornillon_Confoux_3.jpg","../../jctruffet.com/image/image_13/13_Cornillon_Confoux_4.jpg"]},"Consult_chateau_formulaire6504":{"id":"Consult_chateau_formulaire6504","dept":"13","canton":"Aix-en-Provence","commune":"Eguilles","nom":"Eguilles","type":"Château","periode":"XVI","histoire":"EGUILLES; cité au Xe  siècle, castrum d'Aquila construit sur la voie romaine,  jusqu'à la fin du XVIe siècle le château fait l'objet  d'affrontements constant entre les seigneurs des Baux et les comtes de Provence jusqu'à sa destruction, il avait appartenu aux Arcussia et aux Mayaud entre le XIV et XVIe siècle, puis arriva les guerres de religion qui l'endommagèrent. Au XVIIe siècle s'installe  la dernière famille des seigneurs locaux  les célèbres Boyer d'Eguilles qui fournirent  une lignée de juristes,  d'humanistes, ils édifièrent le château actuel  sur l'emplacement  du château féodal, en 1678 Jean-Baptiste Boyer reprend la suite de son père qui avait commencé la construction par l'architecte  Pierre Pavillon du château en 1657, qui a été transformé en hôtel de ville aujourd'hui encore.","architecture":"Eguilles: de l'ancien château il ne reste plus rien, le nouveau fut construit en 1659 sur les bases de l'ancien corps de logis rectangulaire à trois niveaux et attiques deux tours carrées saillantes en angles fenêtres à meneaux et balcon à balustres sur portes d'entrée.","habitants":"Boyer d'Eguilles\r\n        \"","divers":"Château d'Eguilles","gps":"","images":["../../jctruffet.com/image/image_13/13_Eguilles_1.jpg","../../jctruffet.com/image/image_13/13_Eguilles_2.jpg","../../jctruffet.com/image/image_13/13_Eguilles_3.jpg","../../jctruffet.com/image/image_13/13_Eguilles_4.jpg"]},"Consult_chateau_formulairef035":{"id":"Consult_chateau_formulairef035","dept":"13","canton":"Salon-de-Provence","commune":"Salon-de-Provence","nom":"Emperi_Salon","type":"Château","periode":"XII","histoire":"EMPERI-SALON; sur le rocher du Puech, cité au Xe siècle par une seigneurie de terre de l'Empire, un premier château qui appartenait  sous la suzeraineté des empereurs romains germaniques d'où le nom de l'Empéri. Passa en 1142 aux archevêques d'Arles, le château fut reconstruit au XIIe siècle autour de la cour de l'Empéri ( rappelant qu'il y a eu rencontre sur cette place des empereurs Conrad II ou Frédéric Ier de Barberousse lors de la passation  aux évêques d'Arles). Les évêques en firent leur résidence  de campagne puis leur résidence principale pendant cinq siècles. L'archevêque Jean Ferrier embellit le château et accueille François Ier, Henri II et Catherine de Médicis et ensuite avec Charles IX. Pendant  les guerres de religion il fut assiégé trois fois pris en mains pendant cinq ans par la ligue du roi Henri IV qui le rend 1595 aux évêques, ces derniers le gardèrent jusqu'à la Révolution, qui fut à cette époque repris par la commune. Le château fut transformé  en prison et de 1831 à 1920 de caserne, un séisme détruit une partie du château qui fut restaurer dernièrement, abrite actuellement un musée du vieux Salon.    Ville ou vécut  Nostradamus.                                                                                  Dans la commune le château de Richebois du XVII-XVIIIe siècle de la seigneurie d'Aubes, création du  fief en 1612 au bénéfice de Palamède et de Jean-Baptiste de Suffren par monseigneur de Laurens  archevêque d'Arles et seigneur spirituel temporel de Salon de Provence.  La famille de Suffren d'ou issu le Bailli de Suffren  qui pris le titre de seigneurs d'Aubes et le château de Bruy au sud.                                 Le château Couderc actuellement clinique Vignoli et la villa les Cigales de l'ancienne famille Biet-Sube.","architecture":"Salon de Provence; Le château de l'Empéri qui est une des plus belle forteresse de Provence débuta par un premier château au Xe siècle reconstruit eu XII-XIIIe siècle d'un style forteresse médiévale, cette forteresse sera remanié au cours des siècles et surtout après le tremblement de terre de 1909, il est constitué d'un châtelet d'entrée flanqué d'une tourelle de guet crénelé, une grosse tour carrée crénelée également (donjon) et des bâtiments qui entourent trois cours d'honneur, Vestiges de l'ancien rempart avec porte du Bourg-Neuf du XIIe siècle avec mâchicoulis, tour Galagasque et porte beffroi de l'horloge du XVIIe siècle.","habitants":"Archévêques de Salon                                                                         Bailli de Suffren\r\n        \"","divers":"Forteresse de l'Empéri à Salon. château de Rochebois et du Bruy.","gps":"","images":["../../jctruffet.com/image/image_13/13_Emperi_Salon_1.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_2.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_3.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_4.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_5.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_6.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_7.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_8.jpg","../../jctruffet.com/image/image_13/13_Emperi_Salon_9.jpg"]},"Consult_chateau_formulaire0a74":{"id":"Consult_chateau_formulaire0a74","dept":"13","canton":"Arles","commune":"Fontvieille","nom":"Estoublon","type":"Château","periode":"XV","histoire":"ESTOUBLON, au Moyen-Age, le Grand Mas nom de la propriété du château d'Estoublon aujourd'hui, dépendait de la seigneurie du Mont Paon sous la domination des comtes des Baux. La cité fut assiégé à la mort de la comtesse Alix en 1426,  sur ordre de Yolande d'Aragon veuve de Louis II de Provence, les seigneurs des Baux durent capituler au bout de quatre  mois, retour des propriétaires au Comté de Provence, sous le règne du roi René passe aux Bénédictins de Montmajour.  En 1489 Barthélémy  de Grille dit \"Simon\"  négociant d'origine génoise, consul d'Arles achète le domaine. En 1561  les troupes protestantes incendie le domaine qui deviendra  un repaire de brigands,  suite à cela le seigneur détruisit  la forteresse en 1595, et en 1674 érigé en marquisat la famille de Grille   firent  reconstruire le château prit le nom d'Estoublon et au XVIIIe siècle la descendance de Grille  vendent à un antiquaire parisien qui le videra de ses meubles et boiseries, un nouvel acquéreur monsieur Berger qui le trouva trop vaste le revendra en 1932 à la famille Lombrage et en 1998 racheté par la famille Schneider et son gendre Rémy Reboul développa la viticulture. C'est dans ce domaine que fut tourné la série \"des Gens de Mogador\".","architecture":"Estoublon; corps de logis du XVIe siècle rectangulaire à trois niveaux toit provençal flanqué de tours en angles à toits plats, entrée escalier en fer à cheval.","habitants":"famille de Grille  \r\n        \"","divers":"Château d'Estoublon","gps":"","images":["../../jctruffet.com/image/image_13/13_Estoublon_1.jpg"]},"Consult_chateau_formulaireaacb":{"id":"Consult_chateau_formulaireaacb","dept":"13","canton":"Orgon","commune":"Eygalières","nom":"Eygalieres_Brune","type":"Manoir","periode":"XVI","histoire":"EYGALIERES;  AU XIIe siècle dépendait du comte de Provence qui céda au XIIIe siècle le fief aux abbesses de Molléges pendant trois siècles, au XVe siècle à Jean de Louvet  et en 1660 passe par héritage à Henri de Guise le dernier héritier de la maison de Lorraine, mais obligé de vendre le fief, il  fut racheté par les paysans.                                                                                  BRUNE; D'une famille nommé Brune qui s'installe en Provence au XIIIe siècle, en 1571, Pierre Isnard consul d'Eygalières et intendant du duc Henri de Guise  fait construire son mas  au cur d'un grand domaine, la famille d'Isnard Brune s'en sépare en 1848 puis morcelé et classé monument historique sera racheté par monsieur Corcessin qui le restaure en 1995, puis racheté par Monsieur le comte de Larouzière-Montlosier, transformé en hôtel de luxe.","architecture":"Eygalières: Ruines d'un château reste d'un donjon, tour ronde, remparts du XIIe siècle, tour de l'horloge du XVIIe siècle  et des ruines d'Ancisse du XIIe siècle.                                                         Brune; Demeure rectangulaire à deux étages et attique de style renaissance avec une échauguette en encorbellement en angle coiffé d'une coupole à écailles, en dessous de cette échauguette richement sculptée une sirène dans une niche.","habitants":"Pierre-Bruno Isnard\r\n        \"","divers":"Vestiges du château d'Egalières et manoir  de Brune","gps":"","images":["../../jctruffet.com/image/image_13/13_Eygalieres_Brune_1.jpg","../../jctruffet.com/image/image_13/13_Eygalieres_Brune_2.jpg","../../jctruffet.com/image/image_13/13_Eygalieres_Brune_3.jpg","../../jctruffet.com/image/image_13/13_Eygalieres_Brune_4.jpg","../../jctruffet.com/image/image_13/13_Eygalieres_Brune_5.jpg"]},"Consult_chateau_formulaireb7bd":{"id":"Consult_chateau_formulaireb7bd","dept":"13","canton":"Arles","commune":"Fontvieille","nom":"Fontvieille","type":"Vestiges","periode":"XIII","histoire":"FONTVIEILLE; Immortalisé par Alphonse Daudet. Ancienne place forte cité au Xe siècle l'histoire se confond avec celle d'Arles,  la seigneurie dépendait de l'abbaye de Montmajour et de celle d'Arles. La tour des Abbés servait de guet et de défense contre les seigneurs des Baux, elle fut construite en 1353 par l'abbé de Canhillac abbé à Montmajour proche de la famille de Clément VI et de Grégoire XI. Suite aux guerres entre les seigneurs des Baux de les seigneurs d'Arles, puis les guerres de religions qui entraînèrent la démolition et pillage durent abandonné les lieux en 1536.      Aujourd'hui propriété à la ville par donation  depuis 2003,( Les châteaux d'Estoublon et de Montauban font parti d'un article indépendant).                                                                                    Dans la commune château de Barbegal vestiges du XVIIe siècle et aqueduc.","architecture":"Fontvieille: Reste de vestiges de la tour de guet crénelé à mâchicoulis et chemin de ronde, construite par Canhillac 1353 remanié au XVIe siècle également flanqué d'un bâtiment.  Vestige de l'abside d'un château fort sur la butte du Castellet, et ruines  du château fort de Mont-Paon dit de la reine Jeanne et château Légier ou séjourna la reine Elisabeth.  Moulin d'Alphonse Daudet et vestiges de l'aqueduc de Barbegal deux siècle avant J.C.","habitants":"Abbé de Conillac\r\n        \"","divers":"Tour des Abbés, vestiges d'un aqueduc et moulins d'Alponse Daudet.","gps":"","images":["../../jctruffet.com/image/image_13/13_Fontvieille_1.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_2.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_3.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_4.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_5.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_6.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_7.jpg","../../jctruffet.com/image/image_13/13_Fontvieille_8.jpg"]},"Consult_chateau_formulaire693e":{"id":"Consult_chateau_formulaire693e","dept":"13","canton":"Istres","commune":"Fos-sur-Mer","nom":"Fos_sur_Mer","type":"Vestiges","periode":"X","histoire":"FOS-SUR-MER; A l'issue de l'expulsion des Sarrasins en 972 le fief a été attribué par le comte de Provence Guillaume Ier  (dit le libérateur) aux seigneurs de Fos, ces derniers ont pris  leur nom de la Garde  qui leur a été confié au Xe siècle par l'archevêque d'Arles  Manassés,  neveu d'Hugues d'Arles, cette seigneurie tirait leur richesses des salins de Fos comme à Hyières et avait la surveillances de la pêche et des voies de communications de Marseille à Arles.    Le premier seigneur Pons de Fos vicomte en 1018 eut trois ans de conflit pour avoir refusé la suzeraineté  de Fos et d'Hyères du comte de Provence, il y perdit la vie et les alliés les vicomtes de Marseille occupèrent le château en 1020 le conflit recommença avec Guy seigneur de Fos qui refusait toujours la suzeraineté et dut se soumettre en 1056. A la mort de Bertrand Ier de Fos,  en 1093 Raymond de Saint-Gilles comte de Toulouse reconnu comme suzerain épousa en 1112  Douce, fille de la comtesse Gerberge de Provence la seigneurie échoit au comte de Barcelonne Raymond Béranger qui s'empara du château  de l'Hauture en 1116 et reçut l'hommage de Pons V de Fos pour les territoires de Fos et de d'Hyières et le gardèrent jusqu'à sa destruction suite aux guerres de religion.","architecture":"Fos sur Mer; Ancienne place forte perché sur un piton rocheux qui commande le golfe de Fos et le village médiéval l'accès au nord est commandé par le château seigneurial, bien qu'a trente mètres de haut,  il dominait la Mer, la Crau et la Camargue, reste du château et de l'enceinte fortifié  du XIIIe siècle composé de plusieurs corps de logis et dépendances subsistent des fragments le donjon,  forte tour carrée  du XIVe siècle à deux étages voûtés surmontés d'une terrasse, poternes à mâchicoulis, le logis principal ruiné, un morceau de l'enceinte fortifée avec archères.","habitants":"seigneur Pons de Fos \r\n        \"","divers":"Forteresse de Fos sur Mer","gps":"","images":["../../jctruffet.com/image/image_13/13_Fos_sur_Mer_1.jpg","../../jctruffet.com/image/image_13/13_Fos_sur_Mer_2.jpg","../../jctruffet.com/image/image_13/13_Fos_sur_Mer_3.jpg","../../jctruffet.com/image/image_13/13_Fos_sur_Mer_4.jpg","../../jctruffet.com/image/image_13/13_Fos_sur_Mer_5.jpg","../../jctruffet.com/image/image_13/13_Fos_sur_Mer_6.jpg","../../jctruffet.com/image/image_13/13_Fos_sur_Mer_7.jpg"]},"Consult_chateau_formulairef6d1":{"id":"Consult_chateau_formulairef6d1","dept":"13","canton":"Aix-en-Provence","commune":"Gardanne","nom":"Gardanne","type":"Château","periode":"XV","histoire":"GARDANNE; un castrum sur la colline de Cativel dépendait de l'abbaye de Saint-Victor de Marseille, le bourg enfermé dans des remparts  dépendait de différentes familles  nobles au XIIIe siècle.                                 Le fief est vendu à la veuve Toussaint-Guerrin en 1500, sur le domaine la descendance y firent construire par Barthélémy de Thomas seigneurs de Valabre et Milhaud en 1573 et 1583 une bâtisse à quatre tours sur un ancien pavillon dans un lieu ou  le roi René  adoré chasser de 1454 à 1480  ce pavillon de chasse prit le nom \"pavillon  de Valabre\" du roi René,  en 1663 acheté  par la famille d' Antoine Gautier  qui agrandisse par l'achat d'une ferme à l'ouest et de plus hérite du pavillon à quatre tours et l'ensemble des biens et le fief fut acquit en 1730  par Pierre de Gueydan conseillé du roi auditeur archivaire en la chambre des comptes et Louis XV érige le domaine en marquisat de ce fait les Gueidan  firent construire le château de Valabre sur l'ancienne bâtisse de la Ferme. En 1880 la dernière marquise de Gueidan fit don de  ses biens ainsi que le château à la ville,  pavillon de Valabre et terrain à condition  d'en faire un institut agronomique, devenu aujourd'hui  un centre de formation  de la sécurité civile. Au XVe siècle La ville de Gardanne dépendait des seigneurs de la famille Forbin dont Claude de Forbin deviendra corsaire du roi Louis XV.  En 1676 les habitants obtiennent le rachat de leur domaine par le roi et se défont de leur tutelle seigneuriale à la découverte du charbon, début des exploitations individuelles.                                                               Dans la commune le château de Barême racheté par la commune pour en faire un centre de formation.","architecture":"Gardanne; Restes du la double enceinte autour d'un castrum primitif, remparts du XIVe siècle porte de Trests qui inspira Cézane .                                 A quelques kilomètres de la cité le pavillon de chasse du roi René du 16-17e siècle  et à Valabre  le château corps de logis rectangulaire à trois niveaux flanqués de deux pavillons carré aux extrémités en façade.","habitants":"Antoine Gautier                                                                           marquise de Gueidan\r\n        \"","divers":"Pavillon de Valabre et le château","gps":"","images":["../../jctruffet.com/image/image_13/13_Gardanne_1.jpg","../../jctruffet.com/image/image_13/13_Gardanne_2.jpg","../../jctruffet.com/image/image_13/13_Gardanne_3.jpg","../../jctruffet.com/image/image_13/13_Gardanne_4.jpg"]},"Consult_chateau_formulaire8e47":{"id":"Consult_chateau_formulaire8e47","dept":"13","canton":"Aix-en-Provence","commune":"Gaude","nom":"Gaude","type":"Château","periode":"XVIII","histoire":"La GAUDE; ce domaine échoue au XVIIIe siècle à la famille Pisani, Charles-François-Joseph Pisani seigneur de la Gaude et conseiller au parlement d'Aix qui remaniera l'édifice déjà construit en 1750, malheureusement pour lui il perdit sa fiancée d'un mal mystérieux, il entra dans les ordres et se distingua en devenant évêque de Vence en 1874. En 1813 ce domaine passe dans différentes mains, les Boniface, les Martin,  au marquis Alexandre Arlatan de Montaud, marquis de la Roche et baron de Lauris président de la chambre à la cour d'appel d'Aix qui transmet le domaine à sa fille, cette dernière mariée en  1837 à Monsieur Benault de Lubières  devenu veuf en 1856,  ce dernier légua  le domaine aux de Bonnecorse, puis fut acquit en 1885 par Louis Gastaud qui restaure l'édifice, qui passera ensuite dans diverses mains et devient la propriété de Monsieur le baron d'Arnaud de Vitrolles en 1938 ambassadeur de France aux Pays Bas et passa en 1960 à la famille Beaufour.","architecture":"Gaude; édifié à la fin du XVIIe siècle au cur d'un domaine viticole,  édifice  de style villa italienne rectangulaire à deux niveaux et attique avec fronton en façade côté parc, remanié en 1750.","habitants":"Famille Pisani\r\n        \"","divers":"Château de la Gaude","gps":"","images":["../../jctruffet.com/image/image_13/13_Gaude_1.jpg","../../jctruffet.com/image/image_13/13_Gaude_2.jpg"]},"Consult_chateau_formulaireb688":{"id":"Consult_chateau_formulaireb688","dept":"13","canton":"Châteaurenard","commune":"Graveson","nom":"Graveson","type":"Vestiges","periode":"XI","histoire":"GRAVESON;  Cité au XIe siècle  castrum Gravisonis, fief des seigneurs de Montmajour partagé avec divers co-seigneurs y régnèrent jusqu'au XVe siècle, la famille Clémans en fut propriétaire, en 1642 le cardinal de Richelieu alors ministre de Louis XIII il fut accueillit pour faire détruire le château de Beaucaire, Graveson fut érigée en marquisat en 1718 en faveur de Jacques de Clémans.                                                                                                 Dans la commune château du Breuil à Montagnette, appartenait jadis à la famille de Lubières, puis rendez vous de chasse du roi René et propriété du roi de France, puis revint après 1688 aux Lubières  qui le conserveront jusqu'à la Révolution, au milieu  du XIXe siècle il fut vendu aux ascendants du propriétaire actuel Monsieur Marcel Mistral-Bernard.","architecture":"Graveson; Dans la commune des vestiges romains, des vestiges de l'ancien château féodal dont  il ne reste que la façade nord situé au centre du village, l'entrée principale du village et le grand portail de l'office du tourisme.   Château du Breuil: Grand corps de logis rectangulaire à cinq niveaux couronnés de créneaux, deux tourelles crénelées en façades et tour carré crénelée également.","habitants":"Famille Jacques de Clémans\r\n        \"","divers":"Vestiges Romains à Graveson et manoir Château du Breuil","gps":"","images":["../../jctruffet.com/image/image_13/13_Graveson_1.jpg","../../jctruffet.com/image/image_13/13_Graveson_2.jpg","../../jctruffet.com/image/image_13/13_Graveson_3.jpg","../../jctruffet.com/image/image_13/13_Graveson_4.jpg","../../jctruffet.com/image/image_13/13_Graveson_5.jpg","../../jctruffet.com/image/image_13/13_Graveson_6.jpg"]},"Consult_chateau_formulairef298":{"id":"Consult_chateau_formulairef298","dept":"13","canton":"Roquevaire","commune":"Greasque","nom":"Greasque","type":"Château","periode":"XVII","histoire":"GREASQUE; Au XIe siècle le fief de Gréasque passe aux mains de Saint-Victor et des seigneurs Séculiers dont l'officier se nomme Jacques d'Ollières,  grande famille d'écuyer de Marseille et consul de Marseille en 1606 sa descendance Georges  de Gréasque fit passer le fief par alliance aux Castellane par le mariage de leur fille avec Mathieu  fils de Georges d'Ollières qui fit construire le château au XVIIe siècle qui portera le nom de château d'Ollières, leur fille sera héritière  et apporta le château a Charles de Castellane seigneurs d'Auzat. Le comte de Castellane -Majastre habita dans ce château au XVIIe siècle et par le marquis de Castellane ce dernier le céda à la compagnie des charbonnages des Bouches du Rhône. Le 13 juin 1990 acquis par la commune pour le restaurer.","architecture":"Greasque: château seigneurial du XIXe siècle, important corps de logis  flanqué de deux ailes en retour, adossé à l'église.","habitants":"Georges  de Gréasque\r\n        \"","divers":"Château de Gréasque","gps":"","images":["../../jctruffet.com/image/image_13/13_Greasque_1.jpg"]},"Consult_chateau_formulairedc0f":{"id":"Consult_chateau_formulairedc0f","dept":"13","canton":"Istres","commune":"Istres","nom":"Istres","type":"Château","periode":"XV","histoire":"ISTRES:  au Xe siècle le peuple vivait autour d'une maison seigneuriale dont le premier seigneur était le seigneur des Baux puis à la reine Jeanne en 1337,  vendu à Charles IV du Maine neveu du roi René et à Bertrand Froissard qui gardera la seigneurie  jusqu'en 1609, deviendra ensuite à la seigneurie des Mercoeur,  puis à César de Vendôme ( fils d'Henri IV et de Gabrielle d'Estrées), ensuite la seigneurie sera vendu à un des créanciers Maximilien Titon puis au Maréchal duc du Villars et enfin aux Gallifet en 1772 et à la Révolution l'ensemble de la seigneurie dépendait de Magnan d'Estressen.                                                               A Istres porte d'Arles construite en 1733 bâti à l'honneur du maréchal Villars.                                                                          Dans la commune tour de Guet d'Estressen du XIVe siècle, le château de Saint-Martin , le château de Suffren, le mas deeLavalduc et le pavillon de Grignan 1575, restauré.                        COULOUME; Château dans le Gers racheté par la ville d'Istres, fief au XVe siècle d'Anne de Beaujeu, fille ainé de Louis XI, le seigneur des terres de Rambos et Guillaume de Montagut  vassal du comte d'Armagnac par rébellion  fut privé de ses biens en 1463,  Louis XI   donna les terres en 1482  à sa fille Anne et Louis XII   les rendit  en 1506 aux Montagut, resta dans cette famille jusqu'en 1881,  le château passera à Paul de Cassagnac, trois générations   puis sera vendu au général Brutinel en 1953 puis la ville d'Istres en devient propriétaire en 1983.","architecture":"Istres; au Xe siècle était entouré de remparts, il ne reste n frère du ministre y fit un séjour ainsi que Mgr  de Bretel. Au XVIIIe siècle la famille  du marquis d'Arbaud acheta  en 1782 de Monseigneur de Boisgelin, le fief de Jouques, puis passa après la Révolution à divers propriétaires la famille Bonnasse, la famille Cornet, la famille Puntous  et à Antoine Sartorio.","architecture":"Jouques ; Le village s'étale au sud sur les pentes de la Roque  au pied de la falaise les ruines du château-Vieux  du XIIe siècle, le château des archevêques comprend plusieurs demeures juxtaposées fut largement agrandi au  XVIIe siècle édifices importants flanqués de deux tours carrées.","habitants":"marquis d'Arbaud\r\n        \"","divers":"Bâtisse des archevêques et hôtel de ville","gps":"","images":["../../jctruffet.com/image/image_13/13_Jouques_1.jpg","../../jctruffet.com/image/image_13/13_Jouques_2.jpg","../../jctruffet.com/image/image_13/13_Jouques_3.jpg","../../jctruffet.com/image/image_13/13_Jouques_4.jpg"]},"Consult_chateau_formulairefbce":{"id":"Consult_chateau_formulairefbce","dept":"13","canton":"La Ciotat","commune":"Roquefort-la-Bédoule","nom":"Julhans","type":"Château","periode":"XVI","histoire":"JULHANS; Château très ancien cité au Xe siècle par Guillaume II comte de Provence vassal du roi de Bourgogne et de Provence. Guillaume II donna ses terres a son  compagnon d'arme pour l'avoir défendu contre Conrad le Pacific, sur ses terres un château fut construit par le pape Honorius en 1126 le fief passa à l'église de Marseille  et en 1195 c'est le vicomte  Hugues Géoffroy-Garde qui céda Julhans  au baron d'Aubagne, Hugues de Baux qui le cédera en 1479 à Jacques de Condole en épousant mademoiselle de Condole, puis  en 1583 passa aux frères Garnier  seigneur de Julhans et c'est Esprit de Garnier qui construisit le château actuel en 1639.  A la Révolution  passa sans encombre fut racheté par Monsieur Cléry dont ses filles, Jules-Marie et Désirée furent courtisées par Joseph et Napoléon Bonaparte à la garnison de Cuges et vit le mariage de Joseph Bonaparte avec Julie-Marie . En 1950 servira à loger les enfants juifs avant leur départ pour l'Israël, après ce départ le château fut acheté par une société immobilière  jusqu'en 1959 passa à la communauté \"Pied-Noir\" qui ces derniers  l'achetèrent pour colonies de Vacances. En 1962 l'Algérie s'approprie sans titre ni droit cette partie du Patrimoine et depuis 1988 est à l'abandon  les Pieds-Noirs crée un musée.   Il existe 57 châteaux nationalisés en France par l'Algérie et occupés depuis dont une union syndicale s'implique à les récupérer.","architecture":"Julhans: Quadrilatère à trois niveaux flanqué de tours carrées en angles à toit pointu aujourd'hui arasées.","habitants":"Famille d'Esprit de Garnier \r\n        \"","divers":"Château de Julhans avant et maintenant","gps":"","images":["../../jctruffet.com/image/image_13/13_Julhans_1.jpg","../../jctruffet.com/image/image_13/13_Julhans_2.jpg"]},"Consult_chateau_formulairee255":{"id":"Consult_chateau_formulairee255","dept":"13","canton":"St-Rémy-de-Provence","commune":"St-Rémy-de-Provence","nom":"Lagoy","type":"Château","periode":"XVI","histoire":"LAGOY; En 1667 François-Louis de Forbin vendit les terres  et la Baronnie de Lagoy à  Jean de Meyran-Lacetta seigneur de Nans prés de Saint-Maximin, que Louis XIV érigea la terre de Lagoy en marquisat pour remerciement de services rendus.     Le premier marquis de Lagoy construisit le château en 1705, cette famille a eu  de nombreux membres qui  furent illustrés par les rois, depuis le XVe siècle et continuèrent dans l'infanterie dont Jean Baptiste Florentin de Meyran marquis de Lagoy né à Arles en 1764, mais sa carrière fut interrompu à la Révolution dut se réfugier dans divers coins de France sous une fausse identité s'orienta sur des collections de peintures et monnaies, pendant ce temps le château fut pillé, il le récupéra  à la restauration il fut député des Bouches du Rhône en 1825 et décéda en 1829 et en 1946 à la mort du dernier marquis de Lagoy le domaine passa à sa petite fille comtesse qui avait épousé Jacques Senard.","architecture":"Lagoy; corps de logis rectangulaire en rez de chaussée surélevé d'un niveau et attique percé d'oculus et fronton en partie central  sur  escalier en fer à cheval sur la façade qui donne sur une cour d'honneur précédée des communs.","habitants":"marquis de Lagoy\r\n        \"","divers":"Château de Lagoy","gps":"","images":["../../jctruffet.com/image/image_13/13_Lagoy_1.jpg"]},"Consult_chateau_formulaire4a84":{"id":"Consult_chateau_formulaire4a84","dept":"13","canton":"Eyguières","commune":"Lamanon","nom":"Lamanon","type":"Vestiges","periode":"XV","histoire":"LAMANON; En 1209  le seigneur était Pons de Brugérias ce dernier reçut trente six seigneurs dans son château  dit de \"Panisse\" pour assister à la passation de Garsende de Sabran-Forcalquier veuve d'Alphonse II des comtes de Provence qui donna le comté de Forcalquier à son fils  Raymond Béranger V comte de Provence sous tutelle de Pierre II roi d'Aragon.   Le fief au XVe siècle appartenait aux seigneurs de Lamanon; Claude de Lamanon épousa en 1575 Louise  de Cartier fille de Joseph de Lamanon et de Marguerite Blanche, cette famille anoblie en 1572 gardèrent le château jusqu'en 1614 il fut vendu aux seigneurs de Cadenet qui le reconstruisirent en 1660 et Passa en 1745 au  marquis de Mark de Tripoly de Panisse-Passis  qui obtient l'autorisation par Louis XV  de construire le village de Lamanon  à proximité du château pour son personnel. Jean-Honoré-Robert de Paul de Lamanon (1752-1787) appartenait à la famille des seigneurs  de Lamanon, famille anoblie en 1772 né à Salon de Provence  en 1752   de Jean François Paul de Lamanon et d'Anne de Baldony.    Un Henri de Panisse avait épousé Charlotte Albertas. En 1785, la Pérouse  fut chargé par le roi Louis XVI  à la découverte autour du monde il partit de Brest le Ier Août avec le bâteau La Boussole et l'Astrobade, ils disparurent en 1787 à Manoua.                       Dans la commune le site  archéologique troglodyte de Calés ( 58 grottes  occupés du néolitique  au XVe siècle et platanes géant tricentenaire planté par Catherine de Médicis lors de son passage à Salon de Provence pour rencontrer  Nostradamus).","architecture":"Lamanon; Le château médiéval  qui fut construit au XIIe siècle restauré au XVe siècle a aujourd'hui, disparu suite aux  guerres de religion,  reste malgré tout des vestiges du château de Calés.      Un autre château fut construit dans le village d'un corps de logis de forme rectangulaire a trois niveaux avec fronton central et pavillons carrées saillants en angles.","habitants":"Claude de Lamanon\r\n        \"","divers":"Château de Lamanon, vestiges du château féodal et grotte (site troglodite)de Calés","gps":"","images":["../../jctruffet.com/image/image_13/13_Lamanon_1.jpg","../../jctruffet.com/image/image_13/13_Lamanon_2.jpg","../../jctruffet.com/image/image_13/13_Lamanon_3.jpg","../../jctruffet.com/image/image_13/13_Lamanon_4.jpg","../../jctruffet.com/image/image_13/13_Lamanon_5.jpg","../../jctruffet.com/image/image_13/13_Lamanon_6.jpg","../../jctruffet.com/image/image_13/13_Lamanon_7.jpg","../../jctruffet.com/image/image_13/13_Lamanon_8.jpg"]},"Consult_chateau_formulaired5a1":{"id":"Consult_chateau_formulaired5a1","dept":"13","canton":"Lambesc","commune":"Lambesc","nom":"Lambesc","type":"Vestiges","periode":"X-XII","histoire":"LAMBESC; Au VIIIe siècle les Eldradiens, au IX-Xe siècle les Porcelets d'Arles, au X-XII les Pontevés des Baux.   Au Moyen-Age fut édifié sur un promontoire rocheux un castrum qui existait jusqu'au XVe siècle sur l'emplacement de l'actuel mairie.  Aldrod premier  seigneur de Lambesc, subit les guerres des comtes de Provence au XIIe siècle l'Abbaye Saint-André de Villeneuve avait des droits sur cette ville passa au Silvacane à la fin du XIIe siècle.       En 1358 les seigneurs Philippe de Lambesc, Pierre Alamanon suivis des seigneurs de la Roque d'Antheron pillèrent le monastère de Silvacane. Ce fief passa en baronnie, puis en principauté par le roi René,  sous Louis XIV qui s'illustra dans l'histoire de France  qui lui valut le nom de Versailles-Aixois, jusqu'au XVIIIe siècle de nombreux seigneurs issus de familles nobles régnèrent sur Lambesc. De 1453 à 1688 cette baronnie de Lambesc dépendait de la maison de Guise   sous la responsabilité de  Marie de Lorraine  et de  monsieur d'Armagnac écuyer de France qui fut tenu par des co-seigneurs.  De  1688 à 1789 à la famille de Brionne.    De nombreux rois et princes s'arretèrent à Lambesc et en 1909 forte secousse téllurique de 6 sur l'échelle de Richter entraîna d'importants dégâts.                                                                        Dans la ville de nombreux hôtels particuliers de Pagy-de-Valbonne restauré en 1635,  hôtel d'Arquier, de Cadenet-Charleval, de Lauris des Taillades, de St-Chanas, et le domaine d'Aiguebelle du XVIIe siècle, pavillon de Bidaine ancien rendez-vous de chasse de 1615 et la tour de Jacquemard bâtie sur l'enceinte du XIVe siècle surmonté de l'horloge.                                                                                         Dans la commune le château de Béziers, de Libran, des Taillades, de Valbonette, de Bon-Receuil avec vestiges d'un donjon plus ancien  et le château viticole de Calavon.","architecture":"Lambesc; du Château féodal subsiste aujourd'hui qu'une tour, une ancienne porte des remparts transformés  en beffroi au XVIe siècle.","habitants":"Philippe de Lambesc,\r\n        \"","divers":"Pavillon de Bidaine, de Pagy de Valbonne,d'Aiguebelle et tour des remparts.","gps":"","images":["../../jctruffet.com/image/image_13/13_Lambesc_1.jpg","../../jctruffet.com/image/image_13/13_Lambesc_2.jpg","../../jctruffet.com/image/image_13/13_Lambesc_3.jpg","../../jctruffet.com/image/image_13/13_Lambesc_4.jpg","../../jctruffet.com/image/image_13/13_Lambesc_5.jpg","../../jctruffet.com/image/image_13/13_Lambesc_6.jpg","../../jctruffet.com/image/image_13/13_Lambesc_7.jpg"]},"Consult_chateau_formulairee4cf":{"id":"Consult_chateau_formulairee4cf","dept":"13","canton":"Salon-de-Provence","commune":"Lançon-de-Provence","nom":"Lancon_Provence","type":"Vestiges","periode":"XII","histoire":"LANCON de Provence; En 926 fin du royaume de Provence et fondation du comté d'Arles, le premier village établi sur le site actuel est de la famille Buissans-Paillol seigneur de Lançon au XIe siècle, puis  Lancon fit partie en 1116 du domaine des Baux par Raymond Ier des Baux qui ce dernier édifia le château, au XIVe siècle Lançon n'est pas épargné par les guerres de religion,  François Ier autorise la construction des remparts, l' enceinte actuelle et de 1563 année de  rachats de Lançon et rattachements au domaine royal. Lançon devient vassaux direct du roi.                            Dans la commune ; le château Sénèguier  du XVIIe siècle et un château de 1671 lieu dit Cazeneuve de la famille Gassier, la maison des Templiers (rue pavé d'amour ) hôtel de Luxembourg qui fut construit par la famille de Luxembourg vicomtes de Martigues, vers 1570 ferme fortifié du château Coudeneu (disparu) remplacé par  le domaine Virant  chambres d'hôtes, château du petit Pommier.","architecture":"Lançon;  Sur le point culminant d'une butte, enceinte polygonale du XVIe siècle d'un château flanqué de tours carrées espacées à arcades édifié au XIIe siècle, rempart entourant un donjon roman, de plan elliptique établie par François Ier avec porte à mâchicoulis. Hôtel du Luxembourg dit maison des Templiers  resté inachevé manque une partie de la façade qui a souffert au XXe siècle manque son attique.","habitants":"Sires des Baux  \r\n        \"","divers":"Vestiges et forteresse de Lançon, château Sénéguier, domaine virant et du Petit Pommier","gps":"","images":["../../jctruffet.com/image/image_13/13_Lancon_Provence_1.jpg","../../jctruffet.com/image/image_13/13_Lancon_Provence_2.jpg","../../jctruffet.com/image/image_13/13_Lancon_Provence_3.jpg","../../jctruffet.com/
