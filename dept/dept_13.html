nsformé en caserne et musée d'archéologie, sans oublier le bâtiment \"ville Radieuse\" du Corbusier construite de 1947à 1952.","architecture":"Marseille: Les croisades favorisant le développement du port  et pour la protection des bâtiments importants ont du être construit.","habitants":"l'Archi Espérandieu \r\n        \"","divers":"L'hôtel de ville, Hôtel Dieu,pavillon Daviel, la maison diamanté, l'opéra, le palais Longchamps, les docks, palais des arts et la villa radieuse \" le Corbusier\"","gps":"","images":["../../jctruffet.com/image/image_13/13_Marseille_Batiment_1.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_2.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_3.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_4.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_5.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_6.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_7.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_8.jpg","../../jctruffet.com/image/image_13/13_Marseille_Batiment_9.jpg"]},"Consult_chateau_formulaire27dc":{"id":"Consult_chateau_formulaire27dc","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Marseille_Chateau","type":"Château","periode":"XVI-XVII","histoire":"MARSEILLE; il y eu de grandes familles de nobles  et industriels à Marseille qui y construisirent de grandes résidences ou châteaux. (1)le château de la Salle que racheta monsieur Rougier en 1900 et le nommala \"Rougière\". (2) Bastide Vallon Giraudy à Sainte Marthe réaménagé par l'orfèvre Louis Giraudy construite en 1940.(3) Château de Saint-Joseph construit en 1740 par le marquis de Villeneuve ambassadeur à Constantinople acheté  par Jules de Castellane industriel, aujourd'hui mairie du secteur.(4) Château la Reynarde; cité au  XVIe siècle après avoir appartenu au marquis Félix du Muy sera acquit en 1868 par l'armateur Louis Régis ( aujourd'hui maison d'enfants). Château Bois-Loisy construit en 1850 par le comte de Saint- Alary resta plusieurs générations dans cette famille le vendit à la famille de Robert de Ruffi qui le vendit ensuite à la société générale en 1925 et en 1930 la ville de Marseille l'acheta pour en faire une auberge de Jeunesse.                  Luminy, aujourd'hui campus universitaire cette bâtisse fut acquise en 1819 par l'ambassadeur Augustin-Félix Fabre.                            Le château de Vert Bois toujours habité mais des  cités d'urgence on étaient construites autour.                                                     \r\n(5)La bastide appelé château Berger, auparavant s'appelait Castellemare sur la corniche édifiée par le roi du sucre Joseph Grandval et racheté par l'avocat d'affaire Edmond Marie Houitte de la Chesnaye, aujourd'hui centre de talasothérapie.                          (6) Château Talabot  construit en 1860 par l'architecte Bouchot.                (7) Villa Valmer construite par le fabricant d'huile Charles Gournelle     (8) gravures du  palais de la bourse ou autre   comme le château Borely, Buzine, château d'If, Valmante, Pastré Magalone, Régis, St-Antoine et villa Bagatelle font l'objet d'un article à part dans le site.","architecture":"Marseille; La Rougière  façade du XVIIIe siècle. Château Saint-Joseph de 1740 aujourd'hui mairie du secteur.                                 Château de la Reynarde du XVIe siècle quadrangulaire à trois niveaux flanqué de tours rondes crénelées en angles.  Château du Bois-Luzy de style second empire construit en 1850 à trois niveaux toiture basse peu apparente, tour polygonale en angles avec avancée semi polygonale en façade.                                                Château Berger en forme de T  pastiche de l'architecture de Chambord  des blasons portant l'hermine emblème d'Anne de Bretagne ponctuent les façades échauguettes  et fronton.                Château Talbot de 1860.                                                   \r\nChâteau de Saint-Antoine possible à ce jour détruit.  Villa Valmer construit au XIXe siècle  à trois niveaux tours en angles à pans coupés lui confèrent des allures de château.","habitants":"Les industriels\r\n        \"","divers":"Château de la Salle, de Vallon Giraudy, St-Joseph,la Reynarde, Vert-Bois Berger Talbot et la villa Valmer.","gps":"","images":["../../jctruffet.com/image/image_13/13_Marseille_Chateau_1.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_2.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_3.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_4.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_5.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_6.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_7.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_8.jpg","../../jctruffet.com/image/image_13/13_Marseille_Chateau_9.jpg"]},"Consult_chateau_formulairec404":{"id":"Consult_chateau_formulairec404","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Marseille_Patrimoine","type":"Vestiges","periode":"X  XII","histoire":"MARSEILLE; Fondé 600 ans avant J.C. par les Grecs de Phocée, appelé Massalia, ville qui prospéra rapidement par le commerce avec l'Orient. Dés le Xe siècle fut mains mise par les évêques de l'abbaye de St-Victor de Marseille qui firent à l'entrée du port une Tour  carré fortifiée dit tour St-Jean,  fondée par Jean Cassien chevalier de St-Jean, aux environ de 450, puis promut par l'abbé de St-Victor  vers 1020, possédaient beaucoup de fiefs et de prieurés en Provence, du XII au XIIIe siècle essor de la vie économique la population s'accroît le pouvoir à une oligarchie marchande,  puis géré par  Les comtes de Provence et les rois, en 1246 Charles Ier d'Anjou, comte de Provence, frères de St-Louis  succèdent à Raimond Béranger V. Puis le roi René qui fit reconstruire la tour St-Jean, et Charles du Maine qui légua la Provence à Louis XI en 1441. Cinq ans plus tard Marseille devient un port de guerre.  François Ier fait agrandir  l'arsenal, renforce les défenses en 1535. L'industrie et le commerce se développa.  Louis XIV fit construire le fort St-Nicolas  en 1660 par Nicolas de Clerville qui servit de garnison au XVIIIe siècle  partiellement détruit par les révolutionnaires en 1887 fut renommé fort \"Entrecastaux\" Louis XIV prévoit l'agrandissement  de l'autre côté le fort St-Jean autour de la tour du roi René et de la tour  du Fanal pour la vigie pour défendre l'entrée du port fit construire la citadelle en 1668 par le chevalier de Clerville Vauban prendra la suite en 1678. Les remparts furent détruit en 1626 pour l'agrandissement de la ville. Les guerres de successions d'Autriche 1741-46 , la ruine des commerces jusqu'à la Révolution.","architecture":"Marseille; La tour St-Jean construite sur un ancien fort qui était aux XIIe siècle la commanderie des Hospitaliers de St-Jean de Jérusalem sous le règne du roi René en 1260. Construction des éléments militaires en 1485 par François Ier. Construction des Forts par Louis XIV et démolition des remparts en 1666. Le fort gardera sa fonction militaire jusqu'à la Révolution puis transformé en prison, une partie a été détruite par une explosion d'un stock de munition qu'avait entreposé les allemands en 1942   Palais du Pharo construit en 1852 après être confié à la ville de Marseille par Eugénie fut utilisé comme hôpital abrite aujourd'hui les services municipaux.","habitants":"Les comtes de Provence\r\n        \"","divers":"L'Abbaye St-Victor, la tour St-Jean, l'Arsenal, fort St-Nicolas, fort d'Entrecastaux la tour du Fanal à la citadelle et palais du Pharo.","gps":"","images":["../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_1.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_2.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_3.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_4.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_5.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_6.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_7.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_8.jpg","../../jctruffet.com/image/image_13/13_Marseille_Patrimoine_9.jpg"]},"Consult_chateau_formulaire60b8":{"id":"Consult_chateau_formulaire60b8","dept":"13","canton":"St-Rémy-de-Provence","commune":"Maussane","nom":"Maussane_Paradou","type":"Vestiges","periode":"XII","histoire":"MAUSSANE; Sur le versant sud du massif des Alpilles à deux kilomètres des Baux  dépendait dès le Xe siècle aux seigneurs des Baux, le premier fut Pons le Jeune. Un oppidum du Castellas près du mas Verassy  site depuis l'âge de fer, mais tout à disparu.                        Les Alpilles furent un lieu de cachette pour les Huguenots dont les lieux subirent d'énormes dégâts pendant les guerres de religion.                    Paradou; tour de Castillon: Au XIVe siècle le village était protégé par ses remparts  et ses tours cité \"paradou\" un oppidum existait  et a cette époque un castrum au Moyen-Age, l'histoire des lieux est lié à celle des Baux de Provence puis le château fut détruit par Rainard de Turenne en 1390. Jusqu'à la Révolution le village portait le nom de Saint-Martin de Castillon pour différencier d'un autre lieu on le renomma \"le Paradou\" .                                                           Manoir  de Querry au Paradou, construit en 1902  par Jacques Querry fils d'un marchand d'huile à savon à Salon de Provence  qui fit fortune dans le traitement des huiles.","architecture":"Maussane-Paradou; Dans la commune la tour  carrée dans la propriété du château d'Escanin  au Paradou et les tours de Castillon vestiges d'un castrum du XIIIe siècle sur le rocher de la Penne fondés par les Arragonais.","habitants":"Pons le Jeune\r\n        \"","divers":"Château d'Escanin, manoir de Querry et vestiges du Castrum tour du Castillon","gps":"","images":["../../jctruffet.com/image/image_13/13_Maussane_Paradou_1.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_2.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_3.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_4.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_5.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_6.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_7.jpg","../../jctruffet.com/image/image_13/13_Maussane_Paradou_8.jpg"]},"Consult_chateau_formulaireb3a7-2":{"id":"Consult_chateau_formulaireb3a7-2","dept":"13","canton":"Peyrolles-en-Provence","commune":"Meyrargues","nom":"Meyrargues","type":"Château","periode":"XV","histoire":"MEYRARGUES; Au XIe siècle les comtes des Baux font bâtir une forteresse sur une crête à l'emplacement d'un ancien château en bois,  Hugues III des Baux qui ce dernier doit le céder  au comte de Provence seigneur de Meyrargues et de Sambuc passe en 1291 à Jean II le Meingre maréchal de France reçut de Marie de Blois épouse de Louis Ier d'Anjou duc de Provence en 1421 à sa mort lègue la seigneurie à son frère Geoffroy  de Boucicaut qui en est dépossédé par le petit-fils de Marie de Blois. Louis III roi de Naples et comte de Provence qui ce dernier l'abandonne à sa mère Yolande d'Aragon qui en reste propriétaire jusqu'à sa mort en 1439, son fils le roi René en fit don  en 1442 à Artaluche d'Alagonia gentilhomme napolitain pour service rendu qui le garderont pendant deux siècles mais subiront des attaques  des troupes royalistes en 1594,  le château et le village sont pillés et partiellement détruit, en 1605 Louis d'Alagonia est décapité à Paris pour avoir comploté  contre Henri IV,  cette famille s'éteint; le dernier des d'Alagonia légue le château en 1637  à  Léon  de Valbelle seigneur de Cadarache et parents aux d'Alagonia, la famille de Valbelle restera jusqu'à la Révolution donneront au château la structure actuelle car en 1650 une grande partie fut détruite par les troupes du comte d'Alès. Joseph Louis de Caussini Baron de Valbelle et seigneur de Meyrargues guillotiné à Marseille en 1794.  La petite fille du comte de Valbelle épouse en 1826 le marquis d'Albertas.  En 1952 le château est transformé en hôtel  par la famille Binet et en 1994 par Monsieur Segond.","architecture":"Meyrargues; reconstruit au XIe siècle sur l'emplacement d'un château en bois, prit la forme d'une forteresse médiévale, important quadrilatère dont les murs sont épais de deux mètres flanqués aux angles de tours massives et carrées, détruit partiellement en 1620 reconstruit pris la forme actuelle  de fer à cheval,  a gardé sa structure puissante de forteresse mais a perdu son aspect défensif a acquit un côté plaisance cour ouverte sur l'extérieur.","habitants":"Famille de Valbelle\r\n        \"","divers":"Château de Meyrargues, vestiges d'aqueduc","gps":"","images":["../../jctruffet.com/image/image_13/13_Meyrargues_1.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_2.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_3.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_4.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_5.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_6.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_7.jpg","../../jctruffet.com/image/image_13/13_Meyrargues_8.jpg"]},"Consult_chateau_formulaire29de":{"id":"Consult_chateau_formulaire29de","dept":"13","canton":"Aix-en-Provence","commune":"Meyreuil","nom":"Meyreuil","type":"Château","periode":"XIX","histoire":"MEYREUIL:  Le fief de Meyreuil, appelée auparavant bastide  Maurée appartenait au roi René qui  avait son pavillon de chasse,  la seigneurie de Meyreuil passa en 1300 à Charles d'Anjou dit le Boiteux,  fils de Charles Ier d'Anjou de 1343 à 1415 la seigneurie passa à Sancie de Riviera  jusqu'en 1446 Guillaume de Littéra, et en 1451  aux dominicains d'Aix qui en deviennent seigneurs  jusqu'en 1792,  passa après la Révolution à la commune, ce château servit de prison pour détenu politique.  Château Simone dans la commune au lieu dit la Palette dirigé par monsieur Rougier viticulteur depuis 1850.  Château de Saurine; aujourd'hui institut d'Ostéopathie, au début du XVIIe siècle s'appelle Roche Fontaine ( Sources dans la roche) au XVIIIe siècle Pierre Saurin jurisconsulte Aixois de 1760 à 1724 construisit un pavillon en ce lieu dont il donna son nom construit par l'architecte Pierre puget.  Bastide de Valbrillant, construction du XVIIIe siècle propriété du marquis de Fontienne  lieu ou se fit arrêter le chevalier de Guiramand aujourd'hui propriété de Monsieur Petit.                                                   Château domaine agricole de Reynaud Chassagne dirigé par Reynaud Jacqueline depuis 1992.","architecture":"Meyreuil; Le château Simone; corps de logis rectangulaire accolé à deux bâtiments surbaissaient et tourelles en façades à toits pointues.                Saurine; construit en 1720, monumental escalier à double révolution, tours à échauguettes en encorbellements.                                                        Bastide de Valbrillant construction du XVIIIe siècle.","habitants":"Charles Ier d'Anjou\r\n        \"","divers":"Château Simone et de Saurine","gps":"","images":["../../jctruffet.com/image/image_13/13_Meyreuil_1.jpg","../../jctruffet.com/image/image_13/13_Meyreuil_2.jpg","../../jctruffet.com/image/image_13/13_Meyreuil_3.jpg","../../jctruffet.com/image/image_13/13_Meyreuil_4.jpg"]},"Consult_chateau_formulairefd3c":{"id":"Consult_chateau_formulairefd3c","dept":"13","canton":"Aix-en-Provence","commune":"Aix-en-Provence","nom":"Mignarde","type":"Château","periode":"XVIII","histoire":"MIGNARDE; Confiseur du duc de Villars, Gabriel Mignard achète sur le vallon de Penchinats  au milieu du XVIIIe siècle une bâtisse du XVIIe siècle que son fils entreprend dans les années 1770 à 1780 le remaniement, conseillé par l'architecte  Claude Nicolas Ledoux,  vendu en 1789 à madame Segond,  le domaine passe la Révolution sans problème, mis à part le gendre de Monsieur Mignard  avait caché monsieur Pierre Pascalis,  qui fut arrêté le 21 mai 1791 emprisonné et pendu accusé d'un complot contre la Révolution.  Les héritiers de Sauveur Mignard ayant fuit le domaine qui sera acquit en 1806 par Jean-Baptiste Rey commissaire-ordonnateur des armées impériales, il y reçu Pauline soeur de Napoléon avec son mari le prince Borghèse et son amant Auguste de Forbin-Janson.  En 1858 le château fut vendu à Monsieur Rigaud premier président de la cour d'appel d'Aix député des Bouches du Rhône. Aujourd'hui toujours dans la famille par un neveu qui hérita en 1995,  Jean-Emmanuel Sechiari.","architecture":"Mignarde; vaste bâtisse rectangulaire a un niveau aménagée en 1770 d'un étage supplémentaire plus un demi étage précédée d'une terrasse, fronton  semi-circulaire sur le pavillon centrale encadré par des ailes à niveaux inférieurs, des aménagements ont été effectué au cours des siècles suivants  ainsi qu'un jardin à statues.","habitants":"Gabriel Mignard\r\n        \"","divers":"Château de la Mignarde","gps":"","images":["../../jctruffet.com/image/image_13/13_Mignarde_1.jpg","../../jctruffet.com/image/image_13/13_Mignarde_2.jpg"]},"Consult_chateau_formulaire4f43":{"id":"Consult_chateau_formulaire4f43","dept":"13","canton":"Istres","commune":"Miramas","nom":"Miramas","type":"Vestiges","periode":"XI","histoire":"MIRAMAS;  Situé sur un éperon rocheux,  le vieux village conserve une partie des ruines  de son château médiéval et une partie de son enceinte, ce château fut construit au XIe siècle par une famille Miromaris.  Après la disparition du seigneur Guillaume de Miromaris et de sa descendance, la citadelle fut occupé par les seigneurs des Baux et ensuite transmit aux moines de l'abbaye de Montmajour, dépendra de cette dernière jusqu'à la Révolution,  malgré les tentatives  de siège  et les attaques des guerres de religion par les troupes de Charles de Savoie au service de la ligue, en 1762 considéré comme ruinée.  Dans la commune deux autres châteaux.  Le château de Cabasse ancienne ferme moyenâgeuse gérée par l'Abbaye de Montmajour, ce domaine fut vendue en 1606 au capitaine Vanaguo, passe dans plusieurs mains  des abbés  de Montmajour, en 1791 vendu comme bien national en trois parties, une partie à Joseph Paillé. Vers 1820 Monsieur François-Alexis de Gabriac l'acquit et le revendit en 1888 et fut racheté par la commune en 1979 pour le restauré et transformé l'enceinte en aire municipal. Le château de Belval; bastide fortifiée du XVIe siècle  fut transformé en bâtiment agricole qui a perdu ses fortifications.                          En 1630  François Amphoux riche bourgeois de Saint-Chamas avocat à la cour dont un des héritiers anobli en 1765 en devenant comte de Belval. En 1986 ce château fut la propriété du S.A.N. pour le comte de la ville de Miramas qui en fera l'acquisition en 1997.","architecture":"Miramas;  vestiges de la citadelle au sommet d'un éperon rocheux vestiges de remparts de la bâtisse il ne reste que deux salles voûtées  à ciel ouvert ; Le château de Cabasse; le château de Belval.","habitants":"seigneur Guillaume de Miromaris\r\n        \"","divers":"vestiges de la citadelle de Miramas; château de Cabasse et de Belval","gps":"","images":["../../jctruffet.com/image/image_13/13_Miramas_1.jpg","../../jctruffet.com/image/image_13/13_Miramas_2.jpg","../../jctruffet.com/image/image_13/13_Miramas_3.jpg","../../jctruffet.com/image/image_13/13_Miramas_4.jpg","../../jctruffet.com/image/image_13/13_Miramas_5.jpg","../../jctruffet.com/image/image_13/13_Miramas_6.jpg","../../jctruffet.com/image/image_13/13_Miramas_7.jpg","../../jctruffet.com/image/image_13/13_Miramas_8.jpg"]},"Consult_chateau_formulaired5ba":{"id":"Consult_chateau_formulaired5ba","dept":"13","canton":"Arles","commune":"Fontvieille","nom":"Montauban","type":"Château","periode":"XVIII","histoire":"MONTAUBAN; Ce château fut construit au XVIIIe siècle propriété à l'origine de la famille Ambroy celle-ci est alliée par son cousin Louis Daudet époux de la fille Octavie. Alphonse Daudet écrivain fit un séjour en 1860 dans ce château ou il tomba amoureux de la Provence,  il écrivit son recueil des lettres de mon moulin, il épousa Jullia Allard en 1867 repassera à Fontvieille en 1891, Timoléon-Ambroy-Alphonse Daudet décède en 1897 à Paris. Aujourd'hui le château de Montauban propriété de la commune  dédié au souvenir de l'écrivain.","architecture":"Montauban: Superbe bâtisse à façade à pignon, construite au XVIIIe siècle à un étage couvert d'un toit dissimulé par une balustrade, corps central encadré de deux ailes  à pans coupés  en forte saillie, arcades au rez de chaussée façade d'inspiration italienne.","habitants":"Alphonse  Daudet\r\n        \"","divers":"Château de Montauban","gps":"","images":["../../jctruffet.com/image/image_13/13_Montauban_1.jpg","../../jctruffet.com/image/image_13/13_Montauban_2.jpg","../../jctruffet.com/image/image_13/13_Montauban_3.jpg"]},"Consult_chateau_formulaireaadc":{"id":"Consult_chateau_formulaireaadc","dept":"13","canton":"Arles","commune":"Arles","nom":"Montmajour","type":"Vestiges","periode":"XI","histoire":"MONTMAJOUR; sur le Mont-Majour qui était autrefois une île  voisine d'Arles  une abbaye  fondée en 948,  des moines cisterciens s'employèrent au développement qui fit  du Xe siècle la plus riche des abbayes  de Provence, ils y créèrent des pèlerinages jusqu'à 150000 fidèles par an  et les premiers comtes de Provence s'y font ensevelir. Conflits des guerres de religion en 1357 par Raymond de Turenne, le monastère se développa du XIe jusqu'au XVIIe siècle,  à cette dernière époque les papes et les rois de France confient la gestion à des laïques qui en retirent des revenus importants, la congrégation de Saint-Maur s'installe en 1639 et entreprend en 1700 la construction de bâtiments religieux et militaires. L'abbé cardinal Pons de l'Orme fit suite à cela construire la tour (donjon) comme abri et les remparts par l'architecte Guillaume Helline, son dernier, l'abbé Rohan devenu cardinal  impliqué dans le collier de la reine, le roi Louis XVI en 1786 fera fermer l'Abbaye pour les punir et en 1791 vendue comme bien national, deux acquéreurs successifs  la pilleront Elisabeth Roux vident tout l'intérieur avant d'en être dessaisie,  puis revendu à un marchand de bien qui vendit les pierres de taille. Au XIXe siècle l'édifice fut récupéré et restauré par Jacques Réattu et Pierre Revoil. Aujourd'hui propriété de l'état.","architecture":"Montmajour; ensemble architectural construit au Moyen-Age  sur le mont Majour qui était autrefois une île. l'édifice préroman  du XIe siècle comprend l'hermitage Saint-Pierre, une abbatiale  et un cloître roman du XIIe siècle, le donjon rectangulaire de l'abbé Pons de l'Orme élevé en 1369,  de ce dernier on obtient une vue superbe sur la région, il subsiste de tous les locaux d'habitation la salle capillaire, le réfectoire et l'église Notre Dame (XII), agrandie au XVIIIe siècle d'un second monastère et les bâtiment de Saint-Maur.","habitants":"L'abbé cardinal Pons de l'Orme\r\n        \"","divers":"Vestiges de l'abbaye de Montmajour","gps":"","images":["../../jctruffet.com/image/image_13/13_Montmajour_1.jpg","../../jctruffet.com/image/image_13/13_Montmajour_2.jpg","../../jctruffet.com/image/image_13/13_Montmajour_3.jpg","../../jctruffet.com/image/image_13/13_Montmajour_4.jpg","../../jctruffet.com/image/image_13/13_Montmajour_5.jpg"]},"Consult_chateau_formulaire15d0":{"id":"Consult_chateau_formulaire15d0","dept":"13","canton":"Eyguières","commune":"Mouriès","nom":"Mouries_Brau","type":"Manoir","periode":"XVIII","histoire":"MOURIES;  L'histoire de Mouriès se confond avec celle des Baux de Provence dont-il en faisait partie jusqu'à la Révolution.                             La seigneurie était la possession de l'Archevêque d'Arles au XIIe siècle ce qui créa des conflits avec la maison des Baux.                                   En 1206 Alphonse comte et marquis de Provence, donne en fief à Hugues des Baux , le château de Mouriès qui était au XIe siècle un castrum fortifié qui tenait lieu de château et de village.Le château fut détruit en 1394 par Raymond de Turenne à la fin du XIVe siècle et rasé au XVIe siècle lors des guerres de religion.                            BRAU; Gentilhommière  de style renaissance construite en 1560  par la famille de Jeanne de Quiqueran baronne des Baux et femme du gouverneur des Baux, son fils Quiqueran de Beaujeu grand maître de l'ordre de Malte, plus tard un La Tour surnommé le Brau donna son nom au château, fut habité au XVIIIe siècle  par le hollandais Van Ens.                                                                         Dans la commune, bâtisse  de Servanes, du XVIe siècle Le château de Joyeuse-Garde donné par le roi René à sa deuxième femme Jeanne de Barral, le château de Malaceris Viguery et le château de Beauregard aux façades du XIXe siècle avec  golf.","architecture":"Mouriès;  possédait un oppidum appelé oppidum des Caisses, de nombreuses fouilles en cours. Du château on peut  discerner des vestiges sur le chaînon du Castellas.                                                                   Village fortifié (500 ans av-JC) vestiges de remparts au nord-ouest qui ont été  plusieurs fois reconstruits;                                                           Brau: Gentilhommière  de style renaissance.","habitants":"Jeanne de Quiqueran\r\n        \"","divers":"Vestiges de l'oppidum Mouries et château de Brau","gps":"","images":["../../jctruffet.com/image/image_13/13_Mouries_Brau_1.jpg","../../jctruffet.com/image/image_13/13_Mouries_Brau_2.jpg"]},"Consult_chateau_formulairec05e":{"id":"Consult_chateau_formulairec05e","dept":"13","canton":"Châteaurenard","commune":"Noves","nom":"Noves","type":"Vestiges","periode":"XII","histoire":"NOVES; au Xe siècle propriété de l'évêque d'Avignon, qu'il nomma terre de Sainte-Marie et de Saint-Etienne, Au XIVe siècle le château fut construit par les Laure de Noves, le village s'est groupé au pied du château dans le quartier de Bourian et protégé par une enceinte dont  il reste peu de vestiges. Au XIIe siècle le château est construit sur le rocher et le village et l'église reçoivent des fortifications  et une porte dite de l'horloge.","architecture":"Noves; La partie ancienne de la ville est une forteresse entourée de  remparts du XII et XIVe siècle dont  ils subsistent trois portes médiévales crénelées.","habitants":"évêque d'Avignon\r\n        \"","divers":"Vestiges des remparts et porte","gps":"","images":["../../jctruffet.com/image/image_13/13_Noves_1.jpg","../../jctruffet.com/image/image_13/13_Noves_2.jpg","../../jctruffet.com/image/image_13/13_Noves_3.jpg"]},"Consult_chateau_formulaire2cb9-2":{"id":"Consult_chateau_formulaire2cb9-2","dept":"13","canton":"Orgon","commune":"Orgon","nom":"Orgon","type":"Vestiges","periode":"XIII","histoire":"ORGON. Aux confins des Alpilles dominant la Durance , haut lieux de la Provence au XIIe siècle résidence des Templiers et des Hospitaliers de Saint-Jean de Jérusalem, en 1204 Alphonse comte de Provence remit le château au comte Guillaume de Forcalquier qui le renforça et en 1228 Raymond Béranger continua ces remaniements. En 1303 Gabriel de Salvagi de Génes reçoit  la seigneurie de Charles le Boiteux et en 1338 la  repasse à Raymond d'Agoult. Après la donation de la reine  Jeanne en 1379 d'autres concessions auront lieu en 1424-1435-1438 jusqu'à ce que le roi René l'ait comprise dans la dot de sa fille Yollande d'Anjou marié à Ferry II de Lorraine, comte de Vaudémont et de Guise. Cette seigneurie conservera ce château durant plus de trois siècles jusqu'à la Révolution. Le château fut démoli la première fois par les sires de Baudricourt en 1481 sur ordre de Louis XI reconstruit ensuite et détruit à nouveau sur ordre de Richelieu. En 1562 le baron des Adrets saccage l'église paroissiale profane le sanctuaire Nôtre-Dame de Beauregard et précipite dans le vide la madonne vénérée  qui restera intacte. C'est en 1653 que la communauté d'Orgon reçoit d'Henri de Guise lors du passage de Louis XIV bénéficie d'un allègements d'impôts. Charles Soulier président du club de la Liberté-Egalité fut assassiné le 15 février 1795.                   Dans la commune  sur le plateau le domaine de Valdition ou François Ier en fit don à sa fille naturelle Caroline de Prévot, elle épousa Sieur Dacla de Châteaubert, cette famille conserva le domaine pendant cinq siècles.","architecture":"Orgon;  Sur le rocher qui domine le bourg reste des Fortification de l'oppidum de Beauregard, Vestiges du château appelé  château des ducs de Guise, joua un rôle important au XIIIe siècle, place forte prison  démoli et reconstruit et finalement démoli, on entre dans la vieille ville par une porte fortifiée la porte de la Durance qui était un péage des comtes de Provence. Malgré les fortifications le château  fut ravagé par le baron des Adrets qui détruisit également l'église.","habitants":"Gabriel de Salvagi de Génes \r\n        \"","divers":"Vestiges du château d'Orgon et domaine de Valdition.","gps":"","images":["../../jctruffet.com/image/image_13/13_Orgon_1.jpg","../../jctruffet.com/image/image_13/13_Orgon_2.jpg","../../jctruffet.com/image/image_13/13_Orgon_3.jpg","../../jctruffet.com/image/image_13/13_Orgon_4.jpg","../../jctruffet.com/image/image_13/13_Orgon_5.jpg","../../jctruffet.com/image/image_13/13_Orgon_6.jpg"]},"Consult_chateau_formulairebf88":{"id":"Consult_chateau_formulairebf88","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Palais_Pharo","type":"Palais","periode":"XIX","histoire":"Palais du PHARO: En 1870 le palais du Pharo,  résidence impériale construite pour Napoléon III sur un promontoire  de la tête de Maure par l'Architecte Vauder et Lefuel reprit par  Espérandieu, architecte de la ville  sur le terrain offert par cette dernière lors de sa visite  en 1856, terrain  qui fut partagé en deux  pour le passage d'un boulevard.  Au XIXe siècle fut utilisé uffet.com/image/image_13/13_Panisse_2.jpg","../../jctruffet.com/image/image_13/13_Panisse_3.jpg"]},"Consult_chateau_formulaire8111":{"id":"Consult_chateau_formulaire8111","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Pastre_Marseille","type":"Château","periode":"XIX","histoire":"PASTRE; Jean-Baptiste Pastré président de la chambre de commerce de 1852 à 1866 achète un vaste domaine transformé en parc pour y recevoir des autruches, fit appel à Jean Danjoy architecte  du gouvernement pour y construire la bastide dans la paroisse de Sainte-Eusébie  en 1855 à 1858 dans un style byzantin, de nombreuses fêtes furent organisées sous le second Empire. Aujourd'hui propriété de la ville de Marseille, abrite le musée de la faïence de Provence.","architecture":"Pastré: Bastide de pierre et de briques au charme provençal, corps de logis rectangulaire, deux niveaux avec attiques façade avant corps de forme arrondie saillant entre deux pavillons saillants également  aux extrémités.","habitants":"Jean-Baptiste Pastré\r\n        \"","divers":"Château de Pastré","gps":"","images":["../../jctruffet.com/image/image_13/13_Pastre_Marseille_1.jpg","../../jctruffet.com/image/image_13/13_Pastre_Marseille_2.jpg","../../jctruffet.com/image/image_13/13_Pastre_Marseille_3.jpg","../../jctruffet.com/image/image_13/13_Pastre_Marseille_4.jpg","../../jctruffet.com/image/image_13/13_Pastre_Marseille_5.jpg"]},"Consult_chateau_formulaired607":{"id":"Consult_chateau_formulaired607","dept":"13","canton":"Aix-en-Provence","commune":"Aix-en-Provence","nom":"Pavillon_Vendome","type":"Manoir","periode":"XVII","histoire":"Pavillon VENDOME; Louis de Mercoeur, fils de César de Vendôme duc de Vendôme est nommé en 1652  Gouverneur de Provence et veuf depuis 1657 de Laure Mancini, nièce du cardinal Mazarin, le duc étant tombé amoureux d'une belle aixoise la veuve d'Henri de Rascas seigneur du Cannet Lucrèce de Forbin-Solliers appelé \"La belle du Cannet\", le roi Louis XIV n'étant pas d'accord pour cela reçut la barrette de Cardinal. En 1664 il fit construire le Pavillon par l'architecte  Antoine Matisse qui termina la bâtisse en 1669 date à laquelle décéda le duc et  la belle Lucrèce pressé de le rejoindre survécut que deux ans. En 1670 le pavillon est acquis par Jean Baptiste Gautier de la Molle avocat au parlement d'Aix qui le remaniera, puis en 1730 le peintre Jean-Baptiste Van Loo en fit acquisition et le garda jusqu'à sa mort en 1745, reprit par Barthélemy Reboul qui émigra en Italie à la Révolution, puis revendu en 1818 à la congrégation du Sacré-Coeur pour y installer une école de jeunes filles, après la loi 1905 contraint d'abandonner leurs activités les religieuses vendent le pavillon à Monsieur Dobler, artiste décorateur qui se chargera de le reconditionner comme à l'origine et en 1953 le cède à la ville d'Aix, ces derniers  en on fait un musée municipal.","architecture":"Aix en Provence; construction de 1664 à 1669 de style simple d'un seul tenant, façades mélange atypique de baroque et de rigueur française rythmée par des pilastres, encadrant les ouvertures, balcon au premier étages, la toiture qui à l'origine était à la Mansart a été remplacé par un étage est remanié par un toit à tuiles plates.","habitants":"Louis de Mercoeur\r\n        \"","divers":"Pavillon Vendome","gps":"","images":["../../jctruffet.com/image/image_13/13_Pavillon_Vendome_1.jpg"]},"Consult_chateau_formulaire3763":{"id":"Consult_chateau_formulaire3763","dept":"13","canton":"Salon-de-Provence","commune":"Pelissanne","nom":"Pelissanne","type":"Vestiges","periode":"XV","histoire":"PELISSANNE; Ancienne ville fortifiée,  le beffroi de 1556 à l'emplacement du pont-levis qui commandait l'entrée du château. Le château de la Penne dont-il reste que de grosses ruines du donjon rectangulaire du XII-XIIIe siècle au sommet de la colline était utilisé pour stoker les bagnards en partance pour Cayenne, puis à servit de dépôt de munitions pour les allemands pendant la guerre  en 1944, il fut détruit par les anglais.","architecture":"Pelissanne; centre historique ancien, cité fortifiée, beffroi édifié en  1556 à l'emplacement du pont-levis qui commandait l'entrée du château lors de sa reconstruction  en 1702 on y fait un dôme en fer forgé , la fontaine du Peillon en 1770 construite par Pierre de Calissanne, ruines du Château.","habitants":"Seigneurs des Baux\r\n        \"","divers":"Vestiges du château","gps":"","images":["../../jctruffet.com/image/image_13/13_Pelissanne_1.jpg","../../jctruffet.com/image/image_13/13_Pelissanne_2.jpg","../../jctruffet.com/image/image_13/13_Pelissanne_3.jpg","../../jctruffet.com/image/image_13/13_Pelissanne_4.jpg","../../jctruffet.com/image/image_13/13_Pelissanne_5.jpg"]},"Consult_chateau_formulaire8898":{"id":"Consult_chateau_formulaire8898","dept":"13","canton":"Gardanne","commune":"Pennes-Mirabeau","nom":"Pennes_Mirabeau","type":"Vestiges","periode":"XV","histoire":"PENNES-MIRABEAU; La Provence fut crée pour Charles, fils du roi Lothaire en 855, empereur de l'occident.  Au Moyen-Age un château fort fut construit et le bourg se créa autour, en 1020 le fief passa à Bertrand de Guitto seigneur de Duras, puis en 1348 passa à la reine Jeanne qui confia la seigneurie à Louis de Tarante son mari , il sera inféodé pendant vingt ans par Guillaume-Roger de Beautfort seigneur des Baux en 1480 Louis XI héritera de la Provence et la seigneurie passa à la maison de Luxembourg en 1552 ou arriva Charles de Vento en 1578.   Louis XIV érigea en marquisat et restera sous la domination des seigneurs de Vento jusqu'à la Révolution où le marquis s'exila.                                 Cette commune était affilié avec Septèmes-les-Vallons  se sont séparé en 1790,  son histoire est mentionné au XIe siècle par une place fortifié doté d'un péage qui dépendait de l'abbaye de Saint-Victor de Marseille puis de l'évêché, la seigneurie fut acheté au XIVe siècle par le chevalier d'Augustine qui la gardera jusqu'à la Révolution et entre ces deux villages, la Mâle ou se trouve un château de la branche cadette de Boyer de Fonscolombe,  Emmanuel de Fonscolombe (1810-1875) compositeur titré baron de la Mâle en 1864 qui fut l'arrière grand-père de l'écrivain de Saint-Exupéry.","architecture":"Pennes Mirabeau; Vestiges de l'enceinte fortifiée et du premier château , le château forteresse (aujourd'hui mairie ) tour de guet à la Gazane.","habitants":"Bertrand de Guitto \r\n        \"","divers":"Château des Pennes-Mirabeau","gps":"","images":["../../jctruffet.com/image/image_13/13_Pennes_Mirabeau_1.jpg","../../jctruffet.com/image/image_13/13_Pennes_Mirabeau_2.jpg","../../jctruffet.com/image/image_13/13_Pennes_Mirabeau_3.jpg"]},"Consult_chateau_formulairee2ae":{"id":"Consult_chateau_formulairee2ae","dept":"13","canton":"Trests","commune":"Peynier","nom":"Peynier","type":"Château","periode":"XVIII","histoire":"PEYNIER; Signifié \"puy-noir\" au Moyen-Age, au XIe siècle fief des vicomtes de Marseille qu'ils cédèrent à l'abbaye de Saint-Victor de Marseille qui ces derniers au XIIe siècle fortifièrent  le prieuré et le donjon est complété au XIVe siècle pour le village qui créèrent des troubles.  A cette époque Guillaume de Marseille co-seigneurs de Peynier accorde des privilèges et des droits à la population et en 1411 le comte Louis II de Provence passe les terres à Jean de Sabran seigneur de Puyloubier et en 1463 propriété du roi René comte de Provence retransmettra ses terres à son conseiller Michel Matheron qui fit construire le château, son fils, filleul du roi René achète les parts des derniers descendants du vicomte  ainsi que les parts de l'abbaye de St-Victor. Le château qui est passé dans les mains de la famille d'Isoard de Chenerilles reste en course deux familles les Arthaud de  Matherons et les Durand lesquelles sont conseillé au parlement de Provence, garderont la seigneurie jusqu'à la fin du XVIIe siècle qui sera récupéré en totalité par la famille Thomassin, Alexandre II de Thomassin dit de Peynier son petit fils Louis 1705-1794 restera seigneur pendant 67 ans, fit parti du conseil au parlement de Provence en 1724,  puis marquis  et en 1763 intendant de la justice marine  et de la guerre à la Guadeloupe dont-il fera plusieurs allé et retour, il eu de nombreux enfants dont Jean-Luc qui acquit la baronnie de Trests Antoine carrière dans la marine. A la Révolution le marquis Louis  assiège dans son château de Peynier renonce à ses droits  est meurt en 1794 à Aix en Provence, la propriété est resté dans la famille jusqu'en 1933 racheté par l'archevêché d'Aix pour en faire une école et aujourd'hui racheté par la commune.","architecture":"Peynier; le village a conservé de nombreux vestiges du Moyen-Age  présence d'un donjon de la fin du XIIe siècle  intégré dans une maison de rue, l'impasse des remparts,  l'ancien presbytère fait partie de l'ancien château de Clastre qui abrite le prieuré Saint-Julien. Remparts en partie conservé du XII-XIIIe siècle munis de tours du XIVe siècle.","habitants":"Alexandre II de Thomassin \r\n        \"","divers":"Château de Peynier","gps":"","images":["../../jctruffet.com/image/image_13/13_Peynier_1.jpg","../../jctruffet.com/image/image_13/13_Peynier_2.jpg","../../jctruffet.com/image/image_13/13_Peynier_3.jpg","../../jctruffet.com/image/image_13/13_Peynier_4.jpg","../../jctruffet.com/image/image_13/13_Peynier_5.jpg","../../jctruffet.com/image/image_13/13_Peynier_6.jpg"]},"Consult_chateau_formulaire0594":{"id":"Consult_chateau_formulaire0594","dept":"13","canton":"Aix-en-Provence","commune":"Peyrolles-en-Provence","nom":"Peyrolles","type":"Château","periode":"XIII","histoire":"PEYROLLES:  appelé aussi château du roi René.  Au XIIe siècle fief  de la famille de Cavaillon,  que c'est dernier la vendirent au XIIIe siècle à Guy de Fos,  archevêque d'Aix restera dans le domaine épiscopal jusqu'en 1475. Le roi René le Bon, comte de Provence  échange les domaines de Gravesson et d'Aups contre Peyrolles ou il fera effectuer des travaux, à la mort du roi René le domaine passe à Charles III comte du Maine et en 1481 la Provence devient française, Louis XI  y installe des officiers  et passe à François-Marie de Cazeneuve  qui le remaniera et en 1668 le roi de France Louis XIV cède  Peyrolles au baron d'Oppède intendant de la Provence à l'époque, et à sa mort, son fils vend en 1681 à Antoine de Laurens conseiller du roi qui gardera la propriété comme seigneurie jusqu'à la Révolution, et après cette dernière la fille unique de Marie-Marguerite de Laurens, Marie-Henriette-Adélaïde de Boisgelin fait passer le château à la marquise de Lioux en 1817, en morcelant le château qui passera une mauvaise période, puis le marquis de d'Arlatan racheta les différentes parts  et sera de nouveau morcelé en 1856 et en 1861 et en 1863 la commune racheta une partie de l'édifice pour école est mairie  et par des propriétaires particuliers.","architecture":"Peyrolles; Trois tours de l'ancienne enceinte du XVIe siècle subsistent,  l'une a été transformé en beffroi au XVIIe siècle.  Château qui à l'origine du XIIIe siècle  agrandit au XIVe siècle par les prélats et au XVe siècle par le roi René.                                   En 1762, travaux de consolidation  et nouvel aménagement de la cour d'honneur,  pour y accéder une entrée monumentale avec portail en hémicycle  flanquait de pavillons,  trois  corps de logis en forme de U à trois niveaux, fronton triangulaire sur  partie du corps central saillant, tour ronde crénelée sur la partie arrière.","habitants":"famille de Cavaillon\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_13/13_Peyrolles_1.jpg","../../jctruffet.com/image/image_13/13_Peyrolles_2.jpg","../../jctruffet.com/image/image_13/13_Peyrolles_3.jpg","../../jctruffet.com/image/image_13/13_Peyrolles_4.jpg","../../jctruffet.com/image/image_13/13_Peyrolles_5.jpg"]},"Consult_chateau_formulaire117d":{"id":"Consult_chateau_formulaire117d","dept":"13","canton":"Aix-en-Provence","commune":"Aix-en-Provence","nom":"Pioline","type":"Manoir","periode":"XVII","histoire":"PIOLINE, ce domaine a reçu des hôtes célèbres:  Charles Quint 1536 lors du siège de Marseille et Catherine de Médicis  en 1579 pour y signer un traité de paix.  Au XVe siècle  Rodolphe Verdaches seigneur propriétaire et constructeur  du domaine qui devait être un moulin qui fut baptisé  en 1579  \"Beauvoisin\" par son nouveau propriétaire  Arnaud Borelli trésorier général du roi en Provence qui décéda en 1592, fut érigé  en seigneurie par Henri III , seigneurie vendu en 1613 à Guillaume du Vair, président au parlement de Provence qui le revendit   en 1616  à  Reynaud de Piolenc seigneur de Cornillon et nommera le domaine \"la Pioline\", en 1760  Philippe de Meyronnet marquis de Châteauneuf  ( gendre de d'Honoré-Henri de Piolenc Montauban seigneur de Beauvoisin ) Paul-Joseph de Meyronnet  fit agrandir le château ce domaine passa sans problème la Révolution, les propriétaires s'étant fixé sur Paris, vend le domaine à un négociant qui le cède en 1829 au duc de Blacas s'en défait presque aussitôt,  divers propriétaires se succèdent pour finalement passer en 1934  à la famille de Villèle.                             Un incendie se déclare détruisant une partie de l'aile nord, le château fut revendu à un négociant de bois qui abat une grande partie du parc et en 1969 revendu à nouveau mais c'est l'anarchie dans l'organisation du parc et des dépendances ou en 1970 Monsieur Vian finit par le racheter pour le sauver et lui redonner sa splendeur initiale. Aujourd'hui serait transformé en hôtel restaurant par Véronique Chicheportiche.","architecture":"Pioline; Le corps de logis principal du XVIe et XVIIe siècle, à deux niveaux, grande façade et sur la porte d'entrée une corniche seul ornement, deux ailes en retour lui seront attribué en 1770.","habitants":"Reynaud de Piolenc\r\n        \"","divers":"Château de la Pioline","gps":"","images":["../../jctruffet.com/image/image_13/13_Pioline_1.jpg","../../jctruffet.com/image/image_13/13_Pioline_2.jpg"]},"Consult_chateau_formulaire803c-2":{"id":"Consult_chateau_formulaire803c-2","dept":"13","canton":"Martigues","commune":"Port-de-Bouc","nom":"Port_de_Bouc","type":"Fort","periode":"XIII","histoire":"PORT-de-BOUC;  Qui fut crée en 1866 par le détachement de Fos sur Mer et de Martigues.                                                                Le fort de Bouc au XIIIe siècle il y avait une seule tour carré défensive, elle porte aujourd'hui un phare, elle fut bastionné au XVII-XVIIIe siècle.   En 1536 Charles Quint envahit la Provence  et charge l'amiral Génois  André Doria d'enlever l'îlot et le fort,  place invaincu qui servit de prison au XVIIe siècle par Richelieu, ou fut emprisonné Laurent de Cariolis qui finira ses jours dans cette prison, président au parlement d'Aix coupable de s'être rangé aux côtés  de Gaston d'Orléans.                                                               Port de Bouc et fort Vauban sur l'ilot de Bouc à l'entrée de l'étang de Caronte; fort Vauban qui dépend de la ville de Martigues, qui fut amélioré par ce dernier en 1604 transformé en citadelle réunis au ministère de la guerre en 1932 sert de phare par une tourelle rajouté sur la tour.","architecture":"Port de Bouc; Le fort de Bouc au XIIIe siècle il y avait une seule tour carré défensive elle porte aujourd'hui un phare, tour dite Castel Marsilhés entouré d'une enceinte bastionné par Vauban au XVII-XVIIIe siècle, aujourd'hui dépend de la ville de Martigues.                                      Martigues; Fort de Bouc, tour du XIIe siècle  entouré par le fort Vauban de 1664 et le château de Ponteau.","habitants":"fort Vauban\r\n        \"","divers":"Le fort de Bouc dit de vauban","gps":"","images":["../../jctruffet.com/image/image_13/13_Port_de_Bouc_1.jpg","../../jctruffet.com/image/image_13/13_Port_de_Bouc_2.jpg","../../jctruffet.com/image/image_13/13_Port_de_Bouc_3.jpg","../../jctruffet.com/image/image_13/13_Port_de_Bouc_4.jpg","../../jctruffet.                                                    ARNAJON; A l'origine pavillon de chasse de Louis XIV,  en 1655 le domaine appartenait au seigneur de Valfére et fut la demeure des Castillon, eu la visite de la reine mère d'Angleterre dans les années 50 avec le marquis de Saporta.                                          FONSCOLOMBE; Au XVIe siècle fief du seigneur du Puy  Sainte-Réparade tenu par l'archevêque d'Aix, passa au XVII aux Beaumont famille de parlementaire aixois qui y firent édifié un petit château. La seigneurie est acheté en 1715 par  Honoré Boyer d'Aiguilles conseiller secrétaire du roi,  riche et anoblie baron d'Aiguilles  fait reconstruire le château qui sera nommé Fonscolombe qui restera dans cette famille  jusqu'en 1821 qui passera par alliance  Irène fille d'Hippolyte de Fonscolombe à Auguste, marquis de Saporta, établis en France depuis le XVe siècle,  famille originaire d'Aragon est toujours dans la famille de Saporta.","architecture":"Puy-Ste-Réparade; entre le Luberon est Aix sur la Durance ou il reste des vestiges d'un morceau de château fort appelé le Quilho  à 460 mètres d'altitude  au dessus du village, oppidum celto-ligures et ruines du château médiéval, donjon dit tour à Signaux du XIIIe siècle.                                                                             \r\nArnajon; transformé en bastide au XVIIIe siècle perron et escalier en fer à cheval, bassins, terrasses, fontaines et grottes.                               Fonscolombe; Dans un grand domaine viticole, édifice rectangulaire à trois  étages deux tours cylindriques à toits pointus vernissés la façade sud  avec fronton triangulaire aux armoiries  des Saporta Ginestous, avec terrasse à balustres et escalier double orné de grands vases sculptés, remanié au XIXe siècle, très beau parc.","habitants":"Honoré Boyer d'Aiguilles \r\n        \"","divers":"Vestiges du Quilho, château d'Arnajon et Fonscolombe","gps":"","images":["../../jctruffet.com/image/image_13/13_Puy_Ste_Reparade_1.jpg","../../jctruffet.com/image/image_13/13_Puy_Ste_Reparade_2.jpg","../../jctruffet.com/image/image_13/13_Puy_Ste_Reparade_3.jpg"]},"Consult_chateau_formulaire7060":{"id":"Consult_chateau_formulaire7060","dept":"13","canton":"Aix-en-Provence","commune":"Puyricard","nom":"Puyricard","type":"Vestiges","periode":"XVII","histoire":"PUYRICARD; fief  des Archevêques d'Aix qui cohabité avec le seigneur Raymond des  Baux de 1283 à 1298, cette famille possédait en 1258 le château de Rostellane où du Grand St-Jean en  le château fut brûlé, pillé par Raymond des Baux d'ou sa condamnation, sur décision de Charles d'Anjou  les archevêques récupèrent La seigneurie ainsi que le domaine et le château de Lignanes.      En 1477 passe en héritage à Pierre de Cabannes seigneur de Graveson, puis par  les La Valette en 1587  ou le château subit des dégats important qui entraîna sa destruction.                         En 1658  l'archevêque d'Aix,  Grimaldi fit construire en 1657 un château qui portera son nom,  résidence grandiose qui après être appartenu à la famille de Vintimille qui trop onéreux a entretenir obtient de Louis XIV le droit de le démolir en 1709.                      Dans la commune le château d'Alphéran  de style Napoléon III construit en 1720 par la famille du Bussan servit de maison de campagne remanié au XXe siècle aujourd'hui chambres d'hôtes du vicomte de Thibault de Roquefeuil.                                                 GRAND-ST-JEAN;  à Saint-Jean la Salle, au XVIe siècle le domaine fut érigé en fief au profit de la famille Estienne dont François d'Estienne président au parlement d'Aix, le domaine fut transformé en manoir  et fut acheté par la famille Martiny. Dans ce manoir s'arrêta Louis XIII et Louis XIV.  Ils  le vendirent au XIXe siècle  à Ludovic d'Estienne, il fut endommagé pendant le tremblement de terre en 1909,  remanié par la fille \" Blanche\" de Ludovic d'Estienne de Saint-Jean, lègue  la propriété  à la ville d'Aix et en 1990 la ville en est propriétaire.                                       Le Clos des Sources bâtisse du XVIIe siècle devait faire partie du domaine du castellas des Grimaldi.","architecture":"Puyricard;  Du féodal ,il ne reste que des vestiges de ce château des archevêques, les autres sont des manoirs du XVI et XVIIe siècle.","habitants":"l'Evêque de Grimaldi\r\n        \"","divers":"Vestiges du château  des Grimaldi, d'Alphéran, du Grand-St-Jean et le Clos des Sources","gps":"","images":["../../jctruffet.com/image/image_13/13_Puyricard_1.jpg","../../jctruffet.com/image/image_13/13_Puyricard_2.jpg","../../jctruffet.com/image/image_13/13_Puyricard_3.jpg","../../jctruffet.com/image/image_13/13_Puyricard_4.jpg","../../jctruffet.com/image/image_13/13_Puyricard_5.jpg"]},"Consult_chateau_formulaireafc1":{"id":"Consult_chateau_formulaireafc1","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Regis","type":"Château","periode":"XIX","histoire":"REGIS; la famille Régis Louis armateur achète en 1868 le château de la Reynarde,  légué à la congrégation des pères de Timon David, la propriété  abrite le collège et un centre de loisirs.","architecture":"Régis; postiche Chenonceau fut bâti dans la pinède de la Reynarde par les architectes  Sixte Rey et Vaud  1860-1869 pour Louis Régis.","habitants":"famille Régis Louis \r\n        \"","divers":"Château Régis","gps":"","images":["../../jctruffet.com/image/image_13/13_Regis_1.jpg","../../jctruffet.com/image/image_13/13_Regis_2.jpg","../../jctruffet.com/image/image_13/13_Regis_3.jpg"]},"Consult_chateau_formulaire5b83":{"id":"Consult_chateau_formulaire5b83","dept":"13","canton":"Lambesc","commune":"La Roque-d`Anthéron","nom":"Roque_d_Antheron","type":"Château","periode":"XVII","histoire":"ROQUE-ANTHERON; du premier seigneur  Tarron cité, en 1212  dans une vente  au profit d'une abbaye Silvacane fondée en 1144 par des religieux venus de Monrimond, les premiers seigneurs  de la Roque,  vassaux de la maison des Baux,  puis des Pontevès qui occupèrent le château au dessus du village. Au XVe siècle  la seigneurie est acquise avec celle de Lambesc et de Janson par le roi René qui la cède à son gendre Charles de Lorraine, ce dernier fit don des seigneuries  de la Roque de Janson et Villelaure à son maréchal des logis  Jean de la Terre sa fille Antoinette épousera en 1504 Jean de Forbin fils de Palamède de Forbin gouverneur de Provence, cette famille fit construire le petit château pour Annibal de Forbin et en 1606 construction du grand château en 1653 érigé en marquisat pour le petit-fils d'Annibal Melchior de Forbin, la fille unique  de Melchior épouse Claude de Milan seigneur de Cornillon et de Confoux président au parlement de Provence jusqu'à la Révolution. Les biens des Forbins vendu comme bien nationaux, mais la famille récupère le domaine et en 1818 il fut cédé à Louis Raphaël de Cordoue, député de la Drôme et par alliance par sa fille passera le marquis de Florans et la dernière descendante lègue le château à l'archevêché en 1950 qui le transformeront en maison de repos et chaque année dans le parc festival de piano depuis 1981.","architecture":"La Roque d'Anthéron; Ruines du premier château féodal. Château construit en 1606, corps de logis en trois bâtiments autour d'une cour d'honneur avec murs crénelés,  flanqué de tours rondes, sur la façade architecture renaissance lucarne surmontée d'un fronton cintré sculpté d'une figure de femme;  avec ses quatre tours rondes plus élevés  d'un étage donne l'apparence plus massive que le petit château à gauche construit en 1598 flanquée de deux tours rondes.","habitants":"marquis de Florans \r\n        \"","divers":"Château de la Roque d'Anthéron fdit de Florans.","gps":"","images":["../../jctruffet.com/image/image_13/13_Roque_d_Antheron_1.jpg","../../jctruffet.com/image/image_13/13_Roque_d_Antheron_2.jpg","../../jctruffet.com/image/image_13/13_Roque_d_Antheron_3.jpg","../../jctruffet.com/image/image_13/13_Roque_d_Antheron_4.jpg","../../jctruffet.com/image/ima
