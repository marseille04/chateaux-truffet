const FULL={"Consult_chateau_formulaire1a2f":{"id":"Consult_chateau_formulaire1a2f","dept":"13","canton":"Aix-en-Provence","commune":"Aix-en-Provence","nom":"Aix_Patrimoine","type":"Château","periode":"XIX","histoire":"AIX en Provence; les châteaux environnant, du Tholonet (voir article).                                                                                         Le château noir du XIXe siècle.                                                  Le château Roques.                                                                            Le château de la Galice au Milles.                                              \r\nLe  Pavillon de Lanfant au Milles  ( voir article ).                              La Mignarde à Aix ( voir article).                                                      Le Pavillon Vendome à Aix (voir article).\r\nLe Château de la Pioline.                                                           \r\n Le château de  St-Pons au Milles ( voir article) et de nombreuses bastides dans la ville; Bel-Air XVIII, Brégues d'Or du  XVIII, Orcel XVII, la Repentance du XVII, Campagne Brugier ou Coustoulin du XVII, la Jas Bouffan propriété de Granel-Corsi  du XVII ou vécut Cézanne,  la Torse dit château XVII, la caserne Forbin XVII et le casino municipal, le château Gueidan et quatre tours Valabre ( voir article) et le château de Saint-Antonin du Bayon. A quelques kilomètres de  la tour \"Kerye\" ou tour \"César\" cylindrique  de 15 mètres  de haut évasée à la base qui servait de tour de guet pour la ville d'Aix surveillance des pillards de l'époque, cette tour fut surélevée en 1383 par le chanoine Isnard suite aux troubles  à la succession de la reine Jeanne, elle fut restaurée en 2007.","architecture":"Aix en Provence; de nombreux châteaux et manoirs; au XVIe et XVIIe siècle l'aristocratie voulait que pour avoir un hôtel particulier dans la ville d'Aix (quatre vingt recensé) ils devaient avoir un manoir ou une bastide dans les environs.  Les manoirs sont assez ressemblant à deux niveaux ou trois de formes rectangulaires avec escaliers en façades ou côté parc.","habitants":"Famille de Granel-Corsi \r\n        \"","divers":"Divers châteaux et la tour Keryé ou César.","gps":"","images":["../../jctruffet.com/image/image_13/13_Aix_Patrimoine_1.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_2.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_3.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_4.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_5.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_6.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_7.jpg","../../jctruffet.com/image/image_13/13_Aix_Patrimoine_8.jpg"]},"Consult_chateau_formulaire7065":{"id":"Consult_chateau_formulaire7065","dept":"13","canton":"Aix-en-Provence","commune":"Aix-en-Provence","nom":"Aix_Provence","type":"Patrimoine","periode":"X -XX","histoire":"AIX: Ancienne capitale de la Provence, fondée en 122 avant J-C. par la garnison romaine de Caius-Marius Sextius Calvinus, se développe sous le nom de Aquae Sextiae.  Référencé par les sources thermales (chaudes) encore exploité actuellement.                            La ville fut ensuite envahie par les Wisigoths, les Francs, les Lombards et en 731 par les Sarrasins. A partir du VIe siècle était le siège d'un  pouvoir ecclésiastique. Du IXe au Xe siècle, le royaume  dépendait de la Bourgogne, en 1032 le dernier roi de Bourgogne lègue la souveraineté de la Provence à son neveu l'empereur germanique Conrad le Salique.                                  Les comtes de Provence dont un comte  arrive a expulser les Sarrasins il fut nommé marquis et partagera le pouvoir de la Provence entre les seigneurs des Baux de Châteaurenard et des Fos. Le \"cour Mirabeau\" rue principale d'Aix construit à partir de 1649 à l'emplacement des remparts, renommé en 1876 par Mac Mahon en l'honneur d'Honoré Gabriel Riqueti de Mirabeau, élu représentant d'Aix au Tiers Etat en 1789.","architecture":"Aix en Provence; le patrimoine de la ville est principalement religieux  par le cloître du XIIe siècle la cathédrale Saint-Sauveur et églises. Des constructions néo-classiques et renaissances en ville ( hôtel de la noblesse qui devait avoir obligatoirement un château ou un manoir dans les environs) et le Turreluque ( tour octogonale  à mâchicoulis du XIVe siècle ) tour des thermes du XIVe siècle unique pièce restante de l'enceinte médiévale, cette enceinte se comportait de 39 tours. Les châteaux sont donnés par article individuel.","habitants":"Les comtes de Provence\r\n        \"","divers":"Diverses constructions  néo-classiques renaissances avec fontaine sur cour Mirabeau.","gps":"","images":["../../jctruffet.com/image/image_13/13_Aix_Provence_1.jpg","../../jctruffet.com/image/image_13/13_Aix_Provence_2.jpg","../../jctruffet.com/image/image_13/13_Aix_Provence_3.jpg","../../jctruffet.com/image/image_13/13_Aix_Provence_4.jpg","../../jctruffet.com/image/image_13/13_Aix_Provence_5.jpg","../../jctruffet.com/image/image_13/13_Aix_Provence_6.jpg","../../jctruffet.com/image/image_13/13_Aix_Provence_7.jpg"]},"Consult_chateau_formulairedc37":{"id":"Consult_chateau_formulairedc37","dept":"13","canton":"Aubagne","commune":"Gémenos","nom":"Albertas_Gemenos","type":"Château","periode":"XVI","histoire":"ALBERTAS, en 1563 le 20 Mai, deux frères négociants marseillais Nicolas et Gaspard d'Albertas achètent la seigneurie de Gémenos ils firent construire entre 1579 et 1590 un château appelé \"Albertas\", ce domaine possède un grand parc.  Par l'alliance de leur fils Henri-Reynaud en 1673 avec Magdeleine de Séguiran dont le père Henri de Séguiran premier président de la cour des comptes devient lui aussi président à la cour  et devient propriétaire du domaine de Bouc-Bel-Air dont un château fut prévu  par son fils Jean-Baptiste d'Albertas mais jamais construit, par contre un parc magnifique fut créé en 1750 à 1780 est existe toujours.  Jean-Baptiste d'Albertas possédait des terres à Gemenos, dont le château  en 1790  il fut assassiné à Gémenos alors qu'il offrait un banquet à la garde nationale à l'honneur de la fête de la fédération. Son fils Jean-Baptiste-Suzanne sera nommé pair de France par Louis XVIII et nommé préfet des Bouches du Rhône. Le château fut acheté par la commune en 1893, transformé en hôtel de Ville et en 2002 une rénovation s'impose. Dans la commune Prieuré de Saint-Jean de Garguier du XVIIe siècle et château de Magny à toits vernicés.","architecture":"Albertas; a Gémenos château construit au XVIIIe siècle, à trois niveaux avec attiques, toits presque plats avec clocheton au centre tour en angles arasées devenue hôtel de ville, possède une rampe célèbre en  fer forgée.                                                                                 Le château du prieuré possède deux tours rondes crénelées en façade.","habitants":"Famille d'Albertas\r\n        \"","divers":"Le château d'Albertas et des Creissauds","gps":"","images":["../../jctruffet.com/image/image_13/13_Albertas_Gemenos_1.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_2.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_3.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_4.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_5.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_6.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_7.jpg","../../jctruffet.com/image/image_13/13_Albertas_Gemenos_8.jpg"]},"Consult_chateau_formulairead55":{"id":"Consult_chateau_formulairead55","dept":"13","canton":"Marseille","commune":"Allauch","nom":"Allauch","type":"Vestiges","periode":"XII","histoire":"ALLAUCH; Au Xe siècle Allauch, banlieue de Marseille fut assiégé par les Maures. Le château de Ners dont les châtelains étaient nommés par les prévôts  du chapitre de Marseille, les chanoines en assuraient  la police  le premier connu Aycard Blanc; Le fief  appartenait aux évêques de Marseille en 1164, ensuite  à Raymond Ier comte de Provence, les fortifications sont du XIIe siècle ainsi que les vestiges de poterne et de remparts, il y eu la construction de Nôtre-Dame du Château prieuré fierté des Alllauchiens qui est devenu un lieu de pèlerinage ou les chanoines demeurèrent jusqu'à la Révolution et furent seigneurs  spirituels du lieu.  Sur la butte des Pichouris  le château de la reine Jeanne dit le  \"Casteou Vielh\". le quartier des Bellons ou habita la famille Pagnol.                       Dans la commune  un château dit de Fontvieille du XIXe siècle, château de Vallombert (ancienne demeure  de Baltazard de Vias) et le château de Carlavan.","architecture":"Allauch. Ancien bourg fortifié reste de l'enceinte  du XIIe et XVe siècle, remparts, tours carrées et rondes, poterne du XIIe siècle, ruines du château de Ners dans le vallon du Pichouris.     les châteaux cités sont dans le style provençaux rectangulaires à quatre tours rondes souvent arasées avec frontons en façades.","habitants":"Les comtes de Provence\r\n        \"","divers":"Vestiges château de Ners, château du Carlavan.","gps":"","images":["../../jctruffet.com/image/image_13/13_Allauch_1.jpg","../../jctruffet.com/image/image_13/13_Allauch_2.jpg","../../jctruffet.com/image/image_13/13_Allauch_3.jpg","../../jctruffet.com/image/image_13/13_Allauch_4.jpg","../../jctruffet.com/image/image_13/13_Allauch_5.jpg"]},"Consult_chateau_formulaire52bd":{"id":"Consult_chateau_formulaire52bd","dept":"13","canton":"Eyguières","commune":"Alleins","nom":"Alleins","type":"Vestiges","periode":"XII","histoire":"ALLEINS; En 1257 Charles Ier comte de Provence et de Forcalquier vend  à  Benoit  d'Alignan évêque de Marseille tous les droits de la haute ville de Marseille en échange du château d'Alleins, comportant les territoires de Lamanon, d'Aurons, Vernègues, Mallemort et Senas. Du château du XIIe siècle fortifié au XIVe siècle et enceinte du XVe siècle, il ne reste que quelques traces et une tour ronde.  Nicolas de Renaud était seigneur en 1494 noble famille d'Arles gentilhomme de chambre de Charles VIII comte de Provence.  Nicolas fut nommé ambassadeur de Gènes puis de Rome, ils reçut la seigneurie d'Alliens en remboursement d'une facture que Charles VIII lui devait, il épousa Marguerite de Quiqueran en 1500 fit agrandir le château, le domaine passa en marquisat en 1695 resta dans cette famille avec quatre générations de marquis jusqu'à la Révolution, suite à cela ils émigrèrent en Suisse, le château est détruit et les biens furent vendus comme bien national.","architecture":"Alleins;  du château médiéval du XVe siècle il ne reste que des ruines de courtines ou de remparts et une tour d'escalier du XVIe siècle sur la colline dominant le village, une tour de l'horloge du XVIe siècle et une autre tour ronde arasée à l'entrée du village.","habitants":"Nicolas de Renaud\r\n        \"","divers":"Vestiges du château médiéval d'Alliens et porte ancienne.","gps":"","images":["../../jctruffet.com/image/image_13/13_Alleins_1.jpg","../../jctruffet.com/image/image_13/13_Alleins_2.jpg","../../jctruffet.com/image/image_13/13_Alleins_3.jpg","../../jctruffet.com/image/image_13/13_Alleins_4.jpg","../../jctruffet.com/image/image_13/13_Alleins_5.jpg","../../jctruffet.com/image/image_13/13_Alleins_6.jpg","../../jctruffet.com/image/image_13/13_Alleins_7.jpg"]},"Consult_chateau_formulaire71d4":{"id":"Consult_chateau_formulaire71d4","dept":"13","canton":"Trests","commune":"Fuveau","nom":"Arc_Fuveau","type":"Château","periode":"XVII","histoire":"ARC. Château construit par la famille  de Marc-Antoine de Vitalis coseigneur de Fuveau ou  de Boutassi en 1629, en 1687 la seigneurie fut érigée en marquisat  pour Charles de Boutassi seigneur de Rousset et de Fuveau, trésorier général de France, qui prit le titre de Marquis de Château d'Arc qui se dernier resta dans la descendance jusqu'au XVIIIe siècle,  puis passa dans différentes mains avant d'appartenir après la Révolution  à la famille de Guerrin, partagé entre héritiers, et en 1854 acquit par un notaire d'Aix, fut la propriété de Bernard Buffet et vendu à la famille Jessé-Charleval  qui le transformera en complexe hôtelier doublé d'un superbe golf.                                                                            FUVEAU:  faisait au XI-XIIe siècle des fiefs des comte de Provence, en 1300 un Jean de Puget   était seigneur il fut anobli par le roi René, cette dynastie après avoir construit  le château s'éteint au XVIIe siècle, le domaine passera dans plusieurs mains puis arriva dans celle du Marquis de Thomassin de la Garde et aux d'Hupay de Sisteron  vers le milieu du XVIIIe siècle qui le remanieront.","architecture":"Arc; Château a deux niveaux avec attiques de 1629 flanquée de tours rondes en façade récemment couverte de vieilles tuiles depuis changés, les communs et l'ancienne chapelle font partie du domaine morcelés en plusieurs appartement que se partagent plusieurs copropriétaires.                                                                                  Château Puget de plan rectangulaire à deux niveaux avec attiques. Porte de Bassac.","habitants":"Bernard Buffet\r\n        \"","divers":"Château d'Arc et de Puget.","gps":"","images":["../../jctruffet.com/image/image_13/13_Arc_Fuveau_1.jpg","../../jctruffet.com/image/image_13/13_Arc_Fuveau_2.jpg","../../jctruffet.com/image/image_13/13_Arc_Fuveau_3.jpg","../../jctruffet.com/image/image_13/13_Arc_Fuveau_4.jpg","../../jctruffet.com/image/image_13/13_Arc_Fuveau_5.jpg"]},"Consult_chateau_formulaire2e76":{"id":"Consult_chateau_formulaire2e76","dept":"13","canton":"Arles","commune":"Arles","nom":"Arles_Armellieres","type":"Vestiges","periode":"XII","histoire":"ARLES; Ville d'art et d'histoire, traversée par le Rhône appelé à l'époque romaine Arelate qui signifie \"prés de l'étang\",  vestiges encore debout  des romains, arène, buste de César et Neptune etc.                                 Après la décadence de l'empire romain, elle devient le siège épiscopal, assiégé par les Visigoths au Ve siècle, Burgodes, Francs et Sarrasins se succéderont.     Au VIe siècle passe sous protectorat  Ostrogoths, puis à la branche Mérovingiennes, les Sarrasins et à la mort de Charlemagne rattaché au royaume de France en 855 et en 879  Boson se fait sacrer roi de Provence et de Bourgogne. Au Xe siècle Hugues d'Arles s'installe à Arles régent de Louis l'Aveugle passe à Conrad II première dynastie des comtes de Provence avec le comte Guillaume Ier qui chassa les Sarrasins. Au XIIe siècle affrontement des familles Barcelone et de Toulouse Frédéric de Barberousse se fait sacrer roi d'Arles. Au XIIIe siècle confronté aux Albigeois et en 1251 Charles d'Anjou, passa en 1483 au Capétiens. Cette ville qui connut beaucoup de conflits  au XIVe siècle par les ecclésiastiques  et peste à la fin du Moyen-Age, la société Arlésienne est une société pastorale  avec une noblesse  nombreuse et riche qui va dominer la ville jusqu'à la Révolution. Arles eu la visite royale de Charles IX Catherine de Médicis et Henri IV. Mis à part les églises et cloîtres le patrimoine privé est important  surtout en hôtels.                      \r\nARMELLIERE; construit en 1606 par Pierre de Sabatier famille anoblie  en 1572 qui donna plusieurs consuls à la ville, ancien compagnon d'armes d'Henri IV, Fut le siège d'une bergerie royal de mérinos au début du XIXe siècle, devenu grand domaine viticole.                     Dans la commune château de Brunet.","architecture":"Arles; Ville à grand passé historique Romain en particulier par théâtre antique et arène qui ont été transformées en château, munie de donjon fortifié,  des fortifications vestiges de remparts  ( enceintes bases et tours), porte de la Redoute et tour de la Momges, ancienne tour de la Roquette et porte de la Cavalerie du XIe siècle qui comportait  un pont  levis rebâtie au XVIe siècle les tours furent préservées.                                                        Armellière, style renaissance demeure de plaisance et défensif cantonnée de deux tours carrées au sud et de deux hautes échauguettes sur culots au nord, le tout coiffées de coupole ainsi que le lanternon.                                                              Château de  Brunet corps de logis à trois niveaux de formes rectangulaires, terrasses à balustrades et clochetons sur le toit.","habitants":"Charles d'Anjou\r\n        \"","divers":"Vestiges des rempats d'Arles, Arènes , César, bâtiments renaissance , Arméllière et château de Brunet.","gps":"","images":["../../jctruffet.com/image/image_13/13_Arles_Armellieres_1.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_2.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_3.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_4.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_5.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_6.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_7.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_8.jpg","../../jctruffet.com/image/image_13/13_Arles_Armellieres_9.jpg"]},"Consult_chateau_formulaire070a":{"id":"Consult_chateau_formulaire070a","dept":"13","canton":"Aubagne","commune":"Aubagne","nom":"Aubagne","type":"Vestiges","periode":"XV","histoire":"AUBAGNE;  Fief de L'abbaye de saint-Victor de Marseille, passa aux vicomtes de Marseille, érigé en baronnie au XVe siècle, la baronnie d'Odon de Vilars qui avait épousé Alix de Baux.              En 1474 suite à un échange Aubagne devient la propriété de l'évêque de Marseille et appartient à ses successeurs jusqu'à la Révolution. Aubagne s'est développé industriellement ce qui a déclenché des constructions de châteaux, tel que le château de Creissauds à St-Mitre  résidence secondaire d'un armateur marseillais monsieur Henri de Saver qui reconstruisit le château au XIXe siècle sur les restes de la  bâtisse du XVIIIe siècle, transformé aujourd'hui en hôtellerie et manifestations de spectacles, le  château de Favary du XIXe siècle transformé en chambres d'hôtes par monsieur de Saint-Aubin, Château de la Gelade ou Calade dont il reste des vestiges suite à sa destruction au XVIe siècle, château de l'Huveaune (camp Viénot), le Castel Margot (centre aéré), la Demande, l'Aumone (Maison de repos)le château de Ligières  (service de l'équipement) et le Montgrand.","architecture":"Aubagne; Sur la colline, il existe les ruines d'un château et d'un vieux village médiéval, vestiges de remparts encore visibles rue du Gachiou,  porte Gachiou XVe siècle, tour de l'Horloge 1900.","habitants":"Famille d'Odon de Vilars\r\n        \"","divers":"Château de Favary et Creissauds","gps":"","images":["../../jctruffet.com/image/image_13/13_Aubagne_1.jpg","../../jctruffet.com/image/image_13/13_Aubagne_2.jpg","../../jctruffet.com/image/image_13/13_Aubagne_3.jpg","../../jctruffet.com/image/image_13/13_Aubagne_4.jpg"]},"Consult_chateau_formulaire7e9d":{"id":"Consult_chateau_formulaire7e9d","dept":"13","canton":"Eyguières","commune":"Aureille","nom":"Aureille","type":"Vestiges","periode":"XIII","histoire":"AUREILLE; Au coeur des Alpilles; le fief dépendait de la ville d'Arles,  en 1224 Bertrand Ybilion propriétaire du château  qui protégé la partie orientale  de la ville d'Arles finit par céder le château  à la communauté d'Arles.  Les fortifications relèvent de l'Archevêché d'Arles, le comte de Provence et  Raymond de Turenne combattront pour assurer la propriété a ces derniers.                            Aureille suite aux querelles militaires et politiques des seigneurs entraîneront sa destruction  en 1593  qui abritait une garnison et des opposants à Henry IV, ruiné et déserté par ses luttes et ce n'est qu'au XVIIIe siècle que le territoire est acquis par madame Louise d'Ancezine, dame de Saint-Chaumont qui achète au consul d'Arles pour le revendre en parcelles agricoles et pour repeupler le village.","architecture":"Aureille; il ne reste que des vestiges du château médiéval du XIIIe siècle, bases de donjon corps de logis et remparts, lieu privé.","habitants":"madame Louise d'Ancezine\r\n        \"","divers":"Vestiges du château féodal d'Aureille.","gps":"","images":["../../jctruffet.com/image/image_13/13_Aureille_1.jpg","../../jctruffet.com/image/image_13/13_Aureille_2.jpg","../../jctruffet.com/image/image_13/13_Aureille_3.jpg","../../jctruffet.com/image/image_13/13_Aureille_4.jpg"]},"Consult_chateau_formulaire82b2":{"id":"Consult_chateau_formulaire82b2","dept":"13","canton":"Arles","commune":"Ste-Marie de la Mer","nom":"Avignon_Camargue","type":"Château","periode":"XVIII","histoire":"AVIGNON; En pleine Camargue, dans la propriété du mas de Someyre qui a était acquise en 1720 par Jeanne d'Arlatan, simple bastide au bord du petit Rhône, le fils de Jeanne qui hérita de l'immense domaine, Jean-François-Joseph d'Avignon d'Arlatan  fera construire le château sur l'emplacement de la Bastide en 1739 et portera son nom. A son décès sans postérité, le château passe par plusieurs mains avant d'être  acquis en 1811 par le général Comte Miollis ( Général d'Empire 1759-1828 ), et a son décès le château fut acheté en 1893 par Louis Noilly-Prat déjà propriétaire du château de Montcalm qui s'en servit de relais de chasse, le remaniera et à son  décès en 1932 resta dans la descendance au comte Louis Pastré qui le revendit  en 1984 au Conseil Général des Bouches du Rhône.","architecture":"Avignon; Construit en 1739 sur les bases de l'ancienne bastide, remanié au début du XIXe siècle et en 1893 est composé d'un corps central à trois niveaux, travée centrale à fronton et deux pavillons à flanc d'ailes à deux niveaux surbaissés, et au centre de l'édifice, une petite tour carrée formant un belvédère et flanquée d'un campanile.","habitants":"Jeanne d'Arlatan                                                                          Louis Noilly-Prat \r\n        \"","divers":"Château d'Avignon.","gps":"","images":["../../jctruffet.com/image/image_13/13_Avignon_Camargue_1.jpg","../../jctruffet.com/image/image_13/13_Avignon_Camargue_2.jpg","../../jctruffet.com/image/image_13/13_Avignon_Camargue_3.jpg"]},"Consult_chateau_formulairec2b0":{"id":"Consult_chateau_formulairec2b0","dept":"13","canton":"Marseille","commune":"Marseille","nom":"Bagatelle","type":"Villa","periode":"XX","histoire":"BAGATELLE; villa construite en 1903 par Henri Neagely négociant en coton, c'est un de ses fils qui fit construire la villa, dans les années 1920 plusieurs propriétaires se succèdent, qui passe à Antoine d'Estournel et ensuite en 1925  à Pierre Virabien industriel. le domaine comprend le château, la maison du garde, les écuries, une villa nommée maison blanche et un grand parc.  En 1938 le domaine morcelé Monsieur Baude consul général d'Allemagne occupe le château tandis que la Maison Blanche est loué au consul général des USA. L'ensemble du domaine et dépendances sont réquisitionnés par la marine nationale comme résidence de l'Amirauté, c'est l'amiral Muselier qui l'occupe jusqu'en 1942 jusqu'à ce que l'armée Allemande s'en empare. De nouveau divisé la villa Bagatelle habitée par les Boissieux, et en 1973  le domaine est acheté par la ville de Marseille pour héberger le service de sécurité  et la villa en mairie du quatrième.","architecture":"Bagatelle; Villa appelé château de plan rectangulaire à deux niveaux avec pavillons carrés à toit à deux pans saillants sur angle, balcon et escalier.","habitants":"Famille de Henri Neagely\r\n        \"","divers":"Villa Bagatelle","gps":"","images":["../../jctruffet.com/image/image_13/13_Bagatelle_1.jpg","../../jctruffet.com/image/image_13/13_Bagatelle_2.jpg","../../jctruffet.com/image/image_13/13_Bagatelle_3.jpg"]},"Consult_chateau_formulaire4bd2":{"id":"Consult_chateau_formulaire4bd2","dept":"13","canton":"Arles","commune":"Raphèle-les-Arles","nom":"Barbegal","type":"Château","periode":"XVI","histoire":"BARBEGAL ;château dont une partie date du XVIe siècle, il fut détruit par un incendie et reconstruit au environ de 1850, la tour crénelée et la partie centrale font parti de la reconstruction, Il fut racheté après une période à l'abandon pour être transformé en hôtel de luxe par la famille Foucray.","architecture":"Barbegal: château reconstruit au XIXe siècle dans un style renaissance à deux niveaux corps de logis en longueur flanqué de tours rondes à bandeau de pierres et crénelées aux extrémités en façade.","habitants":"Famille Foucray\r\n        \"","divers":"Château Barbegal","gps":"","images":["../../jctruffet.com/image/image_13/13_Barbegal_1.jpg","../../jctruffet.com/image/image_13/13_Barbegal_2.jpg","../../jctruffet.com/image/image_13/13_Barbegal_3.jpg"]},"Consult_chateau_formulaire9883":{"id":"Consult_chateau_formulaire9883","dept":"13","canton":"Salon-de-Provence","commune":"La Barben","nom":"Barben","type":"Château","periode":"XVI","histoire":"BARBEN; Perché sur un roc, cité en 1063, un château dépendait de l'abbaye de Saint-Victor, rebâtit  par les Pontevès qui en acquirent la propriété en 1143,  passa ensuite en 1387 à Bertrand Boytard écuyer de Louis II d'Anjou. En 1452 le roi René récupère les terres et le château et cède le domaine à sa fille Yolande duchesse de Lorraine et revendu en 1474 par Jean II de  Forbin, branche de Palamède de Forbin,  devient propriétaire  du château pour une durée de cinq siècles, au XVI-XVIIe siècle les Forbin transforment la vieille forteresse médiévale en demeure de plaisance malgré un incendie par les rebelles provençaux \"les Cascavéoux\" opposés à l'édit royal qui le ravagea en 1630.  En 1793 le marquis de Forbin la Barben meurt sur l'échafaud mais le château ne subit aucun dégât lors de la Révolution, sous l'Empire Pauline Bonaparte épouse du prince Borghèse amoureuse d'Auguste de Forbin son chambellan y vécut et Auguste fut invité a s'engager dans l'armée en 1807 comme lieutenant-colonel des armées impériales avant de se retirer à Rome  pour se consacrer à sa passion,  la peinture en se consolant dans les bras de madame de Récamier.  Le château resta dans la famille jusqu'en 1963 lors de son acquisition par la famille Pons qui créa également un parc animalier. Aujourd'hui à monsieur Bertrand Pillivuyt. et monsieur d'Alençon transforme le château en style Puy du fou.","architecture":"Barben; Château flanqué de fortes tours à mâchicoulis sur plan irrégulier,  transformé au XVIIe siècle en demeure de plaisance, pont levis, les tours, donjon et les poternes défensives du château, il fut rajouté un corps de logis  principal et un corps de bâtiment de style classique avec grande terrasse sur cour d'honneur, escalier d'accès en fer à cheval bordés de balustres, créations de jardins et des remaniements intérieurs s'effectueront au XVIIIe siècle et en 1909 fut partiellement endommagé par le séisme, remanié à nouveau dans les années 1970.","habitants":"Jean II de  Forbin\r\n        \r\n        \"","divers":"Différentes vues du Château de la Barben.","gps":"","images":["../../jctruffet.com/image/image_13/13_Barben_1.jpg","../../jctruffet.com/image/image_13/13_Barben_2.jpg","../../jctruffet.com/image/image_13/13_Barben_3.jpg","../../jctruffet.com/image/image_13/13_Barben_4.jpg","../../jctruffet.com/image/image_13/13_Barben_5.jpg","../../jctruffet.com/image/image_13/13_Barben_6.jpg"]},"Consult_chateau_formulaire15f2":{"id":"Consult_chateau_formulaire15f2","dept":"13","canton":"Châteaurenard","commune":"Barbentane","nom":"Barbentane","type":"Château","periode":"XVII","histoire":"BARBENTANE; En 975 la seigneurie de Barbentane passe à Béranger II comte de Provence  passa en 1276 à Hugues de Saint-Pesaire, la tour Anglica construite sur demande du cardinal de Grimaldi, a servit de prison, fut construite en 1365 pour le frère du pape Urbain V,   Anglicus de Grimoard  cardinal évêque d'Avignon frère d'Urbain V nommé seigneur de Barbentane et Noves,  y fit construire les remparts se rajoutant à la porte  Calendrale de 1302 et du Séquier construite plus tard a perdu les armoiries de François Ier. En 1474  le fief appartenait au roi René et en 1482 le roi Charles du Maine inféode la seigneurie à Pierre Robin chef de la famille de Barbentane; famille seigneuriale ancêtre direct du marquis de Brabentane depuis 1133. c'est par ces derniers que fut construit le château d'Andigné.  Le château de Barbentane \"petit Trianon du Soleil \" construit sur le versant nord de la montagnette en 1674 par l'architecte de la Valfenière pour Joseph-Pierre Balthazar de Puget, ambassadeur du roi Louis XV à Florence de 1768 à 1788  jusqu'à la Révolution, il la passera  sans dommage, restera dans la descendance Hilarion-Paul-François de Barbentanne (1754- 1828) lieutenant général et marquis de Barbentane, toujours dans la descendance.","architecture":"Barbentane; la tour Anglica, haute de 40 mètres  de haut chaque face de 10 mètres de côté, couronné de mâchicoulis, architecture proche de la tour de Philippe le Bel à Villeneuve les Avignon, tour restaurée au XVIIIe siècle qui est dominé par sa tourelle. La porte Calendrale construite au Moyen-âge elle commande l'entrée nord, et la porte du Séquier du XIIIe siècle, éléments de remparts et une maison forte des Barbentane du XVIe siècle dites maison des \"Chevaliers\". Le château actuel édifice de style Louis XV île de France, rectangulaire à deux niveaux et un étage attique ponctué de lucarnes, avant corps central saillant avec fronton brisé sur cour d'honneur; d'une architecture bien ordonnée, l' intérieur mélangé avec un gout italien du fait de l'activité de cette famille.","habitants":"Joseph-Pierre-Baltazar de Puget\r\n        \r\n        \"","divers":"Château de Barbentane, la tour Anglica et porte.","gps":"","images":["../../jctruffet.com/image/image_13/13_Barbentane_1.jpg","../../jctruffet.com/image/image_13/13_Barbentane_2.jpg","../../jctruffet.com/image/image_13/13_Barbentane_3.jpg","../../jctruffet.com/image/image_13/13_Barbentane_4.jpg","../../jctruffet.com/image/image_13/13_Barbentane_5.jpg","../../jctruffet.com/image/image_13/13_Barbentane_6.jpg","../../jctruffet.com/image/image_13/13_Barbentane_7.jpg"]},"Consult_chateau_formulairec231":{"id":"Consult_chateau_formulairec231","dept":"13","canton":"St-Rémy-de-Provence","commune":"Baux-de-Provence","nom":"Baux_Provence","type":"Vestiges","periode":"X","histoire":"BAUX de Provence; sur un éperon  rocheux fut construit au Xe siècle une citadelle des puissants et orgueilleux sires des Baux prétendants descendre des Rois Mages et qui avaient comme devise \"au Hasard Baltazard\"  qui régnèrent du IXe au XIVe siècle sur la Provence, dans la première moitié du XIIe siècle, ils augmentent leur puissance et leur territoire, passe alliance  avec les comtes de Provence, et en 1215 Guillaume des Baux reçoit le titre de roi d'Arles, en 1372 le dernier seigneur des Baux Raymond de Turenne véritable chef de bande qui met la Provence à feu et à sang, et en 1426 rattachement des Baux au comté de Provence à Louis III d'Anjou, qui élève la seigneurie au rang de baronnie, sous le règne du roi René ce dernier en fit don à sa deuxième femme Jeanne de Laval ou une renaissance s'établit au Baux  par des constructions d'hôtel etc.  En 1481 rattachement à la couronne de France, Louis XI fait démantelé le château et  fait administré la baronnie par les Bernardin puis par le  connétable Anne de Montmorency.    La cité  sera agrandie deviendra le refuge des huguenots pendant la période des guerres de religion de 1562 à 1598, le dernier souverain des Baux  Antoine de Villeneuve s'opposant à Louis XIII celui-ci fit détruire la citadelle fortifications et remparts.   La seigneurie vendu à la ville qui sera transformé en marquisat et donné en 1642 à Hercule de Grimaldi prince de Monaco, qui le laissèrent à l'abandon jusqu'au XXe siècle, aujourd'hui reconnu comme les plus beaux villages de France.   Dans le village le manoir de la Tour du Brau ancien hôtel des Glandevès XIV-XVe siècle devenu propriété de la famille de la Tour surnommé du \"Brau\". Hôtel de Brion , de Mainville (Mairie) et de Porcelet.","architecture":"Baux de Provence; sur une crête rocheuse fut construit au XIe siècle une citadelle dont-il ne reste que des ruines du château et des remparts dernière destruction  en 1631, le donjon du XIIIe siècle dont une partie encore visible.  De la période renaissance il reste la maison du roi, l'ancien hôtel de ville aujourd'hui musée des Santons, la porte Eyguières prolongement des remparts, hôtel de Brion  du XVIe siècle appelé imprimerie Jou. Hôtel de Manville construit en 1571 par Claude III de Manville, l'hôtel des Porcelets de 1569 habité par les Lères  puis par Jeanne de Quiqueran baronne des Baux appelée \"la reine Jeanne\" qui fit construire le kiosque  de plan hexagonal (existe un musée), l'église st-Vincent et la chapelle des Pénitents Blancs.","habitants":"Sires des Baux comte de Provence.\r\n        \"","divers":"Vestiges du château des Baux.","gps":"","images":["../../jctruffet.com/image/image_13/13_Baux_Provence_1.jpg","../../jctruffet.com/image/image_13/13_Baux_Provence_2.jpg","../../jctruffet.com/image/image_13/13_Baux_Provence_3.jpg","../../jctruffet.com/image/image_13/13_Baux_Provence_4.jpg","../../jctruffet.com/image/image_13/13_Baux_Provence_5.jpg","../../jctruffet.com/image/image_13/13_Baux_Provence_6.jpg","../../jctruffet.com/image/image_13/13_Baux_Provence_7.jpg"]},"Consult_chateau_formulaireed4b":{"id":"Consult_chateau_formulaireed4b","dept":"13","canton":"Lambesc","commune":"Rognes","nom":"Beaulieu","type":"Château","periode":"XVII","histoire":"BEAULIEU; Au pied de la Trévaresse, sur le plateau de Rognes, bâti sur le cratère d'un ancien volcan. Rognes est érigé en fief par Henri III en 1576. Le château a appartenu à une illustre famille provençale les Agoult en 1597.  Le fief de Beaulieu passa ensuite à André Félix, écuyer de la ville de Marseille, sans postérité le céda à son neveu Pierre d'Oraison capitaine de galères du roi, pour des problèmes d'argent le vendit à Pierre Robineau, commissaire aux guerres, conseiller de Louis XV et par héritage passa aux Candolle jusqu'en 1920 et depuis quatre générations dans la famille Touzet aujourd'hui de Pierre Guennot qui continu la tradition viticole.          Rognes; au nord est de Lambesc  la seigneurie appartenait aux seigneur Agoult, en 1597 Julie d'Agoult dernière représentante de la famille épouse Henri de Raphélis, elle conserve ses seigneuries, le château fut démantelé en 1595.                                                         Dans la commune  de Rognes, le château de Barbebelle du XVIIe siècle de Brice Herbeaux.","architecture":"Beaulieu; de forme  rectangulaire avec au centre englobé d'un donjon crénelé sortant du toit quatre tours d'angles hexagonales, démolies à la Révolution puis reconstruites à la fin du XIXe siècle, communs flanqués de deux pigeonniers et petite chapelle, magnifique jardin à la française. Rognes vestiges du château et château de Barbebelle.","habitants":"Famille d'André Felix\r\n        \"","divers":"Château de Beaulieu, de Cabannes et de Barbebelle.","gps":"","images":["../../jctruffet.com/image/image_13/13_Beaulieu_1.jpg","../../jctruffet.com/image/image_13/13_Beaulieu_2.jpg","../../jctruffet.com/image/image_13/13_Beaulieu_3.jpg","../../jctruffet.com/image/image_13/13_Beaulieu_4.jpg","../../jctruffet.com/image/image_13/13_Beaulieu_5.jpg"]},"Consult_chateau_formulaired56e":{"id":"Consult_chateau_formulaired56e","dept":"13","canton":"Trests","commune":"Beaureceuil","nom":"Beaureceuil","type":"Château","periode":"XVI","histoire":"BEAURECEUIL, était la propriété des comtes de Provence, érigé en fief par Henri III, en 1576 les plus grandes familles provençales s'y succédèrent: les Alamanon, les Agoult, les Oraison, les Pontleroy, les Tournefort et les Candolle, aujourd'hui la famille Guenant exploite le domaine viticole.","architecture":"Beaureceuil; Château du XVI-XVIIe siècle, corps de logis rectangulaires à trois niveaux flanquées de tours rondes en angles.","habitants":"la famil
