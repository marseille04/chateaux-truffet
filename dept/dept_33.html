quatre tours dotées d'archères cruciformes à étriers,  dont chaque angle était  munit d'une tourelle  ou d'une échauguette, les toitures, remplacées par des poivrières et de haut combles à la française.  La tradition locale raconte qu'une inscription latine trouvée dans les souterrains du château assigne à sa construction du XVIIIe siècle. Monsieur de Pommiers fit réparer le château et ce fut  alors que la grande enceinte, dont il reste encore quelques traces, fut détruite. L'architecture est de type féodal avec des fortifications médiévales. de plan carré flanqué de tourelles crénelées à mâchicoulis sur les deux tours frontales sous un toit en poivrières très pointus en angles,   le corps de logis  a deux toits a deux pans avec lucarne,","habitants":"Famille Pommiers                                                           Baron Gaillard d'Agassac\r\n        \"","divers":"Château d'Agassac à Ludon","gps":"","images":["../../jctruffet.com/image/image_33/33_Agassac_5.jpg"]},"Consult_chateau_formulaire3430":{"id":"Consult_chateau_formulaire3430","dept":"33","canton":"Ambarès-Lagrave","commune":"Ambarès et Lagrave","nom":"Ambarès_Gironde","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Ambarès et Lagrave celui de Beauséjour, de Peyronnet, de Fromont et les manoirs du Gua, de st-Denis et de Durandea, Bellevue, Peychaud et Tillac ces trois derniers sur article suivant. BEAUSEJOUR : ancienne maison de famille de Max Linder, logis sans doute reconstruit au milieu du XIXe siècle mais dépendances agricoles peut-être plus anciennes,  chambres d'hôtes de Michèle Ramet.\r\n ST-DENIS: peut-être ancienne maison noble, sans doute construite au XVIIe siècle pour la famille Pineau, selon un plan en U. Propriété du fils de l'acteur Louis Jouvet, vers 1940.                                         DURANDEAU ancienne maison noble de la famille Richon, édifice peut-être construit au XVIIe siècle puis reconstruit au XVIIIe siècle et largement restauré au milieu du tié du XXe siècle. Ancienne écurie du XVIIIe siècle aujourd'hui transformée en bureaux.","habitants":"Famille de Fayet                                                          Famille de Max Linder                                                     St-Denis acteur Louis Jouvet                                      Durandeau famille Richon                                      Gua    familles Laroque\r\n        \"","divers":"à Ambarès et Lagrave celui, du Haras-grav-1, Beauséjour grav-2, de Bouillac grav-3 de Bellevue grav-4.","gps":"","images":["../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Gironde_2.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Gironde_3.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Gironde_4.jpg"]},"Consult_chateau_formulaire1883":{"id":"Consult_chateau_formulaire1883","dept":"33","canton":"Ambarès et Lagrave","commune":"Ambarès et Lagrave","nom":"Ambarès_Lagrave","type":"Château","periode":"XVI-XIX","histoire":"BELLEVUE : maison sans doute reconstruite au milieu du XIXe siècle à l'emplacement de l'ancienne maison de plan en U mentionnée Puymanot, transformé en école depuis 1980.                                                PEYCHAUD : seigneurie mentionnée depuis le XVIe siècle, appartenant à la famille de Fayet ; lancien château est sans doute reconstruit vers 1680 puis au début du XVIIIe siècle, il comprenait alors le logis actuel flanqué au nord de parties agricoles ; il fut remanié vers 1871 pour l'amiral Charles de Dompierre d'Hornoy, ministre de la Marine et des Colonies (1873-1874) ; il est inscrit au titre des M.H. depuis 1966.  il comprenait alors le logis actuel flanqué au nord de parties agricoles formant une ou deux cours actuellement détruites.                                                  TILLAC, la maison noble de la famille Joly de Bonneau est sans doute construite au XVIIe siècle, peut-être à l'emplacement d'une ancienne demeure puisqu'elle est située sur un des sommets de l'extrémité de la presqu'île. Bien que les murs et une tour témoignent des anciennes constructions de plan en U, la demeure est entièrement remaniée au milieu du XIXe siècle avec adjonction de pavillons et clôture de la cour par une grille.","architecture":"Bellevue, logis à 7 travées et un étage carré. Trois avant-corps d'une travée chacun avec chaînes d'angles à bossages rythment l'élévation antérieure. L'avant-corps central est couronné d'un fronton. Les dépendances agricoles et le logis forment une cour. Les pigeonnier, poulailler, porcherie, partiellement couverts de tuiles mécaniques forment une seconde cour clôturée par une grille.                                        Peychaud, logis de plan symétrique situé dans un parc, le logis est composé d'un long corps de bâtiment rectangulaire à cinq baies en façade flanqué à chaque extrémité d'un pavillon à étage carré et comble à surcroît, chacun garni du côté de la façade postérieure d'une tour circulaire couverte d'un dôme de pierre. Une terrasse desservie par un degré à pans précède cette façade. Deux pavillons en rez-de-chaussée couronnés de frontons cintrés forment deux courtes ailes en retour d'équerre sur la façade antérieure.                 Tillac, logis au fond d'une cour fermée par une grille, de plan barlong, à un étage carré et deux pavillons coiffés de toits à croupe ronde en ardoise. Elévation antérieure couronnée d'un mur d'attique percé d'une lucarne centrale accostée d'ailerons. Dépendances agricoles formant une aile en retour d'équerre avec toit à pignons couverts. Parterre de buis taillés dans la cour.","habitants":"Famille Joly de Bonneau \r\n        \"","divers":"Château  de Peychaud g-2-3 et de Tillac   de Peyronnet  grav-4-5,  de Fromont et les manoirs du Gua, de st-Denis et de Durandeau.","gps":"","images":["../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Lagrave_1.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Lagrave_2.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Lagrave_3.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Lagrave_4.jpg","../../jctruffet.com/image/image_33/33_Ambar%c3%a8s_Lagrave_5.jpg"]},"Consult_chateau_formulairebee6":{"id":"Consult_chateau_formulairebee6","dept":"33","canton":"Le Bouscat","commune":"Le Bouscat","nom":"Andorte","type":"Château","periode":"XVIII","histoire":"ANDORTE, dit aussi des Tours date du XVIIIe siècle. En 1764, il appartient au chevalier Etienne Duval seigneur de Castets en Dorthe  : ceci explique le nom du château, le château d'Andorte fut utilisé comme hôpital psychiatrique, durant 120 ans. Il a été construit par un architecte célèbre : Nicolas-François Lhôte. En 1789, à la Révolution, le propriétaire s'exila et le château d'Andorte fut vendu par l'Etat. Au XIXe siècle, plusieurs propriétaires se succèdent. En 1849, le Dr Demaisons en fit une maison de santé pour malades mentaux, qui existait toujours en 1968. En 1990, le château, son domaine et sa chapelle ont été rachetés par la commune.                                                           A cinq Km à l'Est, le château de TREULON à Bruges   inscrit aux M.H. depuis 1962, ce château ne peut être visité, lintérieur nétant pas sécurisé, propriété de la commune.","architecture":"Château d'Andorte date du XIVe siècle,  de plan rectangulaire à deux niveaux accolés d'un pavillon en façade avec terrasse, trois tours, de plan rectangulaire à deux niveaux accolé d'une tour polygonale et d'une échauguette, lucarnes sur toits et sur angles  pavillons carré avec terrasse.   Vous pourrez y louer ses salles. Les Trois Tours date du début du XXe siècle.       TREULON de plan rectangulaire à un niveau sur un soubassement avec ouvertures toit en croupes recouvert d'ardoises pavillon d'entrée dans avant corps à pans coupés avec escalier en fer à cheval.","habitants":"Famille de Nicolas-François Lhôte.\r\n        \"","divers":"Andorte à le Bouscat: grav-1-2,  44° 51' 57,03\" Nord, 0° 36' 38,16\" Ouest et le château de Treulon à Bruges grav-3, de la Tour garv-5.","gps":"","images":["../../jctruffet.com/image/image_33/33_Andorte_1.jpg","../../jctruffet.com/image/image_33/33_Andorte_2.jpg","../../jctruffet.com/image/image_33/33_Andorte_3.jpg","../../jctruffet.com/image/image_33/33_Andorte_4.jpg","../../jctruffet.com/image/image_33/33_Andorte_5.jpg"]},"Consult_chateau_formulaire912d":{"id":"Consult_chateau_formulaire912d","dept":"33","canton":"Libourne","commune":"Izon","nom":"Anglade","type":"Château","periode":"XVII","histoire":"ANGLADE, dit du  Grand-Pré.  Louis XI, désirant rallier les anciens seigneurs, pardonnera au seigneur d'Anglade, lui rendant ses propriétés, le 24 février 1461. Elles restent dans la famille, par héritages et mariages jusqu'en 1738, date à laquelle Jean-François de Pontac, dernier seigneur d'Anglade, a vendu à Jean Pellet, négociant et armateur à Bordeaux.   Léo Dufoussat devient définitivement propriétaire du château dAnglade par héritage en 1841. Monsieur Marcel Richier achète le domaine en 1841. Le propriétaire actuel, Christophe Bocquillon, le restaure et relance l'activité viticole.  Le château d'Anglade est inscrit aux M.H. depuis le 16 juin 1965.","architecture":"Il y a deux châteaux dans deux lieux différents et deux époques. Le château d'Anglade-ancien est situé à deux kilomètres à l'ouest de l'église d'Izon et date du XIe siècle. Le nouveau château d'Anglade est situé à 1 kilomètre au Nord-Est de l'église d'Izon et date du XVIIIe siècle  Il comporte un corps de logis central flanqué à ses extrémités d'un pavillon. Deux petits bâtiments bas prolongent les pavillons au sud, dont l'un à l'est renferme une petite chapelle. Des constructions à usage de communs leur font suite, fermant ainsi les côtés de la cour d'honneur et donnant à l'ensemble la forme d'un U. La façade coté sud présente en son centre une légère avancée, dans laquelle, la porte s'ouvre en haut du perron. La face nord présente la même avancée centrale mais plus saillante et aux angles arrondis. À l'intérieur du corps de logis, les pièces ont conservés leurs boiseries d'époque. La cour est fermée par une grille à laquelle conduit une avenue droite, longue de 1500 mètres et ombragée par quatre rangs de vieux ormes. Deux pavillons, situés sur le bord de la route d'Izon à Saint-Pardon (la voie Royale), ornent l'entrée de cette avenue.","habitants":"Famille d'Anglade\r\n        \"","divers":"Anglade à Izon GPS : 44° 55' 55\" Nord et 0° 21' 02\" Ouest","gps":"44° 55' 55\" Nord et 0° 21' 02\" Ouest","images":["../../jctruffet.com/image/image_33/33_Anglade_1.jpg","../../jctruffet.com/image/image_33/33_Anglade_2.jpg","../../jctruffet.com/image/image_33/33_Anglade_3.jpg"]},"Consult_chateau_formulaire4f25":{"id":"Consult_chateau_formulaire4f25","dept":"33","canton":"Castillon-la-Bataille","commune":"Moulon","nom":"Ansouhaite","type":"Maison-Forte","periode":"XIV","histoire":"ANSOUHAITE, c'est une maison forte anglaise du XIVe siècle, de Jean-Pierre Errath, architecte, dont la construction date de 1314. L'année suivante, il la donna en toute propriété à ce même duc et à son épouse. La même concession leur fut faite en 1439-40. Le duc étant mort, cette terre revient au roi, qui en fit don, le 3 mars 1446-47, à Jean de Foix, comte de Candale. Peu de temps après, le 18 mai 1451-52, la justice haute et basse des deux paroisses de Moulon et Nérigean fut cédée à Godefroy Shorthoise, chevalier, qui fut le dernier maire de Bordeaux avant la fin de la guerre de Cent Ans.  On pourrait conclure de là que la seigneurie de Moulon avait toujours été possédée par la famille d'Izambert et que la possession par la famille de Grésignac fut un intermède. A la fin du XIVe siècle, la Motte de Moulon appartenait à la famille d'Albret. En 1377, Bérard d'Albret en avait disposé en faveur de l'épouse de Guillem de Faubornet. Vers 1550, la seigneurie de Moulon passa dans la famille de La Chassaigne. Au moment de la Révolution, la tour appartenait à un couvent de Bordeaux. Durant deux siècles, la tour tomba lentement en ruine, jusqu'en 1981, où son nouveau propriétaire entreprit sa restauration intégrale, qui dura vingt ans.  La tour de l'Ansouhaite est aujourd'hui une habitation privée, fermée au ublic.   La tour de l'Ansouhaite a été inscrite aux M.H le 1er mars 1966","architecture":"La tour de l'Ansouhaite, est, dans uvre, de 14,10 m de long sur 9,30 m large et la hauteur sous toiture : 10 m pour la façade nord-ouest et 12 m pour la façade sud-est Les murs ont au moins 1,05 m d'épaisseur. Elle est construite en pierre de taille dorée, très coquillère, provenant d'un carrière voisine et bâtie suivant une technique rustique, mais solide. La tour se compose d'un rez-de-chaussée et de deux étages surmontés d'un chemin de ronde garni de mâchicoulis et créneaux. Les créneaux, qui n'existent plus, s'appuyaient sur l'extrémité de consoles à trois assises en retrait. Le rez-de-chaussée servait de magasin ; le premier étage et le chemin de ronde étaient destinés à la défense, l'édifice était destiné à la défense proche grâce à ses huit meurtrières en cas de siège, le second étage était destiné à l'habitation. On ne trouve pas de traces d'escalier en pierre à l'intérieur ; on devait monter dans les différents étages par des escaliers ou des échelles en bois. Le rez-de-chaussée n'avait d'ouvertures que  la porte ogivale dans la façade Sud-Est, une très petite fenêtre carrée à côté de cette porte, et un petit jour dans le sommet de la paroi sud-ouest. Elles ne donnaient qu'une faible lumière. Le rez-de-chaussée servait de réserve agricole où le matériel et le bétail étaient abrités, notamment en cas d'alerte.","habitants":"Famille d'Izambert \r\n        \"","divers":"Tour d'Ansouhaite à Moulon GPS : 44° 50 31\" Nord 0° 13' 40\" Ouest","gps":"44° 50 31\" Nord 0° 13' 40\" Ouest","images":["../../jctruffet.com/image/image_33/33_Ansouhaite_1.jpg","../../jctruffet.com/image/image_33/33_Ansouhaite_2.jpg","../../jctruffet.com/image/image_33/33_Ansouhaite_3.jpg","../../jctruffet.com/image/image_33/33_Ansouhaite_4.jpg"]},"Consult_chateau_formulaire9bb3":{"id":"Consult_chateau_formulaire9bb3","dept":"33","canton":"Arcachon","commune":"Arcachon","nom":"Arcachon","type":"Palais","periode":"XVIII","histoire":"Deux châteaux à Arcachon Deganne appelé aussi le Casino d'Arcachon et de Mader .                                   DEGANNE,  bâti en 1853, pour Adalbert Deganne. C'était la réplique du château de Boursault, dans la Marne. C'est devenu le Casino d'été de la ville d'Acarchon. En 1859, Deganne va proposer en cadeau son château à Napoléon III, mais l'Empereur le refusa, argumentant que cela lui couterait bien trop cher, Adalbert Deganne va devenir maire de la ville de 1870 à 1871 puis de 1876 à 1880. Le château va accueillir de nombreuses réceptions fastueuses et expositions. En 1877, il recevra, dans ses murs, le célèbre maréchal Mac-Mahon.  Ce n'est qu'en 1903, que le château Deganne sera racheté par Eugène Duboussey qui le transformera en \"Casino de la Plage\", nom qu'il porte depuis.  En 1991, le château Deganne va subir de nombreuses transformations. On y joindra le paladium composé du palais des congrès, d'un hôtel  3 Etoiles, d'une résidence de tourisme, divers commerces et quelques appartements de grand standing.\r\nMADER, en 1905, la jeune Clara Thépenier, riche héritière dun entrepreneur auvergnat, cest le coup de foudre ! Follement amoureuse, Clara, âgée de dix-huit ans à peine, achète sur ses propres deniers le domaine de la Hourcade, château de la bel époque Pierre Le Pendeven a acquis le château en 2014 en fait un palais hôtelier.","architecture":"Deganne, construit dans un style néo-Renaissance et en bordure de plage. Riche et puissant, Adalbert Deganne y reçoit ses invités, organisant aussi de somptueuses réceptions : en l'honneur d'Adolphe Thiers en 1875, du maréchal de Mac Mahon, président de la République, en 1877. Il rassemble aussi dans ses salons une importante collection de tableaux, acquis aux salons de Paris et de Bordeaux. À la mort d'Adalbert Deganne, le château est au cur des discussions autour de son testament. Finalement vendu en 1903, il est converti en casino. Réquisitionné pendant la seconde guerre mondiale, il est transformé en caserne et fortement dégradé. Restauré après la guerre, il redevient un lieu de jeux et de spectacles, et voit passer de nombreuses célébrités venues se produirent à Arcachon. Depuis l'incendie du casino Mauresque en 1977, le château Deganne est le seul casino d'Arcachon.                                             MADER Clara fait construire sur le domaine un hôtel particulier de style néo-classique, agrémenté dune rotonde baignée de lumière, dont les larges fenêtres souvrent sur un parc à la française. De grandes terrasses festonnées de balustrades ponctuent la façade du bâtiment. Entouré dune cour dhonneur et ceint dun mur le protégeant des regards, le château est couronné dun belvédère romantique à souhait. Camille y passe des heures à contempler lhorizon marin, côté bassin, ou à regarder, côté sud, sa jeune épouse qui samuse à galoper le long de la voie ferrée, cheveux au vent, dans de folles courses contre les trains","habitants":"Famille d'Adalbert Deganne                                 Mader  de Pierre Le Pendeven \r\n        \"","divers":"Arcachon Deganne -Casino grav 1-2-3, Madère grav-4-5-6  Villa Alma-7.  GPS : 44° 39' 47\" Nord et 1° 09' 52\" Ouest","gps":"44° 39' 47\" Nord et 1° 09' 52\" Ouest","images":["../../jctruffet.com/image/image_33/33_Arcachon_1.jpg","../../jctruffet.com/image/image_33/33_Arcachon_2.jpg","../../jctruffet.com/image/image_33/33_Arcachon_3.jpg","../../jctruffet.com/image/image_33/33_Arcachon_4.jpg","../../jctruffet.com/image/image_33/33_Arcachon_5.jpg","../../jctruffet.com/image/image_33/33_Arcachon_6.jpg","../../jctruffet.com/image/image_33/33_Arcachon_7.jpg"]},"Consult_chateau_formulairee872":{"id":"Consult_chateau_formulairee872","dept":"33","canton":"Lesparre-Médoc","commune":"Arcins","nom":"Arcins","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à Arcins celui d'Arcins  d'Arnauld de Barreyres (voir article), la Tour de Roc, et Larose Trintaudon (voir article).                                     ARCINS Jusquen 1836, ce domaine appartient à M. Couput. M. Subercazeau l'achète et fait démolir en 1842 l'ancien logis pour en reconstruire un nouveau. Lorsque le marquis de Clermont-Mont-Saint-Jean devient propriétaire du domaine, des écuries et une remise sont construites en 1878.  Au début du XXe siècle, différents propriétaires se succèdent, notamment le docteur Badal, médecin et professeur à l'université de Bordeaux. En 1971 la famille Castel achète les châteaux d´Arcins et Barreyres et quatre ans plus tard, une complète restauration des bâtiments est entreprise avec le concours de l´entrepreneur Simon, propriété de la famille Castel.                       ARNAULD Le château Arnauld est mentionné à partir de 1868 dans le Cocks et Féret, appartenant à la famille Lafargue, classé comme un cru bourgeois. Repris par la famille Roggy, en 1956, Château Arnauld n'exploite pas seulement la vigne mais possède un cheptel \"important\", selon le Cocks et Féret de 1969. A la fin des années 1980, le vignoble est reconstitué et les installations sont modernisées avec la construction de nouveaux bâtiments à la fin du XXe siècle portées en 1873 et une démolition en 1875, probablement pour une partie des bâtiments. Selon un cliché du début du XXe siècle, un bâtiment accolé au corps de logis a été détruit.                                                                   TOUR du ROC  Situé à 4 km au nord de Margaux, propriété de la famille Robert depuis plusieurs générations Le domaine est mentionné dans l'édition de 1850 de l'ouvrage de Cocks et Féret.","architecture":"ARCINS Le logis rectangulaire est entouré par deux pavillons latéraux, carrés et saillants. Le logis est encadré par deux ailes en retour.  Les ailes de dépendances alignées sur la route datent  aussi de cette campagne de travaux. Le logis est encadré par deux ailes en retour, bâties dans le prolongement des pavillons, côté rue, la façade du corps de logis se compose d´un avant-corps saillant, encadré de pilastres, en bossage continu pour le rez-de-chaussée et lisses pour l´étage ; l´ensemble de l´avant-corps est coiffé d´un attique                                                ARNAULD une partie organisée autour d´une cour carrée comprenant le logiss de plan en L s´élève sur un étage carré et un étage en surcroît éclairé par des lucarnes. Les élévations antérieures sont percées de la porte d´entrée encadrée d´une moulure et d´un tore ; cette façade compte 7 travées et 4 lucarnes.","habitants":"Famille Castel                                                               Famille Lafargue\r\n        \"","divers":"Châteaux d'Arcins, d'Arnauld g-3-4, la tour Bellegrave grav-5, Tour du Roc g-6 à Arcins.","gps":"","images":["../../jctruffet.com/image/image_33/33_Arcins_1.jpg","../../jctruffet.com/image/image_33/33_Arcins_2.jpg","../../jctruffet.com/image/image_33/33_Arcins_3.jpg","../../jctruffet.com/image/image_33/33_Arcins_4.jpg","../../jctruffet.com/image/image_33/33_Arcins_5.jpg","../../jctruffet.com/image/image_33/33_Arcins_6.jpg"]},"Consult_chateau_formulaire319d":{"id":"Consult_chateau_formulaire319d","dept":"33","canton":"Lacanau","commune":"Arsac","nom":"Arsac","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Arsac dont celui d'Arsac, Tertre (voir article ), Monteil, Paloumey  et Braude           ARSAC, l'un des plus ancien domaine du Médoc pendant la guerre de cent ans les sires d'Arsac firent alliance avec le roi d'Angleterre, brulé pendant la Révolution puis reconstruit en 1830.                       PALOUMEY  en 1863 : François Mitjans procède à une augmentation de construction  en 1869 : Joseph Vasquez agrandit la construction sur la même parcelle vers 1890, le domaine est racheté par François Marot. L'année suivante, il entreprend à l'emplacement de l'ancienne demeure, l'érection du château actuel.  De 1945 à 1989, le domaine abandonne son activité viticole, jusqu'au rachat par de nouveaux propriétaires qui engagent de nouveaux travaux :                 BRAUDE , pour être charmé par cette ravissante demeure du XVIIe siècle darchitecture typiquement bordelaise, restaurée et arrangée avec goût et raffinement par les gérants Karin et Régis Bernaleau","architecture":"Paloumey la demeure est un bâtiment rectangulaire à deux étages et étage de comble. La façade principale (sud) présente 5 travées. Chaque ouverture en arc segmentaire possède un encadrement en ressaut, la porte-fenêtre de l'étage donne sur un balcon à garde-corps en fonte. Des lucarnes en pierre éclairent le niveau de comble dans le brisis du toit couvert d'ardoise. Dans le prolongement Est, un bâtiment bas percé de fenêtres avec pilastres et corniche denticulée est surmonté par un toit terrasse avec balustrade en pierre. À l'arrière, l'ancien cuvier-chai s'étend d'est en ouest ; son pignon principal (ouest) est marqué par un décrochement portant une table décorative avec l'inscription \"PALOUMEY\" en lettres rouges. À l'écart se trouvent les nouvelles dépendances,  bâtiment d'accueil et locaux administratifs, chai à barriques, cuvier, stockage.","habitants":"Paloumey  François  Marot                                     Tertre Thomas de Montaigne\r\n        \"","divers":"Château d'arsac grav 1-2 de Braude-3, Monteil grav-4,  Paloumey grav-5.","gps":"","images":["../../jctruffet.com/image/image_33/33_Arsac_1.jpg","../../jctruffet.com/image/image_33/33_Arsac_2.jpg","../../jctruffet.com/image/image_33/33_Arsac_3.jpg","../../jctruffet.com/image/image_33/33_Arsac_4.jpg","../../jctruffet.com/image/image_33/33_Arsac_5.jpg"]},"Consult_chateau_formulaire4325":{"id":"Consult_chateau_formulaire4325","dept":"33","canton":"Lormont","commune":"Artigues","nom":"Artigues","type":"Château","periode":"XVII-XIX","histoire":"Quatre châteaux à Artigues, dit de la Prairie, de Bétailhe, de Lestrille, et de Feydeau.                         PRAIRIE Après avoir passé 50 ans au sein de la famille Carde, il fut vendu en 1970 à la communauté urbaine de Bordeaux qui le rétrocéda à la commune dArtigues. En 1972, les services de la mairie y furent transférés. Aujourdhui encore, le château abrite une grande partie des services de la commune.          BETAILHE, sagit de la plus ancienne maison noble de la commune. Datant du XIIe siècle, la demeure est luvre de la famille de Chassaigne, qui en fut propriétaire jusquau XVIIe siècle. Mais ce nest réellement quà partir de 1856, suite à lacquisition par un dénommé monsieur Polhs, par la suite, 11 propriétaires sy succédèrent jusquau rachat de lédifice par la mairie en 1984.                                LESTRILLE, construit au XVIIe siècle, fut longtemps un important domaine viticole, avant d'entrer dans le domaine public en 1979. Il abrite la salle du conseil municipal, et la maison des associations,                      FEYDEAU Cette demeure du XVIIe siècle tient son nom de la famille de Feydeau, seigneurs de Feydel, qui en devinrent propriétaires entre le XVIIe et le début du XVIIIe siècle. Comme la plupart des autres domaines du secteur dArtigues, Feydeau était un important domaine viticole. Au total, ce ne sont pas moins de 12 propriétaires qui se succédèrent jusquen 1979 date à laquelle la commune racheta le domaine. Aujourdhui, le château abrite une salle de spectacles.","architecture":"ARTIGUES,  dit de la prairie construit au XIXe siècle, se trouve sur les fondations de lancienne demeure « Le Cornier ». Cette ancienne bâtisse qui datait du XVIe siècle et dont le domaine sétendait alors sur près de 29 hectares a été intégralement détruite en 1849. Les nouveaux propriétaires du domaine décidèrent dy ériger lactuel château de la Prairie.  se compose dun corps de logis à double façade, flanqués de deux larges pavillons terminés en dôme, ce qui lui donne un aspect monumental. On y trouve la très belle salle des mariages, agrémentée de décors ornementaux. \r\nBETAILHE, en 1856 de grands travaux daménagements eurent lieu. De plus larges croisées sont percées, un péristyle à quatre colonnes est ajouté devant la façade et un décor arboré est créé dans le parc. Lensemble de lédifice, de forme rectangulaire, se compose alors dune maison de maitre flanquée de deux pavillons et entourée de servitudes.     LESRTRILLE, à sa construction, le château se compose dun corps de logis et dun pavillon central à deux étages de style mansardé. A cette époque, le domaine était  un lieu de chasse. La forme actuelle du château remonte aux alentours de lannée 1672 lorsque Louis de Leglise négociant en vin, en prit possession.","habitants":"Prairie; Famille Carde                                                  Betailhe Famille de Chassaigne                                 Famille de Feydeau,\r\n        \"","divers":"A Artigues, Prairie grav-1-2-3 Betaihle grav- 4,  Feydeau grav-5-6,   Lestrille grav-7-8-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_Artigues_1.jpg","../../jctruffet.com/image/image_33/33_Artigues_2.jpg","../../jctruffet.com/image/image_33/33_Artigues_3.jpg","../../jctruffet.com/image/image_33/33_Artigues_4.jpg","../../jctruffet.com/image/image_33/33_Artigues_5.jpg","../../jctruffet.com/image/image_33/33_Artigues_6.jpg","../../jctruffet.com/image/image_33/33_Artigues_7.jpg","../../jctruffet.com/image/image_33/33_Artigues_8.jpg","../../jctruffet.com/image/image_33/33_Artigues_9.jpg"]},"Consult_chateau_formulairee920":{"id":"Consult_chateau_formulairee920","dept":"33","canton":"Libourne","commune":"Asques","nom":"Asques","type":"Château","periode":"XVIII","histoire":"Quatre  châteaux à Asques celui de Baleri, Belloy, Couffins  et de Junayme.                                            COUFFINS,  Nathalie Bonnet, propriétaire,  demeure bourgeoise, au milieu du XVIIIe siècle, précède le grand théâtre de Bordeaux et le château du Bouilh de Saint-André de Cubzac. De toutes les familles illustres successivement propriétaires, citons la famille du commandant Jeau-Yves Cousteau. Il restera attaché à la demeure familiale chère à son adolescence.         MANOIR, le château du Manoir est une propriété familiale depuis 4 générations. Elisabeth Boudin, est gérant de l'entreprise.","architecture":"Baleri, plus maison forte que château  de plan carré à deux niveaux  toit en croupe  accolé en façade de deux pigeonniers carrés à toit à un pan recouvert de tuiles.                                                                           Belloy  édifice rectangulaire à deux niveaux sur un imposant soubassement,  avant corps d'entrée avec balcon au premier, double cordon et fronton triangulaire au niveau du toit recouvert d'ardoise.           Couffins, bâtisse du XVIIIe siècle, son style annonce le mouvement architectural néo-classique régional  est idéalement situé au coeur du vignoble bordelais dans un environnement rural. Corps de logis de plan rectangulaire à un niveau sur un imposant soubassement. Escalier en fer à cheval pour accéder à la porte d'entrée dans avant corps sur trois travées avec cartouches au dessus des fenêtres et fronton triangulaire avec occulus soutenu par deux colonnes romanes et lucarnes sur toit avec ballustrade de protection accolé aux extrémités de pavillons rectangulaires d'un niveau avec contournement de la ballustrade, deux balconnets sur ses derniers. Encadré par la Dordogne, du perron vous offre une vue sans précédent sur le parc.                                                 Junayne, de plan rectangulaire à deux niveaux et lucarnes sur toit en ardoise,  avant corps retondant à pans coupés, bâtisse accolée d'échauguette sur encorbellement aux angles et imposant escalier sur avant corps.","habitants":"Famille du Commandant Jeau-Yves Cousteau\r\n        \"","divers":"Château de Baleri-1, de Belloy-2,  Couffins-3-4-5, de Junayne grav-6.","gps":"","images":["../../jctruffet.com/image/image_33/33_Asques_1.jpg","../../jctruffet.com/image/image_33/33_Asques_2.jpg","../../jctruffet.com/image/image_33/33_Asques_3.jpg","../../jctruffet.com/image/image_33/33_Asques_4.jpg","../../jctruffet.com/image/image_33/33_Asques_5.jpg","../../jctruffet.com/image/image_33/33_Asques_6.jpg"]},"Consult_chateau_formulairec151":{"id":"Consult_chateau_formulairec151","dept":"33","canton":"Lacanau","commune":"Avensan","nom":"Avensan","type":"Château","periode":"XIII-XVIII","histoire":"Plusieurs châteaux à Avensan  le Citran, l'Escoulet, le Villejaune et le Meyre du XVIIIe siècle   et Foulon à acastelnau de Médoc.                                                 CITRAN,  bâti à Avensan,  l'histoire du domaine remonte à un château fort du XIIIe siècle qui devient ensuite la seigneurie du marquis de Donnissan. En 1832, il est acquis par la famille Clauzel. Après 1945, la famille Miailhe replante le domaine qui était tombé en décadence. Il est vendu en 1986 à la compagnie japonaise Touko dépendant de la holding Fujimoto. Le domaine et son château appartiennent depuis 1997 au groupe Taillan, dirigé par Jacques Merlaut, qui possède entre autres d'autres vignobles bordelais, comme château Ferrière, Gruaud-Larose, Chasse-Spleen et  Haut-Bages-Libéral.  Le Château Citran est administré par Mme Céline Villars. Le château est inscrit aux M.H. depuis 2012.\r\nMEYRE, château-hôtel Clos de Meyre de Corinne Bonne est un établissement aux multiples facettes qui saura vous séduire par sa situation exceptionnelle au coeur de son vignoble Médocain.                             FOULON, construit en 1853à nCatelnau de Médoc  : actuellement chambres d'hôtes de prestige du  vicomte et vicomtesse de Baritault du Carpia.  Cette belle demeure de charme, propose des chambres d'hôtes.","architecture":"CITRAN de plan recangulaire à deux niveaux  avec lucarnes sur un toit brisés à la mansard flanqué au extrémité de pavillons saillant rectangulaire de même niveaux.                                                   ESCOUTEY,    corps de logis à un niveau avec retour en équerre sur l'arrière et d'un étage sur la partie central de deux travées, l'ensemble recouvert de tuiles sur toitd à deux pans .  Le château du XVIIIe siècle  une élégante demeure de caractère du XIXe siècle Meyre corps de logis central de plan rectangulaire à  deux niveaux toit en croupe accolé de pavillons sur les flancs à toit haut avec lucarne en façade, l'ensemble recouvert d'ardoises. l'édifice est prolongé sur la gauche d'un bâtiment à un niveau et sur la droite  en retour d'équerre en avant idem d'un bâtiment de dépendance à un niveau.                                        VILLEJAUNE, alias  Villegeorges plus hangar que  grande bâtisse oblong à un niveau en équerre avec bâtiment en retour à deux niveaux flanqué de tours rondes.                                                                          FOULON, agréable demeure château du XIXe siècle,  bâtisse de plan rectangulaire à deux niveaux sur soubassement  toit en croupe recouvert d'ardoise  avec une lucarne centrale en façade sur porte d'entrée qui elle est garnie d'un fronton rotondant ainsi que la fenêtre supérieure, esccalier plein cintre, tourelle sur flanc  droit, toit en poivrière  et prolongement de bâtiments de dépendances d'un niveau sur les deux flancs.","habitants":"Citran Famille Clauzel                                                  vicomtesse de Baritault du Carpia\r\n        \"","divers":"à Avensan  le Citran-1, l'Escoulet-2-, le Meyre -3-4-5, le Villejaune-7 ;  GPS : 45° 03' 09\" Nord et 0° 44' 51\" Ouest     Castelnau de Médoc château de Foulon Grav-6  45° 01' 41\" Nord, 0° 47' 53\" Ouest.","gps":"45° 03' 09\" Nord et 0° 44' 51\" Ouest     Castelnau de Médoc","images":["../../jctruffet.com/image/image_33/33_Avensan_1.jpg","../../jctruffet.com/image/image_33/33_Avensan_2.jpg","../../jctruffet.com/image/image_33/33_Avensan_3.jpg","../../jctruffet.com/image/image_33/33_Avensan_4.jpg","../../jctruffet.com/image/image_33/33_Avensan_5.jpg","../../jctruffet.com/image/image_33/33_Avensan_6.jpg","../../jctruffet.com/image/image_33/33_Avensan_7.jpg"]},"Consult_chateau_formulaire2a86":{"id":"Consult_chateau_formulaire2a86","dept":"33","canton":"Pineuilh","commune":"Loubens","nom":"Bagas_Lavison","type":"Maison forte","periode":"XV","histoire":"A Loubens le château de Lavison et à un Km au sud-ouest une tour médiévale à Bagas dit le moulins.          BAGAS, ayant appartenu au XVe siècle à une confrérie religieuse de La Réole, le bâtiment est aujourd'hui désaffecté et la propriété d'une personne privée. Il est inscrit au titre des M.H. par arrêté du 7 janvier 1926.                                                               LAVISON, cité pour la première fois en 1274 à l'origine une simple tour à un bourgeois issu de la famille de Bazas Bertrand de Ladis, aurait servi de rendez-vous de chasse au Prince Noir. Au XVIe siècle appartient à la famille de Mallet, en 1594 Jean de Mallet seigneur de Gombaud et de Loubens et par alliance passe aux Lavie au XVIIe siècle, Jehanne de Héguey veuve du sieur de Lavison un autre Lavie fait passer le domaine aux Laveyssière qui le conserveront jusqu'à la Révolution, aujourd'hui appartient à la famille Martet.","architecture":"BAGAS   Maison forte du XVe siècle composé d'un haut corps de logis rectangulaire  de trois niveaux toit en croupe accolé d'une tour ronde et d'un donjon carré à créneau recouvert d'un toit à quatre pans l'ensemble recouvert de tuiles.                                               LAVISON  à l'origine une simple tour, au XIVe siècle construction du donjon et du corps de logis,  On peut y apercevoir la poterne fortifiée des XIIIe et XIVe siècles et son ancien dallage en pierre. Au XVIe siècle rajout d'une tourelle d'escalier à vis, au XVIIe siècle remaniement de la poterne d'entrée. Le corps de logis à peu près carré ne comporte que deux étages avec lequel il communique par une porte en arc brisé, est coiffé d'un toit pentu, ses murs de deux mètres d'épaisseur les deux façades présentent des aspect différents, côté cour des fenêtres à meneaux, la façade  extèrieur est proche de son aspect d'origine du XVI siècle, elle est percée d'une unique fenêtre.","habitants":"Famille de Bazas Bertrand de Ladis\r\n        \"","divers":"M.F de Lavison-1-2 et tour du moulin à Bagas-3-4.","gps":"","images":["../../jctruffet.com/image/image_33/33_Bagas_Lavison_4.jpg"]},"Consult_chateau_formulairefd3b":{"id":"Consult_chateau_formulairefd3b","dept":"33","canton":"Eynesse","commune":"Eynesse","nom":"Barrail","type":"Maison forte","periode":"XV-XVIII","histoire":"Trois châteaux à Barrail celui de Barrail de Eynesse et de Picon                                                                  EYNESSE, au treizième siècle le village se nomme Enassa et deux châteaux y sont déjà mentionnés,         BARRAIL se trouve à la limite de la commune et date du XVIe siècle. Il est probable quil sagisse dune possession de lordre de Malte qui se partage, à partir du Moyen-Âge, le territoire dEynesse avec les seigneurs locaux. Le château du Barrail est inscrit aux M.H. depuis 1972.                                                       PICON, qui tient son nom du seigneur du fief à cette époque, château qui sera détruit pendant les guerres de religion et reconstruit au XVIIe siècle. Il sera à nouveau détruit et reconstruit. L'autre château était dans le bourg et a été détruit au XVIIe siècle, il en reste quelques vestiges  comme le joli porche qui jouxte la mairie. La construction du château du Barrail date du XVIe siècle.","architecture":"BARRAIL, au XIIIe siècle le village se nomme Enassa et le château y est déjà mentionné. Ce petit château, se trouvant à la limite de la commune, fut agrandi au XVIe et remanié au XVIIIe siècle, comporte un corps de logis renforcé de trois tours. Une enceinte protégeait la basse-cour. Des dépendances ont été démolies, qui suivaient sans doute le tracé de l'enceinte. Une des tours date de l'agrandissement du XVIe siècle.  Il semble en tout cas certain que son origine remonte à la construction dun barrage sur la rivière, \"barrail\" en vieux français, pour lequel le propriétaire perçoit longtemps des taxes.\r\nPICON la façade de briques roses flanquée de deux tourelles hexagonales. Entouré dun parc et dun petit bois au nord, le château domine les 65 hectares de vignes de la propriété.","habitants":"ordre de Malte \r\n        \"","divers":"Château à Barrail celui de Barrail de Eynesse -1-2 et de Picon -3,   Barrail  44° 49' 07\" Nord et 0° 07' 47\" Est.","gps":"","images":["../../jctruffet.com/image/image_33/33_Barrail_1.jpg","../../jctruffet.com/image/image_33/33_Barrail_2.jpg","../../jctruffet.com/image/image_33/33_Barrail_3.jpg"]},"Consult_chateau_formulaire16ab":{"id":"Consult_chateau_formulaire16ab","dept":"33","canton":"Créon","commune":"Cursan","nom":"Barrault","type":"Château","periode":"XIV","histoire":"BARRAULT, date de 1336.  était autrefois une petite forteresse, fut agrandi au début du XVe siècle construit par Bertrand de Bordas . Le comte de Fumel le fit restaurer au XIXe siècle. La famille Blanchy en devient propriétaire au XIXe siècle. \r\nOutre le château de Barrault, vingt-cinq autres lieux et édifices de la commune de Cursan sont recensés et versés à l'inventaire général du patrimoine culturel dans le cadre d'une étude topographique du canton de Créon réalisée à partir de 1983 par le conseil régional d'Aquitaine.                                                                       Un deuxième château à Barrault appelé le Barreau transformé en chambres d'hôtes.","architecture":"Barrault corps de logis en équerre à trois niveaux à toits presque plats l'édifice est accolé de tours rondes en encorbellement toits en poivrières et terrasses côté parc.","habitants":"Famille Blanchy \r\n        \"","divers":"Château à Cursan, Barrault-1-2-3-4-5    44° 47' 33\" Nord et 0° 19' 29\" Ouest.","gps":"","images":["../../jctruffet.com/image/image_33/33_Barrault_1.jpg","../../jctruffet.com/image/image_33/33_Barrault_2.jpg","../../jctruffet.com/image/image_33/33_Barrault_3.jpg","../../jctruffet.com/image/image_33/33_Barrault_4.jpg","../../jctruffet.com/image/image_33/33_Barrault_5.jpg"]},"Consult_chateau_formulaire2902":{"id":"Consult_chateau_formulaire2902","dept":"33","canton":"Lesparre_Mèdoc","commune":"Arcins","nom":"Barreyres","type":"Château","periode":"XVIII","histoire":"BARREYRES, au XVIIIe siècle, le domaine est une ancienne métairie appartenant à M. Le Blanc de Mauvezin, vendue en 1793 comme bien national à Pauline Le Blanc. En 1834, les noces entre Jean-Baptiste Du Périer de Larsan et Pauline Le Blanc sont l´occasion d´un acte de donation et de partage qui décrit le domaine de \"Bareyre\" ce dernier est reconstruit en 1873   Un second acte de donation et de partage entre les héritiers de Jean Joseph Timothée du Périer de Larsan, datant de 1881, la propriété reste aux mains des descendants du Périer de Larsan jusqu'en mars 1971, lorsque la famille Castel achète le domaine sous le nom de société métropolitaine et africaine de gestion mobilière et immobilière.","architecture":"BARREYRES, la demeure se compose d´un corps de logis, encadré par deux ailes latérales, le corps de logis est édifié sur un premier niveau formant socle à la construction, il est précédé d´un escalier en pierre, en fer à cheval ouvert de deux arcades en rez-de-chaussée. Le logis compte six travées. Les baies du premier étage ont un encadrement saillant, et les deux centrales sont abritées sous une marquise. Le cordon mouluré et les appuis continus des fenêtres du deuxième étage forment un large bandeau intermédiaire. Les fenêtres du second étage sont ornées d´une agrafe sculptée. L´ensemble est coiffé d´une corniche à modillons régnante. Les deux travées centrales sont surmontées d'un troisième étage formant pavillon. Les baies de ce niveau ont un ornement plus élaboré pour les agrafes avec l´utilisation de motifs végétaux. Ce niveau est encadré par des lucarnes ornées d´une agrafe et coiffées d´un fronton triangulaire. Les ailes latérales du logis s´élèvent sur deux niveaux. L´aile nord, abritant des logements, compte 6 travées avec des portes-fenêtres en rez-de-chaussée et des fenêtres en plein-cintre pour l´étage. Un bandeau médian mouluré orne la façade. L´aile sud, servant au stockage, est percée d´un portail en arc segmentaire. Ces deux ailes restaurées sont coiffées d´une balustrade ponctuée de pots-à-feu.","habitants":"M. Le Blanc de Mauvezin\r\n        \"","divers":"Château de Barreyres à Arcins.","gps":"","images":["../../jctruffet.com/image/image_33/33_Barreyres_1.jpg","../../jctruffet.com/image/image_33/33_Barreyres_2.jpg"]},"Consult_chateau_formulaire713c":{"id":"Consult_chateau_formulaire713c","dept":"33","canton":"Salles","commune":"Barsac","nom":"Barsac","type":"Château","periode":"XVII","histoire":"A Barsac, le château de Nairac, de Bastard XVIIe siècle, de Climens de Campéros (voir article) de Rolland article avec Campéros, vestiges médiévaux. Nombreuses maisons du XVIIIe siècle dans le village.  Valmont hôtel   et Coutet  Myrat (voir article).                 \r\nCAILLOU, le château Caillou est niché dans les paysages bucoliques de Sauternes, entre doux vallons et vastes horizons dégagés.  Depuis 1909, date dacquisition du château par la famille Ballan-Bravo, 4 générations se sont transmis un savoir-faire unique.  COUTET, un premier seigneur de Coutet est mentionné en 1643 : Charles Le Guérin. Avant la Révolution, le château est la propriété de Gabriel-Barthélemy-Romain de Filhot, président du parlement de Bordeaux décapité en 1794. Le château est vendu en 1791, mais il revient, au XIXe siècle, aux Lur Saluces, parents des Filhot    En 1922, château Coutet est racheté par Louis Guy, fabricant de presses hydrauliques et de matériel viticole : cette transaction signifie la séparation de château d'Yquem. Marcel Baly et ses deux fils, Philippe et Dominique Baly, acquièrent le château Coutet en 1977. \r\nCLIMENS,  Girault Roborel, procureur du Roi à Barsac, hérite au XVIe siècle de la terre et développe la culture de la vigne. Le domaine restera la propriété de sa famille jusqu'au début du XIXe siècle. C'est sous la direction d'Éloi Lacoste. Le domaine devient la propriété de la famille Gounouilhou en 1880. Lucien Lurton, l'acquiert, en 1971,  et transmet le contrôle de la propriété à ses enfants en 1992. Bérénice Lurton, actionnaire majoritaire dirige la propriété depuis 1993.","architecture":"Barsac, les témoins de lancienneté historique de Barsac sont nombreux : maisons et châteaux du XVe au XIXe, aussi, importance de Barsac due au titre de « Prévôté Royale » dès le XIIIe siècle. Ainsi, Henri III Roi dAngleterre, en 1254, sadresse « aux hommes libres de la Prévôté de Barsac ».                                        CAMPEROS de plan rectangulaire à deux niveaux sur soubassement et lucarnes  en combles sur toit en croupes ces dernieres possèdent des frontons triangulaires et les deux  centrales jumelées avec frontons à acrotères et toit plus haut reliant l'opposée de l'avant-corps dont les façades sont dans le même style.  Chainage à chaque angles de l'avant corps et aux angles de l'édifice et des pavillonsen retour d'équerre de chaque côtés avec terrasses balustrés. le bâtiment est accolé  de deux tourelles à droite toit en dôme à gauche toit en poivrières.                          ROLLAND corps de logis rectangulaire accolé d'une tour ronde toit en poivrières, l'ensemble recouvert de tuilesCAILLOU, corps de logis carré à trois niveaux à toits brisés flanqué de deux tours élancées domine les environs, couvertes d'ardoise, la bâtisse est relié à droite comme à gauche par des bâtiments de dépendances à deux niveaux.                               CLIMENS, château Climens du XVIe siècle, quadrilatère, le corps de logis central à un niveau oblong reliant deux tours carrées aux extrémitées  de deux niveaux toit à quatre pans, l'ensemble recouvert de tuiles.                                                                COUTET, château de type anglais bâti au XIIIe siècle, la tour carrée est typique des constructions militaires de lépoque. Logis formé de deux corps de bâtiment des XVIe et XVIIe siècles ; juxtaposés et flanquant une grosse tour carrée du XIVe siècle ; laquelle est exhaussée au XVIIe siècle ou tout du moins refaite dans ses parties hautes. Sur l'une des façades des communs, deux ailes en retour d'équerre forment une deuxième cour. Puits du XVIIe siècle ; chapelle, remise et pigeonnier du XVIIIe siècle ; une partie des logements de domestiques et des chais semble dater du XVIIIe siècle; mais ces derniers furent considérablement agrandis au XIXe siècle.","habitants":"Comtes Dudon                                                               Famille Ballan-Bravo                                                     Famille de Charles Le Guérin\r\n        \"","divers":"A Barsac, château de Bastard, de Doudon, de Campéros 6-7-8 de Coutet-4, de Climens g-2-3, de Caillou grav-1, de Nombreuses maisons du XVIIIe siècle dans le village.    GPS : 44° 36' 37\" Nord 0° 18' 47\" Ouest.","gps":"44° 36' 37\" Nord 0° 18' 47\" Ouest.","images":["../../jctruffet.com/image/image_33/33_Barsac_1.jpg","../../jctruffet.com/image/image_33/33_Barsac_2.jpg","../../jctruffet.com/image/image_33/33_Barsac_3.jpg","../../jctruffet.com/image/image_33/33_Barsac_4.jpg","../../jctruffet.com/image/image_33/33_Barsac_5.jpg","../../jctruffet.com/image/image_33/33_Barsac_6.jpg","../../jctruffet.com/image/image_33/33_Barsac_7.jpg","../../jctruffet.com/image/image_33/33_Barsac_8.jpg","../../jctruffet.com/image/image_33/33_Barsac_9.jpg"]},"Consult_chateau_formulairec2ae":{"id":"Consult_chateau_formulairec2ae","dept":"33","canton":"Salles","commune":"Barsac","nom":"Barsac_II","type":"Château","periode":"XVII","histoire":"NAIRAC, est fondé au milieu du XVIIe siècle par André Duranceau. Le domaine fut acheté en 1759 par Élizabeth Prost,  puis revendu en 1777 à Élisée Nairac (1734-1791) deux de ses filles, Henriette (1765-1837) et Emilie (1766-1834) héritent du domaine. Elles restent célibataires, et dirigent le domaine jusquà leur décès. En 1837, les héritiers Nairac vendent à Bernard Capdeville, également propriétaire du château Broustet situé à environ 500 mètres du château Nairac. Les deux vignobles sont alors regroupés, sous le nom de château Broustet-Nairac.  La scission du domaine dans ses deux entités distinctes a alors lieu : pour Broustet à la fin du XIXe siècle et pour Nairac en 1906 à M. Perpezat, négociant lorrain. En 1966 le château fait l'objet d'une vente à un conseiller municipal de Bordeaux qui le revendit en 1971 à laméricain Thomas Heeter et à son épouse Nicole Tari, elle-même fille du propriétaire de château Giscours. Depuis 1987, Nicole Tari-Heeter est la seule propriétaire du domaine et à partir de 1993, ses enfants Nicolas et Eloïse gèrent lexploitation.\r\n   MYRAT,  cest en effet en 1533 que Jean de Pontac fonde le domaine Haut-Brion destiné à lexploitation des vignes. Il vivra 101 ans, ayant traversé les règnes de Louis XII, François Ier, Henri II, Charles IX et Henri III.  Un siècle plus tard, son descendant Arnaud de Pontac, , il est un fin politique puisquil est nommé en 1660 premier président du parlement de Bordeaux. En 1937, le comte Max de Pontac, désireux de poursuivre lattachement familial profond aux terres de Bordeaux et à ses vins, rachète le château de Myrat.","architecture":"DUDON est un château bâti à Barsac, propriété familiale depuis 1868 cinq générations de femmes se sont succédées. Jusqu'à la Révolution française, la propriété appartenait aux comtes Dudon.            CAMPEROS,les témoins de lancienneté historique de Barsac sont nombreux : maisons et châteaux du XVe au XIXe siècles à Barsac due au titre de « Prévôté Royale » dès le XIIIe siècle. Ainsi, Henri III Roi dAngleterre, en 1254, sadresse « aux hommes libres de la Prévôté de Barsac ».  Bâti à Barsac,  du XIXe siècle,'est devenu un gîte d'hôtes avec 4 chambres de 25 à 40 m², son parc arboré, sa terrasse, son salon de jardin.\r\n ROLLAND, bâti à Barsac, date du XV siècle. Il fut acquis en 1492 par la famille de Rolland qui l'exploita jusqu'en 1796. Il ne reste  que des vestiges médiévaux. De 1797 à 1971, 6 familles différentes vont se succéder. Depuis 1971 c'est la famille Guignard qui exploite les 20 ha.  Visite du pigeonnier.                        ROUMIEU  pas d'information  historique.                 NAIRAC, le château actuel fut bâti en 1786, sous la conduite de l'architecte André Mollié, collaborateur de l'architecte Victor Louis pour le grand théâtre de Bordeaux.                                                             VALMONT est une ancienne propriété viticole du XVIIIe siècle. Il est composé dune maison de maître, de chais et dépendances. Il a été transformé en résidence hôtelière. Larchitecture du domaine est très originale dans la région bordelaise. La salle des Arcades qui est remarquable de part son style florentin est ouverte sur un parc clos de murs dun hectare. VEDRINES, dont certains bâtiments datent du XVIe siècle, tire son nom des chevaliers de Védrines qui en furent les propriétaires historiques jusquau milieu du XIXe, époque où la famille Castéja acquiert le château. Les descendants de cette famile sont toujours aux commandes du domaine aujourdhui,  le château Doisy-Védrines est proche des châteaux Coutet et Climens.","habitants":"Thomas Heeter                                                              Vedrines Famille Castéja\r\n        \"","divers":"A Barsac-II, Myrat-1-2-3, Nairac-4-5, Rolland-6, Roumieu-7-,  Valmont-8.   44° 36' 37\" Nord 0° 18' 47\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Barsac_II_1.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_2.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_3.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_4.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_5.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_6.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_7.jpg","../../jctruffet.com/image/image_33/33_Barsac_II_8.jpg"]},"Consult_chateau_formulaire8ac9":{"id":"Consult_chateau_formulaire8ac9","dept":"33","canton":"Lormont","commune":"Bassens","nom":"Bassens","type":"Château","periode":"XVII","histoire":"A Bassens, Beauval (voir article) Griffons,  Lagarde, Lagrange,  Meignan,  Moulerin, Muscadet,  Pomerol, Puy-Pelat et de Séguinaud (voir article), et autres châteaux non signalés                                                     GRIFFONS, le domaine est acquis au XIXe siècle par Marc Maurel (1826-1911), économiste bordelais, membre du conseil municipal de Bordeaux et de l'Assemblée Nationale en 1870. Il y fait construire en 1863 l'actuel château. En 1923, ses enfants vendent le domaine au négociant Paul Charles Galène. En 1934, la commune de Bassens l'acquiert.               LAGARDE, bâti à Bassens,  fut construit vers 1864,  pour l'armateur bordelais Émile Maurel.    Il est détruit dans un incendie en 1913. Il reste les communs et  les logements.                                                                          LAGRANGE C'était une ancienne possession de l'abbaye cistercienne de Bonlieu.                       MEIGNAN appelé le domaine de Meignan, à Bassens, \r\nMORIN est une maison de maître, bâtie à Bassens,     MOULERIN, date des XVIIe et XVIIIe siècles. Lors de la vente comme bien national, le domaine Moulerin comportait, une maison de maître avec sa métairie.   \r\nMUSCADET, maison de maître bâtie à Bassens.\r\nPOMEROL, château bâti  à Bassens,  pour Jean Maurel, négociant bordelais. Le château de Pomerol est devenu une maison de retraite.                            PUY-PELAT appelé le château Puy-Pelat appelé après le domaine des Balances, bâti à Bassens, Le manoir date du XVIIIe siècle.                                             BEAUVAL, bâti  à Bassens,  La construction du château de Beauval date du XVe au XIXe siècle,  a été construit pour le fils de Jean de Beauval. Vers 1649, le duc d'Epernon y séjournera. Il passera à la famille de Conilh, qui le fait reconstruire à partir de 1725. En 1857, il est acquis par l'armateur bordelais Hubert Prom (1807-1896) fondateur de Maurel et Prom, et propiétaire  qui le remania en 1861 . La municipalité de Bassens devient propriétaire du domaine en 1991.  Cet ensemble date des XVIIIe et XIXe siècles. Le château de Beauval aujourd'hui est devenu privé et fermé au Public.","architecture":"LAGRANGE, sa construction date du XVIIIe et XIXe siècle. Elle est constituée d'un corps principal accolé à un corps de bâtiment plus étroit.                                  MEIGNAN des XVIIIe et XIXe siècles. Son puits galbé date de la première moitié du XVIIIe siècle et son portail composé d'une porte cochère flanquée de deux portes piétonnes date du 1er quart du XIXe siècle.       MORIN, sa construction date du XVIIIe siècle, a été partiellement détruit par un incendie en 2001. Le château Morin a été attribué à l'architecte Louis Combes.\r\nMOULERIN, date des XVIIe et XVIIIe siècles, mais a été très remaniée par la suite. Le logis est allongé et prolongé d'un logement et d'un chai, portant la date de 1882.                                                                     MUSCADET, il a été construit au XVIIIe et XIXe siècles, cet ensemble est composé d'un logis (partie ancienne) au centre d'une cour avec 3 côtés, entourés par des dépendances. Les deux pavillons de la façade postérieure sont recouverts d'une haute toiture d'ardoise, percée d'ils-de-buf.                         POMEROL,  date du 4eme quart du XIXe siècle,  Aujourd'hui, le château a été vendu, puis aménagé en maison de retraite, en 1965. De nouveaux corps de batiment ont agrandi le logis.                                         Le Manoir de PUY-PELAT  dit château Puy-Pelat date du XVIIIe siècle. quelques vestiges des murs du logis percés d'une porte cintrée.                                              BEAUVAL  néo-classique Renaissance est aussi constitué d'un logis et d'une chapelle. Corps de logis de plan rectangulaire à trois niveaux avec série de lucarnes sur toits brisées, en façade plein cintre avant  corps avec escalier d'accés au premier étage en fer à cheval et au niveau du toit Lucarnes gothiques galbé avec cartouches et pinacle sur  fronton rotondant.","habitants":"Négociant bordelais\r\n        \"","divers":"A Bassens, le château de  Griffons-1-2, Grillon-3-4,  Lagarde, Lagrange,  Meignan,  Moulerin, Muscadet -6,  Pomerol-7 , Puy-Pelat, Lagarde  : 44° 54' 05\" Nord et 0° 30' 59\" Ouest                              Meignan Morin-5   4° 54' 05\" Nord et 0° 30' 59\" Ouest               Beauval g-8-9  GPS : 44° 54' 05\" Nord et 0° 30' 59\" Ouest","gps":"44° 54' 05\" Nord et 0° 30' 59\" Ouest","images":["../../jctruffet.com/image/image_33/33_Bassens_1.jpg","../../jctruffet.com/image/image_33/33_Bassens_2.jpg","../../jctruffet.com/image/image_33/33_Bassens_3.jpg","../../jctruffet.com/image/image_33/33_Bassens_4.jpg","../../jctruffet.com/image/image_33/33_Bassens_5.jpg","../../jctruffet.com/image/image_33/33_Bassens_6.jpg","../../jctruffet.com/image/image_33/33_Bassens_7.jpg","../../jctruffet.com/image/image_33/33_Bassens_8.jpg","../../jctruffet.com/image/image_33/33_Bassens_9.jpg"]},"Consult_chateau_formulaire810e":{"id":"Consult_chateau_formulaire810e","dept":"33","canton":"Créon","commune":"Bauréch","nom":"Bauréch","type":"Château","periode":"XVIII","histoire":"A Bauréch le château de Canteloup, Lacaussade, Champcenetz, Dudon, Gaussens, Laroche, Laroze et Lyde.                                                      LACAUSSADE, vestiges du XIIIe siècle  et XVIIe siècle,  Ce château appartient actuellement à M. de Lacaussade,   le site est occupé depuis lépoque romaine, avec divers objets retrouvés.   CHAMPCENETZ, batisse actuelle du XIX siècle. Le propriétaire est M.Smidt, ce domaine est cité dans le roman \"la juive du château trompette\" de Ponson du Terrail.                                                                           DUDON, propriété actuelle de M. Merlaut, maire de Bauréch  le bâtiment daterait de la fin du XVIIIe siècle, alors que le bâtiment dexploitation serait du XVIIe siècle.                                                                    GAUSSENS, cétait au début du XVIIe siècle, un petit manoir dont il subsiste une tour centrale intégrée dans lédifice agrandi au XIX siècle. Propriété depuis 1750, de la famille de Lambert des Granges.\r\nDans le parc du château se trouve une source dont le débit hors du commun contribue à agrémenter le parc, par un parcours sinueux se terminant en cascade.        LAROCHE, de style néo  classique du XIXe siècle, a remplacé un château du XVIIe siècle dont il subsiste une tour descalier.                                                  LAROZE, bâtiment actuel néo  gothique, consruit au XIXe siècle, et dont il ne reste que les murs après avoir brûlé il y a une soixantaine dannées. En 1882, cest Pierre Laville de Lacombe, qui en est propriétaire.","architecture":"CANTELOUP, selon linventaire des M.H., ce domaine aurait appartenu à larchevêque Arnaud de Canteloup, cousin de Clément V, premier pape dAvignon, mais rien ne subsiste de cette époque du XIV siècle  Vers 1489, Canteloup lui aurait été vendu, mais aucun acte de vente na été retrouvé.                                    LACAUSSADE, vestiges du XIIIe et XVIIe siècle, le château de Lacaussade a subi plusieurs modifications. Il comprend un corps de logis flanqué de tours rondes et carrées. Au centre de ces constructions sélève un donjon carré à trois étages. En 1996, ladaptation cinématographique du roman \"La taupe\" de Pierre Luccin, a été tournée en partie sur ce domaine.\r\nLYDE, au XIX siècle, le château de Lyde se compose dun long rectangle surmonté de trois pavillons carrés : lun au centre les autres sur les ailes. Le premier qui est flanqué dune petite tourelle, est couvert en ardoises, les autres en tuiles plates. La chapelle classée qui occupe un des pavillons a bien conservé laspect dune chapelle féodale. Au - dessus de lautel se trouve un tableau du peintre Larreydi (1709).","habitants":"Gaussens Famille de Lambert des Granges\r\n        \"","divers":"A Baurech le château de Canteloup-1, Lacaussade 4-5, Champcenetz-2, Dudon Gaussens-3-, Laroche 6-7, Laroze et Lyde grav 8- 9.","gps":"","images":["../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_1.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_2.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_3.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_4.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_5.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_6.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_7.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_8.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_9.jpg"]},"Consult_chateau_formulaire0828":{"id":"Consult_chateau_formulaire0828","dept":"33","canton":"Créon","commune":"Baurech","nom":"Bauréch_2","type":"","periode":"","histoire":"BELLEVUE Son origine remonterait au XV siècle,      NENINE, dépendait au XIIIe siècle de la seigneurie du Prince Noir.La bâtisse actuelle date de 1812. La propriété rénovée dans les années 70 par la famille Fouquet                                                                   NORT, le premier château dont il subsiste quelques éléments et le tracé dun jardin dateraient du XVII siècle. Le bâtiment actuel date du XIXe siècle.               PRESSAC Le château actuel construit en 1858 a remplacé le château de Tastes dont il ne subsiste que le très beau pigeonnier avec un dôme en pierres, probablement du XVIIe siècle.   Longtemps abandonné, endormi comme la belle au bois dormant, le château Pressac en 2006 renaît pour dispenser aux passants et à ses heureux propriétaires, bonheur et beauté.\r\nPUYGUERAUD, château du XVIII siècle de style néo classique. Lécrivain Daniel Rops y a fixé laction principale de son livre \"Terre fidèle\".","architecture":"BELLEVUE Son origine remonterait au XV siècle, style Charente - poitou, il a été agrandi au XVII siècle. Les ouvertures et le décor intérieur seraient de la moitié du XVIII siècle.                                                                   NENINE, implanté plein sud sur les coteaux qui domine la rive droite de la Garonne à Baurech, occupe aujourdhui lemplacement des anciens bâtiments dexploitation qui dépendaient au XIIIe siècle de la seigneurie du Prince Noir.\r\nSa situation exceptionnelle avait déjà séduit les Romains, comme latteste des vestiges trouvés sur place.                                                                         NORT, le premier château dont il subsiste quelques éléments et le tracé dun jardin dateraient du XVIIe siècle. Le bâtiment actuel date du XIXe siècle.             PRESSAC   de plan rectangulaire à deux niveaux sur soubassement, arcardes retondantes sur portes et fenêtres du rez-de-chaussées, toiture en terrasses entouré de balustres.                                    PUYGUERAUD, château du XVIII siècle de style néo classique. Il subsiste également un pigeonnier semblant posséder les caractéristiques de cette époque.  Sur le fronton, une date : 1835. Elle rappelle le rajout effectué au XIXe siècle sur le bâtiment dorigine. porche imposant sur colonne avec fronton triangulaire.","habitants":"Famille Fouquet,\r\n        \"","divers":"A Baurech le château   Baurech grav 6 de Bellevue grav 1 , Nénin grav 2, Nort grav-3, Pressac grav-4, et Puygueraud grav -5.  Dudon grav-7","gps":"","images":["../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_1.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_2.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_3.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_4.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_5.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_6.jpg","../../jctruffet.com/image/image_33/33_Baur%c3%a9ch_II_7.jpg"]},"Consult_chateau_formulaire65ac-2":{"id":"Consult_chateau_formulaire65ac-2","dept":"33","canton":"Saint-André de Cubzac","commune":"Saint-Christoly de Blaye","nom":"Bavoliers_Jussas","type":"château","periode":"XIV-XVI","histoire":"Deux châteaux à Sainr-Christoly de Blaye celui de Bavoliers et  de Jussas.                                             BAVOLIERS  appartient à la famille du même nom jusquà la Révolution. Barthélémy de Bavolier, époux dAnne de Gaufreteau est conseiller au parlement. En 1874, Jean-Victor Gervais, courtier en vins et membre du conseil général de la Gironde en fait lacquisition. Le château passe ensuite à Pierre Gilbert des Aubineaux. Appartient au conseil général de la Gironde qui l'a racheté,  est classé comme chambres d'hôtes dans la rubrique hotels. \r\nJUSSAS du XIVe siècle, édifié à lépoque de la domination anglaise, ce château appartient ensuite à Jean de Guillocher de Gambes, capitaine au service de Charles VII, puis à la famille Boyer jusquà la Révolution.  Après avoir appartenu aux Blanchet et aux Girard, le château est racheté en 1893 par Jean Eugène Bourdillas.","architecture":"BAVOLIER, construit au XVe siècle,de plan rectangulaire à un niveau avec soubassement, pavillon d'entrée légèrement saillant avec escalier sur terrasse sur pied droit au premier et sur toit qui est en croupe recouvert d'Ardoise                                               JUSSANS Il sagit dun manoir oblong dont chaque angle est flanqué dune tour. Deux dentre elles, arasées au XVIIe siècle, subsistent sur la façade sud. Jussas possédait autrefois des oubliettes, et un souterrain qui aboutissait, selon la tradition, au bois des Lamberts.","habitants":"Famille Barthélemy de Bavolie                                        Jussans Jean Eugène Bourdillas.\r\n        \"","divers":"à Saint-Christoly de Blaye grav 3-4 celui de Bavoliers grav 2 et celui de Jussac grav 1.   Bavoliers 45° 07' 53\" Nord et 0° 30' 24\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Bavoliers_Jussas_1.jpg","../../jctruffet.com/image/image_33/33_Bavoliers_Jussas_2.jpg","../../jctruffet.com/image/image_33/33_Bavoliers_Jussas_3.jpg","../../jctruffet.com/image/image_33/33_Bavoliers_Jussas_4.jpg"]},"Consult_chateau_formulaire2497":{"id":"Consult_chateau_formulaire2497","dept":"33","canton":"Ambarès et Grave","commune":"Baychac et Caillau","nom":"Baychac_Caillau","type":"Château","periode":"XVII","histoire":"Trois châteaux à Baychac et Caillou dont Baychac, Villepreux et Teynac,  et autres châteaux presque tous vinicoles de France, chambre d'hôtes, Erigoye, Lalande de Taleyran, l'Intendant, Galande, Terte, Grand -Puch, Larsan, la Tour, et Carmassac.   BAYCHAC chateau dit la FRANCE  transformé en chambres d'hôtes.                                                VILLEPREUX appartenait au château Sacolle. L'édifice constitue aujourdhui une marque, parmi de nombreuses autres dans la région, de limportance et de la diffusion du néo-classicisme architectural du XIXe siècle. Pas d'information pour les autres châteaux.                                                                  TEYNAC chambres d'hôtes dont le parc transformé en golf.","architecture":"La FRANCE manoir dont le corps de logis rectangulaire de un niveau sur soubassement formant l'ensemble en U par deux pavillons rectangulaire à droite et à gauche à deux niveaux  avec lucarnes du toits en croupes,  fronton triangulaire avec oeil de boeuf sur façade d'entrée, l'ensemble recouvert  d'ardoises.                                                           VILLEPREUX, le château sélève au fond dune longue allée, il est construit dans un style néo-classique typique du XIXe siècle. Lédifice actuel est construit sur lancien château Sacolle. Il se compose dun corps de logis rectangulaire encadré par deux pavillons coiffés dardoise. Le château était agrémenté autrefois dun jardin et dun bassin deau. Lun des pavillons est décoré de pilastres superposés portant un fronton triangulaire dans un style du XVIe siècle          quadrangulaire avec divers corps de logis de un à deux niveaux avec des toits à deux pans chacun à l'angle de cet ensemble un donjon de trois niveaux à mâchicoulis toit à quatre pans avec une lucarnes de chaque côtés, l'ensemble recouvert de tuiles.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Baychac Caillou dont Baychac  grav 1-2, Gd-Puch grav-3, et Teynac grav 4-5, Bussac-8, Paybas 9, Villepreux grav-5-7.","gps":"","images":["../../jctruffet.com/image/image_33/33_Baychac_Caillau_1.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_2.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_3.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_4.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_5.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_6.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_7.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_8.jpg","../../jctruffet.com/image/image_33/33_Baychac_Caillau_9.jpg"]},"Consult_chateau_formulaire6e13":{"id":"Consult_chateau_formulaire6e13","dept":"33","canton":"Bazas","commune":"Bazas","nom":"Bazas","type":"Château","periode":"XVIII","histoire":"A Bazas bastide;  chateau d'Arbieu, d'Auros, l'hospice ancien château, l'hôtel de ville également et St-Vincent.                                                                        ARBIEU, lun des premiers propriétaires du château est Joseph Saige, un avocat devenu maire de Bazas, conseiller général, puis juge. Pendant la Révolution ce membre de la constituante est condamné à mort en 1793, mais nest pas exécuté, faute de guillotine disponible. Cet évènement lui sauve la vie, en effet la période de la Terreur prend fin peu temps après sa condamnation, laquelle est vite oubliée. Chambres d'hôtes du comte Philippe de Chénerilles.                 AUROS château dit de Rivel dont la fondation  d'après le prieur Bernard de Fournieux.                                  ST-VINCENT, transformé en chambres d'hôtes de style Renaissance datant du XIXe siècle est situé dans le village de Bazas,","architecture":"A Bazas bastide  avec remparts et porte de gasquet entre tour ronde de style forteresse avec mâchicoulis et créneau.                                                               ARBIEU, l'architecture du château reprend le style classique en vogue à cette époque. Il est constitué dun corps de logis rectangulaire à neuf travées. Logo monument historique  rouge ombré, encadré, la poterne de la Brèche et la porte du Gisquet ainsi que divers vestiges de l'enceinte de Bazas, rue de Pontac, rue Bragous, place de la Taillade et allée de Tourny qui ont été inscrits en tant que monuments historiques en 1994 Au centre, la porte dentrée est surmontée dun fronton sculpté, au-dessus duquel se trouve un balconnet. Il sagit sans doute de la fenêtre principale de la chambre du châtelain. Une mansarde unique couronne la travée centrale. La toiture est surmontée de grosses cheminées.                                               ST-VINCENT de style Renaissance datant du XIXe siècle   de trois niveaux avec série de fenêtres à cheval sur le haut de la bâtisse et chemin de rondes avec des fronton redondant la toiture flanqué de trois lucarnes à occulus dans un toit brisés et galbés à pilastres et balcon au premier sur les portes fenêtres. L'ancien hospice en totalité, composé de l'actuelle maison de retraite.","habitants":"Famille de Joseph Saige\r\n        \"","divers":"A Bazas, Bastide grav -1;  chateau d'Arbieu-2-3-4-5, d'Auros-6, l'hospice ancien château -7-8, l'hôtel de ville également et St-Vincent-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_Bazas_1.jpg","../../jctruffet.com/image/image_33/33_Bazas_2.jpg","../../jctruffet.com/image/image_33/33_Bazas_3.jpg","../../jctruffet.com/image/image_33/33_Bazas_4.jpg","../../jctruffet.com/image/image_33/33_Bazas_5.jpg","../../jctruffet.com/image/image_33/33_Bazas_6.jpg","../../jctruffet.com/image/image_33/33_Bazas_7.jpg","../../jctruffet.com/image/image_33/33_Bazas_8.jpg","../../jctruffet.com/image/image_33/33_Bazas_9.jpg"]},"Consult_chateau_formulaire288a":{"id":"Consult_chateau_formulaire288a","dept":"33","canton":"Lormont","commune":"Bassens","nom":"Beaumont_Bassens","type":"Château","periode":"XVI","histoire":"BEAUMONT, Il est le plus ancien de la commune du XVIIe siècle, peut se féliciter d'avoir tenu bon, face aux âges, aux révolutions et à ses multiples résidents. D'après la légende, Du Guesclin, prisonnier sur parole du Prince Noir et en semi-liberté, y aurait séjourné. Face à ses histoires de coin de feu, des repères certains : construit par la famille de Kunes, puis au XVIIIe siècle habité par André Allenet comte de Beaumont-Bassens, associé par le mariage à la famille de Brivazac, il passe dans les mains d'un consul de deux états d'Amérique, un certain Gallès, avant de finir dans les mains d'Hippolyte Bertrand, négociant et consul de l'Empire Ottoman. Depuis 1955, le château Beaumont est une propriété de la mairie de Bassens.   \r\nPOMEROL, du XIXe siècle, aujourd'hui maison de retraite.\r\nLa maison de maître dite château des Griffons, actuel bâtiment construit au XIXe siècle par l'architecte Charles Berger pour le négociant bordelais Marc Maurel. Acquis en 1934 par la municipalité de Bassens.","architecture":"Le manoir appelé le château Beaumont, du XVIIIe siècle, remanié au XXe. L'édifice se compose d'un corps de logis carré avec deux tours circulaires découronnées. Le château de Beaumont et son parc ont été acquis par la municipalité en 1955. c'est devenu une maison des Jeunes. Le château Beaumont appartient à une société civile d'exploitation. Bellerive-les-Moines est une maison de maître, La construction du château date des XVIIIe et XIXe siècles. C'est une maison carrée à étage, avec des tours polygonales, de style néo-médiéval, surmontées d'un décor de créneaux.                                 POMEROL du XIXe siècle style néo classique  à deux niveaux  avec lucarnes sur un toit brisé, l'édifice esy accolé en angle de pavillons carées, l'ensemble est recouvert d'ardoises.","habitants":"Famille de Brivazac\r\n        \"","divers":"Beaumont grav-2-3-3-4            GPS : 44° 54' 05\" Nord et 0° 30' 59\" Ouest                                    Bellerive grav-1   44° 54' 05\" Nord et 0° 30' 59\" Ouest","gps":"44° 54' 05\" Nord et 0° 30' 59\" Ouest","images":["../../jctruffet.com/image/image_33/33_Beaumont_Bassens_1.jpg","../../jctruffet.com/image/image_33/33_Beaumont_Bassens_2.jpg","../../jctruffet.com/image/image_33/33_Beaumont_Bassens_3.jpg","../../jctruffet.com/image/image_33/33_Beaumont_Bassens_4.jpg"]},"Consult_chateau_formulaire9cd9":{"id":"Consult_chateau_formulaire9cd9","dept":"33","canton":"Lacanau","commune":"Cussac-Fort-Médoc","nom":"Beaumont_Cussac","type":"Château","periode":"XVIII","histoire":"BEAUMONT. Défriché dès 1772, le domaine devient propriété dHenri Labarthe. Cest en 1824 que naît le vignoble de Beaumont avec son nouveau propriétaire monsieur Bonnin. De 1830 à 1847, appartient au marquis dAligre, lune des plus grandes fortunes de France. En 1849, le domaine passe aux mains des frères Bonnin qui firent construire en 1854 le château Beaumont dans un style renaissance dit à la Mansart. En 1860, le comte de Gennes, grand-oncle de Pierre-Gilles de Gennes, Prix Nobel de Physique en 1991, acquiert la propriété quil vendra en 1872 à Jean-Victor Herran, ministre du Honduras. On lui doit la construction du cuvier en 1894. De 1925 à 1986 se succèdent à la tête du domaine la société milanaise Della Grazia et Cie, le lieutenant-colonel de Caracas Ignacio Andrade, lancien sénateur du Venezuela Dionisio Ramon Bolivar Carvajal Mme Bolivar veuve en 1978 se séparent du domaine  en 1984  vendu au viticulteur Bernard Soulas qui reconstitue entièrement le vignoble et restaure le château. En 1986, le château Beaumont entame sa douzième vie avec larrivée du groupe GMF qui sassocie au groupe japonais Suntory pour créer la société grands millésimes de France, également propriétaire du château Beychevelle et de la société de négoce bordelaise Barrière Frères. Aujourdhui, le capital de grands millésimes de France est détenu par les groupes Suntory et Castel.","architecture":"BEAUMONT, suite à l'incendie  de 1933 reconstruction de la partie centrale en 1985 par Bernard Soulas. Le château est entouré d'une terrasse bordée d'une balustrade, se compose d'un corps central  encadré de deux tourelles octogonales plus élevées et de deux ailes perpendiculaires, chacune terminée par une tourelle. Il comporte un rez-de-chaussée et un étage de comble éclairé par des lucarnes à fronton. La façade  ouvrant sur le parc s'ordonne autour d'un avant corps à trois pans percé en son centre d'une porte en plein cintre. Sur la façade opposée, une tour, sommée d'un toit en terrasse,  un donjon symbolique. Sur les façades de pierre dans lesquelles s'encadrent des niches abritant  des vases Médicis, les travées sont rythmées par des pilastres à chapitaux ouvragés.","habitants":"Famille dHenri Labarthe\r\n        \"","divers":"Château de Beaumont à Cussac","gps":"","images":["../../jctruffet.com/image/image_33/33_Beaumont_Cussac_1.jpg","../../jctruffet.com/image/image_33/33_Beaumont_Cussac_2.jpg","../../jctruffet.com/image/image_33/33_Beaumont_Cussac_3.jpg"]},"Consult_chateau_formulaire5850":{"id":"Consult_chateau_formulaire5850","dept":"33","canton":"Langon","commune":"Fargues","nom":"Beauséjour","type":"Château","periode":"XVIII","histoire":"BEAUSEJOUR, messire Ambroise de Chassaing, écuyer fils de Jean , messire Jérôme fils aîné dAmbroise, écuyer, épouse  en 1757, demoiselle Catherine Dejehan, fille de Louis de Dejehan, écuyer, ancien procureur syndic de Bordeaux et de demoiselle Thérèse de Lescours. En 1760  reçut le domaine en héritage en 1789  Grégoire Jérôme de Chassaing a été maire de Fargues St Hilaire de 1811 à 1812. Il vendra le domaine à  Pierre Maydieu, négociant à Bordeaux, en 1807 monsieur Pierre Maydieu vendra le domaine de Beauséjour en 1812, à  Jean Baptiste David Mondion, propriétaire vendra le domaine de Beauséjour,  en 1836, à  Louis Auguste De Ronseray, propriétaire sans profession. En 1858, Louise Antoinette Anaïs Mondion, fille de Jean Baptiste Mondion, épouse  de Ronseray en 1836, lègue un bâtiment aux soeurs de la présentation de Marie afin de créer une école de filles, aujourdhui école Marie Rivier. En 1863, le domaine de Beauséjour, sera vendu à  Bernard Guillaume Eudoxe de Banes-Gardonnes, propriétaire. En 1869, le domaine de Beauséjour,  sera vendu à Jean Baptiste Rollad, propriétaire rentier. En 1929, monsieur Faure acheta le domaine de Beauséjour , et cest en 1952 que   Grignet  de Saint-Loup acheta le domaine de Beauséjour. De nos jours, monsieur et madame Amouroux, petite fille Grignet de Saint-Loup, ont restauré et transformé une partie des dépendances en un établissement pour personnes âgées dépendantes : Les Terrasses de Beauséjour.","architecture":"BEAUSEJOUR, reconstruit vers 1734, la maison noble de Beauséjour pour la transformer en château. Lensemble d'un plan régulier en U construit au bord du chemin de la Bastide à Branne. Le portail nord dentrée avec sa grille, souvre sur une grande cour de lorangerie. Le logis principal est divisé en son centre par une rotonde avec un pignon ouvert en surcroît qui déborde les façades sculptées. Il est divisé en travées ouvertes par une baie en plein cintre et un oculus. La façade sud donne sur une grande terrasse à balustres, avec ses escaliers et sa fontaine. Le château est entouré par de vastes jardins « à la française ». Le château Beauséjour, inscrit partiellement sur la liste des M.H. le 30/05/1990.
