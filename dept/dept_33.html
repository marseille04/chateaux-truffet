ut démoli au XVIIe siècle et remplacé par celui actuel, de plan rectangulaire à deux niveaux avec lucarnes toit deux pans flanqué d'un donjon carré à trois niveaux toit à quatre pans pavillon d'entrée saillant en façade à toit se terminant en triangle avec fenêtres jumelées.","habitants":"Monsieur Jacques Raby                                                 Famille de Ferron\r\n        \"","divers":"Château de Cujac et Villepreux Saint-Aubin de Médoc g-7-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Cujac_Villepreux_1.jpg","../../jctruffet.com/image/image_33/33_Cujac_Villepreux_2.jpg","../../jctruffet.com/image/image_33/33_Cujac_Villepreux_3.jpg","../../jctruffet.com/image/image_33/33_Cujac_Villepreux_4.jpg","../../jctruffet.com/image/image_33/33_Cujac_Villepreux_5.jpg","../../jctruffet.com/image/image_33/33_Cujac_Villepreux_6.jpg"]},"Consult_chateau_formulairea4cb":{"id":"Consult_chateau_formulairea4cb","dept":"33","canton":"Castillon la Bataille","commune":"Daignac","nom":"Curton_Preyssac","type":"Château-Vestiges","periode":"XIII-XIV","histoire":"Deux châteaux à Daignac, Curton et Preyssac   CURTON,  date du XIIIe siècle, avec Amanieu de Curton, dont la seigneurie s'étendait sur Daignac et Tizac. Au début de la guerre de cent ans, le roi Edouard III d'Angleterre demanda à Arnaud de Curton, de défendre la Guyenne et, lui accorda, en remerciement, la justice sur les 4 paroisses qui entouraient le château de Curton.  Sennebrun de Curton, «noble et puissant seigneur » qui combattit aux côtés du prince Noir ainsi que Petiton de Curton. Au début du XVe siècle la seigneurie de Curton passa dans les mains de la maison navarraise de Beaumont avec le mariage de Charles de Beaumont et d'Anne de Curton. Leur fils Louis de Beaumont hérita du château, avant que ce dernier soit pris par les français puis donnée à Jacques Ier de Chabannes de La Palice, seigneur de La Palice et de Madic, qui devait y mourir des suites de blessures reçues à la bataille de Castillon.  En 1563, la baronnie de Curton fut érigée en marquisat, à la faveur de François de Chabannes.  La seigneurie de Curton devint un marquisat au XVIe siècle et resta dans la famille Chabanne de La Palice jusqu'à la Révolution. Le château de Curton fut alors vendu comme bien national au citoyen Rabeau, puis passa par rachats et alliances successives aux familles d'Arvoy, Hanet-Cléry et finalement Le Taillandier de Gabory, famille à laquelle il appartient de nos jours. Il est inscrit aux M.H. depuis 1926.   PREYSSAC, Thibaud et Bernard-Arnaud de Pressac, cousins du pape Clément V, reçoivent en récompense de leurs faits d'armes lors de la guerre de cent ans les terres de Pressac sur lesquelles ils édifient une maison-forte.","architecture":"CURTON, confisqué à la Révolution fut vendu comme bien national au citoyen Rabeau et fut transmis depuis cette période par ventes et alliances successives. L'essentiel des bâtiments occupe la seconde enceinte assez étroite elle est dominée par les vestiges d'un donjon carré datant de 1322 et qui sélevait à 35 m de hauteur. Cette tour quadrilatère était placée à l'angle Est du château. L'intérieur de la tour présente trois étages au-dessus d'un rez-de-chaussée et d'un caveau en sous-sol. Une plate-forme la couronnait et les murs avaient une épaisseur moyenne de 1,40 m. au pied de cet austère édifice, un  logis trés délabré enserre la cour, miniscule, ses belles baies à meneaux remontent à la fin de l'époque gothique.  Des contreforts ont été établis diagonalement et dans l'un d'eux se trouvait l'escalier de la tour, dont la cage était octogonale.Chaque étage était éclairé par une seule fenêtre géminée de 2 m de hauteur sur 1,2 m de largueur.                                                                           PREYSSAC, édifié à partir du XIVe siècle, a conservé de cette époque la base de ses murs, deux étages des tours dites de la porte et une partie de la tour octogonale. Les ouvertures datent du XVe siècle et la salle voutée, à droite de la porte, du XVIe siècle. Il est remanié au début du XIXe siècle.   La fuie monumentale, construite en 1574, est surmontée d'un dôme appareillé et orné de lucarnes décorées.","habitants":"Amanieu de Curton                                                      Bernard-Arnaud de Pressac\r\n        \r\n        \"","divers":"A Daignac le château de Curton grav de 1 à 3 et de Preyssacde 4 à 7.  GPS : 44° 48' 43\" Nord et 0° 15' 04\" Ouest","gps":"44° 48' 43\" Nord et 0° 15' 04\" Ouest","images":["../../jctruffet.com/image/image_33/33_Curton_Preyssac_1.jpg","../../jctruffet.com/image/image_33/33_Curton_Preyssac_2.jpg","../../jctruffet.com/image/image_33/33_Curton_Preyssac_3.jpg","../../jctruffet.com/image/image_33/33_Curton_Preyssac_4.jpg","../../jctruffet.com/image/image_33/33_Curton_Preyssac_5.jpg","../../jctruffet.com/image/image_33/33_Curton_Preyssac_6.jpg","../../jctruffet.com/image/image_33/33_Curton_Preyssac_7.jpg"]},"Consult_chateau_formulaire9d6b":{"id":"Consult_chateau_formulaire9d6b","dept":"33","canton":"Lespa","commune":"Cussac","nom":"Cussac_fort_Médoc","type":"Lesparre-Médoc","periode":"XVII","histoire":"FORT-MEDOC édifié à la fin du XVIIe siècle pour assurer, avec la citadelle de Blaye et le fort Pâté, la défense de la Gironde, le fort Médoc a connu une histoire agitée : présenté tantôt comme un élément indispensable à la sûreté de Bordeaux, il fait l'objet d'importants travaux d'équipement; tantôt, au contraire, on le considère comme inutile et on va même jusqu'à envisager sa démolition. Ce fort est né d'un projet de Vauban (ingénieur militaire français de Louis XIV). La décision de le construire n'est prise par Louis XIV qu'au mois de mai 1689, après de longues discussions par correspondance entre Bazin de Bezons, intendant de Guyenne entre 1686 et 1700, et Guy de Durfort, maréchal de Lorges, sur l'utilité de couler des vaisseaux entre le Médoc et l'île Pâté, alors appelée \"île de Blaye\". L'intendant Bazin de Bezons, venu à Cussac le 8 juin 1689, décrit ainsi l'emplacement choisi, selon le plan de Vauban :                                                                  BERNONNE,  la demeure aurait été construite en 1785 par M. Despase, propriétaire du domaine, En 1850, l'ouvrage de Cocks mentionne le domaine appartenant à M. Boué. Il revend la propriété en 1860 à M. J.-F. Caula.                                                   LANESSAN, huit générations se sont donc succédées à la tête du château. Aujourdhui, et depuis le XVIIIe siècle à la famille Bouteiller a confié la direction à une femme, Paz Espejo, dans une volonté affirmée dinsuffler un nouvel élan à la propriété.                    ANEY Le Château Aney doit son nom à son premier propriétaire, Monsieur ANEY qui créa ce vignoble en 1850.","architecture":"Fort MEDOC    À lintérieur de la place, sont érigés deux lignes de casernement, un bâtiment pour le Major, une chapelle, une boulangerie et un magasin à poudre. 300 soldats peuvent donc loger dans ces locaux. Au cours de son histoire, le rôle militaire de Fort Médoc est tout à fait négligeable. Il ne subit en effet jamais dattaque. En 1716, 13 canons de calibre 6 et 8 avec peu de boulets équipent louvrage. En 1789, seulement quelques hommes, pour la plupart des soldats invalides, et trois vieux canons, occupent encore les lieux. Après des périodes dabandon puis de restauration, le site est déclassé par larmée en 1916. Il devient propriété de la commune de Cussac en 1930. Le projet de Vauban, exécuté par larchitecte Duplessy, est typique du modèle de fortification réalisé par le stratège français.                             BERNONNE, elle se compose d'un rez-de-chaussée surélevé percé de sept ouvertures, les trois au centre formant un avant-corps. Côté oriental cet avant-corps est surmonté d'un étage carré couronné d'un fronton triangulaire percé d'un oculus et sculpté de guirlandes végétales. Les travées latérales sont, quant à elles, surmontées de balustrades. La porte principale, à laquelle on accède par un escalier en fer-à-cheval doté d'une rampe en ferronnerie.","habitants":"Guy de Durfort, maréchal de Lorges                Maréchal Vauban                                                            Famille Bouteiller\r\n        \r\n        \"","divers":"A Cussac le Fort Médoc, le château  de Bernoneg-7 de Chesnaye-8  de Lanessan.","gps":"","images":["../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_6.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_7.jpg","../../jctruffet.com/image/image_33/33_Cussac_Fort_M%c3%a9doc_8.jpg"]},"Consult_chateau_formulaireaf5d":{"id":"Consult_chateau_formulaireaf5d","dept":"33","canton":"Salles","commune":"Cérons","nom":"Cérons","type":"Château","periode":"XVII","histoire":"Deux châteaux à Cérons celui de Calvimont, du Seuil  de Pierre Selhan  propriétaire.                               CERONS, dit de Calvimont bâti à Cérons, date de la fin XVIIe au début XVIIIe siècle, est devenu une exploitation viticole, est de style classique. Il a été construit  par une famille de parlementaires bordelais, les Denys. Il fut la propriété de la famille de Calvimont aux XVIIIe et XIXe siècles. L'intérieur du château porte de nombreuses marques de la Révolution Française qui poussa à l'exil les Calvimont. Vendu aux enchères à plusieurs reprises, le château de Cérons eut de nombreux propriétaires à la fin du XIXe siècle puis fut acquis par la famille Vaché. Roger Expert, architecte de renom de la première partie du XXe siècle, y passa la fin de sa vie et restaura la salle centrale du château. Pendant la première guerre mondiale, la partie nord sert dhôpital militaire, principalement pour les victimes des gaz utilisés sur le front. En 1940, puis pendant la guerre d'Algérie, le château a accueilli des réfugiés. Le domaine est la propriété de la famille Perromat qui l'a acquis en 1958. Le château de Cérons est inscrit aux M.H. depuis le du 19 août 2008, pour ses décors intérieurs, à savoir des sculptures, des menuiseries et des décors stuqués.","architecture":"Cerons, chartreuse du XVIIIe siècle entourée de grands murs de pierre qui bordent les vignes dans un bel ensemble architectural. Le domaine comprend également une église du XVIIe siècle aux chapiteaux pittoresques, son presbytère et un lavoir. Le château deux corps de logie rectangulaire avec lucarne sur un toit en croupe en parrallèle à deux niveaux toit en croupes , ces deux pavillons son reliés par une construction oblong à un niveau à toits brisé avec des motifs en façade.","habitants":"Famille de Calvimont \r\n        \"","divers":"Château de Cérons et du Seuil,   Coordonnées par GPS : 44° 38' 06\" Nord 0° 20' 03\" Ouest.  Seuil  grav-5.","gps":"44° 38' 06\" Nord 0° 20' 03\" Ouest.  Seuil  grav-5.","images":["../../jctruffet.com/image/image_33/33_C%c3%a9rons_1.jpg","../../jctruffet.com/image/image_33/33_C%c3%a9rons_2.jpg","../../jctruffet.com/image/image_33/33_C%c3%a9rons_3.jpg","../../jctruffet.com/image/image_33/33_C%c3%a9rons_4.jpg","../../jctruffet.com/image/image_33/33_C%c3%a9rons_5.jpg"]},"Consult_chateau_formulaire9eb3":{"id":"Consult_chateau_formulaire9eb3","dept":"33","canton":"Bordeaux","commune":"Bordeaux","nom":"Dourthe","type":"Château","periode":"XVIII-XIX","histoire":"Plusieurs châteaux à Dourthe celui de Dourthe,  de Belgrave, le Boscq et de Reysson.                         DOURTHE en 1840 Pierre Dourthe, hôtelier à Lit-et-Mixe dans les Landes, s'adjoint un commerce de Bordeaux. Il ne se doutait  pas que ses descendants allaient s'associer  dans le monde entier le nom de Dourthe, en 1979 acquiert le château.   BELGRAVE de François Laura. Les valeurs Dourthe sont alors partagées avec des actionnaires multinationaux et progressivement transmises à une nouvelle équipe dirigeante. Pierre Dourthe fait lacquisition du château PEY La Tour et du château La GARDE, Dourthe lance sa marque haut de gamme Dourthe prend le fermage du château Le BOSCQ  de Joachim Gilbert Saint-Estèphe. Patrick Jestin est nommé président de Dourthe. Les trois propriétés bordelaises de la famille Thiénot au château Rahoul  Pierre Estorge, et   REYSSON de Joachim Gilbert","architecture":"BELGRAVE, corps de logis  à deux niveaux et attiques sur trois travées centrales et trois portes fenêtres à fronton retondant, toit presque plat, l'édifice est accolée de deux pavillons identiques en retour d'équerre de même niveaux à toit à la mansart avec lucarnes, l'ensemble recouvert d'ardoise.                    LE BOSCQ  trois corps de logis dont le plus imposant et le central à deux niveaux toit en croupes avec lucarnes, les deux autres en prolongement sur les flancs d'un niveau avec toit en croupes et lucarnes l'ensemble recouvert d'ardoises.                          REYSSON, de plan rectangulaire à deux niveaux , toit en croupes recouvert de tuiles.","habitants":"Famille de Pierre Dourthe                                    Famille Patrick Jestin \r\n        \"","divers":"A dourthe château du Boscq g-1, de Belgrave g 2-3-4 du Bosq   du Grand Barrail g-5 de Rahoul g-7  et de Reysson g-6.","gps":"","images":["../../jctruffet.com/image/image_33/33_Dourthe_1.jpg","../../jctruffet.com/image/image_33/33_Dourthe_2.jpg","../../jctruffet.com/image/image_33/33_Dourthe_3.jpg","../../jctruffet.com/image/image_33/33_Dourthe_4.jpg","../../jctruffet.com/image/image_33/33_Dourthe_5.jpg","../../jctruffet.com/image/image_33/33_Dourthe_6.jpg","../../jctruffet.com/image/image_33/33_Dourthe_7.jpg"]},"Consult_chateau_formulaire9db0":{"id":"Consult_chateau_formulaire9db0","dept":"33","canton":"Lesparre-Médoc","commune":"St-Julien de Beychevelle","nom":"Ducru_Beaucaillou","type":"Château","periode":"XVII","histoire":"DUCRU-BEAUCAILLOU, bâti à Saint Julien-Beychevelle, est un domaine viticole de 75 hectares. Les premières traces du domaine remonteraient au XIIIe siècle. Le château sera durant plusieurs siècles la propriété de la famille Bergeron jusqu'en 1720. Le château passe en 1795 sous le contrôle de la famille Ducru, dont le domaine prend alors le nom. Bertrand Ducru entreprend alors de modifier profondément le château  et les installations viticoles. En 1866, le château est vendu à la famille de Nathaniel Johnston (1836-1914), un négociant en vin, maire et député de Saint-Julien. La crise financière de 1929 oblige la famille Johnston à vendre le domaine à la famille Desbarats qui après seulement 12 années, devra le céder à la famille Borie, toujours propriétaire.","architecture":"Ducru-Beaucaillou, de plan en U dont le corps de logis en façade oblong à quatorze travées de  deux niveaux plus pavillons d'entrée central  de trois travées avec rampe d'escalier et fronton triangulaire au niveau du toit avec une série de lucarnes sur un toit brisé flanqué sur les flancs de deux tours rectangulaires avec terrasses à trois niveaux avec en façade au premier étages pavillon saillant de forme  semi-hexagonales avec terrasses et sur la tour de gauche une tour de guet carrée. L'édifice est prolongé sur l'arrière par des bâtiments de dépendances formant un parc et en fin de ligne gauche une tour carrée à deux niveaux.","habitants":"Famille Bergeron\r\n        \"","divers":"St-Julien de Beychevelle château de Ducru-Beaucallou  45° 09' 56\" Nord, 0° 44' 21\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Ducru_Beaucaillou_1.jpg","../../jctruffet.com/image/image_33/33_Ducru_Beaucaillou_2.jpg","../../jctruffet.com/image/image_33/33_Ducru_Beaucaillou_3.jpg","../../jctruffet.com/image/image_33/33_Ducru_Beaucaillou_4.jpg","../../jctruffet.com/image/image_33/33_Ducru_Beaucaillou_5.jpg"]},"Consult_chateau_formulaire4e7a":{"id":"Consult_chateau_formulaire4e7a","dept":"33","canton":"Saint-Ciers-sur-Gironde","commune":"Pontet d","nom":"Eyrans","type":"Château","periode":"XIX","histoire":"Trois châteaux  à Pontet d'Hérans, celui d'Eyrans, Cazeau  et Haut-Lartigue.\r\nEYRANS  Le domaine de la Motte et son château se trouvaient sur la commune. Au XVIIIe siècle, la seigneurie appartient à Gabriel Régnault, seigneur de Cazeau à Saint-Paul-de-Blaye, commandant la ville et la citadelle de Blaye. La Motte revient, en 1792, à ses neveux Henry-Mathieu et Jean-Jacques Isle, puis, en 1870, Victor Isle (1815-1902) en hérite.               CAZEAU (fin XVIIIe siècle), toujours debout, passe aussi à la famille Isle qui se partage les deux domaines en 1814, et devient la propriété de la famille de Sèze qui le possède, encore, aujourdhui, en 1984, par Brigitte et Stéphane Savigneux.\r\nHAUT LARTIGUE, issu des plus jeunes vignes du château dEyran Depuis les années 1980, sous l'impulsion du professeur Stanislas de Sèze, la restauration du vignoble est menée par sa petite fillle et son mari, Brigitte et Stéphane Savigneux.","architecture":"EYRANS est un château bâti à Saint-Médard d'Eyrans. La construction du château dEyran date du XIVe siècle. Le château se situe sur les croupes graveleuses de Saint-Médard dEyrans, près de Bordeaux.                                                                         CAZEAU  et autres pas de gravure","habitants":"Gabriel Régnault\r\n        \"","divers":"Château de Pontet d'Eyrans   celui d'Eyrans, Cazeau  et Haut-Lartigue","gps":"","images":["../../jctruffet.com/image/image_33/33_Eyrans_1.jpg","../../jctruffet.com/image/image_33/33_Eyrans_2.jpg","../../jctruffet.com/image/image_33/33_Eyrans_3.jpg","../../jctruffet.com/image/image_33/33_Eyrans_4.jpg","../../jctruffet.com/image/image_33/33_Eyrans_5.jpg"]},"Consult_chateau_formulaire4685":{"id":"Consult_chateau_formulaire4685","dept":"33","canton":"Langon","commune":"Fargues","nom":"Fargues_Gironde","type":"Forteresse","periode":"XIV","histoire":"Trois châteaux à Fargues celui de Fargues de Rieussec et Beauséjour (voir article).           FARGUES, bâti à Fargues, est une ancienne forteresse dont la construction date du XIVe siècle. Son premier propriétaire fut le cardinal Raymond-Guilhem de Fargues. Le château  fut agrandi et bastionné, puis incendié au XVIIe siècle. Ses ruines demeurent l'un des plus beaux exemples d'architecture militaire de la fin du Moyen-Age et de l'époque moderne  le fils de Jean de Lur et de Catherine-Charlotte de Saluces, le marquis Honoré de Lur Saluces, militaire, entreprit les grandes transformations de la forteresse médiévale au XVIIe siècle. Entre la seconde moitié du XVIIIe siècle et le début du XIXe siècle, Fargues devient pour les Lur Saluces une possession parmi dautres.  La famille possédait alors le château de Malle (par mariage en 1702), le château d'Yquem (1785) et les châteaux de Filhot et de Coutet (1807). Le château de Fargues est inscrit aux M.H. depuis 2007.\r\nRIEUSSEC est un château bâti à Fargues,    Au XVIIIe siècle, le domaine de Rieussec appartenait aux moines des Carmes de Langon. La confiscation du domaine à la Révolution conduit vers 1790 à sa vente comme « bien national » à M. Marheilhac, propriétaire à lépoque du château La Louvière à Léognan.  Le château Rieussec fait partie du groupe domaine baron de Rothschild, depuis 1984.","architecture":"FARGUES une grande campagne dagrandissement et de fortification du château fut conduite. Dans la nuit du 24 au 25 mai 1687, un terrible incendie ravagea l'édifice.  Débute alors labandon de la forteresse.  c'est un quadrilatère flanqué de trois tourelles hexagonales et d'un puissant donjon carré. ces défenses étaient cependant bien peu efficaces contre un assaut sérieux, Fargues parait avoir été plus une résidence de plaisance. Le corps de logis  très vastes se déployait des 3 côtés de la cour intérieure que ne protégeait vers l'entrée qu'un mur bas. La grosse tour offrait seulement un refuge en cas de surprise, ainsi par son plan d'ensemble et son caractère palatial, Fargues rappelle le grand château pontifical de Villandraut , cependant soigneusement fortifié.    RIEUSSEC constitue par un corps de logis carré de trois niveaux, toit à quatre pans accolé d'un bâtiment oblong de dépendance de un niveaux également.","habitants":"Cardinal Raymond-Guilhem de Fargues                     M. Marheilhac\r\n        \"","divers":"Rieussec et Fargues GPS : 44° 32' 00\" Nord, 0° 17' 31\" Ouest   Rieussec grav 3-4    : 44° 32' 12\" Nord et 0° 17' 44\" Ouest   St-Hilaire grav-5","gps":"44° 32' 00\" Nord, 0° 17' 31\" Ouest   Rieussec grav 3-4    :","images":["../../jctruffet.com/image/image_33/33_Fargues_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Fargues_Gironde_2.jpg","../../jctruffet.com/image/image_33/33_Fargues_Gironde_3.jpg","../../jctruffet.com/image/image_33/33_Fargues_Gironde_4.jpg","../../jctruffet.com/image/image_33/33_Fargues_Gironde_5.jpg"]},"Consult_chateau_formulairef1e4":{"id":"Consult_chateau_formulairef1e4","dept":"33","canton":"Cadillac","commune":"Villenave de Rions","nom":"Fauchey","type":"Château","periode":"XV","histoire":"FAUCHEY  à Villenave-de-Rions,  L'ancien château du XVe siècle, fut brûlé lors de la révocation de lédit de Nantes comme terre protestante. Le château à été vendu à une holdings chinois basée à Hong-Kong.","architecture":"Fauchey, l'ancien château fut remplacé par le château Fauchey, de style néo-gothique qui, malgré la destruction de la demeure originale, a conservé lancienne appellation de castel Fauchey. Elevé sur le point culminant de Villenave-de-Rions, le château Fauchey fut bâti en pierre de taille. il a été construit en 1864 par larchitecte Vignaux selon les plans dune abbaye écossaise. Les anciens chais et cuvier ont été restaurés à la même époque, à la fin de XIXe siècle. Le logis est composé dun corps de bâtiment sur deux étages carrés. Il est flanqué dun pavillon et dune tour polygonale. Les décors sculptés sur les linteaux des ouvertures ainsi que les toitures en ardoise sont dinspiration médiévale.","habitants":"architecte Vignaux \r\n        \"","divers":"Fauchey GPS : 44° 41' 27\" Nord et 0° 20' 12\" Ouest","gps":"44° 41' 27\" Nord et 0° 20' 12\" Ouest","images":["../../jctruffet.com/image/image_33/33_Fauchey_1.jpg","../../jctruffet.com/image/image_33/33_Fauchey_2.jpg","../../jctruffet.com/image/image_33/33_Fauchey_3.jpg"]},"Consult_chateau_formulaire5fbe":{"id":"Consult_chateau_formulaire5fbe","dept":"33","canton":"Cadillac","commune":"Gabarnac","nom":"Faugas","type":"Château","periode":"XIII-XIX","histoire":"FAUGAS,  bâti à Gabarnac,  du XIIIe au XXe siècle. L'origine du nom remonte à Romain De Phocas,  il a appartenu à plusieurs propriétaires dont deux sont entrés dans l'histoire de la Gironde, le duc d'Epernon au XVIIe siècle et le marquis d'Alon au XVIIIe siècle.  C'était un château fort, puis un château de plaisance et depuis un domaine viticole. Son propriétaire actuel est la famille Berckmans.","architecture":"Le château Faugas à l'origine une ancienne maison forte du XIIIe siècle qui connut plusieurs modifications au cours des siècles qui suivirent Les parties les plus anciennes, bâties sur l'emplacement d'un site gallo-romain, datent du XIIIe siècle, époque où le château constituait une maison forte. Au XVIe siècle, les bâtiments ont été restaurés et agrandis. Ils se sont vus ajouter une aile supplémentaire, ainsi qu'un donjon et deux tours d'angle. Par la suite, le château a connu d'autres transformations dont la reconstruction des parties agricoles au XVIIIe siècle. Aujourd'hui, il dresse toujours fièrement ses trois tours et son vieux donjon d'où l'on peut jouir d'un extraordinaire panorama sur cette région vallonnée de la rive droite de la Garonne. Le logis initial, rectangulaire, en pierres de taille, paraît dater du XIIIe siècle. L'aile basse a été ajoutée au XVIe siècle comme la tour d'escalier octogonale dont le toit a été arasé pour former une terrasse.\r\nLes bâtiments agricoles dessinent une cour en U devant le château. Un autre bâtiment comporte un petit pigeonnier.\r\nDes tours d'angles, dont une a été détruite, cantonnent les angles.","habitants":"Famille Berckmans.  \r\n        \"","divers":"Faugas  GPS : 44° 37' 07\" Nord et 0° 15' 34\" Ouest","gps":"44° 37' 07\" Nord et 0° 15' 34\" Ouest","images":["../../jctruffet.com/image/image_33/33_Faugas_1.jpg","../../jctruffet.com/image/image_33/33_Faugas_2.jpg","../../jctruffet.com/image/image_33/33_Faugas_3.jpg","../../jctruffet.com/image/image_33/33_Faugas_4.jpg"]},"Consult_chateau_formulaire1575":{"id":"Consult_chateau_formulaire1575","dept":"33","canton":"Coutras","commune":"Saint-Seurin sur l","nom":"Favière","type":"Château","periode":"XV","histoire":"FAVIERE est un château bâti à Saint-Seurin-sur-l'Isle. Ce château bordelais à la lisière de Saint-Emilion, qui avait reçu pendant longtemps ce doux surnom de \"belle endormie\", est en pleine renaissance depuis sa reprise en 2010 par Stanislav et Natalia Zingerenko.  Le château de Favières comprend un gîte 3 étoiles totalement indépendant et des chambres à louer seules, situées à proximité de l'atelier et des salles d'expositions.","architecture":"Favière composé d'un corps de logis rectangulaire à un niveau avec pavillon saillants de forme arrondie en façades plein cintre, toitures à la mansard en ardoises, accolé aux extrémité de pavillons celui de gauche est accollé d'une tour ronde et celui de droite pavillon plus imporant à deux niveaux.","habitants":"Stanislav et Natalia Zingerenko\r\n        \"","divers":"Favière GPS : 45° 00' 54\" Nord, 0° 00' 02\" Ouest","gps":"45° 00' 54\" Nord, 0° 00' 02\" Ouest","images":["../../jctruffet.com/image/image_33/33_Favi%c3%a8re_1.jpg","../../jctruffet.com/image/image_33/33_Favi%c3%a8re_2.jpg","../../jctruffet.com/image/image_33/33_Favi%c3%a8re_3.jpg","../../jctruffet.com/image/image_33/33_Favi%c3%a8re_4.jpg","../../jctruffet.com/image/image_33/33_Favi%c3%a8re_5.jpg","../../jctruffet.com/image/image_33/33_Favi%c3%a8re_6.jpg","../../jctruffet.com/image/image_33/33_Favi%c3%a8re_7.jpg"]},"Consult_chateau_formulaired36f":{"id":"Consult_chateau_formulaired36f","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Hippolyte","nom":"Ferrand","type":"Château","periode":"XVI","histoire":"FERRAND  sinscrit dans la grande tradition des propriétés du bordelais depuis le XVIIe siècle. La singularité de Ferrand tient dabord au fait quen 300 ans, le château na connu que deux familles. Aujourd'hui, c'est la famille du baron Bich qui y  réside.","architecture":"Ferrand, le château actuel comtemporain de Louis XIV, demeures seigneuriales, mi-plaisances, mi-sévères, constitué de deux corps de logis, entièrement isolés identiques se faisant vis-à-vis, une ravissante galerie voûtée  à l'italienne, surmontée d'une généreuse balustrade, tient lieu, à la fois de hall d'honneur et de communication entre les deux ailes.","habitants":"Famille du Baron Bich\r\n        \"","divers":"Château de Ferrand à St-Hippolyte","gps":"","images":["../../jctruffet.com/image/image_33/33_Ferrand_1.jpg","../../jctruffet.com/image/image_33/33_Ferrand_2.jpg"]},"Consult_chateau_formulaire1e39":{"id":"Consult_chateau_formulaire1e39","dept":"33","canton":"Langon","commune":"Sauternes","nom":"Filhot_Guiraud","type":"Château","periode":"XIX","histoire":"FILHOT  remonte aux années 1630 à 1650, fut créé en 1709 par Romain de Filhot, conseiller au parlement de Bordeaux,  Après la Révolution, en 1807 passe par aliance aux Lur-Saluces, héritiers des Filhot par Joséphine de Filhot, orpheline du dernier des Filhot président au parlement de Bordeaux et disparu à la Révolution, gèrent le domaine. En 1840, Romain-Bertrand de Lur-Saluces (1810-1876) réunit les domaines du château Filhot et de Pineau du Rey fit reconstruire le château. Son propriétaire est le comte Henri de Vaucelles. En 1935, la comtesse Durieu de Lacarelle, née Lur-Saluces, rachète à son frère le domaine. Son fils, Louis Durieu de Lacarelle reconstitua et le développa  jusqu'aux années 70. Une des filles de la comtesse Durieu de Lacarelle née Lur-Saluces épousa le comte Pierre de Vaucelles, ambassadeur de France. Leur fils aîné, le comte Henri de Vaucelles, gère le domaine depuis 1974. Son fils Gabriel participe à la gestion depuis 1996.","architecture":"FILHOT, en 1835, il reconstruit le château dans un style néoclassique suivant les plans de l'architecte Poitevin et l'entoure d'un superbe parc à l'anglaise,  le corps de logis occupe le fond d'une grande cour dont le centre abrite un bassin circulaire. Elevé sur un rez-de-chaussée et un étage couvert d'un toit en terrasse dissimulé par une balustrade, ce corps de logis s'organise autour d'un avant corps à trois travées. Les baies du rez-de-chaussée sont en arc segmentaire, celle de l'étage sont rectangulaires. deux corps de bâtiment bas à deux travées encadrent le logis et sont eux mêmes reliés à deux petits pavillons en léger décrochement. De part  et d'autres, deux ailes bordent la cour celle de gauche consiste à un portique à arcades au centre duquel viendra s'élever un peu plus tard une chapelle, celle de droite remanié sous le second Empire, est occupée par une terrasse, aux extrémitées de ces ailes prennent place deux pavillons  produit celle du corps de logis.","habitants":"Famille Romain-Bertrand de Lur-Saluces\r\n        \"","divers":"Filhot 44° 31' 22,83\" Nord et 0° 20' 30,71\" Ouest           Guiraud 44° 32' 40,66\" Nord et 0° 19' 42,89\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Filhot_Guiraud_1.jpg","../../jctruffet.com/image/image_33/33_Filhot_Guiraud_2.jpg","../../jctruffet.com/image/image_33/33_Filhot_Guiraud_3.jpg","../../jctruffet.com/image/image_33/33_Filhot_Guiraud_4.jpg"]},"Consult_chateau_formulaire0911":{"id":"Consult_chateau_formulaire0911","dept":"33","canton":"Cenon","commune":"Floirac","nom":"Floirac_Burthe","type":"Château","periode":"XVII","histoire":"Deux châteaux à Floirac celui de Sybérol et celui de Burthe.                                                                       SYBEROL, s'appelait  Feuillas. La maison noble de Feuillas, connue depuis le XVe siècle, devint, pendant les guerres de Religion, un lieu de rendez-vous pour les huguenots. Elle accueillit :Michel de Montaigne en 1585, alors maire de Bordeaux. Le duc d'Épernon en 1649 et le cardinal Mazarin en 1650. En 1828, la duchesse de Berry est une des dernières personnalités à venir se reposer en ces lieux. Au XIXe siècle, Sybirol change de mains,  est racheté par le marquis de Cahuzac (maire de Floirac en 1874). Jules Pinson fait l'acquisition du domaine en 1912.  Le propriétaire actuel, Pierre Lafont, a décidé de faire cadeau du domaine à la ville de Floirac.\r\nBURTHE, le domaine  se situe en haut de Floirac coté rocade. Il comprend les domaines des anciens  châteaux : château Saint Leu, de la Suzanne,  de la Burthe, domaine de Clémence, de Sérillan,  de Saint Pierre, maison de Ville et maison de Rollet. Le château date du XVIIIe siècle. Mais il a  été reconstruit en 1846.  Au XIXe siècle, le domaine de la Burthe ainsi que le domaine de la Suzanne appartiennent à la famille   Balguerie Stuttenbergde négociants bordelais,  appartenu par la suite à la société civile immobilière de la Fonderie, dont la famille Sarthoulet était le principal porteur de parts. Il était utilisé pour les colonies de vacances des enfants des Fondeurs de France. La mairie de Floirac le rachète en 1973 et accueille les centres de loisirs et activités sportives.","architecture":"Sybérol, le bâtiment fut démoli et entièrement reconstruit entre 1722 et 1728 par Bernard de Lamolère de Sybirol, avocat au Parlement de Bordeaux.Entièrement reconstruite entre 1722 et 1728, la demeure sapparente au type architectural régional de la Chartreuse, longue maison bordelaise à un seul niveau. Le nom de l'architecte n'est pas connu avec certitude, mais il y a des indications, notamment la 'salle fraîche', qu'il s'agissait probablement de l'architecte bordelais Étienne Laclotte. Une seule indication donc : la présence d'une salle fraîche dans le parc. Une seule autre salle est présente dans la région et elle est issue du travail d'Étienne Laclotte, ce qui donne à penser que celui de Sybirol est aussi du même architecte.                                                       BURTHE, l'édifice de plan rectangulaire à deux niveaux, toit en croupe  avec deux  lucarnes sur façade avant et pavillon légèrement saillant sur la porte d'entrée avec fronton triangulaire  au centre de la lucarne pinacle un oculus se terminant par fronton triangulaire. Le bâtiment est prolongé sur les flancs par d'autre bâtiments en retour d'équerre en façade formant la cour d'honneur.","habitants":"Marquis de Cahuzac                                                   Famille   Balguerie Stuttenbergde\r\n        \"","divers":"Châteaux  de Burthe grav 1-2 à Floirac, de Sybérol grav 3-4","gps":"","images":["../../jctruffet.com/image/image_33/33_Floirac_Burthe_1.jpg","../../jctruffet.com/image/image_33/33_Floirac_Burthe_2.jpg","../../jctruffet.com/image/image_33/33_Floirac_Burthe_3.jpg","../../jctruffet.com/image/image_33/33_Floirac_Burthe_4.jpg"]},"Consult_chateau_formulaire01d9":{"id":"Consult_chateau_formulaire01d9","dept":"33","canton":"Blaye","commune":"Ile Paté Blaye","nom":"Fort_Paté","type":"Fort","periode":"XVII","histoire":"FORT-PATE, constitue avec le fort Médoc et la citadelle de Blaye le triptyque défensif mis en place par Vauban sur l'estuaire de la Gironde dans le but de protéger Bordeaux et son port. Ce triptyque permet d'éviter que Bordeaux ne fasse « la gueuse » c'est-à-dire qu'elle cesse de se vendre à l'ennemi, de lui tendre la main, qu'il soit anglais pendant la guerre de cent ans ou encore espagnol pendant les périodes de fronde et de ligue. En 1690, Louis XIV valide la construction du fort qui s'achèvera en 1693. De forme ovale, le fort mesure 12 mètres de haut. Il se trouve dans l'alignement du fort Médoc et de la citadelle de Blaye. En 1948, le fort est acheté aux domaines par un notaire médocain.  Le 7 juillet 2008, le fort Paté avec la citadelle de Blaye et le fort Médoc est l'un des douze sites intégrés au réseau des sites majeurs de Vauban, nouvellement promu au patrimoine mondial de l'unesco.   En 2014, les quatre descendants de la famille décident de mettre en vente le fort il est inscrit aux M.H.  le 17 juillet 1935, avant d'être classé par arrêté le 9 octobre 2013.","architecture":"Le fort Paté est de forme très ramassée. Le banc de sable non stabilisé qui s'est créé quelques dizaines d'années avant la construction ne constitue pas un terrain stable et un double grillage de bois doit être mis en place sur toute la surface pour assurer l'assise du bâtiment. Il est constitué en pierre de taille pour l'essentiel de la maçonnerie mais aussi en brique, notamment sur la face extérieure des créneaux avec face exposée aux tirs. Les 32 meurtrières se trouvent dans les salles du rez-de-chaussée qui entourent le magasin à poudre. Un escalier à vis permet d'accéder à l'étage. Au sommet du fort on retrouve le corps de garde, contenu entre la cuisine et deux salles aux dimensions plus petites, l'ensemble protégé par des embrasures de tir. Deux guérites en pierre dont une située au sud et présentant un assommoir surmontant l'entrée principale du fort servaient à l'observation. Des gargouilles permettaient l'évacuation des eaux de pluie de la terrasse vers l'extérieur du fort et l'eau de la toiture était recueillie vers la citerne située sous la grande galerie voûtée du rez-de-chaussée. L'architecture est très minimaliste loin du projet le plus ambitieux envisagé avec un fort et quatre bastions, non réalisé à cause de l'état des sols. Le fort Paté constituait au fond une architecture plus dissuasive que défensive.","habitants":"Maréchal Vauban\r\n        \"","divers":"le fort à l'ile Paté","gps":"","images":["../../jctruffet.com/image/image_33/33_Fort_Pat%c3%a9_1.jpg","../../jctruffet.com/image/image_33/33_Fort_Pat%c3%a9_2.jpg","../../jctruffet.com/image/image_33/33_Fort_Pat%c3%a9_3.jpg"]},"Consult_chateau_formulaire983b":{"id":"Consult_chateau_formulaire983b","dept":"33","canton":"La Brède","commune":"La Brède","nom":"Fougères_33","type":"Château","periode":"XVI","histoire":"FOUGERES, du début du XVIe siècle , une maison portant le nom de Milheras.  Après de nombreuses transformations et changements de propriétaires, la dite habitation se nomme au début du XIXe siècle les Milleyres, Cest en 1867  le baron Gaston de Montesquieu, en entreprend la transformation et lui donne le nom de Fougères, traduction française du mot patois Milleyres. Nous avons découvert, que Zoé , fille dun précédent propriétaire le négociant bordelais Leroy, devenue lamie de Aurore Dudevant , accueillit souvent ici cette dernière, à partir doctobre 1825 : Il sagissait de celle qui allait devenir George Sand.  Au XIXe siècle, les Montesquieu habitent le château de La Brède. En 1871, au décès de Prosper de Montesquieu, son fils aîné Charles sinstalle au château et Gaston, son deuxième fils, notre arrière grand-père, s'y installa.  Par la suite, Charles, décédé en 1910, qui résidait donc au château de La Brède, le laisse à sa fille Suzanne, qui épouse le baron de Sivry ; le château cesse alors dappartenir aux Montesquieu. Le baron de Sivry lui-même na quune fille, Alice, qui épouse le comte de Chabannes, le père de la dernière propriétaire du château, (décédée en octobre 2004).","architecture":"FOUGERES,  la dite habitation se nomme au début du XIXe siècle les Milleyres, et se présente en une chartreuse rectangulaire, en rez-de-chaussée, flanquée de quatre tours carrées à toit en pavillon. Il détruit les deux tours carrées de droite, pour construire les corps de bâtiment, rompant ainsi évidemment lhomogénéité de lensemble, mais estimant probablement trop exiguë la chartreuse dorigine, puis il enjolive les deux façades dans leurs parties hautes, par des colonnes et sculptures ; le levant portant les armes de Montesquieu et celle des Ronzat, famille de son épouse , et le couchant portant la reproduction du bouton de léquipage de chasse à courre du rallye la Brède, entouré de la devise « Droit dans la vie » .","habitants":"Baron Gaston de Montesquieu\r\n        \"","divers":"Château de Fougères à la Brède","gps":"","images":["../../jctruffet.com/image/image_33/33_Foug%c3%a8res_33_1.jpg","../../jctruffet.com/image/image_33/33_Foug%c3%a8res_33_2.jpg","../../jctruffet.com/image/image_33/33_Foug%c3%a8res_33_3.jpg","../../jctruffet.com/image/image_33/33_Foug%c3%a8res_33_4.jpg","../../jctruffet.com/image/image_33/33_Foug%c3%a8res_33_5.jpg","../../jctruffet.com/image/image_33/33_Foug%c3%a8res_33_6.jpg"]},"Consult_chateau_formulaire0a77-2":{"id":"Consult_chateau_formulaire0a77-2","dept":"33","canton":"Bégles","commune":"Bégles","nom":"Francs_Bégles","type":"Château","periode":"XIV","histoire":"FRANCS, la famille de Ségur qui avait mis son château à la disposition des anglais, fut contrainte de le vendre quand laquitaine redevient Française sous Henri IV. Le château de la Motte de Bègles fut rebaptisé, au XIVe siècle, le château de Francs.  Le 9 avril 1565, le roi Charles IX et Marie de Médicis y dinèrent. Le château de Francs est aujourdhui coincé entre une urbanisation galopante, sur la commune de Bègles, la Garonne et la rocade bordelaise. En 1844, Charles Balaresque (1796-1882), nouveau propriétaire, restaura le château de Francs avec goût et en augmenta les agréments La famille de Ségur habita le château pendant quatre siècles, en 1844, Charles Balaresque (1796-1882), négociant à Bordeaux et grand bibliophile, acquit de M. Tillot lui aussi négociant,  le château de Francs qu'il restaura avec goût,  depuis cette acquisition, les héritiers de la famille Balaresque ont poursuivi ce travail.  Maurice Bastard de Crisnay (1916-1996), héritier du château en 1967, décida d'entreprendre une vaste restauration, c'est ainsi que le 27 janvier 1975, le château de Francs fut officiellement inscrit à l'inventaire des M.H. et l'environnement du site classé. Depuis, le domaine est ouvert à la visite une fois par an lors des Journées du patrimoine.\r\nLe château de Francs appartient à la famille Bastard de Crisnay, descendante d'Oscar Balaresque (1798-1877), frère cadet de Charles Balaresque.","architecture":"FRANCS, en débarquant de la Garonne, on entrait dans ce pavillon par douze portes vitrées, une curiosité architecturale qui fit surnommer ce cabinet isolé « Les Douze-Portes ». De nombreuses fêtes familiales se déroulèrent en ces lieux de verdure jusqu'à la Révolution. C'est alors que le château fut laissé à l'abandon pendant plus de vingt ans. Le domaine resta sous séquestre et quelques ormeaux et chênes séculaires furent abattus. Le 18 novembre 1965, la préfecture de la Gironde confirme le classement du site, de son parc et de ses abords.  en 1967, décida d'entreprendre une vaste restauration en étroite collaboration avec l'architecte en chef des bâtiments de France, En 1969 fut touchée par la foudre, provoquant un spectaculaire incendie. En 1970, le charmant petit pavillon dit « des Douze-Portes » disparut, emporté par le tracé urbain de la nouvelle rocade bordelaise. Le parc fut ainsi amputé de son accès au fleuve. Maurice Bastard (1916-1996), héritier du château.","habitants":"Famille Bastard de Crisnay\r\n        \"","divers":"Château de Francs à Bégles","gps":"","images":["../../jctruffet.com/image/image_33/33_Francs_B%c3%a9gles_1.jpg","../../jctruffet.com/image/image_33/33_Francs_B%c3%a9gles_2.jpg","../../jctruffet.com/image/image_33/33_Francs_B%c3%a9gles_3.jpg","../../jctruffet.com/image/image_33/33_Francs_B%c3%a9gles_4.jpg"]},"Consult_chateau_formulairef4a3":{"id":"Consult_chateau_formulairef4a3","dept":"33","canton":"Castillon la Bataille","commune":"Grézillac","nom":"Franquinotte","type":"Château","periode":"XVIII","histoire":"FRANQUINOTTE, bâti à Grézillac date du milieu du XVIIIe siècle. Le château de Franquinotte est privé et fermé au Public. Il appartient à la famille Noël-Vivière qui produit sur ses 28ha de terre .","architecture":"FRANQUINOTTE, l'édifice actuel a été érigé à la fin du XVIIIe siècle. Deux dépendances disparues au XIXe siècle encadraient la façade sud, un avant corps présente une porte centrale coiffée d'un fronton rotondant. La façade nord est encadrée de deux ailes perpendiculaires à deux niveaux. Le petit côté Est du logis est prolongé par l'aile. L'ensemble est juché sur un soubassement bordé d'une terrasse soutenue par des piles sur lesquelles retombent des arcs cintrés. Au centre, se trouve un escalier à trois volées droites. L'ancien jardin Est est un quadrilatère qui devait mêler la fonction utilitaire à une fonction d'agrément rehaussée par un décor de qualité. L'intérieur conserve un ensemble de décors stuqués. Le château de Franquinotte est inscrit aux M.H. depuis  le 13/09/1996. Les éléments protégés sont : les façades et toitures du château, le décor de la salle à manger, les terrasses Est de l'ancien jardin avec les murs de clôture, y compris le mur de soutènement Nord et les épaulements de terre qui délimitent ce jardin, la fontaine et son vivier.","habitants":"Famille Noël-Vivière\r\n        \"","divers":"Franquinotte GPS : 44° 49' 28\" Nord et 0° 13' 09\" Ouest","gps":"44° 49' 28\" Nord et 0° 13' 09\" Ouest","images":["../../jctruffet.com/image/image_33/33_Franquinotte_1.jpg"]},"Consult_chateau_formulaire3602":{"id":"Consult_chateau_formulaire3602","dept":"33","canton":"Libourne","commune":"Fronsac","nom":"Fronsac_Libourne","type":"Château","periode":"XVII","histoire":"A FRONSAC le château la Rivière  (voir article), château Dauphine, de Richelieu bâtisse des XVII et XVIIe siècles, fort pontus, Gaby,  ,de pontus, de Cassagne et  de Musseau.                                           LOISEAU, en 1712 onstruit par un trésorier général du bureau des Finances de Guyenne. Depuis cinq générations la famille Goujon soccupe de ce magnifique domaine de 17 ha.  Mme Quéraux Béatrice, leur fille gère le château Loiseau avec son époux François Yves depuis 1987. Ils sont revenus sur la propriété familiale après leurs études de médecine.  CASSAGNE-Haut-Canon En 1956 : Rachat du domaine par Charles Dubois, corrézien, dorigine rurale, en 2010 : Jean-Jacques Dubois est nommé Chevalier de lOrdre du Mérite Agricole par Bruno le Maire, Ministre de lAlimentation, 2005-2008 : Suite au décès de Charles Dubois, le fils, Jean-Jacques quitte la SARL Charles Dubois & fils. La commercialisation est restructurée par le couple Zita et Jean-Jacques Dubois.1956 : Rachat du domaine par Charles Dubois, corrézien, dorigine rurale.                              DAUPHINE, construit entre les années 1744 et 1750 par Jean-Baptiste de Richon, avocat au parlement de Paris. C'est la mère de Louis XVI qui donna son titre de noblesse à la propriété en souvenir de son séjour au XVIIIe siècle. Peu de temps après la construction du château, Marie-Josèphe De Saxe, la Dauphine de France épouse de Louis-Ferdinand de France le Dauphin, fils de Louis XV, mère des derniers rois de France dont Louis XVI, En 2000, Jean Halley (ancien dirigeant et co-fondateur du groupe Promodes fait lacquisition du château de La Dauphine. En 2015, le domaine est cédé à la famille Labrune.          FRONSAC    de monsieur et madame de Seurin.          RICHELIEU, dit de Lague maison de vacances.   En 1632, Fronsac devenue seigneurie, est acquise par le cardinal de Richelieu, lhomme alors le plus puissant en France.                                                                    FORT-PONTUS, le château du Fort Pontus  de la Famille Pradel de Lavaux.","architecture":"FRONSAC  Maison à l'italienne - 1890, puis reconstruite en 1993  (Fronsac, Le tertre). Cette maison à l'italienne a été construite sur l'emplacement du château de Charlemagne, rasé en 1623 sur l'ordre de Louis XIII. La demeure fut construite en 1890 dans un style colonial, détruite par un incendie, puis reconstruite à l'identique par son actuel propriétaire. DAUPHINE, corps de logis de plan rectangulaire à deux niveaux flanqué de lucarne sur un toit en croupes recouvert de tuiles côté parc  fronton central triangulaire avec balustrade, sur les flanc retour en équerre de deux pavillons carrés  à un niveau.        LOISEAU, se compose d'un vaste bâtiment rectangulaire édifié sur deux niveaux ; du côté de la cour se détachent deux pavillons, prolongés en retour d'équerre par d'importants communs. Sur la face opposée, deux avant-corps latéraux correspondent aux pavillons. Les façades sont ornées de chaînes  Un balcon porté par des colonnes.                              FORT PONTUS, dernière demeure du peintre animalier français René Princeteau, qui fut le maître du non moins célèbre Henri de ToulouseLautrec, le château du Fort Pontus dresse son altière silhouette sur les collines du vignoble de Fronsac.                 RICHELIEU, château Richelieu:bâtisse du XVII et XVIII siècle; une des premières propriétés du cardinal Richelieu et de sa famille.                                       FORT-PONTUS, le château du Fort Pontus dresse son imposante silhouette sur les collines du vignoble de Fronsac. Le terroir exceptionnel de lappellation a fait pendant longtemps du Fronsac le vin des Rois. La famille Pradel de Lavaux.","habitants":"Marie-Josèphe De Saxe                                                 Cardinal de Richelieu\r\n        \"","divers":"A Fronsac, le château de Dauphine, de Richelieu, la Clauserie, gaby, l'Oiseau, Pontus","gps":"","images":["../../jctruffet.com/image/image_33/33_Fronsac_Libourne_1.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_2.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_3.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_4.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_5.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_6.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_7.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_8.jpg","../../jctruffet.com/image/image_33/33_Fronsac_Libourne_9.jpg"]},"Consult_chateau_formulaired031":{"id":"Consult_chateau_formulaired031","dept":"33","canton":"Saint-Médart en Jalles","commune":"Saint-Médart en Jalles","nom":"Gajac","type":"Château","periode":"XVI","histoire":"GAJAC,  dit de la Mothe-Gajac, a été construit sur une ancienne motte castrale. Il a appartenu en 1335 à Aude de Tyran, qui le céda à bail à n'Ayquem de Lacaze, en 1427 à Arnaud Rostanh-Roustaïng  de la magistrature de Saint-Eloy à qui aurait été attribué en 1400 le droit de Bégueyrieu sur la terre de Gajac, en 1541 à Mary de la Roche-Chaudry, veuve de Jean de Roustaïng, maître d'Hôtel du Roy, en 1544 à Pierre Eyquem de Montaigne, seigneur de Gajac, titre que gardera sa famille jusqu'en 1786, où Mme de Basterot  Marie Daugeard, seigneure de Belfort à Cérillan rachètera les seigneuries de Gajac, Corbiac et Saint-Médard. La famille de Montaigne le modifiera aux XVIIe et XVIIIe siècles. Le 11 janvier 1793, sous la Révolution Française, Mme de Basterot et son gendre de Ségur sont portés sur la liste des émigrés ce qui entraina la confiscation de leurs biens. Ainsi le château a été vendu comme bien national. C'est le citoyen Cambon qui en fera l'acquisition le 19 floréal III.\r\nEn 1943, pendant la seconde Guerre mondiale, un blockhaus toujours présent a été construit devant le château.","architecture":"GAJAC cette maison forte est constituée d'une muraille en forme de quadrilatère délimitant une cour et flanquée de quatre tours d'angle, 3 circulaires et 1 carrée au nord-est qui abrite la chapelle. C'est de ce côté que se trouve l'habitation initiale, un bâtiment rectangulaire à un étage. Le château reste entouré de fossés en eau, désormais sur trois côtés. Un petit pont enjambe le fossé ouest. L'entrée principale est située au centre de la face Est. On y accédait par une allée devenue la rue Alfred de Musset. Des constructions édifiées à la fin du XVIIIe siècle ont bien changé l'aspect du château tel qu'il existait auparavant, mais les éboulements causés par le bombardement d'avril-mai 1944, en détruisant quelques parties de ces adjonctions ont mis au jour les murailles du Moyen-Âge et permis de retrouver l'état primitif, tout au moins du côté de la façade. En 2015 la tour carrée dispose d'une couverture à 4 secteurs surmontée d'un oiseau ailes déployées, la tour nord-ouest d'une couverture conique récente surmontée d'un pic, la tour sud-ouest d'une couverture à 9 secteurs alors que la tour sud-est n'est pas couverte. Une couverture distincte à 4 pans (à faîtière est-ouest) est disposée au-dessus de l'entrée.","habitants":"Famille de Montaigne \r\n        \"","divers":"Château de Gajac Saint-Médart en Jalles","gps":"","images":["../../jctruffet.com/image/image_33/33_Gajac_1.jpg","../../jctruffet.com/image/image_33/33_Gajac_2.jpg","../../jctruffet.com/image/image_33/33_Gajac_3.jpg","../../jctruffet.com/image/image_33/33_Gajac_4.jpg"]},"Consult_chateau_formulaire3939":{"id":"Consult_chateau_formulaire3939","dept":"33","canton":"Lacanau","commune":"Labarde","nom":"Giscours","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Labarde, Giscours et Siran ( voir article).                                                           GISCOURS,  en 1330 le domaine dépendait de la chatellenie de Blanquefort et  en 1552, passe à la famille de Donissan. Au début du XVIIIe siècle  aux mains de François de Peyraud et autres propriétaires avant de  passer  à la famille de Saint-Simon. Claude-Anne de Rouvroy, marquis, puis duc de Saint-Simon, maréchal de camp et député de la noblesse de l'Angoumois aux états généraux de 1789 émigre et le château est vendu comme bien national acquis par Michel Jacob associé à deux négociants américains  Jhon Gray et Jonathan Davis, Michel Jacob ayant racheté les parts de ses associès, cède en 1825 à Marc Promis négociant bordelais qui fait démolir la maison de maître et fait construire le château actuel. En 1847, Jean-Pierre Pescatore, grand banquier parisien, complétera la construction des bâtiments agricoles. le domaine passera à son neveu qui le revend à un membre de la famille Cruse qui feront en 1875 édifier les communss qui bordent la cour d'honneur. L'attribution du classement de 1855 assied  la notoriété de Giscours.  De nombreux propriétaires se succèdent au XXe siècle, jusqu'au rachat de Giscours par Nicolas Tari en 1952, qui modernise l'exploitation et lui donne de l'ampleur. Son fils Pierre lui succède en 1970 et poursuit l'effort de modernisation. Le droit d'exploitation du domaine est revendu en 1993-1994 (les terres sous forme de Groupement foncier agricole restant la propriété de la famille Tari) à l'investisseur Éric Albada-Jelgersma, un homme d'affaires néerlandais.","architecture":"Giscours, en 1825 reconstruction du château actuel de style Renaissance, de plan rectangulaire compte un rez-de-chaussée sur élevé  et un étage, le pavillon centrale, à trois travées possède un étage attique, coiffé d'un toit d'ardoise à brisis. Au rez-de-chaussée, il est précédé par un balcon proche soutenu par des colonnes toscanes, deux ailes symétriques,sommées d'une balustrade dissimulant la toiture, sont chacune terminées par un avant-corps en légère saillie couronné d'un fronton sculpté et percé d'un oculus .    SIRAN, en 2003, Denis Dubourdieu a remplacé Michel Rolland comme nologue conseil du château Siran. Après avoir dirigé la propriété pendant près de 30 ans, Brigitte et Alain Miailhe ont transmis en 2007, la direction du domaine à leur fils, Édouard, qui représente la cinquième génération aujourd'hui à la tête du domaine. Ainsi, le château Siran est lune des rares propriétés médocaines à appartenir à la même famille depuis plus de 150 ans","habitants":"François de Peyraud                                                    Jean-Pierre Pescatore\r\n        \"","divers":"Deux châteaux à Gicours, Labarde grav de 1 à 5,  et Siran grav-6.","gps":"","images":["../../jctruffet.com/image/image_33/33_Giscours_1.jpg","../../jctruffet.com/image/image_33/33_Giscours_2.jpg","../../jctruffet.com/image/image_33/33_Giscours_3.jpg","../../jctruffet.com/image/image_33/33_Giscours_4.jpg","../../jctruffet.com/image/image_33/33_Giscours_5.jpg","../../jctruffet.com/image/image_33/33_Giscours_6.jpg"]},"Consult_chateau_formulaire4221":{"id":"Consult_chateau_formulaire4221","dept":"33","canton":"Pessac","commune":"Gradignan-et-Tourtirac","nom":"Gradignan","type":"Château","periode":"XV-XVIII","histoire":"Dans cet article quatre châteaux à Gradignan dont celui de Gradignan, de Lahourneau, de Montgaillard, de Poumey et d'Ornon.                                 GARDIGNAN, cest la famille de Ségur qui renforce la position de Gardigan et qui y fait construire les châteaux de Pitray et de la Pierrière.                       LAHOURNEAU, bâti à Gradignan, date de la fin du XVIIIe siècle. Son propriétaire était, en 1770, Mr Yauge, un négociant bordelais dont la correspondance nous apprend qu'il venait dîner le dimanche à Lahouneau avec ses amis.                            MONTGAILLARD,  bâti à Gradignan. C'était en 1813, une maison de plaisance mais, celle-ci fut totalement reconstruite, sur un plan différent avant 1846.                POUMEY,  date de 1784 mais la construction du chateau actuel date de 1860 par une famille de négociants anglais, installée à Bordeaux. En 1945, de nouveaux propriétaires font l'acquisition du vignoble, le renouvellent et c'est ainsi que le cru Poumey. En 1987, le château est mis en vente. Beaucoup de promoteurs immobiliers le désirent mais la commune le rachète dans le but de préserver un patrimoine historique.  Depuis 1994, la municipalité a choisi de confier l'exploitation au château.                                            ORNON, construit au XIXe siècle, le château a pris le nom éponyme du lieu sur lequel il se trouve mais n'a aucun lien avec l'ancien château du comté d'Ornon.","architecture":"LEHOURNEAU, un plan de l'époque nous indique que le château Lahouneau et ses dépendances étaient entourés d'un grand jardin, de bois et de vignes.    MONTGAILLARD est composé d'un corps central sans étage et de deux gros pavillons carrés plus élevés qui l'encadrent. Ses ornementations composées de pilastres, de balustrades et de guirlandes, sont de style néo-classicisme tardif dans le Bordelais. Il faudra attendre jusqu'en 1846, pour voir les jardins aménagés. Le château Montgaillard est, aujourd'hui, transformé en logements.                                        POUMEY, en 1987, le château est mis en vente. Beaucoup de promoteurs immobiliers le désirent mais la commune le rachète dans le but de préserver un patrimoine historique.  Depuis 1994, la municipalité a choisi de confier l'exploitation au château Pape Clément situé sur la même appellation d'origine contrôlée Pessac-Léognan.                                        ORNON, est un château bâti à Gradignan, Un long corps de logis sans étage est encadré par deux pavillons. Les toitures en ardoise sont hautes. Les baies sont entourées de chambranle uni, sauf la porte d'entrée dont le chambranle est mouluré.","habitants":"Famille de Ségur\r\n        \"","divers":"Quatre châteaux à Gradignan dont celui de Gradignan, de l'Ermitage g 2 de Lahourneau, de Montgaillard g-1, de Poumey et d'Ornon g-4.        Montgaillard 44° 45' 41\" Nord et 0° 37' 01\" Ouest   Ornon 44° 46' 21\" Nord et 0° 36' 56\" Ouest     Poumey grav-5, 44° 46' 21\" Nord 0° 36' 56\" Ouest. Tauzia g-6-7-8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Gradignan_1.jpg","../../jctruffet.com/image/image_33/33_Gradignan_2.jpg","../../jctruffet.com/image/image_33/33_Gradignan_3.jpg","../../jctruffet.com/image/image_33/33_Gradignan_4.jpg","../../jctruffet.com/image/image_33/33_Gradignan_5.jpg","../../jctruffet.com/image/image_33/33_Gradignan_6.jpg"]},"Consult_chateau_formulairea9aa":{"id":"Consult_chateau_formulairea9aa","dept":"33","canton":"Pessac","commune":"Gradignan-et-Tourtirac","nom":"Gradignan_II","type":"Château","periode":"XV-XIX","histoire":"Dans cet article cinq châteaux à Gardignan; Laurenzane, Lafon, Lestonat et Tauzia.  LAURENZANE, du XVIIIe siècle,  attribuée à Gustave Eiffel, la serre aurait été offerte par Napoléon III à Armand Couraud, propriétaire du château Malleret à Cadaujac. À la suite de la division du domaine en 1979, elle est vouée à la démolition. Le maire de Gradignan l'achète pour le compte de la commune. La serre est démontée et numérotée pierre par pierre, fer après fer. Pendant un an, les services techniques municipaux vont restaurer la structure et reconstituer les détails manquants. La serre propose aujourd'hui des expositions temporaires. \r\nLAFON bâti à Gradignan, était la propriété de la Famille Rodrigues-Henriques depuis le XVIIIe siècle. Il changera de mains, par un héritage, appartenant ensuite à une nièce, Marguerite Ida Raba, épouse de Henry Deutsch de la Meurthe. Devenue Veuve, Mme Deutsch de la Meurthe en fit don, en 1920, au Bureau de bienfaisance de Bordeaux.                                  LESTONAT, bâti à Gradignan, en 1549, que fut construite la première demeure, pour Arnaud de Lestonnac, Marchand à Bordeaux. le château est très différent, de la construction du château actuel, du début du XVIIe siècle. De ses dépendances anciennes, il ne reste qu'un pavillon. Sa chapelle date du XIXe siècle.                                               MOULERENS, un plan en 1777 fait mention du château Moulerens qui fut par la suite considérablement modifié. C'était la propriété d'une vieille famille bordelaise les Buhan pendant près de 100 ans.                                                                        TAUZIA  bâti à Gradignan,  du XVIIIe siècle, par les ordres de Victor Louis, Architecte du Grand Théâtre de Bordeaux,Il appartenaient à la comtesse de Grailly et à sa soeur Mlle de Kercado lorsqu'il fut acquis   en 1888 par madame octave Calvetarrière grand mère de monsieur Hubert et de Jean Calvet. a été classé aux M.H.en 1965.","architecture":"LAURENZANE, du XVIIIe siècle, était plus une maison noble qu'un château. Le domaine de Laurenzane est devenu au XIXe siècle la propriété la plus importante de Grédignan : La façade côté parc est harmonieuse et d'une ampleur impressionnante. L'intérieur de la demeure faisait état d'un grand souci de confort et d'un goût pour le faste. Les dépendances étaient nombreuses et la production de vins rouges et blancs importante.  Détruit par un incendie en 1986, le château de Laurenzane a été reconstruit, en style néo classique et abrite, aujourd'hui les services de la mairie.                                                                  LESTONAT  le château est très différent, de la construction du château actuel, du début du XVIIe siècle. De ses dépendances anciennes, il ne reste qu'un pavillon. Sa chapelle date du XIXe siècle.          TAUZIA  belle demeure du XVIIIe siècle, corps de bâtiment en rez-de-chaussée côté jardin la façade comporte une rotonde centrale coiffée d'une coupole entre deux ailes terminées   par des  pavillons plus élevés, les bâtiments qui les prolongent ont été ajoutés  au XIXe siècle","habitants":"Famille Rodrigues-Henriques\r\n        \"","divers":"Cinq châteaux à Gardignan; Laurenzane g-4, Lafon g-4, Lestonat g-1 et Tauzia, de Malartic grav-8 Tauzia  44° 46' 21\" Nord et 0° 36' 56\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Gradignan_II_1.jpg","../../jctruffet.com/image/image_33/33_Gradignan_II_2.jpg","../../jctruffet.com/image/image_33/33_Gradignan_II_3.jpg","../../jctruffet.com/image/image_33/33_Gradignan_II_4.jpg","../../jctruffet.com/image/image_33/33_Gradignan_II_5.jpg","../../jctruffet.com/image/image_33/33_Gradignan_II_6.jpg"]},"Consult_chateau_formulaireccd2":{"id":"Consult_chateau_formulaireccd2","dept":"33","canton":"Pessac","commune":"Gradignan","nom":"Gradignan_III","type":"Chateaux","periode":"XV-XVIII","histoire":"Dans cet article, six châteaux à Gradignan; Bartez, Burthe, Ermitage, Mandavit, Malartic er la motte d'Albe.\r\nBURTHE, construit par la famille Cochez, au XIXe siècle, sur une terre du château voisin qui appartenait à la grand-mère de François Mauriac, et qu'elle vendit aux Cochez, une famille alliée aux Écomard, aux Maupassant-Bartelemy. Le château est devenu un centre pour handicapés.                                             BARTEZ, les propriétaires sont connus depuis le milieu du XVIe siècle. La bâtisse, relativement modeste a été achetée en 1791 par Pierre Barthez qui la garda jusqu'à sa mort en 1832. Il est probable que le corps de bâtiment principal date de la fin du XVIIIe siècle, mais le gros pavillon qui le complète a été ajouté fin XIXe siècle.\r\nERMITAGE, vestiges de l'ancien hospice devenu prieuré de Cayac, établi sur la route du pèlerinage de Saint-Jacques-de-Compostelle et mentionné dès 1234 ; il dépendait de l'abbaye Sainte-Croix de Bordeaux et a été inscrit M.H. en 1937 et 1987. Les augustins de Bordeaux  possédaient à cet endroit une maison de maître,  Vendu en 1791 aux enchères à un négociant, la maison est reconstruite. Sous le Second Empire, en 1866, la maison est remplacée par le château actuel. le château est revendu plusieurs fois jusqu'en 1945. Racheté par la commune après la seconde guerre mondiale, le château abrite la mairie jusqu'en 1986. \r\nMANDAVIT, ancien château du Gay, il tient son nom de Raymond Mandavit, négociant de Bordeaux, maire de la commune de 1795 à 1800 et propriétaire du domaine.  Il abrite aujourd'hui l'école municipale de musique municipale.","architecture":"MANDAVIT,  la façade principale montre une certaine recherche dans la disposition des fenêtres : les trois travées centrales sont très rapprochées, alors que les deux autres sont décalées vers les extrémités. Des oculus ovales éclairent l'étage, celui du milieu est en position verticale, les autres en position horizontale.\r\nMALARTIC, bâti à Gradignan, date du XVIIIe siècle est d'une architecture plus simple que les autres châteaux de la commune. Au début, c'était une bâtisse rectangulaire, d'un étage, complétée par deux ailes plus basses a été agrémenté de deux tourelles, l'absence de décors extérieurs et l'existence de nombreuses dépendances, qui, autrefois, fermaient presque complètement sa cour intérieure, confirment l'aspect d'un domaine agricole. Rien ne signalait le rang ou la fortune de l'ancien propriétaire du château de Malartic. \r\nMOTTE D'ALBE, vestiges d'un ancien château fort médiéval (motte féodale de Saint Albe) et d'un ancien donjon (ruines du Castéra), la motte Saint-Albe se présente sous la forme d'un tertre entouré d'un fossé. Nées au Xe siècle dans une époque troublée de contestations du pouvoir royal et de luttes entre seigneurs, les mottes défensives se sont multipliées sur le territoire.","habitants":"Famille Cochez                                                    Famille Barthez                                                    Famille Mandarit                                                     Famille de Grailly\r\n        \"","divers":"Six châteaux à Gradignan; Bartez, Burthe, Ermitage, Mandavit, Malartic g-5 et la motte d'Albe; Tauzia g 2-3-4.44° 46' 21\" Nord 0° 36' 56\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Gradignan_III_1.jpg","../../jctruffet.com/image/image_33/33_Gradignan_III_2.jpg","../../jctruffet.com/image/image_33/33_Gradignan_III_3.jpg","../../jctruffet.com/image/image_33/33_Gradignan_III_4.jpg"]},"Consult_chateau_formulairee117":{"id":"Consult_chateau_formulairee117","dept":"33","canton":"Blaye","commune":"Saint-Germain du Puch","nom":"Grand_Puch","type":"Forterresse","periode":"XIV","histoire":"GRAND-PUCH, en 1611, Bérart de Ségur, écuyer, avait succédé à Pierre, de 1621 à 1630, il ajoute aux diverses seigneuries quavaient possédées ses ancêtres, celle de la Taste. Il avait épousé haute et puissante dame Ester de Polignac, qui en 1630, était veuve. En 1650, Léonor (Eléonor) de Ségur était seigneur du Grand Puch. Le 29 octobre 1691, et le 15 avril 1693, François de Ségur, écuyer ( il est qualifié chevalier en 1693), seigneur du Grand Puch, fils dEléonor de Ségur, en 1762, cétait messire Jean de Ségur, chevalier de lordre royal et militaire de Saint-Louis, ancien capitaine au régiment dOrléans-cavalerie. Le château reste entre les mains de la famille de Ségur jusquen 1824. Cette année-là, M. de Grivel, gendre de M. de Ségur, vend la propriété à M. Souffron, ce dernier meurt en 1836 à Porto Rico, laissant six enfants. Lune de ses filles , Athenaïs, épouse de Magloire Castillon du Perron, hérite du domaine en 1838. En 1857, il est vendu par M. et Mme Castillon du Perron à un certain M. Sarlande, et à la mort de celui-ci, à Raymond Aradel qui lacquiert en 1869. En 1889, M. Maurice Gurchy, en 1920  il meurt accidentellement sur la route Libourne-Royan, deux des filles de M.Gurchy, mme Renaud Dandicolle et la comtesse dEstriband héritent conjointement du domaine. En 1939, les époux dEstriband ayant cédé leur part indivise à un Suisse fortuné, M.Pierre Prince, ce dernier en devient copropriétaire avec M.et Mme Renaud-Dandicolle.","architecture":"Le Grand-Puch, du XIVe siècle, cest un quadrilatère à cotés inégaux, enveloppé de profonds fossés taillés creusés à une certaine distance des murs, ne sont pas plus réguliers que le château ; leurs côtés sont inégaux, et tous nont pas la même largeur. Lentrée primitive est à lest ; le pont, qui sans doute nétait alors quen bois, contre une tour ou du moins une construction qui nexiste plus. Cette construction se reliait elle-même à un mur bâti sur lescarpe du fossé, et enveloppait une espèce de bastion circulaire. Il devait être percé dembrasures à lusage de petits canons employés à cette époque.  En plan, il se compose de quatre salles irrégulières, séparées par des murs très épais. Sa façade tournée vers lorient, est flanquée de deux hautes tours octogones. Des échauguettes circulaires couronnent les deux autres angles. Le premier étage et les greniers se divisent comme au rez-de-chaussée. On pénètre dans les échauguettes et dans lavant dernier étage des tours par le chemin de ronde ménagé au sommet des murs, qui ont un peu moins de 2 mètres dépaisseur. La largeur de ce chemin de ronde a été augmentée depuis peu de toute la longueur des consoles de machicoulis. En élévation, le château a deux étages, plus quatre pignons aigus regardant lest et louest, et reliés par deux combles de hauteurs et de largeurs inégales et formés par des fermes en ogive. Un mur épais, surmonté dun chéneau, reçoit la retombée intérieure des deux combles. Des toitures aigues coiffent les tours et les échauguettes.","habitants":"Famille de Ségur                                                            Famille de Gurchy\r\n        \"","divers":"Château du Grand-Puch","gps":"","images":["../../jctruffet.com/image/image_33/33_Grand_Puch_1.jpg","../../jctruffet.com/image/image_33/33_Grand_Puch_2.jpg","../../jctruffet.com/image/image_33/33_Grand_Puch_3.jpg","../../jctruffet.com/image/image_33/33_Grand_Puch_4.jpg"]},"Consult_chateau_formulaire9861":{"id":"Consult_chateau_formulaire9861","dept":"33","canton":"Langon","commune":"Grignols","nom":"Grignols","type":"Château","periode":"XII-XVI-XVII","histoire":"GRIGNOLS dit de La DAME BLANCHE, l'actuel château de Grignols a certainement été construit sur les ruines d'un plus ancien puisque la famille de Granhols est citée en 1312 dans un testament du Pape Clément V. Au fil des anées, Granhols devient Grignols. La seignerie de Grignols quitte cette famille qui vend en 1581 \"château, terre, et seignerie, avec ses fuie, colombier, mélairies, moulins à eau et à vent\", et tous les droits féodaux qui y étaient, à l'époque attachés. Cette énumération montre l'importance de cette seignerie. Le château appartient ensuite à la famille d'Esparbes de Lussan puis à Jean de Grignols. C'est à cette époque que naquit le Bourg de Grignols.  La seignerie subit de nouvelles mutations en 1753, Charles-Philippe, comte de Pons devient propriétaire. Ses héritiers se transmettront château et terres jusqu'à la seconde guerre mondiale. aujourd'hui propriétaire monsirur Vermelin.","architecture":"GRIGNOLS, site chargé d'histoire, a été construit au fil du temps. La partie la plus ancienne date du XIIe siècle, offre une vision extérieure totalement ravalée aujourdhui. Ses constructions du XVIe et XVIIe siècle mêlées à des parties datant de lépoque médiévale, sans doute du XIIe siècle lui donnent son originalité et son côté atypique. En partie détruits par un incendie en 1793, les bâtiments sont restaurés dans le dernier tiers du XIXe siècle, par le comte de Sabran-Pontevés. Larchitecte Garos sinspire, pour sa reconstruction des plans dessinés par Viollet-le-Duc dont les projets nont pu être réalisés que partiellement faute de moyens. En 1946, la commune acquiert le domaine qui, de 1950 à 1968, sert à héberger une colonie de vacances de la société Dassault. De 1969 à 1982, il abrite un institut de réadaptation     professionnelle.","habitants":"Famille de Granhols                                             Famille d'Esparbes\r\n        \"","divers":"Château de Grignols","gps":"","images":["../../jctruffet.com/image/image_33/33_Grignols_1.jpg","../../jctruffet.com/image/image_33/33_Grignols_2.jpg","../../jctruffet.com/image/image_33/33_Grignols_3.jpg","../../jctruffet.com/image/image_33/33_Grignols_4.jpg"]},"Consult_chateau_formulaire8ae4":{"id":"Consult_chateau_formulaire8ae4","dept":"33","canton":"Castillon la Bataille","commune":"Grézillac","nom":"Grézillac","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux ont été construits sur la commune, tels que celui de Mouchac, celui de Reynier, de Mylord et  Bonnet.                                                                  BONNET, en 1744, messire Pierre de Reynier, écuyer, seigneur de Barre et de Bonnet, ancien capitaine au régiment de Normandie vendit la propriété familiale à Jean de Chillaud Desfieux, écuyer, conseiller du roi, Jacques Justin de Chillaud se décida à se séparer de certains biens familiaux.  Le 24 janvier 1811, il vendit ainsi le domaine de Bonnet à Eugène Lavignac, riche propriétaire Le 11 novembre 1880, Eugène Lavignac fils, se dessaisit du domaine de Bonnet au profit dEtienne Brunetière. Ce dernier le céda quelques années plus tard, le 30 décembre 1897, à Léonce Récapet. En 1953, un de ses petits-fils, André Lurton en hérita.                                                        MOUCHAC,  bâti à Grézillac, le comte Eric dAramon et son épouse Laure dAramon de Manoncourt, Jean de Solminiac, capitaine de cavalerie, propriétaire du château  à l'époque de la Révolution. Il fit patriotiquement don de son argenterie à la Nation, le comte Eric dAramon ont racheté, en 2010, cette propriété à 12 km de la cité médiévale. Une belle orangerie permet de recevoir séminaires, fêtes familiales, expositions.  Aujourd'hui la famille du Serech de Saint-Avit le possède. Le château de Mouchac est inscrit aux M.H. depuis 1986.             MYLORD, a une très belle chartreuse du XVIIIe siècle avec des dépendances formant un U autour de la cour dhonneur, détenu par la famille Large depuis 5 générations.                                                              REYNIER, ce manoir fortifié appartient à la famille Lurton depuis 1901    Au XVe siècle, cette propriété faisait partie du prieuré de Boisset, dépendant de la Sauve. Ce manoir fortifié appartient à la famille Lurton depuis 1901.","architecture":"REYNIER, des vestiges dans le parc ont été trouvé. Le corps de logis se trouve au fond de la cour ; on y accède par une porte protégée d'une bretèche.        \r\nBONNET, quadrangulaire avec corps de logis rectangulaire à un niveau  et attique toit en croupes recouvert de tuiles accolée au centre d'un pavillon saillant de deux niveaux toit en terrasses et tour de guet sur sur l'arrière de cette terrasses à balustrades. retour d'équerre de chaque côté de dépendances de un niveau reliant des pavillons carrées de deux niveaux toit quatre pans  en prolongement formant la cour d'honneur.\r\nMOUCHAC, s'organise autour d'une cour close au sud par une grille dont les piliers sont coiffés de pots de feu. Sur les trois autres côtés se développent des corps de bâtiments. deux grosses tours rondes encadrent le bâtiment de l'ouest. Du côté de la cour, deux niveaux de galeries superposés s'ouvrent sur de grandes arcades. Au nord, le corps principal à deux niveaux, de même époque que les tours, a été modifié du XVIIe au XIXe siècle.","habitants":"Bonnet; Famille de Messire Pierre de Reynier    Mouchac; Famille du Serech de Saint-Avit                  Reynier; Famille Lurton                                           Mylord; Famille Large\r\n        \"","divers":"Château de de Mouchac grav 1 à 5, celui de Reynier, de Mylord g 9 et  Bonnet grav 6 à 8 à Grézillac  44° 49' 18\" Nord et 0° 12' 45\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_1.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_2.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_3.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_4.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_5.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_6.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_7.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_8.jpg","../../jctruffet.com/image/image_33/33_Gr%c3%a9zillac_9.jpg"]},"Consult_chateau_formulaire6739":{"id":"Consult_chateau_formulaire6739","dept":"33","canton":"Langon","commune":"Sauternes","nom":"Guiraud","type":"Château","periode":"XVIII","histoire":"GUIRAUD, maison noble du Bayle doit son nom,  à Pierre Guiraud, qui en fit lacquisition en 1776.  De 1861 à 1932, il est aux mains dune famille  Bernard puis par mariage, de la famille Maxwell. En 1932, il est acheté par Paul César Rival, un richissime excentrique dont une des passions,  était laviation.  Le domaine, en partie dévasté par la guerre, déclina peu à peu et fut finalement vendu en 1981 à la famille Narby, famille canadienne dorigine égyptienne ayant fait fortune comme armateur. Fondatrice du château moderne, la famille marchande « Guiraud » bâtit le mystère du château Guiraud. La chapelle protestante clame la confession de la famille et leur foi à la face dun monde qui regardait vers Rome. La propriété porte depuis le nom de château Guiraud et revendique une étiquette noire sacralisant les valeurs protestantes et républicaines. Létiquette devient ainsi la plus ancienne de Bordeaux revendiquant les mêmes codes depuis sa création. En trois générations,  lors du classement impérial ordonné par Napoléon III. Dès ses origines, le noir profond et puissant exprime la force et les convictions de la propriété ; tandis que lor chaud, écho au travail dorfèvre de Pierre-Amand Guiraud, rappelle la couleur dun grand vin. Depuis le 20 juillet 2006, château Guiraud appartient conjointement à FFP (holding cotée en bourse de la famille Peugeot), Olivier Bernard (du domaine de Chevalier), Stephan von Neipperg (de château Canon-La-Gaffelière) et Xavier Planty, directeur du domaine.","architecture":"GUIRAUD  Les Narby restaurèrent complètement le domaine, de plan rectangulaire à cinq travées, deux niveaux et lucarnes dans combles sur toit brisés recouvert d'ardoises, l'édifice est prolongé sur la droite des bâtments de dépendances jusqu'à un autre pavillon formant une cour et retour par  d'autres bâtiments jusqu'à une tourelle presque en face de l'entrée du château.","habitants":"Famille Guiraud\r\n        \"","divers":"Château de Guiraud à Sauternes   Guiraud 44° 32' 40,66\" Nord et 0° 19' 42,89\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Guiraud_1.jpg","../../jctruffet.com/image/image_33/33_Guiraud_2.jpg","../../jctruffet.com/image/image_33/33_Guiraud_3.jpg","../../jctruffet.com/image/image_33/33_Guiraud_4.jpg","../../jctruffet.com/image/image_33/33_Guiraud_5.jpg","../../jctruffet.com/image/image_33/33_Guiraud_6.jpg"]},"Consult_chateau_formulaire5ca1":{"id":"Consult_chateau_formulaire5ca1","dept":"33","canton":"Castillon la Bataille","commune":"Génissac","nom":"Génissac","type":"Forteresse","periode":"XIV-XIX","histoire":"GENISSAC bâti à Génissac, dénommé Le vieux  château , édifié  en 1354 sur le rebord d'un coteau à pentes raides qui domine la large vallée de la Dordogne. Au début du XVIe siècle, Michel de Chassaigne fit surélever l'ensemble. Au XVIIe siècle les fossés disparurent. Dans la première moitié du XIXe siècle, un des propriétaires abattit la tour sud-est. Ces travaux sont les seules modifications réalisées sur le château qui donc n'a pas souffert des enrichissements habituellement faits sur les demeures de cette qualité durant le XIXe siècle. Le château de Génissac est inscrit aux M.H. depuis 1978.","architecture":"Génissac, exceptionnel  dans un très bel environnement comprenant un beau château datant de 1830 entièrement rénové de 1 500 m² habitables, composé d'un corps de bâtiment et deux ailes, avec de grands espaces de vie.  Le vieux château de Génissac est une bastide ou une ancienne forteresse construite suivant un plan classique. Elle est constituée par un quadrilatère ceint de fossés et renforcée sur trois angles par des tours rondes et sur le quatrième par un donjon carré couronnée d'un chemin de ronde crénelé sur mâchicoulis chacun étant soutenu par trois corbeaux superposés.  Les tours étaient reliées entre elles puis au donjon par des hauts murs au sommet desquels se trouvent des chemins de ronde. Un des murs, à proximité du donjon est percé d'une porte équipée d'un pont levis qui permettait de franchir des douves sèches. Au centre de l'édifice se trouve une cour centrale avec un p
