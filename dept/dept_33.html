 d'une barbacane postérieure, également polygonale. Les soubassements des murs de la grande enceinte et le donjon barlong au centre sont romans,  de la fin du XIe siècle. La barbacane et l'une des tours datent du XIVe siècle. Sur les contreforts angulaires ont été ajoutées des échauguettes circulaires dont il ne reste que les assises inférieures. Dans l'un des angles a été aménagé un caveau voûté qui a pu servir de prison. Le donjon présente 2 étages mais il devait en avoir davantage autrefois. Il a été tronqué et cloisonné au XVIIIe siècle. Le point le plus accessible de cette forteresse était protégé par une tour carrée, en saillie. Vers 1550, le château de Vertheuil a été saccagé à l'intérieur. Durant la seconde guerre mondiale, il fut occupé par les allemands et le maquis. Le château privé, fermé au public. inscrit aux M.H. depuis le 19/06/1965.","habitants":"Famille de Camiran\r\n        \"","divers":"Beyzac 45° 15' 04\" Nord et 0° 49' 59\" Ouest Vertheuil 45° 15' 04\" Nord et 0° 49' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Vertheuil_1.jpg","../../jctruffet.com/image/image_33/33_Vertheuil_2.jpg","../../jctruffet.com/image/image_33/33_Vertheuil_3.jpg","../../jctruffet.com/image/image_33/33_Vertheuil_4.jpg","../../jctruffet.com/image/image_33/33_Vertheuil_5.jpg","../../jctruffet.com/image/image_33/33_Vertheuil_6.jpg","../../jctruffet.com/image/image_33/33_Vertheuil_7.jpg"]},"Consult_chateau_formulaire9015":{"id":"Consult_chateau_formulaire9015","dept":"33","canton":"Langon","commune":"Villandraut","nom":"Villandraut_33","type":"Vestiges forteresse","periode":"XII","histoire":"VILLANDRAUT, bâti à Villandraut, du XIIe siècle. Il a été construit de 1305 à 1312.  par Bertrand de Got à partir de 1305, lorsqu'il est élu pape sous le nom de Clément V. Sans doute né à Villandraut, il conserve sa vie durant une affection particulière pour sa région d'origine. Ce somptueux château-palais est destiné à lui servir de résidence lors de ses séjours en Guyenne. La construction a  duré jusqu'en 1312 mais des parties sont achevées dès 1307-1308 puisque Clément V y séjourne. En 1336 passe dans la famille de Durfort  de 1360 à 1453 sous la domination anglaise  et en 1461 confisqué le château revient à Antoine de Castelnau et à la fin du XVe siècle les Durfort reprennent Villandraut. Au XVIIe siècle les Lalanne  puis possession de la famille de la Faurie et au début du XVIIIe siècle acquis par la famille Pons, aprés la Révolution, l'édifice se transmet par héritage aux Sabran-Pontevès ancêtres des propriétaires actuels. Le château est classé aux M.H. depuis 1886. Aujourd'hui sous la responsabilité de l'association Adichats qui s'attache à tenir le site en valeur.","architecture":"VILLANDRAUT, palais forteresse symbole de la puissance, édifice  un quadrilatère de 52 sur 43 mètres flanqué de grosses tours rondes d'angle  bien saillantes hautes de 20 mètres deux tours semblable  au centre de l'un  des longs côtés encadrent la porte et dépourvu de donjon dont les courtines sont flanquées  aux quatres angles de puissantes tours circulaires, l'ensemble est entouré de larges fossés à contrescarpe maconnée inondables à volonté en cas de danger et eux même protégée par une braie. Se présente comme une uvre complète et homogène, construit de 1305 à 1314, malgré les diverses modifications quil a subies et son état actuel de ruine. L'édifice assurait des fonctions principales qui caractérisent les châteaux médiévaux : défense, habitat. La fonction de défense était dévolue aux vastes douves qui entourent le château, aux tours massives fendues darchères qui cantonnent la muraille, au châtelet d'entrée qui encadre le pont-levis. Les trois ailes du logis en retour d'équerre, dessinent un palais en U et permettaient une bonne répartition des fonctions résidentielles. Le rez-de-chaussée était un étage utilitaire réservé aux écuries, aux communs, aux cuisines et abritait également la salle de garde. Létage, partie noble du corps de logis, accessible par de grands passages, comportait deux salles de logements privés, une chapelle, des antichambres et une vaste salle de 240 m2 pour recevoir les hôtes et rendre la justice.","habitants":"Bertrand de Got                                                               Famille de la Faurie \r\n        \"","divers":"Château de Villandraut  44° 27' 35\" Nord et 0° 22' 22\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Villandraut_33_1.jpg","../../jctruffet.com/image/image_33/33_Villandraut_33_2.jpg","../../jctruffet.com/image/image_33/33_Villandraut_33_3.jpg","../../jctruffet.com/image/image_33/33_Villandraut_33_4.jpg","../../jctruffet.com/image/image_33/33_Villandraut_33_5.jpg","../../jctruffet.com/image/image_33/33_Villandraut_33_6.jpg"]},"Consult_chateau_formulairee59b":{"id":"Consult_chateau_formulairee59b","dept":"33","canton":"Salles","commune":"Virelade","nom":"Virelade","type":"Château","periode":"XVIII","histoire":"VIRELADE, située en Gironde, dans les Graves, le domaine de Virelade est associé au siège de la seigneurie de Virelade, agrandi et transformé par le baron Joseph de Carayon-Latour (1824-1886), héros de la guerre franco allemande de 1870  et homme politique, qui fait transformer le château par larchitecte Théodore Duphot (1810-1889) et aménager le domaine par le paysagiste Eugène Bühler (1822-1907) et son frère, Denis Bühler (1811-1890). Le site, occupé a été le siège d'une seigneurie médiévale ayant appartenu à l'origine à la famille de Got puis aux Soudan de la Trau. Pour l'état de la commune au XVIIIe siècle, voir l'ouvrage de Jacques Baurein. À la Révolution, la paroisse Notre-Dame de Virelade forme la commune de Virelade, a été inscrit en tant que M.H.  en 2010.","architecture":"Ruines du château Moron, des XIIe et XIVe siècles, à proximité de la Garonne                                               Le château de Virelade sélève à environ un kilomètre au sud du village du même nom au centre dun grand parc let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','33 — Gironde'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
