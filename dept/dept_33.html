onseil du grand dessinateur archéologue bordelais Léo Drouyn. Le chantier durera de 1864 à 1878, avec une interruption de cinq ans après la chute de Napoléon III. Le château de Roquetaillade est constitué de deux châteaux-forts, l'un dit \"vieux\" datant du XIe siècle qui est en ruines, l'autre dit \"neuf\" datant du XIVe siècle. Passé par héritage à la famille de Baritault du Carpia, le château acceuille aujourd'hui diverses manifestations culturelle, ainsi qu'un musée de personnages  en costumes d'époque.","architecture":"Roquetaillade, c'est en 778 qu'est cité une fortification. Charlemagne, en route vers les Pyrénées avec son neveu Roland, regroupa son armée à Roquetaillade et construisit une première motte fortifiée en bois : ce fut le premier château . Cette construction évolua dans le temps. La technique de la pierre remplaça celle du bois. Le château de s'agrandit, incluant de nouvelles tours, des remparts et autres constructions défensives, reflétant la puissance du seigneur. La tour du château vieux de Roquetaillade, date du XIe siècle. le « château Neuf », La dernière construction fut l'élévation de la tour-porte en 1305, seul passage entre le cur du château et le village, nommé Castelnau, qui s'était établi autour,  de plan carré avec six tours et un donjon central carré de 35 mètres de haut . Deux raisons expliquent la création d'un deuxième château dans le village. Elle date du XIVe siècle (1320) et elle est de style médiéval. Le château vieux de Roquetaillade, dans ses parties habitables, est toujours meublé. Il reste des vestiges d'une tour maîtresse et d'une grande salle qui subsistent. La tour-porte, pratiquement intacte, en est un des plus beaux témoins. Cette vigie du château vieux a seulement perdu son couronnement. Le château neuf et le château-vieux forment un ensemble classé aux M.H. depuis 1976.","habitants":"Cardinal Gaillard de la Mothe\r\n        \"","divers":"Château de Roquetaillade à Mazères  44° 29' 33\" Nord, 0° 16' 11\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Roquetaillade_1.jpg","../../jctruffet.com/image/image_33/33_Roquetaillade_2.jpg","../../jctruffet.com/image/image_33/33_Roquetaillade_3.jpg","../../jctruffet.com/image/image_33/33_Roquetaillade_4.jpg","../../jctruffet.com/image/image_33/33_Roquetaillade_5.jpg","../../jctruffet.com/image/image_33/33_Roquetaillade_6.jpg","../../jctruffet.com/image/image_33/33_Roquetaillade_7.jpg"]},"Consult_chateau_formulaire08e1":{"id":"Consult_chateau_formulaire08e1","dept":"33","canton":"Gradignan","commune":"Canéjan","nom":"Rouillac _33","type":"Château","periode":"XVII","histoire":"ROUILLAC, au XVIIe siècle appatenait aux Martigny, Jean de Martigny conseiller au parlemenr de Bordeaux. Domaine historique situé dans la prestigieuse appellation Pessac-Léognan, le château de Rouillac a appartenu au célèbre baron Haussmann qui acquiert le domaine en 1864. préfet de la Seine et ancien préfet de la Gironde son épouse Octavie de la Harpe héritière du domaine de La Cestas. A la mort du baron Haussmann en 1891 Rouillac est cédé à Georges Mazure industriels et après avoir connu divers propriétaires il est acquis en 1996 par Jean-Paul et Marie-Claude Lafragette  qui constitue l'un des fleurons  du groupe et possède également aujourd'hui le château de Loudenne et le château de Lhôspital.  En 2009, lorsque Laurent Cisneros croise la propriété, il tombe sous le charme de cette belle endormie et décide de sceller son destin et celui de sa famille à Rouillac  qui avait tout pour incarner un nouveau projet de vie : un terroir magnifique et un outil de travail exceptionnel qui ne demandaient qu'à être redynamisés. Avec la famille Cisneros, la route de l'excellence est de nouveau durablement tracée pour le château de Rouillac.","architecture":"ROUILLAC, chartreuse du XVIIIe siècle,   il se compose d'un corps de logis  à un seul niveau, couvert d'un toit brisé sur lequel se détachent des lucarnes à ailerons et comptant un avant corps couronné d'un fronton, ainsi que deux pavillon doubles, en saillies légèrement  plus élevées que le bâtiment principal. une grande lucarne à fronton dont seule la partie supérieure est prise dans le comble éclaire ce demi- étage supplémentaire. deux ailes basses en retour à usage de communs délimitent la cour. Il ordonne de nombreux travaux et associe les chevaux à l'histoire de Rouillac, en construisant de très belles écuries.","habitants":"Jean de Martigny\r\n        \"","divers":"Château de Rouillac","gps":"","images":["../../jctruffet.com/image/image_33/33_Rouillac_1.jpg","../../jctruffet.com/image/image_33/33_Rouillac_2.jpg","../../jctruffet.com/image/image_33/33_Rouillac_3.jpg","../../jctruffet.com/image/image_33/33_Rouillac_4.jpg"]},"Consult_chateau_formulaire9cd5":{"id":"Consult_chateau_formulaire9cd5","dept":"33","canton":"Gujan-Mestras","commune":"Le Teich","nom":"Ruat_Teichs","type":"Château","periode":"XV","histoire":"RUAT, précurseurs de Brémontier et de chambrelent, les Amanieu de Ruat, captaux de Buch, les Grailly, les héritiers des Grailly les Foix-Candale en 1713  passa aux Armanieu de Ruat. La Révolution leur laissa le domaine de Ruat ainsi que leur droit dans la forêt usagère. À sa sortie de prison, François Amanieu de Ruat, dernier captal, privé de ses revenus, trouve son domaine en grande partie détruit. Son gendre Charles de Labat, baron de Lauzac, met le domaine en vente. En 1846, le château fut acheté par Adrien Festugière, maître de forges, qui en fit remanier une partie en 1847 (son aspect actuel). Sa fille Marie, dame d'honneur de la princesse Mathilde, épousa le général Charles Lespinasse, aide de camp (après le coup d'état du 2 décembre 1851, ou il envahissait l'assemblée) et ministre de l'intérieur de l'empereur Napoléon III. Son fils Jules fut alors élevé avec le prince Impérial, qui continuait à venir à Ruat avec sa mère l'impératrice Eugénie. Le général fit construire la gare de Lamothe sur ses terres pour accueillir l'empereur qui s'inspira de l'uvre des Amanieu de Ruat en ordonnant en 1857 l'ensemencement de toute la forêt des Landes qui reste à ce jour la plus vaste forêt artificielle d'Europe.  La grille principale du château est restée fermée en son honneur. Le domaine de Ruat est resté dans la famille du général Espinasse et passe dernièrement dans la famille de Fontenilliat. Elle conserve le cadre et les reliques du passé glorieux des captaux de Buch et de leurs successeurs.","architecture":"Le château de Ruat est un château bâti sur la commune Le Teich, construit au XVe siècle et réaménagé au XIXe siècle, est inscrit aux M.H. depuis 1970. À l'origine,  fut un élément du système de défense du bassin d'Arcachon, entre les châteaux de La Teste et de Certes, propriétés des captaux de Buch, de plan en équerre deux corps de logis  à deux niveaux toit à deux pans entre tourelle  et tour carrée de quatre niveaux à l'angle intérieur.","habitants":"Amanieu de Ruat                                                            Général Charles Lespinasse\r\n        \r\n        \"","divers":"Château de Ruat à Teichs  44° 38' 20\" Nord et 1° 01' 40\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Ruat_Teichs_1.jpg","../../jctruffet.com/image/image_33/33_Ruat_Teichs_2.jpg","../../jctruffet.com/image/image_33/33_Ruat_Teichs_3.jpg","../../jctruffet.com/image/image_33/33_Ruat_Teichs_4.jpg"]},"Consult_chateau_formulaire1e4f":{"id":"Consult_chateau_formulaire1e4f","dept":"33","canton":"Lacanau","commune":"Cussac fort médoc","nom":"Réaux","type":"Château","periode":"XVII","histoire":"REAUX, des bâtiments figurent sur les cartes anciennes à partir de 1691 et en 1751 sous le nom Pénico. Puis sur le cadastre de 1826, les bâtiments sont organisés en U autour d'une cour. A cette date, le château actuel est probablement déjà construit. Le domaine est mentionné dans l'édition de l'ouvrage de Cocks en 1850, comme appartenant à Bonnin et produisant 40 tonneaux. Joseph Bonnin, négociant  à Paris, l'acquiert effectivement en 1848. Son frère, Alphonse est propriétaire du château Beaumont à la même époque. Il passe ensuite entre les mains de la famille Eyrem qui apporte des modifications à l'aile sud : augmentation de construction d'une maison  en 1865  Victor Eyrem, et  une construction nouvelle d'une maison en 1874 par Vital Eyrem.","architecture":"Réaux, un portail à piliers et une allée donnent accès aux bâtiments organisés autours d'une cour en U, le logis en fond de cour et deux ailes en retour d'équerre abritant au nord le cuvier et les chais et au sud des logements d'ouvriers. Le logis est composé d'un corps central de trois travées et d'un étage carré, surmonté d'un fronton triangulaire. De part et d'autre, deux ailes en rez-de-chaussée sont couronnées d'une balustrade d'attique. On retrouve ce même type d'organisation sur la façade postérieure donnant sur le jardin : on observe la modification de certaines fenêtres, cintrées à l'origine. A l'intérieur, le corps central abrite deux vastes salles distribuant des pièces annexes de part et d'autre,  l'escalier décentré permet l'accès à l'étage. Les bâtiments agricoles sont disposés au nord de la demeure.  L'étage du logis n'aurait été aménagé que postérieurement, nécessitant alors la construction de la tourelle d'escalier couverte d'ardoise.","habitants":"Joseph Bonnin\r\n        \"","divers":"Château de Réaux","gps":"","images":["../../jctruffet.com/image/image_33/33_R%c3%a9aux_1.jpg"]},"Consult_chateau_formulairec9a6":{"id":"Consult_chateau_formulairec9a6","dept":"33","canton":"Créon","commune":"Sadirac","nom":"Sadirac_Gironde","type":"Château","periode":"XVI-XVII","histoire":"SADIRAC, il y a aujourd'hui à Sadirac une quinzaine de châteaux dont les plus importants sont le château de Tustal et le château du Grand Verdus.                  TUSTAL Bernard Journu-Aubert  (1745-1815), comte de Tustal, d'Empire et pair de France, fut le propriétaire de l'ancienne baronnie de Calamiac sur la commune, achète le château de Tustal en 1791 et commence une exploitation de moutons mérinos qui ne prospère pas. Il devient, sous Napoléon Ier, comte de Tustal et d'empire et pair de France.                          LE GRAND-VERDUS, Claude Deschamps, architecte vend en 1810, à la famille Le Grix de la Salle est propriétaire de ce superbe domaine datant de la Renaissance.","architecture":"TUSTAL domaine  construit à l'emplacement d'une maison forte connue depuis le XVIe siècle. La partie la plus ancienne remonte au XVIIe siècle (tours carrées, échauguette, porte d'entrée datée de 1614), le château se compose de nombreux bâtiments disposés autour de deux cours rectangulaires fermées par des communs. La première cour a été fermée au XVIIIe siècle. La seconde a été ajoutée au XIXe siècle, également fermée par des communs. Le logis se présente comme un grand bâtiment rectangulaire avec deux petites ailes en retour d'équerre côté cour, prolongées par des communs. La façade arrière est flanquée de deux pavillons carrés. Le château de Tustal est inscrit aux M.H. depuis le 16 décembre 2008.\r\nGRAND-VERDUS  Gentilhommière fortifiée du XVIe siècle. Cette maison forte a tous les agréments de la résidence : De plan en U à trois niveaux  avec lucarnes avec frontons à pilastres, cour fermée, tours en poivrière, sobre logis avec échauguette et fenêtres à meneaux. Le château constitue un témoignage du système défensif des châteaux résidentiels des XVIe et XVIIe siècles, indispensable durant la fronde.","habitants":"Famille Le Grix de la Salle Famille Journu\r\n        \"","divers":"Château de Grand-Verdus et Tustal à Sadirac. Tustal  44° 47' 07\" Nord et 0° 23' 19\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Sadirac_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Sadirac_Gironde_2.jpg","../../jctruffet.com/image/image_33/33_Sadirac_Gironde_3.jpg","../../jctruffet.com/image/image_33/33_Sadirac_Gironde_4.jpg","../../jctruffet.com/image/image_33/33_Sadirac_Gironde_5.jpg","../../jctruffet.com/image/image_33/33_Sadirac_Gironde_6.jpg"]},"Consult_chateau_formulaire16b7":{"id":"Consult_chateau_formulaire16b7","dept":"33","canton":"Libourne","commune":"Lalande de Pomerol","nom":"Sales","type":"Château","periode":"XVII","histoire":"A Lalande de Pomerol, châteaux les Chaumes ,Tournefeuille, la Croix de le Chenevelle,  Bourseau, Ame de Musset, Trésor du Grand Moine, des Annereaux,  Boujut, La Fleur de Boüard, Les Hauts-Conseillants, de Roquebrune,   Moulin de Salles, de l'Eveché, Saint-Jean de Lavaud,  Siaurac,  du Petit Brouard, des Moines, des Mimosas, Vieille Dynastie, du Vieux Chaigneaux, Fleur de Jean Gué, Perron,  les Chagnasses,   tous ses châteaux sont vinicoles pas d'autres informations.                          SALES est un château bâti à Lalande-de-Pomerol,  En 1735 par mariage, Sales passe dans la famille Desaygues qui lui permettra, grâce aux femmes de passer la Révolution.   Toujours par les femmes, les de Laage de Meux sont à Sales en 1840 et actuellement les héritiers de Lambert,  au  XXIIe la génération, perpétue cette continuité familiale exceptionnelle. Cette propriété na donc jamais été revendue et cest   transmise ainsi de génération en génération depuis bientôt 550 ans, est inscrit aux M.H. depuis 1996. \r\nBELLES GRAVES, de Xavier Piton qui vit le jour le 19 août 1966 est assure aujourd'hui la direction générale du domaine ,il est également administrateur du syndicat viticole de Lalande de Pomerol, dont il a été le président en 1995, il fait aussi partie de la confrérie des Baillis de Lalande de Pomerol, il est enfin administrateur de l'équipe Cousteau (cousin germain de son grand-père) dont une des chambres d'hôtes porte le nom prestigieux.","architecture":"SALES est un château bâti à Lalande-de-Pomerol, en partie  sur Pomerol. La construction du château de Sales date du XVIIe siècle est sans doute la plus anciennes propriété familiale de la Gironde et même peut-être de France.  Cest en 1464 que Bertrand de Sauvanelle prend en « location » auprès des moines prêcheurs (actuellement les dominicains) de Saint-Emilion, un domaine quil achètera par la suite. Au début du XVIIe siècle, ses descendants François et Jean de Sauvanelle qui se faisaient appeler « Sieur de Sales » firent construire le château, une des premières chartreuses de lépoque, dont les bâtiments sont restés inchangés au cours des siècles.                    BELLES-GRAVES corps de logis central à un niveau intercalé entre deux pavillons rectangulaitres à deux niveaux, l'ensemble toit en croupe recouvert de tuiles, l'entrée est équipé d'un fronton triangulaire au niveau du toit","habitants":"Famille Desaygues                                                          Famille  Xavier Piton \r\n        \"","divers":"Château de Sales et de Belles-Graves 44° 56' 40\" Nord et 0° 13' 38\" Ouest  g-4-5","gps":"","images":["../../jctruffet.com/image/image_33/33_Sales_1.jpg","../../jctruffet.com/image/image_33/33_Sales_2.jpg","../../jctruffet.com/image/image_33/33_Sales_3.jpg","../../jctruffet.com/image/image_33/33_Sales_4.jpg","../../jctruffet.com/image/image_33/33_Sales_5.jpg"]},"Consult_chateau_formulaireaf19":{"id":"Consult_chateau_formulaireaf19","dept":"33","canton":"Villenave d","commune":"Villenave-d","nom":"Sallegourde","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Villenave d'Ornon celui de  Sarcignan et de Sallegourde.                                                SALLEGOURDE, nécropole mégalithique de Peyrehaut : le site a été aménagé pour les promeneurs, chemin de Couhins, au sud de la ville. Son propriétaire, Gérard Leconte, après l'avoir sauvé in extrémis.   \r\nSARCIGNAN est un ancien château  construit en style néo-gothique dans les années 1860 par Philippe Alary Lamartinie, notaire bordelais et ancien conseiller municipal de Villenave-dOrnon. Ce château, promis à la démolition en août 2015, devait laisser la place au futur centre culturel Jacques-Brel. À la suite de la mobilisation de riverains, de spécialistes du patrimoine architectural et de près de 12 000 internautes, la mairie, le 14 août 2015, a renoncer à sa démolition. La maison des associations sera désormais construite derrière le château.. Il est de style néogotique. Sa construction date de 1860 à 1870. Le château de Sarcignan est privé et fermé au public. Lédifice est de style néo-gothique en vogue au XIXe siècle. Il est plus tard rehaussé dun étage, par la volonté dun ancien notaire bordelais, Philippe Alary Lamartinie.","architecture":"SARCIGNAN  Un hôpital est créé sur la partie du champ de manuvres pendant la guerre 1914-1918 comprenant le château du Béquet, construit en 1770 (actuel hôpital Robert-Picqué, inauguré en 1936). Pendant la deuxième guerre mondiale, la commune fait partie de la zone occupée et plusieurs résistants originaires de la commune meurent pour la France. Elle est libérée le 28 août 1944 par les F.F.I. \r\nSALLEGOURDE et son parc sont inscrits comme sites protégés en 1943. Epoque du XVIe siècle,  du XVIIe siècle avec corps de logis, dépendances et deux pigeonniers du XVIIe siècle. Il est entouré d'un parc avec une grotte romantique du XVIIe siècle et des bassins.  Les façades et toitures des deux corps de logis en retour d'équerre et des deux pavillons du château.","habitants":"Sarcignan Philippe Alary Lamartinie\r\n        \"","divers":"Sallegourde Coordonnées par GPS : : 44° 46' 13,21\" Nord et 0° 33' 11,74\" Ouest                              Scarignan Coordonnées par GPS : N 44° 46' 73\" Nord - 0° 34' 37\" Ouest","gps":": 44° 46' 13,21\" Nord et 0° 33' 11,74\" Ouest","images":["../../jctruffet.com/image/image_33/33_Sallegourde_1.jpg","../../jctruffet.com/image/image_33/33_Sallegourde_2.jpg","../../jctruffet.com/image/image_33/33_Sallegourde_3.jpg"]},"Consult_chateau_formulaire892c":{"id":"Consult_chateau_formulaire892c","dept":"33","canton":"Pineuilh","commune":"Sauveterre de Guyenne","nom":"Sauveterre_Guyenne","type":"Bastide châteaux","periode":"XVII","histoire":"Bastide d'origine anglaise, elle fut fondée en 1281 par Édouard Ier, devient française en 1451, deux ans avant la fin de la  guerre de cent ans. Elle fut administrée par une jurade jusquà la Révolution Française. La famille Bacalan, originaire de Sauveterre-de-Guyenne, a compté parmi ses membres un nombre important de parlementaires bordelais dont l'un fut propriétaire du château Haut Bacalan. Elle possédait un domaine au nord de Bordeaux.                                BELLEVUE, le château aurait été construit au XVIIe siècle par la famille Lestelle. Il fut habité notamment par un de leur descendant Antoine de Bouïre de Beauvallon, procureur du Roi à Bordeaux qui eut en main les intérêts des grandes familles de la Gironde. Nommé membre du conseil général il y représentera le canton de Sauveterre. A sa mort en 1845, il laissa Bellevue à son fils Léon de Beauvallon, maire de Saint-Romain de Vignague et Juge de paix à Sauveterre, à la fin du XIXe siècle, Bellevue appartient à la famille Gaboriaud de Latour, propriétaire du château Latour, voisin, en Albret, puis à M et Mme Armand Perrier. Monsieur Jacques, Armand Perrier était maire de Blasimon (1904-1922) et propriétaire du château de Caban, à Blasimon. Daprès des témoins oculaires (madame Cleyrac qui habitent Mont St-Fort et madame Marguerite Canterane de St-Romain), monsieur Perrier faisait chaque jour la route entre Bellevue et Blasimon, en voiture à cheval. En 1973, un an après la mort de Suzanne Marceron, ses enfants vendent Bellevue aux propriétaires actuels, la famille dAmécourt.","architecture":"Sauveterre, les murs de la bastide furent démantelés en 1838 mais les portes ont pu être conservées. À ce jour, Sauveterre est la seule des huit bastides girondines à avoir conservé les quatre portes dentrée de la ville. Lune dentre elles, la porte Saubotte (17 mètres de hauteur 2 salles de garde) a été entièrement restaurée et peut se visiter.  Logo monument historique  rouge ombré, encadré, les portes de la ville sont situées aux quatre accès principaux de l'ancienne bastide. Elles sont classées au titre des M.H.depuis 1892","habitants":"Bellevue Famille Lestelle                                       Famille Gaboriaud de Latour\r\n        \"","divers":"Château de Bellevue à Sauveterre","gps":"","images":["../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_1.jpg","../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_2.jpg","../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_3.jpg","../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_4.jpg","../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_5.jpg","../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_6.jpg","../../jctruffet.com/image/image_33/33_Sauveterre_Guyenne_7.jpg"]},"Consult_chateau_formulaire3860":{"id":"Consult_chateau_formulaire3860","dept":"33","canton":"Pineuilh","commune":"Savignac","nom":"Savignac_Auros","type":"Château","periode":"XV","histoire":"SAVIGNAC-AUROS,  dans la litanie des propriétaires successifs, on peut citer, après la bataille de Castillon, les Albret, puis Gaston de Foix Candale à la fin du XVe siècle déjà seigneur de Cadillac et Langon, puis ce fut son gendre Jean de Laminssans, urbaniste du village en 1519.  Début XVIIe siècle, Jean de Fabas fut le baron dAuros. Ami du roi Henri de Navarre, celui-ci lui permit de reconstruire son château de Castets en Dorthe.  On y trouva ensuite la famille « du Bouzet, barons de Poudenas ». En 1760, le château est acheté par un officier Pierre de Castelnau qui prit le titre de « baron dAuros ». Il avait un hôtel particulier à Bordeaux dans une rue qui a conservé son souvenir, la rue Castelnau dAuros, à proximité de la place Gambetta. Pierre de Castelnau décéda à Auros en janvier 1789. Son fils Gabriel hérita du château mais il émigra en Russie. Il fut vendu avec tout son mobilier, ses terres comme bien national en 1794 et acheté par Joseph Brannens de Langon. Depuis, il y eut de nombreux propriétaires, Partarrieu, Fayet, Nibaut, Guagni jusquen 1982 ou des texans passionnés de vin de Bordeaux, les Ghelsen.                                                La PEYRERE, dès le XVIe siècle, la propriété appartient à la famille Lassus, dont un ancêtre est reçu bourgeois de Bordeaux en 1582.  Le château est acheté en 2003 par Cathy et Jean-Jacques Lucas.","architecture":"AUROS autrefois fortifié  A lintérieur se trouve une tour trapézoïdale qui date peut-être de la reconstruction de la fin du XIIIe siècle, comparable au donjon de Lesparre, une grosse tour ronde et toute lenceinte dateraient également de cette époque. Les deux ailes en retour d'équerre ont subit de nombreux remaniements au cours de la période moderne. En 2000, Les Fréret redonnent vie à ce monument laissé à labandon depuis de nombreuses années.  Il est aujourdhui transformé en un lieu de réception pour les évènements festifs.                                                        La PEYRERE,   château du XVIIIe siècle, de plan classique corps de logis rectangulaire à deux niveaux et dépendances de châque côtés à un niveau.","habitants":"Baron Jean de Fabas\r\n        \"","divers":"Château d'Auros grav-1 à 5 de l'Isle g-6  la Peyrere g-7_8  à Savignac","gps":"","images":["../../jctruffet.com/image/image_33/33_Savignac_Auros_1.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_2.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_3.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_4.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_5.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_6.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_7.jpg","../../jctruffet.com/image/image_33/33_Savignac_Auros_8.jpg"]},"Consult_chateau_formulaire661c":{"id":"Consult_chateau_formulaire661c","dept":"33","canton":"Lacanau","commune":"Margaux","nom":"Siran_Margaux","type":"Château","periode":"XVII","histoire":"SIRAN, en 1428, Guilhem de Siran devient le propriétaire du domaine. À partir du  XVIIIe siècle le château Siran devient la possession de François Augustin baron du Bosq, maire de Labarde, il émigra en 1791. La propriété fut transmise par héritage à sa fille Jeanne qui épousa Alphonse comte de Toulouse Lautrec-Monfa (grands-parents du futur peintre Henri de Toulouse-Lautrec). Cette famille vend le 14 janvier 1859  le domaine à Léo Barbier  ancêtre de la famille Miailhe  dont les deux filles épousent leurs voisins, Paul et Alexandre Sollberg, fils d'Oscar Sollberg  courtier à Bordeaux  et de Louise Cabanes. Ces derniers, ayant fait faillite lors d'un krach financier vers 1882, partent précipitamment vivre en Argentine; ils demandent donc à leur sur, Lovely Sollberg (1833-1909), de gérer le domaine de Siran.   Lovely Sollberg est mariée à Élie-Édouard Miailhe (1817-1891), négociant  depuis le 3 mai 1851. Leur fils, Frédéric Miailhe (1867-1952) prend le château Siran en gestion avec Marcel Mortier qui épouse, le 7 octobre 1885, Hélène Sollberg, sa cousine germaine. Frédéric Miailhe,  gère le domaine de 1885 jusquaprès la première guerre mondiale après avoir racheté les parts de ses tantes, mesdames Sollberg, Dugelay et Pinto en 1915. C'est en 1859, que le château entre dans la famille  des Toulouse-Lautrec, propriétaires sous le second empire. Après avoir dirigé la propriété pendant près de 30 ans, Brigitte et Alain Miailhe ont transmis en 2007, la direction du domaine à leur fils, Édouard, qui représente la cinquième génération aujourd'hui à la tête du domaine. Ainsi, le château Siran est lune des rares propriétés médocaines à appartenir à la même famille depuis plus de 150 ans.","architecture":"SIRAN, de plan rectangulaire  à un niveau et attiques sur toit en croupe avec occulus sous toits retour en équerre sur arrière du bâtiment et dépendances de chaque côté.","habitants":"Famille  des Toulouse-Lautrec\r\n        \"","divers":"Château de Siran à Margaux","gps":"","images":["../../jctruffet.com/image/image_33/33_Siran_Margaux_1.jpg"]},"Consult_chateau_formulairefccc":{"id":"Consult_chateau_formulairefccc","dept":"33","canton":"Lacanau","commune":"Soussans","nom":"Soussans","type":"Château","periode":"XVII","histoire":"Plusieurs château à Soussans seul gravure de Paveil.  SOUSSANS, la tour du Mons, plusieurs générations se sont succédées sur ces terres depuis l'origine du château au XIIIe siècle. De ses nombreux propriétaires, on retiendra Pierre de Mons, qui entra en possession du domaine en 1623 et lui donna son nom. Le domaine appartiendra à ses descendants jusqu'à la fin du XXe siècle.                                                      Tayac pas d'information  historique.                            GALIANE d'origine anglaise appartient depuis 5 générations à la famille Miquau-Renon.          BOSTON,  Haut breton larigaudière, acquis par la famille de Schepper en 1964 négociant en Belgique depuis 1938 et propriétaire de cinq châteaux bordelais. LABEGORCE  à Margaux, le coup de foudre dHubert Perrodo en 1989 sinscrit dans la lignée de ceux qui ont aimé cette terre au fil des siècles.                            PAVEIL de Luze,  au XVIIe et XVIIIe siècles, le château appartient à la famille de Bretonneau,  en 1862, le baron Alfred de Luze achète ce magnifique domaine, dès 1960, le baron Geoffroy de Luze décide de redonner son lustre à la propriété. \r\nCHANTELUNE souvenir du temps où M. Soubrane, charpentier de son état,de la famille Sanfins\r\nClos de BIGOSS  est une petite propriété familiale depuis trois générations,   de   la famille Jarousseau.   BELLEVUE de TAYAC, de la famille Fabre.","architecture":"PAVEIL  Les bâtiments forment un U autour d'une cour disposée à l'est tandis que le parc se déploie à l'ouest. La partie habitation est installée dans l'aile sud sommée d'une balustrade d'attique et dans le corps central avec pavillon. L'ancienne orangerie, en retour d'équerre côté jardin, ouverte par de vastes baies cintrées, est également convertie aujourd'hui en habitation. Le chai est accessible par le second pavillon, qui débouche sur une cour abritant auparavant une écurie. Les façades orientales et occidentales du chai conservent la trace de vastes ouvertures encadrées de pilastres à bossages. L'aile nord abrite également un cuvier et l'ancien chai de vieillissement : les espaces ne conservent plus leurs fonctions d'origine. Depuis la terrasse aménagée à l'ouest, deux allées ouvrent sur le parc : le dénivelé mène à une vaste pièce d'eau qui servait de vivier.","habitants":"Pierre de Mons\r\n        \"","divers":"Soussans plusieurs châteaux Paveil, Galiane, de Luze","gps":"","images":["../../jctruffet.com/image/image_33/33_Soussans_1.jpg","../../jctruffet.com/image/image_33/33_Soussans_2.jpg","../../jctruffet.com/image/image_33/33_Soussans_3.jpg","../../jctruffet.com/image/image_33/33_Soussans_4.jpg"]},"Consult_chateau_formulaire9edd":{"id":"Consult_chateau_formulaire9edd","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"Soutard_Fonplegade","type":"Château","periode":"XVIII","histoire":"COUTART-FONPLEGADE, en 1852 Jean Pierre Beylot fit construire le château, qui passa au duc de Morny et à la comtesse de Galard famille de Napoléon III, en 2004  la propriété à été racheté par  la famille Adams.                                                                     SOUTARD, les premières traces de Soutard remontent à 1513 avec la mention du Bourdieu de Mayne de Soutard. Jean Couture, Jurat de Saint-Emilion, achète la propriété en 1699 et sa fille Marie bâtit le château en 1741. Au XIXe siècle, Jean Lavau, lun des plus grands propriétaires de Saint-Emilion fait fructifier le domaine, finalement transmis à Michel des Ligneris en 1919, dont la descendance dirigera la propriété pendant près dun siècle.","architecture":"PUY-RAZAC est un chateau bâti à Saint Emilion.         SOUTARD, au bout de sa majestueuse allée de tilleuls, le château Soutard a belle allure avec sa fière façade XVIIIe et ses ailes en moellons du XVIe, typiques des fermes traditionnelles du Bordelais. Cette maison de maître peut vivre en autarcie totale avec son lavoir, son jardin potager et sa basse-cour. La ferme a conservé son four à pain et son pigeonnier, témoignage de ses privilèges dantan.  En 2006, le château Soutard est acquis par la Mondiale, société de lAG2R La mondiale.","habitants":"Famille de Jean Pierre Beylot\r\n        \r\n        \"","divers":"A  soutard , Content grav de 1 à 4, Fonplegade de 5 à 7","gps":"","images":["../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_1.jpg","../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_2.jpg","../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_3.jpg","../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_4.jpg","../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_5.jpg","../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_6.jpg","../../jctruffet.com/image/image_33/33_Soutard_Fonplegade_7.jpg"]},"Consult_chateau_formulaire2ec9":{"id":"Consult_chateau_formulaire2ec9","dept":"33","canton":"Blaye","commune":"Saint-Ciers de Canesse","nom":"St_Ciers_Canesse","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Saint-Ciers de Canesse celui de Rousselle et les tours de Seguy et à Villeneuve le château de  Mendoce.                               ROUSSELLE,  concernant la «maison noble de Rousselle », son premier propriétaire semble avoir été messire Jean de Tortaty, chevalier et conseiller du Roy au XVIIe siècle. Au cours du XIXe siècle, toujours, le château Rousselle fut une propriété  « pilote » où lon expérimenta la modernisation de son chai.  Au cours du XXe siècle, le château Rousselle a appartenu à plusieurs familles successives depuis 1999 à la famille  Vincent Lemaitre.                                                           LES TOURS SEGUY, gites de France, en 1842, la propriété est acquise par Jean Auguste Lavau, son fils Antoine  poursuivra sa tâche et transmettra le bien en 1902 à sa cousine Marie Murat. Celle-ci la léguera à son gendre, Marc Beylot, arrière grand-oncle de Jean-François Breton, actuel propriétaire.  Elle est restée depuis lors dans le giron familial et a été ainsi transmise en 1997 à Jean François Breton. Marc Beylot, docteur en médecine, poursuivra le remembrement par acquisitions de nouvelles parcelles.                                                                   MENDOCE  appartenait à Philippe Dérricarrère .      Château de Sauman de Véronique Braud, ancien lieu de villégiature de la famille Sinan/Braud depuis un siècle et demi, cest Louise Sinan, mon arrière grand mère qui fait de cet endroit une propriété viticole à part entière dès la fin du XIXe siècle.","architecture":"ROUSSELLE  de plan rectangulaire  dont le corps de logis à deux niveaux de cinq travées avec avant corps en balconnet au premier légèrement saillant avec fronton triangulaire  au niveau du toit en croupe recouvert de tuiles, l'ensemble à droite comme à gauche accolé en prolongement de bâtiment d'un niveau de deux travées.                                           TOUR-SEGUY, les années 1842 à 1849 marquent le remembrement et le développement de la propriété d'origine. Se compose d'un corps de logis rectangulaire de deux niveaux toit en croupes, construction au corps de la maison  de deux tours  l'une ronde l'autre style donjon les deux  crénelées à mâchicoulis. Ladjonction de deux tours en 1920 a donné lieu à la dénomination, aujourd'hui hôtel,  gites de France.                                                             MENDOCE, avec ses tours dangles percées de bouches à feu et coiffées de poivrières ardoisées, ses murs en moellons appareillés, et son originale double charpente asymétrique couverte de tuiles rousses, Mendoce nest pas seulement un château viticole, cest aussi une authentique gentilhommière dont la plus vieille tour est du XVe siècle.","habitants":"docteur Marc Beylot                                                Famille Lemaitre\r\n        \"","divers":"Château Rouselle et la Tour Séguy à St-Ciers de Canèse","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_1.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_2.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_3.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_4.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_5.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_6.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_7.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_8.jpg","../../jctruffet.com/image/image_33/33_St_Ciers_Canesse_9.jpg"]},"Consult_chateau_formulaire04b4":{"id":"Consult_chateau_formulaire04b4","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"St_Emilion","type":"Château","periode":"XIX","histoire":"A Saint-Emilion château de Dassault et Grand Barrail hôtel.                                                                              DASSAULT, bâti à Saint Emilion, au XIXe siècle. C'est un château de style Second Empire. Il appartenait à l'industriel avionneur Marcel Dassault, depuis 1955, puis à son petit-fils Laurent Dassault, depuis 1994. il rebaptise le château de son nom. Classé en 2002, Laurent Dassault agrandit le domaine par l'acquisition du domaine voisin le château la Fleur. Laurent Dassault et sa directrice Laurence Brun-Vergriette (succéde à son père André Vergriette) dirigent et exploitent le domaine. En 1998, le groupe Dassault devient également actionnaire de 5 % du prestigieux château Cheval Blanc aux côtés d'Albert Frère et de Bernard Arnault.                                                      GRAND-BARRAIL  membre de « Small Luxury Hotels of the World »  réparties sur quatre bâtiments : la maison du Bien-Être et la maison du Vignoble. Le nom  était celui de lancienne chartreuse girondine sur les ruines desquelles le château a été construit, en 1902, à linitiative de Mr René Bouchard, pour sa maîtresse, madame Godeau. Il confia ce chantier à larchitecte Louis-Marie Cordonnier,   Le Grand Barrail fut longtemps rattaché au domaine, la Marzelle Figeac. Il devient un château hôtel en 1993.","architecture":"DASSAULT  De  style néo-classique plan rectangulaire à deux niveaux avec lucarnes  en oeil de boeuf  et galbes sur un toit recouvert d'ardoises, des pavillons légèrement saillants au centre de chaque façades avec fronton triangulaire au niveaux du toit.    GRAND-BARRAIL, aux portes des plus célèbres châteaux viticoles de Saint Emilion, à proximité de la cité médiévale se dresse limpressionnante architecture de lunique château hôtel du XIX siècle, de la rive droite bordelaise : Entouré dun parc de 3 ha, s :  Mr René Bouchard, vécu quelques années en Arabie et souhaita en retrouver lambiance dans la décoration du château. Le salon Mauresque orné de vitraux et fresques en font une originalité dans la région Bordelaise. En 2008, l'hôtel Grand Barrail entreprend de lourds travaux de rénovation et dembellissement.  De style néo-classique de plan rectangulaire à deux niveaux avec série de lucarne sur un toit en ardoise flanqué en fade d'entrée sur les angles à dtroite d'une tour rondeà trois niveaux avec lucarnes à galbes imposants et à l'opposée tour aéré de plan carré avec toit en dôme et au centre \r\npavillon d'entrée carré  avec mâchicoulis au dessus oeil de boeuf toit quatre  pans avec clochetons.","habitants":"Marcel Dassault                                                            Mr René Bouchard,\r\n        \"","divers":"château de Dassault et Grand Barrail hôtel. Pavie g-2 g, troplong g-3,Trottevieille g-4 , Dassault g-5-6, Franc-<maine g-7; St-Georges g-8, Gd Barrail g-9","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Emilion_1.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_2.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_3.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_4.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_5.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_6.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_7.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_8.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_9.jpg"]},"Consult_chateau_formulaire48e4":{"id":"Consult_chateau_formulaire48e4","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"St_Emilion_Chateau","type":"Château","periode":"XVIII","histoire":"Dans cet article de St-Emilion latour d'Ambet, Ausonne, Cheval Blanc, Canon, Cantenac, le palais Cardinal, Troplong-Mondot.                                          AMBET, Tour Pourret  une magnifique bâtisse avec une tour sur une cour intérieure à l'entrée de la ville de Saint-Émilion.                                                           AUSONNE, aujourdhui le château Ausonne appartient à Alain Vauthier et à sa sur Catherine, depuis le rachat des parts de leur tante Hélyette Dubois-Challon en 1997. Cest Alain Vauthier qui le dirige.            CHEVAL-BLANC,  bâti à Saint Emilion, domaine.  il est l'un des quatre domaines, avec le château Ausonne, le château Pavie et le château Angélus, est la propriété de la famille Fourcaud-Laussac pendant plus de 150 ans. En 1998, le domaine est racheté par le belge Albert Frère et Bernard Arnault  décide de créer une marque d'hôtels haut de gamme reprenant la dénomination administré par Pierre Lurton (qui dirige également château d'Yquem).\r\nCANON  propriété des héritiers de  Chanel à travers  son associé Pierre Wertheimer.                 CANTENAC,  bâti au Lieu-dit Cantenac, à Saint Emilion,  Nicole Roskam-Brunot et ses fils, 4ème génération, perpétuent une passion familiale pour lélaboration de grands vins de St Emilion.                   Le PALAIS CARDINAL , il se trouve dans l'enceinte de lex-demeure du premier doyen de léglise collégiale de Saint-Emilion Gaillard de Lamothe « neveu du Pape soldat Clément V », nommé cardinal de Sainte-Luce en 1316. Depuis 1878, cette demeure est un hôtel familial, dirigée par Jean-Guy et Christine Beyney représentant la troisième génération.   Le Palais des Archevêques de Saint-Émilion est classé aux M.H. depuis 1886.","architecture":"FRANC-MAYNE, la propriété a appartenu à Jean Theillasoubre jusquen 1984, puis à la compagnie dassurances AXA puis à partir de 1996 à Georgy Fourcroy, négociant belge en vin et ses associés. Griet Van Malderen-Laviale et son époux Hervé Laviale, par ailleurs propriétaires du château de Lussac et du château Vieux Maillet à Pomerol ont repris la propriété au début de lannée 2005. La propriété a subi immédiatement dimportantes transformations : rénovation totale du cuvier et création de chambres dhôtes. De gros travaux ont été entrepris, le cuvier a été entièrement rénové en 2006 et le travail seffectue à présent par gravité. Fin 2017, le domaine change à nouveau de propriétaire: c'est le financier Jean-Pierre Savare, qui le rachète et met à sa tête Martine Cazeneuve, de château Paloumey .                            Le PALAIS CARDINAL  est un château bâti place du 11 Novembre 1918 à Saint Emilion .  L'hôtel est situé à l'entrée nord de la cité moyenâgeuse de Saint-Émilion, accolé à l'antique porte Bourgeoise (lune des 6 à St-Emilion)                                                               TROPLONG-MONDOT, labbé Raymond de Sèze qui édifia en 1745 le château actuel. Le domaine de Mondot acquit alors sous sa direction une grande renommée. En 1980, cest une descendante de la famille, Christine Valette-Pariente qui prend en charge le domaine. Dix ans après, son mari Xavier Pariente la rejoint,  la fille des propriétaires, directrice du marketing du château.","habitants":"Ausonne Alain Vauthier                                               Cheval-Blanc Famille Fourcaud-Laussac.              Cantenac  Nicole Roskam-Brunot\r\n        \"","divers":"Cheval blanc 44° 53' 37\" Nordet 0° 09' 17\" Ouest, Canon g-2, Franc-mayne g-3, Maxwell-Storie g-4, Monlot g-5, Pressac g-7","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_1.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_2.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_3.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_4.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_5.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_6.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_7.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_8.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Chateau_9.jpg"]},"Consult_chateau_formulaire178a":{"id":"Consult_chateau_formulaire178a","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"St_Emilion_II","type":"Château","periode":"XV-XVII","histoire":"Dans cet article de St-Emilion le château de Figeac, Berliquet, ,  Puy-Razac.                                    FIGEAC, au XVe siècle, est vendu par la famille de Lescours à la famille de Cazes. En 1654, la seigneurie passe dans la famille de Carles par le mariage de Marie de Cazes avec François de Carles. En 1838, la veuve Carles-Trajet vend l'ensemble du domaine. Plusieurs propriétaires se succèdent durant le XIXe siècle, château La Tour du Pin Figeac (lui-même subdivisé en deux propriétés), château Yon Figeac, château La Graves Figeac et château Petit-Figeac (ce dernier racheté en 2002 par le château-Figeac).   En 1892, Henriette Villepigue  achète le domaine avec sa dot ; son petit-fils, Thierry Manoncourt,  prend la direction à partir de 1947. Thierry Manoncourt (1917-2010) fut un ingénieur agronome formé à l'INA ;  Son gendre, le comte Éric d'Aramon, a pris le relais à partir de 1988 jusqu'en 2013.                                  BERLIQUET Depuis 2017, appartient à la maison Chanel, déjà impliquée dans les vignes bordelaises depuis plus de vingt ans à château Canon, mais également château Rauzan-Ségla,   du vicomte de Lesquem.","architecture":"FIGEAC  a subi au cours de son histoire guerres et incendies en 1586 lors des guerres de religions, puis reconstruit. Du Moyen Âge subsistent des portes et fenêtres dans l'aile droite du château de la Renaissance, où il a été reconstruit après l'incendie de 1586, les piliers de la grande cour, les ailes du château, la tour et quelques fenêtres à menaux,  du XVIIIe siècle, la partie centrale du château et les piliers de la cour d'honneur, de 1900, le prolongement de l'aile droite et la création de la terrasse. Le château de Figeac était une des cinq maisons nobles de Saint-Émilion.                                                                    PUY-RAZAC est un chateau bâti à Saint Emilion,","habitants":"Ferrand Mademoiselle de Scudéry                            Figeac famille de Lescours                                 Berliquet  vicomte de Lesquem                                 Fonpelage  Jean Pierre Beylot\r\n        \"","divers":"Mairie g-1, Francs-Maine-g-2, Haut-Sarpe, Ambe Tour-Pouret g-3 , Ausonne g-5 , Beauséjour g-6, Berliquet g-7, Cantenac g-8, Magdeleine- g-9","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Emilion_II_1.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_2.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_3.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_4.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_5.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_6.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_7.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_8.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_II_9.jpg"]},"Consult_chateau_formulaire06dd":{"id":"Consult_chateau_formulaire06dd","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"St_Emilion_III","type":"Château","periode":"XVIII","histoire":"Dans cet article de St-Emilion le château de Fourtet, la Gaffelière, Magdeleine, Monlot-Capet , Pavie, Trotteville.                                                              FOURTET,  rendu célèbre par ses propriétaires les seigneurs de Figeac au XVIIIe siècle, le domaine clos de murs contenant le vignoble dun seul tenant et une résidence construite durant lancien régime.                  La GAFFELIERE, l'histoire du domaine est liée à celle de la famille Malet-Roquefort installée à Saint-Émilion depuis quatre siècles. Selon le site en ligne du domaine, elle constitue la plus ancienne famille de la région de Saint-Émilion. L'actuel propriétaire est le comte Léo de Malet-Roquefort, (né en 1933 dans cette commune).\r\nMAGDELEINE Le domaine est acquis en 1952 par monsieur Jean-Pierre Moueix, négociant, fondateur des Ets. L'Inao entérine en même temps sa fusion avec le château Bélair-Monange, acquis par les Ets. Jean-Pierre Moueix en 2008.                                     MONLOT-CAPPET sur la commune de Saint Hippolyte. La propriété a appartenu à Louis XIII, roi de  France de 1601-1643. Ensuite, il a été transmis à la comtesse de Guerchy et son frère le marquis de Beuvron, qui ont construit le château qui existe aujourdhui. Au XIXe siècle, la maison noble de Capet est devenue la propriété de la famille Ichon.  Après la mort de M. Ichon, Elle a été divisée entre trois membres de la famille. Un de ses enfants, sa fille, Jeanne Delphine Ichon, a reçu la maison en héritage. Après quoi elle la renommée « Monlot Capet » pour symboliser que la propriété a été « son lot », ou, son héritage.\r\nPAVIE  est un domaine viticole de 37 ha situé à Saint-Émilion en Gironde. Repris à la famille Valette en 1998 par Gérard Perse avec les conseils de Robert Parker et Michel Rolland. PRESSAC limmense propriété appartient à Jean-François Quenin depuis 1997 et sétend sur 42 hectares dont 36 hectares sont occupés par les vignes âgées de 30 ans en moyenne.","architecture":"FOURTET, implanté aux portes de la ville médiévale sur des carrières souterraines, le Clos Fourtet doit son nom au \"Camp Fourtet\", place fortifiée qui servait à protéger Saint-Émilion au Moyen-Âge.                          La GRAFFELIERE, le château présente au travers de son architecture les goûts et les inspirations des nombreuses générations.                        TROTTEVIEILLE, aujourd'hui, et depuis 1950, le domaine est la propriété du groupe Borie-Manoux que dirige Philippe Casteja et qui possède plusieurs châteaux dont ceux du Haut-Bages Monpelou et du domaine de l'Église.\r\nCLOS-FOURTET, la famille Cuvelier, propriétaire  ainsi que  du château Poujeaux (Moulis) rachète trois perles de Saint-Emilion, trois grand crus classés : le clos Saint-Martin (1,33 hectares), le château les Grandes Murailles (2 hectares situés sous la célèbre ruine de la grande Muraille du village) et le château Côte de Baleau (14,90 hectares dans le secteur de Baleau). Les trois propriétés appartiennent à la famille Reiffers et sont dirigées par l'une des descendantes et co-propriétaire, Sophie Fourcade.","habitants":"La Gaffelière famille Malet-Roquefort                 Magdeleine Jean-Pierre Moueix                                     Monlot famille Ichon                                                    Pavie  famille Valette \r\n Pressac Famille de  Jean-François Quenin \r\n        \"","divers":"Pressac g-1,   Montagne-g-2  , Pavieg-3, Monlot g-5, Figeac-g-6, Fourtet g-7, Corbin g-9","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Emilion_III_1.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_2.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_3.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_4.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_5.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_6.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_7.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_8.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_III_9.jpg"]},"Consult_chateau_formulaire687a":{"id":"Consult_chateau_formulaire687a","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"St_Emilion_Patrimoine","type":"Vestiges","periode":"XIII","histoire":"Plusieurs châteaux à Saint-Emilion, la Tour du Roi,  Larroque (voir article) et Ferrand.                                 St-EMILION,   Héritière d'un vieil oppidum gallo-romain, la cité devient ville religieuse lorsque le moine Emilian y fonda son monastère au VIIIe siècle et y creusa la grotte de lErmitage, Émilion était un moine, trésorier de l'évêque de Vannes. La ville se construisit au long du Moyen-Âge, elle fut fermée par des remparts dès le début du XIIIe siècle. La Jurade, confrérie des vins de Saint-Emilion, fut instaurée en 1199 par Jean Sans Terre, roi dAngleterre. Lautorité de la Jurade perdura jusquà la Révolution française en 1789.                                                                       La TOUR du ROY date du Moyen-Age ou château du Roi est un donjon-citadelle édifié en 1237 sur ordre d'Henri III, roi d'Angleterre et Duc d'Aquitaine. Le donjon est le chef duvre de Saint Emilion est  imposant. Il est si impressionnant que les habitants le nomment, le château du Roi du XIIe siècle, c'est du haut de cette tour que la Jurade de Saint-Émilion  est proclamé, inscrite au patrimoine mondial de l'humanité de l'UNESCO. La Tour du Roy est classée aux M.H. depuis 1886.                                                   FERRAND depuis le XVIIe siècle siècle sinscrit dans la grande tradition des propriétés viticoles du bordelais, la cour de Louis XIV ne sest-elle pas pressée à Ferrand réputé pour ses fêtes, et des périodes plus discrètes. Mademoiselle de Scudéry, femme de lettres, et grande amie dElie de Bétoulaud, se livre à Ferrand à des compositions poétiques.","architecture":"SAINT-EMILION;   les remparts médiévaux  sur un axe \"Nord-Sud\". et conserve de beaux murs de 4 à 8m de haut et de 1500m de long partiellement précédés par un fossé.   Un haut rempart composé de 2 architectures bien différentes : Une belle fenêtre géminée. Une magnifique archère cruciforme. La porte nommée Brunet est un vestige, elle est de facture Romane du XIIe siècle avec une épaisseur double par rapport au rempart. Elle devait être précédée par un pont-levis et certainement possédait des créneaux de défense. Mais le temps a fait son travail de destruction.    Les autres vestiges de la cité;   la porte et la maison de Cadène est l'unique ouverture de l'enceinte fortifiée intérieure. Le cloitre des Cordeliers du XIVe siècle vendu comme bien national en 1791.  La grande muraille sous ce nom depuis le XIXe siècle, est le vestiges  du couvent dominicain du XIIIe siècle  en dehors de la cité. Le palais Cardinal du XIIe siècle subsiste que la partie avant des remparts. La porte Brunet du XIIe siècle.                                               TOUR du ROY \"carrée\" de  9,5m x 9,3m semble habitable   Ce donjon carré haut de 32 mètres et 118 marches a abrité l'hôtel de ville jusqu'en 1608. Pour une construction du XIIIe siècle, pas d'archère, pas de bretèche, pas d'échauguette, pas de mâchicoulis. Pas de créneau  pas d'évolution de défense et pas de type arquebusière ou canonnière.","habitants":"le moine Emilian                                                         Ausonne Alain Vauthier\r\n        \"","divers":"Tour du roy 44° 53' 31\" Nord et 0° 09' 25\" Ouest                            ST-Emilion 44° 53' 37\" Nord, 0° 09' 17\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_1.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_2.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_3.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_4.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_5.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_6.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_7.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_8.jpg","../../jctruffet.com/image/image_33/33_St_Emilion_Patrimoine_9.jpg"]},"Consult_chateau_formulaire88e9":{"id":"Consult_chateau_formulaire88e9","dept":"33","canton":"Lesparre médoc","commune":"Saint-Estéphe","nom":"St_Estéphe","type":"Château","periode":"XV-XVIII-XIX","histoire":"Dans cet article  de Saint-Estéphe le château de Crock,  Montrose, Orme de Pez, Phélan-Ségur, la Haye, Haut Marbuzet et Pomis.                                  CROCk, édifié à Saint-Estèphe par la famille Merman au début du XIXe siècle, entre 1815 et 1830. Originellement, appelé « Cru de Croc . Il prendra le nom de « Château Le Crock » en 1880, et le domaine ne cessera de sagrandir. En 1903, la famille Cuvelier, négociant acquit cette propriété. La famille Cuvelier, avec à sa tête Didier Cuvelier depuis 1979, semploiera à faire prospérer ce domaine.      MONTROSE à Saint Estèphe, Le domaine a été acheté en mai 2006 par les frères Bouygues, le terroir de château Montrose est situé à l'extrémité nord du Haut-Médoc, à la limite nord de celles de Pauillac.   ORME de PEZ, bâti au hameau de Pez,  reconverti en chambres d'hôtes. Il fait partie des crus exceptionnels.  En 1452, un certain Jean de Briscos en est le propriétaire mais c'est avec la famille de Pontac, qui possède aussi le château Haut-Brion, En 1995,  Louis Roederer en fait l'acquisition. Il est la propriété de Jean-Michel Cazes. \r\nPHELAN-SEGUR, bâti à Estèphe, hostellerie par la famille Gardinier. \r\nLa HAYE;  depuis 1557 était un lieu de rendez-vous galant du roi Henri II et de Diane de Poitiers.              HAUT-MARBUZET à Saint-Estèphe, bien que ses origines remontent au XVIIIe siècle, il connaît véritablement la notoriété à partir de 1952 quand Hervé Duboscq acquit en rente viagère un lot de vignes en friche de sept hectares, issu du morcellement du domaine Mac Carthy.","architecture":"POMYS, cest en 1791 que Louis Gaspard dEstournel, bâtisseur audacieux, hérite des domaines de Cos et de Pomys, comprenant 14 hectares de vignes. Convaincu que cette colline recèle un terroir exceptionnel, il multiplie les prises de risques pour faire progresser la propriété.  En 1987, François Arnaud, ancien maire de Saint-Estèphe acheta le château pour y aménager depuis mai 2010 un hôtel restaurant, d'Alban Morardet. CROCk, de plan rectangulaire à deux niveaux  pavillon d'entrée saillant avec arcades dans un pigon  de trois travées avec galbes et acottères   et  balcon au premier étages supporté par des piliers ioniques. Balustres.                                                               Ormes de Pez à Saint-Estèphe, le corps principal du château est de nos jours reconverti en chambres d'hôtes.  \r\nPHELAN-SEGUR du XIXe siècle hotellerie de prestige, corps de logis central rectangulaire, toits en croupes enntouré de balustres et en façades trois niveaux lucarnes, l'édifice est accolé sur les flancs d'un prolongement d'un niveau raccordant un pavillon de trois travées à deux niveaux.\r\nLa HAYE, corps de logis de plan rctangulaire à deux niveaux avec lucarnes, l'édifice accolé d'une tour en angle intérieur carrée à trois niveaux retour en équerre d'un niveau.","habitants":"Crock   famille Merman                                                   Montrose les frères Bouygues                                    Orme famille de Pontac                                        Phélan famille Gardinier.\r\n        \"","divers":"Carlon g-1, lalouys g-2, Marbuzet g-3, Le Boscq g-9 Le Loup g-8 Tour  de Pez g-7, Mont-Rose g-4, ormes et Phelan-Ségur g-5   Pomys g-6  : 45° 15' 55\" Nord, 0° 46' 15\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_1.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_2.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_3.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_4.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_5.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_6.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_7.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_8.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_9.jpg"]},"Consult_chateau_formulairee314":{"id":"Consult_chateau_formulairee314","dept":"33","canton":"Lesparre médoc","commune":"Saint-Estéphe","nom":"St_Estéphe_II","type":"Château","periode":"XVI-XIX","histoire":"Dans cet article de Saint-Estèphe le château de Beau-Site, Cos-Labaury et Tronquoy-Lalande.                 BEAU-SITE, aujourd'hui, Jean-Louis Braquessac (ingénieur agronome) et son fils Pierre  poursuit l'oeuvre.\r\nCOS-LABAURY  tire son nom de sa situation géographique sur la colline de Cos et du nom de François Labory, propriétaire jusquen 1845. Monsieur dEstournel en fera ensuite lacquisition avant de le revendre à un banquier anglais, Charles Martyns en 1852. Cest finalement George Weber qui rachète la propriété dans les années trente, avant de la léguer à sa fille et son gendre, François Audoy en 1959.  En 1971, le couple acquit également le cru voisin, château Andron Blanquet. Leurs fils travailleront quelques années à leurs côtés sur les deux domaines avant que Bernard, laîné, prenne les rênes des propriétés. Homme de terrain à la force tranquille et rassurante, il vit à Saint-Estèphe depuis toujours et incarne parfaitement son cru et lappellation quil préside depuis 2000.","architecture":"TRONQUOY-LALANDE du XVIIIe siècle compte un vignoble de 30 hectares.Plusieurs familles de propriétaires se succèdent jusquen 2006, date du rachat de la propriété par Martin et Olivier Bouygues.","habitants":"Famille de George Weber                                              Famille Capbern Gasqueton \r\n        \"","divers":"Cos d'Estournel g-1 ,Crock g-2, Beau-site g-3, la Haye g-4, la cxommanderie g-5, Lafitte cargasset g-6, Lafon-Rochet g-7, Lalande g-8, Lasalle g-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_1.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_2.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_3.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_4.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_5.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_6.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_7.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_8.jpg","../../jctruffet.com/image/image_33/33_St_Est%c3%a9phe_II_9.jpg"]},"Consult_chateau_formulaire3190":{"id":"Consult_chateau_formulaire3190","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Etienne de Lisse","nom":"St_Etienne_Lisse","type":"Château","periode":"XVI-","histoire":"plusieurs châteaux à St-Etienne de Lisse,  celui de Faugères, de Fombrauge, de Mangot de Pressac et de Laroque (voir article)                                                FAUGERES, propriété de lhomme daffaires suisse Silvio Denz (cristallerie Lalique) depuis 2005, le château Faugères associe la demeure du XVIIIe siècle.                                                                 FROMBRAUGE, six familles se sont succédées aux destinées du château, il est inscrit aux M.H. depuis 2006. Les origines du château Fombrauge remontent au XVIe siècle. Sa belle chartreuse était à l'origine un cloître de Chartreux. Propriété de Jacques de Canolle en 1466,  ensuite à la famille Dumas de Fombrauge qui le vendit  à Bernard Magrez. \r\nPRESSAC, lorsque le château fut acquis par Jean-François et Dominique Quenin en 1997, de gros travaux de restauration et daménagement furent entrepris.                                                               MANGOT, tout commence par 5 siècles dhistoire. Dès 1556, le domaine de Mangot est cité comme une entité de renom. Avec des premières récoltes en rang en 1561, et sublimé par larchitecte Mollo. En 2008, Karl et Yann, fils dAnne-Marie et Jean-Guy, rejoignent et apportent une nouvelle dynamique à Mangot. Fort détudes et dexpériences, en perpétuelle recherche et remise en question, ils repoussent les limites techniques, innovent et créent de nouveaux crus.","architecture":"FAUGERES Larchitecte a su concilier les exigences esthétiques et technologiques pour donner une forme architecturale originale à un outil de production performant. Le principe gravitaire du cuvier dit médocain a été adapté à cette construction du XXIe siècle, mettant à profit la déclivité naturelle du terrain. Les chais tendent à éclipser la demeure historique, à simposer et à sintégrer dans le paysage environnant.                                                       FROMBRAUGE, occupe une chartreuse du XVIIe siècle entourée d'un jardin à la française avec une terrasse meublée donnant sur le domaine, cette maison d'hôtes offrent une vue sur le jardin .       Pressac et Mangot","habitants":"Fontbrauge  Jacques de Canolle                                 Pressac Dominique Quenin \r\n        \r\n        \"","divers":"à St-Etienne de Lisse,  celui de Faugères, de Fombrauge grav -2-3-4, Hautveyrac g-1 de Mangot g-5, de Pressac g -6-7-8","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_1.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_2.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_3.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_4.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_5.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_6.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_7.jpg","../../jctruffet.com/image/image_33/33_St_Etienne_Lisse_8.jpg"]},"Consult_chateau_formulaired03f":{"id":"Consult_chateau_formulaired03f","dept":"33","canton":"Saint-Ferme","commune":"Saint-Ferme","nom":"St_Ferme","type":"Abbaye","periode":"XIV","histoire":"ST-FERME, l'abbaye de Saint-Ferme date du VIe siècle. Il s'agit d'un monastère fondé par des moines noirs qui y vécurent du VIe au VIIIe siècles, et en furent chassés et remplacés par des bénédictins venus de Saint-Florent-de-Saumur par lun des quatre chemins de Compostelle, la voie de Vézelay dite route de Pologne, et qui fondèrent en 1080 l'abbaye, célèbre pour ses chapiteaux romans. Rattachée à celle de Saint-Florent de Saumur, elle constituait un haut lieu de pèlerinage des adorateurs des reliques de Marie-Madeleine, de saint Fiacre et de saint Ferme. Fortifiée pour la guerre de Cent Ans au XIVe siècle, puis pour les guerres de religion aux XVIe siècle et XVIIe siècle, les bâtiments claustraux sont intacts. L'abbaye a été inscrite M.H. en 1990.","architecture":"St-Ferme, le chevet de léglise abbatiale romane, construite accotée au nord de l'abbaye au début du XIIe siècle, son chevet, objet du classement, fut remanié du XVe au XVIIe siècles. Lensemble du monastère est romano-gothique. À lintérieur des bâtiments claustraux, on peut découvrir des outils de métiers traditionnels du monastère associant la vie des moines à leurs serfs, des paysans et des artisans ainsi que le trésor monétaire de saint Ferme, découvert en 1985. Dans lancien oustal, sont aménagées des salles voûtées du XVe siècle.","habitants":"Les bénédictins\r\n        \"","divers":"St-Ferme l'abbaye, Mairie  et château du Parc","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Ferme_1.jpg","../../jctruffet.com/image/image_33/33_St_Ferme_2.jpg","../../jctruffet.com/image/image_33/33_St_Ferme_3.jpg","../../jctruffet.com/image/image_33/33_St_Ferme_4.jpg","../../jctruffet.com/image/image_33/33_St_Ferme_5.jpg","../../jctruffet.com/image/image_33/33_St_Ferme_6.jpg"]},"Consult_chateau_formulairec17a":{"id":"Consult_chateau_formulairec17a","dept":"33","canton":"Blaye","commune":"Saint-Geniès de Blaye","nom":"St_Geniès_Blaye","type":"Château","periode":"XVIII","histoire":"A St-Geniès de Blaye le château de Pérenne-Guerry et  Ségonzac.                                                        SEGONZAC, Les bâtiments et le vignoble ont été créés en 1887 par M. Jean Dupuy, alors ministre de l'agriculture sous la IIIe République, et également fondateur du journal \"Le Petit Parisien\". Ce chai fut le plus moderne du bordelais en termes déquipements et de fonctionnalité lors de sa première mise en service. Quelques années plus tard durant la 2ème guerre mondiale, cest sur la rive bordant la propriété que débarqua un commando anglais, dont la mission, consistant à saboter des installations ennemies à Bordeaux, fut un succès. Une plaque commémorative apposée sur le mur denceinte en témoigne. En 1990, la propriété fut rachetée par monsieur Jacques Marmet, de nationalité suisse. Elle est aujourd'hui gérée par la société Vitigestion, qui l'à transmis à Segonzac Guillaume de La quintinie. Segonzac se dote alors de nouvelles installations, plus modernes : dimportants investissements techniques sont réalisés au chai.                                                                      PERENNE, GUERRY, font parti du groupe Bernard Magrez.  Des travaux d'amélioration aux dépendances et équipements viticoles ont été réalisés après le rachat de la propriété par la société Bernard Magrez en 1997.","architecture":"PERENNE est un château implanté dans un domaine,  sur le rebord d'un coteau dominant le village de Saint-Genès et la plaine de la Gironde. La bâtisse se compose d'un corps de logis rectangulaire sur caves voûtées en sous-sol. L'élévation antérieure est précédée d'un porche voûté d'ogives qui supporte une terrasse. La façade principale ordonnancée, avec avant-corps central, est flanquée par deux tourelles circulaires aux angles, alors que la façade arrière est encadrée de tourelles polygonales. Les toitures d'ardoises individualisent chacune des parties du corps de logis. Un logement secondaire de régisseur est raccordé à la demeure au nord-est.\r\nSEGONZAC, de plan en U sur soubassement à trois niveaux et lucarnes en combles sur toit brisé.","habitants":"Ségonzac M. Jean Dupuy.                                             Perenne Bernard Magrez.\r\n        \"","divers":"Château  Ségonzac g-1  et de Perenne g-2 à-3 à St-Geniès de Blaye et de la Salle g 7-8","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_1.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_2.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_3.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_4.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_5.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_6.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_7.jpg","../../jctruffet.com/image/image_33/33_St_Geni%c3%a8s_Blaye_8.jpg"]},"Consult_chateau_formulaire5d0d-2":{"id":"Consult_chateau_formulaire5d0d-2","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Genes de Castillon","nom":"ST_Genès_Castillon","type":"Château","periode":"XIV-XVI","histoire":"A St-Genès de Castillon  le château l'Estang, de Flojague, Gravoux, Jarousse .                                      A SAINT GENES-DE-CASTILLON, le château lESTANG  bâti à Saint Genes-de-Castillon. Il y a 3 châteaux et un manoir dans le village.\r\nFLOJAGUE, bâti à Saint-Genes-de-Castillon. La construction du château de Flojague date du XVIe siècle, il a été acquis dans les années 1960. En 1989, un groupe immobilier parisien a acheté la propriété et a construit le chai et fait tous les aménagements qui en font un endroit remarquable. Après peu de temps, un industriel l'a rachetée et exploitée quelques années, puis l'a cédée en 2013 à un groupement de propriétaires chinois. Il est inscrit aux M.H. depuis le 6 mars 1964.\r\nGRAVOUX,  bâti à Saint-Genès-de-Castillon. La construction du manoir du Gravoux date du XIVe et XVIe siècle, est inscrit aux M.H. depuis 1964. \r\nJAROUSSE  bâti à Saint-Gênes-de-Castillon, Le château des Jarousse est la propriété d'une personne privée. Il date en majorité des XVIe et XVIIe siècles et, est inscrit aux M.H. depuis 1978.","architecture":"FLOJAQUE, corps de logis rectangulaire à deux niveaux et attiques toit à deux pans, l'édifice se trouve entre trois tours deux carrées et une héxagonale  avec toit à six pans en poivrière, l'ensemble est enfermé dans une enceinte avec porte  est départ de tour rondes sur les angles des remparts.                               GRAVOUX, château de style féodal à trois niveaux avec tours et échauguettes en encorbellement,  chemin de ronde sur l'ensemble du bâtiment  sur mâchicoulis.","habitants":"Exploitants locaux\r\n        \"","divers":"Gravoux 44° 53' 31,8\" Nord et 0° 3' 15,99\" Ouest                     Estang g-6 GPS : 44° 53' 55\" Nord et 0° 03' 52\" Ouest                         Flojague g-1 à 5, GPS : 44° 53' 55\" Nord 0° 03' 52\" Ouest         Gravoux g-7","gps":"44° 53' 55\" Nord et 0° 03' 52\" Ouest","images":["../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_1.jpg","../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_2.jpg","../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_3.jpg","../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_4.jpg","../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_5.jpg","../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_6.jpg","../../jctruffet.com/image/image_33/33_St_Gen%c3%a8s_Castillon_7.jpg"]},"Consult_chateau_formulaire4162":{"id":"Consult_chateau_formulaire4162","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Julien de Beychevelle","nom":"St_Julien_Beychevelle","type":"Château","periode":"XVII-XIX","histoire":"A ST-Julien de Beychevelle le château  de Branaire-Ducru-Beaucaillou de Léoville  et de Lagrange              BRANAIRE-DUCRU-BEAUCAILLOU, lhistoire du château Branaire-Ducru commence en 1680 lorsque Jean-Baptiste Braneyre, notaire royal à Bordeaux, rachète une partie du domaine de Beychevelle. Lactuel château sera construit par les descendants de ce dernier, la famille Duluc. Branaire entrera dans la légende  suite à linvitation impériale de Napoléon et prendra le nom de Branaire-Ducru suite à la reprise du domaine par le neveu de Louis Duluc, Gustave Ducru, en 1857.  Une nouvelle page de lhistoire sécrira en 1988, lorsque Patrick Maroteaux reprendra les rênes du domaine.                                                               LEOVILLE, jusquà la Révolution, la propriété de Léoville est la plus étendue du Médoc. Confisquée comme bien démigré, elle est alors éclatée en plusieurs domaines. Le domaine est divisé en trois parties, dont une accueille le château Léoville-Barton.\r\nAu XIXe siècle, lirlandais Hugh Barton achète le quart de lancien domaine, ce qui représente trente-cinq hectares. Ainsi naît le château Léoville-Barton en 1826. Un an plus tard, le descendant de Hugh Barton, Ronald Barton, hérite de Léoville et du domaine de Langoa, acquis en 1821. Aujourdhui, les châteaux Léoville-Barton et Langoa appartiennent toujours à la famille Barton qui préserve depuis plus de deux siècles ce patrimoine.                                                         LAGRANGE Pas d'information","architecture":"Châteaux à St-Julien de Beychevelles; Branaire Ducru, patrimoine classé, étudié ou inscrit dit  demeure château Branaire Ducru. de plan rectangulaire à deux niveaux avec soubassement avant corps central avec fronton triangulaire avec occulus, terrasse au premier sur colonne toscanne.\r\nLangoa patrimoine classé, étudié ou inscrit dit  demeure château Langoa.                                              Glana patrimoine classé, étudié ou inscrit dit  demeure château du Glana.\r\nTeynac patrimoine classé, étudié ou inscrit dit   demeure château Teynac.\r\n Lagrange patrimoine classé, étudié ou inscrit dit demeure château Lagrange de plan rectangulaire à deux niveaux, avant corps d'entrée avec fronton triangulaire avec occulus, tour carrée avec lanternon accolé entre l'édifice et les dépendances.\r\nGruaud Larose patrimoine classé, étudié ou inscrit dit  demeure château Gruaud Larose. \r\nGloria patrimoine classé, étudié ou inscrit dit  demeure château Gloria.                                                            LEOVILLE corps de logis à deux niveaux rectangulaire toit en croupe et retour  en équerre sur la façade gauche avec un logis avec terrasse.","habitants":"Famille de Patrick Maroteaux                                  Famille Ronald Barton\r\n        \"","divers":"Château de Gruaud-Larose de Lagrange, de Léoville et de  Branaire à St-Julien de Beychevelle","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Julien_Beychevelle_1.jpg","../../jctruffet.com/image/image_33/33_St_Julien_Beychevelle_2.jpg","../../jctruffet.com/image/image_33/33_St_Julien_Beychevelle_3.jpg","../../jctruffet.com/image/image_33/33_St_Julien_Beychevelle_4.jpg"]},"Consult_chateau_formulaire76d4":{"id":"Consult_chateau_formulaire76d4","dept":"33","canton":"Lacanau","commune":"Saint-Laurent Médoc","nom":"St_Laurent_Médoc","type":"Château","periode":"XIX","histoire":"A  St-Laurent en Médoc le château de Balac, de Labat de Laroze-Perganson et la Tour-Carnet (voir article colonne architecture), Sémignan( voir article ).      BALAC, a été reconstruit en 1776,  Propriété de la famille Touchais.                                                          LABAT, acquis par la famille Nony, propriétaire du château. Caronne Ste Gemme, dans les années 1920                                                                       LAROZE-PERGANSON, le nom de Larose apparaît dans les années 1830, après quHenry Delaroze, cohéritier du futur Gruaud-Larose à Saint-Julien, devienne propriétaire de Perganson en 1815. En 1886, le château Larose-Perganson, dont les propriétaires étaient la famille Lahens, son propriétaire le comte Lahens était le maire de St Laurent du Médoc (et ce jusquen 1902). En 1919, le château est vendu et acheté par le colonel  comte russe blanc Stanislas Alexandre Tchernov, de la garde personnelle du Tsar Alexandre III. Le comte Tchernov a quitté et abandonné vers 1928/1929.  Vers 1936, le duc espagnol de lInfantado, proche du roi dEspagne et de la famille de Bourbon, a racheté plusieurs châteaux dans le sud ouest dont les châteaux Larose Perganson et Trintaudon. Le château Larose Perganson sera occupé durant la seconde guerre mondiale, puis pillé et rasé. En 1966, Mr Elisée Forner a racheté les 2 propriétés châteaux Larose Perganson et Trintaudon du XIXe siècle. Le renouveau viendra entre 1966 et 1971 lorsque placé sous lautorité du professeur Émile Peynaud,  En 1986, Allianz entre en possession du domaine,","architecture":"BALAC, ce château de style chartreuse a été reconstruit en 1776, mentionnée dès le XIVe siècle. Il s'agit d'une chartreuse surélevée desservie en façade par un escalier central en fer à cheval avec garde-corps en acier et un escalier droit à l'arrière. Les pièces en enfilade sont desservies par un couloir central.                                                                            LABAT, gentilhommière  à un niveau sur soubassement   avec avant corps entrée centrale et fronton triangulaire  toit en croupe et retour en équerre  grande terrasse avec escalier droit.                               TOUR-CARNET,  construit au XIIe siècle. Il doit son nom à lécuyer Carnet qui le reçoit en héritage du seigneur Jean de Foix en récompense de sa bravoure, dans les mains de la famille de Leutken  Puis touché comme tous par  les guerres et les crises économiques, il  connaît une longue période de déclin qui sachève en 1972 lorsque le domaine est acquis par Louis Lipschitz, armateur girondin. Celui-ci restaure les bâtiments puis transmet la propriété à sa fille Marie-Claire Pélegrin en 1978.  Celle-ci le conserve jusquen 1999, date à laquelle Bernard Magrez, propriétaire de Pape Clément, en fait lacquisition. Classée parmi les plus anciennes propriétés du Médoc, la belle tour médiévale abrite  les trésors des troubadours, l'âme de Michel de Montaigne et de La Boétie. Un château de caractère qui se contemple avec orgueil depuis 900 ans depuis l'autre côté des douves miroitantes que l'on ne franchira que par un élégant pont-levis.  le château La Tour Carnet fait battre le cur des  écrivains.","habitants":"Famille Lahens                                                               Famille de Bourbon                                               Famille Nony\r\n        \"","divers":"Château de Balac g-1, Barateau g-2, Labat g-3,  Belgrave g-4, Laroze g-5, Trintaudon g-6, tour Carnet g-7-8 à Saint-Laurent Médoc","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_6.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_7.jpg","../../jctruffet.com/image/image_33/33_St_Laurent_M%c3%a9doc_8.jpg"]},"Consult_chateau_formulaire0113-2":{"id":"Consult_chateau_formulaire0113-2","dept":"33","canton":"Cadillac","commune":"Saint-Léon","nom":"St_Léon_Cadillac","type":"Maison forte","periode":"XIV","histoire":"A Saint-Léon le château de Castelnau,  de Goëlane et Couteau,  hôtel.                                                         CASTELNAU, dit de chateauneuf date des XIVe et XVIIe siècles. De Diane et Loïc de Roquefeuil depuis 9 générations. Castelneau est un des vestiges du prestigieux passé historique de l'Entre-deux-Mers. Depuis 8 générations maintenant dans la même famille. Loïc et Diane de Roquefeuil et leurs quatre enfants vous accueillent dans cette propriété de leur famille depuis huit générations. Madame a fait transformer une « coûcoûte », ferme typique de lEntre-deux-Mers, en un élégant gîte avec piscine et prévoit daménager une aile du château en chambres dhôtes. Gites de France toujours dans la famille du vicomte de Roquefeu
