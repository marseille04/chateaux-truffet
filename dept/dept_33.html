./../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_4.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_5.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_6.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_7.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_8.jpg"]},"Consult_chateau_formulaire6d58":{"id":"Consult_chateau_formulaire6d58","dept":"33","canton":"Cadillac","commune":"Cadillac","nom":"Cadillac","type":"Château","periode":"XVII","histoire":"CADILLAC, construit dans la ville du même nom sur la demande de Jean-Louis de Nogaret de la Valette de 1554 à 1642, fait premier duc d'Épernon devenu l'un des mignons du roi Henri III, amassant honneurs et richesses avant de mourir en disgrâce sous le règne de Louis XIII. Le cabinet de travail du duc est familièrement appelé « la moutarde » par les domestiques, tant sont craintes ses sautes d'humeur. Pour le bâtir, une partie de la ville fortifiée est rasée. Il fut un témoin de la fin de la Renaissance et annonça le classicisme du XVIIe siècle. En 1661 marque pour Cadillac  l'arrivée des temps obscurs Bernard le second duc d'Epernon  meurt sans héritier  la demeure passe aux Foix-Candale qui la revendent en 1713 et fut cédé  au comte de Montcassin qui incapable de faire face aux dépenses d'entretien le laisse à l'abandon. En 1758 le comte de Preissac nouveau propriétaire fait abattre les ailes par économies, saisi pendant la Révolution Française, restitués à ses propriétaires en 1807 délabré revendu à l'état, dévasté par un incendie  en 1928 l'association des ducs d'Epernon le restaure encore aujourd'hui.","architecture":"CADILLAC, de style Henri IV et Louis XIII avec  deux ailes entourant une cour sur trois côtés. Une des ailes est démontée au XVIIIe siècle et ses pierres vendues,  surplombe les anciennes murailles de la ville de Cadillac. Le corps de logis principal à deux niveaux  comporte à son centre un avant corps saillant à quatre étages abritant un grand escalier à vis. De part et d'autre du bâtiment deux imposants pavillons  sont à leur tour flanqués d'un pavillon de taille plus modeste  ce schéma à double pavillons est repris pour les deux ailes en retour d'équerre sur la cour, cette dernière est fermée par un mur réhaussé d'un portail monumental.   Le château servit de prison pour les femmes, au XIXe siècle. Puis il devient un musée historique et iconographique. Le château de Cadillac sera par la suite réhabilité pour devenir un monument ouvert au public et aux visites. On y admire notamment des plafonds à la française et des volets intérieurs peints. Sur l'arrière, une promenade sert de jardin. Sa surface est limitée par les fortifications de la ville. Le château de Cadillac, ses douves et sont jardin sont classés M.H.en 1875. A Cadillac ancienne ville fortifié,  des remparts reste d'une porte crénelée avec mâchicoulis.","habitants":"Jean-Louis de Nogaret de la Valette                    Famille de Peyrines\r\n        \"","divers":"Château de Cadillac et porte de citée. GPS : 44° 38' 18,18\" Nord et 0° 19' 17,27\" Ouest                  Cadillac GPS : 44° 38' 17\" Nord et 0° 19' 13\" Ouest","gps":"44° 38' 18,18\" Nord et 0° 19' 17,27\" Ouest","images":["../../jctruffet.com/image/image_33/33_Cadillac_1.jpg","../../jctruffet.com/image/image_33/33_Cadillac_2.jpg","../../jctruffet.com/image/image_33/33_Cadillac_3.jpg","../../jctruffet.com/image/image_33/33_Cadillac_4.jpg","../../jctruffet.com/image/image_33/33_Cadillac_5.jpg","../../jctruffet.com/image/image_33/33_Cadillac_6.jpg"]},"Consult_chateau_formulaire6478":{"id":"Consult_chateau_formulaire6478","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Estèphe","nom":"Calon_Ségur","type":"Château","periode":"XVIII","histoire":"CALON-SEGUR bâti en XVIIIe siècle. Après la conquête de la Guyenne,  fût successivement propriété de la famille d'Albret, de messire Jean de Lur, de Pierre de Marsan, enfin de Gasq. Au XVIIIe siècle, le marquis Nicolas-Alexandre de Ségur, président du parlement de Bordeaux qui possédait aussi le château Lafite et le château Latour, fit l'acquisition, par son mariage avec la veuve de M. de Gasq, du château et de son domaine. Le marquis de Ségur ajouta son nom à celui de Calon. Au XIXe siècle se succèdent différents propriétaires. En 1894, le domaine est racheté par Georges Capbern Gasqueton et son oncle Charles Hanappier. Calon-Ségur restera dans la famille Capbern Gasqueton, tout au long du XXe siècle, dirigé notamment par Philippe Capbern Gasqueton ( propriétaire également du château du Tertre, du Couhins et  d'Agassac) puis par son épouse Denise Capbern Gasqueton, à partir de 1995, jusqu'à son décès en septembre 2011. Hélène de Baritault succèdera alors à sa mère, et prendra la direction de l'exploitation. En juin 2012, la propriété familiale est cédée  à Suravenir-Assurances.","architecture":"Calon-Ségur, il se compose d'un corps de logis principal à toiture de tuiles creuses, encadré de deux pavillons aux toits brisés en ardoise. Une aile basse en retour d'équerre au sud-ouest abritait, semble-t-il, l'orangerie.  La façade sud compte 5 travées d'ouvertures en arc segmentaire, délimitées par des jambes à bossage ; l'étage est séparé du rez-de-chaussée par un bandeau mouluré. Certaines fenêtres présentent des allèges traitées en ressaut. La travée centrale est surmontée d'un fronton triangulaire avec volutes en amortissement. Les pavillons présentent le même type d'ouverture, les toitures sont dotées de lucarnes à fronton en plein-cintre. La pavillon abritait une chapelle, comme l'indique la croix sculptée au-dessus de la porte. La façade nord, côté jardin, présente 8 travées d'ouvertures qui ne sont pas disposées régulièrement. Des contreforts épaulent les maçonneries ; les baies présentent des encadrements en pierre de taille traités en ressaut. Cette façade donne sur une terrasse avec un escalier permettant d'accéder aux jardins. L'intérieur s'organise autour d'un vestibule central qui dessert deux salons de part et d'autre. L'escalier est rejeté à l'arrière sous la forme de deux volées divergentes en bois. L'aile sud-ouest est percée à l'est et à l'ouest de portes cintrées ; cette aile est complétée au sud par un pavillon couvert d'une toiture en tuiles creuses, avec comble à surcroît abritant un pigeonnier (oculus et trous d'envol).","habitants":"Marquis Nicolas-Alexandre de Ségur\r\n        \"","divers":"estournelle GPS : 45° 15' 55\" Nord et 0° 46' 15\" Ouest             Laborry Coordonnées par GPS : 45° 15' 55\" Nord 0° 46' 15\" Ouest","gps":"45° 15' 55\" Nord et 0° 46' 15\" Ouest             Laborry Coo","images":["../../jctruffet.com/image/image_33/33_Calon_S%c3%a9gur_1.jpg","../../jctruffet.com/image/image_33/33_Calon_S%c3%a9gur_2.jpg"]},"Consult_chateau_formulaire820b":{"id":"Consult_chateau_formulaire820b","dept":"33","canton":"Lacanau","commune":"Cantenac","nom":"Cantenac","type":"Château","periode":"XVI","histoire":"A Cantenac château, de Brane, Lagrange,Giscours, Cantenac Brown, Desmirail, Palmer(voir aricle) La Lagune,  marquis d'Alesme Becker, Lagrange,  Langoa Barton, Malescot St. Exupéry,  Boyd-Cantenac,  et Ferrière, pas d'informations pour certains.                    POUGET ex Boyd   a appartenu en 1650 à Etienne Monteil, chanoine de St Emilion,   dont la petite- fille fit de François Antoine Pouget son légataire universel en 1748. Sa fille Claire épousa en 1771 Pierre-Antoine de Chavailles, seigneur du Parc (paroisse de Mérignac), avocat, secrétaire général de la ville Bordeaux. Durant plus d'un siècle et demi, la famille Pouget de Chavailles assura la bonne marche du domaine : persécutée sous la Révolution, elle vit sa propriété mise sous séquestre et ne put la retrouver qu'en 1798,  du temps où la famille de Chavailles présidait aux destinées de château Pouget, Boyd, son propriétaire, Lucien Guillemet, nologue de formation.           BROWN, au début du XIXe siècle, lorsque John-Lewis Brown (1769-1851) acquiert le domaine, il choisit de faire construire sur la commune de Cantenac. Louis Armand Lalande (1820-1894). La direction du château Cantenac-Brown est alors confiée à José Sanfins qui poursuivra la mise en valeur  il appartient aujourd'hui à la famille Halabi.                                                DESMIRAIL,  Jean Desmirail, avocat au parlement de Bordeaux, donne son nom à la propriété que lui apporte en dot son épouse demoiselle Rausan du Ribail.  Le château appartient à la famille Desmirail jusquen1855, lorsque monsieur Sipière, s'en porte acquéreur. Au début du XXe siècle la propriété est, brièvement, entre les mains de Robert de Mendelssohn, neveu du célèbre compositeur avant dêtre reprise par Martial Michel. Celui-ci la revend à la société du château Palmer possède le domaine, durant quelques années, avant de le céder en 1980 à Lucien Lurton. En 1992, Lucien Lurton, transmet ses propriétés à ses dix enfants. Denis, lun des aînés, avocat de formation, lui succède.","architecture":"BROWN de style Tudor qui lui rappellera ses origines écossaises, agrandit et enrichit la bâtisse en conservant larchitecture Renaissance Anglaise, appareillage de pierre et de panneaux de briques apparentes, ses hauts pignons à échancrures. De plan rectangulaire à deux niveaux et lucarnes sur combles flanqué en façade de trois pavillons saillants de trois niveaux à fronton triangulaire.                           POUGET-BLOYD bâtisse rectangulaire à deux niveaux toit à deux pans dont d'un côté recouvre les dépendances.                                                                 BOYD, son propriétaire, Lucien Guillemet, nologue de formation.  Desmirail, quadrilataire, corps de logis d'un niveau avec fronton triangulaire en façade, toit presque plat recouvert de tuiles.","habitants":"Famille de Lucien Guillemet                                    John-Lewis Brown                                               Famille Alexis Lichine                                                   Famille Desmirail\r\n        \"","divers":"A cantenac, château de Pouget, de Brown -1-2-3   Boyd-6   Brane-4                    ECK GPS : 44° 44' 40\" Nord et 0° 32° 20,5\" Ouest","gps":"44° 44' 40\" Nord et 0° 32° 20,5\" Ouest","images":["../../jctruffet.com/image/image_33/33_Cantenac_1.jpg","../../jctruffet.com/image/image_33/33_Cantenac_2.jpg","../../jctruffet.com/image/image_33/33_Cantenac_3.jpg","../../jctruffet.com/image/image_33/33_Cantenac_4.jpg","../../jctruffet.com/image/image_33/33_Cantenac_5.jpg","../../jctruffet.com/image/image_33/33_Cantenac_6.jpg"]},"Consult_chateau_formulaire798e":{"id":"Consult_chateau_formulaire798e","dept":"33","canton":"Lacanau","commune":"Cantenac","nom":"Cantenac_II","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Cantenac II, Issan et Kirvan\r\nISSAN Au XIXe siècle se tenait à lemplacement du château actuel un château fortifié. Au XVIIe siècle, lorsque la famille du riche parlementaire bordelais dIssenault qui épousa Marguerite de Lalanne fille unique du sire d'Issan acquit lancienne seigneurie, elle fit rasé entièrement le château médiéval, et fit construire le château actuel.  Il a appartenu aux foix de Candale qui l'abandonnèrent à la Révolution. En 1824 à la famille Duluc et le revende à la famille Blanchy en 1851. La famille Roy acquiert le domaine en 1865.  Château d'Issan d'être inscrit au célèbre classement des grands crus de 1855.Propriété de la famille Cruse  depuis son achat en 1945 par Emmanuel Cruse, le millionnaire Jacky Lorenzetti en devient copropriétaire en 2013.                                                               KIRVAN, date du XVIIe siècle par la famille de la Salle. En 1751, Renand de la Salle vend le domaine à Sir John Collingwood. Une de ses filles épouse quelques années plus tard un Irlandais installé dans la région, Mark Kirwan, qui devient propriétaire du domaine en 1770 et le développe dans la deuxième moitié du XVIIIe siècle. Mark Kirwan réunit les domaines de Lassalle et de Ganet pour former le périmètre, 39 ha inchangé depuis 1810, de l'actuel domaine. À sa mort en 1815, l'exploitation reste dans la famille, jusqu'en 1858 date du rachat par Camille Godard, qui a dessiné le célèbre parc de la propriété. En 1882, Godard lègue le domaine à la ville de Bordeaux qui s'en défait en 1924 quand la famille de négociants Schÿler en fait l'acquisition. Dès lors, le domaine reste dans la famille Schÿler qui après des années difficiles entre 1918 et 1945, le restructure et lui donne de l'ampleur au début des années 1950.","architecture":"ISSAN  du XVIIe siècle le porche d'entrée et les douves sont les vestiges des anciennes constructions féodales ainsi que les deux ailes , une tourelle et une jolie porte surmontée d'un tabernacle, ses gros pavillons coiffés  de hauts toits d'ardoise sont juxtaposés sans aucun soucis de symétrie. Des petites échauguettes en encorbellement occupent les angles rentrants de la façade.             \r\nKIRVAN corps de logis de plan rectangulaire à deux niveaux toit en croupes  avec lucarnes centrales sur porte d'entrée, l'édifice est accolée à droite comme à gauche de pavillon d'un étage avec terrasses à balustre.","habitants":"Famille de Lalanne                                                        Famille Cruse                                                                 Famille de Kirvan\r\n        \"","divers":"à Cantenac II, Issan-1 à 4 et Kirvan-5 à 7","gps":"","images":["../../jctruffet.com/image/image_33/33_Cantenac_II_1.jpg","../../jctruffet.com/image/image_33/33_Cantenac_II_2.jpg","../../jctruffet.com/image/image_33/33_Cantenac_II_3.jpg","../../jctruffet.com/image/image_33/33_Cantenac_II_4.jpg","../../jctruffet.com/image/image_33/33_Cantenac_II_5.jpg","../../jctruffet.com/image/image_33/33_Cantenac_II_6.jpg","../../jctruffet.com/image/image_33/33_Cantenac_II_7.jpg"]},"Consult_chateau_formulaireb742":{"id":"Consult_chateau_formulaireb742","dept":"33","canton":"Langon","commune":"Capian","nom":"Capian","type":"Château","periode":"XVII-XIX","histoire":"Cinq châteaux à Capian, le Grand-Branet, la Chèze, Couteau,  Ramondon, Suau, le Grand Mouyes.            GRAND-BRANET du XVIIe siècle logis de France par la famille de Blanche Mainvielle                                   SUAU, au XIXe, les restes dun ancien manoir permettaient de les dater de la fin du XV, début XVIIe siècle. A la fin du 1er Empire le domaine fut acheté par M. Alexis Menoire, son fils Joseph épousa une demoiselle de Filhol.                                                    LA CHEZE, en 1628 la maison appartenait à Joseph de la Chèze, greffier au bureau des finances de Guyenne. A sa mort la maison passât à Me Blaise de Fresquet, avocat au parlement de Bordeaux (attesté en 1675 par son mariage en léglise de Capian). La filiation de cette date jusquà lépoque moderne nest pas connue. En 1893 le domaine de La Chèze, orthographié Lachaise appartenait à M. Cousseau.        RAMONDON, au début du XVIIe le domaine est la propriété de Pierre-Clément de Monlun, capitaine de la marine du Roi, qui le légat à son fils, lequel le vendit au comte de Guislain. Au commencement du XVIe siècle, un de leurs descendants s'appelait Arnault de Monlung.  Pierre de Monlung mourut peu de temps avant 1636, son fils exerçant la profession de praticien près la cour ordinaire de Capian. Dès le premier tiers du XVIIIe siècle, passa au comte de Guislain. En 1793,  un nommé Caillavet se chargea de le rendre inhabitable, comme si les monuments avaient quelque chose de commun avec les constitutions d'état. M. de Filhol en acheta les ruines en 1849 pour édifier celui que l'on peut voir aujourd'hui.","architecture":"GD-MOUYES     Une villa gallo romaine au 1er siècle qui disparaîtra après linvasion wisigothique en 407, puis une le´gende médiévale qui veut que le château ait appartenu aux Templiers qui auraient enfoui un fabuleux trésor dans un souterrain avant dêtre brûlés vifs sur ordre royal En 1989, la famille Bömers, qui détenait aussi la société Reidemeister et Ulrichs a` Brème, Le 12 février 2012, monsieur Jinshan Zhang, président fondateur du groupe Ningxiahong, est devenu le nouveau propriétaire .                                 GRAND-BRANET : Demeure construite en 1877 ; pigeonnier transformé en pavillon et accolé aux écuries du XVIIIe siècle. Le château de Ramondon, appelé aussi de Monlun, a été bâti sur les ruines d'un vieux logis entouré de douves et flanqué de tours. Dans les démolitions, on trouva sur un dessus de porte, un petit écu en cuivre, le château se présente sous la forme d'un logis en pierre de taille, de plan rectangulaire cantonné par deux tours rectangulaires et deux tours cylindriques. Le ministère de la culture énonce que l'ancien château qui aurait présenté les caractéristiques d'un édifice du XIVe siècle fut détruit et remplacé dans la seconde moitié du XIXe siècle par l'actuel logis. Les parties agricoles ne paraissent pas antérieures au XVIIIe siècle. Puits du XVIIe siècle         RAMONDON, au début de laire révolutionnaire le corps de bâtiments fut entièrement détruit, il paraît être resté dans cet état jusquà quil soit acheté et reconstruit par M. de Filhol.","habitants":"Pierre-Clément de Monlun\r\n        \"","divers":"à Capian, le Grand-Branet -5-6, la Chèze-9, Ramondon-1-2-3-4, Suau-2, le Grand Mouyes_7-8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Capian_1.jpg","../../jctruffet.com/image/image_33/33_Capian_2.jpg","../../jctruffet.com/image/image_33/33_Capian_3.jpg","../../jctruffet.com/image/image_33/33_Capian_4.jpg","../../jctruffet.com/image/image_33/33_Capian_5.jpg","../../jctruffet.com/image/image_33/33_Capian_6.jpg","../../jctruffet.com/image/image_33/33_Capian_7.jpg","../../jctruffet.com/image/image_33/33_Capian_8.jpg","../../jctruffet.com/image/image_33/33_Capian_9.jpg"]},"Consult_chateau_formulaire8d48":{"id":"Consult_chateau_formulaire8d48","dept":"33","canton":"Ambarès et Grave","commune":"Carbon-Blanc","nom":"Carbon_Blanc","type":"Château","periode":"XVII","histoire":"Deux châteaux à Carbon-Blanc celui de Brignon,  et de Bonlieu                                                                BRIGNON,En 1726, Arnaud de Montferrand vend « le bien du Brignon » à Pierre Poitevin, maître serrurier à Bordeaux. lhéritier de  la famille des barons de Montferrand. Les descendants des Montferrand le conserveront jusquau début du XVIIIe siècle, elle a été complétée au XIXe siècle. AU XIXe siècle, Brignon passe à la famille Goudal. A la fin du XIXe siècle. Le Brugnon (car cest ainsi quon lappelle) devient alors  la propriété des Neyraud (famille de tonneliers originaires de Sainte-Eulalie), enrichis,   la pépinière dentreprises du château Brignon, inaugurée le 2 février 2016 qui sinscrit dans le prolongement de lEDECE, vise à dynamiser la création dentreprises et accompagner lentreprenariat. \r\nBONLIEU l'abbaye de Bonlieu a été fondée en 1141 par le moine Sicaire, « frère » du baron Gaston de Montferrand.","architecture":"BRIGNON, construction date du XVIIe siècle (pour le début) mais elle a été complétée au XIXe siècle.  Le « 1893 » inscrit au-dessus de la porte dentrée de la grande salle, nous le laisse penser. En effet, cette ancienne maison, datant du XVIIe siècle. Le logis principal et le jardin furent transformés au XVIIIe siècle et les dépendances agricoles furent reconstruites à la fin du XVIIe siècle comme semble lindiquer la date 1893 portée au-dessus de la porte. Le gros uvre est en pierre de taille et en moellon. Il y a à lintérieur un étage avec un très bel escalier. Transformés en restaurant dans la dernière décennie du XXe siècle, les bâtiments sont achetés par la mairie de Carbon-Blanc en 2008.                                                       BONLIEU , lors des guerres entre la France et lAngleterre, l'abbaye fut  pillée et les bâtiments d'origine totalement détruits par un incendie. Reconstruite, elle devient définitivement propriété privée lors de la vente des biens nationaux sous la Révolution. Ainsi au fil du temps, l'abbaye de Bonlieu a-t-elle subi des modifications mais il  reste néanmoins quelques traces des anciens bâtiments monastiques : une cour intérieure à l'emplacement de l'ancien cloître, deux piliers de l'ancienne chapelle détruite, quelques fenêtres d'origine du dortoir des moines, devenu un charmant dortoir pour les enfants.","habitants":"barons de Montferrand\r\n        \"","divers":"Château de Brignon et de Bonlieu","gps":"","images":["../../jctruffet.com/image/image_33/33_Carbon_Blanc_1.jpg","../../jctruffet.com/image/image_33/33_Carbon_Blanc_2.jpg","../../jctruffet.com/image/image_33/33_Carbon_Blanc_3.jpg"]},"Consult_chateau_formulaire3f5b":{"id":"Consult_chateau_formulaire3f5b","dept":"33","canton":"Pujols","commune":"Pessac-sur-Dordogne","nom":"Carbonneau","type":"Château","periode":"XIX","histoire":"CARBONNEAU, du  XIXe siècle, famille Bachan, le plus ancien propriétaire connu est Jacques Fouignet-Verbacle, en 1823. Une de ses descendantes, Blanche Fouignet, épousa Jean-Jacques Bachan en 1878. Ce dernier fut juge de paix en Algérie, puis magistrat en France et maire de Pessac-sur-Dordogne. La famille Bachan nayant pas dhéritiers, la propriété fut vendue après la première guerre mondiale. Les nouveaux propriétaires subirent le contrecoup de la grande crise de 1929, au XXe siècle, familles Ray et Franc de Ferrière, c'est en 1937, que Carbonneau intègre le patrimoine de la famille de Wilfrid, avec ses grands-parents, Harold et Claude Ray, qui firent lacquisition du domaine.  Claude, était la fille du général Jules Cheminon et de Eugénie de Massalitinoff.  Il rencontra Claude à Deauville, durant la première guerre mondiale. Ensemble, ils immigrèrent après la guerre, en Nouvelle-Zélande. En 1937, ils décidèrent de revenir en France. Leur fille, Olga, née à Kaiaua, en Nouvelle-Zélande, navait alors que 12 ans. Ils rachetèrent le domaine Carbonneau  propriété proche du berceau familial de Yann et Paulette Franc de Ferrière, amis dHarold et Claude Olga Ray se maria avec Jean Franc de Ferrière (fils de Yann et Paulette) en 1946, à Pessac-sur-Dordogne. En 1975, les parents dOlga leur firent donation de la propriété. Olga et Jean Franc de Ferrière. Ils eurent cinq enfants, dont Wilfrid.","architecture":"CARBONNEAU du XIXe siècle, parc de 2 ha, propriété agricole de 50ha. Terrasse, verrière, style Napoléon III. corps de logis de plan rectangulaire à deux niveaux à toits en croupes, flanqué à droite et à gauche de pavillons rectangulaires saillants à toits brisés avec lucarnes.","habitants":"Famille Bachan\r\n        \"","divers":"Château de Carbonneau","gps":"","images":["../../jctruffet.com/image/image_33/33_Carbonneau_1.jpg","../../jctruffet.com/image/image_33/33_Carbonneau_2.jpg","../../jctruffet.com/image/image_33/33_Carbonneau_3.jpg","../../jctruffet.com/image/image_33/33_Carbonneau_4.jpg"]},"Consult_chateau_formulairefa06":{"id":"Consult_chateau_formulairefa06","dept":"33","canton":"Créon","commune":"Carignan de Bordeaux","nom":"Carignan","type":"Château","periode":"XVIII","histoire":"BEAUGEAY,  Ce domaine s'appelait au XIIIe siècle \"Puch de Canteloup\", en liaison avec le château Canteloup. Le logis a été construit pour le parlementaire Thomas de Cuisinier au début du XVIe siècle.  Le château de Carignan s'appela Motta-Verta puis reprit le nom de Talence au début du XVIe siècle. Parmi ses propriétaires successifs citons les Canteloup, les Géres, Pierre de Vallier, Jean Dubernet qui à sa mort en 1652 le laisse à une de ses filles, épouse de Gaston de Secondat, baron de Montesquieu, avocat au parlement de Toulouse.  En 1689, année de la naissance de l'écrivain et philosophe Charles Louis de Secondat, baron de La Brède et de Montesquieu, le château fut vendu à la famille de la Devise. Il passa ensuite dans la famille Cursol jusqu'au début du XIXe siècle. Acheté en 1814 par le général Etienne Donna, aide de camp de Joseph Bonaparte, roi d'Espagne, il passe dans la famille de Beaumont qui le vend en 1892 à Mr Honoré Picon dont les héritiers Gonfreville le vendent à André Abadie en 1940. Philippe Pieraerts l'acheta aux héritières de ce dernier en 1981. Cette même année fut racheté le château Léon également situé à Carignan de Bordeaux. La propriété est désormais la propriété de Andy Lench depuis fin 2007.     CARIGNAN est lhéritier dune riche histoire. Il fut construit sur le site d'une villa romaine en 1452 par Jean Poton de Xaintrailles, compagnon darmes de Jeanne dArc, qui vaincra le connétable Talbot lannée suivante à Castillon, mettant fin à la guerre de cent ans et permettant le rattachement de l'Aquitaine à la France.  Ce domaine, dont le nom à lorigine était Camelon, faisait partie intégrante du château de Talence  et sen est détaché à la suite de deux ventes successives peu avant la Révolution.","architecture":"Beaugey : il fut construit au début du XVIe siècle pour Thomas de Cuisinier  sa construction a débuté au XVIe siècle et s'est achevée au XIXe siècle.  ce qui est attesté par le contrat pour la couverture daté de 1525. La tour descalier a été supprimée à la fin du XIXe siècle et remplacée par un escalier monumental intérieur.  En 1489, il sappelle déjà Beaugey, en lhonneur dun précédent propriétaire, et est alors décrit comme un Bourdieu entouré de fossés. Au XVIIIe siècle, les documents font mention à Calonge, dune tour et de bâtiments qui étaient très conséquents, qui couvraient une surface de plus de 1 000 m², ce qui en faisait une des constructions les plus importantes de Carignan. Etant inhabitée, la maison tomba lentement en ruines à la fin du XIXe siècle et de nos jours, il nen reste plus rien.                             CARIGNAN  Le domaine dorigine, appelé maintenant communément « la ferme du château Léon », est composé de plusieurs bâtiments édifiés à diverses périodes du XVIIIe siècle, organisés autour du logis du fermier:  Les propriétaires, trop à létroit dans leur demeure campagnarde, firent construire tout à côté, un château dans le style du moment.  Après plusieurs années dabandon, il vient dêtre réhabilité en résidence composée de plusieurs appartements.\r\n MAILLE  Au coeur des côteaux sur la rive droite de la Garonne, le « Château Maillé » se situe dans un quartier très résidentiel, à proximité immédiate du collège de Lestonnac. Le hameau que constitue cet ensemble se trouve sur la route et à la lisière de la commune de Fargues Saint-Hilaire.","habitants":"Famille de  Thomas de Cuisinier\r\n        \"","divers":"A Carignan le château de Beaugey, de castel-Lafond-4 de carignan -1à 3et de Maillé-5-6_7. par GPS : 44° 48' 07\" Nord et 0° 28' 48\" Ouest","gps":"44° 48' 07\" Nord et 0° 28' 48\" Ouest","images":["../../jctruffet.com/image/image_33/33_Carignan_1.jpg","../../jctruffet.com/image/image_33/33_Carignan_2.jpg","../../jctruffet.com/image/image_33/33_Carignan_3.jpg","../../jctruffet.com/image/image_33/33_Carignan_4.jpg","../../jctruffet.com/image/image_33/33_Carignan_5.jpg","../../jctruffet.com/image/image_33/33_Carignan_6.jpg","../../jctruffet.com/image/image_33/33_Carignan_7.jpg","../../jctruffet.com/image/image_33/33_Carignan_8.jpg","../../jctruffet.com/image/image_33/33_Carignan_9.jpg"]},"Consult_chateau_formulaire54b9":{"id":"Consult_chateau_formulaire54b9","dept":"33","canton":"Fronsac","commune":"Saillans","nom":"Carle","type":"Château","periode":"XIV","histoire":"CARLE, en 1451, Jean de Dunois, le bâtard d'Orléans, compagnon de Jeanne d'Arc, qui venait de s'emparer de Blaye,  Le château fut construit par la famille Carles, qui en tout cas le possédait à la fin du XVe siècle.  Jean de Carles, président du parlement de Bordeaux sous François 1er, François de Carles et un troisième, Lancelot de Carles, évêque de Riez en 1560, mort en 1568, fut aumônier et confesseur de Charles IX. Ce dernier demeure connu comme poète et familier de la Pléiade. Deux surs, demoiselles de Carles, épousèrent l'une Étienne de la Boétie et l'autre Thomas Eyquem, frère de Michel de Montaigne. Marguerite de Carles, veuve d'Etienne de La Boétie, hérita du château en 1567. À la fin du XVIIe siècle, le château est passé à la famille d'Ayde, puis au XVIIIe au comte de Saujon, originaire de Saintonge. C'est sa petite-fille, Marie-Charlotte Hippolyte de Campet de Saujon (1724-1800), qui hérita de Carles au milieu du XVIIIe siècle. Elle épousa le comte de Boufflers, et fut d'abord dame de compagnie de la duchesse d'Orléans.   Elle régnait en souveraine sur la société des beaux esprits qui se réunissait au Temple, dont le prince de Conti était Grand-Prieur. Maîtresse de celui-ci, on l'appelait l'Idole du Temple ou simplement l'Idole.   À la fin du XIXe siècle, Guillaume Chastenet de Castaing racheta ce qui restait de ce domaine morcelé. Il acquit cette propriété, entre les deux guerres, l'académicien Jacques Chastenet poursuivit luvre de restauration avec son fils Antoine, puis aujourd'hui, avec le gendre de celui-ci, Stéphane Droulers.","architecture":"CARLE du début du XIVe siècle. La partie la plus ancienne est la tour carrée Sud, il y en avait deux à l'origine, une tour couronnée de mâchicoulis qui supportent un chemin de ronde, sur la façade nord, deux grosses tours rondes percées de meurtrières datent de cette époque. La façade sculptée nord est postérieure de près d'un siècle. Au XVIe siècle, le rôle militaire du château de Carles s'est peu à peu estompé, mais la demeure bientôt s'illustre sur le plan intellectuel et littéraire.  À l'époque de cette grande dame, le château de Carles avait beaucoup plus fière allure qu'aujourd'hui. Sa façade nord donnait sur une vaste cour, entourée de nombreux bâtiments, communs, chapelle, orangeraie, pigeonnier, glacière.  À la Révolution, lorsque le domaine fut vendu comme bien national à un ancien procureur du parlement de Bordeaux, Corneille Macy, tout cela fut démoli et il ne conserva que la partie la plus ancienne.   Château de Carles est inscrit aux M.H. depuis 1991.","habitants":"Famille Carles\r\n        \"","divers":"Carle  44° 57' 49\" Nord et 0° 16' 07\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Carles_1.jpg","../../jctruffet.com/image/image_33/33_Carles_2.jpg","../../jctruffet.com/image/image_33/33_Carles_3.jpg","../../jctruffet.com/image/image_33/33_Carles_4.jpg"]},"Consult_chateau_formulairee2c8":{"id":"Consult_chateau_formulairee2c8","dept":"33","canton":"Pineuilh","commune":"Castillon de Castets","nom":"Carpia","type":"Château","periode":"XV","histoire":"CARPIA, de la maison noble originelle achetée par Pierre de Baritault en 1641 il reste la tour d'escalier, en façade sud, qui est la partie la plus ancienne, de la fin du XVe siècle ou du début du XVIe siècle. Le corps de logis et les bâtiments annexes ont été construits ou reconstruits entre le XVIIIe siècle et le XXe siècle. \r\nLe château, aujourd'hui propriété d'un descendant à la dixième génération de Pierre de Baritault, est entouré d'une propriété d'environ 133 ha majoritairement consacrés à la culture de céréales biologiques et dont une petite part (22 ha) constitue un domaine  . Il est classé M.H. par arrêté depuis le 6 août 2004   pour le château lui-même et son orangerie, un pigeonnier, ses communs, son mur de clôture, sa grille et son décor intérieur.","architecture":"CARPIA, de la maison noble  originelle reste la tour d'escalier, en façade sud, est la partie la plus ancienne, de la fin du XVe siècle ou du début du XVIe siècle. Le corps de logis et les bâtiments annexes ont été construits ou reconstruits entre le XVIIIe siècle et le XXe siècle, il se présente sous la forme dun corps de logis rectangulaire accolé à une tour carrée, le tout est encadré de deux communs qui forment deux ailes au sud. Côté sud, le terrain est bordé dune petite forêt, que lon traverse pour y accéder. Côté nord, on trouve danciennes douves qui entourent un parc arboré. La construction de cette tour, en pierre, date du XVe siècle. A lintérieur, la tour était divisée en plusieurs niveaux matérialisés par des planchers en bois, où lon circulait de lun à lautre au moyen déchelles. A partir de la Renaissance, des modifications ont transformé cet outil de défense en une tour descalier avec la création dune première porte dentrée au rez-de-chaussée côté est. Au XVIIIe siècle, sur la façade sud, une deuxième porte dentrée avec perron, et plusieurs fenêtres ont été ajoutées. Le logis seigneurial vient saccoler sur le côté nord de la tour, on y trouve une inscription datant du XVIe siècle.\r\nSur la façade extérieure on remarque deux meurtrières : une verticale au rez-de-chaussée, et une cruciforme située à létage. La meurtrière cruciforme étant postérieure à la meurtrière verticale, on peut supposer que le logis était tout dabord de plain-pied avant qu'une élévation soit construite.","habitants":"Famille de Pierre de Baritault\r\n        \"","divers":"Carpia 44° 32' 41,96\" Nord 0° 6' 28,09\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Carpia_1.jpg","../../jctruffet.com/image/image_33/33_Carpia_2.jpg","../../jctruffet.com/image/image_33/33_Carpia_3.jpg","../../jctruffet.com/image/image_33/33_Carpia_4.jpg"]},"Consult_chateau_formulaired12f":{"id":"Consult_chateau_formulaired12f","dept":"33","canton":"Castillon la Bataille","commune":"Castillon la Bataille-Belves","nom":"Castillon_Bataille","type":"Château","periode":"XIV-XVIII","histoire":"A la bastide de Castillon la Bataille, le château de Castegens, de Hortense (voir article) et de Lardier      CASTILLON-La Bataille, la Porte de Fer est le vestige de l'enceinte de la ville,  inscrite aux M.H. depuis 1988. Louis XIII demande et obtient de Henri de la Tour, vicomte de Turenne et de Castillon, que l'on rase le château. À la mort du maréchal de Turenne (1623), c'est son neveu, Godefroy Maurice de La Tour d'Auvergne, qui hérite de ses biens en Guyenne. Elle sera plus tard utilisée pour bâtir l'église.  En 1719, le duc de Bouillon vend les vicomtés de Castillon à Antoine Bonnet de Talmont qui les revendra en 1731 à André-François-Benoit Leberthon, premier président au parlement de Bordeaux. En 1735, Charles-Godefroy de La Tour d'Auvergne obtient du roi Louis XV l'autorisation de construire l'église et l'hôpital. À la Révolution de 1789, l'hôpital est transformé en hôtel de ville. André Leberthon, fils du précédent, perd ses droits seigneuriaux et vend ses propriétés en 1795.   CASTEGENS, à origine était un fief des comtes de Grailly. Au cours des siècles, les alliances avec les Ségur font en sorte que le château est transmis aux familles de Pitray puis de Fontenay depuis 1858 en ligne directe. Difficile de ne pas succomber au charme et à la beauté du château de Castegens qui, du haut de son éperon rocheux, domine la vallée de la Dordogne et la ville de Castillon-la-Bataille, et appartenant à la famille de Fontenay depuis 1858, cette propriété du XIVe siècle sert de décor chaque été à la reconstitution de la bataille de Castillon, un son et lumière réputé qui se termine par lembrasement du château. Le monument fait lobjet dune inscription au titre des M.H. depuis le 19 avril 1996.                 LARDIER à Ruch chambres d'hôtes et  domaine du XVIIIe siècle de Pacôme et Laetitia de Galliffet Mortemart","architecture":"Le château de Castegens a été érigé à la fin du XIVe siècle  et fortifié au XVIe siècle. Une muraille, aujourdhui partiellement abattue, reliait quatre tours dangle. L'actuel porche dentrée, d'origine, est protégé par une bretèche avec petit mâchicoulis, et par des archères situées dans les tours latérales.  Au fil des siècles, les impératifs de défense ayant diminué, le château sest progressivement transformé en demeure dagrément. Larchitecture de Castegens sest adoucie : les défenses ont été abaissées au XVIIe siècle, les façades se sont ouvertes au XVIIIe siècle, laissant pénétrer la lumière à lintérieur du corps de logis.  LARDIER à Ruch chambres d'hôtes et  domaine du XVIIIe siècle, gentilhommière à deux niveaux en équerre.","habitants":"Famille de Pitray\r\n        \"","divers":"A Castillon la Bataille-Belves le château de Dastengens et de Lardier  grav 8-9   gps  44° 51' 07\" Nord 0° 02' 31\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Castillon_Bataille_1.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_2.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_3.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_4.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_5.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_6.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_7.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_8.jpg","../../jctruffet.com/image/image_33/33_Castillon_Bataille_9.jpg"]},"Consult_chateau_formulairea113":{"id":"Consult_chateau_formulairea113","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Germain d","nom":"Castéra_Esteuil","type":"Château","periode":"XVIII","histoire":"CASTERA, en 1760 Marie-Anne de Verthamon hérite du château. Son neveu Martial Maurice de Verthamon construira le domaine.  Après la période chaotique de la fin du XIXe, les Verthamon sont obligés  de vendre le château Castera. Monsieur Destanque en profite, relance les ventes, se sépare de la propriété en 1922 au profit de monsieur Degonde. Quelques exemples de propriétaires prestigieux qui se sont succédés à la tête du domaine : la famille dArsac, grande exportatrice  au XIVe siècle, Étienne de La Boétie, le célèbre humaniste conseiller au parlement de Bordeaux, ami de Michel de Montaigne dont le frère Thomas fût également propriétaire du château Castera, ou encore les marquis de Verthamon. Cette famille conservera le château Castera pendant près de 50 ans. Au début des années 70, la société Alexis Lichine reprend le domaine et lui donne un élan commercial international.  en 1986, Carl E. Press (père de lactuel propriétaire) et Dieter Tondera sassocient pour acheter le château Castera au négociant bordelais.","architecture":"Castéra,   Un grand chantier de rénovation est alors entrepris en 1986 . Pas un pan de mur où la truelle du maçon ne soit passée. Ce château de plan en équerre à deux niveaux , le corps de logis avec un toit en croupe accolé à une tour carrée, à l'opposé retour en équerre, prolongé par des dépendances formant la cour d'honneur.","habitants":"Martial Maurice de Verthamon \r\n        \"","divers":"A Saint-Germain d'Esteuil le château de Castéra","gps":"","images":["../../jctruffet.com/image/image_33/33_Cast%c3%a9ra_Esteuil_1.jpg","../../jctruffet.com/image/image_33/33_Cast%c3%a9ra_Esteuil_2.jpg","../../jctruffet.com/image/image_33/33_Cast%c3%a9ra_Esteuil_3.jpg","../../jctruffet.com/image/image_33/33_Cast%c3%a9ra_Esteuil_4.jpg","../../jctruffet.com/image/image_33/33_Cast%c3%a9ra_Esteuil_5.jpg"]},"Consult_chateau_formulaire0e79":{"id":"Consult_chateau_formulaire0e79","dept":"33","canton":"La Bréde","commune":"Martillac","nom":"Caudalie","type":"Château","periode":"XVI- XIX","histoire":"CAUDALIE,  dit des sources  de Smith Haut-Lafitte, ce château a déjà quelques siècles derrière lui ! Cest en 1365, que la noble famille Verrier du Bosq choisit ce terroir pour la culture.   Son nom, il le doit à son rachat au XVIIIe siècle par lEcossais George Smith. Aujourdhui et depuis 1990, le domaine appartient à Florence et Daniel Cathiard, ils ont mis tous leur cur pour perpétuer les valeurs de ce terroir exceptionnel.  En 1993,  château Smith Haut Lafitte, Mathilde et Bertrand Thomas rencontrent le professeur Joseph Vercauteren, spécialiste des polyphénols, et son équipe de chercheurs. Celui-ci leur fait alors part dune de ses découvertes, selon laquelle les OPC (oligomères-procyanidoliques). Transformé en hôtel par la famille Cathiard.","architecture":"Les Sources de Caudalie à Martillac est un établissement créé en 1999 qui appartient au couple Tourbier. Il est situé au milieu des vignes du château Smith Haut Lafitte et profite à plein de l'essor de l'notourisme et de la qualité de ses installations qui comprend notamment un spa dernier cri.  Elle n'est ouverte qu'aux établissements déjà titulaires d'un classement 5 étoiles et qui peuvent justifier d'une situation géographique exceptionnelle, d'un intérêt historique, esthétique ou patrimonial particulier et d'une exploitation de plus d'un an. Les critères d'attribution prennent également en compte la qualité du service qui doit être sur mesure. Jusque-là, l'appellation «palace» était libre d'usage. C'est Atout France, l'agence de développement touristique de la France qui a distingué Les Sources de Caudalie au terme d'un audit poussé.   Construit dans la seconde moitié du XIXe siècle, il est difficile de déterminer les influences architecturales exactes de ce  château. Elles oscillent entre le Moyen-Âge et la Renaissance, ce qui est caractéristique du goût pour l'éclectisme qui prévaut alors en architecture.","habitants":"Famille Cathiard\r\n        \"","divers":"Château de Caudalie à Martillac","gps":"","images":["../../jctruffet.com/image/image_33/33_Caudalie_1.jpg","../../jctruffet.com/image/image_33/33_Caudalie_2.jpg","../../jctruffet.com/image/image_33/33_Caudalie_3.jpg"]},"Consult_chateau_formulairee898":{"id":"Consult_chateau_formulairee898","dept":"33","canton":"Pessac","commune":"Gradignan","nom":"Cayac","type":"Château","periode":"XV","histoire":"CAYAC, construit au XVe siècle puis restauré aux XVIIe et XIXe siècles. En 1618, l'ensemble passe aux mains des Chartreux. Mais les pèlerinages se font plus rares et le prieuré a amorcé un déclin, confirmé début XVIIIe siècle par l'arrêt du service religieux.  En 1791 le prieuré est vendu comme bien détat et l'église est désaffectée. À partir de 1806, plusieurs propriétaires vont se succéder. De 1837 à 1860, une verrerie sera installée dans l'ancienne église endommageant sérieusement le bâtiment. Puis un atelier de mécanique y verra le jour pendant la seconde guerre mondiale. En 1979 la municipalité de Gradignan acquit l'église puis en 1988 le prieuré sauvant ainsi ces monuments d'une lente dégradation. Les travaux démarrent avec la déviation en 1981 de la route nationale, des fouilles archéologiques en 1982 et 1983 puis une restauration du prieuré proprement dit. À l'extérieur, une statue en bronze de pèlerin, de Danielle Bigata, a été installée en 1997. En 2005, l'ancienne orangerie accueille un musée des beaux arts à vocation pédagogique.","architecture":"CAYAC, construit au XVe siècle puis restauré aux XVIIe et XIXe siècles, le site  est un lieu toujours vivant. De nos jours le prieuré de Cayac a retrouvé sa fonction première puisqu'il accueille à nouveau des pèlerins sur le chemin de St Jacques de Compostelle. La tradition hospitalière de Cayac est rétablie, grâce à une structure d'accueil  permettant de recevoir les nouveaux pèlerins. La vie jacquaire est présente puisqu'un gîte est mis à disposition des pèlerins, des expositions temporaires sont organisées dans l'ancienne église, le musée consacré au peintre bordelais Georges de Sonneville y est installé et les rives de l'eau de la Bourde continuent à apporter aux promeneurs l'occasion de se divertir.","habitants":"Danielle Bigata\r\n        \"","divers":"Le prioré de cayac","gps":"","images":["../../jctruffet.com/image/image_33/33_Cayac_1.jpg","../../jctruffet.com/image/image_33/33_Cayac_2.jpg"]},"Consult_chateau_formulaire4baa":{"id":"Consult_chateau_formulaire4baa","dept":"33","canton":"Adémos les Bains","commune":"Audenge","nom":"Certes","type":"Chartreuse","periode":"XV","histoire":"CERTES, depuis la fin de XVIe siècle, le fort navait plus de rôle militaire son propriétaire, le marquis de Civrac qui avait creusé des marais salants de Cassy à Biganos, rasa la vieille construction et, grâce à ses pierres fit bâtir, de 1767 à1769, à la Révolution, la maison est achetée en 1799, par Dauberval, maître des ballets du grand théâtre de Bordeaux à la retraite qui lembellit, lagrandit, en fait une « chartreuse » bordelaise et loge les sauniers dans le centre dAudenge. En 1818, les locaux sont rachetés par François Valenton de Boissières qui les cède à son fils Ernest lequel va jouer un grand rôle dans lévolution sociale dAudenge. Ingénieur, il organise de façon rationnelle lexploitation de la propriété. Puis, en 1895, le château et le domaine sont cédés à la copropriété Jean Descas-Larroque. A leur suite, car il se forme une véritable dynastie Descas, Camille Descas, le fils de Jean, surélève le bâtiment, puis Roger, petit-fils de Camille, à partir de 1960 devient propriétaire des lieux et actif et influent maire dAudenge.","architecture":"Certes,  ressemblait au château de La Teste puisque cétait une tour carrée de dix mètres de côté, de vingt-cinq mètres de haut et ses solides murs mesuraient 1,65 mètres dépaisseur. Bombardée durant la Fronde en 1653, elle prit feu en 1697, le jour du pèlerinage vers Saint-Yves, le protecteur dAudenge, mais aussi jour de libations. On sait qualors elle abritait quatre logements et protégeait un moulin. Le château fut reconstruit. Le 14 novembre 2010, un violent incendie nocturne dû à la foudre détruit en très grande partie le château de Certes, situé au nord du centre dAudenge.","habitants":"Famille de François Valenton de Boissière\r\n        \"","divers":"Chartreuse de Certes à Audenge","gps":"","images":["../../jctruffet.com/image/image_33/33_Certes_1.jpg","../../jctruffet.com/image/image_33/33_Certes_2.jpg","../../jctruffet.com/image/image_33/33_Certes_3.jpg","../../jctruffet.com/image/image_33/33_Certes_4.jpg"]},"Consult_chateau_formulaire7f8f":{"id":"Consult_chateau_formulaire7f8f","dept":"33","canton":"Lacanau","commune":"Moulis","nom":"Chasse_Spleen","type":"Château","periode":"XVIII","histoire":"CHASSE-SPLEEN, au XVIIIe siècle, la propriété appartient au sieur Gressier qui commence par bâtir les communs puis une chartreuse vingt ans plus tard,  en 1820, le domaine se scinde en deux, dun côté, Grand-Poujeaux-Gressier et de lautre, Grand-Poujeaux-Castaing, propriété de Lucrèce Castaing. En 1863, Rosa Ferrière, propriétaire de Grand Poujeaux Castaing,  elle le baptisera Chasse-Spleen. Certains attribuent ce nom magique au fruit de discussions vers 1860, entre Rosa Ferrière, la maîtresse des lieux, et son voisin, Odilon Redon, peintre symboliste réputé. Il a, en effet, illustré les fleurs du mal de Charles Baudelaire, dont on sait quil a fait du spleen, un copyright. Dautres au poète britannique Lord Byron, qui lors de sa visite du domaine en 1821.  Longtemps propriétaire, les Gressier le vendent en 1912, à une famille de négociants allemands qui en fit une marque connue en Europe du Nord. La guerre les dépossède et une famille de forestiers landais lachète. Ils le maintiennent à un niveau de qualité et de technologie que lui permettent les revenus de lindustrie florissante du bois.  En 1976, Chasse-Spleen est vendu à Jacques Merlaut, négociant réputé.  En 2000, une de ses petites filles en hérite  Céline Villars. En 2003, le château Chasse-Spleen acquiert le château Gressier Grand Poujeaux.","architecture":"Chasse-Spleen de plan rectangulaire à deux niveaux et attiques est accolé de deux tours dont une héxagonales avec une terrasse avec balustrades,en prolongement de l'édifice l'autre tour héxagonale  toit à six pans brisés. Le corps de logis prolongé d'un autre bâtiment à un étage toit en croupe.","habitants":"Famille de Jacques Merlaut\r\n        \"","divers":"Château de Chasse-Spleen à Moulis","gps":"","images":["../../jctruffet.com/image/image_33/33_Chasse_Spleen_1.jpg","../../jctruffet.com/image/image_33/33_Chasse_Spleen_2.jpg","../../jctruffet.com/image/image_33/33_Chasse_Spleen_3.jpg"]},"Consult_chateau_formulaire600d":{"id":"Consult_chateau_formulaire600d","dept":"33","canton":"Lacanau","commune":"Cussac-Fort médoc","nom":"Chesnaye_Cussac","type":"Château","periode":"XIX","histoire":"CHESNAYE, depuis 1819, le domaine appartient à la famille Phélan ; dans les éditions de 1850 et 1868 de l'ouvrage de Cocks, il apparaît sous le nom de Sainte-Gemme. L'édition de l'ouvrage de Cocks en 1874 en propose une illustration représentant des bâtiments organisés selon une cour en U . A la même époque, Louis-Michel Garros construit pour la famille Exshaw un hôtel rue Théodore-Gardère à Bordeaux, dont on conserve un plan signé et daté de 1878. L'architecte adopte un style néo-élizabéthain en vogue à l'époque et déjà adopté par l'architecte Henri Duphot pour le château voisin de Lanessan.","architecture":"La Chesnaye en 1865, Phélan procède à la construction  F. Exshaw qui va transformer les lieux en 1882 du château actuel. Le château, présente un plan massé et complexe jouant sur les décrochements de volumes et de toitures. Doté d'un niveau de soubassement, d'un étage carré et d'un étage de comble, le noyau principal est complété sur la façade sud par une tour polygonale crénelée à cinq niveaux, sur la façade nord par une tour carrée à pan coupé avec échauguette et toiture en pavillon soulignée par de faux mâchicoulis, et sur la façade  par une tour carrée et crénelée. A cela s'ajoutent des bow-windows, un porche, des baies à traverses et meneaux et un répertoire décoratif d'entrelacs, d'accolades, de trilobes. Le gros-uvre de l'édifice en moellons traités de manière rustique contraste avec les encadrements, bandeaux, chaînes d'angle et corniches en pierre de taille. Les toitures en ardoise et à longs pans présentent des pignons découverts. Les hautes souches de cheminées traitées en tuyaux d'orgue présentent un décor de torsades ou de croisillons. Le château est doté d'une terrasse à l'est et d'un parc planté d'arbres qui le sépare des bâtiments de dépendance.","habitants":"Famille Exshaw\r\n        \"","divers":"Château de la Chesnaye à Cussac","gps":"","images":["../../jctruffet.com/image/image_33/33_Chesnaye_Cussac_1.jpg","../../jctruffet.com/image/image_33/33_Chesnaye_Cussac_2.jpg","../../jctruffet.com/image/image_33/33_Chesnaye_Cussac_3.jpg","../../jctruffet.com/image/image_33/33_Chesnaye_Cussac_4.jpg","../../jctruffet.com/image/image_33/33_Chesnaye_Cussac_5.jpg"]},"Consult_chateau_formulaireb30e":{"id":"Consult_chateau_formulaireb30e","dept":"33","canton":"Lesparre-Médoc","commune":"Cissac-Medoc","nom":"Cissac_Médoc","type":"Forteresse","periode":"XII-","histoire":"Quatre châteaux à Cissac celui de Cissac, de la  Lamothe, Puy Castera, Valambis et vestiges de vertheuil. Breuil et Fontesteau (article suivant)         \r\nPUY-CASTERA, est un château bâti à Cissac-Médoc,Il appartient aux descendants d'Henri Marès, découvreur de l'effet fongicide du souffre sur l'oïdium. Le château Puy Castéra est un domaine viticole.                         LAMOTHE, au XIXe siècle, la propriété de Lamothe appartient à monsieur dElbauve La famille Fabre, propriétaire du domaine, acheté par Gabriel Fabre en 1964. Vincent Fabre, son fils, a repris la gestion du domaine en 1991                                                       VILLAMBIS Il y a une trentaine d'année, l'association départementale des amis et parents d'enfants Inadaptés de la Gironde, l'ADAPEI. On ne pratique pas que la viticulture d'ailleurs, avec des serres pour la production de plantes en tout genre, une blanchisserie et de la sous-traitance industrielle.                          VERTHEUIL Sa construction si elle est attestée au XIe siècle remonterait à deux siècle plus tôt.sous  Girald fils dAcfred, captal de Vertheuil, confirme sa présence en 1081. Pendant deux siècle la famille Bourg domine la baronnie de Vertheuil. Guitard de Bourg sillustre au XIIIe siècle en obtenant le droit de justice dans le bourg (1263). Lannée 1489 est un tournant pour la baronnie de Vertheuil qui est léguée au châpitre de Saint André par Pierre Bosco. Ce dernier qui vient d'hériter de ces terres est le chantre et chanoine de Saint André de Bordeaux. Cette situation sera maintenue pendant trois siècles  jusquà la Révolution française en 1789. En 1958, des descendants dAmanieu VII, la famille Abadie font lacquisition du château avec lintention de le restaurer.","architecture":"Lamothe, une bâtisse moyenâgeuse avec ses bâtiments adjacents occupa l'emplacement du château actuel ; il reste encore des caves et surtout des oubliettes dans les parties les plus anciennes des bâtiments de lexploitation.   À la fin du XIXe siècle, un incendie a entièrement détruit le château. Le château actuel, de style néo-renaissance a été édifié au même emplacement. Sa construction s'est achevée en 1903. Au début du XXe siècle, la propriété est jouée et perdue sur le tapis vert du casino de Biarritz par le propriétaire de lépoque, négociant à Bordeaux.   Vertheuil, dans une zone géographique on trouve notamment le château de Vertheuil et la maison forte de Semignan, le château de Cissac fait office de véritable place forte. Avec son plan carré et ses murs imposants, il nen reste pas moins aujourdhui en véritable état de ruine   Le Donjon est réduit au XVII siècle. On estime que cette modification aurait été demandée par Mazarin lors de la Fronde. Puy-Castéra Ce domaine tient son nom de deux mots d'ancien français et de latin, \"Puy\" signifiant tertre et \"Castéra\" (Castrum) signifiant camp, forteresse. Dans la nuit du 31 janvier au 1er février 1861, le château perd sa courtine Nord-Est qui séfondre sous laction de la pluie et du gel.","habitants":"Famille de Josset de Pomies, baron de Breuil\r\n        \"","divers":"à Cissac  de la  Lamothe grav-5-6, Puy Castera g-7, Valambis g-8    . 45° 13' 38\" Nord et 0° 48' 05\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_6.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_7.jpg"]},"Consult_chateau_formulaire7f29":{"id":"Consult_chateau_formulaire7f29","dept":"33","canton":"Lesparre médoc","commune":"Cissac-Medoc","nom":"Cissac_Médoc_II","type":"Foeteresse","periode":"XII-XV","histoire":"Du BREUIL, la baronnie du Breuil, occupé par les anglais, le château passera de mains en mains entre le XVIe siècle et le XIXe siècle. Au moment de la Révolution française, Josset de Pomies, baron de Breuil, est exécuté après avoir été accusé de complot et de trahison. La famille Forponne est alors propriétaire de la forteresse, en 1903 un négociant bordelais, joue la propriété au casino de Biarritz et la perd. passe au de Gabriel Fabre et de ses héritiers . La famille Fabre rachète successivement le château Landat, ancienne possession de lAbbaye de Vertheuil (1976) puis le domaine de La Tonnelle (1982).     FONTESTEAU château fort Certaines personnes avancent lhypothèse quen raison de la proximité du château fort du Breuil à Cissac, le même seigneur a pu posséder ces 2 châteaux. Les recherches de M. Leblanc, universitaire toulousain et de M. Berthiot font apparaître le domaine comme un haut lieu de la métallurgie au Moyen-Age. Propriété de la famille Suvin au XIXe siècle, il passe ensuite aux mains des Léglise.  Cest en 1997 que les propriétaires (dont Dominique Fouin  actuel copropriétaire avec Joachim Immelnkemper le consolident, restaurent et redonnent au château son allure initiale.","architecture":"Du BREUIL, le développement du domaine semble coïncider avec lincendie du vieux château à la fin du XIXe siècle et la construction de la bâtisse actuelle, de style néo-renaissance, Dès lors se succèderont plusieurs propriétaires qui ne parviendront quà faire péricliter le domaine. Monsieur dElbauve en serait lun des architectes étant pris de la lubie dy rechercher un trésor.                                                                                FONTESTEAU  compte tenu de la taille pas très haute du mur denceinte, ce château ne devait pas être fait pour faire la guerre mais plutôt pour se réfugier dans certaines occasions. Le donjon est la partie la plus ancienne delédifice, de 1277. La porte dorigine au-dessus de laquelle se trouvait le blason de la seigneurie, se trouvait sur le côté du donjon. Au Moyen-âge, à la place des ces fenêtres, il y avait des meurtrières. On peut en voir encore la trace sur les tours arrières. Au-dessus de lancienne porte du donjon, il y a la présence du blason du château. Celui-ci a été abîmé mais on peut voir, sur ce quil en reste, une coquille St-Jacques. Les tours arrières furent très longtemps tronquées . Il semblerait quelles aient été arasées. Elles étaient  sans doute considérées comme un symbole de puissance de la noblesse et le  peuple aurait pu vouloir abattre ce symbole de force et de puissance. Les tours ont été rebâties en 1996  Elles ont été reconstituées avec des moellons trouvés sur place.","habitants":"Josset de Pomies, baron de Breuil                                  Fontesteau famille Suvin\r\n        \"","divers":"à Cissac celui du Breuil grav-1  de Cissac, Fontestau g-2-3 . Coordonnées GPS\r\n45.206739 .","gps":"","images":["../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_II_1.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_II_2.jpg","../../jctruffet.com/image/image_33/33_Cissac_M%c3%a9doc_II_3.jpg"]},"Consult_chateau_formulaire0327":{"id":"Consult_chateau_formulaire0327","dept":"33","canton":"Eysines","commune":"Parempuyre","nom":"Clément_Pichon","type":"Château","periode":"XVIII","histoire":"deux châteaux à Parempuyre celui de Clément Pichon et de Ségur. CLEMNT-PICHON, de style Renaissance,  son histoire remonte au XIVe siècle où il était connu comme la Motte Caupène, passa par alliances aux  La Motte, aux Lansac et vendu en en 1585 à François d'Alesme, son fils conseiller au parlement de Bordeaux  se joint  en 1650 à la fronde contre le duc d'Epernon qui se dernier le  fit  détruitre. Reconstruit en 1651 à deux reprises et à la suite dun incendie est reconstruit par la famille Durand-Dassier en 1881 qui en devienne propriétaire jusqu'à la fin du XIXe siècle. En 1976, Clément Fayat se porte acquéreur du domaine quil rebaptise Clément-Pichon et qui devient sa maison de famille. Lhistoire du domaine et en hommage à son épouse dont le nom de jeune fille est identique à son propre prénom, le château est rebaptisé château Clément-Pichon en 1985. Clément Fayat se consacre alors à la restauration de la demeure et du parc. Le château est inscrit aux M.H. depuis 2000.                                      SEGUR Le nom de Ségur est, à lévidence, lun des plus connus du Médoc viticole. Il nest pas une seule des 8 appellations de la presquîle qui ne trouve dans ses archives une trace, passage ou titre de propriété se rapportant à cette famille. Cest que les comtes de Ségur ont régné avec éclat, pendant le XVIIIe siècle sur de nombreux châteaux. Au commencement du XVIIe siècle, messire de Ségur fait bâtir un château son propriétaire assurant la haute Justice de sa juridiction, ainsi quil était dusage avant 1789. Le château Ségur fut transmis à ses descendants jusquà la Révolution de 1789. Le 4 Octobre 1795, il est procédé à la vente aux enchères de la propriété par le district de Bordeaux. Divers acquéreurs loccupèrent au XIXe siècle jusquà ce que la société Pépin et Gasquet, en prennent les commandes.","architecture":"CLEMENT-PICHON,  néo-renaissance bâti en 1881 par l'architecte Garros, et dont le style éclectique s'inspire des châteaux Renaissance de la Loire et des constructions des XVII-XVIIIe siècles. De gros pavillons irrégulièrement disposés autour d'un corps central, des tours d'angle, et un décor sculpté forment un ensemble suggérant différentes époques de construction. La disposition intérieure s'organise autour d'un spacieux vestibule habillé de boiseries de style Renaissance. La salle à manger possède une cheminée dont la hotte est formée d'un panneau de céramique de Sèvres signé par Dammouse.      SEGUR,  corps de logis rectangulaire à deux niveaux,pavillon d'entrée  avec fronton deux retours d'équerre en façade donnant sur cour avec sur la gauche une tour carrée avec terrasse à balustrades, à droite dépendance, aujourd'hui gîte de France de Philippe Dauquet.","habitants":"Famille Durand-Dassier \r\n        \"","divers":"Château de Clément-Pichon et de Ségur à Parempuyre grav-4-5  44° 56' 25\" Nord et 0° 35' 50\" Ouest Citran-g -4","gps":"","images":["../../jctruffet.com/image/image_33/33_Cl%c3%a9ment_Pichon_1.jpg","../../jctruffet.com/image/image_33/33_Cl%c3%a9ment_Pichon_2.jpg","../../jctruffet.com/image/image_33/33_Cl%c3%a9ment_Pichon_3.jpg","../../jctruffet.com/image/image_33/33_Cl%c3%a9ment_Pichon_4.jpg","../../jctruffet.com/image/image_33/33_Cl%c3%a9ment_Pichon_5.jpg"]},"Consult_chateau_formulairece31":{"id":"Consult_chateau_formulairece31","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Estèphe","nom":"Cos_Estournel","type":"Palais","periode":"XVIII","histoire":"Deux châteaux dans cet article de St-Estèphe dont Cos-Estournel et Andron-Blanquet.                                COS-ESTOURNEL, en 1811, à la mort de son père, Louis  Gaspard Lacoste de Maniban, marquis dEstournel, hérite de la propriété familliale.  De 1821 à 1847 il achète de nombreuses parcelles voisines,  Louis qui, endetté et malade, avait dû vendre ses propriétés au banquier londonien Martyns en 1852. Celui-ci confie la gestion du domaine à Jérôme Chiapella, propriétaire de La mission Haut-Brion, qui contribue lui aussi grandement au progrès de la propriété. Celle-ci change de mains 3 fois avant dêtre acquise en 1917 par Fernand Ginestet, célèbre négociant bordelais. Son petit-fils Bruno Prats puis son arrière petit-fils Jean-Guillaume Prats assurent la gestion du domaine,   Aujourd'hui Cos appartient à Michel Reybier depuis 2000. Il est dirigé par Aymeric de Gironde. Cos-Estournel  construit dans un style  oriental  en hommage à la fidelité d'une clientèle anglaise des indes et de l'Extrème-Orient, lui permet des exportations lointaines, notamment aux Indes, lui attirant le surnom de Maharadjah. En 1830, pour célébrer cela, il surmonte ses chais de pagodes chinoisantes, qui seront dès lors l'image exotique de Cos, et fait venir de Zanzibar une porte du XVIIe siècle. Un arc de triumphe acceuille les visiteurs  surmonté d'un lion et d'une licorne.  En 2006, une restauration des bâtiments a permis aux pagodes de retrouver leur aspect original.                                      Le château ANDRON-BLANQUET navait pas changé de propriétaire depuis le règne de Louis XIII. Il fut acquit en 1971 par la famille Audoy du château Cos-Labory.","architecture":"COS-ESTOURNELLE, Cos-Labory est un château bâti à Saint Estèphe. A l'issue de la Révolution Française, de 1789, le domaine a appartenu à Francois Labory, qui lui donna son nom. En 1845, Louis-Gaspard d'Estournel récupéra le vignoble mais fut obligé, 7 ans plus tard, presque ruiné, de le revendre, de plan quadrangulaire.  Une confrontation harmonieuse a été créée entre lenveloppe du nouveau bâtiment que nous avons érigé dune manière traditionnelle dans la continuité de lédifice ancien et les intérieurs conçus par Jean Michel Wilmotte, qui a innové notamment par lutilisation dune charpente métallique en inox-miroir habillée de verre. Actuellement, c'est Bernard Audoy, qui dirige le domaine familial. Le mot « cos » vient du lieu-dit « Caux ». Cette croupe de gravillons longe la route allant de château Lafite-Rothschild à Cos. Le domaine Cos Labory possède 3 hectares sur ce sol. Le château Andron Blanquet, en 1971, le couple acquiert également le cru voisin, leurs fils travailleront quelques années à leurs côtés sur les deux domaines avant que Bernard, laîné, prenne les rênes des propriétés.","habitants":"Louis  Gaspard Lacoste de Maniban\r\n        \"","divers":"Château de Cos-Estournel et de Andron-Blanquet et Cos-Labory grav 8-9","gps":"","images":["../../jctruffet.com/image/image_33/33_Cos_Estournel_1.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_2.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_3.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_4.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_5.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_6.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_7.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_8.jpg","../../jctruffet.com/image/image_33/33_Cos_Estournel_9.jpg"]},"Consult_chateau_formulaire230e":{"id":"Consult_chateau_formulaire230e","dept":"33","canton":"La Bréde","commune":"Beautiran","nom":"Couloumey","type":"Chartreuse","periode":"XVIII","histoire":"COULOUMEY, chambres d'hôtes, cette chartreuse simple néo-classique aux belles proportions a été construite dans la seconde partie du XVlIIe siècle, en 1770, par la famille Van Den Branden, riches négociants hollandais de Bordeaux, ce qui explique peut-être l'importance des communs et des bâtiments agricoles. Philippe Van Den Branden avait créé en 1749 une verrerie et une faïencerie, située place Jean Moulin à Libourne, dite manufacture Vanderbrande, qui cessera toute activité en 1806. Cette jolie demeure, encadrée de deux cours parfaites, la cour d'honneur et le jardin topiaire côté terrasse, a été surélevée d'un niveau dans sa partie centrale au milieu du XIXe siècle. Au XIXe siècle, le « Couloumey» a appartenu à un armateur Bordelais, monsieur Belso. Puis, il fut acquis par les demoiselles Debelmas qui l'ont légué aux hospices de Bordeaux ; en 1881 il fut vendu à madame Durand-Desgranges, épouse Lefranc. Enfin, il a appartenu à la famille Dejean de 1930 jusqu'au début 1988, puis à monsieur Maurice Theveninet Grégory Rowe, citoyen américain. En 1995, le domaine a servi de cadre à deux films avec pour acteurs Marie-France Pisier et Clotilde Courau dans : «Fidèle, Infidèle » ; et le danseur-étoile Patrick Dupont dans « Danse avec la vie ». Pierre Bon, son nouveau propriétaire, tomba immédiatement amoureux de cette propriété,                                                           A Beautiran le château de Camperos, de  Martignas pas d'information pour ses deux derniers.","architecture":"COULOUMEY chartreuse néo-classiquee de 1772 surélevée sur sa partie centrale   est un pur exemple de ces demeures bourgeoises restées pour la plupart intactes, encadrées de deux cours élégantes, simples et familiales. Ouvert au public depuis 2003, ainsi que dans le cadre des «Festes Baroques» avec une intimité, une délicatesse qui créent cette subtile alchimie entre cette belle époque et ce magnifique terroir le plus ancien et le plus noble du Bordelais. Cette chartreuse simple néo-classique aux belles proportions a été construite dans la seconde partie du XVlII siècle,  au premier étage accessible par un très bel escalier à Colimaçon d'époque. C'est à ce titre que ce site est inscrit depuis début 2002 à l'Inventaire supplémentaire des M.H. ainsi que le colombier octogonal du XVIIe siècle.                                              Martignas de plan rectangulaire avec cordon à deux niveaux avec lucarnes sur un toits en croupes accolée sur flanc latéraux de tourelles héxagonales toit en poivrière, l'édifice recouvert d'ardoise.","habitants":"Famille Van Den Branden,\r\n        \"","divers":"Château de Couloumey, de Martignas grav-5  à Beautiran","gps":"","images":["../../jctruffet.com/image/image_33/33_Couloumey_1.jpg","../../jctruffet.com/image/image_33/33_Couloumey_2.jpg","../../jctruffet.com/image/image_33/33_Couloumey_3.jpg","../../jctruffet.com/image/image_33/33_Couloumey_4.jpg","../../jctruffet.com/image/image_33/33_Couloumey_5.jpg"]},"Consult_chateau_formulaire2f62":{"id":"Consult_chateau_formulaire2f62","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Jean de Blaignac","nom":"Courtebotte","type":"Château","periode":"XVIII","histoire":"COURTEBOTTE, ancienne propriété de la famille Touzet du Vigier. Ce château est sûrement avec l'église l'un des lieux les plus importants de la commune. Aujourd'hui réhabilité en chambres d'hôtes, on y propose une vue imprenable sur la Dordogne. Le général Touzet du Vigier (1888-1980), ancien commandant de la 1re division blindée (Ire DB), libérateur de la ville de Mulhouse, en 1944, lointain descendant des seigneurs du château de Courtebotte.","architecture":"Le château de Courtebotte, édifié sous le règne d'Henri IV empreinte du XVIIe siècle, présente une architecture authentique. Corps de logis rectangulaire à deux niveaux accolée de deux pavillons carrés sur les flancs droit et gauche, l'édifice est prolongé sur l'arrière par un corps de logis sous un toit incliné accolé de deux tourelles rondes toit en poivrière. Un potentiel que nous avons voulu réactualiser avec des objets et mobiliers contemporains.","habitants":"Famille Touzet du Vigier\r\n        \"","divers":"Château de Courtebotte à Saint-Jean de Blaignac","gps":"","images":["../../jctruffet.com/image/image_33/33_Courtebotte_1.jpg","../../jctruffet.com/image/image_33/33_Courtebotte_2.jpg"]},"Consult_chateau_formulaire0ce5":{"id":"Consult_chateau_formulaire0ce5","dept":"33","canton":"Cadillac","commune":"Loupiac","nom":"Cros_Ricaud","type":"Vestiges","periode":"XII-XIX","histoire":"CROS, est étroitement liée à celle de la Guyenne anglaise; elle débute en 1196 lorsque Richard Coeur de Lion donne un fief, le domaine du Cros, au sieur Boson de Casau. En 1322 Bernard de Ségur obtient du roi Édouard II l'autorisation de fortifier le château en le ceinturant d'un mur de pierre et de chaux. Celui-ci, situé sur la hauteur de Loupiac, surplombe la vallée de la Garonne devenant ainsi un point stratégique, et prend le nom de château du Cros qui fut construit du XIIe au XIVe siècle. C'était une forteresse. L'architecte était Martin Mogendorf. Il est inscrit aux M.H. depuis 1993, pour ses tours et ses vestiges en cours de restauration. chambres d'hôtes.   Ce domaine appartient à la famille Boyer depuis 4 générations.     RICAUD   bâti à Loupiac, cette bâtisse du XVe siècle passa entre les mains de multiples familles au gré des alliances historiques. Acheté en 1855 par J-C de Bignon, maire de Gornac. Alain Thiénot fait lacquisition de la propriété en 1980. En 2007, il décide de sappuyer sur lexpertise de nos équipes Dourthe, et un plan de restructuration est mis en place avec lambition de faire du domaine la référence en Loupiac\" Patrick Jestin.                                                                LUBER-CHAPERON bâti à Lupiac, à partir du XVIIIe siècle, le château passe entre les mains de plusieurs riches négociants bordelais, jusquaux Luber-Chaperon, doù son nom actuel. Une caisse posée sur les tonneaux est estampillée S.C. pour les initiales de Pierre-Numa Sensine et Adolphe Chalès, armateurs bordelais et co-propriétaires du château Luber-Chaperon lors de sa rénovation.","architecture":"Du château  de Cros bâti entre la fin du XIIe siècle et le milieu du XIVe, il ne reste qu'une tour encore couverte restaurée en 1993, une tour étêtée, un pavillon datant du XVIIe siècle, et des vestiges de murs.  Sa situation dominante, sur un éperon rocheux, fut bâti pour des raisons militaires, mais aussi pour une raison de surveillance du trafic fluvial. Durant la guerre de cent ans, le château du Cros resta dans le camp Anglais, ses défenseurs repoussant farouchement les seigneurs de Benauge. Celle-ci allait lui être fatale. En effet, larmée allemande le réquisitionna dabord pour son point de vue idéal, mais sen servit aussi comme cible de tirs pour entraîner ses soldats. Les forces doccupations lachevèrent à lexplosif peu avant de se retirer. Dans ces conditions, à la fin de la guerre, le château fut abandonné.                                             LUBER-CHAPERON bâti en 1869 et a été construit sur une partie du plan de lancien bâtiment La Villa gallo-romaine datant des IIe-Ve siècles à plusieurs niveaux, avec des thermes où lon trouve le caldarium, le tepidarium et le frigidarium. La façade évoque celle du Grand Trianon de Versailles. La porte dentrée est surmontée dun bas-relief qui symbolise le métier darmateur.                                                                       RICAUD   est un château bâti à Loupiac, de style néo-gothique, dont la construction date du XIXe siècle, séduit par ce potentiel qualitatif et par la beauté architecturale du château,  Il sagit alors dune véritable reconstruction dans un style néogothique à laquelle se livre larchitecte, assisté de lébéniste local Laville et du décorateur Félix Berne Bellecour. Le résultat relève du conte de fées : étranges gargouilles, tourelles élancées, créneaux offrent une ambiance des plus suggestives, dans ce parc aux arbres tricentenaires.","habitants":"Cros Famille Boyer                                                          Ricaud famille d'Alain Thiénot\r\n        \"","divers":"château de  Cros g de 5à 8 et de Ricaud grav de 1à5 à Loupiac GPS : 44° 36' 40\" Nord et 0° 17' 47\" Ouest","gps":"44° 36' 40\" Nord et 0° 17' 47\" Ouest","images":["../../jctruffet.com/image/image_33/33_Cros_Ricaud_1.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_2.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_3.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_4.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_5.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_6.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_7.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_8.jpg","../../jctruffet.com/image/image_33/33_Cros_Ricaud_9.jpg"]},"Consult_chateau_formulaire6cd4":{"id":"Consult_chateau_formulaire6cd4","dept":"33","canton":"Créon","commune":"Créon","nom":"Créon","type":"Forteresse","periode":"XII-XV","histoire":"Quatre châteaux à Créon, celui de Camiac, de Camarsac  et celui de Gorce   et à 6 Km à l'Est la maison forte de Blésignac.                               CAMIAC  bâti à Créon au sommet d'une colline,  en 1834, au milieu d'un vaste parc, est devenu, aujourd'hui, un hôtel 3 étoiles où vous apprécierez le confort de la vie de château.                                           La GORCE, c'est en 1821 que le corps de ferme a pris sa forme définitive avec la construction d'une belle chartreuse, sous la houlette de madame Gorce,  passe en 1980, à la famille de  Raoul Fabre.           CAMARSAC,   le prince Noir (Edouard de Woodstock) aida de son influence et de son  argent. Il y avait peu de temps qu'il était achevé lorsque Duguesclin, qui guerroyait dans l'Entre-Deux-Mers, s'en empara. Il fût acheté en 1407 par les frères Canteloup. En 1408, ils commencèrent à le faire restaurer. Le sénéchal ordonna à Monet de Canteloup de s'arrêter. La destruction fût ordonnée. Monet appela de la décision du sénéchal au roi d'Angleterre. Henri IV ordonna de surseoir à la démolition et autorisa la continuation des travaux. Puis succédèrent les Gères en 1495.","architecture":"Camarsac  construit au XIIe siècle, puis remanié aux XVe et XIXe siècles, est composé d'une forteresse médiévale adossée à une demeure du XVIIIe qui domine la cour de la même époque  au milieu de laquelle fût bâtie une maison forte, les seigneurs disparurent pendant les siècles suivants pour réapparaître au XIVe siècle, dès le XVe siècle, les meurtrières originelles furent remplacées par des fenêtres et des cheminées. Surtout au XVIIIe siècle Pierre de Gères fit construire un grand corp de logis contre la façade méridionale ainsi que toute la ferme agricole. Bâtisse rectangulaire de 15 par 17 mètres flanquée de quatre tourelles  divisées par deux murs de refend, portes à arc brisé, meutrières, baies géminées trilobées ont été remplacé par de larges ouvertures. Le grand comble et le chemin de ronde sur mâchicoulis ont été surélevés. Un colombier de style classique en forme de tour circulaire à peu de distance. Lensemble du château subit de « grandes réparations » en 1858, travaux qui ont donné au château, selon Léo Drouyn,  un grand aspect décoratif.                                                                  CAMIAC   Construit en 1834 de style néo-renaissance rectangulaire à deux niveaux sur soubassement et série de lucarnes avec des frontons retondant plus important sur celui du centre donnant sur un toit surélevé traversant l'édifice,  le toit en croupe flanqué sur les côtés latéraux de lucarnes jumelées, l'édifice est flanqué aux angles  de tourelles deux rondes et deux  hexagonales toit en poivrières, l'ensemble recouvert d'ardoises.                                                       La GORCE gentilhommière  avec tour de guet au centre du toit.","habitants":"Les frères Canteloup\r\n        \"","divers":"A Créon, château de Camarsac grav -1à 3, Camiac -4 à6, Blésignac  g-7, la Gorce g-8   par GPS : 44° 47' 20,32\" Nord et 0° 18' 32,98\" Ouest      Couteau 9","gps":"44° 47' 20,32\" Nord et 0° 18' 32,98\" Ouest      Couteau 9","images":["../../jctruffet.com/image/image_33/33_Cr%c3%a9on_1.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_2.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_3.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_4.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_5.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_6.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_7.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_8.jpg","../../jctruffet.com/image/image_33/33_Cr%c3%a9on_9.jpg"]},"Consult_chateau_formulaire0712":{"id":"Consult_chateau_formulaire0712","dept":"33","canton":"Andemos les Bains","commune":"Saint-Aubin de Médoc","nom":"Cujac_Villepreux","type":"Château","periode":"XVII","histoire":"deux châteaux à St-Aubin de Médoc, Cujac et Villepreux.                                                                CUJAC,  appartenaient à un chevalier nommé Pierre Lambert, dont la succession fut partagée en 1393 entre le Capel de Buch et Ays de Fronsac. La suite des seigneurs de Cujac n'a pas été conservée mais leur demeure appartenait au XVIIIe siècle à monsieur Peack de Peare, chanoine bénéficier, qui prélevait la dîme et qui fit construire une chapelle qui n'existe plus.  A sa mort, cette demeure fut vendue par ses surs, héritières, à monsieur Jacques Raby armateur à Bordeaux, qui vers 1780 fit construire le château actuel de Cujac . Cet édifice d'un beau caractère, présente une façade simple en pierre et en brique, sans tourelle ni pavillon. Il a les allures d'une villa italienne, en respectant dans ses plans, le plus pur style du XVIIIe siècle français.                            VILLEPREUX dit de Lasalle,vers 1308 Furst d'Ornon, Raymond Arnaud de Béarn de 1429  à 1439, à Gaillard de Domassan, écuyer, passa à Jean Sainxe et à la famille de Ferron puis jusqu'en 1601 dépendait des seigneurs de Blanquefort, passèrent ensuite aux Masparault, les de Raoul, les de Villepreux qui donna le nom au château, Pierre de Villepreux naquit en 1735 servit dans l'armée royale émigra à la Révolution, il décéda en 1817 dans son château qu'il avait récupéré. En 1824 Sieur Maisonnobe vendit au père Jean-Baptiste de Martres qui y installa un monastère trappiste jusqu'en 1838, il fut acquit par Charles Soissons, sa fille Jeanne épousa Charles Langlois leur fils possédait déja le château de Cujac. le château de villepreux reste dans cette famille jusqu'en 1962, vendut à la Sereb et de nos jours complexe hôtelier issue de l'aérospatiale.","architecture":"Cujac   Après la guerre de 1939-1945, il se trouvait quasiment en ruine ; le domaine viticole avait été entièrement détruit ; toute la vigne avait disparu et la propriété dans son ensemble était en état d'abandon. Depuis les années 50 les actuels propriétaires recréèrent un environnement forestier de qualité, bien entretenu, et procédèrent avec beaucoup d'efforts et de goût à la remise en état des bâtiments.      Villepreux le château f
