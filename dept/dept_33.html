","habitants":"Grégoire Jérôme de Chassaing\r\n        \"","divers":"Château de Beauséjour à Fargues","gps":"","images":["../../jctruffet.com/image/image_33/33_Beaus%c3%a9jour_1.jpg","../../jctruffet.com/image/image_33/33_Beaus%c3%a9jour_2.jpg","../../jctruffet.com/image/image_33/33_Beaus%c3%a9jour_3.jpg","../../jctruffet.com/image/image_33/33_Beaus%c3%a9jour_4.jpg"]},"Consult_chateau_formulaire81ca":{"id":"Consult_chateau_formulaire81ca","dept":"33","canton":"Langon","commune":"Arbis","nom":"Benauges","type":"Forteresse","periode":"XIII-XIV","histoire":"Deux châteaux à Arbis celui de benauge et le Vert.     BENAUGE,   demeure seigneuriale des vicomtes puis comtes de Benauges et celle des vicomtes de Bezaume. Au XIIe siècle, le vicomte de Gabarret est propriétaire du château. Au XIIIe siècle, le château est possession de la famille Bouville.  En 1254, Henri III, Roi d'Angleterre et duc d'Aquitaine, attaque le château suite à la révolte de Pierre de Bouville. En ce milieu du XIIIe siècle, construction de l'actuel château fort. Une garnison Anglaise réside dans ce bastion. En 1266, le futur Roi Edouard Ier, donne le château à un de ses fidèles : Jean de Grailly, sénéchal de Gascogne, En 1453, à la fin de la guerre de cent ans, ce bastion anglais est donné au royaume de France.  les héritiers les Foix de Candale  à celle des ducs d'Épernon au début du XVIIe siècle puis, depuis le début du XXe siècle, à la famille Journu.  Au XVIIe siècle, le château est fortement remanié pour le confort de ses habitants, est inscrit au titre des M.H. depuis 1995.                        Le  VERT  Si la mention du domaine du Vert, ancien domaine seigneurial, apparaît pour la première fois dans les archives en 1676, le château actuel est plus récent; il date des XVIIIe et XIXe siècles. Lacquisition du domaine, en 1804, par un capitaine irlandais, témoigne tout à la fois de son admirable situation et de lintérêt architectural de lédifice principal.","architecture":"BENAUGE, forteresse médiévale  construite au XIIIe et XIVe siècles et réaménagé au XVIIe et XVIIIe siècles,  témoin majeur de la fortification médiévale en Aquitaine et l'une des forteresses les plus importantes de la Gironde, le château occupe le sommet d'une motte castrale combinant fossés, lices, terrasses, donjon, chapelle, deux enceintes renforcées de tours et bâtiments divers, la ronde tour flanquée dans le rempart. Bien qu'elle ne soit pas très imposante, elle semble être la tour maîtresse du château. L'absence de mâchicoulis et de crénelage me fait supposer que la tour a été partiellement arasée. La toiture a certainement été posée au XVIIIe siècle . la construction hexagonale a disparu.\r\nl'entrée est fortifiée. Celle-ci est englobée dans une tour carrée avec, sur plusieurs faces, des archères cruciformes à croix pattée.  L'encadrement de la porte prouve qu'un pont-levis avait été aménagé. Voila un système défensif classique et efficace. Pas de trace de système à encorbellement comme une bretèche  ou des mâchicoulis. Il est vrai que cette tour-porte semble partiellement arasée, pas les traces des flèches de relevage du pont-levis. les archères sont positionnées à leur emplacement théorique.  La présence de trous circulaires avec un rebord font penser que la tour a été certainement transformée en pigeonnier.             VERT, ce dernier, une maison de maître élevée au XVIIIe siècle, constitue lactuelle partie à un étage du bâtiment orientée nord-sud. Des travaux réalisés durant la première moitié du XIXe siècle : une aile dhabitation orientée est-ouest, à deux étages, forme un angle droit avec la construction initiale. Cette dernière est dès lors dédiée au logement des domestiques tandis que la partie moderne, imposante, constitue la résidence des propriétaires. Sa façade en pierre de taille est ornée de moellons et son toit à longs pans est surmonté dune tourelle à toit conique.","habitants":"Famille Bouville\r\n        \"","divers":"Benauge grav-1 à 7  GPS : 44° 39' 53\" Nord et 0° 16' 04\" Ouest                                                                    Vert grav-8-9.","gps":"44° 39' 53\" Nord et 0° 16' 04\" Ouest","images":["../../jctruffet.com/image/image_33/33_Benauge_1.jpg","../../jctruffet.com/image/image_33/33_Benauge_2.jpg","../../jctruffet.com/image/image_33/33_Benauge_3.jpg","../../jctruffet.com/image/image_33/33_Benauge_4.jpg","../../jctruffet.com/image/image_33/33_Benauge_5.jpg","../../jctruffet.com/image/image_33/33_Benauge_6.jpg","../../jctruffet.com/image/image_33/33_Benauge_7.jpg","../../jctruffet.com/image/image_33/33_Benauge_8.jpg","../../jctruffet.com/image/image_33/33_Benauge_9.jpg"]},"Consult_chateau_formulaire5acd":{"id":"Consult_chateau_formulaire5acd","dept":"33","canton":"Blaye","commune":"Berson","nom":"Berson","type":"Château","periode":"XIII-XVII","histoire":"Plusieurs châteaux à Berson  celui de Ponton, de Puynard, de Rebouquet.\r\nPONTON, bâti à Berson, Ralluy-Pérrinot, et de la famille  de Boisset.\r\nPUYNARD,  bâti à Berson, gérant Andrew Eakin,  lhistoire de cet élégant château remonte au XIIIe siècle. Depuis 2002, cest Nicolas Grégoire qui est aux commandes du château. Au sein des vignobles  il travaille à faire du « château Puynard » un domaine.\r\nBOISSET  maison forte de M. et Mme Pujo,  date des XVe et XVIIe siècles. Elle est inscrite M.H.depuis 2002.","architecture":"BOISSET, maison forte du XVe siècle avec tour carré en angle et tour polygonales crénelées à mâchicoulis sur une façade oblong toitres en tuiles sur l'ensemble.   PUYNARD, corps de logis oblong à deux niveaux toit presque plats flanqués de deux tours rondes excentrées en façades toits en poivrières.","habitants":"PontonFamille  de Boisset                                      Puynard  Famille Nicolas Grégoire                                  Boisset  M. et Mme Pujo\r\n        \"","divers":"à Berson  celui de Puynard-1, de Boisset -2-3, de Rebouquet 4-5 .                          Poton -Puynard  45° 06' 32\" Nord et 0° 35' 08\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Berson_1.jpg","../../jctruffet.com/image/image_33/33_Berson_2.jpg","../../jctruffet.com/image/image_33/33_Berson_3.jpg","../../jctruffet.com/image/image_33/33_Berson_4.jpg","../../jctruffet.com/image/image_33/33_Berson_5.jpg"]},"Consult_chateau_formulaire2f05":{"id":"Consult_chateau_formulaire2f05","dept":"33","canton":"Lesparre-Médoc","commune":"St-Julien de Beychevelle","nom":"Beychevelle","type":"Palais","periode":"XVI-XVII","histoire":"BEYCHEVELLE,  au XIVe siècle Archambaud de Grailly  seigneur par son mariage avec Isabelle de Foix  est à l'origine de la deuxième lignée  du comté de Foix, en 1565 le château a été construit, pour l'évêque François de Foix-Candale, par alliance en 1587 sa nièce épouse Jean Louis de Nogaret de la Valette, premier duc d'Épernon, grand amiral de France et mignon du roi Henri III, et surtout gouverneur de Guyenne. Il devient alors propriétaire des lieux au début du XVIIe siècle. A la mort de Bernard d'Epernon duc en 1661 le fief revient à la couronne qui le revend à la famille d'Abadie. Le château est réédifié en 1757 par le marquis de Brassier. La famille de Brassier, baron de Beychevelle le céde à Jacques Conte en 1800 qui le cédera à son tour à son neveu P.F.Guestier; le domaine est acquis en 1875 par le banquier Armand  Heine ancêtres des Fould devienne propriétaire, deviendra la dynastie de la famille Achille-Fould qui dès 1890, et sur trois générations avec notamment Aymar Achille-Fould, sera à l'origine du prestige de Beychevelle. En 1986, à la mort de ce dernier, la GMF et Suntory rachètent l'ensemble du domaine à la famille Achille-Fould.                        LAGRANGE, magnifique chateau construit en 1545 par un aristocrate français. Le chateau a préservé son image de prestige au fil du temps, occupé par des générations de familles de laristocratie française.\r\nIl a ensuite été rénové très préciseusement en 1992 en respectant son identité et soulignant son attachement au XVIIIe siècle.","architecture":"BEYCHEVELLE, a succédé à un édifice médiéval   en 1757 reconstruction du château sous la forme d'une chartreuse sur une vaste terrasse fortement réhaussées sur une assise de plan allongé plus chartreuse que château à un niveau plus apport  de deux pavillons latéraux à toits d'ardoise, côté parc en façade avant corps légèrement en saillie orné d'un fronton triangulaire. la construction centrale, coiffée d'un toit en tuiles plates bordés d'une balustrade qui rejoint les deux pavillons construits du temps du duc d'Epernon. Du côté de la cour, fermée par une grille entourée de pilliers portant des lions de pierre, ces pavillons  sont prolongés par les bâtiments d'exploitation restauré récemment dans son classicisme premier, Beychevelle est sans aucun doute d'un des plus beaux châteaux et parcs du bordelais. L'actuel propriétaire du château est le groupe castel à 50 % , en partenariat avec le groupe Japonais Suntory.                                                   LAGRANGE de style maison forte  avec quatre tours arrasées deux rondes et deux carrées corps de logis rectangulaires à deux niveaux et lucarnes sur un toits brisés.","habitants":"Famille de Brassier\r\n        \"","divers":"Château de Beychevelle grav-1 à 5  et de Lagrange 6 à St-Julien de Beychevelle","gps":"","images":["../../jctruffet.com/image/image_33/33_Beychevelle_1.jpg","../../jctruffet.com/image/image_33/33_Beychevelle_2.jpg","../../jctruffet.com/image/image_33/33_Beychevelle_3.jpg","../../jctruffet.com/image/image_33/33_Beychevelle_4.jpg","../../jctruffet.com/image/image_33/33_Beychevelle_5.jpg","../../jctruffet.com/image/image_33/33_Beychevelle_6.jpg"]},"Consult_chateau_formulaire1f68":{"id":"Consult_chateau_formulaire1f68","dept":"33","canton":"Castillon-la-Bataille","commune":"St-Quentin de Baron","nom":"Bisqueytan","type":"Forteresse","periode":"XII-XV","histoire":"BISQUEYTAN, bâti à Saint-Quentin-de-Baron,  la cosntruction  date du XIIe, XVe et XVIe siècle. Il a été commandé pour Jean de Pii,  En  1751 le 17 mars, Montesquieu achète le château de Bisqueytan en copropriété avec M. Jean-Joseph de Cursol, chevalier seigneur de Bellefontaine.  En  1754, haut et puissant seigneur messire Charles de Secondat de Montesquieu, chevalier, baron de Montesquieu et de La Brède, seigneur de Goulard-Raymon, coseigneur de Bisqueytan et autres places, en 1756 Jean Baptiste de Secondat, chevalier, baron de La Brède et Montesquieu, seigneur de Raymon, coseigneur de Bisqueytan, en  1826 décès de Joseph Cirile de Segondat, baron de Montesquieu, il était marié avec la dame Henriette de Menou. Son père était Godefroy de Secondat de Montesquieu 1702-1774, marié à Denise de Secondat de Montesquieu 1727-1800, fille de Charles. En  1826, Marie Jean Gratien Godefroy Albert de Secondat de Montesquieu devient propriétaire, par succession de son père en 1867. Achat par Jean Mauvezin ainé.  Les éléments protégés sont le château, ses fossés, son pigeonnier et les restes du moulin ainsi que les vestiges d'établissements antérieurs et abris sous roche, inscrits aux M.H. du 4 novembre 1996. Le château de Bisqueytan est privé et fermé au public.","architecture":"Château de Bisqueytan est une ancienne place forte de Guyenne périodes de construction , XIIe siècle , XVe siècle, XVIe siècle; architecte ou maître d'oeuvre, Piis Jean  auteur commanditaire. On y trouve des vestiges de chapelle roman-gothique, de chemin de ronde, de morceaux de remparts, des traces de douves, des survivances de l'appareil romain ancien oppidum, un gisement paléontologique et préhistorique magdalenien avec pointes, racloirs, burins, lames, une trace de sanctuaire gaulois avec chaudron d'incantation, une tour pigeonnière. Dans le ravin, profond de 20 m, dans des calcaires à astéries, se trouvent les grottes \" de Jaurias\".","habitants":"Charles de Secondat de Montesquieu\r\n        \"","divers":"A St-Quentin de Baron le château de Bisqueytan  44° 49' 02\" Nord et 0° 17' 10\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Bisqueytan_1.jpg","../../jctruffet.com/image/image_33/33_Bisqueytan_2.jpg","../../jctruffet.com/image/image_33/33_Bisqueytan_3.jpg","../../jctruffet.com/image/image_33/33_Bisqueytan_4.jpg"]},"Consult_chateau_formulaireb89d":{"id":"Consult_chateau_formulaireb89d","dept":"33","canton":"Eysines","commune":"Blanquefort","nom":"Blanquefort_33","type":"Vestiges","periode":"XIII","histoire":"BLANQUEFORT, au XIIIe siècle, la famille de Blanquefort était l'une des plus puissantes de Guyenne qui s'éteint vers 1250, faute de descendance. Henri III puis Édouard Ier, rois d'Angleterre et ducs d'Aquitaine, font l'acquisition du château et des terres  en 1254. La capitale régionale est entourée de châteaux ; Blanquefort devient le fleuron de ce dispositif défensif, verrouillant le nord de la cité et contrôlant l'accès fluvial.  Édouard II cède la seigneurie de Blanquefort à Bertrand de Got, neveu du pape Clément V, en 1308. Par héritage, elle revient à Aymeri de Durfort, seigneur de Duras, en 1325.  Antoine de Chabannes, comte de Dammartin a reçu la forteresse en donation. Le château est rendu en 1476 à la famille de Durfort après que celle-ci eut prêté serment de fidélité à la couronne de France. La famille conserve le château jusqu'à la Révolution Française, mais elle l'abandonne comme lieu de résidence au XVIIe siècle. La forteresse connaît ses derniers combats durant les guerres de religion. Après la Fronde, à laquelle les seigneurs ont été mêlés, le crénelage est rasé sur ordre du Cardinal Mazarin, premier ministre du jeune Louis XIV. L'assèchement des marais à cette époque supprime la principale défense naturelle du château qui, à l'époque des citadelles de Vauban, semble obsolète.","architecture":"Blanquefort,  le premier château construit au XIe siècle il en subsiste une enceinte peu élevée de grosses tours munies de canonières. À la fin du XIIIe siècle, les rois-ducs entreprennent une campagne d'agrandissement qui transforme le modeste château seigneurial en forteresse royale anglaise. Le donjon double de superficie par le flanquement de six tours formant une terrasse sommitale.  Devant le pont-levis, une petite barbacane contrôle la voie. C'est peut-être à cette époque que la rectiligne route romaine est détournée pour contourner le château plutôt que de passer trop près du donjon. L'émergence rocheuse étant de taille modeste, deux petites salles souterraines sont creusées sous la cour du château pour servir de lieux de stockage. Après la guerre de cent ans, le roi de France Charles VII fait adapter le bâtiment à l'artillerie : des canonnières sont ainsi creusées sur l'emplacement d'anciennes archères. D'autres modifications sont apportées, comme l'aménagement d'une tour en escalier avec une entrée monumentale remplaçant l'ancien accès médiéval dérobé aux regards. Cette entrée est surmontée d'un gâble qui portait, jusqu'à ce qu'elles soient martelées à la Révolution, les armes des Durfort-Duras.","habitants":"Famille de Durfort\r\n        \"","divers":"Forteresse de Blanquefort grav de 1 à 5.","gps":"","images":["../../jctruffet.com/image/image_33/33_Blanquefort_33_1.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_33_2.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_33_3.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_33_4.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_33_5.jpg"]},"Consult_chateau_formulaire94df":{"id":"Consult_chateau_formulaire94df","dept":"33","canton":"Eysines","commune":"Blanquefort","nom":"Blanquefort_33_II","type":"Château","periode":"XVI-XVIII","histoire":"A Blanquefort le château Dillon, Déhez, Saint-Ahon,  Cambon, Terrefort, Dulamon,  Majolan,  Fongravey (voir  article), Port et  Grattequina,  et à deux K.m au Nord à Caychac le château de Cholet.   DILLON  du XVIIe et au tout début du XVIIIe siècle (avec des remaniements au XIXe siècle). Inscrit M.H.1984. Il abrite aujourd'hui le lycée viticole de Blanquefort.  Une maison forte, le château Terrefort,  existait à cet endroit, au lieu-dit Terre-Fort  appartenant alors à Marie-Jeanne Seignouret sont louées le 16 novembre 1923.                                                                            St-AHON, propriété de Charles de Montesquieu au XVIIIe siècle.                                                                  DEHEZ  bâti à Blanquefort, Le président au parlement Jean-Baptiste Mercier Dupaty possédait, à la veille de la Révolution, le château et domaine du Dehez où est né un de ses fils Emmanuel poète et auteur dramatique (1775-1781), membre de l'Académie Française.\r\nDULAMON  (école technique): de PA   bâti à Blanquefort,  Le château Dulamon, construit vers 1865, presque à la même place que l'ancien château fort du Luc, anciennement la propriété de la famille Dulamon. Depuis 1945, est la propriété de l'uvre des Orphelins Apprentis d'Auteuil, une école technique, depuis 1948.","architecture":"DILLON, maison forte, le château Terrefort, château Dillon a été construit à la fin du XVIIe siècle et au tout début du XVIIIe siècle et le puits porte inscrit la date de 1705. Le château a été modifié au début du XIXe siècle,  possède des éléments remarquables dont le portail d'entrée, sa grille et un puits. Les façades et les toitures ainsi que la cage d'escalier, l'escalier et sa rampe en fer forgé, inscrit M.H. le 5 décembre 1984.  En 1953 le ministère de l'agriculture rachète les terres. Devenu école régionale d'agriculture le 2 décembre 1955, il se transforme en lycée agricole de Bordeaux-Blanquefort                                                                  St-AHON, le château est aujourdhui classé MH.  Après avoir été détruit sous la Révolution Française, il sera reconstruit sous le 1er Empire, puis restauré en 1875 par larchitecte Alphonse Blaquière, dans le style Louis XIII tel que vous pouvez le voir aujourdhui.          PRIGNAC, le château Tour Prignac fait référence aux tours qui ornent le château,  son histoire remonte au XVIe siècle, période durant laquelle la seigneurie de Lesparre est à la tête du domaine. Cest en 1856 que M. Seignouret construit le château. En 1935, ce domaine est vendu au duc Del Infantado et de Francavilla, général de larmée espagnole.     CHOLLET  bâti à Caychac, appelé le Clos Cora Morton de Cora Laparcerie, bru de Jean Richepin puis ultérieurement de la famille Morton.","habitants":"Dillon Marie-Jeanne Seignouret                             Bareyres Famille Castel\r\n        \"","divers":"A Blanquefort le château Dillon de 1 à 4, Déhez, Saint-Ahon,  Cambon, Chollet-7 Terrefort, Prignac-6 Dulamon,  Majolan,  et à deux K.m au Noed à Caychac le château de Cholet.","gps":"","images":["../../jctruffet.com/image/image_33/33_Blanquefort_II_1.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_II_2.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_II_3.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_II_4.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_II_5.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_II_6.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_II_7.jpg"]},"Consult_chateau_formulaire755d":{"id":"Consult_chateau_formulaire755d","dept":"33","canton":"Eysines","commune":"Blanquefort","nom":"Blanquefort_33_III","type":"Château","periode":"XVIII-XIX","histoire":"FONGRAVEY,  bâti à Blanquefort, sa construction du du XVIIIe siècle. Le consul de Hambourg à Bordeaux, Daniel Christophe Meyer, fit édifier, vers 1780, une villa à litalienne, au lieu-dit Fongravey, pour en faire sa résidence secondaire. Au cours des XIXe et XXe siècles, le château de Fongravey accueillit un hôte célèbre : Le poète allemand Peter Holderlin (1770-1843) qui fut le précepteur des enfants Meyer.  Fongravey est depuis animé par des équipements sportifs, un street park et un centre de lenfance.           GRAND-CLAPEAU, bâti à Blanquefort,  Élysée Aviragnet, né le 30 juillet 1828 à Port-Louis (Ile Maurice) et mort en 1908 à Lewisburg (Pennsylvanie), où il a été directeur de la Bucknell School of Music. Avec sa famille, il a été propriétaire du château du Grand Clapeau à Blanquefort (village de Caychac).\r\nGRATTEQUINA, le domaine du XIXe siècle, hôtel restaurant.","architecture":"FONGRAVEY, de style Louis XVI, le plan est simple: un quadrilatère de deux niveaux avec un étage dattique et un toit-terrasse. Le porche est pourvu dun portique à colonnes. La façade est remaniée par la suite au cours des XIXe et XXe siècles. Le parc paysager entourant le château de Fontgravey possède un jardin régulier  actuellement animé par des équipements sportifs, un street park ainsi qu'un centre de lenfance.                                                                   TERREFORT bâti à Blanquefort.\r\nGRATTEPINA hôtel le domaine du XIXe siècle de plan rectangulaire à deux niveaux sur soubassement série de lucarnes sur un toit brisé et au centre de chaque façades une lucarne à aileron, acrotères et galbe imposant fronton triangulaire  nue.","habitants":"Daniel Christophe Meyer\r\n        \"","divers":"Château de Grattepina de 4-5, Fontgravey-1-2.  GPS : 44° 54' 98\" Nord et 0° 38' 83\" Ouest                   Clapeau GPS / 44° 54' 41\" Nord et 0° 38' 11\" Ouest","gps":"44° 54' 98\" Nord et 0° 38' 83\" Ouest                   Clape","images":["../../jctruffet.com/image/image_33/33_Blanquefort_III_1.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_III_2.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_III_3.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_III_4.jpg","../../jctruffet.com/image/image_33/33_Blanquefort_III_5.jpg"]},"Consult_chateau_formulaireba1f":{"id":"Consult_chateau_formulaireba1f","dept":"33","canton":"Pineuilh","commune":"Blasimon","nom":"Blasimon","type":"Forteresse","periode":"XIV","histoire":"BLASIMON,  dit du moulin de Labarthe  semble remonter au bas  du Moyen-Age. Edifié au XIIIe siècle, on atteste de sa reconstruction au XIVe siècle époque où il était rattaché à l'abbaye de Blasimon.\r\nCe moulin eut une place particulière dans lhistoire, il fut notamment inclu dans la rançon de François Ier à Charles Quint à lissue de la bataille de Pavie, ce moulin, construit au XIVe siècle appartenait à labbaye de Blasimon. Désaffecté, il est aujourdhui classé au titre des M.H. par arrêté du 11 avril 1926.","architecture":"BLASIMON, bâti comme une maison forte, de plan carré, il présente six niveaux.  Les 3e et 4e étages étaient réservés aux logements et le 5e est formé par le chemin de ronde établi au-dessus des mâchicoulis, une tourelle descalier fut rajoutée au XVe siècle.  Il est construit en pierre dure de Frontenac. Le premier est létage comprend les meules (côté sud-ouest), cette partie est resté préservée est occupe une surface de 50m2 environ. Les autres étages ont été réaménagés par les derniers propriétaires du moulin et ne concervent plus le charme dantan mais sont équipés pour répondre au confort moderne. Pour autant les hauteurs sous plafond à certain étages sont toujours comprises entre 3 et 4 mètres. La tour a concervé son escalier à vis qui relie les cinq niveaux. Son diamètre est de 2,76 m et sa hauteur totale est de 10,49 m.Le moulin possédait deux roues hydrauliques, lune horizontale liée à lactivité meunière et lautre verticale qui actionnait une batterie de foulon.","habitants":"labbaye de Blasimon\r\n        \"","divers":"Moulin de Labarte à Blasimon","gps":"","images":["../../jctruffet.com/image/image_33/33_Blasimon_1.jpg","../../jctruffet.com/image/image_33/33_Blasimon_2.jpg","../../jctruffet.com/image/image_33/33_Blasimon_3.jpg"]},"Consult_chateau_formulaire0996":{"id":"Consult_chateau_formulaire0996","dept":"33","canton":"Blaye","commune":"Blaye","nom":"Blaye_Citadelle","type":"Citadelle","periode":"XVII-XIX","histoire":"BLAYE, est un complexe militaire de 38 hectares bâti entre 1685 et 1689 par l'architecte François Ferry, directeur général des fortifications de Guyenne, sous la supervision de Vauban.  Elle forme un vaste ensemble fortifié entouré de courtines, complété par quatre bastions et trois demi-lunes.  Le château fort des Rudel est un ancien château bâti à Blaye, intégré dans la citadelle  par Vauban afin de servir de logis au gouverneur militaire de la place Inscrit au patrimoine mondial de l'humanité par l'Unesco (citadelle de Blaye). Le château des Rudel fut l'une des résidences du jeune roi d'Aquitaine Caribert II au VIIe siècle. Cet édifice est remplacé par un nouvel édifice, au début du XIIe siècle, sous l'impulsion du nouveau maître de la ville, le seigneur Wulgrin Rudel dont Jaufré de Rudel troubadour  y vit le jour.","architecture":"Le château de Rudel dans la citadelle, de style médiéval. L'ancien château fort des seigneurs de Blaye du  XIIe siècle est intégré à la citadelle par Vauban au XVIIe siècle.  La position stratégique de la ville  explique l'établissement d'un château fort dès le début du Moyen-Âge. Cet édifice est remplacé par un nouvel édifice à l'aube du XIIe siècle sous l'impulsion du nouveau maître de la ville, le seigneur Wulgrin Rudel. Connu sous le nom de château des Rudel, il est toujours visible de nos jours, quoique fortement endommagé. Sa structure originelle, triangulaire, comprend six tours : la Tour des Rondes, la Tour de l'Aiguillette, la Tour de Diane, la Tour de la Cloche, la Tour des Archives, la Tour de la Porte et le donjon. Trois corps de logis encadrent une cour centrale abritant un puits, et les portes dit de Dauphine, Royale, Liverneuf,  imposants remparts transformé en logis pour les gouverneurs militaires de la place, il est partiellement remanié au XVIIe siècle. Abandonné à partir de 1820, Les altières  murailles abritent aussi le couvent  des minimes son cloitre de 1610 et son hôpital. Le château bénéficie de travaux de restauration d'urgence depuis 2005.","habitants":"roi d'Aquitaine Caribert II                                             Maréchal de Vauban\r\n        \"","divers":"Citadelle de Blaye  Rudel : 45° 07' 48\" Nord, 0° 39' 57\" Ouest   Saugeron  45° 07' 43\" Nord et 0° 39' 40\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Blaye_Citadelle_1.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_2.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_3.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_4.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_5.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_6.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_7.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_8.jpg","../../jctruffet.com/image/image_33/33_Blaye_Citadelle_9.jpg"]},"Consult_chateau_formulaire1102":{"id":"Consult_chateau_formulaire1102","dept":"33","canton":"Blaye","commune":"Blaye","nom":"Blaye_Cussac","type":"Château","periode":"XVIII","histoire":"Les châteaux à Blaye , Lagrange, les Moines, Saugeron, Peybonhomme,  Pontet-Herans voir article. LAGRANGE, le vignoble du château de La Grange a été acquis en 1970.  par Olivier Lacoste et sa sur Laure.                                                                            LES-MOINES,  Jean, Alain et Bertrand Carreau forment trois générations de vignerons poursuivant avec affection cette culture transmise par de nombreux ancêtres où l'un des leurs finit par s'ancrer au château les Moines dans les Années 1900.                    SAUGERON,  bâti à Blaye, aujourd'ui maison de retraite.\r\nPEYBONHOMME, Catherine et Jean Luc Hubert sont propriétaires du château Peybonhomme les Tours ainsi que du château la Grolet.                                    M.F des PRAT  Issue dun premier bâtiment médiéval lié à la défense de Blaye, cette grosse maison forte a visiblement appartenu à une famille noble. Possession, au XVIIIe siècle, de l'abbé de Saint Sauveur de Blaye, elle fut vendue comme bien national sous la Révolution, puis transformée en ferme au cours du XIXe siècle, avant faute d'entretien, de tomber presque en ruines au cours du XXe siècle.","architecture":"LAGRANGE de style néo renaissance  à deux niveaux sur soubassement   lucarnes sur toitures et pavillons et tourelle crénelées à mâchicoulis.                       PEYBONHOMME Le domaine est situé sur une colline qui domine lestuaire, le vignoble occupant ses flancs. De sa tour crénelée du XVIIe siècle, nous avons une vue imprenable à 360° sur lensemble du domaine et lestuaire de la Gironde.                                                  Maison forte les Prat cette maison du XVIe siècle est vendue comme bien national pendant la Révolution. Depuis quelques années son nouveau propriétaire la restaure avec les techniques de l'époque : L'édifice est inscrit à l'inventaire supplémentaire des M.H.   Le château du Prat adopte la forme d'un quadrilatère encore ceint aux trois quarts de larges douves en eau. Son plan consiste en deux corps de logis, parallèles et d'inégale importance, reliés à l'origine par des courtines délimitant une cour entièrement close. Le corps de logis principal, doté d'un étage et renforcé de trois tours, dont celle abritant l'escalier, conserve, outre ses fenêtres du XVIe siècle, plusieurs cheminées anciennes du XVIe et XVIIIe siècle, ainsi que des traces de décor peint sur certaines poutres.","habitants":"Lagrange  Bertrand Carreau                                         Pontet Aurélien Perrier \r\n        \"","divers":"châteaux à Blaye , Lagrange g-3-4, les Moines,  Pontet-Herans.  Peybonhomme- 5  Prat-7  Seglan-6   Saugeron  45° 07' 43\" Nord et 0° 39' 40\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Blaye_Cussac_1.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_2.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_3.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_4.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_5.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_6.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_7.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_8.jpg","../../jctruffet.com/image/image_33/33_Blaye_Cussac_9.jpg"]},"Consult_chateau_formulaire3d56":{"id":"Consult_chateau_formulaire3d56","dept":"33","canton":"Langon","commune":"Bommes","nom":"Bommes","type":"Château","periode":"XVIII-XIX","histoire":"RAYNE-VIGNEAU, bâti à Bommes, date de 1379. Il fut remplacé par un nouveau château, au XIXe siècle, construit pour Michel Garros. M. de Roton, co-propriétaire, a découvert en 1925 de nombreuses pierres dites précieuses dans ses vignes (agates, jaspe, onyx). Cette collection comporte 12 000 pièces, dont 2 000 taillées. Elles proviennent d'huitres fossiles trouvées dans un banc marneux d'une longueur à peine de 200 mètres sur 10 à 20 mètres de largeur.\r\nTOUR BLANCHE , signalé en 1600 appartient à Jean St-Marc, trésorier général de France. Le nom du château la Tour Blanche vient du premier propriétaire du domaine, monsieur de Latour Blanche, écuyer-conseiller au parlement de Bordeaux. Acquis par Daniel Iffla, surnommé Osiris, en 1876, la propriété de la Tour Blanche fut léguée à l'état français à sa mort en 1907. Dans un codicille à son testament, il avait émis la volonté que soit créée sur le domaine une école de viticulture et de vinification. Le ministère de l'agriculture en devient propriétaire en 1909 et, selon les conditions fixées pour cette donation, dès 1911 une école saisonnière de viticulture et d'nologie fut ouverte aux enfants de la région. Le dernier propriétaire, Osiris, en fit don à létat à sa mort. Le château de la Tour Blanche est devenu un lycée agricole.","architecture":"RAYNE comme le château Grand-Puy Ducasse, le domaine a été racheté en 2004 par le crédit agricole. Le château, son parc avec ses aménagements ont été inscrits aux M.H.par arrêté du 19 avril 2004. Il a été construit par Louis-Michel Garros pour M. Pontac à la fin du XIXe siècle.                                                         La TOUR BLANCHE continue à la fois à produire un sauternes renommé et à prodiguer un enseignement sous la forme d'un lycée professionnel agricole. Il faut toutefois, aujourd'hui, distinguer le château du lycée. En effet, seul le lycée reçoit une aide financière pour son fonctionnement. Le château agit lui comme un domaine viticole normal, c'est-à-dire qu'il y a systématiquement réinvestissement de la vente de la production dans le château.","habitants":"M. de Roton                                                                 Monsieur de Latour Blanche\r\n        \"","divers":"A Bommes le château de Rayne-Vigneau de  1 à 3  et de la Tour-Blanche gracv de 4-5   : 44° 32' 50,63\" Nord, 0° 20' 40,38\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Bommes_1.jpg","../../jctruffet.com/image/image_33/33_Bommes_2.jpg","../../jctruffet.com/image/image_33/33_Bommes_3.jpg","../../jctruffet.com/image/image_33/33_Bommes_4.jpg","../../jctruffet.com/image/image_33/33_Bommes_5.jpg"]},"Consult_chateau_formulairea62a":{"id":"Consult_chateau_formulairea62a","dept":"33","canton":"Coutras","commune":"Bonzac","nom":"Bonzac","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Bonzac, l'Arc, Chevalier, Lagrave, Madeleine, Montfavier, Peyraud et Trincaud, ARC du XVIIIe siècle, propriété d'Élie Decazes. ami, conseiller, puis ministre du Roi Louis XVIII sous la Restauration. Contraint de démissionner de son ministère en 1820, Elie Decazes devient ambassadeur en Angleterre.\r\nCHEVALIER, néo-gothique, du XIXe siècle.La mairie, construite au XIXe siècle, englobe la tour d'un ancien moulin à vent.                                                       FRINCAUD néogothique anglais. Lieu de tournage du film 'Thérèse Desqueyroux' avec Audrey Tautou, en 2012. Ancienne propriété d'Alfred Lacazedès 1857.  LAGRAVE du XIXe siècle, propriété d'Élie Decazes.\r\nMADELEINE, du XVIIIe siècle, depuis 1910, la propriété appartient à la famille Trochu.\r\nMONTFAVIER,  du XVIIe siècle. Lieu de tournage de 'La mariée était trop belle' en 1956 avec Brigitte Bardot. Construit pour la famille Georges. Et pendant plusieurs générations c'est la propriété de la famille Richon.                                                                      PAYRAUD, la famille Vallet de Payraud s'y installe en 1496. L'histoire de Bonzac est liée à celle des Decazes. Élie Decazes, duc et pair de France, transforma au XIXe siècle la maison familiale en demeure.","architecture":"PEYRAUD, juché sur un piton rocheux qui domine le paysage alentour, il continue d'imposer sa stature noble malgré les méfaits du temps. La tour s'élance vers le ciel, surplombant une source d'eau fraîche intarissable qui a donné son nom au château Payraud vient de \" Pierre à eau \" d'où la variante \" Peyraud \" que l'on trouve parfois.                                                   ARC, l'architecture, peu commune en Gironde, est inspirée de lAngleterre, doit son apparence actuelle à Elie Decazes,  Il admire probablement larchitecture locale et sen inspire à son retour en France, cest ce qui pourrait expliquer la silhouette originale du château de lArc, qui se dresse en bordure de lIsle, et semble adopter au XIXe siècle les caractéristiques de larchitecture britannique de style Tudor. Le domaine de LArc produit aujourdhui du vin, en vente directe au château.","habitants":"Payraud Famille Vallet de Payraud                         Madeleine Famille Trochu                                         Arc  Famille   d'Élie Decazes\r\n        \"","divers":"Châteaux à Bonzac , l'Arc grav-1- de Bonzac, grav-4, Chevalier, Lagrave-3, Monfavier-5  Madeleine, Montfavier Peyraud-6-7 , Trincaud-8-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_Bonzac_1.jpg","../../jctruffet.com/image/image_33/33_Bonzac_2.jpg","../../jctruffet.com/image/image_33/33_Bonzac_3.jpg","../../jctruffet.com/image/image_33/33_Bonzac_4.jpg","../../jctruffet.com/image/image_33/33_Bonzac_5.jpg","../../jctruffet.com/image/image_33/33_Bonzac_6.jpg","../../jctruffet.com/image/image_33/33_Bonzac_7.jpg","../../jctruffet.com/image/image_33/33_Bonzac_8.jpg","../../jctruffet.com/image/image_33/33_Bonzac_9.jpg"]},"Consult_chateau_formulaire78f1":{"id":"Consult_chateau_formulaire78f1","dept":"33","canton":"Bordeaux","commune":"Bordeaux","nom":"Bordeaux_ Gallien","type":"Vestiges","periode":"XIV","histoire":"GALLIEN, Au Moyen-Âge, la tradition populaire fait de Galiène, reine légendaire de Bordeaux, la femme de Charlemagne. Celui-ci était si amoureux qu'il lui aurait fait construire un palais grandiose. C'est ainsi qu'en 1367, limpressionnante ruine des arènes se voit attribuer le nom de « Palais Galien». Cette attribution est aujourd'hui reconnue comme erronée, l'édifice étant bien un amphithéâtre romain. Au XVIe siècle, Élie Vinet se rend compte que le « palais » était en fait un colisée romain mais se laisse abuser par la paronymie entre Galien et Gallien et en attribue la paternité à l'empereur romain. Cette thèse reste défendue. Cependant, la technique de construction semble antérieure au règne de cet empereur. Des monnaies de Gallien, Tetricus et Postume ont été découvertes dans les fouilles de l'édifice, ainsi que des tessons de céramique du IIIe siècle, mais on y a aussi découvert un bronze du règne de l'empereur Trajan, ce qui suggère qu'il était opérationnel au IIe siècle. Un programme de fouilles, en 2010-2011 a permis de dater plus précisément le monument. La plaque de rue de la place Galiène conclut ainsi : « La femme était une chimère, le palais un mythe, l'empereur Gallien un imposteur malgré lui »                                      TROMPETTE, bâti à Bordeaux,  Il fut construit au XVe siècle, après la guerre de cent ans, à l'époque du roi Charles VII.  Construit avec le Fort du Hâ (à lemplacement du Palais de Justice), il permettait de surveiller Bordeaux et d'assurer sa défense. Après la bataille de Castillon en 1453, la ville de Bordeaux passe après trois siècles de domination anglaise  sous l'autorité des rois de France.","architecture":"Après la bataille de Castillon en 1453, la ville de Bordeaux passe, après trois siècles de domination anglaise, sous l'autorité des rois de France. Peu de temps après cette victoire, le roi de France, Charles VII, ordonne la construction du « château du Far  (devenu château du Hâ), du fort-Louis (dans le quartier Sainte-Croix), et du « château Trompette, pour protéger le pays contre une nouvelle offensive anglaise et surtout pour contrôler la ville fraîchement conquise.                                                                          HA , aussi nommé fort du Hâ, est une ancienne forteresse de Bordeaux, à l'emplacement de laquelle sont érigés actuellement le palais de Justice et l'école nationale de la magistrature. Il a été construit par décision du roi Charles VII, immédiatement après la reprise définitive de Bordeaux aux anglais en 1453. Il date du XVe siècle et se situe à côté du palais de Justice. C'est une ancienne forteresse batie en 1454,  fut notamment rénové et renforcé par Louis XIV, au travers de recommandations faites par Vauban. Vers 1730, une prison est ajoutée; de nouveaux bâtiments sont également construits autour de 1790 sous la direction de Victor Louis afin de palier à la démolition de la tour Trompette. La prison sera transformée pendant la Terreur en prison dEtat.  Ha est devenu l'école nationale de la magistrature. En 1654, Louis XIV le fait réparer et ajouter quelques constructions.  Le château du Hâ est inscrit aux M.H. depuis 1965.","habitants":"roi Charles VII,\r\n        \"","divers":"Vestiges du château Gallien grav 1 à  5 château du Ha et porte-7, Remparts","gps":"","images":["../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_1.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_2.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_3.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_4.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_5.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_6.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Gallien_7.jpg"]},"Consult_chateau_formulaireeb1e":{"id":"Consult_chateau_formulaireeb1e","dept":"33","canton":"Bordeaux","commune":"Bordeaux","nom":"Bordeaux_Châteaux_II","type":"Château","periode":"XVIII","histoire":"DESCAS  En 1861 Fondation de la maison de négoce par Jean Descas  comme un symbole au cur de Bordeaux, le château Descas vient fièrement saluer la réussite de son fondateur, le château témoigne de l'esprit avant-gardiste de la maison de 1979 marque l'arrivée d'une nouvelle famille à la tête de la maison Descas. Denis Merlaut fait le pari de moderniser cette maison historique tout en respectant l'héritage de la famille Descas. Soucieux de perpétuer la tradition familiale, Denis Merlaut confie à son fils Raphaël la direction commerciale en 2010 avec pour objectif de s'adapter aux demandes actuelles du marché tout en anticipant les besoins de demain.\r\nLISLEFORT,  a été la propriété de la famille Blanchy,  Sylvie Douce et François Jeantet ont, depuis lan 2000, restructuré le vignoble,  ce domaine qui accueillit Henri IV. C'est devenu un Domaine viticole, est inscrit aux M.H. depuis le 31.12.1996.\r\nLABOTTIERE, depuis 1795, date à laquelle Jacques Labottière vend son domaine à M. Boèrs, Labottière a connu de nombreux propriétaires successifs. Un dessin de larchitecte Jean-Baptiste Dufart datant du tout début du XIXe siècle, peut-être de 1803, rapporte que le domaine, rebaptisé « Monplaisir », appartenu à Antoine Gautier, maire de Bordeaux de 1849 à 1863,Transformé en lycée des jésuites et en 1905 musée par la ville. Acquis par Bernard Magrez il y a une quinzaine dannées.","architecture":"DESCAS , en 2000, la mairie était devenue locataire du lieu pour permettre au cabaret Caesar's, devenu sous-locataire, d'ouvrir et d'y réaliser des travaux. Trois ans plus tard, après la fermeture du cabaret et un an de loyers impayés à la mairie, le propriétaire du château s'est aperçu que les travaux réalisés ne sont pas ceux qui avaient été définis dans le bail et qu'il y a eu des malfaçons. Au début du mois, il a assigné la mairie en justice pour la remise en état du château Descas.                                                                      LISLEFORT,  bâti à Lignan-de-Bordeaux, sa construction  date du 1er quart du XVIIe siècle,est une ancienne maison forte du XVIe siècle, remaniée en 1608, puis mutilée au XIXe siècle (disparition du pont-levis, de l'enceinte et de la basse-cour). Une chapelle de style néo-gothique a été construite à la fin du XIXe siècle.                                                              LABOTTIERE, hôtel Les frères Labottière, éditeurs et imprimeurs bordelais, firent construire en 1773 cet hôtel particulier de type néoclassique par les architectes Jean et Etienne Laclotte du XVIIIe siècle à un seul étage couronné d'une balustrade, corps de logis central superposé encadrant la porte et un balcon avec fronton deux piles en retour d'équerre, restauré au printemps 2011 pour accueillir linstitut culturel Bernard Magrez, ses artistes en résidence et ses expositions dart moderne et contemporain. Le château, à lexclusion des parties classées, est inscrit aux M.H. par larrêté du 21 novembre 1935.","habitants":"Famille Blanchy                                                        Famille d'Antoine Gautier, Bernard Magrez Famille Descas\r\n        \"","divers":"Château de Descas-6-7 du Ha de Lislefort-4-5 et  de Labottière  de 1à 3 à  Lignan-g-8  Bordeaux        GPS : 44° 50' 11\" Nord et 0° 34' 46\" Ouest    lislefort  44° 48' 06,36\" Nord et 0° 25' 16,54\" Ouest","gps":"44° 50' 11\" Nord et 0° 34' 46\" Ouest    lislefort  44° 48' 0","images":["../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_1.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_2.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_3.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_4.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_5.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_6.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_7.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_8.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Chateaux_9.jpg"]},"Consult_chateau_formulaire4872":{"id":"Consult_chateau_formulaire4872","dept":"33","canton":"Bordeaux","commune":"Bordeaux","nom":"Bordeaux_Palais","type":"Palais","periode":"XVII","histoire":"PALAIS-ROHAN , de l'archevêque de Bordeaux en 1769, Ferdinand Maximilien Mériadec de Rohan entreprit la reconstruction complète du vieil archevêché, dès le Moyen-Âge des travaux de restauration avaient été entrepris un siècle auparavant par le cardinal François de Sourdis. Alors que les frais de la construction ne cessent de croître, larchevêque est contraint dengager sa propre fortune. Il laisse sa place à Mgr Champion de Cicé dès 1781. Le palais est enfin achevé vers 1784. Dans ce palais siègent, dès 1790, le nouveau conseil général du département puis le tribunal révolutionnaire sy installe, en 1800, le nouveau préfet Antoine Claire Thibaudeau. Lun de ses successeurs, Charles Delacroix, «père officiel» du célèbre peintre Eugène Delacroix y décède et, en 1808, lEmpereur Napoléon Ier sy installe. Du coup, lancien hôtel archiépiscopal est érigé en Palais Impérial, la préfecture étant transférée dans lancien hôtel Saige. La duchesse dAngoulême y réside quatre mois en 1823 et, en 1828, cest la duchesse de Berry qui en est lhôte quand elle inaugure le nouvel hôpital Saint-André et pose la première pierre des colonnes rostrales. En 1833 létat propose à la ville de lui échanger le palais Rohan contre lhôtel de ville. Depuis, la ville na plus abandonné le palais que Mgr de Rohan avait fait édifier sans jamais pouvoir en profiter.   FERME du ROI, architecte du Roi Louis XV, l'hôtel des fermes du Roi accueillait à l'origine la ferme générale, ancêtre de la douane sous l'ancien régime. Situé à l'angle sud de la place de la bourse, ses façades néoclassiques ont marqué le début de la rénovation urbaine de Bordeaux au XVIIIe siècle. Ce bâtiment, qui héberge encore de nos jours les services de la douane, abrite une remarquable cour intérieure qui sera ouverte au public. Entièrement pavée, elle est ornée sur son mur ouest d'une fontaine dite \"à congélations\", du fait de ses motifs dessinés par le sculpteur flamand Verberckt.","architecture":"BORDEAUX, porte de la ville du XVe siècle élevée pour commémorer  la victoire de Charles VIII à Fornoue. Le 13 juin 1862, l'hôtel de ville a été sévèrement endommagé par un incendie.  Après la Révolution, il deviendra hôtel du département puis préfecture de la Gironde et enfin hôtel de ville en 1837. Son austère façade de style Louis XVI dissimule un des plus beaux escaliers de France, considéré comme un des chefs-duvre de taille de la pierre française. Le palais est achevé en 1784. Après avoir eu différentes fonctions, l'archevêché, devient hôtel de ville en 1835, fonction qu'il occupe actuellement. L'architecture sobre, de style Louis XVI, vous accueille au sein de la cour d'honneur par un portail sculpté flanqué de colonnes. Deux ailes basses encadrent la cour. A l'intérieur de l'hôtel de ville, on peut admirer des salons aux lambris en bois décorés de motifs végétaux de style Louis XVI, sculptés par Cabirol. La salle à manger est ornée de trompe-l'oeil. Au rez-de-chaussée, près du logis, le monumental escalier d'honneur est un magnifique exemple d'architecture du XVIIIe siècle. Lacadémie nationale des sciences, belles-lettres et arts de Bordeaux a été créée par lettres patentes de Louis XIV en 1712. Elle siège à lhôtel des sociétés savantes qui date du milieu du XIXe siècle. Les visiteurs pourront voir les salons, la salle des séances et la bibliothèque avec un patrimoine important : tableaux (dont un portrait de Montesquieu classé monument historique), gravures, bustes, médailles, ouvrages, notamment des mémoires des académiciens du XIXe siècle qui seront exposés. Le grand escalier de lhôtel avec un beau vitrail   est également intéressant.","habitants":"Ferdinand Maximilien Mériadec de Rohan\r\n        \"","divers":"La ferle du roi, l'opera et les quartier généraux de Bordeaux      GPS : 44° 50' 11\" Nord et 0° 34' 46\" Ouest   Le palais Rohan à Bordeaux","gps":"44° 50' 11\" Nord et 0° 34' 46\" Ouest   Le palais Rohan à Bor","images":["../../jctruffet.com/image/image_33/33_Bordeaux_Palais_1.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_2.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_3.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_4.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_5.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_6.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_7.jpg","../../jctruffet.com/image/image_33/33_Bordeaux_Palais_8.jpg"]},"Consult_chateau_formulaire6126":{"id":"Consult_chateau_formulaire6126","dept":"33","canton":"Saint-André de Cubzac","commune":"Saint-André de Cubzac","nom":"Bouilh","type":"Château","periode":"XVII","histoire":"BOUILH, au XIVe siècle construction d'un premier château par Milet du Bouilh.  Charles dAlbret, comte de Dreux et de Gaure et captal de Buch, vendit la baronnie du Cubzaguais avec quelques autres fiefs à Bertrand de Montferrand, seigneur de Montferrand et de Veyrines. au XVe siècle un certain Amanieu détient le domaine avant qu'il échoie en 1524 à Clinet de Lannes, baron de La Roche-Chalais. Il est ensuite dans les mains de son gendre Charles de Durfort. Sylvie de Lannes épousa en 1654 à Gaspard de La Tour du Pin, seigneur de Chastelard, comte de Paulin  qui passa par alliance en 1635 à la famille de la Tour du Pin,   en 1786 à 1787, Jean-Frédéric de la Tour du Pin Gouvernet fit raser le vieux manoir pour construire la nouvelle résidence par l'architecte Victor Louis. En 1794 exécution de jean Frédéric de la Tour du Pin. A leur retour  d'émigration, en 1796 le fils du marquis Frédéric Séraphin de la Tour du Pin futur préfet de l'Empire et son épouse Lucie Dillon  retrouvent le château dévasté. mais l'implication de leur fils dans la folle équipée de la duchesse de Berry les insite à quitter la France et s'installe en Suisse. Bouilh est vendu en 1835 à Florentin Hubert de Lisle dont leur fils Henri représentant du peuple à l'assemblée de 1848 gouverneur de la Réunion épouse Amélia Pignolet demoiselle d'honneur de l'impératrice Eugénie. En 1864 mariage de Noélie Hubert de Lisle avec Edouard de Feuilhade de Chauvin dont le château est toujours dans cette famille.  Il est classé aux M.H. depuis 1943.","architecture":"BOUILH, il est constitué en 1787  d'un ensemble de bâtiments : deux grands corps de logis à combles brisés élevés de deux étages de combles sur un soubassement percé d'arcades, et relié s par une vaste colonnade formant terrasse dont le centre est occupé par une rotonde coiffée d'une coupole, deux rampes obliques partant  du soubassement percé d'arcades, devaient permettre d'accèder à la rotonde. Un pavillon d'honneur et communs disposés en hémicycle qui datent du XVIIIe siècle.  En cette période tourmentée, pour ne pas être suspecté d'utiliser les deniers de l'État, le ministre stoppa immédiatement la construction en août 1789. Un grand corps de logis à l'ouest à été construit sur trois niveaux avec baies profondément  enfonçées dans des arcades  cintrées que surmonte une colonnade   embrassant l'étage  et l'attique soutenant une balustrade en avant du comble. Le château du Bouilh possède une fuie qui est le seul vestige de l'ancien manoir.","habitants":"Famille de La Tour du Pin\r\n        \"","divers":"Château de Bouilh de 1-3  à St-André de Cubzac : 45° 0' 33,48\" Nord, 0° 27' 20,88\" Ouest    et autres châteaux","gps":"","images":["../../jctruffet.com/image/image_33/33_Bouilh_1.jpg","../../jctruffet.com/image/image_33/33_Bouilh_2.jpg","../../jctruffet.com/image/image_33/33_Bouilh_3.jpg","../../jctruffet.com/image/image_33/33_Bouilh_4.jpg","../../jctruffet.com/image/image_33/33_Bouilh_5.jpg","../../jctruffet.com/image/image_33/33_Bouilh_6.jpg","../../jctruffet.com/image/image_33/33_Bouilh_7.jpg","../../jctruffet.com/image/image_33/33_Bouilh_8.jpg","../../jctruffet.com/image/image_33/33_Bouilh_9.jpg"]},"Consult_chateau_formulaire61cb-2":{"id":"Consult_chateau_formulaire61cb-2","dept":"33","canton":"Cenon","commune":"Bouliac","nom":"Bouliac_Pian","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Bouliac dont celui de Bouliac, Dragon, Freychaud, Lavergne( voir article) , Lubert-Chaperon, Macanan, Monjouan, Pervenche, Pian, Terrefort et Vial, pas d'information historique pour ces châteaux.                                                                           BOULIAC, en 1330, Edouard VIII d'Angleterre autorisa Doat Amanieu de Bouglon, serigneur de Latresne, à construire une maison forte crénelée dans sa propriété de Bouliac ; puis le silence s'étend pendant quatre siècles sur le Pian, au début du XVIIe siècle , il appartenait à M. Lamalétie. En 1770, son fils, J. Lamalétie négociant à Bordeaux, vend le domaine à F. Bréthoux, avocat au parlement.    F. Brethoux vendit le Pian en 1775 à CH.-F. de la Salle Cailleau, qui le céda  en 1792 à Jean Vergnes, négociant ; celui-ci le garda jusqu'en 1829, date à laquelle il fut acheté par A. Gorret, capitaine de navire, et en 1832, Henri Laclaverie en devint propriétaire, jusqu'en 1866 où Henri Deffès, industriel, acheta la maison en 1867. \"Vers 1870, H. Deffès fit démolir cette chartreuse  dont semble-t-il , J. Vergnes avait fait raser le pavillon, et fit appel à V. Mialhe (1802-1871), et à son fils, Paul, né en 1833, pour lui construire un important château, et \"réhabiliter\" les bâtiments d'exploitation, entre lesquels il fait ouvrir un portail d'accès. L'ensemble fut terminé en 1873.  Réquisitionné par la marine allemande pendant la seconde guerre mondiale, il a été détruit lors du départ des troupes de Bordeaux, très certainement le 25 août 1944. Le château vient d'être entièrement restauré en 1991.","architecture":"BOULIAC du XXe siècle. Le château de l'Ange est l'ancien château de Bouliac. Ses ruines se trouvent maintenant dans l'enceinte du quartier Béteille. Le château Lavergne et une partie de son ancien parc. Le domaine de Macanan et ses trois terrasses aménagées sur le coteau de la vallée du ruisseau du Pian, soutenues par dénormes murs et renforcées par trois bastions. Le domaine viticole de Freychaud (Montjouan). Le château Montjouan et son domaine viticole.  Le château de Terrefort, sur la première terrasse naturelle de la vallée de la Garonne, bâti sur une terrasse artificielle maçonnée. L'ancienne maison du régisseur ainsi que l'ancien vivier ont été préservés. Le château de Vialle, reconstruit par cet architecte bordelais en 1756.  La maison Vettiner en centre-ville. Le domaine de Fourney situé sur une petite terrasse dominant le vallon du ruisseau de Fournets. Le château de Kermorvan, au bord du coteau qui domine la vallée de la Garonne. \r\nLe château Malakoff qui a remplacé l'ancien Bourdieu en 1865. Il est implanté sur le plateau.\r\nLe château du Pian, dont la construction date de 1873, qui a remplacé les monuments qui se sont succédé depuis la maison forte du XIVe siècle.","habitants":"Famille de M. Lamalétie\r\n        \"","divers":"châteaux à Bouliac dont celui de Bouliac, Dragon-2, Burthe-8,   Freychaud-3, Lavergne-4, Lubert-Chaperon-5, Malherbes-9 Macanan, Monjouan-6, Pervenche-7, Pian-1, Terrefort et Vial","gps":"","images":["../../jctruffet.com/image/image_33/33_Bouliac_Pian_1.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_2.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_3.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_4.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_5.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_6.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_7.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_8.jpg","../../jctruffet.com/image/image_33/33_Bouliac_Pian_9.jpg"]},"Consult_chateau_formulaire0fe5":{"id":"Consult_chateau_formulaire0fe5","dept":"33","canton":"Blaye","commune":"Bourg sur Gironde","nom":"Bourg_Gironde","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Bourg sur Gironde l'ancien hôtel de ville, aussi nommé hôtel de la Jurade, du XVIIIe siècle qui abrite aujourd'hui l'office de tourisme ; une maison du XVIIIe siècle, place de la Libération ; les restes de la porte de Blaye, ayant appartenu à l'enceinte fortifiée, la porte du Port, reste de l'enceinte fortifiée; Le château Cayac est un château bâti à Saint Seurin-de-Bourg, la citadelle caruso.            \r\nTOUR de SEGUY; hôtel restaurant pas d'information historique.                                                                LAGRAVE, chambres d'hôtes dans un château renaissance. Appartenant à la même famille depuis 1900, le domaine est aujourdhui géré par Philippe et Valérie Bassereau,                                                    GROLET, ancien manoir du XIIe et XIIIe siècle . Elle rappelle lépoque où Elie-Louis Dufaure de Lajarte, noble de Bordeaux, épouse en 1786 Simone Dubergier de Luzier, fille de Raymond Dubergier de Luzier, seigneur de Grolet, chevalier de St-Louis et écuyer du Roi. Elie-Louis  et Simone sinstallent au château.  Il ne sest jamais montré lami de la Révolution. Et il est arrêté en mars 1794, puis emprisonné au palais Brutus à Bordeaux et enfin guillotiné en Juillet 1794. Son épouse meurt de chagrin seulement un an après.","architecture":"BOURG En GIRONDE, vieille ville, enjeu des rois de France et d'Angleterre, Bourg-sur-Gironde conserve quelques fragments de son enceinte du XIIIe siècle, dont une tour et de belles maisons de pierre du XVe au XVIIe siècle. Déjà Sidoine Appolinaire, au Ve siècle de notre ère, impressionné par les fortifications qui entouraient la ville, en faisait l'éloge. C'est une ville à deux étages. La ville haute, noble, est toujours abritée derrière ses remparts et se développe sur son promontoire en un enlacement de ruelles, d'escaliers empierrés et  GROLET, ancien manoir du XIIe et XIIIe siècle flanqué dune tour crénelée. Le château actuel a été reconstruit après la Révolution Française et transformé plusieurs fois pendant le XIXe siècle. Mais une partie de lancien château féodal est restée intacte, notamment une fenêtre « à meneau » du XIIIe siècle toujours visible.                                          LAGRAVE, est un authentique château du XVIe siècle restauré au début XIXe dans le style Louis XIII  cest aussi un héritage familial centenaire et une expérience unique entre tradition et modernité, une demeure seigneuriale du XVIe siècle flanquée de tours et tourelles.","habitants":"Mr Jean-Paul Jaubert                                                   Elie-Louis Dufaure de Lajarte,                                      Philippe et Valérie Bassereau,\r\n        \"","divers":"à Bourg sur Gironde le châteaux la tour de Séguy,Mille-Secouse -6 de Lagrave-7, la citadelle -Caruso-8 et de Grolet-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_Bourg_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_2.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_3.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_4.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_5.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_6.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_7.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_8.jpg","../../jctruffet.com/image/image_33/33_Bourg_Gironde_9.jpg"]},"Consult_chateau_formulaire5e91":{"id":"Consult_chateau_formulaire5e91","dept":"33","canton":"Talence","commune":"Talence","nom":"Brama","type":"Château","periode":"XIV-XVIII","histoire":"BRAMA dit du prince noir au XIVe siècle, le domaine resta en possession de la famille d'Angleterre. Le changement s'opère au XVe siècle. Le pavillon est inféodé à l'une des familles des d'Arnaud de Roustaing « seigneur de Brama » qui fait détruire l'ancien pavillon pour construire le château. Par la suite, durant la période mouvementée de La Fronde, le château est occupé par les troupes de Charles de La Porte, Maréchal de la Mailleraye, puis au XVIIIe siècle, le domaine entre en possession de la famille Bruno ou Bruneau qui le garde jusqu'en 1819. Il est d'ailleurs désigné « château Bruno » sur le plan cadastral de la ville de Talence. De 1819 à 1862, le domaine change de fonction pour devenir une fabrique de toiles cirées, période durant laquelle est détruite l'allée qui reliait le château à l'église.  Sa fonction change encore par la suite, il est racheté par la famille Clavé qui enclenche de nombreuses modifications intérieures, notamment par l'ajout de peintures murales en 1877. L'édifice est temporairement transformé en hospice pour vieillards pour retrouver par la suite une fonction industrielle. En 1939, l'entreprise d'aéronautique Dassault construit à proximité du château qui est inclus à l'usine.","architecture":"La construction du château de Brama dit du prince noir date du XIV siècle. A la fin du XVe ou au début du XVIe siècle, l'ancien château fut démoli pour laisser la place à un nouvel édifice. Le bâtiment Est, le mur sud et les deux tiers du bâtiment ouest datent de cette période. De la fin du XVIe au début du XVIIIe siècle, des modifications apportent à l'édifice son aspect actuel : le rez-de-chaussée du bâtiment  est cloisonné ; l'accès au premier étage du bâtiment ouest est remodelé ; la toiture du bâtiment ouest est rabaissée, le bâtiment allongé vers le nord et pourvu d'un décor peint ; le mur nord et la galerie de liaison prennent leur aspect actuel.  L'édifice, en forme de quadrilatère, comporte 2 corps de logis rectangulaires et parallèles reliés au nord par un mur surmonté d'une galerie de liaison. Au sud, par une autre galerie à laquelle, on accède depuis la cour par un escalier de pierre. Les bâtiments sont percés de baies dont plusieurs à meneaux. L'aile Est est flanquée côté cour d'une tourelle. Le logis ouest a conservé, au 1er étage, des poutres peintes du XVIIe siècle et d'autres traces de décor peint. Le château de Brama est la seule construction de ce type à subsister encore dans l'agglomération bordelaise. Le château de Brama appartient à une société privée.","habitants":"famille Bruno\r\n        \"","divers":"Raba 44° 47' 41\" Nord et 0° 35' 59\" Ouest,  Bel-Air : 44° 48' 09\" Nord et 0° 34' 48\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Brama_1.jpg","../../jctruffet.com/image/image_33/33_Brama_2.jpg","../../jctruffet.com/image/image_33/33_Brama_3.jpg"]},"Consult_chateau_formulaire2087":{"id":"Consult_chateau_formulaire2087","dept":"33","canton":"Ciron","commune":"Budos","nom":"Budos","type":"Vestiges","periode":"XIII","histoire":"BUDOS, on doit le château  à Raymond Guilhem de Budos, neveu du Pape Clément V. Largement pourvu par son oncle, il le transmet dès 1306, au sénéchal de Gascogne . Le chevalier de Budos, neveu, de Clément V, souverain pontife, nous a supplié de lui permettre de créneler sa maison de Budos, de l'entourer de murs, tours, fossés et enfin de la fortifier.  En 1422-23, le roi d'Angleterre prend possession du château et en charge Pons, seigneur de Castillon. Vers 1433, Henri VI concède au duc de Gloucester les terres et le château. En 1446-47, Budos est donné à Gaston IV de Foix-Béarn, comte de Foix, par suite du décès du comte de Gloucester. Après la conquête de la Guyenne, la famille de Budos qui avait suivi la cause de la France, rentre en possession de ses seigneuries de Guyenne. Acheté aux Budos par Raymond de La Roque en 1571, le château subit un sévère assaut en 1652, pendant les guerres de la Fronde. Lasserre saccage, pille et en brûle les archives. La seigneurie de Budos est restée dans la famille de La Roque jusquà la Révolution, qui faillit l'anéantir, puisque, vendu comme bien national, il servit de carrière pour bâtir des digues sur le Ciron. En 1841, la commission des M.H. de la Gironde en est avertie par Léo Drouyn. En 1860 il devienne propriété de Léon de Brivazac, fils de Delphine Catherine de La Roque de Budos (née au château en 1789). Cinq descendants (Savary de Beauregard) l'ont confié à l'association Adichats qui y rassemble des jeunes pour mettre en valeur et sauvegarder ce qui peut l'être.Le château a été inscrit en tant que M.H.en 1988","architecture":"BUDOS le château est de plan rectangulaire (46 m x 56 m) : un vaste logis en U autour de la cour est protégé par une haute muraille cantonnée de tours aux angles, circulaires pour trois dentre elles et une de forme octogonale. Cette dernière servait de pigeonnier. Elles mesurent 20 m de haut sur trois étages et ont un diamètre de 7,50 m sauf la tour octogonale, qui est de 3,50 m. Sur les tours, on voit la présence darchères à croix pâtée utilisées pour les tirs à larbalète. Au milieu de la croix apparaît un orifice circulaire, pour permettre le tir des armes à feu. Lentrée est pratiquée sous une haute tour carrée dotée dune herse et précédée autrefois dun pont levis enjambant des fossés. Ces derniers avaient une vingtaine de mètres de large sur une dizaine de mètres de profondeur et étaient remplis deau en provenance de la source de Budos. Sur chaque face, une tour carrée non saillante domine courtines et logis. Les murs de la courtine nord-est semblent avoir été surhaussés à plusieurs reprises. Les créneaux du premier chemin de ronde avaient été comblés. Des latrines apparaissent sur les murs arrière et intérieurs. La chapelle se trouvait à droite de lentrée accessible de la cour.La prison occupait la tour nord et avait vue sur les fossés. Il y avait aussi un puits dans la cour intérieure. Il ny avait pas doubliettes mais des pièces enterrées servant à la conservation des denrées alimentaires ou bien des pièces de stockage des poudres et autres armes de défense.","habitants":"Raymond Guilhem de Budos,\r\n        \"","divers":"Vestiges du château de Budos","gps":"","images":["../../jctruffet.com/image/image_33/33_Budos_1.jpg","../../jctruffet.com/image/image_33/33_Budos_2.jpg","../../jctruffet.com/image/image_33/33_Budos_3.jpg","../../jctruffet.com/image/image_33/33_Budos_4.jpg","../../jctruffet.com/image/image_33/33_Budos_5.jpg","../../jctruffet.com/image/image_33/33_Budos_6.jpg","../../jctruffet.com/image/image_33/33_Budos_7.jpg"]},"Consult_chateau_formulaired21e":{"id":"Consult_chateau_formulaired21e","dept":"33","canton":"Lesparre-Médoc","commune":"Bégadan","nom":"Bégadan","type":"Château","periode":"XVIII","histoire":"BEGADAN, Rollan de By  Jean Guyon, décorateur et architecte dintérieur établi, fait lacquisition en 1989 de Bégadan, au nord du Médoc, du château Rollan de By, il devient alors voisin du grand domaine de Marc Pagès, dit la Tour de By.\r\nTOUR de BY  tient son nom de son ancien phare construit en 1825 au milieu des vignes. Cette propriété familiale de 94 hectares est située entre locéan Atlantique et lestuaire de la Gironde,  Lorigine connue du château remonte à lannée 1599. Frédéric le Clerc et Benjamin Richer de Forges assurent désormais la succession des vins de leur grand-père dans un esprit alliant qualité, nologie de précision et respect de la tradition. Julien Damoy acquiert la propriété au début du XXe et son gendre M. Chaumont la gère jusquà sa vente en 1961 à un ancien parlementaire, Robert Karkoreff. En 1965, Marc Pagès, ingénieur agronome installé jusquen 1962 en Tunisie et deux associés, tous rapatriés dAfrique du Nord, achètent le domaine alors à labandon et engagent son renouveau. Marc Pagès en devient le seul propriétaire en 1999. Depuis sa mort en 2007, son petit-fils, Frédéric Le Clerc, qui avait rejoint le château en 2005, en assure la direction, assisté de son cousin Benjamin Richer de Forges à partir de 2009.                                                                 HAUT-BARRAIL, avec son moulin, existe depuis 1362, appelée jadis \"la maison de la Bernède\" aujourd'hui disparue, seul le moulin subsiste.  Propriétaire depuis 1987 la famille Gillet a effectué beaucoup de travaux  de restauration.","architecture":"Bégadan, au nord de lappellation Médoc et à proximité immédiate de la Gironde, La Tour de By a des racines très anciennes. Parmi ses propriétaires connus se succèdent Pierre Tizon, seigneur du fief de By au XVIe,  le comte Louis de Gramont au XVIIIe, monsieur de Lignac puis son gendre Alfred Rubichon qui fait édifier en 1876 le château actuel à proximité de la tour de By. Ce petit phare construit en 1825 pour guider le trafic de lestuaire donnera son nom au domaine actuel.                                                        Haut Barrail La construction actuelle date pour ses parties les plus anciennes du début du XVIIe siècle. Actuellement le logis représente des caractéristiques architecturales du XVIIIe siècle, de plan rectangulaire à deux niveaux flanqué aux extrémitées en façades de pavillons carrées  de ce dernier sont gravés, dans les pierres, deux symboles : \"Vigne et Blé\".","habitants":"Jean Guyon                                                                    Frédéric Le Clerc et Benjamin Richer de Forges \r\n        \"","divers":"Châteaux de Bégadan Haut-Barrail-1-2, Tour de By grav de 3 à 5,Rollan grav-6-7, Plagnac-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_B%c3%a9gadan_1.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_2.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_3.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_4.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_5.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_6.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_7.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_8.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9gadan_9.jpg"]},"Consult_chateau_formulairef6ae":{"id":"Consult_chateau_formulairef6ae","dept":"33","canton":"Cadillac","commune":"Béguey","nom":"Béguey","type":"Château","periode":"XVIII","histoire":"BEGUEY, pourtant, le nom de Béguey existait déjà au XVe siècle puisquen 1410, une trêve fut signée à Béguey (trêve de Noël, pendant la guerre de Cent ans), entre les représentants de la France et de lAngleterre, au château de Béguey édifié sur lemplacement du Peyrat. Ce château était sans doute la résidence du viguier de Cadillac.  Le seigneur de Neyrac remplissait donc les fonctions de viguier auprès du seigneur de Cadillac.                                BIROT Elle a été construite par M.de Parouty vers 1780 à la place d'un édifice ancien.","architecture":"BEGUEY Selon divers récits, la paroisse de Neyrac est donnée comme un lieu où il faisait bon vivre : « le sol y est fécond, le soleil gai, la Garonne radieuse un coteau rocheux aux multiples avantages. Au lieu nommé Béguey se trouvait un important filon de pierre utilisable pour la bâtisse ». Il est évident que la construction du château dEpernon a participé au développement de la paroisse et au déplacement de son centre, au XVIIe siècle.                                       BIROT de plan rectangulaire à deux niveaux avec fronton triangulaire sur chaque fenêtres du premier étages, avant corps central de trois travées, balustrades de protection sur toits en croupe recouvert de tuiles.","habitants":"seigneur de Cadillac\r\n        \"","divers":"Château de Birot 1-2 à Béguey, Carcau-Latour-3-4","gps":"","images":["../../jctruffet.com/image/image_33/33_B%c3%a9guey_1.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9guey_2.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9guey_3.jpg","../../jctruffet.com/image/image_33/33_B%c3%a9guey_4.jpg"]},"Consult_chateau_formulaire2973":{"id":"Consult_chateau_formulaire2973","dept":"33","canton":"La Brède","commune":"Cadaujac","nom":"Cadaujac_Chateau","type":"Château","periode":"XII-XVI","histoire":"six châteaux  à Cadaujac  celui de Saige, de Eck, Bardins, Bouscaut, Malleret (voir article)  on peut également trouver sur la commune : le château Millefleurs, de la Grâce, de La Pontrique ainsi que des maisons nobles comme celles du Pont de Langon, ou encore de Lamothe-Bouscaut.                             SAIGE, François-Armand de Saige, ancien avocat général au parlement de Bordeaux, élu maire de la ville en 1791 et guillotiné en 1793, aurait fait construire ce château en 1870  le château de Saige appartient au comte de Noaillan.                                                           CADAUJAC ou château Chapon est édifié à la fin du XVIIIe par monsieur de Saige, baron de Beautiran. BARDINS, en 1849, M. Pierre Bellarmin Tandonnet achète la propriété et fait construire le château.  La grotte, elle fut édifiée à linitiative de Mme Chancel, alors propriétaire de Bardins. Le petit-fils de Mme Chancel, M. Paul Tandonnet, vend le domaine en 1903 à M. Vincent.  La fille de M. Vincent épouse M. Camille de Bernardy de Sigoyer. Derrière ce nom, trois générations portent haut la réputation du vignoble.        ERCK ou l'ancien château des Frêtets est  bâti à Cadaujac,  en 1810, le château appartient à M. Dussole, maire de Cadaujac. La façade nord avec ses deux tours et seulement des pans de mur à l'Est et à l'Ouest. En 1824, François dEck hérite du château, en 1935 démolition de bâtiments au Sud, ce qui semble confirmer une période dannées sombres. Le domaine était mal entretenu, Dans les années 1940, M. Reyné restaure le château et en occupe la partie Ouest ; Lorsque M. et Mme Martin lacquièrent en 1969, l'état du château nécessite de grands travaux. Frédéric Gonet acquiert le domaine en 1999 pour faire naître de ses terres un nouveau cru dans la famille des Pessac-Léognan.","architecture":"DROIT, de plan rectangulaire, le logis comporte un étage de soubassement surmonté d'un rez-de-chaussée surélevé et d'un premier étage. Avant corps et coiffée d'un fronton triangulaire, s'ouvre par une porte en arc plein cintre. La façade sud, sans décor, possède un escalier à deux montées divergentes. Des dépendances beaucoup plus tardives ont été bâties à l'ouest de la demeure                                         SAIGRE, de plan rectangulaire, la construction a été prolongée par un bâtiment à terrasse en forme d'hémicycle. Les façades se développent sur trois niveaux. Des frontons triangulaires couronnent chaque lucarne, sauf celle du centre qui possède un fronton cintré et qui marque ainsi la symétrie de la composition supérieure. Au rez-de-chaussée, l'entrée se trouve totalement décentrée vers l'ouest. Un porche à quatre colonnes toscanes est ajouté sur la façade nord. L'intérieur a été entièrement transformé.               BARDINS, il est formé d'un corps de logis avec balcon encadré de deux ailes plus avancées, celle de gauche étant flanquée d'une tour ronde avec un escalier pour accéder au premier étage.                                             ECK ou  onstruit à la fin du XIIe siècle,  d''une allure médiévale, avec quatre tours avec leurs meurtrières et un mur d'enceinte.  Les fondations de la bâtisse datent du XIe siècle et le château originel possédait un système de défense. Les bâtiments actuels sont disposés en U. La façade Nord est flanquée dune tour à chaque extrémité et percée dun passage en son centre. Les murs ouest et Est, avec des tours aux extrémités sud, encadrent une cour intérieure.","habitants":"Famille de  François-Armand de Saige                   Famille de M. Pierre Bellarmin Tandonnet\r\n        \"","divers":"A Cadaujac, château de Cadaujac -1, Bardins-2 ,   Droit -7-8, Fretet-9,  Saigre-6               Eck-3-4-5         ECK GPS : 44° 44' 40\" Nord et 0° 32° 20,5\" Ouest","gps":"44° 44' 40\" Nord et 0° 32° 20,5\" Ouest","images":["../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_1.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_2.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_3.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_4.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_5.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_6.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_7.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_8.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_9.jpg"]},"Consult_chateau_formulaire1643":{"id":"Consult_chateau_formulaire1643","dept":"33","canton":"La Brède","commune":"Cadaujac","nom":"Cadaujac_Chateau_II","type":"Château","periode":"XVII","histoire":"Trois châteaux à Cadaujac celui de Bouscaut,  Mailleret et Pontrique.  BOUSCAUT, en 1962, le château est détruit par un incendie et reconstruit à l'identique. De 1968 à 1979, le domaine est entre les mains d'un groupe d'investisseurs des USA. Il est acquis par Lucien Lurton, le propriétaire du château Brane-Cantenac entre autres en 1979. aujourd'hui, cest Sophie Lurton, fille de Lucien, qui gère cette propriété au style classique avec son mari Laurent Cogombles,  de nombreux aménagements réalisés par la famille Lurton depuis 1979 : MALLERET, en 1860, monsieur Armand Coureau, membre d'une famille d'armateurs bordelais, achète le domaine et le château. L'origine de cet amitié n'est pas connu avec certitude, mais la rumeur populaire la fait remonter à l'époque où Louis-Napoléon Bonaparte était emprisonné au château de Ham, entre 1840 et 1846.  Armand Coureau vent son château en 1869. En 1933 c'est M. Berthias qui l'acquit. Après avoir fait lacquisition de grilles en fer forgé provenant de la place Gambetta à Bordeaux, il les fait installer en bord de Garonne. les propriétaires suivants, sur fond de conflits familiaux, arrêtent d'entretenir le domaine. Les jardins, les annexes et le château lui-même se dégradent. Depuis 1986, les propriétaires actuels l'ont restauré, les annexes et les jardins lui ont redonné son éclat d'origine au domaine. Le château est inscrit au titre des M.H. en 1986.                                           PONTRIQUE est édifié en 1768 puis le château de La GRACE à la fin du XVIIe siècle. À cette même époque, le château PLOMBARD qui devient château Millefleurs en 1933 est construit avec les pierres de la maison de M. Roulle, à Callot, par l'architecte Granet.","architecture":"BOUSCAUT au style classique  de plan en équerre avec retour d'aile sur la droite, bâtisse dont les corps de logis à deux niveaux avec lucarnes sur des toits en croupes flanqué à l'angle central intérieur  d'une tour ronde toit en poivrières. Avant corps de deux niveaux avec fronton nue triangulaire  l'ensemble des bâtisses recouvert de tuiles.                                                    MALLERET, aujourd'hui il existe quelques restes du bâtiment originel, en particulier, sur l'allée d'entrée, on voit les traces d'un grand portail plus ancien que le château actuel, la partie centrale du château est du XVIIIe siècle. Le corps de logis central, coiffé dun toit à la Mansart, est en surélévation et comporte un étage. Côté fleuve, on accède au grand salon par un escalier tournant à deux volées et montées convergentes. Ses balustrades sont un rappel des balustres de toit qui ornent les deux parties latérales. Chaque extrémité accueille un élégant pavillon en retour déquerre vers la Garonne dont certains ornements architecturaux rappellent ceux du pavillon central. Deux tours rondes agrémentent le pavillon côté ouest encadrant une petite avancée de style bow-window supportant une terrasse sécurisée par des balustres.","habitants":"Monsieur Armand Coureau\r\n        \r\n        \"","divers":"Château de Bouscaut-1-2, de Mailleret de Pontrique et de Fougères à Cadaujac","gps":"","images":["../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_1.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_2.jpg","../../jctruffet.com/image/image_33/33_Cadaujac_Chateau_II_3.jpg",".
