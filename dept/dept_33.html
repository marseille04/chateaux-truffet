il.","architecture":"CASTELNAU, date des XIVe et XVIIe siècles. Il est entouré par un jardin de création contemporaine, adaptable à l'activité viticole et à la réception des visiteurs.  Castelneau est un des vestiges du prestigieux passé historique de l'Entre-deux-Mers. Le \"Castel-nau\" fut élevé dès le XIVe siècle, il retrouve peu à peu son aspect d'origine, très modifié à la Révolution. composé d'un corps de logis rectangulaire à deux niveaux toit en croupe flanquée de deux tours rondes arasées,  aux angles  de la façade l'ensemble recouvert de tuiles les dépendances en retour d'équerre accolé au corp de logis forment un plan quadrangulaire avec une cour d'honneur.                     A St-Léon uune maison forte de même style et Goëlane de plan carré de deux niveaux sur soubassement et lucarnes sur le toit, l'édifice est accolé d'une tour créneléé et à l'opposé une échauguette.","habitants":"Famille du vicomte de Roquefeuil\r\n        \"","divers":"Château de Castelnau g 1-2 , le manoir g 3 -4-5 Galéane  g 7 et l'Hôtel g 8 à Saint-Léon","gps":"","images":["../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_1.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_2.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_3.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_4.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_5.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_6.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_7.jpg","../../jctruffet.com/image/image_33/33_St_L%c3%a9on_Cadillac_8.jpg"]},"Consult_chateau_formulaireac92":{"id":"Consult_chateau_formulaireac92","dept":"33","canton":"Cadillac","commune":"Saint-Macaire","nom":"St_Macaire","type":"Bastide","periode":"XIII-XVI-XIX","histoire":"St-MACAIRE, bastide avec une forteresse  du XIIIe au XVIe siècles surnommé « Le château de Tardes » en raison dune tour crénelée, Le bâtiment est doté dune tour de desserte qui débouche sur la cour intérieure.  Ce château situé au cur de la ville ancienne, rue du Port Nava, est, à l'origine, une maison forte médiévale de cinq niveaux, construite vers le XIIIe ou le XIVe siècle et transformée en hôtel particulier de style Renaissance avec, entre autres, l'ajout de baies à meneaux et, au XIXe siècle, d'une tour hexagonale de style troubadour contenant un escalier à vis.  Relais de poste Henri IV du XVIe siècle. Riche demeure située place du marché. Elle bénéficie pour cela dune cour intérieure dotée en son fond décuries, et une tour polygonale qui renferme un escalier à vis, elle fut aménagée au XXe siècle en musée régional de la Poste. La légende veut que Henri IV soit passé dans cette demeure.","architecture":"St-Macaire, portes et remparts (XIIIe-XIVe siècles) Grâce à la prospérité économique du bourg à partir du XIIe siècle, Saint-Macaire put se doter de puissants éléments de fortifications. Aujourdhui, plusieurs pans de remparts  du XIIIe siècle sont très bien conservés, notamment au pied de léglise et du prieuré (au niveau duquel la muraille fut doublée), ainsi que le long du faubourg Rendesse où la courtine est conservée dans son intégralité, à lexception des tours et du fossé.  Au nord, sélève la Porte de Benauge du XIIIe siècle, principale porte daccès à la vieille ville. Son nom provient du comte de Benauges, suzerain de la ville avant que celle-ci ne devienne une commune, et vers les terres duquel est orientée la porte. Symbole de lautonomie du corps municipal, la première maison commune sappuyait sur son flanc, la porte de Benauge devient peu à peu celle de la ville entière. À la sortie du faubourg Est, la porte du Thuron du XIVe siècle, dotée dune barbacane, protégeait le premier port de Saint-Macaire, ainsi que la rue qui le reliait à la place du marché. Un lavoir est installé en contrebas de la porte, à droite. À lopposé, au faubourg ouest, la porte Rendesse du  XIVe siècle a gardé intact son aspect dorigine. Au XVIIe siècle, cest à son pied quest installé le nouveau port.","habitants":"Seigneur locaux\r\n        \"","divers":"Porte et relais de Henry IV, Tardes g -4 -5-6 et de Thuron à  Saint-Macaire  44° 33' 52\" Nord et 0° 13' 29\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Macaire_1.jpg","../../jctruffet.com/image/image_33/33_St_Macaire_2.jpg","../../jctruffet.com/image/image_33/33_St_Macaire_3.jpg","../../jctruffet.com/image/image_33/33_St_Macaire_4.jpg","../../jctruffet.com/image/image_33/33_St_Macaire_5.jpg","../../jctruffet.com/image/image_33/33_St_Macaire_6.jpg"]},"Consult_chateau_formulaire783e":{"id":"Consult_chateau_formulaire783e","dept":"33","canton":"La Brède","commune":"Saint-Morillon","nom":"St_Morillon_Bel_Air","type":"Château","periode":"XIX","histoire":"A Saint-Morillon cinq château celui de Bel-Air, de Belon, de Camarset, de Claron, de Piron.                BEL-AIR construit pour le marquis de la Jarthe bien national à la Révolution, cest en 2011 que Michel de Laet Derache, banquier, décide de prendre la direction du château de Bel-Air. En 1960, son père désireux de se commémorer leur fuite à Lourdes vingt ans auparavant, emmène le tout jeune docteur en droit dans le Sud-Ouest pour la première fois.  Monsieur Dutthouron  jeune docteur en droit démarrait son apprentissage.                                                                  PIRON Paul Boyreau, succède alors à son père André Boyreau. Il dirigera la propriété et obtiendra de nombreuses récompenses dans les différents concours. Depuis 1999, c'est son neveu, Lionel Boyreau, qui dirige la propriété.                            BELON, Il doit à la même famille, propriétaire depuis plusieurs générations, ses tours qui agrémentent la campagne saint-morillonnaise d'un véritable \"petit château\". Entouré de dépendances préservées,  le \"marquis de Belon\" Aujourd'hui à Anne Marie et Laurent Jérôme Depiot.","architecture":"Bel-Air petite chartreuse répandu pendant le XVIIIe siècle passe pour une grande création de l'architecte Louis. Corps de logis oblong d'un niveau et fronton triangulaire sur trois travées plein cintre en façade et petit manoir. Les façades et toitures du château, son décor intérieur (vestibule, salon, chambre aux colonnes), la pièce d'eau avec ses statues, et les statues ornant le parc.  Inscription par arrêté du 1er septembre 1986.","habitants":"Monsieur  Joseph de Laet Derache                               Famille André Boyreau\r\n        \"","divers":"A Saint-Morillon cinq châteaux celui de Bel-Air, de Belon g 5-6, de Camarset, de Claron, de Piron","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_1.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_2.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_3.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_4.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_5.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_6.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_7.jpg","../../jctruffet.com/image/image_33/33_St_Morillon_Bel_Air_8.jpg"]},"Consult_chateau_formulairea24e":{"id":"Consult_chateau_formulairea24e","dept":"33","canton":"La Brède","commune":"Saint-Médard d","nom":"St_Médard_Eyrans","type":"Château","periode":"XVII","histoire":"Deux châteaux à  Saint-Médard d'Eyrans celui d'Eyrans et de Lamothe.                                               EYRANS, la seigneurie de Saint-Médard-dEyrans fut en place au château dEyrans dès le XIIIe siècle (jusquà 1870). Plus tard, par le jeu des biens personniers, (indivision entre plusieurs seigneurs) une deuxième seigneurie fut créée au château Lamothe.  Tout près du château dEyran, cette demeure, qui appartient à la même famille, semble plus récente mais certaines parties anciennes datent de lépoque de Louis XIII. Ce sont Pierre et Isabelle de Sèze qui en sont aujourdhui les propriétaires. Le château appartient, par le jeu des alliances, à la même famille depuis des siècles. Le premier château appartient dès 1317 à Guilhem De Budos seigneur de la Motte DEyran, neveu de Clément V. Vers 1347 il a été reconstruit par André De Budos, puis il devient propriété de la famille Dubernet au XVIIe siècle et par alliance, aux familles De Sallegourde puis De Sèze (le frère était lavocat de Louis XVI). Lartigue par successions, ce domaine est passé successivement à M. Delpech, Mme de la Chapelle (qui a donné son nom au chemin qui borde la propriété), Mme Casajeu et aujourdhui Melle Lehman.                                   LAMOTHE,  était une propriété très importante, (deuxième seigneurie de Saint Médard), qui possédait des pâturages jusquà LIsle Saint Georges encore au XIXe siècle.cest dans ce château que naquit Sophie de La Rochetière, fondatrice en 1814 des Surs de Marie-Thérèse, à Bordeaux.                                       LA-PRADES utilisé à des fins industriels.","architecture":"EYRANS, les façades et toitures du logis, des deux ailes et de la tour ronde,  le portail d'entrée avec sa grille et la fontaine avec son bassin entouré de balustrades,  avait beaucoup souffert des inondations, fut en partie ruiné lors des guerres de religion (1560-1598). Il fut reconstruit à son emplacement actuel, sur les avant-postes du vieux château du XVIIe siècle.\r\nLAMOTHE, les extrémités des deux ailes des communs supportent des pigeonniers similaires.  Après la Révolution, il fut restauré selon les mêmes plans, une grande partie date de lépoque de Louis XIII et la tour, de lépoque dHenri IV. Au milieu du XIXe siècle, Aurélien De Séze réalisa dimportants travaux (surélévation du corps central, répartition des pièces par la construction dun couloir, le grand mur de pierre qui fermait la propriété est remplacé par un mur plus bas surmonté dune grille); il fit aussi une tentative délevage « industriel » de sangsues dans le marais dEyran.\r\nPRADES Le bâtiment est dun style néo-classique typique avec son fronton triangulaire et ses lignes élégantes, il remplace un château plus ancien dont il ne reste plus rien. De lépoque antérieure au XVIIIe , subsistent le pigeonnier bien conservé et un moulin. Les plans des dernières constructions datent du début du XIXe siècle. Les planchers, en revanche, reposent sur des structures métalliques, ce qui correspond à la technique de Gustave Eiffel, de plus en plus utilisée à partir du XIXe siècle.","habitants":"Lamothe Famille  d'Aurélien De Séze                            Eyrans Famille de Guilhem De Budos\r\n        \"","divers":"Château de Prades g 1 Eyrans g-2-3,  Saint-Médard d'Eyrans","gps":"","images":["../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Eyrans_1.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Eyrans_2.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Eyrans_3.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Eyrans_4.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Eyrans_5.jpg"]},"Consult_chateau_formulaire0ce8-2":{"id":"Consult_chateau_formulaire0ce8-2","dept":"33","canton":"Saint-Médard en Jalles","commune":"Saint-Médard en Jalles","nom":"St_Médard_Jalles","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Saint-Médard en Jalles, Gazac (voir article) de Belfort, Bourdieu, Lafon  et l'hôtel de ville.\r\nBOURDIEU Le domaine qui a appartenu en 1737 au courtier royal Delmestre, est resté la propriété de la famille Delmestre et Meyniac, qui vont assurer la gestion du domaine, sur trois générations successives jusquen 1908.\r\nVIEILLEVILLE, construit en 1789 à Corbiac, domaine jusque dans les années 1920, a appartenu à Auguste Feydit, conseiller municipal (fin du XIXe siècle).\r\nBELFORT, la seigneurie de Belfort, dont linfluence s'étendait sur Cérillan, Issac et les moulins de Caupian et de Bonneau.","architecture":"Le château de Bourdieu, orienté au sud-est, se compose d'un corps d'immeuble élevé d'un étage et flanqué de deux pavillons latéraux de plain pied. La partie centrale, en légère saillie, accueille les portes médianes à deux vantaux séparant deux groupes de deux fenêtres, au rez-de-chaussée comme à l'étage. Elles sont surmontées d'arcades demi-circulaires, dont celle du rez-de-chaussée est ornée de moulures. Les impostes sont fermées de 8 carreaux disposés en arc de cercle selon un motif rayonnant formant 4 secteurs angulaires de 45°. L'imposte du rez-de-chaussée est défendue par une pièce de ferronnerie ornée des initiales J.D. de J. Delmestre dans un médaillon.          BELFORT corps de logis central de trois travées à deux niveaux toit brisées à la mansard avec lucarnes et clocheton, à la base en retour sur flanc droit et gauche prolongement d'un niveau de trois travées  avec terrasses et retour en équerres sur cour de dépendances","habitants":"famille Delmestre \r\n        \"","divers":"Saint-Médard en Jalles château de Gazac g-1 Belfort g-3, bourdieu g-4 Lafon g-5","gps":"","images":["../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Jalles_1.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Jalles_2.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Jalles_3.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Jalles_4.jpg","../../jctruffet.com/image/image_33/33_St_M%c3%a9dard_Jalles_5.jpg"]},"Consult_chateau_formulaire6a8e":{"id":"Consult_chateau_formulaire6a8e","dept":"33","canton":"Pauillac","commune":"Saint-Sauveur en Médoc","nom":"St_Sauveur_Médoc","type":"Château","periode":"XIII-XVII","histoire":"Trois châteaux à St-Sauveur en médoc, celui de Bernadotte, de Peyrabon et de Fontesteau.     BERNADOTTE, domaine du Haut-Médoc, nommé ainsi en hommage au maréchal dempire Bernadotte qui fut roi de Suède, le château fut bâti en 1860. Il fut rénové en 1989 par un industriel suédois, Curt Eklund, qui effectua des achats successifs. Le premier millésime date de 1981. Il fut racheté en 1997 par le château Pichon Longueville comtesse de Lalande, dont la propriétaire madame de Lencquesaing. Dès 1998 dimportants investissements sont réalisés,  en 2007, la maison de champagne Louis Roederer acquit le château Bernadotte ainsi que le château Pichon Longueville comtesse de Lalande.                        PEYRABON avec pas moins de 19 propriétaires différents, entre 1785 et 1998, historiques du château remonte à la fin du XIXe siècle lorsque la reine Victoria, amie de M. Roux,   parmi les autres propriétaires, les plus importants furent les comtes de Courcelles qui ont donné à la réputation du cru une assise très solide et la famille Babeau qui, de 1958 à 1998 : fort judicieusement il agrandit le domaine en achetant au voisin le château Liversan.  Depuis 1998, Patrick Bernard a investi  pour la modernisation de la propriété.                                                            FONTESTEAU  Bâti et fortifié en  1277  construction, la salamandre que l'on trouve gravée sur le fronton de la porte du donjon pourrait être la trace du passage de François 1er. Le  château a été entièrement rénové en 1997. A la Révolution, Fontesteau est remarqué pour avoir abrité un « irascible » qui y avait caché ses armes. Dominique Fouin, est gérant de la société \"château de Fontesteau\".","architecture":"BERNADOTTE, deux corps de logis à cinq travées à deux niveaux avec lucarnes en façades sur un toit en croupes, ces deux corps sont relié par un édifice de un niveau avec lucarnes sur un toit brisé, l'ensemble recouvert  d'ardoise.\r\nPEYRABON, est la plus ancienne trace écrite que nous connaissions de la propriété. François Badimont qui à partir de 1821 entreprend dimportants travaux pour donner à la maison de maîtres dalors son architecture Renaissance actuelle en rajoutant quatre tours La famille Babeau qui racheta à un filateur du Nord, Jean Béra, en 1958.\r\nFONTESTEAU  le donjon est la partie la plus ancienne delédifice, 1277 est la date retenue pour sa construction. La porte actuelle dentrée dans le donjon, nest pas la porte dorigine. La porte dorigine au-dessus de laquelle se trouvait le blason de la seigneurie, se trouvait sur le côté du donjon,  les tours arrières furent très longtemps tronquées (elles sarrêtaient au niveau des meurtrières que lon peut voir de nos jours). Il semblerait quelles aient été arasées au moment de la Révolution. Les tours ont été rebâties en 1996 à partir de gravures anciennes. Le château est protégé par la présence dun mur denceinte. Lancienne porte du château, aujourdhui murée sur le fronton, on aperçoit le blason avec la coquille St-Jacques. Les grandes fenêtres actuelles ne sont pas dépoque du Moyen-âge, à la place des ces fenêtres, il y avait des meurtrières. On peut en voir encore la trace sur les tours arrières. Au-dessus de lancienne porte du donjon, il y a la présence du blason du château.","habitants":"Famillede M Roux \r\n        \"","divers":"A st-Sauveur le château de Bernadotte g-1, de peyrabon g 6-7-8 et de Fontesteau g 2-3-4-5.","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_6.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_7.jpg","../../jctruffet.com/image/image_33/33_St_Sauveur_M%c3%a9doc_8.jpg"]},"Consult_chateau_formulaire80a5":{"id":"Consult_chateau_formulaire80a5","dept":"33","canton":"Pineuilh","commune":"Saint-Selve","nom":"St_Selve","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux sur Saint-Selve; Castres, Grenade, Lusseau, Montalier et Razens                          GRENADE, au sud de la commune, en limite de Saint-Michel-de-Rieufret, a été bâti au XIXe siècle par l'architecte bordelais Henri Duphot sur commande des propriétaires du domaine, l'homme politique Edmond de Carayon-Latour (1811-1887) et son épouse Henriette de Châteaubriand (1824-1903), nièce de l'écrivain.\r\nMONTALIER, cétait le centre de postcure psychothérapique (1890).\r\nRAZINS, des XVIIe-XIXe siècles : ruiné par les troupes nazies qui l'occupèrent entre 1940 et 1945, il n'en subsiste que deux tours.                                                 LUSEAU transformé en ferme.","architecture":"CASTRES, possède une très belle demeure (chartreuse du XVIIIe siècle), édifice de plan rectangulaire à deux niveaux avec terrasse  à balustrade sur toit  accolé sur les flancs de bâtiment en prolongement de un niveau et dépendandes.              MONTALIER, centre de postcure psychothérapique (1890).\r\nGRENADE, au sud de la commune, en limite de Saint-Michel-de-Rieufret, a été bâti au XIXe siècle par l'architecte bordelais Henri Duphot. La visite des grandes demeures élisabéthaines ou de leurs revivals conduit Duphot à réaliser à Grenade une uvre inspirée de larchitecture des Tudor où abondent les bow-windows, les grandes baies quadrillées de meneaux de pierre, les pignons chantournés et les tuyaux dorgue des hautes cheminées groupées en trois ou quatre conduits .»  Nous avons ici à Grenade le plus bel exemple de cette architecture dite éclectique, car faisant référence à plusieurs styles, mais ici plus particulièrement au style perpendiculaire où sentrecroisent les rythmes horizontaux et verticaux. LUSSEAU, corps de logis à deux niveaux cinq travées  avant corps d'entrée légé avec fronton triangulaire en façade plein cintre, l'édifice accolée à un donjon carrée à mâchicoulis sous un toit à quatre pans avec lucarnes.                                                                      RAZENS ou des Razins, des XVIIe-XIXe siècles : ruiné par les troupes nazies qui l'occupèrent entre 1940 et 1945, il n'en subsiste que deux tours.","habitants":"Famillde d'Edmond de Carayon-Latour \r\n        \"","divers":"châteaux sur Saint-Selve; Castres g-5  Grenade g 1-2-3-6, Lusseau g-4, Montalier g 7 -8 .","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Selve_1.jpg","../../jctruffet.com/image/image_33/33_St_Selve_2.jpg","../../jctruffet.com/image/image_33/33_St_Selve_3.jpg","../../jctruffet.com/image/image_33/33_St_Selve_4.jpg","../../jctruffet.com/image/image_33/33_St_Selve_5.jpg","../../jctruffet.com/image/image_33/33_St_Selve_6.jpg","../../jctruffet.com/image/image_33/33_St_Selve_7.jpg","../../jctruffet.com/image/image_33/33_St_Selve_8.jpg"]},"Consult_chateau_formulaire65c6-3":{"id":"Consult_chateau_formulaire65c6-3","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Seurin de Cadourne","nom":"St_Seurin","type":"Château","periode":"XVII-XIX","histoire":"Cette commune est la plus élevée du Haut-Médoc, elle compte 53 domaines viticoles et châteaux. La plupart viticole dont je n'ai pas les noms ni les détails historiques.                                                                       VERDIGNAN, la plus ancienne propriété viticole de Saint-Seurin-de-Cadourne.                                            FAVIERES, Stanislav et Natalia Zingerenko ont racheté le château  au printemps dernier.                  CABARRUS,  a appartenu jusquen 1795 au baron de Brane, célèbre propriétaire de Mouton, devenu aujourdhui Mouton Rothschild.Jean Valère Cabarrus, propriétaire du Château Lagrange en fait alors lacquisition et décide de donner son nom au domaine. Pontoise devint Pontoise Cabarrus Le nom du château sera ensuite rendu célèbre grâce à la belle Thérésa Cabarrus, fille de François , banquier du roi dEspagne et épouse du conventionnel Tallien. Amis de Napoléon et Joséphine, ils furent témoins à leur mariage.  Cest en 1859 que les Cabarrus concèdent ce domaine à la famille Bouillaud qui est aussi à la tête du cru de Brochon du nom de la célèbre famille davocats Bordelais de lépoque. En 1959, Emile Tereygoel achète le domaine à Fernande Blois, descendante de la famille Bouillaud. \r\nTAYAC   de monsieur et madame Saturny    En 1959, Pierre Saturny, enfant du pays, reprit le vignoble, avec laide de son épouse et maintenant de leurs deux fils, Philippe et Loïc, ils en assurent, chacun dans leurs spécialités, lexploitation et sa commercialisation.      Pas d'informations pour les autres châteaux.","architecture":"Cest à Saint-Seurin de Cadourne quest situé le château Muret appartenant à la famille Boufflerd depuis 1985.  Le Colombier de Bardis datant du XIVe siècle, le Colombier seigneurial de Bardis il est considéré comme étant lun des plus beaux dAquitain.  De forme circulaire et imposant par sa taille il comporte 1830 nids construits en pierre de taille et en poterie. Sa capacité de production était de 8000 à 10000 pigeons par an. Verdignan, dont larchitecture a été récemment mise en valeur. Cest une belle demeure bâtie au XVIIIe siècle et qui à lépoque faisait à peu près le double de ce que lon peut voir aujourdhui. En effet, un incendie a ravagé toute laile droite qui était la symétrie de lactuelle demeure et cette partie a dû être rasée. Avec sa tourelle pointue et sa façade étroite.","habitants":"Stanislav et Natalia Zingerenko                              Emile Tereygoel \r\n        \"","divers":"Plusieurs châteaux à Saint Seurin. Seurin g-1 couffron g-2, Charmail g-3, Grandis g 4 Muret g 6 Tayac g 7-8  Verdignan g-9","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Seurin_1.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_2.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_3.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_4.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_5.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_6.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_7.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_8.jpg","../../jctruffet.com/image/image_33/33_St_Seurin_9.jpg"]},"Consult_chateau_formulaireb1f1":{"id":"Consult_chateau_formulaireb1f1","dept":"33","canton":"Pineuilh","commune":"Saint-Sulpice de Guilleragues","nom":"St_Sulpice_33","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à Saint-Sulpice de Guilleragues celui de la Caze et celui de Guilleragues.\r\nLa CAZE, le château de Caze s'élève sur la commune de Saint-Sulpice-de-Guilleragues. Du XIe au XVIe siècle il appartient au prieuré de La Réole il est exploité par les bénédictins pendant près d'un siècle, avant de passer entre les mains de différents propriétaires.  La famille Dupuy acquit le domaine au début du XVIe siècle et fait édifier les fortifications. Le domaine passe par héritage à la famille de Bacalan, il devient leur résidence principale de 1706 à la Révolution.  L'édifice est inscrit au titre des M.H. par arrêté du 6 septembre 2007 pour les vestiges des tours de son enceinte.\r\nGUILLERAGUES, il fut la propriété, au XVIIe siècle, de Gabriel Joseph de Lavergne, comte de Guilleragues (1628-1685), diplomate, journaliste et écrivain, auteur des lettres portugaises.","architecture":"CAZE Les vestiges du château de Caze appartiennent à une personne privée. Du château construit à l'origine au XIVe siècle ne subsistent que deux fragments de tours rondes qui faisaient partie de l'enceinte ; les bâtiments adjacents sont plus récents comme le montrent les fenêtres à ogives ou meneaux.\r\n GUILLERAGUES, construit au XIVe siècle et agrandi au XVIe siècle (le portail et son fronton l'avaient été en 1954). c'est une longue bâtisse à flanc de colline actuellement ruinée mais offrant un aspect très pittoresque, son élément le plus ancien est une maison flanquée de tourelles semblabes au Grand-Puch ou à Camarsac. les réseaux de ses fenêtres se découpent sur le vide et seules les petites pièces des tours ont conservés leurs voûtes. Au XVIIe siècle une porte blasonnée a été plaquée contre le vieux murs,  fut agrandi au XVIe siècle avec deux ailes symétriques en annexes de même hauteur, est inscrit à l'inventaire des M.H. depuis 1995.","habitants":"La caze famille Dupuy                                                  Famille de Gabriel Joseph de Lavergne\r\n        \"","divers":"A st-Sulpice le château de la Caze et de Guilleragues                     44° 37' 34\" Nord et 0° 03' 01\" Es: 44° 38' 2,4\" Nord et 0° 2' 24,76\" Est","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Sulpice_33_1.jpg","../../jctruffet.com/image/image_33/33_St_Sulpice_33_2.jpg","../../jctruffet.com/image/image_33/33_St_Sulpice_33_3.jpg","../../jctruffet.com/image/image_33/33_St_Sulpice_33_4.jpg","../../jctruffet.com/image/image_33/33_St_Sulpice_33_5.jpg","../../jctruffet.com/image/image_33/33_St_Sulpice_33_6.jpg"]},"Consult_chateau_formulairec98d":{"id":"Consult_chateau_formulairec98d","dept":"33","canton":"Ambarès et Lagrave","commune":"Saint-Sulpice de Cameyrac","nom":"St_Sulpice_Cameyrac","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Saint-Sulpice dont celui de Lamothe, pas d'information, de Laville, de Leu, de Badines , de Quantin   et de Beauval.                  LAMOTHE dit du Prince Noir occupe un château rénové, entouré de douves  relais de chasse  aujourdhui chambres d'hôtes de Jean-Jacque Bastide.                                                                           BADINES est un manoir fortifié construit dans la deuxième moitié du XVIe siècle. il  appartenait à la famille Rubran depuis 1530 jusqu'à la Révolution.         QUANTIN La maison noble de Quantin existe depuis la fin du XVIe siècle.                                          BEAUVAL, bâti pour M. de Loyac vers 1780, la famille Alphand, mais petit à petit le domaine périclite. En 2011, les nouveaux propriétaires restaurent le bâtiment dans son état d'origine.","architecture":"BADINES, l'édifice était composé d'un logis fortifié et de dépendances qui ouvraient sur une cour fermée par un portail. Le logis est composé de deux corps de bâtiment en équerre avec tours d'angles. Des toits de tuiles creuses couvrent l'ensemble sauf les tours, qui sont couvertes de toits coniques ; au sud, l'échauguette en pierre de taille est couverte d'un toit en pavillon de tuiles plates. L'escalier à vis est situé dans la tour méridionale. La tour nord porte toujours le blason de la famille de Rubran.  Le bâtiment a été remanié au XVIIe et XIXe siècles, mais certains dépendances du XVIIe siècle existent toujours.          QUANTIN, l'édifice est composé d'un corps de logis en rez-de-chaussée, avec un avant-corps central à fronton, flanqué de pavillons à un étage carré et un étage de comble, prolongés en retour d'équerre par des dépendances formant une cour ouverte. L'aile orientale des dépendances est composée de bâtiments qui forment une deuxième cour. Le bâtiment a été reconstruit à la fin du XVIIIe siècle et réaménagé au XIXe siècle avec l'adjonction des pavillons. Les dépendances sont agrandies à cette époque. Un portail du XVIIIe siècle, en ruine, se trouve au bord de la route de Saint-Loubès-Izon.                            BEAUVAL est composé d'un logis et de dépendances en rez-de-chaussée formant une cour fermée par un mur de clôture avec porte cochère. L'intérieur est réaménagé et les dépendances agrandies au XIXe siècle par les propriétaires.","habitants":"Famille Alphand\r\n        \"","divers":"A saint sulpice de Cameyrac le château de Lamothe g 2-3-4, de Laville g 1, de Leu g-5 , de Badines g-7 , de Quantin g-6   et de Beauval.","gps":"","images":["../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_1.jpg","../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_2.jpg","../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_3.jpg","../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_4.jpg","../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_5.jpg","../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_6.jpg","../../jctruffet.com/image/image_33/33_St_sulpice_Cameyrac_7.jpg"]},"Consult_chateau_formulaire1675":{"id":"Consult_chateau_formulaire1675","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Vincent de Pertignas","nom":"St_Vincent_Pertignas","type":"Château","periode":"XVI-XIX","histoire":"Manoirs et maisons fortes : du Courros, de Naujan, du Pin, de la Nauze et de Lachaud.      \r\nISABEAU de NAUJAN, Jean II de Naujan avait épousé Isabeau d'Anglades, Ils eurent deux filles : Anne  et Jeanne. Après la mort d'Isabeau, Jean II de Naujan se remaria avec Marie de Lescours avec laquelle il eut une fille, Marguerite de Naujan.  Après la mort de Marguerite de Naujan, Jean de La Combe épousa en secondes noces Clémence de Ros avec laquelle il eut un fils, Charles de La Combe. Jean de La Combe mourut en 1561. Lucie et Anne se marièrent toutes deux. Lucie apporta à son mari, Martin de Boirac, lors du mariage une partie de la maison noble de Naujan. André Melson assiégea et prit le château de Naujan en 1582. A cette époque Anne décéda, son mari Pons de Puypeyron dit Bernard de Puypeyron épousa en secondes noces Philippe de Bellade dont il eut une fille nommée Anne qui  épousa en 1602, après la mort de son père Bernard de Puypeyron, François de Carles et lui apporta une partie du domaine de Naujan.   C'est à cette occasion que François de Carles prit le titre de seigneur de Naujan   Suzanne de Boirac, fille de Martin de Boirac et veuve d'un De Carles, avait pour neveu noble Daniel de Marsoulier auquel elle donna procuration en 1641 pour s'occuper d'un procès qu'elle poursuivait. Plus tard, nous ne savons à quel titre, autre Daniel de Marsoulier, fils du précédent, possédait les maisons nobles de Naujan et de Boyrac. Il les donna à sa fille en la mariant en 1698 avec le noble Benjamin de Puch d'Estrac.  Aujourd'hui hôtel de charme au coeur de son vignoble.             COURTEBOTTE ancienne propriété de la famille Touzet du Vigier.  Aujourd'hui réhabilité en chambres d'hôtes, on y propose une vue imprenable sur la Dordogne.","architecture":"Manoirs et maisons fortes : il existait plusieurs familles nobles dans la paroisse. Elles ont laissé des manoirs ou maisons fortes au XIVe et XVe siècles.         Isabeau de Naujan,  au XVIe siècle. Les murs de la maison ont 1.10 m d'épaisseur ; ils enveloppent un rez-de-chaussée de deux étages, mais le second a été entièrement retouché, pour ne pas dire construit à neuf, à la fin du XVe siècle, un corps-de-logis de la largeur du bâtiment principal mais moins long.  Le rez-de-chaussée du château primitif servait de magasin  il n'était éclairé que par de petites ouvertures oblongues. Au milieu s'élevait un pilier carré qui soutenait le plancher du premier étage. On devait monter, du rez-de-chaussée au premier étage, par un escalier extérieur en bois. Cet étage avait deux portes, toutes deux placées au même angle et toutes deux ogivales. La seconde porte sert de fenêtre. Le second étage était plus élevé autrefois et éclairé par des fenêtres à meneaux cruciformes. A l'extérieur, le sommet de l'angle gauche de la façade est orné au XVIème siècle d'un grand personnage nu, d'une remarquable laideur représentant le péché originel. C'est la seule sculpture du château.                                                                     A 1 km au nord    COURTEBOTTE à st Jean de Blaignac, empreinte du XVIIe siècle, présente une architecture authentique.","habitants":"Noble Benjamin de Puch d'Estrac\r\n        \r\n        \"","divers":"Manoirs et maisons fortes de Saint-Vincent de Pertignas,  du Courros g 2, de Naujan g 3-4,  Et courtebotte   g 1  à st Jean de Blaignac","gps":"","images":["../../jctruffet.com/image/image_33/33_St_Vincent_Pertignas_1.jpg","../../jctruffet.com/image/image_33/33_St_Vincent_Pertignas_2.jpg","../../jctruffet.com/image/image_33/33_St_Vincent_Pertignas_3.jpg","../../jctruffet.com/image/image_33/33_St_Vincent_Pertignas_4.jpg"]},"Consult_chateau_formulaire3fb6":{"id":"Consult_chateau_formulaire3fb6","dept":"33","canton":"Saint-Macaire","commune":"Sainte-Croix du Mont","nom":"Ste_Croix_du_Mont","type":"Forteresse","periode":"XIV-XVII","histoire":"Deux châteaux à Sainte Croix du Mont celui de Tastes et Bertranon.                                                              TASTES à l'origine du XIVe siècle, a été reconstruit entre XVe et XVIe siècle et très restauré au XIXe siècle.  Le roi dAngleterre donne le château à Jean dAlbret (1428), puis à Raymond de Lanau (1435) puis à Thomas Wysshard et Jean Ville (1444). Bien quadoptant un style médiéval, plusieurs fois reconstruit ou restauré.  Vers 1155, un acte signé à Loupiac paroisse proche de Sainte Croix du Mont fait état dun Pierre de Tastas. Richard Guillaume de Tastes tue son frère Amalvin. Rostanh de Soler, lieutenant du sénéchal dAquitaine Henri de Trubleville, mit les séquestres sur ses biens : maison de Tastes de Sainte-Croix du Mont, district de Saint-Macaire. Après contestation et convocation à Langon dune assemblée de chevaliers et de prudhommes, Rostanh de Soler donna mainlevée du séquestre.\r\nLes seigneurs  alors connus qua travers des actes de le vie courante. On ne peut affirmer avec certitude la présence dun château à Sainte-Croix du Mont avant le XIVe siècle. A cette époque, Girard est seigneur de Tastes, Philippe le Bel est roi de France (jusquen 1314), Édouard II, roi dAngleterre.   Il est devenu la mairie du village en 1972.                                   BERTRANON, construit en 1727 par l'architecte Etienne Laclotte.","architecture":"TASTES à l'origine du XIVe siècle, a été reconstruit entre XVe et XVIe siècle et très restauré au XIXe siècle. Depuis son promontoire, le château de Tastes est visible depuis la Garonne. Même sil est fait mention des seigneurs de Tastes en 1155, la présence dun château nest pas avérée avec certitude avant le XIVe siècle mais sans date précise. Devenu bâtiment communal en 1927, il est le siège de la mairie depuis 1970. Bien quadoptant un style médiéval, il ne fut le théatre daucun fait larme majeur et y doit son état actuel, cette commune cache aussi un patrimoine  incroyable. Sous le château dorigine médiévale (XIVe siècle), se cachent cet ensemble géologique rare. Forteresse; l'édifice de la mairie sur plan rectangulaire à trois niveaux sur soubassement, avec créneaux et échauguettes entoué d'une enceinte crénelée avec tour ronde et échauguettes a l'arrière de l'édifice un donjon de plan rectangulaire dépassant largement le lieu avec crénaux, machicoulis et une tour de guet.","habitants":"Édouard II, roi dAngleterre.\r\n        \"","divers":"châteaux à Sainte Croix du M ont celui de Tastes grav de 1 à 7 et Bertranon g 8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_1.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_2.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_3.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_4.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_5.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_6.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_7.jpg","../../jctruffet.com/image/image_33/33_Ste_Croix_du_Mont_8.jpg"]},"Consult_chateau_formulaire68b1":{"id":"Consult_chateau_formulaire68b1","dept":"33","canton":"Ambarès et Lagrave","commune":"Sainte-Eulalie","nom":"Ste_Eulalie_33","type":"Château","periode":"XIII-XVI","histoire":"A Sainte-Eulalie plusieurs châteaux dont Bellassise,de Chevilette,de Mongeont, de Cosse et Siret pas d'information pour ses trois derniers.                 BELLASSISE, la construction du château eut lieu du XVIIe au XIXe siècle. Ele est due aux architectes André Bac et Louis Garros, pour le négociant bordelais Paul Maurel.  Maison noble mentionnée sur la carte de Belleyme ; seigneurie au XVIIIe siècle de la famille Martin dépendant de l'abbaye de Bonlieu. La maison noble, décrite en 1640 et 1750 est entièrement détruite sauf le nymphée et le puits ; elle est remplacée en 1886 par la demeure actuelle construite par André Bac puis Michel-Louis Garros, architectes et décorée par J. Vallet, sculpteur, pour Paul Maurel négociant bordelais.\r\n CHEVILETTE, le château Fort de la seigneurie de Chevilette se dressait au XIIIe siècle, sur le domaine, on découvre aujourd'hui le château remanié à la fin du XVIe siècle, pour Pierre de Seurin, conseiller au parlement.","architecture":"BELLASSISE, le château est construit au XIXe siècle sur les restes d'une ancienne maison noble datant du XVIe siècle et dépendant de l'abbaye de Bonlieu.   Logis à deux étages carrés sur un rez-de-chaussée surélevé précédé d'un perron et d'un portique à terrasse. Chaînes d'angles à bossages ; balustrade dissimulant la toiture en terrasse. Décor sculpté à l'intérieur et à l'extérieur de la maison. Vestiges du parc : avenue et nymphée. Le décor sculpté des élévations extérieures est composé de frontons et guirlandes variés alors que des scènes de la vie à la campagne ornent les stucs du vestibule ; les mosaïques des sols intérieurs sont décorées d'ornements géométriques ; des volutes en fer forgé composent la rampe d'escalier.                           CHEVILETTE, dans le jardin, la chapelle porte sur son fronton la date de 1620 et l'inscription \"Introite portas ejus in confessionne\" psaume biblique signifiant.  Entrez dans ces portes avec des louanges\" évoquant la musique céleste comme dans le \"Jubilate\" de Mozart. Sur le coteau on découvre  un sémaphore créé en 1791 pour servir de relais au télégraphe visuel de Claude Chappe basé sur un système de transmission optique par machine à bras articulés. En 1794 la reddition du prince de Condé transita par cette tour carrée. Un imposant Colombier circulaire comptant près de 1300 boulins complète le domaine.","habitants":"Bellassise Paul Maurel                                                   Chevilette  Pierre de Seurin\r\n        \"","divers":"châteaux dont Bellassise g 3, de Carbon blanc g-1de Chevilette g 4-5, de Mongeont, de Cosse g-6 et Siret    44° 54' 32\" Nord et 0° 28' 19\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_1.jpg","../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_2.jpg","../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_3.jpg","../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_4.jpg","../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_5.jpg","../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_6.jpg","../../jctruffet.com/image/image_33/33_Ste_Eulalie_33_7.jpg"]},"Consult_chateau_formulaire4d8e":{"id":"Consult_chateau_formulaire4d8e","dept":"33","canton":"Pineuilh","commune":"Sainte-Foix la Grande","nom":"Ste_Foix_La_Grande","type":"Château","periode":"XIII","histoire":"La bastide de Saine-Foix  est fondée en 1255 sur les bords de la Dordogne par Alphonse de Poitiers, frère de Saint-Louis. Bernard de Saint-Astier cède à Alphonse de Poitiers par acte de paréage signé à Gaillac, le 14 juillet 1255, la terre limitée par les ruisseaux la Rance à l'est et le Vinairols à l'ouest. Sa position stratégique en a fait une place forte importante. Elle fut ainsi place anglaise conquise au XVe siècle, puis devint un bastion protestant au XVIe siècle. Ste-Foy eût sa commanderie des Templiers à la fin du XIIe siècle, et le château Tercier.","architecture":"Vestiges des enceintes (murs et tours), les arcades typiques des bastides, la place centrale et ses nombreuses maisons à colombages du XVe siècle. Vous pourrez également visiter le patrimoine des communes situées autour de Ste-Foy La Grande tel que lEglise romane de Thoumeyragues du XIIe et XIIe siècle.    Château XVIIe siècle  luxueusement rénové au c?oeur de 24 ha.  Proche de Ste-Foy la Grande, en position dominante sur la colline, cette bâtisse de 520 m² habitables, restaurée avec passion, saura être une merveilleuse demeure de famille privée.","habitants":"Alphonse de Poitiers\r\n        \r\n        \"","divers":"La bastide de Saine Foix  la tour des templier  g 7 Terciers g-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_1.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_2.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_3.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_4.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_5.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_6.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_7.jpg","../../jctruffet.com/image/image_33/33_Ste_Foix_la_Grande_8.jpg"]},"Consult_chateau_formulaire4eed":{"id":"Consult_chateau_formulaire4eed","dept":"33","canton":"Lormont","commune":"Bassens","nom":"Séguinaud","type":"Château","periode":"XVIII","histoire":"SEGUINAUD, en 1784, Joseph Pemerle, bourgeois de Bordeaux, vendit le domaine à François et Pierre Séguinaud. Dès lors, la propriété prit le nom. Au XIXe siècle, en 1804, le domaine est devenu la propriété dAntoine Espinasse. Jean-Pierre Lubin «dit Urbain» Maurel, négociant armateur, acheta le domaine à un certain Pierre Rousseau en 1878. A son décès, en 1889, son épouse, Catherine Moulinié  hérita du domaine. Elle le légua, en 1914, à ses enfants : Louis Urbain, Marie Louise Jeanne et Marie Yvonne Ida. En 1919, Louis Urbain et Marie Louise Jeanne cédèrent leurs droits à leur sur.   Cette dernière vendit le domaine, en 1929 à Louis Bechat, négociant.  Emile Lucien Germain, également négociant, en fit lacquisition en 1930 puis le vendit à la municipalité en 1973, qui le transforma alors en centre de loisirs.   Restauré et réhabilité.","architecture":"Séguinaud a été construit du XVIIIe au XIXe siècle, en U au milieu d'un parc, avec  les vestiges d'un belvédère. Plus au sud, se trouve une fontaine qui alimente un lavoir, auquel on accède par un escalier à une volée double.  L'ancien \"bourdieu\" de Salinet, constitue peut-être la partie ancienne du château de Séguinaud, ce domaine viticole qu'un centre de loisirs occupe actuellement. En 1878 cette maison de campagne comprenait une maison de maître. Une partie du logis (rez-de-chaussée et pavillon central) et les ailes en retour semblent dater de la 1ère moitié du XIXe siècle mais la construction a été agrandie et le décor intérieur remanié à la fin du XIXe siècle sans doute pour la famille Maurel dans un style éclectique inspiré du style classique français. L'aménagement intérieur des ailes a été détruit. Le parc, la cour et le soubassement d'un belvédère ou d'une fabrique de jardin (peut-être située à l'emplacement d'une ancienne tour) sont les seuls vestiges de l'ensemble paysager ; le portail d'entrée a été sans doute construit en 1881 par Jules Gelot, entrepreneur à Lormont. La fontaine-lavoir située à flanc de coteau date du XVIIIe siècle.","habitants":"Famille de Joseph Pemerle\r\n        \"","divers":"Séguinaud    44° 54' 05\" Nord et 0° 30' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_S%c3%a9guinaud_1.jpg"]},"Consult_chateau_formulairef8d5":{"id":"Consult_chateau_formulairef8d5","dept":"33","canton":"Lacanau","commune":"Saint-Laurent Médoc","nom":"Sémignan","type":"Château","periode":"XVII","histoire":"SEMIGNAN,  le château a été édifiée au début du XIVe siècle par les seigneurs Albret de Vertheuil, installés au château de Vertheuil.  Dans les années cinquante, le bâtiment arborait encore son toit. Les travaux titanesques déjà réalisés ne se voient pas au premier abord. Les fondations mal construites fragilisaient lédifice ; il a donc fallu assécher les douves et consolider les bases du bâtiment,   cet ouvrage est un témoin d'habitations occupées par les vassaux dans la province du Médoc. Totalement réduit à labandon, il tombe  en ruine dans la seconde partie du XXe siècle.","architecture":"SEMIGNAN Dun plan carré, cette maison forte comprend une grande tour carrée, deux enceintes et de douves. Les bâtiments forment un plan en U. Les fossés de lenceinte principale sont larges de douze mètres et sont encore remplis deau. Une seconde enceinte plus petite est complétée par le même dispositif. Deux points permettent daccéder à lédifice aujourdhui. A lorigine, un seul accès permettait de rentrer dans cet ouvrage fortifié. Les fondations ont du être consolidées lors de travaux récents pour éviter que lédifice ne sécroule. Parmi les vestiges, on retrouve une belle baie  géminée. Aujourdhui murée, elle laisse apparaitre une canonnière au centre de cette baie. Elle conserve ces coussièges. On retrouve également plusieurs archères bouchées qui attestent dune défense militaire active. La croisade sémignanaise \" est une association loi 1901 dont le but est de sauvegarder et de réhabiliter le patrimoine architectural, historique, archéologique et naturel du Médoc.","habitants":"Famille de Leutken\r\n        \"","divers":"Saint-Laurent Médoc château de Sémignan  Coordonnées par GPS : 45° 10' 14,89\" Nord et 0° 50' 0,2\" Ouest","gps":"45° 10' 14,89\" Nord et 0° 50' 0,2\" Ouest","images":["../../jctruffet.com/image/image_33/33_S%c3%a9mignan_1.jpg","../../jctruffet.com/image/image_33/33_S%c3%a9mignan_2.jpg","../../jctruffet.com/image/image_33/33_S%c3%a9mignan_3.jpg"]},"Consult_chateau_formulaire5d1b":{"id":"Consult_chateau_formulaire5d1b","dept":"33","canton":"Cadillac","commune":"Tabanac","nom":"Tabanac","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Tabanac, celui de Sentout, de Renon et de Plassans \r\nLa Tour de Camail, datant probablement du XVIIe siècle, a longtemps porté le nom de « tour du télégraphe », très sûrement du télégraphe Chappe qui permettait la transmission des dépêches sur la ligne Bordeaux - Agen - Toulouse - Narbonne dès 1834.\r\nSENTOUT Hôtel restaurant de  Peltier Gérard.\r\nRENON, bâti à Tabanac,  date du XIXe siècle, occupe lemplacement dun très ancien château de Tabanac. Au XIe siècle, il était le siège dune importante seigneurie. Dès lan 1000, il est fait mention de Gérard de Tabanac puis d'Arnaud de Tabanac, archevêque de Bordeaux, de 1103 à 1135. Après lui, Arcin de Tabanac, moine à l'abbaye de la Sauve-Majeure, vécut au château. \r\nPLASSANS, le château a été construit à la fin du XVIIIe siècle par la famille Clauzel aujourd'hui la famille Mercier continue la tradition de la  famille de Sarrasy.                                                                           SONGEANT, château à Saint-Caprais de Bordeaux hôtel restaurant","architecture":"PLASSANS, la parfaite simplicité du décor, l'hormonieuse pureté des lignes font la beauté de Plassans; le rez de chaussée tout en longueur légèrement surélevé, petits pavillons en saillie à l'extrémité des ailes, portique central à fronton triangulaire, telle est la façade de ce château que l'on attribue à l'architecte Victor Louis. La façade postérieure, beaucoup plus solennelle, donne sur une terrasse et le parc. L'ensemble se dresse sur la partie la plus haute, au centre de l'exploitation. Entretenu avec amour il est demeuré intact depuis sa construction. La demeure est agrémentée dun parc, dune terrasse et de statues à lantique.             RENON de plan en U avec retour en équerre sur parc, la façade de l'édifice à deux niveaux la partie haute toit en croupe et lucarne présente une belle terrasse sur colonne toscanne, côté parc escalier droit.     SENTOUT, cette ancienne propriété viticole présente une architecture élégante qui a fait lobjet ces dernières années de profondes restaurations. Sa façade à balustres contribue à la personnalité du château qui est une combinaison de différents styles architecturaux issue des travaux successifs.","habitants":"Famille de Gérard de Tabanac                                    Plassans famille Mercier\r\n        \"","divers":"à Tabanac, celui de Sentout, de Renon et de Plassans Tabanac  44° 43' 17\" Nord et 0° 24' 16\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Tabanac_1.jpg","../../jctruffet.com/image/image_33/33_Tabanac_2.jpg","../../jctruffet.com/image/image_33/33_Tabanac_3.jpg","../../jctruffet.com/image/image_33/33_Tabanac_4.jpg","../../jctruffet.com/image/image_33/33_Tabanac_5.jpg","../../jctruffet.com/image/image_33/33_Tabanac_6.jpg","../../jctruffet.com/image/image_33/33_Tabanac_7.jpg","../../jctruffet.com/image/image_33/33_Tabanac_8.jpg","../../jctruffet.com/image/image_33/33_Tabanac_9.jpg"]},"Consult_chateau_formulaire18ca":{"id":"Consult_chateau_formulaire18ca","dept":"33","canton":"Saint-Médard en Jalles","commune":"Taillan-Médoc","nom":"Taillan","type":"Château","periode":"XVI-XVIII","histoire":"A Taillan le château de Bussaguet, du Loup et de la Dame-Blanche.                                                    BUSSAGUET, aujourd'hui propriété privée, appartenait au XVIe siècle à l'oncle de Michel de Montaigne, du XVIIIe siècle chambres d'hôtes.\r\ndu LOUT, du XIXe siècle aux allures de palais vénitien, aujourd'hui chambre d'hôtes par Colette de Salmon. Le château de la GORCE, aujourd'hui propriété privée.     la DAME-BLANCHE, situé au cur d'un domaine de 100 hectares au Taillan-Médoc, est un domaine situé aux portes du Médoc qui existe depuis le Moyen-Âge. Etait au XIVe siècle la possessions de la famille de Lomagne, en 1601 les Durfort seigneur de Blanquefort héritiers des Lomagne s'en s'éparent échange la terre de Taillan et d'autres fiefs avec Léonard de la Chèze qui le cède  deux ans après aux Poitevin qui font passer le fief par alliance à Thibault de  Lavie et les nouveaux propriétaires dès la fin du XVIIe et pendant un siècle, les marquis de Lavie se succèdent et construisent l'actuel château du Taillan.  Les marquis de Bryas,  en épousant Georgina de Lavie, le marquis Charles de Bryas devient propriétaire.  Les vicomtes Borelli  Le vicomte Charles de Borelli, puis son fils Emmanuel-Raymond héritent du domaine. Ce dernier, militaire et poète publie de nombreuses uvres.  Acquis en 1896, par Henri Cruse, descendant de la famille Cruse, quatre générations sy sont succédé. La propriété familiale est aujourdhui gérée par cinq surs qui en sont également propriétaires. Le Haras dans la propriété.","architecture":"La Dame Blanche, cet édifice, du XVIIIe siècle bâti sur lemplacement dune demeure plus ancienne, se compose d'un long corps de bâtiment rectangulaire prolongé, sur la façade principale, présente une façade sur cour avec un avant-corps central en saillie, coiffé dun fronton triangulaire à denticules, il est éclairé au rez-de-chaussée par trois baies plein cintre à clefs saillantes remanié au XIXe siècle. Le centre de la façade donnant sur le parc est occupé par une demi-rotonde qui souligne habituellement louverture des maisons de campagne sur le jardin. Le toit  en très faible pente est dissimulé par une balustrade. Il est construit de pierres blanches calcaires de Gironde, utilisées pour la plupart des bâtiments de Bordeaux.\r\nLes façades et toitures du château et ses caves voûtées, sont inscrites à la liste des M.H.de France le 23 novembre 1964.","habitants":"marquis de Lavie\r\n        \"","divers":"Château de Bussaguet, du Lout, de la Gorce et de La Dame blanche à Taillan","gps":"","images":["../../jctruffet.com/image/image_33/33_Taillan_1.jpg","../../jctruffet.com/image/image_33/33_Taillan_2.jpg","../../jctruffet.com/image/image_33/33_Taillan_3.jpg","../../jctruffet.com/image/image_33/33_Taillan_4.jpg","../../jctruffet.com/image/image_33/33_Taillan_5.jpg","../../jctruffet.com/image/image_33/33_Taillan_6.jpg","../../jctruffet.com/image/image_33/33_Taillan_7.jpg","../../jctruffet.com/image/image_33/33_Taillan_8.jpg"]},"Consult_chateau_formulaire051a-2":{"id":"Consult_chateau_formulaire051a-2","dept":"33","canton":"Talence","commune":"Talence","nom":"Talence","type":"Château","periode":"XVIII","histoire":"Les châteaux de Talence,  Belair, de Brama ( dit du Prince Noir. Voir article),  Raba,  Margaut, de Peixotto (voir article),de Thouars (première moitié du XIIIe siècle),  Monadey.                                                        RABA  Le château fut construit au XVIIIe siècle par l'architecte Victor Louis, pour Mme Raba et ses fils, de riches négociants bordelais d'origine portugaise. Il l'appartenu par la suite à Albert Ellissen.\r\nLe domaine fait lobjet d'une inscription au titre des M.H.depuis le 25 juillet 2007 alors que le château fait l'objet d'un classement depuis le 21 mars 2008, aujourd'hui hôtel  de Christophe San-José.    THOUARS  occupent en partie  lemplacement de lancienne bastide de Baâ, fondée à la fin du  XIIIe siècle dans la forêt royale par lévêque de Bath. Elle était un des symboles de la puissance anglaise en Guyenne sous Edouard III d Angleterre. Au XIVe et XVe  siècle, un pavillon de chasse servant de rendez-vous de chasse aux rois dAngleterre fut édifié. Anoblie et fortifiée, la demeure devient seigneurie  au XVIe siècle.","architecture":"RABA, construit au XVIIIe siècle, ensemble architectural exceptionnel composé dun château et de dépendances constituées de 3 corps de bâtiments disposés autour dune cour rectangulaire ouverte sur le sud, façade du château en pierre de taille, magnifiée par un balcon en pierre soutenu par des larges colonnes et orné de moulures et corniches.  Façade du domaine en pierre de taille et moellons enduits couronnées dune balustrade en pierre et marquées par une baie à fronton triangulaire reposant sur des piles à bossage et par cinq baies surmontées de frontons triangulaires ou cintrés, escalier de belle facture orné dune rampe en fer forgé, desservant les pièces du château. Il est entouré de jardins sur lesquels s'ouvrent les architectures raffinées de pavillons et de fabriques. Après la guerre de 1870, Albert Ellissen va redonner au château et au jardin, toute leur beauté. Durant la seconde guerre mondiale, l'occupation du château par les allemands lui infligèrent d'importantes mutilations.                      THOUARS, ce château a subi de nombreux remaniements et ne ressemble plus à celui dautrefois. Il ne reste plus que deux des anciennes tours rondes. Au Moyen-Age,  cétait  un massif quadrilatère flanqué de quatre grosses tours couronnées de créneaux et de mâchicoulis. Une porte ogivale souvrait dans la courtine reliant les deux tours en façade (côté sud). Les remparts étaient crénelés comme les tours. Un large fossé entourait le château qui passait pour une des plus belles places forte de la région construite sur une hauteur.","habitants":"Raba Famille  Albert Ellissen.                                 Thouars famille d'Agès.\r\n        \"","divers":"Château de Brama  et de Thouars à Talence   Raba 44° 47' 41\" Nord et 0° 35' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Talence_1.jpg","../../jctruffet.com/image/image_33/33_Talence_2.jpg","../../jctruffet.com/image/image_33/33_Talence_3.jpg","../../jctruffet.com/image/image_33/33_Talence_4.jpg","../../jctruffet.com/image/image_33/33_Talence_5.jpg","../../jctruffet.com/image/image_33/33_Talence_6.jpg","../../jctruffet.com/image/image_33/33_Talence_7.jpg"]},"Consult_chateau_formulaire74e7":{"id":"Consult_chateau_formulaire74e7","dept":"33","canton":"Talence","commune":"Talence","nom":"Talence_II","type":"Château","periode":"XVIII","histoire":"Dans cet article de Talence le château de Bel-Air, de Monadey, et la tour du Haut-Brion.                 MONADEY, le château actuel a été construit au XVIIe siècle, sur l'emplacement d'une ancienne construction bâtie par la famille Monadey. En 1748, le château passera dans les mains de l'armateur bordelais Abraham Gradis, dont la famille restera longtemps propriétaire. François Roul, maire de Talence et député de la Gironde, l'acquit, au XIXe siècle. Par la suite, il appartiendra à M. Willette, qui, en 1942, le cédera au commissariat général à léducation nationale et aux sport pour y installer le centre régional de l'académie de Bordeaux. Une partie du domaine sera affecté au campus universitaire. Le château Monadey accueille dans ses murs depuis le CREPS.   La Tour HAUT-BRION eut dès le XIIIe siècle une activité viticole, grâce à Guillaume de Rostang, maire de Bordeaux en 1229, qui développa la vigne autour de son fief.  Les Rostaing de la Tour, furent l'une des première famille à développer une viticulture laïque à la fin du Moyen-Age.","architecture":"BEL-AIR   La construction du château date du XVIIIe siècle.  Deux ailes basses de plan simple en profondeur flanquent le corps principal de plan double. La maison devient le siège d'un important vignoble. Elle fut transformée en un \"château\" viticole avec un toit d'ardoise à brisis. Le château de Bel Air est inscrit aux M.H. depuis 2009.  possède deux portails en forme de demi-lune et une cloture inscrits aux M.H.   MONADEY, au XVIIe siècle, par la construction actuelle de style Louis XV \r\nLa Tour HAUT-BRION L'édifice, qui possède un toit à la mansart, est aujourd'hui une maison de retraite.","habitants":"Famille Monadey                                                             Les Rostaing de la Tour\r\n        \"","divers":"Château de Monadey , haut Brion et  Bel-Air : 44° 48' 09\" Nord et 0° 34' 48\" Oues","gps":"","images":["../../jctruffet.com/image/image_33/33_Talence_II_1.jpg","../../jctruffet.com/image/image_33/33_Talence_II_2.jpg","../../jctruffet.com/image/image_33/33_Talence_II_3.jpg","../../jctruffet.com/image/image_33/33_Talence_II_4.jpg","../../jctruffet.com/image/image_33/33_Talence_II_5.jpg"]},"Consult_chateau_formulaireeb85":{"id":"Consult_chateau_formulaireeb85","dept":"33","canton":"Blaye","commune":"Tauriac","nom":"Tauriac_Blaye","type":"Château","periode":"XVIII-XIX","histoire":"Il existe 3 châteaux à découvrir à Tauriac ,  de Haut-Macô, du Piat, qui datent du XVIIIe siècle. \r\nHAUT-MACO, d'Anne et Hugues Mallet, est une exploitation familiale depuis 4 générations. Depuis la fin du XIXe siècle, la famille Mallet est aux commandes de cette propriété. Jean et Bernard Mallet donnèrent un souffle nouveau, en investissant en masse dans loutil de production.  Depuis 2004, Anne et Hugues, les enfants de Bernard, ont  repris les rênes. \r\nLe PIAT, lhistoire des Peychaud est lisible depuis 1562 et Brantôme cité par trois fois leur nom dans ses lettres au roi Henri III.  De la branche commerçante, Joseph-Guillaume Peychaud, dit Milord, est élu à la bourse de Bordeaux, le 5 mai 1780 en même temps que Pierre Chicou et Arnaud Lavaud aîné. Il est propriétaire à Bordeaux d'un immeuble  fait bâtir le château. Le Piat dans lesprit du grand théâtre de Bordeaux inauguré en avril 1780. Fin 1789 Joseph-Guillaume Peychaud négociant à Bordeaux et propriétaire du château  à Tauriac,   Joseph-Guilaume Peychaud, appelé usuellement Milord ou Milord Peychaud, s'illustre aussi en fournissant du grain à la ville de Bourg lors de la famine de 1789, toujours dans la famille.","architecture":"Le château Haut-Macô bâti à Tauriac est une exploitation familiale depuis 4 générations, située dans la commune de Tauriac, dans la région viticole des côtes de Bourg, au nord de Bordeaux. \r\nDepuis la fin du XIXe siècle, notre famille travaille à lévolution de cette exploitation viticole aujourdhui reconnue par les professionnels et amateurs de vin. Les deux premières générations ont principalement constitué le vignoble avec le château Haut-Macô, la marque originelle de la famille et le château les Bascauts, îlot de vignes attenant au vignoble de Haut-Macô.                                                                                 PIAT  Edifiée sur un bâti du XVIe siècle préservé des usures du temps, la chartreuse fut, dès sa construction, habitée uniquement aux beaux jours. Elle était destinée à afficher la réussite de son propriétaire, Joseph Guillaume Peychaud, dit Milord, négociant bordelais et membre de la bourse du commerce à partir de 1780, natif de Bourg, la commune voisine se situe à Tauriac dans le vignoble bordelais. Cette chartreuse d'époque Louis XVI, de style néoclassique, est luvre de larchitecte Jean Lespine comme en témoigne linscription du fronton. Directement inspiré par Victor Louis architecte  du château du Bouilh, le bâtiment a toutes les caractéristiques du Petit Trianon à Versailles. La trace de Jean Lespine, identifié comme maître architecte, se trouve sur l'acte de baptême de sa fille en 1782 : Baptême de Marie-Agathe, fille de Jean Lespine, maître architecte (18 août 1782).","habitants":"Haut-Maco famille Mallet Joseph-Guillaume Peychaud \r\n        \r\n        \"","divers":"à Tauriac : les Châteaux de Macô g-2, du Pia,","gps":"","images":["../../jctruffet.com/image/image_33/33_Tauriac_Blaye_1.jpg","../../jctruffet.com/image/image_33/33_Tauriac_Blaye_2.jpg","../../jctruffet.com/image/image_33/33_Tauriac_Blaye_3.jpg","../../jctruffet.com/image/image_33/33_Tauriac_Blaye_4.jpg"]},"Consult_chateau_formulaire0255":{"id":"Consult_chateau_formulaire0255","dept":"33","canton":"Lacanau","commune":"Arsac","nom":"Tertre","type":"Château","periode":"XVII","histoire":"TERTRE, bâti à Arsac, du XVIe siècle, que Thomas de Montaigne, frère de Michel de Montaigne, épousera Jacquette dArsac et deviendra, en 1590, seigneur des maisons nobles dArsac et du Castéra et autres en Médoc. Puis au XVIIe siècle, le château du Tertre va appartenir à la famille dArrérac, puis à la famille de Ségur. C'est au XVIIIe siècle, que la famille Mitchell va constituer le domaine du Tertre. L'industriel et gentilhomme verrier Pierre Mitchell (1687-1740) rachètera, en 1724, une partie de la seigneurie et fera agrandir  le domaine, de 1724 à 1740. Il fera construire le château du Tertre vers 1736, sa femme et leur fils François-Patrice Mitchell vont complèter son uvre avec deux nouveaux achats, en 1748 et en 1749. Henri de Koenigswarter devient à son tour, propriétaire du château et de son domaine, au XIXe siècle.  En 1925, le château du Tertre est racheté par Achille de Wilde, un important négociant belge, qui le conservera jusqu'en 1952.  En 1997, Eric Albada Jelgersma, homme daffaires néerlandais, également propriétaire du château Giscours, va racheter le château et son domaine, où il réalisera dimportants investissements afin den restructurer lensemble.","architecture":"Tertre de plan en U à deux niveaux sur soubassement avec en façades deux pavillons relié par un corps de logis de même niveau avec pavillon saillant plein cintre en façade avec fronton triangulaire l'ensemble de toit en croupes recouvert de tuiles.","habitants":"Famille de Ségur\r\n        \"","divers":"Château de Tertre : 44° 59' 52\" Nord et 0° 41' 15\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Tertre_1.jpg","../../jctruffet.com/image/image_33/33_Tertre_2.jpg","../../jctruffet.com/image/image_33/33_Tertre_3.jpg"]},"Consult_chateau_formulaire87c0":{"id":"Consult_chateau_formulaire87c0","dept":"33","canton":"Blaye","commune":"Gauriac","nom":"Thau","type":"Château","periode":"XIV","histoire":"THAU, Louis de Grimard, président à Mortier au parlement de Bordeaux, est propriétaire dans les années 1680-1700. Une Grimard, Jeanne, épousa Philibert Dussault, conseiller puis doyen de la cour au parlement de Bordeaux, un fils, Jean-Louis, qui hérita de Thau. De son mariage avec Marie Le Blanc de Mauvezin naquit Marie qui épousa Alain-Joseph de Fayet, conseiller à la grande-chambre. Leur fille, Marguerite de Fayet, épousa à son tour Jean-Baptiste Lecomte, marquis de Latresne, premier président au parlement de Bordeaux. À la mort de ce dernier, la dame de Fayet devint maîtresse des lieux. Leur fils  Antoine de Bodin-Dussault de Saint-Laurent, seigneur de Boissalut et de Roque de Tau, président de la cour des aides de Bordeaux, fut représentant de la noblesse aux états généraux en 1789. Le 8 novembre 1793, le comité de surveillance d'Eysines décide de son arrestation, lui reprochant ses idées hostiles à la convention montagnarde. Le tribunal révolutionnaire le condamne à mort et il est guillotiné. Après cette exécution, le domaine est déclaré bien national. Il est alors temporairement occupé par un agent du district de Bourg avant d'être vendu en 1795. Plus près de nous, pendant de très nombreuses années, il appartient à la famille Viaud (des carriers) qui ne l'a jamais habité et qui fit construire un château moderne à proximité le château de Banly. Il appartient aujourd'hui à la famille Schweitzertizac Lapouyade.","architecture":"THAU, vestiges de l'habitation médiévale fortifiée, le château de Thau est aujourd'hui l'établissement fortifié le mieux conservé du Bourgeais. Il est établi sur un promontoire rocheux de la rive gauche du Grenet. Au XIVe siècle, le château, désigné sous le nom de château de Taur, aurait exercé une suzeraineté sur les castels de plusieurs paroisses voisines percevant un péage sur les marchandises allant de la Saintonge en Guyenne et réciproquement. Cependant le château n'apparaît de façon explicite dans les textes qu'au XVIe siècle. Il possédait alors semble-t-il de hautes murailles crénelées et une douzaine  de tourelles à pointe. Autour du château, la propriété était vaste et le fief s'étendait sur les domaines de Perlier, Bone, Loudenat et Peyror.                                               BONE vous offre un cadre splendide pour toutes vos réceptions ou séminaires.  le  château Bone a été acheté par Mr Jean-Paul Jaubert au début des années 80. Gérant dautres propriétés familiales dans le Bourgeais jusque dans la fin des années 90.","habitants":"Famille Viaud                                                                  Mr Jean-Paul Jaubert \r\n        \"","divers":"Vestiges du château de Thau","gps":"","images":["../../jctruffet.com/image/image_33/33_Thau_1.jpg","../../jctruffet.com/image/image_33/33_Thau_2.jpg","../../jctruffet.com/image/image_33/33_Thau_3.jpg","../../jctruffet.com/image/image_33/33_Thau_4.jpg","../../jctruffet.com/image/image_33/33_Thau_5.jpg","../../jctruffet.com/image/image_33/33_Thau_6.jpg","../../jctruffet.com/image/image_33/33_Thau_7.jpg","../../jctruffet.com/image/image_33/33_Thau_8.jpg"]},"Consult_chateau_formulaire99d7":{"id":"Consult_chateau_formulaire99d7","dept":"33","canton":"Coutras","commune":"Tizac de Lapouyade","nom":"Tizac_Lapouyade","type":"Manoir","periode":"XVII","histoire":"La Maison noble de Taillefer est un château bâti à Tizac-de-Lapouyade, il est inscrit aux M.H. depuis 2008. Maison noble fortifiée, Taillefer appartient d'abord à la famille de Lesnier du XVIe siècle à 1640, puis aux Paty noblesse de robe jusqu'en  1730. La fronde entraîne d'importantes dégradations dont la démolition des fortifications. Les Angaud, marchands bordelais propriétaires de 1730 à 1774 vendent leur bien à une famille de notables. L'un d'entre eux, Jean Duraux fait bâtir l'aile est en 1795. Au XIXe siècle, Alfred Chantecaille, époux d'une fille Dureau reconstitue patiemment l'intégralité du domaine et réalise d'importants travaux de 1882 à 1887.        La Commanderie de LaTaste.  De 1882 à 1887 l'intégralité du domaine est reconstitué par Alfred Chantecaille, l'aile est rallongée, les dépendances et jardins sont restaurés.","architecture":"La Commanderie de LaTaste. Très belle bâtisse avec un plan en U et des tours aux angles.                          Le château de Taillefer récemment restauré et inscrit à l'inventaire supplémentaire des M.H. avec une tour datant des XIVe-XVe siècles. Maison noble fortifiée construite durant  la seconde moitié du XVIe siècle, le manoir comporte deux parties : la maison forte du XVIe siècle, rectangulaire, flanquée de deux tours aux angles opposés, l'une ronde, l'autre, hexagonale ; l'aile bâtie en 1795 et rallongée en 1882-84, simple et élégante. Un parc paysager, ainsi que diverses dépendances sont disposées autour du château.","habitants":"Famille de Lesnier \r\n        \"","divers":"Taillefer 45° 04' 47\" Nord et 0° 19' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Tizac_Lapouyade_1.jpg","../../jctruffet.com/image/image_33/33_Tizac_Lapouyade_2.jpg","../../jctruffet.com/image/image_33/33_Tizac_Lapouyade_3.jpg","../../jctruffet.com/image/image_33/33_Tizac_Lapouyade_4.jpg"]},"Consult_chateau_formulaired637":{"id":"Consult_chateau_formulaired637","dept":"33","canton":"Lesparre médoc","commune":"Valeyrac","nom":"Valeyrac","type":"Château","periode":"XIX","histoire":"Trois châteaux à Valeyrac, Bourdieu, le Temple et Valeyrac.                                                                 BOURDIEU, le domaine qui a appartenu en 1737 au courtier royal Delmestre, est resté la propriété de la famille Delmestre et Meyniac, qui vont assurer la gestion du domaine, un cru bourgeois, sur trois générations successives jusquen 1908. Construit vers 1830 par Philippe Delacourt, reconnu seigneur du Bourdieu, dans le style architectural des maisons de maître du XIXe siècle.                                        VALEYRAC Micronesia Holding achète Rousseau de Sipian, le château Rousseau de Sipian, change de main. La famille anglaise Racey, à la tête de ce domaine de 14 hectares depuis 2000, le cède à Micronesia Holding, société de Hong Kong qui importe  et dont cest le premier achat en Gironde.  Doté dune superbe demeure  un atout maître pour vendre à des chinois  ce cru bourgeois propose aussi cinq chambres à louer.                                                                      TEMPLE sur la commune de Valeyrac, est une demeure élégante dun étage dont lorigine remonte à lordre des Templiers. La famille Bergey exploite ce vignoble de 18 hectares depuis 1933. Au cur de lappellation Médoc, découvrez litinéraire de vignerons passionnés depuis 3 générations en compagnie dun guide professionnel.     Jean-Pierre, Mélissa et Loïc Bergey EARL Le Temple de Tourteyron.","architecture":"Bourdieu, orienté au sud-est, se compose d'un corps d'immeuble élevé d'un étage et flanqué de deux pavillons latéraux de plain pied. La partie centrale, en légère saillie, accueille les portes médianes à deux vantaux séparant deux groupes de deux fenêtres, au rez-de-chaussée comme à l'étage. Elles sont surmontées d'arcades demi-circulaires, dont celle du rez-de-chaussée est ornée de moulures. Les impostes sont fermées de 8 carreaux disposés en arc de cercle selon un motif rayonnant formant 4 secteurs angulaires de 45°. L'imposte du rez-de-chaussée est défendue par une pièce de ferronnerie ornée des initiales J.D. de J. Delmestre dans un médaillon. La porte supérieure donne sur un balcon en fer forgé, la porte d'entrée sur un perron de deux marches. Les chaînages et ressauts à bossages continus structurent la façade principale, alors que la façade nord n'en dispose pas. \r\nLe domaine du Bourdieu disposait d'un parc arboré de qualité avec de nombreuses essences. Ce parc, dont les arbres étaient vieillissant, a beaucoup souffert de la tempête de 1999.","habitants":"Famille anglaise Racey\r\n        \"","divers":"Trois châteaux à Valeyrac, Bourdieu, le Temple et Valeyrac","gps":"","images":["../../jctruffet.com/image/image_33/33_Valeyrac_1.jpg","../../jctruffet.com/image/image_33/33_Valeyrac_2.jpg","../../jctruffet.com/image/image_33/33_Valeyrac_3.jpg","../../jctruffet.com/image/image_33/33_Valeyrac_4.jpg"]},"Consult_chateau_formulaireeeaf-2":{"id":"Consult_chateau_formulaireeeaf-2","dept":"33","canton":"Pineuilh","commune":"Ruch","nom":"Vaure","type":"Château","periode":"XVII","histoire":"Le château de Vaure est un château bâti à Ruch,  Le château de Vaure est une demeure de style classique.","architecture":"Le château a été construit entre la fin du XVIe et le début du XVIIe siècle ; il est entouré sur trois côtés de douves avec murs d'escarpe et de contrescarpe et se compose de trois corps de bâtiments formant une cour carrée dont trois gros pavillons carrés marquent les angles : dans un angle de la cour, une voûte en anse de panier porte une terrasse munie d'une balustrade de pierre caractéristique du XVIIe siècle.\r\nL'édifice a été inscrit au titre des M.H.par arrêté du 8 novembre 1996 pour ses douves, ses contrescarpes, le sol de sa cour, son portail, ses escaliers intérieurs et ses façades.","habitants":"Seigneurs locaux\r\n        \"","divers":"44° 47' 3,93\" Nord et 0° 2' 8,23\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Vaure_1.jpg","../../jctruffet.com/image/image_33/33_Vaure_2.jpg"]},"Consult_chateau_formulaire417c":{"id":"Consult_chateau_formulaire417c","dept":"33","canton":"Libourne","commune":"Vayres","nom":"Vayres","type":"Château","periode":"XIII-XVII","histoire":"VAYRES,  bâti à Vayres, date du XIe siècle, Raymond de Gombaud seigneur du lieu en 1288  Rose de Bourg  descendante des Gombaud , apporte Vayres à son mari Amanieu d'Albret qui édifie une nouvelle fortifications,  le fils d'Armanieu ayant épousé une Grailly et  étant décédé prématurément sa veuve transmet le fief à son frères Archambaud de Grailly, le fils Gaston de foix lui succède. Jeanne d'Albret revendique ses droits le transmet à  Henri de Navarre, futur roi Henri IV, le roi d'Angleterre le retire et le remet à Gaston de Foix étant dans l'obligaion de s'éxilé en Aragon, le château est passé aux Dunois qui eu le revend au neveu de Gaston de Foix. Vayres est restitué aux Albret qui le vende  en 1556 aux Pontacq, passe aux Foix-Candale, aux Chaumont, et aux Barrault avant d'être racheté par le roi de Navarre Il y séjourne à plusieurs reprises puis, ruiné, le vend en 1583 à Ogier de Gourgue qui le restaure. Président des trésoriers des finances de Guyenne. La forteresse est alors transformée en château dagrément dans le style de la Renaissance, le garderont jusqu'au milieu du XIXe siècle. Louis de Foix crée à Vayres la magnifique façade, puis en 1700  par Jacques-Joseph de Gourgue, évêque de Bazas, et possède un superbe parc. Son histoire est liée à celle de la ville de Bordeaux qu'il a longtemps protégée. Les Gourgue conservèrent le château  jusqu'e 1905 passa ensuite à madame Pavillon puis en 1936 à la famille de Paul Dubost toujours propriétaire","architecture":"VAYRES Jacques-Joseph de Gourgue, évêque de Bazas, en entreprendra, vers 1700, la restauration. Il fait apporter des modifications qui mettent le bâtiment au goût du jour : côté Dordogne, on harmonise les corps de bâtiments et on crée un escalier monumental qui enjambe les douves. Cet escalier est l'un des éléments architecturaux les plus remarquables du château de Vayres. Au tout début du XVIIe siècle, le pont-levis et la barbacane sont remplacés par un pont « dormant » et un portique à la Vauban par où lon pénètre désormais dans le château.  La façade magnifique  à décor maniériste (style de la Renaissance finissante) et dun grand raffinement, côté jardin à été remanié en 1695; un pavillon coiffé d'un dôme, na plus subi de transformation depuis cette époque, ses vieilles murailles dentelées de créneaux dominent les profonds fossés, ses hautes tours carrées, son dôme, la défense de sa porte, sa cour intérieure embélie d'une galerie à l'italienne ornée de plaisants motifs sculptés, le rez-de-chaussée acceuille une élégante galerie tandis que la cour est fermée par un vaste mur percé de trois portails monumentaux . Les façades et toitures du château, du moulin et des dépendances ont été classées au titre des M.H. le 4 octobre 2001. Le jardin a, quant à lui, été classé par arrêté du 9 avril 2002.","habitants":"Famille  d'Archambaud de Grailly\r\n        \"","divers":"Château de Vayres, 44° 54' 01\" Nord et 0° 18' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Vayres_1.jpg","../../jctruffet.com/image/image_33/33_Vayres_2.jpg","../../jctruffet.com/image/image_33/33_Vayres_3.jpg","../../jctruffet.com/image/image_33/33_Vayres_4.jpg","../../jctruffet.com/image/image_33/33_Vayres_5.jpg","../../jctruffet.com/image/image_33/33_Vayres_6.jpg"]},"Consult_chateau_formulaire51c1":{"id":"Consult_chateau_formulaire51c1","dept":"33","canton":"Lesparre médoc","commune":"Vertheuil","nom":"Vertheuil","type":"Château","periode":"XVIII","histoire":"Deux château à Vertheuil dont Vertheuil et celui de Beyzac.                                                                     BEYZAC, propriété de la famille de Camiran, fut  reconstruit en 1750.  puis modifié, dans les années 1860. En 1793, le comité de surveillance de Lesparre utilise le château comme maison d'arrêt.  Le baron de Pichon-Longueville, maire de Pauillac, y sera détenu quelque temps. Romain Dupérier de Larsan, poète révolutionnaire, viendra y délivrer sa mère. Le 26 Brumaire de l'an II, le domaine appartient à « l'émigré Majance-Camiran » et est vendu comme bien national. Il est racheté par la « veuve Camiran » De nombreux propriétaires se succèdent tout au long du XIXe siècle : Jacques-Henri Wustenberg, négociant et membre de la chambre des députés ; Emile Bosc ou encore Henri Nathaniel Brown de Colstoun. Au XIXe siècle il était utilisé comme château d'eau. Pendant de nombreuses années le château est délaissé, les intérieurs saccagés et le parc abandonné. En 1998, de nouveaux propriétaires ont racheté le domaine et ont replanté  autour du château. Il est inscrit aux M.H.depuis 2006. Propriété de la famille Jean-Paul et Brigitte Roland.                                                               VERTHEUIL,  bâti à Vertheuil,  Il existait déjà à la fin du XIe siècle. Sa construction date du XIIe- XIVe  siècle. Au XIVe siècle et au XVe siècle, la famille d'Albret alors propriétaire, changea plusieurs fois de bannière, en 1489, la baronnie fut léguée au chapitre de Saint-André de Bordeaux qui la garda jusqu'en 1789, date à laquelle elle fut confisquée et vendue comme bien national.","architecture":"BRYZAC, de plan rectangulaire, il est précédé d'une cour encadrée de grands communs au sud et au nord, et fermée à l'est par une grille. La façade ouest présente, à ses extrémités, deux pavillons carrés encadrant une terrasse. Le corps central est précédé d'une rotonde à pans coupés. A l'intérieur, l'escalier tournant à deux volées droites, orné d'une rampe en fer forgé, a été reconstruit et retourné lors de la construction de la rotonde.                                  VERTHEUIL une enceinte polygonale entourée d'un large fossé circulaire. Une deuxième partie se compose
