semble de services destinés à améliorer le quotidien des habitants pouvant se rencontrer et échanger avec divers services publics et associations.                          LAURIERS fut construit vers 1860 dans le goût éclectique du XVIIe siècle. M. Henri Gradis, qui lembellit et le réaménagea, descendait dune des plus puissantes familles bordelaises qui avait fait fortune dans le négoce, laffrètement et le commerce triangulaire au XVIIIe siècle. Le parc, loué et admiré, a été dessiné par larchitecte Ferdinand Fischer dans lesprit des jardins anglais. Lensemble a été racheté en 1948 par la caisse primaire dassurance maladie pour abriter une maison de convalescence et depuis 1989, le musée national de lassurance maladie.","habitants":"Genicart; M. Hippolyte Gourdon                          Mireport; Salomon Cardoze                                Madame Blanc de Manville                                           Bois-Fleuri M. Jouin,                                                       Lauriers  M. Henri Gradis\r\n        \"","divers":"à Lormont dont celui de Lormont bois fleuri  g -1-3, de Génicart g-5, de Mireport g-4, d'Iris g-6,  et de Lauriers g-7-8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Lormont_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_2.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_3.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_4.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_5.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_6.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_7.jpg","../../jctruffet.com/image/image_33/33_Lormont_Gironde_8.jpg"]},"Consult_chateau_formulaireff5e":{"id":"Consult_chateau_formulaireff5e","dept":"33","canton":"Pineuilh","commune":"Loubens","nom":"Loubens_Lavison","type":"Château","periode":"XIII-XVI","histoire":"Plusieurs châteaux à Loubens dont celui de Lavison, la tour de Gères                                                        . LAVISON,  date, à l'origine, du XIIIe siècle et a été remanié et agrandi aux XVIe et XVIIe siècles ; il est la propriété d'une personne privée, et peut être visité tout au long de l'année ; il est inscrit monument historique depuis 1987. Aujourd'hui à la famille Martet","architecture":"Lavison, une architecture médiévale défensive révolue, pour les amateurs de château authentique, bâti au XIIIe siècle le château  est un cadeau pour un des chevaliers d'Edouard III, le seigneur de Lavison. Lavison, signifie \"la vue\". Cet édifice militaire a été utilisé pendant la guerre de cent ans puis il devient le lieu de chasse du prince Noir (Edouard de Woodstock).\r\nAux XVe et XVIe siècle une large baie est ouverte et des travaux sont entamés notamment la construction d'une cage d'escalier appuyée au logis. Ce logis est fait de poutres peintes et d'une cheminée en stuc qui date du XVIe siècle.","habitants":"Famille Martet\r\n        \"","divers":"Château de Lavison à Loubens","gps":"","images":["../../jctruffet.com/image/image_33/33_Loubens_Lavison_1.jpg","../../jctruffet.com/image/image_33/33_Loubens_Lavison_2.jpg","../../jctruffet.com/image/image_33/33_Loubens_Lavison_3.jpg","../../jctruffet.com/image/image_33/33_Loubens_Lavison_4.jpg","../../jctruffet.com/image/image_33/33_Loubens_Lavison_5.jpg","../../jctruffet.com/image/image_33/33_Loubens_Lavison_6.jpg","../../jctruffet.com/image/image_33/33_Loubens_Lavison_7.jpg"]},"Consult_chateau_formulaireea05":{"id":"Consult_chateau_formulaireea05","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Yzans de-Médoc","nom":"Loudenne","type":"Chartreuse","periode":"XVII","histoire":"LOUDENNE, est une magnifique chartreuse du XVIIe siècle, plantée sur les côteaux de l'estuaire, la vaste demeure se différencie des autres châteaux du Médoc par sa couleur rose et son étonnante collection de roses anglaises anciennes et rares qui lui ont valu le surnom de « Pink château ».  En juin 2013 le groupe Moutai de Chine acquiert la propriété pour redonner au château Loudenne sa splendeur de lépoque de Gilbey, ses propriétaires britanniques durant 125 ans (1875-2000) qui ont cédés  à la famille Lafragette en 2000. chambres d'hôtes de Paloubeillé de Mr Cazeneuve.","architecture":"le château Loudenne se trouve en bordure de l'estuaire de la Gironde et bénéficie d'un climat idéal et nécessaire à l'élaboration d'un médoc. le terroir de graves et d'argiles confère au château une singularité particulière. De  plan oblong de douze travées  d'un étage avec attique en oeil de boeuf entre deux pavillons rectangulaire qui eux sont accolés d'une tourelle sur l'angle extérieur.","habitants":"Famille Lafragette\r\n        \"","divers":"Château de Loudenne à Saint-Yzans de-Médoc","gps":"","images":["../../jctruffet.com/image/image_33/33_Loudenne_1.jpg","../../jctruffet.com/image/image_33/33_Loudenne_2.jpg","../../jctruffet.com/image/image_33/33_Loudenne_3.jpg","../../jctruffet.com/image/image_33/33_Loudenne_4.jpg","../../jctruffet.com/image/image_33/33_Loudenne_5.jpg","../../jctruffet.com/image/image_33/33_Loudenne_6.jpg"]},"Consult_chateau_formulaire75c4":{"id":"Consult_chateau_formulaire75c4","dept":"33","canton":"La Bréde","commune":"Leognan","nom":"Louvière","type":"Château","periode":"XIV-XVII","histoire":"LA-LOUVIERE bâti à Léognan, en 1398-1620 : dans un acte de la famille de Guilloche, fondatrice du vignoble moderne de La Louvière. À la fin du XVe siècle, cette même famille comptait parmi les siens, un poète, Jehan de Guilloche, frère de Raymond, seigneur de La Louvière. Entre 1510 et 1550, grâce au dynamisme et à la clairvoyance de deux hommes, Pierre de Guilloche et son fils Jean, qui se lancèrent dans d'importantes opérations foncières.    En 1618, la dernière héritière de la maison de Guilloche, la dame de Roquetaillade, Tobie de lansac  baron de Roquetaillade  vendit la maison Noble de La Louvière et ses dépendances à Arnaud de Gascq, abbé commendataire de l'abbaye de Saint-Ferme.  1792-1901 : La Famille Mareilhac, 1911-1965.  A la mort de Jean-Baptiste Mareilhac en 1831 demeure la résidence campagnarde de son épouse Jeanne Emilie Bonneau avant de revenir en 1838 à leur fils Bélus  qui cède la demeure à Juan José de -Acha rentier bordelais d'origine espagnole qui meurt en 1842 Bélus de Marcilhac reprend le domaine et son fils Alfred s'emploie de redonner  son éclat au château  jusqu'à son décès en 1882. la Louvière est acquis par Edmond Labasse et en 1911 passe à Alfred Bertrand-Taquet, en 1965 : L'arrivée d'André Lurton fut le renouveau du château de la Louvière.","architecture":"La Louvière à l'origine en 1400 une maison noble,  qui fut rasé en 1792 par jean baptiste de Mareilhac et fait édifier à la place une résidence campagnarde, entourés de deux cours latrales  qui abritent les communs, de forme rectangulaire, élevée sur un étage principal et un étage de combler repose sur un sous sol à demi-enterré, dans lequel prennent jour de petites fenêtres à croisées de bois sur la façade d'arrivée et de simple soupiraux sur la façade côté parc. La façade du levant sur la cour s'orne en son centre d'un péristyle à quatre colones ioniques encadrant la porte d'entrée vers laquellle mène un escalier droit. une balustrade de pierre décore l'allège des baies de l'étage principal, une terrasse s'ouvre au devant d'une baie surmontée d'un fronton triangulaire.","habitants":"Famille Mareilhac\r\n        \"","divers":"la Louvière : 44° 43' 46\" Nord, 0° 35' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Louvi%c3%a8re_1.jpg","../../jctruffet.com/image/image_33/33_Louvi%c3%a8re_2.jpg","../../jctruffet.com/image/image_33/33_Louvi%c3%a8re_3.jpg","../../jctruffet.com/image/image_33/33_Louvi%c3%a8re_4.jpg"]},"Consult_chateau_formulairea359":{"id":"Consult_chateau_formulairea359","dept":"33","canton":"Eysines","commune":"Ludon-Médoc","nom":"Ludon_Médoc","type":"Château","periode":"XVIII","histoire":"Plusieurs demeures, Morange, Cantemerle, Ermitage, Arche, Agassac (voir article) Nexon, Paloumey (voir article)  Lagune et Paloubeille, sont construites au XVIIIe siècle.                                                                 LAGUNE, cest le trésorier de France et conseiller au parlement de Bordeaux Jean-François de Lavaud  fait construire le domaine de La Lagune à partir de 1730. La maison noble de Cazalet est attestée dès le XVIe siècle à cet emplacement et résulte dune division du domaine dAgassac entre les frères Dussault. En 1738, lavocat au parlement de Bordeaux Joseph de Bacalan achète ce bien composé dune simple « maison » avec dépendances à François de Sarran. Il devient jurat en 1740. Au sommet de sa carrière, il a choisit de confier à un architecte de la place bordelaise le soin dédifier sa demeure.  Les plus importants sont ceux de lErmitage, Pachan, Lacombe ou encore Morange. À chaque fois, un château du XIXe siècle prend la place danciens bâtiments. En 1854, le domaine de l'Ermitage  est vendu par l'héritière Françoise de Bacalan à Eugène-Louis Simonet de Bordeaux. Le château dArche est une des demeures construites au cur du bourg. Cest un corps de bâtiment principal perpendiculaire à la route, dont la façade à travées ordonnancées donne sur une cour et un jardin. La famille dArche, propriétaire depuis les années 1720, semble être à lorigine dune grande partie de lédifice même si de nombreuses modifications sont opérées au siècle suivant.","architecture":"Bacalan, chartreuse de charme, simplicité des lignes, légers avant corps, la forte saillie de la frise en genoise. L'ensemble se compose d'une demeure à double façade et de ses dépendances organisées au nord et au sud. Côté ouest, la façade est traitée de manière similaire, rythmée de pilastres à bossage, encadrant les travées extérieures et surmontée par une corniche moulurée et une génoise. La demeure ne semble pas posséder un niveau de soubassement malgré une porte semi-enterrée sur le pignon nord mais bien un étage ou entresol, oculis du pignon sud et fenêtres hautes du pignon nord. Au sud se trouvent les bâtiments d'exploitation organisés en U autour d'une cour, dans le prolongement de la demeure, un bâtiment bas ouvert côté cour et terrasse par des baies en arc segmentaire abritait peut-être les anciens chais ou des logements secondaires ;\r\nDe dimensions plus modestes que Bacalan et La Lagune, la construction du château Nexon-Lemoine est difficile à dater car ses façades ne sont pas homogènes. Au début du XVIIIe siècle, la famille Lemoine, dune lignée de la haute magistrature libournaise, achète le domaine appelé de Dodin. Il sagit en fait dune ancienne maison noble construite au XVIe siècle dont de fausses croisées subsistent.","habitants":"Jean-François de Lavaud                                             famille Lemoine \r\n        \"","divers":"Plusieurs demeures, Morange, Cantemerle, Ermitage g 3, Arche g 1,  et Nexon,  et Lagune g-5 et Paloubeille g-6 à Ludon en médoc","gps":"","images":["../../jctruffet.com/image/image_33/33_Ludon_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_Ludon_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_Ludon_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_Ludon_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_Ludon_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_Ludon_M%c3%a9doc_6.jpg"]},"Consult_chateau_formulaire4e62":{"id":"Consult_chateau_formulaire4e62","dept":"33","canton":"Coutras","commune":"Lussac","nom":"Lussac","type":"Château","periode":"XII-XVIII","histoire":"Trois châteaux à Lusssac dont celui de Lussac, la Tour de Ségur et le Terrien.                                               LUSSAC  est facilement visible par son architecture. Le bâtiment est construit en 1876 pour Gascon Montouroy. La propriété est ensuite transmise à son beau-frère, marquis de Sercey, dont la descendance gère le domaine jusquen 1980. Puis, pendant environ 15 ans, la direction est entre les mains d'Olivier Roussel. Racheté en 2000 par Griet et Hervé Laviale, bénéficie d'importants travaux de rénovation. Un remarquable cuvier circulaire est notamment aménagé.                                                                        LA TOUR DE SÉGUR,  au XIIe siècle, le château appartenait aux de ségur,  illustre famille de Guyenne,   le  sieur de Ségur fit don à lAbbaye de Faise du château de La Tour, à titre de rachat expiatoire dun homicide commis par lui en chassant dans la forêt voisine. Au XVIIIe siècle, labbé de Montesquieu vint régulièrement en villégiature au château pour se reposer, aujourd'hui chambres d'hôtes  de André et Corinne Nizet. \r\nTERRIEN, les Favereau sont une grande famille de parlementaires bordelais. Installés à Lussac depuis le XVIIe siècle, leur fortune semble se consolider au siècle suivant puisquils font construire deux châteaux sur le territoire de Lussac. Lun deux est celui  de Barbe Blanche et lautre est celui de Terrien.","architecture":"LUSSAC, le bâtiment central sinspire des bâtiments classiques à la mode en France à partir du XIXe siècle et deux pavillons flanquent ce corps central surmonté dun fronton monumental inspiré, quant à lui, de la Renaissance.  La commune de Lussac conserve sur son territoire un joyau que nous ne pouvons ignorer, dautant quil vient dêtre classé aux M.H.\r\nLA TOUR DE SÉGUR du XIIe siècle,  A lorigine, il sagissait dun puissant donjon carré, entouré de fossés de cinq mètres de profondeur, comprenant un rez-de-chaussée sur cave voutée et deux étages fortifiés couronnés de mâchicoulis.                          TERRIEN  bâti pour le dernier descendant de la branche aînée. Le château de Terrien se présente comme un long bâtiment en pierre construit sur deux niveaux et flanqué de deux pavillons carrés à trois niveaux. Lavant-corps central est couronné dun fronton triangulaire dans le style Louis XVI, très fréquent en Gironde. Le château de Terrien accueille aujourdhui un institut Médico Éducatif (IME) qui est lemployeur le plus important de la commune de Lussac.","habitants":"Famille de Gascon Montouroy                                 Famille de Ségur                                                            Famille de  Favereau\r\n        \"","divers":"à Lusssac dont celui de Lussac, la Tour de Ségur g-6 et le Terrien g-7-8 avant et après","gps":"","images":["../../jctruffet.com/image/image_33/33_Lussac_1.jpg","../../jctruffet.com/image/image_33/33_Lussac_2.jpg","../../jctruffet.com/image/image_33/33_Lussac_3.jpg","../../jctruffet.com/image/image_33/33_Lussac_4.jpg","../../jctruffet.com/image/image_33/33_Lussac_5.jpg","../../jctruffet.com/image/image_33/33_Lussac_6.jpg","../../jctruffet.com/image/image_33/33_Lussac_7.jpg","../../jctruffet.com/image/image_33/33_Lussac_8.jpg"]},"Consult_chateau_formulaireb362":{"id":"Consult_chateau_formulaireb362","dept":"33","canton":"La Bréde","commune":"Léognan","nom":"Léognan_Pessac","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Léognan dont celui de Léognan, de Belin, de Gazin-Rocquencourt, de carbonnieux  de la Mission de la Louvière (voir article).                 LEOGNAN, La famille Miecaze partage sa passion autour d'une dégustation. Après avoir parfaitement restauré le château daté du XVIIe  XIXe siècle, par  Philippe et Chantal.                                                     BELIN  appartient à une vieille famille antillaise depuis prés de trois siècle  monsieur et madame O. Marraud des grottes.                                                                 GAZIN-ROCQUENCOURT, ses origines remontent au Moyen-Âge.  La demeure date de 1660, elle fut ainsi citée par les guides Féret dès 1874 et de son terroir situé sur une superbe croupe de graves à Léognan. Depuis 2006, la famille Bonnie, qui habite sur place, fait revivre la propriété.                                     CARBONNIEUX de 1520 à 1740 à la famille de Ferron, en 1741 propriété des moines bénédictins de l'abbaye de Sainte-Croix de Bordeaux, en 1789 vendu comme bien national aux Bouchereau qui le gardèrent plus d'un siècle.                                                  La MISSION, au XVIe siècle, la famille de Rostaing puis la famille de Lestonnac se succèdent. Un siècle plus tard, les héritiers de la famille de Lestonnac donnent le domaine en legs aux Frères Lazaristes ou \"Congrégation de la Mission\", doù le nom actuel. Les Frères Lazaristes, de la fin XVIIIe au début du XXe siècle, la Mission passe aux mains de 5 propriétaires dont la famille Chiapella, important armateur de la Nouvelle Orléans. En 1919, tournant décisif, la famille Woltner acquiert La Mission. Enfin, en 1983, la famille Dillon, déjà propriétaire du château Haut-Brion voisin, fait lacquisition du domaine. En 2008, le prince Robert de Luxembourg, petit-fils de Douglas Dillon, ancien ambassadeur des États-Unis en France et ancien secrétaire au trésor du président J.-F. Kennedy, devient président du domaine dont Jean-Philippe Delmas assure la direction.","architecture":"PESSAC-LEOGNAN  propriété de la famille Thomassin.                                                                     BELIN du XVIIIe siècle, est un exemple de chartreuse à pavillon central de un étage coiffé d'un toit à la mansard, deux corps de communs font retour à l'équerre Les constructions qui l'accompagnent  permettent de deviner que cette demeure commandait un petit domaine. Dépendances organisées en cour de plan en U. Réaménagement au milieu du XXe siècle.    \r\nGAZIN-ROCQUENCOURT  Fondée au XVIIe siècle, ses origines remontent au Moyen-Âge.  La demeure date de 1660, elle fut ainsi citée par les guides Féret dès 1874 et de son terroir situé sur une superbe croupe de graves à Léognan. Depuis 2006, la famille Bonnie, qui habite sur place, fait revivre la propriété. Le Domaine y est dabord cité sous le nom de «château Gazen et Bourbon», puis de «château Gazin» jusquen 1995 où elle prend le nom actuel de château.                                                      CARBONNIEUX  a conservé  quatre pavillons et deux tourelles de sa forme primitive. Le château possédait plus de douze tours dont-il était protégés il reste malgré tout un édifice imposant et séduisant.              La MISSION  le corps de logis central de deux niveaux et série de lucarnes en comble sur toit brisé, à sa droite un pavillon dont le toit brisé légèrement plus haut  prolongé par une galerie à arc brisés reliant un pavillon de deux niveaux deux travées toits à deux pans et à gauche de l'édifice corps de logis à deux travées  de un niveau  toit à deux pans, en retour d'équerre des dépendances formant une cour d'honneur.","habitants":"Gazin Famille Bonnie                                              Carbonnieux  Famille de Ferron                                     Mission Famille Dillon Président J.-F. Kennedy\r\n        \"","divers":"châteaux à Léognan dont celui de Léognan, g de 1 -2, de Belin g-6, de Gazin-Rocquencourt g 8, de Carbonnieux g-3 et 5.","gps":"","images":["../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_1.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_2.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_3.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_4.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_5.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_6.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_7.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_8.jpg","../../jctruffet.com/image/image_33/33_L%c3%a9ognan_Pessac_9.jpg"]},"Consult_chateau_formulairee06c":{"id":"Consult_chateau_formulairee06c","dept":"33","canton":"Lacanau","commune":"Macau","nom":"Macau","type":"Château","periode":"XVIII","histoire":"Sur 33 demeures ou châteaux recensés, un peu moins de la moitié contiennent des éléments du XVIIIe siècle. Ces constructions sont représentatives sur les bords de Garonne, où les domaines viticoles, ou \"bourdieux\", se sont constitués nettement dans la seconde moitié du XVIIIe siècle autour de la maison d'habitation. Plus de 90% des demeures ou châteaux datent ou ont été modifiés au cours du XIXe siècle. Là encore, nombre d'entre eux sont au centre d'un domaine où la demeure reconstruite ou construite est le faire-valoir de l'exploitation. Si quelques modifications internes aux dépendances ont été notées au cours du XXe siècle, il n'y a aucune construction notable sur la commune durant ce siècle.\r\nA Macau, château de Gironville, ancien domaine. château Cantemerle, de  la Gardette, de Desplats, de Pribang, pas d'information historique pour ces trois derniers.                                                                          MACAU, château Plaisance, construit à la fin du XVIIIe siècle par l'architecte François Lhote, classé M.H. depuis 1998.","architecture":"Il s'agit le plus souvent d'habitation en pierre de taille, en rez-de-chaussée surélevé, à un étage ou plus, avec toit en ardoises et doté d'un riche décor. Le logis est souvent le centre d'une exploitation, placé à l'écart de bâtiments de dépendances mais au plus près d'agréments comme un jardin ou un parc paysager.\r\nMACAU existerait depuis l'époque gallo-romaine, comme semblent le prouver des traces de voies romaines découvertes à Gironville. La ville connut une destruction au IXe siècle par les normands.  La tradition locale rapporte qu'un souterrain reliait le château fort de Gironville à l'église de Macau. Des pans de murs ont été trouvés dans les vignobles qui séparaient Gironville du clocher-donjon.      CANTEMERLE, disposition en L du logis donnant sur une cour fermée par un muret avec portail à piliers et deux pavillons d'angle avec chaînage harpé. Couvertes de toitures de tuile, les deux ailes à étage et aux façades percées de cinq travées présentent une tourelle d'angle en encorbellement ; il s'agirait de la partie la plus ancienne conservée, datable du début du XVIIe siècle. L'état actuel de cette tourelle pose question : maçonneries entravant une partie de la vis, escalier interrompu. Sa hauteur impliquerait l'accès à un niveau supérieur et donc un corps de logis plus élevé. Certains disent qu'elle aurait été rapportée de l'ancien château.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Macau g-2 et de Bareyre g-3 de Cantemerle g 4-5, de desplats g-6 de la Gardette g-1,  de Maucamps g 7, de Pribang g-9, et de Plaisance g-8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Macau_1.jpg","../../jctruffet.com/image/image_33/33_Macau_2.jpg","../../jctruffet.com/image/image_33/33_Macau_3.jpg","../../jctruffet.com/image/image_33/33_Macau_4.jpg","../../jctruffet.com/image/image_33/33_Macau_5.jpg","../../jctruffet.com/image/image_33/33_Macau_6.jpg","../../jctruffet.com/image/image_33/33_Macau_7.jpg","../../jctruffet.com/image/image_33/33_Macau_8.jpg","../../jctruffet.com/image/image_33/33_Macau_9.jpg"]},"Consult_chateau_formulairea98f":{"id":"Consult_chateau_formulairea98f","dept":"33","canton":"Lacanau","commune":"Macau","nom":"Macau_II","type":"Château","periode":"","histoire":"A Macau le château  de Lescalle, de Barreyre et de Giroville                                                                    LESCALLE la maison est taxée pour 6 portes et fenêtres à son propriétaire Jean David. La partie agricole appartient à Jean-Baptiste Teyssandier \"avoué à Bordeaux\". Ce dernier rachète dans les années 1860 les parcelles de son voisin. Il fait augmenter les parties agricoles en 1869 -dans le même temps que la propriété de Ducru Ravez appartenant à la veuve Ravez- puis engage la reconstruction du château actuel en 1876.\r\nBARREYRE Le propriétaire indiqué par la légende est M. Barreyre, probablement Nicolas, comme le laissent supposer les initiales entrelacées sur le garde-corps du perron. En 1774, il est cité par un voisin, le sieur Videau, pour une agrière en blé non payée. Nicolas Barreyre est issu d'une famille de grands négociants bordelais installée aux Chartrons à Bordeaux. En 1770, il commande aux frères maçons Laclotte la destruction puis la construction d'une maison sur le cours des Chartrons.                                           GIRONVILLE, en 1639, François de la Cornière, écuyer, puis en 1651 son fils Pierre rendent aveu à l'abbé de Sainte-Croix pour la maison noble de Gironville. Dans la première moitié du XIXe siècle, Lodi-Martin Duffour-Dubergier (1797-1860), maire de Bordeaux, président de la chambre de commerce puis maire de Macau, succède à son aïeul.","architecture":"LESCALLE Sur deux niveaux et un étage de comble, le corps de logis est de plan rectangulaire complété par une tour d'angle et un bâtiment au sud. La façade principale, à l'est, se compose de cinq travées. Les trois travées centrales forment un avant-corps coiffé d'un pavillon et encadré de pilastres. Cette disposition est également adoptée pour la façade postérieure. Les ouvertures du rez-de-chaussée ont des encadrements moulurés interrompus par une agrafe, chambranles à crossettes et frise à cannelures. Celles de l'étage diffèrent par les crossettes inférieures et supérieures. L'étage de comble est ouvert sur chaque face par des lucarnes en pierre à fronton cintré ou en zinc avec volutes.                                                                             BARREYRE La demeure est de plan rectangulaire. Un escalier en fer-à-cheval donne accès au rez-de-chaussée surélevé. Le niveau de soubassement est percé de deux étroites fenêtres et d'une porte en anse de panier ménagée sous le perron. Les cinq baies du rez-de-chaussée surélevé sont traitées en arc segmentaire mouluré, avec allèges à ressaut. Des pilastres à bossage soulignent les angles de la façade et la travée centrale. L'ensemble est surmonté d'une corniche moulurée et d'une génoise. Le comble est éclairé par une lucarne. Le garde-corps de l'escalier épouse la forme ondulée du perron ; les initiales NB y sont entrelacées dans la partie centrale ; on les retrouve également ornant les jours de la porte du soubassement. \r\nGIRONVILLE, le corps de logis à un étage percé de cinq travées est encadré au nord d'une aile en rez-de-chaussée et au sud-ouest d'une partie formant un décrochement qui accueille un auvent portant terrasse. La partie sud du logis est couverte d'un toit en pavillon en ardoise. Une corniche à modillons règne sur la façade et une partie de l'extension sud. Des massacres surmontent les deux portes d'accès à la cour.","habitants":"Famille de Jean David                                                   Famille de  Nicolas Barreyre                                Famille de Lodi-Martin Duffour-Dubergier \r\n        \"","divers":"Château  de Lescalle g-1 , de Barrere, de Belle-Vue g-2 et de Giroville g-3-4 Labourinque  g-5","gps":"","images":["../../jctruffet.com/image/image_33/33_Macau_II_1.jpg","../../jctruffet.com/image/image_33/33_Macau_II_2.jpg","../../jctruffet.com/image/image_33/33_Macau_II_3.jpg","../../jctruffet.com/image/image_33/33_Macau_II_4.jpg","../../jctruffet.com/image/image_33/33_Macau_II_5.jpg"]},"Consult_chateau_formulaireae18":{"id":"Consult_chateau_formulaireae18","dept":"33","canton":"Saint-Maixent","commune":"Saint-Maixant","nom":"Malagar","type":"Château","periode":"XVII","histoire":"MALAGAR  « domaine de Malagarre » datant du XVIIe siècle des Lanau, puis en 1695  une ancienne propriété des célestins de Verdelais, vendue à la Révolution française comme bien national en 1792. Le domaine et son petit château sont devenus la propriété de la famille de François Mauriac (1885-1970) en 1843, achetée par Jean Mauriac l'arrière-grand-père de l'écrivain pour ses terres. Ce dernier en est devenu propriétaire en 1927, à la mort de sa mère, et y a écrit nombre de ses uvres, et en 1970 décès de François Mauriac. Le jardin et son allée de cyprès ont été inscrits au titre des M.H.par arrêté en date du 1er août 1991 et la propriété, quant à elle, a été classée par arrêté du 12 décembre 1996 d'une part en raison du souvenir de l'écrivain et pour divers éléments tels qu'un  puits, un pavillon, un pigeonnier. Les enfants de l'auteur ont légué la demeure à l'état français en 1985 et le conseil régional d'Aquitaine qui en est le gestionnaire y a créé un centre culturel qui se veut, à partir de l'héritage littéraire et culturel de l'académicien, un lieu emblématique de l'action culturelle en Aquitaine. À ce titre la région et le centre Mauriac ont créé en 1985, le prix littéraire annuel « prix François-Mauriac de la région Aquitaine».","architecture":"Le domaine de Malagar, maison noble  du XVIIe siècle,  Longue demeure consistant dans un corps central à trois niveaux coiffé d'un toit à forte pente prolongé par deux ailes basses au bout desquelles se déploient en retour d'équerre les bâtiments d'exploitation coiffés de tuiles et entouré d'un petit parc.","habitants":"Famille de François Mauriac \r\n        \"","divers":"Château de Malagar","gps":"","images":["../../jctruffet.com/image/image_33/33_Malagar_1.jpg","../../jctruffet.com/image/image_33/33_Malagar_2.jpg","../../jctruffet.com/image/image_33/33_Malagar_3.jpg"]},"Consult_chateau_formulaire222f":{"id":"Consult_chateau_formulaire222f","dept":"33","canton":"Péssac","commune":"Péssac-Léognan","nom":"Malartic_Lagravière","type":"Château","periode":"XVII","histoire":"MALARTIC-LAGRAVIERE, est bâti à Léognan,  connu depuis toujours pour la qualité de son terroir, est acheté à la fin du XVIIIe siècle par la famille du comte Hippolyte de Maurès de Malartic. Grand serviteur des rois de France. Lannée 2017 marque les 20 ans de la famille à la tête du domaine. Grand serviteur des rois de France, il guerroya comme amiral contre les Anglais sur bien des mers du globe et sillustra notamment en 1756 lors de la bataille du Québec. La propriété fut rachetée en 1850, par Mme Arnaud Ricard, qui fit accoler le nom de Malartic à celui de Lagravière, en hommage aux anciens propriétaires. La famille Marly sera la dernière de la lignée Ricard à gérer le château. Plus particulièrement, Jacques Marly prendra la direction du domaine en 1947 et ladministrera jusquen 1990. Depuis la spectaculaire métamorphose opérée par Alfred et Michèle dès leur arrivée en février 1997, le château Malartic-Lagravière a pris son envol sous la co-direction de leurs enfants Véronique et Jean-Jacques, et de leur conjoints respectifs Séverine et Bruno. XVIIIe siècle : le domaine de la Gravière, déjà connu pour son terroir, est racheté par la famille du comte de Malartic. En\r\n1850  madame Ricard, propriétaire des lieux, accole les noms Malartic-Lagravière et agrandit le domaine. En 1901 sa petite-fille, Angèle, en prend la direction. Le capitaine Ridoret, son beau-père, met en exergue lesprit aventurier de la famille. En 1947  la petite-fille dAngèle épouse Jacques Marly qui dirige le château avec une grande indépendance desprit, jusquau rachat par Laurent-Perrier en 1990. En 1997  arrivée des Bonnie.","architecture":"Aux côtés du marquis de Montcalm, le comte de Malartic, Anne-Joseph-Hippolyte de Maurès de Malartic militaire et gouverneur, sillustra en 1756 lors de la bataille du Québec. En 1792, il défendit lÎle de France  aujourdhui Ile Maurice contre les anglais avec une ardeur restée légendaire. Aujourdhui encore, se trouve à Port-Louis au champ de Mars, un obélisque érigé en sa mémoire. Angèle Ricard reprit la tradition inaugurée par sa grand-mère en administrant elle-même les terres de Malartic-Lagravière dont elle avait hérité. Son beau-père, le capitaine au long cours Laurent Ridoret, lui aussi grand navigateur, légua notamment au château la fidèle reproduction du Trois-Mâts « Marie-Elisabeth » quil commandait. En 1947, Jacques Marly prend en main la direction de Malartic-Lagravière après avoir épousé la petite-fille dAngèle. La famille Marly cédera le domaine au groupe Laurent-Perrier en 1990 qui le gérera jusquau rachat par les Bonnie en 1997.","habitants":"famille du comte Hippolyte de Maurès de Malartic\r\n        \"","divers":"Château  de Malartic Lagravière","gps":"","images":["../../jctruffet.com/image/image_33/33_Malartic_Lagravi%c3%a8re_1.jpg","../../jctruffet.com/image/image_33/33_Malartic_Lagravi%c3%a8re_2.jpg","../../jctruffet.com/image/image_33/33_Malartic_Lagravi%c3%a8re_3.jpg","../../jctruffet.com/image/image_33/33_Malartic_Lagravi%c3%a8re_4.jpg"]},"Consult_chateau_formulairef66c":{"id":"Consult_chateau_formulairef66c","dept":"33","canton":"Salles","commune":"Preignac","nom":"Malle","type":"Château","periode":"XVII","histoire":"La MALLE, du XVIIe siècle  par Guilhem de Malherbes. Son propriétaire initial était Jacques de Malle, président du parlement de Bordeaux, en 1702 une des descendantes  mariage de Jeanne, fille de Pierre de Malle avec le marquis Alexandre de Lur-Saluces qui sera exécuté en 1793, Les trois demoiselles de Saluces sauvées récupèrent le château, sous l'Empire la Malle passa à la branche cadette des Lurs-Saluces, les comtes Eugène puis Henri représentèrent   la Gironde à la chambres des députés et au Sénat. La Malle passa sous contrôle du comte de Bournazel grand oncle et parrain du comte Pierre, en 1985, à la mort du comte de Bournazel c'est son épouse la comtesse qui reprend le domaine avec élégance, secondée quelques années plus tard par ses enfants: Paul-Henry, Antoine et Charles, perpétuant ainsi la tradition familiale. Paul-Henry s'installe à Malle avec sa famille en 1996 et reprend peu à peu la direction de l'exploitation. En 1999 le domaine de la famille s'agrandit  avec l' acquisition du château Pessan.  Le château est classé aux M.H. depuis 1949. Appartient aujourd'hui à la comtesse Nancy de Bournazel.","architecture":"La MALLE,  du XVIIe siècle est connu pour son architecture Renaissance italienne, avec des lourds frontons semi-circulaires abondament sculptés, l'édifice sans étages en forme de fer à cheval, et flanqué de deux tours rondes  s'ordonne autour d'un pavillon central à deux étages couvert d'un haut comble à pans brisés à la Mansart prolongés par deux ailes basses coiffées de tuiles platent qui tournent à angles droit pour aboutir à deux tours rondes surmonté d'un dôme.  L'entrée se fait par une grille de fer forgé et la cour d'honneur, ornée de pilastres est entourée par le logis et les deux ailes en retour terminées par des tours.","habitants":"Famille des Lurs-Saluces\r\n        \"","divers":"Château de la Malle à Preignac","gps":"","images":["../../jctruffet.com/image/image_33/33_Malle_1.jpg","../../jctruffet.com/image/image_33/33_Malle_2.jpg","../../jctruffet.com/image/image_33/33_Malle_3.jpg","../../jctruffet.com/image/image_33/33_Malle_4.jpg","../../jctruffet.com/image/image_33/33_Malle_5.jpg","../../jctruffet.com/image/image_33/33_Malle_6.jpg","../../jctruffet.com/image/image_33/33_Malle_7.jpg"]},"Consult_chateau_formulaireb4e6":{"id":"Consult_chateau_formulaireb4e6","dept":"33","canton":"Cadillac","commune":"Saint-André-du-Bois","nom":"Malromé","type":"Château","periode":"XII- XIV-XVI","histoire":"MALROME, château construit au XIVe siècle par Guiraud de la Taste  vicomte de Béarn  premières traces du château remontent au XVIe siècle par Étienne de Rostéguy de Lancres, démonographe de Henri IV au XVIe siècle membre du parlement de Bordeaux, seigneur de Saint-Macaire et de Rauzan. trois cent ans plus tard en 1847, devient la résidence de deux puissants ministres de Napoléon III le maréchal Armand Jacques Leroy de Saint-Arnaud, gouverneur de Paris et ministre de la guerre,  à Adolphe de Forcade de Laroquette, président du conseil d'état, le château est transmis à Adelaïde de Forcade, veuve du baron de Malromé, qui lui donnera ce nom. En 1847, le château de Malromé fut transmis à Adolphe de Forcade Laroquette, président du conseil d'état, sous Napoléon III et, à son demi-frère, le maréchal Armand Jacques Leroy de Saint-Arnaud, gouverneur de Paris et ministre de la guerre, qui feront restaurer le château. En 1883, le domaine est acquis par la comtesse Adèle Zoé de Toulouse-Lautrec-Monfa (1841-1930) attirée par la proximité du pélerinage de Verdelais,   son fils, le célèbre peintre Henri y effectuera de fréquents séjours et s'y plut, peint sans relâche et, pour se détendre, rame et tire à l'arc avec des engins envoyés par son père. Il y termina son existence et y mourra le 9 septembre 1901 avant d'être inhumé au cimetière de Verdelais, où sa mère le rejoindra 29 ans plus tard.","architecture":"MALROME dit la maison noble de Taste, construite au XIVe siècle, et reconstruction au XVIe siècle  et restauré au XIXe siècle   même si le corps de logis date du XVIe siècle  quand les trois autres ailes ont été construites entre le XVII-XVIIIe siècles c'est une imposante bâtisse de style Napoléon III  les aménagements intérieurs son du même style conservés intacts jusqu'à aujourd'hui.","habitants":"Maréchal Armand Jacques Leroy de Saint-Arnaud,\r\n        \"","divers":"Malromé  44° 36' 21\" Nord et 0° 10' 55\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Malrom%c3%a9_1.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_2.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_3.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_4.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_5.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_6.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_7.jpg","../../jctruffet.com/image/image_33/33_Malrom%c3%a9_8.jpg"]},"Consult_chateau_formulairee017":{"id":"Consult_chateau_formulairee017","dept":"33","canton":"Lacanau","commune":"Margaux","nom":"Margaux","type":"Château","periode":"XVIII","histoire":"A Margaux le château de la Ferrière, de Rauzan Ségla et de Siran (voir article). MARGAUX, à l'origine aux Albret, puis aux Durfort-Duras qui le possèdèrent jusqu'en 1437 , François de Montferrand est qualifié de baron Margaux. En 1479, Thomas de Durfort le vend à Jean Gimel un magistrat de Bordeaux. Le 24 mars 1479, la fille de Thomas de Durfort épouse Jehan de Lory puis son fils Louis de Lory en 1557. À sa mort c'est son frère Isaac qui lui succède. En 1590, Guy de Lestonnac achète le château à son cousin Isaac . Le 20 novembre 1653, Jean-Denis Daulède, fils de Pierre hérite du château. Le 2 août 1682, la fille de Jean-Denis épouse le comte Joseph de Fumel. Le château reste dans la famille jusqu'en 1768. puis passe  aux Conti-d'Argicourt. En 1770, le comte Élie du Barry devient seigneur de Margaux par son mariage avec la demoiselle Laure de Fumel, nièce de Joseph. Le château est confisqué par les révolutionnaires et vendu en 1802 comme bien national. Le 14 février 1802, le château est vendu aux enchères au marquis espagnol Beltran ou Bertrand Douat de la Colonilla qui fit élever le château actuel Le 17 août 1835, Margaux est acquis par Alexandre Marie Aguado banquier (1784-1842). En 1879, Frédéric Pillet-Will, acquiert le domaine à la bru du banquier et vicomte Alexandre Aguado,  son gendre le duc Louis Charles Marie de La Trémoille devient par mariage « seigneur de Margaux. Vers 1950 Fernand Ginestet. En 1977, André Mentzelopoulos achète à la famille Ginestet l'ensemble du domaine et le restaure, elle sassocie en 1990 à la famille Agnelli.                                                           FERRIERE, du XVIIIe siècle jusquen 1914, deux cousins germains de la famille Ferrière, lun fonctionnaire royal, lautre maire de Bordeaux, présidaient avec beaucoup de succès aux destinées du château qui porte leur nom. Racheté en 1988 par la famille Villars.","architecture":"MARGAUX, les premières traces du château remontent au XIIIe siècle avec la mention d'une forteresse connue sous le nom de « château de La Mothe Margaux ». C'est le marquis Douat de La Colonilla qui fit raser l'antique château fort et combler les canaux et les douves. Cette belle demeure du XVIIIe siècle de style palladien construit sur un soubassement à refends possède un rez-de-chaussée et deux ailes sur la cour. Du côté du parc, il y a une façade en rotonde au rez-de-chaussée. Des encadrements moulurés comportent des guirlandes dans les tableaux. Les portes-fenêtres ont des appuis en balustres et des guirlandes avec lucarne. Les Mansardes sont achevées avec des mascarons en plomb et l'entourage est à volutes,  sur quatre niveaux agrémentés de larges baies. La façade principale est constituée d'un péristyle colossal de quatre colonnes ioniques, surmontés d'un fronton triangulaire. Les chais, d'une longueur de 100 mètres et d'une largeur de vingt trois mètres, possèdent une belle charpente de chêne soutenue par des colonnes doriques. Il fait lobjet dun classement au titre des M.H.depuis 1946 remplacé par un arrêté de classement en 1965.      RAUZAN-SEGLA pas d'information historique de plan en U avec des corps de logis rectangulaire à deux niveaux  et lucarnes toits en croupe recouvert de tuiles","habitants":"Comte Élie du Barry \r\n        \"","divers":"le château de la Ferrière g-4, de Rauzan Ségla  g-5 -6et de Siran Margaux  45° 02' 40\" Nord et 0° 40' 08\" Ouest.","gps":"","images":["../../jctruffet.com/image/image_33/33_Margaux_1.jpg","../../jctruffet.com/image/image_33/33_Margaux_2.jpg","../../jctruffet.com/image/image_33/33_Margaux_3.jpg","../../jctruffet.com/image/image_33/33_Margaux_4.jpg","../../jctruffet.com/image/image_33/33_Margaux_5.jpg","../../jctruffet.com/image/image_33/33_Margaux_6.jpg"]},"Consult_chateau_formulairedd98":{"id":"Consult_chateau_formulairedd98","dept":"33","canton":"Pineuilh","commune":"Brouqueyran","nom":"Mirail_Gironde","type":"Château","periode":"XIV","histoire":"MIRAIL, bâti à Brouqueyran,Le 22 juin 1940, la France capitule et Pétain signe l'armistice avec les allemands à Rethondes. Les allemands mettent en place toute une série de mesures pour limiter sur le territoire la circulation des personnes et des marchandises et le trafic postal entre deux grandes zones délimitées par la ligne de démarcation qui sépare la zone sud où sexerce lautorité du gouvernement de Vichy, de la zone occupée par les allemands. Brouqueyran, situé en Gironde non occupée, est rattaché au Lot-et-Garonne jusqu'en mars 1943.","architecture":"Le château du Mirail est un château bâti à Brouqueyran,  de plan rectangulaire à deux niveaux et attiques flanqué de quatre tours rondes aux angles le tout reliés par un chemin de rondes crénelées à mâchicoulis, sa tour sud-ouest abrite une chapelle aux façades, toitures et décors remarquables ainsi qu'une cheminée ormée d'un relief sculpté figurant le reniement de Saint-Pierre. Le tout est classé aux M.H.","habitants":"Maréchal Pétain\r\n        \"","divers":"Château de Mirail à Brouquyeran","gps":"","images":["../../jctruffet.com/image/image_33/33_Mirail_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Mirail_Gironde_2.jpg"]},"Consult_chateau_formulaire7087":{"id":"Consult_chateau_formulaire7087","dept":"33","canton":"Salles","commune":"Monbadon","nom":"Monbadon","type":"Forteresse","periode":"XIV-","histoire":"Plusieurs châteaux à Monbadon ; Cantegrive, Malengin, Puisseguin                                           CANTEGRIVE, pas d'information historique    MONBADON  bâti à Puisseguin,  En 1330, le Roi Edouart III d'Angleterre autorise les seigneurs locaux à construire une maison forte ou château le plus souvent entourés de remparts et de fortifications. Cest à cette époque que lon situe la construction des châteaux de Puisseguin, de Malengin et de Monbadon.  Depuis 1602, sous le règne de Henri IV, roi de France et de Navarre, la même famille est toujours propriétaire de lensemble du domaine. A la fin du XXe siècle, le château appartient à madame Marie-Thérèze Rouzaud De Montfort.  Au XXIe siècle, la découverte de l'extérieur est libre et gratuite en respectrant la propriété privée et le champ. La visite du château est interdite.                                                                   PUISSEGUIN, perdit alors son rang de châtellenie et sa baronnie fut rattachée comme celle de Monbadon à la châtellenie de Puynormand.                            MALENGIN, fut en partie restauré et restait la propriété des Lur- Saluces, qui vendirent la maison noble en 1568 avant de la racheter dès 1571. Une partie du château de Puisseguin fut reconstruite et devint maison de maître. En 1606, le châtelain de Puisseguin ordonna la création dune voie daccès passant au travers du rempart.","architecture":"CANTEGRIVE, maison forte de  1330 située sur un petit promontoire, elle comprend un chemin de ronde, des communs et une chapelle.                       MONBADON, en découvrant l'imposant bâtiment au sommet de la petite colline, cette construction était une maison forte, Le bâtiment au sud (sur la droite) est un ajout ultérieur. A l'origine, la maison forte  puisque telle était sa dénomination au XIVe siècle avait une forme trapézoïdale.  Sur la façade Ouest de 20m de large,   sur la courtine des fentes horizontales ressemblant à des canonnières, preuves que les systèmes défensifs ont évolué après sa construction initiale.  Sur 2 angles, des échauguettes posées sur culots. Les fentes verticales sont des archères médiévales.  Proche de l'échauguette, quelque peu arasé par la toiture récente, un vestige de construction en encorbellement.  S'il n'y avait pas ces 2 imposantes tours carrées aux angles, le nouveau bâtiment en contrebas pouvait presque s'intégrer à l'ancien, les multiples fenêtres à volets rouges contribuent à la pseudo harmonie. La façade Ouest, comporte aux angles des échauguettes sur culots.  Au XVIe siècle, des fenêtres à meneaux sont ouvertes.  Au XVIIe siècle, un bâtiment annexe est construit au sud en s'appuyant sur le château primitif. Celle opposée, positionnée coté de l'attaque, possède des tourelles-contreforts carrées avec mâchicoulis.","habitants":"Marie-Thérèze Rouzaud De Montfort\r\n        \"","divers":"à Monbadon ; Cantegrive, Malengin, Puisseguin grav 1 à 8","gps":"","images":["../../jctruffet.com/image/image_33/33_Monbadon_1.jpg","../../jctruffet.com/image/image_33/33_Monbadon_2.jpg","../../jctruffet.com/image/image_33/33_Monbadon_3.jpg","../../jctruffet.com/image/image_33/33_Monbadon_4.jpg","../../jctruffet.com/image/image_33/33_Monbadon_5.jpg","../../jctruffet.com/image/image_33/33_Monbadon_6.jpg","../../jctruffet.com/image/image_33/33_Monbadon_7.jpg","../../jctruffet.com/image/image_33/33_Monbadon_8.jpg"]},"Consult_chateau_formulaired7ed":{"id":"Consult_chateau_formulaired7ed","dept":"33","canton":"Salles","commune":"Portets","nom":"Mongenan","type":"Château","periode":"XVIII","histoire":"MONGENAN,  a été construit en 1736 par l'architecte Le Herissey pour le compte du baron Antoine de Gascq, fondateur de l'académie des sciences, Il s'agit de la maison natale de Claude Antoine de Valdec de Lessart, fils naturel du baron de Gascq, directeur de la compagnie des Indes et ministre de Louis XVI. Le château, toujours habité, est aujourd'hui un musée, présentant un mobilier du XVIIIe siècle conservé en l'état. Son jardin botanique contient notamment une roseraie plus de mille variétés de plantes tinctoriales et médicinales. Le jardin a été conçu selon les préceptes de Jean-Jacques Rousseau, professeur de violon du baron de Gascq, dont les herbiers sont également présentés. Le château propose, en outre, une collection d'objets maçonniques du XVIIIe siècle, présentés dans une pièce qui fut utilisée comme temple maçonnique de 1750 à 1898. Ce temple n'est plus fonctionnel en l'état puisqu'il s'agissait d'un temple  itinérant , mais a conservé tout son mobilier d'époque. Dans cette pièce, se trouve notamment une toile qui était installée au plafond et qui faisait office de ciel étoilé  lorsque les  décors  du temple étaient mis en place.\r\nLAGUELOUP,  a été édifié sous Napoléon III par Samuel Wolf sur un habitat beaucoup plus ancien remontant au XIIIe siècle, est un véritable quartier composé de bâtiments dépoque médiévale, baroque et Napoléon III pour le chai qui domine lensemble.","architecture":"MONGENAN, situé dans la commune de Portets, dans le département français de la Gironde, est un château du XVIIIe siècle, ouvert à la visite tous les jours du 7 janvier au 31 décembre, inscrit monument historique en 2003. Il accueille toute l'année de nombreuses conférences et manifestations culturelles, est aujourd'hui un musée, présentant un mobilier du XVIIIe siècle conservé en état.  inscrit M.H. en 2003,  labellisé  jardin remarquable.\r\nLAGUELOUP, le lieu où il y a leau », est composé de plusieurs bâtiments forts anciens qui ont été recouverts dune même façade au XIXe siècle, transformé en musée, chai du XIXe siècle de type médocain construit par l'architecte Samuel Wolf selon les préceptes d'Eiffel. Tout le matériel vinicole d'époque a été conservé en état de marche. Les archives de la maison Eschenauer comprenant mille objets sur la vigne sont également ouvertes à la visite.","habitants":"Claude Antoine de Valdec de Lessart,\r\n        \"","divers":"Château de Mongenan à portets","gps":"","images":["../../jctruffet.com/image/image_33/33_Mongenan_1.jpg","../../jctruffet.com/image/image_33/33_Mongenan_2.jpg","../../jctruffet.com/image/image_33/33_Mongenan_3.jpg","../../jctruffet.com/image/image_33/33_Mongenan_4.jpg","../../jctruffet.com/image/image_33/33_Mongenan_5.jpg","../../jctruffet.com/image/image_33/33_Mongenan_6.jpg"]},"Consult_chateau_formulaired7ef":{"id":"Consult_chateau_formulaired7ef","dept":"33","canton":"Pineuilh","commune":"Monségur","nom":"Monségur","type":"Bastide_Château","periode":"XVII","histoire":"A Monségur château de Beysserat, l'hotellerie, le Parc, le Siran; le saint-James et la tour du Gouverneur.   MONSEGUR, bastide, à deux Km au nord  à Saint-Ferme.  Au XVIIe siècle, un abbé de Saint-Ferme a fait édifier une chartreuse, et aménager une forêt avec des allées partant en rayons depuis un point central. Démoli au XIXe siècle, reconstruit, plusieurs fois modifié et restauré à la fin du XXe siècle, ce site privé est connu sous le nom de château du Parc,  et le château de  St-JAMES manoir du XVIIIie siècle transformé en logis de France par la famille Dubois.","architecture":"MONSEGUR, la halle du XIXe siècle, très bel exemple d'harmonisation entre la fonte et le verre, a été construite en deux temps : d'abord les galeries extérieures en 1866 avec un square en leur centre, puis à la place de ce dernier une halle couverte en 1897 pour abriter la totalité des marchands forains. Elle est inscrite au titre des M.H. en 2011.  La place de la halle et ses galeries à arcades.  La Tour du Gouverneur de style gothique flamboyant. Le chemin de ronde et les remparts fait le tour de la bastide sur 1 800 mètres.\r\nAu XVIIe siècle, un abbé de Saint-Ferme a fait édifier une chartreuse, démoli au XIXe siècle, reconstruit, plusieurs fois modifié et restauré à la fin du XXe siècle, ce site privé est connu sous le nom de château du Parc.                                                                              PARC, au lieu-dit la Gageante s'élève un château, propriété privée, fruit de plusieurs constructions et de profondes modifications jusqu'au XVIIIe siècle.","habitants":"St-James Famille Dubois\r\n        \"","divers":"A Monségur château de Beysserat g-1, l'hotellerie g-4, le Parc, le Siran; le saint-James g-3-5-6-7 et la tour du Gouverneur g-8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_1.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_2.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_3.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_4.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_5.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_6.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_7.jpg","../../jctruffet.com/image/image_33/33_Mons%c3%a9gur_8.jpg"]},"Consult_chateau_formulairee42f":{"id":"Consult_chateau_formulairee42f","dept":"33","canton":"Coutras","commune":"Montagne","nom":"Montagne_33","type":"Vestiges","periode":"XIV","histoire":"MALENGIN dit des Tours bâti à Montagne. En 1330, Edouard III d'Angleterre autorise Gaillard de Malangin de construire cette maison forte. En 1420, le seigneur  est du parti de la France et les Bordelais assiègent le château qui tombe entre leurs mains. La forteresse sera ruinée au XIXe siècle.  La base des murs formant cette première enceinte est apparente, la chapelle est la partie la mieux conservée du château : murs et voûtes subsistent encore. L'accès à l'intérieur du château se fait par un étroit couloir creusé sous le rocher et se prolongeant par des escaliers très raides. Près de cette entrée se trouve une sorte de cave creusée dans le roc, soutenue par des piliers carrés. Dans l'angle nord se trouve le donjon carré à ciel ouvert. A l'extérieur du château a été construit au sud-ouest une tour avancée qui commandait le vallon sud et l'entrée des fossés. Le château de Malengin est inscrit aux M.H. depuis 1978. \r\n  St-GEORGES,  propriété du roi Henri IV au XVIe siècle, le château est vendu à Jean Barbot lors du démantèlement de la châtellenie de Puynormand en 1602. On doit son architecture actuelle à Guillaume Ignace de Bouchereau, dernier seigneur de Saint-Georges, à qui le château est apporté en dot par son épouse. Il décide alors de faire reconstruire lancien château féodal,  vendu à la Révolution, mais reste intact et on continue dexploiter son domaine viticole. A la fin du XIXe siècle et le bâtiment est laissé à labandon avant dêtre racheté par Pétrus Desbois en 1891.   Ancienne propriété de la famille Dubois-Challon, Pascal Delbeck en était le directeur depuis 1975 avant den devenir fermier puis propriétaire en 2003. Des travaux de rénovation, dagrandissement et de mise en valeur de loutil de travail .","architecture":"TOURS,  bâti à Montagne,  date du XIVe siècle. Dans ce temps il y avait trois tours dont une, polygonale et intérieure était le donjon, et les autres, circulaires, flanquaient un bâtiment oblong aux angles est et ouest de sa face sud ; puis, aux mêmes angles de la face nord, on voyait des guérites dont il reste les culs-de-lampe. Cette partie la plus ancienne au midi du château actuel est aussi un peu plus élevée, le donjon avec ses mâchicoulis et sa guérite recouverte en dôme la domine comme tout le manoir. Au Nord du château primitif, il existait une cour carrée formée par lui et des murailles crénelées, lesquelles avaient extérieurement à leurs pieds de larges et profonds fossés. Ces fossés subsistent, mais les murailles ont été remplacées au XVIe siècle par des édifices rectangulaires. Aux angles Est et ouest de la façade nord se montrent deux tours rondes, moins hautes que les autres, mais garnies comme elles de mâchicoulis.\r\nST-GEORGES, connu sous le règne dHenry IV est une véritable oeuvre dart à lui tout seul. Les 4 tours relatent le passé dun château féodal et la façade de style néoclassique est loeuvre du célèbre architecte Victor Louis qui construisit aussi le grand théâtre de Bordeaux. Il décide alors de faire reconstruire lancien château féodal selon un plan en U,  le logis est composé de deux niveaux et un large escalier extérieur permettant daccéder à létage. La façade principale est animée par un grand fronton triangulaire orné des armoiries et une balustrade supportant des pots-à-feu surmonte le tout et confère au château son élégance aristocratique.","habitants":"Famille de Calvimont \r\n        \"","divers":"St-Georges grav-1 à 4, Malengingrav-9  : 44° 54' 26\" Nord et 0° 04' 48\" Ouest                                          Tours grav -5 à 8      44° 55' 31\" Nord, 0° 07' 10\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Montagne_33_1.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_2.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_3.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_4.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_5.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_6.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_7.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_8.jpg","../../jctruffet.com/image/image_33/33_Montagne_33_9.jpg"]},"Consult_chateau_formulaireaf5a":{"id":"Consult_chateau_formulaireaf5a","dept":"33","canton":"Lacanau","commune":"Moulis","nom":"Moulis","type":"Château","periode":"XVII","histoire":"MOULIS château Chasse-Spleen (voir article),  Poujeaux, Anthonic, Dutruch- Grand Poujeaux, La Mouline,  Granins-Grand Poujeaux, Brillette, Maucaillou, Biston Brillette ou  Moulin à Vent.       MAUCAILLOU, Maucaillou La famille Petit-Laroche,  fait construire en  1875, J. Petit-Laroche se marie, et offre à sa femme en cadeau de mariage, la construction dune belle demeure bourgeoise, le château actuel. Les travaux ont été réalisés par les frères Marian, entrepreneurs à Moulis. propose un musée de l'art et des métiers. Les granges, domaine racheté en 1973 par le Baron Edmond de Rothschild,   MALMAISON, le cardinal de Duplessis.  à Armand du Plessis, neveu du cardinal de Richelieu. En 1830, monsieur Fabre lègue le domaine à son fils Pierre. En 1861,  ce dernier partage le domaine entre son fils Pierre-Léon et sa fille, madame Hauchecorne (héritière  qui deviendra Duplessis-Hauchecorne).    ANTHONIC, après  avoir été entre les mains de plusieurs familles, il est depuis 1977 la propriété des Cordonnier. Il y a d'abord eu Pierre puis, depuis 1993, c'est son fils qui est à la tête de l'exploitation.             PEY BERLAN, du XVIIe siècle, la demeure initiale était habitée par l'archiprêtre et ses vicaires jusqu'à la Révolution. Acquis par le célèbre personnage, cette grande maison prendra le nom de château Biston. De la maison archipresbytérale ne subsistent que les murs : la toiture a été surélevée, les ardoises ont remplacé les tuiles et deux ailes ont été rajoutées.","architecture":"Maucaillou construire en 1871, les caves. Ce magnifique corps de bâtiment, tout en pierres de taille, sétendait à lorigine sur 3000 mètres carrés, cest un étrange et audacieux mélange architectural qui semble marier plusieurs styles, à limage du vin du médoc qui est issu de  lassemblage de plusieurs cépages. La surabondance du décor, qui veut évoquer à la fois la Renaissance, le milieu et la fin du XVIIe siècle, font de cette construction un excellent exemple de larchitecture éclectique qui fleurit en Médoc à la fin du XIXe siècle,                                                                   Les châteaux de Dustruck Grand-Pujeaux, de Gressier Grand-Pujeaux et de Branas sont du même style du XIXe siècle bâtisse rectangulaire à deux niveaux.","habitants":"Edmond de Rothschild\r\n        \"","divers":"A Moulis  Bibiang 1  Poujeaux g-2, Anthonic g-4, Dutruch Grand Poujeaux, La Mouline,  Granins Grand Poujeaux g-8,  Pey g-6  Brillette, Maucaillou g-3, Biston Brillette ou  Moulin à Vent g-5.   Royalg-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Moulis_1.jpg","../../jctruffet.com/image/image_33/33_Moulis_2.jpg","../../jctruffet.com/image/image_33/33_Moulis_3.jpg","../../jctruffet.com/image/image_33/33_Moulis_4.jpg","../../jctruffet.com/image/image_33/33_Moulis_5.jpg","../../jctruffet.com/image/image_33/33_Moulis_6.jpg","../../jctruffet.com/image/image_33/33_Moulis_7.jpg","../../jctruffet.com/image/image_33/33_Moulis_8.jpg"]},"Consult_chateau_formulairea5d5":{"id":"Consult_chateau_formulairea5d5","dept":"33","canton":"Bordeaux","commune":"Mérignac","nom":"Mérignac","type":"Vestiges château","periode":"XIII-XVIII","histoire":"Dans cet article à Mérignac le château de Burck, de Pique caillou, de Loignac  la maison noble, Loignac et la tour de Veyrine.                                                       Le BURCK, date du XVIIIe siècle, propriété de la ville de Mérignac depuis 1964.  Il fait aujourd'hui office de centre social.                                                                PICQUE-CAILLOU, édifié en 1756 ,  après son rachat par Étienne Deni.                                                        MAISON Noble du Arc ou Lespagne : connu depuis le XIIIe siècle, il fut dans les familles de Lespagne et Larroque, au Moyen-Âge, avant d'être propriété de la famille de Lestonnac du XVIe au XVIIe siècle. Le château fut ensuite cédé au comte de Fumel, puis vendu à Jacques de Brie écuyer, seigneur de Tiffore en 1752, qui le proposa à la ville de Bordeaux. Chavailles, conseiller au parlement de Guyenne, en fit plus tard sa demeure. Le banquier bordelais Laffargue en prit possession en 1852.                                    LOIGNAC, vaste maison de maître érigée au milieu du XVIIIe siècle par la famille Séguineau, possesseur de plantations aux Antilles, elle connut un incendie majeur après 1810 et fut reconstruite dans sa configuration actuelle. Acquise vers 1840 par la famille Tocqueville, elle fut dotée d'un hippodrome qui accueillit brièvement, entre 1853 et 1854, des épreuves de tauromachie, avant de servir finalement de dépôt de remonte. Elle héberge depuis la caserne de gendarmerie mobile, majorée d'immeubles contemporains, rue Séguineau.                                  TOUR de VEYRINE, est un donjon bâti à Mérignac, c'est un donjon construit au XIVe siècle qui dépendait d'un château médiéval disparu, siège de la seigneurie du même nom appartenant à la ville de Bordeaux. La Tour est une propriété privée appartenant à la famille Moulet de la Raitrie.","architecture":"BUCRK, d'abord bâtiment d'agrément des familles Clock, puis Journu, il sera agrandi de deux ailes basses de style néoclassique dès le XIXe siècle. Maison noble, rebâtie et agrandie à cette époque par Ferrand (maître d'uvre), en s'inspirant du style de l'édifice précédent qui datait des XVIe et XVIIe siècles. L'ancien château était en partie conservé dans celui du XIXe siècle. Le château fut la résidence du roi de Monténégro, en exil pendant la première guerre mondiale, puis occupé par les allemands et transformé dès janvier 1944 en quartier général du général Von der Chevallerie, alors commandant de la 1re armée basée à Bordeaux. L'ensemble du domaine  dont la tour dessinée par Gillet  sera entièrement rasé dans les années 1960 pour accueillir une série d'immeubles résidentiels et un lotissement.                                 TOUR DE VEYRINES, bien que classée M.H. en 1962, l'ensemble ne fut pas protégé et la plupart des scènes hagiographiques ont disparu. Aujourd'hui, il ne reste plus que la porte-donjon de deux étages, sur l'esplanade de la haute-cour de l'ancien château-fort du XIIIe siècle, au sud des Eyquems. Haute de vingt mètres, la tour a échappé à la destruction par  ce qu'elle représentait un jalon pour les cartographes, au milieu du XVIIIe siècle.","habitants":"Famille de Lestonnac                                                    Famille Tocqueville\r\n        \"","divers":"A Mérignac le château d'Arlac g-1-2  de Burck,  de Pique caillou, de Loignac  la maison noble sur article suivant la Maison carrée, Peychotte et la tour Veryne, g-4-5     Veyrine  44° 50' 35\" Nord, 0° 38' 41\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_M%c3%a9rignac_1.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_2.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_3.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_4.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_5.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_6.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_7.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_8.jpg"]},"Consult_chateau_formulairee85b":{"id":"Consult_chateau_formulairee85b","dept":"33","canton":"Bordeaux","commune":"Mérignac","nom":"Mérignac_Bouran","type":"Château","periode":"XIX","histoire":"Dans cet article à Mérignac le château de Bouran  du Chêne-Vert  et de Peychotte                                    BOURAN, bâti à Mérignac, il appartenait à la fin de l'ancien régime, aux minimes de Bordeaux. Il a été vendu comme bien national, en 1791, à l'avocat François-Armand Saige. En 1793, passera dans plusieurs mains, avant d'être racheté en 1865, par le banquier bordelais Léopold Piganeau et son beau-père, l'armateur Ravesies.   Puis, en 1947, le château de Bourran devient la propriété du conseil général de la Gironde. Il héberge, aujourd'hui l'institut universitaire de formation des maîtres d'Aquitaine. Le château de Bourran est inscrit aux M.H. depuis 1992.                 CHENE-VERT construit en 1778 par monsieur Viard de Saint-Domingue, puis sous la monarchie de juillet appartient à Alcide Cayrou de l'isle Maurice, passa dans différentes mains avant d'être acquit au lendemain de la guerre 14-18 par monsieur Etienne Denis. \r\nPEYCHOTTE  dit la maison carré dArlac accueillera bientôt le conservatoire municipal de la Ville. Construite entre 1786 et 1789 par Samuel Peixotto. Avec un destin peu commun. Son nom lui a été donné par la population du quartier, bien que le bâtiment soit en réalité rectangulaire. Le domaine es racheté par différents propriétaires, notamment des banquiers et le médecin Elie Gintrac, qui y pratiqua lélevage du ver à soie. Un hôpital militaire y fut ouvert pendant la première guerre mondiale et le bâtiment fut occupé de 1940 à 1944. En 1962, un promoteur immobilier acquit la maison Carrée, dont le déclin commençait. En 1990, la ville de Mérignac a racheté pour un franc symbolique le château.","architecture":"BOURRAN sera reconstruit, en 1869, par les architectes Jules et Paul Laffargue. En 1944, le domaine sera réquisitionné pour y installer l'école normale d'instituteur. Le parc, fut décoré par le paysagiste Louis Le Breton. Il reste une série de constructions : pont, château d'eau, arbre en ciment, grotte de jardin en rocaille et son plan d'eau.\r\nCHENE VERT . Le château comprend un pavillon central à un étage que prolongent deux ailes basses en fer à cheval aboutissant à deux grosses tours rondes. L'architecte qui en donna le dessin est demeuré inconnu. Par son style et malgré ses petites dimensions, l'édifice évoque les châteaux de la Renaissance, avec ses lourds frontons semi-circulaires abondamment sculptés. Le toit du pavillon central à la Mansart, paraît avoir été remanié au début du XVIIIe siècle, au moment où l'on éleva le portail d'entrée avec sa belle grille de fer forgé.\r\nPEYCHOTTE appelée la maison carrée dArlac est un château bâti à Mérignac, c'est une \"folie de style néo-classique, construite de 1788 à 1790. Le grand salon circulaire donne sur le parc par trois portes-fenêtres. La coupole portait une vaste composition picturale empruntant à l'agriculture, au commerce, à la navigation qui serait attribué au peintre Antonio Gonzalez. Certains éléments témoignent d'une restauration au second Empire. Le château Peychotte est classé aux M.H. depuis le 21/03/1983.","habitants":"avocat François-Armand Saige                           monsieur Viard de Saint-Domingue,                            Famille de Samuel Peixotto   \r\n        \"","divers":"Bourran grav-1 44° 50' 19,42\" Nord, 0° 37' 45,34\" Ouest       Grav-4-5   Chêne vert g-2-3        Peychotte 44° 49' 41\" Nord, 0° 37' 22\" Ouest Grav-5","gps":"","images":["../../jctruffet.com/image/image_33/33_M%c3%a9rignac_Bourran_1.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_Bourran_2.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_Bourran_3.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_Bourran_4.jpg","../../jctruffet.com/image/image_33/33_M%c3%a9rignac_Bourran_5.jpg"]},"Consult_chateau_formulaire097e":{"id":"Consult_chateau_formulaire097e","dept":"33","canton":"Castillon la Bataille","commune":"Naujan-et-Postiac","nom":"Naujan_Postiac","type":"Château","periode":"XVIII","histoire":"A Naujan le château de Bel-Air d'Arpaillan,de Minvielle, de mont-Perrat, de Rauzan d'Espagne.                     BEL-AIR, alors quelle ne se nommait pas encore « Bel Air »,  elle fut édifiée par la famille des seigneurs de Perponcher, originaire de la région de Sarlat dans le Périgord. En 1815, Hendrick Georg de Perponcher-Sedlnitzky fut considéré comme le « héros de Waterloo », tant sa stratégie contre le maréchal Ney fut déterminante dans la victoire contre Napoléon. Pour son action et sa bravoure, le roi des Pays-Bas Guillaume 1er lui déféra le titre de comte.             MONT-PERAT, construit en 1780, il a brulé et à été reconstruit au même endroit en 1920. Le principal bâtiment simpose par sa hauteur, en 1998, la propriété est en très mauvais état. Malgré tout, inspiré par les terroirs et le potentiel de la propriété « CHÂTEAU MONT PERAT » pour rendre hommage aux quatre petits monts qui font la qualité et la diversité de son terroir.                                                       RAUZAN d'Espagne, aujourdhui Gabriel et sa femme Johanna, ont pris possession des lieux et sattachent à le rendre toujours accueillant et familial. Chambres d'hôtes.","architecture":"Arpaillan, date du XVIe siècle comporte une vaste enceinte carrée, deux de ses angles étant consolidés par de gros contreforts munis à leur sommet de consoles qui portaient autrefois des échauguettes. Les deux autres angles étaient flanqués à l'origine de tours rondes, dont une seule subsiste. Des fossés entouraient partiellement la forteresse. Des bâtiments se développent sur les côtés sud et ouest de la cour dans laquelle on entre par l'est en franchissant une porte refaite au XVIIe siècle. \r\nBEL-AIR, la bâtisse principale de la propriété est une maison forte du XVIe siècle qui surplombe la vallée de lEngranne, au nord de la Dordogne.                     MONT-PERAT, construit en 1780, il a brulé et à été reconstruit au même endroit en 1920. Le principal bâtiment simpose par sa hauteur, orné dune tour.      RAUZAN-DESPAGNE Un ancien relais de chasse du XVIIe siècle, aux portes de Bordeaux,","habitants":"Seigneurs de Perponcher\r\n        \"","divers":"A Naujac le château de Bel-Air g 2-3  d'Arpaillan g-4,de Minvielle g-5, de Mont-Perrat, de Rauzan d'Espagne.","gps":"","images":["../../jctruffet.com/image/image_33/33_Naujan_Postiac_1.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_2.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_3.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_4.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_5.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_6.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_7.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_8.jpg","../../jctruffet.com/image/image_33/33_Naujan_Postiac_9.jpg"]},"Consult_chateau_formulaired351":{"id":"Consult_chateau_formulaired351","dept":"33","canton":"Lacanau","commune":"Cantenac","nom":"Palmer","type":"Château","periode":"XVIII","histoire":"PALMER, au XVIIIe siècle, cette propriété appartenait à madame de Gasq et se nommait alors « Domaine de Gasq ». Il sera revendu en 1814 au lieutenant-colonel britannique Charles Palmer , qui lui donnera son nom actuel. En 1843, le major-général Palmer est contraint de revendre la propriété à la caisse hypothécaire et, dix ans plus tard, les frères Pereire font l'acquisition du domaine et y font construire un château en 1856. Cette demeure est luvre de Charles Burguet, célèbre architecte ayant réalisé de nombreux bâtiments à Bordeaux.  En 1905, le château est mis en vente aux enchères et acquis par Daniel et Georges Guestier, propriétaires de Beychevelle. À la suite de la grande guerre et de la crise des années 1930, les frères Pereire se séparent à leur tour du château. C'est en 1938 que quatre familles du négoce bordelais s'unissent pour reprendre la propriété : Fernand Ginestet, les frères Miailhe, les Mähler-Besse et les Sichel. En 1950, les familles Ginestet et  Miailhe, vendent leurs parts aux familles Sichel et Mähler-Besse. Aujourd'hui, le conseil de surveillance est composé d'une kyrielle de cousins. Jean Bouteiller (1913-1962), époux dOlga Mälher (1918-1999), gère le château jusquà sa mort. Lun de leurs six enfants, Bertrand Bouteiller, reprend brillamment la gestion. En 2004, la gestion est confiée par les actionnaires de la société civile immobilière à Thomas Duroux.","architecture":"Le domaine de Palmer fut créé dans la première moitié du XIXe siècle  de plan carré à cinq travées sur deux niveaux toit en croupes et attiques et lucarnes centrales sur pavillon saillant d'entrée et d'élégantes tourelles aux angles  à toit en poivrières à mâchicoulis, l'édifice est flanqué sur la droite d'un pavillon -un niveau avec terrasse et à l'opposé un bâtiment en retour d'équerre dépendance  à toit plat.","habitants":"Madame de Gasq\r\n        \"","divers":"Château Palmer à Cantenac","gps":"","images":["../../jctruffet.com/image/image_33/33_Palmer_1.jpg","../../jctruffet.com/image/image_33/33_Palmer_2.jpg","../../jctruffet.com/image/image_33/33_Palmer_3.jpg","../../jctruffet.com/image/image_33/33_Palmer_4.jpg"]},"Consult_chateau_formulairee23d":{"id":"Consult_chateau_formulairee23d","dept":"33","canton":"Pessac","commune":"Pessac","nom":"Pape_Clément","type":"Château","periode":"XIII-XVII","histoire":"PAPE-CLEMENT, au XIIIe siècle ce vignoble est offert à Bertrand de Goth, cet archevêque de Bordeaux, consacré plus tard en 1305 Pape Clément V. En 1309 Clément fait don du domaine au diocèse de Bordeaux et le posséderont jusqu'à la Révolution, et en 1791 est acquis par le banquier samuel-Charles Piexotto le fera passer dans diverses mains jusqu'à son achat en 1858 par un négociant Jean Baptiste Clerc. Au XIXe siècle, c'est à Jean-Baptiste Clerc  qui réalisera l'élégant manoir de style néogothique, puis passera à la famille Cinto qui à du mal à faire face à l'évolution,  vend le domaine à Paul Montagne agronome qui redonne le prestige classé grand cru en 1959  à Paul succède son fils Léo,  puis son gendre  Bernard Magrez  qui entame à son tour son chemin vers l'excellence pour l'élaboration de ce grand cru.                              BELLEGRAVE, ancien pavillon de chasse des seigneurs du château Haut-Brion à Pessac, il fut construit au XVIIe par le seigneur de Pontac sur son domaine de Bellegrave. Au XIXe siècle, M. Borde acheta la propriété, domaine de 12 hectares, et y fit construire l'aile ouest dans un style Renaissance. Ce château appartient également à la famille de François Jules Hilaire, chambellan, agronome chargé de l'irrigation en Gironde et instigateur des plantations de pins dans les Landes.","architecture":"Pape Clément, entouré d'un parc le château se compose de trois pavillons élevés sur un rez-de-chaussée et un étage, reposant sur un soubassement et reliés par un corps central dont le mur-pignon s'ornent de remparts, de part et d'autre du degré droit conduisant à l'entrée principale se développe une terrasse bordée d'une balustrade qui se prolonge tout au long de la façade donnant sur le parc jusqu'au  pied d'une tour à trois niveaux, couronné de créneaux sur mâchicoulis et surmontée d'une guette, les lucarnes à pigneon,  le souci du détail et lart de laccueil personnalisé sont chers au maître des lieux. Ainsi les codes de lhôtellerie haut de gamme sont minutieusement appliqués .                          BELLEGRAVE, en 1936, la commune acquit le domaine et y aménagea un centre aéré et des installations sportives. Ce domaine est maintenant occupé par l'office municipal du sport et le SPUC (Stade Pecassais Union Club) dont le docteur Frédéric Kaibel, adjoint au maire chargé des sports, fut président de 1962 à 1975. Une stèle à sa mémoire a été installée dans le parc.","habitants":"Famille de François Jules Hilaire \r\n        \"","divers":"Château Pape Clément et de Bellegrave grav 3-4-5","gps":"","images":["../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_1.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_2.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_3.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_4.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_5.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_6.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_7.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_8.jpg","../../jctruffet.com/image/image_33/33_Pape_Cl%c3%a9ment_9.jpg"]},"Consult_chateau_formulaire74d1":{"id":"Consult_chateau_formulaire74d1","dept":"33","canton":"Lesparre-Médoc","commune":"Pauillac","nom":"Pauillac_II","type":"Château","periode":"XVII","histoire":"Dans cet artille de Pauillac, le château de Gd-Puy-Lacoste de Gd-Puy-Ducasse, de Latour, et de Pontet-Canet.                                                                          GRAND-PUY-LACOSTE, l'histoire de Grand-Puy-Lacoste fascine à plus d'un titre. Elle s'inscrit dans une saga familiale qui remonte au XVIe siècle. Depuis le XVIe siècle, le cru s'est transmis de génération en génération et, par le jeu des alliances entre familles, il est resté au sein de la même descendance jusqu'en 1920, avant de reprendre un destin familial avec les Borie en 1978.                                                                 GRAND PUY DUCASSE Le domaine a été racheté en 2004, par le crédit agricole.                                     LATOUR, château Latour est devenu en 1993 la copropriété de la holding Artémis de François Pinault, qui détient 149 parts sur 155, les six autres parts étant détenues en partie par les descendants du marquis Nicolas-Alexandre de Ségur dont le surnom était le « prince des vignes ».                                              PONTET CANET, l'histoire du château remonte au XVIIIe siècle. La propriété n'a connu que trois différentes familles de propriétaires durant toute son histoire. La première fut celle Jean-François de Pontet qui était grand écuyer du roi de France et gouverneur du Médoc.  La famille de Pontet est restée propriétaire jusqu'en 1865. Cette date fut celle du rachat par Herman Cruse. La famille Cruse  négociants, possédait plusieurs propriétés prestigieuses comme le château Rauzan-Ségla ou le château Giscours. À la fin du XIXe siècle, la famille Cruse restera propriétaire du domaine jusqu'en 1975. Le milieu des années 1970 fut une période de crise dans le Bordelais, notamment à cause d'un grand scandale de fraude.","architecture":"Architecture de PONTE-CANNET  Les bâtiments du château ont été construits dans le style néo-classique au milieu du XVIIIe siècle. Ils sont divisés en deux parties, la partie droite de la bâtisse date de 1755 et la partie principale date de 1781, soit un an après l'inauguration du grand théâtre de Bordeaux, ayant inspiré la colonnade sur avant corps de l'entrée de la demeure similaire aux colonnes du grand théâtre et fronton semi-circulaire. corps de logis de plan carré à trois niveaux avec  attiques et série de lucarnes en combles sous un toit brisé, retour en équerre de bâtiment identtique de chaque côté mais à deux niveaux seulement.\r\nLa TOUR de plan carré à deux niveaux  et pavillon de l'avant corps sur refends accolés de deux lucarnes sur le toit en croupes recouverts d'ardoises.                    Gd-Puy LACOSTE de plan rectangulaire à trois niveaux avec série de lucarnes sur un toit brisé, sur la gauche hords oeuvres tour carrée de même niveau avec lucarne en façade.                                              Gd-Puy-DUCASSE de plan oblong à deux niveaux de huit travées avec un avant corps avec un fronton triangulaire avec oeil de  boeuf central, toit en croupe recouvert de tuiles, retour en équerre de dépendances formant la cour d'honneur.","habitants":"Artémis de François Pinault                                            Jean-François de Ponte\r\n        \r\n        \"","divers":"Château du Gd-Puy Lacoste g-1 Cordeillan g-2 de la tour g-5-6  et de Pontet -Canet   g-7  de Moussac g-8  Real g -9","gps":"","images":["../../jctruffet.com/image/image_33/33_Pauillac_II_1.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_2.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_3.jpg","../.
