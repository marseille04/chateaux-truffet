uits profond de 18 mètres, une salle voûtée, souterraine qui devait servir de réserve à grains, et un souterrain d'évacuation en cas de siège. La salle du rez-de-chaussée, au sol dallé de pierre, possède une belle voûte d'ogive quadripartie aux nervures retombant des culots (gothique). Le premier étage, outre son carrelage ancien, conserve côté nord sa cheminée de pierre et, logé dans une tourelle, l'escalier à vis qui dessert les niveaux supérieurs.\r\n L'ensemble des constructions était entouré de douves sèches qui constituaient un obstacle supplémentaire vers l'intérieur des terres, le nord et l'est étant protégés par une dénivellation naturelle.","habitants":"Michel de Chassaigne\r\n        \"","divers":"Génissac 44° 50' 46\" Nord et 0° 14' 48\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_G%c3%a9nissac_1.jpg","../../jctruffet.com/image/image_33/33_G%c3%a9nissac_2.jpg","../../jctruffet.com/image/image_33/33_G%c3%a9nissac_3.jpg","../../jctruffet.com/image/image_33/33_G%c3%a9nissac_4.jpg","../../jctruffet.com/image/image_33/33_G%c3%a9nissac_5.jpg"]},"Consult_chateau_formulaire2a65":{"id":"Consult_chateau_formulaire2a65","dept":"33","canton":"Langon","commune":"Castets en Dorthe","nom":"Hamel_Jaubertes","type":"Forteresse","periode":"XIV","histoire":"HAMEL, bâti à Castets-en-Dorthe est fièrement campé au dessus de la jonction Garonne-Canal. Le château a été édifié au XIVe siècle à la demande de Raymond Guilhem de Goth, neveu du pape Clément V et réaménagé au XVIe siècle par Jean de Fabas puis à nouveau au XVIIe siècle. Après des années dabandon, dû à un incendie, sa forteresse a retrouvé une partie de sa splendeur passée. A la fin du XVII siècle, un membre de la famille de Hamel a donné au château l'aspect que nous lui voyons aujourd'hui. Classé M.H.  du 20 juin 1963. A 1 km à l'ouest, le château des JAUBERTES édifice seigneurial du XVIe  et XVIIe siècle,  bâti à Saint-Pardon-de-Conques, domine la vallée de la Garonne. La famille de Pontac, Haut-Brion en 1530, acheta en 1594 le domaine des Jaubertes, réputé  déjà à lépoque pour la qualité de son terroir et la beauté de son château. 13 générations de Pontac ont façonné, embelli, perfectionné cette propriété, initialement construit vers 1480, pour les seigneurs de Castets-en-Dorthe. Le propriétaire initial du château était le marquis de Pontac. En 1594, il devient la propriété d'Isabeau de la Chassaigne, veuve de Raymond de Pontac, premier président du parlement de Bordeaux. .","architecture":"Hamel, il offre un point de vue hors du commun, les bâtiments actuels sont du XVIe siècle et reposent sur les fondations d'un lieu fortifié. Jadis, les fortifications du bourg étaient réunies à celle du château par un mur dont on ne trouve plus que de faibles restes. De cette forteresse construite en 1314, il ne reste que peu de chose, parce que de nombreuses modifications y ont été faites à la fin du XVI siècle par Jean de Fabas, à qui on doit  les différents bastions triangulaires tournés vers le bourg. Ceux qui devaient protéger les autres côtés de la forteresse, ont été rasés.           JAUBERTES, construit vers 1480 par les seigneurs de Castets-en-Dorthe en style gothique flamboyant a été modifié aux XVIe et XVIIe siècles, exceptée la tour dangle. domine la vallée de la Garonne depuis un promontoire rocheux, porte dentrée de la région des Graves, érigé dans le style gothique flamboyant, le château a été modifié, par la suite,  exceptée la tour dangle, corps de logis en équerre à deux niveaux avec lucarnes sur en combles sur toit brisés une tour hexagonale à l'angle intérieur  de quatre niveaux toit en poivrière et deux autres tours rondes  sur angles extèrieurs,dont une  hors oeuvre toit  en ruine. des dépendances à différents niveaux  et en équerre avec ouvertures pour le passage à la cour.L'édifice a été inscrit au titre des M.H. par arrêté du 4 août 1978 pour son pigeonnier, ses façades et ses toitures.","habitants":"Hamel Raymond Guilhem de Goth                            Jaubertes  famille de Pontac\r\n        \"","divers":"Hamel  44° 33' 55,28\" Nord, 0° 9' 28,54\" Ouest   Jaubertes grav 6-7-8.","gps":"","images":["../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_1.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_2.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_3.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_4.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_5.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_6.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_7.jpg","../../jctruffet.com/image/image_33/33_Hamel_Jaubertes_8.jpg"]},"Consult_chateau_formulaire5520":{"id":"Consult_chateau_formulaire5520","dept":"33","canton":"Créon","commune":"Cestas-cenac","nom":"Haut_Brignon","type":"Château","periode":"XVI","histoire":"HAUT-BRIGNON, bâti à Cenac, Il existait au XVIIIe une ancienne maison noble, que Mr l'Héritier fit démolir, en 1845, pour la remplacer par un nouveau château. Au Moyen-Âge : des vestiges également dégradés se superposent aux précédents dans une fourchette chronologique qui sétale du XIe siècle au début du XVe siècle. D'autres lieux et demeures illustrent l'histoire de cette commune : le Castel de Montignac édifié au XVe siècle et duquel le souvenir des familles de Gères et Du Périer de Larsan est indissociable, Duplessy bâti au XVIIe par un écuyer du roi, remanié au XVIIIe par un bourgeois bordelais. La Mouleyre qui évoque l'Empire et la veuve du général-comte Boudet, Donlabade, Brignon, Materre et Saint-Selve qui illustrent le XIXe siècle au cours duquel la bourgeoisie de Bordeaux découvrit vraiment Cénac et en fit un lieu de retraite. Depuis l'époque médiévale, le sous-sol a été exploité pour son calcaire stampien. Il en résulte un lacis de galeries abandonnées depuis longtemps.                                                                         BUFFAUD, à Aubie  et Espessas, autrefois propriété dEymeric marquis du Mas de Paysac (1853-1925).","architecture":"HAUT-BRIGON, ce nouveau château, de style néo-classique, plus épuré, est composé d'un grand logis, sur 2 niveaux, et d'un sous étage de combles. Il est percé de fenêtres à agrafes, et de lucarnes en demi-cercle. Le château haut-Brignon comporte deux tourelles, qui l'encadrent sur les côtés. Elles sont de taille inégale. La tourelle la plus importante est percée de fenêtres ogivales, de quadrilobes, de baies hautes et étroites qui imitent des créneaux. Un angle du logis auquel elle est accolée prend une forme polygonale, imitant les édifices du début du XVIe siècle. Les édifices agricoles, quant à eux, datent du XVIIIe siècle. BUFFAUD, de plan rectangulaire  à trois niveaux avec lucarnes à fronton triangulaire et pinacles sur combles, toit à deux pans en tuiles, fenêtres à meneaux et tour heptogonale mis hors-oeuvre en façade à trois niveaux à toit plats","habitants":"Monsieur L'Héritier\r\n        \"","divers":"Château de Haut Brignond  44° 46' 93\" Nord et 0° 27' 79\" Ouest       Buffaud grav 3-4","gps":"","images":["../../jctruffet.com/image/image_33/33_Haut_Brignon_1.jpg","../../jctruffet.com/image/image_33/33_Haut_Brignon_2.jpg","../../jctruffet.com/image/image_33/33_Haut_Brignon_3.jpg","../../jctruffet.com/image/image_33/33_Haut_Brignon_4.jpg"]},"Consult_chateau_formulaired2dd":{"id":"Consult_chateau_formulaired2dd","dept":"33","canton":"Pessac","commune":"Haut-Brion Pessac","nom":"Haut_Brion","type":"Château","periode":"XIX","histoire":"Plusieurs châteaux à Haut-Brion-Pessac celui de Carmes,du Haut-Brana et de Camponac.                  CARMES, en 1584, Jean de Pontac, seigneur du domaine Haut-Brion. En 1630, lordre des Grands Carmes agrandit le domaine et propriétaire  pendant deux cents ans, les Carmes le cèdent en 1791 lors de la confiscation des biens de lÉglise, pendant la Révolution. Le domaine devient alors bien national. En 1840, Léon Colin le rachète et le rebaptise Carmes-Haut-Brion. Il transmet ensuite la propriété à sa famille, Chantecaille-Furt, qui y fait construire au début du XIXe siècle le château toujours visible aujourdhui, ainsi que le parc, dessiné par le paysagiste Louis-Bernard Fisher. En 2010, Patrice Pichet, président du groupe Pichet, rachète le domaine. \r\nHAUT-BRANA, de 1626, en 1695, appartient au fief des Jésuites du prieuré Sainte-Marie de Bardanac à Pessac. Au XIXe siècle, devenu château Haut-Brana, est la propriété des comtes de Tanquerel de la Panissais.                                                                          HAUT-BRION, bâti à Pessac, par la famille de Séguret le domaine a été constitué à partir de 1525 par Jean de Pontac  En 1533, Jean de Pontac achète la maison noble de Haut-Brion à un basque, Jean Duhalde. Construction du château en 1549 qui passera  en 1746  par héritage à la famille de Fumel, en 1794 saisit par l'état touve un acquéreur prestigieux en la personne de Talleyrand qui le revend en 1804 et aprés avoir connu divers propriétaires est acquis  en 1836 par un banquier parisien devenu préfet de la Gironde Eugène Larrieu en 1855 un an avant son décès.  En 1923 haut Brion sort de la famille des Larrieu  passe de nouveaux  par divers propriétaires avant que Clarence Dillon l'acquiet en 1935, puis est transformé en maison de repos pour pilotes allemands et en sort trés dégradé, à la fin du conflit Clarence Dillon récupère son bien et se consacre à sa restauration, sa petite fille, Joan Dillon veuve du prince Charles du Luxembourg à épousé en seconde noce Philippe de Noailles duc de Mouchy pris la présidence du domaine en 1975.","architecture":"CARMES, seul château à être situé dans la ville de Bordeaux. : Le Clos des Carmes-Haut-Brion.       HAUT-BRANA, en 1626, cette pièce de terre appartient à la maison de Bel-Air (actuel Pape-Clément), et dans un acte de 1678, on évoque une pièce de vigne au plantier de Noès, au lieu-dit Brana.    CAMPONAC,  en 1610, un acte de vente de cette terre mentionne une maison ancienne, rénovée par son nouveau propriétaire, M. de Fonteneil, qui donnera un nouvel essor à la propriété.Un siècle plus tard, la vieille bâtisse est remplacée par une chartreuse, maison basse à deux ailes, dont le corps central sera rehaussé dun étage au XIXe siècle; la véranda, le péristyle et lallée de platanes qui part vers les terrains de sports, au nord du parc, datent également du second Empire.  La fontaine du XVIIIe siècle que lon voit dans le parc provient du domaine de Saige, disparu aujourdhui. Elle a été démontée puis remontée à Camponac, en 1979, par les membres de lassociation « Les amis du beau et du vieux Pessac ».\r\nHaut-Brion  à l'origine présente un corps de logis rectangulaire de dimensions modestes cantonné à ses angles de quatre tours dont l'une est en encorbellement le corps central est coiffé d'un toit d'ardoise  à quatre pentes chevauchés par des lucarne surmontées de fronton triangulaires, au XVIIe siècle  la demeure trop modestes pour les besoins de la famille. On y accole un corps de logis qui se trouvera privé d'une de ses tours d'angle un grand bâtiment couvert  de toitures en  croupes , d'apparence classique ce corps de bâtiment voit ses façades simplement animés par des moulures et des bandeaux, des corniches somment les fenêtres  à petits carreaux et de hautes lucarnes à fronton triangulaire éclairent la base du comble.","habitants":"Famille de  Léon Colin                                           Famille des Larrieu \r\n        \"","divers":"Plusieurs châteaux à Haut-Brion-Pessac celui de Carmes,du Haut-Brana et de Camponac grav 6-7.","gps":"","images":["../../jctruffet.com/image/image_33/33_Haut_Brion_1.jpg","../../jctruffet.com/image/image_33/33_Haut_Brion_2.jpg","../../jctruffet.com/image/image_33/33_Haut_Brion_3.jpg","../../jctruffet.com/image/image_33/33_Haut_Brion_4.jpg","../../jctruffet.com/image/image_33/33_Haut_Brion_5.jpg","../../jctruffet.com/image/image_33/33_Haut_Brion_6.jpg","../../jctruffet.com/image/image_33/33_Haut_Brion_7.jpg"]},"Consult_chateau_formulaire7a52":{"id":"Consult_chateau_formulaire7a52","dept":"33","canton":"Créon","commune":"Cambes","nom":"Haut_Peyrat","type":"Château","periode":"XVII","histoire":"HAUT-PEYRAT,  le premier château apparaît en 1655 : la date de construction est inscrite sur lune de ses portes. La propriété a appartenu aux familles parlementaires bordelaises d'Alesme et de Lassime ; Isabelle et Didier Gil ont acquis ce domaine viticole  en 2014.","architecture":"Haut peyrat Les premières traces de constructions datent de 1571, comme le puits, et le pigeonnier.Le premier château apparaît en 1655 :  les bâtiments furent particulièrement développés sous l'ancien régime. En revanche, les tourelles crénelées et le perron de la façade postérieure sont des adjonctions du XIXe siècle.  La propriété a été achetée en 2014 par la famille Gil ;   Le château Haut-Peyrat est un des seuls châteaux du Bordelais à être autonome en termes de chauffage grâce à sa chaudière à sarments qui alimente l'ensemble de la propriété.","habitants":"Famille d'Alesme\r\n        \"","divers":"Château de Haut-Peyrat","gps":"","images":["../../jctruffet.com/image/image_33/33_Haut_Peyrat_1.jpg","../../jctruffet.com/image/image_33/33_Haut_Peyrat_2.jpg","../../jctruffet.com/image/image_33/33_Haut_Peyrat_3.jpg","../../jctruffet.com/image/image_33/33_Haut_Peyrat_4.jpg"]},"Consult_chateau_formulairee02c":{"id":"Consult_chateau_formulairee02c","dept":"33","canton":"Cadillac","commune":"Haux","nom":"Haux_Coureaux","type":"Château","periode":"XVII-XIX","histoire":"A Haux plusieurs châteaux dont celui de Coureaux, de Haux,  de Haut-Sage dit de Peneau, de Grava, de Lagorce et de Lamothe.                              COUREAUX, a conservé ses douves, sa tour du guetteur et ses tours primitives (1120). Son nom lui a été donné par lun de ses illustres propriétaires : le marquis de Coureau de Bouran. Coureau propriété familiale  depuis 5 générations.                             HAUT-SAGE, dit de PENEAU  le château de Haute-Sage abrite un domaine de l'Entre-deux-Mers. Le château Peneau est une propriété familiale d'Emilie Douence qui a  succédé à la famille Pargade en 1997. \r\nLAGORCE, est un château bâti à Haux, appartient à une famille de négociants danois .\r\nLAMOTHE, découvrer cette demeure du XIXe siècle, aux 77 hectares, dont les sous-sols renferment quelques particularités. Habitat troglodytique dès le XIe siècle, carrière dextraction de pierres au XVIIe siècle, et enfin utilisés comme chai du XVIIIe siècle à nos jours. La présence de fossiles dhuîtres ou danimaux marins attestent de la présence de la mer il y a 35 millions dannées.","architecture":"HAUT-SAGE,  la constuction date des XVIe et XVIIe siècles, si son aspect évoque la fin du XVIe siècle ou le début du XVIIe siècle, le château fut peut-être édifié sur une base plus ancienne. Le château est composé d'un bâtiment central flanqué de chaque côté d'un pavillon carré. Une dépendance prolonge la façade sud. Sur cette même façade, on trouve une porte encadrée de deux pilastres et surmontée d'une corniche à gouttes. Derrière cette porte, on accède aux étages par un escalier. Celui-ci se prolonge dans une tourelle carrée par un escalier à vis. La présence d'une tourelle contenant un escalier à vis serait un indice attestant une origine du château antérieure au XVIe siècle. Une chapelle aurait autrefois existé à l'extrémité sud des dépendances situées à l'est du château Il est inscrit aux M.H. depuis 1984, pour ses toitures, ses façades et ses cheminées.    les autres châteaux de styles différents du XVIIe siècle","habitants":"Marquis de Coureau de Bouran\r\n        \"","divers":"Château à Haux, de Haut-Sage dit de Peneau g 4, de Grava, de Lagorce grav 7-8 et de Lamothe g-5, Haut-Sage : 44° 43' 38,97\" Nord, 0° 22' 12,68\" Ouest    Lagorce 44° 44'' 00\" nord, 0° 21' 37\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Haux_Coureaux_1.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_2.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_3.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_4.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_5.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_6.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_7.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_8.jpg","../../jctruffet.com/image/image_33/33_Haux_Coureaux_9.jpg"]},"Consult_chateau_formulaire53aa":{"id":"Consult_chateau_formulaire53aa","dept":"33","canton":"Castillon la Bataille","commune":"Hortense","nom":"Hortense","type":"Château","periode":"XVIII","histoire":"HORTENSE, un château existait au XIIIe siècle, au lieu-dit le Castéra. À la Révolution, la paroisse Saint-Pierre d'Hostens forme la commune d'Hostens. Le 4 mars 1863, la commune  est démembrée pour former la commune de Louchats à partir d'un hameau au nord-est de la commune Dans le début des années 1930, la société Minela qui exploitait des concessions de lignite en galerie à Laluque (région d'Arjuzanx) retient le site d'Hostens comme plus avantageux, la profondeur des couches de ce combustible permettant une exploitation à ciel ouvert. Une centrale électrique est implantée à Hostens pour tirer parti de ce gisement.   Maison bourgeoise bâtie dans un parc au centre du village pour le Dr Pirinski, un médecin originaire de Bulgarie,    aujourd'hui chambres d'hôtes","architecture":"Plus forteresse que  maison bourgeoise bâtie dans un parc au centre du village est une reproduction exacte dun château bulgare avec échauguette, donjon saillant crénelé et mâchicoulis et encorbellements dépassant d'un étage. Bâti sur soubassement à deux niveaux avec cordon, avant corps   avec balcon au premier et deuxième étages sur pied droits.","habitants":"Dr Pirinski\r\n        \"","divers":"Château d'Hortense à Castillon la Bataille","gps":"","images":["../../jctruffet.com/image/image_33/33_Hortense_1.jpg","../../jctruffet.com/image/image_33/33_Hortense_2.jpg","../../jctruffet.com/image/image_33/33_Hortense_3.jpg"]},"Consult_chateau_formulaire209a":{"id":"Consult_chateau_formulaire209a","dept":"33","canton":"La-Bréde","commune":"La Bréde","nom":"Labréde","type":"Château","periode":"XIV-XVIII","histoire":"Trois châteaux à la Bréde celui de la Bréde et celui de Lignière et des Fougères (voir article).                          La BREDE, cette forteresse féodale cité pour la première fois en 1285 elle appartenait à la famille de la Lande et au XVIIIe siècle a été la demeure de Montesquieu, Charles-Louis de Secondat, baron de Montesquieu, y est né le 18 janvier 1689. Il y a vécu de manière régulière toute sa vie et rédigé nombre de ses ouvrages. Le château a appartenu par alliance ou héritage aux familles de l'Isle de Penel, de Secondat, de Montesquieu, entre le Xe siècle et 2004, année où mourut la comtesse Jacqueline de Chabannes la Palice (1912-2004), dernière descendante directe de l'écrivain (descendante de Denise, sa plus jeune fille), qui, en 1994, avait confié par donation à la bibliothèque municipale de Bordeaux tous les ouvrages et documents en sa possession.                 LA LIGNIERE dans la famille des barrons Clouet depuis 1830. Le général baron Louis Cloüet y mourut, après une vie mouvementée, ayant servi de la Révolution jusqu'au règne de Charles X,  destitué par Louis Philippe, a épousé une bordelaise, Mlle Lainé. Celle-ci a grandi aux portes de La Brède, au domaine de Laguloup à Saucats. Elle est la nièce de M. Lainé, avocat, député de Bordeaux, président de la chambre des députés, préfet de la Gironde à la Restauration, ministre, pair de France, elle souhaite se rapprocher de sa famille. propriété de monsieur Calvet.","architecture":"La BREDE de style gothique, édifié sur les fondations d'une bâtisse du XIe siècle date du XIVe au XIXe siècle. Remanié à la Renaissance, il conserve son caractère de forteresse atypique par sa forme polygonale qui se reflète dans l'eau des larges douves qui l'entourent  et pourvu d'un système défensif, ils limitent deux barbacanes dont les défenses presque toutes arasées et les ponts-levis remplacés par des ponts dormants et une enceinte principale, une partie de ses courtines a été abattue pour laisser voir la façade du corps de logis. Les remparts appuyès à une tour de la fin du Moyen-Age, sont percées de nombreuses baies munit de meneaux. la chambre de Montesquieu subsiste dans son état du XVIIIe siècle, mais il y effectua aussi des transformations, notamment un jardin à la française, actuellement en cours de restauration, et un jardin à l'anglaise. C'est un château classé au titre des M.H. depuis 2008.       La LIGNIERE, construit en 1760 sur un soubassement élevé d'un étage et un deuxième léger  avec attiques éclairé par une rangée d'occuli rectangulaires, un porche à colonnade supporte un balcon  à ballustrades, commandé par un large escalier en fer à cheval un délicieux fronton couronne l'édifice.","habitants":"Charles-Louis de Secondat, baron de Montesquieu       Le général baron Louis Cloüet\r\n        \"","divers":"à la Bréde celui de la Bréde et celui de Lignière.                          la Bréde 44° 40' 45,12\" Nord et 0° 32' 39,12\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Labr%c3%a9de_1.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_2.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_3.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_4.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_5.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_6.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_7.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_8.jpg","../../jctruffet.com/image/image_33/33_Labr%c3%a9de_9.jpg"]},"Consult_chateau_formulaireefdd":{"id":"Consult_chateau_formulaireefdd","dept":"33","canton":"Langon","commune":"Bommes","nom":"Lafaurie_Peyraguey","type":"Château","periode":"XIII-XVIII","histoire":"LAFAURIE, le château Lafaurie-Peyraguey est un domaine situé au coeur du Sauternais sur les hauteurs du village de Bommes. Le château daterait en partie du XIIIe siècle et plus tard, en 1742, à la mort du baron de Pichard, l'inventaire fait apparaître un vignoble.\r\nDepuis 1984, le propriétaire n'est autre que le groupe Gdf-Suez qui a effectué, entre 1998 et 2004, une large campagne de rénovation pour respecter notamment les normes environnementales, le Suisse Silvio Denz,  président de Lalique et d'Art et France. Il achète le château Lafaurie-Peyraguey.","architecture":"LAFAURIE, grand domaine, le château dans un parc quadrangulaire, le corps de logis pricipal à deux  niveaux sur soubassement avec la partie central  élevé à cinq niveaux avec mâchicoulis toit en croupe et sur l'angle gauche le pavillon à trois niveaux toit en terrasse, accolé  d'un  bâtiment faisant le tour de la cour d'honneur, en face de la façade tour du porche d'entrée, toit en terrasse, prolongement du bâtiment jusqu'à l'angle retour en équerre sur plan oblong à l'arrière de l'édifice avec des tours rondes à chaque angles.","habitants":"Baron de Pichard\r\n        \"","divers":"Château de Lafaurie-Peyraguey à Bommes","gps":"","images":["../../jctruffet.com/image/image_33/33_Lafaurie_Peyraguey_1.jpg","../../jctruffet.com/image/image_33/33_Lafaurie_Peyraguey_2.jpg","../../jctruffet.com/image/image_33/33_Lafaurie_Peyraguey_3.jpg","../../jctruffet.com/image/image_33/33_Lafaurie_Peyraguey_4.jpg","../../jctruffet.com/image/image_33/33_Lafaurie_Peyraguey_5.jpg","../../jctruffet.com/image/image_33/33_Lafaurie_Peyraguey_6.jpg"]},"Consult_chateau_formulaireebef":{"id":"Consult_chateau_formulaireebef","dept":"33","canton":"Lesparre-Médoc","commune":"Saint-Estèphe","nom":"Lafon-Rochet","type":"Château","periode":"XVIII","histoire":"LAFON-ROCHET est un domaine à Saint-Estèphe,  est situé sur une croupe de grave,  bordée par une jalle qui en marque la délimitation, en face du château Mouton-Rothschild, l'histoire du château Lafon-Rochet remonte au XVIIe siècle. En 1975, Guy Tesseron reprit aussi le château Pontet-Canet, puis, quelques années après, le château Malescasse. En 1999, Michel Tesseron et sa sur Caroline Poniatowska se consacrèrent au château Lafon-Rochet alors qu'Alfred et son frère Gérard Tesseron reprirent la gestion de château Pontet-Canet. La propriété était à l'origine connue sous le nom de domaine Rochet et appartenait à Antoinette de Guillemotes. En épousant Étienne de Lafon, il fut rebaptisée sous le nom de château Lafon-Rochet. En 1959, Guy Tesseron, grand nom du cognac, reprit le domaine à une époque difficile dans le bordelais.","architecture":"Le domaine de Lafon-Rochet ne compte alors plus que 15 hectares. Il fut décidé de démolir complètement le château et de le reconstruire entièrement sur les plans d'une chartreuse du XVIIIe siècle.\r\nL'édifice oblong d'un niveau sur soubassement flanqué sur la partie centrale d'un pavillon à deux niveaux avec façade arrondie saillant, toit en croupes aux extrémités pavillons à refends de méme niveaux à   toits réduits.","habitants":"Famille d' Étienne de Lafon\r\n        \"","divers":"Lafon-Rochet 45° 15' 55\" Nord 0° 46' 15\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Lafon_Rochet_1.jpg","../../jctruffet.com/image/image_33/33_Lafon_Rochet_2.jpg","../../jctruffet.com/image/image_33/33_Lafon_Rochet_3.jpg"]},"Consult_chateau_formulaire35cd-2":{"id":"Consult_chateau_formulaire35cd-2","dept":"33","canton":"Lacanau","commune":"Lamarque-Haut Médoc","nom":"Lamarque","type":"Forteresse","periode":"XIV-XIX","histoire":"Deux châteaux  à Lamarque haut Médoc celui de Lamarque et de Cartillon.                                           LAMARQUE, la seigneurie de Lamarque fut ainsi nommée parce qu'elle était une « marche » frontière de la Guyenne. Avec les forteresses de Lesparre au nord et de Blanquefort au sud, le château-fort de Lamarque eut à défendre le territoire contre les invasions des Vikings venus par la Gironde. Pons de Castillon construisit, au XIVe siècle, le château tel quon le voit aujourdhui avec donjon. Le duc de Glocester et Henri V y séjournèrent pendant le temps où lAquitaine releva de la couronne dAngleterre. Lorsque cette province reveint au roi de France en 1453, le château  fut la résidence de plusieurs gouverneurs de Guyenne et notamment du maréchal de Matignon. Au XVIIe siècle, le duc dEpernon y apporta quelques transformations du goût de son époque, monsieur de Brassier en fut le dernier propriétaire avant la Révolution, vendu comme bien national à messieurs Pope Ciard, ceux-ci le revendirent à Antoine de Sauvage en 1825 qui confia la propriété au régisseur Pierre Bernadet. Une fois les troubles de la Révolution passés,  de sa fonction militaire se transforma en château viticole. En 1841, Pons comte de Fumel acquit le château. Les descendants de Pons de Fumel sont toujours propriétaires du domaine, dont la marquise d'Evry.     CARTILLON, il est alors la propriété de M. Alexandre de Bethmann   1805  à 1870  qui fût maire de Bordeaux de 1867 a` 1870.","architecture":"LAMARQUE, forteresse implantée dans les marécages elle occupe une légère éminence  sur un énorme soubassement   entourée d'un rempart  de 200 mètres de développement. les parties basses des courtines présentent encore des parements de petit appareil du XIe siècle on retrouve à la base une tour romane oblongue  et terminée pat un demi-cercle.  Le bâtiment  principal s'élève côté sud un grand corps de logis rectangulaire appuyé à un donjon circulaire à l'est  et flanqué d'une tourelle à l'ouest, cette construction a été surélevée, couronnée de mâchicoulis, de larges fenêtres percées, ils ont conservé des achères en croix pattée dans les parties basses.  Les soubassements, une partie des défenses et la chapelle datent du XIe siècle et du XIIe siècle. Autour de la forteresse primitive, tour de défense, poterne, chemin de ronde et murs crènelés   CARTILLON, se situe a` Lamarque  la propriété de 69 hectares jouxte trois prestigieux repre´sentants de lappellation Moulis, les châteaux Poujeaux, Maucaillou et Chasse Spleen.  La qualité du terroir, identifié de longue date, a fait du château du Cartillon une propriété connue depuis le XIXe siécle. En 1850, le domaine était référencé dés la première édition du guide Féret.","habitants":"Monsieur de Brassier\r\n        \"","divers":"Château de Lamarque et de Cartillon grav 7-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Lamarque_1.jpg","../../jctruffet.com/image/image_33/33_Lamarque_2.jpg","../../jctruffet.com/image/image_33/33_Lamarque_3.jpg","../../jctruffet.com/image/image_33/33_Lamarque_4.jpg","../../jctruffet.com/image/image_33/33_Lamarque_5.jpg","../../jctruffet.com/image/image_33/33_Lamarque_6.jpg","../../jctruffet.com/image/image_33/33_Lamarque_7.jpg","../../jctruffet.com/image/image_33/33_Lamarque_8.jpg"]},"Consult_chateau_formulaire37a3":{"id":"Consult_chateau_formulaire37a3","dept":"33","canton":"Lacanau","commune":"Cussac-Fort-Médoc","nom":"Lamothe_Bergeron","type":"Château","periode":"XIX","histoire":"LAMOTHE, c'est avec Jacques de Bergeron scientifique qui acquiert le domaine en 1773, il reste dans cette famille jusqu'en 1850 puis fut acheté par d'Armana et c'est là que Lamothe devient Lamothe Bergeron  qui entreprend la constrution du château actuel  achevé en en 1868, il passe entre les mains  d'un négociant au début des années 1970, en 2009 les maisons de Cognac H. Mounier et Hardy en font l'acquisition et en 2015 restaure le château.   Suite à une année de rénovation, ce château du XIXe siècle accueille les visiteurs pour une expérience unique dans le vignoble médocain. Le château propose en effet une offre touristique globale avec un parcours nologique « nouvelle génération » un salon-séjour,  ensuite une salle de séminaire.","architecture":"LAMOTHE-BERGERON, l'édifice de plan rectangulaire sur soubassement  à deux niveaux et lucarnes sur un toit en croupe recouvert d'ardoise, plein cintre en façade un avant corps légèrement saillant se terminant sur le toit par une lucarne à aileron et pinacle redondant et au premier étage un balcon sur colonne dorique, l'édifice est flanqué sur les angles de la face avant de deux tourelles à toit en poivrières et sur les angles arrières de deux tours carrées toit à quatre pans.","habitants":"Jacques de Bergeron\r\n        \"","divers":"Château de Lamothe-Bergeron","gps":"","images":["../../jctruffet.com/image/image_33/33_Lamothe_Bergeron_1.jpg","../../jctruffet.com/image/image_33/33_Lamothe_Bergeron_2.jpg","../../jctruffet.com/image/image_33/33_Lamothe_Bergeron_3.jpg","../../jctruffet.com/image/image_33/33_Lamothe_Bergeron_4.jpg","../../jctruffet.com/image/image_33/33_Lamothe_Bergeron_5.jpg","../../jctruffet.com/image/image_33/33_Lamothe_Bergeron_6.jpg"]},"Consult_chateau_formulaire1a45":{"id":"Consult_chateau_formulaire1a45","dept":"33","canton":"Cadillac","commune":"Langoiran","nom":"Langoiran","type":"Vestiges","periode":"XIII-XVII","histoire":"A Langoiran les vestiges de la forterresse  et le manoir de Bouliac.                                                                       LANGOIRAN,  fut une forteresse royale sous le règne de Charles VII et de Louis XI. Détruit durant la Fronde en 1650 le château de Langoiran tomba en ruine pour des siècles. la seigneurie de Langoiran a été un des éléments les plus prestigieux et les plus puissants du dûché d'Aquitaine.  Elle a été mêlée aux luttes entre les rois d'Angleterre et de France durant la guerre de cent ans. Construit par Bernard d'Escoussans à la fin du XIIIe siècle, à sa mort le fief passe au XIVe siècle à une fille Mabille, épouse  d'Amanieu d'Albret puis par mariage dans celles des Montferrand. personnages importants, les seigneurs de Langoiran seront chambellan du roi avec Montferrand au XVe siècle, président du parlement de Bordeaux avec Guillaume d'Affis au début du XVIIe siècle ou grand amiral des galères sous Louis XIV, puis aux marquis de Jumilhac. il est acheté en 1972 par M et Mme Bibonne, sur un coup de coeur, ensuite par monsieur Marcel Roumegous. aujourd'hui, grâce à l'association des amis du château, et à l'aide de nombreux bénévoles, la restauration et l'animation du château ont pu commencer rapidement. Classé M.H. en 1889.\r\nBOULIAC  bâtisse constuite entre 1800 et 1810 par Pierre Auguste Rateau, et acquit en 1990 par monsieur Eric Mirieu de Labarre.","architecture":"LANGOIRAN chateau fort a été construit du XIIIe au XVIIe siècle. Il est de style médiéval.  De l'enceinte quadrangulaire est défendue sur des faces ouest et sud par un pic calcaire; au nord un profond fossé, Le château possède un donjon du XIVe siècle qui est l'un des plus large de France de 16 mètres de diamètre bien que découronné montre encore  les  trois salles superposées. Le donjon comprenait trois étages voûtés reliés par un escalier à vis encore existant. Le premier étage faisait huit mètres de haut jusquà la clef de voûte il était pavé de carreaux sur lesquels on pouvait voir les armes des seigneurs dEscoussans, des éléments floraux de formes géométriques. le château aprés l'incendie restauré au XVIIe siècle. Le deuxième étage constituait le logement du seigneur et de sa famille ainsi que de ses invités. Cette salle nétait pas voûtée. Une grosse poutre avec un solivage (chevron) recevait probablement un étage sous toiture ou une terrasse suivant lépoque. À ce niveau, une grande fenêtre gothique trilobée a été aménagée vers la fin du XIVe siècle. À lintérieur, des bancs de pierre. Une cheminée gothique, très belle et assez rare, a été placée à lintérieur dun mur. Au XVIe siècle, comme à létage inférieur une nouvelle cheminée a été édifiée et une grande ouverture percée.                            BOULIAC, la porte à fronton triangulaire, toiture à quatre pans et d'un belvédère est prolongé de chaque côté par des ailes plus basses, une rotonde adoucit la façade.","habitants":"Famille de Bernard d'Escoussans                            Bouliac monsieur Eric Mirieu de Labarre\r\n        \"","divers":"Langoiran   vestiges de la forterresse  et le manoir de Bouliac grav-7                               44° 41' 57\" Nord et 0° 22' 54\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Langoiran_1.jpg","../../jctruffet.com/image/image_33/33_Langoiran_2.jpg","../../jctruffet.com/image/image_33/33_Langoiran_3.jpg","../../jctruffet.com/image/image_33/33_Langoiran_4.jpg","../../jctruffet.com/image/image_33/33_Langoiran_5.jpg","../../jctruffet.com/image/image_33/33_Langoiran_6.jpg","../../jctruffet.com/image/image_33/33_Langoiran_7.jpg"]},"Consult_chateau_formulaire4f04":{"id":"Consult_chateau_formulaire4f04","dept":"33","canton":"Langon","commune":"Langon","nom":"Langon_Respide","type":"Château","periode":"XVII","histoire":"LANGON, le château de Respide bâti à Langon. C'était la propriété de Gabriel Nicolas de La Reynie, en 1670, lieutenant de police du roi Louis XIV. Le domaine de Respide est un des plus vieux château  de l'appellation Graves à Langon. Le peintre Henri de Toulouse-Lautrec (1864-1901) aimait venir y disputer d'interminables parties de billard avec son cousin Louis Pascal dont il fit le portrait à plusieurs reprises. C'est Ernest Pascal, père de Louis, alors préfet de Bordeaux, qui fit édifier le château de Respide actuel, au milieu du XIXe siècle. La famille Rodies en devient propriétaire jusquen 1932 et, a obtenu la médaille d'or au concours de Paris, de 1899.","architecture":"Langon, des ruines de remparts parsèment la ville : trois enceintes successives des XIIe, XIVe et XVe siècles protégèrent la ville des envahisseurs. Elles sont visibles principalement autour du château, au pied du prieuré, en limite du parc de stationnement des Jacobins, à l'emplacement dit de la porte Saint-Martin, et dans le quartier du Marmouret. Entre le bas de la rue André-Bénac et l'escalier menant au jardin situé sous l'esplanade de la mairie, se trouve la double porte du Sault, la dernière subsistant parmi les quinze que comportait la ville. Ces vestiges sont classés depuis 1886. Voir la Réole manoir du prince Noir appelé également logis du parlement, rue de Menuts, est un hôtel Renaissance qui date du début du XVIe siècle. N'ayant toutefois jamais hébergé le prince Noir, Édouard de Woodstock, prince anglais d'Aquitaine, fils aîné d'Henri III, qui vécut de 1330 à 1376, c'était une maison noble de la ville et il abrita cependant, à la fin du XVIIe siècle, le président du parlement de Bordeaux. Dans la cour, une tour octogonale surmontée d'une échauguette abrite un escalier.","habitants":"Gabriel Nicolas de La Reynie                                     Henri de Toulouse-Lautrec \r\n        \"","divers":"manoir de Langon et château de la Respide grav 1","gps":"","images":["../../jctruffet.com/image/image_33/33_Langon_Respide_1.jpg","../../jctruffet.com/image/image_33/33_Langon_Respide_2.jpg","../../jctruffet.com/image/image_33/33_Langon_Respide_3.jpg","../../jctruffet.com/image/image_33/33_Langon_Respide_4.jpg","../../jctruffet.com/image/image_33/33_Langon_Respide_5.jpg"]},"Consult_chateau_formulaire6c4c":{"id":"Consult_chateau_formulaire6c4c","dept":"33","canton":"La Brède","commune":"Martillac","nom":"Lantic_Latour","type":"Manoir","periode":"XVIII","histoire":"A Martillac le château de la Tour du XVIIIe siècle avec son donjon isolé qui orne la cour d'honneur du XIIe siècle, et le château de Rochemorin   qui à appartenu au grand père de Montesquieu Charles Secondat détruit pendant la fronde, il fut restauré par le philosophe                                                                 LANTIC, un vieux manoir qui tient son nom de son premier propriétaire et bâtisseur: le capitaine Lantic. Il fit construire ce manoir 1740 pour sa fille . Il est aujourd'hui encore conservé avec le plus grand soin, dans le respect de son architecture d'origine.  Hôtel de charme de Murielle Ginèbre.                          LATOUR,  Alfred Kressmann, fils aîné dEdouard, finit par acquérir la propriété en 1930. Il en change le nom : pour éviter toute confusion avec son illustre homonyme médocain, château Latour devient château Latour-Martillac.  Aujourdhui, les enfants de Jean Kressmann poursuivent la tradition familiale, avec Tristan et Loïc, les deux fils cadets, qui en assurent la direction générale.","architecture":"LANTIC, onstruit en 1740 et restauré avec passion dans le plus grand respect de la tradition, vous y découvrirez une demeure de charme qui vous transporte dans une ambiance unique. Le corps de logis principal rectangulaire à deux niveaux  avec pavillon central à trois niveaux à toit brisé à la mansard, de grandes dépendances sur le côté gauche","habitants":"capitaine Lantic\r\n        \"","divers":"Château de Lantic et de Latour  à Martillac","gps":"","images":["../../jctruffet.com/image/image_33/33_Lantic_Latour_1.jpg","../../jctruffet.com/image/image_33/33_Lantic_Latour_2.jpg","../../jctruffet.com/image/image_33/33_Lantic_Latour_3.jpg","../../jctruffet.com/image/image_33/33_Lantic_Latour_4.jpg"]},"Consult_chateau_formulaire5f44":{"id":"Consult_chateau_formulaire5f44","dept":"33","canton":"Lacanau","commune":"Soussens","nom":"Larigaudière","type":"Château","periode":"XVII-XIX","histoire":"LARIGAUDIERE, le domaine est mentionné dans l'édition de 1868 de l'ouvrage de Cocks, appartenant à M. Basse et produisant 20 à 25 tonneaux. Il est illustré dans l'édition de 1874 et également mentionné dans l'ouvrage \"La Vigne\" de Bertall publié en 1878. \r\nDans l'entre deux guerres et après la seconde guerre mondiale, le domaine est en mauvais état. Il est repris en 1964 par Ghislaine de Moor et Émile de Schepper. Entre 1979 et 1983,  remplaçant les bâtiments du XIXe siècle. En 1980, un restaurant est installé dans le château et fonctionne jusqu'en 2001, date à laquelle des bureaux y sont aménagés. A partir de 1993, de nouveaux travaux et de nouvelles transformations sont réalisés  réaménagement de logements.","architecture":"LARIGAUDIERE, les bâtiments forment une cour à l'arrière du château. Ce dernier semble toutefois dater du XIXe siècle, une grille et une allée de platanes donnent accès au château, composé d'un corps central à étage carré et cinq travées, encadré de deux ailes en rez-de-chaussée de trois travées chacune. Le corps central est couronné d'une rambarde d'attique, ornée d'entrelacs et de motifs de vigne, les ailes présentent également une rambarde d'attique mais sans ornement. Le rez-de-chaussée est enduit et percé de baies aux chambranles moulurés, la porte est ornée d'une agrafe sculptée, ce niveau est séparé de l'étage en pierre de taille par un bandeau continu mouluré, la travée centrale se distingue, encadrée de pilastres sculptés et percée d'une porte-fenêtre dotée d'un balconnet à garde-corps métallique et d'une agrafe ornée, les encadrements des baies présentent des motifs de tables se croisant dans les angles supérieurs. Une corniche moulurée est soutenue par des modillons galbés. La façade postérieure est traitée plus sobrement, on retrouve toutefois une rambarde d'attique avec des extrémités traitées en volutes, une corniche à modillons et une porte en plein-cintre. D'autres bâtiments sont utilisés pour le conditionnement et les expéditions.","habitants":"Famille de  M. Basse\r\n        \"","divers":"Château de Larigaudière à Soussens","gps":"","images":["../../jctruffet.com/image/image_33/33_Larigaudi%c3%a8re_1.jpg"]},"Consult_chateau_formulairee99e":{"id":"Consult_chateau_formulairee99e","dept":"33","canton":"Castillon la Bataille","commune":"Saint-Emilion","nom":"Laroque_33","type":"Château","periode":"XII-","histoire":"LAROQUE, après le décès  de Arnaud de Lavie,  le domaine passe ensuite en 1735 à Jean-Charles de Lavie (1694-1775), conseiller du roi et premier président du parlement de Bordeaux de 1735 à 1757 et acheteur de la maison noble de Saint-Genés, vers 1734. En 1775, le domaine est hérité par Paul-Marie-Arnaud de Lavie (1747-1801), marquis du Bourdeix, comte de Belhade, baron de Nontron et président à mortier au parlement de Bordeaux de 1768 à 1789, né du second mariage de Jean-Charles de Lavie avec Bernardine Arnauld de Pomponne en 1740. C' est un domaine prestigieux jusquau XIXe siècle, son gendre, Germain du Faure de Rochefort qui a épousé une des filles de Paul-Marie Arnaud de Lavie, Marie Gabrielle de Lavie (1773-1855). L'autre fille du marquis, Henriette-Georgine (1789-1855) épouse le marquis Charles de Bryas (1785-1866), maire de Bordeaux et député de la Gironde, et lui apporte le château du Taillan en dot. Mais au gré de diverses infortunes, il tombe en désuétude. Il faut attendre 1935 et lachat du domaine par la famille Beaumartin pour qu'il retrouve son lustre dantan. En 1962, lactivité est redevenue florissante.","architecture":"LAROQUE, remonte au XIIe siècle. Il est construit sur un site dominant comme résidence seigneuriale. A cet époque un château fort garde ces terres. Il en subsiste aujourdhui la tour ronde, le reste du château ayant été détruit lors de sa reconstruction en 1750. le château Laroque, surnommé le « Versailles de Saint-Emillion », trône comme dans un écrin. Pourtant, derrière une architecture classique il cache une histoire bien plus ancienne. Le château présente une façade classique, à deux niveaux en partie centrale un avant corps de trois travées  saillantes avec fronton face à un parc paysagé et un portail majestueux. L'édifice est accolé sur  l 'angle d'une grosse tour ronde à trois niveaux à mâchicoulis et chemin de ronde .Il nen fallait pas moins pour faire le rapprochement avec Versailles. Le château fait partie du périmètre classé au patrimoine de lUnesco.","habitants":"Famille de  Jean-Charles de Lavie\r\n        \"","divers":"Château Laroque à Saint-Emilion","gps":"","images":["../../jctruffet.com/image/image_33/33_Laroque_33_1.jpg","../../jctruffet.com/image/image_33/33_Laroque_33_2.jpg"]},"Consult_chateau_formulaire7514":{"id":"Consult_chateau_formulaire7514","dept":"33","canton":"Lesparre-Médoc","commune":"Arcins","nom":"Larose_Trintaudon","type":"Château","periode":"XVIIII-XIX","histoire":"LAROSE-TRINTAUDON  en 1719 Jean-Pierre du Pontet devient propriétaire de  Perganson.  Entre 1815-1817, Henry Delaroze. En 1858-1859, le comte Ernest de Lahens entre en possession du domaine et, en 1884, fait construire à portée de regard du château de Perganson En 1872 il agrandit son domaine par lincorporation de la propriété du plateau couvrant désormais une superficie de 345 hectares. En 1923, le comte Tchernoff, « russe blanc » émigré, porte le coup de grâce au domaine. Ce « gentleman-farmer » extravagant (ayant épousé une riche américaine appartenant à la famille de la banque Morgan, menait un grand train de vie, et roulait, dit-on, en Rolls. En 1963, après avoir été propriété dun « Grand dEspagne », général de larmée espagnole, le duc Del Infantado, le domaine Trintaudon est acquis dans un état de quasi-abandon par la famille Forner. En 1986, Allianz entre en possession du domaine, en 1994, en liaison avec leur filiale chilienne dassurances, les AGF sassocient avec le château Larose-Trintaudon. En 2007, le château Larose Trintaudon est vendu à Arcins.","architecture":"le château de Larose-Trintaudon tel quon peut le découvrir aujourdhui dans son écrin de verdure, surmonté de sa tour si particulière qui domine alentour, tel un phare, un océan de vignes. le domaine Trintaudon est acquis dans un état de quasi-abandon par la famille Forner. Au terme dune restauration de longue haleine (restructuration du vignoble, équipement des chais, remise en état du château dans le style bourgeois flamboyant), il redémarre et va retrouver son lustre dantan. deux corps de logis accolés de plan rectangulaire à trois niveaux et lucarnes surtoit brisés accolé au centre d'un donjon carré avec fenêtres trilobés, terrasse et tour de guet avec toit en coupoles.","habitants":"Comte Tchernoff                                                         Duc Del Infantado\r\n        \"","divers":"Château de Larose-Trintaudon","gps":"","images":["../../jctruffet.com/image/image_33/33_Larose_Trintaudon_1.jpg","../../jctruffet.com/image/image_33/33_Larose_Trintaudon_2.jpg","../../jctruffet.com/image/image_33/33_Larose_Trintaudon_3.jpg"]},"Consult_chateau_formulaire4957":{"id":"Consult_chateau_formulaire4957","dept":"33","canton":"Pineuilh","commune":"La Réole","nom":"Laréole_Gironde","type":"Vestiges-Château","periode":"XIV","histoire":"La Réole, vestiges du château des 4 Sos avec remparts, Briet hôtel de ville ancienne et nouvelle, la Bûche chambres d'hôtes de la famille Ledru et manoir de Lestours du XVe siècle.                                             QUAT' SOS dit des quatre soeurs, bâti à La Réole, En 1224, les Réolais obtiennent de Louis VIII de France (1187-1226) le droit d'édifier une forteresse, qui est achevé par Henri III d'Angleterre, alors duc d'Aquitaine, pour défendre la Guyenne anglaise.  Sera disputé entre soldats anglais et français au cours  de la guerre de cent ans (1337-1453). L'un des sièges les mieux connus du château des Quat'Sos est raconté dans Les rois maudits, la fameuse fresque historique de Maurice Druon. À la fin de l'été 1324, pour la cinquième fois, les armées françaises assiègent le château. Elles y expérimentent une nouvelle arme, les « bouches à feu ». La forteresse, de même que le prieuré et les autres richesses de la ville, redeviendra la propriété des rois de France à la fin de cette guerre, après la victoire définitive des Français à Castillon-la-Bataille en 1453.                                                 BRIET,  la construction en date du XVIIe siècle, la date de 1662 étant gravée au-dessus de la porte d'entrée. Le fronton en est orné d'un soleil qui évoque le nom du propriétaire, monsieur de Briet.                              L'ancien hôtel de ville ou « vieille halle », entre la place du Loup et la place des Martyrs-de-la-Résistance, dont la construction serait due à Richard Cur-de-Lion (1157-1199) a subi de nombreux remaniements au cours des siècles, chapiteaux romans, balcon gothique flamboyant, fenêtres Renaissance à meneaux. Les douze magistrats de la ville tenaient leurs assemblées dans la vaste salle du premier étage. Le rez-de-chaussée était une halle aux grains. Le bâtiment a été classé M.H. en 1913.","architecture":"Des quatre surs initiales, il n'en reste que trois dont celle, imposante, du sud-ouest dite « la Thomasse », dédiée par les Anglais à saint Thomas, dominant le cours de la Garonne d'une trentaine de mètres. Une cinquième tour, dite du portal est mentionnée dans un inventaire de 1561. La double enceinte fortifiée a été conservée au sud. C'est là que le château a le mieux gardé son allure de forteresse du Moyen Âge. La façade méridionale a été percée de fenêtres et d'une galerie au XVIIe siècle, époque à partir de laquelle le château a perdu sa fonction défensive, sur les directives de Richelieu. Il a perdu aussi une partie de ses murailles, celles qui se trouvaient sur lemplacement des jardins actuels, vers le nord-ouest, et qui protégeaient lentrée du château depuis la ville. Le château fait l'objet d'une inscription globale au titre des M.H.  par arrêté du 9 novembre 1960 : la « Thomasse », la tour Sud-Est, la tour Nord-Ouest, les courtines les joignant avec les toitures qui les protègent.                                                                    BRIET, la construction en date du XVIIe siècle, La grille qui ferme la cour est l'uvre de Blaise Charlut, tout comme les balcons incurvés du premier étage. L'édifice est inscrit au titre des M.H.par arrêté du 16 juin 1965 en totalité. Le prieuré, dont les bâtiments dans leur forme actuelle datent du XVIIIe siècle a fait l'objet d'une inscription en tant que monument historique en 1925. La porte du cloître, le balcon de l'escalier et ses rampes sont l'uvre du ferronnier Blaise Charlut (Blaise Hercule Dominique Charlut, né à Pauillac en 1715  guillotiné à Paris en 1792, ferronnier d'art réolais).","habitants":"Seigneurs locaux\r\n        \"","divers":"La Réole, vestiges du château des 4 Sos avec rempart sgrav 1 à 6, Briet grav-7  hôtel de ville ancienne et nouvelle","gps":"","images":["../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_1.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_2.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_3.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_4.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_5.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_6.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_7.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_8.jpg","../../jctruffet.com/image/image_33/33_Lar%c3%a9ole_Gironde_9.jpg"]},"Consult_chateau_formulaire9e96":{"id":"Consult_chateau_formulaire9e96","dept":"33","canton":"Lacanau","commune":"Margaux","nom":"Lascombes","type":"Château","periode":"XVIII","histoire":"LASCOMBES, situés sur la plus haute colline de Margaux étaient possession de la maison de Durfort de Duras Le plus ancien propriétaire connu est le chevalier Antoine de Lascombes, né en 1625. En 1750, propriété de Jean-François de Lascombes de Chaumont.  Vers 1780, la construction du château commence. Après la mort de Jean-François de Lascombes de Chaumont, un peu avant la Révolution, sa sur Marie vend le domaine à un Bordelais d'origine écossaise, Nathaniel Johnston, qui le revend rapidement à un nommé Fabre. Le domaine est acquis par Loraigue. Ses héritiers le vendent, en 1844, à l'une des filles de Léonor Antoine, comte de Blagny Hüé. En 1867, le domaine est vendu à Gustave Louis Chaix d'Est-Ange (1800-1876), bâtonnier du barreau de Paris, mais à sa mort en 1923 met un terme à ce projet. Son fils adoptif, le comte Emmanuel du Bourg de Bozas, revend la propriété du château au marquis d'Alesme Becker à la compagnie écossaise W. H. Chaplin et Co Ltd de Glasgow. En 1952, les parts sont cédées à Alexis Lichine qui relancera le château et s'en occupera entre 1952 et 1971, date à laquelle le château Lascombes est vendu au groupe anglais Bass-Charrington, déjà propriétaire de la maison de négoce Lichine & Cie.  En avril 2001, le groupe américain Colony Capital et ses investisseurs associés prennent possession du château Lascombes. En juillet 2011, le château est racheté par la mutuelle d'assurances du corps de santé français (MACSF).","architecture":"LESCOMBES, de plan rectangulaire à deux niveaux et série de lucarnes sur un toit à deux pans avancée centrale d'un pavillon accolé d'une tour héxagonale à mâchicoulis et a toit à six pans en poivrières une terrasse est accolée à cet ensemble.","habitants":"chevalier Antoine de Lascombes,\r\n        \"","divers":"Château de Lascombes à Margaux","gps":"","images":["../../jctruffet.com/image/image_33/33_Lascombes_1.jpg","../../jctruffet.com/image/image_33/33_Lascombes_2.jpg","../../jctruffet.com/image/image_33/33_Lascombes_3.jpg","../../jctruffet.com/image/image_33/33_Lascombes_4.jpg"]},"Consult_chateau_formulairead2e":{"id":"Consult_chateau_formulairead2e","dept":"33","canton":"Pineuilh","commune":"Saint-Martin du Puy","nom":"Latour_Laguens","type":"Forteresse","periode":"XVIII","histoire":"LATOUR, \"Longhai international trading Co Ltd\",  un groupe immobilier  est devenu officiellement propriétaire  du château Latour-Laguens Le château, qui appartenait à Serge Laguens, est situé à Saint-Martin-du-Puy dans l'Entre-deux-Mers. Ils veulent rénover le château, aménager des chambres, en faire leur ambassade dans le Bordelais. Pour le groupe Longhai, dont le siège social est à Qingdao, entre Pékin et Shanghai, ce château bordelais est \"un outil fantastique\" alors qu'il est \"en train de construire un Palais  à Qingdao, avec un musée.","architecture":"Latour est une forteresse quadrilatère se justifie par sa tour carrée à trois niveaux à mâchicoulis, terrasse flanqué sur ses angles de trois échaugettes en encorbellement et crénelées et une tourelle hexagonale partant de la base du toit en coupole avec clocheton. Cette tour  est accolé à deux bâtiments celui de gauche à deux niveaux lui même accolé d'une tour ronde à trois niveaux à l'angle avec toit en poivrière, retour en équerre des bâtiments à deux niveaux avec tours rondes sur les angles.","habitants":"Serge Laguens\r\n        \"","divers":"Château de Latour à Laguens","gps":"","images":["../../jctruffet.com/image/image_33/33_Latour_Laguens_1.jpg","../../jctruffet.com/image/image_33/33_Latour_Laguens_2.jpg","../../jctruffet.com/image/image_33/33_Latour_Laguens_3.jpg","../../jctruffet.com/image/image_33/33_Latour_Laguens_4.jpg","../../jctruffet.com/image/image_33/33_Latour_Laguens_5.jpg","../../jctruffet.com/image/image_33/33_Latour_Laguens_6.jpg"]},"Consult_chateau_formulaire2320":{"id":"Consult_chateau_formulaire2320","dept":"33","canton":"Créon","commune":"Latresne","nom":"Latresne","type":"Château","periode":"XIII-XIV-XVI","histoire":"Plusieurs châteaux à Latresne dont celui de Latresne, de Malherbes, de Coulon-Lorensac, et de Valrose       LATRESNE, dès le XIIIe siècle les seigneurs de Latresne, qui portaient le titre original de captal, étaient puissants et possédaient un château fort situé  au Castera, au débouché de la Pimpine. Tenu longtemps par de grandes familles, parmi lesquelles les Grailly et les Foix, la seigneurie passa au milieu du XVIe siècle à une famille de parlementaires, les Le Compte, qui obtinrent au début du XVIIIe siècle le titre de marquis. Cest eux qui construisirent le château actuel, situé en haut de la colline. Il est, pour lessentiel, du XVIIe siècle, mais a été fortement remanié, notamment au XIXe siècle par le comte de Bonneval.                      PASCTOT  est un domaine, travaillé avec passion par Nicole et Frédéric Doermann. Cest en 1990 que ce couple denseignants a le coup de foudre pour ce petit domaine et quil décide de lacheter.          MALHERBES, il est construit à la fin du XIVe siècle par Guilhem de Malherbes, chevalier  La présence d'une maison noble est attestée depuis le XVIe siècle. L'ensemble est situé au coeur d'un parc.  Le domaine de Malherbes a aussi une activité de tourisme avec son gîte et ses salles pour séminaires et réceptions proposés à la location.\r\nCOULON LORENSAC, le château était un centre de formation aéronautique rattaché au ministère de la défense depuis 1946. Depuis 2011, il est la propriété du conseil régional et abrite lAérocampus Aquitaine,  gîtes de france par la famille de Pens et de Ronald.     VALROSE, la chartreuse de Valrose, construite au XVIIIe siècle en bordure de la Garonne à Latresne, elle vient dêtre vendue.","architecture":"LATRESNE,  adopte un plan classique en U, délimitant une cour rectangulaire, dont le quatrième côté était autrefois fermé par une grille. A lextrémité des deux ailes se dressent deux pavillons carrés à haute toiture dardoise.  La façade ouest, tournée vers la Garonne, dispose dune grande terrasse qui domine le vaste parc agrémenté de plans deau et darbres de multiples essences                                                                         MALHEREBES,   construction  du XIVe -XVIIe au XIXe siècle. Il est construit à la fin du XIVe siècle . Le logis a été reconstruit au XIXe siècle dans un genre rappelant le XVIe siècle. Les communs sont antérieurs avec des parties du XVIIe siècle et la majorité construite au XVIIIe siècle.                                                                  COULON-Laurensac, le château adopte un plan classique en U, délimitant une cour rectangulaire, dont le quatrième côté était autrefois fermé par une grille. A lextrémité des deux ailes se dressent deux pavillons carrés à haute toiture dardoise.  La façade ouest, tournée vers la Garonne, dispose dune grande terrasse qui domine le vaste parc agrémenté de plans deau et darbres de multiples essences. \r\n VALROSE appelée la Chartreuse de Valrose est bâtie à Latresne,  c'était la maison de campagne de notables bordelais, au XVIIIe siècle, située en bordure de la Garonne. La demeure de Valrose est inscrite aux M.H. depuis le 12/08/1992.","habitants":"Comte de Bonneval                                                 Chevalie Guilhem de Malherbes                              Coulon Famille de Pens \r\n        \"","divers":"A Latresne dont celui de Latresne, de Malherbes, de Coulon-Lorensac grav 6 et de Valrose -9. De Pascot g-8   Latrenes  : 44° 47' 09\" Nord, 0° 29' 43\" Ouest .        Malherbes 44° 48' 00\" Nord 0° 29' 39\" Ouest Valrose  : 44° 47' 09\" Nord, 0° 29' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Latresne_1.jpg","../../jctruffet.com/image/image_33/33_Latresne_2.jpg","../../jctruffet.com/image/image_33/33_Latresne_3.jpg","../../jctruffet.com/image/image_33/33_Latresne_4.jpg","../../jctruffet.com/image/image_33/33_Latresne_5.jpg","../../jctruffet.com/image/image_33/33_Latresne_6.jpg","../../jctruffet.com/image/image_33/33_Latresne_7.jpg","../../jctruffet.com/image/image_33/33_Latresne_8.jpg","../../jctruffet.com/image/image_33/33_Latresne_9.jpg"]},"Consult_chateau_formulaire75dc":{"id":"Consult_chateau_formulaire75dc","dept":"33","canton":"Cenon","commune":"Bouliac","nom":"Lavergne","type":"Château","periode":"XVIII","histoire":"LAVERGNE, la famille Vigneras a compté de nombreux parlementaires, en 1716, Jean de Vigneras était conseiller au parlement, ses petits-fils, les frères J.-B. et J.-B. de Vigneras étaient avocats au parlement  et  E. Guillon,  Bouliac faisait partie de la Sénéchaussée de Bordeaux. A la fin du XVIIIe siècle, la propriété était indivise entre les familles Vigneras, Lavergne et Bompar. Ses ruines se trouvent maintenant dans l'enceinte.  Il fit appel à A. Thiac (1800-1865) pour édifier le château actuel ; la construction fut achevée vers 1858, puisqu'elle devint imposable en 1861. La matrice cadastrale de Bouliac énumère les propriétaires successifs du domaine, le dernier héritier le vendit en 1854 à J. Mangoaga qui s'installa à Bouliac. A ce moment, la famille Harancheguy, de Biarritz, acheta le domaine et il demanda à l'architecte M.-L. Garros (1833-1911) de bâtir une tour octogonale sur la façade sud, elle est achevée en 1862, ensuite le domaine passe à J. Hue qui fit construire un bâtiment rural, puis à la famille Sens en 1882, enfin à Ernest Lacombe, architecte,  réquisitionné par la marine allemande pendant la seconde guerre mondiale, il a été détruit lors du départ des troupes de Bordeaux, en 1944.","architecture":"Lavergne, un édifice carré, d'environ cinquante-cinq mètres de côté, à quatre corps de bâtiment entourant une cour. E. Guillon le décrit ainsi : \"c'était une vieille construction, entourée de charmilles au milieu d'un parc clos de murailles\". Il fit modifier les toitures en déplaçant les lucarnes. Il existait un pigeonnier octogonal entre les deux aîles de bâtiments d'exploitation  écuries garnies de superbes coursiers.","habitants":"Famille Vigneras\r\n        \"","divers":"Château de Lavergne à Bouliac","gps":"","images":["../../jctruffet.com/image/image_33/33_Lavergne_1.jpg","../../jctruffet.com/image/image_33/33_Lavergne_2.jpg","../../jctruffet.com/image/image_33/33_Lavergne_3.jpg","../../jctruffet.com/image/image_33/33_Lavergne_4.jpg"]},"Consult_chateau_formulaire4d54":{"id":"Consult_chateau_formulaire4d54","dept":"33","canton":"Eysines","commune":"Eysines","nom":"Lescombes","type":"Château","periode":"XVII","histoire":"LESCOMBES, du XVIIe siècle, l'ancien château nommé château de la Plane faisait partie de la seigneurie de la Plane qui comportait, outre le château, un domaine rural et une forêt aménagé par les Feuillants. Il a appartenu à une riche famille de propriétaires bordelais, qui ont une rue à Bordeaux. Le seigneur Gratian Mullet. Ils firent restaurer le château après son incendie. Leur blason est visible au-dessus de la porte d'entrée. Les Tierçon de la Plane  le blason ainsi que l'escalier sont les seuls vestiges visibles de cette époque. C'est en 1724 que la famille Duret, dont la filiation remonte à Benjamin Duret, bourgeois de Bordeaux et négociant, acquiert la maison noble de la Plane. La famille Faure, dernier propriétaire du domaine, le vende  à la ville dEysines en 1989. Le château Lescombes est inscrit aux M.H. depuis 1992.","architecture":"Lescombes, le bâtiment est flanqué de quatre tours d'angle à toit en poivrière recouvert d'ardoises.  Cette maison noble fut agrandie une première fois en 1537 puis par les Feuillants. D'après le cadastre de 1811, l'édifice formait un quadrilatère délimitant une cour intérieure.  Le hangar, accolé à l'ancien mur du château, abrite l'outillage lourd, les charrettes et le harnachement faisant partie de l'écomusée du maraîchage. À proximité, le pigeonnier-puits est une tour cylindrique recouverte d'un dôme de pierre où est exposée une collection d'outils maraîchers de cet écomusée.","habitants":"seigneur Gratian Mullet.\r\n        \"","divers":"Château de Lescombes à Eysines","gps":"","images":["../../jctruffet.com/image/image_33/33_Lescombes_1.jpg","../../jctruffet.com/image/image_33/33_Lescombes_2.jpg","../../jctruffet.com/image/image_33/33_Lescombes_3.jpg","../../jctruffet.com/image/image_33/33_Lescombes_4.jpg","../../jctruffet.com/image/image_33/33_Lescombes_5.jpg","../../jctruffet.com/image/image_33/33_Lescombes_6.jpg"]},"Consult_chateau_formulairea258":{"id":"Consult_chateau_formulairea258","dept":"33","canton":"Lesparre-Médoc","commune":"Lesparre-Médoc","nom":"Lesparre_Médoc","type":"Vestiges","periode":"XIII","histoire":"Trois châteaux à Lesparre dont la Tour de l'Honneur, d'Escot  ert de Vernous                                              LESPARRE,  dit la Tour de l'honneur d'anciens documents mentionnant un « castello quid dicitur Sparra » au XIIe siècle. Par le mariage d'Aliénor d'Aquitaine avec Henri Plantagenêt, le château entre dans le giron anglo-gascon pour près de trois siècles, jusqu'en 1453. Au Moyen-Âge, les sires de Lesparre commandent une grande partie du Médoc. Le château est fréquenté par de grands noms de la langue d'oc, tels les célèbres troubadours Aimeric de Belenoi et Pey de Corbian. Certains seigneurs du lieu se font une réputation, tel que Florimont de Lesparre, parti guerroyer en terre sainte, qui va jusqu'à provoquer en duel à Pierre de Lusignan, roi de Chypre.  La forteresse passe ensuite aux mains des familles de Madaillan, d'Albret, de Foix, de Clèves, de Matignon, d'Épernon et de Gramont, avant d'être vendue comme bien national durant la Révolution et d'être presque entièrement démantelée peu après. La Tour de l'Honneur fait lobjet dun classement aux M.H.depuis le 10/09/1913. \r\nESCOT, en qualité  de fils du propriétaire du château Fournier Jacques  durant les années 1950 à 1956 ou j'ai vécu durant cette période en ce lieu j'ai en 1954 et 1955 e été interne à l'école                                        VERNOUS,  à la révolution de 1830, ce château était surtout un rendez-vous de chasse, il appartenait à M. R. Bernard. Jusqu'à la dernière guerre de 1939, grâce en particulier à l'excellent régisseur M. Eysson, le domaine appartenait alors à la très riche famille bordelaise des huileries Maurel et Prom.   Racheté en 1949 par la famille Roger puis par M. Ducourt en 1976, il fut revendu en 1990 à la société des champagnes Deutz puis en 1998 à la société château. En Bordeaux. En 2013, après la mise en place d'un plan de développement stratégique impulsé par Pierre Jean Larraqué,","architecture":"ESCOT, corps de logis rectangulaire à deux niveaux  toit à deux pans légères pentes insérés entre quatre tours hors oeuvres trois carrées et une ronde à trois niveaux l'ensemble recouvert d'ardoises.              VERNOUS, pendant la guerre, il fut occupé par les Allemands et en parti laissé à l'abandon. de plan carré comme soubassement supportant une construction carrée d'un niveau toit en croupe recouvert de tuiles.  La TOUR de l'Honneur est l'unique vestige des sires de Lesparre connu, autrefois, sous le nom du  château de l'Honneur de Lesparre, d'où le nom de la Tour de l'Honneur, pièce maîtresse d'un ensemble défensif constitué de quatre tours au temps de sa splendeur, elle date du XIVe siècle. Par extension, la seule tour subsistante a pris le nom de « Tour de l'Honneur » qu'elle conserve aujourd'hui. Construite en 1320, haute de près de 30 mètres, elle est composée de 5 niveaux : un rez-de-chaussée couvert de croisées d'ogives et quatre salles voûtées. La plate-forme sommitale conserve une ligne de mâchicoulis et une tourelle d'angle en encorbellement. De nos jours, la Tour de l'Honneur abrite un musée consacré à l'histoire locale, à l'artisanat et aux traditions médocaines. A deux km de Lesparre au nord à Gaillan en médoc le château Beau-Jardin est devenu un hôtel.","habitants":"Sires de Lesparre                                                           Escot  Famille de Fournier                                 Vernous  M. R. Bernard\r\n        \"","divers":"Lesparre lke château d'Escot grav 7 à 9,la tour de Honneur et Vernous grav-6.   45° 18' 26,16\" Nord et 0° 56' 35,96\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_6.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_7.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_8.jpg","../../jctruffet.com/image/image_33/33_Lesparre_M%c3%a9doc_9.jpg"]},"Consult_chateau_formulaire61f7":{"id":"Consult_chateau_formulaire61f7","dept":"33","canton":"Libourne","commune":"Libourne","nom":"Libourne","type":"Patrimoine","periode":"XII-XV","histoire":"Plusieurs châteaux à Libourne celui de Grace Franc Dieu, de Bonzac, de Fressac de Richelieu, de Porchères de Pintey et de Pilet.                                  LIBOURNE, Louis XI confirma encore ses privilèges par les lettres patentes en octobre 1461 ainsi qu'en juin 1472 à la suite de la mort du duc Guyenne, son frère. Libourne est touchée par la révolte des pitauds en 1548 . La révolte éclate près dAngoulême, et Libourne est prise par les révoltés pendant lété. Lors des guerres de la Fronde (1648 à 1652), Bernard de Nogaret de La Valette, duc d'Épernon gouverneur de Guyenne, fit fortifier Libourne dans le but daffaiblir Bordeaux dont les échanges dépendaient de deux fleuves, la Garonne mais aussi la Dordogne. La ville est à nouveau assiégée par les troupes françaises en 1652. Le commerce du port de Libourne, de même que celui de Bordeaux, eut à souffrir du blocus continental opéré lors de la guerre de la Ligue dAugsbourg (1688-1697) par les Puissances maritimes (Angleterre, Provinces-Unies, Empire et Espagne). Après la révocation de l'édit de Nantes (1685), la « diaspora » des protestants a renoué des liens commerciaux privilégiés, ainsi entre Bergerac et la Hollande. À lépoque de Tourny, intendant de Guyenne au milieu du XVIIIe siècle, Libourne se dota dallées, de fontaines, de lavoirs et améliora ses quais et ses ports.\r\nLa PORTE du Port, en 1330, sous l'impulsion du roi d'Angleterre Edouard III, la porte du grand port est construite.\r\nPINTEY bâti à Libourne, date du XVIIIe siècle, Le château du Pilet est inscrit aux M.H. depuis 1974.","architecture":"La PORTE du Port et ses deux tours et remparts du 1er siècle, le village portuaire Romain se nomme : Condatis. Au début du Moyen-Âge, le village se nomme : Fozera. Au XIIIe siècle, le Roi  d'Angleterre et duc d'Aquitaine Edouard Ier ordonne la construction d'une fortification entourant la ville se nommant : Leybornia.   Avec le commerce fluvial, la ville prospère. Après 1453 (fin de la guerre de Cent Ans), la ville s'appauvrit. Au XVIIe siècle, la tour Richard est coiffée d'une imposante toiture.  Vers 1794, la municipalité révolutionnaire ordonne la destruction des remparts et des portes fortifiées. La porte du grand port échappe à ce massacre architectural, à l'origine bastide anglaise du XIIIe siècle compte également sur un patrimoine monumental varié : pont de pierre, église Saint Jean-Baptiste, tour du Grand Port, hôtel de ville, immeubles à arcades de la place Royale, témoignent ainsi de la prospérité de la ville au cours des siècles. La Porte du Port est classée aux M.H. depuis 1921.                   TOURS,  bâti à Montagne,  date du XIVe siècle. Dans ce temps il avait trois tours dont une, polygonale et intérieure était le donjon, et les autres, circulaires, flanquaient un bâtiment oblong aux angles est et ouest de sa face sud ; puis, aux mêmes angle","habitants":"Duc d'Aquitaine Edouard Ier\r\n        \"","divers":"Plusieurs châteaux à Libourne celui de Grace Franc Dieu g-8, de Bonzac grav 4, de Fressac g-5 de Richelieu g-6, de porchères de Pintey et de Pilet les Landede Fronsac g-6","gps":"","images":["../../jctruffet.com/image/image_33/33_Libourne_1.jpg","../../jctruffet.com/image/image_33/33_Libourne_2.jpg","../../jctruffet.com/image/image_33/33_Libourne_3.jpg","../../jctruffet.com/image/image_33/33_Libourne_4.jpg","../../jctruffet.com/image/image_33/33_Libourne_5.jpg","../../jctruffet.com/image/image_33/33_Libourne_6.jpg","../../jctruffet.com/image/image_33/33_Libourne_7.jpg","../../jctruffet.com/image/image_33/33_Libourne_8.jpg"]},"Consult_chateau_formulaire1c81":{"id":"Consult_chateau_formulaire1c81","dept":"33","canton":"Listrac-Médoc","commune":"Listrac-Médoc","nom":"Listrac_Médoc","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux à Listrac dont celui de Lalande,  de Listrac , de Lestage et de Fonreaud.                              FONREAUD, de la fin du XVIIIe siècle et le début du XIXe siècle,  le château actuel, situé sur le point culminant du Médoc, le puy de Menjon, construit sur les plans de larchitecte Louis Garros. Fin 1962,  Nous devons à la famille Leblanc de Mauvezin la construction des chais au XVIIe siècle et plus tard lédification du château à larchitecture remarquable, dans les années 1850. Léo Chanfreau, séduit par les lieux, achète le domaine et décide de sy installer avec sa famille. Aujourdhui, Jean et Marie-Hélène Chanfreau poursuivent son uvre avec laide de leurs deux fils, Guillaume et Loïc. \r\nLESTAGE, construit sous le Second Empire, le nom « Lestage » serait le nom de la famille qui possédait les terres au XVe siècle. Le domaine sest surtout développé au XIXe siècle grâce à la famille Saint-Guirons qui est restée propriétaire jusquen 1925. Elle détenait aussi le château Clarke, voisin de Lestage, et le château Grand-Puy Lacoste. Très dynamiques, les Saint Guirons étendirent le domaine. En 1870, ils firent construire le château dont larchitecture est caractéristique de lépoque Napoléon III.\r\nPar la suite, plusieurs familles se succédèrent à travers les périodes de guerre et de crises jusquà larrivée  de Marcel Chanfreau, qui acquit le domaine en 1963. Ses petits-enfants assurent aujourd'hui la continuité familiale. Le château Lestage est une des propriétés familiales de la famille Chanfreau depuis 50 ans. \r\nLISTRAC, construit à la fin du XIXe siècle.","architecture":"Fonreaud, ce médoc de style classique, rond et racé, est largement reconnu par ses pairs, le château a remplacé le corps de ferme originel, lorsquen 1850, Henri Le Blanc de Mauvezin, alors propriétaire, décida de sa construction. Achevé en 1855, le château, construit sur les plans de larchitecte bordelais Garros, vous séduira par son architecture dune grande élégance.Acheté en 1962 par Léo Chanfreau, le domaine est toujours exploité aujourdhui par la famille, Jean, Marie-Hélène et Caroline poursuivant les efforts entrepris et assurant la modernisation du château.\r\nle château Lestage, magnifique bâtisse Napoléon III, construite en 1870 sur les plans de larchitecte Minvielle.","habitants":"Famille de Chanfreau                                              Famille de Lestage\r\n        \"","divers":"Quatre châteaux à Listrac dont celui de Lalande g-4,  de Listrac , de Lestage et de Fonreaud de 1 à 3.","gps":"","images":["../../jctruffet.com/image/image_33/33_Listrac_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_Listrac_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_Listrac_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_Listrac_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_Listrac_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_Listrac_M%c3%a9doc_6.jpg"]},"Consult_chateau_formulaire65ea":{"id":"Consult_chateau_formulaire65ea","dept":"33","canton":"Lormont","commune":"Lormont","nom":"Lormont","type":"Forteresse","periode":"XI-XIX","histoire":"LORMONT dit du Prince Noir appelé aussi le château de Lormont ou château des Archevêques , construit vers 1060, Aliénor dAquitaine y aurait séjourné, lors de son mariage avec le roi de France Louis VII. Le prince dAquitaine dit le prince Noir y résida. Les archevêques de Bordeaux lont possédé au XIVe siècle. En 1453, les négociations pour obtenir la fin de la guerre de cent ans sy seraient déroulées. Détruit puis reconstruit, en 1626 par l'architecte Henri Roche pour le cardinal François d'Escoubleau de Sourdis puis pour son frère Henri d'Escoubleau de Sourdis, le château du prince noir devint une propriété nationale, en 1789. Aujourdhui devenu une propriété privée,après une importante rénovation, abrite dans ses murs, des bureaux. Dans le parc, un restaurant propose chaque jour de profiter de la vue sur le château. En 2005, le promoteur Norbert Fradin rachète la propriété et y engage d'importants travaux de rénovation. En 2017, le château devient l'école de théâtre française des cours Florent, qui ouvre une antenne sur la région de Bordeaux, sous la direction de Christophe Lorcat. Des travaux sont à nouveau effectués afin de transformer les pièces du château en salles de classe aptes à recevoir la pratique théâtrale. Le château de Lormont est inscrit, en partie aux M.H. depuis 1925.","architecture":"Lormont, construit vers 1060,  manoir de style féodal  à trois niveaux  avec un corps de logis sur l'arrière toit en croupe une partie intermédière en avant corps de deux travées à deux niveaux et attiques à crénaux support d'un balcon par des colonnes   et la troisième partie  sorte de donjon à trois niveaux à créneaux et mâchicoulis toits en terrasse sur les angles de la façade avant deux tours hexagonnales sur les angles  avec créneaux et mâchicoulis à la bases sur  arcades  et support du premier étage par des colonnes. Le château de Lormont  aujourdhui devenu propriété privée, le château, après une importante rénovation, abrite en ses murs quelques bureaux. Dans le parc, un restaurant propose chaque jour de profiter de la vue sur ce monument.","habitants":"cardinal François d'Escoubleau de Sourdis        Norbert Fradin\r\n        \"","divers":"Château de Lormont: 44° 52' 42,24\" Nord et 0° 31' 46,92\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Lormont_1.jpg","../../jctruffet.com/image/image_33/33_Lormont_2.jpg","../../jctruffet.com/image/image_33/33_Lormont_3.jpg","../../jctruffet.com/image/image_33/33_Lormont_4.jpg","../../jctruffet.com/image/image_33/33_Lormont_5.jpg","../../jctruffet.com/image/image_33/33_Lormont_6.jpg"]},"Consult_chateau_formulairecb7a":{"id":"Consult_chateau_formulairecb7a","dept":"33","canton":"Lormont","commune":"Lormont","nom":"Lormont_1","type":"Château","periode":"XVIII-XIX","histoire":"Plusieurs châteaux à Lormont dont celui de Lormont, de Génicart, de Mireport, d'Iris, du Bois-Fleuri   et de Lauriers.                                                                    GENICART, le château abrite  lespace  de la ville. Il subit de nombreuses modifications depuis la première mention de la maison au XVIIe siècle. Il se présente tel quil fut reconstruit en 1854 pour M. Hippolyte Gourdon, maire de Lormont. Domaine agricole jusquen 1970, il accueillit un camp militaire, américain en 1917-1919 et allemand pendant la seconde guerre mondiale. Le château Génicart a été construit vers 1854, au sein dun domaine.                                  MIREPORT, ce bâtiment de la fin du XVIIIe siècle fut construit par messieurs Abraham et Salomon Cardoze. Son nom résume à lui seul lesprit de ses constructeurs. Il joua un rôle modeste dans lhistoire de France lorsquil accueillit, en 1823, la duchesse dAngoulême, fille de Louis XVI. A partir de 1965, accueillant le centre social du quartier, il a acquis un rôle important et central dans la vie de la cité. Il abrite actuellement une halte-garderie municipale.             IRIS, sur les bases dun édifice plus ancien, madame Blanc de Manville engagea la construction, en 1864, de ce magnifique château de style Louis XIII, vue imprenable sur le port de la lune. Ce choix traduit le goût, jamais démenti, de la grande bourgeoisie bordelaise pour les hauteurs de la rive droite. Aujourdhui, le château constitue une entrée remarquable du parc de lErmitage et ses dépendances accueillent les enfants du centre aéré et des ateliers culturels.","architecture":"BOIS-FLEURI, construit vers 1880, fut la propriété de M. Jouin, négociant viticole. Ce monument de style néogothique est inspiré du château de Neuschwanstein en Bavière (Allemagne), tout comme le château de la Belle au bois dormant construit à Disneyland en Californie. Depuis septembre 2010, le parc du château du Bois fleuri abrite une médiathèque bien fournie.                                                             GENICART, il subit de nombreuses modifications depuis la première mention de la maison au XVIIe siècle. Aujourdhui au cur du quartier le plus peuplé de Lormont, il est le « pôle déchange citoyen » qui permet de regrouper un en
