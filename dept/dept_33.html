./jctruffet.com/image/image_33/33_Pauillac_II_4.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_5.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_6.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_7.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_8.jpg","../../jctruffet.com/image/image_33/33_Pauillac_II_9.jpg"]},"Consult_chateau_formulaire91b6":{"id":"Consult_chateau_formulaire91b6","dept":"33","canton":"Lesparre-Médoc","commune":"Pauillac_Lafite","nom":"Pauillac_Lafite","type":"Château","periode":"XVI-XVIII","histoire":"Pauillac, les châteaux Lafite Rothschild, Latour, château Mouton Rothschild, Pichon-Longueville, Pichon Longueville Comtesse de Lalande,  Duhart-Milon,  Pontet-Canet, Batailley,  Haut-Batailley,  Grand-Puy-Lacoste, Grand-Puy Ducasse, Lynch-Bages,  Lynch-Moussas, d'Armailhac,  Haut-Bages Libéral,  Pédesclaux,  Clerc Milon,  Croizet-Bages et de cordeillan-Bagès.                                                                   LAFITE-ROTSCHILD,  À partir du XVIIe siècle, la propriété du château Lafite tomba entre les mains de la famille de Ségur, avec le manoir des Lafite datant du XVIe siècle et qui existe toujours. Cest à partir de 1680 que lon a une première trace de lexistence dun vignoble important qui fut exploité par Jacques de Ségur.  Avant la Révolution Lafite appartenait à M.Pichard président au parlement de Guyenne périt sur l'échafaut en 1794, le domaine séquestré par la nation. Le 8 août 1868, le baron James de Rothschild acquiert le château Lafite mis en vente publique dans le cadre de la succession d'Ignace-Joseph Vanlerberghe. De 1946 à 1974, Élie de Rothschild prend les rênes du château Lafite Rothschild. En 1975, le baron Éric de Rothschild, neveu du baron Élie, le remplace. De nos jours la gestion technique du domaine est assurée par Charles Chevallier. En 2017, Saskia de Rothschild, fille du baron Eric, le remplace.","architecture":"LAFITE-ROTHSCHILD, avec sa tour ronde, une autre tour carrée flanquée d'une échauguette Renaissance parait dater du XVe siècle mais le château a été remanié à diverses époque   au XVII-XVIIIe siècles.   pour Château Lafite Rothschild, \"Petit Mouton\" pour château Mouton Rothschild et \"Forts de Latour\" pour château Latour. Maison noble munis de  fossés et d'un pont-levis en 1662.  Le château fait lobjet dune inscription au titre des M.H. depuis le 22 novembre 1989.","habitants":"Famille du  baron James de Rothschild\r\n        \r\n        \"","divers":"Château Lafite Rothschild","gps":"","images":["../../jctruffet.com/image/image_33/33_Pauillac_Lafite_1.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Lafite_2.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Lafite_3.jpg"]},"Consult_chateau_formulaire4777-3":{"id":"Consult_chateau_formulaire4777-3","dept":"33","canton":"Lesparre-Médoc","commune":"Pauillac","nom":"Pauillac_Rotschild","type":"Château","periode":"XVIII","histoire":"Dans cet article de Pauillac le château d'Armailhac, de Mouton- Rothschild, Pichon Longueville.   ARMAILHAC  le baron Philippe de Rothschild fit l'acquisition de ce cru à partir de 1933. Voisin du célèbre château Mouton Rothschild, il appartenait depuis le XVIIe siècle à la famille d'Armailhac dont il portait alors le nom : château Mouton d'Armailhac. A partir de 1956, il s'appela successivement château Mouton Baron Philippe, puis, en 1975, château Mouton Baronne Philippe. Depuis 1989, la Baronne Philippine de Rothschild lui a rendu, en partie, son identité d'origine en le baptisant château d'Armailhac.   MOUTON ROTSCHILD, en 1853, le baron Nathaniel de Rothschild achète aux enchères le château Brane Mouton à Pauillac, et le renomme château Mouton Rothschild .  En 1978, la société Baron Philippe de Rothschild S.A. qui gère entre autre le château Mouton Rothschild, créée, avec Robert Mondavi, En 1988, après la disparition du baron Philippe de Rothschild, c'est sa fille, la baronne Philippine de Rothschild qui hérite de ce trésor qu'elle va s'attacher à agrandir et moderniser. Depuis 2014, les trois enfants de Philippine, Camille, Philippe et Julien de Beaumarchais de Rothschild sont copropriétaires du Château.    PICHON-LONGUEVILLE, date de 1855, pour le baron Albert Pichon,  cest au XVIIe siècle, que Jacques de Pichon, baron de Longueville, commença à constituer le vignoble de Pichon Longueville. Au début, les deux Pichon faisaient une seule et même grande propriété. A la mort du Baron Joseph  en 1850, le domaine est divisé entre ses deux enfants, Raoul et Virginie sont resté dans le patrimoine de la famille Pichon-Longueville jusquen 1933, année où il fut vendu à la famille Bouteillier. Après un demi-siècle aux mains des Bouteillier, Pichon-Longueville a été a été racheté en 1987 par AXA Millésimes.","architecture":"CORDEILLAN-BAGES hôtel de charmes          MOUTON-ROTSCHILD corps de logis central  de plan rectangulaire sur soubassement à deux étages avec lucarne centrale sur un toit en croupe recouvert d'ardoise, l'édifice est accolé au angle de deux pavillons de même niveaux à toit très effilé avec lucarnes en façade  complété de deux tourelles à trois niveaux avec mâchicoulis toit en poivières, côté parc une tourelle plein cintre.                                               PAUILLAC  En 1777, Gilbert du Motier, marquis de La Fayette appareilla de Pauillac sur les bords de la Gironde afin de joindre les Amériques.","habitants":"Le baron Philippe de Rothschild                               le Baron Albert Pichon,\r\n        \r\n        \r\n        \r\n        \"","divers":"A Pauillac le  château de Mouton  d'Armaillac ,de Mouton-Rothschild et de pichon -Longueville","gps":"","images":["../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_1.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_2.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_3.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_4.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_5.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_6.jpg","../../jctruffet.com/image/image_33/33_Pauillac_Rothschild_7.jpg"]},"Consult_chateau_formulaire5d41":{"id":"Consult_chateau_formulaire5d41","dept":"33","canton":"Talence","commune":"Talence","nom":"Peixotto","type":"Château","periode":"XVIII","histoire":"PEIXOTTO, en 1785 le banquier  Samuel Peixotto acquiert à Zacharie Goudal un domaine à Talence,  date de construction de 1760 à 1769 par l'architecte François Lhote, en 1805 décès de monsieur Peixotto. Son fils revendra le château en 1810, à monsieur de Saint-Guirons passe par la suite à la famille de Thomassin puis à la baronne de Espelata,  dans les mains du baron François Xavier de Espeleta à la famille Rodrigues-Henriques et fut longtemps à la famille de Luze aujourd'hui.    Au docteur Badal, la faculté de médecine et de la pharmacie de Bordeaux va y créer, en 1884, un jardin botanique sur une partie du domaine. Aujourd'hui siège de la mairie de Talence. Le château de Peixoto est inscrit aux M.H. depuis le 23/05/1935.","architecture":"PEIXOTTO gracieux pavillon de style louis XVI appartenait à la fameuse  nation portugais qui regroupait à Bordeaux des juifs Marrane originaires de ce pays. Il fit construire en 1769 sur les ruines dun ancien  Bourdieu  appartenant à la chartreuse cette ravissante demeure agrémentée dun jardin botanique qui ne comportait à lorigine quun étage et fut élevé au siècle suivant, le pavillon composé d'un corps central, décoré de colonnes ioniques de deux ailes basses dont les porportions sont relativement modestes sont rachetées par le raffinement du décor tant estérieur qu'intérieur, la façade d'entrée couronné d'un lourd motifs et d'un fronton cintré, l'avant corps arrondi et les baies en plein cintré,  le banquier Peixotto obtint des armes  de Louis XVI qui furent sculptés sur la façade entourée dun cortège de roses. La façade offre un avant-corps arrondi, décoré de mascarons, dont l'un d'eux représente la tête d'un bélier. C'est en état de ruine qu'il est vendu à la mairie en 1971. Des restaurations sont aussitôt entreprises.\r\nAujourd'hui, on y trouve l'école municipale de musique et l'espace seniors.","habitants":"Famille de Samuel Peixotto\r\n        \"","divers":"Château de Peixotto à Talence","gps":"","images":["../../jctruffet.com/image/image_33/33_Peixotto_1.jpg","../../jctruffet.com/image/image_33/33_Peixotto_2.jpg","../../jctruffet.com/image/image_33/33_Peixotto_3.jpg"]},"Consult_chateau_formulaire476e":{"id":"Consult_chateau_formulaire476e","dept":"33","canton":"Pineuilh","commune":"Pellegrue","nom":"Pellegrue","type":"Château","periode":"XIII-XVI","histoire":"A Pellegrue plusieurs châteaux celui de Boirac, de Laforest, de Lugagnac, Puch de Gensac et Puch-Pellegrue.                                                                LUGAGNAC, au XVe siècle elle est la propriété dune famille  Pellegrue, avec demoiselle Jeanne de Pellegrue, fille de noble Pierre de Pellegrue, écuyer, et de Jeanne de Valenx. Pellegrin de Puch meurt devant Gravelines  à la guerre de cents ans, traité des Pyrénées et laisse ses deux enfants.. Au commencement du XVIIIe siècle, messire Benjamin de Puch Destrac, capitaine de cavalerie était seigneur de Lugaignac.  Cette maison reste la propriété de la famille de Puch jusquen 1969, date à laquelle elle est cédée à la famille Bon qui va sappliquer à lui redonner vie, faire revivre Lugagnac, abandonné depuis la dernière guerre, est un défit quils relèvent avec enthousiasme. il vient dêtre racheté par un important groupe chinois. Mais il envisagerait dautres acquisitions dans le bordelais.                                        PUCH de GENSAC, bâti à l'origine au XIIIe siècle, a subi d'importants agrandissements aux XVIe et XVIIe siècles ; il a été inscrit au titre des M.H. par arrêté du 30 septembre 1994. Propriété de la puissante famille de Pellagrue aux XVe et XVIe siècles,le château du Puch de Gensac  fut cédé vers 1560 à monsieur Le Blanc, conseiller au parlement de Bordeaux. En 1686, il est acquis par Jacques-Jean de Puch, écuyer, brigadier général dans les armées du roi et seigneur des maisons nobles de la Tour-de-Monbreton (paroisse de Pessac-sur-Dordogne)  et de Pailhas (paroisse de Massugas), dans la juridiction de Gensac et dautres lieux encore. Il reste dans la famille de Puch jusquau début du XXe siècle. Il est vendu le 5 janvier 1932 à un couple sino-américain, madame et monsieur Kim Goal Kwan.   En 1993, le château est racheté par M.Pitron.                                               LAFOREST de 1782 de monsieur Mourgues.","architecture":"LUGAGNAC, trouvant ses origines au XIIIe siècle, le château de Lugagnac a été remanié aux XVe et XVIIe siècles et conserve aujourd'hui un aspect authentique, avec son architecture élégante, sa tour octogonale et son échauguette accolé à la bâtisse formant un équerre à deux niveaux toit en croupes recouvert de tuiles. \r\nBOIRAC-SEGUR,   de plan en équerre , corps de logis rectangulaire à trois niveaux toit en croupes accolé de tours  sur la façade extérieure une tour heptogonale sur cour intérieure, une tour ronde  crénelée et tourelle sur angles extérieures, retour en équerre des dépendances côté cour.                                       CORDEILLAN-BAGES, transformé en hôtel restaurant par la famille de Cazes.                                      LAFOREST, de plan oblong de douze travées  sur soubassement  et occulus toit à deux pans entre deux tours carrées à deux niveaux, retour  en équerre des dépendances formant cour d'honneur.                  PUCH GENSAC,construit au XIIIe siècle sur une plate forme puis remanié au fil du temps, le château présente différentes tours, rondes et octogonales, des terrasses et des jardins. corps de logis en équerre à trois niveaux entre ses tours.","habitants":"famille de Pellagrue\r\n        \"","divers":"A Pellegrue  châteaux celui de Lugagnac g-5-6-7, de Boirac g-1-2, de Laforest g-4,  Puch de Gensac g-8 et Puch-Pellegrue.","gps":"","images":["../../jctruffet.com/image/image_33/33_Pellegrue_1.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_2.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_3.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_4.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_5.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_6.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_7.jpg","../../jctruffet.com/image/image_33/33_Pellegrue_8.jpg"]},"Consult_chateau_formulairee685":{"id":"Consult_chateau_formulairee685","dept":"33","canton":"Pessac","commune":"Pessac","nom":"Pessac_Chateau","type":"Château","periode":"XIV-XV-XVII","histoire":"Plusieurs châteaux à Pessac-Léognan dont celui de Pessac, de Belin de Carbonneau (voir article) de Carmes, Haut-Bacalan,  de Cazalet, de Campagna, de Bivazac , de Clément  et de Bellegrave (voir article) Mission-Haut-Brion, Giscours et Pic-Caillou pas d'information.                                                          PESSAC-LEOGNAN,  propriété de la famille Thomassin,.                                                                BELIN  appartient à une vieille famille antillaise depuis près de trois siècle  monsieur et madame O. Marraud des grottes.                                                                    HAUT-BACALAN, en 1726, Montesquieu, déjà propriétaire vigneron du château de la Brède, fait l'acquisition d'une propriété de graves à Pessac. En 1748, ce domaine appartient à M. de Bacalan, écuyer, après acquisition à M. de Montesquieu. Ces vignes laissèrent la place en 1933 à une importante ferme consacrée à l'élevage du porc.                                       CAZALET, François Cazalet, né en 1730 et mort à la Révolution. En 1861, un gros négociant en bonneterie, Firmin Ferdinand Clouzet, maire de Pessac de 1870 à 1878 et membre du conseil général de la Gironde pour le canton de Pessac, rachète le terrain à Firmin Jarrige, maire de 1809 à 1822. Il y fait édifier le château en 1882 et lui donne son nom. C'est en 1941 que Charles Ragot fait l'acquisition du parc, des dépendances et du château, la communauté Urbaine de Bordeaux rachète la propriété en 1983 à M. Ragot puis cède les droits de propriétés à la commune de Pessac.","architecture":"Château de Montbreton du  XIVe et XVIIe siècle. Le manoir de la Bernède du XIVe et XVIIe siècle. Château de la Vidasse du XVe , XVIIe et XIXe siècles. Château Ribebon du XVIIe et XIXe siècle.\r\nHAUT LEVEQUE, propriété communale, cette exploitation est gérée par la famille Michel Gonet depuis l'année 2000.  La Tour de défense de Beaupoil du  XIV e siècle                                                    CAMPAGNAC, vers la cour dhonneur, on trouve dun côté lancien cuvier abritant aujourdhui un club du 3e âge ainsi que lhistorial, de lautre la cuisine, une réserve et des logements de vignerons, actuellement réaménagés en bureaux pour la médiathèque de Pessac. Le XIXe siècle ajoute un étage au corps principal.  En prolongement du château, se situe depuis 2000 la médiathèque de Pessac.          BIVAZAC, ce château, construit au XIIIe siècle, a été aménagé au XVIIIe siècle. La demeure primitive était un pavillon de chasse. Actuellement, il est la propriété de luniversité.","habitants":"Famille Thomassin  François Cazalet\r\n        \"","divers":"A Pessac celui de Pessac, de Belin de Carbonneau de Carmes, Haut-Bacalan,  de Cazalet g-1-2, de Campagna, de Bivazac , de Clément.","gps":"","images":["../../jctruffet.com/image/image_33/33_Pessac_Chateau_1.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_2.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_3.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_4.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_5.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_6.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_7.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_8.jpg","../../jctruffet.com/image/image_33/33_Pessac_Chateau_9.jpg"]},"Consult_chateau_formulaire80c3":{"id":"Consult_chateau_formulaire80c3","dept":"33","canton":"Pessac","commune":"Pessac","nom":"Pessac_Olivier","type":"Château","periode":"XII-XVII","histoire":"A Pessac château de Carmes  du Haut-Brana  l'Olivier, et de Camponac.                                                            CARMES-PESSAC, propriétaire du domaine pendant deux cents ans, les Carmes durent le céder en 1791 lors de la confiscation des biens de léglise, pendant la Révolution. Il fut racheté au début du XIXe siècle par Léon Colin, négociant à Bordeaux, ancêtre direct des actuels propriétaires, la famille Chantecaille-Furt. Le petit château construit au XIXe siècle.\r\nHAUT-BRANA, en 1626, cette pièce de terre appartient à la maison de Bel-Air, et dans un acte de 1678, on évoque une pièce de vigne au plantier de Noès, au lieu-dit Brana. En 1695, cette pièce appartient au fief des Jésuites du prieuré Sainte-Marie de Bardanac à Pessac. Au XIXe siècle, devenu château Haut-Brana, est la propriété des comtes de Tanquerel de la Panissais.                                         OLIVIER, le château Olivier est une très ancienne seigneurie remontant au Moyen-Âge. Le domaine appartient depuis le XIXe siècle à la famille de Bethmann d'origine allemande, installée à Bordeaux depuis le XVIIIe siècle, qui en a confié la direction générale à Laurent Lebrun.  propriété des ancêtres de la mère de Montesquieu, Jeanne de Pesnel . A partir du milieu du XVle siecle, il n'est plus fait mention de la famille d'Olivier et la construction d'un nouveau pavillon ainsi que soubassement sur les parties déjà existantes sont entrepris.","architecture":"CAMPONAC, en 1610, un acte de vente de cette terre mentionne une maison ancienne, rénovée par son nouveau propriétaire, M. de Fonteneil, qui donnera un nouvel essor à la propriété. Un siècle plus tard, la vieille bâtisse est remplacée par une chartreuse, maison basse à deux ailes, dont le corps central sera rehaussé dun étage au XIXe siècle; la véranda, le péristyle et lallée de platanes qui part vers les terrains de sports, au nord du parc, datent également du Second Empire. La fontaine du XVIIIe siècle que lon voit dans le parc provient du domaine de Saige, disparu aujourdhui. Elle a été démontée puis remontée à Camponac, en 1979, par les membres de lassociation « Les amis du beau et du vieux Pessac ».\r\nAujourdhui, le lieu a laissé place à une superbe médiathèque, en maintenant et conjuguant les deux architectures, celle de la chartreuse avec celle dun bâtiment aux dominantes de bois parfaitement intégré dans son environnement.\r\nOLIVIER -Une partie du château a été construite au XIIe siècle, il est agrandi et modifié au XVIIle siècle. En dépit de sa transformation en « faux château fort» par des embellissements néogothiques, il est considéré comme un spécimen intéressant de l'architecture médiévale. Depuis 1988 une campagne de  restauration a été entreprise. Les éléments du parc et le château ont été inscrits à l'inventaire des M.H. en 1946 ; les éléments du château en 1963. Il se présentait sous la forme d'une forteresse carrée, entourée d'une épaisse muraille cantonnée de tours.","habitants":"famille Chantecaille-Furt                                                 comtes de Tanquerel de la Panissais.                          famille de Bethmann \r\n        \"","divers":"Château de Carmes  du Haut-Brana et l'Olivier g-1 à 5 de vidasse g_6","gps":"","images":["../../jctruffet.com/image/image_33/33_Pessac_Olivier_1.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_2.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_3.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_4.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_5.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_6.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_7.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_8.jpg","../../jctruffet.com/image/image_33/33_Pessac_Olivier_9.jpg"]},"Consult_chateau_formulaire9ad7":{"id":"Consult_chateau_formulaire9ad7","dept":"33","canton":"Cadillac","commune":"Pian sur garonne","nom":"Pian_Médoc","type":"Château","periode":"XVII","histoire":"A Pian le château de Malleret, de Bellecroix à pian sur Garonne, de Belgrave de Pujeau et de  Sénéjac.     BELEGRAVE, la famille Granval, issue de négoce bordelais, commanditaire de la reconstruction, a repris le domaine et en a fait une exploitation renommée, brièvement décrite dans les éditions du Cocks et Féret de 1881 et de 1886. En 1898, le domaine bénéficie d'une notice détaillée et la bâtisse est représentée.  Le domaine appartient en 1922 à un certain Louis Dillaire. Dévasté par les sévères gelées de 1956, le vignoble est reconstitué à la fin des années 1970 et retrouve les 10 ha de vignes qu'il comptait auparavant. \r\nMALLERET,  Il appartenait au XVIIe siècle à monsieur de Malleret, écuyer du roi avant dêtre racheté par le président de Basterot.  Peu avant la révolution, monsieur de Basterot le vendit à monsieur Barthez, négociant à Bordeaux et   garda le château jusquen 1830. Malleret passe ensuite entre les mains de monsieur Barbe puis dun riche notaire, monsieur Sicard qui démolit en partie le corps de logis pour édifier au-dessus une sorte de villa au style un peu lourd. Au décès de celui-ci en 1859 dans son château, sa veuve le vendra  à la famille Clossmann, riches négociants, fondée en 1770 par le baron Clossmann et installée dans le haut lieu du commerce qui avait affermé le château. Le château de Malleret a été repris  par les descendants de cette famille,  semble navoir jamais été une seigneurie. En 1830 lui feront subir des transformations, lexhaussant pour en faire le bâtiment moderne que lon peut voir aujourdhui.\r\nDomaine Bellecroix et Sénéjac pas d'information historique.","architecture":"Le château de Malleret est un château bâti au Pian-Médoc, . La construction du château date du XVIIe au XIXe siècle. Cette ancienne gentilhommière date du XVIIe siècle. Elle comporte deux pavillons latéraux qui furent construits sous Louis XIV. Aujourdhui, seuls ces deux pavillons rectangulaires, dont lun est flanqué dune tour circulaire hors duvre, subsistent.    Cétait un petit domaine, une métairie, une habitation rustique que monsieur de Basterot fit démolir pour élever à la place un petit château genre Louis XV, avec perron, pavillons, surmontés de girouettes aux armes des Basterot.  Les deux pavillons latéraux datent du XVIIe siècle alors que le logis et les bâtiments agricoles sont de la fin du XIXe siècle. La salle à manger a été ornée avec des boiseries prises à l'église de la manufacture à Bordeaux et le salon avec des boiseries originaires de Vienne en Autriche. L'ensemble est entouré d'un parc.                                                                 BELGRAVE L'ensemble comprend un corps de logis avec étage et comble, ainsi que des dépendances basses accolées à l'ouest. La façade principale de cinq travées comporte un avant-corps peu saillant encadré de pilastres à bossages. La porte du rez-de-chaussée est couverte d'un arc en anse de panier interrompu par une agrafe à décor végétal. Deux bandeaux continus moulurés séparent les niveaux. À l'étage, chaque ouverture est à chambranle mouluré ; la plate-bande à agrafe est surmontée d'une corniche. La porte-fenêtre centrale ouvre sur un balcon à garde-corps en fonte. Le comble est éclairé par trois lucarnes percées d'un oculus. Les autres faces de la demeure sont moins soignées, dépourvues de décor et élevées avec des matériaux plus ordinaires.                                    Sénéjac, de M Jean-Paul Bignon  corps de logis rectangulaire à deux niveaux avec lucarnes décorées dans comble sur toit brisé, accolé aux extrémités de pavillon saillant de même style qui eux sont reliés à la base par un balcon sur colonnes toscannes, la bâtisse est accolé sur les angles arrière de tours carrées à trois niveaux toit à quatre pans pointus.","habitants":"Famille Clossmann\r\n        \r\n        \r\n        \"","divers":"Malleret  44° 57' 55\" Nord et 0° 38' 32\" Ouest      G-1-2-3                       \r\nSénéjac    g-4-5  Bellegrave g-7   Bellecroix g-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_1.jpg","../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_2.jpg","../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_3.jpg","../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_4.jpg","../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_5.jpg","../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_6.jpg","../../jctruffet.com/image/image_33/33_Pian_M%c3%a9doc_7.jpg"]},"Consult_chateau_formulairee7c4":{"id":"Consult_chateau_formulairee7c4","dept":"33","canton":"Castillon la Bataille","commune":"Gardegan et Tourtirac","nom":"Pitray","type":"Château","periode":"XV-XIX","histoire":"PITRAY, depuis le XIVe siècle dans la même famille, le manoir du XVe siècle fut construit par la famille Prieur. Il fut remanié au XVIe siècle par leurs descendants, une branche de la famille de Ségur. En 1715, Françoise, fille unique, épousa Élie de Simart, ancien échevin de Saint-Émilion. Sous le second Empire, le général de Simard de Pitray fit édifier le château actuel par l'architecte bordelais Alphonse Blanquière (1829-1899). Les héritiers actuels, le comte et la comtesse de Boigne, maintiennent la propriété familiale avec une activité  traditionnelle.","architecture":"PITRAY,  manoir féodal du XVe siècle, remanié au XVIe siècle, a été entièrement reconstruit vers 1870, cet édifice est de style néo-renaissance à la mode de Viollet-le-Duc. L'élévation nord est divisée en trois parties : une partie centrale encadrée de chaque côté d'une tour pentagonale, elle-même flanquée d'un pavillon rectangulaire en saillie. L'élévation sud reprend la même disposition à l'exception des tours. Des communs importants à l'est du château se présentent sous la forme de deux bâtiments rectangulaires séparés par une cour.  L'Allée couverte du Pitray est située dans les bois, à proximité du château.   À l'est un grand parc naturaliste dans le vallon plongeant vers le sud. Le parc, où dominent chênes et cèdres centenaires, a été dessiné par le pépiniériste bordelais Jean Escarpit (qui a également dessiné le Jardin public à Bordeaux).","habitants":"Famille de Ségur\r\n        \"","divers":": 44° 54' 00\" Nord et 0° 01' 39\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Pitray_1.jpg","../../jctruffet.com/image/image_33/33_Pitray_2.jpg","../../jctruffet.com/image/image_33/33_Pitray_3.jpg","../../jctruffet.com/image/image_33/33_Pitray_4.jpg","../../jctruffet.com/image/image_33/33_Pitray_5.jpg"]},"Consult_chateau_formulairee1f8-2":{"id":"Consult_chateau_formulairee1f8-2","dept":"33","canton":"Salles","commune":"Podensac","nom":"Podensac","type":"Château","periode":"XVII-XIX-XX","histoire":"A Podensac le château de Chavat, de Broustaret et les vestiges du vieux château.                                     CHAVAT, début du XXe siècle. François Thévenot acquiert le domaine Chavat du XVIIe siècle pour le sauver de la ruine et le transformer en jardin remarquable, au coeur dun espace de 5,5 hectares en bord de Garonne. Le domaine Chavat est laissé à l'abandon pendant le dernier quart du XIXe siècle, jusqu'au jour où François Thévenot l'acquiert en 1914, et décide de le transformer en jardin remarquable, et ainsi le sauver de la ruine. Pour cela, il est aidé de bon nombre d'artistes, notamment des sculpteurs, comme le Corbusier par exemple. La mairie de Podensac achète le domaine en 1934 alors que Thévenot est ruiné. Le château est classé monument historique en 2006 ainsi que les serres et le château d'eau du domaine. Il s'agit donc d'une visite qui vaut le détour, vos enfants seront ravis de gambader dans ce grand jardin, et toute la famille pourra profiter d'une bonne ballade en plein air dans un cadre idyllique.       BROUSTARET, belle maison de caractère de la fin du XIXe siècle, est implanté sur un domaine d'une quarantaine d'hectares, aujourd'hui chambres d'hôtes.","architecture":"Chavat, sur soubassement de plan carré à trois niveaux et lucarnes sur toit brisé à la mansard, flanqué  de tours rondes et hexagonales sur angle, avec bouche à feu à la base de la grosse tour  à l'opposé deux avant corps sur angle à quatre niveaux avec balconnet.                                                Broustaret corps de logis rectangulaire à deux niveaux avec fronton triangulaire sur le côté et lucarnes sur le toit recouvert de tuile, retour en équerre d'un autre corps de logis à deux niveaux à trois travées avec terrasses sur  le toit entouré de balustrades.","habitants":"Famille de François Thévenot \r\n        \"","divers":"Château de la Chavat g-1à 4 et Broustaret g-5-6 à Podensac","gps":"","images":["../../jctruffet.com/image/image_33/33_Podensac_1.jpg","../../jctruffet.com/image/image_33/33_Podensac_2.jpg","../../jctruffet.com/image/image_33/33_Podensac_3.jpg","../../jctruffet.com/image/image_33/33_Podensac_4.jpg","../../jctruffet.com/image/image_33/33_Podensac_5.jpg","../../jctruffet.com/image/image_33/33_Podensac_6.jpg","../../jctruffet.com/image/image_33/33_Podensac_7.jpg"]},"Consult_chateau_formulaire5428":{"id":"Consult_chateau_formulaire5428","dept":"33","canton":"Libourne","commune":"Pomerol","nom":"Pomerol","type":"Château","periode":"XVII-XVIII","histoire":"Plusieurs châteaux à Pomerol dont celui de Beauregard, de Gazin,et de Tratanoy la Fleur-Pétrus, de Lalande . Pas d'information pour ces deux derniers. BEAUREGARD, construit avant la Révolution puis fut transformé, avant 1824, cest au XVIIe siècle quune famille Beauregard lègue son nom au château quelle y fait construire, malgré les héritages qui la font passer dans la famille des Chaussade de  Chandos conserveront le nom de Beauregard. Le crédit foncier de France a acheté le château en 1991 à la famille Clauzel,  jusquau milieu du XXe siècle et va servir, de 1914 à 1918, dhôpital militaire. Après avoir abrité différents locataires, le château de Beauregard a accueilli dans ses murs, depuis 1978, une maison de retraite. En 2014, les familles Moulin et Cathiard le rachètent , est désormais la propriété des familles Moulin (Galeries Lafayette) et Cathiard (Smith-Haut-Lafitte).   GAZIN, remontent à la fin du XVIIIe siècle avec Antoine Feuilhade, propriétaire, homme de loi et politicien local. Après bien des vicissitudes, le domaine devint propriété de Louis Soualle au début du XXe siècle, pour rester dans la famille et finalement passer en 1988 et trois générations plus tard sous la direction commune de Nicolas et Christophe de Bailliencourt. \r\nTROTANOY a vu le jour au XVIIIe siècle avec la famille Giraud, courtier royal à Libourne, après la 2ème guerre mondiale et est acquise en 1953 par Jean-Pierre Moueix. Elle est maintenant gérée par Christian Moueix, fils de Jean-Pierre, assisté de son fils Edouard.","architecture":"BEAUREGARD, au XVIIe siècle q'un incendie ravage la partie supérieure de l'édifice conservera sa terrasse ponctuée de deux pavillons carrés et ses douves, elle se haussera d'un attique percée d'une rangée d'oculi.  A la fin du XVIIIe siècle, ce dernier est remplacé par le bel édifice actuel, qui mérite une visite.  Actif dans la région de Pomerol et propriétaire dun petit manoir il cultivait déjà ces terres. Sur ce site, la famille Beauregard fait construire cinq siècles plus tard un premier édifice, qui fut remplacé à lépoque napoléonienne par le château actuel : une magnifique chartreuse girondine, qui souvre sur une terrasse avec deux pigeonniers surplombant des douves et un très beau parc, uvre dun élève de Victor Louis. Cette résidence fut un modèle pour la famille Guggenheim qui en fit construire sa copie à port Washington, sur la presquîle de Long Island et la baptisa Mille-Fleurs. \r\nGAZIN corps de logis central à six travées et deux niveaux  toits en croupes avec tourelle carrée sur mur élevé et clocheton, la bâtisse est prolongés de chaque côté des dépendances de même style mais celle de droite plus basse.\r\nTROTANOY de plan rectangulaire à deux niveaux avec attiques toit en croupe prolongé sur l'arrière avec tour carrée.","habitants":"Jean-Pierre-Moueix.\r\n        \"","divers":"à Pomerol dont celui de Beauregard g1à4, de Gazin g-6-7, la Fleur-Pétrus, de Lalande g-8 et de Tratanoyg-9.","gps":"","images":["../../jctruffet.com/image/image_33/33_Pomerol_1.jpg","../../jctruffet.com/image/image_33/33_Pomerol_2.jpg","../../jctruffet.com/image/image_33/33_Pomerol_3.jpg","../../jctruffet.com/image/image_33/33_Pomerol_4.jpg","../../jctruffet.com/image/image_33/33_Pomerol_5.jpg","../../jctruffet.com/image/image_33/33_Pomerol_6.jpg","../../jctruffet.com/image/image_33/33_Pomerol_7.jpg","../../jctruffet.com/image/image_33/33_Pomerol_8.jpg","../../jctruffet.com/image/image_33/33_Pomerol_9.jpg"]},"Consult_chateau_formulaire5325":{"id":"Consult_chateau_formulaire5325","dept":"33","canton":"St-André de Cubzac","commune":"Saint-Felix de Foncaude","nom":"Pommiers","type":"Vestiges-Chateaux","periode":"XIII-XVII","histoire":"POMMIERS, bâti à Vérac, date du XIIIe siècle au XVIIIe siècle, fief des anciens vicomtes de Fronsac.   Place forte féodale, le château primitif fut abattu, sur l'ordre de Philippe le Bel, vers 1302. Par la suite, cette place protégée par des remparts, devait abriter une petite agglomération dont il était encore question au XVIe siècle, édifices du XVIe siècle en font un merveilleux site, chargé d'histoire, dans un paysage étonnant. Cette terre noble a eu le contrôle, des communes environnantes actuelles, jusqu'à la fin du XVIIIe siècle. Le château et les terres passèrent par alliances des Achard à la famille de Fronsac dont la fille et unique héritière, Henriette Charlotte de Fronsac épousa en 1775 Jean-Antoine de Brons dont la famille était originaire du Quercy, faisait partie de la noblesse du Périgord. Le château de Pommiers ainsi que les autres biens de la famille de Brons à Vérac furent mis sous séquestre par la Révolution Française à cause de l'émigration en mai 1792 de Jean-Antoine de Brons et de son fils. La famille de Brons racheta ces mêmes biens spoliés vingt trois ans plus tôt en 1815 avec le retour des Bourbons sur le trône de France. À l'extinction de la famille de Brons, le château et l'ensemble des biens furent vendus.","architecture":"Le castrum de Pommiers, qualifié de « ville » en 1496, est encore représenté comme un bourg fortifié à la fin du XVIIIe siècle. Au nord et au sud, il est ouvert sur deux portes autrefois traversées par la route de Sauveterre à la Réole. La porte sud dite porte de la Réole est surmontée d'une tour de deux niveaux à l'intérieur de l'enceinte, et surplombant d'une vingtaine de mètres la vallée de la Vignague. Portes fortifiées, remparts, courtines, moulin, pont, chapelle, tels sont les principaux éléments encore visibles aujourd'hui de ce superbe ensemble médiéval. À la fin du XVIIIe siècle, le domaine de Pommiers devient viticole. Il reste du château médiéval  modifié en profondeur au début du XVIIIe siècle : la motte féodale, quelques bases de murailles, les prisons et l'ancien donjon. Ce dernier est incorporé au bâtiment principal actuel. Le château, modifié au XVIIIe siècle et en partie détruit par un incendie au XXe siècle est aujourd'hui un grand rectangle élégant à étages avec fronton. Deux ailes avec les pavillons lui donnent une forme en « U ». Une tour et des bâtiments qui fermaient l'ensemble avec les communs de la ferme ont depuis, disparus.","habitants":"Famille de Fronsac \r\n        \"","divers":"Château et vestige à Pommiers  44° 59' 16\" Nord, 0° 19' 18\" ouest Verac-g 9","gps":"","images":["../../jctruffet.com/image/image_33/33_Pommiers_1.jpg","../../jctruffet.com/image/image_33/33_Pommiers_2.jpg","../../jctruffet.com/image/image_33/33_Pommiers_3.jpg","../../jctruffet.com/image/image_33/33_Pommiers_4.jpg","../../jctruffet.com/image/image_33/33_Pommiers_5.jpg","../../jctruffet.com/image/image_33/33_Pommiers_6.jpg","../../jctruffet.com/image/image_33/33_Pommiers_7.jpg","../../jctruffet.com/image/image_33/33_Pommiers_8.jpg","../../jctruffet.com/image/image_33/33_Pommiers_9.jpg"]},"Consult_chateau_formulairec58a":{"id":"Consult_chateau_formulairec58a","dept":"33","canton":"Salles","commune":"Preignac","nom":"Preignac","type":"Château","periode":"XVII-XIX","histoire":"Château de la Malle (voir article), Armajan, Bastoz, Jonka, Juge, Rochers, Solon et Suduiraut.   ARMAJAN,   Bernard Sauvage ayant pris part à la Fronde contre Louis XIV, le château est détruit en représailles par les troupes royales. Le nouveau propriétaire, Guillaume Guichaner, va prendre en charge la reconstruction environ 10 ans plus tard vers 1760 par Vincent de Guichaner afin de ladapter à son goût.\r\n BASTOR, tout au long de son histoire, le château appartient à différents propriétaires et lactivité principale du domaine est passée de polyculture à viticulture. En effet, à la fin du XVIIe siècle, lensemble semble appartenir au domaine royal. Il est vendu en 1711 à Vincent de la Montaigne, conseiller au parlement de Bordeaux. Après lAncien Régime,  mais sa vocation viticole lui vient au XIXe siècle avec Amédée Larrieu, également propriétaire du château Haut Brion à Pessac. Il acheta le domaine en 1839. Vendu en 1936, par un descendant des Larrieu, le vicomte de Larochebrochard, le château Bastor-Lamontagne appartient aujourdhui à Foncier-Vignobles.                                                                           Les ROCHERS, il a été reconstruit à  partir de 1777 par le marquis Jean-François de Rolland, président du parlement de Bordeaux, il est un domaine viticole du XVIIIe siècle inscrit au titre des M.H. depuis 2008.\r\nSUDUIRAUT, c'est domaine viticole, l'histoire du domaine débute en 1592 lorsque Léonard de Suduiraut, originaire du Limousin et conseiller au parlement de Bordeaux, épouse Nicole dAllard apportant le domaine en dot. La demeure est pillée, dévastée et incendiée en 1648 et 1649, durant les guerres de la fronde. Blaise de Suduiraut fait construire le château actuel sur les ruines de la maison dAllard entre 1655 et 1675.","architecture":"ARMAJAN  un des plus anciens du Sauternais, construit sous la forme dune ferme fortifiée entre les XIV et XVes siècles, époque dite du Bas-Moyen-Âge. Tours et meurtrières du château médiéval sont toujours en grande partie visibles, de même que la pierre commémorative datant de 1639, vestige du château des Sauvage. Le château alors reconstruit a gardé, non seulement, la même implantation que le château médiéval, à savoir trois cours, mais aussi les douves, les restes dune porte du XVe siècle ainsi que dune tour circulaire et du corps principal de bâtiment. BASTOR, larchitecture et le décor du château sont intéressants : de vastes dimensions, il se compose de deux ailes en retour déquerre, laile principale étant la plus élevée. Lune des ailes est ornée en son centre dun grand fronton cintré à retours, se détachant sur la toiture. La construction remonte au XVIIe siècle mais il est très remanié au XVIIIe siècle et au cours des siècles suivants \r\nSUDUIRAUT  Il sagit dun château type de lépoque Louis XIV. L'édifice se trouve au centre d'un grand parc et jardin régulier. Deux pavillons flanquent l'élévation principale du logis. Deux ailes en retour terminées par des tours cylindriques déterminent une cour d'honneur fermée par une grille. A l'opposé, ce sont de grosses tours rondes qui encadrent l'élévation postérieure du logis.","habitants":"Sieur Vincent de la Montaigne\r\n        \"","divers":"Château d'Armajang-1, Bastor g-2-3,  Solon et Suduiraut. 44° 47' 42\" Nord et 0° 14' 56\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Preignac_1.jpg","../../jctruffet.com/image/image_33/33_Preignac_2.jpg","../../jctruffet.com/image/image_33/33_Preignac_3.jpg","../../jctruffet.com/image/image_33/33_Preignac_4.jpg","../../jctruffet.com/image/image_33/33_Preignac_5.jpg","../../jctruffet.com/image/image_33/33_Preignac_6.jpg","../../jctruffet.com/image/image_33/33_Preignac_7.jpg","../../jctruffet.com/image/image_33/33_Preignac_8.jpg"]},"Consult_chateau_formulaire8c98":{"id":"Consult_chateau_formulaire8c98","dept":"33","canton":"Salles","commune":"Preignac","nom":"Preignac_II","type":"Château","periode":"XVIII","histoire":"SOLON   Le domaine, anciennement appelé Bourdieu de Rouquette, est construit à la fin du XVIIIe siècle pour abriter une exploitation viticole. Le logis principal est constitué dun bâtiment à deux niveaux et trois larges travées. Deux courtes ailes basses sont construites en prolongement. La construction des communs au XIXe siècle permet de créer une grande cour fermée : on élève deux longues ailes en retour déquerre, terminées par deux tours carrées à un étage, au toit pentu couvert dardoise. Une grille reliant les deux tours ferme la cour, sans pour autant cacher la vue sur les vignes environnantes. Depuis les années 1970 le château na plus sa vocation viticole, il est cependant toujours habité et abrite un gîte rural par Marie st-Denis .                                                              JUGE situé au coeur du village de Preignac et une  propriété de la famille Perromat depuis 1992, ce château du XVIIe siècle, voisin de celui dArmajan fut habité après la Révolution par un juge de paix.","architecture":"JONKA, chartreuse du XVIIIe siècle dite girondine, c'est-à-dire bâtie en forme de U et qui regroupe le château, partie centrale qui comporte le logis au rez-de-chaussée avec pavillon central, et les dépendances agricoles terminées chacune par un pavillon à étage, qui forment les côtés de la cour fermée par un bâtiment traversé d'un passage couvert. Les dépendances comportent des écuries, des chais et un cuvier. Les bâtiments sont entourés d'un parc et d'un jardin. La partie la plus ancienne de l'édifice, située à l'extrémité de l'aile gauche date du XVIe siècle.    ROCHERS L'ensemble des bâtiments s'organise suivant un plan en U encadrant une cour rectangulaire à laquelle on accède par un portail monumental ouvert dans le mur de clôture. Le logis est une chartreuse rectangulaire à un niveau flanquée de chaque côté de deux gros pavillons carrés coiffés de combles à pans brisés. Au centre des façades un avant-corps en très légère saillie et percé d'une porte est couronné d'un fronton triangulaire. Les dépendances de ce château  ferment les deux autres côtés de la cour. D'autres communs dont l'écurie et la chapelle se situent à l'extérieur de cet ensemble. La grande cour oblongue accueillait les activités vinicoles. Ouvrant sur la façade postérieure, le jardin barlong est agrémenté de bassins et de fontaines.","habitants":"Exploitants locaux\r\n        \"","divers":"Château de Solon g -6-7  de Jonka g-2  de Juge  et de Rochers g -3-4-5 à Préignac","gps":"","images":["../../jctruffet.com/image/image_33/33_Preignac_II_1.jpg","../../jctruffet.com/image/image_33/33_Preignac_II_2.jpg","../../jctruffet.com/image/image_33/33_Preignac_II_3.jpg","../../jctruffet.com/image/image_33/33_Preignac_II_4.jpg","../../jctruffet.com/image/image_33/33_Preignac_II_5.jpg","../../jctruffet.com/image/image_33/33_Preignac_II_6.jpg","../../jctruffet.com/image/image_33/33_Preignac_II_7.jpg"]},"Consult_chateau_formulaire3cf7":{"id":"Consult_chateau_formulaire3cf7","dept":"33","canton":"Blaye","commune":"Prignac et Marcamps","nom":"Prignac_Marcamps","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Prignac celui de Grand Jour et de Grissac. A 1 Km au sud-Est château de Ste-Radegonde.                                                                GRAND-JOUR édifié en 1763 sur les bases d'une ancienne demeure,  a appartenu aux familles de Lavergne, Mirande de Peyredoulle et de Lachassaigne. En 1830, il est acheté par Pierre Castanet qui restaure la demeure. En 1986, Mme Gaignerot, sa descendante, vend le château. Il a été depuis le lieu de tournage du téléfilm. la bicyclette bleue avec Lætitia Casta, puis de la saga La Maison des Rocheville.                                                        GRISSAC, cest Arnaud de Grissac, qui, par charte royale de lan 1331. Charles de Piis, seigneur de Bisqueytan en 1552, en est le plus ancien propriétaire connu par les traces écrites. Le château est par la suite vendu sous Henri IV à Guillaume de Montalier. Le château actuel est bâti en 1652 par Louis de Montalier, son petit-fils, Pierre, y reçoit souvent Montesquieu, un de ses très proches amis.  Le château était au XVIIIe, la propriété de la famille Montalier de Grissac dont le plus illustre représentant, Pierre, était conseiller au parlement de Bordeaux et fut salué à sa mort en 1770 comme un « magistrat célèbre par la force de son génie et par son inflexible droiture ». Le domaine passa ensuite à son neveu, puis par alliance à la famille de Lur-Saluces, avant dêtre acquis sous le Second Empire par la famille Castanet.","architecture":"GRAND-JOUR, construit à la fin du XVIIe siècle et remanié au XVIIIe siècle. Le château se présente sous la forme dun plan rectangulaire surmonté dune coupole ardoisée en son centre. Devant sa façade, une grande cour avec jardins accueillent le visiteur. De lautre côté du château, de beaux jardins en terrasses et à la française suivent la déclivité du sol, est due à une famille très influente du Bourgeais : les Castanet. GRISSAC cest Arnaud de Grissac, qui, par charte royale de lan 1331, fonde sur sa terre le château fort. De cette antique demeure, il ne subsiste aujourdhui que les deux tours.  Belle demeure de style Renaissance, elle comprend un corps de  logis rectangulaire, deux petites ailes, ainsi quun étage mansardé dans la partie centrale.","habitants":"Famille Montalier\r\n        \"","divers":"Château du Grand jour g-1à3 et de Grissac à Prignac g-4","gps":"","images":["../../jctruffet.com/image/image_33/33_Prignac_Marcamps_1.jpg","../../jctruffet.com/image/image_33/33_Prignac_Marcamps_2.jpg","../../jctruffet.com/image/image_33/33_Prignac_Marcamps_3.jpg","../../jctruffet.com/image/image_33/33_Prignac_Marcamps_4.jpg"]},"Consult_chateau_formulaire7287":{"id":"Consult_chateau_formulaire7287","dept":"33","canton":"Langon","commune":"Préchac","nom":"Préchac","type":"Château","periode":"XI-XIV-XVII","histoire":"A Préchac deux châteaux celui de Cazeneuve et les vestiges de la Trave, la Salle à Pompéjac  à 1 Km à l'est, et le manoir de Londeix à Captieux.    CAZENEUVE,  du XIe au XVIIe siècle est lancienne résidence des Albret. Il a été reconstruit au XIVe siècle par Amanieu VII d'Albret. Le château médiéval se transforme alors en château de plaisance et d'apparat. En 1583, Henri IV assigna la Reine Margot à résidence dans le château Cazeneuve, lors de leur séparation et en attente de l'annulation de leur mariage. Il a été reconstruit totalement au XVIIe siècle, puis a été restauré régulièrement. En 1595 Henri IV vend le château à son cousin Raymond de Vicose, qui envisage sa reconstruction,  dont la fille  épouse François de Caumont la Force marquis de Castelmoron, passera ensuite par alliance aux Rochefort Théobon puis aux Pons, et en 1835 par alliance passe dans à la famille des Sabran-Pontevès, descendante des d'Albret qui le possède toujours. Il a été classé M.H. le 24 septembre 1965.                         La TRAVE, vestiges d'un château bâti à Préchac, la construction  date du XIVe siècle. Il a été bâti vers 1306 par Arnaud-Bernard de Preyssac, sous le pontificat de Clément V. Il est détruit à coup de mines durant la guerre des religions. Le château est en ruines, aujourd'hui. Les vestiges du château de la Travé sont ouverts au public.                                         A 15 km au sud à Captieux un manoir de Londeix, gîtes de France.","architecture":"LA-SALLE   est une maison forte du début du XIVe, transformée en maison dhabitation au début du XVIIe. Le bâtiment principal comporte un corps de logis encadré à ses extrémités par deux pavillons carrés. On pénètre dans une cour flanquée de deux tours rondes datant du XVIe.  Chambres d'hôtes.                 CAZENEUVE  Il englobait dans son enceinte la motte médiévale du XIe siècle précédée d'une vaste cour dont les murailles protégeaient le bourg.  Au XVIIe siècle, l'édifice subit un important remaniement. Le château médiéval se transforme alors en château de plaisance et d'apparat. Avec de larges ouvertures qui sont percées dans les murs du logis. Le pont -levis commande  l'accès à la cour s'ouvre par un portail à pilastres toscans, des vastes communs s'adosse à la courtine médièvale qui est conservée. Bâtiment de trois niveaux formant les corps de logis avec d'élégantes lucarnes dont les frontons sont alternativement  cintrées et rectangulaires. Les appartements royaux sont meublés d'époque. Le site est composé de grottes troglodytes sous le château et de grandes caves médiévales souterraines. Les parties anciennes sont les fortifications avancées et les douves.                                                                            La TRAVE, son enceinte rectangulaire, protégée par des fossés, disposait à chaque angle dune tour carrée. En son centre s'élevait le donjon dont il ne reste aujourd'hui qu'un seul mur.  les logis sappuient sur trois côtés de courtines, laissant libres une cour intérieure, un donjon avec entrée particulière sélève au centre, ce château est aujourdhui en létat de ruines, mais permet de compléter la visite des châteaux de la région.  Les vestiges font l'objet d'une inscription au titre des M.H.depuis le 22 décembre 1987","habitants":"Roi Henri IV                                                                  famille des Sabran-Pontevès                                    Arnaud-Bernard de Preyssac\r\n        \"","divers":"deux châteaux à Préchac celui de Cazeneuve grav de 4 à 9 et les vestiges de la Trave g-1-2, la Salle à Pompéjac  à 1 Km à l'est, et le manoir de Londeix à Captieux g-3.  \r\nCoordonnées par GPS : 44° 23' 15\" Nord 0° 19' 06\" Ouest","gps":"44° 23' 15\" Nord 0° 19' 06\" Ouest","images":["../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_1.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_2.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_3.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_4.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_5.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_6.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_7.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_8.jpg","../../jctruffet.com/image/image_33/33_Pr%c3%a9chac_9.jpg"]},"Consult_chateau_formulaire9533":{"id":"Consult_chateau_formulaire9533","dept":"33","canton":"Salles","commune":"Pujols sur Ciron","nom":"Pujols_Ciron","type":"Vestiges Tours","periode":"XII-XVI","histoire":"Trois châteaux à Pujols celui de Pujols,de Lasalle, Bossuan Brugnac et de Vaure. A 1 Km au sud-Est château de Ste-Radegonde.                                       PUJOLS, au XVe siècle à la famille des Dufort, seigneurs de Duras jusqu'à la Révolution, le château de Pujols est cédé par les comtes de Roussillon à l'abbaye Sainte-Marie de Fontfroide qui en fait une grange et en reste propriétaire jusqu'au XVe siècle.\r\nLe château de Pujols fait l'objet d'une inscription des M.H. depuis le 2 mai 1956.\r\nLASALLES ayant reçu en fief du roi Jean d'Angleterre, en 1205./ En 1207, Jean de Staples  seigneur de la Salle.  En 1540, nous trouvons la maison noble aux mains de noble Jean de Portepain, écuyer, sieur de la Salle du Ciron, qui avait épousé Jeanne de Montferrant, sur de Pierre de Montferrant. Le manoir présente un plan barlong dont les soubassements et les portes ogivales paraissent être du XIVe siècle. Une tour hexagonale renfermant l'escalier à vis s'appuie contre sa façade nord et une toiture pointue à double égout couronne l'ensemble.\r\nVAURE à quelques kilomètres au Sud, a été construit entre la fin du XVIe et le début du XVIIe siècle ; il est entouré sur trois côtés de douves avec murs d'escarpe et de contrescarpe et se compose de trois corps de bâtiments formant une cour carrée dont trois gros pavillons carrés marquent les angles : dans un angle de la cour, une voûte en anse de panier porte une terrasse munie d'une balustrade de pierre caractéristique du XVIIe siècle.  L'édifice a été inscrit au titre des M.H. par arrêté du 8 novembre 1996 pour ses douves, ses contrescarpes, le sol de sa cour, son portail, ses escaliers intérieurs et ses façades.      ste-Radegonde  La Maison noble de Pilets est une maison noble bâtie à Sainte-Radegonde,  Elle est inscrite aux M.H. depuis 1988. A Sanse  le château du XIIIe siècle transformé en hôtel retaurant Par  Mark Tyler.","architecture":"PUJOLS, vestiges du château Il semblerait quun premier château fort existait déjà au XIIIe siècle ; il assura la défense du site contre les sièges des normands et des seigneurs voisins. De forme rectangulaire, il était flanqué de quatre tours et de hautes murailles. Il a été en partie détruit au XIXe siècle. Les pierres du château ainsi que des remparts sont vendus alors aux entrepreneurs locaux pour la construction de la centrale dEysses. On peut encore observer aujourdhui quelques vestiges du château, notamment la tour nord/est.  Anciennes portes des remparts Les fortifications entouraient le bourg. On compte encore trois accès dont deux portes actuellement : Du château construit aux XIVe et XVe siècles, ils ne restent que le corps de bâtiment est et le mur d'enceinte sud ; il est inscrit au titre des M.H.  en 1925 Le manoir présente un plan barlong dont les soubassements et les portes ogivales paraissent être du XIVe siècle. Une tour hexagonale renfermant l'escalier à vis s'appuie contre sa façade nord et une toiture pointue à double égout couronne l'ensemble.\r\n Bossuan BRUGNAC: édifié à partir du XIVe siècle sur un coteau dominant la Gamage, comprenant un donjon carré à trois niveaux flanqué de contreforts dangle coiffés de calottes, il est relié à un manoir du XVe siècle par un pont mobile.                                    LASALLE Le manoir présente un plan barlong dont les soubassements et les portes ogivales paraissent être du XIVe siècle. Une tour hexagonale renfermant l'escalier à vis s'appuie contre sa façade nord et une toiture pointue à double égout couronne l'ensemble.","habitants":"Noble Jean de Portepain\r\n        \r\n        \"","divers":"Lasalles,Pujols Brugnac 44° 48' 30\" Nord et 0° 01' 52\" Ouest Vaure g-6-7-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Pujols_Ciron_1.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_2.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_3.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_4.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_5.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_6.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_7.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_8.jpg","../../jctruffet.com/image/image_33/33_Pujols_Ciron_9.jpg"]},"Consult_chateau_formulaire64a2":{"id":"Consult_chateau_formulaire64a2","dept":"33","canton":"Coutras","commune":"Saint-Cibard","nom":"Puygueyraud","type":"Château","periode":"XVII","histoire":"PUYGUEYRAUD,  au Moyen-Age fief des vicomte de Castillon Cette famille de négociants flamands investit dès 1924 dans le vieux château Certan à Pomerol et en 1920 à Troplong Mondot à Saint-Emilion (revendu en 1935). A la génération suivante, en 1946, George et Monica Thienpont, venant de Flandre, sinstallent à Puygueraud et restaurent le château datant du XVe siècle. La propriété est acquise par George Thienpont en 1946. Depuis 1983, cest son fils Nicolas qui l'exploite, château Puygueraud est devenu, depuis, la propriété « phare » des côtes de Francs et une référence dans le renouveau de cette appellation encore trop méconnue.  Cest maintenant un des fils de George, Nicolas, qui élabore les vins des différentes propriétés.","architecture":"Puygueyraud du XVIIe siècle se compose avec un colombier imposant et d'autres bâtiments de servitude anciens. les corps de logis en deux bâtiments très simples en équerre s'articulent sur une tour hexagonale coiffée d'un toit aigu en tuiles plates une girouette en fer forgée la domine.","habitants":"Famille de George Thienpont\r\n        \"","divers":"Château de Puygueyraud","gps":"","images":["../../jctruffet.com/image/image_33/33_Puygueyraud_1.jpg","../../jctruffet.com/image/image_33/33_Puygueyraud_2.jpg","../../jctruffet.com/image/image_33/33_Puygueyraud_3.jpg","../../jctruffet.com/image/image_33/33_Puygueyraud_4.jpg"]},"Consult_chateau_formulaireacb7":{"id":"Consult_chateau_formulaireacb7","dept":"33","canton":"Pineuilh","commune":"Aillas","nom":"Péricots","type":"Vestiges -Châteaux","periode":"XII-XVI","histoire":"AILLAS,  forme dès 1341 une seigneurie qui appartint à la maison d'Albret. Henri IV en hérite à la mort de sa mère et cette vicomté d'Aillas incluse dans le duché d'Albret devient apanage de la couronne. En 1653, sous Louis XIV, ledit duché est échangé contre la principauté de Sedan appartenant au duc de Bouillon.\r\nÀ la Révolution, la paroisse Notre-Dame d'Aillas (ou du Grand-Aillas) et son annexe, Saint-Martin d'Aillas-le-Vieux, les paroisses Saint-Martin de Monclaris et Saint-Pierre de Sigalens forment la commune d'Aillas. En l'an III (1794-1795), la commune d'Aillas est démembrée pour former la commune de Labescau. En 1851, la commune d'Aillas est démembrée de ses sections d'Aillas-le-Vieux, Monclaris et Sigalens pour former la commune de Sigalens. Le château d'Aillas ne subsiste qu'à l'état de ruines qui ont été classées MH en 1886.\r\nLe château des PERICOTS domine la vallée de la Bassanne et le village. Ses origines remonte au XVIIIe siècle (1717), construit par Bernard de Gascq, seigneur de la Roche, pour sa jeune épouse Isabeau de Lamouroux. Vendu comme bien national à la Révolution, il a été rachetée vers 1800 par la famille de Gascq. Il a été rehaussé de deux tours au XIXe siècle. Il connut une période d'abandon des années 1950 à 1987, date à laquelle il fut racheté et restauré par la famille de Bueger. Chambres d'hôtes. \r\nLe château de VERDUZAN (1670-1865), ancienne résidence de la famille de La Vaissière de Verduzan.","architecture":"A AILLAS, vestiges du château de Péricots  et nouveau petit château du XVIIIe siècle, rempli de charme, domine une vallée calme et sauvage en plein coeur de la Gironde. de plan oblong, rectangulaire d'une dizaine de travées à deux niveaux toit en croupes accolés de tours carrées à trois niveaux toit à quatre pans sur la façade opposée avec retour en équerre pour les dépendances. Il vous réserve un décor agréable et hors du temps. Un havre de verdure, de sérénité où l'âme et le corps peuvent jouir d'un vrai repos.","habitants":"Famille de Gascq\r\n        \"","divers":"Château de Péricots à ALLIAS","gps":"","images":["../../jctruffet.com/image/image_33/33_P%c3%a9ricots_1.jpg","../../jctruffet.com/image/image_33/33_P%c3%a9ricots_2.jpg","../../jctruffet.com/image/image_33/33_P%c3%a9ricots_3.jpg","../../jctruffet.com/image/image_33/33_P%c3%a9ricots_4.jpg"]},"Consult_chateau_formulaire419d":{"id":"Consult_chateau_formulaire419d","dept":"33","canton":"Lesparre-Médoc","commune":"Germalian","nom":"Queyrac","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux à Germalian celui de Queyrac, st-Hilaire de Germeillan.  De Bernon maison de retraite, de  Guidon du XIX siècle plan, de Carcanieux de 1881 et du Mouva  de 1861.                                                  SAINT-HILAIRE est reconnu Cru Bourgeois. C'est à partir de 1982 qu'Adrien Uutevaal. Puis, il fait l'acquisition en 1986 , d'une maison de maîtres de la fin du XVIIIe siècle, entourée d'anciens  bâtiments d'exploitation\r\n LALANDE DE GRAVELONGUE pas d'information.","architecture":"BERNON  un étage carré  gros-oeuvre   pierre ; revêtement    toit à longs pans ; pignon découvert  \r\nrecouvert de  tuile mécanique.                                   GUIDON plan régulier   élévation  ordonnancée  \r\nà  un étage carré, le  gros-oeuvre   calcaire   couverture    toit à longs pans brisés ; croupe   couverture   ardoise ; tuile plate                                CARCANIEUX  un étage carré  de pierre accolé d'une  tour ronde,   l'édifice couvert  d'un toit à longs pans en croupe, en  ardoise et tuile creuse.                               MOUVA étage carré   escaliers   escalier hors-oeuvre : escalier en vis avec jour  gros-oeuvre  en brique   toit conique ; toit à longs pans ; croupe ; toit en pavillon  couverture   ardoise ; tuile creuse                                  St-ROCH de pla rectangulaire sur soubassement à deux niveaux et série de lucarnes sur combles à toit brisée recouvert d'ardoises, avant corps de trois travées d'entrée légèrement saillant sur refends et lucarnes imposantes avec aileron et pinacle triangulaire","habitants":"Adrien Uutevaal\r\n        \"","divers":"à Queyrac château de st-Hilaire Bernon , Guidon ,  Carcanieux g-1 , et du Mouva g 4-5-6","gps":"","images":["../../jctruffet.com/image/image_33/33_Queyrac_1.jpg","../../jctruffet.com/image/image_33/33_Queyrac_2.jpg","../../jctruffet.com/image/image_33/33_Queyrac_3.jpg","../../jctruffet.com/image/image_33/33_Queyrac_4.jpg","../../jctruffet.com/image/image_33/33_Queyrac_5.jpg","../../jctruffet.com/image/image_33/33_Queyrac_6.jpg","../../jctruffet.com/image/image_33/33_Queyrac_7.jpg"]},"Consult_chateau_formulairecbb4-2":{"id":"Consult_chateau_formulairecbb4-2","dept":"33","canton":"Créon","commune":"Quinsac","nom":"Quinsac_33","type":"Château","periode":"XIV-XV","histoire":"Trois châteaux à Quinsac celui de Boulbène,  de Péconnet et de Vergoubert.                                  BOULBENE, maison noble connue depuis le XIVe siècle, détruite et reconstruite au milieu du XIXe siècle par les frères Perrier, architectes bordelais, attribution et datation par travaux historiques.                     PECONNET, actuel musée local du mur de l'Atlantique, est un édifice représentant l'un des rares exemples de demeure de la première moitié du XVIIe siècle conservé en Bordelais.                        VERGOUBERT, dans l'ancien château du XVe siècle, dont il subsiste deux tours d'enceinte, naquit en 1687 Antoine d'Aydie qui, familier de la duchesse du Maine, ourdit un complot avec l'ambassadeur d'Espagne pour faire emprisonner Philippe d'Orléans et le remplacer par Philippe V d'Espagne. Le complot fut découvert mais Antoine d'Aydie eut le temps de gagner l'Espagne où, en reconnaissance, Philippe V le nomma vice-roi de Castille. Amnistié, il revint vers 1730 et construisit le château actuel.","architecture":"Peconnet, cette  demeure remplaçe un édifice du début du 4e quart du XVIe siècle, la date de 1577 est portée sur une pierre à l'intérieur de l'édifice ; bâtie à la fin du 2e quart du XVIIe siècle comme l'indique la date portée 1642 sur la porte de l'ancienne chapelle, confirmée par le style très maniériste de l'ensemble  Les façades, les toitures du château et l'entrée de la citerne sont classés au titre des M.H. par un arrêté du 14 février 2005.  Edifice représentant l'un des rares exemples de demeure de la première moitié du XVIIe siècle conservé en Bordelais. Le décor sculpté architectural, a été puisé dans les recueils d'ornemanistes.","habitants":"Antoine d'Aydie\r\n        \"","divers":"Château de Boulbéne  et de Péconnet à Quinsac","gps":"","images":["../../jctruffet.com/image/image_33/33_Quinsac_33_1.jpg","../../jctruffet.com/image/image_33/33_Quinsac_33_2.jpg"]},"Consult_chateau_formulaire7832":{"id":"Consult_chateau_formulaire7832","dept":"33","canton":"Castillon la Bataille","commune":"Rauzan","nom":"Rauzan","type":"Vestiges forteresse","periode":"XIII","histoire":"RAUZAN est un ancien château fort  construit au XIIIe siècle, existence d'une seigneurie. Au début du XIIIe siècle, le site est possession du Roi d'Angleterre : Jean Sans Terre. Ce dernier fait construire une forteresse puis confie la seigneurie à son \"Balistarius\"  nommé : Ferrand. En 1225, le Roi d'Angleterre Henri III après avoir récupéré la seigneurie de Rauzan, la confie à Hélie Rudel II, dit Le Vieux, seigneur de Bergerac, de Gensac, de Mouleydier, de Pujol,  au début du XIVe siècle, Guilhem-Raymond de Gensac, un des héritiers de Hélie, fait reconstruire une partie du château. \r\nEn 1313, Guilhem-Amanieu de Madaillan, gendre de Guilhem-Taymond, devient seigneur de Rauzan. En 1377, l'armée Royale commandée par Bertrand Du Guesclin, attaque puis s'empare du château. En 1437 la seigneurie est donné par Henri V d'Angleterre à Bernard Angevin qui la fera passer  en 1445  à la maison de Durfort  par l'alliancce de l'héritière  des Angevin avec  Jean de Durfort  seigneur de Duras qui conserveront le domaine  jusqu'au XIXe siècle. en 1900 le château et acquit par la commune Il est classé aux M.H. depuis 1862.","architecture":"Rauzan, construit par la couronne anglaise au XIIIe siècle,  fut restauré dans le style gothique après la guerre de cent ans. l'entrée était protégée par plusieurs éléments défensifs : une barbacane aujourd'hui disparue contrôlait l'accès au pont-levis et au château ; à l'avant de celle-ci existait un autre pont-levis également disparu ; les fossés, secs car on ne pouvait les alimenter en eau entourent les remparts ; la porte était protégée par une herse, une échauguette à sa gauche un imposant donjon, voûte en palmier dans la tour d'honneur. les  héritiers de Hélie, fait reconstruire une partie du château. Aménagement d'un donjon de 4 étages au sud de la forteresse. Au début du XVe siècle, le château est la cible de nombreuses attaques durant la Guerre de Cent Ans.  Au milieu du XVe siècle, les défenses du château sont remaniées. Au XVe siècle, un escalier à vis est aménagé pour desservir les étages du logis. Au XVIe siècle, construction d'un joli bâtiment nommé : Le logis des Dames. En 1649, le château est remanié pour devenir une résidence de confort \"moderne\". Au XIXe siècle, le château abandonné a comme futur : Une ruine oubliée. Vers 1900, la commune de Rauzan devient propriétaire du château. A partir de 1990, une association de sauvegarde redonne vie à cette magnifique ruine.","habitants":"Guilhem-Raymond de Gensac\r\n        \"","divers":"Rauzan   44° 46' 50\" Nord et 0° 07' 36\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Rauzan_1.jpg","../../jctruffet.com/image/image_33/33_Rauzan_2.jpg","../../jctruffet.com/image/image_33/33_Rauzan_3.jpg"]},"Consult_chateau_formulaire9b8a":{"id":"Consult_chateau_formulaire9b8a","dept":"33","canton":"Ambarès et Lagrave","commune":"Saint-Loubés","nom":"Reignac","type":"Château","periode":"XVI","histoire":"REIGNAC, château du XVIe siècle ont été hissés parmi les meilleurs Bordeaux par les propriétaires actuels qui nont quun seul et unique but : assurer la pérennité du patrimoine nologique français. Grâce aux nombreuses transformations quil a subi au cours des siècles. Depuis son rachat en 1990, Yves et Stéphanie Vatelot ont tout mis en uvre pour hisser Reignac au niveau des plus grands Bordeaux. Entourés des meilleurs conseillers comme le talentueux oenologue Michel Rolland, ils ne cessent de soigner la propriété et dinnover.","architecture":"Reignac, notre découverte continuera dans le spacieux parc de Reignac, préservé depuis le  XVe siècle, et nous nous promenons entre des arbres centenaires, témoins de notre passion. Tombé sous le charme du château de Reignac, Gustave Eiffel dessina une remarquable serre, située au coeur du parc. Derrière la serre nous découvrons notre grand potager où vous pouvez pique-niquer sur demande. Un pigeonnier du XVIe siècle est la dernière, mais non la moindre étape de la visite.","habitants":"Yves et Stéphanie Vatelot\r\n        \"","divers":"Château de Reignac","gps":"","images":["../../jctruffet.com/image/image_33/33_Reignac_1.jpg","../../jctruffet.com/image/image_33/33_Reignac_2.jpg","../../jctruffet.com/image/image_33/33_Reignac_3.jpg","../../jctruffet.com/image/image_33/33_Reignac_4.jpg"]},"Consult_chateau_formulaire99e0-2":{"id":"Consult_chateau_formulaire99e0-2","dept":"33","canton":"Cadillac","commune":"Rions","nom":"Rions","type":"Citadelle","periode":"XIII","histoire":"RIONS, en 1295, la ville est assiégée et prise par Charles de Valois comte de Valois qui rase les défenses existantes. Édouard III d'Angleterre reprend la cité en 1313 et autorise Guillaume Seguin, seigneur de Rions, à entourer la ville de remparts. Rions devient ainsi un des fortins anglais de Guyenne. De par son adhésion, en 1379, à l'alliance bordelaise de défense contre les troupes françaises, la ville fortifiée de Rions fut qualifiée de filleule de Bordeaux ; cette alliance favorisa de nombreux échanges commerciaux avec la capitale girondine par le biais de la Garonne. Sur la fin de la guerre de cent ans, en 1451, soit deux ans avant la bataille de Castillon, la cité tombe aux mains des troupes françaises et se soumet au roi Charles VII. À la Révolution, la paroisse Saint-Seurin de Rions forme la commune de Rions.","architecture":"RIONS, enceinte bâtie en 1330 par Guillaume Seguin, seigneur de Rions, classée au titre des M.H. en 1862, et dont restent aujourd'hui : la tour du Lhyan, imposante entrée sud de la ville, restaurée en 1881, la Citadelle, tour carrée datée du XIVe siècle, dressée face à la Garonne et vestige d'un ensemble défensif important, les remparts du flanc ouest de la cité, attenants à la citadelle et au pied desquels se trouve la grotte dite Charles VII et sa source où le roi serait venu se reposer et se désaltérer après la bataille de Castillon. La tour du Guet dans une petite rue à l'arrière de l'église Saint-Seurin, deux fossés parallèles séparés par une étroite langue de terre surmontée d'un chemin de ronde, à proximité de la tour du Lhyan. Halle dite « aux petits pois », du XVIIIe siècle, à l'angle de la rue Lavidan et de la rue des Remparts.","habitants":"Famille de Guillaume Seguin\r\n        \"","divers":"Citadelle de Rions","gps":"","images":["../../jctruffet.com/image/image_33/33_Rions_1.jpg","../../jctruffet.com/image/image_33/33_Rions_2.jpg","../../jctruffet.com/image/image_33/33_Rions_3.jpg","../../jctruffet.com/image/image_33/33_Rions_4.jpg","../../jctruffet.com/image/image_33/33_Rions_5.jpg","../../jctruffet.com/image/image_33/33_Rions_6.jpg"]},"Consult_chateau_formulaire58ab-2":{"id":"Consult_chateau_formulaire58ab-2","dept":"33","canton":"Libourne","commune":"La Rivière","nom":"Rivière_Libourne","type":"Château","periode":"XVI","histoire":"LA RIVIERE  bâti à Fronsac, en 1802 sieur Labitte  achète le château,  il le vend à son avocat, Massé de Cormeille. En 1817 à Nicolas Antoine Massé de Cormeille, et sa femme Louise. Ils ont un fils Alexandre. Le domaine passa  à Alexandre Massé de Cormeille (né en 1796, mort le 28/01/1880). Victorine Gaboré (Madame Fuinel), hérite comme légataire universelle. Mariée après cet héritage au colonel Jean François Fuinel. Fin des Travaux en 1891. Pour mémoire Viollet-le-Duc est mort en 1879. Mort du Colonel Fuinel en 1897 et de madame Fuinel en 1904. Décembre 1899  Jacques Paulin de Cazeuneuve achète le château. Fin 1903 passa à René Mortier. En 1925 Emile Balluteaud, achète le château. En 1962 passa à Jacques Borie. Il a 2 enfants. Mais face à des difficultés financières, il est contraint de vendre la proprité en septembre 1994 à Jean Leprince. Le château est dirigé par sa fille Valérie et son gendre Xavier Péneau. Le château de la Rivière est frappé par un drame pour la seconde fois. Le propriétaire du domaine, un milliardaire chinois, Lam Kok, est victime d'un accident d'hélicoptère. Il venait tout juste d'acquérir le château ,  L'homme préside le groupe Brillant, spécialisé dans le négoce de thés prestigieux et l'immobilier de luxe. Il était à bord de l'hélicoptère avec son fils âgé de 12 ans ainsi qu'un interprète. Aux commandes se trouvait James Grégoire, ancien propriétaire des lieux avec qui, il venait de conclure la vente. Sinistre coïncidence, le précédent propriétaire du château de La Rivière lui appartenant, Jean Leprince, avait, en février 2002, trouvé la mort à l'âge de 66 ans dans un accident d'avion. Le pilote et le copilote du Cessna bimoteur avaient également été tués lorsque l'avion s'était écrasé peu après son décollage de l'aérodrome d'Artigues-de-Lussac, près de Libourne.","architecture":"Rivière, en 2003, James Grégoire avait racheté la propriété. Vendredi, le survol en hélicoptère devait ponctuer une journée de célébrations de la vente du château conclue jeudi,  Le groupe Brillant, qui possède quatre Relais et châteaux en Chine, dont un, immergé au milieu des plantations de thé de Puer, voulait avoir son pendant dans le Libournais, avait précisé le maire de Libourne, Philippe Buisson. La société est également propriétaire d'autres établissements hôteliers de luxe, de plantations de thés et de divers centres commerciaux.  Château de plan en U à deux niveaux pour les corps de logis intercalés en bout et à l'angle intérieur de tours carrées à créneaux et occulus, ces tours sont accolés de tourelles rondes à toit en poivrières,  la tour centrale est relié par une magnifique  galerie.","habitants":"James Grégoire                                                        Colonel Jean François Fuinel\r\n        \"","divers":"Château de la  Rivière 44° 56' 49,11\" Nord et 0° 18' 45,61\" Ouest  Musseau g-8","gps":"","images":["../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_1.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_2.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_3.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_4.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_5.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_6.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_7.jpg","../../jctruffet.com/image/image_33/33_Rivi%c3%a8re_Libourne_8.jpg"]},"Consult_chateau_formulaire7114":{"id":"Consult_chateau_formulaire7114","dept":"33","canton":"Saint-André de Cubzac","commune":"Saint-André de Cubzac","nom":"Robillard","type":"Château","periode":"XVII","histoire":"ROBILLARD, en 1341, Édouard III dAngleterre érigea la terre du Cubzaguais en châtellenie et la donna à Bérard III dAlbret, en raison de services rendus. Un peu plus dun siècle plus tard, après la victoire de Castillon en 1453, les places anglaises revenaient à la France et Cubzac dont la vocation à lorigine était principalement militaire navait plus véritablement de raison dexister. Suite à ce déclin, le siège de la châtellenie se déplaçait du château de Cubzac à la maison noble du Bouilh, qui donnait à la région une impulsion nouvelle, à dominante clairement économique. Elle  devint si prospère que le puissant voisin, le marquis de Fronsac, chercha plus tard à lacquérir, en vain. Les guerres de religion ont sévi dans cette zone. Au cours de la période de la convention nationale (1792-1795), la commune a adopté le nom révolutionnaire de Montalon.","architecture":"ROBILLARD, petit manoir du XVIIe siècle, entouré d'un parc aux essences d'arbres variées. Le corps de logis rectangulaire, percé de fenêtres à meneaux, accueille une tour octogonale au milieu de la façade, ainsi qu'un cadran solaire de 1640 Le cur de la ville était alors symbolisé par une magnifique halle de pierre, construite vers 1780 par Jean de La Tour Gouvernet, lieutenant-général de la région, halle malheureusement démolie depuis. L'ancien petit port de Plagne, qui a connu un certain succès grâce à la pêche et au transport de marchandises a subi de plein fouet la concurrence des moyens de transports modernes. Il connaît depuis quelques années un certain renouveau en raison, entre autres, de la navigation de plaisance. Appartient à la commune.","habitants":"Seigneur locaux\r\n        \"","divers":"Robillard à st andré de Cubzac : 45° 0' 33,48\" Nord, 0° 27' 20,88\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Robillard_1.jpg","../../jctruffet.com/image/image_33/33_Robillard_2.jpg","../../jctruffet.com/image/image_33/33_Robillard_3.jpg"]},"Consult_chateau_formulaire7167":{"id":"Consult_chateau_formulaire7167","dept":"33","canton":"Cadillac","commune":"Romagne","nom":"Romagne_33","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Romagne celui de Romagne et celui de Laubesc.                                                        SAUVAGNAC, bâti à Romagne, ancienne maison forte, édifié au XIVe siècle, le château est situé au nord du bourg, dans un écart nommé Sauvagnac, mitoyen de celui des Cailloux du Bas, (Faleyras à l'ouest et Bellefond à l'est)a été inscrit au titre des M.H. par arrêté du 13 octobre 1992. Le château de Sauvagnac est privé.                                        LAUBESC à deux Km au sud-Est  Cessac,  a été rénové et agrandi au XIXe siècle, par l'ajout de deux tours dans un style Viollet-le-Duc. C'est devenu une maison d'hôtes.","architecture":"SAUVAGNAC,  château est situé au nord du bourg, dans un écart nommé Sauvagnac, la construction  correspond à l'époque du règne d'Edouard II d'Angleterre. La transmission se fait uniquement par les femmes depuis la fin du XIIIe. maison forte rectangulaire édifiée au début du XIVe siècle et remaniée au XVIe siècle, édifié au XIVe siècle sur un éperon barré, pour son corps de logis et sa tour,  dans une minuscule enceinte protégée par un fossé. Le château, édifié au XVIe siècle sur un éperon barré, son enceinte triangulaire avec sa porte, son fossé et son mur de clôture, le château est composé d'un logis rectangulaire qui s'élève à plus d'une dizaine de mètres de haut. Deux niveaux de fenêtres à meneaux percent la façade sud. La tour semi-circulaire appuyée contre le côté nord abrite l'escalier en pierre  qui dessert les trois étages, les combles n'étant plus accessibles. La charpente en forme de nef retournée est apparente depuis la réfection de la toiture à la fin du XXe siècle.                                                   LAUBESC, corps de logis à deux étages de plan rectangulaire entre deux tours carrées à trois niveaux ces derniers sont accolées de tours rondes celle de droite avec une échauguette en encorbellement et celle de gauche une tour carrée crénelée.","habitants":"Seigneurs locaux\r\n        \"","divers":"Sauvagnac 44° 46' 14,58\" Nord et 0° 11' 59,85\" Ouest               Laubesc  44° 44' 38\" Nord, 0° 10' 37\" Ouest","gps":"","images":["../../jctruffet.com/image/image_33/33_Romagne_33_1.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_2.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_3.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_4.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_5.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_6.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_7.jpg","../../jctruffet.com/image/image_33/33_Romagne_33_8.jpg"]},"Consult_chateau_formulairee460":{"id":"Consult_chateau_formulairee460","dept":"33","canton":"Langon","commune":"Mazères-en-Roquetaillade","nom":"Roquetaillade","type":"Forteresse","periode":"XII","histoire":"ROQUETAILLADE, abrite deux châteaux l'un ruiné, l'autre restauré au XIXe siècle qui furent le siège d'une puissante seigneurie.  Au Début du XIVe siècle avec la permission du roi Édouard Ier d'Angleterre, le cardinal Gaillard de la Mothe, neveu du pape Clément V, bâtit une deuxième forteresse à Roquetaillade : le « château Neuf », La dernière construction fut l'élévation de la tour-porte en 1305,  Depuis le XIe siècle, le château  est resté dans la même famille et cela, jusqu'à aujourd'hui. C'est en 1864 que la famille Leblanc de Mauvesin décide de remettre en état le bâtiment et de le transformer en « rêve médiéval ». Pour cela, elle fit appel à Viollet-le-Duc sur le c
