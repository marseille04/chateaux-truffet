de dame Thérèse Eugénie Françoise Geneviève Du Moulin (veuve de Jean Charles Louis Joseph De Mallière, comte de Chassonville) en 1756. Le 6 décembre 1811, Denys Charles de Saint Genys et dame Marie Henriette Jeanne Robinault son épouse, héritiers de dame du Moulin de Chassonville, aïeule de la dite dame de Saint Genys, vendent la terre du Plessis à M. Hervé, ancien banquier, demeurant à Belleville (Seine). Le 6 décembre 1839, Mme Marie Joséphine Caroline Granry, veuve de M. Louis Hervé, cède à M. Adolphe Robin-Morhery (médecin de Loudéac) la terre du Plessis-Boudet, trois métairies (environ 75 hectares) et le manoir du lieu. Suite à une saisie sur la famille Robin-Morhery, le domaine du Plessis-Boudet est vendu aux enchères le 31 août 1860 à Joseph Gourdin (négociant de Saint-Brieuc. Le domaine est agrandie le 28 mai 1861 par l'achat de six fermes proches du Plessis, puis cédé par héritage à la famille Renoux en 1957.","habitants":"Ville; Famille de Jacques de Kerguezengor               Plessis;  famille Robin-Morhery\"","divers":"Trois châteaux à Loudéac celui de Loudéac gra-1-2-3-, de Plessis -Boudet grav -4 et Ville Audrain.                                                                    GPS : 48° 10' 40\" Nord, 2° 45' 14\" Ouest","gps":"48° 10' 40\" Nord, 2° 45' 14\" Ouest","images":["../../jctruffet.com/image/image_22/22_Loud%c3%a9ac_1.jpg","../../jctruffet.com/image/image_22/22_Loud%c3%a9ac_2.jpg","../../jctruffet.com/image/image_22/22_Loud%c3%a9ac_3.jpg","../../jctruffet.com/image/image_22/22_Loud%c3%a9ac_4.jpg"]},"Consult_chateau_formulaire3009-2":{"id":"Consult_chateau_formulaire3009-2","dept":"22","canton":"Plélo","commune":"Plouvara","nom":"Madeleine","type":"Château","periode":"XX","histoire":"La MADELEINE,  Les Le Borgne tinrent Créheren jusque dans la seconde moitié du XIVème siècle, où une héritière de cette branche, Marguerite, épousa Geoffroy de La Lande, amiral de Bretagne (Note : Cette famille est ancienne en Bretagne. Un La Lande figure dans la fondation de la Madeleine du Pont de Dinan ; outre le problème de Michel Bodin, amoureux de sa femme. Le 7 janvier, après la décision du Juge de placer Michel Bodin sous contrôle judiciaire, le parquet de Saint-Brieuc, qui avait demandé son incarcération, avait fait appel de la décision. Avec son décès samedi, laction de la justice s'est éteinte.","architecture":"La MADELEINE,  château perché au sommet d'une colline, sur la route qui serpente entre Châtelaudren et Quintin  construit au début du XXe siècle. Edifice de plan massé, le corps principal étant marqué par plusieurs saillies différenciées au niveau des toitures par une couverture en pavillon, ou à demi-croupe. Tour carrée sur la façade postérieure. Elévation en moellon avec encadrements de baies en pierre de taille. Entrée surmontée par un porche couvert. Niche à statue. Le château possède un étage de soubassement, un rez-de-chaussée surélevé, un étage carré et un étage de comble. Le rez-de-chaussée est composé de salons, les chambres se partageant l'étage. La propriété dispose d'un manège pour les chevaux et d'une trentaine d'écuries. Chambres d'hôtes.","habitants":"Michel Bodin\"","divers":"Château de la Madeleine  à Plouvara                                                           GPS : 48° 30' 28\" Nord, 2° 54' 51\" Ouest","gps":"48° 30' 28\" Nord, 2° 54' 51\" Ouest","images":["../../jctruffet.com/image/image_22/22_Madeleine_1.jpg"]},"Consult_chateau_formulaire7525":{"id":"Consult_chateau_formulaire7525","dept":"22","canton":"Trégueux","commune":"Hillion","nom":"Marais_Hillion","type":"Château","periode":"XIX","histoire":"MARAIS, il fut construit en 1893. Le début de sa construction date du XIXe siècle. Il est de style néo-gothique. Daniel de la Motte Rouge indique que la construction du château des Marais fut achevée, en 1901, pour Angélique de Lourmel, petite-fille de Louis-Toussaint Sébert, négociant et armateur à Saint-Brieuc, sur l'emplacement d'un ancien château appartenant aux Familles de la Villéon du XVe au XVIIIe siècles puis Chappedelaine à une date inconnue. De 1940 à 1944, il était occupé par les Allemands. En 1990, le château des Marais est laissé à l'abandon. En 1996, il est racheté et rénové.","architecture":"MARAIS,  le château des Marais se trouve à 200 mètres des grèves. De style néo-gothique, le château des Marais présente un plan rectangulaire allongé, ouvert sur les quatre côtés, appareillé de granite en pierre de taille. Façade antérieure flanquée de 2 corps de bâtiments secondaires de plan carré. Travée centrale couronnée d'un toit en pavillon, à avant-corps en forme de châtelet flanqué de 2 tourelles en encorbellement. Ses dépendances comprennent une ferme construite en granite et brique sur un plan à deux corps en équerre, des écuries du même. Ses anciennes douves sont encore visibles, tour circulaire à l'arrière. Ferme à l'arrière, construite en granite et brique sur un plan à deux corps en équerre. Ecuries à l'ouest du corps de logis construites en granite et brique, composées d'un bâtiment de plan massé à un étage carré flanqué de deux ailes latérales basses couvertes d'un comble à surcroît.","habitants":"Famille de des Lourmel,\"","divers":"château du Marais à Hillion                                    GPS : 48° 30' 17\" Nord, 2° 40' 16\" Ouest","gps":"48° 30' 17\" Nord, 2° 40' 16\" Ouest","images":["../../jctruffet.com/image/image_22/22_Marais_Hillion_1.jpg","../../jctruffet.com/image/image_22/22_Marais_Hillion_2.jpg"]},"Consult_chateau_formulairecc39":{"id":"Consult_chateau_formulairecc39","dept":"22","canton":"Pléneuf-Val-André","commune":"Martignon","nom":"Martignon","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Martignon celui de Chenaye et la Vigne. CHESNAYE-TANIOT, la construction  date du XVIIe siècle-XVIIIe siècle, construit entre 1683 et 1689 pour Louis de Tréméreuc, conseiller au parlement de Bretagne, le manoir de la Chesnaye-Taniot est inscrit à l'Inventaire supplémentaire des M.H. depuis le 11 juin 1964. Il fut acquis en 1719 par François de la Moussaye.                                                                       La VIGNE manoir  du XVI-XVIIe siècle, édifié par la famille de La Vigne de Saint-Germain, en 1691. Propriété de Bertrand de La Vigne en 1536 et de François de La Vigne en 1569. A partir du XVIIIe siècle, la demeure est la propriété successive des familles Miniac de La Ville-ès-Nouveaux, La Motte de Beaumanoir, La Forest d'Armaillé, Palys et Bernard de La Vieuxville. Le manoir possède un escalier à vis du XVe siècle. La grange date du XVIIe siècle et l'étable date du XVIIIe siècle. On y voit aussi deux puits ainsi que deux portails, datés de 1758 et 1776 ; le manoir de la Vigne est un manoir bâti à Matignon. L'édifice se compose d'un grand corps rectangulaire avec adjonction d'une tourelle de plan carré au nord. A l'origine, le plan montre une symétrie (porte centrale entourée de deux travées de fenêtres au rez-de-chaussée, premier étage et l'étage de lucarnes. Actuellement, il n'en reste que la travée Est et la porte.","architecture":"CHESNAYE-TARIOT, occupe une position isolée au nord-nord-ouest du bourg de Matignon, dont il est distant de 700 mètres. Desservi par une allée frontale accentuant le caractère monumental de l'édifice, il comprend un grand corps de logis de style classique et des dépendances édifiés en moellons de granite et schiste. Le corps de logis, de type malouinière, comprend un corps de bâtiment principal divisé par deux murs de refend montant de fond en comble et portant souche de cheminée. La façade antérieure, qui est ornée d'une corniche, est rythmée par cinq travées de baies régulières affirmées chacune par une lucarne à fronton-pignon cintré. La porte d'entrée est en plein-cintre et les linteaux des baies sont cintrés. Il est couvert d'un toit à croupes à égout retroussé. Chaque mur de croupe porte une souche de cheminée élancée talutée à la base. Deux corps de bâtiment coiffés d'un toit à croupe sont greffés sur la façade postérieure. Le corps de bâtiment de droite, dont l'élévation principale est rythmée par trois travées de baies jumelées et dont l'axe du toit est placé au droit de la souche de cheminée placée au faîte du toit principal, présente un conduit de cheminée demi-hors-oeuvre montant de fond. Le corps de bâtiment de gauche abrite un escalier monumental tournant à retours avec jours en maçonnerie, à balustres de section carrée.","habitants":"Chesnaie ;Famille de Louis de Tréméreuc       Vigne ;Famille de Bertrand de La Vigne \"","divers":"Deux châteaux à Martignon  celui de Chenaye  grav-1 et la Vigne grav-2-3                                                              Chesnaye GPS : 48° 36' 15\" Nord, 2° 18' 1\" Est                                                                      Vigne GPS : 48° 35' 48\" Nord, 2° 17' 26\" Ouest","gps":"48° 36' 15\" Nord, 2° 18' 1\" Est","images":["../../jctruffet.com/image/image_22/22_Martignon_1.jpg","../../jctruffet.com/image/image_22/22_Martignon_2.jpg","../../jctruffet.com/image/image_22/22_Martignon_3.jpg"]},"Consult_chateau_formulaire550c":{"id":"Consult_chateau_formulaire550c","dept":"22","canton":"Lanvallay","commune":"St-Juvat","nom":"Mettrie","type":"Château","periode":"XVIII","histoire":"LA METTRIE, le château de la Mettrie fut reconstruit en 1787 sur le site d'un ancien manoir du XVe siècle dont subsistent quelques vestiges, en particulier l'arcade d'un ancien corps d'entrée intégré dans les communs. L'actuel logis présente une longue façade sans ressaut de neuf travées réparties par deux. Les lucarnes identiques sont établies au droit de chaque travée et seul un oeil de boeuf inscrit dans un fronton curviligne marque la travée axiale. Ce fronton est surmonté d'un toit aigu à l'impériale que l'on retrouve, plus étiré, à l'aplomb de la travée axiale de la façade postérieure. L'ensemble des faîtages est traité en lignolet. Les toits à l'impériale sont surmontés d'épis de faîtage en plomb représentant des colombes en vol. Le colombier, l'important développement du logis ainsi que le traitement particulier de la travée axiale, la hauteur sous étage correspondent au statut du lieu, siège de la principale seigneurie de la paroisse à la veille de la Révolution. Malgré tout, la façade postérieure, quasiment aveugle reprend un principe commun à l'ensemble des autres maisons du XVIIIe siècle des environs.","architecture":"LA METTRIE, le lieu mentionné parmi les anciens fiefs de la paroisse, relevait de la seigneurie de la Vallée à Plumaudan. Les dépendances au nord de l´actuel logis conservent les vestiges d´un ancien corps d´entrée remontant au XVe siècle. Le colombier circulaire date du XVIIe siècle. Le logis actuel a été reconstruit en 1787. La ferme construite vers le milieu du XIXe siècle à l´est du site, remploie plusieurs éléments de l´ancien manoir dont une belle porte en arc brisé remontant au XVe siècle ainsi que deux cheminées à corbelets chanfreinés. L´ancien corps d´entrée, au nord de l´actuel logis a conservé une ancienne porte charretière murée. Le logis reconstruit en 1787 présente une longue façade sans ressaut de neuf travées réparties par deux. Les lucarnes identiques sont établies au droit de chaque travées, seule un oeil de boeuf inscrit dans un fronton curviligne marque la travée axiale. Ce fronton est surmonté d´un toit aigu à l´impériale que l´on retrouve, plus étiré, à l´aplomb de la travée axiale de la façade postérieure. L´ensemble des faîtages est traité en lignolet. Les toits à l´impériale sont surmontés d´épis de faîtage en plomb représentant des colombes en vol.","habitants":"\"","divers":"Château de la Mettrie grav-1-2 à Lanvallay grav 3 à Louets","gps":"","images":["../../jctruffet.com/image/image_22/22_Mettrie_1.jpg","../../jctruffet.com/image/image_22/22_Mettrie_2.jpg","../../jctruffet.com/image/image_22/22_Mettrie_3.jpg"]},"Consult_chateau_formulaire69c6-2":{"id":"Consult_chateau_formulaire69c6-2","dept":"22","canton":"Plaintel","commune":"Moncontour","nom":"Moncontour_22","type":"Vestiges","periode":"XII-XIV-Xv","histoire":"MONCONTOUR,  les vestiges du château fort du XIVe siècle. A l'origine, ce château est pourvu des tours Sur-Cleyris, Méloine, Clézio et Billehaut, auxquelles s'ajoute un donjon carré (qui servira de prison jusqu'au XVIIIe siècle). Ce donjon est constitué par \"une tour d'une hauteur extraordinaire avait une basse fosse, un rez-de-chaussée et un étage très élevé avec toiture. Un pavillon carré d'une hauteur de 60 pieds était accolé à cette tour et y donnait accès. Ce pavillon avait une chambre haute et une chambre basse, affectées aux services de la ville. Il comprend la prison des femmes qui se trouvait au rez-de-chaussée sous le portail à droite en rentrant. Les hommes étaient enfermés au fond du donjon sous l'escalier de la porte\". Le château subit de nombreuses transformations dans la seconde moitié du XVe siècle : réédification de l'ensemble des fronts Sud et Est avec leurs trois grosses tours d'angle circulaires. Le donjon, disparu au XIXe siècle, occupait l'angle nord-ouest. Après son passage dans le domaine ducal en 1410 et son retour en 1450 dans le patrimoine des Penthièvre, l'enceinte est régulièrement remaniée. En 1493, le roi Charles VIII ordonne à Jehan de Bréhan d'employer les deniers levés à Lamballe et à Moncontour à la mise en état du château. D'après certains documents, le château renfermait en 1550, une chapelle, un logis appelé \"les lardières\", une grande cour et la grande Salle. Il avait son entrée principale dans la ville et une poterne qui s'ouvrait dans l'ouvrage extérieur. En 1579, on refait à neuf les toitures de la grande Salle, de la tour Billehaut et de la chapelle, et l'on répare le donjon et les deux grandes tours.","architecture":"MONCONTOUR, donjon  ancienne forteresse construite vers 1040 par Foulques Nerra, le donjon de Moncontour est un véritable trésor du XIIe siècle, rendu célèbre par les guerres et les sièges qui s'y sont répétés au fil des siècles. Bertrand du Guesclin et Geoffroy Martel y écrivirent même de belles pages de l'histoire de France. La toiture, reconstituée dans le cadre de la restauration ainsi que l'escalier intégré dans l'épaisseur des murs sont à découvrir. Si la vue offerte depuis l'esplanade constitue déjà un voyage, que peut-on dire alors du panorama proposé depuis le sommet.                                                                                         MOGNET, la tour de l'Ouest et les remparts du XIV-XVe siècle. Restaurés par Geoffroy Botterel II en 1137, les remparts et les tours utilisent au mieux la configuration géologique du site ; la tour du Mognet du XVe siècle, située au niveau du rempart nord ; la porte du faubourg Saint-Jean du XVe siècle  et les remparts du XII-XIIIe siècle, restaurés par Geoffroy Botterel II, comte de Penthièvre, en 1137. La forteresse a subi par la suite les reconstructions et remaniements, imposés par des nécessités diverses et par le progrès. On signale d'importants travaux exécutés dans la seconde moitié du XIVe siècle sous Charles de Blois, puis sous Olivier de Clisson, qui firent de Moncontour l'une des plus fortes places de la Bretagne. En 1415, \"on rebâtit à neuf la demi-tour de la porte d'en haut et deux pans de mur situés l'un entre cette demi-tour et la tour carrée du château, l'autre entre la demi-tour et la grosse tour du coin devers le moulin de la garenne. On fait des ouvertures sur la demi-tour pour y placer des canonnières. On refait les voûtes de la porte d'en haut. On exhausse la maçonnerie qui la surmonte en y ouvrant une chambre\". En 1492, Charles VIII prescrit à Gilles de Kermené, son gouverneur, de faire réparer les murailles. Les portes d'en haut et d'en bas, ainsi que leurs ponts-levis sont réparés en 1694.","habitants":"Famille des Penthièvre\"","divers":"Vestiges de Moncontour grav-1-2-                     Tour Mognet grav-3-4 Château Carmor Grav-5-6","gps":"","images":["../../jctruffet.com/image/image_22/22_Moncontour_22_1.jpg","../../jctruffet.com/image/image_22/22_Moncontour_22_2.jpg","../../jctruffet.com/image/image_22/22_Moncontour_22_3.jpg","../../jctruffet.com/image/image_22/22_Moncontour_22_4.jpg","../../jctruffet.com/image/image_22/22_Moncontour_22_5.jpg","../../jctruffet.com/image/image_22/22_Moncontour_22_6.jpg"]},"Consult_chateau_formulaire2250":{"id":"Consult_chateau_formulaire2250","dept":"22","canton":"Lamballe-Armor","commune":"Morieux","nom":"Morieux","type":"Château","periode":"XVIII-XIX","histoire":"trois châteaux à Morieux: Crinière, Tertre-Rognon et Vuille-Gourio. CRINIERE, manoir datant du XVIIIe siècle. Dans une ambiance conviviale et familiale, profitez des chambres d'hôtes tout confort au décor personnalisé avec vue sur le parcours de golf.                 TERTRE-ROGON,   château inachevé (analyse stylistique), construit au cours du 4e quart du XVIIIe siècle pour Jean-Baptiste-Louis-Auguste Le Denays, gouverneur et capitaine de Lamballe, sur le site d'un manoir acquis de la famille Rogon par son père vers 1750.  Devenu propriété de sa fille Adélaïde-Octavie au début du XIXe siècle, le Tertre-Rogon fut acquis par la famille Rouxel de la Ville-Ferron, armateurs au Légué, puis passa par héritage à Alain Le Gualès de Mezaubran en 1903. En 1936, Il devint la propriété de Paul Hutin-Desgrées du Lou, fondateur du journal Ouest-France, qui entreprit des travaux de restauration après 1945. Château à quatre travées et double orientation dominant la baie de Saint Brieuc, construit en granite. Inachevé, il se présente sous la forme d'une ébauche de logis de type ternaire à sept travées. Travée de droite sommée d'un toit à l'impériale et percée d'une porte architecturée à fronton triangulaire. Travée de gauche couronnée d'un toit en pavillon. Alternance de frontons-pignons triangulaires et cintrés percés chacun d'un oculus éclairant l'étage de comble. La travée de droite abrite un escalier en maçonnerie monumental à volée unique, tournant avec jour, à balustres.","architecture":"VUILLE-GOURIO, du XVIIIe siècle, ce château, encadré de deux pavillons, est la propriété de la famille Le Vicomte. Il est remanié au XIXe siècle. Il possède encore un colombier. Le domaine de La Ville-Gourio a appartenu à Jean Berthélemer en 1427, à Jacques Le Forestier en 1536 et à Jean Le Forestier en 1569 ; Le château de la Ville-Gourio a été élevé dans la première moitié du XVIIIe siècle sur le site d'un ancien manoir et partiellement remanié au milieu du XIXe siècle. Il appartenait aux familles Le Vicomte au XVIIIe siècle et Méhéreuc de Saint-Pierre aux XIXe et XXe siècles. Château construit en granite, comprenant un logis de type ternaire à cinq travées, à double orientation sur cour et sur jardin, flanqué de deux ailes latérales basses. Lucarnes en bois dans les versants du toit. Toit couronné d'épis de faîtage. Souches de cheminées talutées à la base. Colombier construit en granite, couvert d'une coupole en pierre sur trompes portée par quatre arcs surbaissés. L'appareil est formé d'une alternance de lits de schiste et d'assises de granite à l'intérieur. Les blocs de granite sont séparés les uns des autres par des boulins en quinconce.   Ferme comprenant logement, écuries, grange et étable.  M. le Marquis de St-Pierre","habitants":"Tertre ; Famille de  Jean-Baptiste-Louis-Auguste Le Denays          Vuille; famille de la Vicomté\"","divers":"Deux châteaux à Morieux:  Crinière grav 1-2,Tertre-Rognon grav 3-4 et Vuille-Gourio grav-5.","gps":"","images":["../../jctruffet.com/image/image_22/22_Morieux_1.jpg","../../jctruffet.com/image/image_22/22_Morieux_2.jpg","../../jctruffet.com/image/image_22/22_Morieux_3.jpg","../../jctruffet.com/image/image_22/22_Morieux_4.jpg","../../jctruffet.com/image/image_22/22_Morieux_5.jpg"]},"Consult_chateau_formulaireb4b3":{"id":"Consult_chateau_formulaireb4b3","dept":"22","canton":"Plénée-Jugon","commune":"Le-Gouray","nom":"Motte_Basse","type":"Château","periode":"XVIII-XIX","histoire":"La MOTTE-BASSE, la Motte Basse fut à l'origine une motte féodale qui surveillait le cours de l'Arguenon. Elle était composée d'une grande maison de pierre et de terre, avec deux tours, le tout entouré d'eau. Au XVIIIe siècle, les murs de la petite forteresse furent maintenus, mais habillés sur la façade par un revêtement de pierres de taille. En 1748, le château fut agrandi d'un pavillon. Furent également construits un bâtiment comprenant un corps de logis et deux pavillons aux toits pyramidaux destiné à l'habitation du chapelain. Les espaces intérieurs conservent de nombreux éléments de leur aménagement du XVIIIe siècle.","architecture":"La MOTTE-BASSE, au XXe siècle, il reçut un pavillon en forme de tour carrée, surmonté d'une coupole et d'un lanternon. La demeure possède son cordon seigneurial, son corps de logis surmonté d'un toit incurvé avec deux étages de lucarnes et oeil-de-boeuf. Dans la cour d'honneur est visible l'ancien bâtiment de la boulangerie avec ses fours. Dans le jardin, une fontaine, surmontée d'une croix, porte la date 1733. La pièce d'eau murée, est dominée par une terrasse à la française. La chapelle, restaurée vers 1758, possède ses litres extérieures blanchies à la chaux à la Révolution. A l'intérieur, elle s'orne d'une peinture de 1691 représentant l'Annonciation. En 1800, les douves furent supprimées, remplacées par les bâtiments reliés par une grille en fer forgé qui fermait la cour d'honneur. Dans la famille Le Mintier depuis le XVe siècle. Éléments protégés MH : les façades et les toitures du corps central du château, du pavillon situé près du bois et des deux pavillons en bordure du parc, la chapelle : inscription par arrêté du 3 juin 1975.","habitants":"famille Le Mintier \"","divers":"Château de la Motte Basse à le Gouray","gps":"","images":["../../jctruffet.com/image/image_22/22_Motte_Basse_1.jpg","../../jctruffet.com/image/image_22/22_Motte_Basse_2.jpg"]},"Consult_chateau_formulaire6dbd":{"id":"Consult_chateau_formulaire6dbd","dept":"22","canton":"Guerlédan","commune":"Mur de Bretagne","nom":"Mur_de_Bretagne","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Mur de Bretagne ; Roche-Guezennec et du Cerf. ROCHE-GUEZENNEC, Vente de la seigneurie importante de la Roche Guehennec, par Guyon Boscher à Jehan du Fou, baron de Pirmil et de Noyen et autres lieux. Du 7 février 1377, contrat dachats du Veslin de la terre et seigneurie de La Roche Guehennec par Jehan du Fou, de Guyon Boscher, vendeur. Les du Fou conservent la seigneurie jusquen 1584, date à laquelle Suzanne du Fou, fille unique de Jean, baron de Pirmil et de Jeanne de Maille, épouse Georges de Kerveno, baron de Kerveno et de Baud. Leur petite-fille, Charlotte épouse Louis de Bourbon, marquis de Malauze. Leur fils Henri sans enfant transmet le château et la seigneurie de la Roche Guehennec à son neveu, François Louis de Ranconnet, marquis dEscoire. Le château de la Roche Guéhennec ou Roche-Guéhenneuc a été construit au XIIIe siècle ou XIVe siècle, afin de commander la vallée du Poulancre. Cétait le siège dun fief important, avec haute et basse justice, dont il est question dans les archives à partir du XIVe siècle. Il résulte du démembrement, au XIIe siècle, de la seigneurie de Mûr en deux grandes seigneuries : la seigneurie de Launay-Mur et la seigneurie de la Roche-Guéhennec. Nous trouvons successivement Budic,  Leur fille unique fait passer la seigneurie de la Roche-Guéhennec dans la famille Boscher qui prit les armes de Mur, dazur à la croix engrêlée dor en y ajoutant pour brisure une bande de gueules. Construction du château actuel dans la deuxième moitié du XIIIe siècle ou dans la première moitié du XIVe siècle.","architecture":"ROCHE-GUEZENNEC, la Roche changea donc de mains une fois de plus, mais les du Fou semblent toujours y habiter : Haut et puissant Messire Hervé du Fou, baron de Noyan, seigneur de la Fouriele, Pirmil, Bézidel et de la Roche Guéhenec, décédé et inhumé dans léglise paroissiale de Mur dans sa tombe. Hervé du Fou, baron de Noian, de la Roche, Bézidel, fut inhumé a Mûr le 6 octobre 1655. Sa sur, Catherine du Fou, épouse de Jean du Quellenec, écuyer, seigneur de Kergo, décéda à La Roche-Guéhenneuc le 7 février 1657 et fut inhumée en léglise paroissiale de Mûr. En 1667, Louis de Rançonnet se mit en possession de La Roche-Guéhenneuc, après la mort du marquis de Malauze, et prit le titre de comte de Noyan sans être propriétaire de la seigneurie.                               Du CERF, le château fut construit dans la deuxième moitié du XIXe siècle, pour la famille Le Cerf, originaire de Picardie, qui donna plusieurs maires à la commune. Ils font réaliser de nombreux travaux dans les fermes de leur domaine, ouvrent des chemins et encouragent le développement des techniques agricoles. La famille Le Cerf s'étant éteinte, le château est devenu propriété de la commune qui y installe une maison de retraite. Édifice de style néo-Louis XIII de plan allongé symétrique composé d'un corps central flanqué de deux pavillons latéraux et d'un pavillon central plus étroit formant saillie. Élévation ordonnancée.","habitants":"Roche;Louis de Bourbon, marquis de Malauze                                                                                       Cerf famille le Cerf\"","divers":"Deux châteaux à Mur celui de Roche-Guezennec  grav-1-2  et celui du Cerf grav-3-4                             GPS : 48° 12' 03\" Nord, 2° 59' 05\" Ouest                                                                du Cerf    GPS : 48° 12' 03\" Nord, 2° 59' 05\" Ouest","gps":"48° 12' 03\" Nord, 2° 59' 05\" Ouest","images":["../../jctruffet.com/image/image_22/22_Mur_de_Bretagne_1.jpg","../../jctruffet.com/image/image_22/22_Mur_de_Bretagne_2.jpg","../../jctruffet.com/image/image_22/22_Mur_de_Bretagne_3.jpg","../../jctruffet.com/image/image_22/22_Mur_de_Bretagne_4.jpg"]},"Consult_chateau_formulaire2869":{"id":"Consult_chateau_formulaire2869","dept":"22","canton":"Paimpol","commune":"Paimpol","nom":"Paimpol","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article ; Lanvinec , Karraoul et Bourblanc à Plourivo.                                                                                                         LANVINEC, le château de Lanvinec fut construit dans la deuxième moitié du XIXe siècle. Appartient à M. Le Coniat au début du XXe siècle. Demeure de plan massé, rectangulaire, de style néo-gothique, avec tour circulaire marquant l'entrée principale au centre de la façade ; cette dernière est encadrée d'échauguettes sur les angles. Elévation en moellon appareillé avec encadrements de baies et chaînes d'angle en pierre de taille.                                           BOURBLANC, à Plouvino au sud de Paimpol. La seigneurie du Bourblanc avait été apportée dans la famille Roquel, seigneurs de Goasfroment en Plouézec, par le mariage en 1513 de Guillaume Roquel, Président du Parlement de Bretagne, et Conseilleur du Roi, avec Marie Ruffault, Dame du Bourblanc. Le château de Bourg-Blanc date du XVIe siècle. Situé au Ruclé, il fut la propriété successive des familles Roquel du Bourblanc du XVIe siècle à 1639, Armez (1773 à 1935) et Mauduit (en 1935). Le château du Bourblanc aujourd'hui vous propose ses salles pour célébrer vos mariages, ou séminaires.","architecture":"KERBIQUET, manoir dont les bâtiments datent du XVIIIe siècle et de la 2ème moitié du XIXe siècle.Manoir dont les bâtiments sont construits en moellons de granite et schiste. Il présente un logis divisé en deux logements, le logement de gauche, qui possède une souche de cheminée octogonale, étant animé par une lucarne architecturée. Ce logement est flanqué d'un logement rapporté à deux travées.                                            KERRAOUL, c'est une maison de notable datant du 4ème quart XIXe siècle. Le château de Kérraoul est de plan rectangulaire, doublé en profondeur. La façade antérieure est animée par un corps de bâtiment sur l'angle agrémenté d'un bow-window à balcon et coiffé d'un toit en pavillon à égout retroussé. Éléments de décor : garde-corps à balustre, épis de faîtage en zinc, de lucarnes à fronton surbaissé, d'une lucarne architecturée, et d'un oeil-de-boeuf. Il existe aussi 8 manoirs à Paimpol à découvrir : Manoir de Kerloury, de Kereiz, de Kerbiguet, de Kergoniou,  de Penlan, de Keralain,  de Kervic et le de Lostang.","habitants":"Lavinec; famille de  M. Le Coniat                            Bourblanc; famille Roquel,\"","divers":"Trois châteaux dans cet article ; Lanvinec grav-4, Karraoul grav-3 Kerbriquet grav -2  le Lou du Lac grav-5 et Bourblanc grav-1-2  à Plourivo.   Chat gites de Kerloury grav 6 et Penn-Lann grav-7                                               Paimpol   48° 46' 43? nord, 3° 02' 43? ouest                                                   PS : 48° 44' 41\" Nord, 3° 04' 18\" Ouest                                                       Karraoul GPS : 48° 46' 15\" nord, 3° 04' 24\" Ouest","gps":"48° 46' 15\" nord, 3° 04' 24\" Ouest","images":["../../jctruffet.com/image/image_22/22_Paimpol_1.jpg","../../jctruffet.com/image/image_22/22_Paimpol_2.jpg","../../jctruffet.com/image/image_22/22_Paimpol_3.jpg","../../jctruffet.com/image/image_22/22_Paimpol_4.jpg","../../jctruffet.com/image/image_22/22_Paimpol_5.jpg","../../jctruffet.com/image/image_22/22_Paimpol_6.jpg","../../jctruffet.com/image/image_22/22_Paimpol_7.jpg"]},"Consult_chateau_formulaire9812-2":{"id":"Consult_chateau_formulaire9812-2","dept":"22","canton":"Plénée-Jugon","commune":"Penguily","nom":"Penguily","type":"Château","periode":"XVII-XIX","histoire":"La SAULDRAIE, ruiné pendant la Révolution, le château de la Sauldraye est reconstruit au XIXe siècle, en partie sur les anciennes fondations datant du XVIe siècle. Une tour carrée et un pavillon crénelé semble avoir été ajouté autour de 1900. Les créneaux de sa tour carrée évoquent le donjon primitif. En 1873, Charles-Marie Égault, propriétaire, lègue la demeure à son neveu, Paul Sébillot. Né à Matignon en 1843, d'une famille de notables, Paul Sébillot, jeune clerc de notaire se fait connaître pour son attachement à l'art, à la littérature et à la politique, sa rencontre avec Luzel lui révèle l'intérêt des contes et légendes armoricains. En 1880, il devient propriétaire du château. Outre ses peintures et eaux-fortes, Sébillot possède une importante bibliothèque et une collection de meubles et objets populaires de haute Bretagne. Mais sa nomination à un poste ministériel entraîne la vente du château de la Sauldraye à M. Urvoit de Saint-Mirel en 1891, centre de vacances aujourd'hui.Acheté par la ville de Saint-Brieuc dans les années 1960 et utilisé en centre de vacances pour les enfants briochins, le manoir de La Sauldraie, situé à Penguily, ne fera bientôt plus partie du patrimoine municipal. Ce château du début du XIXe siècle était inexploité depuis plusieurs années et les travaux de mise en conformité ont été jugés trop importants par les élus. Le conseil municipal a donc voté hier son déclassement du domaine public afin de permettre sa vente.","architecture":"PENGUILY,   l'ancien château de Penguily de 1718, aujourd'hui disparu. Le premier \"Seigneur de Penguilly\" connu est Bertrand Le Vicomte, il comparait à la réformation des nobles de la paroisse de Landéhen en 1423. Catherine Le Vicomte épouse Julien Habel : ils deviennent les seigneurs de Penguily après 1547. Guillaume Habel (fils de Julien), seigneur de Penguily, épouse Hélène Volance et rendent aveu le 15 juillet 1556. Marguerite Habel (fille de Julien et soeur de Guillaume) épouse Jehan Chaton. Après la mort, en 1680, de Abel Trebuchet, seigneur des Brices, la famille Chaton tenter de racheter la partie de la seigneurie de Penguily que le sieur des Brices Trébuchet avait acquise des Habel. C'est finalement Luc Le Bel, mari de Jeanne Chaton, l'arrière petite fille de Margueritte Habel, qui réussit à racheter en 1683 la seigneurie de Penguily à la succession d'Abel Trébuchet.","habitants":"Sauldraie; famille de M. Urvoit de Saint-Mirel \"","divers":"Château  de la Sauldraie à Penguily","gps":"","images":["../../jctruffet.com/image/image_22/22_Penguily_1.jpg","../../jctruffet.com/image/image_22/22_Penguily_2.jpg","../../jctruffet.com/image/image_22/22_Penguily_3.jpg"]},"Consult_chateau_formulairebecf":{"id":"Consult_chateau_formulairebecf","dept":"22","canton":"Tréguier","commune":"Penvénan","nom":"Penvénan","type":"Château","periode":"XIX","histoire":"CRECH-BLEIZ,  de la fin du XIXe siècle ayant appartenu à l'amiral de Cuverville au début du XXe siècle.                                                            l'oratoire de l'île d'Illiec. Vers la fin du XIXe siècle, la veuve du compositeur A. Thomas fait édifier un oratoire \"agrémenté\" de la pierre de l'autel de \"Saint-Yves la Vérité\".","architecture":"CRECH-BLEIZ, maison à volumétrie importante et de plan complexe résultant de plusieurs agrandissements. Construite en moellons de granite sur un plan d'ensemble en L, elle comprend à l'est un logis primitif de type ternaire auquel a été rajouté vers l'ouest un logis de même hauteur dont la façade postérieure sur mer est animée par une tour d'escalier demi-hors-oeuvre et une tour circulaire massive sur l'angle. Ce dernier logis est, en outre, prolongé par un imposant bâtiment composé d'un pavillon agrémenté d'un bow-window à balcon et d'une haute tour carrée comprenant un léger encorbellement au niveau supérieur. Cette tour est coiffée d'un toit en pavillon à égout retroussé. Éléments de décor : toit en pavillon, épis de faîtage en zinc, balustrades, bow-window, corniches à modillons, pierre de taille (encadrement des baies, chaînes d'angles).","habitants":"Amiral de Cuverville \"","divers":"Château de Crech-Bleiz et oratoire de l'ile Illiec","gps":"","images":["../../jctruffet.com/image/image_22/22_Penv%c3%a9nan_1.jpg","../../jctruffet.com/image/image_22/22_Penv%c3%a9nan_2.jpg","../../jctruffet.com/image/image_22/22_Penv%c3%a9nan_3.jpg"]},"Consult_chateau_formulaire6346":{"id":"Consult_chateau_formulaire6346","dept":"22","canton":"Perros-Guirec","commune":"Perros-guirec","nom":"Perros_Guirec","type":"Forteresse","periode":"XIII-XV-XIX","histoire":"A Perros-Guirec château de Barach, Trestraou, le sphinx ,  et le Silencio.                                                                                                               BARAC'H, la construction du manoir de Barac'h date du XIIIe au XVe siècle. Le manoir est protégé par les M.H. depuis le 22/03/1930                                                            TRESTAOU, Claude Legrix nest encore quun gamin lorsquil se rend, pour la première fois, au « château de Trestraou », à Perros-Guirec , après sêtre glissé dans le sillage de son grand-père maternel, Alfred Delisle, le chiffonnier de la rue de Landerval. Quand Pierre Labey, un avoué parisien, la fait construire à partir de 1893, cest lune des premières « maisons de villégiature » de Trestraou où vivent sa famille et les domestiques logés au-dessus des garages. il est noté que « la différence de taille des baies, pourtant de forme identique, la présence dune jambe sur la façade principale, et la différence de traitement des avancées latérales nous font supposer quil y a eu plusieurs campagnes de construction ».Dans les décennies qui vont suivre, la propriété va changer de main à plusieurs reprises. Cest ainsi quelle est « rachetée dans les années 1960 par la comtesse Huon de Penanster et son mari, le comte de Boutepagnon de Génévrias.","architecture":"SILENCIO, en 1894, Mlle Josset, comédienne, achète un terrain au-dessus de la plage de Trestrignel afin d'y faire construire une grande villa. Bâtisse sobre, de style néo-médiéval, elle s'harmonise parfaitement avec le paysage d'alors, dénudé et rocheux. Une série de petites ouvertures cintrées constitue son seul ornement. Celles-ci éclairent une grande piste de danse au premier étage et reçoivent des vitraux rappelant les origines espagnoles de la propriétaire. À la suite d'un revers de fortune, la comédienne vend la villa, en 1908, au peintre Maurice Denis. Il y passe dès lors de nombreuses vacances, jusqu'à sa mort en 1943. Aménageant les communs en atelier de peinture, il peint en ces lieux de nombreux tableaux qui contribueront à sa renommée. Pillée par les Allemands pendant la Seconde Guerre mondiale, Silencio est resté propriété de la famille Denis.","habitants":"Silencio; famille de Mlle Josset                                       Trestraou ; famille d'Alfred Delisle\"","divers":"A Perros-Guirec château de Barach  ,grav-1-2 ,Trestraou grav -3, le Sphinx grav-4-5 et le Silencio  grav-6.                                                                                   Barrach; GPS : 48° 47' 41\" Nord, 3° 24' 34\" Ouest","gps":"48° 47' 41\" Nord, 3° 24' 34\" Ouest","images":["../../jctruffet.com/image/image_22/22_Perros_Guirec_1.jpg","../../jctruffet.com/image/image_22/22_Perros_Guirec_2.jpg","../../jctruffet.com/image/image_22/22_Perros_Guirec_3.jpg","../../jctruffet.com/image/image_22/22_Perros_Guirec_4.jpg","../../jctruffet.com/image/image_22/22_Perros_Guirec_5.jpg","../../jctruffet.com/image/image_22/22_Perros_Guirec_6.jpg"]},"Consult_chateau_formulaired583":{"id":"Consult_chateau_formulaired583","dept":"22","canton":"Pléneuf-Val-André","commune":"Planguenoual","nom":"Planguenoual","type":"Château","periode":"XVI-XVIII-XiIX","histoire":"Trois châteaux à Planguenoual; Hourmelin, la Hazaie et Val-Bouan.  HOURMELIN, formé dans un monastère de Plougrescant, dans le Trégor, élevé à la prêtrise, il aurait fondé un monastère à Penvénan avant de mourir à Tréguier,  Dès 1138,  c'est à cette date que l'on rencontre pour la première fois le nom de Planguenoual, alors cité sous la forme Plogonoal. Avec l'accord de l'évêché et du chapitre de Saint-Brieuc, l'église fut donnée à l'abbaye Saint-Melaine de Rennes par deux frères laïques. Si l'église est évoquée dès la 1ère moitié du XIIe siècle, la paroisse n'est explicitement mentionnée qu'en 1215 dans les chartes de l'abbaye Saint-Melaine de Rennes. Désigné à plusieurs reprises sous les formes Plegonal en 1144, Ploecongual en 1152 et Ploengonual en1294, le toponyme actuel apparaît dès 1420. L'architecture médiévale reste, comme dans la plupart des cas.  Le château du Hourmelin datant du XVIIIe siècle, fut  agrandi au XIXe siècle et pourvu d'un environnement architectural exceptionnel. Situé dans un vaste parc, le château se présente sous la forme d'un édifice de plan rectangulaire allongé à élévation ordonnancée à travées, comprenant deux parties symétriques par rapport à un mur de refend axial montant de fond en comble et flanquées à chaque extrémité d'une aile coiffée d'un toit en pavillon. Bâtiment en retour d'équerre à l'arrière, de construction postérieure au corps de logis, peu représentée dans la commune.","architecture":"Le HAZAIE de la famille de  Hazaie de la personne de Jean en 1414 en 1535 le manoir propriété de François Poulain seigneur, son fils Charles seigneur d'Annebaut Baron de la Hunaudaye. Suite au guerre de religion  le manoir est reconstruit en 1598 par Louise de Bouilly veuve de Charles Poulain, l'héritière du domaine passe en dot au XVIIe siècle à Jean Poulain de la Garde, toujours par alliance la Hazaie passe à Claude de Bréhant, Jeanne de Brehant leur fille se marie en 1694 avec Charles René d'Andigné marquis de la Chasse la ligné Andigné de Hazaie  s'éteint avec Charles François, laisse à son neveu Jean-François évêque de saint-Pol de Léon, au décès de Jean François en 1806 le domaine revient à l'une de ses nièce Melle de Cahideuc qui le revent en 1814 et acquit en 1980 par la famille  Marivin qui l'ont retauré en chambres d'hôtes\nVAL-BOUAN , propriété de la famille Boüan  du Chef du Bois. Cet édifice est construit à la fin du XIXe siècle avec réemploi d'une rampe d'escalier du XVIe siècle.  Ce manoir reconstruit au commencement du seizième siècle et refondu en grande partie vers l'année 1775, a conservé un gable ou pignon très élégant ; décoré de crosses végétales fouillées à jour. Sa tourelle porte une lucarne à fronton triangulaire de l'époque de la Renaissance. Il appartenait en 1585, à la famille Rouxel de la ville Morhen, dont le représentant était, en 1610, Jean Rouxel, sieur dudit lieu du Val, époux de péronnelle Roger. En 1616, Pierre des Déserts, sieur des Tertres, s'en rendit acquéreur. En 1678 nous trouvons cette terre en la possession de François Denyau (fils de Charles Denyau, sieur de Cangé et de la Crochetière, conseiller au parlement de Bretagne, et de Anne Bouan, dame de Chateaubourg et du Plessis-Pillet) seigneur de Chanteloup, conseiller au parlement de Bretagne ; En 1757, de Jean Fortier, armateur à Saint-Malo ;  en 1772, à Jacques de Rabec, conseiller du Roy, directeur de la compagnie des Indes.  Cette terre fut acquise, en 1803, par M. Boüan du chef du Bois ; elle est habitée aujourd'hui par l'un de ses petits-fils ».","habitants":"Houmelin; seigneur local                                      Le Hazaie, famille de  Hazaie                              Val- Bouan; famille Boüan  du Chef du Bois.         \"","divers":"Trois châteaux à Planguenoual; Hourmelin grav-1-2, la Hazaie grav_6 et Val-Bouan grav-3-4-5.","gps":"","images":["../../jctruffet.com/image/image_22/22_Planguenoual_1.jpg","../../jctruffet.com/image/image_22/22_Planguenoual_2.jpg","../../jctruffet.com/image/image_22/22_Planguenoual_3.jpg","../../jctruffet.com/image/image_22/22_Planguenoual_4.jpg","../../jctruffet.com/image/image_22/22_Planguenoual_5.jpg","../../jctruffet.com/image/image_22/22_Planguenoual_6.jpg","../../jctruffet.com/image/image_22/22_Planguenoual_7.jpg"]},"Consult_chateau_formulaire5846":{"id":"Consult_chateau_formulaire5846","dept":"22","canton":"Pleslin-Trivagou","commune":"Pleslin-Trivagou","nom":"Pleslin_Trivagou","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Pleslin-Trivagou le Bois de la Motte et la Motte Olivet.                                                                                                               BOIS de la MOTTE, la construction  date du XVI-XVIIe siècle,  est la maison seigneuriale de Trigavou, fut édifié à la place d'un manoir à gardé les substructures et les douves de l'ancienne maison forte, qui appartenait pendant tout le Moyen Age, à une branche de la Famille de Beaumanoir. Il est érigé en bannière par lettres du duc Jean V, le 21 juillet 1433, puis, en marquisat. En 1633, il ira dans la maison de Cahideuc pour le mariage de Guyonne de Montbourcher, marquise du Bois-de-la-Motte, avec Sébastien René de Cahideuc. Un bois de 8 kms entourait autrefois le château. En 1780, le Château du Bois-de-la-Motte appartenait au marquis. Sa chapelle privée est un édifice rectangulaire, avec un chevet à pans coupés, date du XVIIIe siècle.  Châtellenie érigée en bannière en 1433 puis en marquisat en 1622, le Bois de la Motte (château, motte et chapelle) se présente dans une île au milieu de l'étang qui sert de douves. Long corps de bâtiment avec pavillon plus élevé permettant l'entrée, celui ci a ses ouvertures laissant passer les poutres qui actionnaient l'ancien pont levis principal. L'ensemble sur cour est entouré d'une rivière.Éléments protégés MH : les façades et les toitures à la Mansart, les douves, le pont et le parc : inscription par arrêté du 28 mai 1951.","architecture":"LA MOTTE-OLIVET, construit autour de 1640, restauré et agrandi au cours du troisième quart du XIXe siècle (vers 1860) par l'architecte rennais Jacques Mellet pour la famille du Breil de Pontbriand. Les deux pavillons Est sont anciens, un belvédère ayant été ajouté au dessus du deuxième corps de bâtiment, la partie ouest du château de la Motte Olivet a  été reconstruite. Le style du bâtiment neuf et le fait que des travaux se soient achevés au début du XXe siècle permettent de supposer l'intervention d'Henri Mellet à cette période. Edifice de plan allongé composé d'un corps central flanqué de deux pavillons rectangulaires perpendiculaires. A l'est un pavillon couvert en carêne, surmonté d'un belvédère et formant saillie sur la façade principale, s'intercale entre le corps principal et le pavillon placé à l'extrémité de l'édifice, ce dernier est flanqué d'une tour carré au nord. Une tourelle d'escalier circulaire semi-engagée est placée à la jonction des corps principaux, sur la façade arrière. Le style de l'architecture d'origine est très scrupuleusement respecté. Les nouvelles élévations affichant rigueur et sobriété dans un souci de cohérence et d'harmonie de l'ensemble.","habitants":"Bois: Marquis du Bois-de-la-Motte                         La Motte Olivet ; famille du Breil de Pontbriand\"","divers":"Deux châteaux à Pleslin-Trivagou le Bois de la Motte grav-1-2-et la Motte Olivet grav 3.                                             Bois la motte                                                GPS : 48° 31' 07\" Nord, 2° 05' 22\" Ouest","gps":"48° 31' 07\" Nord, 2° 05' 22\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pleslin_Trivagou_1.jpg","../../jctruffet.com/image/image_22/22_Pleslin_Trivagou_2.jpg","../../jctruffet.com/image/image_22/22_Pleslin_Trivagou_3.jpg"]},"Consult_chateau_formulairef31d-2":{"id":"Consult_chateau_formulairef31d-2","dept":"22","canton":"Plestin-les-Grèves","commune":"Plestin les Grèves","nom":"Plestin_Grèves","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à Plestin-les-Grèves  dont celui de Plestin Coat-Carric et Leslach.                                                                                                  LESLACH, datant du début du XVIIe siècle, agrandi au cours de la deuxième moitié du XIXe siècle, il comprend également une partie agricole datant du XVII siècle. Manoir de style Renaissance à logis-porte et cour fermée construit en schiste et en granite. Il présente un logis-porte monumental composé d'un corps de bâtiment traversé par un passage couvert couronné d'une galerie et flanqué de deux logis de plan massé couverts chacun d'un toit en pavillon. Il comprend une partie agricole (métairie de la porte) située au devant de la partie droite du logis-porte. Le corps de logis, situé au fond de la cour, à l'angle nord-ouest, est une construction à deux corps en équerre et à trois pièces au rez-de-chaussée reliée au logis-porte, à l'ouest, par un corps de logis de plan rectangulaire allongé (rapporté au XIXe siècle). Une tour ronde hors-oeuvre, percée de bouches à feu, est située sur l'angle postérieur gauche du corps de logis. De nombreux éléments empruntés au répertoire décoratif de la Renaissance sont localisés sur le logis-porte (portail, lucarnes) et le corps de logis (porte d'entrée, lucarnes) .                                                        PLESTIN LES GREVES,   Cette bâtisse dont l'architecture a été marquée par diverses périodes de l'histoire, était à l'origine une gentilhommière dont les premières pierres seront scellées au XVe siècle à l'initiative de la famille Le Splan. Il faudra plus de cent ans pour qu'elle présente son aspect général actuel, fermée par une enceinte dont l'entrée principale sera tardivement ornée d'un balcon. Entretemps, le \"rustique breton\" se mêlera au classique roman, arborant ensuite une influence marquée par Beaumanoir, surtout visible sur la façade du corps de logis.","architecture":"COAT-CARRIC le corps de logis est une construction à volumétrie importante comprenant un sous-sol semi-enterré, un rez-de-chaussée surélevé, un étage carré et un étage de comble. C'est un château de style éclectique empruntant des éléments néogothiques et des éléments classiques. Il prend jour sur les quatre côtés et présente neuf travées régulières à l'avant. Il est composé d'un corps de bâtiment central flanqué de pavillons en équerre. Le corps central, coiffé d'un toit en pavillon, est précédé de deux tours à toiture polygonale. Le bâtiment couramment dénommé \"les communs du château\" est l'unique vestige de la construction d'architecte de la fin du XIXe siècle. C'est un bâtiment construit en schiste, granite et brique sur un plan régulier en H. Il est formé d'un bâtiment de plan rectangulaire allongé à usage d'écuries et de deux bâtiments perpendiculaires à usage de logement. Le bâtiment à usage d'écurie, conçu sur une structure ternaire (trois pièces), comprend un rez-de-chaussée et un comble à surcroît. Il se compose d'un corps central prolongé à gauche et à droite par deux dépendances ouvertes chacune d'une porte. Le corps central, coiffé d'une toiture en pavillon, est ouvert d'une porte charretière encadrée par deux tours circulaires coiffées chacune d'un toit conique. Les logements latéraux présentent un pignon à l'avant et à l'arrière et comprennent un rez-de-chaussée et un étage en surcroît. Plusieurs éléments concourent à l'ornementation et la monumentalisation de ces bâtiments : tours circulaires et polygonales, toiture en pavillon, crête de toit et épis de faîtage en zinc, lucarnes sommées de fleurons, pignons à rampant et crochets, corniches à modillons.","habitants":"Plestrin grèves ; famille Le Splan\"","divers":"Trois châteaux à Plestin-les-Grèves  dont celui de Plestin Coat-Carric grav1-2 -3  et Leslach grav 4-5.","gps":"","images":["../../jctruffet.com/image/image_22/22_Plestin_Gr%c3%a8ves_1.jpg","../../jctruffet.com/image/image_22/22_Plestin_Gr%c3%a8ves_2.jpg","../../jctruffet.com/image/image_22/22_Plestin_Gr%c3%a8ves_3.jpg","../../jctruffet.com/image/image_22/22_Plestin_Gr%c3%a8ves_4.jpg","../../jctruffet.com/image/image_22/22_Plestin_Gr%c3%a8ves_5.jpg"]},"Consult_chateau_formulairea14d":{"id":"Consult_chateau_formulairea14d","dept":"22","canton":"Plestin-les-Grèves","commune":"Plestin les Grèves","nom":"Plestin_les_Grèves _II","type":"Château","periode":"XV-XVII-XIX","histoire":"Quatre châteaux dans cet article ; Kerallic, Lézormel, Lésmaés et Locronan.                                                                                                                     KERALLIC, a été construit dans la deuxième moitié du XIXe siècle. L'édifice est aujourd'hui le bâtiment principal d'un centre de vacances dont les constructions annexes ont envahi le parc de dix hectares, magnifique vue sur la Lieue de Grève. C'est un édifice de style néo-gothique de plan massé irrégulier formé par un corps de bâtiment principal accosté d'un pavillon rectangulaire, de deux avant-corps saillants en rez-de-chaussée, d'une tourelle circulaire sur l'angle et d'un jardin d'hiver.                                                                LEZORMEL, le manoir conserve un corps de logis construit aux alentours de l'année 1500, en partie reconstruit et agrandi à la fin du XIXe siècle, puis restauré à la fin du XXe siècle, la partie ancienne était en ruine au début des années Trente. Le corps de logis est construit en schiste et granite sur un plan en L et présente une tour demi-hors-oeuvre monumentale dans l'angle antérieur abritant un escalier en vis en maçonnerie. Cette tour est ouverte d'une porte au rez-de-chaussée et comprend dans la partie supérieure une tourelle latérale donnant accès à une pièce à feu. La porte d'entrée est une porte à arc en en anse de panier surmonté d'une archivolte ébrasée en accolade ornée de pinacles, crochets, fleurons et écus. Une tourelle en encorbellement (rapportée à la fin du XIXe siècle) placée sur l'angle à la jonction des deux corps anime la façade postérieure. sous-sol, rez-de-chaussée, 1 étage carré, étage en surcroît, étage de comble   logis à deux corps en équerre, à tour d'escalier dans l'angle sur l'élévation antérieure Les travées de croisées et de lucarnes des élévations postérieures résultent de travaux de restauration (fin du XIXe siècle).","architecture":"LESMAËS, manoir construit aux alentours de 1500, comprenant une chapelle funéraire de la famille de Kergariou, restaurée et remaniée au XIXe siècle, en granite et schiste sur un plan d'ensemble en L. Le corps de logis est une construction à deux corps en équerre et à trois pièces au rez-de-chaussée comprenant une tour d'escalier circulaire dans-oeuvre située dans l'angle antérieur gauche. Le corps de bâtiment principal, dont la façade antérieure est montée en grand et moyen appareil de granite, est ajourée à l'avant de trois travées formées de croisées et de lucanes à gables architecturés. Une tour d'escalier circulaire demi-hors-oeuvre centrale sur l'élévation postérieure. Sur la façade principale, les fenêtres à meneaux possèdent des frontons ornés de statues rampantes danimaux. L'aile en retour d'équerre est prolongée au sud par une chapelle à vaisseau unique terminée par une tour coiffée d'un toit conique. Un beau parc entoure la demeure. Éléments protégés MH inscription par arrêté du 5 février 1927.                                                                                                        LOCRONAN, ce manoir du XVIIe siècle comprenait un colombier (disparu) et un portail remonté au manoir de Coat-Carric (information incertaine). Le corps de logis, fortement remanié au XIXe siècle. Il comprend également une dépendance datant du XVIIe siècle .Manoir construit en schiste et en granite. Le corps de logis est un bâtiment de plan rectangulaire allongé simple en profondeur, à deux pièces au rez-de-chaussée et deux portes d'entrée. Une dépendance, datant de la même campagne de construction, prolonge cette partie habitation à droite. Ce corps de logis possédait également, une tour d'escalier postérieure demi-hors-oeuvre située au droit du mur de refend. A noter également pour la partie agricole un bâtiment de plan rectangulaire allongé associant sous un même toit plusieurs dépendances ouvertes chacune d'une porte en plein-cintre.","habitants":"Falille de Lezormel               Lesmaes; famille de Kergariou\"","divers":"Quatre châteaux dans cet article ; Kerallic grav-6, Lézormel grav-5, Lésmaés  grav 1-2-3 et Locronan grav-4.","gps":"","images":["../../jctruffet.com/image/image_22/22_Plestin_les_Gr%c3%a8ves_II_1.jpg","../../jctruffet.com/image/image_22/22_Plestin_les_Gr%c3%a8ves_II_2.jpg","../../jctruffet.com/image/image_22/22_Plestin_les_Gr%c3%a8ves_II_3.jpg","../../jctruffet.com/image/image_22/22_Plestin_les_Gr%c3%a8ves_II_4.jpg","../../jctruffet.com/image/image_22/22_Plestin_les_Gr%c3%a8ves_II_5.jpg","../../jctruffet.com/image/image_22/22_Plestin_les_Gr%c3%a8ves_II_6.jpg"]},"Consult_chateau_formulaire90d4":{"id":"Consult_chateau_formulaire90d4","dept":"22","canton":"Lanvallay","commune":"Pleudihen-sur-Rance","nom":"Pleudihen_Rance","type":"Château","periode":"XIV -XVI-XIX-","histoire":"Trois châteaux dans cet article Quincoubre, Touche-Bégasses et Ville Bodin.                                                                                                QUINCOUBRE, construit au cours du quatrième quart du XIXe siècle remplaçant une ancienne métairie noble dont il ne reste que les ruines du colombier. Edifice éclectique, néo-XVIIe de plan irrégulier composé d'un corps de bâtiment principal flanqué de deux pavillons rectangulaires à l'une des extrémités, et d'une annexe en rez-de-chaussée et couverte en terrasse à l'autre. Elévation à travées. La demeure possède un sous-sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble. L'ensemble de la propriété de Quincoubre et du Clos Fautrel appartient au XIXe siècle à la famille Boudrot. René Bernard-Ponthaye, maire de Pleudihen légua le domaine à sa mort à son homme de maison Amand Boudrot, acadien réfugié à Pleudihen. Ces descendants le vendront en 1883 à Henry Marion, qui sera maire de la commune entre 1904 et 1911. Il fait construire en 1884, dans le clos du colombier, une nouvelle habitation bourgeoise par l'architecte dinanais A. Jousseaume. Les deux avants-corps de cette grande maison- château formant pavillon, le chaînage harpé des baies et des angles ainsi que les balustres de la terrasse sont dans l'esprit du style Louis XIII. Cette demeure domine la vallée de la Rance et s'offre aux regards de tous depuis le moulin à marée du Prat.","architecture":"TOUCHE-BEGASSES, cette seigneurie tire son appellation d'un nom de famille, Bonabe la Bégasse fonde en 1379 à Peudihen, François Pierre de la Gapaillère épouse en 1668 Françoise Frotet,   Jean-Pierre Fournier de Bellevue vend le domaine en 1837 à Frédéric de Châteaubriand qui le revend à Louis Louvel. Ses successeurs Paul Dubois de la Villerabel pour la maison en 1890 et François de Crozen de Chesnes pour le manoir en 1907 vendent la propriété à Hyppolite Briand,  manoir de plan rectangulaire régulier. Construction en moellons avec façade rénovée à l'identique avec enduit à la chaux et bandeau de séparation des niveaux en trompe lil. Restitution d'un cadran solaire et également de deux lucarnes. Le logis avait été remanié lors de sa transformation en ferme. La rénovation a été respectueuse des fragments du passé. Escalier en bois à balustres dans le style de la première moitié du XVIIIe siècle. Double orientation.                                                                                       VILLE-BODIN, maison de procureur fiscal à la fin du XVIIe siècle et au XVIIIe siècle, le logis de la ville Bodin est transformé dans la première moitié du XIXe siècle puis en 1910 dans un style troubadour. Le parc et l'environnement bien conservé donnent à l'ensemble une valeur patrimoniale. Un édifice ancien, construit au XVIe siècle pour la famille Bodin, est rhabillé et agrandi en 1910 (adjonction de deux ailes, d'une tour et d'une tourelle). château de plan irrégulier composé d'un corps de bâtiment principal avec un rez-de-chaussée, un étage carré et un étage de comble, flanqué de deux pavillons rectangulaires latéraux, une tour circulaire et une tourelle se plaçant sur l'une des façades du bâtiment.","habitants":"Quincoubre :famille Boudrot                                Touche; famille de Bonabe la Bégasse             Ville Bodin ; Famille Bodin\"","divers":"Deux châteaux dans cet article Quincoubre grav-1, touche -Bégasses grav-2 et Ville Bodin grav-3.                                                           Quincoubre GPS : 48° 30' 42\" Nord, 1° 57' 02\" Ouest","gps":"48° 30' 42\" Nord, 1° 57' 02\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pleudihen_Rance_1.jpg","../../jctruffet.com/image/image_22/22_Pleudihen_Rance_2.jpg","../../jctruffet.com/image/image_22/22_Pleudihen_Rance_3.jpg"]},"Consult_chateau_formulaire65e6":{"id":"Consult_chateau_formulaire65e6","dept":"22","canton":"Plélo","commune":"Plouagat","nom":"Plouagat","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Plouagat; Ville-Chevalier et Fournebello.                       VILLE-CHEVALIER,   le château de la Ville Chevalier a été construit au début du XVe siècle, de cette époque il ne subsiste que quelques pierres et un pigeonnier. La demeure est la propriété de la famille de Quélen et Lorgeril depuis 1638, date à laquelle Jeanne Henri de Beauchamps épouse Claude de Quélen, fait rare, car la propriété na jamais quittée cette famille, elle sera transmise au de Lorgeril en 1928 par Louise de Quélen qui épouse quelques années plus tôt en 1901 Simon de Lorgeril. L'architecture du château, est typique des membres du parlement de Bretagne du XVIIIe siècle, avec ses grandes ouvertures et sa façade presque rectiligne. Elle na été que très peu remaniée à travers les siècles, seul un couloir à l'arrière à été ajouté dans les années 1820. Le jardin à la Française qui se situait devant le château au XVIIIe siècle, a fait place à un parc à langlaise au début du XIXe siècle.","architecture":"FOURNEBELLO, la construction du manoir date de la 2ème moitié du XVIe siècle. Sa couverture est en ardoise. Son toit est à longs pans et le pignon découvert. Il possède un étage carré, un escalier hors-oeuvre, et un escalier en vis sans jour. Le manoir de Fournebello est privé, fermé au public, il est inscrit aux M.H. depuis 1943.","habitants":"Ville; Famille de Quélen \"","divers":"Deux châteaux à Plouagat; Vile-Chevalier grav_2 et Fournebello  grav-1                                                                GPS : 48° 32' 15\" Nord, 2° 59' 51\" Ouest","gps":"48° 32' 15\" Nord, 2° 59' 51\" Ouest","images":["../../jctruffet.com/image/image_22/22_Plouagat_1.jpg","../../jctruffet.com/image/image_22/22_Plouagat_2.jpg"]},"Consult_chateau_formulaireda9b":{"id":"Consult_chateau_formulaireda9b","dept":"22","canton":"Plestin-les-Grèves","commune":"Plouaret","nom":"Plouaret","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Plouaret; Guernanchanay, Kerbridou et Kérépol.                           GUERNANCHANAY, de style renaissance avec portail monumental    Il est le siège de la seigneurie figurée par la résidence seigneuriale . Lors de la construction de l'actuel logis dans le dernier quart du XVIe siècle, il préexiste déjà une résidence seigneuriale située dans l'axe du portail  fermant la cour face à l´entrée monumentale. Le manoir de Guernanchanay est typique de l´architecture civile du Trégor.                                                                            KERBRIDOU, sa construction date du XVIe siècle. A la fin du XVIe siècle et au début du XVIIe siècle, apparaît en Bretagne une architecture nouvelle, composée de porches avec des guérites à dômes et à culs de lampes. A la même époque, remontent les hautes gerbières à étages avec accolades et frontons de Kerbridou. Le manoir de Kerbridou est un manoir, de forme rectangulaire avec une tour d'escalier carrée, saillante. Une porte encadrée de pilastres superposés, soutient une légère corniche, avec un passage circulaire sous une archivolte continuant sur les piedroits. L'espace entre cet arc plein-cintre et la corniche contient des écussons et des armes dans ses angles. Une fenêtre coupée d'un linteau meneau se trouve de chaque côté de cette entrée. Des grebières à fronton décoré ressortent dans la toiture. La tour carrée possède un pan coupé au deuxième étages, et s'élargit par des mâchicoulis en haut. L'angle rentrant vers le manoir possède une guérite à cul de lampe. Le manoir de Kerbridou est inscrit partiellement aux M.H. pour ses façades, ses toitures et les souches de cheminées, depuis le 9/10/1964.","architecture":"KEREPOL ; la construction du manoir de Kérépol date du XVIe et XVIIe siècle,  se situe à l'Ouest du bourg de Plouaret, appartenait à la famille de Kergariou. Le logis occupe le côté Ouest d'une cour fermée avec une porte charretière et une porte piétonne. Deux ailes des dépendances encadrent la cour au Nord et au Sud. Le manoir de Kérépol est inscrit partiellement aux M.H. depuis le 18/03/1991 pour le logis, le mur d'enceinte avec la double porte, et l'enclos. C'est un manoir privé, fermé au public, Les seigneurs de Kergariou , de Goazian et de Kervéguen, paroisse de Plouigneau , de Keramprévost, paroisse de Plourin ;  de Kerhaël, paroisse de Locquirec ;  de Portzamparc et du Cosquer, paroisse de Plounévez-Moëdec ;  de Pluscoat, paroisse de Botlézan ;  de Penanprat,  de Keréven, de Pontglo, paroisse de Pleumeur-Gauthier ;  des Fossés,  de Kermadéza et de Trobriand, paroisse de Plougasnou ; de la Ville-Pépin,  du Domaine,  des Planches, du Châtel, de Launay, de Kervérault,  de Kergrist et de Coëtillio, paroisse de Ploubezre ; de Rosconnet ;  de Locmaria ; de Coatlez ;  de la Grandville (en breton, Guermeur), paroisse de Bringolo). Les seigneurs de Kergariou portent \"D´argent fretté de gueules, au canton de pourpre chargé d´une tour d´argent maçonnée de sable\" et ont pour devise : \"Là où ailleurs, Kergariou\".","habitants":"Famille de Guernanchanay.            Famille de Kerbridou,           Kerepol;  famille de Kergariou\"","divers":"Deux châteaux à Plouaret; Guermanchanay grav 1-2-3 Kerbridou grav-4  et Kérépol grav-5.  GPS : 48° 37' 34,57\" Nord, 3° 27' 47,48\" Ouest                                               Kerepol GPS : 48° 36' 26,35\" Nord, 3° 29' 12,7\" Ouest","gps":"48° 37' 34,57\" Nord, 3° 27' 47,48\" Ouest","images":["../../jctruffet.com/image/image_22/22_Plouaret_1.jpg","../../jctruffet.com/image/image_22/22_Plouaret_2.jpg","../../jctruffet.com/image/image_22/22_Plouaret_3.jpg","../../jctruffet.com/image/image_22/22_Plouaret_4.jpg","../../jctruffet.com/image/image_22/22_Plouaret_5.jpg"]},"Consult_chateau_formulaire184e-2":{"id":"Consult_chateau_formulaire184e-2","dept":"22","canton":"Paimpol","commune":"Ploubazlanec","nom":"Ploubazlanec","type":"Château","periode":"XVIII-XIX","histoire":"deux châteaux à Ploubazlanec;  Kersa et Kertanouarn .                               KERSA; château construit vers 1895 par l'armateur Joseph-Achille Joubert sur le site d'un manoir du XVIIe siècle dont des vestiges subsistent à l'ouest du nouvel emplacement. La propriété est vendue dans les années 1940. Château de plan massé, composé d'un corps de bâtiment central, flanqué de plusieurs pavillons rectangulaires, et de deux tours, l'une circulaire et l'autre hexagonale sur les angles. Elévation brique et pierre. La façade principale présente un pavillon central au-devant duquel se déploie un porche couvert à deux volées d'escaliers convergentes et surmonté d'une terrasse. La façade sur le parc est munie d'un perron. Le château de Kersa est une oeuvre originale dont la qualité architecturale va de pair avec une inscription dans un ensemble comprenant parc et communs. actuellement lycée.","architecture":"KERTANOUARN, la construction du château de Kertanouarn date du XVIIIe ou du début du XIXe siècle. Il est de style classique. C'est un manoir composé de quatre pièces au rez-de-chaussée et à tour d'escalier demi-hors-oeuvre sur l'élévation postérieure. Il fut édifié en moellons de granite. De plan rectangulaire allongé et à double orientation,  est composé d'un rez-de-chaussée abritant 4 pièces principales, d'un étage carré et d'un étage de comble. La façade antérieure est rythmée par neuf travées de baies régulières, la travée axiale étant surmontée d'un fronton-pignon triangulaire orné d'un écu portant les armes des commanditaires. Une tour carrée demi-hors-oeuvre placée au centre de la façade postérieure et coiffée d'un toit en pavillon abrite l'escalier de distribution intérieur. Les versants antérieur et postérieur du toit principal accueillent des lucarnes à fronton-pignon triangulaire en maçonnerie.","habitants":"Seigneurs locaux,                \"","divers":"Trois châteaux à Ploubazlanec;  Kersa  grav-1-2-3, Kertanouarn grav-4,                            . Kertanouarn GPS : 48° 48' 05\" Nord, 3° 01' 56\" Ouest","gps":"48° 48' 05\" Nord, 3° 01' 56\" Ouest","images":["../../jctruffet.com/image/image_22/22_Ploubazlanec_1.jpg","../../jctruffet.com/image/image_22/22_Ploubazlanec_2.jpg","../../jctruffet.com/image/image_22/22_Ploubazlanec_3.jpg","../../jctruffet.com/image/image_22/22_Ploubazlanec_4.jpg"]},"Consult_chateau_formulaire2e99":{"id":"Consult_chateau_formulaire2e99","dept":"22","canton":"Plestin-les-Grèves","commune":"Ploubezre","nom":"Ploubezre","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux dans cet article de Ploubezre ; Coetfrec Coatilliau et Kergueréon.                                                                                                                                                         COATILLIAU,  fut la propriété de la Famille Kergariou du XVIIe au XXe siècle. Sa construction a débuté au XVIIe et s'est achevée au XXe siècle. Benjamin Jollivet, auteur d'un ouvrage sur les Côtes-d'Armor, écrivait en 1859 : « Coatiliou est un château moderne appartenant à M. de Kergariou, l'un des descendants d'Alexandre de Kergariou, qui, en 1586, fut nommé capitaine-gouverneur de la ville et château de Morlaix. Cette habitation possède un fort beau parc. En avant, on remarque 2 douves profondes où l'on y élèvé autrefois, des sangliers  manoir de Kerguéréon, ancienne résidence de la Famille de Kermel, appartient depuis la Famille de Méric de Bellefon.                                                                                                     COETFREC, possession de Geoffroi de Kerimel en 1373. Les seigneurs de Coëtfrec sont à un certain moment les seigneurs dominants de Kergrist et de Kergomar. Ils ont des moulins sur le Léguer jusqu'au Yaudet et plusieurs pêcheries. En 1461-1462, Guillaume de Penhoët reconstruit l'édifice et en fait une vaste demeure à trois étages. Jean, son fils, restaure la chapelle funéraire seigneuriale de Kerfons. Au moment des guerres de la Ligue, le sire de Kergomar, fidèle à Henri IV se réfugie à Coëtfrec, poursuivi par le duc de Mercoeur. En 1592, sous l'ordre du duc de Bretagne, le célèbre brigand Guy Eder de la Fontenelle s'empare de Coëtfrec. Une fois la place prise, il en fait un repère de brigands. Peu de temps après, Kergomar le démantèle, vestiges","architecture":"KERGUEREON, le manoir de Kerguéréon est la résidence de la famille de Méric de Bellefon. Sa construction date du XVe au XVIIIe siècle. Son propriétaire était Jean Le Diuezat, ou Digouezat, roturier, qui en fut propriétaire en 1540. La construction du manoir débute au XVe siècle, et se poursuit au XVIe siècle, à la demande de Jehan de Kergrist et de son épouse Gilette le Cozic. C'est à l'époque, un manoir typique de la Renaissance bretonne : une tour octogonale entourée de 2 corps de logis principaux. Un passage voûté permettait d'accéder, de la cour intérieure nord, au potager clos situé au sud. Au XVIe siècle, une seconde tour est dressée, face à la première, dans des proportions plus importantes car la famille prospère. Le  manoir a une tourelle accolée à la tour principale, qui permet d'accéder à une chambre haute, récupérant ainsi l'espace vide au-dessus de l'escalier en vis de la tour. Un pigeonnier a été rajouté dans la façade sud du manoir.","habitants":"Coatilliau;  Famille Kergariou                           Coetfrec; Guillaume de Penhoët                                 Kergueréon; Famille de Méric de Bellefon.\"","divers":"Trois châteaux dans cet article de Ploubezre ; Coetfrec grav 1-2 Coatilliau grav-3 et Kergueréon grav-4-5. Coatilliau  GPS : 48° 43' 00\" Nord, 3° 26' 55\" Ouest                                       Coatfrec   GPS : 48° 42' 32\" Nord 3° 25' 20\" Ouest","gps":"48° 43' 00\" Nord, 3° 26' 55\" Ouest","images":["../../jctruffet.com/image/image_22/22_Ploubezre_1.jpg","../../jctruffet.com/image/image_22/22_Ploubezre_2.jpg","../../jctruffet.com/image/image_22/22_Ploubezre_3.jpg","../../jctruffet.com/image/image_22/22_Ploubezre_4.jpg","../../jctruffet.com/image/image_22/22_Ploubezre_5.jpg"]},"Consult_chateau_formulaire2061":{"id":"Consult_chateau_formulaire2061","dept":"22","canton":"Pleslin-Trigavou","commune":"Plouer sur rance","nom":"Plouer_Rance","type":"Château","periode":"XVI-XVIII-","histoire":"Trois châteaux à Plouêr dont celui de Plouêr, Careil de Guerandes et de Rigourdaine.                                                                                                       CAREIL ou BAS CARHEIL à plouêr , la construction du château du Bas-Carheil date du XVIIe siècle. Du premier manoir de « Carehel », il ne subsiste pas de vestiges. Lancien logis dit actuellement le « Bas Carheil » remonte au XVIIe siècle et serait antérieur à 1650. Le domaine du Bas-Carheil passera au XVIIIe siècle à la famille de Launay, par le mariage de Guillaume Pierre de Launay avec Marie Claire Gilette Mousset de Villeneuve. Ce couple fit ensuite construire un nouveau château qui sapparente aux Malouinières de la Région.                                                                                                         PLOUER; ériger en comté en 1575 le domaine passa par alliance au XIXe siècle aux Magon de la Ville-Huchet-Plouêr et appartient aujourd'hui à M. Henri Magon   de la Ville-Huchet-Plouêr.      GUERANDES, le château de Plouër fut reconstruit, au début du XVIIIe siècle, sur lemplacement du vieux château de Saint-Paul, après le rachat du comté de Plouër, en 1695, par Pierre de la Haye. L'ancien château avait été ruiné en partie lors des guerres de la Ligue. Joseph de La Haye (1665-1723) transforma complètement l'ancienne forteresse de Saint-Paul, siège du comté de Plouër et détruisit tout son système de défense, entre 1713 et 1720 pour y substituer un château Louis XIII agrémenté de parterres à la française et de perspectives qu'on appela le château de Plouër.                                                                                                                                                                          RIGOURDAINE, le manoir de Rigourdaine, à Plouër-sur-Rance, était en ruines avant que Patrick Van Valenberg n'en fasse cet hôtel ouvert depuis 1993.","architecture":"PLOUER, château entouré de douves autrefois traversées par un pont-levis avec des dépendances. Sur des fondations de différentes époques, l'édifice est rectangulaire mais courbe, avec des pavillons aux extrémités et une seule aile en retour sur cour. Pour se démarquer du manoir quelles remplacent, les nouvelles maisons de plaisance du Pays de Dinan adoptent le parti des grands châteaux français, élaborés depuis le XVIe siècle. On remarque ici limportance des espaces extérieurs, le château sentoure despaces de prestige, de distribution, dagrément, dont les grandes lignes sont cour, avant-cour, jardin et terrasses, organisés sur un axe. On peut distinguer une rabine, des douves franchies par un pont, une plateforme maçonnée pour la cour, une grille entre deux piliers, une cour avec le bâtiment des communs à gauche, la chapelle à droite à lextérieur de lenclos. L'édifice est un rectangle allongé, avec pavillons dangle plus hauts que le corps de bâtiment, un étage noble plus important, des hautes toitures, un axe central, mais pas de symétrie, sauf côté jardin. Laxe central, cest celui de la porte dentrée, portant les armoiries familiales, discrètement marqué par une grande lucarne ornée à la Chesnaye-Taniot, une sorte de fronton-lucarne. La porte du château de Plouër reprend le dessin maniériste de celle de Couellan, vers 1620. La partie central du château présente une maçonnerie plus ancienne et pourrait correspondre à l'ancien château de Saint-Pol. La partie arrière du château ouvre sur un jardin et un étang. On y descend par un escalier en fer à cheval, partant du logis. Les pièces de l'étage noble sont lambrissées et ont des cheminées dans le style du XVIIIe siècle. Éléments protégés MH : les façades et les toitures ; les douves ; le sol de la cour ; le pavillon d'entrée : inscription par arrêté du 15 juin 1964.","habitants":"Careil; famille de Lazunay                            Plouêr ; Famille de Magon de la Ville-Huchet-Plouer                                                      Guerandes; Famille de Joseph de La Haye           Rigourdaine ;  Patrick Van Valenberg\"","divers":"Trois châteaux à Plouer dont celui de Plouer grav 1-2,  de Carheil grav-5-6 , de Guerandes  grav-3-4 et de Rigourdaine grav -7-8,","gps":"","images":["../../jctruffet.com/image/image_22/22_Plouer_Rance_1.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_2.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_3.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_4.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_5.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_6.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_7.jpg","../../jctruffet.com/image/image_22/22_Plouer_Rance_8.jpg"]},"Consult_chateau_formulairef618":{"id":"Consult_chateau_formulairef618","dept":"22","canton":"Guerlédan","commune":"Plouguenast","nom":"Plouguenast","type":"Château","periode":"XV","histoire":"La TOUCHE- BRANDINEUF, le domaine a également appartenu aux familles Budes, Trafalegan, Thépault et de La Roüe. Depuis 2005, il appartient à M. et Mme Parthenay qui réalisent d'importants travaux de restauration. Le château de la Touche-Brondineuf ou Touche-Brandineuf du XVe siècle, édifié à la fin du XVe siècle pour Gilles de Carmené ou Kermené (receveur du duc François II, seigneur de La Touche. Propriété de Gilles de Kermené en 1480 et de René de Kermené en 1536. Il possédait jadis un droit de haute, moyenne et basse justice. La Touche est devenue la Touche-Brondineuf à partir de 1480. Le château est désigné ainsi à cause de ses seigneurs, les Carmené (ou Kermené), qui étaient aussi seigneurs de Brondineuf en Sévignac. Le domaine a ensuite aussi appartenu aux familles Budes, Trafalegan ou Trafelgan, Thépault et de La Roue ; Éléments protégés MH : le château de la Touche-Brandineuf en totalité : inscription par arrêté du 30 mars 1926.","architecture":"La TOUCHE- BRANDINEUF, originellement maison noble, le manoir est transformé en château, à la fin du XVe siècle. Cette terre relève de Moncontour, avec droit de haute, moyenne et basse justice. Le bâtiment principal comporte une échauguette et une canonnière à la base de la tourelle qui dessert les pièces des étages.   Les corps de bâtiment nord et nord-est sont postérieurs.   Il s'agit d'une imposante demeure composée d'un corps de logis à deux étages. Sur la façade principale s'élève la tour contenant l'escalier. Porte d'entrée en arc brisé avec archivolte à crochets. La grande salle est habitable, avec des dalles en granit remplaçant la terre battue.                                                                                                           PONTGAMP, transformé en chambre d'Hôtes par Pourdieu le Coz, de plan rectangulaire à deux niveaux sur soubassement  flanqué de deux pavillons saillants sur les flancs entre trois travées . Toits en croupe.","habitants":"familles Budes etM. et Mme Parthenay\"","divers":"Château de la Touche-Brandineuf grav 1-2  à Plouguenast et Pontchamp grav-3","gps":"","images":["../../jctruffet.com/image/image_22/22_Plouguenast_1.jpg","../../jctruffet.com/image/image_22/22_Plouguenast_2.jpg","../../jctruffet.com/image/image_22/22_Plouguenast_3.jpg"]},"Consult_chateau_formulaire6a6c":{"id":"Consult_chateau_formulaire6a6c","dept":"22","canton":"Tréguier","commune":"Plouguiel","nom":"Plouguiel","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux à Plouguiel ; Kerousy, Leshildry et Kestellic.      KEROUSY, le site comprend un logis manorial datant de la première moitié du XVIe siècle. La terre de Kerousy a appartenu à la famille du même nom du XIVe siècle au début du XVIIIe siècle. Le logis principal, de construction plus ancienne que les deux autres, présente d'importantes traces de remaniement à droite attestant le prolongement du logis dans cette direction à l'origine. Dans l'état actuel, ce logis de plan rectangulaire simple en profondeur, à deux pièces par étage et à double orientation, est composé d'un sous-sol comblé, d'un rez-de-chaussée, d'un étage carré et d'un comble abrité sous un toit à croupes. Il est divisé par un mur de refend portant souche de cheminée et pourvu de communications, le mur de croupe de gauche portant également une souche de cheminée. La façade antérieure, rythmée par quatre travées formées par de grandes fenêtres rectangulaires verticales, dont certaines étaient protégées par des grilles en fer forgé, est animée par une corniche imitant un mâchicoulis quasiment identique à celui de la tour du château de Keralio.                                                                                         LESHILDRY au XV-XVIe siècle. Il s'agit d'une ancienne seigneurie du XIIIe siècle. Le seigneur de Lezhildry est héréditairement sergent féodé ou prévôt noble de la seigneurie de Plouguiel et Plougrescant, alias Le Fief du Chapitre (cette charge portant d'ailleurs le nom de \"prévôté de Lezhildry\"). Le château présente un ensemble de bâtiments datés du XIIIe au XVIe siècle. L'aile Renaissance du XVIe siècle possède sept arcades ouvrant sur un déambulatoire. On y trouve une chapelle dédiée à Sainte-Anne et fondée par Aliette de Boiséon et Louis de Lezhildry.  Jacques de Leshildry est archer en 1351 (lors du combat des Trente) à La Roche-Derrien. La famille de Lezhildry aurait résidé au châte
