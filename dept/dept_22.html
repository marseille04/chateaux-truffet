const FULL={"Consult_chateau_formulaire7058":{"id":"Consult_chateau_formulaire7058","dept":"22","canton":"Plancoët","commune":"Bourseul","nom":"Beaubois","type":"Château","periode":"XIX","histoire":"au sud de Plancoet  BEAUBOIS, ancienne seigneurie vendue par la famille de Guéhéneuc aux de Tesson (ou de Tessay) en 1854. Ces derniers entreprennent la restauration de l'édifice dont la partie ouest avait été détruite pendant la restauration. L'édifice change de main au XXe siècle et devient la propriété de Monsieur de Chappedelaine, député et ministre de la marine marchande. .\nÉléments protégés MH : le château de Beaubois : inscription par arrêté du 27 février 1926.","architecture":"BEAUBOIS; Le château de Beaubois est en grande partie reconstruit à partir de 1861 mais il conserve une partie datant du début du XVIIe siècle, ainsi que de nombreux motifs art déco. Le château a été vendu comme bien national à la Révolution. La chapelle a été construite en 1890. Projet de restauration intérieure par l'architecte Pierre Laloy en 1923.","habitants":"Famille de Guéhéneuc\"","divers":"Château de Beaubois à Bourseul","gps":"","images":["../../jctruffet.com/image/image_22/22_Beaubois_1.jpg","../../jctruffet.com/image/image_22/22_Beaubois_2.jpg"]},"Consult_chateau_formulairef505":{"id":"Consult_chateau_formulairef505","dept":"22","canton":"Pleslin-Trigavou","commune":"Langrolay-sur-Rance","nom":"Beauchêne_22","type":"Château","periode":"XVIII","histoire":"BEAUCHENE  Le château du Beauchêne a été entièrement reconstruit dans le premier tiers du XVIIIe siècle pour Jacques III Goin de Beauchêne, lieutenant général de l'amirauté de Saint Malo, sénéchal et capitaine des gardes côtes de cette ville.","architecture":"BEAUCHENE, il s'agit d'une demeure à l'architecture austère présentant, côté est, une façade à corps principal encadré par deux pavillons en légère saillie, et, côté ouest, une façade avec un avant corps central. Le décor est très sobre tant extérieur qu'intérieur. Il faut noter la présence d'un très bel escalier en chêne avec balustres carrés en poire à deux volées à quartier tournant. Le château de Beauchêne se rattache sans conteste au type des malouinières, de par la position sociale du maître de l'ouvrage, l'époque et le style de la construction. Le parc conserve quelques traces de l'ancien manoir de Beauchêne comme le portail nord daté 1659, les communs, construits vers 1830, sont intéressants pour leur style italianisant très décoratif. Éléments protégés MH : les façades et les toitures de la maison du gardien, les communs, la maison du jardinier, l'orangerie, la maison-écuries-pigeonnier. Le parc avec ses terrasses, son étang, son mur d'enceinte avec son portail nord et le pont qui le prolonge : inscription par arrêté du 8 février 2000.","habitants":"Famille de  Jacques III Goin de Beauchêne\"","divers":"Beauchêne   GPS : 48° 33' 17,41\" Nord, 2° 0' 17\" Ouest","gps":"48° 33' 17,41\" Nord, 2° 0' 17\" Ouest","images":["../../jctruffet.com/image/image_22/22_Beauch%c3%aane_22_1.jpg"]},"Consult_chateau_formulairef49a":{"id":"Consult_chateau_formulairef49a","dept":"22","canton":"Lanvallay","commune":"Evran","nom":"Beaumanoir_Evran","type":"Château","periode":"XVII","histoire":"BEAUMANOIR, la seigneurie  est liée à l´illustre lignage chevaleresque du même nom dont les origines remontent aux premiers temps de la féodalité. Les guerres de la ligue,  dévastatrices sur ce territoire ont ruiné le château féodal, ainsi à la fin du XVIe siècle, il est mentionné comme étant abandonné et inhabitable. La seigneurie de Beaumanoir fut rachetée le 28 février 1619 par François Peschart, gentilhomme ordinaire de la chambre du Roi, conseiller au parlement de Bretagne, seigneur de Bossac et de Bienassis. Il entreprend la construction du château actuel sur un nouveau site vers 1628-1630 . Ces descendants poursuivront le chantier comme en témoignent des différences stylistiques et des détails constructifs qui indiquent une rupture puis une reprise des travaux. La reprise du chantier donne l'impression que le parti originel, savant et ambitieux a été simplifié.  Il est construit pour Jean-Baptiste Peschart, baron de Beaumanoir qui se marie avec Pétronille Brunet en 1640, ou leur fils, Joseph Peschart, qui épouse en 1671, Suzanne Marie Riaud de Galisson. Le domaine est apporté par la suite en dot à Joseph Le Meneust de Bréquigny par son mariage avec Marie Françoise Peschart, le 8 avril 1686. Ces derniers cédent le château à Jeanne Leray dont la fille héritière se mariera à François de Langle de Kermorvan, comte de Beaumanoir, conseiller, puis président à Mortier au parlement de Bretagne. Leurs descendants ont possédé le domaine jusqu'à sa vente au conseil Général des Côtes d´Armor, le 5 novembre 1963. La date de 1836, portée sur une souche de cheminée, correspond aux aménagements et transformations du château par Renée Lefranc-David et Louis Marie de Langle-Beaumanoir.","architecture":"BEAUMANOIR, le logis, dont les travées sont dépourvues d'ornements, se conforme davantage à la mode au milieu du XVIIe siècle, a été découronné de ses lucarnes et souches de cheminées sculptées en pierre de taille des faluns, les pavillons en carène ont été supprimés au profit d'une toiture simplifiée à faible pente dans l'esprit plus austère du moment.Après 1947, à la mort de Marie de Langle, le château est petit à petit dépossédé de l'ensemble de son mobilier et de ses boiseries. Des lambris Louis XV ont été récupérés du bûcher d'une ferme voisine, en 1980, pour les remonter depuis au manoir de la Motte-Saint-Jean. Le château est loué après 1947 et transformé partiellement en colonie de vacances et en bâtiment d'élevage agricole. L'édifice est composé d'un plan en quadrilatère autour d'une cour avec une aile d'entrée plus basse reprenant les modèles français des châteaux de la seconde Renaissance. Le corps de logis est à cinq travées en façade, il est composé d'un étage de soubassement et de deux étages carrés surmontés d'un étage en surcroît transformé lors des restaurations du XIXe siècle (lucarnes détruites et toitures refaites). La partie centrale du logis, qui contient un escalier rampe sur rampe en pierre, est simple en profondeur, les pièces latérales sont double en profondeur et forment un avant corps sur le jardin. Deux ailes, plus basses en rez-de-chaussée avec étage de comble, encadrent le logis et mènent aux pavillons du corps d'entrée. Les pavillons sont flanqués d'une tourelle d'escalier, de plan carré, hors uvre qui concentre une bonne partie du décor sculpté : bossages en pierre de taille, cariatides présentant un écu et un décor de vigne. Le portail porte les armoiries de la famille de Langle-Beaumanoir surmontées d'une couronne de marquis et encadrées de deux lions.","habitants":"Famille de  François Peschart\"","divers":"A Evran; Beaumanoir GPS : 48° 22' 60\" Nord, 1° 58' 47\" Ouest","gps":"48° 22' 60\" Nord, 1° 58' 47\" Ouest","images":["../../jctruffet.com/image/image_22/22_Beaumanoir_Evran_1.jpg"]},"Consult_chateau_formulaire83f0":{"id":"Consult_chateau_formulaire83f0","dept":"22","canton":"Plélo","commune":"Leslay -Cohiliac","nom":"Beaumanoir_Leslay","type":"Château","periode":"XVII-XVIII","histoire":"BEAUMANOIR, le premier Eder connu est un Guillaume en 1365 qui fit édifier le château au XVe siècle, démantelé en 1590, reconstruit aux XVIIe et XVIIIe siècles, et restauré entre 1895 et 1905 par l'architecte Auguste Courcoux pour le comte de Saint-Pierre, est la propriété, jusquau XIXe siècle, de la famille Eder de Beaumanoir dont lun des fils sappelle Guy Eder de la Fontenelle (né en 1574). Le 13 octobre 1590, le Prince de Dombes donne l'ordre au capitaine du Liscouet de démolir le château , qui est reconstruit plus tard.  par  Olive de Beaumanoir et par son époux Jean IV du Perrier  seigneur de Quintin. Au XVIIe sièclele domaine passe à une soeur du Fameux sire de Fontenelle, Françoise Eder, mariée à François Bernard. Venduen 1467 à François du Halgouët, il passe ensuite à sa fille Magdeleine  qui le transmet aux Cambout. Antoine Crozat riche financier l'acquit en 1716, sa petite fille, la duchesse de Béthune hérite mais n'habitera jamais au château qui échoit à Adélaïde  de Béthune  épouse du duc des Deux Ponts, puis à deux de ses filles, mariées à des Chambellans du roi de Bavière.  En 1832, le château appartenait à MM. de Grawenreuth et de Reingberg, chambellans du roi de Bavière et héritiers par les femmes de la branche Eder de Beaumanoir, il passe à Charles-Thérése de Merdy, marquis de Catuellan puis à sa petite fille épouse du comte  Henri de Méhérenc de Saint-Pierre qui restaure le château par l'architecte  Auguste Couroux.   M. et Mme Kitsenko, de Moscou, un homme d'affaires russe, ouvre les portes de son domaine, aujourd'hui.","architecture":"BEAUMANOIR, siège d'une des plus hautes seigneuries relevant de Quintin, a été construit au XVe siècle, puis agrandi aux siècles suivants. Par suite d'abandons successifs, notamment au moment de la Révolution, la propriété est en mauvais état, en 1895, les propriétaires décident de la restaurer. La conception de l'aile nouvelle et des communs est due à Auguste Courcoux, architecte d'origine briochine, l'aménagement du parc, de style néo-gothique, est l'oeuvre du paysagiste Charles Siclis. Le parc à l'anglaise de 25 ha est dessiné en 1902 par Charles Singlis. Le logis du XVe siècle a été agrandi. La tour date du XVIe siècleL'ensemble est prévu pour assurer l'autonomie du domaine et le confort de ses habitants (une trentaine à cette époque), suivant les normes hygiénistes les plus modernes héritées de l'Angleterre.\nÉléments protégés MH : le domaine de Beaumanoir avec le château, les communs et le parc : inscription par arrêté du 9 mai 1990. Certes, les murs ont résisté aux outrages des siècles ; tant les bâtiments du XVIIIe siècle , rénovés en style gothique à la fin du XIXe siècle , que la tourelle du XVe siècle , vestige de l'ancien château, rasé sur l'ordre d'Henri IV, pour punir le ligueur de Fontenelle. Mais un autre ennemi a envahi les lieux : la mérule. Les successeurs du comte et de la comtesse de Saint-Pierre décident alors d'entamer d'ambitieux travaux de restauration. « Tout en combinant les normes d'aujourd'hui et les impératifs esthétiques », souligne Valéry Vasilef, à l'exemple des interrupteurs ou des radiateurs dont le dessin des origines a été reproduit.","habitants":"Famille Eder de Beaumanoir\"","divers":"Beaumanoir_Leslay","gps":"","images":["../../jctruffet.com/image/image_22/22_Beaumanoir_Leslay_1.jpg","../../jctruffet.com/image/image_22/22_Beaumanoir_Leslay_2.jpg","../../jctruffet.com/image/image_22/22_Beaumanoir_Leslay_3.jpg","../../jctruffet.com/image/image_22/22_Beaumanoir_Leslay_4.jpg"]},"Consult_chateau_formulaire49fe":{"id":"Consult_chateau_formulaire49fe","dept":"22","canton":"Broons","commune":"Guitté","nom":"Beaumont_Guitté","type":"Château","periode":"XVII","histoire":"BEAUMONT, en 1158, devient la propriété de Hervé de Guitté, Baron, mentionné en 1167, parmi les conseillers du duc de Bretagne. Bertrand de Beaumont est ainsi signalé en 1325 comme fils de Mathieu Piedevache de Beaumont. Alain de Beaumont, chevalier breton vivant vers 1370, mentionné dans plusieurs comptes ducaux, Olivier de Guitté, Seigneur de Vaucouleurs, Robert de Guitté, Chevalier de Bretagne, en 1371, fait partie des 27 chevaliers de la montre du connétable de France. Il fait partie, aussi, de l'association des nobles contre l'invasion de la Bretagne. Après plusieurs générations de Guitté, le château de Beaumont ira, par héritages et diverses alliances, à plusieurs propriétaires, avant d'appartenir à la famille de Carné, à la suite du mariage, en 1832, de Louise-Marie-Léonie de Chappedelaine de Limonëlan. La seigneurie de Guitté et le fief de Beaumont appartiennent au début du XIVe siècle à la famille Piedevache, ancien lignage noble du pays de Rennes dont un ramage aurait pris le nom de Beaumont, est peut-être celui qui comparait en 1371 à Pontorson lors de la montre de son cousin Bertrand Du Guesclin. Les comptes de la ville de Bergerac mentionnent ce personnage qui accompagna le connétable dans ses campagnes. selon une généalogie des comtes de Meulan ce même Alain de Beaumont dit \"Pied de Boeuf\", seigneur de Beaumont-Guitté, aurait épousé autour de 1400, Jeanne de Meulan, dame du Molay-Bacon, près de Bayeux. Cette alliance avec une héritière d´un grand lignage de la noblesse normande est peut-être à l'origine de certains aspects particuliers du château.","architecture":"BEAUMONT, le châtelet d'entrée, autrefois rattaché à une enceinte qui devait barrer l'éperon, présente une qualité de construction et une conception particulièrement élaborée pour sa très petite taille.  L'aspect fortifié insistant correspond plus à une dimension symbolique et une recherche de prestige qu'à un réel souci de fortification, qui était soumis au contrôle ducal et réservé à des terres de rang élevé. Le même haut niveau de qualité architecturale se retrouve sur le logis dont les fenêtres malgré la restauration du XIXe siècle ont conservé leur modénature authentique. Les lucarnes du comble, les souches des cheminées polygonales et le réseau flamboyant de la baie située en haut de la tour d´escalier ainsi que le châtelet d´entrée permettent de situer l'ensemble aux alentours des années 1460-1480.  La tour d'escalier à pans coupés du logis seigneurial surmonté d´un volume carré ponctué par un pignon, forme rare et atypique en Bretagne au XVe siècle est en revanche fréquente dans le Bessin et la campagne de Caen. Les attaches normandes de Jeanne de Meulan, dame de Beaumont, au XVe siècle peuvent expliquer cette  partie architecturale remarquable.                                                             Éléments protégés MH : la porte d'entrée avec les deux tours l'encadrant ; la petite porte du XVe siècle et l'encorbellement sur la façade : inscription par arrêté du 19 juin 1926.","habitants":"Famille de Carné\"","divers":"châteaux à Guitté; Beaumont                    GPS :48° 18' 06,17\" Nord, 2° 05' 28,12\" Ouest","gps":"48° 18' 06,17\" Nord, 2° 05' 28,12\" Ouest","images":["../../jctruffet.com/image/image_22/22_Beaumont_Guitt%c3%a9_1.jpg","../../jctruffet.com/image/image_22/22_Beaumont_Guitt%c3%a9_2.jpg","../../jctruffet.com/image/image_22/22_Beaumont_Guitt%c3%a9_3.jpg"]},"Consult_chateau_formulaire77e3":{"id":"Consult_chateau_formulaire77e3","dept":"22","canton":"Dinan","commune":"Trégon","nom":"Beaussais_sur_mer","type":"Château","periode":"XvI-XVII","histoire":"trois châteaux à Beaussais sur mer ; le Beaussais, le Crochais et le Guérrais.                                                                                                        BEAUSSAIS, le château de Beaussais se situe entre les presqu'îles de Saint Jacut de la mer et de Lancieux dans un environnement exceptionnel, la baie de Beaussais, avec vue sur l'île des Ebihens et l'île Agot. Le chateau de Beaussais est à proximité de Dinard, Dinan, Saint Malo, a changé de propriétaire et fait peau neuve. Désormais rebaptisé, \"Un jardin sur la mer\", nous vous accueillons pour célébrer votre mariage face à la Baie de Beaussais et aux Ebihens. Le domaine bénéficie de deux espaces de réception  ce qui vous permet d'opter pour un \"Plan B\" en cas de météo capricieuse  et se prête parfaitement à l'organisation de cérémonie laïque face à la mer.     La construction  du XVIIe siècle, est entouré d'un parc de 2 ha. C'est un hôtel, le château de Beaussais a été classé aux M.H. en 1926.                                                                                                              GUERRAIS, sa construction date du XVIIe siècle. Le manoir de la Guérais est une seigneurie du Plessix-Balisson, qui a appartenu aux familles Le Bégassoux, aux Breil de Rays, à Chrestien de Tréveneuc et Besnard,  Un aveu de 1706 indique que les seigneurs de La Guérais exploitaient à l'époque, les salines en baie du Frémur. Le Manoir de la Guérais a été reconstruit en 1729. Il a été en partie démoli, en 1793, sous le régime de la Terreur. La Guérais est un manoir qui ne comporte qu'un seul pavillon d'extrémité, l'autre n'ayant  jamais été construit. Les façades sont ornées de deux oculis placés de façon symétrique par rapport aux portes d'entrée, qui éclairent les couloirs et l'escalier en pierre.","architecture":"CROCHAIS, situé au voisinage d'un souterrain du second âge du fer, est le témoignage d'une occupation pluriséculaire du site qui comprend un logis manorial du XVe siècle et un logis du XVIIIe siècle, avec une cour close et une chapelle, ayant appartenu, aux familles Ladvocat (XVe - XVIIIe siècle.) et Briot (XIXe-XXe siècle.) Le site du château de la Crochais permet d'appréhender, outre la permanence de l'occupation du site, l'évolution de l'habitat seigneurial de la fin du Moyen-Age à la fin de l'Ancien Régime. ce logis composé d'un étage carré et d'un étage de comble est divisé par trois murs-de-refend montant du  fond et portant souche de cheminée. La façade antérieure sur cour présente cinq travées régulières, chaque travée étant formée par de grandes fenêtres rectangulaires verticales. La travée antérieure gauche, coiffée d'un toit en pavillon sommé d'épis de faîtage en zinc, et la travée recevant l'entrée, sont en ressaut, la première étant affirmée par un large fronton-pignon triangulaire. Le logis manorial primitif, situé à l'arrière du précédent logis, est un logis de plan rectangulaire à un étage carré dont la façade postérieure présente une tour circulaire demi-hors-oeuvre enfermant probablement un escalier en vis. Cette tour est située au droit de l'entrée architecturée (porte à arc en anse de panier en accolade s'inscrivant dans un arc brisé mouluré à base prismatique et à archivolte). La façade antérieure est en outre ouverte de deux croisées à l'étage.","habitants":"Beaussais ;                      Crochais; Famille Ladvocat                            Guerrais; Familles Le Bégassoux\"","divers":"trois châteaux à Trégon; le Beaussais, le Crochais grav-3-4 et le Guérrais.                                                       Guerrais GPS : 48° 34' 51' Nord, 2° 08' 20\" Ouest                                      Crochais  GPS : 48° 33' 45\" Nord, 2° 04' 54\" Ouest","gps":"48° 34' 51' Nord, 2° 08' 20\" Ouest","images":["../../jctruffet.com/image/image_22/22_Beaussais_sur_mer_1.jpg","../../jctruffet.com/image/image_22/22_Beaussais_sur_mer_2.jpg","../../jctruffet.com/image/image_22/22_Beaussais_sur_mer_3.jpg","../../jctruffet.com/image/image_22/22_Beaussais_sur_mer_4.jpg"]},"Consult_chateau_formulaire2e0c":{"id":"Consult_chateau_formulaire2e0c","dept":"22","canton":"Pleslin-Trigavou","commune":"La Vicomté sur Rance","nom":"Bellière_22","type":"Château","periode":"XV-XVII","histoire":"BELLIERE,  la construction  date du XIIe  XVe et XVIIe siècle. Le 1er seigneur connu de La Bellière était Raoul de Dinan, Vicomte de Poudouvre (1237-1287). La seigneurie de La Bellière possèdait à cette époque un droit de Haute Justice.  Au XIVe siècle, le château échut par alliance aux Raguenel, Famille de Thiphaine, première épouse de Bertrand Du Guesclin, connétable de France. Après la mort de Tiphaine , il passa à son frère Guillaume, puis à ses descendants. Le dernier Raguenel de cette branche, Jean prit le nom  de Malestroit lors de son mariage avec l'héritière à sa mort en 1471 laissa deux filles l'une d'elle Jeanne, dame de Bellière et de Combourg apporta le domaine à son mari, Tanneguy du Chastel, gouverneur de la cerdagne mort au siège de Bouchain en 1477. Ensuite on trouve les Bosséon qui en 1677 vendirent le domaine à Pierre Girault de Charmoi dont la petite fille et héritière épousa Alain Collin de Boishamon.  En 1767, le domaine passe aux Collin de La Bellière, qui jouent un grand rôle dans l'érection de La Vicomté-sur-Rance en paroisse en 1870, et en commune en 1878. Le château de la Bellière est resté dans la même famille.","architecture":"BELLIERE, les parties plus ancienne date du XIIIe siècle remanié au XIVe château aux grands murs de granit irrégulièrement percés de baies. Il aurait été habité par Typhaine de Raguenel, première épouse du connétable Duguesclin. L'ensemble du domaine, la tour, le corps de logis, la chapelle, les communs et le colombier, représente le type même du manoir à cour close des XIVe-XVe siècles. Le Château de la Bellière est entouré d'étangs. Au XIXe siècle, le château subit des restaurations malheureuses. Les souches de cheminées, signalées par Eugène Viollet le Duc dans son dictionnaire d'architecture, ont été enduites de mortier teint sur lequel ont été tracés de faux joints; les cornes en ardoises qui ornaient leur couronnement ont été remplacées par du bois et du zinc. Les façades semblent également avoir subi des transformations, certaines baies étant bouchées et d'autres paraissant modernes.. Le château de la Bellière a conservé des tuyaux de cheminées à souches octogonales en granit, en brique et en ardoise, qui datent de la fin du XIVe siècle, avec ses couronnements et ses arcatures en ardoises. Les terres qui l'avoisinent sont de grandes pièces de terre bordées de chênes hauts de fût. \nÉléments protégés MH : le château de la Bellière en totalité : inscription par arrêté du 9 mars 1927.","habitants":"Famille de  Collin de La Bellière\"","divers":"Bellière GPS : 48° 29' 43\" Nord, 1° 58' 15\" Ouest","gps":"48° 29' 43\" Nord, 1° 58' 15\" Ouest","images":["../../jctruffet.com/image/image_22/22_Belli%c3%a8re_22_1.jpg","../../jctruffet.com/image/image_22/22_Belli%c3%a8re_22_2.jpg"]},"Consult_chateau_formulaire48ef":{"id":"Consult_chateau_formulaire48ef","dept":"22","canton":"Pléneuf-Val-André","commune":"Erquy","nom":"Bienassis_Erquy","type":"Château","periode":"XV-XVII","histoire":"BIENASSIS, au début du XVe siècle, le domaine est vendu à Jean du Quélénnec, seigneur de Bienassis, qui avec son fils Geoffroy va construire un premier château fort. Pendant les guerres de la ligue en 1590, ce château est en partie détruit et Gilles Visdelou, devenu propriétaire par mariage, va  entreprendre  en  1620   la reconstruction de celui-ci. Toujours par mariage, Bienassis passe aux mains du comte de Lamarck puis au Duc d'Arenberg, Prince du Saint Empire qui s'empresse de le vendre à un cousin de sa femme, le comte de la Ville Théart. Celui-ci va redonner une nouvelle splendeur à Bienassis en créant le potager et la grande avenue. En 1792, le comte de la Ville Théart est en Angleterre, afin d'acheter des pur-sang anglais. Bienassis est alors confisqué, en tant que bien national, transformé en prison avant d'être vendu au Général Valletaux. Celui-ci meurt au début du XIXe siècle pendant la guerre d'Espagne et Bienassis tombe dans l'oubli, jusqu'à ce que l'Amiral de Kerjégu, alors sénateur des Côtes-du-Nord découvre ce château et décide de l'acheter. Depuis, le château de Bienassis est toujours habité par des descendants de cette famille.par M. François de Kerjagu.","architecture":"BIENASSIS,  cette façade, agrémentée d'un large perron, permet d'accéder à l'intérieur du château où l'ensemble du rez-de-chaussée meublé témoigne d'une maison vivante. L'architecture et la décoration intérieure de l'entrée, du grand salon de compagnie, de la salle des gardes, de la cuisine et de la salle à manger révèlent également l'évolution de la vie de château du XVe siècle à nos jours.  Enfin, on ne peut quitter Bienassis en flânant librement dans son jardin, dit à la française, agrémenté de ses 750 pieds de rosiers, et d'où l'on a une très belle vue sur l'arrière du château et sur le potager du XVIIe siècle, d'une superficie de pratiquement deux hectares entièrement clos de murs en demi cintre pour sa partie nord. Bienassis représente un ensemble complet de demeure seigneuriale. Bienassis vous charmera par son histoire et par son intérieur meublé...Éléments protégés MH : le château, à savoir : le logis pour ses façades et toitures et son grand escalier ; l'ouvrage d'entrée avec ses pavillons, en totalité ; les douves, avec leurs murs, la levée de terre qui les délimite au sud et l'ensemble des constructions se trouvant dans et sur ces douves (ponts, vestiges en pierre d'édifices antérieurs, escaliers, etc...). En arrivant, on découvre une avenue, d'une superficie de huit hectares, classée au titre des M.H. depuis 1945. A l'origine, elle comportait une majorité de chênes centenaires et superbes. A l'issue de la tempête d'octobre 1987, cette allée a été replantée à l'identique ainsi que l'ensemble du parc forestier s'étendant à gauche et à droite de celle ci. Cette grande avenue conduit devant l'enceinte constituée de remparts datant du XVIe siècle et remaniés au XVIIe siècle et les douves creusées et en eau depuis la fin du XVe siècle.","habitants":"Duc d'Arenberg\"","divers":"Château de Bienassis                             GPS : 48° 35' 17,48\" Nord, 2° 29' 14,24\" Ouest","gps":"48° 35' 17,48\" Nord, 2° 29' 14,24\" Ouest","images":["../../jctruffet.com/image/image_22/22_Bienassis_Erquy_1.jpg","../../jctruffet.com/image/image_22/22_Bienassis_Erquy_2.jpg","../../jctruffet.com/image/image_22/22_Bienassis_Erquy_3.jpg","../../jctruffet.com/image/image_22/22_Bienassis_Erquy_4.jpg","../../jctruffet.com/image/image_22/22_Bienassis_Erquy_5.jpg","../../jctruffet.com/image/image_22/22_Bienassis_Erquy_6.jpg"]},"Consult_chateau_formulairee233":{"id":"Consult_chateau_formulairee233","dept":"22","canton":"Plancoêt","commune":"Plorec sur Arguenon","nom":"Bois_Billy","type":"Château","periode":"XVIII","histoire":"BOIS-BILLY, dit  Windsor aujourd'huide  l'ancien château de Boisbilly ou Bois-Bily, aujourd'hui disparu. C'était jadis le château seigneuriale de Plorec. Il possédait un droit de haute, moyenne et basse justice. En 1277, au mois de juin, l'accord entre le prieur de Léhon et Olivier du Chalonge est confirmé \"o le seiaux à monsor Alain du Boisbilly, chevalier, sénéchal de Rennes\". En 1369, Henri de Boisbilly est archer à la montre de Jean de Beaumanoir, à Saint-lô, avec \"Perrot de Quoitbily, escuier\". En 1379, le 1er mai, Jehan du Boisbilly assiste à la montre d'Olivier de Clisson. Cette montre a lieu à la bastide de Saint-Gouesnou, près de Brest. Le 28 avril 1381, Geoffroi du Boisbilly ratifie, à Lamballe, le traité de Guérande. En 1418, le duc de Bretagne fait compter 12 livres à Olivier du Boisbilly, qui le suit dans son voyage en France. Au XVme siècle, deux Boisbilly sont portés au compte de Mauléon, trésorier d'Espagne. En 1437, Olivier du Boisbilly prête serment de fidélité au duc de Bretagne. Jean du Boisbilly, sieur du Bois-Mottay, est archer dans l'armée de Bouillé, lieutenant général en Bretagne. En 1780, la terre du Boisbilly appartient à M. de Coëtrieux ; Transformé en hôtel restaurant par madame Annie Bouvier; actuellement dit château de Windsor.","architecture":"Bois-BILLY, après avoir exploité pendant 22 ans avec son mari l'hôtel-restaurant Le Windsor, Annie Bouvier aurait pu espérer une fin d'activité moins mouvementée. Le 1eroctobre 2009, les époux Bouvier cèdent le fonds de commerce à un trio de repreneurs, qui se révélera très vite incapable de maintenir l'activité. Un an plus tard, ils mettront en effet la clé sous la porte, laissant nombre de créanciers impayés. Aujourd'hui, le fonds de commerce n'existe plus, faute d'activité, mais les murs sont à vendre, attirant les convoitises de professionnels français et étrangers. \n«Le père d'un des repreneurs avait informé des mésaventures financières de son fils et mis en garde contre ce projet de reprise», indique Roger Kubryk. Dernier épisode de ce fiasco, la liquidation judiciaire immédiate de la société La Bégassière, prononcée par le tribunal de commerce de Saint-Malo, le 13 décembre 2011. Retour donc à la case départ pour Annie Bouvier, qui, à 69 ans, ne souhaite pas reprendre l'activité et a mis en vente le château. Elle n'a pas souhaité communiquer le montant de la mise à prix.","habitants":"M. de Coëtrieux \"","divers":"Châteaux de Bois-Billy dit de Windsor à  Plorec sur Arguenon","gps":"","images":["../../jctruffet.com/image/image_22/22_Bois_Billy_1.jpg","../../jctruffet.com/image/image_22/22_Bois_Billy_2.jpg"]},"Consult_chateau_formulaire7eb9":{"id":"Consult_chateau_formulaire7eb9","dept":"22","canton":"Callac","commune":"Coadout","nom":"Bois_de_la_Roche","type":"Forteresse","periode":"XIX","histoire":"BOIS de La ROCHE, à la fin du XVe siècle, le château fut pillé et brûlé par le vicomte de Rohan, aux ordres du roi de France, en représailles contre le seigneur du lieu, fidèle au duc de Bretagne, qui avait mis à sac son château de Quintin. Près dun siècle plus tard, le Bois-de-la-Roche appartient à Yves du Liscoët dont le passé protestant est très mal connu. Le château actuel est construit au milieu du XIXe siècle par la famille Rolland du Roscoët sur le site de l'ancienne forteresse incendiée vers 1489 et dont ne subsiste qu'une tour ronde, du XVe ou XVIe siècle. La chapelle, qui date de 1856-1860, et la maison de garde sont disposées au nord du logis, les ruines de l'ancienne chapelle subsistant dans le parc. Les dépendances, dont des écuries, sont certainement du XVIIIe siècle ; portail à fronton triangulaire remonté portant la date  de 1720. Restauration en 1910 avec destruction partielle du corps de logis néo-médiéval construit au milieu du XIXe siècle. L'édifice, accolé au nord-ouest de l'ancien donjon restauré, est composé d'une tour circulaire principale et de trois tourelles.","architecture":"BOIS de La ROCHE, la construction date du XIVe et XVe siècle. Les vestiges  nous le  présente  comme un corps de bâtiment de 70 m de façade et qui prolongeait l'habitation actuelle jusqu'au mur d'enceinte, vers le Nord. On peut encore voir des traces des cabinets d'aisance insérées dans la muraille, comme le voulait la coutume au Moyen-Age. Les communs sont de style Renaissance, ainsi que des pierres de récupération insérées dans la construction récente laisse entendre que l'ensemble avait une certaine importance. Les tours nous ramènent au plus tôt au XIIIe siècle et il existe une ferme (à l'ouest) dont le magnifique porche d'entrée recèle une charpente qui laisserait entendre que des Compagnons du Devoir sont passés par là, tant le travail est précis et complexe. Vous pourrez demander à visiter l'intérieur du Château du Bois de la Roche, pour étudier les difficultés que connurent les reconstructeurs à à allier les différents niveaux du bâtiment actuel, aux anciennes tours, dont les hauteurs sous plafond diffèrent. Ils utilisèrent pour la première fois le ciment, tant il leur était difficile de voir les poutres de bois partir en fumée. Le château du Bois-de-la-Roche est lié aux familles de Roscerf et du Liscouët.","habitants":"Famille de  Yves du Liscoët \"","divers":"Bois de la Roche  à Couadout                                        GPS : 48° 31' 05\" Nord, 3° 11' 13\" Ouest","gps":"48° 31' 05\" Nord, 3° 11' 13\" Ouest","images":["../../jctruffet.com/image/image_22/22_Bois_de_la_Roche_1.jpg","../../jctruffet.com/image/image_22/22_Bois_de_la_Roche_2.jpg","../../jctruffet.com/image/image_22/22_Bois_de_la_Roche_3.jpg","../../jctruffet.com/image/image_22/22_Bois_de_la_Roche_4.jpg"]},"Consult_chateau_formulaire07f6":{"id":"Consult_chateau_formulaire07f6","dept":"22","canton":"Plouha","commune":"Pleiguin","nom":"Bois_de_la_Salle","type":"Château","periode":"XVI-XVIII","histoire":"BOIS de la SALLE, le château, avec ses dépendances et jardins, montre un ensemble représentatif du premier quart du XVIIIe siècle. Au début du XVIe siècle, la demeure se présente comme une maison noble dont les propriétaires exercent la charge héréditaire de greffier civil et criminel de la cour de Lanvollon.","architecture":"BOIS de La Salle, sa construction date de la fin du XVIIe siècle. Le château, avec ses dépendances et jardins, montre un ensemble représentatif du premier quart du XVIIIe siècle. Au début du XVIe siècle, le château se présente comme une maison noble. L'Aménagement des jardins eut lieu, en 1702, ainsi que l'élévation des étages d'une partie de l'habitation. L'étang est achevé en 1706. En 1718, construction des communs. En 1723, achèvement du pavillon et de la chapelle dont les sculptures furent réalisées par Corlay. A la Révolution, l'ensemble est déclaré bien national. En 1795, d'importants dommages furent causés par des soldats républicains. A la Révolution, l'ensemble est déclaré bien national. En 1795, des dommages y sont causés par des soldats républicains. L'édifice apparaît au fond d'une cour d'honneur fermée d'un portail. De chaque côté se trouvent deux bâtiments (sellerie à droite et chapelle à gauche). Vers l'est, la basse-cour comprend un bâtiment en L et les communs. Derrière le logis s'étend le jardin avec l'orangerie. Colombier au sud. Vestiges d'une motte féodale ou d'un camp romain en forêt.\nÉléments protégés MH : l'ensemble formé par le château, les dépendances, la chapelle, le colombier, l'orangerie, la cour d'honneur et le jardin: inscription par arrêté du 24 décembre 1993.","habitants":"Seigneurs locaux\"","divers":"A Pleiguin ; château de Bois  de la salle                                                                  GPS : 48° 37' 23\" Nord, 2° 55' 39\" Ouest","gps":"48° 37' 23\" Nord, 2° 55' 39\" Ouest","images":["../../jctruffet.com/image/image_22/22_Bois_de_la_Salle_1.jpg"]},"Consult_chateau_formulairee80b":{"id":"Consult_chateau_formulairee80b","dept":"22","canton":"Paimpol","commune":"Préhédel","nom":"Boisgelin","type":"Manoir","periode":"XV-XVII","histoire":"BOISGELIN, le manoir figure pour la première fois dans un acte de 1610. L'édifice se trouve au milieu d'un parc. Il en subsiste encore les pilastres des portes de la cour d'honneur et le motif d'entrée du jardin au nord, ainsi que des vestiges de bassins sous forme d'étang.  Le château de Boisgelin a été reconstruit en 1840 par Edmond de Boisgelin, époux de la fille Le Peletier de Saint-Fargeau. Gilles, marquis de Boisgelin restaure et transforme le château en hôtel sous le nom de Coatguélen ou Coatgelen.\nÉléments protégés MH : les façades et les toitures : inscription par arrêté du 14 janvier 1964.","architecture":"BOISGELIN, la construction du Manoir de Boisgelin date du XVe siècle.Le manoir proprement dit comprend un corps de logis principal en granit, flanqué de deux ailes à un étage sur rez-de-chaussée. L'aile Est semble avoir été construite au XVIe siècle. La deuxième campagne de construction s'arrête à gauche de la porte d'entrée centrale, et date probablement du XVIIe siècle. Cette porte est surmontée d'un fronton brisé. La troisième campagne comprend la partie ouest du pavillon central et l'aile ouest et a probablement eu lieu au XVIIe siècle. Charpente du XVIIIe siècle. Aujourdhui, le domaine de Boisgelin est un ensemble dune très grande beauté qui est ouvert à tous et ce, durant toute lannée, sans exception.  Le château de Boisgelin a été transformé en un très bel hôtel restaurant de renom et un Golf.","habitants":"Famille de Edmond de Boisgelin\"","divers":"Manoir de Boisgelin  à Prédéhel                                 GPS : 48° 41' 43\" Nord, 3° 00' 25\" Ouest","gps":"48° 41' 43\" Nord, 3° 00' 25\" Ouest","images":["../../jctruffet.com/image/image_22/22_Boisgelin_1.jpg","../../jctruffet.com/image/image_22/22_Boisgelin_2.jpg","../../jctruffet.com/image/image_22/22_Boisgelin_3.jpg"]},"Consult_chateau_formulaire7137":{"id":"Consult_chateau_formulaire7137","dept":"22","canton":"Plélo","commune":"Bringolo","nom":"Bringolo","type":"Château","periode":"XV-XVII","histoire":"A deux kilomètres à l'ouest à le Merzer, Grand-Ville et du Traou. GRAND-VILLE   Le château de la Grand-Ville a été construit vers 1650 à la suite du démantèlement du château fort de Kérimer par le chevalier du Breil de Rays. Il passa ensuite dans la famille Chrétien de Tréveneuc à la suite d'un mariage, puis au comte de Kergariou, qui épousa Mélanie de Tréveneuc, au XVIIIe siècle, propriété de Marguerite Guégan ou Guégen, dame de La Grandville et de Kériou (épouse de Pierre Le Boiséon, seigneur de Goudelin et de Chef-du-Bois), Taillard (en 1535), puis des familles du Breil de Rays (en 1741), de Tréveneuc, de Kergariou et de Catuélan. On mentionne Jehan Taillard en 1481 .                                                                                  TRAOU le manoir de Traou ou de Traon (XV-XVIe siècle) est bâti par la famille Le Boeuf (ou Le Beuf) à partir des années 1420. Il devient ensuite la propriété de la famille Le Veer (à partir de 1564, suite au mariage de Claudine Le Boeuf avec Jacques Le Veer). A noter qu'un Jehan Le Veer de An Traou est mentionné en 1481. Le manoir passe ensuite entre les mains de la famille Coëtnours puis, vers 1760, de Luc Urbain du Bouëxic de Guichen (lieutenant général de la marine ayant combattu au côté de La Fayette). Ce manoir est restauré vers 1975.","architecture":"GRAND-VILLE,  le château est constitué d'un grand corps de logis rectangulaire et de deux petits corps latéraux symétriques Est et Ouest formant une légère avancée ainsi que d'un corps latéral de plan presque carré articulé à l'angle sud-est du corps latéral est.\nÉléments protégés MH : le château, à savoir : le logis en totalité, les communs en totalité (écuries, granges et bâtiments associés, colombier, petits bâtiments annexes, cour pour son pavement, son sol d'assiette et ses murs de clôtures, serres), l'ensemble du parc comprenant notamment le saut-de-loup, le jardin potager avec ses clôtures, les allées et les chemins, les portes, les grilles et les éléments de clôture: inscription par arrêté du 13 novembre 2012                                                                                                     TRAOU, le manoir n'a pas été construit d'un seul jet. Les deux tours d'escalier sont certainement plus anciennes que les bâtiments d'habitation qui paraissent appartenir au XVIIe siècle. La disposition générale du plan est une variante originale et curieuse du plan type des manoirs bretons du XVIe siècle, avec la traditionnelle tourelle d'escalier en milieu de façade, entre les deux pièces principales, et les deux autres escaliers constituant la jonction avec les ailes dont celle de gauche est la seule conservée.","habitants":"Grand ville. Famille Chrétien de Tréveneuc  Traou ; famille Coëtnours\"","divers":"A deux kilomètres à l'ouest à le Merzer le château du Traou grav-2.  Grand-Ville grav-1 -4-5-6                                 GPS : 48° 35' 04\" Nord, 2° 59' 28\" Ouest","gps":"48° 35' 04\" Nord, 2° 59' 28\" Ouest","images":["../../jctruffet.com/image/image_22/22_Bringolo_1.jpg","../../jctruffet.com/image/image_22/22_Bringolo_2.jpg","../../jctruffet.com/image/image_22/22_Bringolo_3.jpg","../../jctruffet.com/image/image_22/22_Bringolo_4.jpg","../../jctruffet.com/image/image_22/22_Bringolo_5.jpg","../../jctruffet.com/image/image_22/22_Bringolo_6.jpg"]},"Consult_chateau_formulaire0edd":{"id":"Consult_chateau_formulaire0edd","dept":"22","canton":"Plénée-Jugon","commune":"Bréhand","nom":"Bréhand","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Bréhand; Launay-Gouray, Boishardy, du Chêne. LAUNAY-GOURAY,  le château était possédé en 1476 par Guillaume de Launay-Gouray. En 1609, Ollivier Gouray, seigneur de La Coste Plaintel, chevalier de l'ordre du roi, lieutenant Général en Bretagne, était seigneur de Launay-Gouray, Launay Madeuc Beauvais, et Francs-Regaire. Sous l'Ancien Régime, la seigneurie de Launay possède haute, moyenne et basse justice.     La construction date du XIe au XIXe siècle. Le domaine de Launay fut fondé au début du XIVe siècle par Typhaine, épouse du seigneur de Bréhand. Il est divisé en 1319 en Launay-Gouray  et Launay-Madeuc à la suite du mariage de Jeanne de Bréhand avec Robin Du Gouray. Cette seigneurie est érigée en bannière au milieu du XVe siècle. L'état civil, dès le XVIIe siècle, fait apparaître Vorhg-Urvoy Joseph et François à Brehand. Ils organisent Le Gouray de son nom avec Robin et Jeanne Urvoy de Brehand. Joseph a sa descendance Guillaume surnommé \"Conquis\" puis avec union Raffray-Urvoy, pour l'enfant Jeanne qui épousa Domrault. Le château de Launay est acquis par la famille de Foucaud en 1779. Dès 1848, Ludovic de Foucaud fit édifier un nouveau château, de style Classique, à l'emplacement de l'ancien. Jeanne y apprécia la cuisine jusqu'à sa retraite, en retrouvant sa fille Marie-Françoise unie à J-Ange Marie. Le domaine de Launay abrite un pigeonnier et une chapelle intérieure. Dans cette dernière repose le gisant de Charles Madeuc, chevalier et chambellan de Jean V, capitaine de Moncontour en 1422 et seigneur de Launay-Madeuc en 1436.","architecture":"BOISHARDY; le manoir de Boishardy du XVIe siècle, mentionné en 1587, a donné son nom à la famille d'un chef chouan auquel il a appartenu, et qui est décédé le 17 juin 1795 dans le chemin des Champs-Piroué en Bréhand. Propriété de Plesou Bernou en 1444, d'Yvon Le Forestier en 1514 et de Guyon Le Forestier en 1536. Le manoir appartient en 1587 à Jean Le Forestier et possède un droit de haute justice qu'il perd en 1700. L'édifice est restauré au début du XXe siècle.                                                                        CHENE,  le château du XVIIe siècle, propriété successive de  Guillaume Roquel en 1514, de Poulain de Mauny, Jules Courson et Villéon Boscher, époux de Jeanne Guérin en 1664. A signaler que le domaine de la Chesnaie appartenait aux XVe et XVIe siècles à la famille Hidoux.","habitants":"Launay; Ludovic de Foucaud                                                                            Boishardy; Famille de Jean Le Forestier                   Chéne ; famille Hidoux\"","divers":"Trois châteaux à Bréhand; Launay-Gouray grav 1-2, Boishardy grav-3, du Chêne grav-4.  mairie grav-5             GPS : 48° 24' 13\" Nord, 2° 34' 23\" Ouest","gps":"48° 24' 13\" Nord, 2° 34' 23\" Ouest","images":["../../jctruffet.com/image/image_22/22_Br%c3%a9hand_1.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hand_2.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hand_3.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hand_4.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hand_5.jpg"]},"Consult_chateau_formulaire5abd":{"id":"Consult_chateau_formulaire5abd","dept":"22","canton":"Paimpol","commune":"Bréhat","nom":"Bréhat_Citadelle","type":"Citadelle","periode":"XIX","histoire":"BREHAT, Île-de-Bréhat  est une commune française située au nord de la pointe de l'Arcouest en Bretagne. Elle est constituée de l'archipel de Bréhat à l'exclusion de l'Île Maudez, qui doit son nom à l'île principale, dénommée Bréhat, dont le nom breton est Enez Vriad. L'Île-de-Bréhat appartient au pays historique du Goëlo.\nCette commune est rattachée au canton de Paimpol construit en 1863, sous le Second-Empire, ce fort a au départ est  une destination militaire. Des soldats y logent jusquen 1875. Lédifice, aussi appelé la citadelle, a été restauré en 1998. Désormais ouvert à la visite, le fort abrite une verrerie dart . C'est une belle halte lors d'un séjour sur l'île que cet arrêt pour visiter la Citadelle qui abrite en son sein la Verrerie de Bréhat, entreprise connue et appréciée internationalement.","architecture":"BREHAT, après laffaire de Fachoda, incident qui oppose les français aux anglais en 1899, le fort est réarmé. Des militaires en provenance de Saint Brieuc et une batterie dartillerie venant de Langres y sont installés.Toutefois, le fort ne connaîtra jamais le feu. Par la suite, lédifice a longtemps servi de logement à des familles de lîle.  De plan carré, le fort est constitué dune cour centrale entourée de pièces à usages divers (casernement, prison, logements..). Toutes les pièces, en pierres, sont voûtées ; pour éviter les incendies, le bois a été exclu des matériaux de construction.  Lédifice est entouré de douves, désormais comblées au niveau de lentrée. A lorigine un pont-levis mobile permettait laccès au bâtiment. La terrasse est protégée par un garde-corps, avec une alternance de meurtrières et de canonnières.Lédifice, aussi appelé la Citadelle, a été restauré en 1998. Désormais ouvert à la visite, le fort abrite une verrerie dart.","habitants":"Enez Vriad.\"","divers":"A Bréhat , Maison du corsaire grav 5","gps":"","images":["../../jctruffet.com/image/image_22/22_Br%c3%a9hat_Citadelle_1.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hat_Citadelle_2.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hat_Citadelle_3.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hat_Citadelle_4.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9hat_Citadelle_5.jpg"]},"Consult_chateau_formulaire7277":{"id":"Consult_chateau_formulaire7277","dept":"22","canton":"Bégard","commune":"Brélidy","nom":"Brélidy","type":"Château","periode":"XVI-","histoire":"Deux châteaux à Brélidy dont celui de Brelidy et Kerviziou.             BRELIDY, en 1520, Péronnelle de Lezverzault (ou Lézerzot) qui possède les deux seigneuries de Brélidy et de Lézerzault épouse Jacques du Parc de Locmaria, faisant ainsi entrer Brélidy dans le patrimoine de cette grande famille. Ce sont les du Parc qui vont décider de construire le château de Noblans sur le versant sud de la colline,en contre-bas de l'ancienne forteresse.  Pendant la Révolution de 1789, les propriétaires ayant émigré le château est vendu comme bien national ainsi que les terres qui sont réparties entre plusieurs acquéreurs. Le château de Brélidy, près de Guingamp, a été racheté par un homme d'affaires d'origine bretonne. Alan Fustec va y créer un laboratoire dédié à l'écologie. Le château du XVIe et XVIIe siècles change de vocation. Le majestueux édifice nest plus un hôtel-restaurant de charme. Il va être transformé en laboratoire du développement durable. A linitiative des nouveaux propriétaires, Armelle et Alan Fustec, tous les deux ingénieurs agronomes de formation","architecture":"KERVIZIOU, situé à proximité du Théoulas il est habité par des propriétaires privés. Ceux-ci autorisent exceptionnellement la visite des parties extérieures lors des randonnées encadrées par les responsables de \"Tro an daou dour\". Il témoigne de la prospérité du territoire pendant les XVIe et XVIIe siècles due en particulier à la culture et à l'industrie du lin et du chanvre; à quelques dizaines de mètres des bâtiments, tous inclus dans une grande cour rectangulaire, on découvre un rouissoir alimenté par une source. Manoir de Kerviziou à Brélidy. Aucune légende ne semble sy rapporter et la mémoire collective ne le situe guère dans ses jardins secrets.Son élégance, toutefois,na dégale que sa discrétion consolidée par un écrin de verdure chatoyant. La demeure de Kervizou,sur la commune de Brélidy, loin du temps et de toute agitation, a conservé une authentique patine. Distante de quelques prés du Théoulas, autre ruisseau silencieux, elle ne dut son existence quà des tailleurs de lin argentés.Telle est du moins lhypothèse de ses propriétaires actuels.","habitants":"Bredily; Famille de   Péronnelle de Lezverzault                          \"","divers":"Deux châteaux à Brélidy dont celui de Brelidy grav 1-2 et Kerviziou grav-3.","gps":"","images":["../../jctruffet.com/image/image_22/22_Br%c3%a9lidy_1.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9lidy_2.jpg","../../jctruffet.com/image/image_22/22_Br%c3%a9lidy_3.jpg"]},"Consult_chateau_formulaire57a5":{"id":"Consult_chateau_formulaire57a5","dept":"22","canton":"Rostrenen","commune":"Canihuel","nom":"Canihuel","type":"Château","periode":"XIII-XVII-XIX","histoire":"Deux châteaux à Canihuel; Bois-Berthelot et Ville-Blanche.                         BOIS-BERTHELOT, le château est possédé du XIIIe siècle au XIXe siècle par la famille du Bois-Berthelot.  Le 18 juillet 1796, Marie Barbe Trémye, femme de Paul Alexandre du Bois-Berthelot, rachète le château et plusieurs métairies. Ensuite le domaine passa par alliance aux de Sère et de Montrichard.                                                                                              VILLE-BLANCHE, le manoir est cité dans un aveu de 1654. Les bâtiments se présentent autour d'une cour rectangulaire avec accès au sud-est et au sud-ouest. Logis au nord, pavillon au sud avec traces de portail, et dépendances à l'ouest. Le pavillon est de plan carré. Lui a été accolé  a un corps de bâtiment perpendiculaire, saillant au nord et à l'est. L'escalier extérieur est situé dans l'angle rentrant des deux bâtiments. Une pièce unique occupe, à chaque niveau, chacun des deux bâtiments, sans communication entre elles. L'échauguette est portée par un cul-de-lampe mouluré reposant sur une colonne engagée.","architecture":"BOIS-BERTHELOT, en 1794, le château est à Paul Alexandre du Bois Berthelot qui émigre. La même année un procès verbal de visite et d'estimation donne une description complète du château, il est à cette date en bon état, \"réparé entièrement il y a quelques années et la chapelle ne consiste plus qu'en quatre murailles nues sur charpente et toit en ardoises avec une vieille porte à deux battants\".  Le château est isolé et possède un étang à l'ouest; il est composé d'un corps principal et deux ailes latérales en retour d'équerre en façade antérieure. Rez-de-chaussée surélevé, un étage carré et étage de comble. La partie centrale du corps principal est plus élevée. Elévations ordonnancées, toits à long pans à croupe, toit en pavillon sur la partie centrale du corps principal contenant un escalier.","habitants":"Paul Alexandre du Bois-Berthelot                         \"","divers":"Deux châteaux à Canihuel Bois-Berthelot et Ville-Blanche grav-4-5-6-7.                                                               gps  48° 19' 14? nord, 3° 05' 24? ouest","gps":"","images":["../../jctruffet.com/image/image_22/22_Canihuel_1.jpg","../../jctruffet.com/image/image_22/22_Canihuel_2.jpg","../../jctruffet.com/image/image_22/22_Canihuel_3.jpg","../../jctruffet.com/image/image_22/22_Canihuel_4.jpg","../../jctruffet.com/image/image_22/22_Canihuel_5.jpg","../../jctruffet.com/image/image_22/22_Canihuel_6.jpg","../../jctruffet.com/image/image_22/22_Canihuel_7.jpg"]},"Consult_chateau_formulaire5c1a":{"id":"Consult_chateau_formulaire5c1a","dept":"22","canton":"Lanvallay","commune":"Plouasne","nom":"Caradeuc_22","type":"Château","periode":"XVIII-XIX","histoire":"CARADEUC, construit en 1723 par M. de Caradeuc et fut habité par Louis-René  procureur général de La Chalotais qui fit expulser les Jésuites de Bretagne.  Mais on sait que c'était un lieu d'expérimentation agricole pour Louis-René Caradeuc de la Chalotais, arrestation en 1765 de Louis- Rrené de Caradeuc de la Chalotais qui décéda en 1785. Louis XVI a érigé la terre de Caradeuc en marquisat en 1776.  Son fils également procureur au parlement de Bretagne hérite mais périt à l'échafaut en 1794.  les Caradeuc parviennent à récupérer  le domaine sans interruption jusqu'à l'extinction  de leur lignée en la personne d'Alfred de Falloux ministre, héritier du château le marquis de Krenier descendant des Caradeuc en ligne maternelle qui entreprend de reconstituer le parc. En 1848, plan de Lhérault laissant penser qu'il existait un parc à l'anglaise autour de la demeure. En 1898: Parc à la française dessiné par Edouard André. A la fin du XIXe siècle, à la demande du comte René de Kernier, le parc prend le dessin qu'il a encore actuellement, mélange des styles français et paysager.  Au cours du XXe des statues et kiosques prennent place dans le parc. En 1954 une des rares statues de Louis XVI, due au sculpteur Molchenet est installée au fond d'une allée de hêtres. En 2001, un buste en marbre de Carrare, sculpté par Chammings, du procureur Général Louis-René Caradeuc de La Chalotais est inauguré, pour le tricentenaire de sa naissance.","architecture":"CARADEUC, édifice rectangulaire composé d'un corps de logis avec un pavillon central et un latéral à l'est, le château a été remanié en 1820 par la création d'un fronton triangulaire sur la face sud du pavillon central, portant les blasons Caradeuc et Martel ainsi que la devise \"Arreste ton coeur\". Vers le milieu du XIXe siècle, le château a été séparé des communs. Fin du XIXe siècle, surélévation des toitures du pavillon et construction d'un escalier monumental. Sur la façade nord, le rythme du pavillon central et des pavillons latéraux est accentué par une saillie de ceux-ci. Le corps de logis symétrique, ou se distingue un vaste escalier à trois révolutions. Le jardin à la française est limité par les douves. On ne sait pas s'il y avait un parc à la Française sur la propriété au cours du XVIIIe siècle.\nÉléments protégés MH : le château, à savoir les façades et les toitures du logis et des communs et le parc en totalité, lequel comprend les espaces paysagers et les jardins réguliers avec l'ensemble de leurs éléments de structure, d'architecture et d'ornement, l'entrée avec ses deux portes, ses murs et balustrades de pierre et son pavillon, ainsi que l'espace aujourd'hui à usage de parc de stationnement en bordure de la route départementale 20, avec sa fabrique : inscription par arrêté du 21 février 2011.","habitants":"M. de Caradeuc \"","divers":"Château de Caradeuc à Plouasse","gps":"","images":["../../jctruffet.com/image/image_22/22_Caradeuc_22_1.jpg","../../jctruffet.com/image/image_22/22_Caradeuc_22_2.jpg","../../jctruffet.com/image/image_22/22_Caradeuc_22_3.jpg"]},"Consult_chateau_formulairefc64":{"id":"Consult_chateau_formulairefc64","dept":"22","canton":"Lamballe-Armor","commune":"Meslin","nom":"Cargouet","type":"vestiges","periode":"XVII","histoire":"CARGOUET, le château initial de Cargouët fut bâti au XIIIe siècle. Il appartenait à la Seigneurie des Cargouët, avec un droit de haute-justice sur Meslin, Landéhen,  Maoué,  Malhoure et  Pomeret. Le 13/04/1793, le 3ème maire de Meslin, François Pincemin, et l'un des métayers du château de Cargoüet, furent guillotinés à Saint Brieux. Ils avaient participé, à l'émeute de Pommeret, le 23/03/1793, en compagnie de Boishardy.  L'édifice a appartenu aux familles de Cargouët au XIIIe siècle, de Largentaye au XIVe siècle, de la Motte aux XVe et XVIe siècles, Bertho aux XVIe et XVIIe siècles, Sauvaget des Clos aux XVIIe et XVIIIe siècles, et de Froulay au XVIIIe siècle.","architecture":"CARGOUET, a été construit au XVIIe siècle.  Encadrant l'entrée de la cour. Cet ensemble se composait du logis, d'une chapelle, d'un colombier, de deux pavillons d'entrée, de communs et de douves. Le colombier, la chapelle et un pavillon n'existent plus. Du logis, construit en deux campagnes au XVIIe siècle, reste la partie est avec sa tour carrée couverte d'un dôme. Le corps de bâtiment fut construit, à la fin du XVIIe siècle, flanqué d'une tourelle, qui servait de pigeonnier, ainsi que deux pavillons à la toiture en carène renversée. Les écuries du XVIIe siècle, à l'architecture classique, en sont le seul témoin intégralement préservé. Le Château de Cargouët tomba progressivement en ruine, à partir de 1903. Le Château de Cargouët a été inscrit aux Monuments Historiques en 1992.","habitants":"familles de Cargouët . \"","divers":"château de Cargouet à Meslin              GPS : 48° 27' 06\" Nord, 2° 35' 43\" Ouest","gps":"48° 27' 06\" Nord, 2° 35' 43\" Ouest","images":["../../jctruffet.com/image/image_22/22_Cargouet_1.jpg","../../jctruffet.com/image/image_22/22_Cargouet_2.jpg"]},"Consult_chateau_formulaire7fc1":{"id":"Consult_chateau_formulaire7fc1","dept":"22","canton":"Plancoët","commune":"Plancoet","nom":"Caunelaye","type":"Château","periode":"XVI-XVIII","histoire":"CAUNELAYE; la famille Thomas est une ancienne famille noble importante de Bretagne qui s'illustre dans de nombreuses guerres auprès du duc de Bretagne puis du Roi de France. La liste des fondateurs dans l'évêché de Saint-Malo et Dol en 1480 indique que Bertrand Thomas de la Caulnelaye. Jean Thomas IIe du nom, succède à son père au commandement de la forteresse de Montafilant, il est chevalier de l'ordre du Roi. Pour le dévouement et les sacrifices consentis par la famille Thomas de la Caulnelaye et Jean II, le roi Charles IX érige, par lettres-patentes de février 1554, la seigneurie au rang de châtellenie et vicomté. Son fils, Pierre Thomas, seigneur de la Caulnelaye, de la Gaudinaye et du Plessis-Caunaye est aussi chevalier de l'ordre du Roi et surtout gouverneur de la ville et du château de Dinan et de Saint-Lo. Georges, l'ainé de Pierre, est gouverneur des villes et château de Fougères et député aux états-généraux en 1588. L'un de ces seigneurs est sûrement le bâtisseur de l'ancien manoir.  La Caunelaye entre dans la famille du Breil de Pontbriand suite à l'achat de Louis-François Mathurin du Breil, vicomte du Pin-Pontbriand des terres et de la seigneurie de la Caunelaye, la Marche et Vaucouleurs en 1718. Des actes anciens mentionnent le site sous la forme \"Caulnelaye\", jusqu'au XIXe siècle. Le nom viendrait de la présence, à une certaine époque, d'aulnes sur le site, on distingue une source qui prend naissance près de la ferme Brard  qui nourrissait plusieurs réserves d'eau : viviers,  Aujourd'hui, sur les quatre pièces d'eau, seule deux sont toujours visibles. La seigneurie de la Caunelaye, ayant droit de haute justice, se situe en Corseul. En 1841, La Caunelaye passe dans la commune de Plancoët.","architecture":"CAUNELAYE, le château est composé de cinq travées dont une centrale avec un avant-corps pour signaler la porte d'entrée. Le fronton triangulaire de l'avant-corps central abritait les armes d'alliance du couple Joseph-Victor du Breil de Pontbriand et d'Agathe du Plessis-Mauron de Grénédan, qui ont été bûchées à la demande de la propriétaire des lieux sous la Révolution pour se conformer à la loi en vigueur. L'élévation indique un étage carré et un étage de comble sur surcroît éclairé par des lucarnes pendantes à arc segmentaire et mouluration en \"chapeau de gendarme\". La façade principale orientée au sud. Le cadastre ancien montre une pièce de terre entourée d'arbre qui offrait une longue perspective devant le château. L'aile ouest et l'aile en retour au nord sont les parties les plus anciennes du château. L'aile est a été ajoutée au XVIIIe siècle lors de l'agrandissement et la reconstruction de la façade. L'entrée principale se fait par la porte d'entrée centrale et permet d'accéder à l'espace de distribution avec l'escalier monumentale. L'entrée dessert un salon et se poursuit vers la salle à manger au rez-de-chaussée de l'aile ouest. Le rez-de-chaussée de l'aile est se découpent en deux salons. Les deux étages du corps central n'ont pas été visités. L'aile nord est composée de deux pièces au rez-de-chaussée desservies par un couloir à l'est. Les pièces du rez-de-chaussée du corps de bâtiment principal ont une grande hauteur sous plafond.","habitants":"Famille Thomas \"","divers":"Château de Cauelaye à Plancoët  GPS : 48° 29' 45\" Nord, 2° 12' 23\" Ouest","gps":"48° 29' 45\" Nord, 2° 12' 23\" Ouest","images":["../../jctruffet.com/image/image_22/22_Caunelaye_1.jpg","../../jctruffet.com/image/image_22/22_Caunelaye_2.jpg","../../jctruffet.com/image/image_22/22_Caunelaye_3.jpg"]},"Consult_chateau_formulaire9581":{"id":"Consult_chateau_formulaire9581","dept":"22","canton":"Plancoët","commune":"Trébédan","nom":"Chalonge","type":"Château","periode":"XVIII","histoire":"CHALONGE, situé aux environs de Dinan et entouré de bois, le château de Chalonge se découvre de la route. Des textes témoignent dun premier château dès 1260, appartenant à Olivier, Chevalier, seigneur du Challonge qui possédait une haute justice. Les bâtiments (logis, dépendances, orangerie, ferme) sont dus à Louis-Pierre-Marie de Lorgeril, né en 1744. La construction qui s'échelonne aux environs de 1785 n'était pas entièrement terminée à la Révolution. Ce château a vu naître, en 1811, Hippolyte de Lorgeril, poète écrivain et homme politique (conseiller général et député), directeur du journal légitimiste limpartial de Bretagne. Le château passe ensuite à la famille de Salins jusquà nos jours.","architecture":"CHALONGE, le pigeonnier et la chapelle sont les vestiges d'une construction précédente. L'édifice est précédé d'une grande cour d'honneur fermée d'une grille et sa façade sud donne sur un jardin à la Française limité par des douves.  Le fronton est orné des armes des Lorgeril et Hay des Nétumières en haut relief. Vers louest, on trouve un colombier ainsi quune belle chapelle, vouée à Notre-Dame de Nazareth.\nÉléments protégés MH : le château, la chapelle, le colombier, la cour d'honneur avec sa grille, les douves, le jardin à la française, les façades et toitures des dépendances, à l'exclusion de la ferme : inscription par arrêté du 20 décembre 1990.","habitants":"Louis-Pierre-Marie de Lorgeril\"","divers":"Château de Chalonge à Trébedan","gps":"","images":["../../jctruffet.com/image/image_22/22_Chalonge_1.jpg"]},"Consult_chateau_formulaireaf7e":{"id":"Consult_chateau_formulaireaf7e","dept":"22","canton":"Lanvallay","commune":"Trévron","nom":"Chalonge_Trévon","type":"Château","periode":"XV-XVI","histoire":"CHALONGE, Olivier du Chalonge, qualifié de chevalier, est mentionné dans deux chartes du prieuré de Léhon, en 1253, puis en 1277 avec son épouse Agnès au sujet d'un accord avec les moines pour leur moulin de Trévron. Leur fils Jean du chalonge est cité en 1304 dans le testament du duc Jean II, pour un legs de neuf livres. Le Château de Chalonge a été fondé par la Famille de Lorgeril,  Le logis, l'orangerie, les dépendances et la ferme sont dus à Louis-Pierre-Marie de Lorgeril, né en 1744. Au XIXe siècle, la propriété appartient à Pierre Henri Rémy Ruinart de Brimont qui entreprendra la restauration de la demeure sans pouvoir mener à terme son projet de reconstruction de l'aile à gauche de la tour.","architecture":"CHALONGE, construit aux XVe et XVIe siècles, et XVIIIe siècle  du Chalonge il fut attaqué, en 1791, par un millier de paysans qui brûlèrent les titres de redevance, a un aspect romantique provenant de ses façades hétérogènes inachevées de grandes qualités architecturales. Les lucarnes et souches de cheminées en pierre de taille des Faluns figurent parmi les plus belles réalisations conservées sur ce secteur en cette pierre coquillière. Directement inspiré des recueils d'architecture de l'époque, ce travail ornemental savant atteste de la grande maitrise des savoir faire et servira de référence jusqu'à la fin du XVIIIe siècle à un atelier local de tailleur de pierres La construction qui s'échelonne vers 1785 n'était pas entièrement terminée à la Révolution. Le pigeonnier et la chapelle sont les vestiges d'une ancienne construction. Le château est précédé d'une grande cour d'honneur, fermée d'une grille et sa façade Sud donne sur un Jardin à la Française, qui est limité par des douves. Est inscrit aux M.H. partiellement depuis le 4/02/1926. Il existe aussi à découvrir sur la commune Manoir de Pestivien (XVIIe siècle).","habitants":"Famille de Lorgeril.\"","divers":"Château de Chalonge à Trévon          GPS : 48° 24' 51,81\" Nord, 2° 9' 8,13\" Ouest","gps":"48° 24' 51,81\" Nord, 2° 9' 8,13\" Ouest","images":["../../jctruffet.com/image/image_22/22_Chalonge_Tr%c3%a9von_1.jpg","../../jctruffet.com/image/image_22/22_Chalonge_Tr%c3%a9von_2.jpg"]},"Consult_chateau_formulaire9d48":{"id":"Consult_chateau_formulaire9d48","dept":"22","canton":"Loudéac","commune":"La Chèze","nom":"Chéze_Fort","type":"Vestiges chateau","periode":"XII XIII","histoire":"Deux châteaux dans cet article le fort de la Chèze  et le château  de Saint-Etienne  à Saint Etienne du Gué de L'Isleau sud de la Chèze.                                                    FORT de la CHEZE, château construit entre 1180 et 1231 pour Eudon III. Donjon octogonal construit à la fin du XIVe siècle pour Olivier de Clisson, seigneur de la Chèze en 1370 par achat de la châtellenie de Josselin. Au cours du XVe siècle, le château-fort de la Chèze est la principale résidence des Rohan qui y installent leur chambre des comptes. Grands travaux de renforcement de l'enceinte au XVe siècle pour les Rohan. En 1488, l'armée ducale, commandée par le maréchal de Rieux, investit l'édifice. Après 1495, Jean II de Rohan aménage le château en résidence, en même temps il fait reconstruire le château de Josselin. Vers 1628, sur les ordres de Richelieu, démantèlement des tours comme à Josselin. SAINT-ETIENNE, château construit au milieu du XVe siècle pour une branche cadette des Rohan née à la fin du XIIIe siècle d'une alliance Coëtlogon Rohan.","architecture":"FORT de la CHEZE,  en 1743, autorisation de dépecer le bâtiment au profit de la fabrique de Loudéac. Vers 1857, destruction quasi totale des vestiges. Les éléments toujours visibles, un donjon polygonal en partie ruiné, des fragments de courtine, la base des quatre tours circulaires ainsi qu'un passage souterrain creusé dans le massif. Les anciens fossés ont été transformés en promenade. Éléments protégés MH : les ruines du château, à savoir les vestiges de la forteresse et les sols correspondant à son assiette constituant une réserve archéologique : inscription par arrêté du 26 septembre 2005   propriété de la commune, vestiges.                                 St-ETIENNE du GUE, système défensif bastionné construit à la deuxième moitié XVIe siècle. Elévation antérieure remaniée au XIXe siècle. Distribution intérieure remaniée au XIXe siècle (mur de refend divisant la salle du rez-de-chaussée et celle de l'étage, escalier dans-oeuvre à retours). Parties agricoles édifiées au XIXe siècle. Douves et bastions détruits au XIXe siècle, après l'établissement du cadastre non daté, vers 1850. Logis de plan allongé, à trois pièces par étage du corps principal, charpente à chevrons portant ferme à liens courbes et à trois vaisseaux, tour d'escalier antérieure et postérieure, couloir de distribution, chemin de ronde, cheminée incorporée, élément de défense.","habitants":"Chèze; Olivier de Clisson         St-Etienne; famille de Rohan\"","divers":"Château fort de la Chèze et château  de St-Etienne du Gué grav -3","gps":"","images":["../../jctruffet.com/image/image_22/22_Ch%c3%a9ze_Fort_1.jpg","../../jctruffet.com/image/image_22/22_Ch%c3%a9ze_Fort_2.jpg","../../jctruffet.com/image/image_22/22_Ch%c3%a9ze_Fort_3.jpg"]},"Consult_chateau_formulaired406":{"id":"Consult_chateau_formulaired406","dept":"22","canton":"Lanvallay","commune":"Saint-Carné","nom":"Chêne_Ferron","type":"Château","periode":"XV-XVI-XVII","histoire":"CHENE-FERRON, remonte en 1443, date à laquelle les Ferron se scindent en deux branches ; La première reste établie dans la seigneurie patronymique de la Ferronnays, en Calorguen, tandis que la seconde simplante dans le fief du Chêne. La seigneurie de Chesne-Ferron dépendait de Bécherel et sa juridiction s'exerçait principalement sur Saint Carné.","architecture":"CHENE-FERRON,  en labsence de visite du château, il est actuellement difficile de témoigner de vestiges remontant au XVe siècle. Les parties les plus anciennes, visibles de lextérieur, sont datables de la fin du XVIe siècle ou du début du XVIIe siècle, comme en témoigne les décors empruntés au répertoire ornemental de la Renaissance (porte à pilastres cannelés et chapiteaux de style composite, appuis des fenêtres moulurés à godrons. Les façades semblent avoir été reprises en plusieurs campagnes, lune delle de la fin du XIXe siècle, datée 1881 correspond à une reconstruction de la partie droite sur la cour. Le style composite de cette reconstruction témoigne de lesprit éclectique des architectes de cette période attiré par le pittoresque des formes et les volumes complexes. La restauration du château du Chêne-Ferron en Saint-Carné est un exemple de qualité représentatif de la manière de restaurer les demeures anciennes au début du XXe siècle. Les parties anciennes restaurées et les parties neuves se marient harmonieusement, la composante historiciste se superpose à un vocabulaire issu du courant rationaliste et pittoresque pour offrir une nouvelle vision de l'architecture régionale. Château et environnement sauvegardé. Plan complexe avec plusieurs décrochements, sur les deux façades, qui sont marqués par des toitures différenciées.","habitants":"Familles des Ferron\"","divers":"Château de Chêne-Ferron à St-Carné","gps":"","images":["../../jctruffet.com/image/image_22/22_Ch%c3%aane_Ferron_1.jpg","../../jctruffet.com/image/image_22/22_Ch%c3%aane_Ferron_2.jpg"]},"Consult_chateau_formulairef95d":{"id":"Consult_chateau_formulairef95d","dept":"22","canton":"Pleslin-Trigavou","commune":"Plouër-sur-Rance","nom":"Chêne_Vert_Pehou","type":"Forteresse","periode":"XIV-XV","histoire":"CHENE-VERT ou PEHOU, le château de Péhou est une anciene forteresse des Tréméreuc. Le château domine la Rance. Au siècle dernier, ne subsistaient que quelques ruines de cet ancien château-fort construit à l'origine au XIVe siècle. En fait, au cours des ans, divers ouvrages défensifs ont été réalisés. Le nom Péhou, d'origine celte, désigne d'ailleurs une place forte. A l'époque elle était la seigneurie de Plumoison, ou Pille-Oison, où résidèrent les ducs de Bretagne. Une chapelle Saint-Lunaire y avait été édifiée. Plus bas, près de la rive, une fontaine prétendûment miraculeuse à laquelle la légende des deux aveugles a valu sa réputation. La chapelle a été déplacée à Vaux-Carheil au XIXe siècle.","architecture":"CHENE-VERT ou PEHOU. Péhou fait partie des multiples sites d'éperon barré dont la pointe est naturellement défendue par des falaises baignées par la Rance.  Divers ouvrages défensifs se sont succédés sur le promontoire de Péhou, dont le nom désigne une place forte. Au XIIe siècle, le fief de Péhou-Plumoyzon passe de la famille d'Évran à celle des Tréméreuc issus de Brehel-Marhoc, seigneur de Plouër. En 1341, lors de la guerre de Succession de Bretagne, Alain de Tréméreuc prend le parti de Charles de Blois et se bat avec ses trois fils aux côtés de Du Guesclin. Jean IV, vainqueur, fait raser leur château en 1365, au moment de la réalisation du traité de Guérande. Le titre de seigneur de Plumoyson demeure en tant que terre de dignité, mais les immeubles se dégradent progressivement. Le domaine de Péhou, rattaché à Vaux-Carheil au début du XVe siècle, comprend, outre les ruines du château de Plumoyson, une chapelle dite « de Saint-Lunaire » avec une fontaine prétendument miraculeuse déplacée à Vaux-Carheil au XIXe siècle, et un moulin à vent remis en état au XVIIe siècle puis démoli au XIXe siècle. En 1846, la famille Séré cède l'ensemble de ses biens immeubles de Plouër, qui sont en partie dispersés par un marchand de biens.  Édifice de plan allongé, composé d'un corps de logis central encadré de plusieurs pavillons latéraux ; élévation à travées. Maçonnerie enduite avec encadrements de baies et chaînes d'angle en pierre de taille et façade sur jardin fausse brique et pierre.","habitants":"la famille d'Évran\"","divers":"Pehou à   Plouër-sur-Rance                    GPS : 48° 31' 21,36\" Nord, 2° 00' 22,1\" Ouest","gps":"48° 31' 21,36\" Nord, 2° 00' 22,1\" Ouest","images":["../../jctruffet.com/image/image_22/22_Ch%c3%aane_Vert_Pehou_1.jpg","../../jctruffet.com/image/image_22/22_Ch%c3%aane_Vert_Pehou_2.jpg","../../jctruffet.com/image/image_22/22_Ch%c3%aane_Vert_Pehou_3.jpg"]},"Consult_chateau_formulaire1401":{"id":"Consult_chateau_formulaire1401","dept":"22","canton":"Callac","commune":"Louargat","nom":"Cleuziou","type":"Château","periode":"XV-XVI-XVIII","histoire":"CLEUZIOU, à deux k.M. à l'Est à Louargeat château trnsformé en Hôtel restaurant par monsieur de Souvay, le château ou manoir du Cleuziou du XV-XVI-XVIIIe siècle avec sa chapelle qui date du XVIIIème siècle. Ce fut le berceau de la famille Raison du Cleuziou. On prétend que saint Yves (1255-1303) y aurait séjourné à maintes reprises. Une tradition conservée dans la famille assure que saint Yves (1255-1303) y a séjourné et célébré la messe. \". Des travaux de restaurations sont exécutés de 1705 à 1740 par Joseph Marie du Cleuziou. Le pigeonnier date du XVe siècle.","architecture":"CLEUZIOU, le manoir est pillé et incendié en 1593, durant les guerres de la Ligue. Un aveu daté du 17 mars 1679 donne une description du manoir :  Un grand corps de logis composé d'une cuisine, dépendance et laverie de jouxt vers le jardin. Chambre basse au bout subzain de ladicte cuisine, la salle au dessus, escalier, chambres, greniers, tourelles au dessus du tour de vis, autre degré à pavillon au dessus, écuries, granges, murailles, la maison à four, vollières et refuges à pigeons, cours, portes, aires et jardins, avant  cour et chapelle y étant dédiée à sainte Marguerite, avec bois de haute futaye devant et derrière le manoir, étangs, garennes.","habitants":"Joseph Marie du Cleuziou\"","divers":"Château de Cleuziou à Louargat","gps":"","images":["../../jctruffet.com/image/image_22/22_Cleuziou_1.jpg","../../jctruffet.com/image/image_22/22_Cleuziou_2.jpg","../../jctruffet.com/image/image_22/22_Cleuziou_3.jpg"]},"Consult_chateau_formulaireb500":{"id":"Consult_chateau_formulaireb500","dept":"22","canton":"Bégard","commune":"Prat","nom":"Coadelan","type":"Château","periode":"XV-XVI-XVII","histoire":"COATELAN ou Coadelan, la seigneurie et le manoir de Coadélan ont  été fondés dès le début du XIVe siècle par la famille Le Chevoir (le dénommé Merien Le Chevoir est cité en 1365). Leurs armoiries ornent toujours la bâtisse. Vers 1500, Rolland Le Chevoir épouse Jeanne. Le Rouge (originaire de Trébriant en Plestin) comme le montrent les armoiries de la cheminée dans la grande salle. En 1584, Lancelot III.  Le Chevoir décède en laissant une fille mineure et une succession difficile de l'épouse de  Guy Eder, sire de La Fontenelle, chef d'une bande de brigands enlève la jeune héritière alors âgée de neuf ans. Il lemmène dans sa forteresse de l'île Tristan devant Douarnenez et finit par l'épouser vers 1594-1595. Le couple vient séjourner au manoir de Coadélan à plusieurs reprises à la fin du XVIe siècle et le restaure. Guy Eder est finalement exécuté le 27 novembre 1602 à Paris et sa tête envoyé à Rennes. Marie Le Chevoir décède peu de temps après à l'age de 17 ans. Le manoir reste dans les mains de la famille Le Chevoir jusqu'à la mort sans progéniture en 1667 de Vincent-Joseph Le Chevoir, à cette date, la seigneurie passe dans la famille du Bouillé par mariage de Marie-Jeanne Le Chevoir avec René du Bouillé. La famille du Bouillé-Turquant conserve le manoir de Coadélan jusqu'à la Révolution. Ce sont les familles Le Corgne (au début du XIXe siècle) et Kergariou qui deviennent ensuite propriétaires.","architecture":"COATELAN, Mi- féodal, mi Renaissance,  le logis se compose d'un bâtiment denviron 35 mètres de longueur flanqué au nord et au sud de deux tours. Au rez-de-chaussée, le manoir comprend, du nord au sud, trois pièces : il a évolué jusqu'au XVIIe siècle : La porte d'entrée, qui débouche à l'ouest à l'extrémité de la salle basse, est flanquée par la tour d'escalier en vis hors-uvre. La façade orientale du manoir, tournée vers l'étang, comporte un second escalier en vis distribuant chaque niveau, de la cave à la galerie en passant par les chambres. La tour nord, de forme carrée et à trois niveaux est la plus ancienne ; elle pourrait remonter au XIIIe siècle. De part et d'autre de la salle haute se trouvaient deux galeries transversales en bois distribuant les chambres latérales.   vers 1660, on construit la tour sud qui comprend au rez-de-chaussée une chapelle. De lourds travaux de restauration sont entrepris par Vincent Le Chevoir notamment par linsertion d'un plafond dans la salle haute par deux charpentiers de Plouer ou encore la réfection de la maçonnerie. Si la salle basse devient salle à manger, la salle haute devient le salon. A partir de la fin du XVIIe siècle, le manoir semble être désaffecté : il devient résidence secondaire de Marie-Jeanne Le Chevoir qui habite le manoir de Bonabry à Hillion puis à Lamballe. Le manoir est restauré au XVIIIe siècle pour Jean du Bouillé-Turquant, marquis de Resnou sous la direction de Gilles Ranou, \"architecte et entrepreneur de bâtiment\". Le domaine est ensuite abandonné à un métayer ou à un fermier. Le manoir de Coadélan  a malheureusement connu un incendie en 1988 qui a détruit une partie de la charpente de la tour orientale. Il a été restauré par la famille Riou avant de passer entre les mains de la famille Francès qui le possède toujours au début du XXIe siècle.","habitants":"famille Le Vincent le Chevoir  et  Guy Eder \"","divers":"Château du Coadelan à Prat","gps":"","images":["../../jctruffet.com/image/image_22/22_Coadelan_1.jpg","../../jctruffet.com/image/image_22/22_Coadelan_2.jpg","../../jctruffet.com/image/image_22/22_Coadelan_3.jpg"]},"Consult_chateau_formulairee23b":{"id":"Consult_chateau_formulairee23b","dept":"22","canton":"Callac","commune":"Belle Isle en Terre","nom":"Coat_an_Noz","type":"Château","periode":"","histoire":"deux châteaux à Belle Isle en Terre;  le Coat-Noz et le Lady -Mond.                                                                                                                  COAT AN NOZ,  première habitation des Faucigny avant 1850. Château actuel construit en 1870 et électrifié en 1898 grâce à un système de turbines , de plus, eau courante grâce à la fontaine Gilo alimentant des réservoirs en zinc placé sous les charpentes avec pompe électrique.  dans la bibliothèque, présence dun orgue (pièce sud ouest), cuisine et gardien dans les caves. Les Faucigny vivant aux dessus de leur train de vie (achat de nombreuses automobiles) font banqueroute. Marie Louise le Manach fille du meunier de Belle Isle en terre se jura un jour dêtre propriétaire du château de Coat an Noz. Après une multitude daventure à Paris, elle partie à Londres où elle rencontra sir Robert Mond, le roi du Nickel, quelle épousa. Celui-ci pour réaliser le rêve de jeune fille de sa femme lui offrit le château de Coat an Noz pour son soixantième anniversaire en 1929. Organisation de nombreuses fêtes folklorique bretonne et réception de personnalités et artistes. Lady Mond payait la cantine de tout les élèves du bourg, de plus pour les familles pauvres elle leur payait leurs factures. Elle fit construire la gendarmerie, lécole, la maison de retraite, la mairie actuelle pour son village de Belle Isle en Terre. A larrivé des allemands en 1940, le chauffeur de Lady Mond et les employés cachèrent les armes derrière limitation de le grotte de Lourde se situant dans le parc. En 1941, occupation allemande de la forêt de Coat-an-Noz et du château. En 1943, les bâtiments de ferme ont un pignon endommagé suite à un bombardement allier. Après la guerre, le château sert de lieu de formation pour les cadres de larmée issue de la résistance.                                                           .","architecture":"COAT-AN-NOZ, vente du château en 1950 à monsieur \"Untel\", qui vend le château en pièces détachées (beaucoups d'habitant des villages alentours ont des morceaux du château dans leurs maisons), suite à cela le château est ouvert à tout vents. En 1965, le château et la ferme sont loués à M. Jean Claude Fallaire qui fait des caves un poulailler. En 1975, ouverture d'une crêperie dans les caves par M. Gatineau, fermeture vers 1985. Le château est toujours vide et plus d'entretien des parties supérieurs. En 1994, vente aux enchères  S-B achète Coat an Noz. Il est entièrement vidé, plus un planché ne subsiste, plus un plafond excepter celui de la salle à manger et ceux du grand escalier et plus aucun entretien depuis... Le château aurait trouvé un acheteur pour le restaurer, nous attendons confirmation.     COAT  c'est un logis rectangulaire flanqué de tourelles à ses 4 angles, construit en granit et en schiste et recouvert de toits d'ardoise. En 2011, est racheté par des particuliers, qui le restaurent. Bernard et Danuta Moreau sont les nouveaux propriétaires  Le couple a immédiatement engagé des travaux de rénovation afin d'éviter que la bâtisse, trè
