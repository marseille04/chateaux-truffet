s délabrée, ne s'effondre. Abandonné depuis l'après-guerre, celui du temps de Lady  Mond.                                                                                   LADY-MOND,   Fille dun meunier, Marie Louise Le Manach (1869-1949) épousa Lord Robert Mond, riche chimiste anglais ayant découvert le nickel carbonyle. La jeune femme vivait alors dans le domaine situé en forêt de Coat-An-Noz où elle commençait à se sentir isolée. Elle fit construire le Castel Mond (en breton) en 1936, à lemplacement du moulin de son père.\n Lédifice fut construit trop près de la route : Mme Mond le fit démonter et reculer de plusieurs mètres alors que les travaux en étaient déjà à la pose de la charpente. Larchitecture de cette construction est largement inspirée de celle du château de la forêt.   Mme Mond y résida jusquà sa mort. Lédifice fut acquis par la municipalité qui en fit une école (1953-1986) puis par lhôpital psychiatrique de Bégard. Depuis 1998, il abrite le centre régional dInitiation à la Rivière ainsi quun aquarium deau douce.  Situation : Le château de Lady-Mond se trouve au centre de la petite-ville de Belle-Isle-en-Terre.","habitants":"\"","divers":"Trois châteaux à Belle-Isle en Terre  le Coat-Noz et le Lady -Mond.          Lady Mond grav -4-5-6                                                       GPS : 48° 32' 44\" Nord, 3° 23' 36\" Ouest","gps":"48° 32' 44\" Nord, 3° 23' 36\" Ouest","images":["../../jctruffet.com/image/image_22/22_Coat_an_Noz_1.jpg","../../jctruffet.com/image/image_22/22_Coat_an_Noz_2.jpg","../../jctruffet.com/image/image_22/22_Coat_an_Noz_3.jpg","../../jctruffet.com/image/image_22/22_Coat_an_Noz_4.jpg","../../jctruffet.com/image/image_22/22_Coat_an_Noz_5.jpg","../../jctruffet.com/image/image_22/22_Coat_an_Noz_6.jpg"]},"Consult_chateau_formulaire950d":{"id":"Consult_chateau_formulaire950d","dept":"22","canton":"Plestin-les-Grèves","commune":"Trédrez-Locquémeau","nom":"Coatrédrez","type":"Château","periode":"XV-XVI","histoire":"COATREDEZ; construit pour les seigneurs de Coat-Trédrez à la fin du XVe siècle ou au début du XVIe siècle. Il relevait,  du comté de Runfau et possédait droit de haute justice dans les paroisses de Trédrez, Ploumilliau et Trégrom, droit de fondation et patronage dans les églises de Trédrez et de Locquémeau, du Guéaudet en Ploulec´h (le Yaudet) et dans la chapelle Saint-Jean en Ploumilliau. Il a appartenu aux familles de Coatrédrez du XVe-XVIIe siècle, du Parc du XVIIe-XVIIIe siècle), du Goësbriand du XVIIIe siècle), Le Pelletier de Rosambo du XIXe siècle et Gouzillon du Bélizal dsu XXe siècle. Il comprend également une partie agricole monumentale datant du XVIIe siècle.","architecture":"COATREDEZ; à l´instar de nombreux manoirs de la région, le manoir de Coat-Trédrez occupe une situation isolée dans la campagne de Trédrez-Locquémeau. L'édifice exerce une forte emprise sur son environnement immédiat. L´implantation d´une telle structure seigneuriale à l´époque médiévale se traduit en effet dans le paysage par la présence de grandes pièces de terres. Le site de Coat-Trédrez est formé d´un ensemble de bâtiments à vocation d´habitation et à usage agricole, disposés autour d'une cour fermée. Cet ensemble architectural relativement développé forme un plan général en U résultant de la présence de deux parties en équerre construites à deux époques différentes : le corps de logis à l'est, dont l´analyse suggère une datation aux alentours de la fin du XVe siècle et du début du XVIe siècle, et la partie agricole soigneusement traitée en grand appareil de granite, ornée d´un décor développé, dont l´analyse situe la construction au XVIIe siècle. Un colombier couvert d'une coupole en tas de charge et une chapelle sont situés à proximité immédiate du manoir, au sud-ouest pour le premier, au sud-est pour la seconde. Le corps de logis est précédé d´une cour pavée. Il est construit en granite avec une façade antérieure montée en grand appareil et se compose d'un rez-de-chaussée, d'un étage carré et d'un comble. Il est conçu sur un plan à trois pièces au rez-de-chaussée contenues dans une structure à deux corps en équerre avec salle basse et salle haute sous plafond dans l'aile sud.","habitants":"familles de Coatrédrez\"","divers":"Château de Coatrédez à Trédez Locquémeau                                                GPS 48° 41' 55\" Nord, 3° 33' 52\" Ouest","gps":"","images":["../../jctruffet.com/image/image_22/22_Coatr%c3%a9drez_1.jpg","../../jctruffet.com/image/image_22/22_Coatr%c3%a9drez_2.jpg","../../jctruffet.com/image/image_22/22_Coatr%c3%a9drez_3.jpg","../../jctruffet.com/image/image_22/22_Coatr%c3%a9drez_4.jpg","../../jctruffet.com/image/image_22/22_Coatr%c3%a9drez_5.jpg"]},"Consult_chateau_formulaire07a4":{"id":"Consult_chateau_formulaire07a4","dept":"22","canton":"Guerlédan","commune":"Corlay","nom":"Corlay","type":"Vestiges","periode":"XIII-XIV","histoire":"CORLAY,  en 1557, Louis VI et Léonore de Rohan-Gié. En 1622, Hercules et Madeleine de Lénancourt, puis Marie de Bretagne. En 1654, Louis VII et Anne de Rohan-Guéméné. En 1667, Anne de Rohan, douairière. En 1685, Charles II et Jeanne-Armande de Schomberg. En 1699, Charles III et Marie-Anne d'Albert de Luynes, puis Charlotte-Elisabeth de Rochefilet. En 1727, Hercules-Mériadec et Louise-Gabrielle-Julie de Rohan-Rohan. En 1757, Jules Hercules Mériadec et Marie-Louise-Henriette-Jeanne de la Tour d'Auvergne. Au XIVe siècle on voit apparaître une famille portant le nom patronymique de Corlay. La maison-forte ou château de Corlay était depuis longtemps en ruines, lorsqu'à la fin du XVe siècle le vicomte Jean, réconcilié avec le duc, obtint la permission de restaurer sa forteresse. Le but du vicomte de Rohan n'était pas seulement d'avoir un château-fort, mais aussi de pouvoir rétablir le cens du guet. En 1527, le vicomte de Rohan, alors du nom de Jacques, mourait subitement au château de Corlay : tombé malade un samedi, il expirait le mercredi suivant. Le 7 juin 1532, l'évêque Claude de Rohan terminait par une transaction les longues difficultés auxquelles la succession de Jacques, son frère, avait donné naissance ; le maréchal de Montmorency et le gouverneur général de la province, M. de Châteaubriand ne furent pas étrangers à cet accord. Le prélat prenant en considération les dettes mobilières et immobilières qui grevaient sa maison, et voulant subvenir aux besoins de ses neveux, René et Claude, afin qu'ils pussent \"parvenir et faire service au roy\", abandonna tout ce qu'il avait eu en Léon par suite d'un échange précédent fait en I527, contre la terre de Corlay.","architecture":"CORLAY;  laissé à labandon, le château sombra peu à peu en ruines : la tour du midi, dite tour de la Miséricorde, fut arasée au XVIIIe siècle afin de permettre la construction dun logement pour le receveur de la châtellenie. Acquise par le département le 28 frimaire an VII (18 décembre 1798), la forteresse servit de carrière pour la restauration de léglise en 1806. Au XIXe siècle y furent établis la gendarmerie et les haras, mais les fortifications restèrent sans entretien jusquau rachat par la commune en 1978. Depuis, un effort notable a été fait pour la mise en valeur des ruines et la réhabilitation des bâtiments : lancienne gendarmerie est aujourdhui transformée en logements sociaux et les anciens haras abritent depuis 1989 une maison du cheval, une bibliothèque et des salles dexposition et de réunion. Le château offre aujourdhui une silhouette extrêmement mutilée : plus de la moitié de lenceinte est détruite, de même que la plupart des tours ; les douves ont été comblées. Les vestiges subsistants (tour nord-ouest, courtines, étang, portail dentrée à double porte cochère et piétonne rappellent encore cependant la splendeur passée et maints détails de construction évoquent une architecture caractéristique de lextrême fin du XVe siècle. Éléments protégés MH : les restes du château de Corlay : inscription par arrêté du 30 mars 1926.","habitants":"vicomtes de Rohan\"","divers":"Vestges de Corlay","gps":"","images":["../../jctruffet.com/image/image_22/22_Corlay_1.jpg","../../jctruffet.com/image/image_22/22_Corlay_2.jpg","../../jctruffet.com/image/image_22/22_Corlay_3.jpg","../../jctruffet.com/image/image_22/22_Corlay_4.jpg","../../jctruffet.com/image/image_22/22_Corlay_5.jpg","../../jctruffet.com/image/image_22/22_Corlay_6.jpg"]},"Consult_chateau_formulairea0c1":{"id":"Consult_chateau_formulairea0c1","dept":"22","canton":"Plancoët","commune":"Corseul","nom":"Corseul","type":"Château vestiges","periode":"XII-XVII-XIX","histoire":"Quatre châteaux à Corseul ; Montafilant, Bage de Trégouet, Monterfil et Plessix-Madeuc.                                                                             MONTAFILANT, vestiges, la première mention des seigneurs de Montafilant remonte à la fin du XIIe siècle. Ces seigneurs étaient issus d'un prince de la maison de Dinan, et le premier dont on ait connaissance est Roland de Dinan, chevalier seigneur de Montafilant qui vivait en 1160, et qui fit édifier le château dont on voit les ruines qui couronnent le sommet du site, le château a été remanié au cours du XIVe siècle. Jadis forteresse importante qui, outre le corps de place très bien fortifié, avait encore plusieurs ouvrages avancés considérables. De l'édifice construit en pierres de taille et maçonné à grand appareil, il ne subsiste plus aujourd'hui, avec quelques pans de murs, que deux grosses tours rondes et la moitié verticale d'une troisième. Ces tours à trois étages ont toutes leurs fenêtres carrées et à croisées; on voit à leurs sommets les encorbellements des machicoulis, mais leurs parapets sont écroulés. On voit également au bord du fossé qui environnait la place , quelques ruines de demi-tours qui en défendaient l'approche, et au milieu de toutes ces ruines, on aperçoit l'entrée de plusieurs souterrains. Éléments protégés MH : le château de Montalifant (restes) : inscription par arrêté du 27 février 1926.                                   BAGE-DE TREGOUET est une ancienne abbaye, elle a été transformée en manoir puis remaniée au XIXe siècle. Le manoir de la Bage de Trégouèt a été, du XIIIe au XVIIe siècle, la propriété successive des Familles Labbé de Trégouèt du XVIIe au XVIIIe siècle et de L'Estang du Rusquec et, en 1480, le manoir de La Bage de Trégouèt est devenu la propriété de Jehan Labbé, chambres d'hôtes.","architecture":"MONTERFIL, château construit en 1854 par la famille du Breil de Pontbriand, à partir d'un édifice plus ancien;  cet emplacement serait celui d'un temple gallo-romain. Le château est omposé d'un avant-corps très saillant cantonné de deux tours circulaires couvertes en poivrière, le corps arrière est plus allongé ; perron avec balustrade et balcon polylobés ; lucarne à pinacles.                                                                                                     PLESSIX-MADEUC, le manoir du Plessix-Madeuc a subi d'importantes modifications jusqu'au XVIIe siècle. Le bâtiment a des proportions remarquables et cest dans la tour, qui le domine sur le côté sud-ouest, que logeait le maitre des lieux. La porte principale du manoir est couronnée dun fronton triangulaire orné des armoiries de la famille de Gaudemont de la Monforière, propriétaires au XVIIIe siècle. A lorigine il avait appartenu aux Madeuc, un des plus anciens noms de la région signifiant \"bienfaisant\" en breton. Dans la cour, se trouve un puits original à double entrée. Son faîtage est décoré d'un superbe épi Frédéric. Les propriétaires actuels, Bérénice et Olivier Dupuy, ont restauré cette propriété avec une grande exigence afin dy accueillir des artistes peintres ou photographes en résidence et d'y ouvrir des appartements pleins de charme et des chambres d'hôtes. Le parc avec sa superbe roseraie permet de se reposer en toute sérénité.","habitants":"Montfalant;  Roland de Dinan,                                  Trégouet;Jehan Labbé,  Monterfil; Breil de Pontbriand,                     Plessix ; famille de Gaudemont de la Monforière,\"","divers":"Quatre châteaux à Corseul ; Montafilant, Bage de Trégouet grav-2,  Monterfil  grav-3 et Plessix-Madeuc grav-5.   Bague GPS : 48° 28' 36,73\" Nord, 2° 9' 44,21\" Ouest                                            Montfilant grav-2                                                     GPS : 48° 28' 57\" Nord, 2° 10' 08\" Ouest                                                          Plessis   GPS : 48° 28' 09\" Nord, 2° 09' 48\" Ouest","gps":"48° 28' 36,73\" Nord, 2° 9' 44,21\" Ouest","images":["../../jctruffet.com/image/image_22/22_Corseul_1.jpg","../../jctruffet.com/image/image_22/22_Corseul_2.jpg","../../jctruffet.com/image/image_22/22_Corseul_3.jpg","../../jctruffet.com/image/image_22/22_Corseul_4.jpg","../../jctruffet.com/image/image_22/22_Corseul_5.jpg"]},"Consult_chateau_formulaire8359":{"id":"Consult_chateau_formulaire8359","dept":"22","canton":"Ploufragan","commune":"Saint-Julien","nom":"Coste_22","type":"Château","periode":"XVI-XVIII-XIX","histoire":"COSTE, l'antique château de la Coste, propriété du Comte de Couëssin Du Boisriou, le château de la Coste du XVIe siècle), reconstruit au XIXe siècle et propriété jadis de la famille Gouray (ou Gourlay). Le domaine de La Coste et la métairie \"Maison-des-Jars\" appartiennent à Pierre Dollo  en 1514 et à Olivier de La Chastaigneraye ou Chastaigneraie en 1536 et en 1543.","architecture":"LA COSTE, l'antique château de la Coste, propriété du Comte de Couëssin Du Boisriou. est sous l'Ancien Régime, la principale seigneurie de Saint-Julien. Pendant les guerres de la Ligue, la demeure est détruite. Il ne subsiste de celle-ci que des soubassements en pierre de taille et une cave d'où part un couloir souterrain débouchant au pied des remparts. Une nouvelle demeure est construite au XVIIIe siècle et agrandie au cours du troisième quart du XIXe siècle. Le corps principal, de plan rectangulaire à cinq travées, possède deux ailes basses en retour d'équerre sur le jardin. Celle de droite est prolongée par une construction plus moderne qui occupe l'angle de la façade arrière. Cet agrandissement comporte plusieurs corps de bâtiments emboités et couverts en pavillon.                                                                          . Il ne subsiste de celle-ci que des soubassements en pierre de taille et une cave d'où part un couloir souterrain débouchant au pied des remparts. Restauré, agrandi, le château de la Coste est une propriété privée. On y trouve deux portails anciens du XVIIe siècle.","habitants":"Comte de Couëssin Du Boisriou. \"","divers":"Château de la Coste à Saint-Julien","gps":"","images":["../../jctruffet.com/image/image_22/22_Coste_22_1.jpg","../../jctruffet.com/image/image_22/22_Coste_22_2.jpg"]},"Consult_chateau_formulaire83ba":{"id":"Consult_chateau_formulaire83ba","dept":"22","canton":"Pleslin-Trigavou","commune":"Ploubalay","nom":"Coudraie_22","type":"Manoir","periode":"XVIII","histoire":"COUDRAIE, daté en partie de la fin du 15ème siècle et majoritairement du 18ème siècle, l'actuel manoir de la Coudraie est un édifice protégé au titre de la législation sur les monuments historiques depuis le 24 juillet 1964 (inscription à l'Inventaire supplémentaire des monuments historiques). Propriété de Jean Lenfant en 1448, le manoir de La Coudraie fut reconstruit en 1729 par Pierre-Joseph Gouyon et Marie Julliot, seigneur et dame de Launay-Comatz \" pour leur servir, selon Henri Frotier de La Messelière, de résidence avec autorisation de lui donner le nom de Launay-Commats et le titre de châtellenie attachée à cette seigneurie voisine \". Partiellement détruit sur ordre des révolutionnaires en 1795, reconverti en ferme au cours du XIXe et du XXe siècle, le manoir de La Coudraie fait l'objet d'un important et ambitieux programme de restauration et de construction depuis 1997. Le château fut reconstruit vers 1729, puis fut en partie démoli en 1793, sous le régime de la Terreur. Le manoir de La Coudraie est inscrit aux M.H. depuis 1964. C'est un manoir parfaitement entretenu. LeManoir de la Coudraie est privé et fermé au public.","architecture":"COUDRAIE, au sud-est du territoire de Ploubalay, entre le chef-lieu communal et l'ancien bourg castral du Plessis-Balisson, le manoir exerce une forte emprise sur l'environnement bâti et paysager immédiat. Comme dans la majeure partie des cas, l'implantation d'une structure seigneuriale a conditionné la formation de grandes parcelles et la présence de bois de haute futaie. Le site manorial est manifestement marqué par une composition paysagère monumentale héritée de l'époque Moderne. Aspecté au sud, au droit d'une grande allée bordée de chênes et de hêtres figurant sur le cadastre de 1827 (la \" Rabine \"), le manoir de La Coudraie est un ancien manoir à cour fermée édifié sur une parcelle cernée de douves. Un bâtiment à deux corps en équerre, dont les murs présentent plusieurs bouches à feu remployées, occupe l'angle sud-ouest de cette parcelle. Le logis primitif, en cours de restauration et d'agrandissement vers l'est, est un logis de plan rectangulaire, à un étage carré et un étage de comble, couvert d'un toit à croupes à égout retroussé et dont les élévations sont rythmées par des travées formées de grandes fenêtres rectangulaires verticales. L'élévation antérieure sur cour, animée par une corniche à modillons, présente deux travées régulières, dont une, celle de droite, est affirmée par une lucarne à fronton-pignon triangulaire en maçonnerie accostée d'ailerons à volutes. Cette élévation présente également une tour d'angle circulaire dans-oeuvre enfermant un escalier en vis en bois (rapporté). Cette tour, dont le mur dépasse largement les murs du logis, est coiffée d'un dôme surbaissé à égout retroussé surmonté d'un lanternon. Elle reçoit en outre une porte à la base et présente deux lucarnes du même profil que la présente.","habitants":"Pierre-Joseph Gouyon et Marie Julliot\"","divers":"Château de la Coudraie à Ploubalay GPS : 48° 34\" 51\" Nord 2° 08' 20\" Ouest","gps":"48° 34\" 51\" Nord 2° 08' 20\" Ouest","images":["../../jctruffet.com/image/image_22/22_Coudraie_22_1.jpg","../../jctruffet.com/image/image_22/22_Coudraie_22_2.jpg","../../jctruffet.com/image/image_22/22_Coudraie_22_3.jpg"]},"Consult_chateau_formulairefec9":{"id":"Consult_chateau_formulairefec9","dept":"22","canton":"Plénée-Jugon","commune":"Langourla","nom":"Coëlan","type":"Château","periode":"XVI-XIX","histoire":"COELAN, édifice construit en 1870 par la famille Quemper de Lanascol, puis la demeure passe à la fin du XIXe siècle à la famille Camus de la Guibourgère. Important bâtiment de style néo-Renaissance de plan allongé accosté de deux pavillons rectangulaires et d'un petit avant-corps polygonal. Le parc, qui abrite une ferme dont certains éléments d'architecture proviendraient d'un château ou d'une chapelle, aurait été réalisé par le paysagiste Bülher. Le fronton cylindrique de cette ferme, avec au centre des armoiries martelées, est surmonté de trois personnages. Les communs construits à l'intersection des deux allées conduisant à la demeure, traduisent le souci esthétique de la famille Camus de La Guibourgère.","architecture":"COELAN, il date du XVIe et XVIIe siècle. La construction du château de Coelan date du 1870, pour la Famille Quemper de Lanascol, à Champigny. Il est de style Louis XIII et Renaissance. C'est un château bâti en tuffeau. A la fin du XIXe siècle, il appartenait à la Famille Camus de la Guibourgère. Le parc a été dessiné par le paysagiste Bülher, qui créa le Parc du Mont-Thabor à Rennes. Le Château de Coélan se situe à la lisière de la forêt de Bosquen, sur un promontoire. Le Château de Coelan est un château privé, fermé au Public.  Les dépendances situées autour du château marquent l'espace privé. On n'y pénètre pas sans y être autorisé. Ce bâtiment, édifié à l'intersection des deux allées menant au château, traduit le souci esthétique de la famille de La Guibourgère. Il abrite l'écurie, la sellerie, les voitures à cheval et le logement du cocher.","habitants":"Famille Camus de la Guibourgère\"","divers":"Château de Coêlan à Langourla   GPS : 48° 17' 09\" Nord, 2° 24' 52\" Ouest","gps":"48° 17' 09\" Nord, 2° 24' 52\" Ouest","images":["../../jctruffet.com/image/image_22/22_Co%c3%ablan_1.jpg","../../jctruffet.com/image/image_22/22_Co%c3%ablan_2.jpg","../../jctruffet.com/image/image_22/22_Co%c3%ablan_3.jpg"]},"Consult_chateau_formulaire044b":{"id":"Consult_chateau_formulaire044b","dept":"22","canton":"Loudéac","commune":"Coëtlogon","nom":"Coëtlogon","type":"Château","periode":"XIX","histoire":"COETLOGON, l'ancien château de Coëtlogon présentait une longue façade tout en pierre de taille de granit, surmontée en son milieu d'un vaste fronton sculpté et armorié, flanqué à l'ouest et à l'est de deux tours demi-rondes dont l'une celle de l'ouest portait les armoiries de plusieurs alliances de la famille. A l'est existait une chapelle communiquant par trois portes ogivales avec l'orangerie donnant elle-même au nord et accolée au bâtiment principal. L'édifice fut incendié en 1795, au lendemain du combat où 3000 républicains commandés par le général Champeaux furent battus par l'armée dirigée par le chevalier de Tinténiac.","architecture":"COETLOGON Le nouveau château, de plan en équerre, fut construit en 1911 pour Henri de Carne et remanié en 1948-1950 par son fils. Site ancien occupé en 1728 par le château des marquis et chevalier César et Alain Emmanuel de Coëtlogon. Inscription \"Les flammes ayant consommé l'ancien château celui-ci  fut fondé sous la protection de Dieu le huit mars 1728 par Messeigneurs César sire et marquis de Coëtlogon et Alain Emmanuel de Coëtlogon chevalier des ordres du Roy vice amiral de France.","habitants":"Alain Emmanuel de Coëtlogon\"","divers":"Château de Coetlogon                     GPS : 48° 8' 41,84\" Nord, 2° 32' 35,2\" Ouest","gps":"48° 8' 41,84\" Nord, 2° 32' 35,2\" Ouest","images":["../../jctruffet.com/image/image_22/22_Co%c3%abtlogon_1.jpg","../../jctruffet.com/image/image_22/22_Co%c3%abtlogon_2.jpg"]},"Consult_chateau_formulaire35d4":{"id":"Consult_chateau_formulaire35d4","dept":"22","canton":"Lanvallay","commune":"Saint-Hélen","nom":"Coëtquen","type":"Vestiges-Château","periode":"XIII-XVII","histoire":"COETQUEN, en 1130, présence d'un personnage nommé : Raoul de Coëtquen. En 1203, son petit fils, Olivier de Coëtquen, assiste aux États de Vannes. En 1231, Clément de Coëtquen est élu Archevêque de Dol.  En 1365, naissance de Raoul V de Coëtquen. En 1386, Raoul V est chevalier banneret. Ce titre signifie que ce chevalier a le droit de porter une bannière. Il peut donc commander d'autres chevaliers. En 1405, Raoul V est chambellan du Duc (voir titre de noblesse) de Bretagne. En 1440, Raoul V de Coëtquen reçoit du Duc de Bretagne Jean V l'autorisation de fortifier sa demeure. En 1442, Raoul V de Coëtquen est nommé maréchal de Bretagne. Vers 1450 , fin de la fortification du château.  En 1575, le château et les  terres sont érigés en Marquisat par lettres patentes en faveur de Jean III de Coëtquen. Au XVIe siècle, le château est en partie détruit par la Ligue et son partisan Saint-Laurent d'Avaugour. Vers 1792, le château est démoli par les Révolutionnaires. Quelques années après, le château est reconstruit. En 1875, le château sert de cadre au roman \"Patira\"de Raoul de Navery, pseudonyme d'Eugénie Saffray. En 1927, les bâtiments sont inscrits aux M.H..\nEn 1955, il semble que le château, dont certains murs ne sont pas stables, soit démonté sur ordre de la comtesse de Boishue de Palys.Au XXIe siècle, le château est dans une propriété privée, il ne peut pas être visité. .","architecture":"COETQUEN , du château fort du XVe siècle, démantelé lors des guerres de la Ligue, ne restait qu'un donjon faisant suite à un corps de logis du XVIIe bâti sur les anciennes fondations. L'aile du XVe siècle comprenait un rez de chaussée et un étage, en pierre de taille et était couronnée par une corniche avec échauguettes et mâchicoulis. L'édifice du XVIIe siècle se compose d'un sous-sol, d'un rez-de-chaussée, de deux étages et d'un comble avec lucarnes de pierre. Les jambages des baies et les linteaux sont en granit, le reste de la maçonnerie en moëllons enduits. En 1950 une des cheminées du donjon s'étant écroulée, l'édifice est en partie démoli. Le logis du XVIIe siècle conservait des boiseries, des cheminées en marbre, des fers forgés ainsi que des dallages aujourd'hui disparus.\nDans les abords du château se trouvent encore deux soubassements de tours datant du XVe siècle. Ce château servit de cadre au roman \"Patira\" de Raoul de Navery.Éléments protégés MH : le château de Coëtquen (ruines) : inscription par arrêté du 9 mars 1927.","habitants":"Comtesse de Boishue de Palys \"","divers":"Vestiges et château de la Guerche grav-3  à Coetquen","gps":"","images":["../../jctruffet.com/image/image_22/22_Co%c3%abtquen_1.jpg","../../jctruffet.com/image/image_22/22_Co%c3%abtquen_2.jpg","../../jctruffet.com/image/image_22/22_Co%c3%abtquen_3.jpg"]},"Consult_chateau_formulairead89":{"id":"Consult_chateau_formulairead89","dept":"22","canton":"Plancoët","commune":"Créhen","nom":"Créhen","type":"Château_Vestiges","periode":"XIII-XV-XVI-XVII","histoire":"Trois châteaux à Crehen;  Brunais, le Fort Guildo, la Touche  et Bregerac                                                                                                                                                                       FORT GUILDO  Il s'agit d'une des places fortes de Bretagne bâtie au XIIIe siècle sur le bord même de l'Arguenon. C'est là qu'est arrêté le 26 juin 1446 l'infortuné Gilles de Bretagne, sur ordre de son frère, le duc de Bretagne, François Ier. Le château-fort du Guildo est pris et repris au XVIe siècle pendant les guerres de la Ligue. Le château-fort, défendu par une garnison de Mercoeur, est pris par les troupes royales d'Henri IV en 1590. En 1597, il est assiégé par 2000 hommes et pris pour le duc de Mercoeur par le capitaine de la Ligue Jean d'Avaugour de Saint-Laurent. Le château appartient à la famille de Dinan en 1400, et à Gilles de Bretagne (qui le tenait de Françoise de Dinan) en 1446. Cette famille l'échange en 1570, contre des seigneuries que Pierre, comte de Chemilly, possèdent près de Lisieux. Le château et la seigneurie sont acquis vers 1590 par Charles de Gouyon-Matignon puis échangés le 8 avril 1605 contre la seigneurie de Trémereuc en faveur de Jean II d'Avaugour.\nLe château est démantelé en partie, en 1618, sous Louis XIII, et défense est faite, le 11 avril 1625, à Jean d'Avaugour, d'y faire aucune fortification. L'ensemble est acheté en 1752 par Picot de Gallinée. En 1793, un membre de la famille de Châteaubriand s'est tenu quelques temps caché dans les ruines du Guildo. Durant la Révolution, la Société dite Bande-Noire, achète le château pour achever de le démolir. Elle en enlève les dalles des escaliers, ce qui reste des barbacanes et des machicoulis, les pierres des portes et des fenêtres. Ce vandalisme prend fin grâce à M. Rioust de Largentaye qui achète les ruines en 1848. Depuis 1986, ce château est entretenu et valorisé par M. Paul Ladouce et racheté en 1981 par le département. Éléments protégés MH : le château du Guildo (restes) : inscription par arrêté du 25 juin 1951.","architecture":"BREGERAC,  date du XVe et XVIIe siècle. Ce Manoir du XVIIe siècle, avec remploi du XVe siècle (porte d'entrée et fenêtre à arcature trilobée), remanié au XIXe siècle. il relevait de la Baronnie du Guildo. Il aurait appartenu à plusieurs propriétaires : Famille Labbé au XVe, Le Roy au XVe-XVIIe, Le Bouëtoux au XVIIe-XIXe siècles, La Motte-Rouge au XIXe siècle et du Bosc de Peyran au XXe siècle. Les communs datent de la fin du XIXe siècle ou du début du XXe siècle. Il ne reste que les dépendances de l'ancien manoir de Bréjerac.\nBRUNAIS  La construction du Manoir de la Brunais date du XVe siècle. TOUCHE à la VACHE    Le site du manoir de la Touche-à-la-Vache comprend les restes d'un donjon du XVe siècle. Le gros oeuvre des bâtiments est édifié en moellons de granite et schiste, présente une vaste cour rectangulaire ouverte d'un portail à deux portes à l'ouest et bordée d'un grand corps de logis au sud. Les restes d'un donjon de plan carré envahi par la végétation sont situés à l'est. Le portail, dont la porte piétonnière est occultée par la végétation, est flanqué de deux dépendances. Au sud, se trouve un grand corps de logis de plan rectangulaire allongé simple en profondeur, de type logis à fonctions multiples juxtaposées, associant au rez-de-chaussée des pièces à usage d'habitation, les plus anciennes étant ouvertes d'une porte à double rouleau, et des pièces à usage de dépendance. Ce corps de logis présente un logement à haut surcroît en retour d'équerre à gauche couvert d'un toit à croupes à forte pente. Quelques fenêtres du corps de logis conservent des grilles en fer. A noter à l'intérieur du donjon : bouche à feu, fenêtres à coussiège et vestiges de cheminée à piédroits. Éléments protégés MH : le château de la Touche-à-la Vache (restes) : inscription par arrêté du 27 février 1926.","habitants":"Guildo ;   duc de Mercoeur \"","divers":"Trois châteaux à Crehen;  Brunais, le Fort Guildo, la Touche a la Vache  grav-4 et Bregerac                                             Brégerac  grav-5  GPS : 48° 32' 47\" Nord, 2° 12' 43\" Ouest                                                         Brunais  grav-4  gps48° 27' 00\" Nord, 2° 23' 12\" Oues                                                        Beaussais GPS : 48° 18' 06\" Nord, 2° 10' 28\" Ouest                                              Guildo grav-1-2-3                                    GPS : 48° 34' 29\" Nord 2° 12' 24\" Ouest","gps":"48° 32' 47\" Nord, 2° 12' 43\" Ouest","images":["../../jctruffet.com/image/image_22/22_Cr%c3%a9hen_1.jpg","../../jctruffet.com/image/image_22/22_Cr%c3%a9hen_2.jpg","../../jctruffet.com/image/image_22/22_Cr%c3%a9hen_3.jpg","../../jctruffet.com/image/image_22/22_Cr%c3%a9hen_4.jpg","../../jctruffet.com/image/image_22/22_Cr%c3%a9hen_5.jpg"]},"Consult_chateau_formulaire3680-2":{"id":"Consult_chateau_formulaire3680-2","dept":"22","canton":"Dinan","commune":"Dinan","nom":"Dinan_22","type":"Château-patrimoine","periode":"XI-XIV-XVI","histoire":"DINAN, en 1065, Guillaume le Conquérant assiège et brûle le château de Dinan. La construction de lenceinte dans son tracé étendu tel quon le connaît aujourdhui ne put intervenir quà partir du moment où les deux seigneuries de Dinan-nord et de Dinan-sud furent réunies sous une même autorité. Tous les auteurs saccordaient jusquà présent pour proposer sa création après 1283, mais en fait cest bien à partir de 1264 que la délimitation dut intervenir, lorsque Jean le Roux acheta les deux parts de la seigneurie et en prit possession. Verrouillant les routes du royaume de France et de Normandie, Dinan revêt au moyen-âge une importance stratégique majeure : ville ducale à partir de 1283, la cité prospère au fil des ans. Le château regroupe trois éléments réunis au XVIe siècle, mais à lorigine indépendants : la porte du Guichet, la tour de Coëtquen et le donjon. Élevé à la fin du XIVe siècle à linitiative de Jean IV, duc de Bretagne, le donjon, que la tradition populaire désigne comme le \"château de la duchesse Anne\", combinait des fonctions militaires et résidentielles. Le duc voulait faire de cette tour, sa \"maison\" ; les nombreuses cheminées, latrines et larges fenêtres en témoignent. Une terrasse couronne aujourdhui ce donjon et offre un beau panorama sur la ville. Tour à tour, résidence ducale, complexe défensif et prison, le château accueille, depuis 1908, les collections du musée de Dinan. Lhistoire du pays de Dinan y est retracée à travers meubles, peintures, sculptures, etc.","architecture":"DINAN, Jean IV le Conquérant, Duc de Bretagne, lance la construction du donjon en 1384. Haute tour de forme ovale, une douve la sépare de l'extérieur des remparts mais aussi de la ville intérieure. Les mâchicoulis surplombent 30 mètres de murs de pierres de taille mais certains éléments ont été faits en bois. En 1693, l'ingénieur militaire Siméon Garangeau, élève de Vauban dresse un rapport après l'inspection des fortifications de Dinan. Il suggère des travaux pour transformer le donjon en prison et pendant tout le XVIIIe siècle, le château de Dinan aura une vocation carcérale pour les prisonniers de guerre. Il accueillera ensuite des détenus de droit commun. Ce n'est qu'en 1906 que la commune de Dinan rachètera le château pour y faire des travaux de restauration et y abriter son Musée ouvert au public. Le donjon abrite, depuis 1908, les collections permanentes du Musée municipal consacré à l'histoire de Dinan, de la Préhistoire au début du XXe siècle, et à l'Artisanat local (mobilier, costumes, belle collection de coiffes, atelier du tisserand). Des expositions temporaires y sont organisées chaque été. Le château-musée de la Duchesse Anne est ouvert au public, a été classé, aux M.H. depuis le 12/07/1886,  il  fait partie des 2 600 mètres des remparts. C'est un château ouvert au public qui se visite.  Si la Tour de Coëtquen offre un bel exemple d'ouvrages défensifs, si caractéristiques de la fin du Moyen-Âge, le donjon ducal est une résidence princière à l'architecture remarquables. Des impressionnantes cuisines à la chapelle, en passant par l'exceptionnelle salle de banquet éclairée par de belles fenêtres à meneaux, c'est tout le quotidien et l'art de vivre à la cour de Bretagne qui s'y révèle. Éléments protégés MH : le château de la Duchesse Anne en totalité : classement par arrêté du 12 juillet 1886.","habitants":"Jean IV, duc de Bretagne   la duchesse Anne\"","divers":"Patrimoine de Dinan","gps":"","images":["../../jctruffet.com/image/image_22/22_Dinan_22_1.jpg","../../jctruffet.com/image/image_22/22_Dinan_22_2.jpg","../../jctruffet.com/image/image_22/22_Dinan_22_3.jpg","../../jctruffet.com/image/image_22/22_Dinan_22_4.jpg","../../jctruffet.com/image/image_22/22_Dinan_22_5.jpg","../../jctruffet.com/image/image_22/22_Dinan_22_6.jpg","../../jctruffet.com/image/image_22/22_Dinan_22_7.jpg"]},"Consult_chateau_formulaire9d91":{"id":"Consult_chateau_formulaire9d91","dept":"22","canton":"Lanvallay","commune":"Evran","nom":"Evran","type":"Château","periode":"XV-XVII","histoire":"Deux chateau dans cet article à Evran, Bleuquen, Perronnays et Mottay ( voir article).                                                                                                                                  BLEUQUEN,, lensemble de Bleuquen appartenait sous lancien régime à la famille Le Chevestrier de la Roserais qui laissa son nom sur une propriété datée de 1764, au village de la Roserais. Plusieurs mentions de cette famille apparaissent dans une étude généalogique publiée par la Société d'Émulation des Côtes du Nord en 1909. La plus ancienne partie, au cur de la propriété, est bien conservée. Elle comprend une lucarne sculptée à fronton courbe ornée de denticules. Au nord, une aile directement accessible par une porte en pignon contient un escalier dépoque en vis associé à des latrines et une chambre. Cette partie centrale semble être le vestige d'un ancien logis dont les deux tiers ont été reconstruits à la fin du XVIIIe siècle.                                                                                                                    Au nord ouest d'Evran à quatre kilomètres le château de FERRONNAYS à Calorguen, la famille Ferron de la Ferronays, dextraction chevaleresque, fait partie des plus anciennes familles nobles de Bretagne, elle a donné son nom à la terre de la Ferronnays. Le dictionnaire de la noblesse mentionne la famille Ferron dès le début du 12 e siècle. En 1118, un de ses membres est consigné dans une charte de donation en faveur de lAbbaye de Marmoutiers. Le 17 janvier 1356, Jacques Ferron de la Ferronnays est présent à la revue des Ecuyers avec dautres nobles du territoire dont Jean de Beaumanoir. Ses enfants, Olivier, Jean et Geoffroy Ferron, sont tous trois qualifiés de Chevaliers dans lassociation établie en 1359 des seigneurs et gentilshommes bretons, pour la garde et le maintien du droit ducal en Bretagne.","architecture":"BLEUQUEN, le logis ouest avec ses ouvertures en arc segmentaire et sa lucarne remonte a l'extrême fin du XVIIIe siècle, le logis Est possède des linteaux en bois légèrement délardés. Un pigeonnier à étage, de plan carré, est adossé au pignon ouest. Les diverses dépendances datent du XVIIIe siècle. Le cadastre ancien présente un alignement de plusieurs logis avec dépendances au nord de l'étang de Bleuquen. Il semble indiquer également une partition de la cour en plusieurs logis. Le logis du maître des lieux à l'ouest, avec cour et jardin arrière, et des logis secondaires dans l'alignement avec également cour et jardins arrière. Des dépendances associées aux logis clôturent la cour, au sud. La construction respecte la règle de la mixité des matériaux, pierre de jauge et terre. L'ensemble est actuellement composé de trois niveaux: quatre (voire cinq) pièces à feu au rez-de-chaussée avec des cheminées au large foyer, un premier étage habitable dans la partie réservée aux maîtres des lieux, et un deuxième étage aménagé (par les propriétaires actuels) dans les vastes combles de la propriété.                                                                                                   FERRONNAYS, le caractère défensif du logis seigneurial, bretèche, meurtrières, caches et pièces de gué témoigne de lhistoire troublée de ce secteur, marqué par les guerres de la Ligue entre 1562 et 1598. Le calcaire coquillier employé pour la corniche, la lucarne et la tourelle secondaire témoigne de la diffusion de la pierre des faluns bien au-delà du gisement géologique lui-même. La lucarne contemporaine de linscription de 1569 fait partie des plus anciens modèles répertoriés en calcaire des faluns. Le fronton courbe, les pilastres en tables ainsi que les bossages piquetés se retrouvent dans les lucarnes des beaux logis de la campagne de Dinan du XVIe siècle à la première moitié du XVIIIe siècle.","habitants":"Bleuquen; famille Le Chevestrier de la Roserais                                 Ferronnais; famille Ferron de la Ferronays \"","divers":"Deux chateau das cet article à Evran, Bleuquen grav-1-2-,  Perronnays-     grav-3-4- à Carloguen et Mottay.","gps":"","images":["../../jctruffet.com/image/image_22/22_Evran_1.jpg","../../jctruffet.com/image/image_22/22_Evran_2.jpg","../../jctruffet.com/image/image_22/22_Evran_3.jpg","../../jctruffet.com/image/image_22/22_Evran_4.jpg"]},"Consult_chateau_formulaire5d42":{"id":"Consult_chateau_formulaire5d42","dept":"22","canton":"Lanvallay","commune":"Evran","nom":"Evran_II","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article; Mottay et la Touche.                      MOTTAY, le château du Mottay situé dans un environnement boisé qui lui sert d'écrin est un édifice hétérogène qui présente deux façades différentes. Celle de l'est, la façade principale maintient de beaux éléments sculptés en gothique flamboyant, fenêtres, rampants des pignons à feuilles retournées et crossettes en forme de lions qui peuvent remonter au début du XVIe siècle. La propriété est vendue en 1516 par une famille l'Hôpital aux Chauchart qui l'ont toujours conservée depuis et qui sont  les commanditaires. Le logis est prolongé vers le sud au XVIIe ou XVIIIe siècle, puis à la suite d'un incendie en 1868, il est entièrement restructuré. La façade arrière ouest rend mieux compte des nouveaux aménagements. Un avant-corps de deux travées en pierre de taille des faluns et baies en granite du Hinglé, couvert d'un haut toit en pavillon est plaqué au milieu de l´élévation, il est encadré au nord par l'ancienne tourelle d'escalier postérieure du manoir du XVIe siècle et au sud par une nouvelle tourelle formant pendant, les deux tourelles sont alors couronnées par un crénelage de fantaisie lui donnant, malgré ses hautes toitures à croupe, une allure de château troubadour.","architecture":"La TOUCHE,  ancienne propriété de la famille Léau de La Touche ; Le manoir de la Touche serait la résidence dune famille Chartier à la fin du XVIe siècle avant de passer entre les mains de la famille Léau. Cette famille de la petite noblesse occupe au XVIIIe siècle plusieurs charges au Parlement de Bretagne. Le logis construit à plusieurs périodes remonte pour ses parties les plus anciennes à la fin du XVIe siècle, telle la cheminée remployée au rez-de-chaussée et la tour descalier. Il est transformé et agrandi dun pavillon dangle dans la première moitié du XVIIe siècle puis de nouveau modifié au XIXe siècle : alignement des baies en travées, portes fenêtres, lucarnes du corps principal. Le pavillon détaché à larrière du logis, du côté est, pourrait avoir servi de logement au chapelain attaché à la chapelle Saint Joseph. Des travaux importants effectués à la fin du XIXe siècle témoignent de lart de vivre des notables vers 1900 : construction de nouveaux communs de style néo-normand, pavillon de chasse, traité comme une fantaisie, original par sa structure en ciment sculpté qui imite rondins et branchages .","habitants":"Mottay ;  famille l'Hôpital                                                     La touche ; famille Léau\"","divers":"Deux châteaux dans cet article; Mottay  grav-1 et la Touche                  GPS : 48° 23' 00\" Nord, 1° 58' 47\" Ouest","gps":"48° 23' 00\" Nord, 1° 58' 47\" Ouest","images":["../../jctruffet.com/image/image_22/22_Evran_II_1.jpg","../../jctruffet.com/image/image_22/22_Evran_II_2.jpg","../../jctruffet.com/image/image_22/22_Evran_II_3.jpg"]},"Consult_chateau_formulaire0413":{"id":"Consult_chateau_formulaire0413","dept":"22","canton":"Rostrenen","commune":"Perret","nom":"Forges_des_Salles","type":"Château","periode":"XIV XVI","histoire":"FORGES des SALLES, appartenant à la famille de Rohan depuis 1128, il est reconstruit à la fin du XIVe siècle par Alain VIII. En 1623, Geoffroy Finement dAngicourt fait élever quatre hauts-fourneaux sur le domaine. Il semble que très rapidement le site de létang des Salles et celui de létang du Vieux fourneau soient occupés. Cest ce dernier qui se développe au cours du XVIIIe siècle au détriment de celui de létang des Salles qui disparaît. En 1802, Louis-Antoine-Auguste de Rohan-Chabot doit faire face à une situation financière très difficile et un endettement considérable.","architecture":"FORGES; il décide de vendre lensemble de ses biens, dont le château des Forges des Salles, à Louis-Henri de Janzé, son régisseur. Lentement modifiées, ces forges sont demeurées dans l'état où elles se trouvaient lors de leur cessation d'activité, à la fin du XIXe siècle. Le château du maître de forge régisseur, les logements d'ouvriers ou rangées, en schiste, couvertes d'ardoises, et la maison du charpentier datent de la reconstruction du XVIIIe siècle.","habitants":"Geoffroy Finement dAngicourt\"","divers":"Château des Forges                                     GPS : 48° 10' 38\" Nord, 3° 09' 30\" Ouest","gps":"48° 10' 38\" Nord, 3° 09' 30\" Ouest","images":["../../jctruffet.com/image/image_22/22_Forges_des_Salles_1.jpg","../../jctruffet.com/image/image_22/22_Forges_des_Salles_2.jpg"]},"Consult_chateau_formulairee0a4":{"id":"Consult_chateau_formulairee0a4","dept":"22","canton":"Pléneuf-Val-André","commune":"Fréhel","nom":"Fréhel","type":"Château","periode":"XVII-XVIII","histoire":"trois châteaux à Fréhel ; Vaurouault,  Ville-Roger et Saint-Michel.                                           VAUROUAULT    Le château de Vaurouault a été construit d'après la tradition vers 1688, cette date figure sur une dépendance par Simon Garengeau, architecte du Roi de France, pour Charles Gouyon du Vaurouault, gouverneur du Fort-la-Latte sur une terre appartenant aux Gouyon du Vaurouault depuis le XVe siècle (le premier Gouyon seigneur du Vaurouault est Jean, époux d'Isabelle du Verger, second fils d'Alain de Gouyon de Beaucorps, qui, le 26 septembre 1437, obtint un afféagement de son cousin Bertrand II Gouyon, seigneur de la Roche-Goyon). La chapelle, dédiée à Notre-Dame de la Joie, serait la partie la plus ancienne puisque datée de 1643 d'après plusieurs sources. Le corps de logis a été agrandi en 1770 à l'initiative de François-Louis Gouyon du Vaurouault. Confisqué à la Révolution et vendu comme bien national, il a été récupéré par Armand Gouyon de Vaurouault au début du XIXe siècle, puis il est passé dans la famille de la Motte-Rouge en 1823, par le mariage de Julie Gouyon de Vaurouault avec Joseph-Emmanuel de la Motte-Rouge.                                                                           ST-MICHEL, cette maison noble du XVIe siècle est dotée de son lac privé dans un grand parc avec vue sur mer hôtel restaurant de  Jerome Fournel.","architecture":"VAUROUAULT, le château de Vaurouault occupe une position isolée dans la vallée du Frémur au sud de la commune de Fréhel, à proximité de la baie de la Fresnaye. Les bâtiments sont construits en moellons de grès, schiste et granite. Ce château comprend une cour carré pourvue à l'entrée d'une demi-lune et d'un portail à arc en plein cintre sommé d'un fronton triangulaire, d'une chapelle à vaisseau unique et à chevet à pans coupés à droite, d'un corps de bâtiment à usage de dépendance à gauche et d'un grand corps de logis au fond. Ce corps de logis est une construction de type ternaire à neuf travées composée de quatre pièces en enfilade au rez-de-chaussée et d´une cage d'escalier centrale abritant un bel escalier tournant pourvu d'un garde-corps en fer forgé. De plan rectangulaire, simple en profondeur, il est cantonné à chaque angle postérieur d'une tour carrée, dont celle de droite est coiffée d'un toit à l'impérial sommé d'un lanternon. Un logement désaffecté est greffé sur cette tour à l'arrière. Le château du Vaurouault comprend également les vestiges d'un jardin à la française délimité par un mur de clôture pourvu à l'est d'une échauguette décorative sur chaque angle.                                                               VILLE-ROGER, le château de la Ville-Roger comprend une chapelle très bien restaurée dédiée à Saint-Yves, dont la construction remonte à l'année 1601, ainsi qu'un corps de logis construit en 1735 pour Toussaint-Claude des Cognetz. Il a été la propriété du marquis de la Moussaye, pair de France de 1835 à 1848. Construction comprenant un grand corps de logis et des dépendances formant un plan d'ensemble en U. Le corps de logis, orienté au sud, est une construction de type ternaire à cinq travées inspirée du modèle de la malouinière. Eléments protégés MH : le corps de logis principal, en totalité, à l'exclusion des ailes latérales et galeries de raccord : inscription par arrêté du 4 juin 2007.","habitants":"Vaurouault; famille de  Gouyon du Vaurouault,  Ville-Roger; famille de Toussaint-Claude des Cognetz.\"","divers":"Deux châteaux à Fréhel ; Vaurouault grav-1-2,  Ville-Roger grav-3 et Saint-Michel grav-4-5","gps":"","images":["../../jctruffet.com/image/image_22/22_Fr%c3%a9hel_1.jpg","../../jctruffet.com/image/image_22/22_Fr%c3%a9hel_2.jpg","../../jctruffet.com/image/image_22/22_Fr%c3%a9hel_3.jpg","../../jctruffet.com/image/image_22/22_Fr%c3%a9hel_4.jpg","../../jctruffet.com/image/image_22/22_Fr%c3%a9hel_5.jpg"]},"Consult_chateau_formulairebce9":{"id":"Consult_chateau_formulairebce9","dept":"22","canton":"Pleslin-Trigavou","commune":"Taden","nom":"Garaye","type":"Vestiges châteaux","periode":"XVI","histoire":"GARAYE,  elle apparaît pour la première fois dans une charte de 1121 du prieuré de Saint-Malo de Dinan où il est dit que léglise Sancti Petri de Tadduen est restituée par un clerc, qui la détient de ses ancêtres, à l'évêque de Saint-Malo qui la donne à l'abbaye de Marmoutier. Ce texte ne précise pas lemplacement de la première église ; sagit -il de celle située en bordure de la Rance ou de celle du bourg qui aurait été reconstruite par la suite. Le château de la Garaye fut la demeure d'un bienfaiteur des pauvres et des malades : Claude Toussaint Marot de la Garaye. En 1692 le jeune homme, au sortir de son cours dacadémie, entra dans les mousquetaires. Il épousa Marie-Marguerite de la Motte Picquet.","architecture":"GARAYE, létymologie de Taden proviendrait du vieux breton tad, signifiant ancien ou ancêtre, et de hent, chemin. Cet ancien chemin serait la voie gallo romaine de Corseul à Alet. La voie romaine entre Corseul et Avranches comportait un gué sur la Rance. A cet emplacement une première agglomération sest développée face à léperon du Châtellier à la Vicomté-sur-Rance. Le vicus de Taden servait de port fluvial au chef-lieu de la cité des Coriosolites, Fanum Martis, aujourdhui Corseul. Deux temples et de nombreuses structures gallo-romaines y ont été découverts cernant une occupation entre la fin du 1er siècle après. J.C. à la fin du 4 éime siècle après. J.C. La présence dune église au lieu-dit les Boissières sur la Rance indique que le passage du gué a perduré au Moyen-Age et quil était assuré  par des moines comme pour les autres gués proches de Léhon, Lanvallay, il fut longtemps le théâtre des plaisirs les plus bruyants. On comptait dans ses écuries 30 chevaux de selle. On parlait de sa meute, comme étant une des plus belles meutes de France. Les idées de Marot de la Garaye changèrent, il se rendit à Paris, y étudia la médecine, la chirurgie, la chimie. A son retour, il transforma le château en hospice, disposa deux salles dans le grand bâtiment davant-cour de la demeure et fit construire une chapelle. Cinq chirurgiens y furent appelés, et jusquà 28 élèves furent attachés à leur suite. Le chenil leur servit de laboratoire. Aujourd'hui, il ne subsiste que des ruines de ce château. Certaines parties des murailles ont conservé des encadrements de fenêtres et des lucarnes sculptés. Des cadres, les angles, la hauteur des allèges, les linteaux sont moulurés, ainsi que les trumeaux pleins de la tour polygonale.\nÉléments protégés MH : le château de la Garaye (ruines) : classement par arrêté du 22 juillet 1920.","habitants":": Claude Toussaint Marot de la Garaye\"","divers":"Château de  la Garaye à Taden","gps":"","images":["../../jctruffet.com/image/image_22/22_Garaye_1.jpg"]},"Consult_chateau_formulairec63f":{"id":"Consult_chateau_formulairec63f","dept":"22","canton":"Rostrenen","commune":"Glomel","nom":"Glomel","type":"Château","periode":"XV-XVIII","histoire":"trois châteaux à Glomel; Coat -Couraval, Ker St-Eloy et Keranguevel.                                                                                                                COAT-COURAVAl, il sagit dune maison-forte construite au XVe siècle pour la famille Bouteville qui s'éteint en 1562. La demeure appartient successivement aux familles Urvoy de Crenan, de Perrien, de Goulaine, puis Rouillé d'Orfeuil, propriétaire actuel. Le manoir de Coat Couraval offre un décor extérieur dépouillé avec une façade de composition irrégulière sans travées où seules les portes dentrée et les pignons des trois lucarnes sont ornés de sculptures. La tour demi hors oeuvre est accolée au logis. Cet emplacement permettait un gain de place en surface habitable. Des jardins à la française en terrasse dominent la cour fermée de plan carré. Les bassins de ce jardin servaient autrefois à rouir le lin.\nÉléments protégés MH : le château, sauf parties classées : inscription par arrêté du 31 janvier 1964. Les façades et les toitures du château : classement par arrêté du 2 mars 1981.                                     KERANGUEVEL à Paule à deux kilomètre au nord -Est de Glomet, la construction du château s'étend du Moyen Âge au XVIIIe siècle. L'actuelle demeure date du début du XVIIIe siècle. L'édifice fut la propriété de la famille du Leslay de Keranguevel du XVe au XIXe siècle, puis il passe par alliance à la famille Ruellan du Créhu et ensuite à la famille du Pontavice. Au XXe siècle il appartient à M. et Mme Brière de l'Isle et aujourd'hui c'est Monsieur de Crevoisier qui est propriétaire du château de Kéranguével. La partie centrale ainsi que les ailes sur la cour principale ont été modifiées au XVIIIe siècle par la famille du Leslay qui en était propriétaire. La façade porte la date de 1717 et l'aile Nord porte la date de 1777.","architecture":"KER-ST-ELOY, la construction du château de Ker-Saint-Eloy date du XIIIe siècle et XVIIIe siècle. Ce manoir de la fin du XVIIIe siècle comprend une partie ancienne qui date du XIIIe siècle. A l'époque, il appartient à la famille de Saisy implantée dans la région, depuis lan 1215. Les Saisy (de Saisy de Kerampuil ou de Saisy de Kersaint-Eloy) prennent part aux croisades. L'un deux est le compagnon de Du Guesclin. Plusieurs dentre eux sont maires et députés. Le manoir de Ker-Saint-Éloy a appartenu par la suite à Jeanne Meslou, épouse de Jean Le Rouge, seigneur de Penanjun en Motreff. Leur fille Marie Ursule Le Rouge, veuve de Hyacinthe de Volvire, comte de Ruffec, le vendit, le 30 septembre 1689, à Joseph de Rison, écuyer originaire d'Armagnac et marié à Carhaix, en 1680, à Sylvie Vachet. Sylvie de Rison, leur fille, le porta en dot, au comte Charles René de Saisy de Kerampuil qu'elle avait épousé, dans la chapelle de ce manoir, le 12/10/1711. Il appartient, à partir de 1889, à Mme la Baronne Cazin d'Honinctun, née de Saisy de Kerampuil. Le château de Ker-Saint-Eloi a été construit en granit et schiste, avec un étage est couvert d'un toit d'ardoise. Il comporte des communs, une une chapelle et un colombier.","habitants":"Coat-Couraval; famille Urvoy de Crenan             Keranguevel ; famille du Leslay de Keranguevel                                                              Ker st eloy; Famille de jean le Rouge                                   \"","divers":"trois châteaux à Glomel; Coat -Couraval grav-1-2, Ker St-Eloy grav-3 et Keranguevel -grav-4  à Paule.                              Ker                                                                                                            GPS : 48° 12' 59\" Nord, 3° 26' 04\" Ouest","gps":"48° 12' 59\" Nord, 3° 26' 04\" Ouest","images":["../../jctruffet.com/image/image_22/22_Glomel_1.jpg","../../jctruffet.com/image/image_22/22_Glomel_2.jpg","../../jctruffet.com/image/image_22/22_Glomel_3.jpg","../../jctruffet.com/image/image_22/22_Glomel_4.jpg"]},"Consult_chateau_formulaire9edc":{"id":"Consult_chateau_formulaire9edc","dept":"22","canton":"Plestin-les-Grèves","commune":"Le Vieux-Marché","nom":"Goas_Froment","type":"manoir","periode":"XVI","histoire":"GOAS-FROMENT, des propriétaires de cette seigneurie, on connaît Yves Le Boeuf de Goasfroment marié en 1600 à Augustine Cariou de Goasven. C'est  à cette occasion que l'édifice actuel a été construit entre 1598 et 1601. Leur fils, François Le Boeuf, notaire, est dit écuyer. Ses armoiries sont de sable à une rencontre de boeuf d'or, accompagné de huit molettes de même. Vers 1751, le manoir de Goasfroment passe à Louis Julien Le Lay de Kerverzio et en 1785 à Yves Marie Le Lay de Kermaben. Saisi comme Bien National, il est acquis en 1792 par Jean Baptiste Juste, d'origine vénitienne né à Versailles, fils de gondoliers du roi. Ce dernier, Maître de Poste, ancien militaire des gardes françaises avait servit sous les ordres de Lafayette sous le sobriquet de \"du Canal\". Par tradition orale, il semble avéré que le marquis de Lafayette, dernier seigneur du Vieux Marché vint plusieurs fois, vers 1801, à Goas Froment rendre visite à son compagnon d'armes. Jean Baptiste Juste est l'ancêtre maternelle de l'académicien breton Charles Le Goffic. Les seigneurs de Goas-Froment semblent avoir introduit ce type d'escalier rampe sur rampe dans la paroisse de Plouézec au début du XVIIIe siècle.","architecture":"GOAS-FROMENT, ce manoir à la fois ancienne résidence seigneuriale et ancienne exploitation agricole est situé à deux kilomètres au nord est de bourg du Vieux Marché. Il est implanté sur un plateau dominant la vallée du Saint Ethurien. Les seigneurs de Goas-Froment semblent avoir introduit ce type d'escalier rampe sur rampe dans la paroisse de Plouézec au début du XVIIIe siècle. L´entrée sud du manoir est signalée par les vestiges d´un portail d´entrée formant autrefois une arcade en plein cintre (claveaux de départ de l´arcade accostés aux piliers de granite). Le manoir ce présente sous la forme d'un corps de logis principal à cinq travées flanqué de deux avant-corps à pan de bois construit en granite. Porte d'entrée architecturée. Les faces des avant-corps sont rythmées de potelets traités en colonnes avec chapiteaux à feuillage stylisé et base torsadée. L'étage de ces avant-corps repose en surplomb sur des corniches à denticules et modillons. Un escalier intérieur appareillé en maçonnerie, tournant à droite, à retour avec jour, occupe la partie centrale du manoir. Au rez-de-chaussée, à la rencontre des arcs qui supportent le limon de l´escalier, sont visibles les armes d'Olivier du Fresne et de son épouse Jeanne de Lezildry. Éléments protégés MH : le le logis en totalité, les communs pour leurs façades et toitures, la cour pour son sol dassiette, ses murs de clôture, les vestiges de son portail et le pont enjambant le fossé avec ses deux sphinges, ainsi que le jardin pour son sol dassiette et ses dispositions résiduelles (murs, portail, escaliers, éléments ornementaux) : inscription par arrêté du 26 août 2016.","habitants":"Famille de  Yves Le Boeuf de Goasfroment\"","divers":"manoir de Goas-Froment à le  Vieux-Marché","gps":"","images":["../../jctruffet.com/image/image_22/22_Goas_Froment_1.jpg","../../jctruffet.com/image/image_22/22_Goas_Froment_2.jpg"]},"Consult_chateau_formulairee1bc":{"id":"Consult_chateau_formulairee1bc","dept":"22","canton":"Broons","commune":"Gomené","nom":"Gomené_Illifaut","type":"Château","periode":"XVI-XiX","histoire":"Trois châteaux à Gomené ; Harsonnière er Laurenan et Merdrignac et au sud Illifaqut trois châteaux  la Bruyère la Fosse et Ville-Thual. HERSONNIERE, demeure construite autour de 1900 ; l'écrivain André Reuzé y passa son enfance au début du XXe siècle. a appartenu au comte Legendre. Deux ailes en V encadrent une tour centrale polygonale; maçonnerie enduite avec encadrements et chaînes d'angles en brique et pierre alternées ; élévation asymétrique, toiture à demi croupe et fronton pignon. Bâtiment de style rationaliste-pittoresque, néo Louis XIII. A l'orée de la forêt de Brocéliande découvrez cette belle demeure dans son écrin de verdure. La propriété possède un grand parc . chambres d'hôtes par Gérard le Meaux.                                                                        MERDRIGNAC, en 1789  appartenait à M. de Saint-Pern. La famille de Saint-Pern a produit : Hervé, qui se croisa en 1248. Bertrand, capitaine de la Roche-Derrien en 1311 et parrain du connétable Du Guesclin. Philippote, qui devint abbesse de l'abbaye de Saint-Georges, en 1406. Deux chevaliers de l'ordre, connétables de Rennes, de 1574 à 1588. Trois combattants à Saint-Cast en 1738. Un lieutenant général des armées du roi en 1789. Merdrignac, est-il dit dans des titres du XVe siècle, était une grande seigneurie appartenant alors au sire de Laval, qui avait épousé une demoiselle de Châteaubriand. Vaucouleurs (avec haute, moyenne et basse justice, qui appartenait à M. de Derval. Le Penhouët (avec haute justice) qui appartenait à M. de Rebours, et Le Peignie.","architecture":"KERNUE  le château de Kernué du XXe siècle, oeuvre de l'architecte M. Poirier de Rennes . Les mosaïques en façade sont l'oeuvre de l'atelier Odorico, entreprise rennaise fondée en 1882 par l'italien Isidore Odorico, originaire du Frioul. Propriété en 1925 de Victor d'Autremont, alors vice-président de la fondation \"Cartier Corporation New York\" et de son épouse originaire du village de Kernué.                                                                                                                 LAUNAY-GUEN, à trois kilomètres au nord-ouest de Laurenan  le manoir du XVIe siècle. Propriété de Jean de La Motte en 1448, de Jacques de La Motte en 1514, Gilles de La Mothe ou Motte en 1536 et Cyprien de La Motte en 1569. Puis propriété des vicomtes de Carné jusqu'à la Révolution.                                                                                                                        A ILLIFAUT le  le vieux château de la VILLE-THUAL (vers 1650), édifié par la famille de Miniac. Un Jean de Miniac est signalé dès 1450 ;  le nouveau château de la Ville-Tual (1876), édifié par la famille Desprez, originaire de Corrèze .                                                                                                                             BTUYERE di de la Brière (XIXème siècle), situé à la Brière et édifié par la famille de Grénédan.                                                                                               FOSSE de 1889, situé au Chalais et édifié par la famille Le Bris .","habitants":"Launay ; famille de la Motte                                         Merdrignac; famille de St-Pern                                                    \"","divers":"Trois châteaux à Gomené ; Harsonnière grav-4, Laurenan grav-5, et Médrignac grav-1-2-3   et Kerue grav-6 à  illifaut  Bruyère grav-7,  la Fosse grav 8, Ville-Thual grav-9 Gomené                                           GPS : 48°12'2,78\" Nord, 2°29'22,12\" Ouest","gps":"48°12'2,78\" Nord, 2°29'22,12\" Ouest","images":["../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_1.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_2.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_3.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_4.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_5.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_6.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_7.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_8.jpg","../../jctruffet.com/image/image_22/22_Gomen%c3%a9_Illifaut_9.jpg"]},"Consult_chateau_formulaireb257":{"id":"Consult_chateau_formulaireb257","dept":"22","canton":"Guingamp","commune":"Grâces","nom":"Graces","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Graces ; Keranno,  Keravel et Kernabat à Plouisy deux kilomètres au nord                                                                  .                                 KERANNO, le château de Kéranno a été construit au XVIIe siècle, puis reconstruit en 1750 selon un plan en équerre à l'emplacement d'une demeure plus ancienne. Propriété successive des familles. Le Vicomte au XVIe et XVIIe siècle, Boisboissel au XVIIe siècle, La Boissière et Rouxel de Villeferon au XVIIIe siècle, Monjaret de Kerjegu au XIXe et XXe siècle. Le château précédent avait été habité durant deux mois de l'année 1691 par le roi d'Angleterre Jacques II, chassé de son royaume, lors de la révolution de 1688. La chapelle privée détruite au XIXe siècle, près du portail d'entrée défendu par un saut de loup, était dédiée à Saint-Joseph et datait du XVIIIe siècle. En bordure du jardin haut, un bâtiment accueillait une orangerie. Éléments protégés MH : le château de Kéranno en totalité : inscription par arrêté du 18 novembre 1965. propriété de monsieur de Lépinequier.                                                                        KERNABAT,  est un ensemble important comprenant un corps de bâtiment principal avec une aile en retour, une chapelle, un corps de communs, un colombier, un portail d'entrée, des jardins en terrasse. Le domaine date pour l'essentiel du dernier tiers du XVIIe siècle et certains détails architecturaux datent du XVIe siècle, époque de la construction d'un premier manoir. Le logis, reconstruit en 1680 pour Claude d'Acigné, englobe l'ancien manoir de la fin du XVIe siècle. Vendu en 1888 à la famille Kerouartz, le château est restauré en 1901 par Dussauze, architecte à Angers, qui reconstruit la façade sur jardin de la chapelle et modifie des toits des communs. Le bâtiment, abandonné depuis 1912, a récemment été racheté par une congrégation religieuse.Éléments protégés MH : le château, les communs, le colombier, les jardins, les terrasses et les mails avec les murs : inscription par arrêté du 22 octobre 1997.","architecture":"KERAVEL  Venu de lÎle de France, Johan De Rocquancourt, sieur de Villy acheta en 1569 le château de Keravel et les terres attenantes à Mademoiselle Anne de Cléauroux, dame de Kerauffret. Demeure construite au XVIe siècle et remaniée vers 1640 pour sa façade principale, située sur une hauteur dominant la ville de Guingamp. Le manoir souvre au sud sur une cour bordée de communs et de dépendances agricoles. Au Nord la façade XVIIIe siècle donne sur un jardin dagrément lui-même fermé par de hauts piliers ; elle se caractérise par limposant pavillon coiffé dun toit à limpériale qui abrite lescalier; la porte dentrée à une élévation surprenante puisquelle atteint légout du toit. Ce pavillon forme un léger avant-corps et marque laxe de symétrie de lélévation. Ce manoir fait partie dun ensemble qui correspond à lhabitat des nobles bourgeois de Guingamp à la fin du XVIIIe siècle. L'utile et l'agréable sont réunis dans la ferme accolée au manoir. Aux alentours se situe un petit étang alimenté par une fontaine aménagée et très ancienne.Il est entouré de murs et de dépendances dont une métairie, d'anciennes écuries, une soue à cochons, une étable, et possède toujours son four à pain. Mis à part, l'escalier en bois, l'intérieur du manoir a subi des modifications au XIXème siècle. Il ne sera plus habité par la famille de Rocquancourt à partir des années 1800. A partir de 1814, il servira d'habitation pour le recteur, dans l'attente d'un presbytère, et ce, jusqu'en 1890. Par la suite, le manoir servira d'habitation à des fermiers. L'édifice est restauré par la famille Geoffroy de Rocquancourt-Keravel (fils d'Olivier de Rocquancourt-Keravel) depuis 1974.","habitants":"Keranno ; famille nobles,                         Kernabat; famille Kerouartz                             Keravel; Johan De Rocquancourt\"","divers":"Trois châteaux à Graces ; Keranno grav 1 à 4  et Keravel grav-5-6.                                                   Kernabat grav-7                                                .GPS : 48° 34' 19,75\" Nord, 3° 11' 17,37\" Ouest","gps":"48° 34' 19,75\" Nord, 3° 11' 17,37\" Ouest","images":["../../jctruffet.com/image/image_22/22_Graces_1.jpg","../../jctruffet.com/image/image_22/22_Graces_2.jpg","../../jctruffet.com/image/image_22/22_Graces_3.jpg","../../jctruffet.com/image/image_22/22_Graces_4.jpg","../../jctruffet.com/image/image_22/22_Graces_5.jpg","../../jctruffet.com/image/image_22/22_Graces_6.jpg","../../jctruffet.com/image/image_22/22_Graces_7.jpg"]},"Consult_chateau_formulaire6f89":{"id":"Consult_chateau_formulaire6f89","dept":"22","canton":"Ploufragan","commune":"St-Donan","nom":"Grand_Chesnay","type":"Château","periode":"XV-XVI","histoire":"GRAND-CHESNAY,  le château du Chesnay du XVe siècle. Propriété de Guillaume Le Bigot (en 1514) et de Louis Gascoing (en 1536) ;peut être considéré comme l'un des exemples les plus intéressants et homogènes du style régionaliste caractéristique de la production de l'architecte Henri Mellet à la charnière des XIXe et XXe siècles. De l'ancien manoir est conservée une partie des bâtiments transformée en communs, et la structure autour d'une cour avec portail charretier.","architecture":"GRAND-CHESNAY,  à l'instar de Bel Air au Pertre ou de Montbrault en Fleurigné, s'ancre dans la tradition constructive traditionnelle par l'emploi de matériaux locaux et de motifs faisant référence à l'architecture régionale du XVIIIe siècle (corniche à modillons en pierre de taille, lucarnes surmontées d'un fronton couronné d'une boule). Ces éléments, ajoutés à la composition du porche d'entrée et de la loggia s'inscrivant dans un petit corps individualisé et à l'utilisation de la baie en plein-cintre, sont autant de marques du style de l'architecte.","habitants":"Famille de  Guillaume Le Bigot\"","divers":"Château de Grand-Chesnay à st-Donan","gps":"","images":["../../jctruffet.com/image/image_22/22_Grand_Chesnay_1.jpg","../../jctruffet.com/image/image_22/22_Grand_Chesnay_2.jpg","../../jctruffet.com/image/image_22/22_Grand_Chesnay_3.jpg"]},"Consult_chateau_formulaire5a8a":{"id":"Consult_chateau_formulaire5a8a","dept":"22","canton":"Plelo","commune":"Saint-Brandan","nom":"Grénieux","type":"Château","periode":"XIX","histoire":"GRENIEUX, fut reconstruit en 1882 sur les vestiges d'un manoir  par la famille de Kerigan qui acquit la propriété en 1830. sur les vestiges d'un manoir du XVIe siècle appartenant à cette époque à Alain Le Bras. C'est la famille de Kerigan qui acquit la propriété en 1830 et fit bâtir cette nouvelle demeure.  Il a appartenu à pusieurs propriétaires : Familles Le Frotter, Garnier de Kerigant, de Callac, de Bruc. Il existe 9 manoirs et 1 château à découvrir à Saint-Brandan : manoir de Saint-Eutrope, manoir de Carbrien de 1670, le manoir du Pont-Ruellan du fin XVIIe, le manoir de Saint-Bedan de la fin du XVIIe-début XVIIIe, manoir de la Villeneuve du XVIIIe siècle. Famille Le Marchand de Launay, le manoir de la Porte-ès-Gautron du XVIIIe, le manoir du Fretay du XVIIIe, le manoir de la Ville-Fréhour de 1730, le manoir du Cartier ou du Quartier.","architecture":"GRENIEUX, C'est un château de style Renaissance,  a été reconstruit sur les ruines dun ancien château datant du XVIe siècle. La construction du Château de Grénieux date du 1882 Edifice de plan allongé, avec pavillons latéraux disposés en H et une tour circulaire hors-oeuvre sur un des côtés de la façade principale. Aile de communs en retour d'équerre. Ornementation de style néogothique.  Le château de Grénieux de 1882, construit sur les ruines dun ancien château du XVIe siècle. Le domaine appartient à Alain Le Bras (en 1514), à Robert Lymon, tuteur des enfants d'Yvon Le Bras en 1569.","habitants":"Famille de Kerigan\"","divers":"Château de Grénieux à St-Brandan, GPS : 48° 23' 25\" Nord, 2° 52' 08\" Ouest","gps":"48° 23' 25\" Nord, 2° 52' 08\" Ouest","images":["../../jctruffet.com/image/image_22/22_Gr%c3%a9nieux_1.jpg","../../jctruffet.com/image/image_22/22_Gr%c3%a9nieux_2.jpg"]},"Consult_chateau_formulairea4ff":{"id":"Consult_chateau_formulairea4ff","dept":"22","canton":"Guingamp","commune":"Guingamp","nom":"Guingamp","type":"Forteresse","periode":"XII-XV","histoire":"Trois châteaux à Guingamp; Guimgamp,  de St-Pierre, des Salles et St Léonard.                                                                                                      GUINGAMP, le château de Pierre II est un ancien château fort, du début du XIe siècle. Ce patrimoine oublié de la ville ayant été occupé jusqu'au XXe siècle par une école primaire, des fouilles archéologiques récentes (2005) ont permis de mettre au jour tout un pan de l'histoire de la ville. Dit de Pierre II du nom du Duc de Bretagne auquel est traditionnellement rattachée sa construction, est un monument emblématique du patrimoine architectural de Guingamp. Les origines de la ville se confondent en effet avec celles de cette forteresse du milieu du XVe siècle. Cest au XIe siècle, très probablement vers 1034, quune première enceinte et un château imposant furent construits à cet endroit. Au cours du XIIe siècle cette enceinte primitive fut rasée et remplacée par une enceinte de plan polygonal irrégulier édifiée en pierre. Le château reconstruit fut le lieu de résidence privilégié de Charles de Blois et le lieu où se retira Jeanne de Penthièvre la veuve de ce dernier, après la bataille dAuray en 1364. Détruite sur ordre du Duc de Bretagne Jean V, cette enceinte fut remplacée vers le milieu du XVe siècle par une forteresse dartillerie. Létat actuel de lédifice résulte du démantèlement ordonné en 1626 par le roi Louis XIII, le château faisait également partie de la ceinture défensive de la ville  A Guingamp, la tour de Saint Sauveur et la tour de Traouzach sont visibles de lespace public. À Trotrieux, les murailles imposantes conservent une partie de leurs mâchicoulis.  Éléments protégés MH : les restes du château : inscription par arrêté du 20 janvier 1926.","architecture":"St-PIERRE, des remparts construits en 1446 par Jean de Beuves pour Pierre II, étaient également présents et dessinaient les contours de la ville au XVe siècle. À l'achèvement des remparts en 1456, la ville comptait :six tours ('Toulquéllénic', 'Traou-Zach', 'Saint-Sauveur', 'Luduec', 'La Fontaine' et 'Champ du Roy au Mauroy')Quatre portes d'accès : ('Quincy', 'Locmikaël', 'Tréguier', 'Montbareil', 'Porte de Rennes') deux poternes venaient compléter ce système défensif : 'Quincy\" et 'Saint-Jacques' (barbacane défendant l'accès Est de la ville).                                                     Des SALLES  Le château a été construit dans la deuxième moitié du XVIe siècle à l'emplacement d'un manoir attesté dès 1456, agrandi et transformé au XVIIe siècle, il est restauré au cours de la seconde moitié du XIXe siècle. Propriété de la famille de Crésolles pendant la seconde moitié du XVIe siècle, il appartient à la famille de Cleuz du Gage de la fin du XVIe siècle jusqu'à la Révolution. Cette famille serait la commanditaire du château actuel. Confisqué à la Révolution française, en 1793 fut mis en vente. En 1999 il est racheté par la commune de Guingamp. Le château des Salles, de plan en L, présente un corps de bâtiment principal accueillant l'entrée et une aile en retour d'équerre vers l'ouest. L'édifice est construit en moellons de granite et schiste laissés apparents, l'encadrement des baies étant en pierre de taille de granite.\nÉléments protégés MH : le château des Salles en totalité : inscription par arrêté du 27 avril 1964.","habitants":"Charles de Blois                Salles;  famille de Crésolles\"","divers":"deux châteaux à Guingamp grav-8;  de st-Pierre  grav 1 à 5  et St Léonard grav-7 .                                      Guingamp GPS : 48° 33' 36\" Nord, 3° 09' 01\" Ouest                                         Salles  grav 6                                                                                   GPS : 48° 33' 30\" Nord, 3° 09' 23\" Ouest","gps":"48° 33' 36\" Nord, 3° 09' 01\" Ouest","images":["../../jctruffet.com/image/image_22/22_Guingamp_1.jpg","../../jctruffet.com/image/image_22/22_Guingamp_2.jpg","../../jctruffet.com/image/image_22/22_Guingamp_3.jpg","../../jctruffet.com/image/image_22/22_Guingamp_4.jpg","../../jctruffet.com/image/image_22/22_Guingamp_5.jpg","../../jctruffet.com/image/image_22/22_Guingamp_6.jpg","../../jctruffet.com/image/image_22/22_Guingamp_7.jpg","../../jctruffet.com/image/image_22/22_Guingamp_8.jpg"]},"Consult_chateau_formulaire73d1-2":{"id":"Consult_chateau_formulaire73d1-2","dept":"22","canton":"Guingamp","commune":"Guingamp","nom":"Guingamp_II","type":"Château","periode":"XVI","histoire":"quatre  châteaux dans cet article Montjoie, Munehorre, st-Léonard et Runevarec.                                                                                                MONTJOIE à dix kilomètres  au nord Est à Gaudelin   Mentionné comme le siège d'une terre noble depuis le XVIe siècle, propriété de la famille Quélen, le château de Montjoie appartient à la famille de Botmiliau depuis le XVIIIe siècle. C'est une demeure construite au XVIIe siècle très fortement reprise en 1845. Le château, dans le style néo-classique, de plan rectangulaire, possède cinq travées; maçonnerie de schiste enduit avec encadrements de baies et bandeau en pierre de taille ; occulus et fronton de lucarne en brique ,corniche à modillons.                                                                                     MUNEHORRE, la construction date du XVe au XVIIIe siècle. Elle se situe près d'un petit étang et sert depuis de cave, au fermier. Certains éléments du manoir seraient encore plus anciens, comme la tourelle ; son colombier, son orangerie, sa chapelle, son moulin (Milin-ar-Pont). Son nom viendrait de Mein Hoer, qui signifie pierres d'or en vieux breton (langue antérieure aux XIe et XIIe siècles). La seigneurie de Munehorre (ou Kerprigent-Munehorre) possédait jadis un droit de haute justice (confirmée en 1671), puis de moyenne et basse justice (en 1770). La seigneurie de Munehorre avait dans sa mouvance le Manoir de Kerhuel et le Manoir du Rucaër. avec son colombier du XVIe siècle, reconstruit en partie (façade Sud) au XVIIIe siècle. Propriété successive des familles Munehorre (au XVe siècle), Trolong (au début du XVIe siècle), Bizien (au milieu du XVIe siècle), Launay (au XVIIIe siècle) et Quelen.  Propriété de Jean Marie Paul André de Launay (au début 1791), puis des familles Quelen (au XIXe siècle), Gouyon de Coipel (ou Coypel), et Jemble (en juillet 1872) ;","architecture":"RUNEVAREC,  à  Guingamp du XIXe siècle, édifié sur les ruines d'un ancien manoir du XVIIe siècle qui aurait appartenu entre autre à la famille Allain et à la famille Lojou au moment de la Révolution. Il est occupé aujourd'hui par le lycée rural du Restmeur. Sa chapelle, datée du XIXe siècle, est dédiée à Saint-Loup : on y trouve une statue de Saint Loup, en bois polychrome et datée de 1783. \" Siège dun pardon fréquenté. La chapelle actuelle, de plan rectangulaire avec chevet polygonal, date du XIXe siècle et renferme les statues anciennes de saint Gilles et de saint Loup .                                                                                 ST-LEONARD,  un corps de logis principal,  construit au milieu du XIXe siècle, a été agrandi par un pavillon latéral dans la seconde moitié du XIXe siècle.Corps central de plan rectangulaire couvert d'une balustrade (toit plat) flanqué d'un haut pavillon sur le côté droit et d'une annexe basse à gauche.","habitants":"Montjoie; Famille de Botmiliau                              Munehorre, Famille de Munehorre\"","divers":"quatre  châteaux dans cet article Montjoie grav-1-2, Munehorre grav-3-4-5, st-Léonard et Runevarec grav-6.                                             Munehorre GPS : 48° 35' 18\" Nord, 3° 08' 04\" Ouest","gps":"48° 35' 18\" Nord, 3° 08' 04\" Ouest","images":["../../jctruffet.com/image/image_22/22_Guingamp_II_1.jpg","../../jctruffet.com/image/image_22/22_Guingamp_II_2.jpg","../../jctruffet.com/image/image_22/22_Guingamp_II_3.jpg","../../jctruffet.com/image/image_22/22_Guingamp_II_4.jpg","../../jctruffet.com/image/image_22/22_Guingamp_II_5.jpg","../../jctruffet.com/image/image_22/22_Guingamp_II_6.jpg"]},"Consult_chateau_formulaire3d1a":{"id":"Consult_chateau_formulaire3d1a","dept":"22","canton":"Broons","commune":"Guitté","nom":"Guitté","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article de Guitté; Couellan et Petchais.   COUELLAN,  de 1595- 1620 reconstruction du château au XVIe siècle passe par alliance  à la famille de Boisjean. Madeleine de Boisjean l'apporte  en dot à Simon Hay de la Nétumières qui entreprend la reconstruction du manoir. Au XVIIe siècle le domaine passe par alliance à la famille de Derval,  en 1715, Marie-Françoise de Derval épouse son cousin Bertrand de Saint-Pern comte de Ligouyer auront sept enfants dont le dernier ägé d'un an à la mort de son père en 1725 et madame meurt en 1731 les orphelins sont confiès à un oncle Jules-Vincent de Saint-Pern qui transmettra sont titre de marquis à l'aîné de la Fratrie René-Célestin-Bertrand de saint-Pern(1716-1794) héritier de Couéllan et de la majeure partie du domaine  épouse une orpheline Marie-Philipine de l'Ollivier de Saint-Maur en 1711 . Il eut 19 enfants dont 12 vécurent et lui firent vite trouver son manoir trop petit. Saint-Pern fit construire deux grandes dépendances en 1748 et 1783, et en 1777 prolongea vers l'est le partie Louis XIII par un bâtiment en équerre. Après la Révolution le domain
