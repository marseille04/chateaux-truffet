au jusqu'à la fin du XVIIIe siècle, aujourd'hui la famille de M. Thomin.","architecture":"KESTELLIC,  le manoir de Kestellic ou Questellic (1891-1901), édifié par Félix Ollivier et restauré en 1901 . On y trouve un jardin botanique ;   La maison de villégiature du Kestellic, dite manoir du Kestellic, a été construite au début du XXe siècle par l'architecte Félix Ollivier pour Aristide Tallibart qui, selon la tradition, fut mis en quarantaine devant la baie du Kestellic au retour de Constantinople et décida d'acquérir des parcelles de terrain, d'y édifier une maison et d'aménager un jardin d'agrément. La propriété fut acquise par le marquis Yann de Keroüartz en 1947, lequel entreprit vers 1970 d'introduire et de planter de nombreuses espèces exotiques. Le jardin a été inscrit à l'inventaire des monuments historiques par arrêté du 4 août 1992. Dominant l'estuaire du Jaudy, le manoir du Kestellic est une construction de style régionaliste à trois corps de bâtiment édifiée en moellons de granite et schiste laissés apparents. L'encadrement des baies est édifié en granite rose. : granite rose, pignons découverts à rampants à crossettes, plate-bande de schiste, lucarnes-pignon, niche à statuette, baies à arc brisé, baies cintrées. Le jardin est un jardin exotique en pente comprenant une végétation méditerranéenne naturelle (arbousiers, mûriers, myrtes, chênes verts, chênes liège, etc.) et de nombreuses espèces végétales en provenance de tous les continents (cistes, azalées, camélias, mimosas, eucalyptus, etc.).","habitants":"Famille de Kerousy             La famille de Lezhildry \"","divers":"Trois châteaux à Plouguiel ; Kerousy grav-1, Leshildry grav-2-3 et Kestellic grav 4-5.","gps":"","images":["../../jctruffet.com/image/image_22/22_Plouguiel_1.jpg","../../jctruffet.com/image/image_22/22_Plouguiel_2.jpg","../../jctruffet.com/image/image_22/22_Plouguiel_3.jpg","../../jctruffet.com/image/image_22/22_Plouguiel_4.jpg","../../jctruffet.com/image/image_22/22_Plouguiel_5.jpg"]},"Consult_chateau_formulaired732-2":{"id":"Consult_chateau_formulaired732-2","dept":"22","canton":"Plouha","commune":"Plouha","nom":"Plouha","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Plouha ; Lysandre, kéroli et Keringat.              LYSANDRE, le château de Lisandré passe ensuite entre les mains des familles Lannion, de Guer de Pontcallec et Callouet (suite à la vente de la seigneurie par Bonne Louise Le Voyer aux Callouet). Vendu comme bien national, l'édifice est acquis le 13 août 1793 par Guillaume Le Cornec dit Mahon (assassiné en février 1800 par les chouans). Il est acheté en 1804 par Jean Louis Courson de La Villehélio qui mourut à Paris en 1827. L'édifice revint ensuite par héritage à Louis Nelty Curateau, né à Bordeaux, en 1790, fils de Guillaume Le Cornec et de Madame Curateau. Ce dernier pris le nom de Curateau de Courson. Nelty Curateau, époux de Hortense Barbou, fut longtemps maire de Plouha et mourut le 23 mai 1881. Lisandré fut vendu en 1885 à Robert Courson de la Villeneuve, qui revendit lui-même ce château en 1892 à M. de Coetlosquet. Cette terre passa ensuite au Vicomte Armand-Garnier de la Villesbret, époux de Mathilde de Francia, puis à la famille Bazin.","architecture":"KERJOLIS, manoir de la 1ère moitié du XVIe siècle à l'état de vestiges. Ancien manoir à cour fermée ayant conservé un portail à porte charretière et porte piétonnière surmontées chacune d'une archivolte en accolade sommée d'un fleuron. La porte piétonnière est surmonté d'un panneau rectangulaire en granite présentant un heaume supporté par deux lions et des blasons martelés portant, selon René Couffon et Henri Frotier de La Messelière, les armes de la famille Quellenec et de ses alliances.\n KERINGAT,  a été en partie détruit. Il subsiste un corps de logis du XVIe siècle à l'état de vestige, daté plus précisément de l'année 1554.Un logis et une dépendance ont été construits au  XVIIIe siècle.  L'ensemble est construit en moellons de granite et schiste sur un plan en L. Le site de Keringant comprend une maison haute à pièce unique au rez-de-chaussée avec dépendance en retour d'équerre vers l'avant  et un ancien corps de logis à l'état de vestige dont il subsiste les baies d'origine à l'avant, plus particulièrement une porte en arc brisé.\nLYSANDRE,  est un édifice du XVIIe siècle, de plan rectangulaire, ayant un fronton triangulaire sur sa façade principale, dans l'axe avec des armoiries en tympan. Au centre de cette façade est disposé un perron, le rez de chaussée étant surélevé. La chapelle, également sur plan rectangulaire, présente, au centre de sa toiture, un clocheton polygonal. Le linteau s'orne de deux médaillons et armoiries entourées de sculptures. L'année 1760 était indiquée entre le linteau et la corniche. L'orangerie est un bel ensemble de XVII siècle, entre-axes dont celui du centre permet l'entrée à deux battants, de simples poteaux montent jusqu'à la corniche, soutenus par une tête.Éléments protégés MH : les façades et les toitures de la chapelle et de l'orangerie : inscription par arrêté du 9 avril 1952.","habitants":"Lysandre; Famille Lannion                             Kériolis; famille Quellenec                               Kéringat;\"","divers":"Trois châteaux  à Plouha ; Lysandre grav 3-4, kérioJis grav 6-7 et Keringat grav-5.                                      Lysandré GPS : 48° 39' 33\" Nord, 2° 56' 26\" Ouest","gps":"48° 39' 33\" Nord, 2° 56' 26\" Ouest","images":["../../jctruffet.com/image/image_22/22_Plouha_1.jpg","../../jctruffet.com/image/image_22/22_Plouha_2.jpg","../../jctruffet.com/image/image_22/22_Plouha_3.jpg","../../jctruffet.com/image/image_22/22_Plouha_4.jpg","../../jctruffet.com/image/image_22/22_Plouha_5.jpg","../../jctruffet.com/image/image_22/22_Plouha_6.jpg","../../jctruffet.com/image/image_22/22_Plouha_7.jpg"]},"Consult_chateau_formulaire5d30":{"id":"Consult_chateau_formulaire5d30","dept":"22","canton":"Bégard","commune":"Ploëzal","nom":"Ploêzal_Roche_Jagu","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Ploëzal la Roche-Jagu et Kercabin.                                        ROCHE-JAGU, la première citadelle connue y fut construite au XIe siècle, par une famille de ce nom. Elle s'éteindra à la fin du XIVe siècle, transférant de fait la propriété au domaine ducal, dépendant de Jean IV de Montfort. Le fort deviendra alors le siège d'une garnison puis sera entièrement détruit au début du XVe siècle. Catherine de Troguindy deviendra propriétaire de ces terres et entreprendra la construction du château, à partir de 1405. Cette nouvelle demeure ayant l'heurt de déplaire à Marguerite de Clisson qui présidait alors aux destinées d'un autre château, celui de Châteaulin sur Trieux situé en amont sur les terres de Pontrieux, elle fera emprisonner les ouvriers du chantier en 1407 ! Il faudra l'intervention du duc de Bretagne afin de mettre fin au conflit et autoriser le parachèvement de La Roche Jagu peu avant le décès de Catherine de Troguindy, en 1418. Achevé en 1420, le château et son domaine passeront ensuite  dans les mains de diverses familles (Du Parc, Kersaliou, Treal, Kerimel, Penhoët, Coëtmen, Acigné, Plessis Richelieu, de Fronsac et de Tressan) jusqu'à la Révolution.                                                                                      TRELIGNY Un hôtel de charme et de caractère à proximité de la Côte de Granit Rose. Cet authentique château du XVIe siècle est idéalement situé dans le Trégor.","architecture":"ROCHE-JAGU,  au XVIIIe siècle, le duc de Richelieu fera creuser plusieurs souterrains mais les aura fait combler avant de céder la forteresse au conseiller Le Gonidec de Tressan. Jusqu'alors, les propriétaires des lieux avaient pouvoir de haute, moyenne et basse justice, régnant sur un vaste territoire, où les fermages leur assuraient de bons revenus.Les derniers propriétaires privés seront issus de la famille d'Alès à partir de 1899. Le vicomte d'Alès, ne pouvant faire face aux restaurations qu'impliquaient son classement à l'inventaire des M.H. en fera don au département le 9 avril 1958. Cette date marquera le début d'une rénovation complète et la mise en valeur des jardins, pièces d'eau et cultures en terrasses descendant jusqu'aux berges du Trieux.   Éléments protégés MH : le château en totalité: classement par arrêté du 25 juin 1930. Le portail d'entrée, les pavillons qui encadrent ce portail (à l'exception de la partie moderne), et le mur d'enceinte: classement par arrêté du 27 janvier 1969.                                                                                   KERCABIN, à Plouëc du Trieux  à cinq kilomètres au sud-Est de Plouezal. Le château de Kercabin, de style néo-classique, a été construit en 1845, à l'emplacement d'un manoir appartenant à Claude de Lanloup et détruit par un incendie au XVIIe siècle. Edifice de plan rectangulaire double en profondeur comprenant sept travées sur la façade principale au sud, cinq sur la façade nord. La façade principale est construite en pierre de taille de granite ; un fronton triangulaire surmonte les trois travées centrales. L'élévation des façades latérales et nord est en petit appareil de granite et de grès. La toiture à croupe est couverte en ardoise. Escalier intérieur remarquable (double volée à montées parallèles, puis une volée centrale).","habitants":"Roche-Jagu; Catherine de Troguindy\"","divers":"Deux châteaux  à Ploezal la Roche-Jagu-grav de 3 à 6 et Kercabin à Plouëc du Trieux grav-1   et Tréligny grav-2                                                             GPS : 48° 44' 00\" Nord, 3° 09' 05\" Ouest","gps":"48° 44' 00\" Nord, 3° 09' 05\" Ouest","images":["../../jctruffet.com/image/image_22/22_Plo%c3%aazal_Roche_Jagu_1.jpg","../../jctruffet.com/image/image_22/22_Plo%c3%aazal_Roche_Jagu_2.jpg","../../jctruffet.com/image/image_22/22_Plo%c3%aazal_Roche_Jagu_3.jpg","../../jctruffet.com/image/image_22/22_Plo%c3%aazal_Roche_Jagu_4.jpg","../../jctruffet.com/image/image_22/22_Plo%c3%aazal_Roche_Jagu_5.jpg","../../jctruffet.com/image/image_22/22_Plo%c3%aazal_Roche_Jagu_6.jpg"]},"Consult_chateau_formulaire05f9":{"id":"Consult_chateau_formulaire05f9","dept":"22","canton":"Plancoët","commune":"Pluduno","nom":"Pluduno","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Pluduno ; Montchoix et Plessix-Meen                      MONCHOIX, la construction du château date de 1759, pour Antoine de Bédée, qui fut l'oncle de François-René de Chateaubriand surnommé \"Bédée l'Artichaut\" pour éviter de le confondre avec \"Bédée l'Asperge\". Le château est construit par l'oncle maternel de Châteaubriand, Antoine de Bédée il devient seigneur de Plancoët en 1786, après rachat du Fief aux Rieux. François René de Châteaubriand conserve un souvenir merveilleux de Monchoix, dont il compare la douceur à la sévérité de Combourg. Après les Bédée, le château passe aux Du Boishamon; Henri, sous-préfet, meurt à Monchoix en 1846.Toujours dans la descendance des Boishamon.                                                                        PLESSIX MEEN, du XVIIe siècle, en Granit. Ce manoir, construit à l'initiative de Guy Langlois de Prémorvan et de Julienne Poulain, possède un colombier, un étang et une cour. Transformé en logis de France.","architecture":"MONCHOIX, construit dans la 2ème moitié du XVIIIe siècle par l'oncle de Châteaubriand, l'édifice est une maison rurale de plan rectangulaire s'élève sur 3 niveaux. Calées par deux cheminées monumentales au départ des croupes de pignon, les façades sont de composition classique. A l'intérieur, la lisibilité de la distribution d'origine a été perturbée par les cloisonnements du XIXe siècle. La chambre de l'écrivain y est conservée. Le château de Monchoix a été racheté le 30/09/2010, par un couple de Hollandais : Rien et Wilja Van Aart, passionnés de chevaux. Propriété de l'hôpital de Girac, l'ancienne maison de convalescence était en vente depuis un an. Leur projet est de faire venir de Hollande leurs 20 chevaux pour proposer des stages de dressage et des spectacles équestres. Ils projettent de faire tourner leur haras grâce à des chambres d'hôtes. Le château de Monchoix en totalité est inscrit aux M.H. le du 22/07/2004. Son propriétaire,  Rien et Wilja Van Aart.","habitants":"Monchoix ; Familkle de Antoine de Bédée          Plessix ; Famille de Guy langlois de Prémorvan \"","divers":"Deux châteaux à Pluduno ; Montchoix grav-1  et Plessix-Meen grav-2                                                              GPS : 48° 31' 27\" Nord, 2° 15' 37\" Ouest","gps":"48° 31' 27\" Nord, 2° 15' 37\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pluduno_1.jpg","../../jctruffet.com/image/image_22/22_Pluduno_2.jpg"]},"Consult_chateau_formulaireedd0":{"id":"Consult_chateau_formulaireedd0","dept":"22","canton":"Broons","commune":"Plumaugat","nom":"Plumaugat_Caulnes","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux à Plumaugeat; Epinay, Lozier  et Verger à Caulnes.      EPINAY, propriété successive de Julien Guillemois, écuyer et sieur de l'Epinay, époux d'Hélène Dibart Dame de la Villetanet (1612), Louis Guillemois, écuyer et sieur de l'Epinay et des Rosais (1641-1683), époux de Françoise Bouton de la Mégrière (1645), Pierre Guillemois, sieur de l'Epinay (1649), époux de Françoise Borgnet (1657-1721) et Julien Guillemois, sieur de l'Epinay et du Fresche (mort en 1739).                                                                                         LOZIER, le manoir de Lozier  construction  du XVIIe et XVIIIe siècle occupe le fond d'une cour à laquelle on accède par un chemin planté d'arbres en venant de l'est. Le côté nord de la cour est fermé par des communs greffés directement sur la demeure; au sud s'élève une chapelle de plan rectangulaire orientée nord-sud. L'édifice est constitué d'un corps de bâtiment rectangulaire, de deux pavillons de plan carré adjoints aux deux angles de la façade principale et de deux demi tourelles formant saillie sur la façade postérieure et les façades latérales. Il appartenait au XVIIIe siècle aux Gueheneuc de Boishue, qui possédaient aussi le château de Plumaugat (cette forteresse qui s'élevait à 500 mètres au nord-est du bourg était à l'origine à la famille de Plumaugat). Le château de l'Hozier (XVI-XVIIe siècle), situé route de Plumaugat à Lanrelas. Propriété du comte du Bois-Guéhéneuc, puis de la famille de Mellon \nÉléments protégés MH : les façades et les toitures du corps de logis ainsi que la chapelle du château : inscription par arrêté du 13 février 1992.","architecture":"Caulnes à quatre kilomètres au nord-Est de Plumaugat , le manoir du VERGER, édifice fin XVIIe siècle ou XVIIIe siècle ; le lambris d'une cheminée de l'étage porte une inscription. Cadran solaire portant blason et date 1690, toit en ardoise  en plan symétrique, étages sous-sol, 1 étage carré, élévations extérieures ordonnancées, couvertures toit en croupe, escalier dans-oeuvre : escalier tournant à retours. La date de construction est inconnue. Le manoir était déjà habité en 1536. La construction semble dater du XVIIIe siècle pour la partie ouest jusqu'au centre. Le château aurait été terminé sous le règne de Louis XVI dans le même style, la symétrie ayant été à peu près sauvegardée. L'édifice est de plan rectangulaire avec un rez-de-chaussée, un étage et un étage de lucarnes. La terrasse a été ajoutée en 1910. Dans les années 1900, les communs en retour d'équerre sur le côté ouest ont été détruits et d'autres communs plus vastes ont été construits en retrait. A l'intérieur, le rez-de-chaussée conserve des boiseries Louis XVI, ainsi qu'une grande porte et une cheminée à manteau de bois, Renaissance, provenant d'un château de la Loire.","habitants":"Epinay; famille de Guillemois                      Lozier ; famille de Mellon                                Verger;\"","divers":"Trois châteaux  à Plumaugeat; Epinay grav-3 , Lozier  grav-1  et Verger grav-2  à Caulnes","gps":"","images":["../../jctruffet.com/image/image_22/22_Plumaugeat_Caulnes_1.jpg","../../jctruffet.com/image/image_22/22_Plumaugeat_Caulnes_2.jpg","../../jctruffet.com/image/image_22/22_Plumaugeat_Caulnes_3.jpg"]},"Consult_chateau_formulaire5dfc":{"id":"Consult_chateau_formulaire5dfc","dept":"22","canton":"Ploufragan","commune":"Plédran","nom":"Plédran","type":"Château","periode":"XV-XVI","histoire":"Deux Châteaux à Plédran; Craffault  et Belleville.                                       CRAFFAULT,  bâti au XVe siècle a gardé ses douves, blazons de la famille de Rouzault et de ses alliès, la verrière représente un seigneur de cette maison; propriétaire à M. Dominique de Largentaye. le château de Craffault (XVI-XVIIe siècle). Les terres de Craffault appartenaient en 1514 à Jacques de Beaumanoir et Pierre Le Normand. En 1536, les terres appartiennent à Jean Rouaud et Pierre Le Normand.  En 1569, est mentionné Jean Rouaud. L'édifice actuel est édifié à l'emplacement d'un ancien manoir appelé Querfahau et qui possédait un pont-levis, des tours, des douves et de puissantes murailles. L'édifice actuel possède à chaque extrémité une tourelle en cul-de-lampe. Il est restauré et agrandi par l'architecte Jean Baptiste Martenot en 1899-1902 ;                                                                                                              BELLEVILLE, la construction  date du XVIe au XVIIIe siècle. C'est un manoir à tourelle. Le Manoir de Belleville est privé, fermé au Public. Il existe 1 autre château et plusieurs manoirs à découvrir sur la commune ,  du Pesle Châtel,  de La Ville Guinvray, de La Fontaine Menet.","architecture":"CRAFFAULT,    est constitué d'un corps de logis dont la façade principale, aspectée à l'est, date du XVIe siècle pour sa partie droite, et du XVIIe siècle pour sa partie gauche, d'un pavillon remontant probablement au XVe siècle abritant l'escalier principal et enfin d'une galerie, d'un pavillon et d'une aile au nord construite en 1902, et conçus par l'architecte rennais Martenot dans un souci d'harmoniser les nouvelles constructions avec la façade principale qui fit l'objet de restaurations importantes de 1899 à 1902 avec éléments de remploi du château de Cotardais à Médréac.","habitants":"Craffault; famille de Rouzault \"","divers":"Deux Châteaux à Plédran; Craffault grav-3-4  et Belleville grav -1-2.                                             Belleville                                                           GPS : 48° 26' 48\" Nord, 2° 44' 41\" Ouest    GPS : 48° 26' 48\" Nord, 2° 44' 41\" Ouest                                       Craffault GPS : 48° 26' 49\" Nord, 2° 47' 05\" OuestT","gps":"48° 26' 48\" Nord, 2° 44' 41\" Ouest    GPS : 48° 26' 48\" Nord","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9dran_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9dran_2.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9dran_3.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9dran_4.jpg"]},"Consult_chateau_formulaire26fa":{"id":"Consult_chateau_formulaire26fa","dept":"22","canton":"Plénée-Jugon","commune":"Plédéliac","nom":"Plédéliac","type":"Château","periode":"XVI-XIX","histoire":"trois châteaux à Plédéliac; Grullier, st-Aubin  et Hunaudaye voir article.                                                                                                        GRUILLIER, de nos jours, il ne subsiste que d´infimes vestiges au lieu-dit le Petit Saint-Aubin, à proximité du château de Saint-Aubin construit en 1900 avec, dit-on, les matériaux de l'abbaye. La seigneurie du Guillier existait déjà au début du XVe siècle et appartenait aux du Breil.  Vers 1600, cette famille se fondit dans la famille Brunet qui possède toujours le château du Guillier.        BELOUZE, à cinq  kilomètres au sud ouest a été construit au XVIe siècle. Il est devenu aujourd'hui une ferme-auberge pédagogique. Il existe aussi à découvrir sur la commune : le Manoir de Belouze, le Château de Saint-Aubin (1900), le Château de la Hunaudaye XIIIe siècle, Classé aux M.H. et le Château du Guillier, XVIIe siècle, inscrit aux M.H.","architecture":"GRUILLIER, le château est constitué d'un corps de logis datant du XVIIe siècle et d'un pavillon en légère saillie datant du début du XVIIIe siècle, la façade postérieure donne sur un jardin à la Française. La cour d'honneur est fermée par les dépendances et deux pavillons. Moulin à vent conservé sur la rive droite du ruisseau de l'Etang du Guillier, sur la commune de Jugon-les-Lacs. Armoiries au-dessus de la porte d'entrée : Brunet et Kergu. Armoiries sur l'escalier extérieur : Brunet et Chevré. Armoiries sur le socle de la croix : non identifiées. Armoiries sur la chapelle : Brunet. La croix de l'avenue est ornée du calvaire et de la Vierge à l'Enfant, le socle est orné de saint Christophe, sainte Catherine, sainte Marguerite et saint Jean-Baptiste.Éléments protégés MH : les façades et les toitures du logis (parties XVIIe et XVIIIe siècle), de la chapelle et des dépendances du XVIIIe siècle, cour, jardin à la française, grande allée du parc : inscription par arrêté du 8 mars 1990.                                                                                 SAINT-AUBIN,  le château de Saint Aubin a été construit en 1900 (porte la date) pour la famille Palluel, à proximité de l'emplacement de l'ancienne abbaye de Saint Aubin, détruite, dont restent quelques vestiges (anciens logements). Le domaine passe en 1904 aux de Guényveau par mariage. Ce château, de plan complexe, à plusieurs corps de bâtiments, est implanté dans un vaste domaine forestier parcouru d'avenues et entouré d'un parc. Une orangerie est adossée à la façade sud du logis. Le puits possède une superstructure en ferronnerie. Communs construits en pierre et brique.\nPrésence d'une chasse à courre en terre cuite ornant le faîtage du toit réalisée dans les ateliers du village voisin de La Poterie.","habitants":"Gruillier; famille Brunet                        St-Aubin ;  famille Palluel\"","divers":"Deux châteaux à Plédéliac; Belouze grav-1  Guillier grav-2-3  St-Aubin-grav-4-5                                                                           GPS :48° 28' 22\" Nord, 2° 20' 20\" Ouest","gps":"48° 28' 22\" Nord, 2° 20' 20\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9d%c3%a9liac_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9d%c3%a9liac_2.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9d%c3%a9liac_3.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9d%c3%a9liac_4.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9d%c3%a9liac_5.jpg"]},"Consult_chateau_formulaire8d0f":{"id":"Consult_chateau_formulaire8d0f","dept":"22","canton":"Plélo","commune":"Plélo","nom":"Plélo","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Plelo ; Goêlo, Liscineuc et Beauchamp.                     GOELO, le château Goëlo, situé près d'une voie allant du Sépulcre en Plérin à Chatelaudren, doit probablement son nom aux premiers seigneurs du Goëlo qui y séjournèrent très peu de temps et l'abandonnèrent pour Chatelaudren. Le château Goëlo appartenait en 1300 à Guillaume de Mordelle et resta dans cette famille  jusqu'au XVIIIe siècle, puis passa aux familles d'Uzille, La Lande de Calan, Huyn de Kermeville. Le château actuel fut reconstruit au XVIIe siècle, il ne possède plus qu'une aile de communs, l'autre ayant été rasée vers 1940.  Éléments protégés MH : les façades et les toitures du corps de logis et des communs, la cour d'honneur: inscription par arrêté du 18 octobre 1990.\nBEAUCHAMP , du XVI-XVIIe siècle, ancienne propriété de la famille Henry de Beauchamp. Propriété de Geffroy Henry en 1543.","architecture":"LISCINEUC -Plelo du  XVII-XVIIIe siècle, ancienne propriété de la famille de Courson de Liscineuc . Propriété d'Olivier de Courson en 1536. \" 30 avril 1788.  Le comte de Courson de Lissineuc.  L'an 1798 le vingt avril au matin, devant les notaires soussignés de la juridiction du comté et baronnie de Plelo, avec soumission ; fut présent messire Jean-François Courson, chevalier, seigneur, comte de Lissineuc, demeurant en son château de Lissineuc, paroisse de Plelo, lequel a donné et délaissé, à titre de pure et simple ferme, pour le temps et espace de neuf ans et neuf parfaites jouissances, qui commenceront à la Saint Michel prochaine, pour finir à pareil jour, les dits neuf ans accomplis et révolus, à honorables gens Vincent Allain et Marie le Dû, sa femme, de son mary, elle le requérant, bien et duement authorisée, laboureurs et ménagers, demeurants à Liffiat, en la paroisse de Plelo, présents et au dit titre de ferme accceptants. La mettairie noble de Lissineuc ou de la porte du dit lieu, consistants en logements, terres arrables et non arrables, prés et prairies, en dépendants, possédés au même titre de ferme par Guillaume le Dû et Marie Robin, sa femme, Guillaume Corbel et Perinne le Dû, la sienne, sittué à Lissineuc.En 1800, près de 500 chouans passent la nuit au château. Propriété, en 1893, de Henri de Courson de Liscineuc, commandant de l'ordre de Malte.","habitants":"Goelo; famille de Mordelle                         Luscineuc; Henri de Courson de Liscineuc Beauchamp ; famille Henry de Beauchamp\"","divers":"Trois châteaux à Plelo ; Goêlo grav-2, Liscineuc grav-3 et Beauchamp grav-1.","gps":"","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9lo_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9lo_2.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9lo_3.jpg"]},"Consult_chateau_formulaire5688":{"id":"Consult_chateau_formulaire5688","dept":"22","canton":"Loudéac","commune":"Plémet","nom":"Plémet","type":"Château","periode":"XVII-XIX","histoire":"trois châteaux à Plémet; Bodiffé , Launay-guen  et Vaublanc \n BODIFFE, ancien domaine noble, devenu sanatorium , le domaine est acheté à la famille Fauquemont en 1929 par le département pour en faire un sanatorium. Édifice de plan en H symétrique, double en profondeur. Château composé d'un étage carré et un étage de comble, avec toit en ardoise logement et communs avec toit en tuile mécanique ; communs construits en brique, moellons de granite, pierre reconstituée. Sur le linteau de la porte d'entrée et les lucarnes, armoiries non identifiées.                                                   LAUNAY-GUEN, château  construit au cours du troisième quart du XIXe siècle pour la famille Mottin de la Balme, dans le style néo-gothique. Édifice de plan allongé dont le corps central est accosté de nombreux pavillons, tours circulaires et tourelles formant des saillies irrégulières. La façade nord comporte une importante tour circulaire centrale, au côté de laquelle se trouve l'entrée principale du logis. La façade sud, plus simple, est accostée d'une autre tour circulaire sur l'angle est, tandis que le pavillon ouest est flanqué de deux échauguettes. Une loggia formée de trois arcades et surmontée d'une terrasse se prolonge par un escalier descendant sur le jardin.  Nathalie et Brendan Cornec sont les nouveaux  propriétaires.","architecture":"BODIFFE,   Le Château est de style Louis XV  Louis XVI. Les architectes étaient Freine et Tournon. La construction du château de Bodiffé date du début du XIXe et XXe siècle. Il est de style néo-gothique. ; le château fut reconstruit à la fin du XIXe siècle, sans doute pour les Laine ; remanié au début du XXe siècle dans un style éclectique, une tour centrale à haut toit en pavillon ayant été ajouté. Le 10/07/1933, sera construit puis ouvert un sanatorium. Il a la forme d'un immense paquebot.   Le château de Bodifé sera aménagé pour recevoir les services administratifs et les appartements du médecin-directeur (docteur Faget) et du médecin-adjoint.  Le Sanatorium de Bodiffé accueillera des réfugiés. Le château de Bodiffé possède un toit en ardoise, un logement et des communs avec un toit en tuile mécanique. Les communs furent construits en brique, les moellons de granite, et de pierre reconstituée. Aujourd'hui, les 2 sanatoriums ont été transformés, en centres spécialisés dans la rééducation et la réadaptation fonctionnelle.                                                                                                                         Du VAUBLANC, le château du Vaublanc est construit en 1675 ainsi que les premières forges. Au début du XVIIIe siècle, le site prend son extension maximale. En 1751, le logis est remanié et agrandi. En 1809, une première chapelle est construite suivie en 1866 d'une seconde. Une maison dite la cantine est construite en 1821. En 1862, on construit la maison des commis du haut fourneau, comme le chenil construit à la même époque. Château en moellons de schiste avec toit à longs pans brisés et croupe, toit à longs pans et pignon couvert, élévation à travées ; laminoir couvert d'un toit à longs pans et croupe ; le chenil et la maison des commis sont construits en brique. Le haut fourneau, la forge, des logements ouvriers et des bâtiments de service ont disparu à la fin du XIXe siècle.","habitants":"Bodiffé; famille Fauquemont                      Launay ;famille Mottin de la Balme\"","divers":"trois châteaux à Plémet; Bodiffé grav 1-2  grav 3-4-5 , Launay-Guen  et Vaublanc grav-6                    Bodiffé    GPS : 48° 10' 40\" Nord, 2° 35' 37\" Ouest","gps":"48° 10' 40\" Nord, 2° 35' 37\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9met_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9met_2.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9met_3.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9met_4.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9met_5.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9met_6.jpg"]},"Consult_chateau_formulaire1942-2":{"id":"Consult_chateau_formulaire1942-2","dept":"22","canton":"Pléneuf-Val-André","commune":"Pléneuf-Val-André","nom":"Pléneuf_Val_André","type":"Château","periode":"XIX","histoire":"Deux châteaux à Pleneuf Val-André celui du Cloitre  et de Nantois.                           CLOÏTRE, château pourvu d'un environnement architectural exceptionnel, construit sur l'emplacement d'un ancien château rattaché à la seigneurie du Guémadeuc. Il a été édifié au cours des années 1850 pour Armand-Pierre Juloux. Vendu au comte Louis-Charles d'Aubert en 1860, le château, dont le nom semble évoquer le souvenir d'une présence monastique, fut cédé aux familles Le Gac de Lansalut en 1904, puis Le Meunier des Grands-Moulins en 1912. Il subsiste sur le site, à l'entrée du parc, d'anciennes écuries datant de la fin du XVIIIe siècle. Château à trois corps de bâtiments construit sur un plan symétrique en H  au coeur d'un vaste parc arboré, est composé d'un bâtiment de type ternaire flanqué de deux ailes latérales en retour d'équerre ouvertes d'une porte à l'arrière. Portique à l'avant soutenu par des poteaux en fonte ornés d'un décor végétal. Anciennes écuries de plan rectangulaire allongé, couverte d'un toit en croupe et ouverte à l'est de six portes charretières en plein cintre disposées de part et d'autre d'une porte charretière centrale, à arc en anse de panier.","architecture":"NANTOIS,   château relevant autrefois de la châtellenie de Lamballe. Corps de logis et partie agricole construits dans la deuxième moitié du XVIIe siècle pour Charles de La Goublaye, ainsi qu'une autre partie agricole et une conciergerie datant de la fin du XIXe siècle. La propriété présente deux chapelles datant du XIXe siècle. Situé dans un environnement naturel et architectural exceptionnel, le château et les parties agricoles forment un plan général en U. Une cour, ouverte au sud, est précédée d'une longue avenue autrefois bordée de hêtres. Une conciergerie commande l'accès au site. Le corps de logis, dont le gros-oeuvre est couvert d'un enduit, est construit sur un plan rectangulaire allongé. Il comprend une tour d'escalier centrale, de section carrée, à quatre étages, coiffée d'un toit à l'impérial, flanquée de part et d'autre de deux ailes latérales basses à deux pièces par étage séparées par un mur de refend montant de fond en comble. La partie de gauche est également flanquée d'une aile latérale plus basse. La chapelle Notre-Dame-de-Toutes-Aides fut reconstruite dans un style néo gothique au XIXe siècle.","habitants":"seigneurie du Guémadeuc.                      Nantois ;Famille  Charles de La Goublaye\"","divers":"Deux châteaux à Pleneuf Val-André celui du Cloitre grav-2  et de Nantois grav-1.","gps":"","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9neuf_Val_Andr%c3%a9_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9neuf_Val_Andr%c3%a9_2.jpg"]},"Consult_chateau_formulaire38b4":{"id":"Consult_chateau_formulaire38b4","dept":"22","canton":"plénée-Jugon","commune":"plénée-Jugon","nom":"Plénée_Jugon","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Deux châteaux à Plénée-Jugon; la Moussaie et st-Riveul.\nMOUSSAIE, mentionné dès le XIIIe siècle, à la famille de La Moussaye, château-fort construit à la fin du XVIe siècle pour Charles Gouyon, dont il ne reste que le soubassement et le système de douves,  fut un foyer de protestantisme. En 1615, le domaine fut érigé en marquisat. Le nouveau logis a été construit vers 1860 ; l'architecte rennais Martenot pourrait être l'auteur de cette reconstruction. Il succède à un logis du XVIIe siècle détruit dont reste un unique vestige : la porte à fronton placée dans la cour ; ce logis est représenté dans un document de 1840 et se décrit ainsi : plan symétrique avec avant-corps à bossages, à un étage, toit à croupes sur chaque corps. Ancien colombier détruit après 1976. Les moulins et leurs étangs qui figurent au cadatre de 1837, dont la construction datait de la fin du XVIe siècle, sont détruits. Château fort de plan rectangulaire avec tours défensives sur les angles entourées de douves sèches. Accès par le côté nord, accès secondaire par l'ouest. Logis de plan régulier à corps central à 2 étages et toit en carène, occupant le côté sud de la cour intérieure. Les pavillons du côté cour ont également un toit en carène et 2 étages.Toit en ardoise à plan régulier, étages sous-sol, 1 étage carré, 2 étages carrés, couvertures toit à longs pans, toit en carène  pignon couvert en croupe. Il appartient à la marquise de la Motte de Broons de Vauvert.","architecture":"St-RIVEUL, château construit au deuxième quart du XVIIIe siècle (porte la date 1728), succédant à un manoir du XVIe siècle partiellement conservé: escalier et les murs adjacents. Colombier détruit. Moulin détruit mentionné en 1866, visible sur la cadastre ancien qui mentionne une métairie. Château construit à proximité du bourg de Plénée Jugon, l'avenue principale de la demeure est actuellement bordée de lotissements modernes. Cour fermée par deux ailes latérales de dépendances et par des douves alimentées par le ruisseau de Saint-Riveul sur lequel était implanté un moulin à dérivation. Logis de plan en H construit autour d'un noyau ancien comprenant l'escalier en vis sans jour.\nLe château est en ruine, totalement délaissé, une tentative de restauration ayant avorté au cours des années 1980. A cette date (1998), le château, en mauvais état et menacé, est la propriété de Madame la marquise de La Moussaye.","habitants":"famille de La Marquise de la Moussaye\"","divers":"Deux châteaux à Plénée-Jugon; la Moussaie grav 1_2 et St-Riveul grav 3.","gps":"","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9n%c3%a9e_Jugon_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9n%c3%a9e_Jugon_2.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9n%c3%a9e_Jugon_3.jpg"]},"Consult_chateau_formulairea9cb":{"id":"Consult_chateau_formulairea9cb","dept":"22","canton":"Pléneuf-Val-André","commune":"Plévenon","nom":"Plévenon_Latte","type":"Fort-Château","periode":"XIV-XVII","histoire":"Deux châteaux à Plevenon; Fort la Latte et Meurtel.                           FORT LA LATTE, fut édifié au XIVe siècle par le seigneur de Martignon, Étienne III Gouyon. Sa construction commença dans les années 1340, le donjon date des années 1365-1370. En 1379, suite au retour d'exil du duc de Bretagne Jean IV, il fut assiégé par Bertrand Du Guesclin. Il est attaqué et pris une seconde fois lors des guerres de Religion au XVIe siècle, cette défaite marquant un temps d'abandon du château. Ce n'est qu'au XVIIIe siècle, sous Louis XIV, que le château-fort reprend son intérêt stratégique et est bastionné. Il servira jusqu'à la fin du Premier Empire où l'évolution des techniques militaires conduisit à son inadaptabilité. À partir de 1892, il fut vendu à divers propriétaires privés avant d'être acheté par un passionné en 1931 la famille Joüon des Longrais qui entreprit de lourds travaux de restauration qui s'achevèrent dans les années 1950. Le fort est muni de deux châtelets, l'un s'ouvrant sur la barbacane, l'autre sur la cour du château: chacun possède son pont-levis. Dans la cour, on retrouve une citerne d'eau, une chapelle, les différents moyens défensifs et le donjon.\nÉléments protégés MH : le fort : classement par décret du 11 août 1925. Les terrains avoisinant le fort, pour leur partie délimitée par l'enclos : classement par arrêté du 28 février 1934.","architecture":"MURTEL   comprend un corps de logis datant du XVIIe siècle, le corps de logis a été construit en 1766 pour Gilles Labbé et son épouse Jacquemine Goyon. L'analyse architecturale, effectuée à partir du croquis du Vicomte Henri Frotier de La Messelière semble indiquer une campagne d'agrandissement au XVIIIe siècle vers la gauche. Meurtel, avec colombier et chapelle dédiée à sainte Barbe (XVIIe et XVIIIe siècle). Propriété de la famille de Tréméreuc du XVIIe siècle au début du XXe siècle, passe par alliance à la famille Grout de Beauvais du Meurtel qui le conserve jusqu'en 1922. Moyenne justice en 1780. C'est aujourd'hui la résidence privée de la famille Large-Chuzeville.    Il semblerait qu'une campagne d'agrandissement fut réalisée au XVIIIe siècle vers la gauche. Le château comprend un grand corps de logis de plan rectangulaire allongé coiffé d'un toit à croupes. Composé d'un sous-sol semi-enterré, d'un rez-de-chaussée surélevé, d'un étage carré et d'un comble ajouré de lucarnes (à fronton circulaire à gauche et à linteau cintré à droite), il est divisé par trois ou quatre murs de refend montant de fond en comble. L'élévation comprend sept travées de baies, régulières dans les parties gauche et centrale, irrégulières et incomplètes dans la partie droite. Un escalier extérieur droit, plaqué contre la façade, dessert la porte d'entrée. Eléments de décor : épis de faîtage, croupe, lucarnes, corniche à modillons régnant sur la façade. La chapelle est, selon René Couffon, un bâtiment de plan rectangulaire avec chevet à pans coupés.","habitants":"Fort; famille Joüon des Longrais                               Murtel; famille de Tréméreuc\"","divers":"Deux châteaux à Plevenon  ;Fort la Latte et Meurtel grav-6.                                         Fort GPS : 48° 40' 06\" Nord, 2° 17' 05\" Ouest","gps":"48° 40' 06\" Nord, 2° 17' 05\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pl%c3%a9venon_Latte_1.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9venon_Latte_2.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9venon_Latte_3.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9venon_Latte_4.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9venon_Latte_5.jpg","../../jctruffet.com/image/image_22/22_Pl%c3%a9venon_Latte_6.jpg"]},"Consult_chateau_formulaireb085":{"id":"Consult_chateau_formulaireb085","dept":"22","canton":"Tréguier","commune":"Pommerit-Jaudry","nom":"Pommerit_Jaudry","type":"Château","periode":"XIV-XVII-XIX","histoire":"Deux châteaux à Pommerit-Jaudry le Chef du Bois et Kermezen.    CHEF-du-BOIS, château construit en 1867 sur l'emplacement de l'ancien manoir du Plessis, jadis, la seigneurie de Chef-du-Bois s'étendait jusqu'aux paroisses de Pommerit-Jaudy, La Roche-Derrien, Langoat et Prat.  En 1794, le Chef-du-Bois a été vendu comme bien national au rochois Charles Le Roux, Président du Tribunal Criminel des Côtes-d'Armor, qui condamnât à mort Ursule Taupin, commerçante à Tréguier et les deux prêtres réfractaires, à qui elle avait donné asile. Charles Le Roux sera assassiné 2 ans, plus tard. Le pigeonnier conserve une partie des boulins d'origine. Le manoir du Chef-du-Bois, en breton Penn ar C'hoad, a été reconstruit en 1867. La propriété appartient à M. Le Provost de Launay au début du XXe siècle. De nombreuses dépendances ont été construites dans le parc. Le 2 janvier 1962, le domaine du Chef-du-Bois est racheté à Madame de Boisanger par l'abbé Michel Commault et l'abbé Briens, au nom du Syndicat de l'Enseignement Agricole, pour y installer une école d'agriculture. Edifice de plan allongé et symétrique, composé d'un corps principal rectangulaire de sept travées, encadré de deux pavillons latéraux étroits d'une travée et de deux ailes de quatre travées dans le même alignement. Le corps principal est marqué par la saillie d'un avant-corps central surmonté d'un fronton et d'un lanternon, le site accueille aujourd'hui une école d'agriculture.","architecture":"KERMEZEN, le château de Kermezen a été construit à lemplacement dun manoir du XIIIe siècle dont il demeure encore quelques vestiges en particulier la tour qui date du XIVe siècle. La façade du château a fait lobjet dune rénovation au XVIIe siècle. De nombreuses fenêtres ont été ajoutées lors dune restauration au cours du XIXe siècle. La famille de Kermel occupe le château depuis très longtemps, au moins depuis 1624, lorsque le chevalier Godeffroy de Kermel fonde la chapellenie de Sainte Marguerite dans l'église de la Trinité, à Brélévénez. Cette maison a fourni deux pages du Roi en 1754 et 1775 et un capitaine de la bataille de Saint- Cast en 1758. Une petite chapelle, dans laquelle sont inhumés tous les descendants de Kermel, jouxte le château, chambres d'hôtes, salle pour séminaires et réceptions. propriété du comte de Kermel.","habitants":"Chef; Charles Le Roux    Kermezen; famille de Kermel \"","divers":"Deux châteaux à Pommerit-Jaudry le Chef du Bois grav-5- et Kermezen grav-1-2-3-4.  Chef GPS : 48° 43' 58\" Nord, 3° 14' 27\" Ouest","gps":"48° 43' 58\" Nord, 3° 14' 27\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pommerit_Jaudry_1.jpg","../../jctruffet.com/image/image_22/22_Pommerit_Jaudry_2.jpg","../../jctruffet.com/image/image_22/22_Pommerit_Jaudry_3.jpg","../../jctruffet.com/image/image_22/22_Pommerit_Jaudry_4.jpg","../../jctruffet.com/image/image_22/22_Pommerit_Jaudry_5.jpg"]},"Consult_chateau_formulaire5d04":{"id":"Consult_chateau_formulaire5d04","dept":"22","canton":"Guingamp","commune":"Pommerit le Vicomte","nom":"Pommerit_Vicomte","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Deux  châteaux à Pommerit le Vicomte : Cosquer,Restmeur et Kerbic. RESTMEUR, un certain De La Lande fut seigneur du Restmeur. La construction du château date du XVIIIe siècle. Il fut un manoir typiquement breton du XVe siècle acheté en 1724 par Jean de La Monneraie, Grand Prévost de Bretagne. Cette propriété, très importante, s'étendait sur 5 communes. Elle restera dans la même famille jusqu'en 1803. Jean de la Monneraie construsit les écuries en 1730, son fils détruisit le manoir à partir de 1755 pour construire une première version Louis XV du château, la chapelle Notre-Dame du Restmeur, le pavillon du chapelain et le pavillon des invités. Son petit-fils Jean Dimas entreprit des travaux d'amélioration sur la façade sud en 1788 qui se terminèrent en 1790. Aujourd'hui Le Restmeur est un ensemble très harmonieux du XVIIIe siècle présentant les principaux styles du siècle des Lumières, en cours de restauration depuis 1985 par Jean Baptiste et Christine de Bellescize. L'ensemble, avec le parc, est partiellement inscrit au titre de M.H.e depuis 1997 est ouvert à la visite publique l'été.                                                                                                                KERBIC, acquis au XVIIe siècle par les Raison, il a depuis été transmis par succession passant des Raison de Kerbic aux Floyd puis La Motte Rouge et Henry de Villeneuve. L'édifice a été remanié et agrandi par ses propriétaires successifs aux XVIIIe et XIXe siècles. Kerbic comporte aujourd'hui un bâtiment principal exposé au Sud, encadré de deux longères formant une cour carrée. Un jardin clos de murs ayant conservé les vestiges de défenses sommaires complète l'ensemble à l'est. En 1596, Gilles Chaillou, seigneur de Kermouster en Pommerit-le-Vicomte acquiert quelques pièces de terre situées près du manoir de Kerbic. Vers 1647, Claude Chaillou, fille du seigneur de Kermouster, épouse Jean Raison.                           COSQUER, du XVIIe siècle, chambres d'hôtes.","architecture":"RESTMEUR; il fut la propriété de la famille de La Monneraye (de 1723), de Mme de Boissard (en 1803), d'Amédée de Kergariou, de la Baronne de Lespinasse (en 1824), du Marquis de Keroüartz (en 1871) et des Bellescize depuis 1985. Il y eut une bataille entre les Chouans et les Républicain au Restmeur en 1800 qui fit 4 morts (Les Chouans étaient commandés par Taupin, ancien valet de chambre de l'évêque de Tréguier). Le 10 mai 1944, quatre jeunes résistants étaient à la ferme du Restmeur quand les Allemands arrivèrent. Le gardien du château, les ayant aperçus, courut les prévenir. Ils s'enfuirent dans le bois. L'un d'entre eux, Henri Corbel, 22 ans, craignant de compromettre les fermiers, revint chercher son pistolet, oublié sur la table. En s'échappant de nouveau il fut blessé à la jambe, interrogé sur place, torturé et exécuté, une heure plus tard. Le lendemain, le 11/05/1944, une grande Croix de Lorraine fut déposée sur le perron de la chapelle du Restmeur où le recteur de Pommerit célébra la messe devant tout le village rassemblé.                                                                                                                  KERBIC en 1666, Jean Raison fait aveu pour la terre de Kerbic à Messire Henri Gouyon, seigneur Marquis de la Moussaye, comte de Quintin et de Pommerit-le-Vicomte. Cet aveu porte « droit de colombier et de fuie, de banc en la chapelle du Paradis du côté de l'épître, avec armes à la vitre et d'un banc et chapelle en l'église de Pommerit-le-Vicomte du côté de l'évangile près de celui du Rumeur avec armes à la vitre et au mur ». En 1801, Adélaïde Renée Raison de Kerbic épouse Armand Floyd de Tréguibé de la Salle. Les Floyd émigrent, du Pays de Galles en France au début du XVIIe siècle, pour fuir les persécutions anti-catholiques qui suivirent en Angleterre la conspiration des poudres en 1605. Le nouveau châtelain de Kerbic fut adjoint au maire de Pommerit-le-Vicomte le 12/08/1809, puis Conseiller d'arrondissement et Maire de la commune, jusqu'à son décès. Sans enfant, Adolphe de Floyd, fils du précédent, lègue Kerbic, en 1883, au Vicomte Alain de La Motte Rouge, neveu de son épouse. Sa fille Yvonne de La Motte Rouge épouse Jacques Henry de Villeneuve, en 1924.","habitants":"Restmeur ; Famille de   Jean de La Monneraie   Kerbic; famille de  Gilles Chaillou\"","divers":"Deux châteaux Restmeur  grav-1  et Kerbic  grav-2   Cosquer                                                            GPS : 48° 37' 12\" Nord 3° 05' 14\" Ouest                                               Restmeur GPS : 48° 37' 37\" Nord, 3° 06' 54\" Ouest","gps":"48° 37' 12\" Nord 3° 05' 14\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pommerit_Vicomte_1.jpg","../../jctruffet.com/image/image_22/22_Pommerit_Vicomte_2.jpg","../../jctruffet.com/image/image_22/22_Pommerit_Vicomte_3.jpg"]},"Consult_chateau_formulaire94b1":{"id":"Consult_chateau_formulaire94b1","dept":"22","canton":"Plouha","commune":"Tréveneuc","nom":"Pommorio","type":"Château","periode":"XIV-XV-XVIII-XIX","histoire":"POMMORIO, l'origine de la famille Chrestien de Tréveneuc remonte jusqu'en 1248 à Hervé Chrestien qui participa aux croisades sous Louis IX en armant un navire destiné à transporter les croisés. De ce fait, on retrouve les armoiries de la famille dans la Salle des Croisades du château de Versailles. Puis, Guy Chrestien au XIVe siècle, fut un des trois généraux des finances, trésorier du Roi Charles VI. C'est un peu plus tard en 1430 que débute l'histoire de Pommorio. Pierre Chrestien (époux de Guillemette de la Motte-Rouge) fit bâtir le château de Pommorio. Château fort situé dans le bois actuel dont il reste les vestiges d'une tour et des lavoirs. Le château actuel quant à lui a été construit entre 1780 et 1790 par Jean-Baptiste René Chrestien, comte de Tréveneuc, marié à Julie Charpentier de Lenvos. Le château du Pommorio comprend un corps de logis qui fut agrandi au milieu du XIXe siècle. L'entrée du château est située face à l'église paroissiale de Tréveneuc, une longue allée donne accès à une cour intérieure dont l'entrée est matérialisée par un portail précédé de fausses douves. Le jardin de Pommorio est vaste; c'est un carré long divisé en deux parties, dont la première forme terrasse. Il est entretenu avec soin et renferme quelques arbustes et quelques fleurs rares; néanmoins il est plutôt disposé en jardin potager qu'en jardin d'agrément.","architecture":"POMMORIO, c'est en 1430 que débuta l'histoire de Pommorio. Pierre Chrestien, fit bâtir le château de Pommorio, château fort situé dans le bois actuel dont il reste les vestiges d'une tour et ses lavoirs. Le château de Pommerio actuel, quant à lui, a été construit entre 1780 et 1790, pour Jean-Baptiste René Chrestien, comte de Tréveneuc, marié à Julie Charpentier de Lenvos. Le dernier du nom, Henri Charles Marie Chrestien de Tréveneuc (1894-1915) ayant habité à Pommorio était sous-lieutenant au sein du 48ème Régiment d'Infanterie lors de la première guerre mondiale, est mort pour la France à Arras le 21 Juin 1915. Le propriétaire du château de Pommorio est la famille Espivent de la Villesboisnet.  Château de type ternaire à neuf travées, comprenant quatre pièces au rez-de-chaussée et une cage d'escalier centrale enfermant un escalier tournant à retours. Il est composé d'un corps de bâtiment principal à cinq travées, avec travée centrale affirmée par un fronton triangulaire orné des armes des commanditaires, et de deux corps de bâtiments latéraux légèrement saillants à l'avant et à l'arrière. Il est ouvert sur les quatre côtés et présente une tour demi-hors-oeuvre sur l'élévation postérieure.","habitants":"Famille de Pierre Chrestien\"","divers":"Château de Pommorio à Tréveneuc.                                                             GPS : 48° 39' 52\" Nord, 2° 52' 08\" Ouest","gps":"48° 39' 52\" Nord, 2° 52' 08\" Ouest","images":["../../jctruffet.com/image/image_22/22_Pommorio_1.jpg","../../jctruffet.com/image/image_22/22_Pommorio_2.jpg"]},"Consult_chateau_formulaire2ec6":{"id":"Consult_chateau_formulaire2ec6","dept":"22","canton":"Guerlédan","commune":"Saint-Gilles Vieux Marché","nom":"Quellenec","type":"Château","periode":"XVIII","histoire":"QUELLENEC, siège d'une seigneurie depuis le XVe siècle, le château du Quellennec appartient depuis le XVIIIe siècle à la famille de Keranflec'h. Au XIXe siècle, Charles de Keranflec'h devient maire de Saint Gilles Vieux Marché et s'illustre par des recherches archéologiques.","architecture":"QUELLENEC, il est  le commanditaire de la restauration du château dans la deuxième moitié du XIXe siècle, le corps central est augmenté par deux ailes latérales. L'agrandissement et le rhabillage du château du Quellenec témoignent d'un réel souci archéologique et d'une forte volonté d'homogénéité dans la conception de la restauration d'ensemble. Il illustre le phénomène fréquent dans la région de castellisation des manoirs féodaux.","habitants":"famille de Keranflec'h. \"","divers":"Château de Quellenec à St-Gilles Vieux-Marché","gps":"","images":["../../jctruffet.com/image/image_22/22_Quellenec_1.jpg","../../jctruffet.com/image/image_22/22_Quellenec_2.jpg","../../jctruffet.com/image/image_22/22_Quellenec_3.jpg"]},"Consult_chateau_formulaire3ac9":{"id":"Consult_chateau_formulaire3ac9","dept":"22","canton":"Plaintel","commune":"Quessoy","nom":"Quessoy","type":"Château","periode":"XVI-XVII-XIX","histoire":"Trois châteaux au Quessoy; Bogar, Fontaine-St-Père et Ville-Davy. BOGAR, le château de Bogar est le berceau de la famille du même nom, dont l'origine remonte au XIIIe siècle. Au début du XVIIe siècle, la terre passa à la famille Le Metayer, puis aux de la Noue, famille connue par une succession ininterrompue de conseillers au Parlement. Le château est constitué d'un pavillon au sud, vestige de constructions de la fin du XVIe siècle, d'un corps de bâtiment du XVIIIe siècle. Les communs les plus anciens datent de 1656. Du côté Est subsistent les formes et allées d'un jardin au tracé romantique réalisé au début du XIXe siècle. Jardin d'inspiration maçonnique, jardin de la sensibilité, terrasses médiévales. Perspectives d'environ 800 mètres de long. Etang, Houx bicentenaire aussi haut que le château. Éléments protégés MH : les façades et les toitures du logis et des communs du XVIIe et XVIIIe siècles, le grand et le petit salons: inscription par arrêté du 2 mars 1990.                                                 FONTAINE-ST-PÈRE, domaine composé d'un logis daté de 1773, greffé sur un ancien manoir et qui forme une aile en retour. Le château possède deux étages carrés et un logis sous combles. Le logis du XVIIIe siècle a conservé l'essentiel de son décor de boiseries. Un second manoir, dit \"le couvent\", se situe au sud du château, avec une façade reprise en 1667. L'ancien verger s'étend à l'est, et le potager au nord.  Éléments protégés MH : le logis du XVIIIe siècle, le corps de bâtiment le liant à l'ancien manoir, en totalité; les façades et les toitures de l'aile en retour du logis principal, de l'ancien manoir dit \"Le Couvent\", de la bergerie et du pressoir ; les sols du jardin sud, de la cour, du verger et du potager avec leurs portails et les murs de clôture : inscription par arrêté du 22 mars 2002.","architecture":"BOGAR, logis classique, est constitué d'un pavillon au Sud, vestige de constructions de la fin du XVIIIe siècle, d'un corps de bâtiment du XVIe siècle. Les communs les plus anciens du château de Bogar datent de 1656. Du côté Est, subsistent les formes et allées d'un jardin, au tracé romantique, créé au début du XIXe siècle. Le commanditaire  Guillaume de la Noue conseiller au parlement de Bretagne avait épousé en 1776  Félécité Meslé de Grandclos  fille  d'un riche armateur de saint-Malo.                                                                                                                                                                                                                                            VILLE-DAVY, le château de la Ville-Davy a été construit autour de 1870 pour Eustache Guérin de la Houssaye. Vendu aux enchères dès 1884 la demeure accueille les soeurs du Plessis de Grenedan qui réalisent un parc et apportent quelques aménagements architecturaux. Il est transformé en école d'agriculture en 1955. Edifice de plan allongé et symétrique, composé d'un corps principal rectangulaire à cinq travées encadré de deux pavillons latéraux étroits (une travée) en léger retrait. La travée centrale est surmontée d'un pavillon avec étage d'attique. La façade sur jardin est précédée d'une vaste terrasse accessible par une volée d'escalier. Elévation en maçonnerie enduite avec encadrement de baies, chaînes d'angle et bandeaux en pierre de taille. Édifice au parti de composition préservé. Intérieur remanié.","habitants":"Bogar; famille Le Metayer                           Ville-Davy ; Famille d'Eustache Guérin de la Houssaye\"","divers":"Trois châteaux au Quessoy; Bogar grav 1-2, Fontaine St-Père grav 3 et Ville-Davy  grav-4.                                                         Bogar, GPS : 48° 25' 19\" Nord, 2° 39' 25\" Ouest                                                                                 Davy  GPS : 48° 25' 19\" Nord, 2° 39' 25\" Ouest","gps":"48° 25' 19\" Nord, 2° 39' 25\" Ouest","images":["../../jctruffet.com/image/image_22/22_Quessoy_1.jpg","../../jctruffet.com/image/image_22/22_Quessoy_2.jpg","../../jctruffet.com/image/image_22/22_Quessoy_3.jpg","../../jctruffet.com/image/image_22/22_Quessoy_4.jpg"]},"Consult_chateau_formulaireb238":{"id":"Consult_chateau_formulaireb238","dept":"22","canton":"Plaintel","commune":"Quessoy","nom":"Quessoy_II","type":"Château","periode":"XVI-XVII-XVIII-XX","histoire":"Deux châteaux dans cet article la Houssaie,  et Roche Rousse.             La HOUSSAYE, la construction du château de la Houssaye toit à la mansart,  date du XVIIIe siècle et restauré  par monsieur de Largentaye prospriétaire actuel. Vétuste et devenu peu agréable à vivre, il sera remplacé par une nouvelle demeure, de style classique. On y accède par une grande allée qui traverse le parc. Les extérieurs se visitent l'été.  Le colombier du XVIIIe se situe près du château, est un bâtiment circulaire couvert de pierres de taille montées en encorbellement. La chapelle et l'ancien manoir réutilisé comme bâtiment agricole témoignent de l'existence d'un château antérieur. A l'intérieur, deux salons possèdent un décor de boiseries. Une salle-à-manger est décorée de lambris à moulures courbes et d'une cheminée en bois. Le château de la Houssaye se trouve dans un parc recomposé au début du XXe siècle, avec une perspective, un Jardin à la Française, un potager et un ancien verger. Appartient depuis à une société privée. Il est classé partiellement aux M.H. depuis 1982 et inscrit, en 2002.","architecture":"ROCHE ROUSS,E la construction du Manoir de la Roche-Rousse date du 4ème quart du XVIe siècle à la 1ère moitié du XVIIe siècle. C'est un ensemble fortifié construit en deux temps, de la fin XVIe au XVII siècle. Il est constitué d'un corps de logis entouré d'enceintes défensives cantonnées de tours. Différentes dépendances sont encore réparties à l'intérieur et à l'extérieur des douves (pavillon d'entrée, chapelle, pressoir, moulin). De nombreux travaux se déroulèrent au XIXe siècle, avec la disparition des tours accolées à la façade orientale du manoir. Le manoir de La Rocherousse se visite,  est inscrit depuis le 22/03/2002 aux M.H..","habitants":"Houssaye; famille de  monsieur de Largentaye \"","divers":"Deux châteaux dans cet article la Houssaie grav-2-3,  et Roche Rousse grav -1.                                                    GPS : 48° 25' 19\" Nord 2° 39' 25\" Ouest                                                           Roche GPS : 48° 25' 19\" Nord, 2° 39' 25\" Ouest","gps":"48° 25' 19\" Nord 2° 39' 25\" Ouest","images":["../../jctruffet.com/image/image_22/22_Quessoy_II_1.jpg","../../jctruffet.com/image/image_22/22_Quessoy_II_2.jpg","../../jctruffet.com/image/image_22/22_Quessoy_II_3.jpg"]},"Consult_chateau_formulaire2a12":{"id":"Consult_chateau_formulaire2a12","dept":"22","canton":"Plélo","commune":"Quintin-Foël","nom":"Quintin","type":"Forteresse","periode":"XV-XVI-XVII","histoire":"A Quintin, la forteresse de Quintin  et Toul-le-Gollet à Plécigny.                                   QUINTIN, au XIIe siècle première mention des seigneurs de Quintin. En 1638   la marquise de la Moussaie entreprend la reconstruction du château, en 1690 elle le cède à son cousin Guy de Durfort maréchal de Lorge la fille de ce dernier avait épousé le duc de Saint-Simon.  En 1695, Quintin est érigé en duché. Le château ducal est une construction inachevée datant de 1775.  L'héritière Guyonne de Durfort de Lorge épouse  René César futur duc de Praslin entreprend de transformer les bâtiments des communs en résidence de madame  de Praslin et par héritage Quintin passe aux Frottier  de Bagneux. Resté dans la famille des Choiseul passe par alliance  au Nedonchel-Courtebourne, puis en 1934 au comte Jean de Bagneux,  dont la mère , Isabelle de Polignac, était l'arrière petite fille de Guyonne de Lorgue, toujours dans la famille de Bagneux.                                                                                                          Chateau du Quartier pas d'information.","architecture":"QUINTIN, reprend le type du quadrilatère flanqué de pavillons en décrochement, ne subsiste qu'un double pavillon sur lequel s'articulent les soubassements de deux corps de bâtiment en retour d'équerre ainsi que les soubassements des autres pavillons, c'est une construction d'angle avec murs de soutènement inclinés ouverte de fenêtres et ornée de décrochés. Le soubassement, très épais, devait soutenir une construction dont seul l'angle a été terminé. Le château présente deux avant-corps peu avancés à l'ouest et un  rajout de trois ouvertures au sud. Une longue aile de dépendances se soude, commençant par un pavillon de tête à porte au fronton courbe, formant deux angles en retour. Louverture au public permet peu à peu den restaurer les jardins et les intérieurs. Visite des jardins, des salons du XVIIIe siècle, des salles dexposition et des écuries. Éléments protégés MH : les façades et les toitures du château du XVIIIe siècle, le château du XVIIe siècle avec les terrasses et le mur de soutènement, y compris la tour des Archives et les jardins: classement par arrêté du 4 novembre 1963.                                                                                         TOUL-en-GOLLET, manoir  à 10 Kilométres au nord ouest à Plecigny  pouvant être attribué à la fin du XVe ou au début du XVIe siècle. L'édifice est entièrement construit en granit et contient, comme toutes les petites gentilhommières de l'époque, deux pièces par étage et un escalier en tourelle. A l'intérieur se trouve encore des cheminées à grands manteaux et des plafonds à solives apparentes, se manoir de Toul-en-Gollet date du XVe siècle.  A plusieurs reprises, il a changé de propriétaire au cours des XVe, XVIe et XVIIe siècles. En 1764, il est devenu la propriété des Gaspern. Le manoir a subi des aménagements au cours du XVIIe siècle, il est privé. Des visites de lextérieur sont possibles pendant lété.","habitants":"la marquise de la Moussaie, famille des Choiseu                                  Toul; Familles des des Gaspern\"","divers":"A Quintin, la forteresse de Quintin grav de 1 à 7  et Toul le Gollet grav-8-9  à Plécigny                    .               GPS : 48° 24' 1O,86\" Nord, 2° 54' 31,34\" Ouest","gps":"48° 24' 1O,86\" Nord, 2° 54' 31,34\" Ouest","images":["../../jctruffet.com/image/image_22/22_Quintin_1.jpg","../../jctruffet.com/image/image_22/22_Quintin_2.jpg","../../jctruffet.com/image/image_22/22_Quintin_3.jpg","../../jctruffet.com/image/image_22/22_Quintin_4.jpg","../../jctruffet.com/image/image_22/22_Quintin_5.jpg","../../jctruffet.com/image/image_22/22_Quintin_6.jpg","../../jctruffet.com/image/image_22/22_Quintin_7.jpg","../../jctruffet.com/image/image_22/22_Quintin_8.jpg","../../jctruffet.com/image/image_22/22_Quintin_9.jpg"]},"Consult_chateau_formulaired503":{"id":"Consult_chateau_formulaired503","dept":"22","canton":"Lanvallay","commune":"Tréfumel","nom":"Rivière_Brintinaye","type":"Château","periode":"XVIII","histoire":"RIVIERE-BRINTINAYE, le château de la Rivière-Bintinaye fut recontruit, en 1751, pour Gilles-François de la Bintinaye et Marie-Anne-Angélique Champion de Cicé. Leurs armes figurent sur le fronton. Le bâtiment actuel apparaît comme le projet inachevé dune façade à la française. Les acquéreurs du domaine appartenaient à une dynastie de parlementaires : Gilles de la Bintinaye, vicomte de Rougé, exerçait la charge de greffier en chef des états de Bretagne en 1767, ce qui explique qu'avec son épouse il demeurait ordinairement en la ville de Rennes, près des Portes-Mordelaises. Le sieur Gilles-François de la Bintinaye, chef de nom et d'armes était titré sieur de la Rivière, de la Ville-David et du Verger, vicomte de Rougé. Leur fille : damoiselle Marie-Rose-Céleste de la Bintinaye, épousa par contrat du 29 mai 1781 passé au château de la Bintinaye, paroisse de Tréfumel, devant Trochu et Barthomeuf, notaires royaux, Jacques-Thomas de l'Esperonnière. Le mariage religieux fut célébré le 29 mai 1781, dans l'église de Tréfumel, au diocèse de Saint-Malo. Agathon de la Bintinaye, major des vaisseaux du Roi, il était lieutenant de du Couëdic sur la surveillance, au célèbre combat que cette frégate livra au navire anglais le Québec en 1779.","architecture":"RIVIERE-BRINTINAYE,  le chevalier Agathon-Marie-René de la Bintinaye était né à Rennes le 24 mars 1756, ayant émigré en Angleterre , au commencement de la Révolution, il se trouvait à Londres lorsque le Morning Chronicle publia sous le titre de The only privilegs the nobily valued were distinction a franck and excepton from taxes; un article calomnieux contre la noblesse française. Le chevalier de la Bintinaye indigné, le réfuta, dans une brochure qui fut accueillie avec ferveur. Il mourut à la fin du mois de décembre 1792, noyé dans la Tamise. Jean-Baptiste de la Bintinaye, fils de François et Marie-Anne-Angélique Champion naquit en 1757. Chevalier de l'Ordre de Malte, il fut admis, avec le précédent à monter dans les carrosses du Roi, le 4 juin 1785, il mourut cinq ans plus tard. Augustin, vicomte de la Bintinaye, hérita, en 1810, de Mgr Jérôme Champion, comte de Cicé, archevêque d'Aix, son oncle, dernier représentant de cette antique famille qui lui légua tous ses biens, titres et propriétés. Cette famille de la Bintinaye donna un maire à la commune de Tréfumel, elle était encore présente à la Rivière-Bintinaye au début du XXe siècle où elle était représentée par Anathole de la Bintinaye. Le château de la Rivière-Bintinaye a été reconstruit pour Gilles François de La Bintinay, vicomte de Rougé au XVIIIe siècle. Ce projet ne fut que partiellement réalisé et pendant plus d'un siècle, le nouveau château de la Rivière-Bintinaye, seulement construit aux deux-tiers cohabita pendant près de deux siècles avec les restes de l'ancien manoir des XVe et XVIe siècles que caractérisait la silhouette d'un massif pavillon carré surmonté d'une haute toiture.","habitants":"Gilles-François de la Bintinaye\"","divers":"Rivière-Brintinaye  à Tréfumel                GPS : 48° 20' 20\" Nord, 2° 01' 29\" Ouest","gps":"48° 20' 20\" Nord, 2° 01' 29\" Ouest","images":["../../jctruffet.com/image/image_22/22_Rivi%c3%a8re_Brintinaye_1.jpg"]},"Consult_chateau_formulaire25e5":{"id":"Consult_chateau_formulaire25e5","dept":"22","canton":"Plélo","commune":"Quintin-Foël","nom":"Robien","type":"Château","periode":"XVI-XVIII","histoire":"ROBIEN,  est peu connu des Costarmoricains. La dernière des Robien avait épousè Jacques de Goutheron vicomte de Plaintel,  en 1566 les Goutheron hérite de Robien. Après la mort  du président Robien c'est son fils Paul-Céleste qui poursuit les travaux.  Vendu comme bien d'émigré à la Révolution et acquis par un couvreur de Saint-Brieuc.  Au début du XVIIe siècle, il fut la propriété de Philippe de Coulanges, grand-père de Mme de Sévigné en 1833 retour des Robien au château Paul-Jean.  Marie de Robien le lègue à son neveu Paul Frédéric  dont les descendants le possède toujours . Siège de la famille de Robien depuis 800 ans, le château est bien en passe de changer de mains. L'édifice, inscrit aux M.H. en 1946, a été reconstruit au XVIIIe siècle. Saccagé à la Révolution et vendu comme bien national, il fut racheté par un ancien serviteur de la Famille de Robien et rendu à celle-ci à son retour d'émigration. L'héritière actuelle est l'une des quatre filles du Marquis Paul VII de Robien (1897-1965), qui fut longtemps Maire du Foeil,  c'était une belle famille, et la marquise de Robien, qui a survécu longtemps à son mari, était une dame très simple, a déclaré un habitant de Quintin.","architecture":"ROBIEN, le château date du XVIIIe siècle. Il se montre furtivement depuis la D790, mais disparaît quand on s'en approche, tel un mirage.   Le château actuel, achevé peu avant la Révolution, est le troisième élevé par la famille de Robien sur les terres qu'elle occupe depuis 1212. Confisqué comme bien d'émigré, puis vendu à la Révolution, le château fut saccagé. Racheté par un ancien serviteur de la famille et rendu à celle-ci, il fut restauré vers 1860. La chapelle ruinée du XVe siècle fut détruite pendant les jours de la Ligue. Une chapelle datant du XVIIIe siècle est accolée au château. Les grandes écuries datent de la même époque. Au centre de l'édifice, un pavillon de forme semi-circulaire forme avant corps. De part et d'autre, trois travées de baies en arc surbaissé sont collées par deux pavillons formant également avant-corps et comprennent chacune deux fenêtres en plein cintre à l'étage.  Éléments protégés MH : le château, le bâtiment des écuries, l'ancienne chapelle et le parc comprenant les parcelles cadastrales suivantes : Bois de Robien, grande allée et grande avenue, bois de Sainte-Anne : inscription par arrêté du 5 septembre 1946.","habitants":"Philippe de Coulanges\"","divers":"Château de Robien à Quintin le Foêl                        GPS : 48° 23' 13\" Nord, 2° 55' 36\" Ouest","gps":"48° 23' 13\" Nord, 2° 55' 36\" Ouest","images":["../../jctruffet.com/image/image_22/22_Robien_1.jpg"]},"Consult_chateau_formulaire1773":{"id":"Consult_chateau_formulaire1773","dept":"22","canton":"Broons","commune":"Guenroc","nom":"Roche_Guenroc","type":"Château","periode":"XIX","histoire":"La ROCHE,   château construit dans la première moitié du XIXe siècle à l'emplacement d'un ancien manoir mentionné depuis le XVe siècle. Il appartient aux Robinot de St-Cyr au XIXe siècle puis il appartient aux Tripier de Laubrière du XIXe au XXe siècle. Belle demeure néo-classique dans un ensemble (parc paysager, communs, chapelle et étang). Le château de plan carré est attribuable à l'architecte Louis Richelot qui construit à cette période plusieurs châteaux aux environs de Rennes. Les deux façades ordonnancées sont toutefois différenciées, la façade nord correspondant à l'entrée présente au premier étage de son avant-corps une grande serlienne qui contribue à l'esthétique de la façade et sert d'éclairage à la cage d´'escalier. La façade sud est marquée par un faux avant-corps qui est percé au rez-de-chaussée et au premier étage par un triplet de portes fenêtres en plein-cintre. Le large perron du rez-de-chaussée de même que le balcon du premier étage témoigne d'une volonté hédoniste de profiter du parc paysager.                                                                                                                LATTAY,  les seigneurs du Lattay qui existaient avant le XIIe siècle.  Pierre, seigneur du Lattay et président aux enquêtes au parlement de Bretagne, se maria trois fois; d'abord en 1666 avec Vincente Le Gouvello; puis en 1682 à Yolande Françoise de la Marche; sa troisième femme fut Marie Céleste Eberard. Ses enfants furent : Jean-Bertrand né en 1683, Louis Célestin; Pierre, chevalier du Lattay, mort à l'âge de 22 ans en 1708; Léonore Hélène,née en 1684. Le roi vendit à l'un des trois premiers membres de la maison de Saint-Pern qui furent seigneur du Lattay, le baillage des Mailles ou de Pestivien, qui avait cours dans les paroisses de Plumaudan, Saint Maden, Saint Juvat et Brusvily.","architecture":"La ROCHE lancien manoir est représenté en 1833 au sud de lactuel château. Bien quil sagisse dun site de bas fond le toponyme de la Roche est  dû au voisinage à lest dun site dominant appelé le Rocher. Le cadastre ancien figure à cet endroit trois pièces deau servant sans doute de viviers, lun pour lancienne métairie de la Ville Oria, lautre à lextrémité sud du jardin du manoir de la Roche lui-même et le troisième en bordure de la charmille actuelle. Lancien manoir était composé de trois bâtiments disposés en U autour dune cour fermée et comprenait à langle nord-ouest une tour ronde servant de colombier. Le château actuel de plan carré est attribuable à larchitecte Louis Richelot qui construit à cette période plusieurs châteaux aux environs de Rennes. Les deux façades ordonnancées sont toutefois différenciées, la façade nord correspondant à lentrée présente au premier étage de son avant-corps une grande serlienne qui contribue à lesthétique de la façade et sert déclairage à la cage descalier. La façade sud est marquée par un faux avant-corps qui est percé au rez-de-chaussée et au premier étage par un triplet de portes fenêtres en plein-cintre. Le large perron du rez-de-chaussée de même que le balcon du premier étage témoigne dune volonté hédoniste de profiter du parc paysager.","habitants":"Famille des  Robinot de St-Cyr\"","divers":"château de la Roche à Guenroc grav- 1-2  Lattay  grav-3                          Gps 48° 19' 05? nord, 2° 04' 26? ouest","gps":"","images":["../../jctruffet.com/image/image_22/22_Roche_Guenroc_1.jpg","../../jctruffet.com/image/image_22/22_Roche_Guenroc_2.jpg","../../jctruffet.com/image/image_22/22_Roche_Guenroc_3.jpg"]},"Consult_chateau_formulaire9f39":{"id":"Consult_chateau_formulaire9f39","dept":"22","canton":"Plestin-les-Grèves","commune":"Lanvellec","nom":"Rosanbo","type":"Forteresse","periode":"XV-XVIII","histoire":"ROSANBO, la famille Le Peletier de Rosanbo naît du mariage de la dernière des Coaskaêr; Geneviève de Coskaër de Rosanbo avec Louis Le Peletier en 1688, l'un des plus vastes domaines de Bretagne, Louis est le fils de Claude Le Peletier, ancien prévôt des Marchands de Paris, successeur de Colbert au contrôle général des finances, ministre d'Etat de Louis XIV. C'est l'union d'une noblesse bretonne de vieille souche et de l'aristocratie des parlementaires parisiens. Louis XIV autorise Louis à relever le nom de Rosanbo et à porter le titre de marquis. Il deviendra premier président du Parlement de Paris. Son petit fils Louis Le Peletier de Rosanbo épouse Marie Claire de Mesgrigny d'Aunay, petite fille du Maréchal de Vauban. Leur fils, également prénommé Louis, unit son destin à Antoinette de Lamoignon de Malesherbes, fille du ministre de Louis XVI, puis défenseur de celui-ci lors de son procès révolutionnaire. Le ménage Rosanbo sera guillotiné en 1794 dans la même charette que Malesherbes ainsi que leur fille Aline et son mari Jean-Batiste de Chateaubriand, frère ainé de l'écrivain. Leur deuxième fille Louise, épousera Hervé de Tocqueville, parents du grand historien. Leur fils Louis, rescapé de la guillotine du fait de son jeune âge, ne reviendra jamais au château de Rosanbo. Ses descendants reprendront le flambeau. Aujourd'hui, Alain, Marquis de Rosanbo, perpétue la tradition. En 1958, il a ouvert le château au public..","architecture":"ROSANBO, le château-fort de Rosanbo est transformé en gentilhommière à partir de 1683 et entouré de beaux jardins à la française. L'ensemble est composé de plusieurs corps de bâtiments d'époques diverses s'échelonnant du XVe au XIXe siècle, avec une dominante des XVIIIe et XIXe siècles. La propriété est dans la même famille depuis six siècles avec sa remarquable bibliothèque qui accueille 8000 livres. Le château est entouré d'un parc à la Française, avec une charmille voûtée parmi les plus longues de France, trois terrasses, avec vue sur la vallée du Bô, ont été redessinées par l'architecte paysagiste Achille Duchêne au début du XXe siècle.Éléments protégés MH : e château : inscription par arrêté du 22 mars 1930. Le colombier et les jardins ; le grand et le petit parc, incluant notamment l'ensemble des terrasses et la statuaire : inscription par arrêté du 20 mars 1995","habitants":"famille Le Peletier de Rosanbo\"","divers":"Château de Rosanbo à Lanvellec.GPS : 48° 37' 32,16\" Nord, 3° 33' 10,08\" Ouest","gps":"48° 37' 32,16\" Nord, 3° 33' 10,08\" Ouest","images":["../../jctruffet.com/image/image_22/22_Rosanbo_1.jpg","../../jctruffet.com/image/image_22/22_Rosanbo_2.jpg","../../jctruffet.com/image/image_22/22_Rosanbo_3.jpg","../../jctruffet.com/image/image_22/22_Rosanbo_4.jpg","../../jctruffet.com/image/image_22/22_Rosanbo_5.jpg","../../jctruffet.com/image/image_22/22_Rosanbo_6.jpg"]},"Consult_chateau_formulaire53e0":{"id":"Consult_chateau_formulaire53e0","dept":"22","canton":"Callac","commune":"Callac_Duault","nom":"Rosvilliou","type":"Château","periode":"XVI","histoire":"ROSVILLIOU, le château a été construit dans le quatrième quart du XVIe siècle et dans la deuxième moitié du XVIIIe siècle pour la partie sud. Inscription \"Maurice Bahezre, Seigneur de Kerfichant\". Le premier seigneur de Rosvillou connu est Charles Maurice Bahezre, seigneur de Kerfichant, fils de Guillaume Bahezre et de Gilette de la Boissière. Cette seigneurie de Kerfichant, relativement puissante, possédait des terres sur Duault, à Burthulet, en Plusquellec, en Botmel. Yves Bahezre, époux de Catherine Lefodivez, succède à son père Guillaume mais décède peu après en 1587, laissant à Charles Maurice, son frère la seigneurie de Kerfichant. Jeanne Fleuriot, fille puînée de Camille et de Anne Paule de la Monneraye est la dernière du nom à posséder le château de Rosviliou en Duault, après 310 années sans interruption des Bahezre aux Vendeuvre. Mariée au comte Henry le Forestier de Vendeuvre, le couple vend aux de Quelen le château de Rosviliou en 1923. Éléments protégés MH : le château de Rosvilliou : inscription par arrêté du 22 janvier 1927.","architecture":"KERASLOUANT, ancien manoir de Keraslouant ou Keranlouant du XVIe siècle. Ce fief avait une juridiction. Propriété successive des familles de Kerliviou, de la Boëssière (dont Maurice de la Boëssière, né vers 1480, et sénéchal de la seigneurie du Cludon en Plougonver) et de Cleuz du Gage (suite au mariage en 1630 de Charlotte de la Boëssière avec Jean du Cleuz, conseiller du roi .Leur fille Françoise épousa en 1657 à Rennes Sébastien de Robien (1633-1691)]. On trouve ensuite les propriétaires suivants :  famille Le Sénéchal (dont Julien Le Sénéchal, époux de Charlotte de la Boissière, fille d'Yves et de Marie du Pont) en 1682, famille Ladvenant de Kerisac (dont Paul René Ladvenant, époux de Anne Charlotte Yvonne Michel de Rézal) en 1746, de la famille Lavanant (dont Joseph Marie Jean Lavanant, époux de Marie Anne Guiot) vers 1836 .","habitants":"famille de Kerliviou\"","divers":"Callac- Grav-3   Rosvilliou  grav-1-2                                  gps 48° 24' 18? nord, 3° 25' 36? ouest","gps":"","images":["../../jctruffet.com/image/image_22/22_Rosvilliou_1.jpg","../../jctruffet.com/image/image_22/22_Rosvilliou_2.jpg","../../jctruffet.com/image/image_22/22_Rosvilliou_3.jpg"]},"Consult_chateau_formulaire9b72":{"id":"Consult_chateau_formulaire9b72","dept":"22","canton":"Saint-Brieuc","commune":"Saint-Brieuc","nom":"St_Brieuc","type":"Vestiges-Château","periode":"XIV-XIX","histoire":"Deux châteaux à st-Brieuc, Rohannec et Cesson:                             ROHANNEC, château construit à partir de 1880 par le vicomte Alain Le Gualès de Mézaubran, président des armateurs de Bretagne.  Le château a été construit sur un des promontoire, a la forme d'un rectangle, il est composé d'un corps de logis central de 3 travées et de 2 corps latéraux d'une travée chacun. Le corps central comporte 3 étages carrés, les corps latéraux, 2 seulement, au-dessus d'un rez-de-chaussée surélevé. Les toitures couvertes en terrasse avec des balustrades surmontent la corniche. Deux bow-windows en rez-de-chaussée se situent sur la façade postérieure. Le château de Rohannec est devenu la propriété du département depuis 1946. C'est devenu un lieu culturel. Le parc du hâteau de Rohannec est ouvert au Public.","architecture":"CESSON, vestiges La tour de Cesson domine l'estuaire du Gouët et la baie de Saint-Brieuc. Elle fut édifiée en 1395 sur ordre du duc de Bretagne Jean IV de Montfort. Construite à près de 70 m de hauteur sur un éperon rocheux dominant la baie, la Tour de Cesson est un site historique et archéologique. Cet emplacement stratégique est choisi afin de protéger l'embouchure du Gouët et la ville de Saint-Brieuc des attaques des pirates et d'éventuels agresseurs. D'ailleurs, différents vestiges, monnaies, ruines, fondations témoignent de l'occupation de ce lieu, notamment par les romai
