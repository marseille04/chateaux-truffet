ns ou encore les vikings. La tour permettait aussi au duc de surveiller le trafic commercial maritime. La tour a été occupée par Olivier de Clisson tandis que le Duc Jean IV la réclamait au connétable, à la suite du traité, de 1388. Elle fait partie du domaine ducal en 1423, lorsqu'elle sert de prison à Morice de Ploësquellec, et du domaine royal, au XVIe siècle (vers 1532), quand un édit réunit les juridictions de Cesson et de Goëlo, pour les transférer à Saint-Brieuc. Dès que la guerre de la Ligue commence en Bretagne, du fait de son positionnement, la tour de Cesson prend une grande importance stratégique. Elle finit par être prise en 1598 par le comte de Brissac, qui ordonne le démantèlement de la forteresse à la demande des habitants. Une partie est conservée pour servir d'amer aux navigateurs à partir de 1625. Avant la Révolution, la tour de Cesson, bâtie sur un terrain nommé la Terre du Duc, appartient au duc de Penthièvre. Vendue en 1791, elle est rachetée en 1852 par Alexandre Olivier Glais-Bizoin. Les ruines de la tour de Cesson sont classées aux M.H. depuis 1926. La Tour du Manoir de Cesson est située aujourd'hui sur un domaine privé, fermé au Public. Il ne reste qu'une tour depuis, de l'ancien château, appelée la Tour de Cesson.","habitants":"Rohannec; famille du vicomte Alain Le Gualès de Mézaubran,\"","divers":"Deux châteaux à st-Brieuc, Rohannec grav-2 et Cesson grav-1:                                       Cesson GPS : 48° 30' 49\" Nord, 2° 45' 55\" Ouest                                                                Rohannec  GPS : 48° 31' 19\" Nord, 2° 44' 48\" Ouest","gps":"48° 30' 49\" Nord, 2° 45' 55\" Ouest","images":["../../jctruffet.com/image/image_22/22_St_Brieuc_1.jpg","../../jctruffet.com/image/image_22/22_St_Brieuc_2.jpg"]},"Consult_chateau_formulaire6b87":{"id":"Consult_chateau_formulaire6b87","dept":"22","canton":"Pléneuf-Val-André","commune":"Saint-Cast-le-Guildo","nom":"St_Cast_le_Guildo","type":"Château","periode":"XV-XVI-XVIII","histoire":"Deux châteaux à st-Cast le Guildo; Ancien manoir.  Val-Darguenon et Vieux Ville.                                                                                                      ST-CAST-GUILDO, manoir transformé et agrandi d'un nouveau corps de logis par le chanoine Ribault, en 1923 comme le mentionne manoir à tour d'escalier circulaire hors-oeuvre, transformé et agrandi d'un corps de bâtiment de style néogothique.\n  VAL-d'ARGUENON  Un premier château a été construit au XVIe siècle pour Amaury Gouyon, il est incendié par les troupes anglaises en 1758. Le château est reconstruit en 1780 pour Pierre de Chateaubriand, époux de Marie Jeanne Thérèse de Brignon et oncle de l'écrivain. Avant la Révolution, la propriété comprend le château avec deux tourelles et escaliers de pierre, des dépendances, les fermes de la Porte-du-Val et de Bon-Espoir à Saint-Pôtan, et la ferme de Penguen à Saint-Cast. Durant la Révolution la demeure est saccagée par des soldats mis en garnison. Vers 1880, Monsieur de la Blanchardière, maire de Notre-Dame du Guildo, propriétaire du Val de l'Arguenon, entreprend sa restauration. Un des petits enfants dHippolyte, Georges, né en 1928, meurt accidentellement dans le parc du château, en 1987 laissant son épouse, Eliane Hay de Slade, seule face à la lourde charge que représente un château de nos jours. Aujourd'hui, c'est son fils Olivier qui gère avec son épouse, Armelle Parenteau-Denoël, les activités du château du Val de l'Arguenon. Location chambres d'hôtes.","architecture":"BOIS-BRAS, vestiges de manoir construit à la fin du XVe siècle. Dépendances et logements datant de la 2e moitié du XIXe siècle. Le manoir du Bois Bras a été édifié par la famille Bérard citée dans un minu de la paroisse de Saint-Cast en 1428. En 1699 le manoir est cité dans un aveu d'Hilaire de Bédée qui reconnaît être propriétaire \"de la maison et de la métairie du Bois Bras, consistant dans une maison et corps de logement, couverte d'ardoise, cour close et au devant avec grande et petite porte, écurie, étable, fournil et petites maisons aux deux bouts de la cour, contenant le tout ensemble huit journaux environ. A laquelle maison du Bois Bras il y a tour fuie ou retraite à pigeons.\" (Pierre Amiot). Une expertise dressée le 15 octobre 1797 indique que le manoir et ses dépendances sont en très mauvais état.                                                                                                                        VIEUX-VILLE, le château a été construit entre 1804 et 1826 pour Jean-Jérome-François Besnard, propriétaire du lieu, sur le site d'un ancien manoir construit dès le moyen-âge comme résidence principale des seigneurs de Gouyon-Beaucorps. Agrandi par la construction d'une tour d'escalier dans le premier quart XXe siècle, il est cédé à l'évêché de Saint-Brieuc en 1940, puis revendu la même année à l'inspecteur général des haras Le Harivel de Gonneville qui ajoute au corps de logis une sixième travée et entreprend plusieurs modifications dans les dépendances. Corps de logis de plan rectangulaire allongé, à double orientation, simple en profondeur, construit en schiste et en granite, comprenant un étage carré et un étage de comble. Elévation ordonnancée à six travées. Tour d'escalier hors-oeuvre à pans coupés à l'arrière. Porte et lucarnes architecturées. Maison de plan rectangulaire sur sous-sol, réunissant sous le même toit deux logis de plan massé. Etable de plan rectangulaire allongé, à porte cintrée en mur-pignon. Ecurie de plan rectangulaire, à porte et porte haute cintrées en mur-pignon.","habitants":"Val ; Pierre de Chateaubriand                     Bois ;   famille Bérard  Vieux Ville; famille de  Jean-Jérome-François Besnard\"","divers":"quatre châteaux à St-Cast le Guildo; Guildo grav-3-4 , Bois-Bras grav-1-2, Val-Darguenon  grav-5-6 et Vieux Ville grav-7-8.","gps":"","images":["../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_1.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_2.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_3.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_4.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_5.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_6.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_7.jpg","../../jctruffet.com/image/image_22/22_St_Cast_le_Guildo_8.jpg"]},"Consult_chateau_formulaire1550":{"id":"Consult_chateau_formulaire1550","dept":"22","canton":"Rostrenen","commune":"Saint-Gelven","nom":"St_Gelven","type":"Château","periode":"XII-XV-XVIII","histoire":"trois châteaux  à Saint-Gelven Abbaye, Correc et Kerdebreuil. ABBAYE BON REPOS, vestiges,  abbaye cistercienne de Bon-Repos, fondée au XIIe siècle et remaniée au XVIIIe siècle, vous accueille pour une halte réparatrice, culturelle et historique, dans un environnement protégé. Visites, expositions, résidences dartistes, événement, tout est réuni pour vous faire vivre une expérience inoubliable.                                                                                                                         CORREC, ladite seigneurie de Correc relevant du prince de Guémené, à cause de sa chastellenie de Corlay, passe au XVe siècle par alliance  de Catherine de Correc avec René-François de Suasse, petit fils d'un capitaine Espagnol au service de la duchesse Anne. Au XVIIe siècle le domaine se retransmet  par alliance à Marie-Renée de Suasse  avec Jean de cognets seigneur de la Ronzière, en 1760 Gilette-Mauricette des Cognets apporte en dot  Correc  lors de son mariage  avec Jean François Marie Geslin seigneur de Bourgogne ur Lantic, leur fils cadet  Gédéon hérite du domaine combattant dans la chouannerie pendant la Révolution . Par la suite  il réside  dans sa propriété de Reveret à Châtelaudren qu'il tient de son épouse, il sera maire de St-Brieuc, après son décès Correc est vendu à la famille de Tréveneuc rachetait ensuite par les Mottin de la Balme, transformé en ferme puis à l'abandon et depuis 1991 l'édifice fait l'objet d'une restauration par les nouveaux propriétaire","architecture":"CORREC manoir du XVe siècle, partiellement remanié au XVIIe siècle garde un aspect fortifiè avec sa cour fermée et ses tours d'angles      L'édifice comprend un corps de bâtiment rectangulaire, des communs, et un mur d'enclos percé d'un double porche et flanqué de deux tours circulaires. Le corps de logis se terminait à l'ouest par un donjon à trois étages aujourd'hui rasé. L'ensemble présente un appareil de schiste, et des encadrements de granit à certaines portes et fenêtres.                                                                                                                            KERDEBREUIL Kerdrebuil du XVI-XVIIe siècle, de Kergrenel du XVI-XVIIe siècle, des Granges de 1634 et 1700.","habitants":"Correc,Famille de  René-François de Suasse\"","divers":"trois châteaux  à Saint-Gelven Abbaye Correc grav 1 à 4 et Kerdebreuil grav-5 6-7.  Hazaie grav -8","gps":"","images":["../../jctruffet.com/image/image_22/22_St_Gelven_1.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_2.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_3.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_4.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_5.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_6.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_7.jpg","../../jctruffet.com/image/image_22/22_St_Gelven_8.jpg"]},"Consult_chateau_formulaire9aae":{"id":"Consult_chateau_formulaire9aae","dept":"22","canton":"Trégueux","commune":"Langueux","nom":"St_Ilan","type":"Château","periode":"XVII","histoire":"SAINT-ILAN, château datant  du XVIIe siècle, très restauré et agrandi au milieu du XIXe siècle (partie de l'aile ouest, étage de comble). Il a été acheté par Olivier Latimier en 1826 pour son fils Achille Latimier du Clézieux, fondateur de la colonie pénitentiaire agricole de Saint-Ilan. Il appartenait d'après Frotier de la Messelière aux familles Berthelot de Saint-Ilan au XVIIe siècle, Loz de Beaucours au XVIIIe siècle), Latimier du Clézieux au XIXe siècle et Roussel de Villeféron au XXe siècle).Statue datant de la 2e moitié du XVIIe siècle. Château du XVIIe siècle, très restauré et agrandi au milieu du XIXe siècle (partie de l'aile ouest, étage de comble).","architecture":"ST-IIan, château à deux corps en équerre, à double orientation, à un étage carré et un étage de comble construit en granite. Elévation ordonnancée à cinq travées avec avant-corps central de plan carré percé d'une porte et couvert d'un toit en pavillon. Aile ouest en retour d'équerre flanquée d'un bâtiment secondaire couvert d'un toit en pavillon. Conciergerie à élévation ordonnancée sans travées, construite en granite et brique sur un plan à deux corps en équerre. Chapelle de plan rectangulaire à vaisseau unique, orientée nord-sud, avec reprise du chevet de l'ancienne chapelle à droite. Architecture d'inspiration antique : l'accès est desservi par un escalier droit à degrés menant à une pièce (pronaos) délimitée par les extrémités des murs latéraux et deux colonnes.","habitants":"Famille d'r Olivier Latimier \"","divers":"Château de Saint-Ilan à Langueux","gps":"","images":["../../jctruffet.com/image/image_22/22_St_Ilan_1.jpg","../../jctruffet.com/image/image_22/22_St_Ilan_2.jpg","../../jctruffet.com/image/image_22/22_St_Ilan_3.jpg"]},"Consult_chateau_formulairea781":{"id":"Consult_chateau_formulairea781","dept":"22","canton":"Plancoët","commune":"Saint-Lormel","nom":"St_Lormel","type":"Château","periode":"XI-XVII- XIX","histoire":"Deux châteaux à Saint-Lormel;  Largentaye et Bonabry           LARGENTAY, Le site de Largentaie est occupé dès le XIIIe siècle par la famille portant le même nom. Le commanditaire , Marie Ange Rioust de l'Argentaye, est le fils de Guillemette Hénault, dame de Largentaie et de Jacques Pierre Rioust des Villes-Audrains, anobli en 1816 en hommage à l'engagement de son père durant la bataille de Saint-Cast en 1758. Le château actuel a été construit en 1840 pour Frédéric Rioust de l'argentaye, par l'architecte Hamon de Paramé. Le logis, est un bâtiment de plan rectangulaire sur deux étages, plus combles. Au rez-de-chaussée, le grand hall d'entrée et l'escalier d'honneur desservent les pièces de réception (salle à manger, bibliothèque, grand salon) , et une chambre au premier étage. Le deuxième étage se compose de chambres. Au nord-ouest se situent les dépendances. Au nord-est se trouve la chapelle, reconstruite en 1854. Ce château est l'un des grands édifices néo-classiques conservés en Bretagne. Son propriétaire initial du château de l'Argentaye était Frédéric Rioust de Largentaye, appartient toujours à la Famille Rioust de Largentaye.\nÉléments protégés MH : l'ensemble formé par le château, le parc, le portail, le mur d'enceinte, les dépendances, la chapelle, le colombier, les pavillons et la ferme : inscription par arrêté du 24 décembre 1993.","architecture":"BONABRY, château relevant de la seigneurie de Lamballe, construit dans le quatrième quart du XVIIe siècle pour la famille du Bouilly sur le site d'un ancien manoir acheté aux environs de 1580 par Guillaume du Bouilly des Portes (Daniel de la Motte Rouge). Le manoir appartenait aux familles Bouilly du XVIIe au XVIIIe siècle,  dont la fille épousa au XVIIIe siècle le comte Le Corgne de Launay, Seigneur de Bonabry. Une petite fille épouse le vicomte du Fou de Kerdaniel et transmet à ses descendants le domaine qui appartient actuellement au vicomte et à la vicomtesse Louis du Fou de Kerdaniel.  Le Corgne de Launay (au XVIIIe siècle) et du Fou de Kerdaniel (au XIXe et XXe siècle). Chapelle Saint Gilles et Saint Loup datant du quatrième quart du XVIIe siècle. Le château est construit sur un plan à deux corps en équerre. Chapelle de plan rectangulaire simple, à clocheton médian. Lactuel château de Bonabry a été construit sur le site d'un ancien manoir. Guillaume du Bouilly en fit l'acquisition en 1580. Lun de ses descendants fait démolir le manoir pour bâtir ce château, construit sur un plan à deux corps en équerre, surmonté dans sa partie centrale par un corps coiffé en pavillon. Au début de la Révolution, il servit de point d'embarcation pour l'émigration. En 1861, le château devient la propriété de la famille du Fou de Kerdaniel. Les dépendances se composent de vastes écuries, dune chapelle dédiée à Saint-Gilles et Saint-Loup datant également de la fin du XVIIe siècle, dun colombier et dune vieille croix classée aux M.H.","habitants":"Largentaye; Famille de Frédéric Rioust de l'Argentaye                        Bonabry; famille du Bouilly\"","divers":"Deux châteaux à Saint-Lormel Argentaye grav-1-2-3 et Bonabry  grav-4-5-6                                                                 GPS : 48° 32' 30\" Nord, 2° 13' 21\" Ouest                                                             Bonabry GPS :48° 31' 12,14\" Nord, 2° 39' 5,57\" Ouest","gps":"48° 32' 30\" Nord, 2° 13' 21\" Ouest","images":["../../jctruffet.com/image/image_22/22_St_Lormel_1.jpg","../../jctruffet.com/image/image_22/22_St_Lormel_2.jpg","../../jctruffet.com/image/image_22/22_St_Lormel_3.jpg","../../jctruffet.com/image/image_22/22_St_Lormel_4.jpg","../../jctruffet.com/image/image_22/22_St_Lormel_5.jpg","../../jctruffet.com/image/image_22/22_St_Lormel_6.jpg"]},"Consult_chateau_formulaire800b":{"id":"Consult_chateau_formulaire800b","dept":"22","canton":"Rostrenen","commune":"Saint-Nicolas du Pelem","nom":"St_Nicolas_Pélém","type":"Château","periode":"XVII-XIX","histoire":"A  deux kilomètre au nord à Lanrivain le château de Gollodic                    ST-NICOLAS-PELEM, daprès linscription sur la voûte de la porte  par la famille de Quelen, seigneurs de Beaucours, La demeure passa en 1662 aux Bréhant, par le mariage de Louise de Quélen, fille de Gilles et de Renée du Halgouet, avec Maurille de Bréhant, comte de Mauron et de Plélo. Bihy de Bréhant céda la terre, fief et seigneurie du Pellen en 1785 à Hippolyte-Louis-Marie Loz de Beaucours.  Pour honorer le futur monarque, il lança en 1871 la construction dun grand château pour accueillir le roi le jour où il linviterait à Saint-Nicolas-du-Pélem. Mais le comte de Chambord ruina les chances des monarchistes en 1873 en exigeant labandon du drapeau tricolore alors même que les députés monarchistes, majoritaires à l'Assemblée, s'apprêtaient à restaurer la monarchie. Anne-Marie-Hyacinthe de Boisboissel arrêta la construction de son grand château qui avait englouti une partie de sa fortune  et il en resta Les Tourelles, un rempart monumental qui surplombe la commune.  Il est aujourdhui habité par la famille de Boisboissel, héritière de la famille de Beaucours.","architecture":"LOGUELTAS, en plein coeur de la Bretagne est un ancien ensemble seigneurial du XVe- XVIIIe avec sa fontaine, lavoir, son four à pain et sa chapelle, entièrement rénovés en 2012.                                                             . GOLLODIC, le manoir de Gollodic ou Gollédic du XVI-XVIIe siècle, propriété de la famille de Plésidy au XVIe siècle, et de de la famille La Ville Chevalier à la fin du XVIIe siècle. On y voit un pigeonnier. Le double porche date du XVI-XVIIe siècle, manoir avec tourelle d'escalier, cour close et portail, dont l'ensemble a été conservé intact.Façades et toitures ,inscription par arrêté du 6 avril 1972.                                                                                                ST-NICOLAS, le château du Pélem a été construit au début du XVIIe siècle, daprès linscription sur la voûte de la porte,  en remplacement d'un manoir antérieur,Pendant la Révolution française, le château est pillé par des Chouans, puis occupé par une colonne mobile républicaine qui brûle portes et planchers, mais sans plus de dégradations parce que le maire de Bothoa, René Jacques Ruellan du Créhu, a protégé les armoiries du château.  Le château a été modifié au XIXe siècle, avec notamment lajout dun perron de granite. On peut voir les armes des Quélen sculptées sur le tympan des lucarnes et une échauguette datant du XV-XVIe siècle. Les deux lions de pierre, qui surmontent les pilastres encadrant la grille du château proviennent de Kerbastard.","habitants":"ST Nicolas; famille de Quelen                               Collodic ; famille  La Ville Chevalier \"","divers":"St Nicolas-Pelem  grav-1-2-3-4     GPS : 48° 18' 50\" Nord, 3° 09' 47\" Ouest Logueltas  Grav-5-6                        A  deux kilomètre au nord à Lanrivain le château de Gollodic grav-7-8","gps":"48° 18' 50\" Nord, 3° 09' 47\" Ouest Logueltas  Grav-5-6","images":["../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_1.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_2.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_3.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_4.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_5.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_6.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_7.jpg","../../jctruffet.com/image/image_22/22_St_Nicolas_P%c3%a9l%c3%a9m_8.jpg"]},"Consult_chateau_formulaire7e72":{"id":"Consult_chateau_formulaire7e72","dept":"22","canton":"Pleslin-Trigavou","commune":"Saint-Samson-sur-Rance","nom":"St_Samson_Rance","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux à St-Samson:  Chatelier-Guitrel et Tiemblais.                                                                                                      TIEMBLAIS, un aveu de 1505 fait mention de la maison de l'Estiemblaye. Elle appartient en 1513 à Charles Hingant, puis à ses descendants jusqu'au milieu du XVIIIe siècle. Angélique de Hingant, dernière héritière de la famille, épouse Alexandre-Jean de Péan, seigneur de la Villehunault et de la Villeneuve à Plurien. Leur fils, Louis-Alexandre de Péan, né à Dinan en 1788, est chef d'escadron de cavalerie dans la première moitié du XIXe siècle. Il est également nommé chevalier de Saint-Louis et de la Légion d'honneur. Marié à Caroline Bizien, il a deux filles, dont laînée, Louise, épouse le comte Louis-Antoine du Lézard en 1853. Les registres des matrices cadastrales indiquent pour la famille Bizien du Lézard, une construction nouvelle de maison entre 1882 et 1886 avec sellerie, remise, écurie et basse cour. Cette campagne de travaux correspond à la construction du château actuel.\nEn 1926, le domaine appartient à Louis le Bel de Penguilly. Cette famille marquera l'histoire de la commune, Jacques le Bel de Penguilly est encore aujourd'hui considéré comme l'une des grandes figures de la Résistance bretonne. Il est également un des seuls français à avoir reçu la US Medal of Freedom.","architecture":"CHATELIER-GUITREL, la construction du manoir du Chatelier-Guitrel date du XVIe et XIXe siècle, a été construit, sur un promontoire rocheux, qui domine l'estuaire de la Rance. Le site atteste d'une occupation défensive ancienne, avec une motte féodale à l'entrée du promontoire. Le corps de logis principal, de plan allongé, date de la seconde moitié du XVIe siècle. La façade antérieure présente une tour d'escalier hors oeuvre polygonale puis carrée, ainsi qu'une ornementation Renaissance sculptée. Au XVIIIe siècle, le logis est agrandi de 2 petites ailes basses et intérieurement réorganisé. Une nouvelle chapelle a été construite, des jardins en terrasse et une promenade sont aménagés. Plusieurs bâtiments de communs, dont certains datant du XIXe siècle, ont été conservés, ainsi qu'un ancien colombier. Le manoir du Châtelier-Guitrel a été inscrit aux M.H. depuis le 24/04/2008.                                                                                                                     TIEMBLAIS, château construit au cours de la deuxième moitié du XIXe siècle par la famille de Bizien du Lézard (acquêt en 1853) situé à proximité d'un ancien manoir à cour close, la Vieille-Tiemblaye. Château dans le style éclectique; néo-XVIIe, de plan symétrique allongé ; le corps de bâtiment central est cantonné de pavillons d'angles. Maçonnerie de moellon régulier avec encadrements de baies, chaînes d'angle, bandeaux horizontaux, corniche et lucarnes en pierre de taille. Toit brisé et toit brisé en pavillon.","habitants":"Tiemblais; famille de Louis le Bel de Penguilly\"","divers":"Trois châteaux à St-Samson, grav-1-2-3 Chatelier-Guitrel  grav-4  et Tiemblais grav-5.                                    GPS : 48° 29' 32\" Nord, 2° 01' 47\" Ouest                                                                                                                   GPS : 48° 29' 55,68\" Nord, 1° 59' 39,12\" Ouest","gps":"48° 29' 32\" Nord, 2° 01' 47\" Ouest","images":["../../jctruffet.com/image/image_22/22_St_Samson_Rance_1.jpg","../../jctruffet.com/image/image_22/22_St_Samson_Rance_2.jpg","../../jctruffet.com/image/image_22/22_St_Samson_Rance_3.jpg","../../jctruffet.com/image/image_22/22_St_Samson_Rance_4.jpg","../../jctruffet.com/image/image_22/22_St_Samson_Rance_5.jpg"]},"Consult_chateau_formulaire6b7c":{"id":"Consult_chateau_formulaire6b7c","dept":"22","canton":"Broons","commune":"Saint-Vran","nom":"St_Vran","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Saint-Vran, Angourla et  la Bruyère.                      LANGOURLA,  édifice construit aux XVe et XVIIIe siècles, puis restauré autour de 1900. En 1872, c'est le comte Frédéric Quemper de Lanascol, originaire de la ville d'Angers, marié à Marie Thomase Jeanne de Carné originaire de Canihuel, qui est propriétaire du château de Langourla. La propriété comprend une chapelle élevée au XIXe siècle, dont le pignon ouest comporte une rosace du XVe siècle, provenant de l'ancienne église de Laurenan, et un moulin qui avait la particularité de posséder deux biefs d'arrivée d'eau et deux roues. Le château, de plan allongé dont le corps principal, à deux pavillons, est accosté d'une tour circulaire et d'un pavillon rectangulaire saillant du côté de la façade principale. Dans le parc on conservait deux des neuf canons de Guerrand, offerts par Louis XIV à Louis Marie du Parc de Locmaria qui s'était illustré à la bataille de Spire. Ils furent restitués à la famille Quemper de Lanscol sous la restauration.","architecture":"La BRUYERE  à Saint-Launeuc  à trois kilomètres à l'est.  Château construit au XVIIIe siècle d'aspect proche d'une malouinière. Comme dans ce genre de construction, l'accès du premier étage s'effectue par un escalier extérieur à double révolution. Au XXe siècle, il appartenait à monsieur Desmier de Ligouyer, pendant la seconde guerre mondiale, il cacha trois aviateurs américains. Le secret sera bien gardé. Quelques jours plus tard la Résistance viendra les récupérer. Éléments protégés MH : les façades et les toitures du château et de ses deux pavillons d'entrée ; la cour d'entrée avec son portail et sa grille : inscription par arrêté du 15 octobre 1968.","habitants":"Langoura; famille du comte Frédéric Quemper de Lanascol            La bruyère; famille de Monsieur Desmier de Ligouyer\"","divers":"Deux châteaux à Saint-Vran, Angourla grav-2 ,  la Bruyère grav-1.                                                                   GPS : 48° 14' 45\" Nord, 2° 20' 23\" Ouest","gps":"48° 14' 45\" Nord, 2° 20' 23\" Ouest","images":["../../jctruffet.com/image/image_22/22_St_Vran_1.jpg","../../jctruffet.com/image/image_22/22_St_Vran_2.jpg"]},"Consult_chateau_formulaire343b":{"id":"Consult_chateau_formulaire343b","dept":"22","canton":"Pleslin-Trigavou","commune":"Taden","nom":"Taden","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Taden; la Conninais et le Grand Cour.                                     La CONNINAIS, létymologie de Taden proviendrait du vieux breton tad, signifiant ancien ou ancêtre, et de hent, chemin. Cet ancien chemin serait la voie gallo-romaine de Corseul à Alet. La voie romaine entre Corseul et Avranches comportait un gué sur la Rance. A cet emplacement une première agglomération sest développée face à léperon du Châtellier à la Vicomté-sur-Rance. Le vicus de Taden servait de port fluvial au chef-lieu de la cité des Coriosolites, Fanum Martis, aujourdhui Corseul. Deux temples et de nombreuses structures gallo-romaines y ont été découverts cernant une occupation entre la fin du 1er siècle après. J.C.  La présence dune église au lieu-dit les Boissières sur la Rance indique que le passage du gué a perduré au Moyen-Age et quil était assuré par des moines comme pour les autres gués proches de Léhon, Lanvalla.  La paroisse serait un démembrement de celle de Plouër. Elle apparaît pour la première fois dans une charte de 1121 du prieuré de Saint-Malo de Dinan où il est dit que léglise Sancti Petri de Tadduen est restituée par un clerc, qui la détient de ses ancêtres, à l'évêque de Saint-Malo qui la donne à l'abbaye de Marmoutier. Ce texte ne précise pas lemplacement de la première église ; sagit -il de celle située en bordure de Rance ou de celle du bourg qui aurait été reconstruite par la suite. Aujourd'hui propriété de la banque nationale de Paris.","architecture":"La CONNINAIS,  le château de la Conninais, en Taden, peut servir à illustrer cette période de transformation et de transition des édifices anciens. En effet, le style Renaissance ne laisse plus insensible le noble Breton, les sévères édifices du XVe siècle et les nouvelles constructions vont s'orner de pilastres cannelés, les superbes fenêtres, de porches... Cette pittoresque demeure construite au XVe siècle, au lourd donjon orné de gracieuses lucarnes, a été remaniée à la Renaissance. Le corps principal de logis est constitué par deux bâtiments inégaux accompagnés de tours et tourelles dont l'une porte le bien joli nom de \"tour d'amour ou tour du péché\". La porte d'honneur est de style Renaissance; deux cariatides soutenues par les pilastres supportent l'entablement. A côté de la grille d'entrée s'élève une chapelle gothique...\nÉléments protégés MH : le château de la Conninais en totalité : inscription par arrêté du 28 septembre 1926.                                                                          GRAND COUR , se situe près de l'église. C'était une résidence seigneuriale de la fin du Moyen-Age. Il est de type logis-porche. Le manoir de la Grand'Cour a été racheté par la commune en 1991, a été classé aux M.H. en 1993.  Ce logis-porche, à la composition originale avec un passage voûté, unique dans les manoirs bretons, réunit sous une même toiture une partie seigneuriale et une partie secondaire pour un hôte de marque ou régisseur du domaine. Situé à louest de la cour, il faisait partie dun ensemble, comme lindique une description de 1552 qui confirme un corps de logis perpendiculaire disparu avec une salle seigneuriale.  La restauration partielle du manoir  suite à son classement le 30 mai 1991 a été dirigée par Alain-Charles Perrot, architecte en chef des Monuments Historiques.","habitants":"seigneurs locaux\"","divers":"Deux châteaux à Taden; la Conninais grav 1-2 et le Grand Cour grav-3-4.                                           GPS : 48° 27' 57\" Nord, 2° 02' 43\" Ouest                                                          Gd COUR GPS : 48° 28' 31,31\" Nord, 2° 01' 1,33\" Ouest","gps":"48° 27' 57\" Nord, 2° 02' 43\" Ouest","images":["../../jctruffet.com/image/image_22/22_Taden_1.jpg","../../jctruffet.com/image/image_22/22_Taden_2.jpg","../../jctruffet.com/image/image_22/22_Taden_3.jpg","../../jctruffet.com/image/image_22/22_Taden_4.jpg"]},"Consult_chateau_formulairefd0a":{"id":"Consult_chateau_formulairefd0a","dept":"22","canton":"Bégard","commune":"Tonquédec","nom":"Tonquédec","type":"Vestiges-Fort","periode":"XII-XV","histoire":"TONQUEDEC , le début de la construction remonte au XIIe siècle pour la famille de Coëtmen Penthièvre, puînée des ducs de Bretagne. Le château fort a été démantelé sur ordre du duc Jean IV en l'an 1395 à cause d'un conflit l'opposant aux Penthièvres. Rolland II et Rolland III de Coëtmen, vicomtes de Tonquédec, se sont alliés à la rébellion d'Olivier de Clisson.La reconstruction de l'édifice débute à partir de 1406 par Rolland IV de Coëtmen, il a ensuite changé plusieurs fois de propriétaires, avant d'être classé comme place forte pour l'artillerie en 1577. La famille de cette époque (Goyon de La Moussaye), étant protestante, était donc en désaccord avec le roi Henri IV. Pendant les guerres de la Ligue, le château sert de cachette aux huguenots. Mais il est finalement démantelé vers 1626 sur ordre de Richelieu, après avoir était vendu à Amaury III de Guyon de la Moussaye à René  de Quengo comte de Rochay les Quengo n'y résident pas mais le conservent jusqu'au XIXe siècle appartient depuis  1880 à la famille de Rougé descendant de la ligne des Coêtmen. Actuellement   propriété de la S.C.I. Ty-Coz.","architecture":"TONQUEDEC, du haut de sa corniche rocheuse, les ruines du château de Tonquédec, avec leurs onze tours et une enceinte close, dominent la vallée du Léguer. C'est un véritable vestige de la Bretagne féodale. Le château appartient actuellement aux descendants des bâtisseurs. Précédé d'une grande cour d'honneur fermée par une grille, l'édifice ouvre au sud sur un jardin à la française dessiné en 1911 et limité par des douves. De chaque côté du château sont bâtis deux édifices symétriques : l'orangerie et le bûcher, datés de 1786. Vers l'est, les dépendances ferment la cour (sellerie, garages). A l'ouest se situe la ferme, non loin du colombier et de la chapelle datant du XVIe siècle. De l'autre côté de la route, le manoir de Ville-Colas complète l'ensemble. Les décors intérieurs du salon et de la salle à manger ont été conservés.\nÉléments protégés MH : le château de Tonquédec (ruines) : classement par liste de 1862.","habitants":"Rolland IV de Coëtmen,\"","divers":"Vestiges de la forteresse de Tonquédec                                                                                               GPS : 48° 40' 36,01\" Nord, 3° 24' 42,01\" Ouest","gps":"48° 40' 36,01\" Nord, 3° 24' 42,01\" Ouest","images":["../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_1.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_2.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_3.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_4.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_5.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_6.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_7.jpg","../../jctruffet.com/image/image_22/22_Tonqu%c3%a9dec_8.jpg"]},"Consult_chateau_formulairef970":{"id":"Consult_chateau_formulairef970","dept":"22","canton":"Plénée-Jugon","commune":"Trébry","nom":"Touche_Trébry","type":"Château","periode":"XVI-","histoire":"La TOUCHE-TREBRY, le château de la Touche-Trébry a été construit à la fin du XVI· siècle, par Christophe de la Roche, chevalier de lordre du Roi, député de la Noblesse de lévêché de St-Brieuc pour la Réformation de la Coutume en 1580. Jérôme de la Roche, fils du précédent, gouverneur de Moncontour, époux de Jeanne dAvaugour, avait un fils Jean, qui fut tué (en duel sans doute), en 1610, par un baron de Saint-Brice. Sa sur, Elye, se trouva héritière des biens de ses parents, deux ans après son mariage, en 1608, avec Julien Freslon, seigneur de la Freslonnière, près de Rennes. Il semble que Julien Freslon ait rapidement abandonné les lieux, peut-être dès la mort de sa femme en 1628. En tous cas, ils est certain que vers le milieu du XVIIe siècle, il nétait plus habité que très épisodiquement. Une déclaration fournie le 16 mars 1726, par Alexis Freslon, marquis dAcigné, En 1878, Esther Fraval, qui avait épousé le comte Louis de Calan, gagna un procès contre le contre amiral Grivel et son épouse qui avaient acquis, en 1859, la partie du château provenant de la famille Glais. Finalement, devenu propriétaire, en 1880, le comte Louis de Calan put envisager la restauration de la Touche Trébry. En 1748 passa par alliance au Talhouët-Bonamour qui le vendirent en 1803 à un maître de forges Quéro -Brangolo, à la mort de ce dernier en 1819  le château échut à ses deux filles et demeura divisé en deux lots jusqu'en 1880,  le comte Louis de Calan  put racheté l'autre moitié.  En 1878, Esther Fraval, qui avait épousé le comte Louis de Calan, gagna un procès contre le comte amiral Grivel et son épouse qui avaient acquis, en 1859, la partie du château provenant de la famille Glais. Finalement, devenu propriétaire, en 1880, le comte Louis de Calan put envisager la restauration de la Touche Trébry. Propriétaire actuel le comte de la Lande de Calan.","architecture":"La TOUCHE- TREBRY  Vers 1913, le gros uvre était achevé, mais aucun aménagement intérieur nétait commencé, ils ont été entrepris en 1925, par le comte Pierre de Calan, neveu du précédent, et poursuivis depuis par son fils.Resté très longtemps inhabité, vidé de son mobilier bien avant la Révolution et transformé en ferme, le château de la Touche-Trébry na pas dhistoire car il est resté tout à fait à lécart des évènements de la chouannerie et si la ferronnerie du puits provient du manoir de Boishardy,  le marquis dAcigné, en donne une description très complète, prouvant limportance considérable de la propriété et des droits seigneuriaux qui y étaient attachés, haute, moyenne et basse justice, prééminences, fiefs, pêcheries, colombiers, viviers, moulins, garennes, étangs et jusquà une fourche patibulaire à quatre pots, dans la lande proche du Bois Aubé, cest à la suite dune acquisition faite seulement vers 1930.\nÉléments protégés MH : le château de la Touche et son enceinte : inscription par arrêté du 3 juin 1927.","habitants":"Touche -Trébry; famille du   comte de la Lande de Calan\"","divers":"Château de la Touche Trebry        GPS : 48° 21' 25\" Nord, 2° 34' 16\" Ouest","gps":"48° 21' 25\" Nord, 2° 34' 16\" Ouest","images":["../../jctruffet.com/image/image_22/22_Touche_Tr%c3%a9bry_1.jpg","../../jctruffet.com/image/image_22/22_Touche_Tr%c3%a9bry_2.jpg","../../jctruffet.com/image/image_22/22_Touche_Tr%c3%a9bry_3.jpg","../../jctruffet.com/image/image_22/22_Touche_Tr%c3%a9bry_4.jpg","../../jctruffet.com/image/image_22/22_Touche_Tr%c3%a9bry_5.jpg"]},"Consult_chateau_formulaire9248":{"id":"Consult_chateau_formulaire9248","dept":"22","canton":"Plestin-les-Grèves","commune":"Trémel","nom":"Trébriant","type":"Château","periode":"XV","histoire":"TREBRIANT, manoir ancien construit au XVe siècle, fortement restauré dans le style néo gothique au XIXe siècle, avec notamment la construction d'un pavillon à tourelles. Manoir, dit château de Trébriant de plan allongé accosté d'une tour circulaire demi-hors-oeuvre et comprenant un corps de bâtiment, élevé en pierres de taille, ouvert en pavillon encadré de deux tourelles demi-hors-oeuvre.Cet ensemble bâti ancien, à la fois résidence seigneuriale et exploitation agricole, est situé à l'ouest du bourg de Trémel dans un écrin boisé (bois de Trébriant et de Kernous). Situé à 106 mètres au-dessus du niveau de la mer, il a été établi à proximité immédiate d'une source qui alimente un petit affluent du Douron. Le manoir entouré de plusieurs fermes ; K[er]nours bras ; K[er]nours bian ; K[er]arc'hant ; Le Gorrec Huet ; Le Gorrec Jarand - était accessible par trois chemins principaux. Vers l'ouest, un chemin menait du manoir Trébriant au moulin et à un pont homonyme permettant de franchir le Douron (source).","architecture":"TREBRIANT  ce manoir est  datable des XVe et XVIe siècles ; plus de la moitié de la surface du manoir apparaît cependant comme ruinée sur le cadastre de 1814. Le logis a été fortement restauré et modifié dans la deuxième moitié du XIXe siècle. En l'état, le logis en équerre est accosté à l'est d'une tour en demi-hors-uvre. Vers le sud, la porte d'entrée à arc en tiers-point (arc dans lequel s'inscrit un triangle équilatéral) est encadrée de deux ouvertures de tir de type \"archère cruciforme\". Cette ouverture de tir verticale avec fente de visée horizontale permet le tir d'armes à flèche : arc ou arbalète puis, plus tard, le tir d'arquebuse ou d'autres armes à feu.","habitants":"Trébriant; Famille\"","divers":"Château de Trébriand à Trémel","gps":"","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9briant_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9briant_2.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9briant_3.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9briant_4.jpg"]},"Consult_chateau_formulaireca99":{"id":"Consult_chateau_formulaireca99","dept":"22","canton":"Tréguier","commune":"Tredarzec","nom":"Trédarzec","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Trédarzec ; Kerhir et Kerdalo.                                           KERHIR, Après être passés devant la chapelle St Nicolas de Kerhir, vous entrerez au domaine par une longue allée de tilleuls. Vous découvrirez, en face, le vieux-manoir et Manercoz puis passant les piliers, le château et à gauche le Grand-Logis, et blotti au fond dun chemin, la Bergerie. Les 4 gites du domaine de Kerhir ont la particularité dêtre indépendants, avec leur propre jardin. Ils sont tous situés au cur du parc de Kerhir auquel vous pourrez accéder pour vous détendre. Elizabeth et Bruno de la Brosse ont une passion pour ce domaine de Kerhir et seront heureux de vous aider à le decouvrir. Le château de Kerhir comporte le grand logis, la bergerie et le vieux manoir.","architecture":"KERDALO, en 1965, Peter Wolkonsky achète le manoir, réalisant une composition architecturale de style XVIIe à partir de matériaux de récupération. Le logis est précédé d'une cour en terrasse surplombant un ancien verger. Les abords du logis présentent des espaces d'inspiration méditerranéenne et italianisante. Les jardins occupent un vallon qui descend en pente douce vers la rivière du Jaudy.\nÉléments protégés MH : les jardins, à savoir les sols des parcelles constitutives du jardin ainsi que les constructions maçonnées et fabriques de jardin : la terrasse de la cour sud ; le jardin formel d'inspiration italienne en contrebas de la cour sud avec les deux pavillons d'angle en totalité, la fontaine et l'escalier sur lequel elle s'adosse ; les trois terrasses construites sur l'arrière du logis avec leurs murets de soutènement ; la vallée du haut avec les deux bassins, le canal et la pagode ; la partie centrale avec la fontaine Saint-Fiacre et son petit bassin, l'étang, le bassin orné d'un masque en bas-relief, le bassin qui lui succède et son escalier d'eau ; la vallée du Bas avec le cheval cabré, le bassin précédant la grotte, la grotte italianisante avec le bassin et le chemin dallé ; l'ancien logis manorial recomposé par P. Wolkonsky pour ses façades et ses toitures (à l'exclusion des bâtiments de part et d'autre de l'entrée nord du jardin et au sud-ouest du logis) ; le colombier : inscription par arrêté du 22 juin 2007. Propriété du prince Wolkonsky.","habitants":"Kerhir; Elizabeth et Bruno de la Brosse         Kerdalo; Peter Wolkonsky\"","divers":"Deux châteaux à Trédarzec ; Kerhir grav--5-6 et Kerdalo grav 1-2-3-4.  GPS : 48° 47' 15\" Nord, 3° 11' 56\" Ouest","gps":"48° 47' 15\" Nord, 3° 11' 56\" Ouest","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9darzec_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9darzec_2.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9darzec_3.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9darzec_4.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9darzec_5.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9darzec_6.jpg"]},"Consult_chateau_formulaire895f-2":{"id":"Consult_chateau_formulaire895f-2","dept":"22","canton":"Rostrenen","commune":"Mellionnec","nom":"Trégarantec","type":"Château","periode":"XVII","histoire":"TREGARANTEC, le château de Trégarantec date de 1698 et l'oeuvre de François René Jégou du Laz, conseiller au Parlement de Bretagne.","architecture":"TREGARANTEC, il était à l'origine composé de deux ailes disposées en équerre, mais l'aile qui longeait les jardins, peut être antérieure au corps principal, a été détruite au début du XXe siècle et reconstruite en 1970. Les boiseries des salons qui l'occupaient ont été remontées dans différentes pièces du logis actuel. Devant le logis se développe la cour d'honneur divisée en deux parties par un muret. L'entrée est flanquée de chaque côté par deux pavillons. A gauche de la cour se succèdent différents bâtiments, communs, remises et écuries, dont certains sont remaniés. A droite se trouve la chapelle, construite en 1755, puis transformée en sacristie en 1768. Une balustrade en granit et des piliers marquent l'entrée du jardin auquel on accède par un escalier à trois paliers. Le jardin à la française est entièrement clos de murs, et réparti en trois terrasses séparées par des murets. La première a conservé son orangerie, et la deuxième son puits. La ferme a été construite vers 1944\nÉléments protégés MH : le logis ancien et la chapelle, les façades et les toitures des autres bâtiments, les cours et les jardins en totalité, la fontaine et les deux allées d'accès : inscription par arrêté du 24 décembre 1997.","habitants":"Famille de François René Jégou du Laz\"","divers":"Château de Trégarantec à Méllionnec                                           GPS : 48° 10' 31\" Nord, 3° 20' 02\" Ouest","gps":"48° 10' 31\" Nord, 3° 20' 02\" Ouest","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9garantec_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9garantec_2.jpg"]},"Consult_chateau_formulairebeb9":{"id":"Consult_chateau_formulairebeb9","dept":"22","canton":"Perros-Guirec","commune":"Trégastel","nom":"Trégastel","type":"Château","periode":"XIX-XX","histoire":"Deux châteaux  à Trégastel; Costaérès  le Castel Ste-Anne.      COSTAERES, le château de Costaéres est achevé vers 1896 (1899, date d'imposition du cadastre) par l'ingénieur Lanmoniez et l'entrepreneur lannionnais Pierre Le Tensorer pour Bruno Abakanowiecz, ingénieur d'origine polonaise demeurant à Saint-Maur-des-Fossés. L'édifice de style néo-médiéval est édifié sur un îlot acheté vers 1892 à un Perrosien qui y cultivait des pommes de terre et faisait sécher du lichen et du poisson. D'ailleurs, le nom breton de l'île signifie \"vieille sècherie\". De nombreuses parcelles sont aussi acquises à Ploumanac'h sur le territoire de Perros-Guirec, en face de l'île  ainsi que l'ancien moulin à mer nommé Milin Ruz pour y faire fabriquer de la glace (1896) et ainsi conserver poissons et homards destinés à la commercialisation. Les crustacés sont stockés dans des viviers construits en face de l'Hôtel Bellevue par Abakanowiecz. L'aménagement intérieur de la villa aurait été conçu avec le bois de récupération d'un bateau échoué. Après 1900, date du décès du propriétaire, sa fille, Sofia Abakanowiecz, devenue madame Poray, fait agrandir la villa d'une aile en retour sur la façade postérieure. Durant la Seconde Guerre mondiale, la villa est réquisitionnée par l'armée allemande, et subit quelques dommages intérieurs. Un incendie en 1990 détruit en partie l'intérieur de l'édifice. De nombreuses personnalités polonaises sont venues séjourner à Costaérès, depuis l'Entre-deux-guerres des personnalités du spectacle y séjournent.","architecture":"COSTAERES, édifice à volumétrie complexe issue de plusieurs agrandissements. Le corps principal, couvert d'un toit à longs pans et pignons découverts, présente une tourelle circulaire sur l'angle, et une aile en retour sur la façade postérieure, possédant elle-même une tourelle sur l'angle. Le gros-oeuvre est en moellons de granite rose laissés apparents, extraits de l'îlot et des carrières de la Clarté. Les assises régulières alternent avec un appareil polygonal. Les baies sont couvertes de linteaux. Une grande baie cintrée est percée sur la façade latérale Est. De faux mâchicoulis ornent les tourelles et les murs gouttereaux. Un balcon de granite agrémente un angle du corps principal, l'aile en retour présente une logette en maçonnerie.                                                                                      CASTEL-STE-ANNE, en 1883, les Filles du Sacré-Cur-de-Jésus et de Marie-de-Saint-Quay-Portrieux fondèrent à Trégastel, une succursale, en tous points semblable au bâtiment quelles possèdaient déjà à Saint-Quay-Portrieux. Sur les plans de l'architecte Paul-François Courcoux, la construction du Castel Sainte-Anne nécessite neuf mois de travaux, daoût 1883 à avril 1884. La chapelle est construite en 1923 par son fils, Auguste Courcoux. Elle fut bénie le 15 août 1925. En 1894, cette communauté a ouvert un couvent-hôtel. Finalement, il s'agira du premier hôtel de Trégastel, attirant une clientèle essentiellement costarmoricaine bourgeoise et pratiquante. Un chemin permet aux baigneurs daccéder rapidement à la plage de Coz Pors où les religieuses y louent des cabines de bain. Aujourd'hui, le Castel est devenu un club de vacances Belambra, entièrement rénové, qui a su conserver l'architecture du Castel et sa chapelle désormais est une salle de réception, mariages, animations diverses.","habitants":"Costaeres;  Bruno Abakanowiecz                 Castel-ste-Anne; les religieuses\"","divers":"Deux châteaux  à Trégastel; Costaéres  grav 1-2-3  le Castel Ste-Anne grav-4.                                              Ste Anne GPS : 48° 49' 51\" Nord, 3° 30' 54\" Ouest.","gps":"48° 49' 51\" Nord, 3° 30' 54\" Ouest.","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9gastel_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gastel_2.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gastel_3.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gastel_4.jpg"]},"Consult_chateau_formulaire92a2":{"id":"Consult_chateau_formulaire92a2","dept":"22","canton":"Dinan","commune":"Trégon","nom":"Trégon","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Trois châteaux ; Ville-Guerif, Haute Mettrie et Ville- es-Comte,le manoir du Beaussais chambres d'hôtes.                                                                                                             VILLE-GUERIF, maison de notable, dite château de la Ville-Guerif, datant de la fin du 2ème quart du XIXe siècle,  elle a été édifiée en 1846 pour un membre de la famille du Breil de Pontbriand (de 1842 à 1846). Protégé par un haut mur de clôture,  présente un imposant logis de style néo-classique et de type ternaire conçu sur un plan double en profondeur avec couloir. Divisé par deux murs de refend portant chacun deux souches de cheminées massives, ouvert sur les quatre côtés et couvert d'un toit à croupes, il est composé d'un sous-sol partiel, d'un rez-de-chaussée surélevé, d'un étage carré et d'un comble. Aspectée au sud-ouest et précédée d'un large perron, la façade antérieure est rythmée par trois travées de baies régulières et est animée par un avant-corps circulaire à toit-terrasse sur chaque angle, chaque avant-corps étant ajouré d'une travée comprenant une fenêtre surmontée d'un fronton-pignon triangulaire au rez-de-chaussée. Aspectée au nord-est, la façade postérieure est rythmée par cinq travées de baies régulières, les trois travées centrales en léger ressaut étant réunies sous un large fronton-pignon triangulaire agrémenté d'un écusson armorié en bas-relief. La cage d'escalier, située à droite  de l'entrée, abrite un escalier tournant à retours monumental à deux volées séparées par un repos (une première volée centrale, une deuxième volée double à montées parallèles).escalier dans-oeuvre : escalier tournant à retours de  style néoclassique. Type ternaire, variante à cinq travées. Plan double en profondeur à couloir.","architecture":"HAUTE-METTRIE, daté du début du XVIIe siècle et de la fin du XVIIIe siècle, comprend un corps de logis édifié en 1610, en partie détruit en 1758 à l'occasion de la bataille de Saint-Cast, puis agrandi en 1784 à l'initiative de son propriétaire Maurille-Alexis de La Chouë. Le site présente un logis rapporté en bon état prolongé à droite par un logis primitif. Aspecté au sud, ce logis rapporté, à un étage carré et un étage en surcroît, est conçu sur un plan double en profondeur et couvert d'un toit brisé à croupes. Affirmé par trois souches de cheminée agrémentées chacune d'une corniche à modillons, ce logis à trois travées de baies en façade antérieure présente une avancée latérale à l'avant, ainsi qu'une tour circulaire sur l'élévation postérieure coiffée d'un toit conique. Éléments de décor : souches de cheminée à boules, corniche à modillons, lucarnes à croupe et linteau cintré, épis de faîtage en zinc, épis de faîtage en terre cuite vernissée.                                                                                               VILLE-ES-COMTE  Manoir du XVIIIe siècle, propriété de Joseph-Gabriel de La Motte en 1758, acquis en 1785 par Joseph Casimir Laurent Poirier de Noiseville, contrôleur général des fermes du roi à Saint-Cast. Protégé par un haut mur de clôture et desservi par une allée frontale, le manoir de la Ville-ès-Comte présente un logis de type ternaire à double orientation. Aspecté au sud-ouest, ce logis est couvert d'un toit à croupes à égout retroussé sommé de deux épis de faîtage en terre cuite vernissée figurant un cavalier. Il est composé d'un rez-de-chaussée, d'un étage carré et d'un étage en léger surcroît. Chaque mur de croupe porte une souche de cheminée talutée à la base et agrémentée d'une corniche. Un mur de refend, décalé vers la gauche et montant de fond, porte également une souche de cheminée. Ce logis est flanqué à droite d'un corps de bâtiment rapporté, légèrement plus bas, dont le pignon est doté de rampants à crossettes.","habitants":"famille du Breil de Pontbriand                                 Hauteè-Metrie; Famille de Maurille-Alexis de La Chouë                                 Ville; Joseph Casimir Laurent Poirier de Noiseville\"","divers":"quatre  châteaux à Trégon; Ville-Guerif grav 4-5, Haute-Metrie grav-2 et  Ville es-comte grav-3. et Manoir du Beaussais grav-1  chambres d'hôtes","gps":"","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9gon_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gon_2.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gon_3.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gon_4.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9gon_5.jpg"]},"Consult_chateau_formulaire3523-2":{"id":"Consult_chateau_formulaire3523-2","dept":"22","canton":"Tréguier","commune":"Tréguier","nom":"Tréguier","type":"Patrimoine","periode":"XVII","histoire":"TREGUIER,  Tugdual est un personnage important puisqu'il apparaît parmi les sept saints « fondateurs » de la Bretagne. Au Xe siècle, le site gagne en importance et la présence des religieux nécessite linstallation de laïcs pour les servir. On trouve mentionnées à Tréguier la seigneurie des régaires de l'évêché de Tréguier, la juridiction de la provosté de Tréguier , la seigneurie dépendante de la cathédrale de Tréguier, la seigneurie chastellenie de Tnonguindy aux enfants de monsieur le duc de Richelieu, la seigneurie de Crechriou à monsieur Le Pelletier, la seigneurie de Kerdozer au dit Le Pelletier, la seigneurie de Pouldouran à monsieur de Sullé de Bégaignon , la seigneurie de Kerouzic au sieur de Kerouzy, la seigneurie de Kerjainlly au dit sieur de Kerouzy , la seigneurie de Tourot au sieur et dame de Querprigent. Cette seigneurie de Plougrescant pour laquelle on ne connaît aucune juridiction attestée a appartenu à Jean de Launay en 1517, puis en 1595 à Pierre de Launay, sieur de Tourault 1671 , la seigneurie de Quermouster à la dame de Coëtcanton-Laisné, la seigneurie de Troguery Carpont au sieur de Querlorec , la seigneurie de Coathallec, Kerhouarn et Traoumeur .","architecture":"TREGUIER  au XVIIe siècle, la maison d'Ernest-Renan : classement par arrêté du 20 avril 1944, propriétaire du bâtiment  l'état.                                                                                                                                     TREGUIER  la fin du Xe siècle, Tréguier devient cité épiscopale, cest-à-dire le siège dun évêché. Commence alors une période de prospérité pour la ville qui vit au rythme des offices religieux. La Révolution met un terme à la présence de lévêque, signant la fin dune époque pour la cité.\nMais lhistoire de Tréguier ne se résume pas à sa fonction épiscopale. Elle est également un haut lieu culturel dès le Moyen-Âge. La ville a conservé cette dimension à travers les siècles puisqu'elle a vu naître et a accueilli des hommes de lettres et des artistes renommés. Aujourd'hui, les trécorrois sauvegardent et valorisent ces héritages pour leur donner une seconde vie.\nAu XVIIe siècle, en effet, de larges parcelles non bâties sont investies par des couvents féminins, en périphérie immédiate du centre médiéval. Ils forment une transition entre la ville et la campagne et renforcent la fonction d'accueil et d'hospitalité de la cité. Les fondations s'échelonnent ainsi entre 1625 et 1699 avec le couvent des Ursulines, le couvent des Augustines  hôtel-Dieu, le couvent des Filles de la Croix et le couvent des Paulines.","habitants":"Ernest-Renan\"","divers":"A Tréguier porte et maison Ernest-Renan grav 3-4","gps":"","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9guier_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9guier_2.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9guier_3.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9guier_4.jpg"]},"Consult_chateau_formulaire147e":{"id":"Consult_chateau_formulaire147e","dept":"22","canton":"Perros-Guirec","commune":"Trévou-Tréguignec","nom":"Trévou_Tréguignec","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Trévou-Tréguignec; Balore et Boisriou.              BALORE, la devise de la famille est « Pa garro Doué - Quand il plaira à Dieu ». En 1418, Yves du Trévou accompagne le duc de Bretagne dans son voyage en France. En 1477, Olivier épousa Guillemette de Quélen. En 1629, Jean du Trévou, conseiller du Roy, sénéchal de Lannion. En 1642, René du Trévou, son fils, est lieutenant général de lAmirauté, au siège de Lannion. En 1670, le Père du Trévou, jésuite, est confesseur de monsieur, frère de Louis XIV. En 1689, un du Trévou est page du Roy. En 1753, un du Trévou est Lieutenant aux gardes françaises. En 1758, Joseph du Trévou combatit à Saint-Cast. Deux lieutenants de vaisseau de cette famille prirent part à la guerre dindépendance de lAmérique : lun à bord du « Vaillant », lautre à bord du « Jason ». Sébastien du Trévou commanda « Le Papillon ». La famille du Trévou habitait le château de Traofeunteuniou, à Ploujean, en 1755, lorsquelle mit en vente le Manoir de Baloré. Le manoir fut acquis, fonds et droits convenanciers, par Mr Louis Pasquiou, notaire royal à Kergouanton, du manoir voisin de Trélévern. Le manoir est depuis resté dans la même famille. En 1795, un du Trévou, lieutenant de vaisseau, fut fusillé à Quiberon. Aujourd'hui est la propriété de monsieur Paternotte.","architecture":"BALORE, les bâtiments sont construits en équerre avec une tourelle centrale qui abrite un escalier en colimaçon desservant les différentes salles du manoir. Une très ancienne statue de Saint-Yves décorait autrefois le vestibule d'entrée. De temps immémorial, le bail stipulait qu'une bougie devait brûler devant « le protecteur du lieu », le 19 mai, jour de sa fête. Les intérieurs sont simples avec une cheminée de granite pratiquement dans chaque pièce. Derrière le manoir, dans le jardin délimité par un mur construit en 1819, se dresse le colombier seigneurial. Non loin de là, il reste un socle où reposait un cadran solaire, du XVIIIe siècle, aujourd'hui disparu. Ce cadran portait cette mélancolique inscription : SICUT FUGIUNT HOROE, SIC VITA MEA FUGIT (« Comme fuient les heures, ainsi fuit la vie » .                                                                  BOISRIOU, cette terre noble appartenait au XVe siècle, à François de Carnavalet, sieur du Boisriou, de Trévou-Tréguignec. Ce personnage se rendit célèbre à la cour d'Henri II et de ses fils dont il avait été gouverneur. Il fut Chevalier de l'Ordre, Grand écuyer de France, Lieutenant de la compagnie des gens d'armes d'Henri III, Gouverneur d'Anjou, du Bourbonnais et du Foretz. Cette même famille Carnavalet du Boisriou a fourni 1 des 4 lieutenants des gardes du roi Louis XIV. Elle portait : argent à trois faces, accompagné de dix merlettes, le tout de sable. En 1421, Marie du Boisriou transmettait par mariage le château du Boisriou à la famille Plusquellec. Au XVIIe siècle, passe au Boisriou puis passa aux mains de Mme de Villeneuve du Louët, qui fut, grâce à cette terre, reconnue comme fondatrice de la paroisse par l'information de 1695 ». Ce lieu a ensuite donné son nom à la famille Le Borgne de Coëtivy. Cette famille est issue d'un frère de Guy Le Borgne, l'auteur de l'Armorial Breton (1667). Cette famille a hérité du domaine du Boisriou à la suite d'un mariage de 1677 et le possède, depuis cette époque.","habitants":"Balore; Famille de jean de Trévou                            Famille Carnavalet du Boisriou \"","divers":"Deux châteaux à Trévou-Tréguignec grav 2-3; Balore grav-1 et Boisriou grav-4.                                     Boisriou GPS : 48° 48' 56\" Nord, 3° 21' 26\" Ouest","gps":"48° 48' 56\" Nord, 3° 21' 26\" Ouest","images":["../../jctruffet.com/image/image_22/22_Tr%c3%a9vou_Tr%c3%a9guignec_1.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9vou_Tr%c3%a9guignec_2.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9vou_Tr%c3%a9guignec_3.jpg","../../jctruffet.com/image/image_22/22_Tr%c3%a9vou_Tr%c3%a9guignec_4.jpg"]},"Consult_chateau_formulairecb0d":{"id":"Consult_chateau_formulairecb0d","dept":"22","canton":"Dinan","commune":"Trélivan","nom":"Vaucouleurs","type":"Forteresse","periode":"XIII-XV","histoire":"VAUCOULEURS, la paroisse de Trélivan existe dès le XIIe siècle. Elle se nomme déjà Trélivan en 1182, mais n'est désignée comme telle qu'en 1266 et appartient au diocèse de Saint Malo. Elle est liée au développement du château de Vaucouleurs où se succèdent plusieurs familles. En 1248, Alain d'Espinay, marquis de Vaucouleurs, participe à la croisade menée par Saint Louis. En 1410, Vaucouleurs appartient à Guillaume de Guitté. En 1427, le duc Jean V y convoque le ban et l'arrière-ban de la Bretagne, afin de faire front aux Anglais. Propriété de Jean Robert en 1440 et de Jacques Le Porc en 1480. Au XVIe siècle, lors de la reconstruction du château, la propriété appartient à Guy de Guitté et à son épouse Jacquemine de Boisrioult. Plus tard, l'édifice passe à la famille de Derval. En 1780, la terre, qui appartient à Monsieur de Bruc, possède un droit de haute justice.","architecture":"Éléments protégés MH : la petite porte, les vestiges du portail et la tourelle d'escalier à trois niveaux, petites lucarnes  percées à chaque niveaux,  surmontée  d'un étage  sur mâchicoulis et lucarnes sur combles d'un toit pointu. Inscription par arrêté du 21 janvier 1926.","habitants":"Guy de Guitté \"","divers":"Château de Vaucouleurs à Trélivan","gps":"","images":["../../jctruffet.com/image/image_22/22_Vaucouleurs_1.jpg","../../jctruffet.com/image/image_22/22_Vaucouleurs_2.jpg","../../jctruffet.com/image/image_22/22_Vaucouleurs_3.jpg"]},"Consult_chateau_formulairedf87":{"id":"Consult_chateau_formulairedf87","dept":"22","canton":"Plancoët","commune":"Pleven","nom":"Vaumaduc","type":"Manoir","periode":"XV","histoire":"VAUMADEUC   Dès le XIIIe siècle, il existait un ancien manoir appartenant aux seigneurs de Gué-Madeuc. C'est un manoir qui date du XVe siècle. Le propriétaire initial était François Madeuc Il est de style Moyen Age tardif.  Renaissance bretonne. Dès le XIIIe siècle existait un manoir appartenant aux seigneurs de Gué-Madeuc. Le manoir de Vaumadeuc présente une façade Renaissance bretonne du XVe siècle, un parc intimiste, un pigeonnier, une roseraie et un étang. Le château de Vaumadeuc a été inscrit aux M.H. le 4/02/1926. Les propriétaires actuels du Manoir de Vaumadeuc sont Even et Carol O'Neill. Vous y trouverez des chambres d'hôtes.                                                                                                          PORTE , arrêté du 20 septembre 2012 : le logis en totalité, la cour d'honneur pour son sol d'assiette, le saut-de-loup, l'ancien jardin pour ses murs et son sol d'assiette, le portail d'entrée avec ses murs, l'avenue et les deux allées latérales pour leur sol d'assiette, le réservoir de collecte des eaux, les vestiges de l'ancienne chapelle et de l'orangerie ainsi que la grange pour ses dispositions d'origine.","architecture":"PORTE, à Noyal, le petit château des Portes est édifié au début des années 1840 sur une terre vierge de toute construction par Marie-François \nHaugoumar et  son épouse Amélie Le Gogal de Toulgoët. De style néoclassique, il s'inspire du modèle de la villa palladienne caractérisé par une volumétrie cubique développée en hauteur et dominée par une toiture à quatre versants. Les élévations principales   sont   soulignées   de   bandeaux   d'étages   et   agrémentées   d'avant-corps   en   légère   saillie   couronnés   de   frontons triangulaires. Les baies sont droites ou en plein cintre. Les pièces se distribuent selon un plan double en profondeur de part et d'autre d'un couloir transversal, à l'extrémité duquel est établi un escalier tournant. Chaque étage se voit attribuer un usage déterminé,  selon  l'organisation  habituelle   de  ce  type  d'habitation,  le  premier  niveau   forme  un  soubassement  semi-enterré regroupant cuisine, pièces de service et caves, le deuxième est un rez-de-cour surélevé dévolu aux pièces de réception, dont le vestibule adopte le motif italianisant de la serlienne pour sa baie ouvrant sur le couloir transversal, le troisième niveau est celui des chambres à coucher et le dernier se partage entre greniers et chambres des domestiques. Le parc, assez simple, conserve la \ncohérence de ses dispositions d'origine avec sa longue avenue et son petit saut-de-loup délimitant une cour d'arrivée en demi-cercle. L'intérêt patrimonial de cette demeure homogène et bien préservée, réside notamment dans sa typologie néo-palladienne et  son implantation ex nihilo.","habitants":"Vaumadeuc; famille de Even et Carol O'Neill.\"","divers":"Château de Porte  et de Vaumadeuc grav-2                             GPS : 48° 29' 17,88\" Nord, 2° 19' 51,96\" Ouest","gps":"48° 29' 17,88\" Nord, 2° 19' 51,96\" Ouest","images":["../../jctruffet.com/image/image_22/22_Vaumadeuc_1.jpg","../../jctruffet.com/image/image_22/22_Vaumadeuc_2.jpg"]},"Consult_chateau_formulairee9bb":{"id":"Consult_chateau_formulairee9bb","dept":"22","canton":"Tréguier","commune":"Lanmodez","nom":"Villeneuve_22","type":"Château","periode":"XVI","histoire":"VILLENEUVE, de la deuxième moitié du XVIe siècle. Ce manoir, qui a donné son nom à la famille de la Villeneuve, est devenu la propriété de la famille Cillart de la Villeneuve à la faveur d'une alliance contractée en 1543.","architecture":"VILLENEUVE, le logis, au volume important, est situé au fond d'une cour délimitée par de hauts murs de clôture, plus précisément au droit d'un portail à deux piliers. Couvert d'une toiture à croupes à égout retroussé, composé d'un rez-de-chaussée, d'un étage carré et d'un étage de comble, il est construit sur un plan en U. Il associe un corps central à double orientation et deux ailes en retour d'équerre vers l'avant, l'aile nord remaniée, qui comprend un sous-sol et présente une porte en plein-cintre latérale du côté de la cour, étant la partie la plus ancienne. Situé sur l'angle postérieur droit, un corps secondaire demi-hors-oeuvre et de plan massé, contemporain de la campagne de reconstruction du logis, reçoit un toit en pavillon. Le corps central est animée par une travée axiale recevant la porte d'entrée et enfermant l'escalier de distribution intérieur.","habitants":"famille de la Villeneuve\"","divers":"Château de Villeneuve à Lanmodez","gps":"","images":["../../jctruffet.com/image/image_22/22_Villeneuve_22_1.jpg"]},"Consult_chateau_formulaire44ea":{"id":"Consult_chateau_formulaire44ea","dept":"22","canton":"Broons","commune":"Yvignac-la-Tour","nom":"Yvignac","type":"Château","periode":"XV","histoire":"YVIGNAC, le château d'Yvignac, qui a conservé une corniche et des arcades construites au XVe siècle, remplace le vieux château du même nom, il ne subsiste de ce château du XVe siècle qu'une tour dite de la Porte encore visible sur la propriété. La famille d'Yvignac est connue dès le XIIIe siècle et s'éteint au XVIe siècle. L'édifice appartient ensuite à la famille d'Epinay, aux Breuil de Pontbriand puis aux Bruc et enfin aux Guéhenneuc de Boishue jusqu'à la Révolution. Le logis actuel a été remanié et date du XVIIIe siècle.\nÉléments protégés MH : la tour et le départ de la courtine : inscription par arrêté du 9 octobre 1964.","architecture":"Le château d'Yvignac est un château bâti à Yvignac-la-Tour, le château d'Yvignac-la-Tour est une propriété privée, fermée au Public. Le château d'Yvignac-la-Tour et la courtine sont inscrits partiellement aux M.H. depuis le 09/10/1964.","habitants":"famille d'Yvignac\"","divers":"Château de la Tour à Yvignac               GPS : 48° 22' 54\" Nord, 2° 10' 47\" Ouest","gps":"48° 22' 54\" Nord, 2° 10' 47\" Ouest","images":["../../jctruffet.com/image/image_22/22_Yvignac_1.jpg"]}};

  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';

  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
