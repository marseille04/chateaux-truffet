e reste dans la famille jusqu'en 1815 racheté par un neveu Joseph de St-Pern habite Dinan dont-il est maire, époux de sa cousine Adélaïde Magon de la Balue résideront peu à Couellan, passe ensuite par alliance aux Jourdan de Coutance puis aux Martin.  La propriété fut achetée en 1936 par le commandant Dorange et son épouse, qui en entreprirent la restauration, pièce par pièce, toiture après toiture, de bâtiment en bâtiment, et celle-ci se poursuit encore aujourd'hui.","architecture":"COUELLAN    De l'ancien château construit sous le règne de Charles VI, entre 1380 et 1420, il reste un très long bâtiment adossé aux murs d'enceinte, la base de l'ancien donjon et ses caves. Cette demeure devait comporter une tour d'escalier d'au moins six mètres de diamètre, car les marches d'escalier à vis, de deux mètres de longueur utile ont été réemployées dans le grand escalier droit du début du siècle. Le perron à double révolution semble avoir été fait avec les pierres de parement de cette tour. En septembre 1591, pendant les guerres de religion, ce manoir fut incendié et la région ravagée par le Duc de Mercoeur. Le château fut reconstruit au début du règne de Louis XIII. Sur la peinture d'une cheminée \"chasse à la licorne\", une cartouche indique 1620.  Dans un parc de cinq hectares, jardin en terrasse à la française. Parc à l'anglaise, potager, verger, grande charmille du XVIIIe siècle, if planté sous Louis XIII. Éléments protégés MH : les façades et les toitures du château et du pavillon qui lui est accolé, de la chapelle et du bâtiment des communs transformé en serres : inscription par arrêté du 24 février 1976.                      PERCHAIS,  est reconstruit en 1726 pour Henri Hingant de Saint-Maur et Françoise de Botherel dont les armes d'alliance, a dextre, une face et sept billettes, famille Hingant, à senestre un chevon accompagné de trois croix pattées, famille de Botherel accompagnent la date de construction sur la porte de la façade nord. Il adopte la forme nouvelle de la maison des champs et transcrit dans une version simplifiée le style développé par les ingénieurs de Vauban à Saint-Malo à la fin du XVIIe siècle. Le principe d'un enduit à la chaux, et d'un bandeau en trompe l'oeil séparant le rez-de-chaussée de l'étage, de même que les épis de faîtage des toits à croupes en forme de pots à feu révèlent cette influence qui rappelle l'architecture des malouinières. Logis de plan allongé à cinq travées, terminé à l'ouest et à l'est par deux ailes saillantes percées d'une travée. Il est édifié en moellons de granite et pierre de taille pour les baies.","habitants":"Guitté; famille de Boisjean et de Derval                                 Perchais;   famille de Botherel \"","divers":"Deux châteaux dans cet article de Guitté; Couellan grav 1 à 5 et Petchais  grav-6-7.","gps":"","images":["../../jctruffet.com/image/image_22/22_Guitt%c3%a9_1.jpg","../../jctruffet.com/image/image_22/22_Guitt%c3%a9_2.jpg","../../jctruffet.com/image/image_22/22_Guitt%c3%a9_3.jpg","../../jctruffet.com/image/image_22/22_Guitt%c3%a9_4.jpg","../../jctruffet.com/image/image_22/22_Guitt%c3%a9_5.jpg","../../jctruffet.com/image/image_22/22_Guitt%c3%a9_6.jpg","../../jctruffet.com/image/image_22/22_Guitt%c3%a9_7.jpg"]},"Consult_chateau_formulaireafc9":{"id":"Consult_chateau_formulaireafc9","dept":"22","canton":"Lanvallay","commune":"le Quiou","nom":"Hac","type":"Château","periode":"XV","histoire":"HAC,  le château du Hac était résidence de chasse des Ducs de Bretagne. Il appartenait à Arthur de Richemont, qui fut le compagnon de Jeanne d'Arc.  L'un, situé à l'ouest, bâti pour Jean Hingant, familier du duc de Bretagne, date des années 1440-1448, l'autre à l'est,   décrit dans les années 1920 comme une ruine, aurait disparu sans la restauration conduite entre 1927 et 1936, par son propriétaire, Étienne Paillard.","architecture":"HAC,  forme un magnifique ensemble architectural, composé de deux corps de bâtiments d'époques différentes, la construction  date du XIVe au XVe-XVIe siècle, presque en totalité en calcaire local.  Le château ou manoir du Hac forme un bel ensemble architectural,  de plan rectangulaire, flanqué de cinq  hautes tours, composé de deux corps de bâtiments d'époques différentes. L'autre, à l'Est, est le vestige d'un édifice antérieur dont subsisteraient les fondations. Les façades n'ont pratiquement pas été modifiées depuis la construction. L'intérieur présente les dispositions de type français caractéristiques des réalisations architecturales du milieu ducal et a conservé de très beaux éléments qui témoignent de la qualité de cette architecture, en dépit d'une restauration un peu regrettable dans les années 1930. Le château du Hac demeure ainsi l'une des plus parfaites productions de la cour ducale, dont l'influence a persisté longtemps dans la région. La visite se complète par un jardin planté d'espèces aromatiques et médicinales et de parterres d'époque Renaissance. Le château du Hac est classé aux M.H. depuis 1993. Ouvert au Public depuis 1984, la visite comprend différentes salles abritant un mobilier d'époque et de style gothique avec une collection de coffre, de lits à baldaquin, de tapisseries, de vitraux, de statuettes et de trophées de vénerie.","habitants":"Famille de Étienne Paillard\"","divers":"Château de la Hac à le Quiou  grav de 1 à 4                                                        GPS : 48°20'27,22\" Nord 2°0'21,4\" Ouest","gps":"48°20'27,22\" Nord 2°0'21,4\" Ouest","images":["../../jctruffet.com/image/image_22/22_Hac_1.jpg","../../jctruffet.com/image/image_22/22_Hac_2.jpg","../../jctruffet.com/image/image_22/22_Hac_3.jpg","../../jctruffet.com/image/image_22/22_Hac_4.jpg"]},"Consult_chateau_formulaire86ad":{"id":"Consult_chateau_formulaire86ad","dept":"22","canton":"Plaintel","commune":"L","nom":"Hermitage_Lorgue","type":"Château","periode":"XVIII-XX","histoire":"Deux châteaux à l'Hermitage-Lorge; Belorient et Lorgue. BELORIENT, le château de Belorient a été construit dans le premier quart du XXe siècle pour la famille Legris Du Val.                                                        LORGUE, le château est une énorme construction élevée  vers 1720  Guy de Durfort par le duc de Lorge beau-frère de Saint-Simon  la construction du Château de Lorge date de 1720 à 1740. Son propriétaire initial était Guy-Nicolas de Durfort, Duc de Loge, qui en avait fait sa résidence seigneuriale. Pendant la Révolution française, le château est le théâtre dun drame chouan. Grenadiers et gardes nationaux y débusquèrent une royaliste, Mme Le Frottier de Kérilis, qui avait été arrêtée et fut condamnée à mort au terme dun procès expéditif. Afin de reculer la date fatale, elle se déclara enceinte, ce qui permet à ses deux fils dorganiser son enlèvement de la prison de Saint-Brieuc. Opération réussie. Ils se réfugièrent au château de Lorge, inhabité depuis 20 ans, mais les Bleus ne tardèrent pas à les rattraper et tuèrent Mme Le Frottier de Kérilis et lun de ses fils. Une autre histoire parle de 20 morts et d'un perron ensanglanté.  Le nouveau propriétaire du château est Mr Joseph Hervé.","architecture":"BELORIENT, c'est un bâtiment de style néo-gothique de plan allongé flanqué d'un pavillon de plan carré sur l'angle nord-est et d'une aile perpendiculaire formant pignon à l'ouest. La façade nord possède un escalier rampant marquant l'entrée du logis, surmonté d'une échaugette engagée. Elévation ordonnancée. Tour circulaire semi-engagée couverte en poivrière à l'arrière.                                                                                                                                                        LORGUE , le corps du bâtiment central  coiffé d'un fronton  est encadré par deux solides pavillons d'angle couronnés de combles à la Mansart, entouré de 4 plans d'eau et a une superficie de 80 hectares avec la forêt. La chasse y est interdite pour la plus grande joie des oiseaux (Poules d'eau, oiseaux sauvages, martin pêcheur et chevreuils, ragondins etc) qui vivent heureux dans ce coin de paradis. Un travail magnifique à découvrir sur cette vidéo créée par Yann. Mr Joseph HERVE a le projet de créer une immenses fresques relatant la vie des habitants de cette époque. Le château de Lorge est inscrit partiellement aux M.H. depuis le 26/06/1963.","habitants":"Belorient; famille Legris du Val                                      Lorgue; Mme Le Frottier de Kérilis\"","divers":"Deux châteaux à l'Hermitage-Lorge ; Belorient grav -4-5 et Lorgue  grav 1-2-3.  Lorgue                                             GPS : 48° 20' 19\" Nord, 2° 49' 39\" Ouest","gps":"48° 20' 19\" Nord, 2° 49' 39\" Ouest","images":["../../jctruffet.com/image/image_22/22_Hermitage_Lorgue_1.jpg","../../jctruffet.com/image/image_22/22_Hermitage_Lorgue_2.jpg","../../jctruffet.com/image/image_22/22_Hermitage_Lorgue_3.jpg","../../jctruffet.com/image/image_22/22_Hermitage_Lorgue_4.jpg","../../jctruffet.com/image/image_22/22_Hermitage_Lorgue_5.jpg"]},"Consult_chateau_formulairececf":{"id":"Consult_chateau_formulairececf","dept":"22","canton":"Trégueux","commune":"Hillion","nom":"Hillion","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Hillion; Aubiers et Bonabry et Marais voir article.                                                   AUBIERS; construit  vers 1890 sur les plans de l'architecte Mellet (tradition orale, sur le site d'un ancien château appartenant aux familles Dolo du XVe-XVIe siècles, Visdelou du XVIIe siècle, puis la Noue de Bogard et des Aubiers au XVIIIe siècl. c'est à Charles-Marie-Sévère de la Noue des Aubiers, ancien zouave pontifical, conseiller général du canton sud de Saint-Brieuc élu à la chambre des députés de 1889 à 1898, que l'on doit la construction de ce château. Conciergerie, portail et écuries datant de la même campagne de construction. Château de style néo-gothique de plan rectangulaire allongé, à élévation ordonnancée à cinq travées, ouvert sur les quatre côtés, appareillé de granite en pierre de taille et de moellons de brique. Façade antérieure cantonnée aux angles de corps de bâtiments de plan carré, à travée centrale couverte d'un toit en pavillon et flanquée de deux tours circulaires. Façade postérieure à avant-corps central en forme de châtelet flanqué de deux tourelles en encorbellement, cantonnée aux angles de tours circulaires. La mise en oeuvre des matériaux crée un effet de polychromie et souligne l'axe de composition de l'édifice : granite clair en pierre de taille pour l'étage de soubassement, moellons de brique rouge au premier et au deuxième niveau, bandeaux de granite clair horizontaux régnant sur les élévations antérieures, postérieures et latérales, encadrement des ouvertures et lucarnes appareillées de granite clair en pierre de taille, inscription par arrêté du 5 juillet 2007.","architecture":"BONABRY, relevant de la seigneurie de Lamballe, construit dans le quatrième quart du XVIIe siècle pour la famille du Bouilly sur le site d'un ancien manoir acheté aux environs de 1580 par Guillaume du Bouilly des Portes (Daniel de la Motte Rouge). Le manoir appartenait aux familles Bouilly (du XVIIe au XVIIIe siècle), Le Corgne de Launay (au XVIIIe siècle) et du Fou de Kerdaniel (au XIXe et XXe siècle). Chapelle Saint Gilles et Saint Loup datant du quatrième quart du XVIIe siècle. Le château est construit sur un plan à deux corps en équerre. Chapelle de plan rectangulaire simple, à clocheton médian. Lactuel château de Bonabry a été construit sur le site d'un ancien manoir. Guillaume du Bouilly en fit l'acquisition en 1580. Lun de ses descendants fait démolir le manoir pour bâtir ce château, construit sur un plan à deux corps en équerre, surmonté dans sa partie centrale par un corps coiffé en pavillon. Au début de la Révolution, il servit de point d'embarcation pour l'émigration. En 1861, le château devient la propriété de la famille du Fou de Kerdaniel. Les dépendances se composent de vastes écuries, dune chapelle dédiée à Saint-Gilles et Saint-Loup datant également de la fin du XVIIe siècle, dun colombier et dune vieille croix classée aux M.H.","habitants":"Aubiers; familles de la Noue des Aubiers                Bonabry,  famille du Bouilly\"","divers":"Trois châteaux à Hillion; Aubiers et Bonabry  grav 2-3  et Marais.                                 Aubiers grav -1 grav -2-3                           GPS : 48° 29' 56\" Nord, 2° 40' 00\" Ouest","gps":"48° 29' 56\" Nord, 2° 40' 00\" Ouest","images":["../../jctruffet.com/image/image_22/22_Hillion_1.jpg","../../jctruffet.com/image/image_22/22_Hillion_2.jpg","../../jctruffet.com/image/image_22/22_Hillion_3.jpg"]},"Consult_chateau_formulaire1438":{"id":"Consult_chateau_formulaire1438","dept":"22","canton":"Plénée-Jugon","commune":"Plédéliac","nom":"Hunaudaye","type":"Vestiges","periode":"XIII-XV","histoire":"HUNAUDAYE, construit au XIIIe siècle pour les Tournemine, partiellement détruit vers 1340,  reconstruit peu après par Pierre Tournemine, puis au début du XVe siècle (vers 1405-1410) sur un plan polygonal plus ancien, pour les Tournemine et avec le soutien du duc de Bretagne Jean IV, par Hersart maître de l'oeuvre. La petite tour ouest et la tour sud-est dateraient de la première campagne. Les trois autres, nord, nord est et sud ouest, dateraient de la deuxième campagne, fin XIVe ou début XVe siècle. Le domaine fut érigé en baronnie en 1487, en faveur de François Tournemine, chevalier, seigneur de la Hunaudaye, lieutenant général pour le duc,  en 1505 reception d'Anne de Bretagne, en 1591 extinction de la famille de Tournemire.  En 1631, la seigneurie passe aux Rieux, puis par acquêt en 1783, aux la Moussaye Carcouët, et l'année suivante aux de Talhouët. La baronnie est alors démembrée. Pendant la Révolution, le château est pillé et démantelé puis incendié en 1793, par son propriétaire le comte de Talhouët, futur maire de Rennes, pour le préserver de tomber aux mains des Chouans.  en 1930 acquit par l'état.","architecture":"HUNAUDAYE, le château a été épargné par les troubles de la Ligue, les camps opposés ayant convenu d'une neutralité du château. Une partie du logis, aujourd'hui ruiné, a été construite au début du XVIIe siècle pour Sébastien de Rosmadec, alors propriétaire du château. Il en reste une cage d'escalier dont la porte possède un décor Renaissance (colonne à chapiteau ionique). Classé M.H. en 1922 et devenu propriété de l'Etat, le château-fort a été restauré à plusieurs reprises. Château-fort de plan pentagonal irrégulier, à cinq tours circulaires reliées par des courtines continues flanquent son enceinte entourée de douves profondes. Adossé aux courtines ouest, un logis, ruiné, possédait une salle avec cheminée monumentale de 18 m de long, il conserve les vestiges d'un escalier tournant à retours. La chapelle occupe l'étage supérieur de la tour sud-est. Le château, situé dans un vallon, est environné de douves contenues par une contre-escarpe.","habitants":"famille de François Tournemine\"","divers":"Vestiges de la forteresse d'Hunaudaye grav de 1 à 8","gps":"","images":["../../jctruffet.com/image/image_22/22_Hunaudaye_1.jpg","../../jctruffet.com/image/image_22/22_Hunaudaye_2.jpg","../../jctruffet.com/image/image_22/22_Hunaudaye_3.jpg","../../jctruffet.com/image/image_22/22_Hunaudaye_4.jpg","../../jctruffet.com/image/image_22/22_Hunaudaye_5.jpg","../../jctruffet.com/image/image_22/22_Hunaudaye_6.jpg"]},"Consult_chateau_formulaired34e":{"id":"Consult_chateau_formulaired34e","dept":"22","canton":"Plaintel","commune":"Hénon","nom":"Hénon","type":"Château","periode":"XV-XVI-XVIII","histoire":"Il existe 4 châteaux à Henon à découvrir : Bellevue, Ville-Chaperon, Catuélan, et du Colombier.\nBELLEVUE, est construit en 1889 par Henri Mellet pour Henri de Bélizal sur le site d'un ancien manoir. Les vestiges de celui-ci sont situés dans le parc, au sud de l'emplacement du château neuf. Ce château, de style néogothique, possède un corps central accosté de plusieurs pavillons et de deux tours circulaires sur l'un des côtés, tour dans l'angle à droite du porche d'entrée. C'est un château construit dans un style Néo-Gothique, Le château fut bâti par des artisans locaux, avec un plan inspiré des châteaux de la Renaissance. Le corps de logis, de petite taille, est entouré par 4 tours d'angles circulaires importantes.                                            CATUELAN, le lieu s'appelle à l'origine \"Coëtulan\" signifiant bois du haut. Cette demeure, propriété d'un premier président du parlement de Bretagne, fut construite au début du XVIIIe siècle, elle possède un parc en terrasses, typique des jardins à la française, simplifié au XXe siècle. Le domaine bénéficie de plus d'une vue panoramique exceptionnelle. Sa position dominante et stratégique en font tout son intérêt. Pour y accéder, il faut franchir une grille en fer forgé, des douves empierrées et un portique monumental.  Les vastes communs furent construits à proximité du château à la même période que la demeure elle-même. Propriété du comte Jacques de Catuélan. Reconstruit en 1840. Ce domaine appartient à Jean Ogier en 1514 et en 1536 ;  Éléments protégés MH : les façades et les toitures ; la porte à fronton et pilastre ; inscription par arrêté du 19 juin 1964.","architecture":"COLOMBIER, le bâtiment date de 1450 et possède une tourelle dangle remarquable de la même époque. La façade datant du XVIIe siècle, est classique. Le parc, réalisé pour les Visdeloup de Bédée, était un parc à la française à lorigine, il fut réaménagé à la fin du XVIIIe siècle en parc à langlaise. Le château devient ensuite la propriété du comte Jacques de Catuélan et est dans cette famille depuis cinq siècles et les propriétaires actuels, arrières petits neveux des fondateurs, après les gros dégâts de louragan de 1987, sefforcent de donner au parc et aux jardins leur aspect dorigine par de nouvelles plantations. Dans les anciens jardins clos de murs on peut admirer lancienne orangerie, un petit potager, une plate bande de vivaces et plusieurs variétés de roses. Au cours de la visite, qui commence par la chapelle datant du XVe siècle, abritée par un magnifique cèdre du Liban plusieurs fois centenaire. Éléments protégés MH : les façades  (y compris celles de l'aile en retour : inscription par arrêté du 29 décembre 1982.                                                                                                                VILLE CHAPERON, le château semble procéder de l'agrandissement d'un corps de bâtiment du XVIIIe siècle : adjonction de pavillons latéraux dédoublés et d'une galerie en rez-de-chaussée sur l'arrière du bâtiment, à moins qu'il ne s'agisse de l'agrandissement tardif d'un édifice de la première moitié du XIXe siècle. Le château appartient au vicomte Alain de Lorgeril au début du XXe siècle. Corps principal de plan allongé à deux pavillons latéraux aux extrémités desquels viennent se greffer deux pavillons plus larges, doublés de tourelles de plan carré sur l'arrière ; une galerie en rez-de-chaussée, couverte et fermée double la façade nord, assurant la jonction entre les pavillons.","habitants":"Bellevue; Famille d'Henri de Bélizal ,               Catuelan. comte Jacques de Catuélan          Colombier; comte Jacques de Catuélan, Ville; vicomte Alain de Lorgeril \"","divers":"Il existe 4 châteaux à Hénon à découvrir : Bellevue grav-1-2, ville Chaperon  grav 5-6, Catuélan grav-3-4, et du Colombier grav-7.               Bellevue GPS : 48° 23' 07\" Nord, 2° 40' 57\" Ouest                                        Catuellan Gps48° 24' 15? N, 2° 40' 20? O","gps":"48° 23' 07\" Nord, 2° 40' 57\" Ouest","images":["../../jctruffet.com/image/image_22/22_H%c3%a9non_1.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_2.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_3.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_4.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_5.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_6.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_7.jpg"]},"Consult_chateau_formulaire4c83":{"id":"Consult_chateau_formulaire4c83","dept":"22","canton":"Plaintel","commune":"Hénon","nom":"Hénon_II","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Hénon ; Neauvais  et les Granges.                            NEAUVAIS, ce château fut reconstruit au XVIIIe siècle ou au début du XIXe siècle à l'emplacement d'un ancien manoir dont une partie subsiste à l'une des extrémités du nouveau bâtiment. Demeure dans le style néo classique XVIIIe, de plan allongé rectangulaire. Le corps central, encadré de deux pavillons dissymétriques, comporte sept travées : les trois travées centrales sont groupées dans un léger avant-corps surmonté d'un étage en attique au niveau du toit et d'un fronton triangulaire. L'édifice possède un étage carré et un étage de comble. Elévation ordonnancée en maçonnerie enduite avec encadrements de baies, chaines d'angles, bandeaux horizontaux et corniche en pierre de taille. Le château de la Néauvais se distingue par un développement important et un environnement ayant conservé ses caractéristiques. La reconstruction du XIXe siècle, dans le style du XVIIIe est restée inachevée.","architecture":"Les GRANGES, la construction du château des Granges date de la 1ère moitié du XVIIIe siècle et du XIXe siècle, reconstruit au début du XVIIIe siècle par une famille de parlementaires, les Le Mintier, est une construction à pavillons d'angle comprenant trois niveaux. Ce fief, relevant de Moncontour, fut le berceau des Le Mintier, en Bretagne, dès le début du XIVe siècle ; une pierre portant leur écusson, datant de 1312, le rappelle dans la façade du château actuel. La cour d'honneur, délimitée par des douves, communique avec la cour des communs, dont l'accès est marqué par deux pavillons d'entrée. La chapelle, attenante au château, a été construite au XIXe siècle. Le jardin s'étend au Nord du château et le parc au nord-est (parc de 14 hA dont environ 3 sont en jardin, vergers et tapis verts, et 11 en parc boisé s'organisant autour d'allées monumentales, d'une pièce d'eau et d'un étang). Ce parc que la tradition orale, le Grand Larousse Volume II et la Gazette illustrée des amateurs de jardins (1914) attribuent à Le Nôtre, a été  très endommagé par la tempête d'octobre 1987. Le château des Granges est inscrit aux M.H.","habitants":"Granges; famille des Le Mintier\"","divers":"Deux châteaux à Hénon ; Neauvais grav-2 et les Granges grav-1.                  GPS : 48° 23' 07\" Nord, 2° 40' 57\" Ouest","gps":"48° 23' 07\" Nord, 2° 40' 57\" Ouest","images":["../../jctruffet.com/image/image_22/22_H%c3%a9non_II_1.jpg","../../jctruffet.com/image/image_22/22_H%c3%a9non_II_2.jpg"]},"Consult_chateau_formulaired66c":{"id":"Consult_chateau_formulaired66c","dept":"22","canton":"Tréguier","commune":"Plouguiel","nom":"Keralio","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux dans cet article à Plouguiel; Keralio  et Kergrech à 7 kilomètres au nord à Plougrescant.                                                                                      KERALIO, au début du XVe siècle, Jean de Kéralio reçut, en récompense de sa fidélité au Duc de Bretagne, des terres dans le comté de Plouguiel et le droit d'y construire une forteresse avec pouvoir de haute justice. Pour des raisons financières, il ne put réaliser ce projet et c'est son gendre, Alain de Clisson qui entreprit la construction du château de Kéralio en 1480. Il fit également ériger une chapelle sépulcrale de très haute qualité.  En 1840, Fanny Artur de Kéralio épousa, le vicomte Antony Jules de Roquefeuil au château de Bilo. On lui doit la destruction des bâtiments ruraux qui reliaient la tour militaire à la tour Est. Depuis 1990, il appartient à Jean de Roquefeuil-Montpeyroux qui le restaure.                                                                                                               KERGRECH,  vous accueille dans un manoir datant du XVIIe siècle, à 800 mètres de la Baie d'Enfer et à 650 mètres du centre de Plougrescant, ce manoir du XVIIe siècle, récemment rénové, s'est converti en superbe hôtel de charme. De son parc boisé, vous profiterez dun accès direct au bord de mer. L'harmonie des façades a été préservée par une rénovation soignée. Propriéte du vicomte de Roquefeuil.","architecture":"KERALIO, de cette période, subsistent une des quatres tours et les douves alimentées par des canalisations souterraines. A la Renaissance, les Clisson construisirent la belle façade sud qui fait l'orgueil du château aujourd'hui. Les communs datent du début du XVIIe siècle. Ruinés, les Clisson vendirent le château en 1685 à un  riche commerçant de Saint Malo, les Artur. Les Artur de Kéralio construisirent à la fin du XVIIIe siècle, sur l'emplacement d'une des tours de l'édifice, la grande tour Est du château.   La chapelle est un édifice rectangulaire de la fin du XVe siècle ou du début du XVIe, ayant servi de chapelle sépulcrale aux châtelains de Keralio. Une porte ogivale à pinacles encastrés et fleurons en son centre, se remarque dans l'axe du pignon, surmontée d'un cadre de pierre sur moulure cordon. Saint-Yves, Saint-Gonery et Saint-Tugdual y sont représentés en relief. Éléments protégés MH: inscription par arrêté du 8 décembre 1966.","habitants":"Keralio; famille  de Keralio                                       Kergrech; vicomte de Roquefeuil\"","divers":"Deux châteaux à Plouguiel grav-4-; Keralio grav  -5-6-7  et Kergrech grav 1-2-3 à Plougrescant.                                                Keralio                                                              GPS : 48° 47' 53\" Nord, 3° 14' 22\" Ouest","gps":"48° 47' 53\" Nord, 3° 14' 22\" Ouest","images":["../../jctruffet.com/image/image_22/22_Keralio_1.jpg","../../jctruffet.com/image/image_22/22_Keralio_2.jpg","../../jctruffet.com/image/image_22/22_Keralio_3.jpg","../../jctruffet.com/image/image_22/22_Keralio_4.jpg","../../jctruffet.com/image/image_22/22_Keralio_5.jpg","../../jctruffet.com/image/image_22/22_Keralio_6.jpg","../../jctruffet.com/image/image_22/22_Keralio_7.jpg"]},"Consult_chateau_formulaire206b":{"id":"Consult_chateau_formulaire206b","dept":"22","canton":"Plélo","commune":"St-Jean-Kerdaniel","nom":"Kerdaniel","type":"Château","periode":"XVI","histoire":"KERDANIEL,  siège de la seigneurie de Kerdaniel, le château appartient à la famille de Guébriant depuis 1600. En 1855, l'édifice est remplacé par une construction qui n'était pas encore achevée en 1856; il a peut-être été réalisé par l'architecte Joseph-Antoine Froelicher. Un parc paysager de 50 hectares est planté à cette période. L'ancien château du XVe siècle a été démoli en 1860 ; ses vestiges subsistent à l'ouest du château neuf. Situé sur une hauteur dominant une pièce d'eau et des pelouses, l'édifice s'insère dans un parc paysager. De plan rectangulaire cantonné de quatre tours sur les angles, il est élevé en brique avec encadrements de baies en pierre de taille de calcaire, les couvertures sont en ardoise. Une des tours renferme une chapelle avec un riche ensemble de vitraux. Galerie de portaits de la famille Budes de Guébriant. Portail d'entrée aux armes des Guébriant et mur de clôture autour du parc. Le château de Kerdaniel-Ros'mar se distingue par la justesse de son style éclectique au sein de la production régionale. Son environnement (parc et dépendances) et son décor intérieur sont par ailleurs conservés.","architecture":"KERDANIEL, la construction du château date du XVe au XIXe siècle. Le château de Kerdaniel est le siège d'une seigneurie qui relevait du Comte de Goëllo. Ce château est occupé au XVe siècle, par la famille Rosmar. Le château des Rosmar appartenait initialement aux seigneurs de Kerdaniel. La famille de Guébriant, en 1600, va décider de la construction d'un nouveau château, auquel succède l'édifice actuel, entouré d'un parc de 50 hectares. En 1855, l'édifice est remplacé par une construction inachevée en 1856. L'architecte serait Joseph-Antoine Froelicher. Le paysagiste est celui qui a dessiné les lacs du Bois de Boulogne. L'ancien château du XVe siècle fut détruit en 1860. Le Château de Kerdaniel-Ros'Mar actuel possède une importante galerie des portaits de la famille Budes de Guébriant. Le portail d'entrée  est aux armes des Guébriant. Un mur d'enceinte clôture le parc.","habitants":"famille de Guébriant\"","divers":"Château de Kerdaniel                        GPS : 48° 33' 57\" Nord, 3° 01' 12\" Ouest","gps":"48° 33' 57\" Nord, 3° 01' 12\" Ouest","images":["../../jctruffet.com/image/image_22/22_Kerdaniel_1.jpg","../../jctruffet.com/image/image_22/22_Kerdaniel_2.jpg","../../jctruffet.com/image/image_22/22_Kerdaniel_3.jpg"]},"Consult_chateau_formulaire16eb":{"id":"Consult_chateau_formulaire16eb","dept":"22","canton":"Perros-Guirec","commune":"Pleumeur-Bodou","nom":"Kerduel","type":"Château","periode":"XVI","histoire":"KERDUEL, la construction du château de Kerduel date du XVIe siècle. On peut le voir sur la route qui mène de Plommion à Pleumeur-Bodou. On peut visiter ses extérieurs de Pâques au 15 Septembre. Situé au milieu d'un grand parc, le chateau à fière allure. Son corps de logis date du XVIIe siècle. Il ne reste que sa tour ronde, qui est intégrée à la chapelle et son corps de logis. Coté ouest, une tour carrée a été construite, en 1890, sous la famille de Champagny. Les historiens disent que le chateau de Kerduel était l'une des résidences préférées du Roi Arthur. D'où son nom : Carduel, en Grande-bretagne, qui s'apparente au palais du Roi Arthur. La légende raconte que, par les nuits d'hiver les plus froides et sombres, on aperçoit le fantôme du Roi Arthur, qui chevaucherait la nuit son cheval blanc, dans le parc du château de Kerduel. Ce magnifique château date initialement du XVe et XVIe siècle. Le château de Kerduel possède beaucoup de charme et mérite le détour. La meilleure période pour lui rendre visite est à la mi-août quant a lieu la fameuse foire aux antiquités. Il est inscrit aux M.H.","architecture":"KERDUEL, présente une certaine unité en dépit des différentes époques de construction qui s'échelonnent du XIIIe au XIXe siècle. C'était un fief relativement important, ce dont témoigne quatre pierres de justice. Le château a été habité par les Kerduel jusqu'en 1477. Le corps de logis, en granit non appareillé, possède une aile en retour, et a été bâti au XVIIe siècle. Dans le prolongement ouest de la façade nord se trouve une tour carrée rajoutée en 1890. Le bâtiment en retour, constitué de granit rose appareillé, est le plus ancien, remontant au XIIIe siècle, il se compose d'une grande tour carrée qui abrite la chambre dite du \"Roi Arthur\". La chapelle présente l'originalité de posséder deux étages, un niveau bas pour les serviteurs, un niveau haut pour le châtelain, avec entrée séparée. Eléments protégés : façades et toitures du château et de la chapelle. Selon la tradition, le château de Kerduel était lune des résidences du roi Arthur. Dailleurs, le nom de ce château sapparente au nom du palais du Roi Arthur situé en Grande-Bretagne.  Éléments protégés MH : les façades et les toitures du château et de la chapelle : inscription par arrêté du 30 mars 1978.","habitants":"Famille de Champagny\"","divers":"Château de Kerduel à Pleumeur-Bodou                                                          GPS : 48° 45' 57,13\" Nord, 3° 29' 41,46\" Ouest","gps":"48° 45' 57,13\" Nord, 3° 29' 41,46\" Ouest","images":["../../jctruffet.com/image/image_22/22_Kerduel_1.jpg","../../jctruffet.com/image/image_22/22_Kerduel_2.jpg","../../jctruffet.com/image/image_22/22_Kerduel_3.jpg","../../jctruffet.com/image/image_22/22_Kerduel_4.jpg","../../jctruffet.com/image/image_22/22_Kerduel_5.jpg","../../jctruffet.com/image/image_22/22_Kerduel_6.jpg"]},"Consult_chateau_formulaire0589":{"id":"Consult_chateau_formulaire0589","dept":"22","canton":"Perros-Guirec","commune":"Trelevern","nom":"Kergouanton","type":"Château","periode":"XVII","histoire":"KERGOUANTON, le manoir noble  appartenait au XVIIe siècle, à Pierre de Loz, Sieur de Kergouanton, le fondateur de l'Hôtel-Dieu de Tréguier, contrat du 1655. Après la mort de Françoise de Kergroadez, son épouse, qui s'était, elle aussi, consacrée tout entière aux pauvres, durant les dernières années de sa vie, il se retira à l'hôpital de Tréguier et se fit placer parmi les pauvres, sans aucune distinction. Il mourut en 1668 et fut inhumé dans la chapelle de l'établissement qu'il avait comblé de bienfaits toute sa vie et qu'il dota richement à sa mort. Dans son testament  précédent, il avait laissé aux religieuses hospitalières de la Miséricorde de Jésus de nombreux biens dont son manoir de Kermouster en Langoat. Reconverti en gite d'hôtes, vous y trouverez 5 chambres d'hôtes, dont deux suites pour accueillir une petite famille.","architecture":"KERGOUANTON, se situe à 2kms des plus belles plages des Côtes d'Armor, entre Paimpol et Ploumanach, un lieu idéal pour visiter l'Ile de Bréhat, les Sept Iles, en bâteau, ainsi que le Sentier des Douaniers. Kergouanton était aussi une sorte d'hospice où les malheureux étaient reçus, l'édifice de plan en équerre, corps de logis rectangulaire à deux niveaux et lucarnes sur comble et sur retour d'équerre à l'extrémité  flanqué d'une tour ronde  et à l'opposé une tour carrée à trois niveaux.","habitants":"Famille de Pierre de Loz\"","divers":"Château de Kergouanton                        GPS : 48° 48' 33\" Nord, 3° 22' 14\" Ouest","gps":"48° 48' 33\" Nord, 3° 22' 14\" Ouest","images":["../../jctruffet.com/image/image_22/22_Kergouanton_1.jpg","../../jctruffet.com/image/image_22/22_Kergouanton_2.jpg","../../jctruffet.com/image/image_22/22_Kergouanton_3.jpg","../../jctruffet.com/image/image_22/22_Kergouanton_4.jpg"]},"Consult_chateau_formulairea706":{"id":"Consult_chateau_formulairea706","dept":"22","canton":"Plestin-les-Grèves","commune":"Plouberze","nom":"Kergrist","type":"Château","periode":"XVI","histoire":"KERGRIST, est construit en 1537 alors que celui de Runfao est en ruines vers 1500. Il fut la propriété de Yvon de Kergrist en 1481 de Jean  de Kergrist et de son épouse Gilette de Cozic,  de Louis de Kergrist en 1540.  Marie de Kergrist (1576-1638), dernière descendante de la famille, épouse à la fin XVIe siècle Jonathas de Kergariou  Décédé  en 1625 et Seigneur de Keraël : la demeure change alors de propriétaires. Au XVIIIe siècle,passe par alliance aux Barbier, Marquis de Lescoët, prennent possession du château, par alliance maritale avec les Kergariou. Mais ils doivent rapidement l'abandonner sous la Révolution Française (1792).  En 1867, Charles et Julien Huon de Penanster récupèrent le domaine, que leur grand-père et leur père, Pierre et Michel Huon  mandatés par les Barbier de Lescoët, avaient réunifié. Caroline, la mère de Charles et Julien, relève le nom Penanster à la demande de son oncle, Caude Guezno de Penanster, ancien Lieutenant du chef Chouan Cadoudal. Ils firent restaurer le château de Kerguéréon, ainsi que son parc, dans un esprit du XVIIe Le château devient en 1860 la propriété de la famille Huon de Penanster.  Deux frères, Charles et Julien Huon de Penanster vont récupèrer le château de Kergrist, en 1867. Ils le  firent restaurer, de style Renaissance,Très bien restauré, il est encore aujourd'hui dans cette famille qui l'ouvre au public.","architecture":"KERGRIST, au XVIIe siècle, le quadrilatère de la cour a été étendu et ponctué du côté de l'entrée par deux très fortes tours de style gothique flamboyant. Au XVIIIe siècle,  Les jardins à la Française, autrefois dessinés d'après un carton du célèbre André Le Nôtre, ont subit de nombreuses modifications tout en respectant les perspectives, l'ensemble du logis est réaménagé à l'Est, une façade classique s'érige, un escalier à double volées droites mène à l'actuel Jardin Français. Le manoir devint un château. Au Sud, la façade s'inspire de sa voisine à l'Est, mais dans un style plus épuré.  Au XIXe siècle,  fut vendu comme bien national à la Révolution, le domaine est morcelé, vendu en 2 parties et le château fut pillé.   C'est ainsi que les Huon acquièrent les boiseries de labbaye de Beauport, située près de Paimpol, pour être en cohérence avec la date dédification des façades. Charles rachète également des toiles de maître, ainsi que des panneaux de bois d'époque Henri II du XVIe siècle avec lesquels il fait réaliser des meubles de style néo-Renaissance., morcelé et pillé à la Révolution Française, dans un esprit du XVIIe siècle. Au XXe siècle, Régis Huon de Penanster réalise le Jardin des Roches, dans un esprit désertique, en utilisant l'effet naturel de blocs de granit issus d'un filon enterré. Inscription par arrêté du 20 janvier 1926.","habitants":"Famille de Kergrist\"","divers":"châteaux à Plouberze, Kergrist grav de 1 à 7.                                                    GPS : 48° 39' 50,13\" Nord 3° 26' 13,68\" Ouest","gps":"48° 39' 50,13\" Nord 3° 26' 13,68\" Ouest","images":["../../jctruffet.com/image/image_22/22_Kergrist_1.jpg","../../jctruffet.com/image/image_22/22_Kergrist_2.jpg","../../jctruffet.com/image/image_22/22_Kergrist_3.jpg","../../jctruffet.com/image/image_22/22_Kergrist_4.jpg","../../jctruffet.com/image/image_22/22_Kergrist_5.jpg","../../jctruffet.com/image/image_22/22_Kergrist_6.jpg","../../jctruffet.com/image/image_22/22_Kergrist_7.jpg"]},"Consult_chateau_formulairedf7e":{"id":"Consult_chateau_formulairedf7e","dept":"22","canton":"Tréguier","commune":"Minihy-Tréguier","nom":"Kermartin","type":"Château","periode":"XV","histoire":"KERMARTIN, cette seigneurie de Minihy-Tréguier possède un droit de basse et moyenne justice sexerçant à lauditoire des Régaires à Tréguier. Kermartin appartient à la famille homonyme depuis le XIIIe siècle : cest en ces lieux que Yves Hélory a vu le jour le 17 octobre 1253. Il est le fils d'Hélory, seigneur de Kermartin et d'Azo du Quinquis (Plessis). Yves Hélory de Kermartin (alias saint Yves)\nAprès de brillantes études qui le mènent à Paris et Orléans, Yves Hélory de Kermartin devient prêtre et \"conseiller juridique\". Il est nommé vicaire judiciaire (official) par l'évêque Alain de Bruc en 1284 : cest-à-dire \"juge ecclésiastique\" du diocèse de Tréguier. Toute sa vie, il se consacra à la justice et aux pauvres (Yves Hélory prêche en latin et en breton). En 1293, Yves Hélory fait construire sur ses fonds personnels une chapelle à laquelle il confère le statut de chapellenie (domaine doté dun patrimoine foncier indépendant). Les chapelains habitent dans une maison qui leur est dédiée : elle est surnommée la \"maison des chapelains\" ou \"chapellenie de Saint-Yves\". A la fin de sa vie, il se livrait à une forme de contemplation, il est décédé le 19 mai 1303 à Minihy. Yves Hélory est canonisé le 19 mai 1347 par le pape Clément VI après un procès débuté en 1330 (enquête de canonisation du 28 juin au 4 août). Le 29 mai 1347 est réalisé la levée du corps du saint : sa tête    est placée dans un reliquaire et le reste des reliques mises à labri. Saint-Yves est le saint patron des professions de justice et de droit, notamment celle davocat. Il est représenté avec une bourse dans une main et un parchemin dans l'autre, qui rappelle sa charge de juge ecclésiastique.","architecture":"KERMARTIN, lancien manoir de Kermartin a été détruit pour \"cause de vétusté\" suite à un incendie pour laisser la place à un logis de la ferme construit en 1834. Un dessin de  L. Joniaux représente cependant le manoir de Kermartin (ce dessin serait donc antérieur à 1834) : si la partie orientale du logis présente deux travées et une souche de cheminée octogonale, la partie occidentale apparait ruiné (lire en annexe la description du manoir de Kermartin par le Chevalier de Fréminville dans \"Antiquités de la Bretagne, 1835. Au premier plan, le puits. De lancien logis aurait été conservé, comme une relique et une preuve, un lit clos attribué à Saint-Yves. La ferme de Kermartin aurait ensuite été vendue à Jules Guillerm, maire de Tréguier puis à Sylvain Le Moniès de Sagazan. Achetée par la famille Salaün, la ferme est actuellement exploitée par Erwan Salaün, fils de Hervé (2019).","habitants":"Famille de Jules Guillerm\"","divers":"Manoir de Kermartin  à Minihy-Tréguier","gps":"","images":["../../jctruffet.com/image/image_22/22_Kermartin_1.jpg","../../jctruffet.com/image/image_22/22_Kermartin_2.jpg","../../jctruffet.com/image/image_22/22_Kermartin_3.jpg"]},"Consult_chateau_formulaire4777":{"id":"Consult_chateau_formulaire4777","dept":"22","canton":"Plestin-les-Grèves","commune":"Trémel","nom":"Kermerzit","type":"Château","periode":"XV","histoire":"KERMERZIT, dès le 10 mars 1463, le lieu est en effet cité dans un aveu de la cour de Guingamp comme possession de la famille Jourdain. L'aveu est une déclaration écrite que doit fournir le vassal à son suzerain lorsquil entre en possession dun fief (par achat, héritage ou échange). Laveu est accompagné dun minu ou dénombrement ou décrivant les biens composant  le fief.  A la Montre de Tréguier en 1503 : Jean de Kergrist comparait \"en robe\" (cest-à-dire avec lhabit civil) pour le dénommé Yvon Jourdain , seigneur de Kermerzit (Kervezic) en qualité de curateur et parrain. Il lui est enjoint au premier mandement de fournir \"deux archers en habillement suffisant\" ce qui prouve des revenus relativement importants. Au fil des siècles, la seigneurie de Kermerzit a appartenu  à : Robert Jourdain (mort en 1418), seigneur de Kermerzit et sa dame de Kermerzit de la famille Hélory, seigneur de Kermartin. Sa femme serait ainsi parente de Saint-Yves (Yves Hélory de Kermartin né en 1253 et mort en 1303). Selon les archives de la Bibliothèque de Rosmorduc, une chambre du manoir portait le nom du Saint, dans cette famille jusqu'en 1633 ensuite les de Kerleau  1936 , Fraçois le rouge en 1665, les Tuomelin de 1630 à  1704 en 1707 aux de Bizien à la mort de Renée Rolande de Biziens en 1755 passe à Jean-Marie Gabriel Paul André qui le racheta aux Bizien, en 1796 à Marie Mauricette de Crémeur, en 1881 appartient à la comtesse Stéphanie Marie Thérése Renée de Quélen du Plessis, veuve de monsieur le comte Joseph Prosper Le Corgne de Launay, - en 1891, l a comtesse Marie-Louise-Françoise du Dresnay,  veuve de monsieur le comte Louis François Marie de Kersauson (Lanidy à Plouigneau) loue l'autre moitié du manoir devenu ferme à François Beuzic et Marie Jeanne Le Drein, son épouse. en 1917, le vicomte Henri de Kersauson.","architecture":"KERMERZIT,  Une longue allée venant du nord-est et filant vers le sud-ouest dessert cet important ensemble manorial. Si une fontaine est signalée immédiatement au nord des logis, la présence d'un étang est également mentionné dans les archives familiales. Au nord-est du manoir se dresse un colombier  du début XVIe siècle. La mise en scène de l'entrée se fait par un portail au décor flamboyant percé d'une porte piétonne et d'une porte charretière surmontées d'armoiries. Ces portes permettent l'accès à la cour ouest dite \"cour basse\" fermée par un mur. A noter, que ce mur de forte épaisseur sert de pignon au logis est. Au sud de la cour se dressent deux logis construits à des périodes différentes : orientés vers le nord, ils font face à l'entrée monumentale.  À l'ouest se dresse le logis primitif avec tour d'escalier en élévation antérieure. La façade nord est percée d'une porte tout comme la tour est percée à l'ouest d'une porte basse (aujourd'hui murée). Cette dernière est ornée d'un linteau à accolade. Si la façade sud, à l'origine aveugle, a été percée par de multiples ouvertures dans la deuxième moitié du XXe siècle, la façade nord semble avoir été remontée à une date indéterminée (mais peut-être ancienne). L'analyse stylistique - linteau à accolade et arc de décharge en pierre debout  et la mise en uvre soignée en pierre de taille de granite permettent de dater la tour de la fin du XVe siècle. La fenêtre de l'étage du logis semble plus ancienne que celle du rez-de-chaussée : il pourrait s'agir, à l'origine, d'un logis long ressemblant à celui du Launay à Ploubezre.Le manoir secondaire A l'est : un vaste logis secondaire couronné par deux lucarnes ; il est flanqué d'une tour d'escalier en élévation postérieure. La tour affecte un plan parallélépipédique puis circulaire : elle est percée de plusieurs fenêtres.","habitants":"famille Jourdain. Et famille de Kersauson\"","divers":"Château de Kermerzit à Trémel.","gps":"","images":["../../jctruffet.com/image/image_22/22_Kermerzit_1.jpg","../../jctruffet.com/image/image_22/22_Kermerzit_2.jpg","../../jctruffet.com/image/image_22/22_Kermerzit_3.jpg"]},"Consult_chateau_formulaire39be":{"id":"Consult_chateau_formulaire39be","dept":"22","canton":"Lannion","commune":"Ploulec","nom":"Kerninon","type":"Château","periode":"XVIII-XIX","histoire":"KERNINON, la partie plus récente, et qui est encore la façade d'aujourd'hui date, quant à elle, de la fin du XVIIe siècle, début XVIIIe. Cette fois, la bâtisse devenue château appartient aux Le Roux. « Ici, on a tous les signes d'une ancienne noblesse. Sur la propriété, on trouve notamment deux colombiers, ce qui est rare et qui prouve qu'au-delà de la quarantaine d'hectares du domaine de l'époque des Le Roux, d'autres biens appartenaient à cette famille. Le commerce du lin ayant fait la fortune de cette dynastie.  On dit que jusqu'à la moitié de la commune de Ploulec'h leur appartenait. Les Le Roux, par mariage, se sont associés au cours de leur histoire à la famille De Kerninon, qui a ensuite donné le nom à la demeure. « C'était une famille très puissante ».  La saga Le Roux a tragiquement pris fin avec l'assassinat du comte de Kerninon, dont les plus anciens de la commune se souviennent encore car ce fut un roman judiciaire particulièrement croustillant. Tué de trois balles en plein thorax par son épouse. C'était en 1924. Dans les mains d'un commerçant durant quelques années, ce sont les Guilhe de la Combe de Villers qui leur succèdent en 1929. Très brièvement. Le temps malgré tout d'en faire la première maison électrifiée du territoire. Puis Jean de Belizal, qui fut également maire de Ploulec'h, achète le château en 1937 et y mourra à l'âge de 102 ans. Sa fille veut continuer de donner une âme à la bâtisse, mais aussi aux dépendances, aux colombiers, aux écuries, au routoir devenu étang, à la fontaine autour de la devise familiale \"Sans fiel\".","architecture":"KERNINON,  château datant de la fin du XVIIIe siècle ou du début du XIXe siècle. Outre un colombier disparu, il comprend une chapelle et un ancien logement contemporain de la construction du château (à l'entrée de la cour), ainsi qu'un autre logement du début du XIXe siècle (à gauche du corps de logis principal). Château de style classique précédé d'une allée et d'une cour intérieure délimitée par un mur de clôture. Le corps de logis, de type ternaire à neuf travées, est construit en granit sur un plan rectangulaire allongé, double en profondeur. La façade antérieure montée en grand appareil de granit et caractérisée par l'ordonnancement des élévations, présente un avant-corps ouvert d'une porte d'entrée et couronné d'un fronton orné d'un blason. Un logement, de type ternaire, est situé à gauche du corps de logis principal. Une chapelle et un logement sont disposés de part et d'autre du portail desservant l'accès à la cour intérieure du château.","habitants":"Famille le Roux et lafamille De Kerninon\"","divers":"Château de Kerninon à Ploulec'h","gps":"","images":["../../jctruffet.com/image/image_22/22_Kerninon_1.jpg","../../jctruffet.com/image/image_22/22_Kerninon_2.jpg"]},"Consult_chateau_formulairebfe8":{"id":"Consult_chateau_formulairebfe8","dept":"22","canton":"Plestin-les-Grèves","commune":"Loguivy-Plougras","nom":"Kerroué","type":"Château","periode":"XVI","histoire":"KEROUE,  le manoir ou château de Kerroué du XVIe siècle. La bâtisse centrale remonte au XVIe siècle (vers 1580) et le manoir placé en équerre date du XVIIe siècle. Le château primitif avait été édifié au XVIe siècle par le seigneur de Kerroué, Alain du Dresnay. Le château deviendra ensuite la propriété successive des familles Lagadec, Rocquefeuil-Montperroux  et Poré du Breuil. Propriété de la famille La Morinière depuis 1990, l'édifice est en cours de réhabilitation. Durant la Révolution, Kerroué servi de refuge occasionnel au chef chouan Poens et au prêtre insermenté de Plougras, Philippe-Ange Ellès.","architecture":"KERROUE sa construction date du XVIe et XVIIe siècle à l'époque des Guerres de Religion. La grange du manoir de Kéroué date du XVIe siècle, le corps de logis principal de la fin du XVIe siècle, et l'aile droite, du début du XVIIe siècle. Le manoir de Kéroué témoigne d'un retour à l'architecture défensive suscité par les Guerres de Religion. L'édifice devait former un corps central dans le plan primitif, avec une tourelle d'escalier, une échauguette, et des mâchicoulis sur le pignon Sud. Un second pavillon servait au départ de métairie. Le manoir, à savoir le corps de logis en ruine et l'aile appelée manoir, ainsi que la grange faisant face à cette aile sont classés aux M.H. depuis le 27/09/1993. Le manoir de Kéroué a été inscrit aux M.H. du 3/06/1927 puis Classé aux M.H. du 27/09/1993","habitants":"Famille d'Alain du Dresnay\"","divers":"A  Loguivy-Plougras le château   de Keroué                                                              GPS : 48° 31' 13\" Nord, 3° 31' 32\" Ouest","gps":"48° 31' 13\" Nord, 3° 31' 32\" Ouest","images":["../../jctruffet.com/image/image_22/22_Kerrou%c3%a9_1.jpg","../../jctruffet.com/image/image_22/22_Kerrou%c3%a9_2.jpg","../../jctruffet.com/image/image_22/22_Kerrou%c3%a9_3.jpg","../../jctruffet.com/image/image_22/22_Kerrou%c3%a9_4.jpg","../../jctruffet.com/image/image_22/22_Kerrou%c3%a9_5.jpg"]},"Consult_chateau_formulaired864":{"id":"Consult_chateau_formulaired864","dept":"22","canton":"Lamballe-Armo","commune":"Lambale","nom":"Lambale","type":"Château","periode":"XVIII","histoire":"Trois châteaux dans cet article de  Lamballe, son Haras et Moglais. MOGLAIS, la seigneurie de la Moglais est attestée dans la campagne lamballaise depuis le XIVe siècle. Un manoir, dont il reste peu de traces visibles, y précéda le château actuel qui date du XVIIIe siècle. Une inscription gravée sur le perron fait penser que sa construction était achevée en 1734. Jérôme du Bouilly petit-fils de Sébastien, en est sans doute lauteur, à moins que ce ne fût son fils Guillaume dont lhéritière, Hélène du Bouilly, allait épouser François de La Moussaye. Lallure et la disposition des bâtiments, et de nombreux détails intérieurs, tels que la voûte de lescalier de granit et le travail de la rampe en fer forgé qui court jusquà létage, ou les salons, avec leurs boiseries Régence, témoignent de cette époque. A la mort de la petite-fille du marquis de La Moussaye-Carcouët, Berthe de Villèle, La Moglais fut vendue à son cousin de La Ville Roger, un autre marquis de La Moussaye, fils du général de La Moussaye et de Béatrice de Séran. Il transmet la Moglais en 1946 à sa fille Eliane qui sefforça, pendant un demi-siècle, de maintenir et de restaurer la propriété. Son époux, le comte Michel de Beaumont, avait entrepris en 1950, de redessiner le jardin à la française daprès danciennes gravures du XVIIIe siècle, leur petit fils Geoffroy de Longuemar avec sa femme Evelyne, s'attachent à poursuivre les restaurations intérieures et à embellir les jardins.","architecture":"MOGLAIS, éléments protégés MH; le logis principal pour ses façades et toitures et pour ses intérieurs des XVIIIe et XIXe siècles (entrée, escalier d'honneur et cage d'escalier; le bâtiment dénommé théâtre ou salle des fêtes, pour ses façades et toitures ; la cour d'honneur et le jardin pour leurs sols d'assiette, leurs murs, éléments de clôture et fossés, les deux pavillons situés de part et d'autre de la grille d'entrée, les douves ornementales avec le pont orné de sphynges, les statues, vases et vasques ; la partie conservée de l'ancienne avenue établie au nord-ouest, pour son sol d'assiette : inscription par arrêté du 16 novembre 2011.                          LAMBALLE, le haras national de Lamballe est l'un des cinq pôles équestres de la région française Bretagne. À l'origine, c'est un dépôt d'étalons royaux, créé à l'automne 1783 dans l'unique écurie d'une caserne de la ville de Lamballe   Le Haras national de Lamballe, berceau du célèbre Postier Breton. Rentrez dans un univers unique dédié aux chevaux : écuries abritant les étalons de traits et postiers bretons, selleries, remise à voitures hippomobiles, expositions, poneys et ânes de la cavalerie pédagogique, spectacles équestres, compétitions sportives.","habitants":"Moglais; famille des du Bouilly\"","divers":"Deux châteaux Lamballe    grav 1-2(haras)  et Moglais grav-3-4                   GPS : 48° 28' 12\" Nord, 2° 29' 6,6\" Ouest","gps":"48° 28' 12\" Nord, 2° 29' 6,6\" Ouest","images":["../../jctruffet.com/image/image_22/22_Lamballe_1.jpg","../../jctruffet.com/image/image_22/22_Lamballe_2.jpg","../../jctruffet.com/image/image_22/22_Lamballe_3.jpg","../../jctruffet.com/image/image_22/22_Lamballe_4.jpg"]},"Consult_chateau_formulaire0897-2":{"id":"Consult_chateau_formulaire0897-2","dept":"22","canton":"Plestin-les-Grèves","commune":"Ploumilliau","nom":"Lanascol","type":"Château","periode":"XVI","histoire":"LANASCO, édifice datant de la première moitié du XVIe siècle, agrandi au XVIIe (tour couverte en pavillon) et XVIIIe siècle (deux ailes en équerre). Propriété de la famille Quemper de Lanascol sous l'Ancien Régime, il fut acquis par Guillaume Mahé de Morlaix au moment de la vente des bien nationaux le 21 Germinal de l'an II, puis acheté par Lady Mond vers 1920. Il possède également un colombier en Plouzélambre datant du XVIe ou du XVIIe siècle.","architecture":"LANASCO, château construit en granite, il comprend un corps de logis de plan rectangulaire allongé, à trois pièces par étage, avec tour d'escalier polygonale en façade antérieure possédant une pièce haute desservie par une tourelle secondaire en encorbellement. Un corps de bâtiment de plan carré, couvert d'un toit en pavillon, orné d'une corniche à modillons, le prolonge à l'est. Deux autres corps de bâtiments en équerre complètent l'ensemble côté nord (un corps de type ternaire à cinq travées régulières comprenant une aile en retour d'équerre à l'arrière). Le colombier, situé au sud de l'ensemble, est couvert d'une coupole en pierre.","habitants":"famille Quemper de Lanascol  et  Lady Mond \"","divers":"Château de Lanasco à Ploumilliau","gps":"","images":["../../jctruffet.com/image/image_22/22_Lanascol_1.jpg","../../jctruffet.com/image/image_22/22_Lanascol_2.jpg","../../jctruffet.com/image/image_22/22_Lanascol_3.jpg"]},"Consult_chateau_formulaire1377":{"id":"Consult_chateau_formulaire1377","dept":"22","canton":"Guerlédan","commune":"Langast","nom":"Langast","type":"Château","periode":"XV-XVII-XX","histoire":"Deux châteaux à Langast les Essarts et du Rochay.                                                                                  ESSARTS , le château des Essarts actuel remplace un bâtiment du XVe siècle duquel il ne subsiste que les grilles. La partie nord-ouest est la partie la plus ancienne datant du XVIIIe siècle (1773). L'édifice affiche une dissymétrie troublante et se caractérise par un style très dépouillé avec très peu d'ornements. Le corps du bâtiment principal qui fut construit au début du XXe siècle (1920) est bâti en schiste rouge. Le château des Essarts est la propriété de Gilles de Kergutenne en 1500, de Gilles de Kermené en 1513 et en 1536     propriété des Kermené.   Coupé des Essarts au XVIIIe siècle et de la famille La Motte-Rouge au XXe siècle. On y voyait autrefois une chapelle privative, située au nord de la demeure.","architecture":"Du-ROCHAY, édifice ancien, probablement construit aux XVe et XVIIe siècles, puis agrandi vraisemblablement par la famille Carré dans la deuxième moitié du XIXe siècle. Important corps de bâtiment ancien de plan rectangulaire accosté d'une aile basse en retour d'équerre (un étage carré) prolongé par un corps de logis moderne comprenant deux étages carrés sur rez de chaussée et un étage de comble.","habitants":"Les Essarts; Famille de   Gilles de Kermené        Rochay; famille Carré\"","divers":"Deux châteaux à Langast les Essarts grav-1  et du Rochay grav-2.","gps":"","images":["../../jctruffet.com/image/image_22/22_Langast_1.jpg","../../jctruffet.com/image/image_22/22_Langast_2.jpg"]},"Consult_chateau_formulaire748e":{"id":"Consult_chateau_formulaire748e","dept":"22","canton":"Lannion","commune":"Lannion","nom":"Lannion","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Lannion; Cruguil, Crech-ugien, Kerivon et à Tréburden le château de Lan-Kerellec  hôtel restaurant et villa Nelly -Ker Woel et autres                                                                            CRUGUIL, la construction du Château du Cruguil date du XVe siècle. Cette ancienne résidence de la Famille de Lannion fut transformée en ferme dès le XVIIe siècle. Au XIXe siècle le château passa par le mariage de la dernière des Lannion à la famille de Mac-Mahon, qui l'a transmis à la fin du XIXe siècle au comte de Lur-Saluces dont la fille épousa le baron Hainguerlot, ancien Maire de Brélevenez. Le château est resté depuis dans cette famille il se visite chaque été. Autour du manoir, le parc de 5 ha situé à la sortie de Lannion en direction de Perros-Guirec comprend un jardin à la Française composé d'une charmille et de parterres plantées chaque année de 3 000 fleurs et un jardin romantique avec l'étang, le lavoir et la fontaine. La chapelle est ouverte à la visite.                                             LANGONAVAL, ce manoir a été construit au XVe siècle, après 1420 et l'attentat de Champtoceaux contre le Duc de Bretagne. La seigneurie de Kerampont est alors donnée à un valet de chambre du duc. Il y a deux constructeurs possibles: Jean Périou, trésorier à la chambre ducale, et Jean Trillette, qui lui aussi faisait partie de la chambre ducale. Ce manoir a subi de nombreuses transformations,  Le bâtiment a été raccourci du côté nord, quand la rue de Kerampont est devenue commerçante. Ce devait être à la fin du XVIe siècle. On a fait d'un manoir rural un bâtiment à fonction commerciale. Il garde beaucoup de ses mystères. Quand on regarde les familles qui l'ont possédé, on trouve des alliances avec des marchands de vin de Bordeaux. Quant à son nom, il y a peut-être eu un transport toponymique de Langolaval, en Plouigneau. Manoir, sauf parties classées : inscription par arrêté du 7 décembre 1925 ; Façades et toitures : classement par arrêté du 14 novembre 1983.","architecture":"KERIVON, la construction du Château de Kérivon date du XVIIIe et XIXe siècle. L'Architecte ou maître d'oeuvre était Geoffroy de Ruillé (sculpteur).  Le Château de Jérivon a été reconstruit à partir de 1724 par la famille Carcaradec, en remplacement d'un manoir médiéval qui existait déjà au XIIIe siècle. Au XIXe siècle, les menuisiers poursuivaient la décoration intérieure des boiseries. Le parc a été aménagé au XIXe siècle autour du château. L'étang situé derrière la demeure a été creusé et dallé, les grandes allées plantées, le vieux jardin démoli et remplacé par un potager. Ses caractères principaux sont le rôle déterminant des perspectives, l'importance de l'eau, la prédominance des espaces boisés. De nouveaux éléments ont été ajoutés à cette époque, liés à la plaisance ou à l'économie du domaine : glacière, four à pain, serres, remise à voiture, sellerie. Les vestiges du XVIIIe siècle ont été conservés (pigeonnier, hangar à bateaux, grande écurie, basse-cour). L'ensemble est représentatif de l'organisation d'un parc XIXe siècle autour d'une grande demeure du 18e. La grande statue équestre date de 1914 et est due à Geoffroy de Ruillé. Le Château de Kérivon est classé aux M.H. depuis le 2 juillet 1992.                                                                                                                  CREC'H UGIEN est un château bâti à Lannion. Ensemble formé de trois éléments : un manoir, la façade nord des communs et le pavillon d'entrée. Le manoir construit au XVIIIe siècle, est un bâtiment de style Louis XV, rectangulaire, auquel a été ajouté une adjonction sur le côté nord, construite à la même époque. Toutes les ouvertures possèdent des linteaux cintrés et un encadrement légèrement en saillie. Le pavillon d'entrée est ruiné.\nÉléments protégés MH : les façades et les toitures du manoir, du bâtiment des communs et du pavillon d'entrée: inscription par arrêté du 18 juillet 1973.","habitants":"Cruguil; Famille de Mac-Mahon                     Kerivon; famille Carcaradec,                      Lan-Kerellec                                    Famille  de Crech  et famille de Langonaval\"","divers":"Deux châteaux à Lannion; Cruguil, crech-ugien grav 1-2 et Kerivon grav-3-4. et à Tréburden grav 6-7 le château de Lan-Kerellec                                                                              et manoir de Langonaval grav-5 et manoir de Launay grav-9                       GPS : 48° 44' 00\" Nord, 3° 27' 15\" Ouest","gps":"48° 44' 00\" Nord, 3° 27' 15\" Ouest","images":["../../jctruffet.com/image/image_22/22_Lannion_1.jpg","../../jctruffet.com/image/image_22/22_Lannion_2.jpg","../../jctruffet.com/image/image_22/22_Lannion_3.jpg","../../jctruffet.com/image/image_22/22_Lannion_4.jpg","../../jctruffet.com/image/image_22/22_Lannion_5.jpg","../../jctruffet.com/image/image_22/22_Lannion_6.jpg","../../jctruffet.com/image/image_22/22_Lannion_7.jpg","../../jctruffet.com/image/image_22/22_Lannion_8.jpg","../../jctruffet.com/image/image_22/22_Lannion_9.jpg"]},"Consult_chateau_formulaire8d2b":{"id":"Consult_chateau_formulaire8d2b","dept":"22","canton":"Plélo","commune":"Lanrodec","nom":"Lanrodec","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Lanrodec; Coetando et Goudemail.                                           COETANDO, à la fin du XVe siècle un château avec douves et colombier était la propriété de la famille Le Roux de Coëtando. Jean Baptiste Le Roux de Coëtando, marié à Françoise Angélique de Cahideux du Bois de la Motte et décédé à Trigavou en 1817, est le dernier représentant de cette famille. Le château actuel a  été reconstruit au cours du troisième quart du XIXe siècle par la famille Le Saulnier de Saint-Jouan sur les terres de l'ancienne seigneurie de Coëtando. Une chapelle aujourd'hui détruite faisait autrefois parti du château. Actuellement le château abrite une école d'horticulture. Plan en H, deux pavillons latéral encadrant symétriquement un corps central à l'arrière duquel est accolé une annexe renfermant un jardin d'hiver. Élévation ordonnancée, abrite une école d'horticulture.","architecture":"GOUDEMAIL,  l'édifice atypique se présente, à l'instar d'un Trévarez, comme un objet architectural sorti de son contexte de production. L'attribution à un architecte parisien comme Parent est en cela plausible. Grand château de style Louis XIII, précédé d'un jardin à la française, entouré de communs et d'un parc paysager, il s'inscrit dans un ensemble homogène et authentique de grande qualité. Par sa forte affirmation dans le paysage rural duquel il s'est totalement exclu géographiquement et architecturalement, il peut apparaître comme représentatif de ce qu'est le château du XIXe siècle. Edifice de plan en H composé d'un corps central à cinq travées et de deux corps latéraux perpendiculaires allongés à pans coupés. Élévation en brique avec encadrements de baies et bandeaux en appareil alterné. Les toitures, à croupe et en pavillon, sont couvertes d'ardoise. A l'intérieur, une cheminée monumentale de boiserie Louis XIV a été remployée dans un salon.  Propriété du comte de Longéril.","habitants":"Caetando; famille Le Roux de Coëtando           Goudemail;comte de Longéril.    \"","divers":"Deux châteaux à Lanrodec; Coetando et Goudemail- grav-2-.     GPS : 48° 31' 01\" Nord, 3° 01' 47\" Ouest","gps":"48° 31' 01\" Nord, 3° 01' 47\" Ouest","images":["../../jctruffet.com/image/image_22/22_Lanrodec_1.jpg","../../jctruffet.com/image/image_22/22_Lanrodec_2.jpg"]},"Consult_chateau_formulaire6962":{"id":"Consult_chateau_formulaire6962","dept":"22","canton":"Lanvallay","commune":"Lanvalley","nom":"Lanvalley","type":"Château","periode":"XVIII-XIX-XX","histoire":"Trois châteaux à Lanvalley ; Grimont, Landeboulou et la Vairie. GRIMONT, le château de Grimont ou Grillemenont est construit au XIXe siècle à l'emplacement d'un ancien manoir. Appartint aux familles Orvoit de Saint-Michel, au XIXe siècle, Le Fer de la Gervinais aux XIXe et XXe siècles et Loysel au XXe siècle. C'est un édifice, de plan allongé dans la style néo-gothique, construit sur un site de promontoire en bordure de la Rance. La travée centrale de la façade postérieure présente un léger avant-corps surmonté d'un pignon et encadré de deux tourelles circulaires coiffées en poivrière.                                                                                                             LANDEBOULOU, l'ancien manoir, ferme des seigneurs de Landeboulou, construit au XVIIIe siècle, a été agrandi par la construction d'un nouveau bâtiment à la fin du XIXe ou au début du XXe siècle. Il subsiste des bâtiments et un pigeonnier à charpente de bois du XVIIIe siècle. Le château a été construit dans l'axe du corps de bâtiment ancien. Il se compose d'un haut corps couvert en pavillon à une travée et d'un corps plus bas, à deux travées, à l'angle duquel se trouve une échauguette couverte en poivrière. Le manoir du 18e siècle a été prolongé dans la deuxième moitié du XIXe siècle par une construction nouvelle qui rappelle les nombreuses villas de la côte dÉmeraude. Ces mélanges de styles historiques qualifient l'éclectisme de cette période. Ainsi tourelle et fenêtres néogothique se mêlent à des formes plus classiques, pavillon au chaînage harpé, lucarne à frontons et boules.","architecture":"La VAIRIE, le château de la Vairie est une ancienne maison seigneuriale considérablement remaniée au début du XXe siècle ; l'édifice existant, probablement du XVIIe siècle, est agrandi et restauré par la famille Ferron. Demeure composée d'un sous-sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble. Edifice de plan rectangulaire allongé agrandi par un corps de bâtiment perpendiculaire latéral en retour d'équerre sur la façade postérieure. Construction en moellon avec encadrements de baies, chaînes d'angle, bandeaux horizontaux et lucarnes en pierre de taille.","habitants":"Grimont; Familles Orvoit de Saint-Michel  Landeboulou; Famille de Landeboulou,            la Vairie;  famille Ferron.\"","divers":"Trois châteaux à Lanvalley ; Grimont-Grav-1, Landeboulou grav-2-3  et la Vairie grav-4-5-6.","gps":"","images":["../../jctruffet.com/image/image_22/22_Lanvalley_1.jpg","../../jctruffet.com/image/image_22/22_Lanvalley_2.jpg","../../jctruffet.com/image/image_22/22_Lanvalley_3.jpg","../../jctruffet.com/image/image_22/22_Lanvalley_4.jpg","../../jctruffet.com/image/image_22/22_Lanvalley_5.jpg","../../jctruffet.com/image/image_22/22_Lanvalley_6.jpg"]},"Consult_chateau_formulairefa76":{"id":"Consult_chateau_formulairefa76","dept":"22","canton":"Tréguier","commune":"Langoat_Pleubien","nom":"Launay_Pleubien","type":"Château","periode":"XVI-XVII","histoire":"LAUNAY;  lancienne ferme et ses dépendances, nous la connaissons, tout y a été restauré dans les années 2015, les locaux servent aux activités associatives, bibliothèque, salle de réunion, repas familiaux. Le manoir lui-même est lié à la famille de Boisgelin, une famille subsistante de la noblesse féodale, originaire de Bretagne. Légué à la commune de Pleubian, en 1822 par Joséphine de Boisgelin, le manoir du Launay entame sa restauration. Une concertation va être lancée en 2021 pour décider de sa future destination, ses travaux vont commencer par la toiture, celle-ci nest plus étanche. il est également prévu une reprise de charpente là où les éléments comportent des signes de faiblesse. Cette étape achevée, les ouvertures de lédifice seront remplacées.  On se souvient encore, ce nest pas très ancien, de linitiative de la commune visant à améliorer laspect extérieur de limposant édifice.  À cet effet, une entreprise spécialisée avait posé sur les ouvertures de la façade, des panneaux représentant en trompe-lil fenêtres et portes dans lattente du « grand jour »..","architecture":"LAUNAY,  le château, construit aux XVIe et XVIIe siècles, est la propriété de la famille de Launay jusquà la Révolution. Après le retour dexil des Boubon en 1814, le château est habité par la noble famille de Boisgelin de Kerdu. Boisgelin est synonyme de valeur militaire, de vertu sacerdotale et de charité chrétienne. Marie Catherine Joséphine, comtesse de Boisgelin, vend la plus grande partie de ses biens pour soulager les malheureux, et lègue le reste aux pauvres par testament quelques jours seulement avant sa mort en 1822. Dans son testament elle désire qu'un hospice soit fondé sur sa terre de Launay pour les pauvres de la paroisse. Lhospice est alors confié aux surs de la Providence, jusquen 1914, les termes du contrat sont respectés. Après la guerre, la municipalité ne peut faire face aux dépenses de fonctionnement et dentretien de lHospice. Sous loccupation, le manoir est réaménagé et utilisé comme hôpital auxiliaire. Il est ensuite laissé à labandon et son état se dégrade. Il y a quelques années, la municipalité décide de restaurer la ferme, puis le manoir, et pour pérenniser lesprit de la donatrice, de dédier lensemble à la vie sociale et associative de la commune.","habitants":"Famille de Launay\"","divers":"Château de Launay-Pleubien à Langoat-Pleubien","gps":"","images":["../../jctruffet.com/image/image_22/22_Launay_Pleubien_1.jpg","../../jctruffet.com/image/image_22/22_Launay_Pleubien_2.jpg"]},"Consult_chateau_formulaire9819":{"id":"Consult_chateau_formulaire9819","dept":"22","canton":"Plélo","commune":"Le Foeil","nom":"Le_Foeil","type":"Château","periode":"XIV-XV-XVII","histoire":"Deux châteaux dans cet article sur le Foeil ; Crénan et Noé-Séche. CRENAN, avant l'incendie de 1927, le château de Crénan présentait un exemple d'architecture civile bretonne et se composait de deux parties de style caractéristique, datées par des armoiries, représentatives de l'architecture bretonne de la fin du XVe siècle et du début du XVIIe siècle. La partie médiévale peut être datée entre 1473 et 1500, l'aspect primitif devait intégrer la tourelle d'escalier dans l'angle de deux bâtiments, dont un bâtiment aurait été détruit lors de la reconstruction du XVIIe siècle, cette partie présente une porte d'entrée en accolade, des fenêtres à meneaux, des lucarnes ornées de lions à leurs rampants. La tour d'escalier est flanquée, dans sa partie supérieure, d'une tourelle, la tour présente un décor de mâchicoulis bretons, à retraits moulurés se terminant en console. La construction qui la flanque a été construite vers 1600. La chapelle a été construite au XVIIIe siècle.Éléments protégés MH : le château de Crénan (vestiges de l'ancien), y compris les communs : classement par arrêté du 1er décembre 1969.                                          A trois KM au nord -Est à Cohiniac le château de   RUMAIN, appartenait en 1346 à Guillaume Le Vicomte, sieur du Rumain, chevalier des ordres du Roi et grand pannetier de France, sous le règne de Philippe de Valois, sixième du nom. Racheté après la Révolution par Barthélémy Desjars, négociant, il passe à la famille Ernaud de Loudéac, puis aux Garnier-Bodéliac qui entreprennent sa restauration en 1877. Une galerie et deux tourelles sont ajoutées lors de cette campagne de travaux tandis que les intérieurs sont réaménagés (boiseries, billard). Communs et parc du XIXe siècle","architecture":"NOE-SECHE, anxcienne commanderie  des chevaliers de Malt, on y accède par un beau porche fortifié du XVe siècle. Etait la propriété d'Isabeau de Robien au XIVe siècle. En 1449, cette demeure appartient à Allain de Roc'h-bihan, puis revient à la famille de Kymerc'h ou Kerymerch. En 1479, Jeanne de Rostrenen est qualifiée de dame de Ranléon et de la Noë Sèche, c'est ensuite la famille de Tinténiac qui détient le domaine par mariage, vers 1520, de Pierre, seigneur du Porcher, avec Françoise de Kerimerch, dont il prit les armes. Le fief passe entre les mains des familles Hayes, Drouët, Guépin et Rabeil, puis Roquefeuil en 1854. Les seigneurs de La Noë-Sèche possédaient des droits d'écussons et de bancs à la chapelle Saint-Pierre de la collégiale de Quintin, quatre tombes élevées d'un demi-pied en la susdite chapelle et leurs armes en la grande vitre d'ycelle. Ils jouissaient de privilèges du même genre, dans l'église du Foeil.  La demeure est constituée de trois corps de bâtiment formant une cour intérieure. Le porche du XVe siècle, qui est flanqué d'une tour, comporte une porte charretière et une porte piétonne ornées d'arcs en accolade, de fleurons et de candélabres. Éléments protégés MH : le bâtiment d'entrée : classement par arrêté du 17 juin 1936. Propriété de la comtesse de Gréaulme.","habitants":"Crenan; Famille de Crenan                                                          Noé; Famille de Tinténiac\r\n        \r\n        \"","divers":"Deux châteaux dans cet article sur le Foeil ;  Crénan et Noé-Séche grav-1-2-3   Rumain grav-4                                             . Crénan GPS : 48° 25' 46\" Nord, 2° 54' 50\" Ouest                                           Noé GPS : 48° 23' 13\" Nord, 2° 55' 36\" Ouest","gps":"48° 25' 46\" Nord, 2° 54' 50\" Ouest","images":["../../jctruffet.com/image/image_22/22_Le_Foeil_1.jpg","../../jctruffet.com/image/image_22/22_Le_Foeil_2.jpg","../../jctruffet.com/image/image_22/22_Le_Foeil_3.jpg","../../jctruffet.com/image/image_22/22_Le_Foeil_4.jpg"]},"Consult_chateau_formulaireb5fb":{"id":"Consult_chateau_formulaireb5fb","dept":"22","canton":"Broons","commune":"Sevignac","nom":"Limoëlan","type":"Château","periode":"XIV-XVIII","histoire":"LIMOËLAN, il existe deux châteaux de Limoëlan : le premier château de la seigneurie dite de Beaumanoir Beaumont, terre noble possédant le droit de haute justice, fut la propriété des familles Rousselot au XIVe siècle, de Dinan aux XIVe et XVe siècles, de la Chapelle de Beuvres au XVIe siècle, de Guémadeuc au XVIe siècle, de Beaumanoir au XVIe siècle, d'Espinay au XVIIe siècle, et de Lorraine en 1689. Il a été racheté en 1758  par Michel Julien Alain Picot de Clorivière, qui fait construire en 1779 le nouveau château de Limoëlan, à côté de l'ancien. Son fils, Joseph Picot de Limoëlan,  dit le chevalier le Limoëlan, est célèbre pour sa participation à l'affaire de la machine infernale, attentat dirigé contre Bonaparte à Noël en 1800. Après la Révolution, Limoëlan fut la propriété des familles Picot de Limoëlan, Bonjour de Limoëlan et de Chappedelaine, l'ancien château entouré de douves, il ne subsiste qu'une partie à usage de ferme.","architecture":"LIMOËLAN, le nouveau château  de plan rectanggulaire à deux niveaux et série de lucarnes sur combles et lucarne gothique à pinacles centrale sur bulbes sur la partie centrale  du toit en croupes.                                                                      L'ancien manoir de plan en équerre à un niveau, toit en croupes.\n Éléments protégés MH : l'ensemble constitué par le vieux château et ses douves, le colombier, le château XVIIIe siècle avec la chapelle, le pavillon des Archives, les communs, la terrasse et le jardin : inscription par arrêté du 18 mars 1991.","habitants":"Famille de Michel Julien Alain Picot de Clorivière\"","divers":"Château de Limoêlan à Sévignac GPS : 48° 20' 01\" Nord, 2° 20' 14\" Ouest","gps":"48° 20' 01\" Nord, 2° 20' 14\" Ouest","images":["../../jctruffet.com/image/image_22/22_Limo%c3%ablan_1.jpg","../../jctruffet.com/image/image_22/22_Limo%c3%ablan_2.jpg"]},"Consult_chateau_formulaire5e4a":{"id":"Consult_chateau_formulaire5e4a","dept":"22","canton":"Guingamp","commune":"Ploumagoar","nom":"Locmaria","type":"Manoir","periode":"XIV-XVIII","histoire":"LOCMARIA, son propriétaire, Olivier Thomas a réalisé seul ce travail de restauration, en travaillant les soirs et week-ends avec les gestes et techniques du Moyen-Age, tous corps de métiers confondus : maçonnerie, taille de pierre, charpente, menuiserie, couverture. Le manoir de Locmaria, le plus vieux patrimoine bâti de Carnoët, retrouve la splendeur quil avait du temps de Jean de Lémo et Marie du Bois les propriétaires du XVIe siècle. Une fierté pour son propriétaire Olivier Thomas, qui tient aussi à rendre hommage à son ami Jérôme Caouën « qui a fait un travail de recherche remarquable. En fouillant les archives du fond Kerouartz, il a déniché des trésors de parchemins sur la vie au Moyen-Age à Locmaria et a permis didentifier les armoiries authentiques des seigneurs qui ont été replacées sur les vitraux du manoir ». Le manoir de Locmaria, du XVIIIe siècle.","architecture":"LOCMARIA, la construction du manoir de Locmaria date des XIVe et XVe siècles. Il a été reconstruit en 1720, est inscrit aux M.H. depuis le 23/12/1985 pour ses façades et toitures, sa chapelle, son escalier et sa salle à manger. Son propriétaire Olivier Thomas ne ménage pas sa peine pour que le manoir de Locmaria retrouve toute sa splendeur. l a fallu une année pour que la tour du manoir de Locmaria, à Carnoët, retrouve son niveau dorigine. Le manoir est restauré progressivement depuis 2008 par son propriétaire qui réalise lui-même la totalité des travaux, lequel n'utilise pour sa restauration que des techniques traditionnelles utilisées par le passé.\nOn a ici un ensemble complet pour le centre Bretagne: grange, crèche, écurie, poulailler, logis seigneurial et étable. L'appareillage est en schiste, grès et granite. Une muraille clôture la haute cour et la basse cour avec un portail monumental à l'ouest et un autre au sud. La cour est directement sur l'affleurement rocheux. On trouve également un puits très ancien autrefois à balancier.","habitants":"Famille d'Olivier Thomas\"","divers":"Locmaria à  Ploumagoar Carnoet                                                    GPS : 48° 32' 45\" Nord, 3° 07' 53\" Ouest","gps":"48° 32' 45\" Nord, 3° 07' 53\" Ouest","images":["../../jctruffet.com/image/image_22/22_Locmaria_1.jpg","../../jctruffet.com/image/image_22/22_Locmaria_2.jpg","../../jctruffet.com/image/image_22/22_Locmaria_3.jpg","../../jctruffet.com/image/image_22/22_Locmaria_4.jpg"]},"Consult_chateau_formulaire2c8e":{"id":"Consult_chateau_formulaire2c8e","dept":"22","canton":"Loudéac","commune":"Loudéac","nom":"Loudéac","type":"Château","periode":"XVI-XVIII-XIX","histoire":"LOUDEAC,   est un château construit au XIXe siècle, de style néogothique. La superficie du château est de 150m2. Il comporte 15 pièces dont 9 chambres.                                                                                      ViILLE-AUDRAIN, du XVIe siècle. Propriété de Tristan de Kerguezengor en 1480 et de Jacques de Kerguezengor en 1514.\nManoir de Ténoquevel du XVIIe siècle,; reconstruit au XXe siècle conservant un vestige du XVIe siècle : la tour d'escalier. En 1829 d'après le cadastre ancien, le manoir présente une configuration conforme au genre : cour bordée de deux ailes en équerre, plan d'eau dit étang avec chaussée au sud. Manoir conservant une tour d'escalier en hors-oeuvre en façade, couverte d'un toit polygonal en ardoise, construite en moellon équarri de schiste. Le reste du manoir a été complètement reconstruit dans un style néo-régionaliste.","architecture":"PLESSIS-BOUDET,  du XVIIIe siècle. En 1370, le domaine du Plessis-Boudet, situé en bordure ouest de la forêt de Loudéac, appartient au vicomte Jean Ier de Rohan et dépend de la juridiction de La Chèze. Celui-ci le donne en partage, le 18 août 1370, à ses oncles Geoffroi et Josselin de Rohan. Propriété du vicomte de Rohan en 1442, de Louis des Deserts en 1536 et
