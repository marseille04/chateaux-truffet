pour bénéficier de la protection des Virieu.","architecture":"VIRIEU, cité au XIIIe L'origine du château maison seigneuriale qui se transforma en demeure de plaisance fin XVIe siècle et château au XVIIe siècle en défense,  édifice constitué d'un corps de logis flanqué de deux tours rondes, la tour du Sud-Ouest transformé en donjon néo-médiéval à la fin du XIXe siècle par Alexandre-Julien, porte d'entrée surmontée d'un fronton .","habitants":"Seigneur Jean de Fay\r\n        \"","divers":"Château de Virieu à Pelussin","gps":"","images":["../../jctruffet.com/image/image_42/42_Pelussin_Virieu_1.jpg","../../jctruffet.com/image/image_42/42_Pelussin_Virieu_2.jpg","../../jctruffet.com/image/image_42/42_Pelussin_Virieu_3.jpg","../../jctruffet.com/image/image_42/42_Pelussin_Virieu_4.jpg","../../jctruffet.com/image/image_42/42_Pelussin_Virieu_5.jpg"]},"Consult_chateau_formulaire9724":{"id":"Consult_chateau_formulaire9724","dept":"42","canton":"St-Germain-Laval","commune":"Pommiers-en-Forez","nom":"Pommiers_Forez","type":"Prieuré","periode":"X","histoire":"POMMIERS, le site de Pommiers a été occupé par les Romains, au cours du Haut-Moyen-Age des moines bénédictins au IXe siècle, établirent une communauté bénédictine à Pommiers, rattaché à Nantua, puis à Cluny, elle fit construire l'église-prieuré fortifié qui fut la résidence des seigneurs éclésiastiques pendant la guerre de Cent-Ans.  Au XIVe siècle  Pommiers-village s'enferme dans une enceinte pour se protéger des brigands donnant au site l'apparence d'un château.   En 1531 François Ier est reçu à Pommiers. Après la Révolution, vendu comme bien national le Château-Prieuré  a été habité par des notables les Bourganel qui ont réaménagé l'intérieur en 1946, ils s'en séparent au profit de  Mademoiselle Marie-Thérése de Rosemont et en 1990 le conseil général de la Loire en devient propriétaire.","architecture":"Pommiers, l'origine est une église du IXe siècle qui devient prieuré et construction des bâtiments, au XVe siècle renforcements des défenses, aux XVIe siècle construction du logis du prieur, lors de la guerre de cent ans la construction de grosses tours rondes sur la surface sud s'imposent, le village se fortifie par  deux portes pont-levis flanquées de deux tours à archères. L'ensemble des logis monastiques remontent  entre  1500-1555.   Au XVIIe des travaux d'embellissement ont été entrepris et cette cité na pas guère perdu de son cachet du Moyen-Age.","habitants":"Famille des Bourganel\r\n        \"","divers":"Dans la commune deux autres châteaux, le Vernoilles et le Val-d'Ozon.","gps":"","images":["../../jctruffet.com/image/image_42/42_Pommiers_Forez_1.jpg","../../jctruffet.com/image/image_42/42_Pommiers_Forez_2.jpg","../../jctruffet.com/image/image_42/42_Pommiers_Forez_3.jpg","../../jctruffet.com/image/image_42/42_Pommiers_Forez_4.jpg"]},"Consult_chateau_formulaired1bf":{"id":"Consult_chateau_formulaired1bf","dept":"42","canton":"Roanne","commune":"Roanne","nom":"Roanne","type":"Château","periode":"XV","histoire":"ROANNE, le château cité en 1205 de  Philippe Auguste,  les conventions entre les petits enfants du comte de Forez et les enfants de Guy de Dampierre seigneur de Bourbon, et en 1260 Damas de Roanne en fit hommage au comte de Forez.           Roanne siège de la justice seigneuriale est une bourgade jusqu'à la fin du XVe siècle, à cette époque un deuxième château voit le jour, il est édifié par les seigneurs de Roanne, comte du Forez. La demeure seigneuriale devient prison et tribunal avant de résider dans l'ancien couvent des Ursulines au XIXe siècle. ( Le père Cotton 1524-1626 confesseur d'Henri IV puis de Louis XIII fondateur dans un ancien château du collège des jésuites de Roanne en 1607 une porte a son nom au faubourg Mulsant).            A la Révolution les biens seigneuriaux et religieux  furent confisqués. Le château de Roanne est symbolisé par son donjon et depuis 1808 dans la descendance de la famille de Madame Marijon, le Marquis de St-Vincent reçoit Voltaire est le Marquis de St-André madame de Delfand sa cousine.                                          En 1874 la ville est décoré de la Légion d'honneur promise par Napoléon Ier par le duc de Percigny pour avoir fait fuir les Autrichiens en 1810. Aujourd'hui propriété de la ville il abrite l'office du tourisme.","architecture":"Roanne, du Château il ne reste que le donjon  haut de 20 mètres, carré XII-XVe siècle à angles arrondis ressemblant à celui de l'Espinasse est surmonté d'une guérite qui renferme cinq salles superposées.","habitants":"Roanne, les comtes du Forez Champlong.                               \r\nFamille Durand de Châtelus\r\n        \"","divers":"Donjon et château de Mably, Tour Acier CHAPELLE  Mairie","gps":"","images":["../../jctruffet.com/image/image_42/42_Roanne_1.jpg","../../jctruffet.com/image/image_42/42_Roanne_2.jpg","../../jctruffet.com/image/image_42/42_Roanne_3.jpg","../../jctruffet.com/image/image_42/42_Roanne_4.jpg","../../jctruffet.com/image/image_42/42_Roanne_5.jpg","../../jctruffet.com/image/image_42/42_Roanne_6.jpg","../../jctruffet.com/image/image_42/42_Roanne_7.jpg"]},"Consult_chateau_formulaire23f0":{"id":"Consult_chateau_formulaire23f0","dept":"42","canton":"St-Etienne","commune":"Roche-La-Molliere","nom":"Roche_La_Molliere","type":"Château","periode":"XII","histoire":"ROCHE-LA-MOLLIERE, le nom de la Roche apparaît pour la première fois au XIIIe siècle \"Guillelmus de Rocha Moeyra\" pays de la houille.  Seigneurie citée en 1173 aux de Roche la Mollière qui en rendit hommage au comte de Forez,  ensemble médiéval le plus important de la région stéphanoise, remontant au XIIe siècle à la fin du XIIIe siècle aux sire de Lavieu qui fut érigée en baronnie jusqu'en 1450, puis différentes familles en furent propriétaires et les derniers les Neyron de Saint-Julien qui vendit le château en 1950 à la ville.  Aujourd'hui propriété de la commune (musée) un autre château privé La Roère.","architecture":"Roche-la-Mollière, ce château du XIIe siècle, son architecture témoigne aujourd'hui principalement des XVe et XVIIIe siècle, Corps de logis en équerre à trois niveaux, tour centrale polygonale, et donjon sur l'arrière  de la cour protégé par des remparts, des archères, et courtine.","habitants":"Famille de Lavieu\r\n        \"","divers":"Château de la Mollière","gps":"","images":["../../jctruffet.com/image/image_42/42_Roche_la_Molliere_1.jpg","../../jctruffet.com/image/image_42/42_Roche_la_Molliere_2.jpg","../../jctruffet.com/image/image_42/42_Roche_la_Molliere_3.jpg","../../jctruffet.com/image/image_42/42_Roche_la_Molliere_4.jpg","../../jctruffet.com/image/image_42/42_Roche_la_Molliere_5.jpg","../../jctruffet.com/image/image_42/42_Roche_la_Molliere_6.jpg"]},"Consult_chateau_formulaire2e8e":{"id":"Consult_chateau_formulaire2e8e","dept":"42","canton":"Boën","commune":"St-Laurent-Rochefort","nom":"Rochefort(42)","type":"Vestiges","periode":"XII","histoire":"ROCHEFORT, château pour lequel Hugues Ier  de Rochefort en fait hommage a Guy II, comte du Forez en 1180, cette seigneurie passa aux Rougemont qui déclarèrent la guerre au Bourguignon et à la Champagne, en 1274 la seigneurie passe à Jean de Chalons et fut repris en 1310 par Jean de Rochefort, la famille s'éteint en 1382 de son petit-fils  Eustache, pendant deux siècles cette seigneurie changera  cinq  fois entre les seigneurs d'Urfé et de Lavieu, en 1440 Anne de Rochefort reprend cette seigneurie et la possession du château qui avait été démantelé et en 1410 par Jean sans Peur et reconstruit par Jean de Chalons, en 1485  Le château est racheté  par Jacques Coietier (Chambellan du roi  Louis XV et vice président de la chambre des comptes à Paris) remanie le château en style renaissance, et en 1555, Louis de Chalmazel prend la seigneurie  de Rochefort et en 1578 Anne d'Urfé est seigneur de Rochefort.   En 1596 le château commence à être   démantelé, et revendu  en 1638 à Louis de Perne seigneur de Périgny sur Amançon. En 1661 racheté à nouveau par Denis Langlet (procureur au parlement de Dijon) et à la veille de la Révolution  le château revient à la famille de Laguiche qui en sont toujours propriétaire aujourd'hui mais le château est démantelé et  sert de carrière de pierre.","architecture":"Rochefort, sur un piton rocheux pour la protection du passage de la voie romaine \"Strata bornenchi\" Forez-Auvergne; château construit en 1150 remanié au cours des siècles suivant puis démantelé en 1596, seul reste  une porte en plein cintre.","habitants":"Famille de Jean de Rochefort                                                             Famille de Jean de Châlons\r\n        \"","divers":"Vestige du château de Rochefort","gps":"","images":["../../jctruffet.com/image/image_42/42_Rochefort(42)_1.jpg"]},"Consult_chateau_formulaireed9a":{"id":"Consult_chateau_formulaireed9a","dept":"42","canton":"St-Etienne","commune":"St-Etienne","nom":"Rochetaille","type":"Vestiges","periode":"XIII","histoire":"ROCHETAILLE, seigneurie cité dés 1173, amandement des propriétés des comtes de Forez qui limitèrent les biens de L'archevêque de Lyon Guichard.  En 1195 donation  à l'abbaye de Valbenoîte qui détient un droit sur le château.                                Du XIIe au XIVe siècle la seigneurie dépendait de Guy de Jarez vassaux des comtes de Forez, ce dernier en fit en 1236 hommage au comte de Forez, puis passa aux de la Lignière, aux de Gaste de Lupé, a Arthaud de Saint-Germain et au comte d'Apchon .                        En 1561, les Calvinistes commandés par le capitaine Sarras réussit à s'emparer  du château, en 1589 le château est repris par les ligueurs de Jacques Mitte de Chevrières d'Urfé après dix-neuf jours de combat, en 1590 le château est rendu à son propriétaire en mauvais état; Au XVIIe siècle le château appartient à la famille  de Bedol de Forcieu, à la veille de la Révolution la famille de Rochetaillée possédait des biens qui enserrent la ville de Saint-Etienne vendu comme bien national.  Au XIXe siècle le château est démantelé pour la vente des matériaux, au XXe siècle les ruines appartiennent à la ville de St-Etienne; les archives concernant la connaissance de l'histoire des cessions du château  de la Rochetaillée se trouvaient aux château de Nantas qui ont été détruite lors de l'incendie de ce dernier en 1880.","architecture":"Rochetaillé, forteresse féodal à l'Est de St-Etienne construite à même la roche,  sans enceinte de protection mais inaccessible côté nord dominant les vallées du Janon et du Furan, à 775 m d'altitude  logis barlong flanqué de quatre tours  à chaque extrémité d'un donjon circulaire du XIII et XIVe siècle dont trois subsistent encore.","habitants":"Famille de Guy de Jarez\r\n        \"","divers":"Vestiges du château de la Rochetaillé","gps":"","images":["../../jctruffet.com/image/image_42/42_Rochetaille_1.jpg","../../jctruffet.com/image/image_42/42_Rochetaille_2.jpg","../../jctruffet.com/image/image_42/42_Rochetaille_3.jpg"]},"Consult_chateau_formulaire18c3":{"id":"Consult_chateau_formulaire18c3","dept":"42","canton":"Charlieu","commune":"St-Nizier-sous-Charlieu","nom":"Rongefer","type":"Maison forte","periode":"XIII","histoire":"RONGEFER, fiefs des seigneurs de Beauvernay qui possédait le château des Monts ancienne maison forte  qui fut le berceau de la famille de Nompère, Rongefer fut assiégé  par les chevaliers d'Auder pendant les guerres de religion qui le pillèrent et l'incendièrent.     Dans cette commune château de Mont-Montfort du XVIe siècle et de la Grange du XII et XVIe siècle.","architecture":"Rongefer, aujourd'hui gentilhommière avec tours rondes.                            Monts, possède une tour au centre.","habitants":"Seigneurs de Beauvernay\r\n        \"","divers":"Maison forte de Rongefer","gps":"","images":["../../jctruffet.com/image/image_42/42_Rongefer_1.jpg"]},"Consult_chateau_formulaire0721":{"id":"Consult_chateau_formulaire0721","dept":"42","canton":"St-Haon-le-Chatel","commune":"St-André-d`Apchon","nom":"St_Andre_d_Apchon","type":"Vestiges","periode":"XV","histoire":"ST-ANDRE-D'APCHON, fief des seigneurs de Geoffroy de L'Espinasse comte du Forez au XIIIe siècle, le château fût construit au XVe siècle par Guichard d'Albon.  A acceuilli Henri II et sa cour dans cette demeure une des plus belle du Forez.","architecture":"St-André D'Apchon, vestige d'un château du XV et XVIe siècle flanqué d'une grosse tour circulaire à l'emplacement d'une maison forte élevée avant 1247, reconstruit au XVe siècle fut l'une des plus belle demeure à la renaissance, fortement mutilée au cours du XIXe siècle, médaillons renaissances en façade.","habitants":"Seigneur de l'Espinasse\r\n        \"","divers":"Vestiges du château de Saint-André d'Apchon","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Andre_d_Apchon_1.jpg","../../jctruffet.com/image/image_42/42_St_Andre_d_Apchon_2.jpg"]},"Consult_chateau_formulaire5e87":{"id":"Consult_chateau_formulaire5e87","dept":"42","canton":"St-Galmier","commune":"St-Bonnet-le-Château","nom":"St_Bonnet_Le_Chateau","type":"Vestiges","periode":"XIV","histoire":"ST-BONNET, au XIIe siècle la seigneurie la plus importante du Forez habité dans le donjon de la chapelle. Fief des comtes de Forez, cité  du XIIe siècle sur une butte pour se protéger des bandes armées anglaises  au XVe siècle rattachement  du Forez à la couronne, vers 1650 des ursulines s'établirent dans l'enceinte de l'ancien château jusqu'en 1792.                                                                   Dans la commune le château de MONTORSIER; attesté au XIIe siècle; dévasté en 1378 par les routiers, fut reconstruit au XIXe siècle par Charles Baleydier qui l'acquit à Henriette Theyssier  en  Janvier 1879 pour le transformer en hôtel en 1881.","architecture":"St-Bonnet, le château élevé sur une butte à 870 m d'altitude; au XIV édification d'une enceinte entourant le bourg-neuf plusieurs vestiges son encore visibles.   Au XV e siècle restauration du Château, donjon du XIVe siècle gardé dans un ensemble reconstruit au XVIe siècle très restauré, au XIX démolition du mur de l'enceinte du bourg.           Montorsier: de plan rectangulaire à deux niveaux flanqués plein cintre tour carré d'entrée à toit conique et tourelles en angles de 1882.","habitants":"Seigneurs de St-Bonnet\r\n        \r\n        \"","divers":"Château de Montorsier et porte de la citée","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Bonnet_le_Chateau_1.jpg","../../jctruffet.com/image/image_42/42_St_Bonnet_le_Chateau_2.jpg","../../jctruffet.com/image/image_42/42_St_Bonnet_le_Chateau_3.jpg"]},"Consult_chateau_formulaire7bb6":{"id":"Consult_chateau_formulaire7bb6","dept":"42","canton":"St-Chamond","commune":"St-Chamond","nom":"St_Chamond_Jarez","type":"Vestiges","periode":"XIX","histoire":"JAREZ, sur la colline de Saint-Emmenond à Saint-Chamond, de 1185-1344  fief de Jarez, puis des de Saint-Priest de 1344-1530 puis passa à la seigneurie de Melchior Mitte de Chevrières (1586-1649), seigneurs et marquis de Saint-Chamond, lieutenant et  général des armées du roi et ambassadeur d'Italie et d'Angleterre.  Il épousa Isabeau de Tournon, c'est ce dernier qui fit embellir le château, passera aux Mollans seigneur de Jarcieu  héritier de la seigneurie. Au XVIe siècle Les ducs de Bourbon deviennent comte de forez.  Le château sera malheureusement pillé et détruit à la Révolution par les habitants, seul restera les écuries  qui sont encore visible sur le mont Saint-Emmenond ainsi que quelques vestiges du château, La commune racheta tout le patrimoine tel que  la maison des chanoines, belles exemples du Moyen-Age.                  Un autre château du Jarez fut construit à St-Chamond, certainement par un industriel, car depuis le XVIe siècle cette région s'est développé par le travail de la soie à suivit les industrie, le charbon etc.","architecture":"Jarez, vestiges du château de Jarez dont-il ne reste rien sinon les écuries  du château, ce château qui était entourait de fortifications en 1428 il avait 2,2 kilomètres de remparts , 47 tours  et 7 portes.","habitants":"Seigneur Mitte de Chevrières\r\n        \"","divers":"St-Chamond en 1650, maison des chanoines, château de Montgolfier","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Chamond_Jarez_1.jpg","../../jctruffet.com/image/image_42/42_St_Chamond_Jarez_2.jpg","../../jctruffet.com/image/image_42/42_St_Chamond_Jarez_3.jpg","../../jctruffet.com/image/image_42/42_St_Chamond_Jarez_4.jpg","../../jctruffet.com/image/image_42/42_St_Chamond_Jarez_5.jpg","../../jctruffet.com/image/image_42/42_St_Chamond_Jarez_6.jpg"]},"Consult_chateau_formulairec70b":{"id":"Consult_chateau_formulairec70b","dept":"42","canton":"St-Etienne-de-Lugdarès","commune":"St-Etienne","nom":"St_Etienne","type":"Vestiges","periode":"XV","histoire":"ST-ETIENNE, au XVe siècle fief des seigneurs de St-Priest dont le château domine les lieux, l'exploitation de charbon crée une expansion d'activité,   St-Etienne obtient de son seigneur le droit d'être représenté par des consuls, cette croissance se maintient pendant les siècles suivant et explosion de la ville au XIXe siècle devient préfecture.","architecture":"Saint-Etienne, reste une des tours de l'entrée Est de la citée du XVIe siècle, l'église  Nôtre Dame du XVIIe siècle, Hôtel de Ville est réalisé par Del Gabbio, des demeures  du XVIe siècle, place Boivin, rue Tarantaise, rue St-Jacques et Place-Neuve.  Le musée des amis du vieux St-Etienne est du XVIIe siècle.","habitants":"Seigneurs de St-Priest\r\n        \"","divers":"Château Lacroix et divers bâtiment de la ville. Autres châteaux dans la commune.","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Etienne_1.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_2.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_3.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_4.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_5.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_6.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_7.jpg","../../jctruffet.com/image/image_42/42_St_Etienne_8.jpg"]},"Consult_chateau_formulaire77bb":{"id":"Consult_chateau_formulaire77bb","dept":"42","canton":"St-Galmier","commune":"St-Galmier","nom":"St_Galmier","type":"Vestiges","periode":"XIV","histoire":"ST-GALMIER, au XIVe siècle appartenait aux comtes du Forez Guy II quitta son château pour habiter avec Jeanne de Bourbon son épouse  au manoir de Teillières qui était une résidence d'été des comtes du forez sur les bords de la Coise. Château de Rey, aurait appartenu à Artaud de Montarcher au XVIe siècle, il dut accepter en indivis son autre frère Pierre de Montarcher, seigneur de Montarcher  en 1597, quand son père et son frère aîné étant morts, il vendit le domaine de la Rey, appartenant à sa femme Gabrielle de la Bastie. A  la fin du XVIIIe siècle, Catherine Staron, fille d'un greffier en chef de l'élection possessioné à Saint Galmier, apporte par mariage, La Rey et les terres avoisinantes à Marie Charles Dugas le 12 septembre 1791.                                                                          Dans la commune château de Tellières et de Vernay .","architecture":"St-Galmier, ancienne cité gallo-Romaine dominant la plaine du Forez donjon carré massif qui aurait par la suite et jusqu'en 1900 servit de clocher à l'église, qui elle fut construite à l'emplacement du châreau fort primitif, le château féodal était défendu par une double enceinte de hautes et épaisses murailles. Vestiges des remparts de la Ville. Hôtel de ville du XVIe renaissance avec tourelle, la porte saint-Etienne et porte Devisse.","habitants":"Comtes du Forez \r\n        \"","divers":"Château de La Rey,  manoir de Vernay donjon carré du XVIIIe siècle.","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Galmier_1.jpg","../../jctruffet.com/image/image_42/42_St_Galmier_2.jpg","../../jctruffet.com/image/image_42/42_St_Galmier_3.jpg"]},"Consult_chateau_formulairede9c":{"id":"Consult_chateau_formulairede9c","dept":"42","canton":"St-Genest-Malifaux","commune":"St-Genest-Malifaux","nom":"St_Genest_Malifaux","type":"Château","periode":"XIX","histoire":"PERUSSEL, construit en 1856 par les barons de Saint-Genest, utilisé aujourd'hui en un centre thérapeutique éducatif pédagogique.               Château du BOIS, édifié en 1583  corps du bâtiment dans une immense enceinte qui fut réaménagé par Jean Tardy surnommé des \"Bois\" dont l'arrière petit fils donnera au domaine l'aspect actuel, qui sera vendu en 1771 à David Boullioud baron d'Argental et seigneur de Montchal qui le retransmet à son neveu David Roche de Quinson; le domaine revient à la famille Fontanès en 1838 et sera  transformé en lycée agricole avec sa surface de 341 hectares.","architecture":"Perussel, château construit au XIXe siècle de style néo-renaissance au lieu dit Perussel, flanqué de face avant de deux tours rondes et carrées à L'arrière. Bois: Maison forte  édifié en 1583 en maison forte avec deux  tours.","habitants":"Les barons de Saint-Genest.\r\n        \"","divers":"Chateau de Perussel , château de Bois et château de Courbon utilisé par la mairie","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Genest_Malifaux_1.jpg","../../jctruffet.com/image/image_42/42_St_Genest_Malifaux_2.jpg","../../jctruffet.com/image/image_42/42_St_Genest_Malifaux_3.jpg"]},"Consult_chateau_formulaire9ea7":{"id":"Consult_chateau_formulaire9ea7","dept":"42","canton":"Roanne","commune":"St-Haon-le-Chatel","nom":"St_Haon_le_Chatel","type":"Château","periode":"XV","histoire":"ST-HAON le CHATEL, seigneurie de la famille de Roanne cité en 1098 et en 1108  se créa en deux branches dont une s'éteint à Saint-Haon vers 1325. En 1239 Guigue IV possédant cinquante pour cent des parts de la seigneurie devient  co-seigneur, en 1270 Renaud de Forez fait confirmer la chartre en 1291 autorisant la ville de s'octoyer une enceinte fortifiée.  En 1325  passe par alliance à Guy III de la Perrière puis passera la seigneurie  aux Damas-Couzan, aux Lenis-Couzan, à Jacques Coeur  et aux Gouffier jusqu'à François d'Aubusson duc de la Feuillade. Jean Pelletier de Renaison, seigneur de Saint-Haon au XVe siècle, deviendra seigneur de St-Haon, les armes sont sur la porte de la maison prévôtale. Le bourg fut d'ailleurs dans les épisodes mémorables; en 1440 Louis XI s'y retrancha et Charles VIIl   l'en délogea, plus tard François Ier prit le château pour se venger de la trahison du Duc de Forez, il subit d'énormes dommages pendant le conflit par Charles VII.  Aujourd'hui  la mairie est installé dans le manoir de la fleur de Lys du XVe Siècle.","architecture":"St-Haon le Chatel, castrum cité au Xe siècle construit au XIe siècle, rempart du XIVe siècle superbe enceinte fortifiée,  était doté de dix sept tours et quatre portes dont survit encore treize tours et château du XVe siècle, la tour de Favières, maisons médiévales  ou renaissances avec façades à pans de bois, tourelles, fenêtres à meneaux, maison de l'évêque, maison de l'apoticaire, maison du cadran solaire, hôtel pelletier manoir de la fleur de Lys, petit Chateaumorand. Dans le canton différents châteaux se trouvent aux environs de Renaison.\r\nLe Château de la Bernarde, le Château de Beaucresson, Le Château de Taron... \r\nLe Château de la Bernarde, domaine privé, ouvert tous les deux ans aux visiteurs lors de la journée du Patrimoine et pour certaines occasions.\r\nSa construction date de 1720-1750, nouveau cuvage 1787. La chapelle de 1750 n'existe plus.\r\nLes travaux terminés en 1832 composent un fort bel ensemble du XVIIIe siècle avec le parc du château classé ISMH. Le parc est inscrit au catalogue du Conseil Général. \r\nLe Château de Beaucresson, il se trouve sur la route de Saint Germain Lespinasse au lieu-dit portant le même nom.\r\nSa particularité principale se trouve dans sa situation qui lui vaut d'être moitié sur Renaison, moitié sur Saint Haon Le Vieux, son origine remonte au 15ème siècle, c'était un château fortifié entouré de larges fossés, chaque angle de ces fossés est marqué par une tour (il en reste une seule qui a résisté au temps).\r\nIl ne reste rien de très important du Château de Beaucresson, c'est une propriété privée qui relate une époque, un passé historique.\r\nLe château de Taron, Il est situé à 1 km de Renaison entre la route d'Ambierle et l'ancienne voie de Saint Haon le Châtel (Les Royers), le Château est du XVIIe siècle avec cour, jardins dessinés, pièces d'eau, pont-levis et terrasse, c'est maintenant un Institut Médico Educatif (IME).","habitants":"Famille de Roanne\r\n        \"","divers":"Château de St-Haon le Chatel et vestiges des remparts.autres châteaux à Renaison Beaucresson ,Bernarde et Taron.","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_1.jpg","../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_2.jpg","../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_3.jpg","../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_4.jpg","../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_5.jpg","../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_6.jpg","../../jctruffet.com/image/image_42/42_St_Haon_le_Chatel_7.jpg"]},"Consult_chateau_formulaire6f10":{"id":"Consult_chateau_formulaire6f10","dept":"42","canton":"Charlieu","commune":"St-Hilaire-sous-Charlieu","nom":"St_Hilaire","type":"Manoir","periode":"XV","histoire":"ST-HILAIRE, le manoir abrita pendant une période les bénédictins de Charlieu auquel on doit la construction de la chapelle, le manoir passa par alliances successives à la famille de Leusse et à monsieur de Benque fut remanié à chaque changement de propriétaires.","architecture":"St-Hilaire, petit castel gothique du XIVe siècle au sud de la ville de Charlieu, entouré de douves, trois tourelles d'angles et une grosse tour ronde dont la base est évasée  et solide.","habitants":"Famille de Leusse \r\n        \"","divers":"Manpoir de St-Hilaire","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Hilaire_1.jpg"]},"Consult_chateau_formulairebdf4":{"id":"Consult_chateau_formulairebdf4","dept":"42","canton":"St-Just-St-Rambert","commune":"St-Just-St-Rambert","nom":"St_Just_St_Rambert","type":"Château","periode":"XII","histoire":"ST-JUST-ST-RAMBERT, au VIIe siècle, le village envahit par douze moines bénédictins qui fondèrent un monastère, au XIe siècle fondèrent un prieuré est la ville devient un lieu de pellerinage réputé. Reste d'un château relevant des comtes du Forez, fief de ces derniers, les seigneurs du lieu étaient les seigneurs-prieurs.                      Une porte dite porte \"Franchise\" cette porte abrite une chambre  où François Ier aurait séjourné lors de son passage dans le Forez pour le rattachement du comté à la couronne de France.                   Dans la commune le barrage de Grangent et le manoir de la Merlée du XVIIIe siècle.","architecture":"St-Just St-Rambert, de la renaissance il reste des traces, la porte franchise, et trois autres portes de la ville, sur la place Grenette des maisons à pans de bois.","habitants":"Comtes du Forez\r\n        \"","divers":"Château de St-Just-St-Rambert","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Just_St_Rambert_1.jpg"]},"Consult_chateau_formulaire138e":{"id":"Consult_chateau_formulaire138e","dept":"42","canton":"Néronde","commune":"St-Marcel-de-Felines","nom":"St_Marcel","type":"Château","periode":"XI","histoire":"St-MARCEL, en 1375 suite au mariage de Marguerite de Tholigny avec Philippe d'Harcourt, cette famille entre dans la seigneurie de saint  Marcel et la conservera pendant deux siècles, puis par alliance passera à Claude de Mars qui servit sous les ordres de Bayard puis du Maréchal de Saint-André durant les guerres de François Ier, en 1568, sa fille Jeanne de Mars hérite et apporte par alliance le château à Jean Talaru seigneur de Chalmazel. En 1792  César-Marie de Talaru premier maître d'hôtel de Marie-Antoinette protégea cette dernière lors de l'insurection ce qui l'entraina à l'échafaud en 1794. mais cette famille garda le château jusqu'en 1850 à la mort du dernier des Talaru,  il passa à la famille de Courtivron  qui le cède en 1865 au Général   Baron-Piston qui le transmet à sa petite-fille la comtesse Laurent de Garnier des Garets, toujours dans la famille.","architecture":"St-Marcel, dominant la plaine du Forez , la maison forte du XIe siècle, il fut remanié au XVIe siècle transformé en château de plaisance médiévale à gardé son allure forteresse, positionné sur des douves sèches  et profondes passage par un pont de pierre donna l'accés par la base de la tour carrée dans la cour  d'honneur,  galerie couverte à arcades de style de la renaissance italienne, corps de logis  serré entre ses tours rondes d'angles.","habitants":"Famille de Talaru\"","divers":"Château de St-Marcel","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Marcel_1.jpg","../../jctruffet.com/image/image_42/42_St_Marcel_2.jpg","../../jctruffet.com/image/image_42/42_St_Marcel_3.jpg","../../jctruffet.com/image/image_42/42_St_Marcel_4.jpg"]},"Consult_chateau_formulaire367d":{"id":"Consult_chateau_formulaire367d","dept":"42","canton":"St-Just-St-Rambert","commune":"St-Marcellin-en-Forez","nom":"St_Marcelin","type":"Château","periode":"XVI","histoire":"COLOMBIER, manoir à St-Marcelin en Forez du XVIe siècle classée M.H en 1921.  Dans cette commune le château de Bazourges et de Batailloux ou batailleur incendié en 1943, il fut édifier au XVIIe siècle  à appatenu  aux familles Pouderoux, Albanel, de la Roue, Pony et Mercier.","architecture":"St-Marcelin, quelques vestiges dans la ville, château du  Colombier et vestiges du château de Batailloux.","habitants":"Seigneurie du Forez\r\n        \"","divers":"Manoir du Colombier  château de Bazourges et Batailloux","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Marcelin_1.jpg","../../jctruffet.com/image/image_42/42_St_Marcelin_2.jpg","../../jctruffet.com/image/image_42/42_St_Marcelin_3.jpg","../../jctruffet.com/image/image_42/42_St_Marcelin_4.jpg","../../jctruffet.com/image/image_42/42_St_Marcelin_5.jpg"]},"Consult_chateau_formulaire4fb1":{"id":"Consult_chateau_formulaire4fb1","dept":"42","canton":"St-Bonnet-le-Château","commune":"St-Jean-St-Maurice-sur-Loire","nom":"St_Maurice","type":"Vestiges","periode":"XV","histoire":"ST-MAURICE,  sous la dépendance du Prieuré de Saint-Rambert en 1230 et en 1550 était divisé en deux parts  l'église de St-Jean de Lyon  et la partie occidentale par St-Bonnet-le-château qui été pris par les seigneurs  de Prunerie  qui possédaient déja Gourgeois, Chateau-Boiset Chazallet (Layont).  Au début du XVIIIe siècle les cinq maisons fortes furent détruites.   La Révolution regroupa quatre communes  dont Château le Bois,  Gourgeois,  Gland et Maurice en une seule seigneurie St-Maurice en Gourgeois.                               Du château de ST-MAURICE; cité au XIe siècle par un seigneur Châtard de Saint-Maurice, issue de la puissante  famille de Roanne, qui en prirent le nom et passa à Guichard IV de  Beaujeu. En 1170 les seigneurs de  Beaujeu perdirent cette seigneurie au profit des comtes de Forez, Guy II et III,  vainqueurs  rendit hommage pour le château de Néronde et Urfé,  cette seigneurie au comte de Forez  qui Guy IV de forez en échangea avec la seigneurie de Bussy et la moitié de de Marclop en 1243, en 1300 la seigneurie des comtes du Roannais  étant assuré Jean II  l'échangea à  nouveau à Guillaume de Thiers, Guillaume et sa femme Agnès de Maolmort firent cession de leur nouveau domaine à leurs  filles Brunissante et Contour de Thiers qui le rétrocédèrent au comte en 1322 passa ensuite Auduc de Bourbon.                           Le château du XVe construit par les Bourbon contrôlé trois  lieu Villerest, St-Maurice et Pinay, l'ensemble passa à la du XVe siècle à Guillaume d'Albon seigneur de St-André  qui l'échangea pour d'autres terres, mais après la chute du connétable Charles III de Bourbon en 1515 la seigneurie fut de nouveau engagée à Jean d'Albon. En 1543 le Roi Charles IX récupéra le duché de Roannais en faveur de Claude Gouffier qui passa ensuite aux Aubusson, à la Feuillade et aux Harcourt, et en 1677 le duc François de la Feuillade racheta au roi les Châtellenie de St-Maurice St-Haon et Crozet en 1688 il échange la terre de St-Cyr contre la seigneurie de Cervieres.","architecture":"St-Maurice, ce château construit au XIIe siècle fut démoli en 1626 par le cardinal de Richelieu le donjon restant témoigne des luttes féodales avec des murs de trois mètres d'épaisseur, dans les ruines du château porte de la ville et remparts. Dans cette commune le manoir de la Mure-Chantois manoir du XVIe siècle.  Actuellement mairie annexe avec tour de cadran solaire fin XVIe.","habitants":"Seigneurs  de Prunerie\r\n        \"","divers":"Vestiges du château de Saint-Maurice","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Maurice_1.jpg","../../jctruffet.com/image/image_42/42_St_Maurice_2.jpg","../../jctruffet.com/image/image_42/42_St_Maurice_3.jpg"]},"Consult_chateau_formulaire2441":{"id":"Consult_chateau_formulaire2441","dept":"42","canton":"Charlieu","commune":"St-Nizier-sous-Charlieu","nom":"St_Nizier_sous_Charlieu","type":"Château","periode":"XIII","histoire":"ST-NIZIER sous Charlieu, ancienne station gallo-romaine la paroisse atteste en 1371 divisé en trois fiefs  Beauvernay,  Mont et Rongefer, château des Monts,  ancienne maison forte  qui fut le berceau de la famille de Nompère, fut assiégé  par les chevaliers d'Auder pendant les guerres de religion qui le pillèrent et l'incendièrent                                                                          RONGEFER, fiefs des seigneurs de Beauvernay qui possédait le château des Monts ancienne maison forte  qui fut le berceau de la famille de Nompère, Rongefer fut assiégé  par les chevaliers d'Auder pendant les guerres de religion qui le pillèrent et l'incendièrent.                                                                                              Dans cette commune château de Mont-Montfort du XVIe siècle et de la Grange du XII et XVIe siècle.","architecture":"Rongefer; aujourd'hui gentilhommière avec tour rondes  Monts; possède une tour au centre.","habitants":"Seigneurs de Beauvernay\r\n        \"","divers":"Château  des Monts et de Rongefer et Carillon","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Nizier_sous_Charlieu_1.jpg","../../jctruffet.com/image/image_42/42_St_Nizier_sous_Charlieu_2.jpg","../../jctruffet.com/image/image_42/42_St_Nizier_sous_Charlieu_3.jpg"]},"Consult_chateau_formulaire701f":{"id":"Consult_chateau_formulaire701f","dept":"42","canton":"Charlieu","commune":"St-Pierre-de-Noaille","nom":"St_Pierre_Noaille","type":"Maison forte","periode":"XV","histoire":"Saint-Pierre de Noaille, fut le fief d'une branche de la famille de Rochefort jusqu'en 1383, passa par alliance  de Yollande de Rochefort avec Simon de Roncherol jusqu'en 1557 ce dernier fit construire  le château.  Au XVIIe siècle la seigneurie passe à Jean de Turin allié à la maison de Francestti de Charlieu, en 1746 le seigneur,  Philippe Marest épouse en 1758 Marie Chapuis  de la Goutte dont Guillaume leur fils né en 1757 fut le dernier seigneur.                     Dans la commune le château de Marchangy de Marie Colette Grandeau transformé en chambres d'hôtes.","architecture":"Maison forte de la Noaille, petite enceinte flanquée d'une tour ronde et d'un gros donjon carré du XVe siècle.    St-Pierre château construit au XIVe siècle remanié au XVIIIe siècle en composite.","habitants":"Famille de Rochefort\r\n        \"","divers":"Château de Saint-Pierre de Noaille Château de Marchangy","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Pierre_Noaille_1.jpg"]},"Consult_chateau_formulaire7f52":{"id":"Consult_chateau_formulaire7f52","dept":"42","canton":"St-Just-St-Rambert","commune":"St-Romain-le-Puy","nom":"St_Romain_le_Puy","type":"Prieuré","periode":"X","histoire":"ST-ROMAIN, le prieuré est confié à une association \"Aldebertus\" l'église est à peu près tout ce qui reste de ce prieuré installé depuis le Xe siècle.","architecture":"St-Romain, prieuré du Xe siècle, planté sur un pic volcanique, dominant de très loin tout le paysage, a une superbe architecture le plus prestigieux  de l'art romain forézien avec diverses sculptures  aussi à l'extérieur.","habitants":"Aldebertus\r\n        \"","divers":"Prieuré de St-Romain du Puy","gps":"","images":["../../jctruffet.com/image/image_42/42_St_Romain_le_Puy_1.jpg","../../jctruffet.com/image/image_42/42_St_Romain_le_Puy_2.jpg"]},"Consult_chateau_formulaire4201":{"id":"Consult_chateau_formulaire4201","dept":"42","canton":"Rives-de-Gier","commune":"Ste-Croix-en-Jarez","nom":"Ste_Croix_en_Jarez","type":"Chartreuse","periode":"XIII","histoire":"STE-CROIX,  Béatrix de la Tour de Roussillon épouse de Guillaume de Roussillon mort en 1227 en  terre sainte à la tête des armées françaises,  fonda en 1280 la chartreuse sur le versant nord du massif du Pilat. Malgré des destructions, des incendies et des pillages, le monastère fonctionna sans interruption pendant plus de cinq siècles, les chartreux ont contribué aux développement de l'agriculture et de la forêt du Pilat qui en 1792  leurs propriétés furent saisies et vendues comme biens  nationaux.                   \r\nLes bâtiments du monastère partagés en lot vendu aux enchères à des familles des environs formant le village dans la commune de Pavezin, devient commune en 1888 et plus beau village de France.","architecture":"Ste-Croix, chartreuse du XIIIe siècle, largement remanié au XVIIe siècle, a été vendue comme bien national en 1792 aux habitants des alentours qui en firent le plus beau village de France, ce dernier a gardé sa porte monumentale fortifié avec ses quatre tours rondes percées au centre par un porche voûté qui donne accès a une grande cour autour de laquelle les anciennes cellules des chartreux sont devenues des logements. Le cloître de la deuxième cour fut démoli en 1840, les appartements  de Beatrice  de la Tour furent remplacés en 1843 par le clocher actuel.","habitants":"Béatrix  de la Tour de Roussillon\r\n        \"","divers":"Chartreuse de Sainte-Croix","gps":"","images":["../../jctruffet.com/image/image_42/42_Ste_Croix_en_Jarez_1.jpg","../../jctruffet.com/image/image_42/42_Ste_Croix_en_Jarez_2.jpg","../../jctruffet.com/image/image_42/42_Ste_Croix_en_Jarez_3.jpg"]},"Consult_chateau_formulaire5e58-2":{"id":"Consult_chateau_formulaire5e58-2","dept":"42","canton":"St-Just-St-Rambert","commune":"Sury-le-Comtal","nom":"Sury","type":"Château","periode":"XI","histoire":"SURY le COMTAL, depuis le XIe siècle seigneurie des comtes de Forez  qui firent construire le château,   devenu fief des rois de France au siècle suivant, passa par héritage à Anne d'Auvergne, comtesse de Clermont d'Auvergne et du Forez qui épouse en 1370 Louis II duc de  Bourbon, et fut saisie par François Ier en 1523 et suite à la trahison du connétable, François Ier  concéda la seigneurie au Capitaine Rostaing qui accueillera  en 1580 le roi Henri III.   Le château ayant subit de gros dommages et pour ne pas  supporter les frais de réparations, Henri IV  en 1609  donna (échange contre des terres) Sury  à Gabrielle  d'Allonville, veuve de Guy de Rochechouard qui le vendit à Jacques de la Veuhe. Sury fut érigé en marquisat en faveur de ce dernier.                       Château au fils de sa  femme Pierre marquis de Sourdis qui sa fille apporta par alliance à Charles-Ignace de la Rochefoucauld, marquis de Rochebaron; leur fils céda en 1735 à Christophe de la Frasse de Seynas conseiller du roi. Sury fut acquis en 1791 par Antoine-Henry Jordan, échevin de Lyon qui fut fusillé trois ans plus tard, le château resta dans sa descendance. Malheureusement un incendie en 1937 fait disparaître une partie du bâtiment.                       Dans ce château il y eut un événement en 1239 appelé \"la danse du Forez\" fête se terminant par une catastrophe,le plancher de la salle de bal s'écroula sous le poids des danseurs tous les occupants furent écrasés.                                                            Château d'Aubigny; pas d'information historique.","architecture":"Sury le Comtal, forteresse à l'origine au XIe siècle, construite en forme de fer à cheval transformé en plaisance au XVIIe siècle  incendié en 1937 et restauré, de ce château il  reste un corps de logis en équerre deux à toits plats.                                                            Château d'Aubigny plusieurs fois reconstruit au XIVe siècle, bâtiment en L avec tourelles en angles.","habitants":"Famille de la Grange de Jordan de Sury\r\n        \"","divers":"Château de Sury et d'Aubigny;","gps":"","images":["../../jctruffet.com/image/image_42/42_Sury_1.jpg","../../jctruffet.com/image/image_42/42_Sury_2.jpg"]},"Consult_chateau_formulaire84ae":{"id":"Consult_chateau_formulaire84ae","dept":"42","canton":"St-Galmier","commune":"St-Galmier","nom":"Teillieres","type":"Manoir","periode":"XV","histoire":"TEILLIERES, domaine de la famille Jomar au XIVe siècle, le manoir fut construit à cette époque.Ce manoir fut la résidence d'été des comtes du Forez puis des Bourbons en 1372. Devenue seigneurie, passa au XVe siècle à la famille Baronnat, famille anoblie par Charles VIII, Camille-Joseph Baronnat vendit à un petit neveu de sa femme  Pierre Chellaye en 1754 conseiller du roi et passa dans d'autres mains au XIXe siècle.","architecture":"Teillieres, manoir construit au XIVe siècle, à l'origine quadrilatère fermé de hautes murailles flanqué de deux tours carrées, un incendie au XVIe siècle détruisant l'aile sud et le mur fermant  la cour fut détruit.","habitants":"Famille Baronnat\r\n        \"","divers":"Manoir de Tellières","gps":"","images":["../../jctruffet.com/image/image_42/42_Tellieres_1.jpg"]},"Consult_chateau_formulaired5d8":{"id":"Consult_chateau_formulaired5d8","dept":"42","canton":"St-Just-en-Chevalet","commune":"Champoly","nom":"Urfe_Champoly","type":"Château","periode":"XIII","histoire":"URFE, la famille d'Urfé très ancienne remonterait au XIIe siècle à un prince du nom Wolf qui vint s'installer en Forez sous le Nom d'Urfé, cette famille s'installe dans une forteresse médiévale au sommet d'un pic aride, cette dernière fut fondé par Arnoud Raybe, qui  construisit au XIIe la forteresse,  en 1233 le quatrième descendant  Arnoud Raybe à  en rendit hommage a Guy II comte de Forez.                                                                                      En 1272  Arnoud Raybe sixième du nom par alliance fait passer Urfé aux Marcilly, et par ce dernier que fut construit la Bastie d'Urfé car Urfé n'était plus habitable. Cette famille prit part au campagne militaire ce qui leur permet de devenir Bailli du Forez en 1409 prend le titre de noblesse en 1414.   Les d'Urfé bailleur du Forez subirent les guerres de religion  et le souvenir du baron des Adrets qui en 1562 jeta du haut de la tour tous les prisonniers, le comte Claude d'Urfé à la confiance de François Ier  devient représentant au concile de Trente, son fils Jacques se marie avec Renée de Savoie dont elle aura six enfants dont trois  Anne qui fait d'Urfé son lieu de retraite, Antoine meurt au siège de Villerest en 1594 et Honoré  qui s'illustre par son roman  pastoral \"l'Astrée\".                      En 1600 Urfé tombe en déclin, vende le château à la famille du Marquis de Simiane qui le cède en 1781 à la famille de Meaux, il fut transformé à la Révolution  en carrière de pierres, ruiné au XIXe siècle  surnommée\" Les Cornes d'Urfé\" par son allure décharnu, la famille de Meaux essaye de le maintenir. Dans la commune deux châteaux connus Trémolin dont le premier seigneur cité en 1313 un Philippe de Trémolin vassaux de Arnoul Raybe  et le dernier Jacques Meaudre de Sugny né au château de Trémolin qui fut maire d'Annonay en 1944 et premier préfet de l'Ardéche.  Contenson, château  qui reflète la richesse agricole du XIXe siècle dans le Forez, ce château fut utilisé comme hôpital pendant la guerre de 14-18.","architecture":"Urfé sa construction remonte au XIIe siècle, occupait à l'époque une position militaire avec une simple tour ronde qui permettait de contrôler la plaine du Forez, elle fut transformé en forteresse avec plusieurs tours  au XIVe siècle. En 1600 le château tombe en déclin, à la Révolution en carrière de Pierre  et son rachat au XIXe siècle permet de le maintenir dans son état.                                              Tremolin et Contenson  fleuron du Département .","habitants":"Arnoud Raybe Honoré d'Urfé\r\n        \r\n        \"","divers":"Vestiges des cornes d'Urfé, de Trémolin  et de Contenson","gps":"","images":["../../jctruffet.com/image/image_42/42_Urfe_Champoly_1.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_2.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_3.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_4.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_5.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_6.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_7.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_8.jpg","../../jctruffet.com/image/image_42/42_Urfe_Champoly_9.jpg"]},"Consult_chateau_formulaire457a":{"id":"Consult_chateau_formulaire457a","dept":"42","canton":"St-Bonnet-le-Château","commune":"Usson","nom":"Usson_42","type":"Château","periode":"XIII","histoire":"USSON, château fort au XIIe siècle construit par la seigneurie  de Baffie et remanié au XIIIe siècle par la famille de la Rochebaron  et au XVe siècle par la famille de la Roue, échappa au pillage  de la Révolution et détruisirent le Donjon, vendu en 1805 au comte St-Martin d'Aglié Garesio  riche marchand qui demeurait à Turin et qui revendit le château en plusieurs lots.","architecture":"Usson, reste d'un château édifié au XIII était composé d'une enceinte  de plan pantagonal  accessible au sud par une tour à porte carrée, coiffée d'un toit en pavillon et poterne à l'ouest, une tour flanquée à l'angle Est sous la tour porte.","habitants":"Famille de la Rochebaron\r\n        \"","divers":"Vestiges d'Usson","gps":"","images":["../../jctruffet.com/image/image_42/42_Usson_42_1.jpg"]},"Consult_chateau_formulaire1492-2":{"id":"Consult_chateau_formulaire1492-2","dept":"42","canton":"Montbrison","commune":"Champdieu","nom":"Vaugirard","type":"Château","periode":"XVII","histoire":"VAUGIRARD, Jacques Girard , marchand, receveur de solde de la gendarmerie  et président de Montbrison et officier du roi.  Son épouse Anne de Pouderoux a l'origine de la construction du château en 1600. A la mort du dernier des Girard en 1819 le château passa par alliance a jean-Charles-François marquis de Lescure de Puisserguier. En 1879 Marie-Joséphine de Lescure qui hérite, épouse un magistrat M.Cottel, ce dernier vendra le château à Monsieur Benoit Charvet maire de Saint-Etienne et sénateur de la Loire et acquis en 1948 par la famille Avon, toujours dans la descendance par la famille de Paul Coÿne. Henri IV coucha en 1609 à Vaugirard.                                                         \r\nChampdieu était une ville fortifié par une enceinte du XIVe siècle dont-il ne reste qu'une tour et une porte, dans cette commune un autre château de la Corée du XVIe siècle.","architecture":"Vaugirard, construit  au XVIIe siècle en mi-renaissance, de construction classique mi  Louis V, flanqués de tourelles et de pavillons avec un grand corps de logis, spacieuse cour d'honneur en U, trois ailes aux façades régulières  flanquées  de splendides bas relief de jean Piran, demeure d'agrément.","habitants":"Jacques Girard\r\n        \"","divers":"Château de Vaugirard","gps":"","images":["../../jctruffet.com/image/image_42/42_Vaugirard_1.jpg","../../jctruffet.com/image/image_42/42_Vaugirard_2.jpg","../../jctruffet.com/image/image_42/42_Vaugirard_3.jpg"]},"Consult_chateau_formulairefe29":{"id":"Consult_chateau_formulairefe29","dept":"42","canton":"St-Symphorien-de-Lay","commune":"Lay","nom":"Verpilliere","type":"Château","periode":"XV","histoire":"VERPILLIERE, château de 1860,                                                       Manoir de Lay à la Forest flanqué de tours.                                        M F de Pesselet XVe siècle.                                                        Manoir de Villonez XVIIIe siècle.                                           \r\nChâteau de Saint-Péray.","architecture":"Verpillière, corps de Logis de forme de L à deux niveaux, toit à la Mansart tour carrée en angles terminant par un clocheton et donjon à l'angle opposé","habitants":"\"","divers":"Château de la Verpillière","gps":"","images":["../../jctruffet.com/image/image_42/42_Verpilliere_1.jpg","../../jctruffet.com/image/image_42/42_Verpilliere_2.jpg"]},"Consult_chateau_formulairede74-2":{"id":"Consult_chateau_formulairede74-2","dept":"42","canton":"Roanne","commune":"Villerest","nom":"Villerest","type":"Forteresse","periode":"XVII","histoire":"VILLEREST, vestiges d'une enceinte fortifiée de la forteresse  avec porte de bise du XIIIe siècle et des maisons renaissances dans le village.                                                                                      CHAMPLONG, appartenait aux Durand de Châtelus qui en fit hommage au comte du Forez en 1328. Monsieur Olivier de Boizet gastronome en a fait un restaurant de luxe.","architecture":"Champlong, ce château fut ruiné au XIXe siècle fut reconstruit en un corps de logis rectangulaire flanqué d'un donjon carré et de tours rondes.","habitants":"Famille de Durand de Châtelus\r\n        \"","divers":"Vestiges de Villerest et château de Champlong","gps":"","images":["../../jctruffet.com/image/image_42/42_Villerest_1.jpg","../../jctruffet.com/image/image_42/42_Villerest_2.jpg","../../jctruffet.com/image/image_42/42_Villerest_3.jpg","../../jctruffet.com/image/image_42/42_Villerest_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','42 — Loire'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
