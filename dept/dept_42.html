PIN, château  de Mme Laure de Choiseul, ce château possède une chambre ou séjourna Henri IV, une chambre Forbes et une Polonaise, aujourd'hui transformé en hôtel restaurant.","architecture":"Aubepin, demeure féodale du XIIIe siècle à deux niveaux remanié au XVIe siècle, corps de logis en forme de U autour d'une cour ouverte d'un côté,  flanqués aux angles de tours carrées, elle-même flanquées de tourelles rondes en encorbellement et d'une tour ronde.","habitants":"Famille de Choiseul\r\n        \"","divers":"Château de l'Aubepin","gps":"","images":["../../jctruffet.com/image/image_42/42_Aubepin_1.jpg","../../jctruffet.com/image/image_42/42_Aubepin_2.jpg","../../jctruffet.com/image/image_42/42_Aubepin_3.jpg","../../jctruffet.com/image/image_42/42_Aubepin_4.jpg"]},"Consult_chateau_formulaire17f4":{"id":"Consult_chateau_formulaire17f4","dept":"42","canton":"Perreux","commune":"Commelle-Vernay","nom":"Bachelard","type":"Manoir","periode":"XVII","histoire":"BACHELARD, manoir du XVIIe siècle, par Pierre Mathieu avocat au bailliage de Roanne; passa ensuite au seigneur de Bachelard d'où il garda le nom, passa ensuite à un avocat au parlement conseillé de Louis XIV et lieutenant dans la police, à sa mort en 1716 fut acquis par un marchand de Roanne et en 1789 revient à la famille de  Pierre Mathieu jusqu'en 1808, revendu à un juge de cour, maire de Roanne  et en 1791 reste dans cette famille jusqu'en 1957 racheté par Jacques Noirard, a son décès Hervé et Danièla l'ont transformé en chambres d'hôtes.","architecture":"Bachelard, manoir construit en 1661, corps de Logis à deux niveaux, rectangulaires flanqués de deux tours carrées et d'un  corps de logis carré, toit à la Mansart certainement rajouté.","habitants":"Famille de Pierre Mathieu\r\n        \"","divers":"Dans la commune le château de Vernay en ruine.","gps":"","images":["../../jctruffet.com/image/image_42/42_Bachelard_1.jpg","../../jctruffet.com/image/image_42/42_Bachelard_2.jpg"]},"Consult_chateau_formulaireb048":{"id":"Consult_chateau_formulaireb048","dept":"42","canton":"St-Just-en-Chevalet","commune":"Champoly","nom":"Bastie_d_Urfe","type":"Manoir","periode":"XV","histoire":"BASTIE-D'URFE, la famille d'Urfé très ancienne remonterait au XIIe siècle à un prince du nom Wolf qui vint s'installer en Forez sous le Nom d'Urfé, cette famille s'installe dans une forteresse médiévale au sommet d'un pic aride, cette dernière fut fondé par Arnoud Raybe et abandonné au XVe siècle, la forteresse fut racheté par la famille de Meaux en 1781 puis pillé à la Révolution,  vestiges encore visibles qu'on appelle \"les cornes d'Urfées\" des légendes coururent sur sa famille et resteront attachées à ce lieu sauvage. La Bastie d'Urfé château construit au XVe siècle Pierre II d'Urfé écuyer de France fut adopté dans la noblesse. Pierre II mourut en 1508, mais c'est à son fils Claude  d'Urfé (1501-1558) nommé  bailli du Forez et ambassadeur de François Ier à Rome qui fit de la Bastie un des plus beaux monuments de la renaissance, Claude fut nommé par Henri II gouverneur du Dauphin, il eu un fils  Honoré (1557-1625) qui écrivit \"l'Astrée\" il fit ses études à Tournon il tomba amoureux de sa belle-soeur, la belle Diane de Châteaumorand qu'il finit par épouser en 1600 suite à l' annulation du mariage de son frère  pour non consommation, Honoré qui demeurait au château de Virieu le Grand décéda en 1625. La propriété resta dans la famille jusqu'en 1724 par le marquis d'Urfé. Passa dans la famille de la Rochefoucault, puis aux Simiane, en 1836 au duc de Cadore ministre de Napoléon Ier à ses héritiers qui s'en sépareront en 1872, un banquier le racheta et le revendit au comte de Neufbourg. il fut dépouillé au XIXe siècle, La Diana (association) en fit l'acquisition en 1909 et reprit par la société d'histoire du Forez qui le sauvegarde depuis 1950.","architecture":"Bastie-d'Urfé, fut construite en pisé depuis le XVe siècle modifiée au XVIIe siècle suivant la renaissance italienne; rampe d'accès  gardée par un Sphinx, magnifique galerie avec douze colonnes.","habitants":"Famille d'Urfé\r\n        \"","divers":"Château d'Urfé","gps":"","images":["../../jctruffet.com/image/image_42/42_Bastie_d_Urfe_1.jpg","../../jctruffet.com/image/image_42/42_Bastie_d_Urfe_2.jpg","../../jctruffet.com/image/image_42/42_Bastie_d_Urfe_3.jpg","../../jctruffet.com/image/image_42/42_Bastie_d_Urfe_4.jpg","../../jctruffet.com/image/image_42/42_Bastie_d_Urfe_5.jpg"]},"Consult_chateau_formulaire51cf":{"id":"Consult_chateau_formulaire51cf","dept":"42","canton":"Bourg-Argental","commune":"St-Sauveur-de-Rue","nom":"Beaubignieu","type":"Château","periode":"XV","histoire":"BEAUBIGNIEU,  construit au XVIe siècle par Antoine de Sauzea. Aujourd'hui restaurant.","architecture":"Beaubignieu, manoir construit au XVIe siècle, de plan rectangulaire tour carrée centrale en façade et échauguettes sur angles de cette dernière, remanié au XIXe siècle.","habitants":"Famille d'Antoine de Sauzea\r\n        \"","divers":"Manoir de Beaubignieu","gps":"","images":["../../jctruffet.com/image/image_42/42_Beaubignieu_1.jpg","../../jctruffet.com/image/image_42/42_Beaubignieu_2.jpg","../../jctruffet.com/image/image_42/42_Beaubignieu_3.jpg"]},"Consult_chateau_formulairefc8e":{"id":"Consult_chateau_formulairefc8e","dept":"42","canton":"Boën","commune":"Arthun","nom":"Beauvoir (42)","type":"Château","periode":"XVIII","histoire":"BEAUVOIR, la seigneurie de la famille de Mars au XIVe siècle et Jacques Girard  officier du grenier à sel acquit en 1626 la terre de Beauvoir,  passe au seigneur de Rochefort par héritage en 1731.  En 1780 commence la construction du château pour le fils  de Catherine Renée de Becq de la Motte St-Vincent, le comte de Bussy Antoine Camille de Rochefort fit appel à Michel de Gabbio architecte pour cette construction qui remplaça l'ancienne. Le comte de Bussy victime de la terreur mourra en 1793, son fils émigre sous la Révolution. Louis François de Rochefort devient officier royal au Piemont et chevalier de Saint-Louis en 1789; émigra dans l'armée des princes, revient en France comme sous-préfet de Saint-Etienne,  retrouve le château, mais le vend en 1840 à la famille Courtin  de Neufbourg.","architecture":"Beauvoir, château d'agrément  à gros pavillon rectangulaire  petit fronton triangulaire à deux étages avec attiques mansardées  construit par Michel  de Gabbio architecte  pendant la période de la Révolution française.","habitants":"Famille de Jacques Girard                                                                   Famille des seigneurs de Rochefort\r\n        \"","divers":"Château de Beauvoir","gps":"","images":["../../jctruffet.com/image/image_42/42_Beauvoir_1.jpg","../../jctruffet.com/image/image_42/42_Beauvoir_2.jpg"]},"Consult_chateau_formulaireb27a":{"id":"Consult_chateau_formulaireb27a","dept":"42","canton":"Roanne","commune":"Le Coteau","nom":"Becot_Coteau","type":"Château","periode":"XIX","histoire":"BECOT, au XIVe siècle, le territoire qui dépendait de la seigneurie de Roanne, fut cédé aux sires de Beaujeu, ce territoire passa sous la commune de Coteau en 1846. Aujourd'hui hôtel de ville.","architecture":"Becot, de forme rectangulaire avec fronton plein cintre  en façade.","habitants":"Sires de Beaujeu\r\n        \"","divers":"Château de Bécot","gps":"","images":["../../jctruffet.com/image/image_42/42_Becot_Coteau_1.jpg","../../jctruffet.com/image/image_42/42_Becot_Coteau_2.jpg","../../jctruffet.com/image/image_42/42_Becot_Coteau_3.jpg"]},"Consult_chateau_formulaireb12e":{"id":"Consult_chateau_formulaireb12e","dept":"42","canton":"St-Galmier","commune":"Bellegarde","nom":"Bellegarde(42)","type":"Château","periode":"XVI","histoire":"BELLEGARDE, château de  style forteresse fortifiée construit au XIIe siècle ainsi que la  ville  au XIIIe siècle qui jouait un rôle de surveillance  du passage du Val d'Anzieux. Fief des comtes du Forez, après la mort du dernier des Forez  le château sera vendu en 1521 par Anne de Beaujeu au seigneur Guillaume de Bron. En 1680 Monsieur Sorbier  de Pougnadoresse l'acheta au comte de Bron; le château toujours dans la descendance.","architecture":"Bellegarde, construit au XVIe siècle en L avec donjon carré à mâchicoulis, toit aujourd'hui couvert à la provençale; tourelle d'escalier en angle intérieure.","habitants":"Seigneur Guillaume de Bron\r\n        \"","divers":"Château de Bellegarde","gps":"","images":["../../jctruffet.com/image/image_42/42_Bellegarde(42)_1.jpg","../../jctruffet.com/image/image_42/42_Bellegarde(42)_2.jpg"]},"Consult_chateau_formulaire6ea5":{"id":"Consult_chateau_formulaire6ea5","dept":"42","canton":"Roanne","commune":"Pouilly-les-Nonains","nom":"Boissy","type":"Château","periode":"XV","histoire":"BOISSY, forteresse construite au XIVe siècle par Hubert de Boisy, vassal du duc de Bourbon, cette dernière est acquise en 1447 ainsi que la seigneurie  par Jacques Cur. Au XVIe siècle la seigneurie se trouve dans les mains de Arthus Gouffier grand-maître de François Ier qui remanie le Château. Dans la commune un autre château la Minardière du XVIIIe siècle.","architecture":"Boissy, forteresse construite en 1397, donjon carré dans une enceinte quadrangulaire, une maison forte  avec fossés et pont-levis furent ajoutées, puis au XIVe siècle de nouveaux logis et un gros donjon cylindrique s'ajoutent avec un toit d'ardoises à mâchicoulis et chemin de ronde  sont accolés aux murs de l'enceinte formant une belle cour intérieure, édifice renaissance remarquable avec ses fenêtres à meneaux.","habitants":"Famille d'Hubert de Boisy                                                                  Famille de Jacques Cur\r\n        \"","divers":"Château de Boissy","gps":"","images":["../../jctruffet.com/image/image_42/42_Boissy_1.jpg","../../jctruffet.com/image/image_42/42_Boissy_2.jpg","../../jctruffet.com/image/image_42/42_Boissy_3.jpg"]},"Consult_chateau_formulaire6fdb":{"id":"Consult_chateau_formulaire6fdb","dept":"42","canton":"Bourg-Argental","commune":"Bourg-Argental","nom":"Bourg_Argental","type":"Vestiges","periode":"XII","histoire":"ARGENTAL, en 1200 Guigue Pagan était seigneur d'Argental et de la Faye, restera dans cette ligné jusqu'en 1350, passa ensuite à Charles duc de Normandie  et au Dauphin du Viennois.","architecture":"Argental, le château d'Argental se trouvait  à l'extrémité d'un éperon rocheux  dont-il reste des vestiges mur d'angle du donjon du XII qui  supportait une échauguette. Ce château était constitué de deux parties distinctes, une partie du XVe et XVIe siècle proche de l'église saint-Georges l'autre partie  sur un éperon.","habitants":"Guigue Pagan\r\n        \"","divers":"Vestiges du Château, la maison du Châtelet et bâtisse de la mairie à tourelle.","gps":"","images":["../../jctruffet.com/image/image_42/42_Bourg_Argental_1.jpg","../../jctruffet.com/image/image_42/42_Bourg_Argental_2.jpg","../../jctruffet.com/image/image_42/42_Bourg_Argental_3.jpg","../../jctruffet.com/image/image_42/42_Bourg_Argental_4.jpg"]},"Consult_chateau_formulairecdfe":{"id":"Consult_chateau_formulairecdfe","dept":"42","canton":"St-Galmier","commune":"Andrezieux-Bouthéon","nom":"Boutheon","type":"Château","periode":"XII","histoire":"BOUTHEON, château construit au XIIe siècle par les seigneurs de Bouthéon possédait un simple donjon et au XVe siècle  il fut remanié par Mathieu de Bourbon fils de jean II duc de Bourbon comte du Forez qui s'installa à Bouthéon.Il fut habité par la famille de Lafayette et en 1561 le château fut racheté par Guillaume de Gadagne, banquier florentin qui continua à améliorer  le château et même le transformer en style médiévale, aux XIXe siècle il fut acheté par Claude Coignet qui lui donna l'aspect d'aujourd'hui et fut racheté par la commune en 1995.","architecture":"Boutheon, château construit à l'origine au XIIe siècle par un simple donjon et complété au XVe siècle par un corps de logis rectangulaire flanqué de deux tours rondes dont l'une à une tourelle en angle sortant au-dessus du troisième niveaux avec une toiture en coupole, l'autre tour ronde à l'opposée de la façade à toit poivrière, deux avancées d'escalier  en façade avec chiens-assis, l'ensemble a était remanié au XXe siècle.","habitants":"Seigneurs de Bouthéon\r\n        \"","divers":"Château de Bouthéon","gps":"","images":["../../jctruffet.com/image/image_42/42_Boutheon_1.jpg","../../jctruffet.com/image/image_42/42_Boutheon_2.jpg","../../jctruffet.com/image/image_42/42_Boutheon_3.jpg","../../jctruffet.com/image/image_42/42_Boutheon_4.jpg","../../jctruffet.com/image/image_42/42_Boutheon_5.jpg"]},"Consult_chateau_formulaire9425":{"id":"Consult_chateau_formulaire9425","dept":"42","canton":"Firminy","commune":"Firminy","nom":"Bruneaux","type":"Château","periode":"XVIII","histoire":"BRUNEAUX, au XIIIe siècle  fief  de la famille de Berchoux d'où une maison fut construite  au XVe siècle; ce fief passe par héritage aux Anselmet qui le garderont trois siècles et par alliance passera  en 1753  à la famille Charpin seigneur  de Feugerolles qui en 1777 Jean-Baptiste-Michel de Charpin délaisse Feugerolles pour entreprendre la rénovation du château, ce dernier passa la Révolution  sans dommage, puis en 1896 à la famille Chapelon qui le possède  jusqu'en 1967 reprit par la commune pour en faire un musée.","architecture":"Bruneaux, corps de logis rectangulaire à trois niveaux,  avant corps central saillant surmontait d'une balustrade, quelques éléments anciens remontent au XVe siècle, remanié au XVIIIe siècle en cours de restauration par la société d'histoire de Firminy.","habitants":"Famille des Aselmet                                                                        Famille de Charpin  \r\n        \"","divers":"Dans la commune de Firminy deux autres châteaux  chat de Poulat du XIXe siècle et le château  de la rue des Cordes du XIXe siècle et un prieuré.","gps":"","images":["../../jctruffet.com/image/image_42/42_Bruneaux_1.jpg"]},"Consult_chateau_formulaireb781":{"id":"Consult_chateau_formulaireb781","dept":"42","canton":"Noiretable","commune":"Noiretable","nom":"Cervieres","type":"Vestiges","periode":"XV","histoire":"CERVIERES, était une place forte du Forez, en 1180 le comte du Forez Guy II possédait un château fortifié, les vassaux étaient des châtelains capitaines. Au XVe siècle passa sous le régime des ducs de Bourbon.","architecture":"Cervières, deux portes de l'enceinte épaulées chacune par une tour de garde sont encore visibles aujourd'hui, la porte de Bise et la porte de Farges, ancien tracé du chemin de ronde et de belles demeures renaissance. Le château fut détruit au XVIIe siècle.","habitants":"Châtelains capitaines\r\n        \"","divers":"Château de Cervières","gps":"","images":["../../jctruffet.com/image/image_42/42_Cervieres_1.jpg","../../jctruffet.com/image/image_42/42_Cervieres_2.jpg","../../jctruffet.com/image/image_42/42_Cervieres_3.jpg"]},"Consult_chateau_formulaire3d98":{"id":"Consult_chateau_formulaire3d98","dept":"42","canton":"Boën","commune":"Boën","nom":"Chabert_Boen","type":"Château","periode":"XVIII","histoire":"CHABERT, au XIVe siècle la seigneurie de Couzan possédait une maison forte,  ensuite passa aux Rivoire et  en 1637 à Claude de Camus d'Yvourt qui fit appel a Pietro  Del Gobbio architecte d'origine italienne pour  la construction en 1786 de la demeure de style Louis XVI appelé château de Boën dont les seigneurs furent à la Révolution les Punctis de la Tour dont Jacques-Marie officier des dragons au régiment de la reine fut fusillé par les révolutionnaires. Resta dans la famille jusqu'en 1934, et le baron Charles-Emile-Paul de Chabert de Boën vend le château à la commune de Boën  pour en faire un musée de la vigne et du vin. Château classé monument historique en 1942.","architecture":"Chabert, ce château qui remplaça la maison forte est une demeure de Style Louis XVI: long corps de logis à deux niveaux se terminant par deux  énormes pavillons carrés coiffés de frontons; dôme de la rotonde coupole à l'italienne, une terrasse  surplombe la cour d'honneur encadre une tour octogonale d'ou arrive la  montée d'escalier.","habitants":"Famille des Punctis de la Tour\r\n        \"","divers":"Château de Chabert-Boen","gps":"","images":["../../jctruffet.com/image/image_42/42_Chabert_Boen_1.jpg","../../jctruffet.com/image/image_42/42_Chabert_Boen_2.jpg","../../jctruffet.com/image/image_42/42_Chabert_Boen_3.jpg","../../jctruffet.com/image/image_42/42_Chabert_Boen_4.jpg"]},"Consult_chateau_formulaire2e23":{"id":"Consult_chateau_formulaire2e23","dept":"42","canton":"St-Georges-de-Couzan","commune":"Chalmazel","nom":"Chalmazel_Talaru","type":"Château","periode":"XIII","histoire":"CHALMAZEL, au XIIIe siècle au Marcilly de Talaru, Château construit par Arnault de Marcilly en 1230 resta par alliance aux Talaru jusqu'en 1850 transformée en hôtel restaurant par la famille  Siguenot.","architecture":"Chalmazel, château  forteresse polygonale dominé   par un donjon carré flanqué de quatre tours rondes dominant la vallée du Lignon. Style  médiéval renaissance  remanié au XVIe siècle.","habitants":"Famille d'Arnault de Marcilly\r\n        \"","divers":"Château de Chalmazel","gps":"","images":["../../jctruffet.com/image/image_42/42_Chalmazel_Talaru_1.jpg","../../jctruffet.com/image/image_42/42_Chalmazel_Talaru_2.jpg","../../jctruffet.com/image/image_42/42_Chalmazel_Talaru_3.jpg","../../jctruffet.com/image/image_42/42_Chalmazel_Talaru_4.jpg"]},"Consult_chateau_formulairece7d":{"id":"Consult_chateau_formulairece7d","dept":"42","canton":"St-Just-St-Rambert","commune":"Chambles","nom":"Chambles","type":"Château","periode":"XIII","histoire":"CHAMBLES, fief des sires de Chambles cité en 1206. En 1334 Falconnet de Chambles fait hommage pour son château au comte du Forez.                                                                                                               Dans cette commune deux autres châteaux Essalois (voir rubrique) et Vassalieux du XVIe siècle.","architecture":"Chambles, de ce château il ne reste qu'une tour cylindrique  de six mètres  de diamètre et créneaux.","habitants":"Seigneurs de Chambles\r\n        \"","divers":"Dans cette commune deux autres châteaux Essalois (voir rubrique) et Vassalieux du XVIe siècle.","gps":"","images":["../../jctruffet.com/image/image_42/42_Chambles_1.jpg","../../jctruffet.com/image/image_42/42_Chambles_2.jpg"]},"Consult_chateau_formulaireae02":{"id":"Consult_chateau_formulaireae02","dept":"42","canton":"Charlieu","commune":"Charlieu","nom":"Charlieu","type":"Abbaye","periode":"XII","histoire":"CHARLIEU, ancienne cité fortifiée et abbaye monastique, neuf siècles de vie commune par les bénédictins; cette cité  a conservé des maisons à colombages, elle fut la propriété  de l'évêque de Valence qui la cède à des moines en 872, y fondèrent un monastère qu'ils baptisent \"Carus-Locus\" puis \"Cherlieu\". En 927, St-Odon abbé de Cluny  se soumet aux règles Clunisiennes, vers 1180  Philippe Auguste accorde la protection à l'abbaye qui est alors sur la frontière du royaume et fait construire des fortifications et donjon En 1912 la galerie du cloître des Cordeliers monastère franciscain fut fondé au XIIIe siècle par Jean Mareschal, trois des quatre galeries du XIVe siècle  sont de Hugues  de Chatelus de Châreaumorand, elles furent achetées par un antiquaire parisien pour les vendre aux Etats-Unis  pour  y être remontées. L'association des Amis des Arts de Charlieu  empêchèrent cette transactions; un musée  hospitalier est une fidèle reconstitution de la vie de l'hôtel-dieu du XVIIe siècle. L'hôtel de ville ancien hôtel de la famille de Ronzière construit au XVIIIe siècle.","architecture":"Charlieu, dans cette Abbaye Bénédictine, on trouve  dans une cour des vestiges qui en  témoignent, à commencer le célèbre narthex; portail romain du XIe siècle plein cintre formidablement travaillé, véritable dentelle de pierre d'un acre lumineux, le cloître romain et gothique, un hôtel des prieurs du XVIe siècle construit par Jean et Claude de la Madeleine, un blason le confirme, couvent des cordeliers XII-XVIe siècle, cloître église. Une trentaine de maisons anciennes à pans de bois en encorbellement  de beaux édifices renaissances et XVIIIe siècle tel que le donjon abbatial dit \"Tour de Philippe Auguste\" haute de 22 m et 11 m de diamètre du XIIe siècle, et le donjon cylindrique de Crozet.","habitants":"Famille de Philippe Auguste\r\n        \"","divers":"Abbaye et tour de Crozet","gps":"","images":["../../jctruffet.com/image/image_42/42_Charlieu_1.jpg","../../jctruffet.com/image/image_42/42_Charlieu_2.jpg","../../jctruffet.com/image/image_42/42_Charlieu_3.jpg"]},"Consult_chateau_formulaire4abb":{"id":"Consult_chateau_formulaire4abb","dept":"42","canton":"La Pacaudière","commune":"St-Martin-d`Estreaux","nom":"Chateaumorand","type":"Château","periode":"XVI","histoire":"CHATEAUMORAND, famille du Forez dont les plus célèbres représenté par Jean de Saint-Martin d'Estreaux 1352-1429, il combattit les anglais à Nantes en 1380 et sauva  Constantinople des Turcs en 1403.  La seigneurie passa aux  de Levis dont Jean fit construire le château en 1523 dans le style  de l'époque, puis passa aux Châteaumorand et c'est dans ce château que naquit Diane de Châteaumorand, 1558-1626  épouse successivement les frères d'Urfé  Anne et Honoré. Ce dernier l'a immortalisé sous les traits de Céladon dans son célèbre roman (l'Astrée).","architecture":"Chateaumorand, château du XVIe siècle, de styles féodaux renaissance remanié en 1750 rectangulaire à trois niveaux par l'architecte Caristie,  de nouveau  restauré en 1880.","habitants":"Seigneurie des Levis\r\n        \"","divers":"Dans cette commune  trois autres châteaux; la Lière du XVe siècle ruiné, de la Fayolle du XVIe siècle restauré en 1866 et le château de la Godinière.","gps":"","images":["../../jctruffet.com/image/image_42/42_Chateaumorand_1.jpg","../../jctruffet.com/image/image_42/42_Chateaumorand_2.jpg","../../jctruffet.com/image/image_42/42_Chateaumorand_3.jpg","../../jctruffet.com/image/image_42/42_Chateaumorand_4.jpg"]},"Consult_chateau_formulaire0632":{"id":"Consult_chateau_formulaire0632","dept":"42","canton":"Chazelles-sur-Lyon","commune":"Chazelles-sur-Lyon","nom":"Chatelus","type":"Château","periode":"XII","histoire":"CHATELUS, château des sires de Châtelus cité en 1175, sous le fief des comtes  de Forez au XI-XIIIe siècle et du XIII- XVe siècle aux ducs de Bourbon. Dés 1368 des châtelains furent installés, les Terasson famille notariale, les Laurencins, les Desgouttes, les Mitte de Chevrières, aux Beneon de Riverie et au Guillet qui prennent le nom de Châtelus en 1715.","architecture":"Chatelus, dans la vallée de Barbenan, ancienne maison forte,  corps de logis appuyé aux restes d'une courtine flanquée de tours rondes  et d'un donjon pantagonal  persé de meurtrières à quatre niveaux qui constitue tout ce qui reste du château médiéval des comtes du Forez.","habitants":"les Mitte de Chevrières\r\n        \"","divers":"Château de Chatelus","gps":"","images":["../../jctruffet.com/image/image_42/42_Chatelus_1.jpg","../../jctruffet.com/image/image_42/42_Chatelus_2.jpg"]},"Consult_chateau_formulaire235e":{"id":"Consult_chateau_formulaire235e","dept":"42","canton":"La Pacaudière","commune":"Sail-les-Bains","nom":"Chaugy","type":"Château","periode":"XVI","histoire":"CHAUGY, château à Sail-les-Bains du XVIe siècle, il a appartenu à Michel de Chaugy, conseiller-chambellan et maître d'hôtel de Philippe le Bon. Dans cette commune deux autres châteaux, des Martin et de la Motte tous deux du XVIe siècle.","architecture":"Chaugy, château du XVIe siècle remanié, corps de logis rectangulaire à quatre niveaux demi-tour accolée en façade d'entrée avec fronton central.","habitants":"Michel de Chaugy\r\n        \"","divers":"Château de Chaugy","gps":"","images":["../../jctruffet.com/image/image_42/42_Chaugy_1.jpg"]},"Consult_chateau_formulaire692b":{"id":"Consult_chateau_formulaire692b","dept":"42","canton":"Chazelles-sur-Lyon","commune":"Chazelles-sur-Lyon","nom":"Chazelles","type":"Château","periode":"XVI","histoire":"CHAZELLES, au XIIe siècle aux comtes de Forez; Guy II donne ses possessions aux Hospitaliers de Saint  Jean de Jérusalem, qui deviendront chevaliers de Rhodes puis chevalier de Malte en 1530 pour service rendu lors des croisades. La construction du château commence au XIIIe siècle les seigneurs sont les prieurs commandeurs propriétaires dans la région environnante. Cette commanderie perd de son pouvoir et s'éteint en 1793 lorsque le dernier commandeur Gaspard de la Rechardière de Besse fut guillotiné. La ville prit le nom de Chazelles Sainte-Victoire.         La ferme Belle-Croix  du XVIIe siècle construite par les Dallier  prévôt des maréchaux lyonnais.","architecture":"Chazelles sur Lyon, tire son nom de la fabrication de chapeau feutre. De la puissante commanderie , il ne reste  qu'une tour hexagonale ainsi qu'un escalier à vis.                                                                              La ferme Bellecroix, porte a deux tours rondes à toits coniques qui donne sur une enceinte rectangulaire.","habitants":"Seigneurs  Prieurs\r\n        \"","divers":"Château et villa Flechet et Blanchard","gps":"","images":["../../jctruffet.com/image/image_42/42_Chazelles_1.jpg","../../jctruffet.com/image/image_42/42_Chazelles_2.jpg","../../jctruffet.com/image/image_42/42_Chazelles_3.jpg","../../jctruffet.com/image/image_42/42_Chazelles_4.jpg","../../jctruffet.com/image/image_42/42_Chazelles_5.jpg"]},"Consult_chateau_formulaireb26a":{"id":"Consult_chateau_formulaireb26a","dept":"42","canton":"Chazelles-sur-Lyon","commune":"Chevrières","nom":"Chevrieres_Grammond","type":"Château","periode":"XVI","histoire":"CHEVRIERES, au XIe siècle le premier château construit par les Malvoisin passa vers 1200 au fief des Ducs de Bourbon, et qui passa  aux Mitte de Chevrières, mais ces derniers habitèrent leur château de Grézieu,  car le château de Chevrières et le village  furent détruit par les soldats de  Jean II duc de Bourbon, Louis de Mitte le  fit reconstruire en 1520 et fut vendue plusieurs fois pour appartenir à la famille De Boissieu qui fit disparaître les remparts.                A la Révolution Chevrières fut un centre de résistance royaliste, un dénommé Antoine Crozier sauva les nobles et protégea leurs biens, aidé par une armée  constitué des gens du pays. Monsieur Neyrand fit édifier le château actuel.                                     GRAMMOND; dit aussi \"Trocésar\" Au XVIe siècle seigneurie de la famille Savany; sur la commune de Marcenod, le château de Trocésar ancien fief des Grammond , les seigneurs vassaux  les Fontanès, les Saint-Priest et les Harenc unis par le mariage en 1599  sont les anciens seigneurs de Trocésar.                             Château propriété de la commune.","architecture":"Chevrières, maison forte  reconstruite à L'origine au XIe siècle, fut détruite en 1465 et reconstruit en 1520 en château de style renaissance; deux grosses tours rondes féodales, possède de belles portes renaissances et porte extérieure du Château du XVIe siècle ( les remparts et ses tours ont étaient détruites).                           Grammond, il ne reste plus rien des murs d'enceinte de la ville seul la tour ronde a conservé des cheminées monumentales du XVIe siècle.","habitants":"Famille de  Mitte de Chevrières\r\n        \"","divers":"Château de Chevrières et château de Grammont","gps":"","images":["../../jctruffet.com/image/image_42/42_Chevrieres_Grammond_1.jpg","../../jctruffet.com/image/image_42/42_Chevrieres_Grammond_2.jpg"]},"Consult_chateau_formulaire34ae":{"id":"Consult_chateau_formulaire34ae","dept":"42","canton":"St-Symphorien-de-Lay","commune":"Cordelle","nom":"Cordelle","type":"Château","periode":"XVI","histoire":"CORDELLE, au X ou XIe siècle les religieuses du prieuré auraient installées un premier lieu de culte, au hameau de Rilly au XIIIe siècle deux maisons fortes firent leurs  apparitions sur la motte féodale entouré d'eau  encore visible.                                                                                          Au XVIe siècle fut transformé en château.","architecture":"Cordelle, vestiges d'une maison forte, château hôtel à tours carrées et manoir de Prévôté, corps de logis rectangulaire flanqué d'une tour ronde.","habitants":"Seigneur-Prieur\r\n        \"","divers":"Dans cette commune château de Changy, de Rilly et de Verdier féodal en ruine.","gps":"","images":["../../jctruffet.com/image/image_42/42_Cordelle_1.jpg","../../jctruffet.com/image/image_42/42_Cordelle_2.jpg","../../jctruffet.com/image/image_42/42_Cordelle_3.jpg"]},"Consult_chateau_formulaire5981":{"id":"Consult_chateau_formulaire5981","dept":"42","canton":"Firminy","commune":"St-Paul-les-Cornillon","nom":"Cornillon(42)","type":"Château","periode":"XII","histoire":"CORNILLON, château du XIIe érigé par un dénommé Lavieu, ce château passa au siècle suivant par alliance aux Beaudiné qui en fait hommage à Guy  comte de Forez. En 1335 à la mort de la dernière des Beaudiné fille de Guillaume, le château revient à sa sur la Dame de Crussol et ces derniers vendront le château à la famille de Laire, Bernard de Laire fit remanier le château en 1380, son fils Guillaume nommé gouverneur du Dauphiné et c'est son petit fils qui donnera au château sa physionomie actuelle.         En 1530  le château passe par alliance aux Levis-Ventadour Charles-Louis de Levis-Ventadour vend au XVII aux de Fays marquis de Nerestang, puis de nouveau au soeur de Fay, qu'elles céderont en mauvais état en 1686 à Jacques Jacquier notaire et par alliance aux Bénéon de Riverle qui le gardèrent jusqu'en 1790, le vend à Clément Palle ce dernier le revend un an après  à la famille Bayon qui entreprenne la restauration  et en 1885  le revende  à Mr Durand pour reconstituer une collection de meubles et de tapisserie et en 1892 acheté par Mr Bernard Steinitz antiquaire parisien et monsieur Champavère l'acheta vide en 1996 pour le restaurer.","architecture":"Cornillon, ce château du XIe siècle qui était une forteresse au départ, dominant la Loire sur un promontoire rocheux se composé d' une enceinte flanquée  de tours, le château reconstruit au XIVe siècle et aménagé jusqu'au XVIIIe siècle par des rajouts d'ailes des bâtiments et des toits furent ajoutés. Se trouve dans la deuxième enceinte qui possède une grande porte avec arc ogival. Du donjon-mur apparent trois tours carrées accolées aux remparts, l'église avec toits à arcades et tours rondes en contrebat.","habitants":"Famille de Beaudiné\r\n        \"","divers":"Château sur un piton rocheux de Cornillon","gps":"","images":["../../jctruffet.com/image/image_42/42_Cornillon(42)_1.jpg","../../jctruffet.com/image/image_42/42_Cornillon(42)_2.jpg","../../jctruffet.com/image/image_42/42_Cornillon(42)_3.jpg"]},"Consult_chateau_formulaire376c":{"id":"Consult_chateau_formulaire376c","dept":"42","canton":"St-Georges-de-Couzan","commune":"Sail-Sous-Couzan","nom":"Couzan","type":"Vestiges","periode":"XII-XIV","histoire":"COUZAN, cité en 1216, les premiers seigneurs de Couzan , les Damas, issus de la maison de Semur qui possédait une partie de la Bourgogne, le Brionnais ce qui entraîna un conflit violent entre les sires de Beaujeu et les comtes du Forez, ces derniers échouèrent. En 1320 Guy II de Couzan obtient du roi Philippe le Long et du comte de Forez la fortification du château et devient en 1356 conseiller du roi et maître d'hôtel de Monseigneur le Roi en 1385 et en 1402 grand chambellan de France.  Au XVe siècle  l'héritière Alix de Couzan passa le château à la famille de Levis, puis aux de Luzy et  au XVIIe siècle au Thy de Milly et en 1932  la socièté Diana l'achète pour le maintenir dans l'état.","architecture":"Couzan, vestiges d'une forteresse construite sur les premiers contreforts du Forez  sur des crêtes au-dessus de la vallée du Lignon et du Chagnon, les ruines de la forteresse du XIIe siècle, agrandie au XVe siècle, vaste cour fermée et flanquée de tours rondes précède d'une enceinte du XIVe siècle qui renferme les restes d'un donjon carré du XIIe siècle et d'un donjon cylindrique.","habitants":"Seigneur de Couzan\r\n        \"","divers":"Vestiges de forteresse de Couzan","gps":"","images":["../../jctruffet.com/image/image_42/42_Couzan_1.jpg","../../jctruffet.com/image/image_42/42_Couzan_2.jpg","../../jctruffet.com/image/image_42/42_Couzan_3.jpg","../../jctruffet.com/image/image_42/42_Couzan_4.jpg","../../jctruffet.com/image/image_42/42_Couzan_5.jpg","../../jctruffet.com/image/image_42/42_Couzan_6.jpg","../../jctruffet.com/image/image_42/42_Couzan_7.jpg","../../jctruffet.com/image/image_42/42_Couzan_8.jpg"]},"Consult_chateau_formulairedd60":{"id":"Consult_chateau_formulairedd60","dept":"42","canton":"La Pacaudière","commune":"Crozet","nom":"Crozet","type":"Château","periode":"XII","histoire":"CROZET, cité médiévale  qui remonte au XIIe siècle et qui se sont disputés les vicomtes de Mâcon, les comtes de Forez et les ducs de Bourgogne. Fut le fief d'Archambaud le Blanc, vicomte de Macon, ce dernier  fit construire le château au XIIe siècle.","architecture":"Crozet, le bourg fortifié  a gardé sa porte du XIIe siècle, et de la forteresse il ne reste qu'un gros donjon cylindrique crénelé, terminant par une tourelle qui garde encore le souvenir de ses seigneurs; vestiges de la Tour de Bec. La maison renaissance PAPON édifice renaissance, la maison de Mgr DAUPHIN, anciennes halles de la boucherie; la maison des \"Ami du Crozet\" du XVe siècle plusieurs tours et les vestiges d'un donjon du XIIe siècle, grande porte encadrée de deux tours massives.","habitants":"Famille d'Archambaud le Blanc\r\n        \"","divers":"Dans la commune la maison PAPON et la maison de Mgr DAUPHIN.","gps":"","images":["../../jctruffet.com/image/image_42/42_Crozet_1.jpg","../../jctruffet.com/image/image_42/42_Crozet_2.jpg","../../jctruffet.com/image/image_42/42_Crozet_3.jpg","../../jctruffet.com/image/image_42/42_Crozet_4.jpg","../../jctruffet.com/image/image_42/42_Crozet_5.jpg"]},"Consult_chateau_formulaire0bb5":{"id":"Consult_chateau_formulaire0bb5","dept":"42","canton":"Montbrison","commune":"Chalain-d`Auzore","nom":"Damas","type":"Château","periode":"XIV","histoire":"DAMAS, ce château a appartenu aux terribles seigneurs Damas de Couzan, puis passa au Levis de Couzan qui en fit leur résidence principale. Il fut vendu en 1634 à la famille de Luzy.                                Au XVIe siècle Gabriel de Levy Couzan fut bailli du Forez au nom du duc de Bourbon, ce dernier épousa Anne de Joyeuse.","architecture":"Damas, château construit au XIVe siècle, corps de logis rectangulaire à quatre niveaux, toits à deux pans.","habitants":"Famille des Damas de Couzan\r\n        \"","divers":"Château de Damas","gps":"","images":["../../jctruffet.com/image/image_42/42_Damas_1.jpg"]},"Consult_chateau_formulaire6075":{"id":"Consult_chateau_formulaire6075","dept":"42","canton":"La Grand-Croix","commune":"Doizieu","nom":"Doizieu","type":"Château","periode":"XIII","histoire":"DOIZIEU, au XVe siècle Doizieu était une petite ville , elle possédait deux châteaux, de  vrais forteresses qui dominaient les habitations sur la rive gauche du Dorlay. L'un appelé  château de Fernanches, où se voit encore aujourd'hui  de vieux murs, l'autre portait le nom de Château-vieux, son emplacement garde toujours ce nom et la puissante tour quadrangulaire complétait le système de défense du château. Au XIIIe siècle, la seigneurie est aux mains des de Lavieu, famille importante du Lyonnais  qui a gardé des droits de haute justice  face à l'emprise éclésiastique.                          Le suzerain des Lavieu était le dauphin du Viennois, puis en 1296 la suzeraineté passa par alliance au comte du Forez. Depuis la fin du XIXe siècle, la mairie est installée dans cette tour suite à la donation à la commune par la famille de Montdragon.","architecture":"Doizieu, de ces deux châteaux il reste le donjon de cinq niveaux du XIIIe siècle, puissante tour de granit de 5 mètres sur 4,50 à l'intérieur du XIVe siècle, seul le sommet a été modifié un étage  démoli en 1886  ainsi que la corniche à créneaux.","habitants":"Famille de Laveau\r\n        \"","divers":"Donjon de Doizieu","gps":"","images":["../../jctruffet.com/image/image_42/42_Doizieu_1.jpg","../../jctruffet.com/image/image_42/42_Doizieu_2.jpg"]},"Consult_chateau_formulaire8d8b":{"id":"Consult_chateau_formulaire8d8b","dept":"42","canton":"Feurs","commune":"Salt-en-Donzy","nom":"Donzy","type":"Vestiges","periode":"XII","histoire":"DONZY, cité en 1020, fief des seigneurs de Calvus, au XIIe siècle aux comtes du Forez qui firent construire un donjon bâti sur plan carré possédait trois grosses tours, Donzy était un des huit châteaux cédé par Renaud de Forez à Jeanne de Bourbon, sa belle-soeur, elle y demeura, en 1376 transmet ses droits à sa petite-fille Anne Dauphine.    Le bourg fut fortifié et au XVe siècle  le château remanié; passa au Bourbon dont ce dernier vendit le château  en 1543 à un marchand Lyonnais Nicolas Henry, après le rattachement définitif du Forez bourbonnais au Royaume de France.  Au XVe siècle suite aux guerres de religion en mauvais état et sa destruction est imposée par Henri IV, et arrestation du capitaine châtelain en 1593, démantèlement de la châtellenie,  le château fut transformé en carrière et au XVIIIe siècle devenu ruines.","architecture":"Salt en Donzy, ancienne forteresse médiévale, ruine du château construit au XIIe siècle sur une colline dominant la plaine du Forez , de plan carré flanqué de trois grosses  tours, reconstruit au XVe siècle,  en ruines fin XVIIIe siècle.","habitants":"Seigneurs de Calvus\r\n        \"","divers":"Vestiges du château de Donzy","gps":"","images":["../../jctruffet.com/image/image_42/42_Donzy_1.jpg","../../jctruffet.com/image/image_42/42_Donzy_2.jpg","../../jctruffet.com/image/image_42/42_Donzy_3.jpg","../../jctruffet.com/image/image_42/42_Donzy_4.jpg","../../jctruffet.com/image/image_42/42_Donzy_5.jpg","../../jctruffe de la Veuhe puis aux Sourdis en 1671, Catherine d'Entraigues vendit la seigneurie  aux moines Camaldules du Val-Jésus qui eux le vendirent à Thomas Gonyn de Lurieu qui le conserva de 1690 à 1703, puis reprit par les moines Camaldules qui le gardèrent jusqu'en 1789. Vendu comme bien national à Pierre Thiollière de la Réardhière passa ensuite dans différentes mains. Au XIXe siècle fut acheté par Hippolyte Sauzea marchand à Saint-Etienne qui le restaura et le légua aux hospices de Saint-Etienne et en 1976 acheté par le département de la Loire.","architecture":"Essalois, ce château qui surplombait les rives de la Loire actuellement le Lac de Grangent,  bâtiment rectangulaire flanqué à l'un des angles d'un donjon circulaire; aux autres de tours rondes ou carrées fut remanié au XVIe siècle.","habitants":"Famille de Léonard de Bertrand\r\n        \"","divers":"Château d'Essalois","gps":"","images":["../../jctruffet.com/image/image_42/42_Essalois_1.jpg","../../jctruffet.com/image/image_42/42_Essalois_2.jpg","../../jctruffet.com/image/image_42/42_Essalois_3.jpg","../../jctruffet.com/image/image_42/42_Essalois_4.jpg"]},"Consult_chateau_formulaire7325-2":{"id":"Consult_chateau_formulaire7325-2","dept":"42","canton":"Montbrison","commune":"Essertines-en-Châteauneuf","nom":"Essertines","type":"Vestiges","periode":"XII","histoire":"ESSERTINES,  maison forte du XIIe siècle dite de la \"Guillanche\" construite au XIIe siècle sur un éperon rocheux  dominant le Vizery, appartenait au duc de Bourbon et au comte de Forez, petit donjon pour laquelle Louis de Saint-Paul rend hommage au comte de Forez en 1441 et constitue au Moyen-Age  une défense pour Montbrison.                                                                                         Dans la commune  la maison forte du Chavalard qui au XII-XIIIe siècle portait le nom  de la famille, les héritiers d'Albert de Sury descendant des Thizy avait le nom de Faucon de Sury du Chavalard.","architecture":"Essertines, vestiges de la age_42/42_Ferriere_3.jpg"]},"Consult_chateau_formulaire0f82":{"id":"Consult_chateau_formulaire0f82","dept":"42","canton":"St-Etienne","commune":"Chambon-Feugerolles","nom":"Feugerolles","type":"Château","periode":"XIII","histoire":"FEUGEROLLES, fief de la baronnie des Jarez, qui habitait une forteresse  actuellement détruite, au XIIIe siècle par la famille de Lavieu qui était propriétaire des lieux et en 1294 Jocerand de Lavieu fit construire la forteresse de Feugerolles et en rendit hommage aux comtes du Forez, cette forteresse et la seigneurie  passa au seigneur de Levis qui était également seigneur d'Amberieu  et au  XVIIe siècle  vendu à Laurent de Capponi; Alexandre de Capponi, cette forteresse fut en partie détruite par les ligueurs, la partie Est fut reconstruite en château avec tour appelé \"Tour Henri-IV\", en 1676 la famille Charpin hérite par alliance avec la petite fille  d'Alexandre de Capponi et Pierre-Hector de Charpin de Feugerolles comte de Souzy, toujours dans la famille.","architecture":"Feugerolles, sur la colline dominant le vallon de Vacheri cette forteresse médiévale très remaniée et restaurée a gardée son aspect militaire malgré la perte d'une partie de ses remparts et de ses tours, château fort d'architecture civile et militaire avec ses murs crénelés et sa tour d'entrée, ses tours d'angles et sa tour Henri IV construite en 1600, restauration du château vers 1850 et passa en monument historique en 1983.","habitants":"Famille de Lavieu\r\n        \"","divers":"Château de Feugerolles","gps":"","images":["../../jctruffet.com/image/image_42/42_Feugerolles_1.jpg","../../jctruffet.com/image/image_42/42_Feugerolles_2.jpg","../../jctruffet.com/image/image_42/42_Feugerolles_3.jpg"]},"Consult_chateau_formulairea9e4":{"id":"Consult_chateau_formulairea9e4","dept":"42","canton":"Feurs","commune":"Feurs","nom":"Feurs","type":"Palais","periode":"XV","histoire":"FEURS, cette ville qui n'a peu d'histoire a été malgré tout la première capitale du Forez, ville fortifiée, remparts etc., ces fortifications  furent  détruites pendant les guerres de religion, puis reconstruites  en 1409 et rasée au XVIIIe siècle,il ne reste qu'une tour d'enceintes place de la Boatie, dépendait des seigneuries d'époque au XVIe siècle au comte du Forez, la ville fut prise par Poncenat aidé des seigneurs de Montferrier et Javoques missionaire de la terreur en 1792 y firent fureur.                                    Feurs reprit par ses activités industrielles,utilisa des bâtiments anciens tel que  le palais qui fut  transformé en collège et des constructions  nouvelles ont eu lieu.","architecture":"Feurs, palais bâtiment rectangulaire à deux niveaux fronton sur façade avant transformé en collège. La tour de Cleppé ronde haute de 20 mètres derniers vestiges du château de Cleppé.","habitants":"Famille de Jean de Rivoire\r\n        \"","divers":"Dans la commune le château de Brigny de 1760 et la tour Cleppé du Moyen-Age haute de 20 mètres","gps":"","images":["../../jctruffet.com/image/image_42/42_Feurs_1.jpg","../../jctruffet.com/image/image_42/42_Feurs_2.jpg","../../jctruffet.com/image/image_42/42_Feurs_3.jpg"]},"Consult_chateau_formulaire6c1e":{"id":"Consult_chateau_formulaire6c1e","dept":"42","canton":"St-Heand","commune":"Fontanes","nom":"Fontanes","type":"Château","periode":"XV","histoire":"FONTANES, cité en 1090 par des chevaliers châtelain suzerain de l'archevêque de Lyon  possesseur de tout le Jarez. En 1173 Louis VII mit Fontanés sous la suzeraineté du comte de Forez, Les Saint-Priest conserve le titre de Fontenés sous les Bourbon.","architecture":"Fontanes, château reconstruit au XVIIIe siècle  sur des vestiges de l'ancien qui était cité en 1290. Le nouveau château de forme quadrangulaire, corps de logis rectangulaire donnant sur cour avec deux pavillons carrés en façade.","habitants":"Famille de Fontanés\r\n        \"","divers":"Château de Fontanés","gps":"","images":["../../jctruffet.com/image/image_42/42_Fontanes_1.jpg","../../jctruffet.com/image/image_42/42_Fontanes_2.jpg","../../jctruffet.com/image/image_42/42_Fontanes_3.jpg"]},"Consult_chateau_formulaire1440":{"id":"Consult_chateau_formulaire1440","dept":"42","canton":"Charlieu","commune":"St-Denis-de-Cabanne","nom":"Gatellier","type":"Château","periode":"XVI","histoire":"GATELLIER, château construit au XV-XVIe et remanié XVII- XVIIIe  siècle par la famille des Gatellier,  toujours dans cette famille, a été  la propriété de la vicomtesse de Meaux.","architecture":"Gatellier, corps de logis  du XVIIIe siècle avec ailes et tours rondes du XVIe siècle, pigeonnier.","habitants":"Famille des Gatelier\r\n        \"","divers":"Dans la commune château de la Durie du XIXe siècle.","gps":"","images":["../../jctruffet.com/image/image_42/42_Gatelier_1.jpg","../../jctruffet.com/image/image_42/42_Gatelier_2.jpg"]},"Consult_chateau_formulairef3aa":{"id":"Consult_chateau_formulairef3aa","dept":"42","canton":"Boën","commune":"Marcoux","nom":"Goutelas","type":"Château","periode":"XV","histoire":"GOUTELAS, fief des Goutelas, cité au XIIIe siècle, au XIVe siècle le château passa  à la famille d'Ecotay puis fut racheté en 1558 par Jean Papon seigneur de Goutelas, anobli par Henri III deviendra lieutenant général du Forez, maître de requêtes de Marie de Médicis et conseiller du Roi. A la mort du dernier des Papon en 1727 le château est racheté par la famille de Cros de Montmars que ces derniers confie à l'architecte Michel Gabbio  le remaniement du château.      Il sera vendu  au XIXe siècle au commandant Crampedon, à sa mort en 1859 le château est acquis par les frères Lanier qui le délapidèrent pour être transformé en exploitation agricole et c'est monsieur Guyot qui le racheta en 1922, ne pouvant le restauré le vendit  à Monsieur Paul Bouchet en 1960 qui fit le nécessaire pour le remettre en état. Aujourd'hui  propriété du syndicat intercommunal de Marcoux pour un centre culturel.","architecture":"Goutelas,  à l'origine au XIIIe siècle maison forte remanié au XIVe siècle puis transformé en renaissance  au XVIIe siècle. Trois corps de Logis en forme de H à deux niveaux flanqué de  tours rondes en angles, entouré d'une courtine quadrangulaire du XVe siècle, malgré son abandon a était restauré en 1960 par une association.","habitants":"Famille Papon\r\n        \"","divers":"Château de Goutelas","gps":"","images":["../../jctruffet.com/image/image_42/42_Goutelas_1.jpg","../../jctruffet.com/image/image_42/42_Goutelas_2.jpg","../../jctruffet.com/image/image_42/42_Goutelas_3.jpg","../../jctruffet.com/image/image_42/42_Goutelas_4.jpg"]},"Consult_chateau_formulaire8568":{"id":"Consult_chateau_formulaire8568","dept":"42","canton":"St-Just-St-Rambert","commune":"St-Just-St-Rambert","nom":"Grangent","type":"Château","periode":"XII","histoire":"GRANGENT, fief cité vers l'an 800 et au XIIe siècle par les sires de Lavieu qui firent construire le château, il fut habité par Gonyn de Lurieu.","architecture":"Grangent, sur un éperon rocheux à 50m au dessus de la Loire qui le contournait autrefois, maintenant île sur plan d'eau du barrage de Grangent, Construit vers 1200  a subit beaucoup de destructions et de reconstruction, a gardé un donjon circulaire et une tourelle à l'opposé, l'ensemble était en ruine au début du siècle bien réaménagé et chapelle du XIIe siècle.","habitants":"Sire de Lavieu                                                                                      André Gabriél Gonyn de Lurieu \r\n        \"","divers":"Dans la commune  château de la Baralière du XIV et la ville de Saint-Just Saint-Rambert posséde une enceinte médièvale et la porte Francisse","gps":"","images":["../../jctruffet.com/image/image_42/42_Grangent_1.jpg","../../jctruffet.com/image/image_42/42_Grangent_2.jpg","../../jctruffet.com/image/image_42/42_Grangent_3.jpg","../../jctruffet.com/image/image_42/42_Grangent_4.jpg","../../jctruffet.com/image/image_42/42_Grangent_5.jpg"]},"Consult_chateau_formulaired891":{"id":"Consult_chateau_formulaired891","dept":"42","canton":"Feurs","commune":"Jas","nom":"Jas","type":"Château","periode":"XV","histoire":"JAS, en 1333, fief de Tholomé de Jas qui en fit hommage au comte du Forez, en 1674 Jean de Rivoire en est propriétaire et en fait don au Roi après l'avoir remanié.","architecture":"Jas, manoir du XVe siècle  quadrangulaire flanqué de tours rondes en angles, remanié XVIIe siècle.","habitants":"Famille de Rivoire\r\n        \"","divers":"Manoir de la Jas","gps":"","images":["../../jctruffet.com/image/image_42/42_Jas_1.jpg"]},"Consult_chateau_formulaire3568":{"id":"Consult_chateau_formulaire3568","dept":"42","canton":"Noiretable","commune":"St-Julien-le-Vêtre","nom":"La_Merlee","type":"Château","periode":"XVI","histoire":"LA MERLEE, château à St-julien le Vêtre canton de Noirétable, construit au XVIIIe siècle par André Gabriél Gonyn de Lurieu possesseur de la Merlée et du fief de Collonge, dans cette commune deux autres châteaux celui de la place du XVIe siècle et celui de Villechaize du XVIIIe siècle.","architecture":"La Merlée, maison forte dit château, corps de logis flanqué de tours rondes de style renaissance.","habitants":"André Gabriél Gonyn de Lurieu\r\n        \"","divers":"Château de la Merlée","gps":"","images":["../../jctruffet.com/image/image_42/42_La_Merlee_1.jpg","../../jctruffet.com/image/image_42/42_La_Merlee_2.jpg"]},"Consult_chateau_formulairea058":{"id":"Consult_chateau_formulairea058","dept":"42","canton":"La Pacaudière","commune":"La Pacaudière","nom":"La_Pacaudiere","type":"Manoir","periode":"XVI","histoire":"La PACAUDIERE, vestiges néoléthiques et Gallo-Romain relais de poste du XVIe siècle sur la route Royal, le Petit Louvre, ancien rendez-vous de chasse de François Ier, gothique et renaissance début XVIe siècle échauguette en angle et maison des ducs de Bourbon façade donnant sur la route.                                           Dans cette commune d'autres châteaux,    BEAUSOLEIL, manoir du XIXe siècle transformé en chambres d'hôtes par la famille Charasse.                                                                                  CHAMBRE: château viticole, et La SALLE.","architecture":"La Pacaudière, le Petit Louvre, célèbre pour sa charpente  a deux niveaux échauguette sur angle.                                                   Château Beausoleil, corps de logis en équerre, à deux niveaux tour d'entrée en angles.                                                                          Château Chambre, corps de logis rectangulaire renaissance à trois niveaux  en façade au-dessus  de la fenêtre jumenée fronton en chapeau de gendarme, flanqué de tour ronde et échauguettes à toitures en coupole.                                                                        Château  La Salle, style renaissance du XVIIIe siècle.                      Château-Villeson ruiné, et le  château Treillard du XVIe siècle, remanié.","habitants":"Ducs de Bourbon\r\n        \"","divers":"Le \"petit Louvre\", Beausoleil, Chambre, Villauzon, Treillard, Bardons et la Salles.","gps":"","images":["../../jctruffet.com/image/image_42/42_La_Pacaudiere_1.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_2.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_3.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_4.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_5.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_6.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_7.jpg","../../jctruffet.com/image/image_42/42_La_Pacaudiere_8.jpg"]},"Consult_chateau_formulairea184":{"id":"Consult_chateau_formulairea184","dept":"42","canton":"St-Symphorien-de-Lay","commune":"St-Priest-la-Roche","nom":"La_Roche","type":"Forteresse","periode":"XIII","histoire":"ROCHE, de Girard de la Roche, qui en 1290 en fait hommage au comte de Forez; au XVIIe siècle a force de crue répétée le château  perdit de ses attraits, ressemblant plus à une maison forte pour devenir quelques années plus tard une ruine, en 1900 un industriel  lyonnais le racheta et le restaura en style gothique. En 1930 le barrage de Villerest condamne le château qui devait disparaître sous les eaux, n'ayant pas été ensevelie, pour le franc symbolique la commune le racheta en 1984 et le maintienne dans le style.","architecture":"Roche, sur un piton rocheux cette forteresse faisait office de poste frontière dans les gorges de la Loire. Aujourd'hui sur le lac de Villerest, construit au XIIIe siècle remanié au XXe siècle.","habitants":"De Girard de la Roche\r\n        \"","divers":"Forteresse de la Roche","gps":"","images":["../../jctruffet.com/image/image_42/42_La_Roche_1.jpg","../../jctruffet.com/image/image_42/42_La_Roche_2.jpg","../../jctruffet.com/image/image_42/42_La_Roche_3.jpg","../../jctruffet.com/image/image_42/42_La_Roche_4.jpg","../../jctruffet.com/image/image_42/42_La_Roche_5.jpg","../../jctruffet.com/image/image_42/42_La_Roche_6.jpg","../../jctruffet.com/image/image_42/42_La_Roche_7.jpg"]},"Consult_chateau_formulaire276e-2":{"id":"Consult_chateau_formulaire276e-2","dept":"42","canton":"Pélussin","commune":"Lupé","nom":"Lupe","type":"Château","periode":"XIII","histoire":"LUPE, château-Fort du XIII construite par la seigneurie connue depuis le VIIe siècle, ancienne noblesse de France dont l'origine serait la lignée directe des Mérovée, cette seigneurie passa au XIe siècle aux Falatier se sont ces derniers qui firent construire le château sur l'emplacement de la maison-forte, et cette famille par la retransmission des femmes conserveront la seigneurie pendant cinq siècles; la dernière descendante des Falarier épousa Gastonnet de Gaste chambellan de Charles Ier de Bourbon comte du Forez, leur fils et petit-fils continue cette activité auprès du roi Louis XI et Charles VIII (Marguerite de Gaste Lupé inspira Honoré D'Urfé pour son roman l'Astrée), elle épousera  jean d'Apchon  baron de Montrond, en 1570 reste veuve en récupérant la seigneurie de Montrond elle se remarie en 1580 a Aymard de Grolée de Mouillon, Baron de Bressieu en Dauphiné de leur union naîtra Catherine dame de Lupé qui transmettra par alliance la seigneurie de Lupé au comte de Suze Rostaing de la Baume. Cette famille possédait cinq seigneurie  Lupé, Rochefort, Bressieu en Dauphiné, Montrond en Forez et Suze la Rousse en Provence et en 1720 Bressieu fut vendu, en 1734 Lupé également, et même revendu plusieurs fois (période ou Philibert Delorme architecte aux mines de plomb dans la région fit des recherches et des travaux d'améliorations et de transformations dans le château de Lupé) est en 1987 par le propriétaire  actuel. Ce château aurait abrité François Rabelais et Michel Nostredame appelé aussi Nostradamus.","architecture":"Lupé, sur les pentes du Pilat, dominant la vallée du Rhône, construit au XIIIe siècle remanié au XVe siècle, de plan heptagonal, murs à mâchicoulis, transformé au XVIIe siècle suite à un incendie qui la réduit d'un étage apportant de nombreuses modifications et transformations  tel que le style renaissance en cour intérieure par Philibert Delorme qui lui donna l'aspect actuel, combla également les douves, des fortifications sont encore apparentes dans le village.","habitants":"Famille de Lupé\r\n        \"","divers":"Château de Lupé","gps":"","images":["../../jctruffet.com/image/image_42/42_Lupe_1.jpg","../../jctruffet.com/image/image_42/42_Lupe_2.jpg","../../jctruffet.com/image/image_42/42_Lupe_3.jpg","../../jctruffet.com/image/image_42/42_Lupe_4.jpg","../../jctruffet.com/image/image_42/42_Lupe_5.jpg"]},"Consult_chateau_formulairebc72":{"id":"Consult_chateau_formulairebc72","dept":"42","canton":"Pélussin","commune":"Malleval","nom":"Malleval","type":"Vestiges","periode":"XII","histoire":"MALLEVAL, cité en 1157 acquis par mariage en 1296 par les comtes de Forez qui en font hommage  à l'évêque de Vienne. En 1324 Malleval connait son heure de gloire avec le mariage de Renaud du Forez et Marguerite de Savoie, celui-ci fils cadet  de Jean du Forez renonce à l'état éclésiastique pour se marier et profiter de la dote de sa femme, il agrandi son domaine par l'achat des paroisses de Chavanay et de Pélussin  et embelli son château et la ville de Malleval qui apporta à son apogée jusqu'à trois cent maisons, ne laissa pas d'héritier devient fou et fait prisonnier à la bataille de Brignais de ce fait la capitale du Forez passe à Bourg-Argental. Jean de Fay  catholique attaque Malleval en 1574 Christophe de Saint-Chamond, gouverneur du Vivaris entra en conflit  avec le seigneur de Peyraud, protestant, attaqua et mis le feu au village, les catholiques reprirent le village et rasèrent le château pour éviter le retour des protestants.                             A la fin du XVIe siècle François de Fay était seigneur de Malleval, Virieu et Chavanay.","architecture":"Malleval, sur un éperon rocheux  dominant les gorges de Batalon le vieux village fortifié gardait la route reliant la vallée du Rhône à l'Auvergne ou l'on peut voir les ruines des deux châteaux entourant l'église du XIe siècle. On peut voir dans ce village la maison de Prélende, le Grenier à sel XVIe, maison du Beffroi, la commanderie et le petit château du XIVe siècle.","habitants":"Les comtes de Forez\r\n        \"","divers":"Village féodal","gps":"","images":["../../jctruffet.com/image/image_42/42_Malleval_1.jpg","../../jctruffet.com/image/image_42/42_Malleval_2.jpg","../../jctruffet.com/image/image_42/42_Malleval_3.jpg","../../jctruffet.com/image/image_42/42_Malleval_4.jpg","../../jctruffet.com/image/image_42/42_Malleval_5.jpg","../../jctruffet.com/image/image_42/42_Malleval_6.jpg"]},"Consult_chateau_formulaire23cd":{"id":"Consult_chateau_formulaire23cd","dept":"42","canton":"Charlieu","commune":"St-Pierre-la-Noaille","nom":"Marchangy","type":"Manoir","periode":"XVIII","histoire":"MARCHANGY, a l'époque de Louis II de Bourbon le manoir appartenait aux seigneurs de Chantemerle, il fut rebâti avant la Révolution, Le travail de la vigne était la principale activité à cette époque. Marie Colette Grandeau qui l'avait acquit en 1991, passionnée de chasse à cour organisa de nombreux week-ends de chasse, et fut transformé en hôtel restaurant par la famille  Rufener.","architecture":"Marchangy, du manoir d'origine il reste une tour ronde  et des fossés de défense entourant la bâtisse, manoir construit au XVe siècle, brûlé au XVIe siècle, rénové au XVIIIe siècle d'une architecture simple et élégante de forme rectangulaire à trois niveaux plus attique flanqué de pavillons carrées aux extrémités.","habitants":"Seigneurs de Chantemerle\r\n        \"","divers":"Dans la commune de Saint-Pierre la Noaille existe un  château dit de \"Saint-Pierre\" en composite du XVIIIe siècle.","gps":"","images":["../../jctruffet.com/image/image_42/42_Marchangy_1.jpg","../../jctruffet.com/image/image_42/42_Marchangy_2.jpg"]},"Consult_chateau_formulaire64a8":{"id":"Consult_chateau_formulaire64a8","dept":"42","canton":"Boën","commune":"Marcilly-le-Chatel","nom":"Marcilly_le_Chatel","type":"Vestiges","periode":"XII","histoire":"MARCILLY le Chatel, forteresse sur la colline qui domine  le bourg, dans l'enceinte au nord-ouest  le \"château St-Anne\" en ruine qui n'a jamais était terminé en style troubadour, édifié en 1873 sur les débris d'un château des comtes du Forez; mentionné depuis 1060 démantelé sur ordre de Richelieu.","architecture":"Marcilly, sur la colline s'étend une grande enceinte encore visible  avec des bâtiments ruinés à l'intérieur.","habitants":"Comtes du Forez\r\n        \"","divers":"Dans la commune le château Sainte-Anne de style troubadour de 1873","gps":"","images":["../../jctruffet.com/image/image_42/42_Marcilly_le_Chatel_1.jpg","../../jctruffet.com/image/image_42/42_Marcilly_le_Chatel_2.jpg","../../jctruffet.com/image/image_42/42_Marcilly_le_Chatel_3.jpg"]},"Consult_chateau_formulairef355-3":{"id":"Consult_chateau_formulairef355-3","dept":"42","canton":"Néronde","commune":"Violay","nom":"Matagrin_Violay","type":"Vestiges","periode":"XV","histoire":"Tour Matagrin, Le lieu est mentionné dès 1239 dans le cartulaire du Lyonnais sous un nom éponyme \"Dalmatus de Beaucero\". Au XIVe siècle le nom devient \"Buessuevre\" puis \"Boussièvre\" et enfin \"Boussuivre\",tour de vigie sur les mont de Boussuivre point culminant des monts du Lyonnais  à 1004 mètres d'altitude, construite en 1876, située sur la ligne des eaux Atlantique-Méditerranée,  scellé dans les fondations d'un ermitage était couverte d'un toit pointu conique, était rendez-vous de chasse construit pour lusage dun notaire, maître Matagrin, alors propriétaire des terrains alentours et devint début du siècle débit de boissons avec animations.","architecture":"Tour Matagrin construite en 1876 de forme ronde, haute de 20 mètres, le bâtiment était initialement pourvu dun toit conique recouvert dardoises qui a disparu à la libération. En 2007, la mairie a soumis le projet de trois architectes à la population afin de choisir le mode de réhabilitation du bâtiment comprenant notamment la remise en place dun toit comme sur le plan dorigine.","habitants":"Maître Matagrin\r\n        \"","divers":"Dans la commune château Castel de Noally","gps":"","images":["../../jctruffet.com/image/image_42/42_Matagrin_Violay_1.jpg","../../jctruffet.com/image/image_42/42_Matagrin_Violay_2.jpg","../../jctruffet.com/image/image_42/42_Matagrin_Violay_3.jpg"]},"Consult_chateau_formulaire3d17":{"id":"Consult_chateau_formulaire3d17","dept":"42","canton":"Roanne","commune":"Roanne","nom":"Matel","type":"Manoir","periode":"XV","histoire":"MATEL, ce manoir qui fut construit au XVe siècle fut incendié au XVIe pendant les troubles de la Ligues, il fut reconstruit par Jean Chézard aristocrate de descendance italienne, père de la grande mystique française  \"jeanne Chézard de Matel\" (1596-1670), fondatrice de l'ordre du verbe incarné, après sa rénovation en 1700, changea plusieurs fois de propriétaire,   le capitaine Poulat l'acheta, il était également chimiste il fit des expériences scientifiques  dans ce château qu'il  fit sauter accidentellement, une partie du bâtiment détruit  de plus il perdit sa fortune dans un naufrage, le château fut  racheté  par André Citroën en 1919 puis à la société Rhône-Poulhenc jusqu'en 1980,  la ville de Roanne racheta le parc en prévision d'une école, le château lui est toujours dans la famille Bourgeois-Chevassis.","architecture":"Matel, manoir construit au XVe siècle, brûlé au XVIe siècle, rénové en 1700 de forme rectangulaire à trois niveaux plus attique flanqué de pavillons carrées aux extrémités.","habitants":"Famille de Jean Chézard\r\n        \"","divers":"Château de Matel","gps":"","images":["../../jctruffet.com/image/image_42/42_Matel_1.jpg"]},"Consult_chateau_formulaire1b8d":{"id":"Consult_chateau_formulaire1b8d","dept":"42","canton":"Loudes","commune":"Saint-Privat-d`Allier","nom":"Mercoeur","type":"Vestiges","periode":"XIII","histoire":"MERCOEUR, au XIIIe siècle, construit par la famille Mercoeur qui le possède en  fief,    vassaux des évêques du Puy, le château a résisté  aux guerres de religion et aux invasions.  A partir de 1764,  le nouveau propriétaire entreprend une nouvelle construction dont les travaux sont interrompus par la Révolution. Le château n'est plus habité depuis 1914.                                                                                                                                                                                            ROCHEGUDE,  le château de Rochegude, autrefois un puissant château de la région de l'Auvergne en France. Aujourd'hui, il ne reste du château qu'une tour circulaire et la chapelle romane. En 1230 héracle de Montlaur seigneur d'Aubenas échange avec l'évêque du Puy son château de Cayres contre celui de Rochegude.","architecture":"Mercoeur  a l'extrémité d'une crête, structure d'ensemble médiévale,  Le corps de logis triangulaire est flanqué  du côté d'attaque d'un  donjon rond éclairé par de petites fenêtres trilobés et a l'opposée de deux tourelles circulaires,  il est desservi par une autre tour intérieure à escalier  en vis.  à l'opposée de deux tourelles  circulaires,  avec des reprises à la Renaissance et au XVIIIe siècle. Le donjon fut construit de façon à donner vue sur les deux châteaux de Saint-Privat et de Saint-Didier d'Allier. Pendant la guerre de Cent Ans, le château brûle, sans doute  du fait des routiers. Le château occupe une position à flanc de mont, apparemment exposée aux attaques venant du sommet.  il est desservi par une autre tour intérieure à escalier  en vis. L'édifice est entouré   d'une enceinte quadrangulaire, sans   doute réemployée pour la construction des fermes du hameau. L'édifice noble   du XVIIIe siècle, n'a été réalisé que pour moitié.  Dans le corps de logis écroulé vers 1960,  subsistent deux grandes cheminées à moulures gothiques. Projet de restauration.                                                                     Rochegude; sur le rocher dominant les gorges de l'Allier, donjon circulaire et la chapelle romane. Ce château, qui se trouvait sur le chemin de Saint- Jacques de Compostelle, se situe à 3 km du bourg à l'ouest, face au hameau de Rochegude. Son accès est libre.","habitants":"Famille de Mercoeur\r\n        \"","divers":"Vestiges du château de Mercoeur et de Rochegude","gps":"","images":["../../jctruffet.com/image/image_43/43_Mercoeur_1.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_2.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_3.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_4.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_5.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_6.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_7.jpg","../../jctruffet.com/image/image_43/43_Mercoeur_8.jpg"]},"Consult_chateau_formulaire0e43":{"id":"Consult_chateau_formulaire0e43","dept":"42","canton":"Montbrison","commune":"Montbrison","nom":"Montbrison","type":"Vestiges","periode":"XI","histoire":"MONTBRISON, dès le Moyen-Age Montbrison est lié aux comtes du Forez, mit en possession en 877 par Charles le Chauve petit-fils de Charlemagne  au dernier connétable de Bourbon mort sous les murs de Rome. Cité en 1077 Artaud V  fit construire le château, première génération des comtes jusqu'en 1173, deuxième génération, Guy II transforma en ville Montbrison et qui deviendra capitale du Forez, Guy IV, Guy V, Guy VI et Jean Ier ont des liens avec le royaume de France, ce dernier échangea le château de Virigneux à sa soeur Isabeau, veuve de Béraud de Mercoeur contre celui d'Ussel. Guy V compagnon de St-Louis. Mariage de Jean Ier avec Alexix de Viennois, consolidation de leurs états féodaux, mais Montbrison souffre de la guerre de cents-ans  elle dut se fortifié et Jean Ier meurt en 1372 sans postérité. Au XIVe siècle les ducs de Bourbons deviennent comtes du Forez, troisième générations avec Louis II de Bourbon.   En 1536 entré de François-Ier dans Montbrison, fin des comtes du Forez qui ont formés des lignés de puissants et valeureux seigneurs dont certains ont laissés leurs noms ou des oeuvres. François-Ier rattache le Forez à la Couronne, mais les guerres de religions éclatèrent en 1562, le château fut pillé et saccagé par le Baron des Adrets en 1562, le château fut détruit en 1596.   Le comte du Forez Guillaume-l'Ancien y fonda un hôpital pour les pauvres, démantelé sous Henri IV.                Dans le château fut emprisonné le comte Honoré d'Urfé.                      TUILIERE;Le château était possédé à la fin du XVIe siècle par Guillaume Rival président du bailliage du Forez, il fut cédé en 1674 à la famille du Palais  En 1678, le fief de la Tuilière appartient à Claude Rival. Il passe en 1745 à Antoine Rival, écuyer, capitaine au régiment  d'Auvergne, puis à Marie Madeleine de la Tuilière, épouse de Louis de Serres, écuyer   mort en 1770. Au début du XIXe siècle la Tuilière appartient à la famille Staron de l'Argentière. Le domaine devint  la propriété de M. Amaury de la Plagne. Au début du XXe siècle M. Campagne. En 1944 à Mr François Genin .","architecture":"Montbrison, sur une butte volcanique ruines d'un château des comtes du Forez du XIe siècle, il était dominé par un puissant donjon est entouré de double enceinte qui furent construite par Guy II, en 1428 à 1430 de 2,2 Km 47 tours et 7 portes. Aujourd'hui  du château subsisterait quatre tours et une muraille. L'hôtel de ville  fut construite par Edouard Corroyer élève de Viollet le duc en 1862 interrompu par la guerre les travaux reprirent en 1874.","habitants":"Les comtes de Forez\r\n        \r\n        \"","divers":"Dans la commune manoir de Vaudebert du XVIe siècle et hôtel de Diana du XIVe siècle. Différentes gravures de la ville,Tour de Moingt. Château de la Tuilière.","gps":"","images":["../../jctruffet.com/image/image_42/42_Montbrison_1.jpg","../../jctruffet.com/image/image_42/42_Montbrison_2.jpg","../../jctruffet.com/image/image_42/42_Montbrison_3.jpg","../../jctruffet.com/image/image_42/42_Montbrison_4.jpg","../../jctruffet.com/image/image_42/42_Montbrison_5.jpg","../../jctruffet.com/image/image_42/42_Montbrison_6.jpg","../../jctruffet.com/image/image_42/42_Montbrison_7.jpg","../../jctruffet.com/image/image_42/42_Montbrison_8.jpg","../../jctruffet.com/image/image_42/42_Montbrison_9.jpg"]},"Consult_chateau_formulaire23e5":{"id":"Consult_chateau_formulaire23e5","dept":"42","canton":"Bourg-Argental","commune":"Burdignes","nom":"Montchal","type":"Vestiges","periode":"XII","histoire":"MONTCHAL, fief des seigneurs de Montchal qui le rendit en 1290 à Guigue de Pagan seigneur d'Argental et de la Faye qui en rendit hommage à Humbert Ier dauphin du Viennois pour le mariage de sa fille  avec Jean de Pagan  comte du Forez.  Au XVe siècle deux cent soldats défendaient les lieux, mais des querelles entre le Baron de Florimont seigneur de Montchal  et le seigneur Guy d'Argental provoquèrent la destruction des lieux.","architecture":"Montchal, ce château implanté à 950m d'altitude vers l'an mille domine le bassin de la Cance et de l'Argental sur une terrasse de 65 m x 50 m dont il reste un pan du donjon quadrangulaire du XIIe siècle.","habitants":"seigneur de Pagan\r\n        \"","divers":"Vestiges du Château","gps":"","images":["../../jctruffet.com/image/image_42/42_Montchal_1.jpg"]},"Consult_chateau_formulaire6c3f-2":{"id":"Consult_chateau_formulaire6c3f-2","dept":"42","canton":"Charlieu","commune":"Pouilly-sous-Charlieu","nom":"Montremard","type":"Château","periode":"XIV","histoire":"MONTREMARD, château construit au XIVe siècle s'est transformé en ferme, dans cette commune deux autres châteaux  de Tigny du XIIe siècle remanié au XVI et XIXe siècle et le château du Poyet XVIIIe siècle.","architecture":"Montremard, de plan quadrangulaire, un donjon carré à l'angle ouest, courtines munit de meurtrières et deux échauguettes.                         Tigny, maison forte corps de logis flanqué d'une tour ronde.               Château Poyet, de plan quadrangulaire flanqué de tours rondes et carrées.","habitants":"Famille de Mortremard\r\n        \"","divers":"Chateau de Montremard, de Tigny et du Poyet.","gps":"","images":["../../jctruffet.com/image/image_42/42_Montremard_1.jpg","../../jctruffet.com/image/image_42/42_Montremard_2.jpg","../../jctruffet.com/image/image_42/42_Montremard_3.jpg"]},"Consult_chateau_formulaire613e":{"id":"Consult_chateau_formulaire613e","dept":"42","canton":"St-Galmier","commune":"Montrond-les-Bains","nom":"Montrond_les_Bains","type":"Vestiges","periode":"XII","histoire":"MONTROND, cette forteresse citée en 1200, propriété des comtes de Forez, ces derniers édifièrent une enceinte fortifiée avec tours,  la garderont jusqu'en 1300, elle est agrandie  au XIVe siècle par Artaud de St-Germain, qui fit remanié en un château, qui passera  les guerres de religion, en 1562 les Saint-Germain qui avaient prit le nom d'Apchon, le seigneur de l'époque parti avec sa garnison appuyer les catholiques, le Baron des Adrets en profita pour saccager et piller,  et en 1589 à 1595 des ligueurs Honoré d'Urfé et ses hommes occupent les lieux; suite a ces guerres et attaques le château avait souffert, mais ces derniers garderont la seigneurie jusqu'à la Révolution et ils ont  transformés le château en agréable résidence. Malheureusement en 1793 le château est incendié par les troupes républicaines.                                                                        Aujourd'hui une association le maintien en son état pour en faire un musée.","architecture":"Montrond, sur une butte au bord de la Loire, enceinte quadrangulaire à laquelle sont appuyés des logis autour d'une cour intérieure aux angles sont flanqués de tours rondes et carrées, c'est ce qui reste d'une forteresse du XIIIe siècle qui a été réduit en château au passage des guerres de religion et à un incendie à la Révolution.","habitants":"Famille d' Artaud de St-Germain\r\n        \"","divers":"Vestiges du château de Montrond","gps":"","images":["../../jctruffet.com/image/image_42/42_Montrond_les_Bains_1.jpg","../../jctruffet.com/image/image_42/42_Montrond_les_Bains_2.jpg","../../jctruffet.com/image/image_42/42_Montrond_les_Bains_3.jpg","../../jctruffet.com/image/image_42/42_Montrond_les_Bains_4.jpg"]},"Consult_chateau_formulaire23d5":{"id":"Consult_chateau_formulaire23d5","dept":"42","canton":"Montbrison","commune":"Savigneux","nom":"Montrouge","type":"Château","periode":"XVI","histoire":"MONTROUGE, manoir du XVIe siècle  propriété pendant plus de deux siècles de la famille Chirat de Montrouge, restauré par son propriétaire M. yves Prodon en 1970. Au cours des siècles ont été édifiés des châteaux, des maisons fortes. \r\nA Vaure-les Colombons-Bullieu-le Breuil, c'est une ancienne magnanerie. A Crémieu-le Vergnon, c'est une demeure du XVIIe siècle.\r\n Dans cette commune le château de Merlieu du XVIe siècle.","architecture":"Montrouge, Il est situé le long du Vizézy, non loin des châteaux de Bullieu et de Forys. Cest un manoir du XVIe siècle, de forme quadrangulaire à deux niveaux flanqué de tours rondes et carrées, ce manoir possède une très jolie façade de briques de couleur à la mode du Bourbonnais, flanquée de deux tours rondes, les façades latérales sont terminées lune dun pavillon rectangulaire, lautre dune troisième tour ronde.\r\nLe château de Merlieu, il est situé le long de la route de Lyon ou de Feurs ouverte en 1790 à trois kilomètres de Montbrison, succède à une maison forte vers le XVIe siècle, est une construction très simple bâtie en pisé, sauf laile sud reconstruite en pierres au XVIIIe siècle après un incendie. \r\nLe bâtiment central est encadré par deux ailes terminées chacune par une tour ronde.","habitants":"Famille de Chirat de Montrouge et de  Yves Prodon\r\n        \"","divers":"Château de Montrouge, inscrit à l'inventaire supplémentaire des monuments historiques depuis 1990.\r\nChâteau de Merlieu du XVIIe siècle.\r\nChâteau de Vaure (XVI-XVIIe siècle).","gps":"","images":["../../jctruffet.com/image/image_42/42_Montrouge_1.jpg","../../jctruffet.com/image/image_42/42_Montrouge_2.jpg","../../jctruffet.com/image/image_42/42_Montrouge_3.jpg","../../jctruffet.com/image/image_42/42_Montrouge_4.jpg"]},"Consult_chateau_formulaire2db5":{"id":"Consult_chateau_formulaire2db5","dept":"42","canton":"Boën","commune":"Montverdun","nom":"Montverdun","type":"Vestiges","periode":"XII","histoire":"MONTVERDUN, il ne reste plus rien du château qui dépendait des comtes de Forez ensuite aux Bourbons, qui sous cette  dernière lignée Renaud fils de Charles Ier fut prieur à Montverdun en 1480.     Il y eut à Montverdun un monastère au VIIIe siècle, l'histoire de Montverdun  se rapporte principalement à ce monastère qui fut crée par St-Porçaire qui fut torturé à mort par les Sarrasins.        Un prieuré bénédictin fut crée par l'abbaye de Sévigny en 1020 bien qu'un local religieux existé déjà sur le mont Verdunus, puis par l'abbaye bénédictine de la Chaise-Dieu en 1223, un pape fut issue de Montverdun l'abbé Pierre Roger en 1250 sous le nom de Clément VI.      Après la Révolution toutes ces constructions appartiennent à la commune ou se crée une association  des Amis du Pic de Montverdun  pour la restauration et les animations.","architecture":"Montverdun, d'importantes constructions furent réalisées en pierres volcaniques entre le XIIe et le XIIIe siècle les fortifications datent du XIVe siècle, il ne reste plus rien du château  seulement le Prieuré:                        Château de la Combes, de plan rectangulaire  flanqué de tourelles sur les côtés.","habitants":"Amis du Pic de Montverdun \r\n        \"","divers":"Dans la commune le château  des Montverdun et de la Combes qui fut construit  au XVIIe siècle  et remanié au XIXe siècle.","gps":"","images":["../../jctruffet.com/image/image_42/42_Montverdun_1.jpg","../../jctruffet.com/image/image_42/42_Montverdun_2.jpg","../../jctruffet.com/image/image_42/42_Montverdun_3.jpg","../../jctruffet.com/image/image_42/42_Montverdun_4.jpg"]},"Consult_chateau_formulaire41bf-2":{"id":"Consult_chateau_formulaire41bf-2","dept":"42","canton":"Roanne","commune":"Riorgues","nom":"Neufbourg","type":"Château","periode":"XVIII","histoire":"NEUFBOURG, au XIIIe siècle fief de la famille de l'Espinasse, en 1475 passa par alliance à la famille Curtin, Claude Curtin, écuyer du Roi épousa Marguerite de Rochefort qui possédait ce domaine, cette famille sera anoblie, Jean Courtin épousa Isabeau de Lingendre, son fils Jean François Curtin fit construire le château sur les ruines de celui du XIIIe siècle, resta dans cette famille jusqu'au XXe siècle, il fut racheté par la famille Boisset.","architecture":"Neufbourg, de construction rectangulaire à trois niveaux face à un jardin à la française.","habitants":"Famille de Jean François Curtin\r\n        \"","divers":"Dans la commune château Neufbourg et de Beaulieu transformé en musée.","gps":"","images":["../../jctruffet.com/image/image_42/42_Neufbourg_1.jpg","../../jctruffet.com/image/image_42/42_Neufbourg_2.jpg"]},"Consult_chateau_formulairee020":{"id":"Consult_chateau_formulairee020","dept":"42","canton":"St-Haon-le-Chatel","commune":"Noally","nom":"Noally_Motte","type":"Château","periode":"XV","histoire":"NOALLY, château familial transformé en hôtel restaurant par Sylvie Fayolle.     Dans cette commune château de la MOTTE, seigneurie des le Blanc, vicomte de Macon, jusqu'au premier quart du XIIIe siècle, vassaux des comtes du Forez à l'extention des le Blanc, le domaine passe  au XIIIe siècle a Etienne de l'Espinasse, qui au XVe siècle revient aux de Marcilly et de Talaru-Chalmazel, aujourd'hui hôtel restaurant de luxe. Autre château dans la commune la Briquelandière avec toiture du XVIIe siècle  et le manoir de Joux.","architecture":"Noally, de construction récente du XVIIIe siècle, en L avec tour en angle intérieur La Motte, château du XVIIIe siècle restauré au XIXe siècle dans un style médiéval.","habitants":"Seigneurie des le Blanc\r\n        \"","divers":"Château de Noally et de la Motte","gps":"","images":["../../jctruffet.com/image/image_42/42_Noally_Motte_1.jpg","../../jctruffet.com/image/image_42/42_Noally_Motte_2.jpg","../../jctruffet.com/image/image_42/42_Noally_Motte_3.jpg","../../jctruffet.com/image/image_42/42_Noally_Motte_4.jpg","../../jctruffet.com/image/image_42/42_Noally_Motte_5.jpg"]},"Consult_chateau_formulaireeaa5-2":{"id":"Consult_chateau_formulaireeaa5-2","dept":"42","canton":"Pélussin","commune":"Pélussin","nom":"Pelussin_Virieu","type":"Manoir","periode":"XV","histoire":"PELUSSIN, château de VIRIEU, construit par le seigneur Jean de Fay, depuis 1173 le château servait de sentinelle  chargée de garder  les communications de St-Chamond au Rhône.                   L'industrie de la Soie s'installa  dans le Pilat avec Antoine Gayotti dans le milieu du XVe siècle, puis à St-Chamond sous la protection des barons de Tournon comte du Roussillon et bailli du Vivarais. Gayotti fut suivi par ses compatriotes Pierre Benay et Horace Benay en 1572 et son fils Antoine s'installa à Virieu en 1586
