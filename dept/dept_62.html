 d'ardoise, devient Orphelinat                                                                                                     PONT FEUILLET  Demeure construite vers 1850 selon la tradition orale ; monogramme : FC, au-dessus de la porte piétonne du parc; souche de cheminée de style néo-gothique sur un bâtiment de communs. L'édifice se compose d'un étage de soubassement, d'un étage carré et d'un étage de comble, le gros-oeuvre en grès, et moellon, élévation à travées surmontée de toit à longs pans ; croupe ; noue et demi-croupe, couverts d'ardoise.","architecture":"NEUF, ce château, rappelle en un style moins monumental, celui des Lions de Pont de Briques. C'est un bâtiment rectangulaire dont les faces présentent respectivement cinq et trois travées. Les façades les plus longues disposées parallèlement à la route ont leurs trois travées centrales en légère saillie sur les deux autres, et leurs baies du rez-de-chaussée ont été tracées en plein cintre. Toutes les autres ouvertures sont rectangulaires et surmontées d'un petit entablement. Un cordon horizontal sépare les deux niveaux de l'élévation, une corniche à modillons, sommée d'une balustrade aveugle pour la partie centrale, cerne la base de la toiture pyramidale. On accède à la porte d'entrée ouverte sur l'un des petits côtés par deux escaliers placés parallèlement au mur du soubassement.","habitants":"Lions  Famille de Auguste Mariette \"","divers":"trois châteaux dans cet article de Saint_léonard grav-1 et la tour grav-4, Lions grav-3, Pont feuillet grav-2, et Neuf grav-3 .","gps":"","images":["../image/image_62/62_St_L%c3%a9onard_62_1.jpg","../image/image_62/62_St_L%c3%a9onard_62_2.jpg","../image/image_62/62_St_L%c3%a9onard_62_3.jpg","../image/image_62/62_St_L%c3%a9onard_62_4.jpg"]},"Consult_chateau_formulaire2f96-2":{"id":"Consult_chateau_formulaire2f96-2","dept":"62","canton":"Desvres","commune":"St-Martin Choquel","nom":"St_Martin_Choquel","type":"Château","periode":"XVII","histoire":"ST-MARTIN-CHOQUEL  Dès le Moyen Age, un château a existé au sommet du mont Hulin, une hauteur voisine. En 1747, Pierre Merlin négociant-armateur de Boulogne, acquit le domaine. Son fils prénommé également Pierre, entreprit la construction d'un nouveau château. Giraud Sannier en fut l'architecte; il figure deux fois dans ses comptes, en décembre 1778 et en mars 1779. Peu après le château est devenu la propriété des Mauduit, des parents des Merlin, et le nom d'Alberich Mauduit figure sur la rampe de l'escalier. L'abbé Dutertre, un réfractaire, y résida pendant la Terreur. Au XIXe siècle, il appartint à divers propriétaires, dont le notaire Harlé de Desvres à partir de 1832. Au cours de la dernière guerre, il fut endommagé par une bombe qui explosa dans la pelouse. Propriété de M. Grare, le château fut divisé en appartements, et des construction parasites lui furent ajoutées, ses jardins détruits et divisés en potagers. Il appartient à M. de Poncheville qui s'attache avec passion à le restaurer. Ce château appartient à la série des rendez-vous de chasse, des bagatelles bâtis en grand nombre dans le Nord. C'est une construction rectangulaire présentant au centre de chacune de ses façades principales un avant-corps saillant, celui sur la cour a ses angles arrondis, l'autre présente trois pans. La façade sur le jardin est aujourd'hui quelque peu dénaturée par la présence d'une construction parasite à droite de l'avant-corps, mais l'actuel propriétaire a le souci de restaurer sa demeure et on peut être assuré qu'il lui rendra toute sa dignité.","architecture":"ST-MARTIN CHOQUEL  c'est une construction rectangulaire présentant au centre de chacune de ses façades principales un avant-corps saillant, celui sur la cour a ses angles arrondis, l'autre présente trois pans. La façade sur le jardin est aujourd'hui quelque peu dénaturée par la présence d'une construction parasite à droite de l'avant-corps, mais l'actuel propriétaire a le souci de restaurer sa demeure et on peut être assuré qu'il lui rendra toute sa dignité.","habitants":"Famille de Pierre Merlin \"","divers":"Château de St-Martin Choquel","gps":"","images":["../image/image_62/62_St_Martin_Choquel_1.jpg"]},"Consult_chateau_formulaireb0c1":{"id":"Consult_chateau_formulaireb0c1","dept":"62","canton":"St_Omer","commune":"St_Omer-Bledecques","nom":"St_Omer","type":"Châteaux","periode":"XVII-XVIII-XIX-","histoire":"Cinq châteaux dans cet article, Bonningues, Clarques, Sandelin et Werthose.                                                                                                            BONNINGUES les ARDRES  le manoir de Bonningues-les-Ardres se situe dans un charmant petit village, dans la vallée de la Hem, vous propose ses chambres d'hôtes. C'est une demeure Napoléonienne datant de 1839, entouré d'un jardin de 5000 m2 . Vous apprécierez le calme et l'ambiance chaleureuse qui règnent dans cette maison. Chaque pièce a été rénovée pour restituer l'original de son passé. Côté jardin, détente et plénitude vous accompagneront dans le salon dans un espace à la Française.                                                                   TILQUES  La bâtisse du XIXe siècle se trouve au cur du marais Audomarois, dans un vaste parc verdoyant. Le château Tilques daté de 1891 a été bâti à partir des ruines d'un manoir du XVIIe siècle. L'hôtel 3 étoiles, avec sa belle architecture néo-flamande et son parc de 4 hectares, offre un cadre magnifique aux hôtes venus apprécier un délicieux séjour avec dîner à deux.                                                                      CLARQUES,  présentant un corps central du XVIIIe siècle, est  agrandi au début du XXe siècle avec lajout de deux grandes ailes en saillie. Lensemble présente cependant une unité harmonieuse, sinscrivant dans un parc romantique aménagé au XIXe siècle, à proximité dune ancienne motte féodale.","architecture":"HOTEL SANDELIN, en 1773, Pierre Sandelin, comte de Fruges, achète lancien hôtel du gouverneur de Saint-Omer, sa construction date du 3ème quart du XVIIIe siècle. Pierre Sandelin meurt en 1776, cest donc son épouse, Marie-Josèphe, qui mène le projet à son terme.  Lhôtel particulier suit le modèle français de lhôtel « entre cour et jardin ». Le corps de logis principal se prolonge par deux ailes en retour hébergeant les écuries et les cuisines, lensemble formant un « U » autour de la cour principale qui donne sur la rue. Le portail principal et les murs le cantonnant ; les façades et toitures des bâtiments entourant la cour d'honneur, le sol, la façade postérieure et la toiture correspondante , le sol du jardin;, classés le 7/07/1955 -  L'hôtel Sandelin est devenu un musée,                                                                             WERTHOSE date de 1903. Le château de Westhove a été construit vers 1903-1904 dans un style Néo-Renaissance. Entouré d'un grand parc, il se trouve à proximité de la rivière Aa. Il servira de Kommandantur à l'armée allemande jusqu'en 1943. Le château devient, à cette date, une propriété communale. L'ensemble parc et le château de Westhove a été transformé en un centre sportif avec des terrains de sport, dans le parc et vestiaires dans le château de Blendecques. L'édifice est fermé au public depuis 2004. Il est devenu la propriété de la commune. Aujourd'hui, l'accès intérieur est interdit par des grilles, l'ensemble du château de Blendecques ayant été entièrement vandalisé a été inscrit en totalité aux M.H. en 2011.","habitants":"Pierre Sandelin\"","divers":"Cinq châteaux dans cet article,  de St-Omer-Bledecques; Bonningues grav-1, Tilques grav-6, Bosuit grav-7 Clarques, Hallines grav-2-3, Sandelin grav-4    et Werthose grav-5.                                          GPS : 50° 47' 37\" Nord, 2° 00' 56\" Es                                                              Werthove GPS : 50° 43' 04\" Nord, 2° 16' 38\" Est","gps":"50° 47' 37\" Nord, 2° 00' 56\" Es","images":["../image/image_62/62_St_Omer_1.jpg","../image/image_62/62_St_Omer_2.jpg","../image/image_62/62_St_Omer_3.jpg","../image/image_62/62_St_Omer_4.jpg","../image/image_62/62_St_Omer_5.jpg","../image/image_62/62_St_Omer_6.jpg","../image/image_62/62_St_Omer_7.jpg"]},"Consult_chateau_formulairea677":{"id":"Consult_chateau_formulairea677","dept":"62","canton":"Fruges","commune":"Thiembronne","nom":"Thiembronne","type":"Château","periode":"XIV-XIX","histoire":"THIEMBRONNE, fut l'une des douze baronnies du comté de Boulogne ; les plus anciens seigneurs du lieu connus sont Gautier et Wiscart de Thiembronne qui vivaient en 1071. Au début du XIVe siècle, par le mariage de Jeanne de Thiembronne avec Bournel de Lambersart, la terre passa dans cette famille, c'est par alliance, qu'elle arriva en 1527 dans celle de Rouault, seigneur de Gamaches. Mais on ignore quelles étaient les dispositions du château qui existait alors en 1588. Au XVIIe siècle le bien passa à la famille de Bunion, puis en 1734 par alliance encore, il était à celle de Montmorency-Luxembourg qui le vendit à l'épouse d'un conseiller du roi, Simon-Zacharie de Palerne. Avant 1843, il abrita l'école des filles, il appartenait alors à M. Moleux de Boulogne qui, cette année-là, le vendit à M. Isidore François, on suppose que c'est lui qui a construit le château actuel.","architecture":"THIEMBRONNE, il a été élevé sur une éminence limitée par une murette qui domine la route. C'est un long corps de bâtiment rectangulaire à un étage sur rez de chaussée. Pour cette construction du XIXe siècle, on a réservé la pierre pour le soubassement, les angles et les cordons qui courent au niveau de l'appui des fenêtres et au-dessus de celles-ci et pour la corniche; le reste est en brique. Un avant-corps étroit et peu saillant donne l'axe du bâtiment. Un petit fronton le coiffe au niveau de la toiture dotée de simples tabatières.","habitants":"Famille de  Bournel de Lambersart\"","divers":"Château de Thiembronne","gps":"","images":["../image/image_62/62_Thiembronne_1.jpg"]},"Consult_chateau_formulaired315-2":{"id":"Consult_chateau_formulaired315-2","dept":"62","canton":"Saint-Omer","commune":"Tilques","nom":"Tilques","type":"Château","periode":"XV","histoire":"ECOU  le château-hôtel de Tilques apelé aussi le Najeti hôtel est un château bâti à Tilques,  date du XIIIe siècle. Il doit son nom au Seigneur Willelmus d'Ekout. Il a été remanié au XVe siècle. En 1595, il appartenait à Adrien de Croix seigneur de Wasquehal. Au milieu du XVIIIe siècle, il appartenait à André de Martigny. Sa fille, Marie Marguerite, qui avait épousé, en 1739, Guislain-Antoine d'Herbais de Villecasseau, en devint propriétaire puis, sa petite-fille, Marie-Louise d'Herbais, en hérita, à la mort de sa mère, en 1780. Marie-Louise d'Herbais étant mariée à Guislain-François de Taffin de Tilques, fils de Nicolas-Antoine, Seigneur du Hocquet.","architecture":"SAUBRUIT, une résidence de campagne des moines de Saint-Bertin est attestée dès le Moyen Age. Au XIVe siècle, c'est un domaine agricole d'importance. Un incendie à la fin du XVIe siècle amène à la reconstruction des bâtiments et un autre au XVIIIe siècle conduit à nouveau à la reconstruction d'une bonne partie. Vers 1840 ont lieu la démolition des deux pavillons et des travaux sur la façade Est. La partie la plus ancienne est située au nord du côté des marais. Il s'agit des communs. Au XVIIIe siècle vient s'accrocher l'aile en T sur la façade nord et deux pavillons calent la composition de la façade sud. La façade sud est agrémentée de décors sobres au XIXe siècle. Les intérieurs sont décorés de boiseries et stuccatures qui en font un exemple assez exceptionnel pour la région. On note la forte présence architecturale des communs, en particulier des façades extérieures qui semblent inspirées de l'Italie.","habitants":"Seigneur Willelmus d'Ekout\"","divers":"Deux châteaux dans cet article; Ecou grav-1 et Hocquet grav 2-3.                           Ecou GPS : 50° 46' 41\" Nord, 2° 12' 18\" Est                                                            Hocquet GPS : 50° 46' 41\" Nord, 2° 12' 18\" Est                                                 Tilques gps  50° 46' 30? N, 2° 12' 51? E","gps":"50° 46' 41\" Nord, 2° 12' 18\" Est","images":["../image/image_62/62_Tilques_1.jpg","../image/image_62/62_Tilques_2.jpg","../image/image_62/62_Tilques_3.jpg"]},"Consult_chateau_formulairec784":{"id":"Consult_chateau_formulairec784","dept":"62","canton":"Fruges","commune":"Torcy","nom":"Torcy_62","type":"Château","periode":"XVII-XVIII","histoire":"TORCY, invisible au passant, le château de Torcy est niché dans un cadre verdoyant. Construit en 1727 par Charles-Joseph-Barthélémy Moullart, baron de Torcy, le château fut remanié dans le style néo-gothique anglais par l'architecte parisien Pierre-Charles Dusillon vers 1857-60. Un parc paysager est également aménagé à cette même période par l'architecte paysagiste Louis-Sulpice Varé. La tour du chevalier est érigé quinze ans plus tard. Un dessin datant de 1879 représente le chevalier de la tour avec son armure du haut de sa terrasse.","architecture":"TORCY de l'ensemble architectural datant de 1727, la ferme transplantée au nord, étant rebâtie comme une ferme-modèle. La façade sud donnant sur le parc est flanquée de deux tours et comporte dix-huit travées. Une imposante travée abrite le perron sous un dais de style néo-Renaissance surmonté d'un pignon triangulaire. Le perron a, aujourd'hui  disparu. Une autre travée présente des cartouches mentionnant la date 1727. La toiture est en ardoises. La façade nord offre un aspect plus traditionnel : appareillage de briques et pierre de l'étage et corniche sous toiture en pierre blanche. La galerie est composée de six baies ouvragées. Une balustrade en fonte au motif gothique sépare le rez-de-chaussée et l'étage. Les éléments décoratifs architecturés sont également présents (rosace, gargouille, tête de maure) situant l'ensemble entre deux tendances : \"gothic revival\" et architecture néo-médiévale. Les décors intérieurs reflètent le mode de vie observé dans une demeure de campagne d'une famille aristocratique à cette époque. Les deux salons au rez-de-chaussée sont ornés de boiseries à motifs de guirlandes. La salle à manger possède un mobilier incorporé et des murs tendus de cuirs à l'imitation de Cordoue. Le vestibule s'ouvre sur le jardin. Le parc sert d'écrin au château et s'étend sur une quinzaine d'hectares en direction de l'étang, au sud. Au nord, devant la bâtisse, une prairie conduit à la ferme-modèle. Son agencement tend toujours à mettre en scène le château dans un jeu de perspectives et d'échappées visuelles.","habitants":"Baron de Torcy Charles Joseph Barthélémy Moullart\"","divers":"Château de Torcy à Torcy","gps":"","images":["../image/image_62/62_Torcy_62_1.jpg","../image/image_62/62_Torcy_62_2.jpg"]},"Consult_chateau_formulaire1283":{"id":"Consult_chateau_formulaire1283","dept":"62","canton":"Auxi-le-Château","commune":"Tramécourt","nom":"Tramécourt","type":"Château","periode":"XVII-XVIII","histoire":"TRAMECOURT,  le domaine de Tramecourt est la résidence des Marquis de Tramecourt, depuis 1191, cette famille dès le VIIe siècle  a donné son nom à la maison de Tramecourt, qui prit part aux croisades de 1191 et 1290 et possède encore aujourd'hui le château.  Au XVIIe siècle construction du manoir succèdant à la maison  forte féodale, en 1740 édification de l'aile gauche, 1827 la terre de Tramécourt est érigée en marquisat, 1852 achèvement de la construction du château. Son petit-fils Renaud meurt sans descendance et avec lui s'éteind la lignée passe alors à sa soeur Jeanne-Marie épouse de Guillaume  de Chabot en 1882, ancêtre directe des propriétaire actuels.\nÉléments protégés MH : l'ensemble formé par le monument commémoratif  inscription par arrêté du 13 novembre 2003.","architecture":"TRAMECOURT. le parc couvre une superficie de 32 hectares et forme avec le château l'un des plus beaux ensembles,  Le parc à l'anglaise, alternance harmonieuse de bosquets et de verdure, d'ombres et de lumières, est entretenu fidèlement afin de respecter le dessin original qui date de 1657. La construction du manoir en 1615, marque l'aboutissement d'une période de Renaissance de la famille de Tramecourt, qui avait subi de graves revers au cours de la guerre de cent ans et de la bataille d'Azincourt ayant eu lieu sur les terres voisines, en 1415.  La vaste demeure seigneuriale des marquis de Tramecourt a d'abord été une forteresse médiévale . A la demeure seigneuriale austère du début du XVIIe siècle, reconvertie au siècle suivant en logis de fermier, succède un beau château de plaisance en 1740, en brique et pierre.  Percé d'une longue et majestueuse perspective, le château comprend un corps de logis brique et pierre élevé de deux niveaux, dont la profondeur qui s'exprime dans l'importance du grand comble constitue une innovation. Les travaux menés à partir de 1848, par le marquis de Tramecourt, donnèrent au château une alure plus majestueuse. Le doublement de la perspective d'arrivée, encadrée de grands arbres, s'inscrit dans le réaménagement général du parc.","habitants":"Famille de Tramécourt\"","divers":"Tramecourt;  GPS : 50° 27' 53\" Nord, 2° 09' 05\" Est","gps":"50° 27' 53\" Nord, 2° 09' 05\" Est","images":["../image/image_62/62_Tram%c3%a9court_1.jpg","../image/image_62/62_Tram%c3%a9court_2.jpg","../image/image_62/62_Tram%c3%a9court_3.jpg"]},"Consult_chateau_formulaire4f88-2":{"id":"Consult_chateau_formulaire4f88-2","dept":"62","canton":"Étaples","commune":"Lefaux","nom":"Trembles_Lefaux","type":"Château","periode":"XVII","histoire":"Des TREMBLES    le château des Trembles a été construit sur une propriété qui n'a jamais été vendue, son histoire se confond avec le manoir du Fayel, situé à quelques centaines de mètres de là. En 1843, Léopold de Rocquigny, à qui appartenait le domaine des Trembles, fit bâtir une ferme au pied du versant nord du coteau. A sa mort, sa fille en hérita et son époux, Joseph de France, fit alors construire le château en 1866 par un architecte Riquier d'Abbeville. A la mort de leur fille, Jehanne de France, il revint au neveu de celle-ci, M. Jean de Rosamel, l'actuel propriétaire.","architecture":"au nord d'Etaples; TREMBLES, dont le domaine s'appelait aussi parfois \"Les Blanquettes\", est caché dans le fond d'un vallon au milieu des bois. Une inscription en chiffres romains sur sa façade donne sa date de construction, 1876, son architecte s'est inspiré des constructions du début du XVIIe siècle. L'édifice comprend un corps de bâtiment réalisé en pierre et brique que deux pavillons font saillie aux extrémités. Au centre, un haut perron permet d'atteindre la porte qu'encadrent deux colonnes traitées en ordre français qui supportent le balcon. La porte d'entrée est surmontée d'une tête de Christ aux traits largement traités, deux pattes de lion délimitent le balcon central. Ce beau château, bâti dans un cadre magnifique, est bien représentatif des tendances de l'architecture privée au cours des dernières décennies du XIXe siècle.","habitants":"Famille de Léopold de Rocquigny\"","divers":"Domaine et tour à Lefaux","gps":"","images":["../image/image_62/62_Trembles_Lefaux_1.jpg","../image/image_62/62_Trembles_Lefaux_2.jpg","../image/image_62/62_Trembles_Lefaux_3.jpg"]},"Consult_chateau_formulaireba09":{"id":"Consult_chateau_formulaireba09","dept":"62","canton":"Desvres","commune":"Wierre-Effroy","nom":"Val_d","type":"Château","periode":"XVI","histoire":"VAL d'HESDRES,  doit avoir été construit par Anthoine Chinot; celui-ci naquit en 1527 et il devint lieutenant génétal de la sénéchaussée de Boulogne; ses fonctions l'obligèrent à résider en ville, mais il aimait beaucoup sa résidence de campagne; bien qu'adversaire des protestants, il prit cependant le parti du roi contre les Ligueurs; il mourut en 1610. Ce sont ses descendants qui ont possédé le Val d'Hesdres jusqu'au XXe siècle.","architecture":"VAL d'HESDRES, dans ce château, de plan rectangulaire, tout y a été mis en uvre pour qu'il s'en dégage une impression de hauteur, d'élancement. Trois tourelles le dominent. Deux d'entre elles sont carrées et couvertes par une toiture en bâtière, implantées du côté de la cour; la plus proche de l'entrée est plus petite que l'autre, elle ne fait pas saillie sur le corps de logis; elle contient un escalier en vis; la grande tourelle carrée, accolée au bâtiment au fond de la cour, renferme un escalier à paliers droits, elle s'ouvre sur l'extérieur par une porte en arc brisé portant une fleur de lis au-dessus de sa clef ; on y remarque des organes de défense, notamment une bretèche. La troisième tourelle, celle qui correspond à l'angle sud-est, jusqu'à une date très récente, dominait nettement le bâtiment et une poivrière la couvrait. Le corps de logis juxtapose deux bâtiments de hauteur inégale, le plus élevé avoisinant la haute tourelle carrée et la tourelle ronde ; ses deux parties sont éclairées par des baies à meneaux.","habitants":"Famille d'Anthoine Chinot;\"","divers":"à Wierre-Effroy château de Val-dHesdres manoir de la raterie  grav-1, de Lemaître grav-2 et Bramerie grav-3","gps":"","images":["../image/image_62/62_Val_d%27Hesdres_1.jpg","../image/image_62/62_Val_d%27Hesdres_2.jpg","../image/image_62/62_Val_d%27Hesdres_3.jpg"]},"Consult_chateau_formulaire58c3":{"id":"Consult_chateau_formulaire58c3","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Valhuon","nom":"Valhuon_Bryas","type":"Châteaux","periode":"XVI","histoire":"VALHUON, au milieu du XVIe siècle, Philippe Blassel était le seigneur du lieu, au début du siècle suivant, la seigneurie passa à Barthélémi Le Vasseur, sieur de Verquigneul, anobli en 1547. Sa famille éteinte, la terre fut acquise par Jean Courcol, écuyer, premier élu d'Artois ; comme celui-ci n'eut pas d'enfant, par testament, il la transmit en 1690 a ses cousins, les Boucquel. Vers 1780, le château était à Eugène d'Hamelincourt, le plus riche propriétaire de la province, et comme il aimait vivre à la campagne, son château et son jardin avaient la réputation d'être bien entretenus. Son fils ayant ëmigré, le domaine fut vendu comme bien national.","architecture":"VALHUON, le château est formé de deux bâtiments disposés en équerre. A droite de celui qui donne vers la place du village, une grande porte cochère en plein cintre bâtie en pierre avec bossages continus porte la date de 1722; elle donne accès à la cour entourée, d'une part des bâtiments de ferme, d'autre part du revers des deux ailes du château. La façade principale de celui-ci est contiguë à cette entrée. C'est un édifice en pierre de sept travées sur deux niveaux avec chaînages à refends aux angles. La porte d'entrée ouvre sur un vestibule d'où part un bel escalier à balustres dont le départ et le limon sont moulurés; la courbe de sa rampe est particulièrement harmonieuse.","habitants":"Valhuon-Famille de Barthélémi Le Vasseur,\"","divers":"Château de  Bryas à Valhuon","gps":"","images":["../image/image_62/62_Valhuon_1.jpg"]},"Consult_chateau_formulairee6c9":{"id":"Consult_chateau_formulairee6c9","dept":"62","canton":"Auxi-le-Château","commune":"Willeman","nom":"Vallières_Willeman","type":"Château","periode":"XVI-XVII","histoire":"Willeman VALLIERES  L'existence de cette seigneurie, qui relevait du château d'Hesdin, est attestée dès le milieu du XIIe siècle, au cours des siècles suivants, elle est passée par héritage et par alliance entre les mains de diverses familles; au début du XVIIe siècle, elle appartenait à Daniel d'Aumale, chambellan du prince de Condé, mais comme celui-ci estima gênant de posséder cet édifice en terre espagnole, il le vendit à une famille de la région, les Triboulet; Françoise Triboulet ayant épousé Jean Croquison, il passa dans cette famille; c'est elle qui a bâti le corps de logis daté de1679.","architecture":"VALLIERES depuis lors, il a changé plusieurs fois de propriétaires. Il y a quelques années, il a été légué par la comtesse Amaury de Carné-Trécesson, en mémoire de son père, le préfet Georges Vallée, décédé en 1926, au comité d'hygiène sociale du Pas de Calais, il deviendra un centre de plein air et de rééducation professionnelle. Le château s'élève au fond d'une cour rectangulaire. Edifice en craie, mais ses angles et les encadrements des fenêtres présentent des assises alternées de pierres et de briques, son élévation est à deux niveaux. L'arc surbaissé de la porte d'entrée encadre un tympan de bois sculpté, orné du soleil symbolisant Louis XIV, au-dessus de celle-ci une petite niche a été ménagée, à sa droite une fenêtre ovale éclaire le vestibule.","habitants":"Famille de  Daniel d'Aumale\"","divers":"deux chateaux dans cet article Vallières à Willeman.                     Willeman  GPS : 50° 21' 16,88\" Nord, 2° 8' 58,51\" Est","gps":"50° 21' 16,88\" Nord, 2° 8' 58,51\" Est","images":["../image/image_62/62_Valli%c3%a8res_Willeman_1.jpg"]},"Consult_chateau_formulaire9f47":{"id":"Consult_chateau_formulaire9f47","dept":"62","canton":"Lumbres","commune":"Verchocq","nom":"Verchocq","type":"Château","periode":"XVII-XIX","histoire":"VERCHOCQ   Un château médiéval a existé à Verchocq, il était situé près de l'Aa, au lieu dit Pré du Château. Aux XIVe et XVe siècles, il a appartenu aux Framezelles. Aux XVIIe et XVIIIe siècles, il a fréquemment changé de mains; en 1776, M. de la Pasture, marquis de Verchocq, l'a vendu à M. de Malet, marquis de Coupigny. L'ancien château a été démoli en 1805; la pierre aux armes des Framezelles qui ornait l'entrée a été placée dans le collatéral sud de l'église. Vers 1810, le château actuel a été élevé pour Georges-Hubert-Amédée de Malet, marquis de Coupigny; en 1907 en procédant à des réparations, on a trouvé dans le dallage de la salle de billard de nombreux fragments de pierres funéraires qui provenaient de la Flandre maritime. Des remaniements lui ont été apportés par la suite. Après l'avoir acquis en 1906, M. André de la Gorce, père de l'actuel propriétaire, lui a apporté des modifications; l'aile nord a été construite; sa tourelle contenait un réservoir d'eau qui a approvisionné le château et les maisons avoisinantes. En 1917-1918, Churchill, 1er lord de l'Amirauté, y a résidé.","architecture":"VERCHOCQ,  le château de Verchocq est constitué d'un grand corps de logis rectangulaire sur le flanc nord duquel on a greffé au début de ce siècle une annexe plus basse à simple étage sur rez-de-chaussée ; son angle extérieur, du côté de la façade principale, a été pourvu d'une tourelle montée en encorbellement et couverte d'une terrasse.","habitants":"Famille de Georges-Hubert-Amédée de Malet\"","divers":"Château de Verchocq à Verchocq","gps":"","images":["../image/image_62/62_Verchocq_1.jpg"]},"Consult_chateau_formulaireb4e1":{"id":"Consult_chateau_formulaireb4e1","dept":"62","canton":"Berck","commune":"Verton","nom":"Verton","type":"château","periode":"XVI-XIX","histoire":"VERTON  a appartenu à la famille Fontaine-Solare du XIIIe au XXe siècle, en 1903, le château a été acheté par le colonel Fougerous de Campigneulles. La porte d'honneur du parc située près de l'église se présentait sous l'aspect d'une grande arcade cintrée, flanquée de pilastres doriques, soutenant un fronton sur lequel était sculpté un écu de style Louis XVI, aux armes des la Fontaine-Solare sous une couronne de marquis ; cette belle porte n'existe plus aujourd'hui.","architecture":"VERTON, actuellement, le château est constitué d'un corps de logis de plan rectangulaire avec ailes légèrement saillantes à ses extrémités; un autre bâtiment est disposé perpendiculairement au premier, en retour d'équerre; dans l'angle ainsi formé existe une tourelle à pans coupés qui domine le reste des constructions, celles-ci ont été réalisées en brique, des chaînages à bossages marquent les angles et les encadrements des fenêtres rectangulaires sont aussi en pierre. Une balustrade, de style gothique, ceinture la base du toit de l'aile perpendiculaire et du pavillon de l'autre bâtiment avoisinant la tour polygonale. Dans état actuel, il est très difficile de reconnaître dans ce château ce qui est authentique de ce qui ne l'est pas ; la tour a été tellement cimentée qu'on peut penser qu'elle a été totalement reconstruite.","habitants":"famille Fontaine-Solare colonel Fougerous de Campigneulles.\"","divers":"Château de Verton à Verton","gps":"","images":["../image/image_62/62_Verton_1.jpg"]},"Consult_chateau_formulaire5e2a":{"id":"Consult_chateau_formulaire5e2a","dept":"62","canton":"st_Pol sur Ternoise","commune":"Vicq","nom":"Vicq_62","type":"Château","periode":"XVII-XVIII-XIX","histoire":"De RUITZ                                                                                                                  avec ses quatre châteaux à Hersin-Coupigny, avec son fronton armorié a été bâti vers 1760, en remplacement de lancien château possédé par les de Coupigny, pour Jacques Coopens d'Hondschoote qui acheta la terre à Philippe de Berghes, prince de Râches. Le château, situé au milieu d'un parc paysager, est une agréable construction élevée seulement dun rez-de-chaussée, mais double en profondeur et couverte dun important toit en ardoise à croupes. La brique apparaît sur la façade à titre décoratif en panneaux verticaux, lessentiel des surfaces étant réservé à la pierre dont lappareil à refends marque le petit avant-corps central et les deux ailes en retour du côté de lentrée. A lintérieur, belle rampe en fer forgé de lescalier et boiseries dun petit salon, encadrant des toiles peintes dans le genre flamand. Il passa par alliance à la famille Taverne, puis à Fernand de Vicq qui le restaura vers 1900. Devenu propriété des Houillères, il a été racheté par M. et Mme Hédin qui lont revendu récemment.   Découvrez comment la place de la mairie  passant d'un ancien château privé aux bâtiments que vous connaissez aujourd'hui. Edifié dans un parc cette harmonieuse demeure de brique et de pierre du milieu du XVIIIe siècle frappée par ses agréables proportions, à l'intérieur à conservé une rampe d'escalier en fer forgé, des cheminées les houillières en son propriétaire.","architecture":"TOILE, construit entre  1867 et 1880 par un industriel du textile.                                                      RUITZ;  date du XVIIIe siècle, pour Pierre Lericque. Le Domaine de Ruitz fut légué, au début du XIXe siècle, au marquis d'Oresmieux, qui cèdera ensuite le château, ses terres et le Bois de Ruitz, à la Société Saint-Gabriel, qui y créa un orphelinat de garçons, il fermera en 1903. Et les fermiers loueront ses terres. Durant la première guerre mondiale, le château de Ruitz fut occupé par les Troupes Francaises et Britanniques. De 1930 à 1951, les Pères du Saint-Esprit vont y installer une Ecole de missions. Aujourd'hui, le chateau de Ruitz abrite dans ses murs, le Centre Culturel des Jeunes.","habitants":"Famille des de Coupigny                                Ruitz;  marquis d'Oresmieux, \"","divers":"Château à Vicq; Ruitz grav-2 Toile grav -1","gps":"","images":["../image/image_62/62_Vicq_62_1.jpg","../image/image_62/62_Vicq_62_2.jpg"]},"Consult_chateau_formulaire0325":{"id":"Consult_chateau_formulaire0325","dept":"62","canton":"Lens","commune":"Divion","nom":"Vieil_fort","type":"Château","periode":"XVIII","histoire":"VIEIL-FORT, pendant la 1ère guerre mondiale, le souterrain a servi d'infirmerie ainsi que la salle à manger et la cave. Lors de la seconde guerre mondiale les allemands sont arrivés au château, Mme Robert d'Hespel de Flensques est arrivée de suite sur le perron en les interpelant en allemand, car native de Stavelot, elle parlait couramment cette langue. Suite à cette interpellation, l'officier a salué la dame, ce qui a valu au château du Vieil Fort de n'être jamais occupé. De nos jours, le domaine, comprenant un magnifique parc boisé de cinq hectares, est entretenu par le Marquis Bernard de Goussencourt et Clotilde de Bournonville, sa nièce.","architecture":"VIEIL-FORT   l'édifice actuel a été construit entre 1868 et 1870, en pierre jaune de Saint-Leu, sur soubassement de grés, réalisés avec les murs de la Carpière. La façade, flanquée de deux pilastres d'ordre colossal, est composée d'une travée principale et de six travées secondaires. La travée principale comprend au rez-de-chaussée un porche délimité par deux colonnes à chapiteaux doriques supportant le balcon à balustrade, réalisé en pierre de Chimay et, à l'étage, une baie dotée de deux colonnes à chapiteaux ioniques. En couronnement se trouve un fronton cintré et brisé supportant deux sauvages armés d'une massue et entourant un écu sculpté aux armes des Genevières et timbré d'une couronne de Marquis.","habitants":"Famille , Mr Robert d'Hespel de Flensques\"","divers":"Château de Vieil-fort à Divion","gps":"","images":["../image/image_62/62_Vieil_fort_1.jpg","../image/image_62/62_Vieil_fort_2.jpg"]},"Consult_chateau_formulaire7401":{"id":"Consult_chateau_formulaire7401","dept":"62","canton":"Auxi-le-Château","commune":"Vieil-Hesdin","nom":"Vieil_Hesdin","type":"Château","periode":"XV-XVIII-XIX","histoire":"Deux châteaux dans cet article, Vieil-Hesdin et Estruval.                                        VIEIL HESDIN   Le premier château, daté du XIe siècle, formait un pentagone cantonné de cinq tours. L'édifice subit des transformations à la fin du XIIIe siècle. A partir de 1391, Philippe le Hardi, duc de Bourgogne, le transforme en une résidence princière qui se voit apporter confort et luxe. Elle est complétée par un parc à la fois de chasse et d'agrément, enfermant animaux exotiques et constructions éphémères. En 1553, Charles Quint rase la ville et le château et fit reconstruire une ville nouvelle. En 1858, l'architecte Clovis Normand redécouvre les ruines et y entreprend des fouilles. Éléments protégés MH : comme réserve archéologique, les vestiges du château en totalité : inscription par arrêté du 29 juillet 2005, vestiges.","architecture":"D'ESTRUVAL  La construction du château d'Estruval date de la 1ère moitié du XVIIIe et du XIXe siècle. La commune du Parcq est le souvenir toponymique de l'extraordinaire et historique parc d'Hesdin, créé par les comtes de Flandres, détruit avec la ville par Charles Quint, qui se situait à proximité de cette propriété où il n'y avait à l'origine qu'un pavillon de chasse appartenant à la Famille d'Estruval. Cette propriété a été transmise par mariage, sous Louis XIV, au Gouverneur d'Hesdin. En 1705 ou 1715, il a transformé les bâtiments existants, planté l'allée de tilleuls, construit 2 pavillons d'entrée et les haras. Incendié à la Révolution, le château d'Estuval fut racheté comme bien national, par Mr Thérouanne qui le fit rebatir à l'identique, en 1804. Le parc du château dEstuval a été retracé en 1822. La Famille Le Gentil l'a racheté en 1880, et y demeure toujours, exploitant les terres et élevant des chevaux de course.","habitants":"Famille d'Estruval\"","divers":"Trois châteaux dans cet article, Vieil-Hesdin   grav 3 clery-grav-1 et Estruval grav-2                                                       Estruval GPS : 50° 21' 30\" Nord, 2° 05' 59\" Est","gps":"50° 21' 30\" Nord, 2° 05' 59\" Est","images":["../image/image_62/62_Vieil_Hesdin_1.jpg","../image/image_62/62_Vieil_Hesdin_2.jpg","../image/image_62/62_Vieil_Hesdin_3.jpg"]},"Consult_chateau_formulaire7ba0":{"id":"Consult_chateau_formulaire7ba0","dept":"62","canton":"Desvres","commune":"Bellebrune","nom":"Villeneuve_Bellebrune","type":"château","periode":"XVII","histoire":"VILLENEUVE, c'est François de la Villeneuve, seigneur de Chaubourg, qui obtient le fief du domaine. Fait une belle carrière militaire, aide de camp et capitaine de régiment, originaire du pays chartrain, qui a donné son nom à cette demeure construite au temps de Louis XIV, comme l'indiquent les ancres de la façade qui donnent la date de 1668 accompagnée des initiales du propriétaire du lieu et de son épouse, Antoinette de Chinot.  décès en 1676 de  François de la Villeneuve, le château passe à son fils Antoine seigneur d'Alincthum qui termine sa carrière militaire comme colonel, loue le château à des anglais les Hampson, puis le château passe à l'arrière petit-fils de François  Antoine-Louis-Marie  ne demeure pas au château mais épouse une flamande et s'établit à Gand et cède le domaine en 1905 à Louis Oudart de Dixmude comte de Montbrun  et député du Pas de Calais, à sa mort passe à sa fille Mme Blin de St-Quentin, puis à sa petite-fille qui l'apporte en mariage à Octave de Rouvroy et passe ensuite  par mariage  aux Van Cappel de Prémont.   Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 22 janvier 1988.","architecture":"VILLENEUVE, le château construit en 1668, se compose d'un corps de bâtiment principal de forme rectangulaire de sept travées terminé à chaque extrémité et sur chaque façade d'un pavillon d'une travée chacun. Il  possède une élévation de deux niveaux réalisée en pierre du boulonnais plus un étage supplémentaire sous combles qui bénéficie d'une couverture en ardoises. Ce dernier niveau offre des ouvertures sous forme de lucarnes simples ou plus ouvragées. L'accès principal se fait au centre de la façade par une double porte donnant sur un vaste perron, un des pavillons latéraux offre un accès supplémentaire donnant sur un balcon, lui même pourvu d'un escalier.   Le parc, à partir des plantations de 1805 crées par le Vicomte de Montbrun, a été transformé en 1856 par les frères Bülher, architectes paysagistes célèbres, connus pour leur création du parc de la Tête dOr à Lyon.   Le parc que nous connaissons aujourdhui correspond dans ces tracés et dans la composition densemble au projet de 1856. Cependant au nord, les bois ce sont densifiés, faisant disparaître le jardin. Une allée de tilleuls, dans laxe du château vers le bois a également été plantée. Le parc est composé de bosquets de futaies tout autour de pelouses dégageant le fond du parc pour donner limpression que celui-ci continue dans la campagne. Lensemble est dune grande sobriété non seulement dans ces lignes, mais aussi dans la tonalité. Au centre du parc, un étang, miroir du château.","habitants":"François de la Villeneuve\"","divers":"Villeneuve à Bellebrune grav-1-2","gps":"","images":["../image/image_62/62_Villeneuve_Bellebrune_1.jpg","../image/image_62/62_Villeneuve_Bellebrune_2.jpg"]},"Consult_chateau_formulaire1849":{"id":"Consult_chateau_formulaire1849","dept":"62","canton":"","commune":"Villers châtel","nom":"Villers_Châtel","type":"Forteresse","periode":"XIV-XVIII","histoire":"VILLERS-CHATEL, appartenait au seigneur de Gournai, lors du siège d'Arras, en 1414. C'est une ancienne forteresse. La Famille de Habarcq devint la propriétaire du château de Villers-château jusqu'au milieu de XVIe siècle. Il changera ensuite de propriétaires : en 1550, il sera à Gilles de Lens puis à la Famille de Marquais, à Jérôme de Cassina et François de La Haye, à Pierre-Allard de Lannoy et Philippe de Haynin. En 1747, c'est Nicolas Mazel de Leval qui rachètera le château de Villers-Chatel et fera faire d'importantes transformations. Durant la première guerre mondiale, le château sera transformé en hôpital de campagne, vers lequel le Général Barbot, commandant la 77e Division alpine, fut transporté et mourut lors de son trajet. Une grande partie des bâtiments et du parc est inscrite à l'inventaire des M.H. depuis le 15 juin 2009. Forteresse des XIVe-XVe siècles, de plan quadrangulaire entourée de tours rondes et d'un donjon. Sur le flanc occidental, une tour circulaire, appelée \"le fort\", est la partie subsistante de l'époque médiévale. En 1750, une partie du château est démolie et un nouvel édifice reconstruit dont il reste la façade d'entrée. Le château est vendu plusieurs fois au cours du XIXe siècle.","architecture":"VILLERS-CHATEL et construit avec une aile en retour d'équerre avec un donjon carré à la jonction des deux bâtiments. Pendant la première guerre mondiale, le château sert d'infirmerie. Il est occupé par les Anglais puis par les Allemands au cours de la seconde guerre mondiale. Une ferme modèle, reconstruite après la première guerre mondiale, fait face au château. Un grand verger potager clos de murs, ferme l'espace entre le château et la ferme. Éléments protégés MH : le château pour ses façades et toitures, la tour médiévale et sa cheminée intérieure, la galerie néo-gothique, oeuvre de l'architecte Baron Béthune d'Ydewalle avec son décor et son sol ; le parc avec sa clôture et ses grilles ; le jardin potager et le verger dans ses murs et avec sa grille d'entrée ; l'ensemble de la ferme pour ses façades et toitures, et les cours ; la chapelle néo-gothique, inscription par arrêté du 15 juin 2004.","habitants":"Famille de Habarcq et  de Marquais \"","divers":"Villers-Châtel_ GPS : 50° 22' 39,14\" Nord, 2° 35' 24,48\" Est","gps":"50° 22' 39,14\" Nord, 2° 35' 24,48\" Est","images":["../image/image_62/62_Villers_Ch%c3%a2tel_1.jpg","../image/image_62/62_Villers_Ch%c3%a2tel_2.jpg","../image/image_62/62_Villers_Ch%c3%a2tel_3.jpg"]},"Consult_chateau_formulairead3f-2":{"id":"Consult_chateau_formulairead3f-2","dept":"62","canton":"Boulogne-sur-Mer","commune":"Vimille","nom":"Vimille","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article ; Billeauville, Pipots et Petit-Denacre. BILLEAUVILLE      Cet ancien manoir a été transformé en château en 1777. Les ailes, les pavillons en retour, les fenêtres ainsi que le monumental pigeonnier datent de la fin du XVIe siècle. Billeauville fut habité au siècle dernier par Jean-Baptiste de Rosny, maire de Boulogne et député du Pas-de-Calais sous la seconde Restauration, et par son fils Hector de Rosny, auteur dun volumineuse livre \"Histoire du Boulonnais\". Léthymologie parlante de ce nom est vérifiée par lagrément du site. En effet, il y avait là jadis un moulin à billots destiné à faire de lhuile et qui fût détruit par les Anglais quand ils occupèrent Boulogne. Cest pourquoi on trouve encore parfois écrit Billoville. Le parc du château est inscrit au pré-inventaire des jardins remarquables.                                                                                                          PIPOTS    Autrefois, on nommait ainsi une ferme touchant le bourg de Vimille au bas de la route de Calais. Aujourdhui, les regards sarrêtent sur le château des Pipôts. Situé à lentrée du village, il est lune des plus vieilles propriétés de Wimille car elle est citée dans des écrits datant de 1400 comme appartenant à une ancienne famille de Laboureurs. Il fut occupé par les Allemands durant la deuxième guerre mondiale et a été le témoin direct des événements de lhistoire de France. Du haut des marches du domaine, on peut contempler tout dabord un jardin à la française. Les arbres centenaires attirent les curieux des marronniers, un tulipier de Virginie, des frênes. Lallée principale est bordée de tilleuls. Ça et là, jaillissent des fontaines naturelles.","architecture":"PETIT-DENACRE à Saint martin-Boulogne  La Famille de Bourbourg, était les châtelains de la fin du XIe siècle à la moitié du XIIIe siècle. Louis de la Roche  achète la Raterie et en 1763 Edme-Antoine-François de la Pasture l'acquiert.  En 1777, un nouvel acquéreur Ducrocq de Bancres fit entreprendre la construction du petit château, en pierre grise de pays, coiffé dardoises, le corps de logis principal,  auquel sont accolées de chaque côté les dépendances, présente deux étages un niveau de combles et un rez-de-chaussée  Côté cour un avant corps saillant est doté d'un escalier à double volées, outres les baies sont à petits carreaux et tracées en plein cintre. Un cordon de pierres les sépare et ceinture tout le bâtiment. En 1788 à 1868 jacques Boucher de Perthes séjourna au château chez Mr de Cossette. En 1940-1944 occupation allemande,  la partie droite de la construction a été aménagée en blockhaus  au cours de la seconde guerre mondiale.  A la mort de Mr de Cossette en 1834  le domaine passa dans différentes mains et au début  du XXe siècle à la famille Huret et aujourd'hui à la famille Hubly.   Éléments protégés MH : les façades et les toitures ; la salle à manger et le salon au premier étage avec leur décor ; le bassin rond, la fabrique et la fontaine dans le jardin : inscription par arrêté du 26 juin 1978.","habitants":"Billauviie; Jean-Baptiste de Rosny               Pipots; famille de Laboureurs                         Petit Denacre famille de  Ducrocq de Bancres\"","divers":"Trois châteaux dans cet article ; Billeauville grav-1, Pipots grav-3-4 et Petit-Denacre grav-2.                                                Petit Denacre  GPS : 50° 45' 50\" Nord, 1° 38' 01\" Est","gps":"50° 45' 50\" Nord, 1° 38' 01\" Est","images":["../image/image_62/62_Vimille_1.jpg","../image/image_62/62_Vimille_2.jpg","../image/image_62/62_Vimille_3.jpg","../image/image_62/62_Vimille_4.jpg","../image/image_62/62_Vimille_5.jpg"]},"Consult_chateau_formulaire6f9b":{"id":"Consult_chateau_formulaire6f9b","dept":"62","canton":"Berck","commune":"Wailly-Beaucamp","nom":"Wailly_Beaucamp","type":"château","periode":"XVI-XVII-XVIII-XIX","histoire":"Quatre châteaux dans cet article, Beaucamp, Castel des Anges , Houssoye et la Feuillée.                                                                                                             Il existe plusieurs châteaux sur la commune de Wailly-Beacamp à découvrir : la gentilhommière, ex-château seigneurial, appelée autrefois « Le Petit-château » fut construite en 1701 par la Famille seigneuriale du Bus, le château du Moufflet qui est une construction de style Empire (XIXe) Le Château Les Tilleuls (XIXe siècle), Le Château Guilbart appelé la Prairière (XIXe siècle).                                                                                              CASTEL DES ANGES,  en 1668 passe aux Croÿ, Louise-Elisabeth d'Havre duchesse de Tourzel (1749-1832) puis en 1919 achat  par le baron de Lépine, aujourd'hui propriété de de Mr et Mme Joly.                                                                               La HOUSSOYE,  la construction du château de la Houssoye date du XIXe siècle, seigneuriale de Bus. Le château du Moufflet qui est une construction, du XIXe siècle, de style Empire, et le château Guilbart appelé depuis la Prairière (XIXe siècle). Le village de Wailly-Beaucamp comporte plusieurs châteaux et une gentilhommière . Aujourd'hui, le château Guilbart est appelé La Prairière, La gentilhommière, ex-château seigneurial. Le château du Moufflet est de style Empire et date du début du XIXe siècle,  Aujourd'hui « le Castel des Anges », le château de la Houssoye, du XIXe siècle, le château « Les Tilleuls » du  XIXe siècle.","architecture":"BEAUCAMP, Le château de Beaucamp appelé depuis le Castel des Anges du XIXe siècle de plan rectangulaire, s'élève sur trois niveaux dont des combles aménagés. Les murs construits en maçonnerie de briques supportent un toit à croupes couvert d'ardoises. L'axe du château est marqué par un léger ressaut où prend place la porte d'entrée précédée dun perron à six marches, est surmontée d'un balcon doté d'un garde-corps en fer et d'une porte-fenêtre. De part et d'autre de la travée centrale et rythmant la façade, dix travées de deux baies chacune présentent des encadrements en calcaire à linteau cintré et agrafe saillante. Elles sont munies d'un garde-corps en fer ouvragé. Une corniche en calcaire court sous le toit où cinq lucarnes à fermette débordante sont aménagées, dont une au-dessus de l'avant-corps axial.                                                                                                   la FEUILLEE, sa construction date du XIXe siècle. Le château Guilbart est appelé, la Prairière chambres d'hôtes. Aujourd'hui, le château est appelé « La Feuillée ».  Le village a été généreusement doté au cours des siècles précédents de gentilhommières (château de campagne) et conserve son caractère rural grâce à une multitude de fermes dites « picardes ».","habitants":"Castel des anges ;Louise-Elisabeth d'Havre duchesse de Tourzel \"","divers":"trois châteaux dans cet article, Castel des Anges grav-3-4 , la Houssoye et la Feuillée grav -1-2. Castel  GPS : 50° 24' 52\" Nord, 1° 43' 43\" Est                                                                     \nHoussoyes    GPS : 50° 24' 52\" Nord, 1° 43' 43\" Est                                                    Guilbart . GPS : 50° 24' 52\" Nord, 1° 43' 43\" Est","gps":"50° 24' 52\" Nord, 1° 43' 43\" Est","images":["../image/image_62/62_Wailly_Beaucamp_1.jpg","../image/image_62/62_Wailly_Beaucamp_2.jpg","../image/image_62/62_Wailly_Beaucamp_3.jpg","../image/image_62/62_Wailly_Beaucamp_4.jpg"]},"Consult_chateau_formulaireaf3c":{"id":"Consult_chateau_formulaireaf3c","dept":"62","canton":"Auxi-le-Château","commune":"Wamin","nom":"Wamin","type":"Château","periode":"XVII","histoire":"WAMIN, en 1409 Marie de Créquy apporte en dot la terre à Guillaume  de Fléchin. En 1641, pris par les Français que la famille Fléchin soutiennent. C'est  à Edouard-François de Fléchin de 1686 à 1749 et à son épouse Marie-Alexandrine d'Ennetières, que l'on doit l'actuel château, le premier connu à Wamin. A François son père, au moins les remises et à son petit-fils, Joseph-Hippolyte-Alexandre mort en 1780, la ferme attenante, achevée juste avant la Révolution. Au début du XIXe siècle, la famille Lefebvre de Gouy devint propriétaire avec Bernard-Valentin-Joseph. Cette famille apporte que des changements mineurs à l'édifice : le décor du grand et du petit salon où figure, en plafond, la croix de Saint-Louis, et dernièrement, une modification dans la disposition de l'escalier principal. Une fois franchie l'entrée, encadrée par deux pavillons dont l'un est orné d'un profil sculpté à l'antique, on découvre, au bout d'une avenue pavée, En 1794, le chateau de Wamin et son domaine furent vendus comme bien national. La Famille Fléchin a récupéré le château (décor royaliste du petit salon) avant de le revendre en 1811 à la famille Lefébre de Gouy  dont la descendance le possède toujours.","architecture":"WAMIN le château en brique et pierre, comportant deux courtes ailes en retour et prolongé de chaque côté par de plus petits bâtiments. La partie centrale, surmontée d'un fronton triangulaire qu'orne un cadran solaire, est percée de deux baies en plein cintre. A l'intérieur, certaines pièces ont conservé des caractéristiques anciennes: la salle des archives, sa voûte d'arêtes et une encoignure; le bureau, des portes d'armoire et de placard; ailleurs, des plafonds en gypseries, des dallages en marbre et partout des cheminées; deux escaliers aux rampes à balustres en bois découpé classiques.                                                                                           Éléments protégés MH : le château en totalité avec ses dispositions intérieures et ses décors, la cour d'honneur et les murs d'enceinte, les façades et les toitures des communs de la cour d'honneur et de la basse-cour et les deux pavillons d'entrée, le parc avec la gloriette et le potager avec la maison du jardinier : inscription par arrêté du 2 mars 2009.","habitants":"famille Fléchin\"","divers":"Château de Wamin                        GPS : 50° 24' 52,67\" Nord, 2° 3' 32,37\" Est","gps":"50° 24' 52,67\" Nord, 2° 3' 32,37\" Est","images":["../image/image_62/62_Wamin_1.jpg","../image/image_62/62_Wamin_2.jpg"]},"Consult_chateau_formulairec5f0":{"id":"Consult_chateau_formulairec5f0","dept":"62","canton":"Lillers","commune":"Gonnehem","nom":"Werppe","type":"Château","periode":"XV-XVI","histoire":"WERPPE, le château est une construction rectangulaire montée sur un soubassement de grés, son élévation est à deux niveaux et les dix séries d'ouvertures de sa façade ne sont pas régulièrement percées au rez-de-chaussée s'ouvrent deux portes, correspondant respectivement à la deuxième et à la sixième travée à partir de la gauche la deuxième est surmontée d'une fenêtre précédée par un petit balcon et l'ensemble de cette travée est mis en valeur par un jeu de pierre imitant le bossage.","architecture":"WERPPE, l'ensemble de la construction a été restauré. Il en est de même de la tourelle du XVe siècle, qui se greffe sur l'angle externe gauche, vers l'arrière le ciment masque totalement l'appareil d'origine, les ouvertures sont modernes. En façade arrière, deux pavillons dessinent des excroissances carrées, l'une près de la tourelle ronde, l'autre davantage vers le centre. Il est difficile d'assigner un âge à cette construction; d'après le tracé de ses fenêtres, légèrement cintrées et encadrées de pierre, il est probable qu'elle ne doit pas remonter au-delà du XVIIIe siècle.","habitants":"Seigneur local\"","divers":"hâteau de Werppe à Gonnehem","gps":"","images":["../image/image_62/62_Werppe_1.jpg"]},"Consult_chateau_formulaire1d1f":{"id":"Consult_chateau_formulaire1d1f","dept":"62","canton":"Desvres","commune":"Wierre au bois","nom":"Wierre_au_Bois","type":"Château","periode":"XV-XVI","histoire":"WIERRE au BOIS, la seigneurie, mentionnée dès 1113, a appartenu  à plusieurs familles: au XVe siècle, elle était la propriété de la famille de la Bouverie seigneur de Wièrre, sénéchal du Boulonnais, que l'on doit les parties les plus anciennes du château notamment la tour ronde, il échoit  à la famille de Laloye, puis  à Claude de Louvigny qui en fait un centre de culte protestants. Les héritiers vendent en 1608 à Gilles de la Haye dont les descendants le conserveront jusqu'en 1711. Au XVIe siècle,  des remaniements ont eu lieu aux XVIIe et XVIIIe siècles le corps d'entrée et le corps de logis. En 1711  par mariage  de Jacqueline de Rigault petite-fille de Pierre de la Haye apporte en dot Wièrre à la famille De Bonnières au XVIIIe siècle, Louis de Bonnières seigneur de Simbecq et capitaine de régiment, à la mort du dernier des Bonnières en 1897 le château revient à sa veuve puis à son fils d'un premier lit, passe ensuite dans diverses mains, et aujourd'hui  à la famille Cavrois. Le domaine de Wierre au Bois est devenu la résidence d'été du critique littéraire Charles-Augustin de Sainte-Beuve, cousin de la famille, jusqu'en 1823. Il a laissé, de ses vacances de jeunesse des écrits et riches descriptions du château, notamment dans son roman Volupté. Des dépendances ont été ajoutées au XIXe siècle.ce château est dune contenance de deux hectares, est le domaine dun seul tenant au début du siècle, représentait une surface de 47 hectares 39 ares et 77 centiares. Les propriétaires sont la famille Dupont. De Bonnières. Dailleurs la famille De Bonnières le posséda durant 4 générations","architecture":"WIERRE au BOIS; l'édifice  présente un plan en trapèze, à son angle  sud-ouest s'élève une grosse tour cylindrique de 10 mètres de diamètre, comportant quatre niveaux, et construite en brique avec soubassement de grès. Sur sa façade sont encore visibles les corbeaux qui soutenaient autrefois les mâchicoulis et un chemin de ronde; celui-ci à aujourd'hui disparu et le toit, conique, repose directement sur les mâchicoulis prolongeant cette tour vers l'est, un long corps de logis bas, d'apparence classique, rejoint un bâtiment plus élevé, avec une porte charretière à voûte cintrée. Au revers, une vaste cour rectangulaire est bordée à l'est par des bâtiment d'habitation, cette cour ceinte de remparts et de fossés, comporte à ses deux angles de petites tourelles en briques, bâties en encorbellement sur des assises de grès, une troisième tourelle, située à l'angle sud-est a été arasée au niveau de sa base, sur le front nord et Est, des souterrains longent la base des remparts conçus pour la défense, chemin de rondes et meurtrières, aujourd'hui aveuglées qui s'ouvraient au sous sol de la tour, permettant de surveiller les fossés. Agrandissement des fenêtres de la tour en 1924 et percement d'une porte, cest le plus grand de tous les manoirs du Boulonnais ; il sagit là dun vrai monument darchitecture militaire, ayant conservé son donjon crénelé, ses souterrains, ses douves et ses remparts. Il donne encore une idée de ce quétaient les châteaux forts au Moyen- âge ; lépaisseur des murs de la tour avoisine les 2m50, trois autres tourelles servaient autrefois aux sentinelles de garde. Le corps de logis est du XVIIe siècle ; la hauteur maximale de lédifice est de 32m50..","habitants":"Famille de la Bouverie  et de la  famille De Bonnières \"","divers":"château à la  Wierre au Bois-Grav-1.","gps":"","images":["../image/image_62/62_Wierre_au_Bois_1.jpg","../image/image_62/62_Wierre_au_Bois_2.jpg"]},"Consult_chateau_formulaired8a3":{"id":"Consult_chateau_formulaired8a3","dept":"62","canton":"Auxi-le-Château","commune":"Willeman","nom":"Willeman","type":"Château","periode":"XVII-XVIII","histoire":"WILLEMAN, en 1725 construction du château  qui ont été interrompus par le décès  d'Oudart-François de Lhoste, son fils François construira un pigeonnier, en 1772 Marie-Adelaïde de Lhoste héritière épouse François-Marie de Pratz marquis de Pressy ancien capitaine de cavalerie, député du Pas de Calais qui continu les travaux qui se termineront en 1880. En 1974 achat de Willeman par la comtesse Hervé de Bretesche qui fait restaurer le château et reçoit la médaille du conseil de l'Europe après des années à l'abandon. \nÉléments protégés MH : les façades et les toitures du château et du pigeonnier ; l'escalier avec sa rampe en bois : inscription par arrêté du 2 juin 1976.","architecture":"WILLEMAN   le château est composé dun corps central de sept travées et de deux pavillons de deux travées chacun dans son prolongement. Lensemble est bâti sur un soubassement en grés, puis deux niveaux en brique et pierre en retour dangle, encadrement de baies, corniche, et cordons. Létage sous combles est couvert en ardoise. De part et dautre du logis sétendait des dépendances, lensemble formait un U dont il ne reste rien  aujourdhui que le pigeonnier datant de 1729, et un petit corps de bâti en pierre et brique. Le propriétaire conserve un plan de 1773 dun jardin régulier avec une avenue plantée allant vers léglise et traversant les prairies vers le château. Le parc actuel est ceinturé dun fossé rempli deau et dont les berges sont plantées darbres de haute tige. On accède à la cour dhonneur par un pont, elle est de forme rectangulaire avec au centre un jardin régulier, sur larrière le parc ne garde aucune trace de parc à la française, il est composé de prairies et de bosquets qui se prolongent dans la campagne.","habitants":"Famille de François-Marie de Pratz \"","divers":"Château de Willeman","gps":"","images":["../image/image_62/62_Willeman_1.jpg"]},"Consult_chateau_formulaire4275":{"id":"Consult_chateau_formulaire4275","dept":"62","canton":"Lumbres","commune":"Wisques","nom":"Wisques","type":"Château","periode":"XVII-XVIII","histoire":"WISQUES  au XVe siècle construction du donjon et surélévation du corps de logis. Au XVIIe siècle Isabelle-Claire-Eugénie , héritière de la branche aînée des Sainte-Aldegonde, épouse l'un de ses cousins Maximilien-François. Leur fils Albert-Franois-Ghislain comte de Sainte Aldegonde et Baron Vicomte de Wisques, meurt en 1706 sans postérité, sa veuve Jeanne-Thérése de la tour-St-Quentin s'éteint en 1721. En 1715 le domaine est acquit par Maximilien de Pan échevin de St-Omer. Au XVIIIe siècle  construction des ailes, ce petit château a été construit en 1770 par Guillaume Lorthioy de Saint-Omer; confisqué à la Révolution, racheté par le gendre de Maximilien-Louis de Pan Thomas Emlart de Guémy qui le restitue ultérieurement à son beau frère  en 1820, à Alexandre de Pan de Wisques. Vendu en 1832 aux Cauvet de Blanchonval. Les bénédictins de Solesmes s'y sont installés en 1889, mais les lois sur les congrégations les en ont chassés. Il a été vendu à des particuliers et a changé plusieurs fois de mains. en 1920 le château devient l'abbaye de Saint-Paul depuis 1966, le propriétaire actuel, M. Beinaert, s'applique à le restaurer.","architecture":"WISQUES, Ce château a été construit en pierre blanche dans le style néo-classique. C'est un bâtiment rectangulaire de cinq travées de long sur une épaisseur de trois. La composition des deux façades principales est fort proche. Leurs deux niveaux sont séparés par un double cordon horizontal. Des pilastres marquent les angles et individualisent les trois travées centrales les unes par rapport aux autres. Leurs hautes baies du rez-de-chaussée sont tracées en plein cintre tandis que celles de l'étage sont rectangulaires. De chaque côté, cette partie du bâtiment est couronnée par un fronton triangulaire éclairé par un oculus. Les deux parties latérales éclairées à chaque niveau par une fenêtre ménagent un large équilibre entre les pleins et les vides : les baies, celles du rez-de-chaussée sont  cintrées et celles de l'étage sont encadrées par une surface murale meublée par un panneau  saillant. A gauche du château, une petite chapelle a été construite en 1790.  Éléments protégés MH : les façades et les toitures du petit château et de la chapelle : inscription par arrêté du 23 septembre 1977.","habitants":"Famille de  Maximilien Louis de Pan Thomas\"","divers":"Château de Wisques  à  Wisques","gps":"","images":["../image/image_62/62_Wisques_1.jpg","../image/image_62/62_Wisques_2.jpg"]},"Consult_chateau_formulaire3f8e-2":{"id":"Consult_chateau_formulaire3f8e-2","dept":"62","canton":"Marck","commune":"Zutkerque","nom":"Zutkerque","type":"Vestiges et château","periode":"XIV-XVII","histoire":"Deux châteaux dans cet article, la Montoire et Draeck                                 la MONTOIRE, en 1281, le comte Arnoul III dut vendre son château au comte d'Artois. En 1396, le duc de Bourgogne y logea lors de l'entrevue de Charles VI et de Richard II. Il fut compris dans la cession de Brétigny. Après la paix d'Arras Philippe le Bon en chassa les Anglais en 1436. Plus tard, Louis XI s'en empara et Philippe de Commines vint en prendre possesslon en 1477 mais Henri VII le reprit en 1492. Finalement en 1542, Antoine de Bourbon, duc de Vendôme, s'en empara et le démantela. Le château formait un rectangle, des tours flanquaient ses angles, l'un des grands côtés en possédait deux autres tours, sans doute celles-ci encadraient-elles la porte d'entrée, ces dernières étaient moins importantes que les autres. Les ruines qui restent accusent le XIVe siècle; elles doivent donc être considérées comme les restes des travaux des architectes de Mahaut d'Artois ; on sait qu'en 1321, Michelle Moy a haussé les murs et les tours de sept pieds, qu'on y a posé des créneaux, qu'on a reconstruit une grosse tour, probablement celle de l'angle sud-ouest. Dans les années suivantes, des fossés ont été creusé, et des voûtes ont été refaites dans la grande salle. Reste les deux tours, l'une a quatre mètres de diamètre à l'intérieur, n'était pas voûtée, elle est éclairée par une fenêtre en tiers-point, l'autre a un diamètre un peu inférieur mais elle avait été dotée d'une voûte d'ogives.","architecture":"DRAECK,  cette construction de briques blondes et pierres de calcaire déposées en bandes alternées, recouvert dun enduit blanc. A chacun de ses 2 niveaux, la façade principale aligne 10 fenêtres légèrement cintrées. La porte médiane est surmontée dun cadran solaire qui contient une inscription latine « que nulle heure ne sécoule sans laisser un agréable souvenir » Au dessus du cadran, on aperçoit des armoiries. Lautre façade est beaucoup plus austère puisquelle n'est éclairée quà ses 2 extrémités. Lentrée dans la propriété se fait sur le côté par un pigeonnier-porche carré en cours de restauration par une association locale qui souhaite louvrir au public au terme des travaux. Marie-Cécile-Charlotte de Laurétan devient baronne de Draëck le 6 août 1771 par son mariage avec Lamoral de Draëck, de 20 ans son ainé. Le château construit vers 1704 est un temple de Diane. Au fond dun parc arboré sélève l'édifice construit de briques blondes et pierres de calcaire déposées en bandes alternées, recouvert dun enduit blanc.","habitants":"Famille de Laurétan\"","divers":"Deux châteaux dans cet article, la Montoire et Draeck                         Draeck      GPS : 50° 50' 54\" Nord, 2° 04' 25\" Est","gps":"50° 50' 54\" Nord, 2° 04' 25\" Est","images":["../image/image_62/62_Zutkerque_1.jpg","../image/image_62/62_Zutkerque_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','62 — Pas-de-Calais'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
