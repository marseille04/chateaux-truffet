château, construit au XXe siècle, a cherché à imiter le style du début du XVIIe siècle. L'édifice comprend un corps de bâtiment rectangulaire présentant un avant-corps central à trois pans coiffé d'une haute toiture pyramidale. Il a été réalisé en pierre et brique ; la première constitue les chaînages d'angle, les pilastres à refends séparant les travées, au nombre de deux, de part et d'autre de l'avant-corps, les cordons horizontaux courant au-dessous et au-dessus des fenêtres de l'étage supérieur, les encadrements de celles-ci et de leurs allèges, enfin la corniche; la brique ne constitue que le remplissage des cadres ainsi déterminés. Les cinq lucarnes ont été coiffées d'un fronton triangulaire. Sur la droite, une aile un peu plus basse et légèrement en retrait a été dotée d'une élévation à deux niveaux; de larges panneaux se sont trouvés ménagés entre les fenêtres traitées avec beaucoup plus de simplicité que celles du château.                                                                                         MONTREUIL, citadelle,  La place forte de Montreuil est née de la volonté de protéger la vallée de la Canche et le Hesdinois des incursions scandinaves. Son site stratégique lui valut d'être constamment adaptée à l'évolution des techniques militaires jusqu'au XVIIIe siècle. Le résultat est un site exceptionnel par son étendue et sa qualité. La Citadelle de Montreuil-sur-Mer est une citadelle royale pré-Vauban du XVIe siècle . Elle est construite sur les bases d'un château royal médiéval le chemin de ronde et tour encore visible et  Les ruines des remparts avaient fait l'objet d'un classement au titre des M.H. le 10 septembre 1913;  propriété de la ville.","architecture":"HESMOND, l'origine rendez vous de chasse a été construit à la fin du XVIIIe siècle pour Charles-Marie de Créquy, marquis d'Hesmond. On dit que, lorsque sa femme, née Marie-Anne-Thérèse-Félix du Muy, la célèbre marquise de Créquy, auteur de Mémoires, vit le château pour la première fois, elle l'aurait trouvé trop exiguë et mesquin. Son mari, qui ne partageait pas cet avis, fit alors graver l'inscription que l'on peut toujours lire sur une plaque de marbre à la façade avant : \"Parva sed apta mihi\"; la propriété appartient aujourd'hui au marquis de Bournonville. Précédée d'une entrée en hémicycle, la demeure dresse sa silhouette sur un fond boisé. Edifiée en pierre et brique, la pierre est disposée en harpe, traitée à refends aux angles. Le château est composé à l'arrière d'un étage supplémentaire, en raison d'une dénivellation du sol. A l'avant, la partie centrale, formée de trois travées, se distingue par l'étroitesse de leurs trumeaux. En façade postérieure, elle est en rotonde et présente, au deuxième niveau, des ouvertures plus grandes que celles du reste de l'édifice. Cette disparité tient au fait qu'à l'intérieur, le grand salon qui l'occupe n'est pas entresolé comme les autres pièces. Ce salon est l'élément le plus intéressant à la fois par ses dimensions et par ses dessus de portes sculptés qui sont d'une grande élégance. On notera aussi les nombreux carreaux en faïence aux dessins variés et la belle rampe d'escalier à balustres en bois découpé.","habitants":"Hesmond; Charles-Marie de Créquy,                             Citadelle ; Vauban\"","divers":"Trois châteaux dans cet article la Calotterie grav 4-5 la Citadelle de Montreuil grav 1-2_3 et d'Hesmond grav-6-7.                      GPS : 50° 27' 53\" Nord, 1° 45' 47\" Est","gps":"50° 27' 53\" Nord, 1° 45' 47\" Est","images":["../image/image_62/62_Montreuil_sur_mer_1.jpg","../image/image_62/62_Montreuil_sur_mer_2.jpg","../image/image_62/62_Montreuil_sur_mer_3.jpg","../image/image_62/62_Montreuil_sur_mer_4.jpg","../image/image_62/62_Montreuil_sur_mer_5.jpg","../image/image_62/62_Montreuil_sur_mer_6.jpg","../image/image_62/62_Montreuil_sur_mer_7.jpg"]},"Consult_chateau_formulaire855b-2":{"id":"Consult_chateau_formulaire855b-2","dept":"62","canton":"Montreuil sur mer","commune":"St-Josse","nom":"Moulinel_62","type":"Château","periode":"XVIII-XIX","histoire":"Le MOULINEL     Le château du Moulinel a pris le nom d'un hameau de Saint-Josse: Le Moulinet puis Le Moulinel. Il n'est pas encore représenté sur le cadastre napoléonien qui date de 1810 ni sur un Plan d'une partie des communes de la Madeleine-sous-Montreuil, Calotterie, Saint Josse, Cucq et Merlimont, formant une partie de la vallée de Canche... établi par Jean-Louis-Marie Triplet en décembre 1822 et conservé dans la série O des Archives départementales du Pas-de-Calais. Il est  érigé au mitan du XIXe siècle. Jules Cozyn (1874-1953), propriétaire, fils d'un négociant de Montreuil-sur-Mer, hérite de la propriété de ses parents recensés au Moulinel entre 1881 et 1906. À la veille de la grande guerre, peu après son mariage avec la fille du receveur particulier des finances de l'arrondissement de Montreuil-sur-Mer, Geneviève de Brauer (1893-1988), il y conduit une campagne de travaux incluant l'érection de la tour qui permettait, par gravitation, la distribution d'eau dans le château. Orienté nord-sud, le château du Moulinel est implanté en retrait de la chaussée. Son accès principal se fait depuis la chaussée de l'Avant-Pays. La parcelle est fermée en son centre par un portail en fer forgé soutenu par deux pilastres de brique et, seulement à la droite de celui-ci, par une muraille de clôture encore en place, en brique coiffée de tuile. Vu depuis la chaussée, le château présente un corps de bâtiment principal de plan rectangulaire de cinq travées de façade sur deux niveaux. Il est rythmé par quatre pilastres, deux aux extrémités et deux sous le fronton triangulaire percé d'un oculus ovale coiffant l'axe central. Celui-ci est percé d'une porte à linteau en plein cintre constituant l'entrée. Un cordon horizontal divise la façade. Ce logis est encadré par deux ailes de plain pied prolongeant le rez-de-chaussée du corps de bâtiment principal: celle de l'ouest est percée de deux travées, celle de l'est de trois. Ces trois volumes sont couverts de toitures dardoises indépendantes à croupes dépourvues de lucarnes. Les maçonneries sont enduites. Lensemble est complété à l'Est par une tour circulaire coiffée d'une poivrière qui se dresse en retrait du pavillon latéral mais est relié aux deux niveaux du château.","architecture":"SAINT-JOSSE édifié sur l'emplacement du monastère dont la destruction, entreprise sous la Révolution, s'acheva au début du XIXe siècle. Au centre de sa grille d'entrée, deux pylônes coiffés par des pots à feu donnent accès à sa cour d'honneur. Il comprend un corps de logis rectangulaire et sur la gauche, une tour carrée, plus élevée que lui d'un étage, établie en retrait du seul côté de la cour. Les deux façades de l'édifice sont simples. Les angles  sont traités en bossage. Deux portes cintrées forment les axes du corps de logis; celle de la cour donne accès au vestibule d'où part l'escalier celle regardant vers le jardin correspond à la salle à manger; en façade principale une autre porte ouvre sur le salon ménagé au rez-de-chaussée de la tour. Le corps principal de logis est coiffé d'un toit agrémenté de chaque côté de trois lucarnes; celles du centre sont dotées d'un fronton cintré et les autres d'un fronton triangulaire. Un épi de faîtage couronne cette toiture comme celle, à quatre versants et très élancée, qui coiffe la tour carrée. Au-delà d'une pelouse ombragée par un hêtre, un pont enjambe un ruisseau qui limite la forêt dépendant de la propriété. L'architecte qui a bâti cette demeure était à l'évidence nourri de culture néo-classique; des détails comme les épis de faîtage, le haut comble de la tour accosté de deux très hautes cheminées .                                               Manoir du TERTRE; chambres d'hôtes.","habitants":"Moulinel famille de Jean-Louis-Marie Triplet\"","divers":"Trois châteaux dans cet article le Moulinel, st-Josse et le Tertre Tertre  et Moulinel GPS : 50° 28' 07\" Nord, 1° 39' 56\" Est","gps":"50° 28' 07\" Nord, 1° 39' 56\" Est","images":["../image/image_62/62_Moulinel_62_1.jpg","../image/image_62/62_Moulinel_62_2.jpg"]},"Consult_chateau_formulaired8b7":{"id":"Consult_chateau_formulaired8b7","dept":"62","canton":"Auxi-le-Château","commune":"Neulette","nom":"Neulette","type":"Château","periode":"XVII","histoire":"NEULETTE , en 1605 Jacques Lièpvre acquiert les terres de Briois en 1631 construction du château par  Jacques Lièpvre. En 1728, Charles Joseph de Briois, écuyer, est seigneur d'Angres et Neulette, officier du régiment de Bourbon Infanterie. Il épouse en 1728 à Ruitz Marie-Thérèse Le Ricque, héritière de la seigneurie de Ruitz. Il meurt en 1774.  En 1777 Pierre Dominique de Briois héritier du domaine remanie le château clos l'ensemble par une troisième aile en retour transforme à nouveau le château par une tour carrée et une échaugette en angle à l'angle nord et une tour circulaire à l'angle sud . Au XIXe siècle Pierre-Louis-Robert de Briois ancien officier et chevalier de Saint-Louis transforme à nouveau le château, d'héritages en héritages Neulette passe aux mains de la vicomtesse de Bizemont, puis échoit en indivision aux famille Cussac et Saint Gérand, aujourd'hui  à Madame de Cussac depuis 1830.\nÉléments protégés MH : les façades et les toitures du château et des communs ; l'escalier intérieur avec sa rampe à balustres en bois et les gypseries du salon : inscription par arrêté du 13 novembre 1973.","architecture":"NEULETTE, le château est composé dun corps de logis principal de neuf travées datant du XVIIe. Il est composé de deux niveaux en brique et pierre pour lencadrement de baies sur un soubassement en grés et couvert en ardoise. Ce corps est flanqué dune tour carrée dans laxe et de deux tourelles angulaires qui font retour sur la cour dhonneur. Au XVIIIe siècle une tourelle est supprimée et remplacée par une aile formant pavillon, elle est construite sur deux niveaux, trois travées et intégralement en pierre, couverte en ardoise. Dans son prolongement, un corps de ferme en pierre couvert en ardoise sur un niveau. Lensemble forme une équerre sur la cour dhonneur. Trois bâtiments de ferme jouxtent le logis principal. Ils sont en pierre et couverts en tuiles, disposés autour dune cour qui comporte un beau pigeonnier. Autrefois le bâtiment de ferme côté rue se prolongeait sur la cour dhonneur mais il a été abattu au XVIIIe siècle puis remplacé par un muret en brique surmonté dune grille et ponctué de pilastres en pierre. Le parc est composé en avant dune vaste cour dhonneur aménagé à la française avec quatre carrés de buis. Sur sa droite, la cour de ferme avec ses bâtiments en équerre. Sur sa gauche, derrière le pavillon et le long de la route, un potager régulier marqué de lignes de poiriers. A larrière sétend un parc irrégulier sur une pente douce qui descend vers le château. Ce parc est ponctué darbres de belle espèce dont un hêtre pourpre. Il est limité transversalement par une allée darbres.","habitants":"Famille de Pierre Dominique de Briois \"","divers":"Neulette à Neulette GPS : 50° 22' 57\" Nord, 2° 10' 02\" Est","gps":"50° 22' 57\" Nord, 2° 10' 02\" Est","images":["../image/image_62/62_Neulette_1.jpg","../image/image_62/62_Neulette_2.jpg","../image/image_62/62_Neulette_3.jpg","../image/image_62/62_Neulette_4.jpg"]},"Consult_chateau_formulairebf1c":{"id":"Consult_chateau_formulairebf1c","dept":"62","canton":"Auxi-le-Château","commune":"Noeux les Auxi","nom":"Noeux_les_Auxi","type":"Château","periode":"XV","histoire":"NOEUX les AUXI La plus ancienne mention d'un château à Nux est celle du 14 avril 1575 : l'édifice originel, moins élevé que l'actuel, fut acheté par Philippe de Bourdin, seigneur de Nux, à la famille de Moherel qui le possédait depuis le Moyen-Age. Depuis cette date il s'est transmis dans cette famille par héritage. Au moment de la Révolution alors que la famille de Cacheleu l'habitait, le château fut détruit par un incendie. Vers 1806, Hippolyte de Cacheleu le fit reconstruire par le maçon du village, sans faire appel à un architecte, avec les matériaux de récupération de l'édifice primitif. Le château s'avérant trop élevée et sa stabilité n'étant pas assurée, il fut nécessaire de réduire la hauteur des fenêtres des premier et le deuxième étages. Après Hughes de Tinsseau, colonel des hussards, d'origine irlandaise, s'était greffée à la famille lors des problèmes religieux qui avaient agité l'Irlande sous Jacques II : le comte Raymond de Butler, descendant de cette lignée hérita du château.","architecture":"il fut aussi propriétaire de celui de Remaisnil dans la Somme. En 1906 à l'occasion d'un mariage, une galerie fut ajoutée sur le côté droit de l'édifice. Au centre du parc, le château, parallélépipède construit en brique, avec couverture d'ardoises, accuse sa période de construction, le XIXe siècle. Sur sa façade orientée au sud-ouest, l'entrée, dans l'axe, est flanquée de deux baies rectangulaires à encadrement de pierres calcaires.","habitants":"Comte Raymond de Butler\"","divers":"Noeux les Auxi à Auxy le château","gps":"","images":["../image/image_62/62_Noeux_les_Auxi_1.jpg","../image/image_62/62_Noeux_les_Auxi_2.jpg"]},"Consult_chateau_formulaire23c4":{"id":"Consult_chateau_formulaire23c4","dept":"62","canton":"Marck","commune":"Nortkerque","nom":"Nortkerque","type":"Châteaux","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article de Nortkerque; Cocoves, et la Palme.   NORTKERQUE, le château a été construit sur les vestiges du château fort à la fin du XVIIe siècle. La seigneurie est restée propriété de la famille Dauchel entre le IXe siècle et 1837 par le biais dune transmission, par les femmes et à la famille dArtois depuis cette époque. César Dauchel (1752 - 1837) a été Page de la Grande Ecurie en 1766, il était garde du corps de Louis XVI. Après la Révolution, ce noble qui pratiquait les mathématiques, fût le premier maire de la commune. Sous lEmpire, il fut lun des trois députés du Pas-de-Calais. Il simpliqua également activement au sein de linstitution des wateringues...                                                                        COCOVES à Recques sur Hem, cette superbe batisse, de plus pur style du XVIIIe siècle, a été achevée en 1741 par Becquet de Cocove. Mais la place date du Xe siècle et était alors occupée par les seigneurs locaux du moment. Après la Révolution, le château devint la propriété des d'Artois et resta jusqu'à la fin du XIXe. Durant l'épisode Napoléoniène du camp de Boulogne, le maréchal Ney y organisa de fastueuses soirées. Par la suite, Cocove passa aux mains de la famille du comte de Coetlogon qui ajoutera l'exploitation d'une distillerie, quelques batiments existent encore à ce jour. Si le château fut miraculeusement épargné durant la guerre de 1939-1945, il n'en fut pas de même pour les batiments de la distillerie. Après le décès du comte de Coetlogon, le chateau restera peu de temps encore dans la famille. Il sera vendu à un industriel de la région qui en fit sa résidence secondaire jusqu'en 1987. Après cette date il sera racheté et transformé en hôtel restaurant.","architecture":"La PALME  Dauchel Philippe Antoine Joseph César(1752-1837) était vicomte de la Palme, garde du corps du roi de france Louis XVI, et devint député du Pas-de-Calais. C'est un château construit sur les vestiges d'un ancien château fort, bâti à la fin du XVIIe siècle. La seigneurie est restée la propriété de la famille Dauchel, du IXe siècle à 1837, par le biais des femmes, Après la Révolution de 1789, ce noble qui pratiquait les mathématiques, fût le premier maire de la commune. Sous lEmpire, il fut lun des 3 députés du Pas-de-Calais. Il simpliqua activement aussi au sein de lInstitution des Wateringues. Il existe un autre château sur la commune à découvrir : Le château de la comtesse de Valois. Il remonte au XVIIIe siècle. Les Dauchel achèveront son établissement en améliorant de façon considérable l'exploitation du domaine agricole qui se poursuivra au cours du XIXe siècle. A partir de 1885, le parc s'organisera sur une parcelle carrée, constituant un bel arboretum inspiré des propriétés anglaises. Des massifs d'arbres voisinent avec des ormes à feuilles larges, simulant ainsi la continuation du parc vers la campagne. Cette gentilhommière a toujours appartenu à la famille Dauchet de la Palme.  Éléments protégés MH : les façades et les toitures du château, de sa serre, de sa grange et de ses communs ; le parc en totalité : inscription par arrêté du 30 décembre 2010.","habitants":"Nortkerque, palme; famille Dauchel                             Cocove; famille du comte de Coetlogon                                            la Palme\"","divers":"Trois châteaux dans cet article de Nortkerque grav-1-7; Cocoves grav-3_4, et la Palme grav-2-5-6.                                         Palme GPS : 50° 52' 33\" Nord, 2° 01' 33\" Est                                                                  Cocove  GPS : 50° 50' 07\" Nord, 2° 03' 50\" Est","gps":"50° 52' 33\" Nord, 2° 01' 33\" Est","images":["../image/image_62/62_Nortkerque_1.jpg","../image/image_62/62_Nortkerque_2.jpg","../image/image_62/62_Nortkerque_3.jpg","../image/image_62/62_Nortkerque_4.jpg","../image/image_62/62_Nortkerque_5.jpg","../image/image_62/62_Nortkerque_6.jpg","../image/image_62/62_Nortkerque_7.jpg"]},"Consult_chateau_formulairea97f":{"id":"Consult_chateau_formulairea97f","dept":"62","canton":"Bruay-la-Buissière","commune":"Fresnicourt","nom":"Olhain_Fresnicourt","type":"Château","periode":"XV-XVIII","histoire":"OLHAIN,  Hugues d'Olhain fait bâtir le château en 1202 et sa basse cour. Pendant la Guerre de Cent Ans, il sera détruit et incendié. Jean de Nielles, époux de \"Marie d'Olhain\" entreprend à partir de 1407, sa reconstruction. De 1521 à 1529, Charles Quint le confisque. Vers 1634, sous louis XIII et Richelieu, commence la guerre de 30 ans contre l'Espagne et l'Empereur d'Allemagne. Vers 1700 Louise de Berghes épouse le comte d'Artagnan, gouverneur d'Arras (cousin du célèbre mousquetaire). En 1710, le château est assiégé et occupé par les Hollandais au moment de la prise de Béthune. Ruiné et incendié, le château d'Olhain sera restauré de 1830 à 1843 pour devenir la résidence d'été des Berghes. Le dernier seigneur, Pierre Marie de Berghes abandonne le château en 1870. Il n'y a pas d'héritier. M. Dartois recherchait avant tout une exploitation agricole, mais le 26 mai 1900, il achète la propriété, dont la fille épouse Jules Dutoit aïeul de l'actuel propriétaire. Le contrat de vente comportait des clauses les terres étant à vendre avec le château, celui-ci était considéré comme un fardeau, mais au fil du temps les vieilles pierres se firent aimer.  Éléments protégés MH : les façades et les toitures  et des bâtiments de la basse-cour ; la tour nord ; le sol de la cour et de la basse-cour ; les douves en eau ou comblées ; le pont reliant la basse-cour au château ; les deux ponts et la voie d'accès, inscription par arrêté du 12 avril 1989.","architecture":"OLHAIN, c'est après la guerre de cent ans que Jean de Nielles  époux de Marie d'Olhain entreprend de relever le château incendié durant le conflit, bâti en brique avec parements extérieurs en grès; présente sur son front sud une porte d'entrée à pont-levis charetier épaulé par de puissants contreforts. Deux tours cylindriques flanquent la courtine, la plus petites à gauche est percée d'embrassures en croix permettant aux arbalétriers d'effectuer des tirs plongeant. Celle de droite d'un diamètre plus important est percés à la base de canonnières à orifice circulaire qui sont disposées pour pouvoir prendre l'ensemble de létang sous un tir rasant les couleuvrines. cette tour est couronnée d'un chemin de ronde déservant une salle en retrait, abritée sous un toit conique. L'entrée des  bâtiments se déploie autour de la cour d'honneur, à l'intérieur de l'enceinte cantonnée de tours rectangulaires et pourvues d'un parapet à mâchicoulis. Au temps des Berghes   les travaux sont poursuivis par son gendre Beaudoin de Lannoy chevalier meurt sans descendance en 1433, le domaine revient à Alix de Nielles fille de jean et de Marie d'Olhain épouse en seconde noce de Jean de Berghes qui fera compléter le dispositif d'artillerie au château. devenu résidence d'été des Berghes integrallement restauré dans les années 1830, reconstruction en pierre la tour d'escalier flaquant  la tour nord -est.  C'est à cette époque que le duc de Berghe et son épouse née princesse Gabrielle de Broglie font réunir les deux niveaux inférieurs de la tour sud-est.","habitants":"Jean de Nielles  \"","divers":"Olhain-grav-1-hôtel de ville GPS : 50° 25' 26,14\" Nord, 2° 34' 56,98\" Est                                                       Fresnicourt-Ruitz Grav- 2-3-4-5-6\nRuitz GPS : 50° 28' 06\" Nord, 2° 35' 25\" Est","gps":"50° 25' 26,14\" Nord, 2° 34' 56,98\" Est","images":["../image/image_62/62_Olhain_Fresnicourt_1.jpg","../image/image_62/62_Olhain_Fresnicourt_2.jpg","../image/image_62/62_Olhain_Fresnicourt_3.jpg","../image/image_62/62_Olhain_Fresnicourt_4.jpg","../image/image_62/62_Olhain_Fresnicourt_5.jpg","../image/image_62/62_Olhain_Fresnicourt_6.jpg"]},"Consult_chateau_formulaire0ec0-2":{"id":"Consult_chateau_formulaire0ec0-2","dept":"62","canton":"Boulogne-sur-Mer","commune":"Baincthun","nom":"Ordre","type":"Château","periode":"XVII","histoire":"ORDRE, situé au hameau de Macquinghen, a été construit au XVIIe siècle par les seigneurs du lieu, de la famille du Wicquet, possesseurs de la charge de Maîtres des eaux et forêts du pays. Ils tenaient cette propriété des sires de Sempy, dont François, baron d'Ordre, de Macquinghen et de Audinghen, fut admis à prêter serment de fidélité au roi, le 24 juillet 1550. Victor du Wicquet, baron d'Ordre, enseigne des gardes du corps, est décédé maréchal de camp le 30 juillet 1751. C'était le père du vicomte d'Ordre, et de Mlle Marie Rosalie Victoire d'Ordre, auteur de fables et de poésies fugitives, qui ont été publiées à Boulogne en 1823. Le baron d'Ordre fils du vicomte, avait épousé Marie-Sophie Moser, veuve en premières noces du général Sibaud. L'héritière du baron d'Ordre, Mlle Hopf-Moser, s'est mariée à M. Senéca, conseiller à la cour de cassation et député de la Somme, mort au château de Macquinghen le 24 septembre 1878. La chapelle était un bénéfice ecclésiastique, bâtie en 1672 par François du Wiquet, pour servir en quelque sorte d'annexe à la paroisse de Baincthun. Actuel propriétaire M. Per Nylius.","architecture":"ORDRE, de plan rectangulaire deux ailes  en avant corps à trois niveaux, deux pavillons saillants aux extrémités toits à la Mansard,et avant-corps d'entrée de quatre niveaux à quatre travées surmonté d'un fronton triangulaire, l'ensemble encadrent la cour d'honneur. Éléments protégés MH : les façades et les toitures du château et des quatre pavillons du jardin ; le portail principal avec sa grille en fer forgé; le vestibule, l'escalier avec sa cage et sa rampe ; la chapelle et sa tribune ; les boiseries et la cheminée de la salle de billard (à l'exclusion des dessus de portes) ; les boiseries avec leurs dessus de portes et la cheminée du salon ;   de la salle à manger : inscription par arrêté du 7 décembre 1987.","habitants":"famille du Wicquet\"","divers":"A Baincthun château d'Ordre","gps":"","images":["../image/image_62/62_Ordre_1.jpg","../image/image_62/62_Ordre_2.jpg"]},"Consult_chateau_formulaire2498":{"id":"Consult_chateau_formulaire2498","dept":"62","canton":"Lumbres","commune":"Parenty","nom":"Parenty","type":"Château","periode":"XIX","histoire":"PARENTY, le château a été édifié en 1785 par Gaspard-Gédéon Le Vasseur, seigneur de Thubeauville, de style louis XVI. Il a passé la Révolution sans encombre. Même son pigeonnier a été préservé. provincial caractéristique par la proportions de ses étages, notamment le troisième réduit, et par son décor en guirlande, au centre de la façade s'arrondie en hémi-cycle, deux ailes plus basses s'allongent de part et d'autre. En 1898, Louis du Blaisel hérite de la demeure de son cousin Jules Le Roy de Méricourt alors que son frère aîné se voit doter du château d'Enquin sur Baillons. Louis du Blaisel a deux fils : François-Xavier qui n'aura pas d'enfant, et Gérard aura deux filles, Josée et Nicole. Gérard du Blaisel possédait deux manoirs à Parenty, celui face au château et celui d'Hodicq, tous deux ont été vendus, le premier à des Anglais et le deuxième à un exploitant agricole du village.","architecture":"PARENTY, le domaine possède une magnifique allée longue de 220 mètres et bordée de vieux hêtres. Cette avenue est classée aux monuments historiques, ce qui n'est pas le cas du château, un bâtiment au fronton duquel on peut voir les armoiries, deux lions et un boeuf qui constituent l'emblème de la famille du Blaisel.\nÉléments protégés MH : les façades et les toitures du château et, en totalité les murs de clôture, les grilles et le portail dentrée, le sol de la cour dentrée, le parc avec son mur de clôture en silex : inscription par arrêté du 2 mai 2016. Propriété du baron de Blaisel.","habitants":"Famille de Gaspard-Gédéon Le Vasseur\"","divers":"Château de Parenty","gps":"","images":["../image/image_62/62_Parenty_1.jpg"]},"Consult_chateau_formulaire0ec3":{"id":"Consult_chateau_formulaire0ec3","dept":"62","canton":"Pas en Artois","commune":"Pas en Artois","nom":"Pas_en_Artois","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux dans cet article Pas en Artois et Grena à Pommera                                 PAS en ARTOIS, vers 1050, Anselme 1er de Pas, est le premier seigneur connu. En 1237, le mariage d'Alix de Pas, la dernière de ce nom, avec le seigneur de Heilly, Jean de Créquy, fit passer le terre dans cette famille. En 1452, le château appartenait à Louis de Luxembourg, comte de Saint-Pol. Le mariage de Marie de Luxembourg avec Léonor d'Orléans le transmit à cette famille où il demeura jusqu'en 1698, date de la vente de la châtellenie par Marie d'Orléans, duchesse de Nemours, à Jean-François Ansart, seigneur de Gonnehem. En 1716, elle fut acquise par Joseph-Sylvestre de Virgile, gentilhomme du comté d'Eu en Normandie. En 1765, pour la dernière fois, elle fut vendue à Jean Antoine de Fourmestreaux, l'une de ses filles épousa en 1787 Augustin-Joseph le Mesire du Broile; ce sont les descendants de cette famille qui sont les propriétaires actuels du château. Le premier château était une véritable citadelle flanquée de tours et entourée de fossés. Les guerres le ruinèrent plusieurs fois. Le château actuel a été construit au milieu d'un parc en 1780 par Jean Antoine de Fourmestreaux. Il comprend un corps de logis flanqué de deux ailes très légèrement saillantes. Son soubassement est en grès et renferme de magnifiques caves, dont les voûtes sont assez plates. La demeure est en pierre blanche ; ses deux niveaux sont séparés par une double moulure, ce qui accentue son caractère horizontal.","architecture":"A quelques K.M. au nord ouest à POMMERA\nLe château de Grenas  POMMERA, est une gentilhommière de la fin du XVIIIe siècle a été construit vers 1790 dans un style Louis XVI très simple mais élégant par Louis Nicolas de Beugny, seigneur de Pommera ; il a ensuite appartenu à son gendre, M. Harbaville, auteur du Mémorial Historique du Pas-de-Calais. Le jardin, exigu mais dun dessin curieux, est lun des plus anciens « jardins anglais » dArtois ; il se développe à lEst de la maison, et comporte de nombreux arbres, largement centenaires. Au bout d'une allée de tilleuls, le corps principal, de simple épaisseur, se distribue sur sept travées. La maison comporte un vaste piano mobile, un premier étage plus modeste ainsi que des combles où s'ouvre une lucarne. Le rez-de-chaussée, en légère élévation, est en pierre de taille et ouvre sur 6 grandes fenêtres à petits carreaux. Le premier étage est en torchis et repose sur un bandeau de pierre. La façade du parc est totalement en torchis. Au sud, les communs forment une aile, partie plus ancienne en briques, elle date du XVIIe siècle comme en témoigne une date sur le linteau d'une porte. : Le château de Grena au hameau de Grena.","habitants":"Famille de Louis de Luxembourg,                       Pommera Famille de  Louis Nicolas de Beugny,\"","divers":"Deux châteaux dans cet article Pas en artois grav 3-4- et Pommera    Grenas grav 1-2                                                  GPS : 50° 10' 27\" Nord, 2° 26' 24\" Est","gps":"50° 10' 27\" Nord, 2° 26' 24\" Est","images":["../image/image_62/62_Pas_en_Artois_1.jpg","../image/image_62/62_Pas_en_Artois_2.jpg","../image/image_62/62_Pas_en_Artois_3.jpg","../image/image_62/62_Pas_en_Artois_4.jpg"]},"Consult_chateau_formulairee4cc":{"id":"Consult_chateau_formulairee4cc","dept":"62","canton":"Boulogne-sur-Mer","commune":"Pernes lès Boulogne","nom":"Pernes_les_Boulogne","type":"Château","periode":"XVII-XX","histoire":"deux châteaux dans cet article Gd-Fouquehove, Mépas et Senlecques.                                 GRAND-FOUQUEHOVE  Ce château et ses communs ont sans doute été construits dans le premier quart du XXe siècle. Le logis, à sous-sol, étage carré et étage de comble, possède deux ailes saillantes; l'accent est mis sur la travée centrale de chaque façade; les façades ne sont pas hiérarchisées, si l'on excepte le très discret cartouche placé sous le balcon du comble côté sud. Le colombier, circulaire, est à toit conique. Les communs sont couverts d'un toit à longs pans brisés.                         MEPAS   Le logis porte la date de 1706 sur le fronton surmontant la porte d'entrée (un dessin par V.J. Vaillant porte la date de 1705). Mais il semble plus ancien, du XVIIe siècle, ainsi que le laissent supposer le volume du pavillon et le style de la porte du logis donnant sur la cour. La date de 1706 concernerait des travaux de restauration, le logis situé entre le jardin et l'entrée date de la deuxième moitié du XVIIIe siècle ou du XIXe siècle. Le corps de bâtiment sur cour est en rez-de-chaussée, le pavillon en retour étant à un étage carré. Le corps de logis situé entre le jardin et l'entrée, ainsi que l'aile en retour, sont à un étage carré.","architecture":"SENLECQUES. le plus ancien possesseur connu de ce domaine est jehan de Senlecques écuyer en 1539 et dont la fille épousa Nicolas du Saultoir, la seigneurie passa ensuite aux Baynast qui la conservèrent jusqu'en 1745, au XVIe siècle  Baynast de septfontaines date de sa vente au marquis Charles de Créquy, colonnel commandant de brigade et gouverneur réside au château de Souverain-Moulin; la propriété foncière demeura toutefois aux vendeurs jusqu'au XIXe siècle, elle passa par héritage aux Hanon puis  cédé  en 1832 à François Deseille qui la louèrent aux anciens propriétaires les Leleu, le manoir est aujourd'hui la propriété de la famille Bertin.  Ce manoir construit au XVIe siècle est élevé en brique, il comprend un corps de bâtiment rectangulaire à deux niveaux au milieu de la façade duquel se dresse une tourelle octogonale, abrite un escalier à vis à berceau spiralé, son couronnement a été arasé; aujourd'hui elle est coiffée d'une toiture à pans coupés qui s'associe à celle du corps de logis. Cette tourelle présente des archères composées de deux fentes en croix avec trou rond, à sa base s'ouvre une porte, et elle contient une vis d'escalier voûtée en berceau.","habitants":"Senlecques famille de jehan de Senlecques    Senlecques  Nicolas du Saultoir,  \"","divers":"Trois châteaux dans cet article Gd et petit  Fouquehove  grav-2-5 Mépas grav-1-4,  Senlecque grav-3","gps":"","images":["../image/image_62/62_Pernes_Boulogne_1.jpg","../image/image_62/62_Pernes_Boulogne_2.jpg","../image/image_62/62_Pernes_Boulogne_3.jpg","../image/image_62/62_Pernes_Boulogne_4.jpg","../image/image_62/62_Pernes_Boulogne_5.jpg"]},"Consult_chateau_formulaire6cf4":{"id":"Consult_chateau_formulaire6cf4","dept":"62","canton":"Outreau","commune":"ST-Léonard","nom":"Pont_de_Briques","type":"Château","periode":"XVII","histoire":"PONT de BRIQUES en 1600 une ferme existe à l'emplacement du château actuel, en 1640 construction d'un premier château. En 1704  Louise-Marie d'Augereau héritière du domaine épouse François de Patras seigneur de Campagnio  de1786 à 1792 campagne de reconstruction menée sous la direction de Giraud Sannier de 1803 à 1805 camp de Boulogne le château devient la résidence du premier consul lorsqu'il fit la préparation du débarquement en Angleterre dit de Napoléon  date de 1640 à 1786 . la résidence fut modifié pour Antoine d'Aumont et Bernard d'Audegau. Louis Patras de Campaigno fit reconstruire la chapelle puis fit effectuer de gros travaux, par l'architecte Giraud Sannier, en 1786, en faisant surélever le logis et agrandir les ailes du château. en 1810 le domaine est vendu par Achille-Armand de Campagnio à la famille de Clocheville qui conserveront le château jusqu'en  1879,  Le château de Pont-de-Briques cèdé à la ville de Boulogne devient, en 1902 vendu, à un orphelinat catholique et le bâtiment construit, à l'époque, projet de  démolition, en 1974, mais en 2004, l'ensemble de l'édifice est partagé entre plusieurs propriétaires.","architecture":"PONT de BRIQUES, la cour d'honneur est encadrée de trois ailes dont l'une à l'Est se prolonge pour former une longue façade latérale sur le jardin. Deux pavillons carrées coiffées d'ardoise, l'édifice  de plan rectangulaire coiffé d'un toit à double pente. Reprenant les éléments d'origine datant du siècle précédent l'architecte Giraud Sannier, entreprend dès 1786 une construction complète du château; bâtie en pierre grise du pays, la nouvelle demeure s'articule autour d'un corps de logis principal surélevé d'un étage sur rez-de-chaussée et pourvu de combles à la Mansart, ce corps de logis est flanqué de deux ailes agrandies, celle de droite se prolonge désormais à l'arrière pour former une longue façade, celle de gauche pour sa part, abrite à son extrémité la chapelle fondée en 1749.","habitants":"Famille de François de Patras \"","divers":"Pont de Brique à ST-Léonard GPS : 50° 41' 08\" Nord, 1° 37' 37\" Est","gps":"50° 41' 08\" Nord, 1° 37' 37\" Est","images":["../image/image_62/62_Pont_de_Briques_1.jpg","../image/image_62/62_Pont_de_Briques_2.jpg","../image/image_62/62_Pont_de_Briques_3.jpg"]},"Consult_chateau_formulairedf70-2":{"id":"Consult_chateau_formulairedf70-2","dept":"62","canton":"Arras","commune":"Pénin","nom":"Pénin_Ricametz","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux dans cet article Penin et Ricametz.                                       PENIN,  en 1473, Pénin appartenait à la famille des Wavrin, seigneurs de Liners. Au XVIe siècle, il passa à celle de Béthencourt. Un terrier de 1708, conservé dans les archives de Souverain-Moulin, indique que Georges de Béthune Desplanques fut le premier à posséder la seigneurie, il est vrai  que Georges de Béthune dut acheter, au début du XVIIe siècle, à Philippe de Béthencourt avec d'autres biens, le château que celui-ci possédait dans la localité. Le nouveau propriétaire, ou son fils Jean, agrandit l'édifice pour en faire sa résidence seigneuriale. La guillotine, sous la Révolution, décima la famille ; seul Louis-Eugène, le petit-fils de François-Eugène, échappa à l'hécatombe, il avait émigré et à son retour au pays, il préféra abandonner Pénin au profit de Souverain-Moulin. Le château a été acquis au XXe siècle par M. Boutin, il a conservé son intégrité architecturale. Le château est constitué d'un corps de logis établi en bordure d'une cour délimitée par les bâtiments d'exploitation rurale. Il n'est pas homogène puisqu'il comprend trois ensembles réalisés respectivement aux XVIe, XVIIe et XVIIIe siècles. C'est près de l'entrée que l'on trouve sa partie la plus ancienne; celle-ci est constituée par un bâtiment rectangulaire dans lequel s'engagent deux tourelles. La tourelle implantée du côté de la cour est plus élevée que l'autre; son plan est hexagonal et dans sa partie supérieure, elle a conservé une bretèche ménagée dans le pan adjacent au bâtiment voisin ; une pierre donne la date de construction : 1594.  Éléments protégés MH : les façades et les toitures des bâtiments du XVIe siècle et du XVIIIe siècle, inscription par arrêté du 9 septembre 1975.","architecture":"RICAMETZ, à quelques K.M.au sud-est,  construit au XIXe siècle, ce château de taille relativement restreinte a sa cour d'entrée bordée par une grille. Son soubassement est en grès, sa façade en pierre, mais la brique a été utilisée pour le reste de la construction. Il se présente sous l'aspect d'un bâtiment rectangulaire à deux niveaux, sur une longueur de sept travées, coiffé par un comble d'ardoise couronné par un épi de faîtage. Les fenêtres sont rectangulaires et encadrées d'un cordon mouluré; celui de leur appui se prolonge d'un bout à l'autre de la construction pour individualiser les niveaux. La travée centrale est soulignée de plusieurs manières : sa porte est encadrée de deux petits pilastres que coiffent deux consoles qui supportent le balcon en ferronnerie de la fenêtre de l'étage; curieusement ce même décor se retrouve à son niveau; elle est légèrement plus petite que ses voisines et une tablette la surmonte. Au niveau de la toiture, un fronton triangulaire orné de deux volutes encadrant un oculus central marque les trois travées axiales.","habitants":"Famille des Wavrin\"","divers":"châteaux dans cet article de Penin  Ricametz.                                 Penin 50° 19' 41? nord, 2° 29' 07? est","gps":"","images":["../image/image_62/62_P%c3%a9nin_Ricametz_1.jpg","../image/image_62/62_P%c3%a9nin_Ricametz_2.jpg","../image/image_62/62_P%c3%a9nin_Ricametz_3.jpg"]},"Consult_chateau_formulairea504":{"id":"Consult_chateau_formulairea504","dept":"62","canton":"Arras","commune":"Ramecourt","nom":"Ramecourt","type":"Château","periode":"XV","histoire":"RAMECOURT, le domaine de Ramecourt est très ancien. En 1221, la famille Quiéret possédait la seigneurie. En 1300, Marguerite de Ramecourt, issue de cette famille, épousa Jean de Beaumont. Antoine d'Ongnies, chevalier, sieur de Bruay, fut propriétaire du domaine en 1475. Vers 1600, on éleva sur les lieux une élégante demeure mais elle a été reconstruite depuis lors. Avant la Révolution, le château appartient à M. Dambrines d'Equerchin qui devient Dambrines de Ramecourt. En prairial an VIII, le château fut vendu nationalement, mais ultérieurement les Dambrines de Ramecourt ont pu recouvrer une partie de la propriété. Le château fut très éprouvé pendant la deuxième guerre mondiale ; les occupants y entreposèrent des munitions après l'avoir vidé des meubles qui avaient échappé au pillage, il est aujourd'hui dans un état de délabrement total. Le château est entièrement construit en pierre blanche du pays extraite de la colline qui lui fait face.","architecture":"RAMECOURT, l'édifice a été édifié en plusieurs campagnes comme le montre fort bien son architecture. Il est constitué de deux bâtiments placés en équerre, recouverts de toits en ardoises au-dessus de leurs deux niveaux. Seule la façade principale orientée au nord et celle de l'est présentent un intérêt esthétique, les autres côtés du bâtiment, donnant sur la cour de la ferme attenante, étant masqués par des constructions ultérieures.","habitants":"Famille  de  Dambrines d'Equerchin \"","divers":"Château de Ramecourt à Ramecourt","gps":"","images":["../image/image_62/62_Ramecourt_1.jpg"]},"Consult_chateau_formulaire6216":{"id":"Consult_chateau_formulaire6216","dept":"62","canton":"Bruay-la-Buissière","commune":"Rebreuve Ranchicourt","nom":"Ranchicourt","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article Ranchicourt, Bajus et Rebreuve. RANCHICOURT  Une famille seigneuriale de ce nom a existé au Moyen Age, elle est connue depuis 1071, l'un de ses membres fut évêque d'Arras en 1462. Le château actuel date du XIXe siècle, c'est une imposante construction en pierre et brique organisée autour d'un pavillon central coiffé d'une toiture en dôme couronné par un épi de faîtage. Celui-ci a trois niveaux, il est large de quatre travées; chacune des parties latérales du corps de logis en présente trois autres. Une aile latérale fait saillie à gauche. Le pavillon médian a été élevé en pierre à refends, une vigoureuse corniche sépare son deuxième niveau du troisième, il est couronné par une balustrade qui s'interrompt pour faire place à un fronton semi-circulaire accosté de volutes et présentant en son centre une volute. Le reste de l'édifice a été réalisé en brique, la pierre étant réservée aux encadrements harpés des baies, dans ces parties, l'élévation n'a que deux niveaux; des ils-de-buf encadrent une lucarne centrale pour chaque partie de la toiture mansardée. Le château de Ranchicourt a été élevé au milieu d'un beau parc. REBREUVE sur CANCHE   Bien qu'attesté dès la Révolution, le château actuel est le résultat de l'agrandissement du relais de chasse, de 1885 à 1887, par l'architecte Clovis Normand de la seconde moitié du XIXe siècle dans le Pas-de-Calais. Les communs datant de 1845 furent l'objet d'une nouvelle distribution (retour en L) probablement en 1896. La réalisation de l'architecte consista à épaissir l'aile principale sur l'arrière, démolir les bâtiments bas à l'ouest, prolonger l'aile en retour et restaurer l'ensemble en prenant soin d'utiliser au mieux les éléments déjà présents.","architecture":"BAJUS dans le village voisin  bâti au XVIIe siècle, est composé d'un corps de logis rectangulaire surmonté d'une toiture à deux pentes en tuiles marron et rouge, ces dernières formant un dessin de losanges; un épi de faîtage couronne cette couverture. L'uvre a été réalisée en brique, mais les deux séries de quatre fenêtres de ses deux niveaux sont encadrées de pierre formant harpe; une lucarne, encadrée de volutes, dont le remplissage est fait de brique, marque le centre de la façade et deux tourelles octogonales coiffées de pyramides aiguës la limitent. Une aile prolonge le corps de logis sur la gauche, et en avant de celle-ci comme sur l'ensemble de la façade arrière, se sont greffées des constructions parasites. Dans les années 1970, l'ensemble était mal entretenu, les toitures des tourelles étaient en mauvais état, mais il semblerait que cette demeure ait subi d'importantes restaurations depuis.                                                                                         REBREUVE sur CANCHE Il convient de souligner le style néo-Renaissance du château, peu habituel dans la production de l'architecte Normand. Après avoir été occupé par l'armée durant les deux conflits mondiaux, l'édifice abrita, à partir de 1948, une colonie de vacances avant d'être loué puis vendu à diverses reprises au cours des années qui suivirent.  Éléments protégés MH : le château en totalité ; les façades et les toitures des communs et du pavillon de gardien : inscription par arrêté du 30 décembre 2010.","habitants":"Famille seigneuriale  de Ranchicourt \"","divers":"Trois châteaux dans cet article Ranchicourt grav 1, Bajus grav-3-4  et Rebreuve grav-2. gps  50° 26' 26? N, 2° 33' 10? E                                Ranchicourt GPS : 50° 26' 15\" Nord, 2° 33' 22\" Est","gps":"50° 26' 15\" Nord, 2° 33' 22\" Est","images":["../image/image_62/62_Ranchicourt_1.jpg","../image/image_62/62_Ranchicourt_2.jpg","../image/image_62/62_Ranchicourt_3.jpg","../image/image_62/62_Ranchicourt_4.jpg"]},"Consult_chateau_formulaired997":{"id":"Consult_chateau_formulaired997","dept":"62","canton":"Berck","commune":"Recques sur course","nom":"Recq","type":"Château","periode":"XVII","histoire":"RECQ , la terre de Recques dépendait autrefois aux Longevilliers érigée en seigneurie, édifiée entre  1753 et 1770.  En 1795 décès de Jean Baptiste Oudart de Dixmude  de Montbrun, c'est le fils Jean-Baptiste  Oudart qui continua la construction entre 1753 et 1770. à la Révolution son fils émigre, le château est vendu comme bien national, mais la fille du défunt Mme Carpentin parvient à racheter le domaine en sous main. Revenu d'émigration Léon-Oudart-Henri de Montbrun. Mort  en 1825 à pour succésseur son fils dernier du nom qui s'éteint en 1889, par sa fille unique la vicomtesse de Boisguoin sans héritier direct, le château est transmis à des cousins, les Guiselin, descendent les Van Robais, actuels propriétaire de Recq.","architecture":"RECQ  Situé à l'écart du bourg, la demeure est une construction de style Louis XV, édifiée entre 1753 et 1770. un corps de logis élevé sur un étage et un comble à la Mansart encadré de deux ailes basses qui se terminent par des pavillons en légères saillies. Avant- corps d'entrée arrondi est couronné d'un fronton.Éléments protégés MH : les façades et les toitures du château y compris les ailes ajoutées ; les façades et les toitures des communs sur la cour d'honneur ; les deux portails d'entrée principaux et les deux parties d'entrée secondaire avec leur grille ; le mur d'enceinte attenant aux grilles ; les façades et les toitures du pigeonnier ; les pièces avec décor ; le vestibule (actuel grand salon); la salle à manger ; le petit salon ; la petite entrée et la rampe d'escalier : inscription par arrêté du 9 septembre 1986.","habitants":"Famille de  Jean-Baptiste  Oudart\"","divers":"Château de Recq à  Recques sur course","gps":"","images":["../image/image_62/62_Recq_1.jpg"]},"Consult_chateau_formulairecc5e":{"id":"Consult_chateau_formulairecc5e","dept":"62","canton":"Arras","commune":"Rivière","nom":"Rivière","type":"Châteaux","periode":"XIV-XVII","histoire":"Trois châteaux dans cet article, Bretencourt, Beaumetz-les-loges et Grosville. BRETENCOURT L'origine du hameau de Brétencourt est due à une ancienne forteresse construite sur les bords du Crinchon. Dès le XIe siècle, il est fait mention de Simon de Brétrancourt. Sous Philippe Auguste, le domaine passe au chevalier Wagon d'Arras dont le fils, en 1250, cède une portion de dîme pour aider à la construction d'une chapelle dédiée à St-Eloi. On trouve dans une requête adressée au magistrat d'Arras, datée de 1393, que le domaine appartient alors à Pierre de Saint-Pol. Sa fille apporte ce fief en dot à Herlin de Warluzel. Cette dernière famille conservera le domaine jusqu'àu XVIIe siècle, avant qu'il ne soit vendu à Philippe-François de Briois. Le château est flanqué d'une tourelle, seul vestige de l'ancien château-fort que l'on voit sur une miniature de 1605. Il fut partiellement démoli vers 1820 et remplacé par une simple demeure.                                                                                     A quelques K.M. au nord ouest, le château de BEAUMETZ LES LOGES  La seigneurie de Beaumetz appartenait, au XVIIIe siècle, à la famille Briois, durant 3 générations. La famille Briois fit construire, de 1760 à 1770, un nouveau château en pierre, composé d'un corps de logis central long de 7 travées, surmonté d'un haut comble à la Française, cantonné par 2 ailes longues, chacune de 3 travées et surmontées d'un comble mansardé. L'aspect de cet édifice, aujourd'hui, disparu, est connu par des cartes postales anciennes. Le château de Beaumetz fut transmit, par la famille Briois, au XVIIIe siècle, par alliances, aux familles Girod de Resnes, puis de Guillebon. À peu prés épargné par les combats de la première guerre mondiale, ce château brûla, accidentellement, en 1934. En 1936, il fut remplacé par un autre château, en brique et pierre, surmonté de combles entièrement mansardé.","architecture":"GROSVILLE  sur les caves d'un bâtiment construit en 1690 par son oncle François de la Charité, seigneur de Grosville, cette gentilhommière par le maître d'uvre André Merville de Maruil qui travaillait aux constructions d'Arras. La propriété fut acquise, en 1773 par Alphonse-Norbert Harduin, échevin d'Arras. Elle resta dans cette famille jusqu'en 1975, date de son achat par la famille de Diesbach. De longues prairies remontant en pente douce la rive gauche du Crinchon: telle est, maintenant que les obus de la guerre 1914-1918 ont ravagé les quatre rangées d'ormes, la perspective offerte aux habitants de la demeure. Ils découvrent l'édifice dans l'encadrement d'un portail monumental en pierre dont le fronton triangulaire surbaissé est orné de rinceaux entourant un cartouche bûché. De part et d'autre de ce portail, un haut mur caché par des arbres taillés. A droite et à gauche de la cour, les communs. Dans le fond, le château, composé d'un corps principal et de deux ailes en retour, au rez-de-chaussée et un étage. Le raccord biaisé des bâtiments, la saillie de l'avant-corps central, couronné d'un fronton triangulaire, le décrochement des annexes donnent vie à cet agréable ensemble. La belle impression d'unité qui s'en dégage est à peine atténuée par la coloration différente des matériaux utilisés, on a employé la brique pour les communs et qu'on l'a associée à la pierre pour le corps principal. Au-dessus de la porte, un fronton triangulaire portait les armoiries de la famille Lhoste.\nÉléments protégés MH : les açades et les toitures du château ainsi que celles des communs (y compris le pigeonnier) ; le portail d'entrée : inscription par arrêté du 25 avril 1975.","habitants":"Bretencourt; Famille de Herlin de Warluzel.       Beaumetz ;  Famille Briois,                                  Grosville;  Alphonse-Norbert Harduin\"","divers":"Trois châteaux dans cet article de Rivière; Bretencourt, Beaumetz les loges grav-4 et Grosville grav 1-2-3                                                Rivière   gps 50° 14' 00? nord, 2° 41' 25? est","gps":"","images":["../image/image_62/62_Rivi%c3%a8re_62_1.jpg","../image/image_62/62_Rivi%c3%a8re_62_2.jpg","../image/image_62/62_Rivi%c3%a8re_62_3.jpg","../image/image_62/62_Rivi%c3%a8re_62_4.jpg"]},"Consult_chateau_formulairef1c2":{"id":"Consult_chateau_formulairef1c2","dept":"62","canton":"Etaples","commune":"Camiers","nom":"Rohart_Camiers","type":"Châteaux","periode":"XVII-XIX","histoire":"Deux chateaux dans cet article; Rohart et Widehem.                                  ROHART le domaine du Rohart appartenait à Claude Charles Marie du Campe de Rosamel, Amiral et Ministre de la Marine, sous Louis-Philippe. Il était né au château de Rosamel à Frencq, le 24/06/1774 et décèda à Paris le 27/03/1848. Le château du Rohart porte la date de 1879, inscrite en chiffres romains, dans un phylactère qui surmonte les armes des Du Campe de Rosamel et De France supportées par 2 lions. Il aurait été construit en 1879, pour Edouard du Campe de Rosamel, qui avait épousé Louise de France, en 1878. Le château du Rohart est composé dun corps de logis, de plan rectangulaire, à un étage, flanqué de 2 pavillons en retrait dalignement et à un seul niveau délévation. La travée centrale, en léger ressaut, est délimitée par un chaînage et couronnée dun fronton brisé doù émerge une lucarne. La toiture à croupe est percée de deux autres lucarnes amorties par une boule. Les ouvertures sont légèrement cintrées. Les façades des pavillons sont percées dune porte et dune fenêtre à encadrements de brique. Ce matériau est décliné, aux angles, sous la forme de pilastres à refends. Sous la toiture court une corniche de briques disposées en épi. Ces détails ornementaux se retrouvent, sur la remise charretière et un second commun, bâtiments individuels disposés sur les côtés de la cour. Le château du Rohart appartient à la commune depuis 2002. Il devrait être détruit pour faire place à un projet immobilier de la commune.","architecture":"WIDEHEM A quelques K.M. à l'Est, il est devenu une exploitation agricole après avoir servi de maison de campagne à la famille De Dixmude au XVIIe siècle. Le château de Widehem se situe au centre du village. On peut voir sur le linteau dune porte, un écusson, avec une fleur de lys. Ce symbole royal devait être détruit à la Révolution sous peine de châtiment. Il fut probablement préservé par conviction car les habitants de Widehem nétaient pas favorables au nouveau régime. La seigneurie de Widehem a appartenu par succession aux Du Crocq en 1477, De Wandonne en 1540, De Maulde en 1614, De La Guèze en 1643, De La Wespierre en 1659, DIsques en 1674, Vidart de Saint-Clair en 1740, Antoine était mayeur à Boulogne, il hérita de la propriété de sa mère, Marie-Madeleine Vidar. Le château de Widehem fut vendu à la Révolution à De Dixmude ou Disquemue de Hames, de 1750 à 1790, De Dixmude de Montbrun en 1800, De Guizelin en 1808 et à Van Robais en 1900.","habitants":"Rohart; Amiral Claude Charles Marie du Campe de Rosamel,       Widehem famille De Dixmude \"","divers":"Deux chateaux dans cet article; Rohart grav-1  et Widehem.   Rohart   GPS : 50° 34' 2,26\" Nord, 1° 36' 37,24\" Est                                                             Widehem GPS : 50° 35' 11\" Nord, 1° 40' 23\" Es","gps":"50° 34' 2,26\" Nord, 1° 36' 37,24\" Est","images":["../image/image_62/62_Rohart_Camiers_1.jpg"]},"Consult_chateau_formulaire86f4":{"id":"Consult_chateau_formulaire86f4","dept":"62","canton":"Auxi-le-Château","commune":"Rollancourt","nom":"Rollancourt","type":"Château","periode":"XV-XVIII","histoire":"ROLLANCOURT, citée dès 1071 la famille de Rollancourt posséda la seigneurie jusqu'au mariage de Marie de Rollancourt en 1362 qui la fit passer à Jean de Châtillon, fils de Margueritte de Flandre. A la fin du XVe siècle, le château entra par alliance dans la famille de Lannoy, puis passa au milieu du XVIe siècle au comte d'Egmont et à Guillaume de Nassau, prince d'Orange. Il constituait alors une baronnie, qui fut vendue au XVIIe siècle.  A la fin du XVIIe siècle, Claude-François de Marnix entre en possession du domaine. Cest probablement son fils, le comte Baudry-Aldebert, qui fait construire, au milieu du XVIIIe siècle, le château que nous connaissons aujourdhui. Vers 1850, le comte de Bertoult rachète le domaine. Entre 1856 et 1867, il fait restaurer la façade, y ajoutant par la même occasion les sculptures du fronton. En 1889, il fait poser les grilles et les persiennes. Utilisé par larmée allemande entre 1940 et 1944, le château est déserté en 1948. il abrite depuis 1976 lInstitut Rural d'Education et d'Orientation, dirigé pendant près de trente ans par Jean-Claude Darque aux d'Ongnies. En 1642, Isabelle d'Ongnies l'apporta en mariage à Fançois de Marnix, dont la famille demeura à Rollancourt jusqu'à la Révolution.  L'édifice actuel fut élevé par Claude de Marnix au milieu du XVIIIe siècle.","architecture":"ROLLANCOURT, vaste construction en pierre blanche comprenant un grand corps de logis encadré de deux ailes plus basses en retour sur la cour, et précédé de dépendances. L'aile gauche abrite la chapelle. Le château primitif, entouré de fossés, fut détruit au cours des combats livrés entre les français et les espagnols pour la possession d'Hesdin. Bâti en craie sur soubassement de grès, le château présente deux niveaux surmontés dun toit en mansarde couvert dardoises. En largeur, il aligne onze travées, séparées par des pilastres colossaux sélevant sur toute la hauteur de la façade, surmontés de chapiteaux ioniques. Les trois travées centrales, qui constituent un avant-corps légèrement saillant, possèdent, contrairement aux autres travées, des ouvertures en plein cintre. Cet avant-corps est surmonté dun fronton où sont sculptés des motifs décoratifs et des armoiries. Deux ailes basses flanquent limposant corps central. La façade arrière, qui surplombe une vaste pelouse, est une copie plus sobre de la façade avant. A lintérieur, seul le grand salon central a conservé son décor dorigine de boiseries et de stucs. On remarquera également les deux escaliers à « rampe hesdinoise ». La propriété compte en outre plusieurs dépendances.","habitants":"Famille de Rollancourt rt de CLaude de Marnix \"","divers":"Châteauf à Rollancourt","gps":"","images":["../image/image_62/62_Rollancourt_1.jpg","../image/image_62/62_Rollancourt_2.jpg"]},"Consult_chateau_formulaire6bfc":{"id":"Consult_chateau_formulaire6bfc","dept":"62","canton":"Étaples","commune":"Frencq","nom":"Rosamel","type":"Château","periode":"XV-XVIII","histoire":"ROSAMEL, construit sur les bases d'une ancienne maison forte datant du XVe siècle et ses dépendances datent de la fin du XVIIIe siècle . Giraud Sannier était l'architecte. En 1710, Louis du Campe, écuyer, seigneur de Tardinghen, Longueville, Maître particulier des Eaux et forêts du boulonnais (1673-1750), rachète la Seigneurie de Rosamel, comportant un château et une basse cour. En 1770, son petit-fils, Claude Louis Marie du Campe de Rosamel, Maréchal des camps et armées du Roi Louis XV (1727-1808), fait appel à l'architecte boulonnais Giraud Sannier pour reconstruire la demeure, qui sera achevée en 1820. A son décès, en 1808, le château de Rosamel ira dans les mains de son fils, Claude du Campe de Rosamel, Officier de Marine (1774-1848), qui fut Ministre de la Marine et Pair de France. Sa descendance a conservé le château, tout au long du XIXe siècle et le revendit en 1919. Devant l'état délabré du chateau, deux jeunes du Montreuillois : Adrien de Febvin et Thomas Sailly, passionnés d'histoire et de patrimoine, ont lancé un appel sur les réseaux sociaux pour sauver le Château de Rosamel.","architecture":"Rosamel sa descendance conserve le château tout au long du XIXe siècle et le vend en 1919. Il s'agit d'un édifice construit tout en pierre, dont le plan, homogène, présente l'originalité d'être composé de quatre corps de logis édifiés sur un plan carré, autour d'une étroite cour intérieure, assimilable à un puits de lumière .\nL'élévation comporte trois niveaux sur sous-sol, couverts d'un toit en ardoise de faible hauteur. La cour d'honneur est fermée par une grille et bordée par deux bâtiments de dépendances, dont l'un conserve sa toiture et dont l'autre, aujourd'hui découvert, abritait, notamment, une chapelle. Resté hors d'eau jusqu'aux années 1970, il est aujourd'hui à l'état de ruine, une partie du toit et des planchers étant effondrés. Bordé sur un de ses côtés par un corps de ferme, le château se trouvait dans un parc comportant de longues perspectives, aujourd'hui converties en culture. .Éléments protégés MH : les façades et les toitures du château et des communs y compris celles des deux pavillons accolés aux communs, et les douves : inscription par arrêté du 7 novembre 1966.","habitants":"Louis du Campe de Rosamel\"","divers":"Château de Rosamel  GPS : 50° 33' 01\" Nord, 1° 41' 46\" Est","gps":"50° 33' 01\" Nord, 1° 41' 46\" Est","images":["../image/image_62/62_Rosamel_1.jpg","../image/image_62/62_Rosamel_2.jpg","../image/image_62/62_Rosamel_3.jpg"]},"Consult_chateau_formulaire1143":{"id":"Consult_chateau_formulaire1143","dept":"62","canton":"Beuvry","commune":"Sailly sur la Lys","nom":"Sailly_sur_la_Lys","type":"Châteaux","periode":"XVII-XIX","histoire":"deux châteaux dans cet article Sailly et ste-Paule.                                              SAILLY Bac-Saint-Maur   sur la lys est une commune qui à reçu un joli présent de la part de l'ancien industriel Werner Thur qui a offert un château et une belle somme dargent à la Municipalité. Cela faisait un moment que le château de Bac-Saint-Maur, proche de Sailly-sur-la-Lys et dErquinghem, était à vendre. La superbe bâtisse abritait des salles de réception et un restaurant, le tout entouré dun vaste parc arboré. Début novembre, Werner Thur sest donc porté acquéreur du château pour un peu plus de un million deuros. Sauf quau lieu de prendre ses quartiers dans son nouveau bien, lindustriel en a fait immédiatement don à la commune. Werner Thur a aussi ajouté au bien immobilier, la somme de 2 Millions deuros, pour effectuer les travaux au château mais que les jardins du château portent le nom de son épouse décédé et que les jardins soient ouverts aux habitants de la ville. Il souhaite aussi pouvoir accéder librement au château et bénéficier dune priorité doccupation à titre gratuit. Cela a été accepté à lunanimité. La mairie envisage déjà la construction d'une salle de réception et d'un restaurant. Le château de Bac-Saint-Maur a été rénové dès mars 2021. Son domaine va être aménagé. Un restaurant appelé la Conciergerie a été créé et a ouvert à la mi-Septembre.","architecture":"Au sud de Sailly à Laventie  le Manoir SAINTE PAULE est un manoir bâti à Laventie, a été construit en 1920, pour Maître Bécart. Les travaux se sont achevés au Manoir Sainte-Paule et l'échafaudage a été retiré, laissant place à une magnifique façade. Les travaux de désamiantage et son réhabilitation ont coûté 1,7 Million d'euros. Ils ont été terminés en mars 2020. L'intérieur du manoir Sainte-Paule a été entièrement refait. Vous pourrez y louer une salle pour fêter vos évènements festifs.","habitants":"industriel Werner Thur \"","divers":"deux châteaux dans cet article Sailly et Ste Paule  grav-2.                                                           Sailly GPS : 50° 39' 30\" Nord, 2° 46' 15\" Est                                                                   Sainte Paule GPS : 50° 37' 42\" Nord, 2° 46' 19\" Est","gps":"50° 39' 30\" Nord, 2° 46' 15\" Est","images":["../image/image_62/62_Sailly_sur_la_Lys_1.jpg","../image/image_62/62_Sailly_sur_la_Lys_2.jpg"]},"Consult_chateau_formulaire4def-2":{"id":"Consult_chateau_formulaire4def-2","dept":"62","canton":"Arras","commune":"Sains-Hotecloque","nom":"Sains_Hotecloque","type":"Châteaux","periode":"XVII-XVIII","histoire":"SAINS   Un château fort aurait été construit par la famille de Sains connue dès le XIIIe siècle. Des restes de fossés donnent quelque créance à cette hypothèse. Ce château aurait été détruit par les guerres du XVIe siècle. Au XVIIe siècle la terre de Sains appartient à Franois de Nédonchel ; son petit fils le vendit en 1671 à Jean Le Caron, seigneur de Canettemont, membre du Conseil d'Artois. Un siècle plus tard, François-Dominique Le Caron de Canettemont, mousquetaire du roi, et sa femme, Marie Charlotte de Lencquesaing, entreprirent la construction du château actuel. Celui-ci resta entre les mains de leurs descendants jusqu'en 1920, date de sa vente à M. René Salmon-Thiriez.","architecture":"SAINS-HOTECLOQUE. A cette catégorie appartiennent dans notre région entre autres le château de Willeman avec son pigeonnier, celui de Neulette, l'ancien Cloître des Soeurs Noires à Vieil-Hesdin niche dans le mur extérieur, les châteaux de Hautecloque et de Sains.  Ces châteaux se visitent chaque année lors des journées du patrimoine en septembre précédé par une cour d'honneur fermée par une grille, ce château, de plan rectangulaire, est flanqué de deux ailes plus basses. Le corps de bâtiment central possède une élévation à deux niveaux dominée par un comble d'ardoise mansardé. La façade a son axe indiqué par la présence d'un avant corps délimité par des chaînages à refends qui supportent un fronton triangulaire aux armoiries de la famille de Canettemont. A l'étage, un balcon à balustres de pierre est une adjonction du XIXe siècle qui alourdit sensiblement la composition. La porte principale de cette façade donne accès à un vestibule flanqué à gauche d'un bureau, à droite de la cage d'escalier.","habitants":"Sains, François-Dominique Le Caron de Canettemont\"","divers":"Sains-Hotecloque                                      50° 20' 22? nord, 2° 18' 24? est","gps":"","images":["../image/image_62/62_Sains_Hotecloque_1.jpg","../image/image_62/62_Sains_Hotecloque_2.jpg","../image/image_62/62_Sains_Hotecloque_3.jpg"]},"Consult_chateau_formulaire5f18":{"id":"Consult_chateau_formulaire5f18","dept":"62","canton":"St_Omer","commune":"Salperwick","nom":"Salperwick","type":"Château","periode":"XVII-XVIII","histoire":"SALPERWICK   une résidence de campagne des moines de Saint-Bertin est attestée dès le Moyen Age. Au XIVe siècle, c'est un domaine agricole. Un incendie, à la fin du XVIe siècle, amène à la reconstruction des bâtiments et un autre incendie au XVIIIe siècle conduit à nouveau à la reconstruction d'une bonne partie du bâtiment. \nÉléments protégés MH : les bâtiments du château en totalité, y compris les décors intérieurs ; le parc : inscription par arrêté du 30 mai 2001.","architecture":"SALPERWICK, vers 1840 ont lieu la démolition des deux pavillons et des travaux sur la façade Est. La partie la plus ancienne est située au nord du côté des marais. Au XVIIIe siècle vient s'accrocher l'aile en T sur la façade nord et deux pavillons calent la composition de la façade sud, celle-ci est agrémentée de décors sobres au XIXe siècle. Les intérieurs sont décorés de boiseries et stuccatures qui en font un exemple assez exceptionnel pour la région. On note la forte présence architecturale des communs, en particulier des façades extérieures qui semblent inspirées de l'Italie.","habitants":"Moines de Saint-Bertin \"","divers":"Salperwick","gps":"","images":["../image/image_62/62_Salperwick_1.jpg","../image/image_62/62_Salperwick_2.jpg"]},"Consult_chateau_formulairefab4":{"id":"Consult_chateau_formulairefab4","dept":"62","canton":"Desvres","commune":"Samer","nom":"Samer","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Bernardière et le Grand-Molinet. BERNARDIERE, château construit en 1736 , pour Alexandre de Tutil de Guémy et Angélique de La Haye, sur l'emplacement d'un manoir appartenant à la famille. Demeure actuellement connue sous le nom la Bernardière. Le château du Crocq passe successivement à Madame Lyennoir Du Crocq au début du XVIe siècle, puis en 1529, Philippe de La Haye achète la propriété, celle-ci restera dans cette famille jusqu'en 1736 date de construction du château actuel pour Alexandre de Tutil de Guémy par son mariage avec Angélique de La Haye. A la fin du XVIIIe siècle, le château passe par alliance des Tutil de Guémy aux du Campe de Rosamel qui le possédaient encore dans le premier quart du XXe siècle. Vers 1928, le château du Crocq changea de nom (nommé \"La Bernardière\" par son nouveau propriétaire). Revendu récemment, il appartient actuellement au Dr et Mme Lemanski.                                                                                COURSET Au nord-Est a été rebâti sous la Restauration, il est situé entre la ligne de partage des eaux entre le bassin de la Canche et celui de la Liane. Acheté en 1728 par Georges du Mont, ancien chirurgien du Régent, son petit-fils Georges-Louis-Marie fut un botaniste de renom, il a créé dans le parc de son château l'un des plus beaux jardins botaniques de France et même d'Europe. En 1824, le château fut légué à sa fille unique épouse de Fortuné Louis Joseph Valentin Hubert Malet de Coupigny, qui entreprit de reconstruire le château. Celui-ci demeura dans la famille de Coupigny jusqu'en 1923. Ce nest quen 1923, alors quil était devenu la propriété de Georges Martel, quil fut agrandi suivant les plans de l'architecte M. Dutertre de Boulogne sur Mer. Depuis janvier 1971 la propriété abrite le foyer de Charité. En 2010, le foyer a décidé de réaménager le parc dans l'esprit du Baron Georges Louis Marie Dumont de Courset.  Accueille école et collège privés sainte Odile.","architecture":"Grand MOLINET   Le château est une uvre du XVIIIe siècle, il a du être construit peu avant 1749, date de sa vente par M. Griset à Guillaume Coillot, vice mayeur de Samer; ses héritiers, Jean François et Jacques Coillot, négociants à Boulogne, le revendirent en 1791 à M. et Mme Godin-Poidevin; il resta dans cette famille jusqu'en 1883, date à laquelle il passa dans celle des Horeau, pour peu de temps d'ailleurs puisque, dès 1895, il fut acquis par M. Bernhardt. Les archives de l'actuel propriétaire conservent un plan levé en 1791 par l'arpenteur Pierre Marie Leblond, sauf quelques expropriations faites pour cause d'utilité publique, le domaine est resté intact depuis cette date. Établi à l'intérieur des terres sur la ligne des sources, le château appartient à cette série d'édifices que les nobles ou les riches bourgeois se font édifier pour passer les mois d'été. Le château de plan rectangulaire, présente un avant-corps au milieu de ses faces principales, aux murs de pignon, sont accolées des constructions plus basses; ces ailes font retour sur la cour. construits en brique, à un rez-de-chaussée couvert d'une toiture mansardée.","habitants":"Bernardière; famille de La Haye                             Courset;  Georges du Mont                                       Molinet; Famille de Guillaume Coillot\"","divers":"Quatre châteaux dans cet article; Bernardière grav-1, le Grand-Molinet grav_3, le Courset grav-2 et Wierre au Bois-Grav-4.                                                           Courset GPS :50° 38' 53,09\" Nord, 1° 50' 28,96\" Est","gps":"50° 38' 53,09\" Nord, 1° 50' 28,96\" Est","images":["../image/image_62/62_Samer_1.jpg","../image/image_62/62_Samer_2.jpg","../image/image_62/62_Samer_3.jpg","../image/image_62/62_Samer_4.html"]},"Consult_chateau_formulairee556":{"id":"Consult_chateau_formulairee556","dept":"62","canton":"St_Omer","commune":"ST-Martin au Laert","nom":"Scademboug","type":"Vestige","periode":"XVI","histoire":"SCADEMBOURG  la seigneurie de Scabembourg a appartenu à la famille d'Audemfort. Par mariage, elle est passée à la fin du XVIe siècle au sieur d'Auffay et c'est probablement lui qui a fait édifier le château. Sa fille ayant épousé le sieur de Poix, elle le transmit à cette famille qui en demeure propriétaire pendant plus d'un siècle. Au début du XVIIIe siècle, l'évêque de Saint-Omer le reçut en legs, mais il ne tardera pas à le vendre à Martin Soinne, un laboureur de Saint Martin au Laërt, seigneuriale flamande des débuts de l'époque moderne, dès 1731, les héritiers de celui-ci le revendirent. Depuis cette date, par vente, il a changé de nombreuses fois de mains.","architecture":"SCADEMBOURG; il comprend deux corps de bâtiment accolé. Celui du nord a été entièrement construit en brique et sa toiture d'ardoise est légèrement plus basse que l'autre, le deuxième bâtiment, celui au sud a été monté en pierre. A sa façade ouest s'adosse une tourelle rectangulaire plus haute que lui d'un niveau, mais cette partie supérieure a été refaite de brique de ce côté, elle en marque la limite de l'angle sud-ouest. Une autre tourelle a été édifiée mais celle-là est de plan circulaire et elle a été construite en encorbellement. Le château a été fortement remanié au cours du temps, son extérieur, en dépit des transformations, donne cependant encore une idée de ce qu'était une résidence seigneuriale flamande des débuts de l'époque moderne.","habitants":"Famille du sieur de Poix\"","divers":"a ST-Martin au Laert château de Scademboug","gps":"","images":["../image/image_62/62_Scademboug_1.jpg","../image/image_62/62_Scademboug_2.jpg"]},"Consult_chateau_formulaire14e4":{"id":"Consult_chateau_formulaire14e4","dept":"62","canton":"Boulogne-sur-Mer","commune":"Pittefaux","nom":"Souverain_Moulin","type":"Château","periode":"XVI","histoire":"SOUVERAIN MOULIN, construit en 1624 et 1645 pour Philippe de Créquy, a servi d'hôpital sous Napoléon 1er. En 1752 acquis par Bernard de Calonne ancêtres des propriétaires actuels.  Charles de Béthune de Sully lui ajoute un étage entre 1843 et 1847.  La propriété appartenait en 1925 à Mme la comtesse d'Hinnisdal, née Béthune-Sully.  La chapelle, sanctuaire construit en 1882 à la demande de la comtesse de Béthune en mémoire de Charles de Béthune-Sully et de sa fille Joséphine. Travaux exécutés selon les plans de l'architecte E. Duthoit par M. Balbure de Pierremont, entrepreneur de maçonnerie et de charpente, messieurs Labbé, Dufay d'Amiens, Buisine de Lille, menuisiers ébénistes, M. Boucher d'Arras, marbrier, M. Phaff d'Amiens, sculpteur. Les verrières sont de M. Gsell de Paris, de M. Latteux de Mesnil-Saint-Firmin. En 1925, M. Garner Hale exécute la fresque représentant la famille d'Hinnisdal. En 1952, M. Lurçat réalise la tapisserie \"de la paix\", en 1956 les tapisseries \"flore étoilée\" et \"belles de nuit\".  Propriétaire le marquis de Nicolay.","architecture":"SOUVERAIN MOULIN, vestiges du manoir féodal, le château construit sous Louis XIII entre 1624 et 1645. Durant la guerre 1939-1945 les allemands avaient construit contre le pignon est un avant-corps aujourd'hui démoli. Le logis à élévation ordonancée possède un étage de soubassement, plus large que long est flanqué de deux pavillons saillants sur les façades principales, est élevé de deux niveaux sur un important sous-sol,  un rez-de-chaussée surélevé, deux étages carrés et un étage de comble. Du côté de la cour d'honneur, le centre de la construction est occupé par un pavillon rectangulaire coiffé d'un fronton, à l'arrière, une terrasse reposant sur des arcades relié au rez-de-chaussée, les deux pavillons d'angle, la conciergerie à élévation à travée, un étage carré, une remise et une écurie en rez-de-chaussée.","habitants":"Famille de  Bernard de Calonne \"","divers":"A Pittefaux, Souverain-Moulin","gps":"","images":["../image/image_62/62_Souverain_Moulin_1.jpg","../image/image_62/62_Souverain_Moulin_2.jpg","../image/image_62/62_Souverain_Moulin_3.jpg","../image/image_62/62_Souverain_Moulin_4.jpg"]},"Consult_chateau_formulaire9d81":{"id":"Consult_chateau_formulaire9d81","dept":"62","canton":"Outreau","commune":"St Etienne au mont","nom":"St_Etienne_au_ mont","type":"Châteaux","periode":"XVII-XVIII-XIX-XX","histoire":"trois châteaux dans cet article;  St Etienne du mont, Audisque et Calonne.                                                                                               AUDISQUE,  gentilhommière plutôt que château construction Typique de la région boulonnaise, derrière une haute grille en fer forgé, le château d'Audisque, de plan rectangulaire, a été construit pour la famille de Lafitte au XVIIIe siècle; date 1747 gravée dans une pierre au sommet du pignon droit. La façade donnant sur le jardin, contruite sur deux niveaux, tire son charme de lordonnance symétrique de ses nombreuses baies à petits carreaux. La façade opposée est identique mais moins haute, le rez de chaussée étant de ce côté à demi enterré à cause de la pente du terrain. Elle est précédée dune cour pavée de grès, et encadrée de bâtiments jadis à usage de remises et décuries. Le château fut la propriété d'Hortense de Beauharnais et de Caroline Bonaparte. Joachim Murat. Famille de Boysson-Houzel en sont propriétaires.\nSAINT-ETIENNE au Mont, à l'origine, cette imposante bâtisse trônait au centre d'une vaste propriété appartenant jusqu'en 1780 à Gabriel Antoine Magnion, sieur de La Cassaigne, demeurant à Paris. En 1780, M. Bernard- Gros avocat au Parlement et à la dite Sénéchaussée du Boulonnais, demeurant à la Haute Ville est devenu propriétaire du fief et de la ferme de La Cassaigne, puis il devint député au Tiers Etat de la Province du Boulonnais, aux états généraux en 1789. A sa mort en 1802, le domaine deveint la propriété de Mme Moullart, baronne de Torcy. En 1892 Mme de Calonne de Torcy en devint propriétaire. A partir de cette date, le château fut communément désigné chateau de Calonne. Le domaine fut alors attribué à Mlle Geneviève de Calonne en 1956. Peu après, il devient propriété des frères Dudart, qui y installèrent un élevage de poulets. En 1984 la commune l'acheta pour y créer un centre culturel et de loisirs.","architecture":".                                                                                                                CALONNNE, château avec corps central construit au début du premier quart du XIXe siècle, figure sur le plan de cadastre de 1813. Les ailes, la tour et la chapelle sont bâtie à la limite XIXe-XXe siècle. Ferme, grange et étable datées 1703. Hangar daté 1838, signé Berquer, d'autres bâtiments sans doute du XVIIIe siècle, grange agrandie après 1813. L'édifice se compose d'un sous-sol, d'un étage de soubassement, d'un étage carré et d'un étage de comble, escalier dans oeuvre, élévation à travées surmontée de toit à longs pans; pignon couvert ; pignon découvert ; croupe ; toit en pavillon ; toit polygonal et appentis massé brisé, couverts de tuiles flamandes mécaniques et d'ardoise.","habitants":"Audisque; famille de Lafitte                                 St-Etienne; Famille de Gabriel Antoine Magnion,                                Calonne; famille de Mlle Geneviève de Calonne \"","divers":"trois châteaux dans cet article;  St Etienne du mont, Audisque grav-1 et Calonne grav_2.                                              Audisque GPS : 50° 40' 42\" Nord, 1° 37' 45\" Est","gps":"50° 40' 42\" Nord, 1° 37' 45\" Est","images":["../image/image_62/62_St_Etienne_au_mont_1.jpg","../image/image_62/62_St_Etienne_au_mont_2.jpg","../image/image_62/62_St_Etienne_au_mont_3.jpg"]},"Consult_chateau_formulaire4638":{"id":"Consult_chateau_formulaire4638","dept":"62","canton":"Arras","commune":"Warlus","nom":"St_Lambert_Warlus","type":"château","periode":"XVII","histoire":"ST-LAMBERT, la seigneurie de Warlus est créée à la fin du XIIIe ou au début du XIVe siècle. La construction du premier château, ou pavillon de chasse, remonterait à 1688. Plus tard, le bâtiment qui devait comporter plusieurs ailes, a été détruit par un incendie qui ne laissa qu'un corps de bâtiment, noyau de l'édifice actuel. Au XVIIIe siècle, y résidait le régisseur de l'important domaine agricole. A la Révolution, en 1795, le domaine est vendu comme bien national à un laboureur. Au début du XIXe siècle, la propriété appartient à un ancien entrepreneur qui a sans doute réalisé l'adjonction de deux ailes latérales (en pierre de taille) et du grand avant-corps central de la façade principale. La date de construction peut se situer sous la Restauration ou le début de la Monarchie de Juillet. Dans l'aile latérale gauche se trouve un salon circulaire avec quatre cheminées d'angles, surmontées de trumeaux de glace avec motifs décoratifs de scènes à l'Antique. Ce salon ferme l'enfilade des trois pièces du château primitif. Du début du XXe siècle datent les décors des pièces de l'ancien château donnant sur le parc. Pendant la première guerre mondiale, il servit de quartier général aux armées françaises. Il fut également utilisé au cours de la seconde guerre mondiale.  Éléments protégés MH : les façades et les toitures du château et des communs, le parc, le verger et le potager; l'église en totalité: inscription par arrêté du 25 mars 2009.","architecture":"WARLUS , construit, en 1688, par J.B. Bouquel, seigneur de Warlus, le château fut, en partie, détruit par un incendie. Seule, subsistait une aile, épargnée par les flammes. Restaurée au XIXe siècle, se compose d'une demeure principale, d'une ferme et d'un parc de 12 Ha contenant des arbres centenaires et bicentenaires. Léglise de Warlus découvre ses atouts et le château de Warlus entre en rénovation : Pour les 2 Journées du patrimoine, lorganisation autour du château de Warlus et son église est parfaite, comme chaque année. Charlotte Delaporte, toujours aussi dynamique, sactive autour de son staff, positionné à lentrée de la propriété, sous une toile qui peut protéger du soleil mais aussi de la pluie.","habitants":"Famille de J.B. Bouquel,\"","divers":"Warlus  GPS : 50° 16' 32\" Nord, 2° 40' 11\" Est","gps":"50° 16' 32\" Nord, 2° 40' 11\" Est","images":["../image/image_62/62_St_Lambert_Warlus_1.jpg","../image/image_62/62_St_Lambert_Warlus_2.jpg"]},"Consult_chateau_formulaire7940":{"id":"Consult_chateau_formulaire7940","dept":"62","canton":"Outreau","commune":"St-Léonard","nom":"St_Léonard_62","type":"Château","periode":"XIX","histoire":"trois châteaux dans cet article, Lions,  Pont feuillet, et Neuf.                                                                                                            LIONS, le château est construit vers 1860, il est transformé en orphelinat en 1902. Résidence d'Auguste Mariette pendant son dernier séjour en France. Dit château Muhlbercq dans le quatrième quart du XIXe siècle. L'édifice se compose d'un étage de soubassement et un étage carré, le gros-oeuvre en pierre, pierre de taille, brique et enduit, élévation à travées surmontée d'un toit en pavillon recouvert
