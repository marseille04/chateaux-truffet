es ornent le fronton de la lucarne centrale. Le château a été remanié et restauré au XIXe siècle, et comprend un corps de logis coiffé d'une haute toiture en croupe mais à deux pentes de chaque côté; deux ailes non saillantes flanquent celui-ci; des toitures en croupe plus basses les couvrent. A celle de droite, par rapport à la façade principale, est accolée une chapelle placée dans l'axe du château et terminée par un hémicycle à trois pans. A celle de gauche un bâtiment comprenant un étage servant jadis de cuisine. L'habitation est à deux niveaux; elle a été réalisée en brique, la pierre a été réservée à la seule travée centrale traitée en avant-corps légèrement saillant et là elle présente des refends continus. On la trouve aussi employée pour les pilastres à refends qui délimitent les ailes, les deux cordons horizontaux qui courent au-dessus des deux niveaux de fenêtres et les frontons des lucarnes. Le pigeonnier est de plan quadrangulaire en brique. Famille de Muzinghem.","architecture":"MORANDE, à 10 K.M au nord ouest à Roquetoire , le château a été construit pour le marquis de Lully au début du XVIIIe siècle puis acquis par Guillaume Marcotte, écuyer et secrétaire du roi qui prit le nom de seigneur de Roquetoire, ce sont toujours ses descendants qui en sont les propriétaires. Peu habité à partir de 1890, le château fut occupé par un état-major portugais durant le premier conflit mondial, puis loué à la baronne Dard dans les années 1920. Endommagé par les bombardements et les pillages de la seconde Guerre mondiale, l'édifice fut restauré en 1950 (le gros-uvre uniquement). Depuis plusieurs années, le descendant, M. Seydoux, a entrepris des travaux de restauration. Les matériaux utilisé pour construire le château de la Morande est la pierre blanche. Éléments protégés MH : les façades et les toitures et des écuries ; le salon de musique ; le grand salon et la salle à manger au rez-de-chaussée avec leur décor : inscription par arrêté du 25 mai 1976.","habitants":"Famille de Charles Le Vasseur de Bambecque famille de Guillaume Marcotte                                 Famille de Muzinghem\"","divers":"quatre château dans cet article hôtel de ville grav-1, Mazinheim grav-2, le manoir de Besvre crav-5-6, et la Morande grav-7 les jumelles-Grav-8. Le moulins, comte-grav-3-9                                                Morande GPS : 50° 40' 38\" Nord, 2° 20' 39\" Est                                                     Besvre-grav-6 GPS : 50° 36' 45\" Nord, 2° 21' 40\" Est                                                                 hôtel de ville grav-1  GPS : 50° 38' 18\" nord, 2° 23' 45\" est","gps":"50° 40' 38\" Nord, 2° 20' 39\" Est","images":["../image/image_62/62_Air_sur_la_Lys_1.jpg","../image/image_62/62_Air_sur_la_Lys_2.jpg","../image/image_62/62_Air_sur_la_Lys_3.jpg","../image/image_62/62_Air_sur_la_Lys_4.jpg","../image/image_62/62_Air_sur_la_Lys_5.jpg","../image/image_62/62_Air_sur_la_Lys_6.jpg","../image/image_62/62_Air_sur_la_Lys_7.jpg","../image/image_62/62_Air_sur_la_Lys_8.jpg","../image/image_62/62_Air_sur_la_Lys_9.jpg"]},"Consult_chateau_formulaire2ba7":{"id":"Consult_chateau_formulaire2ba7","dept":"62","canton":"Desvres","commune":"Ambleteuse","nom":"Ambleteuse","type":"Fort-Vauban","periode":"XVII","histoire":"AMBLETEUSE, le Fort Vauban ou Fort Mahon. Il fut construit, à la fin de 1680, par Vauban, sur l'ordre du roi de France Louis XIV, pour défendre un port de guerre. Pendant la Seconde Guerre Mondiale, le Fort était utilisé pour emprisonner des travailleurs forcés étrangers. Le Fort d'Ambleteuse est parfois cerné par la mer à marée haute et accessible à pied à marée basse, est composé d'une tour d'artillerie protégée, côté mer, par une terrasse bordée d'un rempart en fer à cheval. Effondré par l'explosion de deux mines marines en 1945, ce rempart a été restauré dans sa forme d'origine avec ses créneaux. A l'arrière, se trouve la place d'armes fermée par un mur à redan (pointe orientée vers l'extérieur). Dans la cour, la casemate allemande. On accède à l'intérieur par le corps de garde (accueil et billetterie). La tour recèle une casemate annulaire, coupée en deux dans sa hauteur par une dalle en béton coulée par les Allemands, qui ont aménagé en dessous des salles maintenant transformées en lieux d'exposition. Six plans-reliefs exposés expliquent l'histoire d'Ambleteuse, de la citadelle anglaise d'Henri VIII à la station balnéaire. Une table d'orientation se trouve au sommet de la tour, de laquelle on a une vue sur le détroit.","architecture":"AMBLETEUSE, cest le seul fort du littoral qui ait été préservé, grâce aux restaurations promues par le Dr Jacques Méreau et le Géologue Destombes qui créèrent en 1967, l'association.  Le Fort d'Ambleteuse a été classé aux M.H. le 19/10/1965. Il est la propriété de l'association qui accueille les visiteurs et organise des visites guidées, chaque été, tout en assumant seule son fonctionnement et ses charges. Il comte 6000 visites par an. Depuis sa restauration, il est aménagé et ouvert au public. Les restaurations ont été menées en 3 grands chantiers : le rempart a été pris en charge par lÉtat. Les bâtiments annexes ont été restaurés avec l'aide de lÉtat, du Conseil Général du Pas-de-Calais.","habitants":"Vauban\"","divers":"GPS : 50° 48' 22,14\" Nord, 1° 36' 1,51\" Est\ngps    50° 48' 19? N, 1° 36' 02? E","gps":"50° 48' 22,14\" Nord, 1° 36' 1,51\" Est","images":["../image/image_62/62_Ambleteuse_1.jpg","../image/image_62/62_Ambleteuse_2.jpg"]},"Consult_chateau_formulaireeec1":{"id":"Consult_chateau_formulaireeec1","dept":"62","canton":"Longuenesse","commune":"Arques","nom":"Arques_Dartois","type":"Châteaux","periode":"VII-XVIII","histoire":"Trois châteaux dans cet article à Arques, le Pavé, Danvers et Ludun.       PAVE d'ARQUES,  imposante demeure dont l'origine est encore floue. On pense toutefois que sa construction date soit de l'époque romaine, soit du VIe ou du VIIe siècle. Sa tour principale, ses meutrières et ses créneaux ne laissent planer aucun doute sur son utilisation défensive. Il est très difficile de dégager un style à ce monument, il a été maintes fois détruits et reconstruits. Ainsi cohabitent à la fois un esthétisme certain et un aspect défensif, lui donnant un charme tout à fait particulier. Parc réalisé au XVIIIe siècle, possédant une pièce d'eau, un jardin potager, un jardin fleuriste, une serre, une remise, un portail et une terrasse en terre-plein. Ce parc est inscrit au pré-inventaire des jardins remarquables, est un label qui a été créé en 2004 par le ministère de la Culture français avec le concours du conseil national des parcs et jardins.                          DANVERS, lorigine du château, semble toutefois que sa construction date soit de lépoque romaine, soit du 6/ 7ème siècle. Maintes fois détruit et reconstruit, il est aujourdhui difficile den dégager un style. On peut tout de même discerner deux aspects fondamentaux : la fonction défensive (plus ancienne) marquée par limposante tour principale (1664), les créneaux et les meurtrières, la fonction esthétique (plus récente) : tours octogonales, cordons en relief, rambardes décorées, grandes fenêtres, arcatures aveugle. Le château a été le siège de nombreux pillages : vikings au IXe siècle, anglo-flamands en 1340, français en 1597","architecture":"ARQUES L'mportance accordée aux verticales, les pignons à pas de moineau (en escalier), les lucarnes étagées, la surcharge décorative sont des références flamandes évidentes. Dailleurs, larchitecte Monsieur Libersalle, qualifie de « beffroi » lavant corps central de la façade. Lédifice emprunte aussi beaucoup au style Louis XIII : mariage de la brique et de la pierre, chaînes dangles harpées, utilisation de pots à feu pour ponctuer les axes verticaux\nDe lhôtel de ville vous parviendront les accords mélodieux dune douce musique, produite par le carillon. Celui-ci comprend 14 cloches fondues en Hollande et est capable de jouer 25 airs célèbres. Chaque refrain est prétexte à une sortie toujours très remarquée de Marie Grouette, la sorcière du marais. Selon la légende, Marie Grouette hante les plans deau de la région et attrape les enfants qui sapprochent trop près du bord avec son groët (fourche à 4 ou 5 dents), pour les emmener dans sa grotte faite de vase et de roseaux Sortie chaque heure de 8 à 20 heures, tous les jours.                                                                                               LUDUN, situé rue Colmar dans un domaine de 1,2 ha, lédifice a été construit en 1874 et dispose dune surface de près de 500 m². Il abrite actuellement certains services de la CAPSO.","habitants":"architecte Monsieur Libersalle,\"","divers":"Trois châteaux dans cet article à Arques, le Pavé, Danvers grav-2 et Ludun grav-3.  mairie Grav-1","gps":"","images":["../image/image_62/62_Arques_Dartois_1.jpg","../image/image_62/62_Arques_Dartois_2.jpg","../image/image_62/62_Arques_Dartois_3.jpg"]},"Consult_chateau_formulaire83ea":{"id":"Consult_chateau_formulaire83ea","dept":"62","canton":"Avesnes-le-Comte","commune":"Aubigny en Artois","nom":"Aubigny_en_Artois","type":"Châteaux","periode":"XVI-XVII","histoire":"deux châteaux dans cet article; Chelers et Fermont.                                    CHELERS, le château a été construit en 1746 par les Quarré de Chélers et il est demeuré dans cette famille jusqu'au XXe siècle. Au siècle dernier, deux pavillons ont été ajoutés à l'uvre initiale. Dans son état actuel, ce château est une construction édifiée en pierre; le soubassement, au niveau des soupiraux des caves est en grès. Le corps principal de bâtiment présente sur sa façade arrière un avant-corps saillant polygonal et sur sa face regardant vers la cour deux ailes latérales saillantes; celles-ci ont été établies du côté du jardin un peu en retrait sur le bâtiment principal. La façade regardant sur la cour avec sa partie centrale légèrement en saillie présente au rez-de chaussée une porte cintrée établie en haut d'un perron et encadrée par des pierres en bossage; à l'étage, la fenêtre également cintrée est accostée de chaque côté par deux pilastres ioniques supportant un fronton dont les armoiries ont été martelées; un balcon en fer forgé précède cette baie. De chaque côté de l'axe médian, chaque partie du bâtiment présente à ses deux niveaux deux fenêtres légèrement cintrées. Des pierres en bossage arquent les angles de cette partie de l'édifice coiffée d'une toiture à la Mansart. Les deux ailes ajoutées au XIXe siècle ont copié cette ordonnance; leur retour est aveugle, elle présente en façade deux baies par niveau et les lucarnes jumelées de leur toiture à la Mansart se trouvent réunies sous un même fronton.","architecture":"A quelques K.M.au sud  de la Capelle-Fermont le manoir de FERMONT, la construction  date du XVIe siècle et XVIIe siècle. On y trouve les armoiries de Jean Grenet, qui fut échevin et argentier d'Arras, et décéda en 1539. Le Manoir de Fermont fut restauré une première fois, en 1701, par la Famille Preudhomme d'Haillies. Les façades et toitures, le portail d'entrée du manoir sont inscrits aux M.H. depuis le 22/02/1980. Il appartient à une société privée.","habitants":"Famille  les Quarré de Chélers  et famille de de Jean Grenet,\"","divers":"deux châteaux dans cet article; Chelers grav-1 et Fermont grav-2.  Fermont GPS : 50° 21' 10\" Nord, 2° 37' 01\" Est","gps":"50° 21' 10\" Nord, 2° 37' 01\" Est","images":["../image/image_62/62_Aubigny_en_Artois_1.jpg","../image/image_62/62_Aubigny_en_Artois_2.jpg"]},"Consult_chateau_formulaire6f75":{"id":"Consult_chateau_formulaire6f75","dept":"62","canton":"Marck","commune":"Audruicq","nom":"Audruicq","type":"Châteaux","periode":"XVII","histoire":"Deux châteaux dans cet article Audruicq et Laurétan.                                 AUDRUICQ, Audruicq fut le chef-lieu du pays de Brédenarde qui était formé des paroisses de Nortkerque, Polincove et Audruicq de 1690 à la Révolution, un grand bailli administra ce territoire et la charge fut héréditaire dans la famille des Laurétan; c'est leur château, construit au XVIIIe siècle, qui subsiste; il en a remplacé un autre plus ancien. Son plan d'ensemble dessine un L, construit en brique sur un soubassement de pierre. La façade principale du corps de logis est encadrée de deux ailes légèrement saillantes, celle de droite se prolonge vers l'arrière pour former l'autre branche de la demeure. Sur le revers, dans l'angle rentrant formé par la rencontre des deux bâtiments se loge une tourelle circulaire. Une autre tourelle de même plan, mais plus haute, puisqu'elle domine largement les toitures, s'adosse à l'autre extrémité de la branche latérale du château sur sa face externe ; au-delà, contre le mur de pignon de celle-ci, s'adosse une annexe un peu plus basse. La façade principale, comme tout le reste du château d'ailleurs, présente une élévation à deux niveaux. La toiture mansardée est dépourvue de lucarnes, seules quelques tabatières éclairent les combles. La tourelle coiffée d'une poivrière est aveugle sauf dans sa partie supérieure qui a été percée de trois ouvertures moulurées et aux angles supérieurs arrondis, aujourd'hui la mairie a pris place dans ce magnifique bâtiment.","architecture":"LAURETAN,  château en briques blondes de sables enduites à soubassements de pierres élevé au XVIIIe siècle, sur des fondations antérieurs, peut-être du XVIIe siècle, flanqué dune haute tourelle et dont les fossés subsistent en partie. Il fut la demeure de la famille des Laurétan, issue des Lorédan, doges de Venise, grands baillis héréditaires depuis 1693. La façade principale du château offre un bel ordonnancement classique avec cinq travées pour le corps de logis principal, celle du centre correspondant à lentrée avec balcon en fer forgé et fronton triangulaire. Deux ailes en avant-corps encadrent cette façade, tandis quune haute tourelle cylindrique domine le tout. Dans le parc, subsistent des vestiges des anciens remparts et une grosse tour de l'ancienne demeure. Le château de Laurétan, situé sur la place, est devenu une maison des Jeunes et son parc, jardin municipal.","habitants":"famille des Laurétan\"","divers":"Deux châteaux dans cet article Audruicq grav-2 et Laurétan grav-1.                        GPS : 50° 52' 43 ,97\" Nord, 2° 04' 53,45\" Est","gps":"50° 52' 43 ,97\" Nord, 2° 04' 53,45\" Est","images":["../image/image_62/62_Audruicq_1.jpg","../image/image_62/62_Audruicq_2.jpg"]},"Consult_chateau_formulaire24d5":{"id":"Consult_chateau_formulaire24d5","dept":"62","canton":"Berck","commune":"Conchil le Temple","nom":"Authie","type":"Châteaux","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article; Authie et le Pas-d'Authie.                        AUTHIE, un manoir a existé autrefois là où est construit le château actuel ; il a été démoli en 1850 et on a découvert un grés portant la date de 1311. L'édifice a toujours appartenu aux Moullart de Vilmarest, Le fief d'Authie existe déjà dans les années 800, il relève du monastère de Saint-Riquier. Il semble qu'Authie soit donné par Charlemagne au duc Angilbert, abbé de Saint-Riquier. Le premier château semble dater du IXe siècle. Après l'An 1000 la châtellenie d'Authie devient une possession du seigneur de la Ferté. Sa situation géographique explique l'importance stratégique du château d'Authie, détruit au XVIe siècle, en représailles par les huguenots, qui n'avaient pu se rendre maîtres de Doullens. Le château actuel ne sera reconstruit que sous le règne de Louis XV.  Le château du XIXe siècle aurait peut-être été construit par le même architecte que celui de Beaumerie-Saint-Martin; un effondrement serait intervenu en cours de travaux et on en aurait allégé la structure dans sa réalisation finale. Le matériau utilisé a été là brique faite avec l'argile jaunâtre du pays et cuite sur place. La façade principale n'est pas celle par laquelle on aborde le château, mais celle qui regarde vers le parc qu'encadrent deux bâtiments qui dessinent avec elle un plan en U. Celui de gauche est un jardin d'hiver qui a du être restauré après la deuxième Guerre; celui de droite est un bâtiment de service, sa longueur est équivalente à celle du jardin d'hiver. La façade du château présente un avant-corps précédé de colonnes doriques jumelées; celui-ci soutient le balcon de l'étage dont la balustrade a été garnie de pots à feu.","architecture":"PAS d'AUTHIE,  construit sur l'emplacement de l'ancien manoir-ferme du XVIIe siècle, pour Félix Moullart de Torcy, artiste peintre. Le parc est prévu sur l'ancienne basse cour dont la mare est préservée ainsi que le pigeonnier. Le gros oeuvre est achevé quand la construction s'effondre en 1851. Torcy fait appel à Félix Pauwels qui édifie une bâtisse rectangulaire, en briques jaunes sur un soubassement calcaire, sur l'arrière, deux ailes symétriques en retour dont l'une sert d'orangerie, encadrent la façade. La façade arrière présente un péristyle surmonté d'un balcon, au niveau de la toiture, une grande lucarne avec un vitrail éclaire la chapelle. Cette façade était conçue pour être la façade d'entrée avant que la ligne de chemin de fer Paris-Boulogne ne coupe l'accès de ce côté. Parc à l'anglaise et jardin à la française dans l'ancien potager clos de murs en craie encadrant un château ainsi que des communs.  Éléments protégés MH : les façades et les toitures, y compris le belvédère et son escalier d'accès ; au rez-de-chaussée le hall, le grand salon et la salle à manger avec leur décor. Les communs, le parc et ses clôtures, le pigeonnier situé dans le parc: inscription par arrêté du 19 avril 2006.","habitants":"Archi Beaumerie-Saint-Martin;                                  Famille de Félix Moullart de Torcy,\"","divers":"Deux châteaux dans cet article; Authie-grav-1  et le Pas-d'Authie-grav-2.","gps":"","images":["../image/image_62/62_Authie_1.jpg","../image/image_62/62_Authie_2.jpg"]},"Consult_chateau_formulaire7d2c":{"id":"Consult_chateau_formulaire7d2c","dept":"62","canton":"Calais","commune":"Autingues","nom":"Autingues","type":"Châteaux","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article; Autingues et la Cressonneries.             AUTINGUES  Ce château, construit au XIXe siècle, en brique et pierre, comprend un corps de logis suivi d'une aile basse. Le premier est un bâtiment de cinq travées de long sur trois de profondeur, la porte s'ouvre au milieu de la face étroite. Des chaînages harpés individualisent les deux travées extrêmes des faces les plus longues; aux angles ces harpes sont alternées. Les fenêtres à peine cintrées et dotées d'une clef sont plus hautes au rez-de-chaussée qu'à l'étage; au sommet des murs, entre un cordon mouluré et la corniche, on a percé un oculus par travée pour aérer les combles. La porte s'ouvre au milieu du côté étroit, un escalier la précède; à l'étage, la fenêtre de gauche a été aveuglée et on en a percé une autre plus petite à côté. Une haute toiture pyramidale à deux rangs de tabatières couvre ce logis. L'aile basse est longue de quatre travées ; on y retrouve des oculus au sommet des murs, mais cette fois ils servent d'ajours à la balustrade qui borde la terrasse de couverture.","architecture":"CRESSONNERIE est situé à entre Nielles-les-Ardres et Ardres est une propriété privé qui ne se visite pas. Ses petites proportions et la présence des deux tourelles de sa façade postérieure atténuent la rigueur du style néo-classique dans lequel il a été conçu.Ce château a été construit en 1808-1812 sur les ruines d'une demeure antérieure qui était entourée de fossés et dotée de tourelles, deux de celles-ci ont été conservées. Précédée par une allée d'arbres, la cour d'honneur, bordée sur sa gauche par les communs, est fermée par de belles grilles dessinant une courbe concave.La façade principale du château est très plate. Deux pilastres à refends partant de fond esquissent un avant-corps médian que couronne un large fronton agrémenté d'une horloge entourée de feuillages ; à cet avant-corps correspondent les trois travées centrales de part et d'autre, les ailes comprennent chacune deux autres travées.On accède aux portes situées aux extrémités de cette façade par de petits escaliers à double rampe, l'accès au sous-sol se trouvé ainsi aménagé sous le perron. Un cordon horizontal sépare les deux niveaux de l'élévation et il recoupe les deux pilastres qui limitent latéralement la façade. Près du château une pièce d'eau est alimentée par de nombreuses sources. Un parc a été aménagé au pied de la butte de la Montoire. Propriété de la famille de Rosny.","habitants":"famille de Rosny\"","divers":"Deux châteaux dans cet article; Autingues grav-1 et la Cressonneries_2-3.","gps":"","images":["../image/image_62/62_Autingues_1.jpg","../image/image_62/62_Autingues_2.jpg","../image/image_62/62_Autingues_3.jpg"]},"Consult_chateau_formulaire1fe8":{"id":"Consult_chateau_formulaire1fe8","dept":"62","canton":"Auxi-le-Château","commune":"Buire au Bois","nom":"Bachimont","type":"Châteaux","periode":"XVII","histoire":"Deux châteaux dans cet article; Bachimont et Vaulx.                           BACHIMONT  Nicolas-Charles-Antoine Denis de Caboche, ancien colonel d'artillerie et chevalier de Saint-Louis désirant avoir une habitation plus en rapport avec ses titres, abandonna son vieux manoir et, à deux cents mètres de celui-ci, de 1755 à 1757, comme l'indiquent les dates incrites dans la cave et au sommet de l'une des cheminées principales, il fit édifier le château qui existe encore aujourd'hui. Sa fille et unique héritière, Marie-Anne-Charlotte épousa en 1771, dans la chapelle de Bachimont, Antoine de Puget, capitaine sous les ordres de M. de Bachimont pendant la campagne de Corse. Celui-ci nommé sous-gouverneur du dauphin, 1er fils de Louis XVI; chaque année, il aurait amené l'enfant à Bachimont. Au centre d'un épais mur de clôture en bnque, une grille donne accès à un emplacement gazonné, l'ancienne cour d'honneur du château. C'est une élégante construction de style Louis XV réalisée en brique et pierre de taille et comprenant un corps de logis flanqué de deux ailes saillantes du côté de la cour comme du côté du parc. Ces bâtiments ne comprennent qu'un simple rez de chaussée surmonté d'une toiture à la Mansart. Au centre du corps de bâtiment s'ouvre l'entrée principale tracée en plein cintre ; les deux pavillons d'angle sont éclairés par deux fenêtres chacun. Deux hautes et minces cheminées en brique dominent la partie supérieure de l'édifice.","architecture":"VAULX à quelques K.M. à l'ouest, Cette terre a appartenu depuis le XVe siècle à la famille de la Porte. Durant la Révolution, le domaine a été vendu à M. Dyvincourt, ex-vicaire épiscopal d'Arras, devenu commissaire du pouvoir exécutif, et depuis, il est demeuré dans la famille Rosselet-Dyvincourt. La partie la plus ancienne du château est celle située au sud puisqu'elle n'est pas dans l'axe du corps de logis et que ses murs ont environ 3 m d'épaisseur. Le reste de la construction appartient au XVIIIe siècle : la porte d'entrée de l'aile nord sur la cour est datée de 1745, et le bâtiment des cuisines porte la date de 1774, celui des remises, celle de 1753. Le pignon septentrional tourné vers l'église présente un fronton qui était orné des armes des de La Porte, mais elles ont été martelées sous la Révolution ; en revanche, la porte du grand vestibule a conservé un petit écusson où ces mêmes armes ont été sculptées sous une couronne de baron. Le château a été réalisé en pierre, il est à deux niveaux sous une toiture en croupe dotée de quelques lucarnes. Les jardins ont été aménagés en terrasses.","habitants":"Famille de Nicolas-Charles-Antoine Denis de Caboche.              famille de la Porte            \"","divers":"Deux châteaux dans cet article; Bachimont grav_1 et Vaulx.grav_2","gps":"","images":["../image/image_62/62_Bachimont_1.jpg","../image/image_62/62_Bachimont_2.jpg"]},"Consult_chateau_formulaire044e":{"id":"Consult_chateau_formulaire044e","dept":"62","canton":"Fruges","commune":"Racquinghem","nom":"Bambecq","type":"Château","periode":"XX","histoire":"BAMBECQ, il existait autrefois sous lancien régime 19 domaines seigneuriaux dimportance variable sur le territoire de Racquinghem, parmi ces fiefs, un seul bâtiment est encore debout, il sagit du château de la seigneurie de Bambecq. Il est acheté par Jean de Bambecq en 1427. Le bâtiment a été appelé plus tardivement du nom de la famille propriétaire, il ne portait aucun nom auparavant.  Au XXe siècle, la propriété était détenue par M. Arnauld van Zoller Oosthove, nom qui reflète les origines flamandes de la région. Il a été maire de Racquinghem pendant de nombreuses années et a érigé les portes principales, qui portent ses initiales.","architecture":"BAMBECQ, ce château était un pavillon de chasse du château de Bambecq qui a été brulé durant la Révolution. La partie centrale de l'édifice actuel a été construit en 1750, puis considérablement augmentée plus tard pour former le château que nous voyons aujourd'hui. Ce château à pris feu dans la nuit du 18-19 septembre, deux ailes détruites.","habitants":"M. Arnauld van Zoller Oosthove,\"","divers":"Château de Bambecq à Racquinghem","gps":"","images":["../image/image_62/62_Bambecq_1.jpg"]},"Consult_chateau_formulaireaad0":{"id":"Consult_chateau_formulaireaad0","dept":"62","canton":"Avesnes-le-Comte","commune":"Barly","nom":"Barly_Varlemont","type":"château","periode":"XVIII","histoire":"BARLY, débutée vers 1780  à l'initiative de Vindicien Antoine Blin et de son épouse, Marie Pétronille de Beauvoir de Séricourt.  Les Blin, également appelés Blin de Barly, sont une famille de fermiers et laboureurs aisés, qui n'ont jamais été anoblis. La seigneurie de Barly fut vendue, en 1698, par Claude de Richardot, Prince de Steenhuyse, à Marguerite Le Maistre, veuve d'Antoine Blin, bourgeois d'Arras, seigneur de Wanquetin. Les 3 fils du couple, Jean-Marie Blin, capitaine d'infanterie, hérita de Barly. Il décéda en 1775 dans sa \"maison seigneuriale\" à Barly. Son fils Vindicien Antoine Blin de Barly, capitaine au régiment de Rohan, épousa Barbe Louise Hulot en 1739. Veuf, il se remaria avec Marie Pétronille de Beauvoir de Séricourt, avec laquelle il entama la construction du château de Barly actuel. Le couple décéda, en 1786, avant l'achèvement des travaux. Jean Vindicien Blin de Varlemont de Barly, fils de Vindicien Antoine et de Barbe Louise Hulot lui succède alors. Capitaine au régiment des dragons de la Reine, Jean Vindicien épouse en 1782 Catherine Dagon de la Conterie. Élu premier maire du village en 1790, il n'est inquiété au cours de la Révolution que pendant la Terreur. Il se trouva assigné à résidence au château. Ayant divorcé, en 1794, il loua le château de Barly lors des étés de 1812 à 1818, à l'Evêque d'Arras. Après la mort de Jean Vindicien en 1832, son fils et unique héritier, Achille Pierre Blin de Varlemont, revendit le château de Barly, en 1837, à Blanche des Escotais, Veuve du Comte Adrien Eugène Léonard de Tramecourt. La Comtesse de Tramecourt décéda, en 1879 : Barly fut légué à son neveu le Marquis du Luart. Inoccupé, le château de Barly est parfois loué durant l'été. Arthur Duhem, vice-président de la chambre de commerce de Lille, racheta Barly, le 8/07/1914.","architecture":"BARLY;  Après la guerre, la famille Duhem reprend possession des lieux, et Arthur Duhem décéda, à Barly, en 1930. En 1937, ses enfants vendirent le château à Robert Bouttemy, agriculteur du village. Pendant la seconde guerre mondiale, Barly est occupé par des unités allemandes. A la fin 1960, monseigneur Jean Lestocquoy, président de la commission départementale des M.H. du Pas-de-Calais, attire l'attention publique, sur les menaces qui pèsent sur le château de Barly, alors en bien mauvais état. Suite de cette mobilisation, le Colonel Jacques d'Antin de Vaillac l'acheta, en 1970. Le 2/03/1971, la totalité des bâtiments et des décors intérieurs de Barly ont été classés. Les travaux de restauration débutèrent. Bernard Dragesco et Didier Cramoisan rachetèrent le château de Barly, en Juin 2001.  La construction du corps principal devait être terminée en 1784, quand commencèrent les aménagements intérieurs. Ceux-ci furent achevés autour de 1794. Fruit du goût et de la volonté de la famille Blin de Barly, cet ensemble de pur style Louis XVI est de très grande qualité architecturale et a survécu dans un état dauthenticité absolument exceptionnel, si rare en France, fruit du goût et de la volonté de la famille Blin de Barly, mérite dêtre souligné.\nÉléments protégés MH : le château et ses dépendances (la chapelle, les communs et le portail d'entrée) : classement par arrêté du 2 mars 1971.","habitants":"Famille de Vindicien Antoine Blin\"","divers":"Château de Varlimont à Barly            GPS : 50° 14' 59' Nord, 2° 33' 3\" Est","gps":"50° 14' 59' Nord, 2° 33' 3\" Est","images":["../image/image_62/62_Barly_Varlimont_1.jpg","../image/image_62/62_Barly_Varlimont_2.jpg","../image/image_62/62_Barly_Varlimont_3.jpg","../image/image_62/62_Barly_Varlimont_4.jpg"]},"Consult_chateau_formulaire5481":{"id":"Consult_chateau_formulaire5481","dept":"62","canton":"Avesnes-le-Comte","commune":"Bavincourt","nom":"Bavincourt","type":"Châteaux","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article; Bavincourt  et Gouy  en Artois.                                            BAVINCOURT, la demeure actuelle, construite au XIXe siècle et réalisée en  pierre, consiste en un grand corps de bâtiment coiffé par un comble d'ardoise. Sa cour est fermée par une belle grille en fer forgé. Une terrasse bordée par une balustrade précède les cinq travées centrales, celle du centre, réalisée avec un appareil à refends est délimitée par des pilastres supportant un fronton triangulaire armorié, on y voit un \"M \" encadré d'une guirlande, d'une gerbe de blé et d'instruments aratoires ; ce fronton est si petit que la sculpture en déborde et s'étale sur la partie murale le séparant de la clef de la baie de l'étage. Cette lettre M se retrouve à la grille du tympan de la portre d'entrée. Cette porte, comme la fenêtre qui la surmonte, a été tracée en plein cintre: elle est précédée d'un balcon à balustres. Les autres ouvertures, quatre pour chacun des deux niveaux de l'élévation de part et d'autre de cet axe médian, soit seize au total, ne sont que légèrement cintrées et leur encadrement fait  saillie sur le crépi qui masque une bonne partie de l'appareil.","architecture":"GOUY en artois, a cinq K.M. au sud Est. La construction du château de la GORCE date du XVIe au XIXe siècle. Il est inscrit aux M.H. partiellement depuis le 30/12/1985 pour les façades de l'ensemble des bâtiments, la ferme, l'élévation et les toitures. Le château de La Gorce est un château-ferme privé. Le comte Xavier Eugène de Diesbach Belleroche, né à Saint-Germain-en-Laye le 28 juillet 1817, décédé au château de Gouy-en-Artois le 20 août 1905 et inhumé dans le caveau Diesbach-de Cardevac de Gouy, bourgeois de Fribourg, naturalisé français (1867), fit ses études au collège des Jésuites à Fribourg. Il sétablit dans le village et fut agriculteur et éleveur à La Basèque et à Gouy. Il devint maire de Gouy-en-Artois (1870), Député du Pas-de-Calais, dans les rangs du Parti Conservateur (1871-1876), membre fondateur du cercle des agriculteurs de France, et membre de la société centrale dagriculture du Pas-de-Calais.","habitants":"Comte Xavier Eugène de Diesbach Belleroche\"","divers":"Deux châteaux dans cet article; Bavincourt grav-1_2  et Gouy  en Artois grav 3-4","gps":"","images":["../image/image_62/62_Bavincourt_1.jpg","../image/image_62/62_Bavincourt_2.jpg","../image/image_62/62_Bavincourt_3.jpg","../image/image_62/62_Bavincourt_4.jpg"]},"Consult_chateau_formulaire34b8":{"id":"Consult_chateau_formulaire34b8","dept":"62","canton":"Berck","commune":"Beaumerie-saint-Martin,","nom":"Beaurepaire_d","type":"Château","periode":"XVII","histoire":"BEAUREPAIRE, le manoir construit par Pierre de Boullongne en 1620 comprend deux bâtiments accolés, l'un à simple rez-de-chaussée, l'autre à étage.  Près de ce manoir, en 1853, on a construit un imposant château. Pendant la grande guerre, il a servi de résidence au maréchal Douglas Haig qui avait établi son QG à Montreuil. Il comprend un corps de logis rectangulaire flanqué du seul côté gauche d'une aile en retrait mais celui-ci est moins prononcé au niveau du rez-de-chaussée.","architecture":"BEAUREPAIRE, comme le corps de logis est large, cette même disposition se retrouve sur la façade arrière. La construction a été réalisée en pierre et brique, la première étant réservée aux chaînages d'angle, aux cordons horizontaux qui soulignent le sommet des fenêtres et aux encadrements de celles ci. Le corps de logis présente en son centre un étroit avant-corps à peine saillant ; un fronton tronqué le couronne. La porte d'entrée et la fenêtre de l'étage est bordée d'un balcon reposant sur des consoles engagées dans les montants de la porte. On note deux groupes de trois fenêtres par niveau de part et d'autre de cet axe. Une grande fenêtre et un il-de-buf éclairent l'avancée de l'aile latérale, cette aile présente trois fenêtres par niveau. La toiture du corps principal est à la Mansart, des ils-de-buf et des lucarnes éclairent les combles; curieusement, une balustrade en fer forgé quadrangulaire couronne cette toiture.","habitants":"maréchal Douglas Haig\"","divers":"GPS : 50° 27' 23\" Nord, 1° 47' 57\" Est","gps":"50° 27' 23\" Nord, 1° 47' 57\" Est","images":["../image/image_62/62_Beaurepaire_d%27Ardoix_1.jpg"]},"Consult_chateau_formulaire80d3":{"id":"Consult_chateau_formulaire80d3","dept":"62","canton":"Auxi-le-Château","commune":"Beauvoir Wavans","nom":"Beauvoir_Wavans","type":"Châteaux","periode":"XVII","histoire":"Deux  châteaux dans cet article ; Beauvoir, Ducras.                            BEAUVOIR, Antoine-François de Genevières, époux de Sylvie Scholastique de Cupère, possédait la terre de Beauvoir au début du XVIIIe siècle; son fils n'ayant pas d'héritier, légua l'édifice à sa nièce Françoise, épouse du vicomte Ghislain de Beaulaincourt. Ce furent ces derniers qui bâtirent le château, le vicomte fut guillotiné pendant la Terreur mais le château revient néanmoins à son fils. Par alliance, il passa ensuite à la famille Guichard en 1851 puis à celle des Leclercq. Durant la guerre de 1939, le château fut endommagé au cours de l'exode et par les troupes d'occupation; une grande partie de son mobilier a disparu dans les pillages. Un mur d'enceinte construit en pierre limite l'ensemble des constructions; rectiligne, il est interrompu en son milieu par la grille d'entrée qui donne accès au parc qui englobe le jardin et la basse-cour et entoure des bâtiments de ferme realisés en brique et dominée dans l'angle par le pigeonnier. Le mur se referme sur deux pavillons carrés, en pierre, un simple rez-de-chaussée. Dans le fond, l'enceinte s'interrompt pour faire place au château qui correspond à l'axe de la propriété. Une pelouse circulaire a été aménagée entre la grille d'entrée et la façade principale. Cette demeure a été réalisée en brique et pierre; ses deux niveaux sont coiffés d'une toiture à la Mansart autrefois en ardoise; remplacée par des tuiles plates au début du XXe siècle.\nÉléments protégés MH : le château en totalité, avec ses pavillons, l'ensemble de ses communs, le potager, la cour d'honneur, le parc avec ses allées et les murs de clôture avec leurs portails : inscription par arrêté du 2 février 2016.","architecture":"DRUCAS, le château, situé à lentrée du bourg Beauvoir-Wavans, sélève au bout une longue et majestueuse allée bordée de tilleuls. Ce château  est une élégante gentilhommière construite en brique pour lessentiel de la maçonnerie et en pierre pour les angles. Bâtiment construit dans les années 1850 sur une terre connue pour être une seigneurie au XVe siècle, cette élégante demeure de famille, depuis 1916, fait aujourdhui le plaisir des touristes qui peuvent y séjourner en gîte rural ou en chambres dhôtes.","habitants":"Beauvoir  famille Guichard                            Famille Ducras                    Dreack famille De Laurétan \"","divers":"Deux  châteaux dans cet article ; Beauvoir grav-1, Ducras grav-4, Draeck grav-2-3                             Beauvoir GPS : 50° 13\" 07\" Nord, 2° 09' 47\" Est","gps":"50° 13\" 07\" Nord, 2° 09' 47\" Est","images":["../image/image_62/62_Beauvoir_Wavans_1.jpg","../image/image_62/62_Beauvoir_Wavans_2.jpg","../image/image_62/62_Beauvoir_Wavans_3.jpg","../image/image_62/62_Beauvoir_Wavans_4.jpg"]},"Consult_chateau_formulaire4268":{"id":"Consult_chateau_formulaire4268","dept":"62","canton":"Desvres","commune":"Wacquinghen","nom":"Berguette","type":"Château","periode":"XVIII","histoire":"BERGUETTE, ce bien fut la propriété de Mutinot, maire de Boulogne au début du XVIIIe siècle: par héritage et alliance, il passa à la famille de Rincquesen ; à la veille de la Révolution, il était la propriété de François-Achille de Willecot de Rincquesen. Il n'est plus jamais sorti de cette famille. Une belle avenue conduit à une grille en fer forgé finement dessinée. Parmi les arbres se cache un pigeonnier rond dont la porte et la fenêtre supérieure sont tracées en arc brisé. Dans le fond s'élève le château bâti en pierre du pays.","architecture":"BERGUETTE, il est très simple; c'est un bâtiment rectangulaire à deux niveaux long de huit travées; les quatre de droite ont des percements exactement superposés; une porte à deux battants, à peine plus large qu'une fenêtre, s'ouvre à l'avant-dernière travée. Au delà, vers la gauche, au rez-de-chaussée, sur une grande longueur, le mur forme un retrait dessinant une sorte de cadre rectangulaire où se trouve percée une porte flanquée sur sa droite d'une fenêtre et sur sa gauche d'une baie obstruée; à cet endroit, à l'étage les percements ne se superposent pas à ceux qui viennent d'être présentés. A l'intérieur du logis la pièce la plus remarquable est un beau salon de style Louis XVI. Vers l'arrière, un beau jardin a été dessiné à la fin du XVIIIe siècle, dans un esprit romantique par M. de Rincquesen ; c'était le beau-frère de Dumont de Courset, le célèbre botaniste, un beau plan de 1818 est conservé au château.","habitants":"famille de Rincquesen\"","divers":"Château de Berguette à Wacquinghen","gps":"","images":["../image/image_62/62_Berguette_1.jpg"]},"Consult_chateau_formulaire634d":{"id":"Consult_chateau_formulaire634d","dept":"62","canton":"Avesnes-le-Comte","commune":"Berles_Monctel","nom":"Berles_Monctel","type":"Château","periode":"XVII","histoire":"BERLES-MONCHEL, est un château bâti à Berles-Monchel. La construction du château de Berles-Monchel date de 1730 à 1830. Le château de Berles-Monchel fut construit, en deux temps, pour la famille Lallart, sur un terrain acquis, en 1704.le château de Berles-Monchel a été racheté par Joséphe Albertine Lallart, au début du XIXe siècle. Ensuite, sa fille, Marie-Charlotte Lallart,le  fit agrandir En 1852, lensemble fut vendu à Abel Tournois de Bonnevalet. Aujourd'hui encore, le domaine est la propriété de ses descendants. Initialement orné d'un Jardin à la Française, le château de Berles-Monchel est entourédun parc à lAnglaise, d'une superficie de 2 Ha, aménagé à partir d'un plan de 1823. Le château de Berles-Monchel, sa ferme et son parc ont été inscrits aux M.H. depuis le 2/05/2016. Le château de Berles-Monchel est privé, fermé au Public.","architecture":"BERLES-MONCHEL, un premier ensemble, édifié vers 1730, comprend une petite maison forte et une ferme. L'ensemble est orné d'un parc à l'Anglaise. Vendu comme bien national au cours de la Révolution,  fut agrandi le château de Berles-Monchel, dans les années qui suivirent, en prolongeant l'habitation pour l'adosser à la ferme","habitants":"famille Lallart\"","divers":"Monchel à Berles-Monchel                    GPS : 50° 20' 38\" Nord, 2° 32' 14\" Est","gps":"50° 20' 38\" Nord, 2° 32' 14\" Est","images":["../image/image_62/62_Berles_Monchel_1.jpg","../image/image_62/62_Berles_Monchel_2.jpg"]},"Consult_chateau_formulairec78e":{"id":"Consult_chateau_formulairec78e","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Bermicourt","nom":"Bermicourt","type":"Château","periode":"XV-XVIII","histoire":"BERMICOURT, un diplôme de Charlemagne donné à Aix-la-Chapelle en 806 approuve la donation faite à l'abbaye de Saint-Denis par sainte Isbergue, sa sur, de la villa de Bermicorte. Cette terre donna plus tard son nom à la famille de Bermicourt. En 1467, la famille de Wignacourt en était propriétaire, mais en 1475 elle passa à Robert de Cunchy, écuyer, seigneur de Libessart. Au cours des guerres du XVIIe siècle, le château qui servait de résidence à Robert de Cunchy fut incendié et détruit partiellement. En 1826, M. de Rouvroy de Libessart entreprit la construction d'un château sur un autre emplacement. Par alliance, celui-ci est passé à la famille de Hauteclocque qui en a achevé la réalisation et dont les descendants l'ont conservé jusqu'à nos jours.","architecture":"BERMICOURT, au fond d'un grand parc gazonné, le château, entièrement construit en pierre de taille, présente un corps de logis flanqué de deux ailes plus basses. Une galerie longe le rez-de-chaussée de la partie centrale, un perron de deux marches permet d'accéder à ses trois portes tracées en plein cintre. Deux fenêtres de chaque côté éclairent cette galerie. Des pilastres doriques soutiennent l'entablement assez saillant, deux aux extrémités et quatre de part et d'autre des portes. Les pavillons latéraux ont reçu un plan en L ; le vide intermédiaire entre chacun d'entre eux et le corps de logis est occupé par un simple rez-de-chaussée.","habitants":"famille de Hauteclocque \"","divers":"Château de Bermicourt                        gps 50° 24' 21? N, 2° 13' 43? E","gps":"","images":["../image/image_62/62_Bermicourt_1.jpg"]},"Consult_chateau_formulairedcfa":{"id":"Consult_chateau_formulairedcfa","dept":"62","canton":"Auxi-le-Château","commune":"Maintenay","nom":"Berthonval","type":"Château","periode":"XVII","histoire":"BERTHONVAL, le château primitif, sur motte, connu grâce à un plan du début du XVIIIe siècle, se situait à une dizaine de mètres au sud de l'ancien lit de la rivière, un peu plus loin vers le sud-est, on en construisit un autre qui, à son tour fut détruit et dont les fondations servirent en 1660 à Claude d'Urre, seigneur de Mézeracq, pour asseoir le château actuel. Par alliance, la propriété passa aux Lamiré et aux Loisel Le Gaucher. En novembre 1771, Marie Anne Charlotte Rosalie Le Gaucher épousa François Guislain, baron de France. C'est à lui et surtout à elle, car elle semble avoir eu du caractère, que nous devons le décor de la presque totalité des pièces. L'édifice fut vendu comme bien national puis repris par la famille qui le possède toujours. Henri Guislain de France lui donna au XIXe siècle, l'apparence actuelle.","architecture":"BERTHONVAL  une fois franchie la grille, on pénètre dans une cour rectangulaire bordée à droite et à gauche par les communs, barrée dans le fond, par le château et ses ailes. Modeste dans ses dimensions, le bâtiment central, élevé sur deux niveaux, l'est aussi dans son décor qui joue de l'opposition brique et pierre. Mais ici et le fait est rare dans la région, la brique est en corniche, en cordon et aux encadrements des portes et des fenêtres, le silex en soubassement, la pierre blanche partout ailleurs.","habitants":"Famille  François Guislain\"","divers":"Château de Berthonval-Arry grav-1 et Pennery grav-2","gps":"","images":["../image/image_62/62_Berthonval_1.jpg","../image/image_62/62_Berthonval_2.jpg"]},"Consult_chateau_formulaireb01c":{"id":"Consult_chateau_formulaireb01c","dept":"62","canton":"Calais","commune":"Guines","nom":"Bien_Assisse","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à  Guines; la Bien-Assise, le Campagne, Dippendal et la Garenne.                                                                                                                  La BIEN ASSISSE, c'est Charles-François-Marie de Guizelin et Antoinette-Adélaïde de Laverdy qui posent la première pierre du château en 1806. Adélaïde-Marie-Clémentine de Guizelin le reçoit par succession, et en 1812 l'apporte par son mariage à Thomas-François-Joseph-Lefebvre de Trois Marquets, écuyer, conseiller à la cour royale de Douai. En 1820, le baron Auguste de Guizelin en hérite de sa sur, Adélaïde-Marie-Clémentine. Il sera racheté, en 1907, par Mr Basset, Fabricant de tulle à Calais. En 1944, le château de la Bien-Assise de Guînes est réquisitionné pour héberger des réfugiés des marais de la région. En 1951, Mr André Boutoille qui possédait les terres et la ferme, fit l'acquisition du château de La Bien-Assise de Guines  jl appartient depuis à Mr et Mme Frédéric Mancho.","architecture":"La BIEN-ASSISSE est un édifice quadrangulaire flanqué de deux ailes basses dont les côtés sont sur le même alignement que le corps central, celui-ci comprend un sous-sol, un rez de chaussée, un étage et le comble sous toiture, celle-ci à longs pans et croupes droites est couverte d'ardoises. La façade qui donne sur une cour d'honneur au pavement fort habile est plus sobre que la façade arrière sur jardin. Les fossés forment un U ouvert devant la façade sur cour, la branche ouest, à son extrémité, a été comblée. La branche Est, sur laquelle s'ouvre un bassin en demi-cercle, se prolonge vers l'abreuvoir situé derrière le colombier, dans la cour de la ferme attenante. Un muret suit le bord du fossé côté jardin; aux angles de celui-ci, il est interrompu par deux petites constructions octogonales ayant perdu leur toiture.","habitants":"Famille de  Thomas-François-Joseph-Lefebvre de Trois Marquets,\"","divers":"Quatre châteaux à  Guines; la Bien-Assise grav_1, le Campagne, Dippendal et la Garenne.                   GPS : 50° 51' 53\" Nord, 1° 51' 36\" Est","gps":"50° 51' 53\" Nord, 1° 51' 36\" Est","images":["../image/image_62/62_Bien_Assisse_1.jpg"]},"Consult_chateau_formulaire9ae3":{"id":"Consult_chateau_formulaire9ae3","dept":"62","canton":"Longuenesse","commune":"Blendecques","nom":"Blendecques","type":"Chateaux","periode":"XVII-XVIII","histoire":"quatre châteaux dans cet article Ste-Colombe, Bellevue, Montrayant et Blancbourg.                                                                                              SAINTE-COLOMBE ; de l'abbaye fondée en 1186 et reconstruite au XVIIIe siècle ne subsistèrent après la Révolution qu'un monumental portail de pierre et un bâtiment classique en brique jaune dont le corps central et sur chaque façade sommé d'un fronton sculpté. A l'intérieur caves voutées et escalier en bois à balustres ajourés, propriété de monsieur Houzet.  L'ensemble des vestiges de l'ancienne abbaye a été inscrit à l'inventaire supplémentaire des monuments historiques par arrêté du 27 juin 1991.                                                                                                                                                                                                                                        \nMONTRAYANT (dit dHelfaut), construit à la même époque que le précédent. En 1776 la seigneurie fut vendue par la  comtesse Mérode, princesse de Rubempré à Messire Pierre Sandelin, comte de Fruges. La cense est occupée par Marie Jacqueline Françoise Pacou. La dernière héritière du nom Marie Olympe de Sandelin et son époux le baron Colbert-Caste-Hill, (ils habitaient, dans leur hôtel particulier, à St.Omer, aujourdhui musée Sandelin, Ils furent inhumé à lancien cimetière de Blendecques en 1879 et 1882, près de la nef Sud de la nouvelle église.","architecture":"BELLEVUE, date de construction: 1808 Albert Frédéric Joseph Gonsse 1766-1819, manufacturier, propriétaire du moulin au fer blanc, possède un manoir à la campagne avec jardin et 4,96 hectares comprenant bois, basse cour, écuries, vacherie, porcherie et remise. En 1855, la propriété appartient à Charles Ambroise Platiau 1804-1882 qui la met en location en 1857 avant que Louis Auguste Platiau 1877-1924 lhabite au moins de 1904 a 1909 mais le manque de chambres et l'exposition nord lamène à déménager pour le château de la Garenne. \nBLANCBOURG, construit au XIIe siècle, fut assiégé, pris et dévasté par les français en 1595, en même temps que le château de Longastre à Heuringhem. Le 16 mars 1604, Jeanne de Rummel, propriétaire semble avoir épousé en secondes noces Philippe de Lilleville sieur de Comerelle.  En 1610 Jacques de la Becque est seigneur du Blancbourg, puis le fief passe à sa fille Mme de Boncourt, et ensuite (sans doute par vente) dans la famille des barons de Wintrefeld. Le 24 avril 1713 Messire Ernest de Wintrefeld, prêtre chanoine de la cathédrale de Gand, vend le château à Gilles Marcotte, seigneur de Roquetoire. Celui-ci lèguera le château à sa fille, épouse du sieur Bodin.","habitants":"Bellevue; famille de  Albert Frédéric Joseph Gonsse                            Montrayant ; Messire Pierre Sandelin,             Blancbourg; Jacques de la Becque                  \"","divers":"quatre châteaux dans cet article Ste-Colombe grav-1, Bellevue gra-3, Montrayan grav-4 et Blancbourg grav-5.","gps":"","images":["../image/image_62/62_Blendecques_1.jpg","../image/image_62/62_Blendecques_2.jpg","../image/image_62/62_Blendecques_3.jpg","../image/image_62/62_Blendecques_4.jpg","../image/image_62/62_Blendecques_5.jpg","../image/image_62/62_Blendecques_6.jpg"]},"Consult_chateau_formulaire64b8":{"id":"Consult_chateau_formulaire64b8","dept":"62","canton":"Fruges","commune":"Bomy -Estrée-Blanche","nom":"Bomy_Créminil","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article;  Bomy et Créminil.                               \nBOMY, Un château médiéval, dont la motte circulaire entourée d'un fossé plein d'eau existe toujours, a précédé ce château construit pour Charles-Adrien Gillon, marié en 1764 à sa nièce Marie-Ferdinande-Brigitte de Croy et qu'un portrait, maintenant conservé à Corroy-le-château en Belgique, représente avec sa famille devant la cheminée du salon. Vendu comme bien national à la Révolution, il est acheté par Desmoutiers, receveur des finances à Douai, qui y installe une sucrerie. En 1859, il est à Charles de Vilmarest dont la fille Mathilde le fait entrer dans la famille Dunoyer de Segonzac qui le possède toujours. La tradition veut que les boiseries soient l'uvre d'artisans locaux, les Joly. Cet édifice homogène et de tradition classique dresse au fond de la cour d'honneur une façade en pierre sur deux étages prolongée par deux galeries en ailes. Au centre, un avant-corps légèrement saillant est couronné d'un fronton triangulaire. Ses deux niveaux rythmés par quatre chapiteaux sont séparés par un double cordon et percés chacun de trois fenêtres. Celles du rez-de-chaussée sont en plein cintre. A chaque extrémité, un pavillon dont le décrochement est atténué par un arrondi aux ouvertures aussi en plein cintre.Éléments protégés MH : les façades et les toitures du château ; classement par arrêté du 24 décembre 1980.","architecture":"CREMINIL a quelques K.M. à l-Est de Bomy à Estrée-Blanche. Le premier seigneur connu est Nicolas de Crasmainil en 1210. En 1329, on relève un Raoul du Cros Maisnil vassal de la célèbre comtesse Mahaut d'Artois. A la mort de Raoul, \"par défaut d'homme\", le fief revint à la main de Mahaut. Une pièce d'archives datée de 1443 mentionne la livraison par le serrurier Jean de Bailleul à Jean Le May, vice-mayeur de Saint-Omer,  la fourniture d'une telle quantité de clous ne peut s'expliquer que par des travaux de charpente, marquant l'achèvement de la construction du château qui dut être en grande partie restauré après les ravages commis par les troupes au XVIe siècle. Après la famille Le May, à nouveau citée en 1461, on trouve en 1540 à Créminil Hugues de Buleux, puis en 1670 Antoine de Wignacourt, et enfin la famille Le Merchier de 1687 à la Révolution. Le château a appartenu jusqu'en 1978 à Madame L'héritier dont la famille le possédait depuis la Révolution sort de la famille pour passer au général L'héritier et  à Mr Durus Michel.\nÉléments protégés MH : les façades, les toitures et les douves du château, et le parc boisé qui l'entoure avec l'allée de tilleuls qui mène au château, classement par arrêté du 19 avril 2005.","habitants":"Bomy; famille Dunoyer de Segonzac                     Créminil,  famille Le Merchier\"","divers":"Deux châteaux dans cet article; Créminil et Bomy   Bomy GPS : 50° 34' 29,7\" Nord, 2° 14' 12,4\" Est                                            Créminil GPS : 50° 35' 31,33\" Nord, 2° 19' 42,37\" Est","gps":"50° 34' 29,7\" Nord, 2° 14' 12,4\" Est","images":["../image/image_62/62_Bomy_Cr%c3%a9minil_1.jpg","../image/image_62/62_Bomy_Cr%c3%a9minil_2.jpg","../image/image_62/62_Bomy_Cr%c3%a9minil_3.jpg","../image/image_62/62_Bomy_Cr%c3%a9minil_4.jpg"]},"Consult_chateau_formulairea6b7":{"id":"Consult_chateau_formulairea6b7","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Boubers sur Canche","nom":"Boubers_Canche","type":"Château","periode":"XVII","histoire":"BOUBERS sur CANCHE, le château a été bâti entre 1720 et 1731 sur décision de Marie Joséphe de Berghes, princesse de Rache. Il restera la propriété de la famille de Berghes jusqu'en mai 1827, date de la vente au baron Guillaume Louis Ternaux, industriel. Celui-ci y installe une fabrique de lin, mais meurt en 1833. Suite à la liquidation de la sté Ternaux, le château est repris en 1835, par le baron François Luglien de Fourment qui transforme l'établissement en filature de laine. Après la mort de Luglien Leroy, fils du baron de Fourment, en 1916, l'usine appartiendra à différents propriétaires: rachat par Lemaire et Christory puis le comptoir Linier y installe une filature de coton ensuite Saint-Frères, Agache-Willotet enfin, Safilin.","architecture":"BOUBERS sur CANCHE  Le château a été bâti entre 1720 et 1731 sur décision de Marie Joséphe de Berghes, princesse de Rache. Ce château, un des plus grands d'Artois, comprenait plusieurs salons, pas moins de quatorze chambres, de nombreux cabinets, un théâtre, deux offices avec la cuisine, quatre caves plus les diverses remises, il fut détruit par un incendie en 1922, seuls subsistent le portail d'entrée, une aile en cours de restauration par le propriétaire, les dépendances et le pigeonnier.","habitants":"famille de Berghes\"","divers":"Château à  Boubers sur Canche","gps":"","images":["../image/image_62/62_Boubers_Canche_1.jpg","../image/image_62/62_Boubers_Canche_2.jpg","../image/image_62/62_Boubers_Canche_3.jpg"]},"Consult_chateau_formulaire0483":{"id":"Consult_chateau_formulaire0483","dept":"62","canton":"Boulogne sur mer","commune":"Boulogne sur mer","nom":"Boulogne_sur_Mer","type":"Patrimoine","periode":"XIII-XIX","histoire":"quatre châteaux dans cet article le fort de Boulogne, chateau de Lonquety, manoir de Senlecques et château d'Aumont.                               BOULOGNE sur Mer, vainqueur à Bouvines, Philippe Auguste attribue le comté de Boulogne à son fils Philippe Hurepel, dit le \"Hérissé\" qui en prend possession en 1223. En 1227, dans le contexte de la coalition dirigée contre la régente Blanche de Castille à la minorité de Louis IX, il relève les fortifications romaines et construit le château. La forteresse voit donc le jour entre 1227 et 1231, édifiée dans l'angle nord-est de l'enceinte et reposant sur la muraille romaine du IVe siècle, pour Philippe Hurepel, Comte de Boulogne. Rare exemple d'un château-fort ne possédant pas de donjon, il est entièrement dévoué à la défense. Avec cinq niveaux annulaires et neuf tours rondes réparties le long de sa courtine polygonale, l'édifice fut remanié à plusieurs reprises et utilisé à des fins non militaires comme une prison jusqu'en 1973. Louis Napoléon Bonaparte y fut enfermé après sa tentative avortée du coup d'Etat le 6 août 1840. Le château constitue l'ensemble fortifié médiéval le plus homogène et le mieux conservé de tout le nord de la France. Il a été acheté par la ville en 1984 et accueille aujourd'hui un musée . Éléments protégés MH : le château, l'enceinte de la Haute-Ville : inscription par arrêté du 10 juin 1926. L'ensemble des façades et des toitures ; le portail d'entrée ; le pont ; la salle basse dite La Barbière ; les fenêtres de la grande salle au dessus de la salle basse : classement par arrêté du 6 octobre 1977.","architecture":"AUMONT  à Boulogne sur Mer  La construction du château d'Aumont date du XIIIe, XVIe, XVIIIe et XIXe siècle. Aujourd'hui, devenu un château-musée,  comporte des collections variées : masques d'Alaska, cinquième collection mondiale d'antiquités égyptiennes (après le musée du Caire, le British Museum, le Louvre et le Musée des Antiquités égyptiennes de Turin), objets d'Afrique et d'Océanie, sculptures romaines et médiévales, tableaux de Georges Mathieu. Le visiteur découvre en même temps les fondations romaines de l'édifice ainsi que la salle de la Barbière (salle gothique voûtée d'ogives), la salle comtale et la chapelle. Les remparts sont inscrits avec le Château d'Aumont aux M.H. Le château d'Aumont est ouvert au Public et se visite. Il est inscrit aux M.H. le 10 juin 1926, et classé le 6/10/1977. Le château d'Aumont appartient à la commune de Boulogne-sur-Mer.                               LONQUETY à OUTREAU banlieu sud, tour d'un ancien château dont-il reste le donjon  crénelé.                                                                                                   Le manoir de SENLECQUES est un château bâti à Pernes-les-Boulogne.","habitants":"Famille de Philippe Hurepel\"","divers":"quatre châteaux dans cet article le fort de Boulogne grav  4 à 7, château de Lonquety grav-8, maoir de Senlecques et château d'Aumont.  grav 1 à 4                                        Aumont;  GPS : 50° 43' 32,41\" Nord, 1° 37' 1,84\" Est                                       Boulogne GPS : 50° 43' 32\" Nord, 1° 37' 01\" Est                                                      Lonquety GPS : 50° 42' 16\" Nord, 1° 35' 41\" Est","gps":"50° 43' 32,41\" Nord, 1° 37' 1,84\" Est","images":["../image/image_62/62_Boulogne_sur_Mer_1.jpg","../image/image_62/62_Boulogne_sur_Mer_2.jpg","../image/image_62/62_Boulogne_sur_Mer_3.jpg","../image/image_62/62_Boulogne_sur_Mer_4.jpg","../image/image_62/62_Boulogne_sur_Mer_5.jpg","../image/image_62/62_Boulogne_sur_Mer_6.jpg","../image/image_62/62_Boulogne_sur_Mer_7.jpg","../image/image_62/62_Boulogne_sur_Mer_8.jpg"]},"Consult_chateau_formulaire1f20":{"id":"Consult_chateau_formulaire1f20","dept":"62","canton":"Boulogne sur mer","commune":"Boulogne sur mer","nom":"Boulogne_sur_Mer_II","type":"Château-fort","periode":"XIII-XIX","histoire":"Trois châteaux dans cet article ; la porte des Degrès ,  de Cayolle et Bournonville à Conteville.                                                                                                        CHÂTEAU à BOULOGNE SUR MER; PORTE DES DEGRES La porte est construite entre 1227 et 1231, en même temps que le reste des fortifications sous l'impulsion de Philippe Hurepel de Clermont, alors comte de Boulogne. Construite à l'époque médiévale, elle est un des éléments défensifs des fortifications de Boulogne-sur-Mer. En 1587, le passage de porte ainsi que les corps de garde ont été obstrués par du Bernet, car la porte était devenue un point faible, du fait du développement de l'artillerie, et que l'ensemble avait subi un incendie lors d'assauts contre les remparts. Ces éléments sont finalement déblayés, en 1895, et rendus à la circulation. La Porte des Degrès est la propriété de la commune de Boulogne-sur-Mer, elle suit un plan de type philippien : deux tours massives en plan en U en saillie sur la muraille entourent un passage de porte. Les tours sont percées d'archères et certaines ont été transformées en canonnières, à une époque inconnue. Le passage de la Porte des Degrès est vouté en berceau et paré de briques, possible remaniement au XVIe siècle. A l'origine, les plafonds étaient en bois et la Porte des Degrès était précédé d'un pont-levis, à une seule chaîne et muni d'une herse, a été classée aux M.H. le 21.06.1905.","architecture":"La Porte CAYOLLE appartient à la commune de Boulogne-sur-Mer. La façade des 2 tours qui forment la porte, à l'exclusion des locaux intérieurs, a été classée aux M.H. le 21.06.1905, modifié par arrêté le 15.11.1905.                                                                                                             BOURNONVILLE à Conteville les Boulogne, le corps central du logis a été construit en 1783 pour Charles Robert de Bournonville. Les ailes ont été ajoutées au XIXe siècle, après 1813 (date du plan cadastral, sur lequel elles n'apparaissent pas). La façade antérieure  en tuiles plates, sans doute à la fin du XIXe siècle ou au début du XXe siècle. Le auvent situé devant la porte d'entrée date de la même époque. La remise, dont il ne subsiste que la partie ouest apparaît sur le plan cadastral de 1813, elle est sans doute contemporaine du corps central du logis.","habitants":"Philippe Hurepel de Clermont\"","divers":"Trois châteaux dans cet article ; les portes de Degrè grav-2,  et Bournonville grav-9 à Conteville.   Porte   GPS : 50° 43' 26\" Nord, 1° 36' 44\" Est","gps":"50° 43' 26\" Nord, 1° 36' 44\" Est","images":["../image/image_62/62_Boulogne_sur_Mer_II_1.jpg","../image/image_62/62_Boulogne_sur_Mer_II_2.jpg","../image/image_62/62_Boulogne_sur_Mer_II_3.jpg","../image/image_62/62_Boulogne_sur_Mer_II_4.jpg","../image/image_62/62_Boulogne_sur_Mer_II_5.jpg","../image/image_62/62_Boulogne_sur_Mer_II_6.jpg","../image/image_62/62_Boulogne_sur_Mer_II_7.jpg","../image/image_62/62_Boulogne_sur_Mer_II_8.jpg","../image/image_62/62_Boulogne_sur_Mer_II_9.jpg"]},"Consult_chateau_formulaire95ee":{"id":"Consult_chateau_formulaire95ee","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Bours","nom":"Bours","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux dans cet article de Bours le donjon.                                           BOURS dit le donjon,  c'est entre le XIe et le XIVe que ce château-donjon pris la forme actuelle. Hugues de Bours en fut l'initiateur. L'édifice était à l'origine entouré par un étang, remplacé par des pâturages. Il fut incendié en 1543 et plusieurs fois restauré. La commune est devenue propriétaire du château de Bours. Il est classé aux M.H. depuis 1965. Dans ces murs se trouve la Mairie de Bours.","architecture":"BOURS, il date du XIVe siècle. Il est de type Maison Forte.  Deux étages se superposent. Il s'agit de pièces rectangulaires harmonieuses prolongées par de petits cabinets aménagés dans les tourelles. Quatre de ces tours sont en très fortes saillies et deux autres moins volumineuses. On ne trouve pas de mâchicoulis qui témoignent d'habitude de l'ancienneté de ces édifices. Au deuxième étage subsiste une splendide cheminée du XVIIe siècle. Ce monument, bâti en un temps où l'artillerie n'existait pas, était plus une défense contre d'éventuels pillards plutôt qu'une stratégie militaire contre les assauts des nombreux ennemis traversant le pays. Son originalité tient aux 6 tourelles en encorbellement qui flanquent le corps principal carré de la tour. Les murs, en particulier ceux des tourelles, sont si minces qu'ils sont en réalité incapables de résister à un siège en règle.","habitants":"Famille de Hugues de Bours\"","divers":"Deux châteaux dans cet article Bours le donjon grav-2 à 5  et Brias grav-1.  50° 24' 24? N, 2° 22' 46? E                                                          Bours grav-2 à 5 GPS : 50° 27' 14\" Nord, 2° 24' 38\" Est","gps":"50° 27' 14\" Nord, 2° 24' 38\" Est","images":["../image/image_62/62_Bours_1.jpg","../image/image_62/62_Bours_2.jpg","../image/image_62/62_Bours_3.jpg","../image/image_62/62_Bours_4.jpg","../image/image_62/62_Bours_5.jpg"]},"Consult_chateau_formulairef852":{"id":"Consult_chateau_formulairef852","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Boyaval","nom":"Boyaval","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article ; Boyaval et Chelers.                             BOYAVAL, a été construit en bordure d'un vaste parc qui s'étage jusqu'au milieu du coteau. En avant de sa façade principale s'étend une prairie, longée par le chemin d'accès; une grille d'entrée relie vers l'arrière son aile droite à une tourelle carrée coiffée d'une pyramide qui appartient à une ferme dont les bâtiments font retour vers l'extérieur. Il serait un ancien pavillon de chasse qui aurait été considérablement agrandi et embelli vers 1871.                                                                                              CHELERS, pendant la première guerre mondiale, la commune étant en arrière du front de l'Artois, des troupes relevées du front sont présentes, comme le 28 mai 1915, où des soldats passent une journée au hameau de Herlin le Vert.","architecture":"BOYAVAL, dans son état actuel, il comprend un corps principal de logis flanqué de deux ailes faisant saillie du côté de la façade regardant vers l'église, mais établies au contraire en retrait de l'autre côté. L'ensemble de ces bâtiments présente une élévation à deux niveaux, mais les différences de matériaux utilisés indiquent clairement que la construction n'est pas homogène. Du côté de l'église, il est réalisé en pierre blanche sur un soubassement de grès. Seules les toitures d'ardoises apportent un peu de pittoresque à cette façade; celle du corps de logis à la Mansart, celles des ailes ont été établies perpendiculairement à l'axe principal de la construction.","habitants":"Seigneurs locaux\"","divers":"Chelers grav-2                                  50° 22' 35? nord, 2° 29' 10? est","gps":"","images":["../image/image_62/62_Boyaval_1.jpg","../image/image_62/62_Boyaval_2.jpg"]},"Consult_chateau_formulaireefaa":{"id":"Consult_chateau_formulaireefaa","dept":"62","canton":"Bruay-la-Buissière","commune":"Bruay la Buissière","nom":"Bruay_la_Buissière","type":"Vestiges","periode":"XIII-XVIII","histoire":"Deux châteaux dans cet article, la Buissière et Ballencourt.                          La BUISSIERE  Les premières traces du château datent du XIIIe et XVIIIe siècle. C'était une demeure de plaisance, qui fut notamment l'une des résidences secondaires de la comtesse Mahaut d'Artois au XIVe siècle. Au XVe siècle, le château est renforcé: il se compose d'une enceinte ceignant 200 arpents de forêt, et d'un donjon rectangulaire imposant. En 1662, le propriétaire du château de la Buissière vendit, les grès ruinés du château, à Louis XIV, pour la construction de Menin. Le château de la Buissière fut transformé au XVIIIe siècle, en demeure de plaisance, par Ange de Maulde, Marquis de La Buissière. Autour du donjon restauré, il fit construire un logis en équerre. Le bâtiment est resté dans la famille de Maulde, jusqu'en 1844, puis passa dans celle de Riencourt. Lors du décès de la dernière comtesse de Riencourt en 1910, le château de la Buissière retomba, une nouvelle fois, en ruine. La compagnie des Houillères le racheta, en 1917, mais revendit le château de la Buissière, en 1964, au ministère de la Justice, qui décida de le faire démolir, en 1970. Il ne reste du château que le donjon à demi-ruiné, classé in extremis aux Monuments Historiques. Le donjon du château de La Buissière est construit en 1310 par la comtesse Mahaut d'Artois. Le donjon, les façades et toitures des communs font lobjet dune inscription aux M.H. depuis le 12/04/1965.","architecture":"BALLENCOURT  a été construit en 1777. Partiellement rénové, le Manoir de Ballencourt accueille depuis, dans ses murs, l'Ecole de Musique,   Il y a aussi à découvrir, sur la commune de La Buissière, Le donjon, les façades et toitures des communs sont inscrits aux M.H. depuis le 12.04.1965.","habitants":"comtesse Mahaut d'Artois.                       famille de Maulde\"","divers":"Deux châteaux dans cet article, la Buissière  grav-1 et Ballencourt grav-2.                                                        GPS : 50° 28' 55\" Nord, 2° 32' 55\" Est                                                                     Buissière GPS : 50° 29' 31,92\" Nord, 2° 33' 34,92\" Est","gps":"50° 28' 55\" Nord, 2° 32' 55\" Est","images":["../image/image_62/62_Bruay_la_Buissi%c3%a8re_1.jpg","../image/image_62/62_Bruay_la_Buissi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire7e98":{"id":"Consult_chateau_formulaire7e98","dept":"62","canton":"Auxi-le-Château","commune":"Azincourt","nom":"Bucamps","type":"Châteaux","periode":"XVII","histoire":"BUCAMPS, la famille de contes d'Esgranges est mentionnée à Bucamps au XVIe siècle. C'est Charles François Joseph, écuyer, seigneur de Bucamps et de Blingel qui avait épousé en 1697 Gertrude de Harchies, née à Plumaison en 1660 et morte à Hesdin en 1743, qui a dû faire construire ce château au cours du second quart du XVIIIe siècle: les écus ovales de Contes et de Harchies, accostés sous couronne de comte, figurent en effet sur le balcon en fer forgé qui précède la fenêtre centrale de chacune des deux façades de cette demeure. Les communs ont dû être construits peu après puisque sur les hangars figure la date de 17S9. Le château appartenait au XIXe siècle à la marquise de la Fougère, puis à la famille Blondel de Beauregard, il appartient au vicomte de Chabot Tramecourt depuis 1956.","architecture":"BUCAMPS, le château est constitué d'un long corps de logis simple en profondeur présentant sur chacune de ses façades principales un étroit avant-corps médian, couronné par un petit fronton triangulaire et deux pavillons d'aile légèrement saillants. L'édifice a été réalisé en brique, la pierre étant réservée au cordon séparant le rez-de-chaussée de l'étage, aux angles des pavillons et aux encadrements des fenêtres à peine cintrées. De part et d'autre de la cour d'honneur, bien au delà de la grille d'entrée, se dressent les communs, trois grandes arcades en plein cintre s'ouvrent en leur milieu. Un pigeonnier quadrangulaire les précède à gauche.","habitants":"Famille de Charles François Joseph\"","divers":"château de Bucamp à Azincourt","gps":"","images":["../image/image_62/62_Bucamps_1.jpg","../image/image_62/62_Bucamps_2.jpg"]},"Consult_chateau_formulaire4a53":{"id":"Consult_chateau_formulaire4a53","dept":"62","canton":"Auxi-le-Château","commune":"Buire le sec","nom":"Buire_le_Sec","type":"Châteaux","periode":"XVII","histoire":"deux châteaux dans cet article; Frémicourt et Romont à  Buire le sec.                               FREMICOURT en Romont  Par le mariage en 1600 de Barbe Wlart avec Jean Sablet, seigneur de la Hunière, la terre de Frémicourt passa dans cette famille. Peu après 1776, elle fut achetée par celle des Vicomtes de Merlimont. Dominique Le Noir, alors propriétaire, accola au bâtiment du XVIIe siècle une nouvelle construction. Pendant la Révolution, la depeure fut vendue comme bien national à Claude Antoine Pecquet de Montreuil, ce n'est qu'après la Seconde Guerre mondiale que le Vicomte de Calonne réussit à réunir, pour quelques années seulement, Frémicourt à Romont. Mais en 1822, toute une aile du château, celle du XVIIe siècle, avait été abattue. Dans son aspect actuel le château de Frémicourt est un bâtiment du XVIIIe siècle, de plan rectangulaire à deux niveaux montés sur un haut soubassement et couvert par une toiture en croupe. Long de cinq travées, sa porte d'entrée occupe celle de gauche, le perron qui l'a précédée a disparu. Les fenêtres sont encadrées de pierre lisse, elles sont de forme légèrement cintrée et de dimensions assez importantes. La façade arrière reflète lamentablement les destructions du début du XXe siècle et en 1922 on a détruit la chapelle castrale qui servait d'église paroisssiale. Château situé en milieu rural, au voisinage du château de Romont, en arrière d'une avenue, au milieu des arbres, sa façade est visible.","architecture":"ROMONT à Buire le sec   La seigneurie de Romont a appartenu successivement à l'abbaye de Longvilliers, aux seigneurs de Maintenay, aux Wiart d'Estrée; ces derniers l'ont possédée de 1580 à 1770. Elle fut acquise à cette date par Dominique le Noir, vicomte de Montreuil. Celui-ci ayant émigré, son domaine fut vendu comme bien national, mais demeura dans sa famille. En 1830, il fut acquis par les vicomtes de Merlimont et en 1861 par ceux de Calonne. Le château actuel a été construit au XVIIe siècle; un incendie l'a dévasté le 8 avril 1931, il fut restauré au cours des années suivantes. Au corps de logis, un long bâtiment à deux niveaux sous toiture à double versant, s'accrochent deux tourelles hexagonales; deux ailes un peu plus basses le prolongent. Ce bâtiment a été réalisé en pierre, mais la brique a été utilisée pour les encadrements des baies et les chaînages des tourelles qui sont plus hautes d'un étage que le corps principal de logis et que coiffent des pyramides d'ardoises ; ces tourelles portent des armoiries et elles présentent également des meurtrières. La façade principale, qui s'élève en arrière d'une cour limitée par une grille, est dissymétrique: deux portes à double battant y ont été percées. A l'intérieur, une pièce a conservé une belle voûte en pierre et brique du XVIIe siècle. De chaque côté de la cour, des bâtiments de la ferme et en arrière de ceux de droite, dans une prairie se dresse un pigeonnier.","habitants":"Famille de Dominique Le Noir\"","divers":"deux châteaux dans cet article; Frémicourt  grav 1 et Romont grav-2  à  Buire le sec.","gps":"","images":["../image/image_62/62_Buire_le_Sec_1.jpg","../image/image_62/62_Buire_le_Sec_2.jpg"]},"Consult_chateau_formulairec2d8":{"id":"Consult_chateau_formulairec2d8","dept":"62","canton":"Lillers","commune":"Busnes","nom":"Busnes","type":"Châteaux","periode":"XVII","histoire":"trois châteaux dans cet article; Busnes; le Quesnoy et Beaulieu. QUESNOY, le château médiéval de Busnes était une belle construction de plan rectangulaire. Un portail sous un arc en plein cintre donnait accès à sa cour; en son centre s'élevait un pigeonnier carré. Un pont dormant en bois et un pont-levis précédaient l'édifice dont la porte d'entrée était percée à la base du donjon de plan polygonal; les trois niveaux supérieurs de celui-ci étaient éclairés par des fenêtres jumelées de petite taille. Le corps de bâtiment s'adossait à droite, ses trois travées étaient limitées par des contreforts, des arcades ou des mâchicoulis sur arcs étaient bandés entre deux d'entre eux; fenêttes à meneaux; le pignon libre était à pas-de-moineaux et à son angle externe s'élevait une tourelle coiffée d'une poivrière. Une courtine prolongeait à gauche l'arrière du donjon, en son centre s'élevait une autre tourelle très svelte. Au début du XVIIe siècle, un nouveau château en brique et pierre a été édifié par Claude de Croy, comte de Roeulx; en 1677, il fut adjugé par décision de justice au sieur de la Haye; puis il passa à la contesse de Puységur née Cochet de Busnes. Le  château du Quesnoy a été détruit par un incendie en 1898. La chapelle, construite au XVIIIe siècle, est le seul bâtiment qui subsiste du château du Quesnoy. Cette chapelle fut  bâtie sous Louis Gabriel Cochet de Corbeaumont, seigneur des lieux et Maire de Busnes.","architecture":"BEAULIEU, à Busnes le château de Beaulieu devenu hôtel  Mr Christophe Dufossé. Retour aux sources pour Delphine et Christophe Dufossé ! Après des années passées à La Citadelle, à Metz, les voilà qui relèvent un nouveau challenge, à Busnes, heureux d'avoir enfin trouvé le lieu de leurs rêves, sur le sol de leurs origines, dans ce château édifié au XVIIe siècle. Cette ancienne gentilhommière, construite dans un parc paysager dun hectare, par Jacques Le Jay, seigneur de Massuère, est le nouveau spot du chef doublement étoilé. Il peut enfin y déployer son talent sur toutes les facettes de ses métiers de cuisinier et d'hôtelier, avec la transmission comme leitmotiv. Dans cet écrin, qui porte le label des Relais & Châteaux, il propose non seulement des chambres et des suites aux prestations de très grand standing, 5 étoiles oblige, mais aussi 2 restaurants aux offres différentes.","habitants":"Beaulieu Mr Christophe Dufossé\"","divers":"trois châteaux dans cet article de Busnes; le Quesnoy grav 1-2 et Beaulieu-grav-3-à-6.  GPS : 50° 35' 19\" Nord, 2° 31' 09\" Est","gps":"50° 35' 19\" Nord, 2° 31' 09\" Est","images":["../image/image_62/62_Busnes_1.jpg","../image/image_62/62_Busnes_2.jpg","../image/image_62/62_Busnes_3.jpg","../image/image_62/62_Busnes_4.jpg","../image/image_62/62_Busnes_5.jpg","../image/image_62/62_Busnes_6.jpg"]},"Consult_chateau_formulaire3b5e":{"id":"Consult_chateau_formulaire3b5e","dept":"62","canton":"Bethune-Beuvry","commune":"Beuvry_Béthune","nom":"Béthune_Beuvry","type":"Château","periode":"XVIII","histoire":"quatre châteaux dans cet article : Estraselle, Belleforière, Bellenvillle et Vadanourt et Vaudricourt.                                                                              ESTRASELLE,  Le Manoir a été cédé à l'Agglomération par lAssociation des Amis du Musée, en 2010. Restauré et aménagé, il est destiné à accueillir le service archéologique communautaire. Le Manoir de l'Estrasselle est inscrit partiellement aux M.H. pour ses façades et toitures depuis le 18/04/1966. Il existe aussi sur la commune, le Manoir de l'Estrasselle (Ferme),                                                                                                               BELLENVILLE,  se situe sur un domaine de 62 Ha, sur 2 communes : Beuvry et Sailly-la-Bourse. Il fut bâti au XVIIIe siècle pour Pierre Lerique. Il existe aussi sur la commune à découvrir, le château-Ferme de la Belle Forière qui sont inscrits aux M.H. depuis 1966.                                 HALLOY  à Vaudricourt, Jeanne de Halloy, vivant en 1236, était l'épouse d'Ansel de Tramecourt, dit Tranchant, Chevalier, seigneur de Tramecourt. Maximilien de Gosson, Seigneur de Halloy, mort au siège de Bergues-Saint-Winoc, Lieutenant de la Compagnie d'hommes d'armes du Duc d'Arschot. Maximilien était le fils de François Gosson, Chevalier, Capitaine de 200 chevaux et commis, par la reine de Hongrie (Marie de Hongrie (1505-1558), au gouvernement de la ville de Lille, pendant l'absence du Seigneur de Courrières, alors en ambassade, en Angleterre. François de Gosson était le fils de Philippe de Gosson, Chevalier et de Charlotte de Ghistelle et frère de Catherine de Gosson, épouse de Michel de Pressy.                                                                                                       VADANCOURT Guy Félix de Pardieu, comte, seigneur de Vadancourt, de Bray Saint Christophe et Bracheux fit partie de la liste des États généraux de 1789, tandis que la ville de Saint-Quentin était représentée par l'abbé Marolles.","architecture":"BELLEFORIERE, date du 1306 et 1698. A l'origine, le manoir était une ferme fortifiée entourée de douves. La Ferme de la Belleforière fut reconstruite en 1698. C'était alors une ferme basse dont le pigeonnier servait d'observatoire et faisait partie d'une ligne de défense visant à protéger Béthune. L'ensemble est construit en briques sur un soubassement de grès. Sur la gauche, la partie habitation a été reconstruite après la première guerre mondiale. La partie droite correspond à une porcherie installée dans la seconde moitié du XXe siècle. Une tour quadrangulaire marque la jonction avec la façade sud. La tour qui lui faisait pendant à l'angle sud-est a été détruite au cours de la Première guerre mondiale. Le Château-Ferme de la Belleforière est inscrit aux M.H. depuis le 3/08/2007.      \nBETHUNE, Le monument est classé aux Monument Historique en 18621. Il fait partie des 23 beffrois classés au patrimoine mondial de l'UNESCO en 2005,                                                                          VADANCOURT, le château dit d'Halloy d'origine a été construit en surplomb de la rivière ; à l'origine il comportait une terrasse avec un impres
