sionnant escalier à balustres. Il était composé d'un haut pavillon de trois niveaux avec balcon côté parc, et à l'arrière une aile se raccordant au logis. Celui-ci présentait un avant-corps central d'une travée, avec une porte cintrée au rez-de-chaussée, un balcon ouvrant sur la fenêtre du premier étage, le tout surmonté d'un attique couronné d'un fronton courbe percé d'un oculus.  \nUn nouveau château, respectant l'architecture d'origine, fut reconstruit sur son emplacement en 1927.","habitants":"seigneur. Maximilien de Gosson\"","divers":"quatre châteaux dans cet article : Estraselle grav-1, Belleforière-grav-5 et Bellenvillle grav-6.                           Bellenville  GPS : 50° 31' 14\" Nord, 2° 40' 49\" Est                                                                    Belleforiere  GPS : 50° 31' 14\" Nord, 2° 40' 49\" Est                                          Halloy .GPS : 50° 30' 09\" Nord, 2° 37' 33\" Est                                             Valincourt-grav-2-3, Vaudricourt-grav-8                                                Bethune grav -7","gps":"50° 31' 14\" Nord, 2° 40' 49\" Est","images":["../image/image_62/62_B%c3%a9thune_Beuvry_1.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_2.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_3.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_4.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_5.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_6.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_7.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_8.jpg","../image/image_62/62_B%c3%a9thune_Beuvry_9.jpg"]},"Consult_chateau_formulaire4ce9":{"id":"Consult_chateau_formulaire4ce9","dept":"62","canton":"Calais","commune":"Calais","nom":"Calais","type":"Beffroi","periode":"XVII-XIX","histoire":"CALAIS, la ville fut sous domination anglaise pendant 210 ans. Cette domination débuta en 1347 par le douloureux et glorieux épisode de la reddition des 6 Bourgeois de Calais, venus pieds nus et corde au cou, livrer les clés de la Ville à Edouard III. Episode qui fait entrer Calais dans lhistoire et immortalisé par le bronze dAuguste Rodin en 1895. Cest en 1558 que le Duc François De Guise reprend Calais aux Anglais, mais la ville ne sera  rattachée au royaume de France quen 1598 après une courte domination espagnole de 2 ans. Calais entre à nouveau dans la grande histoire en accueillant en avril 1814 Louis XVIII de retour dexil dAngleterre qui rentre en France pour occuper le trône des Bourbons. Ce retour marque un nouvel essor maritime, notamment pour le trafic des voyageurs entre Calais et Douvres. Cette ligne devient en 1821, la première du continent à être desservie par un paquebot à vapeur.\nLe XIXe siècle verra à nouveau une invasion anglaise,  pacifique celle-ci - et profitable au développement de Calais, avec larrivée douvriers et de leurs métiers \"à tulle\" venus en fraude de Nottingham. Ils ont fait de Calais la capitale mondiale de la dentelle Leavers, place quelle occupe encore aujourdhui, malgré la crise des années 70. Première ville du département depuis sa fusion, en 1885 avec la commune de St Pierre, Calais est aujourdhui une ville portuaire de première importance : deuxième port mondial de voyageurs, quatrième port de commerce de France.  Louverture du Tunnel sous la Manche en 1994, larrivée de lEurostar et des autoroutes A16 et A26 font de Calais la capitale du Transmanche, porte de France et de lEurope continentale.\nMalgré des destructions importantes pendant les 2 guerres mondiales (la ville fut détruite à 90% lors de la seconde), la cité peut se vanter aujourdhui de posséder des monuments exceptionnels.","architecture":"CALAIS, Beffroi de l'hôtel de Ville,  salle des mariages et les magnifiques vitraux, est classé au Patrimoine Mondial de l'Unesco. Une rénovation de grande ampleur a été faite sur la bâtisse, afin de la rendre accessible au public.  La Tour du guet est une tour médiévale datant du XIIème siècle. Elle est l'un des rares bâtiments qui a résisté aux guerres et aux épreuves du temps. Elle est le plus vieux monument de Calais. Cette tour servait à la défense de la ville (d'où son nom). La tour abrita des guetteurs jusqu'à 1905. En temps de guerre, ils surveillaient les côtes et le mouvement des troupes. Ensuite elle servit de phare, puis de liaison téléphonique. En 1931, la tour est classée monument historique.\nVauban a transformé Calais en une cité imprenable ! Le fort Nieulay, la Citadelle, le Fort Risban, le grand théâtre à litalienne est un joyau, dont le plafond a été peint par Delacroix. \nCe théâtre est plein d'histoire. Il a été réquisitionné pendant la guerre par les allemands qui y organisaient des bals.","habitants":"\"","divers":"Calais hôtel de ville grav 3                Grand  Théatre-grav -1 rempart grav-2                                             gps  Calais 50° 57' 27? N, 1° 50' 35? E","gps":"","images":["../image/image_62/62_Calais_1.jpg","../image/image_62/62_Calais_2.jpg","../image/image_62/62_Calais_3.jpg"]},"Consult_chateau_formulairea127":{"id":"Consult_chateau_formulairea127","dept":"62","canton":"Boulogne-sur-Mer","commune":"St-Martin de Boulogne","nom":"Caucherie","type":"Château","periode":"XVII","histoire":"CAUCHERIE  à l'origine, La Caucherie n'était pas une terre seigneuriale, mais une ferme nommée La Guillebeudrie. En 1550, celle-ci était tenue à cens de l'abbaye Notre-Dame de Boulogne par Engrand Beaufilz. La maison ayant été détruite par les Anglais, Beaufilz remit la terre aux mains de l'abbé. La Guillebeudrie passa alors entre diverses mains dont celles de François Hibon, échevin de la ville de Boulogne. Ce serait le duc d'Aumont, gouverneur du Boulonnais, qui lui aurait donné le nom \"la Caucherie\". En 1677, la propriété revint à son troisième fils. Jacques Abot de Bazinghen, seigneurie qu'il avait acquise et dont il prit le nom. Celui-ci fut procureur du roi en la maîtrise des eaux et forêts du Boulonnais. Il transforma la demeure héritée de son père en lui adjoignant un corps de logis à étage et une chapelle à dôme faisait aile de retour sur la cour, elle comportait une sacristie et une tribune. En 1705, les travaux débutèrent mais ils n'étaient pas finis en 1716, date de la mort de Jacques Abot. Auparavant, celui-ci avait voulu se faire aménager un jardin à la française. En 1698 au cours d'un voyage à Paris, il s'était entretenu de son projet avec André Le Nôtre, dans ses plans, le paysagiste dut tenir compte de ce qui avait déjà été réalisé : En 1716, la propriété revint au neveu de Jacques Abot, François Abot de Bourgneuf. Celui-ci fut inspecteur des troupes boulonnaises; en 1705, il avait épousé sa cousine Marie Gabrielle Le Roy de Lozembrune. Il poursuivit la construction du château, mais ayant perdu cent mille livres dans une banqueroute, il fut obligé en 1720 de le louer à divers locataires. En 1898, la propriété a été rachetée par Robert de Rosny, père du baron Jean de Rosny, polytechnicien et ancien officier, l'actuel propriétaire son petit fils François, habite la Caucherie et en héritera.","architecture":"CAUCHERIE en dépit de son aspect général, ce château est une uvre qui a été réalisée au XIXe siècle. La grande unité de l'ensemble en fournit la preuve ; les baux de location du XVIIIe siècle ne peuvent s'appliquer à cette demeure. On remarque également que les armoiries supportées par deux lions qui figurent au fronton du côté cour ne sont pas celles des Abot, mais celles de l'amiral Vattier, colonel des marins de la Garde Impériale, L'édifice comprend un long corps de logis que prolongent à chacune de ses extrémités deux ailes saillantes tant du côté cour que du côté jardin, mais c'est le jardin qui donne à ce château tout son intérêt. Il est incontestable que même si l'âge puis la mort l'ont empêché de venir sur place, André Le Nôtre a fourni des plans, des idées pour sa réalisation. Le jardin comprend une partie haute qui s'étend en longueur en face du château et une partie basse latérale qui forme un rectangle situé à 5 m en contrebas de la première. Le jardin d'en haut est dominé par la terrasse du château qui était ornée de vases en faïence. L'allée médiane mène à un grand bassin cylindrique doté d'un jet d'eau. Au delà du bassin règne une seconde terrasse qui domine un deuxième niveau de jardin. Si le jardin d'en bas a perdu ses dispositions originelles, celui d'en haut a conservé l'essentiel des siennes. Des pelouses ont remplacé les broderies ; les ifs taillés en figures, les murailles ont disparu. La terrasse du fond, ses deux tourelles, la cascade ont fait place à deux obélisques de marbre portant l'emblème du Roi Soleil.","habitants":"Famille de Jacques Abot de Bazinghen\"","divers":"Château de la Caucherie à St-Martin de Boulogne","gps":"","images":["../image/image_62/62_Caucherie_1.jpg"]},"Consult_chateau_formulaire0042":{"id":"Consult_chateau_formulaire0042","dept":"62","canton":"Avesnes-le-Comte","commune":"Berlancourt le Cauroy","nom":"Cauroy","type":"Château","periode":"XVII","histoire":"CAUROY, c'est en 1671 qu'Antoine de Beauffort a acheté le Cauroy, demeuré dans cette famille jusqu'à la fin du XIXe siècle, elle n'avait pas émigré sous la Révolution et par conséquent, le château n'a pas été confisqué ni vendu comme bien national. En 1872, par le mariage de Geneviève de Beauffort avec le comte Christian de Kergolay, il est passé dans cette famille. Il appartient aujourd'hui à la comtesse de Waziers.","architecture":"CAUROY, il forme un ensemble imposant de constructions relevant de campagnes différentes, il ferme le fond de la cour entourée de chaque côté par d'imposants communs ; ceux-ci masquent de ce côté deux ailes basses destinées au service. La partie la plus ancienne doit appartenir à la fin du XVIIe siècle, vers 1680-1685 ; dès l'aube du XVIIIe siècle, elle fut remaniée; à cette époque, il comprenait un corps de logis simple en profondeur que prolongeaient deux ailes latérales faisant retour sur la cour; au-delà de celles-ci, deux ailes plus basses abritaient les services. L'ensemble avait été réalisé en pierre traitée en bossages continus. A la fin du XVIIIe siècle, du côté de la cour, dans la partie intermédiaire séparant les deux ailes saillantes, deux galeries superposées ont été aménagées; en avant de leurs trois travées médianes, on a construit un péristyle monumental constitué de quatre colonnes ioniques, celles-ci encadrent au rez-de-chaussée la porte et deux fenêtres.   Éléments protégés MH : les façades et les toitures du château et des communs, les drèves arborées d'accès, la grille d'entrée, l'ancien jardin potager dans ses murs, et le parc : inscription par arrêté du 24 août 2007.","habitants":"Antoine de Beauffort \"","divers":"Château de Cauroy à Berlancourt le Cauroy","gps":"","images":["../image/image_62/62_Cauroy_1.jpg","../image/image_62/62_Cauroy_2.jpg"]},"Consult_chateau_formulairee200":{"id":"Consult_chateau_formulairee200","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Frévent","nom":"Cercamp","type":"Château","periode":"XVII","histoire":"CERCAMP, les bâtiments existants d'une ancienne abbaye, qui ont été construits entre 1746 et 1770 par Raoul Coignart, qui travailla aussi à l'abbaye de Valloires, faisaient parti de l'abbaye de Cercamp fondée en 1137 par Hugues II Candavène, comte de saint Pol. A l'intérieur des boiseries sculptées par le baron de Pfaffenhofen  et qui transforma les bâtiments en château vers 1823. Au cours de lété 1915, le château abrite létat-major du général Foch qui y reçoit le roi George V, Alexandre Millerand, ministre de la guerre, les généraux Joffre et French et le président Poincaré. Légué à lAssistance Publique de la Seine, le domaine est affecté à des établissements liés à la santé ou à lenseignement.","architecture":"CERCAMP, vendu en 2012, il est désormais ouvert au public. Précédé d'une longue allée, le pavillon porche qui donne accès à la cour d'honneur, est à lui seul un monument. Le château de Cercamp développe une superbe façade de 19 travées, puissante et majestueuse. Il fera l'objet d'un programme de restauration et de rénovation étalé sur plusieurs années. \nÉléments protégés MH : l'intérieur de la Porterie ; l'intérieur du bâtiment des hôtes ou des étrangers (sauf salles classées) ; tous les bâtiments annexes ; le parc : inscription par arrêté du 16 septembre 1946. Les façades, les toitures et les salles du rez-de-chaussée avec leurs boiseries et cheminées du bâtiment des hôtes ; les façades et les toitures de la Porterie : classement par décret du 15 avril 1947.","habitants":"famille du  général Foch\"","divers":"A Frévent château de Cercamp  GPS : 50° 16' 38\" Nord, 2° 17' 20\" Est","gps":"50° 16' 38\" Nord, 2° 17' 20\" Est","images":["../image/image_62/62_Cercamp_1.jpg"]},"Consult_chateau_formulairebced":{"id":"Consult_chateau_formulairebced","dept":"62","canton":"Berck","commune":"Champigneul les Grandes","nom":"Champigneul_Grandes","type":"Château","periode":"XVII","histoire":"CHAMPIGNEUL  LES  GRANDES Comme l'indiquent les ancres de la façade, c'est en 1655 qu'a été érigée la construction actuelle par Jacques Wlart, baron d'uf, et Charlotte du Bosquel. Au XVIIIe siècle, par alliance, le château est passé aux Testart, puis aux Gosson. Confisqué sous la Terreur, il a été vendu comme bien national. Il a appartenu au XIXe siècle. au colonel Menu du Menil, puis au baron de Wilmarest qui l'a cédé en 1850 à Gustave de Fougeroux de Campigneulles. Entouré par un mur d'enceinte entourant la propriété, ce château peut être qualifié de demeure ouverte.","architecture":"CHAMPIGNEUL  LES  GRANDES,  Il comprend un corps de logis, dépourvu de fronton, exempt de toute décoration et couvert d'un toit à deux pentes. Ce corps de logis est accosté de pavillons carrés, ces ailes sont couvertes de toitures en croupe et présentent trois niveaux de fenêtres, elles sont donc plus élevées que le bâtiment principal réduit à un étage sur rez-de-chaussée. Malgré la présence de meurtrières, bouchées par la suite, et la prédominance des pleins sur les vides, ce château édifié en pierre du pays, est assez agréable. A la différence de nombreux châteaux, il ne possède pas d'entrée axiale, celle-ci étant décalée légèrement vers l'est. A l'intérieur, le vestibule donne accès à l'escalier à paliers; de part et d'autre, selon un dispositif courant, on trouve le salon et la salle a manger.","habitants":"Famille de Charlotte du Bosquel\"","divers":"Château de Champigneul les Grandes","gps":"","images":["../image/image_62/62_Champigneul_G_1.jpg"]},"Consult_chateau_formulaireee6e":{"id":"Consult_chateau_formulaireee6e","dept":"62","canton":"Auxi le château","commune":"St-Sauveur","nom":"Chocques","type":"châteaux","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Chocques et Alincourt.                          CHOQUES St-Sauveur, cet été, nous allons à la découverte des hôtels de ville remarquables du Béthunois-Bruaysis. Aujourdhui, deux historiens amateurs locaux, Jean-Claude et Magali Messéant nous content la destinée du château Saint-Sauveur de Chocques, inauguré hôtel de ville en 1995.  Jean-Claude et Magali Messéant, de lassociation « Chocques dhier à demain » détaillent litinérance de la mairie dans le bourg : « en 1793, les séances du conseil municipal deviennent publiques. Pour accueillir les citoyens, la commune récupère la maison du vicaire laissé vacante et charge linstituteur de létat civil. La construction dune mairie-école, réalisée en 1834, réserve une pièce pour le greffe municipal et les réunions de conseils. En 1883, la mairie est transférée dans lécole de garçons devenue aujourdhui la maison des associations. La municipalité achète, en 1926, la maison Boudry, rue des Galteries pour installer sa mairie .                                                                                                               ALINCOURT,  a Allouange à quelques K.M. à l'ouest de Chocques le château d'Alincourt est l'ancienne demeure de la famille Delorne d'Alincourt, dont deux membres furent maires du village d'Allouagne. Le château d'Alincourt est un château médiéval, sa construction date du XVIe siècle. Il a été racheté en janvier 2009 par Alain Duménil. L'ancien propriétaire ayant loué le parc, 80 familles y habitaient. Elles furent forcées de quitter les lieux. Le château a été classé aux M.H. depuis le 1/02/1944, il abrite, aujourd'hui, dans ses murs, la mairie d'Allouagne, il a été classé aux M.H. en 1944.","architecture":"CHOCQUES, leurs recherches retracent aussi lhistoire du château : « construit au XIXe  siècle, il appartient, jusquen 1854, à M. Brunit, capitaine en retraite, puis devient la propriété du Marquis Emmanuel de Bassecourt, détenteur du château du Perroy, aujourdhui Institution Saint-Dominique à Béthune. Dautres propriétaires suivront jusquau début du XXe  siècle, jusquau rachat par M. et Mme Charles Filliette-Léturgie. Depuis, les Chocquois utilisent le patronyme Filliette pour nommer le château.  Dès mai 1940, larmée allemande le réquisitionne en partie: « du 15 juin au 31 août 1944, 200 hommes de lorganisation Todt (groupe de génie civil et militaire du troisième Reich) prennent possession des lieux jusquà larrivée des alliés ». En janvier 1945, la CRS 15 sinstalle quelques mois jusquà la restitution des propriétés réquisitionnées : « la mairie acquiert, en 1947, le château et le terrain attenant à Joseph Filliette. Le maire de lépoque, Louis Delelis, a de nombreux projets (terrain sportif scolaire, jardin denfants, salle déducation physique et de patronage laïque, local pour le matériel dincendie et de pompes funèbres, etc. et installe, en 1950, sa salle des fêtes au premier étage du château.","habitants":"Famille de Jean-Claude et Magali Messéant.        famille Delorne d'Alincourt\"","divers":"chàteau de Chocques à Saint-Sauveur et  Alincourt","gps":"","images":["../image/image_62/62_Chocques_1.jpg","../image/image_62/62_Chocques_2.jpg","../image/image_62/62_Chocques_3.jpg"]},"Consult_chateau_formulaire9959":{"id":"Consult_chateau_formulaire9959","dept":"62","canton":"Fruges","commune":"St-Augustin","nom":"Clarques","type":"Château","periode":"XVIII","histoire":"CLARQUES, cest Augustin Titelouze, seigneur de Balinghem et mousquetaire du Roi, qui hérite de la terre de Clarques et fait construire le château au début des années 1780. Durant la révolution il émigre, mais à son retour il parvient à rentrer en possession de son château, et le fait remettre en état.  La demeure fut agrandie en 1905 par Joseph de Gournay sur les plans de l'architecte Lillois Vilain en ajoutant deux grandes ailes en saillie. Clarques possède également un monument, la statue Saint-Martin, érigée en 1849, par la Piété et la générosité de la Famille de Gournay, dont la tête en bronze avait été volée durant la Seconde Guerre mondiale, mais fut reconstituée en 1990.  il est la propriété de M René Delahaye.","architecture":"CLARQUES, en 1909, les deux grandes ailes qui encadrent la cour sont bâties, mais la décoration nest pas achevée. Saccagé en 1940 par les troupes et les réfugiés, le château est remis en état par Berthe de Gournay. Vendu après sa mort à un promoteur britannique qui le garda une dizaine dannées, La demeure comprend deux ailes reliées transversalement par un corps de logis, sa partie la plus ancienne. Ces ailes, du côté du parc, forment pavillons ; ceux-ci avaient été envisagés dès le XVIIIe siècle : celui de l'Est aurait été alors sérieusement amorcé. Du côté de la cour, dans laquelle on pénètre par une belle grille en ferronnerie au débouché de l'allée bordée de peupliers qui la relie à la route, ces ailes forment des saillies.  Les deux périodes de construction de l'édifice s'opposent par les matériaux qui ont été mis en uvre, seule la pierre a été utilisée au XVIIIe siècle, alors qu'au XXe siècle on l'a associée à la brique jaune, propriété privée, se visite sur demande.","habitants":"Famille d' Augustin Titelouze\"","divers":"Clarques  GPS : 50° 38' 50\" Nord, 2° 16' 42\" Est","gps":"50° 38' 50\" Nord, 2° 16' 42\" Est","images":["../image/image_62/62_Clarques_1.jpg"]},"Consult_chateau_formulaire8f09":{"id":"Consult_chateau_formulaire8f09","dept":"62","canton":"Desvres","commune":"Colembert","nom":"Colembert","type":"Château","periode":"XVII-XVIII","histoire":"COLEMBERT, érigé en marquisat par Louis XIV en faveur de Gabriel de Maulde, la terre de Colembert appartenait au XVIIIe à Anne Louis d'Isques, qui l'apporta en mariage en 1763 au comte Charles Philippe de Sainte Aldegonde. Quelques années plus tard, les époux firent appel à l'architecte G. Sannier afin de remplacer l'ancien château par une plus grande demeure, construite de 1777 à 1780.  Louis-Charles de Sainte-Aldegonde, fils des anciens propriétaires, racheta le château de Colembert. Il épousa Joséphine-Marie du Bouchet des Sources, fille de Louise-Élisabeth de Croÿ de Tourzel et petite-fille de Louis II du Bouchet de Sourches.  Le 17 octobre 1870, la cérémonie de mariage entre Hélène de Pérusse des Cars (1847-1933), petite-fille de Marie Antoinette Gabrielle de Sainte-Aldegonde, de Noircarmes d'Hust, comtesse de Cossé-Brissac (1793-1874), et Henry Noailles Widdrington Standish (18471920),  Leur ami le duc Emmanuel de Croy Solre, que Louis XVI venait de faire maréchal de france prit une part active dans cette entreprise. Nommé commandant militaire des côtes orientales de la Manche, il persuada Charles de Saint-Aldegonde de batir un belvédère sur la plus haute des collines voisines, en l'aidant de ses deniers. Le fils du comte de Sainte-Aldegonde le fit racheter par son beau frère, le marquis d'Ennetières, que sa qualité d'étranger permettait d'échapper aux lois sur l'émigration et qui lui rendit à l'amnistie de 1800. Le 17 octobre 1870, Lord of the Manor of Standish, se déroula au château de Colembert. Le descendant de Louis-Charles de Sainte-Aldegonde, le Baron Olivier Law de Lauriston-Boubers, en est lactuel propriétaire La baronne Pierre de Lauriston Boubers en est propriétaire aujourd'hui.","architecture":"COLEMBERT, Anne-Louise d'Isques l'apporta en mariage au comte de Sainte-Aldegonde au milieu du XVIIIe siècle. Le château de Colembert a été construit, de 1776 et 1784, par l'architecte Giraud Sannier, pour le comte Charles de Sainte-Aldegonde sur l'emplacement d'un ancien château. A la Révolution, il a été saisi puis vendu comme bien national.  la construction du château moderne élevé sur un soubassement, un rez-de-chaussée de deux étages carrées, du côté de la cour d'honneur il présente un corps de logis central surmonté d'un fronton triangulaire encadré par deus ailes en retour d'equerres. l'avant corps à trois travées est percés au rez-de-chaussee et à l'étage  de baies cintrées, celle de l'étage ouvrent sur un élégant balcon en appui-corps en fer forgé reposant sur des consoles. Le comble d'ardoise à deux versants, est éclairés par des oeils-de-boeuf. Éléments protégés MH : les façades et les toitures y compris le pont-perron: classement par arrêté du 2 avril 1980.","habitants":"Famille de  Louis-Charles de Sainte-Aldegonde\"","divers":"Colembert GPS : 50° 44' 48\" Nord, 1° 50' 12\" Est","gps":"50° 44' 48\" Nord, 1° 50' 12\" Est","images":["../image/image_62/62_Colemberte_1.jpg","../image/image_62/62_Colemberte_2.jpg","../image/image_62/62_Colemberte_3.jpg"]},"Consult_chateau_formulaire2d26":{"id":"Consult_chateau_formulaire2d26","dept":"62","canton":"Boulogne-sur-Mer","commune":"La Capelle les Boulogne","nom":"Conteval","type":"Château","periode":"XVIII","histoire":"CONTEVAL. le Roi Louis XVI leur concède 450 arpents de terre dépendant du domaine royal pour leur permettre de pratiquer l'élevage à grande échelle. Lhistoire commence durant la seconde moitié du XVIIIe siècle, lorsque François Delporte et ses enfants, précurseurs en matière de manufactures, importent clandestinement dAngleterre 1000 brebis et 80 béliers du Romney Marsh pour concurrencer le commerce lainier anglais. Pour apporter son soutient à cette expérience agronomique importante,  Cette initiative de François Delporte (père), avait valu à sa famille dêtre anoblie par Louis XVI en 1776.  Une maison est bâtie à proximité de la bergerie dans les années 1780 afin de recevoir dans de bonnes conditions des émissaires de la cour pour veiller au bon développement et rendement de cet essai.","architecture":"CONTEVAL, l'architecture du château est d'inspiration anglaise à une période où l'anglomanie est de mode. Demeure en brique et pierre enduite. Édifice atypique dans le Boulonnais, avec ses deux cours sur les façades latérales. La maison domine un parc paysager en amphithéâtre, ouvrant sur la campagne, sans doute dû au botaniste Dumont de Courset. Le parc a été complété à la fin du XIXe siècle par un parc à l'anglaise avec un grand potager, dû au paysagiste Eugène Houlet.  Éléments protégés MH : les façades et les toitures du château, y compris les deux cours anglaises ; le parc entourant le château, ainsi que ses clôtures, ses allées, le bassin et son amenée d'eau, les deux potagers : inscription par arrêté du 19 avril 2006.","habitants":"Famille de François Delporte\"","divers":"Conteval GPS : 50° 43' 55\" Nord, 1° 42' 28\" Est                                                      hotel GPS : 50° 43' 28\" Nord, 1° 36' 47\" Est","gps":"50° 43' 55\" Nord, 1° 42' 28\" Est","images":["../image/image_62/62_Conteval_1.jpg"]},"Consult_chateau_formulairea89b":{"id":"Consult_chateau_formulairea89b","dept":"62","canton":"Avesnes-le-Comte","commune":"Couin","nom":"Couin","type":"Château","periode":"XVII","histoire":"COUIN, plusieurs constructions seigneuriales successives ont été édifiées à Couin depuis le début du second millénaire. C'est grâce à la fortune amassée par Philippe Ernest de Landas, premier Comte de Louvignies, ambassadeur sous Louis XIV, que le sort de cette propriété a connu un changement important. Le château de Couin est une bâtisse construite précisément de 1745 à 1750 par le comte de Louvignies, lequel fut, avant la Révolution, député de la noblesse aux États-dArtois, et par son épouse Isabelle dHéricourt, c'est le plus grand château dArtois. La propriété du comte de Louvignies sétendait sur quelque 520 hectares et englobait les terres de st-Léger et une grande partie de Souastre. Cest le fils du comte de Louvignies qui habita le château. Puis il fut transmis à la famille de Louvencourt pendant trois générations. Un marquis fut même maire de Couin. Il mourut en 1950 et la propriété fut, en 1962, vendue à un agent immobilier dArras, M. Douriez. Le 30 octobre 2002, Monsieur et Madame Vinchant sont devenus les nouveaux propriétaires avec lintention de le restaurer à lidentique.","architecture":"COUIN a été construit en 1745, par le Comte de Louvignies, Seigneur de Couin et de Landas. Il date du XVIIIe siècle et remonte à l'époque Louis XV.  Un édifice en pierre blanche dArtois avec soubassement en brique, double en profondeur, sans ailes en retour, sans colonnes, très épurée, massive, mais agrémentée de riches sculptures. Larchitecte DHuez, chargea son fils dexécuter les sculptures, c'est l'architecte arrageois Adrien François d'Huez qui fut chargé de la construction de la bâtisse de plus de 2000 m2. Le château de Couin est inscrit aux M.H. en totalité (extérieur et intérieur), depuis 1965.","habitants":"comte de Louvignies\"","divers":"Couin GPS : 50° 07' 57\" Nord, 2° 31' 44\" Est","gps":"50° 07' 57\" Nord, 2° 31' 44\" Est","images":["../image/image_62/62_Couin_1.jpg"]},"Consult_chateau_formulaire9046":{"id":"Consult_chateau_formulaire9046","dept":"62","canton":"Avesnes-le-Comte","commune":"Couturelle","nom":"Couturelle","type":"Château","periode":"XVII","histoire":"COUTURELLE, construit en 1702 pour Gérard Joseph Boudart, chevalier, seigneur de Couturelle et Warlincourt, le château, dont on ne sait s'il remplace un bâtiment antérieur, est, en 1750, pourvu d'une entrée monumentale, sans doute construit par les soins de Charles-François Boudart, puis remanié dans le courant du XIXe siècle. La demeure est passée par alliances successives aux La Fontaine Solart, aux Cossart d'Espiés et aux du Bos qui le possèdent actuellement.","architecture":"COUTURELLE,  datés de 1750 et s'élevant sur deux niveaux, deux pavillons en pierre traitée à refends aux angles, cantonnent un mur concave où s'ouvre un portail aux pilastres couronnés de vases, au delà d'un parterre s'élève l'édifice tout en pierre. Il se compose d'une construction principale et vers la cour de deux ailes en retour et dissemblables, l'une complètement intégrée à la bâtisse, et l'autre plus importante, couronnée d'un toit indépendant. Mis en valeur par une légère saillie et les horizontales de ses refends, l'avant-corps central où figure en frise, la date de 1702, est sommé d'un fronton triangulaire aplati et percé d'un oculus. Isolées ou groupées deux par deux, les ouvertures des étages nobles sont rectangulaires et uniformes. Les lucarnes en pierre, une seule est en bois, apportent quelque fantaisie à cet ensemble d'une grande simplicité architecturale mais non sans grandeur.","habitants":"Famille de   Gérard Joseph Boudart\"","divers":"Couturelle   GPS : 50° 12' 33\" Nord, 2° 30' 03\" Est","gps":"50° 12' 33\" Nord, 2° 30' 03\" Est","images":["../image/image_62/62_Couturelle_1.jpg","../image/image_62/62_Couturelle_2.jpg"]},"Consult_chateau_formulairea3bb":{"id":"Consult_chateau_formulairea3bb","dept":"62","canton":"Calais","commune":"Nielles les Ardres","nom":"Cressonnerie","type":"Château","periode":"XVIII","histoire":"CRESSONNERIE  le château de la Cressonnerie ou Cressonnière est situé à Nielles-les-Ardres est une propriété privé qui ne se visite pas. Ses petites proportions et la présence des deux tourelles de sa façade postérieure atténuent la rigueur du style néo-classique dans lequel il a été conçu.","architecture":"CRESSONNERIE, ce château a été construit en 1808-1812 sur les ruines d'une demeure antérieure qui était entourée de fossés et dotée de tourelles, deux de celles-ci ont été conservées. Précédée par une allée d'arbres, la cour d'honneur, bordée sur sa gauche par les communs, est fermée par de belles grilles dessinant une courbe concave. La façade principale du château est très plate. Deux pilastres à refends partant de fond esquissent un avant-corps médian que couronne un large fronton agrémenté d'une horloge entourée de feuillages ; à cet avant-corps correspondent les trois travées centrales de part et d'autre, les ailes comprennent chacune deux autres travées. On accède aux portes situées aux extrémités de cette façade par de petits escaliers à double rampe, l'accès au sous-sol se trouvé ainsi ménagé sous le perron. Un cordon horizontal sépare les deux niveaux de l'élévation et il recoupe les deux pilastres qui limitent latéralement la façade. Près du château une pièce d'eau est alimentée par de nombreuses sources. Un parc a été aménagé au pied de la butte de la Montoire.","habitants":"seigneurs locaux\"","divers":"Château de la Cressonnerie à Nielles les Ardres","gps":"","images":["../image/image_62/62_Cressonnerie_1.jpg","../image/image_62/62_Cressonnerie_2.jpg"]},"Consult_chateau_formulairea732":{"id":"Consult_chateau_formulairea732","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Croix en Ternois","nom":"Croix_en_Ternois","type":"Châteaux","periode":"XVIII","histoire":"Deux châteaux dans cet article la Croix en Ternoix et Bryas.                                 CROIX EN TERNOIS, vers 1495 existaient à Croix deux seigneuries, celle de Grand-Croix et celle de la Petite-Croix. La première, qui appartenait à la famille Lejusne-Contay, fut vendue comme bien national pendant la Révolution. La seconde appartenait  à la famille des Ghistelles. Un de ses membres fut marquis de Saint-Floris et de Croix en 1674 et un autre obtint en 1760 de l'empereur du Saint Empire le titre de prince de Ghistelles. L'ancien château n'existe plus, le bâtiment bâti dans un clos de \"six mesures\" y compris le jardin, fut détruit pendant les guerres du XVIe siècle. Au XVIIIe siècle, les seigneurs de Ghistelles possédaient à Croix un château avec terre et bois. Au moment de la Révolution le chef de la branche aînée de cette famille, Charles-François, Comte de Ghistelles Serny, émigra et perdit la plus grande partie de ses importants domaines. Un pavillon carré, datant du XVIIIe siècle est tout ce qui reste de l'ancienne habitation des Ghistelles. Une avenue de 400 m environ, bordée de grands arbres, mène de la route nationale au pavillon carré. Cette voie magnifique, occupant un hectare de superficie, laisse soupçonner l'importance de l'ancien domaine. Le pavillon, placé dans l'axe de la voie d'accès, est édifié entièrement en pierre, il présente une élévation à deux niveaux et un haut toit d'ardoises au comble brisé le couvre.","architecture":"BRYAS, l'ancien château de Brias, démoli à la Révolution française, L'actuel château de Bryas, débuté en 1780, est construit juste à côté. Durant la première guerre mondiale, le château abrita le quartier général du maréchal Foch pendant la bataille d'Artois.\nDurant la seconde guerre mondiale, l'occupant allemand a installé un centre de commandement de la chasse  dans le parc du château, où, en 2013, en subsistent des vestiges : casernements, hangars, emplacement de batterie, bunker semi-enterré, restes de taxiway. Les installations de Bryas (selon l'orthographe d'avant 1997) ont été bombardées par l'aviation américaine, notamment le 17 août 1943. En 2004, le château de Bryas a servi de décor au film Joyeux Noël.  En 2011, il est une propriété privée appartenant à Benoît de la Bretesche, fils de Jeanne de la Bretesche, née Jeanne de Bryas, dernière de la branche aînée des comtes de Bryas. Tout y ayant été pillé lors des guerres successives, le château ne se visite pas. En 2019, le château de Bryas accueille les Journées Nationales des Scouts unitaires de France. Bryas avec les châteaux nest pas exhaustive, cet affichage est uniquement présent à titre dinformation grâce à lajout des utilisateurs.","habitants":"famille Lejusne-Contay, et la famille des Ghistelles.                             Famille de Bretesche\"","divers":"Deux châteaux dans cet article la Croix en Ternois-grav-4 et Bryas Grav 1-2-3.                                          Bryas gps 50° 24' 24? nord, 2° 22' 46? est","gps":"","images":["../image/image_62/62_Croix_en_Ternois_1.jpg","../image/image_62/62_Croix_en_Ternois_2.jpg","../image/image_62/62_Croix_en_Ternois_3.jpg","../image/image_62/62_Croix_en_Ternois_4.jpg"]},"Consult_chateau_formulaire535d":{"id":"Consult_chateau_formulaire535d","dept":"62","canton":"Outreau","commune":"St_Frieux","nom":"Dannes_St_Frieux","type":"Châteaux","periode":"XVII","histoire":"DANNES au XVIIIe siècle, la progression des dunes littorales ensevelit des villages et des hameaux comme celui de Bellefontaine qui disparaît de la carte et l'autorité royale prend alors des mesures de protection des massifs par le boisement pour tenter de limiter l'avancée des sables.\nChâteau de Dannes, ancien relais de chasse, site du conservatoire du littoral ou salle des fêtes de Dannes En 1823, la famille Sansot concède ses dunes à la famille Leroy Mabille. La plupart des dunes situées autour du mont Saint-Frieux appartenaient au début du XIXe siècle à la famille Leroy Mabille. En 1854, le site est un relais de chasse. La famille Leroy Mabille multiplie les essais de sylviculture pour boiser les dunes, favorisant la diversité en introduisant de nombreuses essences par plusieurs procédés : boutures de peuplier du Canada (1820-1830), graines de bouleaux et de frênes (1820-1850), plantations de pins en motte (meilleur marché que celle du semis), etc. Les pins maritimes résistant mieux au vent venant de la mer sont mêlés aux feuillus et plantés en lignes perpendiculairement au vent marin. La gestion est dynamique avec des pratiques d'éclaircies précoces, d'élagage, de recépage.","architecture":"DANNES des blockhaus et des chemins bétonnés réalisés par des déportés juifs. Après la seconde guerre mondiale et les impacts du mur de l'Atlantique, les dunes vives sont basses et étalées, les formes de remaniement éolien en arrière de la dune bordière sont particulièrement développées ; des couloirs de déflation transversaux et des langues sableuses  s'allongent dans le sens des vents dominants, le sable progresse vers l'intérieur en noyant la végétation. Les fonds humides  sont végétalisés par l'argousier et des fourrés hygrophiles. Les coupes forestières de la guerre ont laissé de nettes clairières (mis en évidence par les clichés de la mission aérienne de 1947). La mission aérienne de 1989 montre la progression de la végétation forestière. Les infrastructures allemandes s'estompent sous l'effet de la dynamique de reconquête. Les résineux dominants et les frênes, bouleaux et érables voire les peupliers ont progressé sur les sables et les matériaux calcaires   Le site était une chasse privée de la famille Cuvelier (grands industriels du Nord, cimenterie de Dannes).","habitants":"famille Sansot, famille Leroy Mabille\"","divers":"Château de Dannes à Saint-Frieux","gps":"","images":["../image/image_62/62_Dannes_St_Frieux_1.jpg","../image/image_62/62_Dannes_St_Frieux_2.jpg"]},"Consult_chateau_formulaire609c":{"id":"Consult_chateau_formulaire609c","dept":"62","canton":"Boulogne-sur-Mer","commune":"St_Martin de Boulogne","nom":"Denacre","type":"Châteaux","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Denacre  et Moulins-l'Abbé.                                DENACRE du XVIe siècle, la maison du Hill devient une demeure de plaisance à la campagne au XVIIe siècle, dirigée par les Lazaristes. A la Révolution, l'ensemble, constitué d'une maison, cour, réfectoire, chapelle, basse-cour, jardin et ferme passe aux mains d'un nouveau propriétaire qui entreprend des travaux,  Durant la deuxième moitié du XIXe siècle, et sous la direction d'un nouvel acquéreur, un oratoire est installé au premier étage et d'importants travaux d'aménagement du parc sont réalisés, le transformant en un parc paysager avec l'intégration du cours d'eau pour en faire une pièce d'eau avec une retenue.Le château est composé de quatre travées et de deux ailes en retour de deux travées chacune. Il est édifié sur deux niveaux en pierre du boulonnais sans aucune sculpture et dun niveau sous combles en ardoises aux lucarnes maçonnées. Lensemble repose sur un soubassement de la hauteur dun niveau créant une terrasse daccès au château de laquelle se dégage une belle perspective sur la vallée du Denacre. La composition du parc paysager profite de la dénivellation naturelle du terrain pour créer de belles perspectives. Dans laxe du château, depuis la terrasse, la perspective vers la vallée se dégage au travers du potager et de létang situés en contrebas. Sur la gauche, prairies, bosquets et bois se succèdent dans la profondeur du terrain.  Éléments protégés MH : les façades et les toitures ; la salle à manger, le salon et le bureau au rez-de-chaussée et l'oratoire au premier étage avec leur décor : inscription par arrêté du 26 juin 1978. En totalité, le parc du château avec la pièce d'eau, la chute et le dispositif hydraulique, les deux ponts et le portail d'entrée de la propriété avec le mur d'enceinte ; les façades et toitures des communs : inscription par arrêté du 8 novembre 2011.","architecture":"MOULINS L'ABBE, le domaine appartint d'abord à l'abbaye Notre-Dame de Boulogne; il devint la propriété du chapitre lorsque celle-ci fut promue au rang de cathédrale. Il fut vendu sous la Révolution comme bien national à la famille Abot de Bazinghen. Au XXe siècle, il a été acquis par celle des Rosny. Les bâtiments de ce château encadrent une vaste cour carrée. La grande salle qui occupe le fond de la cour doit retenir l'attention car elle constitue le reste le plus ancien des manoirs du Boulonnais, sa porte présente une décoration sculptée. Cette salle a été bâtie en grès au XIVe siècle, l'un de ses pignons était éclairé par une rose aujourd'hui aveuglée; deux tourelles l'encadraient; l'une a été conservée, l'autre située près de la cour, est en partie ruinée; plus étroite à la base qu'au sommet, elle était donc partiellement montée en encorbellement. L'une de ces tourelles a peut-être servi de pigeonnier. Cette salle non voûtée était éclairée du côté droit par quatre fenêtres brisées, aujourd'hui murées, du côté gauche par une seule fenêtre dont il ne reste plus que les vestiges. A droite de celle ci s'ouvre la porte d'entrée. Son tympan est sculpté. On désigne cette uvre, sous le nom de \"Dieu accroupi\" ; il doit s'agir de Dieu foulant l'aspic et le basilic; de chaque côté, le long de la voussure, rampe une chimère, la tête tournée vers Dieu; l'archivolte repose sur deux petites têtes humaines. Cette sculpture doit dater du XIVe siècle.","habitants":"famille Abot de Bazinghen\"","divers":"Deux châteaux dans cet article; Denacre grav-1- et Moulins-l'Abbé grav-2                                    Denacre  GPS : 50° 44' 31\" Nord, 1° 38' 17\" Est","gps":"50° 44' 31\" Nord, 1° 38' 17\" Est","images":["../image/image_62/62_Denacre_1.jpg","../image/image_62/62_Denacre_2.jpg"]},"Consult_chateau_formulairee1f8":{"id":"Consult_chateau_formulairee1f8","dept":"62","canton":"Aire-sur-la-Lys","commune":"Witernesse","nom":"Desvre","type":"Château","periode":"XVI-XIX","histoire":"DESVRE,  la mention la plus ancienne connue de la seigneurie de la Desvre remonte à 1202, date à laquelle Wenemarus de la Beverne est cité comme témoin dans une charte du prieuré de Saint-André les Aire.\nElevée sur le soubassement en damier alternant grès-silex de l'ancien château féodal dont elle a conservé le portail d'entrée, la ferme manoir de la Desvre a ensuite pris l'allure d'une imposante exploitation agricole toujours entourée de douves. Aujourd'hui, le manoir vous ouvre ses portes. Classé aux Monuments Historiques depuis juin 2005, le site est ouvert un mois dans l'année et lors des journées du Patrimoine.\nLes récents travaux ont donné un second souffle au manoir: l'accessibilité y est améliorée, les terres, auparavant destinées à un usage agricole, ont donné naissance à des jardins, lieu de découverte et de détente. Le cheval reprend également son importance d'antan dans ce lieu chargé d'histoire.Le manoir de la Desvre, pour tous vos événements, vous donne accès à plusieurs possibilités d'agencement et de réception (photos de mariage, rassemblement sportif, session bien-être, tournages, etc. Monsieur Patrick Bertreux l'achète en 1997 et en 2002-2003 transforme les jardins en parc et commencent la collection d'écorces, de feuillages par la plantation de quarante essences diffèrentes","architecture":"DESVRE, le manoir de la Desvre est devenu la ferme de la Desvre. Ferme manoir mentionnée dès le XVIe siècle avec tours et porches entourés de douves, de jardins et d'étangs. Elle se présente aujourd'hui comme une grosse ferme modèle de la fin du XIXe siècle avec ses granges, étables, écuries, laiterie, four à pain. Le Parc complète la visite autour de l'étang, ainsi que le rade, ils permettront une balade pédestre complète autour du domaine. Le Manoir-Ferme de la Besvre, en totalité, avec ses machines agricoles qui y sont conservées, est inscrit aux M.H. depuis le 29.07.2005.","habitants":"Famille de Wenemarus de la Beverne\"","divers":"château de Desvres à Witernesse","gps":"","images":["../image/image_62/62_Desvre_1.jpg"]},"Consult_chateau_formulaired930-2":{"id":"Consult_chateau_formulaired930-2","dept":"62","canton":"Desvres","commune":"Doudeauville","nom":"Doudeauville","type":"Château","periode":"XVIII","histoire":"DOUDEAUVILLE était la première baronnie du Boulonnais (il y en avait douze). Ce village fut érigé en duché, pour la gloire de la famille des : de la Rochefoucault. Au hameau de Course on peut voir la source de la rivière La Course, qui commence à sourdre plus faiblement dès le village de Courset. château bâti en 1781, pour Antoine de Courteville, écuyer, seigneur de la Cour en Sequières, officier du roi, selon les plans de l'architecte boulonnais Giraud Sannier. Porte cochère sans couvrement en ferronnerie. Ferme attenante partiellement reconstruite au XXe siècle. Le bâtiment, de plan régulier, se compose d'un sous-sol, un étage carré un étage de comble et en rez-de-chaussée, gros-oeuvre: enduit et brique, élévation ordonnancée surmontée de toit à longs pans; croupe; toit à longs pans brisés et toit conique recouverts de tuiles flamandes d'ardoise et de zinc en couverture.","architecture":"DOUDEAUVILLE,  château du XVIlle, construit par les Delattre du Val de Fresne, passa en différentes mains, puis aux Taffin de Givenchy et  la propriété actuellement de mesdemoiselles Menne.  Manoir de Doudeauville  est sans doute du XVIIIe, transformé en ferme, date de 1613, construit en briques roses sur des soubassements en grés .La Course court devant la cour de la ferme quon rejoint par une passerelle. Il appartient à la famille Dutertre dElmarcq. La motte de Crandal était certainement surmontée dune tour de guet, du temps des celtes ou des romains.-Un souterrain menait jusquau château-fort, où au Xlle siècle naquit Eustache le Moine, corsaire-pirate, fils de Bauduin Busket, baron de Course et pair du Comte de Boulogne, du temps de Philippe-Auguste.","habitants":"famille des : de la Rochefoucault. \"","divers":"Château de Doudeauville","gps":"","images":["../image/image_62/62_Doudeauville_1.jpg","../image/image_62/62_Doudeauville_2.jpg","../image/image_62/62_Doudeauville_3.jpg","../image/image_62/62_Doudeauville_4.jpg"]},"Consult_chateau_formulaire0d4a":{"id":"Consult_chateau_formulaire0d4a","dept":"62","canton":"Avesnes-le-Comte","commune":"Duisans","nom":"Duisans","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Duisans et le Clos-Grincourt                                DUISANS, au XVIe siècle passa par alliance à la famille d'Egmont.  Antoine du Bois est seigneur de Duisans en janvier 1677. Il est le fils d'André du Bois, seigneur d'Haucourt, mort à cette date, et de Rose de Vermeille. Il a été huit fois député ordinaire des États d'Artois. Il appartient à la noble famille du Bois de Hoves. En janvier 1677, il reçoit des lettres confirmant son état de noblesse avec anoblissement en tant que de besoin, les papiers de la famille ayant été perdus après la mort d'Adrien du Bois à Douai en 1635.  En 1752 construction du château actuel. Antoine est marié noblement à Jeanne Galbart, fille de Chrétien, écuyer, seigneur de Bertigneu. Au XIXe siècle Duissans passe par alliance à la famille laroche et en 1920 sort de la descendance de son constructeur. Abrite aujourd'hui  un établissement  d'enseignement.                                                                     A Duisans  CLOS-GRINCOURT du XVIIe siècle transformé en hôtel retaurant par madame Annie Senlis , classique de plan rectangulaire à deux niveaux, toits en croupes flanqués de trois lucarnes sur combles côté parc.","architecture":"DUISANS, Elevé sur les plans du maître maçon André de Merville, l'édifice semble s'inspirer des meilleurs traités d'architecture, le corps de logis, appareillé en pierre, compte un rez-de-chaussée  sur un soubassement et un étage carré; il est couvert d'un grand toit à croupes,  la façade nord regardant vers la cour d'honneur qui decend vers le Gy et qui bordent de bâtiments de communs dont les façades sont rytmées par des arcades  est animée en son centre par un avant corps amortit par un fronton triangulaire, le corps central est encadré de deux ailes basses toits à la mansart.                                                                                           Pendant la première guerre mondiale, Duisans est en arrière du front de l'Artois. Des troupes y séjournent, parfois, par exemple en juin 1915, pour reprendre des forces, se reposer après des jours au front, reconstituer le régiment, préparer une attaque, rester en réserve lors d'une attaque sur le front  Le 23 mai 1940, à Pont du Gy, des éléments du XVe siècle corps d'armée motorisé allemand fusillent et brûlent 21 civils, une femme handicapée de 82 ans fut poussée dans les flammes et un nourrisson de huit mois périt également dans les flammes.","habitants":"famille d'Egmont\"","divers":"Deux châteaux à Duisans le clos Grincourt  et de Duisans gps50° 57' 27? N, 1° 50' 35? E","gps":"","images":["../image/image_62/62_Duisans_1.jpg","../image/image_62/62_Duisans_2.jpg"]},"Consult_chateau_formulaireac64":{"id":"Consult_chateau_formulaireac64","dept":"62","canton":"Arras","commune":"Mont Saint-Eloi","nom":"Ecoivres","type":"Châteaux","periode":"XVII-","histoire":"Deux châteaux dans cet article; Ecoivres et Hautecloque.                             ECOIVRES, construit vers 1785 par le comte de Brandt de Galametz, le château actuel a remplacé un bâtiment antérleur du XVIIe siècle. Il a été restauré et remanié sous la Restauration et au lendemain de la guerre de 1914-1918. Par alliance, il est revenu à la famille de Waziers. Le château est constitué d'un imposant corps de logis double en profondeur que prolongent deux ailes plus basses. Sa cour est limitée par un mur de tracé convexe, mais dont la partie centrale, là où s'ouvre la porte, dessine un rentrant concave.L'édifice a été construit en pierre sur soubassement de grès. Son élévation présente un rez-de-chaussée, un étage et un attique. Au centre de la façade, regardant sur la cour, se marque un léger avant-corps où des pilastres jumelés superposant les trois ordres encadrent respectivement la porte et la fenêtre de chacun des étages. De part et d'autre de cet avant-corps, on trouve de chaque côté trois travées. Les angles sont délimités par des pilastres à refends. Les ailes latérales, longues de quatre travées sont plus étroites que le corps de logis, une toiture à la Mansart les couvre. Occupé par l'association régionale Espoir et Vie (hôpital psychiatrique).","architecture":"HAUTECLOQUE  à trois K.M. au nord. Au Moyen-Age, une famille seigneuriale a porté le nom du lieu; en 1536, le domaine a été vendu par Pierre de Hautecloque à Jean Herlin sous réserve d'usufruit mais en 1569, le château n'existait déjà plus. En 1600, par mariage, la terre a été acquise par la famille de Bertoult qui la possède toujours en 1766, la terre a été érigée en marquisat. En 1687, une reconstruction de la demeure et intervenue. Actuellement il ne subsiste  comme partie ancienne que la seule façade tournée vers l'église; le reste a été entièrement refait au XIXe siècle. Dans son aspect actuel, le château est une construction rectangulaire à deux niveaux présentant à ses extrémités deux ailes coiffées de combles transversaux mais elles ne sont saillantes que du côté du parc, celle de droite n'a qu'un seul niveau; deux tourelles à trois étages ont été logées dans les angles rentrants ainsi formés. De l'autre côté, sur la droite, contre l'aile et l'enveloppant partiellement, on a plaqué une annexe plus basse où se trouve une entrée. De ce côté, la façade du corps central de logis est en pierre. Tout le reste de la construction appartient au XIXe siècle et son architecte s'est inspiré du style du début du XVIIe siècle. Campées entre les deux tourelles rondes, les cinq travées de la façade qui regarde le parc sont individualisées par des chaînes de pierre formant harpe dans la maçonnerie de brique et les encadrements des fenêtres.","habitants":"Famille du  comte de Brandt de Galametz\"","divers":"Deux châteaux dans cet article; Ecoivres-grav 1-2 dit de fifine  et de Hautecloque  de Belloy st Léonard , grav 3-4-5, et de st-pol-grav-6","gps":"","images":["../image/image_62/62_Ecoivres_1.jpg","../image/image_62/62_Ecoivres_2.jpg","../image/image_62/62_Ecoivres_3.jpg","../image/image_62/62_Ecoivres_4.jpg","../image/image_62/62_Ecoivres_5.jpg","../image/image_62/62_Ecoivres_6.jpg"]},"Consult_chateau_formulairebbb3":{"id":"Consult_chateau_formulairebbb3","dept":"62","canton":"Saint-Omer","commune":"Tilques","nom":"Ecou_Tilques","type":"Château","periode":"XVII","histoire":"ECOU , situé au lieu-dit le Vivier Sainte-Aldegonde   C'est en 1187, avec Guillaume, châtelain de Saint-Omer, qu'apparaissent dans les textes les seigneurs d'Ecou; il est probable que cette seigneurie faisait partie des nombreux fiefs que les comtes de Flandre avaient créés dans la région pour en assurer l'administration. En 1267, Aelis dame d'Écou et son mari, Philippe de Kienvielle, vendirent pour cause de pauvreté leur fief urbain de Saint-Omer à Guillaume de Sainte-Aldegonde, chanoine.  Il doit son nom au Seigneur Willelmus d'Ekout. Il fut remanié au XVe siècle. En 1595, il appartenait à Adrien de Croix, seigneur de Wasquehal. A la fin du XVIe siècle, la propriété fut acquise par les Croix, seigneurs de Wasquehal. Vers 1733  en 1739, Guislain-Antoine d'Herbais de Villecasseau, en devint propriétaire, le domaine fut acquis par André de Martigny dont la petite-fille épousa Guislain Taffin de Tilques,  en hérita,à la mort de sa mère, en 1780. Marie-Louise d'Herbais étant mariée à Guislain-François de Taffin de Tilques, fils de Nicolas-Antoine, Seigneur du Hocquet,  cette dernière famille a possédé Ecou pendant près de deux siècles et il semble que celui-ci à l'époque de la Révolution était en mauvais état et ce serait pour cette raison qu'il n'avait pas été aliéné. Agénor, qui se faisait appeler de Taffin, fonda à Tilques une distillerie, il fit ajouter au château des échauguettes, des tours et des murs crénelés","architecture":"ECOU  au XIXe siècle, on lui a ajouté une aile nouvelle plantée dans une direction perpendiculaire à celle du bâtiment ancien. Pendant la deuxième guerre mondiale, les troupes d'occupation le saccagèrent. Le propriétaire actuel, M. Philippe, a entrepris de le restaurer et de le débarrasser des ornements pseudo médiévaux qui lui ont été ajoutés au début de ce siècle. Éléments protégés MH : le château et sa ferme, y compris la muraille, les douves avec le pont, la terrasse et le parc, les deux allées d'accés, le potager, le verger, avec l'ensemble du sol : inscription par arrêté du 3 juin 2014.    Il a été remanié au XVe siècle, le château Tilques passa entre les mains de leurs descendants jusqu'au début du XXe siècle. Le château-hôtel de France se situe à proximité du tunnel sous la Manche. Niché au coeur d'un parc de 4 Ha, le château Tilques offre le charme authentique de la campagne française au coeur d'un carrefour européen. C'est un endroit unique dans la région pour des séminaires résidentiels. Il y a 53 chambres dont 29 chambres situées dans le château Tilques et 24 dans le pavillon du parc avec un balcon ou une terrasse.","habitants":"Famille de Guislain-François de Taffin de Tilques\"","divers":"Château d'Ecou à Tilques                   GPS : 50° 46' 41\" Nord, 2° 12' 18\" Est","gps":"50° 46' 41\" Nord, 2° 12' 18\" Est","images":["../image/image_62/62_Ecou_Tilques_1.jpg","../image/image_62/62_Ecou_Tilques_2.jpg","../image/image_62/62_Ecou_Tilques_3.jpg","../image/image_62/62_Ecou_Tilques_4.jpg","../image/image_62/62_Ecou_Tilques_5.jpg"]},"Consult_chateau_formulaire3226":{"id":"Consult_chateau_formulaire3226","dept":"62","canton":"Lumbres","commune":"Esquerdes","nom":"Esquerdes","type":"Château","periode":"XV","histoire":"ESQUERDES,   du château que Philippe de Crévecur, maréchal d'Esquerdes et chambellan de Louis XI, construisit dans cette localité, il ne reste qu'une tour en pierre blanche accolée d'une petite tourelle contenant un escalier à vis en bois. C'est en 1441 que Jeanne de la Trémoille avait acquis de Jeanne d'Esquerdes, héritière de la famille seigneuriale du lieu, Esquerdes et son château. Elle les avait légués en 1467 à son fils, issu des secondes noces qu'elle avait contractées, à la suite avec Jacques de Crévecur en 1417. Ce fils Philippe de Crévecur d'Esquerdes, après avoir servi les ducs de Bourgogne, mit ses talents militaires au service du Roi Louis Xl et il en devint le chambellan. En 1483, Charles VIII le nomma maréchal. A sa mort n'ayant pas eu d'enfant, il légua le château à ses neveux Jean et Antoine du Bois de Fienne.","architecture":"ESQUERDES  le bien est demeuré dans cette famille jusqu'à la fin du XVIIIe siècle. La tour qui est éclairée par trois rangs de fenêtres rectangulaires a gardé à son sommet quelques éléments de fortification, ainsi que sa poivrière.","habitants":"Philippe de Crévecur d'Esquerdes\"","divers":"Château  d'Esquerdes                         gps 50° 42' 23,21? N, 2° 10' 57,05? E","gps":"","images":["../image/image_62/62_Esquerdes_1.jpg","../image/image_62/62_Esquerdes_2.jpg","../image/image_62/62_Esquerdes_3.jpg"]},"Consult_chateau_formulaire1cf5":{"id":"Consult_chateau_formulaire1cf5","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Flers","nom":"Flers_62","type":"Château","periode":"XVI-XVII","histoire":"FLERS, le plus ancien seigneur connu de Flers est Hengelbertus de Flers en 1136. C'est  Eugène de Noyelles, vicomte de Nielles, comte de Croix, marquis de Lisbourg, qui fit construire le château, lequel fut achevé en 1661. En 1667, il le vendit à Emmanuel de Kessel, chevalier, seigneur de Gavelens, colonel et brigadier de cavalerie, gouverneur de Charlemont. La seigneurie passa à son fils Antoine-Albert de Kessel, à Jean-Ernest de Kessel, fils d'Antoine-Albert, puis à Philippe Charles, cousin de Jean-Ernest. En 1747, le dernier Kessel, Philippe Charles, légua à son cousin Philippe André de Baudequin, seigneur de Sainghin, la seigneurie et le château de Flers. En 1770, Marie Claire de Baudequin Sainghin épouse Ladislas, comte de Diesbach Belleroche, de Friboug en Suisse, et seigneur d'Achiet. A la mort de son épouse en 1791, Ladislas devient le dernier seigneur de Flers. A la veille de la Révolution, le comte de Diesbach Belleroche se retira en Suisse, et laissa son château à la garde du jardinier, Ridez. Celui-ci put sauver les bâtiments mais ne réussit pas à éviter le pillage. Après la Révolution, les Diesbach Belleroche, en reconnaissance des service rendus par le jardinier Ridez qui avait sauvé le château, lui louèrent le domaine et le laissèrent habiter avec sa famille dans le château. Ses descendants continuèrent à être à la fois fermiers et châtelains. En 1927, Diesbach Belleroche vendit l'ensemble de ses propriétés de Flers à un homme d'affaires parisien, M. Barnheim, qui revendit le domaine de Flers à Paul Delesalle-Dewas qui était un descendant du jardinier. En 1970, l'Etablissement Public d'Aménagement de Lille expropria M. Delesalle et laissa le château à l'abandon puis fit démolir l'aile Est.","architecture":"FLERS  Robuste construction de brique et pierre construit en 1776 à 1790 pour Antoine d'Ostrel  conserve , malgré la majesté des proportions, le peu d'ouvertures, arrondies au centre, rectangulaire sur les côtés, suffit à créer l'animation nécessaire. Dans l'aile droite se trouve une salle de réception et quatre salles en sous-sol ont été aménagées en musée archéologique. Le château de Flers est devenu le siège de l'Office de Tourisme et abrite plusieurs services municipaux de Villeneuve d'Ascq.   En rénovant les bâtiments depuis 1991, la ville tente de donner au château une nouvelle dimension permettant de l'intégrer à la vie de la Métropole. \nÉléments protégés MH : les façades et les toitures du château, et, en totalité, l'ensemble des communs, le sol de la cour d'honneur, le parc, le potager avec ses murs de clôture, ses deux pavillons d'entrée et la grille, et le verger : inscription par arrêté du 14 décembre 2012.","habitants":"Famille de  Emmanuel de Kessel\"","divers":"Château de Flers  GPS : 48° 45' 2,88\" Nord, 0° 34' 32,16\" Ouest","gps":"48° 45' 2,88\" Nord, 0° 34' 32,16\" Ouest","images":["../image/image_62/62_Flers_62_1.jpg","../image/image_62/62_Flers_62_2.jpg"]},"Consult_chateau_formulairee622":{"id":"Consult_chateau_formulairee622","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Fontaine les Boulans","nom":"Fontaine_Boulans","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Fontaine les Boulans et Verchin.                                   FONTAINE lès BOULANS, ce serait sur l'emplacement d'un château médiéval que Marie-François de Bassecour, créé marquis en 1763, construisit le château après avoir racheté vers 1760 la seigneurie du lieu. Sous la Révolution, l'héritier du marquis, son fils Procope, émigra et le château fut vendu en l'an III comme bien national, au sieur Frémicourt, un habitant de Saint-Pol. Par alliances successives, le château s'est transmis à l'actuel propriétaire. Une longue allée de tilleuls, précédés par deux massifs de maçonnerie bas et trapus coiffés d'une boule, débouche sur la petite cour du château.  C'est un édifice classique coiffé d'un très haut comble en croupe. Il a été édifié sur un soubassement en grès, en brique et en pierre, mais son appareil se dissimule sur la façade arrière. Le bâtiment comprend un corps de logis principal sur lequel se greffaient latéralement deux ailes, celle de gauche a été détruite, sur celle de droite s'articulent les divers bâtiments de la ferme, des constructions basses en brique avec chaînage de pierre coiffées d'un toit à lucarnes et dominées par un pigeonnier carré couvert par un dôme pointu. La porte principale, montée sur un petit perron, donne accès à un vestibule où se trouve logé l'escalier de marbre à double révolution et à grilles en fer forgé qui a été construit sous Napoléon III.","architecture":"VERCHIN, a quelques K.M. à l'ouest  Verchin et son parc paysager occupent un lieu privilégié dans la vallée de la Lys, tirant profit des éléments naturels. La propriété se compose de bâtiments d'époques différentes : XVIIe siècle pour l'ancien corps de logis, XVIIIe siècle pour le château à l'architecture modeste de style classique, XIXe siècle pour l'adjonction d'une aile en marteau par l'architecte Clovis Normand en 1854 et enfin, au  XXe siècle pour l'édification d'une aile d'accompagnement en 1953. Une chapelle, une serre et un potager entourés de hauts murs complètent l'ensemble. En 1869, un parc à l'anglaise fut aménagé agrémenté d'une pièce d'eau et d'une île nécessitant la mise en place d'un système de barrage sur la Lys afin d'éviter l'envasement. En aval, une cascade fait office de déversoir et permet à la Lys de retrouver son cours. Le parc est planté d'arbres exceptionnels et de plantes en massifs ou d'espèces aquatiques créant un jardin récompensé par le prix des vieilles maisons françaises.  Éléments protégés MH : les façades et les toitures du château et de sa serre ; la chapelle en totalité ; le parc entourant le château avec son système hydraulique (cascade, ponts, canaux, pièces d'eau et île) ainsi que le potager avec ses clôtures et sa remise : inscription par arrêté du 9 juillet 2010.","habitants":"Famille de Marie-François de Bassecour\"","divers":"Deux châteaux dans cet article; Fontaine et Verchin grav-1.   Verchin  GPS : 50° 29' 43\" Nord, 2° 11' 07\" Es","gps":"50° 29' 43\" Nord, 2° 11' 07\" Es","images":["../image/image_62/62_Fontaine_Boulans_1.jpg","../image/image_62/62_Fontaine_Boulans_2.jpg","../image/image_62/62_Fontaine_Boulans_3.jpg"]},"Consult_chateau_formulaire7e99":{"id":"Consult_chateau_formulaire7e99","dept":"62","canton":"Avesnes-le-Comte","commune":"Fosseux","nom":"Fosseux","type":"Château","periode":"XVII","histoire":"FOSSEUX,  c'était la résidence de la Famille Dubois de Hoves de Fosseux    Dès le XIe siècle, une baronnie s'établit à Fosseux. En 1670 elle fut acquise par les ancêtres de la famille qui possède toujours le domaine. S'il existait jusqu'alors un manoir aux dimensions modestes, il fut décidé de bâtir autre chose. Ferdinand Marie Dubois de Hoves de Fosseux, écuyer du Roi à la cour de Versailles, fit édifier cette belle demeure de 1768 à 1770.","architecture":"FOSSEUX, construit en pierre blanche, imaginé et dessiné par l'architecte parisien Villetard, le château est une construction rectangulaire. Ses façades sont précédées de pelouses. Elles sont presque identiques, dépouillées de toute sculpture décorative, comme on le faisait au milieu du XVIIe siècle. À l'extrémité d'une allée ombragée, cette majestueuse demeure est précédée d'une grille monumentale construite en 1907. Aujourd'hui, le site est quasiment identique à celui laissé par son illustre constructeur au XVIIIe siècle.","habitants":"Famille de Ferdinand Marie Dubois de Hoves de Fosseux\"","divers":"Deux châteaux dans cet article Fosseux et Gouy.                                     GPS : 50° 15' 24\" Nord, 2° 33' 52\" Est                                                                                           Gouy-grav-3-4 GPS : 50° 14' 48,7\" Nord, 2° 35' 33,75\" Est","gps":"50° 15' 24\" Nord, 2° 33' 52\" Est","images":["../image/image_62/62_Fosseux_1.jpg","../image/image_62/62_Fosseux_2.jpg","../image/image_62/62_Fosseux_3.jpg","../image/image_62/62_Fosseux_4.jpg"]},"Consult_chateau_formulaired5b7-2":{"id":"Consult_chateau_formulaired5b7-2","dept":"62","canton":"Desvres","commune":"Alincthun","nom":"Fresnoyes_62","type":"Châteaux","periode":"XVIII-XIX","histoire":"FRESNOYES, ce château a été construit par la famille de Fresnoye; une pierre à gauche du perron de la façade principale porte la date à moitié effacée de 1747. Vers 1880, le baron Adrien de Fresnoye posa la première pierre des ailes latérales. Les communs appartiendraient à la première campagne de construction et sont décalés par rapport aux ailes et leur façade est en pierre, ils ont été très remaniés. Pendant la dernière guerre en 1944, le château a abrité le QG de la troisième division d'infanterie canadienne au moment du siège de Boulogne. Par filiation, il est revenu en 1952 à la comtesse Arnould de Waziers. La longue pelouse ovale est bordée latéralement par les communs et sur la droite s'étendent les bâtiments de la ferme. Dans le fond s'élève le long bâtiment du château. Montée sur un soubassement de grès, sa partie centrale a été construite en pierre mais celle-ci se trouve aujourd'hui masquée par un enduit regrettable. Cette façade est à deux niveaux; ses fenêtres ménagent entre elles de larges espaces nus. L'intérieur du château a été complètement remanié au moment de la construction des ailes. De part et d'autre du vestibule central, le salon et la salle a manger prennent jour du côté de la cour comme du côté du parc. L'escalier a été placé dans l'aile de gauche.","architecture":"FRESNOYES, cest après la destruction de la grande propriété de la famille Tailliandier, pendant la première guerre mondiale, que cet imposant manoir fût construit de 1928 à 1932. Cette nouvelle demeure familiale fût baptisée « Château Colombel » en souvenir du château dorigine. Devenue maison dhôtes en 2015, cette demeure de famille au style Art Déco est au cur dun beau parc arboré et fleuri dun hectare, propice à la promenade et la détente. Grands arbres majestueux, vergers et fruits variés, buissons et parterres de buis et de rosiers composent avec harmonie un bel écrin de verdure et de couleurs rythmées par les saisons. Terrasses, salon de jardin, bassin dornement, un intérieur entièrement rénové et empreint dune atmosphère chaleureuse et raffinée. Moderne et respect de lauthentique composent une subtile alliance du présent et du passé,chambres d'Hôtes.","habitants":"famille de Fresnoye\"","divers":"A Alincthun château de la Fresnoyes.  GPS : 50° 21' 59\" Nord, 2° 53' 27\" Est","gps":"50° 21' 59\" Nord, 2° 53' 27\" Est","images":["../image/image_62/62_Fresnoyes_62_1.jpg"]},"Consult_chateau_formulaire0d93":{"id":"Consult_chateau_formulaire0d93","dept":"62","canton":"Fruges","commune":"Fressin","nom":"Fressin","type":"Vestiges_Château","periode":"XV","histoire":"FRESSIN  Les vestiges qui nous sont parvenus sont issus d'un chef d'uvre d'architecture initié par Jean V, seigneur de Créquy, de Canaples et de Fressin, premier chambellan et ami du Duc de Bourgogne Philippe le Bon, au début du XVe siècle. Aux angles, quatre tours assuraient la défense principale du château, aidées par trois autres tours qui flanquaient les courtines. La basse cour était entourée d'une enceinte flanquée de neuf tours défensives. Le château ne connut pas de longues années de splendeur , il joua un rôle lors des hostilités qui opposèrent la France à Charles Quint, afin de reconquérir l'Artois devenu espagnol. Son importance stratégique n'était pas négligeable, puisqu'elle permettait de contrôler et au besoin de verrouiller la vallée de la Planquette, passage habituel des troupes qui allaient et venaient entre Thérouanne et Hesdin. En 1658, la prise de Hesdin renverse la situation, mais l'intervention de Balthazar de Fargues est fatale au château de Fressin car il est attaqué au canon et à la mine.","architecture":"FRESSIN, En 1852, la famille Seillière devient propriétaire du clos du vieux château et des vestiges. C'est à cette famille que l'on doit sa sauvegarde, qui depuis, est passé entre bien des mains.  Éléments protégés MH : les ruines du château (sol et sous-sol) : inscription par arrêté du 8 août 1996.","habitants":"famille Seillière\"","divers":"château de Fressin GPS : 50° 26' 32,43\" Nord, 2° 03' 1,2\" Est","gps":"50° 26' 32,43\" Nord, 2° 03' 1,2\" Est","images":["../image/image_62/62_Fressin_1.jpg","../image/image_62/62_Fressin_2.jpg"]},"Consult_chateau_formulaire29d7":{"id":"Consult_chateau_formulaire29d7","dept":"62","canton":"Avesnes-le-Comte","commune":"Givenchy le noble","nom":"Givenchy_Noble","type":"Châteaux","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article Givenchy, Ligneureuil et Ambrines. AMBRINES de 1811, mais on a alors réutilisé des murs plus anciens: au-dessus de la porte centrale, un grès sculpté rapporté donne la date de 1790, de part et d'autre d'un écu, celui de Marie-Anne de Valicourt morte en 1791. La construction a été faite en brique, la pierre étant réservée aux cordons et aux encadrements harpés des fenêtres, c'est ce qui apparaît de part et d'autre de la porte centrale, là où le crépi en ciment est tombé. Les sept baies du rez-de-chaussée et les huit de l'étage sont irrégulièrement distribuées. La toiture actuelle, à la Mansart, a été réalisée en ardoises synthétiques. La façade sur la cour est bien visible de la route.                                                                                                                                                             LIGNEREUIL, fut construit en 1618 par Philippe de Gomiécourt, fils d'Adrien II et de Philippe de Montmorency. François-Louis Baltazar, son frère et successeur. L'ancien château des Gomiécourt, des Coupigny et des Tramecourt appartient aujourd'hui au vicomte de Chabot. Sur la façade du château se voient les armes accolées de François de Malet de Coupigny Noyelles et de Marie Françoise Walburge de Hangouart sa femme. Leur mariage fut contracté le 23/02/1732. François de Coupigny mourut le 13/03/1765. le vicomte  de Chabot-Tramecourt propriétaire.","architecture":"GIVENCHY LE NOBLE  construit au XVIIIe siècle, est composé dun corps central de cinq travées et de deux ailes dans son prolongement de deux travées chacune. Le corps de logis central est composé dun avant corps couronné dun fronton peu développé. Un modeste balcon en fer forgé garde la porte fenêtre centrale du premier étage souvrant sur la perspective de lallée de platanes. Deux ailes plus étroites, plus basses, courtes et de même facture que le château le complètent, lélévation est fondée sur grés, deux niveaux du corps de logis en brique.  Le général de la Bretescheen est l'actuel prpriétaire. Construit en 1716 par François de Lelès, conseiller aux Aides d'Artois, Au milieu du XVIIIe siècle, il fut racheté par César Taffin, mais il fut revendu, comme bien national, à la Révolution. En 1806, le comte de Tramecourt l'acheta. Les bâtiments sordonnent autour dune cour, ils sont en briques ordonnancés par une série darcades aveugles ou non.  les bâtiments, lhabitat regroupé est en pierre blanche ou brique. Après la tempête de 1989 le parc est endommagé, il est retravaillé par M. Baudet, jardinier en chef du château de Compiègne. On accède au château par une allée de platanes, sur le côté une place entourée de rangs de tilleuls fait face aux communs. Le parc est cerné dun mur en brique et pierre coupé par un saut de loup dans la perspective centrale et de deux portes avec pilastres et grilles dans les perspectives latérales.. Éléments protégés MH : les façades et les toitures du château et des communs : inscription par arrêté du 12 mai 1976.","habitants":"Famille de César Taffin\"","divers":"Trois châteaux dans cet article Givenchy grav-2, Ligneureuil grav-1 et Ambrines grav-3.                   Givenchy GPS : 50° 18' 08\" Nord, 2° 29' 50\" Est                                                   Lignereuil  GPS : 50° 17' 30\" Nord, 2° 28' 18\" Est","gps":"50° 18' 08\" Nord, 2° 29' 50\" Est","images":["../image/image_62/62_Givenchy_Noble_1.jpg","../image/image_62/62_Givenchy_Noble_2.jpg","../image/image_62/62_Givenchy_Noble_3.jpg"]},"Consult_chateau_formulaire0891":{"id":"Consult_chateau_formulaire0891","dept":"62","canton":"Nux-les-Mines","commune":"Chartreuse des Dames-de-Gosnay","nom":"Gosnay","type":"Châteaux","periode":"XIV-XVII","histoire":"CHARTREUSE DES DAMES DE GOSNAYE  elle a été fondée en 1329 et fut fermée en 1792. La chartreuse des dames de Gosnay fut fondée, en 1329, pour la Comtesse Mahaut d'Artois. La chartreuse des Dames de Gosnay est aussi appelée la Chartreuse du Mont-Sainte-Marie est un ancien monastère de moniales appartenant à l'ordre des chartreux. La chartreuse du Mont-Sainte-Marie est la première chartreuse féminine fondée en dehors du cadre originel de la Grande Chartreuse, du Sud de la France.","architecture":"La CHARTREUSE DES DAMES DE GOSNAYE,  fut fondée en 1329 par la comtesse Mahaut d'Artois. L'ensemble des ruines de léglise et des boiseries subsistantes fait lobjet dune inscription au titre des M.H. depuis le 10/06/1986 ainsi que les façades et toitures du bâtiment de la porterie, les bâtiments adjacents à l'église, de la maison du jardinier, des bâtiments situés en équerre au nord-ouest de la parcelle, ainsi que les anciens murs de clôture avec la tourelle au sud, et du sol à l'intérieur de l'enceinte. La charteuse des Dames de Gosnay a été inscrite à linventaire supplémentaire des M.H. en 1986 et déclarée dintérêt communautaire, en décembre 2003. Elle fait lobjet de fouilles archéologiques régulières. Par ailleurs, une étude de valorisation est en cours.","habitants":"Chartreuse des Dames-de-Gosnay,  comtesse Mahaut d'Artois.\"","divers":"Gosnay grav_1-2 GPS : 50° 30' 32,04\" Nord, 2° 34' 41,88\" Est\nChartreuse_du_Mont-Sainte-Marie-de-Gosnay grav 3-4","gps":"50° 30' 32,04\" Nord, 2° 34' 41,88\" Est","images":["../image/image_62/62_Gosnay_1.jpg","../image/image_62/62_Gosnay_2.jpg","../image/image_62/62_Gosnay_3.jpg","../image/image_62/62_Gosnay_4.jpg"]},"Consult_chateau_formulaire3f34":{"id":"Consult_chateau_formulaire3f34","dept":"62","canton":"Arras","commune":"Gd- Rullecourt","nom":"Grand_Rullecourt","type":"Château","periode":"XVII","histoire":"GRAND-RULLECOURT,  en 1537, Marie d'Olhain, dame de Grand-Rullecourt, épouse Jacques de Hamel Bellenglise. Leur fille Nicole était dame d'honneur de Marie Stuart. Elle la suivit dans sa captivité et le jour de son supplice la reine Lui donna sa croix en diamants. Dix générations de cette famille vécurent à Grand Rullecourt. Durant les guerres de religion, Antoine-Constant de Hamel, seigneur de Rullecourt, fut un des chefs de la Ligue. Surnomé le maréchal de la foi, il mena une lutte acharnée contre les protestants.  Le château du grand-Rullecourt fut vendu comme bien national. Le fils d'Antoine mourut sur l'échafaud. Son petit-fils le racheta mais ne put le garder, racheter par un sieur Servatius dont le fils simple lieutenant d'infanterie en 1809 recevra le titre de baron en 1847, terminera sa carrière militaire avec le grade de général de division, à cette date le château racheté en 1843 par le fils du marquis guillotiné à déjà été acquis en 1846 par monsieur Calluaud receveur général des impots qui apportera des modifications des parties hautes du château. Achat du château par Mme Alphonse du Croquet de Saveuse née Marguerite Calluaud, pour sa fille françoise-Elisebeth  épouse du comte Wallerand de Hauteclocque, ce dernier a été tué lors des premiers combats de 1914.   Sa veuve au lendemain de la guerre à perdu un fils se défait du domaine acquis par des spéculateurs qui installe une scierie au abords du château Le roi d'Angleterre,  entre deux guerres monsieur Voisin achète le château pour des colonies de vacances. Les propriétaires actuels, la Famille de Saulieu O'Toole, ont entrepris de le restaurer depuis 1987. La fille de Maître Voisin, Mme Buneau, vendit le château à Patrice et Chantal de Saulieu et leurs enfants le 24 décembre 1987.","architecture":"GRAND-RULLECOURT, de plan rectangulaire à deux niveaux le corps de logis simple en profondeur, et élevé sur un rez- de-chaussée, un étage carré et un étage de comble. Du côté de la cour, il est flanqué de deux ailes en retour comptant trois travées chacune. les façades sont en briques. La pierre est utilisée pour les cordons des fenêtres, pour les chaînes harpées qui encadrent celles-ci et les chaînes verticales  qui marquent les angles des pavillons latéraux. Le château  à un avant-corps rajoutés en pierre  au centre de la façade aux angles arrondis  deux pavillons latéraux sur la façade d'arrivée, des modifications ont été apportés sur les parties hautes du château en 1846  pour les doter de mansardes et surélevant les avant-corps  centraux d'un attique sommé d'un fronton triangulaire.                                                                           Éléments protégés MH : les façades et les toitures du château ; la façade et la toiture sur cour des communs : inscription par arrêté du 15 juin 1989.","habitants":"Famille de Antoine-Constant de Hamel\"","divers":"Gd -Rullecourt GPS : 50° 15' 7,57\" Nord, 2° 28' 45,38\" Est","gps":"50° 15' 7,57\" Nord, 2° 28' 45,38\" Est","images":["../image/image_62/62_Grand_Rullecourt_1.jpg","../image/image_62/62_Grand_Rullecourt_2.jpg","../image/image_62/62_Grand_Rullecourt_3.jpg"]},"Consult_chateau_formulaire4954":{"id":"Consult_chateau_formulaire4954","dept":"62","canton":"Auxi-le-Château","commune":"Grigny -Hesdin","nom":"Grigny_Hesdin","type":"Châteaux","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article Grigny, Brevillers, et Royon.                                                                                                               GRIGNY Au XVIe siècle, la seigneurie de Grigny (lès-Hesdin) appartenait à Antoine de Bassecourt, écuyer, reçu les bourgeois d'Arras, le 17/01/1583, dont le grand-père, Pierre Bassecourt, avait été anobli par le roi Philippe II en septembre 1579. Jean-Baptiste de Bassecourt, arrière-petit-fils d'Antoine, fut nommé marquis de Grigny par lettres patentes du roi d'Espagne Charles II du 22-17/07/1690, avant de faire reconnaître ce titre en France, en Octobre 1705 (lettres patentes enregistrées le 22/10/1706 à Fontainebleau en y incorporant les Terres de Fresnoy, Quisy et Marconnelle). Jean-Baptiste de Bassecourt fut nommé, en 1690, chevalier de l'ordre de Saint-Jacques, seigneur d'Huby, de Grigny, général des armées d'Espagne, issu d'une ancienne famille de l'Artois, au service depuis 1655. L'érection intervient en récompense de ses services comme lieutenant-général des armées et commandant général de la cavalerie aux Pays-Bas. La terre de Grigny relevant du château d'Hesdin   a tous droits de justice (justice seigneuriale), ancien château, manoir seigneurial, plusieurs beaux fiefs et domaines, dépendances, cens, ventes, redevances, fermes, moulins, bois, prés et autres droits utiles et honorifiques. N'ayant pas d'héritier, Jean-
