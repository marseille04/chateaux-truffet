Baptiste de Bassecourt donne cette terre par acte passé à Naples le 17 novembre 1702 à Antoinette Philippe de Bassecourt, sa sur mariée à Louis de Salperwick, pour en jouir après sa mort et la laisser ensuite à François de Salperwick, son fils et neveu de Jean-Baptiste de Bassecourt. La Famille de Salperwick a ensuite conservé le fief jusqu'à la  Révolution.","architecture":"BREVILLERS A l'opposé d'hesdin e château a été bâti par l'un des membres de la famille de l'abbé Prévost en 1776. Il a été réalisé en brique et en pierre. Des chaînages harpés esquissent sur la façade regardant vers la cour deux pavillons latéraux de deux travées chacun; un effet identique a été recherché au niveau de la toiture. Au centre s'ouvrent deux portes cintrées celle de droite donne accès au vestibule ; elles encadrent deux fenêtres, mais elles s'en trouvent séparées par un large panneau de pierre se détachant sur la brique, de même les allèges des baies que délimitent le prolongement des encadrements de celles-ci et le cordon séparant le rez-de-chaussée de l'étage sont meublées par un rectangle de pierre, toutes ces parties en pierre réalisent un effet de quinconce très heureux. Six lucarnes s'ouvrent à la base de la toiture en croupe. La façade postérieure reprend dans l'ensemble ces dispositions, mais elle ne présente qu'une seule porte et le versant de la toiture est dépourvu de lucarnes                                                               ROYON, le château de Royon initial était de style Louis XV, avant d'être détruit, pendant la dernière guerre,  il  fut reconstruit en 1960,  est occupé par les Hauteclocque dont le Maire de Royon. Le parc est appelé le Parc du château des Barons de Hautecloque. il est privé.","habitants":"Famille de Jean-Baptiste de Bassecourt\"","divers":"Quatre châteaux dans cet article Grigny grav-1, Brevillers grav-2, et Royon grav-3.                                                  Grigny GPS : 50° 23\" 08\" Nord, 2° 04' 02\" Est                                                                                      Royon  GPS : 50° 28' 19\" Nord, 1° 59' 22\" Est","gps":"50° 23\" 08\" Nord, 2° 04' 02\" Est","images":["../image/image_62/62_Grigny_Hesdin_1.jpg","../image/image_62/62_Grigny_Hesdin_2.jpg","../image/image_62/62_Grigny_Hesdin_3.jpg"]},"Consult_chateau_formulaire8634":{"id":"Consult_chateau_formulaire8634","dept":"62","canton":"Calais","commune":"Guines","nom":"Guines","type":"Châteaux","periode":"XVI-XIX","histoire":"Quatre châteaux dans cet article de  Guines; Campagnes les Guines, Dippendal et la Gorce.                                                                                    GUINES;  dit la GARENNE est un château bâti à Campagne-Lès-Guines, vous trouverez des chambres d'Hôtes, au château de Garenne, pour vous détendre et vous reposer, dans un cadre très agréable. Thomas Tassart, château de la Garenne                                                                                     CAMPAGNES  LES GUINES, construit au XIXe siècle dans la tradition néo-classique, ce château comprend un corps de logis rectangulaire, des chaînages de pierre délimitent à chacune de ses extrémités des ailes simulées ne faisant pas saillie. Son élévation possède deux niveaux. Au rez-de-chaussée, un léger avant-corps médian, précédé lui-même dans sa travée centrale d'un petit péristyle de deux colonnes doriques que couronne un fronton triangulaire, est éclairé par deux fenêtres rectangulaires comme la porte qu'elles encadrent. Les autres baies sont cintrées; celles des fausses ailes sont flanquées de deux ouvertures rectangulaires au rez-de-chaussée pour faire écho au petit avant-corps médian surmonté à l'étage d'un triplet. Les lucarnes de la toiture sont coiffées de petits frontons triangulaires.","architecture":"La GORCE la construction du château de la Gorce date du XVIe au XIXe siècle. Il est inscrit aux M.H. partiellement depuis le 30/12/1985 pour les façades de l'ensemble des bâtiments, la Ferme, l'élévation et les toitures.                                                                        DIPPENDAL, au sud de Campagne de Guines bâti au XIXe siècle est composé d'un corps de logis long de cinq travées que prolongent sur sa gauche une aile plus basse de trois travées et sur sa droite une construction plus récente de plan polygonal. Des pilastres à refends individualisent les travées. Au rez-de-chaussée, les fenêtres, comme la porte centrale, sont rectangulaires ; leur clef rejoint une sorte de corniche qui dessine une ligne horizontale marquée, mais interrompue par les pilastres. A l'étage, les allèges des baies sont en retrait sur le parement; celles-ci sont surmontées d'un tympan cintré que relie à un larmier vlgoureux une grosse clef elle-même surmontée d'une sorte de disque saillant. Les lucarnes de la toiture à la Mansart, couronnée par un épi de faîtage, sont au nombre de trois et elles ont reçu la forme d'un il-de-buf. Du côté du parc, les dispositions de la façade sont à peu près les mêmes, à quelques détails près, le sol étant en contrebas, une terrasse bordée par une balustrade précède le château ; de ce côté, ce sont de véritables lucarnes qui éclairent l'étage mansardé, l'aile ne présente que deux fenêtres. L'ensemble de la construction a été bâti en brique; l'architecte qui a réalisé cette uvre a voulu demeurer dans la tradition néo-classique.","habitants":"Famille de Thomas Tassart\"","divers":"Quatre châteaux dans cet article Guines à Campagnes les guines grav-1, Dippendal grav-2  et  Gorce-la Garenne grav-3   GPS : 50° 50' 26\" Nord, 1° 54' 17\" Est                                                            La Gorce GPS : 50° 30' 56\" Nord, 2° 36' 42\" Est         Tour de l'horloge gps 50° 52' 08? N, 1° 52' 08? E","gps":"50° 50' 26\" Nord, 1° 54' 17\" Est","images":["../image/image_62/62_Guines_1.jpg","../image/image_62/62_Guines_2.jpg","../image/image_62/62_Guines_3.jpg"]},"Consult_chateau_formulaireabdb-2":{"id":"Consult_chateau_formulaireabdb-2","dept":"62","canton":"Avesnes-le-Comte","commune":"Habarcq","nom":"Habarcq_Duisans","type":"Château","periode":"XVIII","histoire":"deux châteaux dans cet article Habarcq et Hermaville                             HABARCQ à l'ouest de Duisans,  le château d'Habarcq a été construit au XVIIIe siècle, il est situé au centre du village attenant à l'église, qui jadis servait de chapelle castrale, ainsi les seigneurs du fief pouvaient suivre l'office. Le plus ancien seigneur du lieu connu était Armand de Habarcq, il figure en 1071 comme témoin dans une charte de Liébert, évêque d'Arras et de Cambrai. Au XIIIe siècle, le château fut brûlé au cours d'un conflit qui opposa les comtes d'Artois et de Saint Pol à propos du droit de justice dans la châtellerie d'Aubigny. Sur la place du village, il subsiste encore les restes d'une tour montée sur un soubassement à damier de silex et accolée au bâtiment d'une ferme. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 5 avril 1948.","architecture":"HERMAVILLE à cinq K.M.au nord, c'est une demeure aristocratique de la fin de l'Ancien Régime. Le château d'Hermaville date du XVIIIe siècle, est inscrit partiellement aux M.H. pour ses façades et toitures du château, à l'exclusion des communs, ses façades et toitures de l'orangerie, son parc, son potager avec son mur de clôture depuis le 28/12/1993. Le château depuis appartient à une société privée,   Le château a été construit en 1775 par Maurice Quarre de Repaire, sur l'emplacement d'un château fortifié ancien. Il résista à plusieurs attaques pendant le siège d'Arras en 1640. Il servait de point d'appui aux Espagnols, qui de là, harcelaient les troupes du Roi de France. La province d'Artois, possession des Autrichiens et Espagnols, fut définitivement rattaché à la France en 1659. Devenus maître des environs de la ville d'Arras, les Français firent raser le château, sur les fondations duquel on éleva une ferme seigneuriale. Dans le parc on a l'impression d'être dans le Kent. Deux imposantes vasques dans la pelouse, c'est une orangerie (toit refait en 2008), un joli mur de potager (le potager est à refaire), le parc descend vers deux étangs et remonte vers les champs et le bois d'Habarcq.\nÉléments protégés MH : les façades et les toitures, à l'exclusion des communs ; les façades et les toitures de l'orangerie ; le parc ; le potager avec son mur de clôture : inscription par arrêté du 28 décembre 1993.","habitants":"Famille d'Armand de Habarcq\"","divers":"deux châteaux dans cet article Habarcq grav-1 et Hermaville grav 2-3                                                      Harbacq gps  50° 18' 20.93? N, 2° 36' 38.73? E","gps":"","images":["../image/image_62/62_Habarcq_Duisans_1.jpg","../image/image_62/62_Habarcq_Duisans_2.jpg","../image/image_62/62_Habarcq_Duisans_3.jpg"]},"Consult_chateau_formulairefd7c":{"id":"Consult_chateau_formulairefd7c","dept":"62","canton":"Calais","commune":"Hames Boucres,","nom":"Hames_Boucres","type":"Château","periode":"XVIII","histoire":"HAMES,  est le nom d'un domaine seigneurial qui a existé dès le XIe siècle. Pendant la guerre de Cent ans, les Anglais s'emparèrent du château et renforcèrent ses défenses, le traité de Brétigny le leur accorda. Ce n'est qu'en 1558 qu'il fut repris par le duc de Guise et deux ans plus tard, il fut démantelé. Ce château, édifié dans la deuxième moitié du XVIIIe siècle à en juger par son allure néo classique, ne manque pas d'élégance. La construction du château du baron de Saint-Paul débute fin XVIIIe et s'achève en 1800 par la volonté de son fondateur Maximilien Thélu. Elle dura une dizaine d'années au total. Le domaine couvrait alors environ 200 hectares. Maximilien Thelu n'eut qu'un enfant, une fille qui épousa le baron Imbert de Saint Paul un noble originaire du Sud de la France. Il offrit le château, ses terres et dépendances au baron en présent de mariage.Au cours d'un séjour dans la région, le baron découvre le château et ses environs. Il apprécie tant la maison que les époux décident de s'y installer à demeure. Hames Boucres devient le berceau de la famille de Saint Paul et le restera jusquaprès la première guerre mondiale. En tout, trois générations de baron de Saint Paul vivront au château. Le dernier des Saint Paul a quitté le château en 1920, il vend alors la propriété à la famille Straetman qui sont des maraîchers.","architecture":"HAMES, ce château, édifié dans la deuxième moitié du XVIIIe siècle à en juger par son allure néo classique, ne manque pas d'élégance. Son corps de logis long de cinq travées est encadré par deux ailes qui n'en ont qu'une. Il a été construit en brique, la pierre est réservée au soubassement où s'ouvrent les soupiraux éclairant les caves, aux chaînages des angles et aux cordons horizontaux qui courent au-dessus et au-dessous des fenêtres, celles-ci sont assez hautes, de forme cintrée, à petits carreaux et elles aussi sont entourées de pierre. Au rez-de-chaussée, deux portes encadrent les trois baies centrales mais celle du milieu a dû autrefois être aussi une porte car son perron subsiste. Des lucarnes au niveau de la toiture à la Mansart correspondent exactement aux percements inférieurs. A gauche du château subsistent les bâtiments de la ferme; son logis, placé sur le même alignement que lui, est un long bâtiment de onze travées bâti également en brique et pierre. Le côté gauche de la cour est occupé par les bâtiments d'exploitation; dans le fond, un peu en arrière, un énorme pigeonnier de plan octogonal domine de sa masse la demeure du fermier.","habitants":"Famille de Saint Paul\"","divers":"château d'Hames à Boucres","gps":"","images":["../image/image_62/62_Hames_Boucres_1.jpg","../image/image_62/62_Hames_Boucres_2.jpg"]},"Consult_chateau_formulaire4b7c":{"id":"Consult_chateau_formulaire4b7c","dept":"62","canton":"Outreau","commune":"Condette_Dannes","nom":"Hardelot","type":"forteresse","periode":"XVIII","histoire":"HARDELOT, au XIIIe siècle, le comte de Boulogne Philippe Hurepel a fait édifier un puissant château-fort de pierre. Son père, le Roi de France Philippe-Auguste, souhaitait en effet conforter ses territoires à lOuest et au Nord et se prémunir des velléités du Roi dAngleterre (Richard Cur de Lion, puis Jean-sans-Terre) et à limiter la puissance de la Flandre. Cest dans ce contexte quont été construits les châteaux de Montreuil-sur-Mer et dHardelot. La construction est achevée dans un climat politique tendu, Hurepel sétant ouvertement opposé à la mère de son jeune neveu Louis IX, la reine-régente Blanche de Castille. Le château-fort était alors une enceinte fortifiée de forme polygonale, composée de 10 imposantes tours reliées par de hautes courtines. Un châtelet dentrée muni dun pont-levis, dune herse et dun assommoir en commandait laccès. Chose tout à fait singulière, signe de lopulence des comtes de Boulogne. Outre sa fonction défensive, le château était également une demeure de plaisance où les comtes de Boulogne résidaient, allaient à la chasse et festoyaient. En 1544, lors du siège de Boulogne par Henri VIII dAngleterre, ses ambassadeurs et ceux du Roi de France François 1er se sont rencontrés et ont négocié au château dHardelot. Dans une lettre adressée à son épouse Catherine ,la seule qui lui survivra, Henri VIII qualifiait Hardelot de maison forte. En 1615, la régente catholique Marie de Médicis, mère du jeune Louis XIII, a envoyé son favori, lambitieux et très contesté Maréchal dAncre, Concino Concini, assiéger . Le château était devenu un fief de protestants belliqueux et appartenait alors au marquis de Bonnivet, qui a déplu à la reine de telle sorte quil est accusé de lèse-majesté. Il semble que le siège ait été particulièrement rude, laissant le château en bien triste état.","architecture":"HARDELOT, Mais Bonnivet est parvenu à senfuir à Londres, laissant sur place femme et enfant. La Régente a ordonné alors le démantèlement du château en signe de soumission totale à son autorité. En 1848 sir John Harenouveau propriétaire fait construire le manoir néogothique En 1899, à la mort dHenry Guy, le château a été vendu à John-Robinson Whitley. Celui-ci, industriel mais également co-fondateur du Touquet-Paris-Plage, souhaitait créer une nouvelle station balnéaire afin dy accueillir la gentry britannique et française. Il a créé en 1905 la société nonyme dHardelot, le golf est inauguré en 1906 par le duc dArgyll, beau-frère du Roi dAngleterre Edward VII. Elle a pris le nom du château : Hardelot-Plage est née. Le château d'Hardelot est appelé le Centre Culturel de l'Entente Cordiale. C'est un manoir de style néo-gothique, construit par un anglais, au XIXe siècle, sur les ruines d'un ancien château fort datant du XIIIe siècle. Le château dHardelot a retrouvé son atmosphère victorienne en 2014, propriété de la commune depuis  1987.                                                                       La Maison Diocésaine appelée les TOURELLES est bâtie à Condette, Les Tourelles : maison d'accueil diocésaine qui organise des sessions religieuses, des formations, des préparations au mariage et anime des groupes de réflexion. Ces 3 monuments sont à découvrir à Condette et sont inscrits aux M.H. : Le château d'Hardelot, Les Tourelles et le Manoir du Grand Moulin (inscrit le 12/08/1998).","habitants":"comte de Boulogne Philippe Hurepel \"","divers":"Hardelot grav 1 à 7                                                                                                                                GPS : 50° 38' 44\" Nord, 1° 36' 41\" Est                                                             le Tourelles grav-8","gps":"50° 38' 44\" Nord, 1° 36' 41\" Est","images":["../image/image_62/62_Hardelot_1.jpg","../image/image_62/62_Hardelot_2.jpg","../image/image_62/62_Hardelot_3.jpg","../image/image_62/62_Hardelot_4.jpg","../image/image_62/62_Hardelot_5.jpg","../image/image_62/62_Hardelot_6.jpg","../image/image_62/62_Hardelot_7.jpg","../image/image_62/62_Hardelot_8.jpg"]},"Consult_chateau_formulaire7d81":{"id":"Consult_chateau_formulaire7d81","dept":"62","canton":"Calais","commune":"Hardinghen","nom":"Hardinghen","type":"Châteaux","periode":"XVI-XVII-XVIII","histoire":"Trois châteaux dans cet article, Hardinghen, Hervarre, et la Trésorerie.                      HARDINGHEN, ce château élevé en brique et pierre est daté de 1754 par l'un des claveaux de sa porte d'entrée. Sa principale caractéristique est qu'au lieu de présenter en façade un avant-corps saillant, celle-ci dessine à cet endroit une sorte d'hémicycle concave; la toiture, cependant, est rectiligne, elle forme ainsi un grand auvent supporté par deux consoles au-dessus de cette partie médiane. Deux ailes en retrait prolongent la façade mais, dans ce retrait, on a logé deux petits pavillons qui prennent l'allure d'une petite tour réduite à un seul niveau et coiffée d'une toiture à la Mansart. La pierre a été réservée au soubassement, aux angles de l'édifice, aux encadrements des fenêtres et aux cordons qui prolongent leurs appuis et leurs cintres. Les fenêtres, une de part et d'autre de la porte centrale tracée en plein cintre, sont de trois à l'étage de l'hémicycle, deux par niveau de part et d'autre de celui ci, ne sont que légèrement cintrées. Le comble ne présente de lucarnes qu'à ses extrémités, une de chaque côté.                                                                                                          HERVARRE, à Saint-Martin d'hardinghen La tour construite au XVe ou XVIe siècle, assez imposante, est dotée de mâchicoulis aveugles et d'un étage. En 1727 la seigneurie est achetée par Jacques François Macau, conseiller pensionnaire, puis lieutenant général au bailliage de Saint-Omer. Le corps de logis a peut-être été bâti par Macau, car on pouvait lire sur une pierre gravée J-F Macau. La demeure sera l'objet de modifications ultérieures, l'une d'entre elles pouvant se situer en 1787. Le corps de logis possède une aile courte perpendiculaire, le tout d'allure classique; l'une des façades, en brique et pierre, a été remaniée au XIXe siècle.","architecture":"TRESORERIE, ce petit château de style classique est achevé en 1768 pour Pierre Cazin, seigneur d'Honnincthun (1725-1807), et Augustine Cléry, son épouse. Cazin fut receveur de S.A.S. Monseigneur l'Amiral de France au Port de Boulogne-sur-Mer, dont il est originaire, adjudicataire de l'Octroi du Boulonnais, industriel et maire de Hardinghen (1801). Il était le fils d'Alexis Cazin de Neuville (°1684), avocat fiscal (1711), syndic et député de la province du Boulonnais, seigneur de Neuville, Honninchun, Vaserie, Beaurepaire, etc.  Pierre Cazin était l'ami et devint l'associé du vicomte François-Joseph-Théodore Desandrouin dans l'exploitation des mines et de la verrerie d'Hardinghen. Ils créèrent ensemble la Société Desandrouin-Cazin. Acquis en 2004 par un promoteur.","habitants":"Hervarre Famille de Jacques François Macau                Tresorerie Famille de Pierre Cazin\"","divers":"trois châteaux dans cet article, Hardinghen grav-1, Hervarre grav-3-2 et la Trésorerie grav-4.","gps":"","images":["../image/image_62/62_Hardinghen_1.jpg","../image/image_62/62_Hardinghen_2.jpg","../image/image_62/62_Hardinghen_3.jpg","../image/image_62/62_Hardinghen_4.jpg"]},"Consult_chateau_formulaire3417":{"id":"Consult_chateau_formulaire3417","dept":"62","canton":"Bapaume","commune":"Havrincourt","nom":"Havrincourt","type":"Château","periode":"XVIII","histoire":"HAVRINCOURT, le château a été édifié vers 1880, à la place dun ancien château brûlé à la Révolution. Il est situé au centre du village et appartient depuis plus de 350 ans à la famille de Cardevacque dHavrincourt. Il a servi de siège détat major vers 1916, lors de loccupation allemande. En 1917, se trouvant sur la ligne Hindenburg, il a été miné par les Allemands. La première pierre du château actuel fut posée le 23 juin 1928 et bénie par M. le Doyen Ducrocq.","architecture":"HAVRINCOURT, le château actuel est une réplique du château poitevin de Saint-Loup-sur-Thouet. Les architectes Molinie et Nicoud en ont confié lexécution à lentreprise Dutoit à Fontaine Notre Dame. Les cinq corps de logis accolés sont coiffés de hautes toitures indépendantes. La façade en brique et pierre entoure de grandes fenêtres. Le parterre à la française entre deux communs élevés dans le même style. La façade arrière est précédée dune terrasse monumentale et dun escalier à double volée, la grille provient de lancien château de Vélu détruit pendant la Grande Guerre et non reconstruit.","habitants":"Famille de Cardevacque dHavrincourt.\"","divers":"Château d'Havrincourt à Havrincourt gps   50° 06' 34? N, 3° 05' 06? E","gps":"","images":["../image/image_62/62_Havrincourt_1.jpg"]},"Consult_chateau_formulaire6954":{"id":"Consult_chateau_formulaire6954","dept":"62","canton":"Brebières","commune":"les Cagnicourt","nom":"Hendecourt","type":"Château","periode":"XVII-XIX","histoire":"HENDECOURT les CAGNICOURT   En 1222, Baudouin Comte de Flandre, Régent du royaume, érigea à Hendecourt au profit de Bozon de Gand le fief de Grincourt. Ce fief avait titre de Baronnie de Saint Waast. Le Mont d'Hendecourt qui se trouve derrière le château renferme de vastes carrières souterraines d'où venaient les grès qui ont servi à la construction de la tour de l'église Saint Waast. L'ancien château, qui existe déjà en 1701, moins haut que l'actuel mais deux fois plus long, a été détruit en 1917 par les Allemands, ainsi que le parc, pilonné par les obus. Le château actuel a été reconstruit en 1927 grâce à Joséphine de Veyrac de Grincourt dans un pur style art déco en pierre de Compiègne et de Conche d'après un projet de l'architecte Langelez de Paris. Le parc de sept hectares et demi fut complètement redessiné par les Ets Vilmorin qui y plantèrent 450 arbres différents. Dans le parc une très jolie chapelle en pierre de Compiègne dédiée à Notre Dame des Ardents. En 1999 suite au décès de Jean baron Reboulh de Veyrac Blin de Grincourt, le domaine est transmis en legs à sa fille Chantal, épouse Topart de Moriame.","architecture":"HENDECOURT, les Ransart, la seigneurie ayant appartenu aux Mailly dAuthuyle dès 1300, elle passa en 1408 par mariage aux Guines de Hames puis vers 1535, également par mariage aux dHalluin. Antoine dHalluin vendit cette seigneurie aux Le Sergeant en 1578. Cette dernière famille en prit le nom et la conserva jusquen 1878. Elle est aujourd'hui connue sous le nom de « Le Sergeant d'Hendecourt » et subsiste en France et en Belgique. La Famille Le Sergeant d'Hendecourt-Gontreuil a pour devise « Sans estre je suis sergeant ». Le premier château fut construit, vers 1703, pour Louis-Joseph Le Sergeant dHendecourt, sur lemplacement dune ancienne demeure. Acquis en 1878, par Frédéric de Diesbach de Belleroche, il a été détruit en 1914-1918 puis reconstruit de 1920 à 1929. Le château et sa ferme furent vendus en 1878 aux Diesbach de Belleroche, originaires de Fribourgen Suisse, qui les possèdent encore, aujourd'hui. Une petite seigneurie sise à Hendecourdel dépendait également de la commune actuelle. Le 2 avril 1583, est rendue une sentence de noblesse pour Gérard de Vos, seigneur de Beaupré, Hendecourdel, gouverneur et bailli de la principauté d'Épinoy (princes d'Épinoy). Elle devint ensuite la propriété des Saveuzes qui la vendirent en 1703 aux Le Sergeant qui la réunirent à la principale. Le village a été entièrement détruit en 1914-1918 puis reconstruit. La commune est citée à lOrdre de larmée.","habitants":"Famille de Veyrac de Grincourt\"","divers":"Deux châteaux dans cette article à Hendecourt ; Cagnicourt grav-1-2  et au  Ransart grav-3                                    GPS : 50° 12' 21\" Nord, 2° 43' 59\" Est","gps":"50° 12' 21\" Nord, 2° 43' 59\" Est","images":["../image/image_62/62_Hendecourt_1.jpg","../image/image_62/62_Hendecourt_2.jpg","../image/image_62/62_Hendecourt_3.jpg"]},"Consult_chateau_formulairec3c2":{"id":"Consult_chateau_formulairec3c2","dept":"62","canton":"Outreau","commune":"Isques","nom":"Hermerangues","type":"Châteaux","periode":"XVI-XVII","histoire":"deux châteaux dans cet article Hermerangues, Quehen.                HERMERANGUES, demeure commencée avant 1759 pour la famille Briche-Bonvalet. Jean-Nicolas Briche devint directeur général des fermes du Roi au département de Saint-Malo et il obtint des lettres du maintenue de noblesse. Construction terminée dans le troisième quart du XVIIIe siècle pour Jean Nicolas Briche. Pendant la Révolution, Jean Nicolas disposait d'une grosse fortune acquise dans la gestion des biens, il tenta de faire oublier sa noblesse récente, mais il n'en fut pas moins incarcéré et mourrut à la prison des Baudets à Arras. En 1797 Son épouse vendit la propriété le 3 floréal an V à Jacques Antoine Sauvage de Combeauville juge de paix du canton de Samer.  En 1804 et 1805, l'état major prépare depuis Boulogne une attaque contre l'Angleterre, le pavillon acceuille les services de la secrétaire d'état sous l'autorité de Maret futur duc de Bassano. Son adjoint Agaston Fain dont Napoléon fera à partir de 1806 son secrétaire particulier, il sera témoin au mariage d'Arthemise Sauvage avec Joseph Sansot Lieutenant aux chasseurs à cheval. En 1859 le fils de ce ménage Alphonse Sansot cède le domaine à l'un de ces cousins Louis Carmier. La demeure est restée dans la descendance de ce dernier                                         En  agrandissements en 1912, puis incendie en 1942 (destruction des combles), transformation des parties hautes après l'incendie, disparition de l'étage  par une  balustrade de pierre réduite à son rez-de-chaussée, s'organisant en un étroit  corps central que flanquent deux ailes rectangulaires faisant saillies sur la façade postérieure, sur la façade d'arrivée  une porte centrale offre à sa clef  un mascaron sous une corniche moulurée, sur la façade postérieure un avant-corps semi-circulaire éclairés par trois portes-fenêtres.","architecture":"QUEHEN, la partie Est du château est datable du XVIIe siècle. En 1620 se transmet à la famille de Disquemue qui le possèdera jusqu'au XIXe siècle Au XVIIe siècle. Construction du corps de logis. Agrandissement et aménagement de la façade sur jardin, datables du XVIIIe siècle. Écu sculpté réemployé dans un mur des écuries et provenant d'un portail détruit en 1890 (porte la date 1653). Au XIXe siècle le domaine passe par alliance à la famille de Rosny.  le domaine  appartient aujourd'hui à une branche  de la famille du Plessis d'Argentré.  Au XIXe siècle Louis-Antoine de  Dixmude de Hames hérite de l'ancêtre de l'actuel propriétaire. Reste d'ancrage daté, façade sur jardin du logis, reste d'un ancrage daté de 1783 d'après le style de la façade, l'édifice du corps de logis de forme rectangulaire  est appareillé en pierre de pays et élevée sur un rez-de-chaussée, un étage carré et un étage de comble, logement du fermier et logement du châtelain sous le même toit, l'un ouvert sur une cour de ferme et l'autre sur jardin. Le logis à étage est couvert d'ardoise, les bâtiments agricoles en rez-de-chaussée couverts en tuile flamande mécanique sauf le colombier couvert en ardoise.","habitants":"famille de  Jean Nicolas Briche                                        Queyen; famille de Disquemue.\"","divers":"Deux châteaux dans cet article Hermerangues grv-2-3, Quehen grav-1.","gps":"","images":["../image/image_62/62_Hermerangues_1.jpg","../image/image_62/62_Hermerangues_2.jpg","../image/image_62/62_Hermerangues_3.jpg"]},"Consult_chateau_formulaire2c85":{"id":"Consult_chateau_formulaire2c85","dept":"62","canton":"Outreau","commune":"Hesdin l","nom":"Hesdin_L","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteux dans cet article; Questrecques, Cléry et Valyvon.                   A quelques K.M. à l'Est d'Hesdin ;                                                                                    QUESTRECQUES Le premier seigneur connu de la terre de Questrecques est Jean de La Rivière en 1488. Elle change fréquemment de mains jusqu'au début du XVIIe siècle. En 1551 la terre est à Philippe Le Grand, c'est lui qui fait reconstruire le château. En 1610, le château est à Philippe Destailleur, mayeur de Calais. La famille Destailleur conserve la terre et la seigneurie jusqu'en 1740, puis elles passent par héritage aux familles de La Haye et de Bernes. En 1850, vente à la famille Marteau, puis la demeure passe à la famille Huguet, qui la possède encore actuellement. Bâtiments de ferme XVIIIe siècle. Petits bâtiments agricoles ajoutés au XIXe siècle, remplaçant une demeure reconstruite vers 1550. Ailes détruites après 1813, date de l'ancien cadastre. Corps de logis surélevé d'un étage au XXe siècle.                                                                           VALYVON   En 1684, Anne-Françoise Postel épousa Jean Testart, écuyer, seigneur de Rossinoy; jusqu'en 1824, le Valyvon resta dans cette famille. Vers 1720, leur fils, Charles Testart, qui avait acquis la seigneurie du lieu et se faisait appeler M. de Campagne, entreprit la construction du château, son fils, Charles-François, acheva les travaux vers l780 ; le pigeonnier de la ferme attenante porte la date de 1783. En 1924, le château a été vendu à la famille de Hauteclocque de Royon. Il appartient au comte et à la comtesse de Loyré d'Arbouville de Hauteclocque. Valyvon est une construction en brique et pierre, le crépi qui recouvre le premier de ces matériaux a disparu en maints endroits. Il est constitué par un corps de logis rectangulaire, des pilastres à refends divisent la façade en cinq parties. Un double cordon horizontal sépare les deux niveaux de l'élévation. A la base de la toiture en croupe, une balustrade correspond aux quatre travées centrales; mais celle-ci s'interrompt partiellement au droit des deux travées axiales.","architecture":"HESDIN L'ABBE dit de CLERY, château construit en 1766 pour Michel Cléry de Bécourt. Pavillons latéraux datables du XIXe siècle, bâtis après 1813, date de l'ancien cadastre. Décor de la cour d'honneur exécuté en 1783: obélisque, colonnes disparus aujourd'hui. Résidence du maréchal Berthier en 1804, durant le camp de Boulogne. Au lendemain de la seconde guerre mondiale, il a été acquis par M. Dominique de Roquette. Une belle allée d'arbres mène à ce château, conçu comme l'une de ces \"Bagatelles\" que l'on aimait construire au XVIIIe siècle.  Son propriétaire  actuel Najeti Hôtels & Golfs. Réalisé en pierre grise du pays, dissimulée sous un enduit au XIXe siècle lorsque l'on a ajouté les ailes basses, il a été monté sur un important soubassement, son élévation présente deux niveaux que coiffe un toit à la Mansart. En leur centre, ses deux façades sont dotées d'un avant-corps saillant aux angles arrondis, de part et d'autre deux fenêtres éclairent à chaque niveau les pièces de l'intérieur. Comme dans la plupart des édifices de ce genre, à la porte centrale correspond un vestibule d'où part à gauche l'escalier principal dont la rampe en fer forgé de style Louis XV est fort élégante. En arrière, la salle à manger prend jour sur le parc par les trois baies de l'avant-corps. Le salon à droite est éclairé du côté de la cour comme du côté du parc. Le billard est logé dans l'aile de droite et la cuisine dans celle de gauche.","habitants":"Qestrecques famille Destailleur                                          Valyvon; Famille de Charles Testart \"","divers":"Trois châteux dans cet article; Questrecques grav 4-, Cléry grav_1-2 et Valyvon Clery  3-5-  GPS : 50° 40' 10\" Nord, 1° 40' 55\" Est","gps":"50° 40' 10\" Nord, 1° 40' 55\" Est","images":["../image/image_62/62_Hesdin_L%27Abb%c3%a9_1.jpg","../image/image_62/62_Hesdin_L%27Abb%c3%a9_2.jpg","../image/image_62/62_Hesdin_L%27Abb%c3%a9_3.jpg","../image/image_62/62_Hesdin_L%27Abb%c3%a9_4.jpg","../image/image_62/62_Hesdin_L%27Abb%c3%a9_5.jpg"]},"Consult_chateau_formulaired3a8":{"id":"Consult_chateau_formulaired3a8","dept":"62","canton":"Lumbres","commune":"Hucqueliers","nom":"Hucqueliers","type":"Château","periode":"XVI-XVII-XIX","histoire":"HUCQUELIERS, du château construit à la fin de la période gothique et démantelé en 1662, il ne reste guère que la base écroulée d'une tour. A la place, on a bâti au XIXe siècle un corps de logis encadré de deux tours, l'une de plan circulaire à droite, l'autre de plan polygonal à gauche, de ce côté se greffe en retour d'équerre une aile aboutissant à un pavillon carré en forme de tour. A l'ensemble se sont adossées au XXe siècle des annexes : les unes se sont logées dans l'angle rentrant, formé par l'intersection des deux logis principaux, une autre prolonge vers le fond le pavillon carré.","architecture":"HUCQUELIERS, la construction du XIXe siècle a été réalisée en brique, y compris le cordon séparant les deux niveaux de l'élévation et l'imitation d'un appareil à refends encadrant la porte centrale de la façade et les pilastres délimitant cette travée. La pierre se rencontre aux encadrements des fenêtres légèrement cintrées et aux modillons supportant l'arcature de la corniche du pavillon. Pour racheter la déclivité du terrain, une terrasse, correspondant à un niveau entier, précède la façade principale ; la terrasse repose sur quatre arcades à claveaux alternés de pierre et de brique, celle de gauche supporte le perron de l'escalier d'accès, les autres reposent sur de fines colonnettes, la terrasse s'incurve à ses extrémités pour envelopper les tours. La façade présente une élévation dissymétrique entre les deux tourelles la délimitant et que coiffent l'une, une pyramide, et l'autre, une poivrière.","habitants":"Seigneurs locaux\"","divers":"château d'Hucqueliers Gps 50° 34' 11? N, 1° 54' 24? E","gps":"","images":["../image/image_62/62_Hucqueliers_1.jpg","../image/image_62/62_Hucqueliers_2.jpg"]},"Consult_chateau_formulaire8663":{"id":"Consult_chateau_formulaire8663","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Humeroeuille","nom":"Humeroeuille","type":"Château","periode":"XVIII","histoire":"HUMEROEUILLE, la construction du château date de la 1ère moitié du XVIIIe siècle. Le château de Humeroeuille fait partie de ces demeures campagnardes qui s'apparentent à des gentilhommières. Il date de 1717, période de transition où l'on passe du manoir défensif à une demeure de plaisance, mieux adaptée, à l'art de vivre à la campagne. Il appartenait à Jacques-Onulphe de Belvalet. Château appartient à la société du Plantis. Jean-Charles de Boncourt a hérité de cette superbe gentilhommière.\nÉléments protégés MH : les façades et les toitures du château et des communs, en totalité, l'escalier d'honneur : inscription par arrêté du 13 février 2013.","architecture":"HUMEROEUILLE, est composé dun corps de logis simple de cinq travées, flanqué de deux ailes légèrement saillantes dune travée chacune ; de hautes toitures dardoises à noues, une façade de brique où la pierre vient marquer les angles, les encadrements de baies et les divisions horizontales, ce corps est prolongé sous la restauration de deux ailes dans le prolongement de deux travées chacune et de même ordonnancement que le corps principal. Le parc datant de 1785 est un parc irrégulier, remanié depuis 1985 composé dune avenue de châtaigniers bordée de haies de hêtre et de tilleuls palissés ainsi que dun labyrinthe de charmes. Cette avenue aboutit sur la pelouse de la cour dhonneur précédée de trois chambres de verdure parfumées aux roses anciennes, hydrangeas, arbustes et vivaces. Le parc descend ensuite vers la campagne, composé dune prairie fleurie autour de quelques bosquets darbres rares et dun bois dont les sous-bois sont aménagés et entretenus.","habitants":"Famille de Jacques-Onulphe de Belvalet.\"","divers":"Humeroeuille à Humeroeuille                 GPS : 50° 24' 19\" Nord, 2° 12' 51\" Est","gps":"50° 24' 19\" Nord, 2° 12' 51\" Est","images":["../image/image_62/62_Humeroeuille_1.jpg","../image/image_62/62_Humeroeuille_2.jpg"]},"Consult_chateau_formulaire22f7":{"id":"Consult_chateau_formulaire22f7","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Humières","nom":"Humières","type":"Château","periode":"XVII","histoire":"HUMIERES, ce château a appartenut au marquis d'humières au XVIIe siècle fut reconstruit en 1787 pour la famille Hubert à qui l'on doit  le parc et ses perspectives. A l'abandon de 30 ans, le chateau est en train de renaitre grace au conservateur Stephan Botte qui envisage d'en faire un lieu de vie et un pôle touristique. Les travaux ont commencé depuis deux ans. Les façades et toitures du château de Humières et les communs bordant la cour d'honneur sont inscrits aux M.H. 22/01/1988  C'était au XVIIe siècle un rendez vous de chasse appartenant au duc d'Humières, sa petite fille, la duchesse de Guiche céda le domaine en 1780 à Charles Antoinne Hubert, écuyer, seigneur d'Humières et de Mons-en-Baroeul. Propriété de monsieur de Prémont.","architecture":"HUMIERES,  le château a été construit entre 1780 et 1787 date inscrite sur l'escalier. Disposé entre deux pavillons légèrement saillants, le corps central est décoré de chaînes en bossage qui encadrent trois baies cintrées au rez-de-chaussée et à l'étage que surmonte un attique sommé d'un fronton. Edifiée en craie sur la cour, la façade est en brique et en pierre sur le parc. En 1820, furent bâtis les communs  en pierre blanche à arcades encadrant la cour. Sous napoléon III, ajout de deux ailes au corps de logis, ainsi que deux tourelles carrées sur la façade arrière. Éléments protégés MH : les façades et les toitures du château et des communs bordant la cour d'honneur : inscription par arrêté du 22 janvier 1988.","habitants":"Famille de Stephan Botte\"","divers":"Humières à Humières                          GPS : 50° 23' 20\" Nord, 2° 12' 29\" Est","gps":"50° 23' 20\" Nord, 2° 12' 29\" Est","images":["../image/image_62/62_Humi%c3%a8res_1.jpg"]},"Consult_chateau_formulaire4e58":{"id":"Consult_chateau_formulaire4e58","dept":"62","canton":"Avesnes-le-Comte","commune":"Hénu","nom":"Hénu","type":"Château","periode":"XVII","histoire":"HENU,  ce château fut construit en 1745 par la famille de Coupigny, récente propriétaire du fief, et achevé rapidement: les communs portent la date de 1749. La Révolution le transforma en fabrique de chicorée mais sans dommage. Quelques décorations intérieures furent entreprises à cette époque. Laissé à l'abandon, il fut acheté et remis en état par M. Charles-Joseph-Alfred le Mestre de Pas, comte Romain qui le remet en état et s'emploie à effacer les traces des outrages du passé. La demeure dont hérita à son décès Paul-Amédée de Pas époux de Marie de Crayencour est resté dans sa descendance, et après être échue par mariage aux Guigué, appartient aujourd'hui à la famille Boudoux d'Hautefeuille.","architecture":"HENU, une allée privée mène de la route de Pas à la cour d'honneur par un portail aux piliers carrés, accosté d'un portillon. Le mur de clôture dessine, de part et d'autre, un S pour rejoindre à droite les dépendances et à gauche, l'entrée de la ferme et des remises, aux élégants portails à refends. Le château ferme cet espace, où partout la note claire des pierres vient apporter un rythme vertical à l'orangé de la brique, mis en valeur par le vert de la pelouse. Daté par ses ancres de 1745, il est, sur ses trois niveaux, percé de 33 ouvertures, dont deux portes. La travée principale, en pierre, est soulignée, au rez-de-chaussée, par deux pilastres à chapiteaux ioniques. L'escalier entièrement en bois, est installé dans une cage qui occupe trois travées de façade et toute la profondeur du château, il s'élève sur deux niveaux, le long des parois, par une série de six volées entrecoupées de petits et grands paliers. Éléments protégés MH : les façades et les toitures ; l'escalier avec sa rampe en bois sculpté : classement par arrêté du 6 octobre 1977.","habitants":"famille de Coupigny\"","divers":"Château d'Hénu gps 50° 09' 20? N, 2° 31' 15? E","gps":"","images":["../image/image_62/62_H%c3%a9nu_1.jpg","../image/image_62/62_H%c3%a9nu_2.jpg"]},"Consult_chateau_formulaire58ac":{"id":"Consult_chateau_formulaire58ac","dept":"62","canton":"Berck","commune":"Montcravel","nom":"Hérambault","type":"Château","periode":"XVII","histoire":"HERAMBAULT à Montcavrel.  Pour pouvoir supporter les lourdes dépenses qui découlaient de l'entretien des gens de guerre, Jean III de Monchy, seigneur de Montcavrel, fut contraint de bailler à rentes le fief d'Hérambault à Guilbert Dubois, médecin à Montreuil, au XVIe siecle, en 1528 à la famille de Sergeant à laquelle succèdent en 1698 passe aux Longavesne, en 1722 par alliance aux Roubier riche famille de laboureur   qui la possédèrent jusqu'en 1864;  en 1845 construction du château par Alexandre Roubier qui décède en 1864 sans descendance directe Hérambault revient à sa soeur veuve de Louis-Joseph Dacquin conseiller général du Pas-de-Calais et sous préfet, meurt en 1865 laissant ses biens aux Lereuil d'Hesdin ses cousins eux mêmes transmettent à la famille aux de Contes des Granges qui constituent une branche de la famille de Créquy .","architecture":"HERAMBAULT ,le château actuel a été édifié en 1845, comme l'indique une pierre gravée de la façade, par le dernier des Roubier, député du Pas-de-Calais. Précédé d'une terrasse composé d'un rez-de-chaussée et d'un étage, ce petit château offre un plan quadrangulaire dont les angles s'arrondissent en tourelles coiffées de toitures prismatiques. Elevé sur un rez-de-chaussée et un étage il présente un plan quadrangulaire et cantonné à ses angles de tourelles rondes coiffées à toits pointus, sur le petit côté, perpendiculaire à la cour que ferme une grille, la porte d'entrée est surmontée d'une clef sculptée, on retrouve également les clefs sculptées sur les fenêtres du rez-de-chaussée de la façade. Le comble est doté sur chacune des faces de l'édifice d'une lucarne d'inspiration gothique, que somme un pignon triangulaire.","habitants":"Famille de Guilbert Dubois\"","divers":"Château d'Hérambault à Montcravel","gps":"","images":["../image/image_62/62_H%c3%a9rambault_1.jpg","../image/image_62/62_H%c3%a9rambault_2.jpg"]},"Consult_chateau_formulaired3cf":{"id":"Consult_chateau_formulaired3cf","dept":"62","canton":"Arras","commune":"St-Laurent de Blagny","nom":"Immercourt","type":"Château","periode":"XVIII-XIX","histoire":"IMMERCOURT   Vers 1775, François Joseph Gonsse fit élever un château entouré d'un beau parc. Le manoir échappe à la saisie et à la vente sous la Révolution Française. En 1812, la propriété passe dans la famille Payen-Delinsel qui l'agrandit par l'achat du marais communal en 1905. La grande guerre ne laissera des bâtiments que des ruines. Reconstruit dans les années 1920, Immercourt recevra des visiteurs de marque : le Président de la république Albert Lebrun, le général Gamelin le 9 février 1940 et Lord Gort, chef du corps expéditionnaire Anglais. C'est ici qu'aurait été décidé le débarquement allié à Narwick en Norvège. En 1940, Immercourt aura le sinistre privilège d'accueillir Adolf Hitler et Hermann Goering. Entre 1945 et 1992, le château aura plusieurs propriétaires avant de devenir propriété communale le 22 décembre 1992. Son parc a une superficie de 8 hectares. De Mingoval en passant par Marles-les-Mines, de la Grand'Place d'Arras au château d'Immercourt de Saint-Laurent-Blangy, nous vous proposons de revenir sur les pas du Chevalier Alexandre Gonsse de Rougeville en Artois.","architecture":"IMMERCOURT, de plan rectangulaire avec deux pavillons saillants sur les flancs sur un imposant soubassement, à deux niveaux plus combles toutes les portes fenêtres du niveaux un sont à arc arrondies ainsi que les fenêtres centrale des combles surmonté d'un fronton sur le corps d'entrée de trois travées. Tous les angles des murs à refends. Éléments protégés MH : les façades et les toitures du château et des communs, en totalité, l'escalier d'honneur : inscription par arrêté du 13 février 2013.","habitants":"Famille deFrançois Joseph Gonsse \"","divers":"Immercourt  à St-Laurent de Blagny","gps":"","images":["../image/image_62/62_Immercourt_1.jpg","../image/image_62/62_Immercourt_2.jpg"]},"Consult_chateau_formulaire62a0":{"id":"Consult_chateau_formulaire62a0","dept":"62","canton":"Boulogne sur mer","commune":"Isques","nom":"Isques","type":"Domaine","periode":"XVII","histoire":"ISQUES, Le château a longtemps appartenu à la famille de ce nom, l'une des plus anciennes du Boulonnais. En 1675, la terre fut érigée en vicomté; en 1766, par mariage elle passa au comte de Sainte Aldegonde et en 1807 au marquis d'Ennetières. En 1885, le manoir a été acquis par la famille Guerlain. Ce château comprend une basse-cour de forme irrégulière, entourée de bâtiments divers.","architecture":"ISQUES, il est établi sur une motte, ses bâtiments s'ordonnent autour d'une cour accessible par une porte charretière qui s'ouvrait sur l'extérieur. Le corps de logis situé à l'Est, bas et peu éclairé, abrite une grande cheminée de grès. Il est dominé du côté de la cour par une tourelle octogonale construite comme le logis en brique; elle a conservé quelques corbeaux de mâchicoulis et contient un escalier en pierre. Une autre tour ronde, en grès, marque l'angle nord-ouest de l'ensemble, elle s'ouvre a un niveau plus bas que la cour par l'intermédiaire d'un petit escalier. De ses trois portes en plein cintre, deux ne sont accessibles que par des échelles, le rez de chaussée.                                                             Corps de logis vraisemblablement XVIe siècle. Aile vraisemblablement 1ère moitié XVIIe siècle. Colombier construit en 1559 (porte la date) , restauré en 1623 (porte la date). Un mur de clôture daté 1551. Moulin détruit, figurait sur le plan cadastral de 1813.","habitants":"Famille des Isques\"","divers":"Domaine d'Isques  gps 50° 40' 36? nord, 1° 39' 03? est","gps":"","images":["../image/image_62/62_Isques_1.jpg","../image/image_62/62_Isques_2.jpg","../image/image_62/62_Isques_3.jpg"]},"Consult_chateau_formulaire48bb":{"id":"Consult_chateau_formulaire48bb","dept":"62","canton":"Outreau","commune":"Nesles les verlincthun","nom":"La_Haye","type":"Château","periode":"XVII","histoire":"La HAYE, les seigneurs et propriétaires successifs de la Haye: en 1477, le fief, tenu du Chocquel, la seigneurie est tenu par la famille de Bilque. appartient à Collenet de Bilque, en 1553, le fief passe à Jeanne de Bilque, et dame de Laye, sa fille, Marguetite de Reblingues, marié à Gilles Sohier, écuyer lui succède, mais ne semble pas avoir occupé le manoir. En 1578  elle donne le domaine à bail se reservant une chambre avec fermage de 150 écus plus 6 septiers de blé et dix pots de beurre.  En 1599 le domaine est vendu par  Marguerite de Bécourt, femme de Jean de Hocquinhem seigneur de Rincquesent à Elisabeth de Houzel  femme de charles Bron.  En 1650 La Haye est à Louis le Carlier, seigneur de Neufchâtel, et passe vers 1659 à Philippe le Carlier, en 1662 la Haye est à Louis le Carlier, fils du précédent, chevalier, seigneur de Quehen et la Haye, du Neufchâtel et de Harly en Santerre. Vers 1670 la Haye est à Antoine de Patras de Campaigno, sénéchal du Boulonnais. En 1677  encore Jean de la Wespierre écuyer, et en 1685, les biens du consistoire de la Haye au profit de l'hopital de boulogne. Vers la fin du XVIIe siècle la Haye est à Antoine de Patras de Campaigno, sénéchal du Boulonnais En 1785 l'acquéreur de la Haye est baron de Fresnoye. Du début du XXe siècle à nos jours, transmis par alliance  appartient à la famille de Ternas.","architecture":"La HAYE, Logis du XVIe siècle ; portail, pigeonnier, étable à chevaux construits dans la deuxième moitié du XIXe siècle; parties agricoles reconstruites dans la deuxième moitié du XIXe siècle, après 1870 ; puits détruit après 1875 lieu de rassemblement protestant au milieu du XVIIe siècle sous la seigneurie de Louis le Carlier, et une salle du logis est dite temple; se compose d'un corps de logis carré couverts de deux toits en croupes juxtaposés que cantonnent quatre tourelles carrées contenait les latrines, l'ensemble est construit en brique avec encadrement des fenêtres en grès.","habitants":"Famille de Louis le Carlier,\"","divers":"château de la Haye Nesles les Verlincthun","gps":"","images":["../image/image_62/62_La_Haye_1.jpg"]},"Consult_chateau_formulairec46d":{"id":"Consult_chateau_formulairec46d","dept":"62","canton":"Fruges","commune":"Quiestède","nom":"Laprée","type":"Châteaux","periode":"XVII","histoire":"De LAPREE la terre de Laprée dépendait de la seigneurie de Quiestède. Elle appartenait en 1425 à Jean de La Viéville dit Gauwain. Elle passa ensuite aux le Roy, une famille versée dans le droit et bien considérée à Aire. Mathieu le Roy, licencié en droit et avocat en la cour spirituelle de Thérouanne, la possédait en 1505. Claude le Roy, seigneur de Laprée, fut anobli en 1605. Le château a été construit en 1740 par Dominique-Jean-Jacques de Lencquesaing, la terre na jamais été vendue mais sest transmise dans cette famille, presque toujours de père en fils aîné. Originaires du Hainaut, les Lencquesaing sinstallèrent à Aire dans lArtois espagnol au début du XVIIe siècle, y détenant longtemps loffice de receveur des domaines avant dobtenir celui des aides dArtois. Le parc a été remodelé au XIXe siècle, romantique, à l'anglaise, avec son étang. Le potager est assez géométrique. Dans ses allées, les lavatères et les lupins peuplent le coin des vivaces, un carré de cucurbitacées, et de dahlias. L'allée centrale aux arceaux est bordée de pommiers et poiriers, à côté de la serre.","architecture":"De LAPREE,  l'Architecte était Jean-Louis Chipart. Le début de la construction du château de Laprée date de 1676. La fin de sa construction date du XIXe siècle. Le château de Laprée a été restauré dans les années 1980 par le Général Hervé de Lencquesaing (1920-1990) et son épouse née Miailhe. En 2009, une restauration entreprise par Edouart-François de Lencquesaing (né en 1949) et son épouse a permis de retrouver les proportions originelles du vestibule. Le château de Laprée est toujours dans la famille de son bâtisseur, se visite \"exceptionnellement\" que durant les 2 Journées du Patrimoine. Il conserve également de précieuses archives intéressant l'histoire des provinces du Nord sous l'Ancien Régime. Le château de Laprée est inscrit par arrêté du 9/09/1986, .Éléments protégés MH : les façades et les toitures du château ; les façades et les toitures du pavillon daté 1676 : inscription par arrêté du 9 septembre 1986.","habitants":"Famille de Dominique-Jean-Jacques de Lencquesaing\"","divers":"château de Laprée à Quiestède          GPS : 50° 41' 8,88\" Nord, 2° 19' 28,92\" Est","gps":"50° 41' 8,88\" Nord, 2° 19' 28,92\" Est","images":["../image/image_62/62_Lapr%c3%a9e_1.jpg"]},"Consult_chateau_formulairedc7b":{"id":"Consult_chateau_formulairedc7b","dept":"62","canton":"Calais","commune":"Licques","nom":"Licques","type":"Châteaux","periode":"XVIII","histoire":"trois châteaux  dans cet article; Cahen, Courtebourne et Hocqinghein.                        CAHEN , le château de Cahen, aujourd'hui fortement restauré, est daté de 1726. Il comprend un corps central de logis à deux niveaux et trois travées que flanquent deux ailes plus basses à simple rez-de-chaussée. Il est construit en pierre mais pour la façade principale, le constructeur a usé des effets de couleurs qu'offre l'association de la brique et de la pierre; en effet, pour cette façade, la pierre a été réservée au soubassement, aux pilastres faisant harpe qui délimitent les angles, aux cordons horizontaux qui courent au-dessus et au-dessous des fenêtres et aux encadrements harpés de celles-ci, ces baies sont légèrement cintrées et des lucarnes s'accrochent aux toitures en bâtière. Par opposition à cette façade assez avenante, celle de l'arrière est presque aveugle puisqu'elle n'est percée que d'une porte et à l'étage, d'une seule fenêtre et d'un petit oculus,  au hameau de Cahen, commerce d'antiquités.                                                      HOCQINGHEN, à cinq K.M. au sud ce château est une importante construction entourée d'eau sur son côté droit. Sa façade principale, montée sur un soubassement de grès, peinte en rose d'effet assez disgracieux, elle s'encadre entre deux ailes saillantes dont les fenêtres frontales sont obturées. Le corps central de logis présente cinq travées sur deux niveaux, au centre, précédée d'un perron, s'ouvre la porte ; des cordons horizontaux courent au-dessus et au-dessous des baies légèrement cintrées, l'archivolte de la porte fait retour. Contre ce bâtiment, vers l'arrière, se trouve plaquée une autre construction un peu moins longue couverte d'une toiture à deux versants, ici la brique est apparente. Les baies des sept travées ne sont pas régulièrement disposées: celles des deux derniers groupes de chaque côté sont reliées d'un niveau à l'autre par leurs chaînages de pierre, ici encore une porte s'ouvre au centre de la façade. En avant, sur la droite, se dresse un pigeonnier carré où alternent les assises de calcaire et de brique; de l'autre côté s'étendent les communs. Cette construction doit  appartenir au XVIIIe siècle, mais elle a été transformée au siècle suivant.","architecture":"COURTEBOURNE, du château-fort des Calonne Courtebourne, il ne subsiste qu'une tour construite en craie et couverte d'ardoise. Le parement supérieur est en saillie par rapport à la partie basse. Son plan est hexagonal, sur l'une des faces sont percées deux fenêtres et une lucarne s'accroche au pan de la toiture. Cest au XVIe siècle, sous limpulsion de François Ier, que les châteaux-forts se transformaient en demeures moins austères. Ce château était luxueusement meublé, on y menait une vie agréable, les seigneurs gardaient de hautes relations et de hautes alliances. Le château-fort résista aux attaques françaises, anglaises et même espagnoles lors du sac de Licques en 1674, alors que labbaye, moins préservée, fut incendiée et ruinée à de multiples reprises. La branche directe de la famille de Licques sest éteinte avec Ferdinand Gillon le 25 octobre 1771. Il laissait trois filles qui vendirent en 1775 la seigneurie de Licques à Louis Charles de Calonne-Courtebourne. Incarcéré sous la Révolution, celui-ci mourut en prison. Petit à petit, le château fut délaissé, vandalisé après la guerre 1939-45, il dut être abattu,  la tour s'élève au centre d'une pâture ; elle est environnée d'arbres.                                         HOCQUET a été construit, en 1891, sur les ruines d'un ancien manoir, qui datait du XVIIe siècle. Le Hocquet était un fief à Tilques, tenu de la seigneurie de la Motte à Moulle, qui était tenue du bailliage de Saint-Omer. Le château du Hocquet a été acquis, en 1585, par Pierre Taffin. Il resta, dans cette famille, jusqu'au début du XXe siècle.","habitants":"famille de Licques  Ferdinand Gillon\"","divers":"Licques GPS : 50° 46' 41\" Nord, 2° 12' 18\" Est                                                           trois châteaux  dans cet article; Cahen grav-2, Courtebourne grav-1 et Hocqinghein grav-3.","gps":"50° 46' 41\" Nord, 2° 12' 18\" Est","images":["../image/image_62/62_licques_1.jpg","../image/image_62/62_licques_2.jpg","../image/image_62/62_licques_3.jpg"]},"Consult_chateau_formulaire3052":{"id":"Consult_chateau_formulaire3052","dept":"62","canton":"Aire-sur-la-Lys","commune":"Liettres","nom":"Liettres","type":"Châteaux","periode":"XV","histoire":"LIETTRES, la chronique de Molinet mentionne en 1479  un château nommé Liettes, nouvellement édifié par messire Simon de Luxembourg, prévost de l'église de Saint-Omer, où se tenaient aucuns compagnons de guerre tenant le parti de France\". L'archiduc  Maximilien par la suite empereur du St-Empire Romain, tentait de réduire le places fortes de la région, le 7 octobre, ils quittèrent la destination de Liettres ou son camp se trouvait dressé, battit en retraite non sans avoir au préalable incendié la forteresse, Liettres devait connaître d'autres tribulations, en 1537 incendie des bâtiments par les Français et de nouveau en 1542 par le duc de Vendôme et accidentellement en 1563 restaurés depuis surtout  au XVIII et XIXe siècle. Yolande de Luxembourg, épouse de Nicolas de Verchin, sénéchale Hainaut, vendit Liettres en 1574 à Jean de Zonberghe, depuis le domaine est transmis par le jeu des héritages et de mariages, jusqu'au baron Philippe des Minières d'Halewyn.","architecture":"LIETTRES,  élevé sur un terre plein artificiel dans la vallée marécageuse de la Laquette qui alimentait les fossés, le château était constitué de quatre corps de bâtiment formant un carré cantonné de fortes tours rondes très saillantes. La forteresse est brûlée en 1542 par les troupes du duc de Vandôme. Acquise par Jean de Zomberghe, elle est depuis restée dans sa descendances, avec les Catris au XVIIe siècle, puis les Théry de Norbécourt et les Halewyn au XVIIIe siècle. A mesure que s'efface son rôle militaire, le château subit de profondes transformations, vers 1720 on reconstruit le corps de logis dont la façade présente sur la cour une belle ordonnance classique brique et pierre. Au XIXe siècle on rase ce qui reste des tours et des courtines de l'Est, puis on restaure l'ensemble rétablissant en particulier le chemin de ronde sur mâchicoulis de la grosse tour sud ouest. Éléments protégés MH : le château en totalité : inscription par arrêté du 11 février 1929.","habitants":"messire Simon de Luxembourg, \"","divers":"Liettres GPS : 50° 35' 35,88\" Nord, 2° 20' 23,44\" Est","gps":"50° 35' 35,88\" Nord, 2° 20' 23,44\" Est","images":["../image/image_62/62_Liettes_1.jpg","../image/image_62/62_Liettes_2.jpg","../image/image_62/62_Liettes_3.jpg","../image/image_62/62_Liettes_4.jpg"]},"Consult_chateau_formulaire1521":{"id":"Consult_chateau_formulaire1521","dept":"62","canton":"Lillers","commune":"Lillers","nom":"Lillers","type":"Châteaux","periode":"XVII","histoire":"Trois châteaux dans cet article; Belingues, Philiomel et Bourecq.      BELINGUES   Belingues fut une des seigneuries les plus importantes et les plus anciennes de l'Artois; en mai 1213, Roger de Reling était au service de Renaud de Dommartin, comte de Boulogne; mentionnée dès 1298 dans le Cartulaire d'Artois, elle appartint au XVe siècle à la famille du Bac dont l'un des membres fut désigné en 1468 prévôt des maréchaux de Charles le Téméraire. Au début du XVIIe siècle, Pierre de la Haye, baron du Saint-Empire, seigneur d'Ecquedecques, Radinghem et autres lieux, entreprit de renouveler ce vieux logis. C'est lui qui fit bâtir le château actuel, il est précédé par une belle porte d'entrée flanquée de deux tourelles en brique et pierre blanche coiffées de poivrières d'ardoises la clef de son arc présente une tête de sylvestre encadrée par la date de 1634. Edifié au XVIIe siècle mais remanié par la suite, le château est une construction dissymétrique réalisée en pierre et brique, la première étant réservée aux chaînages d'angles et aux encadrements des fenêtres. L'escalier a été aménagé dans une tourelle carrée qui domine d'un étage les toitures.                                                                                                                                          Le château de PHILIOMEL, vous propose ses Chambres d'Hôtes et ses salons de réceptions.","architecture":"BOURECQ, l'Ancien manoir de Bourecq fortifié du XVIe siècle, se situe sur la Place centrale du village, où demeure le souvenir du Duc de Marlborough, dans la chambre ronde, à carreaux d'un blanc éclatant dans le donjon seigneurial, où un boulet de canon, et divers objets militaires sont conservés. Le Manoir de Bourecq avec ses pignons à pas de moineaux typiques de larchitecture flamande date du XVIe siècle. Ce manoir, donjon, meurtrières et mâchicoulis, a des douves, des écuries et derrière le bâtiment, une immense terre allant jusqu'à la rivière la Nave. Le pont-levis a disparu, mais la porte monumentale, d'époque médiévale, et les grilles de l'entrée précèdent un parc planté de conifères qui protège l'habitation principale. Les murs ont, par endroits, plus de sept mètres d'épaisseur, la salle de garde subsiste avec son imposante cheminée d'époque. La demeure, dont les trois quarts ne sont pas habités et restent en l'état, dispose d'une imposante cour intérieure.Une statuette de la Vierge, en bois, qui daterait de l'an 500, subsiste. Altérée par le temps, elle est protégée et en cours de restauration.","habitants":"Belingues;  Famille de Pierre de la Haye\"","divers":"A Lillers; Grav-1   Relingue Grav-4-5   Bourecq  grav-2 GPS : 50° 34' 16,04\" Nord, 2° 26' 4,37\" Est                                               Philiomel grav-3 GPS : 50° 33' 52\" Nord, 2° 28' 59\" Est","gps":"50° 34' 16,04\" Nord, 2° 26' 4,37\" Est","images":["../image/image_62/62_Lillers_1.jpg","../image/image_62/62_Lillers_2.jpg","../image/image_62/62_Lillers_3.jpg","../image/image_62/62_Lillers_4.jpg","../image/image_62/62_Lillers_5.jpg"]},"Consult_chateau_formulaire23bd-2":{"id":"Consult_chateau_formulaire23bd-2","dept":"62","canton":"Desvres","commune":"Longfossé","nom":"Longfossé","type":"Château","periode":"XVI","histoire":"LONGFOSSE  Mauroy était un fief tenu du roi à cause du bailliage de Desvres. En 1392, Larroy, seigneur de Wierre, tenait ce fief. Au XVIe siècle, il appartient à la famille de Maisneville; par mariage il passa vers 1541 à celle de Vayns; à la fin du siècle, il fut acquis par celle de Raullers qui le conserva jusqu'en 1719. Au XVIIIe siècle, la propriété appartient à la famille Géneau; en 1860, elle fut vendue à Edouard Carludont les derniers héritiers moururent au service de la France, l'un en Tunisie, l'autre pendant la grande guerre.","architecture":"LONGFOSSE, comme beaucoup de constructions contemporaines, ce château est constitué par un corps de logis rectangulaire présentant sur chacune de ses longues faces une avancée en hémicycle. Il est bâti entièrement en grès, mais la pierre se dissimule, sur la façade postérieure, sous le crépi. Au rez de chaussée, deux fenêtres encadrent, de chaque côté, la porte centrale à l'étage, elle sont au nombre de cinq : toutes ces ouvertures sont légèrement cintrées et leur encadrement a été blanchi. Les ancres du niveau supérieur ont reçu la forme d'un fer à cheval. Un petit pigeonnier couvert de tuiles rectangulaires constitue le sommet de l'hémicycle médian; la toiture à deux versants est formée de pannes sur l'avant, et de tuiles rectangulaires sur l'arrière. Voué à la ruine au lendemain de la première guerre mondiale, cet édifice datant du XVIIIe siècle a été restauré récemment.","habitants":"famille de Maisneville\"","divers":"Château de Longfossé","gps":"","images":["../image/image_62/62_Longfoss%c3%a9_1.jpg","../image/image_62/62_Longfoss%c3%a9_2.jpg","../image/image_62/62_Longfoss%c3%a9_3.jpg"]},"Consult_chateau_formulaire2540":{"id":"Consult_chateau_formulaire2540","dept":"62","canton":"Boulogne-sur-Mer","commune":"Wimille","nom":"Lozembrune","type":"Château","periode":"XVII-XVIII","histoire":"LOZEMBRUNE, le château est composé dun corps central  de neuf travées datant de 1751 et de deux ailes dans son prolongement de deux travées chacune bâties entre 1830 et 1850. Le corps de logis central est composé dun avant-corps à fronton triangulaire de trois travées placé dans laxe et deux pavillons aux extrémités. Les ailes en forme de pavillons sincorporent aux constructions précédentes par les proportions et lutilisation des mêmes matériaux; la pierre du boulonnais sur les deux niveaux et un niveau sous comble couvert en ardoise. Le parc, de style composite, est constitué dun parc boisé, dune cour dhonneur et dun jardin à la française, lensemble est enclos dun mur en pierre. Le parc boisé situé à lEst est composé dallées au tracé régulier dont deux mènent au château, lune depuis Wimille, lautre depuis le site paysager des hameaux dAuvringhem et la Poterie, vers Boulogne. Le parc boisé descend vers la cour du château avec une très forte dénivellation.\nLe jardin à la française à lOuest est sur un terrain en terrasses clos ne permettant aucune vue sur lextérieur. Il est composé de huit grands parterres encadrant trois bassins; rond, ovale et carré à bords chantournés. Des sections de murs bas, cantonnés de piliers carrés sommés de vases, limitent de chaque côté de ces parterres deux allées bordées vers lextérieur de pelouses piquées darbustes dépine, de buis et de pommiers taillés en boule. La descente vers le jardin se fait par trois escaliers étroits reliés entre eux par un mur bas, également cantonné de piliers bas à vases en fonte. Une fontaine aux courbes harmonieuses rassemble les eaux de sources dans langle Sud-Ouest.","architecture":"LOZEMBRUNE, éléments protégés MH : en totalité les éléments suivants du château : les façades et les toitures, l'escalier avec sa cage et sa rampe en fer forgé, la salle à manger du rez-de-chaussée et le grand salon au premier étage avec leur décor ; pour leurs façades et toitures les quatre bâtiments des communs ; en totalité les éléments suivants : le sol pavé de la cour d'honneur avec clôtures comprenant murs bahuts, piliers, vases et grilles, le jardin à la française avec l'ensemble de ses éléments constitutifs pavillon, les allées d'accès, le verger à flanc de coteau, le potager et son mur séparatif d'avec le jardin à la française, une pâture, une grande pâture arborée et le bois avec au sud le système hydraulique comprenant la fontaine et le canal et à l'ouest le grand escalier monumental avec mur de soutènement, murs bahuts et piédestaux faisant partie du domaine : inscription par arrêté du 8 novembre 2011. Dans la perspective de la demeure et à lextrémité du jardin, un pavillon à proximité de la rivière, construit au XIXe siècle; petit salon de thé à lheure où le soleil ignore le château.                                                                             HONVAULT  au village voisin Wimereux.  Le logis, avec sa tour circulaire, a été construit en plusieurs campagnes, du XIIIe au XVIe siècle. Il aurait été la résidence d'Henri VIII d'Angleterre pendant le siège de Boulogne en 1544. Il a été détruit durant la deuxième guerre mondiale et remplacé par un édifice construit après 1945. Le jardin enclos, qui apparaît sur des vues du début du XIXe siècle, a aussi disparu. Les bâtiments de ferme semblent avoir été construits au XIXe siècle.","habitants":"François de La Pasture d'Offrethun\"","divers":"Deux châteaux dans cet article; Lozembrune grav -1-2 et Honvault grav 3  GPS : 50° 45' 50\" Nord, 1° 38' 01\" Est","gps":"50° 45' 50\" Nord, 1° 38' 01\" Est","images":["../image/image_62/62_Lozembrune_1.jpg","../image/image_62/62_Lozembrune_2.jpg","../image/image_62/62_Lozembrune_3.jpg"]},"Consult_chateau_formulaireae2c":{"id":"Consult_chateau_formulaireae2c","dept":"62","canton":"Auxi-le-Château","commune":"Marconne","nom":"Marconnelle","type":"Châteaux","periode":"XVI-XVII","histoire":"MARCONNELLE est un château bâti à Marconne. Robert d'Ostrel, seigneur de Flers, Conchy, Marconnelle et autres lieux a pris pour épouse Bonne de Lannoy. Il meurt le 17 décembre 1653 et son épouse décède le 13 mars 1660. Leur plaque funéraire située dans l'église de Flers est enregistrée au titre des monuments historiques.  En octobre 1705, des lettres, données à Fontainebleau, réaffirment l'érection en marquisat de la terre de Grigny, en y incorporant les terres de Fresnoy, Quisy et Marconnelle. Toujours en octobre 1705, des lettres données à Fontainebleau permettent à François de Salperwick de relever le titre de marquis de Grigny. François de Salperwick et sa femme Marie Charlotte de Harchies déclarent consentir à ce qu'Antoinette Philippe de Bassecourt jouisse sa vie durant de la terre de Grigny. François de Salperwick est seigneur du Fresnoy, Crehem, Hestruval, Plumoison, Quiesy, Ristade, Marconnelle, Héricourt et Leuzeux, mousquetaire de la seconde compagnie de la garde du roi, commandée par le sieur de Jouvelle, a assisté aux prises de Valenciennes, Cambrai, Saint-Omer, à la bataille de Cassel. Il est fils de feu Louis de Salperwick et d'Antoinette Philippe de Bassecourt et neveu de Jean Baptiste de Bassecourt, marquis de Grigny. Il peut relever ce titre de marquis en y ajoutant et y incorporant les terres de Fresnoy, Quisy et Marconnelle qui relèvent aussi du château d'Hesdin, pour en jouir après le décès de sa mère qui suivant les intentions de son frère, lui avait fait don de la terre de Grigny par acte du 17 janvier 1703 banlieu sud de Hesdin. C'est devenu un gite d'hôtes.","architecture":"VALFOSSE à Marconne de plan rectangulaire à deux niveaux et niveaux sur combles à toits brisés à la mansart deux pavillons saillant aux extrémitées, avant corps  d'entrée légèrement saillant avec fronton.","habitants":"Famille de François de Salperwick\"","divers":"Château de Marconnelle grav 1-2 et Valfossé grav -3 à Marconne  50° 22' 25? nord, 2° 01' 06? est","gps":"","images":["../image/image_62/62_Marconnelle_1.jpg","../image/image_62/62_Marconnelle_2.jpg","../image/image_62/62_Marconnelle_3.jpg"]},"Consult_chateau_formulaire2c6a":{"id":"Consult_chateau_formulaire2c6a","dept":"62","canton":"Bully-lès-Mines","commune":"Mazingarbe","nom":"Mazingarbe","type":"Château","periode":"XIX","histoire":"MAZINGARBE dit de Mercier.  Sous la direction de l'ingénieur Louis Mercier, la compagnie des Mines d'Anzin se développa considérablement. L'ensemble des installations de surface furent développées, maisons ouvrières et équipements collectifs. Au cours de la première guerre mondiale, les installations subirent un pilonnage systématique qui toucha également le château construit pour Louis Mercier au XIXe siècle. La reconstruction fut mise en oeuvre dès la fin du conflit. Un édifice existant est agrandi. En 1901, l'ingénieur Pirckher propose plusieurs projets.","architecture":"MAZINGARBE, une aile de l'édifice primitif est conservée tandis qu'un grand corps de logis est réalisé. Une seconde aile identique à la première ferme la composition en U. Des communs accompagnaient l'édifice. Un grand parc avec bassins est créé en complément de la demeure. Dans les années 1920, d'importants travaux ont permis d'agrandir le parc et de réaliser réfections et agrandissements sur la demeure. Les avant-corps sur jardin ont été transformés. Le grand jardin d'hiver posé contre la façade sud-est a été remplacé par la grande annexe latérale servant aux réceptions. Les communs ont été modifiés ou reconstruits à cette époque, ainsi que la galerie couverte entre les avant-corps côté entrée principale, venant clore cet espace. Mercier y résida jusqu'à sa mort, en 1927. Après la nationalisation, l'édifice fut transformé en maternité de 1946 à 1970. Resté à l'abandon jusqu'en 1985, l'édifice est racheté par la municipalité pour en faire une nouvelle mairie.\nÉléments protégés MH : les façades et les toitures du château et de ses annexes ; le parc avec ses bassins ; les escaliers ; les éléments décoratifs ; les communs et les clôtures (portail principal et murs attenants) : inscription par arrêté du 9 octobre 2009.","habitants":"Archi. Louis Mercier, \"","divers":"Mazingarbe à Mazingarbe  Grav 1-Mercier grav-2-3                                GPS : 50° 28' 08,08\" Nord, 2° 43' 10,34\" Est","gps":"50° 28' 08,08\" Nord, 2° 43' 10,34\" Est","images":["../image/image_62/62_Mazingarbe_1.jpg","../image/image_62/62_Mazingarbe_2.jpg","../image/image_62/62_Mazingarbe_3.jpg"]},"Consult_chateau_formulairebed6-2":{"id":"Consult_chateau_formulairebed6-2","dept":"62","canton":"Saint-Pol-sur-Ternoise","commune":"Monchy_Cayeux","nom":"Monchy_Cayeux","type":"Château","periode":"XVII-XIX","histoire":"MONCHY-CAYEUX, une famille de Monchy a existé, mais il n'est pas sûr qu'elle descendît des anciens seigneurs du lieu. Julienne de Monchy, fille de Pierre de Monchy, gouverneur de Saint-Omer et de Jeanne de Ghistelles, transmit le domaine à Jean de Bournel, au XVe siècle il demeura dans cette famille jusqu'au XVIIIe siècle, bien que, au XVIe siècle, il fut un moment confisqué au bénéfice de Jean de la Vierville parce que son propriétaire servait le roi de France. En 1747, Marie Philippine de Bournel, dame de Monchy, épousa Adrien Eugène Herman d'Hinnisdal, baron de Fumal: les armes de ces deux familles figurent au fronton de la façade du château. Pendant la Révolution celui-ci fut vendu comme bien national, mais après la mort de François d'Hinnisdal, qui avait émigré, on fit valoir que son fils était mineur et le domaine lui fut rendu le 14 floréal an III.","architecture":"MONCHY-CAYEUX, au cours du XIXe siècle, le château a été restauré et transformé. Mlle d'Hinnisdal l'a légué à sa nièce, la comtesse de Lévis Mirepoix et il est demeuré dans cette famille au moins jusqu'à la fin du XIXe siècle. Dans son aspect actuel, le château de Monchy, associé à une tour médiévale très dénaturée, est une demeure du XVIIIe siècle, restaurée et modifiée au siècle suivant. L'ensemble est malheureusement dans un état de délabrement tel qu'il faut craindre sa disparition totale.","habitants":"Adrien Eugène Herman d'Hinnisdal\"","divers":"Château de Monchy_Cayeux à Monchy_Cayeux","gps":"","images":["../image/image_62/62_Monchy_Cayeux_1.jpg"]},"Consult_chateau_formulaire6b21":{"id":"Consult_chateau_formulaire6b21","dept":"62","canton":"Étaples","commune":"Touquet","nom":"Monejean","type":"Villa_château","periode":"XX","histoire":"MONEJEAN. Le bien, dans lequel des travaux avaient été entrepris par le couple. D'après Mediapart, le couple avait alors dû régulariser sa situation pour 2013, 2014 et 2015. En 2022. Interrogé par Mediapart, le cabinet d'Emmanuel Macron avait assuré que ce dernier avait anticipé, en effectuant une déclaration rectificative, pour le foyer fiscal. La situation fiscale de Mr et Mme Macron est tout à fait régulière, toutes les déclarations auxquelles ils sont assujettis, ont été effectuées, déclarait l'un de ses collaborateurs. A titre personnel, dans ses déclarations de 2017 et 2022, transmises à la HATVP, Emmanuel Macron a indiqué ne posséder aucun patrimoine immobilier. La propriétaire actuelle de la Villa Monéjean est Mme Brigitte Macron.","architecture":"MONEJEAN, sa construction date de 1908. Elle est de stype chalet. onçue par l'Architecte Anatole Bienaimé, la villa Monéjean est située avenue Saint-Jean, dans le secteur « Village Suisse » du quartier résidentiel du « Triangle d'or ». Cette villa fait partie de la centaine de villas conçues au début du XXe siècle au Touquet-Paris-Plage, l'un des principaux architectes du Touquet-Paris-Plage. Elle a été construite par l'entrepreneur Degallaix, l'un des principaux entrepreneurs de Paris-Plage et du Touquet-Paris-Plage. Comportant 3 niveaux d'habitation, elle est de style alpin du « Village Suisse ». rénovation de l'intérieur est dans un style « design-contemporain » avec une « belle cuisine » et comporte à larrière, un jardin clos de plusieurs centaines de mètres carrés. Le rez-de-chaussée de la Villa Monéjean a été aménagé en 2 commerces : une agence immobilière et une petite boutique de vêtements installée dans l'ancien garage. La villa appartenait au couple Simone et Jean Trogneux, d'où le nom qu'ils lui ont donné : Monéjan. Jean Trogneux (1909-1994) adorait cette demeure et sa fille, Brigitte Macron, qui y passait régulièrement ses vacances, depuis l'âge de 5 ans, en a hérité. La villa fait donc partie du patrimoine du couple ; c'est pourquoi le 31.05.2016, le site web Mediapart a révélé qu'après une vérification de la Haute Autorité pour la transparence de la vie publique (HATVP), le foyer fiscal devait payer l'impôt de solidarité sur la fortune (ISF).","habitants":"Pdt Emmanuel Macron\"","divers":"Château de Monèjean au Touquet grav 1-2                                                    GPS : 50° 31' 21\" Nord, 1° 35' 18\" Est","gps":"50° 31' 21\" Nord, 1° 35' 18\" Est","images":["../image/image_62/62_Monejean_1.jpg","../image/image_62/62_Monejean_2.jpg"]},"Consult_chateau_formulaire2afe":{"id":"Consult_chateau_formulaire2afe","dept":"62","canton":"Lumbres","commune":"Alette","nom":"Montcavrel","type":"Châteaux","periode":"XVIII","histoire":"Deux châteaux dans cet article;, Montcavrel et Montechor.                                               MONTCAVREL, c'est en 1071 un seigneur de Montcavrel. Au XVe siècle La seigneurie passa à Aymon de Monchy qui relevera les ruines dues aux dévastations anglaises; ce qui reste du château date pour l'essentiel de cette campagne de reconstruction. Comme beaucoup de châteaux de la région, celui de Montcavrel souffrit beaucoup des guerres des XVe et XVIe siècles. A l'exemple de ses prédécesseurs, Antoine de Monchy répara les dégâts qui lui furent infligé, il fit disparaître les éléments de fortification qui étaient devenus inutiles, c'est alors que l'ancienne porte avec sa barbacane disparut et un nouvel accès fut aménagé au sud de l'enceinte de la baille; le donjon fut conservé, mais ses étages furent reliés par des escaliers, et des fenêtres y furent percées, un nouveau corps de bâtiment fut édifié sur le revers du mur séparant le château de sa basse cour. Il est regrettable que le vandalisme des XIXe et XXe siècles ait privé le château de l'essentiel de son intérêt, il serait souhaitable que des mesures soient prises pour que ses courtines demeurent debout. En 1690 le marquisat passe au beau frère de jean de Monchy Louis-Charles de Mailly. En 1795 l'ensemble est acquis par le fils du fermier du château Antoine Bourdelle dont les descendants feront construire en 1842 le corps de logis actuel. le domaine sous la monarchie de juillet le siège d'une des bergeries nationnales créées par le roi Louis Philippe de 1862 à 1931, à appartenu à la famille Minet. Les ruines ne se visitent pas, mais on peut voir les fossés, les courtines de la basse cour, de la porte méridionale et les restes des bâtiments.","architecture":"MONTECHOR, serait un lieu-dit dont l'origine se situerait à l'époque gallo romaine; ce nom dériverait de Monsquerculum, ce qui signifierait mont planté de chênes. Au Moyen-Age, Montéchor fut un fief qui dépendait du château de Montcavrel; à la fin du XVe siècle, Jean III de Monchy fut obligé d'en arrenter les terres. En 1739, la ferme fut achetée par Louis Sta, notaire à Desvres, qui se fit appeler sieur de Montéchor. En 1787 Charles Robert Poultier, notaire Royal au bailliage de Montreuil, épousa Anne Sta; il se fit appeler Poultier de Montéchor, et vers 1800, il devint sous-préfet de Montreuil. C'est lui qui fit édifier le château attenant à la ferme. En même temps, il aménagea un beau parc planté de cèdres et autres essences exotiques. Depuis, l'édifice s'est transmis par héritage dans cette famille; il appartient aujourd'hui à Mme née Poultier et M.G. Broutier Dumoulin, qui exploitent la ferme attenante, le château a été occupé de 1938 à 1957 par les pères assomptionnistes. Très sobre de lignes et très simple dans sa décoration, le château est construit en pierre du pays que l'on a malheureusement recouvert à une époque relativement récente d'un enduit peint.","habitants":"Famille  de Antoine Bourdelle                     Famille deCharles Robert Poultier,        \"","divers":"Trois châteaux dans cet article; Hérembault grav-2, Montcavrel grav_1 et Montechor grav-3","gps":"","images":["../image/image_62/62_Montcavrel_1.jpg","../image/image_62/62_Montcavrel_2.jpg","../image/image_62/62_Montcavrel_3.jpg"]},"Consult_chateau_formulaire6bf0":{"id":"Consult_chateau_formulaire6bf0","dept":"62","canton":"Berck","commune":"Montreuil sur mer","nom":"Montreuil_sur_mer","type":"Vestiges  château","periode":"XVIII-XX","histoire":"Trois châteaux dans cet article la Calotterie  la Citadelle de Montreuil et d'Hesmond.                                                                                                CALOTTERIE, situé en milieu rural, à l'écart du village, à flanc de coteau, dans un cadre magnifique; le château se détache sur un fond boisé. Ce
