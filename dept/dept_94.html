.jpg","../image/image_94/94_Rancy_4.jpg"]},"Consult_chateau_formulaire6a4f":{"id":"Consult_chateau_formulaire6a4f","dept":"94","canton":"Boissy-Saint-Léger","commune":"Marolles en Brie","nom":"Santeny","type":"Château","periode":"XII-XVI-XVIII-XIX","histoire":"Cinq châteax dans cet article; Choigny, les Chevaliers de Malte, la commanderie, Lions et Santeny                                                                                                                                                                                                 LIONS, fief de Cossigny puis de la famille des Lions dans la première moitié du XVIIe siècle. En 1766, division du fief : Louis Richard, seigneur des Lions, vend le château et le parc et conserve la ferme. Fief saisi comme bien national pendant la Révolution. Acheté par la famille de Besse qui fait démolir le château dont il ne reste que l'aile ouest et qui fait reconstruire partiellement la ferme en 1820 par l'architecte Pagnierre. Cour de la ferme fermée au sud après 1810 (cadastre). Logement à l'angle nord-ouest rebâti début XXe siècle. Moulin détruit.                                                                                                      CHEVALIERS de MALTE, en 1292, achat du château-fort appartenant au chevalier Bataille par l'ordre des templiers. Il passe à l'ordre de Malte dans la première moitié du XIVe siècle. Tours, fossé, pont-levis attestés au XVe siècle. En 1732, il est vendu à Germain Louis Chauvelin, garde des sceaux qui fait démolir le château-fort. Construction d'un nouveau château après 1740 au nord du précédent édifice. Sur la rue, aile ouest supprimée en 1810. Modifications des façades (ouvertures, lucarnes, chaînes de pierre) au XXe siècle. Site inscrit en 1982.                                                 COMMANDERIE, dès le XIIe siècle, l'ordre militaire et religieux des Templiers possèdait des biens, à Santeny. Un château fort (aujourd'hui disparu) fut racheté, en 1292, au Chevalier Gillaume Bataille, par les Templiers, afin d'en faire leur commanderie. Les biens et les possessions de l'ordre passent entre les mains de l'Ordre des Chevaliers de Rhodes puis des Chevaliers de Malte en 1530. En 1732, Chauvelin, Ministre de Louis XV, rachèta et rasa l'ancienne commanderie pour y faire construire l'actuelle propriété donnant sur la rue.","architecture":"CHOIGNY, château construit entre 1785 et 1810. A l'emplacement du bâtiment ouest détruit après 1810 construction d'une orangerie, qui abrite aujourd'hui un haras, et de communs en meulière et pan de bois; entre 1923 et 1929 il appartient au grand duc Nicolas de Russie qui fait construire dans le parc une petite chapelle orthodoxe . L'édifice, de plan symétrique, est composé d'un sous-sol, d'un étage carré et étage de comble. Le gros oeuvre: enduit, meulière et pan de bois. Elévation ordonnancée surmontée d'un toit à longs pans ; toit en pavillon et croupe.                             SANTENY, ancien domaine du Role ou Rollet. Subsiste à l'entrée le premier château du XVIIIe siècle. Nouveau château, puits et grotte bâtis en 1878 par la famille Brac de la Perrière (Martin). Ensemble de trois grilles portant les initiales A B L. Bassin actuellement comblé. Château XIXe siècle et parties agricoles aménagés en école vers 1960. L'édifice, de plan symétrique, se compose d'un étage de soubassement, d'un étage carré et étage de comble. Gros oeuvre; calcaire; meulière; pierre de taille et enduit partiel. Elévation à travées surmonté d'un toit à longs pans; toit conique ; croupe ; toit à longs pans brisés ; noue, de style classique, il se situe dans un parc à l'anglaise de 4 hectares. Le château de Santeny vous enchantera. Les salles de réception lumineuses et  communiquantes sont ornées de cheminées en marbre, de sols en parquet et marbre et de hauts plafonds moulurés. Elles s'ouvrent directement sur la terrasse et le parc avec une vue très dégagée. C'est un endroit unique pour une journée unique. Location de salles pour fêter vos évènements privés.","habitants":"Lions ;famille de Besse   Malte; Germain Louis Chauvelin,  Commanderie; Chauvelin                                Choigny ;grand duc Nicolas de Russie                  Santeny; famille Brac de la Perrière \"","divers":"Cinq châteaux dans cet article; Choigny, les Chevaliers de Malte, la commanderie grav-2, Lions et Santeny   grav-1   Choigny GPS : 48° 43' 33\" Nord, 2° 34' 20\" Est                                                   Commanderie GPS : 48° 43' 33\" Nord, 2° 34' 20\" Est                               Santeny  GPS : 48° 43' 33\" Nord, 2° 34' 20\" Est","gps":"48° 43' 33\" Nord, 2° 34' 20\" Est","images":["../image/image_94/94_Santeny_1.jpg","../image/image_94/94_Santeny_2.jpg"]},"Consult_chateau_formulaire4cbd":{"id":"Consult_chateau_formulaire4cbd","dept":"94","canton":"Saint-Maur-des-Fossés","commune":"ST-Maur des Fossés","nom":"St_Maur_des_Fossés","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; l'Argentière et St-Maur.                      SAINT-MAURS DES FOSSES  fut édifié juste au-dessus de l'ancienne abbaye de Saint-Maur, dont l'histoire remonte au haut moyen-âge. Commencé en 1541 par Philibert Delorme, le château constitue la première uvre d'importante entreprise, par cet architecte. Après sa mort en 1570, Jean Bullant aurait eu la charge de l'édifice. Il fut commandé par le cardinal Jean du Bellay, évêque de Paris et conseiller du roi. Construit sur un petit promontoire dominant la Marne, il était en surplomb de l'ancienne abbaye de Saint-Maur, dont l'abbé était le cardinal  Rabelais, un temps moine dans cette abbaye, séjourna dans le château et y a peut-être écrit. En 1547, après la mort du roi François Ier du Bellay, compromis dans les intrigues du cardinal de Lorraine, tomba en disgrâce, perdit son rang et se retira à Rome. Le château comportait alors un corps de logis et une cour attenante. Les travaux furent interrompus jusqu'en 1563, date à laquelle la reine-mère Catherine de Médicis les fit reprendre après avoir acheté le château à Eustache du Bellay, cousin et héritier de Jean. Après le décès de Catherine de Médicis, en 1589, la propriété fut cédée au Prince de Condé Henri II de Bourbon-Condé, et resta dans cette famille. Elle fut laissée en usufruit en 1670 à l'intendant du Grand Condé, Jean de Gourville. Le Nôtre se vit confier les jardins, et Claude Desgots leur réalisation. Mme de La Fayette fit quelques séjours à Saint-Maur. Mme la duchesse, fille de Louis XIV, occupa le château durant la première moitié du XVIIIe siècle, et y donna de fastueuses réceptions. Frappé par les décrets contre les Émigrés, le château fut vendu comme bien national pendant la Révolution et détruit en 1796.","architecture":"ST-MAUR, Son grand parc fut adjugé en 1831, Il n'en reste rien, à l'exception des écuries du Petit-Bourbon. Une terrasse décorée de colonnes et posée sur piliers entourait l'édifice côté cour. Un corps de logis accompagné de quatre pavillons accouplés, qui ont chacun un toit séparé, compose le château de Saint-Maur. Du côté de la cour, soutenue de deux terrasses avec des balustrades de pierre, l'entrée est ornée de colonnes surmontées d'un bas-relief de marbre. Au-dessus, dans un fronton, se voit le buste en bronze de François Ier. Du côté des jardins, la face du château conserve plus de son ancienneté, parce que cette partie était faite, à l'exception d'un des pavillons. Le corps de logis du milieu est entièrement couronné d'un fronton chargé de sculptures. Tout le rez-de-chaussée élevé sur un grand perron, n'est qu'une galerie ornée de paysages et de deux belles tables de portor. Il y a, dans le retour, plusieurs pièces dorées, avec deux petits cabinets, à chaque bout, dont un, est garni de lambris de la Chine                                                                                                                     LARGENTIERE, la construction de cet hôtel date de la 2ème moitié du XVIe au XVIIIe siècle. L'hôtel du Petit-Condé fut construit pour Mr de Saint-Cyr (détruit), a des fondations remontant au XVIIe siècle, mais une façade postérieure fut remaniée, en 1733, pour la famille de Jean-Paul-François de Noailles époux de Henriette Anne Louise d'Aguesseau, parents d'Adrienne, qui épousa Gilbert du Motier de La Fayette. Le nom de « l'Argentière », dont le monogramme figure sur les barreaux des fenêtres et du garde-fou de la terrasse, n'aurait aucune assise historique. L'Hôtel de l'Argentière est inscrit aux M.H. pour ses façades et sa toiture depuis le 5/03/1971. Une partie du film \"L'Étudiante et Monsieur Henri\" y a été tournée en 2015. C'est un hôtel privé, fermé au public.","habitants":"Prince de Condé Henri II de Bourbon-Condé\"","divers":"Deux châteaux dans cet article; l'argentière grav-5   et St-Maur grav 1-2-3-4   .                                          St-Maur  GPS : 48° 48' 46\" Nord, 2° 28' 27\" Est                                      Argentière GPS : 48° 48' 48,25\" Niort, 2° 28' 20,74\" Est","gps":"48° 48' 46\" Nord, 2° 28' 27\" Est","images":["../image/image_94/94_St_Maur_des_Foss%c3%a9s_1.jpg","../image/image_94/94_St_Maur_des_Foss%c3%a9s_2.jpg","../image/image_94/94_St_Maur_des_Foss%c3%a9s_3.jpg","../image/image_94/94_St_Maur_des_Foss%c3%a9s_4.jpg","../image/image_94/94_St_Maur_des_Foss%c3%a9s_5.jpg","../image/image_94/94_St_Maur_des_Foss%c3%a9s_6.jpg"]},"Consult_chateau_formulaireb86e":{"id":"Consult_chateau_formulaireb86e","dept":"94","canton":"Saint-Maur-des-Fossés","commune":"Saint-Maur-des-Fossés","nom":"St_Roman_en_Brie","type":"Château","periode":"XVII","histoire":"SAINT-ROMAN, la seigneurie de Villejuif est acquise en 1672 par Jean Duret, capitaine dans le régiment du prince de Conti ; après avoir revendu dès 1674 l'ancien logis seigneurial, il choisit une place vierge au nord du village pour y édifier sa nouvelle demeure; en 1680 il passe marché avec un maître carrier pour lui fournir 50 voies de pierre d'Arcueil, et la même année avec deux tailleurs de pierre, ce qui permet de penser que l'édifice est en pleine construction; la toiture à la Mansart a dû disparaître dans le courant du XIXe siècle pour être remplacée par une couverture de fortune; inhabité par ses propriétaires la famille de Saint-Romans, à partir du milieu du XIXe siècle.","architecture":"SAINT-ROMAN  il est alors divisé en logements et laissé peu à peu à l'abandon ; le parc est loti au début du XXe siècle ; malgré leur inscription en 1928, le colombier et une cheminée du château disparaissent peu après ; ce qui subsiste du décor disparaît vers 1940, et le deuxième étage est refait en brique; le gros-oeuvre du château proprement dit (pris à tort parfois pour de simples communs) ne disparaît qu'à la fin des années 1980. L'avant corps du château et la façade des écuries étaient en calcaire grand appareil, le colombier en calcaire moyen appareil, le reste des constructions en moellon calcaire enduit, à l'exception de l'encadrement des baies, en pierre de taille vestiges, seuls subsistent le logement du concierge et une partie des communs dénaturés.","habitants":"Famille de jean Duret\"","divers":"Gps 48° 47' 58? nord, 2° 29' 59? est","gps":"","images":["../image/image_94/94_St_Roman_en_Brie_1.jpg"]},"Consult_chateau_formulaire9f2c":{"id":"Consult_chateau_formulaire9f2c","dept":"94","canton":"Saint-Maur-des-Fossés","commune":"Sucy en Brie","nom":"Sucy_en_Brie","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Lambert, et Sucy en Brie.      LAMBERT, fief appartenant à l'abbaye de Saint-Maur-des-Fossés qui le vend en 1577 à la famille Le Cirier. Celle ci le vend en 1640 à Jean Baptiste Lambert qui aménage les abords de la demeure seigneuriale. De 1644 à 1652, son frère Nicolas Lambert agrandit et embellit le parc. En 1660, il rase la maison seigneuriale dont il reste les caves et à l'emplacement de laquelle il fait élever le château actuel par François Le Vau, architecte, André Ledoux, maçon à Sucy et Nicolas Fourault, tailleur de pierres à Paris. Décors sculptés attribués à Van Opstal. En 1675, il fait construire le portail et deux pavillons d'entrée. En 1687, construction de l'orangerie. Vers 1964, démolition des fabriques, des pavillons d'entrée et du mur d'enceinte. propriété de la commune.   Éléments protégés MH : le château Lambert : classement par arrêté du 18 juillet 1975.                                                                             SUCY,  Il est aussi connu sous les noms de château Lambert du nom de son premier propriétaire et château de Berc du nom de son dernier propriétaire. Le château est d'architecture classique, il est formé d'un corps de bâtiment flanqué de deux pavillons à ses extrémités. Construit en pierre de taille, il a un étage surmonté d'un toit mansardé, couvert d'ardoises, offrant un second étage. Il a été construit pour être le château de plaisance de propriétaires résidant à Paris.  Situé à la sortie du bourg ancien de Sucy-en-Brie, il est à la limite entre le plateau qu'il domine, offrant ainsi une vue dégagée sur la vallée, la ville d'Ormesson et au-delà la ville de Paris à l'ouest. Il fait l'objet d'un classement au titre des M.H. depuis le 18 juillet 1970.","architecture":"SUCY, le château est formé d'un corps de bâtiment flanqué de deux pavillons, le tout en pierre de taille calcaire, comprenant un étage et un toit mansardé en ardoise.  Appuyé au pavillon de gauche (ouest) et en léger contrebas, un bâtiment nommé l'orangerie est lui aussi en pierre de taille mais ne comprend pas d'étage. L'accès principal au château se fait par une cour dont l'entrée est assurée par une porte monumentale. L'enceinte de cette cour a disparu. Au centre de la façade sud, sur cour, l'entrée du vestibule est saillante, encadrée par deux colonnes et surplombée par une frise, de chaque côté le mur est orné d'une console portant un buste en pierre sculptée. Cette entrée est surplombée par un balcon doté d'une balustrade en fer forgé. De chaque côté de ce balcon le mur est décoré d'une console portant un vase décoratif sculpté. La porte donnant sur ce balcon est surmontée d'un fronton triangulaire. Au premier étage de chacun des pavillons, entre les fenêtres, est installé un cadran solaire.   La façade nord fait face au parc. Dans celui-ci sont installées les tours de la cité verte. Du fait de la déclivité, le terrain descend vers la vallée du Morbras, la sortie côté parc du vestibule donne sur un escalier. L'accès au vestibule est encadré de deux colonnes et surplombé d'une frise, comme sur la façade antérieure. De chaque côté, tant au rez-de-chaussée qu'au premier étage, les murs sont ornés de consoles portant des bustes (les consoles du premier sont vides.","habitants":"Lambert et sucy, famille Lambert\"","divers":"Deux châteaux dans cet article; Lambert, et Sucy en Brie. Lambert GPS : 48° 46' 28,23\" Nord, 2° 31' 53,13\" Est","gps":"48° 46' 28,23\" Nord, 2° 31' 53,13\" Est","images":["../image/image_94/94_Sucy_en_Brie_1.jpg","../image/image_94/94_Sucy_en_Brie_2.jpg","../image/image_94/94_Sucy_en_Brie_3.jpg","../image/image_94/94_Sucy_en_Brie_4.jpg"]},"Consult_chateau_formulairee147":{"id":"Consult_chateau_formulairee147","dept":"94","canton":"Saint-Maur-des-Fossés","commune":"Sucy en Brie,","nom":"Sucy_en_Brie_94","type":"Château","periode":"XVI-XVII","histoire":"Cinq châteaux dans cet article; Haute Maison, Grand-Val, Montaleau  et Petit Val.                                                                                                                               GRAND-VAL, a été édifié à Sucy par la famille Masparault au XVIe siècle. Deux siècles après, il accueillit des hôtes importants comme Diderot, le Baron dHolbach, Grimm ou encore Mme dEpinay. Le château de Grand-Val accueillit Diderot, sur l'invitation de Grimm. La Ferme de Grand-Val qui abrite le centre culturel et un pavillon au N°18 de la rue Chevreul sont les seuls vestiges du château qui fut détruit en 1948-1949, en raison de sa vétusté. Détruit presque totalement, dont il ne reste, aujourd'hui, que sa ferme.                                                                                                               HAUTE MAISON , bâtiment, dit autrefois \"Maison de la Tour\", donné à la fin XIIIe siècle par Dudon, médecin de saint Louis, pour la fondation de la chapelle Saint-Louis de Notre-Dame de Paris. En 1599, la haute maison consistait en un grand corps d'hôtel avec cours pavées, basse-cour, vacherie, écuries, et édifices de jardinage. Château remanié, bâtiment ouest en retour d'équerre démoli et communs construits à l'ouest dans le prolongement du château entre 1691 et 1766. Bibliothèque municipale  Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 20 février 1980.                                                                          MONTALEAU    est construit vers 1620 pour Philippe de Coulanges, grand-père de madame de Sévigné. Les communs à l'est sont démolis entre 1768 et 1810 . L'édifice est acquis par la ville en 1934. Murs de clôture et aile en retour à l'est démolis entre 1940 et 1950. Restauration radicale et modification du château avec disparition des décors, notamment les peintures de l'oratoire, vers 1960, il est inauguré comme mairie en 1962. hôtel de ville, conservatoire municipal.","architecture":"PETIT VAL, fief, hôtel, cour, grange, étables et bergeries attestés en 1501. Château, communs, grange et colombier en place en 1691. Château actuel bâti à l'ouest du précédent, cour de la ferme fermée au sud et aménagement du parc à la française entre 1691 et 1720. Ailes est, sud et ouest de la ferme actuelle édifiées au sud-est de la précédente entre 1720 et 1740. Cour de la nouvelle ferme close au nord, construction du logement du jardinier, de la basse-cour, de l'aile nord du château et l'orangerie, démolition de l'ancienne ferme entre 1740 et 1746 lors de l'adjudication faite au marquis de Marigny. Château surélevé d'un étage et façade postérieure refaite fin XVIIIe siècle. En 1890, il est vendu à la congrégation des filles de Marie qui y établit un pensionnat. En 1894, construction de la chapelle par Puthomme, architecte, et Augustin Bemelmans entrepreneur à Sucy. Bâtiments sud et ouest de la ferme démolis après 1810 .","habitants":"G-Val ; amille Masparault                          Montaleau ,    Philippe de Coulanges                   \"","divers":"Cinq châteaux dans cet article; Haute Maison,  Grand-Val grav-,, Montaleau grav-5-6  et Petit  Val grav 4-5  .Hte maison  GPS : 48° 46' 12,85\" Nord, 2° 31' 26,03\" Est                                                    Gd -val GPS : 48° 46' 11\" Nord, 2° 31' 22\" Est                                                      Montaleau  GPS : 48° 46' 11\" Nord, 2° 31' 22\" Est                                            Petit Val  GPS : 48° 46' 11\" Nord, 2° 31' 22\" Est","gps":"48° 46' 12,85\" Nord, 2° 31' 26,03\" Est","images":["../image/image_94/94_Sucy_en_Brie_94_1.jpg","../image/image_94/94_Sucy_en_Brie_94_2.jpg","../image/image_94/94_Sucy_en_Brie_94_3.jpg","../image/image_94/94_Sucy_en_Brie_94_4.jpg","../image/image_94/94_Sucy_en_Brie_94_5.jpg","../image/image_94/94_Sucy_en_Brie_94_6.html","../image/image_94/94_Sucy_en_Brie_94_7.html","../image/image_94/94_Sucy_en_Brie_94_8.html","../image/image_94/94_Sucy_en_Brie_94_9.html"]},"Consult_chateau_formulaire5998":{"id":"Consult_chateau_formulaire5998","dept":"94","canton":"Villeneuve-Saint-Georges","commune":"Valenton","nom":"Valenton","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Valenton , Charmilles, Tourelles et Perissaguet.                                                                                                  VALENTON, construit pour Eusèbe Jacques Chaspoux de Verneuil, introducteur des ambassadeurs entre 1725 et 1740. Le château était agrémenté d'une cour, d'un jardin, d'un bassin, d'une fontaine et possédait une ferme, le pavillon, dit \"la tourelle\", situé à l'extrémité ouest du domaine fut édifié plus tard pour Jean Baptiste Halma de Belmont, qui acquit le château de Valenton en 1752 et mourut en 1774. Le pavillon fut classé au titre des M.H. en 1948. En 1839, la propriété fut divisée en deux le long du rû de Gironde. En 1844, le château était en ruine, le corps de logis principal fut reconstruit dans la deuxième moitié du XIXe siècle au même emplacement, vers 1925, il fut flanqué de deux grosses tours, dans l'autre partie du parc un château dit de \"la tourelle\" fut construit en 1885 par l'architecte Duchemin, le parc de ce château fut loti au XXe siècle.  Ancien château de Valenton couvert d'un toit à longs pans et croupes brisées, aux deux ailes en équerre, à toit en pavillon brisé; pavillon en pierre de taille orné de l'ordre dorique et couvert d'un dôme en ardoise ; nouveau château de Valenton en moellons revêtus d'enduit ; les tours sont en brique portant la marque EM, le toit à longs pans et croupes, et les toits coniques sont en ardoise ; château de la tourelle en pierre de fontainebleau avec brique en remplissage couvert d'un toit à longs pans brisés et flèches en ardoise.  propriété de la commune, annexe de la Mairie.   Le Petit pavillon est appelé La Tourelle. La construction du château de la Tourelle date de la 2e moitié du XVIIe à la 1ère moitié du XVIIIe siècle. C'est un Pavillon de type Gloriette construit sur un plan circulaire. Il est classé aux M.H. depuis le 16/06/1948.","architecture":"VALENTON  la municipalité  inaugure les nouveaux travaux de rénovation menés dans le parc Duclos.\nAprès la réfection du parvis qui mène au château PERISSAGUET  les habitants sont invités à découvrir le nouvel espace, le long de la rue du Colonel-Fabien. Des aménagements qui respectent «les anciens tracés historiques » du parc, avec des jardins en terrasse sur trois niveaux. Un éclairage à distance «respectant la faune et son temps nocturne » a été mis en place. Reste encore à renaturer le rû de Gironde, dans la partie arrière du parc. Le chantier doit démarrer fin 2018. Le parc sera ouvert au public dans son intégralité dès 2020.","habitants":"Eusèbe Jacques Chaspoux de Verneuil, \"","divers":"Trois châteaux à valenton ; Valenton, Charmilles grav_6, Tourelles  grav 4-5 et Perissaguet grav 1-2-3.                                               Tourelle    GPS : 48° 44' 40\" Nord, 2° 27' 34\" Est","gps":"48° 44' 40\" Nord, 2° 27' 34\" Est","images":["../image/image_94/94_Valanton_1.jpg","../image/image_94/94_Valanton_2.jpg","../image/image_94/94_Valanton_3.jpg","../image/image_94/94_Valanton_4.jpg","../image/image_94/94_Valanton_5.jpg","../image/image_94/94_Valanton_6.jpg"]},"Consult_chateau_formulaire8da3":{"id":"Consult_chateau_formulaire8da3","dept":"94","canton":"Boissy-Saint-Léger","commune":"Villecresnes","nom":"Villecresnes","type":"Château","periode":"XVIII","histoire":"Trois châteaux dans cet article, Monsieur, Gaillard et Villescrennes. GAILLARD, est construit en 1760 par la  seigneurie de Brunoy. Petite aile en retour d'équerre au sud ajoutée entre 1760 et 1770 . Bâtiment principal relié à un pavillon sur rue et aile sud démolie entre 1790  marquisat de Grosbois et 1810. Bâtiment principal remanié après 1810. Appelé château Gaillard  du marquisat de Grosbois, de plan régulier à  élévation à travées,  avec sous-sol ; un étage carré ; étage de comble  et un escalier dans-oeuvre ; escalier tournant à retours avec jour,  toit à longs pans brisés ; en  croupe  couvert de tuile plate ; ardoise.","architecture":"VILLESCRENNES,  château et ferme bâtis au XVIIe siècle. Garde-corps, appui de fenêtre central et grille portant les initiales J. M. de la première moitié du XVIIIe siècle. Château surélevé d'un étage et façade antérieure remaniée à la fin du XVIIIe siècle. Bâtiment sud ouest de la ferme démoli entre 1790 et 1810. Communs à l'ouest du château et bâtiment sur rue de la ferme partiellement détruits après 1810. Pigeonnier et remise rhabillés au XIXe siècle. Abreuvoir et puits disparus après 1810 , propriété de la commune                                                                                                                     et à cinq K.M. au sud  MONSIEUR, à  Mandres les roses fief des Tours Grises attesté au XIVe siècle. En 1604, colombier à pied, cour, vivier, verger et jardin cités. En 1680, présence de pressoir, cellier, greniers, grange, salle basse. Entre 1760 et 1770 construction des bâtiments nord-est et nord-ouest. En 1765, cuisine, chambre, salle, fournil, granges, écuries, étables à vaches, bergeries, hangar, porcherie, poulailler, pressoir, jardin, cour et colombier attestés. Acheté par Monsieur, frère du roi, en 1774. Cour fermée au sud-ouest entre 1790 et 1810. Passe aux mains de la famille Berthier de Wagram en 1813 et annexé au domaine de Grosbois. Ce vaste ensemble organisé autour d'une cour fermée, de type briard, avec logis sur rue est acquis par la commune en 1983.","habitants":"Gaillard;Famille des Brunoy                Monsieur; famille Berthier de Wagram \"","divers":"Trois châteaux dans cet article, Monsieur grav-1-2, Gaillard gran-3et Villescrennes grav-4-5-6                    gps 48° 43' 17? nord, 2° 32' 03? est","gps":"","images":["../image/image_94/94_Villecresnes_1.jpg","../image/image_94/94_Villecresnes_2.jpg","../image/image_94/94_Villecresnes_3.jpg","../image/image_94/94_Villecresnes_4.jpg","../image/image_94/94_Villecresnes_5.jpg","../image/image_94/94_Villecresnes_6.jpg"]},"Consult_chateau_formulaireb657":{"id":"Consult_chateau_formulaireb657","dept":"94","canton":"Villejuif","commune":"Villejuif","nom":"Villejuil","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article;  Villejuif et Vitry.                                         VILLEJUIF,   après avoir acquis la seigneurie de Villejuif en 1672, Jean Duret, capitaine dans le régiment du prince de Conti, revend en 1674 lancienne maison seigneuriale au séminaire de Saint-Nicolas-du-Chardonnet, et se fait construire en 1680 un nouveau château. En 1732, le dernier héritier Duret revend la seigneurie à Jacques Molin, chirurgien du roi. Sa sur Suzanne, épouse d'Antoine de Serre de Saint-Roman, en hérite, et la transmet à son fils   Étienne de Serre de Saint-Roman, dont les héritiers seront les derniers seigneurs de Villejuif, mais son fils Jacques (1745-1794) toutefois en hérite. À la Révolution, Jacques de Saint-Roman est guillotiné tandis que son fils Alexis-Jacques de Serre de Saint-Roman fuit en Angleterre. Au début du XIXe siècle et jusqu'en 1845, les audiences du juge de paix de la commune se font dans une dépendance du château, le comte de Saint-Roman renonçant aux droits de location. En septembre 1900, est percée l'avenue de Saint-Roman (aujourd'hui rue Eugène-Varlin), reliant l'hôtel de ville et les écoles aux derniers vestiges du château.\nIl est ensuite divisé en logements, puis détruit en 1989","architecture":"VILLEJUIF D'après les clichés qu'en a pris Eugène Atget en 19018, plus qu'un château à usage militaire, il s'agissait davantage d'une ferme seigneuriale, construite en pierres des carrières d'Arcueil.\nSon parc, vendu en 1910, sétendait entre la rue Jean-Jaurès, lavenue Paul-Vaillant-Couturier (anciennement avenue des Écoles) et la rue Georges-Lebigot (anciennement rue du Moutier. Au no 3 et 10 de la rue du Colonel-Marchand subsistent quelques vestiges de cet ensemble architectural. Il s'y trouvait aussi un cimetière familial.\nL'hôpital Paul-Brousse a été construit sur le terrain de la ferme attenante au château.                                                                                                                                  VITRY, ville voisine de Villejuif.   Le château de Vitry-sur-Seine était un château seigneurial du XVIIIe siècle anciennement situé à Vitry-sur-Seine  commandé par Claude-François Paparel en 1708   (trésorier ordinaire des guerres et de la Gendarmerie de Louis XIV). Au début du XXe siècle, son terrain fut vendu par lots par la famille héritière (Fadate de Saint-George) à différents particuliers pour de futurs projets immobilier. Le \"grand château\" sera détruit en 1910 et laissera place à divers projets urbains le petit château, subsistera jusqu'en 1930 et laissera place à des bains publics qui deviendront la Galerie d'art municipale de Vitry-Sur-Seine.","habitants":"Famille de Jacques Molin,\"","divers":"Deux châteaux dans cet article;  Villejuif et Vitry grav-4.    Villejuif 48° 47' 40? N, 2° 21' 43? E","gps":"","images":["../image/image_94/94_Villejuif_1.jpg","../image/image_94/94_Villejuif_2.jpg","../image/image_94/94_Villejuif_3.jpg","../image/image_94/94_Villejuif_4.jpg"]},"Consult_chateau_formulaired141":{"id":"Consult_chateau_formulaired141","dept":"94","canton":"Villeneuve-Saint-Georges","commune":"Villeneuve St-Georges","nom":"Villeneuve_st_Georges","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article Belleplace, Bellevue et Beauregard.  BELLEPLACE, le château de Belleplace du XVIIe siècle. Le domaine de Belleplace fut érigé en terre noble en 1587 par le cardinal de Bourbon, abbé de Saint Germain des Prés. Le château, aujourd'hui très dénaturé par sa division en maisons individuelles, date peut-être du XVIIe siècle. En 1752, il fut réuni au fief de la Grille, Voisin. Le lotissement du parc et de la proche prairie du Blandin fut commencé fin 1918 et achevé début 1919. Il reste des communs datant peut-être du XIXe siècle.","architecture":"BEAUREGARD du XIXe siècl, qui a appartenu à la comtesse de Hanska. Installée dans un ancien château rénové, aux portes de Paris, la résidence De Beauregard Villeneuve Saint Georges peut accueillir jusquà 88 personnes âgées de plus de 60 ans, toutes pathologies confondues, pour un séjour permanent ou temporaire. fut également hôtel de ville                                                                                                                        BELLEVUE, le plan détaillé du quartier Chateau de Bellevue ci-après situe les contours du quartier dans l'espace de la commune de Villeneuve-Saint-Georges. Celà permet, au premier coup d'oeil, d'appréhender le rapport en superficie du quartier chateau de Bellevue par rapport à la superficie de Villeneuve-Saint-Georges. Le plan permet aussi de localiser précisément le  chateau de Bellevue au sein de la ville. Bellevue  du XVIIe siècle, avec son tableau La reine aux Tuileries de J.-B. Bondoux.","habitants":"Belleplace; cardinal de Bourbon                                Beauregard ;comtesse de Hanska\"","divers":"Trois châteaux dans cet article Belleplace, Bellevue grav-1 et Beauregard grav-2-3.                                        Gps  48° 43' 57? nord, 2° 26' 59? est","gps":"","images":["../image/image_94/94_Villeneuve_st_Georges_1.jpg","../image/image_94/94_Villeneuve_st_Georges_2.jpg","../image/image_94/94_Villeneuve_st_Georges_3.jpg"]},"Consult_chateau_formulaire2d55":{"id":"Consult_chateau_formulaire2d55","dept":"94","canton":"Vincennes","commune":"Vincennes","nom":"Vincennes","type":"forteresse","periode":"XIII-XVII","histoire":"VINCENNES, . En 1239, Louis IX reçoit à Vincennes la 1ère partie des reliques de la Passion, achetée à l'empereur de Constantinople. En avril 1248 inauguration de la Sainte-Chapelle du palais de la Cité à Paris, création par Louis IX d'une chapellenie dans la chapelle Saint-Martin de Vincennes. En juin 1248, Louis IX part de Vincennes pour sa première croisade.  En 1270 Louis IX part de Vincennes pour sa seconde croisade. Philippe Le Bel (1285-1314) fait faire des travaux à Vincennes. Naissance à Vincennes du futur Charles V en 1338. En avril 1361 débute la construction du donjon de Vincennes. Mort de Jean le Bon à Londres 8 avril 1364, Charles V lui succède. 1364, début probable de la construction du châtelet du donjon, les travaux de construction s'accélèrent en 1365. De 1365 à 1367 réparation du manoir de Vincennes. En 1367 le roi s'installe dans le donjon avec ses coffres. En 1369 reprise de la guerre et achèvement du donjon. En 1369 s'ouvre une période de graves difficultés financières pour la monarchie, on termine le châtelet, l'enceinte du donjon et les bâtiments appuyés contre elle. En 1373 début de la construction de l'enceinte du château et de la basse-cour au nord.\nDe 1373- à 1377 achat de terrains pour créer le parc de Beauté et construction du manoir.  En 1379 charte de fondation de la Sainte Chapelle de Vincennes. En 1380 achèvement de la construction de l'enceinte du château, mort de Charles V au manoir de Beauté. Fin de la construction de la basse cour au nord du château en 1385. En 1393 première attestation de travaux à la Sainte-Chapelle. En 1396, le choeur et la sacristie de la Sainte-Chapelle sont achevés, les coffres du Roi quittent définitivement le donjon. De 1405 à 1410 arrêt probable du chantier de la Sainte-Chapelle.","architecture":"VINCENNES, en 1407 assassinat de Louis d'Orléans. Henri V meurt dans le donjon de Vincennes en 1422En 1610, début de la construction du pavillon du roi, assassinat dHenri IV, c'est ainsi que Marie de Médicis recherche la sécurité au château de Vincennes, où son fils Louis XIII passe sa jeunesse. De 1654 à 1661, Le Vau remanie le château où Louis XIV réside très régulièrement jusqu'en 1671. En 1667 est créée la paroisse de Vincennes. L'affaire de Vincennes (1790), constatant que les prisons sont surpeuplées suite à la destruction de la Bastille, l'Assemblée nationale, vote un décret mettant le donjon de Vincennes à la disposition de la commune de Paris. En 1814, Daumesnil, gouverneur du château depuis 1812, le défend vaillamment contre les troupes alliées. Il fait voter une loi décidant la fortification de Paris en 1840, le château de Vincennes devient un fort de seconde ligne défendant la capitale. Construction dans les années qui suivent du Fort Neuf, à l'Est du château. Lors de la Révolution française de 1848, le 22 février 1848, François-Vincent Raspail, homme politique, chimiste et médecin est emprisonné dans le donjon. En 1936-1940, le château de Vincennes devient le poste de commandement du chef d'état major des Armées. Pendant la deuxième guerre mondiale, de 1940 à 1944, les troupes allemandes occupent le château, elles opèrent des destructions considérables en le quittant en août 1944. Restauré, il abrite les services historiques de l'armée depuis 1948. Éléments protégés MH : en totalité, les parties bâties et non bâties du château, à l'exception des intérieurs du pavillon de l'Armurerie (dit orangerie), du pavillon du Harnachement; abords attenants du château situés sur les communes de Vincennes.","habitants":"Le Roi Louis IX, Philippe Le Bel,  Charles V\"","divers":"Vincennes GPS : 48° 50' 34\" Nord, 2° 26' 09\" Est","gps":"48° 50' 34\" Nord, 2° 26' 09\" Est","images":["../image/image_94/94_Vincennes_1.jpg","../image/image_94/94_Vincennes_2.jpg","../image/image_94/94_Vincennes_3.jpg","../image/image_94/94_Vincennes_4.jpg","../image/image_94/94_Vincennes_5.jpg","../image/image_94/94_Vincennes_6.jpg","../image/image_94/94_Vincennes_7.jpg","../image/image_94/94_Vincennes_8.jpg","../image/image_94/94_Vincennes_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','94 — Val-de-Marne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
