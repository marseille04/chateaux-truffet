t Condé se battirent à Ablon lors de la Fronde. En 1688, le Peletier racheta la seigneurie. Au XVIIIe siècle, le port d'Ablon joua un rôle important dans le transport des vins vers Paris.  Vers 1767, Jean-Baptiste de Brevend, décide de remanier entièrement le château, il fait enlever trois des tours, le pont-levis et les douves et le château est désormais fait de briques (au lieu de la pierre et du bois). Malheureusement, la nouvelle construction ne fut jamais achevée complètement puisque deux ailes devaient être ajoutées de chaque côté du châteauEn 1792, Ablon fut érigée en commune. A la moitié du XIXe siècle, elle devint un lieu de villégiature et perdit ses activités agricoles. Elle profita d'une gare de 1837 à 1844 puis à partir de 1853. En 1862 Arcisse de Caumont précise \"qu'il est toujours occupé par la famille qui porte le nom de la paroisse\", donc la descendance des seigneurs d'Ablon.  En 1841, la chapelle fut démolie et reconstruite en 1842, puis agrandie en 1857 et munie d'une tour-clocher en 1899.","architecture":"ABLON est mentionné en 1243 ; un certain Jacques de Pacy fit élever un nouveau château en 1348; il devint ensuite la propriété d'Agnès Sorel qui le fit peut-être reconstruire vers 1445 (justification par travaux historiques); les deux tours demi hors-oeuvre datent soit de 1348, soit du XVe siècle; il fut acquis par des spéculateurs à la Révolution; remanié par la suite; le balcon et l'escalier dans-oeuvre datent de la fin du XVIIIe siècle ou du début du XIXe siècle; le château est actuellement divisé en plusieurs logements. Les deux premiers niveaux de la tour demi hors-oeuvre, côté Seine, sont en pierre de taille.","habitants":"Famille de Turenne\"","divers":"Ablon grav 1-2 gps  48° 43' 32? nord, 2° 25' 16? est","gps":"","images":["../image/image_94/94_Ablon_sur_Seine_1.jpg","../image/image_94/94_Ablon_sur_Seine_2.jpg","../image/image_94/94_Ablon_sur_Seine_3.jpg"]},"Consult_chateau_formulaire4bf0":{"id":"Consult_chateau_formulaire4bf0","dept":"94","canton":"Charenton le Pont","commune":"Charenton le Pont","nom":"Antoine_de_Navarrre","type":"Château","periode":"XVI","histoire":"ANTOINE  de NAVARRE Au début du XVIIe siècle  fut la propriété de Barthélemy Cenamy, banquier  d'Henri III d'origine italienne à sa mort en 1611 les héritiers cèdent à Nicolas de Verdun  premier président au parlement de Paris qui  vers 1612 fait la construction du pavillon et fera en 1619 l'acquisitrion du château de Conflans. il s'en défait en 1633 suite à sa nomination au garde des sceaux, le pavillon passe  à un maitre des comptes Salomon Phélipeaux puis au président de la chambre des comptes Paul Ardier  en 1629 au futur chancelier Séguier, avant d'échoir en 1658  à Godefroy  d'Estrades futur maréchal de France , après lui le domaine change de mains à plusieurs reprises avant d'entrer en 1764 dans la famille Montz qui le conservera jusqu'en 1808, en 1821 la duchesse douairière d'Orléans Louise-Marie- Adélaïde de Bourbon- Penthièvre se porte acquéreur qu'elle lègue par testament à une de ses dames d'honneur et en 1838 le pavillon est acquis par la commune et en 1880 qui en fait l'hôtel de ville,le château revient en lègue à la ville de Tours.","architecture":"ANTOINE  de NAVARRE,  le pavillon fut construit, vers 1612, pour Nicolas de Verdun. Il remplace une demeure appelée Maison du Cadran. Le parc du pavillon fut loti en 1828 pour devenir le quartier du Centre de Charenton. La commune de Charenton-le-Pont acquiert le pavillon d'Antoine de Navarre, en 1838, pour y installer sa mairie. L'immeuble fut agrandi en 1880 par l'architecte Léandre Gravereaux. Le Pavillon d'Antoine de Navarre est très caractéristique de l'architecture de l'époque de sa construction du style des immeubles de la Place des Vosges à Paris. Le pavillon possède 4 niveaux dont un, sous les combles. Son toit est revêtu d'ardoises, ses murs de briques et ses angles de pierre.est classé aux M.H. depuis 1862. C'est devenu l'Hôtel-de-Ville de Charenton-le-Pont.","habitants":"Nicolas de Verdun\"","divers":"Château d'Antoine de Navarre grav -2 -3  le pavillon d'Antoine de Navarre.  GPS : 48° 49' 10,73\" Nord, 2° 24' 57,03\" Est","gps":"48° 49' 10,73\" Nord, 2° 24' 57,03\" Est","images":["../image/image_94/94_Antoine_de_Navarre_1.jpg","../image/image_94/94_Antoine_de_Navarre_2.jpg","../image/image_94/94_Antoine_de_Navarre_3.jpg"]},"Consult_chateau_formulairea106":{"id":"Consult_chateau_formulairea106","dept":"94","canton":"Villiers-sur-Marne","commune":"Bry Sur-Marne","nom":"Bry_sur_Marne","type":"Château","periode":"XVIII-XIX","histoire":"BRY Sur-Marne, fut édifié en 1764 par l'architecte François II Franque, pour la famille Frémont. Sur l'emplacement d'un ancien château, à la demande d'Etienne de Silhouette financier , controleur des finances, qui l'acquit en 1760. A sa mort le domaine devient la propriété de  Clément de Laage, fermier général. en 1793 le château perquisitionné.  Clément et son fils Clément-Philippe emmenés à Paris à la conciergerie  seul le fils fut sauvé  à son retour loua le domaine de 1803 à 1808 à Charles Maurice de Talleyrand, ministre. En 1816 acheté par Joseph-Dominique-Louis de   Favier  baron d'Empire fit carrière en Italie, dans  l'industrie naissante du gaz d'éclairage. Une fois, sa fortune faite, il rentra en France, en 1879, avec son épouse Elvira Tozzi devenu veuve fonda à l'emplacement du vieux fief de l'hôtel-fort en 1890 une maison de retraite. Depuis 1925, le château de Bry a été racheté par la Congrégation des Surs de Saint-Thomas de Villeneuve qui en fit une école catholique et fit construire une chapelle, contre la façade antérieure. L'ancien Château de Bry est fermé au Public. C'est devenu une école catholique, privée.","architecture":"BRY Sur-Marne, un logis noble est attesté à cet endroit dès le XVIe siècle. En 1662, le seigneur de Bry, François Ours-Miron, y transfère le siège de la seigneurie de Bry et procède à de nombreuses transformations.Simple bâtisse rectangulaire Le château est entièrement reconstruit au milieu du XVIIIe siècle par Etienne de Silhouette (1709-1767) contrôleur général des Finances puis ministre dEtat sous Louis XV, dont le patronyme est devenu un nom commun. Détruit par des bombardements en 1870, il est reconstruit en 1872. Il est aujourdhui la propriété de la congrégation des soeurs de Saint-Thomas de Villeneuve et accueille un établissement scolaire.","habitants":"famille Frémont et Clément de Laage\"","divers":"Bry Grav  1-2-3 mairie grav-4                          GPS : 50° 50' 22\" Nord, 2° 31' 19\" Est","gps":"50° 50' 22\" Nord, 2° 31' 19\" Est","images":["../image/image_94/94_Bry_sur_Marne_1.jpg","../image/image_94/94_Bry_sur_Marne_2.jpg","../image/image_94/94_Bry_sur_Marne_3.jpg","../image/image_94/94_Bry_sur_Marne_4.jpg"]},"Consult_chateau_formulairee797":{"id":"Consult_chateau_formulairee797","dept":"94","canton":"Villeneuve-Saint-Georges","commune":"Limeil_Brévanne","nom":"Brévanne","type":"Château","periode":"XVIII-XIX","histoire":"BREVANNE, sa construction date du XVIIIe au XIXe siècle. Son premier propriétaire fut Marc Henri Le Pileur de Brévannes. Un château médiéval avec ses tours, ses douves, ses échauguettes est attesté au début du XIVe siècle. Il appartenait à la famille de Corbie. Sous Louis XIV, les jardins furent dessinés par Le Nôtre. Marc Henri Le Pileur de Brévannes, conseiller du roi, Président en la Chambre des comptes, rachèta, en 1786, le château en mauvais état. Il fit ordonner sa destruction et fit bâtir une élégante bâtisse de style Louis XVI. Mais il en profita peu, car à la Révolution, il dut fuir à l'étranger. A son retour d'émigration, il vendit le château qui sera racheté en 1803, par Pierre Marie Muguet de Varange, né vers 1759 à Lyon, issue d'un maître passementier. Il épousa le 15 août 1791 Marie Caroline Andrieu de Turdine. Il fut maire de Limeil-Brévannes de 1806 à 1817. Il est décèdera le 12/12/1818.  En 1823, il est acquis par le banquier Jean-Charles Clarmont. En 1824, il deviendra la propriété du philologue hébraïque Philippe Sarchi (1765-1830), puis il passera à son fils l'agent de change Philippe Benoit Sarchi (1800-1864), et à sa veuve qui l'habitera, jusqu'en 1870. Après la guerre de 1870, il est occupé par les troupes prussiennes. Le Prince Achille Murat (1801-1847), neveu de Napoléon Ier, rachète la propriété en 1874 et la fait remettre en état.  Passionné de jeu de cartes, il l'aurait perdu au profit du Baron Rodolphe Hottinguer (1835-1920), riche banquier parisien qui ne s'intéresse pas à la propriété.","architecture":"BREVANNE, en 1883, le château de Brevannes est acheté par l'Assistance Publique pour en faire un hospice avec un dispensaire pour les personnes agées. Il est agrandi en 1886 pour y faire un quartier réservé aux ménages. Un quartier complémentaire est construit en 1891 pour les malades chroniques. Passionné de jeu de cartes, il l'aurait perdu au profit du Baron Rodolphe Hottinguer (1835-1920), riche banquier parisien qui ne s'intéresse pas à la propriété. En 1883, le château de Brevannes est acheté par l'Assistance Publique pour en faire un hospice avec un dispensaire pour les personnes âgées. Il est agrandi en 1886 pour y faire un quartier réservé aux ménages. Un quartier complémentaire est construit en 1891 pour les malades chroniques. En 1907, un ensemble de bâtiments réservés aux malades tuberculeux est édifié par l'architecte Paul-Louis Renaud. Un quartier réservé aux enfants malades est ensuite construit, qui sera appelé le pavillon Léon Bernard. Un sanatorium fut construit vers 1915. Le château de Brévannes est devenu l'Hôpital Emile Roux  Elements  protégés MH : le colombier de l'ancien château de Brévannes : inscription par arrêté du 25 janvier 1980. L'ancien château de Brévannes en totalité, ainsi que ses douves ; l'allée perspective bordée de tilleuls ; les façades et les toitures de l'orangerie ; les façades et les toitures de l'ensemble des bâtiments hospitaliers formant l'ancien quartier des Ménages et l'ancien quartier des Chroniques ; les façades et les toitures des bâtiments suivants de l'hôpital Léon Bernard : les pavillons Mary Poppins, Paul Barthez, Jean Monnet, Théophile Roussel et Félix Brun, la loge de madame de Sévigné, le logement et service des morts : inscription par arrêté du 3 septembre 2002.","habitants":"Famille de  Pierre Marie Muguet de Varange,\"","divers":"Brévanne,Grav-1-2-3   hôpital grav-4                                                           GPS: 48° 44' 58,8\" Nord, 2° 28' 47,96\" Est","gps":"48° 44' 58,8\" Nord, 2° 28' 47,96\" Est","images":["../image/image_94/94_Br%c3%a9vanne_1.jpg","../image/image_94/94_Br%c3%a9vanne_2.jpg","../image/image_94/94_Br%c3%a9vanne_3.jpg","../image/image_94/94_Br%c3%a9vanne_4.jpg"]},"Consult_chateau_formulaire7411":{"id":"Consult_chateau_formulaire7411","dept":"94","canton":"Cachan","commune":"Cachan","nom":"Cachan_Guise","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article, Guises et Provigny.                          PROVIGNY   De l'aqueduc construit au deuxième siècle pour amener l'eau à Lutèce subsistent trois piles ainsi qu'une  portion d'arc qui donna à l'endroit peut être dès le XVIe siècle le nom de fief des Arcs. Dans le 3e quart du XVIe siècle la famille d'Aligre plaque sur la face nord de ces vestiges une façade rythmée par trois légers avant-corps implantés entre les piles de l'aqueduc, celui du centre étant percé d'une porte cochère, au-dessus de laquelle subsiste une salle voutée d'ogive, la tourelle d'escalier est sans doute contemporaine de ces travaux tandis que la façade construite du côté sud de l'aqueduc porte la trace de nombreux remaniements, principalement aux XVIIe et XIXe siècles. Dans les années 1620 les piles de l'aqueduc \"Médicis\", implantées à quelques mètres de la façade élevée au siècle précédent, la dissimulent presque complètement. Dans la deuxième moitié du XVIIe siècle deux bâtiments viennent se greffer sur la construction antérieure: l'un à l'ouest, un logis en L prenait peut-être la place d'une construction antérieure, tandis qu'à l'est l'édifice semble être resté à usage de dépendance agricole.  La façade du logis, orientée à l'est, n'était rythmée que par les pilastres encadrant la travée centrale surmontée d'un fronton triangulaire. De cette époque reste un escalier,  démonté, à balustres en bois tourné. Mais ce logis fut fortement remanié au milieu du XIXe siècle: ajout d'un étage de combles, d'un perron encadré de colonnes ioniques et fermeture de la cour par une grille. Le domaine est légué vers 1910 par madame de Provigny au département de la Seine pour y établir un hospice.","architecture":"l.                                                                                                                          PROVIGNY Le château sert alors de logement au personnel, avant d'être racheté par la commune de Cachan et transformé dans les années 1980 en conservatoire de musique. Les vestiges de l'aqueduc sont classé en 1862, et le bâtiment du XVIe siècle qui l'enserre, ont fait l'objet dans les années 1990 d'une importante campagne de restauration. Les vestiges de l'aqueduc sont à assises alternées de moellon calcaire et de brique ; les murs plaqués au XVIe siècle sur ces vestiges sont en calcaire moyen appareil ; les ailes ainsi que la tourelle sont en moellon calcaire enduit ; le logis en L comprend un étage carré et un de comble, couvert en ardoise et en zinc. Les anciennes parties agricoles sont couvertes en tuile plate. La porte cochère est encadrée de pilastres à bossages alternés, la pièce qui la surmonte est voûtée d'ogives   propriété de la commune, conservatoire de musique.                                                                                                                GUISES, le domaine a dabord été la possession des religieux de labbaye de Saint Denis. Puis a été revendu à la fin du XVIe siècle à André Hurault de Maisse  qui reconstruit la demeure. Celui-ci est un homme riche, conseiller au Parlement, ambassadeur auprès des cours étrangères (Il jouit de la confiance dHenri III et de Catherine de Médicis, puis dHenri IV).. Elle passe au début du XVIIIe siècle à Anne-Marie-Joseph prince de Lorraine, duc de Guise. En 1752 le domaine et les droits seigneuriaux sont vendus au prince de Beauveau à condition de détruire château et parc. Il reste de ce domaine la maison dite \"des Gardes\" et la maison dite \"La Faisanderie\" ou \"La Fauconnerie\" ainsi qu'une maison 2 rue de la Convention. Après son décès, le domaine est racheté par la famille de Refuge puis celle des ducs de Guise. Un château plus important a été construit et ce bâtiment est devenu « La maison des gardes »Aujourd'hui centre culturel.","habitants":"Provigny ; famille d'Aligre                                   Guises; famille des ducs de Guises\"","divers":"Deux châteaux dans cet article, Guises  grav-3-4-5  et Provigny grav 1-2.    Provigny GPS : 48° 47' 57,5\" Nord, 2° 19' 55,6\" Est","gps":"48° 47' 57,5\" Nord, 2° 19' 55,6\" Est","images":["../image/image_94/94_Cachan_Guise_1.jpg","../image/image_94/94_Cachan_Guise_2.jpg","../image/image_94/94_Cachan_Guise_3.jpg","../image/image_94/94_Cachan_Guise_4.jpg","../image/image_94/94_Cachan_Guise_5.jpg"]},"Consult_chateau_formulaireb45e":{"id":"Consult_chateau_formulaireb45e","dept":"94","canton":"Champigny sur Marne","commune":"Champigny sur Marne","nom":"Champigny_sur_Marne","type":"Château","periode":"XVIII","histoire":"COEUILLY  Le château de Coeuilly, reconstruit au début du XVIIIe siècle est qualifié d'après l'aveu de 1785 de \"bien bâti\" et \"bien distribué\", c'est en effet une demeure solide dont le corps principal a été ajouté à une aile de l'ancien château. La nouvelle construction est appelée \"château neuf\". Le domaine était possédé au XVIIIe siècle par la famille Hocquart, une famille de magistrat d'ancien régime. A la veille de la Révolution, Louis Hyacinthe Hocquart avait été nommé par Louis XVI, président de la cour des aides. Il fut guillotiné pour une lettre anodine dans la même charrette que M. Lefèvre d'Ormesson, son voisin. Confisqué pendant la Révolution, le domaine de Coeuilly fut rendu à la veuve Hocquart par le premier consul. On raconte que Napoléon, rentrant de son expédition d'Egypte, ramena des cèdres et qu'il en offrit un à Mme Hocquart, la châtelaine de Coeuilly. En 1870 le domaine appartenait à la Baronne Elise de Bully dont les deux fils s'étaient engagés comme volontaire dans la garde Nationale. Le devoir fut cruel pour ces jeunes gens, puisqu'ils devaient faire pointer les canons sur leur château pendant la bataille de Champigny. Au début du XXe siècle le parc du château fut loti. Dans les années 1970, il était au bord de la ruine. ISMH depuis le 16 mars 1977, aujourd'hui il est préservé, grâce aux travaux réalisés par les nouveaux propriétaires. La façade principale a retrouvée ses armoiries au fronton, ses faunes grimaçants et ses guirlandes. La clôture en fibre ciment a été remplacée par une grille en fer massif en continuité avec la clôture sur recommandation de l'ABF.","architecture":"COEUILLY, aujourd'hui le château est une des dernière maisons des champs de fonctionnaires de l'ancien régime qui a subsisté jusqu'à nos jours près de Paris.  (propriété de la commune). La disposition intérieure du château a été étudiée avec le souci constant de la commodité et de l'équilibre. Une longue galerie distribue des pièces jusqu'à l'escalier d'honneur situé dans l'extrémité gauche de l'édifice. Les salles sont vastes avec plafonds décorés de stuc et de larges cheminées aux taques armoriées. A l'époque médiévale une chapelle existait, dédié à Saint Claude. Elle fut agrandie au XVIIe siècle par les de Lionne, alors propriétaires du château. Une galerie basse couverte en tuile communique du château Cuilly avec la chapelle. En 1744, des habitants de Cuilly adressèrent une requête à l'archevêché. Aucun chapelain ne desservait alors cette modeste église et les chemins vers Champigny, impraticables l'hiver, ne permettaient pas aux villageois de se rendre aux offices. \"Plusieurs habitants sont morts sans sacrements\" précise la requête. Mr Louis Poujade est propriétaire d'un tiers avec son frère du château de Coeuilly. Les façades et les toitures du bâtiment principal subsistant sont inscrits aux M.H. depuis le 16/03/1977.                                         Les TOURELLES A Champigny-sur-Marne, près du viaduc de Nogent, existe un château qui a appartenu à Sarah Bernhardt et qui, à sa mort, fut acheté par une certain M. J.F.","habitants":"famille Hocquart\"","divers":"Coeuilly  grav 1-2-3-4 GPS : 48° 48' 42\" Nord, 2° 32' 38\" Est                                                     GPS : 48° 48' 41\" Nord, 2° 32' 41\" Est                                                                           Tourelles grav-5  GPS : 48° 48' 40\" Nord, 2° 34' 18\" Est","gps":"48° 48' 42\" Nord, 2° 32' 38\" Est","images":["../image/image_94/94_Champigny_sur_Marne_1.jpg","../image/image_94/94_Champigny_sur_Marne_2.jpg","../image/image_94/94_Champigny_sur_Marne_3.jpg","../image/image_94/94_Champigny_sur_Marne_4.jpg","../image/image_94/94_Champigny_sur_Marne_5.jpg"]},"Consult_chateau_formulairee472":{"id":"Consult_chateau_formulairee472","dept":"94","canton":"Charenton le Pont","commune":"Charenton le Pont","nom":"Charenton_le_Pont","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux dans cet article; Bercy et Cenamy                                                                          BERCY, seigneurie et manoir situé au bord de la Seine attestés en 1134. Passent en 1522 aux mains de la famille de Malon qui fait construire un nouveau château plus au nord à partir de 1658 par l'architecte François Le Vau. A la mort de celui-ci en 1676, seuls le corps principal et l'aile orientale sont érigés, construction de l'aile ouest, aménagement de l'avant cour. Entre 1712 et 1714, construction  des communs, des écuries, des basses cours, redistribution intérieure du château et aménagement de la grande terrasse du bord de l'eau par l'architecte Jacques de La Guépière. Décor intérieur confié en 1713 et 1714 aux sculpteurs Jules Degoullons,et autres.  Parc morcelé à partir de 1809 : installation de négociants en vins dans la partie nord-ouest, fortifications de Thiers en 1840 et ligne de chemin de fer Paris-Lyon en 1847. Décor intérieur et meubles vendus aux enchères en 1860 : boiseries du grand cabinet du rez-de-chaussée remontées dans l'ancien hôtel Hirsch, celles de l'antichambre du premier étage remontées en partie avec des éléments étrangers dans l'ancien hôtel de la Rochefoucauld-Doudeauville, celles du grand cabinet du premier étage intégralement conservées à Chislehurst en Grande-Bretagne, mis à part les toiles peintes des dessus de porte, château démoli en 1861, à l'exception des communs qui subsistent encore rue du petit-château après que leur aile ouest ait été abattue après 1957.","architecture":"CENAMY, manoir et communs construits dans le quatrième quart du XVIe siècle pour Barthélémy Cenamy, banquier, et non pour Gabrielle d'Estrées, malgré la tradition. Acquis en 1838 par la commune pour en faire la mairie et parc loti autour de la nouvelle place Henri IV. Entre 1886 et 1888, communs démolis pour agrandir la mairie et construction d'un tribunal de justice et de paix et d'une salle des fêtes par l'architecte communal Louis Narcisse Gravereaux. A cette occasion, restauration des plafonds à solives et des lambris du manoir, dans l'esprit du XIXe siècle, salle des fêtes démolie. Manoir de briques en damier pour la partie de la mairie et le tribunal construits entre 1886 et 1888. Édifice classé MH partiellement en 1862. propriété publique, mairie, tribunal.                                                                                                                                                                           BERCY  Éléments protégés MH : la façade principale, les façades latérales et les couvertures correspondantes du bâtiment au 114 rue du petit-château : inscription par arrêté du 23 octobre 1959. Les façades et les toitures du pavillon de chasse de l'ancien château, sauf l'aile en retour : classement par arrêté du 3 janvier 1966.","habitants":"Bercy ; famille de Malon                                    Barthélémy Cenamy\"","divers":"Bercy  grav 1-2            gps 48° 49' 38,98? nord, 2° 24' 04,05? est                                                                                                 Trois châteaux dans cet article; Bercy, Cenamy grav -3","gps":"","images":["../image/image_94/94_Charenton_le_Pont_1.jpg","../image/image_94/94_Charenton_le_Pont_2.jpg","../image/image_94/94_Charenton_le_Pont_3.jpg"]},"Consult_chateau_formulairef9a4":{"id":"Consult_chateau_formulairef9a4","dept":"94","canton":"Champigny-sur-Marne","commune":"Chenevrières sur Marne","nom":"Chenevrières_sur_Marne","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article, la Maillarde, et le Rets.                          La MAILLARDE Le fief de la Maillarde et Longperrier mentionné en 1560. Le château est construit entre 1725 et 1740. les communs sont agrandis côté rue entre 1785 et 1810 . Communs divisés en habitations après 1810. Distribution intérieure et toiture du château totalement modifiées au XXe siècle. De plan régulier, élévation ordonnancée: sous-sol ; deux étages carrés ; étage de comble,  escalier dans-oeuvre , escalier tournant à retours avec jour , toit à longs pans , croupe , couvert en  ardoise                                  RETS, la première mention connue du domaine est en 1641. Parc agrandi avec aménagement de fabriques, de grottes, d'un réservoir, de rocailles et le  c hâteau reconstruit en 1720 par Charles Ju, architecte du duc d'Orléans. Les ailes en retour d'équerre sont ajoutées entre 1740 et 1785. Le salon est décoré de boiseries Louis XVI. Domaine vendu comme bien national à la Révolution. Site classé en 1949. Éléments protégés MH : les façades et les toitures du château; le grand salon avec décor au rez-de-chaussée: inscription par arrêté du 5 décembre 1984.","architecture":"RETS, la construction du château des Rets date du XVIIIe siècle. L'architecte était Charles Ju. Dame Anne d'Argouges, veuve de Messire Henri de Masparault, maître d'hôtel de Marie de Médicis et seigneur de Chennevières cède à Gilles Dufossé, Conseiller du roi, une maison entourée d'un parc de 6 arpents. Le domaine a été cité la première fois le 19/07/1461. Dufossé décède vers 1658, laissant 2 filles, Madeleine l'ainée, déjà mariée et séparée de Claude de Connetel, sieur de Beauregard et la seconde, Nicole, fiancée à Jacques de Vachon. Toute la famille vient habiter les Rets. Par un subterfuge douteux, Mme Dufossé munit un de ses ami, le sieur Gabriel Angot, d'une obligation fictive de paiement que celui-ci exige, dès la mort de la Dame et en accord avec Madeleine de Beauregard, à Nicole de Vachon. Cette dernière ne pouvant payer, cède à son créancier le domaine des Rets. En 1672, pris de remord, le sieur Angot avouera la supercherie. Marie-Louise de Vachon, fille de Jacques de Vachon et de Nicole Dufossé, hérite de la propriété à la mort de ses parents. La riche héritière épouse Jean-Nicolas de Montmorency, baron de Chateaubrun. Leurs affaires ne prospérant pas, elle vend la propriété des Rets à Charles Ju, architecte du duc d'Orléans. En 1720, Charles Ju fit reconstruire le château du Rancy, très endommagé, auquel furent rajoutées deux ailes en retour d'équerre, entre 1740 et 1785. A la Révolution, le château des Rets est vendu comme bien national. Par la suite, il eut plusieurs propriétaires dont le comte de Wimar, sénateur du Ier Empire.","habitants":"famille de  Messire Henri de Masparault            Retz;  Jean-Nicolas de Montmorency\"","divers":"Deux châteaux dans cet article, la Maillarde grav-1, et le Rets          Grav-2-3-4-5                                                                                            GPS : 48° 47' 54\" Nord, 2° 32' 02\" Est","gps":"48° 47' 54\" Nord, 2° 32' 02\" Est","images":["../image/image_94/94_Chenevri%c3%a8res_sur_Marne_1.jpg","../image/image_94/94_Chenevri%c3%a8res_sur_Marne_2.jpg","../image/image_94/94_Chenevri%c3%a8res_sur_Marne_3.jpg","../image/image_94/94_Chenevri%c3%a8res_sur_Marne_4.jpg","../image/image_94/94_Chenevri%c3%a8res_sur_Marne_5.jpg"]},"Consult_chateau_formulaire0a1a":{"id":"Consult_chateau_formulaire0a1a","dept":"94","canton":"Choisy-le-Roi","commune":"Choisy le Roi","nom":"Choisy_le_Roi","type":"Château","periode":"XVII-XVIII","histoire":"CHOISY le ROI, construit de 1680 à 1686 par l'architecte Jacques IV Gabriel pour Mlle de Montpensier, Chamchine et Poisson pensent que le château fut bâti à l'emplacement d'une maison de plaisance. Le château était agrémenté d'une chapelle, d'une cour, de communs, d'un belvédère, d'une orangerie, d'un colombier, d'un jardin et d'un jardin potager. Le sculpteur Etienne le Hongre, les peintres Louis Gabriel Blanchard, le Moyne, Van der Meulen, Monnoyer et Charenton furent chargés de la décoration du château. La chapelle fut ornée de peintures, tandis que le belvédère dit pavillon de l'Aurore, le fut par Antoine Coypel. En 1716, la princesse de Conti acquit le château et l'agrandit au nord en ajoutant une galerie allant à un pavillon servant de salle à manger suivi d'une petite aile. Le décor peint est attribué à Pierre Denis Marin le Jeune. En 1739, Louis XV, séduit par la proximité de la forêt de Sénart, l'acheta au duc de la Vallière.\nAnge Jacques Gabriel fut chargé d'aménagements propres à recevoir la cour qui durèrent jusqu'en 1774. Le petit château fut bâti de 1754 à 1756 afin de ménager au roi un lieu de détente et de repos. Les plus prestigieux des bâtiments reçurent des décors de sculpteurs; Coustou, Verberckt, Maurissant, Slodtz, Rousseau, Pigalle, Caffieri et Guibert et des peintres Peyrotte, Vernet le Jeune, Lesueur et Parrocel. La désaffection pour le domaine de Choisy commença sous Louis XVI qui le transforma en caserne de Suisses et se réserva le petit château comme rendez-vous de chasse, vendu en mai 1792.","architecture":"CHOISY le ROI, les bâtiments furent peu à peu détruits au cours des XIXe et XXe siècles. En 1805, les frères Paillart, installèrent leur manufacture de faïences autour du petit château et des communs. Sous Napoléon III, La Goutte, maître de forges et maire de Choisy, fit élever une maison bourgeoise avec jardin paysager à l'emplacement de l'ancienne avant-cour du château. En 1903, la commune y installe la mairie et un jardin public tandis que le reste du terrain fut loti et prit le nom de quartier du Parc. La construction du château date du XVIIIe siècle. En 1920, Nicolas Nikolaïevitch de Russie et son épouse sinstallèrent dans une maison de campagne, au château de Choigny, à 20 kms de Paris. Le grand  duc était constamment gardé par la police secrète Française et par un petit nombre de Cosaques. C'est devenu la Mairie de Choisy-le-Roi. Le château  était un ancien château royal. La Grande Mademoiselle fait édifier une superbe et monumentale Orangerie du côté de l'entrée. Le bâtiment est exposé plein sud, comme traditionnellement dans ce type de constructions. Il est entouré de deux galeries de treillages, où voisine un parterre avec un bassin circulaire en son centre. Des appartements permettaient à la princesse de se délasser dans ce lieu voisin du château. L'ensemble n'est pas sans rappeler le château de Saint-Cloud appartenant à monsieur, cousin de la Grande Mademoiselle de Saint-Cloud semble reprise à Choisy, ainsi que les treillages du parterre de Vénus de Saint-Cloud, placés en parallèle à Choisy.   Éléments protégés MH : les deux pavillons Louis XVI : inscription par arrêté du 2 mai 1927.","habitants":"Famille d' Antoine Coypel. Et Ange Jacques Gabriel\"","divers":"Choisy GPS : 48° 45' 47\" Nord, 2° 24' 32\" Est     Mairie   Grav -1   Orangerie   Grav 2-3   et pavillon grav-4","gps":"48° 45' 47\" Nord, 2° 24' 32\" Est     Mairie   Grav -1   Oran","images":["../image/image_94/94_Choisy_le_Roi_1.jpg","../image/image_94/94_Choisy_le_Roi_2.jpg","../image/image_94/94_Choisy_le_Roi_3.jpg","../image/image_94/94_Choisy_le_Roi_4.jpg"]},"Consult_chateau_formulaire93de":{"id":"Consult_chateau_formulaire93de","dept":"94","canton":"Créteil","commune":"Créteil","nom":"Créteil","type":"Château","periode":"XVIII","histoire":"deux châteaux dans cet articles de Créteil; Buttes et Méches                                BUTTES, première mention du nom à l'époque mérovingienne : Cristoialo. Au XIVe siècle, Créteil est constitué d'habitations agricoles et de quelques grandes fermes et manoirs rue des Mèches. Au XVIe siècle, Créteil est seigneurie de l'évêque de Paris. Site d'anciennes carrières, construction d'une maison enclose de murs entre 1796 et 1797. En 1840 aménagement de combles, adjonction de communs et d'un puits dans la cour. Puis morcellement de la propriété en 1859. En 1889 (date portée), transformation des façades par l'architecte Nanteuille, déplacement de l'entrée principale, création de la terrasse, des colonnes et des fenêtres latérales des combles surmontées de fronton. En 1901, il devient établissement médico-pédagogique. Ecole à partir de 1926.","architecture":"MECHES,  au XVIIIe siècle, 111 feux. Sous la Restauration, 1000 habitants dont une majorité de vignerons. A partir du Second Empire, construction de grandes maisons bourgeoises et début du lotissement au lieu-dit des Buttes. Château construit vers 1850 sur le modèle d'une propriété de Vérone en Italie pour Charlotte Georgina Smythe à la place du manoir du Pontault du XVIIe siècle. Important décor intérieur au salon de musique: allégories de la musique et des quatres continents. La loggia sur la façade postérieure au sud est aujourd'hui vitrée et transformée en jardin d'hiver. Le château des Mèches, situé en ville, possède un portail remarquable, il a été acquis par l'Etat en 1955 pour en faire la résidence du préfet.","habitants":"Famille de Charlotte Georgina Smythe \"","divers":"deux châteaux dans cet articles de Créteil; Buttes  grav 1-2 et Méches Grav  3 à 6                                                      creteil gps 48° 47' 28? nord, 2° 27' 46? est","gps":"","images":["../image/image_94/94_Cr%c3%a9teil_1.jpg","../image/image_94/94_Cr%c3%a9teil_2.jpg","../image/image_94/94_Cr%c3%a9teil_3.jpg","../image/image_94/94_Cr%c3%a9teil_4.jpg","../image/image_94/94_Cr%c3%a9teil_5.jpg","../image/image_94/94_Cr%c3%a9teil_6.jpg"]},"Consult_chateau_formulairec4d5":{"id":"Consult_chateau_formulairec4d5","dept":"94","canton":"Fontenay sous Bois","commune":"Fontenay sous Bois","nom":"Fontenay_sous_Bois","type":"Château","periode":"XVII-XIX","histoire":"FONTENAY sous BOIS, Le roi Charles V fait capter les eaux des sources de Fontenay pour alimenter les abreuvoirs du château de Beauté. Les conduits passent à travers le village, et le roi exempte les habitants du droit de prise et des impôts qui se lèvent pour la chasse aux loups, à condition qu'ils entretiennent et nettoient les conduits. En 1219, il existe une maladrerie située à la lisière du bois de Vincennes. Sous l'Ancien Régime, la seigneurie de Fontenay appartient à l'abbaye Saint-Victor. La culture de la vigne est la principale activité agricole. En 1767, Jacques Maquer achète les terres de l'abbaye et devient seigneur de Fontenay. Il habite alors un château, maintenant disparu, situé dans l'actuel parc de la mairie. En 1779, le Clos dit d'Orléans fut déboisé sur le bois de Vincennes pour élever des chevaux anglais et organiser des courses où figurèrent le duc de Chartres père du roi Louis Philippe et le comte d'Artois qui devint Charles X. Ces courses cessèrent en 1788 au grand regret des habitants à qui elles procuraient une source de revenus intéressante en écoulant leurs productions agricoles.","architecture":"FONTENAY sous BOIS,  château et communs construits au XVIIe siècle,  siècle. Château démoli entre 1770  et 1810, le ou première moitié XVIIIe siècle.  Le clos fut rendu à l'agriculture par la vente qui en fut faite comme domaine national. En 1803 il fut divisé en une cinquantaine de lots. Aux confins des territoires de Montreuil et de Vincennes, il existe une léproserie accueillant les malades de Bagnolet, de Montreuil, de Neuilly-sur-Marne et de Fontenay. le château actuel et l'orangerie sont construits dans la deuxième moitié du XIXe siècle. Il  prend le nom d'institution Belle-Vue quand il devient un pensionnat de jeunes filles à la fin du XIXe siècle. Il sert d'hôpital auxiliaire puis de petit séminaire des missions franciscaines dans le premier quart du XXe siècle, est un château.","habitants":"Famille de  Jacques Maquer \"","divers":"Fontenay  grav 1 hôtel de ville                          gps  48° 51' 06? nord, 2° 28' 38? est","gps":"","images":["../image/image_94/94_Fontenay_sous_Bois_1.jpg","../image/image_94/94_Fontenay_sous_Bois_2.jpg","../image/image_94/94_Fontenay_sous_Bois_3.jpg","../image/image_94/94_Fontenay_sous_Bois_4.jpg"]},"Consult_chateau_formulaire278e":{"id":"Consult_chateau_formulaire278e","dept":"94","canton":"Maison-Alfort","commune":"Maison-Alfort","nom":"Fort_de_Charenton","type":"Fort","periode":"XIX","histoire":"FORT CHARENTON, il fut un temps occupé par différentes unités de l'Armée Française. Après la chute de Napoléon, en 1814, puis après la défaite de Waterloo, en 1815, Paris fut occupée par une armée d'invasion. Pour parer à toute nouvelle occupation, il fut décidé la construction d'un dispositif défensif. L'enceinte de Thiers vit le jour en 1841. Elle était composée d'une fortification ceinturant la ville renforcée par 16 forts positionnés à quelques kilomètres de celle-ci. Le fort de Charenton faisait partie de ce système. Actuellement occupé par la Gendarmerie Nationale, le Fort vit passer différents régiments ainsi que des troupes d'occupation lors de la guerre franco-prussienne de 1870 et la seconde guerre mondiale.","architecture":"FORT CHARENTON,  c'était le siège du commandement des écoles de la gendarmerie nationale jusqu'au début de 2000. Construit entre 1842 et 1845, il abrite, depuis 2012, le siège de la région de gendarmerie d'Île de France, après avoir accueilli plusieurs services de la direction de la gendarmerie nationale et de la force de gendarmerie mobile et d'Intervention. Le centre des hautes études du ministère de l'intérieur (CHEMI) est implanté depuis 2010 tout comme le commandement de la région de gendarmerie d'Ile de France qui est arrivé durant 2012, dans les murs du Fort de Charenton.","habitants":"Gendarmerie Nationale\"","divers":"Fort GPS : 48° 48' 32\" Nord, 2° 25' 42\" Est","gps":"48° 48' 32\" Nord, 2° 25' 42\" Est","images":["../image/image_94/94_Fort_de_Charenton_1.jpg"]},"Consult_chateau_formulaire9e8e":{"id":"Consult_chateau_formulaire9e8e","dept":"94","canton":"L","commune":"Fresnes","nom":"Fresnes_94","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article de Fresnes,  Berny et Tourvoie.                         TOURVOIE, en 1737, la jouissance du domaine de Berny passa à Louis de Bourbon-Condé (1709-1771), comte de Clermont,  doté de très gros revenus ecclésiastiques dès l'âge de 9 ans. Il fit imprimer des lettres de faire-part pour la mort de son singe favori, qui avait 14 ans. Il était pourvu de revenus considérables, à 28 ans en 1737. Il y vécut avec sa maîtresse, Marie-Anne de Camargo dite La Camargo, qui s'y ennuya et le quitta, en ayant, dit-on, poussé Mlle Leduc, une autre condisciple dans les bras de son amant. En 1737-1741, il fit restaurer le domaine par son architecte Jacques Hardouin-Mansart de Sagonne et fit établir un théâtre. Les parterres de broderies des jardins furent supprimés et les colonnes du balcons de ce côté-ci remplacées par des consoles rocailles. En embauchant le dernier Mansart, le comte de Clermont s'inscrivait dans la continuité de ses prédécesseurs, tous cliens des Mansart (François, Jules Hardouin, Pierre Delisle). En 1741, Mlle Élisabeth Claire Leduc, danseuse de lOpéra, entra dans sa vie. Elle s'installa au château de Berny. Il eut bien du mal à l'en sortir et la logea au château de Tourvoie, où il vint la visiter pendant 30 ans, lorsqu'il avait un moment. En 1748, il donna pour elle des fêtes splendides que l'on a comparées à celles données au château de Sceaux, tout proche, par sa tante, la duchesse du Maine. Les artisans de ces divertissements étaient Pierre Laujon et Charles Collé. Mlle Leduc n'était pas très fidèle. Elle eut beaucoup d'amants. Le prince, un jour, par jalousie, lui donna un coup de canif sur le front. Pour s'excuser, il la nomma marquise pour se faire pardonner. Il l'épousera, secrètement, en 1765. Elle se consacra à des uvres de charité, lui donna un fils en 1766, qui deviendra l'abbé de Vendôme et une fille, en 1768.","architecture":"BERNY Il date de 1771. De nombreux spectacles y sont organisés. Vers 1640, le château de Berny fut transformé par François Mansart. En 1653-1671, il devient la propriété du diplomate et ministre dÉtat, Hugues de Lionne qui donna de somptueuses fêtes à Berny, jusquà sa mort en 1671. En 1685, Berny passa dans le giron de labbaye de Saint-Germain-des-Prés qui en fit la résidence de campagne de ses abbés commendataires. Le premier qui y séjourna fut le cardinal de Fürestenberg. Fort peu soucieux de son ministère, il y vivait en parfait libertin. Il laissa son empreinte aussi bien dans laménagement du parc que dans la décoration intérieure de cette maison de plaisance. Le jardin fut ainsi agrémenté de jeux deau entourant une île située dans un boulingrin à lextrémité dun miroir deau ainsi que dun théâtre de fleurs constitué de deux rangs de gradins à trois étages. En 1737, cest Louis de Bourbon-Condé, comte de Clermont, âgé de 33 ans, qui bénéficia du château de Berny. Il fut détruit en 1825. Il ne reste, aujourd'hui, que quelques vestiges du château de Berny.\n  Aujourdhui, il ne subsiste quune partie de laile droite du château qui sert de façade à un immeuble dhabitation. Mais avant cela, il fut une fabrique de meubles au XIXe siècle. Les vestiges ont été inscrits aux monuments historiques le 10 avril 1929.","habitants":"Louis de Bourbon-Condé                                       Berny ; Hugues de Lionne \"","divers":"Deux châteaux dans cet article, Berny grav -1-2 et Tourvoie grav-3.                     Berny  GPS : 48° 45' 33\" Nord, 2° 18' 46\" Est                                                    Tourvoie  GPS : 48° 45' 18\" Nord, 2° 19' 19\" Est","gps":"48° 45' 33\" Nord, 2° 18' 46\" Est","images":["../image/image_94/94_Fresnes_94_1.jpg","../image/image_94/94_Fresnes_94_2.jpg","../image/image_94/94_Fresnes_94_3.jpg","../image/image_94/94_Fresnes_94_4.jpg"]},"Consult_chateau_formulaire6d43":{"id":"Consult_chateau_formulaire6d43","dept":"94","canton":"Boissy-Saint-Léger","commune":"Boissy-Saint-Léger","nom":"Grosbois_Piple","type":"Château","periode":"XIX","histoire":"deux châteaux dans cet article Grosbois et Piple.                                                                                                                                                            GROSBOIS, en 1563 Raoul Moreau trésorier achète les terres de Grosbois. En 1616 Charles de Valois, bâtard  de Charles IX et de Marie Touchet prend possession du domaine construit en 1597 par un surintendant  d'Henri IV, Nicolas de Harlay gendre de Raoul Moreau. Il ajouta deux ailes et deux pavillons au château lui donnant ainsi son aspect actuel, en 1718 acquis par Samuel Bernard, puis à Chauvelin disgracié en 1737, puis succède  Maurepas et en 1761  à Monsieur frère du roi futur Louis XVIII et seigneur de Grosbois. Le domaine passa entre diverses mains avant d'être vendu comme bien national pendant la Révolution, Quelques années plus tard à Barras en 1797. Il fut la propriété du général Moreau et de Fouché pour appartenir, en 1805, au maréchal Berthier, grand dignitaire de lEmpire qui imprégna le château de la présence napoléonienne. Son fils, Napoléon Berthier, fit aménager la bibliothèque où lon trouve plus de 3000 ouvrages militaires et historiques ainsi quune collection de cartes et de plans de bataille. Le dernier prince de Wagram disparaît en 1918, léguant Grosbois à sa sur, la princesse de la Tour dAuvergne, et à son neveu, le prince Godefroy de la Tour dAuvergne. En 1962, René Ballière, président de la société dencouragement à lélevage du cheval français, acquiert le domaine.                                                                       PIPLE,  La propriété est vendue à la famille Hottinguer en 1819 qui fait reconstruire le château vers 1850 par l'architecte Phidias Vestier ainsi qu'une orangerie. Manoir entouré de fossés et murs, chapelle, salle et cellier construits vers 1280 pour l'abbaye de Saint-Maur. Reconstruction d'un château en 1725 pour le fermier général Cantorbe.","architecture":"GROSBOIS, Le château construit en brique et pierre est composé dun logis principal avec deux ailes en retour. Le premier étage conserve encore de nombreux éléments intéressants retraçant toutes les époques doccupation, peintures murales attribuées à Horace Blanc (1625), le salon Régence, les aménagements du maréchal Berthier, au XIXe siècle (galerie des batailles, salon de lEmpereur) ou de son petit-fils (bibliothèque). éléments protégés MH : le château, à l'exclusion des parties classées : inscription par arrêté du 11 septembre 1933. Les façades et les toitures des communs entourant la grande cour du château. : les façades et les toitures du château proprement dit, le pavillon nord-ouest des communs en totalité, la partie correspondant aux cinq travées est de laile nord des communs en totalité, la grille et les deux pavillons dentrée; la stèle du fils du maréchal Berthier ; la tour cynégétique Saint-Hubert ; les parties du parc comprenant  lobélisque de la grande allée et la glacière ; les murs de clôture du parc encore existants ; à Villecresnes : la demi-lune : classement par arrêté du 14 février 2014.                                                        PIPLE, Intervention attestée de l'architecte paysagiste René-Edouard André et de Fourdinois.  Éléments protégés MH : les façades et les toitures du château et de l'orangerie ; le grand et le petit salons du rez-de-chaussée avec leur décor ; la fontaine Saint-Babolien : inscription par arrêté du 29 octobre 1975.Sa construction date de 1850. Vestier était l'architecte, André René-Edouard était l'architecte paysagiste et Fourdinois fut l'ébéniste. Il est inscrit aux M.H. depuis le 20/10/1975, pour ses éléments protégés qui sont les façades, les toitures du château et l'orangerie, Le maréchal de Saxe fait construire vers 1745 un colombier et une ferme.","habitants":"Grosbois.  Nicolas de Harlay                                    Piple maréchal de Saxe  \"","divers":"deux châteaux dans cet article Grosbois Grav -4-5-6- et Piple  grav-1-2-3                                                     Grosbois GPS : 48° 44' 08'\" Nord, 2° 31' 41\" Est                                                    Piple GPS: 48° 45' 20\" Nord, 2° 30' 54\" Est","gps":"48° 44' 08'\" Nord, 2° 31' 41\" Est","images":["../image/image_94/94_Grosbois_Piple_1.jpg","../image/image_94/94_Grosbois_Piple_2.jpg","../image/image_94/94_Grosbois_Piple_3.jpg","../image/image_94/94_Grosbois_Piple_4.jpg","../image/image_94/94_Grosbois_Piple_5.jpg","../image/image_94/94_Grosbois_Piple_6.jpg","../image/image_94/94_Grosbois_Piple_7.jpg"]},"Consult_chateau_formulaire4ef6":{"id":"Consult_chateau_formulaire4ef6","dept":"94","canton":"Ivry-sur-Seine","commune":"Ivry sur Seine","nom":"Ivry_sur_Seine","type":"Fort","periode":"XVIII-XIX","histoire":"Fort d'IVRY SUR SEINE, date de 1841 à 1846. Il se situe à la périphérie où se trouvent les jardins familiaux. C'est un fort de style Haxo en pierre. Le Fort d'Ivry est l'un des seize forts détachés de l'enceinte de Thiers qui protégeaient Paris durant la seconde moitié du XIXe siècle, situé à Ivry-sur-Seine,  fut construit sous le règne du roi Louis-Philippe. Dune superficie intérieure de 0,10 km2, il est bâti à lextrémité du plateau d'Ivry et forme un éperon entre les vallées de la Bièvre et de la Seine. Il fut modifié après la guerre de 1870 afin de défendre Paris. En 1960, c'est dans son enceinte que sont passés par les armes en l'espace de 8 mois, 2 Officiers, membres de l'Organisation armée secrète (OAS) reconnus coupables d'attentat : Roger Degueldre, exécuté le 28 juin 1962 pour l'assassinat de Château-Royal et Jean-Marie Bastien-Thiry, exécuté le 11 mars 1963 pour sa double tentative d'assassinat contre le Président de la République Charles de Gaulle à Pont-sur-Seine et au Petit-Clamart. Ils furent ainsi les deux derniers condamnés à mort, fusillés en France. Le Fort d'Ivry appartient au ministère de la défense. Il est occupé par l'établissement de communication et de production audiovisuelle de la Défense (ECPAD) depuis 1946.","architecture":"IVRY SUR SEINE, la paroisse d'Ivry est créée au VIIIe siècle. Dès le IXe siècle, la seigneurie appartient au chapitre de Notre-Dame. L'agglomération primitive s'est formée sur le flanc septentrional du plateau qui sépare les vallées de la Seine et de la Bièvre, à l'abri des inondations. En 1639, à la suite de rachats successifs, Jean de Loynes devient principal seigneur d'Ivry. Il fait construire, à l'emplacement du manoir féodal, un petit château de brique et pierre à fronton. A la fin du XVIIe siècle, Claude Bosc, seigneur d'Ivry, fait bâtir un nouveau château. Au XVIIIe siècle, la proximité de Choisy-le-Roi fait d'Ivry un lieu recherché. En 1750 (allas de Trudaine), le village s'est développé autour de l'église et est entouré de cinq propriétés. Aucun changement majeur n'est visible sur la carte des chasses (1764) hormis la route d'Ivry qui s'est prolongée de quelques centaines de mètres. Le château n'existe plus. Le moulin est inscrit sur l'Inventaire supplémentaire des M.H. depuis le 20 juillet 1979, il a été déplacé de 35 mètres le 6 mai 1976. Communs encore existants en moellons sans chaîne en pierre de taille ; logement du portier couvert d'un toit en pavillon de tuiles plates ; l'orangerie possède un toit à longs pans et croupe ronde en tuiles plates et tuiles mécaniques ; remise à toit à longs pans en tuiles mécaniques, vestiges.","habitants":"roi Louis-Philippe\"","divers":"Fort GPS : 48° 48' 08\" Nord, 2° 23' 24\" Est","gps":"48° 48' 08\" Nord, 2° 23' 24\" Est","images":["../image/image_94/94_Ivry_sur_Seine_1.jpg","../image/image_94/94_Ivry_sur_Seine_2.jpg","../image/image_94/94_Ivry_sur_Seine_3.jpg"]},"Consult_chateau_formulaire1b0a":{"id":"Consult_chateau_formulaire1b0a","dept":"94","canton":"Maisons Alfort","commune":"Maisons Alfort","nom":"Maisons_Alfort","type":"Forteresse","periode":"XVII-XVIII","histoire":"Trois châteaux  dans cet article ; Alfort, Charantonneau et Reghat. CHARANTONNEAU, en 1281, mention d'un domaine de l'abbé de Saint-Maur sis à Charentonneau avec moulin et maisons. En 1377, Charles V achète de Nicolas Braque la maison qu'il avait à Charentonneau près du pont de Charenton. En 1444, vente à Nicolas Duru, huissier au Parlement, du fief de Charentonneau avec mention d'un manoir près du pont. En 1641 M. de Falcony devient possesseur des domaines de Charentonneau, d'Alfort et de la ferme de Maison Ville. Cédé à René Gaillard propriétaire du château voisin en 1671. Mentionné comme château au XVIIe siècle sur une gravure de Flamen datée de 1646. Mentionné au XVIIIe siècle par Piganiol de la Force. Saisi et vendu comme bien national pendant la Révolution, très remanié à la fin du XVIIIe siècle. Acquis le 31 janvier 1808 par le baron Rodier Saliège, revendu à la famille Joue Dastre en 1833. Lotissement du parc à la fin du XIXe siècle. Château détruit en 1950. Ne subsiste actuellement que deux murs de l'orangerie. Corps de logis en brique et pierre avec balcon de pierre supporté par des colonnes. Habité jadis par le Maréchal Bessières, il est aujourdhui réquisitionné par la  municipalité.","architecture":"REGHAT,existait au XVIIIe siècle appartenant à Pierre de Reghat. Le château servit de lieu de séjour pour la marquise de Pompadour. Il fut utilisé comme rendez-vous de chasse de roi Louis XV. Racheté par le baron Springer en 1871 pour bâtir une distillerie et fabrique de levure dans le parc. Aile ouest entièrement disparue. L'aile est en partie détruite pendant la guerre de 1914-1918. Le château est actuellement le logement du directeur. L'avant corps  percé de trois arcades en plein-cintre avec clé apparente; fronton à oculus; usine construite en fer et brique; minoterie en meulière comprenant cinq étages carrés; laboratoires et annexes en pierre.Éléments protégés MH : les façades et les toitures sur jardin : inscription par arrêté du 26/ 11-1979.                                                                                                                    ALFORT à maison Alfort En 1312, il est fait mention de l'Hôtel d'Harrefort.   Il relevait de labbé de Saint-Maur. Sur un titre de lan 1495, il était question de Jean de Harcourt, comte de Vaudémont. Autrefois, Harcourt et Harrefort ne devaient faire quun. Plus tard, en 1612, on trouve le château d'Hallefort.  M. Mallet de la cour des comptes, en était possesseur. Plus tard, on peut encore lire : Louis de Falcony, seigneur d'Alfort, possédait plusieurs pièces de terre ; la moitié de la basse-cour d'Alfort, le tout jusquà la concurrence de 64 arpents 1/2, ayant compris 16 arpents que M. larchevêque venait de lui inféoder dans la censive de maisons ; mais M. larchevêque érigea cette portion d'Alfort en fief, à la prière de Falcony, par acte, devant Dupuis et Nicolas Boucher, notaires à Paris, le 27/07/1641. En 1765, Jean-Louis de L'Héraud ou Lhéreau, seigneur de la Baronnie de Bormes, vendit cette propriété pour qu'il soit fondée lécole vétérinaire par Claude Bourgelat.","habitants":"Nicolas Braque                    et M. de Falcony                      Pierre de Reghat.\"","divers":"Trois châteaux  dans cet article ; Alfort-fort grav 1-2, Charantonneau grav-3-4-5 et Reghat grav-6-7. Alfort GPS : 48° 48' 21\" Nord, 2° 26' 16\" Est                                                                 Reghat GPS : 48° 48' 1,24\" Nord, 2° 26' 9,85\" Est","gps":"48° 48' 21\" Nord, 2° 26' 16\" Est","images":["../image/image_94/94_Maisons_Alfort_1.jpg","../image/image_94/94_Maisons_Alfort_2.jpg","../image/image_94/94_Maisons_Alfort_3.jpg","../image/image_94/94_Maisons_Alfort_4.jpg","../image/image_94/94_Maisons_Alfort_5.jpg","../image/image_94/94_Maisons_Alfort_6.jpg","../image/image_94/94_Maisons_Alfort_7.jpg"]},"Consult_chateau_formulaire3d00":{"id":"Consult_chateau_formulaire3d00","dept":"94","canton":"Marolles en Brie","commune":"Marolles en Brie","nom":"Marolles_en_Brie","type":"Château","periode":"XII-XVII-XVIII","histoire":"Trois châteaux dans cet article ; Buisson, le Prieuré et St-Arnould.  BUISSON, construction dans le premier quart du XVIIe siècle pour Simon Arnout, contrôleur général de la maison de Marie de Médicis. Aile orientale construite et basse cour fermée entre 1740 et 1770. Château et communs démolis puis reconstruits sur le même emplacement entre 1786 et 1810. Château et communs à nouveau démolis en 1852, il ne reste que deux pavillons et la grille d'entrée.\nLa construction du château du Buisson date de la 2eme moitié du XVIIe siècle et du XVIIIe siècle. Le château du Buisson est inscrit partiellement aux M.H. le 5/11/1975 pour les façades et toitures des deux pavillons d'entrée et sa grille d'honneur en fer forgé. Le maitre d'oeuvre était Simon Arnould, contrôleur général de la maison de Marie de Médicis. L'aile orientale a été construite et la basse-cour fermée entre 1740 et 1770. Le château du Buisson et les communs ont été démolis puis reconstruits, sur le même emplacement, de 1786 et 1810. Le château et les communs furent, à nouveau démolis, en 1852. Il ne reste aujourd'hui que les 2 pavillons et la grille d'entrée. Le château du Buisson est privé.\nÉléments protégés MH : les façades et les toitures des deux pavillons d'entrée ; la grille d'honneur en fer forgé : inscription par arrêté du 5 novembre 1975.","architecture":"PRIEURE, prieuré fondé à la fin du XIe ou au début du XIIe siècle, suite à la donation en 1088 de l'église paroissiale et de terres par Dreux de Mellot, archidiacre de Brie-Comte-Robert, au prieur de Saint-Martin-des-Champs de Paris qui y installa une communauté de religieux. Partie orientale de l'église réservée aux religieux, autel prieural dédié alors à saint Arnould. Le bâtiment en L touchant l'église à l'est est démoli entre 1740 et 1785 . Vendu comme bien national à la Révolution, il devient château avec adjonctions aux extrémités et construction d'un canal et d'un abreuvoir avant 1810. Au XIXe siècle un avant-corps semi-circulaires est ajoutés au nord, et les façades des communs partiellement rhabillées avec décor de brique.  Éléments protégés MH : les façades et les toitures (sauf les deux adjonctions à chaque extrémité ; l'escalier intérieur avec sa rampe en fer forgé : inscription par arrêté du 26 janvier 1978.                                                                  ST ARNOULD, date du XVIIIe siècle,  Il est inscrit aux M.H. Il se trouve dans la même famille depuis depuis 130 ans. acquit  au cours de la Révolution par Emira Marceau, soeur du  général François Séverin Marceau. Transmis de génération en génération depuis son acquisition en 1871, il fut la propriété des marquis et marquises de Lavie entre 1834 et 1849. ce très joli château est aujourd'hui, un lieu accueillant, chaleureux et vivant pour ceux qui le fréquenteront. Le château, restauré en 1996 de Saint-Arnould est ouvert toute l'année. la famille Moliné anciens propriétaire  jusqu'en 2009 possédait un manuscrit d'Henri de Rochefort \" Ali -BABA et les 40 ministres, visible sur le site de l'association  des amis de Marolles.","habitants":"Famille d'Arnould\"","divers":"Trois châteaux dans cet article ; Buisson, le Prieuré et St-Arnould grav 1-2-3                                                                   . Buisson GPS : 48° 44' 09\" Nord, 2° 33' 18\" Est                                                                                      Prieuré GPS : 48° 43' 56\" Nord, 2° 33' 06\" E                                                             St-Arnould  GPS : 48° 43' 57\" Nord, 2° 33' 03\" Est","gps":"48° 44' 09\" Nord, 2° 33' 18\" Est","images":["../image/image_94/94_Marolles_en_Brie_1.jpg","../image/image_94/94_Marolles_en_Brie_2.jpg","../image/image_94/94_Marolles_en_Brie_3.jpg"]},"Consult_chateau_formulairee0c3":{"id":"Consult_chateau_formulairee0c3","dept":"94","canton":"Nogent sur Marne","commune":"Nogent sur Marne","nom":"Nogent_sur_Marne","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Nogent et Smith-Champion.                      NOGENT SUR MARNE, le château fut construit au XVIIe siècle, il possède une belle cheminée 1er Empire, un escalier extérieur en fer à cheval aménagé au XIXe siècle. Parmi ses propriétaires, Henri-Charles Arnauld de Pomponne, Ambassadeur de France et Ministre des Affaires Etrangères. En 1895, la propriété est réunie au château voisin par la famille Smith-Champion qui en fera don à l'Etat en 1940 pour y établir une maison de retraite pour les artistes. Site classé en 1909, puis en 1963.","architecture":"SMITH-CHAMPION, château construit au XVIIe siècle. Garde-corps en fer forgé du XVIIIe siècle. Façades remaniées avec étage en surcroît transformé en étage carré au XIXe siècle. En 1895, propriété réunie au château voisin par la famille Smith-Lesouef. Construction d'un bâtiment sur la rue Charles VII, pour abriter la bibliothèque de la famille Smith-Lesouef qui en fait don à l'Etat. En 1940, ce château et la propriété voisine sont offerts à l'Etat par la famille Smith-Champion. Le vestibule est remarquable. Site classé en 1909, puis en 1963.  propriété de l'Etat, maison de retraite,  date du XVIIe siècle. Il fut légué à l'Etat par Madeleine Smith-Champion et sa soeur Jeanne. Il a été remis à la fondation nationale des arts graphiques et plastiques. Le château Smith-Champion possède un superbe jardin anglais (ouvert au public, d'une surface de 9,2 hectares). Le site est classé. Le château Smith-Champion est devenu la maison d'art Bernard-Anthonioz.","habitants":"Henri-Charles Arnauld de Pomponne                                 famille; Smith-Lesouef\"","divers":"Deux châteaux dans cet article Nogent grav-1 et Smith-Champion grav_2-3-4.    Smith                                         GPS : 48° 50' 10\" Nord, 2° 29' 13\" Est","gps":"48° 50' 10\" Nord, 2° 29' 13\" Est","images":["../image/image_94/94_Nogent_sur_Marne_1.jpg","../image/image_94/94_Nogent_sur_Marne_2.jpg","../image/image_94/94_Nogent_sur_Marne_3.jpg","../image/image_94/94_Nogent_sur_Marne_4.jpg"]},"Consult_chateau_formulaire3fcf":{"id":"Consult_chateau_formulaire3fcf","dept":"94","canton":"Saint-Maur-des-Fossés","commune":"Ormesson sur Marne","nom":"Ormesson","type":"Château","periode":"XVI","histoire":"ORMESSON  En 1578 début de la construction actuelle par Louis Picot de Santeny. Le domaine passe aux mains du cardinal René de Birague, mais celui-ci décédant en 1583, il est acheté par le marquis de Malespine.  En 1619 il est acheté  par Nicolas le Prévost de Malassis conseillé du roi et maître des comptes,  qui le transmettra en 1632 à sa fille, Anne épouse depuis  1604 un conseillé d'état, André le Fèvre seigneur d'Ormesson, leur fils Olivier le Fèvre d'Ormesson hérite et passe aux mains de la famille d'Ormesson,  l'acquisition de terres supplémentaires par Marie Françoise de Paule de son petit-fils l'érection en marquisat en 1758 sous le nom d'Ormesson que le parc est aménagé dans sa forme actuelle, avec la pièce d'eau alimentée par le Morbras, le tapis vert dans l'axe du château et l'ensemble des allées forestières. Les communs, transformés durant le troisième quart du XVIIIe siècle et dont l'emplacement n'a pas varié depuis le XVIe siècle, se composent d'un quadrilatère \"la ferme\" accolé au pavillon ouest de l'entrée auquel s'est ajoutée une grange vers 1810. Emmanuel d'Ormesson arrière petit-fils hérite devenue général vend le château à l'un de ses neveux Wladimir diplomate ambassadeur au saint siège. Entre deux guerres  le château acceuille le général Lyautey reçu par Ormesson qui rédige son discours de reception à l'accadémie Française, ministre des affaires étrangères. Louis Barthou hôte du château en 1934. Il prend la présidence du l'ORTF en 1964, puis se retire au château en 1973. Il est le dernier à y résider de façon permanente et à son décès, son fils, André, en hérite, mais loge dans les dépendances. André d'Ormesson s'éteint en 2014, le domaine continue d'être habité par sa veuve, qui s'éteint à son tour en 2020, ainsi que par ses filles. Le château est aujourd'hui la propriété de la société civile du domaine d'Ormesson dont le gérant est Charles Peugeot, petit-fils d'André d'Ormesson et descendant de la lignée d'industriels automobile.","architecture":"ORMESSON, date de la fin du XVIe siècle (1580) en pierres de taille et briques, sous l'influence de l'architecte Jacques Androuet du Cerceau. Les voûtes en saillie (les trompes) qui soutiennent les pavillons dangle, constituent un véritable chef duvre architectural. Le tailleur de pierre a réalisé lintérieur de la trompe, hémisphérique dans sa partie haute et angulaire à la base, un magnifique exemple de stéréotomie. Le château d'Ormesson, construit dès 1598, sur l'ancienne paroisse d'Amboile, est situé sur le territoire de la commune. Il a été classé aux M.H.en 1889. André Le Fèvre d'Ormesson devint propriétaire des terres de l'ancien village d'Amboile et de son château, en épousant, en 1630, la fille de Nicolas Le Prévost, seigneur d'Amboile, qui donna au château et au village d'Amboile, le nom d'Ormesson, nom qu'ils ont conservé jusqu'à aujourd'hui. Son fils aîné Olivier (1616-1686), Membre de la chambre de Justice chargée de juger Nicolas Fouquet pour crime de lèse-majesté, sauva la tête de celui-ci, en refusant les faux documents, fabriqués par Colbert. On attribue cette réponse à un envoyé du Roi ou de Colbert : La Cour rend des arrêts, non des services\". Cela lui valut  la disgrâce définitive du Roi Soleil. Il fut classé M.H. en 1889. Marie Henri d'Ormesson (de la famille Lefèvre d'Ormesson) (1785-1858), gendre du maréchal Grouchy, fut maire de 1813 à 1830 ; Wladimir Le Fèvre d'Ormesson (1888-1973), fut écrivain, journaliste et diplomate, maire de 1919 à 1925 ; Olivier d'Ormesson (1918-2012), homme politique, fut maire de 1947 à 1998. Le château d'Ormesson est devenu depuis la propriétée d'une société privée appelée la SCI du domaine d'Ormesson-sur-Marne. Éléments protégés MH : le château : classement par liste de 1889. Le parc clos de murs ; les façades et les toitures des communs, y compris la ferme : classement par arrêté du 25 mars 1993.","habitants":"Olivier le Fèvre d'Ormesson \"","divers":"Ormesson  GPS : 48° 47' 00\" Nord, 2° 32' 28\" Est","gps":"48° 47' 00\" Nord, 2° 32' 28\" Est","images":["../image/image_94/94_Ormesson_1.jpg","../image/image_94/94_Ormesson_2.jpg","../image/image_94/94_Ormesson_3.jpg","../image/image_94/94_Ormesson_4.jpg","../image/image_94/94_Ormesson_5.jpg","../image/image_94/94_Ormesson_6.jpg"]},"Consult_chateau_formulaire4965":{"id":"Consult_chateau_formulaire4965","dept":"94","canton":"Charenton-le-Pont","commune":"Joinville le Pont","nom":"Parangon","type":"Château","periode":"XVII","histoire":"PARANGON    Château construit dans la deuxième moitié du XVIIe siècle. Ferronneries de l'escalier et des balcons de la deuxième moitié du XVIIIe siècle. Aile nord en retour d'équerre construite après 1810. En 1857, aménagé en établissement d'enseignement professionnel, puis de 1902 à 1914 en école pratique agricole, commerciale et industrielle coloniale.","architecture":"PARANGON, éléments protégés MH : les façades et les toitures du corps principal et de l'aile en prolongement ; le portail d'entrée sur rue : inscription par arrêté du 3 août 1976. Il date du XVIIe siècle. Son propriétaire inital était la famille Amelot. Depuis le château du Parangon appartient au conseil général du Val-de-Marne. Les services sociaux y sont installés.","habitants":"Famille Amelot\"","divers":"Parangon  GPS : 48° 48' 50\" Nord, 2° 28' 15\" E","gps":"48° 48' 50\" Nord, 2° 28' 15\" E","images":["../image/image_94/94_Parangon_1.jpg","../image/image_94/94_Parangon_2.jpg","../image/image_94/94_Parangon_3.jpg"]},"Consult_chateau_formulairea662":{"id":"Consult_chateau_formulairea662","dept":"94","canton":"Orly","commune":"Orly","nom":"Parc_Orly","type":"Château","periode":"XVI-XVII","histoire":"un château dans cet article; Guérin, et deux parc; Meilies et parc d'Orly.                                                                                                                  GUERIN, le château apparaît dès 1684. A la fin du XIXe siècle, dit château Guérin, du nom de son propriétaire, maire d'Orly. L'édifice devint en 1914 un centre de cure pour buveurs dit \"Etablissement médical du docteur Piouffle\". Il fut ensuite acheté par la mutuelle du cinéma qui y installa une maison de retraite (où Georges Méliès fut accueilli). Acheté par la municipalité en 1946 pour en faire l'hôtel de ville. Il  était agrémenté à l'origine d'un jardin régulier transformé au plus tard en 1859 en jardin paysager, traversé par une rivière abritant une île aux cygnes, le parc comprend également des communs, une glacière et un belvédère, une orangerie transformée en salle de conseil municipal en 1977, des grottes de jardin, un petit pont en fer et une maison de gardien. propriété de la commune, hôtel de ville.","architecture":"PARC MEILIES, il le dispense une formation aux métiers du cinéma d'animation et des effets spéciaux numériques. Elle porte le nom de Georges Méliès, un réalisateur de film muet français de la fin du XIXe siècle et début du XXe siècle, qui y fut pensionnaire de 1932 à son décès en 1938, lorsque le château servait de maison de retraite de la Mutuelle du Cinéma, fondée en 1921 par Léon Brézillon, Président du Syndicat Français des Exploitants du Cinématographe.\n Château du PARC d'ORLY est un vaste domaine créé sous Louis XVI. Le château du Parc avait abrité plusieurs personnages célèbres dont Mme de Maintenon, il avait été construit pour les d'Ormesson sous Henri IV, puis il a appartenu au Maréchal de Coigny actuellement la mairie en est propriétaire.","habitants":"Famille de M Guerin    Meilies Famille Georges Méliès,     Orly Maréchal de Coigny  \"","divers":"un château dans cet article; Guérin Grav  1-2-3, et deux parc; Meilies grav-4  et parc d'Orly grav-5-6.   Parc GPS : 48° 47' 00\" Nord, 2° 32' 28\" Est                                                            Parc-Orly GPS : 48° 44' 38\" Nord, 2° 23' 34\" Est","gps":"48° 47' 00\" Nord, 2° 32' 28\" Est","images":["../image/image_94/94_Parc_Orly_1.jpg","../image/image_94/94_Parc_Orly_2.jpg","../image/image_94/94_Parc_Orly_3.jpg","../image/image_94/94_Parc_Orly_4.jpg","../image/image_94/94_Parc_Orly_5.jpg","../image/image_94/94_Parc_Orly_6.jpg"]},"Consult_chateau_formulaire13a8":{"id":"Consult_chateau_formulaire13a8","dept":"94","canton":"Villiers-sur-Marne","commune":"Plessis_Trévise","nom":"Plessis_Trévise","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article,  Plessis, la Lande et les Tourelles. TOURELLES, cette belle demeure bourgeoise appelée le château des Tourelles fut édifié à la fin du XIXe siècle, dans un esprit architectural imposant. Il fut au début du siècle une résidence secondaire et est devenu récemment une propriété communale. À l'origine, le hameau est constitué de deux domaines séparés : Le Plessis-Saint-Antoine et le Plessis La Lande. En 1776, le prince de Conti réunit les domaines ébauchant ainsi le territoire de ce qui deviendra le Plessis-Trévise, alors partagé entre les communes de Villiers-sur-Marne, La Queue-en-Brie et Chennevières-sur-Marne.\nLe vieux mot « plessis » désignait jadis des branchages entrecroisés protégeant un domaine. Quant au mot « Trévise », il fait référence à la ville d'Italie (Vénétie) : le maréchal Mortier fut nommé duc de Trévise et gouverneur de Silésie par Napoléon Ier, en 1808, après la bataille de Friedland. En 1812, le maréchal Mortier, devenu immensément riche, s'était installé au château de La Lande, situé sur la commune dont il deviendra le maire. Il est tué en 1835, boulevard du Temple, victime de la « machine infernale » de Fieschi qui visait le cortège de Louis-Philippe. Inhumé aux Invalides, son cur est enterré au cimetière du Père-Lachaise. En 1857, après la mort de la duchesse de Trévise, ses héritiers confient à Jean Augustin Ardouin la tâche de morceler le domaine et d'en faire des lotissements.","architecture":"PLESSIS,  l'histoire de la ville débute cependant dès le XVIIIe siècle, quand le prince de Conti regroupe les domaines du Plessis-Saint-Antoine et du Plessis-La Lande. Puis, en 1812, le château de La Lande est acquis par le maréchal Mortier, nommé duc de Trévise par Napoléon III, ce qui donnera son nom à la future commune. Dans la seconde moitié du XIXe siècle, une partie des terres appartenant au château fait l'objet d'un démembrement et un lotissement se forme.                                                                                                                                      La LANDE, le château de la Lande et son parc sont achetés par Gustave Roger. Dans les anciennes dépendances du château, un institut hydrothérapique est fondé par le docteur Louis Fleury. Le lotissement d'une partie des terres du château amène une nouvelle population à s'y installer. Dans un premier temps, une population parisienne en quête d'espaces verts contribue à l'accroissement rapide de la ville, souvent par la construction de villas spacieuses. L'artisanat et le petit commerce s'y implante, ainsi que plusieurs fermes. Le chemin de fer y parvient et amène l'ouverture d'auberges et de guinguettes. En quarante ans, plus de 200 maisons sont construites sur le territoire de l'actuelle commune et la population passe de 50 habitants en 1857 à environ 950 habitants en 1899.","habitants":"le prince de Conti                 Lande ;maréchal Mortier\"","divers":"Trois châteaux dans cet article,  Plessis grav-5, la Lande grav 1-2   et les Tourelles grav-3-4.                           Gps plessis 48° 48' 40? nord, 2° 34' 18? est","gps":"","images":["../image/image_94/94_Plessis_Tr%c3%a9vise_1.jpg","../image/image_94/94_Plessis_Tr%c3%a9vise_2.jpg","../image/image_94/94_Plessis_Tr%c3%a9vise_3.jpg","../image/image_94/94_Plessis_Tr%c3%a9vise_4.jpg","../image/image_94/94_Plessis_Tr%c3%a9vise_5.jpg"]},"Consult_chateau_formulaire366e":{"id":"Consult_chateau_formulaire366e","dept":"94","canton":"Boissy-Saint-Léger","commune":"Périgny le Petit","nom":"Périgny_le_Petit","type":"Manoir","periode":"XVII-XIX","histoire":"PERIGNY LE- PETIT, la construction du château de Périgny-le-Petit date du 3ème quart du XVIIe au XIXe siècle. Le 18/03/1654, Claude Garrot, Receveur des consignations des requêtes du Palais, acheta une maison entourée d'un vaste jardin, donnant sur le grand carrefour de Périgny. De 1654 et 1659, il fit bâtir à la place une vaste demeure composée d'un corps de logis principal, flanqué de chaque côté de 2 pavillons. Bien que ses façades aient été reprises au XIXe siècle, la maison a conservé un bel escalier à balustres de bois ainsi que sa distribution du XVIIe siècle et le tracé ancien de son jardin. Le Château de Périgny-le-Petit est privé, fermé au public.\nPropriété de monsieur Antony","architecture":"PERIGNY LE- PETIT, dans le parc, vestiges (margelle d'un bassin et canalisation en poterie) du XIe ou XIIe siècle; avant le XVIe siècle appelé l'hôtel de Jean de Rueil ; reconstruit au XVIIe siècle (escalier, plaque de cheminée portant la date de 1659); puis adjonction de deux pavillons d'entrée entre 1786 et 1790 ; pavillon sud-est relié au bâtiment principal entre 1790 et 1810  ; aile sud-est démolie et aile nord-ouest rebâtie non alignée après 1810.\nÉléments protégés MH : les façades et les toitures du corps central et des deux pavillons latéraux ; l'escalier intérieur : inscription par arrêté du 30 avril 1998.","habitants":"Famille de  Claude Garrot\"","divers":"GPS : 48° 41' 44,98\" Nord, 2° 33' 06,92\" Est","gps":"48° 41' 44,98\" Nord, 2° 33' 06,92\" Est","images":["../image/image_94/94_P%c3%a9rigny_le_Petit_1.jpg","../image/image_94/94_P%c3%a9rigny_le_Petit_2.jpg"]},"Consult_chateau_formulairef5f1-2":{"id":"Consult_chateau_formulairef5f1-2","dept":"94","canton":"Boissy-Saint-Léger","commune":"la Queue en Brie","nom":"Queue_en_Brie","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article Hermitage et Marmoussets. l'HERMITAGE, la seigneurie de l'Hermitage consistait en un château et une ferme dont les bâtiments formaient un vaste quadrilatère cantonné de quatre pavillons d'angle et entouré de fossés remplis d'eau vive. Cette seigneurie appartint à la famille Gentien jusqu'en 1573. Elle passa ensuite aux mains de Marc Miron, premier médecin du Roi, qui reconstruisit les bâtiments entre 1573 et 1604. La seigneurie demeura dans la famille Miron jusqu'en 1684. La famille Landois en fit acquisition par adjudication et la conserva jusqu'en 1759. Les héritiers Landois s'en dessaisirent au profit de Marie François de Paule Lefèvre d'Ormesson. Le château et la ferme étaient alors en très mauvais état. Les bâtiments abritant les granges à blé et à avoine furent remplacés par de nouvelles granges élevées plus au sud entre 1760 et 1780. Seuls deux pavillons d'angle et les bâtiments de ferme reconstruits au XVIIIe siècle subsistent. La famille Morel d'Arleux, propriétaire à partir de 1880 fit construire par l'architecte Meunier, une maison de maître dans un style régionaliste. L'ensemble appartient toujours aux descendants de la famille Morel d'Arleux.\nÉléments protégés MH : le pavillon d'angle nord-est en totalité de l'ancien château de l'Hermitage ; le pavillon d'angle sud-ouest en totalité de l'ancien château de l'Hermitage ; le fossé nord de l'ancien château de l'Hermitage ; le bâtiment sud en totalité de la ferme  renfermant les granges : inscription par arrêté du 19 mai 1998.","architecture":"MARMOUSSETS, c'est la propriété privée du conseil général. Il date du XVIIIe et XIXe siècles, le parc et le parking demeurent la propriété du conseil général, il fut construit par la famille Landoisen 1828. L'ancienne appellation de « Maisoncelle » semble devoir indiquer ici la présence fort ancienne d'une « maison seule », voire d'une cellule monacale, isolée dans la forêt Briarde, le terme de « Marmouzet » n'apparaissant qu'à partir d'un acte daté de 1520 dans les archives d'Ormesson. Le domaine de Maisoncelle fut la propriété à la fin du XVIIe siècle du peintre miniaturiste et émailleur Jean Petitot le Jeune (1653-1702), protestant, fit carrière, comme son père, en Angleterre, où il fut nommé peintre du roi Charles II. Revenu en France, à la fin de sa vie, il décèda au château des Marmouzets, en 1702.  Cet équipement était alors très en vogue et faisait office de réfrigérateur dans les grands domaines. Pavillons d'entrée remaniés au XIXe siècle, grilles d'entrée portant le H du général Hulin, propriétaire du 1828 à 1875. Acquis par le département en 1980 l'ancien rendez-vous de chasse constitue lun des principaux accès à la forêt Notre-Dame. Ayant fait l'objet dune réhabilitation, le domaine se  compose aujourdhui de quatre parties distinctes autour du château: la partie intra-muros cernée de douves, avec le château, les dépendances, un jardin à la française et vestiges dun bassin. Un magnifique cèdre ombrage la cour dhonneur. Créée par Eva Wellesz, sculpteur et Gilles Carré, musicien, une sculpture agrémente les douves du domaine, lesplanade ou demi-lune et le parc extra-muros.  Sports -études de Paris. Éléments protégés MH: les façades et les toitures du château et des communs: inscription par arrêté du 7 septembre 1978, appartient  au département.","habitants":"Hermitage ;  famille Landois  et famille Morel d'Arleux.                                  Marmoussets ; famille Landois \"","divers":"Deux châteaux dans cet article Hermitage grav-1-2     et Marmoussets grav 3-4-5.                                       Hermitages GPS : 48° 47' 24\" Nord, 2° 34' 39\"\" Est                                                Marmoussets  GPS : 48° 46' 02\" Nord, 2° 35' 16\" Est","gps":"48° 47' 24\" Nord, 2° 34' 39\"\" Est","images":["../image/image_94/94_Queue_en_Brie_1.jpg","../image/image_94/94_Queue_en_Brie_2.jpg","../image/image_94/94_Queue_en_Brie_3.jpg","../image/image_94/94_Queue_en_Brie_4.jpg","../image/image_94/94_Queue_en_Brie_5.jpg"]},"Consult_chateau_formulaire0568":{"id":"Consult_chateau_formulaire0568","dept":"94","canton":"Saint-Maur-des-Fossés","commune":"Bonneuil sur Marne","nom":"Rancy","type":"Château","periode":"XVII-XVIII","histoire":"RANCY, le nom de Bonneuil aurait une origine latine Bonoilum ou Bonozilum. Mis à part un trésor monétaire datant de la seconde moitié du IIIe siècle après J-C, l'occupation de ce site n'est attestée avec certitude que sous le règne de Clotaire II qui y possédait une villa où il reçut en 616 les notables du royaume de Bourgogne. Cette villa royale est citée dans plusieurs actes du IXe siècle. Proche de Paris, son accès en était facilité par la présence d'un pont sur la Marne attesté dans une charte de l'abbaye de Saint-Maur-des-Fossés datant de 1226. Les plus anciens seigneurs de Bonneuil qui nous soient connus sont Arnoul de Corberun et Pierre Girbout à la fin du XIIe siècle et Guillaume Marmerel qui, en 1226, accorde le libre passage du pont de Bonneuil aux habitants de Saint-Maur. Au XIVe siècle, Jean de Chastillon est dit seigneur de Bonneuil par Isabeau de Montmorency, sa femme, puis Antoine de Brehault au XVIe et Marguerite de La Rivière au début du XVIIe siècle, enfin la famille de Chabenat du milieu du XVIIe siècle jusqu'a la Révolution. Du règne de Louis XVI date un trésor d'orfèvrerie, de bijoux et de monnaies découvert en 1960 à l'angle de l'avenue du château et de la rue Auguste-Gross mais dont l'origine est inconnue. Dépendant de la seigneurie de Bonneuil, le fief du Rancy est attesté en 1406.\nLe château et la ferme actuels furent construits entre 1750  et 1770 . Aile en retour d'équerre du château et portique central à ordre toscan (aujourd'hui démoli) ajoutés fin premier quart du XIXe siècle.","architecture":"RANCY, le château accueille actuellement un lycée depuis 1950. Le château à longs pans brisés, ardoise, escalier tournant à retours avec jour; le colombier : toit conique,   la ferme longs pans, croupe, tuile plate, tuile mécanique, escalier droit. L'ensemble de la propriété comprend un parc, le logement de domestiques, étable à chevaux, étable à vache, laiterie, bergerie, ferme et parc. Propriété publique, lycée.\n La construction du château du Rancy date du 3ème quart du XVIIIe siècle est devenu depuis un Lycée appelé Etablissement Régional dEnseignement Adapté (EREA). Le château du Rancy est inscrit aux M.H.\nÉléments protégés MH : la ferme et le colombier, ainsi que le sol de la cour, 2 rue Désiré-Dautier : inscription par arrêté du 3 février 1993. Les façades et les toitures du château ; les communs ; la grille, le sol de la cour et de l'avant-cour, 6 rue Désiré-Dautier: inscription par arrêté du 7 septembre 1993.","habitants":"famille de Chabenat\"","divers":"Rancy GPS : 48° 46' 30\" Nord, 2° 29' 12,46\" Est","gps":"48° 46' 30\" Nord, 2° 29' 12,46\" Est","images":["../image/image_94/94_Rancy_1.jpg","../image/image_94/94_Rancy_2.jpg","../image/image_94/94_Rancy_3
