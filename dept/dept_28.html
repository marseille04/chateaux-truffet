 sa chorographie du Dunois: Saucheville fief et château avec une chapelle domestique, appartient à la famille de Montigny, originaire de Bourgogne, par mariage contracté avec damoiselle de la Forest, dame de Saucheville, de la Chapelle-Onzerain et d'Écrinières. Les registres mentionnent plusieurs membres de la famille de Montigny, comme seigneurs de Saugeville.","architecture":"SAUGEVILLE, le caveau funéraire de l'église atteste que cette famille a occupé une place importante dans l'histoire du pays. Mais il est impossible de remonter à l'origine de cette seigneurie qui est sans doute fort ancienne, puisqu'il en est question dès 1280. En 1502, elle appartenait à Pierre de la Forest et en 1677, à l'un de ses descendants, René de la Forest, écuyer. Aujourd'hui, une tourelle et plusieurs fenêtres de l'habitation nous montrent de jolis ornements et de charmants motifs de l'époque de la Renaissance.","habitants":"famille de Montigny\r\n        \"","divers":"Saugeville      gps 48° 03' 36\" nord, 1° 24' 54\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Saugeville_1.jpg"]},"Consult_chateau_formulaire0571":{"id":"Consult_chateau_formulaire0571","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Senonches","nom":"Senonches","type":"Château","periode":"XVI-XIX","histoire":"SENONCHES  vieux château de Senonches comporte un donjon du XIIe et deux corps de logis des XVIe et XVIIe siècle qui lui sont accolés. En cours de rénovation depuis 2003, il hébergea la Maison Thématique des Forêts-du-Perche, dont la réouverture s'est faite au printemps 2015. Sa tour donjon en grison (pierre ferrugineuse typique de la région) est une curiosité à elle seule.   Dès le IXe siècle, une maison-forte fut élevée à l'emplacement du château. En 1130, Hugues II de Châteauneuf, seigneur du Thimerais, de retour de captivité d'outre Manche.                                                                  TARDAIS, était autrefois une seigneurie. A la ferme de la Tour, attenante au château, une grange très ancienne ainsi que de vieilles murailles portent les traces dun château fort. Celui ci fut sans doute détruit à la même époque que le premier château de Senonches, construit au XIIe siècle, dont il était un poste avancé. La bâtisse actuelle remonte à la fin du XIXe siècle. Les gentilshommes verriers de Tardais, notamment les Gastels, sont célèbres pour avoir fourni en 1430 du verre à Verrière pour les besoins de la cathédrale de Chartres.","architecture":"SENONCHES, fit construire le donjon auprès du vieux château. Accolés au donjon, les bâtiments sont constitués de deux volumes décalés dont les toitures en pavillon ont été reliées. En partie basse et à l'intérieur se devinent les vestiges d'anciennes structures. La tour romane constituée de pierre de grison et de silex, sélève à 15 mètres du sol, elle est fortifiée, ses murs nord et sud sont épais de 2,30 m contre 1,30 m à lest et à louest. Elle est rectangulaire, comme la plupart des demeures de lépoque, situées en pourtour des territoires des Plantagenêt. Son originalité réside dans sa fonction de tour porte, situé à lentrée de lensemble castral et non en son centre. Éléments protégés MH : le donjon, les façades et les toitures des deux corps de logis accolés au côté Est du donjon . le château abrite aujourd'hui l'école communale. Le château de Senonches est classé aux M.H. depuis 1923 et inscrit aux M.H. depuis 1984.","habitants":"Senonches ;Hugues II de Châteauneuf\r\n        \"","divers":"Senonches     grav 1-2                                                           GPS : 48° 33' 33\" Nord, 1° 02' 17\" Est                                               Tardais grav- 3","gps":"48° 33' 33\" Nord, 1° 02' 17\" Est","images":["../../jctruffet.com/image/image_28/28_Senonches_1.jpg","../../jctruffet.com/image/image_28/28_Senonches_2.jpg","../../jctruffet.com/image/image_28/28_Senonches_3.jpg"]},"Consult_chateau_formulairec284":{"id":"Consult_chateau_formulairec284","dept":"28","canton":"Anet","commune":"Sorel-Moussel","nom":"Sorel_Moussel","type":"Château","periode":"XVI-XVII","histoire":"SOREL; le château fut reconstruit par Jean de Sorel. On ne sait comment le fief sortit de la famille des seigneurs du Thymerais mais il fut cédé au XIVe siècle à Pierre d'Alençon, descendant de Saint Louis. La forteresse fit place à un beau manoir. En 1452, Guy XIII de Laval rend hommage au comte de Dreux pour ce fief. Il fut acquis par Marie d'Albret, comtesse de Dreux puis cédé en 1549 à Pierre 1er Séguier, seigneur de l'Etang la Ville. A sa mort, ses trois fils possédèrent Sorel par indivis jusqu'en 1596. L'un d'entre eux, Pierre II, racheta la part de ses frères, et  prit le parti du futur Henri IV, pendant les guerres de la Ligue. Le manoir de Sorel fut alors brûlé par les gens de guerre. C'est son fils Pierre III Séguier, marquis d'O, qui hérita de la terre et qui reconstruisit en 1602 le château actuel, demeure composée d'un long corps de logis encadré de deux pavillons à haute toiture d'ardoise. Pierre III Séguier mourut en 1628 et sa veuve, Marguerite de la Guesle qui, en 1641, fit élever le portail d'entrée. Louise Marie Séguier devenue duchesse de Luynes mourut jeune et son mari ne conserva pas la terre qui passa à la famille Dyel du Parquet, puis à des financiers les Crozat. Sorel est acquis en 1708 par le maréchal de Vendôme, prince d'Anet et comte de Dreux, et passe dans les mains d'Anne, princesse de Condé, et de la duchesse du Maine, du prince de Dom et de son frère le comte d'Eu, et enfin au duc de Penthièvre. Jusqu'à la Révolution, Sorel demeura uni au domaine d'Anet mais il était délaissé par ces grands seigneurs qui préféraient les fastes des salons de la demeure de Diane à la solitude de Sorel.","architecture":"SOREL,  bien qu'en bon état, il faillit disparaître à l'initiative du Comte d'Eu en 1764, qui voulait le vendre sur pied afin que l'acquéreur en enlève les matériaux. C'est à la Révolution qu'à lieu sa destruction, et en 1798, le château vendu comme bien national pour les matériaux et la Forge devinrent la proie des démolisseurs et ce furent des ruines désolées que la duchesse douairière d'Orléans racheta en 1820. Après sa mort, son fils, Louis-Philippe, duc d'Orléans, devenu Roi, envisagea d'en faire la résidence pour l'inspecteur de la forêt de Dreux, avec l'idée de se réserver la salle basse pour son usage personnel. La chute de la monarchie de juillet anéantit ses projets. Napoléon III confisqua Sorel avec les biens de la famille d'Orléans et l'édifice fut à nouveau menacé de destruction par l'administration des forêts qui prit la décision de le vendre en vue de sa démolition. En 1862, le Château est classé et en 1872, Sorel était rendu aux princes en même temps que la forêt de Dreux. Un pont de bois, la charpente et la couverture du pavillon ont été complètement refaits à l'identique au début de ce siècle. La forêt avait été confisquée par l'Etat au moment de la Grande Guerre, sous le prétexte que la famille d'Orléans avait des cousins allemands. Epargné par la confiscation mais resté à l'abandon, de nouveau régulièrement vandalisé et envahi par la végétation, Sorel se dégradait irrémédiablement. En 1951, la Société Civile du domaine de Dreux qui administre les propriétés de la famille d'Orléans prit la décision de se défaire du pavillon d'entretien trop lourd. Le portail devait être déposé et donné au Musée d'Art et d'Histoire de Dreux! Le domaine fut acquis en 1952 par l'architecte des \"bâtiments de Monseigneur le Comte de Paris\" qui le restaura, après avoir dégagé et consolidé les ruines.","habitants":"Famille de Jean de Sorel.\r\n        \"","divers":"SOREL grav 1-2-3 GPS : 48° 49' 52\" Nord, 1° 21' 50\" Est                                Vestige du château grav 4-5","gps":"48° 49' 52\" Nord, 1° 21' 50\" Est","images":["../../jctruffet.com/image/image_28/28_Sorel_Moussel_1.jpg","../../jctruffet.com/image/image_28/28_Sorel_Moussel_2.jpg","../../jctruffet.com/image/image_28/28_Sorel_Moussel_3.jpg","../../jctruffet.com/image/image_28/28_Sorel_Moussel_4.jpg","../../jctruffet.com/image/image_28/28_Sorel_Moussel_5.jpg","../../jctruffet.com/image/image_28/28_Sorel_Moussel_6.jpg"]},"Consult_chateau_formulaire5ea7":{"id":"Consult_chateau_formulaire5ea7","dept":"28","canton":"Chartres","commune":"Sours","nom":"Sours","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Sours et la Saussaye.\r\nSOURS, cette demeure est peut-être liée à la paix de Brétigny (1360). Elle a conservé ses éléments les plus caractéristiques de l'architecture du début du XVIIe siècle. Le salon a conservé un décor de qualité, datant de la fin du XVIIIe siècle.\r\nÉléments protégés MH : les façades et les toitures du château.\r\nSOURS dit de l'Aval, La construction date du XVIIe et XVIIIe siècle, est entouré d'un parc divisé en 2 parties, publique et privée, où l'on trouve un corps de logis de 1653, une faune particulière ainsi qu'un ancien système d'irrigation dont l'étang principal est appelé le « canal », est inscrit aux M.H. depuis le 15/06/1987. Le château de l'Aval ou château de Sours est la propriété d'une personne privée, fermée au public. Édouard III d'Angleterre (1312-1377), pris par l'orage à Sours avec son armée et  décida de si installer. Claude de La Trémoille (1566-1604), fit de Sours, une place fortifiée pendant les guerres de religion.cet article; Sours et la Saussaye.\r\nSOURS, cette demeure est peut-être liée à la paix de Brétigny (1360). Elle a conservé ses éléments les plus caractéristiques de l'architecture du début du XVIIe siècle. Le salon a conservé un décor de qualité, datant de la fin du XVIIIe siècle.\r\nÉléments protégés MH : les façades et les toitures du château.\r\n SOURS dit de l'Aval, La construction date du XVIIe et XVIIIe siècle, est entouré d'un parc divisé en 2 parties, publique et privée, où l'on trouve un corps de logis de 1653, une faune particulière ainsi qu'un ancien système d'irrigation dont l'étang principal est appelé le « canal », est inscrit aux M.H. depuis le 15/06/1987. Le château de l'Aval ou château de Sours est la propriété d'une personne privée, fermée au public. Édouard III d'Angleterre (1312-1377), pris par l'orage à Sours avec son armée et  décida de si installer. Claude de La Trémoille (1566-1604), fit de Sours, une place fortifiée pendant les guerres de religion.SOURS, cette demeure est peut-être liée à la paix de Brétigny (1360). Elle a conservé ses éléments les plus caractéristiques de l'architecture du début du XVIIe siècle. Le salon a conservé un décor de qualité, datant de la fin du XVIIIe siècle.","architecture":"La SAUSSAYE, en 1360, un château du Moyen-Âge ayant existé a pu accueillir les plénipotentiaires du roi Édouard III d'Angleterre et ceux de Charles, fils du roi Jean II de France, qui se sont rencontrés sur la commune de Sours dans un « château près du hameau de Brétigny » où ils ont ensemble fixé les modalités du célèbre Traité de Brétigny. Quelque temps après ce traité, le château aurait servi de grange. Au même moment, les agriculteurs des terres de la plaine où se situe le château (de Sours à Nogent-le-Phaye), où avaient campé les troupes anglaises, se virent ajournés de la dîme en mémoire du traité. Ils conserveront ce privilège jusqu'à la Révolution de 1789.   Vers 1450, Robert de Bugy, contrôleur des greniers à sel de la région de Blois et écuyer du roi François Ier, construit un château (comparable au château de Troussay) sur les terres de Sours, au bord de la route d'Orléans, sur le hameau actuel de La Saussaye.   Au XVIIe siècle, le domaine du château de Robert de Bugy est agrandi, doté de communs et de deux ailes, tandis que se développe, à l'arrière, un magnifique parc à la française. En 1732, pour la première fois, l'édifice change de propriétaires : la dernière descendante de Robert de Bugy vend le château à la famille Pelluys, notaires blésois. Vers 1828, le château et le parc de Robert de Bugy est acquis par Louis de la Saussaye, grand érudit français. Le domaine gardera son nom jusqu'à nos jours.","habitants":"Sours  Claude de La Trémoille,                                                       Louis de la Saussaye\r\n        \"","divers":"Sours grav-2--3   GPS : 48° 24' 38\" Nord, 1° 35' 53\" Est                      La Saussaye grav 1-","gps":"48° 24' 38\" Nord, 1° 35' 53\" Est                      La Sau","images":["../../jctruffet.com/image/image_28/28_Sours_1.jpg","../../jctruffet.com/image/image_28/28_Sours_2.jpg","../../jctruffet.com/image/image_28/28_Sours_3.jpg"]},"Consult_chateau_formulairebeb2":{"id":"Consult_chateau_formulairebeb2","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"St -Lubin des Joncherets","nom":"St_Lubin_Joncheret","type":"Château","periode":"XVII","histoire":"ST-LUBIN, en 1652 les Campion possesseur de la seigneurie, en 1658 François Veydeau de Grandmont conseiller au parlement de Paris et seigneur de Saint-Lubin fut inhumé dans l'église du village. Au bord de l'Avre, le joli château de Saint-Lubin a été construit au XVIIe siècle, puis remanié au XVIIIe siècle. C'est Louis de Pontbréant, écuyer du Roi, seigneur du Mesnil et Saint-Lubin, descendant des seigneurs de Bréchamps, qui entreprit vers 1620, la construction du château de Saint-Lubin. Deux filles qui se séparent du domaine qu'elle cèdent à Claude Dastin et celui-ci le revend à Adrien de Caumont, écuyer au milieu du XVIIe siècle le domaine appartient à Alexandre de Campion qui s'en défait au profit de  François Veydeau de Grandmont seigneur de Vriseuil de Laleu. Le domaine passe à son fils François et en 1697 la seigneurie passe à Louis Blin secrétaire du roi, son héritier son neveu Joseph-Jean-Baptiste Gilbert vend les terres à Achille de Cochard,  laisse un fils Charles  à la mort de ce dernier, le domaine est vendu, passe aux Perrier, et aux Corbillé avant d'être acquis par les Poissonnier de Prulay. Revendu en 1883 à l'architecte  Duchâtelet qui le cède  en 1887 à la baronne de Mont d'Eoux né Skariatine, laissé à l'abandon et en ferme, en 1920 acquis par M. Wich arrière grand père du propriétaire actuel M. Jean-Louis Latour-Remplet.","architecture":"ST-LUBIN, le château est de même style que l'église qui, avant d'être paroissiale, lui servait de chapelle. Sur la maçonnerie de moellons enduits contrastent les chaînes de briques aux angles. séparé par une douve de la cour d'honneur, se compose la façade  principale à trois travées est cantonnée par deux courtes ailes en retour et prolongée du côté de la rivière  par un corps de bâtiment  dont les ouvertures ont été modifiés au XVIIIe siècle. Dans la travée centrale une porte plein cintre dans un encadrement fait d'assises alternées de briques et de pierre.  Il est situé dans un parc avec des canaux et des bassins dont le dessin est attribué au célèbre architecte-paysagiste André Le Nôtre. La composition du jardin remonte au XVIIe siècle. Le parc est séparé du château par des canaux. Sept petits ponts le raccordent à sa périphérie. Au Nord du domaine, l'Avre alimente toutes les dérivations : les douves, le canal, la pièce d'eau en demi-lune. De très beaux platanes ponctuent cet espace. Leur plantation remonterait au début du XVIIIe siècle. Éléments protégés MH : le château de Saint Lubin en totalité : inscription par arrêté du 5 avril 1930.","habitants":"Famille de  Louis de Pontbréant,\r\n        \"","divers":"St_Lubin   gps 48° 46' 02\" nord, 1° 11' 37\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_St_Lubin_Joncheret_1.jpg","../../jctruffet.com/image/image_28/28_St_Lubin_Joncheret_2.jpg","../../jctruffet.com/image/image_28/28_St_Lubin_Joncheret_3.jpg"]},"Consult_chateau_formulaireeb66":{"id":"Consult_chateau_formulaireeb66","dept":"28","canton":"Nogent le Rotrou","commune":"Charray","nom":"Thierville","type":"Château","periode":"XIV-XVIII","histoire":"THIERVILLE; fût surement protégée par un château fort ayant laissé pour traces les tours actuelles, flanquant le bâtiment central. En 1371, c'est la famille des Personnes qui possède le château avec Pierre 1er. Le suivant, Pierre II, époux de Jeanne Du Puy, travaille à Châteaudun au service du cardinal Jean d'Orléans. Suit le seigneur Alexandre de Laage qui modifie totalement l'ancien château et devient méconnaissable. Alexandre de Laage le vendit,  à  Jean-Jacques de Loyne d'Auteroche;  militaire il quitta l'armée en 1789, et venait peu à Thierville où il mourut en 1807. Sa veuve, madame des Marais, conserve le domaine, loue les terres et fait quelques legs à la commune de Charray. Après sa mort, son fils Jean lui succède en 1845. Il confie le château à ses deux fils Godefroy et Paul. Godefroy, héritier en 1849, fut nommé maire de Charray en 1852. Il se maria, puis divorça, et aussitôt vendit Thierville à un cultivateur de la région. L'acheteur, Pierre Vrain Roger fut maire de Charray en septembre 1870, puis en 1873, et en 1878. Il fit démolir le bâtiment en L et bâtir un contrefort. Sa veuve vit avec son fils Romain, dépensier, il vend le domaine par morceaux, dont la ferme d'époque Mérovingienne, mais en 1925, c'est le château qui lui échappe au profit d'Alexandre Bois, marchand de biens.","architecture":"THIERVILLE,  cardinal Jean d'Orléans, qui très riche, participe à la modernisation du château de Thierville. Il fait construire une chapelle qui existe toujours. La fenêtre est gothique et la porte Renaissance. La façade Est est remplacée par celle qui existe actuellement. Beaucoup de fenêtres sont remplacées et ornées, d'autres sont conservées. Le toit supprimé est rehaussé. Les terrasses et les jardins sont aménagés. A cette époque, ce domaine est très important, le pigeonnier comporte 1900 cases\r\n.Son fils, Alexandre II, hérite de Thierville, termine les travaux extérieurs, le grand salon, la cheminée et les chambres. Le vandalisme recommence, L'édifice de plan rectangulaire à deux niveaux, troisième niveaux sur combles  avec série de lucarnes sur toits en croupes et accolée de tours rondes à mâchicoulis aux angles,  toits en poivrières.","habitants":"Jean Jacques de Loyne d'Auteroche;\r\n        \"","divers":"Thierville","gps":"","images":["../../jctruffet.com/image/image_28/28_Thierville_1.jpg","../../jctruffet.com/image/image_28/28_Thierville_2.jpg"]},"Consult_chateau_formulaire8031":{"id":"Consult_chateau_formulaire8031","dept":"28","canton":"Illiers-Combray","commune":"Thieulin","nom":"Thieulin","type":"Château","periode":"XVII","histoire":"LIGNEROLLES-LE THIEULIN,  propriété de la Fondation des Apprentis dAuteuil comprenant, le château de Lignerolles et ses deux dépendances.\r\nCette propriété située à Le Thieulin, commune rurale de 400 habitants.   Située en zone rurale, la propriété bénéficie d'une situation au cur de bourg et de l'attractivité des bassins de vie de Nogent le Rotrou et surtout de Chartres.\r\nBâtiments Le Manoir (Château Lignerolles) et ses dépendances Les Lauriers et Les Sapins","architecture":"COUTURE; domaine de La Couture (propriété privée) visible de la route les dépendances et le manoir ;  corps de logis  de plan rectangulaire à deux niveaux sur soubassement et lucarnes sur combles, flanqué d'un avant corps d'entrée saillant avec lucarne gothique, à l'opposé tourelle polygonale à trois niveaux, toit en poivrière. l'édifice est prolongé de part et autre d'un bâtiment de rez-de-Chaussé à toit plat\r\nLIGNEROLLES, porches d'entrée flanqué de deux tours rondes toit en poivrières avec lucarnes à fronton triangulaire, l'édifice de plan oblong à deux niveaux  avec série de lucarne sur toit brisé accolé à  ses dépendances deux pavillons les Lauriers et  les Sapins   dont un avec toit brisé, l'autre à l'extrémité toit à quatre pans.","habitants":"Seigneurs locaux\r\n        \"","divers":"Lignerolles grav 1-2-3-4-5 -6\r\ngps 48° 24' 30\" nord, 1° 08' 03\" est\r\nCouture Grav  -7-8\r\nGPS : 48° 24' 30\" Nord, 1° 08' 03\" Est","gps":"48° 24' 30\" Nord, 1° 08' 03\" Est","images":["../../jctruffet.com/image/image_28/28_Thieulin_1.jpg","../../jctruffet.com/image/image_28/28_Thieulin_2.jpg","../../jctruffet.com/image/image_28/28_Thieulin_3.jpg","../../jctruffet.com/image/image_28/28_Thieulin_4.jpg","../../jctruffet.com/image/image_28/28_Thieulin_5.jpg","../../jctruffet.com/image/image_28/28_Thieulin_6.jpg","../../jctruffet.com/image/image_28/28_Thieulin_7.jpg","../../jctruffet.com/image/image_28/28_Thieulin_8.jpg"]},"Consult_chateau_formulaire41c6":{"id":"Consult_chateau_formulaire41c6","dept":"28","canton":"Châteaudun","commune":"La Chapelle du Noyer","nom":"Touchebredier","type":"Château","periode":"XVII-XVIII","histoire":"TOUCHEBREDIER, château  du XVIIIe siècle dans un entourage champêtre. Beau pigeonnier du XVIIe siècle.  Le fief de la Touche-Bredière -ou Touchebredier - appartenait à Pierre de Pellerin aux environs de 1524. Acquis en 1594 par Jehan de Leviston, seigneur d'Eteauville, il vint s'ajouter, quelques années plus tard, aux domaines d'Isaac du Raynier, seigneur de Droué. Devenu en 1622, propriété de Louis Cheury, écuyer et gentilhomme servant du Duc Gaston d'Orléans, il échut ensuite à Louis Lambert, qui transforma le manoir en une demeure en rapport avec l'importance de ses charges.  Propriété de M et Mme Lyautey à la fin du siècle dernier, Touchebredier est entré dans la famille de Ponton d'Amécourt, à la suite du mariage de Blanche Lyautey, la soeur de Maréchal avec Maurice de Ponton d'Amécourt.","architecture":"TOUCHEBREDIER; les façades, côtés et toitures du château de Touchebredier, ainsi que le grand salon avec son décor, la grille dentrée et la fuie datent du XVIIIe siècle. Un grand bâtiment rectangulaire d'un étage sur rez-de-chaussée se prolonge en deux ailes plus basses qui reviennent en équerre du côté de la cour est. A l'ouest, des ailes très basses sont terminées par de petites tours rondes. La grille d'entrée est posée sur un mur bahut, et présente des verticales terminées en fers de lance alternées de flammes. Au sud-est de la cour se trouve une fuye circulaire contenant plus de deux mille boulins et ayant conservé son échelle. A l'intérieur, le grand salon et le salon lui faisant suite sont ornés de boiseries moulurées à panneaux droits de la fin du XVIIIe siècle. Il y a dans le château, des cheminées d'époque de styles Louis XV et Louis XVI. Éléments protégés MH : les façades et les toitures du château, le grand salon avec son décor, la grille d'entrée et la fuye : inscription par arrêté du 22 octobre 1971.","habitants":"Seigneurs locaux\r\n        \"","divers":"Touchebredier                                                                                 GPS : 48° 01' 44,59\" Nord, 1° 18' 54,97\" Est","gps":"48° 01' 44,59\" Nord, 1° 18' 54,97\" Est","images":["../../jctruffet.com/image/image_28/28_Touchebredier_1.jpg"]},"Consult_chateau_formulaireeaa6":{"id":"Consult_chateau_formulaireeaa6","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Tremblay les villages","nom":"Tremblay_Vicomte","type":"Château","periode":"","histoire":"TREMBLAY, la commune de Tremblay-Les-Villages, s'appelait initialement « Le Tremblay-le-Vicomte » et au cours de la Révolution française, « Tremblay-Sans-Culottes ». Cette commune est le résultat de la fusion entre six communes préexistantes : Chêne-Chenu, Écublé, Gironville-et-Neuville, Saint-Chéron-des-Champs, Theuvy-Achères et Le Tremblay-le-Vicomte. Aucun de ces villages na perdu son identité, chacun disposant dune mairie annexe, dun maire délégué et dune commission communale consultative. le château de Tremblay-le-Vicomte est un ancien château féodal du XIIIe siècle. Le château de Tremblay-les-Villages, avec sa tour ronde et ses fenêtres et une meurtrière, plongent dans les douves en eaux entourée des arbres du bois. Le Château de Tremblay-les-Villages est inscrit aux M.H. depuis 1928. Il ne reste que des vestiges. C'est une propriété privée, fermée au Public est détenue par la Famille Bouchard depuis 1870. La motte castrale date du XIe et XIIIe siècle. Les ruines actuelles datent du XVème siècle.","architecture":"A cinq K.M. à gauche à St Sauveur-Marville  le château de JAGLU. Manoir de Jaglu à proximité de Bigeonette à Saint-Sauveur-Marville en Eure-et-Loir ayant appartenu à la famille d'Epinay Saint Luc. Il fut en partie détruit pendant la révolution puis reconstruit à partir de 1844.","habitants":"la famille d'Epinay Saint Luc. \r\n        \r\n        \"","divers":"Tremblay grav 1                                                                                 GPS : 48° 36' 02,24\" Nord, 1° 23' 11,44\" Est                                Jaglu grav-2","gps":"48° 36' 02,24\" Nord, 1° 23' 11,44\" Est","images":["../../jctruffet.com/image/image_28/28_Tremblay_Vicomte_1.jpg","../../jctruffet.com/image/image_28/28_Tremblay_Vicomte_2.jpg"]},"Consult_chateau_formulaire0a34":{"id":"Consult_chateau_formulaire0a34","dept":"28","canton":"Chartres","commune":"Champhol","nom":"Vauventriers","type":"Château","periode":"XVII","histoire":"VAUVENTRIERS, le manoir est acheté en 1589 par Guillaume Baigneault, secrétaire du roi et conseiller des finances.  Celui-ci fit bâtir un nouvel château,  la construction  date de 1598. C'est Guillaume de Baigneault, seigneur de Chaunay et de Vauventriers qui fera bâtir le château en 1609. En 1774, Jacques Grandet, président en l'élection de Chartres achète le château. La famille Grandet donnera au cours du XIXe et XXe siècle, 4 générations de magistrats municipaux, à la commune de Champhol. Depuis, le château de Vauventriers s'est transmis par succession jusqu'aux propriétaires actuels. \r\nÉléments protégés MH : les façades et les toitures du château avec ses ailes en retour et de la fuye : inscription par arrêté du 29 septembre 1969.","architecture":"VAUVENTRIERS,  C'est un château composé de brique et pierre, archétype des édifices élevés par le milieu royal à la fin du XVIe siècle, un nouveau château  bâtit  de 1598 à 1609, composé d'un corps de logis rectangulaire, flanqué par 2 pavillons,  A l'ouest s'ouvre le portail d'entrée avec sa porte piétonne. Le centre de la cour de la ferme est occupé par le colombier, plus bas l'ailes en retour qui se terminent par 2 petits pavillons. L'aile Est du Château de Vauventriers abrite la chapelle, ornée d'un décor peint. Coté Ouest, s'ouvre le portail d'entrée avec sa porte piétonne. Le centre de la cour de la ferme est occupé par le colombier. Le château de Vauventriers a été inscrit aux M.H. en 1969.","habitants":"Guillaume Baigneault                                                                  famille Grandet \r\n        \"","divers":"Vauventriers GPS : 48° 27' 58\" Nord, 1° 31' 03\" Est","gps":"48° 27' 58\" Nord, 1° 31' 03\" Est","images":["../../jctruffet.com/image/image_28/28_Vauventriers_1.jpg"]},"Consult_chateau_formulairef46c":{"id":"Consult_chateau_formulairef46c","dept":"28","canton":"Chartres","commune":"Villebon","nom":"Villebon","type":"Forteresse","periode":"XIV-XVI","histoire":"VILLEBON,  construit pour Jeannet d'Estouteville. Au XVIIe siècle, Sully, a reçu la visite de plusieurs rois : Charles VI, Louis XI, François Ier et Henri IV,  Stanislas Leczinski, Paul Deschanel, le Général de Gaulle et Valéry Giscard d'Estaing.  Le château de Villebon sert aujourd'hui d'habitation mais accepte les visiteurs, fut la demeure où Maximilien de Béthune, duc de Sully décéda en 1641 , en 1812  les descendants de Sully cèdent Villebon à Jules-Frédéric de Pontoi  qui décède en 1822  le château passe à son fils le marquis de Pontoi-Pontcarré, puis à son petit-fils en 1903 et ensuite à sa petite-fille Elisabeth qui épouse Pierre-Perrin de la Raudière malgré les problèmes rencontré faits de résistance avec la seconde épouse  du châtelain qui sera déportée. l'investissement du château par les allemands, le château reste dans la famille des Raudière.                                                                            BOIS-HINOUX  C'est une charmante demeure de briques datant de la fin du XVIIIe siècle, édifiée sur les fondations d'un ancien manoir dont il ne subsiste que les douves. Le château, qui était en très mauvais état, a été restauré par un américain M. Burton Hungtington Wilson, qui en a fait un centre dédié à l'amitié franco-américaine.","architecture":"VILLEBON  c'est un ancien château fort, construit du XIVe au XVIe siècle,  d'innombrables tours, des douves profondes remplies d'eau, un pont-levis,  le château de Villebon est l'archétype des châteaux des contes de fées pour enfants. C'est l'un des châteaux les plus authentiques des confins de la Beauce et du Perche, cette véritable forteresse de briques  rouges. Edifié en 1391 durant la guerre de Cent Ans par  Jeannet d'Estouteville, garde le souvenir de Sully, qui l'acquit en 1607  ministre d'Henri IV. Il y est mort après avoir passé 24 années de sa vie. C'est un château de plan carrée, qui lui confère son aspect sévère de forteresse médiévale. Si jamais il ne fut une demeure Royale il reçut en revanche, de nombreuses personnalités : et bien entendu le maître des lieux, Sully. Le parc ne vous décevra pas. Conçu à la française, il alterne étangs et perspectives où s'ébattent des daims aux ramures emblématiques. Le colombier date de la première moitié du XVIIe siècle. Il est situé à l'est du château. Il s'agit d'un édifice circulaire, en briques, ceinturé d'un bandeau bombé en pierre de taille. A l'intérieur, le dispositif d'origine a été conservé : charpente  en rayure soutenue par un poteau central muni de potences qui tiennent une échelle tournante. Les murs sont constitués d'une multitude de boulins en briques.  Éléments protégés MH : les façades intérieures et extérieures, les toitures, l'escaliers : classement par arrêté du 5 mars 1927. Le colombier : inscription par arrêté du 6 octobre 1981.","habitants":"Villebon:  r Jeannet d'Estouteville Duc de Sully                    Bois:  M. Burton Hungtington Wilson\r\n        \"","divers":"Bois-Hinoux grav-6-7                                                                    Villebon grav 1-2-3-4-5.                                                       GPS : 48° 23' 27\" Nord, 1° 12' 25\" Est","gps":"48° 23' 27\" Nord, 1° 12' 25\" Est","images":["../../jctruffet.com/image/image_28/28_Villebon_1.jpg","../../jctruffet.com/image/image_28/28_Villebon_2.jpg","../../jctruffet.com/image/image_28/28_Villebon_3.jpg","../../jctruffet.com/image/image_28/28_Villebon_4.jpg","../../jctruffet.com/image/image_28/28_Villebon_5.jpg","../../jctruffet.com/image/image_28/28_Villebon_6.jpg","../../jctruffet.com/image/image_28/28_Villebon_7.jpg"]},"Consult_chateau_formulaire67d9":{"id":"Consult_chateau_formulaire67d9","dept":"28","canton":"Nogent le Rotrou","commune":"le Mée","nom":"Villebéton","type":"Château","periode":"XVIII","histoire":"VILLEBETON, cet édifice a été fort peu modifié au cours des XIXe et XXe siècles, comme en témoignent deux gravures datées de 1774 réalisées par le propriétaire M. de Meaussé. C'est au cours du premier tiers du XIXe siècle que la chapelle fut construite.\r\nÉléments protégés MH : les façades et les toitures des communs et la chapelle : inscription par arrêté du 19 juillet 1995.","architecture":"VILLEBETON  a été reconstruit au XVIIIe siècle, sur l'emplacement d'une ancienne demeure. Il présente un plan en L.  Le corps principal, rectangulaire, est flanqué sur son élévation occidentale de deux tours circulaires vestiges de l'ancienne demeure. Cet édifice a été fort peu modifié au cours des XIXe et XXe siècles, comme en témoignent deux gravures datées de 1774 réalisées par le propriétaire, M. de Meaussé. C'est au cours du premier tiers du XIXe siècle que la chapelle fut élevée dans le parc à l'est du château et que les bâtiments des communs furent remaniés. Les volumes extérieurs ont été conservés.","habitants":"Famille de M. de Meaussé.\r\n        \"","divers":"Villebéton gps 47° 59' 11\" nord, 1° 25' 00\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Villeb%c3%a9ton_1.jpg","../../jctruffet.com/image/image_28/28_Villeb%c3%a9ton_2.jpg"]},"Consult_chateau_formulaireda9d":{"id":"Consult_chateau_formulaireda9d","dept":"28","canton":"Nogent-le-Rotrou","commune":"Boisgasson","nom":"Villemesle","type":"Château","periode":"XVII","histoire":"VILLEMESLE, date du XVIIe siècle. Son nom vient du latin: \"villa\" et \"merula\" qui signifie \"habitation\" et \"merle\". Ce qui évoque un château entouré de bosquets et peuplés d'oiseaux. Le seigneur le plus ancien est Hughes de Villemesle qui, en Avril 1222, transigea avec Héloïse, abbesse de Saint-Avit de Châteaudun, sur la liberté de faucher les herbes, dans le Loir, pour dégager les moulins qu'il y possédait. Le château de Villemesle fut détruit lors de la Guerre de Cent ans. Mais il sera rebâti sous René des Loges. Aujourd'hui on peut le voir tel quel avec les plans de Le Nôtre qui dessina la grande allée - de Villemesle à Boisgasson. Le château de Villemesle est un lieu majestueux, ses jardins à la française, son parc arboré pour toutes vos réceptions privées et professionnelles.","architecture":"VILLEMESLE, un acte de donation datant de 1403 désigne le château sous le nom de \"mote de Villemesle\", possédant haute, moyenne et basse justice. Au XVIe siècle, la plateforme entourée d'eau comportait, outre le château, des dépendances et des corps de logis. Le château actuel a été construit au milieu du XVIIe siècle. Au XVIIIe siècle, construction des deux ailes de communs dans l'avant-cour, après la suppression des dépendances installées sur le terre plein permettant le dégagement du château tel qu'il apparaît actuellement. Le pavillon nord s'est en partie effondré dans les douves. L'intérieur conserve des décors lambrissés (fin XVIIIe et XIXe siècle). Éléments protégés MH : les façades et les toitures du château, l'escalier en bois à balustres du XVIIe siècle, les façades et les toitures des communs, les douves et ses deux ponts, la grille d'honneur en fer forgé et le colombier : inscription par arrêté du 2 mars 1992.","habitants":"Famille de  Hughes de Villemesle\r\n        \r\n        \"","divers":"Villemesle GPS : 48° 02' 54\" Nord, 1° 09' 12\" Est","gps":"48° 02' 54\" Nord, 1° 09' 12\" Est","images":["../../jctruffet.com/image/image_28/28_Villemesle_1.jpg","../../jctruffet.com/image/image_28/28_Villemesle_2.jpg"]},"Consult_chateau_formulaire21b9":{"id":"Consult_chateau_formulaire21b9","dept":"28","canton":"Les Villages Vovéens","commune":"Terminiers","nom":"Villepion","type":"Château","periode":"XV-XVI-XVII","histoire":"VILLEPION, situé en plein cur de la Beauce, le château de Villepion appartenait au XVe siècle à la famille de Beaufils qui le conserva plus de deux siècles. C'est sans doute cette famille qui le fit bâtir tel que nous le voyons aujourd'hui, à une date difficile à préciser, peut-être au début du XVIIe siècle. Cependant, en 1650 il fut vendu à M. Cornuel, un riche bourgeois d'Orléans. Au XVIIIe siècle, il appartenait au ministre Fleureau d'Armenonville qui le délaissa pour la cour. Ses successeurs, les Tassin de Villepion, en firent autant et son état nécessitait d'importants travaux qui n'ont pas rebuté M. Éric de Mongolfier qui, aidé par sa famille en a entrepris la restauration. Il a belle allure, propriété de M. de Montgolfier acquit en 1984 , Éléments protégés MH : les façades et les toitures, les douves : inscription par arrêté du 21 décembre 1984.","architecture":"VILLEPION,  date du XVe, XVIe et XVIIe siècle. Le nom de Villepion daterait de l'époque gallo-romaine (Villa Peditum, campement de l'infanterie). Sur une surface de plan carré, cernée de douves,La façade d'entrée est d'une rigueur toute classique. La façade arrière conserve un aspect défensif. Les hautes toitures de ses deux gros pavillons d'angles, les deux tourelles rondes qui égaient sa façade arrière en font une élégante demeure d'une architecture alerte et séduisante. Le château de Villepion avec ses douves sèches et son beau jardin est ouvert aux visiteurs en période estivale, le château de Villepoin barre symétriquement l'axe principal sur lequel sont édifiés les ponts d'accès. Des 4 pavillons saillants aux angles, il n'en reste qu'un seul. Il est composé d'un grand corps central encadré de 2 pavillons, avec 2 autres plus petits en retour d'ailes qui enserrent les tourelles des escaliers. Le château de Villepion est inscrit aux M.H. depuis le 21/12/1984.","habitants":"famille de Beaufils,                                                                        Famille de  de M. de Montgolfier.\r\n        \"","divers":"GPS : 48° 06' 28\" Nord, 1° 42' 28\" Est","gps":"48° 06' 28\" Nord, 1° 42' 28\" Est","images":["../../jctruffet.com/image/image_28/28_Villepion_1.jpg","../../jctruffet.com/image/image_28/28_Villepion_2.jpg"]},"Consult_chateau_formulaire4fd3-2":{"id":"Consult_chateau_formulaire4fd3-2","dept":"28","canton":"Les Villages Vovéens","commune":"Tillay le Peneux","nom":"Villeprévost","type":"Genthilhommière","periode":"XVI-XVIII","histoire":"VILLEPREVOST, au milieu d'un parc dessiné par un élève de Le Nôtre, le château de Villeprévost, appartient à la même famille depuis deux siècles et n'a subi aucune transformation notable de la part de la famille de Ramezay,  le fils François vend en 1696  à la famille Pierre  le Juge, maître de la chambre des compte  de Paris  époux de  Anne de Beauharnais, puis l'attribue à son fils Charles  qui construisit les ailes latérales et en 1790 le domaine  est  acquit par Amand François Fougeron, conseiller du roi, à l'époque, juge de paix d'Orgères en Beauce, procéda de janvier à mai 1798, à l'interrogatoire de plus de 300 bandits de la bande des \"chauffeurs d'Orgères\". Propriété d'Emile Adrien\r\nLes bandits étaient internés dans les caves, sous les communs.\r\nFougeron toujours dans cette famille\r\nDans le grand salon du château, Amand François Fougeron, conseiller du roi, à l'époque, juge de paix d'Orgères en Beauce, procéda de janvier à mai 1798, à l'interrogatoire de plus de 300 bandits de la bande des \"chauffeur d'Orgères\" tristement célèbres pour avoir ravagé la Beauce au lendemain de la Révolution, rançonnant, torturant et tuant. Le colombier abrite les masques mortuaires des condamnés à morts.\r\nLes bandits étaient internés dans les caves, sous les communs.","architecture":"VILLEPREVOST, date des XVIe siècle, XVIIe et XVIIIe siècles. Son parc, conçu en 1756 et restauré en 1910, fut dessiné par Jamain, un élève de Le Nôtre. Villeprévost est un hameau de quelques maisons-fermes dont la principale est une gentilhommière beauceronne, du XVIIIe siècle, ce qui en fait une rareté dans la région. le corps de logis principal ne comte que deux pièces par Niveau. Le parc, très sobre, conçu en 1756 par un jardinier de Versailles de lécole de Le Nôtre, est dessiné en deux parties successives, de même niveau, prolongées dune allée centrale en trompe lil axée sur le soleil couchant au soir du 15 août en lhonneur de la femme du maître des lieux prénommée Marie. Cest le parfait exemple du « jardin-axe » orné de boulingrins, tapis vert, topiaires, bosquets et charmilles taillés. Réseau dallées en étoile. Le château de Villeprévost est inscrit aux M.H. depuis 1986.Éléments protégés MH : les façades et les toitures du corps principal avec ses ailes, le pigeonnier : inscription par arrêté : inscription par arrêté du 27 décembre 1988.","habitants":"Famille de Ramezay.                                                                    famille Pierre  le Juge\r\n        \"","divers":"GPS : 48° 09' 03\" Nord, 1° 44' 56\" Est","gps":"48° 09' 03\" Nord, 1° 44' 56\" Est","images":["../../jctruffet.com/image/image_28/28_Villepr%c3%a9vost_1.jpg","../../jctruffet.com/image/image_28/28_Villepr%c3%a9vost_2.jpg"]},"Consult_chateau_formulaire2346":{"id":"Consult_chateau_formulaire2346","dept":"28","canton":"Châteaudun","commune":"Montharville","nom":"Vrainville","type":"Château","periode":"XVIII","histoire":"VRAINVILLE,  fief vassal du comté du Dunois, ressortissant du baillage de Châteaudun pour la justice. Le plus ancien seigneur connu se nommait Gilles Bretheau en 1492. La famille Dannemont une fille, Anne qui épouse Jehan de Raines, seigneur de Vrainville. Puis se succèdent, en 1634, François de Raines, en 1657, les Duplessis, en 1679, les de Courcillon et en 1731, Etienne Monginot de la Salle. Sa fille Marie, épouse un de Jaucourt, Marquis de Penisses. Trois de leurs enfants héritent de Vrainville qu'ils vendent le 26 mars 1754 à Nicolas Sébastien Charlier. La construction de la maison seigneuriale, commencée vers 1730, n'était pas terminée en 1754. Jean Charlier, qui sans doute avait terminé de construire le château, fit bénir le 10 juin 1764, la chapelle de Vrainville par l'abbé Gauchard de Montharville. Le 27 octobre 1765, il acheta à Madeleine Boutin, veuve de Charles de Montboissier, les terres, fief et seigneurie de Montharville. Suite à cet achat, en qualité de parrain, le 8 décembre 1776, il donna le nom de Marie Charlotte à une des cloches de Montharville. En 1794, le château et son domaine sont vendus nationalement à plusieurs acquéreurs. Ce fut François Marie du Temple de Rougemont qui en acquit les principales fractions. Son successeur, le comte Louis François Albéric du Temple de Rougemont a fait rehausser l'ancien château d'un étage lui donnant son aspect actuel, la famille de Rougemont était déjà connue au XIIe siècle. Un du Temple était à la troisième croisade et un autre, argentier du roi Philippe le Hardi. Mr Pierre du Temple fut généreux pour les églises de Chartres dans son testament et voulait, après sa mort, être transporté en l'église Sainte Foy pour un requiem et être inhumé dans le choeur de l'église des Jacobins.","architecture":"VRAINVILLE  date de 1740 et fut achevé en 1758. Lors de la démolition de l'église Saint-Jacques de Bonneval, en mai et juin 1735, les matériaux et les pierres furent vendus, à Chartier, seigneur de Vrainville, pour la construction du Château. La seigneurie de Vrainville, mentionnée en 1555, avait, une certaine importance, au Moyen-Age. Le château de Vrainville et le domaine furent vendus, nationalement, en 1794. Ce fut François du Temple de Rougemont qui en racheta la plus grande partie. Depuis, le château de Vrainville est resté dans la famille, de père en fils. C'est un château privé, fermé au Public.","habitants":"famille Dannemont                                                                       Nicolas Sébastien Charlier\r\n        \"","divers":"Château de Vrainville GPS : 48° 11' 04\" Nord, 1° 19' 55\" Est","gps":"48° 11' 04\" Nord, 1° 19' 55\" Est","images":["../../jctruffet.com/image/image_28/28_Vrainville_1.jpg","../../jctruffet.com/image/image_28/28_Vrainville_2.jpg","../../jctruffet.com/image/image_28/28_Vrainville_3.jpg"]},"Consult_chateau_formulaire0b93":{"id":"Consult_chateau_formulaire0b93","dept":"28","canton":"Chartres","commune":"Vérigny","nom":"Vérigny","type":"Château","periode":"XVII-XVIII","histoire":"VERIGNY, Le 7 avril 1561, Mathurin Brossard, verrier de Vergigny, près Saint-Florentin, signe un traité avec Hugues de Chaugy, pour établir une verrerie à Monceau-lès-Gien. La terre de Bouilli (Bouilly, sur Vergigny) passe aux marquis de Seignelay au XVIe siècle. La rencontre dite de Saint-Florentin, le 1er décembre 1941 entre le maréchal Pétain et le maréchal Goering, représentant du Reich s'est déroulée dans le train spécial du Reichsmarschall, en gare de Saint-Florentin-Verigny, située sur la commune\r\nÉléments protégés MH : les façades et les toitures du château et des communs, l'antichambre et le salon avec leur décor, la partie ordonnancée du parc : inscription par arrêté du 5 décembre 1975.","architecture":"VERIGNY,  la construction date des XVI, XVII, XVIIIe siècles. Il est inscrit aux M.H. depuis 1975. Le château de Vérigny a été construit vers 1750. Son parc a été créé entre 1755 et 1765. Le château de Vérigny est composé d'un corps de logis, terminé par deux pavillons qui saillent sur les façades. Sur la partie centrale, des pilastres soutiennent un fronton triangulaire. Les portes d'entrée centrale de chacune des façades possèdent une rampe en fer forgé, de style Louis XV. Situés à l'est, les bâtiments de ferme forment un ensemble antérieur, du XVIe et XVIIe siècle, et se placent, autour de deux quadrilatères dont l'accès se fait par des porches à guichet. Le bâtiment nord est le plus ancien et servait de bâtiment aux dîmes. Ses murs sont composés de parements losangés en brique. Le bâtiment qui le prolonge à l'est est une grange. La fuye circulaire, également à parements losangés de brique se trouve à l'angle nord-est. Les pigeons y accédaient par une triple rangée de trous aménagés en quinconce sur tout le pourtour et à mi-hauteur.","habitants":"Seigneur locaux\r\n        \r\n        \r\n        \"","divers":"Vérigny GPS : 48° 31' 06\" Nord, 1° 19' 08\" Est","gps":"48° 31' 06\" Nord, 1° 19' 08\" Est","images":["../../jctruffet.com/image/image_28/28_V%c3%a9rigny_1.jpg","../../jctruffet.com/image/image_28/28_V%c3%a9rigny_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','28 — Eure-et-Loir'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
