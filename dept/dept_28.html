nneray_6.jpg"]},"Consult_chateau_formulaireb9b9":{"id":"Consult_chateau_formulaireb9b9","dept":"28","canton":"Chartres","commune":"Bailleau-l","nom":"Levesville","type":"Château","periode":"XV-XVII","histoire":"LEVESVILLE, en 1562, Louis de Bourbon, Prince de Condé, y fut retenu prisonnier par le Duc de Guise après la bataille de Dreux. Catherine de Médicis et les membres du gouvernement du roi viennent visiter le prisonnier pour tenter de négocier la paix, en obtenant de ce prince qu'il fit poser les armes aux Huguenots. Le château de Levesville fut vendu, en 2005, à Alexey Semin, le président du conseil d'administration de ASG, groupe d'investissements de sociétés. Sur le site de ASG Centre International dAntiquités, on peut accomplir une visite en 3D. Le château de Levesville a été inscrit aux M.H. le 4/02/1976.","architecture":"LEVESVILLE, la construction  date de la fin du XVe au XVIIe siècle, le château fut repercé au XVIIe siècle. C'est un long bâtiment flanqué aux 4 angles de tours circulaires. Un terre-plein le précède coté Est. Des fossés secs sur plan carré l'entourent. La grille d'entrée possède 2 piliers de style Louis XIII, de briques et pierres en assises alternées.  Chaque extrémité de cette grille est marquée de pavillons d'entrée carrés. En 1562, Louis de Bourbon, prince de Condé, y fut retenu prisonnier par le duc de Guise après la bataille de Dreux, Catherine de Médicis et quelques membres du gouvernement du Roi.  Eléments protégés MH : les façades et les toitures du château : inscription par arrêté du 4 février 1976.","habitants":"Famille de Louis de Bourbon\r\n        \"","divers":"Levesville    GPS : 48° 29' 23,8\" Nord, 1° 25' 58,1\" Est","gps":"48° 29' 23,8\" Nord, 1° 25' 58,1\" Est","images":["../../jctruffet.com/image/image_28/28_Levesville_1.jpg","../../jctruffet.com/image/image_28/28_Levesville_2.jpg"]},"Consult_chateau_formulaire9925":{"id":"Consult_chateau_formulaire9925","dept":"28","canton":"Les Villages Vovéens","commune":"Louville la Chesnard","nom":"Louville","type":"Château","periode":"XV-XIX","histoire":"LOUVILLE, les Chenard, originaires de Beauce, dont l'origine remonterait à Goislin Chenard, sont qualifiés seigneur de Louville, en 1101. En 1481, Louis XI concède à Jean d'Allonville, son chambellan, la haute, moyenne et basse justice à la terre de Louville. Celle-ci reste dans la famille jusqu'au XVIIIe siècle. Charles Auguste d'Allonville fait reconstruire le château sur le modèle de l'hôtel d'Humières à Paris, il y meurt en 1731.  Il fut entièrement rénové  par Monseigneur d'Hulst, fondateur et premier recteur de l'institut catholique de Paris. Le roi Louis XI y aurait séjourné et il est toujours possible d'observer son portrait mural, dans l'escalier du château actuel. Suite de la destruction totale du château médiéval, puis entièrement rénové à la fin du XIXe  siècle par Maurice d'Hulst, fondateur et premier recteur de l'Institut catholique de Paris. Il n'en subsiste aujourd'hui que l'entrée de la propriété avec ses douves sèches et son portail.","architecture":"LOUVILLE, la construction du château de Louville date du début du XIXe siècle. Le bâtiment actuel fut précédé d'un château fort dont ne subsiste que l'ancienne glacière. Suite de la destruction totale du château médiéval, un nouvel ensemble fut construit, sous le règne de Louis XIV. Trop coûteux en entretien, il fut vendu puis détruit à la Révolution Française. Il ne subsiste, aujourd'hui, que l'entrée du château de Louville actuel, avec ses douves sèches et son portail monumental.","habitants":"Monseigneur d'Hulst  et  Charles Auguste d'Allonville\r\n        \"","divers":"Louville             GPS : 48° 19' 31\" Nord, 1° 47' 19\" Est","gps":"48° 19' 31\" Nord, 1° 47' 19\" Est","images":["../../jctruffet.com/image/image_28/28_Louville_1.jpg"]},"Consult_chateau_formulaire6bd0":{"id":"Consult_chateau_formulaire6bd0","dept":"28","canton":"Chartres","commune":"Léves","nom":"Léves","type":"Château","periode":"XVIII","histoire":"LEVES, du XIe siècle, apparaissent des seigneurs de Lèves,  du nom rorgonide de Gauzlin, mal connus, réputés appartenir à la puissante et prolifique famille Le Riche qui, en Beauce, règne alors aussi sur Gallardon. On trouve Gauzlin Ier  son fils ou petit-fils Gauzlin II (si petit-fils : Geoffroi Ier autre nom rorgonide  ferait la génération intermédiaire)  Gauzlin III (2e moitié du XIe siècle) Odeline du Puiset fille d'Hugues et d'Alix de Montlhéry. Gauzlin IV (un de ses frères est l'évêque Geoffroy de Chartres, fondateur de Josaphat à Lèves en 1117)  Gauzlin V, puis son frère Milon, archidiacre et doyen de Chartres (1re moitié du XIIe siècle)  Gausfred II (2e moitié du XIIe siècle), fils de Milon et Mabile du Tremblay, Marguerite de La Chapelle  Gauzlin IV ou VI seigneur de Lèves et de Bruyères,  vers 1236/39,  1° Marguerite dame de Bruyères (puis 2° x Philippa de Poissy)  Thomas Ier-III seigneur de Lèves et de Bruyères,  vers 1250,  Agnès Le Riche de Beaumont  Thomas II-IV ; puis son frère cadet Jean dit de Poissy,  à Acre en 1291, seigneur de Lèves, Bruyères, Chalabre et Puivert, Eustachie de Lévis-Mirepoix   Thomas Ier-III-V (1re moitié du XIVe siècle) Isabelle de Melun fille d'Adam IV  Thomas II et son frère Philippe (2e moitié du XIVe siècle), d'où postérité. Mais la famille est désormais active dans le Midi, possédant Chalabre, Puivert, Quillan. a-t-elle gardé Lèves et Bruyères?.","architecture":"LEVES, le manoir néoclassique de Lèves, de plan en equerre; avec façades très garnies par des pavillons à haut toits et flanqués de tours. Fut la propriété de l'antiquaire et décoratrice Madeleine Castaing (1894-1992). La voie menant au manoir est désormais dénommée allée Madeleine-Castaing. L'inauguration a eu lieu en présence de Frédéric Castaing, petit-fils de Madeleine Castaing et fils de Michel Castaing, Rémi Martial, maire de Lèves, Jean-Pierre Gorges, maire de Chartres, Chantal Deseyne, sénateur d'Eure-et-Loir et de Jean-Paul Vicat, sous-préfet de l'arrondissement et secrétaire général de la préfecture d'Eure-et-Loir.","habitants":"Seigneurs locaux\r\n        \"","divers":"Léves Grav-4 hotel de ville","gps":"","images":["../../jctruffet.com/image/image_28/28_L%c3%a9ves_1.jpg","../../jctruffet.com/image/image_28/28_L%c3%a9ves_2.jpg","../../jctruffet.com/image/image_28/28_L%c3%a9ves_3.jpg","../../jctruffet.com/image/image_28/28_L%c3%a9ves_4.jpg"]},"Consult_chateau_formulaire5504":{"id":"Consult_chateau_formulaire5504","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"MaIllebois","nom":"MaIllebois","type":"Forteresse","periode":"XV","histoire":"MAILLEBOIS, au XIV e siècle  Renaud de Trie seigneur de Fontenay propriétaire du manoir de Maillebois, sa fille apporte par alliance à Robert d'O, sénéchal d'Eu, le manoir brulé  par les troupes anglaises,  relevé et agrandi par le petit- fils de Robert, Jean d'O date du XVe siècle. François d'O l'un des mignons du célèbre Henri III lorsqu'il meurt en 1594  ruiné par ses magnificences suite à une saisie le château est acquit  par Antoine  le Camus de Jambville président au parlement, érigée en marquisat en 1621 en faveur de son gendre Claude Pinart de Comblizy qui le transmettra aux Leclerc de Lesseville, ces derniers cèdent Maillebois en 1679 à Nicole Desmarets son fils le maréchal de Maillebois continue d'embellir le domaine, en 1762 aprés le décès du fils et petit-fils, le domaine est acquis par Marie Christine de Saint-Simon duchesse du valentinois passe ensuite à la duchesse de Fitz-James, vendu comme bien national à la Révolution dans un mauvais état de dégradation que le vicomte de Maleyssie qui l'acquit en 1808 est contraint d'abattre une partie du bâtiment, conservant que l'aile sud, il fait reconstruire dans le style du XVIe siècle deux courtes ailes aboutissant à des tours qui viennent  encadrer la cour d'Honneur. En 1883 le château est acquis  par  M. Lionel Latham qui le transmet à sa descendance les Armand -Delille actuels propriétaires.","architecture":"MAiLLEBOIS, les bâtiments des communs, oeuvre de Nicolas Desmarets, surintendant des finances sous Louis XIV, datent de la fin du XVIIe siècle. Ils ont été restaurés par le Vicomte de Maleyssie au début du XIXe siècle. C'est Henri Latham, grand-père de l'actuel propriétaire, qui fit construire les écuries en 1882, à l'arrière des communs. Très caractéristiques de la fin du XIXe siècle, elles s'organisent autour d'une cour à demi creusée dans la colline. On note l'unité des matériaux utilisés: silex, briques de différentes couleurs, granit et marbres. Le passage et les salles sont couvertes de voûtes et de voûtains ornés de motif de briques vernissées. Les murs sont élevés en rognons de silex avec des joints en mortier coloré. Les mangeoires et les abreuvoirs sont en marbre. Deux bronzes de Rainot ornent les abreuvoirs extérieurs. Le mobilier équestre est toujours en place. Le décor est régulièrement ponctué des initiales entrelacées. LHL qui signifient Lionel-Henri Latham. Ce qui est remarquable, c'est l'homogénéité de l'ensemble : absolument toutes les pièces sont réalisées de la même façon, mais sans monotonie aucune. Ces écuries sont toujours utilisées. Le château de Maillebois, est en brique il reste un grand corps de logis, ainsi que son parc, que la commune a acquis en 1949.  Éléments protégés MH : le château : inscription par arrêté du 22 décembre 1941. : inscription par arrêté du 17 mai 1974.   inscription par arrêté du 16 octobre 2000.","habitants":"Famille de Nicole Desmarets \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_28/28_Maillebois_1.jpg","../../jctruffet.com/image/image_28/28_Maillebois_2.jpg","../../jctruffet.com/image/image_28/28_Maillebois_3.jpg"]},"Consult_chateau_formulaire93f7":{"id":"Consult_chateau_formulaire93f7","dept":"28","canton":"Épernon","commune":"Maintenon","nom":"Maintenon","type":"Forteresse","periode":"XII-XV-XVII","histoire":"MAINTENON, est de style Moyen-Age et Renaissance. Son propriétaire initial était Jean Cottereau, Trésorier des Finances de Louis XII à Henri II et Madame de Maintenon. Ce nest que grâce à Madame de Maintenon que le château est sorti de lanonymat. Cette hôtesse très célèbre imprégnât les lieux avec son histoire très populaire, en 1674  Françoise d'Aubigné veuve Scarron est au service du roi  depuis cinq ans pour assurer l'éducation des enfants qu'il à donné à sa maîtresse madame de Montespan, reçoit le château en cadeau de la part de sa tante madame de Maintenon. cest celle dune jolie gouvernante devenue lépouse du Roi Louis XIV. Gouvernante des enfants illégitimes de celui-ci, la jeune femme obtint au fil du temps, le respect, ladmiration et pour finir lamour du roi, qui finit par la demander en mariage. Louis XIV et les princes de la famille royale y firent de fréquentes visites et y résidèrent souvent. Madame de Montespan y mis au monde Mlle de Blois.  Racine y écrivit ses tragédies Esther et Athalie pour les demoiselles de Saint-Cyr. Lorsque sa nièce épouse le duc d'Ayen, Madame de Maintenon qui n'a pas d'enfants lui lègue sa terre et son château, en 1852 Paul ducs de Noailles membres de l'académie Française il est resté jusqu'en 1984 toujours aux mains des ducs de Noailles qui restaurent les façades au XIXe siècle et créent la grande galerie dans l'esprit du Grand siècle. Le propriétaire actuel est le conseil général d'Eure-et-Loir. Le château est classé aux M.H. depuis 1944","architecture":"MAINTENON, avant l'époque de Louis XIV, le château était de forme carrée avec quatre tours aux angles et entouré de fossés où coulait l'Eure, la tour carrée, isolée était reliée à l'un des pignons du château côté ouest par un mur que Mme de Maintenon fit démolir pour édifier l'aile de ses appartements. Elle était reliée, côté est, par un mur crénelé fermant la cour qui fut aussi détruit. Mme de Maintenon les fit transporter sous la galerie, construite au premier étage pour relier le château à l'église, où une tribune avait été aménagée pour permettre au Roi d'assister aux offices.\r\nAu moment de la construction de l'aqueduc, la demeure devint résidence passagère de la cour. Louis XIV fit dessiner par Le Nôtre le parc et le parterre, creuser le canal qui passe sous l'aqueduc et planter deux allées sur ses rives. En 1683, à la demande de Louis XIV, Vauban et la Hire commencèrent la construction de l'aqueduc qui devait alimenter les jeux d'eau à Versailles. Au tiers de sa réalisation, on abandonna la construction, et l'ouvrage fut donné à Mme de Maintenon pour dédommagement de tous les tracas qu'il avait pu lui occasionner.","habitants":"Madame de Maintenon.\r\n        \"","divers":"Maintenon      GPS : 48° 35' 08\" Nord, 1° 34' 41\" Est","gps":"48° 35' 08\" Nord, 1° 34' 41\" Est","images":["../../jctruffet.com/image/image_28/28_Maintenon_1.jpg","../../jctruffet.com/image/image_28/28_Maintenon_2.jpg","../../jctruffet.com/image/image_28/28_Maintenon_3.jpg","../../jctruffet.com/image/image_28/28_Maintenon_4.jpg","../../jctruffet.com/image/image_28/28_Maintenon_5.jpg"]},"Consult_chateau_formulaire8239":{"id":"Consult_chateau_formulaire8239","dept":"28","canton":"Nogent-le-Rotrou","commune":"Vichères","nom":"Manorière","type":"Manoir","periode":"XVI","histoire":"MANORIERE, était un fief relevant de la seigneurie de Brunelles, qui était elle  même vassale de Nogent-le-Rotrou mais il semble d'après l'analyse d'une composition de rachat du 5 mai 1501, qu'une partie de cette terre relevait alors du Plessis.  Ce fut seulement quelques années après cette vente, que Philippe de Certieux, le nouveau propriétaire, entré en possession de tontes, les dépendances, détruisit les diverses constructions, pour édifier l'élégant petit manoir flanqué de deux tours avec meurtrières, et entouré de deux fossés, que nous voyons aujourd'hui. Un peu plus loin, au-delà de la première enceinte, on remarque encore une tour ronde, l'ancienne fuye, dont l'architecture ne présente aucun caractère.","architecture":"MANORIERE, le manoir  comporte un grand bâtiment rectangulaire, depuis la Révolution la Manorière est devenu une simple exploitation agricole, comporte un grand bâtiment rectangulaire flanqué aux deux angles de tours rondes, le tout remontant au XVIe siècle. Intérieurement, il est divisé en deux par un escalier droit, à double volée, en berceaux rampants entre un mur d'échiffre. L'ancienne façade principale, aujourd'hui donnant sur le jardin, est percée de fenêtres à meneaux et d'une porte en plein cintre correspondant à l'escalier, est surmontée d'un oculus. En avant de la façade principale subsiste une tour ayant probablement appartenu à une enceinte englobant la propriété. A l'intérieur une cheminée du XVIe siècle et des meurtrières disposées pour l'usage des premières armes à feu. L'intérieur du château ne renferme ni sculptures, ni restes d'objets artistiques, comme ferrures, boiseries, moulures. Dans chaque pièce, où les poutres des plafonds sont apparentes, se trouve une grande cheminée sans ornementation, semblable à celle que l'on fait encore dans les fermes de la contrée.  Éléments protégés MH : le manoir de la Manorière en totalité : inscription par arrêté du 2 mars 1927.","habitants":"Famille de Philippe de Certieux,\r\n        \"","divers":"Manorière","gps":"","images":["../../jctruffet.com/image/image_28/28_Manori%c3%a8re_1.jpg"]},"Consult_chateau_formulairebdc2":{"id":"Consult_chateau_formulairebdc2","dept":"28","canton":"Nogent-le-Rotrou","commune":"Manou","nom":"Manou","type":"Château","periode":"XV-XIX","histoire":"MANOU, est un château médiéval qui servira notamment pendant la guerre de Cent Ans du côté français. D'après des sources venant de la bibliothèque du château, Blanche de Castille y aurait passé une nuit pour rentrer vers Paris après un voyage vers l'Ouest, puis  ensuite à un surintendant  des finances François d'O.  Actuellement, le château est tenu, ainsi que les bois alentour, par les familles Dognin et Demeocq.","architecture":"MANOU, malheureusement, nous ne pouvons plus admirer certains murs d'enceinte et le pont-levis, détruits par une mère qui avait peur pour ses enfants.  Château réédifié au XIXe siècle, est aujourd'hui un aérium. De plan rectangulaire, enfermé  côté entrée d'une cour fermée par un mur à moitie démoli  flanqué de tours rondes sur les deux angles et côté opposé un grand parc, l'édifice à deux niveaux et série de lucarnes sur comble, toit en croupe, avant corps saillant transversallement central plein cintre à trois niveaux dépassant l'ensemble arc un toit en croupe et accolé de part et d'autre d'un prolongement de  mi-ailes de  tour rondes toit en poivrière.","habitants":"Familles Dognin et Demeocq.\r\n        \r\n        \"","divers":"Manou     gps 48° 31' 11\" nord, 0° 59' 01\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Manou_1.jpg","../../jctruffet.com/image/image_28/28_Manou_2.jpg","../../jctruffet.com/image/image_28/28_Manou_3.jpg","../../jctruffet.com/image/image_28/28_Manou_4.jpg"]},"Consult_chateau_formulaire8f63":{"id":"Consult_chateau_formulaire8f63","dept":"28","canton":"Dreux","commune":"Garnay","nom":"Marmousse","type":"Château","periode":"XVIII-XIX","histoire":"MARMOUSSE,  en 1540, le fief est détenu par François de Boulchard avant de passer en héritage à sa sur Antoinette, son mari, Guillaume de Lambert, seigneur du Chesnay, de la Fosse aux loups, de Chailloy et de Garnay, de 1557 à 1566. En 1568, le seigneur est Urbain de Nancelles, seigneur de la Fosse et de Mormoulins, époux de Jacqueline de Fontaines, dame de Chaudon, dont il a un fils, Charles, écuyer et sieur de Marmousse. En 1615, la seigneurie est cédée à Messire René Sain de Bois-Le-Comte, seigneur de Rochefort, Grand Audiencier en 1622,  Après sa mort à Turin, la seigneurie est acquise par Jacques de Guillon, seigneur de Richebourg, qui meurt en 1647. La seigneurie de Marmousse revient à son fils Antoine en 1650. Il a épousé en 1645 Marie dEstrappes, leur fils Léonard baptisé le 5 juin 1653 à Garnay, ils ont deux filles, Barbe et Françoise-Marguerite. La sur de Léonarde a épousé son cousin Marcellin de Guillon, seigneur de Menetou-Couture.  Cest donc à lui quéchoit la vente de la seigneurie de Marmousse acquise, le 15 juin 1714, par Michel-Jacques Lévy et sa femme Marie-Elisabeth Hallé. La seigneurie de Marmousse et Chambléan est vendue le 26 janvier 1719 à Vincent Maynon dInvault (1668-1736) Le jeune Vincent Maynon a épousé le 16 août 1699, la fille cadette de Jules Hardouin-Mansart.  De cette union naissent trois fils entre 1716 et 1721: Vincent-Michel, Guillaume-François et Etienne, la famille Maynon, en la personne dÉtienne dInvault, arrêté et emprisonné avec sa femme, aucun des trois frères nayant de descendance. leurs seules héritières sont Mme Bouvard de Fourqueux et Pauline de Lamoignon Malesherbes.","architecture":"MARMOUSSE,  Le 9 avril 1807, elles aliènent la seigneurie, à M. Jean-Baptiste Tourteau de Septeuil. Parvient ensuite par héritage à son gendre Charles-Auguste du Bouëxic de Pinieux (1779-1851) qui a épousé, le 19 mars 1808, Constance-Stéphanie Tourteau de Septeuil. Sous la Restauration, le comte de Pinieux occupe différentes fonctions : maire de Garnay en 1814, conseiller général et député dEure-et-Loir de 1824 à 1830. Il meurt en son château le 16 octobre 1851.Le domaine passe alors à son gendre, le baron Nicolas-Auguste Graillet, baron de Beine.  Le 24 mars 1887, Marmousse revient au vicomte Adolphe Odoard Le Rebours, époux dAlix-Marie-Charlotte, fille unique du précédent. Ce dernier est propriétaire dun château, celui de Coolus dans la Marne, localité dont il est maire entre 1871 et 1879 et entre 1884 et 1896.  En 1903 François Thureau-Dangin (1872-1944). Le  novembre 1902, la propriété est mise en vente et acquise en 1905 par François Thureau-Dangin.  Toujours  dans cette famille.                                                                                                 Le château actuel est composé dun long corps de logis de deux étages, flanqué dun pavillon à chaque extrémité. Les deux façades sont semblables: le corps central est surmonté dun fronton triangulaire percé dun oculus, caractéristique du XVIIIe siècle. Sous la corniche, un arc de briques en plein cintre englobe la porte dentrée. On accède à létage noble, matérialisé par ses hautes fenêtres et sa surélévation, par un escalier à double volée. Lors de sa vente en 1714 puis en 1719, le château avait cette même apparence, Lépaisseur des murs plus importante du côté du canal laisse supposer que cette partie du château est la plus ancienne et que la façade fut prolongée ensuite. Autre différence avec le château actuel, il y avait dans la cour « deux grandes ailes de bâtiments, deux pavillons à lentrée, le tout entouré de fossés et en face du château.","habitants":"vicomte Adolphe Odoard Le Rebours\r\n        \"","divers":"Marmousse gps 48° 41' 58\" Nord, 1° 20' 18\" Est","gps":"","images":["../../jctruffet.com/image/image_28/28_Marmousse_1.jpg","../../jctruffet.com/image/image_28/28_Marmousse_2.jpg"]},"Consult_chateau_formulaire4487":{"id":"Consult_chateau_formulaire4487","dept":"28","canton":"Dreux","commune":"Vert-en-Drouais","nom":"Marsalin","type":"Château","periode":"XVI-XIX","histoire":"MARSALIN, c'est le comte de Marsalin qui au XVIe siècle fit construire cette somptueuse demeure à l'occasion du mariage d'une de ses filles. Bertha Harjes, la fille de John H. Harjes (1830-1914), qui est associé à Anthony J. Drexel et Eugène Winthrop, banquiers  nait en 1869.   En 1871, J. P. Morgan s'associe. Le mardi 14 juin 1892, deux mois avant son mariage, Charles Waddington, fils aîné de Evelyn et Richard Waddington, sénateur de la Seine-Inférieure, présente sa fiancée Bertha Harjes. Le 14 août 1892, Charles Waddington épouse Bertha Harjes. Au château de Saint-Rémy, un banquet attend le gouvernement dont le ministre de la justice, Louis Ricard, le député de Dreux, Louis Terrier, le sénateur et sous-préfet de Dreux Émile Labiche, la marquise de Clinchamp, le vicomte et vicomtesse dArjuzon, M. et Madame Firmin-Didot propriétaires de l'imprimerie de Mesnil-sur-l'Estrée, M. et Madame Marcel Delmas, la comtesse de Vieil-Castel, MM. Harjes, de Coynart, Lallier, le comte d'Erard,   Le château de Marsalin appartient aujourd'hui à Armelle-Patricia et Marcel Diard Von Nunhold. Marsalin ;  Le jeune couple s'installe au château de Vert-en-Drouais. En 1895, le décès de Drexel permet à J. P. Morgan de renommer la banque  et  en devient le dirigeant. En 1909, John H. Harjes part en retraite et laisse sa place à son fils son Henry Herman Harjes.","architecture":"MARSALIN, le 22 mai 1811, Napoléon Ier et Marie-Louise d'Autriche déjeunèrent sur l'herbe à l'ombre de la Pyramide routière. De même le 22 juin 1815, fuyant vers l'île de Ré, Napoléon y fait un court repas. Le château de Marselin est reconstruit en 1850,  pendant la première guerre mondiale, Bertha Harjes infirmière de la Croix-Rouge française, créé un hôpital dans l'enceinte du château de Vert. Bertha Harjes fonde, au 41 rue Saint-Denis à Dreux, le dispensaire franco-américain qui fonctionnera jusque dans les années soixante-dix.  Lors de la Révolution française, le château de Marselin est incendié.\r\nLes origines lointaines de Marsalin remontent au IXe siècle. Deux fois détruit, le château sera édifié à nouveau en 1850 entre ses deux tours du XVe siècle, sur les ruines du précédent, incendié pendant la Révolution.","habitants":"M. et Madame Firmin-Didot\r\n        \"","divers":"Marsalin       gps 48° 45' 40\" nord, 1° 17' 45\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Marsalin_1.jpg","../../jctruffet.com/image/image_28/28_Marsalin_2.jpg","../../jctruffet.com/image/image_28/28_Marsalin_3.jpg"]},"Consult_chateau_formulaireb7c3":{"id":"Consult_chateau_formulaireb7c3","dept":"28","canton":"Les Villages Vovéens","commune":"Meslay le Vidame","nom":"Meslay_Vidame","type":"Château","periode":"XVII-XVIII","histoire":"MESLAY-VIDAME,  était le siège dune seigneurie, attestée dès les XIIe et XIIIe siècles, les sires de Meslay puis les Vendôme possédèrent la charge héréditaire de Vidame de Chartres.  Au XVIe siècle, plusieurs membres de la famille de Thou possédèrent le domaine et en 1651, la terre de Meslay fut érigée en comté au profit de Jacques Auguste de Thou (1553-1617), historien et magistrat, ami de Montaigne. En 1690, Jean Rouille, conseiller au Parlement, seigneur et comte de Meslay, acquiert le domaine où il meurt en 1715. Anne-Jean Rouille lui succède.  En 1734, Antoine Lambert Masson (1696-1779), chevalier, comte de Meslay et sa femme, Michèle Pétronille Merault, comtesse de la Grève, deviennent propriétaires du domaine. En 1779, leur fils, Jérôme Pélagie Masson (1742-1799) leur succède. Jean de Ferrières se vit en 1572  confisquer la seigneurie qui échut aux d'Angennes. La seigneurie est achetée en 1734  par Antoine Lambert Masson de Meslay, qui accroît la propriété sur les terres avoisinantes. En 1789, à la Révolution le château fut placé sous séquestre, et en 1799, il passe à Charles François de Paule de Barentin, puis au vicomte Charles Henri Dambray, Président de la chambre des Pairs sous Louis XVIII. Jean Maurice Goujon, marquis de Gasville, gendre du précédent, en devient propriétaire. En 1874, sa veuve, Antoinette Pélagie Célestine Dambray en fit don à Yvonne de Sesmaisons, comtesse de Brimont. En 1880, le château et une partie du domaine sont vendus par le Comte de Brimont aux Convert qui les conserveront jusqu'à la première guerre mondiale.","architecture":"MESLAY-VIDAME,  le château actuel fut reconstruit en 1707: la façade possède onze fenêtres, une ceinture de douves et des communs de chaque côté. Au XVIIIe siècle, il était entouré de vergers et dominait un parc à la française. La seigneurie couvrait un domaine qui comprenait des terres, des forêts et de nombreux moulins et fermes etc.  Du château du XVIIe siècle, il ne subsiste que les pavillons dentrée.","habitants":"Famille d' Antoine Lambert Masson \r\n        \"","divers":"Meslay_Vidame         gps 48° 16' 51?\"nord, 1° 27' 40\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Meslay_Vidame_1.jpg","../../jctruffet.com/image/image_28/28_Meslay_Vidame_2.jpg","../../jctruffet.com/image/image_28/28_Meslay_Vidame_3.jpg","../../jctruffet.com/image/image_28/28_Meslay_Vidame_4.jpg"]},"Consult_chateau_formulaire3032":{"id":"Consult_chateau_formulaire3032","dept":"28","canton":"Châteaudun","commune":"Moléans","nom":"Moléans","type":"Château","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article ; Moléans et Aulnay.                  MOLEANS, est le résultat de plusieurs campagnes de construction. Dans la seconde moitié du XVIe siècle furent élevés les communs et l'aile Est avec son pavillon au sud. A partir de 1754, la distribution de l'aile nord fut transformée, ce qui engendra le remaniement de la façade sur cour, dotée d'une travée supplémentaire gagnée sur l'ancienne tour d'escalier démolie simultanément. Au XIXe siècle, la façade nord de l'aile fut également modifiée pour obéir à la mode néo-classique. L'édifice conserve un salon lambrissé de style rocaille, et un papier peint panoramique de 1851. La terrasse sur la Conie pourrait renfermer les vestiges archéologiques du château médiéval.\r\nÉléments protégés MH : les façades et les toitures du château, à l'exclusion des adjonctions effectuées au XIXe siècle (galerie en surplomb, tourelles, fumoir) et le colombier : inscription par arrêté du 4 septembre 1991. L'aile des communs et le pavillon sud ouest de l'aile en retour du château, datant du XVIe siècle. La salle à manger, le grand salon lambrissé au rez-de-chaussée du corps principal, la bibliothèque avec son décor de papier peint au rez de chaussée du pavillon Est et les murs de la terrasse : classement par arrêté du 30 septembre 1994.","architecture":"A deux K.M. au sud-Est le château d'Aulnay a remplacé un ancien manoir. Le toit de « rouche », roseau provenant des vastes marécages de la Conie, caractérise la couverture des habitations, autrefois basses et trapues dans cette région. Cest la toiture la plus imperméable aussi bien au froid quà la chaleur. La ligne faîtière comporte une plantation de fleurs, pour tirer lhumidité. Un bon toit mesure 35 cm dépaisseur et nécessite jusquà 1 800 bottes de 2,50 mètres, cueillies à la faucille. Sa pose est un dur labeur qui peut prendre au « roucheux » trois mois de travail. Vous rencontrerez encore ces chaumières dans les environs.","habitants":"Seigneurs Locaux\r\n        \"","divers":"Moléans grav-1 à 4                                                                           GPS : 48° 17' 31\" Nord, 1° 11' 28\" Est                                             Aulnay grav -5-6    gps 48° 08' 17\" Nord, 1° 22' 44\" Est","gps":"48° 17' 31\" Nord, 1° 11' 28\" Est","images":["../../jctruffet.com/image/image_28/28_Mol%c3%a9ans_1.jpg","../../jctruffet.com/image/image_28/28_Mol%c3%a9ans_2.jpg","../../jctruffet.com/image/image_28/28_Mol%c3%a9ans_3.jpg","../../jctruffet.com/image/image_28/28_Mol%c3%a9ans_4.jpg","../../jctruffet.com/image/image_28/28_Mol%c3%a9ans_5.jpg","../../jctruffet.com/image/image_28/28_Mol%c3%a9ans_6.jpg"]},"Consult_chateau_formulairec227":{"id":"Consult_chateau_formulairec227","dept":"28","canton":"Châteaudun","commune":"Montboissier","nom":"Montboissier","type":"Château","periode":"XVII-XVIII","histoire":"MONTBOISSIER,  le vicomte  épousa en 1748 Marie Charlotte Madeleine Boutin (1782), issue d'une riche famille de financiers. Ils rachetèrent le château à l'aîné des fils du marquis de Montboissier, Philippe Claude de Beaufort-Canillac (1712-1797), dit le comte de Montboissier. Après la mort de son mari, la vicomtesse  obtint du roi, en 1767, l'érection de la seigneurie du Houssay en comté sous le nom de Montboissier-les-Alluyes au profit de son fils, Charles Philippe Simon de Montboissier Beaufort-Canillac (1750-1802), baron,  Il fut construit par l'architecte Nicolas Marie Potain, en 1772 pour Charles-Philippe-Simon de Montboissier-Beaufort-Canillac (1750-1802). Le château  a été démoli dès 1795. Il n'en subsiste aujourd'hui que quelques vestiges : les pavillons d'entrée, le pavillon de Flore et le pavillon des Roses. Cet important édifice, construit en 1772 par Nicolas-Marie Potain, architecte du roi, pour Madeleine Boutin, comtesse de Montboissier, fut entièrement détruit en 1795. Seuls subsistent les deux pavillons d'entrée agrandis et remaniés au XIXe siècle Il subsiste également un beau parc et des communs. Chateaubriand y séjourna plusieurs fois et y écrivit un chapitre des Mémoires d'outre-tombe en 1817. En effet le domaine avait été repris en 1805 par Françoise-Pauline de Malesherbes, fille du défenseur de Louis XVI et veuve du dernier seigneur de Montboissier. Elle était parente avec le grand écrivain. Propriété de la famille de Jandron-Céran-Maillard.","architecture":"MONTBOISSIER n'est connu que par la gravure. C'était un imposant édifice en brique et pierre avec un dôme central, qu'on peut rapprocher du château de Sourches, construit dix ans auparavant, à Saint-Symphorien aux environs du Mans par Gabriel de Lestrade, beau-frère de Potain. L'usage combiné de la brique et de la pierre peut s'expliquer par la volonté de restituer le château antérieur de style Louis XIII, mais aussi par le regain de vogue de cet appareillage à l'époque néo-classique, comme on le voit par exemple non loin de Montboissier au château de la Ferté-Vidame achevé en 1771 par Antoine Matthieu Le Carpentier pour le financier Jean-Joseph de Laborde. Dans le grand appartement de Montboissier, Potain avait administré sa conception savante et raisonnée des ordres. « D'après un ancien état des lieux, la salle à manger était \"décorée en grande architecture d'ordre toscan\", le salon d'été \"en architecture d'ordre corinthien\", le superbe salon de compagnie \"en architecture d'ordre ionique\". Le vestibule séparait l'escalier d'honneur d'une chapelle palatine à deux niveaux. » Il ne subsiste aujourd'hui du château de Montboissier que les pavillons d'entrée, le pavillon de Flore et le pavillon des Roses, qualifiés de « remarquables » par Jackie Despriée, la grille, les douves, un arc de triomphe et quelques fabriques dans le parc.","habitants":"famille de Jandron-Céran-Maillard.\r\n        \"","divers":"Montboissier  GPS : 48° 13' 04,64\" Nord, 1° 23' 29,08\" Est","gps":"48° 13' 04,64\" Nord, 1° 23' 29,08\" Est","images":["../../jctruffet.com/image/image_28/28_Montboissier_1.jpg","../../jctruffet.com/image/image_28/28_Montboissier_2.jpg"]},"Consult_chateau_formulaire3f89":{"id":"Consult_chateau_formulaire3f89","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Montigny sur Avre","nom":"Montigny_Avre","type":"Château","periode":"XVIII","histoire":"trois châteaux dans cet article  Montigny sur Avre,  Montuel, et Arbouville.                                                                                                  MONTIGNY-AVRE, le château  dit de Larry est en pierres blanches et en briques roses du XVIIe siècle. Il se reflète dans les eaux du Avre.  En 1547 Montigny par alliance passe des Mézières au Monmorency-Laval, Hugues-Laval  entreprend la construction au XVIIe siècle, en 1720 les Monmorency se séparent du château qui passe à Joseph Durey Sauroy, passe à Jacques Durey de Noinville président au conseil, qui le cède à Joseph Durey Sauroy marquis du Terrail. En 1733, il s'en défait au profit de son gendre le duc de Brissac, maréchal de France. En 1809  vendu comme bien national au comte Baraguey d'Illiers gouverneur de Venise qui servira en 1809 au mariage de sa fille avec le comte de Darémont futur maréchal de France.  En 1815 à Monsieur Mallard. Le château de Montigny-sur-Avre a été acquis, en 1838, par un aïeul des propriétaires actuels, monsieur Poriquet, ancêtre des la Bourdonnaye Blossac propriétaire actuel.                                                   Le château de Montigny-sur-Avre a vu naître François de Laval (1623-1708) qui fut 1er Evêque en Nouvelle France.\r\nMONTUEL, le château de Montuel se compose d'un bâtiment rectangulaire dont la partie orientale est flanquée de deux échauguettes. La partie occidentale est flanquée pour sa part d'une tour. Cette dernière est rectangulaire et ses contreforts sont surmontés de pinacles à crochets.  Éléments protégés MH : le château de Montuel et sa chapelle : classement par arrêté du 12 août 1924. appartient au marquis de saint-Simon et aux  Brissac.","architecture":"MONTIGNY-AVRE, en bordure de l'Avre, le château de Montigny sur Avre dépose ses teintes chamarrées sur l'eau. Son élégance \"à la française\", l'harmonie de ses lignes et sa toiture à la Mansart lui valent un classement au titre des M.H..  Construit au XVIIIe siècle par Hugues de Montmorency-Laval, classée rivière de première catégorie. Chaînées de briques ses élévations sont d'inspiration classique, corps de logis rectangulaire flanqué de pavillons de part et autres avec tour ronde en angles de la façade,  série de lucarnes sur toit brisés.  Éléments protégés MH : les façades et les toitures du château, des communs et des pavillons d'entrée, les douves, la grille, la cour d'honneur, le parc et l'allée du Larry : classement par arrêté du 14 octobre 1963.                                                                                                       A cinq K.M. à l'ouest Revercourt château d'ARBOUVILLE  a été construit au XIXe siècle, il possède un beau pigeonnier circulaire. La demeure est situé sur la commune de Revercourt, traversée par l'aqueduc de l'Avre et la rivière la Meuvette. A voir dans cette commune l'église Saint-Rémi du XIIe siècle avec charpente apparente à engoulants, labside à trois pans et le chur ont été refaits entièrement et deux chapelles latérales au nord et au sud ont été greffées sur la nef.","habitants":"Famille de Laval\r\n        \"","divers":"trois châteaux dans cet article  Montigny sur avre,  Montuel, et Arbouville.                                                                                               Montigny GPS : 48° 43' 51\" Nord, 1° 01' 28\" Est                         Monluel LGPS : 48° 43' 49\" Nord, 1° 01' 27\" Est                      Arbouville grav-4","gps":"48° 43' 51\" Nord, 1° 01' 28\" Est                         Mon","images":["../../jctruffet.com/image/image_28/28_Montigny_Avre_1.jpg","../../jctruffet.com/image/image_28/28_Montigny_Avre_2.jpg","../../jctruffet.com/image/image_28/28_Montigny_Avre_3.jpg","../../jctruffet.com/image/image_28/28_Montigny_Avre_4.jpg"]},"Consult_chateau_formulaire0039-2":{"id":"Consult_chateau_formulaire0039-2","dept":"28","canton":"Cléry Saint André","commune":"Montigny le Gannelon","nom":"Montigny_Gannelon","type":"Forteresse","periode":"XV-XVI","histoire":"MONTIGNY-GANNELON, perché sur une falaise, le château de Montigny (Mons-ignis) domine la vallée du Loir. On dit qu'au Xe siècle, le propriétaire de la terre de Montigny légua son bien à Ganelon, l'abbé de Saint-Avit de Châteaudun, qui réunit son nom à celui du village. En 1409, Guyot de Renty avait acheté le domaine au duc Charles d'Orléans. L'édifice fut brûlé pendant la guerre de Cent ans, son fils, Jacques de Renty, construisit vers 1475-1500 à son emplacement l'édifice actuel. Depuis le XVe siècle, de nombreuses familles s'y sont succédé, les Framentières, et en 1656 les du Raynier, seigneurs de Droué, Louis du Raynier capitaine des gardes de Louis XIV, sa fille Marie d'Argences se château se transmet  à la comtesse de Fiennes,  puis à la marquise de Matharel qui s'en défait en 1765 au profit de la famille Thiroux  d'Ouarville. D'autres propriétaires,  les de Godoy le ministre du roi d'Espagne  Charles IV. Puis acquit par le comte de la Ferronays ministre des affaires étrangères, sous le règne de Charles X.  En 1831, il fut acheté par le duc de Montmorency Laval  Adrien pair de France, duc de Laval qui commença la restauration, que poursuivit son gendre, le duc de Levis-Mirepoix. En 1886 l'héritier Sigismond de Levis-Mirepoix et son épouse Juliette de Grillon chargent l'architecte  Clément-Parent de rhabiller les façades et en 1971 passe à la vicomtesse  Gérard de Talhouët Boisorhand qui le remet à ses neveux, les la Motte saint-Pierre. Propriété du marquis de Lévis.","architecture":"MONTIGNY-GANNELON  a été restauré au XIXe siècle, construit vers  1475-1500 à son emplacement l'édifice actuel. Du côté de la cour d'honneur, la façade  en damier de briques et pierres blanches a gardé son aspect d'origine mais la façade surplombant la vallée a été abusivement refaite au XIXe siècle dans le style Renaissance tel qu'on le concevait à cette époque. La façade Ouest du château date de la fin du XVe siècle. de style gothique  le corps de logis comporte deux étages de galeries, aux arcades de Renaissance  est encadré à l'ouest par la tour des dames imposant donjon quadrangulaire couronné de corbeaux et d'un haut toit en fortes pentes, la tour de l'horloge à l'est  polygonale que flanque une tourelle en encorbellement avec toit à lanternon sur le pan droit, une porte donnant sur la bretèche avec comme décors un choux frisés.  Le château de Montigny-le-Gannelon a été restauré au XIXe siècle. Un manège a été construit en 1893,  est inscrit aux M.H. depuis 1927, puis en 1993. C'est devenu un musée agricole ouvert au  public.\r\nÉléments protégés MH : le château : inscription par arrêté du 5 novembre 1927. Le manège du château : inscription par arrêté du 1er février 1993.","habitants":"Famille du duc de Montmorency Laval \r\n        \"","divers":"Montigny_Gannelon GPS : 48° 0' 45,13\" Nord, 1° 14' 6,6\" Est","gps":"48° 0' 45,13\" Nord, 1° 14' 6,6\" Est","images":["../../jctruffet.com/image/image_28/28_Montigny_Gannelon_1.jpg","../../jctruffet.com/image/image_28/28_Montigny_Gannelon_2.jpg","../../jctruffet.com/image/image_28/28_Montigny_Gannelon_3.jpg","../../jctruffet.com/image/image_28/28_Montigny_Gannelon_4.jpg"]},"Consult_chateau_formulairef2bb":{"id":"Consult_chateau_formulairef2bb","dept":"28","canton":"Nogent-le-Rotrou","commune":"Montireau_Montlandon","nom":"Montireau_Montlandon","type":"Vestiges","periode":"XVI","histoire":"MONTIREAU , à deux K.M. au sud Est Montlandon démoli en grande partie au XVIIIe siècle, dont il reste des vestiges dans la propriété de la ferme construite au XVIe siècle.Le seigneur de Montireau en 1515 est Jean de Montireau.                                                                         MONBTLANDON; à deux K.M. au sud-Est Montlandon, le fort et la tour construit entre 1883 et 1885, le fort Mortier appartient à un particulier qui la restauré. A lentrée une statue de la Vierge a été édifiée en 1872 sur un promontoire de 404 m daltitude (point de vue remarquable).","architecture":"MONTIREAU, du XVe et XVIe siècles, ferme fortifiée du vieux château. Ensemble conçu de plan carré à un niveau,  toit en croupe même dans les courbes recouvert de tuiles avec tour ronde à l'entrée.                                                                                                   MONTLANDON, débris d'un vieux fort du Moyen-Âge dont les solides assises, dotées de huit à neuf cents années d'existence, ont résisté aux efforts des hommes et du temps. C'est la tour de Montlandon ! Pauvre tour ! Que d'événements elle résume, que d'assauts elle a subis, que de tempêtes et de révolutions elle a vu passer devant elle jusqu'à la dernière invasion. C'est de là que les sires de Landon, soutenus par les forteresses défuntes de Champrond, de Marolles et des Orieux, s'élançaient pour harceler les Anglais, tomber comme des vautours sur leurs bandes, leur faire lâcher prise ou mordre la poussière. Elle était brillante alors, mais aujourd'hui, hélas elle n'offre plus que des ruines et d'antiques souvenirs. Des souvenirs, elle en foisonne. Des histoires, elle en surabonde. En voici quatre de son inépuisable et fantasmagorique répertoire ; le sabbat, les lutins, le hurleur et le lapin endiablé.","habitants":"Seigneur locaux  Jean de Montireau\r\n        \"","divers":"Montireau 48° 24' 32\" nord, 1° 01' 38\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Montireau_Montlandon_1.jpg","../../jctruffet.com/image/image_28/28_Montireau_Montlandon_2.jpg","../../jctruffet.com/image/image_28/28_Montireau_Montlandon_3.jpg","../../jctruffet.com/image/image_28/28_Montireau_Montlandon_4.jpg","../../jctruffet.com/image/image_28/28_Montireau_Montlandon_5.jpg","../../jctruffet.com/image/image_28/28_Montireau_Montlandon_6.jpg"]},"Consult_chateau_formulairecfd8":{"id":"Consult_chateau_formulairecfd8","dept":"28","canton":"Châteaudun","commune":"Flacey","nom":"Moresville","type":"hâteau","periode":"XVIII","histoire":"MORESVILLE,  en 1584, le premier habitant connu est Jacques Pellerin, écuyer. Puis en 1640, Adrien de Joues, seigneur de Plancourt, chevalier de Notre-Dame du Mont Carmel, seigneur de Menainville. En 1790, c'est le comte Jean Jacques de Goislard de Villebresme qui en était propriétaire. En 1852, l'édifice passe à la comtesse de Patras de Mesliers, veuve du comte Jean Jacques Goislard de Villebresme. Le 28 décembre 1876 le comte Arthur de Villebresme vend la terre de Moresville à Etienne Auguste Ricois, cette vente comprenait un château, des bâtiments dexploitation, une pièce deau, une maison de jardinier et 14 ha de terres. Une ferme dite la grande ferme de Moresville, louée à un certain Pottier. A la mort de son père, Pierre Auguste Ricois vient y habiter et verse une rente à sa mère. Le propriétaire actuel, François Santerre Saint Bonnet, a trouvé le lieu abandonné depuis une soixantaine dannées. Il entama de nombreux travaux au printemps 1999, et en août 2001 il accueillait les premiers visiteurs.","architecture":"MORESVILLE date de 1716. Sa tour a été construite en 1870, les salons et les dépendances au décor raffiné du domaine de Moresville vous offrent le plaisir de partager un moment inoubliable dans un cadre naturel de verdure, avec des arbres centenaires, sa chapelle et son pigeonnier. Le château édifié en 1716 a été agrémenté d'une tour en 1870. Sur le domaine, deux dépendances, une chapelle et un pigeonnier sont plantés dans un îlot de verdure où dominent de magnifiques arbres centenaires qui se reflètent dans un plan d'eau \"miroir\". Vous serez séduit par ce décor élégant, idéal pour vos réceptions, cérémonies, mariages, soirées dansantes, dîners, séminaires, expositions, conférences et cocktails, privés ou professionnels.","habitants":"Famille de la comtesse de Patras de Mesliers\r\n        \"","divers":"Moresville  GPS : 48° 08' 52\" Nord, 1° 21' 02\" Est","gps":"48° 08' 52\" Nord, 1° 21' 02\" Est","images":["../../jctruffet.com/image/image_28/28_Moresville_1.jpg"]},"Consult_chateau_formulaire96e1":{"id":"Consult_chateau_formulaire96e1","dept":"28","canton":"Dreux","commune":"Chaudon","nom":"Mormoulins","type":"Château","periode":"XVI","histoire":"MORMOULINS, vers le Xe siècle, le château de Mormoulins s'élevait au milieu des marais et l'on s'y rendait de Chaudon par un chemin en grès dont les fondations existent encore. Les marais se sont comblés au fil des siècles pour devenir des prairies. En 1774, le Receveur Général des Finances de Picardie, beau-frère de la Pompadour, s'en rendit acquéreur. C'est lui qui fit creuser les canaux encore visible de nos jours. En 1781, le propriétaire en était M. Fergeol de Villers, dont la veuve céda les ruines du château en 1817 à M. du Temple de Chevrigny. A cette époque, ce qui restait du château était miné par les inondations annuelles et M. du Temple de Chevrigny dut se résigner à raser le tout, c'est alors que fut construit l'actuel château.","architecture":"MORMOULINS de plan rectangulaires à trois niveaux et série de lucarnes dans les combles, sur toits en croupe, les façades et toitures du bâtiment du moulin à eau ; le bief de dérivation d'amont avec son système de vannage ; le bief d'aval avec son canal de fuite ; le déversoir ; le canal de décharge avec son système de vannage : inscription par arrêté du 17 avril 2003.","habitants":"M. Fergeol de Villers,\r\n        \"","divers":"château Mormoulins à chaudon","gps":"","images":["../../jctruffet.com/image/image_28/28_Mormoulins_1.jpg","../../jctruffet.com/image/image_28/28_Mormoulins_2.jpg"]},"Consult_chateau_formulairef342":{"id":"Consult_chateau_formulairef342","dept":"28","canton":"Châteaudun","commune":"Saint-Maur-sur-le-Loir","nom":"Mémillon","type":"Château","periode":"XV-XVI","histoire":"MEMILLON, du château de Mémillon, dont le corps de logis principal a disparu suite à sa vente comme bien national, subsistent de belles parties. Le pont qui surplombe les douves, mène à la cour intérieure en passant sous une porte en plein cintre surmontée d'un fronton triangulaire. De part et d'autre s'ouvrent trois baies en plein cintre. Dans le prolongement de celles-ci se font face symétriquement deux pavillons carrés qui font saillie. Deux bâtiments devaient relier les pavillons au corps de logis. L'ensemble agricole se compose de différents bâtiments du XVIe siècle et d'un corps en logis du XVe siècle qui ferment une cour intérieure, fermée au nord et au sud par deux portes fortifiées. Le corps de logis est flanqué, au nord, d'une tourelle d'escalier. Cet ensemble est le noyau primitif d'habitation à côté duquel fut construit le château du XVIIe siècle. En 1000 ans le domaine de Mémillon a vu sétablir 5 châteaux dont il reste aujourdhui 3 vestiges et un château (Napoléon III). Depuis la fin des années 1930, la propriété est gardée par la famille Ide-Kostic.","architecture":"MEMILLON est un domaine privé de 50 Ha. Il comprend un manoir construit au XVe et XVIe siècle, ainsi que les vestiges du château de Saveuse, du XVIIe siècle. Il est habité. Vous pourrez le visiter lors des Journées du patrimoine. Il vous est proposé la location de salles pour vos évènements (mariages, séminaires, départ en retraite, autres évènements). Le château de Mémillon est classé aux M.H. depuis 1976. Éléments protégés MH : la façade Sud, le pont, les douves, les façades et les toitures du pavillon d'angle Sud-Ouest . Les façades et les toitures de l'ensemble agricole : inscription par arrêté du 31 décembre 1976.","habitants":"famille Ide-Kostic.\r\n        \"","divers":"Memillon   GPS : 48° 08' 31\" Nord, 1° 24' 09\" Est","gps":"48° 08' 31\" Nord, 1° 24' 09\" Est","images":["../../jctruffet.com/image/image_28/28_M%c3%a9millon_1.jpg","../../jctruffet.com/image/image_28/28_M%c3%a9millon_2.jpg","../../jctruffet.com/image/image_28/28_M%c3%a9millon_3.jpg","../../jctruffet.com/image/image_28/28_M%c3%a9millon_4.jpg","../../jctruffet.com/image/image_28/28_M%c3%a9millon_5.jpg"]},"Consult_chateau_formulaireb291":{"id":"Consult_chateau_formulaireb291","dept":"28","canton":"Illiers-Combray","commune":"Méréglise","nom":"Méréglise","type":"Château","periode":"XVIII-XIX","histoire":"MEREGLISE, la propriété a été lotie et vendue à deux propriétaires différents, en ce qui concerne l'ensemble bâti : la basse-cour et le château sont séparés par une haute clôture boisée et l'accès au château a du être modifiée. Un passage a été aménagé plus à l'est, avant 1932, perpendiculairement à la route devenue rue de la Pierre-Levée.  Le château de Méréglise date du XVIIIe au XIXe siècle.  Celui-ci a été construit pour la Famille de Ligneris. La propriété sera ensuite revendue par les descendants de cette famille, vers 1907, après quelques cessions suivies de rachats, dans le dernier quart du XIXe siècle.","architecture":"MEREGLISE, Il aurait été édifié à la place d'un ancien château qui fut brûlé dont on ne trouve plus trace, aujourd'hui. Le château de Méréglise est classé aux M.H. depuis 2001. Ses Eléments protégés sont ses façades et toitures des deux châtelets ; les façades et toitures du corps de logis, à l'exception des deux adjonctions latérales de la cuisine et de la chaufferie, inscription aux M.H.du 31/12/2001  Éléments protégés MH : la façade Sud, le pont, les douves, les façades et les toitures du pavillon d'angle Sud-Ouest : classement par arrêté du 31 décembre 1976. Les façades et les toitures de l'ensemble agricole : inscription par arrêté du 31 décembre 1976.","habitants":"Famille de Ligneris\r\n        \"","divers":"Méréglise        GPS : 48° 17' 27,25\" Nord, 1° 11' 21,08\" Est","gps":"48° 17' 27,25\" Nord, 1° 11' 21,08\" Est","images":["../../jctruffet.com/image/image_28/28_M%c3%a9r%c3%a9glise_1.jpg","../../jctruffet.com/image/image_28/28_M%c3%a9r%c3%a9glise_2.jpg"]},"Consult_chateau_formulairee223":{"id":"Consult_chateau_formulairee223","dept":"28","canton":"Épernon","commune":"Nogent le roi","nom":"Nogent_le_Roi","type":"Forteresse","periode":"XIII-XV","histoire":"Deux châteaux dans cet article Nogent le Roi et Vacheresse Basse.                                                            NOGENT-LE-ROI, le château primitif avait l'aspect d'une forteresse qui fut cédée par la comtesse de Blois au Roi Philippe Auguste en 1218. . Pendant la guerre de Cent ans, elle fut confisquée au profit de la couronne de France qui conserva la seigneurie jusqu'au milieu du XVe siècle, lorsque Charles VII la céda à Pierre de Brézé, ce dernier fit rebâtir le château qui subsista jusqu'à la Révolution, époque à laquelle il fut vendu comme bien national et démoli. Le château actuel a été édifié en 1863 en style néo Louis XIII par Alfred Chapelain, les épis de faîtage, datant du XVIIe siècle, proviennent du château de Grogneul. Les décors intérieurs sont très représentatifs du Second Empire ainsi que l'éolienne qui alimentait autrefois la pièce d'eau. Des vestiges de la forteresse subsistent vers le nord: un mur de courtine entre deux tours carrées, dont une a gardé sont système défensif, et une poterne. Nogent-le-Roi a été bâti dans un style néo-Louis XIII, sur l'emplacement d'un ancien château, lorsque le roi de France, Charles VII, lui céda la seigneurie. Il reste de l'ancien château son mur de courtine et ses deux tours carrées. Les vestiges de la forteresse médiévale, ainsi que l'éolienne pour l'alimentation en eau datant du Second Empire, sont inscrits aux M.H. depuis 1993.","architecture":"VACHERESSES BASSE,  les premières fondations du manoir remontent en 1393. Des générations de seigneurs des Feugerets succèderont au premier maître des lieux, Fleurant des Feugerais en 1478. Transmis par alliance à la famille de Graffard, il est ensuite vendu au comte de Nogent en 1587 par Madame de l'Aulnaye. À partir de cette époque, la seigneurie suivra la mouvance de Nogent le Roi. Parmi les propriétaires successifs figurent le duc de Noailles, le marquis de Noailles, les époux Rameau de Prémouville de Maisonthon et la baronne de la Barre de Nanteuil. Puis de 1880 à 1980, la propriété passe de mains en mains. Joseph Hémard, dessinateur humoriste y passe quelques années, entre 1940 et 1950, de même le romancier Gilbert Dupé. De nos jours, Michèle Battut, peintre, perpétue la lignée des artistes qui dans ce domaine emprunt d'histoire, puisent énergie et inspiration. La propriété a traversé les siècles sans perdre de son mystère ni de sa superbe. Traversée par la rivière que l'on appelle le Vacheresses ou le Néron, selon que l'on habite Vacheresses ou Néron, elle comprend plusieurs corps de bâtiments dont un pigeonnier, l'entrée se distingue par un portail relevé par la présence de deux tours de guet.","habitants":"Famille de Pierre de Brézé et Alfred Chapelain\r\n        \r\n        \"","divers":"Deux châteaux dans cet article Nogent le Roi et              Vacheresse-Basse ,  gps 48° 38' 48\" nord, 1° 31' 54\" est                                                       Nogent GPS : 48° 38' 48,14\" Nord, 1° 31' 53,86\" Est","gps":"48° 38' 48,14\" Nord, 1° 31' 53,86\" Est","images":["../../jctruffet.com/image/image_28/28_Nogent_le_Roi_1.jpg","../../jctruffet.com/image/image_28/28_Nogent_le_Roi_2.jpg","../../jctruffet.com/image/image_28/28_Nogent_le_Roi_3.jpg","../../jctruffet.com/image/image_28/28_Nogent_le_Roi_4.jpg","../../jctruffet.com/image/image_28/28_Nogent_le_Roi_5.jpg"]},"Consult_chateau_formulairedb67":{"id":"Consult_chateau_formulairedb67","dept":"28","canton":"Nogent le Rotrou","commune":"Nogent le Rotrou","nom":"Nogent_Rotrou","type":"Forteresse","periode":"XI-XIII-XVI","histoire":"Trois châteaux dans cet article ; Nogent Rotrou, St-Jean et la Grande-Maison                                                                                            NOGENT le Rotrou, Maximilien de Béthune duc de Sully achète Nogent à la famille de Condé en 1624 , se fera inhumer dans  la chapelle de l'hôtel-Dieu, fondé en 1182, abrite son tombeau ,  et celui de son épouse Rachel de Cochefilet. Leurs tombeaux sculptés, surmontés d'orants, sont abrités par un mausolée couvert d'ardoises.  En 1779 est vendu au comte d'Orsay, qui émigra pendant la Révolution réquisitionné transformé en prison.  En 1825  passe à Etiembre qui découronna les tours d'enceinte de leur toiture et trente et en fort mauvais état est acquis par M. Oeillet des murs   qui consacre une partie de son importante fortune à la restauration de l'ensemble ; cette oeuvre est poursuivie à partir de 1885 par le docteur Jousset de Bellème qui fait couronner le donjon. Dans la cour du collège Arsène Meunier, une statue de René Iché (1897-1954) représente le poète Rémy Belleau. Il est inscrit aux M.H. depuis 1990. L'Hôtel-Dieu est acquis en 1948 par la commune de Nogent aujourd'hui, une partie de l'hôpital de la ville de Nogent-le-Rotrou.                                                                                                                                                                                                                COMTES DU PERCHE, le château et le musée font l'objet d'une nouvelle muséographie. Elle ouvrira en avril 2019 et désormais le château des comtes du Perche accueillera un musée consacré à l'histoire du Perche. Outre les pièces exposées, du numérique sera au rendez-vous. L'une des salles présentera des uvres d'artistes du XIXe siècle, natifs de Nogent-le-Rotrou. Cet espace éclairera également l'histoire de la ville et du Perche. Ces deux thématiques montreront le rôle du Perche localement.","architecture":"ST-JEAN, dans le Perche, c'est une ancienne forteresse médiévale qui surveille la ville.  Son donjon rectangulaire date du XIe siècle, au centre s'élève le logis de style Renaissance  qui reçoit un musée d'ethnographie d'histoire locale et des expositions temporaires. Dominant la ville de Nogent le Rotrou, le château occupe un site remarquable à l'extrémité du plateau découpé par l'Huisne. Le donjon rectangulaire dont la construction a commencé au début du XIe siècle est le noyau de la forteresse. L'enceinte circulaire flanquée de sept tours cylindriques renforce la défense de l'édifice à partir du XIIIe siècle. Ruiné en 1428, pendant la guerre de Cent Ans, le château change radicalement d'aspect au début du XVIe siècle. A la Révolution, le château est transformé en prison.\r\nRestitué au patrimoine privé au XIXe siècle, il change alors de mains à plusieurs reprises, subissant de multiples transformations, ajouts, démolitions, et aménagements des intérieurs. Endommagé pendant la deuxième guerre mondiale, la commune de Nogent le Rotrou le rachète en 1950 à son dernier occupant, Jousset de Bellesme. Elle y entreprend depuis un vaste programme de restauration.                                                                                                             La GRANDE MAISON,  manoir édifice construit au XVIe siècle, transformé au XVIIIe siècle. Pignons ornés de motifs sculptés du XVIe siècle. Dans la cour intérieure, à la rencontre des deux bâtiments d'angle, se trouve une tourelle renfermant un escalier à vis, en pierre. A l'intérieur de la demeure, cheminées de pierre et boiseries du XVIIIe siècle, inscription par arrêté du 22 novembre 1949.","habitants":"comte d'Orsay\r\n        \r\n        \"","divers":"Grande Maison  grav-5_6                                                        GPS : 48° 19' 21\" Nord, 0° 49' 21\" Est                                       St Jean  grav 1-2-3-4 GPS : 48° 18' 51\" Nord, 0° 49' 14\" Est  48°","gps":"48° 19' 21\" Nord, 0° 49' 21\" Est","images":["../../jctruffet.com/image/image_28/28_Nogent_Rotrou_1.jpg","../../jctruffet.com/image/image_28/28_Nogent_Rotrou_2.jpg","../../jctruffet.com/image/image_28/28_Nogent_Rotrou_3.jpg","../../jctruffet.com/image/image_28/28_Nogent_Rotrou_4.jpg","../../jctruffet.com/image/image_28/28_Nogent_Rotrou_5.jpg","../../jctruffet.com/image/image_28/28_Nogent_Rotrou_6.jpg"]},"Consult_chateau_formulairee060":{"id":"Consult_chateau_formulairee060","dept":"28","canton":"Châteaudun","commune":"Nottonville","nom":"Nottonville","type":"Manoir","periode":"XV-XVII","histoire":"BROSSE Eléments protégés : Les deux ailes des communs ; cour d'honneur avec l'hémicycle délimité par le fossé et par la grille d'entrée ; deux tourelles de part et d'autre de la grille : inscription par arrêté du 7 novembre 1990,  date du XVIIe siècle, mais a brûlé au XIXe siècle. Les communs, la cour et une tourelle demeurent les seuls vestiges d'époque de ce château.  La construction des communs formant deux ailes en vis à vis avec un avant-corps désaxé vers l'ouest est datable entre 1770 et 1787  grâce à deux plans. Ils demeurent les seuls vestiges de cette campagne de construction puisque le château a brûlé au  XIXe siècle. L'aile sud a été dénaturée par sa réutilisation en corps de ferme. Aujourd'hui chambres d'hôtes, Mathilde vous accueille dans une ambiance détendue et on se sent vite \"comme à la maison\".                                       VARIZE,  sur la \"Route du blé\", en pleine Beauce, dans la charmante vallée de la Conie, s'élève une magnifique ferme fortifiée des XVIe et XVIIe siècles. Dans la vallée de la Conie, cette demeure forme un ensemble en partie entouré de douves. L'édifice est composé de plusieurs parties d'époques et d'architectures différentes. Le corps de logis principal date du XVIe siècle. Le pavillon qui servait d'entrée (dont ne reste que le portail), était précédé d'une grande allée bordée d'arbres dont il ne subsiste aujourd'hui que les piliers d'entrée. Ces bâtiments sont en cours de restauration.","architecture":"ABBAYE L'ancienne abbaye du Bois, Logo monument historique Classé MH (1988)28, est un prieuré, seule construction attestée, fortifié du Xe siècle situé à la sortie du lieu-dit le Bois en direction du lieu-dit Vallières. Elle possède une porte encadrée de deux tours avec des meurtrières et une trace de pont-levis, ainsi qu'une porte massive en chêne, restaurée récemment.  Elle fut bâtie par les moines de Marmoutier qui établirent, sur les restes d'une résidence d'époque carolingienne, un prieuré dès le XIe siècle.\r\nLe logis prioral date du XVe siècle et comprend une charpente en bateau inversé.  Dans la cour on trouve un grand colombier, révélateur de la richesse du domaine des moines (le nombre de nids autorisés était dépendant de l'étendue du domaine. Le logis aurait servi de grange dîmière.\r\nA trois K.M au nord le château de abbaye  de Nottonville et le château de la BROSSE  La construction du château de La Brosse date du XVIIIe siècle. Le château de la Brosse a brûlé au XIXe siècle. Les communs, la cour et une tourelle demeurent les seuls vestiges d'époque de ce château. Le Château de la Brosse est inscrit aux M.H. depuis 199","habitants":"Les  moines de Marmoutier\r\n        \r\n        \"","divers":"Notonville gps  48° 06' 47\" nord, 1° 30' 23\" est\r\nBrosse grav-1  Brosse GPS : 48° 08' 08,85\" Nord, 1° 30' 51,09\" Est                                                                                     Varize grav 5","gps":"48° 08' 08,85\" Nord, 1° 30' 51,09\" Est","images":["../../jctruffet.com/image/image_28/28_Nottonville_1.jpg","../../jctruffet.com/image/image_28/28_Nottonville_2.jpg","../../jctruffet.com/image/image_28/28_Nottonville_3.jpg","../../jctruffet.com/image/image_28/28_Nottonville_4.jpg","../../jctruffet.com/image/image_28/28_Nottonville_5.jpg"]},"Consult_chateau_formulairec8bb":{"id":"Consult_chateau_formulairec8bb","dept":"28","canton":"Nogent-le-Rotrou","commune":"Argenvilliers","nom":"Oursières","type":"Château","periode":"XVI-XVII","histoire":"OURSIERES  en 1218, date à laquelle Guillaume de Gémages donne à l'abbaye des Clairets un setier de froment à prendre à sa métairie d'Oursières. De 1604 à 1620, les Mauduison, famille de conseillers du roi, entreprennent la construction d'un château. Plus particulièrement, il s'agit de François-Jacques de Mauduison, trésorier de la collégiale Saint-Jean de Nogent, qui en est le principal commanditaire.  Au XVIIIe siècle, les Mauduison développent un élevage de chevaux et le château se dote d'une jumenterie. De la même période date également le pavillon accolé au sud du château en retour d'équerre. A la Révolution, les héritiers émigrent, et l'on confisque les biens de Nicolas Charles de Mauduison. sa femme, Marie-Antoinette de Meaussé, restée en France, rachète le château aux enchères. Lui succèdent les Mondésir en 1810, puis les Marchandon au troisième quart du XIXe siècle, dont un des membres, Jules, est responsable en 1869 de la construction d'un nouveau colombier et d'une volière convertie par la suite en orangerie. Les Montéage héritent ensuite du domaine et enfin les Morgan. Le château fait l'objet d'une importante campagne de restauration depuis le début des années 2000, orchestrée par son nouveau propriétaire, Philippe Simon.","architecture":"OURSIERES; comprend le château accessible par un portail monumental, deux colombiers, trois tours (deux rondes, une carrée). De style classique, le château adopte un plan rectangulaire. Il comprend un corps de bâtiment central, encadré de deux pavillons. En rez-de-chaussée surmonté d'un étage carré, il présente des façades principale et postérieure ordonnancées à onze travées. La travée centrale est comprise dans un avant-corps légèrement saillant en pierre de taille de calcaire, encadré de deux piliers surmontés d'un fronton cintré. Cette travée est constituée de deux portes, une au rez-de-chaussée en anse de panier (porte d'entrée principale) et une à l'étage, donnant accès à un petit balcon fermé par un garde-corps en fer forgé, et d'un oculus éclairant le comble. L'entrée principale donne directement sur l'escalier monumental en bois (tournant à retours et repos) qui dessert l'étage carré. De plan carré, chaque pavillon est orné d'un fronton triangulaire percé d'un oculus. Un troisième pavillon, plus récent, est construit en retour d'équerre au sud du château. En rez-de-chaussée surmonté d'un étage carré, ses façades sont rythmées par trois travées. Le comble est également éclairé par des oculi dans l'alignement des trois travées se trouve un colombier de plan circulaire. Il conserve sa charpente, ses boulins ainsi qu'un escalier droit en bois permettant l'accès au premier niveau.","habitants":"Famille des Mauduison\r\n        \r\n        \"","divers":"Oursières GPS : 48° 15' 17\" Nord, 0° 57' 32\" Est","gps":"48° 15' 17\" Nord, 0° 57' 32\" Est","images":["../../jctruffet.com/image/image_28/28_Oursi%c3%a8res_1.jpg","../../jctruffet.com/image/image_28/28_Oursi%c3%a8res_2.jpg"]},"Consult_chateau_formulairedad8":{"id":"Consult_chateau_formulairedad8","dept":"28","canton":"Auneau","commune":"Oysonville","nom":"Oysonville","type":"Château","periode":"XV","histoire":"OYSONVILLE, le fils de Baudoin de Beauvais, est seigneur d'un fief à Oysonville du chef de sa femme Aveline dÉtampes, vers 1138. Au XIIIe siècle, lhéritage revient à Péronnelle de Corbeil, fille de Baudoin VIII et de Marguerite de Vienne.\r\nLa terre d'Oysonville entre dans la famille d'Allonville par le premier mariage de Charles, maître d'hôtel du roi Louis XI, avec la petite-fille d'Adam de Crosnes, seigneur d'Oysonville en 1386, Marguerite de Crosnes. La baronnie  appartient à Paul Le Prêvost (1606-1679), capitaine de la compagnie des chevaux-légers de Richelieu et ambassadeur en Saxe. Louis XIV lui érige cette terre en marquisat, par lettres-patentes données à saint-Germain-en-Laye en mars 1664, pour le remercier des services rendus à lui-même et à son père Louis XIII. François-Bernard Briçonnet (1688), lieutenant des chasses de Saint-Germain et de Versailles, marié à Françoise (1702), fille et héritière de Paul Le Prevost, devient marquis d'Oysonville. Leur petite-fille Geneviève-Claude Briçonnet (1793), marquise d'Oysonville en 1773, avait épousé André-René du Pont d'Aubevoye (1707-1755), marquis de la Roussière, famille où la terre restera jusqu'à ce qu'elle passe par alliance dans la famille Odart de Rilly. \r\nAu XVIIIe siècle, le seigneur des lieux, le marquis Paul-Guy Briçonnet, y fait de nombreux travaux, mort à la bataille de Parme en 1734.","architecture":"OYSONVILLE, au XVe siècle, François d'Allonville, débute la reconstruction du château, préalablement brûlé par les Anglais. Au début du règne d'Henri IV, il est achevé, repris par son fils François d'Allonville, avec quelques modifications. Ce n'est que vers 1835, que Théodore du Pont d'Aubevoye (1784-1862), commandant du vaisseau Superbe en 1833, l'adapte à la vie moderne par de gros travaux. Acquis par les Nouvelles Messageries de la Presse Parisienne, il abritera à partir de 1949-1950  jusque dans les années 1980 un des centres de colonie de vacances pour les enfants des employés de cette société et abritera, plusieurs fois, des formations dispensées par des associations d'éducation Populaire.","habitants":"Famille de François d'Allonville  marquis Paul-Guy Briçonnet, \r\n        \"","divers":"Oysonville GPS : 48° 23' 40\" Nord, 1° 57' 17\" Est","gps":"48° 23' 40\" Nord, 1° 57' 17\" Est","images":["../../jctruffet.com/image/image_28/28_Oysonville_1.jpg","../../jctruffet.com/image/image_28/28_Oysonville_2.jpg","../../jctruffet.com/image/image_28/28_Oysonville_3.jpg","../../jctruffet.com/image/image_28/28_Oysonville_4.jpg"]},"Consult_chateau_formulaire1395":{"id":"Consult_chateau_formulaire1395","dept":"28","canton":"Illiers-Combray","commune":"Pontguoin","nom":"Pontguoin","type":"Château","periode":"XVII-XIX","histoire":"RIVIERE, la seigneurie est acquise par le chancelier Raoul d'Aligre au début du XVIIe siècle. Son fils, Etienne, devint garde des sceaux en 1624. Démis en 1626 sur ordre de Richelieu, il s'exila à la Rivière dont il acheva la construction. L'édifice est d'allure encore médiévale,  la porte d'entrée, accompagnée de sa porte piétonne latérale, qui marque le mur d'enceinte du château. Dans le même axe se trouve le châtelet d'entrée, encadré de dépendances, de tours et précédé de douves sèches. Les ponts-levis ont aujourd'hui disparu. Tout autour d'une vaste cour prennent place de longs bâtiments de servitude, tous symétriques, avec de hautes toitures terminées en croupes, éclairées de lucarnes de briques à fronton triangulaire. De grosses tours cylindriques occupent les angles extérieurs. Le château s'élève au fond de la cour d'honneur. Le corps de logis principal est prolongé par deux ailes flanquées de pavillons étroits adossés à des tours cylindriques. Le château et ses ailes s'élèvent d'un étage sur rez-de-chaussée et de combles éclairés de lucarnes en briques. Jambages et linteaux du rez-de-chaussée sont constitués en alternance de brique et de grison. Côté parc, le château se présente de façon classique sur une plate-forme construite qui se prolonge par un parterre constitué de quatre carrés perceptibles sur le plus ancien plan (1794). L'Eure est canalisée par un système de canaux construits en partie en terre. Cette adaptation du parc au passage de l'Eure permettait d'alimenter le moulin de la Rivière qui appartenait au domaine, et de créer les écluses de Boizard mises en place pour le grand projet d'alimentation en eau du parc et des jardins de Versailles. Au XIXe siècle, le château fut délaissé au bénéfice de celui de Vaux, construit sur la même commune.","architecture":"VAUX, le domaine des Vaux sétend sur deux commune : Saint-Maurice-Saint-Germain et principalement sur Pontgouin. Château du XIXe siècle, rénové par le marquis Pomereu d'Aligre désireux d'en faire la résidence la plus somptueuse de la région. Nombreux vestiges de la résidence princière, jardins à la française, salons. On dit quil y avait aux Vaux deux châteaux : celui des gens et celui des chevaux, tant la splendeur des communs et des écuries était grande. Le château des Vaux est une immense construction dans le style Louis XV, tel qu'on le concevait au XIXe siècle, la façade offre un développement considérable. La partie centrale est en pierre blanche, les encadrements et les chaînages de fenêtres sont en brique. Pour construire ce château, qui compte plus de 300 pièces, l'architecte a détourné le cours de l'Eure puis nivelé les terrains pour créer des terrasses et planter un parc. Le domaine resta dans la famille dAligre jusquen 1889. En 1946, il fut acheté  par le Père Marc Duval en faveur de luvre des orphelins apprentis dAuteuil.","habitants":"Rivière; chancelier Raoul d'Aligre                                                   Vaux; marquis Pomereu d'Aligre \r\n        \"","divers":"Rivière  grav 5-6-7  GPS : 48° 29' 04\" Nord, 1° 08' 22\" Est.                                               Vaux Grav 1 à 4 GPS : 48° 29' 35\" Nord, 1° 05' 21\" Est","gps":"48° 29' 04\" Nord, 1° 08' 22\" Est.","images":["../../jctruffet.com/image/image_28/28_Pontguoin_1.jpg","../../jctruffet.com/image/image_28/28_Pontguoin_2.jpg","../../jctruffet.com/image/image_28/28_Pontguoin_3.jpg","../../jctruffet.com/image/image_28/28_Pontguoin_4.jpg","../../jctruffet.com/image/image_28/28_Pontguoin_5.jpg","../../jctruffet.com/image/image_28/28_Pontguoin_6.jpg","../../jctruffet.com/image/image_28/28_Pontguoin_7.jpg"]},"Consult_chateau_formulaireead0":{"id":"Consult_chateau_formulaireead0","dept":"28","canton":"Les Villages Vovéens","commune":"Janville-Beauce","nom":"Puiset","type":"Château","periode":"XIII-XV","histoire":"PUISET, situé dans la plaine de Beauce entre Allaines et Janville, il ne reste que quelques pans de murs de l'orgueilleuse forteresse des vicomtes de Chartres qui, au XIIe siècle, inspiraient la terreur dans la campagne beauceronne. Hugues du Puiset était célèbre pour ses exactions sur les populations qui dépendaient du domaine de Toury, appartenant aux moines de Saint-Denis. En 1112, le château fut assiégé par l'armée royale. Il fallut alors trois sièges pour le mettre hors d'état de nuire. Hugues du Puiset fut enfermé à château-Landon et dut promettre de ne plus fortifier son château, ce qu'il ne fit pas. Cette famille se poursuivit au Puiset sous le nom de la famille de Rochefort, elle s'éteignit au XIIIe siècle.","architecture":"PUISET; de grands fossés ont été creusés pour défendre la forteresse et la basse-cour. À l'intérieur de cet espace se situait deux mottes artificielles ; sur l'une d'elles fut construit la forteresse en bois, sur une motte surhaussée entourée de palissades, à laquelle on accédait au niveau du premier étage par une échelle, elle mesurait 85 mètres de diamètre. Sur la seconde motte au nord-est, de la première, se trouvait la basse cour comprenant le logis du seigneur, les dépendances, écuries, salle des gardes, réserves, chapelle, ainsi que la tour de Boël. également entourée d'une palissade. Le grand fossé était protégé par un rempart de terre.La grande enceinte ovalisée mesurait 420 mètres de long pour 260 mètres de large. Elle couvrait une superficie d'environ 8 hectares.","habitants":"Famille d'Hugues du Puiset                                                        famille de Rochefort,\r\n        \"","divers":"Puiset GPS : 48° 12' 05\" Nord, 1° 51' 59\" Est","gps":"48° 12' 05\" Nord, 1° 51' 59\" Est","images":["../../jctruffet.com/image/image_28/28_Puiset_1.jpg","../../jctruffet.com/image/image_28/28_Puiset_2.jpg"]},"Consult_chateau_formulaireb3b0":{"id":"Consult_chateau_formulaireb3b0","dept":"28","canton":"Illiers-Combray","commune":"St-Avit-les Guespières","nom":"Rabestan","type":"Vestiges-Château","periode":"XI-XV","histoire":"RABESTAN le château de Rabestan est inscrit aux M.H. depuis 1987, les Protestants incendièrent la grange et l'étable, situées dans la basse-cour et pillèrent tout le mobilier du château. En 1569, l'accès à la basse-cour était assuré par un pont de bois dormant et celui du château par un pont-levis. A l'emplacement du donjon s'élevait un pavillon carré. Dans le fond de la cour, un bâtiment agrémenté d'un escalier à vis, était bâti sur 2 celliers et comptait une tourelle, à l'extrémité Ouest. En 1589, le Château de Rabestan fut presque entièrement détruit par les troupes du roi de France Henri de Navarre.","architecture":"RABESTAN  la première mention de Rabestan remonte à 1130. Entre 1430 et 1440, le château fort fut presque entièrement détruit. Le donjon échappa à la destruction. En 1558, les protestants incendièrent grange et étable dans la basse-cour et pillèrent le mobilier du château. En 1569, l'accès à la basse cour était assuré par un pont de bois  dormant et celui du château par un pont-levis. A l'emplacement du donjon s'élevait un pavillon carré. Dans le fond de la cour, un bâtiment agrémenté d'un escalier à vis, est édifié sur deux celliers et compte une tourelle à l'extrémité ouest. En 1589, le château fut presque entièrement détruit par les troupes d'Henri de Navarre. Il fut reconstruit au XVIIe siècle, en plus d'un bâtiment contenant la salle de justice, celle des archives et la chapelle, détruit en 1858. Il ne reste du château lui même que l'arase et les murs extérieurs entourés de douves, deux tourelles d'angle et un puits. Au sud, apparaissent encore les vestiges d'une motte féodale.","habitants":"Seigneurs locaux\r\n        \"","divers":"Rabestan GPS : 48° 16' 34\" Nord, 1° 16' 27\" Est","gps":"48° 16' 34\" Nord, 1° 16' 27\" Est","images":["../../jctruffet.com/image/image_28/28_Rabestan_1.jpg","../../jctruffet.com/image/image_28/28_Rabestan_2.jpg"]},"Consult_chateau_formulaire055b-2":{"id":"Consult_chateau_formulaire055b-2","dept":"28","canton":"Dreux","commune":"Villemeux sur Eure","nom":"Renancourt","type":"Château","periode":"XVII","histoire":"RENANCOURT, le château a été construit au XVIIe siècle. Nous trouvons en 1779 un inventaire après le décès de François Jérôme Chaban de La Borie, écuyer, seigneur de Renancourt, veuf de Marie Anne Duval d'Eprémesnil, demeurant au château de Renancourt, paroisse de Villemeux.  Le château fut très bien restauré au commencement du XIXe siècle par le baron de Montblin.","architecture":"RENANCOURT, le château de Renancourt a été construit au XVIIe siècle. L'inventaire est poursuivi dans la maison du défunt, rue Neuve-des-Capucines, au coin de la place Vendôme, quartier Montmartre, Palais-Royal. Estimation de l'argenterie par Jean Alexandre Fortin, marchand orfèvre, quai des Orfèvres ; tapisserie des Gobelins deux pièces représentant des scènes de Comédie ; une pendule par Julien Leroy, horloger à Paris, etc.  De plan en U à deux étages plus étages en comble avec lucarnes en chien assis.","habitants":"Famille de François Jérôme Chaban de La Borie\r\n        \"","divers":"Renancourt","gps":"","images":["../../jctruffet.com/image/image_28/28_Renancourt_1.jpg","../../jctruffet.com/image/image_28/28_Renancourt_2.jpg"]},"Consult_chateau_formulaire6fcc":{"id":"Consult_chateau_formulaire6fcc","dept":"28","canton":"Les Villages Vovéens","commune":"Rouvray-Saint-Florentin","nom":"Reverseaux","type":"Château","periode":"XVIII","histoire":"REVERSEAUX, vendu comme bien national à la Révolution en 1793 achat par Jean André Imbert qui le cède le 19 Brumaire an IV aux sieurs Montessuy et Ronus en 1807  le maréchal Laurent de Gouvion Saint-Cyr en fit l'acquisition le passe à son fils pair de France. Il se retirera au château en 1819 et y séjournera jusqu'à sa mort, en 1830.   Il conserve de nombreux motifs décoratifs d'époque Louis XIV, Louis XV et Louis XVI . Il conserve de nombreux motifs décoratifs d'époque Louis XIV, Louis XV et Louis XVI.  Ministre de la Marine et de la guerre sous Louis XVIII,  Éléments protégés MH : les façades et les toitures du château et des communs, la cour d'honneur, les douves, classement par arrêté du 27 décembre 1966. Le château de Reverseaux appartient toujours à la Famille Gouvion-Saint-Cyr.","architecture":"REVERSEAUX, ce château paraît avoir été construit entre 1715 et 1730. Il conserve de nombreux motifs décoratifs d'époque Louis XIV, Louis XV et Louis XVI. L'édifice fait partie d'un ensemble construit à la même époque par Jules-Michel Hardoin neveu de Hardoin Mansart,  l'édifice de plan massé et une haute silhouette il s'en différence  par ses lignes  plus élégantes  élevé d'un niveau de soubassement un rez-de-chaussées et de deux étages sous un toit brisé au terrasson très développé, et comprenant,  La façade principale présente un motif central encadré de pilastres et terminé par un fronton arrondi. La façade nord est de même style et de disposition sensiblement identique, et comprenant, du côté de l'arrivée, une cour d'honneur flanquée de deux pavillons Louis XIII, avec douves et grille en fer forgé, précédée d'une avant-cour et d'une avenue.","habitants":"maréchal Laurent de Gouvion Saint-Cyr \r\n        \"","divers":"Reverseaux    GPS : 48° 16' 5,16\" Nord, 1° 33' 57,6\" Est","gps":"48° 16' 5,16\" Nord, 1° 33' 57,6\" Est","images":["../../jctruffet.com/image/image_28/28_Reverseaux_1.jpg","../../jctruffet.com/image/image_28/28_Reverseaux_2.jpg"]},"Consult_chateau_formulaire6865":{"id":"Consult_chateau_formulaire6865","dept":"28","canton":"Chateaudun","commune":"Lutz en Dunois","nom":"Saugeville","type":"Manoir","periode":"XV-XVI","histoire":"SAUGEVILLE,  était autrefois une ancienne seigneurie ayant château et chapelle, d'où relevaient les fiefs de Fresne, d'Éteauville et de Villouzier. Voici ce qu'en dit l'abbé Bordas dans
