const FULL={"Consult_chateau_formulaire0ed3":{"id":"Consult_chateau_formulaire0ed3","dept":"28","canton":"Anet","commune":"Abondant","nom":"Abondant","type":"Château","periode":"XIII-XV-XVII","histoire":"ABONDANT, le premier occupant est Pierre de Bigot, seigneur. Guillaume de la Guiry est mentionné en 1485 comme seigneur de Fay et dAbondant. Puis en 1560 apparaît Jean de Mangot, puis son fils, Louis de Mangot était encore en 1618 possesseur de la terre. La seigneurie passe à cette époque aux mains de la petite fille de François de la Noue dit Bras de Fer, gentilhomme breton, grand homme de bien et de guerre, suivant Henri IV. Le domaine est cédé, en 1645, à un abbé de Saint Martin de Trouard du nom de Bouchet de Sourches. Puis ce fut en 1699 que la seigneurie dAbondant passa entre les mains de Louis François du Bouchet, marquis de Sourches. L'édifice fut occupé par la marquise Louise Elisabeth de Croÿ de Tourzel, gouvernante des enfants de Louis XVI. Elle a accompagné la famille royale dans sa fuite à Varennes, a été emprisonnée à la prison de la Tour du Temple en 1792, puis dans celle de la Force et a échappé de peu à l'échafaud. Elle demeura dans son château jusquà la Restauration, devient Duchesse par Louis XVIII. Décédée à 82 ans.  en 1902  le château sort de la descendance des Bouchet de Sourches, passé à la duchesse des Cars, petite fille de Mme de Tourzel. En 1902  l'héritière  d'Abondant Claire de Vallombrosa comtesse Lafond se défait du château, mais conserve le décor du grand salon quel fait remonter  dans son hôtel parisien. En 1951, le domaine est transformé en établissement médico-social.","architecture":"ABONDANT, date du XIIIe siècle. C'est un château de style Louis XIII, fut construit grâce à son architecte Jean Mansart de Jouy. Comporte un corps central flanqué de deux ailes surhaussées d'un étage et coiffé de haut combles en ardoise. La première partie du château d'Abondant date du XVIIe siècle. Sa construction fut achevée en 1750.   Le château d'Abondant fut réaménagé en maison de retraite. Puis, un projet en résidence hôtelière fut proposé mais n'a pas abouti. Abondant a été classé aux M.H. depuis 1928, est mis en vente actuellement.                                                                              ROBERTIERE, sa construction a débuté au XIIe siècle et s'est achevée au XVe siècle. Le château de la Robertière fut construit sur lun des points les plus hauts de la forêt domaniale de Dreux. Il est actuellement en ruines. Il fut construit en 1162, pour le comte Robert Ier de Dreux. Il fut détruit, en 1421, par William de la Pole, Ier duc de Suffolk au moment de la prise de Dreux par les Anglais. Sa construction a commencé au XVIe siècle et deux ailes furent ajoutées, en 1750. Le château de la Robertière fut réaménagé et utilisé comme maison de retraite. Un promoteur décida de  le transformer en résidence hôtelière mais le projet fut abandonné.","habitants":"Famille de Louis de Mangot\r\n        \"","divers":"Abandant grav 1-2  GPS : 48° 47' 02,29\" Nord, 1° 26' 12,51\" Est                                                                                                      Robertière grav-3  GPS : 48° 48' 13\" Nord, 1° 22' 17\" Est","gps":"48° 47' 02,29\" Nord, 1° 26' 12,51\" Est","images":["../../jctruffet.com/image/image_28/28_Abondant_1.jpg","../../jctruffet.com/image/image_28/28_Abondant_2.jpg","../../jctruffet.com/image/image_28/28_Abondant_3.jpg"]},"Consult_chateau_formulairebccb":{"id":"Consult_chateau_formulairebccb","dept":"28","canton":"Châteaudun","commune":"Alluyes","nom":"Alluyes","type":"Château fort","periode":"XIII-XV-XVI","histoire":"ALLUYES,  date du XIIe, XIIIe, XVe et XVIe siècle. La seigneurie d'Alluyes était, au Moyen-Age, la première des cinq baronnies du Perche-Gouêt.  Vers 1268, le château fut la propriété de Charles de France, roi de Sicile. Après avoir été aux comtes de Bar, il revint à Louis de Luxembourg puis à Charles V d'Anjou. En 1463, Louis XI fit un séjour au château d'Alluyes. En 1481, il revint à Jacques d'Armagnac, Duc de Nemours et de Luxembourg, puis à Florimond Robert et secrétaire du roi et des finances de Charles VIII, Louis XII et François Ier, puis passe aux Escoubleau, marquis de Sourdis par les Babou de La Bourdaisière.  Dès 1591, Henri IV rendit visite à sa maîtresse, Gabrielle d'Estrées, dans ce lieu.  Alluyes devient marquisat en faveur de François dEscoubleau. Ses descendants vendent Alluyes à Jean, marquis de Gassion.  Le château d'Alluyes appartient aujourd'hui à une association d'orphelin, ou à séjourné Ronsard, Gabriel d'Estrée et Chateaubriand.","architecture":"ALLUYES. entre la porte fortifiée et le donjon  du XIIe siècle s'élève l'ancienne chapelle Saint-Nicolas terminée par une abside hémi-circulaire. Elle était primitivement éclairée de quatre fenêtres plein cintre. Une large porte charretière a été percée dans le mur ouest lors de la transformation de la chapelle en grange, la charpente fut refaite à la fin du XVe et début du XVIe siècle, elle reçut une voûte en bardeaux sur lequel furent exécutées des peintures. Le château qui date du XIIe siècle, a conservé sa superbe tour maîtresse, de la 1ère moitié du XIIIe siècle, qui appartient à une fondation, une porterie de la même époque, et une chapelle décorée de peintures gothiques qui est la chapelle Saint-Nicolas. D'autres parties ont été ajoutées aux XVe et XVIe siècles.                                                                                                                                    Éléments protégés MH : le donjon : inscription par arrêté du 21 décembre 1925. Le portail d'entrée et ses deux tours, la chapelle Saint-Nicolas attenante : classement par arrêté du 15 décembre 1980.","habitants":"Famille de  Jacques d'Armagnac\r\n        \"","divers":"Alluyes    GPS : 48° 13' 43,82\" Nord, 1° 21' 45,49\" Est","gps":"48° 13' 43,82\" Nord, 1° 21' 45,49\" Est","images":["../../jctruffet.com/image/image_28/28_Alluyes_1.jpg","../../jctruffet.com/image/image_28/28_Alluyes_2.jpg","../../jctruffet.com/image/image_28/28_Alluyes_3.jpg"]},"Consult_chateau_formulairecdfb":{"id":"Consult_chateau_formulairecdfb","dept":"28","canton":"Anet","commune":"Anet","nom":"Anet","type":"Forteresse","periode":"XVI-XVII","histoire":"ANET, en 1444 Pierre de Brézé reçoit le domaine d'Anet son fils fait construire l'ancien château. Son petit fils épouse Diane de Poitiers en 1547 que Diane, veuve de Louis de Brézé, Sénéchal de Normandie, fit débuter la construction du château, Philibert de l'Orme, architecte. Il conçoit une demeure régulière, à l'architecture sobre, En 1548, on commence par les bâtiments d'habitation; le corps principal devant former le fond de la cour d'honneur cette partie du château prolonge vers l'ouest le vieux manoir que Diane de Poitiers tient à conserver en l'incorporant à sa nouvelle demeure, en 1551, l'aile gauche, le portail s'élève en dernier lieu et porte gravée, date d'achèvement des travaux en 1552. Derrière chaque aile s'étend une cour latérale. Celle de droite, irrégulière, bordée d'un côté par le manoir des Brézé, s'ouvre vers la route par un portail monumental dit \"porte de Charles le Mauvais\" et s'orne en son milieu d'une fontaine, celle de la Nymphe d'Anet,  que surmonte le célèbre groupe de la Diane au cerf, longtemps attribué à Jean Goujon et conservé aujourd'hui au musée du Louvre,  c'est à Anet que la mort surprend Diane en 1566, Louise sa fille la duchesse d'Aumale hérite et le vend  au XVIIe siècle, aux ducs de Vendôme, petit fils d'Henri IV et de Gabriel d'Estrées devenus propriétaires, y feront apporter d'importants remaniements dont, l'escalier d'honneur, construit en 1680, par Claude Desgots et le pavillon du gouvernement. Au XVIIIe siècle, la Duchesse du Maine puis le duc de Penthièvre y organisèrent de nombreuses réceptions.  Son propriétaire actuel est Mr Jean de Yturbe descendant de Ferdinand Moreau qui l'acquit en 1680. Le château d'Anet est classé aux M.H. depuis 1993.","architecture":"ANET,  Philibert de l'Orme a imaginé pour les différents corps de logis un décor architectural original. La partie centrale de la façade principale est constituée par un beau portail où, pour la première fois, chaque étage est marqué par des colonnes d'un ordre différent : dorique, au rez-de-chaussée, ionique au premier et corinthien au second. Ce dernier étage est occupé par la statue du sénéchal. Les fenêtres divisées par des meneaux de pierre sont surmontées de frontons alternativement triangulaires et curvilignes. Non seulement le château peut rivaliser avec les plus magnifiques résidences princières ou royales, mais il se présente comme une uvre exceptionnelle qui suscite une immédiate renommée. Désormais les réceptions et les fêtes vont se succéder au château d'Anet, en y amenant la cour entière et retenant le roi dans l'enchantement. Diane assiste au déchaînement de la guerre entre Catholiques et Protestants, amie des uns, haïe des autres. Elle pense aussi à la mort et, en 1565, à Limours, elle dicte son testament. La Révolution puis les années qui suivirent, faillirent être l'anéantissement du château. Confisqué, vendu comme bien national, Un canal sera creusé à cette période d'après les plans de Le Notre. Le château d'Anet fut pillé, puis des démolisseurs s'attaqueront à l'édifice. Le corps du logis central et l'aile droite seront détruits. Il faudra patienter jusqu'en 1840 pour que commencent la restauration du château d'Anet. Cinq générations de la même famille réussiront avec goût et patience, et rendra sa beauté d'antan à ce domaine, qui demeure l'un des joyeux de l'architecture française.","habitants":"Famille de Pierre de Brézé; Diane de Poitiers\r\n        \"","divers":"Anet   GPS : 48° 51' 29,2\" Nord, 1° 26' 18,79 Est","gps":"48° 51' 29,2\" Nord, 1° 26' 18,79 Est","images":["../../jctruffet.com/image/image_28/28_Anet_1.jpg","../../jctruffet.com/image/image_28/28_Anet_2.jpg","../../jctruffet.com/image/image_28/28_Anet_3.jpg","../../jctruffet.com/image/image_28/28_Anet_4.jpg","../../jctruffet.com/image/image_28/28_Anet_5.jpg","../../jctruffet.com/image/image_28/28_Anet_6.jpg","../../jctruffet.com/image/image_28/28_Anet_7.jpg"]},"Consult_chateau_formulairebcd4":{"id":"Consult_chateau_formulairebcd4","dept":"28","canton":"Les Villages Vovéens","commune":"Gommerville","nom":"Arnouville","type":"Château","periode":"XVI-XVIII","histoire":"ARNOUVILLE,  la reconstruction du château au début du XVIIIe siècle est attribuée à René II Choppin, lieutenant au Châtelet de Paris. De profonds remaniements y sont apportés vers 1780. A la suite d'un incendie en 1848, l'avant-corps fut restauré et renforcé par un large balcon porté par une colonnade. Ce château possède cette grâce majestueuse des constructions contemporaines du règne de Louis XIV. Le domaine possède un grand parc  avec une belle perspective boisée aménagé au XVIIIe siècle, encadrant l'édifice.\r\nÉléments protégés MH : le château et ses décors, l'escalier, les façades et les toitures des deux pavillons symétriques, les fossés secs et leurs murs de maçonnerie : inscription par arrêté du 22 juillet 2009.","architecture":"ARNOUVILLE, il date du XVIe siècle mais il fut reconstruit et aménagé au début du XVIIIe siècle, dans une construction contemporaine du règne de Louis XIV. On accède au château par une belle grille d'époque en fer forgé encadrée de douves sèches et une grande allée bordée d'une double rangée de tilleuls tricentenaires. Sa construction a débuté au XVIIe et s'est achevée au XIXe siècle. Le château d'Arnouville est situé dans un parc de 12 hectares et offre une belle perspective boisée pure du XVIIIe siècle, de part et d'autre, du château.   De profonds remaniements ont été apportés, vers 1780. En 1848, à la suite d'un violent incendie, l'avant-corps fut restauré et a été renforcé d'un imposant balcon, porté par une colonnade.  Corps de logis de plan rectangulaire reposant sur un soubassement, un étage carré et un étage de comble, la demeure se compose d'un corps central comptant cinq travées  du côté de la façade antérieure, le corps central est flanqué de deux pavillons en retrait côté cour et en alignement de la façade postérieure.","habitants":"Famille de René II Choppin\r\n        \"","divers":"Arnouville    GPS : 48° 19' 21\" Nord, 1° 56' 57\" Est","gps":"48° 19' 21\" Nord, 1° 56' 57\" Est","images":["../../jctruffet.com/image/image_28/28_Arnouville_1.jpg","../../jctruffet.com/image/image_28/28_Arnouville_2.jpg"]},"Consult_chateau_formulaire232d":{"id":"Consult_chateau_formulaire232d","dept":"28","canton":"Brou","commune":"Arrou","nom":"Arrou","type":"Château","periode":"XII-XV-XIX","histoire":"BOIS-RUFFIN,  du haut de ses 19 mètres, la forteresse médiévale de Bois-Ruffin témoigne du rôle essentiel qu'elle joua dans le conflit opposant Philippe Auguste, Roi de France, aux Plantagenêts. En 1421, la tour est occupée par les Bourguignons et les Anglais. Le maréchal de Boucicault, avec les troupes rassemblées à Châteaudun, marcha sur Bois Ruffin et emporta la place.","architecture":"BOIS-RUFFIN, la tour se dresse au fond d'une excavation en entonnoir,  paraît avoir été construite à la fin du XIIe siècle. Elle est bâtie en grison et gros silex. Elle était autrefois divisée en deux étages, avec entrée au niveau du premier étage. Le remblai résultant du creusement de l'entonnoir a constitué une terrasse circulaire dominant un fossé. Au sommet de ce talus, apparaissent les restes d'un mur, qui rejoignent les ruines d'un ouvrage avancé, commandant le pont-levis disparu. Des fossés moins larges encerclent la tour et se prolongent, du côté nord, pour englober un espace réservé autrefois à des corps de logis, à des granges et à une petite chapelle construite en bois et transformée en maison d'habitation. Le fossé, situé en avant, était traversé par un pont-levis qui menait à un pavillon de défense avec une porte comportant une herse. La Tour du château du Bois-Ruffin est classée aux M.H. depuis 1924.                                                                                         BRUNETIERE, est un château bâti à Arrou. La construction du château d la Brunetière s'est achevée au XIXe siècle, et possède un beau parc. Il est proposé au Public une visite des extérieurs du château, uniquement.","habitants":"Le maréchal de Boucicault\r\n        \"","divers":"Bois-Ruffin grav 1         GPS : 48° 06' 09\" Nord, 1° 02' 42\" Est                         Brunetière grav-2         GPS : 48° 05' 58\" Nord, 1° 08' 10\" Est.                      Bois-Méan grav-3              gps 48° 08' 41? N, 1° 06' 51? Est","gps":"48° 06' 09\" Nord, 1° 02' 42\" Est                         Bru","images":["../../jctruffet.com/image/image_28/28_Arrou_1.jpg","../../jctruffet.com/image/image_28/28_Arrou_2.jpg","../../jctruffet.com/image/image_28/28_Arrou_3.jpg"]},"Consult_chateau_formulaire4a6d":{"id":"Consult_chateau_formulaire4a6d","dept":"28","canton":"Auneau","commune":"Auneau","nom":"Auneau","type":"Forteresse","periode":"XVI-XVIII","histoire":"AUNEAU, au XIe siècle un  seigneur Hugues de Gallardon vassal des comtes de Chartres qui possédaient la châtellenie dAuneau. \r\nMarguerite dAuneau descendante dHugues de Gallardon épouse en 1350  Jean Bureau de La Rivière,   chancelier de France, ce dernier meurt en 1400 , les héritiers conservent le château mais n'y habiteront guère, en 1547  vendent  le château à la famille   dEstouteville. Un siècle plus tard, les familles des La Roche Guyon, dEstouteville, puis Bertin de Silly en prennent possession. En 1590, il est à Henri de Joyeuse, maréchal de France frères cadet du célèbre mignon d'Henri III  il s'oppose frontalement aux huguenots durant les guerres de Religion  va connaître ses heures de gloire sept ans plus tard. En effet, le 24 novembre 1587, va se livrer ce quon appellera la Bataille dAuneau.  Joyeuse cède Auneau   à Philippe Hurault de Cheverny, chancelier de France associer à Isabeau  Babou, épouse de François d'Escoubleau  futur marquis de Sourdis. Ses enfants de leurs mariage respectifs Virgital d'escoubleau et Catherine Hurault de Cheverny héritent et en 1722 Auneau passe par achat aux Noailles héritiers  des Escoubleau par Pierre d'Hariaques secrétaire du roi. Le donjon fut l'un des lieux du tournage des films \"Les Petites Filles modèles\" de Jean-Claude Roy, en 1970 et \"Le Seuil du vide\" de Jean-François Davy, en 1971.  Aujourd'hui M. Lecomte propriétaire, ou madame Wenger.","architecture":"AUNEAU, bâti au  XIVe, XVIe, au XIe siècle par Bureau de la Rivière en forme d'Hexagone dont le donjon  occupe l'un des angles, sur le territoire de la paroisse du même nom offre un aspect imposant malgré de nombreuses transformations. C'est à l'époque Carolingienne, vers 750, que le premier château aurait été édifié sur le petit éperon qui domine le bourg. Aujourd'hui, il se compose de deux parties: le bâtiment principal qui date du XIe siècle un second bâtiment vit le jour sous limpulsion du seigneur Hugues de Gallardon,  il reste de cette période le donjon cylindrique bâti en pierre et entouré de son propre fossé et d'une chemise qui fut surmonté au XVIe siècle dun dôme et dun lanternon désormais isolé que deux corps de bâtiments en équerre reliés par une tour carrée.  Au XVIIIe siècles et le donjon cylindrique du XIe siècle. Un premier château dit \"La Vieille Cour\" fut édifié au VIIIe ou IXe siècle pour protéger la route de Chartres et les habitants du bourg. A la gauche du corps de logis se dresse un châtelet d'entrée ouvrage quadrangulaire cantonné de tours cylindriques au centre duquel se détache entre deux contreforts, l'arcade de l'ancienne porte charretière avec des rainures de pont levis.   La Tour d'Auneau est inscrite aux M.H. depuis 1927.","habitants":"Famille de Philippe Hurault de Cheverny,\r\n        \"","divers":"Auneau   GPS : 48° 27' 45\" Nord, 1° 46' 25\" Est","gps":"48° 27' 45\" Nord, 1° 46' 25\" Est","images":["../../jctruffet.com/image/image_28/28_Auneau_1.jpg","../../jctruffet.com/image/image_28/28_Auneau_2.jpg","../../jctruffet.com/image/image_28/28_Auneau_3.jpg","../../jctruffet.com/image/image_28/28_Auneau_4.jpg","../../jctruffet.com/image/image_28/28_Auneau_5.jpg"]},"Consult_chateau_formulairef0bd":{"id":"Consult_chateau_formulairef0bd","dept":"28","canton":"Lucé","commune":"Barjouville","nom":"Barjouville","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article ; Moineaux et  Barjouville. MOINEAUX, ce vestige était le portail de l'ancienne prestrière du chapitre  de Chartres, dont l'ensemble de ce château a presque disparu. La partie conservée comprend le piedroit de l'arc et l'amorce du voütement (en pierre de taille et blocage de moellons), un mur perpendiculaire de stabilisation (en moellons), une échauguette ronde en surplomb sur l'angle (en briques). Le cul de lampe est sculpté de lions et de putti en pierre. L'artiste a parfaitement réussi la difficile jonction entre un soubassement rectangulaire et une construction ronde. Il a équilibré sa composition de part et d'autre de l'axe central.\r\nÉléments protégés MH : les vestiges de la prestrière : inscription par arrêté du 27 juin 1994.","architecture":"BARJOUVILLE, date de 1551. L'échauguette de la Prestrière de Moineaux est inscrite aux M.H. Barjouville est inscrit aux M.H. depuis 1994.","habitants":"Seigneurs locaux\r\n        \"","divers":"Deux châteaux dans cet article ; Moineaux et  Barjouville.  Brajouville gra-1                                                                          GPS : 48° 24' 24\" Nord, 1° 28' 41\" Est  Moineaux grav 2-3","gps":"48° 24' 24\" Nord, 1° 28' 41\" Est  Moineaux grav 2-3","images":["../../jctruffet.com/image/image_28/28_Barjouville_1.jpg","../../jctruffet.com/image/image_28/28_Barjouville_2.jpg","../../jctruffet.com/image/image_28/28_Barjouville_3.jpg"]},"Consult_chateau_formulaireba02":{"id":"Consult_chateau_formulaireba02","dept":"28","canton":"Auneau","commune":"Béville le Comte","nom":"Baronville","type":"Château","periode":"XVII","histoire":"BARONVILLE,  au XVe siècle  les terres appartenaient  à la famille  de Prunelé, en 1522 passe  à la famille  de Gyves et en 1623 le château est édifié  par la famille de Montescot. Passé ensuite par mariage dans la famille de Lattaignant, la seigneurie de Baronville est acquise en 1783 par le marquis dAligre, premier président du parlement de Paris. En 1868, son arrière-petit-fils, le Marquis de Pomereu dAligre fait détruire lancienne demeure et édifie le château que nous admirons aujourd'hui, conçu pour les réceptions du second Empire et construit sur les plans de larchitecte Léon de Sanges. Le marquis de Pomereu d'Aligre fait graver sur la façade du château la devise suivante: \"Pereat Nomen cum Peribit Honor\", qui signifie, Périsse le nom lorsque périra l'Honneur. Ces événements laisseront des traces sur la vaste demeure et son parc, jusquà ce que le comte et la comtesse Bertrand de Rougé, descendants des Pomereu d'Aligre, entreprennent dimportantes restaurations afin de sauver ce patrimoine historique et familial. Depuis 1981, Baronville a retrouvé sa vocation initiale, les réceptions, pour les groupes uniquement. La nature y est reine, suivant des perspectives tracées dès le XVIIe siècle par les seigneurs de Baronville, puis adaptées par le marquis de Pomereu d'Aligre au XIXe siècle.","architecture":"BARONVILLE,  édifice  construit sur l'emplacement de l'ancien château en pierre blanche en amplifiant démesurément le volume,   corps de logis central encadré de deux pavillons à toits indépendants en forte saillie, un avant corps à toit aigu consiste dans un monumental pavillon dont le rez-de-chaussé est occupé par un vestibule arrondi. Durant la 1ère guerre mondiale le domaine de Baronville accueille des blessés en convalescence entre 1914 et 1918,  il sera occupé 3 fois par les soldats allemands (dont le Feld-Maréchal Friedrich Paulus) entre 1940 et 1944, notamment pour accueillir une base aérienne pour lutter contre l'Opération Overlord en Normandie. Ces occupations successives laissèrent l'édifice et son parc dans un état relativement dégradé, jusquà ce que le comte et la comtesse de Rougé, descendants des d'Aligre, entreprennent dimportantes restaurations pour sauver ce patrimoine historique et familial. Depuis 1981, le château est ouvert à la location pour les grandes réceptions de mariage, lancement de produit, tournages,  En 2012, le comte Aymeric de Rougé ouvre le Carrousel de Baronville aux réceptions, après une rénovation complète d'une aile des anciennes écuries de Baronville, construites en 1882, pour Armand, Marquis de Pomereu d'Aligre.","habitants":"le Marquis de Pomereu dAligre\r\n        \"","divers":"Baronville      GPS : 48° 26' 53\" Nord, 1° 43' 52\" Est","gps":"48° 26' 53\" Nord, 1° 43' 52\" Est","images":["../../jctruffet.com/image/image_28/28_Baronville_1.jpg","../../jctruffet.com/image/image_28/28_Baronville_2.jpg"]},"Consult_chateau_formulairee4bb":{"id":"Consult_chateau_formulairee4bb","dept":"28","canton":"Brou","commune":"Beaumont les Autels","nom":"Beaumont","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article ; Beaumont et Cailleaux.       BEAUMONT, le château fut tout d'abord une simple tour féodale. Sa position stratégique à l'entrée du Perche en fit un lieu convoité par les troupes anglaises qui s'en emparèrent au XIVe siècle. A la même époque, l'illustre famille d'Estouteville acquit le château et ses fiefs. C'est au milieu du XVIe siècle que fut entamée la construction du nouveau château par Jean II du Blosset. Elle fut achevée vers 1580. La puissante famille de Rohan posséda le domaine au XVIIe siècle. La demeure ne fut pas épargnée lors de la Révolution, les biens furent séquestrés et vendus, et le propriétaire, Monsieur de Reverseaux, arrêté à Chartres est condamné à mort en février 1794. Il fallut attendre 1804 pour voir le château de Beaumont enfin restauré par Joseph Augustin, baron de Besenval. Les embellissements dus au baron de Layre, à la fin du XIXe siècle, apporteront à la demeure le caractère que nous lui connaissons aujourd'hui.","architecture":"CAILLEAUX, fief attesté dès 1370, mais les constructions ne remontent pas au delà de la fin du XVe siècle. Deux campagnes de construction peuvent se distinguer, la première comprend la façade sud, la tourelle d'escalier et les trois premières travées de la façade nord à partir de l'escalier. La chapelle ainsi que le pavillon qui la jouxte sur la façade nord appartiennent à la seconde phase. Le pignon ouest et les dernières travées orientales de la façade nord ont été percés au XVIIIe et XIXe siècle, pour Jean II de Blosset. Ce manoir s'inscrit dans la tradition des bâtiments sur plan barlong avec un escalier hors oeuvre et une façade revêtue de briques, mais se distingue du plan type par sa dimension, le rejet de l'escalier en arrière du manoir et l'absence de décor sculpté. Éléments protégés MH : le manoir des Cailleaux en totalité : inscription par arrêté du 19 juillet 2005, chambres d'hôtes.","habitants":"Famille d'Estouteville                  Famille de Rohan \"","divers":"Deux châteaux dans cet article ; Beaumont et Cailleaux.     Caillaux grav 3-4 GPS : 48° 15' 17\" Nord, 0° 57' 32\" Est                                   Beaumont grav_1-2","gps":"48° 15' 17\" Nord, 0° 57' 32\" Est","images":["../../jctruffet.com/image/image_28/28_Beaumont_1.jpg","../../jctruffet.com/image/image_28/28_Beaumont_2.jpg","../../jctruffet.com/image/image_28/28_Beaumont_3.jpg","../../jctruffet.com/image/image_28/28_Beaumont_4.jpg"]},"Consult_chateau_formulairecfcd":{"id":"Consult_chateau_formulairecfcd","dept":"28","canton":"lliers-Combray","commune":"St-Luperce","nom":"Blanville","type":"Château","periode":"XVII-XVIII","histoire":"BLANVILLE,  jouit d'une présence seigneuriale dès le XVIe siècle, mais l'arrivée de Léonard du Cluzel, en 1738, lui confèrera toute son importance. A sa mort, son fils, François -Pierre du Cluzel marquis de Montpipeau en hérite, mais s'occupera plus de l'urbanisation de la ville de Tours que de son embellissement. En 1791  le comte de Cluzel rejoint l'armée des princes combattant les troupes révolutionnaires.  Après la Révolution en 1800  Antoine-Marie du Cluzel reprend possession du domaine. Sa fille, Marie Thérèse, mariée à 15 ans à son cousin de 40 ans, y fêtera ses noces d'or pour léguer le domaine en 1833  à sa fille et à son gendre, Marcel de Cossé-Brissac, membre de la célèbre famille angevine. Au début du XXe siècle, leur petite-fille, remplacera les jardins anglais en parterres à la Française et à l'Italienne en s'inspirant des jardins de Boboli à Florence et fera élever un pont qui traverse le bois autour du château. Lignée des de Cossé-Brissac : Antoine -François de Cossé-Brissac (1834-1902),  Eugène- Marcel de Cossé-Brissac (1886-1957), Charles-Louis de Cossé-Brissac (1931) Tous descendants de Léonard  de Chazel.","architecture":"BLANVILLE;  Construit au XVIIe siècle et remanié au XVIII.  L'édifice se présente d'un corps de bâtiment  rectangulaire  flanqués de deux pavillons latéraux pourvus de combles indépendants  à la française, deux pavillons de chaque coté des douves sèches et fera agrandir le parc.  Deux ailes  basses, reposant sur des arcades reliant le corps central aux communs, franchissant les douves sèches. Spécimen précieux du manoir seigneurial et remanié sous Louis XIII, entouré d'un parc, a conservé à la fois la simplicité, la distinction et l'équilibre de ce grand siècle. Il a été conçu pour la vie familiale et conserve donc cette image de simplicité et un harmonieux équilibre dans sa construction, éléments protégés MH , les façades et les toitures du château et de ses dépendances ; à l'Est la cour d'honneur avec ses deux pavillons d'angles (façades et toitures), le jardin à la française, les douves, le tapis vert situé devant le château et les deux pavillons d'entrée (façades et toitures) : inscription par arrêté du 6 novembre 1969.","habitants":"Famille de François du Cluzel\r\n        \"","divers":"Blanville    GPS : 48° 25' 52\" Nord, 1° 17' 44\" Est","gps":"48° 25' 52\" Nord, 1° 17' 44\" Est","images":["../../jctruffet.com/image/image_28/28_Blanville_1.jpg","../../jctruffet.com/image/image_28/28_Blanville_2.jpg","../../jctruffet.com/image/image_28/28_Blanville_3.jpg"]},"Consult_chateau_formulairef169":{"id":"Consult_chateau_formulairef169","dept":"28","canton":"Nogent le Rotrou","commune":"Margon","nom":"Bois_Jolly","type":"Château","periode":"XVII-XVIII","histoire":"BOIS-JOLLY, le 24 janvier 1722, Jacques Daupelay de Bonneval, notaire de Nogent-le-Rotrou, dresse un état des lieux détaillé du site lors de sa visite de la terre du Bois-Jolly. Le domaine appartient alors à un certain Regnouard, bourgeois à Paris. Dans sa description, le notaire royal précise que le domaine est entouré de murs pourvus de tourelles aux angles et qu'il comprend une petite étable à mouton et une cidrerie probablement devenues toit à porcs et remise par la suite. Suite à la Révolution, le manoir est vendu comme bien national. Le Bois Jolly devient une ferme qui se développe surtout dans la seconde du XIXe siècle avec la construction de deux granges-écuries, une en alignement au nord du logis manorial construite en 1862 (date portée sur une pierre au-dessus de la porte charretière), l'autre à l'ouest construite en 1874 (date portée sur une pierre, accompagnée des initiales \"J P\", sous la corniche en façade principale). Tous les bâtiments subissent des remaniements, à l'instar de la façade principale du logis manorial (réorganisation des ouvertures : nouveaux percements, obstruction d'anciennes ouvertures), A cette époque et jusqu'à la Première Guerre mondiale, le Bois Jolly appartient au marquis Jean-Marie Auguste de la Poèze d'Harambure.","architecture":"BOIS-JOLLY, il serait peut-être le commanditaire de la construction  du manoir dont la partie la plus ancienne, de la fin du XVe siècle, est le logis manorial, comme le montre le décor de la cheminée monumentale de la salle. Le corps de passage construit en alignement du logis manorial au sud date du XVIe siècle, en témoigne le décor d'une fenêtre à meneau et traverse de l'étage en façade ouest. La grange nord, la remise au sud, les murs ceinturant le domaine (partiellement en élévation aujourdhui) ainsi que les quatre tourelles aux angles (présentes en plan en 1811, détruites par la suite) semblent également dater de cette période. Aucune source ne permet de connaître l'histoire du manoir tout au long du XVIIe siècle et jusqu'au début du XVIIIe siècle. A l'entre-deux-guerres, la ferme déjà reconnue pour son élevage de chevaux percherons, devient même la plus importante de la région nogentaise : plus de cinquante personnes y travaillent et les installations comprennent, entre autres, trois manèges à chevaux et une citerne à eau. Acquis à la fin des années 1980 par les propriétaires actuels, l'ensemble des bâtiments est en cours de restauration.  Le bâtiment ouest, dont la façade principale est orientée à l'est, comprend trois corps : au centre, du logis manorial  qui est en rez-de-chaussée surmonté d'un étage carré et d'un comble.","habitants":"Famille de Regnouard\r\n        \"","divers":"Bois-Jolly     Grav 1 Manoir                                                           GPS : 48° 20' 00\" Nord, 0° 50' 00\" Est","gps":"48° 20' 00\" Nord, 0° 50' 00\" Est","images":["../../jctruffet.com/image/image_28/28_Bois_Jolly_1.jpg"]},"Consult_chateau_formulairecaa0":{"id":"Consult_chateau_formulairecaa0","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Boissy-lès-Perches","nom":"Boissy_lès_Perches","type":"Château","periode":"XIV-XVII-XVIII","histoire":"Trois châteaux dans cet article Bois-Josse, Boissy et la Couragerie. BOIS-JOSSE, il existait en 1339 un château féodal avec douves et pont-levis. Sans doute se trouvait-il à lemplacement du domaine du Bois-Josse. Il y a trois siècles, le château formait, avec le Mesnil, une vaste propriété comprenant des fermes dans certaines communes voisines. Le château actuel fut élevé au milieu du XVIIe siècle. Le dernier seigneur de Boissy-les-Perche mourut au château du Bois Josse en 1789. Après avoir connu de nombreux propriétaires, le château fut vendu comme bien national en lan V. Le village Boissy lès Perches  possède huit châteaux.","architecture":"La COURAGERE, date de la fin du XVIIIe siècle. Cet ancien relais de chasse du Marquis de Chambray s'étend sur 5 ha et vous accueille lors de vos séjours dans le Perche. Il est classé 4 épis sur Gîte de France. Idéal pour se retrouver en famille ou entre amis, il vous offrira un lieu calme et serein. Il existe 9 Châteaux et Manoirs situés à Boissy-les-Perche, issus d'anciennes seigneuries établies au Moyen Age, pour surveiller la frontière du Royaume de France et de la Normandie. Ces lieux remarquables ont pour nom : Bizot, le Bois-Josse, le Boulay-Saint-Clair, la Cour Pétral qui fut un ancien monastère, les Haies, le Mesnil, Philmain, Sorel. Le château est à louer - 80 E/nuit. Isabelle vous reçoit dans cette ancien relais de chasse du Marquis de Chambray, pour remonter le temps dans un salon qui date du XIXe siècle.","habitants":"Marquis de Chambray \r\n        \r\n        \"","divers":"Boissy   grav 1-3-4-5     GPS : 48° 41' 09\" Nord, 0° 53' 21\" Est                           Bois-Josse grav -6 Couragère grav 7                                        GPS : 48° 41' 09\" Nord, 0° 53' 21\" Est                                       Mesnil grav-2","gps":"48° 41' 09\" Nord, 0° 53' 21\" Est                           B","images":["../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_1.jpg","../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_2.jpg","../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_3.jpg","../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_4.jpg","../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_5.jpg","../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_6.jpg","../../jctruffet.com/image/image_28/28_Boissy_l%c3%a8s_Perches_7.jpg"]},"Consult_chateau_formulairecf35":{"id":"Consult_chateau_formulairecf35","dept":"28","canton":"Châteaudun","commune":"Bonneval","nom":"Bonneval","type":"vestiges, châteaux","periode":"XVII","histoire":"Trois châteaux dans cet article ; Bonneval et son abbaye  et Bois Guibert.\r\nBONNEVAL, au cur de la Beauce et au commencement de la haute vallée de la rivière le Loir, Bonneval est un village fortifié. Autour des fortifications de lenceinte du centre historique, le Loir coule dans les fossés.  Les fortifications de Bonneval datent du Moyen-Age, sont inscrites aux M.H. depuis 1927.    Situé sur une colline, c'est un carré flanqué d'une haute tour à chaque coin ; il a des tourelles, des remparts et même des ponts-levis, qui surplombent les douves. Sa conception reflète le rôle initial du château qui était une forteresse militaire. Il n'y a qu'une entrée et sortie, dans le mur Est.    Les portes de Bonneval sont inscrites aux M.H. depuis 1927. Elles datent du Moyen-Age et ont été rachetées par la Commune.\r\nBois GUIBERT hôtel restaurant la famille Leluc.","architecture":"L'Abbaye Saint-Florentin est  bâtie à Bonneval,  cet ancien monastère bénédictin a été fondé en 857. Il ne reste que des vestiges de l'abbaye  bâtie aux XIe, XIIe et XIIIe siècles. Le Logis abbatial date du XVe siècle, les cloîtres du XVIIIe siècle et la pierre tombale du XIIIe siècle.Elle fut pillée en 911 lors des invasions normandes, puis durant la guerre de Cent Ans, puis en 1568 par le grand condé, à la tête des protestants. À la Révolution, le domaine fut déclaré bien national et vendu à un négociant qui y installa une filature puis une fabrique de tapis.\r\nDevenu propriétaire de labbaye en 1828, le conseil général y établit en 1845 une colonie agricole pour enfants abandonnés qui fit place, en 1861, à lasile daliénés du département. Depuis 1979, celui-ci porte le nom d'un psychiatre français : le Centre Hospitalier Henri Ey, en hommage à l'ancien médecin chef du service des femmes (1934-1970) de Bonneval. Des religieuses, les surs de Saint-Paul de Chartres, sont présentes jusqu'à la fin des années 1960 dans ce service pour assister les infirmières laïques dans les soins à apporter aux malades et vivre auprès de ces dernières dans la vie quotidienne.","habitants":"Seigneurs locaux\r\n        \"","divers":"Trois châteaux dans cet article ; Bonneval et son abbaye  et Bois Guibert.   Bonneval vestiges grav -1-2-3                                             GPS : 48° 10' 58\" Nord, 1° 23' 09\" Est                                          Bois Guibert grav-5    GPS : 48° 10' 56\" Nord, 1° 23' 05\" Est                        Abbaye grav-4   gps 48° 10' 40,41\" Nord, 1° 23' 04,87\" Est","gps":"48° 10' 58\" Nord, 1° 23' 09\" Est","images":["../../jctruffet.com/image/image_28/28_Bonneval_1.jpg","../../jctruffet.com/image/image_28/28_Bonneval_2.jpg","../../jctruffet.com/image/image_28/28_Bonneval_3.jpg","../../jctruffet.com/image/image_28/28_Bonneval_4.jpg","../../jctruffet.com/image/image_28/28_Bonneval_5.jpg"]},"Consult_chateau_formulairec071":{"id":"Consult_chateau_formulairec071","dept":"28","canton":"Épernon","commune":"Bouglainval","nom":"Bouglainval","type":"Manoir","periode":"XV-XVII","histoire":"Deux châteaux dans cet artcle Bouglainval  et Boigneville.     BOUGLAINVAL, le  fief remonte au XIIIe siècle, la construction du château date du XVIIe, XVIIIe et XIXe siècle, une importante série de travaux est menée sur le château dans la seconde moitié du XVIIe siècle et au début du XVIIIe, doublée de la création d'un parc à la Française, transformé en parc à l'anglaise au XIXe siècle. Le château de Bouglainval présente un corps central cantonné de quatre tourelles bâti sur un réseau de caves.\r\nLe 3 décembre 1755, François Pierre de Briqueville, comte de La Luzerne, lieutenant général des armées du Roi, lieutenant des gardes du corps de sa Majesté, commandeur de l'ordre royal et militaire de Saint-Louis, acquiert au enchères le château de Bouglainval appartenant à Jean Baptiste de Sailly.\r\nÉléments protégés MH : le château, les communs et le sol de la cour, l'orangerie et la mare. Le parc paysager avec sa pièce d'eau : inscription par arrêté du 9 janvier 2006.","architecture":"BOUGLAINVAL ,  une importante série de travaux est menée sur le château dans la seconde moitié du XVIIe siècle et au début du XVIIIe siècle, et la création d'un parc à la française, transformé en parc à l'anglaise au XIXe siècle. Le château présente un corps central de plan rectangulaire à trois niveaux avec série de lucarnes sur combles cantonné de quatre tourelles, élevé sur un réseau de caves. Il conserve des cuirs peints et dorés, ainsi que des panneaux peints d'après des modèles gravés de compositions de Watteau.                                                                                                                                    A  Yermenonville cinq K.M. au nord  le manoir de BOIGNEVILLE construit pour la famille d'Escrones au XVe siècle, il a conservé son aspect rustique d'origine. Le grand corps de logis est flanqué de deux tours rondes sur une façade et sur l'autre, est accolée en son milieu une tourelle d'escalier octogonale s'ouvrant par une porte en accolade. Cette demeure servit, dit-on, de rendez-vous de chasse à madame de Maintenon. Les salles du premier étage ont conservé leurs vastes cheminées. A l'entrée de la cour, une vieille chapelle en ruines, a conservé sa cloche qui eut pour marraine en 1690 la célèbre favorite du Roi.","habitants":"Famille  François Pierre de Briqueville                                     Boigneville, famille d'Escrones\r\n        \"","divers":"Deux châteaux dans cet artcle Bouglainval  et Boigneville.  Bouglainval   grav 1-2                                                                Bouglainval   GPS : 48° 33' 59\" Nord, 1° 30' 31\" Est                            Boigneville grav-3  48° 33' 03\" Nord, 1° 38' 12\" Est","gps":"48° 33' 59\" Nord, 1° 30' 31\" Est","images":["../../jctruffet.com/image/image_28/28_Bouglainval_1.jpg","../../jctruffet.com/image/image_28/28_Bouglainval_2.jpg","../../jctruffet.com/image/image_28/28_Bouglainval_3.jpg"]},"Consult_chateau_formulaire06ef":{"id":"Consult_chateau_formulaire06ef","dept":"28","canton":"Chatres","commune":"Mignières","nom":"Boulard","type":"Château","periode":"XVIII","histoire":"BOULARD, le château des Boulard, connu sous le nom de château de Spoir, a été édifié en 1768 par la seigneurie de Bérou : « Nous avons très peu déléments historiques. »Le château a été agrandi au XIX e siècle par lajout de deux ailes qui encadrent la construction dorigine. Il a hébergé un internat public destiné à laccueil des enfants à partir de 1953.\r\nRester à labandon depuis 30 ans, cest en 2004 que la famille Boulard a décidé dacheter ce lieu  en ruine afin de le rénover et de pouvoir le garder dans le patrimoine de la région.  Depuis pour continuer à restaurer le château, différentes activités, mariages, séminaires, etc. sont organisées pour trouver les fonds nécessaires à sa restauration. Le château de Boulard a été transformé, en chambres d'hôtes. Vous pourrez louer ses salles pour fêter vos mariages, séminaires, réceptions.","architecture":"BOULARD, bâti en 1780, le château fut agrandi au XIXe siècle, l'édifice construit de plan rectangulaire à deux niveaux sur soubassement par lajout de deux ailes qui encadrent la construction dorigine, et pavillon sur flan et terrasse accolées, ce lieu chargé dhistoire, a été restauré, par ses propriétaires, dans le respect de lhistoire pour vous offrir le meilleur du confort moderne dans un cadre magique.","habitants":"Famille Boulard\r\n        \"","divers":"Boulard   GPS :48° 21' 37\" Nord, 1° 25' 46\" Est","gps":"48° 21' 37\" Nord, 1° 25' 46\" Est","images":["../../jctruffet.com/image/image_28/28_Boulard_1.jpg","../../jctruffet.com/image/image_28/28_Boulard_2.jpg","../../jctruffet.com/image/image_28/28_Boulard_3.jpg"]},"Consult_chateau_formulaire88ca":{"id":"Consult_chateau_formulaire88ca","dept":"28","canton":"Dreux","commune":"Le Boullay-Thierry","nom":"Boullay_Thierry","type":"Château","periode":"XVII","histoire":"BOULLAY-THIERRY, on attribue la construction à Jacques de Favier  intendant d'Alençon, sa fille Angelique l'apporta  en dot à Denis Talon président au parlement érigée en marquisat au profit de d'Omer III Talon, beau-père du célèbre Talon mort au Quebec en 1759 Montcalm.  Le domaine est vendu en 1792, il fut racheté par Antoine Omer Talon, député de la constituante, la demeure vit naître en 1786  Zoé Talon future comtesse du Cayla favorite de Louis XVIII. Aujourd'hui propriété,  d'Usinor pour  leurs colonies de Vacances. Éléments protégés MH : le château en totalité. Les   façades et toitures des deux pavillons symétriques, toitures des deux ailes basses de communs.  les façades et toitures ainsi que le colombier de la ferme du château : inscription par arrêté du 29 mai 2007.","architecture":"BOULLAY-THIERRY, une allée de tilleuls, aménagée et plantée à partir de 1741, mène à la cour d'honneur du château, donnant devant la grille de la cour des communs. Le château présente sa configuration des années 1750. Précédé d'une cour encadrée de dépendances, le château s'élève sur un quadrilatère entouré de douves sèches, accessible par deux ponts dormants. Côté cour, le corps de logis est encadré de deux pavillons carrés couverts de hauts combles. Cet édifice, bâti entre 1617 et 1622, représente un jalon important de l'architecture de briques et pierres en Drouais.","habitants":"Famille d'Antoine Omer Talon\r\n        \"","divers":"Boullay-Thierry   GPS : 48° 38' 10,14\" Nord, 1° 25' 55,95\" Est","gps":"48° 38' 10,14\" Nord, 1° 25' 55,95\" Est","images":["../../jctruffet.com/image/image_28/28_Boullay_Thierry_1.jpg","../../jctruffet.com/image/image_28/28_Boullay_Thierry_2.jpg"]},"Consult_chateau_formulaire7dc2":{"id":"Consult_chateau_formulaire7dc2","dept":"28","canton":"Châteaudun","commune":"Dangeau","nom":"Bouthonvilliers","type":"Château","periode":"XVI","histoire":"BOUTHONVILLIERS, en 1540 Louis I de Courcillon, homme d'armes, calviniste, seigneur de Dangeau, hérite du château par sa femme Jacqueline de Sintray.  Louis I de Coucillon reconstruit l'édifice en 1550.   En 1585, Louis I de Courcillons résiste aux troupes catholiques qui envahissent Dangeau. En 1592, Jacques de Courcillon, fils de Louis, hérite de Bouthonvilliers. Il est homme d'armes et ambassadeur pour Henry IV en Angleterre. Son corps est inhumé dans l'église de Dangeau. En 1658, Philippe de Courcillon, un des fils de Louis hérite du château. Devenu intime de Louis XIV, il est responsable des menus du roi. Il meurt en 1719 de la petite vérole. En 1719, la seigneurie de Dangeau et Bouthonvilliers sont confiées à la famille de Luynes qui gère bien les deux domaines. En 1735, Jean François de Milleville, chevalier de Saint-Louis achète la demeure. Puis en 1796, il revend le château à M. Robillard de Morsan qui meurt sans enfant en 1827. C'est son neveu, Germain Alphonse de Possesse, qui en hérite. En 1832, il épouse mademoiselle de Longpérier. En 1834, il supprime le parc à la Française et fait aménager par monsieur Joly, architecte paysagiste à Chartres, un parc à l'anglaise. A cette époque un parent de la famille, M. de Salabery, un des premiers importateurs du cèdre en Europe, fait ses essais de plantations à Bouthonvilliers.  En 1909, Maurice de Possesse, Auditeur au Conseil d'État, hérite de la demeure. Il épouse successivement mesdemoiselles de Becquincourt et Thérèse de Roussy de Sales en 1882  Maurice de Possesse et Thérèse de Roussy de Sales  eurent sept enfants dont Elisabeth de Possesse qui hérite de Bouthonvilliers dans les années 1935.","architecture":"BOUTHONVILLIERS, en 1768, il construit la partie centrale de l'édifice dans un style Louis XVI. Les murs intérieurs sont en torchis habillés de boiseries et alcôves. Les sols sont en parquet de formes et dessins personnalisés par pièce et mise en place d'un jardin à la française. Louis I de Coucillon reconstruit l'édifice en 1550. Les nouveaux bâtiments comprennent deux pavillons latéraux, un colombier, une orangerie et une ferme. Le tout était défendu par des douves et des sauts de loups. A la fin du XVIIe siècle, un  incendie ravage Bouthonvilliers. Les bâtiments de ferme à toît de chaume sont totalement détruits. Deux pavillons, le colombier et l'orangerie sont sauvés. En 1913, Bertrand de Verdun habitant le château de Chasseguey épouse en seconde noce Elisabeth de Possesse dont il aura deux enfants: Guillemette et Charles de Verdun. Au décès d'Elisabeth de Verdun, en 1960, son fils Charles hérite du domaine. En 1946  Charles de Verdun épouse Jacqueline de Vilmarest. Ils eurent quatre enfants dont un fils Richard. En 1995, à la mort de son père, Richard de Verdun hérite de la propriété.\r\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 11 août 1975.","habitants":"Famille de Jean François de Milleville\r\n        \r\n        \"","divers":"Bouthonvilliers   GPS : 48° 12' 24\" Nord, 1° 17' 00\" Est","gps":"48° 12' 24\" Nord, 1° 17' 00\" Est","images":["../../jctruffet.com/image/image_28/28_Bouthonvilliers_1.jpg","../../jctruffet.com/image/image_28/28_Bouthonvilliers_2.jpg"]},"Consult_chateau_formulaire70a7":{"id":"Consult_chateau_formulaire70a7","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Brézolles","nom":"Brézolles","type":"Château","periode":"XV-XVI","histoire":"CHOLTIERE date du XVIe siècle. Il fut occupé par les familles de Viole et de la Rivière pendant plusieurs siècles. Eustache de Viole acquiert la Choltière d'André de Racines le 24 janvier 1654, En 1743, le mariage de Marguerite de Viole (1723-1752) avec Théodore Augustin de la Rivière (1700-1750) fait entrer le château dans la famille de la Rivière. En 1863, Marie Claire de la Rivière épouse le préfet Jules Tarbe des Sablons, dont la fille Henriette épousa René de Place, en 1891.","architecture":"MARCOUVILLE, situé dans l'ancienne commune de Vitray-sous-Brezolles, il est au XIXe siècle la propriété de Léon Vingtain, agronome et député d'Eure-et-Loir. L'édifice de plan rectangulaire à trois niveaux deux  pavillons carrées aux angles à toits brisés.","habitants":"Chotière; famille deThéodore Augustin de la Rivière                                                              Marcouville famille de Léon Vingtain,\r\n        \r\n        \"","divers":"Choltiere grav-1  Marcouville grav- 2                                          Brézolles   GPS : 48° 40' 04\" Nord, 1° 04' 43\" Est","gps":"48° 40' 04\" Nord, 1° 04' 43\" Est","images":["../../jctruffet.com/image/image_28/28_Br%c3%a9zolles_1.jpg","../../jctruffet.com/image/image_28/28_Br%c3%a9zolles_2.jpg"]},"Consult_chateau_formulairebc67":{"id":"Consult_chateau_formulairebc67","dept":"28","canton":"Les Villages Vovéens","commune":"Germignonville","nom":"Cambray","type":"Château","periode":"XV-XVII","histoire":"CAMBRAY, la construction du château date 1655 à 1663. On  le doit, à Caron (architecte), à Clésinger (sculpteur) et à Lambert Charles Eugène maître d'oeuvre. C'est au XVIIIe siècle, que fut édifié un second pavillon qui encadre le corps central. La partie la plus ancienne, à gauche, date du XVe siècle et appartient à la famille, depuis près de 450 ans. La partie centrale, en pierres, a été édifiée sous Louis XIV et les deux tours octogonales ont été rajoutées au XIXe siècle. C'est le 28/03/1575, que François Lambert, écuyer et conseiller du roi, auditeur en sa chambre des comptes, acheta la terre de Cambray au noble d'Oinville, seigneur du Puiset, des Bordes et Cambray, château de la commune de Germignonville en 1575. Lefèvre précise que Germignonville dépendait autrefois du Dunois. Le 28/03/1575, le noble Lambert, écuyer et conseiller du roi, rachèta le château, ainsi que la ferme des Bordes au seigneur du Puiset, et prit le nom de Lambert de Cambray.  C'est au courant du XIXe siècle, qu'ont été ajouté les deux tours octogonales. Quant aux communs, c'est Charles de Cambray qui les a construits en 1901. Le parc à la française, est dessiné selon un cadran solaire. Depuis le XIXe siècle, la cour d'entrée est encadrée par un corps aveugle d'un bâtiment de ferme et par les écuries. Une chapelle néo-gothique a été aménagée, de 1858 à 1862, par Charles Eugène Lambert. Le corps central a été augmenté par deux tourelles qui fournissent des jonctions entre les différentes parties du château par l'architecte Caron.","architecture":"CAMBRAY, à  gauche, se situe le vieux château qui date du XVe siècle. La partie centrale  et en pierre de taille pour les piliers d'angle  a été édifié sous Louis XIV, c'est-à-dire entre 1650 et 1700. Les deux ailes ont été bâties peu après. A droite, la chapelle dont la construction a débuté en 1805 est consacrée à Saint Charles de Borromée La toiture du corps central a été modifiée. Le parc du château est traversé d'allées qui dessinent un cadran solaire, La première enceinte, entourée d'un petit mur bas et d'une grille réalisée avant 1721, délimite le jardin d'agrément dessiné au XIXe siècle. Le jardin comprend une fonte du \"Taureau romain\" de Clésinger. La demeure présente les éléments représentatifs de l'évolution d'un domaine de la Beauce du sud. Le 28/03/1575, le noble Lambert, écuyer et conseiller du roi, racheta le château, ainsi que la ferme des Bordes au seigneur du Puiset, et prit le nom de Lambert de Cambray. Le château de Cambray est inscrit aux M.H. depuis le 27/10/2004.","habitants":"Famille de Cambray\r\n        \"","divers":"Cambray  GPS : 48° 11' 36\" Nord, 1° 44' 13\" Est","gps":"48° 11' 36\" Nord, 1° 44' 13\" Est","images":["../../jctruffet.com/image/image_28/28_Cambray_1.jpg","../../jctruffet.com/image/image_28/28_Cambray_2.jpg"]},"Consult_chateau_formulaire293c":{"id":"Consult_chateau_formulaire293c","dept":"28","canton":"Châteaudun","commune":"Thiville","nom":"Champ_Romain","type":"Château","periode":"XVII-XVIII","histoire":"CHAMP-ROMAIN, après la disparition du dernier comte de Thiville, sans descendance, Champ Romain devint la propriété de Claude de Sénéchal, membre du Parlement (1751), qui fit rebâtir le château et ses dépendances par Guillois. De cette époque date la création du jardin et l'organisation générale du domaine, point de départ des promenades formées par une double allée.","architecture":"CHAMP-ROMAIN,  est constitué d'un bâtiment central et de deux ailes. A l'intérieur, le grand salon à l'est, de style Louis XV, conserve des boiseries sculptées et décorées de feuillages et trophées aux couleurs rechampies sur camailleux de gris. Les chambres aux 1er et second étages sont souvent boisées et comportent des alcôves Louis XV. A l'extrémité de l'aile Est se trouve la chapelle entièrement ornée de stucs, en rocaille.\r\nÉléments protégés MH : les deux salons, la salle à manger, la chapelle avec leur décor au rez-de-chaussée. Les façades et les toitures du château et du commun situé à l'Ouest du château, la Grille d'entrée donnant accès à la cour d'honneur et ses murets,  l'ensemble des jardins comprenant l'allée magistrale, le grand parterre, les quinconces et les clôtures, le tapis vert, les bosquets avec les allées, les ronds-points, les salles de verdure et le fossé qui les délimite, le potager bordé de ses allées de tilleuls, son mur de clôture, les promenades avec les allées, les canaux et les terrains les séparant : classement par arrêté du 17 décembre 1993.","habitants":"Famille de Claude de Sénéchal,\r\n        \"","divers":"Champ-Romain  GPS : 48° 00' 30\" Nord, 1° 22' 01\" Est","gps":"48° 00' 30\" Nord, 1° 22' 01\" Est","images":["../../jctruffet.com/image/image_28/28_Champ_Romain_1.jpg"]},"Consult_chateau_formulairec5ec":{"id":"Consult_chateau_formulairec5ec","dept":"28","canton":"Châteaudun","commune":"Logron","nom":"Chantemesle","type":"Château","periode":"XV-XVI","histoire":"CHANTEMESLE, la seigneurie de Chantemesle faisait partie de la paroisse de Saint-Lubin-d'Isigny.  Les plus anciens seigneurs de Chantemesle connus sont :  Guillaume de Chantemesle qui signe une charte en 1118, pour l'abbaye de Thiron.  Louis Chabot, épouse Marie Craon fille de Guillaume II vicomte de Châteaudun\r\net de Jeanne de Montbason. Il meurt en 1422.  En 1416, Jeanne de Chantemesle, veuve de Jean Dechartres, héritière de Jean de Chantemesle son neveu, vend le manoir à Philippe Des Hayes, écuyer. Philippe des Hayes,  Jean Des Hayes, fils de Philippe Florent d'Illiers dont la famille gardera le château pendant 250 ans.","architecture":"CHANTEMESLE avant 1828, le château comprenait un corps principal, deux ailes en retour et quatre tours. Un fossé entourait l'édifice dont l'accès s'effectuait par un pont-levis. L'aspect extérieur de l'ensemble de ces bâtiments n'a subi aucune modification depuis 1750, la façade ouest, dans le style Renaissance, est ornée de pilastres à bossages aux chapiteaux décorés. La façade Est a été refaite au XVIIIe siècle. A l'intérieur, les cheminées peintes semblent dater du XVIIIe siècle. Les communs datent également de cette époque, et se composent d'un rez-de-chaussée encadré de deux pavillons d'angle. A proximité des communs se dresse un pigeonnier. Derrière s'étend un potager clos dont l'extrémité ouest est occupée par une orangerie. La construction du château date du XVe au XVIIIe siècle. Les éléments protégés  sont les façades et les toitures, l'aile Sud, les communs, le pigeonnier et l'orangerie, les piliers de l'entrée de la cour des communs et ses douves. Le Musée du Patrimoine de France est installé dans les murs du château, inscription par arrêté du 5 décembre 1984. .","habitants":"Famille de Philippe Florent d'Illiers \r\n        \"","divers":"Chantemesle         GPS : 48° 08' 04\" Nord, 1° 15' 41\" Est","gps":"48° 08' 04\" Nord, 1° 15' 41\" Est","images":["../../jctruffet.com/image/image_28/28_Chantemesle_1.jpg","../../jctruffet.com/image/image_28/28_Chantemesle_2.jpg"]},"Consult_chateau_formulaire0485-2":{"id":"Consult_chateau_formulaire0485-2","dept":"28","canton":"Brou","commune":"Charbonnières","nom":"Charbonnières","type":"Château","periode":"XIX","histoire":"CHARBONNIERES,  un acte datant de 1472 mentionne, noble homme Jehan Guarin, écuyer, seigneur de Charbonnières.  puis de Jehan d'Oynville en 1557, d'Antoine et César de Baux au XVIIe siècle  appartient à la famille de Beaux-Onles et en 1623  à Louis de Hallot, capitaine des ordonnances du roi, le domaine est cédé à Charles de Guichard en 1632 gouverneur de la ville de Bonneval en 1670  le domaine est adjugée par voie de justice à Jean Ollivier huissier qui le passe à sa fille Françoise qui elle l'apporte par mariage à Eustache-Auguste Leclerc de Lesseville,  le gendre  de Jean Ollivier obtient l'érection du domaine en comté.  En mars 1707, Louis XIV érige  en comté, en 1784, le dernier des  Lesseville  se défait du domaine au profit de Louis-François Rousseau de la Boussote de Chamoy deviennent seigneurs, puis vendu en 1948 aux surs Fransiscaines du Temple de Dorat qui loccupèrent de 1950 à 1956. Passé aux Franqueville puis  aux Lauristort. Puis le château est acheté par les familles Schultz et Abt en 1960 qui en firent un centre de séjour et de formation. En 1989, achat du château par monsieur Derachinois qui y installe un centre se séjour.","architecture":"CHARBONNIERES,  a été construit de style troubadour, au XIXe siècle, sur les bases d'un ancien édifice médiéval, sous le second Empire, le château constamment remanié au cours des siècles, ne permet plus de concevoir ce que fut au XIIIe siècle la forteresse qui devait être un point stratégique dans un ensemble destiné à la défense de la route de Brou à Authon du perche. De ce manoir féodal, il ne subsiste plus quune grosse tour cylindrique dont les murs font deux mètres dépaisseur,  il développe une surface de 2 000 m2 au sein d'un parc de 30 ha, en 1840 les fossés entourant le château sont comblés et l'édifice en partie détruit à l'exception du châtelet d'entrée  élevée sur trois niveaux, la construction consiste dans deux pavillons carrés relevés par un corps de bâtiment qui s'organise autour d'une travée soulignée par un haut fronton percé d'une baie. Les pavillons des extrémités sont cantonnés de tourelles en encorbellement une en hors oeuvre sur la façade. Sur le pavillon Est, l'échauguette de l'angle extèrieur est remplacée par une grosse tour cylindrique couverte d'un toit en poivrière. La partie centrale, limitée par des contreforts que prolongent des pinacles, est coiffée d'un toit en pyramide en avant duquel ressort de haut pignon percé d'une fenêtre à baie géminées. La porte d'entrée s'encadre dans un arc plein cintre orné de véritable dentelle de pierre, tandis que les  culs de Lampes supportant les échauguettes sont décorés d'une frise.","habitants":"Famille de Jehan d'Oynville \"","divers":"Charbonnières         GPS : 48° 11' 34\" Nord, 0° 56' 13\" Est","gps":"48° 11' 34\" Nord, 0° 56' 13\" Est","images":["../../jctruffet.com/image/image_28/28_Charbonni%c3%a8res_1.jpg","../../jctruffet.com/image/image_28/28_Charbonni%c3%a8res_2.jpg","../../jctruffet.com/image/image_28/28_Charbonni%c3%a8res_3.jpg","../../jctruffet.com/image/image_28/28_Charbonni%c3%a8res_4.jpg"]},"Consult_chateau_formulaire6dd7":{"id":"Consult_chateau_formulaire6dd7","dept":"28","canton":"Chartres","commune":"Chartres","nom":"Chartres","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article Hôtel des postes , Près du roy et Leves.                                                                                                                           HOTEL DES POSTE,   L'architecte de l'édifice est Raoul Brandon, né en 1878 dans la commune de Lucé située en limite ouest de Chartres, devenu la médiathèque l'Apostrophe,Les mosaïques sont luvre d'Édouard Blin.Les anciennes fresques murales ornant la salle recevant le public ont été réalisées en 1929 par Pierre Vaillant (1878-1939), fils de Charles Émile Vaillant,   Cet édifice éclectique sinspire des constructions médiévales remises à lhonneur par Viollet-le-Duc et mêle des éléments néo-gothiques et Art Déco. La référence à la cathédrale est indéniable : de nombreux détails rappellent le style gothique tel quon peut le voir au clocher nord de la Cathédrale.  Depuis le perron et sous la mosaïque symbolisant la paix, le Général de Gaulle sest adressé à la population en août 1944 à la libération de Chartres; ses grilles dans lesquelles sont insérées le sigle PTT (Postes Télégraphes et Téléphones) sont classées ainsi que ses façades et toitures. L'édifice est labellisé patrimoine du XXe siècle.                                                                                         PRES DU ROY, au bord de l´Eure, un charmant manoir du XVIe récemment restauré, société anonyme à conseil d'administration par la famille Morel.","architecture":"HOTEL DES POSTES, sa construction dura cinq ans, de 1923 à 1928.\r\narchitecte du département d'Eure-et-Loir ayant eu Raoul Brandon comme élève, le bâtiment est haut de près de 55m sur 33m de longueur. Le bâtiment en béton armé, à la charpente métallique est composé dun beffroi à horloge avec encorbellements et dune imposante rotonde dominant la place des Épars. Les façades et les toitures sont inscrites au titre des monuments historiques en 1994. En 2007, après une rénovation complète de l'intérieur du bâtiment par Paul Chemetov, l'édifice reçoit sa nouvelle fonction de médiathèque de la ville de Chartres.                                                                                                                  LEVES  Hameau au nord de Chartres (banlieu) Madeleine Castaing (1894-1992), décoratrice, mécènes de nombreux artistes dont Chaïm Soutine, mère de Michel Castaing,  le manoir néoclassique de Lèves fut la propriété de l'antiquaire et décoratrice Madeleine Castaing (1894-1992). La voie menant au manoir est désormais dénommée allée Madeleine-Castaing. L'inauguration a eu lieu en présence de Frédéric Castaing, petit-fils de Madeleine Castaing et fils de Michel Castaing, Rémi Martial, maire de Lèves, Jean-Pierre Gorges, maire de Chartres, Chantal Deseyne, sénateur d'Eure-et-Loir et de Jean-Paul Vicat, sous-préfet de l'arrondissement et secrétaire général de la préfecture d'Eure-et-Loir.","habitants":"Leves; Famille de Madeleine Castaing \r\n        \"","divers":"Trois châteaux dans cet article de Chartres  Hôtel des postes , Près du roy et Leves.    Hotel des postes grav-1.   Leves grav-2-3               Près du roy grav 4-5                    GPS : 48° 26' 42,96\" Nord, 1° 29' 0,03\" Est","gps":"48° 26' 42,96\" Nord, 1° 29' 0,03\" Est","images":["../../jctruffet.com/image/image_28/28_Chartres_1.jpg","../../jctruffet.com/image/image_28/28_Chartres_2.jpg","../../jctruffet.com/image/image_28/28_Chartres_3.jpg","../../jctruffet.com/image/image_28/28_Chartres_4.jpg","../../jctruffet.com/image/image_28/28_Chartres_5.jpg"]},"Consult_chateau_formulaire1842":{"id":"Consult_chateau_formulaire1842","dept":"28","canton":"Authon-du-Perche.","commune":"Soizé","nom":"Chataigniers","type":"Château","periode":"XVI","histoire":"CHATAIGNIERS, au coeur dun vaste et beau domaine, le château domine l'étang aux moines dans une région appelée les Terres Douces. La demeure est orientée de telle façon que ses angles se situent aux quatre points cardinaux. Guillaume Gouet beau frère de Rotrou, céda les Châtaigniers à labbaye de Tiron en 1117.","architecture":"CHATAIGNIERS, le prieuré, dédié à Notre-Dame et Saint-Gilles, demeura en activité jusquà la Révolution, époque à laquelle elle fut vendue. Il subsiste peu de bâtiments des nombreuses dépendances du prieuré, la chapelle considérée comme la plus ancienne du Perche, conserve un choeur élégant. A proximité un petit Oratoire se dresse toujours en plein champ, à la ferme Saint-Jean.  La construction du château des Chataigniers date du XVIIIe siècle, c'est un ancien prieuré avec ses dépendances.","habitants":"Famille de Guillaume Gouet\r\n        \"","divers":"Chataigniers  GPS : 48° 10' 06\" Nord, 0° 53' 16\" Est","gps":"48° 10' 06\" Nord, 0° 53' 16\" Est","images":["../../jctruffet.com/image/image_28/28_Chataigniers_1.jpg"]},"Consult_chateau_formulaire9826":{"id":"Consult_chateau_formulaire9826","dept":"28","canton":"Chateaudun","commune":"Chateaudun","nom":"Chateaudun","type":"Fonteresse","periode":"XV-XVI","histoire":"CHATEAUDUN, Jean d'Orléans reçoit de son frère  Châteaudun et le comté de Dunois, construction en 1460 , Jehan le Dunois, célèbre compagnon de Jeanne d'Arc, Jean Dunois est appelé aussi le Batard d'Orléans.  Dunois et son épouse Marie d'Harcourt  transforme Châteaudun en une demeure seigneurial, en 1468 leur fils François de Longueville ébauche l'aile nord, à l'extinction des Longeville le comté de Dunois revient à Louise de Bourbon-Soissons qui épouse en 1710 le duc de Luynes et de Chevreuse  En 1723 après l'incendie qui ravage une partie de la ville le château est converti en habitations pour les sinistrés, confisqué pendant le Révolution puis rendu aux Luynes et  en 1930 l'édifice racheté par la ville et les M.H. l'ont magnifiquement restauré.                                                      THOREAU, à un K.M. au sud-ouest à St-Denis les Ponts, le château de Thoreau dépendait de la seigneurie de la Roche Bernard. Celui-ci est mentionné: Toreillum en 1191, Toriant en 1241, Toriau en 1247, Toreau vers 1450, Taureau en 1526, et Thoreau actuellement. Il ne reste plus grand chose des plus anciens bâtiments datant du XIIIe siècle. Dans la cour on peut voir une grange, un pigeonnier, une porte armoriée, une tour (tour Gabrielle dEstrées peut être tour de guet, dominant la vallée et le Loir). Le site est agréable, cette cour pouvait être fermée par des portes, des supports sont encore visibles dans la pierre. Henri IV venait à Thoreau voir sa favorite. Elle eut avec lui plusieurs enfants légitimes dont César duc de Vendôme.","architecture":"CHATEAUDUN, une tour médiévale vertigineuse qui  surplombe le Loir de 60m.  construit en 1460 son logis seigneurial arborant un décor gothique flamboyant et une chapelle où vivent douze statues polychromes grandeur nature. Du côté du Loir la façade se caractérise par des échauguettes d'angles et des ressauts sur une hauteur d'une soixantaine de mètres qui confèrent au monument une allure de nid d'aigle. Enfin, l'aile Longueville qui s'inspire directement de la Renaissance italienne vaut au château de Châteaudun la dénomination de premier \"château du Val de Loire\". Les intérieurs bien conservés abritent une riche collection de tapisseries et accueillent un parcours découverte \"la cuisine, un art de vivre du moyen-âge\".\r\nÉléments protégés MH : le château : classement par arrêté du 6 juillet 1918. Les parcelles sises au pied du château Perché stratégiquement sur son éperon rocheux, le massif donjon féodal surveille du haut de ses 31 m la vallée du Loir,  un logis seigneurial en pur style gothique flamboyant. Sa construction date du 1171 au XVIe siècle pour Jehan de Dunois. Il aligne une rare succession d'éléments de son architecture médiévale, gothique, et de la Renaissance. Une importante collection de tapisserie décore les lieux. Les jardins sont de style médiéval et suspendu. Le château de Châteaudun est ouvert au Public. Son propriétaire actuel est le Centre des Monuments Nationaux. inscription par arrêté du 14 octobre 1946-7.","habitants":"Famille de Jehan le Dunois,\r\n        \r\n        \"","divers":"Chateaudun GPS : 48° 04' 14,52\" Nord, 1° 19' 24,96\" Est Thoreau grav-6","gps":"48° 04' 14,52\" Nord, 1° 19' 24,96\" Est Thoreau grav-6","images":["../../jctruffet.com/image/image_28/28_Chateaudun_1.jpg","../../jctruffet.com/image/image_28/28_Chateaudun_2.jpg","../../jctruffet.com/image/image_28/28_Chateaudun_3.jpg","../../jctruffet.com/image/image_28/28_Chateaudun_4.jpg","../../jctruffet.com/image/image_28/28_Chateaudun_5.jpg","../../jctruffet.com/image/image_28/28_Chateaudun_6.jpg"]},"Consult_chateau_formulaire3e32":{"id":"Consult_chateau_formulaire3e32","dept":"28","canton":"Dreux","commune":"Dreux","nom":"Comteville","type":"Château","periode":"XIX","histoire":"COMTEVILLE, au XVIIIe siècle construction du château par Claude Cahouet de Beauvais, en 1747 la terre  est érigée en baronnie, en 1761, achat de Comteville par la marquise de Puiguyon Thérése -Catherine Gaillard de la Bouexière, veuve de Charles-François de Granges de Surgères marquis de Puiguyon de son vivant maréchal des camps des armées du roi, le fils de la marquise en 1771 Charles Henri colonel au régiment d'infanterie, prend possession du château, nouveau maître des lieux de 1772 et 1778 fait des travaux de rénovations, comble les fossés construit des murs installe une grille à l'entrée. Le comte ayant émigré à la Révolution, les biens sont confisqués et placés sous séquestre. Un bataillon de chasseurs  de l'armée du nord, en route vers la Vendée fait étape au château  et le pillèrent puis les maraudeurs terminent le pillage même les matériaux  de construction qu'ils ont put arracher. En 1826 le domaine après un long abandon est acquis par un notaire de Dreux Me François Brideau fait construire sur l'emplacement de l'ancien château un vaste édifice flanqué de tours, au décès du couple Comteville passe à leur fille unique  Mme de Montferrand qui s'en défait en 1869 et en 1978 acquis par la ville de Dreux qui y installe un centre de loisirs.","architecture":"COMTEVILLE, en 1782 se composait d'un corps de logis, flanqué de deux pavillons en saillie et d'une aile abritant les cuisines et les logements des domestiques, la demeure était précédée par une vaste cour d'honneur limitée par des sauts de loup et fermée par une grille, reconstruit au XIXe siècle, offre un corps central  développés sur sept travées en façade et flanqué à ses angles de tours rondes coiffées en poivrière, au centre un édicule percé de deux baies et couronné par un campanile se détache sur le comble d'ardoise et introduit de manière heureuse un élément de verticalité dans cette élévation dont l'extrême développement nuit à l'harmonie. La façade postérieure s'encadre entre un pavillon carré couvert en terrasse et une autre tour ronde.","habitants":"Famille de Me François Brideau\r\n        \"","divers":"Comteville","gps":"","images":["../../jctruffet.com/image/image_28/28_Comteville_1.jpg","../../jctruffet.com/image/image_28/28_Comteville_2.jpg"]},"Consult_chateau_formulaire140e":{"id":"Consult_chateau_formulaire140e","dept":"28","canton":"Châteaudun","commune":"Marboue","nom":"Coudeaux","type":"Château","periode":"XVIII","histoire":"COUDREAUX, fut construit au XVIIIe siècle, sur l'emplacement d'un ancien manoir. Le Maréchal Ney y habita, il a acheté cette vaste gentilhommière du XVIII e siècle le 29 juin 1808 au comte de Flers. Il y a séjourné pendant près de sept ans, dès que ses campagnes lui en laissaient le loisir, en fit une résidence, fut acquise sous la restauration le maréchal Reille, puis passa au comte de Fels.  Valérie et Pieter vous ouvrent les portes du château des Coudreaux, magnifique gentilhommière où ils résident. En 1825, le château des Coudreaux est devenu la propriété dun autre grand soldat de lEmpire, Honoré-Charles Reille, promu maréchal de France en 1847. Deux de ses descendants, les comtes André Reille et Charles Reille, ont été maires de Marboué. Élu en 1935 à lâge de 29 ans, Charles Reille était alors le plus jeune maire dEure-et-Loir. Il est resté à la tête de la commune jusquen 1977 et y a laissé une profonde empreinte. Autre descendant du maréchal, le comte Jean-Louis Reille avait installé un magasin dantiquités, un restaurant et un salon de thé dans le château. Ils sont, aujourdhui, fermés et les Coudreaux nappartiennent plus à la famille Reille.  Clément Marot fut quelquefois l'hôte de René Lemaire qui posséda le château vers 1540. Le maréchal Ney y logea de 1808 à 1815.  Deux chambres d'hôtes.","architecture":"COUDREAUX, l'édifice du XVIIIe siècle fut construit sur l'emplacement d'un ancien manoir. Il présente un corps de logis d'un étage plus combles à la Mansard sur rez-de-chaussée. Il est flanqué de deux pavillons formant saillie en avant et en arrière. Quatre tourelles rondes, vestiges d'un ancien manoir, sont situées aux quatre angles. A côté du château se trouvent de vastes communs de la même époque, un corps de ferme et un potager. L'ordonnance du parc a été réalisée d'après les dessins de Bertaus.                                     le château des Coudreaux possède 4 tourelles rondes, un parc, ses façades, ses toitures et ses communs sont inscrits aux M.H. L'inscription du château des Coudreaux aux M.H. date de 1984.","habitants":"Le Maréchal Ney  et la famille Reille\r\n        \"","divers":"Coudreaux GPS : 48° 06' 50\" Nord, 1° 19' 50\" Est","gps":"48° 06' 50\" Nord, 1° 19' 50\" Est","images":["../../jctruffet.com/image/image_28/28_Coudreaux_1.jpg","../../jctruffet.com/image/image_28/28_Coudreaux_2.jpg","../../jctruffet.com/image/image_28/28_Coudreaux_3.jpg","../../jctruffet.com/image/image_28/28_Coudreaux_4.jpg"]},"Consult_chateau_formulaire9144":{"id":"Consult_chateau_formulaire9144","dept":"28","canton":"Brou","commune":"Coudray au perche","nom":"Coudray_Perche","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux dans cet article; Montgraham, Basses-Loges et Courcelles.                                                                                                              MONTGRAHAM,  un château existait déjà au XVe siècle, il était flanqué de deux tours, a été reconstruit en 1804, il est posé sur une butte boisée élevée de 200 mètres. Il est situé à la limite des communes de Coudray au Perche, Souancé et Vichères. Chateaubriand y fit un séjour vers 1823.   Il fut le refuge de résistants pendant la seconde guerre mondiale, L'Abbé Mugnier et la princesse Bibesco ont magnifié l'acceuil qui leur y était reservé. Appartient à la comtesse de Leusse.                                                          BASSES-LOGES, manoir, en descendant la vallée sur la route de Nogent, sur la rive gauche de la Ronne, s'élève le manoir des Basses-Loges qui se cache dans un vallon. Précédé d'un petit colombier carrée, le haut corps de logis construit au XVIIe siècle, daté par une inscription 1616, avec au faîte du toit, des lys en fer forgé, il se continue en angle droit par une autre tour cylindrique appuyée sur une petite ferme qui était une gentilhommière jadis.","architecture":"COURCELLES,  en 1145, il n'était qu'une ferme. Aujourd'hui seule une tour ronde témoigne de cette époque.\r\nUne restauration réussie lui a conservé tout son charme. Il est lié à la légende de la Bourbonnaise : La dame de Radrais en Margon fut conduite au bûcher pour trahison envers le seigneur de Courcelles. Cet autodafé est rappelé tous les ans lors de la fête de la Bourbonnaise qui a lieu le troisième dimanche de juin à Margon.\r\nSituée au cur du Parc Naturel Régional du Perche, la Métairie du manoir de Courcelles  du XVIe siècle a vue sur les collines et les forêts du Perche, un château et une ferme ancienne. Le golfe du Perche (en face), les centres déquitation, les marchés typiques, les promenades en sous bois et les visites de manoirs historiques vous offriront un séjour de rêve.  Le Manoir de Courcelles est un des plus beaux petits manoirs de cette région du Perche, sans doute la ferme dun château situé plus haut, et disparu depuis longtemps. Il est lié à la légende de la Bourbonnaise.","habitants":"Montgraham, la comtesse de Leusse            \r\n        \"","divers":"Trois châteaux dans cet article de Coudray_Perche. Montgraham, Basses-Loges et Courcelles.                        Montgraham Grav-1                                                                         Basses Loges   Courcelles   grav_2-3","gps":"","images":["../../jctruffet.com/image/image_28/28_Coudray_Perche_1.jpg","../../jctruffet.com/image/image_28/28_Coudray_Perche_2.jpg","../../jctruffet.com/image/image_28/28_Coudray_Perche_3.jpg"]},"Consult_chateau_formulaireeb89":{"id":"Consult_chateau_formulaireeb89","dept":"28","canton":"Courtalain","commune":"Courtalain","nom":"Courtalain","type":"Château","periode":"XV","histoire":"COURTALAIN, la seigneurie de Chaussepot dépendait à la fin du XIIe siècle de celle de Courtalain tenue par Agnès, dame de Courtalain, veuve de Hugues II Borel. Détruit par les anglais pendant la guerre de Cent Ans,  Le château a été élevé en 1483 par Guillaume d'Avaugour époux de Perette de Baif, tante d'Antoine de Baif, amie de Ronsard. Grace au mariage de Jacqueline d'Avaugour et Pierre de Montmorency, château de Courtalain et le village entre dans la maison de Pierre de Montmorency, qui reconstruit à la fin du XVe siècle le château passe au XVIe siècle à la famille de Blères en 1553 et y restera, durant 900 ans. En 1862, le dernier Duc Anne-Raoul de Montmorency meurt. C'est sa nièce Félicie, Princesse de Bauffremont et du Saint-Empire qui en héritera. Elle deviendra Marquise de Gontaut Biron Saint Blancard, en épousant le jeune Louis de Gontaut Biron. En 1575, Courtalain dans un hommage rendu en 1595 par la dame de Courtalain, c'est ainsi que neuf générations de cette illustre famille se sont succédé  dont le duc Anne Léon, mort en exil en 1799, enterré à Courtalain et Anne Charles, son petit-fils, qui racheta avec ses brides de fortune Courtalain. Le domaine se transmet au XVIIIe siècle, par héritage, aux Boisguyon qui le conservent jusqu'en 1833, date de sa vente au châtelain de Courtalain, le duc de Montmorency, qui loue le château à diverses personnalités. En 1862, le dernier Duc Anne-Raoul de Montmorency meurt. C'est sa nièce Félicie, Princesse de Bauffremont et du Saint-Empire qui en héritera. En 1862 le château est légué à la marquise de Gontaut Biron. En 1920, l'édifice est acquis par M. Miklos de Kiss de Nemesker aristocrate d'origine hongroise, ancien écuyer du Cadre noir de Saumur.","architecture":"COURTALAIN, c'est ainsi que neuf générations de cette illustre famille se sont succédé à Courtalain, saisi comme bien national. l'édifice se présentait dans sa forme primitive comme un ensemble de bâtiments formant un U, avec quatre tours d'angle. Il était entouré d'une enceinte et son entrée se faisait par un pont-levis situé à l'arrière du château actuel. C'est un château kaléidoscope avec mélange darchitecture, moyenâgeuse, Renaissance et néo-gothique anglais, le tout entouré dun parc à langlaise de 200 hectares avec de magnifiques dépendances de 1730 (une orangerie, un relais de poste...) dessinées par Gabriel de Lestrade, collaborateur, architecte de la place de la concorde. Ces bâtiments servaient de centre administratif du domaine au XVIIIe siècle. L'ensemble est complété par une glacière, un corps de ferme du XVIIIe siècle avec des colonnades entouré de 30 ha, celle-ci servait à jouer au fermier et à la fermière tout comme le Roi à Versailles avec le petit Trianon. Enfin trois météorites tombées dans le parc au cours du XIXe attirent la curiosité.  Éléments protégés MH : les façades et les toitures du château; le bâtiment des communs à pans de bois; le terre-plein, les douves, les murs de soutènement et tour Sud-Est : inscription par arrêté du 28 octobre 1991.","habitants":"Famille de Blères \r\n        \"","divers":"Courtalain GPS : 48° 4' 49,42\" Nord, 1° 7' 59,78\" Est","gps":"48° 4' 49,42\" Nord, 1° 7' 59,78\" Est","images":["../../jctruffet.com/image/image_28/28_Courtalain_1.jpg","../../jctruffet.com/image/image_28/28_Courtalain_2.jpg","../../jctruffet.com/image/image_28/28_Courtalain_3.jpg","../../jctruffet.com/image/image_28/28_Courtalain_4.jpg"]},"Consult_chateau_formulaire1029":{"id":"Consult_chateau_formulaire1029","dept":"28","canton":"Dreux","commune":"Crécy-Couve","nom":"Crécy","type":"Palais","periode":"XVI-XVII","histoir
