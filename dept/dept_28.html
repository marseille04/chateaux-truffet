e":"CRECY, Madame de Pompadour acquiert par ailleurs de nombreux terrains et bâtiments dans les environs de Crécy, il fut embelli par Mme de Pompadour et Louis XV et, fut l'un de leurs châteaux préférés. En 1730, le marquis de Crécy Louis-Alexandre Verjus (1676-1763), fils du comte de Crécy, abat lantique château féodal familial, acquiert de nombreux terrains, et projette les plans dun nouveau château, de style italien, sans toit apparent. Les architectes décident de construire une vaste terrasse, maintenue par un mur de près de cinq cents mètres de long, destinée à recevoir le futur château et ses jardins dominant la vallée. En même temps, le marquis Louis-Alexandre Verjus entreprit la canalisation de la vallée de la Blaise sur 3 kilomètres. Ces travaux onéreux le ruineront et il devra revendre son domaine en 1746 à Madame de Pompadour. Pleine de projets, elle agrandit  le château et le décore, redessine les jardins, et finit daménager la vallée de la Blaise. Elle fait creuser en face du château un long bassin nommé \"Le Miroir\". Elle pourra ainsi accueillir dignement, dans sa première demeure, le roi Louis XV, qui y viendra  de 1746 à 1755,  et les finances allouées étant  réduites, Madame de Pompadour est contrainte de vendre son \" cher Crécy \" en 1757 ; cest le Duc de Penthièvre qui en devient le nouveau propriétaire. Le Marquis de Crécy fut, tour à tour, Colonel au régiment de Boulonnois (1703), Brigadier d'armée (1710), gouverneur de Toul, et maréchal-de-camp en 1719. Le duc de Penthièvre (1757-1775) le revendra à son tour en 1775 au prince de Montmorençy. Survient la Révolution. La veuve de Montmorency émigre en 1791, et son château est saisi, puis revendu comme bien national, à un américain, Daniel Parker.","architecture":"CRECY,  c'est au début du XIIIe siècle que fut bâti à Couvé un premier château, composé en partie dun corps de logis dominant la vallée, flanqué dun épais donjon. C'était un château de style Classique, dont son propriétaire avait fait sa maison de plaisance. , créant ainsi le \"Domaine de Crécy\", élevé au rang de marquisat.  Le roi ne venant plus à Crécy à partir de 1755, et les finances allouées étant considérablement réduites  Daniel Parker  le fit démolir, et revendit les éléments de valeur les plus intéressants. Le reste servira de carrière de pierres.  Il constitue, avec le château de Bellevue, l'archétype du château français du milieu du XVIIIe siècle,  sa grille provient de l'ancien château de Bailleul classée aux M.H. de 1992.","habitants":"Marquis de Crécy Louis-Alexandre Verjus \r\n        \"","divers":"Crécy   GPS : 48° 40' 11\" Nord, 1° 16' 56\" Est","gps":"48° 40' 11\" Nord, 1° 16' 56\" Est","images":["../../jctruffet.com/image/image_28/28_Cr%c3%a9cy_1.jpg"]},"Consult_chateau_formulairef7d7":{"id":"Consult_chateau_formulairef7d7","dept":"28","canton":"Auneau","commune":"Denonville","nom":"Denonville","type":"Château","periode":"XVIII","histoire":"DENONVILLE,  en 1194  premier seigneur les Denonville,au début du XIVe siècle passa aux Hémard, l'un des fils de Pierre Hémard, jacques héritera meurt  en 1552 sans postérité de son mariage  avec Claude de Maulny, Denonville revient à sa soeur Marie qui épouse  en 1521 François de Brisay écuyer, pillé lors des guerres de religion par une bande d'huguenots le fils de François et de Marie de Hémard, Pierre de Brisay seigneur de Denonville et de Montbazillac en Périgord et conseiller d'état s'éteind à l'âge de 89 ans. Son fils Jacques marquis, gouverneur général de la nouvelle France épouse en 1668 Catherine Courtin de Tagneux.  Au XVIIIe siècle il appartenait aux Montcalm. Au XXe siècle, le château de Denonville est vendu à un américain Berniem, antiquaire qui le fait démonter pour vendre ses matériaux aux USA. En 1910, en ruine, il chateau est revendu à la Famille d'Emile Sureau. Jean Boutroue, Maire et héritier a racheté les parts, un autre héritier, avec son épouse Madelaine Dessus de Cérou et font restaurer une partie du château de Denonville. Le château de Denonville sera revendu en 1975, par la Famille Boutroue à la famille Romet. Le château de Denonvile sera restauré, durant plusieurs années, puis servira pour des réceptions et mariages. Il est inscrit aux M.H. depuis 1976 et 2007.","architecture":"DENONVILLE, il est du XVIIIe siècle, seigneurie connue dès le Moyen-Age. Le château est en briques, de style néoclassique dépouillé. Le corps central a été bâti en 1770 par l'architecte Liégeon, qui a conservé aux angles les quatre tours circulaires du château antérieur, seul l'aile droite subsiste. L'édifice est précédé d'une cour d'honneur dotée de fossés secs en demi-cercle, le tout fermé par une grille. De part et d'autre de cette cour se trouvent les ailes faisant office d'écuries et de cuisines, de dépendances et de basse-cour, salles de réceptions et chambres d'hôtes\r\nÉléments protégés MH : les façades et les toitures, l'escalier avec sa rampe en fer forgé de l'aile nord du XVIIIe siècle : inscription par arrêté du 31 décembre 1976. L'aile sud du château en totalité, les façades et les toitures du corps central du château, les façades et les toitures des écuries. Dans la cour de l'aile sud: le puits, le sol de la cour d'honneur, les fossés et leurs murs précédant la cour d'honneur.","habitants":"Famille de Brisay\r\n        \"","divers":"Denonville\r\nGPS : 48° 23' 30\" Nord, 1° 48' 34\" Est","gps":"48° 23' 30\" Nord, 1° 48' 34\" Est","images":["../../jctruffet.com/image/image_28/28_Denonville_1.jpg","../../jctruffet.com/image/image_28/28_Denonville_2.jpg"]},"Consult_chateau_formulaire6258":{"id":"Consult_chateau_formulaire6258","dept":"28","canton":"Dreux","commune":"Dreux","nom":"Dreux","type":"Forteresse","periode":"XII-XIV-XVII","histoire":"DREUX, propriété du domaine royal aux portes de la Normandie, le château et la ville devinrent l'un des appuis occidentaux du domaine capétiens. Pour cette raison Louis VI le Gros donna le château, la ville et le comté de Dreux en 1152, en apanage à l'un de ses fils Robert de France, tige de la Maison capétienne de Dreux, éteinte en 1590. Le château a suivi la destinée du comté de Dreux et de ses propriétaires, les comtes de Dreux, faisant retour à la couronne de France par achat de Charles V en 1377.   Château royal, il fut engagé à des seigneurs particuliers puis vendu au XVIIIe siècle à la maison de Bourbon-Penthièvre.  A la Révolution, les biens des Bourbon-Penthièvre ayant été confisqués, ils furent vendus par lots, notamment la collégiale Saint-Étienne puis en partie démolie. La chapelle de style néoclassique, édifiée à partir de 1816 au milieu des ruines du château, fut agrandie par son fils, Louis-Philippe, qui en fit la nécropole des membres de sa famille. Au début du XIXe siècle, le château est réaménagé au confort des années 1830. Louis-Philippe ayant un nombre important de résidence, la demeure est peu habitée. Ainsi, pour préserver l'avenir de ce bien dans l'héritage royal, le comte de Paris décida de l'inclure dans une fondation familiale, la fondation Saint-Louis, en 1974.","architecture":"DREUX, des vestiges retrouvées lors des travaux de fondation de la nouvelle chapelle Saint-Louis, sont conservés dans cette dernière. Chapelle Royale de Dreux date du XIVe siècle ; XVIIIe siècle ; XIXe siècle. L'Edifice du XIXe siècle, couronne un ensemble de remparts du XIVe siècle, servant de sépulture royale de la famille d'Orléans. En 1775, Louis XVI cède le comté à son cousin, Louis de Bourbon, duc de Penthièvre, qui fit transporter dans la collégiale les corps des membres de sa famille, auparavant inhumés à Rambouillet. Après 1793, les tombes furent ouvertes et les dépouilles enterrées dans une fosse. En 1798, la collégiale et une partie du terrain furent vendues  à un marchand qui entreprit la démolition des bâtiments et revendit le terrain. A l'endroit de la fosse, le nouvel acquéreur fit poser une tombe de pierre. Après son retour d'exil, la duchesse d'Orléans acquit le terrain et fit construire par Cramail une chapelle néo-classique sur l'emplacement de la fosse commune. Devenu roi, son fils fit agrandir la chapelle en style néo-Gothique par Lefranc.  Éléments protégés MH : la chapelle, les façades et les toitures de la maison des Aumôniers et de la maison des Evêques, les cuisines du Roi, les restes de l'enceinte et le parc : classement par arrêté du 12 décembre 1977.                                                                                                                A deux K.M. au sud -ouest de Dreux ALLAINVILLE, le fief de Champseru fut donné aux Templiers lors de la confirmation d'une donation de Hughes IV de Châteauneuf en 1260. Henri de Campion (1613-1663), militaire français, auteur des mémoires vint en résidence estivale au château d'Allainville. Le château du Breuil-Benoit est peu visible de la route.","habitants":"les comtes de Dreux                                                                Allainville ; Henri de Campion\r\n        \"","divers":"Dreux  GPS : 48° 44' 17\" Nord, 1° 21' 48\" Est                        Dreux grav 1-2-3-4    Breuil-Benoit  à Allainville- grav--5  Combeville grav-6                                                                             Allainville grav -7    GPS : 48° 43' 25\" Nord, 1° 18' 06\" Est","gps":"48° 44' 17\" Nord, 1° 21' 48\" Est                        Dreu","images":["../../jctruffet.com/image/image_28/28_Dreux_1.jpg","../../jctruffet.com/image/image_28/28_Dreux_2.jpg","../../jctruffet.com/image/image_28/28_Dreux_3.jpg","../../jctruffet.com/image/image_28/28_Dreux_4.jpg","../../jctruffet.com/image/image_28/28_Dreux_5.jpg","../../jctruffet.com/image/image_28/28_Dreux_6.jpg","../../jctruffet.com/image/image_28/28_Dreux_7.jpg"]},"Consult_chateau_formulaire5ba8":{"id":"Consult_chateau_formulaire5ba8","dept":"28","canton":"Epernon","commune":"Epernon","nom":"Epernon","type":"Château-Forts","periode":"XII","histoire":"EPERNON, à lorigine cétait un château fort mentionné du XIIe siècle sous le règne de Louis VI le Gros. En 1389, Charles VI fait don par lettres patentes des terres de Fontenay à son conseiller Jean le Mercier, chevalier, seigneur de Noviant, la Neuville et Rugles, avec lautorisation de reconstruire le vieux château tombé en ruines. Deux ans après, le nouveau château était debout avec auditoire de justice et prisons. Le château est alors clos de murs et de fossés autour dune cour intérieure, avec deux pont levis, au nord face à léglise et au sud. Lédifice actuel a conservé le plan rectangulaire cantonné de tours rondes. Le château passe ensuite dans la famille de Coutes par héritage. Vers 1446, Louis de Coutes, dit Minguet, fils de Jean de Coutes, page de Jeanne dArc puis écuyer, châtelain et seigneur de Fontenay en Brie, Viry, Neelle la Gilleberde, etc.\r\nLe château a subi plusieurs modifications et a été remanié à la première moitié du XVII où il devient un château de plaisance. Cest Jean Nogaret de La Valette dit le duc dEpernon qui en est propriétaire, il y reçoit dillustres personnages comme Catherine de Médicis, Charles IX, ou encore Henri III qui laissera le souvenir de magnifiques fêtes à loccasion de son mariage, ou encore Richelieu qui est hébergé. Entre 1877 et 1880, le château de Fontenay est loué à lancienne reine dEspagne Isabelle II qui y retrouve son amant Ramiro de la Puente et où elle pratique la chasse.","architecture":"EPERNON, « la position stratégique de la ville sur le penchant d'une colline, en lisière de la forêt de l'Iveline et dominant trois rivières: la Drouette, la Guesle et la Guéville permit à Epernon de faire partie de la ceinture de défense du domaine royal.  Dès le début du XIe siècle Hugues Capet fit élever les châteaux-forts de Maules, Neauphles-le-château, Monfort et Epernon, qui constituaient une ligne de défense du domaine royal contre les ducs de Normandie, c'est-à-dire contre les rois d'Angleterre. A la fin du XVIe siècle Henri III érige la ville avec une place forte trés convoitée au Moyen-Age au XIe siècle, beaucoup de villes se formèrent aux pieds des châteaux-forts récemment construits. C'est ainsi qu'Epernon fut bâtie en amphithéâtre sur les pentes de la colline de Diane. La nouvelle ville s'étendit jusqu'aux bord de la rivière du Tahu, qu'on nomme aujourd'hui la Guesle. Le seigneur Amaury, fils de Guillaume de Hainault, entoura Epernon de murs et de fossés. Quatre portes donnaient accès à la ville, la porte de Chartres, la porte de Geolle, dite aussi porte Normanne ou Normande, la porte de Paris et la porte de Beauce. On lisait sur l'une de ces portes,une inscription qui indique l'existence antérieure d'un village: « autrist fut jadis mon nom. A présent on me nomme Espierremont ».\r\n« La structure principale du château fut détruite par les Anglais pendant la guerre de cent ans. ».A sa place aujourd'hui on trouve un monument commémorant le souvenir de la bataille de 1870.","habitants":"seigneur Amaury\r\n        \r\n        \r\n        \"","divers":"Wikipédia      Marie-51","gps":"","images":["../../jctruffet.com/image/image_28/28_Epernon_1.jpg","../../jctruffet.com/image/image_28/28_Epernon_2.jpg"]},"Consult_chateau_formulairedb07":{"id":"Consult_chateau_formulairedb07","dept":"28","canton":"Auneau","commune":"ST-Symphorien le Château","nom":"Esclimont","type":"Château","periode":"XVI-XVII","histoire":"ESCLIMONT,  au XIe siècle fief de la famille d'Escrones,  et à  Etienne du Poncher, seigneur d'Esclimont, garde des sceaux et archevêque de Tours rebâtit le château en 1543, s'inspirant du style des grandes demeures que ses cousins faisaient bâtir dans le Val de Loire, puis en 1528 à 1599 transmise par héritage à Marguerite  Poncher, épouse de Jean Hurault de Vibraye, lègue le château à son cousin  Philippe Hurault comte de Cheverny, construit le château,  mène une vie conjugale avec Isabeau  Babou de la Bourdaisière future marquise de Sourdis dont il aura plusieurs enfants,  son fils Henri  en 1639 cède le domaine à Claude De Bullion marquis  de Gallardon, garde des sceaux. Le fief passa aux Blaru, aux Trie puis aux Allonville. Puis le château passera dans la famille des Montmorency Laval jusqu'au mariage, en 1807, de sa propriétaire Elisabeth-Hélène Pierre avec Louis-François-Sosthène de La Rochefoucauld Doudeauville, et c'est leur fils Marie-Charles-Sosthène qui, en 1865, chargea l'architecte Parent de donner à Esclimont un nouveau décor romantique à \"la mode Renaissance\",  Leur fils Edouard sera le dernier occupant jusqu'à son décès en 1968. Le 21 juillet 1981 M. René Traversac rachète le château d'Esclimont à la petite-fille d'Edouard de La Rochefoucauld, la comtesse Laure Suzanne Marie Maingard de Mailly et de Nesle d'Orange. Il a la chance de pouvoir acquérir par la même occasion une partie des tableaux, lustres, bibelots et meubles qui ornaient le château. Il fut la propriété du duc de Bisaccia.  Le château d'Esclimont est devenu un château-Hôtel 5 étoiles, très renommé, dans la région et une très belle demeure de charme. Le château a été racheté par des Chinois.","architecture":"ESCLIMONT,  du premier château fort construit au Xe siècle il reste encore à l'heure actuelle le donjon, dont la sévérité féodale a été adoucie d'un porche à triple ouverture donnant accès à l'avant cour, puis d'un haut comble à \"la française\" à la Renaissance.   Ceinturé de douves de forme quadrilatère cantonné de tours. Les XVIIe et XVIIIe siècles furent les siècles des Bullion qui firent transformer le château, le mettant au goût du jour mais sans raser les tours d'angle, par respect pour leurs ancêtres. En 1865, chargea l'architecte Parent de donner à Esclimont un nouveau décor romantique à \"la mode Renaissance\", et confia le parc au paysagiste Bühler. Sur la façade côté cour, on peut lire un prénom Marie. Marie n'était autre que la duchesse de Doudeauville. Elle avait su inspirer cette preuve d'amour à son époux. le château succombe au goût de la surcharge qui caractérise souvent  le style historiques de la période; médaillons, armoiries et devises sculptées envahissent les façades qui se hérissent de balcons, tourelles en encorbellement, des pilastres et pinacles.","habitants":"Philippe Hurault comte de Cheverny                                                             Famille Poncher\r\n        \"","divers":"Esclimont  GPS : 48° 31' 04\" Nord, 1° 45' 42\" Est","gps":"48° 31' 04\" Nord, 1° 45' 42\" Est","images":["../../jctruffet.com/image/image_28/28_Esclimont_1.jpg","../../jctruffet.com/image/image_28/28_Esclimont_2.jpg","../../jctruffet.com/image/image_28/28_Esclimont_3.jpg","../../jctruffet.com/image/image_28/28_Esclimont_4.jpg","../../jctruffet.com/image/image_28/28_Esclimont_5.jpg","../../jctruffet.com/image/image_28/28_Esclimont_6.jpg"]},"Consult_chateau_formulairec151-2":{"id":"Consult_chateau_formulairec151-2","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Escorpain","nom":"Escorpain","type":"Château","periode":"XVI-XIX","histoire":"ESCORPAIN, le château possède deux cours, l'une d'entrée entourée d'une grange, de la bibliothèque aménagée par la famille Firmin Didot, le colombier et deux pavillons de gardien, l'autre cour étant consacrée aux écuries, au garage et à la buanderie. Le château développait, côté jardins, un potager, un verger et une serre promenoir et possédait un accès privilégié vers l'église paroissiale dont le décor résulte des nombreux dons des Firmin-Didot.   Datant du XV e siècle, le château d'Escorpain appartient à la famille Firmin-Didot depuis qu'en 1857, l'un de ses membres, Alfred, a épousé l'une des filles du maréchal Joseph-Christophe Coüin, qui avait acquis cette vaste demeure en 1804.\r\n150 ans plus tard, le monument menace de tomber en ruines lorsqu'en 2008, Charles Firmin-Didot et ses surs décident de le racheter à leur cousin et entreprennent, dans la foulée, de le rénover.","architecture":"ESCORPAIN,  date du XVIe siècle et 2ème moitié du XIX siècle. Le Château d'Escorpain est inscrit aux M.H. \r\nÉléments protégés MH : les façades et les toitures du château, les dépendances (les pavillons de gardiens, la grange, le pigeonnier, l'ancienne buanderie et la bibliothèque en totalité, à l'exclusion des garages) : inscription par arrêté du 3 octobre 2002.","habitants":"famille Firmin Didot\r\n        \"","divers":"Escorpain GPS : 48° 43' 10\" Nord, 1° 12' 27\" Est","gps":"48° 43' 10\" Nord, 1° 12' 27\" Est","images":["../../jctruffet.com/image/image_28/28_Escorpain_1.jpg","../../jctruffet.com/image/image_28/28_Escorpain_2.jpg","../../jctruffet.com/image/image_28/28_Escorpain_3.jpg"]},"Consult_chateau_formulaire0830":{"id":"Consult_chateau_formulaire0830","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Fertée-Vidame","nom":"Ferté_Vidame","type":"vestiges palais","periode":"XIV-XVIII","histoire":"FERTEE- VIDAME, le château de la Ferté-Vidame et son domaine appartenaient, autrefois, à Jean-Joseph de Laborde. Il est en ruines aujourd'hui, l'édifice fut le séjour de Louis, deuxième duc de Saint Simon, dont les Mémoires témoignent de la cour de Louis XIV, il fait construire de nouveaux communs appelés \"Petit Château\".  En 1784, à la demande du Roi, le duc dut cédé son château au duc de Penthièvre, petit-fils de Louis XIV. En 1798, la démolition du grand château est annoncée : destruction des intérieurs, suppression des toitures, arrachement des menuiseries et ferronneries. En 1815, Louis-Philippe, duc d'Orléans puis roi, reprit possession du domaine et envisagea la restauration du grand château qui ne fut pas exécutée. Propriété de l'état en 1946, ce domaine a été acquis par le conseil général d'Eure et Loir en vue de le sauvegarder.","architecture":"FERTEE- VIDAME, dit de Laborde, un château-fort existait déjà avant l'an Mil. Au XVe siècle le château présentait une large enceinte entouré d'eau et cantonnée de tours rondes ou carrées, au XVIIe siècle, la demeure est modernisée tout en conservant une allure médiévale marquée par les neuf tours, les douves et le plan irrégulier.  Le début de sa construction date du XIVe siècle et fut achevé en 1771. Au XVIIIe siècle, l'édifice est agrandi et embelli. Le château, presque entièrement rasé jusqu'aux fondations, fut reconstruit en style classique et monumental par l'architecte Antoine Le Carpentier. A l'intérieur, les appartements sont enrichis de peintures et de stucs. Le parc fut redessiné à la française avec avenues, bassins parterres, canaux et balustrades.  C'était un château de style classe. L'architecte était Antoine Mathieu Le Carpentier. Le château de la Ferté-Vidame a été inscrit aux M.H. en 2007.  C'était un château du XIVe siècle qui fut reconstruit au XVIIIe siècle. Il sera ruiné à la Révolution Française. Le Conseil Général d'Eure-et-Loir a racheté les ruines du château de la Ferté-Vidame.","habitants":"Famille du duc de Penthièvre\r\n        \r\n        \"","divers":"la Motte grav 3-4                 Ferté-Vidame grav 1-2   gps   48° 36' 54\" Nord, 0° 49' 48\" Est,                                                                           la Barre grav 6                                                                                  GPS : 48° 36' 32,33\" Nord, 0° 54' 1,77\" Est","gps":"48° 36' 32,33\" Nord, 0° 54' 1,77\" Est","images":["../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_1.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_2.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_3.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_4.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_5.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_6.jpg"]},"Consult_chateau_formulaire639f":{"id":"Consult_chateau_formulaire639f","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Ferté-Vidame","nom":"Ferté_Vidame_II","type":"Manoir","periode":"XIX","histoire":"HALLIER, c'est l'ancien domaine de Jean-Josept de Laborde, qui fut le premier propriétaire du chateau du Hallier, c'est un manoir du XIXe siècle. Il y reçut le roi Louis XV, le futur roi d'Autriche Joseph II et le Duc de Choiseul. Le château de la Ferté-Vidame est de type classissisme. Le début de sa construction date du XIVe siècle. Il a été achevé en 1771. Son propriétaire actuel est Conseil Général d'Eure-et-Loir qui l'a racheté, il est appelé aussi le château de la Ferte-Vidame. Il fut ruiné à la Révolution. Il ne reste depuis que des ruines impressionnantes. C'est en 1783, que le roi Louis XVI va contraindre le Duc de Penthièvre de lui céder son château de Rambouillet. En contrepartie, le Duc Penthièvre, qui possède déjà de vastes domaines, exige le domaine de La Ferté-Vidame, que Laborde est contraint de lui vendre, Laborde ne conservera que le titre de Vidame de Chartres. A la mort du duc de Penthièvre, en 1793, le château de la Ferté-Vidame et son Domaine seront transmis à sa fille, la duchesse d'Orléans. Mais, celle-ci ayant émigré, ses biens sont confisqués. Déjà saccagé par des pillards, le château de La Ferté-Vidame est vendu le 27/03/1798 au sieur Cardot-Villers qui, fortement endetté, récupère tous les matériaux qui peuvent l'être, d'où l'état actuel des bâtiments, et détuira la forêt, en abattant 31 000 arbres. Ne parvenant pas à payer l'achat du château du Halier, il est déchu de ses droits. Le domaine est remis en vente en juin 1803, sans trouver preneur et reste dans le domaine de l'État. À la Restauration, il est rendu à la Duchesse d'Orléans.","architecture":"HALLIER  à sa mort, en 1826, le domaine est transmis à son fils aîné, le futur roi Louis-Philippe. Il reconstitue le Domaine, relève son mur d'enceinte, fait réparer ses pièces d'eau, restaure et agrandit le petit château. Mais cette restauration sera arrêtée à la Révolution, en 1848. Les biens de la Maison d'Orléans seront confisqués sous Napoléon III. En 1872, les Domaines vendent La Ferté-Vidame au Baron Léon de Dordolot, qui s'y livre à sa passion de la chasse à courre. Il le revend en 1879  à  Charles Laurent, ce dernier s'installe au château, fait agrandir le domaine, puis entreprend des travaux de restauration. Son fils, Roger Laurent, entretient un équipage de Vénerie qui chasse sur un domaine de plus de 6 000 hectares, dont près de 1 000 hectares. Thérèse Laurent, sa soeur, a épousé le Marquis de Lestrade. La chasse à tir y est aussi une des plus belles de France, où se retrouvent les plus grands hommes de la Finance et celui de la Politique. En 1913, ses héritiers vendent le château et le parc à la société forestière de Bretagne qui exploite la forêt jusqu'en 1921, avant de revendre le domaine à Mr Carpentier, industriel à Villers-Cotterêts. Celui-ci le cède en 1923 à Christian Vieljeux, qui en revend la partie la plus importante à la société automobile d'André Citroën qui y installera son centre d'essais. En 1945, la partie restante est vendue au Ministère de la Justice qui y installe le Révérend Père Courtois, fondateur de l'uvre Sainte-Marie-Madeleine, de réinsertion sociale de femmes détenues de droit commun. L'uvre cesse son activité en 1979, au décès de son fondateur. En 1991, l'État cèdera le château  au Conseil Général d'Eure-et-Loir, qui fit entreprendre des travaux pour le rendre accessible au Public. Il est classé aux M.H. depuis 1978.","habitants":"Jean-Josept de Laborde\r\n        \"","divers":"Ferté-Vidame  gps 48° 36' 30\" Nord , 0° 53' 59\"  Est                    Hallier  grav-4                      Laborde grav 1 avant 1793                                         St-Simon_2 avant 1755","gps":"","images":["../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_II_1.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_II_2.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_II_3.jpg","../../jctruffet.com/image/image_28/28_Fert%c3%a9_Vidame_II_4.jpg"]},"Consult_chateau_formulaireb3fc":{"id":"Consult_chateau_formulaireb3fc","dept":"28","canton":"Illiers-Combray","commune":"Fontaine la Guyon","nom":"Fontaine_Guyon","type":"Château","periode":"XV-XVI-XVII","histoire":"FONTAINE LA GUYON, la construction du château est attribuée à l'un des membres de la famille des Ligneris, en 1684 construit par Adrien le Gallot ou par sa veuve Jeanne de Termes. En 1769, François des Ligneris vendit la demeure et ses dépendances à Florence Le Maire, son fils, Alexandre Louis Ollivier de Fontaine, chevalier de l'ordre Royal et militaire de Saint Louis, fit ajouter deux ailes aux constructions primitives. En 1998, la commune achète le château à la famille de Montangon et des travaux sont réalisés à l'intérieur de la bâtisse et le château devient mairie le 22 décembre 1999. Aujourd'hui hôtel de ville.","architecture":"FONTAINE LA GUYON, depuis 1998, la mairie s'est installée dans les murs du château de Fontaine-la-Guyon. Le château du XVIIIe siècle et son parc. Le pavillon carré à toit aigu et le porche de l'ancien château détruit au XVIIe siècle, lors de la construction du canal inachevé de l'Eure. Dans le parc du château de Fontaine-la-Guyon, du XVIIIe siècle, une portion en eau, du canal Louis XIV subsiste encore aujourd'hui telle qu'à sa création en 1685. L'ouvage mesure 260 mètres. Sur la rive droite du canal, une glacière \"butte\" subsiste appelée la chambre froide. Elle aurait été édifiée apres la création du canal, pour y récupérer plus facilement la glace en hiver. Face à la mairie de Fontaine-la-Guyon, se dressent encore quelques vestiges de l'ancien manoir, de style Renaissance, qui fut détruit après 1830. Le parc a une superficie de 12 hectares et d'après un plan du XVIIIe siècle, il était aménagé avec des allées en étoile. Parmi les cèdres qui font la réputation de la propriété, l'un d'eux (près du puits) a été planté en 1779 par Anne Marie Reviers de Mauny, épouse d'Ollivier de Fontaine. Des vestiges du célèbre \"Canal Louis XIV\" sont présents dans le parc. Sur la portion visible du canal, environ 250 mètres, une glacière témoigne des vestiges du passé.","habitants":"famille des Ligneris\r\n        \"","divers":"Fontaine_Guyon      GPS : 48° 28' 22\" Nord, 1° 18' 48\" Est","gps":"48° 28' 22\" Nord, 1° 18' 48\" Est","images":["../../jctruffet.com/image/image_28/28_Fontaine_Guyon_1.jpg","../../jctruffet.com/image/image_28/28_Fontaine_Guyon_2.jpg"]},"Consult_chateau_formulaire7f2b":{"id":"Consult_chateau_formulaire7f2b","dept":"28","canton":"Brou","commune":"Frazé","nom":"Frazé","type":"Forteresse","periode":"XV-XVI","histoire":"FRAZE, Anne Catherine Gaudin dame de Frazé, vendit en 1456 sa terre à Florentin Girard, seigneur de Barenton, qui fit reconstruire, à la fin du XVe siècle, un magnifique château dont nous admirons les restes, Louis Girard fils hérite. Par mariage, le château appartint ensuite à la famille d'O,  Charles d'O  seigneurs de Maillebois, au duc de Gramont, puis à son gendre, le maréchal de Boufflers. La fille de Charles d'O Anne  épouse Nicolas de Conan, une fille Marie qui épouse Hector de Chivré, leur fille  Marguerite de Chivré hérite  par son époux Antoine III de  Gramont maréchal de France, leur fils Antoine IV pair de France  en 1690, sa fille Catherine-Charlotte épouse en 1693 Louis-François duc de Boufflers maréchal de France. Les Gramont s'en déssaisise  leurs fils  nouveau duc de Boufflers hérite Frazé en 1634  et épouse Madeleine de villeroy. En 1740 il est acquis par le duc de Villeroy qui le revend à Louis-Lazare Thiroux d'Arcouville dont les descendants le conservèrent jusqu'en 1893, les deux derniers propriétaires Thiroux Gervilliers Henriette-Louise et sa soeur Marie-Olympe  vendent le château à M. Dulong de Rosnay qui pendant trente ans eut  une  restauration,par les Grammont et les Villeroy et marquis de la Sayette.  De l'ancien château, il ne reste que les communs qui servent de maison d'habitation, la tour (St-François) de l'enceinte et un pavillon d'entrée.","architecture":"FRAZE, de plan carré, avec une magnifique porte fortifiée dit châtelet belle construction du XVe siècle  en pierre de taille blanches  flanquée de deux tours surmontées de mâchicoulis finement travaillés reste le témoin le plus spectaculaire de l'ancien château, aujourd'hui presque entièrement détruit. Comme sa forteresse médiévale avait été complètement rasée par les Anglais pendant la Guerre de Cent Ans, une aile basse, une tour découronnée , chemin de ronde  reposant sur les mâchicoulis. De cet ensemble se détache une galerie basse qui rejoint une tour d'angle découronnée, cette galerie s'adossant  à l'unique  fragment de courtine subsistant et la tour saint-François séparée du châtelet à la base construite en brique et pierre, occupe l'angle  sud-est, le quatrième angle et défendu par un bastion à échauguette du XVIe siècle.","habitants":"Famille de Florentin Girard\r\n        \r\n        \"","divers":"Frazé GPS : 48° 15' 46\" Nord, 1° 05' 50\" Est","gps":"48° 15' 46\" Nord, 1° 05' 50\" Est","images":["../../jctruffet.com/image/image_28/28_Fraz%c3%a9_1.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_2.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_3.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_4.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_5.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_6.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_7.jpg"]},"Consult_chateau_formulairecc0a":{"id":"Consult_chateau_formulairecc0a","dept":"28","canton":"Brou","commune":"Frazé","nom":"Frazé_II","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article; Cormier, Châtelier et Carcahut. CORMIER date du XVIe au XVIIe siècle (1572). Ce manoir comporte plusieurs phases de sa construction. Le porche d'entrée et le logis de maître, les bâtiments de la ferme sont plus récents. À l'exception de la grange, ils figurent au cadastre de 1810. Le porche d'entrée avec son bel escalier à vis suspendu et sa grande salle à l'étage est le corps de bâtiment le plus remarquable du manoir à découvrir. Le Cormier, avec sa porte fortifiée, ses fossés et ses corps de bâtiments disposés autour d'une cour est un manoir percheron très typique.  Le Pavillon d'entrée fait partie des éléments protégés par les M.H. le 2 janvier 1995.                                         CARCAHUT, ce fut longtemps une exploitation agricole, qui vient d'être rénové. On en trouve des traces dès le XIIe siècle du fief de Carcahut aux mains d'un fidèle de Guillaume-Goüet. Le bâtiment actuel semble antérieur à la date portée en fronton (1677) et présente une silhouette massive flanquée d'un haut toit en pavillon et d'une tour d'escalier. Ce manoir percheron semble être le plus ancien bâtiment de Frazé.","architecture":"CHATELIER, date du XVIe siècle. Il possède une façade en briques de croisillons, des fenêtres à meneaux et de belles cheminées sculptées. Le Chatelier était une défense avancée du château de Frazé. Dévasté pendant la guerre de Cent ans, il a été réédifié vers 1500. L'ensemble est placé sur une haute butte, tranchée de fossés. Les façades ouest et nord sont percées de nombreuses meurtrières. Un logis en longueur, composé d'un rez-de-chaussée, est prolongé par un important pavillon, lui-même flanqué à son angle sud-ouest d'une tour carrée. Côté nord, une autre tour est accolée au milieu du grand pavillon, prolongée d'un petit bâtiment en appentis contre le logis principal. L'ensemble est en brique à décor en losange et pierre de taille pour les jambages, linteaux et chaines d'angles. Le Manoir du Châtelier est inscrit aux M.H. depuis le 7/03/1975.","habitants":"Carcahut; famille deGuillaume-Goüet\r\n        \r\n        \"","divers":"Trois châteaux dans cet article; Cormier, Châtelier et Carcahut. Carcahut grav-4                                                                   Cormier Grav-3 GPS : 48° 15' 44\" Nord, 1° 06' 01\" Est                          Chatelier graure 1-2 GPS : 48° 15' 44\" Nord, 1° 06' 01\" Est","gps":"48° 15' 44\" Nord, 1° 06' 01\" Est                          Ch","images":["../../jctruffet.com/image/image_28/28_Fraz%c3%a9_II_1.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_II_2.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_II_3.jpg","../../jctruffet.com/image/image_28/28_Fraz%c3%a9_II_4.jpg"]},"Consult_chateau_formulaire01af":{"id":"Consult_chateau_formulaire01af","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Rueil-la-Gadelière","nom":"Gadelière","type":"Maison forte","periode":"XIV-XVI","histoire":"GADELIERE ;  est attesté en 1342, appartient au type des maisons-fortes qui se sont multipliées au cours de la guerre de Cent ans. L'absence de véritable enceinte, la précarité des éléments de défense, malgré la présence attestée autrefois de fossés en eau, de bretèches amovibles et d'un châtelet d'entrée avec pont-levis, et l'existence de dépendances à proximité, confèrent à cette maison-forte une fonction d'exploitation agricole plutôt qu'une fonction militaire. Au XIXe siècle, la maison-forte perdit ses principales dispositions défensives avec la démolition du châtelet d'entrée, attestée en 1793, et le comblement de la partie sud des fossés. Au début du XXe siècle, le volume extérieur et la distribution intérieure furent transformés par la création d'une galerie en fond de cour, destinée à faciliter la distribution en transformant les baies anciennes en portes de communication. La chapelle est l'ancienne église paroissiale de la commune de la Gadelière. Elle présente un choeur fermé d'un chevet plat datant de l'époque romane.","architecture":"GADELIERE, date du XIIe, XVIe et XVIIe siècle. Cette ancienne maison forte était alliée au royaume de France, à la frontière naturelle entre le duché de Normandie et le Thimerais.  L'édifice présente un plan composé de deux pavillons carrés et d'un corps barlong qui se touchent sur les angles. Au XVIe siècle, les ouvertures augmentées et agrandies avec meneaux et traverses. Au XVIIe siècle, un escalier droit à balustres en bois fut créé dans l'aile est pour faciliter la circulation verticale permise jusqu'alors par un escalier en vis en oeuvre dans l'angle ouest, disparu, et un escalier en vis en demi hors-oeuvre (façade nord du pavillon sud). Autrefois, se trouvaient des fossés comblés par les débris d'une tour à pont-levis qui contrôlait l'entrée d'une place. Il reste des vestiges de la pile où s'appuyait le pont-levis. La maison forte est consolidée par de puissants contreforts. Son donjon ne possédait à sa création  qu'une seule meurtrière. Les baies ont été percées, vers 1870, pour éclairer l'intérieur du château. il se visite, il est inscrit aux M.H. depuis 1992. La nef et l'ensemble de la charpente furent reconstruits à la fin du XVe ou au début du XVIe siècle. La flèche charpentée qui surmontait la première travée de la nef a disparu en 1933. Le colombier peut être daté du XVIIe siècle. Son volume peu important et le nombre réduit des boulins attestent de la modestie de la seigneurie. Il est construit selon un plan octogonal.","habitants":"seigneur local\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Gadelière  GPS : 48° 42' 15\" Nord, 0° 59' 09\" Est","gps":"48° 42' 15\" Nord, 0° 59' 09\" Est","images":["../../jctruffet.com/image/image_28/28_Gadeli%c3%a8re_1.jpg","../../jctruffet.com/image/image_28/28_Gadeli%c3%a8re_2.jpg","../../jctruffet.com/image/image_28/28_Gadeli%c3%a8re_3.jpg","../../jctruffet.com/image/image_28/28_Gadeli%c3%a8re_4.jpg","../../jctruffet.com/image/image_28/28_Gadeli%c3%a8re_5.jpg"]},"Consult_chateau_formulairefcb2":{"id":"Consult_chateau_formulairefcb2","dept":"28","canton":"Les Villages Vovéens","commune":"Loigny la Bataille","nom":"Goury","type":"Château","periode":"XVI","histoire":"GOURY, il doit son nom à Pierre de Goury, conseiller d'état et maître d'hôtel du roi, qui en fait l'acquisition vers 1652, daté du XVIIe siècle. Parmi les seigneurs, on relève les noms de Pierre de Goury, en 1704  l'héritière, Anne-Thérése de Goury qui lui laissa son nom  vend à Pierre le Juge, seigneur de Villeprévost, puis passera  aux Thoynard de Lévesque  de la Gravelle avant d'échoir aux XIXe siècle aux Beaudeloque, par héritage aux Maillefer lorsqu'il  fut le théâtre des affrontements de la guerre de 1870, entre l'armée française et l'armée prussienne servit d'hôpital. Cet édifice parfaitement entretenu abrite aujourd'hui deux familles d'agriculteurs.","architecture":"GOURY, date du XVIe siècle. Le château de Goury comporte un corps de bâtiment principal avec un pavillon central, dont l'entrée est protégée, par une douve sèche.  Un remarquable pavillon porche très massif datant du XVIIe siècle avec bossages et pilastres. Il est flanqué, aux extrémités de tourelles, bâties sur un plan carré, avec un avant-corps où est logé l'escalier. La cour est entourée de murs. Au Sud, elle est limitée de douves sèches, qui s'arrêtent aux extrémités Est et Ouest, sur des tourelles semblables à celles du bâtiment principal. Le château de Goury est privé et fermé au Public.  Éléments protégés MH : les façades et les toitures du pavillon central constituant l'entrée du château :  Le château de Goury a été classé aux M.H. en 1964.","habitants":"Famille de Goury\r\n        \"","divers":"Goury     GPS : 48° 08' 01\" Nord, 1° 46' 02\" Est","gps":"48° 08' 01\" Nord, 1° 46' 02\" Est","images":["../../jctruffet.com/image/image_28/28_Goury_1.jpg","../../jctruffet.com/image/image_28/28_Goury_2.jpg","../../jctruffet.com/image/image_28/28_Goury_3.jpg","../../jctruffet.com/image/image_28/28_Goury_4.jpg","../../jctruffet.com/image/image_28/28_Goury_5.jpg"]},"Consult_chateau_formulairebda0":{"id":"Consult_chateau_formulairebda0","dept":"28","canton":"Nogent-le-Rotrou","commune":"Champrond-en-Perchet,","nom":"Grand_Champrond","type":"Manoir","periode":"XIV-XVI","histoire":"Grand-CHAMPROND, la terre de Champrond et sa forêt des Perchets appartiennent au domaine direct des Rotrou. Par le jeu des successions, elles passent à leurs descendants, les château-Gontier, et la suite des seigneurs de Nogent. Par mariage, elles arrivent, au quatrième quart du XVe siècle, entre les mains de la famille Beaulieu qui rend foi et hommage au seigneur de Brunelles, lui-même vassal du seigneur de Nogent-le-Rotrou. L'un de ses membres, Loys de Beaulieu, est probablement à l'initiative de la construction  du manoir à cette même période, comme le montrent le décor de la porte de la tour d'escalier ainsi que la charpente. Au cours du XVIe siècle, un de ses descendants, Floridas de Beaulieu, agrandit le manoir vers l'est (une pièce par niveau) et en retour d'équerre au sud-ouest, en attestent les cheminées monumentales de l'étage et les fenêtres chanfreinées de dimensions restreintes. Une partie des bâtiments d'exploitation (est et ouest) daterait du XVIIIe siècle, comme le montrent plusieurs détails architecturaux dont une porte en plein cintre obstruée, ou les deux portes charretières en anse de panier. Suite à la Révolution, le manoir est vendu comme bien national. En 1825, Charles François Fontaine en acquiert la propriété. Les matrices cadastrales font état de \"l'augmentation d'une maison\" à l'initiative d'Ernest Viette en 1884, date probable de la transformation du logis manorial (agrandissement des ouvertures et du bâtiment vers l'est).","architecture":"Grand-CHAMPROND, le manoir du Grand-Champrond est implanté à l'est du plateau du bois des Perchets, non loin de la source du ruisseau du Val Roquet. L'ensemble comprend quatre bâtiments dissociés et organisés en U autour d'une cour ouverte. Au sud, le logis manorial comprend quatre corps de bâtiment : un corps principal de plan rectangulaire, une tour hors-oeuvre, un corps de bâtiment de plan presque carré, perpendiculaire au corps principal, et un petit corps construit dans le prolongement vers l'est du corps principal. Le corps principal du logis comprend deux pièces par niveau habitable; une cuisine et une salle au rez-de-chaussée, deux chambres à l'étage.  La tour hors-oeuvre est accolée sur la façade nord du corps principal ; elle abrite un escalier à vis en bois qui dessert quatre niveaux.  Le corps de bâtiment en retour d'équerre au sud-ouest comprend un rez-de-chaussée surmonté d'un haut comble à surcroît, avec cheminée adossée. De nombreuses ouvertures, notamment sur le corps principal, ont été agrandies dans le style néo-gothique : encadrées d'une chaîne.","habitants":"famille Beaulieu\r\n        \"","divers":"Champrond    gps 48° 18' 41\" nord, 0° 52' 09\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Grand_Champrond_1.jpg","../../jctruffet.com/image/image_28/28_Grand_Champrond_2.jpg"]},"Consult_chateau_formulaire256b":{"id":"Consult_chateau_formulaire256b","dept":"28","canton":"Brou","commune":"Les Etilleux","nom":"Grand_Frenay","type":"Manoir","periode":"XV-XVI","histoire":"GRAND-FRENAY, l'édifice était, à l'origine, deux fois plus grand qu'actuellement. Le logis était prolongé par une partie symétrique et identique au-delà d'une grosse tour d'escalier, hors oeuvre, sur la façade sud qui furent abattues à une époque indéterminée. Éléments protégés MH : les façades et les toitures du logis : inscription par arrêté du 28 décembre 1978.","architecture":"Grand-FRENAY,  il a été construit du XVe au XVIe siècle. La construction du château remonte en 1480. A l'origine, le chateau du Grand Fresnay était deux fois plus grand. Le logis était prolongé par une partie symétrique et identique, doté d'une grosse tour d'escalier, hors oeuvre, sur la façade sud qui furent abattues par la suite. De ce château du XVe siècle, il ne reste qu'un logis, au rez-de-chaussée et étage, avec des pignons aigus. Le pignon ouest porte une riche décoration de crochets végétaux et de crossettes sculptées en forme de sphinx à ailes déployées. Le logis donne sur une cour fermée. Les pignons, coté est et ouest, sont occupés par des écuries, qui datent du XIXe siècle.","habitants":"seigneurs locaux\r\n        \"","divers":"Grand_Frenay   GPS : 48° 15' 27\" Nord, 0° 48' 40\" Est","gps":"48° 15' 27\" Nord, 0° 48' 40\" Est","images":["../../jctruffet.com/image/image_28/28_Grand_Frenay_1.jpg","../../jctruffet.com/image/image_28/28_Grand_Frenay_2.jpg"]},"Consult_chateau_formulaire716c":{"id":"Consult_chateau_formulaire716c","dept":"28","canton":"Nogent-le-Rotrou","commune":"St-Jean_Pierre Fixte","nom":"Grand_Prainville","type":"Manoir","periode":"XV-XVII","histoire":"GRAND-PRAINVILLE,   la seigneurie du Grand-Prainville dépendait de la châtellenie de Montdoucet. Daprès Philippe Siguret, le manoir a été construit vers 1485 pour Patrice de Boisguyon, écuyer, fils cadet de Philippe de Boisguyon, seigneur de Montdoucet. De cette époque remonte le logis seigneurial, ainsi que la tour descalier hors-uvre. Les Boisguyon restent seigneurs de Prainville jusquen 1751, date du rachat de la seigneurie par Louis François de Savary, ancien capitaine des carabiniers, chevalier  de lordre de Saint-Jean de Jérusalem. En 1811, date du premier plan cadastral, le Grand-Prainville compte quatre bâtiments : le logis manorial et la ferme. Lensemble appartient à des propriétaires successifs qui baillent à la ferme à des locataires successifs, jusquà ce que Louis Pelletier, propriétaire cultivateur, lacquière en 1862, exploite et habite la ferme. En 1907, le baron Henri Jean Guillier de Souancé se porte acquéreur du Grand Prainville. Il fait construire la ferme de Prainville en 1911. Jusquà la veille de la première Guerre Mondiale, il fait détruire lancien bâtiment principal de la ferme et reconstruire  les deux dépendances quil transforme en grange pour le bâtiment sud et maison du jardinier, écurie et sellerie. Il fait construire une aile en retour déquerre au sud-ouest du logis manorial, et restaurer la façade principale du manoir : restitution des baies à meneau et à traverse, création de trois lucarnes complétant les trois travées douvertures. Lensemble reçoit un décor inspiré du registre néo-gothique : sculptures danimaux fantastiques ornant les crossettes des rampants, et fleurons couronnant les pignons découverts.","architecture":"GRAND-PRAINVILLE , lensemble comprend trois bâtiments : le logis manorial, placé à lest de lensemble, possède deux ailes. Laile principale sélève sur deux niveaux habitables : rez-de-chaussée surélevé  et étage carré. Orientée à lest, sa façade principale est flanquée dune tour descalier hors-uvre contenant un escalier à vis en pierre de taille calcaire, desservant les quatre niveaux délévation. Laccès se fait via cette tour, par la porte en anse de panier de style gothique flamboyant. Le rez-de-chaussée surélevé contient probablement une salle de réception et la cuisine, létage des chambres. Les pièces sont éclairées par des fenêtres à meneau et à traverse formant trois travées douvertures complétées en partie supérieure par des lucarnes à pignon découvert, rampants et crossettes . En retour déquerre au sud-ouest, se trouve un premier corps de bâtiment à étage. A langle des deux ailes est placée une tour carrée demi-hors-uvre, contenant un escalier. Dans le prolongement du premier corps de bâtiment se trouve un second corps en rez-de-chaussée. Si les chaînages dangle et les rampants sculptés sont en pierre de taille calcaire, les encadrements douvertures sont en brique avec linteau en bois. En alignement au sud de ce dernier, se situe la grange. Les murs sont en moellon de calcaire et de silex couvert dun enduit plein. Les encadrements douvertures sont en pierre de taille calcaire, à lexception du bâtiment nord-ouest . Les toits à longs pans, en flèche polygonale (tour hors-uvre octogonale), en pavillon sont couverts en tuiles plates.","habitants":"Famille de  Patrice de Boisguyon\r\n        \"","divers":"Grand_Prainville","gps":"","images":["../../jctruffet.com/image/image_28/28_Grand_Prainville_1.jpg","../../jctruffet.com/image/image_28/28_Grand_Prainville_2.jpg","../../jctruffet.com/image/image_28/28_Grand_Prainville_3.jpg"]},"Consult_chateau_formulaire3f49":{"id":"Consult_chateau_formulaire3f49","dept":"28","canton":"Brou","commune":"Unverre","nom":"Grandmaisons","type":"Château","periode":"XVI-XVII","histoire":"GRANDMAISONS  En 1550, cétait une modeste demeure de grisons et silex, de bois et de torchis avec sa ferme et son enclos. En 1680, elle devint la propriété de Mr Renou, curé dUnverre. Inscription, sur le pignon ouest, d'une date 1716, qui est sans doute celle de l'année dune remise en état par M. Renou. Après sa mort en 1720, la propriété passa à ses héritiers, les Fezard, mais dès 1752, ils la vendirent à la famille de la Varenne, qui le loua à Mr Dumesnil puis à Mr Pillart, tous deux curés dUnverre.","architecture":"GRANDMAISONS, en 1774, Michel de la Varenne se maria, il fit démolir presque tous les bâtiments, murs, tours dentrée et tourelles en mauvais état et fit élever le château actuel. En 1804, construction des murs de clôture le long de la rue et du chemin des Ponts neuf. Deux orages les 26 et 31 juillet1807 ont abattu de nombreux arbres dans le parc.","habitants":"Famille de Mr Renou, \r\n        \"","divers":"Grandmaisons          gps 48° 50' 16\" nord, 2° 00' 45\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Grandmaisons_1.jpg","../../jctruffet.com/image/image_28/28_Grandmaisons_2.jpg","../../jctruffet.com/image/image_28/28_Grandmaisons_3.jpg"]},"Consult_chateau_formulaired459":{"id":"Consult_chateau_formulaired459","dept":"28","canton":"Brou","commune":"Saint-Bomer","nom":"Gréve","type":"Château","periode":"XVII","histoire":"GREVE, ce château est situé à l'extrême limite de la province de l'Orléanais, édifié au XVIIe siècle par Abel Servien, envoyé au congrès de Westphalie.","architecture":"GREVE, l'édifice est bâti sur un terre-plein entouré de douves avec deux pavillons d'entrée.  il se compose d'un corps de bâtiment et de deux pavillons comprenant un rez-de-chaussée, cave, cuisine et office en dessous, un premier étage mansardés et greniers au dessus couvert en ardoises, et ayant trois cent soixante huit mètres carré de maçonnerie. Cour d'honneur devant le pavillon, à l'extrémité de laquelle se trouvent deux pavillons bâtis en maçonnerie, couverts en tuile, comprenant une maison de régisseur et l'autre une ancienne chambre et une salle de bains. Communs de l'autre côté des fossés, en face du château, construits en pierres, comprenant: sellerie, écuries, remises, maison de jardinier, étable et toits d'un seul corps. Fournil, poulailler, hangar et pressoir formant un autre corps de bâtiment.","habitants":"Famille de Abel Servien\r\n        \"","divers":"Grève gps  48° 11' 46\" nord, 0° 49' 43\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Gr%c3%a9ve_1.jpg","../../jctruffet.com/image/image_28/28_Gr%c3%a9ve_2.jpg","../../jctruffet.com/image/image_28/28_Gr%c3%a9ve_3.jpg","../../jctruffet.com/image/image_28/28_Gr%c3%a9ve_4.jpg"]},"Consult_chateau_formulaire0fdf":{"id":"Consult_chateau_formulaire0fdf","dept":"28","canton":"Anet","commune":"Guainville","nom":"Guainville","type":"Vestiges-Chateaux","periode":"XII-XVIII","histoire":"GUAINVILLE, reconstruit à la fin du XIIe siècle, le vieux-château est situé à la pointe nord du département. Dominant les rives verdoyantes et escarpées de lEure, il était autrefois situé aux confins du royaume de France et de lancien duché de Normandie, possession du Roi dAngleterre. Les vestiges de la forteresse présentent des spécificités remarquables, le plaçant comme un témoin majeur de lart militaire de la fin du XIIe siècle. La taille de lenceinte fortifiée, son homogénéité générale et la qualité de luvre en font une construction Royale et non celle dun seigneur local. Dun caractère innovant, doté de nombreuses particularités, son architecture lapparente aux constructions anglo-normandes. Le vieux château est lunique forteresse anglo-normande en terre de France. Fortifiée en bois aux alentours du début du XIe siècle par Ascelin Goel, vassal de Guillaume le Conquérant, la maison passa successivement à son fils Guillaume Louvel, à Simon dAnet, également vassaux du Roi dAngleterre. En 1192 Simon dAnet mourut sans héritier, la forteresse en cours de reconstruction en pierre de taille, fut intégrée au royaume de France par Philippe Auguste. Entré dans les possessions du comte dEvreux, le château de Guainville fut démantelé en 1378 par ordre de Charles V, suite aux rebellions du propriétaire du domaine.","architecture":"GUAINVILLE  Il reste une porte fortifiée à l'Ouest, à la jonction avec le fossé du château qui est protégée depuis le 3/12/2009. Le château de Guainville est un site archéologique.                                                                                                                     PRIMARD,  la construction du château Primard date du XVIIIe siècle. La comédienne Catherine Deneuve se sépara de son château de Guainville. Une maison principale de 1 200 m2 \"entièrement habitable\", avec une cuisine de 50 m2, deux suites parentales, une suite avec sauna, une vaste piscine, une maison de gardien, de \"nombreuses dépendances\", un parc paysager aménagé par Jacques Wirtz - qui a notamment rénové le jardin du Carrousel, aux Tuileries, à Paris. Elle expliquait, il y a quelques années, à Mme Figaro, s'occuper elle-même du jardin et des rosiers pour se reposer. Le château Primard date du XVIIIe siècle. Au tournant des années 2020, le château Primard fut racheté, par un couple d'investisseurs, qui le  transforma en une Auberge de luxe, véritable château de la Belle au bois dormant, la demeure endormie pendant plus de six siècles a été acquise par les propriétaires actuels en 2005. Après une première uvre de mise en valeur et de sauvetage achevée, et de nombreuses manifestations font revivre le site. Contact : Philippe et Nathalie Velin.","habitants":"Comédienne Catherine Deneuve \r\n        \"","divers":"Guainville          GPS : 48° 54' 26\" Nord, 1° 28' 42\" Est                       Primard GPS : 48° 54' 56\" Nord, 1° 29' 34\" Est","gps":"48° 54' 26\" Nord, 1° 28' 42\" Est                       Prima","images":["../../jctruffet.com/image/image_28/28_Guainville_1.jpg","../../jctruffet.com/image/image_28/28_Guainville_2.jpg","../../jctruffet.com/image/image_28/28_Guainville_3.jpg","../../jctruffet.com/image/image_28/28_Guainville_4.jpg"]},"Consult_chateau_formulaire8ee3":{"id":"Consult_chateau_formulaire8ee3","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Digny","nom":"Hallière","type":"Château","periode":"XV_XVIII","histoire":"HALLIERE, ancienne seigneurie.  Au XVe siècle, Louis IX donna la seigneurie de la Hallière au chapitre de St Martin de Tours qui la posséda jusquen 1783. A lorigine, cétait un manoir qui fut remplacé vers 1774 par le château construit suivant les plans de larchitecte Moreau pour M. de Balincourt. Celui ci, complètement ruiné, le vend avec tout son mobilier à la famille du propriétaire actuel en 1794.  Le propriétaire actuel du château est la Famille du Tillet, inscription par arrêté du 19 avril 1972. Propriétaire initial  M. Dupont de La Hallière.","architecture":"HALLIERE, château construit vers 1780. Quelques rares éléments de la façade d'arrivée au nord, les frontons des pavillons, l'entablement à modillons et la partie centrale décorée de colonnes, ont été modifiés et rajoutés à la Restauration. L'édifice est précédé d'une grille encadrée de pavillons. Le château se présente comme un long quadrilatère flanqué de deux pavillons légèrement en saillie. Tout le rez-de-chaussée est orné de boiseries Louis XVI. Un petit salon hexagonal est orné de panneaux peints au Chinois à fond vert d'eau, ramenés de la région parisienne. Perpendiculaires au château, les communs forment un bâtiment bas et long d'où émergent une fuye ronde surmontée d'un lanterneau et d'un porche en plein cintre qui sert d'entrée à la basse-cour.   Eléments protégés MH : les façades et les toitures du château, le salon, la salle à manger, les quatre chambres à alcôves et le petit salon polygonal avec leur décor, la cour d'honneur avec sa grille et son portail d'entrée, les façades et les toitures des deux pavillons d'entrée et des communs, le château est précédé d'une grille qui encadre deux pavillons. Le château de la Hallière est signé par l'Architecte chartrain Morin, la conception de la toiture est originale. Entre son toit mansardé et son dôme concave, cette astuce sert à dissimuler les cheminées. C'est une oeuvre remarquable.","habitants":"Famille de M. de Balincourt\r\n        \r\n        \"","divers":"Hallière   gps 48° 31' 02\" N, 1° 07' 16\" Est","gps":"","images":["../../jctruffet.com/image/image_28/28_Halli%c3%a8re_1.jpg","../../jctruffet.com/image/image_28/28_Halli%c3%a8re_2.jpg"]},"Consult_chateau_formulaire03a2":{"id":"Consult_chateau_formulaire03a2","dept":"28","canton":"Anet","commune":"Berchères sur Vesgre","nom":"Herces","type":"Château","periode":"XVIII","histoire":"HERCES, sa construction a débuté en 1772 et date du XVIIIe siècle. Le château Hercès est de style néo-classique. La terre de Hercès appartenait, en 1137, à Amaury III de Montfort, comte d'Évreux. Un château fut construit, entre le XIVe et le XVe siècle, par la famille de Simon de Richebourg. Au XVIIe siècle, la terre et seigneurie de Berchères et le fief de Herces appartenaient à la Famille des chevaliers du Buc, alias du Buc-Richard. Gédéon et Jean du Buc furent seigneurs successifs, selon les actes d'Etat-Civil d'Ancien Régime. En 1710, Louis Colbert (1667-1714), comte de Lignières, le dernier fils de Colbert, acheta le domaine. Il le revendit, en 1760, à M. de Beaumanoir. Le château de Herces actuel a été construit, en 1772, par l'architecte Jacques Denis Antoine, architecte de l'Hôtel des Monnaies à Paris pour l'Intendant des Finances Charles Robert Boutin, qui le conservera, jusqu'en 1791. A la même époque, la sur de Charles Robert Boutin, Marie Charlotte Madeleine Boutin, vicomtesse de Montboissier, fit construire, à proximité, le château de Montboissier, par l'architecte du roi Nicolas Marie Potain. Le château de Hercès appartenait, au début de 2009, aux 2 Cheikhs : Mohammed Bin Butti Hamid Al Hamid, Président de la municipalité d'Abou Dabi et Saïf Bin Mohammed Bin Butti.","architecture":"BERCHERE sur Vesgre,  château du Herces à Berchères-sur-Vègre. De plan ramassé, ce remarquable château, aux quatre  façades de style Louis XVI  ont chacune une décoration différente élevé sur trois étages, se signale avant tout par le fait que, comme le Petit Trianon, il présente quatre façades différentes sous un entablement continu.  Le château ainsi que les dépendances sont respectivement inscrits et classés parmi les .M.H. restauration dune centaine de fenêtres XVIIIe siècle. Une quinzaine de croisées seront remplacées à neuf en récupérant les ferrures dorigine.  Dépendances : lensemble des menuiseries extérieures seront remplacées à neuf par des fenêtres à recouvrement, de la gamme Moderne.","habitants":"Famille de M. de Beaumanoir.\r\n        \r\n        \"","divers":"Herces          GPS : 48° 50' 20,82\" Nord, 1° 32' 51,56\" Est","gps":"48° 50' 20,82\" Nord, 1° 32' 51,56\" Est","images":["../../jctruffet.com/image/image_28/28_Herces_1.jpg","../../jctruffet.com/image/image_28/28_Herces_2.jpg","../../jctruffet.com/image/image_28/28_Herces_3.jpg","../../jctruffet.com/image/image_28/28_Herces_4.jpg"]},"Consult_chateau_formulairee91e-2":{"id":"Consult_chateau_formulairee91e-2","dept":"28","canton":"Auneau","commune":"Houville la Branche","nom":"Houville_la_Branche","type":"Château","periode":"XVI-XVIII","histoire":"HOUVILLE   la BRANCHE, château composé d'un corps de bâtiment flanqué de deux ailes et précédé par un petit avant corps surmonté d'un fronton curviligne. L'accès à la façade sur le parc se fait par un perron avec rampe en fer forgé. La clôture de la cour d'honneur se compose d'un mur avec balustrade surmontée de pots à feu. L'intérieur conserve des escaliers avec rampes en fer forgé, des lambris du XVIIIe siècle. Dans la salle à manger trône une fontaine en marbre blanc du château d'Anatole France à Capian. Au premier étage, reconstitution de la chambre d'Anatole France avec les meubles provenant du château de Capian.\r\nÉléments protégés MH : les façades et les toitures du bâtiment principal et des ailes attenantes, la cour d'honneur : inscription par arrêté du 21 avril 1960.","architecture":"HOUVILLE la BRANCHE, la construction du château a débuté au XVIe et s'est achevée au XVIIIe siècle. Le château d'Houville-la-Branche est entouré d'un parc de 54 hectares, par la direction régionale de l'environnement. Le château est composé d'un corps de bâtiment, flanqué de 2 ailes et précédé par un avant-corps surmonté d'un fronton incurvé. On accède à la façade, coté parc, par un perron doté d'une rampe en fer forgé. La clôture de la cour d'honneur se compose d'un mur avec balustrade, surmontée de pots à feu. L'intérieur conserve des escaliers avec rampes en fer forgé et des lambris qui datent du XVIIIe siècle. Une fontaine en marbre blanc se trouve dans la salle à manger et provient du château d'Anatole France à Capian.","habitants":"Famille  d'Anatole France\r\n        \"","divers":"Houville_la_Branche GPS : 48° 26' 37\" Nord, 1° 38' 21\" Est","gps":"48° 26' 37\" Nord, 1° 38' 21\" Est","images":["../../jctruffet.com/image/image_28/28_Houville_la_Branche_1.jpg"]},"Consult_chateau_formulaire440f":{"id":"Consult_chateau_formulaire440f","dept":"28","canton":"Illiers-Combray","commune":"Illiers-Combray,","nom":"Illiers_Combray","type":"Château","periode":"XV-XVI-XVIII","histoire":"Cinq châteaux dans cet article; Illiers-Combray, Rouvray, Mirougrain, Roussainville et Sinetterie.                                                          ILLIERS COMBRAY,  un véritable château fort avec pont-levis, épaisses murailles, double enceinte, fossés et tours extérieures, fût construit au coeur dune boucle du Loir. Au XVe siècle, Florent dIlliers, compagnon darmes de Jeanne dArc et gouverneur de Châteaudun, le restaure et laménage. Le château finira plus tard par tomber à labandon puis démoli au fil du temps, notamment après la révolution où les islériens se servirent des pierres dans le but de construire quelques habitations. Le donjon quadrangulaire sera démoli en 1857. Il subsiste le pavillon d'entrée qui est épaulé par deux contreforts qui s'épaississent en talus à la partie inférieure. Le portail en arc brisé présente deux rangées de claveaux. Les fenêtres ont perdu leurs meneaux, mais la lucarne ouverte dans le toit a conservé son pignon dont les rempants sont ornés de sculptures. Éléments protégés MH : le pavillon d'entrée : inscription par arrêté du 22 mars 1930.                                                                  ROUVRAY,  l'ancien château de Rouvray date du XVIe siècle. Ce pavillon est épaulé par deux contreforts qui s'épaississent en talus à la partie inférieure. Le portail en arc brisé présente deux rangées de claveaux. Les fenêtres ont perdu leurs meneaux, mais la lucarne ouverte, dans le toit a conservé son pignon dont les rampants sont ornés de sculptures. Le château de Rouvray est inscrit aux M.H., partiellement, depuis le 22/03/1930.","architecture":"MIROUGRAIN,  date de 1886. C'est au manoir de Mirougrain que Marcel Proust faisait ses promenades favorites durant ses séjours à Illiers-Combray. Dans son enfance, le manoir était occupée par une poétesse, Mlle Joinville, qui inspirera le personnage de Mlle Vinteuil. Le lieu a inspiré Marcel Proust pour \"Du côté de Guermantes\". Le manoir de Mirougrain date du XVIIIe siècle. Sa façade Est fut transformée vers 1886. Des quartiers de roches y ont été plaqués et les fenêtres ont été agrémentées de linteaux en arc brisé.  Est inscrit aux M.H. depuis 1977.  Éléments protégés MH : les façades et les toitures du manoir : inscription par arrêté du 26 juillet 1977.                                                                                                                           ROUSSAINVILLE, il ne reste de l'ancien château d'Illiers, que son pavillon d'entrée, dont la construction date du XVIe siècle. Ce pavillon est épaulé par deux contreforts qui s'épaississent en talus à la partie inférieure. Le portail en arc brisé présente deux rangées de claveaux. Les fenêtres ont perdu leurs meneaux, mais la lucarne ouverte dans le toit a conservé son pignon. Les rempants sont ornés de sculptures.  Cet ancien château est inscrit aux M.H. depuis 1930.                                                                                                        SINETTERIE, le pavillon d'entrée de l'ancien château d'Illiers, date du XVIe siècle. Le pavillon est épaulé par deux contreforts qui s'épaississent en talus à la partie inférieure. Le portail en arc brisé présente deux rangées de claveaux. Les fenêtres ont perdu leurs meneaux, mais la lucarne ouverte dans le toit a conservé son pignon dont les rempants sont ornés de sculptures. Le château de la Sinetterie est inscrit aux M.H. depuis le 22/03/1930.","habitants":"Famille de  Marcel Proust\r\n        \"","divers":"Cinq châteaux dans cet article; Illiers-Combray grav1-2-3- 7, Rouvray grav 4, Mirougrain grav-6, Roussainville grav-5 et Sinetterie.                                                                                    Illiers  GPS : 48° 17' 56,04\" Nord, 1° 14' 31,92\" Est  Mirougrain GPS : 48° 18' 37,58\" Nord, 1° 13' 54,95\" Est Roussainville GPS : 48° 18' 04\" Nord, 1° 14' 54\" Est                                                           Rouvray GPS : 48° 17' 56\" Nord, 1° 14' 32\" Est                     Sinettrie  GPS : 48° 18' 04\" Nord, 1° 14' 54\" Est","gps":"48° 17' 56,04\" Nord, 1° 14' 31,92\" Est  Mirougrain GPS : 48°","images":["../../jctruffet.com/image/image_28/28_Illiers_Combray_1.jpg","../../jctruffet.com/image/image_28/28_Illiers_Combray_2.jpg","../../jctruffet.com/image/image_28/28_Illiers_Combray_3.jpg","../../jctruffet.com/image/image_28/28_Illiers_Combray_4.jpg","../../jctruffet.com/image/image_28/28_Illiers_Combray_5.jpg","../../jctruffet.com/image/image_28/28_Illiers_Combray_6.jpg","../../jctruffet.com/image/image_28/28_Illiers_Combray_7.jpg"]},"Consult_chateau_formulaire1842-3":{"id":"Consult_chateau_formulaire1842-3","dept":"28","canton":"Saint-Lubin-des-Joncherets","commune":"Jaudrais","nom":"Jaudrais","type":"Vestiges donjon","periode":"XIV","histoire":"JAUDRAIS, la première mention fait remonter lorigine du château au XIVe siècle.  En 1939, entre le 29 janvier et le 8 février, plus de 2 000 réfugiés espagnols, fuyant l'effondrement de la République Espagnole devant les troupes du Général Francisco Franco,  (1892/195), arrivent en Eure-et-Loir. Devant l'insuffisance de structures d'accueil, 53 villages sont mis à contribution, dont Jaudrais. Les réfugiés sont essentiellement des femmes et des enfants car les hommes désarmés sont retenus dans le Sud de la France. Une partie des réfugiés rentrent en Espagne en décembre, incités par le gouvernement français qui facilite les conditions du retour. Le château semble remonter à la Guerre de Cent Ans qui s'est tenue de 1337 à 1453.","architecture":"JAUDRAIS, du château datant de la guerre de Cent Ans ne subsistent que les ruines du donjon et les restes des douves, en partie comblées par les chutes provenant des étages, aujourdhui il ne subsiste de ce château que le donjon qui dresse ses murs de 25 mètres de hauteur, fendus de plusieurs brèches. Des douves en eau, partiellement comblées par la chute des parties hautes, l'entourent. Des traces de pont-levis et l'arrondi d'une tourelle d'escalier creusée dans l'épaisseur de la muraille, sont encore visibles. Des bandeaux de briques, à intervalles réguliers, rompent l'austérité du silex et labondance de meurtrières évoque la vocation défensive des lieux. Les ouvertures rectangulaires des étages sont plus tardives. Dans la même enceinte s'élève un logis ancien, cantonné d'une petite tour carrée. Un grand parc, clos de murs, s'étend à l'Est.","habitants":"Seigneur local\r\n        \"","divers":"Jaudrais Gps  48° 34' 42\" nord, 1° 07' 39\" est","gps":"","images":["../../jctruffet.com/image/image_28/28_Jaudrais_1.jpg","../../jctruffet.com/image/image_28/28_Jaudrais_2.jpg"]},"Consult_chateau_formulairee7fe":{"id":"Consult_chateau_formulairee7fe","dept":"28","canton":"Chartres","commune":"Romilly-sur-Aigre","nom":"Jonchet","type":"Manoir","periode":"XVI-XVIII","histoire":"JONCHET au XVIe siècle, la Seigneurie du Jonchet a appartenu à Jacques de Lyon, seigneur de Bouville et du Jonchet, puis Jacques de Beaufils, seigneur d'Orgères, ensuite à Marie Leliepvre, veuve de Jacques de Hayes, seigneur d'Ouzouer le Doyen. Enfin, Michel Sublet, seigneur d'Heudicourt y vécut de 1593 à 1660. La propriété est rachetée au XVIIe siècle par Jean de Pleurre, seigneur du marquisat de Pleurre. Au XVIIIe siècle, le comte de Sourches, Louis Hilaire du Bouchet y vécut. Au XIXe siècle, la propriété échoit en héritage à la duchesse de Tourzel, gouvernante des enfants du roi Louis XVI. Après André Julien, comte Dupuy, c'est la famille du marquis de Tarragon qui prend possession des lieux pendant plus d'un siècle et demi. L'Architecte Fernand Pouillon, au XXe siècle, conserve quelques années le Jonchet. Monsieur Bellon, nouveau propriétaire. Depuis 1976, M. Hubert de Givenchy est l'actuel propriétaire du manoir du Jonchet,  Madame Mellon qui adorait le Jonchet (la perfection du goût à la Française selon ses dires), M. de Givenchy a souhaité recréer une harmonie entre le jardin et le manoir en le redessinant avec des figures géométriques. Transformé au XVIIIe siècle par l'architecte Gabriel de Lestrade, qui construisit l'escalier d'honneur pour Louis-Hilaire du Bouchet, comte de Sourches.","architecture":"JONCHET, ce château, en état de ruines dans les années 1950, a été entièrement restauré par l'architecte Fernand Pouillon (1912-1986) qui l'évoque dans ses mémoires monsieur Bellon, nouveau propriétaire, y vécut avec sa famille pendant 17 ans. Il créa un élevage de chevaux Lipizans, et entretint le manoir en parfait état et agrandit les terres du domaine.  Il fut ensuite la propriété de Roger Bellon, propriétaire des laboratoires pharmaceutiques du même nom. le manoir initialement bâti en lanterne a retrouvé son exceptionnelle lumière. Après la restauration des intérieurs, pour retrouver les volumes initiaux, M. de Givenchy s'engage dans les rénovations des cheminées, des toitures, de la tour du gué, du jardin et des enduits des façades. Aujourd'hui, les enduits des douves doivent être rénovées. En s'inspirant du jardin du couvent de San-Georgio Major à Venise, dont il obtint les dessins du XVIIe et avec les conseils éclairés d'une grande amie américaine.","habitants":"Famille de la duchesse de Tourzel\r\n        \"","divers":"Jonchet  GPS : 47° 59' 05\" Nord, 1° 16' 31\" Est","gps":"47° 59' 05\" Nord, 1° 16' 31\" Est","images":["../../jctruffet.com/image/image_28/28_Jonchet_1.jpg"]},"Consult_chateau_formulaire775f":{"id":"Consult_chateau_formulaire775f","dept":"28","canton":"Chartres","commune":"Ecrones","nom":"Jonvilliers","type":"Château et Vestiges","periode":"XII-XVIII","histoire":"Le château de Jonvilliers est un château d'Ecrosnes,  vous découvrirez au château de Jonvilliers des chambres dhôtes.\r\nmadame Laurence  Toullet, entrepreneur individuel, immatriculée sous le Siren est active depuis 35 ans. Domiciliée à ECROSNES, elle est spécialisée dans le secteur d'activité de la culture de céréales (à l'exception du riz), de légumineuses et de graines oléagineuses.","architecture":"GALLARDON, la tour dite de lÉpaule, est un donjon féodal du XIIe siècle, témoin d'une place forte médiévale, classé monument historique en 1913,  construit en pierres meulières, le donjon servait de vigie pour surveiller les alentours de Gallardon et de logis aux gardes. Les murs avaient une épaisseur de 4,50 m et le diamètre extérieur de la tour atteignait 18 m. En 1443, durant la Guerre de Cent Ans, le château fut repris aux Anglais par les troupes du comte de Dunois. Le château fut soumis à des tirs de bombardes tellement puissants que la plus grande partie des murs furent abattus. La tour fut minée et seul en demeure une ruine dune hauteur de 38 m, appelée Épaule, composée d'une importante portion de couronne de maçonnerie de blocage et de quelques éléments de pierre appareillée et des mâchicoulis. L'édifice est classé au titre des monuments historiques en 1913","habitants":"Seigneur locaux\r\n        \"","divers":"Ecrosnes- Jonvillier GPS :48° 32' 45\" Nord, 1° 43' 42\" Est                           Gallardon  gps 48°31'34.5\"Nord ,1°41'14.6\"Est","gps":"48° 32' 45\" Nord, 1° 43' 42\" Est                           G","images":["../../jctruffet.com/image/image_28/28_Jonvilliers_1.jpg","../../jctruffet.com/image/image_28/28_Jonvilliers_2.jpg","../../jctruffet.com/image/image_28/28_Jonvilliers_3.jpg","../../jctruffet.com/image/image_28/28_Jonvilliers_4.jpg"]},"Consult_chateau_formulaire61c2":{"id":"Consult_chateau_formulaire61c2","dept":"28","canton":"Nogent-le-Rotrou","commune":"La-Loupe","nom":"La_Loupe","type":"Château","periode":"XV-XVI","histoire":"La LOUPE, a appartenu aux comtes de Blois, puis aux comtes de Sancerre, en 1152 décès de Thibault le Grand du comte de Chartres qui possédait le château,  et enfin à la Famille de Melun.  des Préaux et de la Rivière Simon III de Melun vendit, en 1383, le domaine, à Renaud II d'Angennes qui le transmit à son fils; Jean Ier d'Angennes. Madeleine d'Angennes apporta le Domaine en dot à son mari, le maréchal-duc de La Ferté-Senneterre  En 1665, le maréchal de La Ferté Senneterre  fit construire le château actuel sur des plans de Vauban.  Le marquis de La Ferté-Sénectère émigra hors de France, pour sauver sa vie et sa famille.   En 1670, Charles d'Angennes vendit la seigneurie de Maintenon à Françoise d'Aubigné, veuve Scarron, qui épousa plus tard Louis XIV. La famille de La Ferté Saint Nectaire resta en possession de La Loupe jusqu'en 1790. Le domaine leur fut confisqué durant la Révolution et le marquis de La Ferté émigra.","architecture":"LA LOUPE, du château, il reste un grand corps de logis dont la façade du côté ville est austère ; côté parc, un corps en avancée s'orne à chaque étage de deux niches encadrant la grande baie. Le 1er juin 1811, l'Empereur Napoléon 1er et l'Impératrice Marie-Louise furent reçus à La Loupe, ce qui occasionna une dépense à laquelle durent contribuer les communes les plus riches de l'arrondissement. La commune a racheté le château et le parc, et La Loupe coule aujourd'hui des jours paisibles. Puis au XVe siècle, les Anglais détruisirent le manoir féodal. En 1574, Le Seigneur d'Angennes organisa des travaux importants pour faire agrandir et embellir le château de la Loupe, où le château de la Loupe sera confisqué.  La Loupe fut alors érigée en canton. Amputé de plusieurs de ses bâtiments, il ne reste aujourd'hui qu'un grand corps de logis occupe un terre-plein ceint de douves maçonnée.  l'édifice élevé sur deux niveaux, il est percé sur chacune de ses façades principale de hautes fenêtres rectangulaires, un avant corps , coiffé d'un fronton triangulaire occupe le centre  de la composition. Sur la façade côté parc des niches qui abritaient  des statues aujourd'hui disparues sont disposées de part et d'autres de la travée centrale. La Commune de La Loupe a racheté le château de la Loupe et son parc, en 1949 et, en est devenu propriétaire.","habitants":"Maréchal-Duc de La Ferté-Senneterre \r\n        \"","divers":"La_Loupe        GPS : 48° 28' 8,97\" Nord,1° 0' 54,61\" Est","gps":"48° 28' 8,97\" Nord,1° 0' 54,61\" Est","images":["../../jctruffet.com/image/image_28/28_La_Loupe_1.jpg","../../jctruffet.com/image/image_28/28_La_Loupe_2.jpg","../../jctruffet.com/image/image_28/28_La_Loupe_3.jpg"]},"Consult_chateau_formulairef2c1":{"id":"Consult_chateau_formulairef2c1","dept":"28","canton":"Châteaudun","commune":"Lanneray","nom":"Lanneray","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux dans cet article; Touche-Hersans, Bourgoin et Sainte -Radegonde.                                                                                                         TOUCHE-HERSANS, un site féodal qui a conservé tous ses atours défensifs : douves, tourelles, meurtrières, poternes etc. Autant d'éléments qui racontent une autre époque. Autrefois seigneurie importante, le site conserve d'imposantes douves du XIIIe siècle, de profonds fossés à \"fond de cuves revêtues de pierres\" et une poterne, porte monumentale surveillée par des tourelles. Aux angles des tours, avec leurs meurtrières, désespèrent de voir arriver un nouvel assaut. Le château est cité dans un document datant de 1326.                                                                                                          BOIS-BRERTRAND, a été édifié au XIXe siècle dans une clairière entaillant un vaste massif boisé. L'ancien parc, qui s'ouvrait au nord ouest en direction du village, a été presque entièrement mis en culture. On devine l'ancienne fonction de cet espace par les bosquets et sujets arborescents remarquables qui restent : cèdres, séquoias, pins. Seuls les abords du château ont été conservés en pelouses. La demeure est peu visible depuis les alentours. Seule la bordure ouest est dégagée et permet à l'observateur, situé à Lanneray, de contempler le château de Bois Bertrand. De ce dernier, part une très longue allée, d'environ deux kilomètres, qui traverse successivement un massif boisé et une zone agricole..","architecture":"BOURGOIN, le château de Bourgoin est un château bâti à Lanneray,  La construction date du XIXe siècle. Il  en existe plusieurs  sur la commue : Le château de la Courangère, du Boulay-Saint-Clair.                                                                                                                                      Sainte-RADEGONDE, fut construit au XVIIe siècle et doit son nom, Sainte-Radegonde, à une chapelle mentionnées dès 1529 et aujourd'hui détruite. La demeure est située à moins de deux kilomètres de Lanneray, elle est d'un aspect simple avec toiture en ardoise, une façade en briques rouges et  avec ses communs, au coeur d'un massif boisé. L'édifice se compose d'une cour carrée que des fossés larges et profonds le limitent au sud. Un petit pont et une grille de fer forgé permettent l'accès à l'entrée du château. De le grille on observe une longue et belle allée qu'une futaie ancienne borde des deux côtés. Le boisement est composé pour l'essentiel de feuillus et offre une remarquable variété de merisiers, chênes, érables, châtaigniers, tilleuls et alisiers composent une remarquable palette de couleurs. Entre le château et une pièce d'eau, s'étend une pelouse rectangulaire entourée d'allées ombragées par de très beaux platanes et sapins.                                                                             TOUCHE-HERSANS  le château féodal primitif n'aurait pas résisté aux destructions commises pendant la Révolution. Au XVIIIe siècle, à ses ruines substitue un nouveau château. Enfin le site reçoit un bâtiment conventuel du XVIe siècle. Éléments protégés MH : les façades et les toitures de la poterne d'entrée, de la tour Est, la tour Ouest, du corps de logis, du bâtiment du XVIe siècle et de la chapelle, les douves : inscription par arrêté du 22 juin 1982.","habitants":"Seigneurs  locaux\r\n        \"","divers":"Trois châteaux dans cet article; Touche-Hersans grav 1-2, Bourgoin grav-3 et Sainte -Radegonde grav-4.   Bois-Bertrand-5-6                                                                                 Bourgoin GPS : 48° 41' 09\" Nord, 0° 53' 21\" Est","gps":"48° 41' 09\" Nord, 0° 53' 21\" Est","images":["../../jctruffet.com/image/image_28/28_Lanneray_1.jpg","../../jctruffet.com/image/image_28/28_Lanneray_2.jpg","../../jctruffet.com/image/image_28/28_Lanneray_3.jpg","../../jctruffet.com/image/image_28/28_Lanneray_4.jpg","../../jctruffet.com/image/image_28/28_Lanneray_5.jpg","../../jctruffet.com/image/image_28/28_La
