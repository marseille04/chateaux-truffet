const FULL={"Consult_chateau_formulaire34a7":{"id":"Consult_chateau_formulaire34a7","dept":"69","canton":"Neuville-sur-Saône","commune":"Albigny-sur-Saône","nom":"Albigny","type":"Château","periode":"XIII","histoire":"ALBIGNY, le fief à l'origine appartenait à la famille d'Albon, le château fut construit au XIIe siècle par  le sénéchal Dalmace Morel, puis passa aux chanoines Jacques de Semur et à Jacques de la Fayette qui ces derniers apporteront des modifications ainsi que le chanoine Louis de la Barge et  Guillaumme d'Alban en 1628, ce château est resté dans le domaine ecclésiastique jusqu'en 1844,  revendu au maire Gandillon qui le lègue à la commune et servira de mairie de 1844 à 1906, serait devenu maison de retraite.","architecture":"Albigny, château du XIIe siècle doté d'une enceinte au XIIIe siècle, de plan en L, avec donjon  de 7,20 m de côté et 20 m de haut des fenêtres et des portes furent percés au XVe au XVIe siècle  toiture refaite, l'église Sainte-Blaise accolée au château demeurera le siège de la paroisse jusqu'en 1844.","habitants":"Famille de Dalmace Morel\r\n        \"","divers":"Château d'Albigny","gps":"","images":["../../jctruffet.com/image/image_69/69_Albigny_1.jpg","../../jctruffet.com/image/image_69/69_Albigny_2.jpg","../../jctruffet.com/image/image_69/69_Albigny_3.jpg"]},"Consult_chateau_formulaireec0f":{"id":"Consult_chateau_formulaireec0f","dept":"69","canton":"Anse","commune":"Alix","nom":"Alix_Marze","type":"Château","periode":"XV","histoire":"ALIX, avant la Révolution Alix dépendait  de Marcy ; prieuré de l'abbaye de Savigny, le fameux chapitre  des nobles chanoines qui furent protégés par François Ier, Henri IV et Louis XV un séminaire fut construit, transformé en hôpital militaire en 1944, ensuite asile pour vieillards et hôpital gériatrique aujourd'hui. Du château fort construit sous Philippe Auguste qui appartenait aux seigneurs de Marzé il ne reste qu'une tour accolé à un bâtiment.               Château de MARZE; seigneurie cité en 1040  faisait partie de la paroisse de Merey sur Anse  sur une colline reste de vestiges (légende de la demoiselle morte).","architecture":"Marzé, du château il ne reste que quelques pans de murs et une tourelle tronquée avec un curieux toit à casquette.","habitants":"Seigneur de Marzé \r\n        \"","divers":"Vestiges du château de Marzé et l'hopital militaire.","gps":"","images":["../../jctruffet.com/image/image_69/69_Alix_Marze_1.jpg","../../jctruffet.com/image/image_69/69_Alix_Marze_2.jpg","../../jctruffet.com/image/image_69/69_Alix_Marze_3.jpg"]},"Consult_chateau_formulaired1cf":{"id":"Consult_chateau_formulaired1cf","dept":"69","canton":"Amplepuis","commune":"Amplepuis","nom":"Amplepuis","type":"Château","periode":"XV","histoire":"AMPLEPUIS, au Xe siècle possession de l'Abbaye de Savigny, puis fut le  siège  d'une châtellenie  des seigneurs de Beaujeu, cité dès le XIIe siècle dont le village subit de nombreux dégâts par les Tards-Venus (brigands) et les guerres de religion et cette ville était surtout lié  à partir du XVI et XVIIe siècle à celle de l'industrie du textile ce qui apporta de nombreux châteaux.                               CRET, fin XIXe siècle postiche renaissance.                              GOUTTE, tour du XIIIe siècle.                                           MONTCHERVET, aujourd'hui ferme agricole (tours).                              REBE, châtellenie des sires de Beaujeu puis à Claude Rebe en 1675 fief des Rebe fut érigé en marquisat et devient la propriété du marquis de Sausey qui la conservera jusqu'à la Révolution.  SARRON, dont le propriétaire seigneur des forges et écuyer.","architecture":"Cret,  manoir carré à trois niveaux du XIXe siècle avec postiche renaissance.                                                                                    Goutte,  manoir quadrangulaire avec tour du XIIIe siècle.                          Montchervet, transformé en ferme,enceinte quadrangulaire avec porche d'entrée","habitants":"Famille de Guichard d'Oingt\r\n        \"","divers":"Châteaux de Duratour, de Cret, de Goutte, de Rebe et de Sarron","gps":"","images":["../../jctruffet.com/image/image_69/69_Amplepuis_1.jpg","../../jctruffet.com/image/image_69/69_Amplepuis_2.jpg","../../jctruffet.com/image/image_69/69_Amplepuis_3.jpg","../../jctruffet.com/image/image_69/69_Amplepuis_4.jpg","../../jctruffet.com/image/image_69/69_Amplepuis_5.jpg"]},"Consult_chateau_formulaire0062":{"id":"Consult_chateau_formulaire0062","dept":"69","canton":"Condrieu","commune":"Ampuis","nom":"Ampuis","type":"Château","periode":"XVII","histoire":"AMPUIS, fief des Ampuis au XIVe siècle qui possédait deux maisons fortes, une sur la colline sous le nom de la \"Garde\"  et l'autre au bord du Rhône appelé  \"château Bas\" cette seigneurie passa par alliance,  fin XIVe siècle au Maugiron qui gardèrent cette seigneurie jusqu'en 1755. Un Guy de Maugiron  fit carrière dans les armes sous François Ier, son fils  Laurent de Maugiron fit également carrière militaire et général gouverneur du Dauphiné et de Bourgogne et conseillé du roi dut combattre à plusieurs reprises le Baron des Adrets. C'est son fils Timoléon qui fit du château au XVIe siècle son aspect actuel, Timoléon épousa Françoise de Tournon en 1587 et après son décès il épousa en 1602 Jeanne de Sassenage; à la mort du dernier descendant de cette famille le château fut hérité par un oncle, Louis de Maugiron qui le conservera jusqu'en 1755 qui passera en adjudication à Louis-Hector-Marie Harenc de la Condamine député de la noblesse en 1789 décède en 1794 son fils conserva le château transmit a ses deux filles qui décèdent sans postérité, Léonor de Cibiens en hérite sera vendu en 1895 à un marchand stéphanois André Marie Fustier qui le garderont jusqu'en 1941 et le cède à un industriel Jack Vial président directeur d'une  société  et en 1995 acquis par la famille Guigal qui feront sa restauration.","architecture":"Ampuis, édifice du XIIIe siècle à l'origine maison forte quadrilatère avec tours en angles, dont  subsiste la tour ronde dite \"rouge\" et la tour \"grise\" après les diverses transformations qui l'on dépouillé des éléments médiévaux; donjon, fossés et pont-levis, le corps de logis et avant corps du XVIIe siècle, aujourd'hui d'un seul tenant, de forme allongée à deux niveaux avec attiques les dépendances forment l'équerre avec jardin et parc côté Rhône.","habitants":"Famille Maugiron                                                                             Famille Harenc\r\n        \"","divers":"Château d'Ampuis.","gps":"","images":["../../jctruffet.com/image/image_69/69_Ampuis_1.jpg","../../jctruffet.com/image/image_69/69_Ampuis_2.jpg","../../jctruffet.com/image/image_69/69_Ampuis_3.jpg"]},"Consult_chateau_formulairec6e7":{"id":"Consult_chateau_formulairec6e7","dept":"69","canton":"Anse","commune":"Anse","nom":"Anse","type":"Château","periode":"XII","histoire":"ANSE, dans cette commune plusieurs châteaux dont le plus anciens \"des Tours\"  ancienne forteresse deux tours  sur un corps de logis construit au XIIe siècle par Renaud de Forez comte et archevêque de Lyon, c'est dans ce château ou vécut le fameux  Seguin de Badefol (Brigand), racheté par la commune à la Révolution, a servit d'école, de prison, de gendarmerie et de justice de paix sert d'hôtel de ville.                                                    MESSIMIEUX,  du XVII-XVIIIe siècle transformé aujourd'hui  en établissement pour personne agées EHTAP.                                \r\nA deux Km au sud dans la commune de Lachassagne  Le château de Lachassagne est bâti en 1830 sur les ruines d'un château médiéval par la famille de Rochechouart de Mortemart, dont les armes ornent la façade. L'édifice possède une longue tradition viticole puisque le vignoble, le cuvage et les chais ont été aménagés et développés dès 1777. Aujourd'hui, le domaine se consacre encore à la production de vins.","architecture":"Anse, château des tours, construit au XIIe siècle, de style forteresse qui était flanquée de huit tours  et percée de deux portes il ne reste qu'un corps de  logis  rectangulaire à deux niveaux entre deux tours,  une grosse tour demi-cylindrique et d'une tour ronde \"donjon\" haut de 23 mètres à toit plat, plusieurs fois remanié.                               Messimieux; corps de logis imposant avec fronton flanqué de tours carrées crénelées aux extrémités.","habitants":"Famille de Renaud de Forez.     \r\n        \"","divers":"Vestiges du châteaux d'Anse et château de Messimieux.                             Lachassagne Village et son château","gps":"","images":["../../jctruffet.com/image/image_69/69_Anse_1.jpg","../../jctruffet.com/image/image_69/69_Anse_2.jpg","../../jctruffet.com/image/image_69/69_Anse_3.jpg","../../jctruffet.com/image/image_69/69_Anse_4.jpg","../../jctruffet.com/image/image_69/69_Anse_5.jpg","../../jctruffet.com/image/image_69/69_Anse_6.jpg"]},"Consult_chateau_formulaire1631":{"id":"Consult_chateau_formulaire1631","dept":"69","canton":"Arbresle","commune":"Arbresle","nom":"Arbresle","type":"Vestiges","periode":"XV","histoire":"ARBRESLE, dès le Xe siècle dépendait de l'abbaye de Savigny, les Abbé-chanoines  étaient seigneurs jusqu'à la Révolution; l'abbé Delmace fit construire au Xe siècle le château et les  trois remparts; celui du château, celui des Vingtain et celui du faubourg qui encerclait la ville. Les Tard-Venus \"brigands\" saccagèrent la ville  en 1361 puis envahit en 1430 par les ducs de Bourgogne, mis à sac de nouveau dévasté en 1562 par le baron des Adrets.         A la Révolution le château fut vendu comme bien national à Mme Claude Lacroix qui le revendit en 1825 à Mr  Antoine Billet  un négociant lyonnais qui sans scrupule détruisit une partie des fortifications et les vestiges de la tour ouest ; aux abords du Vingtain il reste la tour \"d'Odieu\" d'une famille de notable lyonnais les Odieu que l'on peut encore admirer aujourd'hui à l'entrée de la cour date du XVe siècle. En 1852 la partie Sud du château fut vendu à Mr Claude Marillier et la partie Nord fut acquise en 1869 par Mr Fleury Billet qui en fera une école en 1873, en 1889 propriété de Mme Claude Cozona qui racheta aux héritiers ce qui reste pour le restaurer.  En 1890 la partie Ouest fut acheté par Mr Klinque puis revendu à Mr Thollier qui le revendit à son tour à la société des écoles libres. En 1908 classé aux monuments historiques et en 1924 Mme Philibert hérite la part du château de Mr Cozona qui le revendit à Mr Claude Vermorel.","architecture":"Arbresle, le château à l'origine possédait quatre tours carrés dont deux  subsistent et le donjon, l'une intégrée depuis 1954 aux constructions récentes du collége Chamagnat et il reste quelques vestiges de remparts.                                                                                           Flurieux, quadrilatère flanqué en angles de tours rondes.                      Chêne-Verts, quadrilatère flanqué de tours carrées.                      Bellevue; manoir en forme de T fronton en façade.","habitants":"Abbaye de Savigny, de l'abbé Delmace.\r\n        \"","divers":"Vestiges du château avec tour dite D'odieu, le château de Flurieux, du Chêne Verts et de Bellevue.","gps":"","images":["../../jctruffet.com/image/image_69/69_Arbresle_1.jpg","../../jctruffet.com/image/image_69/69_Arbresle_2.jpg","../../jctruffet.com/image/image_69/69_Arbresle_3.jpg","../../jctruffet.com/image/image_69/69_Arbresle_4.jpg","../../jctruffet.com/image/image_69/69_Arbresle_5.jpg","../../jctruffet.com/image/image_69/69_Arbresle_6.jpg","../../jctruffet.com/image/image_69/69_Arbresle_7.jpg","../../jctruffet.com/image/image_69/69_Arbresle_8.jpg","../../jctruffet.com/image/image_69/69_Arbresle_9.jpg"]},"Consult_chateau_formulaire479c":{"id":"Consult_chateau_formulaire479c","dept":"69","canton":"Beaujeu","commune":"Ardillats","nom":"Ardillats","type":"Château","periode":"XV","histoire":"ARDILLATS, à l'époque gauloise, la vallée d'Ordières servait de frontière entre ségusiens (Forez) et Eduens (Morvan) la seigneurie du lieu appartenait aux château des PRES toujours existant mais entièrement reconstruit en 1911.                                                L'ancien château de BOCUSE construit sur le site de l'ancien château des Prés du XVe siècle.  Du XIIIe au XVIe siècle les conflits entre seigneur de Bourgogne et les Beaujeu firent passer les terres de Cenves à la maison de Savoie . La famille Rochebaron propriétaire de Pierreclos et de Berzé, reste maître des lieux de 1539 à 1710 à cette date  Aimé Gabriel Michon achète la seigneurie  et devient baron de Cenves, malgré le remous de la Révolution,  Cenves reste au Michon jusqu'en 1816 puis les terres furent acheté par les habitants locaux.","architecture":"Ardillats, corps de logis de forme rectangulaire à trois niveaux flanqué de deux tours rondes aux extrémités largement remanié.                  Maison forte de Prés de forme quadrangulaire flanqué de tours rondes.","habitants":"Famille Rochebaron\r\n        \"","divers":"Châteaux d'Ardillats et des Prés","gps":"","images":["../../jctruffet.com/image/image_69/69_Ardillats_1.jpg","../../jctruffet.com/image/image_69/69_Ardillats_2.jpg"]},"Consult_chateau_formulaireb339":{"id":"Consult_chateau_formulaireb339","dept":"69","canton":"Belleville","commune":"Charentay","nom":"Arigny","type":"Château","periode":"XIII","histoire":"ARIGNY, au Xe siècle la villa d'Arigny  appartenait à la famille de Beaujeu; Beraud de Beaujeu hérita au XIe siècle, ce dernier au retour de croisade fit construire le château, en 1243 le château est vendu à un bourgeois de Montbrison  Guillaume du Vernet, en 1455, le château passa  aux Virols, puis de 1540 à 1742 aux Camus qui possédait déjà Châtillon d'Azergues et au seigneur de Bagnols qui  remania le donjon, On prétend que la tour dite des \"Sept Béatitudes ou de l'Alchimie \" a accueilli les chevaliers du temple et qu'ils y auraient caché le fameux trésor des Templiers, information donné par Jacques de Molay lors de son dernier soupir à l'oreille de Guichard de Beaujeu, il fut acheté en 1883 par les Chambrun d'Uxeloup de Rosemont qui entreprirent des fouilles, le château  serait toujours dans la descendance.                      TOUR DE LA BELLE MERE qui fut érigée au XIXe siècle  par une belle mère soucieuse de surveiller les activités (réputées galliardes) de son gendre dans les vignes.","architecture":"Arigny, conserve d'importants éléments architecturale féodale, immense résidence quadrilatère haute tour octogonale dite  des Sept Béatitudes ou de l'Alchimie, enceinte qui possédait vingt-deux  tours rondes, trois subsiste, avec douves et trois pont-levis.                  Château de Sermezy, construit au XVIIIe siècle classique.                   Manoir d'Armas en ruine.                                                            \r\nTour de la Belle-mère du XIXe siècle de 35 mètres de Haut.","habitants":"Comte J. de Rosemont\r\n        \"","divers":"Châteaux d'Arigny,de la Giraudière et la tour des Belles-mères.","gps":"","images":["../../jctruffet.com/image/image_69/69_Arigny_1.jpg","../../jctruffet.com/image/image_69/69_Arigny_2.jpg","../../jctruffet.com/image/image_69/69_Arigny_3.jpg","../../jctruffet.com/image/image_69/69_Arigny_4.jpg","../../jctruffet.com/image/image_69/69_Arigny_5.jpg","../../jctruffet.com/image/image_69/69_Arigny_6.jpg"]},"Consult_chateau_formulaire9a29":{"id":"Consult_chateau_formulaire9a29","dept":"69","canton":"Villefranche-sur-Rhône","commune":"Arnas","nom":"Arnas_Longsard","type":"Château","periode":"XVII","histoire":"LONGSARD, du XVIIIe siècle construit par Charles-Marie de Brun conseillé du roi et maître des eaux et forêts de la Provence de Beaujolais, transformé en chambres d'hôtes par la famille du Mesnil du Buisson.                                                                               Dans la commune le château de la GRANGES-PERRET et le château des RUES.","architecture":"Longsard, château du XVIIIe siècle corps de logis rectangulaire à trois niveaux  flanquait de deux pavillons en retrait avec clochetons sur partie centrale en retrait.                                                          \r\nManoir du Sauzet quadrangulaire flanqué de tour ronde d'entrée tourelle et donjon carré.                                                     Château de Granges-Perret corps de logis carré flanqué d'une tour ronde.  Château des rues corps de logis rectangulaire massive à trois niveaux.","habitants":"Famille de Charle-Marie de Brun\r\n        \"","divers":"Châteaux de Longsard de la Grange-Perret et des Rues.","gps":"","images":["../../jctruffet.com/image/image_69/69_Arnas_Longsard_1.jpg","../../jctruffet.com/image/image_69/69_Arnas_Longsard_2.jpg","../../jctruffet.com/image/image_69/69_Arnas_Longsard_3.jpg","../../jctruffet.com/image/image_69/69_Arnas_Longsard_4.jpg","../../jctruffet.com/image/image_69/69_Arnas_Longsard_5.jpg","../../jctruffet.com/image/image_69/69_Arnas_Longsard_6.jpg"]},"Consult_chateau_formulairea6d8":{"id":"Consult_chateau_formulairea6d8","dept":"69","canton":"Monsols","commune":"Azolette","nom":"Azolette","type":"Château","periode":"XVI","histoire":"AZOLETTE, s'appelait autrefois \"Saint-Igni de Vers\"  qui fut rebaptisé à la Révolution \"Vers la Montagne\". Au XIIe siècle le territoire s'étendait en Beaujolais et une partie du Maconnais dépendait de la châtellenie de Chevagny-Lombard à Aigueperse. En 1288 le comte Louis de Beaujeu fait don de la châtellenie aux Chanoines d'Aigueperse.                                                                  Dans la commune le Château de CROS, hameau de Proprières  construit en 1870, viticole et hôtel restaurant.                     \r\nChâteau de PLUMET de la famille Perroy et château de LACROIX.","architecture":"Azolette; manoir de Lacroix quadrangulaire flanqué d'une tour ronde. Porte d'entrée du Château des Cros  qui possède un donjon en angle prolongé d'un corps de logis terminant par un pavillon carré à l'entrée également.","habitants":"Sires de Beaujeu\r\n        \"","divers":"Château de Lacroix et château de Cros","gps":"","images":["../../jctruffet.com/image/image_69/69_Azolette_1.jpg","../../jctruffet.com/image/image_69/69_Azolette_2.jpg","../../jctruffet.com/image/image_69/69_Azolette_3.jpg","../../jctruffet.com/image/image_69/69_Azolette_4.jpg","../../jctruffet.com/image/image_69/69_Azolette_5.jpg"]},"Consult_chateau_formulaire9b9d":{"id":"Consult_chateau_formulaire9b9d","dept":"69","canton":"Oullins","commune":"Ste-Foy-les-Lyon","nom":"Bachasse","type":"Château","periode":"XIX","histoire":"BACHASSE, Pierre Giry chevalier Baron de Vaux propriétaire des lieux en 1732, en 1874 racheté par Antoine Heris bourgeois de Lyon, le revend en 1831 à Jean-Baptiste Gerbe des Tours, soyeux lyonnais, puis passa par alliance à Antoine Alexandre Giraud  qui envisage la construction  du château actuel. En 1947 Noémie Giraud petite-fille et veuve d'Henri Mathée de Valfons qu'elle avait épousé  en 1899 vend le domaine à la SNCF qui ces derniers le confit à AGEFOREL qui le gère.","architecture":"Bachasse, du XIXe siècle, corps de logis rectangulaire flanqué en façade de deux  pavillons carrés en angles avec perron en façade à balustrade escalier en fer à cheval.","habitants":"Famille d'Antoine-Alexandre Giraud \r\n        \"","divers":"Château de Bachasse","gps":"","images":["../../jctruffet.com/image/image_69/69_Bachasse_1.jpg"]},"Consult_chateau_formulaire9ea2":{"id":"Consult_chateau_formulaire9ea2","dept":"69","canton":"Le Bois-d`Oingt","commune":"Bagnols","nom":"Bagnols","type":"Château","periode":"XV","histoire":"BAGNOLS, château du XIIIe siècle aurait été construit par la famille Guichard d'Oingt passa ensuite par alliance en 1289 aux seigneurs  de Saint-André  et aux seigneurs d'Albon et cent cinquante ans après aux Balzac d'Entraygues Geoffroy de Balzac fit construire le château. Au XVe siècle le château fut acheté par Jean Camus marchand en 1619 Gaspard Dugué devient propriétaire, son fils  a épousé Marie-Angélique Turpin de Vauredon reçoit régulièrement la comtesse de Sévigné.    Le château fut acheté  en 1751 par Jean-Baptiste Croppet de Varissan puis par alliance passa aux saint-Trys en 1786. En 1872 les biens sont acquis par Antoine Morand de Jouffrey avocat à la cour de Paris, qui le revend peu de temps après  en 1881 à Jules Lucien Chevalard, passe en 1899 a Joseph Betechoux de Chavannes, dont la famille  garde le château jusqu'en 1980 et ce dernier  fut acquis par la famille Roche et le revend sept ans après  a un anglais Paul Hamlyn  qui sera transformé en hôtel de luxe par sa seconde épouse Helen Guest  et revendront en 2007 au groupe hôtelier Von Esson.","architecture":"Bagnols, bâtisse massive de forme pentagonale irrégulier, quatre corps de logis  flanqués de cinq tours circulaires qui possédaient des mâchicoulis, aujourd'hui arasées du XVe siècle, une cour rectangulaire enserré par les corps de logis et entourés de douves franchissables par ponts à arches, trois tours dominent le mur de clôtures et un pigeonnier du XVIIe siècle. Château remanié au XVIe siècle et XXe siècle.","habitants":"Famille d'Oingt                                                                       Famille de Géoffroy de Balzac\r\n        \"","divers":"Château de Bagnols.","gps":"","images":["../../jctruffet.com/image/image_69/69_Bagnols_1.jpg","../../jctruffet.com/image/image_69/69_Bagnols_2.jpg","../../jctruffet.com/image/image_69/69_Bagnols_3.jpg","../../jctruffet.com/image/image_69/69_Bagnols_4.jpg","../../jctruffet.com/image/image_69/69_Bagnols_5.jpg"]},"Consult_chateau_formulaire367e":{"id":"Consult_chateau_formulaire367e","dept":"69","canton":"Limonest","commune":"Limonest","nom":"Barolliere","type":"Château","periode":"XVII","histoire":"BAROLLIERE; daniel pilotte de la Barolliere  qui a appartenu à mon ancêtre pilotte de la Barolliere, en 1750 lorsque mes aïeux Abraham Pilotte seigneur de la Barolliere et son fils Alphonse Henri Charles pilotte de la Barolliere ils ont vendu le château ils ont décidé que,  les futurs acheteurs pouvaient appeler le château de la Barolliere et non Pilotte de la Barolliere puisqu'ils ne peuvent pas prétendre être des héritiers de mes ancêtres Pilotte de la Barolliere  a savoir Jean Maritz a récupéré le titre de la Barolliere car il était marié à la fille de mon ancêtre Abraham Pilotte seigneur de la Barolliere en juin 2021 j'ai rencontré à Limonest monsieur Xavier Neyrand propriétaire du château de la Barolliere avec monsieur Xavier Neyrand nous avons les mêmes documents officiels  en août 2020 j'ai eu un article dans le quotidien l'est républicain sur mon ancêtre Jacques Marguerite pilotte de la Barolliere :un militaire à succès en bas de la page à droite il est mentionné  informations receuillis par moi-même Daniel Pilotte de la Barolliere                                                               \r\nDans cette commune cinq autres châteaux, FORGE avec tourelle du XVIe siècle, ROUSSELIERE,  SANDAR transformé en lycée agricole, la SAINTE-REINE et le SANS-SOUCIS, ce château a appartenu à la famille de Roux de Bezieux au XIXe siècle et en 1972 acquis par un promoteur qui le revendit à une société pour faire une école.","architecture":"Barollière; de plan quadrangulaire  a trois niveaux flanqué de tours carrées en angles, la galerie à arcades remonte au XVe siècle                         Rousselière; manoir restauré à tours rondes en angles tour de Guet hexagonale à poivrières.  Ars du XVe siècle.                          Forge  à tourelle du XVIe siècle. Sandars; maison-forte  du XVe siècle deux tours quadrangulaires dont une fait office de donjon à poivrières aux angles. Château sans soucis, construit aux XVIIIe siècle sur l'emplacement d'une maison-forte, corps de logis rectangulaire à trois niveaux accolé à deux pavillons carrés sur la même façade.","habitants":"Familles des Villiers et Jean Maritz \r\n        \r\n        \r\n        \r\n        \"","divers":"Châteaux de la Barollièr e de Saint-Jean de Lyon passera ensuite à la famille La Tour, puis les Alleman puis à Richard de la Feuillade, à la famille de Bron. En 1510 passe à son neveu  seigneur de Liègue qui gardera cette seigneurie jusqu'en 1627 et qu'il échangera les terres de la Bâtie  avec François Camus contre celle de de la baronnie de Riverie. Ce dernier n'ayant pas eu de descendance cédera ses seigneuries à Hugues Joseph de Valernod  qui passera  à Augustin de la Baume, marquis de Roque-Pluvinel, toujours dans la descendance.                                                                          Dans la commune  Chapelle et donjon de ROCHEFORT (voir article) et cité médiévale de la RIVERIE, situé sur une arête rocheuse pour contrôler l'unique passage entre le sud du Lyonnais et du Forez.","architecture":"La Bâtie, corps de logis massif rectangulaire à trois niveaux en fond de cour flanquée sur la façade postérieure de deux importantes tours rondes, château remanié  au XVI -XVIIIe siècle.","habitants":"Seigneurie  de Pons de la Bâtie\r\n        \"","divers":"Château de la Bâtie","gps":"","images":["../../jctruffet.com/image/image_69/69_Batie(69)_1.jpg","../../jctruffet.com/image/image_69/69_Batie(69)_2.jpg"]},"Consult_chateau_formulaireffe1":{"id":"Consult_chateau_formulaireffe1","dept":"69","canton":"Beaujeu","commune":"Beaujeu","nom":"Beaujeu","type":"Vestiges","periode":"X","histoire":"BEAUJEU, capitale historique du Beaujolais; de la seigneurie des Beaujeu au château Pierre-Aiguë, le premier seigneur des Beaujeu Berard en 950. Jusqu'au XVe siècle l'histoire se confond avec celle de ses seigneurs, vassaux turbulents de cette vieille famille qui remonte au Xe siècle tel que le fut le cas de Humbert IV entre 1175-1185 ou le fidèle Humbert V, connétable de France de 1248 à 1250, et Antoine compagnon d'armes de Du-Guesclin. Devient la propriété des ducs de Bourbon en 1473. De Beaujeu on ne peut pas oublier le souvenir d'Anne de Beaujeu appelée \"Madame la Grande\" née en 1460  elle est la fille aînée du dauphin Louis, futur roi Louis XI, a quatorze ans elle est marié à Pierre de Beaujeu fils cadet du duc de Bourbon qui lui a trente six ans, malgré cela le couple est trés unis, en 1483 à la mort de Louis XI la régence du royaume de France qui sait s'imposer à garder la paix et fut généreuse  pour le peuple et fit développer la croissances des châteaux et églises en Beaujolais, elle donne ses armes à Villefranche  en 1514 et la nomme capitale du Beaujolais, en 1557 François Ier s'empare de la région qui est rattaché au Valois  avant que Louis de Bourbon-Montpensier  ne récupère  son héritage en 1580. La descendance  Marie de Bourbon de Montpensier épouse Gaston d'Orléans dont elle a une fille unique Anne-Marie-Louise d'Orléans duchesse de Montpensier et baronne du Beaujolais, plus connus sous le nom de la Grande Demoiselle, à sa mort elle fait de Philippe d'Orléans frère de Louis XIV l'héritier de tous les biens le dernier baron du Beaujolais,  meurt à l'échafaud en 1793.                              Dans cette commune le château des CROTS du XVIe siècle.","architecture":"Beaujeu, la forteresse des sires de  Beaujeu du Xe siècle sur la montagne Saint-Jean fut détruite en 1611 sur ordre de Richelieu. vestiges d'un passage à arc boutant servant de porte.                CROTS du XVIe siècle à quatre tours carrées.","habitants":"Comtes de Beaujeu\r\n        \"","divers":"Château de Beaujeu et de Montgolfier","gps":"","images":["../../jctruffet.com/image/image_69/69_Beaujeu_1.jpg","../../jctruffet.com/image/image_69/69_Beaujeu_2.jpg","../../jctruffet.com/image/image_69/69_Beaujeu_3.jpg"]},"Consult_chateau_formulaireca2b":{"id":"Consult_chateau_formulaireca2b","dept":"69","canton":"St-Genis-Laval","commune":"St-Genis-Laval","nom":"Beauregard(69)","type":"Vestiges","periode":"XII","histoire":"BEAUREGARD, au XVe siècle Gaspard de Chanvey était châtelain de St  Genis-Laval qui ce dernier fit construire le domaine sur les terres de Jacques d'Amoncour comte de Lyon,  passa ensuite à la famille de Gadagne banquier Florentin, Thomas  en fit sa résidence d'été y reçu le roi Charles IX et de la cour de France en 1525 et en 1526  le domaine fut vendu à Pierre seigneur de Beauregard,  il reçu lors d'un  passage la reine Catherine de Médicis. Pierre vendra en 1661 le domaine à la famille Fizicat qui le  garde jusqu'en 1812.    En 1978 Jean Ricard dernier propriétaire  le cède à la ville qui l'aménagera en jardin public.","architecture":"Beauregard, il ne restera que quelques pans de murs et des soubassements  du bâtiment qui était de forme rectangulaire qui s'étage sur plusieurs niveaux; des fortifications, il reste autour de l'église quelques vestiges des premières fortifications du XIIIe siècle, les jardins en terrasses sont d'une beauté utilisé comme parc municipal.","habitants":"Famille de Gaspard de Chanvey\r\n        \"","divers":"Vestiges du château de Beauregard","gps":"","images":["../../jctruffet.com/image/image_69/69_Beauregard(69)_1.jpg","../../jctruffet.com/image/image_69/69_Beauregard(69)_2.jpg","../../jctruffet.com/image/image_69/69_Beauregard(69)_3.jpg"]},"Consult_chateau_formulaire17ba":{"id":"Consult_chateau_formulaire17ba","dept":"69","canton":"Villefranche-sur-Saône","commune":"Blacé","nom":"Blacé","type":"Château","periode":"","histoire":"BLACE, château de PRAVINS connu dès 1251 jusqu'en 1556 à appartenu à la famille de la Bessée, puis passa à Louis Gaspard vers 1730, remanié   par ses propriétaires  de monsieur Brossard. COURAGOD, Mme Alphonsine  Mechet,  possédait le château de Savigny, veuve, elle légua à la commune  une somme d'argent et un terrain pour y construire un hospice devant accueillir les malades et les indigents de la région l'ensemble fut construit en 1903 par Mr Perrayon.   Maison forte du PEAGE  du XIVe siècle flanqué de deux tours.   Prieuré de GRAMMONT  monastère vestiges du XIIe siècle fut construit pour  Guichard III Il donna des terres belles et riches et céda une partie des revenus du Péage de Rogneins pour les religieux, pendant six siècles les moines menèrent une vie confortable, aux XVIIIe siècle suite à une mauvaise gestion entraîna son délabrement et fut vendus aux enchères en 1791.                                                                      Château du BOST du XVe siècle de la maison d'Ars à l'époque.Son premier possesseur connu, Jean dArs en \"rendit hommage\" en 1459, en 1502, il appartenait à Lyonnet de Damas, Seigneur de la Bastie et de la Pilonière. Jean de Damas, Seigneur des mêmes terres en fournit le dénombrement le 14 avril 1554, acquis plus tard par la famille de Gaspard, ce fief passa, au siècle dernier aux Daurelle de Terrenoire qui le possédaient encore en 1789.Au moment de la révolution le Château du Bost fut acquis par M. Carrichon, qui fut maire de Blacé de 1801 à 1815. Il est devenu, depuis 1848, la propriété de Madame la Comtesse de Villarson qui la fait notablement agrandir et restaurer.\r\nChâteau MOREL, construit en 1875 par Louis Alfred Victor de Lassucette sous préfet de Villefranche fit don de ce dernier à son amie Jeanne Costal qui épousa à Lyon en 1870 Eugéne-Alexandre-Léon Sibour et à son décés en 1892 le château est acheté par Jacques Morel en 1898.                                                         lHestrange, situé sur les coteaux ouest de la commune, dans le hameau du Paraguard, il y aurait eu à lorigine une tour de guet. Au XVIIIe siècle, on construisit un pavillon de chasse et au XIXe siècle, une jeune veuve voulut donner un style directoire à cette demeure . Deux sphinx rapportés par lun des nombreux résidents se trouvent sur la terrasse. Les arrières grands-parents dAntoine de Saint-Exupéry ont habité ce château. Lactuel propriétaire est le petit cousin (au XVIIe degré) de lillustre écrivain.","architecture":"Pravins, à l'origine maison forte puis château au XVIIIe siècle .             Grammont, il ne reste que des traces du bâtiment du XIIe siècle en corps de logis  rectangulaire avec deux pavillons carrées aux extrémités.                                                                                Manoir du Bost, corps de logis accolé à un pavillon carré                    Manoir de l'Hermitage corps de logis avec au centre une  partie saillante flanquée d'une tourelle ronde en façade.","habitants":"Pravins; Famille de Bessée                                                  \r\nSavigny; Alphonsine Courajod.     \r\n        \"","divers":"Château de Couragod,  de Pravins, de Grammont, de l'Hestrange et du Bost.","gps":"","images":["../../jctruffet.com/image/image_69/69_Blace_1.jpg","../../jctruffet.com/image/image_69/69_Blace_2.jpg","../../jctruffet.com/image/image_69/69_Blace_3.jpg","../../jctruffet.com/image/image_69/69_Blace_4.jpg","../../jctruffet.com/image/image_69/69_Blace_5.jpg","../../jctruffet.com/image/image_69/69_Blace_6.jpg","../../jctruffet.com/image/image_69/69_Blace_7.jpg","../../jctruffet.com/image/image_69/69_Blace_8.jpg","../../jctruffet.com/image/image_69/69_Blace_9.jpg"]},"Consult_chateau_formulaire5c91":{"id":"Consult_chateau_formulaire5c91","dept":"69","canton":"Le Bois-d`Oingt","commune":"Breuil","nom":"Breuil_Bois_Doingt","type":"Château","periode":"XVI","histoire":"PERTONNIERES,  le Breuil, domaine qui fut acquis en 1512 par Michael Hasmacher,  il fit construire le château  de la Pertonnières  qu'il gardera jusqu'à la Révolution et en 1919 sous le nom de Asmaquer, Anne héritière  épousa Jules Dupeuple.                             Deux autres châteaux dans la commune,  vestiges d'un château médiévale.                                                                       \r\nChâteau de RAMBUTEAU et des GRANGES voués à l'agriculture et à la viticulture en EARL par Mr  Rambuteau Mr Lombard et Mr Buffieres depuis 1992.","architecture":"Château des Granges,  donjon carré, accolé au corps de logis, tour ronde et tourelle.                                                                           Château du Breuil, corps de logis rectangulaire en façade, tour carrée saillante en angles à trois niveaux  fronton  sur façade plein cintre saillant.                                                                               \r\n Château de Pertonnières.","habitants":"Famille Michael Hasmacher\r\n        \"","divers":"Château de la Grange et du Breuil.","gps":"","images":["../../jctruffet.com/image/image_69/69_Breuil_Bois_Doingt_1.jpg","../../jctruffet.com/image/image_69/69_Breuil_Bois_Doingt_2.jpg"]},"Consult_chateau_formulaire3811":{"id":"Consult_chateau_formulaire3811","dept":"69","canton":"Vaugneray","commune":"Brindas","nom":"Brindas","type":"Château","periode":"XVI","histoire":"BRINDAS, dépendait des chanoines de saint-Jean qui possédaient le château fort, au Xe siècle l'archevêque de Lyon fit cession, la seigneurie passa aux Seconnay. Un château englobé deux zones Brindas et Messimy fut construit au XVIe siècle par Charles Talaru Chalmazel, il fut racheté par la commune en 1839 pour y installé la mairie et l'école.                                                                        Dans la commune le château de MONPLAISIR du XVII siècle construit par Gaspard de Saconnay avec Chapelle, la maison forte des TOURNELLES du XVIIe siècle au Bouleau avec tourelles rondes portail fortifié exploitation agricole.                                      Maison forte de la PILLARDIERE du XVIe siècle vestiges.","architecture":"Brindas, vaste bâtiment quadrangulaire flanqué à chaque angles d'importantes tours rondes  dont  il ne subsiste que celle du Nord-Est accolé actuellement à l'hôtel de ville.","habitants":"Famille de Charles Talaru Chalmazel\r\n        \"","divers":"Château de Brindas","gps":"","images":["../../jctruffet.com/image/image_69/69_Brindas_1.jpg","../../jctruffet.com/image/image_69/69_Brindas_2.jpg","../../jctruffet.com/image/image_69/69_Brindas_3.jpg"]},"Consult_chateau_formulaire00b1":{"id":"Consult_chateau_formulaire00b1","dept":"69","canton":"Lyon","commune":"Bron","nom":"Bron","type":"Vestiges","periode":"XV","histoire":"BRON, fort de Bron après la guerre de 1870 le gouvernement français envisage de réorganiser la défense, il fait construire entre 1874 et 1879 un fort à l'entrée de Lyon pour y installer 841 personnes et 45 canons, il fut utilisé pendant la guerre de 1914-18 comme site de casernement avec l'aéroport de Bron et en 1942  il fut occupé par les allemands, il fut déclassé en 1963  et acquit par la commune en 1975.                                                           BRON, maison forte à l'origine, les travaux aux cours des ans l'on transformait en demeure bourgeoise, au XIIIe siècle était la propriété de Josselme seigneur de Saint-Symphorien d'Ozon et de Bron, c'est lui qui fit construire la maison forte.                              En 1260 Ysnard chanoine devient seigneur de Bron en 1369 Jean seigneur de Bron et en 1413 un autre Jean en rendit hommage au dauphin Louis et par alliance sa fille qui épousa Jean de Bucrin, elle fut veuve, en 1594 fit don  de la maison forte à son neveu  Gaspard Laube qui cette famille par les alliance garderont cette propriété jusqu'à la Révolution, les propriétaires à cette époque furent arrêtés mais purent s'échapper  et en 1831 à la mort de la marquise, sa maison forte de Bron s'éteint avec la famille de Laube. Ce domaine fut racheté en 1936 par la famille Berliet qui apporta l'aspect d'aujourd'hui.","architecture":"Le château de Bron, ancienne maison forte corps de logis carré à trois niveaux,  il ne subsiste qu'une partie de l'ancien château, des modifications ont été apportées au XIXe siècle  et qui ressemble plus à une maison bourgeoise aujourd'hui.                                                 Fort de Bron, construit en 1870.","habitants":"Famille de Josselme\r\n        \"","divers":"Maison forte de Bron et le fort","gps":"","images":["../../jctruffet.com/image/image_69/69_Bron_1.jpg","../../jctruffet.com/image/image_69/69_Bron_2.jpg","../../jctruffet.com/image/image_69/69_Bron_3.jpg"]},"Consult_chateau_formulaire70a6":{"id":"Consult_chateau_formulaire70a6","dept":"69","canton":"Tarare","commune":"St-Marcel-l`Eclairé","nom":"Buissiere","type":"Château","periode":"XVIII","histoire":"BUISSIERE, ancienne maison forte des Champs dans la  moitié du XVIIIe siècle  de style maison de maître de 1730,  remanié en 1750  par la famille Gayot Mascrany de Buissière.","architecture":"Buissière, construite sur l'emplacement d'une maison forte au XVIIIe siècle a gardé son architecture de l'époque tourelles et tour ronde accolée à un corps de logis rectangulaire à quatre niveaux.","habitants":"Famille Gayot Mascrany de Buissière \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de la Buissière","gps":"","images":["../../jctruffet.com/image/image_69/69_Buissiere_1.jpg","../../jctruffet.com/image/image_69/69_Buissiere_2.jpg"]},"Consult_chateau_formulaire8b00":{"id":"Consult_chateau_formulaire8b00","dept":"69","canton":"Arbresle","commune":"Bully","nom":"Bully","type":"Château","periode":"XV","histoire":"BULLY possession des ducs de Beaujeu et ensuite aux Archevêques de Lyon, restauré par Gaspard de Saint-André.  Au XIVe siècle propriété de la famille de Jarolle jusqu'en 1410 et par alliance passa à la famille des Thorigny et c'est Philippe de Thorigny qui fait construire le château. En 1590 la seigneurie passe à la famille Amyot jusqu'en 1663 qui en cette année Geneviève Amyot par alliance apporte la seigneurie aux  seigneurs de Cibiens, Daniel et Cholier. Après la Révolution la famille de Genissieux achète le château et le revend en 1885 à François Gillet il est toujours dans la famille.","architecture":"Bully, maison forte du XIIe siècle remanié  au XIV-XVe siècle, seul subsiste un massif donjon flanqué d'échauguettes aux angles  et d'une tour hexagonale sur la façade sud, on était rajouté au fils des années des dépendances sur la partie arrière qui dénote un peu le cachet renaissance.","habitants":"Les ducs de Beaujeu\r\n        \"","divers":"Château de Bully","gps":"","images":["../../jctruffet.com/image/image_69/69_Bully_1.jpg","../../jctruffet.com/image/image_69/69_Bully_2.jpg","../../jctruffet.com/image/image_69/69_Bully_3.jpg","../../jctruffet.com/image/image_69/69_Bully_4.jpg"]},"Consult_chateau_formulaire408b":{"id":"Consult_chateau_formulaire408b","dept":"69","canton":"Neuville-sur-Saône","commune":"Caillou-sur-Fontaine","nom":"Caillou_Noallieux","type":"Château","periode":"XV","histoire":"NOALLEUX, ce château appartenait pendant la Révolution à la famille de Fay de Sathonay le comte Nicolas-Jean-Claude de Fay de Sathonay était maire de Lyon de 1762 à 1812. En 1882 Emma de Fargues hérite des Fay de Sathonay, le château étant  la propriété de l'épouse du comte Aymon de Virieu il entra dans  cette famille   qui ce dernier était un ami à Lamartine.                              La seconde partie du XIXe siècle la famille Perpronnet général dans l'aviation acheta le château, qui resta  dans cette famille jusqu'en 1980.                                                                           Dans la commune un autre château, la GRIVE et la maison de la DIME.","architecture":"Noailleux, trois corps de logis  irréguliers  dont celui de la partie central est accolé à une tour ronde.                                                La Grive, tour carré flanqué d'une tour ronde et une échauguette.","habitants":"Famille de Fay de Sathonay\r\n        \"","divers":"Châteaux de Noallieux et de Grive","gps":"","images":["../../jctruffet.com/image/image_69/69_Caillou_Noailleux_1.jpg","../../jctruffet.com/image/image_69/69_Caillou_Noailleux_2.jpg","../../jctruffet.com/image/image_69/69_Caillou_Noailleux_3.jpg"]},"Consult_chateau_formulairec50e":{"id":"Consult_chateau_formulairec50e","dept":"69","canton":"Caluire-et-Cuire","commune":"Caluire-et-Cuire","nom":"Caluire_et_Cuire","type":"Château","periode":"XV","histoire":"CALUIRE et CUIRE, ces deux communes ont fusionnées en 1790 Plusieurs châteaux dont l'hôtel de ville.                                          La  RIVETTE du XVIIe siècle remanié XIXe siècle, la MOIDIERE,  CUIRE du XIVe siècle fut la propriété de Charles Merlino,  VERNAY du XVIIe siècle ,  PLANTIER  et CHENES-VERT  viticole et la maison du docteur Dugougon ou fut arrêté Jean Moulin le 21 Juin 1943.                                                                                Fort de MONTESSUY construit en 1831-1936 n'a jamais servi, propriété de la commune.","architecture":"Caluire et Cuire possède un hôtel de ville, ancien château  qui possède un grand corps de logis à trois niveaux, deux ailes en retour avec fronton plein cintre saillant.                                                          Fort de Montessuy de 1831 n'a jamais servit.","habitants":"Seigneurs locaux\r\n        \"","divers":"Châteaux de Cuire (hôtel de ville), de Dugougon, de la Rivette, de la Moidière et le fort de Montessuy.","gps":"","images":["../../jctruffet.com/image/image_69/69_Caluire_et_Cuire_1.jpg","../../jctruffet.com/image/image_69/69_Caluire_et_Cuire_2.jpg","../../jctruffet.com/image/image_69/69_Caluire_et_Cuire_3.jpg","../../jctruffet.com/image/image_69/69_Caluire_et_Cuire_4.jpg","../../jctruffet.com/image/image_69/69_Caluire_et_Cuire_5.jpg"]},"Consult_chateau_formulaire1f1b":{"id":"Consult_chateau_formulaire1f1b","dept":"69","canton":"Monsols","commune":"Ouroux","nom":"Carelle","type":"Château","periode":"XV","histoire":"CARELLE, au XVe siècle la famille de Nagu reçoit ce fief des sires de Beaujeu pour services rendus. Au XVIe siècle le seigneur de Nagu vend au Du Bost  qui passa ensuite à la famille Carrige.     En 1610 Jean Marie Magnin seigneur de Vert Pré épouse  une des filles de Carrige \"la dame de Carelle\" et en 1717 Jean Magin seigneur de Pierreux, écuyer , la propriété passa à Joseph de la Roche en 1719 et en 1753 Claude Antoine hérite de Carelle, en 1790 Antonette-Françoise de la Roche  héritière épouse son cousin Jean-Marie de la Roche officier.                                            \r\n Après la Révolution le château passe à la famille Bourgeot, puis à  la famille Riboud et en 1904 à la famille Seydoux descendant du comte Durieu de la Carelle au XVIIe siècle cultivateur depuis plus de deux siècle toujours dans la famille.                                  Dans la commune le château d'ARCIS,  d'AVENAS,  LAMBERT du XVIIe siècle  et de GROS-BOIS  du XIXe siècle centre d'hébergement de Jean Claude Mavet.","architecture":"Carelle, fut incendié en 1639, corps de logis quadrangulaire flanqué de  pavillons carrés saillant en entrée,   jardins à la française.                Château d'Avenas quadrangulaire flanqué de tours rondes en angles.               Château Gros-Bois corps de logis rectangulaire à deux niveaux flanqués de deux pavillons saillant rectangulaires sur les côtés.","habitants":"Famille de Nagu\r\n        \"","divers":"Châteaux d'Avenas et du Gros-Bois","gps":"","images":["../../jctruffet.com/image/image_69/69_Carelle_1.jpg","../../jctruffet.com/image/image_69/69_Carelle_2.jpg","../../jctruffet.com/image/image_69/69_Carelle_3.jpg","../../jctruffet.com/image/image_69/69_Carelle_4.jpg","../../jctruffet.com/image/image_69/69_Carelle_5.jpg","../../jctruffet.com/image/image_69/69_Carelle_6.jpg"]},"Consult_chateau_formulaire53ba":{"id":"Consult_chateau_formulaire53ba","dept":"69","canton":"St-Genis-Laval","commune":"Chaponost","nom":"Cartieres","type":"Château","periode":"XVI","histoire":"CARTIERES, au XVIIe siècle Antoine Cartier, leurs filles Françoise et Cécile en héritent et en 1719 Cécile Cartier fait don du Château  à l'hôpital de la Charité de Lyon et le château sera vendu en 1732 à un marchand lyonnais Jean-Baptiste Chazattes.                                  En 1774  Barthélémy Cazot achète le château  et le conservera jusqu'en 1955, aujourd'hui centre d'accueil des missions africaines de Lyon.","architecture":"Cartières, bâtiment du XIXe siècle rectangulaire formant un carré avec cour intérieure à trois niveaux.","habitants":"Famille d'Antoine Cartier\r\n        \"","divers":"Château de Cartières","gps":"","images":["../../jctruffet.com/image/image_69/69_Cartieres_1.jpg"]},"Consult_chateau_formulaire18f8":{"id":"Consult_chateau_formulaire18f8","dept":"69","canton":"Belleville","commune":"Odenas","nom":"Chaize","type":"Château","periode":"XVII","histoire":"CHAIZE, au cur des vignobles du Beaujolais à été construit  en 1675 par François de la Chaise d'Aix, capitaine de la garde des portes de Lyon et neveu du  confesseur de Louis XIV.                 Le domaine passa par alliance de sa nièce avec le comte de Montaigu  ambassadeur de Venise, ou il reçut Jean-Jacques Rousseau. Le propriétaire actuel le marquis  de Roussy de Sales descend directement de l'ancêtre fondateur François de Chaize d'Aix qui avec Mr  Jean Paul Faye  restaure le château.              La commune d'Odenas possède trois autres châteaux, le NEVERS ,  PIERREUX;  maison forte du XIIIe siècle dont subsiste de l'époque que deux tours rondes, maison forte  reconstruite au XIXe siècle, remanié en 2005 , viticole  de la famille Gagnon et le château de THIVIN.  Au XIIe siècle  Humbert III, sires de Beaujeu le reçoit en don le \"clos du Brouilly\" qui sera cédé ensuite aux chanoines de Sainte-Irénée de Belleville.                                             Au XVe siècle un manoir sera construit s'appellera château Thivin que le marquis de Vichy gardera jusqu'à la Révolution. vendu comme bien national à Mr Thivind et sera acheté en 1877 par un viticulteur  Zaccharie Géoffroy ancêtre de Claude , lignée de viticulteurs, le petit château  transformé en alimentation vins etc.. par Evelyne et  Claude Geoffray.","architecture":"Chaize, construit  en 1675, corps de logis central à trois niveaux édifié sur des plans de Jules-Hardouin Mansart avec un fronton triangulaire, deux ailes symétriques se transforment en deux pavillons carrés.                                                                      Château de Nevers, corps de logis central rectangulaire flanqué de petit pavillons carrés sur les côtés.                                   \r\nPierreux, maison forte du XIIIe siècle dont subsiste de l'époque que deux tours rondes reconstruit au XIXe siècle remanié en 2005                             Château Thivin, quadrangulaire flanqué de tours carrées sur la façade d'entrée fronton plein cintre.","habitants":"Famille de François de la Chaise d\"Aix\r\n        \"","divers":"Châteaux de la Chaize, de Nevers, de Pierreux, et de Thivin.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chaize_1.jpg","../../jctruffet.com/image/image_69/69_Chaize_2.jpg","../../jctruffet.com/image/image_69/69_Chaize_3.jpg","../../jctruffet.com/image/image_69/69_Chaize_4.jpg","../../jctruffet.com/image/image_69/69_Chaize_5.jpg","../../jctruffet.com/image/image_69/69_Chaize_6.jpg"]},"Consult_chateau_formulairedcc2":{"id":"Consult_chateau_formulairedcc2","dept":"69","canton":"St-Laurent-de-Chamousset","commune":"Chambost-Longuessaigne","nom":"Chambost","type":"Château","periode":"XVII","histoire":"CHAMBOST-LANGUESAIGNE, était le fief de la baronnie  des Vuichardus au Xe siècle qui en fit don à l'abbaye de Savigny  en 1229 le pays fut cédé aux sires de Beaujeu par le comte du Forez Hugues de Mauvoisin en 1261  qui le tient en fief.  En 1539 à Arthaud de Saint Germain puis à la famille de Querrières  et aux de Thelis en 1640 qui firent construire le château, puis agrandi par les Riverieux  de Chambost ancien prévôt des marchands de Lyon,  dans la même famille depuis 1735 transformé en hôtel restaurant par la famille Vivien de Lescure.","architecture":"Chambost, construit au XVIIe siècle sur l'emplacement d'une ancienne maison forte remanié au XVIIIe siècle de construction rectangulaire fronton triangulaire saillant en façade et tour octogonale  côté parc dont une tronquée.","habitants":"Famille de Riverieux                                                                     Famille de Thelis\r\n        \"","divers":"Château de Chambost","gps":"","images":["../../jctruffet.com/image/image_69/69_Chambost_1.jpg","../../jctruffet.com/image/image_69/69_Chambost_2.jpg","../../jctruffet.com/image/image_69/69_Chambost_3.jpg"]},"Consult_chateau_formulaire8c03":{"id":"Consult_chateau_formulaire8c03","dept":"69","canton":"Le Bois-d`Oingt","commune":"Chamelet","nom":"Chamelet","type":"Château","periode":"XV","histoire":"CHAMELET, au XIIe siècle la châtellenie était de Guigues d'Albon passa à Guichard III de Beaujeu et en 1374 à Jean de Nagu, Edouard fils d'Antoine de Nagu vend l'office châtelain à Louis de Sancerre.  A la mort d'Edouard en 1400 sans postérité la seigneurie revient à son oncle Guillaume, son fils Edouard épouse en1430 Jacqueline \"Dames de Lignières\", leur fils successeur de Jacques Baron de Lignières épouse Jacqueline Juvenal des Ursins, dans la lignée jusqu'en 1547 puis passe à la maison de France. Dans la seconde moitié du XVIIIe siècle  Bénique Burtin de Vaurion châtelain de Chamelet.                                                                Dans la commune Château de CHALOSSET et vestiges du château de VAURION.","architecture":"Chamelet, donjon carré du XVIe siècle vestiges du château avec quelques autres pans de murs dans le village.                                       Château du Chalosset Corps de logis carré accolé d'une tourelle en encorbellement.","habitants":"Famille de Nagu\r\n        \"","divers":"Vue sur Chamelet, du chateau de Chalosset et vestiges tour du château de Vaurion.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chamelet_1.jpg","../../jctruffet.com/image/image_69/69_Chamelet_2.jpg","../../jctruffet.com/image/image_69/69_Chamelet_3.jpg","../../jctruffet.com/image/image_69/69_Chamelet_4.jpg"]},"Consult_chateau_formulaireea17":{"id":"Consult_chateau_formulaireea17","dept":"69","canton":"St-Laurent-de-Chamousset","commune":"St-Laurent-de-Chamousset","nom":"Chamousset","type":"Château","periode":"XIV","histoire":"CHAMOUSSET, date de l'an 1000, son seigneur Artaud de Chauve possédait déjà une forteresse  qui passa aux sires de Beaujeu en 1066 suite à des conflits de voisinage la forteresse fut démoli en 1283, les propriétaires étaient les Dalmace de Saint-Symphorien, et au XVe siècle plusieurs seigneurs entreprennent la reconstruction, cette dernière passa par alliance en 1525  à la famille de Crémaux d'Entraigues qui eu l'occasion d'accueillir dans ses murs François Ier qui tomba malade du y séjourner et visite d' Henri IV. En 1720 à Louis Philibert secrétaire du roi, en fut propriétaire, passa au   comte Charles de St-Victor qui fait appel à Edmond Duthoit,  élève de Viollet-le-Duc pour sa restauration.     Il fut occupé par les allemands pendant la seconde guerre mondiale mais il participa  à une active résistance  dans la région lyonnaise  ou il eu l'honneur d'être décoré. A la libération il eu la visite du maréchal Koenig et du général de Bénouville.  Il appartient aujourd'hui à la marquise de Quinsonas-Oudinot née St-Victor.                                           Dans cette commune château de la BOURDELIERE du XIXe siècle situé sur la voie romaine fut un relais de diligence, Montaigne y dormit en Novembre 1581, est utilisé comme hôtel restaurant.","architecture":"Chamousset, construit au XVe siècle sur un promontoire rocheux  entre deux profonds vallons garde l'aspect d'une puissante forteresse féodale, avec plusieurs tours et tourelles, haut donjon carré couronné de mâchicoulis et d'un chemin de ronde, barbacane et murs crénelés et deux portes, restauré au XIXe siècle.                                       Château de la Bourdelière de plan carré à trois niveaux.","habitants":"Famille de Crémaux d'Entraigues\r\n        \"","divers":"Châteaux de Chamousset, de la Chameraie et de la Bourdelière","gps":"","images":["../../jctruffet.com/image/image_69/69_Chamousset_1.jpg","../../jctruffet.com/image/image_69/69_Chamousset_2.jpg","../../jctruffet.com/image/image_69/69_Chamousset_3.jpg","../../jctruffet.com/image/image_69/69_Chamousset_4.jpg","../../jctruffet.com/image/image_69/69_Chamousset_5.jpg","../../jctruffet.com/image/image_69/69_Chamousset_6.jpg"]},"Consult_chateau_formulaire81d0":{"id":"Consult_chateau_formulaire81d0","dept":"69","canton":"Villefranche-sur-Saône","commune":"Blacé","nom":"Champrenard","type":"Château","periode":"XV","histoire":"CHAMPRENARD, au XII-XIIIe siècle fief des seigneurs de Marchampt, passa à la fin du XIIIe siècle aux de Marzé premier seigneur de Champrenard, puis au XVe siècle aux Glatiens de Jarnioux, en 1430 les Montchevert de Saint-Georges de Remeins que leur fille apporta par alliance à Jean Lucarre et ainsi de suite à Jean Agnot  épousa Fleurie de Châtillon et en 1533 son fils dernier de la ligné épousa en 1575 Anne de Damas de la Bâtie, ce dernier se fit assassiner en 1616. Le château passa aux Rambaud de Champrenard et de nouveau par alliance à Louis Marc de Crues de ste Croix.  En 1740 passa au marquis d'Espinay seigneur de Laye. A la Révolution le château fut vendu à Charles Chamarande puis au Chaverriat au XVIIIe siècle en 1898 restauré par l'architecte  Louis Germain.","architecture":"Champrenard, château qui a des origines féodales par sa grosse tour ronde du XIIe siècle qui était le donjon, reconstruit  au XVe siècle avec des rajouts au cours des années.","habitants":"Famille Glatiens de Jarnioux\r\n        \"","divers":"Château de Champrenard.","gps":"","images":["../../jctruffet.com/image/image_69/69_Champrenard_1.jpg","../../jctruffet.com/image/image_69/69_Champrenard_2.jpg","../../jctruffet.com/image/image_69/69_Champrenard_3.jpg","../../jctruffet.com/image/image_69/69_Champrenard_4.jpg"]},"Consult_chateau_formulairec697":{"id":"Consult_chateau_formulairec697","dept":"69","canton":"St-Symphorien-d`Ozon","commune":"St-Pierre-de-Chandieu","nom":"Chandieu","type":"Château","periode":"XV","histoire":"CHANDIEU, le nom de Chandieu  fut donné par une famille, une des plus puissantes  qui en porté leur nom  vers l'an mille, les seigneurs de Chandieu jouèrent un rôle important dans l'histoire de la Savoie  et du Dauphiné.  En 979 Alix de Chandieu y naquit, cette belle fille  savante fut célèbre par sa beauté son esprit et sa vertu par les poètes de la cour de Charles II roi de Naples.        A la fin du XIIIe siècle Arthaud de Chandieu suivit en 1309 l'empereur Albert en Italie, Louis de Chandieu  aide de camp du chevalier Bayard devient grand prévôt de France, chef de la juridiction du châtelain ; Antoine de Chandieu ministre proche du roi Henri IV et écrivain au XVIe siècle, Jean de Chandieu en tant que seigneur justicier avait le droit de célébrer le culte protestant de 1597 à 1600. Le château de Chandieu fut vendu en 1637 par Jacques de Chappes de Chandieu seigneur et baron à Louise de Laigue, les barons de Chandieu quittèrent la région par alliance avec les propriétaires  est s'installèrent chez ces derniers en Beaujolais.                Dans la commune  château de LAIGUE et de RAJAT du XXe siècle au XVIe siècle Hugonin de Rigaud seigneur des lieux entreprit la construction du château  dans le haut de Rajat, qui fut détruit pendant les guerres de religion ne fut jamais relevé.                           Au XIXe siècle Mr Guerrin offrit à sa femme le domaine de Rajat, il fit construire le château actuel qu'il vendit en 1953  à un ordre Salésien les frères Don Bosco y établirent un collège et la commune le racheta en 1975 pour des manifestations diverses.","architecture":"Chandieu, vestiges d'une forteresse à trois niveaux flanqués d'une tour ronde.  Château de Laigue, style louis XV, corps de logis central de forme carré accolé de sur les côtés deux pavillons rectangulaires.                       Château de Rajat, du XIX du Style Louis XV, corps de logis rectangulaire à deux niveaux flanqué de deux pavillons rectangulaires saillants aux extrémités l'ensemble à toits assez  inclinés.","habitants":"Famille de Chandieu\r\n        \"","divers":"Château de Chandieu, de Laigue et de Rajat.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chandieu_1.jpg","../../jctruffet.com/image/image_69/69_Chandieu_2.jpg","../../jctruffet.com/image/image_69/69_Chandieu_3.jpg","../../jctruffet.com/image/image_69/69_Chandieu_4.jpg"]},"Consult_chateau_formulaire5ecc":{"id":"Consult_chateau_formulaire5ecc","dept":"69","canton":"St-Genis-Laval","commune":"Chaponost","nom":"Chaponost","type":"Château","periode":"XV","histoire":"CHAPONOST, en plus les ruines du château féodal, le château de Pravieux, maison forte de style renaissance construite en 1268 par Hugues de Pravieux passa au XVe siècle à la famille Sacconins puis à la famille de Gadagne dont Thomas de Gadagne dit \"le Riche\" cède sa fortune à son neveu Thomas appelé le \"Magnifique\" au XVIIe à la famille Guyot passa ensuite à la famille Blanchet, à la Révolution les demoiselles Blanchet sont toujours propriétaires du château. Au XXe siècle la famille Celle habite le château Marguerite épouse  Laurent Bonnevay président du conseil général et garde des sceaux.                                                               Dans la commune  le château féodal de MONTGRIFFON du XVIIe siècle incendié en 1705 tour ronde ancienne et les châteaux de CARTIERES et de MONTALAND à façade néo-classique.","architecture":"Pravieux, corps de logis rectangulaire massif à trois niveaux largement remanié.","habitants":"Famille de Hugues de Pravieux \r\n        \"","divers":"Châteaux de Chaponot et de Pravieux.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chaponost_1.jpg","../../jctruffet.com/image/image_69/69_Chaponost_2.jpg","../../jctruffet.com/image/image_69/69_Chaponost_3.jpg","../../jctruffet.com/image/image_69/69_Chaponost_4.jpg"]},"Consult_chateau_formulaire204f":{"id":"Consult_chateau_formulaire204f","dept":"69","canton":"St-Laurent-de-Chamousset","commune":"Brullioles","nom":"Charfetain","type":"Maison forte","periode":"XV","histoire":"CHARFETAIN, à Brullioles ancien château aujourd'hui maison forte, ou fut nommé  Jacques Cur au XVe siècle capitaine argentier du roi Charles VII qui avait acquit les mines d'argent de Panpailly sous le fief de Charfetain, ce château a appartenu pendant la seconde moitié du XVII et le XVIIIe siècle à la famille Frère qui fournirent plusieurs échevins à la ville de Lyon, le château fut vendu comme bien national à la Révolution, puis fut acheté par la famille Deschamps et  transformé en ferme puis en gîtes de France.","architecture":"Charfetain à Brullioles ancien château, corps de logis en équerre avec tour d'escalier en angle intérieur.","habitants":"Famille de Charfetain\r\n        \"","divers":"Château de Chafretain.","gps":"","images":["../../jctruffet.com/image/image_69/69_Charfetain_1.jpg","../../jctruffet.com/image/image_69/69_Charfetain_2.jpg"]},"Consult_chateau_formulairee618":{"id":"Consult_chateau_formulairee618","dept":"69","canton":"St-Genis-Laval","commune":"Charly","nom":"Charly","type":"Château","periode":"XIV","histoire":"CHARLY, la construction qui existait en 1200 a servit de résidence au pape Innocent IV de 1214 à 1251 en 1322 Guillermet de Miriboli seigneur de Charleu ou de Charly, fit construire le château féodal avec douves et pont-levis  puis le château passa aux Tard-Venus, au Boscozel, puis en 1523 la famille Thurin, et aux de Gadagne et en 1571 aux de Sevres,  en 1682 Antoine de Serre seigneur de Charly , en 1707 aux Pionelly de la Valette et en 1782 à la famille Barbier des Landes, actuellement pensionnat  des religieuses de St-Charles de Lyon.                                                                        Dans la commune sous le règne de Louis XIII fut construit la maison forte de MOLAYSSE ou Malaise au hameau de Frontigny qui a conservé son caractère ancien. Un autre manoir à deux tourelles est construit sur la place de l'église par Claude Guipo capitaine châtelain.                                                                       Le château de FOUDRAS du XVIIe siècle  et le pavillon MELCHIOR-PHILIBERT.","architecture":"Charly, la forteresse médiéval, le vieux château devient une belle demeure de campagne quadrangulaire a deux donjons dont un encore crénelé en façade deux tours rondes, belle porte d'entrée sous bretèche malgré ses fortifications à perdu son style renaissance.","habitants":"Famille de Guillermet de Miriboli \r\n        \"","divers":"Château de Charly et la maison-forte de Mageron.","gps":"","images":["../../jctruffet.com/image/image_69/69_Charly_1.jpg","../../jctruffet.com/image/image_69/69_Charly_2.jpg","../../jctruffet.com/image/image_69/69_Charly_3.jpg","../../jctruffet.com/image/image_69/69_Charly_4.jpg","../../jctruffet.com/image/image_69/69_Charly_5.jpg"]},"Consult_chateau_formulaire4ee7":{"id":"Consult_chateau_formulaire4ee7","dept":"69","canton":"Anse","commune":"Charnay","nom":"Charnay","type":"Château","periode":"XV","histoire":"CHARNAY, au centre des \"Pierres-dorées\", actuellement hôtel de ville, les seigneurs Thiard comte de Bisy en était propriétaire  en 1800, ils  vendirent à Robert Dromard dont le fils était maire de Charnay (1815-1857).   Il y eu dans la commune un mariage célèbre en 1878 de Félix de Vaugelet propriétaire du château de Chuzelles dans l'Isère avec Amélie Chavanis.                        \r\n Dans la commune d'autres  châteaux; BAYERE  aujourd'hui centre médical.                                                           CHANGRENON, fut en 1575 la propriété d'Aimé de Rymon, procureur du roi, passa par alliance aux Rambuteau, comte, chambellan de Napoléon 1er et préfet de la Seine, ce lieu est devenu trés prisé au XIXe siècle par les visites de Lamartine, un nouveau château fut construit par Jean Marc Morel il fut acquis par la ville  en 1997 pour en faire un lieu culturel.               CONDAMINE, fief des Condamine  en 1615  puis à François Grattier échevin de Macon passa par alliance à la famille Baudéon de Sénnéce, le château fut acheté en 1763 par Jacques Ratton secrétaire du roi, passa en 1876 à la famille Pitrat qui le garderont jusqu'en 1998, passa ensuite à Simone Prette de Hoer.                    La TOUR de l'ANGE, des seigneurs du Mouton en 1470 à l'origine une tour ronde imposante, pris le nom de \"l'Ange\" lorsque Claude du Mouton devient seigneur de l'Ange, de ce dernier il ne reste qu'un colombier, le château actuel du XVIIIe siècle pour la famille de Roujoux  baron de Roujoux et préfet de la Saône, le château toujours dans la famille.                                                                   Le château de VERNEUIL fief au XII-XIIIe par les seigneurs de Verneuil capitaine châtelain de Macon, deux siècles plus tard habité par le maréchal de Coligny, en 1712 il appartenait à Claude Bernard de Châtenay, puis passa à la famille Berthelot d'Ozenay, passa ensuite par plusieurs mains et termina en 1957 à la famille Chevalier, viticulteur.                                                                   Le Château de  ST-LEGER en 1324  joua un rôle défensif,  fut la propriété de Jean Siraudin en 1595 et à la famille Ratton  au XVIIIe siècle.","architecture":"Charnay, château  du XVe siècle remanié  au XVIIIe siècle appelé \"la Mansarde\" dut à sa toiture de style renaissance à gardé sa tour ronde accès possible pour la vue panoramique.                       Bayère, corps de logis rectangulaire à deux niveaux fronton plein cintre saillant.                                                                       Condamine, construit au XVIIIe siècle  corps de logis central flanqué de deux pavillons.                                                          Verneuil, château du XVe siècle  un seul corps principal flanqué de deux tours rondes défensives percées de mâchicoulis.","habitants":"les seigneurs Thiard\r\n        \"","divers":"Château de Charnay, Bayère, autres châteaux dans la commune, Changrenon, Condamine, la Tour de l'Ange, Verneuil, et Saint-Leger.","gps":"","images":["../../jctruffet.com/image/image_69/69_Charnay_1.jpg","../../jctruffet.com/image/image_69/69_Charnay_2.jpg","../../jctruffet.com/image/image_69/69_Charnay_3.jpg","../../jctruffet.com/image/image_69/69_Charnay_4.jpg","../../jctruffet.com/image/image_69/69_Charnay_5.jpg"]},"Consult_chateau_formulaire62ab":{"id":"Consult_chateau_formulaire62ab","dept":"69","canton":"Givors","commune":"Chassagny","nom":"Chassagny","type":"Château","periode":"XIV","histoire":"CHASSAGNY, le premier seigneur cité en 1186 est Guillaume de Chassagny, et la seigneurie  passa aux de Fay qui firent construire une maison forte, enceinte quadrangulaire flanquée de tours et entourée de douves. Par alliance en 1406 la seigneurie passe à Jean de Bron, aux XVIe siècle passa aux Duprat qui transformeront le château avec une inspiration italienne, au XVIIe siècle domaine agricole et en 1732 passa à la famille Dumarest jusqu'en 1786, acquis par Jean-Baptiste Dugat qui le transmette par héritage aux Jordan et fut de nouveau acheté au début du XXe siècle par M. de Coiffon, ancêtres d'échevins de la ville de Lyon toujours dans la descendance, famille Bourjaillat et  la famille Hoffmann.","architecture":"Chassagny, sur une base d'une maison forte médiévale du XIIe siècle fut construit au XVIIe siècle un château  quadrangulaire, quatre corps de logis, flanqué de  tours rondes en angles et encore partiellement entouré de douves, cour d'honneur  à galeries d' arcades, jardin et parc.","habitants":"Famille de Chassagny                                                                      Famille Duprat\r\n        \"","divers":"Château de Chassagny.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chassagny_1.jpg","../../jctruffet.com/image/image_69/69_Chassagny_2.jpg","../../jctruffet.com/image/image_69/69_Chassagny_3.jpg"]},"Consult_chateau_formulaireadff":{"id":"Consult_chateau_formulaireadff","dept":"69","canton":"Limonest","commune":"Chasselay","nom":"Chasselay","type":"Château","periode":"XVI","histoire":"CHASSELEY,  Renaud du Forez d du Forez \r\n        \"","divers":"Porte à Chasseley, château de Plantin, de Montluzin, de Belleuze, de Sainte-Marie, de Machy et le temple Tata.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chasselay_1.jpg","../../jctruffet.com/image/image_69/69_Chasselay_2.jpg","../../jctruffet.com/image/image_69/69_Chasselay_3.jpg","../../jctruffet.com/image/image_69/69_Chasselay_4.jpg","../../jctruffet.com/image/image_69/69_Chasselay_5.jpg","../../jctruffet.com/image/image_69/69_Chasselay_6.jpg","../../jctruffet.com/image/image_69/69_Chasselay_7.jpg","../../jctruffet.com/image/image_69/69_Chasselay_8.jpg","../../jctruffet.com/image/image_69/69_Chasselay_9.jpg"]},"Consult_chateau_formulaire1792":{"id":"Consult_chateau_formulaire1792","dept":"69","canton":"Tassin-la-Demi-Lune","commune":"Francheville","nom":"Chatelard","type":"Château","periode":"XVI","histoire":"CHATELARD, propriété des chanoines de Saint-Just par Robert Castet qui possédait la seigneurie en 1500 passa vers 1550 à Jacques Pascard  qui construisit le château qui fut acquit en 1664 par jean Bernoud un bourgeois lyonnais.                                        En 1749 Charles Joseph de Ruolz acquit la seigneurie  qui resta dans cette famille jusqu'à l'extinction de la famille au XXe siècle.  La dernière représentante de cette famille la marquise de Ruolz Montchal Joséphine de Labeau Bérard de Maclas  et en 1929 les frères jésuites en deviennent propriétaire.","architecture":"Chatelard; quadrangulaire, trois corps de logis à deux niveaux formant une cour fermée et fronton triangulaire en façade principale.","habitants":"Famille de Jacques Pascard \r\n        \"","divers":"Château du Chatelard.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chatelard_1.jpg","../../jctruffet.com/image/image_69/69_Chatelard_2.jpg","../../jctruffet.com/image/image_69/69_Chatelard_3.jpg"]},"Consult_chateau_formulaire66d5":{"id":"Consult_chateau_formulaire66d5","dept":"69","canton":"Le Bois-d`Oingt","commune":"Châtillon-d`Azergues","nom":"Chatillon_Dazergues","type":"Vestiges","periode":"XII","histoire":"CHATILLON d'AZERGUES, forteresse médiévale du XIIe siècle qui était la propriété des seigneur d'Oingt, cette forteresse passa dans les mains de la famille d'Albon seigneurs de Châtillon   et de Geoffrey  Balzac seigneur de Châtillon cette dernière alliée à la famille de Jean le Viste.                                                             Le château fut malheureusement abandonné à la Révolution servit de carrière de pierres et fut restauré après la dernière guerre, dans ce château un petit oratoire  rappellerait sa fondatrice, Claude de la Viste, la Dame de la licorne des célèbres tapisseries. L'oratoire abrite également le tombeau de Geoffroy de Balzac. Monsieur Legras  et le docteur Butin poursuivirent l'effort de le maintenir, toujours propriétaire du château.","architecture":"Châtillon, forteresse du XIIe siècle architecture militaire, bâtiment quadrangulaire, donjon du XIIIe siècle haut de trente mètres et disposés sur plan carrés s'élèvent divers haut logis du XIIIe siècle, il existe encore de beaux reste de cette forteresse.","habitants":"Seigneur d'Oingt                                                                    \r\nFamille de Jean le Viste\r\n        \"","divers":"Différentes vues du château de Chatillon d'Azergues.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chatillon_Dazergues_1.jpg","../../jctruffet.com/image/image_69/69_Chatillon_Dazergues_2.jpg","../../jctruffet.com/image/image_69/69_Chatillon_Dazergues_3.jpg","../../jctruffet.com/image/image_69/69_Chatillon_Dazergues_4.jpg","../../jctruffet.com/image/image_69/69_Chatillon_Dazergues_5.jpg","../../jctruffet.com/image/image_69/69_Chatillon_Dazergues_6.jpg"]},"Consult_chateau_formulairec51c":{"id":"Consult_chateau_formulairec51c","dept":"69","canton":"Anse","commune":"Chazay-d`Azergues","nom":"Chazay","type":"Vestiges","periode":"XV","histoire":"CHAZAY d'AZERGUES, forteresse du Xe siècle entre les monts du Lyonnais et du Beaujolais dépendait  de l'abbaye d'Ainay, joua un rôle important  durant la guerre de Cent Ans servant de refuge à tous les vassaux  de l'Abbaye d'Annay Vers 930 l'abbé Reynal Ier devient seigneur de Chazayet vers 934 suite aux invasions hongroise, les abbés fortifièrent la ville et en 1220 l'Abbé Hugues II devient baron de Chazay, en 1301 l'abbé Ancelin Rigaud baron puis capitaine châtelain, en 1379 le châtelain est Jean de Mas et en 1418 l'abbé Jean de Barjac racheta la ville qui était passé au bourguignon, en 1480 par Théodore du Terrail, oncle de Bayard qui reconstruisit le château, ensuite a  la cité et le château au XIIIe siècle  dépendent aux abbés d'Ainay, dont le dernier commanditaire était Philibert de Naturel puis appartenait  aux sires de Châtillon et aux archevêques de Lyon  qui en étaient possesseur jusqu'à la Révolution, et vendu comme bien national. Dans la commune de Chazay d'Azergues il y a le château de Varennes.","architecture":"Chazay; gros bourg fortifié de trois enceintes  la première pour protéger le bourg la deuxième le château et la troisième le château des abbés d'Ainay de ces enceintes il reste que des vestiges, une tour Magat tronquée dans le Village,  porte Babouin, porte du Castellum. Du château  deux corps de logis château et prieuré remanié au XVe siècle flanqué d'une tour  et tourelle  d'escalier dans la façade sur cour.","habitants":"Famille de Théodore du Terrail\r\n        \"","divers":"Passages des portes de la ville, château de Chazay et de Varennes.","gps":"","images":["../../jctruffet.com/image/image_69/69_Chazay_1.jpg","../../jctruffet.com/image/image_69/69_Chazay_2.jpg","../../jctruffet.com/image/image_69/69_Chazay_3.jpg","../../jctruffet.com/image/image_69/69_Chazay_4.jpg","../../jctruffet.com/image/image_69/69_Chazay_5.jpg","../../jctruffet.com/image/image_69/69_Chazay_6.jpg","../../jctruffet.com/image/image_69/69_Chazay_7.jpg","../../jctruffet.com/image/image_69/69_Chazay_8.jpg"]},"Consult_chateau_formulaireca1c":{"id":"Consult_chateau_formulaireca1c","dept":"69","canton":"Beaujeu","commune":"Chénas","nom":"Chenas","type":"Château","periode":"XV","histoire":"CHENAS, dans cette commune viticole le seul vin qui était accepté par Louis XIII. On trouve plusieurs châteaux dont le principal LAMBERT  qui fut construit en 1690 occupé par des nobles et en 1800 par des religieuses. Napoléon Ier y séjourna deux jours en 1811 sur son chemin de l'Espagne, ce château à plusieurs familles après la seconde guerre mondiale.                   Le château de la HANTE viticole également.                                       Le château SAINT-BONNET, viticole depuis 1630 par l'échevin de la ville de Macon qui acheta le relais de chasse appelé à l'époque  \"les Paquelets\"  vers 1800 le colonel Duluat de Saint Léon remania le château construit la partie central, ensuite le château passa  en héritage aux familles du Namps et du Mazel  amie d'Alphonse de Lamartine et en 1973 les propriétaires actuels  famille Perrachon viticulteur.  Château des Michelons style renaissance.","architecture":"Lambert, château du XVIIe siècle quadrangulaire à trois niveaux flanqué de tours carrés en angles à toits pointus.   Hante, château quadrangulaire à deux niveaux avec fronton triangulaire en façade.                                  St-Bonnet, tour de l'horloge avec deux ailes en retour.","habitants":"Famille du  colonel Duluat\r\n        \"","divers":"Châteaux de Lambert et de la Hante","gps":"","images":["../../jctruffet.com/image/image_69/69_Chenas_1.jpg","../../jctruffet.com/image/image_69/69_Chenas_2.jpg"]},"Consult_chateau_formulaireb561":{"id":"Consult_chateau_formulaireb561","dept":"69","canton":"St-Laurent-sur-Azergues","commune":"Chenelette","nom":"Chenelette","type":"Vestiges","periode":"XV","histoire":"CHENELETTE, la cruauté de l'un des seigneurs de Tourvèon a fait naître la légende attribuant le château de Gannelon personnage de la chanson de Rolland, château de Chenelet
