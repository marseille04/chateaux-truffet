tiale de Lyon, les Tourvéon et les Chavannes.  Vers 1450 Marie de Mont-d'Or propriétaire du château de Collonges par alliance avec le comte de Chavannes.                                    Dans la commune le château de TOURVEON fut construit vers 1585 par Néry de Tourvéon, cette famille s'éteignit en 1671 le domaine passa à la famille Murard qui firent démolir le château ancien pour construire  en 1855 le château actuel  qui est utilisé en ensemble immobilier  de luxe.                                                    Un autre château la PELONNIERE, maison forte du XIXe siècle bâptisé Ermitage du Mont d'Or ou \"Folie\", Guillaud le nom de son commanditaire, il reste un grand bâtiment mansardé sur une colonne torsadée  et la maison forte de CHAVANNE dont il ne reste qu'une porte ancienne.  Un autre domaine du Grand-Port bâti par J Bergier et en 1945 transformé en maison de repos.                                 Le château de PERRET du XIXe siècle à la Chaux.","architecture":"Collonges; Maison forte de Chavannes du XVe siècle remanié XVIe siècle transformé au XIXe siècle prit le nom de château de Rochebozon  de style renaissance italienne.                             Tournéon; château construit au XVIe siècle avec tour tronquée démolie au XVIIe siècle à toitures en poivrières.   Perret; château construit de plan carré  au XIXe siècle avec deux pavillons carrés aux angles.","habitants":"Famille de Guillaume de Collonges\r\n        \"","divers":"Châteaux de Collonges, de Tourvéon, de Canavyde Montcindre et de Corcelles.","gps":"","images":["../../jctruffet.com/image/image_69/69_Collonges_1.jpg","../../jctruffet.com/image/image_69/69_Collonges_2.jpg","../../jctruffet.com/image/image_69/69_Collonges_3.jpg","../../jctruffet.com/image/image_69/69_Collonges_4.jpg","../../jctruffet.com/image/image_69/69_Collonges_5.jpg"]},"Consult_chateau_formulairec77f":{"id":"Consult_chateau_formulairec77f","dept":"69","canton":"Condrieu","commune":"Condrieu","nom":"Condrieu","type":"Vestiges","periode":"XII","histoire":"CONDRIEU, les Roches de Condrieu au Moyen-Age était liés avec Saint-Clair du Rhône est faisaient partie comme Champagnole  de la co-seigneurie de Condrieu Saint-Clair seigneurie du Chapitre de Vienne et Condrieu des chanoines seigneurs de Saint-Jean de Lyon.                                        \r\n Malgré l'intervention de Philippe de Chaverieu pour la libération de Condrieu  en 1332 sur ordre de Philippe de Valois ou les châteaux furent détruit ces seigneuries continuèrent jusqu'à la Révolution.                               Dans la commune plusieurs châteaux,  vestiges du vieux château tour ronde à flanc de colline.  Château de CORDELLE, GRILLET, ROSAY et MONTIS tous viticoles.","architecture":"Condrieu, vestiges du château du XIVe siècle dont il ne reste qu'une tour ronde crénelée mais couverte et quelques pans de murs.","habitants":"Seigneurs de Saint-Jean de Lyon\r\n        \"","divers":"Château de Condrieu vestiges de la tour Garon, Hôtel de Ville, château de Cordelle, de Grillet, de Rozay et de Montlis.","gps":"","images":["../../jctruffet.com/image/image_69/69_Condrieu_1.jpg","../../jctruffet.com/image/image_69/69_Condrieu_2.jpg","../../jctruffet.com/image/image_69/69_Condrieu_3.jpg","../../jctruffet.com/image/image_69/69_Condrieu_4.jpg","../../jctruffet.com/image/image_69/69_Condrieu_5.jpg","../../jctruffet.com/image/image_69/69_Condrieu_6.jpg","../../jctruffet.com/image/image_69/69_Condrieu_7.jpg","../../jctruffet.com/image/image_69/69_Condrieu_8.jpg","../../jctruffet.com/image/image_69/69_Condrieu_9.jpg"]},"Consult_chateau_formulaireae87":{"id":"Consult_chateau_formulaireae87","dept":"69","canton":"Belleville","commune":"Corcelles-en-Beaujolais","nom":"Corcelles","type":"Château","periode":"XV","histoire":"CORCELLES, première maison forte dès le XIe siècle suite aux guerres de cent ans, elle fut endommagé, les Franchelin seigneur de Corcelles dont le père fut tué à la bataille d'Azincourt en 1415, le château passa par héritage  à sa fille, qui par alliance avec Antoine de Laye seigneur de Saint-Lager, son fils fit reconstruire le nouveau château qui avait été démoli par les Bourguignons en 1432,  Jean de laye meurt sans postérité,  le domaine fut vendue  en 1522 a Girard de Magdelaine-Ragny, marquis de Ragny, en 1592 par le capitaine Tircuy de la Barre  qui avait défendu la place contre les troupes du général d'Ornano, ce dernier racheta le château  puis par alliance à Henri-Jean de la Roche Montcel seigneur de la Peyrouse, puis par héritage  aux Ravinet et de la famille de Sain-Laumer, passa en 1962 à la famille Crémieux-Cassin, à la famille Richard qui exploite  le domaine viticole.","architecture":"Corcelles, d'une première maison forte construite à la limite d'une frontière de deux royaumes Beaujolais et Bourgogne, endommagée par les guerres à dût être reconstruite au XVe siècle et eu plusieurs remaniements aux cours des ans a gardé malgré tout son cachet médiéval enceinte cantonné de quatre tours rondes dont trois subsistent, une tour carrée d'entrée pourvue de mâchicoulis à toit pyramidal terminant par un lanternon, appelé donjon dont le pont-levis aujourd'hui disparu.","habitants":"Antoine de Laye                                                                     \r\nFamille de Tircuy de la Barre \r\n        \"","divers":"Château de Corcelles.","gps":"","images":["../../jctruffet.com/image/image_69/69_Corcelles_1.jpg","../../jctruffet.com/image/image_69/69_Corcelles_2.jpg","../../jctruffet.com/image/image_69/69_Corcelles_3.jpg","../../jctruffet.com/image/image_69/69_Corcelles_4.jpg","../../jctruffet.com/image/image_69/69_Corcelles_5.jpg"]},"Consult_chateau_formulaire187c":{"id":"Consult_chateau_formulaire187c","dept":"69","canton":"Arbresle","commune":"Lentilly","nom":"Cruzols","type":"Château","periode":"XV","histoire":"CRUZOLS, au Xe siècle fief de l'église de Lyon dont les seigneurs étaient les  Chapitres de Saint-Jean de Lyon, au XIVe siècle le fief appartenait à une famille lyonnaise en 1340  Guy de Lanay, passa à Guillaume Henry seigneur de Cruzols en 1500  aux  Jarnioux qu'il gardèrent jusqu'à la mort du dernier de la famille, sans postérité en 1657, le château passa ensuite à Claude Césard Laure magistrat, en 1671 puis à Marie-Thérése Leblanc.    A la fin du XVIIe siècle  à la famille François de Bargue banquier de Lyon en 1705 et à la famille Reynard Jean-Baptiste  médecin du roi, et en 1771 dans la descendance par les familles  Leonnard Roux de Saint-Céran de 1786 à 1789;  Jacques de Boissieu peintre y vécut.  Aujourd'hui le château est utilisé pour un centre aéré.","architecture":"Cruzols du XVIIIe siècle; à l'origine au XIVe siècle maison forte, dont-elle a gardé deux vieilles tours du XVe avec mâchicoulis entre ces deux avec archères et canonnières, le pont-levis à disparu, remanié au XVII en style renaissance.","habitants":"Famille de Guillaume Henri \r\n        \"","divers":"Château de Cruzols","gps":"","images":["../../jctruffet.com/image/image_69/69_Cruzols_1.jpg","../../jctruffet.com/image/image_69/69_Cruzols_2.jpg","../../jctruffet.com/image/image_69/69_Cruzols_3.jpg","../../jctruffet.com/image/image_69/69_Cruzols_4.jpg","../../jctruffet.com/image/image_69/69_Cruzols_5.jpg"]},"Consult_chateau_formulairece0d":{"id":"Consult_chateau_formulairece0d","dept":"69","canton":"Tarare","commune":"Darieze","nom":"Dareize","type":"Château","periode":"XVII","histoire":"DAREIZE, deux châteaux, l'un MONTELUS du XVe siècle, l'autre CHANZE du XIXe siècle, magnifiques propriétés privées  MONTELUS, propriété de la famille de Perret de Cray  et des de Mollerat toujours dans ces deux familles.                               \r\nChâteau de CHANZE XIXe siècle (viticole),  et château de Devilaine par la famille de Devilaine.","architecture":"Dareize. Montellus château du XIXe siècle, remanié un corps de logis  rectangulaire à deux niveaux,  accolé de deux pavillons rectangulaires saillants flanqué d'échauguettes en encorbellements  en angl :"XV","histoire":"ECOSSIEUX, château (pas d'information historique)                       Dans la commune maison forte de la MOUCHONNIERE du XVIe siècle, de cette famille il y a eu un Camille de Riverie de la Mouchonnière prêtre de Lyon décédé en 1790, au XXe siècle exploité par la famille Jardinier.","architecture":"Ecossieux; Forteresse du XIVe-XVe siècle  remanié XVI-XIXe siècle tourelles rondes et tour carrée crénelée avec fenêtres à meneaux mâchicoulis et pigeonnier.                                                       \r\nMaison forte de la Mouchonnière du XVe siècle l'entrée flanquée d'un Châtelet à deux tours rondes et portail à mâchicoulis, corps de logis avec fronton saillant avec deux tours carrées en sailli sur façade.","habitants":"Seigneurs d'Ecossieux\r\n        \"","divers":"Château d'Ecossieux et maison forte de la Mouchonnière","gps":"","images":["../../jctruffet.com/image/image_69/69_Ecossieux_1.jpg","../../jctruffet.com/image/image_69/69_Ecossieux_2.jpg","../../jctruffet.com/image/image_69/69_Ecossieux_3.jpg","../../jctruffet.com/image/image_69/69_Ecossieux_4.jpg","../../jctruffet.com/image/image_69/69_Ecossieux_5.jpg","../../jctruffet.com/image/image_69/69_Ecossieux_6.jpg"]},"Consult_chateau_formulairef1c0":{"id":"Consult_chateau_formulairef1c0","dept":"69","canton":"Limonest","commune":"Ecully","nom":"Ecully","type":"Château","periode":"XVII","histoire":"ECCULY, paroisse de l'église de Lyon, dépendait au XIIe  siècle de la seigneurie de l'abbaye des Savigny, le village a été incendié au XIIIe siècle lors de la révolte des bourgeois lyonnais. Après cela les bourgeois lyonnais purent acquérir les terrains pour construire les châteaux nommés ci-dessous et autres  et après la Révolution, certains châteaux furent achetés par de riches soyeux.         Plusieurs châteaux dans la commune le château de FONTVILLE style renaissance remanié. Le château du TREUIL et le manoir de GROSSILIERE ou Greysolière restauré XVIIIe siècle. Château de RECAMIER-LAPORTE  Guillaume de Verney de 1459 à 1481, à Philibert d'Arcy de 1481 à 1539, aux  de Foudras de 1539 à 1547, aux de Chaudieu de 1547 à 1660, au duc de Bonne de Lesdiguières de 1600 à 1717 ce dernier fit construire le château qui passa ensuite à Charlotte de Lorraine comtesse d'Armagnac de 1717 à 1749, aux de Musy de 1749 à 1767 et aux de Drée de 1767 à 1789, vendu comme bien national à la Révolution, utilisé ensuite pour internat.","architecture":"La Farge, construit au XVIIe siècle, au pied du mont Rigaud, corps de logis rectangulaire à trois niveaux plus attique,  flanqué d'une tour ronde à l'Ouest et pavillon  carré saillant à l'Est.","habitants":"Duc de Bonne de Lesdiguières\r\n        \"","divers":"Château de Farge et de Mauchamps.","gps":"","images":["../../jctruffet.com/image/image_69/69_Farge(69)_1.jpg","../../jctruffet.com/image/image_69/69_Farge(69)_2.jpg","../../jctruffet.com/image/image_69/69_Farge(69)_3.jpg","../../jctruffet.com/image/image_69/69_Farge(69)_4.jpg"]},"Consult_chateau_formulaire30a0":{"id":"Consult_chateau_formulaire30a0","dept":"69","canton":"Le Bois-d`Oingt","commune":"St-Vérand","nom":"Flachere_Verand","type":"Château","periode":"XVI","histoire":"La FLACHERE, au XIIe siècle propriété des archevêques de Lyon. Au XIIIe siècle siège de la chevalerie de Malte, passa aux de Paranges, puis aux Chevriers en 1584 jusqu'en 1771, puis à la famille Durand, à la famille Chaponay en 1796 dont Pierre-Anne de Chaponay  qui avait épousé Bonne-Antoinette qui en hérita. puis passa par alliance à la famille de Levis-Mirepoix. En 1911 Constance-Zelie de Chaponay épouse Antoine de Louis de Mirepoix leur apporte la Flachère qu'elle a acheté à son frère Antoine.  En 1979 Le duc se sépare du domaine qui est divisé en plusieurs propriétaires.                                                          \r\n Dans la commune château de la GARDE château féodal qui fut la propriété des archevêques de Lyon Renaud de Forez de 1193 à 1226. Fut reconstruit au XVIIe siècle avant 9_Fougeres_Poule_1.jpg","../../jctruffet.com/image/image_69/69_Fougeres_Poule_2.jpg","../../jctruffet.com/image/image_69/69_Fougeres_Poule_3.jpg","../../jctruffet.com/image/image_69/69_Fougeres_Poule_4.jpg"]},"Consult_chateau_formulaire499b":{"id":"Consult_chateau_formulaire499b","dept":"69","canton":"Tassin-la-Demi-Lune","commune":"Francheville","nom":"Francheville","type":"Vestiges","periode":"XIII","histoire":"FRANCHEVILLE; du château féodal du XIIIe siècle reste d'un donjon au sommet d'un mamelon rocheux dominant la vallée de l'Yseron  et pans de murs. L'archevêque Renaud de Forez fait construire le vieux château au début du XIIIe siècle, fief tenu par un châtelain nommé par les archevêques. En 1476 Charles de Bourbon nomme Guillaume de Quicanpoix châtelain de Francheville, en 1515 a partir de cette date n'était plus entretenu, le château n'avait toujours pas de pont-levis passage par échelle mais fut vite en mauvais état  donc plus habité dés le XVIe siècle, le cardinal de Richelieu ordonna sa destruction et  en 1772 une partie du château s'écroula et  a demi rasé pour le passage de la route, en 1884 la commune envisagé la destruction complète  mais en 1990 des travaux de soutènement dans la base des roches furent entrepris.                                                                                Dans la commune un  autre château   le COLOMBIER  du XVIIe siècle, en 1643 Antoine Richard maître d'hôtel du cardinal de Lyon Alphonse de Richelieu frère du cardinal ministre de Louis XIII à l'accord de construire  le château avec tours  à créneaux et colombiers à l'époque s'appela la Rafournière.  Antoine Richard épousa  Jeanne de Rodillas fille du noble François seigneur du Colombier qui possédait les terres du Colombier.                            Fort du BRUISSIN; construit en 1878 à 1881   pour la ceinture de Lyon possède une puissance de feu de trente trois canons, a servit de dépôt de munitions pendant la deuxième guerre mondiale a était acquis par la ville de Francheville. Aujourd'hui centre d'art contemporain.","architecture":"Francheville, du château féodal du XII  XIIIe siècle, il ne reste que des murs du donjon  sur le mamelon rocheux.                                    château le Colombier  du XVIIe siècle, quadrilatère flanqué de tours carrées.   Fort du Bruissin, construit en 1878 à 1881.","habitants":"L'archevêque Renaud de Forez\r\n        \"","divers":"Vestiges du château de Francheville et château du Colombier. Forte dde Bruissin","gps":"","images":["../../jctruffet.com/image/image_69/69_Francheville_1.jpg","../../jctruffet.com/image/image_69/69_Francheville_2.jpg","../../jctruffet.com/image/image_69/69_Francheville_3.jpg","../../jctruffet.com/image/image_69/69_Francheville_4.jpg","../../jctruffet.com/image/image_69/69_Francheville_5.jpg","../../jctruffet.com/image/image_69/69_Francheville_6.jpg"]},"Consult_chateau_formulaire0c11":{"id":"Consult_chateau_formulaire0c11","dept":"69","canton":"Anse","commune":"Lozanne","nom":"Gage","type":"Château","periode":"XV","histoire":"GAGE, fut la propriété de la famille Arthaud en 1257, Victor de Jarente de Bruyère abbaye d'Ainay baron de Chazay en fut propriétaire, porta  le nom de Chazay par le baron  qui épousa Françoise d'Albon  en 1790.                                                                                               Dans la commune château de l'Arlabastrier du XVIIe siècle dans la même famille depuis deux cent ans.","architecture":"Gage, château du XVe siècle corps de logis  central rectangulaire flanqué de tours carrées.                                                        \r\n  Maison forte  Arbalestrier  du XVIe siècle avec tours arasées.","habitants":"Famille Arthaud\r\n        \"","divers":"Château de Gage et de l'arbalastrier","gps":"","images":["../../jctruffet.com/image/image_69/69_Gage_1.jpg","../../jctruffet.com/image/image_69/69_Gage_2.jpg","../../jctruffet.com/image/image_69/69_Gage_3.jpg"]},"Consult_chateau_formulaired6ed-2":{"id":"Consult_chateau_formulaired6ed-2","dept":"69","canton":"Givors","commune":"Millery","nom":"Gallee","type":"Maison forte","periode":"XV","histoire":"La GALLEE, tient son nom de ses possesseurs du XIVe siècle  construit par les de Gall. Au XVIIe siècle Thomas de Montceau,  prévôt des marchands, y fit de tels investissements  qu'on l'accusa de dilapider les finances  de la cité.  Au XVIIIe siècle le domaine fut acheté  par les jésuites  de la Trinité de Lyon et le 6 février 1793 fut vendu comme bien national. Actuel propriétaire Monsieur Lavoix.                                                                                 Dans la commune  château de COMBELANDE du XVIe siècle qui fut la demeure des seigneurs de Montagny au XVIIe siècle   ces derniers finirent par s'installer dans cette région pour l'exploitation vinicole afin de fournir le vin au roi de France et la maison de SCARRON du XVIIe siècle château du poète premier époux de Françoise d'Aubigné qui fut par la suite madame de Maintenon .","architecture":"La Gallée, château quadrangulaire, imposant, corps de logis de forme rectangulaire flanquée de trois tours carrées.","habitants":"Famille des de Lavoix                                                          Monsieur Scarron\r\n        \"","divers":"Château de Gallée et de Sauvagère-Millery.","gps":"","images":["../../jctruffet.com/image/image_69/69_Gallee_1.jpg","../../jctruffet.com/image/image_69/69_Gallee_2.jpg","../../jctruffet.com/image/image_69/69_Gallee_3.jpg","../../jctruffet.com/image/image_69/69_Gallee_4.jpg"]},"Consult_chateau_formulairefc2b":{"id":"Consult_chateau_formulairefc2b","dept":"69","canton":"Givors","commune":"Givors","nom":"Givors","type":"Vestiges","periode":"XIII","histoire":"GIVORS, au XIIe siècle possession de l'archevêque de Lyon. En 1208 Renaud de Forez archevêque fait construire un château sur le coteau Saint-Gérald, d'où le nom du château, du puissant seigneur baron de Montagny et fut la résidence des chanoines représentant des archevêques de la ville de Lyon, il est détruit en 1591, lorsque Givors fut attaqué par les troupes de Lesdiguières et il ne sera jamais reconstruit.                                                                     Commune de Montagny, face au château de Saint-Gérald, le château de MONTAGNY qui fut une place forte-forteresse fief de la baronnie de Montagny, première baronnie du Lyonnais, cette place forte fut prise par le duc de Lesdiguières en 1561, cette famille abandonne les lieux pour s'installer au château de COMBELANDE, un autre château GOIFFIEUX, les châteaux de BASSECOUR du XVIIe siècle et la maison forte de VARISAN.","architecture":"Givors, du château de Saint-Gérald construit sur un éperon rocheux au XIIIe siècle il ne reste que quelques vestiges de pierres.                     Manevieux, Manoir féodal aménagé pour le vignoble façade du XVIIIe siècle bâtiment central à fronton triangulaire flanqué de deux tours carrées jumelles de chaque côté deux ailes symétriques.          Montagny vestiges du vieux bourg autour du château  hautes murailles et fossés profonds.","habitants":"Renaud de Forez\r\n        \"","divers":"Vestiges du château de Saint-Gérald, et l'hôtel de Ville.","gps":"","images":["../../jctruffet.com/image/image_69/69_Givors_1.jpg","../../jctruffet.com/image/image_69/69_Givors_2.jpg","../../jctruffet.com/image/image_69/69_Givors_3.jpg","../../jctruffet.com/image/image_69/69_Givors_4.jpg"]},"Consult_chateau_formulaire9d20-2":{"id":"Consult_chateau_formulaire9d20-2","dept":"69","canton":"Villefranche-sur-Saône","commune":"Gleizé","nom":"Gleize_Vaurenard","type":"Château","periode":"XVIII","histoire":"VAURENARD, Gliezé, au XIVe siècle rendez vous de chasse des sires de Beaujeu, passa à Philibert du Crozte puis a la  famille de la Bessée, et aux de Gayant. En 1532 aux de Billonnat, aux Gaspard seigneurs de Pravains et de Fléchères et  par alliance à Jean de Sauzay seigneur de Parvains et en 1672 le fief fut acquis par Claude Corteille conseiller du roi et trésorier de France à Lyon qu'il garde jusqu'à la Révolution ou le dernier des Corneille François mourut sur l'échafaud. L'héritière de Vaurenard Catherine Corteille qui épousa en 1800 Louis-Christophe-Philibert, comte d'Apchier de Vabres, elle accueille le baron de Richemont qui en réalité s'appelait Claude Perrain ou Emule de Naundorff,   usurpateur du titre Louis Charles de France fils de Louis XVI et de Marie Antoinette qui décédera au château, il fut inhumé au cimetière du village, en 1861 le château passe à un neveu de son mari Maurice Falcon de Longevialle, son fils sera avocat à la cour de Lyon et président du conseil général de la Lozère, toujours dans la famille.                                                                                       Dans la commune le château de CHERVINGES seul hôtel quatre étoiles  en Beaujolais et château des LOUP transformé en maison de retraite, le CHENEVERT.","architecture":"Vaurenard, à l'origine modeste demeure  qui fut transformé au XVI-XVIIe siècle corps de logis avec fronton central, du côté cour deux ailes en retour d'équerre terminant  en façade  avec deux tours carrées en fortes saillies, il fut remanié au XVIIIe siècle dans l'aspect actuel.","habitants":"Famille de Claude Corteille\r\n        \"","divers":"Château de Vaurenard et de Chenevert.","gps":"","images":["../../jctruffet.com/image/image_69/69_Gleize_Vaurenard_1.jpg","../../jctruffet.com/image/image_69/69_Gleize_Vaurenard_2.jpg"]},"Consult_chateau_formulaire9633":{"id":"Consult_chateau_formulaire9633","dept":"69","canton":"St-Genis-Laval","commune":"Pierre-Benite","nom":"Grand_Perron","type":"Château","periode":"XVI","histoire":"GRAND-PERRON, du XIIe au XVe siècle appartenait  aux chanoines de Lyon, en 1520 faisait  parti des biens de Guido Boleto Gondi, majordome du roi, banquier florentin qui le garde  jusqu'en 1550 , resta trente ans à l'abandon, fut racheté par Albisse d'Elbéne puis passa  à la famille d'Antoine Camus baron de la Riverie qu  chimistes Verguin et Renard découvrirent les couleurs d'aniline et la fuchsine. Situé du XVIIe siècle dans le centre d'une exploitation agricole elle doit son nom à Benjamin Damette négociant  et remanié au XIXe siècle.                                                                                      Le château de MONTCORIN du XVIIe siècle corps de logis carré, transformé aujourd'hui en appartements et une M.F.du PEAGE qui posséde une belle façade renaissance. Château d'Yvours du XVIIe siècle remanié XIXe siècle  entouré de fossés.","architecture":"Irigny-Combe, du château il ne reste quelques éléments et une tour ronde,  grande bâtisse carrée ou s\"adosse un pavillon rectangulaire de même hauteur  prolongé d'une construction plus basse  s'ajoutent deux pavillons qui encadrent l'entrée délimitant la cour intérieure, la tour d'angle à diamètre réduit construite au XIX e siècle.","habitants":"Famille Croppet seigneurs d'Irigny\r\n        \"","divers":"Châteaux d'Irigny et de Combe-Yvours","gps":"","images":["../../jctruffet.com/image/image_69/69_Irigny_Combe_1.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_2.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_3.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_4.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_5.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_6.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_7.jpg","../../jctruffet.com/image/image_69/69_Irigny_Combe_8.jpg"]},"Consult_chateau_formulaire3715":{"id":"Consult_chateau_formulaire3715","dept":"69","canton":"Anse","commune":"Morancé","nom":"Izerable","type":"Château","periode":"XVI","histoire":"IZERABLE, Jusqu'au XVIIe siècle fief des chanoines comtes de Lyon après à Gaspard Dugué été déjà propriétaire du Château de Bagnols et trésorier de France, puis passe au Chapona qui prirent le titre de Chaponay puis par alliance à la famille Loras toujours par alliance à la famille Baglion marquis de Chaponay et passa ","divers":"Château de Janzé et de Varax.","gps":"","images":["../../jctruffet.com/image/image_69/69_Janze_1.jpg","../../jctruffet.com/image/image_69/69_Janze_2.jpg","../../jctruffet.com/image/image_69/69_Janze_3.jpg","../../jctruffet.com/image/image_69/69_Janze_4.jpg"]},"Consult_chateau_formulairee4e8":{"id":"Consult_chateau_formulairee4e8","dept":"69","canton":"Le Bois-d`Oingt","commune":"Jarnioux","nom":"Jarnioux","type":"Château","periode":"XV","histoire":"JARNIOUX, cité au XIIe siècle par une maison forte qui fut remplacé par le château au XIIIe siècle, fief des chefs gaulois Gernioz qui se transforma en Jarnioz puis au Jargnieu et Jarnioux.  Au XIIIe siècle la seigneurie appartient aux Gletiens qui la gardèrent jusqu'au XVIe siècle passa ensuite aux Proprières et à la famille Henry au XVIIe siècle, le dernier de cette famille, Guillaume qui avait épousé Louise de Mellier en 1692 n'auront pas d'enfant, le frère de Guillaume, François  a une fille qui épousa  Claude Mérandeau seigneur de Champré, mais ne profita pas du domaine, leur  fille Marie-Renée Mérandeau hérite en 1709 elle épousa François de Lostanges chevalier et marquis de Beduer. Laurent, sixième fils des précédents dit chevalier de Beduer hérite de Jarnioux, il épouse Jeanne Desmaret, le second fils de Louis de Lestranges 1734-1758 seigneur de Jarnioux est tué à la bataille de Lutzerberg. La seigneurie est acquise en 1771 par Jean-Michel Sahuc de Planhol trésorier de France épousa Marie-Anne Vaquet, Charlotte fille héritière épouse Gérard de Clavière en 1779 conseiller du roi, seigneur de Jarnioux le domaine  toujours dans la descendance est aussi appelé Château de \"Clavière\".             Dans la commune, le château de BOIS-FRANC qui fut construit en 1860 par Augustin Guinon qui a fait fortune dans l'industrie de la soie, aujourd'hui transformé en hôtel restaurant de luxe par la famille Doat.","architecture":"Jarnioux, construit au XIII-XIVe siècle bien conservé  de sept tours dont l'une de trente  au XVII, de plan quadrangulaire flanqué de pavillons carrés et tour d'angles rondes intérieures.","habitants":"Famille de Claude Janin\r\n        \"","divers":"Château de la Condamine et de  Julienas.","gps":"","images":["../../jctruffet.com/image/image_69/69_Julienas_1.jpg","../../jctruffet.com/image/image_69/69_Julienas_2.jpg","../../jctruffet.com/image/image_69/69_Julienas_3.jpg"]},"Consult_chateau_formulaire44d0":{"id":"Consult_chateau_formulaire44d0","dept":"69","canton":"Belleville","commune":"St-Etienne-des-Oullières","nom":"Lacarelle","type":"Château","periode":"XV","histoire":"LACARELLE, une des plus anciennes propriétés viticole du Beaujolais appartenait déjà au XVIe siècle aux comte Durieu de Lacarelle qui au XVIIIe siècle cette famille entreprit de créer un entrepôt sur la région parisienne pour développer leurs vins, ils eurent beaucoup de médailles et le domaine est toujours dans la descendance.                                                                         Dans la commune Château de Saint-Etienne des Oullières le château BLACERET-ROY, viticole par Henri Canard, Château de  MILLY ce château a été refait au XIXe siècle appartenait à la famille de Thil au XVe siècle, Château de NETY du XVIIIe siècle et château de POUGELON du XVIIIe également.","architecture":"Château de Lacarelle  fut incendié en 1639, flanqué de deux tours  carrées  jardins à la française.                                                    Milly, château refait au XIXe siècle bâtiment rectangulaire précédé d'un perron à balustrades.                                                              Château de Pougelon du XVIIIe siècle","habitants":"Famille des Nagu.                                                                  Famille de  Jean-Marie Magnin \r\n        \"","divers":"Châteaux de Lacarelle et de Blaceret-Roy et de Pougelon","gps":"","images":["../../jctruffet.com/image/image_69/69_Lacarelle_1.jpg","../../jctruffet.com/image/image_69/69_Lacarelle_2.jpg","../../jctruffet.com/image/image_69/69_Lacarelle_3.jpg","../../jctruffet.com/image/image_69/69_Lacarelle_4.jpg"]},"Consult_chateau_formulaireaa82":{"id":"Consult_chateau_formulaireaa82","dept":"69","canton":"Villefranche-sur-Rhône","commune":"Lancenas","nom":"Lacenas_Bionnay","type":"Château","periode":"XVI","histoire":"BIONNAY, jusqu'au XVIe siècle, les Marzé premier seigneur de Bionnay, passe  ensuite aux Gaspard et en 1611 la propriété est acquise par Amable Thierry en 1656, à Louis Mabiez et en 1661 à Antoine de Mondpey, en 1695 par alliance  au Champier-Rabutin. Le château fut racheté par Alexis Noyel de Belleroce en 1749. En 1857 le propriétaire est Mr Thivel, passe ensuite en 1902 à Mr Félix Fournier qui  restaure le château et fait un beau parc à la française, qui passera ensuite à la famille Targe en 1934.          \r\n MONTAUZAN XVIe siècle qui a été la propriété de  la famille Bessie qui l'a construit,  et en 1745 passa à la famille Germain  qui prit le nom  de Montauzan toujours dans la descendance.","architecture":"Bionnay, remanié au XVIIe siècle de plan rectangulaire formant un U ouvert sur  un côté, trois corps de logis à deux niveaux  flanqués de trois tours et encadré de deux tours d'angles.                               Sou, château médiéval  en pierres dorées entouré d'un parc possédait à l'époque un pont-levis  des douves en partie comblées aujourd\"hui  et meurtrières, une tour octogonale subsiste au levant et porte classée monument historique comportant six blasons.","habitants":"Famille Fournier  \r\n        \"","divers":"Château de Bionnay à Lacenas","gps":"","images":["../../jctruffet.com/image/image_69/69_Lacenas_Bionnay_1.jpg","../../jctruffet.com/image/image_69/69_Lacenas_Bionnay_2.jpg","../../jctruffet.com/image/image_69/69_Lacenas_Bionnay_3.jpg"]},"Consult_chateau_formulairebcf4":{"id":"Consult_chateau_formulairebcf4","dept":"69","canton":"Anse","commune":"Lachassagne","nom":"Lachassagne-Anse","type":"Château","periode":"","histoire":"LACHASSAGNE;  voulut donner un style directoire à cette demeure. Deux sphinx rapportés par lun des nombreux résidents se trouvent sur la terrasse, construit au XVIe siècle avec une tour de guet.","habitants":"Famille de Ferru de Plantigny \r\n        \"","divers":"Château de l'Hestrange à Lachassagne-Blacé.","gps":"","images":["../../jctruffet.com/image/image_69/69_Lestrange_1.jpg","../../jctruffet.com/image/image_69/69_Lestrange_2.jpg","../../jctruffet.com/image/image_69/69_Lestrange_3.jpg"]},"Consult_chateau_formulaire8147":{"id":"Consult_chateau_formulaire8147","dept":"69","canton":"Vaugeray","commune":"Marcy-l`Etoile","nom":"Lacroix_Laval","type":"Château","periode":"XVI","histoire":"LACROIX-LAVAL, ce château construit au XVIe siècle sur les ruines de l'ancien,  remanié a plusieurs reprises au cours des ans. Au début du XVIIIe siècle  jean Boussin, dit la Croix, seigneur de Laval et trésorier de France achète le domaine et lui donne le nom de Lacroix Laval.  En 1739 le château fut remanié par l'architecte Soufflot, saccagé à la Révolution remanié à nouveau. En 1919  à la mort du dernier descendant le comte Joseph-Léon de Lacroix-Laval son fils Ferdinand réalise de nouveau des transformations et le vend au conseil général  en 1979 qui en fait le musée de la Poupée.                                                                                     Dans le canton la ville de Charbonnière possède le château de BOCUSSE, le château du LAC,  et  l'école vétérinaire dans un château.","architecture":"Lacroix-Laval, ce château fut construit au XVIe siècle remanié au XVIIIe siècle et XXe siècle, corps de logis rectangulaire en forme de H, renaissance  au cur d'un espace naturel de 115 hectares de verdure.","habitants":"Seigneur de Laval\r\n        \"","divers":"Château de Laval dit de la Poupée, le château école de Bocusse, de l'école vétérinaire et du Lac.","gps":"","images":["../../jctruffet.com/image/image_69/69_Lacroix_Laval_1.jpg","../../jctruffet.com/image/image_69/69_Lacroix_Laval_2.jpg","../../jctruffet.com/image/image_69/69_Lacroix_Laval_3.jpg","../../jctruffet.com/image/image_69/69_Lacroix_Laval_4.jpg","../../jctruffet.com/image/image_69/69_Lacroix_Laval_5.jpg","../../jctruffet.com/image/image_69/69_Lacroix_Laval_6.jpg"]},"Consult_chateau_formulaireab01":{"id":"Consult_chateau_formulaireab01","dept":"69","canton":"St-Symphorien-de-Coise","commune":"Larajasse","nom":"Lafay","type":"Château","periode":"XVI","histoire":"LAFAY, au XVIe siècle fief des seigneurs Arod, la seigneurie  passa  à la fin du XVIe siècle aux Manuel, Bertrand Manuel chevalier de l'ordre du roi, au XVIe siècle les Chapuis deviennent propriétaires et seigneurs ainsi que les Savaron  au XVIIe siècle Guillaume de Savaron, baron de Chamousset seigneur de la Fay ensuite à Aubepin de Vaudragon qui possédait le château de Vaudragon qui tombait en ruines, ce dernier seigneur mourut victime de la Révolution, vendu comme bien national acquit par la famille aux Chalier de Cibiens et par alliance aux Jerphanion en 1834.                                                                                     Dans la commune château de VARAX du XVIIe siècle flanqués de quatre tours carrées du XVIIe siècle.  Ruines du château fort de VAUDRAGON du XIIIe siècle, le seigneur était nobles Hugues de Lavieu .                                                                               Maison forte de GRANGES-RAMBERT du XVIe siècle,  la THENAUDIERE du XIVe siècle et la ferme fortifiée de FAVERGES du XIVe siècle","architecture":"La Fay, château du XVIe siècle  masse de bâtiment imposant façade en demi cercle refaite en 1913, construction rectangulaire flanqué de tours rondes et précédé d'un parc et jardin.","habitants":"Famille de Bertrand Manuel \r\n        \"","divers":"Château de Lafay evec vestiges d'une tour.","gps":"","images":["../../jctruffet.com/image/image_69/69_Lafay_1.jpg","../../jctruffet.com/image/image_69/69_Lafay_2.jpg","../../jctruffet.com/image/image_69/69_Lafay_3.jpg"]},"Consult_chateau_formulaire9d08":{"id":"Consult_chateau_formulaire9d08","dept":"69","canton":"Beaujeu","commune":"Lantignié","nom":"Lantignie","type":"Château","periode":"XVII","histoire":"LANTIGNE, dans cette commune trois châteaux en chambres d'hôtes, la SALLE, plusieurs familles se sont succédé dont les Montgolfier et depuis 1850 la famille Royé  l'exploite en vignobles,  et possède également un Golf;                                                    Château de la BOURDONNIERE du XVIIIe siècle ancienne dépendance de Thulon, relais de chasse aujourd'hui chambres d'hôtes.                                                                                        Château des VERGERS du XVIIe siècle, viticole depuis plusieurs générations par la famille Witrant.                                                Château de VIERRES, THULON et ST-VINCENT tous viticoles.","architecture":"Tous ces châteaux sont des maisons fortes viticoles accompagnées de tours ou tourelles du XV-XVIe siècles.             Thulon  a été construit au XVe siècle, puis remanié au XVIe siècle. Il appartenait au XVIIIe siècle au Marquis Thibaud de la Roche Thulon qui fut délégué de la noblesse aux États Généraux en 1789. Laroche-Thulon n'avait pas seulement émigré, il s'était engagé sous les drapeaux de Condé. Attaché d'abord à l'état-major du comte de Narbonne-Fritzlar, il devint, en 1794, major au régiment de Cély à cocarde blanche. Il cessa de servir le 31 décembre de la même année, et se rendit en Angleterre. Son nom avait reparu sur les listes de Rhône-et-Loire. Tous ses biens, situés sur les communes des Ardillats, Régnié et Lantignié, furent livrés aux enchères du 28 floréal an II (17 mai 1794) au 4 brumaire an V (24 novembre 1796).","habitants":"Famille de Montgolfier\r\n        \r\n        \r\n        \"","divers":"Château de Lantignié, chateau des Vergers et de la Vierre.","gps":"","images":["../../jctruffet.com/image/image_69/69_Lantignie_1.jpg","../../jctruffet.com/image/image_69/69_Lantignie_2.jpg","../../jctruffet.com/image/image_69/69_Lantignie_3.jpg","../../jctruffet.com/image/image_69/69_Lantignie_4.jpg","../../jctruffet.com/image/image_69/69_Lantignie_5.jpg"]},"Consult_chateau_formulaired74f":{"id":"Consult_chateau_formulaired74f","dept":"69","canton":"Belleville","commune":"St-Georges-de-Reneins","nom":"Laye","type":"Château","periode":"XVIII","histoire":"St-GEORGES de Reneins, au Xe siècle existait une maison forte appartenant aux Abbayes  de Savigny, les Amons qui eurent des démêlés avec ces derniers et  en furent propriétaires, puis la maison forte de  Laye  fut occupé par l'ordre de la Chevalerie des Templiers, puis la châtellenie  passa à Jeanne de Montfort, au Châteauvilain  et à Marguerite de Poitiers dame de Beaujeu, occupait par les routiers en 1368, sous François Ier, Charles de Bourbon  et Anne de France possédaient la châtellenie qui fut vendu à noble Dufournel ensuite au duc de Montpensier  le château fut construit en 1760 par  Soufflot architecte sur demande du marquis d'Epinay  et des aménagements de sculpture \"Diane et Endymion\" par Michel-Ange Slodtz. Propriété aujourd'hui des de Flurieux depuis plusieurs générations. Ce château garde le souvenir du passage  de Thomas Jefferson futur président des Etats-Unis en 1786.                                                              \r\nDans cette commune plusieurs châteaux, château de MONTCHEVERT transformé en hôtel de ville et en musée, château des GRANGES, château de MARZE, de successions en ventes, il passa de familles nobles à des particuliers dont Adrien Charmette de Lyon, en 1920, qui le revendit en 1926 à Pierre Odet, propriétaire cultivateur de Saint Trivier sur Moignans. Depuis 2000, les propriétaires actuels, la famille Bertrand, restaurateurs.                 Le château de VALLIERES du XVIIe siècle, et le château de BOISTRAY au sud château de la Vallières du XV et XVIe siècle Lhabitation portait le nom de Grange Baudet, sans doute celui de son premier propriétaire, peut-être dès la fin du XIII° siècle. Cest au XVIe siècle quil prit le nom de Boistrait, maintenant Boistray. Le château actuel date des XVII-XVIIIe siècles.","architecture":"Laye, du bâtiment initial du XI-XIIe siècle il ne reste que les bases et des décors intérieurs d'une maison forte existante au Moyen-Age  avec de belles salles voûtées sur lesquelles il fut reconstruit en 1760 un bâtiment carré avec fronton, corps de bâtiment situé dans un vaste domaine dont le parc est crée  par le comte Choulot, avancés  à trois niveaux, deux pavillons saillants dit tourelles avec fronton donnant sur un magnifique perron le bâtiment couronné d'un campanile. Château de Marzé  qui date du XVIe siècle, à gardé une allure féodale avec sa ceinture de douves remplie d'eau et sa tour écussonnée aux armes des Marzé, enceinte quadrangulaire avec douves, tours, portes du XV et XVIe siècle.","habitants":"Famille du marquis d'Epinay \r\n        \"","divers":"Château de Laye, de Boistray, de Montchevert, des Granges, de Marzé et de Vallières","gps":"","images":["../../jctruffet.com/image/image_69/69_Laye_1.jpg","../../jctruffet.com/image/image_69/69_Laye_2.jpg","../../jctruffet.com/image/image_69/69_Laye_3.jpg","../../jctruffet.com/image/image_69/69_Laye_4.jpg","../../jctruffet.com/image/image_69/69_Laye_5.jpg","../../jctruffet.com/image/image_69/69_Laye_6.jpg","../../jctruffet.com/image/image_69/69_Laye_7.jpg"]},"Consult_chateau_formulaire9412":{"id":"Consult_chateau_formulaire9412","dept":"69","canton":"Arbresle","commune":"Lentilly","nom":"Lentilly","type":"Château","periode":"XV","histoire":"LENTILLY, dit château du Bourg ou de Renaud de Forez, au Xe siècle se sont les seigneurs de la paroisse qui sont propriétaires du fief puis a l'église de Lyon passa à l'abbaye de Savigny puis aux nobles Chapitre de Lyon. Renaud de Forez fit construire le château  et l'enceinte du village  vers 1210. En 1250 Bertrand de Tassin, chevalier vend le fief aux Obédienciens de Lentilly et en 1367 jean d'Albon  Chapitre de Lyon est capitaine au château de Lentilly.                 Dans la commune beaucoup d'autres châteaux, château POIRIER cette propriété fut acquise en 1884 par Louis Matignon  qui fit construire le château en 1890 qu'il revend en 1891 à André Louvier notaire qui l'agrandira.                                                        BURETTE, construit en 1882 pour Bernigard notaire à Lentilly , vendu en 1892 à la famille Guise et fut acquis en 1917 par Claudius Gonnet.                                                                  MERCURY, appelé aussi \"Malatray\" du XVIIIe siècle pour Jean Corompt greffier passa par alliance au Massara et après la Révolution à Jean-Antoine Joly-Clerc, il fut racheté en 1914 par Joseph Lombard et revendu en 1918 à Mr Servot.                              MONTPLAN dit aujourd'hui \"Montplomb\" construit  vers 1870 pour Eléonor Salin. TRALUY construit vers 1884 pour le Dr Reboul médecin de la Cie des chemin de fer.                                   GUINET, construit en 1880 pour Joseph Guinet vendu en 1919 a Auguste Radisson puis passa à la famille Grange jusqu'en 1997.                              VARINES construit  à la fin du XIXe siècle pour Eugène Giraudet vendu en 1901 à François Gontard ,juge à Lyon.                                         Maison bourgeoise MIGNONNE  construite vers 1840 pour Joseph Bissardon qui passa en 1890 à Fleury Prévost et acheté en 1908 par Antoine Trux.                                                                   \r\nVilla  CHARMILLE, construite vers 1905 par J.B Basset passa en 1905 à la famille Germain, toujours dans cette famille.","architecture":"Lentilly, du château du XIIIe siècle il ne reste aujourd'hui  que quelques vestiges  du bâtiment et des tourelles dans le centre du village. Les autres châteaux de construction moderne du XVIII XIXe siècle.","habitants":"Lentilly:Renaud de Forez                                                       Cruzols:Guy de Lanay uite à Monsieur Claustrier et en 1840 à monsieur Fleurdelys.                                                             \r\n  Dans à la commune d'autres châteaux, MONTLUZIN dit des soeurs de Nevers ou la commune accueillis en 1940 les troupes coloniales sénégalaises de l'armée française lors de la bataille contre les allemands ces sénégalais furent massacrés, un \"TATA\" temple fortifié fut construit en leurs honneurs ou reposent 188 corps, ce château aujourd'hui viticole.                                  \r\n Autres châteaux de CALLE, MONTALVON et de La ROUE.","architecture":"Lissieu, construction du XIe siècle à trois tours encore visibles restaurés au XIXe siècle.                                                            Bois-Dieu, du XVe siècle corps de logis central rectangulaire avec fronton deux ailes en retour d'équerre formant un U.","habitants":"Seigneur de Lissieu \r\n        \"","divers":"Château de Lisieu, de Monluzin de Bois-Dieu et de Calle.","gps":"","images":["../../jctruffet.com/image/image_69/69_Lissieu_Boisdieu_1.jpg","../../jctruffet.com/image/image_69/69_Lissieu_Boisdieu_2.jpg","../../jctruffet.com/image/image_69/69_Lissieu_Boisdieu_3.jpg","../../jctruffet.com/image/image_69/69_Lissieu_Boisdieu_4.jpg","../../jctruffet.com/image/image_69/69_Lissieu_Boisdieu_5.jpg","../../jctruffet.com/image/image_69/69_Lissieu_Boisdieu_6.jpg"]},"Consult_chateau_formulaire3ce6":{"id":"Consult_chateau_formulaire3ce6","dept":"69","canton":"St-Genis-Laval","commune":"St-Genis-Laval","nom":"Longchene","type":"Château","periode":"XVII","histoire":"LONGCHENE, château du XVIIe siècle appartenait à Octavio Mey négociant lyonnais, inventeur de la fabrique de velours taffetas en 1644  fut vendu à Pierre Presle  seigneur de l'écluse qui lui le revendit peu de temps après à Pierre de Belloy, revendu dix ans après à François Dupoissat et passa ensuite en 1737 à Etienne.                        Maison forte les Selles eut plusieurs propriétaires pour arriver  à Louis de la Va image/image_69/69_Menival_1.jpg"]},"Consult_chateau_formulaire2f65":{"id":"Consult_chateau_formulaire2f65","dept":"69","canton":"Meyzieu","commune":"Meyzieu","nom":"Meyzieu","type":"Château","periode":"XV","histoire":"MEYZIEU, au XIe siècle le premier seigneur fit élever le château sur la motte près de Bardieu qui fut protégé ensuite par les seigneurs de Chandlieu. Au XIVe siècle passa au royaume de France fut la propriété de Pierre de Tardes  écuyer de Louis XII,  il accueilli François Ier en 1536, Henri II y séjourna également en 1548  et  le seigneur de Lafay. De nombreux propriétaires se succédèrent, c'est Claude de Paris  de la Montagne qui prit le titre de marquis de Leusse fut guillotiné à la Révolution, le château fut vendu comme bien national aux frères Vachons qui s'y installèrent,  le cédera en héritage à la  marquise de Clerc  de la Verpillière qui cette dernière le cédera à la commune en 1954 pour la création d'une maison de retraite.                                                                A cinq kilomètres de Meyzieu; JONAGE; Au Moyen-Age le fief dépendait de Saint-Jean de Lyon et des comte d'Anthon dont l'origine de son nom Jean Jehan Johan,  du château médiéval il ne reste aujourd'hui quelques vestiges de pans de murs verticales, l'ancienne demeure des comtes Yon de Jonage, fut construite en 1678 sur l'autre versant de la colline elle fut détruite puis reconstruite dans un style Napoléonien,  elle a accueillit un hôpital militaire pendant la première  guerre mondiale puis laissé à l'abandon pour être démoli en 1925.","architecture":"Jonage, château médiéval il ne reste aujourd'hui  que quelques vestiges de pans de murs verticales encore visibles au-dessus du village.","habitants":"Meyzieu: Famille de Pierre de Tardes Jonage                                            Les comtes d'Anthon\r\n        \"","divers":"Vestiges d'une tour ronde et château de Meyzieu.","gps":"","images":["../../jctruffet.com/image/image_69/69_Meyzieu_1.jpg","../../jctru rmulaire3925","dept":"69","canton":"Villefranche-sur-Saône","commune":"Montmelas-St-Sorlin","nom":"Montmelas","type":"Château","periode":"XIX","histoire":"MONTMELAS, le premier château fut déjà construit par les seigneurs de Beaujeu  aux XIe siècle sur des ruines romaines, en 1331 Jeanne de Chateauvilain troisième épouse de Guichard VI  de Beaujeu, Jean de Ferrière bailli du beaujolais  l'acquit en 1470. En 1520 le fief appartient à Anne de France duchesse de Bourbon, fille de Louis XI et veuve de Pierre de Bourbon sire de Beaujeu. Suzanne de Bourbon vend la seigneurie à Philibert de Crozet, puis la veuve vend la seigneurie à Philibert d'Albon de Beaujeu baron de Lignière, il fut ensuite acheter par  Louis de Gonzague  duc de Nevers époux d'Henriette de Clèves.  La famille d'Arod racheta le château lors d'une vente aux enchères et  en 1593 Jean Arod est tué lors d'une attaque de son château, malgré cela les descendants garderont  la seigneurie jusqu'en 1824 lors de la mort de Louis Victor  dernier des Arod marquis sans enfant sa veuve Marguerite Louise épouse Just marquis de Tournon-Simiane  et le château sera transmis en héritage par les femmes. Ce château fut totalement reconstruit sur demande du marquis Arod et fortement rehaussé au XIXe siècle par l'architecte lyonnais Louis Dupasquier. Aujourd'hui propriété de la comtesse d'Harcourt et les descendants des Tournon-Simiane.","architecture":"Montmelas, dominant le Rivolet, château reconstruit au XIXe siècle de forme rectangulaire crénelé flanqué en angles de tourelles à poivrières en encorbellement, puissant donjon crénelé avec tourelle accolée, ses mâchicoulis, et une vaste cour d'honneur et porte gothique.","habitants":"seigneurs de Beaujeu \r\n        \"","divers":"Château merveilleux de Montmelas.","gps":"","images":["../../jctruffet.com/image/image_69/69_Montmelas_1.jpg","../../jctruffet.com/image/image_69/69_Montmelas_2.jpg","../../jctruffet.com/image/image_69/69_Montmelas_3.jpg","../../jctruffet.com/image/i 884,  acheté par l'hospice d'Amplepuis  en 1908 et  en 1975  transformé en gîte de France par la famille Gonicadart.     Dans la commune  de Morancé  deux autres châteaux;      \r\nBEAULIEU qui  fut entièrement reconstruit, en 1973   repris par la CRAM pour en faire une maison de convalescence.","architecture":"Pin, mentionnée dès 1260, la maison-forte est constituée d'une enceinte carrée avec un donjon cylindrique datant de 1311. Le donjon comprend une basse fosse aveugle, une salle avec cheminée, des latrines et des fenêtre au premier étage ainsi que l'étage de couronnement inachevé, l'angle nord est de l'enceinte est occupé par un logis  seigneurial. Aménagements de l'édifice aux XIXe-XXe siècle.        Beaulieu remanié au XVIIIe siècle avec tour ronde crénelée.","habitants":"Famille de Bernard de la Chana \r\n        \"","divers":"Château de Morencé, du Pin, de Beaulieu et d'Izerable.","gps":"","images":["../../jctruffet.com/image/image_69/69_Morance_Pin_1.jpg","../../jctruffet.com/image/image_69/69_Morance_Pin_2.jpg","../../jctruffet.com/image/image_69/69_Morance_Pin_3.jpg","../../jctruffet.com/image/image_69/69_Morance_Pin_4.jpg","../../jctruffet.com/image/image_69/69_Morance_Pin_5.jpg","../../jctruffet.com/image/image_69/69_Morance_Pin_6.jpg","../../jctruffet.com/image/image_69/69_Morance_Pin_7.jpg"]},"Consult_chateau_formulaire2b22":{"id":"Consult_chateau_formulaire2b22","dept":"69","canton":"Mornant","commune":"Mornant","nom":"Mornant","type":"Vestiges","periode":"X","histoire":"MORNANT, à l'époque  carolingienne, la cité appartenait à l'abbaye de Savigny sur la frontière du lyonnais et du beaujolais, le bourg fut fortifié au Moyen-âge par une enceinte qui a était construite avec les pierres de l'abbaye ces remparts sont encore visibles à l'angle de la rue des Fossés et de la rue Caremi, le château  qui était le bâtiment administratif de la seigneurie fut rasé en 1910, il reste que la tour Vingtin (donjon carré). Dans le bourg des maisons du XVe siècle sont encore visibles également un aqueduc du IIe siècle après J C par Hadrien venant du Pillat.                                        Dans la commune  la maison forte de TALUYERS d'un prieur de Cluny du XIVe siècle remanié XVIe siècle.","architecture":"Mornant, l'enceinte avait une forme ovoïde trois portes s'ouvraient au Sud  Est, au nord  Est et à l'est c'est à côté de cette dernière que s'élevait le petit donjon de Mornant de plan quadrangulaire ( 5,85 x5,85 ) haut de 18,50 mètres.                                                               Château de Taluyers du XIVe siècle  de style renaissance quadrangulaire  quatre niveaux flanqués de deux tours rondes arasées et mâchicoulis en façades.","habitants":"l'abbaye de Savigny\r\n        \"","divers":"Donjon de Mornant  et château de la Taluyers.","gps":"","images":["../../jctruffet.com/image/image_69/69_Mornant_1.jpg","../../jctruffet.com/image/image_69/69_Mornant_2.jpg","../../jctruffet.com/image/image_69/69_Mornant_3.jpg","../../jctruffet.com/image/image_69/69_Mornant_4.jpg"]},"Consult_chateau_formulaire3ec8-2":{"id":"Consult_chateau_formulaire3ec8-2","dept":"69","canton":"Neuville-sur-Saône","commune":"Neuville-sur-Saône","nom":"Neuville","type":"Château","periode":"XIII","histoire":"NEUVILLE, lieu qui dépendait de l'abbaye de Cluny, le lyonnais qui fit l'objet de luttes entre les archevêques et le comte de Lyon, les sires de Beaujeu et les comtes du Forez jusqu'à l'annexion finale par le roi de France en 1320 par le traité  de Vienne, après la paix d'Arras  en 1435 des troubles recommencèrent, le village fut rasé par les écorcheurs en 1443, il a fallut que Charles VII rétablisse l'ordre, Pierre d'Epinac archevêque de Lyon restaure le château. En 1630 le village fortifié s' appelait Vimy, Camille de Neuville de Villeroy archevêque de Lyon  acheta le château d'Ombreval, dont il en fit une somptueuse résidence, il fit aussi construire une église Vimy perdit son nom à la Révolution pour Neuville sur Saône.                                Du château d'OMBREVAL qui est aujourd'hui la mairie de Neuville fut construit en 1458 par Mr d'Ombreval, passa ensuite à la famille Bouatier puis fut acquis par Mgr d'Espinac en communauté avec sa soeur Madame de Grésolles qui le vendit presque aussitôt suite au décès de Mgr d'Espinac; il fut acquis par Jean Livet secrétaire de l'archevêque de Lyon  et c'est là que Camille de Neuville le racheta. Restauré à la Révolution, il appartient a Laurent Vernais  et à sa soeur madame Bertrand qui décidèrent en  1961  en faire don à la commune qui en ont fait l'hôtel de ville.","architecture":"Neuville, le vieux château  de Vimy sur une position dominante, autrefois flanqué de trois tours demi-circulaire  et de deux tours carrées  côté sud,  bâtiment en forme de U l'un perpendiculaire à l'autre,  réhabilitées aux XVIIIe siècle reste des murs d'enceintes.                                              Ombreval: ce château qui a gardé ses douves et son cachet forteresse par son donjon , façade au centre surélevée avec fronton côté parc rectangulaire  accolé de pavillons aux extrémités.","habitants":"Famille de Camille de Neuville de Villeroy,                                    D'Ombreval, Mgr d'Espinac\r\n        \r\n        \"","divers":"Château de Neuville et d'Ombreval.","gps":"","images":["../../jctruffet.com/image/image_69/69_Neuville_1.jpg","../../jctruffet.com/image/image_69/69_Neuville_2.jpg","../../jctruffet.com/image/image_69/69_Neuville_3.jpg","../../jctruffet.com/image/image_69/69_Neuville_4.jpg","../../jctruffet.com/image/image_69/69_Neuville_5.jpg"]},"Consult_chateau_formulaireba74":{"id":"Consult_chateau_formulaireba74","dept":"69","canton":"Le Bois-d`Oingt","commune":"Le Bois-d`Oingt","nom":"Oingt","type":"Vestiges","periode":"XIII","histoire":"BOIS d'OINGT, fief des moines de l'abbaye de Savigny, ces derniers construisirent un château au XIIe siècle.                      Oingt, qui  en 1093 passa à Unfred d'Oingt jusqu'en 1382 passa ensuite
