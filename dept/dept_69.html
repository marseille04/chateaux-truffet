com/image/image_69/69_Perreon_1.jpg","../../jctruffet.com/image/image_69/69_Perreon_2.jpg"]},"Consult_chateau_formulaire7500":{"id":"Consult_chateau_formulaire7500","dept":"69","canton":"Limonest","commune":"Collonges-au-Mont-d`Or","nom":"Perret","type":"Château","periode":"XIX","histoire":"PERRET, le premier château fut construit par les seigneurs de la Chaux, au XVIIe siècle passa à  Jean de la Raverie seigneur de Vaise et devient seigneur de la Chaux, trésorier de France et de Lyon. Le château passa par alliance  pendant la Révolution au comte Guillet de la Moidière, passa début du XIXe siècle au Maupou et ensuite au comte de Chambray  auditeur à la cour des comptes.  En 1870 Jean Baptiste Perret 1815-1887 industriel acquit le domaine fait démolir l'ancien château pour construire l'actuel qui portera son nom, en 1902 Victoire Dupont de la Tuilerie veuve de monsieur Perret  sans héritier laisse le château à Emile Loubet président de la République qui y résida avec H.Sabran et Felix Mangini et en 1972 devient un centre hospitalier.","architecture":"Perret, construit en 1870 style moderne à trois tours toit pointus  a été simplifié au cours des années.","habitants":"Famille de Jean de la Raverie\r\n        \"","divers":"Château de Perret.","gps":"","images":["../../jctruffet.com/image/image_69/69_Perret_1.jpg","../../jctruffet.com/image/image_69/69_Perret_2.jpg"]},"Consult_chateau_formulaire0f59":{"id":"Consult_chateau_formulaire0f59","dept":"69","canton":"St-Genis-Laval","commune":"Pierre-Benite","nom":"Petit_Perron","type":"Manoir","periode":"XIV","histoire":"PETIT-PERRON, de 1382 à 1609  l'histoire se confond avec le Grand-Perron attribué à Philibert Delorme à 100m de distance. En 1520 le domaine fut cédé à Antonio Gondi marchand et banquier florentin installé à Lyon,  qui le vendit  en 1555, en 1609 Guillaume des Balmes secrétaire du roi, en 1671 à Jean Claude Camus, en 1707 à Michel Rosset de la Mardelière  conseiller au parlement, en 1727 Marie Violet cède la propriété à ses créanciers, et en 1743 le domaine passa à la famille Grimaud et en 1803 le vend à la famille Flageolet, en 1850 à François Germagnet et en 1899  à Madeleine Gonnard qui remanie la demeure, en 1900 passe à la famille Perrin puis à la famille  Rochette et à la famille Rivoire, sera  transformé en appartement en 1919, il fut sauvé en 1980 par deux architectes Jean Jacques et Serge Renaud qui le rachètent pour le sauver et aujourd'hui fait partie d'une fondation culturelle.","architecture":"Petit-Perron, construit au XIVe siècle  remanié au XVIe siècle puis restauré à la fin du XIXe siècle avec en façade  trois niveaux  de galeries à sept arcades, inscrit aux monuments historiques en 1926.","habitants":"Famille de Antonio Gondi \r\n        \"","divers":"Château du petit-Perron, du Grand-Perron et de Chambeyron.","gps":"","images":["../../jctruffet.com/image/image_69/69_Petit_Perron_1.jpg","../../jctruffet.com/image/image_69/69_Petit_Perron_2.jpg","../../jctruffet.com/image/image_69/69_Petit_Perron_3.jpg","../../jctruffet.com/image/image_69/69_Petit_Perron_4.jpg"]},"Consult_chateau_formulairee38a":{"id":"Consult_chateau_formulairee38a","dept":"69","canton":"Belleville","commune":"St-Jean-d`Ardiéres","nom":"Pizay","type":"Château","periode":"XIV","histoire":"PIZAY, en 1030 un archevêque Hugues de Pizay dont sa famille possédait le fief  et édifiait une maison forte au début du XVe siècle, passa aux Marchampt, aux Nanton par alliance dont François de Nanton  épousa en 1420 Eléonor de Pizay et  firent construire le château  sur les ruines de la maison forte et passa aux Sainte-Colombe,  puis en 1604 acheté par les ducs de Montpensier et en 1722  acheté  par  François Sabot de Sugny  qui fit reconstruire la chapelle et rénova la propriété et à sa mort le domaine passe à Jeanne Combier puis à son neveu le docteur J-M Sarrazine qui rénove le château  en 1811 et  revend  le domaine viticole à  Alfred Pépin de Bonnerie   (facturier) qui ce dernier dut s'en défaire après la guerre de 1945. Plusieurs propriétaires se succédèrent, Monsieur Caidon le revendit en 1974  à une société nord-américaine pour les vendangeurs. En 1981  un organisme d'assurance l'acquit pour en faire un lieu d'animation  avec restaurant, hôtel de Luxe.","architecture":"Pizay, ce château qui a souffert au cours de années  a pu conservé son donjon carré  couronné de Hourds et une grosse tour du XIVe siècle, ses tourelles rondes aux toits vernissés et ses échauguettes, une aile   renaissance du XVe siècle jouxte la chapelle du XVIIIe siècle, les bâtiments d'habitation du XIXe siècle complètent cet ensemble majestueux.","habitants":"Famille Nanton\r\n        \"","divers":"Château de Pizay.","gps":"","images":["../../jctruffet.com/image/image_69/69_Pizay_1.jpg","../../jctruffet.com/image/image_69/69_Pizay_2.jpg","../../jctruffet.com/image/image_69/69_Pizay_3.jpg","../../jctruffet.com/image/image_69/69_Pizay_4.jpg","../../jctruffet.com/image/image_69/69_Pizay_5.jpg"]},"Consult_chateau_formulaire9008":{"id":"Consult_chateau_formulaire9008","dept":"69","canton":"St-Symphorien-de-Coise","commune":"Pomeys","nom":"Pleuvy","type":"Château","periode":"XIII","histoire":"PLEUVY, qui appartenait au XIIIe siècle à une famille noble les Pluvier dans le fief du seigneur de Bernard de Chambon, passa au XVIe siècle à la famille de Le Court, en 1760 noble Julien Court de Pleuvy maria sa fille à Claude Alexis de Noblet  et en 1896 à la famille de Noblet  en hérita, aujourd'hui abrite une maison familiale des métiers et un centre culturel.","architecture":"Pleuvy, de cette demeure à l'origine maison passa en gentilhommière restauré au XIXe siècle en château rajouté à son corps de logis tour et donjon crénelés à mâchicoulis tourelles et échauguettes.","habitants":"Famille de  Bernard de Chambon\r\n        \"","divers":"Forteresse de Pleuvy.","gps":"","images":["../../jctruffet.com/image/image_69/69_Pleuvy_1.jpg","../../jctruffet.com/image/image_69/69_Pleuvy_2.jpg","../../jctruffet.com/image/image_69/69_Pleuvy_3.jpg"]},"Consult_chateau_formulaire4863":{"id":"Consult_chateau_formulaire4863","dept":"69","canton":"Belleville","commune":"Belleville","nom":"Plume","type":"Château","periode":"XVII","histoire":"BELLEVILLE; La commune fut installée près de lantique « Lunna » a proximité dun gué sur la Saône au carrefour de routes romaines. Lune de ces routes (La via Agrippa) reliait Lyon à Macon, Tournus et Chalon . Une autre se dirigeait vers Cluny et enfin la dernière se dirigeait vers la vallée de la Loire. La ville fut fondée par les seigneurs de Beaujeu au milieu du XIIe siècle comme Villefranche et Thizy.  Vers 1160, le seigneur de Beaujeu accorda à Belleville des franchises. \r\nChâteau de la Plume du XVIIe siècle qui se loue pour diverses manifestations.","architecture":"Château de la Plume du XVIIe siècle deux corps de bâtiment jouxtés","habitants":"seigneurs de Beaujeu\r\n        \"","divers":"Château de la Plume à Belleville.","gps":"","images":["../../jctruffet.com/image/image_69/69_Plume_1.jpg","../../jctruffet.com/image/image_69/69_Plume_2.jpg","../../jctruffet.com/image/image_69/69_Plume_3.jpg"]},"Consult_chateau_formulairea0cd":{"id":"Consult_chateau_formulairea0cd","dept":"69","canton":"Neuville-sur-Saône","commune":"Poleymieux","nom":"Poleymieux","type":"Vestiges","periode":"XV","histoire":"POLEYMIEUX, avant le XIIe siècle fief des chanoines seigneurs devenu comte de Lyon partagèrent avec l'archevêché les biens.  Après cette date Etienne de Lissieu tient le fief et de nombreux autres seigneurs se succédèrent, les Sollier, les Peytel, les Prés de Sandres, les Martorée, les Salminon, les Chauvin,  les Chavannes, les Fond-Grimaud et les Servant, qui vendirent la seigneurie a Marie Aimé Guillin Dumontet, ce dernier à 25 ans s'engagea dans la marine du marquis de Roux puis passa à celle  \"Française des Indes\"  commandant de deux navires le Saint-Luc et l'Alouette , nommé lieutenant en 1759, plusieurs expéditions et démissionne pour rester au service du roi, il reçoit  d'autres taches qui l'éloignèrent de plus de vingt ans de la France, en 1785 fit retour dans son château avec la nomination de colonel et décoré de la croix de Saint-Louis, anobli prit le nom de Antoine Guillin de Pougelon, devenu violent et coléreux et il est soupçonné d'avoir participé à un complot contre Louis XVI, il  est arrêté, mais relâché aussitôt suite à la fuite de Louis XVI et s'enferme dans son château, la population de son village et les jacobins le soupçonne d'avoir participé à cette fuite  et le 26 juin 1791  attaquèrent le château,  Guillin Dumontet tire sur la foule qui s'acharnèrent sur Guillin le massacrèrent et mirent le feu au château qui ne fut pas reconstruit, sa femme et ses filles purent se sauver à l'étranger. Ils reste quelques vestiges de pierres du château.                                Dans la commune la tour Rysler.","architecture":"Poleymieux la tour ronde de Rysler   fait partie du château de Poleymieux , statue d'Ampère.","habitants":"Famille Marie Aimé Guillin Dumontet\r\n        \"","divers":"Poleymieux, portail, ampère et tour.","gps":"","images":["../../jctruffet.com/image/image_69/69_Poleymieux_1.jpg","../../jctruffet.com/image/image_69/69_Poleymieux_2.jpg","../../jctruffet.com/image/image_69/69_Poleymieux_3.jpg","../../jctruffet.com/image/image_69/69_Poleymieux_4.jpg"]},"Consult_chateau_formulaire1b01":{"id":"Consult_chateau_formulaire1b01","dept":"69","canton":"Vaugneray","commune":"Pollionnay","nom":"Pollionnay","type":"Maison forte","periode":"XV","histoire":"POLLIONNAY, au XII-XIIIe siècle  le village appartenait au comte de Lyon, fut fortifié par l'archevêque Renaud du Forez entre 1193 et 1298. En 1293 le château est rétrogradé au rang de maison forte. Au XVe siècle la famille Ballarin le remanie pour lui donne l'aspect château,   fut ensuite érigé en baronnie au XVIe siècle et dépendait de l'archiprêtre de Courzieu, le dernier seigneur de Pollionnay fut le marquis de Loras  qui fut exécuté à la Révolution.   Ce château fut acquis au XIXe siècle utilisé pour l'exploitation agricole et revendu en 1940. toujours dans la famille de Loras.","architecture":"Pollionnay, ce château du XVe siècle corps de logis renaissance avec tour carrée  du XIIIe siècle. Tour porche médiévale.","habitants":"Famille Ballarin \r\n        \r\n        \"","divers":"Château de Pellionnay","gps":"","images":["../../jctruffet.com/image/image_69/69_Pollionnay_1.jpg","../../jctruffet.com/image/image_69/69_Pollionnay_2.jpg","../../jctruffet.com/image/image_69/69_Pollionnay_3.jpg","../../jctruffet.com/image/image_69/69_Pollionnay_4.jpg"]},"Consult_chateau_formulaire2000":{"id":"Consult_chateau_formulaire2000","dept":"69","canton":"Lamure-sur-Azergues","commune":"St-Nizier-d`Azergues","nom":"Pramenoux","type":"Château","periode":"XV","histoire":"PRAMENOUX, le premier fief fut cité au Xe siècle, château féodal au XIIe siècle puis fut la possession des sires de Beaujeu certainement construit par ces derniers. Au XVe siècle les de Ronchivol  en était seigneur de Pramenoux transformé en prieuré  bénédictin. A été remanié au cours des années. Actuellement hôtel de luxe  par Jean luc Plasse et Claude Beaudin ; à servit pour tourner un film \" le bel été 1914\" avec Claude Riche et Maria Pacome.","architecture":"Pramenoux,  corps de logis rectangulaire à trois niveaux encadré d'ailes de dépendance formant un U  avec tours rondes à toits poivrières  en façade et tourelles à l'opposée.","habitants":"Famille Beaudin\r\n        \"","divers":"Châteaux de Pramenoux et de Claveisolles","gps":"","images":["../../jctruffet.com/image/image_69/69_Pramenoux_1.jpg","../../jctruffet.com/image/image_69/69_Pramenoux_2.jpg","../../jctruffet.com/image/image_69/69_Pramenoux_3.jpg","../../jctruffet.com/image/image_69/69_Pramenoux_4.jpg","../../jctruffet.com/image/image_69/69_Pramenoux_5.jpg","../../jctruffet.com/image/image_69/69_Pramenoux_6.jpg","../../jctruffet.com/image/image_69/69_Pramenoux_7.jpg"]},"Consult_chateau_formulairefcb6":{"id":"Consult_chateau_formulairefcb6","dept":"69","canton":"Le Bois-d`Oingt","commune":"Le Bois-d`Oingt","nom":"Prosny","type":"Château","periode":"XIV","histoire":"PROSNY, est lié a celui de Courbeville à Chessy-les-Mines et le château de la Garde à St Vérand  par la légende de la dame Blanche. Le premier des seigneurs  d'Oingt qui  en 1093 passa à Unfred d'Oingt jusqu'en 1382 passa ensuite au seigneur Guichard d'Oingt qui fit construire la forteresse. La seigneurie passa ensuite par alliance à la famille de Fougères, puis en 1525 à la famille de Châteauneuf  d'où le nom de Châteauneuf de Rochebonne. Le bourg fut détruit en 1562 par le baron des Adrets et s'en suivit une épidémie qui détruisit une grande partie de la population, du XIVe siècle fief des seigneurs de Prosny, en 1668 Gaspard  fils de Melchior de Mornieu héritier du domaine appelé au service du roi en 1675 arrêté et emprisonné à Philsbourg absent plusieurs mois, ce dernier avait épousé clandestinement et contre la volonté de ses parents sa voisine Claire de Saillans du château de Courbeville, cette dernière pendant son absence s'était éprise du valet Curtil  au retour de son époux se réfugia  chez ses parents qui avait intégré le château de La Garde à St-Vérand.   Gaspard de Mornieu  fit condamné Curtil à la pendaison, ce dernier disparaît, mais Gaspard fit enfermé son épouse dans une geôle de l'archevêché de Lyon, puis plus tard  pour ses deux fils, Gaspard récupère sa femme est retourna habité  à Courbeville, est-ce cela  la légende?  Prosny, propriété en 1755 à 1839 de Gaspard-François-Marie Riche de Prosny membre de l'institut directeur de l'école nationale des ponts et chaussées, sa descendance donna un biographiste Riche de Prony Gaspard Clair-Marie fondateur de l'académie royale et inventeur du sonomètre.                                                             Le château de la GARDE au XIIIe siècle  était la propriété de l'archevêque de Lyon Renaud du Forez.","architecture":"Prosny. du XIVe siècle à deux tours d'angles crénelées  et tours carrées percées de meurtrières.                                         \r\nCourbeville à Chessy château du XIIe siècle tours rondes massives           La Garde à St Vérand de style plus récent en équerre à trois niveaux.","habitants":"Famille de Melchior de Mornieu\r\n        \"","divers":"Château de Chessy, de Courbeville et de La Garde.","gps":"","images":["../../jctruffet.com/image/image_69/69_Prosny_1.jpg","../../jctruffet.com/image/image_69/69_Prosny_2.jpg","../../jctruffet.com/image/image_69/69_Prosny_3.jpg","../../jctruffet.com/image/image_69/69_Prosny_4.jpg","../../jctruffet.com/image/image_69/69_Prosny_5.jpg"]},"Consult_chateau_formulaire1a01":{"id":"Consult_chateau_formulaire1a01","dept":"69","canton":"Meyzieu","commune":"Pusignan","nom":"Pusignan","type":"Vestiges","periode":"XII","histoire":"PUSIGNAN, au XIIe siècle forteresse féodale, construite  par le seigneur Moifond, au XVIe siècle le roi Charles VI donne l'autorisation de démolir l'ancien château. Au XVe siècle Pusignan se trouve mêlé aux conflits du royaume de France et du Duché de Bourgogne,  Alix de Varax seigneur de Pusignan prend parti du prince d'Orange. Le gouverneur du Dauphiné Raoul de Gaucourt sentant le danger demande l'aide du sénéchal de Lyon Humbert de Grolée, son armée étant numériquement inférieure fait appel au capitaine des routiers Rodrigue de Villandrando prennent l'initiative de s'emparer du château déjà occupé par les Orangistes, Auberives Pusignan, Azieu et Colombier  à l'exception de celui d'Anthon toujours assiégé par les Orangistes, le 11 juin 1430 Louis de Chalon avec ses quatre milles hommes lance sa marche prenant par surprise les mille six cents soldats ces derniers capitulent prennent la fuite, et les châteaux furent sauvés et Charles VII confisqua le château de Pusignan à Alix de Varax et en fit don à Rodrigue de Villandrando qui y résida peu de temps.  Il fut racheté en 1450 par Aymar de Poissieu lieutenant de Jeanne d'Arc, vendu à nouveau en 1573 à François Costang neveu d'Aymar de Poisieu  son fils Claude décéda le 10 mai 1689 par coup mortel et revendu à plusieurs reprises pour arriver à Hugues Gautier de Mézia en 1745 et le château fut pillé et incendié à la Révolution, après cette dernière le château servit de carrière.","architecture":"Pusignan, il ne reste presque plus rien de ce château.","habitants":"Famille d'Alix de Varax \r\n        \"","divers":"Tour et vestiges à Pusignan","gps":"","images":["../../jctruffet.com/image/image_69/69_Pusignan_1.jpg","../../jctruffet.com/image/image_69/69_Pusignan_2.jpg"]},"Consult_chateau_formulaired17f":{"id":"Consult_chateau_formulaired17f","dept":"69","canton":"Beaujeu","commune":"Quincié-en-Beaujolais","nom":"Quincie_Varennes","type":"Château","periode":"XV","histoire":"QUINCIE-VARENNES, trois châteaux dans cette commune, le château de  PALUD, le plus ancien  du XVe siècle ou Louis XI aimé s'arrêter, et  en 1482, il fut reçu par la famille Barjot seigneur de la Palud. Le château fut  reconstruit au XVIIe siècle, il fut un des châteaux huguenots pendant les guerres de religion ou Anne de Senneton veuve de Guillaume Barjot tint tête au chef de la ligue Monsieur de Nague Varennes.                                                          Deux autres châteaux dans la commune,  château de SOUZY , construit en 1765 dominant la vallée de l'Adrières  transformé en hôtel restaurant.  Château de Varennes voir article.","architecture":"Quincie; Palud origine du XVe siècle fut  reconstruit au XVIIe siècle, il ne reste que deux tours rondes du XVe siècle qui relient le corps de Logis.","habitants":"Famille Barjot\r\n        \"","divers":"Châteaux de Quinciè-Varennes, de la Palud et de Souzy.","gps":"","images":["../../jctruffet.com/image/image_69/69_Quincie_Varennes_1.jpg","../../jctruffet.com/image/image_69/69_Quincie_Varennes_2.jpg","../../jctruffet.com/image/image_69/69_Quincie_Varennes_3.jpg","../../jctruffet.com/image/image_69/69_Quincie_Varennes_4.jpg","../../jctruffet.com/image/image_69/69_Quincie_Varennes_5.jpg","../../jctruffet.com/image/image_69/69_Quincie_Varennes_6.jpg"]},"Consult_chateau_formulaire2ce9":{"id":"Consult_chateau_formulaire2ce9","dept":"69","canton":"Le Bois-d`Oingt","commune":"Theizé","nom":"Rapetour","type":"Château","periode":"XIII-XV","histoire":"RAPETOUR, de 1300 à 1400 a appartenu à la famille Viègo sous le régime de l'abbé d'Ainay, à l'extinction de cette famille en 1422 passa à Henri de Varennes, seigneur  de Courbeville  et restera  dans cette famille  jusqu'en 1710, passera ensuite à la famille Brossette, avocat, membre fondateur de l'académie des sciences des arts et des lettres à Lyon jusqu'à la Révolution, transformé partagé  en exploitation agricole par différents fermiers mais l'état du château se dégrade. En 1970 les Chiarinelli  exploitant agricole décide de le vendre avec l'appui du conseil général pour classement MH, passa aux Gaucherand en 1992.","architecture":"Rapetour, construction du XIII-XVe siècle féodal de forme quadrilatère d'aspect médiéval porte d'entrée en arc brisé dans la cour intérieure renaissance, une galerie renaissance, échauguettes, bretèches, mâchicoulis en encorbellement et plusieurs tours, une carrée du XIe siècle et d'une ronde du XVe siècle.","habitants":"Famille Viègo                                                                               Famille Gaucherand\r\n        \"","divers":"Château de Rapetour.","gps":"","images":["../../jctruffet.com/image/image_69/69_Rapetour_1.jpg","../../jctruffet.com/image/image_69/69_Rapetour_2.jpg","../../jctruffet.com/image/image_69/69_Rapetour_3.jpg","../../jctruffet.com/image/image_69/69_Rapetour_4.jpg","../../jctruffet.com/image/image_69/69_Rapetour_5.jpg"]},"Consult_chateau_formulaire1b08":{"id":"Consult_chateau_formulaire1b08","dept":"69","canton":"Beaujeu","commune":"Regnie-Durette","nom":"Regnie_Durette","type":"Château","periode":"XII","histoire":"REGNIE-DURETTE, au XIIe siècle la seigneurie était situé à la Tour-Bourdon est dépendait des sires de Beaujeu, le château a était remplacé au XVIe siècle par le château de la PIERRE remanié au XIXe siècle dont il reste deux tours et un corps de bâtiment important, en 1823 un Pierre Dulac habite le Château.       Dans la commune  le château du VERGERS château viticole construit vers 1870 de Joseph-Bertrand-Marie-Blanche Yemeniz hérite du château  passera  à son neveu  Guy Yemeniz  en prend possession il est habité actuellement par sa fille Blanche de Romefort.                                                                        \r\n Château du PALADIO du XIX dit château de Vernus, gites de France.                                                                                   Château PONCHON et domaine GRANGE-CHARTON du XIXe siècle  et le petit château SAINT-VINCENT  qui est resté plus de deux siècles dans la même famille  à eu le plaisir de recevoir souvent monsieur Lamartine, aujourd'hui propriété viticole.","architecture":"Regnié-Durette, du château de la Tour- Bourdon du XIIe siècle reste des vestiges qui en valent le détour. Château de la Pierre composé d'un corps de logis important avec deux tours.                          Château des Vergers  du XIXe siècle, corps de logis central à deux niveaux accolé de deux petits pavillons inférieurs sur les côtés  et pavillons plein cintre saillant en façade.","habitants":"Sires de Beaujeu\r\n        \"","divers":"Châteaux  de Reyssiers, de Ponchon, de la Pierre de la Tour, de Cadole Palladio, de la Grange Charton, des Vergers et de Saint-Vincent.","gps":"","images":["../../jctruffet.com/image/image_69/69_Regnie_Durette_1.jpg","../../jctruffet.com/image/image_69/69_Regnie_Durette_2.jpg","../../jctruffet.com/image/image_69/69_Regnie_Durette_3.jpg","../../jctruffet.com/image/image_69/69_Regnie_Durette_4.jpg","../../jctruffet.com/image/image_69/69_Regnie_Durette_5.jpg","../../jctruffet.com/image/image_69/69_Regnie_Durette_6.jpg","../../jctruffet.com/image/image_69/69_Regnie_Durette_7.jpg"]},"Consult_chateau_formulaire8dd4":{"id":"Consult_chateau_formulaire8dd4","dept":"69","canton":"Mornant","commune":"Riverie","nom":"Riverie","type":"Château","periode":"XVII","histoire":"RIVERIE, au XIe siècle fief des seigneurs  d'Adon de la Riverie, au XIIIe siècle, le seigneur  Guillaume de Roussillon part en Terre Sainte  en 1275 sur demande de Philippe le Hardi dont il ne reviendra pas,  son épouse Béatrix de la Tour fonda la chartreuse de Sainte-Croix pour s'y retirer. Au XVe siècle appartient au Bourbon comte du Forez Charles de Bourbon sa belle mère Anne de France vendit la seigneurie à Claude Laurencin bourgeois lyonnais. En 1570 les Laurencin vendirent la baronnie à Antoine Camus  échevin trésorier de France, s'étant rallié à Henri de Bourbon, héritier du trône de France, son château fut assiégé en 1590 par les ligueurs. Village pillait et château détruit, en 1673  la baronnie fut acquise par les frères Bénéon \"marchands passementiers\" château reconstruit aux XVIIe siècle à Saint-Symphorien le Château, leur neveu  Jean Claude Grimod secrétaire du Roi en hérita.  En 1789 le baron était François, Jean-Jacques Grimod de Bénéon seigneur de Châtelus et de Cornillon capitaine du régiment d'enfanterie, lieutenant des maréchaux de France chevalier de Saint-Louis, représentant la noblesse aux états-généraux de Lyon, le baron émigra en Suisse en 1791, en 1802 sa fille madame de Montherot  veuve, vend en 1880  la propriété à sept propriétaires et en 1963 la commune achète le château restauré depuis aujourd'hui abrite la mairie et une école publique.","architecture":"Riverie, premier château du XIe siècle il se composait d'un donjon important flanqué de tours massives, une enceinte enveloppant le sommet d'un piton rocheux il ne reste plus rien.                              \r\n Du château du XVIe siècle il ne reste qu'un corps de bâtiment transformé en hôtel de ville.","habitants":"Famille d'Adon de la Riverie\r\n        \"","divers":"Château de la Riverie","gps":"","images":["../../jctruffet.com/image/image_69/69_Riverie_1.jpg","../../jctruffet.com/image/image_69/69_Riverie_2.jpg","../../jctruffet.com/image/image_69/69_Riverie_3.jpg","../../jctruffet.com/image/image_69/69_Riverie_4.jpg","../../jctruffet.com/image/image_69/69_Riverie_5.jpg"]},"Consult_chateau_formulairea806-2":{"id":"Consult_chateau_formulairea806-2","dept":"69","canton":"Beaujeu","commune":"Jullie","nom":"Roche_Jullie","type":"Château","periode":"XVII","histoire":"ROCHE, la  famille de Monspey qui le reçut en héritage  et le possède toujours depuis le XIVe siècle appartenait à Edouard de la Roche seigneur de la cour,  Louis Charier de la Roche évêque de Versailles, il est enterré dans la chapelle la famille de Richelieu, il est dans la descendance de cette famille.","architecture":"Roche, corps de logis a deux niveaux  flanqués de quatre gros pavillons carrées à toits édifiés au XVIIe siècle, les anciens fossés sont en parties comblés, mais reste aujourd'hui  un pont-levis tournant  sur des douves sèches  et une splendide grille en fer forgée.","habitants":"famille Charrier de la Roche\r\n        \"","divers":"Château de la Roche.","gps":"","images":["../../jctruffet.com/image/image_69/69_Roche_Jullie_1.jpg","../../jctruffet.com/image/image_69/69_Roche_Jullie_2.jpg","../../jctruffet.com/image/image_69/69_Roche_Jullie_3.jpg"]},"Consult_chateau_formulaired85d":{"id":"Consult_chateau_formulaired85d","dept":"69","canton":"Le Bois-d`Oingt","commune":"Theizé","nom":"Rochebonne(69)","type":"Château","periode":"XVI","histoire":"ROCHEBONNE, la première bâtisse des chanoines comtes de Lyon fut rasé en 1363 par eux-mêmes de peur qu'elle tombe dans les mains des Anglais. Une première construction commença au XVe siècle comme prieuré et relais vigie du château d'Oingt ou règne la famille de Fougères. En 1525 par alliance passe à Pierre de Châteauneuf, sénéchal du Puy, gouverneur du Velay prit le titre de Baron de Rochebonne par son mariage  avec Huguette  de Fougères,  héritière d'Oingt. Le château subit des dégâts lors des guerres de religion en partie détruit par le baron des Adrets en 1572. Vers 1650 Françis de Châteauneuf de Rochebonne transforme l'édifice en un véritable  château qui passa par extensions successives  de sa forme originale à celle de château fort classique, Cette demeure reçu des hôtes tel que la marquise de Sévigné car Charles de Rochebonne épousera en 1675 Thérése Adhémar de Grignan belle-soeur de la belle-fille de la Marquise.               A la mort de Charles-François de Châteauneuf dernier de la lignée. Rochebonne passe à la famille de Antoine Rique, écuyer du Roi appelé Baron de Nervo.                                                               A la Révolution vendu comme bien national passa ensuite à différents propriétaires qui le laissèrent dépérirent, il est inscrit aux monuments historiques en 1985 Jean Gabriel Mortanet architecte le pris en mains pour le restaurer.                                                        Dans la commune autres châteaux le clos de la PLATRIERE ou madame Roland y vécut avant la Révolution; le château de Rapetour (voir article) le château de CRUIX au milieu d'un parc bien entretenu par ses propriétaires (privé).","architecture":"Rochebonne, dominant le village fut construit au XVIIe siècle remanié au fils des ans pour terminer en château classique robuste; D'un corps de logis rectangulaire à trois niveaux flanqués de deux grosses tours rondes en saillie, fronton triangulaire et terrasses avec balustrades de pierres.","habitants":"Famille de Pierre de Châteauneuf\r\n        \"","divers":"Château de Rochebonne.","gps":"","images":["../../jctruffet.com/image/image_69/69_Rochebonne(69)_1.jpg","../../jctruffet.com/image/image_69/69_Rochebonne(69)_2.jpg","../../jctruffet.com/image/image_69/69_Rochebonne(69)_3.jpg","../../jctruffet.com/image/image_69/69_Rochebonne(69)_4.jpg","../../jctruffet.com/image/image_69/69_Rochebonne(69)_5.jpg","../../jctruffet.com/image/image_69/69_Rochebonne(69)_6.jpg"]},"Consult_chateau_formulaire8259":{"id":"Consult_chateau_formulaire8259","dept":"69","canton":"St-Symphorien-de-Coise","commune":"St-Martin-d`en-Haut","nom":"Rochefor(69)","type":"Vestiges","periode":"XII","histoire":"ROCHEFORT, les seigneurs de Rochefort étaient au XIIe siècle les vassaux du comte de Forez, la seigneurie passa sous la suzeraineté  de l'église de Lyon  de 1193 à 1226  Renaud de Forez archevêque de Lyon acheta le château de Rochefort, il édifia des fortifications entre 1372 et 1444 des travaux y furent exécutés par Gilet d'Albon.                           Au XVe siècle fuyant la peste les chanoines quittèrent Lyon pour Rochefort puis fut abandonné et tomba en ruines.","architecture":"Rochefort, du Château du XIIe siècle, remanié  au XVe siècle . Aujourd'hui il ne reste que des pans de murs ruinés.","habitants":"Renaud de Forez\r\n        \"","divers":"Vestiges du château de Rochefort","gps":"","images":["../../jctruffet.com/image/image_69/69_Rochefort(69)_1.jpg","../../jctruffet.com/image/image_69/69_Rochefort(69)_2.jpg","../../jctruffet.com/image/image_69/69_Rochefort(69)_3.jpg","../../jctruffet.com/image/image_69/69_Rochefort(69)_4.jpg"]},"Consult_chateau_formulairee0e4":{"id":"Consult_chateau_formulairee0e4","dept":"69","canton":"Amplepuis","commune":"Amplepuis","nom":"Rochefort_Amplepuis","type":"Château","periode":"XIV-XVIIe","histoire":"ROCHEFORT, du XIV-XVIIe siècle ancienne demeure ayant appartenu à Guichard d'Oingt qui fit construire le château, appelé aussi château \"des Templiers\" passa à Guichard de Sarron, passa en 1460 à Claude de Revé que  sa descendance fit en 1557  la première école du village d'Amplepuis. En 1562 le Bourg d'Oingt fut détruit par le baron des Adrets et une épidémie  décima les habitants, puis le château passa à Pierre d'Auxerre et aux Pomey et en  1789 propriété des de Varax, une société de sauvegarde restaure le château .","architecture":"Rochefort, Aujourd'hui vestiges du château du XIIIe siècle, reconstruit au XIVe siècle quadrangulaire flanqué de quatre tours carrées pavillon d'entrée, portail Louis XIII à mâchicoulis, pont-levis.","habitants":"Famille de Pierre d'Auxerre\r\n        \"","divers":"Château de Rochefort.","gps":"","images":["../../jctruffet.com/image/image_69/69_Rochefort_Amplepuis_1.jpg","../../jctruffet.com/image/image_69/69_Rochefort_Amplepuis_2.jpg","../../jctruffet.com/image/image_69/69_Rochefort_Amplepuis_3.jpg"]},"Consult_chateau_formulairea4be":{"id":"Consult_chateau_formulairea4be","dept":"69","canton":"Neuville-sur-Saône","commune":"Rochetaillée-sur-Saône","nom":"Rochetaillee(69)","type":"Château","periode":"XVI","histoire":"ROCHETAILLEE, dès le XIIe siècle l'église de Lyon  était propriétaire d'une maison forte qui devait son nom au banc de rochers qui formait barre sur la Saône, Etienne II de Villars détient  la seigneurie  de Rochaitaillée sur Saône et celle de l'ile Barbe, puis en 1173 il en fait don au Chapitre de Lyon, dépendant des Missionnaires lyonnais jusqu'en 1562 ou les bâtiments se délabrent et suite aux guerres de religion fut  incendié par les huguenots,  le château  fut reconstruit en 1655, et remanié par Antoine de Foudras au XVIIIe siècle et François de Foudras construisit la chapelle. En 1790 vendu comme bien national tomba de nouveau en ruines, et  en 1892  Pierre Claude  Bellingard le restaure, puis acquit par Jean-Joseph Clerc  en 1902  poursuit sa restauration et c'est en 1959 que Henri Malartre l'acheta et en fait un musée de l'automobile très renommé.","architecture":"Rochetaillée, château construit en 1655 sur l'emplacement d'une maison forte  de style renaissance  deux pavillons en façade sud accolé d'une tour octogonale  d'angles (escalier) à toits pointus l'ensemble des toitures sont vernissées. De l'époque médiévale ne subsiste que la porte romane donnant l'accès à la tour ronde.","habitants":"Famille d'Henri Malartre\r\n        \"","divers":"Château de la Rochetaillée.","gps":"","images":["../../jctruffet.com/image/image_69/69_Rochetaillee(69)_1.jpg","../../jctruffet.com/image/image_69/69_Rochetaillee(69)_2.jpg","../../jctruffet.com/image/image_69/69_Rochetaillee(69)_3.jpg","../../jctruffet.com/image/image_69/69_Rochetaillee(69)_4.jpg","../../jctruffet.com/image/image_69/69_Rochetaillee(69)_5.jpg"]},"Consult_chateau_formulaire9192":{"id":"Consult_chateau_formulaire9192","dept":"69","canton":"St-Symphorien-de-Coise","commune":"Pomeys","nom":"Saconay","type":"Château","periode":"XIV","histoire":"ST-SYMPHORIEN sur Coise, au VIIIe siècle la ville s'appelé Saint André des Arcs,  elle fut confié à Saint-Symphorien et le nom Coise pour les confections de chaussures. Au XIe siècle le château fut construit  à l'emplacement de l'église actuelle qui a été construite au XIIIe siècle, à cette époque les chanoines de Saint-Jean furent les seigneurs. Un château royal fut construit appelé château des comtes.                                                                  SACONAY;  Au XIIIe siècle, l'origine de cette seigneurie possédait une maison forte qui s'appelait  la Carrodière, et qui appartenait  à Jean de Lemps, seigneur du Mouchet, qui vendra la seigneurie  en 1558  à la famille de Saconay qui lui donna leur nom et firent des remaniements  de la maison forte en château;  à la mort de Gabriel Saconay son neveu Théodore hérita, mais décède en 1586, le château passe à Pierre de Sarron de Forges qui avait épousé Jeanne  la nièce  de Théodore, dans sa descendance jusqu'en 1695 qui le cédèrent à Pierre de la Roue et le cède ensuite en 1702 à la famille Gayot et racheté en 1707 par Claude Guillet et en 1740 le château passe par héritage à la famille Dereste qui feront construire le donjon et par héritage le château passe à la famille de Brosse, toujours dans la descendance.","architecture":"Saint-Symphorien sur Coise qui est une ville fortifié ; étant au XIVe siècle  l'une des ville les plus fortifié du lyonnais  une partie des remparts sont encore visibles et la porte de la Riverie une des trois portes existantes de l'époque; Saconay: D'une maison forte passe en château au XVIe siècle, qui avait à l'origine un corps de logis  dans une enceinte flanqué de tours rondes est entourée de fossés; le donjon a mâchicoulis fut rajouté en 1892.","habitants":"Famille de Saconay\r\n        \"","divers":"Châteaux de Saconay et de Saint-Symphorien de Coise.","gps":"","images":["../../jctruffet.com/image/image_69/69_Saconay_1.jpg","../../jctruffet.com/image/image_69/69_Saconay_2.jpg","../../jctruffet.com/image/image_69/69_Saconay_3.jpg","../../jctruffet.com/image/image_69/69_Saconay_4.jpg","../../jctruffet.com/image/image_69/69_Saconay_5.jpg"]},"Consult_chateau_formulaire5dae":{"id":"Consult_chateau_formulaire5dae","dept":"69","canton":"Neuville-sur-Saône","commune":"Quincieux","nom":"Salles","type":"Château","periode":"XV","histoire":"la SALLE, plusieurs familles se sont succédés dont les Montgolfier, depuis 1850 la famille Royé  l'exploite en  vignobles  et possède également un golf.","architecture":"Salles, ensemble du XVIIIe siècle corps de logis carré au centre de deux ailes et deux autres en retour formant la cour.","habitants":"Famille de Montgolfier\r\n        \"","divers":"Château de la Salles.","gps":"","images":["../../jctruffet.com/image/image_69/69_Salles_1.jpg","../../jctruffet.com/image/image_69/69_Salles_2.jpg"]},"Consult_chateau_formulaire5499":{"id":"Consult_chateau_formulaire5499","dept":"69","canton":"Arbresle","commune":"Savigny","nom":"Savigny","type":"Vestiges","periode":"VIII","histoire":"SAVIGNY, vestiges d'une abbaye bénédictine du VIIIe siècle qui cette dernière possédait des biens et des terres dans tout le sud-est  et même en Suisse, recevait des revenus de soixante dix paroisses, ils construisirent pour se protéger autour de Savigny  des châteaux  et maison forte tel que St-Bel, l'Arbresle, Montrottier, forteresse de Chessy de St Romain de Popey, maison forte de Vindry mas de Bessenay et St-Bonnet le Froid, les prieurés  étaient fortifiés tel que Tarare les abbés en étaient les seigneurs des lieux.        L'abbé Dalmace fit construire le mur d'enceinte de l'Arbresle.               Au XVe siècle et XVIIe siècle la famille d'Albon fournirent des abbés a Savigny tel que le jeune Roi Charles VII en 1489. Ils eurent beaucoup de conflits tel que la guerre de cents ans par les Anglais, les pillards de 1360 à 1370 les troupes du baron des Adrets pendant les guerres de religion. Au XVIIIe siècle déclin par raréfaction des moines et en 1779 un brevet royal supprime l'abbaye et la Révolution en 1789 fit le reste, les biens furent vendus comme bien national  et certains autres biens comme carrière de pierres.","architecture":"Savigny, sur Savigny quelques vestiges de l'Abbaye, la tour de l'horloge  reconstruite au XIVe siècle  la Charmerie, l'hôtellerie, la maison du Cellier sont des dépendances du XVe siècle. Arbresle,  des murs d'enceintes qu'ils firent construire,  ils ne reste que quelques vestiges encore visibles. Le Manoir de Tournieux  vous charmera par ses pierres de taille, son parc aux arbres centenaires, sa piscine dans son écrin de verdure.","habitants":"Les Abbés seigneurs\r\n        \"","divers":"Tour de l'horloge de Savigny et le manoir de Tournieux","gps":"","images":["../../jctruffet.com/image/image_69/69_Savigny_1.jpg","../../jctruffet.com/image/image_69/69_Savigny_2.jpg"]},"Consult_chateau_formulairefaca":{"id":"Consult_chateau_formulairefaca","dept":"69","canton":"Villefranche-sur-Saône","commune":"Lacenas","nom":"Sou_Lacenas","type":"Château","periode":"XIV","histoire":"SOU, fief de la famille de Thelis, Jean de Thelis l'Espinasse gouverneur et lieutenant  fit construire le château au XIVe siècle, sans postérité le château passa à un de ses neveux Jocerand de Thélis  écuyer,  puis à un autre neveu  Antoine  de Thélis, son fils  Louis de Thelis en 1539  vend le château  à Claude de Gaspard riche marchand caladois, son fils Jean, lieutenant épouse Claudine de Tenay, leur fils Claude seigneur de Sou et conseillé du roi épouse Marguerite de la Porte. Le château restera dans cette famille jusqu'en 1767, Jean avait  fait don du château à son frère Joseph-Marie  prêtre à Orléans qui céda le château à un cousin Mignot de Bussy, à la Révolution cette famille émigra et le château vendu comme bien national.  Actuellement le château possède plusieurs propriétaires  et également utilisé pour des mariages, séminaires par madame Sailly-Mars.                                                Dans la commune deux autres châteaux, le château de MONTAUZAN du XVIe siècle  a été la propriété de deux familles successives, la première la famille Bessie acquiert le domaine à la fin du XVIe siècle et prend désormais le nom de Bessie de Montauzan. Le premier représentant connu de cette famille est Ponthus Bessie, seigneur de Montauzan vers 1636, il épouse Claudine Mélin. \r\nEn 1745, la famille Germain se rend propriétaire du château et se fait désormais appeler Germain de Montauzan.\r\nPhilippe, qui épouse Étiennette Gourd, est un bourgeois de Lyon  et son fils Jean-Baptiste Philippe, est négociant   en vin et maire de Lacenas. Il épouse en secondes noces Amélie Jeanne Marie Joséphine Poidebard, leur fils aîné\r\nPhilippe Étienne Élysée Timothée, épouse Clarisse Louise Marie Claire Gibert de Chazotte. En 1966, le cuvier est cédé à l'Ordre des Compagnons de Beaujolais. La famille Germain est toujours propriétaire\r\ndu château, qui est devenu un domaine viticole du Beaujolais. et le château de BIONNAY avec un grand parc (voir article).","architecture":"Sou, construit au XIVe siècle, enceinte féodale fortifiée avec tours carrées et rondes dont une possède la chapelle gothique  au blason de la famille Gaspard, traces de pont-levis douves grandes parties comblées et meurtrières.                                                               Ce château fut remanié au fil des ans.","habitants":"Famille de Jean de Thelis l'Espiasse\r\n        \"","divers":"Château de Sou,  de Montauzan et des Bionnay","gps":"","images":["../../jctruffet.com/image/image_69/69_Sou_Lancenas_1.jpg","../../jctruffet.com/image/image_69/69_Sou_Lancenas_2.jpg","../../jctruffet.com/image/image_69/69_Sou_Lancenas_3.jpg","../../jctruffet.com/image/image_69/69_Sou_Lancenas_4.jpg","../../jctruffet.com/image/image_69/69_Sou_Lancenas_5.jpg"]},"Consult_chateau_formulaire0d46":{"id":"Consult_chateau_formulaire0d46","dept":"69","canton":"Givors","commune":"St-Andéol-le-Château","nom":"St_Andeol","type":"Vestiges","periode":"XII","histoire":"SAINT-ANDEOL, le château jusqu'à la Révolution  était une seigneurie avec tout les droits de justice, les seigneurs étaient les chanoines du Chapitre de Saint-Jean qui déléguèrent leurs pouvoirs à un capitaine châtelain, leur territoire  divisé en trois fiefs  indépendant, la Levretière, la Roche et Saint-Andéol. Renaud du Forez archevêque de Lyon fait fortifier le bourg au XIIIe siècle qui fut assiégé pendant les guerres de religions en 1590.                  Ce village de vignerons devenu très prospère par les emplois industriels. En 1814 occupation du village par les troupes Autrichiennes  après la défaite de Napoléon.","architecture":"St-Andéol, bâtiment ancien accolé à la mairie et porte fortifié d'entrée.","habitants":"Renaud du Forez \r\n        \"","divers":"Porte de la ville et château de saint-Andéol.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Andeol_1.jpg","../../jctruffet.com/image/image_69/69_St_Andeol_2.jpg"]},"Consult_chateau_formulaire3647":{"id":"Consult_chateau_formulaire3647","dept":"69","canton":"Arbresle","commune":"St-Bel","nom":"St_Bel","type":"Château","periode":"XIII","histoire":"SAINT-BEL, construit en 1190 fait partie de la ceinture  de fortifications   pour la défense de l'abbaye de Savigny est devenu au XVe siècle la demeure des abbés d'Albon , il fut vendu comme bien national à la Révolution.  Au XIXe siècle le bâtiment du château fut transformé en habitations.                                        Le château de MONBELLOY même fonction que celui de St-Bel vendu comme bien national à la Révolution, aujourd'hui il ne reste que les vestiges de murailles du XIe siècle et un bâtiment du XVe siècle.","architecture":"Saint-Bel, quadrilatère régulier enfermant une cour cantonnée d'une tour carrée dite la tour de l'horloge du XVe siéècle et d'une tour semi-circulaire dite tour du Colombier du XVe siècle également et la tour des empereurs démolie au XIXe siècle, le bâtiment sud qui abritait le logis des abbés a été en partie reconstruit vers 1850.","habitants":"Abbés d'Albon\r\n        \"","divers":"Château de Saint-Bel.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Bel_1.jpg","../../jctruffet.com/image/image_69/69_St_Bel_2.jpg","../../jctruffet.com/image/image_69/69_St_Bel_3.jpg"]},"Consult_chateau_formulairea401":{"id":"Consult_chateau_formulairea401","dept":"69","canton":"Meyzieu","commune":"St-Bonnet-de-Mure","nom":"St_Bonnet_Mure","type":"Château","periode":"XII","histoire":"St-BONNET, Saint-Laurent, même historique il ne reste que des ruines du château delphinal dans la ferme de la famille Escoffier, ce château était autrefois la seigneurie des barons de Jerphanion barons d'empire, un  descendant de cette famille était le meilleur joaillier de France.  Le dernier baron de Mures est décédé en guerre de Flandres au XVIe siècle dont le plus célèbre était le duc d'Albe au profit de Charles QUINT, le château finit par appartenir aux  Boucquerelle puis aux soeurs de l'ordre des Carméles.               Saint-Bonnet, le château est-il le même  que celui de la  famille Bietrix installée au château depuis 1829 se lança dans la soie, quand sa descendance vendit  le domaine aux surs de la visitation Ste-Marie de Romans en 1920 qui ces dernières vendirent la magnanerie  et le domaine à Max de Saint-Bonnet.","architecture":"Saint-Bonnet, vestiges d'une commanderie du XIIIe siècle.                          Saint-Laurent, du château il ne reste que quelques pans de murs et des bases de tour.","habitants":"Barons de Jerphanion\r\n        \"","divers":"Vestiges du château de Saint-Bonnet de Mure, château de Chavinay et des Barons.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_1.jpg","../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_2.jpg","../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_3.jpg","../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_4.jpg","../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_5.jpg","../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_6.jpg","../../jctruffet.com/image/image_69/69_St_Bonnet_Mure_7.jpg"]},"Consult_chateau_formulairee342":{"id":"Consult_chateau_formulairee342","dept":"69","canton":"Limonest","commune":"St-Cyr-en-Mont-d`or","nom":"St_Cyr","type":"Château","periode":"XII","histoire":"St-CYR, possession du Chapitre de Saint-Jean dès 980 qui firent développer les vignobles et firent  construire au XIIe siècle par Girin, sénéchal  de l'église de Lyon et son successeur Dalmace Morel et achevé par Renaud II de Forez archevêque de Lyon au XIIIe siècle, la seigneurie fut tenue par les chanoines-chapitre sur St-Cyr Couzon, Ecully Rochetaillée Genay Anse St-Germain et Albigny  jusqu'à la Révolution par des capitaines châtelains dont le dernier était le chanoine Prangins de Pingon. Propriété de la commune.                                                                            \r\n Dans la commune un château utilisait comme école de la police, le château des CHAUX et des ORMES transformé en maison de convalescences et le château appelé Maison Blanche.","architecture":"St-Cyr, enceinte quadrangulaire autrefois flanquée de tours crénelées avec un donjon du XIIe siècle haut de 21 mètres. En 1550 un incendie  détruit une partie qui fit perdre son aspect militaire.                       Tour Nesmme ronde escalier en torsade.","habitants":"Girin, sénéchal de l'église de Lyon\r\n        \"","divers":"Tour de Mesme et le Mont-Cindre à Saint-Cyr, château (école de police), château de la Chaux, des Ormes et la Maison Blanche.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Cyr_1.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_2.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_3.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_4.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_5.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_6.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_7.jpg","../../jctruffet.com/image/image_69/69_St_Cyr_8.jpg"]},"Consult_chateau_formulaire2e94":{"id":"Consult_chateau_formulaire2e94","dept":"69","canton":"Limonest","commune":"St-Didier-en-Mont-d`Or","nom":"St_Didier_Montdor","type":"Château","periode":"XVI","histoire":"St DIDIER, le château des Mont-d'Or situé au Collin, berceau supposé de la famille cité, bâtiment du XVIIe siècle  possède plusieurs châteaux, au lieu-dit la Fucharnière, Le Château du Mont dOr, imposante bâtisse du XVIIe siècle, évoque un palais romain. Il présente un grand portail avenue Pasteur qui nest autre que l&#146;ancienne allée de la propriété, créée à la place dun vieux chemin allant de Saint-Didier à Saint-Cyr. Le sieur Grabert avait aussi obtenu en 1658 de forer une galerie de captage pour alimenter ses jardins, «comme aussi de mettre des créneaux aux murailles de clôture de son tènement»,  chose courante à lépoque et qui explique peut-être le terme de «château», un féodal le château de FROMENTE mentionné au Xe siècle subsiste quelques parties du XIIIe et XIVe siècle,  remparts, tours et galeries du XIVe siècle, le corps de logis abrite aujourd'hui un collège.                                    SAINT-ANDRE du XVIIe siècle  sur les soubassements d'une vieille forteresse une tour est encore visible.              ROCHECARDON, manoir du XVIe siècle construit par Horace  Cardon, riche bourgeois lyonnais d'origine italienne , Jean-Jacques Rousseau y séjourna en 1770 et y composa une partie de  ses confessions et le château de la BAROLLIERE du XVIIe siècle.              REMILOTTE. La maison de maître, avec son pavillon carré et les communs, donne sur une cour intérieure où pénétraient charrettes et carrosses. Ainsi on accède directement au vaste hall dentrée desservant les salons au midi. Limmense domaine déroulait jusquà Rochecardon de longues allées de tilleuls et de mûriers et possédait un riche mobilier vendu en 1936. En 1738, léchevin J. Monlong y accueille le jeune Soufflot à son retour dItalie. Ce dernier aurait conçu ici les plans du nouvel Hôtel-Dieu, de lOpéra et de la Loge du Change, cet édifice comportant les vestiges du XIIe siècle ou résida l'orchestre Souflot au XVIIe siècle.                                 CHANTEMERLE chef duvre de carrier du début du XVIIe siècle. La carrière située au-dessus aurait dailleurs servi à bâtir la chapelle de Saint-Fortunat. Le premier seigneur connu est J. Brocquin, marchand lyonnais, célèbre pour avoir joué un grand rôle, avec lAumône Générale en 1531 existait en 1530, il ne subsiste qu'une tour en ruine.                                                                  FERRAND, uvre de P.E. Bissuel (1880) et qui trônait au bord du plateau, ne reste que la maison de gardien, typique de ce style mi-chalet mi-cottage de la deuxième moitié du siècle. Elle forme lentrée du Val Rozay, à langle du chemin Ferrand.","architecture":"St-Didier au Mont d'Or; banlieue lyonnaise ou les châteaux furent construit au XVI et XVIIe siècle. Chantemerle existait en 1530, il ne subsiste qu'une tour en ruine.","habitants":"Seigneurs locaux                                                                   \r\n Famille des Mont d'Or\r\n        \"","divers":"Château à saint-Didier en Mont d'Or et le manoir de Thou, château de St-André du Coing, et entrée du château de Chantemerle.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Didier_Montdor_1.jpg","../../jctruffet.com/image/image_69/69_St_Didier_Montdor_2.jpg","../../jctruffet.com/image/image_69/69_St_Didier_Montdor_3.jpg","../../jctruffet.com/image/image_69/69_St_Didier_Montdor_4.jpg"]},"Consult_chateau_formulaire1a01-2":{"id":"Consult_chateau_formulaire1a01-2","dept":"69","canton":"Belleville","commune":"St-Etienne-la-Varennes","nom":"St_Etienne_Varenne","type":"Vestiges","periode":"XII","histoire":"St-ETIENNE la Varenne, vestiges du château dont il reste la tour haute et ronde appelé  Sarrasine du XIIe siècle propriété de Madame Chuzeville qui en a fait un gîtes de France dans une salle de la tour et dans la salle inférieure abrite une salle d'armes. Saint-Etienne était le fief des sires de Beaujeu.                               \r\n Dans la commune le château du Bluizard  du XIXe siècle, ce magnifique château aux toits ardoisés est situé au hameau du Bluizard. On trouve les premières traces de la demeure en 1260 en tant que ferme fortifiée. Au cours des siècles de nombreuses modifications ont été apportées\r\npour arriver au bâtiment actuel. Par alliance, la famille de Saint Charles devient propriétaire de la propriété au XIXe siècle. Aujourd'hui, c'est la famille Ratignier qui a repris le domaine, constitué d'une grande propriété viticole.                              Château de la Baisse, et le château de Combilaty, le château de Pugelon appartenait à la famille Guillin du Montet.","architecture":"Saint-Etienne la Varenne, château des tours, vestige du XIIe siècle dont-il reste une tour ronde.                                                             Le château du Bluizard  du XIXe siècle.","habitants":"Sires de Beaujeu\r\n        \"","divers":"Le château des tours, de Bluizard, de Carra, du Mas et de Pierreux","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Etienne_Varenne_1.jpg","../../jctruffet.com/image/image_69/69_St_Etienne_Varenne_2.jpg","../../jctruffet.com/image/image_69/69_St_Etienne_Varenne_3.jpg","../../jctruffet.com/image/image_69/69_St_Etienne_Varen t fort de Lorette","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Genis_Laval_1.jpg","../../jctruffet.com/image/image_69/69_St_Genis_Laval_2.jpg","../../jctruffet.com/image/image_69/69_St_Genis_Laval_3.jpg","../../jctruffet.com/image/image_69/69_St_Genis_Laval_4.jpg","../../jctruffet.com/image/image_69/69_St_Genis_Laval_5.jpg"]},"Consult_chateau_formulairefed2":{"id":"Consult_chateau_formulairefed2","dept":"69","canton":"Neuville-sur-Saône","commune":"St-Germain-au-Mont-d`Or","nom":"St_Germain_Mt_Dor","type":"Vestiges","periode":"XII","histoire":"St-GERMAIN, fief de l'archevêque de Lyon en 895, donation du roi de Bourgogne, le château fut édifié au XIIe siècle par Aymon de Pisay et Girin, sénéchal de l'église de Lyon,  la tour et les enceintes furent construites par Dalmace Morel sénéchal de l'église de Lyon, En 1253, le chevalier de Fontanes se réservait un logis au château et au XIVe siècle, nombre despaces étaient lotis, il fut remanié au XIIIe siècle par l'archevêque  Renaud de Forez, seigneur qui suivit le chanoine Antoine d'Ars.                                    Dans la commune château  de la Combe appelé aussi Quinsonas et un manoir utilisé aujourd'hui comme foyer  de vacances, appartenait au Moyen-Age aux Villars, en 1463 aux Bonyn, aux Grollier de Servières, aux Baraillon, aux Dalmas et aux Regnauld de Bellescize.","architecture":"St-Germain; Construit au sommet de la colline dominant la Saône au XIIe siècle,au XV  remise en état du donjon mais sans suite, les autres bâtiments furent remaniés au XVIIe siècle, au XVIIIe siècle on abattit une grande  partie des remparts et ont combla les fossés, garde son enceinte circulaire avec  tours qui renferme un donjon carré roman de 7,80 de côté par 19,50 de haut et la chapelle castrale qui est devenu église paroissiale.                                           Le château  de la Combe appelé aussi des Quinsonas dont la configuration actuelle date de la seconde moitié du XIXe siècle, se compose d'un corps de logis de forme rectangulaire cantonné de quatre tours rondes de faible diamètre percées de fenêtres sur quatre niveaux et englobant une haute tour de forme carrée. Les façades comprennent un avant-corps central en légère saillie d'une travée de quatre niveaux et, de part et d'autre, deux travée de trois niveaux. Au second niveau des pignons, on remarque une galerie composée de cinq arcades.","habitants":"Famille Aymon de Pisay\r\n        \"","divers":"Vestiges de tour du château de Saint-Germain d'un manoir et le château des Quinsonas","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Germain_Mt_Dor_1.jpg","../../jctruffet.com/image/image_69/69_St_Germain_Mt_Dor_2.jpg","../../jctruffet.com/image/image_69/69_St_Germain_Mt_Dor_3.jpg","../../jctruffet.com/image/image_69/69_St_Germain_Mt_Dor_4.jpg","../../jctruffet.com/image/image_69/69_St_Germain_Mt_Dor_5.jpg","../../jctruffet.com/image/image_69/69_St_Germain_Mt_Dor_6.jpg"]},"Consult_chateau_formulaire0808":{"id":"Consult_chateau_formulaire0808","dept":"69","canton":"Monsols","commune":"St-Mamert","nom":"St_Julien-Verbust","type":"Château","periode":"XV","histoire":"ST-MAMERT dépendait de l'abbaye de Cluny, seigneur de St-Mamert  propriétaire du château de Saint-Julien, Benoit de Saint-Julien en 1600 acquit le château qui dépendait du duc de Montpensier.  Vers 1650, la maison du prieuré étant tombée en ruines, elle fut vendue au seigneur de saint Mamez, propriétaire du château de saint Julien. Benoît de Saint Julien fit l'acquisition en 1604, auprès du duc de Montpensier, de la justice de Saint Mamez et de saint Jacques des Arrêts, ainsi que des ruines du château d'Alloignet qui domine la vallée de la Grosne. Cette terre restera dans cette famille jusqu'en 1789.                                                Dans la commune château de VERBUST  hostellerie.","architecture":"St-Marmet; St-Julien; château de Verbust corps de logis rectangulaire à trois niveaux flanqués de pavillons rectangulaires aux ext Avray.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Just_Davray_1.jpg","../../jctruffet.com/image/image_69/69_St_Just_Davray_2.jpg","../../jctruffet.com/image/image_69/69_St_Just_Davray_3.jpg","../../jctruffet.com/image/image_69/69_St_Just_Davray_4.jpg"]},"Consult_chateau_formulairec5a1":{"id":"Consult_chateau_formulairec5a1","dept":"69","canton":"Belleville","commune":"St-Lager","nom":"St_Lager","type":"Château","periode":"XIII","histoire":"St-LAGER, situé en plein coeur des meilleurs crus, au XVIIIe siècle les seigneurs de Saint-Lager possédaient  des terres sur quinze paroisses qui furent attribués à divers propriétaires tel que la propriété de la famille Pasquier-Desvignes qui l'utilise pour leur exploitation viticole.                                                                   Château de RAVATYS; fut construit au XIXe siècle, domaine viticole très ancien, fut acheté par un ingénieur polytechnicien, originaire de Lorraine, Auguste SOLET au milieu du XIXe siècle. Entrepreneur en travaux publics, celui-ci avait fait fortune en Algérie où il avait construit les viaducs de la ligne de chemin de fer Alger-Constantine. Il va concevoir lui-même tous les plans du château et des bâtiments d'exploitation, afin de disposer d'un bel outil de travail, moderne et bien structuré. Aujourd'hui propriété de l'institut Pasteur de Paris fut légué en 1937 par sa généreuse donatrice Matilde Courbe.  Château de BRIANTE, Château de la PERRIERE ancienne forteresse du XIVe siècle (privè). Château de la Pilonnière construit probablement au XVIIe siècle, il appartient actuellement à la famille Herlicq, viticulteur. L'entrée s'effectue par un magnifique châtelet.","architecture":"St-Lager; construit sur des fondations médiévales en 1285 ensemble remanié au XVIIe siècle; donjon et tours d'angles.","habitants":"Famille Pasquier-Desvignes\r\n        \"","divers":"Château de Saint-Lager, des Ravatys, de Pave, de Briante et de la Pilonière.","gps":"","images":["../../jctru histoire":"ST-PRIEST; ce château à connu plusieurs influences architecturales héritage d'un passé médiéval, il a traversé la renaissance pour devenir un lieu unique; mélange d'histoire, il constitue le plus beau fleuron  du patrimoine de la ville. Bâti à l'origine par les Richard de Saint-Priest, passa à la famille Guignard et  restera dans cette famille jusqu'en 1938 lorsque la ville décida de l'acquérir pour être utilisé  pour des opérations culturelles meeting séminaires restaurant etc.                                                    Dans la commune le  manoir BERLIET  Créateur de véhicules lourds,  fit édifier la villa en 1911 la famille y vécut jusqu'en 1945 et fut loué au consulat d'Italie et fut ensuite incorporé au patrimoine  social de la société  qui s'en servi pour les ingénieurs, toujours dans la fondation.","architecture":"Château de style renaissance du XIV et XVIe siècle, en forme de U avec tour carré  Crénelées en façades et échauguette malheureusement trop modernisé sur la partie arrière qui fut aménagé au XXe siècle.","habitants":"Famille de Richard de Saint-Priest\r\n        \"","divers":"Château de Saint-Priest et le manoir Berliet.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Priest_1.jpg","../../jctruffet.com/image/image_69/69_St_Priest_2.jpg","../../jctruffet.com/image/image_69/69_St_Priest_3.jpg","../../jctruffet.com/image/image_69/69_St_Priest_4.jpg","../../jctruffet.com/image/image_69/69_St_Priest_5.jpg","../../jctruffet.com/image/image_69/69_St_Priest_6.jpg"]},"Consult_chateau_formulaire8081":{"id":"Consult_chateau_formulaire8081","dept":"69","canton":"Neuville-sur-Saône","commune":"St-Romain-au-Mont-d`Or","nom":"St_Romain_Mt_Dor","type":"Vestiges","periode":"XIII","histoire":"St-ROMAIN au Mont d'Or au Moyen-Age jusqu'au XVIIe siècle  on parle de St-Romain de Couzon possession des archevêques de Lyon détendant du château de Couzon, ce château servit de refuge en 1630 à un temple protestant.  En 1661 séparation des territoires entre Couzon et S-Romain.   En 1854 l'Archevêque Pierre II d'Epinac cède la seigneurie  à la famille Coppret en échange d'un hôtel à Paris.                                                                        Dans la commune le château de la FRETA de André Merlat en 1651 puis passe à Pierre Poivre qui y finit ses jours au retour de Chine, à côté un autre château qui fut habité par la famille Murard, possible lieu occupé par la \"Demeure du Chaos\" de Thierry Ehrmann.","architecture":"St-Romain en Mont D'Or; château classique rectangulaire à trois niveaux avec fronton et pavillon saillants.","habitants":"Archevêques de Lyon\r\n        \"","divers":"Château de Saint-Romain et la demeure du Chaos.","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Romain_Mt_Dor_1.jpg","../../jctruffet.com/image/image_69/69_St_Romain_Mt_Dor_2.jpg","../../jctruffet.com/image/image_69/69_St_Romain_Mt_Dor_3.jpg"]},"Consult_chateau_formulaire0878":{"id":"Consult_chateau_formulaire0878","dept":"69","canton":"Anse","commune":"Anse","nom":"St_Trys","type":"Château","periode":"XVIII","histoire":"SAINT-TRYS du XVIIe siècle qui fut la propriété de Pierre Scarron premier seigneur, trésorier de France et prévôt des marchands de Lyon, le domaine fut acheté en 1672 par Jean-Baptiste Giraud qui ces descendants garderont le château jusqu'en 1876.                     Aujourd'hui appartient au comte Dorick de Brosses.","architecture":"Château de St-Trys corps de logis rectangulaire à trois niveaux avec fronton en façade et petits pavillons carrés aux extrémités à toitures coniques.","habitants":"Famille de Pierre Scarron \r\n        \"","divers":"Château de Saint-Trys","gps":"","images":["../../jctruffet.com/image/image_69/69_St_Trys_1.jpg","../../jctruffet.com/image/image_69/69_St_Trys_2.jpg"]},"Consult_chateau_formulaire1bd2":{"id":"Consult_chateau_formulaire1bd2","dept":"69","canton":"Condrieu","commune":"Ste-Colombe","nom":"Ste_Colombe","type":"Vestiges","periode":"XII","histoire":"Tour Philippe de Valois, au XIIIe siècle arrivaient à Vienne des religieux Cordeliers de Saint-François d'Assises, Jean de Berin archevêque leur fit construire le couvent des Cordeliers  plus spacieux sur la rive droite  du Rhône. Le Roi Philippe le Bely demeura au déclenchement  de la guerre de cent ans il reçut la visite du pape Clément V, du roi d'Angleterre et du roi d'Aragon.  En 1335 le roi Philippe VI de Valois exigea de l'archevêque de Vienne de lui remettre Sainte-Colombe et y fit construire la tour dite de \"Valois\". En 1443 alors que la guerre éclate et le transfert du Dauphiné à la France Philippe VI s'installa au couvent des Cordeliers.    Le couvent fut pillé et incendié lors des guerres de religion, les Cordeliers disparurent et le couvent fut vendu aux enchères publics en 1789. Il fut transformé en collège privé.","architecture":"Tour Valois, donjon parallélogramme irrégulier à mâchicoulis échauguettes en angles tous cela en partie arasées depuis.","habitants":"Philippe de Valois Roi de France\r\n        \"","divers":"Tour des Vallois à Sainte-Colombe, couvent  et manoir","gps":"","images":["../../jctruffet.com/image/image_69/69_Ste_Colombe_1.jpg","../../jctruffet.com/image/image_69/69_Ste_Colombe_2.jpg","../../jctruffet.com/image/image_69/69_Ste_Colombe_3.jpg","../../jctruffet.com/image/image_69/69_Ste_Colombe_4.jpg","../../jctruffet.com/image/image_69/69_Ste_Colombe_5.jpg","../../jctruffet.com/image/image_69/69_Ste_Colombe_6.jpg","../../jctruffet.com/image/image_69/69_Ste_Colombe_7.jpg"]},"Consult_chateau_formulaire97f7":{"id":"Consult_chateau_formulaire97f7","dept":"69","canton":"St-Laurent-de-Chamousset","commune":"Ste-Foy-l`Argentière","nom":"Ste_Foy_69","type":"Château","periode":"XV","histoire":"Ste-FOY, fief des seigneurs de Saint-Priest,  vassaux des comtes du Forez, passa au marquis de Gayardon  de  Fenoyl en 1774 qui le gardèrent jusqu'au XXe siècle, le marquis possédait les mines de charbon,  créa une usine de porcelaine et exploitation d' une grande tuilerie.","architecture":"Ste Foy, château construit au XVe siècle dans la vallée de la Brévenne appelé aussi \"Fenoyl\" ce dernier avait brulé, quelques temps plus tard fut restauré au XVIIe siècle, composé de deux corps de logis  à trois niveaux avec tours rondes aux extrémités dont une crénelée l'autre toit en poivrière.","habitants":"Famille du marquis de Gayardon de  Fenoyl \r\n        \"","divers":"Château de Sainte-Foy et le château de Bachasse voir article.","gps":"","images":["../../jctruffet.com/image/image_69/69_Ste_Foy_69_1.jpg","../../jctruffet.com/image/image_69/69_Ste_Foy_69_2.jpg","../../jctruffet.com/image/image_69/69_Ste_Foy_69_3.jpg","../../jctruffet.com/image/image_69/69_Ste_Foy_69_4.jpg"]},"Consult_chateau_formulairefff9":{"id":"Consult_chateau_formulairefff9","dept":"69","canton":"Oullins","commune":"Ste-Foy-les-Lyon","nom":"Ste_Foy_les_Lyon","type":"Château","periode":"XVI","histoire":"Ste-FOY les Lyon: C'est en 1170 qu'apparaît la plus ancienne mention connue de Sainte-Foy qui appartient aux chanoines de Saint-Just]. En 1189, elle passe sous la dépendance du chapitre de Saint-Jean jusqu'à la Révolution.                                                      Dans cette commune de nombreux châteaux,  le château de BACHASSE, le château de BEAUJEU (grange) le château de BELLEVILLE (parc) le château de BELLEVUE le château de BRAMAFAN remanié au XIXe siècle et le château de DOVAY.","architecture":"Ste-Foy les Lyon différents châteaux avec styles différents dut à la proximité de la ville de Lyon ou les riches soyeux s'installèrent.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Sainte-Foy, de la Bachasse et de Bellevue.","gps":"","images":["../../jctruffet.com/image/image_69/69_Ste_Foy_les_Lyon_1.jpg","../../jctruffet.com/image/image_69/69_Ste_Foy_les_Lyon_2.jpg","../../jctruffet.com/image/image_69/69_Ste_Foy_les_Lyon_3.jpg","../../jctruffet.com/image/image_69/69_Ste_Foy_les_Lyon_4.jpg","../../jctruffet.com/image/i ies gouverneur de l'Arbresle   acquis également un hôtel rue Boissac à Lyon, ce dernier décéda en 1776 ils eut  sept enfants dont deux furent de grands scientifiques pour la France, mais suite à des mésaventures financières  qui couta la mise en vente du château et de l'hôtel racheté par mademoiselle Berthe de la Barmondière en 1782, qui y installa les religieuses du Sacré Coeur de Lyon.                    Le domaine fut racheté après la Révolution par la famille Bellet de Saint-Trivier dont le vicomte Camille de Saint-Trivier de Thavernost fonde l'école de l'Arbresle, puis racheté en 1873 par Jean Marie Victor Erphanion de Larajasse qui la revend cinq ans après à  jean François Duplay maire de la commune et le revendit ensuite au comte Murard en 1883, qui passe par alliance au comte de Chabannes maire d'Eveux jusqu'à sa mort, le château passe en 1943 par héritage à la comtesse de Villiers petite fille du comte de Chabannes qui le cèdera aux dominicains de la province de Lyon que ces derniers firent construire le couvent Sainte-Marie  par Charles Edouard Jeanneret dit \"le Corbusier\" inauguré en 1960 par lui-même et le cardinal Gerlier.","architecture":"Tourette du XVIe siècle  Château ossature imposante, corps de logis central avec pavillon central saillant avec fronton de forme arrondie  deux pavillons sur les côtés saillants, avec ailes joignant des  tours  rondes.","habitants":"Famille d'Alexandre de la Tourette \r\n        \"","divers":"Château à Eveux Tourette","gps":"","images":["../../jctruffet.com/image/image_69/69_Tourette_Eveux_1.jpg","../../jctruffet.com/image/image_69/69_Tourette_Eveux_2.jpg","../../jctruffet.com/image/image_69/69_Tourette_Eveux_3.jpg","../../jctruffet.com/image/image_69/69_Tourette_Eveux_4.jpg"]},"Consult_chateau_formulairec187-2":{"id":"Consult_chateau_formulairec187-2","dept":"69","canton":"St-Laurent-de-Chamousset","commune":"Les Halles","nom":"Tourvilles","type":"Château","periode":"XVI","histoire":"TOURVILLES qui à l'origine prop aire des logements.","architecture":"La Trolanderie; domaine construit dés 1270 restauré au fils des ans principalement en 1794 par l'architecte Jean Antoine Morand, composé d'un corps de logis pentagonal flanqué de trois tours rondes et d'une chapelle.","habitants":"Famille d'Albon\r\n        \"","divers":"Château de la Trolanderie","gps":"","images":["../../jctruffet.com/image/image_69/69_Trolanderie_1.jpg","../../jctruffet.com/image/image_69/69_Trolanderie_2.jpg","../../jctruffet.com/image/image_69/69_Trolanderie_3.jpg","../../jctruffet.com/image/image_69/69_Trolanderie_4.jpg","../../jctruffet.com/image/image_69/69_Trolanderie_5.jpg"]},"Consult_chateau_formulaire117c":{"id":"Consult_chateau_formulaire117c","dept":"69","canton":"St-Laurent-de-Chamousset","commune":"St-Genis-l`Argentiere","nom":"Valsonniere","type":"Château","periode":"VXV","histoire":"VALSONNIERE, ancien fief des seigneurs de la Chevadière et des seigneurs de la Valsonnière passa à la famille Debeck au XIIIe siècle puis à la famille Gabet avant d'être acheté par Lucien Mangini qui en fit dot à sa fille, passa par alliance à la famille Balay.                         Dans la commune château de Boussoure du XVIe siècle construit par Etienne Guazanchon de Chavannes et une maison forte prieuré des abbaye de Sévigny.","architecture":"Valsonnière; château imposant quadrangulaire flanqué de trois tours de style médiéval et vestiges de remparts.","habitants":"Famille Debeck \r\n        \"","divers":"Château de Valsonnière.","gps":"","images":["../../jctruffet.com/image/image_69/69_Valsonniere_1.jpg","../../jctruffet.com/image/image_69/69_Valsonniere_2.jpg"]},"Consult_chateau_formulaire28fe":{"id":"Consult_chateau_formulaire28fe","dept":"69","canton":"Beaujeu","commune":"Quincié-en-Beaujolais","nom":"Varennes(69)","type":"Château","periode":"XVI","histoire":"VARENNES; château inchangé depuis 1800,  a appartenu a monsieur Charvériat, aujourd'hui viticole par monsieur Duboeuf qui consacre des salles de réception lors des mariages.","architecture":"Varennes:  maison forte à l'origine au XIe siècle reconstruit au XVIe siècle, de style renaissance, tours coniques la galerie renaissance, corps de bâtiment avec deux ailes  en retour du XVIe siècle.","habitants":"Famille Charvériat\r\n        \"","divers":"Château de Varennes","gps":"","images":["../../jctruffet.com/image/image_69/69_Varennes(69)_1.jpg","../../jctruffet.com/image/image_69/69_Varennes(69)_2.jpg","../../jctruffet.com/image/image_69/69_Varennes(69)_3.jpg","../../jctruffet.com/image/image_69/69_Varennes(69)_4.jpg"]},"Consult_chateau_formulaire328f":{"id":"Consult_chateau_formulaire328f","dept":"69","canton":"Beaujeu","commune":"Vaurenard","nom":"Vaurenard_Thil","type":"Château","periode":"XIV","histoire":"THIL; fief des de Tarte, ces seigneurs possédés une maison forte à l'époque qui fut endommagé en 1593 par le passage des Saxons, ce fief passa aux Moïse  de Rymon seigneur de la Courtine qui fit construire le château qui passera ensuite à Antoine Mercier capitaine châtelain  en 1661, puis fut vendu à Jacques Perrin de Cypierre  qui remanie le château,  passera ensuite à Jean Baptiste Dumont de Sermaise jusqu'à la Révolution, vendu comme bien national, la propriété sera vendu en plusieurs lots, le château à partir de 1850 sera à l'abandon, il fut racheté en 1875 par le baron Max Bernard de la Vernette Saint-Maurice qui le fait restaurer à nouveau  et en 1947 sans héritier cédera la propriété aux soeurs Dominicaines.","architecture":"Thil: château de plan carré à trois niveaux flanqués de trois tours rondes.","habitants":"Famille de Moïse  de Rymon\r\n        \"","divers":"Château de Vaurenard","gps":"","images":["../../jctruffet.com/image/image_69/69_Vaurenard_Thil_1.jpg"]},"Consult_chateau_formulaire7081-2":{"id":"Consult_chateau_formulaire7081-2","dept":"69","canton":"Villefranche-sur-Saône","commune":"Villefranche-sur-Saône","nom":"Villefranche","type":"Patrimoine","periode":"XII","histoire":"VILLEFRANCHE; fut let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','69 — Rhône'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
