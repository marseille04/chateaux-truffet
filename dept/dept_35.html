de l'ancienne église paroissiale de Saint-Coulomb. Site classé par arrêté du 25 novembre 1965.","habitants":"famille du Palys\r\n        \"","divers":"Château de Clayes-Palis à Clayes  48° 10' 34\" nord, 1° 51' 10\" ouest","gps":"","images":["../image/image_35/35_Clayes_Palys_1.jpg","../image/image_35/35_Clayes_Palys_2.jpg","../image/image_35/35_Clayes_Palys_3.jpg","../image/image_35/35_Clayes_Palys_4.jpg","../image/image_35/35_Clayes_Palys_5.jpg"]},"Consult_chateau_formulairee997-2":{"id":"Consult_chateau_formulairee997-2","dept":"35","canton":"Combourg","commune":"Combourg","nom":"Combourg","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Combourg; Boutellerie et  Etangs                                                                                                    BOUTEILLERIE, elle appartint successivement à la famille de Dol, aux Châteaugiron-Malestroit, aux Coëtquen puis aux Durfort qui la vendirent en 1761 aux Chateaubriand. Les impressions laissées par Combourg aux voyageurs du XVIIIe siècle sont contrastées. Au Moyen Age, les seigneurs de Combourg prirent part à de nombreux conflits, ce qui valut à la ville et au château plusieurs sièges et incendies, notamment en 1234. Les constructions les plus anciennes conservées ne sont pas antérieures au XVIe siècle et se concentrent autour des trois pôles que sont le château, le prieuré et l'église paroissiale.  Le château de la Bouteillerie reconstruit dans la deuxième moitié du XIXe siècle, dans un style comparable à celui du château du Grand Val, conserve deux pavillons, reliés par une terrasse et contribuant à placer le grand logis dans une perspective. Ferme et communs remarquables conservant une très grande cheminée en briques. Partie constituante : communs, ferme, parc et chapelle.","architecture":"ETANGS, l'ancien manoir de châteaux possédait autrefois un corps de logis, deux pavillons très élevés et une chapelle ; il était entouré de douves ; deux pont-levis reliaient, au dessus des douves, le premier étage a une grande terrasse qui protégeait le manoir, le présent recensement ne permet pas de vérifier la description offerte par Paul Banéat. Guillotin de Corson signalait la chapelle Saint-Julien démolie au XIXe siècle. Au sud du site de l'ancien manoir, une demeure est édifiée à la fin du XIXe siècle dans un parc ; elle est composée d'un corps central de composition ternaire, couvert d'une toiture à croupes, accolé à un pavillon latéral plus élevé.   Les impressions laissées par Combourg aux voyageurs du XVIIIe siècle sont contrastées.","habitants":"Guillotin de Corson\r\n        \r\n        \"","divers":"Deux châteaux à Combourg;   grav 1 à 6                                                                gps 48° 24' 27\" nord, 1° 45' 14\" ouest                                                                        Boutellerie grav-7  et  Etangs grav-8                                                                                        gps  48° 23' 18\" nord, 1° 46' 33\" ouest","gps":"","images":["../image/image_35/35_Combourg_1.jpg","../image/image_35/35_Combourg_2.jpg","../image/image_35/35_Combourg_3.jpg","../image/image_35/35_Combourg_4.jpg","../image/image_35/35_Combourg_5.jpg","../image/image_35/35_Combourg_6.jpg","../image/image_35/35_Combourg_7.jpg"]},"Consult_chateau_formulaire1c88":{"id":"Consult_chateau_formulaire1c88","dept":"35","canton":"Combourg","commune":"Combourg","nom":"Combourg_I","type":"Forteresse","periode":"XIV-XV-XVIII","histoire":"COMBOURG,  la seigneurie de Combourg  appartint  à la famille de Dol, aux Châteaugiron-Malestroit, aux Coëtquen puis aux Durfort qui la vendirent en 1761 aux Chateaubriand. Les impressions laissées par Combourg aux voyageurs du XVIIIe siècle sont contrastées. Tandis qu'Arthur Young (1788) déplore tant de misère et de saleté, Jean-Baptiste Ogée (1778) écrit : quoique cette ville soit dans un fond, l'air n'y est pas malsain ; elle est dominée par des coteaux et des collines très pittoresques et très agréables. Les maisons sont construites à l'antique, et ont presque toutes les pignons sur les rues. On y remarque une très belle halle. Les décorations de la ville consistent dans un bel étang, un parc et un mail qui offrent de très belles promenades. Au Moyen-Age, les seigneurs de Combourg prirent part à de nombreux conflits, ce qui valut à la ville et au château plusieurs sièges et incendies, notamment en 1234. Les constructions les plus anciennes conservées ne sont pas antérieures au XVIe siècle et se concentrent autour des trois pôles que sont le château, le prieuré et l'église paroissiale. Le centre marchand et résidentiel se développe à l'est du château, en particulier autour d'une place-rue, ancienne place des Halles, prolongée au nord-est par la grande-Rue (rue Notre-Dame) menant à l'église. Au nord de celle-ci, la place du Moûtier, dont les constructions anciennes ont totalement disparu, tire son nom de la présence de moines, bien que le prieuré soit situé de l'autre côté de la ville, à l'ouest du château.  détruite au XVIIIe siècle.","architecture":"COMBOURG, si un édifice primitif était localisé à l'est de l'étang au lieu-dit le Vieux-Chastel, massif et élégant, fondé au début du XIe siècle par l'évêque de Dol pour son frère Riwalon, modifié à la fin du Moyren-Age. Quadrilatère avec cour intérieure. La plus grande partie des bâtiments date des XIVe et XVe siècles, la Tour du Croisé, ou donjon, située au nord-est, étant pour sa part datée de la première moitié du XIIIe siècle. Le bâtiment fut restauré en 1876 par Ernest Trihle pour Geoffroy de Chateaubriand et le parc aménagé quelques années plus tard par Eugène Bülher. Malgré la disparition du fossé et du pont-levis au profit d'un grand perron, au nord, la disposition des bâtiments reste celle du XVe siècle, suivant un plan polygonal cantonné de quatre tours. Cette massive forteresse est flanquée, aux quatre angles, de tours circulaires à créneaux et mâchicoulis, à toitures coniques. Les mâchicoulis de la courtine nord ainsi que ceux de la tour nord-ouest présentent sur leurs trois faces des encorbellements à quatre ressauts, ceux de la tour nord-est sont à trois ressauts seulement ; ils supportent des linteaux ornés de trilobés simulés inscrits dans des arcatures brisées. L'intérieur a été également entièrement restauré. Sa chapelle se voit encore à l'entrée du vestibule d'honneur. La grande salle des Gardes forme aujourd'hui deux salons. Le parc actuel remplace d'anciens mails.\r\nÉléments protégés MH : le château, sauf parties classées : inscription par arrêté du 15 décembre 1926. Les façades extérieures et intérieures et les toitures correspondantes ; la salle des gardes et le vestibule : classement par arrêté du 2 août 1966.","habitants":"Geoffroy de Chateaubriand \r\n        \"","divers":"château de Combourg; GPS : 48° 24' 27\" Nord, 1° 45' 14\" Ouest","gps":"48° 24' 27\" Nord, 1° 45' 14\" Ouest","images":["../image/image_35/35_Combourg_I_1.jpg","../image/image_35/35_Combourg_I_2.jpg","../image/image_35/35_Combourg_I_3.jpg","../image/image_35/35_Combourg_I_4.jpg"]},"Consult_chateau_formulaire17df":{"id":"Consult_chateau_formulaire17df","dept":"35","canton":"Combourg","commune":"Combourg","nom":"Combourg_II","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article ; Grand-Val , Termignon ,Villeneuve   et Grand-Trémaudan.                                                                                       GRAND-VAL, propriété en 1429 de G. du Val, en 1461 de Alain du Val, en 1547 de Jean Hay, en 1581 de Gilles Croc, qui le vend alors à Olivier Broust, en 1607 de René de Champaigné, en 1714 d'Antoine Morin sieur de Planty, en 1760 de Catherine Morin, femme de François Marc de la Chenardaye, en 1775 d'Anne Marc de la Chenardaye, femme de Jean Pinot du Petit-Bois. Le château du Grand Val du début du XVIIIe siècle, conservant un corps de logis de plan allongé couvert d'une toiture à croupes et une chapelle Saint-Antoine datée 1714, est agrandi dans la deuxième moitié du XIXe siècle par l'adjonction d'un nouveau corps de logis accolé au nord du précédent et par la reconstruction de communs et d'une ferme-modèle.                                                                                              VILLENEUVE, si la paroisse est mentionnée dès avant le XIe siècle, Relevant à l'origine de l'évêché avant de dépendre directement du duc de Bretagne, cette ancienne baronnie fut érigée en comté en 1575 et comprenait alors quinze paroisses. Elle appartint à la famille de Dol, aux Châteaugiron-Malestroit, aux Coëtquen puis aux Durfort qui la vendirent en 1761 aux Chateaubriand. Les impressions laissées par Combourg aux voyageurs du XVIIIe siècle sont contrastées. fût entièrement restauré dans la deuxième moitié du XIXe siècle en remployant des éléments de décor du XVIe siècle suivant un parti pris composite d'inspiration néogothique associé à une composition néoclassique dans la façade nord.","architecture":"TREMIGNON, si la paroisse est mentionnée dès avant le XIe siècle, Relevant à l'origine de l'évêché avant de dépendre directement du duc de Bretagne, cette ancienne baronnie fut érigée en comté en 1575 et comprenait alors quinze paroisses. Au Moyen Age, les seigneurs de Combourg prirent part à de nombreux conflits, ce qui valut à la ville et au château plusieurs sièges et incendies, notamment en 1234. Les constructions les plus anciennes conservées ne sont pas antérieures au XVIe siècle et se concentrent autour des trois pôles que sont le château, le prieuré et l'église paroissiale.  Le château de Trémigon du début du XIXe siècle figuré sur le cadastre dessiné en 1825 semble avoir été remanié dans la deuxième moitié du XIXe siècle par l'architecture auteur d'un réaménagement au château du Grand Val. La chapelle Saint-Pierre, fondée au XVIIe siècle, qui avait pour chapelain Mathurin Le Clerc en 1677 et Henri de Courtalvert de Pezé en 1715, a été reconstruite et bénite en 1827 par Jean-Marie Robert de Lamennais.                                                                             Grand -TREMAUDAN, le manoir date de 1630 (date inscrite sur une lucarne), et fut fondé par la Famille de Trémaudan issue de la noblesse française.\r\nIl est inscrit au titre des  M.H  depuis le 26 septembre 2005","habitants":"Gd-Val; Famille du Val                                                                Termignon;  famille de Dol                                          Villeneuve; famille de Durfort\r\n        \r\n        \r\n        \"","divers":"quatre châteaux dans cet article ; Gd-Val -Grav 1-2 et Termignon grav-5-6-7       gd-Termaudan grav--8 et Villeneuve Grav-3  48° 23' 18\" nord, 1° 46' 33\" ouest","gps":"","images":["../image/image_35/35_Combourg_II_1.jpg","../image/image_35/35_Combourg_II_2.jpg","../image/image_35/35_Combourg_II_3.jpg","../image/image_35/35_Combourg_II_4.jpg","../image/image_35/35_Combourg_II_5.jpg","../image/image_35/35_Combourg_II_6.jpg","../image/image_35/35_Combourg_II_7.jpg","../image/image_35/35_Combourg_II_8.jpg"]},"Consult_chateau_formulaire1e73":{"id":"Consult_chateau_formulaire1e73","dept":"35","canton":"Val-Couesnon","commune":"Tremblay","nom":"Coquillonnaie","type":"Château","periode":"XV-XVI","histoire":"COQUILLONNAIE, le manoir de la Coquillonnaie est situé à lest du village de Tremblay. Ce lieu est mentionné dès le début du  XVe siècle (1428) puisquà cette époque, il appartenait aux Coquillon, seigneurs dun autre manoir dans la commune, le Pontavice. A linstar de nombreux autres noms de manoir, le nom de celui-ci, « Coquillonnaie », provient de la première famille propriétaire du lieu. Au milieu du XVIe siècle, le manoir appartient à la famille Tuffin. Au début du XVIIe siècle, la Coquillonnaie passe par alliance aux Hallay, seigneurs de Champsavin. Le manoir fut ensuite vendu judiciairement à plusieurs reprises dans les années 1670 et 1680. En 1694, le manoir est vendu à la famille de la Cornillère, également propriétaire dun autre manoir de Tremblay, le manoir dArdennes. Cette famille conserve la Coquillonnaie jusquà la fin du XVIIIe siècle. En 1784, la Coquillonnaie était la propriété de Anne du Fresne, veuve et donataire de Pierre de la Motte de Lesnage, seigneur de Bonne Fontaine à Antrain.","architecture":"COQUILLONNAIE, Les manoirs étaient en effet souvent composés d'un logis, qui représente l'élément principal, ainsi que des dépendances que l'on trouve aussi dans les fermes : étables, écuries, granges, Les pigeonniers et chapelles représentaient des privilèges accordés aux propriétaires nobles dans la mesure où seuls ces derniers étaient autorisés à les faire ériger. Toutefois, ces deux types de bâtiments ont fréquemment disparu ou bien on été déclassés pendant la période révolutionnaire car ils représentaient les privilèges accordés à la noblesse et avaient bien souvent perdu leur utilité. Le plan du logis de la Coquillonnaie, quadrangulaire avec deux tours aux angles sud-ouest et sud-est, est tout à fait similaire à celui dun autre bâtiment de la commune de Tremblay, le Trouançon, qui est mentionné comme un château sur le cadastre de 1824.","habitants":"Famille de Coquillon\r\n        \"","divers":"A tremblay château de Coquillonnaie                                           gps 48° 25' 20\" nord, 1° 28' 33\" ouest","gps":"","images":["../image/image_35/35_Coquillonnaie_1.jpg","../image/image_35/35_Coquillonnaie_2.jpg"]},"Consult_chateau_formulairefd82":{"id":"Consult_chateau_formulairefd82","dept":"35","canton":"Redon","commune":"Langon","nom":"Corbinières","type":"Château","periode":"XIX","histoire":"CORBINIERES, en 1885, la propriété est vendue par adjudication et passe de Madame Ridouël, née Gandon des Alliers, à la famille du Halgouët. De cette même année, date le projet d'extension par Arthur Regnault qui propose l'ajout de deux travées de part et d'autre du bâtiment existant, ou plus simplement d'un seul côté. Cette dernière solution sera retenue, l'extrémité Est de la construction présentant un corps saillant couvert en pavillon, tandis qu'un porche surmonté d'une terrasse vient rompre le rythme de la façade nord. Arthur Regnault conserve le parti du premier bâtiment mais y introduit l'asymétrie et le jeu des volumes. Il conçoit également la décoration intérieure de son extension, notamment l'ensemble du grand salon de style néo-Renaissance, où la cheminée porte les armes et la devise des du Halgouët. Cinq années plus tard, ces derniers s'adressent de nouveau à un architecte rennais de renom pour construire les communs. Frédéric Jobbé-Duval réunit, dans un bâtiment irrégulier orienté au sud, un important ensemble de dépendances, remise, sellerie, écuries, logement, atelier de menuiserie, grenier et château d'eau.","architecture":"CORBINIERES, au milieu du XIXe siècle, un premier château, ou relais de chasse, son élévation à trois travées symétriques et avant-corps central témoigne d'un parti classique inspiré du style Louis XIII, il est probable que Jobbé-Duval soit également l'auteur de la petite chapelle élevée au nord-est du château, laquelle fut terminée autour de 1900.   Le château est composé d'un étage carré sur rez-de-chaussée surélevé et un étage de comble. Pièces de service en sous-sol, réception et bibliothèque en rez-de-chaussée, chambres aux étages. Construction en brique et pierre. Ensemble de dépendances comprenant, un bâtiment important de plan en L comprenant dans l'aile nord, un logement en rez-de-chaussée surélevé, un cellier, une porcherie, un atelier de menuiserie et dans l'aile ouest, une écurie, une sellerie, un fruitier, un séchoir, une remise ainsi qu'un château d'eau disposé dans une tour. Ce bâtiment est construit en moellons de schiste et de grès avec chaînes d'angle et encadrements de baies en pierre de taille de grès ou brique.  Si les façades tournées du côté du château affichent tous les caractères du pittoresque, diversité des couvrements, richesse de mise en oeuvre et polychromie des matériaux, utilisation du pan de bois, celles de la cour témoignent d'une sobriété toute rationaliste, proche du parti d'une ferme modèle.","habitants":"Famille du Halgouët.\r\n        \"","divers":"A Langon château de Corbinières     Gps 47° 43' 13\" nord, 1° 50' 48\"  ouest","gps":"","images":["../image/image_35/35_Corbini%c3%a8res_1.jpg"]},"Consult_chateau_formulaire7178":{"id":"Consult_chateau_formulaire7178","dept":"35","canton":"Janzé","commune":"Corps-Nuds","nom":"Corps_Nuds","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Corps-Nuds; le châtelier et Launay-Chauvel.                                                                        CHATELLIER,   ancien manoir, saccagé pendant les guerres de la Ligue, se trouvait  a l'emplacement de la ferme du Vieux Châtellier. Le château actuel a été construit au nord-ouest, en 1632 par Charles Ier du Châtellier. Il a ensuite été remanié vers 1750 (boiseries) et réaménagé au XIXe siècle (décor intérieur). Deux pièces avec leurs plafonds et leurs cheminées ainsi qu'un spectaculaire escalier ont conservé leur décor peint du XVIIe siècle. Une récente restauration à restitué ces décors. Aujourd'hui, le château du Châtellier appartient à un propriétaire privé. Éléments protégés MH :  le château y compris les tours et les communs,classement par arrêté du 30 avril 1996.                                        LAUNAY-CHAUVEL, du XVII-XIX-XXe siècle, mentionné dès 1427. La chapelle Saint-François de Launay, désormais disparue, est fondée en 1642 par Françoise Jacopin, veuve de Georges Chauvel, seigneur de Launay.  Alors, le 14 octobre 1684, Jean Chauvel, sieur de Launay, fils de la fondatrice, augmenta la fondation et l'éleva à 70 livres de rente. Mgr de Beaumanoir approuva ce nouvel acte le 11 avril 1686 et permit de faire desservir la chapelle. Pierre Briand en 1760, et Jean Hindré en 1775, en devinrent les châtelains. On trouve un puits à la ferme du château de Launay-Chauvel. Propriété passe successivement aux des familles Chevalier (en 1427), le Clerc (en 1513), Téhillac (en 1571), Renouard, seigneurs de l'Onglée (en 1596), Chauvel (en 1618). Le manoir est vendu en 1775 à Renée Jamet, veuve de Simon Reconseille.","architecture":"CHATELIER, ce château a été saccagé pendant les guerres de la Ligue, puis reconstruit en 1632 par Charles Ier du Châtellier. Il a ensuite été remanié vers 1750 (boiseries) et réaménagé au XIXe siècle . Seuls deux plafonds et l'escalier ont conservé leur décor peint du XVIIe siècle. Le château est construit sur une terrasse entourée de larges douves maçonnées. La terrasse est flanquée de quatre tours d'angle à mâchicoulis servant de chapelle, colombier, cabinet d'archives et logement de domestiques.  Le château est construit sur une terrasse entourée de larges douves maçonnées. La terrasse est flanquée de quatre tours d'angle à mâchicoulis servant respectivement de chapelle, de logement pour le chapelain, de colombier et de cabinet d'archives. Il est ouvert sur ses quatre faces : au Nord par cinq travées de fenêtres, au sud par trois travées entre lesquelles s'interposent des oculi. La travée d'axe de cette dernière façade décalée en élévation correspond aux repos du monumental escalier à retours et jours central. Les tours qui cantonnent son enceinte sont couronnées par un chemin de ronde en pan de bois enduit, porté par des consoles de bois imitant des mâchicoulis. Le château est entouré par quatre tours d'angle à mâchicoulis, elles-mêmes entourées de larges douves maçonnées. Le château, ainsi que les pièces décorées, du logis; façades et toitures des quatre tours ; douves: classement par arrêté du 30 avril 1996 y compris les tours et communs, à l'exception des parties classées Inscription par arrêté du 3 décembre 1993.","habitants":"Chatelier; Charles Ier du Châtellier                                          Launay; Georges Chauvel,                        \r\n        \"","divers":"Deux châteaux à Corps-Nuds; le Chatelier grav 1 à 5 et Launay-Chauvel grav 6-7.                                                          GPS : 47° 57' 38\" Nord, 1° 35' 45\" Ouest","gps":"47° 57' 38\" Nord, 1° 35' 45\" Ouest","images":["../image/image_35/35_Corps_Nuds_1.jpg","../image/image_35/35_Corps_Nuds_2.jpg","../image/image_35/35_Corps_Nuds_3.jpg","../image/image_35/35_Corps_Nuds_4.jpg","../image/image_35/35_Corps_Nuds_5.jpg","../image/image_35/35_Corps_Nuds_6.jpg","../image/image_35/35_Corps_Nuds_7.jpg"]},"Consult_chateau_formulaire5365":{"id":"Consult_chateau_formulaire5365","dept":"35","canton":"Combourg","commune":"Saint-Leger des Près","nom":"Croix_Chemin","type":"Château","periode":"XVI-XIX","histoire":"CROIX-CHEMIN, à trois km au sud Est à St Léger les Prés, la maison noble du Croix-Chemin fut acquise en 1664 par Pierre Guéhenneuc et Jeanne Aoustin son épouse, seigneur et dame de la Rivière-Chantegrue. Quelques éléments du bâtiment originel ont été conservés: la porte à arc surbaissé et la seconde travée à partir de l'ouest avec la fenêtre et lucarne dont la modénature accusent le XVIe siècle. René Guéhenneuc, fils des précédents, fait rebâtir le manoir en 1690, la maison noble du Croix chemin fut acquise en 1664 par Pierre Guéhenneuc et Jeanne Aoustin son épouse, seigneur et dame de la Rivière-Chantegrue, délaissant ainsi l'ancien manoir éponyme de la seigneurie qui s'élevait au lieu-dit la Rivière. Ainsi que le montre le cadastre de 1826, la demeure se trouvait anciennement à un carrefour, face à une croix conservée in situ, qui lui a valu son nom. Quelques éléments du logis originel ont été conservés : la porte à arc surbaissé aujourd'hui murée et la seconde travée à partir de l'ouest avec la fenêtre et lucarne dont la modénature accusent le XVIe siècle. René Guéhenneuc, fils des précédents, fait reconstruire le manoir en 1690.","architecture":"CROIX-CHEMIN, Afin de donner une allure de château à la mode le corps central est cantonné de deux pavillons coiffés de toits pentus. Le pavillon ouest, aménagé dans le sens de la profondeur semble tributaire de la structure ancienne, tandis que celui de l'est a été construit de toute pièce dans le sens de l'élévation ainsi qu'une travée du corps central qui se raccorde à l'ancien bâtiment par un collage bien visible. A la fin du XIXe siècle, un corps saillant en forme de pavillon est construit à l'est, à la manière du XVIIe siècle. A l'est du logis principal, on rebâtit un bâtiment de communs, on remarque de nombreuses pierres de remploi, en respectant également l'unité de style. Afin de donner une allure de château à la mode à la demeure, le corps central est cantonné de deux pavillons coiffés de toits à fortes pentes. Le pavillon ouest, aménagé dans le sens de la profondeur semble tributaire de la structure ancienne, tandis que celui de l'est a été construit de toute pièce dans le sens de l'élévation ainsi qu'une travée du corps central qui se raccorde à l'ancien bâtiment par un collage bien visible. Ces irrégularités de structure donnent à penser qu'une évidente économie de moyens a déterminé la nature du chantier, somme toute assez modeste. A la fin du XIXe siècle, un corps saillant en forme de pavillon est construit à l'est, à la manière du XVIIe siècle. C'est à cette époque que sont détruites les anciennes dépendances agricoles qui fermaient la cour au sud tel qu'elles sont figurées sur le cadastre de 1826. On rebâtit alors un bâtiment de communs à l'est du logis principal, où l'on remarque de nombreuses pierres de réemploi, en respectant là aussi l'unité de style. L'ensemble a fait l'objet d'une importante restauration à partir de 2013.","habitants":"Pierre Guéhenneuc\r\n        \"","divers":"A Saint-Leger des Près le château de Croix-Chemin.                                      Gps 48° 23' 43\" nord, 1° 39' 06\" ouest","gps":"","images":["../image/image_35/35_Croix_Chemin_1.jpg","../image/image_35/35_Croix_Chemin_2.jpg","../image/image_35/35_Croix_Chemin_3.jpg","../image/image_35/35_Croix_Chemin_4.jpg","../image/image_35/35_Croix_Chemin_5.jpg","../image/image_35/35_Croix_Chemin_6.jpg"]},"Consult_chateau_formulaire7113":{"id":"Consult_chateau_formulaire7113","dept":"35","canton":"Saint-Malo","commune":"Dinard","nom":"Dinard","type":"Dinard","periode":"XV-XVII-XIX","histoire":"Plusieurs  édifices à Dinard; le Prince-Noir,  villa Eugène et la Greystones et autres Vicomté, la Garde, le Port-Breton.                                       PRINCE-NOIR, la construction de la Maison du prince Noir date du XIVe siècle. Ses façades sont inscrites aux M.H. depuis le 1926. Elle appartient à un particulier.                                                                                                         VILLA-EUGENIE, la construction de la villa Eugénie date de 1868. La villa Eugénie à Dinard fut nommée ainsi en l'honneur de l'épouse de l'Empereur Napoléon III. Elle devait venir passer des vacances à Dinard et cette villa avait été construite pour la recevoir. Mais, elle n'est jamais venue. Ni la presse de l'époque ni les mémoires des contemporains n'évoquèrent les préparatifs de ce rendez-vous manqué. Les journaux du temps gardent en revanche la trace précise des déplacements du couple impérial au cours de l'été 1868 : Fontainebleau, Plombières, le Camp de Châlons et Biarritz sont les seuls lieux inscrits au programme. Construite par l'architecte Jean Pichot, la villa dinardaise baptisée Eugénie n'a donc d'impériale que le prénom de la souveraine. Elle rappelle un simple espoir dinardais: accueillir l'empereur et l'impératrice. Le préfet d'Ille-et-Vilaine Paul Féart ne l'a pas davantage fait construire puisqu'il a quitté le département dès 1864 pour prendre ses fonctions dans le Lot-et-Garonne où il décèdera, en 1867. La villa Eugénie appartiendra à Pierre Levasseur, qui la lèguera, à la ville de Dinard, à sa mort. La villa Eugénie sera un temps la Mairie de Dinard, la Bibliothèque municipale puis le Musée du site balnéaire jusqu'en 2004.","architecture":"VILLA GREYSTONES,  sa construction date de 1938 à 1950. L'architecte était Michel Roux-Spitz. La villa Greystones appartient à François Pinault, homme d'affaires. La célèbre villa de la pointe de la Malouine, à Dinard, était inscrite aux M.H. depuis 2014, soit le niveau supérieur de protection, depuis Février 2019.La villa Greystones, ses terrasses son jardin, ses allées, escaliers, garde-corps, pavillon hexagonal, son bassin, ses sculptures et éléments décoratifs ont été classés au titre des M.H, depuis le 9/02/2019. Lemblématique villa de François Pinault, situé boulevard de la Mer. Elle bénéficie désormais dune protection supérieure, le classement, plus haut niveau de protection. François Pinault avait racheté la villa Greystones en 2012 et a réalisé une restauration lui permettant de retrouver lessentiel de ses dispositions dorigine. Un classement aux monuments historiques permet de protéger des édifices mais aussi de bénéficier de subventions pour mener à bien des travaux. LÉtat peut participer financièrement à hauteur de 50 % du coût des travaux. Les propriétaires des monuments historiques peuvent également bénéficier \"davantages fiscaux\". Lentourage de François Pinault indique que les travaux de rénovation avaient été réalisés avant, à titre personnel et quil navait pas bénéficié de laide de lEtat.","habitants":"Villa Eugénie; Empereur Napoléon III, Greysthones; François Pinault\r\n        \"","divers":"plusieurs édifice à Dinard; le Prince-Noir grav-7, Deux -Rives-grav 8,  villa Eugènie grav 4 et la Greystones grav-6 et autres Vicomté grav-3, la Garde grav -5-, le Port-Breton grav-1-2, Enegal-grav-9.   GPS : 48° 37' 57\" Nord, 2° 03' 42\" Ouest                                                         Villa Greystones GPS : 48° 37' 57\" Nord, 2° 03' 42\" Ouest\r\nprince GPS : 48° 37' 51,32\" Nord, 2° 3' 9,91\" Ouest","gps":"48° 37' 57\" Nord, 2° 03' 42\" Ouest","images":["../image/image_35/35_Dinard_1.jpg","../image/image_35/35_Dinard_2.jpg","../image/image_35/35_Dinard_3.jpg","../image/image_35/35_Dinard_4.jpg","../image/image_35/35_Dinard_5.jpg","../image/image_35/35_Dinard_6.jpg","../image/image_35/35_Dinard_7.jpg","../image/image_35/35_Dinard_8.jpg","../image/image_35/35_Dinard_9.jpg"]},"Consult_chateau_formulaire641f":{"id":"Consult_chateau_formulaire641f","dept":"35","canton":"Saint-Malo","commune":"Dinard","nom":"Dinard-II","type":"Château","periode":"XVI-XVII-XX","histoire":"Dans cet article deux châteaux à Dinard; Vicomté et Nessay.                                                                                       Manoir de la VICOMTE, le manoir de la Vicomté est blotti entre un jardin dhortensias et une belle plage de sable blond. Cette magnifique propriété du XVIe siècle abrite 90 chambres confortables, réparties dans 3 bâtiments au cur dun joli parc arboré de 5 hectares. Le village vacances dispose dune piscine couverte, dun sauna, dun spa et dune salle de fitness. De nombreuses activités sont aussi proposées aux enfants, de la nurserie aux clubs ados. La restauration, traditionnelle, est de qualité. Laccès au wifi est gratuit sur la totalité du site.                                            DEUX RIVES, le château des \"Deux Rives\" fut la demeure du comte libanais Rochaïd Dahdah, le plus grand promoteur de la station à la fin du 19e siècle.Le château fut vendu après la Seconde Guerre Mondiale à la comtesse de la Rochefoucau.","architecture":"NESSAY, Le château du Nessay  à St Briac à trois Km au sud-Est de Dinard a été la propriété de la famille d'Elbiest, de 1460 à 1520, puis il a appartenu, en 1656, à la seigneurie de Pontbriand. En 2016, le château, mal entretenu, se dégrade et a besoin dune cure de rajeunissement. Il date XIX-XXe siècle. L'ancien château était situé au lieu-dit La Houlle. Il fut détruit vers 1650. La seigneurie de La Houlle est annexée par le Roi en 1650 à la seigneurie de la Famille Breil-de-Pontbriand. Le château du Nessay a été construit en 1886, pour le comte Maurice de Villebresme, qui fut élu maire de Saint-Briac de 1892-1899. Il appartient à la commune qui le fait fonctionner en centre de vacances. Le parc contient une chapelle, reconstruite au XIXe siècle, avec la réutilisation d'une porte datant du XVIe siècle. L'ancien château-fort de la Houlle, a été mentionné dès le XIIe siècle, dans le Roman d'Aquin. Il possédait autrefois une chapelle privée. C'était le château seigneurial de la paroisse.  Il devient nécessaire de faire des travaux. La municipalité ne sait pas quoi en faire et personne nest disposé à payer. Après une consultation de la population,le Château du Nessay est loué au Groupe hôtelier Kaahotels. La ville, quant à elle, conserve la propriété du site et des murs. D'importants travaux de transformation sont effectués en 2017 et 2018.","habitants":"Nessay; Famille Breil-de-Pontbriand\r\n        \"","divers":"Dans cet article deux châteaux à Dinard; Vicomté et Nessay grav-6.                                                                                               GPS : 48° 37' 13\" Nord, 2° 02' 08\" Ouest                                                                       et divers châteaux","gps":"48° 37' 13\" Nord, 2° 02' 08\" Ouest","images":["../image/image_35/35_Dinard_II_1.jpg","../image/image_35/35_Dinard_II_2.jpg","../image/image_35/35_Dinard_II_3.jpg","../image/image_35/35_Dinard_II_4.jpg","../image/image_35/35_Dinard_II_5.jpg","../image/image_35/35_Dinard_II_6.jpg","../image/image_35/35_Dinard_II_7.jpg"]},"Consult_chateau_formulaire3d91":{"id":"Consult_chateau_formulaire3d91","dept":"35","canton":"Combourg","commune":"Dingé","nom":"Dingé","type":"Château","periode":"XII-XVI-XX","histoire":"Deux châteaux à Dingé; Ville-André, Bougetin et Plessis .                                     VILLE ANDRE  du XIV- XVI-XVII-XXe siècle, mentionné en 1360.  Charles de Vaucouleurs, seigneur de la Ville-André. Propriété des descendants de la famille Vaucouleurs. On signale aussi les manoirs de la Haute et de la Basse Ville-André. La Haute Ville-André appartient à la famille Bourgneuf, seigneurs du château en 1390 et 1513, on signale Alain de Bourgneuf, en 1488, puis passe entre les mains des familles de Lescouët en 1543, Vaucouleurs, seigneurs de Lanjamet en 1549, Quilfistre, seigneurs de Bazvalan en 1768-1789. La Basse Ville-André appartient à la famille le Vaillé (en 1390), puis à la famille de la Perche en 1513 ;                                                                     PLESSIS, au Chat du XVIIe siècle. Le premier château du XIe siècle est édifié par Haimon Cattus et son père Gimondus. En 1445, est mentionnée l'existence d'un château de bois. L'ancien manoir ou château du Plessis-au-Chat appartient d'abord à la famille le Chat, puis successivement aux familles Plesguen en 1445 et 1552, on signale Pierre de Plesguen en 1480, la Haye en 1580 et en 1674, Bouttier, seigneurs du Boishamon en 1678, Thierry en 1704, Fresne, seigneurs de Virel du XVIIIe siècle. Le manoir du Plessix-au-Chat tirait son nom de la famille le Chat, assez puissante au XIIe siècle tant à Dingé qu'à Combourg. Les seigneurs du Plessis-au-Chat, qui devaient au seigneur de Combourg une paire de gants blancs à chaque Angevine, fondèrent la chapelle voisine de leur demeure et desservie en 1663 par Julien Mary  Pouillé de Rennes.","architecture":"BOUGETIN, manoir du XVIIe siècle. Edifié au XIIe siècle, le manoir et la chapelle ont été plusieurs fois reconstruits. La chapelle Saint-Maurice de Bougetin avait, en 1663, Jean Lanos pour chapelain, et il s'y faisait souvent des mariages. En 1748, l'évêque de Saint-Malo ordonna de la faire restaurer, mais il paraît que ses ordres ne furent pas exécutés, car en 1764 le chapelain reçut ordre d'en dire les messes de fondation à l'église paroissiale. Il se tenait une assemblée très nombreuse le 22 septembre autour de cette chapelle, et la statue de saint Maurice, transportée à l'église depuis sa ruine, continue à la fin du XIXe siècle à être l'objet de fréquents pèlerinages. Propriété successive des familles Langan en 1406 et en 1600, Vaucouleurs en 1633, Beaumanoir en 1666, Julienne le Liepvre, veuve et donataire de Bertrand Bouttier, seigneur du Boishamon, puis Fresne, seigneurs de Virel en 1764. On signale Jehan de Langan en 1480. Son ancienne chapelle est reconstruite avec des pierres sculptées provenant en partie de l'ancien prieuré de Lehon, près de Dinan.","habitants":"Villa-André; Famille  de Lescouët                                            Plessis:  Famille le Chat\r\n        \"","divers":"trois châteaux à Dingè; grand Val grav- 4   Plessis grav-5, Ville-André grav-6    et Bougetin-grav-1-2-3                                   gps 48° 21' 27\" nord, 1° 42' 58\" ouest","gps":"","images":["../image/image_35/35_Ding%c3%a9_1.jpg","../image/image_35/35_Ding%c3%a9_2.jpg","../image/image_35/35_Ding%c3%a9_3.jpg","../image/image_35/35_Ding%c3%a9_4.jpg","../image/image_35/35_Ding%c3%a9_5.jpg","../image/image_35/35_Ding%c3%a9_6.jpg"]},"Consult_chateau_formulairedb76-2":{"id":"Consult_chateau_formulairedb76-2","dept":"35","canton":"Dol-de-Bretagne","commune":"Mont-Dol","nom":"Dol_Bretagne","type":"Château","periode":"XVII","histoire":"Deux châteaux à Dol de Bretagne, Beauvais et Bégaudière à Mont-Dol                                                                                                               BEAUVAIS,   manoir des Beauvais, bâtiment rural, composé d'un corps de logis avec deux ailes en retour. Un étage d'habitation sur rez de chaussée servant de communs et de dépendances avec perron couvert extérieur. Le manoir des Beauvais est implanté en bordure de l'ancienne route de Rennes et actuellement situé entre un carrefour routier et un lotissement des années 50 qui ne favorisent pas une mise en perspective de cet édifice protégé au titre des M.H. A signaler le morcellement de la parcelle subsistante au moment de la protection. Racheté par la commune, il abrite aujourd'hui la maison de la culture. Éléments protégés MH : les façades et les toitures du manoir : inscription par arrêté du 4 février 1963.","architecture":"BEGAUDIERE,  à Mont-Dol  le manoir de Bégaudière est une belle demeure du XVIIe siècle, qui vous accueillera dans un cadre d'exception, à quelques minutes seulement de Saint-Malo. Venez découvrir les splendeurs de la baie du Mont-Saint-Michel et y célébrer votre plus belle cérémonie de mariage pour une fête inoubliable.","habitants":"Familles locales\r\n        \"","divers":"Trois châteaux à Dol de Bretagne, Beauvais grav-1-2-3, Belle-noé grav-4-5 et Bégaudière grav-6-7-8. à Mont-Dol  Begaudière                                                                                  GPS : 48° 34' 11\" Nord, 1° 45' 57\" Ouest","gps":"48° 34' 11\" Nord, 1° 45' 57\" Ouest","images":["../image/image_35/35_Dol_Bretagne_1.jpg","../image/image_35/35_Dol_Bretagne_2.jpg","../image/image_35/35_Dol_Bretagne_3.jpg","../image/image_35/35_Dol_Bretagne_4.jpg","../image/image_35/35_Dol_Bretagne_5.jpg","../image/image_35/35_Dol_Bretagne_6.jpg","../image/image_35/35_Dol_Bretagne_7.jpg","../image/image_35/35_Dol_Bretagne_8.jpg"]},"Consult_chateau_formulairea1e7":{"id":"Consult_chateau_formulairea1e7","dept":"35","canton":"Saint-Malo","commune":"Iles des Ebihens","nom":"Ebihens","type":"Tour","periode":"XVII","histoire":"Tour VAUBAN  Située entre le cap Frehel qui comprend une tour fanal du XVIIe quelque peu similaire et la ville de Saint-Malo, la tour occupe un emplacement de choix destiné à couvrir la baie de la Fresnaye, alors particulièrement vulnérable à une descente voire un débarquement d'ampleur des Anglais et, plus largement, Saint-Malo.  le site est repéré par Vauban à l'occasion de l'attaque anglaise contre Saint-Malo de 1 693. En mai 1694, il propose la construction dune tour-réduit sur lîle intégrée à un vaste ensemble de batteries de côte et retranchements qui ne seront toutefois exécutés que très partiellement. Projet pour le dispositif de la garde de Saint-Malo et ses côtes, mai 1694, par Vauban : « Elle [l'île] est d'autant dangereuse que n'étant point gardée, 10 000 hommes y peuvent prendre terre sans empêchement dans le temps d'une marée de vive eau, et quand la mer est basse, marcher en bataille à la terre ferme par un espace de 150 toises de large qui assèche totalement et cela par des sables fermes comme un plancher.  La pierre de taille, le moellon, le sable et l'eau sont sur le lieu et sous la main. Il n'y manque que de la chaux qu'il  Monsieur de Pontbriand trouvera bien ». Propriété privée ainsi que l'ensemble de l'île, la tour est bien conservée mais elle n'est pas accessible à la visite. Lîle n'est accessible qu'à marée basse.","architecture":"Tour VAUBAN    l'accès à la porte de la tour est couvert par un modeste ravelin dont le mur d'enceinte comprend des créneaux de fusillade. Seul le ravelin était cerné par un fossé, peu large et peu profond, aujourd'hui comblé. Enfin, l'accès au ravelin était peut-être couvert par un pont-levis \r\nD'après un rapport de Garengeau du 29 septembre 1716 l'ensemble est en assez bon état excepté les dehors : « Est nécessaire de réparer les deux ponts levy, y refaire partie des assemblages qui sont pourris et les recouvrir de planches de chêne neuves, mettre les mailles qui manquent aux chaines, une serrure neuve, des crochets et huiller le reste des ferrures que la rouille mange » . D'après ce rapport du 30 juillet 1730, les ponts-levis avaient été brûlés par les Anglais et les fortifications se trouvaient plus ou moins à l'abandon. Le tour d'artillerie des  Ebihens en images. Batteries de côtes aux Ebihens Toutefois l'essentiel de la défense devait être constitué par trois batteries de côtes dont une seule, celle disposée sur la pointe nord-est, sera réalisée en 1756, au moment de la guerre de Sept Ans, sur ordre du duc d'Aiguillon. À cet effet, cette batterie de la pointe de Ebihens (un simple pierres sèches revêtues de gazon, aujourd'hui disparue) comprend deux pièces d'artillerie.\r\nArmée de deux canons de 12 livres, elle croisait ses feux avec celle de Saint-Briac. La tour servait alors de corps de garde aux canonniers garde-côtes.","habitants":"Vauban et Monsieur de Pontbriand\r\n        \"","divers":"Au Iles des Ebihens le fort Vauban de  Ebihens                          Gps  46° 12' 18\" nord, 6° 08' 35\" est","gps":"","images":["../image/image_35/35_Ebihens_1.jpg","../image/image_35/35_Ebihens_2.jpg","../image/image_35/35_Ebihens_3.jpg","../image/image_35/35_Ebihens_4.jpg"]},"Consult_chateau_formulaireff0c":{"id":"Consult_chateau_formulaireff0c","dept":"35","canton":"Vitré","commune":"Erbrée","nom":"Erbrée","type":"Château","periode":"XVII-XIX","histoire":"Quatre châteaux à Erbrée; Bois le Beau, Bretonnières, Haute-Maison et Nétumières.                                                                                             BOIS le BEAU, construit à l'emplacement d'un manoir plus ancien, Le corps central du château a été bâti en 1842, ainsi que les communs au nord et l'orangerie à l'ouest, pour la   famille de la Plesse, Ebihens de Vitré. En 1872, construction d'une serre chauffée et d'un atelier d'artiste, pour Alexandre de La Plesse. En 1875, ajout de deux pavillons aux extrémités du logis et construction d'une écurie à l'est et d'une conciergerie en forme de chalet au sud, travaux peut être attribuables à Jacques Mellet.                                                                    BRETONNIERES,  Les parties ouest et nord, du pavillon à cinq niveaux, ont été reconstruites vers 1600 pour la famille Morel, ainsi que la chapelle, date 1598 et inscription sur la pierre de fondation remontée dans la chapelle actuelle. Vers 1830-1840, la famille Berthois, originaire de Vitré, fait construire la partie Est et rhabiller le reste dans le style néo-Renaissance. Partie constituante : parc, cour, chapelle, grange, four à pain.                                                                                                                     HAUTE MAISON. Les plus anciennes maisons peuvent remonter au XVIIe siècle. L'église a été reconstruite en 1857. Ancien logis du XVIe siècle avec tour d'escalier sur l'angle, remanié au XVIIIe siècle, agrandi de deux ailes au quatrième quart du XIXe siècle. Le château de la Haute-Maison, de plan allongé, élévation ordonnancée, possède un étage carré et étage de comble, tour d'escalier sur l'angle, tour d'escalier postérieure. Gros-oeuvre en grès, moellon sans chaîne en pierre de taille, enduit disparu.","architecture":"NETUMIERES, l'actuelle construction, du XVIe siècle, restaurée au XIXe, possédait autrefois douves, fossés, pont-levis et mail. Le seigneur avait droit de haute justice, avec des fourches patibulaires à trois, puis à quatre pots. L'ensemble se compose du château, des communs à l'ancienne ferme-manoir d'origine médiévale, et des éléments isolés (anciennes tours, pigeonniers et terrasses). Au nord-est se trouve un ancien pont à appareillage probablement gallo-romain.  L'ancien manoir est attesté en 1350, en contre-bas des logis actuels et visible sur le cadastre de 1824 détruit au XIXe siècle. Le château a été commencé à la limite des XVe-XVIe siècles pour la famille Hay et terminé vers 1580. Vers 1860, importante campagne de travaux par l'architecte rennais Jacques Mellet : ajout de trois tours circulaires à l'aile sud, d'une tourelle en surplomb au milieu de la façade principale, reconstruction de la tour à l'angle nord-ouest. Avant 1940, suppression de la tourelle en surplomb et de la tour dans l'angle ; vers 1950, suppression de la tour de l'angle sud-est, reprise du pignon avec remontage de la cheminée provenant du manoir de La Goderie à Erbrée et suppression de l'enduit. Les encadrements des baies anciennes sont en grès local, ceux des autres baies sont en tufeau de la Loire. Le clocher de la chapelle constituait l'un des éléments de défense du château. inscription au M.H.  par arrêté du 22 mars 1973.","habitants":"bois  famille de la plesse,                                          Bretonnières; famille Berthois,                            \r\n        \r\n        \r\n        \"","divers":"Quatre châteaux à Erbrée; Bois le Beau grav 1, Bretonnières grav-2, Haute-Maison grav 3-4 et Nétumières grav-5-6.                                 Bretonnières GPS : 48° 05' 59\" Nord, 1° 07' 24\" Ouest                           Nétumières GPS : 48° 8' 38,21\" Nord, 1° 8' 4,99\" Ouest","gps":"48° 05' 59\" Nord, 1° 07' 24\" Ouest","images":["../image/image_35/35_Erbr%c3%a9e_1.jpg","../image/image_35/35_Erbr%c3%a9e_2.jpg","../image/image_35/35_Erbr%c3%a9e_3.jpg","../image/image_35/35_Erbr%c3%a9e_4.jpg","../image/image_35/35_Erbr%c3%a9e_5.jpg","../image/image_35/35_Erbr%c3%a9e_6.jpg"]},"Consult_chateau_formulaire5288":{"id":"Consult_chateau_formulaire5288","dept":"35","canton":"Liffré","commune":"Ercé-près-Liffré,","nom":"Ercé_Liffré","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux dans cet articles; Bordage et la Motte de Vaulx BORDAGE, sa construction a débuté au XVe et s'est achevée au XVIIIe siècle. Le château du Bordage possède deux tours, appelées la Tour de l'Orient et la Tour aux chiens. Le château du Bordage est un château fort jusquau XVIIe siècle. De cette importante construction féodale il reste aujourdhui la base de deux tours ruinées, des parties de lancien logis seigneurial, de la muraille nord et des douves. Avant sa destruction à la fin du XVIIIe siècle, le château fort du Bordage  présentait toutes les caractéristiques des « châteaux philippiens ». La tour maîtresse isolée fut bâtie après 1229, ayant repris ici l'ancienne tour sur motte, de la fortification primitive. Aujourd'hui, le château du Bordage est une propriété privée, fermée au Public.","architecture":"MOTTE-DE-VAUX, la construction du château de la Motte-des-Vaux date du XVIIe au XIXe siècle. Au XVe siècle, le château de la Motte appartenait à Jean d'Aiguillon, puis à Jean de Cornulier, en 1619, sieur de Lucinière et de La Motte. Il passa ensuite aux mains des Vaux au XVIIe siècle, aux Picaud, sieur de La Pommeraye, en 1762, et aux Rolland de Rengervé, jusqu'en 1981. La motte castrale des XIe-XIIIe siècles, qui se situait au Sud-Ouest du bâtiment actuel, fut rasée vers 1990. Le pavillon, à l'Ouest, porte les armoiries des Rolland de Rengervé et des Le Bastard de Villeneuve, dont Frédéric Rolland de Rengervé épousa sa fille, Louise.","habitants":"Motte; Famille de Jean d'Aiguillon\r\n        \r\n        \"","divers":"Deux châteaux dans cet articles; Bordage grav 1-2-3   et la Motte de Vaulx grav-4-5                                                                                    GPS : 48° 15' 32\" Nord, 1° 30' 32\" Ouest                                                                                     Motte GPS : 47° 50' 03\" Nord, 1° 31' 46\" Ouest","gps":"48° 15' 32\" Nord, 1° 30' 32\" Ouest","images":["../image/image_35/35_Erc%c3%a9_Liffr%c3%a9_1.jpg","../image/image_35/35_Erc%c3%a9_Liffr%c3%a9_2.jpg","../image/image_35/35_Erc%c3%a9_Liffr%c3%a9_3.jpg","../image/image_35/35_Erc%c3%a9_Liffr%c3%a9_4.jpg","../image/image_35/35_Erc%c3%a9_Liffr%c3%a9_5.jpg"]},"Consult_chateau_formulairebbd3":{"id":"Consult_chateau_formulairebbd3","dept":"35","canton":"Vitré","commune":"Champeaux","nom":"Espinay","type":"Château","periode":"XVI","histoire":"ESPINAY, ancien château de la Rivière, appartenant à la famille de Champeaux dès le XIIe siècle, château entouré de douves, qui servit de dépôt d'objets d'art pendant la deuxième guerre mondiale. Au Moyen-Age, c'était une importante forteresse dont subsiste la tour ruinée. L'édifice actuel fut bâti en 1570 par  Jean de L'Espinay frère de l'évêque de Dol par l'architecte Julien Ricand également auteur de la chapelle seigneuriale d'Epinay dans la collégiale de Champeaux. Passa en héritage en 1609 à charles de Schromberg duc d'Halluoin, fils de Françoise d'Espinay, qui devait épouser en secondes noces mademoiselle de Hautefort. Il fut acquis en 1633 par le duc de la Trémoille puis en 1719 par le président le Pestre  Baron de Châteaugiron. Son fils le vendit en 1795 à monsieur   le Prieur et acheta l'ancienne propriété de Mirabeau à Argenteuil. Espinay appartient aujourd'hui au marquis d'Aubigny.  Éléments protégés MH : le château: classement par arrêté du 24 juillet 1946.","architecture":"ESPINAY, la demeure se compose d'un corps de logis du XVIe siècle accolé à un donjon ruiné du XIIIe siècle et accosté de plusieurs tours et tourelles. L'une d'elles, de forme octogonale, présente une porte du milieu du XVIe siècle, décorée de sculptures Renaissance. Au-dessus du linteau, entre deux courts pilastres, un haut relief porte deux écussons timbrés d'un casque à cimier et soutenu par deux sauvages. Le donjon carré présente, à ses deux angles, une tourelle circulaire en encorbellement.  Le château, qui était l'une des plus anciennes et importantes seigneuries du pays de Rennes, était muni de deux tours et possédait un jeu de paume, un mail et une motte. Il ne reste plus aujourd'hui que la chapelle, une partie des bâtiments de servitude et une portion des douves.  L'édifice dénote trois époques de construction : romane primitive, ogivale et début de l'époque moderne. La base de la face nord accuse une époque antérieure au XIIe siècle et devait appartenir à l'édifice primitif. Le haut du mur est percé de quatre fenêtres cintrées de la fin du XVIe ou du début du XVIIe siècle. Le côté sud est percé d'une porte en arc brisé et de quatre grandes fenêtres cintrées de la fin de la Renaissance. A la fin du XIXe siècle, suppression des dépendances séparant l'avant-cour et la cour et création d'un grand parterre à quatre compartiments ; en même temps, important travaux de restauration des intérieurs.  Le pignon Est conserve une grande fenêtre rayonnante du XIVe siècle, avec un meneau et trois quintefeuilles au tympan. L'intérieur présente les mêmes différences d'époques.","habitants":"Charles de Schromberg\r\n        \r\n        \r\n        \"","divers":"A Champeaux; Espinay                                                               GPS : 48° 08' 10\" Nord 1° 18' 47\" Ouest","gps":"48° 08' 10\" Nord 1° 18' 47\" Ouest","images":["../image/image_35/35_Espinay_1.jpg","../image/image_35/35_Espinay_2.jpg","../image/image_35/35_Espinay_3.jpg"]},"Consult_chateau_formulaire72cf":{"id":"Consult_chateau_formulaire72cf","dept":"35","canton":"Fougères","commune":"Fleurigné","nom":"Fleurigné_35","type":"Château","periode":"XIV-XVIII-XIX","histoire":"Deux châteaux à Fleurigné; Bois-Février et Montbrault.                               BOIS-FEVRIER, sur le site d'un ancien château-fort, mentionné dès le XIIe siècle, un château du Bois Février est construit en 1730-1740, englobant des constructions anciennes. On trouve un oratoire qui a remplacé la chapelle et un pigeonnier. Il s'agit de la terre seigneuriale de la paroisse. Il était autrefois entouré d'un mur d'enceinte avec des tours et des fossés, exerçant au bourg un droit de haute justice et était à l'origine le gage féodé de la sergentise de Fleurigné pour le baron de Fougères. Il est érigé en baronnie en 1658 et en marquisat en 1674. L'édifice devait comporter deux ailes en quart de cercle de part et d'autre d'un corps central. L'aile gauche partiellement détruite en 1795, est reconstruite dans la 2ème moitié du XIXe siècle dans un style néo-gothique. Le château est souvent associé à l'Hôtel de la Belinaye de Fougères de part la concavité de sa façade. Le corps de logis néo-gothique comprend un escalier monumental à volées droites et un grand salon. Propriété de monsieur Bouteillé.","architecture":"MONTBRAULT, le château de Montbrault fut construit sur le site d'un château fortifié détruit en 1589 par les troupes de Mercoeur. M. Le Bouteiller fait construire le château actuel en 1906 en remployant les pierres de l'édifice ancien . On y accède par une belle allée de platanes. C'est un château-hôtel construit au XIVe siècle,Le château est construit selon un plan en équerre. La façade principale de l'édifice présente dans l'angle des deux corps principaux une tour rectangulaire demi hors uvre couverte en pavillon, flanquée d'une tourelle circulaire et d'un perron couvert en appentis abritant l'entrée sous deux arcatures en plein cintre. Les baies de la façade sont hautes et rectangulaires, tandis que les fenêtres passantes sont de taille plus modeste, et surmontées d'un fronton semi-circulaire. Une pierre du milieu du XVIe siècle aux armes du Hallay et des de Coëtquen est remployée dans la façade.","habitants":"Bois- monsieur Bouteillé.\r\n        \"","divers":"Deux châteaux à Fleurigné; Bois-Février grav 1-2 et Montbrault -grav-3-4-5.                                                                      Montbrault GPS : 48° 21' 09\" Nord 1° 11' 55\" Ouest","gps":"48° 21' 09\" Nord 1° 11' 55\" Ouest","images":["../image/image_35/35_Fleurign%c3%a9_35_1.jpg","../image/image_35/35_Fleurign%c3%a9_35_2.jpg","../image/image_35/35_Fleurign%c3%a9_35_3.jpg","../image/image_35/35_Fleurign%c3%a9_35_4.jpg","../image/image_35/35_Fleurign%c3%a9_35_5.jpg"]},"Consult_chateau_formulaire6b69":{"id":"Consult_chateau_formulaire6b69","dept":"35","canton":"le Chatelier","commune":"le Chatelier","nom":"Folletière","type":"Château","periode":"XIX","histoire":"FOLLETIERE, en 1575, la Folletière passe par alliance aux Becdelièvre, seigneurs du Bouëxic puis, elle est unie au Bas-Châtellier en Saint-Germain-en-Coglès de 1618 à 1789. L'ancien manoir fut, en 1796, le quartier général de Joseph de Puisaye qui tenta d'organiser un soulèvement des départements de l'Ouest. Des plans, conservés par le propriétaire actuel, témoignent de la construction de cet édifice lors du second quart du XIXe siècle. Ces plans sont signés de l'architecte Jourdin, architecte fougerais qui a notamment travaillé au milieu du XIXe siècle sur des églises telles que celles de Saint-Jean-sur-Couesnon, de Vendel, de Châtillon-en-Vendelais, Montauban-de-Bretagne.  Ces plans datent de 1847, ce qui laisse supposer que la construction du château remonte à la fin des années 1840. A cette époque, le jardin était déjà dessiné et l'ancien manoir était détruit.  Il existe en effet également plusieurs plans de projets pour les jardins, qui datent, selon toute vraisemblance du second quart du XIXe siècle car le château y figure ainsi que l'emprise au sol des anciens bâtiments, visibles sur le cadastre de 1833. Il existe deux projets différents ; le second projet est le plus proche du plan actuel des jardins de la Folletière (emplacement de la ferme au nord-ouest du château notamment). Sur un de ces deux projets, figure une chapelle au sud-ouest du château, au bord de la pièce d'eau. A la fin du XIXe siècle, le bâtiment a subi des aménagements intérieurs : création d'un hall et suppression du \"couloir\" central. Des plans attestent en effet de ces aménagements ; ils datent de février 1895 et sont signés de Jean-Baptiste Martenot, architecte de la ville de Rennes de 1858 à 1895. l'édifice a été racheté en 1994 par M. Jouno qui l'a réaménagé","architecture":"FOLLETIERE  le style néo-gothique pour la Vieuville et le style \"Troubadour\" pour Fretay. Le gros-oeuvre du château de la Folletière est enduit, seuls les chaînages d'angles et les encadrements de baies sont apparents ; ces derniers sont traités en granite. Le bâtiment s'élève sur cinq niveaux ; le rez-de-chaussée est en effet légèrement surélevé car il existe une cave. Le bâtiment possède également deux niveaux d'étages carrés ainsi qu'un comble. Cet édifice présente un plan rectangulaire double en profondeur. Les façades nord et sud sont rythmées par sept travées. Un léger avant-corps saillant au niveau des trois travées centrales marque la façade principale au sud ; il est surmonté d'un fronton triangulaire percé, dans sa partie centrale d'un oculus. Les baies de cette façade sud sont quadrangulaires. La composition de la façade nord répond de manière inversée à celle de la façade sud, ainsi, au nord, il s'agit des parties latérales qui forment un léger avant-corps. Ces deux avant-corps sont surmontés de frontons triangulaires. Les pignons sont également percés de deux fenêtres quadrangulaires par niveau. Une corniche à modillons se déroule sur les frontons triangulaires ainsi que sur la partie supérieure des murs.","habitants":"général de Joseph de Puisaye \r\n        \"","divers":"A le Chatelier. Château de la  Folletière grav 1à 4  et de   Marigny grav 5                                                                                gps48° 24' 57\" nord, 1° 15' 15\" ouest","gps":"","images":["../image/image_35/35_Folleti%c3%a8re_1.jpg","../image/image_35/35_Folleti%c3%a8re_2.jpg","../image/image_35/35_Folleti%c3%a8re_3.jpg","../image/image_35/35_Folleti%c3%a8re_4.jpg","../image/image_35/35_Folleti%c3%a8re_5.jpg"]},"Consult_chateau_formulaire2bc4":{"id":"Consult_chateau_formulaire2bc4","dept":"35","canton":"Bruz","commune":"Chartres de Bretagne","nom":"Fontenay_35","type":"Maison forte","periode":"XIV-XV","histoire":"FONTENAY, La dernière mention de la motte et du château de Fontenay remonte à 1751, il s'agit d'un aveu donné au roi par Charles de Morant. \"La motte ou estoit cy devant basti le chasteau de Fontenay avec la cour devant, le puits au milieu d'icelle autour de laquelle sont des maisons servants de logement au métayer, basties de pierre, couvertes d'ardoise, la chapelle au coin de la cour, à laquelle il ne reste que les murailles et peu de couverture, autre cour et de post au devant, le tout cerné de fossés, le verger ou pépinière avec le jardin, le tout contenant six journaux\". La motte n'est plus représentée sur le cadastre de 1812, par contre une partie des douves et un vivier sont encore en place ainsi que la plupart des bâtiments qui entourent la cour. Un chemin la traverse et contourne la chapelle, située dans l'angle nord-ouest. Quant au château de Fontenay, il a été reconstruit à la fin du XIVe siècle ou dans la première moitié du XVe siècle. Une partie de ce logis seigneurial est encore en place et se distingue, à l'ouest de la cour, par deux cheminées monumentales dont les hottes se dressent au-dessus du mur gouttereau. Leurs formes pyramidales sont un des traits les plus marquants des cheminées des logis de la première moitié du XVe siècle. Ces cheminées monumentales étaient placées généralement dans des pièces sous charpente.","architecture":"FONTENAY, Il est difficile aujourd'hui d'appréhender l'élévation de ce logis qui a été très transformé et amputé d'une partie. Des étables sont aménagées au XIXe siècle dans le prolongement de la grande salle. Les dépendances qui encadrent la cour à l'est sont mentionnées sur le cadastre de 1812. Le chaînage de l'angle de la remise actuelle est réalisé à partir d'anciennes pierres dont une partie de colonne de la période antique. Au XIIe siècle, la paroisse s'appelait Fontenay et avait  pour église cet ancien édifice. Celui-ci de dimension modeste se compose d'une simple nef à chevet droit. Sa construction n'est pas homogène et différentes campagnes sont encore perceptibles. Un appareil régulier de petites pierres cubiques à plusieurs endroits du soubassement indique une construction romane ou du haut Moyen-Age. La baie du chevet et une niche crédence intérieure témoignent d'une reconstruction dans le courant du XIVe siècle. La charpente semble dater du XVe siècle, elle a été modifiée lors de l'installation du retable au XVIIe siècle contre le mur du chevet. Un plancher masque aujourd'hui l'élévation de ce beau mobilier en pierre de taille de calcaire, qui était autrefois recouvert de polychromie. Quant aux nombreuses baies en plein-cintre dont une partie sont aujourd'hui murées qui éclairaient largement ce vaisseau unique, elles sont de cette période faste de réaménagement du sanctuaire.","habitants":"le roi Henri IV \r\n        \"","divers":"a Chartres de Bretagne; Fontenay   48° 02' 47\" nord, 1° 41' 48\" ouest","gps":"","images":["../image/image_35/35_Fontenay_35_1.jpg","../image/image_35/35_Fontenay_35_2.jpg","../image/image_35/35_Fontenay_35_3.jpg"]},"Consult_chateau_formulaire9f70":{"id":"Consult_chateau_formulaire9f70","dept":"35","canton":"Fougères","commune":"Fougeres","nom":"Fougères_35","type":"Forteresse","periode":"XI-XIII-XV","histoire":"FOUGERES, Henri II Plantagenêt qui a envahi la Normandie lorgne sur la Bretagne et assiège le château de Fougères. En effet, Raoul II, seigneur de Fougères est à la tête d'un mouvement qui s'oppose à cette invasion. Mais le château est finalement pris après avoir été vaillamment défendu, le donjon est détruit en 1166. Raoul II n'abdique pas et conduit la reconstruction d'une forteresse plus importante protégée par de hautes murailles. De cette époque, le château de Fougères doit sa renommée et sa place stratégique. Cette place avancée est fidèle au roi et pâti de cette allégeance. Pierre de Dreux qui mène la révolte par le Roi, profite d'une attaque surprise pour s'emparer de la forteresse en 1231. Raoul III peut compter sur les armées du roi pour l'épauler. Dirigée par Saint-Louis en personne, l'armée du Roi reprend Fougères. A la mort de Raoul, c'est sa fille Jeanne qui devient la châtelaine en 1256. Philippe le Bel en 1307, restitue la baronnie au royaume. La forteresse passe de mains en mains mais n'est plus occupée par son châtelain. Le duc de Bretagne, Jean de Montfort avec l'aide des anglais investi la place et y installe sa garnison. En 1373, Du Guesclin libère les villes de haute Bretagne pour Charles V, Roi de France. Pierre d'Alençon récupère le château. Le début du XVe siècle est une période troublée, le seigneur du lieu Jean d'Alençon 1er meurt au combat à Azincourt son successeur Jean II est retenu prisonnier à Verneuil. Jean II d'Alençon pour payer sa rançon vend le château de Fougères à François II, duc de Bretagne en 1428. Entre 1547 à 1566, Diane de Poitiers devient la nouvelle locataire. Acquis en 1982  par le Baron de Pommereul, et par la ville de Fougères qui en assure la restauration.","architecture":"FOUGERES,  est l'un des plus imposants châteaux forts français, occupant une superficie de deux hectares. Constitués de trois enceintes, les remparts sont très bien conservés. L'histoire du château débute au Xe siècle.  En 1449, une troupe anglaise menée par un dénommé Surienne effectue une attaque de nocturne la ville, produit un massacre effroyable de la population. Ce dernier campe sur place et sera finalement délogé par François II au terme de deux mois de siège.  la fille de Raoul III améliore les fortifications de la ville et édifie des tours. La ville est protégée par des portes fortifiées et d'épais remparts. Le château reçoit deux nouvelles tours trapues. En 1488, Fougères est encore au centre d'une lutte entre la Bretagne et la France. La Trémoille, lieutenant général des armées royales assiège la forteresse, assèche les étangs et fait tomber la ville en une semaine. Finalement la Bretagne devient Française ainsi que  Fougères. Le château perd son caractère opérationnel. Durant les guerres de religion le château est pris par le duc de Mercour et assoit ses défenses. Il libérera la place après l'abjuration d'Henri IV. En 1775, le marquis de La Rouërie, revient d'Amérique victorieux de la guerre d'indépendance. Il prend part à la Révolution Française et fait un séjour de deux mois à la Bastille. Il contribue au ralliement autour de la \"Conjuration Bretonne\" dès 1792. L'armée vendéenne et les chouans assiègent Fougères avec 30 000 hommes, ils prennent la ville et fusillent son maire, ces heurts resteront gravées dans les mémoires jusqu'au début du XIXe siècle.","habitants":"Familles des Raoul et Diane de Poitiers \r\n        \"","divers":"La forteresse de Fougères                                                             GPS : 48° 21' 13\" Nord, 1° 12' 34\" Ouest","gps":"48° 21' 13\" Nord, 1° 12' 34\" Ouest","images":["../image/image_35/35_Foug%c3%a8res_35_1.jpg","../image/image_35/35_Foug%c3%a8res_35_2.jpg","../image/image_35/35_Foug%c3%a8res_35_3.jpg","../image/image_35/35_Foug%c3%a8res_35_4.jpg","../image/image_35/35_Foug%c3%a8res_35_5.jpg","../image/image_35/35_Foug%c3%a8res_35_6.jpg","../image/image_35/35_Foug%c3%a8res_35_7.jpg","../image/image_35/35_Foug%c3%a8res_35_8.jpg","../image/image_35/35_Foug%c3%a8res_35_9.jpg"]},"Consult_chateau_formulaire434c":{"id":"Consult_chateau_formulaire434c","dept":"35","canton":"Le Rheu","commune":"Le Rheu","nom":"Freslonnière_Rheu","type":"Château","periode":"XII-XVIII","histoire":"FRESLONNIERE, son implantation est signalée dès le XIIe siècle (1163). Lactuel château a été reconstruit au XVIIe siècle et remanié à la fin du XVIIIe siècle. Le domaine appartient à la famille de Freslon depuis son origine jusquà nos jours. Aux XVIe et XVIIe siècles, le domaine possédait six métairies sur le territoire du Rheu ainsi que le moulin de l'Olivet, sur le bord de la Flume. La présence de la chapelle Saint-Laurent est attestée dès 1478. Elle fut reconstruite en 1725 par Claude Freslon, et restaurée en 1821.La compostions symétrique initiale a été perturbée par la reconstruction de l'aile sud au cours du XIXe siècle surélevée dun étage carré coiffé d'un toit a faible pente. Ces pavillons sont surplombés par des épis de faîtage en plomb. Autre conséquence de cette transformation, la façade postérieure est marquée par le décrochement saillant de ce pavillon tandis que le pavillon nord est en retrait. Les façades sont enduites. Les encadrements douvertures sont traités en chaînages harpés en granite pour les deux niveaux inférieurs, et en calcaire pour les niveaux supérieurs.","architecture":"FRESLONNIERE, par ailleurs, la toiture révèle davantage le prestige de la famille de Freslon : elle est percée dune lucarne en calcaire, accostée dailerons et couronnée dun fronton triangulaire portant les armes de la famille. Le pavillon sud abritait une remise, une soue à cochons et les habitations des employés dans le corps accolé. Létage était un lieu de stockage pour le foin. Le pavillon nord avait une fonction de stockage. Il est composé dun rez-de-chaussée séparé avec une cloison en bois en rez-de-chaussée et en pan de bois à létage. Les poutres sont soutenues par des corbelets. le corps de bâtiment attenant abritait les écuries, aujourdhui aménagées en logements. Les pavillons se prolongent par un long bâtiment dun seul niveau et dun étage de comble couvert dune toiture à croupe. Privilège seigneurial, le colombier possède un nombre de trous de boulins qui correspondait au nombre dhectares de la propriété du seigneur. Il a été restauré au cours des années 1970. La charpente nest pas dorigine. Ses murs en terre sont percés de plusieurs trous. La porte dentrée; ancienne, est à pointe de diamants.  Un mur denceinte entoure le jardin dagrément pour rejoindre le pigeonnier. Les deux pavillons qui précèdent le château et encadrent la cour dhonneur confèrent un réel apparat à la composition inspirée de larchitecture savante qui met en scène le corps principal en second plan. De plan carré, ces pavillons sont construits en terre selon la technique de la bauge avec un soubassement en moellons de schiste, ils sont recouverts dun enduit en chaux-ciment. Les ouvertures sont réparties en une travée ; la toiture recouverte dardoise est soulignée par une corniche et modillons.","habitants":"Famille de Freslon \r\n        \r\n        \"","divers":"A le Rheu le château de la Freslonnière  GPS : 48° 06' 07\" nord, 1° 47' 44\" Ouest","gps":"48° 06' 07\" nord, 1° 47' 44\" Ouest","images":["../image/image_35/35_Freslonni%c3%a8re_Rheu_1.jpg","../image/image_35/35_Freslonni%c3%a8re_Rheu_2.jpg","../image/image_35/35_Freslonni%c3%a8re_Rheu_3.jpg","../image/image_35/35_Freslonni%c3%a8re_Rheu_4.jpg","../image/image_35/35_Freslonni%c3%a8re_Rheu_5.jpg"]},"Consult_chateau_formulairee9c9":{"id":"Consult_chateau_formulairee9c9","dept":"35","canton":"Fougères","commune":"Mézières-sur-Couesnon","nom":"Giraudais","type":"Manoir","periode":"XVIII","histoire":"GIRAUDAIS, après avoir franchi le premier portail et une digue qui borde l'étang, se dresse le château de la Giraudais. Il s'agit d'une construction de 1782 qui rappelle un peu les malouinières du XVIIIe siècle. Il est bordé sur le côté ouest par une douve et par un bâtiment du XVe siècle où l'on peut voir des meurtrières. Sur le côté Est les écuries sont de même époque que le château, encadrées par de grandes auges en granite. Au fond du parc, la chapelle est adossée au mur d'enceinte, quant au colombier il a disparu.","architecture":"GIRAUDAIS, c'est vers 1306 que fut construit le premier manoir par René de Montbourcher, seigneur du Bordage en Ercé-près-Liffré, qui fut élevé en marquisat en 1656. Il fut reconstruit une première fois en 1482 et à nouveau en 1780 avec des éléments de l'ancien manoir dont subsistent les ruines de l'ancien donjon, affleurant le niveau de l'eau dans l'étang maçonné, à l'emplacement des anciennes douves. Une première chapelle fut construite au XVIe siècle et rebâtie à neuf en 1653 par Pierre Bonnier des Grées et de la Giraudais, le linteau de la porte de la chapelle porte toujours l'inscription IHS 1653 MA. Puis, elle fut restaurée en 1784 par René Le Beschu de Champsavin et bénite le 18 octobre 1785 par  l'abbé Crespel recteur de Mézières. Elle est adossée par une tourelle en pignon nord dans laquelle une grande statue de la Vierge éclairée par une verrière domine l'autel. A l'intérieur du château, on trouve un imposant hall dans lequel s'inscrit un large escalier aux massives marches de chêne, longées par une belle rampe en fer forgé. Au sous-sol, la cuisine aux murs en pierres apparentes et belles poutres, est agrémentée par une grande cheminée en granite dont le linteau porte les armes des Montbourcher, fondateurs de la seigneurie en 1306. Toutes les pièces sont revêtues de boiseries très ouvragées, sur deux niveaux.","habitants":"René de Montbourcher\r\n        \"","divers":"A Mézières-sur-Couesnon ; Giraudais GPS : 48° 17' 47\" Nord, 1° 25' 54\" Ouest","gps":"48° 17' 47\" Nord, 1° 25' 54\" Ouest","images":["../image/image_35/35_Giraudais_1.jpg","../image/image_35/35_Giraudais_2.jpg"]},"Consult_chateau_formulaire4b53":{"id":"Consult_chateau_formulaire4b53","dept":"35","canton":"Rennes","commune":"Pacé","nom":"Glestière","type":"Château","periode":"XVII","histoire":"GLESTIERE, le château est composé dun corps central flanqué de deux pavillons légèrement en saillie. Il présente quatre niveaux délévation : un sous-sol ouvert par des soupiraux, un rez-de-chaussée, un étage et des combles percés par des lucarnes à fronton cintré et ailerons. Celles-ci sont dans le prolongement des ouvertures inférieures. La porte dentrée principale, côté ouest, est accessible par un degré rectangulaire rachetant la hauteur du soubassement. En revanche, côté Est, ce dernier est accessible de plain-pied par trois portes. Il faut également noter sur cette façade, donnant dans les jardins, la présence de deux tourelles en pan de bois, placées à langle des pavillons latéraux et coiffées dun toit à l'impériale sommé d'un campanile pyramidal. Que ce soient celles des façades principales ou des pignons, chaque fenêtre est marquée par un encadrement en calcaire contrairement à celui des portes dentrée qui est en granite. Ces piédroits harpés qui se prolongent sur la hauteur totale du bâtiment sont caractéristiques du style Louis XIII. Les étages sont marqués par un bandeau mouluré également en calcaire et courant sur la totalité du bâtiment, ce qui renforce son horizontalité. Les éléments de décor sont discrets. En effet, la travée centrale de la façade ouest ainsi que celle de la façade Est présentent des bas-reliefs figurant des blasons, sans doute liés aux familles propriétaires du lieu. Le bâtiment est couvert dune haute toiture en ardoise, coiffée au niveau des pavillons par des épis de faîtage en forme de fleurs de lys. Ceux des lanternons représentent des oiseaux.","architecture":"GLESTIERE, les communs du château, couverts dune toiture en ardoise, se trouvent côté Est. Il sagit dun bâtiment en longueur, à deux niveaux abritant les écuries : un rez-de-chaussée et un étage de combles ouvert par des lucarnes à croupes. Lintérieur est accessible par quatre portes dont lune est plus petites que les autres. Cette différence de taille sexplique par lutilisation qui en était faite : la porte de taille réduite étaient destinée au passage des hommes, tandis que les plus grandes à celui des animaux, en particulier les chevaux. De petites fenêtres ponctuent la façade ouest des communs. Tout comme les portes, elles sont en plein cintre. Dans langle du pignon sud-est se trouve une tour circulaire percée dune porte en rez-de-chaussée, dune fenêtre à létage. Abritant un pigeonnier, sa toiture est coiffée, à linstar du colombier en terre au sud et des deux tourelles du château, dun lanternon. On trouve étagement un fournil en terre. Plan régulier à un étage carré sur sous-sol ; élévation ordonnancée ; toit à longs pans, toit en pavillon, croupe, toit conique ; escalier dans oeuvre ; appareillage normalisée ; colombier circulaire en terre coiffé d'un lanternon. Éléments protégés MH : le château de la Glestière et ses deux fuies : inscription par arrêté du 17 octobre 1969.","habitants":"Seigneur locaux\r\n        \"","divers":"A Pacé la Glestière                                                                               gps  48° 07' 35\" Nord, 1° 45' 56\" Ouest","gps":"","images":["../image/image_35/35_Glesti%c3%a8re_1.jpg","../image/image_35/35_Glesti%c3%a8re_2.jpg","../image/image_35/35_Glesti%c3%a8re_3.jpg","../image/image_35/35_Glesti%c3%a8re_4.jpg","../image/image_35/35_Glesti%c3%a8re_5.jpg"]},"Consult_chateau_formulaire2792":{"id":"Consult_chateau_formulaire2792","dept":"35","canton":"Guichen","commune":"Goven","nom":"Goven","type":"Château","periode":"XV-XVII-XVIII","histoire":"Quatre châteaux à Goven; Blossac, l'Etangs, Tournerais et Verrerie.                                                                                BLOSSAC,   ce manoir était la propriété de la famille Beloczac au XVe siècle. Propriété successive des familles de Beloczac en 1163 et 1427, de Québriac en 1461, du Guémadeuc en 1539, Loaisel seigneurs de Brie en 1655, Marie de Montigny, veuve de Gabriel de Chateaubriand, seigneur de Beaufort en 1666, Amproux, seigneurs de Lorme vers 1669, de la Bourdonnaye, seigneurs de Couëtion en 1671.\r\n L'ETANGS ou Lampastre, l'ancien manoir possédait jadis une chapelle privée. La chapelle de Lampastre dépendait du vieux manoir de ce nom, remplacé à la fin du XIXe siècle par le beau château des Etangs ; nous ignorons sa fondation, dont l'évêque réclama l'acte en 1766 ; elle figure aussi dès 1727 parmi les chapelles domestiques de Goven dans l'Etat du diocèse (Pouillé de Rennes). Propriété successive des familles de Vitré ou de Litré (en 1427), de Saint-Brieuc (en 1513), de Porcon (en 1524 et en 1666), de la Bourdonnaye, Lancrau de Bréon.","architecture":"BLOSSAC, a été construit à partir du XVIIe au XVIIIe siècle, sur lemplacement dun manoir du XVe siècle, dont il ne reste, aujourd'hui, quune tourelle. Le château actuel fut construit au XVIIIe siècle. D'importants travaux sont entrepris au cours de ce siècle, dont la construction de la chapelle (bénie en 1769) et de l'aile attenante. La porte centrale de la façade orientale est datée de 1760. L'ensemble comprend un bâtiment central à quatre travées, flanqué de deux pavillons saillants et deux ailes latérales du XVIIIe forment, par leur avancée, une cour d'honneur. A l'intérieur, les lambris de bibliothèque proviennent de l'hôtel Julien, rue Vivienne à Paris. Les façades et toitures du château de Blossac sont inscrits aux M.H. depuis le 15/03/1957                                                                                                                     TOURNERAIS, manoir, il possédait jadis une chapelle privée et un droit de haute justice. La chapelle Notre-Dame et Sainte-Barbe de la Tourneraye fut fondée près du manoir de ce nom par les seigneurs de la Tourneraye, qui avaient aussi la présentation de la chapellenie des Trois-Maries de la Vairie. En 1718, François Guillon fut pourvu de ces deux bénéfices en place de René Michel, décédé ; il promit de desservir la fondation de Sainte-Barbe dans la chapelle du manoir, et celle des Trois-Maries dans l'église paroissiale. En 1774, une troisième chapellenie, dite de Sainte-Anne, était unie aux précédentes, et Julien Ramaré en fut pourvu à charge de les desservir toutes trois dans la chapelle de la Tourneraye (Pouillé de Rennes). Propriété successive des familles de la Tourneraye ramage des seigneurs de la Lande (en 1380), Le Gall (en 1677), de Poix (en 1695), de Visdelou comte de Bienassis (en 1704), de la Marck (vers 1727), de Ligne princes d'Arembert (vers 1748), de Pioger, de la Villeboisnet.","habitants":"Blossac : Famille Beloczac                                                              Etangs; Familles de Vitré.                                                                              Familles de la Tourneraye \r\n        \r\n        \"","divers":"quatre  châteaux à Goven; Blossac grav-1   l'Etangs  grav 2-3  et Tournerais grav-4. Verrerie grav-5                              Blossac GPS : 48° 01' 54\" Nord, 1° 46' 45,24\" Est                                         Goven- gps 48° 00' 24\" nord, 1° 50' 46\" ouest","gps":"48° 01' 54\" Nord, 1° 46' 45,24\" Est","images":["../image/image_35/35_Goven_1.jpg","../image/image_35/35_Goven_2.jpg","../image/image_35/35_Goven_3.jpg","../image/image_35/35_Goven_4.jpg","../image/image_35/35_Goven_5.jpg"]},"Consult_chateau_formulaire7206":{"id":"Consult_chateau_formulaire7206","dept":"35","canton":"Bain-de-Bretagne","commune":"Grand Fougeray","nom":"Grand_Fougeray","type":"Tours","periode":"XIII-XIV-XIX","histoire":"GRAND-FOUGERAY, à la limite sud-est du village, édifice du XIXe siècle construit après le démantèlement du château fort. Le donjon du XIIIe siècle semble avoir conservé à peu près intactes ses dispositions primitives de défense. De l'ancien château fort du Grand-Fougeray reste le donjon datant du XIVe siècle, démantèlement au XVIIIe siècle.   Dans le parc de la Tour Du Guesclin au Grand-Fougeray date du XIVe siècle,  Le château reste ensuite propriété de la famille de Rieux jusqu'en 1425. Acheté en 1748 par un négociant, il sert de carrière pour le château de style Renaissance construit juste à côté et pour des maisons du bourg de Grand-Fougeray.","architecture":"GRAND-FOUGERAY. subsiste un donjon du XIIIe siècle semble avoir conservé à peu près intactes ses dispositions primitives de défense. Des ouvertures ont été percées aux XIVe et XVe siècle. Il serait la première conquête de Duguesclin en 1354. Les parties hautes ont sans doute été arasées par Louis XIV. Éléments protégés MH : le donjon du château du Grand-Fougeray : classement par arrêté du 20 janvier 1913.","habitants":"famille de Rieux\r\n        \"","divers":"Château tour au Grand-Fougeray   GPS : 47° 43' 26\" Nord, 1° 43' 55\" Ouest","gps":"47° 43' 26\" Nord, 1° 43' 55\" Ouest","images":["../image/image_35/35_Grand_Fougeray_1.jpg","../image/image_35/35_Grand_Fougeray_2.jpg"]},"Consult_chateau_formulaire822c":{"id":"Consult_chateau_formulaire822c","dept":"35","canton":"Guichen","commune":"Guichen","nom":"Guichen","type":"Château","periode":"XV-XVIII","histoire":"Deux château dans cet article ; Batgatz  Molière à St- Senoux.                                                                               BAGATZ, château du XVe siècle fortement restauré et vraisemblablement agrandi au XIXe siècle. Le volume des toits d'un batiment annexe  paraît ancien. Au XIXe siècle, le château est vendu par les La Bourdonnaye aux Talhouët de Boishorand, il appartient à Charles de Talhouët de Boishorand en 1892 et à la vicomtesse du même nom au début du XXe siècle. Restauration en 1905 par l'entrepreneur renna
