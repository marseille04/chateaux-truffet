" Nord, 1° 48' 26\" Ouest","images":["../image/image_35/35_Messac_1.jpg","../image/image_35/35_Messac_2.jpg","../image/image_35/35_Messac_3.jpg","../image/image_35/35_Messac_4.jpg"]},"Consult_chateau_formulaire3875":{"id":"Consult_chateau_formulaire3875","dept":"35","canton":"Fougères","commune":"La Mézière","nom":"Mezière_35","type":"Chateaux","periode":"XVI-XVIII","histoire":"Trois châteaux à Mézière; Mauvière, Sécardais et les Loges                                                                                     MAUVIERE, sur les terres de la ferme de La Mauvière, propriété de l'avocat Jacques-Marie Carron de la Carrière est construit un château neuf, La Grande Mauvière, pour Emile-Eloi Carron de la Carrière pour y résider l'été. Conseiller municipal de La Mézière en 1870, il est élu Député d'Illle et Vilaine en 1871, puis se sépare de la propriété en 1881. Le château est décoré par l'atelier Jobbé-Duval. Le parc est aménagé dans les années 1930 par Pierre Fayer. Restauration du château en 1968. Le bâtiment, de plan cubique comprend un rez-de-chaussée surélevé, un étage carré et un étage de comble. Les façades principales comptent trois travées. Perron et terrasse au sud sur laquelle ouvrent des baies cintrées. Lucarnes surmontées de frontons triangulaires en pierre.                                              SECARDAIS, il a été construit en 1758 sur les plans de Forestier le Jeune. La chapelle Saint Pierre date de 1608. François-René de Chateaubriand y séjourna pour rendre visite à sa sur Bénigne, Comtesse de Châteaubourg. Il évoque la Sécardais dans les Mémoires d'outre-tombe. Le château de la Secardais, la chapelle, le jardin et l'allée Chateaubriand au Nord ont été inscrits aux M.H. le 22/07/2004.","architecture":"les LOGES, le manoir des Loges a été construit autour de 1590. La famille Dupont des Loges s'y est installée à la fin du XVIIe siècle. Le corps de logis a été agrandi par la construction d'un pavillon au Nord-Ouest au cours du 2e quart du XVIIIe siècle. Il a été restauré en 1949 avec la reprise des fondations et le remontage de la façade Sud. C'est un édifice de plan en L avec une tour d'escalier polygonale dans l'angle. Le pavillon rectangulaire est accosté au Nord. La maçonnerie de gros-oeuvre est en pierre de taille de granite. La couverture est en ardoise. Le cadran solaire en schiste sur la façade Sud est signé et daté : Pierre Pitard en  1575. Le logement en moellon de grès et granite à l'Est du corps de logis. Les écuries et remise au Sud-Est. Il y a une ferme et ses dépendances côté Est. Il est en pierres appareillées, et présente une tourelle octogonale et des gerbières ornées de pilastre, sommées de grandes coquilles formant fronton. Une chapelle, construite dans l'angle Sud-Ouest de la propriété, contemporaine du manoir, à saint Maurille, évêque d'Angers, et à saint Hubert. Un beau mail, environné de bosquets, agrémente cette demeure, qui fut celle de la famille Dupont-des-Loges. Une ferme, dite des Loges, jouxte le château. Mgr Dupont-des-Loges y résida pendant son enfance. Évêque de Metz en 1843, il devint, après l'annexion de la Lorraine, le chef de file du parti protestataire, comme représentant de Metz au Reichstag, en 1874. Très attaché à sa Bretagne natale et à La Mézière, il a participé à la restauration de l'église et à l'organisation des écoles catholiques communales. Le Manoir des Loges a été de nouveau restauré au XXe siècle.","habitants":"Mauvière; Emile-Eloi Carron de la Carrière   les Loges ; a famille Dupont des Loges                                                             Sécardais;  François-René de Chateaubriand \r\n        \r\n        \"","divers":"Trois châteaux à Mézière; Mauvière grav-1-2, Sécardais grav -4 et les Loges grav -3                                                                      Loges GPS : 48° 13' 06\" Nord, 1° 45' 20\" Ouest","gps":"48° 13' 06\" Nord, 1° 45' 20\" Ouest","images":["../image/image_35/35_M%c3%a9zi%c3%a8res_35_1.jpg","../image/image_35/35_M%c3%a9zi%c3%a8res_35_2.jpg","../image/image_35/35_M%c3%a9zi%c3%a8res_35_3.jpg","../image/image_35/35_M%c3%a9zi%c3%a8res_35_4.jpg"]},"Consult_chateau_formulaire22d4":{"id":"Consult_chateau_formulaire22d4","dept":"35","canton":"Dol-de-Bretagne","commune":"Miniac-Morvan","nom":"Miniac_Morvan","type":"Château","periode":"XIII-XV-XVII","histoire":"Quatre châteaux à Miniac-Morvan dont Miniac-Morvan, le Bas Miniac, Bishamon et Gouillon.                                                                                        MINIAC-MORVAN, date de 1749-1758. Il est édifié sur l'emplacement d'une demeure fortifiée du XIIe et du XIIIe siècle, dont il reste encore quelques vestiges (tours qui flanquaient le pont-levis). Au XIIe siècle, il appartient à Guillaume de Miniac. C'est sans doute le nom du premier seigneur, fondateur de ce lieu fortifié. Au XIVe siècle, un Olivier de Miniac est compagnon d'armes de Du Guesclin. Le château comprend un donjon, un pont-levis, des douves, des contrescarpes, des courtines et des tours. La seigneurie, érigée en vicomté, dépend du Comté de Châteauneuf. En 1589, les seigneurs du Chastel, favorables aux huguenots, voient leur château démantelé par les troupes de Mercoeur. Il ne subsiste aujourd'hui de ce château-fort qu'une partie des deux tours et de la courtine. Le château actuel se compose d'un logis, d'une chapelle, d'une cour avec communs, d'un colombier et d'un étang, seigneur de Miniac (XVIIe-XVIIIe siècles). Le château est la propriété successive des familles de Miniac, de Québriac au XIVe siècle, de Mauny, seigneurs de Lesnen, du Châtellier, vicomtes de Pommery au XVe siècle, du Chastel en 1522, de Rieux seigneurs de Châteauneuf vers 1560, de Scépeaux, ducs de Beaupréau, de Gondy ducs de Retz vers 1618, de Boiséon vicomtes de la Bellière en  1620, Gouyon, seigneurs de la Ville-aux-Oiseaux avant 1638, le Clavier en 1652, de France seigneurs des Champs-Bulants en 1772  en 1789,  à de Villèle.","architecture":"BAS-MINIAC,  date du XVe, XVIIe et XVIIIe siècle. Le Château de Bas-Miniac fut l'ultime berceau de la famille de Miniac. Le château fut édifié sur les restes d'une motte féodale, batie autour de l'an Mil, alors qu'apparaît la forme la plus ancienne du nom Miniac, Méniac. Le Château de Bas-Miniac,  ultime berceau de la famille de Miniac, le château est édifié sur les restes d'une motte féodale, construite autour de l'an mil alors qu'apparaît la forme la plus ancienne du nom Miniac.                                                                                                                              BISHAMON, le manoir de Bishamon fut la propriété de la Maison de Bohier, puis de Québriac, Seigneurs de la Hirelays, en 1513.                                                               GOUILLON  La construction du château de Gouillon date du XVe siècle, château, manoir ou métairie noble, les premières mentions datent du XIIIe siècle. Il fut incendié mais reconstruit. Le Château de Gouillon a été la propriété successive des familles du Breil, de Québriac (1513), Gaultier (1658), Uguet, et Laubespin. C'est en 1735 que la malouinière fut construite. L'édifice ainsi modifié faisait 35 m de long sur 15 m de large pour 16 m de hauteur. Cela en faisait une des plus imposantes de la région. Le milieu du XIXe siècle voit les Mouchet de Batteforf (comte et marquis de Laubespin) devenir les maitres de Gouillon.","habitants":"Miniac ;Famille Olivier de Miniac                                           Bishamon; Famille de Bohier                                                    Gouillon ; Famille de Laubespin\r\n        \"","divers":"Quatre châteaux à Miniac-Morvan dont Miniac-Morvan, le Bas Miniac  grav 1-2-3, Bishamon et Gouillon grav-4-5.     Touche-grav-5                                                                                                  Bas Miniac GPS : 48° 30' 53\" Nord, 1° 54' 00\" Ouest                                      Gouillon GPS : 48° 32' 07\" Nord, 1° 54' 25\" Ouest","gps":"48° 30' 53\" Nord, 1° 54' 00\" Ouest","images":["../image/image_35/35_Miniac_Morvan_1.jpg","../image/image_35/35_Miniac_Morvan_2.jpg","../image/image_35/35_Miniac_Morvan_3.jpg","../image/image_35/35_Miniac_Morvan_4.jpg","../image/image_35/35_Miniac_Morvan_5.jpg","../image/image_35/35_Miniac_Morvan_6.jpg"]},"Consult_chateau_formulaire442c":{"id":"Consult_chateau_formulaire442c","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Moulins","nom":"Monbouan","type":"Château","periode":"XVIII","histoire":"MONBOUAN, le château de Monbouan relevait de la baronnie de Vitré et avait un droit de haute justice et de quintaine. Il était aux le Vayer en 1427 et 1534, aux de Langan en 1656 et aux des Nétumières à partir de 1720. Il est édifié dans le style Louis XV par l'ingénieur des Etats de Bretagne, en 1771, pour la famille Hay des Nétumières qui le quittera pour le château de la Montagne à Visseiche à la fin du XIXe siècle,  propriété de Richard Mille.","architecture":"MONBOUAN,  reconstruit en granite en 1771. Il se compose d'un corps de logis à sept travées, double en profondeur, et de deux pavillons accolés de part et d'autre du logis. L'avant corps central est surmonté d'un fronton en plein cintre décoré dans son milieu. La date de construction est inscrite au-dessus de la porte d'entrée. Le hall d'entrée est décoré par des peintures réalisées à partir des cartons de Boucher. Une des plaques de cheminée est aux armes des de Châteaurenault. Le jardin à la française est clôturé par des grilles, un mur surmonté de vases et de douves. La cour verte est en terrasse avec une niche à chien. Autour du château, on remarque des dépendances, la maison du jardinier, un colombier, un lavoir, un étang, des vergers et des douves. Déjà, un manoir existait à cet emplacement. Il a été détruit par un incendie. Le château a été construit dans la perspective de l'avenue et du pont qui enjambe les anciennes douves. Les pavillons ont été ajoutés ultérieurement. La chapelle édifiée à l'intérieur du château date de la même période que ce dernier. Les oeils de boeuf sont transformés en lucarne au XIXe siècle (enlevées dans les années 1970). A cette même époque, les pavillons sont doublés en profondeur et les pièces redistribuées par l'architecte Martenot (architecte des halles de la Place des Lices et des grilles du Thabor à Rennes). Le jardin a été dessiné par Gillet au XIXe siècle. Les dépendances datent du XVIIIe siècle. La ferme du Petit Monbuan a été construite vers 1910-1911, selon la tradition orale.","habitants":"Monbouan ; famille Hay des Nétumières\r\n        \"","divers":"a Moulins le château de Monbouan                                                      GPS : 48° 01' 19\" Nord, 1° 21' 43\" Ouest","gps":"48° 01' 19\" Nord, 1° 21' 43\" Ouest","images":["../image/image_35/35_Monbouan_1.jpg"]},"Consult_chateau_formulaireffb5":{"id":"Consult_chateau_formulaireffb5","dept":"35","canton":"Rennes","commune":"Montfort-sur-Meu,","nom":"Monfort_Meu","type":"Tour","periode":"XIii-XVII","histoire":"TOUR de MONTFORT, vers 1090, un premier donjon en pierre est élevé par Raoul 1er de Montfort sire de Gaël. Pourtant, une centaine d'années plus tard, ce premier donjon est incendié au cours d'une attaque. Suite à cette attaque, un nouveau donjon fut, selon toute vraisemblance, reconstruit. Les plans de la ville et du château de 1715 nous permettent de connaître l'aspect de ce donjon datant du début du XIIIe siècle. Ainsi, il s'agissait, semble-t-il, d'une grande tour carrée aux angles arrondis. Les vestiges de ce bâtiment furent détruits vers 1840, lors de la construction, sur ce site, de l'actuelle église Saint Louis Marie Grignion de Montfort. Dans la seconde moitié du XIVe siècle, durant la période de troubles de la guerre de succession en Bretagne et afin de renforcer les défenses du duché contre tout danger extérieur, les ducs suscitent une politique de fortification active. C'est ainsi que Raoul VII obtient, en 1376, une autorisation pour le renforcement des fortifications de la ville et du château de Montfort. Autour du site fortifié du XIe et du XIIIe siècle, se développe, par conséquent, une enceinte urbaine, ponctuée de tours de défense. C'est également de cette époque que datent certaines portes de la ville close telles la porte Saint Nicolas, détruite en 1898.","architecture":"TOUR de MONTFORT, dès le XIe siècle, un château et érigé sur ce site stratégique. Il s'agissait d'un château à motte, c'est-à-dire de constructions en bois. Une butte naturelle fut élevée de cinq à six mètres grâce aux déblais du fossé circulaire qui l'entourait. Une levée de terre supportant une palissade achevait  le système défensif. Par ailleurs, la tour de Papegaut fut également élevée à cette période, c'est-à-dire à la fin du XIVe siècle. Cette tour avait une double vocation : défensive et résidentielle. De plus, vers 1400, on construisit également un châtelet d'entrée, permettant de fermer la cour du château. Ce châtelet présentait, selon toute vraisemblance, la forme d'un porche bordé de deux tours rondes et équipé d'un pont levis et d'une herse. Il subsiste quelques traces de cet ancien châtelet sur une maison de 1857 située rue du château. Au cours du XVe siècle, le seigneur de Montfort, Guy XIV, poursuit les travaux entrepris à la fin du XIVe siècle par son ancêtre Raoul VII. Ainsi, il adapte notamment les fortifications de la ville au nouveau moyen de défense que constitue l'artillerie. Ainsi, la tour du Pas D'Ane, en forme de fer à cheval, est aménagée dans ce but à la fin du XVe ou au début du XVIe siècle. A la fin du XVIe siècle, les guerres de Religion entraînent une restauration des fortifications de la ville de Montfort. Au début du XVIIe siècle, Montfort échoit à la famille de la Trémoille qui ne réside pas sur place et qui laisse, par conséquent, le château se délabrer. Pendant la Révolution française, le château revient à la commune, il est ensuite cédé au département qui y installe une prison à partir de 1819. Cette prison fonctionnera jusque dans les années 1950. Enfin, la tour est acquise par la ville en 1979 et restaurée jusqu'en 1984. Elle abrite aujourd'hui l'Ecomusée du Pays de Montfort.","habitants":"Tour de Montfort; Famille de Raoul de Montfort\r\n        \r\n        \r\n        \"","divers":"a Montfort-sur-Meu le château de Montfort ,                                          gps 48° 08' 15\" nord, 1° 57' 24\" ouest                                                    tour 48° 08' 16\" nord, 1° 57' 19\" ouest","gps":"","images":["../image/image_35/35_Monfort_Meu_1.jpg","../image/image_35/35_Monfort_Meu_2.jpg","../image/image_35/35_Monfort_Meu_3.jpg","../image/image_35/35_Monfort_Meu_4.jpg"]},"Consult_chateau_formulaire6d5f":{"id":"Consult_chateau_formulaire6d5f","dept":"35","canton":"Montauban-de-Bretagne","commune":"Montauban-de-Bretagne","nom":"Montauban_35","type":"Château","periode":"XIII-XV-XVII","histoire":"Deux châteaux à Montauban de Bretagne, dont Montauban et Ribaudière et  à  deux K.M  à l'est le Lou du Lac château                                                                                             MONTAUBAN, est un exemple, que l'on peut estimer unique en Bretagne, de l'évolution d'un site défensif au cours du Moyen-Age. Le premier château fut construit par la famille de Montfort, à une date inconnue, entre le Xe et le XIIe, époque où se diffuse le type de la motte castrale : celle de Montauban est encore reconnaissable de nos jours. Elle était  surmontée d'un donjon de bois, la motte fut sans doute abandonnée dès le XIIIe siècle au profit d'un château, élevé à l'emplacement du château actuel. propriétaire monsieur Von O Ntrup.                                                                                                               Le LOU du LAC, du XVe siècle-1657, reconstruit à plusieurs reprises. Le château était jadis entouré de douves et flanqué de quatre tours. Il se compose de deux constructions avec un rez-de-chaussée élevé, un étage, des corniches modillonnées et des gerbières à frontons alternativement arrondis et triangulaires. Le Lou est érigé en châtellenie en 1637 et possédait autrefois un droit de haute justice exercé à Montauban ainsi que des fourches patibulaires à quatre piliers. Le château se compose de deux constructions dont l'une date de 1657. Sur l'autre édifice, on peut voir un écusson aux armes de Jacques de la Lande et de Geneviève de la Chapelle, son épouse, avec la date de 1571. Propriété successive des familles Méel (au XVe siècle), de la Lande (en 1513), Aubert sieurs de Sauvé (en 1733 et en 1789), Freslon ; Olivier de Méel est sans doute le membre le plus connu de cette famille. Du château construit en 1657, il ne reste quune large bâtisse. Lendroit, en pleine campagne, est paisible. Ici, évoquer Marie Berthier, cest inévitablement parler de son bar installé au château du Lou, sur la commune du Lou-du-Lac. Un bistrot dans un château du XVIIe siècle.","architecture":"MONTAUBAN, le nouveau château, en pierre, a été construit sur un plan hexagonal, en tirant parti de la défense naturelle fournie par l'étang à l'ouest, et en complétant la défense à l'est par un important système de défenses avancées : douves, cavaliers, entrées successives. De cet édifice du XIIIe siècle subsistent l'actuel donjon, modifié depuis et la tour des Anglais. L'ensemble fut complété en 1430 par le châtelet qui devint caduque avec le développement de l'artillerie au XVe siècle. Charles VIII ne rencontra guère de difficultés pour investir l'édifice par son point faible en 1487. Le logis et sa tour furent entièrement détruits et le donjon partiellement. Le château perdit de son importance et ne fut que sommairement reconstruit.   Éléments protégés MH : le château en totalité, à savoir le châtelet, l'aile nord (communs), le logis sud intégrant la tour du Renard, la chapelle, la tour dite donjon, les ruines du logis seigneurial, la tour dite des Anglais, les deux corps de communs au nord-ouest de la cour, : classement par arrêté du 6 mars 2003.                                                                               RIBAUDIERE, site ancien mentionné dès le XIVe siècle. Un château du XVIIIe siècle a été presque complètement reconstruit lors d'une campagne de travaux du milieu du XIXe siècle. Orain écrit : \"Le château de la Rubaudière, sur les rives de l'étang de Chaillou, est de construction récente. Il a remplacé l'ancienne maison noble de ce nom\". Le château de la Ribaudière est réalisé pour Joseph Trouessart. Peut-être doublement du corps de logis existant.","habitants":"le Lou: Famille Méel      Montauban : monsieur Von O Ntrup                      Ribaudière ; Joseph Trouessart\r\n        \"","divers":"Deux châteaux à Montauban de Bretagne, dont Montauban grav- 1à 5 et Ribaudière  grav_6 et  à  deux K.M  à l'est le Lou du Lac  grav -7-8  château                                                                           gps  48° 12' 52\" nord, 2° 03' 18\" ouest","gps":"","images":["../image/image_35/35_Montauban_35_1.jpg","../image/image_35/35_Montauban_35_2.jpg","../image/image_35/35_Montauban_35_3.jpg","../image/image_35/35_Montauban_35_4.jpg","../image/image_35/35_Montauban_35_5.jpg","../image/image_35/35_Montauban_35_6.jpg","../image/image_35/35_Montauban_35_7.jpg","../image/image_35/35_Montauban_35_8.jpg"]},"Consult_chateau_formulairee417":{"id":"Consult_chateau_formulairee417","dept":"35","canton":"Fougères","commune":"Fleurigné","nom":"Montbrault","type":"Château","periode":"XVII-XX","histoire":"MONTBRAULT, au IXe siècle fut élevée une motte à Montbrault, il est certain qu'il existait sur la motte une importante construction. Un mur d'enceinte de plus de 1.80 mètre d'épaisseur, des débris de tours et d'autres substructions en sont la preuve. A lorigine, le premier château de Montbrault (qui signifie Mont des Bruyères) était fortifié, il possédait donc une enceinte murée, des tours, des fossés, un pont-levis et une chapelle. Il possédait également un droit de haute justice. Le château fut détruit et incendié en 1589, par le Chevalier Mercur et ses troupes. Les archives nous ont laissé les noms des anciens propriétaires, ainsi, nous savons donc que le Château de Montbrault était la propriété de la famille Husson en 1411. Il passa par alliance aux Du Hallay en 1420. Il fut vendu judiciairement à la famille De Langan, seigneurs du Bois Février en 1620. Les terres furent données au seigneur César de Langan par le roi Louis XIII pour services rendus au royaume, à la pointe de lépée. A sa mort, César de Langan fût inhumé dans la chapelle du château. La légende dit que son corps fut placé dans une chasse dor et que ceux qui fouillaient pour la trouver mourraient subitement. En 1789, lors de la Révolution Française, les De Langan en étaient encore les propriétaires.","architecture":"MONTBRAULT, la construction du château actuel a commencé en 1903, pour se terminer en 1906. Lensemble fut édifié par la famille Le Bouteiller, descendants des De Langan. Un architecte de Laval du nom de George fut consulté pour les plans et l'entreprise Brunet de Rennes à réalisé la construction. La pierre qui a servi à la reconstruction, est celle de lancien château du XIVe siècle. Sous le porche, nous retrouvons une pierre du XVIe siècle portant les armes des Du Hallay et des De Coëtquen. Le château est construit selon un plan en équerre. La façade principale de l'édifice présente dans l'angle des deux corps principaux une tour rectangulaire demi hors uvre couverte en pavillon, flanquée d'une tourelle circulaire et d'un perron couvert en appentis abritant l'entrée sous deux arcatures en plein cintre. Les baies de la façade sont hautes et rectangulaires, tandis que les fenêtres passantes sont de taille plus modeste, et surmontées d'un fronton semi-circulaire. Le rez-de-chaussée se compose de  deux grandes pièces un salon et une salle à manger ainsi que d'une cuisine avec un office. Les pièces sont carrées. Sous le rez-de-chaussée se trouve une cave avec des pièces pour les domestiques, une cuisine avec un fourneau et un monte-plat, ainsi qu'un calorifère et sa réserve à charbon. Le calorifère servait à chauffer le château, les grilles laissant passer la chaleur sont encore visibles notamment au rez-de-chaussée. Le premier étage se compose d'un bureau et de trois chambres avec cheminée en marbre, le second étage de chambres pour les domestiques et des combles.","habitants":"Montbrault;  Famille De Langan,\r\n        \"","divers":"A Fleurigné le château de Montbrault                                                   Gps  48° 20' 10\" nord, 1° 07' 11\" ouest","gps":"","images":["../image/image_35/35_Montbrault_1.jpg","../image/image_35/35_Montbrault_2.jpg"]},"Consult_chateau_formulaire73f3":{"id":"Consult_chateau_formulaire73f3","dept":"35","canton":"Fougères","commune":"Louvigné-du-Désert","nom":"Monthorin","type":"Château","periode":"XVII","histoire":"MONTHORIN, dépendant de la baronnie de Fougères, le château de Monthorin a été construit par Gilles Ruellan, seigneur du Tiercent, au XVIIe siècle sur l'emplacement de l'ancien manoir. Acquis sous le Premier Empire par le général de la Riboisière, le château est agrandi par l'adjonction de deux ailes en retour d'équerre flanquées de tourelles polygonales, et l'intérieur fut entièrement remanié. Le jardin et le parc sont alors aménagés. Orain écrit que le château de Monthorin, ancien manoir seigneurial, est construit en brique et en granit, dans le style Louis XIII'. Honoré de la Riboisière, également enterré dans la chapelle au XIXe siècle, était ancien député, pair de France, sénateur et président du Conseil Général d'Ille-et-Vilaine. Quant aux parties agricoles, elles portent pour l'une d'entre elle la date 1885. Une usine de bonneterie est créée en 1920 à Wizernes par Caroline Lesaffre. En 1964, afin d'élargir sa clientèle, une succursale vient s'implanter à Louvigné-du-Désert, sur le site du château de Monthorin, qui fut également un ancien couvent. Le château abrite alors une partie des bureaux, le logis patronal et le stockage des matières premières. Les ateliers de l'usine sont installés dans les anciennes écuries, avant un agrandissement avec la construction d'un nouvel ensemble plus récent à l'arrière du site.","architecture":"MONTHORIN De plan rectangulaire, le château est de style Louis XIII. Il est élevé dans les même matériaux que les bâtiments de dépendance : en brique avec encadrements des baies, bandeaux, chaînes d'angles et motifs en pierre. Il présente un plan en U formé d'un corps de bâtiment longitudinal flanqué d'un avant-corps central et encadré de deux ailes en retour d'équerre avec tour carrée demi-hors-oeuvre dans l'angle, couverte d'un toit en pavillon. A un étage carré et un étage de comble percé d'oculi, ce château est couvert d'un toit à croupes en ardoises. L'ensemble est situé dans un cadre verdoyant. L'entrée, marquée par un grand portail en fer forgé encadré de deux piliers en granite, est flanquée de la conciergerie, petit bâtiment de plan centré polygonal, construit en brique avec chaînes d'angles et encadrements des baies en pierres de taille en granite. Les différents pans du bâtiment sont percés alternativement de portes-fenêtres et d'oculi. La conciergerie, à un étage de comble, est couverte d'un toit à l'impériale en ardoise posée en écaille. Un fronton curviligne, supporté par deux colonnes, surmonte la porte d'entrée. Les ateliers de fabrication, anciennes écuries, se situent dans un très long bâtiment construit en brique et composé de trois corps au même droit. Ce bâtiment présente un rez-de-chaussée et un étage de comble couvert d'un toit à longs pans en ardoise. Les chaînes d'angles, les encadrements des baies, un cordon régnant sur l'ensemble de la façade, ainsi que le niveau de soubassement sont en pierre de taille en granite gris. Le corps de bâtiment central, percé d'arcades, est flanqué de deux corps latéraux percés chacun d'un triplet : une porte en plein cintre encadrée de fenêtres (également en plein cintre) surmontées d'une plate-bande.inscription par arrêté du 19 novembre 1992.","habitants":"général de la Riboisière\r\n        \"","divers":"A Louvigné-du-Désert le château de Montthorin,                                  gps 48° 28' 57\" nord, 1° 07' 23\" ouest","gps":"","images":["../image/image_35/35_Monthorin_1.jpg","../image/image_35/35_Monthorin_2.jpg"]},"Consult_chateau_formulaireae53":{"id":"Consult_chateau_formulaireae53","dept":"35","canton":"St-Malo","commune":"Pleurtuit","nom":"Montmarin_35","type":"Château","periode":"XVIII","histoire":"MONTMARIN, bien que construit  pour un malouin, Aaron-Pierre Magnon du Bosc, se démarque totalement de l'architecture des malouinières. Vendu en 1782 à Benjamin Dubois, armateur de Saint-Servan, qui transforme l'anse de Créhen, outre le charme de son site et de son implantation ce château qui s'apparente davantage à une \"folie\", est tout à fait remarquable par la qualité et l'originalité de son architecture, et ce, à plusieurs titres. L'allure générale du Montmarin, trois pavillons réunis entre eux par des ailes couvertes à l'origine en terrasse, le rattache plus aux folies construites autour de Paris qu'aux \"malouinières\" du Clos-Poulet. Il se peut que cette architecture dont le toit en carène est d'ailleurs étonnant autour de 1760, reprenne comme modèle l'ancien château du Colombier, construit à Paramé en 1715 et décrit à la Révolution comme \"un corps de bâtiment flanqué de deux pavillons en terrasse pavés de pierres plates et surmontés chacun d'un autre petit pavillon\". L'édifice présente aussi la particularité d'utiliser le bois dans le décor d'architecture, agrafe de la porte centrale, balustrades du toit. Dans la cour, sur les arcades des communs, les clefs de granite, en retrait, devaient également être recouvertes par des muscarons de bois sculpté. Le domaine est acquis en 1844 par le baron de Bréda et achat par Louis Bazin de Jessey qui le restaure et créa un parc romantique. Madame et monsieur de Ferrand descendants veille sur cet ensemble exceptionnel.","architecture":"MONTMARIN, construit en 1758  terminé en 1763. , en contrebas, au sud du château, en chantier naval avec bassin à flot. Importants travaux à la fin du XIXe siècle : le corps de logis est transformé du côté de la cour par l'extension des ailes de part et d'autre du corps central ; la distribution intérieure est modifiée, en particulier par la suppression de l'escalier principal dans le vestibule, suppression des allées séparant le corps de logis principal des pavillons, déplacement et reconstruction des escaliers latéraux.  D'abord l'ordonnancement de son élévation sur jardin, avec arcades, décalage de niveaux entre le corps de logis et les pavillons et contrastes de toitures, ensuite par l'association dans le gros oeuvre de matériaux comme le bois, employé pour les balustrades, à la base des toits ou certaines clefs d'arcs. Ajout dans la cour d'un bassin de marbre provenant de la Basse Flourie à Saint-Servan, construction d'une ligne d'arcades doublant le mur de la cour du côté du chemin et remontage à l'envers, d'un portail du XVIIe siècle, couvert d'un arc plein cintre. Transformation de la moitié inférieure du jardin en parc paysager à l'anglaise. Le corps de logis du château, entre une cour à l'ouest et un jardin en terrasse à l'est, descend vers la Rance. Couverture composée d'un assemblage complexe de différentes toitures : toits en pavillon  à l'impériale accolés sur le corps central, toit brisé sur les extrémités du logis, toits à longs pans de faible pente jumelés couvrant les ailes avec chêneau intermédiaire. Sur le jardin, frontons sur les trois pavillons et arcades dans le rez-de-chaussée des ailes. Communs de part et d'autre de la cour, constitués de rangs d'arcades. Portail du côté ouest de la cour avec alignement d'arcades de part et d'autre.  Pavillons en rez-de-chaussée au deux extrémités de la terrasse bordant la Rance. Classement par arrêté du 2 mai 1995.","habitants":"Aaron-Pierre Magnon du Bosc\r\n        \"","divers":"Pleurtuit le château de Montmarin                                                              GPS : 48° 17' 36,32\" Nord 2° 01' 41,64\" Ouest","gps":"48° 17' 36,32\" Nord 2° 01' 41,64\" Ouest","images":["../image/image_35/35_Montmarin_35_1.jpg","../image/image_35/35_Montmarin_35_2.jpg","../image/image_35/35_Montmarin_35_3.jpg"]},"Consult_chateau_formulaireded0":{"id":"Consult_chateau_formulaireded0","dept":"35","canton":"Val-Couesnon","commune":"Romazy","nom":"Montmoron","type":"Château","periode":"XII-XV-XVII","histoire":"MONTMORON, cité dès le milieu du XIIe siècle comme le  fief de Guillaume l'Angevin, Montmoron passa par alliance à la famille de Sévigné à la fin du XVIe siècle, puis en 1695 à la famille du Hallay qui l'avait encore en 1789. L'ancien manoir possédait un droit de haute justice ; il fut érigé en comté en 1657. L'histoire du site est complexe et peu documentée cependant les éléments conservés sur place permettent d'avancer quelques hypothèses. Les vestiges les plus anciens (XVIe siècle), situés au niveau du corps de logis ouest et visibles sur la cour (façade est) sont très probablement ceux de l'ancien manoir ; ce corps de bâtiment conserve des vestiges de portes anciennes et une grande baie surmontée d'une accolade ; partiellement détruit, il a été reconstruit et remanié, en particulier au niveau supérieur, par le percement de baies au XIXe siècle. Il devait être prolongé vers le nord, par un corps de bâtiment bas,  des dépendances, lequel a été rehaussé postérieurement. Au nord, un logis placé en retour d'équerre conserve des éléments de la fin du XVIe siècle ou du début du XVIIe siècle ; il est flanqué, à l'arrière, par un autre logis datant du XVIIIe siècle (linteau cintré en bois) et transformé au XIXe siècle. Le corps de logis Est (à droite de la cour) est plus difficile à interpréter ;  à cet emplacement, trois parcelles différentes et un corps de bâtiment en ruine au sud-est, les élévations indiquent la présence de bâtiments anciens très lourdement remaniés, tant sur la façade ouest avec la reprise de toutes les ouvertures et des décalages de niveaux, que sur la façade Est où les baies ont pour la plupart été percées au XIXe siècle.","architecture":"MONTMORON,  par ailleurs, les quatre souches de cheminées et la toiture brisée datent également du milieu du XIXe siècle. Cet ensemble a pu correspondre aux communs d'un château construit au cours de la première moitié du XVIIe siècle, disparu avant la Révolution et dont on ignore l'emplacement. La conservation du mur de clôture du jardin, d'un rare bassin polygonal (1625) placé au centre de celui-ci et alimenté par un système hydraulique et d'une remarquable chapelle datée des années 1630, permet de supposer qu'un corps de logis contemporain et de même qualité architecturale ait été édifié à cette période faste de l'histoire de la seigneurie. Acheté comme bien national à la Révolution, le château de Montmoron a alors été divisé en deux propriétés séparées par la cour. Tandis que les bâtiments Est sont transformés en un agréable logis au cours du XIXe siècle, il faut attendre les années 1900 pour que d'importants travaux soit entrepris dans le corps ouest. Le logis est alors agrandi vers l'ouest par la construction d'un bâtiment de style \"châlet\" conforme au goût de l'architecture de villégiature de l'époque. Les abords du château sont modernisés avec la construction d'une conciergerie à l'ouest de la chapelle, d'un portail d'entrée et d'un pigeonnier. Hormis une remarquable chapelle et un bassin, rien ne subsiste de l'ancien château de Montmoron, ruiné avant la Révolution. Les bâtiments existants témoignent des aménagements successifs du site depuis le XVIe siècle jusqu'au début du XXe siècle et de l'aménagement, au milieu du XIXe siècle, d'un nouveau corps de logis à l'est.","habitants":"famille du Hallay \r\n        \"","divers":"A Romazy le château de Montmoron                                               gps 48° 22' 34\" nord, 1° 29' 45\" ouest","gps":"","images":["../image/image_35/35_Montmoron_1.jpg","../image/image_35/35_Montmoron_2.jpg","../image/image_35/35_Montmoron_3.jpg"]},"Consult_chateau_formulairecc2c":{"id":"Consult_chateau_formulairecc2c","dept":"35","canton":"Combourg","commune":"Les Iffs","nom":"Montmuran","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux  aux Iffs  Montmuran et la Boulaye.                          MONTMURAN, son propriétaire initial était Donoal de Tinténiac. Le château de Montmuran était le château des Seigneurs de Tinténiac.  Après sa mort passe à sa fille Isabelle qui épouse Jean de Laval, puis a sa petite fille jeanne que  Bertrand Du Guesclin épousera en 1373, restée veuve sans enfants de Duguesclin Jeanne se remarie avec son cousin Guy XII de Laval baron de Vitré jusqu'en 1547,   date à laquelle Charlotte de Laval de Montmorency  unique héritière  épouse  Gaspard  de Coligny grand amiral de France. En 1665 Henri de Coëtquen un parent des Coligny fait élevé la partie centrale du château, Echu par héritage à la marquise de Mornay- Montchevreuil vendu en 1750 aux la Motte qui le conserve jusqu'à la Révolution et sera vendu comme bien national en 1795 sera vendu par la famille Bizien  reste dans la descendance jusqu'en 1889 et acquis  par la famille de Villéon  dont le comte de Villéon propriétaire qui ouvre le château à la visite.","architecture":"BOULAYE, le manoir de la Boulaye est une gentilhommière construite en 1554 et modifiée au XVIIe siècle, bâtie au début du XVIe siècle, puis modifiée au XVIIe dans sa partie supérieure. L'édifice se compose d'un corps de bâtiment avec une façade nord percée de petites baies et ornée d'une bretèche en pan de bois. La façade sud présente, au rez-de-chaussée, deux portes en plein cintre, deux fenêtres rectangulaires et une meurtrière. A l'étage, se touve une corniche à consoles et deux lucarnes à frontons arrondis, des pilastres et des coquilles datant du XVIIe siècle. Epi de faîte en terre cuite du XVIIe siècle. A la Révolution, la gentilhommière est utilisée comme ferme. Le manoir de la Boulaye se trouve au Nord du Centre du département et au Nord du bourg des Iffs, le long de la route de Tinténiac. Le Manoir de la Boulaye est inscrit aux M.H. depuis le 4/12/1968.                                                                                                        MONTMURAN, deux tours massives pourvues d'un toit en forme de cône qui flanquent encore aujourd'hui  la façade principale au nord, quoique remaniées ultérieurement, subsistent encore de cette construction. L'une d'entre elles a conservé de remarquables étuves du XIVe siècle. Le châtelet a été reconstruit au XVe siècle, ainsi que la chapelle qui lui est accolée. Après l'abandon du parti défensif au XVIIe siècle, le corps de bâtiment qui s'étend entre les tours et le châtelet, fut construit au XVIIIe siècle. Il a été en partie reconstruit au XIXe siècle, après un incendie. Éléments protégés MH : les communs, à l'exclusion des parties classées ; l'allée, la cour verte, le petit mail de tilleuls : inscription par arrêté du 26 septembre 2000. : classement par arrêté du 17 septembre 2003.","habitants":"Montmuran ; Famille Bizien\r\n        \"","divers":"Deux châteaux  aux Iffs  Montmuran grav 1-2-3-4-5-6 et la Boulaye grav-7.                                                                                       Montmuran GPS : 48° 17' 36\" Nord, 1° 51' 40\" Ouest                                       Boulaye PS : 48° 17' 44,16\" Nord, 1° 51' 47,88\" Ouest","gps":"48° 17' 36\" Nord, 1° 51' 40\" Ouest","images":["../image/image_35/35_Montmuran_1.jpg","../image/image_35/35_Montmuran_2.jpg","../image/image_35/35_Montmuran_3.jpg","../image/image_35/35_Montmuran_4.jpg","../image/image_35/35_Montmuran_5.jpg","../image/image_35/35_Montmuran_6.jpg","../image/image_35/35_Montmuran_7.jpg"]},"Consult_chateau_formulaireb95f":{"id":"Consult_chateau_formulaireb95f","dept":"35","canton":"Le Rheu","commune":"Mordelles","nom":"Mordelles","type":"Château","periode":"XVIII-XIX","histoire":"deux châteaux dans cet article à Mordelles;  Artois et Haichois.                                                                                                                 La HAICHOIS, sur le site ancien d'un édifice détruit, un château neuf est construit en 1888 pour le comte de Toulouse-Lautrec et son épouse, Emilie de la Haichois. L'architecte et décorateur réalise en particulier l'intégration de  Jean-Marie Huchet, entrepreneur à Rennes, est chargé des travaux. Le colombier de même époque est conservé au sud du château. Les écuries sont construites peu avant le château ; le parc à l'anglaise, la ferme et un potager clos de murs de terre sont également entrepris à cette période. Le château est implanté dans un parc paysager, au nord-ouest d'un étang. L'édifice présente un plan allongé et massé ; le corps principal est flanqué de plusieurs pavillons saillants sur la façade principale, d'un avant-corps polygonal sur la façade sud et d'une tour circulaire à l'est. Le bâtiment comprend un étage de soubassement avec cour à l'anglaise à l'Est, un rez-de-chaussée surélevé, un étage carré et un étage de comble. Le gros oeuvre est en pierre de taille : granite pour le niveau de soubassement, calcaire avec bandeaux en brique pour l'élévation. Les encadrements de baies font alterner calcaire et brique. La toiture est brisée. Importantes écuries dans un corps de bâtiments de plan en U, corps central surmonté d'un fronton triangulaire et deux ailes perpendiculaires abritant des box. inscription par arrêté du 4 juin 2007.","architecture":"ARTOIS, vastes construction flanquée de deux pavillons saillants situé face  à un étang, le domaine est implanté dans un environnement encore agricole et très préservé. Resté confidentiel, bien que documenté par les érudits des XIXe et XXe siècles, il se compose dun logis classique et de dépendances construits à la fin du XVIIe siècle à la place de l'ancien manoir de la rivière d'Artois, complétés par une orangerie bâtie limite XVIIIe, XIXe siècle, une chapelle, des douves ainsi quun moulin.  propriété du comte Arthur du Marais.                                                                                Éléments protégés MH : l'ensemble du domaine comprenant : le logis et le bâtiment des communs en retour ; la chapelle Sainte-Christine ; l'ancien moulin ; les communs à l'ouest du château ; l'orangerie ; les murs d'enceinte ; les douves ; la motte castrale située sur la commune de Talensac et le sol d'assiette : inscription par arrêté du 21 mai 2014.                                                         CHESNAYES   On aperçoit près du bourg, sur la route de l'Hermitage, un charmant château moderne, flanqué de deux tourelles. C'est la demeure de M. de Farcy, maire de Mordelles, conseiller général du canton. L'édifice peut stylistiquement être daté de la deuxième moitié du XIXe siècle, plus probablement du troisième quart. Il est à rapprocher des châteaux construits par Jacques Mellet dans les années 1860. Il a été construit sur le site d'un ancien manoir dont les ruines sont identifiables au sud du château.  Édifice de plan massé, symétrique, dont le corps central est flanqué de deux pavillons rectangulaires au nord et de deux tours circulaires couvertes en poivrièvre au sud. Un corps de logis rectangulaire, couvert en terrasse, flanque le corps principal à l'ouest, la toiture centrale est surmontée d'un lanternon. L'ornementation sculptée s'inspire du répertoire décoratif de la première Renaissance.","habitants":"Haichois ; comte de Toulouse-Lautrec                                           Artois ;   comte Arthur du Marais\r\n        \"","divers":"Trois  châteaux dans cet article à Mordelles;  Artois grav-1 et Haichois grav 2-3.                                                                                  Artois GPS : 48° 04' 47\" Nord, 1° 53' 14\" Ouest    Chesnayes","gps":"48° 04' 47\" Nord, 1° 53' 14\" Ouest    Chesnayes","images":["../image/image_35/35_Mordelles_1.jpg","../image/image_35/35_Mordelles_2.jpg","../image/image_35/35_Mordelles_3.jpg"]},"Consult_chateau_formulairedf1f-2":{"id":"Consult_chateau_formulairedf1f-2","dept":"35","canton":"Le Rheu","commune":"Mordelles","nom":"Mordelles_II","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux dans cet article ; Beaumont, . la Ville du Bois.                                                                                                                                                                                       VILLE du BOIS; siège d'une seigneurie de haute justice au Moyen Age qui passa entre la fin du XIVe siècle et le milieu du XVIIe siècle par alliance et succession aux mains de plusieurs familles. La famille Huchet seigneurs de Pléhédel la vendirent à la famille de Farcy en 1647. C'est cette même famille qui le possède encore . Ancienne famille Huguenote et originaire de Normandie, elle sest implanté dès le XVIIe siècle, par ses différentes branches (Pontfarcy, Villedubois, Saint-Laurent, Cuillé, Roseray), dans l'ouest de la France. Le château, siège de la branche de la Villedubois au sein de la famille de Farcy.  est constitué d'un ensemble de bâtiments, construits pour l'essentiel aux XVIIe et XVIIIe siècles. Le corps de logis principal se présente sous la forme d'un long bâtiment dapparence homogène mais qui relève de l'unification au XIXe siècle de plusieurs parties édifiées entre le Moyen Age et le XVIIe siècle. Le cadastre napoléonien de 1829 indique que ce grand corps de logis rectangulaire était autrefois flanqué de deux ailles perpendiculaires. L'ensemble délimitait une cour principale ouverte vers le nord, elle-même précédée d'une avant-cour bordée de dépendances, de deux pavillons d'entrée et d'un colombier. L'aile ouest est alors amputée d'une partie de ses bâtiments et de nouveaux communs en terre sont construits à l'emplacement de l'ancienne aile orientale du château. A cela s'ajoute la construction de nouvelles dépendances agricoles à l'ouest du château autour d'une basse-cour. Au tournant des XIXe et XXe siècles, un pavillon est construit d'après les plans de l'architecte rennais Frédéric Jobbé-Duval à l'articulation du logis et de l'aile orientale transformée en communs.","architecture":"BEAUMONT, castrale qui a conservé une bonne lisibilité de la majorité de ses structures d'origine. La motte et ses fossés existent encore et les levées de terre entourant la basse-cour principale, l'étang et les anciennes douves réaménagées par la suite. A la fin du XVe siècle, l'ensemble se composait de la motte, d'un château (maison forte, manoir) d'une chapelle (qui existe toujours) édifiés dans la grande basse-cour et de douves. Le château en ruine dès le début du XVIIe siècle, fut remplacé en 1686 par un nouveau corps de logis, élevé à la moderne et complété au XVIIIe siècle par deux pavillons, au XIXe siècle par des communs et une serre. Les levées de terre ont été plantées de charmille et les douves ont servi à l'implantation d'un réseau hydraulique. Le corps de logis, constitué d'un corps central flanqué de deux pavillons demi-hors oeuvre, a conservé son élévation et ses toitures d'origine à l'exclusion des lucarnes postérieures. L'intérieur, en revanche, a été modifié au XIXe siècle, mais a conservé en place le très bel escalier d'origine.Inscription aux M.H. par arrêté du 20 mars 1995.  Le corps de logis moderne est disposé à l'emplacement d'un château plus ancien. Le bâtiment principal du château date de 1686. La chapelle était déjà présente à la fin du XIVe siècle. Deux pavillons furent rajoutés au XVIIIe siècle., a été inscrit aux M.H. le 20/03/1995.","habitants":"Beaumont,  Chesnayes et                                                                                    Ville du -Bois ;Famille de Farcy\r\n        \"","divers":"Trois châteaux dans cet article ; Beaumont grav-1, la Chesnaye grav 2-3. la Ville du Bois grav-4-5-6.                      Beaumont  GPS : 48° 04' 52\" Nord, 1° 48' 32\" Ouest                                            Haichois GPS : 48° 04' 27\" Nord, 1° 49' 25\" Ouest                                                                       Villedubois GPS : 48° 05' 32\" Nord, 1° 50' 40\" Ouest","gps":"48° 04' 52\" Nord, 1° 48' 32\" Ouest","images":["../image/image_35/35_Mordelles_II_1.jpg","../image/image_35/35_Mordelles_II_2.jpg","../image/image_35/35_Mordelles_II_3.jpg","../image/image_35/35_Mordelles_II_4.jpg","../image/image_35/35_Mordelles_II_5.jpg","../image/image_35/35_Mordelles_II_6.jpg"]},"Consult_chateau_formulaire0205":{"id":"Consult_chateau_formulaire0205","dept":"35","canton":"Guichen","commune":"Baulon","nom":"Musse_Baulon","type":"Manoir","periode":"XVIII-XIX","histoire":"La MUSSE, un château neuf est construit au milieu du XIXe siècle sur un promontoire, au centre d'une pelouse dominant un étang, à l'ouest des vestiges de l'ancien château datant du XVIIe siècle, de ce dernier ne sont conservés qu'un pavillon du logis et des dépendances. La demeure actuelle est une habitation moderne entourée de nombreuses allées, plantées de pins gigantesques, qui se dirigent en tous sens dans le bois solitaire, baigné par le ruisseau du Canut. La propriété appartient à M. d'Armaillé à la fin du XIXe siècle. Plan rectangulaire, cinq travées. Murs en maçonnerie enduite, encadrements de baies, chaînes d'angle en pierre de taille de schiste pourpre, encadrement de la porte d'entrée, bandeaux horizontaux et fronton en pierre de taille de tufeau, les trois travées centrales sont surmontées d'un fronton pignon en arc cintré avec les armoiries de la famille sur la façade antérieure, et d'un fronton triangulaire du côté de l'étang. Toiture à croupe.","architecture":"GRANDE MUSSE du XIXe siècle, édifié par les descendants des propriétaires de l'ancien château de La Musse. On y trouve un colombier qui date du XVe siècle et restauré au XIXe siècle. L'ancien château comprenait au XVIIIe siècle trois cours réunies par des pont-levis et une chapelle privée, et une  chapelle priorale Saint-Jacques de la Musse, dans laquelle, en 1607, Jean du Bec, évêque de Saint-Malo, tint sur les fonts baptismaux un enfant du seigneur de la Musse, n'est plus qu'une ruine à la fin du XIXe siècle (Pouillé de Rennes). La Musse possédait jadis un droit de justice exercé au bourg de Baulon. La Musse est unie à la seigneurie de Beaumont en Mordelles et érigée en Comté en 1621 sous le nom de Bruslon. La seigneurie de la Musse est donnée en partage en 1408 par Jean de Rougé sire de Derval à sa soeur Jeanne, épouse d'Armel de Châteaugiron. Elle passe ensuite entre les mains des seigneurs de Malestroit seigneurs de Combourg, Bruslon (en 1502), Grignart seigneurs de Champsavoy (vers 1730 et en 1789) ;  La seigneurie de la Musse,  passa en 1401 dans la maison de Brullon, dans tous les membres furent célèbres à divers titres. L'un d'eux, Yves Brullon, fut créé chevalier banneret par Pierre II, en 1455, et son fils, ambassadeur et procureur de la duchesse Anne, fut député par elle à Charles VIII pour régler les conditions de leur mariage. Le fils de ce dernier, du nom d'Yves comme son père et son aïeul, porta un des bâtons du poële sous lequel fut reçu le dauphin-duc, fils de François Ier, lors de son entrée solennelle à Rennes, le 12 août 1532. Enfin Pierre Brullon, chevalier des ordres du roi, introducteur des ambassadeurs, mourut au château de la Musse, le 24 janvier 1594 et fut inhumé à Rennes le 25 février suivant, dans la chapelle Saint-François. En 1621, la seigneurie de la Musse fut érigée en comté, en faveur d'un colonel de Brullon.","habitants":"M. d'Armaillé\r\n        \"","divers":"A baulon le château  de la Musse ou de la Grande Musse    gps 47° 59' 10\" nord, 1° 55' 50\" ouest","gps":"","images":["../image/image_35/35_Musse_Baulon_1.jpg","../image/image_35/35_Musse_Baulon_2.jpg"]},"Consult_chateau_formulaireff18":{"id":"Consult_chateau_formulaireff18","dept":"35","canton":"Janzé","commune":"Nouvoitou","nom":"Nouvoitou","type":"Château","periode":"Xiii-XV","histoire":"Deux châteaux dans cet article; Gd-Corcé, Escosel et la Porte.                                                                                     ECLOSEL  le bourg, de type village ecclésial, a été établi sur une crête à 60 mètres au dessus du niveau de la mer. Une ancienne voie romaine menant de Rennes à Angers passait à 500 mètres au Nord-est du bourg. La paroisse de Nouvoitou est attestée dès le XIIIe siècle, son nom viendrait du latin, Novus estocus signifiant \"nouvelle tige\". Ancienne commune rurale ayant gardé une trame végétale bocagère : nombreux chemins creux bordés de chênes émondés et comprenant de nombreux vergers. La seigneurie de l'Eclozel avait un droit de moyenne justice. Le premier seigneur attesté est en 1552 Christophe de Keradreux, seigneur de la Motte de Beaucé. Appartenant à François le Provost abbé du Tronchet en 1598 et à Jean Poisson, seigneur de la Meslé en 1603, la seigneurie de l'Eclozel devient ensuite la propriété de la famille Malescot jusqu'en 1748, date à laquelle elle est vendue à Jacques Pépin, seigneur de Martigné. L'édifice est cédé en 1784 à René-Jacques Le Prestre de Châteaugiron. L'Eclosel appartient en 1808 à Pierre Loisel, juge à Rennes. L'ancien manoir semble avoir disparu depuis très longtemps. La \"métairie noble et dépendances nommé Le Clozel\" étaient affermées en 1757 à Jacques Prioul. Le château actuel de l'Eclosel a été bâti semble-t-il vers 1904.","architecture":"La PORTE, Une partie du jardin du manoir fut vendue au XIXe siècle. Les nouveaux propriétaires y bâtirent un grand château de type XVIIe siècle, associant logis et pavillons d'angle. L'architecture classique est évoqué toutefois non sans extravagance propre au style éclectique, voire pastiche, de l'époque: outre le jeu de la polychromie très \"Belle Epoque\" de la pierre blanche avec la brique rose, le château de la Porte montre une façade postérieure très étonnante, où la tour accolée à un pavillon d'angle, apparaît presque incongrue.","habitants":"Esclosel, Famille Malescot\r\n        \"","divers":"Deux châteaux à Nouvoitou; Eclosel Grand grav-1-2-3-4    Corcé grav-5 et la Porte grav-6-7.                                                    gps 48° 02' 26\" nord, 1° 32' 45\"  ouest","gps":"","images":["../image/image_35/35_Nouvoitou_1.jpg","../image/image_35/35_Nouvoitou_2.jpg","../image/image_35/35_Nouvoitou_3.jpg","../image/image_35/35_Nouvoitou_4.jpg","../image/image_35/35_Nouvoitou_5.jpg","../image/image_35/35_Nouvoitou_6.jpg","../image/image_35/35_Nouvoitou_7.jpg"]},"Consult_chateau_formulaireba11":{"id":"Consult_chateau_formulaireba11","dept":"35","canton":"Châteaugiron","commune":"Noyal-sur-Vilaine,","nom":"Noyal_sur_Vilaine","type":"Château","periode":"XIV-XV","histoire":"deux châteaux à Noyal sur Vilaine; Bois-Orcan et la Motte.                 BOIS-ORCAN   ce joyau de larchitecture du XVe siècle a été élevé par Julien Thierry, argentier dAnne de Bretagne. Avec sa salle basse remarquable, ses élégantes cheminées et ses plafonds finement ouvragés, le Bois-Orcan atteste de la réussite familiale des Thierry. Résidence seigneuriale raffinée qui offre une rare collection de meubles et dobjets médiévaux. Contigu à la douve du château, le jardin a retrouvé sa facture médiévale grâce au paysagiste Alain Richert. La beauté particulière de ce jardin se distingue par sa composition en trois parties qui offrent un rare plaisir olfactif et visuel : la Cour damour, la Fontaine de vie et le Jardin de curiosités. Le domaine présente lAthanor, luvre dEtienne-Martin, sculpteur français de réputation internationale. Le musée intérieur accueille ses bois ainsi que d'autres sculptures originales. Le musée extérieur, un parc spécialement conçu avec lartiste, met en valeur ses sculptures monumentales en bronze sur un site de trois hectares.  Orienté au sud, le logis présente deux corps de bâtiment qui forment un plan en T. Le premier, un long corps de logis rectangulaire, borde la cour. Le deuxième, de plan presque carré, est greffé sur la face postérieure. A la jonction des deux, se dresse une tour d´escalier polygonale. Le pignon oriental du corps principal est flanqué de deux tours circulaires. La partie Est du logis est en rez-de-chaussée surélevé. La partie principale du logis possède un étage surmonté d'un étage de comble.Éléments protégés MH : le manoir,  classement par arrêté du 10 septembre 1987 : inscription par arrêté du 17 octobre 1994.","architecture":"La MOTTE, c'est au lieu-dit de la Motte qu'était l'ancienne maison seigneuriale de Noyal. Un aveu de 1747 signale que le Manoir de Noyal était \"près du cimetière de l'église paroissiale\", à côté de l'ancienne motte féodale. Au XIe siècle, le seigneur a reçu l'autorisation du comte Eudes (frère du duc Alain) d'édifier un château. En 1350, la Seigneurie appartint à Goeffroy de Chevaigné puis, à son fils en 1397. Au XVe siècle, elle passe par alliance à Armel de Châteaugiron (seigneur de Saint-Jean-de-Laillé), par alliance aux de Saint-Amadour (seigneurs de Tizé) qui l'avait en 1433. Puis, elle repasse à ces derniers (en Thorigné) en 1789. Ayant émigré, les biens de Kéroignant de Trésel, Seigneur de Tizé, dont les biens furent confisqués comme biens nationaux. À cette époque, la motte féodale avait déjà disparu. La Seigneurie possédait un droit de justice et un droit de quintaine au Chaussix (qui a le sens de chaussée et de four à chaux). Le Manoir de la Motte a été restauré, en 2003, faisant disparaitre le cellier en appentis et reliant le Manoir de la Motte au Prieuré, l'ensemble formant le Centre Culturel appelé L'Intervalle.","habitants":"Bois-Orcan;Julien Thierry,                                                                      La Motte; \r\n        \r\n        \"","divers":"deux châteaux à Noyal sur Vilaine; Bois-Orcan- grav-1-2-3 et la Motte grav-4.                                                                                 Bois orcan  GPS : 48° 06' 45\" Nord 1° 31' 24\" Ouest                                                  La motte GPS : 48° 06' 45\" Nord 1° 31' 24\" Ouest","gps":"48° 06' 45\" Nord 1° 31' 24\" Ouest","images":["../image/image_35/35_Noyal_sur_Vilaine_1.jpg","../image/image_35/35_Noyal_sur_Vilaine_2.jpg","../image/image_35/35_Noyal_sur_Vilaine_3.jpg","../image/image_35/35_Noyal_sur_Vilaine_4.jpg"]},"Consult_chateau_formulaire6c5a":{"id":"Consult_chateau_formulaire6c5a","dept":"35","canton":"Janzé","commune":"Orgères","nom":"Orgères","type":"Château","periode":"XVII-XIX","histoire":"ORGERES, au XIIe siècle, le château appartenait aux seigneurs d'Orgères, puis en 1460, il est vendu à Jean Bouëdrier. De nombreuses familles différentes en furent propriétaires au fil des siècles : les de Bourgneuf, marquis de Cucé en Cesson-Sévigné (fin XVe-début XVIe siècle), les d'Argentré (fin XVIIe siècle), les de Bonnescuelle (deuxième moitié du XVIIIe siècle). En 1807, le château est vendu par la famille de Bonnescuelle à Pierre Aubert de Trégomain, baron et maire d' Orgères. Il est peut-être le commanditaire de la surélévation de la partie Est du château. Puis, en 1830, le château est à nouveau vendu à Aimé Huchet, vicomte de Cintré. En 1900, Paul Garnier, comte de la Villesbret achète le château ; il est aujourd'hui la propriété de l'un de ses descendants. Les initiales qui surmontent la grille d'entrée dans la cour du château sont celles de Henri de Bourgneuf, marquis de Cucé et baron d'Orgères et de son épouse Calliope d'Argentré, propriétaires du lieu au milieu du XVIIe siècle. La construction du château pourrait d'ailleurs être attribuée à la famille de Bourgneuf et notamment à Henri de Bourgneuf, propriétaire du lieu entre 1621 et 1681. D'après Jules Louail, le pont-levis qui franchissait les douves avait déjà disparu au cours de la première moitié du XIXe siècle. Il avait été remplacé par un pont à deux arcs. Incendié au début du XIXe siècle, Vers 1900, Paul Garnier, comte de la Villesbret, qui vient d'acquérir le château auprès de Ludovic Huchet, vicomte de Cintré, fait construire les deux pavillons qui surmontent la partie centrale du bâtiment. Ainsi, avant cette transformation de la partie centrale, la partie ouest de la construction avait conservé son aspect du début du XVIIe siècle .","architecture":"ORGERES, est composé de deux bâtiments de hauteurs inégales  a partie la moins élevée correspond aux vestiges du château primitif. Les deux pavillons, qui se trouvent au nord, sont également des vestiges du château de la première moitié du XVIIe siècle, toiture à croupes, corniche à modillons, lucarnes surmontées de frontons semi-circulaires. La partie Est avait, quant à elle, été surélevée, et la partie centrale, réservée à l'escalier, était surmontée d'un fronton triangulaire dans lequel se trouvait un oculus. Ce type de fronton évoque le style architectural néo-classique, très fréquent au début du XIXe siècle, qui fait référence aux éléments de l'architecture antique gréco-romaine. Ceci corrobore la thèse d'un incendie, intervenu au début du XIXe siècle, et qui aurait imposé cette reprise du bâtiment dans les premières décennies du XIXe siècle. Chaque niveau est composé de quatre pièces principales, en enfilade, desservies par un couloir longeant le mur gouttereau nord de la construction. Un escalier central, en bois à balustres en fer forgé, dessert les différents niveaux de la construction. Le rez-de-chaussée surélevé était originellement composé, d'est en ouest, d'un salon, d'une salle à manger, de l'escalier en partie centrale, puis d'une chambre et d'un petit salon. Le premier étage était composé de quatre chambres. Sous le comble, en partie est, partie la plus haute de la construction, se trouvaient des chambres destinées aux domestiques. Un petit bâtiment en brique et pierre calcaire, situé au nord-ouest du bâtiment, abritait d'ailleurs des latrines qui leur étaient destinées d'après la tradition orale. Le château est construit sur une plateforme, entourée de douves. Cette plateforme était autrefois accessible grâce à un pont-levis qui enjambait les douves. Deux pavillons Louis XIII (début du XVIIe siècle) se trouvent aux angles de ce quadrilatère formé par les douves.","habitants":"famille de Bonnescuelle\"","divers":"deux châteaux à Orgères dont Orgères et Reussel pas d'information pour ce dernier           Gps 47° 59' 56? nord, 1° 40' 06? ouest","gps":"","images":["../image/image_35/35_Org%c3%a8res_1.jpg","../image/image_35/35_Org%c3%a8res_2.jpg","../image/image_35/35_Org%c3%a8res_3.jpg"]},"Consult_chateau_formulaire166e":{"id":"Consult_chateau_formulaire166e","dept":"35","canton":"Dol-de-Bretagne","commune":"Epiniac","nom":"Ormes","type":"Château","periode":"XIV-XVI-XVIII","histoire":"deux châteaux dans cet article ; les Ormes et Vilhoet.                                      Des ORMES, vestige d'un grand logis remanié, étiré du nord au sud et pouvant dater du XIVe siècle. Dans sa partie nord, l'ancienne grande salle synodale, actuellement chapelle, avec deux grandes fenêtres, une porte en arc brisé et le plafond, datables de la seconde moitié du XVe siècle. A la fin du XVIe siècle, construction d'un haut pavillon à deux étages à l'extrémité sud du logis, sous l'évêque Charles d'Épinay.    Sa partie architecturale qui ne peut être comparé aux réalisations des environs de Rennes, ne trouve d'équivalent que dans celui du château de Torigny, construit à la même époque dans le Cotentin par Jean-François Gabriel. Propriété de monsieur Houitte de la Chesnaie.                                                                                     VILHOET, ce petit château a été construit vers 1720 près du village de Saint-Léonard, par la famille Le Saige de La Villebrune, en contrehaut de l'ancien manoir de la Corbonnais que cette dernière possédait déjà.","architecture":"ORMES, vers 1780, construction d'un 2éme pavillon à l'extrémité nord, et suppression probable de la tour d'escalier de la façade antérieure. A la même époque, modification des accès, démolition de communs au bord de l'étang. Construction de nouvelles écuries d'est en ouest à partir de l'ancien pavillon du jardinier avec grand corps de ferme, dans une cour arrière, au nord. Au début du XIXe siècle, construction d'un moulin à vent avec salles souterraines au nord-est du château (date portée 1818, lecture incertaine). Au début du XXe siècle, importants travaux sur le corps de logis central : reconstruction d'une portion de façade, création de lucarnes et de souches de cheminées. Vers 1980, remploi de deux grilles d'entrée provenant des environs de Dol. Le pavillon des Ormes est un exemple unique en Bretagne de transcription quasi littérale du style brique et pierre en vogue sur les chantiers royaux des années 1580-90.                                                                                                                          VILHOET. l'architecture, très sobre du logis, est fortement marquée par le style des malouinières : haut toit d'ardoise à croupes et faux pavillons, souches de cheminées contreventées, baies entourées par de simples bandeaux qui se détachaient à l'origine sur un enduit à la chaux. L'avant-corps en hémicycle, côté jardin, est très caractéristique, il abrite depuis l'origine une grande salle à manger, autre élément emprunté aux malouinières. L'environnement de l'édifice a peu changé du côté de l'entrée. Un saut-de-loup en fer à cheval vient rejoindre deux ailes de communs disposées légèrement à l'oblique pour accentuer l'effet de perspective. Par contre, l'espace de la cour était à l'origine séparé de celui du jardin qui lui-même était clos de murs.  A l'est du logis, une allée pavée conduisait à un étang servant d'abreuvoir pour les chevaux.","habitants":"Ormes ; monsieur Houitte de la Chesnaie                               Vilhoet; famille Le Saige de La Villebrune\r\n        \"","divers":"deux châteaux dans cet article ; les Ormes grav-1-2-3-4 et Vilhoet grav-5.  gps 48° 30' 36\" nord, 1° 41' 46\" ouest","gps":"","images":["../image/image_35/35_Ormes_1.jpg","../image/image_35/35_Ormes_2.jpg","../image/image_35/35_Ormes_3.jpg","../image/image_35/35_Ormes_4.jpg","../image/image_35/35_Ormes_5.jpg"]},"Consult_chateau_formulaire906f":{"id":"Consult_chateau_formulaire906f","dept":"35","canton":"Montfort-sur-Meu","commune":"Paimpont","nom":"Paimpont","type":"Château","periode":"XIX-XX","histoire":"Trois châteaux à Paimpont; Broceliande-Forges, Comper  et Pas du Houx et manoir du Tertre.                                                                                                        BROCELIANDE, date de 1910 à 1914, pour Joseph Guillet de la Brosse, par l'architecte nantais René Ménard. Allié à la Famille Levesque par sa soeur Marie (épouse de Louis Levesque), Joseph Guillet avait acheté à cette dernière une partie du domaine de Paimpont en 1908, en même temps que sa soeur, Cécile, épouse de Le Chauve Devigny, qui fit construire le Pas du Houx. Le château de Brocéliande est un château de villégiature implanté au centre d'un domaine de chasse. Ce château doit son originalité à la qualité de sa réalisation exceptionnelle. Le château de Brocéliande est privé.                                                                                                    Des FORGES, construit en 1889-1890 pour Donatien-Rogatien Levesque (1842-1908) par l'architecte nantais Lenoir. Le maître d'ouvrage est un fils cadet de Louis Auguste Levesque, armateur nantais, qui avait acheté en 1875 la forêt et les forges de Paimpont. le château du Pavillon domine le site industriel duquel il matérialisé l'autorité, il est à la fois un des rares châteaux industriels de Bretagne et un des exemples d'architecture de style XVIIIe siècle peu représenté à cette période.  Bâtiment de plan régulier à cinq travées en façade, les trois travées centrales de la façade antérieure sont encadrées de deux légères saillies prolongées au niveau du rez-de-chaussée par deux corps de logis couverts en terrasse. Ces derniers encadrent un perron à double volée convergente surmonté d'une marquise. Le bâtiment comporte un étage de soubassement, un rez-de-chaussée surélevé, un étage carré et un étage de comble.                                                                         Manoir Du TERTRE du XVII  Geneviève Zaeppfel, hôtel restaurant.","architecture":"COMPER, à l'origine château fort médiéval profitant d'une position stratégique enviable grâce à la protection offerte par le vaste étang et la forêt qui l'entourent, il a connu diverses destructions et reconstructions au fil de son histoire. Il passe aux mains des barons de Gaël-Montfort, des Laval, des Rieux, des Coligny et des La Trémoille. Démantelé en 1598 sur ordre d'Henri IV, il est incendié durant la Révolution française. Il reste peu de traces de ses parties féodales, le manoir de style Renaissance ayant été reconstruit comme lieu d'habitation au XIXe siècle. Il est le seul des cinq châteaux historiquement liés à la forêt de Paimpont subsistant à ce jour. Plusieurs légendes en font le lieu de naissance et de résidence de la fée Viviane. Il abrite les expositions du Centre de l'imaginaire arthurien depuis 1990. Il fait lobjet dune inscription au titre des M.H. depuis juin 1996.                                                                                                                          PAS-DU-HOUX, est construit en 1910 pour Cécile Guillet de la Brosse, épouse d'Augustin Le Chauve Devigny, par l'architecte nantais René Ménard. Cécile de la Brosse, soeur de Joseph de la Brosse, qui construit dans le même temps le château de Brocéliande, en face de l'étang. Alliés à la famille Levesque par leur soeur Marie, épouse de Louis Levesque, ils avaient racheté à cette dernière une partie du domaine de Paimpont en 1908. Les Devigny sont alors propriétaires de 1300 ha de forêt et font édifier le Pas-du-Houx sur la rive sud de l'étang du même nom. Corps de bâtiment principal de plan rectangulaire à travées double en profondeur recevant au 2/3 de la façade un pavillon en saillie, un oriel circulaire liant les deux corps, importants volumes de toitures à croupe marqués par de nombreuses lucarnes surmontées de frontons chantournés ou circulaires, style Renaissance et XVIIe siècle. Entrée de l'étage de soubassement surmontée d'un toit semi-circulaire, demi poivrièvre, sur une façade latérale.","habitants":"Brocéliande ; Famille de  Joseph Guillet de la Brosse                                  Des Forges ; Donatien-Rogatien Levesque                            Comper ; Famille de la Trémoille                                            Pas du Houx ; Famille des Devigny\r\n        \"","divers":"Trois châteaux à Paimpont; Comper- grav -3, Broceliande grav 1-2,  Forges grav-4  et pas du Houx grav-5, Tertre grav 6                                                               Broceliande                                                                                          GPS : 48° 01' 08\" Nord, 2° 10' 11\" Ouest                            GPS : 48°01'08\" Nord, 2°10'11\" Ouest                                          Pas du Houx GPS : 48°01'08\" Nord, 2°10'11\" Ouest                                         Comper  48° 04' 12\" nord, 2° 10' 22?\"ouest1","gps":"48° 01' 08\" Nord, 2° 10' 11\" Ouest","images":["../image/image_35/35_Paimpont_1.jpg","../image/image_35/35_Paimpont_2.jpg","../image/image_35/35_Paimpont_3.jpg","../image/image_35/35_Paimpont_4.jpg","../image/image_35/35_Paimpont_5.jpg","../image/image_35/35_Paimpont_6.jpg"]},"Consult_chateau_formulaire7459":{"id":"Consult_chateau_formulaire7459","dept":"35","canton":"Fougères","commune":"Parigné","nom":"Parigné","type":"Château","periode":"XV-XVII-XX","histoire":"Deux châteaux à Parigné; Bois -Guy et la Chesnardière, et à dix kilomètres au Nord-ouest à Poiley château de Poiley.                      BOIS GUY, bâti au XVIIe siècle sur l'emplacement d'un ancien manoir, malheureusement délabré,le château est flanqué d'une tour à chaque angle en façade ainsi qu'une tourelle carrée dotée d'un escalier en granit sur la façade postérieure, des dépendances et un parc à la française. En 1703, le château devient la propriété de la famille Picquet, royaliste allié des chouans qui en fait son camp de base pendant la période révolutionnaire. Vendu en 1804 à M. Dubuat, le château revient à sa fille, épouse d'Henri Charles d'Estanger. Après la Seconde Guerre Mondiale le château et ses dépendances se détériorent. En 1994 un industriel achète le château dont il ne reste que le rez de chaussée et une des tours. Il le restaure avec pour objectif d'en faire un hôtel-restaurant.  C'est un château de type Louis XIV et de style XVII. Le domaine du Bois-Guy était composé, au XVe siècle, d'un manoir avec sa chapelle, d'une ferme et de dépendances. Au XVIIe siècle, sur l'emplacement de l'ancien manoir, sera bâti le château du Bois-Guy, flanqué d'une tour, à chaque angle en façade ainsi qu'une tourelle carrée dotée d'un splendide escalier en granit sur l'arrière, des dépendances surmontées dils de buf ainsi qu'un parc à la française.","architecture":"CHESNARDIERE, le château de la Chesnardière procède du rhabillage et de l'agrandissement d'un ancien manoir du XVIe siècle. Le corps de logis avec sa tour d'escalier polygonale à l'arrière est partiellement conservé, une aile en retour d'équerre avec tour circulaire sur l'angle (et corps annexe), ayant été construits dans la deuxième moitié du XIXe siècle. Transformation en maison de retraite et ajouts de plusieurs bâtiments au XXe siècle. La composition générale de l'édifice adopte un plan en L. Le corps de logis, de plan rectangulaire, est augmenté d'un corps de bâtiment saillant d'un côté et présente un léger avant-corps central surmonté d'un pavillon au niveau de l'entrée. Une aile, en retour d'équerre, se greffe à l'arrière, avec tour sur l'angle opposé. Tour d'escalier polygonale à l'angle des deux corps de bâtiment, l'élévation comporte un étage carré et un étage de comble. Maçonneries en moellon avec encadrements de baies, chaînes d'angle harpées, lucarnes et pignons en pierre de taille de granite. Toits à longs pans à pignons découverts. Lucarnes de style Renaissance,  maison de retraite.   Après le décès de Madame dAvenel, survenue le 8 juillet 1962, la Congrégation de Rillé entreprend ce qui navait pu être fait jusqualors : la restauration et la modernisation du château. Le nombre total de chambres passe alors de 68 à 78.                                                                                                                               POILEY, le château date du XVe siècle.  Propriété des seigneurs de Poilley en 1096, puis, par alliance, de la famille Léonèse ou le Léonnais (à la fin du XIIe siècle) qui prit le nom de Poilley. Le château passe ensuite entre les mains de la famille du Bourgblanc, seigneurs d'Apreville en 1739, puis de la famille Princey vers 1758. Il est inscrit au titre des M.H. depuis le 15 décembre 1926. Famille de Rouault de la Vigne Il ne reste plus qu'une seule de ses quatre tours. On y trouve une chapelle dédiée à sainte Marguerite et fondée en 1450 par Jean Ier de Poilley : une de ses portes est datée de 1607.","habitants":"Famille Picquet,                                                                            famille du Bourgblanc                                                                       Poley; Famille Léonèse\r\n        \"","divers":"Deux châteaux à Parigné; Bois-Guy_Grav-1-2-3-et la Chesnardière grav-6. et à dix kilomètres au Nord-ouest à Poiley château de Poiley grav -4-5,  Bois Guy                               GPS: 48°26'18,63\" Nord, 1°12'31,97\" Ouest","gps":"48°26'18,63\" Nord, 1°12'31,97\" Ouest","images":["../image/image_35/35_Parign%c3%a9_1.jpg","../image/image_35/35_Parign%c3%a9_2.jpg","../image/image_35/35_Parign%c3%a9_3.jpg","../image/image_35/35_Parign%c3%a9_4.jpg","../image/image_35/35_Parign%c3%a9_5.jpg"]},"Consult_chateau_formulaire7d54":{"id":"Consult_chateau_formulaire7d54","dept":"35","canton":"Montauban-de-Bretagne","commune":"Romillé","nom":"Perronnay_Romillé","type":"château","periode":"XVII","histoire":"PERRONNAY, village à structure ancienne d'origine médiévale, siège du premier château de la seigneurie, transféré à partir du XVe siècle à Perronnay, même commune. Sur le cadastre de 1830, trois pôles bien visibles : au centre l'église et son cimetière (disparu) . Propriété de la famille de Saint Gilles en 1350 et au XVIIIe siècle, puis des familles Vaucouleurs de Lanjamet au XIXe siècle, et Jan de la Hamelinaye à la fin du XIXe siècle.\r\nPerronnay : inscription au M.H.  par arrêté du 18 février 1948.","architecture":"PERRONNAY au sud la motte féodale, à l'ouest de celle-ci l'ancienne place des halles. L'actuel château de Perronnay, construit en 1653, a remplacé un ancien château fortifié rasé pendant la Ligue. Le bâtiment se compose d'un corps de bâtiment précédé d'un perron à double révolution et accosté de deux pavillons peu saillants. Un troisième pavillon, avec un comble à l'impériale, est accolé au sud, cet édifice est intéressant comme spécimen des châteaux de la région de Rennes, construits au XVIIe siècle. Il possédait autrefois un colombier et relevait de la châtellenie de Romillé.","habitants":"familles Vaucouleurs de Lanjamet\r\n        \"","divers":"A Romillé le château de Perronnay  gps 48° 12' 53\" nord, 1° 55' 15\" ouest","gps":"","images":["../image/image_35/35_Perronnay_Romill%c3%a9_1.jpg","../image/image_35/35_Perronnay_Romill%c3%a9_2.jpg","../image/image_35/35_Perronnay_Romill%c3%a9_3.jpg","../image/image_35/35_Perronnay_Romill%c3%a9_4.jpg"]},"Consult_chateau_formulaire76ac":{"id":"Consult_chateau_formulaire76ac","dept":"35","canton":"Bain-de-Bretagne","commune":"Couyère","nom":"Plessix_Couyère","type":"Château","periode":"XVIII","histoire":"PLESSIX, le château du Plessix a été construit dans le premier quart du XVIIIe siècle par Gilles Gardin, écuyer, seigneur du Boishamon, directeur des monnaies à Rennes, en remplacement d'un manoir ancien dont les vestiges subsistent aujourd'hui dans le parc. Une description de 1744 indique l'existence du jardin, du parc et des étangs (qui dateraient du XVIe siècle). Dans les années 1860-1870, Bertrand de Langle entreprend d'importants travaux sur le château et le parc, il ajoute un jardin d'hiver contenant une rocaille et un bassin, le parc est redessiné par l'architecte Choulot, deux bâtiments sont construits sur la propriété: un chenil, avec un logement et quatre tours, de facture très originale, et une ferme modèle, située à côté du potager recréé et à proximité de la roseraie. Cet ensemble de la fin du XIXe siècle n'a subi aucune modification depuis sa création. Les travaux de la seconde moitié du XIXe siècle concernent les décors intérieurs et l'ornementation des façades. Parc remarquable fin du XIXe siècle.  La ferme comprend le logement du régisseur du château, édifice construit en moellon de grès avec encadrement de baies en brique et pierre de taille de calcaire. Composition symétrique originale avec deux corps mansardés couverts en pavillon en avant d'un corps de bâtiment rectangulaire.   Inscription au M.H. par arrêté du 19 novembre 1992.","architecture":"PLESSIX, le château se compose d'un corps de logis central, flanqué de deux ailes faisant saillie vers le sud. Le bâtiment se prolonge sur la gauche par une orangerie et sur la droite par une petite chapelle à clocheton. La façade sud, sommée de frontons curvilignes sculptés de trophées, donne sur une esplanade recouverte de gravier et offre une vue sur des bois parsemés d'étangs. Ce château est entouré d'un parc de 52 hectares qui a été remanié dans les années 1860.  Le château du Plessix a été construit dans le premier quart du XVIIIe siècle par Gilles Gardin, écuyer, seigneur du Boishamon, directeur des monnaies à Rennes, en remplacement d'un manoir plus ancien dont les vestiges subsistent encore aujourd'hui dans le parc. Une description de 1744 indique l'existence du jardin, du parc et des étangs (qui dateraient du XVIe siècle). Dans les années 1860-1870, Bertrand de Langle entreprend d'importants travaux sur le château et le parc : au château s'ajoute un jardin d'hiver contenant une rocaille et un bassin, le parc est redessiné par un architecte dénommé Choulot, et deux bâtiments sont construits sur la propriété : un chenil, composé d'un logement et de quatre tours pour les chiens, de facture très originale, et une ferme modèle, située à côté du potager recréé et à proximité de la roseraie. Cet ensemble de la fin du 19e siècle n'a subi aucune modification depuis sa création.","habitants":"Famille de Bertrand de Langle\r\n        \"","divers":"A Couyère le château de Plessix   GPS : 47° 53' 33,72\" Nord, 1° 30' 45,72\" Ouest","gps":"47° 53' 33,72\" Nord, 1° 30' 45,72\" Ouest","images":["../image/image_35/35_Plessix_Couy%c3%a8re_1.jpg","../image/image_35/35_Plessix_Couy%c3%a8re_2.jpg"]},"Consult_chateau_formulairedd23":{"id":"Consult_chateau_formulairedd23","dept":"35","canton":"Combourg","commune":"Pleugueneuc","nom":"Pleugueneuc","type":"Château","periode":"XV-XVIII-XIX","histoire":"Deux châteaux dans cet article ;  Bourbansais (voir article)  et la Motte Beaumanoir et Morinais, au nord cinq Km le Rouvre.                                                                                 MOTTE-BEAUMANOIR, fut construit au XVe siècle pour la Famille Bouvier, ancien logis acquis en 1776 par Jean Thomas de Lorgeril qui fait agrandir le château par l'ajout d'ailes à l'est et à l'ouest. Son fils, Louis de Lorgeril terminera les remaniements au XIXe siècle. Des plans indiquent qu'à la fin du XVIIIe siècle, des transformations du château ancien sont prévues, avec division des pièces en appartements et l'aménagement d'un escalier central à jour et d'un corridor permettant la distribut
