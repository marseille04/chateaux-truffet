ion des chambres. L'ancien escalier à vis aurait été démoli. En 1807, Louis de Lorgeril projette une reconstruction totale du château, qui comprend également l'aménagement d'un jardin et d'un parc. La construction projetée est de style néo palladien. Ancien maire de Plesder, M. de Lorgeril a contribué au développement des comices agricoles en Ille et Vilaine: la société d'agriculture du département lui a élevé un monuments en 1852 dans le parc du château. Deux projets de galerie pour le château sont signés de Louis Richelot.  Transformer en hôtel-restaurant par monsieur Bernard .","architecture":"MORINAIS, le château actuel est bâti vers 1870 pour le compte de Dominique Cossé, industriel raffineur de sucre à Nantes, associé de Cossé-Duval, sur l'emplacement d'un bâtiment plus ancien, siège d'une ancienne seigneurie.                                                                                                                                                                                                  ROUVRE  à Cinq KM au nord le château du Rouvre Saint-Pierre de Plesguen fût reconstruit en 1786-87 pour Saturnin-Hercule du Bourblanc, conseiller puis premier avocat au Parlement de Bretagne. La chapelle Saint-Laurent, datant de 1660, fût conservée. Comparable par son plan en H allongé au château de Belle Noë en Dol de Bretagne du début du XVIIIe siècle, il s'en distingue par le traitement des toitures à la Mansart des ailes latérales. L'aménagement au début du XXe siècle des pavillons en appentis latéraux, a accentué ce parti pris.                                                                               GAGE le château de Le Gage du XIX siècle, situé route de Saint-Domineuc et édifié à l'emplacement d'un ancien château ou manoir Louis XIII. Il possède une chapelle privée, une fuie circulaire et un joli puits à quatre pilastres, décoré des armes de la famille de Saint-Gilles avec la date de 1625. Le Gage possédait jadis un droit de haute justice. Propriété successive des familles Racton ou Raeton (en 1513), de Saint-Gilles (en 1625 et en 1704), du Boisbaudry (en 1716 et en 1730), de Visdelou (au XVIIIe siècle) et de France .","habitants":"Motte-Beaumanoir Famille Bouvier                                        Morinais; Famille de Dominique Cossé,                                       Rouvre; Famille  Saturnin-Hercule du Bourblanc\r\n        \"","divers":"Deux châteaux dans cet article ;Bourbansais (voir article)  et la Motte Beaumanoir grav 1-2 et Morinais gracv_6,  au nord cinq Km le Rouvre grav-3   Gage-grav-4                                       Motte GPS : 48° 23' 50\" Nord 1° 54' 09\" Ouest                                                        Morinais gps 47° 45' 35\" nord, 2° 20' 55\" ouest","gps":"48° 23' 50\" Nord 1° 54' 09\" Ouest","images":["../image/image_35/35_Pleugueneuc_1.jpg","../image/image_35/35_Pleugueneuc_2.jpg","../image/image_35/35_Pleugueneuc_3.jpg","../image/image_35/35_Pleugueneuc_4.jpg","../image/image_35/35_Pleugueneuc_5.jpg","../image/image_35/35_Pleugueneuc_6.jpg"]},"Consult_chateau_formulaire3e0d":{"id":"Consult_chateau_formulaire3e0d","dept":"35","canton":"Bain-de-Bretagne","commune":"Pléchatel","nom":"Pléchatel","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Quatre châteaux à Pléchatel; Plessis-Badoult , Mainteniac.                  Driénais et Gaudelinais à St Malo de Phily .\r\n GAUDINELAIS  à cinq kilomètres au nord ouest à St-Malo de Phily    Château du début du XVIIIe siècle remanié au XIXe siècle. Disposé suivant un plan en H, hormis la toiture à la Mansart, il est à rapprocher, dans une moindre mesure, de certaines malouinières des environs de Saint-Malo, la Motte Jean en Saint-Coulomb ou Belle Noé en Dol-de-Bretagne. Inclus avec le logis principal dans un quadrilatère ceinturé de douves, l'ensemble des communs fût reconstruit au XIXe siècle. Le bâtiment est constitué de lucarnes en bois; baies en granite et tuffeau; quatre travées sur les pignons.                                                                                            MAINTENIAC,  a été construit au XVIIe siècle; la chapelle élevée en 1671 ; remaniement important du corps de logis (escalier extérieur, décor intérieur) et adjonction du corps postérieur autour de 1828. Le corps de logis principal a été surbaissé au cours du XXe siècle. La construction du château de Mainténiac date du XVIIe au XIXe siècle. Le château fut mentionné en 1086 dans le cartulaire de l'abbaye de Redon. Il fut la propriété successive de Guillaume Guillou (en 1427), puis des familles Challot (en 1544, en 1556), Chéreil (en 1668), Robinault (en 1728), Desclos seigneurs de La Molière (en 1754) et au XIXe siècle, des familles Leveil, Dréo, Simon, Pierre Delaitre, Delahaye et Fabre (en 1975). La chapelle privative a été édifiée, par François Chéreil, en 1671. La construction actuelle remonte au XVIIe siècle. Le château de Mainteniac a été remanié au XIXe siècle.Élévation : élévation ordonnancée, à  un étage carré, trois étages carrés, un vaisseau,avec escalier de distribution extérieur : escalier en fer-à-cheval. Gros-oeuvre : granite, schiste, calcaire, enduit, moellon  toit à longs pans, croupe en  ardoise.","architecture":"DRIENNAIS, à Saint-Malo-de-Phily, château remanié au début du XXe siècle par l'architecte départemental Jean-Marie Laloy sur une structure de corps de logis principal de style néo-classique. Un ancien logis, probablement du XVIIe siècle, est conservé, fortement remanié, amputé d'une aile en retour d'équerre à l'ouest. L'ensemble conserve un beau parc et des communs de qualité probablement dus pour l'essentiel à Jean-Marie Laloy.                                                                                                                                     PLESSIS-BARDOULT, sa cosntruction date de 1500 à 1700. Cette terre noble et de haute justice appartenait, à l'origine, à la famille Bardoult (Bardoul), puis aux familles Le Ménager, Neuville, Tanoüarn, Simon et Cardinal. Ce simple manoir, jusquau début du XVIIIe siècle, qui devint un château avec lédification dun pavillon Nord, en 1853. Le corps de bâtiment principal Sud remonte du début du XVIIe siècle. Au XVIe siècle, des cérémonies religieuses protestantes ont lieu à la chapelle du Plessis-Bardoult construite en 1600. Les seigneurs du château du Hardatz (Messac en Ille-et-Vilaine) sont à la tête du mouvement protestant. Après la signature de l'édit de Nantes en 1598, Rolland de Neufville, évêque de Saint-Pol-de-Léon, y rétablit définitivement le culte catholique.                                                                                                                        TRELAN, château construit à l'emplacement d'un manoir mentionné depuis le XIVe siècle. Orain, en 1882, mentionne la propriété de Trélan, résidence de M. Jousset, maire de la commune, dans une agréable situation.","habitants":"Gaudinelais;                                                                       Mainténac Famille de Guillaume Guillou                        Driennais;Famille de Jean-Marie Laloy                                      Plessis-Baroult: famille Le Ménager                                            Tréjan; Famille de M. Jousset\r\n        \"","divers":"Trois châteauxà Pléchatel; Plessis-Badoult grav-3 , Mainteniac grav-6.                  Driénais grav-1-2 et Gaudelinais à St Malo de Phily grav 4-5. Trélan grav-7 .Plessis                                                                                         Maintenac GPS : 47° 53' 43\" Nord, 1° 44' 50\" Ouest              St Malo de Phily 47° 52' 41\"nord, 1° 47' 14\" ouest","gps":"47° 53' 43\" Nord, 1° 44' 50\" Ouest              St Malo de P","images":["../image/image_35/35_Pl%c3%a9chatel_1.jpg","../image/image_35/35_Pl%c3%a9chatel_2.jpg","../image/image_35/35_Pl%c3%a9chatel_3.jpg","../image/image_35/35_Pl%c3%a9chatel_4.jpg","../image/image_35/35_Pl%c3%a9chatel_5.jpg","../image/image_35/35_Pl%c3%a9chatel_6.jpg","../image/image_35/35_Pl%c3%a9chatel_7.jpg"]},"Consult_chateau_formulairebbe7":{"id":"Consult_chateau_formulairebbe7","dept":"35","canton":"Montfort-sur-Meu","commune":"Plélan le Grand","nom":"Plélan_le_Grand","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux dans cet article ; Franquemont, Gué, Chéze et Pont-Muzard.                                                                                                                                                FRANQUEMONT, le château de Franquemont pourrait être identifié comme l'ancien manoir de Trécouët. Selon Paul Banéat, la propriété aurait pris le nom de son nouveau propriétaire, Franquemont, avant 1467. Le domaine aurait ainsi été l'une des résidences du roi Salomon de Bretagne de 857 à 874. Le domaine possédait une chapelle fondée par les seigneurs de Lohéac au XIIIe siècle,  par Joseph Nouvel, sieur de la Perrière et sa femme Renée de Launay.                                                                                                         la CHEZE, il fait partie des 8 propriétés nobles recensées sur la commune de Plélan-le-Grand. L'état de conservation du bâtiment principal et la date de sa construction en font l'un des domaines les plus intéressants. L'abbé Guillotin de Corson rapporte une inscription relevée sur l'ancienne chapelle : Haec Dom-constructa fuit- Olivario de France : Domino de la Chaise- Anno Domini 1695. On découvre qu'Olivier de France, nouveau seigneur de la Chèze, releva la chapelle et le manoir, en 1695, seigneur de la Chèze, au décès de son épouse Gillette de la Fontaine. A la fin du XIXe siècle, le manoir de la Chèze était en ruine. On y exerçait le droit de Haute Justice. Le manoir de la Chèze a été restauré. Il est privé, fermé au Public.","architecture":"BRIEUX,  le manoir des Brieux, situé route de Mordelles. C'était une châtellenie d'ancienneté, avec un droit de haute justice exercé au Gué de Plélan. Propriété successive des familles Brieux (au XIIIe siècle), Malor seigneurs de Marzain, de la Chapelle (en 1427), de Maure (seconde moitié du XVe siècle) qui l'unit à la seigneurie de Maure en 1553. Il devient ensuite la propriété successive des familles Robineault seigneurs de la Guémeraye (en 1695), Rochebouët et Beugny d'Hagerue ;                                                PONT-MUZARD,  date du XVe siècle, pour son propriétaire initial la Famille Touët  en 1427. Il a été restauré  du Pont-Muzard ou Pont-Mussard (XVIIe siècle)., puis des familles Touët et Guyet en 1513. On mentionne un Geoffroy Touët (ou Thouet) en 1480 ;  Bien qu'ayant subi des transformations au début du XXe siècle, il conserve des bâtiments du XVIIe siècle et une intéressante tour d'escalier à encorbellement dans l'angle Sud-Est. Les murs du château du Pont-Muzard sont composés de schistes, de grès, de moellons sans chaîne en pierre de taille en appareil mixte et les toits sont en ardoise. il est inscrit à l'inventaire général du Patrimoine culturel.","habitants":"Franquemont Famille de Joseph Nouvel                                             La Chèze: Famille de Jean d'Erbrée                                              Brieux: familles Brieux                                                                              Pont Muzard; Famille Touët\r\n        \r\n        \"","divers":"Trois châteaux dans cet article ; Brieux grav-,  Franquemont  grav-2, Chéze grav-2  et Pont-Muzard grav-4, Gué grav-3                                                 la Chéze GPS : 48° 00' 09\" Nord, 2° 05' 52\" Ouest                                            Pont-Muzard GPS : 48° 00' 33\" Nord, 2° 01' 04\" Ouest","gps":"48° 00' 09\" Nord, 2° 05' 52\" Ouest","images":["../image/image_35/35_Pl%c3%a9lan_le_Grand_1.jpg","../image/image_35/35_Pl%c3%a9lan_le_Grand_2.jpg","../image/image_35/35_Pl%c3%a9lan_le_Grand_3.jpg","../image/image_35/35_Pl%c3%a9lan_le_Grand_4.jpg"]},"Consult_chateau_formulaire96aa-2":{"id":"Consult_chateau_formulaire96aa-2","dept":"35","canton":"Châteaugiron","commune":"Piré sur Sèiche","nom":"Péres_Pirè","type":"Château","periode":"XVIII","histoire":"DES PERES, un manoir existe dès 1317, il est la propriété de la famille Bonenfant. Il est reconstruit et rasé en partie par Christophe de Rosnyvinen en 1722, puis remplacé par le château de Piré. En 1854, le marquis de Piré, vend la propriété au vicomte Nicolay. Puis à la famille Carron de la Carrière en 1866. Le château du XVIIIe siècle abrite actuellement un musée dart africain, tenu par la communauté des Pères Spiritains de la congrégation du Saint Esprit, cette congrégation catholique étant très présente en Afrique depuis le XIXe siècle. Le Parc est un espace naturel départemental avec chemin aménagé de trois km permettant dapprécier toutes les subtilités de ce magnifique paysage pastoral très prisé au début du XXe siècle. Etang, boisements, prairies, vergers et arbres remarquables, tels sont les ingrédients dune balade champêtre.                                                                                          PIRE PLESSIE-GUERIFFle château du Plessis-Guériff ou Plessix-Guériff (1471-XVIII-XIXe siècle). Un manoir existe dès 1317, il est la propriété de la famille Bonenfant. Cest en 1432 un manoir fortifié, occupé par un détachement anglais commandé par Georges Rigman au nom du duc Jean V ; la garnison de La Guerche sen empare par surprise et lincendie sur lordre du duc dAlençon. Il est reconstruit et rasé en partie par Christophe de Rosnyvinen en 1722, puis remplacé par le château de Piré. La première chapelle de ce manoir était en ruine en 1664, car à cette époque Marguerite d'Espinose, veuve de Jean de Rosnyvinen, seigneur de Piré, obtint la permission de faire dire à l'église de Piré les messes fondées au Plessix (ou Plessis), « en attendant que la chapelle puisse être rebastie ». A cette date, le chapelain du Plessix, Julien Jamiot.","architecture":"PLESSIS GUERIFF, est un château bâti à Pire-sur-Seiche. Le château abrite le Musée des Arts Africains qui recèle des objets de grand intérêt. Il est ouvert au Public et se visite.Une seconde chapelle, « construite à neuf » par Christophe de Rosnyvinen, seigneur de Piré, fut fondée de messes par lui vers 1715 ; Jean-Baptiste Cleux fut chargé de la desservir. Ce dernier sanctuaire a lui-même disparu par suite de la reconstruction du château du Plessix sous le nom de château de Piré ; mais une nouvelle chapelle a été établie dans l'intérieur même de la maison ; elle n'est plus toutefois desservie. Le Plessis-Guériff était une châtellenie (formée par lunion des seigneuries du Plessis-Guériff et de Châteaubriant-à-Piré) depuis le début du XVIe siècle et possédait un droit de haute justice. Propriété de Guériff, fils de Bonenfant (en 1205), puis de la famille Bonenfant (en 1317) et de la famille Rosnyvinen (en 1471, suite au mariage d'Hélène Bonenfant avec Guillaume de Rosnyvinen le 23 janvier 1471) qui lavait encore au milieu du XIXe siècle. En 1854, le marquis de Piré, vend la propriété au vicomte Nicolay. Puis à la famille Carron-de-la-Carrière (en 1866). En 1932, le domaine passe à la congrégation des Pères du Saint-Esprit.","habitants":"famille Bonenfant\r\n        \r\n        \r\n        \"","divers":"a Piré sur Sèiche deux châteaux Pirè et Plessis,                                                        Péres GPS : 48°00'33\" Nord, 1°25'51\" Ouest                                       Plessis GPS : 48° 00' 37\" Nord, 1° 25' 45\" Ouest","gps":"48°00'33\" Nord, 1°25'51\" Ouest","images":["../image/image_35/35_P%c3%a8res_Pir%c3%a8_1.jpg","../image/image_35/35_P%c3%a8res_Pir%c3%a8_2.jpg","../image/image_35/35_P%c3%a8res_Pir%c3%a8_3.jpg","../image/image_35/35_P%c3%a8res_Pir%c3%a8_4.jpg","../image/image_35/35_P%c3%a8res_Pir%c3%a8_5.jpg","../image/image_35/35_P%c3%a8res_Pir%c3%a8_6.jpg","../image/image_35/35_P%c3%a8res_Pir%c3%a8_7.jpg"]},"Consult_chateau_formulaire36e3":{"id":"Consult_chateau_formulaire36e3","dept":"35","canton":"Combourg","commune":"Québriac","nom":"Québriac","type":"Château","periode":"XIX","histoire":"QUEBRIAC, château dans un style néo-classique de grande qualité, construit vers 1827 pour Monsieur de Castellan, par l'architecte rennais Louis Richelot, à l'emplacement d'un château fortifié qui comprenait quatre corps de logis et trois tours. Le domaine possédait alors des métairies nobles, des moulins, des bois et des étangs. Le prince de Dombes y plaça en 1591 une garnison royaliste. Les ligueurs s'en emparent, et son nouveau gouverneur pour la Ligue, Pierre de Fontlebon le rend au parti du Roi en 1594, le château soutient deux sièges en 1595 et en 1596, le château-fort est démantelé en 1599 par Henri IV.","architecture":"GROMILAIS le manoir (ou château) de la Gromilaye ou Gromillais (1827  XIXe siècle), oeuvre de l'architecte Louis Richelot. Ce château est reconstruit en 1606 puis en 1827. Il est agrandi au XIXe siècle. On y trouve une chapelle privative. Le 9 juin 1714, Claude-Françoise Le Daen, dame de Vaucouleurs, habitant la Gromillais, dota sa chapelle de 30 livres de rente. Propriété successive des familles Bourgneuf, Bonenfant (en 1428), Montauban (en 1461), Rohan (XVe siècle), Rosnyvinen (en 1481), Derval, Talhouët, seigneurs de Brignac (vers 1755 - 1780), Daen, et Colas des Francs.                                                                                                                                QUEBRIAC; le château est implanté sur une crête au centre d'un ensemble comprenant une ferme au nord, une pelouse à l'ouest, un jardin potager (disparu) et une orangerie à l'est. Des vestiges de douves sont conservés au nord et au sud. Le corps de logis, orienté est-ouest, est de plan rectangulaire double en profondeur ; il comprend un niveau de soubassement, un rez-de-chaussée, un étage carré et un étage de comble. L'élévation régulière (cinq travées en façade) est marquée à l'ouest par un porche central surmonté d'un fronton triangulaire, à l'est par un perron. Le gros-oeuvre est en moellon enduit au-dessus d'un soubassement en pierre de taille de granite ; les encadrements de baies, chaînes d'angle et bandeaux horizontaux sont également en pierre de taille ; la corniche est en bois, le toit à croupe est couvert d'ardoise.  Inscription au M.H. par arrêté du 4 juin 2007.","habitants":"Gromilais ; Familles Bourgneuf                                              Québriac ;Monsieur de Castellan\r\n        \"","divers":"Deux châteaux à Québriac dont Québriac et Gromilais grav-4                                                                                        Québriac GPS : 48° 21' 03,61\" Nord, 1° 49' 23,42\" Ouest","gps":"48° 21' 03,61\" Nord, 1° 49' 23,42\" Ouest","images":["../image/image_35/35_Qu%c3%a9briac_1.jpg","../image/image_35/35_Qu%c3%a9briac_2.jpg","../image/image_35/35_Qu%c3%a9briac_3.jpg","../image/image_35/35_Qu%c3%a9briac_4.jpg"]},"Consult_chateau_formulaireb611":{"id":"Consult_chateau_formulaireb611","dept":"35","canton":"Redon","commune":"Redon","nom":"Redon","type":"Château","periode":"XV","histoire":"Deux châteaux à Redon; Buard et Plessis.                                            BUARD,  également appelé la Salle de Lanruas fut  construit au XVe siècle, il est fort probable qu'il était fortifié pour défendre le bourg de Redon. Aujourd'hui encore le château possède une grosse tour circulaire et un souterrain destiné à favoriser les sorties en cas de siège. Richelieu, devenu abbé de Redon, lors de son unique visite en Bretagne, séjourna au château de Buard, dépendance de labbaye où les moines venaient chercher le repos dans le calme des champs. Jean V, duc de Bretagne, y signa larrêt de mort de Gilles de Retz, le terrible Barbe bleue, qui vient, depuis, semer le trouble à chaque mariage célébré dans la demeure. Le château de Buard a été  la propriété des familles Lambart en 1483 et en 1604, le Gal seigneurs de la Haye en 1661 et en 1679, Osmond en 1778, et le comte Henri Dondel du Faouëdic au XIXe siècle. Vers 1870, 6 mois durant le drapeau de la convention de Genève flotta sur ses tours.                                                                                  REDON  situés dans le quartier du port de Redon, qui a connu au XVIIe siècle son apogée , le château du Mail et l'hôtel de Richelieu font partie de ces belles demeures édifiées par les négociants, les armateurs, les riches propriétaires des alentours, les magistrats et les commissaires de guerre. Près de lui se trouve l'hôtel de Richelieu, flanqué d'une grosse tourelle d'angle, carrée et en encorbellement, et percée de fenêtres à piédroits sculptés.","architecture":"BEL-AIR Classé M.H., le château de Bel-Air, durant les deux jours, les visiteurs se sont succédé à un rythme régulier,  guidés par les maîtres des lieux, M. et Mme De Legge.                                                                                                                       PLESSIS, situés dans le quartier du port de Redon, qui a connu au XVIIe siècle son apogée, et acquis sa physionomie actuelle par la construction de ses quais de granit. Le château du Mail, appelé primitivement hôtel du Plessis, a été construit par François Menand ; il fut vendu judiciairement par les Menand aux Chéreil, seigneurs de la Rivière en 1755, et revint ensuite aux Menand, seigneurs du Brossay et aux Fourché, seigneurs de Quéhillac. Près de lui se trouve l'hôtel de Richelieu, flanqué d'une grosse tourelle d'angle, carrée et en encorbellement, et percée de fenêtres à piédroits sculptés.","habitants":"Buard;  Famille Lambart                                                              Bel-Air Famille De Legge.                                                           Plessis; Famille aux Menand aux Chéreil,\r\n        \"","divers":"Trois châteaux à Redon; Buard grav-4, Bel-Air grav-3  et Plessis -5.   gps  47° 39' 08\" nord, 2° 05' 01\" ouest","gps":"","images":["../image/image_35/35_Redon_1.jpg","../image/image_35/35_Redon_2.jpg","../image/image_35/35_Redon_3.jpg","../image/image_35/35_Redon_4.jpg","../image/image_35/35_Redon_5.jpg"]},"Consult_chateau_formulaireb0c2":{"id":"Consult_chateau_formulaireb0c2","dept":"35","canton":"Rennes","commune":"Rennes","nom":"Rennes","type":"Patrimoine","periode":"XV-XVII","histoire":"TOUR DUCHESNE, était appelée autrefois la Tour du Chesne, de la Vieille Monnaie ou à Piron, elle tire son nom de Jehan du Chesne, grand portier de Rennes et premier habitant de la tour, lequel était chargé de l'ouverture et de la fermeture des portes de la ville. Aujourd'hui, intégrée à l'Hôtel d'Artillerie, la tour Duchesne est inscrite aux M.H. depuis le 13/03/1944. Elle se situe sur la première enceinte des remparts de Rennes qui date du IIIe siècle mais fut reconstruite, de 1447 à 1459, à la même époque que la deuxième enceinte et la porte Mordelaise. En 1143, le privilège de Papegaut est accordé à Rennes et confirmé par le duc François II de Bretagne. Au XVIe siècle, une trappe a été aménagé pour utiliser la basse fosse comme prison. La Tour Duchesne se trouve maintenant dans le square Hyacinthe-Lorette où se trouve aussi un des derniers vestiges de la première enceinte, dont des éléments gallo-romains et la croix de la Mission.                                                                                            La porte MORDELAISE,  est un châtelet d'entrée, vestige des remparts de Rennes. Son emplacement date du XIIIe siècle, à la création des premiers remparts, mais son architecture date principalement du XVe siècle. Il sagissait de lentrée principale de la ville de Rennes. Les portes mordelaises tiennent leur nom de la ville de Mordelles, fief important dès le XIe siècle vers lequel donne cette entrée. Les futurs ducs devaient prêter serment devant cette entrée, elle est ainsi parfois nommée porte royale, porte ducale ou porte épiscopale. Elle servait d'entrée pour les cortèges et son pont-levis permettait une double protection contre les attaques.","architecture":"PALAIS, du Parlement de Bretagne date de 1618 à 1655 et 1726. Il apporta à Rennes son rôle de Capitale de la Province de Bretagne. Il fut longtemps l'un des rares bâtiments de pierres de la ville. Le Palais , est un bâtiment de style classique, construit au XVIIe siècle. Il fut le siège du Parlement de Bretagne de sa construction jusquà sa dissolution par la Révolution française, en février 1790, en dehors de son « exil » à Vannes de 1675 à 1689. Lédifice devient la cour d'appel de Rennes en 1804. Ce monument a été entièrement restauré après lincendie du 5 février 1994, conséquence dun incident lié aux violentes manifestations de marins-pêcheurs. Dans des locaux adaptés aux exigences du XXIe siècle, la cour d'appel de Rennes a repris lactivité quelle déployait depuis près de 2 siècles. L'ensemble des autres juridictions a rejoint la cité judiciaire, à l'architecture très contemporaine, inaugurée en 1983. \r\nPalais ST-GEORGES, l'abbesse Magdelaine de la Fayette présida à sa construction en 1670 . Le nom de labbesse est dailleurs écrit en lettres capitales sur la façade. La grande galerie qui donne sur le jardin vers la Vilaine est très similaire au cloître du monastère des Ursulines de Laval.\r\nLe palais Saint-Georges devint une caserne à la Révolution française. Le bâtiment central comprend une galerie orientée vers le sud et composée de 19 arcades. Au-dessus des piliers de chaque arcade se trouvent des lettres en fer formant le nom de Magdelaine de Lafayette en lettre capitale. Au centre de ce bâtiment se trouve un fronton circulaire surmonté dune croix et contenant un blason coupé de la France et de la Bretagne. Entre le premier étage et le deuxième, au niveau du fronton central ainsi quà chaque extrémité se trouve le blason des La Fayette. Ce monument fait lobjet dune inscription au titre des monuments historiques depuis le 22 mars 1930.","habitants":"Seigneur locaux\r\n        \"","divers":"A Rennes la tour Duchesne grav-8, la porte Mordelaise grav-4, le Palais du parlement grav 1-2, et le Palais st-Georges grav-3,   opéra grav-5   Oberthur-Musée grav 6   Prélvalaye-grav-7                                                                                  tour GPS : 48° 06' 40\" Nord, 1° 41' 07\" Ouest                                                                     Molant GPS : 48° 06' 45,06\" Nord, 1° 41' 05,31\" Ouest                                   Porte GPS : 48° 06' 43\" Nord, 1° 41' 05\" Ouest                                                Palais GPS : 48° 06' 46\" Nord, 1° 40' 40\" Ouest","gps":"48° 06' 40\" Nord, 1° 41' 07\" Ouest","images":["../image/image_35/35_Rennes_1.jpg","../image/image_35/35_Rennes_2.jpg","../image/image_35/35_Rennes_3.jpg","../image/image_35/35_Rennes_4.jpg","../image/image_35/35_Rennes_5.jpg","../image/image_35/35_Rennes_6.jpg","../image/image_35/35_Rennes_7.jpg","../image/image_35/35_Rennes_8.jpg"]},"Consult_chateau_formulaire10a9":{"id":"Consult_chateau_formulaire10a9","dept":"35","canton":"Rennes","commune":"Rennes","nom":"Rennes_II","type":"Château","periode":"XV-XVI-XVIII","histoire":"HAUTES MARTINIERE, au XVe siècle, le manoir, à la famille de la Martinière passe à la famille de Beaucé déjà propriétaire de Montbarot à Rennes : les deux terres seront transmises conjointement jusqu´à la Révolution. La Martinière et Montbarot sont acquises vers 1503 par Alain Marec, sénéchal de Rennes. Ce dernier entreprend, vers 1510, la construction d´un nouveau manoir immédiatement à l´ouest de l´ancien. L´importance de ce nouveau logis, organisé en cour fermée est à la mesure de la position éminente du commanditaire et de sa fortune. Pierre Marec fils d´Alain, conseiller aux Grands Jours de Bretagne, est un des signataires de l´ancienne coutume réformée de Bretagne en 1539. Il rattache en 1540 à la Martinière la seigneurie voisine de Chevillé en Vezin. En 1617 le fief passe par alliance à la famille de la Chapelle de la Roche-Giffard. Il est vendu en 1663 aux Barrin marquis du Boisgeffroy","architecture":"HAUTES MARTINIERE, a compter de cette date le chateau n´est plus habité en permanence. Au XVIIIe siècle le château appartient à des familles de noblesse de cour, les comtes de Lannion puis les La Rochefoucaud ducs de Liancourt qui n´y résident pas. En 1773 il est vendu à la famille de Marnière de Guer qui conserve le domaine jusqu´à la Révolution. Le logis principal et la galerie ouest, sans doute encore debout en 1812, si l´on en croit le premier cadastre de Rennes, ne figurent déjà plus sur le cadastre de 1842. A cette même date le logis d´entrée est fortement remanié, ses tourelles d´escalier du côté de la cour et sont étage de comble sont supprimés. Durant la deuxième moitié du XIXe siècle, reconstruction d´un nouveau logis à l´ouest du corps d´entrée.","habitants":"Famille de la Martinière \r\n        \"","divers":"Hautes Martinière grav_3 et remparts grav-1-2  Tanneurs grav 4 gps 48° 07' 12\" nord, 1° 40' 42\" ouest","gps":"","images":["../image/image_35/35_Rennes_II_1.jpg","../image/image_35/35_Rennes_II_2.jpg","../image/image_35/35_Rennes_II_3.jpg","../image/image_35/35_Rennes_II_4.jpg"]},"Consult_chateau_formulaire4cb7":{"id":"Consult_chateau_formulaire4cb7","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Theil de Bretagne","nom":"Rigaudière_35","type":"Château","periode":"XIV_XVIII","histoire":"La RIGAUDIERE, une demeure noble est attestée sur le site depuis le milieu du XIVe siècle, devenue châtellenie, elle possédait un droit de haute justice et relevait du duc de Bretagne.  Le domaine appartient en 1811 à André Vauquelin de la Rivière, député, et passe en 1828 à la famille Léon des Ormeaux, et en 1919 à Robert Bellanger sénateur, il appartient depuis 1955 à l'office national des anciens combattants et victimes de guerre.","architecture":"RIGAUDIERE, l'aile sud-ouest du bâtiment actuel date du XVIIe siècle remplaçant une construction plus ancienne. Le corps de logis principal construit au XVIIIe siècle, a été fortement rhabillé, sinon reconstruit au XIXe siècle. Il conserve des éléments de décor du XVIIIe et du début du XIXe siècle. Les tours et les tourelles, ajoutées en 1882. Les communs, situés à l'est du château, ont été élevés en 1846, date à laquelle est détruite la chapelle du XVIIe siècle. Une nouvelle a été bâtie au XIXe siècle et de nombreuses dépendances. Le puits est surmonté d'une ferronnerie du XVIIIe siècle.  Bâtiment allongé composé de trois corps en pavillon, celui du centre étant plus important avec 3 travées et plus élevé ; chaque jonction entre ces corps est marquée par une échauguette de brique circulaire et coiffée d'un petit toit en dôme avec lanternon. A l'ouest, aile en retour d'équerre, vestige du bâtiment du XVIe siècle,  maison de retraite.","habitants":"André Vauquelin de la Rivière\r\n        \"","divers":"A Theil de Bretagne la Rigaudière gps   47° 55' 10\" nord, 1° 25' 47\" ouest","gps":"","images":["../image/image_35/35_Rigaudi%c3%a8re_35_1.jpg","../image/image_35/35_Rigaudi%c3%a8re_35_2.jpg"]},"Consult_chateau_formulairee79f-2":{"id":"Consult_chateau_formulairee79f-2","dept":"35","canton":"Val-Couesnon","commune":"Saint-Brice en Coglés","nom":"Rocher_Portail","type":"Château","periode":"XIII-XVII","histoire":"ROCHER-PORTAIL, autrefois appelé Rocher-Sénéchal avec une maison forte , est érigée en seigneurie dés le XIIe siècle. A la famille du Rocher, succéder par alliance au XIIIe siècle à la famille le Sénéchal. En 1572 Louise le Sénéchal l'apporte en dot à François du Breil et s'en séparent en1583, il appartient aux Castellan dont la fille  Renée, épouse François de Carré, sieur de Rosampoul, c'est ce dernier qui vend le domaine   en 1596 à Gilles Ruellan  un proche d'Henri IV, et du cardinal de Richelieu. Ruellan achète en parallèlement les terres de Monthorin et de Thiercent et en 1617 rebaptise ses terres en Rocher-Portail et érigée en baronnie en sa faveur et entreprend de reconstruire intégralement le château médiéval. Ruellan marie richement ses filles Marie l'ainée en 1622 devient marquise de Goulaine, la seconde épouse Jacques Barrin de la Galissonnière et la troisième à Thomas de Guemandeuc, gouverneur de Fougères, la cadette se marie avec le duc de Brissac\r\nDe la famille Ruellan, jusquen 1653. Après la mort de  de la veuve de Ruellan trois familles se sont succédé entre 1617 et 2016, laissant la marque de leur époque.  Le château échoit par héritage aux Barrin de la Galissonnière, qui le vendent en 1653 aux Farcy le conserveront jusqu'en 1754 ou il est acquit par Anne-Gilles Guérin marquis de Saint-Brice et racheté en piteux état par le baron de  Boutray, Ainsi, les Boutray, propriétaire de 1866 à 2016,.Manuel Roussel en devient le propriétaire en 2016.","architecture":"ROCHER-PORTAIL,  est un projet de grande envergure dans les premières années du XVIIe siècle. Les seuls éléments de datation dont nous disposons pour sa construction sont la date d'achat de la terre en 1596, et la date de 1617, figurant sur le fronton sud du corps central.  bien que profondément restauré vers 1860, nous est parvenu dans un état proche de celui de sa construction et n'a pas subi de mutilation  Les bâtiments composant le château du Rocher Portail ferment de trois côtés une cour d'honneur que clôt vers l'ouest une balustrade en granite précédée d'une douve. La douve communique avec l'étang qui baigne l'aile nord du château. Le corps central du château est flanqué de deux ailes en équerre. Autour d'une cour de trente mètres sur trente et un sont disposés un logis principal au fond où se trouvent les salles, et deux ailes latérales, employées l'une en galerie, l'autre regroupant appartements et pièces de service. Le côté de l'entrée ne paraît pas avoir été clos à l'origine mais en terrasse, et simplement protégé par un fossé, bien que surveillé par deux canonnières. Quatre pavillons flanquent les angles, ceux situés de part et d'autre du logis qui renferment les chambres étant les plus imposants. Dans celui du nord-ouest se trouve la chapelle proche de la porte du logis, ouverte sur la galerie en rez-de-chaussée par où le maître des lieux peut aller sans passer par d'autres appartements que le sien. Le pavillon sud-ouest est occupé au rez-de-chaussée par une pièce à feu indépendante correspondant peut-être au logement du portier. Dans l'aile sud une porte charretière percée au centre de la façade permet d'accéder au château à partir de la basse-cour. Cette entrée secondaire forme un axe qui abouti à la travée centrale de la galerie. Les volumes des pavillons sont marqués par leurs hautes toitures. L'égout du toit règne pour l'ensemble du bâtiment à la même hauteur.","habitants":"la famille du Rocher\r\n        \"","divers":"A Saint-Brice en Coglés le château de    Rocher-Portail                                    GPS : 48° 26' 3,91\" Nord, 1° 21' 27,34\" Ouest","gps":"48° 26' 3,91\" Nord, 1° 21' 27,34\" Ouest","images":["../image/image_35/35_Rocher_Portail_1.jpg","../image/image_35/35_Rocher_Portail_2.jpg","../image/image_35/35_Rocher_Portail_3.jpg","../image/image_35/35_Rocher_Portail_4.jpg"]},"Consult_chateau_formulaire0945":{"id":"Consult_chateau_formulaire0945","dept":"35","canton":"Vitré","commune":"Vitré","nom":"Rochers_Sevigné","type":"Château","periode":"XVI","histoire":"ROCHERS SEVIGNE, c'est l'ancienne résidence bretonne de Madame de Sévigné, est un manoir de style gothique. La construction du château date du XVIe au XIXe siècle. Un premier château en pierre avait été construit par le Baron Robert Ier de Vitré à la fin du XIe siècle, par les ancètres d'Henri de sévigné, un aristocrate breton, il épousa en 1644, Marie de Rabutin-Chantal,  en 1671, nommé le Bien-Bon, curé de Coulanges. Mme de Sévigné s'en servait pour faire la lectures à sa fille. Le Jardin à la Française a été créé en 1689 et restauré en 1982. L'ensemble est bordé d'un parc boisé dont les allées ont toutes été baptisées par Mme de Sévigné, qui séjourna à plusieurs reprises au château des Rochers, après la mort de son mari. C'est dans cette demeure qu'elle écrivit nombre de ses fameuses lettres adressées à sa fille, Françoise de Sévigné, comtesse de Grignan. La propriété appartient encore aux lointains descendants des Sévigné. On peut visiter la chapelle et une partie du manoir, où se trouvent des portraits de la Famille de Sévigné et quelques objets ayant appartenu à la Marquise. Un golf, un restaurant et des salles de réception ont été aménagés sur la propriété,  sa nièce Madame de Simiane fille de madame de Grignan  revendit en 1715, au baron de Hay de Nétumières, les rochers passé depuis par alliance aux d'Aviaude Ternay. Aujourd'hui au  comte Amaury d'Aviau de Ternay conserve  le château des Rochers-Sévigné est ouvert, partiellement, au public ainsi que sa Chapelle.","architecture":"ROCHERS SEVIGNE, bâti en L sur une colline rocheuse, résidence de campagne favorite en Bretagne de la marquise de Sévigné, est un ensemble composé d'éléments élevés entre le début du XVIe siècle et la fin du XIXe siècle. Le château des Rochers-Sévigné possède deux tours. Une chapelle octogonale fut construite Le logis, construit au début du XVIe siècle sur un plan en équerre, dans un esprit gothique, a été légèrement modifié au XVIIe siècle (modification des baies), puis prolongé au siècle suivant par une aile au sud et en 1885 par un pavillon vitré. Le reste du domaine date des XVIIe et XVIIIe siècles: la chapelle a été bâtie entre 1671 et 1675, le jardin créé en 1689 par Charles, le fils de la marquise, a été reconstitué en 1982, Les écuries et les communs furent rajoutés au XVIIIe siècle. Au fond du jardin, un mur, en forme d'arc de cercle provoque un écho lorsqu'on se place sur une dalle, selon le plan d'origine, le tracé du parc semble dater de cette époque. En 1715, le château a été vendu aux Hay de Nétumières, qui ont fait ouvrir la cour puis construire entre 1784 et 1789 tout un ensemble de communs de belle qualité (écuries, remises, orangerie).  Le Château des Rochers-Sévigné est inscrit aux M.H. depuis 1942, 1944, 1995 et classé aux M.H. depuis 1943.\nÉléments protégés MH, la chapelle, le parc et l'ensemble du domaine : inscription par arrêté du 20 mars 1995.","habitants":"Madame de Sévigné\"","divers":"A vitré le château de Rochers-Sévigné.                                                       GPS : 48° 04' 50\" Nord, 1° 10' 08\" Ouest","gps":"48° 04' 50\" Nord, 1° 10' 08\" Ouest","images":["../image/image_35/35_Rochers_S%c3%a9vign%c3%a9_1.jpg","../image/image_35/35_Rochers_S%c3%a9vign%c3%a9_2.jpg","../image/image_35/35_Rochers_S%c3%a9vign%c3%a9_3.jpg","../image/image_35/35_Rochers_S%c3%a9vign%c3%a9_4.jpg","../image/image_35/35_Rochers_S%c3%a9vign%c3%a9_5.jpg"]},"Consult_chateau_formulaire656c":{"id":"Consult_chateau_formulaire656c","dept":"35","canton":"Val-Couesnon","commune":"Saint-Ouen-la-Rouerie","nom":"Rouerie","type":"Château","periode":"XVII-XIX","histoire":"ROUERIE, le propriétaire initial du château était la Famille Tuffin de la Rouërie,  le colonel Armand quitta Philadelphie pour la France en mai 1784. A son retour il se mit au service du roi Louis XVI et de la Bretagne. Promu colonel commandant un régiment de chasseurs, il fut élu délégué de la noblesse au parlement de Bretagne. La révolution naissante puis grondante le poussèrent à organiser une résistance : \"la chouannerie bretonne\"mais sa mort prématurée le 30 janvier 1793 brisa son destin.  Dans ce château, habita le dernier marquis de la Rouërie, personnage pittoresque et historique. En 1777, à lâge de 26 ans, il s'embarqua pour les États Unis d'Amérique et s'engagea dès son arrivée dans l'armée américaine. Sur décision du congrès, il commandera une légion de dragon qu'il créera lui-même avec des volontaires. Il prit une part active dans de nombreuses batailles aux cotés des insurgés, notamment Short Hills où il capturera un détachement anglais. La fameuse bataille de Yorktown sonne le glas de la présence anglaise en Amérique et permet à La Rouërie, Washington aidé par Rochambeau et La Fayette de s'illustrer par le combat, en faisant capituler l'armée du général Cornwallis. Cette victoire marqua la fin de la guerre d'indépendance américaine. Décoré et élevé au grade de brigadier général de l'armée américaine par son ami George Washington lui-même,  depuis 1824 la famille Barbier en est propriétaire.","architecture":"ROUERIE, est le résultat de trois campagnes de construction successives, aux XVIIe, XVIIIe et XIXe siècles.  De la première campagne, précisément datée de 1624 grâce à une pierre en remploi, date la partie sud-ouest du château. Le bâtiment fut partiellement reconstruit en 1730, selon un plan qui correspond au plan actuel, complété par une aile en retour sur l'arrière abritant cuisine et office. Cette aile fut détruite en 1824, date de la dernière campagne de transformation du château : la façade fut alors légèrement remaniée et la distribution intérieure modifiée pour pouvoir intégrer une nouvelle cuisine. Le décor intérieur conserve de nombreux éléments anciens, parmi lesquels de belles boiseries des XVIIe et XVIIIe siècles. Les abords du château furent également profondément modifiés à cette époque : la chapelle et le portail de l'ancienne cour, située devant le château, étant ruinés, des terrassements furent effectués pour aménager une esplanade.   De l'ancien domaine furent cependant conservé les communs situés au nord est, qui restent encore de nos jours. \r\nÉléments protégés MH : le château ; les communs de 1790 ; la soue à cochons ; le parterre : inscription par arrêté du 7 août 1996.","habitants":"Famille Tuffin de la Rouërie,\r\n        \"","divers":"Saint-Ouen-la-Rouerie le château. GPS : 48° 28' 47\" Nord, 1° 26' 28\" Ouest","gps":"48° 28' 47\" Nord, 1° 26' 28\" Ouest","images":["../image/image_35/35_Rouerie_1.jpg","../image/image_35/35_Rouerie_2.jpg"]},"Consult_chateau_formulaire793a":{"id":"Consult_chateau_formulaire793a","dept":"35","canton":"Guichen","commune":"Saint-Séglin","nom":"Sauvagère_35","type":"Château","periode":"XVII","histoire":"SAUVAGERE, la vicomtesse Roianteline de Porhoët en fit don à l'abbaye Saint-Georges de Rennes qui en reçu confirmation de l'évêque de Saint-Malo, Pierre Giraud, en 1202. La fondation du prieuré par les moniales bénédictines au lieu dit l'Abbaye dut intervenir dans le courant du XIIIe siècle, car en 1299, le trésorier de l'église de Rennes, Alain de Châteaugiron avouait jouir de ses revenus jusqu'à la Révolution, la cure de Saint-Séglin, dépendante du prieuré, fut à la présentation de l'abbesse de Saint-Georges. Saint-Séglin était déjà constituée en commune en 1796. Le maire de l'époque, Jean Durand, racheta à cette date comme bien national l'église paroissiale désaffectée depuis la Terreur, afin d'y rétablir le culte. Quelques pièces d'architecture ancienne méritent d'être citées : les maisons de ferme de la Couériais et de la Croix Orain (XVIIIe siècle), celle de l'Abbaye (1835), la demeure d'Haudebert (1818), le colombier et la chapelle de la Sauvagère (XVIIe siècle). Dans un corpus patrimonial plus récent, on retiendra une maison de ferme à la Hayais et le château de la Sauvagère.","architecture":"SAUVAGERE, rebâti par Guillaume II Mouraud à la fin du XVIIe siècle ne restent que la terrasse de soubassement, les douves, un grand portail, ainsi que la chapelle privative et le colombier. Le corps de bâtiment principal, en très mauvais état dès 1802, a été reconstruit en 1866 pour le docteur Mahé par l'entrepreneur Duval sur les plans de l'architecte Charles Langlois. Cette grande \"demeure de plaisance\" au style éclectique en vogue à l'époque du Second Empire, présente un plan complexe. Colombier de forme circulaire coiffé d'un campanile octogonal. C'est le seul édifice de ce type recensé dans la commune.","habitants":"Guillaume II Mouraud\r\n        \r\n        \"","divers":"a Saint-Séglin, le château de la Sauvagère gps 47° 51' 15\" nord, 2° 00' 18\" ouest","gps":"","images":["../image/image_35/35_Sauvag%c3%a8re_35_1.jpg"]},"Consult_chateau_formulairea9a2":{"id":"Consult_chateau_formulairea9a2","dept":"35","canton":"Redon","commune":"Sixt-sur-Aff","nom":"Sixt_sur_Aff","type":"Château","periode":"XVI-XVII-","histoire":"quatre châteaux dans cet article; Cour,  Hayes du Déron, Pommery et la Boulaye.                                                                                                                                 HAYES DU DERON   l'ancien manoir de la Cour de Sixt est l'un des plus beaux représentants du patrimoine architectural de la commune. Le château de la Hayes du Déron a été reconstruit en 1620. Restauré au début des années 1920, il appartient depuis 1630 à la famille Moraud, seigneurs de Callac. Le bâtiment est implanté au centre d'un parc boisé, il est entouré de douves rectangulaires et cantonné de quatre tours couvertes en dôme. Un pigeonnier est ménagé dans la tour est. La tour ouest est une chapelle.                                                                     POMMERY Manoir de Pommery date du XVIe siècle. Manoir du XVIe siècle bénéficiant dune situation calme dans un vallon, entouré dun parc fleuri et ombragé par des arbres séculaires (ginko biloba, tilleul argenté, chicot du Canada, Pommery vous propose 3 chambres aménagées avec un souci de qualité pour offrir les prestations que vous attendez. Situation idéale pour rayonner vers le village dartisans de La Gacilly, le village de Lohéac, son extraordinaire musée automobile et ses circuits, le site mégalithique de St-Just,  le deuxième de Bretagne, mais aussi Redon, Rochefort en Terre, voir Guérande pour sa ville close et ses marais salants.","architecture":"La BOULAYE  au Bruc sur Aff.  Le Manoir date du XVIe siècle. Il est composé d'un corps de bâtiment principal disposant d'une tour d'escalier de plan quadrangulaire accolé à l'Ouest. Des communs se développent en formant un L jusqu'à un logis indépendant contemporain à l'extrémité Est. Une chapelle du XVIIe siècle est affectée au début du XXe siècle à des usages de buanderie. Vers 1885, un nouveau logis de style néo-Gothique est construit, accolé au Sud à l'emplacement d'un ancien bâtiment. Une date portée 1859 témoigne de quelques remaniements réalisés à l'angle Nord-Est. Les bâtiments de la ferme nommée La Porte sur le cadastre napoléonien sont complétés d'une grange au XIVe siècle.  Il existe 5 Manoirs sur la commune à découvrir : Le Manoir de la Picrière (vestiges XVe siècle),  le Bossac (vestiges XVe siècle), la Boulaye (XVIe siècle), la Grée (XVIe siècle ancienne gentilhommière), de la Ravillaye  du XVIIIe siècle appelé le château du Bourg.                                                                                      COUR, demeure des Seigneurs de Sixt au XVIIe siècle, ce manoir appartient aux Porcaro vers 1500 et passe par alliance aux Guiny en 1671. Il est transmis en 1739 aux Guitton, Seigneur de Surville puis aux La Saoullaye, Seigneurs du Val, et enfin aux Onffroy, seigneurs de la Rozière. La façade ouest du bâtiment possède des ouvertures, des corniches et des moulures caractéristiques du XVIe. La coquille Saint Jacques, ou éventail est à peu près identique à celle de Lohéac. Ce manoir abrite une cheminée de 1572 de 3 mètres de large et 4 mètres de haut, dont les motifs sculptés sont d'influence romane et templière. Leur interprétation à donné lieu à de nombreux débats.","habitants":"Hayes; Famille Moraud                                                                  Cour; Famille de  Guitton\r\n        \"","divers":"A Sixt-sur-Aff  château de Boulaye grav-1-2-3    Hayes du Deron grav-4                                                                                  Boulaye GPS : 47° 48' 56\" Nord, 2° 01' 03\" Ouest                                         Pommery GPS : 47° 46' 36\" Nord, 2° 04' 38\" Ouest","gps":"47° 48' 56\" Nord, 2° 01' 03\" Ouest","images":["../image/image_35/35_Sixt_sur_Aff_1.jpg","../image/image_35/35_Sixt_sur_Aff_2.jpg","../image/image_35/35_Sixt_sur_Aff_3.jpg","../image/image_35/35_Sixt_sur_Aff_4.jpg"]},"Consult_chateau_formulaire3986":{"id":"Consult_chateau_formulaire3986","dept":"35","canton":"Val-Couesnon","commune":"St-Aubin d","nom":"St_Aubin_Aubigné","type":"Château","periode":"XV","histoire":"Deux châteaux à St-Aubin d'Aubigné dont celui de Saint-Aubin et Gavoullière.                                                                                                           SAINT-AUBIN D'AUBIGNE, mentionnée en 1161, la paroisse était administrée jusqu'à la Révolution par un prieur recteur relevant des religieuses de l'abbaye de Saint-Sulpice-la-Forêt en possession de l'église Saint-Aubin. A partir du XVe siècle et jusqu'au même terme, la famille Freslon exerça sa prééminence sur la vie civile locale depuis leur résidence au château de Saint-Aubin implanté au sud de l'église. Si la commune ne compte aucun monument protégé au titre des M.H., cette demeure se distingue cependant parmi les édifices remarquables du patrimoine local ; les manoirs de la Morlais ou celui de la Gavouyère, qui conserve une chapelle, ou encore les remarquables fours à chaux du Bois Roux marquent le paysage local par leur monumentalité relative. Le château de Saint Aubin d'Aubigné, dont les parties les plus anciennes remonteraient à la fin du XVe siècle, mais les bâtiments anciens datent plutôt des XVIIe et XVIIIe siècles. Le grand pavillon ouest à haute toiture à quatre pans semble remonter au XVIIe siècle, tandis que le corps de logis principal, qui lui est lié par une tour dans l'angle sud-ouest, peut dater d'un profond remaniement effectué au XVIIIe siècle.","architecture":"GAVOULLIERE, le grand logis manorial fut probablement reconstruit et remanié aux XVIIe et XVIIIe siècles et encore réaménagé ou simplement redécoré au début du XIXe siècle. A la fin du XXe siècle, quelques éléments d'une cheminée monumentale de style Renaissance provenant du manoir du Bouessay en Sens-de-Bretagne furent remontés très librement pour former les foyers des cheminées dans les pièces du rez-de-chaussée. Au nord du logis, des communs un grand logement à toiture brisée à l'ouest notamment cernent une cour où une chapelle borne l'entrée. Selon G. de Corson, elle fut bâtie vers 1636 par Bonabes Le Bel. Tombant en ruine, elle est reconstruite au début du XVIIIe siècle elle porte la date 1725  par Madeleine le Bel qui, par un acte de 1729,  à l'époque hors d'usage, et celui de la Gavouyère. Jusqu'à la Révolution, les prêtres Jean Touchais et Mathurin Bécherie la desservent  en échange des bénéfices de la métairie de Launay-Blanchet en Chasné sur la rive gauche de l'Illet.                                                                                                                          SAINT-AUBIN D'AUBIGNE, une description du château datant de 1686 mentionne un corps de logis entre deux pavillons doubles, une cour devant fermée de murailles avec deux pavillons aux deux coins, une porte d'entrée, un colombier devant, un jardin derrière le logis, l'ensemble étant entouré de douves. Suivant le plan cadastral de 1828, ce dernier a été amputé de quelques travées dans sa partie Est. Le bâtiment est fortement remanié à la fin du XIXe siècle par Frédéric Jobbé-Duval. Le pignon sud du grand pavillon est repercé de deux nouvelles travées et des communs à l'ouest sont reconstruits à cette période. La restauration est confiée à Sylvain Brunet en 1917. La métairie du château a été remaniée et agrandie de nouvelles parties agricoles au milieu du XIXe siècle ; le logement conserve néanmoins l'essentiel du corps de logis de plan allongé figuré sur le cadastre de 1828.","habitants":"Seigneurs locaux\r\n        \"","divers":"Deux châteaux à St-Aubin d'Aubigné dont celui de Saint-Aubin et Gavoullière grav-4-5 le manoir de la Morlais .                      Gps 48° 15' 44\" nord, 1° 36' 22\" ouest","gps":"","images":["../image/image_35/35_St_Aubin_Aubign%c3%a9_1.jpg","../image/image_35/35_St_Aubin_Aubign%c3%a9_2.jpg","../image/image_35/35_St_Aubin_Aubign%c3%a9_3.jpg","../image/image_35/35_St_Aubin_Aubign%c3%a9_4.jpg","../image/image_35/35_St_Aubin_Aubign%c3%a9_5.jpg","../image/image_35/35_St_Aubin_Aubign%c3%a9_6.jpg"]},"Consult_chateau_formulaire3be0":{"id":"Consult_chateau_formulaire3be0","dept":"35","canton":"Saint-Malo","commune":"St-Briac sur mer","nom":"St_Briac_Nessay","type":"Château","periode":"XIX-Xxe","histoire":"NESSAY du XIX-XXe siècle, il possédait un oratoire moderne à la fin du XIXe siècle ; il a été érigé sur l'emplacement d'un château fort dont l'origine remonte au XIIe siècle. Cette ancienne bâtisse portait le nom du site qui sappelait alors « La Houle » et était la propriété de la famille d'Elbiest de 1460 à 1520.  L'ancien château fort de la Houlle, mentionné dès le XIIe siècle dans le Roman d'Aquin.  Cette fondation fut transférée par les comtes de Pontbriand, seigneurs de la Houlle, dans la chapelle de leur manoir de Pontbriand, en Pleurtuit. C'était le château seigneurial de la paroisse.  Il est annexé en 1656 à la seigneurie de Pontbriand ; En 1914, le château est vendu à Georges Bergès, un papetier converti à l'électrochimie qui a inventé la Cheddite.","architecture":"NESSAY, cet édifice, dans l'enceinte duquel se trouvaient les potences de justice, fut détruit vers le milieu du XVIIe siècle. Les anciens seigneurs avaient été déchus de leurs prérogatives en 1656 au profit de la seigneurie de Pontbriand.  Son architecture est médiévale, notamment lutilisation massive de briques qui lui donne une allure de petit château bourgeois du XIXe siècle. Plusieurs styles sont ainsi présents : médiéval avec des tours dangles, les mâchicoulis et les créneaux, les fenêtres à meneaux ou en accolades pour rappeler le rôle défensif du site. Les murs sont constitués  de briques, de tufeau et de moellons, avec une toiture couverte dardoises. Le château sinspire des bâtiments de la Renaissance avec son rez-de-chaussée surélevé et lutilisation de briques polychromes. À lorigine, il ne se composait que de sa partie avant, en carré avec ses quatre tours dangle. Des agrandissements ont été réalisés en 1896 et 1908. De son côté, lentrée du parc évoque un pont-levis avec des tours de défense crénelées. La Houlle, château seigneurial de Saint-Briac, devait se trouver au bord de la mer, dans la presqu'île qu'occupe le château moderne du Nessay ; on y a trouvé à la fin du XIXe siècle des débris de substructions et de vieux canons. De la terre de la Houlle dépendait en 1678  l'île Agot. Il est fait mention au XIIe siècle dans le Roman d'Aquin de cette île et de la forteresse qui s'y trouvait alors. Il possédait jadis une chapelle privée qui existait encore en 1678.","habitants":"Famille d'Elbiest \r\n        \"","divers":"a St-Briac sur mer; château de Nessay gps 48° 37' 13\" nord, 2° 08' 02\" ouest","gps":"","images":["../image/image_35/35_St_Briac_Nessay_1.jpg","../image/image_35/35_St_Briac_Nessay_2.jpg","../image/image_35/35_St_Briac_Nessay_3.jpg","../image/image_35/35_St_Briac_Nessay_4.jpg","../image/image_35/35_St_Briac_Nessay_5.jpg","../image/image_35/35_St_Briac_Nessay_6.jpg","../image/image_35/35_St_Briac_Nessay_7.jpg","../image/image_35/35_St_Briac_Nessay_8.jpg"]},"Consult_chateau_formulaire306f":{"id":"Consult_chateau_formulaire306f","dept":"35","canton":"Val-Couesnon","commune":"Saint-Brice-en-Coglès","nom":"St_Brice_Coglès","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à saint-Brice dont celui de St-Brice  et Valette (voir article)                                                                                                               SAINT-BRICE, communément appelé le château de la Motte, le château de Saint-Brice était anciennement fortifié avec sa motte féodale qui subsiste encore au bord de la Loisance, sur sa rive gauche, derrière les anciennes maisons de fermes, un peu au-dessus de l'ancien moulin. Le château de Saint-Brice relevait de la baronnie de Fougères ; c'était une châtellenie d'ancienneté qui fut érigée en baronnie en 1566 et en marquisat en 1664. Il exerçait un droit de haute justice. Le château appartenait en 1151 aux seigneurs de Saint-Brice, passa par alliance en 1387 aux Des Prez, par succession en 1420 aux de Scepeaux, et fut confisqué sur eux par Anne de Bretagne et donné aux de Montauban ; rendu aux de Scepeaux, il fut vendu par eux en 1513 aux de Montauban, passa par alliance en 1516 aux de Volvire seigneurs de Ruffec, par alliance en 1674 aux Guérin seigneurs de Parigné, par alliance en 1785 aux Tuffin marquis de la Rouairie, puis vers 1786 aux Le Loup comtes de Chasseloir. Il est passé par succession des De la Touche-Limousinière aux De Poulpiquet du Halgouët. Il fut pillé en juin 1795. Le château était en ruines dès 1580. En effet, un aveu de la seigneurie de Saint-Brice datant de la première moitié du XVIe siècle, émanant d'un seigneur Ruffec de Volvire, décrit le manoir et anciennes maisons du lieu et domaine de la Motte de Saint-Brice. Le château est une vieille forteresse qui est dite en ruines et inhabitée. propriété du marquis de la Rouërie qui épousa Melle de St-Brice.","architecture":"St-BRICE, là où les armoiries furent martelées à la Révolution sur la façade intérieure de la porte d'entrée, du côté de la cour carrée, on voit à leur emplacement le collier de Saint-Michel qui les entourait. Cet élément montre que la porte d'entrée est l'oeuvre de Philippe de Volvire, chevalier de Saint-Michel, il l'a conçue comme une élégante porte fortifiée : flanquée de deux petites tourelles, elle possède un porche en anse de panier, une porte piétonne en plein cintre et elle est munie, au niveau inférieur, de canonnières rectangulaires évasées pour les tirs d'arquebuses ou de canons ; elle était en outre accompagnée d'une herse, de douves et d'un pont-levis. C'était un ouvrage avant tout conçu pour la défense en cette période troublée des guerres de religion. La succession échue à son fils Jacques qui poursuivit la construction du château, mais la paix civile étant revenue avec l'avènement du roi Henri IV, la nécessité d'une résidence fortifiée ne se justifiait plus. C'est alors que fut édifiée la partie du logis à la porte surmontée d'un joli fronton, à gauche de la façade actuelle.Le château forme trois côtés d'un carré et est flanqué de quatre pavillons à toits élevés. Le château comprend en outre fermant la cour d'honneur, un pavillon carré (à usage de porte fortifiée) flanqué d'un côté d'un pavillon de gardien, de l'autre de remises et en retour d'écuries (avec stalles en chêne) et l'orangerie. Cet ancien manoir était fortifié de douves et environné d'un étang. Il possédait un colombier et un moulin. A la fin du XVIe siècle, Philippe de Volvire entreprit la reconstruction du château de Saint-Brice.","habitants":"Famille de  Poulpiquet du Halgouët\r\n        \"","divers":"a  Saint-Brice-en-Coglès, le château de St-Brice     GPS : 48° 24' 28,62\" Nord, 1° 20' 55,77\" Ouest","gps":"48° 24' 28,62\" Nord, 1° 20' 55,77\" Ouest","images":["../image/image_35/35_St_Brice_Cogl%c3%a8s_1.jpg","../image/image_35/35_St_Brice_Cogl%c3%a8s_2.jpg","../image/image_35/35_St_Brice_Cogl%c3%a8s_3.jpg","../image/image_35/35_St_Brice_Cogl%c3%a8s_4.jpg"]},"Consult_chateau_formulaire943d":{"id":"Consult_chateau_formulaire943d","dept":"35","canton":"Fougères","commune":"Saint-Christophe-de-Valains","nom":"St_Christophe_Valains","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux dans cet article, Bélinaye à St Christophe et le Petit Moulinet et Vieux-Vy à deux Km à l'ouest.                                          BELINAYE, c'est l'un des rares manoirs de Haute Bretagne possédé pendant 500 ans par la même famille. Maison seigneuriale édifiée vers 1630. La Belinaye relevait de la seigneurie de Fougères et a été érigée en vicomté en 1681. Elle exerçait à Saint-Ouen-des-Alleux un droit de haute justice. Propriété de la famille Fouque en 1408, cette famille prit par la suite le nom de la Belinaye. Elle passe ensuite aux mains de la famille d'Orange. Durant la Révolution Charles de la Belinaye émigra, le château est vendu comme bien national et manque d'être détruit,  restitué à la famiille jusqu'en 1920  La construction du château actuel est due à César de la Bélinaye ou bien à son fils Charles 1er de la Bélinaye qui étaient seigneurs du lieu du début du XVIIe siècle. Le château date de l'époque Louis XIII (1610-1643), il a toutefois subi des remaniements au cours du XIXe siècle, particulièrement en ce qui concerne le corps de bâtiment sud-ouest, perpendiculaire au corps de logis principal, la  toitures à croupes à faible pente, encadrements de baies et chaînages d´angles réalisés en granite bleu.  L´architecture de ce château est particulièrement intéressante car il existe assez peu de bâtiments de cette époque et de ce style sur ce territoire. Au centre de l'édifice un escalier de pierre est accusé à l'extérieur par un dôme à l'impériale surmonté d'un toit en carène que termine un clocheton à deux coupoles. A la fin du XIXe siècle, il existait dans le château une belle statue de la Sainte-Trinité, elle provenait de l'ancienne chapelle d'Orange, à Vieux-vy. Le château conserve un colombier. Éléments protégés MH : les façades et les toitures du château de la Bélinaye : inscription par arrêté du 25 septembre 1968. Propriété de monsieur Léger.","architecture":"PETIT-MOULINET, ce château est construit en granite, les encadrements de baies et les chaînages d'angles en bossage sont en pierre de taille de granite. La corniche à modillons a été réalisée en granite également. Le toit à la Mansart est couvert d'ardoise et surmonté d'un clocheton central. Ce château possède quatre niveaux d'élévation, cave, rez-de-chaussée, premier étage et combles à la Mansart. La travée centrale est légèrement en saillie à partir du premier étage, ce niveau possède des balcons équipés de grilles en fer forgé. Cette travée se termine par une lucarne surmontée d'un fronton semi-circulaire. Les autres ouvertures du comble brisé sont des oculi. La lucarne de la façade postérieure porte le nom du commanditaire: Louis Jolivet et la date 1891. Les quatre angles de l'édifice sont ornés d'échauguettes couvertes de toit en poivrière. A l'intérieur un escalier central en bois à balustres dessert les différents niveaux. Au nord-est et à l'est du château, se trouvent des bâtiments pour lesquels les mêmes matériaux que sur le château ont été employés.                                                                   VIEUX VY dans la campagne de Vieux-Vy sur Couesnon, à deux pas de la vallée du Couesnon, ce château plein de charme, a été aménagé en 9 logements actuellement loués, où vous pourrez bénéficier d'une qualité de vie exceptionnelle. Cette demeure, en excellent état, est entourée d'un parc paysagé et clos d'environ 8500m². Derrière le château, une belle dépendance avec plus de 200m² aménageable sur deux niveaux. C'est une belle propriété idéale pour investisseur ou pour une activité de chambres d'hôtes etc.","habitants":"Belinaye- Famille Fouque-Belinaye                                                 Petit-Moulinet Famille de : Louis Jolivet \r\n        \"","divers":"Trois châteaux; Bélinaye grav 1-2 à St Christophe et le Petit Moulinet grav-3et Vieux-Vy grav-4 à deux Km à l'ouest.  Petit Moulinet  GPS : 48° 20' 30\" Nord, 1° 29' 22\" Ouest","gps":"48° 20' 30\" Nord, 1° 29' 22\" Ouest","images":["../image/image_35/35_St_Christophe_Valains_1.jpg","../image/image_35/35_St_Christophe_Valains_2.jpg","../image/image_35/35_St_Christophe_Valains_3.jpg","../image/image_35/35_St_Christophe_Valains_4.jpg"]},"Consult_chateau_formulaire70a4":{"id":"Consult_chateau_formulaire70a4","dept":"35","canton":"Saint-Malo","commune":"Saint-Coulomb","nom":"St_Coulomb","type":"Château","periode":"XI-XIII-XVI","histoire":"FORT DUGUESCLIN, la première construction fut bâtie en 1026 par un membre de la famille Du Guesclin, un imposant château fort flanqué de trois tours et d'un donjon, protégé par deux cercles d'enceintes et doté d'une citerne profonde de 33 mètres. En 1207, Jean sans Terre, roi d'Angleterre, fit occuper le fort jusqu'à ce que Juhel III de Mayenne en chassât les Anglais à la suite de sanglants combats. Les du Guesclin, trouvant le site trop exposé, quittèrent le fort vers 1259 et s'établirent non loin de là, dans les terres, au Plessis-Bertrand que venait de faire construire l'arrière-arrière-grand-père de Bertrand Du Guesclin. Le fort, démantelé depuis, fut racheté en 1500 par Guillaume de Châteaubriant et revendu en 1589 à la Maison de Rieux. Finalement, de 1757 à 1759 l'ancienne construction fut rasée et Vauban y fit construire un fort comprenant une caserne avec magasin à poudre et des plateformes à canons pour protéger la côte des Anglais.  Ayant perdu son utilité militaire en 1826, le fort fut vendu à des particuliers aux enchères, puis transformé en résidence de villégiature par les habitants civils qui superposèrent deux corps de maison à la garnison formant la bâtisse actuelle. En 1942, pendant l'établissement du Mur de l'Atlantique, les lieux furent occupés par l'armée allemande qui réaménagea les anciennes meurtrières et y installa un canon antiaérien. Après le débarquement de 1944, le fort retourna dans des mains civiles, d'abord en possession du maire de Saint-Servan qui ensuite le vendit en 1959 au chanteur Léo Ferré qui y résida jusqu'en 1968, y composant de nombreuses chansons, notamment La Mémoire et la mer. Laissé à l'abandon à la suite d'un partage de biens difficile, le fort fut racheté en 1996 aux héritiers de Léo Ferré par la famille Porcher, qui restaura la bâtisse et entretient depuis cette résidence exceptionnelle.","architecture":"DUGUESCLIN, la forteresse est fondée en 1160 par un du Guesclin. Vers 1259, les du Guesclin quittent le site trop exposé pour s'établir au Plessis Bertrand. La forteresse est démantelée dès le moyen-age et rasée de 1757 à 1759 pour la construction d'un fort et ensuite transformé en résidence de villégiature au XIXe siècle.                                                                  VILLE -BAGUE, la construction du logis peut être attribuée à l'une des plus grandes famille de Saint-Malo aux XVIIe et XVIIIe siècles, les Magon de la Chipaudière, propriétaires à partir de 1695, mais le logis, de type malouinière, semble légèrement postérieur. A l'intérieur le papier peint du grand salon date de 1820 (manufacture Dufour et Leroy) et représente l'arrivée de Pizarre chez les Incas. Il fut posé dans les salons de la Ville Bague à la demande de Hiacynthe de Penfentenio, marquis de Cheffontaines et de son épouse Julie-Marie-Rose Eon à leur retour d'exil. Exemplaire exceptionnel dans sa version intégrale, ce panoramique fut déposé et vendu en 1972 et retrouvé à vendre sur le marché de l'art en 1976. Très endommagé, il a été restauré par les Beaux-Arts à Paris qui, par chance, en possédaient un autre exemplaire intact au musée des arts décoratifs. Le jardin a été aménagé à la fin du XVIIe siècle, et l'on peut lire son tracé sur le relevé des Côtes de France. Du tracé original ne subsistent aujourd'hui que l'enceinte et le tracé des deux premières terrasses, la dernière ne faisant plus partie de la propriété. Un parc paysager a été redessiné au XIXe siècle, flanqué d'un potager et d'une roseraie au niveau de la deuxième terrasse. Le parc a conservé son aspect global du XIXe siècle, des parterres à la française ont été replantés sur la deuxième terrasse après les ravages causés par la tempête. Construite en 1690 par Julien Eon, Sieur de la Ville Bague, et consacrée par l'évêque de Dol en 1695, la chapelle Sainte-Sophie date de l'ancien manoir qui se tenait à la place de l'actuelle malouinière.","habitants":"Famille de Guillaume de Châteaubriant                                             Fort Duguesclin; chanteur Léo Ferré \r\n        \r\n        \"","divers":"a Saint-Coulomb, le fort Duguesclin et la ville Baguer gps 48° 40' 30\" nord, 1° 54' 42\"  ouest","gps":"","images":["../image/image_35/35_St_Coulomb_1.jpg","../image/image_35/35_St_Coulomb_2.jpg","../image/image_35/35_St_Coulomb_3.jpg"]},"Consult_chateau_formulaire2cad":{"id":"Consult_chateau_formulaire2cad","dept":"35","canton":"Saint-Malo","commune":"St-Coulomb","nom":"St_Coulomb_4","type":"Château","periode":"XV-XVII","histoire":"FOSSE HINGUANT, en 1656, elle devient la propriété dOlivier Trublet des Champs, son second fils, Joseph Trublet de Nermont, un intrépide capitaine de navire, fut un des premiers à se rendre en 1703 dans les mers du sud et  sur les côtes du Chili et du Pérou. Il y fit sa fortune et contribua à la création de la « Compagnie des Mers du Sud » et à lenrichissement fabuleux des Malouins. En 1710, le vieux manoir se transforme alors en « Malouinière » avec la réalisation dune chapelle sous le vocable de Saint Roch. En 1793, sous la révolution, se déroulera lépoque la plus dramatique de cette demeure. Marc Desilles Michel de Cambernon, qui avait hérité du domaine par son épouse (petite-fille dOlivier Trublet), qui devient le trésorier de lassociation de la « Conjuration Bretonne », fondée par Armand Truffin, Marquis de la Rouërie. Parmi les amis et membres de lassociation, le docteur Chevetel, très proche de Danton, les trahira. La plus jeune fille de la maison, Angelique Desclos de la Fonchais, jeune mère de deux enfants y fut arrêtée avec les conjurés et conduit à Paris pour y être guillotinés. Son père Marc Desilles arriva à senfuir en passant par la « Ville Bague » pour rejoindre Jersey où il mourra un an plus tard. Transformée en caserne républicaine, puis abandonnée, la maison nest rendue à la famille Desilles Michel de Cambernon quen 1799, mais les deux surs rescapées des purges de la Révolution ny reviendront jamais. En 1820, la maison est alors rachetée par Emmanuel le Joliff qui la restaure. Puis, ce sera la Marquise Aubert de Trégomain qui possédera le domaine par hypothèque de 1913 à 1918. puis, les Petit Macé de la Villéon achètent cette Malouinière et la transmettent à leur fille, Madame Ivan de Dieuleveult qui y demeure jusquen 1991. Depuis, sa fille ainée, épouse de Bernard de Prat occupe la Fosse Hingant.","architecture":"La FOSSE HINGANT, la terre est connue depuis 1418 comme relevant de la seigneurie du Plessix Bertrand. La terre fut achetée en 1657 par Olivier Trublet, sieur des Champs, une des plus vieilles familles de la bourgeoisie malouine, qui l'a transmise à son fils François, commissaire général de la marine à Saint-Malo de 1732 à 1739 et qui a été le premier à prendre le titre de sieur de la Fosse-Hingant, il semble voir en lui le fondateur de l'édifice. Après être passée par alliance à la famille Désilles, liée au complot de la Rouërie, et après le drame auquel elle a laissé son nom, la Fosse-Hingant est abandonnée, puis louée à un fermier avant d'être vendue en 1821 à Emmanuel Hippolyte Le Joliff. La rénovation de l'édifice est suivie par une modification de la cour, agrandie et complétée par la construction du pavillon en forme de temple néo-classique, à portique dorique, dont l'architecture est un exemple unique dans la région de Saint-Malo.","habitants":"Famille d'Olivier Trublet des Champs\r\n        \r\n        \"","divers":"Château de la Fosse Hinguant","gps":"","images":["../image/image_35/35_St_Coulomb_4_1.jpg","../image/image_35/35_St_Coulomb_4_2.jpg","../image/image_35/35_St_Coulomb_4_3.jpg"]},"Consult_chateau_formulaire89c1-2":{"id":"Consult_chateau_formulaire89c1-2","dept":"35","canton":"Saint-Malo","commune":"Saint-Coulomb","nom":"St_Coulomb_II","type":"Château","periode":"XII-XVIII-","histoire":"Deux châteaux dans cet article; Mettrie aux Houets et Plessis- Bertrand                                                                                                         METTRIE AUX HOUETS   inscription par arrêté du 29 avril 1993, La Mettrie aux Louëts est une malouinière construite dans le premier quart du XVIIIe siècle (la chapelle est datée 1725), qui possède encore un rare ensemble d'éléments, intérieurs et extérieurs, caractéristique de la demeure noble. L'entrée se fait par une grille monumentale entourée de deux sauts de loup en quart de cercle reliant la grille d´un côté à la chapelle, de l'autre au \"colombier\" ; des communs à arcades encadrent la cour d'honneur. Devant l'entrée, une fausse avenue accentue l'axe de la composition. La façade arrière donne sur une terrasse surélevée puis des jardins à la française avec bassin, tapis vert, miroir d'eau encadré de folies d'angle. L'intérieur a conservé son escalier à balustres de bois, des lambris d'un dessin très strict, des parquets à larges lames et quelques alcôves. Philippe Bonnet, à l'occasion de la Commission régionale du patrimoine historique, archéologique et ethnographique du 28 janvier1993, déclare : l'ensemble de la Mettrie-aux-Louëts dont la chapelle est datée de 1725, réunit tous les éléments de la demeure noble : grille, saut-de-loup, chapelle, colombier, communs à arcades encadrant la cour d'honneur et jardin avec miroir d'eau. Devant l'entrée, une fausse avenue accentue l'axe de la composition. Le saut-de-loup en demi-lune correspond à l'esthétique nouvelle de la maison des champs : il ferme l'accès, de façon surtout symbolique, en laissant dégagé l'aspect de l'architecture. Sur la façade, la travée axiale est détachée de ses voisines et contribue à recréer l'idée d'un avant-corps central.","architecture":"PLESSIS BERTRAND, vestiges, Au lieu du même nom, sur un îlot rocheux, un aïeul du célèbre connétable de France, bâtit une première forteresse au XIIe siècle, abandonnée au profit d'un nouveau château-fort au Plessis Bertrand à partir de 1259. L'architecture conserve les traces de ces occupations anciennes ; de  ses forteresses, mais aussi plusieurs croix de chemin datant de l'époque médiévale ou encore le moulin à eau du Lupin attesté depuis 1181. Trois tours portaient autrefois les noms de tours de l'Aigle, du capitaine et du Guesclin. Il possédait un colombier et une chapelle privée. Ce château est pris en 1387 par les partisans d'Olivier de Clisson dans sa lutte contre le duc Jean IV, et en 1589 par le duc de Mercur. Le Maréchal de Brissac l'attaque pour le roi en 1597 et en 1598 : le château capitule . Il fut démantelé sur l'ordre du roi Henri IV. Le Plessis-Bertrand avait jadis un droit de haute justice. D'abord dans l'acquisition de manoirs, leur transformation, puis l'édification de nouvelles maisons des champs appelées malouinières. C'est une des caractéristiques de son patrimoine. Ancien château fort construit par un oncle de Bertrand Du Guesclin. Neuf tours en flanquaient la courtine. Un pont-levis donnait accès à la cour en hémicycle. Trois souterrains permettaient de quitter la forteresse. Le château assurait la défense contre les attaques anglaises. Le château fut la propriété de Pierre II du Guarplic puis il passa à Pierre III, auquel il appartenait en 1364, ainsi qu'il résulte d'un acte par lequel ce dernier, fait prisonnier à la bataille d'Auray, il emprunta 1500 écus d'or à son gendre Jean de Beaumanoir, en lui donnant comme caution toutes les terres et dépendances du Plessix-Bertrand  hors le châstel, le parc et le domaine. Henri IV le fit raser, comme dernier repaire des Ligueurs.  inscription au M.H.par arrêté du 18 décembre 1969.","habitants":"Mettrie;. Philippe Bonnet                                                                                                 Plessis-Bertrand; du Guesclin\r\n        \"","divers":"Deux châteaux dans cet article; Mettrie aux Houets et Plessis- Bertrand                                                                                           Plessis GPS : 48° 40' 30\" Nord, 1° 54' 42\" Ouest                                                                     Mettrie GPS : 48°40'3,25\" Nord, 1° 55' 43,79\" Ouest","gps":"48° 40' 30\" Nord, 1° 54' 42\" Ouest","images":["../image/image_35/35_St_Coulomb_II_1.jpg","../image/image_35/35_St_Coulomb_II_2.jpg","../image/image_35/35_St_Coulomb_II_3.jpg"]},"Consult_chateau_formulaire3c14":{"id":"Consult_chateau_formulaire3c14","dept":"35","canton":"Saint-Malo","commune":"St-Coulomb","nom":"St_Coulomb_III","type":"Château","periode":"XI-XVI","histoire":"La MOTTE-JEAN, les du Guesclin se sont succédé à la Motte-Jean depuis les années 1100. Le frère de Bertrand au XIVe siècle, les Eon, les marquis du Hindré (propriétaires de 1513 à 1756). Achetée en 1756 par le grand-père de Robert Surcouf, la Motte-Jean servit de dot en 1764 à sa fille Bertranne Surcouf (1746-1823), qui épousa Thomas Marie Potier de la Houssaye (1732-1806), armateur malouin. De ce mariage est né Joseph Marie Potier de la Houssaye (1768-1830), capitaine de vaisseau corsaire. À la veille de la Révolution française, la famille Potier de La Houssaye vend le château aux Grout de Beauvais, propriétaires jusqu'après la Première Guerre mondiale. L'officier de marine Grout de la Motte fut l'un des chefs de la conspiration du Marquis de la Rouerie, guillotiné le 18 juin 1793 à Paris avec 17 autres, dont quatre jeunes filles de leur famille. Le cadastre de 1913 indique : Henri Grout de Beauvais du Meurtel, mineur sous la tutelle de sa mère au château du Meurtel, commune de Plévenon (Cotes du Nord).\r\nLa Motte-Jean fut rachetée en 1925 par son fermier, dont les petits-enfants la revendirent en 1975 à Philippe Luyt.","architecture":"La MOTTE-JEAN est construite sous l'ancienne forteresse de du Guesclin arasée au XVIIe à 2 mètres de haut, peut-être sur l'emplacement d'une villa romaine et au-dessus du ruisseau de la Trinité à l'Est. Sur la Terrasse Ouest, on peut observer deux bassins, dont l'un est partiellement comblé, qui datent de cette époque.Cette fortification servait de casernement aux troupes du frère du célèbre Connétable Bertrand du Guesclin, qui gardaient les côtes pour le compte du Roi de France contre les Anglais et le Duc de Bretagne. L'ancienne motte féodale (une construction défensive constituée d'une butte artificielle en terre) bénéficie d'une topographie favorable, qui a permis l'utilisation d'une butte naturelle   À la croisée de ses anciennes rabines, la Motte-Jean est dans sa forme actuelle une superbe construction du début du XVIIe siècle (1625), d'aspect seigneurial, avec un corps central flanqué de pavillons en saillie aux extrémités ; elle a servi de modèle à la Giclais construite 50 ans plus tard à Saint-Servan.À l'intérieur, subsistent un grand escalier Renaissance avec une très belle rampe en bois sculpté, quelques boiseries, deux vastes cuisines à cheminées monumentales, dont une à four à pain dans l'aile Nord, de grandes pièces avec des plafonds avec poutres et solives sculptées Renaissances et de belles cheminées en granit.\r\nÀ l'Ouest se trouve l'ancienne forteresse avec ses pièces d'eau à laquelle mène un escalier à double évolution. La vue vers l'Est est plaisante, le jardin français en contrebas de la terrasse est bordé par une peupleraie le long du ruisseau de la Trinité qui sépare Saint-Coulomb et Cancale.","habitants":"Joseph Marie Potier de la Houssaye\r\n        \"","divers":"Motte jean GPS : 48° 40' 37' Nord, 1° 53' 10\" Ouest","gps":"48° 40' 37' Nord, 1° 53' 10\" Ouest","images":["../image/image_35/35_St_Coulomb_III_1.jpg","../image/image_35/35_St_Coulomb_III_2.jpg","../image/image_35/35_St_Coulomb_III_3.jpg"]},"Consult_chateau_formulairecb52":{"id":"Consult_chateau_formulairecb52","dept":"35","canton":"Saint-Malo","commune":"ST-Malo st-Servan","nom":"St_Malo","type":"Château","periode":"XVI-XVII-XIX","histoire":"Quatre châteaux dans cet article; Château-Dore,  Briantais , Limoelou et Puits-Sauvage.                                                                                                            CHATEAU DORE, cet édifice est l'une des premières malouinières dont la construction pourrait être attribuée à la famille d'armateurs Magon. L'architecture laisse supposer une construction des années 1660. La sobriété, la symétrie de l'architecture, le bandeau dessiné sur l'enduit annoncent l'architec
