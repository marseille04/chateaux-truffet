is Sylvain Brunet. Corps de bâtiment de plan polygonal avec trois échauguettes sur les angles. Importante tour circulaire couverte en poivrière sur la façade principale. Communs du XVIe siècle. Logis du XVIIIe siècle agrandi au XIXe siècle, après 1832, date du cadastre ancien. Chapelle détruite après 1832.","architecture":"MOLIERE, au sud à St Senoux  L'édifice fut construit dans la première moitié du XVIIIe siècle : la chapelle porte la date 1722, et le colombier date de la même époque ; l'orangerie porte la date de 1830. Le château est composé d'un sous sol en rez-de-chaussée et d'un étage carré. Le gros-oeuvre : brique ; calcaire ; granite ; enduit partiel, élévation ordonnancée. Couverture : toit à longs pans; croupe et toit en pavillon, couverts d'ardoise. Parc avec une belle allée d'ifs.","habitants":"Bagatz ;Famille de  Talhouët de Boishorand,\r\n        \"","divers":"Deux château dans cet article ; Batgatz  Molière à St- Senoux  Bagatz grav de 1 à 5, Molière grav-6                                              gps 47° 58' 05\" nord, 1° 47' 38\" ouest","gps":"","images":["../image/image_35/35_Guichen_1.jpg","../image/image_35/35_Guichen_2.jpg","../image/image_35/35_Guichen_3.jpg","../image/image_35/35_Guichen_4.jpg","../image/image_35/35_Guichen_5.jpg","../image/image_35/35_Guichen_6.jpg"]},"Consult_chateau_formulaire8b26":{"id":"Consult_chateau_formulaire8b26","dept":"35","canton":"Redon","commune":"Guipry","nom":"Guipry_35","type":"Château","periode":"XII-XV-XVII-XIX","histoire":"quatre châteaux dans cet article de Guipry; Champs, Guipry-Messac, Provotière  et Boeuvres.                                                        CHAMPS, vers 1710, le château des Champs est considérablement agrandi en utilisant les matériaux provenant du démantèlement du château de Lohéac. Le château, la chapelle, les dépendances et les communs sont entourés de douves. Le corps de logis principal se termine, aux deux angles côté douve, par une tour d'angle à meurtrières avec grilles. Vers la cour centrale, il se retourne du côté Est en une aile simple, et à l'ouest par un pavillon. La porte à fronton entre pilastres classique ouvre sur une cour intérieure. A l'opposé, sur le quai de la douve, le passage est en plein cintre. Le salon du premier étage, possède douze fresques du XVIIIe siècle, à thème biblique. La chambre bleue présente deux panneaux de bois peint du XIXe siècle, signés \"Cavaille et Koll\".\r\nÉléments protégés MH : les façades et les toitures du château et de ses dépendances, inscription par arrêté du 6 mai 1966.                                                                                GUIPRY -MESSAC, édifiée au XIIe siècle dans un style roman, elle est remaniée aux XVe et XVIe avec l'ajout de nef latérales. On remarque une ancienne porte romane à voussures cintrées, côté sud, jadis portail principal et alors doté d'un porche. Au XVIIIe siècle, la construction d'une tour à l'ouest supportant le clocher modifie l'accès. Un retable du XVIIe siècle, dans le chur, inspiré d'une uvre de Rubens, des vitraux réalisés durant l'entre-deux-guerres figurant notamment un prêtre réfractaire guillotiné, sont à observer. C'est également dans les années 1930 que le style roman des piliers de la nef a été remanié.","architecture":"PROVOTIERE, lorigine de Guipry remonte au-delà du Xe siècle, puisquen 907 le comte de Vannes, Gurmailhon, donna cette paroisse à labbé Catuallon de Redon. Au siècle suivant, en 1089, Riou de Lohéac fit don à la même abbaye de tout ce quil possédait en Guipry. En 1165, labbaye de Montfort eut son tour, et reçut de Pierre de Lohéac et de son épouse Havoise une partie de ce quils possédaient en la paroisse de Guipry, où existait dès lors une halle qui fut comprise dans la donation. A ces preuves de l'antiquité de Guipry, il faut ajouter l'existence, au XIVe siècle, du château Blanc, qui relevait des sires du Plessis-Angers, et qui, détruit dans les guerres de cette époque, a laissé des ruines près de la Vilaine. Quelques-uns de ses contemporains, plus heureux, le château des Champs, de la Provôtière, Quémillac, le Bouexic, ont survécu dans des constructions modernes. Le manoir de la Provôtière, attesté en 1427, représenté dans un manuscrit décrivant le cours de la Vilaine en 1543, est en ruines pendant la Révolution Française, l'édifice a été reconstruit au XIXe siècle. La ferme du château date principalement de la première moitié du XXe siècle.                                                                                                                                 BOEUVRES, sur le plan de l'architecture civile, le château seigneurial de Boeuvres  du XVIIe, reconstruit au début du XXe siècle, celui de la Pommerais (XVIIe), ou encore le manoir du Vautenet (XVIe, restauré) valent le coup d'il. Comme l'imposant moulin de la Perrais (XVIIIe), haut de 10 m, divisé en quatre étages, qui abrite toujours une meule de silex ou encore \"l'ermitage\", bâtiment cellulaire offert à un ermite par le seigneur local au XVIIIe.","habitants":"Seigneurs locaux\r\n        \"","divers":"quatre châteaux dans cet article de Guipry; Champs grav-2, Guipry-Messac grav -4-5, Provotière grav_3  et Boeuvres grav 6.                                                                                         Gps 47° 49' 32\" nord, 1° 50' 29\" ouest","gps":"","images":["../image/image_35/35_Guipry_35_1.jpg","../image/image_35/35_Guipry_35_2.jpg","../image/image_35/35_Guipry_35_3.jpg","../image/image_35/35_Guipry_35_4.jpg","../image/image_35/35_Guipry_35_5.jpg"]},"Consult_chateau_formulairea0a2":{"id":"Consult_chateau_formulairea0a2","dept":"35","canton":"Châteaugiron","commune":"Servon sur Vilaine","nom":"Gué_Servon","type":"Château","periode":"XV-XIX","histoire":"GUE, cette seigneurie possédait un droit de haute justice. Le premier seigneur du lieu connu est Georges du Gué vers 1350. En 1567, le château passe à la famille de la Marzelière, et en 1669, il est acheté par la famille Marboeuf, et ensuite par les Picot du Boisfeuillet en 1745 et enfin par les Gouyon de Thaumatz en 1775.  le château est un  lieu de certaines légendes comme celle de cette madame Courteille qui y serait morte et hantait le curé du coin. Au château eut également lieu en 1677 le mariage des parents de celui qui fondera en 1709 à Paris la congrégation du Saint-Esprit : Claude Poullart.","architecture":"GUE, ce château est composé d'un corps de logis principal élevé en pierre de taille de schiste et couvert d'un toit à croupes en ardoise. Les angles de ce bâtiment présentent des tourelles en encorbellement, construites en petites briques et couvertes d'un toit d'ardoise en poivrière. Le toit à croupes du logis et les toits en poivrière des tourelles possèdent des épis de faîtage. Ce corps de logis est relié à la chapelle du château par une galerie située à l'ouest de ce dernier. Cette galerie est bâtie en moellon de schiste et possède un toit à la Mansart couvert d'ardoise. Les encadrements de baies et la corniche sont en tufeau. Le comble à la Mansart est éclairé par des lucarnes en tufeau à frontons triangulaires pour certaines et décorées de volutes. La chapelle, située au sud-ouest du logis, possède un plan octogonal. Elle est élevée en moellon de schiste et les encadrements de baies, les chaînages d'angle sont en tufeau. Les baies de l'étage sont des fenêtres en plein cintre. Ces trois éléments reliés entre eux: le corps de logis, la galerie et la chapelle sont entourées de douves empierrées qui forment un espace central quadrangulaire. Hors de cet espace clos de douves, s'élèvent au sud-ouest, les écuries du château. Elles sont bâties sur le même modèle que la galerie; maçonnerie de schiste, encadrements et chaînages en tufeau et couvert toit à la Mansart. Il existe deux avant-corps aux extrémités du bâtiment, ils sont couverts d'un toit en pavillon. Ce bâtiment possède une corniche composée de corbelets en bois sculptés. A l'est du château, un vivier de forme quadrangulaire ainsi que le moulin du Gué. Ce château est situé sur la rive droite de la Vilaine, à l'ouest du bourg, il dépendait autrefois de Noyal sur Vilaine. Il tire son nom de la présence d'un gué à cet endroit. Cette seigneurie possédait un droit de haute justice.","habitants":"famille Marboeuf\r\n        \r\n        \r\n        \r\n        \"","divers":"A Servon sur Vilaine le château du Gué  gps   48° 07' 17\" nord, 1° 27' 38\" ouest","gps":"","images":["../image/image_35/35_Gu%c3%a9_Servon_1.jpg","../image/image_35/35_Gu%c3%a9_Servon_2.jpg","../image/image_35/35_Gu%c3%a9_Servon_3.jpg","../image/image_35/35_Gu%c3%a9_Servon_4.jpg"]},"Consult_chateau_formulairec6ea-2":{"id":"Consult_chateau_formulairec6ea-2","dept":"35","canton":"Melesse","commune":"Gévezé","nom":"Gévezé","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article Beauvais et  la Cotardière  à Parthenay de Bretagne à 3 Km au sud est.                                           BEAUVAIS, le château a remplacé un manoir appelé, en 1427, \"hostel de Beauvois\".Reconstruit par Bonabes Biet à partir de 1587, et au XVIIe siècle par un membre de la famille de Lescu de Runfao conseiller au Parlement de Rennes. Gilles de Lescu, était seigneur de Beauvais à partir de 1670. En 1680, Louis XIV érige la seigneurie en comté. L'édifice date, en majorité, du XVIIe siècle. La famille  Cornon  ont rendu au manoir un aspect du XVIIe siècle.                                                                                                                  COTARDIERE, à Parthenay reconstruite à la fin du XIXe siècle. Sur le site ancien d'un manoir dont ne subsistent que quelques éléments utilisés en remploi, de style éclectique, est reconstruit en 1895. Le bâtiment était autrefois doté d'un perron en pierre et d'une chapelle. La demeure est composée de deux corps de bâtiments en équerre. Cheminée du XVe siècle remployée, avec sur le manteau les armes des Louvel, propriétaires du XIVe au XVIe siècle. A noter que seul le château de la Cotardière est conservé parmi les châteaux et manoirs de cette commune, les anciennes demeures nobles ont été détruites ou pour l'essentiel transformées en fermes. Logis à un étage carré ; toit à longs pans, toit en pavillon, croupe ; escalier dans oeuvre ; clôture de jardin en maçonnerie de terre.","architecture":"BEAUVAIS, le château se présente, dans une disposition générale en L, un corps de logis de plan longitudinal animé de deux tours circulaires à toiture en dôme sur les flancs et d'une tour hors oeuvre couverte en pavillon sur le mur nord -ces derniers éléments sont attachés au corps principal par diverses formes de liaison couvertes de toitures bombées,  une aile en retour complète la demeure. Au sud un pigeonnier en terre en mauvais état mérite la plus grande attention. La construction  date de la première moitié du XVIIe, XVIIIe et XIXe siècles,  le château est bâti en équerre et flanqué de deux tours rondes aux extrémités de la grande aile avec, au centre, une tour carrée. L'escalier principal est entièrement en granit. L'escalier secondaire est en bois et à balustres. La plupart des pièces ont conservé leurs boiseries, d'époque Régence. la façade sud est prolongée par deux pavillons aux toit en carène et des tours rondes couvertes en dôme. Au centre, une belle lucarne au dessus de la porte à fronton triangulaire précédée d'un double perron. La façade  nord offre une pittoresque variété de toits.\r\nÉléments protégés MH de la maison d'habitation et l'allée d'accès au château : inscription aux M.H.  par arrêté du 12 juin 2009.","habitants":"Beauvais Famille de Lescu de Runfao                                                Cotardière\r\n        \r\n        \"","divers":"Deux châteaux à Cevézé  Beauvais grav-1-à  6 et  la Cotardière grav-7à Parthenay de Bretagne à 3 Km au sud est.   Beauvais GPS : 48° 13' 09\" Nord, 1° 47' 17\" Ouest                                              Parthenay 48° 11' 31\" nord, 1° 49' 41\" ouest","gps":"48° 13' 09\" Nord, 1° 47' 17\" Ouest","images":["../image/image_35/35_G%c3%a9vez%c3%a9_1.jpg","../image/image_35/35_G%c3%a9vez%c3%a9_2.jpg","../image/image_35/35_G%c3%a9vez%c3%a9_3.jpg","../image/image_35/35_G%c3%a9vez%c3%a9_4.html","../image/image_35/35_G%c3%a9vez%c3%a9_5.jpg","../image/image_35/35_G%c3%a9vez%c3%a9_6.jpg","../image/image_35/35_G%c3%a9vez%c3%a9_7.jpg"]},"Consult_chateau_formulaire4432":{"id":"Consult_chateau_formulaire4432","dept":"35","canton":"Val-Couesnon","commune":"St-Hilaire des Landes","nom":"Haye","type":"Château","periode":"XIV-XVII","histoire":"La HAYE, près du château une enceinte fortifiée, Le nom même de \"la Haye\"  La seigneurie de la Haye Saint-Hilaire est une des plus anciennes connues dans le pays de Fougères. Les premiers seigneurs apparurent dans les textes au XIIe siècle et la seigneurie est restée dans les mains de la même famille, par filiation directe, jusqu'à aujourd'hui.  en 1163 à Guillaume de la Haye fit don à l'abbaye de Rillé de tous les droits, Jean de la Haye   épousa Marguerite de lignières un fils qui épousa Marie Cassin . Au XVIe siècle Léon II de la Haye  un fils René. Cette seigneurie possédait des fiefs à Saint-Hilaire, mais également dans les paroisses voisines : Saint-Marc-le-Blanc, Saint-Sauveur-des-Landes, Saint-Etienne-en-Coglès, Saint-Ouen-les-Alleux ou La Chapelle Saint-Aubert.  Anne de la Haye  décède en 1699  et Louise de Canabert sa femme, laisse le domaine à son fils Basile rend aveu pour la seigneurie  en 1700, s'éteint sans postérité, laissant le domaine à un neveu Christophe qui épouse Bénigne de la Motte-Morel la vielle de la Révolution, le domaine est au mains de Louis François de la Haye ce dernier émigre les biens vendu, au retour il parvient à racheter une partie du domaine et meurt à Rennes en 1800 passa à ses deux fils  Louis et Charles-Edouard prendront par dans la chouannerie. Le château est resté depuis ses origines la propriété de la famille La Haye Saint-Hilaire. En 2019, les héritiers du comte Lionel de La Haye Saint-Hilaire, décédé en mars 2016, mettent le château en vente.","architecture":"La HAYE, fut érigée en châtellenie en 1593 et 1619, avec droit de haute justice au bourg de Saint-Hilaire. La famille de la Haye Saint-Hilaire donna cinq gouverneurs de Fougères dont l'un d'eux, René (1568-1593), donna son nom à la tour d'entrée sud du château de Fougères. L'actuel château   est composé d'éléments de diverses époques, allant du XIVe siècle au XVIIe siècle. De l'époque médiévale, il reste la structure globale du site, avec la cour carrée bordée de douves, une ancienne porte fortifiée et la tour de guet située en son centre. Ces éléments sont les vestiges conservés après les travaux entrepris par Henri de Saint-Hilaire au début du XVIIe siècle dans le but d'agrandir et de fortifier sa demeure, mais ces nouvelles fortifications furent interdites par le roi en 1619. Henri mourut en 1622, après avoir modifié l'ancien donjon, implanté au sud-ouest de la cour, mais sans avoir terminé son projet initial. De cette première phase de travaux, il subsiste la partie Est du logis ainsi que la partie centrale. Le logis dans la continuité fut construit dans la deuxième moitié du XVIIe siècle. Autour d'une cour carrée, le château comprend un logis principal (au sud-est), un pavillon, des communs (à l'ouest) et une chapelle dédiée à la Sainte-Famille (dans langle nord-est). Une tour ronde datant du XIIIe siècle se trouve au milieu de la cour.  Lensemble est entouré de douves ; un pont et un portail marque lentrée principale de l'ensemble.","habitants":"famille de la Haye Saint-Hilaire\r\n        \"","divers":"St-Thurial, Haye-Chapeau grav-1       Haye                                                                       GPS : 48° 20' 42\" Nord, 1° 20' 55\" Ouest","gps":"48° 20' 42\" Nord, 1° 20' 55\" Ouest","images":["../image/image_35/35_Haye_1.jpg","../image/image_35/35_Haye_2.jpg","../image/image_35/35_Haye_3.jpg","../image/image_35/35_Haye_4.jpg","../image/image_35/35_Haye_5.jpg","../image/image_35/35_Haye_6.jpg","../image/image_35/35_Haye_7.jpg","../image/image_35/35_Haye_8.jpg"]},"Consult_chateau_formulaire0b04":{"id":"Consult_chateau_formulaire0b04","dept":"35","canton":"Melesse","commune":"Hédé-Méillac","nom":"Hédé_Meillac","type":"Château","periode":"XVII-XIX","histoire":"BRETECHE reconstruit au milieu du XVIIIe siècle ; il fut inauguré en 1747, il existait un manoir à la Grande Bretêche dont les bâtiments formaient un U ; le quatrième côté de la cour était fermé par un mur. Ce manoir était composé d'une salle, d'une cuisine et de celliers au rez-de-chaussée ; au dessus, se trouvaient deux chambres et des greniers. Il existait également un bâtiment à la Petite Bretêche qui se composait d'un grand corps de logis orienté au sud, sur le jardin. En 1835, lors de la réalisation du premier cadastre de la commune, il existait beaucoup plus de bâtiments qu'actuellement. La partie nord des constructions correspondait  à la métairie du château. Ce château appartenait, à la fin du XIVe siècle, à la famille de Bintin, seigneurs de Bazouges ; au XVIIe siècle, le château fut vendu aux Bréal, seigneurs du Plessis de Coësmes qui le possédèrent jusqu'à la Révolution. Au XIXe siècle, le château appartenait à la famille Haye des Nétumières puis, au début du XXe siècle, à la famille de la Combe. Les seigneurs de ce lieu exerçaient un droit de police les jours de foire et devaient fournir le bourreau pour l'exécution des criminels. A la fin des années 1950, un bail entre la propriétaire, la comtesse de la Combe, et l'institution de Saint-Jean-Baptiste de la Salle avait été passé afin de créer une institution. Depuis 1970, les bâtiments abritent un Institut Médico-Educatif, le  bâtiment montre qu'il existait une verrière à l'arrière du bâtiment ; celle-ci a été détruite en 1980.","architecture":"BRETECHE, ce château est composé d'un corps de logis central et de deux corps latéraux moins élevés. Ces trois corps de bâtiment sont couverts de toit à la Mansart. En façade postérieure, se trouvent deux tours d'escaliers sommées de toit en dôme. Au sud-est du château, il existe une chapelle.                                                                                                           CHATIERE à st-Symphorien   La construction de ce château remonte  à la fin du XIXe siècle. En effet, en 1835, lors de la réalisation du premier cadastre de la commune, ce bâtiment n'existait pas encore. Pourtant il existait déjà un château de la Châtière à cette époque ; il a été remplacé par le bâtiment actuel à la fin du XIXe siècle. L'ancien château possédait un portail, une fuie et une chapelle. Ces éléments sont visibles sur le cadastre de 1835. La chapelle avait été construite à la Châtière en 1644 par le seigneur du lieu à l'époque : Jacques Beschart. Plusieurs familles de propriétaires se sont succéder ; le château appartenait en effet aux Cheminart au début du XVe siècle, à la fin du XVIe siècle, il était aux seigneurs de Couësbouc et au début du XXe siècle, il appartenait à la famille Alain des Beauvais. Les seigneurs de la Châtière avaient droit de banc et d'enfeu dans l'église Notre-Dame de Hédé. A la fin du XVIIe siècle, le manoir était composé d'un grand corps de logis dont la façade donnait à l'est et d'un autre corps de logis servant de boulangerie. Il existait aussi deux pavillons à l'entrée du lieu, qui était clos et entouré de douves et d'un étang servant à un moulin.                                                                                                                                                                           HEDE BAZOUGES  Les vestiges du château sont situés à Hédé-Bazouges, en Ille-et-Vilaine, sur un promontoire rocheux à l'ouest de la ville de Hédé, qui descend à pic vers le nord, l'ouest et le sud, et d'où l'on jouit d'une vue étendue.","habitants":"Bretèche ; Famille de Bintin                                                         Chatière ;  Famille Alain des Beauvais.\r\n        \"","divers":"A Hédé-Massilac; château de  Bretèche grav-1 et de Bazouches  grav-6-7-8-9   Chatière grav -2-3-4-5                                                                           Gps 47° 28' 58\" nord, 2° 10' 19\" ouest","gps":"","images":["../image/image_35/35_H%c3%a9d%c3%a9_Meillac_1.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_2.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_3.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_4.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_5.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_6.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_7.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_8.jpg","../image/image_35/35_H%c3%a9d%c3%a9_Meillac_9.jpg"]},"Consult_chateau_formulaired897":{"id":"Consult_chateau_formulaired897","dept":"35","canton":"Montfort-sur-Meu","commune":"Iffendic","nom":"Iffendic","type":"Château","periode":"XIV-XV-XIX","histoire":"Cinq châteaux à Iffendic; Breil, la Chasse,la Morinais, du Pin, Bas -Canlou et Treguil.                                                                                                            BREIL, fut la proie des flammes dans la nuit du 27 au 28 juin 1903, a été édifié vers 1860-1863 pour Armand Huchet de Cintré. Le style néo-Renaissance employé n'est pas sans rappeler la production de Jacques Mellet qui a déjà construit plusieurs châteaux de ce type, notamment celui de la Haute Forêt à Bréal-Sous-Montfort. Le premier seigneur connu du Breil semble être Jean du Breil, écuyer de la compagnie du sire de Montfort, son suzerain en 1351, tandis qu'un de ses parents servait dans la compagnie du Sire de Derval. En 1427, le Breil appartenait à famille deThomas de Breil qui possédait également la terre noble de la Ville-Homet   Il a appartenu, tour à tour, propriété des familles du Breil (1480), de la Dobiaye, Frotet, du Pont dEschevilly, Huchet de Cintré                                             La CHASSE  C'est en 1340 au seigneur Raoul de la Châsse, demeure fortifiée destinée à se protéger des pillards et dépendant des comtes de Montfort. Au XVIe siècle, le fief s'agrandit au gré des mariages. EN 1550, Jean II n'ayant pas de fils, son héritière, Bertranne de la Châsse, fit passer la seigneurie à la famille d'Andigné en se mariant à Lancelot d'Andigné. La propriété était divisée en deux parties : la première, implantée sur le vallon, avait la forme d'un quadrilatère entouré d'un mur de schiste et contenait des serres, un grand potager et un verger. La deuxième partie, située en contrebas, était réservée aux châtelains et contenait le parc. La maison des d'Andigné demeura propriétaire de la Châsse jusqu'à l'aube du XXe siècle. L'édifice est reconstruit à la fin du XIXe siècle, dans le style néo-XVIIe siècle, pour la famille de Nicolaï, alliée au d'Andigné. Les bâtiments en place sont en mauvais état de conservation.","architecture":"La MORINAIS, est mentionné dès 1420, il appartient à cette date à Eustache de la Morinaye. Propriété des de la Monneraye, hommes de magistrature, à partir du XVIIe siècle, il avait un droit de haute justice. Rebâti en 1749, on éleva une chapelle qui existe toujours et qui fut desservie par les prêtres de la paroisse jusqu'en 1960 environ avec des périodes d'interruptions. Il fut saccagé et brûlé en partie en janvier 1790 par une bande de paysans armé, il fut restauré au début du XIXe siècle. En 1849, Anna de la Monneraye épousa l'amiral Camille Fleuriot de Langle, famille à laquelle il appartient depuis cette date. La façade sur jardin est composée de huit travées. L'irrégularité de celle-ci témoigne de campagnes successives de travaux. Le corps central, cantonné à l'arrière d'une tour carrée, semble le plus ancien et vraisemblablement antérieur au XVIIIe siècle.                                                                                                           Du PIN   Cette belle demeure construite dans la première moitié du XIXe siècle a été élevé sur un ancien site de manoir. Ce dernier était mentionné en 1420 et 1513 et appartenait au seigneur de ce nom. La chapelle dédiée à Notre Dame de la Salette est une construction néogothique. Elle a été construite pour la famille de la Monneraye, propriétaire du Pin à la fin du XIXe siècle. Communs en place également à signaler. Le château est composé d'un pavillon central entouré de deux ailes plus basses. Selon les propriétaires l'enduit cache une construction en moellons de schiste. Communs en terre. Logement au dessus des écuries avec partie haute en pan de bois chambres d'hôtes.                                                                                   BAS-CANLOU, manoir  aurait été construit vers 1500. L'ensemble du manoir est formé de blocs de schiste minuscules, empilés sans joints. Quelques lignes de blocs de quartz régulières rompent la couleur pourpre de la pierre. La corniche à modillons est taillée dans le granit. Chaque bloc à deux ressauts est finement ciselé. La lucarne de type Renaissance avec ses deux pilastres ressemble à celle de l'ex-Manoir de Bouquidy, qui est très proche.","habitants":"Breil; Familles du Breil                                                                      la Chasse ;  Famille de Nicolaï                                  Morinais;    Amiral Camille Fleuriot de Langle                                   Pin ; Famille de la Monneraye,\r\n        \"","divers":"Cinq châteaux à Iffendic; Breil grav de 1 à 4, la Chasse grav -5-6-7-8,la Morinais, du Pin grav-8, Bas -Canlou et Treguil.  Bas Canlou; GPS : 48° 07' 52\" Nord, 2° 01' 57\" Ouest                                                     Breuil GPS : 48° 07' 29\" Nord, 2° 01' 16\" Ouest                                                   Morinais GPS : 48° 07' 52\" Nord, 2° 01' 57\" Ouest                                        Pin GPS : 48° 07' 52\" Nord, 2° 01' 57\" Ouest","gps":"48° 07' 52\" Nord, 2° 01' 57\" Ouest","images":["../image/image_35/35_Iffendic_1.jpg","../image/image_35/35_Iffendic_2.jpg","../image/image_35/35_Iffendic_3.jpg","../image/image_35/35_Iffendic_4.jpg","../image/image_35/35_Iffendic_5.jpg","../image/image_35/35_Iffendic_6.jpg","../image/image_35/35_Iffendic_7.jpg","../image/image_35/35_Iffendic_8.jpg"]},"Consult_chateau_formulaire0d87":{"id":"Consult_chateau_formulaire0d87","dept":"35","canton":"Montauban-de-Bretagne","commune":"Irodouër","nom":"Irodouer_Landujan","type":"Château","periode":"XVII-XIX","histoire":"Cinq châteaux dans cet article; Quengo,Plessis-Coudray, Ville au Sénéchal et à trois Km à l'ouest le château de Léauville à Landujan.                                                                 QUENGO  Le château fut assiégé et incendié durant les guerres de la Ligue, il est reconstruit vers 1830. On y trouve deux écussons du XVIe siècle aux armes de la famille de la Haye. Un portail de la chapelle limite XVe-XVIe siècle provenant de l'ancien manoir de Villeneuve à Irodouër, détruit ; pavillon à l'est du logis première moitié du XVIIe siècle. L'ensemble du château est rehaussé et modifié dans la deuxième moitié du XIXe siècle, une ferme modèle est élevée au XIXe siècle. La propriété passa successivement aux familles de la Haye en 1513, de Ferron en 1682 et au XVIIIe siècle, Botherel au XIXe siècle, et du Crest de Lorgerie au XXe siècle.\r\n..chambres d'hôtes et un gîte rural .                                                         Château du Maroc à LANDUJAN, les travaux ont été réalisés par l'entrepreneur rennais Jean-Marie Huchet.","architecture":"LEAUVILLE, le château de Leauville du Landujan du XVIIe siècle, il conserve une tourelle d'angle ronde, est entouré de douves. La chapelle Saint-Yves de Léauville, dépendant du manoir de Léauville, est ornée d'une jolie porte gothique et doit remonter, en partie du moins, au commencement du XVIe siècle. Elle est surmontée d'un clocheton. Elle était fondée de messes, et en 1741 Marie-Thérèse Ferron, dame de Léauville, présenta pour les desservir, en place de Guy Clément, décédé, Julien Poulnais. Celui-ci fut remplacé en 1774 par Joseph Davy, présenté par Toussaint de Guéheneuc, seigneur du Boishue, et habitant son manoir de Léauville (Pouillé de Rennes). Propriété successive des familles de Pontelain (en 1427 et en 1513), de Ferron (en 1682), de Guéhéneuc (en 1774) ;    PLESSIS-COUDRAY  du XIXe siècle. Ce château remplace un ancien manoir qui a appartenu successivement aux familles Harel en 1427 et 1513, Botherel en 1774, Du Boishue (fin XVIIIe siècle), et Guéhéneuc jusqu'en 1998. La chapelle du Plessis-Coudray est un édifice moderne fort joli, bâti par la famille de Guéheneuc, propriétaire de ce manoir, et desservie naguère par M. l'abbé Théodore de Guéheneuc, décédé en 1878 (Pouillé de Rennes).                                                                                                                            VILLE AU SENECHAL, quelques éléments isolés du village, antérieurs au XIXe siècle : maison XVIIe siècle au nord-est de l'église, au sud maison limite XVIIIe siècle XIXe siècle, à l'ouest en face de l'église. Un immeuble en pisé porte la date 1845. A partir du milieu du XIXe siècle, évolution vers le type village-rue. Le château de la Ville au Sénéchal a été reconstruit en 1810, date portée sur façade postérieure du logis. Armes des familles Martin et de Launay.  Elévation à travées  à un étage carré, et étage de comble  en   granite, quartzite, schiste, calcaire, terre, moellon, appareil mixte,  toit à longs pans, toit en pavillon, noue couverture en ardoise.","habitants":"Leauville; Famille de Pontelain                                                 Plessis ; Famille de Guéheneuc                                          Quengo; Famille de la Haye                                               Ville-Sénéchal ; Famille Martin et de Launay.\r\n        \"","divers":"Cinq châteaux dans cet article; Quengo grav-1, Maroc grav-6 , Plessis-Coudray grav 2-3, Ville au Sénéchal grav-7-8  et à trois Km à l'ouest le château de Léauville grav4-5 à Landujan.                                 Gps 48° 14' 59\" nord, 1° 57' 03\" ouest","gps":"","images":["../image/image_35/35_Irodouer_Landujan_1.jpg","../image/image_35/35_Irodouer_Landujan_2.jpg","../image/image_35/35_Irodouer_Landujan_3.jpg","../image/image_35/35_Irodouer_Landujan_4.jpg","../image/image_35/35_Irodouer_Landujan_5.jpg","../image/image_35/35_Irodouer_Landujan_6.jpg","../image/image_35/35_Irodouer_Landujan_7.jpg","../image/image_35/35_Irodouer_Landujan_8.jpg"]},"Consult_chateau_formulaireb5ec":{"id":"Consult_chateau_formulaireb5ec","dept":"35","canton":"Fougères","commune":"Dompierre-du-Chemin","nom":"Kodéan","type":"Château","periode":"XIX","histoire":"KODEAN, l'analyse stylistique du bâtiment permet de proposer une datation du début du troisième quart du XIXe siècle. Orain indique que le château a été bâti par le chevalier de Camprond et appartient, en 1882, à M. Le Poullen. D'après Marcel Hodebert, le château aurait été construit en 1860. Décor sobre à l'exception du grand salon qui dispose d'un décor plus élaboré. La distribution d'origine a été entièrement conservée. Ce château est lié à un personnage connu dans le pays de Fougères : Etienne Charles Marie Le Poullen. Né à Dompierre en 1877, Le Poullen en deviendra le maire. Il sera aussi élu conseiller général et succédera à Alexandre Lefas comme député de Fougères. Fervent défenseur des agriculteurs et des granitiers, il a laissé des rapports sur l'assistance aux vieillards, les accidents du travail dans lagriculture, la politique d'allocations familiales. Il mourra à Kodéan en 1963.","architecture":"KOEDAN, est isolé et se situe dans un parc planté d'arbres majestueux et domine le pays. Sa façade antérieure est orientée au sud. Il s'agit d'un édifice de plan massé symétrique composé d'un corps de logis rectangulaire de trois travées flanquées de quatre tourelles polygonales sur les angles. Il comporte un étage de soubassement desservant les services (cour à l'ouest), un rez-de-chaussée surélevé, un étage carré et un étage de comble. Les élévations à travées sont ordonnancées sur quatre niveaux pour chaque élévation. En façade antérieure, se détache un avant-corps axial précédé d'un escalier à une volée double à montées convergentes. La maçonnerie est enduite d'un faux appareil losangé, le soubassement, le bandeau du premier étage, la corniche, les lucarnes, les encadrements de baies et les chaînes d'angle sont en pierre de taille de granite.","habitants":"Etienne Charles Marie Le Poullen\r\n        \"","divers":"A dompiere du chemin  le château de Kodéan                                   Gps  46° 04' 25\" nord, 5° 12' 15\" est","gps":"","images":["../image/image_35/35_Kod%c3%a9an_1.jpg","../image/image_35/35_Kod%c3%a9an_2.jpg"]},"Consult_chateau_formulaire7c3a":{"id":"Consult_chateau_formulaire7c3a","dept":"35","canton":"Guichen","commune":"Maure_de_Bretagne","nom":"Lambardais","type":"Château","periode":"XVI-XVII","histoire":"LAMBARDAIS est construite en 1513 par Jean Mouraud, seigneur de La Pescuère, dont la famille reste propriétaire jusqu'en 1695.  La seigneurie de Maure,  devenu le siège de la vaste seigneurie qui porte son nom au plus tard au XIIIe siècle lorsqu'elle fut partagée en deux membres par les probables descendants de ce personnage. La motte castrale du Ros, unique dans la commune pourrait bien être ce château primitif, à moins qu'elle ne soit qu'un élément d'un ensemble fortifié plus important dont l'église serait l'assiette et les étangs de Maure la ligne de défense septentrionale. Le site fut délaissé pour celui de Crépeneuc, portant aujourd'hui le nom significatif de château de Maure,    ensuite la vente du château à la famille de Visdelou, puis à la famille de Talhouët-Boisorhand. où l'on voit encore d'importantes douves en eau. Les guerres de la Ligue ont dû être fatales au grand manoir des sires de Maure, érigée en comté en 1553 par lettres patentes du roi Henri II. Malgré ces origines prestigieuses, la commune conserve relativement peu d'architecture ancienne.","architecture":"LAMBARDAIS, le manoir de La Lambardais présente une corniche à modillon et un pavillon à toit élevé. Il n'est en 1513 qu'un hébergement roturier appartenant à Jean Mouraud. ce dernier reste propriétaire jusqu'au XVIIIe siècle.   Pastiche des grands manoirs du XVIIe siècle, bien dans le style historique en vogue au XIXe siècle, l'actuel château de La Lambardais n'est plus que l'ombre de sa splendeur passée : son grand corps de logis a été amputé d'une moitié et vendu à l'encan à un marchand de pierres britannique ; à l'est, les anciennes écuries tombent en ruines tandis que l'aile ouest des communs sert de porcherie. Du colombier, il ne reste rien. Quant à la chapelle, elle a été, dit-on, remontée à Lohéac. Le domaine des Bégasson n'a pas non plus échappé à la dévastation : ça et là, quelques lambeaux d'avenues sont les derniers vestiges de ce qui fût sans aucun doute l'une des plus belle pièce du patrimoine de la commune. L'encadrement et les corniches des murs sont en tuffeau. D'anciennes baies (obstruées) du logis subsistant présentent des encadrements en schiste bleu.Les guerres de la Ligue ont dû être fatales au grand manoir des sires de Maure, sans doute démantelé après la prise de la ville par le capitaine René de Grézille en 1597. Le bourg conservera jusqu'à la Révolution les halles et l'auditoire, éléments caractéristiques de la seigneurie banale.","habitants":"famille de Talhouët-Boisorhand\r\n        \"","divers":"A Maures de Bretagne le château de Lambardais                                 gps 47° 53' 08\" nord, 2° 00' 37\" ouest","gps":"","images":["../image/image_35/35_Lambardais_1.jpg","../image/image_35/35_Lambardais_2.jpg"]},"Consult_chateau_formulaireaa83":{"id":"Consult_chateau_formulaireaa83","dept":"35","canton":"Dol-de-Bretagne","commune":"Broualan","nom":"Landal","type":"Château","periode":"XII-XV-XVII-XIX","histoire":"LANDAL,  au XIe siècle son premier propriétaire fut Hamon de Montsorel qui édifie un fort en bois  et  en avait fait sa résidence seigneuriale. Après sa destruction au XIIe siècle le château sera reconstruit par Jean de Montsorel et son fils Guillaume, sa fille Mahaut l'apporte à son époux, Raoul d'Aubigné.  Veuve elle convole avant 1226 avec Jean Paisnel décède en 1228, le château passe  à son fils du premier mariage Raoul d'Aubigné,  au XIVe siècle   Mahaut d'Aubigné fille de Guillaume épouse Olivier de Montauban  qui reconstruisent le corps de logis. La seigneurie puis comté de Landal a appartenu à plusieurs grandes familles de la noblesse bretonne. Des Rohan le château passe  à la famille de Maure, puis au siècle suivant aux Rochecouart-Mortemart  Marie de Colbert veuve de  Louis de Mortemart, vend en 1697 à Joseph de France, suite à sa résistance lors de leur débarquement à Cancale, son propriétaire, Olivier Joseph de France, capitaine général des gardes côtes de Dol, a la veille de la Révolution passe par alliance à la famille du Beuil. Vendu en 1799 comme bien national, le château de Landal endommagé est racheté par au comte Louis du Breil (1844-1917) qui fait reconstruire le logis en 1850. Le château et son domaine de 350 Ha, a été racheté, par Maurice de Thomasson de Vaugoubert, en 1892.   De 2013 à 2015, après plus de 10 ans d'abandon et de vandalisme, le château de Landal est géré par la Famille Guyot  propriétaire des châteaux de la Ferté-Saint-Aubin, de Bridoire et de Saint-Brisson  qui l'ouvre, qu'en été, au public, avec l'aide de plusieurs bénévoles.","architecture":"LANDAL, cité dès le XIIe siècle,  la construction du château de Landal date du XIIe au XIXe siècle se composant à l'origine de quatre tours du XVe siècle dont deux existent encore en partie. Il comporte encore des éléments de deux tours du XVe siècle Il était entouré d'un mur d'enceinte surmonté d'un promenoir et de claires-voies en pierres de taille découpées et précédé d'un étang et de douves. Ce mur était percé d'une porte à pont-levis, et flanqué de cinq autres tours dont trois subsistent partiellement. En 1758, le château est incendié par les Anglais, le château de Landal est racheté par Louis de Breil qui fait reconstruire le logis en 1850 de style néo-gothique. Bien que d'aspect médiéval, le donjon est élevé au XIXe siècle.  Les anciennes lucarnes du donjon ont disparu au cours du XXe siècle. Éléments protégés MH : les façades et les toitures du château, des communs, de la chapelle et de la fuie : inscription par arrêté du 6 octobre 1981 Le château de Landal a été inscrit aux M.H depuis le 6/10/1981 pour ses façades et toitures, celles de ses communs, de sa chapelle et de sa fuie.","habitants":"Famille de  Raoul d'Aubigné                                                          Famille Guyot\r\n        \"","divers":"Landal GPS : 48° 29' 28\" Nord, 1° 40' 31\" Ouest","gps":"48° 29' 28\" Nord, 1° 40' 31\" Ouest","images":["../image/image_35/35_Landal_1.jpg","../image/image_35/35_Landal_2.jpg","../image/image_35/35_Landal_3.jpg","../image/image_35/35_Landal_4.jpg","../image/image_35/35_Landal_5.jpg"]},"Consult_chateau_formulairee915":{"id":"Consult_chateau_formulairee915","dept":"35","canton":"Redon","commune":"Langon","nom":"Langon_Bot","type":"Château","periode":"XV-XIX","histoire":"quatre châteaux dans cet article; du bot, Corbinière et Gaudinais.  et à deux Km à l'ouest à Sainte-Anne sur Vilaine le château de la chaussée à Port de Roche.                                                                                                                                  Du BOT, concentré à l'ouest de la Grande Rue en longeant le placître et autour de quelques constructions importantes au début du XIXe siècle, le bâti du bourg de Langon s'est développé à la fin du XIXe siècle, notamment au sud de l'église paroissiale. Lorqu'est publié son ouvrage Petites seigneuries de Haute-Bretagne, en 1907, de l'ancien manoir du Bot subsiste encore avec sa tourelle octogone, mais c'est une construction offrant peu d'intérêt, à côté se dresse toujours la fuie seigneuriale. Au bout d'une longue rabine, on projette de construire un château moderne dont les premiers éléments apparaissent déjà. Comme le suggère l'ornementation sculptée du pignon ouest, avec une iconographie dévolue au loisir, le château du Bôt est un relais de chasse. Construit autour de 1900, il était destiné à remplacer l'ancien manoir situé au nord et dont ne restent que des vestiges, mais n'a pu être achevé. Seules une aile, une tour d'angle et d'importants communs composent la propriété. Le décor, sinon l'architecture de la façade ouest, s'inspire, sur un mode fantaisiste, du style gothique de la fin du XVe siècle.","architecture":"CORBINIERE, Propriété de la famille Ridouël, puis de la famille du Halgouët. A proximité de cet édifice moderne se trouve les ruines d'une ancienne chapelle édifiée par le général Ridouël. ainsi que le manoir, se fait remarquer par sa situation pittoresque au-dessus du cours de la Vilaine ; dans les jardins s'élèvent une douzaine d'édicules en mosaïque tels que chapelle, castel, kiosque, etc., dont l'ensemble ne manque pas de charmes (abbé Guillotin de Corson) .                                                                                                        GAUDINAIS  Il appartenait en 1513, à la famille de la Moussaye. Le château de la Gaudinais est une construction hétérogène résultant de l'habillage d'un manoir de plan en équerre, datant de la fin du XVe siècle. La façade Sud a été reprise au XVIIe siècle. Son imposant pavillon Ouest a été rajouté au XVIIIe siècle.                                                                                     PORT de ROCHE, dit la chaussée. Au Bot, le site témoigne de l'implantation d'un château important aujourd'hui disparu, remplacé par une ferme et ses dépendances, tandis qu'un nouveau bâtiment fut élevé ex-nihilo au sud durant la seconde moitié du XIXe siècle. De cette période date également le château de Corbinières, agrandi au cours du dernier quart du siècle. Quelques années plus tard, l'ancien manoir du Faulx est à son tour modernisé par l'ajout d'un corps de bâtiment.  Edifice homogène construit à la fin du XVIIe siècle et au début XVIIIe siècle; écuries datées 1687 et 1709; remise à voitures datée 1689; le portail de la cour porte le monogramme AG  (Guischardy, constructeurs du château). Demeure constituée d'un étage carré, élévation ordonnancée, gros-oeuvre en schiste ; grès ; granite ; calcaire ; moellon et enduit partiel. Couverture: toit à longs pans; croupe; toit à l'impériale et extrados de voûte, recouverts d'ardoise.","habitants":"corbinière ;  Famille Ridouël,                                                  Gaudinais ; Famille de la Moussaye\r\n        \"","divers":"quatre châteaux à Langon du Bot grav-3-4, Corbinière grav 1-2 et Gaudinais.  et à deux Km à l'ouest à Ste Anne sur Vilaine le château de  la chaussée à Port de Roche grav_ 5.  GPS : 47° 44' 22,58\" Nord, 1° 50' 48,01\" Ouest                                                 Gaudenais GPS : 47° 43' 13\" Nord, 1° 50' 48\" Ouest","gps":"47° 44' 22,58\" Nord, 1° 50' 48,01\" Ouest","images":["../image/image_35/35_Langon_Bot_1.jpg","../image/image_35/35_Langon_Bot_2.jpg","../image/image_35/35_Langon_Bot_3.jpg","../image/image_35/35_Langon_Bot_4.jpg","../image/image_35/35_Langon_Bot_5.jpg"]},"Consult_chateau_formulaire31ef":{"id":"Consult_chateau_formulaire31ef","dept":"35","canton":"Combourg","commune":"Lanrigan","nom":"Lanrigan","type":"Château","periode":"XVI-XVII","histoire":"Deux château dans cet article  Lanrigan                                                                                                            LANRIGAN, propriété des seigneurs de Langan au XIe siècle, de la famille de Vendel vers 1501, de la famille Tréhal vers 1540, de la famille Bois-le-Houx vers 1568, qui le reconstruit., la seigneurie de Lanrigan possède un droit de haute justice. Il est aux vicomtes de la Belinaye en 1672, et de la famille Fontlebon au XVIIIe siècle. Fut la propriété de la famille Hamon de Kervers et au colonel  Rousselot.  Le château de Lanrigan a été inscrit aux M.H. par arrêté du 26/03/1973.","architecture":"LANRIGAN, a toujours été subordonnée à la présence du château. On trouve un vaste ensemble d'édifices construits ou reconstruits depuis le XVIe siècle. Flanqué de deux corps de logis de tours et de tourelles, Outre le château, véritable chef d'uvre, un autre site retient l'attention, il s'agit de la chapelle de Landehuan, qui marque l'endroit où les moines de Saint-Jean de Dol ont créé un petit village et fait fructifier cette terre ingrate. Le site abritait, à l'origine, une motte féodale située à l'emplacement de l'ancien château, dont il ne reste aujourd'hui qu'un pavillon, et aurait été l'oeuvre des seigneurs de Langan au XIe siècle. Aux XIVe et XVe siècles, Lanrigan est une place forte dont il reste un pavillon archaïque et la partie nord du château actuel du XVIe siècle, avec son système de défense (tour à mâchicoulis, créneaux couverts). La reprise du XVIe siècle concerne les façades Est et sud et diverses ouvertures dans le pavillon médiéval situé à l'est du château. La façade ouest a été remaniée au XXe siècle. Le vocabulaire décoratif est essentiellement gothique.","habitants":"lanrigan; Famille Bois-le-Houx et au colonel .M.Rousselot                     Croix-Chemin ; Famille de Pierre Guéhenneuc\r\n        \r\n        \"","divers":"Deux château à Larignan  grav 1 à 5                                            Languiran GPS : 48° 23' 48,24\" Nord 1° 42' 04\" Ouest","gps":"48° 23' 48,24\" Nord 1° 42' 04\" Ouest","images":["../image/image_35/35_Lanrigan_1.jpg","../image/image_35/35_Lanrigan_2.jpg","../image/image_35/35_Lanrigan_3.jpg","../image/image_35/35_Lanrigan_4.jpg","../image/image_35/35_Lanrigan_5.jpg"]},"Consult_chateau_formulaireb2db":{"id":"Consult_chateau_formulaireb2db","dept":"35","canton":"Melesse","commune":"Montreuil-le-Gast","nom":"Launay du Han","type":"Château","periode":"XIV","histoire":"LAUNAY du HAN, appartenait en 1398 aux seigneurs de ce nom, qui le tenaient en seigneurie des seigneurs du Plessis de Melesse; il passa par alliance aux de Vitré en 1477, puis par alliance aux du Han, seigneurs de la Mettrie en 1495 et fut vendu par eux en 1694 aux Guillaud, sieurs de la Louvelaye, qui le vendirent la même années aux Picquet, seigneurs de la Motte; ceux ci vendirent la terre aux Carmes déchaussés de Rennes en 1732, avec le fond et l'emplacement seul du manoir, en conservant la propriété des matériaux et en s'engageant à démolir sous 20 ans ; Les Carmes le possédaient encore en 1789. Launay fut nommé Launay du Han aux XVIe et XVIIe siècles, du nom de ses propriétaires, et Launay Picquet au début du XVIIIe siècle. Il fut érigé en châtellenie en 1650, il avait un droit de quintaine et un droit de haute justice, ses fourches patibulaires à quatre piliers se dressaient sur la Lande de Cruère au nord du bourg. Du château, il ne subsiste aujourd'hui que des dépendances, des écuries, des remises et une orangerie.","architecture":"LAUNAY du HAN,  la remise du XVIIe siècle, située à Launay-du-Han. Lancien château de Launay a été reconstruit au milieu du XVIIe siècle. Le château comprenait en 1694 deux cours précédées de tours et de tourelles, de grandes douves, un pont-levis, une fuie, des étangs et une chapelle (réédifiée en 1705). Launay fut nommé Launay-du-Han au XVIe siècle et au XVIIe siècle, du nom de ses propriétaires. Il fut érigé en châtellenie en 1650 et avait un droit de haute justice. La famille Picquet, seigneurs de la Motte, achète en 1694 le domaine de Launay-du-Han qui prend alors le nom de Launay-Picquet. Propriété successive des familles Launay (en 1398), Vitré (en 1477), Han, seigneurs de la Mettrie (en 1495), Guillaudeu, sieurs de la Louvelaye (en 1694), Picquet, seigneurs de la Motte (en 1694), Pille (en 1719), Pontual (en 1725). Les terres de Launay-du-Han sont vendues en 1732 aux religieux Carmes de Rennes.","habitants":"Famille de Launay-Picquet\r\n        \"","divers":"A Montreuil-le-Gast le château de Launay du Han                                                Gps    48° 14' 49\" nord, 1° 43' 36\" ouest","gps":"","images":["../image/image_35/35_Launay_du_Han_1.jpg","../image/image_35/35_Launay_du_Han_2.jpg","../image/image_35/35_Launay_du_Han_3.jpg"]},"Consult_chateau_formulaire0813":{"id":"Consult_chateau_formulaire0813","dept":"35","canton":"Rennes","commune":"Breteil","nom":"Launay_Quéro","type":"Château","periode":"XIX","histoire":"LAUNAY-QUERO, ce lieu aurait été occupé par une motte féodale, il existait un ancien manoir à cet emplacement. En effet, d'après les registres de réformations, le propriétaire des lieux dans la première moitié du XVe siècle est Allain Rosel. La famille de Rosel possède également le manoir de Villeneuve, dans le bourg de Breteil. En 1513, le manoir appartient à Jan Quéro qui laisse son nom au lieu par la suite. L'ancien manoir a été remplacé par une construction moderne au début du XIXe siècle. Ce château est un bâtiment difficile à interpréter car il a connu de nombreuses transformations successives. En effet, le plan du bâtiment est assez complexe. Il pouvait s'agir d'un ancien bâtiment en L, reconstruit au XIXe siècle. Ainsi, à l'intérieur, se côtoient des cheminées anciennes et des cheminées contemporaines de la construction, c'est-à-dire du début du XIXe siècle. D'autre part, les entourages de baie du château semblent être en tuffeau, bien que l'enduit ne permette pas de l'affirmer avec certitude. D'autres bâtiments accompagnent le château, en effet, au nord, il existe une construction qui paraît être une remise à carrosses ou charrettes. Cette remise est adossée à un bâtiment ancien remanié.","architecture":"LAUNAY-QUERO, il existe une tour quadrangulaire en terre au nord-ouest du château. La fonction de cette tour est difficile à identifier. Il existe une unique porte d'accès en plein cintre ainsi qu'une ouverture haute. Il semble qu'il existait un escalier à l'intérieur. Il s'agissait peut-être d'une tour de guet ou bien d'une tour destinée aux usages de la chasse. Cette tour date  de la fin du XVIIIe siècle, en effet, elle figure sur le cadastre ancien, achevé en 1845.ce château est élevé en moellon de poudingue et couvert d'ardoise. Il possède deux façades, l'une à l'est, l'autre au sud. Ces deux façades sont divisées en travées. Ainsi, la façade Est, est divisée en six travées. Sur cette façade, il existe deux frontons triangulaires en tuffeau, percés de deux demi-oculi. Cette façade possède un toit en croupe avec des épis de faîtage. La façade sud est, quant à elle, percée de cinq travées. Le toit en croupe possède trois lucarnes à frontons triangulaires en tuffeau. Ces lucarnes sont décorées de volutes. Cette façade est précédée d'un dallage en schiste pourpre. Les pièces de l'étage de ce château sont lambrissées. D'autre part, la cour, située à l'Est du bâtiment, est fermée par des murs de clôture. Un portail donne accès à cette cour. Des douves précèdent encore ce portail. Au nord, il existe un bâtiment en moellon de poudingue qui possède des ouvertures à encadrements de brique, avec clés de tuffeau. A l'ouest du château, sur une île formée par les douves, existe la tombe de l'un des propriétaires du lieu ainsi qu'un obélisque en granit. De plus, au nord-ouest du château, se trouve également une tour quadrangulaire en terre. Par ailleurs, l'Institut Rural d'Éducation et d'Orientation s'est installé dans ce château en 1968.","habitants":"Famille de Quéro\r\n        \"","divers":"A Breteil le château  de Launay-Quéro                                    Gps 48° 08' 46\" nord, 1° 53' 50\" ouest","gps":"","images":["../image/image_35/35_Launay_Qu%c3%a9ro_1.jpg","../image/image_35/35_Launay_Qu%c3%a9ro_2.jpg","../image/image_35/35_Launay_Qu%c3%a9ro_3.jpg","../image/image_35/35_Launay_Qu%c3%a9ro_4.jpg","../image/image_35/35_Launay_Qu%c3%a9ro_5.jpg"]},"Consult_chateau_formulaire80b4":{"id":"Consult_chateau_formulaire80b4","dept":"35","canton":"Redon","commune":"Lohéac","nom":"Lohéac","type":"Château","periode":"XVII","histoire":"trois châteaux à Lohéac; Bois au Voyer, Rocher et Lohéal.                                              BOIS-au-VOYER, le Bois au Voyer n'est pas seulement un château,  c'est un site dominant où le panorama a une importance primordiale. Sur les côtés, les deux tours du XIVe siècle donnent un charme particulier au Bois-au-Voyer.  L'espace est vaste et l'accès facile,                                                                                                                                      LOHEAL,  il eut plusieurs propriétaires : les Peschart, les Tournemine (1683-1720), les Fournier de la Châtaigneraye (1720-1820), les Ferron du Quengo (1820-1867), les Hersart du Buron (1867-1922) puis les Macquart de Terline et les Blois de la Calande. Le 21/01/1790, une horde de « 60 gens de campagne » attaquèrent le château du Bois-au-Voyer, brulant la demeure à moitié et l'ensemble de ses archives seigneuriales. Le château du Bois-au-Voyer fut réparé rapidement, servant de résidence après la Révolution Française. C'est Alain Hersart du Buron qui fit transformer, de 1898 à 1900, le château, faisant ajouter une aile de service et d'escaliers et donna au Château du Bois-au-Voyer, son aspect actuel.                                                                                                      ROCHER, situé route de Guignen. Propriété de la famille Rolland (au XVIIe siècle). Cette terre a été réunie en 1700 à la terre de la Martinaye (propriété de la famille Guihou au XVIIe siècle), sous le nom de Rocher-Martinaye, propriété de la famille Rolland seigneurs de Rengervé.","architecture":"LOHEAL, cour neuve, manoir de l'Automobile est un manoir bâti à Lohéac, Michel Hommell est un collectionneur passionné de voitures automobiles, qui cherchait à réunir lensemble de ses acquisitions dans un lieu où il pourrait les exposer au grand public. En 1985, Michel Hommell choisit son manoir datant du XVIIe siècle situé à Lohéac, alors un vieux corps de ferme appelé la « Cour Neuve », comme futur emplacement du Manoir de lautomobile.  le musée ouvre finalement en 1988, après que de nombreux travaux eurent été effectués. Situé sur la route de Lieuron, le Manoir de l'Automobile est la principale attraction de la commune. Il est ouvert au Public depuis 1988 et regroupe 400 modèles de véhicules de collection, Michel Hommell a enrichi sa collection de véhicules depuis louverture du musée. La collection est organisée selon les catégories des véhicules et leur époque. La dernière aile du Manoir de lAutomobile reproduit une grille de pôle position de course de Formule 1, qui comprend des véhicules ayant été pilotés par de célèbres pilotes de compétition, comme Jean Alesi ou Alain Prost.","habitants":"Lohéal ; les Ferron du Quengo et Alain Hersart du Buron                 Rocher ; Famille Guihou \r\n        \r\n        \r\n        \"","divers":"trois châteaux à Lohéac; Bois au Voyer grav 1-2, Rocher gra-3 et Lohéac grav 4-5.                                                                  GPS : 47° 52' 00\" Nord, 1° 53' 11\" Ouest                                                             GPS : 47° 51' 59\" Nord, 1° 52' 55\" Ouest","gps":"47° 52' 00\" Nord, 1° 53' 11\" Ouest","images":["../image/image_35/35_Loh%c3%a9ac_1.jpg","../image/image_35/35_Loh%c3%a9ac_2.jpg","../image/image_35/35_Loh%c3%a9ac_3.jpg","../image/image_35/35_Loh%c3%a9ac_4.jpg","../image/image_35/35_Loh%c3%a9ac_5.jpg"]},"Consult_chateau_formulaire55ea":{"id":"Consult_chateau_formulaire55ea","dept":"35","canton":"Guichen","commune":"Loutehel","nom":"Loutehel","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux  à Loutehel; Lohière et Plessix-Hudelor.                   LOHIERE, attesté dès le XIVe siècle, était jadis fortifié. Un texte de 1680 témoigne de ce qu'il est alors \"cerné de douves et de fossés, avec ses cours, fuie, jardins, étangs, et bois\". Il possédait également un portail, un pont-levis et quatre tours munies de moulins à grain. Il était le siège d'une seigneurie importante qui s'étendait sur les paroisses de Loutehel, de Maure, de Campel, de Guer, de Plélan et de Maxent. Le château a été reconstruit dans la deuxième moitié du XIXe siècle par la famille de la Vigne sur le site de l'ancien château. Témoin des goûts éclectiques du XIXe siècle, le château de la Lohière conjugue un plan inspiré des manoirs du grand siècle; un corps central cantonné de deux pavillons, avec une ornementation puisée dans le répertoire néo gothique. Mais cette gangue centenaire révèle, ça et là, les traces d'un manoir plus ancien. La grande arcature de la façade sud trahit l'existence d'un passage charretier, aujourd'hui bouché, qui traversait l'actuel corps central de part en part. En outre, la façade postérieure de ce dernier présente deux portes hautes au niveau du premier étage qui semblaient desservir une coursière en encorbellement articulée sur la tourelle d'escalier (nord-est) intégralement conservée. Ces éléments, conjugués au décalage des niveaux entre la partie ancienne et les corps additifs, inclinent à conclure qu'un ancien logis-porte du XVIe siècle a été intégré dans un programme d'agrandissement sous le Second Empire.","architecture":"PLESSIX-HUDELOR, le logis est encadré à l'ouest par des communs qui paraissent dater du XVIIIe siècle mais ont été transformés, à l'est par les bâtiments d'une basse-cour, très altérés mais ayant conservé un four à pain. L'élévation à cinq travées à baies étroites, coiffée par deux hautes toitures en pavillon jumelées auxquelles ne manquent que leurs lucarnes ainsi que la souche de cheminée ouest, est caractéristique du milieu du XVIIe siècle. La travée d'axe légèrement décalée, signalée par un fronton, sans doute destiné à un cadran solaire, de même que la souche de cheminée médiane, indiquent un escalier central à volées droites et mur d'échiffre plein. Le décalage des travées vers les angles est aussi un trait caractéristique de l'architecture noble rennaise, issue du chantier du Parlement vers 1650 . En revanche, la façade arrière, aveugle du côté du jardin, traduit un certain archaïsme, ou le maintien de structures antérieures, ce que pourraient également indiquer deux fenêtres à bandeaux et entablement dorique de la façade antérieure. La tour collée au milieu de la façade postérieure devait abriter des garde-robes et des latrines. En 1708, Anne Hudelor, dame du Plessix  présentait Achille Duplessix comme chapelain. Donné sous la Restauration à la fabrique paroissiale par la famille Le Mallier de Chassonville alors propriétaire du château, elle est bénie en 1829 par Mgr de Lesquen, évêque de Rennes après sa réfection.","habitants":"Lohière ; Famille de la Vigne                                                           Plessix ;Anne Hudelor\r\n        \r\n        \"","divers":"Deux châteaux  à Loutehel; Lohière grav-1 et Plessix-Hudelor grav-2        Gps 47° 56' 13\" nord, 2° 04' 45\" ouest","gps":"","images":["../image/image_35/35_Loutehel_1.jpg","../image/image_35/35_Loutehel_2.jpg"]},"Consult_chateau_formulaire2b86":{"id":"Consult_chateau_formulaire2b86","dept":"35","canton":"Saint-Malo","commune":"Saint-Coulomb","nom":"Lupin","type":"Château","periode":"XV-XVII","histoire":"LUPIN,  au milieu du XIe siècle, simultanément à la fondation de la seigneurie Duguesclin, un aïeul du célèbre connétable de France, le fief de lupin appartient au XVe siècle à la famille Uguet qui échoit en 1611 par alliance à la famille le Chastelier qui fait édifier le château que nous connaissons aujourd'hui, aussi par les Robiou   propriétaire en 1709. puis échoit au XVIIIe siècle aux Goret et ensuite aux le Fer du Flanchet  et au ler de la Givernais qui s'en défont entre les deux guerre au profit  de monsieur Méric. Les Haudos de Possesse  gendre et fille de M.Méric ses descendants veillent aujourd'hui  sur la demeure  ainsi que le parc.  Éléments protégés MH : inscription par arrêté du 24 juillet 1944. Le Lupin peut être considéré comme l'archétype de la malouinière au sens actuel du terme : un logis prolongé par des ailes basses séparant cour et jardin ; le traitement vigoureux de la façade soulignée par des bossages verticaux et un bandeau horizontal ; les grands toits et les cheminées accentuant les masses architecturales.","architecture":"LUPIN bâtit une première forteresse au XIIe siècle, abandonnée au profit d'un nouveau château-fort au Plessis Bertrand à partir de 1259.   Plus près de nous, ce sont les gentilhommières qui retiennent l'attention car les réussites commerciales des marchands malouins à partir du XVe siècle, jusqu'au XVIIe siècle, au XVIIIe siècle, vont être partiellement réinvesties.  D'abord dans l'acquisition de manoirs, leur transformation, puis l'édification de nouvelles \"maisons des champs\" appelées malouinières. ce traitement vigoureux de l'élévation rappelle les projets de Vauban pour les fortifications de Saint-Malo.                                                                                   l'édifice  corps de logis central cantonné de deux ailes perpendiculaires formant des pavillons en saillies sur les deux façades principales, le corps central de forme rectangulaire à cinq travées prolongés de deux ailes basses, avec d'élégantes lucarnes à fronton la demeure inaugure un modèle d'inspiration classique que l'on retrouvera dans de nombreuses malouinières.","habitants":"famille le Chastelier\r\n        \"","divers":"a Saint-Coulomb le château de Lupin                                             gps 48° 40' 55\" nord, 1° 56' 34\" ouest","gps":"","images":["../image/image_35/35_Lupin_1.jpg"]},"Consult_chateau_formulaire70cc":{"id":"Consult_chateau_formulaire70cc","dept":"35","canton":"Janzé","commune":"Saint-Erblon","nom":"Létard","type":"Château","periode":"XVI-XIX","histoire":"LETARD, le château a été construit par l'architecte Arthur Regnault en 1866 pour la famille Des Bouillons. Cet ancien manoir a appartenu à l'écrivain Noël du Fail au XVIe siècle. Le château est de style néo-gothique, style cher à cette époque (deuxième moitié du XIXe siècle). Il témoigne d´un style architectural très proche du château de la Noé-Saint-Yves à Bain-de-Bretagne, qui date également des années 1860. le château Létard de 1870,  oeuvre de l'architecte Jacques Mellet et de style néo-gothique anglais. A la fin du XIXe siècle, M. des Bouillons, propriétaire de château  Letard, voyant sa chapelle en ruine, a bâti un nouveau sanctuaire dédié à saint Joseph (Pouillé de Rennes). Au début du XXe siècle le château appartient à M. Joseph-Xavier des Bouillons qui en a fait une superbe habitation et sa résidence. Château-Létard, perché sur sa haute colline, domine de vastes prairies arrosées par la Seiche. Sur cette rivière, au bas du coteau, est une minoterie qui a également pour propriétaire M. des Bouillons. Cet endroit est l'un des plus jolis sites de la commune.","architecture":"LETARD, tout comme ce château, le château de la Noé-Saint-Yves a été construit sur le site d'un manoir plus ancien.Il a remplacé l'ancien manoir de château Létard, qui existe toujours et qui se trouve dans le parc de ce château.  Les échauguettes, le décor de choux frisés sur les lucarnes ou encore les quadrilobes qui ornent les garde-corps sont tout à fait caractéristiques du style néo-gothique. Ce château possède une chapelle moderne qui se situe à l'emplacement de l'ancienne chapelle du lieu. La maçonnerie du château est enduite, seul le niveau de cave ne l'est pas et laisse apparaître une maçonnerie de moellon de schiste. Les échauguettes (tourelles d'angle) sont réalisées en brique. Cet édifice comprend un rez-de-chaussée surélevé au-dessus d'un niveau de cave, ainsi qu'un premier étage et enfin un étage de comble. Le décor est abondant : quadrilobes sur les garde-corps et le bow-window, choux frisés sur les lucarnes. Le château est situé dans un parc à l'anglaise.","habitants":"famille Des Bouillons\r\n        \"","divers":"A  Saint-Erblon le château de Létard                                                    gps 48° 01' 25\" nord, 1° 40' 51\" ouest","gps":"","images":["../image/image_35/35_L%c3%a9tard_1.jpg","../image/image_35/35_L%c3%a9tard_2.jpg","../image/image_35/35_L%c3%a9tard_3.jpg"]},"Consult_chateau_formulaire5809":{"id":"Consult_chateau_formulaire5809","dept":"35","canton":"Val-Couesnon","commune":"Andouillé-Neuville","nom":"Magnanne_35","type":"Château","periode":"XV-XVI","histoire":"MAGNANNE, la terre de la Magnanne relevait de la baronnie d'Aubigné. Le domaine peu considérable comme bien souvent au XVe siècle, devait s'accroître par achat en 1581 de la seigneurie de Princé à Andouillé. En 1695 s'ajoutent le comté de Betton, en 1761 la baronnie d'Aubigné et en 1788 le marquisat du Bordage à Ercé-près-Liffré. Ce très vaste ensemble réuni à la fin du XVIIIe siècle devait voler en éclat sous la Révolution. La terre s'est transmise successivement par alliances aux familles de La Magnanne (1379-1555), de Montbourcher de la Magnanne (1555-1830), Hay des Nétumières (1830-1909), de Menou (depuis 1909). La construction du château de la Magnanne fut entreprise par René de Montbourcher, seigneur de Chasné et Julienne de La Magnanne sa femme, et continuée par leur fils Jacob. Ce dernier dirigeait une compagnie de cavalerie pour Henri IV durant les guerres de la Ligue. La considération dans laquelle il était tenu par ce roi et son opposition au parti du duc de Mercoeur, n'a pas été sans influence sur l'architecture de l'édifice, en cours de construction en 1584, Les architectes furent Jean-François Huguet, Henri Mellet. À la suite d'un incendie en 1893, la toiture à la Mansart a été remplacée par une toiture simple à doubles pans.","architecture":"MAGNANNE, l'édification du château remonte à la fin du XVIe siècle. Détruit par un incendie à la fin du XIXe siècle reconstruit  sur plan identique dans le style Louis XIII.  L'édifice, à caractère défensif, est modifié dans les années 1720-1730. Le projet de construction d'un étage supplémentaire au logis, de l'aménagement d'une terrasse bastionnée ainsi que la réalisation du portail d'entrée de l'avant-cour sud est confié à l'architecte Huguet. Les travaux sont poursuivis à sa mort avec l'ouverture de larges avenues marquant les issues du domaine et symbolisant son identité aristocratique. Au nord, un grand parterre et un jeu de paume clos de murs sont créés. Le parc agricole est contenu par une allée courbe périphérique. Le château, à savoir : les façades et toitures du logis et des deux bâtiments de communs ; la cour pour son sol d'assiette ; le jardin, incluant l'hémicycle et les allées nouvellement créées, pour son sol d'assiette, son bassin central et l'ensemble de ses éléments d'architecture maçonnés ; l'avant-cour pour l'ensemble de ses murs et son sol d'assiette ; le portail d'entrée avec sa grille en fer forgé ; le potager pour l'ensemble de ses murs et son sol d'assiette ; le pont franchissant la rivière d'Andouillé, la levée reliant celui-ci au portail d'entrée et l'esplanade le précédant ; les cinq allées tracées au XVIIIe siècle, à l'exclusion, s'agissant de l'allée axiale, des parties appartenant à un agriculteur ou à la commune ; l'allée courbe et le sol d'assiette du parc agricole paysager créé au XIXe siècle de part et d'autre de la rivière d'Andouillé  : inscription au M.H.par arrêté du 13 janvier 2011.","habitants":"René de Montbourcher\r\n        \"","divers":"A  Andouillé-Neuville le château de Magnanne                                   GPS : 48° 17' 13\" Nord, 1° 37' 12\" Ouest","gps":"48° 17' 13\" Nord, 1° 37' 12\" Ouest","images":["../image/image_35/35_Magnanne_35_1.jpg","../image/image_35/35_Magnanne_35_2.jpg","../image/image_35/35_Magnanne_35_3.jpg","../image/image_35/35_Magnanne_35_4.jpg"]},"Consult_chateau_formulaireee91":{"id":"Consult_chateau_formulaireee91","dept":"35","canton":"Bruz","commune":"Chartres-de-Bretagne,","nom":"Marais","type":"Manoir","periode":"XVIII-XIX","histoire":"MARAIS  Mention d'un ancien manoir appartenant aux seigneurs de Fontenay dès 1396 et qui était toujours entre leurs mains en 1789. Le logis en place aujourd'hui ainsi que les bâtiments qui encadrent l'ancienne basse-cour ont été remaniés, voir pour certains reconstruits pour la famille de Janzé qui l'habite après la Révolution. Le cadastre de 1812 mentionne le château du Marais, ainsi que sa basse-cour. Le tracé curviligne de la parcelle du château indique le dessin d'un jardin à la française. Vestiges ou amorce d'un projet plus grandiose dont une percée dans les bois devait être antérieurement prévue ou aménagée jusqu'au vivier transformé dès lors en bassin circulaire d'ornement. Un projet de jardin par Richard Wallace aurait été conçu au Marais.","architecture":"MARAIS  Le logis très transformé à la fin du XIXe siècle conserve cependant des éléments de décor du XVIIIe siècle remployés notamment dans les lambris de la salle et du salon. L'escalier tournant à retours avec un grand jour central est également en partie conservé. Les communs qui encadrent la cour sont datables du XVIIIe siècle, tandis que de nouvelles écuries en brique et pierre sont édifiées à la fin du XIXe siècle. Les propriétaires actuels se rappellent pour l'avoir entendu de leur grand père que l'escalier en brique construit contre la façade a été édifié en grande hâte pour l'inauguration du bâtiment. Le pigeonnier légèrement en retrait est quant à lui construit à la fin du XIXe siècle ou au début du XXe siècle. Suite aux dommages de guerre, le site ayant été sinistré le 4 août 1944, un bâtiment neuf a été construit à proximité du portail d'entrée et une cuisine a été greffée contre le flanc nord du château. Le logis de plan rectangulaire, double en profondeur, est recouvert d'une toiture à longs pans brisés et croupe. Encadrement des baies et faux chaînages des angles harpés. L'enduit masque un bâti en pierre avec des encadrements de baies en granite. Anciens communs en terre, écuries (vestiges) reconstruite dans la basse cour du château avec marquise en fonte et verre, gros oeuvre en moellons avec des encadrements de brique. Escalier extérieur en brique. Pigeonnier en bois. Enclos en partie en terre. Portails conservés.","habitants":"seigneurs de Fontenay\r\n        \"","divers":"A  Chartres-de-Bretagne le château de Marais                                 gps 48° 02' 22\" nord, 1° 42' 14\" ouest","gps":"","images":["../image/image_35/35_Marais_1.jpg"]},"Consult_chateau_formulaire75dc-2":{"id":"Consult_chateau_formulaire75dc-2","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Martigné Ferchaud","nom":"Martigné_Ferchaud","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Martigné-Ferchaud ; Breil , Mintière  et Forges .                                                                                                                BREIL, construit en 1855 par Jean-François-Raoul Doussault, maire de la commune de 1840 à 1848. Sa mère, née Varin du Frambois, est la fille d'un maître des forges de Martigné, son père, capitaine d'infanterie, membre du collège électoral d'Ille-et-Vilaine, est fait chevalier héréditaire en 1816. Le domaine passe en 1880 à un neveu, M. Rémy Agathon de Gourden. Bâtiment de plan allongé composé d'un corps de logis rectangulaire à trois travées encadré de deux pavillons en légère saillie d'une travée chacun. Murs enduits, soubassement, encadrements de baies et corniche en pierre de taille de granite.                                                                           FORGES, la maison du maître des forges  de   1735.                                      HUBERDIERE,  manoir. Propriété de la famille Villeblanche, seigneurs de Martigné en 1513.","architecture":"MINTIERE,  manoir du VI-XXe siècle. On y trouve un cadran solaire qui date de 1735 et une chapelle édifiée en 1575 par la famille Neyret. En 1575, Christophe Neyret (ou Neiret), sieur de la Mintière, et Catherine de la Motte, sa femme, firent bâtir une chapelle près de leur manoir et y fondèrent une messe pour tous les dimanches et mercredis. Cette chapellenie, confirmée, parait-il, par François Gendrot, fut présentée en 1663 à Vincent Desgrées par son petit-fils, Pierre Le Breton, sieur de la Garenne, fils de Pierre et de Perronnelle Gendrot Cette chapelle sert aujourd'hui  une écurie, mais on y voit encore des traces de peintures murales (Pouillé de Rennes). Propriété de la famille Neyret ou Neiret en 1513 et 1575. La terre de la Mintière, associée à celle du Breil-Neret, appartient en 1766 à la famille Saint-Aubin.","habitants":"Breil ; Famille de Jean-François-Raoul Doussault                                          Mintière ; famille Saint-Aubin\r\n        \"","divers":"Trois châteaux à Martigné-Ferchaud ; Breil grav 1-2, Mintière grav-4  et Forges grav-3.                                                                    gps 47° 49' 40\" nord, 1° 19' 06\" ouest","gps":"","images":["../image/image_35/35_Martign%c3%a9_Ferchaud_1.jpg","../image/image_35/35_Martign%c3%a9_Ferchaud_2.jpg","../image/image_35/35_Martign%c3%a9_Ferchaud_3.jpg","../image/image_35/35_Martign%c3%a9_Ferchaud_4.jpg"]},"Consult_chateau_formulaire029d":{"id":"Consult_chateau_formulaire029d","dept":"35","canton":"Guichen","commune":"Maure de Bretagne","nom":"Maure_Bretagne_II","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article ; Lardais et Maures. Bouére à Trois Km à l'ouest à Brulais.                                                                                 LARDAIS  devenu le siège de la vaste seigneurie qui porte son nom au plus tard au XIIIe siècle lorsqu'elle fut partagée en deux membres par les probables descendants de ce personnage. La motte castrale du Ros, unique dans la commune pourrait bien être ce château primitif, à moins qu'elle ne soit qu'un élément d'un ensemble fortifié plus important dont l'église serait l'assiette et les étangs de Maure la ligne de défense septentrionale. Le site fut délaissé pour celui de Crépeneuc, portant aujourd'hui le nom significatif de château de Maure, où l'on voit encore d'importantes douves en eau. Les guerres de la Ligue ont dû être fatales au grand manoir des sires de Maure, sans doute démantelé après la prise de la ville par le capitaine René de Grézille en 1597. Le bourg conservera jusqu'à la Révolution les halles et l'auditoire, éléments caractéristiques de la seigneurie banale, érigée en comté en 1553 par lettres patentes du roi Henri II. Malgré ces origines prestigieuses, la commune conserve relativement peu d'architecture ancienne, son grand corps de logis a été amputé d'une moitié et vendu à l'Encan à un marchand de pierres britannique. L'encadrement et les corniches des murs sont en tuffeau. D'anciennes baies obstruées du logis subsistant présentent des encadrements en schiste bleu. Le domaine des Bégasson n'a pas non plus échappé à la dévastation: ça et là, quelques lambeaux d'avenues sont les derniers vestiges de ce qui fût sans aucun doute l'une des plus belle pièce du patrimoine de la commune.","architecture":"MAURE, la seigneurie de Maure passa successivement aux familles de Rochechouart, marquis de Mortemart en 1660, à Marie Anne Colbert, duchesse de Mortemart en 1688, aux Picquet, seigneurs de la Motte en 1701, de Rosnyvinen, marquis de Piré vers 1710 et en 1789. A l'ouest du site originel, un nouveau château a été construit vers le dernier quart du XIXe siècle dans le style éclectique en vogue à l'époque : l'allure générale s'apparente au XVIIe siècle, le répertoire ornemental est proche du \"gothique\". Quoique moins ambitieux, le programme est assez semblable, à celui du château contemporain de La Lambardais. Il subsiste dans le jardin des vestiges d'un temple protestant établi en 1561.                               BOUERE,  à la Brulais  construit sur le site d'un ancien manoir, le château de La Bouère n'est pas sans évoquer, dans des proportions plus modestes, celui du Bois-Denats en Bovel et s'inspire comme ce dernier des hôtels péri-urbains de la Restauration. C'est une grande demeure de plan carré dont chaque côté présente une élévation ternaire avec un rez-de-chaussée monté sur cave, le tout couvert d'un toit à quatre pans. Les souches de cheminées géminées qui s'élèvent sur chacun des murs de croupe suggèrent un plan triple en profondeur, lequel induit une distribution intérieure organisée autour d'un hall central, à la manière anglaise.","habitants":"Maure: Famille de Rochechouart\r\n        \r\n        \"","divers":"Deux châteaux dans cet article ; Lardais grav 2 et Maures. Bouére grav-1 à Trois Km à l'ouest à Brulais                             Maures 47° 53' 29\" nord, 1° 59' 15\" ouest","gps":"","images":["../image/image_35/35_Maure_Bretagne_II_1.jpg","../image/image_35/35_Maure_Bretagne_II_2.jpg"]},"Consult_chateau_formulaire0ea6-2":{"id":"Consult_chateau_formulaire0ea6-2","dept":"35","canton":"Redon","commune":"Messac","nom":"Messac","type":"Château","periode":"XVI-XVII","histoire":"trois châteaux à Messac; Boeuvres, Hardaz et Pommeraie.                                                         BOEUVRES, château construit dans la première moitié du XVIIe siècle pour François Huart ; agrandissement à la fin du XVIIe ou au début du XVIIIe siècle (actuel corps de logis principal) ; la chapelle, le colombier et l'aménagement des jardins datent de la première moitié du XVIIe siècle. Il a été incendié pendant la Révolution, puis restauré. Il fut la propriété des familles de Geoffroy de La Roche-Giffart en 1280, de Jehan de La Chapelle en 1451, il passa en 1561, par le mariage d'Hélène de la Chapelle, aux de Guémadeuc, puis de Beaumanoir, seigneurs du Besso, de Charles de Cossé Brissac, seigneur d'Acigné vers 1617, de François Huart, seigneur de la Noë, commanditaire de l'actuel château, en 1619, de Jacques Claude Raoul de La Guibourgère en 1710, suite à son alliance avec Françoise Huart, de Camus Pontcarré de Viarmes en 1736, suite à son alliance avec Louise Françoise Raoul de la Guibourgère, de la marquise de La Pervenchère en 1850, et de la famille de Cornulier. Vers 1901, il subit une campagne de restauration et remaniement. La ferme du château partiellement datée 1704.","architecture":"HARDAZ Une motte féodale avec ses fossés ont été mentionnés en 1685. Il ne reste depuis que les vestiges d'un château, construit au XVIIe siècle. Il y a 4 châteaux sur la commune à découvrir : château de Buvres, château du Hardaz, château de La Pommeraie, château de Vautenet.                                                                               POMMERAIE le château du XVI-XVIIe siècle). La Pommerais était autrefois surnommé Couascon-Bardoul. Propriété successive de Jean Charlet et Perrine de Bouays (en 1513), de la famille Escoufflard (en 1613), de Julien Aulnette de Boismeleuc (en 1614), de Guillaume du Bouëxic (en 1624), de Jean Picaud de La Morinais (vers 1678 - 1682) et de la famille Rolland, seigneurs de Rengervé. Ce château est reconstruit partiellement entre 1620 et 1630. Le colombier date du XVIIème siècle et la chapelle Saint-Côme et Saint-Damien de la Pommeraye se trouve dans les jardins du manoir. Le 8 juillet 1676, Jean du Bouexic, seigneur de la Pommeraye et chanoine de Rennes, « considérant qu'encore bien que sa chapelle de la Pommeraye soit consacrée et qu'on y dise la messe de temps immémorial, il ne croit pas qu'elle ait esté dotée ». L'ordinaire approuva cette fondation le 13 juillet 1676. Le chapelain Pierre Langlais y fut remplacé en 1743 par Pierre Boulay (Pouillé de Rennes) .","habitants":"Boeuvres; Famille de Cornulier                                     Pommeraie; Famille Rolland\r\n        \"","divers":"Trois châteaux à Messac; Boeuvres grav -1, Hardaz-grav-3  et Pommeraie grav-2.                                                                              Hardaz  GPS : 47° 49' 32\" Nord, 1° 48' 26\" Ouest","gps":"47° 49' 32\
