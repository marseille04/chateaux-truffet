e potager dont l'eau est capté par un puits. Sur la porte d'entrée, se trouve la date de 1610. La motte seigneuriale se trouvait dans le jardin du manoir du Bas-Sevailles au lieu-dit L'Estourneau. L'entrée du manoir était encadrée de 2 gros chênes et débouche sur une grande cour à la droite de laquelle était le vivier, avec, en face, la chapelle. Sur la gauche, se dresse le manoir, une construction en granit des XVIe et XVIIe siècles, possédant une tour desservant les appartements des maîtres à l'étage. Au rez-de-chaussée, se trouve une grande salle, avec une cheminée monumentale. C'est aujourd'hui une résidence et une exploitation agricole.","architecture":"La BOUEXIERE; Selon Paul Banéat, le goût des gallo-romains pour le buis dont ils aimaient entourer leurs villas serait à l'origine du nom de La Bouëxière, du Latin buxum. Même si l'on accorde quelque crédit à cette coutume botanique, il n'y aurait rien d'étonnant à ce qu'un établissement romain ait précédé la Ville de Chevré qui était la principale agglomération de la paroisse traversé par une antique voie, mais il n'en est pas d'attesté au lieu dit Buxeria qui a donné son nom à la commune. La première mention de la paroisse est assez tardive, mais elle est déjà constituée au milieu du XIIe siècle lorsque l'évêque de Rennes Etienne de La Rochefoucault en fait donation à la jeune abbaye de Saint-Sulpice.                                         CARREFOUR  le manoir du Carrefour (XVIIème siècle). Il fut affranchi en 1442 par le duc Jean IV pour la famille le Souldoyer ou le Souldery qui l'avait encore en 1592. Propriété successive des familles Servaude (en 1608), Poix (en 1612 et 1657), la Marck, Macé, sieurs de la Rabinaye (en 1759), Poillevé, sieurs de la Guérinaye (en 1790) .                                                                                                                        LA BERTRY le château du Bertry (XIV-XIXe siècle). La partie ouest du château a été reconstruite au XIXe siècle. Il possédait autrefois une chapelle et un droit de haute justice. En 1680, Marguerite Le Métayer, veuve de Bertrand de Poix, seigneur dudit lieu et de Neuville, déclara, au nom de ses enfants mineurs, posséder au manoir du Bertry « une chapelle sise derrière ledit manoir, au Midi et à costé de la grande prée ». Propriété successive des familles Ie fer (en 1397), Bourdon (en 1427), Taillis (en 1443), Boutier, Thierry, seigneurs de la Prévalaye (en 1513), du Han (fin XVIe siècle et en 1645), Poix (en 1666), Belinaye (en 1759 et 1789) ;","habitants":"Sevailles; Famille Blondeau\r\n        \"","divers":"cinq  châteaux à Bouëxière, Chevré-grav-4 Sévailles grav-5 et la Bouëxière grav-1, la Bertry et Carrefour grav-2-3.                          GPS : 48° 11' 02\" Nord, 1° 26' 17\" Ouest","gps":"48° 11' 02\" Nord, 1° 26' 17\" Ouest","images":["../image/image_35/35_Bou%c3%abxi%c3%a8re_1.jpg","../image/image_35/35_Bou%c3%abxi%c3%a8re_2.jpg","../image/image_35/35_Bou%c3%abxi%c3%a8re_3.jpg","../image/image_35/35_Bou%c3%abxi%c3%a8re_4.jpg","../image/image_35/35_Bou%c3%abxi%c3%a8re_5.jpg"]},"Consult_chateau_formulaireed7e":{"id":"Consult_chateau_formulaireed7e","dept":"35","canton":"Guichen","commune":"Bovel","nom":"Bovel","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux dans cet article; Bois-Denats, Cormier et Roche Cotherel.                                                                                                             BOIS-DENATS, vaste et imposante demeure de campagne, le nouveau château du Bois-Denats succède à un grand manoir, siège d'une ancienne seigneurie, dont on voit encore les communs et les murs de clôture. La bâtisse présente des caractères assez représentatifs du style néo-classique, à l'honneur sous la Restauration,  un volume unique dont la symétrie des ouvertures (les deux façades, côté cour et côté jardin sont identiques) et la sobriété du décor laissent une impression de sévérité.\r\nchâteau du Bois-Denats, propriété privée, en mauvais état en 2006 ne se visite pas,.                                                                                            CORMIER, assez semblable au château de la Roche Cotherel, le château du Cormier, construit dans le troisième quart du XIXe siècle, succède comme lui à un ancien manoir déclassé. Le parti adopté par Arthur Regnault est ici plus ambitieux : le corps de logis central, double en profondeur, est précédé côté nord d'un pavillon saillant servant de hall d'entrée, tandis que deux autres du même modèle mais plus modestes encadrent la façade sur le parc au sud.","architecture":"ROCHE-COTHEREL, édifice bâti sous le second Empire avec les matériaux de l'ancien manoir démoli à l'occasion, le nouveau château de la Roche Cotherel est une demeure de plaisance à la campagne. L'inspiration de l'architecte Arthur Regnault croise ici plusieurs influences: on y retrouve les manoirs Renaissance des bords de Loire et les hôtels particuliers contemporains. Dans le parc, vierge à l'Enfant datant peut-être du XVe siècle scellée dans un arbre, provenant peut-être de l'ancienne chapelle également d'anciens fonts baptismaux utilisés comme vasque et provenant de la collection d'un antiquaire rennais.","habitants":"Seigneurs locaux\r\n        \"","divers":"Trois châteaux  à Bovel; Bois-Denats grav-1, Cormier grav-2 et Roche-Cotherel grav-3                                                                              Gps  47° 57' 03\" nord, 1° 58' 33\" ouest","gps":"","images":["../image/image_35/35_Bovel_1.jpg","../image/image_35/35_Bovel_2.jpg","../image/image_35/35_Bovel_3.jpg"]},"Consult_chateau_formulaire345c":{"id":"Consult_chateau_formulaire345c","dept":"35","canton":"Redon","commune":"Renac","nom":"Brossay_Renac","type":"Château","periode":"XIX","histoire":"BROSSAY,  construit en 1894 pour Maurice du Halgouët par Henri Mellet sur le site d'un ancien manoir. Le château de Brossay était une seigneurie avec haute, basse et moyenne justice. C'est actuellement une jolie campagne entourée de bois, habitée par la famille du Halgouët. L'édifice peut être considéré comme l'une des réalisations majeures de l'architecte Henri Mellet. De style néo-Renaissance, il répond à un programme de grande envergure témoignant de l'importance des moyens de son commanditaire, un riche propriétaire noble. La qualité de l'architecture et de sa mise en oeuvre, la présence d'un parc et de dépendances en font l'un des édifice remarquable à l'échelle départementale.","architecture":"BROSSAY, l'édifice se développe selon un plan complexe composé de deux corps de bâtiment disposés en T auxquels sont accolés plusieurs pavillons dissymétriques ainsi que des tours. La maçonnerie de gros oeuvre est en grès. Les parties supérieures des élévations ainsi que les lucarnes sont en calcaire, de même que la décoration de l'entrée. Les façades n'ont subi aucune modification si l'on accepte une petite véranda construite à l'est. Le château se compose de quatre ou cinq niveaux : un étage de soubassement avec cuisine, caves etc. ; un rez-de-chaussée surélevé consacré aux pièces de réception ; un étage et un comble abritant les chambres ; un étage de comble partagé entre chambres des domestiques et greniers. A l'intérieur, la distribution originelle est totalement préservée de même que la décoration intérieure, abstraction faite de deux pièces au rez-de-chaussée. C'est dans cette partie du château que l'on trouve les décors les plus aboutis. Ainsi, le grand escalier, dans la tour Est, est en calcaire blanc. La salle-à-manger, entièrement lambrissée, renferme une cheminée monumentale en calcaire. Le grand salon polygonal bénéficie également d'un décor de très grande qualité. Le parc est bordé par un massif forestier dans lequel on relève la présence d'un groupe de quatre menhirs en quartzite. Une petite chapelle, probablement un ancien colombier reconverti, ainsi que deux dépendances abritant écuries, garages à voitures, logements s'élèvent non loin du château. A l'ouest, une imposante ferme modèle est contemporaine de la demeure. Elle se compose de deux corps de bâtiment ainsi que d'autres secondaires. A cet ensemble s'ajoute un grand potager clos de murs.","habitants":"famille du Halgouët\r\n        \"","divers":"a Renac le château de Brossay grav-2-3-4                         GPS : 47° 43' 3\" Nord, 1° 57' 56,52\" Ouest                                                          Mairie grav-1","gps":"47° 43' 3\" Nord, 1° 57' 56,52\" Ouest","images":["../image/image_35/35_Brossay_Renac_1.jpg","../image/image_35/35_Brossay_Renac_2.jpg","../image/image_35/35_Brossay_Renac_3.jpg","../image/image_35/35_Brossay_Renac_4.jpg"]},"Consult_chateau_formulaire2735":{"id":"Consult_chateau_formulaire2735","dept":"35","canton":"Bruz","commune":"Bruz","nom":"Bruz","type":"Château","periode":"XV-XVII-XVIII","histoire":"Trois châteaux dans cet article ; les Loges, Cice, les Ormeaux.                                                                                       Les LOGES, relevait de la juridiction des Régaires de l'évêché et appartenait aux Bréhart en 1427. Puis il fut la propriété des Rallier, sieurs de Pierrefitte en 1655 et des Michau, sieurs de Montaran, de 1667 à 1714 . Ce sont ces derniers qui réédifièrent le manoir d'origine en 1680 et qui y joignirent en 1691 une chapelle et une fuie octogonale à toit plat surmonté d'un clocheton. L'ancien manoir s'élevait entre la chapelle et la fuie. En 1767, le château fut acheté par les Du Boisbaudry, qui le revendirent la même année aux Léon des Ormeaux. Suite à l'émigration de ses propriétaires pendant la Révolution, le domaine des Loges fit partie des Biens Nationaux. En 1808, M. Joseph Drouet de Montgermont, élu maire de Bruz, s'installa au château des Loges où il vécut jusqu'à son décès en 1823. Il fut acheté par M. Gourdon vers 1925 et resta dans la propriété de sa famille jusqu'à la fin des années 1960.  On accède aujourd'hui au logis, construit en 1871, par deux allées nobles. L'élévation régulière et symétrique, le plan ternaire ainsi que la sobriété du vocabulaire architectural sont caractéristiques de la fin du XIXe siècle.  La façade Est s'ouvre sur la cour, autour de laquelle sont disposés une chapelle au sud, et un jardin d'hiver au nord. La façade ouest donne sur le parc. Le château se compose de trois pavillons : un pavillon central à trois travées flanqué de deux pavillons latéraux à une travée. Le rez-de-chaussée est surélevé et surmonté d'un étage carré et d'un comble. Le soubassement est en granite, le reste du bâtiment en calcaire, le tout en petit appareil régulier avec des chaînes d'angle en harpe. Sur la façade Est, les encadrements des ouvertures sont légèrement cintrés et sobrement ornés. Les lucarnes latérales sont coiffées d'un fronton triangulaire, la lucarne centrale d'un fronton cintré.","architecture":"CICE, le château de Cicé a été construit au XVIIe siècle. Le Château de Cicé est en ruine, aujourdhui. On peut encore admirer la chapelle Saint-Charles-Borromé et ses deux fermes, Au château de Cicé s'établit la famille Champion qui compte plusieurs éminents personnages.                                                                                                                      ORMEAUX, son seigneur châtelain est l'évêque de Rennes. A l'époque de la Révolution, Bruz connaît les troubles liés à la chouannerie, le château et le bois de Cicé étant devenus des repaires. De nombreux manoirs et maisons nobles ont été recensés dans la commune, dont un attesté au XVe siècle, quatre au XVIe siècle et treize au XVIIe siècle. Certains ont disparu, mais on peut encore voir celui du Manoir Saint-Armel daté des XVe et XVIIe siècles, bien conservé, Carcé et la Haye de Cicé du XVIe siècle, et entre autres la Houssais, Pierrefitte, la Droulinais, la Haye de Pan et la Louvière du XVIIe siècle. Cette abondance témoigne d'une période de prospérité entre le XVe et le XVIIe siècle, mais les plus anciennes fermes conservées ne datent que de la fin du XVIe siècle et du début du XVIIe siècle. Auparavant, on ne devait trouver dans la campagne que des habitations construites en motte de gazon et en bois.Le château des Ormeaux est une construction de la deuxième moitié du XIXe siècle, vers 1860 par la famille Léon des Ormeaux. Il remplace l'ancien manoir de la Bihardais qui appartenait au XVe siècle aux Baudoin. Il est construit dans un style néo-XVIIe siècle (balustrade, imposte, fronton) et a un volume de toit à la Louis XIII. C'est près de ce château que les allemands avaient entreposés un dépôt de munitions, objectif du bombardement de 1944. Le château possède un beau pavillon central avec une horloge et un lanternon. Plan massé comportant un rez-de-chaussée, un étage carré et un étage de comble.","habitants":"Loges;  les Du Boisbaudry,                                                                    Ormeaux; famille Champion\r\n        \r\n        \"","divers":"Trois châteaux à Bruz; les Loges grav-5, Cice grav-1-2, les Ormeaux grav-3-4.                                                                                              Cicé GPS : 48° 01' 29\" Nord 1° 44' 45\" Ouest","gps":"48° 01' 29\" Nord 1° 44' 45\" Ouest","images":["../image/image_35/35_Bruz_1.jpg","../image/image_35/35_Bruz_2.jpg","../image/image_35/35_Bruz_3.jpg","../image/image_35/35_Bruz_4.jpg","../image/image_35/35_Bruz_5.jpg"]},"Consult_chateau_formulaire1285":{"id":"Consult_chateau_formulaire1285","dept":"35","canton":"Bruz","commune":"Bruz","nom":"Bruz-II","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux dans cet article; St-Armel, Clozel Carcé, et les Planches et Vau-Gaillard.                                                ST-ARMEL, le manoir de Saint-Armel est un manoir épiscopal construit au XVe au XVIIe siècle. Le manoir se compose de deux bâtiments rectangulaires allongés se rassemblant à angle droit. Des douves formaient un grand carré autour de l'ensemble. Au sud se trouvaient une écurie, un porche et diverses servitudes. Le bâtiment ouest présente une porte cintrée, ornée de deux pilastres ioniques et d'un fronton triangulaire que remplit un écusson en accolade. Le côté nord de la cour comprend un bâtiment qui renfermait la Chambre du cerf et la prison. Le portail d'entrée du manoir de Saint-Armel, du début du XIXe siècle, est en plein cintre, avec deux pilastres ioniques et une corniche moulurée. Il remplace l'ancien portail que surmontait une chambre et sous lequel se tenait l'un des 5 plaids généraux de l'évêché. Il est précédé d'un pont à 2 arches qui se terminait autrefois par un pont levis. A l'Est du portail, se trouvait un bâtiment de servitude. La chapelle construite en 1329, fut démolie en 1791. Une fuie et un vivier existaient à l'Ouest du manoir. qui est inscrit aux M.H. depuis le 11/08/1975.                                                                                                      CLOZEL, d'après la tradition orale, la demeure aurait été construite peu après la vente du champ le Clozel à M. et Mme Thomas, datée par un acte du 21 septembre 1880. La propriétaire suivante, mademoiselle de Cintré, a fait rajouter vers 1892 l'aile ouest,Cette demeure de type ternaire présente un plan double en profondeur et comporte quatre niveaux : une cave, un rez-de-chaussée surélevé, un étage et un comble. En façade sud, un escalier double droit conduit à la porte d'entrée, il est surmonté d'une terrasse à balustrade décorée, accessible par un escalier situé dans une tourelle à l'arrière du bâtiment.","architecture":"CARCE,  du XVIe siècle. Le château comprenait au XVIe siècle un corps de logis et deux pavillons, la tourelle occupait le centre du corps de logis. On y trouvait une chapelle fondée en 1668, une fuie carrée et une orangerie. Le 24 août 1668, François de Gain, seigneur de Carcé, secrétaire du roi, dote la chapelle de 75 livres de rente et y fonde une messe les dimanches et fêtes. Propriété successive des familles le Porc (en 1387 et 1427), Cleuz (en 1448), Mauvy (en 1496 et 1513), Bourgneuf (en 1542), Gain (en 1599), Mauvy (en 1647 et 1660), Pinczon, seigneurs du Pontbriant (en 1684 et 1703), Pré, seigneurs de Pellan (en 1729). En 1730, la seigneurie de Carcé devient propriété de la Société d'exploitation des mines de Pont-Péan Carcé a été transformé en habitation moderne, et n'a conservé que de rares vestiges de son antiquité. C'est, au début du XXe siècle, la propriété de Mme Petit dont la famille possédait depuis longtemps Carcé. Tout à côté est une minoterie portant le même nom, qui se trouve encaissée entre des rives plantées de beaux arbres.                                                                                                                       PLANCHES,  la maison des Planches. Propriété de la famille Legay en 1784. Au début du XXe siècle, on trouve la famille Lerclerc de la Herverie A noter qu'une villa du nom de \"Petites Planches\" était jadis la demeure de M. Bousquet, maire de Bruz (début du XXe siècle).                                          VAU-GAILLARD, était une construction du XVIIe siècle, il fut détruit par les bombardements du 8 mai 1944. Il appartenait au XVIIIe siècle au directeur de la mine de Pont-Péan, puis aux de la Bourdonnaye seigneurs de Blossac. Corps principal flanqué au sud de deux pavillons à toits élevés et au nord de deux grosses tours ; son toit à la Mansart est coupé du côté sud par un fronton triangulaire percé d'un il-de-buf, et du côté nord par un fronton arrondi. Deux tours isolées et plus petites se dressent en avant de la façade sud. Le château avait une douve et une fuie.","habitants":"St-Armel                                                                                           Clozel; M. et Mme Thomas                                                               Carcé; François de Gain les Planches ; famille Legay\r\n        \"","divers":"Trois châteaux à Bruz; St-Armel,  Carcé-grav-1,  Clozel grav-2 et les Planches grav-3     Vau-Gaillard grav-4                                                                 GPS : 48° 00' 54,92\" Nord 1° 44' 40,58\" Ouest","gps":"48° 00' 54,92\" Nord 1° 44' 40,58\" Ouest","images":["../image/image_35/35_Bruz_II_1.jpg","../image/image_35/35_Bruz_II_2.jpg","../image/image_35/35_Bruz_II_3.jpg","../image/image_35/35_Bruz_II_4.jpg"]},"Consult_chateau_formulaireb7d9":{"id":"Consult_chateau_formulaireb7d9","dept":"35","canton":"Le Rheu","commune":"Bréal-sous-Montfort","nom":"Bréal_Montfort","type":"Château","periode":"XIV-XIX","histoire":"Trois châteaux dans cet article; Haute-Foret, Folie et Molant                                                                                    HAUTE-FORET, de styles mi-gothique, et mi-Renaissance, qui remplace un manoir existant en ce lieu aux XIVe et XVe siècles, fut bâti en 1857 puis agrandit en 1866 pour Hypollite de Farcy.  Quelques influences néo gothiques dans le décor et les statues mythologiques du jardin font de cet ensemble un hommage à l'éclectisme du second Empire. La porterie est construite en 1866.  La compagne de Diane est signée et datée : Fremin, 1717. La statue originale conservée au musée du Louvre avait été commandée à René Fremin par la direction des bâtiments du roi pour le parc du château de Marly.  Les marathoniens sont d'Amadio de Naples. L'une des sculptures porte le nom et la provenance de l'artiste. Paul Banéat mentionne en cet endroit un ancien manoir en 1427 et 1513 et appartenant aux La Haye. Le château actuel construit pour la famille de Farcy a été habité par la suite par la famille d'Uzes, puis racheté par la famille Nignon en 1908.\r\nChâteau : gros oeuvre enduit ; encadrements des baies en pierre de taille de calcaire. Décor intérieur style Louis XVI homogène et bien conservé ; escalier tournant avec balustrade en fer forgé alternant volée centrale et volées doubles à montée parallèle (hall d'entrée). Communs : schiste en soubassement, gros oeuvre en terre enduit, décor en pan de bois. Conciergerie : gros oeuvre en terre ; encadrement des baies et chaînage des angles en pierre de taille de calcaire et en brique, inscription par arrêté du 5 juillet 2007.","architecture":"FOLIE, il existait autrefois, un manoir mentionné au XVe siècle. Il appartenait aux Cancouët en 1427 puis aux Saint-Brieuc qui en étaient propriétaires en 1513. Le logis actuel est daté de la fin du XVIIIe  du début du XIXe siècle. Il présente les caractéristiques des logis à pavillon de plan massé avec une façade à deux travées.  Une corniche en bois moulurée rend compte du soin apporté à l'élévation de la façade. Le corps de bâtiment plus bas accolé est également de la même époque avec des transformations au XIXe siècle. Les bâtiments de ferme séparés, en partie en terre, sont du XIXe siècle. Le logis est en moellons de schiste sans chaîne en pierre de taille. Le château est représenté par un plan massé, un pavillon, un rez-de-chaussée surélevé sous cave et un escalier droit extérieur.                                                                                                                    MOLANT, le château et ses dépendances, chapelle et orangerie forment un très bel ensemble de la deuxième moitié du XVIIIe siècle. La construction homogène présente une authenticité que peu d'édifices analogues ont conservée. L'architecture et le décor sont restés tels qu'ils ont été conçus et mis en oeuvre pour la famille du Boberil. L'ensemble est composé d'un château de plan rectangulaire avec façades symétriques et avant-corps central. Le décor modeste est néanmoins authentique. Le château contient également un très bel escalier en fer forgé daté de 1786. Une chapelle a deux clochetons qui possède une abside à trois pans construite en 1779, une orangerie et des vestiges d'une ancienne chapelle \r\nLes encadrements des baies du château sont en pierre de taille de granite.Un étage de soubassement, un étage carré, un étage de comble. Avant corps central a deux travées, fronton triangulaire en façade avant. Fronton courbe en façade arrière. Toiture à longs pans brisés et croupe.  Orangerie : arcade en plein cintre avec fronton triangulaire. Classement par arrêté du 9 septembre 1993.","habitants":"Haute-Foret; Famille Hypollite de Farcy.                                     Mollant; Famille du Boberil\r\n        \"","divers":"Trois châteaux à Bréal-sous-Montfort; Haute-Foret grav-1-2-3, Folie grav-6 et  Mollant grav-4-5                                              GPS : 48° 03' 16,68\" Nord 1° 49' 35,7\" Ouest                                                       Folie GPS : 48° 02' 55\" Nord, 1° 51' 55\" Ouest                                                      Haute foret GPS : 48° 4' 11,3\" Nord, 1° 51' 25,24\" Ouest","gps":"48° 03' 16,68\" Nord 1° 49' 35,7\" Ouest","images":["../image/image_35/35_Br%c3%a9al_Montfort_1.jpg","../image/image_35/35_Br%c3%a9al_Montfort_2.jpg","../image/image_35/35_Br%c3%a9al_Montfort_3.jpg","../image/image_35/35_Br%c3%a9al_Montfort_4.jpg","../image/image_35/35_Br%c3%a9al_Montfort_5.jpg","../image/image_35/35_Br%c3%a9al_Montfort_6.jpg"]},"Consult_chateau_formulaire31cf":{"id":"Consult_chateau_formulaire31cf","dept":"35","canton":"Saint-Malo","commune":"Cancale","nom":"Cancale","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article  sur Cancale; Barbe Brulée  et Richeux. et divers autres châteaux dont je n'ai pas d'information.                                                                                         CANCALE 13 manoirs ou demeures ont été recensés sur le territoire communal cette distinction de dénomination arbitraire a été établie car certains des logis n'ont pu être identifiés comme des maisons nobles en raison de l'absence de recherche documentaire approfondie.                                                                                                               Fort DUGUESCLIN   Vallées et Lourdes                                                                                                             BARBE-BRULEE, le corps de garde des Daules, édifié au XVIIe siècle dans lanse du Verger ; il sagit du dernier corps de garde édifié par Sébastien Le Prestre de Vauban sur les côtes du département. Il a été classé par arrêté du 3 mai 1955                                                                                          Le Castel de Barbe Brûlée, qui domine l'anse de Port-Mer, est un château aujourd'hui reconverti en centre d'accueil pour classes de découvertes et colonies de vacances. Implanté au coeur d'un parc arboré de 2,5 ha, il offre un cadre de jeu idéal pour les enfants. Des chemins permettent de rejoindre les différentes plages dont celle de Port-Mer, où est implantée la base nautique. Le château, situé à proximité de la pointe du Grouin, offre une vue sur toute la baie.","architecture":"RICHEUX, dans les années 1920, l'élégante Madame Shaki tombe amoureuse de ce bout de falaise sur laquelle elle demande à Yves Hémard d'imaginer une maison. L'architecte malouin fait de ce projet un laboratoire d'idées, invente un petit château mariant des styles différents dans une cohérence générale pourtant étonnante. L'un de ses visiteurs les plus célèbres n'est autre que Léon Blum, ami de la propriétaire, ce qui vaut alors à Richeux le surnom de \"Maison du président\". Pendant l'Occupation, la bâtisse est réquisitionnée puis, après-guerre, tombe en triste désuétude.A partir des années 1970, ses nouveaux gardiens tentent de la réhabiliter. En 1992, Jane et Olivier Roellinger achètent la propriété et y engagent des travaux titanesques contre l'avis de tous ceux qui  le déconseillaient. Aujourd'hui, plus personne, même parmi les plus sceptiques à l'époque, pour mettre en doute l'inspiration du couple.","habitants":"Sébastien Le Prestre de Vauban                                              Richeux; Ane et Olivier Roellinger \r\n        \r\n        \"","divers":"Deux châteaux à Cancale grav -1, Barbe-Brulée grav-1-2-3-   Fort Duguesclin  grav 7.  et Richeux grav-5-6. et divers autres châteaux 48° 40' 36\" nord, 1° 51' 07\" ouest                                                         48° 41' 50\" nord, 1° 52' 51\" ouest","gps":"","images":["../image/image_35/35_Cancale_1.jpg","../image/image_35/35_Cancale_2.jpg","../image/image_35/35_Cancale_3.jpg","../image/image_35/35_Cancale_4.jpg","../image/image_35/35_Cancale_5.jpg","../image/image_35/35_Cancale_6.jpg","../image/image_35/35_Cancale_7.jpg","../image/image_35/35_Cancale_8.jpg"]},"Consult_chateau_formulaire8af5":{"id":"Consult_chateau_formulaire8af5","dept":"35","canton":"Saint-Malo","commune":"Cancale","nom":"Cancale_II","type":"Malouinière","periode":"XVII-XVIII-XIX","histoire":"CANCALE  manoirs ou demeures ont été recensés sur le territoire communal cette distinction de dénomination arbitraire a été établie car certains des logis n'ont pu être identifiés comme des maisons nobles en raison de l'absence de recherche documentaire approfondie.                                                                                                  GAILLARD Manoir du 17e siècle (très remanié au 19e siècle) dit Château Gaillard composé de trois travées, recouvert d'une haute toiture en pavillon. Lucarnes à signaler.                                                                                                            La VALLEE Cette malouinière datée de 1726 a été construite au bord du ruisseau de la Vallée, à l'emplacement d'un ancien logis qui était entouré de douves. Cet ensemble architectural de qualité s'intègre dans un environnement boisé sauvegardé. Les bâtiments de ferme situés au nord sont encore en place mais ils sont dénaturés.                                                                                                              BELLEVUE Ancien manoir, la demeure de Bellevue est mentionnée sur le cadastre de 1828. Elle s'apparente aux malouinières de la région par son style. Elle est composée d'un corps central entouré de deux pavillons latéraux. L'église Saint-Méen et la place de la République ont été construits sur l'ancien fonds de cette vaste propriété. Le bâtiment a été vraisemblablement modifié à la suite des aménagements du 4e quart du XIXe siècle qui font de cet endroit le nouveau centre ville. La façade est très dénaturée aujourd'hui par un établissement commercial en rez-de-chaussée.                                                                  VERRIE Maison de notable entièrement close de murs construite dans la seconde moitié du 18e siècle. On lui a ajouté une aile arrière au 20e siècle, époque de remaniements du logis. Elle possède plusieurs jardins supérieurs accessibles par des escaliers qui donnent à cette propriété un attrait supplémentaire. Une remise a été construite au XIXe siècle.","architecture":"VAUJOYEUX ; Cette demeure qui regroupe aujourd'hui plusieurs bâtiments et abrite différentes associations communales fait partie des édifices importants de la commune tant d'un point de vue architectural que du point de vue historique. Le corps principal d'habitation, bien conservé, a été construit en 1756 (daté par travaux historiques). Il a été agrandi en 1826 (porte la date) de pavillons latéraux par Louis Hamon-Vaujoyeux, maire de Cancale de 1820 à 1832. La propriété est mise en vente et achetée le 12 avril 1856 par le curé Mollier, au nom du Bureau de Bienfaisance comme le désirait William Hamon-Vaujoyeux dans son testament. Le 27 octobre 1857, les classes primaires et l'hospice de la rue de la Rigole y sont transférés dans des bâtiments récemment construits formant deux ailes arrières au nord. Des remaniements et des extensions sont également à signaler au début du 20e siècle. Un monument commémoratif à la mémoire de William Hamon-Vaujoyeux se dresse au centre du jardin sud. Sur ce dernier, se lit l'inscription suivante : A la mémoire de Mr William Hamon-Vaujoyeux, fondateur de l'hospice de Cancale né dans cette ville, le 20 septembre 1749 et mort à Philadelphie le 16 octobre 1816.","habitants":"Divers Malouiniers\r\n        \r\n        \"","divers":"Châteaux à Cancale Gaillard grav -1 Bellevue-grav-2    la Vallée grav-4 Vaujoyeux-grav-3 Lourdes grav-5 Conchérir -7              Rimaines-8","gps":"","images":["../image/image_35/35_Cancale_II_1.jpg","../image/image_35/35_Cancale_II_2.jpg","../image/image_35/35_Cancale_II_3.jpg","../image/image_35/35_Cancale_II_4.jpg","../image/image_35/35_Cancale_II_5.jpg","../image/image_35/35_Cancale_II_6.jpg","../image/image_35/35_Cancale_II_7.jpg"]},"Consult_chateau_formulairee6a1":{"id":"Consult_chateau_formulairee6a1","dept":"35","canton":"Montauban-de-Bretagne","commune":"Bécherel","nom":"Caradeuc","type":"Château","periode":"XVIII","histoire":"CARADEUC, sa première propriétaire fut Anne-Nicolas de Caradeuc qui en avait fait sa résidence principale.  Construit vers 1723 par le père du procureur général du roi au parlement de Bretagne, Louis René de Caradeuc de la Chalotais, il passa ensuite aux mains du comte Alfred de Falloux, puis de la famille de Kernier qui commanda à Edouard André, le château appartient toujours aux descendants du procureur. De style Régence, au classicisme un peu froid, le château est entouré du plus vaste parc de Bretagne. Créé au XVIIIe siècle, puis remanié dans un style classique vers 1900, ce magnifique parc est surnommé le \"Versailles breton\".\r\nÉléments protégés MH : le château, à savoir les façades et les toitures du logis et des communs et le parc en totalité : inscription aux M.H. par arrêté du 21 février 2011.","architecture":"CARADEUC, sa construction vers 1723, le château était constitué dun grand corps de logis flanqué de deux pavillons latéraux aux toits surélevés. Au centre se trouvait un embryon de pavillon  en saillie surmonté dun fronton triangulaire qui ne dépassait pas la hauteur des lucarnes du corps de logis. Celui-ci était relié aux bâtiments de service. Lors de la rénovation du château après la Révolution française, le château est séparé des communs, les pavillons central et oriental sont encastrés de pilastres de granit gris-bleu de Lanhélin et le pavillon central est surmonté dun nouveau fronton de pierre blanche où est gravé le blason de la famille des Caradeuc accolé à celui des Martel (épouse de Raoul Caradeuc de la Chalotais) ainsi que la devise des Caradeuc : « Arreste ton cur ». Le péristyle dentrée est édifié, mais le pavillon occidental est laissé en mauvais état.  Larchitecture actuelle du château date de la fin du XIXe siècle. Sous la direction de larchitecte Mellet, les toitures des pavillons sont rehaussées le pavillon ouest a entre-temps été supprimé  afin de leur donner un aspect à la Mansart, les lucarnes de pierre blanche sont remplacées par de nouvelles en granit de Kérinan. Les anciennes colonnes du péristyle sont supprimées ; il est actuellement constitué de deux paires de colonnes jumelées surmontées dune balustrade en pierre. Sur la façade nord, un imposant escalier à double révolution mène à deux terrasses munies de balustrades courant au long du corps de logis.","habitants":"Famille de  Anne-Nicolas de Caradeuc et la Famille de Kernier\r\n        \"","divers":"A Bechevel, Caradeuc GPS : 48° 17' 37,28\" Nord 1° 57' 30,61\" Ouest","gps":"48° 17' 37,28\" Nord 1° 57' 30,61\" Ouest","images":["../image/image_35/35_Caradeuc_1.jpg","../image/image_35/35_Caradeuc_2.jpg","../image/image_35/35_Caradeuc_3.jpg","../image/image_35/35_Caradeuc_4.jpg"]},"Consult_chateau_formulairea523":{"id":"Consult_chateau_formulairea523","dept":"35","canton":"Betton","commune":"Cesson Sévigné","nom":"Cesson_Sévigné","type":"Château","periode":"XVIII","histoire":"Cinq châteaux à Cesson-Chevigné dont celui de Cesson , de Bourgchevreuil, de Cucé, de Hautes sévigné, la Monniais et le Chalotais                                                                                                                  CESSON-SEVIGNE  Le nom de la commune de Cesson a été modifié en Cesson-Sévigné en 1921. Sévigné est le nom d'une ancienne seigneurie de Gévezé, berceau de la famille de Sévigné, cette famille possédait aussi une seigneurie sur le territoire de Cesson situé à l'est de la commune au bord de la Vilaine, dont Marie de Rabutin-Chantal, épouse d'Henri de Sévigné, appelée la marquise de Sévigné, est le membre le plus connu                                                           BOURGCHEVREUIL, manoir  du XVII-XXe siècle), situé rue de l'hôtel de Ville. Propriété en 1620 de François Bonnier des Grée, puis des familles Farcy, seigneurs de la Daguerie (en 1683), Robinois (en 1715), Bélossier ou Legault (en 1744). On y trouve un ancien four à pain (XIXe siècle) .                                                                                             CUCE, le château de Cucé est inscrit aux M.H. depuis 1970. L'architecte était Binet  La seigneurie de Cucé a été successivement possédée par les familles de Cucé, de Montbourcher, de Bourgneuf, du Boisgeslin et de Cahideuc. Il fait lobjet dune inscription au titre des monuments historiques depuis le 23 novembre 1970 . L'hôtel de ville ancien manoir de Chalotais XVIe siècle                                                       HAUTES SEVIGNE  manoir  du XVIIIe siècle. Le domaine du Haut-Sévigné appartient à la famille de Sévigné du XIe siècle à 1715. Cest une ancienne châtellenie qui est érigée en Bannière en 1440. En 1715, il devient la propriété de la famille le Prestre de Lézonnet, barons de Châteaugiron ; ceux-ci lunirent jusquen 1789 à la seigneurie de Châteaugiron. Ce manoir occupe l'emplacement du château médiéval, démoli en 1484 sur ordre du duc de Bretagne. Le pigeonnier date du XVIIIe siècle.","architecture":"CUCE  date du XVIIIe siècle. Il est constitué d'une succession  de pavillons aux couvertures variées. L'ancien manoir possédait une grosse tour. Le château actuel est entouré d'un parc muré. La façade occidentale comprend un pavillon central, deux corps de bâtiment en retrait et deux ailes saillantes. Au premier étage se trouve un balcon en fer forgé et ouvragé, soutenu par quatre consoles à enroulements et à feuilles d'acanthe. Le deuxième étage est orné d'un grand fronton triangulaire mouluré, décoré d'une rosace accostée de deux rinceaux. Au-dessus s'élève un toit en dôme, percé d'une grande gerbière avec deux consoles renversées et deux chutes de fruits pendues à des anneaux que soutiennent deux têtes de lion. Sur la façade ouest, la construction nord renferme la chapelle de la fin du XVIIIe siècle, qui remplace une chapelle plus ancienne. Son abside est à pans coupés. Le Château de La Salette de Cucé est masqué, par son mur d'enceinte et la végétation. Le fronton triangulaire et le toit en dôme du pavillon central sont visibles, en arrière-plan, ainsi que les 2 corps de bâtiment et un pignon de l'aile Nord.                     LA MONNIAIS,   le manoir de la Monniais (XV-XVIe siècle). Propriété successive des familles Poré (en 1458), Busnel (en 1562), du Breil, seigneurs de la Roche (avant 1652), Kerguézec, seigneurs de Brays (en 1652 et 1715), Viard (en 1752 et 1789) ;                                                                 La CHALOTAIS   l'ancien manoir de la Chalotais (XVI-XVIIe siècle), propriété de la famille Caradeuc de la Chalotais. Le manoir a été acquis par la municipalité qui y a installé l'hôtel de Ville en 1973.","habitants":"Familles de Cucé\r\n        \"","divers":"Cinq châteaux à Cesson-Chevigné dont celui de Cesson , de Bourgchevreuil, de Cucé grav 1-2, de Hautes sévigné grav-7 la Moinneriis grav-3-4-5     et le Chalotais   de grippé grav-6   GPS : 48° 05' 37\" Nord 1° 36' 02\" Ouest","gps":"48° 05' 37\" Nord 1° 36' 02\" Ouest","images":["../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_1.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_2.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_3.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_4.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_5.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_6.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_7.jpg","../image/image_35/35_Cesson_S%c3%a9vign%c3%a9_8.jpg"]},"Consult_chateau_formulaired203":{"id":"Consult_chateau_formulaired203","dept":"35","canton":"Guichen","commune":"La Chapelle-Bouëxic","nom":"Chapelle_Bouëxic","type":"Château","periode":"XV-XVII","histoire":"CHAPELLE-BOUEXIC, vers la fin du XVIIe siècle, une allure presque médiévale. En lieu et place du manoir de la famille du Tiercent, Yves du Bouëxic, seigneur de Pigneuc et de La Chapelle, Il fut la propriété de la famille du Tiercent en 1427 et en 1562, puis de la famille du Bouëxic, du XVIe au XVIIIe siècle, des Quesnel de la Morinière, de 1806 à 1824, de la famille de Menou jusqu'en 1949. Le Château était mentionné dans les archives dès 1427. Il possédait jadis un droit de haute justice et des fourches patibulaires. Il fut la propriété de la famille du Tiercent en 1427 et en 1562, puis de la famille du Bouëxic du XVIe au XVIIIe siècle, des Quesnel de la Morinière de 1806 à 1824, de la famille de Menou jusqu'en 1949. Le Château du Bouëxic a été pillé au moment de la Révolution française, le 19/01/1790, ce qui entraîna lincendie des papiers seigneuriaux. Aujourd'hui, le château n'appartient plus à la commune de La Chapelle-Bouëxic, mais a été vendu à un particulier, Bernard de Kerdréan. Le domaine qui comprend le château du Bouëxic et ses environs dont l'église, fait lobjet dune inscription aux M.H. depuis le 12/05/2015.","architecture":"BOUEXIC,  cette   construction date du XVe au XVIIe siècle,   ce vaste château dont Paul Banéat reproduit une description de la fin du XVIIe siècle: un grand corps de logis au bout duquel sont orangeries et galeries avec cour dans laquelle sont les écuries, les remises à carrosses et ménageries, un jardin au derrière de la maison, un bois de haute futaye, un promenoir, un étang canaux et fontaine au milieu du jardin, le tout en un tenant cerné de muraille. Le parc comprend une orangerie, un pigeonnier, une ferme, une fabrique de jardin, un bassin et un vivier.\r\nLe logis du château est, au moment du passage en CRPS du 6 février 2003, divisé en plusieurs logements et acquis par la commune. Un propriétaire privé a depuis acheté le logis et enlevé les cloisons en briques pour rendre son unité au logis. Les pièces de réception ont gardé leur décor avec boiseries et cheminées. Les communs qui encadrent la cour d'honneur appartiennent à différents propriétaires mais forment un ensemble homogène. Un peu à l'écart, le colombier, sans doute contemporain du château dont il dépend, présente un plan octogonal assez original.","habitants":"Famille du Tiercent et Famille du Bouëxic\r\n        \r\n        \"","divers":"Château de la Chapelle de Bouëxic                                                    GPS : 47° 55' 44\" Nord, 1° 56' 16\" Ouest","gps":"47° 55' 44\" Nord, 1° 56' 16\" Ouest","images":["../image/image_35/35_Chapelle_Bouexic_1.jpg","../image/image_35/35_Chapelle_Bouexic_2.jpg","../image/image_35/35_Chapelle_Bouexic_3.jpg","../image/image_35/35_Chapelle_Bouexic_4.jpg","../image/image_35/35_Chapelle_Bouexic_5.jpg","../image/image_35/35_Chapelle_Bouexic_6.jpg"]},"Consult_chateau_formulaire18dc":{"id":"Consult_chateau_formulaire18dc","dept":"35","canton":"Montauban-de-Bretagne","commune":"La Chapelle-Chaussées","nom":"Chapelle_Chaussée","type":"Château","periode":"XVI-XVII","histoire":"CHAPELLE CHAUSSEE, le bourg de La Chapelle-Chaussée sest principalement constitué le long dune voie romaine à partir de 1243. Cest après 1825 , que le village se développe vers lOuest et le Nord. La présence du château à lEst du bourg induit cette évolution géographique, laissant le paysage de lentrée du village dégagé.  Il est situé route de Langouët, et il fut la propriété des familles Garel, seigneurs de Lerguayn en 1445 et en 1555 et Ginguené en 1577.  Éléments protégés MH : les façades et les toitures du château.","architecture":"CHAPELLE CHAUSSEE, a été bâti aux XVIe siècle et XVIIe et sa construction été achevée au XIXe siècle. Il est orné de boiseries de style Louis XV. Le château de la Chapelle-Chaussée est inscrit aux M.H. depuis le 11/07/1967.  Le château est une construction du XVIe siècle après l'acquisition de la terre par la famille Ginguené, remaniée sous Louis XIII. Le château se compose de trois pavillons, de gerbières et de deux tourelles couvertes en dômes et surmontées de campaniles. Les toitures reposent sur des corniches modillonées. Remaniement postérieur de la demeure vers 1830, par l'architecte Rennais, Louis Richelot. L'intérieur est orné de boiseries Louis XV. Le salon de compagnie possède une cheminée monumentale sculptée qui conserve des traces de peinture, datant de la fin de la Renaissance française. Les deux tours circulaires qui flanquent le devant de l'édifice possèdent des escaliers à vis en bois. Le grenier est couvert d'une charpente en poutres de bois formant une coque de navire renversée.","habitants":"Chapelle ; Familles Garel et la  famille Ginguené\r\n        \"","divers":"Château de la Chapelle Chaussée                                               GPS : 48° 16' 11\" Nord 1° 51' 11\" Ouest","gps":"48° 16' 11\" Nord 1° 51' 11\" Ouest","images":["../image/image_35/35_Chapelle_Chauss%c3%a9e_1.jpg","../image/image_35/35_Chapelle_Chauss%c3%a9e_2.jpg","../image/image_35/35_Chapelle_Chauss%c3%a9e_3.jpg","../image/image_35/35_Chapelle_Chauss%c3%a9e_4.jpg"]},"Consult_chateau_formulaire151a":{"id":"Consult_chateau_formulaire151a","dept":"35","canton":"Combourg","commune":"La Chapelle aux Filtzméens","nom":"Chapelle_Filtzméens","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux dans cet article; Logis et celui de la Chapelle.                                                                               LOGIS, le château tel que nous le voyons aujourd'hui est une construction des XVIe et XVIIe siècles. Il porte gravé sur la pierre les armes de la famille de Saint-Gilles et la date de 1625.  On sait par ailleurs que la seigneurie de la Chapelle-aux-Filtzméens appartenait en 1513 au sieur de Saint Amadour. Il s'agit sans doute de François de Saint Amadour, chambellan du duc François II, capitaine de Saint-Aubin-du-Cormier et seigneur de Tizé. La qualité des vestiges en place pourraient être attribué à cette puissante et riche famille. Les dates de la reconstruction du logis ne sont pas plus définies que celles de la construction du premier logis. L'étude stylistique permet toutefois de dater cette campagne du début du XVIIe siècle. Le grand escalier rampe sur rampe date de cette période ainsi que la façade Nord plus austère. Sa tour lanterne à dôme a fait l'objet d'une restauration de qualité. Le puits situé dans la cour antérieure proviendrait du château du Gage sur la commune de Pleugueneuc.","architecture":"CHAPELLE aux FILTMEENS, sa construction date du XVIe siècle ; XVIIe siècle ; XIXe siècle. A l'époque où Jean Sans Terre détruisait les dépendances du diocèse de Dol, est entreprend  la construction d'un édifice laïc près des bâtiments du prieuré de la Chapelle aux Filtzméens, qui avait déjà subi des destructions. Cet édifice devait offrir aux moines une protection. L'ensemble du château actuel date du XVIIe siècle, avec un pavillon du XVIe. Il fut remanié et mis au goût du jour au XVIIe siècle . Les boiseries sont d'une facture Louis XV. Le colombier a conservé son état du XVIIe siècle, avec trois mille niches et une échelle tournante. Le château et les bâtiments qui l'entourent s'organisent autour de deux cours rectangulaires. Le château est prolongé par le pigeonnier et une haie de buis précédant les douves. Les bâtiments de la ferme sont rassemblés au nord du château, autour d'une cour. Le château de La Chapelle-aux-Filtzméens est inscrit aux M.H. depuis 1976 et 2013.                                                                            LOGIS. Logis de plan en U. Corps central rectangulaire asymétrique encadré de deux ailes de volumes différents. Sur l'aile droite, avec tourelle en encorbellement, est accolé à l'est un bâtiment rectangulaire avec une ancienne tour d'escalier dans oeuvre qui a été tronquée. Les différences de mise en oeuvre et les reprises d'appareillage semblent indiquer une reconstruction de la partie Ouest. Le décor de la façade sud-est significatif de la première renaissance, dorique en rez-de-chaussée, ionique à l'étage et corinthien aux lucarnes. Façade nord symétrique à 5 travées, sans décor hormis les frontons des lucarnes. Le gros oeuvre présente un appareillage différent en moellons de granite et en pierre de taille. De la pierre calcaire a été utilisée notamment aux lucarnes. Les encadrements des baies et le décor Renaissance de l'ancien logis semble avoir été réutilisé en façade principale.","habitants":"Logis; de François de Saint Amadour\r\n        \"","divers":"deux châteaux à la Chapelle Filtzméens; Logis  grav 2 à 6  et celui de la Chapelle   grav-1.                                                               Chapelle GPS : 48° 23' 01\" Nord, 1° 49' 32\" Ouest","gps":"48° 23' 01\" Nord, 1° 49' 32\" Ouest","images":["../image/image_35/35_Chapelle_Filtzm%c3%a9ens_1.jpg","../image/image_35/35_Chapelle_Filtzm%c3%a9ens_2.jpg","../image/image_35/35_Chapelle_Filtzm%c3%a9ens_3.jpg","../image/image_35/35_Chapelle_Filtzm%c3%a9ens_4.jpg","../image/image_35/35_Chapelle_Filtzm%c3%a9ens_5.jpg","../image/image_35/35_Chapelle_Filtzm%c3%a9ens_6.jpg"]},"Consult_chateau_formulaire62f2":{"id":"Consult_chateau_formulaire62f2","dept":"35","canton":"Châteaugiron","commune":"Chateaugiron","nom":"Chateaugiron","type":"Forteresse","periode":"XIV-XV","histoire":"CHATEAUGIRON,   En 1450 Jean de Derval entreprend la restauration du château, à Jean de Laval époux de Françoise de Foix maîtresse du roi François 1er. Le château ne fut pas relevé de sa ruine au  XVIIe siècle par la famille de Cossé-Brissac qui vendit la baronnie le 8 mars 1701 aux Le Prestre de Lézonnet. René Le Prestre de Lézonnet effectue d'importants travaux au début du XVIIIe siècle dans sa nouvelle propriété. Il agrandit l'ancien corps de logis ouest en un vaste bâtiment en fond de cour.  A la Révolution française, la famille finit pourtant par se séparer du château. Dans un premier temps, le donjon et la tour de l'Horloge sont donnés à la commune ; le reste du château est vendu à un marchand de Rennes, Ramé, en mars 1795. Par le jeu des successions, le château échoit en 1887 aux Renaud, puis en 1913 à Joseph Chudeau, un architecte nantais qui le vend en 1925 au conseiller général Francis Guérault. Donné par ce dernier au Conseil général d'Ille-et-Vilaine en 1926, le château voit disparaître l'année suivante ses écuries, en très mauvais état. En 1929 on projette d'y installer un musée d'art régional. Les façades sont traitées à la française. De grandes fenêtres sont percées, surmontées de lucarnes à frontons en plein cintre alternant avec des frontons triangulaires. A l'angle nord-ouest du château, là où s'élevait une des tours ruinées.","architecture":"CHATEAUGIRON, malgré ses archaïsmes sur le plan défensif continua à assurer un rôle militaire tout au long du XVe siècle. En 1487, la garnison comptait ainsi une vingtaine de combattants. Son importance stratégique n'est pas démentie non plus au XVIe siècle. La ville et le château furent même le terrain d'affrontements sanglants pendant la guerre de la Ligue, ce qui ne manqua pas d'entraîner de sérieuses destructions.  il est difficile de savoir à quoi ressemblait la forteresse à une époque antérieure au XIVe siècle. Les campagnes de reconstruction des XIVe-XVe siècles s'appuyèrent sur un plan plus ancien, sinon sur des constructions antérieures. C'est sans doute à Patri de Châteaugiron que l'on doit les importantes reprises du château à la fin du XIVe siècle. Il est cependant certain que d'autres travaux intervinrent dans le courant du XVe siècle, sur le logis seigneurial et peut-être sur les tours et fortifications y attenant, fut construit un grand pavillon avec galerie en bois prenant assise sur l'ancien mâchicoulis.  Le donjon à miraculeusement  échappé aux démantèlement ordonnés par Richelieu. Cette galerie promenade fut même continuée jusqu'à la tour du Cardinal. A l'opposé, à l'angle sud-ouest, l'autre tour en ruine fut abattue, laissant place à l'extrémité du nouveau bâtiment en fond de cour. Ce pavillon d'entrée constituait le seul accès au château. Deux ans plus tard, les quatre tours du château et l'abside de la chapelle sont classés  au M.H. En 1936, le château dans son ensemble, à l'exception de la chapelle, devient propriété de la commune. L'installation de la mairie dans le château à partir de 1978 permet de sauver d'une ruine certaine les parties non classées du monument redevenu désormais un lieu de pouvoir.","habitants":"Famille de Jean de Laval et  Famille de Cossé-Brissac \r\n        \"","divers":"Forteresse de Chateaugiron                                                          gps 48° 02' 56\" nord, 1° 30' 07\" ouest","gps":"","images":["../image/image_35/35_Chateaugiron_1.jpg","../image/image_35/35_Chateaugiron_2.jpg","../image/image_35/35_Chateaugiron_3.jpg","../image/image_35/35_Chateaugiron_4.jpg"]},"Consult_chateau_formulaired33b":{"id":"Consult_chateau_formulaired33b","dept":"35","canton":"Dol-de-Bretagne","commune":"Saint-Père","nom":"Chateauneuf_St-Père","type":"Château","periode":"XIV-XVII","histoire":"deux châteaux à Châteauneuf St-Père dont Châteauneuf et Picaudais.                                                                                        CHATEAUNEUF, situé également sur la commune de Saint-Père. Il a été édifié en 1740 sur la base dun ancien château reconstruit en totalité à plusieurs reprises : en 1353, 1441 et 1611 ; certains éléments du château actuel datent des XVe et XVIIe siècle, château complexe, composé de plusieurs éléments d'époques très différentes, imbriqués les uns dans les autres. La famille Rieux décide néanmoins de rebâtir un nouveau château, Thomas Poussin, architecte, aurait été lartisan de cette reconstruction. En 1625, Guy II de Rieux fait construire un nouveau bâtiment mieux adapté au confort de lépoque, il sagit du petit château visible depuis léglise Saint-Nicolas, bâtiment précurseur des malouinières qui se multiplieront dans la région au XVIIIe siècle. Au XVIIIe siècle, larmateur Etienne-Auguste Baude de la Vieuville (1713-1794) devient propriétaire du site. Il y entreprend dénormes travaux. Il démolit lenceinte fortifiée à lexception de la tour nord et construit deux nouveaux corps de bâtiment encadrant les vestiges de lancienne forteresse. A louest, il fait réaliser un vaste parc à la française dont on peut voir le plan sur les anciennes cartes détat-major  et sur le cadastre de 18096. Il comportait une grand étang de 3300 m2 dénommé le Miroir, un grand canal long de 580 m et plusieurs autres étangs. Une partie de ces jardins et les bâtiments sont classés au titre des M.H. depuis le 2 octobre 1992. \r\nÉléments protégés MH : les éléments bâtis du château et les terrains correspondant à l'ancien jardin : classement par arrêté du 2 octobre 1992.","architecture":"CHATEAUNEUF, l'existence du château est attestée de façon certaine dès 1117 ; il s'appelait alors château de Bure. Reconstruit en 1353 sous le nom de Châteauneuf de la Noë, il est à nouveau détruit et relevé en 1441, sous le nom de Châteauneuf. Les parties les plus anciennes (tour nord, fragments de courtine est et nord) datent de cette époque. Démantelé en 1592-1594, il est à nouveau reconstruit à partir de 1611 par la famille des Rieux, seigneurs du lieu de 1250 à 1685, sur le tracé de l'enceinte précédente, complétée par un pont-levis et une barbacante. En 1740, le vieux donjon et la quasi-totalité de l'enceinte médiévale subsistante sont démolis, et une nouvelle enceinte reconstruite, ainsi que de nouveaux bâtiments. Le château de Châteauneuf-d'Ille-et-Vilaine a été classé avec ses jardins aux M.H. par arrêté du 2/10/1992.                                                    PICAUDAIS,  à conservé ses douves, et sa chapelle privée a été détruite durant la Révolution. Notre-Dame de la Picaudais, avoisinant ce manoir, était dédiée en 1695 à la Sainte Vierge, à saint Roch et à saint Sébastien. Jean Douceré fut également pourvu de cette chapellenie à la même époque (Pouillé de Rennes). Propriété de la famille du Val, puis de la famille le Jar en 1513.","habitants":"Chateauneuf; Famille des Rieux\r\n        \r\n        \"","divers":"deux châteaux à chateauneuf St-Père dont Chateauneuf et Picaudais grav-4 5.                                                              Chateauneuf-St-Père  grav 1 à 3                                                GPS : 48° 33' 45\" Nord 1° 55' 45\" Ouest","gps":"48° 33' 45\" Nord 1° 55' 45\" Ouest","images":["../image/image_35/35_Chateauneuf_St_P%c3%a8re_1.jpg","../image/image_35/35_Chateauneuf_St_P%c3%a8re_2.jpg","../image/image_35/35_Chateauneuf_St_P%c3%a8re_3.jpg","../image/image_35/35_Chateauneuf_St_P%c3%a8re_4.jpg","../image/image_35/35_Chateauneuf_St_P%c3%a8re_5.jpg"]},"Consult_chateau_formulaire5e2b":{"id":"Consult_chateau_formulaire5e2b","dept":"35","canton":"Vitré","commune":"Balazé-Taillis","nom":"Chatelet_Balazé","type":"Château","periode":"XV-XVI-XVIII","histoire":"CHATELET, paroisse mentionnée dès 1116, sous la dépendance de la collégiale Notre-Dame de Vitré. Elle relève de la seigneurie de la Basse Bouxière jusqu'au XIIIe siècle, puis de celle du Chatelet, dont la terre est érigée en marquisat en 1682, avec permission d'établir halle et marché une fois par semaine au bourg. Devient chef lieu de commune fin 1789. Le territoire de la commune est délimité en 1812. Le château est construit sur les vestiges d'un manoir du XVIe siècle, dont subsiste l'aile sud-ouest très remaniée aux XVIIIe passage couvert portant la date 1781. Vers 1600, projet d'un bâtiment en rez-de-chaussée et un étage de comble à deux pavillons symétriques et deux escaliers latéraux. De ce projet, seuls furent réalisés le pavillon et l'escalier nord-ouest ainsi que le corps de logis central. A partir de 1850-1860, importants travaux pour la famille Hay des Nétumières: ajout de deux tours à l'extrémité Est du logis, reprise de la façade Sud du logis avec ajout d'un perron central, comblement des douves qui bordent le côté Est de la cour, suppression des bâtiments qui flanquaient à l'ouest l'aile sud-ouest du corps de logis, tracé du parc à l'anglaise et construction d'un ensemble ferme communs plus à l'ouest (date portée 1872). La chapelle mentionnée en 1668 est restaurée vers 1777, date portée sur la clé de voûte de la porte d'entrée et bénite le 23 juillet 1781.","architecture":"CHATELET,  le corps de logis principal comporte un rez-de-chaussée surélevé et un étage de comble, l'aile sud-ouest, un étage carré, le pavillon nord-ouest deux étages carrés. Les angles sud-est et sud-ouest de la cour bordée par des douves sont occupés par deux pavillons octogonaux couverts d'un dôme polygonal dont l'un abrite la chapelle. Les entourages des baies de l'aile sud-ouest et celles du pavillon sont en grès et granite. Les colonnes et le fronton au-dessus de la porte d'entrée sont en tufeau. Bouches à feu dans le pavillon en face de la chapelle. Sur le fronton de la porte d'entrée armoiries d'alliance des familles Hay-Le Neptun et La Carre de Saumery                                                                                                                          COURS à Taillis  trois kilomètres au nord ouest, ancien manoir du XVIe siècle entièrement remanié dans la deuxième moitié du XIXe siècle par Jacques Mellet. Propriété des familles Taillis en 1158, le Veneur, barons de Tillières en 1526. Fortin, Bonenfant en 1553, Vausuelin à la fin du XVIe siècle, Cervon, seigneurs des Arcis en 1628, Le Royer, sieurs de la Louzière en 1676. Sur le passage, à l'entrée de la cour, ancienne grange dîmière construite limite XVIe siècle XVIIe siècle. La façade postérieure de l'ancien manoir du XVIe siècle est devenue à la fin du XIXe siècle la façade principale d'un nouveau logis castellisé et enrichi de lucarnes, tourelles et pavillons.","habitants":"Chatelet; Famille Hay des Nétumières                                 Cours ; Familles le Royer\r\n        \"","divers":"Deux châteaux à Balazé-Taillis; le Chatelet grav 1 à 4 et Cours-grav-5       Gps 48° 10' 08\" nord, 1° 11' 30\" ouest","gps":"","images":["../image/image_35/35_Chatelet_Balaz%c3%a9_1.jpg","../image/image_35/35_Chatelet_Balaz%c3%a9_2.jpg","../image/image_35/35_Chatelet_Balaz%c3%a9_3.jpg","../image/image_35/35_Chatelet_Balaz%c3%a9_4.jpg","../image/image_35/35_Chatelet_Balaz%c3%a9_5.jpg"]},"Consult_chateau_formulaire9274":{"id":"Consult_chateau_formulaire9274","dept":"35","canton":"Vitré","commune":"Châtillon-en-Vendelais","nom":"Chatillon_Vendelais","type":"Château","periode":"XV-XVIXVIII","histoire":"Trois  châteaux à Chatillon en Verdelais ; la Hurdières, Masures et Rouxières.                                                                                                                                                                                                                 HURLIERES,  château fort construit avant 1045 par Main, seigneur de Fougères,  reconstruit au XIVe siècle et presque entièrement démoli en 1623 par Richelieu.  L'édifice fut propriété des familles la Fontaine à la fin du XVe siècle, Erbrée, seigneurs de La Chèze en 1578, de Volvire seigneurs de Saint-Brice vers 1628, Monneraye, seigneurs de Saint-Cyr en 1630, Martin, sieurs de La Morandaye en 1632, Pinczon, seigneurs des Monts en 1650, Geffrard, seigneurs du Plessis-Torcé, vers 1699.  Ses dernières ruines ont disparu vers 1885, époque où le château sert de carrière. L'église a été reconstruite à partir de 1898. L'actuel château des Hurlières est le résultat de trois campagnes successives à partir d'un manoir du milieu du XVe siècle appartenant à la famille de Lignière, augmenté d'un corps de bâtiment vers 1730 pour la famille de Goyon, puis d'un pavillon et d'un jardin d'hiver vers 1890 pour le comte de La Guérande. Le sol du jardin d'hiver est recouvert d'une mosaïque, probablement réalisée dans les ateliers d'Isidore Odorico, mosaïste à Rennes. Important pavillon rectangulaire construit à l'extrémité sud du corps de bâtiment ; double en profondeur ; avec tourelle de plan carré en saillie sur l'arrière faisant jonction avec le jardin d'hiver (mosaïque de style romain, marbre). Sous-sol sous l'ancien manoir ; jardin d'hiver en rez-de-chaussée.","architecture":"MASURES, ses dernières ruines ont disparu vers 1885, époque où le château sert de carrière.  Le château des Masures est le résultat d'un assemblage de bâtiments construits au XVIe et XVIIe siècles sur l'emplacement d'un édifice plus ancien et qui prennent l'allure d'une maison-forte (pavillon et douves). Agrandi en 1818 (date portée) : partie nord et deuxième étage du corps principal. Au milieu du XIXe siècle, cuisine, salon, décor intérieur et escaliers sont refaits.  Propriété successive des familles Bois-Béranger en 1449, Gennes en 1513, Hay en 1620, Martin, sieurs de la Morandaye vers 1651, et Charil, sieurs de la Rivière en 1653 et 1789. Le logis est construit sur une terrasse rectangulaire bordée de douves qui se transforment en étang à l'ouest.                                                                                                                               ROUXIERES  articler idem que Masure à controler Le château des Rouxières a été construit à la limite des XVIe et XVIIe siècles et restauré vers 1885 pour M. Méaulle. Quelques décors intérieurs ont été refaits dans la deuxième moitié du XVIIIe siècle (les cheminées et les lambris). En 1907, l'architecte rennais, Emmanuel Le Ray, reprend la construction pour M. Le Templier, avec l'ouverture de baies, en remployant des lucarnes, construction d'un bâtiment polygonal à l'extrémité de l'aile sud, construction de la tour d'escalier et réaménagement de la distribution et du décor intérieur, création du passage couvert vers le jardin. La chapelle, rendue au culte en 1714, aujourd'hui désaffectée.","habitants":"Hurlières; famille de Goyon                                                  masures; familles Bois-Béranger                                      Rouxières: Famille de     M. Méaulle\r\n        \r\n        \r\n        \"","divers":"Trois  châteaux à Chatillon en Verdelais ; la Hurdières grav-7, Masures grav de 1 à 4 et Rouxières grav-5 et Villandry grav-6                   Gps 48° 13' 33\" nord, 1° 10' 39\" ouest","gps":"","images":["../image/image_35/35_Ch%c3%a2tillon_Vendelais_1.jpg","../image/image_35/35_Ch%c3%a2tillon_Vendelais_2.jpg","../image/image_35/35_Ch%c3%a2tillon_Vendelais_3.jpg","../image/image_35/35_Ch%c3%a2tillon_Vendelais_4.jpg","../image/image_35/35_Ch%c3%a2tillon_Vendelais_5.jpg","../image/image_35/35_Ch%c3%a2tillon_Vendelais_6.jpg","../image/image_35/35_Ch%c3%a2tillon_Vendelais_7.jpg"]},"Consult_chateau_formulairea490":{"id":"Consult_chateau_formulairea490","dept":"35","canton":"Melesse","commune":"Hédé","nom":"Chatière","type":"Château","periode":"XIX","histoire":"La CHATIERE, la construction de ce château remonte  à la fin du XIXe siècle. En effet, en 1835 lors de la réalisation du premier cadastre de la commune, ce bâtiment n'existait pas encore. Pourtant il existait déjà un château de la Châtière à cette époque ; il a été remplacé par le bâtiment actuel à la fin du XIXe siècle. L'ancien château possédait un portail, une fuie et une chapelle. Ces éléments sont visibles sur le cadastre de 1835. La chapelle avait été construite à la Châtière en 1644 par le seigneur du lieu à l'époque : Jacques Beschart. Plusieurs familles de propriétaires se sont succédées ; le château appartenait en effet aux Cheminart au début du XVe siècle, à la fin du XVIe siècle, il était aux seigneurs de Couësbouc et au début du XXe siècle, il appartenait à la famille Alain des Beauvais. Les seigneurs de la Châtière avaient droit de banc et d'enfeu dans l'église Notre-Dame de Hédé. A la fin du XVIIe siècle, le manoir était composé d'un grand corps de logis dont la façade donnait à l'est et d'un autre corps de logis servant de boulangerie. Il existait aussi deux pavillons à l'entrée du lieu, qui était clos et entouré de douves et d'un étang servant à un moulin. Abrite aujourd'hui un établissement scolaire.","architecture":"La CHATIERE, la maçonnerie de ce château est enduite ; seules les pierres de taille de granite du solin et les encadrements de baies sont visibles. Le bâtiment est composé de trois parties, un corps central couvert d'un toit à croupes et deux corps latéraux couverts de toits en pavillon. La toiture est surmontée d'épis de faîtage et de crêtes de toit. La façade est percée de cinq travées ; la travée centrale est précédée d'un perron et surmontée d'un fronton triangulaire portant un écu. Cet écu est celui de la ville de Hédé : les hermines symbolisent la fidélité de Hédé au duc de Bretagne et les deux rangées d'hermines signifient l'appartenance de la ville à la Bretagne. A l'arrière, une tour contenant un escalier à vis permet la desserte des étages.   Dans le bourg, on peut visiter les vestiges du château de Hédé inscrits MH par arrêté du 14 octobre 1926 ainsi que les onze écluses d'Hédé et le canal d'Ille-et-Rance. Assister au défilé des embarcations sur cet escalier d'eau est un spectacle insolite. A Hédé, les écluses s'alignent, formant une étonnante perspective.  la Maison du Canal s'est amarrée dans une demeure éclusière.","habitants":"Famille Alain des Beauvais\"","divers":"Château de la Chatière à Hédé  gps 48° 17' 46? nord, 1° 48' 19? ouest","gps":"","images":["../image/image_35/35_Chati%c3%a8re_1.jpg","../image/image_35/35_Chati%c3%a8re_2.jpg","../image/image_35/35_Chati%c3%a8re_3.jpg"]},"Consult_chateau_formulaire03e9-2":{"id":"Consult_chateau_formulaire03e9-2","dept":"35","canton":"Fougères","commune":"Saint-Sauveur-des-Landes","nom":"Chaudeboeuf","type":"Château","periode":"XVI-XVIII","histoire":"CHAUDEBOEUF,  le château de Chaudeboeuf date du début du XVIe siècle. Le pavillon de l'aile nord et la porte de la chapelle sont aujourd'hui les seuls éléments de cette époque. En effet, le château subit une importante reconstruction au milieu du XVIIIe siècle. A l'intérieur, des boiseries du XVIIe siècle portant les armes de Porée du Parc, seigneurs de Chaudeboeuf sont conservées. Le château est cité en 1199-1203 dans une charte de Saint-Sauveur sous la forme \"Eschaudebof\". En 1678, le château a un droit de haute, moyenne et basse justice, son propriétaire est alors Michel Porée sieur du Parc de Chaudeboeuf. En 1731, il est racheté par l'héritier Louis René François Duparc, qui sera avocat général en 1741. C'est lui qul bâti une chapelle vers le milieu du XVIIIe siècle.     Le dernier propriétaire en date fût le Comte Henry de la Haye Saint-Hilaire. A la mort de celui-ci, son épouse fit don du château aux surs de la congrégation de Rillé, suite à une vision où Chaudeboeuf lui apparût comme devenir un lieu d'accueil et d'hébergement pour les plus défavorisés. En 1863, deux religieuses s'installèrent avec la fondatrice pour accueillir \"les pauvres, les vieillards et abandonnés\". Ensuite, l'établissement géré par la congrégation de Rillé n'a cessé de se développer pour répondre à sa vocation d'accueil des plus démunis.","architecture":"CHAUDEBOEUF, l'édifice comprend trois ailes formant un U, et déterminant une cour intérieure sud fermée par une grille. La partie ancienne occupe l'aile nord. L'extrémité de l'aile ouest est occupée par la chapelle qui a son chevet au sud. Il se compose également d'une autre aile en équerre au nord-ouest et d'un pavillon à l'ouest en bordure de route. La façade principale est la façade nord de l'aile nord. Deux accès existe aujourd'hui : l'un par le nord-ouest, l'autre par le sud (cour intérieure. La construction du château est en petit et moyen appareil de granite, les encadrements des ouvertures et les chaînages d'angle sont en grand appareil de granite. La façade nord est entièrement réalisée en grand appareil régulier de granite. Les toitures sont en ardoise. Il s'agit d'un bâtiment à étages composé de trois corps disposés en U, le corps principal central comportant sur sa face sud deux pavillons en hors uvre de plan semi-circulaire. Les trois ailes sont de plan rectangulaire. Les deux ailes latérales se terminent au sud par une abside en arc de cercle. L'aile centrale comporte en plus des deux pavillons de la façade sud, deux pavillons en léger avant-corps aux deux extrémités de sa face nord. L'aile principale comporte une cage d'escalier entre deux refends, flanquée de part et d'autre de grandes pièces. La cage est axiale par rapport à la façade nord, mais non par rapport à la façade sud. Le pavillon Est de la face nord de cette aile est également occupé par un escalier. Un escalier extérieur se trouve dans l'axe de la façade nord.","habitants":"Famille de Louis René François Duparc.\r\n        \"","divers":"Château de Chaudeboeuf à Saint-Sauveur-des-Landes   Gps 48° 20' 36\" nord, 1° 18' 45\" ouest","gps":"","images":["../image/image_35/35_Chaudeboeuf_1.jpg","../image/image_35/35_Chaudeboeuf_2.jpg","../image/image_35/35_Chaudeboeuf_3.jpg","../image/image_35/35_Chaudeboeuf_4.jpg","../image/image_35/35_Chaudeboeuf_5.jpg"]},"Consult_chateau_formulairecd40-2":{"id":"Consult_chateau_formulairecd40-2","dept":"35","canton":"Châteaugiron","commune":"Domloup","nom":"Chauvelière_35","type":"Manoir","periode":"XIX","histoire":"CHAUVELIERE, le cadastre réalisé en 1849 mentionne l'existence de la Grande et de la Petite Chauvelière. La Grande Chauvelière correspond au château et au manoir actuel et la Petite Chauvelière, à la ferme située au nord du château. La ferme actuelle de la Grande Chauvelière située à l'est du château n'était pas encore construite à cette époque. Appartient en 1593-1594 à la famille Chauvel, seigneurs de Moigné, puis à la famille Louvel jusqu'au XVIIIe siècle, et ensuite à la famille Mahé, sieurs de Kérouan en 1768.","architecture":"CHAUVELIERE,  ce bâtiment remonte au second quart du XIXe siècle. Il en présente toutes les caractéristiques : les percements réguliers à encadrements de granite, le garde-corps en fer forgé, boiseries, escalier avec rampe en fer forgé, cheminées de taille réduite en marbre.  le château, de plan en L, est enduit et couvert d'un toit à croupes en ardoise. Les façades ouest et sud sont percées de trois travées d'ouvertures dont les encadrements sont en granite. La cave est également éclairée par des soupiraux en granite. L'entrée est composée d'un vestibule possédant des boiseries ; derrière celui-ci se trouve un escalier à balustres en fer forgé. Chacune des pièces est équipée d'une cheminée en marbre.","habitants":"Famille Chauvel\r\n        \r\n        \"","divers":"Château de la Chauvelière  grav 1 à 4 à Domloup                            gps 48° 03' 43\" nord, 1° 31' 23\" ouest","gps":"","images":["../image/image_35/35_Chauveli%c3%a8re_35_1.jpg","../image/image_35/35_Chauveli%c3%a8re_35_2.jpg","../image/image_35/35_Chauveli%c3%a8re_35_3.jpg","../image/image_35/35_Chauveli%c3%a8re_35_4.jpg"]},"Consult_chateau_formulaireac47":{"id":"Consult_chateau_formulaireac47","dept":"35","canton":"Le Rheu","commune":"Chavagne","nom":"Chavagne","type":"Manoir","periode":"XV-XVII","histoire":"trois châteaux à Chavagne; Sillandais, Chapelais,et Guignardière.                                                                    SILLANDAIS, le manoir de La Sillandais  se trouve être l'un des éléments les plus remarquables du patrimoine chavagnais. Le château ainsi qu'une chapelle privée et un colombier sont enserrés dans un domaine limité par une large douve. L'existence de cette ancienne seigneurie dès le début du XVe siècle, est attestée par des documents conservés à la Bibliothèque Nationale et aux Archives . En 1648, ce sont les membres de la famille Le Febvre qui en prennent possession à leur tour, dans un premier temps Jean Le Febvre, conseiller du Roi et premier substitut du procureur général du parlement de Rennes, puis en 1680, Siméon Le Febvre. M. Leprêtre, recteur du sel, l'acquit à son tour.  Vers la fin du XVIIe siècle, les Champion, seigneurs de Cicé, en deviennent propriétaires puis les Drouet, seigneurs du Tertre. Le domaine de La Sillandais passe alors par alliance au début du XVIIIe siècle à la famille Hubert, sieurs de la Masure qui l'avaient encore, à la veille de la Révolution française. Puis, M. de Bontteville et la famille Torquat le posséderont successivement. En 1979, le manoir se trouve alors en très piteux état. Son nouveau propriétaire va entièrement se consacrer à sa rénovation pour lui donner le visage qu'on lui connaît aujourd'hui.                                                                                          GUIGNARDIERE l'ancien manoir de la Guignardière, construit vers le XVIIIe siècle. Le nom de ce manoir provient des cerises de guignes. En 1893, Madame Fablais hérite du manoir au décès de sa cousine religieuse, Yvonne Julie Orain (en religion soeur saint Félicien). La famille Chotard, originaire de Derval arrive en 1920 à Lesnelais, puis s'installe en 1938 dans ce manoir.","architecture":"CHAPELAIS, manoir construit autour de 1600, probablement transformé en ferme dès le milieu du XVIIe siècle. Le manoir était accompagné d'une douve et disposait d'une chapelle disparue.Le manoir a été la propriété successive des familles Botherel, le Breton (en 1513), Haugoumar (en 1515), Julienne (en 1570). Vers 1640, il passa par alliance aux Busnel seigneurs de la Retardaye et en 1642 il fut vendu aux de la Vairie. Les Champion seigneurs de Cicé le retirèrent féodalement avant 1675 et le vendirent en 1675 à Renée Foucault dame de Crévy. Enfin il était à la famille de la Tullaye en 1789.  Le manoir de la Chapelais est composé de deux corps en équerre.Dans l'angle postérieur une grande tour polygonale contient l'escalier à vis en dalles de schiste pourpre. Dans l'angle des deux ailes se trouve le pan coupé de la tour polygonale. Cette dernière est percée de petits jours permettant d'éclairer l'escalier à vis.\r\nSALLANDAIS, le manoir, bâti en 1604 par la famille Lévesque, seigneurs du Molant, est composé d'un corps central auquel viennent s'ajouter deux pavillons à toits élevés. L'intérieur est constitué de grandes pièces boisées avec des cheminées monumentales et des parquets « Versailles ». Dans l'une de ces pièces, on peut y voir un papier de tenture en grisaille, style 1er Empire, où figurent des scènes de la mythologie. Dans la cour, une petite tour de pierre (fuie) à campanile (clocher) abritait autrefois des pigeons domestiques. Trônant à l'entrée du manoir, une charmante petite chapelle avec une abside à trois pans et un toit également surmonté d'un campanile (clocher) ajoute une certaine magnificence à l'ensemble du domaine.Jadis, un cadran solaire était installé dans le jardin. Aujourd'hui disparues, de belles avenues invitaient autrefois à des promenades bucoliques. .","habitants":"Sillandais; Famille Lévesque                                                               Chapelais: Renée Foucault dame de Crévy\r\n        \"","divers":"trois châteaux à Chavagne; Guignardière grav 4-5, Sillandais grav-6-7  et Chapelais grav -1-2-3.                                                   Sillandais 48° 02' 45\" nord, 1° 47' 46\" ouest","gps":"","images":["../image/image_35/35_Chavagne_1.jpg","../image/image_35/35_Chavagne_2.jpg","../image/image_35/35_Chavagne_3.jpg","../image/image_35/35_Chavagne_4.jpg","../image/image_35/35_Chavagne_5.jpg","../image/image_35/35_Chavagne_6.jpg","../image/image_35/35_Chavagne_7.jpg"]},"Consult_chateau_formulaire9a0b":{"id":"Consult_chateau_formulaire9a0b","dept":"35","canton":"St-Malo","commune":"Paramé","nom":"Chipaudière","type":"Château","periode":"XVIII","histoire":"CHIPAUDIERE, était à la famille Pépin au XVe siècle,  en 1794; Erasme Magnon de la Lande seigneur, condamnés à mort Monsieur de Ballue. Le château de la Chipautière avait été élevé en 1710 à 1720 pour François Auguste Magnon de la Lande, par Garangeau amis de Vauban, le domaine appartenait au Magon depuis 1640, dans ce château fut célébré le mariage en 1724 de la fille du châtelain, Nicolle-Françoise Magon de la Lande âgée de quatorze ans avec Louis-Georges Erasme marquis de contades officier fut nommé maréchal de France en 1758. Mis sous séquestre après l'exécution d'érasme Magon de la lande, le château resta dans la famille après la Révolution. Restauré  en 1900 par le général de la Giclais devenu propriétaire ils appartient actuellement à son fils Louis , marié à Melle Guéneau de Mussy.","architecture":"La CHIPAUDIERE, l'actuel château a été construit de 1710 à 1720 et est l'une des plus belles malouinières du pays. L'édifice se compose d'un grand bâtiment flanqué de deux ailes et coupé en son centre par un avant-corps à trois pans que surmonte un fronton triangulaire aux armes des Magon sommées d'une couronne de marquis. Le château était précédé d'une cour avec une porte et un portillon. Sa chapelle, bénite en 1735, est sommée d'un campanile et renferme un bel autel en bois sculpté. Le domaine comprend une orangerie, un jardin à la française attribué à Le Nôtre comprenant trois terrasses et une douve de 600 mètres de longueur, suivie d'un grand et large canal. Les communs présentent des gerbières à frontons alternativement arrondis et triangulaires.\r\nÉléments protégés MH : les façades et les toitures du manoir et des communs, l'escalier avec sa rampe en fer forgé, au rez-de-chaussée, la chambre avec son décor de cuir de Cordoue ; la chapelle ; le Jardin avec ses pièces d'eau : classement par arrêté du 2 février 1982.","habitants":"famille Pépin \r\n        \"","divers":"à Paramé le château de la Chipaudière gps 48° 38' 12\" nord, 1° 57' 26\" ouest","gps":"","images":["../image/image_35/35_Chipaudi%c3%a8re_1.jpg","../image/image_35/35_Chipaudi%c3%a8re_2.jpg","../image/image_35/35_Chipaudi%c3%a8re_3.jpg"]},"Consult_chateau_formulaireeddb":{"id":"Consult_chateau_formulaireeddb","dept":"35","canton":"Melesse","commune":"Clayes","nom":"Clayes_Palys","type":"Château","periode":"XVI-XIX","histoire":"CLAYES-PALYS,  propriété de la famille du Palys depuis le deuxième quart du XIXe siècle.  la seigneurie existait déjà en 1266, appartenant pour partie aux moines de l'abbaye de Saint-Mélaine et aux héritiers de Raoul de Clays. Le château est construit dans le troisième quart du XVIIIe siècle pour Madeleine Nicolas de Clayes et François Marie de la Bourdonnaye son époux. Propriété de leur petite fille la vicomtesse d'Allonville au début du XIXe siècle, il subit des remaniements, notamment les pavillons latéraux couverts de toitures en carène. Des dessins aquarellés conservés au château, réalisés au début du XIXe siècle, apportent de précieux témoignages.","architecture":"CLAYES-PALYS, les rénovations portent en particulier sur les communs : la ferme de la Porte à l'ouest du logis est détruite, le pigeonnier sous forme de pavillon au sud ouest de la cour bordée de douves est abattu; celui qui lui fait pendant au sud-est est détruit par madame d'Allonville après 1818. Le cadastre de 1843 figure pour l'essentiel les bâtiments détruits à l'exception du dernier cité rasé depuis. Au nord-est d'un quadrilatère formant jardin, l'ancien pavillon servant d'orangerie a également disparu. Dans la deuxième moitié du XIXe siècle de nouveaux communs sont construits : en bordure de clôture au sud ouest, une buanderie caractérisée par sa tour hors-oeuvre ; à l'est de nouveaux bâtiments forment une petite ferme. Le logis proprement dit est agrandi sur la façade nord d'un corps formant une avancée pour abriter une nouvelle cuisine au début du XXe siècle. Outre une sculpture de Falconnet commandée par Louis XV pour madame de Pompadour le château réunit par ailleurs, dans son parc, des éléments sculptés provenant
