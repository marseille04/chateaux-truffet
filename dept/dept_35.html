ture classique des malouinières. L'intérieur conserve d'origine le grand escalier et la cheminée de la cuisine. Le parc présente toujours des communs, un puits, un jardin, les murs de clôture et une rabine d'accès. Éléments protégés MH : les façades et les toitures du logis, l'escalier intérieur : inscription par arrêté du 2 mars 2001.                                                                                       LIMOELOU, en 1541, Jacques Cartier achète une ferme construite le siècle précédent sur les hauteurs de Rothéneuf. Il va la transformer en résidence dété, lui ajoutant un étage et une tour en façade. Il aménage également une chambre d'où il peut voir la mer. Il meurt dans ce manoir en 1557. Au cours du XIXe siècle, le manoir redevient une ferme. En 1893, le nom de Limoilou fut donné à une nouvelle municipalité, aujourd'hui un arrondissement de la ville de Québec. Le terme limoëlou signifie « tertre chauve » en breton. Le manoir se trouve effectivement sur une hauteur où les arbres sont rares en raison du vent.                                                               PUITS SAUVAGE, le Puits Sauvage, vestige d'une ancienne seigneurie, a été aménagé au milieu du XVIIIe siècle par une famille d'armateurs malouins descendante de Jacques Cartier.","architecture":"BRIANTAIS,  à  Saint-Malo (Saint Servan)  L'actuel château n'est construit qu'en 1864 par Eugène Sully-Brunet, fils d'un ancien député de la Réunion. Le Domaine fut acquis au XVIIe siècle par une famille d'armateurs malouins, les Pointel, séduits par la possibilité de surveiller leur flotte et le trafic de la Baie de Saint-Malo. Ils feront construire un manoir en 1666, toujours visible (en ruine). Le domaine est ensuite vendu, en 1770, à la famille des Picot, seigneurs de Prémesnil, une autre puissante famille d'armateurs de Saint-Malo. Le Domaine fut confisqué à la Révolution et revendu, à Pierre Collar, en 1803. Suivra peu de temps après, l'armateur Hervé Fontan, le bâtiment est transformé en un petit château second Empire. Une nouvelle toiture ponctuée d'un belvédère panoramique en lanternon rappelant l'hôtel de ville de Saint Servan dont le chantier est alors conduit par l'architecte Alexandre Leroyer. Entre les ailes de la façade principale, un jardin d'hiver, assorti d'une marquise sert d'entrée. Le jardin régulier du XVIIIe siècle, dont les tracés fondamentaux sont conservés, est réaménagé dans le style paysagé en vogue largement diffusé en Bretagne par les frères Bülher. Le domaine est acheté en 1888, par Charles Émile La Chambre, homme d'affaire malouin, député d'Ille et Vilaine depuis 1876. Peu avant 1900, le nouveau château, devenu trop étroit pour les réceptions d'un personnage public, est augmenté de deux ailes couvertes de toits à l'impériale. La commune de Saint-Malo décide d'acquérir le domaine de la Briantais, afin de doter la ville d'un grand parc.\r\nPUITS SAUVAGE, l'ensemble de l'architecture est représentatif d'une série de malouinières modestes, mais la conception d'ensemble en fait un exemple atypique et original : disposition des bâtiments autour d'une cour carrée, pignon en bordure du chemin et dispositions intérieures du logis (notamment existence de deux escaliers situés dans les ailes). Si l'on peut regretter la disparition de certains éléments (buanderie, pavillons de jardinier, cheminée du pignon est du logis), due aux bombardements, l'ensemble n'en demeure pas moins proche de ce qu'il était lors de sa construction et a conservé une certaine authenticité intérieure. inscription au M.H. par arrêté du 9 octobre 1990.","habitants":"Château-Dore ; Famille  Magon.                                    Limoélou; Famille de Jacques Cartier                                                   Briantais ; Famille Pointel\r\n        \"","divers":"Quatre châteaux dans cet article; Château-Dore grav-1,  Briantais grav-2-3, Limoelou grav-4 et Puits-Sauvage-Grav-5.  Briantais GPS : 48° 37' 05\" Nord, 2° 00' 46\" Ouest","gps":"48° 37' 05\" Nord, 2° 00' 46\" Ouest","images":["../image/image_35/35_St_Malo_1.jpg","../image/image_35/35_St_Malo_2.jpg","../image/image_35/35_St_Malo_3.jpg","../image/image_35/35_St_Malo_4.jpg","../image/image_35/35_St_Malo_5.jpg"]},"Consult_chateau_formulaireba48":{"id":"Consult_chateau_formulaireba48","dept":"35","canton":"Saint-Malo","commune":"St-Malo","nom":"St_Malo_II","type":"Forteresse","periode":"XIV-XV-XIX","histoire":"Deux édifice sur St-Malo et  le Château-Fort.                                                                                                            CHATEAU FORT DE ST-MALO, appellé aussi fort caméléon, accolé par les ducs de Bretagne aux remparts reconstruits aux XIVe et XVe siècles (petit donjon en 1395, grand donjon 1424, tour générale en 1475, tour Qui qu'en Grogne en 1498). Au XVIe siècle, le château est intégré à la défense de la ville est agrandi par la construction des tours des Dames et des Moulins. Au début du XVIIe siècle, édification du premier bastion de la Galère. En 1695, Louis XIV fait renforcé le château, les quatre tours sont arasées et couvertes d'une plate-forme pour l'installation de pièces d'artillerie. En 1696, construction de la chapelle. Au début du XVIIIe siècle, reconsidération de l'étendue des remparts par Garangeau. A la fin de la période révolutionnaire, une garnison du Génie s'installe dans le château, et des bâtiments sont bâtis contre les courtines. L'armée occupe l'édifice jusqu'en 1921. Douves et pont-levis ont été supprimés à la fin du XIXe siècle pour faire place à un jardin et à une place. Aujourd'hui les anciennes casernes ont été aménagées et hébergent la mairie, la tour et le grand Donjon abritent le Musée dHistoire de la Ville et du Pays Malouin. Classement par arrêté du 2 septembre 1921.","architecture":"CHATEAU FORT DE ST-MALO, la cité fondée par le moine éponyme au VIe siècle est édifiée sur l'île d'Aaron. une première enceinte urbaine est construite à la demande de l'évêque Jean de Chatillon. Durant la Guerre de Succession de Bretagne (1341-1365), elle épouse le parti français. Au XVe siècle, les Ducs de Bretagne surveillent la ville depuis le château : le Grand Donjon appuyé contre l'enceinte remanié un siècle plus tôt et la tour Solidor à Saint-Servan. République indépendante durant la Ligue (1588-1598), la cité en conservera sa devise : \"Ni français, ni breton, malouins suis\". A la fin du XVIIe siècle, alors que la Bretagne connaît la fin de son âge d'or, Saint-Malo est à la fois la \"cité corsaire et la marchande\". Le commerce de la mer a fait la richesse de la ville. Saint-Malo est le seul port pour les navires de fort tonnage entre Brest et Le Havre. Le port mais surtout les armateurs de Saint-Malo sont en effet au cur du trafic maritime international. Durant la ligue d'Augsbourg (1689-1697), la cité corsaire si chère au royaume parce que si riche, devenue frontière face à l'Angleterre, est menacée par les descentes anglo-hollandaises. En effet, les opérations navales vont se révéler déterminantes face à des puissances maritimes , les Provinces Unies de Guillaume d'Orange et l'Angleterre désormais alliées contre Louis XIV. Fin mars-début d'avril 1689, Vauban établit (en une semaine !) un plan général de défense de Saint-Malo qui s'étend du Cap Fréhel à l'ouest, à Cancale à l'est. Dépassant le cadre purement défensif, Vauban projette d'agrandir et de moderniser le port en le transformant en bassin à flot accessible par une écluse. Il imagine de relier par une digue la cité corsaire à Saint-Servan qui deviendrait par la même occasion une \"ville nouvelle\" et constituerait la défense terrestre de Saint-Malo.","habitants":"Ducs de Bretagne                                                                       Maréchal Vauban\r\n        \"","divers":"Deux édifice sur St-Malo et  le Château-Fort. Fort caméléon  GPS : 48° 39' 17\" Nord, 2° 01' 24\" Ouest                           FortGPS : 48°39'05,04\" Nord, 2°01'22,08\" Ouest","gps":"48° 39' 17\" Nord, 2° 01' 24\" Ouest","images":["../image/image_35/35_St_Malo_II_1.jpg","../image/image_35/35_St_Malo_II_2.jpg","../image/image_35/35_St_Malo_II_3.jpg","../image/image_35/35_St_Malo_II_4.jpg","../image/image_35/35_St_Malo_II_5.jpg","../image/image_35/35_St_Malo_II_6.jpg","../image/image_35/35_St_Malo_II_7.jpg","../image/image_35/35_St_Malo_II_8.jpg","../image/image_35/35_St_Malo_II_9.jpg"]},"Consult_chateau_formulaire815d":{"id":"Consult_chateau_formulaire815d","dept":"35","canton":"Saint-Malo","commune":"St_Malo","nom":"St_Malo_III","type":"Fort","periode":"XVI-XVIII","histoire":"Trois édifice dans cet article,  Maison duchesse Anne, Petit Bé, et Giclais et Rivasselou.                                                                                                                                                            SAINT-MALO-PETIT-BE,  l'île du Petit Bé ou Bey et son fort , des remparts de Saint-Malo et à quelques dizaines de mètres du Grand-Bé. Le Fort a été construit au XVIIe siècle. Il faisait partie d'une ceinture défensive conçue par Vauban et destinée à protéger la ville de Saint-Malo d'attaques des escadres ennemies anglaises ou hollandaises. Cette ceinture comprenait également le fort National, le fort Harbour, le fort de La Conchée. Les forts ont été construit par l'ingénieur malouin Siméon Garangeau. Il se compose dune vaste plateforme, dun bâtiment sur trois niveaux et de deux bastions et pouvait accueillir jusqu'à 160 soldats pour servir 19 canons et 2 mortiers. Propriété de l'armée française jusquen 1885, il est ensuite déclassé et redonné à la ville de Saint-Malo. Il est classé au titre des M.H. par arrêté du 29/10/1921, mais qui fut délaissé jusqu'en 2000, l'année où la ville signa un bail avec une association pour sa rénovation et son ouverture au Public. Le Petit Bé est ouvert au Public et se visite, à marée basse.  Il fut délaissé jusqu'en 2000, année où la ville signa un bail avec une association pour sa rénovation et son ouverture au Public.  L'île du Petit Bé (ou Bey) et son fort se situent à quelques centaines de mètres des remparts de Saint-Malo et à quelques 10 mètres du Grand Bé.                                                                                 RIVASSELOU, cet édifice, construit en 1789, s'inspire directement du modèle de la malouinière, avec corps central comprenant les pièces nobles, flanqué de deux pavillons plus bas, cour séparée du jardin par le mur de clôture, architecture symétrique, sans décor. Les pièces du rez-de-chaussée ont conservé leurs lambris Louis XVI. Éléments protégés MH : la malouinière, à savoir : le logis principal, les terrasses du jardin, le mail avec son pavillon néo-classique et le mur de clôture : inscription par arrêté du 13 juillet 2000.","architecture":"GICLAIS, sa construction date du XVIIe siècle. Cette malouinière, entre la cour et le jardin, est élevée d'un étage, sur un rez-de-chaussée et un comble. Les baies sont entourées de granit. Le corps de logis principal est flanqué, sur chaque face, de deux courtes ailes. Les communs datent de la même époque. Durant la Révolution Française, le Manoir a été transformé en remise à chevaux, ce qui fit beaucoup souffrir les intérieurs. La propriété revint, en 1807, à Nicolas Surcouf, corsaire et armateur, comme son frère cadet Robert Surcouf, célèbre corsaire malouin. Une partie des boiseries et des papiers peints panoramiques du Second Empire sont conservés au rez-de-chaussée et au premier étage. Il est inscrit aux M.H. depuis le 30/03/1976.                                                                                            Maison de la duchesse ANNE, cette maison, qui faisait partie de l'enceinte primitive, a été surnommée Maison du Cheval Blanc ou Maison de la Duchesse Anne. Suivant la tradition, la souveraine y aurait logé lorsqu'elle vint surveiller les travaux du château. Elle occupe l'emplacement de l'entrée de l'ancien Château-Gaillard démoli en 1573. La tradition ne peut donc être vraie que si cette maison faisait partie du Château-Gaillard. Catherine de Médicis y aurait également séjourné en 1570. La maison a été incendiée en 1944. Elle présente une fenêtre à linteau chanfreiné, surmontée d'une archivolte en accolade et quelques appuis sculptés. Elle est flanquée d'une tourelle d'escalier circulaire à sa base, octogonale à son sommet, avec mâchicoulis. La partie inférieure pourrait être plus ancienne que la partie haute.","habitants":"ingénieur malouin Siméon Garangeau Giclais ; Famille de Nicolas Surcouf                                                                                   Bos ; Famille de Bret\r\n        \"","divers":"Trois édifice dans cet article,  Maison duchesse Anne grav-4, Petit Bé grav -1-2-3, Rivasselou grav-5, et Giclais grav-6 .                                                    Petit Bé GPS : 48° 39' 2,3\" Nord, 2° 01' 43,65\" Ouest                                                    48° 39' 08\" Nord, 2° 02' 00\" Ouest                                                                  GPS : 48° 39' 09\" Nord, 2° 02' 19\" Ouest                                                           Bosc GPS : 48° 36' 22\" Nord, 1° 59' 52\" Ouest                                                   Giclais GPS : 48° 37' 41\" Nord, 1° 59' 48\" Ouest","gps":"48° 39' 2,3\" Nord, 2° 01' 43,65\" Ouest","images":["../image/image_35/35_St_Malo_III_1.jpg","../image/image_35/35_St_Malo_III_2.jpg","../image/image_35/35_St_Malo_III_3.jpg","../image/image_35/35_St_Malo_III_4.jpg","../image/image_35/35_St_Malo_III_5.jpg","../image/image_35/35_St_Malo_III_6.jpg"]},"Consult_chateau_formulaire60f3":{"id":"Consult_chateau_formulaire60f3","dept":"35","canton":"Saint-Malo","commune":"St-Malo-Paramé","nom":"St_Malo_Paramé","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux dans cet article; Chipaudière (voir article), la Rivière et le Colombier.                                                                                                                                                                                                            LA RIVIERE  malouinière, édifice daté de 1730. Élévations à trois travées séparées par des oeils-de-boeufs ovales dans la façade sur cour, cheminées épaulées, linteaux des fenêtres formant larmiers, plan type. L'environnement a été modifié dans les années 1820-1830. La salle à manger a conservé ses lambris d'origine. Le salon a complètement été modifié au XIXe siècle.Éléments protégés MH : l'ensemble de la malouinière, à savoir : le logis, les dépendances, la cour, le jardin et les murs de clôture: inscription au M.H. par arrêté du 13 juillet 2000.                                                                                                 La VIGNE. La chapelle de la Vigne, aujourd'hui détruite, appartenait au Chapitre de Saint-Malo, qui l'avait fait construire dans l'enclos de sa métairie de même nom ; elle est mentionnée en 1619 et 1679 (Pouillé de Rennes) ;","architecture":"COLOMBIER, est un beau château, en Paramé, construit au commencement du XVIIIe siècle, les remaniements opérés au cours du XIXe siècle, à sensiblement modifié laspect. La maison principale et la basse-cour relevaient du Plessix Bertrand, les terres, de différentes seigneuries : des régaires de lEvêché et du chapitre de Saint Malo, de la Gouesnière, par le baillage de Verrie, de la Grande-Rivière, par celui de lIsle Arnoux, relativement moderne, du domaine constitué par la réunion dans une même enceinte de murs, de diverses pièces de terre. Ce fut luvre de Pierre Gris, sieur du Coulombier, de 1711 à 1717. qui en acheta la plus grande partie ; M. Magon de la Lande, qui a la même époque construisait la Chipaudière, acheta le reste ; chacun engloba son acquisition dans son enclos, et la Plate-Roche disparut. Le Colombier était déjà dans la famille Gris depuis une soixantaine dannées, puisque Marie Gris, née en 1653, était qualifiée demoiselle du Colombier. Différents personnages étaient sieurs du Colombier au commencement du XVIIIe siècle. En 1881, lors de la donation en partage à ses enfants, faite par la comtesse de Cargouët, le Colombier fut attribué à son fils, le comte Georges de Cargouët de Ranléon, qui le vendit, en octobre 1886, à Mme Quemper de Lanascol elle-même le laissa vers 1892 à M.Quemper de Lanascol. Celui-ci le vendit par la suite à Madame Quantin et finalement, il fut acheté, vers 1900, par le Vicomte Alphonse de Saint-Meleuc. Il fut acheté en 1992 par la famille Lemarié. Racheté en 2007 et transformé en hôtel depuis 2008.","habitants":"Chipaudière ; Famille Pépin                                                  Colombier ; Famille de Pierre Gris\r\n        \"","divers":"Trois châteaux dans cet article; Chipaudière (voir article), la Rivière grav-2 et le Colombier grav-3 la Vigne grav 4.colombiers GPS : 48° 39' 27\" Nord, 1° 58' 58\" Ouest","gps":"48° 39' 27\" Nord, 1° 58' 58\" Ouest","images":["../image/image_35/35_St_Malo_Param%c3%a9_1.jpg","../image/image_35/35_St_Malo_Param%c3%a9_2.jpg","../image/image_35/35_St_Malo_Param%c3%a9_3.jpg","../image/image_35/35_St_Malo_Param%c3%a9_4.jpg"]},"Consult_chateau_formulaire0792":{"id":"Consult_chateau_formulaire0792","dept":"35","canton":"Saint-Malo","commune":"St Malo St-Servan","nom":"St_Malo_St_Servan","type":"Forteresse","periode":"XIV-XIX","histoire":"TOUR SOULIDOR, construit à la fin du XIVe siècle par Jean IV sur un petit îlot rocheux, l'ouvrage est la combinaison de trois tours élancées de 28 mètres de haut. Cette tour dont le nom signifierait en breton la \"Porte de la Rivière\", devait surveiller Saint-Malo et l'entrée de la Rance. Elle est dotée d'un châtelet et d'une avancée. Durant les troubles de la Ligue, la tour fut prise par Mercoeur. Dès 1691, Garangeau eut l'idée de réutiliser l'ouvrage pour l'intégrer au système défensif de Saint-Malo afin de couvrir le mouillage de la Rance. Il semble avoir eu pour projet de faire planchéier la tour (sur deux niveaux), construire une voûte à l'épreuve de la bombe et enfin aménager une terrasse d'artillerie dotée de sept embrasures (visible sur son élévation du datée du 27 janvier 1697). Durant la Révolution, l'édifice servit de prison comme de nombreuses autres forteresses du royaume. Aujourd'hui, la tour (remaniée en partie haute au XIXe siècle par des restaurateurs peu scrupuleux) abrite le Musée International du Long-cours Cap-hornier. Vous pourrez visiter la Tour et profiter de la vue magnifique quoffre le chemin de ronde extérieur. Lors de votre visite dans ce musée, vous découvrez des collections dobjets et dinstruments de bord appartenant aux marins ainsi que des cartes marines de la fin du XIXe siècle et au début du XXe siècles.  Classement par arrêté du 12 juillet 1886.","architecture":"Fort de la CONCHEES : classement par arrêté du 13 septembre 1984. Déserte jusqu'au XVIIe siècle, l'île devient avec Vauban l'un des points stratégiques de la côte pour protéger la presqu'île malouine des attaques anglaises. La Conchée fut fortifiée par Vauban de 1692 à 1695. C'était l'un des premiers travaux construits sur un rocher couvert par la mer. Il y avait un four à rougir les boulets. Le fort épouse la forme de l'île. Au niveau des souterrains se trouvent le corps de garde, les logements des canoniers, les magasins à vivres, le bois, la poudre ainsi que la chapelle et la prison. Les logements d'officiers sont situés au niveau de la plateforme. La grande terrasse est bordée de parapets percés d'embrasures pour les canons. Au niveau inférieur, un ensemble de pièces voûtées permettait aux canons de battre à fleur d'eau.                                                                                                   MALOUINIERE de la VERDERIE,  datant de 1637, est représentatif des proto-malouinières. Le plan ramassé en L avec tour d'escalier octogonale hors oeuvre sur l'arrière du logis, révèle encore l'influence de l'architecture des XVe-XVIe siècles. Mais sa situation en périphérie de Saint-Malo, la symétrie de la façade sur jardin et les cheminées épaulées, rattachent l'édifice à l'architecture des malouinières. La demeure a conservé ses lambris-cloisons du XVIIe siècle.Éléments protégés MH : la malouinière, inscription par arrêté du 13 juillet 2000.","habitants":"Marèchal Vauban\r\n        \"","divers":"Tour Solidor, fort de Conchées et la Verderie  GPS : 48° 38' 02\" Nord, 2° 01' 34\" Ouest","gps":"48° 38' 02\" Nord, 2° 01' 34\" Ouest","images":["../image/image_35/35_St_Malo_St_Servan_1.jpg","../image/image_35/35_St_Malo_St_Servan_2.jpg","../image/image_35/35_St_Malo_St_Servan_3.jpg","../image/image_35/35_St_Malo_St_Servan_4.jpg","../image/image_35/35_St_Malo_St_Servan_5.jpg"]},"Consult_chateau_formulaire6cc0":{"id":"Consult_chateau_formulaire6cc0","dept":"35","canton":"Rennes","commune":"Saint-Maugan","nom":"St_Maugan","type":"Manoir","periode":"XV-XIX","histoire":"Deux châteaux dans cet article sur st-Maugan Bassardaine et Monteray.                                                                                                 BASSARDAINE, site ancien bordé par le Meu, le château primitif est ruiné. En 1885, M. de Pontavice hérite du domaine et demande à l'architecte rennais Frédéric Jobbé-Duval de le reconstruire avec un confort moderne. Jobbé-Duval dresse le premier projet dans les années 1890. Le pignon ouest s'étant décollé, le château marque la fin pénible de la carrière de Frédéric Jobbé-Duval. L'étang de quatre hectares est bordé des vestiges d'un moulin à eau et d'un moulin à vent. Bâtiment de plan allongé, tout en longueur, animé par plusieurs corps en pavillon de différentes hauteurs. Entrée placée au 2/3 de la façade entre deux pavillons saillants, l'un bas à droite, l'autre formant tour d'escalier carrée, surmontée d'un clocheton. Aujourdhui la demeure est toujours habitée par les descendants des du Pontavice. Le manoir de la Basse-Ardaine (1903),  possédait jadis une chapelle privée, signalée en 1682.  Propriété successive des familles du Vau-Ferrier (en 1427), Cojalu (en 1449), Callouel (en 1513), Thomas (au XVIIIe siècle), Bésuchet, Pontavice. Propriété de Jehan du Vauferrier (ou Vauferie) en 1480. Ce manoir est reconstruit en 1903 par la famille Pontavice.","architecture":"MONTERAY ou Monterey, manoir situé route de Bois-Gervilly et reconstruit. Il possédait jadis une chapelle privée reconstruite. L'ancienne chapelle Saint-Augustin de ce manoir, n'existe plus. Mais la famille de Farcy, qui possède à la fin du XIXe siècle Montoray, a construit une belle chapelle gothique dédiée à saint Augustin et desservie parfois. Propriété successive des familles Damont seigneurs de la Régnerais (en 1427), Josses (en 1513), la Pastellière de Lespinay.","habitants":"Bassardaine; Famille des Pontavice                                                                 Monteray ; Famille de Farcy\r\n        \"","divers":"Deux châteaux dans cet article sur st-Maugan Bassardaine grav-2 et Monteray grav-1.                                                                 St Maugan 48° 08' 09\" nord, 2° 04' 56\" ouest","gps":"","images":["../image/image_35/35_St_Maugan_1.jpg","../image/image_35/35_St_Maugan_2.jpg"]},"Consult_chateau_formulaireab5c":{"id":"Consult_chateau_formulaireab5c","dept":"35","canton":"Saint-Malo","commune":"Saint-Méloir-des-Ondes","nom":"St_Méloir_des_Ondes","type":"Château","periode":"XVIII-XIX","histoire":"A St-Méloir des Ondes cinq ;châteaux Bardoulais, Lourdes,  la Port-Barré, Mur-blanc  et Long-Pré.                                                          BARDOULAIS, construit pour les Porée, le logis de la malouinière, qui fût bâtie en 1731, offre un plan assez élaboré et inhabituel, avec un avant-corps central sur le jardin et deux avants-corps latéraux sur la cour. Ont été conservés, un colombier, une chapelle du XVIe siècle et, dans la cour de la ferme, un bâtiment en pans de bois antérieurs à la construction de la demeure.                                                                        LOURDES,  appartient à la famille Herbert de La Portbarré                      LA- PORTBARRE, le château de la Portbarré a appartenu aux familles Herbert de La Portbarré, La Moussaye et Fournier de Bellevüe.                                                             LONG-PRE, site remarquable de \"maison des champs\" marqué par deux époques de construction : le XVIIIe siècle avec un château (ou malouinière) disposant de communs importants, d'une chapelle et d'un logement attenant, d'un parc avec miroir d'eau ; le XIXe siècle avec la reconstruction du logis principal en 1845, porte la date sur la façade ouest, au même emplacement que le précédent. Ce dernier emprunte à la tradition néo-classique, par son plan et par son décor.","architecture":"MUR BLANC, la malouinière du Domaine date du XVIIIe siècle, étaient de grands manoirs typiques de la région malouine construits par les armateurs et les corsaires de Saint-Malo, a été construite, vers 1730, pour Bertrand Dufresne du Demaine, armateur et Capitaine corsaire, né à Saint-Malo, en 1685. Par succession, la Malouinière du Domaine passa, à Julien Dufresne, petit-fils d'Hervé Dufresne des Saudrais, Capitaine corsaire mort au combat de Bilbao (1697) qui le rendit à Duguay-Trouin célèbre. Après la Révolution, la propriété fut vendue au Marquis Fournier de Bellevue, un planteur de retour de Saint-Domingue après l'indépendance de l'île. Transformée en une dépendance agricole, après la Première Guerre Mondiale, la Malouinière du domaine a ainsi été préservée de toute modernisation malheureuse et a conservé, quasiment intact, son sobre décor intérieur. Le jardin et l'enclos  ainsi que le Logis du Mur Blanc est inscrit aux M.H. depuis le 3/08/1993.                                                                                                                               LONG-PRE, site remarquable de \"maison des champs\" marqué par deux époques de construction : le XVIIIe siècle avec un château (ou malouinière) disposant de communs importants, d'une chapelle et d'un logement attenant, d'un parc avec miroir d'eau ; le XIXe siècle avec la reconstruction du logis principal en 1845, porte la date sur la façade ouest, au même emplacement que le précédent. Ce dernier emprunte à la tradition néo-classique, par son plan et par son décor.","habitants":"Lourdes et Portbarré; Famille Herbert de La Portbarré                              Mur Blanc ; Bertrand Dufresne du Demaine\r\n        \"","divers":"A St-Méloir des Ondes six châteaux Bardoulais, Lourdes,  la Port-Barré, Mur-blanc  et Long-Pré.                                              Mur    GPS : 48° 38' 15\" Nord, 1° 54' 11\" Ouest                                                             Lourdes & Pontbarre GPS : 48° 38' 15\" Nord, 1° 54' 11\" Ouest                Vaulerault GPS : 48° 39' 17\" Nord, 1° 52' 07\" Ouest","gps":"48° 38' 15\" Nord, 1° 54' 11\" Ouest","images":["../image/image_35/35_St_M%c3%a9loir_des_Ondes_1.jpg","../image/image_35/35_St_M%c3%a9loir_des_Ondes_2.jpg","../image/image_35/35_St_M%c3%a9loir_des_Ondes_3.jpg","../image/image_35/35_St_M%c3%a9loir_des_Ondes_4.jpg","../image/image_35/35_St_M%c3%a9loir_des_Ondes_5.jpg"]},"Consult_chateau_formulaireb22e":{"id":"Consult_chateau_formulaireb22e","dept":"35","canton":"Saint-Malo","commune":"Saint-Méloir-des-Ondes","nom":"St_Méloir_Ondes","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux dans cet article; Val Enoul, Ville Gilles et Vaulerault.                                                                                       VAL ERNOUL, le Val Ernoul est construit en 1719, à l'emplacement d'un ancien manoir attesté au début du XVIe siècle. D'une sobre élégance, l'édifice adopte les caractères architecturaux d'une malouinière classique de taille moyenne. Le Val Ernoul domine une suite de terrasses s'étageant à flanc de vallon et que prolonge un grand bassin rectangulaire.  Les jardins en terrasse subsistent. Une récente campagne de restauration a permis la réédification de deux petites ailes latérales.  Inscription aux M.H.  du 14 novembre 2013.                                                                   VILLE GILLES, la paroisse de St-Meloir, du nom d'un ermite et martyr breton du VIe siècle, est attestée dès les premières années du XIe siècle. L'architecture ne conserve pas de traces d'occupations aussi anciennes à l'exception de certaines croix médiévales. Les réussites commerciales des marchands malouins à partir du XVe siècle, jusqu'au XVIIe siècle, puis la \"course\" au XVIIIe siècle, vont être partiellement réinvesties, d'abord, dans l'acquisition de manoirs, leur transformation, puis l'édification de nouvelles maisons des champs appelées malouinières.  La malouinière de la Ville Gilles et les communs furent restaurés à l'occasion de l'installation d'un établissement de la DDASS entre 1960 et 1991. Malouinière, nichée dans une propriété de cinq hectares de verdure. Logis à double profondeur : deux souches sur le même pignon ; cinq travées ; lucarnes refaites en béton. les cinq chambres d'hôtes ont toutes vue sur le parc de 2 hectares, exposé plein sud. La décoration de chaque chambre évoque un aspect de la grande histoire de ces \"Messieurs de Saint-Malo\", qui ont construit ces fameuses demeures que sont les malouinières.","architecture":"VAULERAULT, la paroisse de Saint-Meloir-des-Ondes, du nom d'un ermite et martyr breton du VIe siècle, est attestée dès les premières années du XIe siècle. L'architecture ne conserve pas de traces d'occupations aussi anciennes à l'exception, c'est plausible, de certaines croix médiévales. Plus près de nous, ce sont les manoirs, puis les gentilhommières et enfin les grandes demeures destinées à la villégiature qui retiennent l'attention. Les réussites commerciales des marchands malouins à partir du XVe siècle, jusqu'au XVIIe siècle, puis la \"course\" au XVIIIe siècle, vont être partiellement réinvesties, d'abord, dans l'acquisition de manoirs, leur transformation, puis l'édification de nouvelles maisons des champs appelées malouinières.   Construit face à la baie de Cancale,  par Garangeau, venu dresser les plans des parcs à huîtres vers 1725, le château de Vaulerault est dû à la famille Cheville. Une avenue conduit à la propriété entièrement close qui comprend, outre le logis, une chapelle, des communs plus récents et une vieille tour de guet près du rivage. Le Vaulerault présente, sur ses deux façades, le même avant-corps à trois travées, conserve un décor intérieur dont certains éléments sont remarquables, notamment le sol du grand salon en marbre polychrome, ou la rampe d'escalier sculptée. Inscription aux M.H. par arrêté du 29 avril 1993.","habitants":"Vaulerault; Famille Cheville\r\n        \r\n        \"","divers":"Trois châteaux dans cet article; Val Enoul grav-1, Ville Gilles grav-3et Vaulerault grav-2. Valerault                                                    GPS : 48° 39' 17\" Nord, 1° 52' 07\" Ouest","gps":"48° 39' 17\" Nord, 1° 52' 07\" Ouest","images":["../image/image_35/35_St_M%c3%a9loir_Ondes_1.jpg","../image/image_35/35_St_M%c3%a9loir_Ondes_2.jpg","../image/image_35/35_St_M%c3%a9loir_Ondes_3.jpg"]},"Consult_chateau_formulairec05d":{"id":"Consult_chateau_formulairec05d","dept":"35","canton":"Montauban-de-Bretagne","commune":"Saint-Pern","nom":"St_Pern","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article; Ligouyer et Tour-st-Joseph LIGOUYER  reconstruit dans le quatrième quart du XVIe siècle par Judes de Saint-Pern: inscription avec date 1592. Il est flanqué de quatre tours et possède des créneaux, des mâchicoulis, un pont-levis et des douves. Ligouyer est érigé en châtellenie sous le nom de Saint-Pern en 1653: il possédait un droit de haute justice et des fourches patibulaires à quatre piliers. On y trouve un portail construit en 1685 (date portée) par l'architecte de Rennais Lecompte. La tour sud-est fut ajoutée dans la deuxième moitié du XIXe siècle. Ligouyer fut la propriété successive des familles Ruffier, de Saint-Pern au milieu du XIVe siècle et en 1789 et Desmiers, de Jehan de Saint Pern en 1480.","architecture":"TOUR -ST-JOSEPH, du XVIIe siècle. Il tire son nom d'une tour démolie en 1856, dernier vestige d'une forteresse ruinée au XVe siècle. La seigneurie de la Tour relevait de la baronnie de Bécherel. Le manoir possédait jadis une chapelle privée et une fuie. La chapelle de la Tour, dépendant de ce manoir, en 1730, par François de Saint-Pern, seigneur de la Tour. Il avait un droit de haute justice. Propriété successive des familles de Saint-Pern, de la Tour, Callouël (avant le XVe siècle), le Bel seigneur de la Gavouyère (en 1513 et en 1623), de la Landelle (en 1656), de Saint-Pern (en 1658). Le portail date de 1720 à 1730. Le calvaire date du XIX-XXe siècle. Le manoir devient en 1856 la propriété des Petites Surs des Pauvres, suite à une donation de Mme Féburier, devenue Petite Soeur des Pauvres après le décès de son mari. La chapelle privative, oeuvre de l'architecte Mellet, date de 1869 : la première pierre est bénite le 20 octobre 1861 et la chapelle est consacrée le 5 septembre 1869. La crypte date de 1869, elle abrite une plaque qui porte l'inscription suivante : cette crypte et la chapelle furent construites en grande partie grâce à la générosité de M. et Mme Féburier - 1863  et contient les restes de Jeanne Jugan (soeur Marie de la Croix) qui y sont transférés le 5 mars 1936 (son tombeau porte l'inscription \"1792 Jeanne Jugan 1879, béatifiée le 3 octobre 1982\").","habitants":"Ligouyer; Familles Ruffier                                                                Tour ; François de Saint-Pern\r\n        \r\n        \"","divers":"Deux châteaux dans cet article; Ligouyer et Tour-st-Joseph Ligouyer  GPS : 48° 17' 19\" Nord, 1° 59' 07\" Ouest","gps":"48° 17' 19\" Nord, 1° 59' 07\" Ouest","images":["../image/image_35/35_St_Pern_Ligouyer_1.jpg","../image/image_35/35_St_Pern_Ligouyer_2.jpg","../image/image_35/35_St_Pern_Ligouyer_3.jpg"]},"Consult_chateau_formulaireb4b7":{"id":"Consult_chateau_formulaireb4b7","dept":"35","canton":"Montfort-sur-Meu","commune":"Saint-Thurial","nom":"St_Thurial","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article ; Haie-Chapeau (voir article), Longrais et la Motte.                                                                                                                                                                                                                      LONGRAIS, les travaux historiques de M.M. Piel et Aubin indiquent que le château des Longrais fut construit sur le site d'un ancien domaine, au début du XVIIIe siècle, tandis que les dépendances furent bâties au milieu du XIXe siècle, le bâtiment principal a été remanié au cours du deuxième quart du XIXe siècle. M. Nourry mentionne que les paysagistes Denis et Eugène Bühler sont intervenus dans l'aménagement du jardin. L'ancienne ferme est aujourd'hui fortement remaniée.","architecture":"La MOTTE, élevée sur un site très escarpé, une motte castrale est transformée à la fin du Moyen-Age en une bâtisse de plan rectangulaire, aujourd'hui très remaniée. Cet ancien manoir appartenait à la famille Chouan, puis aux Lohier au XVIIIe siècle. Le château actuel, aujourd'hui rénové, est une construction du XIXe siècle remployant une partie des bâtiments préexistants , il a été construit par Aldolphe Toulon, directeur de l'exploitation du four à chaux, en 1858, peu avant la rénovation de l'ancien logis. L'exploitation de la carrière par l'usine de chaux aux XIXe et XXe siècles a fortement bouleversé les dispositions du lieu et a  entraîné la disparition de la ferme, à l'est des bâtiments principaux.","habitants":"Motte ; famille Chouan\r\n        \"","divers":"Trois châteaux dans cet article ; , Longeais grav 1-2 et la Motte grav-3.    gps   48° 01' 48\" nord, 1° 55' 50\" ouest","gps":"","images":["../image/image_35/35_St_Thurial_1.jpg","../image/image_35/35_St_Thurial_2.jpg","../image/image_35/35_St_Thurial_3.jpg"]},"Consult_chateau_formulaired6ca":{"id":"Consult_chateau_formulaired6ca","dept":"35","canton":"Montfort-sur-Meu","commune":"Talensac","nom":"Talensac","type":"Château","periode":"XV-XIX","histoire":"quatre  châteaux dans cet article; Bintin, Bransahier et Touche-Roland et vestiges de la Bedoyère.                                                                                     BINTIN, en 1810, la propriété appartient à Louis Guillot,  la \"maison du Bois de Bintin\", ancien manoir mentionné depuis le XVe siècle, est située à l'emplacement du château actuel. En 1821, Pierre Ruel, est propriétaire et fait dresser un plan terrier du domaine; autour de 1840, il entreprend d'importants travaux, construit une nouvelle habitation déclarée en 1843. Autour de 1850, le domaine passe par alliance à Armand Fidèle Porteu qui a épousé en 1835 la nièce de Pierre Ruel. Son fils, Armand Albert Hyacinthe, député d'Ille et Vilaine et maire  de Talensac, fait transformer le château à la fin du XIXe siècle. Il fait appel en 1896 à l'architecte  Emmanuel Le Ray  cette campagne de travaux,  a permis un déploiement important des pièces de réception, plus conforme au mode de vie des occupants. Le château est construit en moellons de schiste La façade de l'orangerie est en brique. Les couvertures sont en ardoise.                                                                                                                  BRANSAHIER, les terrains sont achetés autour de 1839 par Casimir Guérin de la Grasserie qui y construit une demeure vers 1842. Le chalet ou petite maison est édifié en 1844, l'orangerie est également déclarée comme construction neuve à cette période. La propriété passe, en 1864, à Théodore Anger de Kernissan qui réalise un agrandissement autour de 1887, il s'agit de l'aile latérale ouest du bâtiment principal. En 1903, Bransahier est vendu à Joseph Guénon, capitaine d'artillerie à Rennes. Si l'édifice a été partiellement remanié, le parc, ses fabriques et les communs constituent un ensemble d'une grande qualité architecturale et paysagère. On remarquera en particulier le chalet pittoresque, au sud, dont la façade est ornée de peintures murales.","architecture":"BEDOYERE. Corentin-Marie Huchet, leur fils, fut le dernier seigneur de la Bédoyère. Il épousa le 17 mars 1779 Reine-Modeste Rado, qui mourut au château de Talhouët en Pluherlin le 14 octobre 1783 et le 28 mars 1784 Marie-Charlotte du Hérissier. Ayant émigré, ses biens furent mis en vente par la nation, mais son frère Charles Huchet de la Besneraye,  acheta la Bédoyère et la conserva ainsi à la famille. Le fils de cette seconde union, Louis Charles Agathe (1785-1863) portait le titre de marquis de la Bédoyère, titre qui passa à sa mort à son petit neveu Louis-Marie-Alexis car il n'avait eu qu'une fille, Charlotte-Geneviève, de son mariage avec Olympe de Gondrecourt. A défaut du titre, Charlotte-Geneviève conserva La Bédoyère que sa fille, Mme de Saint-Méleuc possédait encore à la fin du XIXe siècle.  Le château, mal entretenu, tomba presque en ruine et fut démoli avant 1920. Seule une petite partie a été restaurée en habitation et est aujourd'hui occupée.                                                                                                         TOUCHE-ROLLAND,  habité à la période néolithique comme permet de le supposer la présence d'un mégalithe dans la forêt de Montfort, le territoire se serait constitué à la période gallo-romaine. Par ailleurs, les rois de Bretagne Judicaël et Erispoë auraient possédé une résidence au VIIe et IXe siècle sur l'ancienne motte féodale du Châtellier, lieu fortifié.\r\nSur le site d'un ancien manoir mentionné depuis le XVe siècle et détruit vers 1850, un château est édifié en 1852 par l'architecte Jacques Mellet pour Monsieur Prioul du Haut Chemin et son épouse, née Le Chevallier. La propriété a ensuite appartenu à la famille de Calan et fut vendu aux Porteu de la Morandière au début du XXe siècle. Dess communs, construits au début du XIXe siècle, comprennent l'ancienne basse-cour de style néo-classique. Le château a été bâti au sud de l'emplacement de l'ancien manoir et domine un parc à l'anglaise.","habitants":"Bintin, Louis Guillot                                                               Brinsahier; Théodore Anger de Kernissan           Bédoyère;Charles Huchet de la Besneraye,                            Touche-Rolland ; Monsieur Prioul du Haut Chemin\r\n        \"","divers":"quatre châteaux à Talensac; Bintin grav 3, Bransahier grav-4 et Touche-Roland  grav -5 et vestiges de la Bedoyèregrav-1-2. Touche GPS : 48° 06' 35\" Nord 1° 55' 30\" Ouest","gps":"48° 06' 35\" Nord 1° 55' 30\" Ouest","images":["../image/image_35/35_Talensac_1.jpg","../image/image_35/35_Talensac_2.jpg","../image/image_35/35_Talensac_3.jpg","../image/image_35/35_Talensac_4.jpg","../image/image_35/35_Talensac_5.jpg"]},"Consult_chateau_formulairef7ca":{"id":"Consult_chateau_formulairef7ca","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Torcé","nom":"Tesnières","type":"Château","periode":"XIX","histoire":"TESNIERES, l'histoire de la commune de Torcé reste à écrire, tout au plus peut-on mentionner quelques éléments relevés par les érudits du XIXe siècle. Si l'on en croit Arthur de la Borderie, la paroisse de Torcé aurait existé dès la fin du XIe siècle : en 1093, Hamelin de Torcé souscrit à une charte de donation en faveur du prieuré Sainte-Croix de Vitré. Cette paroisse est au moins attestée de manière certaine en 1227, car une autre charte mentionne à cette date Clément Persona de Torceio, alias recteur de Torcé. Au temporel, la paroisse était partagée entre, d'une part, la seigneurie haute justicière de la Motte qui possédait encore un droit de quintaine sous l'Ancien régime, et dont le siège primitif était sis près de la motte féodale qui s'élevait au nord-est de l'église, et d'autre part, la seigneurie de la Haye de Torcé, dont le manoir éponyme situé au sud du territoire a disparu. On ne sait en revanche de quelle seigneurie l'exceptionnel manoir du Grand Maimbier était le siège ou la résidence. Les événements qui ont marqué la province ne semblent pas avoir laissé de traces dans le passé de la paroisse.  Au XVIIe siècle, la paroisse put s'honorer de la visite de la marquise de Sévigné : la célèbre épistolière fut marraine d'une cloche fondue en 1662.","architecture":"TESNIERES  son propriétaire initial fut Alphonse de Langle. Jusqu'en 1609 coexistèrent deux demeures, la Haute Tesnière et la Basse Tesnière, qui furent alors unies par la famille Malherbe. Antérieurement, en 1513, la Basse Tesnière, maison anoblie vers 1436 par le Duc Jean V, appartenait aux Godart, et la Haute Tesnière aux Le Ludre. Puis, les Tesnière échurent aux Guillaudeu, en 1637, puis aux de Langle vers 1697. Le château des Tesnière est l'un des édifices de style néo-gothique tardif construits par Jacques Mellet pour la noblesse locale dans les années 1860. Sans être exceptionnel, le bâtiment peut être considéré comme un représentant d'une réelle qualité architecturale au sein d'une production parfois stéréotypée. Édifice de plan allongé en L composé d'un corps de logis principal flanqué d'un ensemble de trois pavillons au nord-est, une tour d'escalier polygonale et deux tours cylindriques complètent le dispositif au sud. L'élévation comprend un niveau de sous sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble. Le décor des façades est de style néo-gothique (lucarnes à gâble avec accolade, allège, mâchicoulis). Le château des Tesnière dispose d'une chambre spacieuse et de quatre suites, chacune delles ayant une vue superbe sur la campagne verdoyante.","habitants":"la marquise de Sévigné  et la  Famille Malherbe\r\n        \"","divers":"A Torcé le château de Tesnière GPS : 48° 03' 42\" Nord 1° 15' 57\" Ouest","gps":"48° 03' 42\" Nord 1° 15' 57\" Ouest","images":["../image/image_35/35_Tesni%c3%a8res_1.jpg","../image/image_35/35_Tesni%c3%a8res_2.jpg","../image/image_35/35_Tesni%c3%a8res_3.jpg","../image/image_35/35_Tesni%c3%a8res_4.jpg","../image/image_35/35_Tesni%c3%a8res_5.jpg"]},"Consult_chateau_formulairebadb":{"id":"Consult_chateau_formulairebadb","dept":"35","canton":"Rennes","commune":"Pacé","nom":"Touche_Milon","type":"Château","periode":"XVIII-XX","histoire":"TOUCHE-MILON   construit à la fin du XVIIIe siècle correspond au corps central de l'actuel château. Cette partie presque entièrement construite en pan de bois à été datée par dendrochronologie en 2019 des années 1786-1787. Cette datation concerne les deux façades nord et sud ainsi que les anciens pignons du corps central, les plafonds avec leurs poutres et solives et la charpente de comble. A l'intérieur, le pan de bois de l'étage conserve la trace de deux état successifs.   Construit sur le site d'un ancien manoir datant du XVIe siècle et de ses dépendances, dont l'ensemble fut conservé, le château de la Touche-Milon neuf fut construit à la moitié du XIXe siècle, par Eugène Pinault, Sénateur et Maire de Rennes, près de l'angle Sud-Est de la cour de l'ancien manoir toujours conservé. Son parc paysager a été créé durant cette période. Le château porte principalement la marque du milieu du XIXe siècle bien qu'il fût remanié par l'addition d'ailes formant des pavillons en ressaut vers 1920 par madame Pinault propriétaire des lieux au XXe siècle.","architecture":"TOUCHE-MILON, ce premier logis est figuré tel sur le cadastre de 1814. Vers 1830-1840, deux petites ailes basses lui sont ajoutées et d'importants travaux de mise au goût du jour qui donnent à ses façades une touche néo-classique : enduit à panneaux, porches à colonnes, balcons de fonte ornementale, chambranles moulurés et frontons aux fenêtres. Figuré sur le cadastre de 1814, agrandi d'ailes plus étroites qu'une partie centrale suivant le cadastre de 1851. Corps de logis principal de plan rectangulaire comportant cinq travées, deux travées latérales étant groupées deux à deux, la travée centrale est marquée par un décor soigné (tables à bossage, fronton triangulaire et colonnes de part et d'autre de la porte d'entrée supportant un balcon au niveau du premier étage). La toiture à croupe est percée de lucarnes à fronton cintré. Deux ailes latérales furent rajoutées à sa construction. Depuis le château de la Touche-Milon est tombé à l'abandon. Le parc a été scindé en deux par la route nationale. Deux ailes latérales ont été ajoutées au corps principal, donnant à l'édifice un plan en H. Abandonné, ses ouvertures ont été murées.","habitants":"Eugène Pinault,\r\n        \"","divers":"A Pacé  le château de la Touche-Milon gps 48° 08' 52\" nord, 1° 46' 26\" ouest","gps":"","images":["../image/image_35/35_Touche_Milon_1.jpg","../image/image_35/35_Touche_Milon_2.jpg"]},"Consult_chateau_formulaire6d1b":{"id":"Consult_chateau_formulaire6d1b","dept":"35","canton":"Combourg","commune":"St-Thual","nom":"Tourdelain","type":"Château","periode":"XVII","histoire":"TOURDELAIN, le nouvel édifice, dessiné par Edouard Brossais Saint-Marc est dédié, quant à lui, à la sainte-Trinité et rend compte de la production de cette époque et du style néogothique quasiment officiel. La création du nouveau bourg vers 1872, plus au centre du territoire communal, n'a pas bouleversé le réseau des voies préexistantes qui sont mentionnées sur le cadastre de 1835. Le bourg s'intègre au coeur d'un réseau déjà constitué entre le Fort de la Lande et la Croix du Frêne. En 1829, suivant une nouvelle date portée, la façade est rénovée. Le logis conserve des boiseries du XVIIIe siècle ainsi que des décors réalisés par le décorateur rennais Jobbé Duval au début de XXe siècle; la chapelle notamment porte la date et la signature de son intervention en 1910. Grand logis de plan rectangulaire allongé encadré deux ailes basses saillantes formant un U ; pavillon isolé à toiture à l'impériale ; chapelle en falun ainsi que la ferme construite en partie principale en moellons équarris. Inscription aux M.H. par arrêté du 16 décembre 1943.","architecture":"TOURDELAIN,  date de la 1ere moitié du XVIIe siècle et du 2ème quart du XVIIIe siècle. Divers travaux eurent lieu en 1740 et 1829. Le château fut bâti au début du XVIIe siècle, sur l'ancien emplacement d'un vieil édifice datant du XIIIe siècle. Le château fut remanié en 1740, puis restauré en 1829. Il est composé d'un corps de bâtiment central accosté de 2 ailes en retour d'équerre. Le corps de logis principal est couronné par un fronton triangulaire percé d'un oeil de boeuf. Deux pièces conservent des boiseries, de style Louis XIV. A côté se trouve le bâtiment de la justice seigneuriale, petit édifice comportant un rez-de-chaussée éclairé de 3 baies, couvert d'une toiture en carène renversée. Le château de Tourdelain est inscrit aux M.H. depuis le 16/12/1943. Sont protégés aux M.H. depuis le 16/12/1943. la chapelle, le parc, et le décor intérieur du château il est privé, La commune compte 2 châteaux et 1 manoir. Le château de Saint-Thual du XVIIe siècle et le Manoir de Lesnen, du XVIIIe siècle.","habitants":"Tourdelain; Edouard Brossais\r\n        \"","divers":"St-Thual GPS : 48° 20' 15\" Nord, 1° 55' 57\" Ouest                                   Tourtelain GPS : 48° 19' 47\" Nord, 1° 55' 52\" Ouest","gps":"48° 20' 15\" Nord, 1° 55' 57\" Ouest","images":["../image/image_35/35_Tourdelain_1.jpg","../image/image_35/35_Tourdelain_2.jpg"]},"Consult_chateau_formulaire16af":{"id":"Consult_chateau_formulaire16af","dept":"35","canton":"Campénéac","commune":"Campénéac","nom":"Trécesson","type":"Forteresse","periode":"XIII-XIV-Xviii","histoire":"TRECESSON, le château de Trécesson est déjà mentionné comme demeure des seigneurs de Ploërmel et Campénéac, dès le VIIIe siècle. La famille de Trécesson est connue depuis le XIIIe siècle, son premier représentant connu fut le chevalier Jean de Trécesson dont le petit-fils fut connétable de Bretagne au XIVe siècle. La tradition attribue la construction à la fin du XIVe siècle mais il est plus vraisemblable que le château, dans son état actuel, date de la fin du XIVe siècle ou du début du XVe siècle. Il aurait été bâti par Jean de Trécesson, chambellan du duc Jean IV de Bretagne.  Cest en effet vers 1440 que la dernière héritière du nom de Trécesson se marie avec Éon de Carné. Ce dernier et son fils François relèvent le nom de Trécesson et entreprennent la transformation-reconstruction du château. La demeure restera propriété de la famille Carné-Trécesson jusquen 1773 où la dernière porteuse du nom, Agathe de Trécesson se marie avec René-Joseph Le Preste de Châteaugiron qui en devient propriétaire. En 1793, il vend le château à Nicolas Bourelle de Sivry, payeur général des guerres. Celui-ci passe ensuite par héritage aux Perrien de Crenan, puis aux Montesquieu et enfin aux Prunelé. La famille de Prunelé habite toujours le château.","architecture":"TRECESSON, on accède au château par un pont qui enjambe la douve. Lentrée est commandée par un important châtelet flanqué de deux tours étroites en encorbellement réunies par une ancienne galerie à mâchicoulis. Sur la droite une longue façade presque aveugle, surmontée dun toit dardoises à longs pans, se termine par une tour dangle hexagonale. Autour de la cour intérieure de forme trapézoïdale on trouve à droite un corps de logis de facture plus récente, sans doute fin XVIIIe siècle et sur la gauche des bâtiments domestiques et une petite chapelle seigneuriale. Lensemble est un site protégé classé aux M.H..","habitants":"le chevalier Jean de Trécesson                                                  René-Joseph Le Preste de Châteaugiron\r\n        \"","divers":"A Campénéac la forteresse de Trécesson gps 47° 58' 33\" nord, 2° 16' 25\" ouest","gps":"","images":["../image/image_35/35_Tr%c3%a9cesson_1.jpg","../image/image_35/35_Tr%c3%a9cesson_2.jpg","../image/image_35/35_Tr%c3%a9cesson_3.jpg","../image/image_35/35_Tr%c3%a9cesson_4.jpg"]},"Consult_chateau_formulaire008f-2":{"id":"Consult_chateau_formulaire008f-2","dept":"35","canton":"Montfort-sur-Meu","commune":"Iffendic","nom":"Tréguil","type":"Château","periode":"XIII-XVIII","histoire":"TREGUIL, l'origine du château de Tréguil remonte selon certaines sources au moins au XIIIe siècle : il était alors la propriété des comtes de Montfort, et faisait partie des défenses de cette ville. Mentionné en 1427, il appartient à cette date à Jean Marquer qui le possède encore en 1513. Acheté en 1642 par André Bazin, conseiller au Parlement de Bretagne, il fut érigé en vicomté en 1644 et exerçait à Montfort un droit de haute justice. En 1666, il est acquis au seigneur de la Busnelaye, premier président à la chambre des comptes de Bretagne, famille encore existante et apparentée aux Cintré. En 1715, Tréguil est racheté par Joseph Huchet de Cintré, qui acquiert en même temps les droits de haute, basse et moyenne justice sur tout l'enclos de Montfort, depuis Coulon. Incendié durant la Révolution Française, il a été reconstruit vers 1820 pour Georges Huchet de Cintré. Le plan du château précédent demeure inconnu. L'architecte reprend en 1820, une partie plus ancienne qui est accolée à la façade arrière Est. Ce pavillon flanqué d'une tour carrée peut remonter au XVIe siècle, il abrite en rez-de-chaussée la cuisine actuelle du château. L'escalier en bois à balustres qui dessert l'étage semble également un remploi du XVIIe siècle. Mentionnée en 1682, la chapelle a été reprise au XIXe siècle (vers 1860) façade et décor intérieur. A cette époque, elle est dédiée à l'Immaculée Conception. Elle abrite aujourd'hui les défunts de la famille dont Louis Huchet de Cintré et son épouse Antoinette Derval.","architecture":"TREGUIL, les bâtiments qui s'organisent autour de la cour carrée forment un ensemble hétérogène recomposé au XVIIe siècle. Au nord, le pavillon nord-ouest est vraisemblablement le plus ancien, il abrite un escalier en vis, en bois et une cheminée dont la datation peut remonter au XIVe ou au XVe siècle. Transformé au XVIIe siècle, le rez-de-chaussée sert d'écuries. Les communs attenants également transformés au XVIIe siècle possèdent deux très belles lucarnes au décor renaissance. Au sud, l'aile est cantonnée de deux pavillons datables du XVIIe siècle. Dans cette partie est mentionnée en 1832 une usine de filature de laine et de tissus. A l'est, le logis de la ferme est composé d'un bâtiment en rez-de-chaussée surmonté d'un étage de comble recouvert d'une toiture à longs pans brisés. Si le fonds est ancien et peut remonter au XVIIe siècle, des aménagements ont été faits aux époques ultérieures. Le comble aurait servi d'hôpital provisoire pendant la guerre de 1870. A l'ouest, le mur d'enclos est percé par une porte cochère et une porte piétonnière. Les armes qui y figurent sont de la famille Jédouin de la Dobiais. L'environnement bien sauvegardé mérite également d'être ici souligné. Le château de Tréguil et ses dépendances forment un ensemble architectural de grande qualité.","habitants":"Tréguil ; André Bazin et Joseph Huchet de Cintré, \r\n        \"","divers":"A Iffendic le château de Tréguil. Tréguil  GPS : 48° 07' 52\" Nord, 2° 01' 57\" Ouest","gps":"48° 07' 52\" Nord, 2° 01' 57\" Ouest","images":["../image/image_35/35_Tr%c3%a9guil_1.jpg","../image/image_35/35_Tr%c3%a9guil_2.jpg","../image/image_35/35_Tr%c3%a9guil_3.jpg"]},"Consult_chateau_formulaire9314":{"id":"Consult_chateau_formulaire9314","dept":"35","canton":"Redon","commune":"St-Just","nom":"Val_Allérac","type":"Château","periode":"XIX","histoire":"Deux châteaux à st-Just le Val et Allérac.                                                 VAL, le château du Val  du XIXe siècle, édifié à l'emplacement d'un ancien manoir, propriété successive des familles Peschart seigneurs de la Durantaye du XVIIe siècle, Saoullaye (en 1734 et en 1789) et Poulpiquet du Halgouet. Il était jadis entouré de douves ; ces terres passèrent par dons successifs à l'abbaye Saint-Sauveur de Redon, qui y fonda un prieuré. Cet établissement prit le vocable de Saint-Just  parce qu'il possédait des reliques de ce saint. Au XIe siècle, il  existait plus à l'est une petite paroisse appelée Alarac ou Allérac,                                                                ALLERAC; château construit au XIXe siècle à l'emplacement de l'ancien manoir fortifié alors transformé en dépendances. Ce dernier, cité dès le IXe siècle, appartenait à la famille du Verger puis aux Gallerie, seigneurs du Bois-Jouan vers 1536 ; il passa encore aux Brandins, et au XVIIe siècle aux Fournier de Trélo. Les vestiges consistent en un corps de bâtiment totalement remanié flanqué d'un pavillon avec toiture à croupe et éléments de fortification, ainsi que des douves et une tour sur l'angle. La cour du château conserve une chapelle privée abandonnée et datée du XVIIe siècle. On y desservait au XVIIIe siècle une fondation de deux messes hebdomadaires faite par Françoise du Vergier, dame d'Allérac, mentionnée en 1588 et desservie dans l'église paroissiale. Cette chapellenie, dite de Notre-Dame d'Allérac ou du Rocher, fut présentée en 1641 à Marin Brandin, chanoine de Rennes, par sa mère, Jeanne Pinczon et dame d'Allérac, pour remplacer Guillaume Botherel, décédé.","architecture":"VAL, construit autour de 1900 par l'architecte Henri Mellet pour M. du Halgouët, le château du Val s'élève au sud de l'emplacement de l'ancien manoir du Val ; détruit dans la seconde moitié du XIXe siècle, ce dernier était composé de deux corps de bâtiments perpendiculaires, comprenait une chapelle et était entouré de douves.  Le château actuel se signale tant par une architecture néo-gothique très soignée où le contexte d'implantation contribue à sa mise en scène, que par l'ensemble parfaitement homogène que composent ses nombreuses dépendances. Il est à ce titre caractéristique de ce qu'est un château moderne, où toutes les composantes du confort et de la vie mondaine (chasse à courre, tennis) sont intégrées au programme architectural. Distribution intérieure non modifiée ; décoration qui associe des éléments du XIXe siècle à d'autres du XVIIIe siècle provenant peut-être de l'ancien manoir (nombreuses boiseries, peintures du XVIIIe siècle, petite cheminée en pierre frappée aux armes des Halgouët inspirée de celle du XVe siècle, le dessus de  la cheminée ornés de panneaux peints). La plupart des dépendances sont datées du XIXe siècle. On observe aussi des remaniements de bâtiments plus anciens (pavillons attenants à la remise aux voitures). Constitutive du domaine du château du Val, la ferme a été réalisée dans le même temps que le château, au début du XXe siècle. Comme l'ensemble des communs, elle fut construite dans un style pittoresque et rationaliste privilégiant le jeu de matériaux polychromes ou celui de toitures silhouettées. Inscription aux M.H. par arrêté du 4 juin 2007.","habitants":"Val ;Poulpiquet du Halgouet                                                          Allérac ; Famille de Fournier de Trélo\r\n        \"","divers":"Deux châteaux à St-Just le Val grav 4-5-6  et Allérac grav-1 à 3 .GPS : 47° 45' 59\" Nord, 1° 57' 36\" Ouest","gps":"47° 45' 59\" Nord, 1° 57' 36\" Ouest","images":["../image/image_35/35_Val_All%c3%a9rac_1.jpg","../image/image_35/35_Val_All%c3%a9rac_2.jpg","../image/image_35/35_Val_All%c3%a9rac_3.jpg","../image/image_35/35_Val_All%c3%a9rac_4.jpg","../image/image_35/35_Val_All%c3%a9rac_5.jpg","../image/image_35/35_Val_All%c3%a9rac_6.jpg"]},"Consult_chateau_formulaire7146":{"id":"Consult_chateau_formulaire7146","dept":"35","canton":"Guichen","commune":"Campel","nom":"Val_Henri","type":"Château","periode":"XIX-XX","histoire":"VAL-HENRI, situé sur une hauteur dominant l'étang de Haut, face à l'ancien site du Val de Campel, le château du Val Campel a été reconstruit en 1862-1863 par M. de Charrette, Charles Langlois étant l'architecte. Inspiré par les modèles du Grand Siècle, l'architecte Charles Langlois a conçu le Val-Henri comme un petit château de plaisance.","architecture":"VAL-HENRI, édifié ex nihilo sur une hauteur, face à l'ancien site délaissé du Val de Campel, la demeure adopte un plan régulier de type ternaire, double en profondeur. Du côté du parc, la façade est cantonnée de deux tourelles polygonales coiffées de hautes flèches, tandis qu'un avant-corps faiblement saillant ouvrant sur un perron vient rompre la monotonie de l'élévation. Au début du XXe siècle, un nouveau corps de logis agrémenté d'une tourelle en encorbellement et d'un bow-window à pans coupé, est construit à l'ouest, en retour d'équerre. Une seconde aile jamais construite devait venir compléter à l'est ce projet d'agrandissement pour former un ensemble en U. Contemporain du château du Val-Henri dont il constitue les communs, l'ensemble agricole adopte un plan en U : le logis de ferme est enserré entre les deux grandes ailes des bâtiments d'exploitation comprenant, au nord, une étable à vaches et, au sud, une remise à voiture, une écurie et une sellerie. Sans équivalent sur le territoire de la commune, cet ensemble est comparable à la ferme de la Graffinais, associée au château de la Lohière située dans la commune voisine du Loutehel.","habitants":"Famille de M. de Charrette\r\n        \"","divers":"A Campel le château de Val Henri        Gps-47° 56' 14\" nord, 2° 00' 31\" ouest","gps":"","images":["../image/image_35/35_Val_Henri_1.jpg","../image/image_35/35_Val_Henri_2.jpg","../image/image_35/35_Val_Henri_3.jpg"]},"Consult_chateau_formulaire17cb-2":{"id":"Consult_chateau_formulaire17cb-2","dept":"35","canton":"Betton","commune":"Betton","nom":"Vallée_Betton","type":"Château","periode":"XIX","histoire":"LA VALLEE, à proximité d'un ancien manoir, un château neuf est construit en 1858, dans un style s'inspirant très librement des modèles de la Renaissance tardive, par Aristide Tourneux, architecte à Rennes, sur une hauteur de la vallée de la Vilaine, pour M. de Torquat (ancien maire de Betton). En 1918, cinq ans après la mort de M. de Torquat, le château est vendu à Jean-Marie Huchet, important entrepreneur rennais. Le château continuera de changer de propriétaire jusquen 2013, date à laquelle il est réhabilité en espace de co-working.","architecture":"LA VALLEE, de manière plus générale, la construction de la Vallée se rattache aux nombreux châteaux édifiés par des notables au cours du XIXe siècle. Les commanditaires se tournent alors vers des matériaux modernes issus du secteur industriel comme par exemple la brique que lon retrouve ici. Cest au cours des années 1990, lorsquil servit de Centre de Rééducation fonctionnelle et professionnelle qu'y furent ajoutés de nouveaux bâtiments répondant à sa fonction. Malgré ces modifications, le château de la Vallée reste un exemple darchitecture remarquable sur la commune de Betton.  Édifice de plan symétrique. Façade principale sud présentant sept travées : corps central de cinq travées régulières avec couvertures à croupe, encadré de deux pavillons à une travées chacun. Façade nord avec avant corps de plan polygonal occupant les trois travées centrales, encadré de deux escaliers à volées divergentes menant à deux perrons. Deux tourelles circulaires s'intercalent en avant du corps principal et des pavillons latéraux. Ossature en partie métallique. Chapelle brique et pierre.","habitants":"Famille de  M. de Torquat\r\n        \"","divers":"A Betton le château de la Vallée      gps  48° 10' 57\" nord, 1° 38' 38\" ouest","gps":"","images":["../image/image_35/35_Vall%c3%a9e_Betton_1.jpg","../image/image_35/35_Vall%c3%a9e_Betton_2.jpg","../image/image_35/35_Vall%c3%a9e_Betton_3.jpg"]},"Consult_chateau_formulaire1875":{"id":"Consult_chateau_formulaire1875","dept":"35","canton":"Melesse","commune":"Saint-Germain-sur-Ille","nom":"Verger_au_Coq","type":"Château","periode":"XVII","histoire":"VERGER AU COQ, les parties les plus anciennes de ce château sont la chapelle et le corps de bâtiment situé à l'opposé. Ces deux éléments semblent remonter au XVIIe siècle. Au XIVe et au XVe siècle, le château appartenait aux Le Coq, puis aux Thierry seigneurs du Bois Orcant au milieu du XVIe siècle. En effet, en 1552, les Thierry avaient succédé, par alliance aux Le Coq. Cette famille de notables bourgeois avait accédé aux plus hautes charges du duché de Bretagne ; François Thierry était alors gouverneur de la ville de Rennes. Au début du XVIIe siècle, le château appartenait en effet à Claude de Marboeuf, président du Parlement de Bretagne. A cette époque, le bâtiment devient donc la résidence de campagne d'un homme de robe. Le corps central est construit par Pierre Marot, comte de la Garaye en 1737. En 1796, l'arrière grand père du Général Boulanger, commerçant à Rennes, acquiert le château vendu comme bien national. En 1849, madame Clotilde Olympe Lesage de la Villebrune, veuve du marquis de Breuilpont en devient propriétaire ; sa descendance, constituée de la famille de Coniac occupe encore le château. Parmi les chapelains du Verger, notons Guy Riollier (décédé vers 1734), Pierre Bourdière (1735), Joseph Bohuon (décédé en 1747), Pierre Le Breton (décédé en 1773), et Emmanuel Le Forestier de la Maîtrie (Pouillé de Rennes). Propriété successive des familles le Coq (en 1371 et 1513), Thierry, seigneurs du Boisorcant (en 1552), la Guézille (vers 1606), Turpin, seigneurs de Crissé (vers 1623), Marbeuf, Marot, comtes de la Garaye (vers 1673), du Breil de Pontbriant (en 1755 et 1789), Coniac.","architecture":"VERGER AU COQ,  le château est composé de trois corps de bâtiments (dont la chapelle) les uns dans l'alignement des autres ; ils ne possèdent pas la même hauteur. Les bâtiments sont entourés d'un parc à l'anglaise. Au centre, se trouve un bâtiment couvert d'un toit à croupes dont la façade est percée de sept travées. La toiture est rythmée par trois lucarnes surmontées de frontons semi-circulaires. A droite, un autre corps de bâtiment forme un pavillon, il est plus élevé que le précédent et seules deux travées d'ouvertures sont percées dans la façade. Enfin, la chapelle se trouve à gauche du corps central. Cette chapelle est située à l'ouest du château, elle lui est accolée. Sa maçonnerie est enduite et elle possède un toit à longs pans couvert d'ardoise. Les encadrements de baies sont en granite. A l'intérieur, la voûte en berceau est en pierre.  La construction de la ferme du château remonte probablement au XVIIe siècle. Sur le cadastre de 1828, les bâtiments de la ferme formaient déjà un U. A cette époque, l'extrémité sud de l'aile ouest était occupée par un fournil.   Inscription aux M.H. par arrêté du 29 août 1988.","habitants":"Famille de le Cop puis à Claude de Marboeuf\r\n        \"","divers":"Deux château à Saint-Germain-sur-Ille le verger au Coq et le prieuré   gps 48° 14' 56\" nord, 1° 39' 33\" ouest","gps":"","images":["../image/image_35/35_Verger_au_Coq_1.jpg","../image/image_35/35_Verger_au_Coq_2.jpg","../image/image_35/35_Verger_au_Coq_3.jpg"]},"Consult_chateau_formulaire7d8f":{"id":"Consult_chateau_formulaire7d8f","dept":"35","canton":"Montfort-sur-Meu","commune":"Verger_Monterfil","nom":"Verger_Monterfil","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux dans cet article Bonnay et les Logis à Monterfil.                                                                             BONNAY, le château s'élève sur un site de motte castrale, celle ci avec un système de douves est conservée. Le logis de plan rectangulaire est cantonné aux angles nord de deux pavillons carrés. Il peut s'agir d'une construction de la limite du XVIe siècle et du XVIIe siècle remaniée aux siècles suivants. Sur le cadastre de 1845, les communs figurent perpendiculairement au logis, ils sont détruits aujourd'hui.","architecture":"Le LOGIS  à 3km à l'est Monterfil, château construit dans le deuxième quart du XIXe siècle pour M. de Farcy de la Ville du Bois, sur le site ancien d'un château attesté depuis le Moyen-Age et figuré sur le cadastre de 1824. Il s'agit de l'habitation moderne mentionnée par Orain comme remplaçant le château de Monterfil et appartenant à M. de la Bintinaye. En 1885, M. de la Bintinaye vend la demeure à M. François-Charles Oberthür, l'imprimeur rennais, d'origine alsacienne, qui fait probablement construire les nouveaux communs et dessiné un parc par les paysagistes Bühler. Un corps de logis datant du XVIe et portant les armoiries des Monterfil, disposé perpendiculairement à la demeure, est conservé, mais profondément remanié. Le colombier dessiné sur le même cadastre est détruit. La ferme du Logis a probablement été construite au milieu du XIXe siècle lors de l'édification du nouveau château. Désaffectation et remaniement dans la deuxième moitié du XXe siècle.","habitants":"Logis ;Famille de M. de la Bintinaye\r\n        \r\n        \r\n        \"","divers":"A Verger_Monterfil le château des logis; les Logis GPS : 48° 04' 00\" Nord, 1° 58' 39\" Ouest","gps":"48° 04' 00\" Nord, 1° 58' 39\" Ouest","images":["../image/image_35/35_Verger_Monterfil_1.jpg","../image/image_35/35_Verger_Monterfil_2.jpg"]},"Consult_chateau_formulaire8939":{"id":"Consult_chateau_formulaire8939","dept":"35","canton":"Val-Couesnon","commune":"Le Chatellier","nom":"Vieuville","type":"Château","periode":"XIX","histoire":"VIEUVILLE  Le commanditaire de ce bâtiment est Monsieur Saturnin Le Mercier des Alleux. Le château a été construit au cours du troisième quart du XIXe siècle par l'architecte Jacques Mellet, la date de 1869 a d'ailleurs été découverte sous l'enduit par les propriétaires actuels. Le fait que Jacques Mellet ait déjà travaillé dans la commune a  influencé le propriétaire de la Vieuville dans le choix de cet architecte. Jacques Mellet a beaucoup oeuvré dans le département d'Ille-et-Vilaine puisqu'il  a construit environ 75 bâtiments  entre 1844 et 1876. Outre le projet architectural, le cabinet Mellet a également fourni les plans pour l'aménagement intérieur du château. De nombreux réemplois de l'ancien manoir situé au sud-ouest sont présents dans le château, tant pour le décor intérieur  que pour des éléments d'architecture des communs sur lesquels les lucarnes sont des réemplois de l'aile ouest de l'ancien manoir, détruite au milieu du XIXe siècle. Le propriétaire actuel possède des plans d'un projet de restauration de l'ancien manoir qui sont signés de l'architecte A.Tourneux, ces plans témoignent du fait que le propriétaire de la Vieuville de l'époque, M. Des Alleux, a hésité entre la restauration de l'ancien manoir et la construction d'un château neuf. Un document d'archives de 1825 nous apprend en effet que le manoir était en assez mauvais état à cette époque et mentionne l'existence de boiseries et d'anciennes tapisseries dans le bâtiment.","architecture":"VIEUVILLE, des plans d'aménagement intérieur datant de 1922 nous permettent de connaître le plan de l'édifice et la disposition des différentes pièces par niveau à cette époque. Le sous-sol était un espace réservé aux domestiques, la partie nord était composée de deux caves, séparées par une \"décroterie\". La partie sud du sous-sol, séparée de la partie nord par un couloir, était composée d'une chambre, d'une salle à manger des domestiques ainsi que de la cuisine, qui communiquait avec l'office du rez-de-chaussée par un monte-plats. Le rez-de-chaussée était composé au nord, d'ouest en est, d'un bureau, du vestibule d'entrée et d'un petit salon. La partie sud, donnant sur le parc, était composée, d'ouest en est, d'une chambre d'ami, de l'office, qui communiquait directement avec la salle à manger située au centre, et d'un grand salon. Le premier étage comptait cinq chambres, celles du sud possédaient des cabinets de toilette, notamment dans les deux tours circulaires. Le portail et la grille proviennent de l'ancien hôtel. Le Harivel, bâtiment datant du XVIIIe siècle, situé rue de la Pinterie à Fougères, et détruit lors des bombardements de 1944 ; ils sont protégés au titre des M.H. Le château est composé d'un édifice de plan allongé symétrique, avec un corps central cantonné de deux tours circulaires au sud et de deux pavillons saillants au nord. L'élévation comprend un niveau de sous-sol, un rez-de-chaussée surélevé, un étage carré et deux étages de comble. La façade principale (sud), construite en pierre de taille de granite, est marquée par un avant-corps central à pans coupés avec perron à deux volées d'escalier convergentes et surmonté d'un toit polygonal.","habitants":"Famille de M. Des Alleux\r\n        \"","divers":"a Le Chatellier le château de  Vieuville  GPS : 48° 25' 12\" Nord, 1° 13' 59\" Ouest                                                 48° 25' 14? nord, 1° 13' 57? ouest","gps":"48° 25' 12\" Nord, 1° 13' 59\" Ouest","images":["../image/image_35/35_Vieuville_1.jpg","../image/image_35/35_Vieuville_2.jpg","../image/image_35/35_Vieuville_3.jpg"]},"Consult_chateau_formulaire844a":{"id":"Consult_chateau_formulaire844a","dept":"35","canton":"Val-Couesnon","commune":"Saint-Brice-en-Coglès,","nom":"Vilette_St_Brice","type":"Château","periode":"XVI-XVIII","histoire":"VILETTE, le château de La Villette est édifié avec quelques remplois de l'ancien manoir du même nom plus ancien qui, s'il était de l'époque de la chapelle, devait dater du XVIe siècle. Détruit en 1789, des éléments en ont été remployés dans la construction du château : rampant, très belle cheminée... Du XVIe siècle au XVIIIe siècle, La Villette est une petite seigneurie qui appartient à une famille qui porte le même nom. Dans l'église de Saint-Brice, près de la chapelle de la Vierge, est placée la pierre tombale de Anne Rose Renée de La Villette, veuve de Denis de La Marzelle, décédée le 13 mai 1846 en son logis de la Branche, âgée de 77 ans. Le tombeau de sa soeur, sur lequel est gravée l'inscription : \"Ci-git Désirée de La Villette dernière du nom décédée le 18 avril 1862 âgée de 83 ans.  Dans son ouvrage, Paul Banéat retrace la chronologie des différents propriétaires du château de la Villette. Le manoir de la Villette est cité dès 1395 ; sa chapelle est abandonnée. Il a très longtemps appartenu aux seigneurs de ce nom. Villette signifie village ou petite maison des champs. La chapelle de la Villette dépendant en 1676 du manoir de ce nom. L'élévation régulière et symétrique, le plan rectangulaire ainsi que la sobriété du vocabulaire architectural sont caractéristiques de la fin du XIXe siècle.","architecture":"VILETTE,  se situe au nord-est de la commune de Saint-Brice-en-Coglès. La propriété comprend d'une part le logis et les dépendances de la ferme située à l'ouest et disposés en U, et d'autre part le château et son parc. La façade sud s'ouvre sur un jardin, au sud-est de celui-ci est disposée une chapelle. La façade nord donne sur un accès menant à une autre ferme. Le château se compose d'un grand bâtiment rectangulaire dont la partie centrale est saillante en façade sud et couverte d'une toiture à pavillon. La partie centrale est composée d'une travée, de part et d'autre de celle-ci il y a deux travées. Le rez-de-chaussée est légèrement surélevé et surmonté d'un étage carré et d'un comble. La maçonnerie est en petit appareil régulier de granite, les chaînes d'angles, les encadrements d'ouvertures et la partie centrale en saillie sont en pierre de taille de granite. Les pignons ont des rampants débordants. La toiture est ornée d'un épi de faîtage en zinc sur le pavillon et est percée d'oeil-de-boeuf en zinc. Les lucarnes sont coiffées d'un fronton triangulaire, la lucarne centrale d'un fronton cintré. Il y a quatre souches de cheminée, une sur chaque pignon et deux qui s'insèrent de part et d'autre du pavillon central sur les murs de refend.","habitants":"Famille de la Vilette\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Saint-Brice-en-Coglès, le château de Vilette  GPS : 48° 25' 23,21\" Nord, 1° 20' 46,13\" Ouest","gps":"48° 25' 23,21\" Nord, 1° 20' 46,13\" Ouest","images":["../image/image_35/35_Villette_St_Brice_1.jpg","../image/image_35/35_Villette_St_Brice_2.jpg"]},"Consult_chateau_formulaire004d":{"id":"Consult_chateau_formulaire004d","dept":"35","canton":"Vitré","commune":"Chatillon en Vendelais","nom":"Villanfray","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Chatillon en Verdelais ; Villanfray et Malnoé.                                                                           VILLANFRAY, le village de Châtillon-en-Vendelais s'est formé autour du château fort construit avant 1045 par Main, seigneur de Fougères, probablement reconstruit au XIVe siècle et presque entièrement démoli en 1623 par Richelieu. Ses dernières ruines ont disparu vers 1885, époque où le château sert de carrière. Le château de Villanfray, de plan rectangulaire symétrique, est construit en 1868 pour Henri Charil de Villanfray. L'orangerie et le lavoir sont aujourd'hui détruits. Les écuries sont transformées en maison. Corps de logis composé d'un sous-sol ; en rez-de-chaussée surélevé et étage de comble. Elévation ordonnancée. Soubassement en pierre de taille de granite. Chaîne d'angle, corniche, bandeau et encadrement des baies en tufeau. La cuisine est dans le sous-sol.","architecture":"MALNOE, Saint-Christophe-des-Bois, ancien manoir de Malnoë existant dès le XVe siècle dont subsiste au bord du site, la chapelle Saint-Jean. Cette chapelle était fondée de trois messes par semaine vers 1713. Le domaine possédait un droit de haute justice et un droit de quintaine. Il relevait de la châtellenie de Châtillon-en-Vendelais. Le château a été reconstruit deux fois de suite sur le même site d'abord au début du XVIIe siècle et en 1801, date de l'actuel château bâti par Guillaume Farcy et Marie Tranchant. Inscription, sur les linteaux de la porte et de la fenêtre centrale à l'étage : Guillaume Farcy  Malnoé et  Marie Tranchant  en 1801 (vieux style ) ou l'an 9 (républicain). Malnoë fut la propriété successive des familles Malenoë en 1094, Cervon, barons des Arcis en 1653, Farcy, seigneurs de Mué en 1676 et 1789.","habitants":"Henri Charil de Villanfray                                                               Malnoé;  Guillaume Farcy Malnoé.\r\n        \"","divers":"Deux châteaux à Chatillon en Verdelais ; Villanfrais et Malnoé.   Gps  48° 13' 33\" nord, 1° 10' 39\" ouest","gps":"","images":["../image/image_35/35_Villanfray_1.jpg","../image/image_35/35_Villanfray_2.jpg"]},"Consult_chateau_formulaireb0d3-2":{"id":"Consult_chateau_formulaireb0d3-2","dept":"35","canton":"Fougères","commune":"Parigné","nom":"Ville_Gontier","type":"Château","periode":"XVII-XIX","histoire":"VILLE GONTIER; au Xe siècle, un village nommé \"parochia de Parigneio\" (paroisse de Parigné) est créé non loin du village de Passillé. Au commencement du XIIIe siècle, il est fait mention de la paroisse de Parigné, dans laquelle se trouvaient des terres appelées le Champ et le Pré du Renard, \"Campus et Pratum Renardi\". Ces terres appartenaient à un chevalier nommé Guy de Bazouge, qui les avait reçues d'Etienne de Parigné et qui les tenait alors en fief de son fils, Roger de Parigné. En 1213, Guy de Bazouge donna pour le salut de son âme toutes ces terres aux religieux de l'abbaye de Savigné, et Roger de Parigné s'empressa d'approuver cette donation, renonçant même à tous ses droits sur les terres en question en faveur de Savigné. Le patrimoine bâti de la commune se distingue par son église actuelle refaite au XIXe siècle. Il ne reste de l'ancienne église que les fenêtres de la nef (XIVeXVe siècles) et une petite porte flamboyante aux armes des seigneurs de Parigné replacée dans le chur. La commune est aussi marquée par la Chouannerie, ainsi la chapelle Saint Roch, construite en 1625 par les paroissiens à l'occasion d'une épidémie de peste, détruite et reconstruite en 1774, fut un haut lieu de pèlerinage, pendant la Révolution. Des châteaux sont présents sur le territoire de la commune : le château du Bois Guy du XVIIe siècle accolé à une construction renaissance en partie démolie, le château de la Villegontier, où se trouvait autrefois l'ancien manoir cité en 1248, le chât
