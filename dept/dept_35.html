 présente une tourelle octogonale dont le toit est également interrompu par une lucarne à fronton arrondi. Au nord du corps principal sont deux pavillons contigus au toit plus élevé. L'un d'eux, à l'angle Est, forme avec le corps principal un angle dans lequel se trouve une petite tourelle circulaire couverte d'un toit en poivrière. Ce château présente une grande unité dans le décor.                                                                                   LES ONGLEES   Les Coniac, seigneurs dAllineuc et de Toulmen, propriétaires des lieux depuis 1632, furent les maîtres douvrage de la demeure,   propriété de la famille de Péan de Ponfilly.","architecture":"Les ONGLEES, de part et d'autre de la porte d'entrée, un oeil-de-boeuf. Les ouvertures ont des encadrements de granite au rez-de-chaussée, en calcaire à l'étage et au grenier. La façade postérieure est flanquée de deux tourelles à toit en pavillon. La façade sud du pavillon qui s'élève à l'extrémité du château présente trois travées. Les lucarnes de l'étage sous comble interrompent la corniche à modillons et le toit ; elles sont surmontées d'un fronton triangulaire dont le décor probablement refait au XIXe siècle. La façade ouest présente en particulier deux tours carrées à trois niveaux, le toit élevé est surmonté d'épis faîtiers. La tour centrale présente, sur sa face principale, une travée à trois niveaux. Les ouvertures sont en encadrement calcaire. La porte d'entrée, en anse de panier, est flanquée de pilastres supportant une corniche à larmier. Une fenêtre -ancienne porte- de la façade ouest du corps principal est du même style. Le pavillon de plan carré à un étage est couvert d'un toit en dôme dit à l'impériale. La façade présente au rez-de-chaussée des baies disposées en triplet ; la porte centrale à appareillage en bossage est surmontée d'un oculus. Malgré des remaniements, au dessus s'esquisse un fronton cintré. Au second niveau, la fenêtre est surmontée d'un fronton brisé à profondes moulures. Il est flanqué à l'est et à l'ouest de deux corps de bâtiments symétriques. Le pavillon présente une travée centrale dont la porte, à encadrement de granite, porte sur son linteau la date : 1670. la chapelle est de plan rectangulaire, presque carré. Les faces nord et sud sont percées de fenêtres en arc en plein cintre à encadrement calcaire. La porte d'entrée en plein cintre est flanquée de deux pilastres supportant un fronton calcaire ; celui-ci est percé d'une ouverture que ferme, à l'intérieur, un petit volet de bois ancien. A gauche de la porte, un bénitier de granite. inscription par arrêté du 23 janvier 2012.","habitants":"les onglées; Famille de Coniac                                                Boisseliere ;Famille de Jules de La Teillais\r\n        \r\n        \"","divers":"deux châteaux à Acigné; Boissellerie grav 1-2 et les Onglées grav-3-4-5.                                                                       Onglées GPS : 48° 07 29\" Nord, 1° 33' 13\" Ouest","gps":"48° 07 29\" Nord, 1° 33' 13\" Ouest","images":["../image/image_35/35_Acign%c3%a9_Ongl%c3%a9es_1.jpg","../image/image_35/35_Acign%c3%a9_Ongl%c3%a9es_2.jpg","../image/image_35/35_Acign%c3%a9_Ongl%c3%a9es_3.jpg","../image/image_35/35_Acign%c3%a9_Ongl%c3%a9es_4.jpg","../image/image_35/35_Acign%c3%a9_Ongl%c3%a9es_5.jpg"]},"Consult_chateau_formulairefab5":{"id":"Consult_chateau_formulairefab5","dept":"35","canton":"Le Rheu","commune":"Le Rheu","nom":"Apigné","type":"Manoir","periode":"XI-XVIII","histoire":"Deux châteaux à le Rheu; Apigné et la Freslonnière (voir article).                                                                              APIGNE, la famille Nové-Josserand qui possédait une briqueterie aux Landes dApigné commença la construction du château en 1833. Édifié dans un style néo-renaissance, il veille au cur dun parc de 25 hectares arboré et paysager.« La seigneurie dApigné, située sur la paroisse du Rheu, est très-ancienne. En 1268, Robert, seigneur dApigné, et Aurèle, sa femme, donnèrent à labbaye de Saint-Melaine de Rennes le lieu de la Boissardière, aujourdhui la Heuzardière, près de leur château dApigné. Mais les moines de Saint-Melaine cédèrent cette terre aux chanoines réguliers de Rillé, qui sy établirent. En 1790, le prieuré dApigné consistait en la chapelle de Saint-Roch et Saint-Mathurin ;  une petite métairie denviron 5 journaux de terre et 5 hommées de fauche ;  les deux tiers des dimes du trait dApigné, qui était le plus grand trait de la paroisse du Rheu ; deux autres petites dimes en Guichen ; une charretée de foin, etc. Le tout rapportait au prieur dApigné, abbé Amédée Guillotin de Corson, Pouillé historique de l'archevêché de Rennes. Ainsi, depuis 1990, le château d'Apigné a été rénové en hôtel 5 étoiles, mettant en avant la serre pour des réceptions de mariage aussi la rénovation et la mise en route de l'étang qui était asséché.","architecture":"APIGNE, le château est construit à une période ou lon tente de renouer avec les symboles aristocratiques mis à mal par la Révolution : les architectes prennent ainsi modèle sur les édifices du Moyen-Age, de la Renaissance, du style classique et du Grand Siècle et se constituent de nouveaux styles architecturaux que lon qualifie de néo. Inspiré de la première Renaissance française, les décors italiens sont appliqués à une structure gothique. Cest ce qui détermine cette demeure aux contours peu ordinaires et les tourelles symétriques lui confèrent ce caractère si particulier. Acquise en 1989 par la famille Khan-Renault, la propriété a été restaurée et transformée en lieux de réception et de réunion daffaires. Château-Hôtel.","habitants":"Famille Nové-Josserand\r\n        \"","divers":"châteaux à le Rheu; Apigné                                                           GPS : 48° 05' 53\" Nord, 1° 44' 51\" Ouest                                                        GPS : 48° 06' 07\" nord, 1° 47' 44\" Ouest","gps":"48° 05' 53\" Nord, 1° 44' 51\" Ouest","images":["../image/image_35/35_Apign%c3%a9_1.jpg","../image/image_35/35_Apign%c3%a9_2.jpg"]},"Consult_chateau_formulairecaa6":{"id":"Consult_chateau_formulairecaa6","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Argentré-du-Plessis","nom":"Argentré_Plessis","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Argentré du Plessis, Fauconnerie, les Hairies et du Pléssis.                                                                                                                          FAUCONNERIE, datant du XVIIIe siècle, le château a été remanié au XIXe siècle. Le grand corps de logis principal de plan allongé couvert d'une toiture à croupe est cantonné au nord-est d'une petite tour de plan carré avec un toit en pavillon. Les communs complètent  l'ensemble. Un cadran solaire est daté 1812, Parties constituantes : communs ; cour ; puits ; jardin ; verger ; chapelle. Dans cette commune d'Argentré-du-Plessis, au lieu-dit la Fauconnerie, se trouve également un manoir transformé en ferme, actuellement en résidence, qui peut avoir été le manoir primitif de la Fauconnerie. Le logis du XVIe siècle, restauré au XIXe siècle est composé d'un corps de passage de plan rectangulaire, disposant, accolée sur le mur nord, d'une grosse tour circulaire d'escalier hors-oeuvre, couverte d'un toit en poivrière.                                                              Des  HAIRIES, à Etrelles deux km à l'ouest  Le château des Hairies et ses communs ont été construits dans la deuxième moitié du XIXe siècle par l'architecte H. Mignan sur le site d'un ancien manoir partiellement conservé et rénové à l'est. Transformé en établissement religieux puis scolaire, il a été agrandi au milieu du XXe siècle ; le logis est aujourd'hui séparé de la propriété. Les remarquables communs exposent, suivant une tradition qui remonte au XVIIe siècle, les têtes des animaux qui trouvent là refuge. Ces ouvrages sont semblables à ceux en terre cuite qui s'exposent au château de la Bichetière dans la proche commune de Cornillé.","architecture":"PLESSIS;  la construction  du Plessis appartenait en 1513, à la famile Cojallu. Le château du Plessix, fut construit, en 1724, pour Gilles Gardinier,   Il s'agit d'un très grand château dont on peut repérer comme suit les différentes étapes de construction : le château ancien correspond à la base du pavillon nord, la moitié est du corps de logis principal et la tour ronde à l'angle sud-ouest. A la fin du XVIe siècle, début XVIIe siècle, le pavillon est augmenté en hauteur, et on lui fait un pendant au sud. Au même moment, un grand commun est construit au sud de la cour, à l'emplacement de l'aile en retour actuelle qui a réutilisée en partie ce bâtiment. Au début du XVIIIe siècle, on double le logis principal vers le jardin, et on procède à de nombreux réaménagements intérieurs. Vers 1840, le logis est rhabillé dans le style néo-renaissance; et vers 1870, on réaménage quelques pièces dans le logis principal en même temps qu'est reprise, agrandie, et complètement repensée l'aile en retour à l'extrémité de laquelle on fait une chapelle. Le décor intérieur se compose d'un ensemble de salles avec des boiseries du XVIIIe siècle et d'une salle de bal ornée de lambris moulurés et d'une voûte à caissons peints. Il faut remarquer la présence de beaux communs parmi lesquels on peut distinguer l'ancien chenil-logement du \"piqueux\" en forme de pagode chinoise aujourd'hui en ruine, était la  propriété du marquis Alain du Plessis d'Argentré. .   inscription  au M.H.par arrêté du 30 octobre 2000.","habitants":"Famille du Alain du Plessis d'Argentré\r\n        \"","divers":"Trois châteaux à Argentré du Plessis, Fauconnerie grav-1, les Hairies grav-6 et du Pléssis grav 2-3-4-5.                                                                Plessis GPS : 48° 03' 49\" Nord 1° 09' 40\" Ouest                                              Gps 48° 03' 26\" nord, 1° 09' 14\" ouest","gps":"48° 03' 49\" Nord 1° 09' 40\" Ouest","images":["../image/image_35/35_Argentr%c3%a9_Plessis_1.jpg","../image/image_35/35_Argentr%c3%a9_Plessis_2.jpg","../image/image_35/35_Argentr%c3%a9_Plessis_3.jpg","../image/image_35/35_Argentr%c3%a9_Plessis_4.jpg","../image/image_35/35_Argentr%c3%a9_Plessis_5.jpg","../image/image_35/35_Argentr%c3%a9_Plessis_6.jpg"]},"Consult_chateau_formulairec7f2":{"id":"Consult_chateau_formulairec7f2","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Availles sur Seiche","nom":"Availles_Seiche","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Availles sur Seiche; Fourneau et la Motte. FOURNEAU,   en 1538, le Fourneau était à Olivier de Grout ; ce fait est constaté par une inscription sur une petite cloche fondue à cette époque et conservé au musée de Vitré. Fourneau a été érigé en châtellenie en 1518, avec droit de haute-justice et droit de quintaine.   il appartient au début du XVe siècle à Tiphaine Du Guesclin, dame du Plessis-Bertrand, et passa en succession aux de Châteaubriand, seigneurs de Beaufort, qui l'avaient en 1427. Les de Villeblanche, seigneurs de Martigné Ferchaud, le possédèrent ensuite et le vendirent aux de Broons en 1496, ceux-ci le vendirent vers 1652 aux Grout seigneurs de la Corderie qui fondèrent l'hospice d'Availles en 1699. La chapelle conserve un autel aux armes de ces derniers. En 1763, ceux-ci le vendirent aux Rhuys d'Ambito. Il passa enfin par alliance vers 1770 aux Chauvel seigneurs de Teillay. Il relevait de la seigneurie de la Guerche-de-Bretagne.","architecture":"FOURNEAU  Le château de Fourneau, construction composée de deux bâtiments disposés en équerre, situé à l'est de la commune est un édifice élevé au XVe siècle et XVIe siècle. Il comprend une tourelle octogonale, un pavillon à l'ouest et une chapelle à l'est. Il conserve également un colombier, comprenant une tourelle octogonale et une porte en accolade. A l'ouest du bâtiment principal se trouve un pavillon et à l'est une chapelle munie d'une porte sommée d'un petit campanile octogonal avec un toit en dôme. Deux bâtiments avec gerbières s'étendaient à l'est et à l'ouest, dont il reste une porte avec fronton triangulaire à deux pilastres et un vantail avec de grosses moulures.                                                                                                       La MOTTE à Gennes sur Seiche cinq Km au sud -Est  située au sud du canton d'Argentré-du-Plessis, limitée par la Seiche séparant, au bas du bourg, l'ancienne province de Bretagne de celle d'Anjou, la commune de Gennes-sur-Seiche présente un patrimoine architectural varié. Le village réunit des habitats des notables héritiers des administrations d'Ancien Régime, comme la seigneurie de la Motte. Selon toute vraisemblance, la toponymie est sans ambiguïté. Le château du XVIe siècle remanié en limite du XVIIe siècle et du XVIIIe siècle succède à une motte médiévale. A corps central de plan allongé, il est flanqué de deux pavillons et de deux tours circulaires. La chapelle, selon Guillotin de Corson, se trouvait dans le grand logis. Le pigeonnier figuré sur le cadastre de 1810 existe encore, au contraire du moulin à vent mentionné sur le même document. Une clôture de jardin porte un écu daté 1906. Il fut au début du XXe siècle la propriété des Soeurs de la Visitiation Sainte-Marie.","habitants":"Fourneau, Famille de  Tiphaine Du Guesclin                            La Motte ; Famille de la Motte\r\n        \r\n        \r\n        \"","divers":"Deux châteaux à Availles sur Seiche; Fourneau grav 3-4 et la Motte grav 1-2. Availles-Gennes 47° 59' 19\" nord, 1° 07' 25\" ouest","gps":"","images":["../image/image_35/35_Availles_S%c3%a9iche_1.jpg","../image/image_35/35_Availles_S%c3%a9iche_2.jpg","../image/image_35/35_Availles_S%c3%a9iche_3.jpg","../image/image_35/35_Availles_S%c3%a9iche_4.jpg"]},"Consult_chateau_formulaire8c27":{"id":"Consult_chateau_formulaire8c27","dept":"35","canton":"Dol-de-Bretagne","commune":"Baguer-Morvan","nom":"Baguer_Morvan","type":"Château","periode":"XV-XVI-XVII-XIX-","histoire":"Cinq châteaux à Baguer; Assis, Haute-Dibois, Beauregard, Launay-Blot et Touraude.                                                                                           ASSIS, date du XIXe siècle. Le château d'Assis a été édifié sur l'emplacement d'un ancien château de même nom. Il fut la propriété successive des familles Boutier ou Bouttier (en 1360 et en 1428), Le Scauff (en 1480), de Lestang (en 1513), Louis sieurs de Monteclert (en 1716), puis de la famille Locquet sieurs de la Chardonnière, en 1735. C'est devenu le Gite Ti Braz.                                                           HAUTE DIBOIS, construit à partir de 1894 par l'architecte rennais Jean Marie Laloy pour M. de Miniac. Les travaux se sont poursuivis jusqu'en 1897. Le château peut apparaître comme le premier d'une suite d'édifices réalisés par Jean Marie Laloy dans le style gothique flamboyant, l'hôtel le Chapelier (1898) à Rennes rue de Viarmes et le château de Kerriou en Gouézec (1906). Le château de la Haute Dibois, de plan massé, est composé d'un corps de logis augmenté de plusieurs corps et pavillons secondaires. La façade principale est animée d'une échauguette sur l'angle, une série de décrochements, une tourelle de plan carré hors-oeuvre abritant le porche d'entrée et par un escalier extérieur.  Le bâtiment comporte un rez-de-chaussée surélevé, un étage carré et un étage de comble. Maçonnerie en moellon de granite avec soubassement, bandeaux horizontaux, encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille.","architecture":"BEAUREGARD, date du XV au XVIe siècle, a été édifié par Guillaume Le Voyer, scholastique de Dol. On y aperçoit ses tours carrées. Il possédait jadis une chapelle privée et dédiée à Sainte-Barbe. François Le Lièvre, Seigneur de Beauregard, et Catherine Crosnier, sa femme, fondèrent cette chapelle le 10 octobre 1699 et s'en réservèrent la présentation. Le premier chapelain du château de Beauregard fut Jean-Baptiste Le Lièvre, décédé vers 1709. Il fut remplacé le 16 janvier 1710 par Jean Le Mardelé. Le dernier fut Julien Jouye, en 1789  (Pouillé de Rennes). La propriété de la Famille le Lièvre date du XVIIe siècle. \r\nLAUNAY-BLOT, sa construction appelée la Malouinière de Launay-Blot date du XVIIe siècle. Proche de Dol-de-Bretagne, le château de Launay-Blot est entouré d'un jardin privé, en bordure du canal. Le Manoir de Launay-Blot est la propriété de la Famille Boutier ou Bouttier en 1480 (Rolland Boutier) puis, en 1513, de la Famille Locquet, sieurs de la Chardonnière au milieu du XVIIe siècle. Il fut occupé par Michel Locquet durant la Révolution.                                                                                   TOURAUDE, le vieux manoir de Touraude, en 1513 à Amaury de la Moussaye, devint ensuite la propriété de la famille de Gouyon. Charles Gouyon, en 1652 et, Nicolas Gouyon, en 1682, furent ensuite les seigneurs de Touraude. A une époque reculée, une chapelle fut bâtie au coin du jardin du manoir, mais en 1723, il n'en restait plus que les ruines du pignon avec la porte et une fenêtre au-dessus, et en 1741 il ne s'y trouvait plus qu'un vieux chêne. Le seigneur de Touraude, qui avait acheté, en 1675, la terre de Beaufort, en Plerguer, fit, en 1723, desservir dans la chapelle de ce dernier manoir, toutes les messes fondées dans celle de Touraude. Le Manoir de la Touraude fut ensuite transmis, en 1513, à la famille de la Moussaye, puis en 1652, à la Famille de Gouyon.","habitants":"Assis;   Famille Boutier                                                           Haute Dibois Famille de M. de Miniac                    Beauregard; Famille le Lièvre                                          Launay-Blot.Famille Boutier                                                     Touraude; Famille de Gouyon\r\n        \"","divers":"Cinq châteaux à Baguer; Assis grav-2, Haute-Dibois Grav  5-6, Beauregard grav 3-4, Launay-Blot et Touraude grav-7. Halouze grav-8                                                           Beauregard GPS : 48° 31' 30\" Nord, 1° 46\" 26\" Ouest                                       Launay-Blot grav-1GPS : 48° 31' 30\" Nord, 1° 46' 26\" Ouest                                        Touraude GPS : 48° 31' 30\" Nord, 1° 46' 26\" Ouest","gps":"48° 31' 30\" Nord, 1° 46\" 26\" Ouest","images":["../image/image_35/35_Baguer_Morvan_1.jpg","../image/image_35/35_Baguer_Morvan_2.jpg","../image/image_35/35_Baguer_Morvan_3.jpg","../image/image_35/35_Baguer_Morvan_4.jpg","../image/image_35/35_Baguer_Morvan_5.jpg","../image/image_35/35_Baguer_Morvan_6.jpg","../image/image_35/35_Baguer_Morvan_7.jpg","../image/image_35/35_Baguer_Morvan_8.jpg"]},"Consult_chateau_formulairee9ef":{"id":"Consult_chateau_formulairee9ef","dept":"35","canton":"Bain de Bretagne","commune":"Bain de Bretagne","nom":"Bain_Bretagne_II","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article, Robinais et Pomméniac.                    ROBINAIS, situé sur une des plus anciennes terres nobles de la commune de Bain-de-Bretagne, se présente comme un bâtiment composite, résultat d'au moins trois campagnes de construction. Du premier manoir, construit à l'époque médiévale, rien ne subsiste, excepté peut-être la porte en arc brisé de la cave. La tour d'escalier et les pavillons du logis remontent à la seconde moitié du XVIe siècle. Les deux pavillons situés au sud datent des années 1660, de même peut-être que la façade sud du logis. Toute la moitié ouest du château est une adjonction de la fin du XVIIIe siècle. De l'important ensemble de bâtiments fermés par une cour qui existaient au XVIIe siècle ne subsistent aujourd'hui que les pavillons, un peu défigurés, et le colombier transformé en chapelle. L'aspect de l'édifice trahit son histoire compliquée : si la façade sud conserve une harmonie assez classique, malgré la différence de rythme dans les travées perceptible entre la partie ouest et la partie est, le pignon Est et une partie de la façade nord conservant le témoignage de l'édifice antérieur. Le château de la Robinais est en définitive remarquable, moins par la qualité de son architecture, sobre et sans grande recherche, que par le témoignage qu'il porte sur l'évolution de cette architecture il se rattache à la fois à l'architecture manoriale de la seconde moitié du XVIe siècle (manoir de la Fresnais, manoir de la Noé en Ercé en Lamée) , et d'autres part aux grandes constructions des XVIIe et XVIIIe siècles. inscription au M.H.  par arrêté du 23 décembre 1992. M. et Mme de Coniac.","architecture":"POMMENIAC, le château de Pomméniac ou Pontméniac  du XVII-XVIIIe siècle. Pomméniac est mentionné dès le XIe siècle. En 1427, l'Hostel de Pomménial est propriété d'Alain de Messac. Ce château reste la propriété de la famille Messac jusqu'au milieu du XVIe siècle. Il passe ensuite successivement entre les mains de Jean de Neufville (en 1559), Bernard de Manneville (en 1570), Jean du Fresne, seigneur de Saint-Gilles, Lézot (en 1692), Martel (en 1721), Caradeuc et Carron (en 1823), Jourdan (en 1836), marquis d'Andigné, Madame Texier de Cohignon. Le château brûle partiellement entre 1627 et 1634. Il possédait jadis un droit de haute justice et une fuie, et relevait de la seigneurie de Boeuvres, en Messac. On y trouvait autrefois une chapelle (XVIIème siècle) dédiée à Notre-Dame de Liesse et à Saint-Louis, édifiée par Roch Lézot gouverneur de Châteaubriand en 1598. En effet, au milieu du XVIIe siècle, Roch Lezot et Noëlle de la Corbinière, seigneur et dame de la Ville-Geffroy et de Pontméniac, firent construire près de leur manoir de Pontméniac une chapelle en l'honneur de Notre-Dame de Liesse et de saint Louis ; ils la firent desservir, mais ne la dotèrent point, de sorte que Mgr de la Vieuville la fit interdire. Ce que voyant, leur fille Claude Lezot y fonda une messe tous les dimanches et fêtes de l'année, et avec l'assentiment d'Eusèbe Lezot, seigneur de Vaurozé, son neveu, elle affecta au traitement du chapelain la métairie de la Follaye, en Bain-de-Bretagne. Cette fondation fut faite le 21 janvier 1678. Charles de Martel, seigneur de Pontméniac, présenta en 1766 Marc-François Michau d'Arbouville, clerc de Chartres, pour desservir la chapelle de Pontméniac, dont le titulaire, René Pelletier, venait de mourir (Pouillé de Rennes).","habitants":"Robinais: M. et Mme de Coniac                                  Pomméniac ; Famille Messac\r\n        \"","divers":"Deux châteaux à Bain de Bretagne Robinais grav-1-2 et Pomméniac grav-3.                                                                                  GPS : 47° 50' 26\" Nord, 1° 37' 31\" Ouest","gps":"47° 50' 26\" Nord, 1° 37' 31\" Ouest","images":["../image/image_35/35_Bain_Bretagne_II_1.jpg","../image/image_35/35_Bain_Bretagne_II_2.jpg","../image/image_35/35_Bain_Bretagne_II_3.jpg"]},"Consult_chateau_formulaireb3f0":{"id":"Consult_chateau_formulaireb3f0","dept":"35","canton":"Bain de Bretagne","commune":"Bain de Bretagne","nom":"Bain_de_Bretagne","type":"Château","periode":"XIX","histoire":"Trois châteaux à Bain de Bretagne; Borgnère et Noé-St-Yve Robinais (voir article).                                                                                        BORGNERE; est un des exemples les plus intéressants des constructions civiles du XIXe siècle . Un deuxième élément réduit cette homogénéité ; il s'agit de l'utilisation des matériaux : le granite et le tuffeau importés rivalisent avec le schiste gris-vert local de façon incohérente en particulier dans la façade nord où l'on trouve le tuffeau dans les ouvertures, les lucarnes et la corniche, le schiste dans le bandeau, les chaînages d'angle et le soubassement ouest et le granit dans le soubassement Est. Le château moderne de la Borgnière a été construit dans le deuxième quart du XIXe siècle à côté de l'ancien manoir ; ce dernier serait l'actuelle ferme de la Basse Borgnère,  à l'est du logis. Bâtiment composé d'un corps central rectangulaire de trois travées, accosté de deux corps latéraux en faible ressaut d'une travée chacun, suivant un plan en H ; l'édifice comporte un rez-de-chaussée surélevé au-dessus d'un sous-sol, un étage carré et un étage de comble éclairé de lucarne sur les travées impaires. Les murs de moellons sont enduits ; la pierre de taille  est utilisée au niveau du soubassement, des encadrements de baies, d'un bandeau horizontal, de la corniche et des chaînes d'angle. Les ouvertures sont en plein-cintre au rez-de-chaussée, rectangulaires au premier étage. Le toit à faible pente est couvert d'ardoise. Distribution intérieure : un vestibule axial, accessible depuis les perrons nord et sud, distribue les pièces du rez-de-chaussée  et abrite l'escalier à volée tournante menant aux étages. Les chambres du 1er sont distribué à partie d'un couloir longitudinal et de petits couloirs dans les ailes.","architecture":"NOE ST-YVE,   n'est jamais citée parmi les terres ou les maisons nobles de Bain, mais les registres paroissiaux nous apprennent l'existence de quelques sires de la Noë. Rulon, originaire de Bain, décrit l'ancien manoir : c'était une maison sans prétention comme beaucoup de gentihommiéres bretonnes et avait étage, jardin muré, bosquet d'arbres pour l'encadrer, ferme attenante, avec cour et vastes prairies. En 1837, Joseph Guillotin de Corson achète les terres et le vieux manoir de la Noë, attesté depuis le XVIe siècle et y construit un château en 1860 (datation à vérifier) \"près de l'ancien manoir ou sur son emplacement\". La construction pourrait être attribuée à l'architecte Jacques Mellet par analyse stylistique. Son fils Amédée entre au séminaire en 1856. Chapelle construite en 1860 d'après une carte postale ancienne. Bâtiment composé d'un corps principal rectangulaire encadré de deux pavillons en retrait sur la façade principale mais alignés sur la façade postérieure, et de deux corps couverts en terrasse disposés dans les angles. Le corps central est accosté, au sud, de deux tourelles de plan circulaire formant châtelet, et au nord d'une tourelle d'escalier polygonale. Les murs sont enduits, les encadrements de baies, réseaux et la corniche sont en pierre de taille de tuffeau, les chaînes d'angle et encadrements du premier niveau en schiste vert. Les ouvertures sont disposées en travées régulières sur trois niveaux au sud, quatre au nord. La travée axiale sud est composée d'une porte en arc brisée précédée d'un perron, d'une grande baie à balcon orné de mouchettes et de faux mâchicoulis. La corniche à modillons est interrompue par des lucarnes à gâbles. Les hautes toitures des corps principaux et les toits en poivrière des tours sont couverts d'ardoise ; la tour d'escalier est sommée d'un lanternon.","habitants":"Noé Famille de Joseph Guillotin \r\n        \"","divers":"deux châteaux à Bain de Bretagne; Borgnère grav-4 et Noé-St-Yve grav 1-2-3                                                                Bain 47° 50' 35\" nord, 1° 40' 50\" ouest","gps":"","images":["../image/image_35/35_Bain_de_Bretagne_1.jpg","../image/image_35/35_Bain_de_Bretagne_2.jpg","../image/image_35/35_Bain_de_Bretagne_3.jpg","../image/image_35/35_Bain_de_Bretagne_4.jpg"]},"Consult_chateau_formulaire665f":{"id":"Consult_chateau_formulaire665f","dept":"35","canton":"Redon","commune":"Bains-sur-Oust","nom":"Bains_sur_Oust","type":"Château","periode":"XV-XVI-XIX","histoire":"quatre châteaux à Bains sur Oust. Chambots, Plessis, Rouardrais et Trecouet.                                                                                              CHAMBOTS  Les Chambots sont une ancienne dépendance du château de la Rouardais située à quelques centaines de mètres à l'ouest. Ils font partie des 14 lieux nobles sur la commune mentionnés par Paul Banéat. Le manoir est connu dans les textes dès 1440. En 1586, il appartient aux De Fescan. En 1715, il est la propriété de Henriette de Saint Marcel, veuve de Joseph Quélo. L'édifice aurait été restauré au XVIIe siècle avant d'être agrandi au XIXe siècle, époque à laquelle il passe aux mains de la famille Pioger. Le château possède une intéressante ferme modèle construite vers 1910-1920.                                                                                                          PLESSIS     Situé à peu de distance au sud du bourg de Bains-sur-Oust, le domaine du Plessis est l'un des 14 lieux nobles mentionnés par Paul Banéat sur cette commune. Il appartenait autrefois à l'abbaye de Redon. Le château du Plessis, une \"maison de campagne assez jolie\" (dictionnaire de la province de Bretagne), est implanté au centre d'un vaste parc terminé à l'ouest par les bâtiments d'une importante ferme aujourd'hui transformée en logements.","architecture":"ROUARDAIS, l'ancien manoir n'existe plus aujourd'hui. Sa fuie et sa chapelle ont également disparu. Il appartenait aux De L'Hôpital au XVe siècle et en 1662. Il fut la propriété des Lévesque avant de passer aux mains des Gastechair puis des Cosset au début du XVIIIe siècle. Le château actuel fut bâti vers 1850, par Jacques Mellet. La façade nord de style Renaissance, avec ses lucarnes, ses baies géminées et ses pilastres est plus ornée que la façade sud, sur laquelle se fait l'arrivée à la propriété : la recherche de raffinement est limitée à la sphère privée. Le petit corps de bâtiment Est a été ajouté dans la seconde moitié du XXe siècle pour y installer les cuisines, autrefois situées en niveau de soubassement. Le cadastre de 1847 présente les restes de douves au nord-est du château actuel. Elles existent toujours, ainsi que la tourelle figurée à l'angle nord-ouest. Au sud de ces douves, les bâtiments de l'exploitation agricole ont été très remaniés. Il subsiste un intéressant bâtiment de plan carré, couvert en pavillon.                                                                                                                     TRECOUET, le domaine du Trécouët est l'un des 14 lieux nobles mentionnés par Paul Banéat sur la commune. L'ancien manoir a été propriété successive des familles Raoullet Jacques en 1464, du Fresnay en 1536, suite au mariage de Marguerite Jacques, fille de Vincent Jacques, avec Jehan du Fresnay, de la Haye en 1653. Propriété en 1878 de M. Bouchet, le château a été construit dans la deuxième moitié du XIXe siècle sur le fond de l'ancien manoir dont il subsiste des vestiges du XVIe siècle dans l'aile séparant le château de la cour de ferme.","habitants":"Chambots; Famille De Fescan.                                  Trécouet; Famille Raoullet                            \r\n        \"","divers":"quatre châteaux à Bains sur Oust. Chambots, Plessis, Rouardrais  grav-1 et Trecouet grav_2. Giraudais grav_3_4.                                                       Gps 47° 42' 16? nord, 2° 04' 13? ouest","gps":"","images":["../image/image_35/35_Bains_sur_Oust_1.jpg","../image/image_35/35_Bains_sur_Oust_2.jpg","../image/image_35/35_Bains_sur_Oust_3.jpg","../image/image_35/35_Bains_sur_Oust_4.jpg"]},"Consult_chateau_formulaireb701":{"id":"Consult_chateau_formulaireb701","dept":"35","canton":"Val-Couesnon","commune":"Bazouges la Pérouse","nom":"Bazouges_Pérouse","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Bazouges la Pérouse; la Ballue et Boutlande.                                                                           La BALLUE,   dès le XIIe siècle, les Chesnel sont les seigneurs . La terre fut rachetée en 1620 par Gilles Ruellan, qui fit construire le château actuel,  puis passa à son fils  et en héritage à Marie Ruellan  qui épouse en troisièmes noces Hyacinthe de Quatrebarbes marquis de la Rongère, le domaine revient aux Ruellan , A l'ouest, un bois mène à l'étang de la Ballue. Les jardins ont été recréés à partir de 1973 : un jardin à la française par François Hébert-Stevens de 1973 à 1977, et un jardin en diagonale par Paul Maymond en 1975, avec présence de salles de verdures cernées par des murs végétaux.  L'ancienne orangerie a été construite vers le milieu du XIXe siècle ; c'est actuellement une salle d'exposition sur l'art des jardins, en 1792 le dernier marquis de la Ballue émigre, vendu comme bien national  à connu divers propriétaires acquis par l'éditeur Claude Arthaud  qui est à l'origine de la création en 1973 des jardins labyrinthiques, et en 1996 le domaine est acquis par Marie-France Barrière et Alain Schrotter, aujourd'hui un gîte d'hôtes, de Mme Mathot-Mathon.                                                                                    BOUTLANDE, mentionné depuis le XIIe siècle a été reconstruit dans la deuxième moitié du XIXe siècle. Le premier manoir appartenait aux de Bourlande en 1180 et en 1459, aux Couaisnon sieurs du Breil-Manfany en 1513, et passa par alliance en 1569 aux de Vauborel qui l'avaient encore en 1627, il était aux de Ruellan seigneurs de la Ballue en 1688, et était encore aux mains des seigneurs de la Ballue en 1789.","architecture":"La BALLUE, il est constitué d'un corps de logis flanqué de deux ailes en retour. Plusieurs pièces ont conservé des boiseries du XVIIIe siècle. Le château a été réutilisé en verrerie au XIXe siècle. L'ancienne orangerie a été bâtie vers le milieu du XIXe siècle. Des communs Nord subsistent l'ancienne écurie et la tour de l'horloge. Le château, pur joyau du XVIIe siècle, serti dans son écrin de verdure na cessé, depuis le XIXe siècle, dêtre lié à notre littérature, mais ce sont surtout les peintres qui lui ont donné son image contemporaine. Ses jardins redessinés et réinterprétés, merveille de dépaysement et dintelligence, retrouvent aujourdhui leur nature dorigine, succession de jeux dombres et de lumière, inspirée du XVIIe siècle. Des communs Nord subsistent l'ancienne écurie et la tour de l'horloge.  A l'ouest, un bois mène à l'étang de la Ballue. Des communs nord, subsistent l'ancienne grande écurie et la tour de l'horloge.    Des communs nord, subsistent l'ancienne grande écurie et la tour de l'horloge. Des communs Est, sont conservés le cellier, les deux remises et le passage central.   Éléments protégés MH : le logis en totalité, inscription aux M.H. par arrêté du 11 juin 1999.                                                                                                             BOUTLANDE, bâtiment de plan régulier composé d'un corps central rectangulaire flanqué de deux ailes perpendiculaires en légère saillie sur les façades. Élévation en schiste avec granite en pierre de taille pour le soubassement, les chaînes d'angle, les encadrements de baies et les lucarnes. Les façades sont ordonnancées en travées régulières, trois sur le corps central, deux jumelées sur chaque pavillon ; la travée centrale, marqué par un balcon de ferronnerie au premier étage, et les travées jumelées sont surmontées d'un fronton cintré interrompu par une lucarne. Les toitures sont en croupe, individualisée sur chaque corps, et couvertes d'ardoise.","habitants":"Ballue; Famille de  Gilles Ruellan                                 Boutlande; Famille de Ruellan\r\n        \"","divers":"Deux châteaux à Bazouges la Pérouse; la Ballue grav 1-2-3-4  et Boutlande grav 5-6.                                                                    GPS : 48° 26' 35\" Nord, 1° 32' 18\" Ouest","gps":"48° 26' 35\" Nord, 1° 32' 18\" Ouest","images":["../image/image_35/35_Bazouges_P%c3%a9rouse_1.jpg","../image/image_35/35_Bazouges_P%c3%a9rouse_2.jpg","../image/image_35/35_Bazouges_P%c3%a9rouse_3.jpg","../image/image_35/35_Bazouges_P%c3%a9rouse_4.jpg","../image/image_35/35_Bazouges_P%c3%a9rouse_5.jpg","../image/image_35/35_Bazouges_P%c3%a9rouse_6.jpg"]},"Consult_chateau_formulairea198":{"id":"Consult_chateau_formulairea198","dept":"35","canton":"Dol-de-Bretagne","commune":"Plerguer","nom":"Beaufort_35","type":"Château","periode":"XII-XIX","histoire":"BEAUFORT, le château de Beaufort domine le grand étang du même nom, qui alimente en eau, lagglomération de Saint-Malo. Sa construction date du XIIe au XIXe siècle. Le Château de Beaufort se situe dans un joli site de bois et de vallons. Le lieu est aujourdhui connu, pour la communauté des Moniales Dominicaines qui y réside et les rassemblements qui sy déroulent. Ce que lon sait beaucoup moins, cest que le château de Beaufort a tenu un rôle essentiel au sein du protestantisme autrefois. Un petit rappel pour commencer : Il y avait là une modeste place forte à la fin du Moyen Age, sous la forme dun grand donjon rectangulaire qui commandait la route menant à Saint-Malo en longeant la Rance. Il faisait pendant à la forteresse de Châteauneuf, également à louest, et à celle du Plessis-Bertrand, à lest, en direction de Cancale et Pontorson. Très naturellement, ces seigneuries aboutirent à la fin du Moyen Age, entre les mains dune même famille, les Chateaubriand, lointains aïeux du célèbre Vicomte. Conformément aux usages bretons, laîné, Christophe, résidait au Plessis-Bertrand, en Saint-Coulomb, tandis que son cadet, Briand, disposait de lusufruit de la seigneurie de Beaufort. Au XVIIe siècle, la seigneurie de Beaufort passa à une branche cadette des barons de La Moussaye.","architecture":"BEAUFORT, un manoir neuf succéda au donjon démoli. Le Seigneur de Touraude ne put jouir longtemps du domaine de Beaufort, car il décéda en mars 1676. De nouveaux travaux furent réalisés entre 1895 et 1897 par Rochard, entrepreneur d'après des plans réalisés par l'architecte Martenot. En prolongeant les second et troisième étages de l'aile Ouest et en raccourcissant l'aile Sud qui sera terminée par un pavillon. La partie de l'aile sud fut reprise pour en faire un lieu d'habitation, plus conforme aux normes de l'époque. Une chapelle intérieure a été desservie dans le nouveau château jusqu'à nos jours. Les jardins à la Française furent créés à la fin du XVIIIe siècle, et au début du XIXe siècle, à l'Est du château.","habitants":"Famille de  Chateaubriand\r\n        \"","divers":"A Plerguer château de Beaufort GPS : 48° 30' 14\" Nord, 1° 49' 04\" Ouest","gps":"48° 30' 14\" Nord, 1° 49' 04\" Ouest","images":["../image/image_35/35_Beaufort_35_1.jpg"]},"Consult_chateau_formulaire0486":{"id":"Consult_chateau_formulaire0486","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Le Pertre","nom":"Bel_Air_35","type":"Château","periode":"XIX","histoire":"BEL-AIR , le château, commandé par Louis de Legge, a été bâti en deux campagnes. Le premier édifice, de style néo-gothique, a été élevé de 1870 à 1873 par l'architecte Jacques Mellet. Jugé trop modeste par Paul de Legge. La construction de 1870 a été prolongée vers le nord et l'ouest, le château a été reconstruit par Henri Mellet, de 1910 à 1920. Cette propriété appartient depuis deux siècles à la famille De Legge de Kerléan qui l'habite toujours.","architecture":"BEL-AIR, la construction du château de Bel-Air date de 1870 à 1873, pour Jacques Mellet. Le château, commandé par Louis de Legge, a été construit en deux campagnes, en 1870. Le premier édifice, de style néo-gothique, a été réalisé de 1870 à 1873 par l'architecte Jacques Mellet. Jugé trop modeste par Paul de Legge.  La construction de 1870 a été prolongée vers le Nord et l'Ouest, créant un plan à 2 ailes disposées à 135° et articulées autour d'un pavillon carré. Le style Louis XIII a été adopté. Le château de Bel-Air comporte un jardin à la Française. Château de type complexe, construction entièrement en granite. Le gros-oeuvre est en petit appareil. Les toits présentent des formes variées : toit à longs pans et croupe, toit en pavillon et toit conique. Ardoise en forme d'écailles. Peu de modénatures en dehors de la chapelle et des blasons armoriés. Eléments protégés MH : le château en totalité, le parc en totalité avec son jardin à la française, sa statuaire, son potager, son bois, son étang et le tracé des avenues, les façades et les toitures de la maison du gardien, de l'ancien manoir rebaptisé \"Guinefol\", de la porterie, des anciens communs, de l'horloge et du puits : inscription par arrêté du 26 février 2001.","habitants":"Famille de Louis de Legge\r\n        \"","divers":"A le Pertre château de Bel-Air.                                                    GPS : 48° 02' 20\" Nord, 1° 02' 37\" Ouest","gps":"48° 02' 20\" Nord, 1° 02' 37\" Ouest","images":["../image/image_35/35_Bel_Air_35_1.jpg","../image/image_35/35_Bel_Air_35_2.jpg","../image/image_35/35_Bel_Air_35_3.jpg","../image/image_35/35_Bel_Air_35_4.jpg","../image/image_35/35_Bel_Air_35_5.jpg"]},"Consult_chateau_formulairefbd0":{"id":"Consult_chateau_formulairefbd0","dept":"35","canton":"Saint-Malo","commune":"La Vicomté sur Rance","nom":"Bellière_35","type":"Château","periode":"XV","histoire":"BELLIERE, en effet, l'histoire de cette demeure retient essentiellement que Tiphaine Raguenel naquit ici, fille de Jeanne de Dinan vicomtesse de La Bellière, héritière du château, et de Robin Raguenel seigneur de Châteloger. Selon certains historiens, c'est ici même, dans la chapelle du château qu'elle épousa Bertrand Duguesclin en 1360. Morte en 1372 à l'age de 33 ans, son coeur fut inhumé dans la chapelle des Jacobins à Dinan ; celui de son époux vint l'y rejoindre en 1380. Ils furent transférés en 1810 en l'église St-Sauveur. Une lignée de \"Jean\" qui porteront pour l'histoire les particules 1, 2 et 3 seront les héritiers successifs du château, ajoutant au titre de vicomté de la Bellière celui de Malestroit. Le dernier des Jean décèdera le 24 décembre 1471, laissant deux héritières, Jeanne Raguenel et Françoise Raguenel dite de Malestroit. En 1767, le château entrera dans le patrimoine de la famille Collin de Boishamon qui ajoutera dès lors le titre de la propriété à son nom.","architecture":"BELLIERE à l'origine, le château fut conçu comme une place forte, quoique n'ayant aucune vocation militaire, (les murs extérieurs ont une épaisseur de 1,50 m à la base, s'affinant jusqu'à 80 cm à leur sommet) et entouré de douves. Il ne subsiste de ces dernières que 3 étangs, dont l'étang principal dans lequel se mire aujourd'hui la façade arrière de la bâtisse.\r\nA cette époque, elle ne comportait qu'un bâtiment rectangulaire flanqué d'une tour abritant l'escalier à vis. On y entrait en empruntant une triple allée bordée de chênes sur près d'une lieue aboutissant à la petite route reliant le village à celui de Pleudihen, près du lieu-dit \"La Ville Bénefray\".\r\nCette allée monumentale a aujourd'hui presque entièrement disparu et il n'en reste qu'une centaine de mètres de voie, dans l'enceinte de la propriété. Constituée d'une allée piétonnière, une cavalière et une carrossable, elle aboutissait à l'entrée originelle du château.Si la façade avant est tout en lignes droites, ponctuée par un bâtiment bas en accolade qui ne fut construit qu'au XIVe siècle, l'arrière est quelque peu adouci par la haute tour abritant l'escalier à vis desservant les étages. Edifiée en plan octogonal (comme les cheminées !) jusqu'au deuxième étage, elle est rehaussée d'une rotonde à l'allure de tour de guet. Elle rappelle par un détail que cette bâtisse avait jadis une allure de place-forte : les meurtrières. Celles-ci ont progressivement disparu des autres parties du château au profit d'ouvertures plus grandes, de fenêtres permettant d'ajouter au confort de ce qui devint par la suite une demeure cossue à l'usage de gens fortunés.","habitants":"Famille de Collin de Boishamon \r\n        \"","divers":"A la Vicomté sur Rance château de Bellière","gps":"","images":["../image/image_35/35_Belli%c3%a8re_35_1.jpg","../image/image_35/35_Belli%c3%a8re_35_2.jpg"]},"Consult_chateau_formulaire0784":{"id":"Consult_chateau_formulaire0784","dept":"35","canton":"Vitré","commune":"Cornillé","nom":"Bichetière","type":"Château","periode":"XIX","histoire":"BICHETIERE, lancien manoir appartenait à la famille de Cornillé en 1373. Le manoir de la Bichetière, en 1427, avait pour propriétaire Jehan de Cornillé et en 1513, Pierre de Cornillé. Cette famille tirait son nom de la paroisse de Cornillé dont elle avait possédé la seigneurie à l'origine. En 1649, le propriétaire, Nicolas Guillaudeu, seigneur de la Bichetière, était prêtre. La chapelle fut fondée en 1659, puis reprise au XIXe siècle. Le domaine fut successivement la propriété des familles Kermenguy au XVIe siècle, Guéhéneuc, Lombart en 1600, Guillaudeu, sieurs de la Villemorel en 1606, Artur, sieurs de la Motte en 1658, Guillaudeu, sieurs de la Matillonnaye en 1666, Courtois, sieurs de la Ville-Ascelin en 1689, Fournier, sieurs de la Chasteigneraye en 1770,  fut construit, en 1857, pour Waldeck Le Moine de la Borderie, frère de l'historien Arthur Le Moine de la Borderie, par l'architecte Jacques Mellet.","architecture":"BICHETIERIE, construit en 1860 par l'architecte rennais Jacques Mellet. château de plan massé à deux tours, en moellon de schiste enduit et baies en calcaire sculpté. Biche au-dessus de la porte d'entrée. Symétrie de composition général de toutes les dépendances: remise à voiture et salle de billard au-dessus, chenil et bergerie, buanderie et bûcher, a été construit en 1860.  Bichetière ou Bicheptière, petit château à redents, pans coupés et tours d'angle, La façade d'entrée présente un fin décor style Renaissance, sur le thème des travaux des champs et de la chasse. Au-dessus d'un cartouche avec les initiales W. B. du commanditaire, une biche au repos en demi-relief. La façade nord donne sur trois corps de bâtiments séparés disposés en arc de cercle.","habitants":"Famille de Jehan de Cornillé.                                                                                            pour le moine Waldeck de la Borderie\r\n        \r\n        \"","divers":"A Cornillé château de Bichetière GPS : 48° 04' 49\" Nord 1° 18' 25\" Ouest","gps":"48° 04' 49\" Nord 1° 18' 25\" Ouest","images":["../image/image_35/35_Bicheti%c3%a8re_1.jpg","../image/image_35/35_Bicheti%c3%a8re_2.jpg"]},"Consult_chateau_formulaireb191":{"id":"Consult_chateau_formulaireb191","dept":"35","canton":"Val-Couesnon","commune":"Val de Couesnon","nom":"Blosses","type":"Château","periode":"XIX","histoire":"BLOSSES, le château des Blosses a été édifié dans le dernier quart du XIXe siècle par Madame Edouard Barbier, fille de lacadémicien Saint-Marc Girardin sur des terres du domaine de la Rouërie dont ses beaux-parents étaient propriétaires. Larchitecte Weyland, connu pour avoir également uvré à Rennes et Dinard, fut chargé du projet et le château fut construit par l'entreprise rennaise. La forte homogénéité de lensemble nest pas sans lien avec la faible durée du chantier qui sétala sur cinq ans (1885-1890).   Le Château des Blosses, au XIXe siècle, est localisé à quelques centaines de mètres au sud et appartient à la même famille. Il se trouve au Nord-Est de l'Ille-et-Vilaine et au Nord de Saint-Ouen-la-Rouërie.  La Famille Barbier du Mans de Chalais est actuellement propriétaire du château, depuis 1822, par acquisition de la famille du Pré de Saint-Maur. Il est inscrit aux M.H. depuis le 7/08/1996.","architecture":"BLOSSES, fortement inspiré par larchitecture Louis XIII qui rappelle une période faste de la monarchie, le château des Blosses est composé dun ensemble de bâtiments dont le complexe agencement forme un plan massé. Élevé sur cave, lédifice compte un étage carré surmonté de deux étages de combles en partie habitables. Larchitecte a choisi de combiner à lordonnance classique des façades (organisées en travées) des jeux de volumes qui fournissent à la composition une grande variété de rythmes et de formes (très éloignée de la stricte symétrie et de larchitecture stéréotypée). Bien que massive, la silhouette du château est élancée par les pointes des toits et pignons comme par dimportantes souches de cheminées. Soulignant particulièrement les lignes verticales et horizontales qui structurent lensemble, les effets de polychromie jouent un rôle essentiel dans lanimation des façades,  les murs sont élevés en brique alors que le tuffeau a été réservé aux encadrements harpés des baies, des chaînages dangles et des rampants des pignons. Ce parti pris décoratif explique la relative simplicité de forme des hautes baies du rez-de-chaussée et de létage. La variété du décor tient également au traitement en bossage des encadrements douvertures comme aux reliefs plus marqués du bandeau et de la corniche à modillons (fortement saillante). Points forts de la composition, lentrée, la tour descalier et la façade Sud ont fait lobjet dun traitement particulier. L'imposante tour demi-hors-uvre qui abrite lescalier est aménagée dans langle nord-est du château, côté par lequel on accède à la propriété. Sa hauteur fortement accentuée par le toit en pavillon qui la coiffe rompt le caractère massif de lensemble.","habitants":"Famille de Blosses        Famille Barbier du Mans de Chalais\r\n        \"","divers":"A Val de Couesnon château de Blosses                                                 Gps 48° 27' 38\" nord, 1° 29' 05\" ouest","gps":"","images":["../image/image_35/35_Blosses_1.jpg","../image/image_35/35_Blosses_2.jpg"]},"Consult_chateau_formulaire57b8":{"id":"Consult_chateau_formulaire57b8","dept":"35","canton":"Vitré","commune":"Pocé les Bois","nom":"Bois_Bide","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Poncé les Bois; Bois-Bidé et Gazon.                         BOIS-BIDE, du XVIIe siècle à l'origine, refaite au XIXe siècle. Les travaux de gros-oeuvre du château débutent en 1883 par la construction du pavillon nord, est un bâtiment de style néo-Louis XIII, de plan dissymétrique, composé d'un corps de bâtiment principal flanqué d'un pavillon rectangulaire au nord, et d'un pavillon terminé par une abside polygonale au sud. A l'est, le corps d'entrée est encadré de deux tourelles circulaires. Entre 1989 et 1914, aménagement des abords, des dépendances et des installations intérieures. Au début des années 1910, le paysagiste Henri Nivet reprend le parc. Après une interruption due à la première guerre mondiale, les aménagements sont repris en 1920 par Jean du Pontavice. Quant aux aménagements intérieurs, ils sont réalisés entre 1898 et 1930. Ils concernent les boiseries du XVIIIe siècle et des ensembles de la fin du XIXe et du début du XXe siècle. Le grand salon a été décoré en 1929 par Auguste Jobbé Duval, il comprend des lambris surmontés de panneaux de soie damassée, un plafond à caissons peint de scènes allégoriques et une cheminée en marbre rose. Corps central traité comme un châtelet à deux tourelles du côté de la cour. Le pavillon du sud est prolongé par une abside à pans qui abrite à l'étage la nouvelle chapelle du château.Éléments protégés MH : le château, à savoir le logis en totalité; les façades et les toitures de l'orangerie,  inscription par arrêté du 24 août 2007.","architecture":"GAZON  l'actuel château de Gazon a été reconstruit dans la deuxième moitié du XVIIe siècle sur l'emplacement d'une maison noble qui appartenait dès le XVe siècle à la famille Busson. Comme plusieurs manoirs de la région, son implantation dans une zone basse et humide en fit à la fin du XVIe siècle une véritable maison forte défendue par un système de douves qui servit de refuge à de nombreux protestants. Dans le deuxième quart du XIXe siècle, devant la façade exposée au sud, a été plaquée une façade ordonnancée, pour permettre la création de salles de réception au premier étage. L'intérieur a été entièrement refait au XIXe siècle, il comprend de belles pièces de qualité. Un des principaux intérêts du château réside dans le parc aménagé au XIXe siècle, en tirant parti de deux éléments, l'aspect vallonné du site et l'existence des douves du manoir médiéval et moderne. Ceci explique l'importance des pièces d'eau (miroir d'eau, étang). L'ensemble comprend une superbe rabine d'accès longue de 1,300 km et plantée d'une double rangée d'arbres unique en Bretagne, des écuries du XIXe siècle, un potager et une ferme. La ferme sera détruite par la création du barrage de Villamur, mais le château sera préservé. Ancien logis en moellons de schiste et baies en grès ; logement de gardien en forme de chalet avec appareil alterné de brique et de calcaire ; frise en céramique. Éléments protégés MH : les façade et les toiture nord du logis ; le pavillon du XIXe siècle au sud des communs, inscription par arrêté du 5 juin 1992.","habitants":"Bois-Bide, famille de  Jean du Pontavice                                       Gazon  famille Busson\r\n        \"","divers":"Deux châteaux à Poncé les Bois; Bois-Bidé grav-1 à 5 et Gazon grav-6.                                                                                 Bois Bide GPS : 48° 06' 27\" Nord 1° 16' 07\" Ouest","gps":"48° 06' 27\" Nord 1° 16' 07\" Ouest","images":["../image/image_35/35_Bois_Bide_1.jpg","../image/image_35/35_Bois_Bide_2.jpg","../image/image_35/35_Bois_Bide_3.jpg","../image/image_35/35_Bois_Bide_4.jpg","../image/image_35/35_Bois_Bide_5.jpg","../image/image_35/35_Bois_Bide_6.jpg"]},"Consult_chateau_formulairedbc1":{"id":"Consult_chateau_formulairedbc1","dept":"35","canton":"Vitré","commune":"Val_d","nom":"Bois_Cornillé","type":"Château","periode":"XV","histoire":"BOIS-CORNILLE, appartenait en 1480  à Pierre Landais, Trésorier et Receveur Général du Duché de Bretagne et ministre de François II. Acquis par la famille de Kernier en 1832,   C'est pourquoi Perronnelle Rabinart, veuve de Louis de la Porte, seigneur du Bois Cornillet, y fonda, par acte du 2 mai 1659, trois messes par semaine pour les dimanches, les mercredis et les vendredis et la dota d'héritages valant plus de soixante livres de rente et présenta Guillaume Busson, prêtre, pour la desservir. La chapelle fut plus tard reconstruite telle qu'elle est maintenant, la bénédiction en fut faite le 29 avril 1721 par Charles Billon, trésorier de la collégiale de Vitré, c'est là que furent déposés sous des pierres armoriées les coeurs de Joseph Geffrard décédé en 1644, et Renée Billon, sa femme, et de Mathurin Geffrard décédé en 1742, et de Françoise Fleuriot, sa femme, tous seigneurs et dames du Bois Cornillet. On y célébra aussi les mariages, en 1659, de Jean de la Filochaye avec Marguerite de la Porte, en 1692, de Jean Geffrard avec Jeanne de la Porte, en 1770, de Charlemagne de Cornulier avec Rose de Gouyon (Pouillé de Rennes). Le château avait un droit de haute justice.Au XVIIIe siècle à la comtesse Gérald de Maures de Malartic.","architecture":"BOIS-CORNILLE, date de la deuxième moitié du XVe siècle il fut remodelé de 1883 à 1887 par les architectes Jules et Henri Mellet dans un style néo-gothique. Le néo gothique est ici décoratif. De l'époque médiévale ne subsiste que la Tour Goyon, d'époque médiévale en moellons de grès, sur la façade principale. Le parc à l'anglaise a été réalisé par l'architecte paysagiste Denis Bühler en 1876. Le jardin classique, d'un demi ha, jouxtant le château au nord, fut conçu en 1902 pour Jacques de Kernier par l'architecte paysagiste Edouard André, ce site mêle parc agricole et jardin à la française. L'étang encerclé d'hêtres pourpres et traversé par deux ponts de bois, fait de ce parc un beau lieu de rêverie. En traversant le bois Cornillé, vous apercevrez une ancienne porte de prison. La chapelle du Bois Cornillé, dépendant du manoir, était ancienne, dès 1659, mais abandonnée faute de dotation.  Éléments protégés MH : le château et sa chapelle : inscription par arrêté du 29 août 1988. Le parc avec notamment le pavillon et l'allée d'accès, l'allée de ceinture, le jardin à la française, les façades et les toitures de l'orangerie et du pavillon du jardinier, l'allée de lauriers, l'étang muré, le rond-point avec ses perspectives : inscription par arrêté du 24 décembre 1992.","habitants":"Famille de Kernier\r\n        \r\n        \"","divers":"A Val d'Izé château de Bois-Cornillé                                                            GPS : 48° 07' 28\" Nord, 1° 12' 55\" Ouest","gps":"48° 07' 28\" Nord, 1° 12' 55\" Ouest","images":["../image/image_35/35_Bois_Cornill%c3%a9_1.jpg","../image/image_35/35_Bois_Cornill%c3%a9_2.jpg","../image/image_35/35_Bois_Cornill%c3%a9_3.jpg","../image/image_35/35_Bois_Cornill%c3%a9_4.jpg","../image/image_35/35_Bois_Cornill%c3%a9_5.jpg"]},"Consult_chateau_formulaire6ec5":{"id":"Consult_chateau_formulaire6ec5","dept":"35","canton":"Melesse","commune":"St-Medard sur Ille","nom":"Bois_Geoffroy","type":"château","periode":"XV-XVI","histoire":"BOIS GEOFFROY, en 1409, en effet, Jehan de Saint-Gilles, seigneur de Betton et du Bois-Geffroy, le château du Bois Geffroy fut démoli pendant la Révolution et reconstruit après. Jean Samson (1586),  Jacques Gaultier (1698),  Julien Guittier (décédé en 1722),  et Jacques Guillard (décédé en 1750), furent successivement chapelains du Bois-Geffroy   Il comprenait une enceinte irrégulière flanquée de cinq tours et d'un bastion carrée. Deux de ces tours existent encore, les trois autres sont en ruines. Elles sont munies de fruits et percées de canonnières circulaires. La face nord-est de la cour du château est précédée d'un large fossé. On y voyait en 1680 une chapelle édifiée sur la muraille en 1409. Le Bois Geffroy avait un droit de haute justice.","architecture":"BOIS GEOFFROY,  était jadis une place forte défendue par six tours et dont il reste encore quelques vestiges. On y voyait en 1680 une chapelle sur les murailles de ce dernier château en l'honneur de Dieu, de la Sainte Vierge et de saint Jacques. Cette fondation fut augmentée plus tard, car au siècle dernier. Le domaine avait un droit de haute justice. Cétait une châtellenie dancienneté, tenue en juveigneurie de la baronnie d'Aubigné qui fut érigée en marquisat en 1644. Propriété successive des familles Saint-Gilles, seigneurs de Betton fin XIVe siècle, Chandrier (au XVe siècle), Denée (en 1552), Rieux, Gondy, ducs de Retz, Barrin, seigneurs de la Galissonnière (en 1582), Mornay, comtes de Montchevreuil (en 1700), Picot, sieurs de Préménil (en 1752), Vaucouleurs, seigneurs de la Villandré, Quilfistre, comtes de Bavalan (en 1768 et 1789), Montcuit, Francs, Bellamy.","habitants":"familles Saint-Gilles\"","divers":"A St-Medard sur Ille, château de Bois-Geoffroy                                                                              Gps 48° 16' 22? nord, 1° 39' 35? ouest","gps":"","images":["../image/image_35/35_Bois_Geoffroy_1.jpg","../image/image_35/35_Bois_Geoffroy_2.jpg","../image/image_35/35_Bois_Geoffroy_3.jpg"]},"Consult_chateau_formulaire3dd7":{"id":"Consult_chateau_formulaire3dd7","dept":"35","canton":"Bain-de-Bretagne","commune":"Poligné","nom":"Bois_Glaume","type":"Château","periode":"XVI","histoire":"BOIS-GLAUME,   passa par alliance au début du XVe siècle aux Bain de Châteaugiron, puis il passa successivement par alliance au XVe siècle aux Malestroit, aux Raguenel vicomtes de la Bellière,  en 1471 aux Rieux, en 1513 aux Laval, barons de Châteaubriand, par succession en 1543 à Anne de Montejean, veuve de Jean vicomte dAssigné, par alliance aux dAssigné, dans la seconde moitié du XVIe siècle aux Cossé-Brissac, aux de la Marzelière, par vente judiciaire en 1683 aux Denyau, les Coëtquen de la Marzelière le retirèrent en 1684,  au compte de Mornay, par succession vers 1766 à Renée-Thérèse de Boiséon, femme de Louis de la Bourdonnaye de Montluc, les la Bourdonnaye lavaient encore en 1789.  Anoblissement de la terre entre 1442 et 1513: La terre du Bois Glaume, appelée Bois Guillaume jusquau XVIIIe siècle, apparaît en 1513 et appartient au seigneur de Châteaubriand. Son propriétaire actuel est M. Linhoff & Haefeli. Le château remplace un ancien château médiéval. Le domaine, appartenant autrefois à Guillaume, seigneur de Poligné, était une ancienne châtellerie exerçant un droit de haute justice en Bretagne. Le château d'origine était un bâtiment médiéval, remanié à la Renaissance. Il sera détruit au début du XVIIIe siècle et remplacé par le château actuel. Celui-ci est entouré d'un grand parc, planté principalement de chênes centenaires et d'un étang. Le château du Bois Glaume est resté à l'abandon durant un siècle, avant d'être racheté et restauré par l'actuelle propriétaire Mme Berthélémé, qui en fait des chambres d'hôtes. Le château de Bois-Glaume est inscrit aux M.H. depuis 1972.","architecture":"BOIS-GLAUME, le château est un édifice à plan rectangulaire. Il comporte au nord un décrochement en avant-corps, à louest et à lest des séries de quatre fenêtres sur deux étages, deux lucarnes correspondants aux fenêtres centrales, et au sud il comporte deux ailerons latéraux en saillie sur la façade. Le corps central étant en retrait et présentant une légère avancée centrale logeant au rez-de-chaussée la porte à un arc en plein cintre, au premier étage une fenêtre, le tout flanqué de montants en pierres en bossages sur lesquels reposent un grand fronton triangulaire débordant sur le toit et abritant les armes de la Bourdonnaye. La façade sud est ouverte au rez-de-chaussée de quatre fenêtres à linteaux cintrés et dune porte centrale à arc en plein cintre, et au 1er étage de cinq fenêtres à linteaux cintrés. Deux lucarnes à fronton suivent lalignement vertical des ouvertures des ailerons latéraux, tandis que des lucarnes à oculé suivent celui des ouvertures du corps central. Il ny a pas de lucarne au-dessus du fronton central. La Chapelle est un bâtiment de plan rectangulaire amorti à lEst par trois pans coupés aveugles. Elle est éclairée par deux fenêtres à arc en plein-cintre ouvertes près du choeur dans les murs de la petite nef. Elle possède une porte latérale au sud et une porte principale à loccident.","habitants":"Famille de la Bourdonnaye\r\n        \"","divers":"Poligné château de Bois-Glaume                                                      GPS : 47° 53' 39,27\" Nord 1° 40' 36,03\" Ouest","gps":"47° 53' 39,27\" Nord 1° 40' 36,03\" Ouest","images":["../image/image_35/35_Bois_Glaume_1.jpg","../image/image_35/35_Bois_Glaume_2.jpg","../image/image_35/35_Bois_Glaume_3.jpg","../image/image_35/35_Bois_Glaume_4.jpg","../image/image_35/35_Bois_Glaume_5.jpg"]},"Consult_chateau_formulairea974-2":{"id":"Consult_chateau_formulairea974-2","dept":"35","canton":"Saint-Malo","commune":"La Gouesnière","nom":"Bonaban","type":"Château","periode":"XVIII","histoire":"BONABAN, fut le siège d'une seigneurie importante fondée par les Bonabes de Rougé au XIIIe siècle, qui passa par héritage à la maison de Maure vers 1270. Simple baronnie s'étendant sur quinze paroisses, la seigneurie érigée en comté en 1553 avait droit de haute, moyenne et basse justice ; elle rendait aveu au marquisat de Châteauneuf  de la Garoulaye en 1560, Claude de Maure décédé en 1564 légue le domaine à Jean de Guiny  en 1664 le petit-fils de ce dernier  Charles  époux de Marie de Quelen, cède Bonaban  à François Pépin seigneur du Bignon en 1664, Hubert de Courtavel, Marquis de Pezeé et de Vassé.  Le comté devenu châtellenie en 1667, passa à Guillaume Le Fer de la Saudre en 1754 qui fit construire le château actuel,en 1776 sur les ruines du précédent. Sous la Révolution Française, le château fut réquisitionné et les troupes y commirent des dégradations : les superbes tapisseries des Gobelins et d'Aubusson d'après des cartons de Lebrun servirent de couvertures, le mobilier fut dispersé, les objets métalliques réquisitionnés et la grande salle transformée en séchoir à tabac. en 1801 la famille de Fer se  défait du château, le nouveau  propriété la famille Level, le vende en 1842 au comte de Kergariou, sera occupé par les anciens combattants français pendant la seconde guerre mondiale. En 1954, le château est acheté par la compagnie Saint-Gobain pour qu'y soit installé un centre de colonie de vacances. Racheté en 1995, le château connaît aujourd'hui une nouvelle vie comme hôtel.","architecture":"BONABAN, le premier château possédait un corps de bâtiment de 72 pieds de longueur avec une autre construction à l'ouest et un pavillon à l'est, flanqué de deux tourelles aux angles nord-est et sud-est. Au nord s'étendait une cour haute et une cour basse, réunies par un perron de 13 marches ; la cour basse avait un portail et deux pavillons avec un pont-levis. Le manoir était entouré de douves. A côté se trouvait un colombier daté 1665, et à ses pieds s'étendaient de beaux étangs, une grille monumentale sommée d'armoiries fermait la propriété. Une avenue longue de 650 mètres donne accès au château cerné de douves importantes. Orné de beaux jardins et de parterres, le château est flanqué d'une tour à chaque angle et d'un avant-corps en pierre de taille de granite à fronton au milieu de la façade. Celle-ci possède onze travées. Les murs étaient revêtus d'un crépi blanc sur lequel se détachent les entourages de baies et les bandeaux horizontaux séparant les niveaux en pierre de taille de granite. On accède au château du côté nord par un perron à double rampe, et de l'autre côté par un perron carrée de quatre marches en pierre de taille. Il possède encore le colombier seigneurial. Un oratoire est placé dans la tourelle nord-ouest en 1891. Un escalier monumental est édifié en marbre de Carrare.","habitants":"Famille de Guillaume Le Fer de la Saudre\r\n        \"","divers":"A la Gouesnière le château de Bonaban                                                          gps 48° 36' 19\" nord, 1° 53' 39\" ouest","gps":"","images":["../image/image_35/35_Bonaban_1.jpg","../image/image_35/35_Bonaban_2.jpg"]},"Consult_chateau_formulairefc47":{"id":"Consult_chateau_formulairefc47","dept":"35","canton":"Val-Couesnon","commune":"Antrain-sur-Couesnon","nom":"Bonnefontaine","type":"Château","periode":"XIII-XV","histoire":"BONNE-FONTAINE, au XIIIe siècle,  entre dans la famille de Saint-Brice durant trois générations. Jeanne de Saint-Brice, unique héritière de Bonnefontaine épouse en 1370 Guillaume de Porçon, fils d'Olivier de Porçon, compagnon de Bertrand du Guesclin. En 1488, Arthur de Porçon est Chambellan de la Duchesse Anne de Bretagne et capitaine de Fougères. Propriétaire de la seigneurie de Bonnefontaine durant deux siècles, cest à cette famille que lon doit la construction du château. En 1533, Françoise de Porçon épouse Pierre Giffard de La Marzelière, en 1578 élevé  en baronnie. En 1604 la fille de François de La Marzelière hérite du château, et épouse en 1631 Malo de Coëtquen. A cette époque, les Coëtquen sont également seigneurs de Combourg et gouverneurs de Saint-Malo. En 1754 Bonnefontaine est vendu par Louise-Maclovie de Coëtquen, épouse d'Emmanuel de Durfort, Duc de Duras. Bonnefontaine est acheté par Jean de La Motte, seigneur de Lesnage. La terre est vendue comme bien national en l'an VII. Bonnefontaine connait plusieurs propriétaires jusquen 1806, date à laquelle Guy Aubert de Trégomain, député d'Ille-et-Vilaine, s'en porte acquéreur. Bonnefontaine est à nouveau vendu en 1858 au vicomte à François de Guiton, époux de Françoise Hay des Nétumières. Il entreprend d'importants travaux qui donneront au château et au parc leur aspect actuel. En 1908 Jacques  marquis de Kernier  hérite de sa tante la vicomtesse de Guiton, Béatrix le Cardinal de Kernier, la fille du marquis reçoit Bonnefontaine lors de son mariage avec le comte Léonar de Rohan-Chabot, toujours dans cette famille.","architecture":"BONNE-FONTAINE, construction du XVe siècle mais très remanié au XIXe siècle, transformé en  élégante résidence de plaisance,  Pierre Giffard de La Marzelière. Celui-ci, gentilhomme de la cour de François 1er, obtient du roi Henri II, le 5 juillet 1547, l'autorisation de transformer Bonnefontaine en place forte. C'est lui qui fera élever la partie sud du château, notamment la grosse tour à mâchicoulis. Le corps de logis les combles éclairés par des lucarnes très ornementées. Elevés à trois niveaux, les deux bâtiments forment pas un alignement rectiligne couverts par un toits d'ardoise à longs pans. la façade nord conserve de jolies tourelles des fenêtres à meneaux et des lucarnes de style Renaissance.  Au centre la façade orientale se détache une tourelle octogonale à toiture effilée, la façade ouest, dont les extrémités sud est flanquée d'une tour cylindrique coiffée d'un haut toit conique, l'angle rentrant  des deux constructions est occupé par une tour accostée d'une tourelle en encorbellement  est ajouté en 1880 à l'angle nord un gros donjon circulaire à deux étages doté d'un chemin de ronde couvert.","habitants":"Famille de Porçon\r\n        \"","divers":"A  Antrain-sur-Couesnon,  château de Bonnefontaine  GPS : 48° 26' 46\" Nord, 1° 29' 26\" Ouest","gps":"48° 26' 46\" Nord, 1° 29' 26\" Ouest","images":["../image/image_35/35_Bonnefontaine_1.jpg","../image/image_35/35_Bonnefontaine_2.jpg","../image/image_35/35_Bonnefontaine_3.jpg","../image/image_35/35_Bonnefontaine_4.jpg","../image/image_35/35_Bonnefontaine_5.jpg","../image/image_35/35_Bonnefontaine_6.jpg","../image/image_35/35_Bonnefontaine_7.jpg","../image/image_35/35_Bonnefontaine_8.jpg"]},"Consult_chateau_formulaireb175":{"id":"Consult_chateau_formulaireb175","dept":"35","canton":"Combourg","commune":"Bonnemain","nom":"Bonnemain","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Bonnemain; Diablères.                                                         DIABLAIRES, le bourg de Bonnemain est organisé autour de la place publique aménagée à la fin du XIXe siècle à l'emplacement de l'ancienne église paroissiale. Datant des XIIIe et XIVe siècles, celle-ci fut détruite vers 1883 pour être remplacé par l'édifice actuel bâti sur les plans de l'architecte Alfred-Louis Frangeul. Le portail de l'ancien enclos paroissial a été déplacé à l'entrée du cimetière actuel. Le château des  Diablaires est mentionné dans les Registres des Réformations de Noblesse de 1513 comme appartenant à la famille le Diable qui changea son nom pour celui de Marie au XIVe siècle. le château fut édifié  dans la deuxième moitié du XIXe siècle. L'ancien manoir devait se situer au niveau de la Basse et de la Haute Diablaire bâtis en 1826. Le domaine des Diablaires passa à la famille Lorgeril en 1894. Elle y a fondé une cidrerie qui fonctionna jusqu'en 1938. Achetées en 1942 par M. Vallaud, les Diablaires devinrent le siège d'une fabrique de jouets en bois. Quelques années avant la fin de la Seconde Guerre Mondiale, la propriété fut acquise par l'Académie du Nord qui y construisit un aérium pour les enfants malades en 1947. Il ferma en 1976, mais vers 1978, l'édifice accueilli  l'école d'agriculture de Dol-de-Bretagne.","architecture":"DIABLAIRES,  château des Diablaires ou de la Diablerie du XIXe siècle, situé route de Combourg à Dol-de-Bretagne. Les terres sont la propriété de la famille Le Diable (Marye ou Marie, après le changement de nom). Propriété de la famille Marie en 1513. Le manoir ou château devient ensuite la propriété de la famille Lorgevil de 1894 à 1939, puis de la famille Vallaud en 1942.","habitants":"Famille le Diable                                                                             Famille Lorgeril\r\n        \"","divers":"Deux châteaux à Bonnemain, Bonnemain et Diablères.  Gps 48° 28' 01\" nord, 1° 45' 57\" ouest","gps":"","images":["../image/image_35/35_Bonnemain_1.jpg","../image/image_35/35_Bonnemain_2.jpg","../image/image_35/35_Bonnemain_3.jpg","../image/image_35/35_Bonnemain_4.jpg"]},"Consult_chateau_formulaireb4ec":{"id":"Consult_chateau_formulaireb4ec","dept":"35","canton":"Combourg","commune":"Pleugueneuc","nom":"Bourbansais","type":"Château","periode":"XV-XVII","histoire":"A cinq kilomètres au nord à saint-pierre de Plesguen le château de Rouvres                                                                                                                   BOURBANSAIS, le château semble tirer son nom des Bourbans, ancienne famille noble citée au XVe siècle. en 1583  Jean du Breil seigneur de la Colombière en Pleugueneuc entreprend la construction du château  Il relevait de la seigneurie de Châteauneuf. Durant 3 générations, par alliance passe aux  Huart seigneur du Boschet, conseillers au parlement de Bretagne,  au siècle suivant le domaine passe par alliances familiales  aux des la Forest d'Armaillé. En 1806 mariage de demoiselle de la Forest  d'Armaillé avec Louis de Lorgeril de la Motte de Beaumanoir, propriété du comte Olivier de Lorgeril.                                                                                                         ROUVRE, Saint-Pierre de Plesguen fût reconstruit en 1786-87 par Saturnin-Hercule du Bourblanc, conseiller puis premier avocat au Parlement de Bretagne. La chapelle Saint-Laurent, datant de 1660, fût conservée. Comparable par son plan en H allongé au château de Belle Noë en Dol de Bretagne du début du XVIIIe siècle, il s'en distingue par le traitement des toitures à la Mansart des ailes latérales. L'aménagement au début du XXe siècle des pavillons en appentis latéraux, a accentué ce parti pris.","architecture":"BOURBANSAIS, constitué  de deux corps de logis à angle droit, début de la construction au XVe siècle, réaménagés  au XVIIe siècle, remaniés au siècle suivant de deux corps de logis perpendiculaires sont entourés de tours rondes, d'ailes et de pavillons bas. La demeure se compose de deux corps de logis placés en retour d'équerre du XVIIe et du XVIIIe siècle dotés de tours d'angles. La façade sud comprend un bâtiment orné de gerbières, sa porte est surmontée d'un fronton triangulaire. La façade est flanquée de deux tourelles rondes à corniches à modillons et à toits en dôme sommés de campaniles, les tourelles sont accostées à angle droit par deux constructions basses aux toits à la Mansart. En avant de la façade sud, s'élèvent deux bâtiments à pans coupés et à corniches à modillons, l'un d'eux abrite une chapelle. Plus avant encore, se dressent deux tours dont l'une est une ancienne fuie. Devant elle s'étend une cour qui donne accès à un jardin transformé en pelouses. La façade ouest présente un corps de bâtiment mansardé, flanqué de deux avant-corps que somment de grands frontons arrondis et deux tourelles. Devant  l'une des façades vaste jardin à la Française  terminé par une terrasse que protège une douve murée. Parc animalier, un zoo renommé depuis 1965.  Éléments protégés MH  classement par arrêté du 24 novembre 1959.","habitants":"Famille des Forest d'Armaillé\r\n        \"","divers":"A Pleugueneuc, le château de la Bourbansais                                  GPS: 48° 24' 15,48\" Nord, 1° 53' 48,84\" Ouest                               A cinq kilomètres au nord à saint-pierre de Plesguen le château de Rouvres  Grav-7-8","gps":"48° 24' 15,48\" Nord, 1° 53' 48,84\" Ouest","images":["../image/image_35/35_Bourbansais_1.jpg","../image/image_35/35_Bourbansais_2.jpg","../image/image_35/35_Bourbansais_3.jpg","../image/image_35/35_Bourbansais_4.jpg","../image/image_35/35_Bourbansais_5.jpg","../image/image_35/35_Bourbansais_6.jpg","../image/image_35/35_Bourbansais_7.jpg","../image/image_35/35_Bourbansais_8.jpg"]},"Consult_chateau_formulaire11b2":{"id":"Consult_chateau_formulaire11b2","dept":"35","canton":"Guichen","commune":"Bourg des comptes","nom":"Bourg_des_Comptes","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article; Boschet, Mont-Rive et Gouverdière.                                                                                                                                     Le BOSCHET, le château a été construit entre 1660 à 1680 pour Pierre de Lescouët, premier chambellan du duc d'Orléans en remplacement de l'ancien manoir. Le château du Boschet passa  au XVIIIe siècle à Thérèse de Lescouët épouse de Joseph Luc de Kerneze, marquis de la Roche, en 1767 ensuite dans les mains de la famille Magon marquis de la Gervaisais, en 1786 Louis de la Gervaisais  qui vendit le domaine aux Le Fer de La Gervinais et en 1802 aux Brossay père du cardinal  Saint-Marc, dont le Cardinal et 1er Archevêque de Rennes, Godefroy Brossay-Saint-Marc, (1803-1878), Cardinal Archevêque de Rennes, dont les parents devinrent les propriétaires du château du Boschet, en 1883,  passa ensuite à la famille Legeard de la Diriays, toujours dans cette famille,  classement aux M.H. par arrêté du 31 janvier 2011.                                                                             MONT RIVE, le château est implanté sur un promontoire dominant la vallée de la Vilaine. Construit au début du XIXe siècle par Félix Vatar, juge auprès du tribunal civil de Rennes, Mont-Rive est une maison de campagne occupée en été. En 1888, Paul Vatar, conseiller à la cour d'appel de Rennes, fait dresser par l'architecte Henri Mellet, un projet de restauration de la propriété familiale, mais il sera finalement abandonné. En 1905, son fils, Paul Marie, fait réaliser l'agrandissement de Mont-Rive par le même architecte, fait construire les communs, plante le parc et aménage un terrain de tennis. Jean-Marie Huchet, entrepreneur à Rennes, est chargé de la réalisation des travaux. Demeuré dans la famille au cours du XXe siècle, l'édifice a subi quelques transformations intérieures.","architecture":"Le BOSCHET, il est composé d'un grand corps de logis rectangulaire,du XVIIe siècle de plan double en profondeur, comportant un rez-de-chaussée et un étage avec toiture à la Mansart et quatre pavillons d'angle montés sur trompe. Du côté ouest, le château est bordé de deux bâtiments moins élevés construits en retour d'équerre l'un servant de chapelle, et l'autre d'archives. A l'intérieur se trouve un bel escalier monumental à balustres de pierre blanche. Une deuxième campagne de travaux, entre 1720 et 1740, voit la réfection de l'intérieur, complété par deux ailes indépendantes en retour d'équerre, à l'ouest, se terminant en corps arrondis, avec une chapelle et l'autre un espace de service. Au cours des années 1740-1750 a été créé un jardin ordonnancé, intégrant l'orangerie et les communs, formés de trois ailes disposées en U, témoignant d'un souci d'architecture et d'intégration à l'environnement avec les arcades en plein-cintre intégrant les fenêtres, la charpente en bois est d'origine. Cet ensemble n'a subi que très peu de modifications au XIXe siècle.                                                                                                                GOUVERDIERE manoir du XVIe siècle, situé route de Guichen. On y voit une tourelle polygonale.","habitants":"Boschet: Famille Magon                                                                          Mont-Rive; Famille de Félix Vatar\r\n        \"","divers":"Trois châteaux Bourg des Comptes; Boschet grav 1-2-3, Mont-Rive grav-4 et Gouverdière grav 5 Vallée Grav 6                                                          GPS : 47° 55' 48\" Nord, 1° 44' 28\" Ouest                                                         Boschet 47° 54' 48\" nord, 1° 45' 24\" ouest","gps":"47° 55' 48\" Nord, 1° 44' 28\" Ouest","images":["../image/image_35/35_Bourg_des_Comptes_1.jpg","../image/image_35/35_Bourg_des_Comptes_2.jpg","../image/image_35/35_Bourg_des_Comptes_3.jpg","../image/image_35/35_Bourg_des_Comptes_4.jpg","../image/image_35/35_Bourg_des_Comptes_5.jpg","../image/image_35/35_Bourg_des_Comptes_6.jpg"]},"Consult_chateau_formulairebd4c":{"id":"Consult_chateau_formulairebd4c","dept":"35","canton":"Liffré","commune":"Bouëxière","nom":"Bouëxière","type":"Château","periode":"XVI","histoire":"Deux châteaux à Bouëxière, Carrefour, Chevré, Sévailles, la Bertry et la Bouëxière.                                                                                                       SEVAILLES,  la motte féodale se situait au Bas-Sevailles sur une parcelle de 300 × 200 m, liée à Hervé de Sevailles vers 1209. La dîme des Sevailles était affermée. Les terres du Haut et du Bas-Sevailles furent unies, après 1500, et vendues vers 1605, à la famille Blondeau. Le domaine de Servailes s'étendait au début de 1950 sur 40 hectares et par suite du remembrement, en 1957, il passa par la suppression des haies vives à 42 hectares, permettant d'utiliser le tracteur et la moissonneuse-batteuse dans des parcelles devenues plus accessibles. Une source coule derrière le manoir, dans l
