eau des Acres et le château de la Chesnardière.","architecture":"VILLE GONTIER, sur le site ancien du manoir de la Tendrais agrandi et transformé en château au début du XIXe siècle. Logis du XIXe siècle. Guillotin écrit : \"actuellement, l'ancienne Villegontier est devenue la demeure d'un fermier, et le propriétaire, M. le comte Frain de la Villegontier, habite le manoir de la Tendraye, restauré et nommé la Villegontier. C'est un assez vaste logis sans caractère architectural, mais occupant le centre d'un fort beau parc tracé à l'anglaise\". Autrefois, on voyait à côté du château l'ancien manoir de la Villegontier, à l'extrémité de l'enclos. Ce manoir, cité dès 1248, possédait au XVIIe siècle une tour carrée et une tourelle, une chapelle et un colombier. Il relevait de la baronnie de Fougères et était le gage féodé de la seigneurie du Coglais, ses possesseurs étaient tenus à ce titre de recueillir les rentes dues au baron de Fougères dans le bailliage du Coglais et d'une sergenterie de la forêt de Fougères, c'est-à-dire que ses possesseurs étaient chargés en échange de certains privilèges, de percevoir les rentes dues par les usagers de la forêt et les amendes encourues par les délinquants. Il avait un droit de haute justice. La Villegontier semble tirer son nom d'un seigneur nommé Gontier qui est cité au XIIe siècle. Elle était au début du XVe siècle à Honorée du Bouays femme d'Olivier de la Houssaye, fut vendue en 1430 aux Morel, qui la vendirent en 1549 aux le Corvaisier seigneurs de Pellaine ; elle passa enfin par alliance en 1654 aux Frain seigneurs d'Ifer qui l'ont vendue récemment. Reconstruit sous le nom de château de la Villegontier, le bâtiment est relativement moderne. Les seigneuries de la Tandrais et de la Villegontier furent unies au XVIIe. Le château de la Ville-Gontier se compose de plusieurs bâtiments accolés. Il possède également une grande tourelle couverte d'un toit polygonal.","habitants":"M. le comte Frain de la Villegontier\r\n        \"","divers":"a Parigné le château de Ville-Gontier   gps 48° 26' 19\" nord, 1° 12' 32\" ouest","gps":"","images":["../image/image_35/35_Ville_Gontier_1.jpg","../image/image_35/35_Ville_Gontier_2.jpg"]},"Consult_chateau_formulaired244":{"id":"Consult_chateau_formulaired244","dept":"35","canton":"Fougères","commune":"Mézières-sur-Couesnon","nom":"Ville_Olivier","type":"Château","periode":"XVIII-XIX","histoire":"VILLE-OLIVIER, situé dans un site non loin du Couesnon, dans un environnement de bois et de vallons encaissés, le château de la Ville Olivier, du XVIIIe siècle, fut reconstruit vers 1820-1830. C'est une belle demeure classique située au fond d'une cour bordée par les communs close par une belle grille en fer forgé. Entre les deux piliers de la porte principale sur lesquels veillent deux lions, la grille est surmontée d'une couronne de marquis. La Ville-Olivier relevait, elle aussi, du marquisat du Bordage. La seigneurie appartenait aux de Crochenne, seigneurs de la Hervoye, en 1513 ; aux Frémont, seigneurs de la Hervoye également, en 1680 ; aux Védier en 1701. Puis, elle passa par succession à Jacques de Monti, seigneur de Friguel avant d'être vendue par sa veuve, Marie-Louise Moraud, dame du Déon, aux Fleuriot, seigneurs de Langle, en 1766. La Ville-Olivier était aux Hay, seigneurs de Bonteville en 1789. Les comtes de Bonteville conservèrent la Ville-Olivier pendant une partie du XIXe siècle. La dernière propriétaire, Mademoiselle Hay de Bonteville étant restée célibataire, la propriété échue à un membre de la famille Hay de Nétumières dont une fille épousa le comte Pantin de Landemont. Leur fille, épousa M. Aymer de la Chevalerie dont la fille épousa le comte d'Abadie. Retirés en Poitou, le comte et la comtesse d'Abadie furent les derniers propriétaires de la Ville-Olivier et ce furent eux qui la vendirent à la commune de Mézières en 1977.","architecture":"VILLE-OLIVIER,  devant l'importance des travaux à réaliser, la commune le remit en vente. Aujourd'hui le château est divisé en plusieurs appartements appartenant à une SCI. Le château bâti au fond d'une cour d'honneur se compose d'un corps de logis central à haut toit flanqué de deux pavillons d'angles à toit élevé. La cour est fermée au sud par une très belle grille en fer forgé surmontée d'une couronne de marquis au-dessus des lettres M. L. ; deux piliers en granite soutiennent la grille.Très étendue avec ses 2474 hectares et ses 101 écarts, la commune s'est d'abord appelée Saint-Martin-de-Mézières, saint Martin étant le patron de la paroisse. Saint-Martin-de-Mézières est devenu Mézières-sur-Couesnon par décret du 20 août 1920. Dès le XIIe siècle, l'implantation de moulins sur la rivière favorise le développement de la commune jusqu'à la révolution industrielle qui amorce le déclin de l'activité. La commune conserve quatre manoirs et châteaux encore uniquement réservés à l'habitat ce sont : La Giraudais, la Haute Touche, la Sécardais, la Ville Olivier. Un cinquième, s'il a conservé son caractère du XVIIIe siècle est à usage agricole, il s'agit de la Courbaudais. Les autres manoirs signalés notamment dans le livre de Paul Banéat ne sont plus que souvenirs avec parfois quelques traces noyées dans des rénovations modernes.","habitants":"Famille Hay de Nétumières\r\n        \"","divers":"A Mézières-sur-Couesnon  le château de  Secardais                               GPS : 48° 18' 00\" Nord, 1° 27' 29\" Ouest                                                           et de  Ville  GPS : 48° 17' 47\" Nord, 1° 25' 54\" Ouest","gps":"48° 18' 00\" Nord, 1° 27' 29\" Ouest","images":["../image/image_35/35_Ville_Olivier_1.jpg","../image/image_35/35_Ville_Olivier_2.jpg","../image/image_35/35_Ville_Olivier_3.jpg"]},"Consult_chateau_formulairef6af":{"id":"Consult_chateau_formulairef6af","dept":"35","canton":"Melesse","commune":"Vignoc","nom":"Villouyère","type":"Château","periode":"XV-XVIII-XIX","histoire":"VILLOUYERE,  le village de Vignoc est de fondation ancienne, la première mention connue de la paroisse remonte au milieu du XIe siècle. A cette époque, elle dépendait de la seigneurie de Montbourcher, dont les vestiges de la motte s'élèvent encore dans le bois éponyme. Les seigneurs de Montbourcher ont fortement marqué de leur empreinte l'histoire de la commune sur laquelle ils possédaient notamment le droit de haute justice. Toutefois, ils n'étaient pas les seuls à détenir des droits sur Vignoc. Dès le XIIe siècle, les abbayes rennaises de Saint-Melaine et Saint-Georges, possédaient des droits sur la paroisse. L'existence d'un manoir est connue depuis le XVe siècle, il possédait autrefois une tourelle, un pavillon une cour close, cinq avenues, une chapelle et un pigeonnier et jouissait d'un droit de haute justice à Montreuil le Cast. Au XVIIIe siècle, il fut transformé en château pour Guy de la Motte-Piquet, seigneur de Vignoc et conseiller au parlement de Bretagne, en s'inspirant des hôtels particuliers reconstruits à Rennes par l'architecte Gabriel, et au cours du XIXe siècle ont eu lieu des modifications de la toiture (lucarnes) et l'aménagement des combles.","architecture":"VILLOUYERE, seigneur du lieu et conseiller au parlement de Bretagne, en s' inspirant des hôtels particuliers reconstruits à Rennes par l' architecte Gabriel. Au cours du XIXe siècle ont eu lieu des modifications de la toiture (lucarnes) et l' aménagement des combles. (Conservation Régionale des Monuments Historiques de Bretagne). Château de plan massé. Maçonnerie en brique.  Façade ordonnancée à six travées organisées symétriquement autour d'un avant-corps central. Étage carré ; comble ; deux lucarnes. Encadrements des baies en tuffeau cintrés au premier et au second niveau (avant-corps). Toit à égout retroussé. Décor de deux frises moulurées en façade régnant au dessus des baies ; interrompues par les clefs de celles-ci.","habitants":"Famille de Guy de la Motte-Piquet,\r\n        \"","divers":"A Vignoc le château de Villouyère.                                                       GPS : 48° 14' 41\" Nord, 1° 46' 24\" Ouest","gps":"48° 14' 41\" Nord, 1° 46' 24\" Ouest","images":["../image/image_35/35_Villouy%c3%a8re_1.jpg","../image/image_35/35_Villouy%c3%a8re_2.jpg"]},"Consult_chateau_formulaire817a":{"id":"Consult_chateau_formulaire817a","dept":"35","canton":"La Guerche-de-Bretagne","commune":"Visseiche","nom":"Visseiche","type":"Château","periode":"XIII-XIX","histoire":"MONTAGNE, sur le site d'un ancien manoir attesté dès le XIIIe siècle et abandonné par la famille Hay de Nétumières en 1784 au profit du château voisin de Monbouan, le château de La Montagne est bâti en 1884 par l'architecte Henri Mellet pour le comte Pierre-Elie Hay des Nétumières. Terrasse aménagée par un architecte de Vitré, vers 1900  construit dans le style néo XVIIe, le château est une demeure atypique dans la production d'Henri Mellet mais peut être considéré, comme un exemple représentatif et digne d'intérêt à l'échelle du département d'Ille-et-Vilaine. Resté la propriété de la même famille depuis sa construction, le château conserve son décor intérieur.  En 1583, Paul Hay des Nétumières épouse Françoise dont le château appartenait à sa famille depuis deux siècles. Sa famille est de Gévézé. Ce mariage est célébré devant le château dont seule la tourelle existe encore aujourd'hui. Elle semble dater du XIVe siècle. La famille Hay est parente avec les seigneurs de Châteaugiron. C'est au XIIIe siècle qu'elle est associée aux des Nétumières, par un mariage. Hay a été baron de Châteaugiron. La famille possédait de nombreux châteaux dont un entre Vitré et Bélazé (un des membres de l'académie française), les rochers Sévigné, un troisième en Mayenne, un hôtel à Rennes entre la cathédrale et le Parlement. Ils ont vécu à La Montagne aux XIVe et XVe siècle, puis au début du XVIIIe siècle ils sont partis pour Monbuan à Moulins et revenus à la fin du XIXe siècle à La Montagne. La terrasse a été aménagée vers 1900 par un architecte de Vitré.","architecture":"MONTAGNE, se compose d'une bibliothèque décorée au plafond de fleurs de Lys alternées avec des hermines. Des armoires de style Louis XII y sont intégrées. Les pièces en enfilade qui suivent sont les suivantes : grand salon, petit salon et salle à manger. Elles sont décorées de grandes glaces et les cheminées sont en marbre de couleur différente, en provenance de Mayenne, selon les pièces. La distribution se fait en enfilade ou par le hall d'entrée. Les escaliers de service sont remisés aux extrémités du château. Les cuisines ont un accès extérieur. La dépendance se divise en trois parties : l'écurie au sud, l'étable au nord et au centre les garages. Des grenier à foin sont aménagés au dessus de l'écurie et de l'étable. L'accès principal se fait du côté du bois.\r\n  MARCILLE-ROBERT à cinq kilomètres à l'ouest , Vestiges de lensemble fortifié est bordé par un talus de terre, vestige dune première fortification qui aurait été élevée au début du XIe siècle par Rivallon Le Vicaire, seigneur de Vitré, puis reconstruite en 1108. Lenceinte actuelle, antérieure au XIVe siècle, est composée de six tours à archères. Elle conserve encore deux terrasses au sud formant basse-cour et plate-forme quadrangulaire. La fortification est prise en 1488 par Louis de la Trémouille pour le comte du roi de France et est démantelée en 1595. Une de ses tours est aménagée en chenil au XIXe siècle et le site transformé en parc dagrément. Ce château, avec son étang mentionné dès 1161 et parfaitement conservé, possède un fort potentiel historique, archéologique et architectural, allié à un environnement de qualité.Éléments protégés MH : en totalité, le château de Marcillé-Robert pour ses parties publiques soit l'ensemble des élévations et le sol d'assiette : inscription par arrêté du 15 septembre 2017.","habitants":"famille Hay de Nétumières \r\n        \"","divers":"A Visseiche  les vestiges de Marcillé Robert grav 1-2-3  le château de Montagne grav 4-5.                                             gps  47° 57' 21\" nord, 1° 18' 03\" ouest","gps":"","images":["../image/image_35/35_Visseiche_1.jpg","../image/image_35/35_Visseiche_2.jpg","../image/image_35/35_Visseiche_3.jpg","../image/image_35/35_Visseiche_4.jpg","../image/image_35/35_Visseiche_5.jpg"]},"Consult_chateau_formulairebd83":{"id":"Consult_chateau_formulairebd83","dept":"35","canton":"Vitré","commune":"Vitré","nom":"Vitré","type":"Forteresse","periode":"X-XV-XVII","histoire":"Trois châteaux à Vitré ; Marie , Rocher-Sévignée (voir article) et Vitré.  La Bugatrière  à cinq Km au nord-Est à St-M'Hervé.                                                                                                       VITRE, le premier château fut construit à la fin du Xe siècle ou au début du siècle suivant par Riwallon le Vicaire ou le Vicomte, l'un des chevaliers du duc Geoffroi Ier, il occupait alors l'emplacement de l'église Sainte Croix actuelle. En 1250   André de Vitré  meurt au cours de la septième croisade à la bataille de Mansourah, le fief revient à sa fille épouse de Guy VII de Laval 1427 alors que Laval est occupé par les anglais, les barons se fixent à Vitré. Les seigneurs de Laval-Vitré qui par le jeu des alliances accroissent leur possessions sont dès le XVe siècles les plus puissants de Bretagne; Guy XVI de Laval gouverneur et lieutenant général pour le roi en Bretagne et époux de Charlotte d'Aragon. Lorsque meurt le comte de Laval en 1547,  passa aux Rieux puis par héritage en 1567 à Paul de Coligny, sa nièce  une Coligny qui introduit  la réforme à Vitré , Guy-Paul de Coligny successeur de son oncle François, au XVIIe siècle Vitré passe aux la Trémoille   qui délaisse le château,  en 1794  le prince de Talmont fils du dernier baron  est guillotiné, le château est saisi et transformé en caserne. En 1795 un incendie ravage le logis seigneuriale, au XVIIIe siècle  Vitré est délaissé par ses propriétaires et en 1820  les la Trémoille le vendent à la ville  qui le transforme en caserne et prison, Prosper Mérimée, inspecteur général des M.H. le découvre en 1835,  les travaux de restauration sont lancés en 1871; le musée ouvre ses portes la prison ne sera remplacée par l'actuel hôtel de ville qu'en 1902. Classement aux M.H. par arrêté du 15 juillet 1898.","architecture":"VITRE, Un deuxième château fut édifié au milieu du XIe siècle par son fils, Robert Ier sur le site actuel. Il se composait d'un donjon et fut remplacé au début du XIIIe siècle, par une forteresse beaucoup plus étendue, de forme triangulaire. Il en reste quelques courtines et la base de la tour au Véel. Cette forteresse fut elle-même reconstruite sur le même plan aux XIVe et XVe siècles. Les parties les plus remarquables sont la tour Saint-Laurent qui faisait office de donjon et surtout le châtelet, entrée fortifiée entre deux tours et surmontée d'un élégant logis dont la structure caractérisée par un grand arc bandé au dessus de la porte .                                                                                                                            MARIE , château du XVIIe siècle comprenant un grand bâtiment flanqué, à chaque extrémité, d'un pavillon en saillie, construit en briques et moëllons. Mme de Sévigné mentionne le château Marie dans ses lettres. Elle venait s'y reposer lorsqu'elle quittait son habitation habituelle. Éléments protégés MH : le plafond à poutres apparentes décorées de peintures situé au premier étage du pavillon de droite : classement par arrêté du 12 septembre 1921. Les façades et les toitures.                                                      BOUGATRIERE à cinq Km au nord-Est à St-M'Hervé, château bâti vers 1910 peut-être par l'architecte rennais Emmanuel Leray, à l'emplacement d'un manoir appartenant à la famille de Courte depuis 1694, et en réutilisant peut-être la tour d'escalier. L'ancienne chapelle Saint-Sauveur est détruite, le pigeonnier du XVIIIe siècle est en ruine. L'édifice fut la propriété des familles Bougastre en 1420, Godebiette en 1441, Geay, seigneurs du Tremblay en 1541 puis des Nos, seigneurs de la Doucetière en 1627, Bonnieu, sieur de Haute-Maison en 1668, et Courte, sieurs de la Blanchardière en 1694 et 1789. Le château, de plan massé, à un étage carré et un  étage de comble, possède une tour d'escalier sur l'angle.","habitants":"Vitré;  Famille de la Trémoille                                                         Bougatière, Famille de Courte \r\n        \"","divers":"Trois châteaux à Vitré ; Marie , Rocher-Sévignée (voir article) et Vitré.  La Bugatrière grav-8-9   à cinq Km au nord-Est à St-M'Hervé.    Vitré  GPS : 48° 07' 28\" Nord, 1° 12' 55\" Ouest                                                             Rocher GPS : 48° 04' 50\" Nord, 1° 10' 08\" Ouest","gps":"48° 07' 28\" Nord, 1° 12' 55\" Ouest","images":["../image/image_35/35_Vitr%c3%a9_1.jpg","../image/image_35/35_Vitr%c3%a9_2.jpg","../image/image_35/35_Vitr%c3%a9_3.jpg","../image/image_35/35_Vitr%c3%a9_4.jpg","../image/image_35/35_Vitr%c3%a9_5.jpg","../image/image_35/35_Vitr%c3%a9_6.jpg","../image/image_35/35_Vitr%c3%a9_7.jpg","../image/image_35/35_Vitr%c3%a9_8.jpg","../image/image_35/35_Vitr%c3%a9_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','35 — Ille-et-Vilaine'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
