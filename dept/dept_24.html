chitecte Léon Drouyn.   FAYOLLE, du XVIIIe et XIXe siècles, inscrit aux M.H.depuis 1969 . Marquisat héréditaire érigé en 1724 par décision du Roi Louis XV, avec semble-t-il justice seigneuriale jusqu'à la paroisse de Tocane. L'actuel marquis de Fayolle sera le dernier de sa lignée et le titre sera éteint à son décès.         Hôtel de Fayolle  est mentionné dès le début du XVe siècle. Il restera dans la famille de Fayolle jusqu'en 1795. Par la suite, l'édifice sera partagé en deux pour les descendants de Guillaume Rouchaud, propriétaire après les Fayolle.","architecture":"FAYOLLE, un château fort le remplaça l'ancien au XVe siècle. A la fin du XIXe siècle, l'édifice est augmenté de deux pavillons latéraux et d'une nouvelle façade nord. La chapelle qui date de cette deuxième phase abrite la croix pectorale et le calice de l'ancien abbé de Chancelade, Alain de Solminihac.    mais il fut incendié par les troupes des seigneurs de Bourdeille.  Le château de Fayolle édifice classique à deux niveaux et série de lucarnes en combles, est composé de deux corps de logis accolés selon leurs murs gouttereaux, chacun de ces bâtiments est terminé par deux pavillons carrés avec attique au angle arrondis souligné par des refends et portent chacun un grand fronton cintré faisant saillie en façade, ceux du corps nord dépassent de toute leur largeur ceux du corps sud. Au centre de la façade nord un avant corps de deux niveaux et trois travées, surmonté d'un fronton triangulaire est desservi par un perron à escalier double. Le château abrite un théâtre et une chapelle. Les dépendances se développent au sud-est de l'ensemble.   Le château est inscrit aux M.H.depuis 1969 pour les façades, les toitures et le parc.","habitants":"Marquis de la Fayolle\r\n        \"","divers":"A Toscane St-Apre; Fayolle grav de 1 à 3 GPS : 45° 13' 44,8\" Nord 0° 29' 59,2\" Est","gps":"45° 13' 44,8\" Nord 0° 29' 59,2\" Est","images":["../image/image_24/24_Fayolle_1.jpg","../image/image_24/24_Fayolle_2.jpg","../image/image_24/24_Fayolle_3.jpg"]},"Consult_chateau_formulaire47c6":{"id":"Consult_chateau_formulaire47c6","dept":"24","canton":"Domme","commune":"Castelnaud la Chapelle","nom":"Fayrac","type":"Château","periode":"XV-XVI","histoire":"FAYRAC cité au XIIIe siècle, construit au XVe siècle. En 1342 Marguerite de Castelnaud apporte Fayrac en dot lors de son mariage avec Elie de Mottes, l'une de leur descendante épouse en 1529  Léonard de Proulhet lieutenant général de la sénéchaussée de Sarlat, leur fille unique héritière  épouse Jean Blanchier conseiller  au présidial et propriétaire de nombreux domaines. Après la guerre de religion le fils de Jean,  Pierre   assassiné à Sarlat avait épousé la fille de Geoffroy de Vivans capitaine du château de Castelnaud, madame de Caumont fut acceuilli à Fayrac. Au XVIIIe siècle Jean de Blanchier de la Rocheflorent seigneur de Fayrac, ses descendants se succéderont jusqu'à la Révolution dont le domaine sera vendu comme bien national sera acquit par monsieur Gueyraud avocat puis à sa fille Louise qui épouse Adolphe baron de la Tombelle leur fils Fernand compositeur  sejourna à Fayrac pour entreprendre d'important travaux de restauration  avec son épouse née Henriette de Lacourt de Marivault, au décés d'Adolphe en 1928 le château est acquit par une famille belge.","architecture":"FAYRAC sur une terrasse dominant la Dordogne, courtine avec châtelet à pont-levis, le château date du XV au XVIe puis très restauré  au XIXe siècle. C'est un édifice de plan irrégulier. L'accès se fait par une porte charretière défendue par une bretèche dans un jardin intérieur bordé sur la gauche de communs, et sur la droite de remparts crénelés. Tour à meneaux de cinq étages. Deux pont-levis sur fossé. Celui de droite conduit à une cour intérieure. Un corps de logis avec deux grosses tours rondes du XVe siècle et une chapelle à voûte sur croisées d'ogives, occupent le côté droit de la cour. Un corps de bâtiment oblong, flanqué d'un donjon carré, d'une tour d'escalier à pans du XVIe siècle et d'une tourelle en encorbellement, ferme la cour à gauche. Le château de Fayrac est classé aux M.H. le 31/03/1928.","habitants":"Famille de Léonard de Proulhet \r\n        \"","divers":"Castelnaud la Chapelle; Fayrac","gps":"","images":["../image/image_24/24_Fayrac_1.jpg","../image/image_24/24_Fayrac_2.jpg","../image/image_24/24_Fayrac_3.jpg","../image/image_24/24_Fayrac_4.jpg","../image/image_24/24_Fayrac_5.jpg","../image/image_24/24_Fayrac_6.jpg","../image/image_24/24_Fayrac_7.jpg","../image/image_24/24_Fayrac_8.jpg"]},"Consult_chateau_formulaire0e89":{"id":"Consult_chateau_formulaire0e89","dept":"24","canton":"Terrasson lavilledieu","commune":"Condat sur Vézère","nom":"Fleunie","type":"Château","periode":"XII-XV","histoire":"FLEUNIE  La construction du château de la fleunie date du XIIe au XVe siècle. Son histoire est intimement liée aux Hospitaliers de Saint-Jean de Jérusalem qui devient plus tard l'ordre de Malte et dont la commanderie se trouvait à Condat, chef-lieu de l'ordre de Malte en Périgord. Ce sont les vicomtes de Turenne qui permirent aux Hospitaliers de Saint-Jean de Jérusalem de s'installer à Condat en remerciement des services rendus lors des premières croisades. C'est en 1128, que fut créé, en Palestine, l'ordre religieux et militaire des Templiers. Ils entrèrent à plusieurs reprises en conflit avec les hospitaliers qui avaient comme eux des commanderies en Europe et en Palestine. Au fil des siècles, le château de la Fleunie devient une demeure d'agrément habitée par les seigneurs locaux, propriétaires de vastes étendues autour du château dédiées à la culture de la vigne et à l'élevage. Une des entrées de la cour intérieure est ornée de grappes de raisins sculptées dans la pierre marquant ainsi l'entrée des chais du château et les écuries de l'époque sont devenus aujourd'hui une vaste salle de réception où sont organisés banquets, mariages et séminaires.","architecture":"FLEUNIE, bâti aux XIIe et XVe siècles sur la rive gauche de la Vézère, le château de la Fleunie fait face au château de la Petite Filolie établi sur l'autre rive. Ce château est mentionné (Mansus de la Frunya) dès 1406. Il avait en 1760 haute justice sur deux villages dans Condat. Il se compose d'un logis flanqué de tours rondes, orné de lucarnes Renaissance et prolongé en équerre par une aile flanquée d'une tour à mâchicoulis. \r\nChâteau de la Fleunie est devenu un hôtel-restaurant 3 étoiles renommé. Après une importante restauration, en 1990, c'est connu sous le nom de 'Château la Fleunie\" avec l'adjonction d'une partie contemporaine. La salle de restaurant, avec ses poutres en bois décorées à la main.","habitants":"Hospitaliers de Saint-Jean de Jérusalem\r\n        \"","divers":"A Condat sur Vézère; Fleunie GPS : 45° 05' 34\" Nord, 1° 13' 21\" Est","gps":"45° 05' 34\" Nord, 1° 13' 21\" Est","images":["../image/image_24/24_Fleunie_1.jpg","../image/image_24/24_Fleunie_2.jpg","../image/image_24/24_Fleunie_3.jpg","../image/image_24/24_Fleunie_4.jpg","../image/image_24/24_Fleunie_5.jpg","../image/image_24/24_Fleunie_6.jpg"]},"Consult_chateau_formulairef605":{"id":"Consult_chateau_formulairef605","dept":"24","canton":"le Bugue","commune":"Fleurac","nom":"Fleurac","type":"Château","periode":"XVI-XIX","histoire":"Cinq châteaux à Fleurac, de Malbec, de Cluzeau, de Peuch, de Souffron; Fleurac et Souffron sur article suivant.                                                                 MALBEC des XVIe et XIXe siècles ;  Il fut la propriété d'une famille répondant aux noms de seigneur de Malbec, de Pech Alvet, de Fleurac, de la Grange et de Lapeyrière. La première mention de cette famille est au XVIe siècle, c'est-à-dire sous les règnes de François 1er et Henri II, et accompagnée de la qualification de noble et écuyer. Un certain Jacques de Malbec se maria avec Marguerite Laumond, ils eurent quatre enfants baptisés à Fleurac, entre 1680 et 1690. Ce Jacques de Malbec devait être officier, puisquil est indiqué quun jour, il reçut une lettre du lieutenant général lui ordonnant de rejoindre immédiatement son régiment. Un autre seigneur de Malbec figure dans les Jugements et Intendants de Bordeaux de 1697 à 1718. Plus tard, en1789, un membre de cette famille paraît dans les listes de votants pour les députés de la noblesse aux Etat-Généraux à la veille de la Révolution. Cette famille de Malbec était toujours à Fleurac au XIXe siècle.\r\nCLUZEAU , fut la demeure des familles du Barry et de la Roche-Aymon. Cette illustre famille est connue dès le XIIe siècle. Une de ses branches donna à l'église des prélats imminents dont Charles-Antoine de la Roche Aymon, évêque de Narbonne et archevêque de Reims. A ce titre, il eut le privilège de baptiser, marier et sacrer le roi  Louis XIV.\r\nPEUCH   Il y a peu de documents aux archives avant le XVIIIe siècle sur le château du Peuch. Il appartenait alors à une très riche famille, il fut habité au XIXe siècle par un membre de la famille de Beavoyre (le frère de Dominique de Beauvoyre, du château de Fleurac  qui le revendit ensuite.","architecture":"CLUZEAU, des XVIe et XVIIIe siècles  se trouve dans une combe perdue au milieu de nulle part.  Ce petit manoir bâti au XVIe siècle sur une falaise déjà occupée par des constructions troglodytiques.  Il n'a aucune valeur historique, mais une esthétique simple et harmonieuse.                                                       MALBEC, édifice de plan rectangulaire à deux niveaux toit à deux pans accolés de tours rondes dont une arrasée  et crénelée et une carrée.                                PEUCH,  ce château fut incendié en mars 1754 par des inconnus,  le corps de logis de plan recrtangulaire sur soubassement à deux niveaux et série de lucarnes sur un toit en croupe accolé de chaque flanc de tour ronde toit en poivrières avec mâchicoulis et sur l'angle une échauguette sur encorbellement toit en poivrière et l'autre tour à l'opposé du bâtimentse termine  en terrasse crénelée.","habitants":"Famille de Jacques de Malbec                                    Famille des du Barry \r\n        \"","divers":"Cinq châteaux à Fleurac, de Malbec, de Cluzeau grav-4, de Peuch grav 1-2 3, Fleurac-Malbec Grav 5-6  GPS : 45° 00' 31\" Nord, 1° 00' 09\" Est","gps":"45° 00' 31\" Nord, 1° 00' 09\" Est","images":["../image/image_24/24_Fleurac_1.jpg","../image/image_24/24_Fleurac_2.jpg","../image/image_24/24_Fleurac_3.jpg","../image/image_24/24_Fleurac_4.jpg","../image/image_24/24_Fleurac_5.jpg","../image/image_24/24_Fleurac_6.jpg"]},"Consult_chateau_formulaireb5dd":{"id":"Consult_chateau_formulaireb5dd","dept":"24","canton":"le Bugue","commune":"Fleurac","nom":"Fleurac_Souffron","type":"Château","periode":"XV-XVII","histoire":"FLEURAC, du millionnaire Vincent Miclet et de lanimatrice de télé Ayem Nour, sécurisée et rénovée à grands frais, est à nouveau sur le marché        On y trouve dès le XVIIe siècle la famille de Saint-Exupéry. Elle fut très nombreuse en Périgord, où elle apparaît du début du XIIIe siècle, vers 1231.  Un premier document permet de la signaler à Fleurac, par le mariage, le 10 juin 1624, de Jacques de-Saint-Exupéry avec Jeanne de-Lavermondie. Cent ans plus tard les de-Saint-Exupéry sont encore là, puisque en 1734 \"Suzanne, fille héritière de J.J. de-Beaudet, seigneur de Cordon, donna sa main à Etienne-Jacques, Marquis de Saint-Exupéry, seigneur de Fleurac. Le mariage religieux fut béni en l'église de Bourniquel le 2 mars 1734. (Suzanne était née en 1717, elle avait donc 17 ans).  Ils eurent un fils, Jean-Balthazar, Marquis de-Saint-Exupéry aïeul et bisaëul de \"messieurs de-Saint-Exupéry vivant en Périgord et Agenais\". \r\n Le château fut ensuite vendu à la famille de-Beauroyre, qui le garda jusqu'en 1884, date à laquelle madame Normand l'acquit de M. Dominique de-Beauroyre. \r\n  SOUFFRON, placé en vigie sur un promontoire, il ne reste de la construction initiale qu'une jolie tour renfermant un escalier et une partie des murs du séjour.   Il a été restauré et agrandi au XIXe siècle.   Il a appartenu aux Villemonte de la Clergerie. Au XVIIIe siècle, le seigneur du lieu était maître de forge. Une famille Souffron, originaire de ces lieux aurait émigré au USA.","architecture":"FLEURAC, ste civil immobilière pas d'autre informations le fleuron de l'architecture néogothique du XIXe siècle,  de plan en T,  à trois niveaux avec série de lucarnes sur toits très inclinés recouvert d'ardoises, reconstruit fin du XIXe siècle. Pavillons sur deux angles avec mâchicoulis, chemin de rondes, idem pour la tour ronde dans l'angle intèrieur toit en poivrières, avec sur angles du bâtiment se  terminant par un pignon crenelé avec fenêtres jumenées, pas d'autre informationt le fleuron de l'architecture néogothique du XIXe siècle, reconstruit fin du XIXe siècle. Transformé en hôtel restaurant.                                                    SOUFFRON, le Périgord ne retrouve son calme quavec la fin des révoltes de croquants, qui éclatent de manière sporadique, mais violente, de la fin du XVIe siècle au XIXe siècle. Pendant cette période, plusieurs châteaux sont bâtis sur la commune de Fleurac. Placé en vigie sur un promontoire, il ne reste de la construction initiale qu'une jolie tour renfermant un escalier et une partie des murs du séjour, Il a été restauré et agrandi au XIXe siècle. Les magnifiques communs témoignent de l'importance du domaine qui a comporté jusqu'à cinq cents hectares. . Au XVIIIe siècle, le seigneur du lieu était maître de forge. Le château de Souffron a beaucoup souffert de la Révolution, mais reste une charmante demeure. Lemoulin, établi sur le \"Manaurie\", a certainement fait partie du domaine.","habitants":"Famille de Saint-Exupéry                                           Villemonte de la Clergerie\r\n        \"","divers":"A Fleurac; Souffron  GPS : 45° 00' 31\" Nord, 1° 00' 09\" Est","gps":"45° 00' 31\" Nord, 1° 00' 09\" Est","images":["../image/image_24/24_Fleurac_Souffron_1.jpg","../image/image_24/24_Fleurac_Souffron_2.jpg","../image/image_24/24_Fleurac_Souffron_3.jpg","../image/image_24/24_Fleurac_Souffron_4.jpg","../image/image_24/24_Fleurac_Souffron_5.jpg"]},"Consult_chateau_formulaire5755":{"id":"Consult_chateau_formulaire5755","dept":"24","canton":"Verteillac","commune":"Cercles","nom":"Fongrenon","type":"Forteresse","periode":"XV","histoire":"FONGRENON,  le château de Fongrenon était le fief des familles des Achard, des Dejean de Jovelle puis des Joussain.  En 1350, les anglais attaquent le château puis l'occupent. En 1356, pour le compte du Roi de France, une armée commandée par Du Guesclin reprend le château. En 1369, le site est possession de la famille Bourdeuille.  Au début du XVe siècle, le château est le siège d'une Baronnie. Dans la deuxième moitié du XVIe siècle, le célèbre chroniqueur Pierre de Bourdeille dit Brantôme séjourne au château de sa grand-mère. Durant la deuxième moitié du XVIe siècle, au cours des Guerres de Religion, les protestants attaquent puis détruisent partiellement le château. Au milieu du XVIIe siècle, durant la Fronde, la ville et le château sont attaqués.Vers 1792, les révolutionnaires réquisitionnent le château et le vendent comme bien national à plusieurs familles   Liste des propriétaires : Comtes d'Angoulême, La Tour, Bourdeuil, De la Brousse, Saint Maure, Labrousse Verteillac, Dennery.","architecture":"FONGRENON, la forteresse est posée sur une butte aplanie. Au sommet trône fièrement un puissant château. La château a une forme quadrangulaire. Deux des 4 cotés ont gardé une magnifique et massive allure médiévale. En avant du quadrilatère existe une plateforme. Construit aux XIe siècles en calcaire du pays, pierre de taille, moellon et tuiles creuses, le style régulier des 3 façades subsistantes prouvent qu'autrefois il était isolé sur la butte et que les autres parties furent bâties postérieurement  Au début du XIIIe siècle, construction d'un véritable château fort avec un puissant donjon. Au XVIIe siècle, un logis de type \"Renaissance\" est construit. Un temps condamné à la destruction, Au XIXe siècle, le logis Renaissance est détruit au profit d'un bâtiment plus confortable. il fut finalement restauré au XXe siècle et son donjon inscrit aux M.H. en 1906. Il ne reste aujourd'hui de ce château que des vestiges, dont le solide donjon carré percé de meurtrières est considéré comme le plus ancien de France. En ce début de XXe siècle, des consolidations et reconstructions sont réalisées pour réhabiliter cette beauté médiévale. En 1970, l'intérieur du donjon est incendié accidentellement.","habitants":"Famille Bourdeuille\r\n        \"","divers":"A Cercles; Fongrenon","gps":"","images":["../image/image_24/24_Fongrenon_1.jpg"]},"Consult_chateau_formulaired839":{"id":"Consult_chateau_formulaired839","dept":"24","canton":"Savignac les Eglises","commune":"Cornille","nom":"Forèt_Cornille","type":"Château","periode":"XV-XVII","histoire":"FORET, le domaine appartenait aux du Puy, vieille famille périgourdine qui possédait à Périgueux un remarquable hôtel, devenu le logis Saint Front. Centre équestre, haras de la Forêt. L'enceinte a conservé son châtelet à mâchicoulis Lancé par Jacques Hourcabie, ancien maire et obstétricien connu dans le vaste monde, et Laurence Hourcabie, cavalière chevronnée, ce domaine sera vendu pour des raisons purement personnelles.  Un restaurant complète cet ensemble qui sétait lui-même créé, il y a une dizaine dannées, dans le périmètre du château de la famille Hourcabie et du haras de la Forêt, prodigue en rendez-vous équestres.","architecture":"FORET manoir du XVe siècle avec une tour circulaire et une tour carrée à mâchicoulis très remanié au XVIIIe siècle. Comme toutes les villes du Périgord, la commune souffre de la guerre de cent ans. Les combats opposant les armées françaises et anglaises commencent en 1337 et se terminent en 1453, avec la victoire française lors de la bataille de Castillon. Durant cette époque de troubles, les habitants cherchent à se protéger, en construisant notamment des maisons fortes comme celles de la Fayardie et de la Forêt. Malgré les affrontements, Cornille reste un point de passage sur la route du pèlerinage de Saint-Jacques-de-Compostelle. Le château de La Forêt, autrefois défendu par des douves, a été très restauré au XVIIe siècle. Le logis à lucarnes s'accoste d'une tour circulaire et également d'une tour carrée à mâchicoulis et chemin de ronde, avec une belle porte sculptée datant du XVe siècle. L'enceinte a conservé son châtelet à mâchicoulis . Cornille où le Parc de la Forêt aligne, au fond des bois, les 48 chalets de son village-vacances agrémenté de piscines et pièces deau.","habitants":"Jacques Hourcabie\r\n        \r\n        \"","divers":"A Cornille; château de la Forêt","gps":"","images":["../image/image_24/24_Foret_Cornille_1.jpg","../image/image_24/24_Foret_Cornille_2.jpg","../image/image_24/24_Foret_Cornille_3.jpg","../image/image_24/24_Foret_Cornille_4.jpg"]},"Consult_chateau_formulaire9906":{"id":"Consult_chateau_formulaire9906","dept":"24","canton":"Carlux","commune":"Ste-Mondane","nom":"Fénélon","type":"Forteresse","periode":"XIII-XVVI","histoire":"FENELON, en 1360, de par le traité de Brétigny, le château devient inféodé à la couronne d'Angleterre. En 1375, les français s'en emparent.  En 1375  confié par le duc d'Anjou  au capitaine Jean de Massaut,  il emprunte la branche cadette des Salignac, en 1445 Jean de Salignac son successeur panetier de Louis XI et Bertand de Salignac, ambassadeur auprès de la cour d'Angleterre pour Charles IX fait reconstruire le château,  au XVIe siècle Pons de Salignac qui hérite en parties des dettes épouse en seconde noce Louise  de la Cropte-Chanterac parent de François Ier de Salignac de la Mothe-Fénelon prélat et écrivain dépense sa fortune pour  suivre les travaux, en 1780  après 250 ans les Salignac se défont du château  le cède au fermier, général Jean-Baptiste de Bouillac de Bourzac et en 1859 le comte de Malleville achète le domaine  puis passa dans des mains de propriétaires successifs et racheté par la famille Delautre.  Inscrit aux M.H. en 1927, il est classé en 1962.\r\na un kilomètre au nord-ouest à Calviac en Périgord  le château dit Gard.    GARD, la construction date du XIXe siècle, fut une ancienne demeure de la famille Saint-Marc.  Ce fameux palais construit au XVIII° siècle pour madame de Pompadour à la demande du roi Louis XV.","architecture":"FENELON  du XIV-XVe siècles est flanqué de quatre  tours jumelées entouré d'une enceinte médiévale et d'une enceinte extérieure dans le style Vauban, remanié au XVIIe siècle. Les parties visibles les plus anciennes du château remontent au XIIe siècle. Une première enceinte s'ouvre à l'ouest par un châtelet d'entrée. À l'est, un second châtelet, complètement à l'opposé du premier, permet de franchir la deuxième enceinte. Le passage du premier châtelet vers le second ne pouvant s'effectuer que par la gauche, les assaillants sont obligés, dans leur progression, de présenter aux défenseurs leur côté droit, non protégé par le bouclier. Les deux châtelets, pourvus de mâchicoulis, possèdent chacun une bretèche et une canonnière. Au sud, une troisième enceinte protégeait la basse-cour. Le château lui-même présente plusieurs tours circulaires et ses toits ont conservé leur couverture en lauzes. L'accès s'effectue au nord-est par un pont-levis. Initialement, ce pont-levis était accessible par un talus remplacé au XVIIe siècle par un escalier double. Au-delà s'ouvre une cour, à l'est de laquelle se trouve, dans une tour, la chapelle du XIIIe siècle. Trois dépendances extérieures au château sont également inscrites depuis 1962 : la ferme de la Condamine, la maison de la nourrice et la métairie de Fraysange À la Révolution française, le château sert de magnanerie. En 1966, après le passage d'un avion supersonique, l'une des tours de l'enceinte sud s'écroule. \r\nGARD  Il est de style classique, la conception de la façade du château du Gard parait être inspirée du petit Trianon,","habitants":"Général Jean-Baptiste de Bouillac de Bourzac      Gard  Famille Saint-Marc\r\n        \"","divers":"A Ste-Mondane château de Fénélon grav de 1 à 8  GPS : 44° 50' 44\" Nord et 1° 20' 12\" Est.","gps":"44° 50' 44\" Nord et 1° 20' 12\" Est.","images":["../image/image_24/24_F%c3%a9n%c3%a9lon_1.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_2.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_3.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_4.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_5.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_6.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_7.jpg","../image/image_24/24_F%c3%a9n%c3%a9lon_8.jpg"]},"Consult_chateau_formulaire5e6e":{"id":"Consult_chateau_formulaire5e6e","dept":"24","canton":"Sigoulès","commune":"Gageac et Rouillac","nom":"Gageac","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Gageac Rouillac celui de Gageac et de Perrou.                                                                      GAGEAC, la possession d'Arnaud II de Durfort, entrera ensuite dans la famille d' Essenault de Castelnau, puis dans la famille de Reclus. Au terme de ce conflit, de la guerre de cent ans l'édifice tombera finalement dans l'abandon pendant de nombreuses années avant que Michel de Chassaignes, seigneur de Génissac, n'en fasse l'acquisition en 1490. Depuis maintenant plus de six générations, Élie de Reclus, fils de Pierre et d'Anne Chevallier, était seigneur de Lespinasse, de Saint-Mayme, baron de Gageac. Marié en 1725 à Marie-Élisabeth de Roche de Tude, fille de Jean-Marie de La Roche et de Marie-Rose de Prune qui lui donne quatre enfants, dont : François-Joseph de Reclus, né à Périgueux en 1748, seigneur de Lespinasse, Saint-Mayme, baron de Gageac. Il servit dans la première compagnie des mousquetaires et mourut en 1792 en laissant au moins un fils.  En 1824, il va devenir la propriété de Michel Doussault de la Primaudière. Aujourd'hui propriété de la famille de la Verrie de Vivans. Depuis le 27 septembre 1948, cet édifice est inscrit à linventaire des M.H..                                       PERROU, bâtie sous le règne de Louis XIII .En 1558, Jeanne de Fayolles apporte par mariage cette terre à la famille de Brianson qui va faire construire la demeure et lhabiter jusquau XIXe siècle. Dès le XVe siècle, les titres font mention du fief de Perrou qui rendit à la foi hommage des seigneurs de Rouillac et de Gardonne. En 1829, Perrou change de main, vendu par le second fils de François Léonard de Brianson à son cousin germain François-Eléonor de Madaillan. Puis en 2002, la famille Ponton dAmécourt rachète les terres aux enfants dAmaury de Madaillan, ancien maire de la commune.","architecture":"GAGEAC manoir remanié aux XVI-XVIIe siècles avec deux tours carrées du XIVe siècle et enceinte crénelée. A l'origine, existait uniquement en ce lieu une tour carrée, en pierre, appelée  «donjon». Cette construction, déjà point stratégique, était entourée de fortifications en bois. Dominant la plaine de Gardonne, cette tour, située à l'ouest du château, Le corps du logis, relativement imposant, fut rajouté au XIVe siècle. Cette extension a été complétée vers 1650 par une seconde tour carrée, donnant ainsi son harmonie à l'ensemble de la construction. Des douves sèches entourent les bâtiments à lest, au sud et à louest, tandis que la partie nord, aujourd'hui asséchée, était à l'époque occupée par des marécages. Une enceinte crénelée, munie dun chemin de ronde et flanquée déchauguettes défend lensemble de lédifice. Le château de Gageac a traverser de nombreuses et sombres périodes de la guerre de cent ans commencée en 1345.                                               PERROU, a lorigine, cette construction possédait de hautes toitures, remplacées dans les années 1800 par des toits à la Mansart. De massifs pavillons flanquent aujourdhui ses extrémités, et des lucarnes en pierre surmontées de frontons en demi-lune éclairent les parties hautes de la bâtisse.","habitants":"Gageac Michel de Chassaignes                                    Perrou  famille de Brianson\r\n        \"","divers":"A Gageac et Rouillac; Gageac  grav de 1GPS : 44° 47' 58\" Nord et 0° 20' 35\" Est. Perrou grav 2_3, Saussignac  grav 3 à 7","gps":"44° 47' 58\" Nord et 0° 20' 35\" Est. Perrou grav 2_3, Saussig","images":["../image/image_24/24_Gageac_1.jpg","../image/image_24/24_Gageac_2.jpg","../image/image_24/24_Gageac_3.jpg","../image/image_24/24_Gageac_4.jpg","../image/image_24/24_Gageac_5.jpg","../image/image_24/24_Gageac_6.jpg","../image/image_24/24_Gageac_7.jpg"]},"Consult_chateau_formulaire76a7-2":{"id":"Consult_chateau_formulaire76a7-2","dept":"24","canton":"Villamblard","commune":"St-Martin des Combes","nom":"Gaubertie","type":"Château","periode":"XV","histoire":"GAUBERTIE,  En 1370 propriété de la famille Gaubert, au XVe siècle la construction du château  passa au Fayolle et par alliance de  Philippa de Fayolle à Jean  d'Abzac en 1428,  en 1445 leur fille l'apportera à Jean de Véra et son épouse Marie d'Abzac qui entreprendra la construction du château dans cette famille des Véra de la Gaubertie jusqu'au XVIIe siècle, la fille héritière Jeanne qui épouse Guillaume de Rochon de la Peyrouse, veuve , elle convole en 1685 avec Pierre-Joseph de Cheyron. Le 17 mars a été célébré le mariage de Mlle Yvonne du Cheyron du Pavillon, fille du feu comte Paul du Cheyron du Pavillon et de la comtesse, née Gouhé de Lusignan, avec M. Henry O`Byrne, lieutenant au 53e régiment dinfanterie, fils de M. O`Byrne et de madame, née du Bourg.\r\nMlle Yvonne du Pavillon appartient à une famille très justement estimée en Saintonge. L'abbé Joseph du Pavillon, au moment de la Révolution, grand-vicaire de l'èvêque de Saintes, fut déporté en rade de l'île dAix, vicaire général à Périgueux le 7 novembre 1823, il mourut à l'age de 84 ans. Son frère, le chevalier du Pavillon, capitaine de vaisseau en 1777, fut le créateur de la tactique navale des signaux maritimes de jour et de nuit et fut tué le 12 avril 1782, sur le Triomphant, quil commandait.\r\nLe château reçut à plusieurs reprises la visite du philosophe Maine de Biran, ainsi que celle en 1913 de Charles de Foucauld, lors de son séjour de quelques mois en France.","architecture":"GAUBERTIE, à l'origine, château fort  reconstruit au XVe siècle  une maison forte du nom de la Borie, dépendante des seigneurs de Clermont était implantée face au château de Clermont, de l'autre côté du vallon irrigué par le ruisseau les Carbonnières, à quelques centaines de mètres de la route menant de Vergt à Bergerac. C'est sur l'emplacement de cette ferme fortifiée qu'est bâti à la fin du XVe siècle le château de la Gaubertie.  Ayant eu à souffrir lors des guerres de religion, il est restauré au XVIIe siècle et une chapelle lui est alors ajoutée. À la fin du XIXe siècle, les intérieurs et les communs sont rénovés. Le château de la Gaubertie est formé d'un logis rectangulaire du XVIe siècle à deux niveaux avec lucarnes sur un toit en croupes recouvert de tuiles, à gardé ses mâchicoulis sur consoles  orienté du nord-est au sud-ouest. Il est encadré par trois tours, une carrée à l'angle sud avec toit en pavillon et deux circulaires aux angles ouest et nord, l'angle oriental étant orné d'une tourelle. Le logis et les tours sont entourés de mâchicoulis soutenant le chemin de ronde couvert. Entouré de remparts dont l'accés était défendus par un châtelet et dont le seul vestige est aujourd'hui un mur de soutènement de la terrasse dont la construction nécessita  le comblement des fossés.","habitants":"Famille du Cheyron du Pavillon\r\n        \"","divers":"A St-Martin des Combes; Gaubertie grav de 1 à 3, Clermont-Beauregard grav 4-5, St-Martin des Combes grav 6-7","gps":"","images":["../image/image_24/24_Gaubertie_1.jpg","../image/image_24/24_Gaubertie_2.jpg","../image/image_24/24_Gaubertie_3.jpg","../image/image_24/24_Gaubertie_4.jpg","../image/image_24/24_Gaubertie_5.jpg","../image/image_24/24_Gaubertie_6.jpg","../image/image_24/24_Gaubertie_7.jpg"]},"Consult_chateau_formulaire7668":{"id":"Consult_chateau_formulaire7668","dept":"24","canton":"Verteillac","commune":"Gout-Rossignol","nom":"Gout_Rossignol","type":"Château","periode":"XVIII","histoire":"A Gout-Rossignol le château de Jaurias, XVIIIe et XIXe siècles, de la Vassaldie, XVIIIe siècle, inscrit aux M.H,  manoir de Bouillaguet, XVIIIe siècle. manoir de Mitonias, XVIIIe siècle.\r\nVASSALDIE, le château actuel aurait été construit entre 1706 et  1714. Le château de la Vassaldie doit son nom à une famille noble, les Vassal. Construit à l'emplacement d'un manoir médiéval englobé à l'intérieur des communs du côté est, il fut la maison de maître d'un domaine viticole, dont la production persista jusque dans la première moitié du XXe siècle. Les décors intérieurs et la distribution ont été modifiés à la fin du XIXe siècle, ainsi que la cage d'escalier, autrefois au centre, fut déplacée, et un couloir fut crée du côté méridional, à l'étage. Cette demeure classique établie au sommet d'un léger coteau, comprend un corps de logis central à un étage carré flanqué de deux pavillons ; l'ensemble est orienté au sud et donne sur une grande cour. Le corps de logis central est surmonté d'un fronton semi-circulaire agrémenté d'un cartouche rectangulaire en creux en relief côté jardin. Le bâtiment, couvert d'un toit à deux pans brisés masqué par une balustrade en pierre, est flanqué de deux pavillons rectangulaires au toit mansardé, percés par deux lucarnes décorées de volutes et sommées d'un fronton rond en coquille. Lesbâtiments propres à l'exploitation viticole se développent de façon rationnelle.\r\n  JAURIAS, il date du XVIIIe et XIXe siècles. Le château de Jaurias a été construit en 1760 par Léonard Aubin, écuyer, sieur du Tranchard, conseiller-secrétaire du roi, peu de temps avant sa mort. Son fils Denis-François, ancien mousquetaire, ayant émigré à la Révolution, il sera vendu comme bien national. Le château fut bati aux alentours de1770 par Denis Aubin de Jaurias, mousquetaire de la garde du roi.","architecture":"JAURIAS  il remplaça sans doute un manoir du XVIe siècle.  Le corps de bâtiment principal a été agrandi au XIXe siècle, un certain nombre de communs ont été rasées après l'établissement du cadastre napoléonien (ils formaient encore en 1825 une cour fermée). Le corps de logis en pierre de taille et moellon de calcaire enduit,se compose d'un étage carré et d'un étage de comble protégés par un toit à longs pans à croupes couvert d'ardoises. Sept travées rythment les deux façades, présence de lucarnes à volutes sur la toiture. Ajouté au XIXe siècle, un pavillon à balustres percé d'ouvertures prolonge le pignon sud-est du château, cette nouvelle aile était une orangerie. \r\n MITOUNIAS, du XVIIIe siècle. Il a été habité par la famille de Sarlandie. Il passa ensuite aux héritiers de la famille de Jaurias. L'entrée se fait par une porte charretière en anse de panier, accompagnée d'une porte piétonne percée dans le mur de clôture. Le logis, en retour d'équerre, est à 1 étage, surmonté de comble et jouxté par une grange-étable. Une cour et un jardin, comporte un pigeonnier de plan circulaire qui complètent le bâti.","habitants":"Famille de Vassaldie                                              Jaurias famille de Léonard Aubin                               Mitounias  famille de Sarlandie\r\n        \"","divers":"A Gout-Rossigno; Gout  Jaurias grav 1 GPS : 45° 24' 45\" Nord, 0° 24' 43\" Est                                           Mitounias  GPS : 45° 24' 18\" Nord, 0° 24' 09\" Est                                                                                Vassaldie grav 2-3GPS : 45° 25' 30\" Nord, 0° 23' 30\" Est","gps":"45° 24' 45\" Nord, 0° 24' 43\" Est","images":["../image/image_24/24_Gout_Rossignol_1.jpg","../image/image_24/24_Gout_Rossignol_2.jpg","../image/image_24/24_Gout_Rossignol_3.jpg"]},"Consult_chateau_formulaire60fe":{"id":"Consult_chateau_formulaire60fe","dept":"24","canton":"Montagrier","commune":"Grand Brassac","nom":"Grand_Brassac","type":"Château","periode":"XIV-XVI","histoire":"Au Grand-Brassac trois châteaux celui de Bouchillon du XIXe siècle, de Marouatte du XIIIe au XIXe siècle; de La Boissière chambre d'hôtes, de Montardy et  De la Pauze du XIXe siècle.\r\nMONTARDY, du XIVe, XVIIIe et XIXe siècles, inscrit depuis 2001 au titre des M.H. , extérieurs visitables,  est un ancien manoir  qui a été bâti au XIVe siècle et a souffert d'un incendie au XVIe siècle. Il devient la propriété de la famille du Lau d'Allemans en 1600.   À la Révolution, tout ce qui peut rappeler la féodalité (donjon, créneaux) est détruit. Seul reste un vaste logis qui en 1871 est incendié, entraînant la destruction de son aile orientale.  \r\nBOUCHILLON,  ancienne propriété des Bosredon pas d'information historique.\r\nMAROUATTE, est un château dont les parties les plus anciennes ont été édifiées du XIIIe au XVIe siècle.  C'est le fief des familles Montagrier puis Chabot de Jarnac. À la fin du XVIe siècle, Guy de Chabot, baron de Jarnac, connu pour sa paillardise, fut à l'origine d'un dicton : « À Marouatte, le diable fait sabbat ». En grande partie détruit à la Révolution, le château sert alors de carrière de pierres. Maxime Dannery, architecte des M.H. de la Dordogne, le restaure au XIXe siècle.","architecture":"BOUCHILLON, le logis actuel a été construit au XIXe siècle. Logis formé d'un corps central carré, cantonné de deux pavillons rectangulaires, légèrement en saillie sur la façade sud. Au nord, le corps central forme une large avancée adoucie par deux tours en quart de cylindre. Cette avancée donne sur une terrasse à balustrade et un escalier droit. L'ensemble est composé d'un étage de soubassement, d'un rez-de-chaussée surélevé, un étage carré et un étage de combles éclairé de chiens assis. Le corps central est recouvert d'un toit à croupe, les corps latéraux de toits en pavillon et les tours de toits coniques. La façade sud présente cinq travées.                                       MONTARDY, l'accès au domaine s'effectue à l'ouest par un porche qui pénètre à travers les dépendances. Au-delà du portail, une vaste esplanade mène à l'aile ouest au centre de laquelle le portail du logis est précédé d'un pont. Cette aile est flanquée de deux tours-pavillons, celle du sud faisant le lien avec l'aile sud du logis. Les deux ailes perpendiculaires délimitent en partie une grande terrasse bornée au sud-est par une échauguette. Les ailes sud et ouest du logis sont restaurées au XIXe siècle. \r\nMAROUATTE Une vaste enceinte renferme les dépendances et un pigeonnier. À la pointe sud de cette enceinte se situe le château en lui-même, composé de deux logis, d'un donjon et d'une chapelle, le tout entouré d'une seconde enceinte aux angles de laquelle se trouvent quatre tours rondes crénelées.","habitants":"Montardy  Famille du Lau d'Allemans                       Marouatte Guy de Chabot, baron de Jarnac\"","divers":"A Grand Brassac; Bouchillon  grav 1 GPS : 45° 18' 13\" Nord, 0° 29' 22\" Est.                                       Marouatte  grav 2-3 GPS : 45° 19' 05\" Nord, 0° 31' 12\" Est.                                                                            Montardy Grav 4 à 8  GPS : 45° 17' 29,7\" Nord, 0° 26' 33,3\" Est. Laboissière grav 9","gps":"45° 18' 13\" Nord, 0° 29' 22\" Est.","images":["../image/image_24/24_Grand_Brassac_1.jpg","../image/image_24/24_Grand_Brassac_2.jpg","../image/image_24/24_Grand_Brassac_3.jpg","../image/image_24/24_Grand_Brassac_4.jpg","../image/image_24/24_Grand_Brassac_5.jpg","../image/image_24/24_Grand_Brassac_6.jpg","../image/image_24/24_Grand_Brassac_7.jpg","../image/image_24/24_Grand_Brassac_8.jpg","../image/image_24/24_Grand_Brassac_9.jpg"]},"Consult_chateau_formulaire7d88":{"id":"Consult_chateau_formulaire7d88","dept":"24","canton":"Villambard","commune":"Saint-Julien du Crempse","nom":"Grand_Vignoble","type":"Château","periode":"XV","histoire":"Manoir du Grand-Vignoble du XVIIe siècle, un premier château se trouvait à son emplacement jusqu'au XVe siècle, moment de sa destruction par les anglais. Il ne possédait ni tours, ni créneaux. Le plus ancien propriétaire connu se nommait M. de Conseil, président au parlement de Bordeaux , mentionné en 1759 comme seigneur du domaine. Ce bâtiment a été fortement modifié dans le dernier siècle pour devenir un hôtel. Mais la partie principale est toujours en place, sans grandes modifications.","architecture":"Grand  VIGNOBLE, édifié au plus haut du village de Saint-Julien-de-Crempse, ce lieu date  du XIVe siècle, où l'abbé Brugière précise, « un petit château sans tour, ni créneau ». Il fut détruit au XVe siècle par les anglais. Au XVIIe siècle, un château fut rebâti à l'emplacement des ruines du petit château médiéval. Certaines rumeurs parlent d'une ville forte anglaise qui se trouvait à cet endroit, mais aucun élément ne peut le confirmer.  Il fut  peu modifié au cours des siècles, hormis entre 1843 et 1877. Les communs qui l'entouraient ont été abattus en grande partie. Dans les années 1980, le bâtiment est transformé en hôtel-restaurant, et de nouveaux bâtiments sont édifiés à la place des anciens.","habitants":"M. de Conseil,\r\n        \"","divers":"A Saint-Julien du Crempse Grand-Vignoble GPS : 44° 57' 10\" Nord, 0° 31' 31\" Est","gps":"44° 57' 10\" Nord, 0° 31' 31\" Est","images":["../image/image_24/24_Grand_Vignoble_1.jpg","../image/image_24/24_Grand_Vignoble_2.jpg","../image/image_24/24_Grand_Vignoble_3.jpg"]},"Consult_chateau_formulaireca36":{"id":"Consult_chateau_formulaireca36","dept":"24","canton":"Montignac","commune":"Saint-Amant de Coly","nom":"Grande_Filolie","type":"Château","periode":"XV","histoire":"La GRANDE-FILOLIE, a appartenu à une famille de robe  de Montignac, les Beaulieu. On connaît Antoine de Beaulieu qui rend hommage en 1479 pour la maison noble qui se trouvait au bout du pont de Montignac qui appartenait à sa femme, Brandelys du Chesne. Son fils ou petit-fils, Antoine de Beaulieu, est dit seigneur de la Filolie en 1536. C'est le constructeur du château. En 1583, c'est Jean de Beaulieu, écuyer, « seigneur de la Filolie », qui prête hommage pour la maison de Montignac pour sa « maison noble du Chaisne ». Au premier quart du XVIIe siècle, Jean de Beaulieu, seigneur de la Filolie, se marie avec Hipolite Angèle de Salignac Fénelon, sur de Fénelon.  Le château est ensuite la propriété de la famille Gaubert. Nicolas de Gaubert épouse Jeanne Chapt de Rastignac au début du XVIIIe siècle. Celle-ci, devenue veuve en 1708, a été une bienfaitrice de l'hospice de Sarlat. Elle est encore propriétaire du château en 1746. Elle meurt en 1768.  En 1769, Dominique, marquis des Cars, est dit « seigneur de Gaubert de la Filolie, Fialès et autres places ».  Le château appartient à Dominique de Beauroyre, marquis de Villar, à la veille de la Révolution. Il meurt en 1792. L'inventaire après décès montre que l'essentiel du château sert pour l'agriculture. Il y a peu de pièces habitées. Les héritiers ne récupèrent le château qu'après la Révolution. Frédéric de Beauroyre, propriétaire du château en 1853, le vend en 1891 à Octave Rousselet. Ce dernier publie un article sur le château en 1892 mais le vend en 1905 à M. Babaud de Praisnaud de la Croze qui, lui-même, ne le garde que deux ans. Il est probablement le restaurateur du château. En 1907, Eugène Révillon naît au château. À sa mort en 1928, le château est vendu. Il a ensuite plusieurs propriétaires et aujourd'hui  aux Balouzet de Tigny.","architecture":"La GRANDE-FILOLIE, grand manoir du XVe siècle au XVIIe siècle. La partie la plus ancienne est le petit corps de bâtiment nord-est qui a un plan en L. Le vaste corps de bâtiment ouest bâti sur une vaste cave voûtée servant de cuvier a dû être construit au début du XVIIe siècle. Cette aile est flanquée de deux tours carrées. Le mur ouest est couronné de mâchicoulis avec des trous de tirs montrant l'insécurité dans la région. Côté cour, cette aile possède des lucarnes couronnées de frontons avec une coquille, ses toitures recouvertes de lauzes et ses tours à mâchicoulis en font un remarquable ensemble architectural.  En retour de cette aile, au sud-est, on trouve l'entrée avec un passage surmonté d'une bretèche. Elle se continue par la chapelle dédiée à Sainte-Marie de la Conception qui a dû être construite au XVIIe siècle. La chapelle est prolongée par un bâtiment servant de logement au concierge qui se termine par une tour couronnée de mâchicoulis et coiffée d'une haute poivrière. L'aile Est a été détruite après 1892. Le plan de 1892 montre que cette aile comprenait les communs, avec séchoir, atelier et boulangerie. Elle fermait la cour du château.","habitants":"Famille d'Antoine de Beaulieu\r\n        \"","divers":"A Saint-Amant de Coly Grande-Félolie grav de1 à 9 GPS : 45° 02' 40\" Nord et 1° 12' 38\" Est","gps":"45° 02' 40\" Nord et 1° 12' 38\" Est","images":["../image/image_24/24_Grande_Filolie_1.jpg","../image/image_24/24_Grande_Filolie_2.jpg","../image/image_24/24_Grande_Filolie_3.jpg","../image/image_24/24_Grande_Filolie_4.jpg","../image/image_24/24_Grande_Filolie_5.jpg","../image/image_24/24_Grande_Filolie_6.jpg","../image/image_24/24_Grande_Filolie_7.jpg","../image/image_24/24_Grande_Filolie_8.jpg","../image/image_24/24_Grande_Filolie_9.jpg"]},"Consult_chateau_formulairefbba":{"id":"Consult_chateau_formulairefbba","dept":"24","canton":"Saint-Astier","commune":"Grignols","nom":"Grignols_Chaulnes","type":"Forteresse","periode":"XIII","histoire":"A Grignols  Le château de Grignols, édifié à partir du XIIe siècle, dont les vestiges sont inscrits au titre des M.H. en 1928.\r\nLe château de Chaulnes, du début du XVIIIe siècle, fut la propriété de Paul Faure.\r\nCHAULNES, au XIIe siècle, la commune rayonne à léchelle du royaume en tant que berceau des comtes du Périgord. Grignols occupe une place stratégique au cur des différents conflits qui se succèdent, de la guerre de cent ans à la Fronde. Elle constitue un véritable enjeu pour le royaume de France. De ce passé tumultueux, il reste aujourdhui des éléments patrimoniaux remarquables. Au nord de Grignols, le château des Chaulnes appartenait à la famille de Solminihac.                                                            GRIGNOLS, vers 980 d'abord tenu par la famille de Grignols,  au XIIIe siècle par mariage, d'Hélie Ier de Talleyrand dont le petit fils Hélie II, qui épousera Agnès  fille et héritière d'Olivier seigneur de Talleyrand et Chalais, leur fils Raymond  Ier,  seigneur de Talleyrand- Grignols. A la fin du XVe siècle campagne d'agrandissement par Jean de Talleyrand , il appartiendra à la famille  jusqu'en 1883, après 6 siècles de possession de la même famille, à la mort du dernier héritier, le château change de propriétaire légué aux hospices de Chalais, revendu depuis, durant le XXe siècle, en fonction des multiples propriétaires, les vieux murs sont parfois réhabilités, parfois dégradés ou changés de fonction.","architecture":"CHAULNES, l'édifice conserve une grande cour inscrite dans un quadrilatère de logis et de communs du XVIIe siècle. Aux quatre angles existaient des pavillons plus élevés; trois d'entre eux subsistent, dont celui de la chapelle avec un portail classique. Demeure rénovée, sur un domaine de 160 hectares. Ferme d'application du lycée agricole de Périgueux. Sentier de randonnée sur place. Visite extérieure libre et gratuite, tous les jours et toute l'année.         GRIGNOLS, forteresse au XIIIe siècle, avec donjon du XIVe siècle, se composait au nord-ouest, au niveau inférieur, d'une enceinte englobant une partie du bourg de Grignols, avec trois portes dans les remparts pour accéder au reste du bourg. Plus à l'est, et à un niveau plus élevé se trouvait la basse-cour du château, entourée de remparts épais de deux mètres et hauts de huit à dix mètres. Le château lui-même, de forme triangulaire, formait la limite orientale des fortifications, séparé de la basse-cour par des fossés larges de sept mètres Au XVIe siècle, un logis Renaissance est aménagée. La famille Taillefer n'habite pas dans cette vieille forteresse médiévale, même si elle est modernisée. Au milieu du XVIe siècle, le site est élevé en comté. Vers 1652, durant les évènements de la Fronde, le château est partiellement démantelé par le capitaine Balthazar. Durant 2 siècles, le château est  transformé en carrière de pierres par les habitants environnants. Vers 1792, les révolutionnaires ne sont pas tendres ni respectueux avec cette fortification comtale.","habitants":"Chaulnes  famille de Solminihac                                 Grignols seigneur de Talleyrand- Grignols\r\n        \"","divers":"A Grignols, Grignols grav 1 à 4   GPS : 45° 04' 53,2\" Nord, 0° 32' 36\" Est.                                               Chaulnes grav de  5 à 7  GPS : 45° 05' 00\" Nord, 0° 32' 22\" Est","gps":"45° 04' 53,2\" Nord, 0° 32' 36\" Est.","images":["../image/image_24/24_Grignols_Chaulnes_1.jpg","../image/image_24/24_Grignols_Chaulnes_2.jpg","../image/image_24/24_Grignols_Chaulnes_3.jpg","../image/image_24/24_Grignols_Chaulnes_4.jpg","../image/image_24/24_Grignols_Chaulnes_5.jpg","../image/image_24/24_Grignols_Chaulnes_6.jpg","../image/image_24/24_Grignols_Chaulnes_7.jpg"]},"Consult_chateau_formulaire00d4":{"id":"Consult_chateau_formulaire00d4","dept":"24","canton":"Domme","commune":"Groléjac","nom":"Groléjac","type":"Château","periode":"XIV-XVII","histoire":"GROLEJAC, cité en 1283, au XIVe siècle construction d'un manoir dominant la Dordogne, le premier seigneur connue est Jean de Salignac, second fils de Raymond de Salignac et d'Alixe de Pérusse, Jean épouse en 1473 Catherine de Lauzières, fille  de Déodat maître d'hôtel de Charles VIII,   le ménage aura douze enfants dont Hélie  qui recueillera par héritage la seigneurie de Gaulejac, celle de la Motte de Massan, de Fénelon, de Mareuil, de Sainte-Mondane et de Canthenac. Groléjac passera à son fils Annet né de son mariage avec Catherine de Ségur de Puchagut-Pressac, lequel s'allie avec Anne de Mensignac qui lui apporte en dot la seigneurie de Poncie dans la paroisse de Saint-Jean d'Estissac.   Armand de Salignac ainé de la génération suivante lie ses destinées avec Judith de Beynac, fille de Geoffroy Barons. A la fin du XVIe siècle la seigneurie de Groléjac passe aux mains d'Antoinette de Chaunac-Lanzac, fille de Béraud et de Clémence du Pouget qui épouse en 1595 Armand de Gontaud  Saint-Geniès seigneur de Badefol,  Leur fils Jean de Gontaud marquis de Lanzac, laisse Grolejac à l'une de ses filles Marie alliée en 1665 à Pierre d'Estresse qui en 1720 Barthélémy d'Estresse céde la chatellenie à François d'Essac du Breuilh conseillé du roi dont la fille unique, Antoinette épouse en 1755 Thomas comte de Berthier capitaine des dragons de Noailles et conserveront le domaine jusqu'en 1849 qui passe aux des Record, passe ensuite en 1888 aux Guat des Lavelle fera l'objet de plusieurs cessions  avant d'être acquis par la famille Leclerc en 1972.","architecture":"GROLEJAC, surveillait la Dordogne entre Fénelon et Montfort. La construction du château de Groléjac date du XIVe au XVIIe siècle.  Plusieurs fois remanié, ce chateau comprend un corps central du XIVe siècle et deux ailes du XVIIe et XVIIIe, une toiture en ardoises de corrèze et une terrasse à balustres surplombant la Dordogne, dont il, subsiste que le corps de logis central, flanqués de deux tours rondes. Au XVIIIe siècle  se sont rajouté de part et d'autre du logis primitif , deux pavillons de trois travées coiffées de toit à la Mansart dans lequels s'encadrent des lucarnes à frontons courbes la toiture à quatres pans et couronné de balustrades les tours privées de leur chemin de ronde.","habitants":"Jean de Salignac\r\n        \"","divers":"Groléjac  GPS : 44° 49' 05\" Nord, 1° 17' 47\" Est","gps":"44° 49' 05\" Nord, 1° 17' 47\" Est","images":["../image/image_24/24_Grol%c3%a9jac_1.jpg","../image/image_24/24_Grol%c3%a9jac_2.jpg","../image/image_24/24_Grol%c3%a9jac_3.jpg"]},"Consult_chateau_formulaireddb4":{"id":"Consult_chateau_formulaireddb4","dept":"24","canton":"Hautefort","commune":"Hautefort","nom":"Hautefort_Charreaux","type":"Forteresse","periode":"IX-XV","histoire":"Château de Hautefort, classé M.H. en 1958 et ses jardins en 1967, visitable. Et le château des Charreaux, \r\nHAUTEFORT, du IXe : la forteresse était aux mains  des Lastours qui au XIIe siècle  s'unit par double mariage aux frères Bertran et Constantin de Born,  deux frères ennemis. A la fin XVe siècle la famille de Gontaut prend les rennes à Hautefort et en adopte le nom. La succession commence avec Antoine suivi, à sa mort en 1470, d'Arnaud puis Jean Ier (Chambellan de Charles VIII et de Louis XII) et enfin Jean II Gouverneur du Périgord et du Limousin, maître d'hôtel de Catherine de Médicis.  Gilbert d'Hautefort restera un temps au château avant que celui-ci, passe aux mains de François. Ce dernier est gentilhomme de la chambre de Henri III et capitaine de cent hommes d'armes de ses ordonnances. Il décédera à l'âge de 92 ans, après avoir obtenu, en 1614, de Marie de Médicis, passage d'Hautefort en marquisat, Jacques-François de Hautefort entame en 1630 la reconstruction compléte de  Hautefort.  Il est conseiller au roi, premier écuyer de la reine Anne d'Autriche, et chevalier du Saint-Esprit en 1661. Sa sur Marie bénéficiera des faveurs de Louis XIII avant d'épouser le maréchal de Schomberg, au  XVIIe : nouveaux remaniements du château, en 1649,  en 1680 : mort du marquis Jacques-François. Jusqu'au premier empire, la demeure restera aux mains des descendants de son frère Gilles  et Il passe ensuite, par alliance, à la famille de Damas jusqu'en 1890.  En 1929  Le baron et la baronne de Bastard s'en portèrent acquéreurs et le rénovèrent","architecture":"HAUTEFORT, quadrilatère  flanqué à chaque angles d'une tour crénelée  et isolée par d'épaisses murailles courant sur trois côtés, protégé par un fossé de 10 mètres et un pont-levis encadré de tourelles, le grand corps de logis est flanqué de deux pavillons reçoit deux ailes en retour d'équerre terminées par deux tours, toit en coupole et Lanternon. Entre le corps du bâtiment principal à trois niveaux, les ailes s'étendent vers  la vaste cour  d'honneur, donna  sur cette cour une galerie à arcades du corps de logis  central mène aux appartements les façades ont des fenêtres à meneaux surmontées de frontons triangulaires, le quatrième côté s'ouvre sur le jardin, l'ensemble des toits sont couvert d'ardoise. Au  XVIIe  nouveaux remaniements du château, en 1649  Rambourg décède avant que les travaux soient achevés  en 1651, la nouvelle chapelle du rez-de-chaussée est consacrée, le château subit une période d'abandon, en 1669 : reprise des transformations avec un nouvel architecte parisien Jacques Maigret, en 1670 : Edification d'une seconde tour dans laquelle on met la nouvelle chapelle, en 1913-1925   suivi du château peu de temps après, en 1929 : En 1968   Hautefort est incendié et reconstruction immédiate à l'identique.   CHARREAUX construit au XVIIe et XVIIIe siècles, inscrit aux M.H.en 1979. Corps de logis rectangulaire à deux niveaux  flansqué aux extrémitées de pavillons latéraux avec un étage suplémentaire  toitures à la Mansart  aujourd'hui S.C.I.","habitants":"Famille de Born\r\n        \"","divers":"Hautefort  grav de 1 à 4 GPS : 45° 15' 37\" Nord et 1° 08' 55\" Est.                                                     Charreaux grav de 5 à 6 GPS : 45° 15' 37\" Nord et 1° 08' 55\" Est","gps":"45° 15' 37\" Nord et 1° 08' 55\" Est.","images":["../image/image_24/24_Hautefort_Charreaux_1.jpg","../image/image_24/24_Hautefort_Charreaux_2.jpg","../image/image_24/24_Hautefort_Charreaux_3.jpg","../image/image_24/24_Hautefort_Charreaux_4.jpg","../image/image_24/24_Hautefort_Charreaux_5.jpg","../image/image_24/24_Hautefort_Charreaux_6.jpg","../image/image_24/24_Hautefort_Charreaux_7.jpg"]},"Consult_chateau_formulairef577":{"id":"Consult_chateau_formulairef577","dept":"24","canton":"Villambart","commune":"Issac","nom":"Issac","type":"Château","periode":"XIII-XIV-XVI","histoire":"ISSAC  le château de Montréal du XIIe XIIIe et XVIe siècles, inscrit (depuis 1948) et classé en grande partie (depuis 1991) au titre des M.H.(Voir article) . Maupas du  XIVe siècle.  Tour Saint-Jacques du XVe siècle, inscrite au titre des M.H. depuis 1987.  Maison Chastenet du XVIIIe siècle, inscrite avec ses communs et son ancien pigeonnier au titre des M.H depuis 1987.\r\nMAUPAS, le château conserve des courtines renforcées de tours découronnées du XIVe siècle. Il fut édifié àla fin du XVIe siècle. Il sagit de lancienne demeure des Gerbaud. Il a brûlé en partie, mais il conserve encore ses murailles, un beau corps de logis et les soubassements de ses tours. Le château se situe à quelques kilomètres du bourg dIssac. Il sagit de lancienne demeure de François Bonnet de Leymonie, qui le fait édifier vers 1580. Plusieurs fois remanié, il se compose dun grand corps de logis dont une partie a brûlé en 1927. Il est encadré de deux tours sur une façade et de deux tourelles arasés à lopposé, la terrasse est entourée de murs et flanquée à chaque angle de tours rondes. Un pavillon recèle deux meurtrières du XVIe siècle.","architecture":"ISSAC, manoir flanqué de quatre tourelles du XVe siècle. MAUPAS, le château nest pas en bon état mais cest un édifice à forte valeur patrimoniale. Détruit en 1590, reconstruit en 1600, il a été endommagé par un incendie en 1927. Actuellement, le logis principal est privé de toitures sur environ 1/3 de sa longueur, il y a une tour denceinte ronde, également ruinée et sans toitures. Néanmoins, lensemble a belle allure, porté par un glacis en prairie et adossé par la masse des bois, il constitue un motif pittoresque de qualité. A larrière du château  dans les anciens communs, est aménagée une maison dhabitation par un autre propriétaire. Ce bâtiment a subi des travaux sans nuances mais ils sont peu visibles, cachés par le volume du château. Entre les deux  poussent de vieux marronniers de part et dautre il y a une clôture qui préserve un espace privatif pour le château.                TOUR ST-JACQUES, la construction  date du XVe siècle. Au chevet Sud de l'église romane, se trouve un ensemble de constructions du XVe siècle, qui se termine par la Tour Saint-Jacques. Cette tour circulaire contient un escalier à vis. Elle se trouve à l'aplomb d'un souterrain défendu par des trous de visée. La tour forme, avec les constructions contigües, un ensemble caractéristique de l'architecture rurale de la partie Ouest du Périgord. Cette tour fut le siège du Juge de la seigneurie de Montréal, elle est inscrite aux M.H. depuis 1987.","habitants":"Famille des Gerbaud                                                     Tour des seigneurs de Montréal\r\n        \"","divers":"A Issac; Maupas grav 3-4 GPS : 45° 00' 58\" Nord et 0° 27' 06\" Est.                                                                     Tour St-Jacques grav -2                                          Montréal  Grav-1 GPS : 45° 0' 42\" Nord, 0° 25' 52\" Est                                                                                   Tour GPS : 45° 00' 55\" Nord, 0° 27' 01\" Est","gps":"45° 00' 58\" Nord et 0° 27' 06\" Est.","images":["../image/image_24/24_Issac_1.jpg","../image/image_24/24_Issac_2.jpg","../image/image_24/24_Issac_3.jpg","../image/image_24/24_Issac_4.jpg","../image/image_24/24_Issac_5.jpg"]},"Consult_chateau_formulaire0ce8":{"id":"Consult_chateau_formulaire0ce8","dept":"24","canton":"Issigeac","commune":"Issigeac","nom":"Issigeac","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux à Issigeac dont celui d'issigeac , de Ferrant et un kilomètre à l'ouest le manoir d'Aubespin.  ISSIGEAC, après que les anglais aient forgé  l'intention de l'ériger en bastide, cette place forte fut réunie au XIVe siècle à l'évêché de Sarlat . L'un des successeurs François II de Salignac Fénelon fait édifier l'ancien Palais des Evêques, en 1660, sur d'anciennes fondations, pour François de Salignac, évêque de Sarlat. Dès le XIVe siècle, les évêques de Sarlat viennent s'installer à Issigeac et en font leur résidence ordinaire. L'un des successeurs, François III de Salignac de La Mothe-Fénelon fit construire le château en 1669, sur des fortifications médiévales. Le palais servit ensuite de refuge à l'évêque quand il se retira à Issigeac, après la prise de Sarlat, par Geoffroy de Vivant.  C'est devenu la propriété de la commune. Le palais des Evêques est inscrit aux M.H. depuis le 5/10/1946. Aujourd'hui, il abrite le syndicat d'initiative, dans ses caves voûtées et la mairie.\r\nFERRANT, son propriétaire initial était la famille Ferrant de Ravel, puis  a appartenu  du XIVe au XIXe siècle, à la famille de Laurière, co-seigneurs d'Issigeac, puis à appartenu à la famille de Scorailles, jusqu'au début du XXe siècle.                              AUBESPIN, l'édifice fut la propriété de la famille de Laurière du XIIe siècle jusqu'à la Révolution. En 1554, Etienne de Laurière, chevalier de l'Ordre du Roi et seigneur de Ferrand et de La Gouderie, épousait Hélix de La Porte de Chanteyrac, ils eurent un fils, Raymond et une fille qui devient dame de la Cipierre. Raymond, épousa en seconde noce Françoise de Lau, veuve d'Annet de Belcier. Peu après la Révolution, le château passa entre les mains d'une famille de Villeneuve d'Agen, les de Sorailles.","architecture":"ISSIGEAC, l'édifice se présente comme un grand corps de logis rectangulaire. Son allure est cependant adoucie par les deux petites tourelles rondes accrochées à chaque angle des ailes latérales.  A l'ouest d Issigeac, sur d'anciens fossés, des remparts du XIIIe siècle rappellent l'ancienne ville forte, cependant qu'un pittoresque logis des XVIe et XVIIe siècles conserve le souvenir des prévôts du chapitre et que de très belles fenêtres du XVe siècle localisent encore une grange dîmière. Le château révèle les caractéristiques de l'architecture classique Française, sobriété, symétrie, ordre et clarté. Mais son allure est adoucie par les deux tourelles rondes à chaque angle des ailes latérales.                                           FERRANT, est un manoir bâti à Issigeac, la construction  date du XIIIe au XVIIIe siècle, fut démantelé en partie, sans être toutefois supprimé. puis il fut agrandie et prolongé par une chartreuse, à la fin du XVIIe siècle.  \r\nAUBESPIN, ancien manoir fortifié, constitué de tours carrées accolées avec beaucoup de fantaisie et surmontées d'un toit original couvert de tuiles brunes ; les douves qui entouraient la bâtisse ont été comblées depuis longtemps.\r\nÉléments protégés MH : le château, les vestiges de sa grange ainsi que son terrain, en totalité : inscription par arrêté du 9 mars 2009.","habitants":"François III de Salignac de La Mothe-Fénelon   Famille Ferrant de Ravel                                       Aubespin famille de Laurière \r\n        \"","divers":"A Issigeac; Ferrant grav  5   GPS : 44° 43' 46\" Nord, 0° 36' 21\" Est                                                                    . Issigeac  grav 1-2GPS : 44° 43' 51\" Nord, 0°36'25\"Est Aubespin grav 3 - 4.","gps":"44° 43' 46\" Nord, 0° 36' 21\" Est","images":["../image/image_24/24_Issigeac_1.jpg","../image/image_24/24_Issigeac_2.jpg","../image/image_24/24_Issigeac_3.jpg","../image/image_24/24_Issigeac_4.jpg","../image/image_24/24_Issigeac_5.jpg"]},"Consult_chateau_formulaire77b4":{"id":"Consult_chateau_formulaire77b4","dept":"24","canton":"Saint-Astier","commune":"Jaure","nom":"Jaure","type":"Château","periode":"XV-XIX","histoire":"JAURE, fortement rénové après un incendie au XIXe siècle, présente une tour-pigeonnier élancée du XVe siècle ornée de sculptures baroques, et un autre pigeonnier massif.  Le général Nicolas Obroutchev, ou Nikolaï Obroutcheff (1830-1904), acteur de l'alliance franco-russe de 1892 avec le général de Boisdeffre, avait épousé la propriétaire du château de Jaure. Il est à l'origine des travaux de rénovation menés sur le château après son incendie au XIXe siècle. Il est mort à Jaure.","architecture":"JAURE, le château, bâti à côté d'un cluseau, fut ravagé par un incendie au XIXe siècle et a été largement restauré par le général Obrutcheff, qui participa à l'élaboration du traité franco-russe avec le général de Boisdeffre. Une cave voûtée du XIVe siècle subsiste encore (en 1359, il est question du Repayriuffi du Miles appelé Jaure), ainsi qu'un curieux pigeonnier-tour du XVe siècle, haut et étroit, remonté d'un bandeau de sculptures baroques au  XIXe siècle. L'intérieur conserve la mémoire très slave du général russe. On a retrouvé récemment à proximité du château, des monnaies médiévales. Le  château primitif avait été pris en 1376, par le maréchal de Sancerre pour le  parti français. Le château est l'ancien fief des Talleyrand, des Barde, des Lur, des Calvimont, des Aubusson, des Bertin et des Sacreste.\r\nLattrait principal de Jaure se concentre en grande partie autour de sa fontaine, à laquelle on attribue des vertus étonnantes.","habitants":"Général de Boisdeffre\r\n        \"","divers":"Château de Jaure","gps":"","images":["../image/image_24/24_Jaure_1.jpg","../image/image_24/24_Jaure_2.jpg","../image/image_24/24_Jaure_3.jpg"]},"Consult_chateau_formulaireb259":{"id":"Consult_chateau_formulaireb259","dept":"24","canton":"Nontron","commune":"Javerlhac et la chapelle st-Robrert","nom":"Javerlhac","type":"Château","periode":"XV-XVI","histoire":"Le manoir du Logis construit en 1882 à l'emplacement de l'ancienne maison de maître de la fin du XVe siècle.\r\nJAVERLHAC, le premier seigneur du château de Javerlhac connu est Renout (1225), puis son fils Bernard Ramnulphi 1248, et Aymeric Vigier. Au cours de la guerre de cent ans, en 1369, le château est incendié par Edmond de Langley, comte de Cambridge. De cette première bâtisse restent certaines assisses basses des murs et de frustes ouvertures.  En 1499, Dauphin Pastoureau, receveur pour le vicomte de Limoges des cens et rentes de la châtellenie de Nontron, achète la seigneurie de Javerlhac et restaure le château. Louis de Rochechouart: plusieurs Louis sont connus, trois au XIVe siècle, un autre Louis vécut de 1550 à 1590. Jehan de Maulmont (au XVIe siècle, aussi propriétaire du château de Vieillecour (commune de Saint-Pierre-de-Frugie). Etant donné que Dauphin Pastoureau acheta le château en 1499, il s'agit probablement d'un de ses ancêtres. En 1507, Barthélemy Texier épouse Jeanne Pastourelle. La branche des Texier, marquis de Javerlhac, disparaîtra en 1821. Le fermier d'alors rachète le château qui devient successivement la propriété des Fompuy-Boulouneix, Mousnier-Lompré, et de nos jours Pelpel-Rochette.\r\nPUYMOYER du XVIIe siècle, fief des Gaultier, des Bouneau et des Desmarets, le château reconstruit au XIXe siècle par les Desmarets batonnier à Paris, l'édifice  est flanqué de deux tours, l'une circulaire à toit pointu l'autre octogonale avec mâchicoulis et d'une tour en encorbellement.","architecture":"JAVERLHAC, la construction date du XVIe siècle. Il est inscrit aux M.H. depuis 1974 pour ses toitures et façades. le château actuel est une construction du XVIe siècle. une tour hexagonale et lescalier à vis restauré, la façade et les ouvertures Renaissance ainsi que la tour à mâchicoulis. A côté, se trouvent un pigeonnier et un moulin à eau, serant à la la fabrication d'huile de noix. Françoise de La Chassaigne (v. 1545 - v. 1602), fille d'un seigneur de Javerlhac, était l'épouse de Michel de Montaigne.\r\nLe manoir du Logis est un manoir bâti à Javerlhac-et-la-Chapelle-Saint-Robert,  Il a été construit en 1882, sur l'emplacement de l'ancienne maison de maître, qui datait de la fin du XVe siècle.","habitants":"Famille de Barthélemy Texier\r\n        \"","divers":"AJaverlhac et la chapelle st-Robert;      Javerlhac  grav 1-2-3 GPS : 45° 34' 6,8\" Nord, 0° 33' 33,5\" Est                                       Puymoyer-  Le Logis  grav 3-4  GPS : 45° 34' 14\" Nord, 0° 33' 41\" Est","gps":"45° 34' 6,8\" Nord, 0° 33' 33,5\" Est","images":["../image/image_24/24_Javerlhac_1.jpg","../image/image_24/24_Javerlhac_2.jpg","../image/image_24/24_Javerlhac_3.jpg","../image/image_24/24_Javerlhac_4.jpg","../image/image_24/24_Javerlhac_5.jpg"]},"Consult_chateau_formulaire70c8":{"id":"Consult_chateau_formulaire70c8","dept":"24","canton":"Salignac-Eyvigues","commune":"Jayac","nom":"Jayac","type":"Donjon","periode":"XII-XIV","histoire":"JAYAC,  ruines du donjon, en 1251 la vicomté est partagée entre Raymond VI de Turenne et sa sur Hélis, mariée à Rudel Hélie d'Aillac, sire de Bergerac, Gensac et Blaye. En 1338, Amélie du Val, petite fille de Pierre, se marie avec Armand de Guerre. En 1444, Catherine de Guerre, fille unique de Bernard de Guerre, seigneur de Jayac et co-seigneur d'Archignac se marie avec Jean III de Carbonnières. En 1480, Catherine de Guerre fait don du château de Jayac et de toutes ses dépendances à son fils Jean IV de Carbonnières. en 1590, Léonarde et Catherine de Carbonnières, filles de Charles de Carbonnières. En 1604, un membre d'une branche cadette de la famille , Jean-Charles , seigneur de Lacapelle-Biron, ce dernier participe au complot du duc de Bouillon. Le 24 février 1727, Isaac de Carbonnières, chevalier, seigneur de la Garrigue, fils d'Henri de Carbonnières, chevalier, seigneur de Saint-Chamassy, Jayac, Archignac et autres places et de Louise de la Porte, dame de Saint-Chamassy, se marie avec Marie-Anne de Courtioux, demoiselle de Peyrefumade. Au moment de la Révolution, la seigneurie est entièrement possédée par Louis, baron de Carbonnières, seigneur de Saint-Chamassy, Jayac et Archignac. Il a épousé en 1787 Madeleine Sclaffer de Laroque. Le fief est incendié en 1790. En 1792, Louis de Carbonnières émigre. Son épouse est arrêtée et mise en prison à Sarlat où elle donne naissance à une fille, Henriette. Les biens de Louis de Carbonnières sont saisis comme biens d'émigré. De retour en France, Louis ne peut récupérer qu'une petite partie de ses biens. Henriette de Carbonnières, héritière de Jayac, épouse en 1808 son cousin René-Henri-Charles de Carbonnières, de la branche des marquis de Saint-Brice en Limousin.","architecture":"JAYAC, incendié en 1790 courtine et tour circulaire près d'une demeure plus récente, le donjon carré haut de 15 mètres et de 7 mètres de côté, était déjà ruiné au XVIe siècle, un châtelet accolé d'une tour ronde fut construit dans l'enceinte des remparts. Elles lèguent la construction à leur frère, doyen de la cathédrale de Sarlat. Ce dernier réunit alors les deux tiers de la seigneurie de Jayac. En 1775, un abbé de Carbonnières envisage de faire réparer le château. Il n'y a eu que les réparations les plus urgentes. \r\nLa seigneurie est tenue par des doyens et passe d'oncle à neveu. Le dernier, Louis de Carbonnières lègue les deux tiers qu'il possède à Henri de Carbonnières, seigneur de Mayac. \r\n  Le château de Jayac est resté dans la famille de Carbonnières jusqu'en 1875.","habitants":"Famille de Carbonnières\r\n        \"","divers":"Vestiges de Jayac","gps":"","images":["../image/image_24/24_Jayac_1.jpg","../image/image_24/24_Jayac_2.jpg","../image/image_24/24_Jayac_3.jpg"]},"Consult_chateau_formulairec210":{"id":"Consult_chateau_formulairec210","dept":"24","canton":"Verteillac","commune":"La Tour Blanche","nom":"Jovelle","type":"Vestiges","periode":"XIII-XIV-XVII","histoire":"JOVELLE, la construction  date des XIIIe au XIVe siècles. Selon une légende, le Prince Noir habita le château de Jovelle pendant la guerre de Cent ans. Charles VII y établit son quartier général pendant 4 mois. Au siècle suivant, il abrite durant plusieurs mois le quartier général du roi de France, Charles VII. Le logis a été remanié au XVIIe siècle. À la Révolution, une partie importante des remparts est détruite. Il est possession de la famille Jéhan originaire du \"Toulousain\".  Au XIVe siècle, le château est donc possession anglaise. Entre le XIVe et le XVe siècle, il semblerait que le château soit l'objet d'attaques des troupes Anglaises puis Françaises. Au XVe siècle, le Roi de France  Charles VII  y  séjourne durant 4 mois. Au XVIe siècle, par mariage, le site est possession de la famille La Croix originaire du Nivernais. Au XVIIe siècle, plusieurs travaux d'aménagement de confort sont réalisés (logis, puits etc...). En 1948, le site est inscrit aux M.H.. Au XXIe siècle, la découverte de l'extérieur est libre et gratuite depuis la route.","architecture":"JOVELLE, il ne reste que les remparts qui ferment la cour, une partie du donjon dont les créneaux ont été refaits, et la chapelle romane qui se dresse à pic. Au XIVe siècle, précédé par un châtelet d'entrée, le château était un ensemble fortifié, ceint de remparts, qui comprenait un logis, une chapelle, un donjon et des tours.  Au XXe siècle, hormis ceux qui entourent la cour,  côté sud, les remparts ont disparu. À l'est, partie la moins délabrée, la chapelle romane présente une chambre de défense. Son chevet est percé d'une archère et d'une baie gothique géminée. Dans la cour subsiste un puits du XVIIe siècle. Sur la gauche, une belle courtine en équerre portant les fantômes de mâchicoulis. Au centre, une échauguette sur culot. Des ouvertures carrées des canonnières sont disséminées sur la courtine et sous les consoles.  Sur l'extrême droite, une blanche construction attire l'attention. Son toit applique à la lettre les règles de camouflage des snipers. Quelques contreforts plats rigidifient les angles, une ouverture carrée ressemblant à celles de la courtine.  Une archère cruciforme est visible à travers la végétation, il existe une chambre défensive dans cette construction. Sur la face étroite, une fenêtre trilobée, le bâtiment fut une chapelle.","habitants":"Famille Jéhan \r\n        \"","divers":"Vestiges de Jovelle GPS : 45° 21' 40,5\" Nord et 0° 25' 54,5\" Est","gps":"45° 21' 40,5\" Nord et 0° 25' 54,5\" Est","images":["../image/image_24/24_Jovelle_1.jpg","../image/image_24/24_Jovelle_2.jpg","../image/image_24/24_Jovelle_3.jpg"]},"Consult_chateau_formulaire6116":{"id":"Consult_chateau_formulaire6116","dept":"24","canton":"Jumilhac le Grand","commune":"Jumilhac le Grand","nom":"Jumilhac","type":"Forteresse","periode":"XII-XV","histoire":"JUMILHAC, bâti aux XIIIe siècle par les Bruchard et remanié en 1580, le fief dépendait des vicomtes de Limoges puis des seigneurs de la châtellenie d'Excideuil. Antoine Chapelle, riche maître de forges de la région, épouse en 1579 l'héritière du lieu, Marguerite de Vars. En finançant largement le futur Henri IV dans sa quête du trône de France, il reçoit en reconnaissance des mains de celui-ci le titre de comte de Jumilhac en 1597.  En 1655, son petit-fils, François, voit ses terres érigées en marquisat.  et désormais à leur descendants directs, en 1811 Antoine Pierre de Jumilhac se sépare de son domaine pendant un siècles passe successivement entre diffétentes mains, les Pilté-Garenet, les Ouvrard, les Etienne et les Janvier de la Motte enfin  en 1927 racheté par le marquis de Jumilhac les de La Tour du Pin pour sa fille la comtesse . Son parc est aménagé en jardins à la française. \r\nLe château est classé au titre des M.H. en mars 1924.","architecture":"JUMILHAC,  bâti aux XIIIe siècle, en 1580  remanié à la Renaissance et restructuré aux XVIIe et XVIIIe siècles sur l'emplacement d'un ancien château fort connu dès le XIIe siècle la cour d'honneur du château, de forme trapézoïdale, est délimitée par son logis à l'ouest, deux ailes au nord et au sud et une muraille de courtine à l'est, dans laquelle s'ouvre le portail d'accès au domaine. Les murs extérieurs de l'enceinte forment un octogone. Ceint d'un chemin de ronde posé sur mâchicoulis et ponctué de nombreuses fenêtres ou lucarnes de style Renaissance, le corps de logis est agrémenté de tours et de tourelles. Il est surmonté de toits d'ardoise, alternance de cônes et de pyramides, ornés d'épis de faîtage en plomb aux allégories seigneuriales et alchimiques. Un balcon, vestige central d'une coursive de service, a été installé au XVIIe siècle sur la façade principale afin de desservir par l'extérieur les appartements du premier étage nouvellement restructurés. Les ailes nord et sud, reprenant les dépendances préexistantes du XVIIe siècle, se terminent par des pavillons d'angle, aménagés dans les anciennes tours de défense comme en témoignent encore le chemin de ronde et mâchicoulis. Des jardins à la française rénovés depuis 1994 par l'actuel marquis de Jumilhac donnent au sud-ouest, en bordure de l'église, au-dessus de l'Isle. S'appuyant sur une maquette de 1777, leur dessin reprend les concepts des jardins en terrasse Renaissance et les principes de Le Nôtre et évoquent l'or et l'alchimie, deux thématiques associées à l'histoire du site.","habitants":"Famille de Jumilhac\r\n        \"","divers":"A Jumilhac le Grand; Jumilhac  grav de 1 à 7   GPS : 45° 29' 35\" Nord 1° 03' 36\" Est.","gps":"45° 29' 35\" Nord 1° 03' 36\" Est.","images":["../image/image_24/24_Jumilhac_1.jpg","../image/image_24/24_Jumilhac_2.jpg","../image/image_24/24_Jumilhac_3.jpg","../image/image_24/24_Jumilhac_4.jpg","../image/image_24/24_Jumilhac_5.jpg","../image/image_24/24_Jumilhac_6.jpg","../image/image_24/24_Jumilhac_7.jpg"]},"Consult_chateau_formulaireddab":{"id":"Consult_chateau_formulaireddab","dept":"24","canton":"St-Pierre de Chignac","commune":"Milhac d","nom":"La_Besse","type":"Château","periode":"XIII-XV","histoire":"LA-BESSE, bâti à Milhac-d'Auberoche, La construction date du XIIIe au XIXe siècle, est appelé le château de la Baisse. C'est un manoir avec une tour fortifiée. Cet ancien  manoir du XIIIe siècle dépendait de la châtellenie d'Auberoche,  possède une tour comportant des mâchicoulis datant de la fin du XVe siècle ou du début du XVIe siècle. Cette tour faisait partie d'un ensemble plus vaste et plusieurs fois remanié. Elle se situe dans le contexte de l'insécurité au cours du XVIe siècle dans la région puis des huit guerres de religion (1562-1598). Elle n'avait pas la prétention de résister à un assaut par une armée constituée. Elle assurait par contre une protection contre les bandes armées de pillards ou de soldats en maraude. Dès le XVIIe siècle, le bâtiment perd  sa fonction de défense.  En 1944, des résistants qui venaient de réquisitionner une voiture appartenant aux propriétaires de la Besse furent abattus à proximité par les allemands.","architecture":"La-BESSE, un grand bâtiment, haut de plafond, bien ensoleillé, est adjoint au XVIIIe siècle. C'est la fonction de résidence et d'ostentation d'un manoir qui est alors développée. L'aspect actuel du château de la Besse, avec un haut mur à l'entrée côté Ouest et un portail métallique, date de 1852, le château de la Besse comporte une tour à mâchicoulis qui date du XVe siècle. L'élément le plus typique consiste en une tour de forme ronde, crénelée, apte à résister à de la petite artillerie. L'intérieur est de section carrée, sur trois niveaux. Un chemin de ronde sur encorbellement crée un mâchicoulis derrière des créneaux sur tout le haut. La couverture est en ardoise. Les murs sont percés de quelques petites ouvertures pour des tirs d'arquebuse et d'une canonnière en rez-de-chaussée. \r\nÀ cette tour est accolé un corps principal datant du XVIIIe siècle, sur deux niveaux, orienté sud-ouest, ouvert vers la lumière par de hautes fenêtres symétriques par rapport à la porte principale. Des ouvertures ont alors été établies dans la tour dans l'alignement de celles de ce nouveau bâtiment. L'ensemble est précédé à l'ouest par deux bâtiments, l'un des deux est construit sur la base réutilisée d'un bâtiment plus ancien de la partie de la forteresse initiale. Toutes ces constructions donnent sur une large terrasse ouverte vers l'est et le sud, dominant la colline qui descend jusqu'à un petit cours d'eau temporaire. La partie ouest de cette terrasse provient  de la construction initiale du XIIIe siècle.","habitants":"châtellenie d'Auberoche\r\n        \"","divers":"A b Milhac d'Auberoche; grav 1 à 3 GPS : 45° 07' 55\" Nord, 0° 55' 18\" Est","gps":"45° 07' 55\" Nord, 0° 55' 18\" Est","images":["../image/image_24/24_La_Besse_1.jpg","../image/image_24/24_La_Besse_2.jpg","../image/image_24/24_La_Besse_3.jpg"]},"Consult_chateau_formulaired9d4":{"id":"Consult_chateau_formulaired9d4","dept":"24","canton":"La Force","commune":"La Force","nom":"La_Force","type":"Château","periode":"XVI","histoire":"La FORCE, la seigneurie revient en 1554 à la maison de Caumont, déjà en possession des fiefs de Caumont en Agenais et de Castelnaud en Périgord. Elle est érigée en marquisat en 1609 puis en duché en 1637. La maison de Caumont conservera La force jusqu'à la Révolution et en porte encore le titre aujourd'hui. De 1773 à 1838 Louis-Joseph de Caumont (1768-1838), marquis puis 7e duc de La Force en 1784, son fils et arrière-petit-fils en ligne féminine du 6e duc. Le titre ducal est rétabli en sa faveur.  De 1838 à 1854 François-Philibert de Caumont (1772-1854), 8e duc de La Force, son frère. De 1854 à 1857 Edmond-Nompar de Caumont (1818-1857), 9e duc de La Force, son petit-fils. De 1857 à 1882 Auguste-Nompar Ier de Caumont (1803-1882), 10e duc de La Force, son oncle. De 1882 à 1909 Olivier-Nompar de Caumont (1839-1908), 11e duc de La Force, son fils. De 1909 à 1961 Auguste-Nompar II de Caumont (1878-1961), 12e duc de La Force, académicien, son fils. De 1961 à 1985 Jacques-Nompar III de Caumont (1912-1985), 13e duc de La Force, son fils. Depuis 1985 Henri-Jacques II de Caumont, né en 1944, 14e duc de La Force, son fils","architecture":"Vestiges du château de la Force, durant la période révolutionnaire, Lakanal fit abattre le château de Laforce, siège du Duché. Le château de La Force est classé aux M.H. depuis 1932. Il ne reste que quelques vestiges de cet ancien château.","habitants":"fiefs de Caumont\r\n        \"","divers":"A la Force  vestiges  et manoir de la Rivière GPS : 44° 51' 59\
