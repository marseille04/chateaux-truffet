" Nord et 0° 22' 30\" Est","gps":"44° 51' 59\" Nord et 0° 22' 30\" Est","images":["../image/image_24/24_La_Force_1.jpg","../image/image_24/24_La_Force_2.jpg","../image/image_24/24_La_Force_3.jpg"]},"Consult_chateau_formulaire0199":{"id":"Consult_chateau_formulaire0199","dept":"24","canton":"Lalinde","commune":"Lalinde","nom":"Lalinde","type":"Château","periode":"XIII-XVII-XVIII","histoire":"LALINDE, il a été un temps aménagé en restaurant. C'est en 2010 une demeure privée. De la bastide, il ne reste plus que quelques fragments de l'ancien rempart, côté Dordogne, et la porte dite de Bergerac, faussement appelée porte Romaine, qui date du XIIe siècle, inscrite auxM.H. \r\nLe château de la Finou, ou château de Laffinoux,\r\nLe château de la Rue, XIIIe au XVIe siècle, à Drayaux, \r\nÀ Sauvebuf,(voir article suivant) .                                Le château des Landes, XVIIe et XVIIIe siècles,(voir article)\r\nLAFFINOUX est un ancien repaire noble. Propriété successive des familles Villardey, d'Espaigne, Blanc de Lauvezin, de La Cropte, puis de La Valette, le château est acheté à la fin du XIXe siècle par le tragédien Hilarion Ballande qui y a fait construire un théâtre de plein air.  Le château a été racheté par la famille Liard après 1945 qui a commencé sa rénovation dans les années 60 puis l'a revendu dans les années 70 à l'ex O.R.T.F. pour devenir un centre de vacances.                                          \r\nLA-RUE  Propriété des Archevêques de Bordeaux au XIIIe siècle, le château passe ensuite en cinq siècles aux mains des familles d'Abzac, d'Escodéra, d'Aubusson, Gouffier de Gonor et de Lostanges. \r\nAyant subi des dégâts à plusieurs reprises, entre autres pendant la guerre de cent ans, le château est intégralement restauré au XVIe siècle, période à laquelle est érigée la tour hexagonale.\r\nFINOU   Les différentes parties de l'édifice ont été bâties entre le XVe et le XVIIIe siècle. Le domaine a été transformé en centre de vacances. En effet, de nombreux vacanciers viennent s'y ressourcer tous les étés dans ce domaine qui pour eux est unique.    inscrit au titre des M.H. en 1948,","architecture":"LAFFINOUX  En 1267, Lalinde est l'une des toutes premières bastides édifiées en Périgord par les Anglais. Sous cesmurs, en 1370, le duc de Berry planta son étendard. Il y a là un deschâteaux qui assurait la protection de la ville de Lalinde, et sur lequel segreffait le rempart médiéval. Un sociétaire du Français, M. Ballande, enfantdu pays, acheta vers 1900, le château de Laffinoux et le fit restaurer. Un quadrilatère de murailles renforcées de tours basses enserre le château. Une douve court sur l'un des côtés. Près du portail d'entrée, tour circulaire duXVe siècle. Dans la cour d'honneur, tour ronde du XVe siècle et pavillon rectangulaire dont les murs et les toits sont galbés d'époque Régence, avec galerie à terrasse. Des communs tiennent tout un côté de la cour d'honneur. Le château de Laffinoux est inscrit à l'inventaire des M.H. par arrêté du 29 novembre 1948.\r\nLA-RUE, Ayant subi des dégâts à plusieurs reprises, entre autres pendant la guerre de cent ans, le château est intégralement restauré au XVIe siècle, période à laquelle est érigée la tour hexagonale. L'enceinte forme un quadrilatère dont les angles correspondent aux quatre points cardinaux. Les murs, particulièrement élevés au sud-est et au sud-ouest, ont conservé des vestiges de mâchicoulis. L'entrée située au nord-est, était défendue par une barbacane. Précédant cette barbacane et surmontant une douve, un pont-levis permettait l'accès au château. Autour de l'angle nord des remparts sont groupés les bâtiments du château. À leur pointe sud s'élève une tour hexagonale qu'emprunte un escalier en colimaçon.","habitants":"Laffinoux Famille Villardey                                    La Rue Famille d'Abzac\r\n        \"","divers":"A Lalinde;  Lalinde vestiges grav de 1 à 3.        Laffinoux grav  6-7 GPS : 44° 52' 25\" Nord, 0° 44' 28\" Est                                                                                    la Bastide grav de 4 à 5 GPS : 44° 50' 08\" Nord, 0° 44' 17\" Est. Mauzac grav 8","gps":"44° 52' 25\" Nord, 0° 44' 28\" Est","images":["../image/image_24/24_Lalinde_1.jpg","../image/image_24/24_Lalinde_2.jpg","../image/image_24/24_Lalinde_3.jpg","../image/image_24/24_Lalinde_4.jpg","../image/image_24/24_Lalinde_5.jpg","../image/image_24/24_Lalinde_6.jpg","../image/image_24/24_Lalinde_7.jpg","../image/image_24/24_Lalinde_8.jpg"]},"Consult_chateau_formulaire33f1":{"id":"Consult_chateau_formulaire33f1","dept":"24","canton":"Lalinde","commune":"Lalinde","nom":"Lalinde_Sauveboeuf","type":"Château","periode":"XIV-XVI","histoire":"SAUVEBOEUf, les premières mentions du domaine de Sauvebuf dans les sources écrites datent du milieu du XIVe siècle. On sait alors que le château devient la propriété de la famille De Ferrières, vassal des seigneurs de Montignac. Par manque de sources il est très difficile de savoir à quoi ressemblait le château à ce moment de son histoire. Cependant on suppose quil devait sagir dune maison forte de campagne qui avait pour vocation de protéger Montignac. Au cours des siècles, et ce jusquau milieu du XVIIIe, la famille De Ferrières, par des jeux dalliance, se développe au sein dela noblesse française.  En 1743, le domaine passe aux mains de Victor Riquetti marquis de Mirabeau, père du célèbre révolutionnaire français, et appartient à la famille une soixantaine dannées. Au cours du XIXe siècle,lédifice appartient successivement aux familles Chassagnac Latrade, Dehÿs et Baillemont. En 1891, la famille Oberkampf, célèbre notamment grâce à sa manufacture de toile de Jouy (à Jouy-en-Josas), acquiert Sauveboeuf et y fait dimportantes rénovations. Les Oberkampf revendront le château en 1927. Le château sera un domaine agricole jusquen 1975 (notamment avec la famille Gengen), puis laissé à labandon jusquau rachat, en 1987, par la famille Douce.","architecture":"SAUVEBOEUF date des XIVe et XVIe siècles Le logis, de direction est-ouest, est flanqué dune tour octogonale au nord-ouest, de deux tours carrées au sud-ouest et au nord et d'une tourelle ronde au sud-est. Le logis, de direction est-ouest, est flanqué dune tour octogonale au nord-ouest, de deux tours carrées au sud-ouest et au nord et d'une tourelle ronde au sud-est. Au sud, séparée du logis par une trentaine de mètres se dresse, en bord de rue, une imposante tour carrée, flanquée d'une tourelle.","habitants":"Victor Riquetti marquis de Mirabeau\r\n        \"","divers":"A Lalinde ;   Sauveboeuf GPS : 44° 50' 54\" Nord et 0° 46' 34\" Est","gps":"44° 50' 54\" Nord et 0° 46' 34\" Est","images":["../image/image_24/24_Lalinde_Sauveboeuf_1.jpg","../image/image_24/24_Lalinde_Sauveboeuf_2.jpg","../image/image_24/24_Lalinde_Sauveboeuf_3.jpg","../image/image_24/24_Lalinde_Sauveboeuf_4.jpg"]},"Consult_chateau_formulaire4d50":{"id":"Consult_chateau_formulaire4d50","dept":"24","canton":"Bergerac","commune":"Lamonzie-Montastruc","nom":"Lamonzie_Montastruc","type":"Château","periode":"XIV-XVIII-XX","histoire":"Cinq châteaux à Lamonzie-Montastruc, dont celui de Montastruc, Bellegarde, Lescot.\r\nMONTASTRUC, c'était au XIVe siècle l'un des fiefs de la famille d'Abzac de la Douze.  C'était au XIVe siècle une possession de la famille d'Abzac de la Douze. Détruit en 1438, lédifice fut reconstruit en 1471 moyennant la soumission à l'autorité royale de la veuve de Bertrand d'Abzac.  Pendant la seconde guerre mondiale, le château accueille quelque temps la grande-duchesse Charlotte de Luxembourg, à la suite de son exil face à l'avancée des troupes allemandes.  \r\nMONSAC et la chartreuse de la Fourtonie  ont été construit au XVIIIe siècle. \r\nBELLEGARDE, dans la même famille depuis le milieu du XIXe siècle, \r\nses décors illustrent bien ce quétait la vie dune famille aisée propriétaire terrien au début du XXe siècle. La construction   date du XIVe siècle au XXe siècle, il comporte une porte médiévale et un pavillon de style Renaissance,  sur une hauteur. Le château est inscrit aux M.H. depuis 2006.","architecture":"BELLEGARDE, le château primitif a un plan en U. Il n'en reste que quelques éléments en particulier des fenêtres géminées et une tour d'escalier. L'ensemble a été reconstruit au XIXe siècle puis de 1910 à 1912. Ses décors intérieurs datent du XXe siècle.     LESCOT, date du XVIIe siècle.  appelé aussi le Manoir de Lescot est  bâti à Lamonzie-Montastruc, la construction  date du XVIIe siècle. Il se situe à plus d'un kilomètre au Nord-Est du village de Lamonzie-Montatruc. \r\nMONTASRRUC , les aménagements du XVIIIe siècle sont imbriqués dans le bâti du logis féodal. Les décors intérieurs datent du XVIIIe siècle, dans un parc fermé, de plan en équerre à deux niveaux flanqués de pavillons sur l'aile saillant toit à quatre pans, sur l'autre face en retour d'équerre même pavillon, accolé à un deuxième corps de logis à quatre niveaux sur soubassement important toit à deux pans avec pignon de chaque côté  accolé de deux tours une ronde et une carrée à l'opposé.                                                ST-MARTIN, le château : inscription par arrêté du 12 octobre 1948 - En totalité le domaine du château comprenant les dépendances et bâtiments agricoles.","habitants":"fiefs de la famille d'Abzac de la Douze.\r\n        \"","divers":"A  Lamonzie-Montastruc:  Bellegarde  grav 6  GPS : 44° 53' 33\" Nord et 0° 35' 31\" Est.                                  Monsac GPS : 44° 53' 44\" Nord, 0° 35' 37\" Est.     Lescot grav 7 GPS : 44° 53' 44\" Nord, 0° 35' 37\" Est.   Montrastruc grav de 1 à 5  GPS : 44° 53' 49\" Nord, 0° 35' 24\" Est","gps":"44° 53' 33\" Nord et 0° 35' 31\" Est.","images":["../image/image_24/24_Lamonzie_Montastruc_1.jpg","../image/image_24/24_Lamonzie_Montastruc_2.jpg","../image/image_24/24_Lamonzie_Montastruc_3.jpg","../image/image_24/24_Lamonzie_Montastruc_4.jpg","../image/image_24/24_Lamonzie_Montastruc_5.jpg","../image/image_24/24_Lamonzie_Montastruc_6.jpg","../image/image_24/24_Lamonzie_Montastruc_7.jpg","../image/image_24/24_Lamonzie_Montastruc_8.jpg"]},"Consult_chateau_formulairedb4b":{"id":"Consult_chateau_formulairedb4b","dept":"24","canton":"Sigoulès","commune":"Lamonzie st-Martin","nom":"Lamonzie_St_Martin","type":"Château","periode":"XVI-XVII","histoire":"ST-MARTIN-MONBOUCHER,  dépendait de la châtellenie de Montcuq, a été construit par les Fontvieille (ou Fontvielhe) à la fin du XVIIe siècle au village de Monteil, probablement à lépoque de lanoblissement de la famille. A lorée de la Révolution, le seigneur du lieu, Hilaire de Fontvieille, se titrait baron de Fontvieille; il ajoutait baron de Moncuq, alors que ce château était démantelé depuis 1628. Il a acquis en copropriété le château de Moncuq avec Louis de Briançon, baron de Perrou, en 1777.  \r\n  St-MARTIN, la famille de Bérail occupa le fief en des temps très anciens.  Il passa en suite aux Vigier (lun deux fut procureur général au parlement de Bordeaux) puis aux Flammarens. Au début du XIXe siècle, le général comte Boudet, valeureux officier de lEmpire, acquit la demeure et la restaura. Elle appartient encore à ses descendants.","architecture":"MONBOUCHER est de pur style classique avec un vaste corps de logis à deux niveaux calé entre les pavillons. lensemble est un peu sec, en dépit de la corniche à modillons qui souligne le toit brisé. LEmpire a quelque peu retouché la façade. La chapelle, proche de la demeure, date du XVIIe siècle ; cest une chapelle carrée, simple, comme en possédaient encore tant de châteaux du Périgord vers 1930. Un propriétaire insouciant lui a fait perdre ses lambris qui accompagnaient un retable baroque. La bâtisse principale est entourée de 2 pavillons. La chapelle est située dans le pavillon ouest. La cave du château est remarquable avec ses voûtes et ses dimensions: elle fait la longueur du château, il est devenu un haras pour chevaux de trot dans les années 1970-1980. Le château a été revendu à différents propriétaires privés. \r\nSt-MARTIN   Une douve franchie par deux ponts entoure la demeure, vaste logis rectangulaire à deux niveaux, bâti sous Louis XVIII. A langle Nord-Est saccroche une échauguette sur mâchicoulis.  La façade noble conserve un beau portail encadré de pilastres portant un fronton triangulaire orné de pots à feu. La haute toiture sagrémente de lucarnes, celle du centre est particulièrement monumentale. Une tour carrée médiévale rappelle que ce logis avait été précédé par dautres. Dailleurs, il subsiste dans le parc une motte probablement féodale, inscription par arrêté du 12 octobre 1948 .","habitants":"St-Martin Général Comte Boudet,\r\n        \r\n        \"","divers":"A Lamonzie St-Martin; Monboucher grav 1 -2. Saint-Martin grav 3-4.","gps":"","images":["../image/image_24/24_Lamonzie_St_Martin_1.jpg","../image/image_24/24_Lamonzie_St_Martin_2.jpg","../image/image_24/24_Lamonzie_St_Martin_3.jpg","../image/image_24/24_Lamonzie_St_Martin_4.jpg"]},"Consult_chateau_formulairef548":{"id":"Consult_chateau_formulairef548","dept":"24","canton":"Velines","commune":"Lamothe-Montravel","nom":"Lamothe_Montravel","type":"Château","periode":"XIX","histoire":"A Lamothe Montravel, ancien château des archevêques de Bordeaux du XVe et XVIe siècles, classé (ancienne mairie).\r\nTALBOT, monument colonne commémorative et plan du site de la bataille de Castillon (fin de la guerre de cent ans).\r\nLAPOYADE: bâtiment de style éclectique construit de 1880 à 1895 par Louis Lapoyade-Deschamps (actuelle maison de retraite).\r\nMONTRAVEL, en 1305, Le duc dAquitaine et Roi dAngleterre, proposa à larchevêque de Bordeaux, Bertrand de Got, léchange de deux fiefs du Saintonge contre 5 châtellenies du Périgord. Mais ce dernier fut élu Pape la même année, sous le nom de Clément V; cest son successeur, Arnaud de Canteloup qui conclut léchange. Lannée suivante, la châtellenie de Montravel fut ainsi réunie au temporel de larchevêché, et nen sortit plus jusquà la Révolution.","architecture":"LAPOYADE, sa structure est composée dun château du XIXe rénové en partie et dune extension neuve. Lensemble est assez inégale car si le château présente un certain charme, ses lieux de vie sont assez sommaires. Par contre le nouveau bâtiment offre un bon confort.                                            MONTRAVEL, début 2016, un chantier daménagement des abords de la Tour a été entrepris, avec la démolition des bâtiments du XXe siècle bâtis contre lédifice, au mépris de ce bâtiment du XIVe siècle.","habitants":"Louis Lapoyade-Deschamps \r\n        \"","divers":"A  Lamothe-Montravel; Lapoyade et Montravel","gps":"","images":["../image/image_24/24_Lamothe_Montravel_1.jpg","../image/image_24/24_Lamothe_Montravel_2.jpg"]},"Consult_chateau_formulaire35d1":{"id":"Consult_chateau_formulaire35d1","dept":"24","canton":"Lalinde","commune":"Lalinde","nom":"Landes","type":"Château","periode":"XVII","histoire":"La LANDES, la bastide de Lalinde est érigée au XIVe siècle en châtellenie et a dans ses dépendances sept paroisses. En 1840 est mis en service le canal de Lalinde qui joue un rôle important dans la vie de la cité pendant presque un siècle. Ce château des Landes est l'ancienne demeure des d'Espaigne, des Coustin  des Caumont de Bourzolle et des Pradier. Important château du XVIIe siècle, succédant à un édifice plus ancien, dont subsiste une tour découronnée. Les proportions sont bonnes et les toitures pittoresques: de généreuses  girouettes ont été oubliées à la Révolution. Si, en 1743, on parle de la maison noble des Landes, en 1816, Maine de Biran mentionne dans son journal intime, la nuit passée le 19 juin au château, où vécut le dernier des  Bourzolles, l'époux de Zélie, sa nièce                                                                    LALINDE  Vers 1596, le roi Henri IV nomme Arnaud de Baudet, fils de Guy de Baudet et époux de Judith de Larmandie, gouverneur de la ville royale de Lalinde et vend son droit de justice et domaine de la ville à Jacques Nompar de Caumont. Depuis des recherches effectuées aux archives anglaises en 1990 par un auteur local, nous savons que la famille de La Lynde n'a jamais vécu sur le sol périgourdin. Cette famille apparaît dans le comté de Dorset depuis le XIe siècle, où elle possédait d'énormes domaines.","architecture":"LANDES  Le château les Landes se situe en Périgord pourpre, au sud du département de la Dordogne. sur la commune de Lalinde, à environ un kilomètre au sud-ouest du village de Sainte-Colombe. C'est une propriété privée dont le domaine, avec ses noyeraies, représente sur 38 hectares un site inscrit en France, depuis 1974. Edifice dont la façade de plan rectangulaire à deux niveaux avec une lucarne sur le toit , le corps de logis jouxté de pavillons latéraux  en saillits à trois niveaux rectangulaire avec lucarnes sur toit à l'impérial, une cour d'honneur est fermée par un ensemble  de  dépendances en retour d'équerre et deuxième corps de logis, l'ensemble est recouvert de tuiles.","habitants":"Famille d'Arnaud de Baudet\r\n        \"","divers":"A Lalinde;   château de Landes","gps":"","images":["../image/image_24/24_Landes_1.jpg","../image/image_24/24_Landes_2.jpg","../image/image_24/24_Landes_3.jpg","../image/image_24/24_Landes_4.jpg"]},"Consult_chateau_formulaire6d77":{"id":"Consult_chateau_formulaire6d77","dept":"24","canton":"Lanouaille","commune":"Lanouaille","nom":"Lanouaille","type":"Château","periode":"XIX","histoire":"Deux châteaux à Lanouaille ; Beaulieu et  de la Durantie,                                                               DURANTIE, demeure de 1845 où se retira le maréchal Bugeaud Thomas Robert Bugeaud (1784-1849), marquis de La Piconnerie, duc d'Isly, Il entre dans larmée dès 1804 et devient colonel en 1814. maréchal de France, a fait construire le château  où il a vécu. Après Waterloo, il est licencié et rentre à La Durantie pour devenir « laboureur ». Pendant 15 ans, il va développer lagriculture. Il épouse en 1818, Elizabeth Jouffre de Lafaye dont la dote va lui permettre de racheter le domaine à ses frères et surs Thomas-Robert Bugeaud de la Piconnerie est né à Limoges mais passe son adolescence à La Durantie à Lanouaille. Il crée le premier comité agricole en 1824 et devient maire en 1829. En 1830, il est réintégré dans larmée et devient député en 1833. Lors de ses discours à lAssemblée, il défend lagriculture. Il est envoyé en Algérie en 1836, en devient le gouverneur en 1840. Il est promu à la dignité de maréchal de France en 1843, avec le titre de Duc dIsly en 1844  Après une dernière période militaire comme commandant en chef de larmée des Alpes et un décevant siège de député en Charente-Maritime, il va être emporté par le choléra à Paris le 10 juin 1849. Il repose aux Invalides.                                            BEAULIEU,   Hugues Géraud de Beaulieu, évêque potentiel assassin du pape,  Hugues Géraud naquit au repaire de Beaulieu au XIIIe siècle. Dès 1305, il devient chapelain de la cour pontificale en Avignon sous Clément V puis gagna rapidement des charges ecclésiastiques. Il assista au procès des Templiers en 1311 puis devint évêque de Cahors. Sa cupidité et ses violences amenèrent le nouveau pape, Jean XXII, en 1316 à ouvrir une enquête canonique. Se sentant perdu, Hugues Géraud tenta denvoûter et dempoisonner le pape. Il fut démasqué et condamné à périr sur le bûcher en 1317.","architecture":"DURANTIE, cest au développement économique généré par ce dernier que lon doit un ancien réseau de fontaines, le domaine de Plaisance qui fut sa ferme expérimentale et le château de la Durantie quil se fit édifier lorsquil reçut son bâton de maréchal. Tous deux hôtel- restaurant .  En 1843, il avait lancé la construction de son château de la Durantie dont il aura peu profité. Sa devise fut : « Ense et aratro » (par lépée et la charrue).est au développement économique généré par ce dernier que lon doit un ancien réseau de fontaines,  L'édfifice  de plan rectangulaire à deux niveaux flanqués aux extrémité de pavillon de même style légèrement saillant toit en ardoise en croupe et fronton sur toit sur partie central.\r\nBEAULIEU, deux corps de logis à trois niveaux pour l'un et deux pour l'autre accolé avec toit à deux pans.","habitants":"Durantie, maréchal Bugeaud Thomas                             Hugues Géraud de Beaulieu\r\n        \"","divers":"A Lanouaille château de Beaulieu grav 1-2. de Durantie grav 3 à 5","gps":"","images":["../image/image_24/24_Lanouaille_1.jpg","../image/image_24/24_Lanouaille_2.jpg","../image/image_24/24_Lanouaille_3.jpg","../image/image_24/24_Lanouaille_4.jpg","../image/image_24/24_Lanouaille_5.jpg"]},"Consult_chateau_formulairea272":{"id":"Consult_chateau_formulairea272","dept":"24","canton":"Lalinde","commune":"Lanquais","nom":"Lanquais","type":"Forteresse","periode":"XII-XV-XVI","histoire":"LANQUAIS, au XIIe siècle à la famille de Cropte, qui oscillai entre les camps anglais et français aménagea cette demeure elle fit élever le donjon et une tour ronde  typique avec l'esprit militaire, passa à la famille des Limeuil-Turenne,  liée familialement aux la Tour d'Auvergne, seigneurs de Lanquais. Un temps durant, les Médicis, Ronsard,les Brantôme, les Bourbons ne parlaient que des scandales d'Isabeau. Retenue par la reine mère pour s'emparer de l'âme du prince de Condé, la belle en devient follement amoureuse et son sein en porta bien vite le témoignage. Lorsque toute la cour la vit accoucher en plein bal, à Bar-le-Duc, la reine Noire la priva de son fils, et la pria de se retirer sur ses terres de Lanquais, mais favorisa son mariage. Le banquier Scipion Sardini, à la bourse bien ferrée, sauva l'honneur. Le 24 mars 1577, Henri de la Tour d'Auvergne, vicomte de Turenne, et duc de Bouillon, vint y faire donner le canon pour punir les catholiques, conduits par son cousin Galliot. Il fit tirer cinq cents boulets et s'en retourna. Son passage se lit toujours sur les pierres de la noble demeure.  Une tradition fortement ancrée fait naître saint-Avit en ce lieu, mercenaire à l'origine,  il aurait été fait prisonnier par Clovis à la bataille de Vouillé; de sa geôle, il ne lui resta qu'à convertir Clotilde au catholicisme. En 1720 le château est acquis par le duc d'Autun et en 1732 les Gourges en deviennent propriétaires actuellement , les Brandois descendants des Gourges.","architecture":"LANQUAIS, la partie la plus ancienne, encore visible, de cette vaste construction, est une grosse tour cylindrique du nord-est sur laquelle se greffe tout le reste. Elle était déjà dressée au temps des premières guerres anglaises. À la fin du XVIe siècle, une nouvelle demeure fut entreprise. L'aspect le plus réussi est sans conteste le pavillon d'angle, inachevé, qui reprend le parti des architectes Pierre Lescot et Philibert de Lorme, ils auraient dessiné celui-ci sur le modèle de la cour carrée du Louvre. Le plan primitif du château du XVe siècle devait doubler approximativement les bâtiments subsistants, composés d'un grand corps de logis flanqué, à l'angle nord-est, d'une grosse tour ronde. Sur la face sud est accolée la tourelle d'escalier. La tour et la façade sont couronnées d'un mâchicoulis portant crénelage. Le château du XVIe siècle présente deux bâtiments perpendiculaires formant un T. Le projet final semble avoir été un grand corps de logis flanqué de deux pavillons. L'escalier est à l'extrémité du pavillon et aboutit à une galerie desservant les pièces. Les élévations sont d'esprit entièrement classique : de larges bandeaux horizontaux divisent les étages ; des chaînages de pierre rythment les façades dans le sens vertical, au droit des fenêtres. Sur les toitures,les lucarnes sont couronnées de frontons. Le vocabulaire décoratif est également classique : bandeau, corniche, chaînage d'angle, fronton sont d'un dessin entièrement nouveau. Dans l'ensemble, l'intérieur est intact :plafond, plancher, menuiseries datent de l'époque de construction. Cheminées monumentales sculptées.","habitants":"Famille des Limeuil-Turenne\r\n        \"","divers":"Lanquais GPS : 44° 49' 07\" Nord et 0° 40' 26\" Est","gps":"44° 49' 07\" Nord et 0° 40' 26\" Est","images":["../image/image_24/24_Lanquais_1.jpg","../image/image_24/24_Lanquais_2.jpg","../image/image_24/24_Lanquais_3.jpg","../image/image_24/24_Lanquais_4.jpg","../image/image_24/24_Lanquais_5.jpg"]},"Consult_chateau_formulaire9f9c":{"id":"Consult_chateau_formulaire9f9c","dept":"24","canton":"Nontron","commune":"Sceau-Saint-Angel","nom":"Lapouyade","type":"Château","periode":"XVII-XVIII","histoire":"A la Chapelle Montmoreau  au Sud-Est de St-Angel le château de Lannet. LAPOUYADE, château situéà 800 m à l'ouest de l'église Saint-Angel, ancien fief des de La Roussie, des Lamberterie, des de La Garde Saint-Angel puis propriété des Montalembert et des Larminat, ce château classique du XVIIe siècle, également dit de la Pouyade conserve, à côté de pavillons encadrant un logis, une chapelle gothique, servant de tombeau aux seigneurs du lieu. En 1640, La Mothe, fils du seigneur des Cars, attaqua et pilla le château, brisant les vitraux de la chapelle. Plus grave, en 1677, Raphaël de Lamberterie et l'un de ses frères, Hélie de Camain, réglèrent un contentieux les opposant aux de La Roussie : ils tuèrent Guillaume de La Roussie et blessèrent son frère Pierre. Pied de nez à l'histoire, le château de Lapouyade passera par mariage aux Lamberterie en 1789, après le décès du dernier des de la Roussie. En 1965, on mit à jour un cluseau de 15 mètres de développement s'ouvrant dans la cour, on y découvrit une épée en très mauvais état de conservation.","architecture":"LANNET, anciennement appelé château de Chaumont, du XVIIIe et XIXe siècles transformé en chambre d'hôte. Sa construction date du XVIIIe et XIXe siècle, entièrement restauré. Offrant une vue sur les jardins et le parc boisé. édifice de plan carré à deux niveaux et lucarnes sur un toit en croupe recouvert d'ardoises flanqué d'une tour ronde et à l'opposé d'une tourelle toit en poivrières pour ces deux.\r\nLa POUYADE deux pavillons rectangulaires à deux niveaux encadrent un corps de logis à deux niveaux et attiques, toit à l'impérial recouvert de tuiles.","habitants":"fief des de La Roussie\r\n        \r\n        \"","divers":"A Sceau-Saint-Angel; Lannet  grav 2-3 GPS : 45° 26' 54\" Nord, 0° 38' 32\" Est. Lapouyade grav 3-4.","gps":"45° 26' 54\" Nord, 0° 38' 32\" Est. Lapouyade grav 3-4.","images":["../image/image_24/24_Lapouyade_1.jpg","../image/image_24/24_Lapouyade_2.jpg","../image/image_24/24_Lapouyade_3.jpg","../image/image_24/24_Lapouyade_4.jpg"]},"Consult_chateau_formulaireccf6":{"id":"Consult_chateau_formulaireccf6","dept":"24","canton":"Lalinde","commune":"Lanquais","nom":"Laroque_Lanquais","type":"Château","periode":"XIII","histoire":"LAROQUE, le patrimoine architectural civil comprend principalement le château et son allée dormeaux, une grange dîmière à droite de lallée, le château de la Roque du XVe siècle, dépendance du château de Lanquais et faisant partie du dispositif destiné à assurer la protection de Lanquais, une halle du XIIe siècle et une ancienne demeure de gens darmes. Au nord du bourg, ancien fief des de Joas de Laroque de Perponcher, puis propriété des Lafargue.","architecture":"LAROQUE, situé sur une falaise dominant le Couzeau, château du XVe siècle, typiquement périgourdin. Il a conservé une allure pittoresque avec ses deux corps de logis en retour d'équerre, dont l'un est accosté d'une tour hexagonale. Sur la façade nord, les fondations plus anciennes ainsi que les caves voûtées en arc datent probablement du XIIIe siècle. L'ensemble est isolé du plateau par une douve sèche taillée dans le roc.","habitants":"Fief des des Joas de Laroque de Perponcher\r\n        \"","divers":"A Lanquais château de Laroque","gps":"","images":["../image/image_24/24_Laroque_Lanquais_1.jpg","../image/image_24/24_Laroque_Lanquais_2.jpg","../image/image_24/24_Laroque_Lanquais_3.jpg"]},"Consult_chateau_formulaire4c8b-2":{"id":"Consult_chateau_formulaire4c8b-2","dept":"24","canton":"Montagrier","commune":"Celles","nom":"Lascoux_Fontenilles","type":"Château","periode":"XIV","histoire":"A Celles, le  château de Lascoux, XVIe siècle, dont l'origine remonte au XIVe siècle.  De la Pauze du XIXe siècle, et à trois km plein sud le château de Fontenilles à St-Médard sur Drone.   \r\nFONTENILLES, d'Aigueparse  château non documenté ayant appartenu aux Saint-Aulaire. \r\nLASCOUX, appartenant initialement aux Montardy, remonte au XIVe siècle. Il passe ensuite à la famille de Pontbriand qui le rebâtit au XVIe siècle. En 1593, il accueille une conférence entre catholiques et huguenots. Les Foucauld en deviennent propriétaires aux XVIIe et XVIIIe siècles puis au siècle suivant, il passe à la famille du Lau d'Allemans. Il a fait l'objet de nombreuses modifications et restaurations, particulièrement au XXe siècle, ne conservant que très peu d'éléments du XVIe siècle. En 1751 naît au château Armand de Foucauld de Pontbriand, futur vicaire général de l'archevêque d'Arles, Jean Marie du Lau d'Allemans, avec qui il connaîtra une fin tragique à la prison des Carmes en septembre 1792.","architecture":"FONTENILLES, manoir du XVe siècle avec une tour circulaire très restauré  En ruine avant les années 1970, il a été restauré depuis, construit en 1676, sur des ruines médiévales, le château de Fontenille est par la suite agrandi sur son versant nord.  De fondations rectangulaires, la demeure est élevée avec des moellons de calcaire et des pierres de taille typiques des sols de la région. Sétendant sur un étage carré puis un niveau de comble, il est jouxté au sud par un pavillon accueillant autrefois une chapelle. Lintérieur est articulé autour dun escalier monumental en calcaire, aujourdhui détruit dans un incendie. Le brisis Est du toit, en tuile plate, supporte des lucarnes à fronton curviligne.                                                         LASCOUX Il a fait l'objet de nombreuses modifications et restaurations, particulièrement au XXe siècle, ne conservant que très peu d'éléments du XVIe siècle.","habitants":"Famille de Pontbriand                                                    Armand de Foucauld de Pontbriand    \r\n        \"","divers":"A Celles château de Lascoux-Fontenilles","gps":"","images":["../image/image_24/24_Lascoux_Fontenilles_1.jpg","../image/image_24/24_Lascoux_Fontenilles_2.jpg","../image/image_24/24_Lascoux_Fontenilles_3.jpg","../image/image_24/24_Lascoux_Fontenilles_4.jpg","../image/image_24/24_Lascoux_Fontenilles_5.jpg"]},"Consult_chateau_formulaire81eb":{"id":"Consult_chateau_formulaire81eb","dept":"24","canton":"Thiviers","commune":"Lempzours","nom":"Lempzours","type":"Château","periode":"XVII","histoire":"A Lempzours trois châteaux celui  de Feydoux du XVIIe siècle, le \r\nmanoir de la Guionie du  XVIIe siècle, et le castel de la Coudercherie.\r\nFEYDOUX, le château de Feydoux est perdu dans les bois, c'est un château construit au XVIIe siècle avec des tours carrées, cette demeure appartient en 1757 à Jean Robert, gendarme de la garde du roi, appartenant à la bourgeoisie de Périgueux. L'édifice passa par mariage de la famille de Robert aux Durand de Noillac, puis à Wlgrin de Taillefer, qui reprit le nom de son ancêtre Wlgrin (se prononce oulgrin) duc d'Angoulême, au IXe siècle, parent du roi Charles le chauve, que lon avait surnommé \"Taillefer\"après qu'il eut, dit la légende, taillé en deux un envahisseur normand portant une armure.                                GUIONIE en 1588 Jean Béron, écuyer y habitait.","architecture":"COUDERCHERIE  est un château bâti à Lempzours dans un style Renaissance  de plan rectangulaire à deux niveaux,  et une série de lucarnes sur un toit brisé à la Mansard, les dépendances en retour d'équerre sur l'arrière ferme la cour d'honneur.\r\nGUIONIE, ce château de la famille des Béron, des Siorac et la propriété des Jarjavail. Au XIIe siècle ferme des templiers, commanderie avec à l'intérieur de l'enceinte la maison du maître ainsi que les logis des chevaliers, des sergents et ouvriers agricoles, le manoir actuel est du XVIe siècle                              FEYDOUX, corps de logis de plan rectangulaire à deux niveaux avec série de lucarnes sur comble  encadré entre deux tours carrées en quinqonce toit à quatre pans.","habitants":"Feydoux gendarme de la Garde Jean Robert                 Guionie Jean Béron\r\n        \"","divers":"A Lempzours;  Guionie grav 3 GPS : 45° 21' 41\" Nord, 0° 49' 06\" Est.                                                       Feydoux grav 1 GPS : 45° 21' 41\" Nord, 0° 49' 06\" Est. Et la Coudercherie grav 2","gps":"45° 21' 41\" Nord, 0° 49' 06\" Est.","images":["../image/image_24/24_Lempzours_1.jpg","../image/image_24/24_Lempzours_2.jpg","../image/image_24/24_Lempzours_3.jpg"]},"Consult_chateau_formulaireca01":{"id":"Consult_chateau_formulaireca01","dept":"24","canton":"Villefranche du Périgord","commune":"Rouffignac st cernin de Reilhac","nom":"Lherm_Rouffignac","type":"Vestiges","periode":"XV","histoire":"L'HERM  en 1561, Anne de la Douze oblige sa fille, Marguerite de Calvimont, dame de l'Herm, à épouser François II d'Aubusson, sieur de Beauregard. Mais ce dernier s'éprend de Marie de Hautefort et a le projet de se débarrasser de sa femme et d'accaparer son héritage, il fait signer à Marguerite de Calvimont un document pour la dépouiller de ses biens et la fait étrangler en  1605.  François d'Aubusson se remarie ensuite avec Marie de Hautefort, en 1606, dont il a eu deux enfants, Charles et Françoise. En 1608, Anne de la Douze. François d'Aubusson se livre alors à la justice, il est incarcéré et meurt en 1618. Marie de Hautefort fait assassiner les deux frères de Calvimont de Saint-Martial et obtient la propriété du château. Son fils Charles est assassiné en 1636., Marie de Hautefort se remarie avec Henri Bertrand Raphaël de Beaudet, seigneur du Peuch. Françoise d'Aubusson se marie avec Godefroy de La Roche-Aymon dont elle a une fille, Jeanne-Armande de La Roche Aymon, et meurt en 1641. Godefroy de La Roche-Aymon se remarie en 1642 avec Henriette-Madeleine des Grillets de Brissac. Jeanne-Armande de la Roche-Aymon est mariée en 1660 avec François de Reilhac, comte de Boussac, fils d'Henriette-Madeleine des Grillets. Godefroy de La Roche-Aymon a tué en duel, en 1637, Jean VI de Calvimont de Saint-Martial. Henri-Bertrand de Beaudet, accompagné par son fils Louis, est tué  en 1644 dans un traquenard monté par le demi-frère illégitime de sa femme, Charles de Hautefort, et Godefroy de la Roche-Aymon. Ce dernier est aussi tué. Louis de Beaudet est tué le 1er août 1649 par Pierre Babut, premier consul de La Linde. Marie de Hautefort meurt  en 1652  légue ses biens à sa petite-fille, Jeanne-Armande de la Roche-Aymon. Le château est racheté en 1682 par Marie de Hautefort (1616-1691), fille de Charles, marquis de Hautefort, surnommée « l'Aurore » par Louis XIII. Le domaine est alors loué à un fermier. Le château est abandonné en 1862.","architecture":"HERM, ruine du château sur plan quadrangulaire flanqué de trois tours circulaires du XVe siècle, sa construction par jean de Calvimont  composé d'un corps de logis rectangulaire flanqué de 2 tours d'angle massives, accosté d'une tour polygonale d'escalier du début du XVIe siècle. Le tout était couronné de mâchicoulis, qui ont depuis disparus.  Des fouilles archéologiques récentes ont dévoilé une enceinte circulaire de bâtiments plus anciens, dont les actuels fossés en eau sont un vestige. Aujourdhui, ce site est ouvert à la visite. Il revit grâce à des travaux de protection, des recherches historiques, des pièces de théâtre et des concerts estivaux.","habitants":"Famille de Jean de Calvimont,\r\n        \"","divers":"A  Rouffignac St-Cernin de Reilhac ; Herm, vestiges grav de 1 à 6GPS : 45° 04' 40,9\" Nord, 0° 57' 34,7\" Est, et Moulin Haut grav 7-8.","gps":"45° 04' 40,9\" Nord, 0° 57' 34,7\" Est, et Moulin Haut grav 7-","images":["../image/image_24/24_Lherm_Rouffignac_1.jpg","../image/image_24/24_Lherm_Rouffignac_2.jpg","../image/image_24/24_Lherm_Rouffignac_3.jpg","../image/image_24/24_Lherm_Rouffignac_4.jpg","../image/image_24/24_Lherm_Rouffignac_5.jpg","../image/image_24/24_Lherm_Rouffignac_6.jpg","../image/image_24/24_Lherm_Rouffignac_7.jpg","../image/image_24/24_Lherm_Rouffignac_8.jpg"]},"Consult_chateau_formulaired5ac":{"id":"Consult_chateau_formulaired5ac","dept":"24","canton":"St-Pierre de Chignac","commune":"Lieu-Dieu-Boulazac","nom":"Lieu_Dieu","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux à Lieu-Dieu , celui de Lieu-Dieu et de Tuloup.                                                                    LIEU-DIEU, c'est un château de style fin du Moyen-Age, début Renaissance. Son propriétaire initial était la famille de Saint-Astier.  Bien que les différents propriétaires ne portent pas toujours le même nom. Bien que le château ait appartenu à la même famille depuis sa construction, avec les mariages, le nom des propriétaires ne fut jamais le même : les de  Saint- Astier, les de Chabans, les de Sanzillon, les de  Baylie, les de Cumond, les  De Reviers. aujourd'hui propriété de Jean d'Arlot comte de Cumond\r\nTULOUP à Boulazac occupé depuis 1620 par la famille Decous, Carriers, devenus Decous de Lapeyrière transformés en maison de maître au XVIIIe siècle, puis passa par alliance à la famille Faucher de Corn.","architecture":"LIEU-DIEU, sa construction remonte aux XIVe et XVe siècles, avec des modifications du XIXe siècle. Appelé originairement la Baconnie, ce sont donc les gens du pays qui l'appelèrent en occitan « Luòc Diu », il a la forme d'un quadrilatère dont les angles se situent aux 4 points cardinaux, ceux de l'Est et du Sud étant pourvus d'une tour circulaire. Au Nord-Ouest se tient le logis principal, haut de 3 niveaux et surmonté d'une chambre de défense. Les côtés Nord-Est et Sud-Ouest correspondent à des communs. On accède au château du Lieu-Dieu au Sud-Est par un châtelet d'entrée carré surmonté d'un chemin de ronde sur mâchicoulis  et relié par des courtines  à deux grosses tours rondes, précède un pont-levis. Le château est entouré de douves, ceux de l'est et du sud étant pourvus d'une tour circulaire. Au nord-ouest se tient le logis principal, haut de trois niveaux et surmonté d'une chambre de défense. Les côtés nord-est et sud-ouest correspondent à des communs. Il est inscrit aux M.H.depuis le 30 avril 1959.                                         TULOUP de plan en U par les bâtiments et dépendances, le corps de logis de plan rectangulaire à trois niveaux retour en équerre  sur cour avec tour octogonale à toit pointu, l'ensemble est recouvert de tuiles.","habitants":"Lieu-Dieu Famille de Saint Astier                         Tuloup famille des Decous de Lapeyrière\r\n        \"","divers":"A Lieu-Dieu-Boulazac; Lieu-Dieu grav de 1 à 6 GPS : 45° 09' 45\" Nord, 0° 46' 26,3\" Est.                               Tuloup grav 7-8  GPS : 45° 10' 55\" Nord, 0° 45' 46\" Est.","gps":"45° 09' 45\" Nord, 0° 46' 26,3\" Est.","images":["../image/image_24/24_Lieu_Dieu_1.jpg","../image/image_24/24_Lieu_Dieu_2.jpg","../image/image_24/24_Lieu_Dieu_3.jpg","../image/image_24/24_Lieu_Dieu_4.jpg","../image/image_24/24_Lieu_Dieu_5.jpg","../image/image_24/24_Lieu_Dieu_6.jpg","../image/image_24/24_Lieu_Dieu_7.jpg","../image/image_24/24_Lieu_Dieu_8.jpg"]},"Consult_chateau_formulairea8d3":{"id":"Consult_chateau_formulairea8d3","dept":"24","canton":"Sainte-Alvère","commune":"Limeuil","nom":"Limeuil","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Limeuil celui de Limeuil et de la Vitrolle et à cinq kilomètres au nord à Ponant le château de Hurtevent.                                HURTEVENT,   les premiers éléments de lhistoire connue de Paunat sont intimement liés à la présence dun couvent bénédictin au VIe siècle, dont la fondation est attribuée à Saint-Cybard, miraculé, natif de Trémola. Le manoir de Hurtevent qui domine le bourg, est l'ancienne demeure de la famille Lafaye. Logis construit au XVIIIe siècle dont la façade s'agrémente d'échauguettes et de belles fenêtres travaillées. Chambres d'hôtes                                 LIMEUIL,  le château de Limeuil qui domine le village est situé au confluent de la Vézère et de la Dordogne à une quarantaine de kms de Bergerac. C'est dans ce château que naquit Isabelle de La Tour de Turenne en 1545. Isabeau  était la cousine au 7ème degré de la reine Catherine de Médicis qui était la fille de Lorenzo II di Médici, duc d'Urbino et de Madeleine de la Tour d' Auvergne.  Le château fut racheté en 1902 par le Dr Linarès, qui fut le médecin du Sultan du Maroc, époque à laquelle furent créés les jardins à l'anglaise. Au décès du médecin, les jardins furent laissés à l'abandon.                                                                         la VITROLLE au XVIIIe siècle de la famille de Senaillac de Lisle, puis passa au comte  André d'Arlot de Saint-Saud qui le conserva jusquà sa mort en 1865. devenu un hôtel de grand standing.","architecture":"HURTEVENT, datant du XVIIIe siècle, domine le paisible village de Paunat; ravissant petit bourg connu pour son abbatiale millénaire et ses alentours boisés. A 3 km de la rivière: la Dordogne est à 35 km de Sarlat  cité médiévale très visitée, Cette propriété est entourée d'un grand parc arboré et dispose d'une piscine privée.LIMEUIL Il ne reste que peu de vestiges du château de Limeuil. Seuls se dressent encore la tour carrée, la tour canonnière et le puits,  la commune de Limeuil les a rachetés en 1997 et les a confiés, depuis 2007, à l'association Au fil du temps, pour les faire revivre et leur redonner leur cachet d'antan. Le  corps de logis à un étage, la massive tour dont la construction  date du XVIIIe au XIXe siècle.                La VITROLLE, le manoir date du XVIIe possède une tourelle octogonale, le corps de logis à deux niveaux sur soubassement avec série de lucarnes sur un toit en croupe accolé en plus de la tourelle de deux pavillons en retour d'équerre en façade et d'un autre sur l'arrière droit toit à l'impérial.","habitants":"Famille de la Tour d'Auvergne                                        Vitrolle famille de Senaillac de Lisle\r\n        \"","divers":"A Limeuil; Hurtevent-Paunat  grav de1 à 4  GPS : 44° 54' 17\" Nord, 0° 51' 32\" Est.                                           La Vitrolle grav 5 à 8 GPS : 44° 53' 10\" Nord, 0° 53' 23\" Est.","gps":"44° 54' 17\" Nord, 0° 51' 32\" Est.","images":["../image/image_24/24_Limeuil_1.jpg","../image/image_24/24_Limeuil_2.jpg","../image/image_24/24_Limeuil_3.jpg","../image/image_24/24_Limeuil_4.jpg","../image/image_24/24_Limeuil_5.jpg","../image/image_24/24_Limeuil_6.jpg","../image/image_24/24_Limeuil_7.jpg","../image/image_24/24_Limeuil_8.jpg"]},"Consult_chateau_formulaire1105":{"id":"Consult_chateau_formulaire1105","dept":"24","canton":"Lalinde","commune":"Liorac-sur-Louyre","nom":"Liorac_Louyre","type":"Château","periode":"XVI-XVII","histoire":"Liorac sur Louyre, château de Carrieux, XVIIe siècle, de Garraube, inscrit aux M.H.en 1992, de Genthial du XVIIe siècle, inscrit en 1948, de la Ricardie du XVIe et XIXe siècles, Vieille Roche du XIIe et XVIIe siècles, de la Roche,   manoir de Liorac du XVIIe siècle,  qui présente une tour carrée flanquée d'une tourelle.\r\nCARRIEUX, bâtisse imposante d'un corps de logis à deux niveaux toit a deux pans accolé de deux pavillons carrés avec tourelles accolées plein cintre extérieurement, et une échauguette sur encorbellement  l'ensemble  recouvert de tuiles sur les retours en équerre sur l'arrière formant une cour avec pavillons en angles.\r\nLa-ROCQUE, chartreuse du XVIe siècle, de plan en T à deux niveaux sur soubassement et série de lucarnes sur comble d'un toit en croupe recouvert d'ardoise, pavillon en retour d'équerre, chambre d'hôte.               GARAUBE date du XVIIe siècle, La famille Valleton fut très présente à Liorac jusqu'au début du XXe siècle, cette famille s'est développée en de multiples branches qui ont habités en France et même à l'étranger. Pour distinguer les différentes lignées à Liorac, le nom de la terre était accolé au patronyme Valleton : on trouve ainsi les Valleton de Boissière, de Garraube, de la Tissanderie, de Carrieux et de la Roque. La continuité d'une branche était assurée par les nombreux fils et l'un d'eux conserve nom et terres. C'est Jean  Valleton de Boissière qui a faitconstruire vers 1650-1680 une partie du château actuel. Depuis, le château a été fortement remanié au XIXe et XXe siècles. En 1940, un incendie accidentel ravagea le château, ce qui nécessita d'importantes restaurations.","architecture":"CARRIEUX avec des tourelles ainsi que l'imposante église fortifiée. Sa nef est surmontée d'un refuge et son clocher était autrefois un véritable poste de garde.                                                                              GENTHIAL, date du XVIIe siècle le corps de logis couvert de tuiles et deux bâtiments perpendiculaires délimitent la cour fermée vue depuis le grand portail.   Placées aux angles de la façade Est  deux échauguettes carrées surmontées d'un lanternon. L'une des tourelles a été  construite au XVIIe siècle. Corps de logis régulier à haute toiture de tuile. La partie centrale fait un ressaut sur les deux façades. Puits couvert en pierre du XVIIe siècle. Plusieurs tonnes reposent sur une seule pierre. Contrastant avec le corps de logis, les deux tourelles sont couvertes d'ardoises qui forment d'harmonieux dessins.   GARRAUBE  Le corps de logis a été élargi côté cour et un monumental escalier en pierre a été ajouté côté jardin,et les communs ont été profondément modifiés. Le long bâtiment en diagonale a été démoli et remplacé par un ensemble importantde bâtiments adoptant un plan rectangulaire autour d'une seconde cour qui s'ouvre sur l'extérieur par deux portails. Un autre bâtiment composé de quatre ailes autour d'une cour fermée a été ajouté.","habitants":"Famille Valleton\r\n        \"","divers":"A  Liorac-sur-Louyre; Genthial  grav 4-5  GPS : 44° 53' 52\" Nord, 0° 38' 44\" Est.     Garaube  grav-3  GPS : 44° 53' 52\" Nord, 0° 38' 4\" Est. Carrieux  grav 1-2. Goreille grav-6. Ricardie grav 7. Laroque grav 8. Liorac grav 9.","gps":"44° 53' 52\" Nord, 0° 38' 44\" Est.     Garaube  grav-3  GPS :","images":["../image/image_24/24_Liorac_Louyre_1.jpg","../image/image_24/24_Liorac_Louyre_2.jpg","../image/image_24/24_Liorac_Louyre_3.jpg","../image/image_24/24_Liorac_Louyre_4.jpg","../image/image_24/24_Liorac_Louyre_5.jpg","../image/image_24/24_Liorac_Louyre_6.jpg","../image/image_24/24_Liorac_Louyre_7.jpg","../image/image_24/24_Liorac_Louyre_8.jpg","../image/image_24/24_Liorac_Louyre_9.jpg"]},"Consult_chateau_formulaireb774-2":{"id":"Consult_chateau_formulaireb774-2","dept":"24","canton":"Brantôme","commune":"Lisle","nom":"Lisle","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Lisle château-Bas du XVIe siècle, château-Haut, de style Renaissance construit au XVIe siècle sur les vestiges d'un précédent château fort remontant au XIIe siècle ; il est partiellement inscrit aux M.H. depuis 1942 pour un escalier monumental en pierre. Le manoir de la Peyzie, ancienne habitation de la famille de Labrousse de la Peyzie du XIXe siècle, le manoir de la Rochette, ancienne propriété de la famille de Fumel et de la famille Linard du XVIIIe siècle.\r\nLISLE aussi appelé, le petit Versaille de l'Isle, ce magnifique château à été construit  en 1696 par Charles de Chandelieu, un officier de l'armée française, cette ancienne demeure fut dans un premier temps habitée par la famille Chandieu, jusqu'à la fin du XVIIIe siècle. Durant le XIXe siècle, résida d'abord François Louis Roulet de Neuchâtel puis fut transmis par mariage aux Cornaz de Montet Cudrefin. En 1876, la commune de l'Isle rachète le château et le restaure. Aujourd'hui, le bâtiment accueille des locaux communaux, des logements et des classes d'écoles.    CHATEAU Haut, ce fief avait pour propriétaire la famille des Saint-Astier, et passa aux Preyssac de Léonce, puis aux Bertin, et enfin au XVIIIe siècle,aux Fargeot qui le possèdent encore.","architecture":"LISLE  présente un plan en U, avec corps de logis principal et deux ailes en retour d'équerre délimitant une cour d'honneur. Le corps central abrite les anciens salons et appartements seigneuriaux, et les ailes les services et locaux secondaires. Il fut le premier monument régional dont l'architecture provient du classicisme, est un monument riche en anecdotes. Tirée de l'époque du classicisme, née en france vers 1700, cette bâtisse ressemble fortement au courant architectural à l'époque où fut construit le château de Versaille.  Depuis 1941, l'édifice est classé comme M.H.                                                                                  CHATEAU-BAS  de plan carré à deux niveaux  et à toit brisé.                                                                  CHATEAU-HAUT  Au XIIIe siècle, des remparts sont construits qui enclosent la ville en une bastide. Au siècle suivant, la cession de Lisle à  lautorité directe du roi de France, Philippe Le Bel, accorde à la ville, notamment par lautorisation de foires et de marchés réguliers. Cest au XVIe siècle, pendant les guerres de Religion, que la ville assiégée qui résiste et veut rester fidèle au roi catholique perd une grande partie de ses fortifications.  Corps de logis rectangulaire à deux niveaux   sur soubassement accolé en prolongement de chaque côté de dépendances avec terrasses.      PEYZIE manoir de plan rectangulaire à cinq travées  avec pavillon saillant central plein cintre  avec lucarne sur comble du troisième niveau sur un toit en croupe.","habitants":"Peyzie  famille de Labrousse                               Rochette famille de Fumel                                               Lisle Charles de Chandelieu\r\n        \"","divers":"A Lisle château Bas grav 1-et 5, Château Haut grav 2-3. Peyzie grav 4","gps":"","images":["../image/image_24/24_Lisle_1.jpg","../image/image_24/24_Lisle_2.jpg","../image/image_24/24_Lisle_3.jpg","../image/image_24/24_Lisle_4.jpg","../image/image_24/24_Lisle_5.jpg"]},"Consult_chateau_formulairec985":{"id":"Consult_chateau_formulairec985","dept":"24","canton":"Montignac","commune":"Thonac","nom":"Losse","type":"Château","periode":"XV-XVI","histoire":"LOSSE, la forteresse médiévale, grand stratège et militaire, fidèle serviteur de la Couronne, après avoir été page de Francois Ier, Jean II de Losse  servit tous les fils de Catherine de Médicis : François II, Charles IX et Henri III et fut aussi tuteur du futur Henri IV. Cela lui valut l'attribution de fonctions et de charges ainsi que l'octroi de propriétés.   C'est à Jean II de Losse (1504-1580)   Il fut un familier de la Cour ou il vit la réalisation des nouveaux critères architecturaux.  Ainsi lorsqu'à la fin de sa carrière il revient en Périgord comme lieutenant général gouverneur du Limousin et de la Guyenne, il souhaita mettre sa demeure ancestrale au goût du jour selon l'influence italienne, tout en gardant une sobriété et une modestie propres à ses racines provinciales.  De plus, fort de son expérience de défense des places fortes contre les troupes de Charles Quint, il eut le souci, en cette période troublée de guerres de religions et de troubles civils, d'adapter les fortifications médiévales. En 1576, Jean II de Losse met sa demeure ancestrale au goût du jour, comme cela était son désir    La famille de Losse a été propriétaire jusquà la Révolution, appartient depuis  à la princesse dAnnam. Depuis 2007 acquit par la famille Van der Schueren.","architecture":"LOSSE, le châtelet commande un pont jeté sur des douves sèches large et profondes. Ce pont dormant a succédé au XVIIe siècle à deux  pont-levis, l'un pour les piétons, l'autre pour les cavaliers et les véhicules. Des fentes verticales aménagées dans la maçonnerie permettaient le passage des contre-poids. L'enceinte, entourée de douves sèches creusées en partie dans le rocher, consistait en une double muraille crénelée reliant les tours entre elles. Son assise est antérieure aux XVe siècle. En 1570  elle fut surtout modifiée en fonction de l'apparition des armes à feu, par la création d'orifices de dimensions diverses, adaptés aux divers canons et couleuvrines utilisés. La tour Sainte-Marguerite ornée d'une corniche moulurée a été transformée en pigeonnier. La tour d'Eperon a conservé son chemin de ronde ; une fenêtre  a été ouverte à la Renaissance côté douves. La tour Nord-Est sur la Vézère, écroulée au XIXe siècle, fut relevée et couverte d'un toit vers 1840, époque à laquelle fut également construite la grange sur les remparts. Le grand logis, le retour à l'Antiquité est plus manifeste sur la façade de l'aile qui soude en équerre. Le style de la Renaissance s'exprime plus particulièrement dans la corniche en saillie qui rompt la hauteur des façades, et dans le rythme régulier des croisées à  meneaux plats et encadrement géométrique soulignés de frises à denticules. La porte d'entrée est flanquée de deux pilastres d'ordre toscan.","habitants":"Famille de Losse\r\n        \"","divers":"A Thonac le château de Losse Grav de 1 à 5.","gps":"","images":["../image/image_24/24_Losse_1.jpg","../image/image_24/24_Losse_2.jpg","../image/image_24/24_Losse_3.jpg","../image/image_24/24_Losse_4.jpg","../image/image_24/24_Losse_5.jpg"]},"Consult_chateau_formulaireda7f":{"id":"Consult_chateau_formulaireda7f","dept":"24","canton":"Verteillac","commune":"Lusignac","nom":"Lusignac","type":"Château-fort","periode":"XIII-XV","histoire":"LUSIGNAC, il semble que les nobles de La Porte soient à l'origine du château fort de Lusignac au XIIIe siècle. Il appartenait alors à la famille de la Porte aux Loups, seigneurs de Lusignac, passa ensuite aux Brianson jusqu'en 1654, puis à nouveau aux seigneurs de La Porte et de Lusignac. En 1714, il est passé à Pierre de Lageard, seigneur et comte de Cherval, grand sénéchal d'Angoumois, descendant de Laurent de Lageard,  il est resté en la possession de cette famille jusqu'en 1855. Le château a été endommagé pendant la Révolution puis en 1880 par un incendie qui a détruit une grande partie du bâtiment. Au début du XXe siècle il a été vendu à la famille Texier, qui l'a sommairement entretenu. En 1972, le château a été racheté par le propriétaire actuel, qui l'a restauré. Le toit de la porte principale avait été construit asymétriquement en fonction des vents, mais cela a été changé pendant la restauration du château.","architecture":"LUSIGNAC,  appelé château fort, est situé au centre du bourg. Il a été d'abord édifié au XIIIe siècle puis reconstruit au XVe siècle.  Le château, bâti sur la base d'une muraille rectangulaire ponctuée de quatre tours, se compose d'un logis du XVe siècle, en pierre de taille et moellon de calcaire, ses baies ont été agrandies à la fin du XVIe siècle. Il s'avère que les meneaux et les croisillons des tours sont en bois. Cette partie du château est accostée d'une tourelle polygonale achevée par un toit conique et protégé par de la tuile plate. Longue courtine formant le flanc sud-est, ponctuée par deux tours carrées, sans doute destinées à un usage résidentiel, percées de fenêtres à meneaux et de canonnières. Ces ouvertures de tir sont ménagées, soit dans les allèges des fenêtres, sur les côtés des tours, permettant ainsi le tir rasant le long de la courtine, soit directement dans le mur. Au sud-ouest, le portail est pourvu d'une grande bretèche restaurée. Le millésime de 1665 couronne la porte charretière. La porte piétonne, en contrebas, est accessible par un petit escalier. Donnant sur la cour intérieure, la porte Renaissance à bossages, dégradée pendant la Révolution, est couronnée d'un fronton sans doute orné des armes des La Porte, aujourd'hui bouchées ainsi les créneaux des courtines ont disparu. En 1880 un incendie a détruit le flanc nord, remplacé par le prolongement du mur d'enceinte.","habitants":"Famille de la Porte aux Loups\r\n        \"","divers":"Lusignac GPS : 45° 19' 40,64\" Nord, 0° 18' 47,07\" Est","gps":"45° 19' 40,64\" Nord, 0° 18' 47,07\" Est","images":["../image/image_24/24_Lusignac_1.jpg","../image/image_24/24_Lusignac_2.jpg","../image/image_24/24_Lusignac_3.jpg","../image/image_24/24_Lusignac_4.jpg"]},"Consult_chateau_formulaire6075-2":{"id":"Consult_chateau_formulaire6075-2","dept":"24","canton":"Périgueux","commune":"Trélissac","nom":"Magne","type":"Château","periode":"XIX","histoire":"MAGNE, au XIXe siècle, les bâtiments communaux de Trélissac, situés en zone humide, le long de l'Isle nécessitaient de nombreuses et coûteuses réparations.  à la suite d'une proposition d'Alfred Magne  fils de Pierre Magne, ministre des Finances de Napoléon III , et à ses frais. À la fin des travaux, Alfred Magne devient propriétaire des anciens bâtiments et terrains situés en bordure de l'Isle et sur lesquels il fait ériger le château Magne, entre 1864 et 1869, selon les plans de l'architecte parisien Bertelin. \r\nMagne du XIXe siècle  ce monumental château, sans style précis mais qui coûtera une fortune avec plus de 25 pièces. Après avoir été la résidence du fils de Pierre Magne et de Napoléon Magne, ce dernier en fait don à l'hôpital de Périgueux  en 1940  il abrite un hôpital militaire. Devenu annexe de l'hôpital de Périgueux, les personnes indigentes et les S.D.F sont soignés au château avec l'aide des religieuses de Sainte-Marthe, jusqu'en 1990 date de sa vente à un particulier qui entreprend une restauration et réfection en appartements de standing à louer.                      Dans les années 1950, l'hôpital de Périgueux y ouvre un hospice pour personnes indigentes, aidé des religieuses de la congrégation Sainte-Marthe. En 2001, le château est acheté par un particulier, qui possède déjà le château de la Roche, à Annesse-et-Beaulieu, à l'ouest de Périgueux. Le château Magne est inscrit au titre des M.H. le 29 novembre 2004. En 2005, un promoteur immobilier le rachète et y aménage ensuite vingt-quatre appartements de luxe, du F2 au F4, dont la plupart sont loués","architecture":"MAGNE se situe sur la commune de Trélissac, quatre kilomètres à l'ouest de Périgueux.\r\nLe château est situé dans un vaste parc où se trouvent également le vieux  château de Trélissac ainsi que les ruines de l'ancienne église gothique. Bâti en briques et en pierres dans le style second Empire, mais comportant des inspirations de la Renaissance, le château se présente sous la forme d'un haut corps de logis rectangulaire orienté nord-est/sud-ouest, encadré de deux pavillons flanqués chacun d'une tour polygonale, aux extrémités nord et ouest.","habitants":"Famille Magne\r\n        \"","divers":"A Trélissac; Magne grav 1 à 6     GPS : 45° 11' 31,4\" Nord et 0° 46' 28,2\" Est.","gps":"45° 11' 31,4\" Nord et 0° 46' 28,2\" Est.","images":["../image/image_24/24_Magne_1.jpg","../image/image_24/24_Magne_2.jpg","../image/image_24/24_Magne_3.jpg","../image/image_24/24_Magne_4.jpg","../image/image_24/24_Magne_5.jpg","../image/image_24/24_Magne_6.jpg"]},"Consult_chateau_formulaire2126":{"id":"Consult_chateau_formulaire2126","dept":"24","canton":"Saint-Astier","commune":"Manzac sur Verne","nom":"Manzac_Verne","type":"Château","periode":"XVII-XX","histoire":"Château de Leyzarnie, rebâti au début du XXe siècle, inscrit en 2008 au titre des M.H. Tour de l'ancien château du Châtenet. Chartreuse de la Couture. Chartreuse de la Faye. Manoir de Dives du XVIIe siècle. Cluzeau à Bencharel.\r\nLEYZARNIE, Le château de Leyzarnie fut la propriété de la famille Leybardie, puis aux Flageac et enfin aux Castaing, ancienne résidence de la famille du Castaing de  Eyzarnie, dont plusieurs membres émigrèrent à la Révolution. L'Abbé de Leyzarnie, quoique insermenté y put résider pendant la tourmente, grâce à son âge avancé, doublé d'infirmités. C'est peut-être lui qui fit graver au dessus du grand portail,  a été substitué à Dominus qu'on lit dans le texte,  par allusion à la famille de Saint-Angel, alliée aux De Castaing qui habitait aussi Leyzarnie. Ce petit château appartenait à la fin du XIXe siècle à monsieur de Cremoux qui épousa mademoiselle de Leybardie. Pendant les deux premières années du XXe siècle, le propriétaire du château de Leyzarnie est le comte D'Ossemoy. Il a épousé mademoiselle Woutter-Coppens qu'on disait apparentée à la famille Royale Belge. Monsieur D'Ossemoy fît démolir le château qu'il venait d'habiter et il confia la construction de l'actuel château à un architecte et à des ouvriers venus d'Agen. Sept maisons et propriétés entouraient le château de ses vignes, soignées par monsieur Sudry.","architecture":"la construction du château du Chatenet date du XVIIe siècle. Il ne reste comme vestige  que la Tour de l'ancien château du Chatenet.                              LEYZARNIE, la construction du château de Leyzarnie dure de 1900 à 1908. Le château est un édifice classique. Son décor mêle les styles gothique, Renaissance et Art-Nouveau.  Le château de Leyzarnie occupe le sommet d'une colline à l'est de la commune de Manzac-sur-Vern. Le plan en U est composé d'un long corps central avec un avant-corps central très émergent, deux ailes et deux pavillons aux extrémités.","habitants":"Famille Du Castaing de  Eyzarnie\r\n        \"","divers":"A Manzac sur Verne;   château de Leyzamie grav 3 à 4. Chatenet  grav 6  GPS : 45° 05' 18\" Nord, 0° 35' 10\" Est. Dives grav 4 et de la Couture grav 5.","gps":"45° 05' 18\" Nord, 0° 35' 10\" Est. Dives grav 4 et de la Cout","images":["../image/image_24/24_Manzac_Verne_1.jpg","../image/image_24/24_Manzac_Verne_2.jpg","../image/image_24/24_Manzac_Verne_3.jpg","../image/image_24/24_Manzac_Verne_4.jpg","../image/image_24/24_Manzac_Verne_5.jpg","../image/image_24/24_Manzac_Verne_6.jpg"]},"Consult_chateau_formulaire0b7a":{"id":"Consult_chateau_formulaire0b7a","dept":"24","canton":"Mareuil","commune":"Mareuil sur Belle","nom":"Mareuil_Ambelle","type":"Forteresse","periode":"XV-XVIII","histoire":"MAREUIL cité au XIe siècle, était le siège de l'une des quatre baronnies du Périgord (avec Beynac, Biron et Bourdeilles), le château actuel fait suite à un autre plus ancien victime des combats de la guerre de cent ans, a été reconstruit au début du XVe siècle par Geoffroy de Mareuil qui en fait une résidence de plaisance de style gothique flamboyant. Incendié durant les guerres de religion, il est abandonné un siècle et demi plus tard. Après plusieurs ventes, il est acquis au XVIIe siècle par Isabelle de Beauville qui le lègue à sa fille Jeanne-Françoise, épouse de Daniel de Talleyrand-Périgord. Ceux-ci et leur descendance entreprirent la restauration du château, mais n'y habitèrent que rarement, et le délaissèrent à la Révolution. En 1883, Mareuil est compris dans le legs que fait Élie-Roger-Louis de Talleyrand-Périgord, prince de Chalais, à lhôpital de Chalais qui le convertit en exploitation agricole. En 1963, le château est racheté, restauré, remeublé et habité à nouveau par les ducs de Montebello, « princes de Sievers ».  Il abrite un musée consacré au maréchal Lannes et se visite sur rendez-vous. Le château de Mareuil a été classé M.H. par liste en 1862.                                                                   AMBELLE à trois KM à l'ouest à Ste-Croix, c'est l'ancienne demeure des Pindray et des de La Vilatte; le château d'Ambelle appartenait en 1940, à M. Pinçon.    Dans la même zone le château de Fieux à Rochebeaucourt-Argentine ou il y eu une grande ligné de seigneurs","architecture":"MAREUIL, c'est un château fort de plaine constitué d'un ensemble de bâtiments du XVe au XVIIIe siècle disposés sur une motte. On accède au château à partir d'une première tour-porte située sur la contrescarpe du fossé. Un petit bâtiment accolé au revers de cette tour servait de corps de garde. Le passage franchi, sur la droite une longue rampe montante, bordée tout au long de son côté extérieur par un parapet percé d'embrasures pour armes à feu, s'élève jusqu'à un pont dormant franchissant le fossé. Cette rampe montante, qui longe sur une trentaine de mètres la courtine du château, formait une sorte de barbacane dont le rôle était de contrôler et de défendre l'accès au château tout en protégeant de sa masse la courtine devant laquelle elle se situe. Le pont de pierre franchissant le fossé était autrefois interrompu par un pont-levis. Le passage voûté de l'entrée est encadré de deux tours munies d'embrasures à canons. En plus du pont-levis, un double vantail ainsi qu'une herse défendaient cette porte. À l'intérieur du château, les bâtiments subsistant à l'heure actuelle sont disposés en L. À la jonction des deux corps de bâtiments se situe une tour de plan rectangulaire qui dépasse en hauteur le reste de l'édifice. Il s'agit de l'ancien donjon. AMBELLE, aux XVIe et XVIIe siècles époque qui correspond à une période de prospérité pour la commune,  Ambelle situé au nord-est de la commune de Sainte-Croix-de-Mareuil, sur un coteau. La demeure, aux vastes logis, est flanquée d'une antique tour ronde crénelée  surmontée d'un toit. Cet ancien repaire noble est devenu une exploitation agricole.","habitants":"Daniel de Talleyrand-Périgord\r\n        \"","divers":"A Mareuil sur Belle; Mareuil Ambelle grav de 1 à 8  GPS : 45° 27' 14,52\" Nord et 0° 27' 10,86\" Est. Rochebeaucourt grav 9.","gps":"45° 27' 14,52\" Nord et 0° 27' 10,86\" Est. Rochebeaucourt gra","images":["../image/image_24/24_Mareuil_Ambelle_1.jpg","../image/image_24/24_Mareuil_Ambelle_2.jpg","../image/image_24/24_Mareuil_Ambelle_3.jpg","../image/image_24/24_Mareuil_Ambelle_4.jpg","../image/image_24/24_Mareuil_Ambelle_5.jpg","../image/image_24/24_Mareuil_Ambelle_6.jpg","../image/image_24/24_Mareuil_Ambelle_7.jpg","../image/image_24/24_Mareuil_Ambelle_8.jpg","../image/image_24/24_Mareuil_Ambelle_9.jpg"]},"Consult_chateau_formulaire73eb":{"id":"Consult_chateau_formulaire73eb","dept":"24","canton":"Mareuil","commune":"Mareuil","nom":"Mareuil_Chateau","type":"Forteresse","periode":"XV-XVII","histoire":"A MAREUIL plusieurs châteaux; Beaulieu, Beauregard, Gauterie, Monbreton.                           MAREUIL, (voir article suivant).                               BEAULIEU, au sud-ouest du bourg,  propriété de la famille Pichon, . La famille Pichon possède le domaine de la Révolution à 1960, date à laquelle il est racheté par les actuels propriétaires.\r\nBEAUREGARD, du XVe, XVIe et XVIIe siècles, inscrit au titre des M.H. en 1948.       Le château surveillait lentrée en Périgord, laccès vers Angoulême et vers le Limousin. Cest pourquoi il a joué un grand rôle pendant une partie de la guerre de 100 ans. Le château actuel fut reconstruit vers la fin du XVe siècle, sur des fondations plus anciennes. La dernière prieure de l'abbaye de Fontaine y naquit. Elle fut tuée et brûlée à la Révolution, et repose dans l'église de Saint-Pardoux. Le corps de logis est flanqué de deux énormes tours à mâchicoulis et est défendu au nord par une troisième tour désaxée sur la gauche. Situé à l'est la chartreuse du XVIIIe siècle à un étage soudée à la forteresse en équerre. Des pilastres rejoignent le toit.\r\nGAUTERIE,   La commune de Mareuil tient une place importante dans lhistoire du Périgord, il sagit de lune des quatre baronnies de la contrée parmi Bourdeilles, Biron et Beynac. Dautre part, au XIIIe siècle, le village est un prieuré rattaché à Brantôme. Dailleurs, les barons de Mareuil affichent également leur attachement à la religion. En effet, leur devise est Ré qué Diou, ce qui signifie Rien que Dieu. Le château de la Gauterie, ancienne demeure de la famille des de Raimond, a connu de nombreuses restaurations entreprises par les propriétaires actuels.\r\nMONBRETON,  La vieille demeure appartenait à des familles les Falampin et les Petits.","architecture":"BEAULIEU,  offre un logis classique encadré par deux tours circulaires côté parc et deux pavillons carrés côté cour. Le haut des fenêtres est orné de têtes sculptées et lintérieur conserve un bel escalier à balustres de pierre. Des communs forment des ailes en retour déquerre, reliées par une grille rythmée de pilastres                                           \r\nGAUTERIE, leur châtellenie comprend onze paroisses, est une construction qui mêle des éléments des XVIe et XIXe siècles, mais qui  sinscrit dans les traces dun édifice plus ancien, situé au sommet dune falaise, on peut voir une partie de la tour descalier datant du XVIe siècle et le pigeonnier qui est une ancienne tour de défense. Au sud du bourg, avec des éléments du XVIe siècle mais qui s'inscrit dans les traces d'un édifice bien plus ancien Lensemble a été largement remanié, notamment la tour carrée.\r\nMONTBRETON se compose dun corps de logis rectangulaire à cinq travées. Le bâtiment comporte deux étages et un supplémentaire, placé sous les combles, est construit en pierre de taille. Au-dessus dune corniche ouvragée se dresse le toit du logis qui se termine à ses extrémités, par deux petits toits pointus. Dans chacun de ces toits souvrent une fenêtre donnant sur les combles. Située au centre une troisième fenêtre est placée en chien assis, deux cheminées en pierre complètent la toiture couverte dardoises.","habitants":"Famille des de Raimond\r\n        \"","divers":"Beaulieu   grav 1-2  GPS : 45° 26' 9,5\" Nord et 0° 25' 12,3\" Est.    Beauregard    GPS : 45° 26' 02,1\" Nord et 0° 26' 2,9\" Est. Gauterie grav 6-7 GPS : 45° 27' 05\" Nord, 0° 27' 11\" Est.   Mareuil GPS : 45° 27' 14,52\" Nord, 0° 27' 10,86\" Est. Chavreroche grav 3. Bélussière grav 4. Clozuroux grav 5. Puychenie grav 8","gps":"45° 26' 9,5\" Nord et 0° 25' 12,3\" Est.    Beauregard    GPS","images":["../image/image_24/24_Mareuil_Chateau_1.jpg","../image/image_24/24_Mareuil_Chateau_2.jpg","../image/image_24/24_Mareuil_Chateau_3.jpg","../image/image_24/24_Mareuil_Chateau_4.jpg","../image/image_24/24_Mareuil_Chateau_5.jpg","../image/image_24/24_Mareuil_Chateau_6.jpg","../image/image_24/24_Mareuil_Chateau_7.jpg","../image/image_24/24_Mareuil_Chateau_8.jpg"]},"Consult_chateau_formulaireb501":{"id":"Consult_chateau_formulaireb501","dept":"24","canton":"Sarlat la Caneda","commune":"Vézac St-Pantaly d","nom":"Marqueyssac_Vézac","type":"Château","periode":"XV-XVI-XVIII","histoire":"A Vézac, château de Marqueyssac du XVe et XVIIe siècles, dont les façades et toits sont inscrits au titre des M.H.en 1948.  Le manoir de Rochecourbe du XVIe?-XVIIIe siècle.  Le manoir de Soulvignac du XVIe-XVIIIe siècle. La Malartrie du XIIe siècle.          MARQUEYSSAC, doit son nom au lieutenant de la châtellenie de Castelnaud qui le fait édifier au XVe siècle.  La famille de Marqueyssac est fort ancienne en Périgord puisque sa branche primordiale prend naissance à la fin du XIIe siècle. Originaire du château et fief de Marquessac, près de Beynac, elle sinstalla par la suite sur les bords de lAuvezère. Son nom est mentionné du 15 mars 1497 lors de lacquisition des paroisses de « Sainct Pardoulx, Saint-Panthaly et de Broschal » par Pons de Marqueyssac.  Passa aux Prouhet, puis aux Hautefort et  en 1692 achat du domaine par Bertrand de Vernet conseiller du roi à Sarlat qui fait dessiner  les jardins par un  éléve de le Nôtre, Porcher. Au XVIIIe siècle  passe par alliance  aux Cerval, François de Cerval maréchal de camp, le domaine est ruiné par un incendie le logis est rebâti par François. En 1835 un allié des Cerval Julien Bessière pair de France et président du conseil général de la Dordogne fait percer  à flanc de coteau une grande allée cavalière. Julien de Lavergne de Cerval hérite de Marqueyssac en 1861 impose sa marque  sur les jardins du domaine sur une terrasse formant un bastion transformation d'un labyrinthe planté de buis topières par milliers. Le domaine passe par héritage aux Jonghe d'Ardoye propriétaire actuel et  Kleber Rossillon attacher à maintenir la création de julien de Cerval.                                                 SALLES de Christian Vabret hôtel restaurant fut remaniée au XIXe de deux longs communs agrémentés de pigeonniers en symétrie. Sauvé de la ruine il y a 45 ans par la famille Couillaud.","architecture":"MALARTRIE  remonte au XIIe siècle, était un hopital pour lépreux, cette merveilleuse réalisation n'est pas un château fort directement parvenu de l'époque médiévale. Mais il en restitue si bien les systèmes défensifs et l'aménagement des fonctions, protégé par un rempart qui était  crénelé entoure l'actuel château, d' une tour défensive, le donjon, la chapelle. percé de fenêtre à meneaux en croix, le donjon est très défensif, archères, mâchicoulis ,  elles ne sont achevées quà la veille de la première guerre mondiale, chemin de ronde crénelé sont bien des astuces défensives médiévales. Le donjon  rectangulaire. Les archères cruciformes en bêche me font dater le site du XIIIe siècle. La présence de fenêtres dans la courtine prouve que la vie continue dans le château.   A la fin du XIXe siècle  Charles de Beaupoil, comte de Saint-Aulaire, modernise et aménage l'architecture du château en style Renaissance.               MARQUEYSSAC, la construction date  de la seconde moitié du XVIe siècle, voire du début du XVIIe siècle si on le compare au château de Laxion, à Corgnac sur lIsle, édifié durant cette période. Deux corps de logis rectangulaires de lélévation sud encadrent le châtelet dentrée. Deux ailes en retour déquerre et cantonnées de tours rondes, fermaient la cour jusquà la rivière, assurant la défense côté nord. Un fossé ceinturait le château depuis la rivière. Au moins jusquaux années 1960, dates de certaines photographies, le château possède ses toitures, mais la tour et laile ouest ont déjà disparu.","habitants":"Famille de Marqueyssac\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Vézac St-Pantaly d'Ans  vestiges grav-1. Malatrie grav 2-3-4  GPS : 44° 49' 36,5\" Nord et 1° 10' 41\" Est.                Marquessac grav-6  GPS : 44° 48' 57,24\" Nord, 1° 8' 54,24\" Est. Sourzac GPS : 45° 03' 04\" Nord, 0° 23' 29\" Est. Salles grav 7-8-9","gps":"44° 49' 36,5\" Nord et 1° 10' 41\" Est.                Marques","images":["../image/image_24/24_Marqueyssac_V%c3%a9zac_1.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_2.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_3.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_4.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_5.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_6.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_7.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_8.jpg","../image/image_24/24_Marqueyssac_V%c3%a9zac_9.jpg"]},"Consult_chateau_formulaire1320":{"id":"Consult_chateau_formulaire1320","dept":"24","canton":"Monpazier","commune":"Marsalès-Monpazier","nom":"Marsalès","type":"Château","periode":"XV","histoire":"MARSALES, datant du XVe siècle,  Cette demeure de charme est située en pleine nature, au cur du Périgord Noir, non loin de la bastide de Monpazier.  Restauré en 2016, en chambre d'hôtes, le château conserve son charme dantan. La cour des tilleuls à lextérieur et la grande terrasse seront les lieux magiques pour votre vin dhonneur ou votre brunch. Quant à la salle de réception, vous pourrez larranger à votre convenance puisque trois salles sont à votre disposition. La salle des Bastides sétend sur 200 m² et permet daccueillir 190 personnes. La salle du 14 juillet permet à 90 personnes de sinstaller, ses 170 m² comprennent un bar et une scène. Enfin la salle voûtée, de 50 m², pourra accueillir les enfants, ou la piste de danse.\r\nSt-GERMAIN, château  du XVe siècle XVIe siècle XVIIIe siècle, classé M.H.\r\nBONNEVILLE, ce château appartenait aux Dufau à la fin du XVe siècle. En 1680, le château est acheté par Étienne de Laval aux Dufau de Fontanelle grâce à la dot de son épouse, Françoise d'Escayrac. Cette dernière étant catholique et Étienne de Laval protestant, il s'est converti au catholicisme pour pouvoir se marier en 1685.\r\nTour hexagonale du hameau de Péchalvès probablement construite en 1598 d'après une inscription dans la tour. La maison de Péchalvès a appartenu à la famille Pourquery du XVe au XVIIIe siècle. Daniel Pourquery est le premier consul de Monpazier en 1594, avocat au parlement, pendant la première révolte des croquants qui s'appelaient eux-mêmes les Tards Avisés.","architecture":"MARSALES,  bâti à Marsalès, La construction date du XVe au XVIIe siècle. Le château était défendu au Nord par l'abrupt du plateau, et au Sud par une douve sèche. L'édifice actuel se compose d'un corps de logis barlong cantonné de deux grosses tours. Les tours, talutées à leur base, ont perdu le chemin de ronde et les mâchicoulis. Le corps de logis a été profondément modifié au XVIIe siècle. Lucarnes à frontons triangulaires ou circulaires. Au XVIIe siècle, la façade Sud fut encadrée de grands bâtiments à usage de communs, comportant à chacune de leurs extrémités, des pavillons rectangulaires. Des bâtiments de l'ouest ne subsiste que le pavillon sud. La cour d'honneur devait fermer par une grille, comme l'attestent deux piliers renforcés jusqu'à mi-hauteur et couronnés d'un pédoncule supportant une sphère en pierre. Le château de Marsalès est inscrit aux M.H. le 29/11/1976","habitants":"Seigneurs locaux\r\n        \"","divers":"A Marsalès-Monpazier; Marsalès grav 1 à 4 GPS : 44° 42' 11\" Nord, 0° 53' 10\" Est. St Germain grav 5.","gps":"44° 42' 11\" Nord, 0° 53' 10\" Est. St Germain grav 5.","images":["../image/image_24/24_Marsal%c3%a8s_1.jpg","../image/image_24/24_Marsal%c3%a8s_2.jpg","../image/image_24/24_Marsal%c3%a8s_3.jpg","../image/image_24/24_Marsal%c3%a8s_4.jpg","../image/image_24/24_Marsal%c3%a8s_5.jpg"]},"Consult_chateau_formulaire766a":{"id":"Consult_chateau_formulaire766a","dept":"24","canton":"Thiviers","commune":"Saint-Jean de Cole","nom":"Marthonie","type":"Château","periode":"XV-XVI","histoire":"MARTHONIE, les premiers membres de la famille de La Marthonie qui a donné son nom au château sont cités à Saint-Jean-de-Côle dans des actes de vente. Le château est ruiné pendant la guerre de cent ans quand les Anglais s'emparent du village en 1394, s'y installent et le fortifient. Les anglais sont chassés de Saint-Jean-de-Côle par le sire d'Albret, en 1405. Le château actuel a été reconstruit à partir de la fin du XVe siècle par Étienne de La Marthonie, conseiller au parlement de Bordeaux, marié en 1481 avec Isabeau de Pompadour, sur de l'évêque de Périgueux, et achevé par son fils, Pierre Mondot de La Marthonie au début du XVIe siècle. À la fin du XVIIe siècle, Marie de Beynac, fille de Marie de La Marthonie et de Guy de Beynac, héritière de La Marthonie, s'est mariée avec César-Phbus-François de Bonneval (1703-1765), comte de Bonneval, seigneur de Blanchefort, colonel du régiment du Poitou en 1723, brigadier des armées du roi, neveu de Claude Alexandre de Bonneval, dernier représentant des Bonneval de Coussac-Bonneval. Marie de Beynac a légué par testament du 3 janvier 1768 les seigneuries de La Marthonie et de Bruzac à Pierre et Marie-Claude de Beynac (1732-1802), ses neveux. Par transaction et héritage, elles ont été attribuées à Marie-Claude de Beynac mariée à Christophe de Beaumont du Repaire (1731-1802). Marie-Claude de Beynac a pris possession du château le 7 novembre 1774. Son mari, Christophe marquis de Beaumont est qualifié de premier baron du Périgord, brigadier des armées du roi, seigneur de Beynac, Commarque, La Marthonie, Bas-Bruzac et autres places. Ils ont émigré en 1793 et la terre a été vendue comme bien national. La terre de La Marthonie a été rachetée en partie par un autre comte de Beaumont vers 1830.","architecture":"VILLARS, à l'ouest de la Marthonie est un petit château appelé aussi le château de l'Archerie  sa construction date de la moitié du XIXe siècle. Le château de Villars a été transformé en une belle maison d'hôtes. \r\nMARTHONIE , l'édifice de structure compléte  la partie médiévale agrandie au XVe siècle présente un bâtiment flanqué d
