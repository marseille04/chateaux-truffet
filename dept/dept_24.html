urplombant la Dordogne, face au village de Mouzens, la demeure est un ensemble de corps de logis des XVe et XVIe siècles. Sur le portail, des dogues de pierre présentent des blasons et la date de 1636. A la belle époque tout est refondu avec tour carrée et pavillon à pignons, en laissant une large part au hasard et à la fantaisie.","habitants":"famille des Cugnac-Saint-Ours\r\n        \"","divers":"A Marnac, le château Bétou  GPS : 44° 50' 16\" Nord, 1° 01'36\" Est.                                                     Château de Mirabel Grav 1","gps":"44° 50' 16\" Nord, 1° 01'36\" Est.","images":["../image/image_24/24_B%c3%a9tou_1.jpg","../image/image_24/24_B%c3%a9tou_2.jpg","../image/image_24/24_B%c3%a9tou_3.jpg","../image/image_24/24_B%c3%a9tou_4.jpg"]},"Consult_chateau_formulaireecb2":{"id":"Consult_chateau_formulaireecb2","dept":"24","canton":"Le Bugue","commune":"Campagne","nom":"Campagne","type":"Forteresse","periode":"XII-XV","histoire":"CAMPAGNE, le château est connu depuis le XIIe siècle par les sires de Campagne. C'est une possession des archevêques de Bordeaux dont Jean de Beaufort s'empare en 1405 pour le remettre aux Anglais. Les Français le récupèrent en 1432  et il est rasé sur ordre du roi Charles VII. les ruines sont donné par Charles VII à  Brandilis bâtard de la maison de limeuil, puis revient à Arnaud de Camblazac qui partagera la seigneurie avec Jean de Bonald, celui ci arrivera à réunifier le domaine à son profit, à la fin du XVe siècle, Jeanne de Bonald l'apportera par mariage à Adhémar de la Borie  qui  conservera  le domaine jusqu'en 1970. À  la veille de la Révolution, l'officier de dragons, Géraud de la Borie Campagne possédait le château, il épouse Marie de Ségur en présence du Roi Louis XVI qui offrit une fort jolie dot, avant que le militaire conduise la belle en ces lieux où elle passa sa vie , ils conserveront  le domaine jusqu'en 1970.  L'état reçoit le château en legs de la part du dernier marquis de Campagne. Il est intégralement inscrit au titre des M.H.le 5 avril 2001, avec ses dépendances, son parc et ses clôtures.  L'édifice actuel, au XVIIe siècle fief des Roux de Lusson. bâti aux XVe, XVIIe et XVIIIe siècles, a été restauré au XIXe, puis de 2008 à 2014. En 1970, l'état a reçu le château de Campagne en legs de la part du dernier marquis.","architecture":"CAMPAGNE, depuis 2007, il est la propriété du département qui y a installé les services administratifs du pôle international de la préhistoire mentionné dès le XIIe siècle, le château remonte au XVe siècle pour sa partie la plus ancienne. L'aile au nord, avec une galerie ouverte sur cour, datant du XVIIe siècle. L'ensemble a été restauré et mis au goût du jour entre 1854 et 1882. Des communs se développent au nord autour de trois cours, le parc a été redessiné entre 1857 et 1862 par Jean-Jacques Rousseau, pépiniériste  bordelais. Le château fut disputé entre partisans des Anglais et partisans  du roi de France. Vers 1650, Turenne combattant la fronde des Princes, y fit halte. L'édifice actuel, bâti aux XVe, XVIIe et XVIIIe siècles, a fait l'objet de restaurations au XIXe siècle, puis de 2008 à 2014  le château est partiellement entouré d'une douve et placé au milieu d'un parc, ouvert au public. \r\nÉléments protégés MH : le château proprement dit, en totalité, les dépendances, y compris la maison du jardinier, le parc, et les clôtures :inscription par arrêté du 5 avril 2001.","habitants":"Famille d' Adhémar de la Borie \r\n        \"","divers":"Château de Campagne GPS : 44° 54' 30\" Nord et 0° 58' 05\" Est gracv  de 1 à 9.","gps":"44° 54' 30\" Nord et 0° 58' 05\" Est gracv  de 1 à 9.","images":["../image/image_24/24_Campagne_1.jpg","../image/image_24/24_Campagne_2.jpg","../image/image_24/24_Campagne_3.jpg","../image/image_24/24_Campagne_4.jpg","../image/image_24/24_Campagne_5.jpg","../image/image_24/24_Campagne_6.jpg","../image/image_24/24_Campagne_7.jpg","../image/image_24/24_Campagne_8.jpg","../image/image_24/24_Campagne_9.jpg"]},"Consult_chateau_formulaireb25c":{"id":"Consult_chateau_formulaireb25c","dept":"24","canton":"Beaumont","commune":"Bourniquel","nom":"Cardoux","type":"Château","periode":"XIV-XV","histoire":"CARDOUX,  les Feytou possédaient le fief au XIVe siècle, puis les Beaudet qui, bénéficiant de Peschières sur la Dordogne et du droit de pêche sur ce fleuve, blasonnaient de gueules à trois hameçons d'argent. Sous Louis XV, Cardoux passa aux Saint-Exupéry. En 1775, y naquit un Saint-Exupéry, qui sera chevalier de Malte, lieutenant de vaisseau, tué à Aboukir sur L'Orient. Cardoux appartient toujours aux Saint-Exupéry et, dans ce paysage à la fois grave et touchant, empreint de poésie, on se prend à songer à \"Saint-Ex\", qui vint peut-être cousiner en ces lieux.","architecture":"CARDOUX, logis médièval  flanqué de grosses tours carréesdu XIVe, XVe et XIXe siècles l'ensemble du château, au moins par ses substructions, date du XIVe siècle. Transformé au XVe siècle. Aux XVIIIe et XIXe siècles, le château de Cardoux a connu de sévères restaurations, passant ainsi de bâtiment militaire à demeure dagrément et de villégiature.  Dans le parc se dresse un majestueux cèdre du Liban, sans doute planté peu après que Jussieu eut introduit cet arbre en France. Après le XIIIe siècle, lhistoire de Bourniquel se confond avec celle des occupants du château de Cardoux et  avec lhistoire régionale en général. l'édifice de plan en U, trois corps de logis à dux niveaux avec lucarnes sur combles de toit en croupes recouverts de tuiles flanqué aux angles de trois  tours rondes et carrées","habitants":"Famille de Saint-Exupéry\r\n        \"","divers":"Château de Cardoux à Bourniquel.","gps":"","images":["../image/image_24/24_Cardoux_1.jpg","../image/image_24/24_Cardoux_2.jpg","../image/image_24/24_Cardoux_3.jpg"]},"Consult_chateau_formulairecc97":{"id":"Consult_chateau_formulairecc97","dept":"24","canton":"Carlux","commune":"Carlux","nom":"Carlux_Rouffillac","type":"Château_Vestiges","periode":"X-XV-XVIII","histoire":"Carlux  en ruines, inscrit aux M.H. depuis 1927. \r\nCARLUX a dû exister sur le site depuis le Xe siècle. Une tour de guet a été construite sur les anciennes fondations au XIIe siècle. Une bulle du pape Alexandre III datée de 1170, reprenant une bulle du pape Eugène III de 1153, prend sous sa protection l'abbaye de Sarlat et cite la chapelle Sainte-Marie du château, disparue. Carlux dépend du diocèse de Cahors et de la sénéchaussée de Sarlat. La châtellenie de Carlux comprend une vingtaine de paroisses.  Le château a été un fief appartenant aux vicomtes de Turenne. Helis ou Alix de Turenne (v.1208-1251) est vicomtesse de Turenne et a épousé Rudel Hélie d'Aillac III. Un partage est fait en 1251 de la vicomté de Turenne de Raymond IV de Turenne (v.1187-1243). Hélis de Turenne et Hélie III Rudel reçoivent le « castrum de Carlus ». En 1251, leur fille unique, Marguerite de Turenne, a épousé Renaud III, sire de Pons.  Dans des lettres de 1304 faites à Béziers, Philippe le Bel s'est engagé à ne pas détacher le château du domaine de la couronne de France. Pendant la guerre de Cent Ans, le château de Carlux est pris par les troupes anglaises commandées par Archambaud d'Abzac le 21 novembre 1405. Ces troupes se sont emparées du château de Commarque le 23 avril 1406. et brule le château. Il est pris alternativement par les troupes françaises et anglaises. Il sort de cette guerre en partie ruiné. Louis XI a ordonné son démantèlement au sénéchal du Périgord, en 1481. \r\nROUFFILLAC , de Pierre-Paul Grassé  lorsque  sa famille l'occupait   .Le château était très fréquentée au milieu du XXe siècle,  Ce zoologiste de renommée internationale, président de l'Académie des sciences (1967).","architecture":"CARLUX, un petit château est reconstruit comprenant un logis encadré par des tours, probablement avant 1525. Ayant conservé un donjon et une tour d'entrée, il sert de repaire aux protestants pendant les guerres de religion. Les troupes du roi de France reprennent le château de Carlux en 1593 après trois semaines de siège. Les Noailles sont vicomtes de Carlux de 1723 à la Révolution. Le château est partiellement détruit entre 1840 et 1850 pour construire une route. Une tour surplombant la route est détruite en 1940. En 1992 le château est donné à la commune. Des travaux de remise en état sont entrepris pour mettre en valeur ce patrimoine. Les vestiges du château sont inscrits au titre des monuments historiques le 6 janvier 1927    ROUFFILLAC La dernière restauration a gommé de précédents excès prétendant l'embellir. Par sa trouée sur le fleuve, le château jouit d'une des perspectives les plus séduisantes du Périgord, la Renaissance lui a ôté le caractère guerrier qu'il devait avoir à l'origine mais la tour carrée fait toujours illusion. Le château était très fréquentée au milieu du XXe siècle,  ancien repaire noble, aujourd'hui il présente de nombreuses pièces, chacune offrant une vue sur la vallée de la Dordogne,  avec une cour intérieure ombragée, le bâtiment lui-même, bijou architectural digne d'un conte de fées.","habitants":"Fief de Helis ou Alix de Turenne\r\n        \"","divers":"A Carlux le château de Carlux grav de1 à 3  GPS : 44° 52' 59,5\" Nord, 1° 21' 10,1\" Est. Et de Rouffillac grav de 4 à 8 GPS : 44° 53' 05\" Nord et 1° 21' 15\" Est","gps":"44° 52' 59,5\" Nord, 1° 21' 10,1\" Est. Et de Rouffillac grav","images":["../image/image_24/24_Carlux_Rouffillac_1.jpg","../image/image_24/24_Carlux_Rouffillac_2.jpg","../image/image_24/24_Carlux_Rouffillac_3.jpg","../image/image_24/24_Carlux_Rouffillac_4.jpg","../image/image_24/24_Carlux_Rouffillac_5.jpg","../image/image_24/24_Carlux_Rouffillac_6.jpg","../image/image_24/24_Carlux_Rouffillac_7.jpg","../image/image_24/24_Carlux_Rouffillac_8.jpg"]},"Consult_chateau_formulaire27ba":{"id":"Consult_chateau_formulaire27ba","dept":"24","canton":"Carlux","commune":"Carsac-Aillac","nom":"Carsac_Aillac","type":"Château","periode":"XV-XVII","histoire":"A Carsac-Aillac; le château d'Aillac dont je n'ai pas d'information historique,    de Lascours, XVe et XVIe siècles, inscrit en 1973, de l'Hermier.     GAZAILLE, manoir du XVe siècle,  est un ancien repaire noble construit au XVe siècle, fief de la famille Bars de La Gazaille. Le fief est passé à la famille du Bouscot au milieu du XVIe siècle. Il a été transformé et embelli au XVIe et XVIIe siècles. Un grand bâtiment avec des pavillons à ses extrémités placé perpendiculairement a été construit en 1640. La famille du Bouscot émigre en 1792 et passe alors à la famille Playoult.  Le manoir a été restauré en 1995 par les nouveaux propriétaires. Transformé en lieu de vacances.\r\n HERMIER  des comtes de Gurson après la Révolution Hermier  appartenait aux Laffargue, puis aux Gailhard.","architecture":"CARSAC manoir du XVe siècle situé en face de léglise, dont les ruines ne laissent  que découvrir des fenêtres, encadrements de portes et fortifications, le manoir à la base à trois niveaux de plan en équerre pavillon carré à l'angle intérieur avec échaugette accolée. flanqué d'un pavillon carré en déport avec terrasse  couverte sur piliers.                                  LASCOURS le repaire de Lascours n'aurait servi de demeure à une noble famille que depuis la fin du XVIe siècle. Le manoir se compose d'un corps de logis rectangulaire, flanqué au nord d'une tour ronde coiffée en poivrière et comportant l'escalier à vis en bois desservant l'étage supérieur. Au nord une cour intérieure est délimitée par un mur de clôture et les dépendances. Dans l'angle sud-est de cette tour se situe une autre tour carrée aménagée. Les toitures sont couvertes de lauzes.\r\nGAZAILLE  Un grand bâtiment avec des pavillons à ses extrémités placé perpendiculairement a été construit en 1640, cet édifice est un logis rectangulaire éclairé par deux fenêtres à meneaux dont une a été transformée en porte. Une tourelle ronde coiffée en poivrière est contre l'angle nord-ouest. Le manoir s'ouvre sur une terrasse bordé par une balustrade donnant une vue sur la vallée de la Dordogne.   HERMIER, construit au XVIIe siècle, pavillon carré contenant l'escalier qui se trouve au centre de la façade sud sous l'angle rentrant du logis bâti en équerre que prolonge à l'Est une tour octogonale. Une loggia garnie de balustres et de deux colonnes. La tour et  la loggia couvertes d'ardoises.","habitants":"Famille Bars de La Gazaille                                           Famille Gailhard\r\n        \"","divers":"A Carsac-Aillac; le château d'Aillac grav de 1-2.  Gazaille  grav 3 à 6  GPS : 44° 50' 7,41\" Nord, 1° 16' 30,89\" Est                                                                      Hermier grav 7 à 8  GPS : 44° 50' 27\" Nord, 1° 16' 37\" Est.                                                                               Lascours grav-9 GPS : 44° 50' 27\" Nord, 1° 16' 37\" Est","gps":"44° 50' 7,41\" Nord, 1° 16' 30,89\" Est","images":["../image/image_24/24_Carsac_Aillac_1.jpg","../image/image_24/24_Carsac_Aillac_2.jpg","../image/image_24/24_Carsac_Aillac_3.jpg","../image/image_24/24_Carsac_Aillac_4.jpg","../image/image_24/24_Carsac_Aillac_5.jpg","../image/image_24/24_Carsac_Aillac_6.jpg","../image/image_24/24_Carsac_Aillac_7.jpg","../image/image_24/24_Carsac_Aillac_8.jpg","../image/image_24/24_Carsac_Aillac_9.jpg"]},"Consult_chateau_formulaire9190":{"id":"Consult_chateau_formulaire9190","dept":"24","canton":"Saint-Cyprien","commune":"Argentonesse_Roques","nom":"Castel_Meyrals","type":"Château","periode":"XVI-XIX","histoire":"A Castel, le château d'Argentonesse et de La Roque à Meyrals.\r\nARGENTONESSE   est situé à l'ouest du bourg de Castels, face à une source d'eau chaude. La grande maison actuelle fut construite au XIXe siècle par le général Paul de Boysson, sur un logis plus ancien dont il reste notamment le sous-sol voûté et deux tours carrées isolées, l'encadrant symétriquement. La fille du général madame Monterno lui succéda.\r\n  ROQUES, dit de Péager la construction date du XIIe siècle, peut-être plus ancienne. Fief des de Beynac et des de Beaumont, Christophe de Beaumont archevêque de Paris (1703-1781), y est né et y a été envoyé en exil en 1754 par Louis XV après avoir condamné \"Émile ou De l'éducation\" de Jean-Jacques Rousseau, le roi recherchant l'apaisement dans le conflit avec le parlement de Paris.  Anne Logréal en était châtelaine au milieu du XIXe siècle(classé aux M.H en 1963)","architecture":"ARGENTONESSE : fut construit au XIXe siècle de plan rectangulaire à deux niveaux avec lucarnes sur combles brisés, flanqué de pavillon carré aux extrémités. la travée centrale encadrées de pilastres et d'une lucarne attique et fronton cintré et brisé.\r\nROQUE, château médiéval agrandi lors de la  Renaissance. Edifice de plan irrégulier, est bâti sur le versant sud d'un site défensif  datant de La Tène, Il est séparé de la colline par une douve sèche, sa cour intérieure est défendue par un châtelet d'entrée  rectangulaire à mâchicoulis, aux archères cruciformes et par un pont-levis, du début du XVIIe siècle, il possède deux logis du XVe siècle bâtis en équerre et deux tours à mâchicoulis,  Le corps de logis s'appuie sur un donjon carré et deux tours rondes à collerettes de mâchicoulis l'une carrée et l'autre ronde, reliées par un pavillon à tourelle aux fenêtres Renaissance, les différents corps de logis comportent deux étages sous toiture en ardoise à deux pans. Ils enferment la cour et sont accostés des deux tours rondes à couverture en poivrière et d'une tour carrée à toiture à quatre pans couverte de Lauzes.  Dans la tour carrée, l'oratoire est orné de remarquables peintures murales du début du XVIe siècle.  La façade d'entrée a reçu, au XVIe siècle, un corps de logis inscrit entre les tours, percé d'un porche, orné d'une lucarne à meneaux cruciformes et au fronton aigu. La porte du corps de logis porte la date 1622. Dans la cour intérieure s'ouvre une porte Louis XII. Le château conserve un oratoire datant  du XIVe siècle, possède un donjon rectangulaire.","habitants":"Argentonesse général Paul de Boysson                   Roque Anne Logréal\r\n        \"","divers":"A Argentonesse-Roques château de La Roque grav de 1 à4 GPS : 44° 52' 58\" Nord et 1° 03' 50\" Est.     Argentonesse Grav 5-6 GPS : 44° 52' 01\" Nord, 1° 03' 06\" Est","gps":"44° 52' 58\" Nord et 1° 03' 50\" Est.     Argentonesse Grav 5-","images":["../image/image_24/24_Castel_Meyrals_1.jpg","../image/image_24/24_Castel_Meyrals_2.jpg","../image/image_24/24_Castel_Meyrals_3.jpg","../image/image_24/24_Castel_Meyrals_4.jpg","../image/image_24/24_Castel_Meyrals_5.jpg","../image/image_24/24_Castel_Meyrals_6.jpg"]},"Consult_chateau_formulairef9a1":{"id":"Consult_chateau_formulairef9a1","dept":"24","canton":"Domme","commune":"Castelnaud la Chapelle","nom":"Castelnaud_24","type":"Forteresse","periode":"XIII","histoire":"CASTELNAUD face à la forteresse de Beynac, aux jardins de Marqueyssac et au village de La Roque-Gageac. Un premier château est construit au XIIe siècle avant dêtre détruit durant la croisade des albigeois menée par les armées de Simon de Monfort. Après le traité de Paris en 1259, Castelnaud reconnaît la suzeraineté du duc d'Aquitaine, Henri III d'Angleterre. Un nouveau château est alors rebâti au cours du XIIIe siècle. En 1368, Magne de Castelnaud épouse le seigneur Nompard de Caumont. Les Caumont deviennent alors les seigneurs de Castelnaud et de Berbiguières. Prenant le parti des anglais pendant la guerre de cent ans, il est définitivement pris en 1442 par les armées du roi de France, Charles VII. En  1368 Magne de Castelnaud unique héritière épouse Nompar de Caumont, la famille de Caumont récupère le château, repris en 1442 par les anglais et trois semaines après redonné  à Brandilis de Caumont et le conserveront jusqu'à la  Révolution. Sa restauration s'étend de 1967 à 2012. Aujourd'hui Kléber Rossillon a quitté lAérospatiale pour se lancer dans le tourisme avec le château de Castelnaud et le jardin de Marqueyssac. Ce natif de Paris qui a passé son enfance en Périgord noir. Son père, Philippe, énarque et grand défenseur de la francophonie, avait été maire de Beynac-et-Cazenac. Cest lui qui avait eu lidée de racheter la ruine du château de Castelnaud en 1965 pour la rénover. Vingt après, cétait louverture au public sous la forme dun musée de la guerre au Moyen Âge.","architecture":"CASTELNAUD, un noyau du XIIe-XIIIe siècles est entouré d'une courtine flanquée de tours rondes s'ouvrant au sud-ouest sur une barbacane avec tour à bec, complété au XVe siècle par les anglais qui dressèrent à la pointe de l'éperon un donjon cylindrique près du donjon carré roman de plan irrégulier de 10 mètres de côté environ.  Sans cesse adaptés au progrès de lartillerie, les travaux daménagement se poursuivent jusquau début du XVIIe siècle. Après avoir été abandonné à la Révolution, le château sert de carrière de pierres en 1832. Sa restauration s'étend de 1967 à 2012.     Exceptionnel exemple de fortification privée féodale, son parti architectural est rationnel et efficace : le donjon, à cheval sur lenceinte au profil en forme déperon, protège lentrée principale ; percée de nombreuses archères, cette courtine fait partie dun système défensif performant succédant à deux lignes défensives. Inauguré en 1985, le musée de la guerre au Moyen -Âge investit les salles du logis seigneurial 250 pièces darmes du XIIIe au XVIIe siècle, en provenance de lEurope (épées, hallebardes, armures, arbalètes, pièces d'artillerie), reconstitutions dengins de siège ainsi quun ensemble mobilier constituent le fonds de collection du musée. Celui-ci sarticule de façon dynamique, selon une succession despaces différents : salle dartillerie, coursives, salles darmes, maquettes, salles vidéo, terrasses, magasin darmes, casemates, atelier du batteur darmure, cuisine, salle haute du donjon meublé, galerie de hourd, quinze salles au total.","habitants":"Famille de Caumont \r\n        \"","divers":"Castelnaud à Castelnaud la Chapelle GPS : 44° 48' 57\" Nord et 1° 08' 56\" Est","gps":"44° 48' 57\" Nord et 1° 08' 56\" Est","images":["../image/image_24/24_Castelnaud_24_1.jpg","../image/image_24/24_Castelnaud_24_2.jpg","../image/image_24/24_Castelnaud_24_3.jpg","../image/image_24/24_Castelnaud_24_4.jpg","../image/image_24/24_Castelnaud_24_5.jpg","../image/image_24/24_Castelnaud_24_6.jpg","../image/image_24/24_Castelnaud_24_7.jpg"]},"Consult_chateau_formulaire6493":{"id":"Consult_chateau_formulaire6493","dept":"24","canton":"Domme","commune":"Castelnaud la Chapelle","nom":"Castelnaud_II","type":"Château","periode":"XVIII","histoire":"Château de Castelnaud, XIIIe siècle XIVe siècle,  (Voi article)                    Château de Fayrac, XVe siècle XVIe siècle XIXe siècle, (voir article)\r\nChâteau des Milandes, XVe siècle XIXe siècle.( voir article)\r\nChâteau Péchaud, XVIIe siècle XVIIIe siècle.\r\nLACOSTE, alors que Jean de Bessou, seigneur des terres de Lacoste faisait la guerre avec le seigneur de Castelnaud, il nétait quun repaire qui permettait de se défendre, pendant la guerre de cent ans, contre le seigneur de Beynac. Castelnaud est Anglais et protestant, Beynac est Français et catholique. La famille prospère et Jacques de Bessou fait un riche mariage en épousant Françoise de Maleville, il fait des améliorations et transforme le château jusquà la révolution où il est confisqué et devient bien national, la famille Bessou part en exil et ne pourra jamais récupérer son château, il sera acheté par Guillaume de Sarlat, neveu de Melle de Maleville, et maire de Castelnaud et ne le rendra pas à son cousin, ses descendants le cèderont aux propriétaires actuels. La construction de la chapelle remonte à celle du château. Lensemble accuse le style néo-gothique, très prisé au XIXe siècle. A cette époque, larrière-grand-mère du propriétaire effectue des travaux dembellissement qui permettent dadmirer maintenant ce château avec son parc et jardins.","architecture":"LACOSTE, sur la base d'un manoir du XVIIIe siècle est bâti au XIXe siècle . L'ensemble se présente sous la forme d'un logis d'une trentaine de mètres de long avec rez-de-chaussée et étage, dont la façade d'honneur, agrémentée d'un fronton triangulaire, est située à l'ouest. Au nord-ouest et au sud-ouest, deux pavillons carrés proéminents ont été construits, un autre logis, deux fois plus large, a été ajouté au nord-est,  un troisième bâtiment, perpendiculaire au précédent, termine la construction à l'est, l'ensemble présentant une structure en forme de L. . Le 22 décembre 1970, le château de Lacoste est inscrit au titre des M.H. pour ses façades et ses toitures. En 2011, des scènes de la série télévisée Rani sont tournées dans le domaine.\r\nPECHAUD du XVIIe siècle consiste d'un corps de logis rectangulaire  à trois nbiveaux dont un sous combles divisées en travées régulières symétriques.","habitants":"Famille Bessou\r\n        \"","divers":"Plusieurs autres châteaux à Castelnaud; Fayrac grav-1. Lacoste  Grav 3 à 6 GPS : 44° 47' 54\" Nord et 1° 09' 21\" Est                                                               Péchaud grav-2 GPS : 44° 48' 57\" Nord et 1° 08' 58\" Est","gps":"44° 47' 54\" Nord et 1° 09' 21\" Est","images":["../image/image_24/24_Castelnaud_II_1.jpg","../image/image_24/24_Castelnaud_II_2.jpg","../image/image_24/24_Castelnaud_II_3.jpg","../image/image_24/24_Castelnaud_II_4.jpg","../image/image_24/24_Castelnaud_II_5.jpg","../image/image_24/24_Castelnaud_II_6.jpg"]},"Consult_chateau_formulaire11b0":{"id":"Consult_chateau_formulaire11b0","dept":"24","canton":"Périgueux","commune":"Trélissac","nom":"Caussade","type":"Forteresse","periode":"XIV-XVII","histoire":"CAUSSADE  La première propriétaire connue vers 1160, Imberte de Caussade, épousa le troubadour Bertrand de Born. Puis ce fut les Vigier bourgeois de Périgueux. Au début XIVe siècle, Bernard Vigier fait construire le châtelet fortifié. Par mariages successifs Caussade passe aux de Cugnac puis à la famille de la Marthonie vers 1685, ces seigneurs de Caussade, du XVe au XVIIe siècle, vont améliorer le château, possède le titre de baron de Caussade. Vers 1820, M. Leroy comte de Barde, receveur général de Dordogne, achète le domaine. Vers 1960, M. Dagand, entrepreneur pour la restauration des monuments, le rachète et entreprend une restauration et reconstruction  et le vend  à des américains. Il est aujourd'hui la résidence de M. et Mme Julio Céron qui réparent les dégats occasionnés par la tempête en décembre 1999.","architecture":"CAUSSADE, château-fort serti dans une enceinte polygonale  surmontée de mâchicoulis, entourée de douves  et renforcée par un donjon et des tours coiffées en cône ou en pyramide,  exemple parfait d'une forteresse du XVe siècle, châtelet fortifié du XIVe siècle  en un édifice confortable en agrandissant le corps de logis du XVIe siècle du premier et deuxième étage, ainsi que le rez-de-chaussée qui est transformé. Abandonné vers 1795  donne accès à la cour intérieure, un pont dormant asuccédé au pont-levis. A l'est, les communs s'accolent à l'enceinte du XIVe siècle qui scandent des tours dont l'un a été restaurée au XVIIe siècle. A L'ouest, le logis du XVIe siècle, avec une belle tour d'escalier, a été doublée au XVIIe siècle par un haut pavillon aux intéressantes cheminées. Un chemin de ronde crénelé court sur toute l'enceinte, agrémenté de toits de tuiles . La porte d'accès est pratiquée dans une tour carrée, défendue par des mâchicoulis. Des archères en protègent l'accès. Une chambre de gardes, située au premier étage, commande la défense dont tout le dispositif est conservé : loge de guetteur, manoeuvre du pont-levis, assomoir, gaine de montée des munitions.","habitants":"Famille de Caussade\r\n        \"","divers":"A Trélissac le château de Caussade GPS : 45° 13' 55,3\" Nord et 0° 48' 19,2\" Est","gps":"45° 13' 55,3\" Nord et 0° 48' 19,2\" Est","images":["../image/image_24/24_Caussade_1.jpg","../image/image_24/24_Caussade_2.jpg","../image/image_24/24_Caussade_3.jpg","../image/image_24/24_Caussade_4.jpg","../image/image_24/24_Caussade_5.jpg"]},"Consult_chateau_formulairee49a":{"id":"Consult_chateau_formulairee49a","dept":"24","canton":"Carlux","commune":"Cazoulès","nom":"Cazoulès","type":"Château","periode":"XVI-XVIII","histoire":"A Raysse le manoir de la Font-Haute, XVIe et XIXe siècles, le château du Saulou, XVIe au XVIIIe siècle.\r\n FONT-HAUTE, vers 1580, Pierre Catemisse, capitaire au château de Carlux, se fit construire une maison d'habitation et des dépendances,  un colombier, un jardin et des vergers                                                  SAULOU, du  XVIe au XVIIIe siècle. La famille de Gimel, installée à Carlux, partagea vers 1525-1530 ses biens pour possessionner sa descendance. L'une de ses branches fit construire le château du Saulou à Cazoulès. Celui-ci passa, en 1708, entre les mains des Camon, notable sarladais, puis en 1808, à la famille actuelle.","architecture":"CAZOULES  le manoir de la Font-Haute, XVIe et XIXe siècles,  bâtiment trapu présentant deux grosses tours rondes à mâchicoulis sur sa façade nord. Le corps de logis principal présente un enchevêtrement de toitures d'où s'élance un clocheton avec sa girouette et lucarnes sur toit brisés. Le  XIXe siècle a laissé des traces apparentes, en particulier sur les deux tours et le second corps de bâtiment. \r\n SAULOU, La demeure fut agrandie et remodelée aux XVIe, XVIIe et XVIIIe siècles, se compose d'un logis rectangulaire, renforcé de deux tours rondes à mâchicoulis et chemin de rondes et d'une échauguette, prolongé à l'ouest de deux travées supplémentaires, et encore agrandi au nord-ouest d'un pavillon quadrangulaire. L'intérieur a conservé d'intéressants éléments de décors : lambris et boiseries du XVIIIe siècle, cheminées du XVIIe dont l'une est ornée d'une lapidation de Saint-Etienne, peinte sur la hotte. Face au côté sud, les écuries ont été réalisées au début du XVIIe siècle.","habitants":"Font-Haute Famille de Pierre Catemisse                Saulou, famille de Gimel\r\n        \"","divers":"Trois châteaux à Cazoulès; Font-Haute grav 1 et 2 GPS : 44° 52' 39,5\" Nord, 1° 26' 6,7\" Est .                      Saulou grav 3 à 5,  GPS : 44° 53' 02\" Nord, 1° 26' 05\" Est","gps":"44° 52' 39,5\" Nord, 1° 26' 6,7\" Est .                      S","images":["../image/image_24/24_Cazoul%c3%a8s_1.jpg","../image/image_24/24_Cazoul%c3%a8s_2.jpg","../image/image_24/24_Cazoul%c3%a8s_3.jpg","../image/image_24/24_Cazoul%c3%a8s_4.jpg","../image/image_24/24_Cazoul%c3%a8s_5.jpg"]},"Consult_chateau_formulairedd9c":{"id":"Consult_chateau_formulairedd9c","dept":"24","canton":"Verteillac","commune":"Champagne et Fontaine","nom":"Champagne","type":"Château","periode":"XVI-XVII","histoire":"quatre châteaux à Champagne Clauzuroux, Chaumont, Fontaine,Ligerie et Richardie           CLAUZUROUX est attesté au milieu du XVIe siècle comme propriété de la famille de Faucher. \r\nRICHARDIE, entre Jaufrenie et le Pas-de-Fontaine est une demeure du XVIIe siècle sur le site d'un château médiéval, ancienne demeure des Bouilhac -Bourzac. \r\nCHAUMONT, situé dans le bourg de Champagne, c'est un château fort de style Renaissance. Il date de 1667, mais a été endommagé pendant la Révolution française (tours arasées), et reconstruit et agrémenté aux XVIIIe et XIXe siècles. \r\nChâteau de la LIGERIE, ce château est situé à Fontaine. C'est un manoir des XVe et XVIIe siècles, qui a été acheté en 1900 par Henri de Gaulle, père de Charles de Gaulle, qui l'a conservé jusqu'en 1920. Le château a été acheté en 1940 par Henri Legendre, second mari de Georgette Louise Barrouin, mère de Jacques Chaban-Delmas. Ce dernier a utilisé le château pour créer son réseau de résistants en Périgord avec l'aide du boulanger de Fontaine. Il a hérité du château. Ses descendants l'ont cédé en 2004.","architecture":"CLAUZUROUX, sur l'emplacement probable d'un ancien manoir médiéval, se présente sous la forme d'un carré d'environ 50 mètres de côté, au centre duquel se trouve une cour intérieure. Côté nord-ouest, les deux tours rondes, au nord et à l'ouest, datent du XVIIe siècle et le fronton du portail porte la date de 1701. Côté sud-est, le logis, dont la façade sur cour est plus récente que celle sur jardin, comporte un rez-de-chaussée surmonté d'un étage. Il est encadré par deux pavillons, d'un étage plus haut. Le logis comme les pavillons sont coiffés de toits mansardés desquels ressortent des lucarnes. Les autres côtés du carré sont occupés par des dépendances sur un seul niveau. Dans la cour se trouve un puits couvert. Côté sud-est, une terrasse mène à un bief, autrefois alimenté par les eaux de la Pude et aujourd'hui asséché, qui faisait tourner le moulin à eau du domaine. Une centaine de mètres en amont, le bief présente une particularité architecturale : un escalier d'eau. De l'autre côté du bief s'étend un jardin à la française, accessible par un pont.                                                                         RICHARDIE, construit au XVIIe sur les ruines d'un château médiéval aujourd'hui disparu, le château de la Richardie, planté sur 6 hectares de parc, propose également des dépendances importantes à l'arrière en forme de 'U', dont une très grande grange vide d'environ 400m2, des préaux et des bâtiments agricoles divers.","habitants":"Famille de Faucher.                                                 Henri de Gaulle\r\n        \"","divers":"A Champagne et Fontaine cinq châteaux; Clauzuroux grav 1-2-3, Chaumont grav 4, Fontaine grav 4, Ligerie grav 5 et Richardie grav-6","gps":"","images":["../image/image_24/24_Champagne_1.jpg","../image/image_24/24_Champagne_2.jpg","../image/image_24/24_Champagne_3.jpg","../image/image_24/24_Champagne_4.jpg","../image/image_24/24_Champagne_5.jpg","../image/image_24/24_Champagne_6.jpg"]},"Consult_chateau_formulaireb15c":{"id":"Consult_chateau_formulaireb15c","dept":"24","canton":"Périgueux","commune":"Champcevinel","nom":"Champcevinel","type":"Château","periode":"XV-XVII","histoire":"Le château de Borie-Petit du XVe siècle abrite aujourd'hui un centre équestre: . Castel Kéruel. Vigneras date du XVIIIe siècle.                            BORIE-PETIT: cet ancien fief est situé à Champcevinel à proximité du centre équestre. A l'origine, une borie, sorte de métairie entouré d'une terre riche. En 1533, un riche bourgeois de Périgueux, Pierre de Petit, achète cette  Borie aux chanoines; puis par le mariage de Claire de Petit avec Pierre de Crémoux, le domaine entre dans cette  maison anoblie par le Roi fin du XVIe siècle. Les Crémoux transforment le domaine en repaire noble. Au XVIIe siècle,  Trois générations de Crémoux vont se succéder: Félix de Crémoux polytechnicien, vicomte, officier d'artillerie, entreprend la transformation totale de Borie-Petit à la fin du XVIIIe siècle. \"Il double le corps de logis, lui accole deux grosses tours, celles de la cour actuelle, et deux petites tours dîtes \"poivrières\" sur la face ouest. Ainsi Borie-Petit gardera son aspect, seule une petite chapelle sépulcrale sera bâtie au sud du château.\" Après 300 ans d'appartenance aux de Crémoux, par le mariage de Marie de Crémoux avec Ulrich d'Abzac marquis de la Douze, Borie-Petit passe dans cette maison noble. Puis c'est la maison de Chasteigner qui, par le mariage de Jeanne d'Abzac avec le baron André de Chasteigner, qui devient propriétaire trois générations suivront.      CHAMPCEVINEL Actuellement, c'est la veuve du colonel de Cavalerie, François de Chasteigner, née de Saint-Sernin qui est propriétaire du château Champchinel  situé tout au Nord de Champcevinel, un ancien repaire noble, construit au XVIIe siècle, appartenait aux Laroche-Aymon dont les deux filles, Antoinette et Catherine, furent élevées à Saint-Cyr. Le château de VIGNERAS a été merveilleusement restauré.","architecture":"BORIE-PETIT, l'édifice était à l'origine une borie appartenant à la seigneurie de Champcevinel, au chapitre de la cathédrale de Périgueux. Le château est entouré d'une enceinte, les angles sont renforcés à l'est d'échauguettes carrées, coiffées en pyramide, posées en saillie sur des mâchicoulis. Des trous de tirs sont ménagés dans leurs parois. Au centre du mur Est, un châtelet défend l'entrée de la cour. Un porche, à côté duquel se trouve un corps de garde, supporte à l'étage une pièce construite en encorbellement sur des mâchicoulis. Passé ce porche, voûté de briques à chaînages de pierre, se trouve le corps de logis principal, restauré au XIXe siècle. Rectangulaire, il est flanqué à l'est de deux grosses tours circulaires, à mâchicoulis, talutées et coiffées en poivrières, et à l'ouest agrafé de deux échauguettes modernes. Vers l'ouest, au milieu de la prairie, se trouve un colombier circulaire, daté de 1661.                                           VIGNERAS de plan rectangulaire oblong à deux niveaux flanqué au centre  d'un pavillon légèrement saillant avec fronton triangulaire","habitants":"Borie-Petit  Félix de Crémoux                                 Champcevinel  Laroche-Aymon\r\n        \"","divers":"A Champcevinel château de Borie-Petit  grav 1 à 4 GPS : 45° 12' 49\" Nord, 0° 42' 47\" Est      Champcevinel grav 6-7   GPS : 45° 12' 56\" Nord, 0° 43' 38\" Est                                                                    Kéruel grav-8 GPS : 45° 12' 23\" Nord, 0° 39' 58\" Est. Vigneras grav-5.","gps":"45° 12' 49\" Nord, 0° 42' 47\" Est      Champcevinel grav 6-7","images":["../image/image_24/24_Champcevinel_1.jpg","../image/image_24/24_Champcevinel_2.jpg","../image/image_24/24_Champcevinel_3.jpg","../image/image_24/24_Champcevinel_4.jpg","../image/image_24/24_Champcevinel_5.jpg","../image/image_24/24_Champcevinel_6.jpg","../image/image_24/24_Champcevinel_7.jpg","../image/image_24/24_Champcevinel_8.jpg"]},"Consult_chateau_formulaireacd5":{"id":"Consult_chateau_formulaireacd5","dept":"24","canton":"St-Pardoux la Rivière","commune":"Champs-romain","nom":"Champs_Romain","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux et manoirs agrémentent la commune de Champs-Romain, dont le château le Verdoyer, Paugnac ou La Valade . Pas d'information historique sinon que Verdoyer chambres d'hôtes.        VALADE,  fut érigé au XVIIIe siècle sur une base plus ancienne. Il appartenait aux Gentil, aux Cruveiller et aux Lentilhac.  C'est lors de ces événements que le château fut vendu par Henri-Antoine Gentil de la Valade à Germain-François Dufaure de Rochefort. Un lycée agricole y fut établi entre 1851 et 1884.","architecture":"VERDOYER corps de logis en équerre, donjon sur la partie centrale imposant carré à mâchicoulis à trois niveaux flanqués sur les angles extérieurs d'échauguettes en encorbellements, sur la partie ouest du corps de logis des  encorbellements d'échauguerttes  crénelée et arasée à la base , à l'opposée prolongé pour des dépendances avec sur angles intérieurs une tour ronde à mâchicoulis crénelé.                                                                            VALADE, Il se compose d'un logis flanqué au nord-ouest et au sud-est par deux tours. Un pigeonnier est également présent au sud-est. la construction du château de la Valade date du XVIIe au XVIIIe siècle. De l'extérieur, on aperçoit son pigeonnier. Il domine de 20 mètres environ le Vallon du ruisseau de la Valade, Il fut au XVe siècle, un repaire noble. . Situé sur un plateau dominant la vallée de la Valade, il  fut un repaire noble à la fin du XVe siècle. Le château fut agrandi en 1760. Le domaine possédait alors 600 hectares de terres. Il fut rattaché à la commune de Bourdeilles à la Révolution.","habitants":"Valade Famille des Gentil de la Valade\r\n        \"","divers":"A Champs-Romain, le château le Verdoyer grav de 1 à 5, Paugnac ou La Valade grav 5 à8 GPS : 45° 17' 29\" Nord, 0° 34' 19,5\" Est.","gps":"45° 17' 29\" Nord, 0° 34' 19,5\" Est.","images":["../image/image_24/24_Champs_Romain_1.jpg","../image/image_24/24_Champs_Romain_2.jpg","../image/image_24/24_Champs_Romain_3.jpg","../image/image_24/24_Champs_Romain_4.jpg","../image/image_24/24_Champs_Romain_5.jpg","../image/image_24/24_Champs_Romain_6.jpg","../image/image_24/24_Champs_Romain_7.jpg","../image/image_24/24_Champs_Romain_8.jpg"]},"Consult_chateau_formulaire1af0":{"id":"Consult_chateau_formulaire1af0","dept":"24","canton":"Savignac les Eglises","commune":"Le-Change","nom":"Change","type":"Château","periode":"XV-XVII","histoire":"Au Change, manoir du XVe siècle avec grosses tours circulaires, d'Auberoches (voir Article)  de Banes du XVe siècle,  de Blanzac du XVIIe siècle,  de Laborde, de Lauterie, de la Roc-Chautru hôtel restaurant de Suzanne  Chautru, de Maleffe du XVe siècle.  La Sandre du XIIIe et XVe siècles, également inscrit depuis 1965. Du Roc du XIXe siècle.                            BANNES  Ce château fut la demeure de la famille de Banes, une des plus anciennes familles du Périgord.  BLANZAC date du XVIIe siècle.La demeure a appartenu à la famille de La Salle, elle passa ensuite aux Migot, puis aux Tessières.\r\nBORDES, pas d'information historique reconstruit au XVIIIe siècle sur des fondations du XVIIe siècle , avec une chapelle du XVIIe siècle    \r\nFAURIE, tour de défense circulaire du XVe siècle, un chemin de ronde sur corbeaux, tour à pans d'escalier à vis du XVIe. Le manoir de La Faurie était habité, à la fin du XVIe siècle, par Bernard Migot, lieutenant de la juridiction d'Auberoche, ce dernier donna des preuves de sa fidélité au Roi lors de son avénement à la couronne, en faisant fortifier sa maison pour le service de Sa Majesté, et en la mettant en état de résister aux entreprises de ses ennemis, de manière que quelques efforts qu'ils aient faits, ils ne purent s'en emparer.   LAUTERIE (ou château de Lauterie Basse) du XVIIe siècle, fut construit au XIXe siècle sur les restes d'une demeure plus ancienne, le site est inscrit depuis 1985 sur plus de seize hectares. LAUTERIE au nord du bourg, il fut construit au XIXe siècle sur les restes d'une demeure plus ancienne. Il se trouve au lieu dit de la Lauterie Basse. (ou château de Lauterie Basse) du XVIIe siècle, fut construit au XIXe siècle sur les restes d'une demeure plus ancienne, le site est inscrit depuis 1985 sur plus de seize hectares.","architecture":"BLANZAC construit au XVIIe et composé de deux logis en équerre, accostés d'une tourelle circulaire. Il possède de la même époque un pigeonnier circulaire.                                                                             Le CHANGE  FAURIE situé au bourg avec une tour de défense circulaire du XVe siècle, à chemin de ronde sur corbeaux. On y trouve un escalier à vis du XVIe siècle. Le manoir est inscrit au titre des M.H. le 12 octobre 1948.                                                      MALEFFE  est  construit sur la rive de l'Auvézère ( XIII-XVe siècle) Demeure à deux étages comportant côté Auvezère une fenêtre géminée gothique à fines colonettes au second étage. Côté bourg, cet édifice présente une fenêtre à meneaux et une porte  du XVe siècle\r\nBANES, fut construit au XV ème siècle il ne reste qu'un corps de logis imposant résultant d'une restauration de l'ensemble au XVIIe siècle. La tour d'angle côté Est a disparu. Deux superbes fenêtres à meneaux ornent les façades.                                 ROC  bâtiment carré du XIXe siècle. Le 26 août 1942, 172 juifs y furent internés avant de partir pour le camp de Drancy. Une stèle commémorative, inaugurée en juin 2005, se trouve devant l'entrée du château.","habitants":"Bernard Migot\r\n        \"","divers":"A le Change Faurie grav -1-2 GPS : 45° 11' 42\" Nord, 0° 53' 33\" Est.                                                                 Blanzac grav-5-6.                                                           Borde grav-4  GPS : 45° 11' 38\" Nord et 0° 53' 38\" Est.","gps":"45° 11' 42\" Nord, 0° 53' 33\" Est.","images":["../image/image_24/24_Change_1.jpg","../image/image_24/24_Change_2.jpg","../image/image_24/24_Change_3.jpg","../image/image_24/24_Change_4.jpg","../image/image_24/24_Change_5.jpg","../image/image_24/24_Change_6.jpg"]},"Consult_chateau_formulaireb546":{"id":"Consult_chateau_formulaireb546","dept":"24","canton":"Savignac les Eglises","commune":"Le-Change","nom":"Change_II","type":"Château","periode":"XV-XVIII","histoire":"BANNES, bâti au sud du bourg. Le bâtiment que l'on voit aujourd'hui sont les vestiges du château du XVe siècle, la tour d'angle côté Est a aujourd'hui disparu. La tour d'angle côté Est a disparu. Ce château fut la demeure de la famille De Banes, une des plus anciennes familles du Périgord.                                     ROC au nord-est du bourg, bâtiment  du XIXe siècle. Le 26 août 1942, 172 juifs y furent internés avant de partir pour le camp de Drancy. Une stèle commémorative, inaugurée en juin 2005, se trouve devant l'entrée du château.  Le château accueille la Croix-Rouge Polonaise au début de la deuxième guerre mondiale, avant de recevoir en ses murs le Groupement dassistance des Polonais Français en 1941. Mais en 1942, il est évacué pour y installer des juifs étrangers victimes des rafles dans le département. Il  sert de lieu dinternement provisoire avant leur transfert vers le camp de transit de Drancy, avant darriver à Auschwitz. À la Libération, il sert de lieu daccueil pour les juifs avant leur installation en Palestine.                                                                       SANDRE , derrière l'église, appelé aussi château de Cheyssac, il fut la demeure de François De Cheyssac co-seigneur du Change au Moyen Age. Du château du XIIIe siècle il ne reste que la tour carrée à mâchicoulis, qui devait être le donjon. Au XVe siècle, deux corps de bâtiment en retour d'équerre, furent accolés à la tour. Il est classé M.H.depuis le 23 avril 1965","architecture":"ROC, construit au XIXe siècle, le château sedresse au milieu dun vaste parc arboré. On accède à l'imposante bâtisse rectangulaire par un escalier à double révolution senroulant autour dune terrasse circulaire dominant le parc. Le château se dresse sur trois niveaux largement ouverts par de grandes baies rectangulaires. Au rez-de-chaussée et au premier étage, les fenêtres sont surmontées par de petits linteaux en accolade. Les fenêtres du second étage, plus réduites, reçoivent un simple linteau droit. Lensemble est coiffé dun toit mansardé en ardoise, surmonté dun clocheton.                                            LA-SANDRE, date du XIIIe et XVe siècle. Du premier château, il ne reste qu'une tour carrée, qui devait être le donjon à mâchicoulis, dont le couronnement a disparu. Au XVe siècle, deux corps de bâtiment en retour d'équerre, dont l'un contenant l'escalier de pierre, ont été accolés à la tour. Le premier a conservé ses fenêtres à meneaux cruciformes. Au-dessus de la porte du second bâtiment, à l'étage supérieur, deux corbeaux devaient supporter un mâchicoulis. A l'origine, la tour ne semble pas avoir possédé d'ouvertures. Plus tard, furent percées des embrasures d'armes à feu","habitants":"Famille De Banes                                                            Famille de François De Cheyssac \r\n        \"","divers":"A le Change; château de Maleffe grav 1-2, Bannes  grav 3,   de la Sandre Grav-3  GPS : 45° 11' 40,7\" Nord, 0° 53' 35,7\" Est.  Roc grav 4-5, Lauterie grav-6.","gps":"45° 11' 40,7\" Nord, 0° 53' 35,7\" Est.  Roc grav 4-5, Lauteri","images":["../image/image_24/24_Change_II_1.jpg","../image/image_24/24_Change_II_2.jpg","../image/image_24/24_Change_II_3.jpg","../image/image_24/24_Change_II_4.jpg","../image/image_24/24_Change_II_5.jpg","../image/image_24/24_Change_II_6.jpg"]},"Consult_chateau_formulaire4c1c":{"id":"Consult_chateau_formulaire4c1c","dept":"24","canton":"Neuvic","commune":"Chantérac","nom":"Chantérac","type":"Château","periode":"XVIII","histoire":"CHANTERAC a été construit au XVIIIe siècle. Perdu au milieu des bois, le château fut épargné par les assaillants lors des nombreuses guerres civiles de la Révolution française. Le comte Victor de la Cropte de Chantérac, frère du maire de Marseille Bonaventure de La Cropte de Chantérac, le rachètera, vendu comme bien national à la Révolution.   Victor de La Cropte de Chantérac, maire de Chantérac jusqu'à sa mort en 1891. Il  est actuellement habité par les descendants de la famille de La Bourdonnaye-Blossac.  Yves Guéna (1922-2016), ex ministre des PTT, ex maire de Périgueux, ex président du conseil constitutionnel, châtelain de Chantérac.","architecture":"CHANTERAC Tour circulaires à mâchicoulis. Lechâteau devait autrefois être constitué par deux tours rondes encadrant un corps de logis. Il fut modifié lors de l'ajout du pavillon et de l'aile plus basse, au XVIIIe siècle. Une des tours rondes a été supprimée, le corps de logis a perdu ses meneaux et a été aménagé au goût du XVIIIe siècle. La tour circulaire restante a été comprise dans la construction du pavillon du XVIIIe siècle qui lui est accolé. Une aile avec rez-de-chaussée et des mansardes continue le pavillon en retrait. Perdu au milieu des bois, Chantérac fut épargné lors des nombreuses guerres civiles et pendant la Révolution Française.","habitants":"Cropte de Chantérac\r\n        \"","divers":"Chantérac GPS : 45° 10' 54\" Nord, 0° 25' 57\" Est","gps":"45° 10' 54\" Nord, 0° 25' 57\" Est","images":["../image/image_24/24_Chant%c3%a9rac_1.jpg","../image/image_24/24_Chant%c3%a9rac_2.jpg","../image/image_24/24_Chant%c3%a9rac_3.jpg","../image/image_24/24_Chant%c3%a9rac_4.jpg","../image/image_24/24_Chant%c3%a9rac_5.jpg"]},"Consult_chateau_formulairecc76":{"id":"Consult_chateau_formulairecc76","dept":"24","canton":"Montagrier","commune":"Chapdeuil","nom":"Chapdeuil","type":"château","periode":"XII-XV","histoire":"CHAPDEUIL, est connu dès le XIIe siècle par famille de la Tour, au XIVe siècle, durant la guerre de cent ans,  par alliance passe à la famille Saint- Astier qui construisirent  le puissant donjon au XVe siècle, Catherine de saint-Astier l'apporte en dot  à Géraud de Peyronnenc  seigneur de Loupiac et Anne héritière de Chapdeuil et de Montréal  s'allie en 1500 à Pierre de Pontbriand chambellan de Charle VII qui  modernise le donjon. La seigneurie en 1633 passe par alliance aux Foucauld, puis aux Fayolle qui garderont la seigneurie plus d'un siècle avant que Marie-Dauphine de Fayolle fit entrer Chapdeuil dans la famille Grand ces derniers céderont en 1745 les droits féodaux à Henri Bertin ce qui n'empêchera pas la destruction partielle des bâtiments. La demeure est acquise au XIXe siècle par la famille Gros de Beler et appartient aujourd'hui à la famille de Michel Daleyrac. Le château est partiellement démoli à la Révolution et son logis est restauré au XIXe siècle est inscrit au M.H..","architecture":"CHAPDEUIL, tour rectangulaire du XIIIe siècle à contreforts plats près du logis du XVe siècle, est connu dès le XIIe siècle de l'époque ne subsistent que le rez-de-chaussée du donjon et les douves.  Au XIVe siècle, durant la guerre de cent ans, construction du puissant donjon, l'accès au domaine s'effectue au sud par un portail à côté duquel se trouve un pigeonnier circulaire massif. Le donjon a été bâti au XIVe, au XVe ou au XVIe siècle.  À l'ouest, la construction qui masque l'escalier extérieur permettant d'accéder aux niveaux supérieurs du donjon pourrait dater du XVIIe siècle, tout comme le logis.  Au-delà du portail, une allée permet d'accéder à un petit pont qui a remplacé l'ancien pont-levis  permettant de franchir les douves.  Le château lui-même est composé au nord d'un logis rectangulaire, il est prolongé au sud par un donjon massif défendu par un chemin de ronde posé sur mâchicoulis et flanqué de part et d'autre par deux constructions formant comme des contreforts : à l'ouest un escalier extérieur et à l'est, un pigeonnier.","habitants":"Famille Saint- Astier\r\n        \"","divers":"Chapdeuil GPS : 45° 20' 34\" Nord, 0° 28' 31\" Est","gps":"45° 20' 34\" Nord, 0° 28' 31\" Est","images":["../image/image_24/24_Chapdeuil_1.jpg","../image/image_24/24_Chapdeuil_2.jpg","../image/image_24/24_Chapdeuil_3.jpg","../image/image_24/24_Chapdeuil_4.jpg","../image/image_24/24_Chapdeuil_5.jpg"]},"Consult_chateau_formulaire051a":{"id":"Consult_chateau_formulaire051a","dept":"24","canton":"Champagnac de Belair","commune":"La Chapelle-Faucher","nom":"Chapelle_Faucher","type":"Forteresse","periode":"XIII-XV","histoire":"Château de La Chapelle-Faucher, XIIIe siècle XVe siècle XVIIe siècle XVIIIe siècle, classé M.H. depuis 2001, y compris le pigeonnier situé à côté du pont sur la Côle, manoir de Boslaurent, manoir de Las Font,  et à quelques  Km  à Condat sur Trincou le château de Castillères.\r\nCHAPELLE-FAUCHER, une forteresse fut construite au début du XIIIe siècle par Fulchier d'Agonac. Elle fut ravagée lors de la guerre de cent ans puis rebâtie à la fin du XVe siècle par les Farges devenu propriétaire  par son mariage avec Anne d'Agonac,  Audoin de Farges écuyer du duc de Guyenne et gouverneur de Villebois entreprend de relever l'édifice. En 1516 le château passe par héritage aux Chabans  Margueritte de Farges épouse  Charles marquis de Chabans. En 1653 Antoine de Chabans, fidèle au Roi, assiégea le château pour reprendre possession du domaine que ses frères, partisans du prince de Condé, s'étaient approprié. Epargné à la Révolution le château reste dans la famille de Chabans. Le marquis  ayant eu six filles, l'ainée d'entre elles Yvonne décède en 1914 adopte le fils de sa soeur Renée Alain de Bruc  à condition qu'il relève le nom des Chabans. Toujours dans la famille des Bruc -Chaban.\r\nCASTILLERES  est un château bâti à Condat-sur-Trincou,  la construction date du XVIIIe siècle. Condat sur Trincou  dont celui de Condat  du XIIIe au XVe siècle, propriété privée. Château des Castillères, XVIIIe siècle, propriété privée.\r\nChâteau de Montplaisir, tour du XVe siècle et logis des XVIIIe et XIXe siècles.","architecture":"LA CHAPELLE-FAUCHER, la forteresse primitive fut construite en 1205 par Fulchier d'Agonac. En 1369,  fut en partie détruit avec le village par le Prince Noir venu assiéger le château voisin de Bourdeilles, la forteresse et le village restèrent sans âmes qui vivent pendant une centaine d'années. A la fin du XVe siècle, construction d'un corps de logis  flanqué d'une tour octogonale entre les deux grosses tours rondes subsistantes du château initial. En 1653 Antoine de Chabans, fidèle au Roi, assiégea le château. Le marquis détruisit les fortifications et le pont-levis, construisit un châtelet et les écuries, et aménagea les terrasses.  Au XVIIIe siècle, ajout d'une maison d'habitation accolée aux tours du château une maison-basse fut rajoutée, attenante aux bâtiments principaux. D'autres dépendances ferment le côté nord de la cour intérieure, ayant conservé leur fonction domestique.  De vastes communs subsistent, notamment une magnifique salle voûtée qui renferma jadis les écuries. Le château est depuis 500 ans dans la même famille en ligne direct. En 1916, un incendie provoqué par la foudre anéantit les toitures.  alors que le reste des bâtiments, ses dépendances, son châtelet d'entrée ainsi que son pigeonnier, sont inscrits au titre des M.H. depuis le 13 février 2001.","habitants":"Famille Fulchier d'Agonac\r\n        \"","divers":"A la Chapelle-Faucher grav 1 à 6  GPS : 45° 22' 10\" Nord, 0° 45' 4\" Est, Condat-Monplaisir  grav-7, Condat sur Trincou grav 8, Boslaurent grav 9.","gps":"45° 22' 10\" Nord, 0° 45' 4\" Est, Condat-Monplaisir  grav-7,","images":["../image/image_24/24_Chapelle_Faucher_1.jpg","../image/image_24/24_Chapelle_Faucher_2.jpg","../image/image_24/24_Chapelle_Faucher_3.jpg","../image/image_24/24_Chapelle_Faucher_4.jpg","../image/image_24/24_Chapelle_Faucher_5.jpg","../image/image_24/24_Chapelle_Faucher_6.jpg","../image/image_24/24_Chapelle_Faucher_7.jpg","../image/image_24/24_Chapelle_Faucher_8.jpg","../image/image_24/24_Chapelle_Faucher_9.jpg"]},"Consult_chateau_formulaire77a7":{"id":"Consult_chateau_formulaire77a7","dept":"24","canton":"Saint-Astier","commune":"La chapelle-Gonaguet","nom":"Chapelle_Gonaguet","type":"Château","periode":"XVII","histoire":"BRUNIES,  ancien manoir des templiers, changera de propriétaire à de nombreuses reprises au cours des siècles. du XVIIe siècle au XVIIIe siècle, propriété privée,  au cur du « Périgord Blanc», dans un environnement de vignes et de forêts, agrandi au XVIIIe siècle, appartenait autrefois à la seigneurie d'Alesmes. \r\nChartreuse des Landes du XVIIe siècle, propriété privée, sur la commune, allez découvrir le prieuré de Merlande, ancienne possession de l'abbaye de Chancelade, et contempler la Chartreuse des Landes.                                                                             A trois kilomètres à l'ouest à MENSIGNAC, en octobre 1568, durant les guerres de Religion, le catholique comte de Brissac attaque dans une embuscade au lieu-dit Chantegeline (aujourd'hui Chantepoule) le baron Paulon de Mauvans, quil bat et qui meurt de ses blessures. Le village est identifié sous le nom de Minsignac sur la carte de Cassini, représentant la France entre 1756 et 1789.  La paroisse de Chantegéline sera brièvement transformée en commune avant d'être rattachée à Mensignac dans les toutes premières années de la Révolution.","architecture":"BRUNIES, la construction  date du XVIIe au XVIIIe siècle. Victor Hugo, dans son roman \"Les Misérables\", fit passer son héros Jean Valjean au château des Brunies.","habitants":"Seigneurie d'Alesmes\r\n        \r\n        \"","divers":"A La chapelle-Gonaguet ; Brunies grav 2 GPS : 45° 13' 53\" Nord, 0° 36' 50\" Est. Hôtel de ville de Mensignac-grav-1. Des Landes chartreuse grav -3.","gps":"45° 13' 53\" Nord, 0° 36' 50\" Est. Hôtel de ville de Mensigna","images":["../image/image_24/24_Chapelle_Gonaguet_1.jpg","../image/image_24/24_Chapelle_Gonaguet_2.jpg","../image/image_24/24_Chapelle_Gonaguet_3.jpg"]},"Consult_chateau_formulaire90f0":{"id":"Consult_chateau_formulaire90f0","dept":"24","canton":"Périgueux","commune":"Château l","nom":"Chateau lévèque_I","type":"Forteresse","periode":"XIV","histoire":"CHÂTEAU-L'EVEQUE, la première mention de Preyssac date de 1169. En 1247 Preyssac est une châtellenie de Chamberlhiac. En 1347, Adhémar de Neuville, lévêque de Périgueux le fit construire. En 1364, la paroisse est en partie détruite par les anglais. En 1412, 280 combattants anglais sont sur Château-l'Évêque, brûlent trois maisons, puis prennent et détruisent Pressac. Château-l'Évêque est restauré en 1515 par l'évêque de Périgueux, Gui Ier de Castelnau. Pierre VIII Fournier, évêque de Périgueux, est étranglé par ses domestiques le 14 juillet 1575 dans son château. En 1581, Jean de Montardie, capitaine de larmée catholique part de Preyssac pour reprendre la ville de Périgueux aux protestants. Le 23 septembre 1600, Saint Vincent de Paul est ordonné prêtre dans la chapelle du château épiscopal par l'évêque François de Bourdeilles. Avant 1789 Mgr de Villiers et ses successeurs s'emploieront à réparer les dégats causés par la fronde à la Révolution c'est l'évêque Machecode Prémeau qiui veille sur le château restauré. A la création des municipalités, on retrouve le nom de Peyssac Dagonat en 1793 puis de Pressac d'Agonnac en 1801 avant que la commune de Preyssac-d'Agonac ne prenne le nom définitif de Château-l'Évêque le 25 décembre 1831. Racheté par Pierre Lofficier, il  passe ensuite à diverses familles avant d'être transformés en hôtel de luxe. classé M.H.depuis 1938.","architecture":"Château l'Evêque, construit sur une croupe rocheuse dominant la rivière de la Beauronne. Le  château est édifié au XIVe siècle à un emplacement stratégique sur l'importante route d'Angoulême à Périgueux. Pendant 400 ans, cette forteresse fut la résidence d'été des évêques de Périgueux. Ensuite le château passe aux mains des protestants. Bien national à la Révolution, il est alors vendu et perd de nombreux éléments défensifs. Au XIXe siècle, il subit des mutilations qui détruisent en partie la tour nord-est, le châtelet d'entrée et les cheminées.  Le château est formé de différentes tours et logis crénelés ou hérissés de mâchicoulis, soudés les uns aux autres, sans souci de symétrie, formant un ensemble disparate. Construit en 1515 pour Mgr de Castelnau, le logis de style Renaissance, est la partie la plus soignée. On peut admirer des baies à meneaux sculptées de souples cordelières datant de 1520. Le logis du XVe siècle porte une tour octogonale d'escalier.","habitants":"Evêque Gui Ier de Castelnau\r\n        \r\n        \r\n        \"","divers":"Château l'Evêque grav 1-2 GPS : 45° 14' 46\" Nord, 0° 41' 04\" Est","gps":"45° 14' 46\" Nord, 0° 41' 04\" Est","images":["../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_I_1.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_I_2.jpg"]},"Consult_chateau_formulaireb20e":{"id":"Consult_chateau_formulaireb20e","dept":"24","canton":"Périgueux","commune":"Château l","nom":"Chateau_Lévèque_II","type":"Château","periode":"XV_XVI_XVIII","histoire":"Plusieurs châteaux à Château-l'Evêque dont celui de Château-l'Évêque (parfois aussi appelé château Saint-Vincent), XIVe, XVe et XVIe siècles, inscrit au titre des M.H. depuis 1938, \r\nChâteau de la Beylie, du  XVe siècle (voir-Article).\r\nManoir de la Chabrerie du XVIIe siècle, avec une chapelle : demeure des Cluzel puis des Cossé de Brissac.\r\nManoir de Coularède du XVIIIe siècle,  attesté en 1586.\r\nChâteau de Daille du XVIIe siècle.\r\nManoir des Rivères du XVe et XVIIIe siècles,.\r\nGentilhommière (ou manoir) de Preyssac du XVIe siècle, ancien fief des Cluzel de la Chabrerie et des Jehan.\r\nDomaine du Cros du XIXe siècle, où naquit la romancière Rachilde (1860-1953).\r\nChâteau de Mesplier du  XVe et XVIIIe siècles.\r\nManoir de Vessat, ancien fief des de Barbarin, des de Méredieu, des Jehan, sur la route de lancien relais de poste Vessat.","architecture":"BEYLIE  fief des Montardie de la Beylie jusqu'en 1713. Cette famille joua un rôle pendant la Fronde. Le fief passa ensuite aux Jehan\r\nRIVIERES. du  XVe et XVIIIe siècles, fief des Tortel, des Tessière, des Malet, des Mercier-Lacombe, des Aveline, des Vial dAram et des Bernard, implanté dans un site inscrit.                                                     MESPLIER, du  XVe et XVIIIe siècles, qui appartenait aux Mesplier, aux de Vessat, aux de Méredieu au XVIIe siècle, et aux Fourichon de Mesplier de 1799 à 1919, aux Picard de 1919 à 1961. Réquisitionné en 1939 pour recevoir des réfugiés Alsaciens. Le 29 mars 1944, des allemands de la division \"B\" exécutent 4 otages. Une stèle de Mesplier le commémore.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"A château-l'Évêque; Chabrerie  grav-1  GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est.                                          Coularéde grav-4 GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est                                                                                 Daille grav -2-3  GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est                                                                                  Mesplier grav-5  GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est                                                                                  Pressac grav -6-7GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est                                                                                    Rivières grav-8.                                                               Vessat grav-9","gps":"45° 14' 47\" Nord, 0° 41' 11\" Est.","images":["../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_1.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_2.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_3.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_4.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_5.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_6.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_7.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_8.jpg","../image/image_24/24_Chateau_L%c3%a9v%c3%a8que_II_9.jpg"]},"Consult_chateau_formulaireb791":{"id":"Consult_chateau_formulaireb791","dept":"24","canton":"Terrasson la Villedieu","commune":"Chavagnac","nom":"Chavagnac_24","type":"Château-Tour","periode":"XIII-XIV","histoire":"CHAVAGNAC, la tour de guet du XIVe siècle est le seul reste d'un château féodal du XIIe siècle qui commandait les routes reliant Sarlat à Terrasson et Brive.  En 1367, \"Reynals de Pons, vicomte de Carlux et en partie de Turenne  donna  audit messire Bertrand de Chavagnac tout le lieu et la paroisse de Chavagnac et toute la juridiction haute, basse et moyenne.\r\nLe château a été pillé par des reîtres en 1569, et l'armée du duc de Mayenne est passée par Chavagnac en 1588. Le château, ainsi qu'une grande partie de l'église voisine, ont été détruits avant la Révolution par un incendie. A partir du XVe siècle Chavagnac appartient à la famille de Roffignac. En 1569 le château est pillé par les reitres. Chavagnac passe ensuite dans la famille de Polignac puis enfin, jusqu'à la Révolution française, dans une branche de la famille de La Rochefoucauld-Cousages.\r\nPendant le XIXe siècle et le début du XXe siècle la commune de Chavagnac fut administrée, presque sans discontinuer par la famille de Bosredon. Cette famille de propriétaires-rentiers engendra deux érudits; deux frères: Philippe-Marie et Jean-Baptiste Alexandre purent s'approcher du premier cercle du pouvoir de l'époque et laisser par leurs écrits une uvre riche et variée.","architecture":"CHAVAGNAC, la tour carrée couronnée de mâchicoulis, haute de 25 mètres et large de près de 8 mètres, permet d'avoir par temps clair une vue, dit-on, sur sept départements. Il lui était possible de communiquer par signaux avec la tour d'Yssandon et le château de Noailles. La tour possède trois fenêtres à meneaux et deux latrines, la tour carrée de Chavagnac est le seul vestige dun château du XIIIe siècle.  Cependant, il nen reste plus aujourdhui que le donjon, appelé communément « tour de Chavagnac ».Il est vrai que le château est dabord saccagé par les huguenots en 1569, puis détruit par un incendie avant la Révolution. Avant la destruction du château, le rôle de cette tour carrée, uvre de Gabriel Bouquier, est de surveiller les abords du fief du comte du Périgord et de contrôler la route reliant Brive à Sarlat . À mi-hauteur des murs, on trouve un élément permettant le rebond des projectiles. On peut pénétrer à lintérieur par une porte ogivale. La tour carrée de Chavagnac est inscrite à linventaire des M.H. le 21 juillet 1947.","habitants":"Famille de Roffignac.\r\n        \r\n        \"","divers":"Chavagnac grav_1  GPS : 45° 05' 18\" Nord et 1° 22' 23,52\" Est. Tour grav-2","gps":"45° 05' 18\" Nord et 1° 22' 23,52\" Est. Tour grav-2","images":["../image/image_24/24_Chavagnac_24_1.jpg","../image/image_24/24_Chavagnac_24_2.jpg"]},"Consult_chateau_formulairee15c":{"id":"Consult_chateau_formulairee15c","dept":"24","canton":"Montignac","commune":"Rouffignac St-Cernin-de-Reilhac","nom":"Cheylard_Rouffignac","type":"Château","periode":"XV","histoire":"CHEYLARD à Rouffignac-Saint-Cernin-de-Reilhac fut construit sur une colline élevée pour surveiller les environs. Datant du XVe siècle, il subit des aménagements à la Renaissance pour le rendre plus confortable.","architecture":"ROUFFIGNAC-Saint-Cernin-de-Reilhac sétend sur lune des collines les plus élevées du Périgord Noir. Depuis la Préhistoire, cette position en hauteur permet aux occupants du lieu de surveiller les environs et constitue donc un site hautement stratégique.               CHEYLARD, situé à l'ouest du bourg,  fut construit au XVe siècle. Il a été acheté par Jean de Calvimont, dit Prouillac, frère de Jean de Calvimont qui fit construire le château fort de l'Herm sur la même commune. En 1511, Prouillac intente un procès contre le seigneur de Rouffignac, son voisin, à propos du village des Maurésies; le 31 mars 1511, il fait son testament, ordonnant la création dune vicairie des Saints Jean-Baptiste et Evangéliste dans sa chapelle de léglise de Plazac où il sera inhumé. Il est nommé, en 1518, dans le testament de son frère Jean, seigneur du Cheylard, qui le choisit comme tuteur de ses enfants. De sa chapelle disparue, le musée de Périgueux conserve un retable du XVIe siècle en pierre,  mutilé.","habitants":"Jean de Calvimont\r\n        \"","divers":"A Rouffignac St-Cernin-de-Reilhac,                              le château du Cheylard grav de 1 à 5.","gps":"","images":["../image/image_24/24_Cheylard_Rouffignac_1.jpg","../image/image_24/24_Cheylard_Rouffignac_2.jpg","../image/image_24/24_Cheylard_Rouffignac_3.jpg","../image/image_24/24_Cheylard_Rouffignac_4.jpg","../image/image_24/24_Cheylard_Rouffignac_5.jpg"]},"Consult_chateau_formulaire3285":{"id":"Consult_chateau_formulaire3285","dept":"24","canton":"Salignac-Eyvigues","commune":"Saint-Crépin et Carlucet","nom":"Cipierre","type":"Château","periode":"XV-XVI","histoire":"CIPIERRE, au Moyen-Âge une première construction fortifiée a été élevée. Un chevalier de Ferrières occupait le site de la Cypierre qui assurait une protection avancée de Sarlat. La famille de Ferrières étaient des chevaliers vassaux des barons de Salignac. On attribue à Guilhem de Ferrières la construction du repaire avant la fin de la guerre de cent ans. Le château est cédé à la fin du XVIe siècle à la famille Bénié de la Cypierre, originaire de Salignac et établie à Sarlat où ils occupent des postes dans la magistrature royale depuis le XVIe siècle et d'officiers dans les armées du roi.  En 1789, le propriétaire est Guillaume Bénié. Il est capitaine de cavalerie et grenadier des gardes du corps dans la compagnie de Noailles. Il émigre avec l'armée de Condé. Comme bien d'émigré, le château est mis sous séquestre. Ses surs, Anne et Marie, font opposition et demandent leurs parts d'héritage. Elles finissent par gagner car le château leur est restitué le 26 messidor an IV. \r\nAu milieu du XIXe siècle, la famille Malbec achète les terres et le château de la Cypierre. Des métayers sont logés dans le château qui alors va commencer à se dégrader. En 1968, monsieur et madame Lebon  le rachètent et entreprennent de le restaurer. Le château fait l'objet d'une inscription au titre des M.H. depuis le 5 octobre 1946.\r\nA 10 kilomètres çà l'ouest le château de LASSERRE à Marcillac St-Quentin,  cet ancien château est passé aux mains de plusieurs grandes familles de la région dont les Contaud, les Del Puech puis les Cerval. Ces derniers restaurent le château au XIXe siècle et font élever la chapelle dédiée à Saint Roch dans un style gothique.","architecture":"LACYPIERE ou la CIPIERE Le château est cédé à la fin du XVIe siècle à la famille Bénié de la Cypierre, originaire de Salignac et établie à Sarlat où ils occupent des postes dans la magistrature royale depuis le XVIe siècle et d'officiers dans les armées du roi. L'édifice a été reconstruit après les dommages subis lors de la guerre de cent ans suivant un plan de manoir rural barlong avec une tour d'escalier polygonale. Un des angles est renforcé par une tour carrée qui ressemble plus à un pigeonnier qu'à une tour de défense et a servi de tour de justice. \r\nLe château couvert de lauzes est agrandi au XVIIe siècle. Il est orné d'un cadran solaire et on construit des fenêtres à meneaux. En 1605, le maçon du village y reconstruit une cheminée.                  \r\nLASSERRE, datant du Moyen Âge et rénové au XIXe siècle.\r\nDe nombreux châteaux et manoirs sont construits sur le territoire vallonné de la commune, dont le château de Lasserre. Le château a été construit au XIVe siècle mais a été profondément remanié au cours des siècles suivants. Selon la légende, le château possède à sa construction pas moins de 17 tours.                                Château du Barry (ou manoir de Marcillac), XVe et XVIIe siècles.","habitants":"Famille Bénié de Lacypierre\r\n        \"","divers":"A Saint-Crépin et Carlucet grav 9 , La Cipierre  grav 1 à 3 GPS : 44° 57' 33\" Nord et 1° 16' 40\" Est. Marcillac de 4 à 6  De Barry grav 8","gps":"44° 57' 33\" Nord et 1° 16' 40\" Est. Marcillac de 4 à 6  De B","images":["../image/image_24/24_Cipierre_1.jpg","../image/image_24/24_Cipierre_2.jpg","../image/image_24/24_Cipierre_3.jpg","../image/image_24/24_Cipierre_4.html","../image/image_24/24_Cipierre_5.jpg","../image/image_24/24_Cipierre_6.jpg","../image/image_24/24_Cipierre_7.jpg","../image/image_24/24_Cipierre_8.jpg","../image/image_24/24_Cipierre_9.jpg"]},"Consult_chateau_formulaire8fbe":{"id":"Consult_chateau_formulaire8fbe","dept":"24","canton":"Lalinde","commune":"Causse de Clérans","nom":"Clérans","type":"Vestiges","periode":"XII-XIII-XIV","histoire":"CLERANS, vestiges, première mention d'un château vers 1100.\r\n1170-1180 : Les seigneurs de Clérans combattent  Richard d'Aquitaine (futur Cur de Lion). 2ème moitié du XIIIe siècle le roi d'Angleterre  s'intéresse  à Clérans. En 1265 une charte communale est accordée au bourg. En 1374  Du Guesclin s'empare du château.  En 1378  le château devient le repaire de routiers à la solde des anglais. En 1453 fin de la guerre de cent ans. Après la bataille de Castillon, Clérans passe définitivement sous domination française. Il a traversé deux cent cinquante années de guerres franco-anglaise. Malgré d'innombrables épreuves, ses restes ont encore fière allure. Les ouvertures finement sculptées, côté nord du donjon, sont remarquables. Incendié par Raymond, vicomte de Turenne vers l'an 1100, le château de Clérans est reconstruit au XIIe puis au XIIIe siècle. Abandonné, il sert de carrière de pierres au XIXe siècle et jusqu'à son rachat en 1936.","architecture":"CLERANS, bâti à Cause-de-Clérans, donjon du XIIIe siècle, la construction date du XIIe, XIIIe et XIVe siècle. Le château de Clérans se situe au bord de la Vézère. Des logis, des deux tours, du châtelet et des remparts médiévaux, le château actuel conserve au début du XXIe siècle, hormis une chapelle aménagée en logement, un donjon élevé et une enceinte fractionnée, à l'état de ruines. Le château est inscrit aux M.H. en 1948 pour son donjon, puis, en 2007, pour le reste du château.","habitants":"Bertrand Du Guesclin.\r\n        \"","divers":"A Causse de Clérans;                                                    Clérans  grav 1 à 7 GPS : 44° 51' 45,6\" Nord, 0° 40' 0,2\" Est","gps":"44° 51' 45,6\" Nord, 0° 40' 0,2\" Est","images":["../image/image_24/24_Cl%c3%a9rans_1.jpg","../image/image_24/24_Cl%c3%a9rans_2.jpg","../image/image_24/24_Cl%c3%a9rans_3.jpg","../image/image_24/24_Cl%c3%a9rans_4.jpg","../image/image_24/24_Cl%c3%a9rans_5.jpg","../image/image_24/24_Cl%c3%a9rans_6.jpg","../image/image_24/24_Cl%c3%a9rans_7.jpg"]},"Consult_chateau_formulaire03ac-2":{"id":"Consult_chateau_formulaire03ac-2","dept":"24","canton":"Saint-Cyprien","commune":"Les Eyzies-de-Tayac-Sireuil","nom":"Commarque_Laussel","type":"Forteresse","periode":"XII-XV","histoire":"COMMARQUE,  les maisons-tours sont tenues par des lignages de petite noblesse dont on connaît quelques noms , construit au XIIe siècle par les sires de Commarque, puis les Cendrieux, les Gondrix, les La Chapelle.  Cédé en gages  aux Templiers pour pouvoir se croiser ceux-ci  ne consentirent pas à la restitution et le domaine passa aux chevaliers de Saint-Jean en 1314 puis aux sires de Beynac. Pendant la guerre de cent ans, les Beynac restent les défenseurs fidèles de la couronne de France. Les anglais s'emparent néanmoins du château en 1406 et le conservent pendant quelques années. Le déclin de la famille des Beynac, date de cette époque. Dans les années 1500, il semble que le castrum de Commarque soit déjà déserté par les anciennes familles résidentes. Plus tard, en 1569, le castrum est à nouveau pris pendant les guerres de religion par les catholiques. C'est sans doute à cette époque que s'est effondrée la salle voûtée. Guy de Beynac, dernier châtelain de Commarque, y meurt en 1656. Le site est abandonné définitivement au XVIIIe siècle. Un siècle plus tard, le château est en ruine. Resté longtemps la propriété de la famille la Tour du Roc, puis du prince de Croÿ  et  en 1968, Hubert de Commarque achète les ruines du château.                                                                            LAUSSEL,  typique château périgourdin, ancienne résidence des Commarque, de style Renaissance, est très restauré. Au cours du XVe siècle la famille seigneuriale installée dans le château médiéval de Commarque délaisse peu à peu sa forteresse au profit du château de Laussel, situé en face.  Les archives permettent de connaître le nom du premier maître duvre de l'édifice, Blaise Bernat de Sarlat, le nom dun maçon, Jean Vachier de Marquay, et le nom dun tireur de pierre, Guillaume Bru de Tamniès. Signalé en ruine dès 1738, lédifice estentièrement restauré au début du XXe siècle par larchitecte Henri Deglane.","architecture":"COMMARQUE,   au XIIe siècle il existe une agglomération, un donjon avec un logis, une chapelle et des maisons-tours : c'est le castrum de Commarque. Plusieurs autres tours furent construites, accompagnées à chaque fois d'un logis après que la famille de Beynac se soit rendue maîtresse du château, la tour en bois est remplacée par un donjon en pierre plusieurs fois rehaussé, en particulier en 1380, et couronné de mâchicoulis éclairés par de grandes baies à colonnettes. Ainsi, les seigneurs du lieu, les Beynac, logeaient dans le donjon seigneurial.il est composé de deux parties une tour quadrangulaire de 7,50 mètres et d'une construction pantagonale du XIIIe siècle. iques est en cours pour plusieurs années. LAUSSEL date du XVe et XVIe siècle. L'ancien château peu commode, fut en partie détruit. Le château actuel se dresse juste en face de la forteresse de Commarque. Il est de style Renaissance. Très bien restauré, possède un pigeonnier troglodytique. Il a été bâti par les seigneurs de Commarque au XVe siècle pour servir de résidence. Sur une falaise surplombant la vallée de la Beune  Ainsi lhistoire de Laussel se confond avec celle du château de Commarque. Les deux édifices sont dailleurs tous deux laissés à labandon en même temps, au XVIIIe siècle. Laussel date des XVe et XVIe siècles, des tours à mâchicoulis, un donjon carré, une chapelle du XVIIe siècle et un chemin de ronde posé sur des corbeaux de pierre à six redans, en font un ensemble, qu'une habile restauration entreprise, conforte.                                 Château de Tayac et ses dépendances, XIIe siècle XIVe siècle XVe siècle, classé","habitants":"Famille de Commarques\r\n        \"","divers":"A Les Eyzies-de-Tayac-Sireuil Commarques grav de 1 à 5  GPS : 44° 56' 30\" Nord et 1° 6' 6\" Est.                      Laussels Grav de 6 à 8 GPS : 44° 56' 41\" Nord, 1° 08' 05\" Est. Eyzies de Tayac grav 9.","gps":"44° 56' 30\" Nord et 1° 6' 6\" Est.                      Lauss","images":["../image/image_24/24_Commarque_Laussel_1.jpg","../image/image_24/24_Commarque_Laussel_2.jpg","../image/image_24/24_Commarque_Laussel_3.jpg","../image/image_24/24_Commarque_Laussel_4.jpg","../image/image_24/24_Commarque_Laussel_5.jpg","../image/image_24/24_Commarque_Laussel_6.jpg","../image/image_24/24_Commarque_Laussel_7.jpg","../image/image_24/24_Commarque_Laussel_8.jpg","../image/image_24/24_Commarque_Laussel_9.jpg"]},"Consult_chateau_formulaire18ed":{"id":"Consult_chateau_formulaire18ed","dept":"24","canton":"Terrasson la Villedieu","commune":"Condat sur Vézére","nom":"Condat_Petite_Fifolie","type":"Château","periode":"XIII-XVIII","histoire":"CONDAT,   de 1291 à 1790 la commanderie de Condat eut à sa tête 30 commandeurs. À Condat même, ils rivalisaient pour les droits sur les terres avec les abbés de Terrasson ou de Saint-Amand, arbitrés en 1490, ou pour l'exemption des redevances réclamées par l'évêque de Sarlat, exemption confirmée par l'arbitrage royal plusieurs fois entre 1512 et 1554. Pendant les guerres de religion, la paroisse de Condat fut dévastée à plusieurs reprises par les troupes d'huguenots du sire d'Albret. \r\nEn 1789, à la nouvelle de la prise de la Bastille, les habitants de Condat pillent les meubles de la commanderie, dont les biens sont vendus comme biens nationaux. Durant la fronde, le château de Condat changea de mains plusieurs fois, la demeure appartient à la famille de Sainte-Aulaire puis aux Mirandol,  transformé en chambres d'hôtes par la famille Roux.                                                               LA PETITE-FILOLIE en 1485 et se compose d'une aile Renaissance et d'un logis du XVIIe siècle. Il est construit sur la rive droite de la Vézère, face au château dela Fleunie établi sur l'autre rive. François II de Milon écuyer, devient seigneur de la Filolie suite à son mariage avec demoiselle de la Filolie en 1660. Pierre de La Romagère de Roncessy, seigneur du lieu, a été évêque de Tarbes sous le nom de Pierre III de La Romagère, de 1751 jusqu'à sa mort en 1769. Début du XVIIIe siècle (1730), Julie de Milon épouse Louis de Feytis et lui apporte la terre. En 1819, Etienne de Feletz hérite du domaine qu'il transforme en résidence. Charles Marie de Feletz, prêtre et académicien,vend le domaine en 1834 à Charles de Vins du Masnegre, diplomate. En 1848,sa veuve institue comme héritier Jean Baptiste Gilles Lagrange, famille de notables périgourdins. En 1908, le dernier descendant vend la Filolie à Paul Peyroux, horloger à Montignac. En 2002, M. Muller-Margot achète la Filolie en très mauvais état, qu'il promet de restaurer.","architecture":"CONDAT sur vézére. Tour carrée  du XVe siècle avec mâchicoulis et bretèche dont celui de Condat,vestige du château des templiers, il ne reste plus qu'un logis du XVIe siècle et le donjon de la commanderie du XVe siècle, l'édifice se présente comme un corps barlong accosté d'un donjon carré du XIVe siècle, avec chemin de ronde sur corbeaux, à l'angle opposé, une tourelle du XVIe siècle découronnée. Il est complété par un second édifie avec tour de défense carrée. Les douves ont été comblées. Toiture en ardoise de Brive.
