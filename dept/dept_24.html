e tours rondes et carrées comportant un chemin de rondes crénelées et mâchicoulis ainsi qu'a l'angle de l'un des corps de logis une échauguette  munie de créneaux. Après les guerres de religion, au début du XVIIe siècle, une aile a été ajoutée perpendiculairement au château du XVe siècle  une aile de style classique, présente au rez-de-chaussée une galerie formées de cinq arcs surbaissés soutenant  une façade dont les baies sont encadrées de pilastres les cinq travées sont sommées d'une lucarne à fronton cintré sous un comble brisés à la mansart, une seconde aile  semblable est édifiée en même temps mais sera démolie au XIXe siècle.\r\nUn escalier de plan carré a été édifié dans une des tours du XVe siècle. Vers 1650, la terre de La Marthonie a été érigée en marquisat au profit du fils de Gaston de La Marthonie. \r\nUn grand pavillon d'angle donnant sur les jardins a été ajouté au XVIIIe siècle.","habitants":"famille de La Marthonie\r\n        \"","divers":"A  Saint-Jean de Cole;  Marthonie grav de 1 à 6  GPS : 45° 25' 16,5\" Nord et 0° 50' 20,1\" Est.                            Villars grav 7 : 45° 25' 17\" Nord et 0° 45' 21\"","gps":"45° 25' 16,5\" Nord et 0° 50' 20,1\" Est.","images":["../image/image_24/24_Marthonie_1.jpg","../image/image_24/24_Marthonie_2.jpg","../image/image_24/24_Marthonie_3.jpg","../image/image_24/24_Marthonie_4.jpg","../image/image_24/24_Marthonie_5.jpg","../image/image_24/24_Marthonie_6.jpg","../image/image_24/24_Marthonie_7.jpg"]},"Consult_chateau_formulaire0ff6-2":{"id":"Consult_chateau_formulaire0ff6-2","dept":"24","canton":"Montagrier","commune":"Ségonzac","nom":"Martinie","type":"Château","periode":"XVII","histoire":"MARTINIE, le nom de la Martinie n'apparaît pas avant que les La Faye s'y installent. Segonzac appartenait à Hélie Vigier qui n'a eu que trois filles. L'aînée, Madelaine Vigier, a épousé en 1572 Raymond de Bardon et lui a transmis le château de Segonzac. Les deux autres filles se sont mariées par contrat, le 4 avril 1582, l'une, Antoinette, avec François de La Faye, la cadette, Jeanne Vigier, avec Alain de La Faye (20 mai 1629), frère cadet de François et fils de François de La Faye, co-seigneur des Roberts, et Antoinette Aymeric du Chastaing. François de La Faye s'est établi au château de Chardeuil, près d'Excideuil, qu'il a reconstruit. Alain de La Faye a eu en dot la métairie de la Martinie, à Coulaures. Il a construit le château sur les terres de sa femme, à Segonzac, et lui a donné le nom de la Martinie.  En 1611, au moment du mariage de son fils, Pierre de La Faye, avec Isabeau de Lambertie. Dans le contrat de son deuxième fils, Poncet de La Faye, qui s'est marié en 1624 avec Isabeau de Solminhiac, il est écrit « habitant au chasteau de la Martynie, paroisse de Segonzac, au dict Périgord ». Le château a dû être construit entre 1582 et 1611 autour d'un bâtiment du XVe siècle couronné de mâchicoulis avec un chemin de ronde crénelé. Le château ne devait pas être terminé à la mort d'Alain de La Faye. L'inventaire fait après la mort d'Isabeau de Lambertie, en 1653, parle d'un pavillon neuf qui est probablement la tour située à l'est de l'enceinte et divisée par un plancher en deux pièces superposées avec cheminées. La cour du château était alors close par une enceinte. Cette cour pouvait servir de refuge à la population des environs.","architecture":"MARTINIE, le château est resté la propriété des La Faye jusqu'à la Révolution. La veuve La Faye est enfermée dans une maison de réclusion à Ribérac et doit payer une taxe révolutionnaire sur les riches égoïstes. Le château a alors été vendu comme bien national. Il a été ensuite racheté par le vicomte de Segonzac. Important château féodal à son origine, il ferme au nord une cour entourée de murailles défensives dont celles de l'Est et de l'ouest ont aujourd'hui disparu. L'ensemble actuel comporte encore les quatre tours carrées d'angle à mâchicoulis et la courtine sud. Le corps de logis s'inscrit entre deux des quatre tours, ceinturé d'un chemin de ronde sur mâchicoulis. Les façades nord et sud ont certainement vu leurs ouvertures modifiées aux XVIe et XVIIe siècles. Côté cour, la muraille a été doublée au XVIIe siècle d'une galerie qui ouvre par cinq arcades plein cintre dont les piles sont agrémentées de pilastres. La tour d'angle sud-ouest contient, au rez-de-chaussée, une chapelle carrée semblant dater du XIVe siècle.","habitants":"Famille de la Faye\r\n        \"","divers":"A   Ségonzac; Martinie Grav 1 à 6  GPS : 45° 12' 8,3\" Nord, 0° 26' 54,9\" Est","gps":"45° 12' 8,3\" Nord, 0° 26' 54,9\" Est","images":["../image/image_24/24_Martinie_1.jpg","../image/image_24/24_Martinie_2.jpg","../image/image_24/24_Martinie_3.jpg","../image/image_24/24_Martinie_4.jpg","../image/image_24/24_Martinie_5.jpg","../image/image_24/24_Martinie_6.jpg"]},"Consult_chateau_formulaire9737":{"id":"Consult_chateau_formulaire9737","dept":"24","canton":"Jumelhac le Grand","commune":"Chaleix","nom":"Mavaleix","type":"Château","periode":"XIII","histoire":"MAVALEIX, au Moyen-Age, le château de Mavaleix était une forteresse, construite pour protéger les forges qui s'étendaient le long de la petite rivière \"La Valouze\", contre les invasions de l'occupant voisin. Ces forges étaient vitales car on y produisait des armes, des outils et de la serrurerie pour la noblesse. Le château était en même temps l'habitation de certains \"maîtres de forges\" qui souvent acquéraient un titre de noblesse. Un des ces illustres habitants était Nicolas-Emile Grenouillet de Mavaleix. Ce maître de forge rayonnait dans son entourage et fut pendant plusieurs années le maire de la commune de Chalais. Son imposant tombeau, datant de la fin du XIXe siècle, se trouve caché dans les bois du château. Aujourd'hui vous pourrez toujours visiter ce monument mais la dépouille du noble a été transférée vers le cimetière de Chalais où l'on peut admirer une copie de ce tombeau. aujourd'hui hôtel restaurant de monsieur Ruel.","architecture":"MAVALEIX du XIIIe siècle, au milieu des vallées gracieuses du Périgord vert, dans les environs de La Coquille, se situe le château de Mavaleix, construit au XIIIe siècle. Le domaine qui s'étend sur 64 hectares, vous séduira par ses bois, jardins, petits lacs, prés, parcs et rivières. Ce lieu centenaire est une aubaine pour ceux qui veulent se reposer, être dans la nature et profiter de la qualité de vie de la campagne française.","habitants":"Nicolas-Emile Grenouillet\r\n        \"","divers":"A Chaleix; Mavaleix grav 1 à 4  GPS : 45° 30' 16\" Nord et 0° 57' 32\" Est","gps":"45° 30' 16\" Nord et 0° 57' 32\" Est","images":["../image/image_24/24_Mavaleix_1.jpg","../image/image_24/24_Mavaleix_2.jpg","../image/image_24/24_Mavaleix_3.jpg","../image/image_24/24_Mavaleix_4.jpg"]},"Consult_chateau_formulaire5004":{"id":"Consult_chateau_formulaire5004","dept":"24","canton":"Savignac les Eglises","commune":"Mayac","nom":"Mayac_Sarazac","type":"Château","periode":"XVII-XVIII","histoire":"A Mayac, le  château de Mayac du XVIIIe siècle.  Du château de Sarazac ne subsiste plus qu'une tour du XVe siècle.\r\nMAYAC, les dAbzac étaient une famille très importante possédant un grand nombre de propriétés et une immense fortune à tel point quen 1445 Gui dAbzac, qui fut consul, maire de Périgueux, décide de partager avec ses fils et donne à Guillaume tous les biens quil possède dans la chatellenie dAns, ainsi Guillaume devient le premier seigneur de Mayac. Ce fief dune des plus anciennes familles du Périgord est toujours habité par un de ses descendants.            SARAZAC, Pierre d'Abzac né en 1670 sa descendance à épousé en 1711, Marie de Falvel, ils auront neufs enfants, ils décéde en 1738, son fils Henri, né en 1711 hérite de Sarrazac et épouse en 1738, Jeanne de Lestrade de Cousse, ils auront six enfants, ils meurt en 1808 à l'âge de 90 ans, son fils Pierre-Marie d'Abzac devient son héritier universel, et devient rapidement un grand maître de l'équitation à Versailles. Puis Sarrazac passe dans une autre branche d'Abzac Alexandre  marquis de la Douze rachète le fief et ses dépendances le 12 avril 1816 et devient maire de Mayac, il avait épousé Jeanne de Bouillac, il meurt en 1818 et c'est le docteur Rousseau qui devient propriétaire de Sarrazac. En 1869 Sarrazac est vendu à la famille Fayol, aujourd'hui résidence principale d'un couple de Mayac.","architecture":"MAYAC, la paroisse faisait partie du pays dAns, qui jusquau règne dHenri IV était comprise dans la chatellenie dAns dépendant de la vicomté de Limoges. La maison-forte, appartenait à une des plus anciennes familles du Périgord, les dAbzac de la Douze. Remanié à plusieurs reprises, il est reconstruit en 1700 par Henri dAbzac de la Douze, dans un pur style Louis XIV, sur lemplacement d'un vieux manoir du XIIe siècle. Restauré en 1850, ainsi que nous le connaissons aujourdhui,  de plan rectangulaire à deux niveaux  avec fronton central à oeils de boeufs sur un toit en croupes.                                                         SARAZAC, corps de logis rectangulaire à deux niveaux toit en croupe recouvert de tuiles accolé d'une tour ronde de même niveau toit en poivrière.","habitants":"les dAbzac de la Douze\r\n        \"","divers":"A Mayac-Sarazac grav 1 à 3 GPS : 45° 16' 49\" Nord, 0° 56' 38\" Est","gps":"45° 16' 49\" Nord, 0° 56' 38\" Est","images":["../image/image_24/24_Mayac_Sarazac_1.jpg","../image/image_24/24_Mayac_Sarazac_2.jpg","../image/image_24/24_Mayac_Sarazac_3.jpg"]},"Consult_chateau_formulaire66c9":{"id":"Consult_chateau_formulaire66c9","dept":"24","canton":"Jumilhac le Grand","commune":"la Coquille","nom":"Meynardie","type":"Château","periode":"XVI-XVII","histoire":"MEYNARDIE,  il appartient à la famille des Croizant, Arlot de Frugie, puis fut transmis par mariages successifs aux familles de Curmond de la Meynardie, de Ribeyreix seigneur de la Meynardie, puis au Comte de Villoutreys, la plupart enterrés dans la chapelle du château. A la Révolution, ce dernier émigra et le château fut mis en vente aux enchères comme Bien National, acheté par la famille de maitres de Forge Texier, puis de la Salle. Monsieur  Sohier racheta ensuite pour sa femme (nièce du maréchal Bazaine) le château, très abimé, en 1883, et y fit de très importants travaux intérieurs et extérieurs. Il crée notamment le parc à la française, installe de magnifiques écuries pour sa chasse à courre. La Meynardie est enfin rachetée en 1941 par les grands parents des actuelles propriétaires, trois soeurs. Le château servit de théâtre à la mission Alsos pendant la guerre. Cette mission américaine placée sous le commandement du colonel Boris Pash établit sa base à la Meynardie, devenant le centre opérationnel pour le Sud de la Loire.  Le colonel Pash en a fait un livre « the Alsos mission », où il parle longuement de la Meynardie comme dun « impressionnant vieux château ».","architecture":"MEYNARDIE, un château de la fin du XVIe siècle, début du  XVIIe, de style Louis XIII, bâti sous Henri IV ou sous Louis XIII. « Son aspect seigneurial vient dune rangée ininterrompue de mâchicoulis, de lucarnes de pierre à frontons, de grands combles dardoise et deux pavillons sur la toiture. » selon la description du baron de Verneilh en 1873. Le domaine comportait aussi la forge de la Meynardie, sur la Valouze, qui au XIXe siècle produisait plus de 500 quintaux de fer.","habitants":"Famille de Curmond de la Meynardie\r\n        \"","divers":"A la Coquille; Meynardie grav 1 à 4.","gps":"","images":["../image/image_24/24_Meynardie_1.jpg","../image/image_24/24_Meynardie_2.jpg","../image/image_24/24_Meynardie_3.jpg","../image/image_24/24_Meynardie_4.jpg"]},"Consult_chateau_formulaire46b1":{"id":"Consult_chateau_formulaire46b1","dept":"24","canton":"Saint-Pardoux la Rivière","commune":"Mialet","nom":"Mialet","type":"Château","periode":"XVII-XVIII","histoire":"A Mialet le château de Lambertie, détruit et reconstruit à plusieurs reprises sur le site d'un repaire remontant au XIIe siècle.\r\n la Congerie du XVIIIe siècle.  Manoir de Feyte du XVIIe siècle.\r\nManoir de Mialet du XVIe siècle, pas d'information historique pour ces deux derniers.\r\nCONGERIE, ce manoir, construit au XVIIIe siècle, est à lorigine la propriété dune famille de notaires, puis de diverses familles en fonction des alliances, héritages et cessions. Cest un bâtiment qui comprend une partie centrale à un étage plein, avec une porte et cinq grandes fenêtres et un deuxième mansardé avec petite fenêtre, deux ailes sont accolées de part et dautre, avec chacune une fenêtre en façade et un étage mansardé avec petite fenêtre. La façade, bien que sobre, est animée par la haute toiture à la mansart LAMBERTIE,  pendant la guerre de Trente Ans, un nouveau régiment d'infanterie française est levé le 5 février 1632 par Gabriel de Lambertie, chevalier comte dudit lieu, baron de Montbrun, seigneur de Mialet, Pensol et autres places. Toute les descendances furent officiers. Le 3e et dernier comte de Lambertie, Jean-François de Lambertie, décédé en 1667.Jean-François de Lambertie, comte de Lambertie etc., qui se maria le 1er octobre 1654 avec Marie d'Aydie, fille d'Armand, seigneur de Bernardière, dont il eut une fille, Marie, qui porta en dot les seigneuries ci-dessus au marquis de Choiseul, qu'elle épousa suivant le  contrat du 20 mars 1691, mais dont elle n'eut pas d'enfant.","architecture":"LAMBERTIE, en des temps anciens, les anglais passant par ici brûlèrent un antique château. Reconstruit, l'amiral de Coligny le fit démolir en 1569 car il craignait là une place forte favorable aux papistes, il n'en subsiste que peu d'éléments. Cependant, une chapelle voûtée en étoile à cinq clés armoriées, datée de1591, évoque une certaine magnificence. Il est déplorable que, près de deux siècles après, relevée de ses décombres, les sans culottes n'épargnèrent guère cette demeure seigneuriale. Tout était en ruines, en 1875, lorsque le marquis de Lambertie revint au pays et entreprit de reconstruire la maison de ses ancêtres. Ainsi l'archéologue Jules de Vemeilh et l'architecte Virot conseillèrent le marquis et le guidèrent pour tout reprendre avec assez de réussite. Durant la dernière partie du XIXe siècle, il se fit là des miracles avec la reprise de morceaux encore debout ou des moellons posés en attente. La cour carrée fut fermée par la tour de la chapelle du XVIe siècle, alors que les logis à trois niveaux formèrent les autres côtés, toitures coiffées de poivrières et chemin de ronde conférèrent à l'ensemble cet aspect romantique et agréable.","habitants":"Comte de Lambertie\r\n        \"","divers":"A Mialet grav 1 à 5 et la congerie grav 6","gps":"","images":["../image/image_24/24_Mialet_1.jpg","../image/image_24/24_Mialet_2.jpg","../image/image_24/24_Mialet_3.jpg","../image/image_24/24_Mialet_4.jpg","../image/image_24/24_Mialet_5.jpg","../image/image_24/24_Mialet_6.jpg"]},"Consult_chateau_formulaired72a":{"id":"Consult_chateau_formulaired72a","dept":"24","canton":"Domme","commune":"Castelnaud la Chapelle","nom":"Milandes","type":"Château","periode":"XV","histoire":"MILANDES, est bâti en 1489 et constitue alors la demeure principale des seigneurs de Caumont qui possèdent aussi le château de Castelnaud. Le bâtiment est transformé par François de Caumont pour son épouse qui souhaite habiter un lieu moins austère et plus lumineux.  Jacques Nompar de Caumont, serviteur du roi Henri IV, séjourna au château de nombreuses fois. Les Caumont La Force conserveront les Milandes ou ils ne séjournent que rarement jusqu'à la Révolution qui entraîne l'abandon du château qui est vendu comme bien national en 1794,  passe dans différentes mains. En 1890 un incendie qui ravagent l'aile orientale la restauration est entreprise par le général Tournier propriétaire des Milandes. Auguste Claverie, industriel ayant fait fortune dans la lingerie fine, le rachète et commence à le restaurer entre 1900 , après sa mort, sa veuve vend en 1932 le château à un particulier. En 1947 Joséphine Baker l'acquiert et s'en séparent en 1968, quatre familles se sont succédé au château. Depuis 2001, le château accueille une exposition sur Joséphine Baker et des travaux de restauration sont effectués. Claude de Labarre et sa fille, Angélique laquelle épousa par la suite un membre de la famille de Saint-Exupéry, sont propriétaires du château des Milandes depuis 2001. En 2013 est apposé sur lentrée de lancienne demeure de Joséphine Baker le label maisons des Illustres créé en 2010 par le ministère de la culture et de la communication, baptisé « Village du Monde », et y vivra avec ses douze enfants adoptés de neuf nationalités différentes qu'elle surnomme sa « Tribu Arc en Ciel »Son objectif est de faire connaître des lieux ouverts au public, anciennes demeures de personnalités qui ont influencé lhistoire. Cest le troisième site de la Dordogne, après le château de Montaigne, à Saint-Michel-de-Montaigne et celui de Hautefort.","architecture":"MILANDES, les fenêtres à meneaux couvertes de vitraux sont percées mais les tourelles, les escaliers à vis et les gargouilles, éléments architecturaux du Moyen-Âge, sont conservés. De nouveaux éléments de styles néo-gothique et néo-Renaissance sont ajoutés, comme des tours, des logis, des balcons, et un jardin à la française est créé. Le château a marqué le XXe siècle, cet engouement sexplique par son merveilleux panorama sur la vallée de la Dordogne, son architecture Renaissance et sa renommée devient mondiale  demeure de Joséphine Baker. C'est à cette époque que sont installés l'eau courante, l'électricité et un système de chauffage central. Elle y développera un complexe touristique avant-gardiste,  Les terrasses, façades et toitures du château sont inscrites au titre des M.H. le 29 août 1986.","habitants":"Joséphine Baker\r\n        \"","divers":"A Castelnaud la Chapelle; Milandes  Grav 1 à 9 GPS : 44° 49' 24\" Nord et 1° 06' 49\" Est","gps":"44° 49' 24\" Nord et 1° 06' 49\" Est","images":["../image/image_24/24_Milandes_1.jpg","../image/image_24/24_Milandes_2.jpg","../image/image_24/24_Milandes_3.jpg","../image/image_24/24_Milandes_4.jpg","../image/image_24/24_Milandes_5.jpg","../image/image_24/24_Milandes_6.jpg","../image/image_24/24_Milandes_7.jpg","../image/image_24/24_Milandes_8.jpg","../image/image_24/24_Milandes_9.jpg"]},"Consult_chateau_formulaire6093":{"id":"Consult_chateau_formulaire6093","dept":"24","canton":"le Bugue","commune":"Mauzens et Miremont","nom":"Miremont_24","type":"Vestiges","periode":"XII","histoire":"MIREMONT, en 1307, Galhard de Bouville, seigneur de Miremont.  En 1316, les Bouville sont évincés lorsque Philippe le Bel remet la châtellenie de Miremont à un cousin de la famille, Pierre de Galard, qui est colonel général de lInfanterie et gouverneur de Flandre. Son fils Jean de Galard lui succède aux alentours de 1340, alors que la guerre de cent ans débute en Périgord.   Il marie sa fille à Nicolas de Beaufort, un allié du roi, et dont le frère deviendra le pape Grégoire XI. Miremont tombe donc dans lescarcelle dune nouvelle famille en 1397. Le fils de Nicolas de Beaufort, Jean, est allié des anglais. Son frère, Pierre de Beaufort, lui succède. \r\n Sa fille Anne épouse Agne de  la Tour, issu de la famille de la Tour dAuvergne. En 1504, sa fille devient propriétaire de Miremont avant que son neveu François de la Tour ne rachète les lieux en 1516.  Etienne de Bonald en est lacquéreur en 1516. Son fils, Pierre de Bonald épouse Catherine dAubusson en 1543. Cette dernière appartient à une éminente famille de la Marche. A la mort de son mari, elle rachète Miremont. Durant deux siècles, huit générations dAubusson vont se succéder à la tête de Miremont : de Catherine dAubusson à Catherine Françoise dAubusson de la Feuillade. Il appartient à Catherine Françoise dAubusson de la Feuillade lorsque la Révolution éclate.  Elle fuit dès 1789. Peu de temps après, le domaine et le château sont vendus aux enchères. \r\nCHATEAU-MADAME est perché sur une colline avec vue sur une vallée autrefois dominée par cette baronnie du XIIe siècle.  elle est maintenant un géant endormi  un de paix et de tranquillité.Transformé en chambres d'hôtes par Stephen Mack.","architecture":"MIREMONT, la forteresse est en partie démolie. Certaines de ses pierres furent utilisées pour la construction de demeures des environs. Cette période de lhistoire française sonne le glas de la châtellenie. Construit sur un éperon barré, l'enceinte du château domine la vallée de la Manaurie et du Brungidou. La demeure domine le village de Miremont. Il s'agit d'un castrum, village fortifié avec une enceinte encore visible par endroit. Une des portes d'accès au village est présente à l'est. La pièce maîtresse du château est un donjon roman à contreforts plats du XIIe siècle remanié au XIIIe siècle et à la Renaissance.  Un bâtiment de 35 mètres par 8 mètres est attenant au donjon, et un autre datant de la Renaissance a complètement disparu après la Révolution. La CHAM, souhaite partager son histoire, faire connaître l'ensemble de son patrimoine et fédérer autour du projet l'ouverture du château au public. CHAM : association de bénévoles dont l'objectif est de promouvoir ce qui atrait à l'histoire, la sauvegarde et la mise en valeur du patrimoine situé sur la Châtellenie de Miremont.","habitants":"FamilleGalhard de Bouville, \r\n        \"","divers":"A Mauzens et Miremont ; Miremont vestiges grav de 1 5  château Madame grav 6","gps":"","images":["../image/image_24/24_Miremont_24_1.jpg","../image/image_24/24_Miremont_24_2.jpg","../image/image_24/24_Miremont_24_3.jpg","../image/image_24/24_Miremont_24_4.jpg","../image/image_24/24_Miremont_24_5.jpg","../image/image_24/24_Miremont_24_6.jpg"]},"Consult_chateau_formulaire615f":{"id":"Consult_chateau_formulaire615f","dept":"24","canton":"Sigoulés","commune":"Monbazillac","nom":"Monbazillac","type":"Château","periode":"XVI","histoire":"Trois château à Monbazillac, celui de Monbazillac et de Fontvieille  à quelques km au sud-est le château de la Jaubertie à Colombier.                                   MONBAZILLAC François d'Aydie descendant par sa mère de la maison de Pons , il épouse  vers 1525 Françoise de Salignac baronne de Montcup, leur fils Charles vers 1550 fait construire le château sur un plan très simple. Le huguenot Louis de Bouchard d'Aubeterre l'achète en 1607, qui obtiendra du roi Henri IV   en 1608  la nomination en vicomté, restée veuve  son épouse convole avec le marquis de Pont-briand  mais sans héritier, lègue le domaine  à l'un de ses neveux Brizay qui le cède en 1666 à Pierre Barraud seigneur de Fournils et de Montaud. Sa veuve  épousera en second noce Elzéar de Luxe de Capian. Madame de Capian meurt en 1705, le château est vendu à David d'Alba colonel,  en 1740 le transmet par vente à Issac de Bacalan,  son arrière petite fille Marie de Ferron épouse Gaston de Lapouyade de Piquetterie  hérite du  château en 1902 et le conserve jusqu'en 1928, date de sa vente aux Hibon de Frévent qui s'en séparent un an après au profit de Jean Eyma et  en 1960, le château est acheté par la cave coopérative de Monbazillac qui commercialise le vin de ses 25 hectares de vignes qui entourent le château il devient un musée grâce au concours de Jean Secret (1904-1981).                                                                 FONTVIEILLE, manoir, demeure du XVIe siècle, inscrit M;H. en 1948. Demeure des Pons, des les Aydie, des Peyronnet, des Ponpon de Maucune qui donnèrent asile en 1568 à Blaise de Montluc qui allait assièger la Bridoire.                                                                            JAUBERTIE à colombier  fut un relais de chasse d'Henri IV, qui le donna à Gabrielle d'Estrées sa maîtresse embelli au XVIII par Léon Beylet, médecin favori de Marie Antoinette. Propriété familiale de monsieur Raiman depuis 1974,","architecture":"MONBAZILLAC, grand parallélogramme entourés de douves sèches  que franchit au sud  un pont fixe à deux arches, l'édifice  formé d\"un corps de logis flanqué de 4 tours rondes,  coiffées en poivrière  et le corps central de la toiture est subdivisé de cinq fermes différentes,  intacte construction du XVe siècle, a conservé  les machicoulis, les créneaux, les parapets sur lesquels reposent ses toitures, les toits coniques de ses tours,  ses fenêtres ont conservé leurs meneaux intacts,   l'architecture du château offre un compromis entre le Moyen-Age et la Renaissance, un chemin de ronde crénelé. A l'intérieur, la grande salle s'orne d'une splendide cheminée Renaissance, d'un mobilier du XVIIe et de belles tapisseries flamandes de la même époque. Des meubles périgourdins sont exposés dans une pièce voisine.                       FONTVIEILLE édifice de plan  carrée à trois niveaux toits en croupe avec lucarnes sur comble couvert de tuiles accolés de tours carrées.                             JAUBERTIE de plan rectangulaire à trois niveaux avec fronton triangulaire en façade sur trois travées, toits en croupe, la bâtisse esr accolée de  dépendances de  part et d'autre d'un niveaux et lucarnes sur combles.","habitants":"Famille de Charles d'Aydie\r\n        \"","divers":"Monbazillac  grav de1 à 6  GPS : 44° 47' 41\" Nord et 0° 29' 35\" Est. Fontvieille grav 7.                  Jaubertie grav 8  GPS : 44° 47' 00\" Nord et 0° 31' 10\" Est","gps":"44° 47' 41\" Nord et 0° 29' 35\" Est. Fontvieille grav 7.","images":["../image/image_24/24_Monbazillac_1.jpg","../image/image_24/24_Monbazillac_2.jpg","../image/image_24/24_Monbazillac_3.jpg","../image/image_24/24_Monbazillac_4.jpg","../image/image_24/24_Monbazillac_5.jpg","../image/image_24/24_Monbazillac_6.jpg","../image/image_24/24_Monbazillac_7.jpg","../image/image_24/24_Monbazillac_8.jpg"]},"Consult_chateau_formulaire751d-2":{"id":"Consult_chateau_formulaire751d-2","dept":"24","canton":"Beaumont","commune":"Monsac","nom":"Monsac","type":"Maison-Forte","periode":"XV","histoire":"MONSAC, Claude Marin, seigneur de Monsac et de la Vigerie, amènera plusieurs fois son seigneur et ami, Henri de Navarre et comte de Périgord,  à venir chasser toute sorte de gibier en ces lieux. Mais les guerres de religions furent fatales à ce château : pris d'assaut, pillé et brûlé, il faudra de longues années aux familles qui prendront la relève pour redonner un aspect seigneurial au domaine.   Le dernier seigneur du lieu, le marquis Malet de Lagarde, futur pair du Royaume, quitte la France pendant la période révolutionnaire pour rejoindre le frère du Roi. La riposte des conventionnels est sans appel : démantèlement du château, pillage à nouveau, puis vente comme bien national.  Devenu le centre d'un vaste domaine agricole, il sera progressivement dépouillé de ses défenses et de ses ornements et tombera bien vite dans l'oubli.","architecture":"MONSAC, détruit lors de la guerre de cent ans, par Derby le chef des armées anglaises, il appartient un temps à Dunois, le Bâtard d'Orléans, compagnon d'armes de Jeanne D'Arc. La paix revenue en cette fin de XVe siècle, permit sa restauration et son embellissement : fenêtres sculptées à meneaux, porte décorée, gargouilles, cheminées monumentales et surtout création d'un escalier en colimaçon avec un axe torsadé. Le château est alors à l'apogée de sa renommée mais aussi de ses structures défensives : 7 tours reliées par un mur d'enceinte le protègent, un pont dormant à double arche franchit les douves. Toutefois sa position dans la vallée ne permet plus une défense efficace du fait des nouvelles armes qui remplacent de manière définitive la chevalerie d'antan.","habitants":"Claude Marin\r\n        \"","divers":"A Monsac grav 1-2","gps":"","images":["../image/image_24/24_Monsac_1.jpg","../image/image_24/24_Monsac_2.jpg"]},"Consult_chateau_formulaire26c3":{"id":"Consult_chateau_formulaire26c3","dept":"24","canton":"Saint-Cyprien","commune":"Mouzens","nom":"Monsec","type":"Château","periode":"XIV-XVI","histoire":"MONSEC, Au point de vue religieux, la paroisse dépendait de larchiprêtré dAudrix et de lévêché de Sarlat jusquà la suppression de ce dernier par la constitution civile du clergé pendant la période révolutionnaire. Cet évêché a été rétabli à la fin du XXe siècle et le titulaire en est lévêque de Périgueux. Localement sur le domaine seigneurial du château de Monsec se sont succédé les familles Laroque vers 1300, les Suquet de la Treilhe vers 1400. En 1560 le propriétaire est Montlouys. Une des filles, Marguerite de Foucaut, épouse François de Feletz. Une descendante de cette union, Anne de Feletz, devient seule héritière du château de Monsec et de ses dépendances en 1610. Elle épouse François de Clermont issu dune famille quercynoise et depuis cette date, le domaine est toujours resté par héritage et mariages dans la même famille. En 1793, un des fils du châtelain, Jean-Baptiste Touchebuf-Lafage deviendra le premier maire de Mouzens à lâge de 20 ans et le restera pendant 60 ans jusquà son décès en 1854. c'est dans le château de Monsec que Léon Poirier tourna en 1943 son film Jeannou, Maurice Utrillo peignit le château de Monsec en 1935, lors d'un séjour en Dordogne. La toile se trouve aujourd'hui au Japon dans une collection privée selon l'expert Paul Pétridès (1901-1993). Après une première inscription du château au titre des M.H. le 8 juin 1978 pour ses façades et toitures seules, le château, ses dépendances (chapelle, communs, etc.) et son parc sont inscrits en totalité le 1er mars 2005.","architecture":"MONSEC, La construction commence dans la première moitié du XIVe siècle, sur des bases plus anciennes, se compose d'un châtelet d'entrée datant de la première moitié du XVIIe siècle. Il est prolongé au nord-ouest par un logis Renaissance, accosté d'une tour du XIXe siècle au sud-est, et terminé au nord par un pavillon. Celui-ci présente une échauguette dans son angle nord-ouest. Du pavillon part vers l'est une aile dont les bâtiments remontent du XIVe au XVIe siècle. Deux tourelles ont été ajoutées au XIXe siècle, l'une au nord-ouest et l'autre au nord-est de cette aile. Celle-ci et le logis principal forment un angle ouvert en forme de V. De nombreux personnages sculptés animent les façades (démons, sorcières, acrobates).   De par sa position stratégique sur un éperon rocheux savançant sur la rivière, le château de Monsec a toujours été fortifié. Les bâtiments ont été remaniés, notamment aux XVe, XVIe et XIXe siècles. En face de Monsec, sélèvent les  ruines dun autre repaire surveillant la rivière en aval de Saint-Cyprien : Le Cazela, baptisé en langage populaire \"château Roux\", ce qui signifie château en ruine. Le château se compose de deux ailes perpendiculaires reliées par un pavillon, le tout remontant à la fin du XVe et au XVIe siècle. Le décor intérieur est remanié au XIXe siècle, dans l'esprit Second Empire. La demeure, les dépendances et la chapelle néo-gothique sont intégrées dans un parc bordé de terrasses.","habitants":"Familles Laroque\r\n        \"","divers":"A Mouzens;  Monsec grav 1 à 7 GPS : 44° 51' 2\" Nord, 1° 0' 58\" Est","gps":"44° 51' 2\" Nord, 1° 0' 58\" Est","images":["../image/image_24/24_Monsec_1.jpg","../image/image_24/24_Monsec_2.jpg","../image/image_24/24_Monsec_3.jpg","../image/image_24/24_Monsec_4.jpg","../image/image_24/24_Monsec_5.jpg","../image/image_24/24_Monsec_6.jpg","../image/image_24/24_Monsec_7.jpg"]},"Consult_chateau_formulaire173a":{"id":"Consult_chateau_formulaire173a","dept":"24","canton":"Velines","commune":"St-Michel de Montaigne","nom":"Montaigne","type":"Château","periode":"XVI-XIX","histoire":"MONTAIGNE, en 1477 achat du domaine par Raymond Eyquem, naissance de Michel Eyquem, son fils dont le château prendra le nom de seigneur de Montaigne (1533-1592) . Sur ces lieux, depuis le XIVe siècle, s'élève un château plusieurs fois remanié.  En 1592  mort de Montaigne. Une seule personne restante de Montaigne, sa fille Léonor  épouse de Charles de Gamaches hérita des biens et restera dans sa descendance jusqu'en 1811.  En 1860 c'est Pierre Magne, avocat puis Ministre des Finances sous Napoléon qui l'acquit, qui transforma la maison forte de Montaigne en un somptueux château du XIXe siècle,  Partiellement reconstruit suite à l'incendie qui le ravagea en 1885. Seule la tour, épargnée par les flammes, la fille de Pierre Magne, Marie Thirion Mautauban, la reconstruit un an plus tard. Le château actuel date donc de 1886. Aujourdhui la famille Mähler-Besse (6ème et 7ème générations après Pierre Magne) occupe les lieux et sera ravie de vous faire découvrir la vie de châtelain lors dune visite des pièces (meublées dépoque) que compose le rez-de-chaussée. (hall dentrée, salle à manger, grand salon, petit salon et bibliothèque). Dans ce château  a été tournée  le film de la série de Mongeville du 18-4-20 avec Francis Perrin.","architecture":"MONTAIGNE, ultime vestige miraculeusement épargné par les flammes qui détruisirent entièrement la demeure ancestrale des Eyquem de Montaigne en 1885, la tour de Michel de Montaigne se situe aux confins du Bordelais et du Périgord en plein coeur d'un parc majestueux aux tracés voulus par le philosophe humaniste. Une visite guidée de ce M.H. classé du XIVe siècle, qui se développe sur trois niveaux harmonieux, permet aux visiteurs en quête d'atmosphère, de s'imprégner de l'esprit du maître des lieux dans un décor qui n'a pas changé et où Montaigne rédigea les Essais. Château du XIXe siècle dinspiration Violet Leduc avec ses belles ardoises, un mélange de styles médiéval, renaissance et néogothique maitrisé avec soin. L'édifice de plan rectanguaire dans un parc fermé entouré de dépendances, de mur fermant la cour d'honneur avec tour sur angle qui lui servit de résidence ou il rédigea ses fameux essais. Le château dont  le corps de logis central est à deux niveaux sur soubassement, en façade hérissé de tourelles  à poivrières, de créneaux, de meurtrières et de mâchicoulis, toitures des pavillons extérieurs en croupes celui du centre idem mais en travers.","habitants":"Famille d'Eyquem de Montaigne\r\n        \r\n        \"","divers":"A St-Michel de Montaigne; Montaigne  grav 1 à 8  GPS : 44° 52' 41,4\" Nord, 0° 01' 48\" Est","gps":"44° 52' 41,4\" Nord, 0° 01' 48\" Est","images":["../image/image_24/24_Montaigne_1.jpg","../image/image_24/24_Montaigne_2.jpg","../image/image_24/24_Montaigne_3.jpg","../image/image_24/24_Montaigne_4.jpg","../image/image_24/24_Montaigne_5.jpg","../image/image_24/24_Montaigne_6.jpg","../image/image_24/24_Montaigne_7.jpg","../image/image_24/24_Montaigne_8.jpg"]},"Consult_chateau_formulaire3639":{"id":"Consult_chateau_formulaire3639","dept":"24","canton":"Saint-Astier","commune":"Montrem","nom":"Montanceix","type":"Forteresse","periode":"XV","histoire":"MONTANCEIX, au XVe siècle il semble que la construction fut reprise en grande partie pour recevoir les familles de Bourdeille, de Saint-Astier et d'autres. Le 17 juin 1652, la plaine offrit,en perspective cavalière, le spectacle d'un conflit meurtrier avec les escadrons du capitaine Baltazar et de ses frondistes. Avant la Révolution française de 1789, le marquis d'Abzac de La Douze était baron de Montancès (selon l'orthographe en vigueur alors).  Sous le second Empire, le château fut la propriété de M. de Bousquet, ingénieur et réalisateur du chemin de fer de Coutras à Périgueux.","architecture":"MONTANCEIX château de Montanceix, situé sur l'éperon rocheux au-dessus de ce bourg et qui était jadis le siège du pouvoir seigneurial pour la paroisse de Montrem, une telle masse rocheuse dominant la rivière et la route ne pouvait laisser quiconque indifférent. De ce point de vue oncontrôle la vallée de l'Isle sur des dizaines de lieux. Très tôt, un logis fut dressé; puis, deux fortes tours rondes et crénelées le fixèrent et une tour carrée d'escalier s'y adossait. Au nord-ouest de la terrasse, il fit raser une demeure qui ne lui donnait pas entière satisfaction, construite dans un style Renaissance, elle se voulait quelques ressemblances avec le deuxième château de Bourdeille, mais conçue peu auparavant par un précédent occupant.","habitants":"marquis d'Abzac de La Douze\r\n        \"","divers":"A Montrem; Montanceix grav 4","gps":"","images":["../image/image_24/24_Montanceix_1.jpg","../image/image_24/24_Montanceix_2.jpg","../image/image_24/24_Montanceix_3.jpg","../image/image_24/24_Montanceix_4.jpg"]},"Consult_chateau_formulaire2d52":{"id":"Consult_chateau_formulaire2d52","dept":"24","canton":"Bergerac","commune":"Lamonzie -Montastruc","nom":"Montastruc_24","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Lamonzie -Montastruc celui de Montastruc, celui de Bellegarde  et de Montbouche.                                                     MONSTASTRUC, du XIVe siècle, possession de la famille d'Abzac de la Douze. Détruit en 1438, lédifice fut reconstruit en 1471 moyennant la soumission à l'autorité royale de la veuve de Bertrand d'Abzac. Le château médiéval surplombe le rocher. En 1568, il fut assiégé par Blaise de Monluc. C'était au XIVe siècle une possession de la famille d'Abzac de la Douze. Les aménagements du XVIIIe siècle sont imbriqués dans le bâti du logis féodal. Les décors intérieurs datent du XVIIIe siècle. Pendant la seconde guerre mondiale, le château accueille quelque temps la grande-duchesse Charlotte de Luxembourg, à la suite de son exil face à l'avancée des troupes allemandes.\r\nBELLEGARDE,  propriétés des dAbzac, puis Vassal et Ferrant, par mariages et donations. En 1862, Bellegarde est acquis par Simard de Pitray, entre dans la famille Begouen en donation de Pitray à sa sur Caroline, épouse de Charles Begouen. Depuis cette date, Bellegarde est resté dans cette famille. Aujourdhui, Patrick et Sabine Brousse, descendants de Charles Begouen, suite au décès de leur oncle, reprennent laventure familiale avec leurs cinq enfants. Toujours dans la descendance par Jacques de Bégouen.                                                                         MONBOUCHER, à plus d'un kilomètre au nord-est du village, le château de Lescot (ou manoir de Lescot) date du XVIIe siècle.\r\nLe manoir de Monsac et le manoir de la Fourtonnie (ou la chartreuse de la Fourtonnie) ont été construits au XVIIIe siècle.","architecture":"MONTASTRUC; le socle abrite un important cluseau aménagé sur la base dune grotte naturelle, puis agrandi par le creusement dhabitats troglodytiques au Ve siècle. Au Nord et à l'Ouest de larges douves en eau protégeaient la forteresse accessible par un pont levis, remplacé plus tard par un pont de pierre. Est formé du logis médiéval en partie reconstruit au XVIIIe siècle et de diverses dépendances : des tourelles encadrent les fenêtres à meneaux, écuries, vestiges de la grange, pigeonnier et oratoire.  Après toutes les misères quil dut subir, démolitions, reconstructions, cest aujourdhui un lieu de rencontre paisible pour les mariages, séminaires, etc.\r\nBELLEGARDE, du XIVe siècle profondément transformé sur des plans de Léo Drouyn au début du XXe siècle avec un parc dessiné par Gabriel Perdoux, sur une hauteur, a été construit au XIVe siècle et restauré aux XIXe et XXe siècles. Il comporte une porte médiévale et un pavillon Renaissance. Il est inscrit au titre des M.H.depuis 2006. Le château primitif a un plan en U. Il n'en reste que quelques éléments en particulier des fenêtres géminées et une tour d'escalier.  Ses décors intérieurs datent du XXe siècle.","habitants":"famille d'Abzac de la Douze                                    Bellegarde  famille Begouen\r\n        \"","divers":"A Lamonzie -Montastruc grav 1 à 5. Bellegarde Grav 6.","gps":"","images":["../image/image_24/24_Montastruc_24_1.jpg","../image/image_24/24_Montastruc_24_2.jpg","../image/image_24/24_Montastruc_24_3.jpg","../image/image_24/24_Montastruc_24_4.jpg","../image/image_24/24_Montastruc_24_5.jpg","../image/image_24/24_Montastruc_24_6.jpg"]},"Consult_chateau_formulaire0a42":{"id":"Consult_chateau_formulaire0a42","dept":"24","canton":"Lalinde","commune":"Verdon","nom":"Montbrun_Verdon","type":"Château","periode":"XVIII","histoire":"MONTBRUN,  La demeure appartient à la famille de La Tour, avant de passer aux Lavalette-Montbrun. Aujourd'hui propriété de la comtesse de Loge d'Ausson","architecture":"MONTBRUN château du XVIIIe siècle à un seul étage, du modèle dit\"chartreuse\", assez fréquent en Périgord. Le corps de logis est encadré par deux pavillons dont l'un a été postérieurement exhaussé d'un étage. Le toit se relève en son milieu pour éviter la monotonie et ainsi rompre la ligne de l'ensemble. Une balustrade, sur laquelle reposent deux sphynges accroupies, précède le tout. Ici, tout n'est que charme et harmonie; le mitan, légèrement en saillie, accueille la porte d'accès principal et offre à la demeure ce bel équilibre. La chapelle privative, jouxtant le pavillon de droite, paraît avoir été édifiée vers 1830.","habitants":"Famille de La Tour\r\n        \"","divers":"A Verdon Grav 1 à 4","gps":"","images":["../image/image_24/24_Montbrun_Verdon_1.jpg","../image/image_24/24_Montbrun_Verdon_2.jpg","../image/image_24/24_Montbrun_Verdon_3.jpg","../image/image_24/24_Montbrun_Verdon_4.jpg"]},"Consult_chateau_formulaire0ef8":{"id":"Consult_chateau_formulaire0ef8","dept":"24","canton":"Nontron","commune":"Saint-Martial de Valette","nom":"Montcheuil","type":"Château","periode":"XV-XVI","histoire":"MONTCHEUIL  à deux km au sud de Nontron voir possibilité ancien fief des  Roux, des Lavergne, des Audier, des Pastoureau, des Aydie, des Sainte-Aulaire, des Moreau de Villejalet et des Montcheuil. Selon le baron de Verneilh, c'est à Martial Audier, conseiller au parlement de Bordeaux, issu d'une famille limousine, que pourrait être attribuée la construction d'un premier château, entre 1495 et 1515.","architecture":"MONTCHEUIL, château démantelé vers 1830. Il  n'en subsistait plus qu'une partie de l'ancien corps de logis et la tour circulaire à mâchicoulis du sud ouest, lorsque la construction d'un nouveau château fut décidée sur les anciens fondements. La demeure actuelle, plantée au milieu d'un parc, présente un logis qui s'appuie, entre tours et pavillons, sur un autre logis en équerre, épaulé par une grosse tour. Girouettes, poivrières, lucarnes, mâchicoulis, meneaux, et balustres animent l'ensemble. La restauration à la fin du XIXe siècle, à laquelle ont pris part Léo Drouyn et les frères de Verneilh, semble avoir été un peu trop radicale. A côté de la demeure, subsistent quelques fragments de logis du  XVe siècle et un curieux manège du XVIIe siècle.","habitants":"Famille de Martial Audier\r\n        \"","divers":"A Saint-Martial de Valett, Montcheuil","gps":"","images":["../image/image_24/24_Montcheuil_1.jpg","../image/image_24/24_Montcheuil_2.jpg"]},"Consult_chateau_formulaire1be1-2":{"id":"Consult_chateau_formulaire1be1-2","dept":"24","canton":"Beaumont","commune":"Montferrand en Pérrigord","nom":"Montferrand_24","type":"Forteresse","periode":"XV-XVI","histoire":"MONTFERRAND, la famille des seigneurs de Montferrand se divise en deux branches. La branche aînée naît en 1163 du mariage de Berthe, dame de Montferrand et fille du constructeur du château, avec Vital de Gontaut. Daprès une généalogie retranscrite par le père Anselme, la maison de Gontaut tenait un rang considérable dans la province de Gascogne dès lan 1100. En 1922, le château revient dans la famille des descendants de David de Faubourn et de Montferrand. Le monument fait lobjet dune inscription au titre des M.H. depuis le 13 janvier 1948.    REGAGNAC, sur le territoire de la commune deux autres monuments sont associés à la famille de Biron ancien manoir construit au XIIIe siècle par la famille de Regagnac, au XIIIe siècle un Pierre de Regagnac était capitaine à la bastide de Monpazier, le château passe au XVIe siècle aux Biron qui firent reconstruit  comme résidence de chasse. Il passa ensuite successivement aux Vitrac, et au XVIIIe siècle aux Vacquier de Regagnac, au décés  d'Antoine  de Vacquier en 1860 le château passe à sa fille Louise qui épouse  Paul de Fontenilles. Vendu aux  Davoust d'Auerstaedt maréchal d'Empire en 1881 et aux Boysson en 1926. Aujourd'hui à la famille Pardoux qui l'on transformé en chambres d'hôtes.","architecture":"MONTFERRAND, le 29 novembre 2013, la protection est étendue aux autres bâtiments, aux vestiges, aux sols et à lenceinte du castrum, fenêtres à meneaux, le château du XIe siècle qui domine le village. Ses parties les plus anciennes (donjon et remparts) sont du XIIe siècle tandis que la chapelle et les communs sont des XVIe et XVIIe siècles.  La tour, qui semble en avoir compté huit, est lune des plus anciennes du Périgord. Le mur ouest est orné dun contrefort médian qui permet de dater la tour du milieu du XIIe siècle. On observe quelle est dépourvue de dispositifs de défense active : une fois enfermés, protégés par les épaisses murailles, les assiégés attendent passivement. Une deuxième tour plus spacieuse, dans le prolongement de la tour féodale, mais séparée delle par un vide de quelques pieds, sert de logis seigneurial. A une époque tardive, on fait un bâtiment unique des deux tours, à lorigine séparées. Du côté ouest du logis, les latrines surplombent le vide, la reconstruction du château de Régagnac par la famille de Biron. Le premier était initialement un manoir construit au XIIIe siècle par la famille de Regagnac Le corps de logis situé au nord de l'ensemble datent du XVIe siècle, et lune des plus curieuses forteresses du Périgord, avec ses imposants remparts partiellement détruits au fil de lhistoire ; de ceux-ci, subsistent aujourdhui les fondations, ainsi que la tour des Estuquètes. Le donjon central profile également sa haute silhouette.","habitants":"Famille de Monferrand\r\n        \"","divers":"A Montferrand en Pérrigord grav 1 à 7. Régagna grav 8","gps":"","images":["../image/image_24/24_Montferrand_24_1.jpg","../image/image_24/24_Montferrand_24_2.jpg","../image/image_24/24_Montferrand_24_3.jpg","../image/image_24/24_Montferrand_24_4.jpg","../image/image_24/24_Montferrand_24_5.jpg","../image/image_24/24_Montferrand_24_6.jpg","../image/image_24/24_Montferrand_24_7.jpg","../image/image_24/24_Montferrand_24_8.jpg"]},"Consult_chateau_formulaire92a0-2":{"id":"Consult_chateau_formulaire92a0-2","dept":"24","canton":"Saint-Pierre de Chignac","commune":"Saint-Geyrac","nom":"Montferrier_24","type":"Château","periode":"XVII","histoire":"MONTFERRIER, est l'ancienne demeure de Jacques Delpy seigneur de Saint Geyrat conseiller du Roy et receveur des tailles en lélection de Perigueux, des Lacombe et des dHennezel.","architecture":"MONTFERRIER, édifié sur une terrasse dominant le vallon, le château présente un beau logis aux hautes toitures, construit au XVIIe siècle, accosté de communs et d'un pavillon Louis XIII. On accède à cet ancien manoir par une belle allée d'arbres. Extrait d'un aveu du 15 novembre 1700  tient et possède ledit sieur dénombrant ladite terre et seigneurie de Saint-Geyrat avec tout droit de justice haute moyenne et basse, dans laquelle la seigneurie  a un château nouvellement bâtit appellé de Montferrier, avec pavillons, édiffices, cour, offices et autres dépendances de lui, domaines nobles, fiefs cours entier et autres droits et devoirs seigneuriaux en quoi qu'ils puissent concister, ensemble lui appartient tous les droits honorifiques dans l'église du dit Saint Geyrat.","habitants":"Famille de  Jacques Delpy \r\n        \"","divers":"Saint-Geyrac; Montferrier grav 1-2-3.","gps":"","images":["../image/image_24/24_Montferrier_24_1.jpg","../image/image_24/24_Montferrier_24_2.jpg","../image/image_24/24_Montferrier_24_3.jpg"]},"Consult_chateau_formulaire7b3b":{"id":"Consult_chateau_formulaire7b3b","dept":"24","canton":"Sarlat la Canéda","commune":"Vitrac","nom":"Montfort_Vitrac","type":"Forteresse","periode":"XII-XIV","histoire":"MONTFORT, en 1251 Les biens d'Hélis de Turenne et d'Hélie de Rudel passent à leur fille unique, Marguerite de Rudelle, fille de Raymond IV, mariée à Hélie de Rudel, seigneur de Bergerac, dans la famille de Rudel. Celle-ci s'est mariée avec Renaud III, sire de Pons. Leurs biens ont été partagés entre leurs trois enfants. Geoffroy V de Pons, fils de Renaud III de Pons et de Marguerite de Rudel, dite de Turenne, dame de Bergerac, est marié à Isabelle de Carlat. Jacques Ier de Pons (1413-1473), fils de Renaud VI de Pons et de Marguerite de La Trémoille, fille de Guy VI de La Trémoille, sire de Pons, vicomte de Turenne, seigneur de Ribérac, Montfort et Carlux qui sont attribués à Pierre de Brézé. Jacques de Pons s'est alors réfugié en Espagne. En 1461, les accusations sont reconnues comme fausses et le roi Louis XI lui accorde des lettres de rémission. Il est mort en 1472  sans avoir récupéré tous ses fiefs. En 1486, Guy de Pons (1431-1510), fils de Jacques Ier de Pons, seigneur de Ribérac,  En 1607, Henri IV ordonne une nouvelle fois de raser le château, mais il accorde son pardon au propriétaire Henri de La Tour, duc de Bouillon. En 1664, le château est vendu à Gaston-Jean-Baptiste, duc de Roquelaure. En 1919 Jean Galmot, écrivain fait l'acquisition du château. En 1921, c'est Jean Mercier qui rachète Montfort. Dans les années 1980, le château a été aussi la propriété de Ghaith Pharaon, homme d'affaires saoudien. Celui-ci décède en janvier 2017, et le château devrait revenir à son fils Laith propriété aujourd'hui de M. L.-E Dury-Persson.","architecture":"MONTFORT, le village est composé de trois sites distincts : le vieux bourg, le hameau du château de Montfort et Leport. En hauteur, vers le nord, le centre historique de Vitrac se développe autour dune vieille église datant du XIIe siècle et du château. Véritable citadelle dominant la vallée, le site fait l'objet de convoitises dès la guerre de cent ans. Le château est ainsi rasé une première fois en 1214. Reconstruit, il sera de nouveau assiégé et détruit à trois autres reprises, la dernière fois sous Henri IV, au début du XVIIe siècle. Mais comme pour défier les hommes et les rois, il est à nouveau rebâti. il a eu un destin tumultueux, tantôt assiégé, détruit, rasé et reconstruit et ce durant 8 siècles. Six fois détruit et six fois reconstruit, les ajouts successifs et les différents styles lui donnent une allure de château de conte de fées.  L'histoire du château n'est faite que d'une succession de luttes pour obtenir sa possession. Possédé en 1214 par Simon de Montfort, partiellement reconstruit au début du  XVe siècle, le château est pillé par les anglais du Roc de Tayac en 1409, puis en grande partie démoli sur ordre de Louis XI en 1481. Seul le donjon a été conservé. Reconstruit, il devient un des hauts lieux du protestantisme, les Turenne étant partisans des huguenots. Le château de Montfort subit  plusieurs transformations au XVIIe siècle puis au XIXe siècle. Aujourdhui,le château présente, côté rivière, une façade accolée dun donjon massif à mâchicoulis et, côté bourg, une juxtaposition de logis et une tour polygonale.","habitants":"Famille de Rudel\r\n        \"","divers":"A Vitrac; Montfort  grav 1 à 9 GPS : 44° 50' 15\" Nord et 1° 14' 57\" Est","gps":"44° 50' 15\" Nord et 1° 14' 57\" Est","images":["../image/image_24/24_Montfort_Vitrac_1.jpg","../image/image_24/24_Montfort_Vitrac_2.jpg","../image/image_24/24_Montfort_Vitrac_3.jpg","../image/image_24/24_Montfort_Vitrac_4.jpg","../image/image_24/24_Montfort_Vitrac_5.jpg","../image/image_24/24_Montfort_Vitrac_6.jpg","../image/image_24/24_Montfort_Vitrac_7.jpg","../image/image_24/24_Montfort_Vitrac_8.jpg","../image/image_24/24_Montfort_Vitrac_9.jpg"]},"Consult_chateau_formulairea8d8":{"id":"Consult_chateau_formulairea8d8","dept":"24","canton":"Montignac","commune":"Montignac","nom":"Montignac","type":"Château","periode":"XIV-XV","histoire":"Quatre châteaux à Montignac dont celui de Montignac, de Coulonges, de Planchat et Puyrobert-Lascaux.        MONTIGNAC, la ville senrichit ensuite dune forteresse. Vestige du château  qui, à appartenu à Louis d'Orléans frères de Charles VI à vendu la ville à Jean de Blois, puis par  mariage, en vente et en héritage, elle passe dans le giron de la  famille dAlbret, jusquen 1603, date à laquelle le roi de France Henri IV la cède à  François d'Hautefort, seigneur de Thenon. \r\nCOULONGES, campé dans le fond dun vallon, le château de Coulonges surgit entre les arbres, avec ses tours rondes, ses mâchicoulis et ses murs en pierre blonde du Périgord. Un pont-levis donne accès à la cour intérieure du castel, qui allie la robustesse de larsenal militaire médiéval au faste de la demeure des grands seigneurs pendant la Renaissance. Une randonnée, la « boucle des étangs de Coulonge », permet de côtoyer le château tout en cheminant dans une nature typiquement périgourdine, entre prairies et taillis de châtaigniers. Coulonges du XIVe et XVIe siècles, inscrit aux M.H. depuis 1948           PLANCHAT, le château de Planchat, situé au sud-est du bourg, est l'ancienne demeure des Bouchier de La Vigerie, des Chaumel et des d'Anglars.       PUYROBERT-LASCAUX, gites de france bâti au XIXe siècle par la famille dAlbret dans le style Napoléon III.","architecture":"MONTIGNAC, du début du Moyen-Age, et jusquau Xe siècle, Montignac devient une place forte en passant par mariage aux mains du comté du Périgord.  Plusieurs fois démantelé pendant les guerres le château est détruit en 1825, il ne reste  qu'une tour et l'infrastructure. Cest une ville de gué. Le pont actuel est construit entre 1766 et 1767, ancien fief des comtes de Périgord. Mais les derniers comtes Archambaud V et VI voient leurs biens confisqués parce quils soutiennent les anglais pendant la guerre de cent ans. Entre le milieu du XIVe et XVe siècle la châtellenie de Montignac reste une terre dépendante de la couronne de France, isolée dans les fiefs anglais dAquitaine, doù la profilération de maisons fortes et de châteaux.                                                            PLANCHAT, demeure typiquement périgourdin, avec des logis remontant au XVe siècle scandés de tours carrées ou circulaires à machicoulis. Elle est également appelée Pechal-Mourgue.","habitants":"Famille dAlbret                                                               Famille dAlbret\r\n        \"","divers":"A Montignac grav 1-2-3. Coulonges grav 4-5. Planchat grav 9  Puyrobert grav 6-7-8","gps":"","images":["../image/image_24/24_Montignac_1.jpg","../image/image_24/24_Montignac_2.jpg","../image/image_24/24_Montignac_3.jpg","../image/image_24/24_Montignac_4.jpg","../image/image_24/24_Montignac_5.jpg","../image/image_24/24_Montignac_6.jpg","../image/image_24/24_Montignac_7.jpg","../image/image_24/24_Montignac_8.jpg","../image/image_24/24_Montignac_9.jpg"]},"Consult_chateau_formulairedf70":{"id":"Consult_chateau_formulairedf70","dept":"24","canton":"Villambard","commune":"Issac","nom":"Montréal_Issac","type":"Château","periode":"XII-XVII","histoire":"MONTREAL, le château, édifié dans la proche région de Mussidan, surplombe la vallée de la Crempse. Il a été construit au XIIe siècle et modernisé au XVIe siècle. Il constitue une demeure privée, de la famille de Faubournet de Montferrand. Claude de Pontbriand, seigneur de Montréal, était le 3 octobre 1535 au côté de Jacques Cartier sur les rives du Saint-Laurent lorsque le navigateur atteignit une bourgade indienne appelée Hochelaga qui allait devenir la ville canadienne de Montréal. Les Pontbriand ont édifié le château  de Montréal passe dans les mains de René de Peyronenc qui obtient de Louis XI la permission de reconstruire le château en 1470, une demoiselle de Peyronenc épouse un seigneur de Pontbriand, Montréal se retrouve donc dans le patrimoine d'une famille bretonne, ce projet sera mené à bien par Pierre de Pontbriand gendre de Michel de Peyronenc puis  par son fils François sénéchal du Limousin. En 1611 l'héritière de Montréal Françoise de Pontbriand épouse Gaston de Foucauld, ces derniers garderont le château peu de temps sera vendu à M. du Chesne juge du Périgord et maire de Périgeux, au XVIIIe siècle madame du Chesne née Hautefort restée sans descendance, lègue le château à son cousin germain, le comte  Faubournret de Montferrand ancêtre des propriétaires actuels émigre à la Révolution les biens sont confisqué, restée en France sa femme Pauline de Souillac parvient à racheter les terres du domaine et en 1840 leur fils reprend possession de la demeure familiale aujourd'hui Henry de Montferrand et de son frère  Bernard abassadeur de France sont propriétaires.","architecture":"MONTREAL, lors des guerres de religion, l'édifice fut à nouveau fortifié : les murailles et quatre ponts-levis furent refaits, une garnison et de l'artillerie y furent installées. L'allure de la façade nord et ses fenêtres encadrées de colonnes est due aux conseils de François de Pontbriant qui fut surintendant des bâtiments du roi. La chapelle date de 1539, elle fut bâtie pour abriter la relique de la Sainte-Épine, recueillie sur la dépouille mortelle du général Talbot au soir de la bataille de Castillon qui en 1453 marque la fin de la guerre de cent ans et à la domination anglaise sur le duché d' Aquitaine, elle fut rapporté au château de Montréal par Michel de Peyronenc qui avait participé à la bataille. Le château de plan rectangulaire, est flanqué au nord-ouest d'une tour d'angle et, au nord-est d'une partie plus basse se prolongeant par les bâtiments de service. Sous ces bâtiments se situe l'entrée, par un escalier voûté, d'une vaste salle rectangulaire souterraine qui se prolonge par une seconde salle et une galerie.","habitants":"Famille de Claude de Pontbriand\r\n        \"","divers":"A Issac ; Montréal grav 1 à 8","gps":"","images":["../image/image_24/24_Montr%c3%a9al_Issac_1.jpg","../image/image_24/24_Montr%c3%a9al_Issac_2.jpg","../image/image_24/24_Montr%c3%a9al_Issac_3.jpg","../image/image_24/24_Montr%c3%a9al_Issac_4.jpg","../image/image_24/24_Montr%c3%a9al_Issac_5.jpg","../image/image_24/24_Montr%c3%a9al_Issac_6.jpg","../image/image_24/24_Montr%c3%a9al_Issac_7.jpg","../image/image_24/24_Montr%c3%a9al_Issac_8.jpg"]},"Consult_chateau_formulaire510b":{"id":"Consult_chateau_formulaire510b","dept":"24","canton":"Villefranche de Lonchat","commune":"Montpeyroux","nom":"Montécoulon","type":"Château","periode":"XVI-XVIII","histoire":"à deux KM au nord à Villefranche de Lonchat.  Château des Durands, au lieu-dit le Bos Vieux, et à quelques kilomètres au nord-Est les vestiges de Gurson (voir article)bastide Villefranche de Lonchat est une bastide fondée aux environs de 1280 par Edouard 1er dAngleterre. Château de Mondésir Martine et Laurent Lutz vous proposent de venir profiter du charme d'une demeure historique pour vos évènements privés et professionnels. Les chambres d'hôtes du château de Mondésir vous accueillent dans une belle demeure en pierres blondes du XVIIIe siècle.                                                                              De Puygrenier chambres d'hôtes. Château des Fournels (château ruiné).\r\nMONTECOULON,  au XVIe siècle le domaine a appartenu à Bertrand-Charles de Montaigne, frère de Michel de Montaigne.  \r\nMONTPEYROUX: petit village niché au sommet d'une colline,ce charmant bourg \"Monte Perroso\".    MONDESIR, sa construction date du XVIIIe siècle. Détruit au XVIe siècle, il ne restait que des ruines de cet ancien château fort. Redevenu une belle demeure de charme, il est un havre de calme et d'harmonie. Le Château de Mondésir, avec ses tours du XIIIe et du XVIIe siècle, son vignoble et son parc arboré de palmiers et de tilleuls centenaires, vous accueille au gré des saisons. Vous y trouverez des 2 chambres d'hôtes et 3 suites familiales de standing.","architecture":"MONTECOULON, du  XVIe, XVIIIe et XIXe siècles, l'édifice présente un plan en U, cantonné de quatre tours d'angle. Le corps de logis et les ailes présentent, au rez-de-chaussée, des baies en arc segmentaire alternant avec des baies en plein cintre, surmontées chacune d'un oeil de boeuf. La distribution a conservé la disposition du XVIIIe siècle. Des aménagements et des décors ont été réalisés au XIXe siècle, située au nord-Est du parc. Le château, entouré de jardins, cours, terrasses et communs, sont implantés depuis le XVIIIe siècle dans une composition en prise avec le paysage. Le parc mentionné sur un plan du XVIIIe siècle a été remanié au XIXe. Doté de fabriques dont la signification reste énigmatique, ce parc est un exemple unique en Dordogne.  \r\nEléments protégés MH : Les façades et les toitures, le parc, les fabriques, le mur de clôture  avec ses entrées et l'ancienne faïencerie, les intérieurs du château, les dépendances entourant la cour nord ainsi que le sol, les murs et terrasse.\r\nMONDESIR,  belle demeure en pierres blondes du XVIIIe siècle a été construit au XVIIe siècle à l'emplacement d'un château fort médiéval dont subsistent quatre tours et qui constituait un avant poste de vigie pour la bastide anglaise de Villefranche de Lonchat, fondée par Edouard 1er d'Angleterre vers 1285. Ancienne demeure des familles Saint Jean, Villars et Duvigneau.","habitants":"Famille de Montaigne\r\n        \"","divers":"A Montpeyroux, Montécoulon grav 1 à 3 GPS : 44° 55' 6,53\" Nord, 0° 03' 18,2\" Est. Mondésir  grav de 4 à 6. Montpeyroux grav 7. Villefrance grav 8-9.","gps":"44° 55' 6,53\" Nord, 0° 03' 18,2\" Est. Mondésir  grav de 4 à","images":["../image/image_24/24_Mont%c3%a9coulon_1.jpg","../image/image_24/24_Mont%c3%a9coulon_2.jpg","../image/image_24/24_Mont%c3%a9coulon_3.jpg","../image/image_24/24_Mont%c3%a9coulon_4.jpg","../image/image_24/24_Mont%c3%a9coulon_5.jpg","../image/image_24/24_Mont%c3%a9coulon_6.jpg","../image/image_24/24_Mont%c3%a9coulon_7.jpg","../image/image_24/24_Mont%c3%a9coulon_8.jpg","../image/image_24/24_Mont%c3%a9coulon_9.jpg"]},"Consult_chateau_formulaireb872":{"id":"Consult_chateau_formulaireb872","dept":"24","canton":"Montagrier","commune":"Saint-Just","nom":"Narbonne_24","type":"Château-fort","periode":"XVI-XVII","histoire":"NARBONNE, la construction du château de Narbonne date du XVIe et XVIIe siècle. Le château est construit en 1601 pour Ponce Raymond et Thoinette de Conan. Il a depuis été la propriété des familles Lacroze et Duclaud.","architecture":"NARBONNE, son donjon qui date du XVIe siècle est inscrit aux M.H. Une maison basse a été construite au XVIIe siècle. La toiture à la Mansard posée sur un bandeau de pierre et l'encadrement des lucarnes est à pilastres plats cannelés. Un bâtiment du XVIe siècle donne une entrée au donjon par une galerie soutenue par des piliers ronds en pierre qui s'amenuisent. Le donjon présente des encadrements de fenêtres sculptées à motifs Renaissance. Entre les corbeaux, les coquilles sculptées sont terminés par des têtes de lions. Proche, se trouve un vieux pigeonnier carré dont la toiture est en lauze. Le château de Narbonne est inscrit aux M.H. depuis le 12/10/1948.","habitants":"Famille de Ponce Raymond \r\n        \"","divers":"A Saint-Just;  Narbonne Grav 1-2  GPS : 45° 20' 06,6\" Nord, 0° 29' 35,9\" Est","gps":"45° 20' 06,6\" Nord, 0° 29' 35,9\" Est","images":["../image/image_24/24_Narbonne_24_1.jpg","../image/image_24/24_Narbonne_24_2.jpg"]},"Consult_chateau_formulaired467-2":{"id":"Consult_chateau_formulaired467-2","dept":"24","canton":"Neuvic","commune":"Neuvic sur l","nom":"Neuvic","type":"Château","periode":"XVI","histoire":"NEUVIC,  château de Neuvic (également dit de Mellet), actuellement institut médico-éducatif.  Fief des Talleyrand-Périgord jusqu'au XVIe siècle. Annet de Fayolle, fait construire le château de Neuvic (transition médiéval - Renaissance), n'ayant pas d'enfants, il choisit l'un de ses neveux, Jehan de Mellet, pour devenir l'héritier. Les de Fayolle de Mellet et leurs descendants sont maîtres des lieux jusqu'en 1925, date à laquelle le site est revendu. Après la Révolution échoit à un cadet Louis-Charles de Mellet officier le dernier du nom transmet Neuvic à sa fille la comtesse de Gourcy qui le lègue à sa nièce Augustine de Gourcy devenue en 1880 comtesse  Henri Hay de Nétumières. En 1924 un capitaine américain Philip Hemenway Chadbum qui eu l'occasion de séjourner à Neuvic en fait l'acquisition et  le revend  à la famille de Challe lui le lègue en 1950 à une communauté religieuse qui y installe un institut médico-pédagogique","architecture":"NEUVIC cité au XIIIe siècle construit en 1520 ailes du XVIe siècle, chapelle du XVIIe siècle et avant-corps du XVIIIe siècle, classé M.H., actuellement institut médico-éducatif. Il est situé quelques centaines de mètres en aval de l'emplacement de la première forteresse de Neuvic, qui fut démolie pour construire ce nouveau château. Edifié au XVIe siècle, le long des berges de lIsle, l'édifice consiste dans deux corps de logis élevés sur trois niveaux principaux éclairés par des fenêtres à meneaux, cantonné de tourelles en encorbellement, qui s'articulent en équerre. A la jonction des deux ailes s'élève un massif pavillon carré qui loge l'escalier. Au sommet des murs court un chemin de ronde continu, de hautes fenêtres surmontées de lucarnes dont certains pignons sont ornés de crochets. Pont-Levis et douves  démantelées à la Révolution. Le château garde de la Renaissance des salles voûtées, des peintures murales et un rarissime évier en pierre. Le grand salon Louis XV, la chapelle et la grotte romantique sont aménagés au XVIIIe siècle.","habitants":"Famille d'Annet de Fayolle                                   \r\n        \"","divers":"A Neuvic sur l'isle grav 1 à 3","gps":"","images":["../image/image_24/24_Neuvic_1.jpg","../image/image_24/24_Neuvic_2.jpg","../image/image_24/24_Neuvic_3.jpg"]},"Consult_chateau_formulairef49f":{"id":"Consult_chateau_formulairef49f","dept":"24","canton":"Neuvic","commune":"Neuvic sur l","nom":"Neuvic_Fratteau","type":"Maison forte","periode":"XIII","histoire":"Neuvic (voir article précédant)\r\nFRATTEAU, entre le XIIe et le XIIIe siècle la famille Frastel Hélie de Fratteau chevalier  fit construire un château que l'on peut qualifier être le premier fief de la paroisse de Neuvic. Durant la guerre de cent ans, le château fut  confisqué par le seigneur de Grignols de qui relevait le fief, aux Itier de Grignols, aux Grandmont, aux Barrère, aux la Chapoulie et  en 1432 à la suite d'un mariage le château passe dans la maison de Grimoard. Il y restera trois siècles, transmis de père en fils. Vers 1600, François de Grimoard, seigneur de Fratteau, épouse Lucrèce de Fayolle de Mellet, fille de François de Fayolle de Mellet, seigneur de Neuvic. Ils auront un fils, Jean IV Grimoard qui par son mariage avec Charlotte de Villoutreix aura trois filles.  Le domaine des Grimoard sera démantelé à la mort de Jean IV, les filles se partageront les biens, en 1683 Gabrielle, mariée à Louis-Mathieu de Saint-Chamand aura une fille, Lucrèce qui épouse Jean Bertin en 1705, et apporte le domaine à la famille Bertin, riches bourgeois de Périgueux, Jean Bertin aura seize enfants. A sa mort en 1754, ses enfants font poser les scellés sur le château, passera à la famille de Fayolle de Mellet, seigneur de Neuvic. A la veille de la Révolution, Louis Raphaël Lucrèce de Fayolle de Mellet essaiera de mettre ses biens à l'abri avant d'émigrer, mais Frateau fut mis sous séquestre puis vendu comme bien national le 16 germinal an II. Le château devient la propriété de Daniel Piron.","architecture":"FRATTEAU, c'est à partir de cette époque que va s'engager un processus de lente destruction pour la demeure. Le château devient la propriété de Daniel Piron qui décida de tout mettre en uvre pour sauver ce qui restait de l'édifice, chantier qui dura plus de dix ans, il mit à jour, dans la partie ouest du château, les restes d'un four de potier. Etant lui-même potier, il installa dans une grange voisine du château un musée de la poterie. Un souterrain, morceau de belle facture, est un refuge unique en Périgord, il remonte par un tracé sinueux dans la salle principale du logis. Le nouveau propriétaire convertit une partie du château en carrière de pierres. C'est ainsi que la chapelle, un étage et d'autres structures furent démolies. Au XIXe siècle, ce qui reste du château fut divisé pour la vente en trois fermes mitoyennes.","habitants":"fief des Bertin\r\n        \"","divers":"A Neuvic sur l'isle;  Fratteau grav 1-2  GPS : 45° 6' 12\" Nord et 0° 28' 31\" Est","gps":"45° 6' 12\" Nord et 0° 28' 31\" Est","images":["../image/image_24/24_Neuvic_Fratteau_1.jpg","../image/image_24/24_Neuvic_Fratteau_2.jpg"]},"Consult_chateau_formulaire0b9c-2":{"id":"Consult_chateau_formulaire0b9c-2","dept":"24","canton":"Nontron","commune":"Nontron","nom":"Nontron","type":"Château","periode":"XVIII-XIX","histoire":"Château de Nontron du XVIIIe et XIXe siècles, inscrit au titre des M.H. en 1984, château de la Francherie du XVIIe siècle, château de la Mothe  du XVe siècle beaucoup remanié par la suite.  Pas d'information historique pour ses deux derniers, et à cinq kilomètres au nord à Saint-Martin le Pin château des Cazes pas d'information historique.\r\nNONTRON, en 1418, appartient à lza famille de Châtillon de Blois Françoise de Blois héritière de son père Guillaume en 1454 apporte fe fief à son époux Alain d'Albret vendu par Henri IV qui en a hérité, en 1600  Charles Elie de Colonges achète la baronnie de Nontron, en 1610 à sa mort sa mère Charlotte de Fumel récupère le château elle épouse en seconde noce  Jean Hélie de Pompadour le transmetra à leurs fils pour arrivé  aux Dangeau de Courcillon et en 1751 vendu à Jean-Charles de Lavie qui le fit construire sur l'emplacement de l'ancienne forteresse, président du Parlement de Bordeaux,  son fils Paul-Marie Arnaud  cède en 1787 la propriété à Louis Gabriel de la Ramière  qui le revend à  Jean-Baptiste-Michel de Mazera avocat, son descendant Louis-François député maire donnera au château  son aspect actuel après un terrible incendie. Par succession, le château passera  aux Sclaffer de Lagorsse, puis aux Laparre de  Saint-Sernin   qui le cède  en 1970 aux  Monneron. Au début de 1980, la famille revend à la ville le château de Nontron ainsi que la collection de poupées acquise par Mme Marie-Camille de Monneron. La municipalité décide alors dinstaller, au château, un musée, consacré à lhistoire des poupées, qui a été depuis remplacé, par le Pôle des Métiers dArts.","architecture":"Les CAZES, le château se présente sous la forme dun logis rectangulaire à étage, couvert de tuiles plates. À lobservation, on constate quil juxtapose deux parties soudées dépoques différentes. La partie ouest date du XVe siècle ; cest une construction carrée aux épais murs de pierre, avec peu de fenêtres. Côté Est, la partie est plus modeste et se compose dun logis carré et dune tour dangle circulaire construite en 1869 sur lemplacement dun bâtiment démoli. Des bâtiments de communs sallongent parallèlement à la façade sud et délimitent une cour rectangulaire fermée de part et dautre. Lensemble comprend dautres servitudes, une maison dhabitation restaurée et un grand pigeonnier.                                                                      NONTRON, la construction du château de Nontron date des XVIIIe et XIXe siècles il est inscrit au titre des M.H. en 1984, domine la ville de Notron. Défendue de tous côtés par des pentes abruptes. Caractéristique du XVIIIe siècle du château actuel bâti sur les caves voutées de la forteresse et une sombre demeure dont les deux façades  principales s'ordonnent autour d'un avant corps à trois travées amorti par froton triangulaire, la façade principale appareillée en pierre et marquée aux angles par des chaines à refend est précédée par un grand eascalier son architecture empreinte de classicisme est surmontée dune toiture plate. Au siècle suivant, suite à un incendie, on lui ajoute une toiture mansardée à lucarnes et intercalés d'oeils de boeuf.","habitants":"Famille de  Jean Hélie de Pompadour \r\n        \"","divers":"Nontron  grav 1 à 5 GPS : 45° 31' 39,5\" Nord et 0° 39\" 40,3' Est. Cazes grav 6-7","gps":"45° 31' 39,5\" Nord et 0° 39\" 40,3' Est. Cazes grav 6-7","images":["../image/image_24/24_Nontron_1.jpg","../image/image_24/24_Nontron_2.jpg","../image/image_24/24_Nontron_3.jpg","../image/image_24/24_Nontron_4.jpg","../image/image_24/24_Nontron_5.jpg","../image/image_24/24_Nontron_6.jpg","../image/image_24/24_Nontron_7.jpg"]},"Consult_chateau_formulaire0bc8":{"id":"Consult_chateau_formulaire0bc8","dept":"24","canton":"Saint-Pierre de Chignac","commune":"Notre-dame de Sanilhac","nom":"Notre_Dame_Sanilhac","type":"Château","periode":"XIX","histoire":"Dans la commune le château de  la Gauderie chambres d'hôtes, de Lafaye, Pouzelane, de Prompsault et la chartreuse de Sanilhac dit le manoir chambres d'hôtes de Julie et Jean François.             POUZELANDE, des traces des époques paléolithique et néolithique ont été relevées à la Bétussie, à Phébus et aux Bitarelles, mais lhistoire de Notre-Dame de Sanilhac commence réellement à lépoque gallo-romaine. Les riches Romains qui vivaient à Vesuna possédaient également des propriétés à la campagne et des éléments  dune villa romaine furent trouvés aux Cébrades. Le château de Pouzelande fut précédé d'un manoir. Il fut bâti à la demande de Pierre Alyre Eymeric de Meredieu, la famille de ce dernier reçut ses lettres de noblesse en 1699, le château de Pouzelande est cité dans le dénombrement du 12 novembre 1667 comme appartenant déjà aux Meredieu. Rebâti sans style ausiècle dernier, il domine l'antique relais de la diligence où s'arrêta un jour Charles Nodier qui y localisa l'un de ses contes: La Combe de l'homme mort.  Aujourd'hui chambre d'hôte.                  GAUDERIE, chambre d'hote","architecture":"GAUDERIE, suite au mariage dAliénor dAquitaine et de Henri II Plantagenêt en 1154, la ville souffre des attaques anglaises, commetoutes les communes du Périgord. La guerre de cent ans fait rage jusquà la victoire française à Castillon en 1453. Un siècle plus tard, la paix est à nouveau troublée par les révoltes des huguenots et les campagnes sont ravagées. Sur le coteau boisé qui domine N-D de Sanilhac, le château de La Goderie a été entièrement reconstruit, il rendait autrefois hommage à la ville de Périgueux et était le fief des Méredieu, famille bien connue pour avoir donné à Périgueux des consuls, des maires,  et des magistrats. Un des leurs, Hélie de Méredieu fut anobli par le roi au mois de novembre 1699. Le château possède un imposant salon et une grande salle à manger équipée d'une belle cheminée ainsi qu'un important hall d'entrée.                                       PROMPSAULT  de la première moitié du XIXe siècle ancienne demeure  des Chilhaud, des Delair, des Dupont de Yerville, situé dans l'impasse de Prompsault, est l'ancienne demeure des Chilhaud, des Dalair,des Dupont et de la famille de Yerville. De la terrasse de ce château,relevant anciennement de la seigneurie de la ville de Périgueux (en 1679, il est fait mention d'une maison, jardin, offices, basse-cour, etc...), on jouit d'une splendide vue sur l'ancien Puy-Saint-Front.","habitants":"Gauderie-Pouzelande  fief des Méredieu                     Prompsault  famille de Yerville\r\n        \"","divers":"A Notre-dame de Sanilhac;  Gauderie grav 1. Lafaye grav 2 . Pouzelande grav 3-4-5  GPS : 45° 07' 18\" Nord, 0° 42' 50\" Est. Chartreuse grav 6. Prompsault grav 7","gps":"45° 07' 18\" Nord, 0° 42' 50\" Est. Chartreuse grav 6. Prompsa","images":["../image/image_24/24_Notre_Dame_Sanilhac_1.jpg","../image/image_24/24_Notre_Dame_Sanilhac_2.jpg","../image/image_24/24_Notre_Dame_Sanilhac_3.jpg","../image/image_24/24_Notre_Dame_Sanilhac_4.jpg","../image/image_24/24_Notre_Dame_Sanilhac_5.jpg","../image/image_24/24_Notre_Dame_Sanilhac_6.jpg","../image/image_24/24_Notre_Dame_Sanilhac_7.jpg"]},"Consult_chateau_formulaire2d42-2":{"id":"Consult_chateau_formulaire2d42-2","dept":"24","canton":"Savignac les Eglises","commune":"Négrondes","nom":"Négrondes","type":"Château","periode":"XV-XIX","histoire":"NEGRONDES,château de l'Age ou château de Lage et son pigeonnier, dans un site inscrit depuis 1987. Château de Barbary, et à deux kilomètre au nord à Vaunac le château d'Allois\r\n LAGE,  appelé aussi le château de Lage est un château bâti à Negrondes.    Famille : Marquis de la Garde.                                                                              BARBARY  Pas d'information historique                    ALLOIS, l'existence du château des Allois  était déjà mentionné au XVe siècle. Cité depuis 1460 , on accède au château par une allée, signalée par un charmant oratoire, construit en 1774. Le logis date du XVIe et XVIIe siècle. Il est surmonté par de hautes toitures. Le château des Allois fait partie de la famille des Desvergnes et des Rapnouil.","architecture":"AGE, demeure d'origine médiévale, qui fut le centre d'une exploitation viticole. Logis renaissance avec un portail datant du XIXe siècle.  Ce château est remarquable avec sa chapelle voûtée en berceau avec un dallage en galets disposés en rosaces, par son châtelet d'entrée et ses 2 terrasses.  Château de Lage est resté inachevé, est depuis à l'état de ruines, inscrits aux M.H. depuis 1987.     Batie au XVIIIe Siècle, la Révolution l'a laissé inachevé. Le plan initial avait prévu un logis à étages encadré de pavillons et agrémenté d'un avant corps. On n'a pas pu sauver les pièces voutées et les chambres aux gypseries classiques et aux élégantes cheminées de pierre.\r\nALLOIS, château cité depuis 1460 , on y accède par une allée signalée par un charmant oratoire bâti en 1774. Corps de logis  de plan rectangulaire  à deux niveaux toits en croupes recouvert en ardoises, flanqués sur les côtés de pavillons de un étages à toits brisés","habitants":"Famille : Marquis de la Garde.                                     Famille des Desvergnes\r\n        \"","divers":"A   Négrondes;   Lage grav 2-3  GPS : 45° 20' 43\" Nord et 0° 51' 54\" Est                                       Allois  grav 1GPS : 45° 21' 51\" Nord, 0° 51' 51\" Est","gps":"45° 20' 43\" Nord et 0° 51' 54\" Est","images":["../image/image_24/24_N%c3%a9grondes_1.jpg","../image/image_24/24_N%c3%a9grondes_2.jpg","../image/image_24/24_N%c3%a9grondes_3.jpg"]},"Consult_chateau_formulairefc14":{"id":"Consult_chateau_formulairefc14","dept":"24","canton":"Jumilhac le Grand","commune":"Saint-Priest les Fougères","nom":"Oche","type":"Château","periode":"XV-XIX","histoire":"OCHE,  se situe au sud de la commune de Saint-Priest-les-Fougères, c'est une propriété privée exploitée en chambres d'hôtes et en gîte. Un premier château est bâti au XVe siècle et reconstruit à la fin du XIXe siècle. Propriété de l'État français, il sert de centre de vacances pendant la seconde moitié du XXe siècle avant d'être vendu en 2006. \r\nPierre de Béron dOche, fils de Charles, seigneur dOche et dAnne de Fayolle, obtient un certificat de noblesse pour son admission au service militaire en 1781. La famille est ensuite représentée par Mme Dumont de Lacroze.","architecture":"OCHE,  au XIXe siècle, le château devient la propriété de M Bourdery, émailleur, réputé mais également historien de lArt, fera construire le bâtiment actuel, achevé en 1883. Laile sud  qui abrite le gîte, est particulièrement remarquable, avec ses balcons, son escalier en pierre et ses ornements sculptés. De plan en équerre à deux niveaux  avec balcon,  toit à deux pans recouverts d'ardoises. Lhistoire dit que Louis Bourdery fit construire une nouvelle tour à la naissance de chacune de ses filles. Blanche, lune delle, est lauteur des peintures et émaux qui ornent le grand escalier et le devant de la chapelle, ainsi que le trumeau de lune des cheminées. Par ailleurs, il rebâtit une tour carrée à mâchicoulis. Acquis par lEtat en 1947, le domaine devient une colonie de vacances pour les enfants du personnel du ministère de lIndustrie jusquen 2006, année de sa vente à ses actuels occupants. ce château de style néogothique flanqué d'une tour carrée pigeonnier , d'un donjon à mâchicoulis  toit à quatre pans et d'une chapelle avec de
