e la toiture est couvert en tuile creuse, hormis la tour postérieure couverte en tuile plate.","habitants":"Famille de Pesnel                                                       Famille Blancan\r\n        \"","divers":"A Saint-Front d'Alemps   St-Front Alemps grav 6-7-8 GPS : 45° 28' 23\" Nord, 0° 43' 38\" Est. Brochard grav 1-2       Rochemorin grav 3.  Pompis grav 6. Roche-Pontissac grav 4-5","gps":"45° 28' 23\" Nord, 0° 43' 38\" Est. Brochard grav 1-2       Ro","images":["../image/image_24/24_St_Front_Alemps_1.jpg","../image/image_24/24_St_Front_Alemps_2.jpg","../image/image_24/24_St_Front_Alemps_3.jpg","../image/image_24/24_St_Front_Alemps_4.jpg","../image/image_24/24_St_Front_Alemps_5.jpg","../image/image_24/24_St_Front_Alemps_6.jpg","../image/image_24/24_St_Front_Alemps_7.jpg","../image/image_24/24_St_Front_Alemps_8.jpg"]},"Consult_chateau_formulaire81bc":{"id":"Consult_chateau_formulaire81bc","dept":"24","canton":"Saint-Pardoux la Rivière","commune":"Saint-Front la Rivière","nom":"St_Front_Rivière","type":"Château-Vestiges","periode":"XIII-XVI","histoire":"ST-Front la Rivière  château du Canau du XIXe siècle.\r\nPOMMIER, du XVe et XVIIe siècles, Il se situe environ à un kilomètre au sud du bourg de Saint-Front-la-Rivière, au-dessus du lieu-dit le Caneau.\r\nRENAUDIE, ruines du XIIIe au XVIe siècle, inscrit depuis 1946.   Jean du Barry, chef protestant de la conjuration d'Amboise, était seigneur.\r\nSAULNIER, du XIIIe et XVIe siècles, inscrit depuis 1969. Propriété achetée en 1787 par Nicolas Dubut de Saint Paul, écuyer et conseiller-secrétaire du Roi en la Cour des aides de Montauban.\r\nCANEAU, évoquant son église, la première mention écrite connue du lieu apparaît en 1192 dans une bulle de Célestin II sous la forme latine Ecclesia S. Frontonis de Riparia. Au siècle suivant, le lieu est cité comme Sanctus Fronto de Ripperia. La commune porta, au cours de la période révolutionnaire de la convention nationale (1792-1795), le nom de Front-sur-Dronne.","architecture":"POMMIER, date du XVe au XVIIe siècle, est compposé d'une tour carrée sans mâchicoulis ni créneaux, mais avec un larmier, d'un corps de logis à pignon aigu dont les meneaux ont disparu au XVIIIe siècle, qui furent remplacés par de petits carreaux, d'une tourelle en encorbellement, posée à l'angle du donjon carré à 2 mètres du sol,  est inscrit aux M.H. depuis le 4/12/1959. \r\nRENAUDIE, vestiges du XIIIe au XVIe siècle.  Le château a une tour à chaque angle. Du logis du XVe siècle ne reste plus que les montants de deux cheminées et des moulures de fenêtres. Au XVIIe siècle il appartenait aux Pérusse des Cars, puis fut abandonné après la Révolution française. Le château ne subsiste plus aujourd'hui qu'à l'état de ruines envahies par la végétation. Il est inscrit aux M.H. depuis 1946. \r\nSAULNIER, la construction du château Saulnier date du XIIe et XVIe siècles. Ce château Saulnier possède des douves qui étaient alimentées par la Dronne qui coule à environ 200 mètres à l'Ouest. Il se situe dans la partie Sud-Ouest de Saint-Front-la-Rivière, le long de la route menant à la Varenne et Sceau-Saint-Angel. Le château est une propriété privée, . Le château Saulnier est inscrit aux M.H. depuis 1969.","habitants":"Famille de  Jean du Barry                                       Nicolas Dubut de Saint Paul\r\n        \"","divers":"A Saint-Front la Rivière;  Rénaudie lembras grav 7-8-9GPS : 45° 26' 50,2\" Nord, 0° 43' 33,1\" Est.    Saulnier  grav 1-2 GPS : 45° 28' 16\" Nord, 0° 43' 32\" Est.  Caneau  grav 3-4. Pommier grav 5-6","gps":"45° 26' 50,2\" Nord, 0° 43' 33,1\" Est.    Saulnier  grav 1-2","images":["../image/image_24/24_St_Front_Rivi%c3%a8re_1.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_2.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_3.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_4.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_5.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_6.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_7.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_8.jpg","../image/image_24/24_St_Front_Rivi%c3%a8re_9.jpg"]},"Consult_chateau_formulairedb4d":{"id":"Consult_chateau_formulairedb4d","dept":"24","canton":"Salignac-Eyvigues","commune":"Saint-Geniès","nom":"St_Geniès_Pelvézy","type":"Château-tour","periode":"XII","histoire":"Vieux château de Saint-Géniès de la famille des Salignac en 1419 Jeanne de Salignac épouse Richard de Gontaut-Biron lui apportant la seigneirie en dot. Remontant au XIIe siècle, il ne subsiste, en bordure Est du village, qu'un donjon en ruines du vieux château ravagé lors des guerres de religion. Il est inscrit aux M.H. depuis 1925. \r\nL'autre château, Armand de Gotaut st-Geniès et son fils Hélie transforme le château au centre du village, en 1720, les gontaud cèdent la baronnie de Salignac  au duc  d'Ayen, en 1759 est acquis par François de Massacré seigneur de Fonpitou. A la mort de Maurice de Massacré en 1920 la demeure passe à mademoiselle de Mesmard qui la met en vente en 1932 acquis par monsieur Grandchamp de Cueil revendu ensuite en 1954 à la famille Madelaigue et depuis 1969 aux Denoix. La façade orientale a été aménagée en restaurant. \r\nPELVEZY,  accueille un centre de vacances, ancien fief des familles de Val, Beynac, Salignac, Reilhac, Carbonnières et de Bernard de Montmège.  Les Anglais en prennent possession en 1353 et ne le restituent que contre  un versement de 500 écus. Le château est encore attaqué en 1379, et de nouveau restitué contre le paiement dune rançon. Il subit sa dernière attaque en 1416. Las de ces attaques onéreuses, les habitants de Sarlat finissent par bombarder la place forte. Lhistoire tourmentée de la demeure ne cesse pas, car en 1592, en pleine période daffrontements entre catholiques et protestants, le  seigneur de Beynac attaque la maison et capture Antoine de Reilhac, seigneur du fief, quil fait enfermer à la prison de Bergerac.","architecture":"ST-GENIES, l'ancien château étant détruit, les seigneurs de Saint-Géniès font bâtir au XIIIe siècle un nouveau château sur la base d'édifices remontant au XIIIe siècle. Au XVIIe siècle, une tour carrée contenant un escalier à vis est ajoutée. La tour ovale du XVIe siècle est rehaussée en 1912 pour y adjoindre un chemin de ronde et des mâchicoulis.  Le nouveau  château présente un plan en forme de U ouvert à l'ouest, la tour sud, de forme ovale, est le seul bâtiment pourvu de mâchicoulis. Au nord-ouest une tour carrée, de moindre hauteur, abrite un escalier à vis. Depuis 2008, la façade orientale a été aménagée en restaurant. Les toits du château sont entièrement recouverts de lauzes. La restauration de la toiture a été effectuée par un artisan dont le savoir-faire a été inscrit à l'Inventaire du patrimoine culturel immatériel en France. classées au titre des M.H par arrêté du 16 mars 1976\r\nPELVEZY, du château dorigine, il ne reste plus aujourdhui quun corps de logis accolé à une haute tour circulaire à mâchicoulis. Selon la légende,  Saint-Louis aurait rendu la justice à Pelvezy sous deux ormeaux que lon pouvait encore admirer au début du XXe siècle. Du XIVe siècle jusquau milieu du XVe siècle, le château subit de plein fouet la guerre de cent ans.","habitants":"Famille de Salignac  au duc  d'Ayen                          Famille de Val\r\n        \"","divers":"A St-Geniès; Pelvezy grav 1 à 5. Bellevur grav 6. Tour grav 7","gps":"","images":["../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_1.jpg","../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_2.jpg","../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_3.jpg","../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_4.jpg","../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_5.jpg","../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_6.jpg","../image/image_24/24_St_Geni%c3%a8s_Pelv%c3%a9zy_7.jpg"]},"Consult_chateau_formulaireebbe":{"id":"Consult_chateau_formulaireebbe","dept":"24","canton":"Villambard","commune":"Saint-Georges de Montclard","nom":"St_Georges_Montclard","type":"Vestiges","periode":"XV-XVI","histoire":"Château de Montclard (ou Montclar, ou Monclar), inscrit en 2007 au titre des M.H.    Manoir de la Beaureille du XVIe siècle, également inscrit en 1978 pour ses façades et toitures.Chambres d'hôtes.\r\nMONCLARD, on dit que Rabelais aurait pu séjourner au château dans les années 1520-1528, lorsqu'il était secrétaire de l'évêque de Maillezais, Geoffroy d'Estissac, et plus tard, Sarah Bernhardt et Paul Valéry, amis des Pozzi, auraient fréquenté également le château de Montclar. Il fut voué à la destruction sous la Révolution et utilisé comme carrière au XIXe siècle. Aujourdhui, il n'en resterait que peu de chose sans l'intervention, en 1880, de la famille Loreilhe. Elle a permis de reconstruire un magnifique monument sur les anciennes ruines. Il fut le lieu privilégié de nombreuses légendes locales.\r\nLASCOUPS du XVIe siècle propriété d'Alain  de Lacoups dans cette famille depuis sa construction.","architecture":"LASCOUPS, composéd'un bâtiment avec deux corps de logis accolées à la tour originelle et un portail surmonté de mâchicoulis.                                     MONTCLARD se dresse sur une motte, autrefois, entourée de fossés, sur le site d'une première forteresse date du XVe, XVIe, et 4 ème quart du XIXe siècle. A la Révolution, puis au XIXe siècle, fut démunie de ses charpentes et maçonneries. De l'édifice de la fin du XVe ou du début du XVIe siècle, seul subsiste une haute tour rectangulaire qui occupe peut-être le site de l'ancien donjon. Cette tour est l'angle sud-ouest du corps de logis et en représente le tiers. Les vestiges, à l'Est, témoignent de la taille initiale du château. Édifié au XIe siècle sur une motte factice entourée de douves, le château surplombe le village à plus de 45 mètres au-dessus du sol. Il ne reste que le donjon du XIVe siècle, très retouché à la fin du XIXe siècle, de l'ancien château fort cité en 1288 (castrum de Monte Claro). L'actuel édifice à trois étages est percé de baies à meneaux et çà et là, on peut admirer des morceaux de voûtes gothiques. Au XVIIe siècle, une corniche a remplacé les mâchicoulis.","habitants":"Famille Loreilhe.                                                              Famille de Lascoups\r\n        \"","divers":"A  Saint-Georges de Montclard;   Monclard grav 1 à 4 GPS : 44° 55' 54,5\" Nord, 0° 37' 15,1\" Est. Lascoup grav 5.","gps":"44° 55' 54,5\" Nord, 0° 37' 15,1\" Est. Lascoup grav 5.","images":["../image/image_24/24_St_Georges_Montclard_1.jpg","../image/image_24/24_St_Georges_Montclard_2.jpg","../image/image_24/24_St_Georges_Montclard_3.jpg","../image/image_24/24_St_Georges_Montclard_4.jpg","../image/image_24/24_St_Georges_Montclard_5.jpg"]},"Consult_chateau_formulairec270":{"id":"Consult_chateau_formulairec270","dept":"24","canton":"Monpazier","commune":"Gaugeac","nom":"St_Germain_Gaugeac","type":"Manoir","periode":"XVII-XX","histoire":"ST-GERMAIN, le seigneur de Saint-Germain avait en outre le privilège de tenir la bride du cheval de la dame de Biron quand elle faisait sa première entrée dans la cour du château.  En 1310, Hugues de Saint Germain tua sa sur dun coup de dague. Aimeric de Biron, ayant voulu len réprimander, Hugues répartit avec insolence ; il accepta de se rendre à Molières, en armes et à cheval, le mardi après la Saint Jacques. Le sénéchal anglais assistait à la rencontre. Hugues fut vaincu et tué dans le combat. Comme il était coupable dun crime capital, ses biens furent confisqués au profit du duc de Guyenne. Le sénéchal félicita même Aimeric de Biron et lui fit restituer les sommes dépensées pour la rencontre.  Le château de Saint-Germain jouera son rôle au moment des guerres de religion. Il abritait une garnison tantôt catholique, tantôt protestante, au hasard du destin des armes.  Le 28 décembre 1984, la famille de Rimonteil de Lombares, propriétaire du château, l'a fait inscrire au titre des M.H. et plusieurs cheminées du premier étage ont été classées. \r\nDe nombreux films de cape et dépée ont utilisé le décor de Saint-Germain pour y tourner des scènes daction et en particulier une séquence de La Fille de d'Artagnan avec Philippe Noiret et Sophie Marceau.","architecture":"St-GERMAIN, le corps de logis, tourné vers la vallée, est encadré par deux tours rondes ; mais une seule de ces tours est très importante et cest cette tour qui est caractéristique du rôle confié à ce petit château. Elle surveille (de son poste de guet demeuré intact) et elle commande (par sa canonnière principale) le point où le chemin venant de Bonneville aboutissait au grand chemin de Monpazier à Villeréal.  Cest  au XVIIe siècle que le château a subi sa première modification  architecturale. Les deux tours furent découronnées. Le seigneur de Biron fit, dit-on, découronner ces tours à coups de canon, le châtelain de lépoque sétant vanté de voir, de leurs lucarnes hautes, le seigneur suzerain dans sa salle à manger et sa femme dans sa chambre à coucher. Au corps de logis principal ont été adjoints, à différentes époques, des bâtiments divers avec plus ou moins de réussite. Du côté vallée, au premier étage, de grandes fenêtres ont été ouvertes pour donner de la lumière aux grandes pièces. Au second étage où subsistent des cheminées monumentales, les fenêtres à meneaux sont intactes. La porte et la fenêtre de la tour hexagonale et lescalier hélicoïdal sont dans leur état dorigine. \r\nDeux tours ont été construites plus tardivement. Dans lune de ces tours se trouve la chapelle dans laquelle a eu lieu le mariage du fils du philosophe Maine de Biran au début du XXe siècle.","habitants":"Famille d'Aimeric de Biron\r\n        \"","divers":"A Gaugeac. St-Germain  grav 1-2 GPS : 44° 39' 38\" Nord et 0° 51' 48\" Est","gps":"44° 39' 38\" Nord et 0° 51' 48\" Est","images":["../image/image_24/24_St_Germain_Gaugeac_1.jpg","../image/image_24/24_St_Germain_Gaugeac_2.jpg"]},"Consult_chateau_formulaireb18a":{"id":"Consult_chateau_formulaireb18a","dept":"24","canton":"Excideuil","commune":"Saint-Germain des Près","nom":"St_Germain_Près","type":"Château","periode":"XVI-XVIII","histoire":"Le château de Saint-Germain date du XVIe siècle. Le château de Saint-Pierre, bâti au XVIIIe siècle en style médiéval avec échauguettes et mâchicoulis, a été transformé en colonie de vacances. Château de Boudelie.\r\nST GERMAIN des PRES  Le village actuel est installé sur deux niveaux : celui des rochers dominé par son château des XVIe et XIXe siècles et une église,et celui du vallon où coule le Ravillou, avec le manoir de Saint-Pierre du XVe-XIXe siècles ainsi quun pont médiéval. Le château de Saint Germain des Prés est l'ancienne demeure des familles du Maine et Dujouy. Cet édifice conserve une belle porte remontant au XVIe siècle et un logis à lucarnes. En 1587, un membre de la famille du Maine épousa une de Galard-Brassac, ce qui explique  les armes gravées sur le château.","architecture":"Saint-PIERRE, de plan rectangulaire à deux niveaux et lucarnes du toit flanqué aux extrémités de pavillon carrés saillants dont celui de gauche à étages suplémentaire à machicoulis un bâtiment à deux étages en retour d'équerre crénelés.                           ST-GERMAIN, de plan rectangulaire avec trois édifice en parrallèle, la partie centrale plus élevé par la toiture, les parties extérieures à fronton et l'édifice est accolé sur l'arrière d'une tour ronde à mâchicoulis et chemin de rondes toit en poivrières.                                     BOUDELIE à deux niveaux avec lucarnes sur toit brisé.","habitants":"Familles du Maine et Dujouy\r\n        \"","divers":"A Saint-Germain des Près château de  Bourdelie grav 1. St Germain grav 2-3, de St Pierre grav 4","gps":"","images":["../image/image_24/24_St_Germain_Pr%c3%a8s_1.jpg","../image/image_24/24_St_Germain_Pr%c3%a8s_2.jpg","../image/image_24/24_St_Germain_Pr%c3%a8s_3.jpg","../image/image_24/24_St_Germain_Pr%c3%a8s_4.jpg"]},"Consult_chateau_formulairede4c":{"id":"Consult_chateau_formulairede4c","dept":"24","canton":"Neuvic","commune":"Saint-Germain de Salembre","nom":"St_Germain_Salembre","type":"Château","periode":"XVII","histoire":"St-Germain-Salembre, bâti sur l'emplacement d'une ancienne villa gallo-romaine, le château actuel succède probablement à un ancien château fort qui gardait, en ce lieu stratégique de la vallée du Salembre, l'intersection de cinq routes menant à Chantérac, Neuvic, Saint-Aquilin, Saint-Astier et Saint-Vincent-de-Connezac.  Il est inscrit au titre des M.H. depuis le 11 janvier 1991 pour le sol et le sous-sol des parcelles concernées, pour les façades et toitures du château, pour son escalier d'entrée dans la tour d'angle sud, ainsi que pour sa cheminée du XVIIe siècle de la salle à manger.  Sa digue médiévale sur radier gallo-romain a été retenue pour faire partie de la mission Bern 2018 pour le Loto du patrimoine.","architecture":"St_GERMAIN, les douves ont été conservées sur les côtés ouest et sud du château qui présente deux logis des XVe et XVIIe siècles accolés en équerre, chacun avec deux galeries superposées, au rez-de-chaussée et au premier étage. À l'étage du logis nord, la galerie a été refaite en bois au XIXe siècle. Un pavillon a été ajouté dans langle des deux logis.","habitants":"Seigneur locaux\r\n        \"","divers":"A Saint-Germain de Salembre","gps":"","images":["../image/image_24/24_St_Germain_Salembre_1.jpg","../image/image_24/24_St_Germain_Salembre_2.jpg","../image/image_24/24_St_Germain_Salembre_3.jpg","../image/image_24/24_St_Germain_Salembre_4.jpg"]},"Consult_chateau_formulairebf26":{"id":"Consult_chateau_formulairebf26","dept":"24","canton":"Excideuil","commune":"Saint-Jory las Bloux","nom":"St_Jory_Las_Bloux","type":"Château","periode":"XV-XIX","histoire":"LAUBERTIE,  du XIXe siècle, cétait une famille de basse extraction. Les premières informations disponibles partent de Jean De Las Escuras, seigneur de Leyssac dont un fils Pierre De Las Escuras, avocat au parlement de Bordeaux, procureur au siège royal de Thiviers en 1730. Il se marie en 1741 avec Léonarde de Larue, seigneur de la Flamenchie. En 1742, il acquiert les seigneuries de Lépine, de Lapouyade, de Beynac (Saint Saud) et devient en 1749 comte de palatin et chevalier de Saint Jean de Latran par décret du pape. Il eut quatre enfants et décéda le 2 février 1765. Par décret du pape Clément XIII, son fils cadet Jean Hélie De Las Escuras de Lépine, seigneur de Pouzol, écuyer, docteur en médecine, lieutenant général de police de Thiviers, est élevé à la dignité de comte palatin et chevalier de Saint Jean de Latran. Cette même distinction est accordé la même année à son frère aîné, Pierre Hélie De Las Escuras de Lestang, seigneur de la maison noble de Beynac, procureur du roi à Thiviers. Les autres frères fondèrent les branches de Pouzol et Lamarque. Jean Hélie De Las Escuras de Lépine est mentionné comme un des plus gros propriétaires sur la commune de Saint-Jory-las-Bloux et possesseur du domaine de Laubertie. Les Varailhas de 1666 à 1708.  Les Dussutour de 1677 à la fin du XVIIIe siècle.   Les Lambert de 1726 à 1807.  Les Lacotte de 1799 à 1867","architecture":"ST-JORY las BLOUX, la construction date du XIXe siècle. Le château attenant à l'église, mêle des éléments du XVe au XVIIIe siècle, sur des bases qui remontent au XIIIe siècle. Dans son roman, Le Moulin du Frau écrivit, en 1891 : Eugène Le Roy se sert du château de Saint-Jory-las-Bloux comme modèle pour le château de Puygolfier. Sur trois hectares, la partie Ouest du village de Saint-Jory-las-Bloux englobe le château, l'église, ainsi que leurs abords, c'est un site inscrit depuis 1944, pour son côté pittoresque.           LAUBERTIE, lélégant château de Laubertie XIX siécle de style néo classique, se situe en pleine campagne dans le Périgord blanc, entouré dun parc de 2 hectares et en bordure de champs et bois, il vous enchantera par son caractère et sa situation.  Un long bâtiments latéral, perpendiculaire à la route, mesurant 33m sur 14 m constituait un chai et une cuisine. Dans le prolongement de ce grand bâtiment, une construction sur deux niveaux qui constitue larrière du château actuel.","habitants":"Famille de  Jean De Las Escuras\r\n        \"","divers":"Saint-Jory las Bloux grav 1 5-6;  Chalais grav 2. St-Jory-Laubertie grav-3-4 -7 GPS : 45° 21' 47' Nord, 0° 58' 05\" Est.","gps":"45° 21' 47' Nord, 0° 58' 05\" Est.","images":["../image/image_24/24_St_Jory_Las_Bloux_1.jpg","../image/image_24/24_St_Jory_Las_Bloux_2.jpg","../image/image_24/24_St_Jory_Las_Bloux_3.jpg","../image/image_24/24_St_Jory_Las_Bloux_4.jpg","../image/image_24/24_St_Jory_Las_Bloux_5.jpg","../image/image_24/24_St_Jory_Las_Bloux_6.jpg","../image/image_24/24_St_Jory_Las_Bloux_7.jpg"]},"Consult_chateau_formulaire79ff":{"id":"Consult_chateau_formulaire79ff","dept":"24","canton":"Montignac","commune":"Saint-Léon  sur Vézère","nom":"St_Léon_Vézère","type":"Château","periode":"XIII-XV-XVI","histoire":"Trois châteaux à St-Léon  sur Vézère  le château de Chabans du XIIIe -XVe et XVIe siècles, de Clérans et  de la Salle.\r\nChâteau de CLERANS, du XVIe siècle, au bord de la Vézère, précédé par une maison noble appelée \"Hôtel noble de la Peyronie\" au XIIe siècle. Au fond de son parc planté d'arbres multi centenaires.\r\nCHABANS,  le château porte le nom d'une illustre famille qui descendait des comtes de Poitiers, princes de Chabans. Construit au XVe siècle par Jean Ier de Calvimont.  En 1676 Louise de Calvimont épouse son cousin le vicomte François de Losse capitaine de cavalerie. En 1828 le vicomte d'Abzac héritier des Calvimont décéde , en 1832 acquis par Jean Dubois, passe ensuite à Clément Dulac avocat qui doit s'en défaire en 1876 le château est vendu aux enchères, acquit par les Perdouret en 1903, les Levebre en 1886, les Dabalvie en 1903, les Vignérasen 1912, les Gaillard en 1920; les Cazelles en 1930, en 1944 poste de commadement de la résistance, passe aux Puyalto en 1960, le château est intégré à la société civile du domaine de Chabans en 1964 et en 1987 acquis par Mme  Crichton-Watt. Il est inscrit aux M.H. depuis 1972 pour ses façades et toitures.   Jean Jacques de Chabans Delmas y séjourna à plusieurs reprises.  \r\nLa SALLE, au XIVe siècle et XVe siècle, le fief appartenait à la famille de Mârtres. Elle l'a conservé jusqu'au XVIe siècle quand des membres de la famille participait à la défense de Sarlat contre les huguenots. Puis le fief passa entre les mains de la famille Vivans avant qu'elle devienne la propriété de la famille Cheylard par mariage en 1630. Le château a été restauré à partir de 1969.","architecture":"CHABANS,  Sa construction date du XIIIe au XVIIe siècle. De la côte de Jor, une allée conduit au château de Chabans construit au XVe siècle sur l'emplacement d'un autre plus ancien, détruit au XIVe siècle et au XVIe siècle par les Ligueurs. Deux corps de logis à angle droit s'élèvent dans une cour fermée. L'un des deux est flanqué d'une tour polygonale agrémentée d'une petite tourelle en encorbellement. Les lucarnes et la porte d'accès de la tour sont de style Renaissance, l'autre bâtiment possède une porte de style Louis XIII.                                                         CLERANS,  précédé par une maison noble appelée hôtel noble de la Peyronie au XIIe siècle, le château date du XVIe siècle. Au fond de son parc planté d'arbres multicentenaires, dominant la Vézère dont il est protégé par un mur d'enceinte, il dresse une belle tour d'escalier polygonale, des tourelles d'angles et les frontons de plusieurs lucarnes. Il a appartenu au début du siècle à Monsieur Cambronne, petit neveu de l'illustre général.                                                              LA SALLE, manoir a été bâti au XIVe siècle, à l'initiative d'un des coseigneurs de la Roque Saint-Christophe, seigneurie dont dépendait une partie de Saint-Léon sur Vézère, pour remédier semble-t-il à l'insécurité qui régnait alors dans la Vallée. \r\nC'est un ensemble qui comprend le manoir et un donjon carré auquel est accolée une tour d'angle, le donjon et la tour étant couronnés de mâchicoulis. Après la révolution, le manoir est acquis par les propriétaires du château de Clérans.","habitants":"Jean Jacques de Chabans Delmas\r\n        \"","divers":"Saint-Léon  sur Vézère;  St-Léon  Clérans grav 1 à 6. Chabans grav grav 8-9  GPS : 45° 0' 47,4\" Nord et 1° 3' 38,7\" Est. Salle grav 7-8","gps":"45° 0' 47,4\" Nord et 1° 3' 38,7\" Est. Salle grav 7-8","images":["../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_1.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_2.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_3.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_4.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_5.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_6.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_7.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_8.jpg","../image/image_24/24_St_L%c3%a9on_V%c3%a9z%c3%a8re_9.jpg"]},"Consult_chateau_formulairea6fe":{"id":"Consult_chateau_formulairea6fe","dept":"24","canton":"Verteillac","commune":"Saint-Martial Viveyrol","nom":"St_Martial_Viveyrol","type":"Château","periode":"XV-XVIII","histoire":"A st-Martial de Viveyrol le château de Fontpitou,  le château de Gandillac du XVe et XVIIIe siècles, le château de Saint-Martial-Viveyrol du XVe siècle, \r\nFONTPITOU, lépoque de construction est définie comme étant du XVIIe et fin du XVIIIe siècle. Cet ancien château conserve une tour adjacente dont la porte est datée de 1676. Un texte de 1776 indique que le manoir menaçait de ruine ; il a été reconstruit peu après cette date. Le manoir a un étage carré et un étage de comble coiffé dun toit mansardé couvert de tuile plate. La façade principale, orientée au nord-est, est rythmée par trois travées soulignées par la présence des lucarnes perçant la toiture. Les dépendances se développent en retour déquerre du côté  occidental tandis quune tour défensive carrée du XVIIe siècle, située à lest, donne accès à une ancienne cave. La façade sud-ouest offre une élévation nettement plus simple, sans ornementation, et dépourvue douverture dans létage de comble. Le gros uvre est fait de calcaire, de pierre de taille, de moellon et denduit.                                                       GANDILLAC est donc lancien fief des Patronnier et des Burguet. Le château est attesté au XVIIIe siècle. En 1463, il est toutefois fait mention templière du  maynement de Gandilhac. En 1793, on remarquait encore  deux tourelles annonçant lancienne féodalité  de la demeure.                                                            ST-MARTIAL, château de Saint-Martial-Viveyrol date du XVe siècle. Il a appartenut aux familes Jussac d'Ambleville, des De Lageard et des De Badillac.","architecture":"St-MARTIAL-VIVEYROL, maison forte de la fin du Moyen Âge, accompagnée de sa tour descalier, a été agrandie vers le nord au XVIe siècle. Cest sans doute au moins un siècle plus tard quun pavillon pourvu déléments défensifs, est venu se greffer au logis,  Cette maison est construite en pierre de taille et moellon de calcaire. Le logis, qui a perdu son enduit, se compose dun étage carré. Une tour hexagonale, en partie arasée renferme un escalier à vis. La porte daccès à la tour surmontée dune accolade, est située du côté sud. Elle aurait été défendue par une bretèche dont il ne reste aucune trace. La façade orientale, bien que remaniée, présente encore des fenêtres ouvragées à traverses et meneaux de la fin du XVe ou du début du XVIe siècle. Cest du côté occidental quune tour plus élevée et achevée par un toit en pavillon laisse deviner la présence dun second escalier. La façade, percée dune baie hybride conjuguant le gothique tardif et le classique avec ses pilastres dordre ionique, a été remaniée au XVIIe siècle. Au sud, un pavillon de plan rectangulaire permet de faire la jonction entre la maison forte dorigine et les dépendances, il est percé dune série de canonnières, dont certaines ont été bouchées. En retour déquerre, les dépendances se développent vers louest.","habitants":"Famile Jussac d'Ambleville\r\n        \"","divers":"A Saint-Martial Viveyrol; grav 1-2     Fontpitou grav 3 GPS : 45° 21' 30\" Nord, 0° 20' 22\" Est. Gandillac grav 3","gps":"45° 21' 30\" Nord, 0° 20' 22\" Est. Gandillac grav 3","images":["../image/image_24/24_St_Martial_Viveyrol_1.jpg","../image/image_24/24_St_Martial_Viveyrol_2.jpg","../image/image_24/24_St_Martial_Viveyrol_3.jpg","../image/image_24/24_St_Martial_Viveyrol_4.jpg"]},"Consult_chateau_formulairec08b":{"id":"Consult_chateau_formulairec08b","dept":"24","canton":"Sainte- Alvère","commune":"Saint-Laurent les Bâtons","nom":"St_Maurice_24","type":"Château","periode":"XV","histoire":"St-MAURICE,  le  château de Saint-Maurice fut un fief des Pons de Saint Maurice et des Sabran Pontevès. Armand Imbert, né en 1850 et mort en 1922, fut lun des précurseurs de la physiologie du travail en France. Il collabora avec ladministration du travail dans les années 18901920, avant la création du ministère du Travail. Dans ses nombreux ouvrages, dont  Létude scientifique expérimentale du travail professionnel, édité en 1907, ou  Observations économiques des vies ouvrières, paru en 1911, ses articles scientifiques et ses communications auprès des publics les plus divers, Armand Imbert sintéresse à la notion de pénibilité en usine et sera lun des premiers à utiliser la radiographie pour les ouvriers accidentés.\r\nSon petit-fils, Lucien Imbert, est intarissable au sujet de ce grand-père qui fut aussi un grand homme à son époque. Pendant la visite de la demeure dont la construction remonte au XIIIe siècle, Lucien Imbert racontera certainement aussi quelques anecdotes arrivées pendant le tournage, en mai dernier, dun épisode de la série télévisée « Nicolas Le Floch » et de scènes du film de Marc Valente. Le père de ma fille , avec François Berléand, durant le mois daoût.","architecture":"St-MAURICE, de la maison-forte du haut Moyen Âge, il reste le donjon carré. Le rempart, les douves et le pont-levis ont disparu depuis des siècles. À la fin de la guerre de cent ans, et à l'apparition de la Renaissance, le percement de baies à meneaux humanisa la demeure. Le  château de Saint-Maurice fut un fief des Pons de Saint Maurice et des Sabran Pontevès.\r\nBâti au débouché d'un petit vallon, le château actuel se compose d'un corps de logis barlong, couronné d'un chemin de ronde sur corbeaux à trois redans, percé d'ouvertures carrées. Quelques archères cruciformes subsistent encore. A l'angle nord-ouest est soudée une tour ronde à mâchicoulis, percée d'ouvertures analogues aux précédentes, et de  meurtrières avec trous d'armes à feu à la base. A l'angle sud-ouest, des traces d'arrachement de mur permettraient de supposer qu'il existait une tour analogue, disparue lors du réaménagement du château au XVIe siècle. Sur la face Est s'élève une tour carrée d'escalier, ceinturée de mâchicoulis. La porte d'entrée, accessible par un escalier, est défendue par une meurtrière. Au XVIe siècle, le château fut agrandi par l'adjonction d'un bâtiment en retour au sud, puis plus tardivement encore par un second à usage de communs  au nord. Entre 1816 et 1962, de réserve de grains en séchoir à tabac, le château était ouvert à tous les vents. Mais fort heureusement, les actuels propriétaires ont manifesté un goût remarqué pour la restauration de cette demeure.","habitants":"Famille d'Armand Imbert\r\n\r\n        \"","divers":"A Saint-Laurent les Bâtons; châtea de St -Maurice","gps":"","images":["../image/image_24/24_St_Maurice_24_1.jpg","../image/image_24/24_St_Maurice_24_2.jpg","../image/image_24/24_St_Maurice_24_3.jpg"]},"Consult_chateau_formulairefae7":{"id":"Consult_chateau_formulairefae7","dept":"24","canton":"Excideuil","commune":"Saint-Médart d","nom":"St_Médart_Excideuil","type":"Château","periode":"XV-XVII","histoire":"A St-Médart, le château des Charreaux, il ne subsiste plus qu'une tour, inscrite en 1948 au titre des monuments historiques,  château d'Essendiéras, composé de deux bâtiments, un manoir des XVe et XVIIe siècles et un castel du XIXe siècle (voir article).  Château de la Farge.  Manoir des Gissous. Château de la Guichardie, dépendant du domaine d'Essendiéras. Manoir de la Jorie.  pas d'information historique pour Gissous de la Guichardie et le manoir de la Jorie.\r\nCHARREAUX  Ancienne demeure des Pasquet,  On pense que la plus grande partie du château fut détruite pendant la Révolution. Le docteur Chavoix étant devenu propriétaire des  lieux en 1818, édifia la maison attenante, des Charreaux puis propriété de la famille Chavoix,","architecture":"LA FARGE, non loin du bourg de Saint-Médard-d'Excideuil, le château de La Farge, dont la Loue lèche la terrasse, montre un gros logis du XVIIIe siècle, d'un style un peu sec, avec un fronton triangulaire, entre deux pavillons (l'un d'eux,incendié, a disparu); l'escalier central repose sur un arc surbaissé.C'était, au XVIIIe siècle, la demeure des Malet, maîtres de forges, qui possédaient également sur la Loue des moulins à papier.                                                                CHARREAUX, l'édifice montre un logis épaulé par une tour circulaire dont les lucarnes reposent sur des mâchicoulis; une tourelle porte en pénétration une échauguette à poivrière. En 1693, l'ensemble comportait deux tours, un corps de logis, un pavillon, deux granges, un fourniaux, des estables et autres bâtiments, une basse-cour.","habitants":"Famille Chavoix\r\n        \r\n        \"","divers":"A Saint-Médart d'Excideuil;     Charreaux grav 1-2  et Farge grav 3-4. St-Médard GPS : 45° 21' 20\" Nord, 1° 05' 26\" Es","gps":"45° 21' 20\" Nord, 1° 05' 26\" Es","images":["../image/image_24/24_St_M%c3%a9dart_Excideuil_1.jpg","../image/image_24/24_St_M%c3%a9dart_Excideuil_2.jpg","../image/image_24/24_St_M%c3%a9dart_Excideuil_3.jpg","../image/image_24/24_St_M%c3%a9dart_Excideuil_4.jpg"]},"Consult_chateau_formulaire7b23":{"id":"Consult_chateau_formulaire7b23","dept":"24","canton":"Jumilhac le Grand","commune":"Saint-Paul la Roche","nom":"St_Paul_Roche","type":"Château","periode":"XV","histoire":"A St-Paul les Roches, les ruines du Chalard, le château de Montardy du XIVe, XVIIIe et XIXe siècles et le château de la Valade du XVIIIe et XIXe siècles, ancienne propriété de la famille Chapelle de Jumilhac puis des Dubut de Saint-Paul. Gauterie ?\r\nCHALARD, ruines du  XIe, XIIe et XVe siècles. Détruit pendant la guerre de cent ans.                            MONTARDY du XIVe, XVIIIe et XIXe siècles.\r\nLa VALADE du XVIIIe et XIXe siècles, ancienne propriété de la famille Chapelle de Jumilhac  puis des Dubut de Saint-Paul.\r\nST-PAUL les ROCHES, aux environs de 1140, Guy Flamenc de la Roche-Saint-Paul, seigneur du château de Bruzac Saint-Paul la Roche relevant de la seigneurie de Bruzac fait don des terres et bois aux Templiers venus en Périgord en 1138 qui édifient une commanderie, qui devient rapidement la plus importante de la région. Les seuls vestiges restants en sont la maison du commandeur de la commanderie, dite  Templars  et sa garçonnière. Guy IV (1113-1148) et Adhémar IV (1110-1148), co-vicomtes de Limoges qui disputaient le territoire à Guy Flamenc, viennent l'assiéger en 1143, avec l'aide de Boson II (1110-1443), vicomte de Turenne (beau-frère d'Adhémar IV). Lors du siège de la commanderie de Saint-Paul-la-Roche, Boson II est tué d'un coup de flèche. Effrayés, les deux vicomtes s'empressent de lever le siège et quittent la contrée. Le 13 octobre 1307, les Templiers de Saint-Paul-la-Roche et leur commandeur, Bernard de Villars (1271-1311) sont arrêtés par les soldats du sénéchal du Limousin, et emmenés à Limoges. Les hospitaliers reçoivent les biens templiers vers 1316, et sont rattachés à Condat.","architecture":"VALADE Le château de la Valade est situé sur la commune de Saint-Paul-la-Roche, au sud ouest du bourg, près du confluent de la Valouze et de l'Isle, c'est l'ancienne demeure des familles de la Chapelle de Jumilhac, des Expert, puis propriété des Dubut de Saint-Paul. Cette ancienne demeure de maîtres de forges, également orthographiée Vallade, présente une façade encadrée de deux hautes tours rondes avec mâchicoulis et toitures dressées.  On peut également voir sur la commune l'unique vestige de l'une des plus importantes commanderies templières en Périgord, la maison du commandeur de la Commanderie de Saint-Paul-la-Roche, est aussi dite \"Templars\", des XIIe et XVIe siècles, à proximité du site de la Roche Blanche. Le castelet dentrée abrite toujours lexposition de photographies de Bernard Dupuy complétant la palette artistique offerte par les bâtiments.                                         MONTARDY; fief de plusieurs familles nobles telles que les Gareboeuf, les Ouzeau, les Bois Bandran et les Martinos Pécheras; flanqué de deux tourelles à toit en poivrières construit au XVe siècle, restauré au XXe siècle.","habitants":"Famille Chapelle de Jumilhac \r\n        \"","divers":"A  Saint-Paul la Roche;  Gauterie grav 1. Montardy grav 3-4-.Valade grav 2 GPS : 45° 17' 29\" Nord, 0° 34' 19\" Est.","gps":"45° 17' 29\" Nord, 0° 34' 19\" Est.","images":["../image/image_24/24_St_Paul_Roche_1.jpg","../image/image_24/24_St_Paul_Roche_2.jpg","../image/image_24/24_St_Paul_Roche_3.jpg"]},"Consult_chateau_formulaire88dc":{"id":"Consult_chateau_formulaire88dc","dept":"24","canton":"Saint-Pierre de Chignac","commune":"Saint-Pierre de Chignac","nom":"St_Pierre_Chignac","type":"Château","periode":"XIV","histoire":"A St-Pierre de Chignac  le château de Lardimalie du XIXe siècle, inscrit aux M.H. depuis 1984, sur un site inscrit depuis 1980.  Château des Maillots, aménagé en chambres d'hôtes. Chartreuse de Fayard du XVIIe siècle.Au XIVe siècle, la paroisse de Saint-Pierre-de-Chignac dépendait de la châtellenie d'Auberoche avant d'être vendue en 1544 à Henri II, roi de Navarre, vicomte de Limoges et comte du Périgord.       LARDIMALIE, seigneurie des Foucauld depuis le XIVe siècle famille du père Charles de Foucauld. Au début du XIXe siècle une fois passée la grande tourmente révolutionnaire, le propriétaire entreprit de rajeunir la forteresse de ses ancêtres qui avait connu et subi toutes les guerres et en conservait les marques. Surveillant les travaux et soucieux des détails, il se risqua sous une tour branlante qui s'effondra et l'ensevelit. Le dernier marquis, Louis Foucauld de Lardimalie, ne connaîtrait jamais la grande façade qu'il avait dessinée. Bien plus tard, à la suite d'initiatives industrielles et d'un beau mariage, un homme du pays, Honoré Secrestat, s'installe au château en 1875, il vient de réunir une fortune dans les vins et spiritueux. Inventeur du célèbre bitter Secrestat, l'apéritif dont l'Amérique raffole, il dote la maison d'un riche mobilier, plante des vignes sur des dizaines d'hectares, fait aménager des chais pour de grands crus et établir un domaine agricole. Lui, avec sa descendance feront dans le social, pourvoiront le nombreux personnel d'un habitat adapté et pratiqueront la sécurité sociale avant l'heure.","architecture":"LARDIMALIE, aujourd'hui, le château se compose d'un pavillon central en avant-corps cantonné de deux ailes qui ont, à leur extrémité, chacune un pavillon en légère saillie. Sur le côté nord-est, une tourelle relie le pavillon central au pavillon nord. Une véranda comble le vide entre les deux ailes. L'épaisseur des murs et le gauchissement de l'aile sud-est sont le seul souvenir du château précédent. A l'intérieur, décoration néo-classique. Le hall d'entrée conserve la porte du jubé de l'abbaye de Vauclaire. Le grand  salon qui lui fait suite est décoré dans le style Louis XII avec des boiseries de chêne. Le petit salon a reçu une décoration peinte en bleu et  or de style Louis XV, avec un plafond peint sur le thème des fables de La Fontaine. Les murs du cabinet de travail sont tendus de cuir de Cordoue, avec un plafond peint figurant la marine et l'industrie. Dans la salle àmanger, des toiles peintes représentent les travaux des champs. Au premier étage, trois chambres ont leurs plafonds peints. Au troisième étage, une salle dite salle d'armes possède deux grandes coupoles peintes et les murs ornés de fleurs réalisées au pochoir.","habitants":"Famille de Charles de Foucauld\r\n        \"","divers":"A Saint-Pierre de Chignac;  GPS : 45° 08' 01,9\" Nord, 0° 52' 06,4\" Est.  Ladimalie grav 1 à 6 . Maillots grav 7 -8 . Fayard grav 9.","gps":"45° 08' 01,9\" Nord, 0° 52' 06,4\" Est.  Ladimalie grav 1 à 6","images":["../image/image_24/24_St_Pierre_Chignac_1.jpg","../image/image_24/24_St_Pierre_Chignac_2.jpg","../image/image_24/24_St_Pierre_Chignac_3.jpg","../image/image_24/24_St_Pierre_Chignac_4.jpg","../image/image_24/24_St_Pierre_Chignac_5.jpg","../image/image_24/24_St_Pierre_Chignac_6.jpg","../image/image_24/24_St_Pierre_Chignac_7.jpg","../image/image_24/24_St_Pierre_Chignac_8.jpg","../image/image_24/24_St_Pierre_Chignac_9.jpg"]},"Consult_chateau_formulairee238-2":{"id":"Consult_chateau_formulairee238-2","dept":"24","canton":"Jumilhac le Grand","commune":"St-Pierre de Frugie","nom":"St_Pierre_de_Frugie","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Saint-Pierre de Frugie et à cinq kilomètres au nord-ouest le château de Firbeix du XVIIIe siècle, le manoir de Coupiat du XVIIe siècle.\r\nManoir de Goursolas du XVIIe et XVIIIe siècles.  Outre ces trois inscrit  je n'ai pas d'info .                       FRUGIE, le château de Frugie se situe au nord-est, en Périgord vert. Le 18 avril 1672, Hélie d'Arlot de Frugie, chevalier, seigneur de Frugie, de Cumond et autres lieux y décède. À l'origine, il se présentait sous la forme d'un quadrilatère dont les côtés nord-ouest et sud-est ont disparu. Au début du XXIe siècle, deux lignes de bâtiments subsistent : au sud-ouest, le logis encadré de deux tours massives rectangulaires, le tout couronné de mâchicoulis vers l'extérieur ; au nord-est des ruines recouvertes de lierre et précédées d'une douve sèche avec, côté intérieur, les restes d'une chapelle. Il est inscrit au titre des M.H. depuis le 21 mars 1968 pour ses façades et sa toiture. Le château actuel, bâti aux XVe et XVIe siècles, succède à un manoir fortifié médiéval ravagé lors des conflits avec les anglais. L'entrée du logis sud est ornée d'un portail Louis XIII que précédait auparavant un pont-levis supprimé lors du comblement des douves.\r\nMONTCIGOUX, du château du XIIe siècle ne subsiste aujourd'hui qu'une tour ronde partiellement arasée à laquelle est juxtaposée une chartreuse du XVIIe siècle.  Berceau des Rolle, seigneurs du lieu dés 1540, Vers 1750, ils durent abattre lancien manoir du XIIIe siècle,  Ils bâtirent à la place lactuelle chartreuse. La terre et le château furent acquis vers 1826 par Pierre Paignon de Fontaubert (1772-1857) et son épouse Sophie Louise de Brie de Lageyrat (1788-1834). La bâtisse a été remaniée au début du XXe siècle par les Henry de Lamoignerie, ses nouveaux acquéreurs. Elle a été rachetée dans les années 1970 par une famille qui la possède toujours aujourdhui.","architecture":"VIEILLECOUR, se situe en Périgord vert, deux kilomètres au nord-est du bourg de Saint-Pierre-de-Frugie, bâti au XIIe siècle. Il se présente sous la forme d'un quadrilatère incomplet bordé de douves sèches sur deux côtés. L'enceinte, ponctuée de cinq tours rondes et d'une tour carrée, a conservé ses mâchicoulis. Il est inscrit au titre des M.H. depuis le 4 octobre 1946. Après avoir été grièvement blessé au siège de Châlus, Richard Cur de Lion, y aurait trouvé refuge en 1199, six jours avant de mourir. En 1372, lors de la guerre de cent ans, Bertrand Du Guesclin y installe sa garnison pour plusieurs semaines, après avoir repris Saint-Pierre-de-Frugie aux anglais. Le château, remanié du XVe au XVIIe siècle, se transforme en château d'agrément, perdant ainsi sa fonction défensive. En 1576, Jehan de Maulmont le vend à François de Laige, avant que le domaine passe successivement à Louis de Stuard de Caussade en 1598, à Jean du Glenest en 1650, puis à Jean Mosnier de Planeau en 1665. Le château est plus tard acquis par Marie Sohier (1885-1963), déjà propriétaire du château de La Meynardie, à La Coquille. Petite-fille du préfet Adrien Sohier (1815-1911), Marie Sohier était l'épouse de Marcel Rolland de Ravel (1882-1968), officier d'infanterie et maire de Saint-Pierre-de-Frugie. Au cours de la seconde moitié du XXe siècle, il a été la propriété de l'architecte Armand Lejeune (1918-2006).","habitants":"Famille d'Hélie d'Arlot de Frugie   Montcigoux famille de  Pierre Paignon de Fontaubert                           Vieillecour  famille de Jehan de Maulmont\r\n        \"","divers":"A  St-Pierre de Frugie;  Frugie grav 7-8,  GPS : 45° 34' 23,7\" Nord et 0° 59' 43,8\" Est . Firbeix grav 5 - 6                             Montcigoux  GPS : 45° 36' 22\" Nord et 1° 00' 05\" Est Vieillecour grav 1 à 4","gps":"45° 34' 23,7\" Nord et 0° 59' 43,8\" Est . Firbeix grav 5 - 6","images":["../image/image_24/24_St_Pierre_Frugie_1.jpg","../image/image_24/24_St_Pierre_Frugie_2.jpg","../image/image_24/24_St_Pierre_Frugie_3.jpg","../image/image_24/24_St_Pierre_Frugie_4.jpg","../image/image_24/24_St_Pierre_Frugie_5.jpg","../image/image_24/24_St_Pierre_Frugie_6.jpg","../image/image_24/24_St_Pierre_Frugie_7.jpg","../image/image_24/24_St_Pierre_Frugie_8.jpg"]},"Consult_chateau_formulaireacad-2":{"id":"Consult_chateau_formulaireacad-2","dept":"24","canton":"Domme","commune":"Saint-Pompont","nom":"St_Pompont","type":"Château","periode":"XII-XV-XVI","histoire":"A Saint-Pompont  l'ancienne porte de la ville, classée au titre des M.H. par arrêté du 3 juin 1937, château de Castelviel château de Mespoulet du XIIe siècle, château de Saint-Pompont du XVIe siècle, inscrit au titre des M.H. le 2 février 1948.\r\nSt-POMPONT, au XVe siècle la seigneurie de Saint-Pompont appartient à la famille Laroque ou La Roque de Saint-Pompont. En 1464, Marguerite de La Roque, sur de Martial de La Roque, seigneur de Saint-Pompont, se marie avec Jean II de Cugnac seigneur de Sermet à Loubejac, Giverzac près de Domme, La Bastide (Lot), La Thèze. Jean III de Cugnac né vers 1520 reçoit d'Hélie de La Roque la donation de Saint-Pompont par un acte fait en 1552, Le Peyruzel, Les Fournels à Campagnac-lès-Quercy. La famille de Cugnac est restée seigneur de Saint-Pompont jusqu'à la Révolution.  En 1589 les protestants se sont emparés de Saint-Pompont dont Marc de Cugnac est le seigneur. Après s'être installés dans l'église, ils en sont chassés par les Ligueurs. Geoffroy de Vivans revient le lendemain, fait égorger 35 Ligueurs et brûle le château de Marc de Cugnac sauf le donjon. \r\nLe château a été inscrit au titre des monuments historiques le 2 février 1948.","architecture":"CASTELVIEL, bâti sur des fondations du XIIe siècle, le château de Castelviel à Saint-Pompont est constitué dun logis central avec baies à meneaux, flanqué dune tour carrée à mâchicoulis datant du XVe siècle.             ST-POMPONT, le château possède une grosse tour carrée à mâchicoulis et chemin de ronde remaniée après la fin de la guerre de cent ans. Le logis placé contre la tour est du XVe siècle  possède des fenêtres à meneaux.                                                           MESPOULET, est un ensemble fortifié, à l'architecture atypique, édifié à Saint-Pompon au XIIe siècle. Connu sous le nom de \"Reparium de Mespoleto\", le château est remanié au cours des siècles, selon les propriétaires. De l'époque de sa construction, il conserve aujourd'hui une tour-porte carrée et un donjon. Les autres bâtiments sont ajoutés entre le XIVe et le XVIIIe siècle.Le résultat est une architecture dissymétrique, étonnante pour un château défensif : l'édifice possède à la fois des tours carrées et des tours rondes, surmontées parfois d'un toit d'ardoises, parfois de tuiles ou de lauzes. La tour-porte carrée est transformée en chapelle privée.","habitants":"Famille Laroque                                                             Famille de Cugnac \r\n        \"","divers":"A St-Pompont  GPS : 44° 43' 35,6\" Nord, 1° 08' 43,3\" Est. Castreviel  grav 1 à 3. Maspoulet grav 1 à 9.","gps":"44° 43' 35,6\" Nord, 1° 08' 43,3\" Est. Castreviel  grav 1 à 3","images":["../image/image_24/24_St_Pompont_1.jpg","../image/image_24/24_St_Pompont_2.jpg","../image/image_24/24_St_Pompont_3.jpg","../image/image_24/24_St_Pompont_4.jpg","../image/image_24/24_St_Pompont_5.jpg","../image/image_24/24_St_Pompont_6.jpg","../image/image_24/24_St_Pompont_7.jpg","../image/image_24/24_St_Pompont_8.jpg","../image/image_24/24_St_Pompont_9.jpg"]},"Consult_chateau_formulaire8b53":{"id":"Consult_chateau_formulaire8b53","dept":"24","canton":"Saint-Aulaye","commune":"Saint-Privat des Près","nom":"St_Privat_Près","type":"Château","periode":"XIII-XVII","histoire":"A St-Privat des Près;  plusieurs châteaux dont celui de la Meynardie,  le manoir de la mairie, le prieuré la Mothe est le logis.                                                          le château de la MOTHE date du XIIIe siècle puis a été remanié, en particulier au XVIIe siècle. Il apparaît dans les mémoires du gouverneur d'Aquitaine, Montluc, qui y fait une halte avec des troupes pendant une offensive catholique dans la région d'Aubeterre, pendant les guerres de religion.                                   LOGIS,  belle demeure construite aux XVIIIe et XIXe siècles au cur du village de Saint-Privat-des-Prés. Elle possède un parc historique paysagé remarquable.\r\n MEYNARDIE, attesté au début du XVIIe siècle, en 1609 et qu'il appartenait aux la Cropte au XVIIe siècle, centre hospitalier situé un kilomètre et demi à l'est du bourg de Saint-Vincent-Jalmoutiers.\r\nLa Tour par sa forme carrée de petites dimensions,  pas habitable. Ce ne devait être qu'une construction défensive.  Des archères droites sont situées sur 3 cotés, elles ne sont visibles que sur 2 niveaux . Elles ont peut être été rebouchées pour la construction tardive d'une randière et du pigeonnier au sommet.","architecture":"MEYNARDIE  On ne sait rien du château fort qui précéda la construction actuelle,  Une tour, seul vestige de l'édifice primitif, permet de le situer vers la seconde moitié du XVe siècle. C'est vers la fin du XIXe ou le début du XXe siècle qu'il est reconstruit dans un style néogothique. Il se compose de trois pavillons rectangulaires reliés par deux corps de logis barlongs. La partie centrale abritant l'accès, un hall et l'escalier, est cantonnée au sud de deux tours polygonales jointes par une terrasse et au nord d'une paire d'échauguettes décoratives encadrant un balcon. Le pavillon Est s'appuie au nord contre une tour circulaire aux murs très épais, seul vestige du château primitif mais sans toiture. Le pavillon ouest coiffé d'une ceinture de mâchicoulis supportant un parapet orné de faux créneaux et de deux lucarnes à gâble. Le complexe hospitalier se développe à l'est du château.   A la fin des années 20, un sanatorium est construit à l'est du château, il ouvre le 25  avril 1930. La convention de 1955 permet l'accueil des patients de la Gironde. L'aile nord est modernisée en 1957 et l'aile sud en 1963.                                                                  La  MOTHE  est entouré de douves enjambées par un pont. Le logis est édifié sur une plate-forme rectangulaire et composé d'un bâtiment central à trois niveaux flanqué de deux pavillons latéraux coiffés par des toits en pavillon couverts de tuiles plates. Les bâtiments agricoles situés de part et d'autre de la cour sont très remaniés.","habitants":"Famille de  la Cropte \r\n        \"","divers":"A Saint-Privat des Près; Graverie grav 4 à 7 GPS : 45° 13' 35\" Nord, 0° 12' 57\" Est                                        Meynardie grav 1 à 3  GPS : 45° 13' 35\" Nord, 0° 12' 57\" Est","gps":"45° 13' 35\" Nord, 0° 12' 57\" Est","images":["../image/image_24/24_St_Privat_Pr%c3%a8s_1.jpg","../image/image_24/24_St_Privat_Pr%c3%a8s_2.jpg","../image/image_24/24_St_Privat_Pr%c3%a8s_3.jpg","../image/image_24/24_St_Privat_Pr%c3%a8s_4.jpg","../image/image_24/24_St_Privat_Pr%c3%a8s_5.jpg","../image/image_24/24_St_Privat_Pr%c3%a8s_6.jpg","../image/image_24/24_St_Privat_Pr%c3%a8s_7.jpg"]},"Consult_chateau_formulairee633":{"id":"Consult_chateau_formulairee633","dept":"24","canton":"Bergerac","commune":"Saint-Sauveur","nom":"St_Sauveur_24","type":"Château","periode":"XVII-XVIII","histoire":"A St-Sauveur le château de Biran, XVIIe siècle,dans un domaine viticole,\r\nde Grateloup, XVIIIe et XIXe siècles, partiellement inscrit aux M.H. depuis 1997, dans un site inscrit depuis 1973, de Tourondel\r\nMaine de Biran (1766-1824), philosophe, vécut en partie au château de Grateloup. Il fut inhumé à Paris mais ses restes furent rapatriés en 1866 à Saint-Sauveur, dans le tombeau de la famille.                                                          GRATELOUP, le château de Grateloup est une ancienne maison-forte transformée qui fut la demeure de Maine de Biran entre 1792 et 1824. Précédé d'un châtelet d'entrée, le corps de logis est encadré par deux pavillons et entouré par des communs et une chapelle construite en 1880, qui délimite une cour intérieure. Le pavillon oriental abrite la bibliothèque contenant de nombreux ouvrages annotés avec le bureau et l'écritoire du philosophe.Le domaine est inscrit au titre des sites depuis le 24 janvier 1973, mais un projet de déviation de la route nationale vers Bergerac, bien que passant hors du site particulièrement restreint, serait très dommageable pour l'environnement du château et justifie son examen en urgence.","architecture":"GRATELOUP est implanté à mi-hauteur, au nord d'une colline dominant le vallon du Caudeau. On accède au porche du château par une allée de platanes centenaires. La cour est encadrée par des communs, une chapelle et le logis dont la façade arrière du XVIIIe siècle donne sur un jardin en terrasse et des prairies. Le logis a l'aspect d'une gentilhommière rustique avec un corps central rectangulaire encadré par deux pavillons. L'aile sud du château n'existe plus.","habitants":"Famille de Maine de Biran \r\n        \"","divers":"A Saint-Sauveur: Biran gra 1 à 3. Grateloup  grav 4-5 GPS : 44° 52' 55\" Nord, 0° 33' 32\" Est","gps":"44° 52' 55\" Nord, 0° 33' 32\" Est","images":["../image/image_24/24_St_Sauveur_24_1.jpg","../image/image_24/24_St_Sauveur_24_2.jpg","../image/image_24/24_St_Sauveur_24_3.jpg","../image/image_24/24_St_Sauveur_24_4.jpg"]},"Consult_chateau_formulaire344c":{"id":"Consult_chateau_formulaire344c","dept":"24","canton":"Vélines","commune":"Saint-Seurin les Prats","nom":"St_Seurin_Prats","type":"Château","periode":"XVIII","histoire":"à Saint-Seurin de Prats quatre châteaux dont celui de Montvert du XVIIe siècle, de Pitray du XVIIIe siècle, de Prats du XVIIIe siècle, inscrit au titre des M.H. en 1963,  du Vigneau du XVIIIe siècle et de Carbonneau\r\nPITRAY, construit au XVIIIe siècle par la famille Puch, vendu ensuite à la famille de Ségur et occupé par Gabriel de Ségur. Général de brigade Puch en juin 83. Le 30/6/86 il est mis à la retraite à sa demande pour raisons de famille. Il se retire au chateau de Pitray qu'il avait fait construire. le château se compose  de deux corps de logis de taille égal organisé en L autour d'une cour intérieure. A la fin du XIXe siècle acquit par le docteur Samuel Armanieux qui y fait construire un troisième bâtiment avec toit en terrasse  bordé de pilastre.                                                                             MONTVERT, la construction date de 1530, suite au mariage d'Emeric de Carrière. Il était le fils dArnaud, seigneur de Montravel, avec Anne de Commarque. La famille Carreyra est implantée dans le pays de Montaigne et Gurson depuis le XIIIe siècle, et les Carreyra étaient les seigneurs de Montravel depuis la fin du XIVe siècle.  C'est la propriété de la famille de Carrière de Montvert depuis le XVIe siècle.","architecture":"PRATS  bâtie fin XVIe - début XVIIe siècle, subsistent quatre fenêtres situées en façade nord des communs. Ces communs, implantés au nord-est et à l'Est du château, sont coiffés de toits à la Mansart. Le château, orienté est-ouest et de forme rectangulaire, a été transformé à la fin du XVIIIe siècle, et sa façade sud a été refaite au début du siècle suivant en style palladien. Cette façade principale présente en son centre un portique surmonté d'un fronton de forme triangulaire que soutiennent quatre colonnes de style dorique. Côté sud, le long de la route qui longe la Dordogne, le domaine est protégé par des grilles de style Empire. L'accès au domaine peut s'effectuer par trois portails dont les deux extérieurs sont encadrés par des piliers de pierre datant probablement de la Restauration. Le château est inscrit au titre des monuments historiques depuis le 30 octobre 1963 pour ses façades et toitures.                                              MONVERT Il ne reste plus de trace delancien manoir de Monvert construit au XIVe siècle: l'actuel château  se présente sous la forme dune chartreuse périgourdine. Il se compose dun corps de logis reconstruit, au XVIIe siècle flanqué de deux ailes disposées en équerre. Construit sur lemplacement dune ancienne forteresse médiévale, le château se trouve au milieu dun parc arboré. Le pigeonnier du domaine, symbole de la richesse et de limportance du seigneur des lieux, est daté de 1654. Son corps hexagonal, monté sur six piles rondes de bois, ressemble à celui du pigeonnier de lAlba, près du pont de la Mérille à Bergerac. Il est possible que ce dernier est  servi de modèle.","habitants":"Pitray Famille Puch                                            Montvert famille Carreyra\r\n        \"","divers":"A Saint-Seurin les Prats;  Prats  grav  1 - 2 GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est. Carbonneau grav 5               Montvert grav 6  GPS : 44° 49' 45\" Nord, 0° 04' 32\" Est.      Pitray grav 3 - 4","gps":"45° 14' 47\" Nord, 0° 41' 11\" Est. Carbonneau grav 5","images":["../image/image_24/24_St_Seurin_Prats_1.jpg","../image/image_24/24_St_Seurin_Prats_2.jpg","../image/image_24/24_St_Seurin_Prats_3.jpg","../image/image_24/24_St_Seurin_Prats_4.jpg","../image/image_24/24_St_Seurin_Prats_5.jpg","../image/image_24/24_St_Seurin_Prats_6.jpg"]},"Consult_chateau_formulaireccdb-2":{"id":"Consult_chateau_formulaireccdb-2","dept":"24","canton":"Lanouaille","commune":"Saint-Sulpice d","nom":"St_Sulpice_Excideuil","type":"Château","periode":"XV-XVIII","histoire":"A Saint-Sulpice le château  d'Igonie, de Labrousse, de Rivière, Prémilhac et au nord-ouest  de St-Sulpice d'excideuil le château de Nanthiat.                         IGONIE  date du XVe au XVIe siècle. Cette maison-forte dépendait très anciennement de la châtellenie d'Excideuil. Jean de Magnac, qui vit apparement à Excideuil.                                                                          LABROUSSE, par sa situation de l'autre côté du vallon et par son histoire Labrousse est difficilement séparable du château de Prémilhac. C'était également un fief des Laroche-Aymon seigneur de Prémilhac. Avant 1578 Aymar de Laroche Aymon s'insalle à Labrouse où il rédige son testament. Labrousse a été vendu au début du XVIIIe siècle au nouveau seigneur d'Ygonie, Jean de Magnac, qui vit apparement à Excideuil. Après la Révolution, ce n'est plus qu'une ferme et l'est resté jusque dans les années 1990. Le château est depuis habité en permanence. Labrousse était qualifié de château en 1665. En fait, c'est une grande maison simple à un seul niveau sur rez-de-chaussée bas, du côté du ruisseau. Elle est flanquée d'une tour octogonale avec une porte gothique du XVe siècle, sommée d'un blason armorié, ouvrant sur une cour, en partie bordée de bâtiments de ferme du XVIIIe, dont l'un surplombe le portail d'accès.\r\n NANTHIAT,  vestiges d'un château remanié au XVIIIe siècle, hormis le donjon carré du XVIe siècle, pas d'information historique.                                           PREMILHAC, ancienne propriété de la famille de Magnac puis des Bareau.    RIVIERE,  il fut naguère la demeure d'André Maurois en 1877  monsieur Picaud en est le propriétaireil appartenait depuis 1793 à un Larioche-Aymon, au XXe siècle  fdut pêndant plusieurs générations à la famille Dujarric de la Rivière, actuellement à la famille Robin.","architecture":"IGONIE,  date du XVe au XVIe siècle, cette maison-forte dépendait très anciennement de la châtellenie d'Excideuil. Le nom primitif était très probablement  Ugonie. De plan rectangulaire, accolé d'une tour d'escalier polygonale au tiers de sa façade sud, le manoir se compose de deux étages sur rez-de-chaussée. L'ensemble des bâtiments ne représente qu'une partie de ce qu'ils étaient autrefois. Le côté ouest est agrémenté de deux petites échauguettes en saillie sur les angles. La tour a conservé une porte à arc en accolade avec un écusson martelé que présente un petit personnage dont seuls la tête et les bras sont visibles. Du sommet de l'accolade s'élève un piédestal formé de trois têtes de cordelières supportant un personnage accroupi dont la tête a disparu. La face Nord a gardé ses ouvertures Renaissance, est inscrit aux M.H.  depuis le 12.05.1965  \r\nRIVIERE, il daterait, dans l'état du XVIIe siècle mais aurait des bases bien plus anciennes. Maintes fois remanié, il aurait été équipé d'une seconde tour au début du XXe siècle. Ce n'est certes pas le plus beau des châteaux du département mais il a un charme indéniable.","habitants":"Famille de  Jean de Magnac,                                         Labrousse fief des Laroche-Aymon\r\n        \"","divers":"A Saint-Sulpice d'Excideuil grav 8 - 9.  ; Igonie grav -1-2 GPS : 45° 23' 03,8\" Nord, 1° 00' 25,5\" Est. Nanthiat grav 3 à 5. Rivière grav 6. Labrousse grav 9","gps":"45° 23' 03,8\" Nord, 1° 00' 25,5\" Est. Nanthiat grav 3 à 5. R","images":["../image/image_24/24_St_Sulpice_Excideuil_1.jpg","../image/image_24/24_St_Sulpice_Excideuil_2.jpg","../image/image_24/24_St_Sulpice_Excideuil_3.jpg","../image/image_24/24_St_Sulpice_Excideuil_4.jpg","../image/image_24/24_St_Sulpice_Excideuil_5.jpg","../image/image_24/24_St_Sulpice_Excideuil_6.jpg","../image/image_24/24_St_Sulpice_Excideuil_7.jpg","../image/image_24/24_St_Sulpice_Excideuil_8.jpg","../image/image_24/24_St_Sulpice_Excideuil_9.jpg"]},"Consult_chateau_formulaire83bd":{"id":"Consult_chateau_formulaire83bd","dept":"24","canton":"Mareuil","commune":"St-Sulpice de Mareuil","nom":"St_Sulpice_Mareuil","type":"Château","periode":"XV-XVI-XVII","histoire":"St-Sulpice de Mareuil, château de la Faye du XVIe et XVIIIe siècles,\r\nde la Vergne du XVe et XVIIe siècles, et son pigeonnier. De Beaurecueil, autrefois Bon Recueil, dès le début du XVIe siècle, ancienne maison de forge avec un pigeonnier. Actuellement centre équestre et chambres d'hôtes.\r\nBEAURECUEIL, la construction date du XVIIe au XVIIIe siècle, était appelé autrefois Bon Recueil, dès le début du XVIe siècle. C'était une ancienne maison de forge avec un pigeonnier. Le domaine appartenait à un maître de forges au XVIIe siècle.Cette gentilhommière champêtre fut la propriété de la famille de La Roussie au XVIIe siècle, puis aux Dussolier, dont Alcide, devenu un des chefs du parti républicain en Dordogne, époux de Marie Marguerite Roux de Reilhac, celui-ci décède au château le 10 mai 1918.  Chambres d'hôtes.                                                                            FAYE, pas d'information historique                              VERGNE,  au XVe siècle, le domaine est le fief des Camain, maîtres de forges.","architecture":"BEAURECUEIL à une demi-lieue au levant de Saint-Sulpice-de-Mareuil, le château de Beaurecueil est une ancienne maison de forge avec pigeonnier, construit au XVIe siècle. Reconstruit aux XVIIIe et XIXe siècles, de la demeure initiale, le château conserve tout de même deux tours à mâchicoulis du XVIIe siècle.  Le château de Beaurecueil abrite aujourdhui un centre de tourisme équestre.                                                   FAYE, est particulier puisqu'il a été construit sur deux époques : un pavillon date du XVIe siècle, des logis du XVIIIe siècle. l'ensemble reste harmonieux, les matériaux utilisés étant semblables. Le style diffère dans l'architecture des fenêtres, à meneaux pour le bâtiment du XVIe, fenêtres simples à volets pour la partie du XVIIIe siècle.                                          VERGNE, dominant la Nizonne, se compose dun logis élevé au XVIIe siècle et dune tour carrée du XVe siècle, rappelant lexistence dun édifice plus ancien.  La tour à mâchicoulis conserve encore des fenêtres attribuables au XVIe siècle. Un cluzeau a été aménagé sous la tour et plusieurs départs de silos sont visibles. De nombreux aménagements intérieurs ont été effectués dans le logis. Il existe un pigeonnier et un moulin restauré qui complètent lensemble. Le pigeonnier est une tour ronde construite en petit appareil et recouverte dun enduit beige, elle se couvre dun toit conique de tuiles plates.","habitants":"Beaureceuil famille de La Roussie                          Vergne fief des Camain\r\n        \"","divers":"A St-Sulpice de Mareuil GPS : 45° 28' 06\" Nord, 0° 30' 27\" Est.             Beaureceuil   grav 5 - 6. Beauregard grav 1 à 4. Vergne   grav-9  GPS : 45° 28' 06\" Nord, 0° 30' 27\" Est. Faye grav 7-8 GPS : 45° 28' 06\" Nord, 0° 30' 27\" Est","gps":"45° 28' 06\" Nord, 0° 30' 27\" Est.             Beaureceuil","images":["../image/image_24/24_St_Sulpice_Mareuil_1.jpg","../image/image_24/24_St_Sulpice_Mareuil_2.jpg","../image/image_24/24_St_Sulpice_Mareuil_3.jpg","../image/image_24/24_St_Sulpice_Mareuil_4.jpg","../image/image_24/24_St_Sulpice_Mareuil_5.jpg","../image/image_24/24_St_Sulpice_Mareuil_6.jpg","../image/image_24/24_St_Sulpice_Mareuil_7.jpg","../image/image_24/24_St_Sulpice_Mareuil_8.jpg","../image/image_24/24_St_Sulpice_Mareuil_9.jpg"]},"Consult_chateau_formulaire24eb":{"id":"Consult_chateau_formulaire24eb","dept":"24","canton":"st-Cyprien","commune":"Saint-Vincent de Cosse","nom":"St_Vincent_Cosse","type":"Château","periode":"XV-XVII","histoire":"ST-Vincent de Cosse, chateau d'Aiguevive et Panassou et Monrecour.  Le territoire communal a été occupé à l'époque gallo-romaine, et a deux kilomètres au sud à Bézenac, le château de Thon du XVIIe siècle inscrit au M.H.                                                        AYGUEVIVE; manoir appelé autre fois Lagilardie ou Lasfargue, flanqué de deux tours circulaires du XVe siècle, construit par les seigneurs de Beynac  appartenait au XIXe sièxcle à la famille Redon.      PANASSOU , en limite de Bézenac, date de la Renaissance. Il a appartenu aux Beynac puis aux Davezac.  \r\nMONRECOURS (ou de Monrecour) est une vaste demeure de style néo-Renaissance,  le château a été la propriété successive des familles Secrestat, David et Escande. \r\nTHON Chambres d'hôtes.","architecture":"AIGUEVIVE    corps de logis entre deux tours circulaires.                                                                        MONRECOURS    De style néo-Renaissance, il recèle un remarquable mobilier dont des boiseries du XVIIe siècle provenant de la chartreuse de Vauclaire. \r\nIl se compose d'un logis orienté est-ouest encadré à l'est par deux tours carrées, le tout éclairé par des fenêtres à meneaux. Il a été aménagé en hôtellerie, restaurant et gites.                                                      PANASSOU, est posé depuis le XVe siècle  Une partie du château aurait été détruite par un incendie et reconstruite ; raison du déséquilibre entre les deux façades. Il se dit même que Napoléon III y serait passé.","habitants":"Famille des Beynac                                             Famille Secrestat\r\n        \"","divers":"A Saint-Vincent de Cosse; Aiguevives grav 1-2 GPS : 44° 50' 28\" Nord, 1° 07' 08\" Est                       Monrecour  grav 3 à 5 GPS : 44° 50' 28\" Nord, 1° 07' 08\" Est                          Panassou grav 7 à9 GPS : 44° 50' 33,4\" Nord, 1° 5' 51,3\" Est. Thon gracv 6.","gps":"44° 50' 28\" Nord, 1° 07' 08\" Est                       Monre","images":["../image/image_24/24_St_Vincent_Cosse_1.jpg","../image/image_24/24_St_Vincent_Cosse_2.jpg","../image/image_24/24_St_Vincent_Cosse_3.jpg","../image/image_24/24_St_Vincent_Cosse_4.jpg","../image/image_24/24_St_Vincent_Cosse_5.jpg","../image/image_24/24_St_Vincent_Cosse_6.jpg","../image/image_24/24_St_Vincent_Cosse_7.jpg","../image/image_24/24_St_Vincent_Cosse_8.jpg","../image/image_24/24_St_Vincent_Cosse_9.jpg"]},"Consult_chateau_formulaireda83":{"id":"Consult_chateau_formulaireda83","dept":"24","canton":"Sainte Alvère","commune":"Sainte-Alvère","nom":"Ste_Alvère","type":"Château","periode":"XIV-XV","histoire":"A cinq kilomètres au sud-Est à  Ste-Foy de Longas le château de Longas.                                                        Ste-ALVERE, vestiges de la tour du château de Sainte-Alvère du XIIIe siècle, inscrits au titre des M.H. le 22 août 1949. Restauré en 1780, ayant appartenu à la famille de Lostanges, fut ensuite incendié par Joseph Lakanal en 1792.    Au cours des siècles ce château sera puissamment aménagé, principalement aux XIVe et XVe siècles.  Au XVIIIe siècle, le château de Sainte-Alvère était l'un des plus beaux du Périgord. Détruit lors de la Révolution, sa démolition fut ordonnée par Lakanal. Il reste une haute tour circulaire du XIIIe siècle découronnée avec des voûtes curieuses, l'enceinte à plusieurs tours qui entourait le village est encore déchiffrable, une porte monumentale et deux tours y subsistent. \r\nLa seigneurie de Sainte-Alvère fut acquise en 1448 par la Maison de Lostanges, qui en garda le titre seigneurial jusqu'en 1927, date de la mort du dernier du nom. À cette famille, appartient Mgr de Lostanges, évêque de Périgueux au début du XIXe siècle.  \r\nLONGAS, de  Jean de Galard seigneur de Limeuil.","architecture":"Au 1er janvier 2016, Sainte-Alvère fusionne avec Saint-Laurent-des-Bâtons pour former la commune nouvelle de Sainte-Alvère-Saint-Laurent .\r\nLONGAS, juché sur le plateau qui borde la Louyre, Au XIVe siècle alors que l'aquitaine est sous domination anglaise, le prince de Galles fait don du château  de Longa à Jean de Galard seigneur de Limeuil. Le château subi des dommages pendant la guerre de cent-ans. A la fin de la guerre au XVe siècle  le seigneur de Longa devient Jean de Larmandie qui délaisse progressivement son château de Miremont pour ne plus habiter qu'à Longa, il fut l'origine de nombreux travaux fossées, pont-levis dont-il ne reste rien. Ce sont les ruines en cours de restauration.","habitants":"Ste Alvère Maison de Lostanges            Longas Jean de Galard\r\n        \"","divers":"A Sainte-Alvère vestiges et château de longa grav 4 à 8","gps":"","images":["../image/image_24/24_Ste_Alv%c3%a8re_1.jpg","../image/image_24/24_Ste_Alv%c3%a8re_2.jpg","../image/image_24/24_Ste_Alv%c3%a8re_3.jpg","../image/image_24/24_Ste_Alv%c3%a8re_4.jpg","../image/image_24/24_Ste_Alv%c3%a8re_5.jpg","../image/image_24/24_Ste_Alv%c3%a8re_6.jpg","../image/image_24/24_Ste_Alv%c3%a8re_7.jpg","../image/image_24/24_Ste_Alv%c3%a8re_8.jpg"]},"Consult_chateau_formulaire1340":{"id":"Consult_chateau_formulaire1340","dept":"24","canton":"Mareuil","commune":"Sainte-Croix de Mareuil","nom":"Ste_Croix_Mareuil","type":"Château","periode":"XVII-XVIII","histoire":"Château de Sainte-Croix, fin du XVIIe siècle- XVIIIe siècle et XIXe siècle, inscrit en 1948 au titre des M.H. Il a été construit par les Laulanié de Sainte-Croix, maîtres de forges. Ils possédaient les forges de la Mouline sur la Couze. Durant la seconde moitié du XIIIe siècle, Philippe de Vienne (1240 - 1303) est seigneur de Sainte-Croix. Le château changera plusieurs fois de propriétaires au cours des successions. Au XXe siècle, il appartient au comte de Varax.","architecture":"Le château a un style classique sobre avec un corps de logis de deux niveaux, entre des pavillons ayant un étage supplémentaire. L'avant-corps central possède un portail porté par des pilastres se terminant avec un fronton triangulaire. La haute toiture en tuiles est agrémentée de lucarnes avec des frontons à coquille.  La construction se compose d'un corps de logis de plan rectangulaire flanqué sur ses angles de pavillons reliés entre eux par un bâtiment à un seul niveau, plaqué contre la façade orientale, qui porte une terrasse à appui-corps en fer forgé. Dans les angles formés par les pavillons et le corps central, ont été établis, à hauteur du demi-étage, de petits balcons sur trompes. Au centre de la façade ouest du logis, s'ouvre une porte en arc brisé, à assises alternées de pierre ocre et noire, que surmonte une petite fenêtre à linteau en accolade. Toutes les autres baies ont des linteaux en arc segmentaire. La cour d'honneur s'ouvre par un portail monumental. Le château possédait un ameublement de qualité dont un salon de tapisseries d'Aubusson figurant les fables de La Fontaine qui est conservé au musée Cognacq-Jay de Paris.","habitants":"Famille des Laulanié de Sainte-Croix\r\n        \"","divers":"A Sainte-Croix de Mareuil;   Ste Croix GPS : 46° 34' 18,5\" Nord, 5° 14' 53\" Est","gps":"46° 34' 18,5\" Nord, 5° 14' 53\" Est","images":["../image/image_24/24_Ste_Croix_Mareuil_1.jpg","../image/image_24/24_Ste_Croix_Mareuil_2.jpg","../image/image_24/24_Ste_Croix_Mareuil_3.jpg","../image/image_24/24_Ste_Croix_Mareuil_4.jpg"]},"Consult_chateau_formulaire43cf":{"id":"Consult_chateau_formulaire43cf","dept":"24","canton":"Thenon","commune":"Sainte-Orse","nom":"Ste_Orse","type":"Château","periode":"XV-XVI","histoire":"SAINTE-ORSE , du XVe et XVIe siècles.  Gentilhommière de La Salle du XVIIIe siècle, transformée en école.   Manoir de La Faye du XVIIIe siècle. Château de Laudonie. Repaire de Peyre-brune. Château de Bussac.  De Redon à la Grange d'Ans.  Entre 1756 et 1789, le village est identifié sous le nom de Saint-Orse, dont la forme masculine est plus conforme à la logique que Sainte-Orse, puisque l'origine provient du nom de l'église : Saint-Ours. \r\nSt-ORSE, cest certainement un conflit avec un autre seigneur ou un vassal qui poussa Pierre de Fanlac, à faire effectuer ces aménagements.     A deux kilomètres à l'est à la Grange d'Ans le château de Redon transformé en hôtel restaurant de classe, a été entièrement rénové en 2013.","architecture":"SAINTE-ORSE la construction date du XVe et XVIe siècle, appartenait alors aux Fanlac, qui le firent fortifier, en 1504. La guerre de Cent Ans vient de se terminer. Les guerres de Religion ne commenceront quau milieu du siècle. Cest certainement un conflit avec un autre seigneur ou un vassal qui poussa Pierre de Fanlac, à faire effectuer ces aménagements.","habitants":"Famille de Fanlac\r\n        \"","divers":"Ste Orse grav 1-2 GPS : 45° 12' 16\" Nord, 1° 04' 35\" Est. Grange Bussac et redon grav 3-4-6. Salles grav-7","gps":"45° 12' 16\" Nord, 1° 04' 35\" Est. Grange Bussac et redon gra","images":["../image/image_24/24_Ste_Orse_1.jpg","../image/image_24/24_Ste_Orse_2.jpg","../image/image_24/24_Ste_Orse_3.jpg","../image/image_24/24_Ste_Orse_4.jpg","../image/image_24/24_Ste_Orse_5.jpg","../image/image_24/24_Ste_Orse_6.jpg","../image/image_24/24_Ste_Orse_7.jpg"]},"Consult_chateau_formulaire2a97":{"id":"Consult_chateau_formulaire2a97","dept":"24","canton":"Montagrier","commune":"Ségonzac","nom":"Ségonzac_24","type":"Château","periode":"XIII-XV-XVI","histoire":"A deux km au nord -est à st Pardoux de Drône plusieurs châteaux  st Pardoux et Tuilières    SEGONZAC, la construction  date du XIIIe siècle. La famille de Bardon de Segonzac, vieille famille de noblesse d'extraction, apparaît pour la première fois en Périgord à la fin du Moyen-Age, dans la paroisse de Lussac, aujourd'hui intégrée à la commune de Saint-Cyprien. Il est tentant de les rattacher à une vieille famille de Bardon, de la province voisine de l'Angoumois, bien présente au XIVe siècle, et surtout à Michel de Bardon, écuyer, qui servit avec sa compagnie sous le commandement de Louis de Sancerre, maréchal de France et qui en 1375 donna quittance de ses gages lors des guerres \"du Roy nostre seigneur\" qu'il avait menées en Flandre contre les Anglais, en Saintonge, Angoumois, Limousin et Périgord. Quoi qu'il en soit, la filiation connue de la famille en Périgord, commence avec \"noble homme\" Guillaume de Bardon qui du fait de sa femme Géraude de Mercat, épousée au début du XVe siècle, fille de Marie Folquier, devint seigneur du château de Migofolquier, paroisse de Lussac. Cette famille Folquier, connue par un hommage du même repaire dès 1307, avait été si connue, localement, que dans certains actes, le fils de Guillaume de Bardon, Jean, est parfois désigné sous le nom de Jean Folquier. Le château de Ségonzac n'est pas inscrit aux M.H.","architecture":"Château de Saint-Pardoux-de-Drône : datant du XIe siècle, il dépendait au XVIe siècle de la seigneurie de Neuvic et avait justice sur la paroisse au milieu de XVIIIe siècle. Il reste que des caves médiévales.\r\nChâteau de la Tuilière (ou de la Tuillière) du Moyen-Âge, dont il subsiste une tour.\r\nManoir du Maine, bâti au XVIe siècle et modifié aux XVIIIe et XIXe siècles.\r\nST-PARDOUX, de la famille de Mellet qui y résidèrent de 1450 à  1630, puis à la famille Guines de Lortal jusqu'à la fin du XVIIe siècle. En 1862 prend le nom de la Tuilière lorsque monsieur de Ségonzac y installe une fabrique de tuiles jusqu'en 1900.                  TUILIERE, la forteresse de St-Pardoux de plan rectangulaire  classique avec une tour dans chaque angles il ne reste du château que la tour nord-ouest cylindriques et qui a perdu ses hautes défenses ainsi que les départs de courtine, fenêtres à meneaux et croisillons sur l'ensemble de l'édifice et une canonnières dans l'allège de la baie de la tour.","habitants":"Famille de Bardon\r\n        \"","divers":"A Ségonzac  château grav 1-2-3-4 GPS : 45° 12' 16\" Nord et 0° 26' 01\" Est. La Martinie grav 7 La Tuillières à St-Pardoux grav 5-6.","gps":"45° 12' 16\" Nord et 0° 26' 01\" Est. La Martinie grav 7 La Tu","images":["../image/image_24/24_S%c3%a9gonzac_24_1.jpg","../image/image_24/24_S%c3%a9gonzac_24_2.jpg","../image/image_24/24_S%c3%a9gonzac_24_3.jpg","../image/image_24/24_S%c3%a9gonzac_24_4.jpg","../image/image_24/24_S%c3%a9gonzac_24_5.jpg","../image/image_24/24_S%c3%a9gonzac_24_6.jpg","../image/image_24/24_S%c3%a9gonzac_24_7.jpg"]},"Consult_chateau_formulairef573":{"id":"Consult_chateau_formulairef573","dept":"24","canton":"Sarlat la canéda","commune":"Sarlat la canéda","nom":"Temniac","type":"Vestiges","periode":"IX-XII-XV","histoire":"TEMNIAC,  fut une commanderie des Templiers avant de devenir la résidence des évêques de Sarlat. Il ne reste aujourd'hui que des ruines de cet ancien château épiscopal. Les ruines du château de Temniac sont classées aux M.H. Le château appartenait en 760 aux comtes de Périgord qui le vendit, en 890, au monastère de Sarlat. Les religieux l'agrandirent. Dès la création de l'évêché de Sarlat, en 1316, le château devint propriété des évêques de Sarlat et le demeure jusqu'à la Révolution. Les batailles contre les anglais laissèrent le château en ruine. En 1424, il est rebâti. lédifice devient donc la maison forte des évêques de Sarlat. La demeure abrite une commanderie des Templiers. en 1560 par le marquis de Dursac, puis en 1562 par le prince de Condé. Durant les guerres de Religion, le château est incendié en 1562. Il est rebâti en 1593. En 1683, le château devient le premier séminaire du diocèse de Sarlat. Confisqué en 1794, il est vendu, sert de bâtiment agricole et finit par tomber en ruine. Les ruines du château de Temniac appartiennent depuis à une association.","architecture":"TEMNIAC, la construction remonte au IXe siècle et au XVe siècle La demeure subit de plein fouet les violences de la guerre de Cent Ans et des guerres de religion. La demeure abrite une commanderie des Templiers. Le château se compose dun vaste logis entouré par une enceinte fortifiée surmontée aux angles par tr
