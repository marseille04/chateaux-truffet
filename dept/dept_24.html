":": 44° 49' 34,3\" Nord, 1° 10' 57,3\" Est","images":["../image/image_24/24_Roque_Gageac_1.jpg","../image/image_24/24_Roque_Gageac_2.jpg","../image/image_24/24_Roque_Gageac_3.jpg"]},"Consult_chateau_formulairea562":{"id":"Consult_chateau_formulairea562","dept":"24","canton":"Saint-Cyprien","commune":"Meyrals","nom":"Roque_Meyrals","type":"Château","periode":"XII-XV","histoire":"La ROQUE, sa construction date du XIIe siècle, peut-être plus ancienne. \r\nFief des de Beynac et des de Beaumont, Christophe de Beaumont archevêque de Paris (1703-1781), y est né et y a été envoyé en exil en 1754 par Louis XV après avoir condamné \"Émile ou De l'éducation\" de Jean-Jacques Rousseau, le roi recherchant l'apaisement dans le conflit avec le Parlement de Paris. En 1948 la famille de Beaumont vend à la famille de Collet et appartient aujourd'hui à la famille de Johaneson. Le château a été inscrit M.H.  le 5 novembre 1927 et les fresques du XVIe siècle décorant l'oratoire ont été classées le 1er octobre 19632.","architecture":"La ROQUE, sa construction date du XIIe siècle, peut-être plus ancienne,  reconstruit au XVe siècle, il est séparé de la colline par une douve sèche, sa cour  intérieure est défendue par un châtelet d'entrée du début du XVIIe siècle, il possède deux logis du XVe bâtis en équerre et deux tours à mâchicoulis, l'une carrée et l'autre ronde, reliées par un pavillon à tourelle aux fenêtres Renaissance. Dans la tour carrée, l'oratoire est orné de remarquables peintures murales du début du XVIe siècle,  les différents corps de logis comportent deux étages sous toiture en ardoise à deux pans. Ils enferment la cour et sont accostés des deux tours rondes à couverture en poivrière et d'une tour carrée à toiture à quatre pans couverte de Lauzes  pierre plate utilisée comme dalle ou comme tuile.","habitants":"Famille de Beaumont \r\n        \"","divers":"A Meyrals; château de la Roque","gps":"","images":["../image/image_24/24_Roque_Meyrals_1.jpg","../image/image_24/24_Roque_Meyrals_2.jpg","../image/image_24/24_Roque_Meyrals_3.jpg","../image/image_24/24_Roque_Meyrals_4.jpg","../image/image_24/24_Roque_Meyrals_5.jpg"]},"Consult_chateau_formulaire952a-2":{"id":"Consult_chateau_formulaire952a-2","dept":"24","canton":"Bergerac","commune":"St-Germain de Mons","nom":"Roques_Mons","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux  à la Roque de Mons, vestiges de la Tour de la Roque, le château de Cussac, de Sireygeol.                                                                          La ROQUE de MONS, en 1273, il est déjà fait mention du Grand Mons, dont lunique survivante serait la Tour de Mons toujours visible aujourdhui.  La propriété qui appartenait à la famille de la Roque de Mons   fut morcelée et vendue en 1861 à plusieurs viticulteurs. En 1882, la demeure fut acquise par un maître de bateau, Jacques Got qui hébergea un visiteur célèbre, William Cody, alias Buffalo Bill, en octobre 1905. Dominant la plaine de Bergerac, lendroit inspira lécrivain régionaliste Armand Got. En 1943, La Roque, lieu de réunion des résistants locaux, fut le théâtre de parachutage darmes, le château, inoccupé, servit de cache, mais après la  guerre, il tomba en ruine. En 1989, la famille Got commença dimportants travaux de restauration, aujourdhui terminés.\r\n MANOIR DE SIREYGEOL, demeure de la fin du XVIIIe, début du XIXe siècle. Elle appartient à la famille de Baillet. Très belle perspective à partir de la façade avant. Malheureusement a labandon.     CUSSAC, elle appartenait au XVIIIe siècle à Marie de Beyne. En se mariant avec Charles de Lard, chevalier et seigneur de la Mespoule, elle lui apporta le château en dot. La terre de Cussac a été depuis vendue à des particuliers qui y font lélevage dovins.","architecture":"La ROQUE de MONS, en 1273, il est déjà fait mention du Grand Mons, dont lunique survivante serait la Tour de Mons toujours visible aujourdhui. Le château de la Roque fut construit en 1774, c'est une chartreuse périgourdine de plain-pied, au corps de logis allongé entre deux petites ailes en retour, se trouve sur le site dune ancienne  tour de guet.                                     TOUR de MONS Tour du XIe - XIIe siècle. En ruine et sur terrain privé. Cette tour carrée, de 4m de haut devait faire partie dun petit ensemble fortifié.      CUSSAC, grande bâtisse rectangulaire du XVIIe siècle.","habitants":"Famille de la Roque de Mons   ,                                Famille de Jacques                                                      Got Famille de Baillet\r\n        \"","divers":"A St-Germain de Mons ; vestiges ancien château grav 1. Cussac grav 2-3. Siregeol grav 4","gps":"","images":["../image/image_24/24_Roques_Mons_1.jpg","../image/image_24/24_Roques_Mons_2.jpg","../image/image_24/24_Roques_Mons_3.jpg","../image/image_24/24_Roques_Mons_4.jpg","../image/image_24/24_Roques_Mons_5.jpg"]},"Consult_chateau_formulairefcc4-2":{"id":"Consult_chateau_formulairefcc4-2","dept":"24","canton":"Vergt","commune":"Chalagnac","nom":"Rossignol","type":"Château","periode":"XV-XVIII","histoire":"ROSSIGNOL  du XVe et XVIIIe siècle. Brugière dit: \"c'est la maison la plus importante de la paroisse, elle appartient au XIXe siècle à la famille DE Rouméjoux le château possédait une chapelle, avant cette date il était occupé par la famille Fayard et à la Révolution par la famille Bertin.\" Le château médiéval est cité comme manoir en 1465, on parle du \"Maynamentum de la Rossinholie\" c'est-à-dire domaine de Rossignol, il faut attendre 1620 pour connaître le maître des lieux Jean de Montferrand écuyer, en 1640 le capitaine Lavergne poursuivi par Geletty s'y réfugie lors de la révolte \"força la maison et fit périr Lavergne et 32 malheureux.\" En 1684, le propriétaire est Jean Charrière de Chalagnac puis le Chapitre de Périgueux qui le vendra en 1757 à trois membres de la famille Bertin. Ce fut mademoiselle Marguerite Bertin de Belle-Isle de Creyssensac qui fit construire le château neuf achevé en 1778. La demeure ensuite passa au Rouméjoux, c'est Anatole de Rouméjoux qui fut inhumé en 1902 dans la petite chapelle du château. Il est maintenant la propriété de la famille Brou de Laurière.","architecture":"ROSSIGNOL, est l'ancien fief des Saint-Auvent de la Chauffye et des Belle-lsle-de-Creyssensac, puis propriété des Fayole et des de Roumejoux. Château datant des XVe et XVIIIe siècles, qui servit de refuge au croquant révolté, le capitaine Grellety. Il conserve un corps de bâtiment de l'époque médiévale (en 1465, on parle du Maynamentum de la Rossinholia). On y construisit, entre 1775 et 1778, un gros logis entre des pavillons. Cet ancien manoir fut aux dames de Belle-Isle-de-Creyssensac, soeurs de Bertin, ministre de Louis XV. Ces dames passent pour avoir fait planter les premières pommes de terre en Périgord, l'année de leur présentation à l'académie de Besançon par Parmentier. Corps de logis rectangulaire à deux niveaux avec lucarnes sur un toit brisés, encadré de pavillons carré sur angles.","habitants":"Famille DE Rouméjoux                                            Jean de Montferrand \r\n        \"","divers":"A Chalagnac château de Rossignol.","gps":"","images":["../image/image_24/24_Rossignol_1.jpg","../image/image_24/24_Rossignol_2.jpg"]},"Consult_chateau_formulaire642e":{"id":"Consult_chateau_formulaire642e","dept":"24","canton":"Mareuil","commune":"Rudeau-Ladosse","nom":"Rudeau_Ladosse","type":"Château","periode":"XII-XVI-XVIII","histoire":"Château de Bellussière du XIe siècle XIIe siècle, inscrit aux monuments historiques depuis 1948, chambres d'hôtes.\r\nChâteau des Combes du XVIe siècle. Gentilhommière de la Rousselière du XVIIe siècle, aujourd'hui centre éducatif\r\nRUDEAU, en 1782 Alexis de Fayard gouverneur du château-Poncien, seigneur des Combes et de Ladosse, pour payer ses dettes, loue pour 3 ans le château des Combes à Claude du Souchet seigneur de Narbonne et lui vend son mobilier, dont les livres de la bibliothèque, les objets de la chapelle et 37 orangers ou citronniers dans l'orangerie. (Acte retenu par le notaire Laugère). En 1950, la commune de Ladosse prend le nom de Rudeau-Ladosse. \r\nBELLUSSIERE,  c'était autrefois   le domaine des Pompadour et des Faurien, la demeure passa au XVIIe siècle aux Grand de Bellussière, prolifique famille qui peuplait les châteaux de la région, sculptant les trois dragons de ses armes sur les voutes de l'église de Beaussac en 1636  où son banc seigneurial existe toujours, dument armorié lui aussi. Le château de Bellussière appartient actuellement à la famille de Vandières.","architecture":"BELLUSSIERE, le château de Bellussière se compose d'un corps de logis avec fenêtres à meneaux, tour circulaire, tourelle en encorbellement et chapelle. Le donjon, dont la forme en fer de lance est assez rare, ferait remonter sa construction au XIe siècle.          ROUSSELIERE, ce château a appartenu à plusieurs grandes familles comme les La Roussie, les Juglard, les Lamyde la Chapelle et les de Bellussière. Grande demeure édifiée au XVIIIe siècle, ce château domine la rivière de la Lizonne. L'édifice en pierre est recouvert partiellement dun enduit de couleur beige et se compose dun corps de logis à un étage, flanqué de deux hauts pavillons, possédant quant   à eux deux étages. Les trois parties de la demeure possèdent des toits à pavillon recouverts dardoises. Le château de la Rousselière est aujourdhui un centre de rééducation pour les jeunes délinquants.","habitants":"Famille des   Grand de Bellussière\r\n        \"","divers":"A Rudeau-Ladosse; Belussière grav 1-2-3-4. Rousselière grav 5-6. Combes grav 7.","gps":"","images":["../image/image_24/24_Rudeau_Ladosse_1.jpg","../image/image_24/24_Rudeau_Ladosse_2.jpg","../image/image_24/24_Rudeau_Ladosse_3.jpg","../image/image_24/24_Rudeau_Ladosse_4.jpg","../image/image_24/24_Rudeau_Ladosse_5.jpg","../image/image_24/24_Rudeau_Ladosse_6.jpg","../image/image_24/24_Rudeau_Ladosse_7.jpg"]},"Consult_chateau_formulaire6972":{"id":"Consult_chateau_formulaire6972","dept":"24","canton":"Excideuil","commune":"Salagnac","nom":"Salagnac","type":"Château","periode":"XV-XVIII","histoire":"SALAGNAC , ou château de Bellegarde, où serait né au XIIe siècle le troubadour Bertran de Born, existait encore au XVIIIe siècle mais il n'en restait plus rien en 1974.\r\nREYNAUDIE, ou de las Reynaudias, vestiges  du XVIIe siècle.\r\nA un kilomètre au sud à Ste-Trie le château de Dalon, et a quelques kilomètres au nord oust à Génis le château Falaisie  dont  La construction  date du XVIIe siècle .                                                                               A deux kilomètres au nord-ouest à Génis, le château est en ruines aujourd'hui.  Le manoir de FALAISIE   dont la  construction  date du XVIIe siècle.","architecture":"DALON, l'ancien logis abbatial de Dalon est une abbaye bâtie à Sainte-Trie, La construction du logis date du XIIIe au XVIIe siècle est accolé aux vestiges de l'abbaye de Dalon. Cette abbaye est l'une des 4 abbayes cisterciennes du Périgord. Dépendant de la Vicomté de Limoges, elle a été fondée au début du XIIe siècle. De la chapelle, il reste la partie romane à ouvertures cintrées sur la face Nord et Ouest, ainsi que des colonnes à chapiteaux du XIVe siècle sur la face Est. La salle capitulaire, à gros pilier central, a été englobée dans les bâtiments du XVIIe siècle, formant le château actuel qui se compose d'un corps de logis barlong prolongé au Nord par les ruines de la chapelle et, terminé au Sud par un pavillon faisant saillie. Le site se trouve dans un vallon arrosé par le Dalon, selon la coutume cistercienne qui établissait ses monastères dans des fonds irrigués par des sources naturelles. Le Logis abbatial de Dalon est devenue une habitation privée, il est inscrit aux M.H. le 27/09/1947.","habitants":"troubadour Bertran de Born\r\n        \"","divers":"A Salagnac.   Dalon à st-Trie  grav 1GPS : 45° 17' 49\" Nord, 1° 12' 02\" Est.                                        Falaisie  grav 2 à Genis 45° 19' 37\" Nord, 1° 09' 52\" Est.         Genie Renaudias grav 3  1° 09' 52\" Est","gps":"45° 17' 49\" Nord, 1° 12' 02\" Est.","images":["../image/image_24/24_Salagnac_1.jpg","../image/image_24/24_Salagnac_2.jpg","../image/image_24/24_Salagnac_3.jpg"]},"Consult_chateau_formulairedb3a":{"id":"Consult_chateau_formulairedb3a","dept":"24","canton":"Salignac-Eyvignes","commune":"Salignac-Eyvignes","nom":"Salignac","type":"Château","periode":"XII-XVI","histoire":"A Salignac le château de Barbeyroux, du Claux du XV-XVIe siècles, de Salignac-Fenelon  du XII au XVIe siècles, de Touljou lieu de naissance de Gautier de Costes de La Calprenède, Manoir d'Eyvignes du XVI-XVIIe siècles, manoir d'Eyrignac du XVII-XVIIIe siècles et le manoir d'Eybènes du XV-XVIe siècles  (Pour certains voir article suivant)                                             SALIGNAC, château dit le CLaux, au XIIe siècle  les Salignac sont vassaux des comtes de Toulouse puis des vicomtes de Turenne jusqu'au XVIe siècle, le précepteur du petit-fils de Louis XIV, François de Salignac de la Mothe-Fénelon, archevêque de Cambrai.  En 1434, en épousant Richard de Gontaut seigneur de Badefol, Jeanne de Mainfroy de Salignac lui apporte en dot la baronnie de Salignac. au XVIe siècle la seigneurie  unifiée entre les mains de Bertran d de Salignac quitte la famille de ses premiers tenaciers  Jeanne de Salignac épouse Armand de Gontaud-Biron seigneur de Puybetou et de Madeillan et lui apporte le domaine paternel , avec elle s'arrête la lignée directe des Salignac. La famille se continue  en 1912 cependant par la branche des Salignac-Fénelon.  François de Gontaut-Biron petit-fils d'Armand meurt en 1623  sans postérité  directe, la seigneurie élevée au rang de Baronnie est vendu à la famille de Montmèges de Pelvézy, en 1672 Jean de Reilhac marquis de Montmège, en 1720 Salignac est cédé aux Noailles. Deux siècles plus tard en 1912 le vicomte de Salignac-Fénelon se porte acquéreur du château . La demeure a appartenu  aux Vigier, aux dAnglars et aux de Génis.","architecture":"SALIGNAC, château fort des Salignac-Fénelon, du XIIe et XVIe siècles, inscrit depuis 1969 au titre des M.H. le mur den face est sculpté, quant à lui, de cariatides mi-nues et de cartouches mythologiques. La Révolution entraîne, à la fin du XVIIIe siècle, d'importantes transformations du bourg dont la création de nouvelles places. Le château bâti sur une butte aménagées en deux terrasses de dimensions inégales soutiennent de puissantes murailles associé des bâtiments d'époques successives, sur la terrasse supérieure est représenté par un donjon roman à contreforts plats, amputé  de ses parties supérieures.  Au XVe siècle la reconstruction des corps de logis éclairé par des baies à meneaux à encadrements moulurés est flanqué à l'ouest d'une haute tour carrée coiffée d'un toit en pavillon reliée par une courtine au donjon. A l'Est le corps de logis est cantonné de deux tours l'une ronde l'autre de forme semi-cylindrique  contient un escalier à vis, une campagne de reconstruction plus tardives a donné son aspect actuel.","habitants":"Salignac  Famille  de Salignac-Fénelon\r\n        \"","divers":"A Salignac-Eyvignes; Salignac grav 1à 7 GPS : 44° 58' 29,5\" Nord et 1° 19' 35,9\" Est","gps":"44° 58' 29,5\" Nord et 1° 19' 35,9\" Est","images":["../image/image_24/24_Salignac_1.jpg","../image/image_24/24_Salignac_2.jpg","../image/image_24/24_Salignac_3.jpg","../image/image_24/24_Salignac_4.jpg","../image/image_24/24_Salignac_5.jpg","../image/image_24/24_Salignac_6.jpg","../image/image_24/24_Salignac_7.jpg"]},"Consult_chateau_formulaire186d-2":{"id":"Consult_chateau_formulaire186d-2","dept":"24","canton":"Salignac-Eyvignes","commune":"Salignac-Eyvignes","nom":"Salignac_Eyvignes","type":"Château","periode":"XV-XVIII","histoire":"EYRIGNAC,  il est inscrit avec ses jardins remarquables  création du XXe siècle dans le goût du XVIIIe siècle. Le château actuel fut rebâti en 1653-1660 par Antoine de Costes de la Calprenède. Son arrière petit-fils Gabriel entreprit au XVIIIe siècle la création d'un jardin classique. Le domaine est abandonné après la guerre de 1914-1918 jusqu'aux années 1960 que Gilles Sermadiras de Pouzols de Lile, père de Patrick, lactuel propriétaire crée un jardin en s'appuyant sur les éléments classiques retrouvés.                                                                        \r\nTOULGOU, cette maison a vu naître le romancier et dramaturge Gauthier de Costes de La Calprenède. Cet auteur prolifique, très populaire au XVIIe siècle et notamment apprécié des précieuses et de madame de Sévigné, est aujourdhui tombé dans loubli.      CLAUX, ou Claux  La demeure a appartenu successivement aux Vigier, aux dAnglars et aux de Génis. Le château du Claux appartient à la famille Cortès, car il s'agit d'un château privé. Ses bois, terres, et autres domaines lui appartenant sont également privés.   En 1476, on relève  un Guillaume d'Anglars qui veille sur ses biens en 1836, un général d'Anglars, héros de Valmy, s'y éteint. Le château fait l'objet d'un classement au titre des M.H. depuis le 29 mai 2001.     LE CLAUD La demeure a appartenu successivement aux Vigier, aux dAnglars et aux de Génis. Sur des bases remontant au XIIIe siècle, les bâtiments du château du Claud datent du XVe et XVIe siècles.","architecture":"BARBEYROUX,  de plan rectangulaire à deux niveaux toits a deux pans accolé en façade de deux tours l'une carrée à colombage sur encorbellement  l'autre ronde.  CLAUX, sur des bases remontant au XIIIe siècle, sur des bases remontant au XIIIe siècle, les bâtiments du château du Claud datent du XVe et XVIe siècles, les bâtiments du château du Claud datent du XVe et XVIe siècles. Deux corps de logis se soudent en équerre par une tour circulaire terminent par deux grosses tours à mâchicoulis l'une ronde, l'autre carrée avec ses beaux toits en lauzes, cet ensemble reconstruit au XV-XVIe siècle,  était à l'origine fermé par une double enceinte dont subsiste le châtelet du XIVe siècle à mâchicoulis, donjon quadrangulaire du XIVe siècle entre les deux tours du logis du XVe siècle avec tour d'escalier.   Le château du XIVe siècle fut partiellement détruit pendant la guerre de  cent ans, puis reconstruit à la fin XVe siècle ou début XVIe siècle.                                EYRIGNAC  Le château est précédé au sud d'une cour communiquant à l'ouest vers les communs ; au sud, deux pavillons carrés ponctuent les angles sud-ouest et sud-est de la cour ; le logis rectangulaire, simple et équilibré, comporte côté Sud, 2 niveaux et un haut comble à toit d'ardoises ; à l'Ouest, les communs, partiellement couverts de lauzes, sont formés de 2 ailes perpendiculaires.                                                     TOULGOU,  est un vestige de ce qui devait être un petit village du même nom. Le manoir est construit au XVIe siècle, darchitecture modeste, il se compose dun seul corps de logis, accosté dune tour carrée à colombages. Au XVIIIe siècle, la demeure est transformée en exploitation agricole.","habitants":"Eyrignac  des  Costes de la Calprenède                  Touglou de Gauthier de Costes de La Calprenède.\r\n        \"","divers":"A Salignac-Eyvignes;  Barbeyroux grav 1-2              Claux grav 6-7  GPS : 44° 56' 41\" Nord 1° 21' 40\" Est    Eyrignac Grav 3-4 GPS : 44° 56' 26\" Nord, 1° 18' 54\" Est                                                                                    Toulgou grav 5 GPS : 44° 58' 31\" Nord, 1° 19' 24\" Est","gps":"44° 56' 41\" Nord 1° 21' 40\" Est    Eyrignac Grav 3-4 GPS : 4","images":["../image/image_24/24_Salignac_Eyvignes_1.jpg","../image/image_24/24_Salignac_Eyvignes_2.jpg","../image/image_24/24_Salignac_Eyvignes_3.jpg","../image/image_24/24_Salignac_Eyvignes_4.jpg","../image/image_24/24_Salignac_Eyvignes_5.jpg","../image/image_24/24_Salignac_Eyvignes_6.jpg","../image/image_24/24_Salignac_Eyvignes_7.jpg"]},"Consult_chateau_formulairedfb1":{"id":"Consult_chateau_formulairedfb1","dept":"24","canton":"Sarlat la Canéda","commune":"Sarlat la Canéda","nom":"Sarlat_Canéda","type":"Patrimoine-Château","periode":"XIV-XVII","histoire":"Sarla  A Sarlat la bâtisse de la Boétie, château de Campagnac de la Selve                                                  BOETIE, a été construite par Antoine de La Boétie, lieutenant  de la sénéchaussée de Sarlat, entre 1520 et 1525. Étienne de La Boétie, l'ami de Michel de Montaigne, y est né le 1er novembre 1530. Bâti par les grands parents d'Etienne de la Boétie l'illustre ami de Montaigne, qui passa les premières années de sa vie au château. Anne, la soeur d'Etienne, hérita du château, elle s'est mariée avec Jean Le Bigot, écuyer, seigneur de Saint-Quentin et a transmis le château à son fils, Berthomieu Le Bigot.   Celui-ci vit la bâtisse détruite durant les guerres de Religion en 1589, mais il reconstruisit la demeure tout de suite. La maison a été restaurée en 1910, après son classement en 1889. Pour la restauration de la façade sur la place du Peyrou les architectes des M.H. ne se sont pas contentés de restaurer la façade mais de la restituer dans sa forme qui paraissait la plus achevée. Le château est acheté aux Roffignac par les Veyssières de Puylebreuil. Il passe ensuite aux Monzie de Lasserre, aux Philopald, aux Bigot puis à la famille de Gérard du Barry.  Les meneaux des fenêtres ont été refaits. \r\nCAMPAGNAC, est un édifice construit entre le XIVe et le XVIe siècle. Il se situe à 4,7 km au nord ouest de la commune de Sarlat-la-Canéda.  Son propriétaire actuel est le département de la Dordogne, le château est partiellement entouré d'une douve, se trouve au milieu d'un parc, qui est ouvert au public.\r\nSELVE, située à Sarlat-la-Canéda, la Fondation de Selves a été fondée en 1965. Elle offre aux enfants et adolescents un espace de vie arboré et historique.","architecture":"LA BOETIE   Un chemin donne accès à une terrasse sur laquelle est élevée l'habitation possédant un haut corps de logis cantonné de tours rondes (la tour sud contient un escalier à vis. La façade de la maison sur la place du Peyrou a été construite dans le style de la Renaissance italienne mise à la mode par François Ier après les guerres d'Italie. La maison reprend les dispositions traditionnelles de maisons patriciennes urbaines, avec un rez-de-chaussée pouvant être public et pouvant être destiné à abriter une échoppe. Le premier étage est l'étage noble, réservé au propriétaire et où il reçoit. Un passage publique permet d'accéder à une cour où se trouve l'extension de la maison. Cette seconde maison est perpendiculaire à la première,  l'intérieur, de la maison n'a conservé de son décor initial qu'une cheminée Renaissance. Le toit de lauzes, les combles et les charpentes ont conservé leur authenticité.                                                                      CAMPAGNAC, racheté par la commune en 1980.  il est laissé depuis en ruines, les coûts de sa rénovation étant estimés à 2 millions d'euros. Depuis 2007, le château de Campagnac appartient au département de la Dordogne qui y a installé les services scientifiques et  administratifs du pôle International de la préhistoire (PIP). Il s'inscrit dans un cadre sylvestre; les logis en équerre  sont soudés par une tour polygonal d'escalier datant de la Renaissance et ils sont flanqués d'un donjon carré à mâchicoulis et d'une importante tour circulaire, le château possède encore une chapelle et une vieille tour du XIIe siècle qui est un poste de surveillance des troupes anglaises.\r\nGISSON, l'hôtel de Gisson (ou hôtel de Chassaing) date du XVe et XVIe siècle. Il est classé aux M.H. depuis 1969. Musée, sous le nom de manoir de Gisson, sur le thème : « Entrez dans la bourgeoisie sarladaise du XVIIe siècle","habitants":"Les Evêques de Sarlat\r\n        \"","divers":"A Sarlat la Canéda, divers châteaux. La Boétie grav 2-3. Campagnac grav 5-6. Cheval Blanc grav 7. Selve grav 8","gps":"","images":["../image/image_24/24_Sarlat_Can%c3%a9da_1.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_2.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_3.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_4.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_5.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_6.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_7.jpg","../image/image_24/24_Sarlat_Can%c3%a9da_8.jpg"]},"Consult_chateau_formulaire1650":{"id":"Consult_chateau_formulaire1650","dept":"24","canton":"Sarlat la Canéda","commune":"Sarlat-la-Caneda","nom":"Sarlat_Patrimoine","type":"Château","periode":"XV-XVI","histoire":"SARLAT, Campagnac du XIVe siècle XVIe siècle. Boetie. Gisson  ou hôtel de Chassaing,  XVIe siècle, classé M.H. depuis 1969, musée.  Ruines du château de Temniac et du Cheval Blanc, vestiges de l'enceinte tour du bourreau et les restes partiels des anciens remparts.                                                                           SARLAT, du XVIIe siècle à 1789 : Cest une fois de plus sur une ville ravagée par les guerres que souvrent un siècle nouveau. Lévêque Louis II de Salignac entre 1602 et 1639 favorise linstallation de nouveaux ordres durant la contre-réforme ce qui favorise la reconstruction et la rénovation de Sarlat. Les Pénitents bleus et blancs sinstallent dans la ville entre 1607 et 1608. En 1694, comme en témoigne Jean Tarde arrivent les Jésuites à Sarlat. Ces installations témoignent du raffermissement de la foi catholique. Cela montre lurgence de remettre en état les édifices religieux. Mais cet élan est interrompu par la Fronde. Certains évêques tentent de restaurer des monuments et lancent de nombreux chantiers. \r\nLa Révolution Française : De nombreux monuments religieux mais aussi civils ont souffert durant la Révolution. Les édifices religieux changent parfois complétement de fonction. Sarlat est en incapacité de racheter tous ses biens. Le transfert foncier de lEglise à Sarlat reste donc assez peu important. Le parcellaire religieux à cette époque se densifie, et la période révolutionnaire bouleverse loccupation des sols et la prééminence du bâti religieux.","architecture":"Capitale du Périgord noir, aux confins des causses du Quercy, cette cité historique est un site touristique majeur, renommé pour sa parure monumentale datant essentiellement de la période médiévale et du début de la Renaissance (du XIIIe au XVIe siècle). Son centre-ville, d'une grande homogénéité, est ainsi composé d'un lacis de ruelles et de venelles pittoresques, de placettes ombragées, bordées d'hôtels particuliers aux toits de lauze, dont les plus célèbres sont la maison de La Boétie, l'hôtel du Barry, l'hôtel de Savignac ou encore le présidial. Centre névralgique de la ville, la place de la Liberté, bordée de terrasses, est le siège du marché. Dans son prolongement, s'ouvrent en perspective la cathédrale Saint-Sacerdos et le palais des évêques, qui rappellent que Sarlat a été cité épiscopale pendant plusieurs siècles. Possédant un ensemble urbain médiéval parmi les plus importants du monde, Sarlat a été la première ville à bénéficier de la loi Malraux, en 1964. Cette petite cité périgordine, visitée par plusieurs centaines de milliers de touristes chaque année, sert également ponctuellement de cadre à des films historiques.","habitants":"Famille d'Étienne de La Boétie\r\n        \"","divers":"A Sarlat ,  GPS : 44° 53' 34\" Nord, 1° 12' 55\" Est. L'ancien évéché, hôtel Girard, de St-Clar, de Vassal, la Tour du bourreau, Gisson et la lanterne des morts, la maison de la boétie","gps":"44° 53' 34\" Nord, 1° 12' 55\" Est. L'ancien évéché, hôtel Gir","images":["../image/image_24/24_Sarlat_Patrimoine_1.jpg","../image/image_24/24_Sarlat_Patrimoine_2.jpg","../image/image_24/24_Sarlat_Patrimoine_3.jpg","../image/image_24/24_Sarlat_Patrimoine_4.jpg","../image/image_24/24_Sarlat_Patrimoine_5.jpg","../image/image_24/24_Sarlat_Patrimoine_6.jpg","../image/image_24/24_Sarlat_Patrimoine_7.jpg","../image/image_24/24_Sarlat_Patrimoine_8.jpg","../image/image_24/24_Sarlat_Patrimoine_9.jpg"]},"Consult_chateau_formulaire2769":{"id":"Consult_chateau_formulaire2769","dept":"24","canton":"Savigniac les Eglises","commune":"Sarliac sur Isle","nom":"Sarliac_sur_Isle","type":"Château","periode":"XV-XVI-XVII","histoire":"Château de la Vigerie, implanté sur Sorges et sur Sarliac-sur-l'Isle, \r\nManoir du Cheyron du XVIe siècle,   Manoir de Grézignac du XVe siècle. Manoir de Sarliac dans le bourg, Manoir de la Dulgarie et son pigeonnier du XVIIIe siècle. \r\nCHEYRON , grosse demeure rectangulaire du XVIIe siècle berceau de la famille du Cheyron restauré par la famille Ginestie parents de l'actuelle propriétaire madame Denis.                                                       DULGARIE,  manoir reconstrtuit par Léon du Cheyron ancien maire de Sarliac,  vers 1870 il sera leur fief jusqu'au début du XXe siècle, aujourd'hui les frères Doumen transporteurs.","architecture":"BONNETIE, la construction  date du XVIe au XVIIe siècle. Il se présente sous la forme d'un logis flanqué de deux tourelles carrées. Cet ancien manoir comprend un corps de logis, coupé de chaque côté, en son milieu, par des tours carrées formant une croix. Il se présente sous la forme d'un logis flanqué de 2 tourelles carrées. Il a conservé, au Sud, un pigeonnier du XVIIe siècle, et a conservé quelques-unes de ses fenêtres à meneaux, a été superbement restauré. Sur l'une des tours, la fenêtre à meneaux est richement ornée de fleurs de lys dans le bandeau mouluré de la fenêtre, et de feuilles de lierre sous l'appui de cette fenêtre. Cette fenêtre paraît être du milieu du XVIe siècle.  Il est inscrit aux M.H depuis le 16/12/1947 pour une tourelle.                           \r\nGREZIGNAC, date du XVe siècle, se situe en rive droite de l'Isle au Sud-Ouest de Sarliac-sur-l'Isle,  le logis date des XVe et XVIe siècles dans lequel s'inscrit une tour d'escalier  polygonale, deux ailes remontant aux XVIIe et XVIIIe siècles complètent l'ensemble.","habitants":"Famille du Cheyron \r\n        \"","divers":"A Sarliac sur Isle; Bonnetie grav 2-3: 45° 14' 27\" Nord, 0° 52' 46\" Est. Dulgarie grav 5-6.=   Grézignac  grav 7-8 GPS : 45° 13' 56\" Nord, 0° 52' 07\" Est","gps":"45° 13' 56\" Nord, 0° 52' 07\" Est","images":["../image/image_24/24_Sarliac_sur_Isle_1.jpg","../image/image_24/24_Sarliac_sur_Isle_2.jpg","../image/image_24/24_Sarliac_sur_Isle_3.jpg","../image/image_24/24_Sarliac_sur_Isle_4.jpg","../image/image_24/24_Sarliac_sur_Isle_5.jpg","../image/image_24/24_Sarliac_sur_Isle_6.jpg","../image/image_24/24_Sarliac_sur_Isle_7.jpg","../image/image_24/24_Sarliac_sur_Isle_8.jpg"]},"Consult_chateau_formulaire4954-2":{"id":"Consult_chateau_formulaire4954-2","dept":"24","canton":"Sigoulés","commune":"Saussignac","nom":"Saussignac_Fayolle","type":"Château","periode":"XIV-XVII","histoire":"A Saussignac  dont le château de Saussignac, de Lenvège.                                                                        Fayolles du XVIIe siècle sur des vestiges datant du XIVe siècle.                                                          SAUSSIGNAC, fut donnée par Marguerite de Turenne à Hélie dEstissac en 1286. Trois siècles plus tard le dernier dEstissac fut tué dans un célèbre duel par Biron, linfidèle ami du roi Henri IV. Aux Estissac succédèrent les Caumont Lauzun dans la possession des terres de Saussignac. Le père du duc de Lauzun, délégante et amoureuse mémoire, vendit la seigneurie à Pierre dEscodera de Boisse lun des grands hommes de guerre du temps de louis XIII.  Le dernier seigneur de Saussignac fut Emmanuel-Louis, marquis de Pont St Maurice, lieutenant général et ambassadeur  qui joua un rôle considérable dans la politique des dernières années du règne de Louis XVI.\r\nLENVEGE, des tours de Lenvège : Il évoque le souvenir de la chevaleresque famille dEstissac. Construit aux alentours de 1250 il fut le siège de la première baronnie de Saussignac. En 1345, le château est assailli par le comte de Derby mais il fut vaillamment défendu par Hélie Fergand II seigneur dEstissac et une troupe de soldats de Du Guesclin. Les dames du château de Lenvège ont été citées dans la littérature : Rabelais y séjourna. Brantome y aima, sans succès, une de ses châtelaines et y consacra des vers Montaigne dédia à cette même dame un chapitre de ses Essais.","architecture":"SAUSSIGNAC, Anne  de Caumont, la plus belle riche et peut-être la plus belle héritière de France dont la vie devait être un tumultueux roman. Aux Estissac succédèrent les Caumont-Lauzun dans la possession de Saussignac. Pierre dEscodera de Boisse cest ce dernier qui fit commencer le château, mais il ne put en terminer la construction. Assassiné par les protestants en 1621,sa mort arrêta les travaux qui ne furent repris quau siècle  suivant et ne furent jamais achevés. Ce château occupe la partie la plus élevée du bourg développe ses deux énormes pavillons et ses trois corps de logis mansardés avec limposante grandeur des habitations seigneuriales de XVIIe siècle. Il avait le titre de baronnie et sa juridiction comprenait cinq paroisses qui forment aujourdhui trois communes de Sigoulès(Dordogne) : Saussignac, Monestier et Razac.\r\nLENVEGE, composé d'un corps de logis de deux niveaux et attiques inséré entre deux tours carrées à trois et quatre niveaux  toits en croupes.","habitants":"marquis de Pont St Maurice,                                        Lenvège famille dEstissac\r\n        \"","divers":"A Saussignac château de Fayolle grav 1 à 6, Viguiers grav 7. Lanvège grav 8-9.","gps":"","images":["../image/image_24/24_Saussignac_Fayolle_1.jpg","../image/image_24/24_Saussignac_Fayolle_2.jpg","../image/image_24/24_Saussignac_Fayolle_3.jpg","../image/image_24/24_Saussignac_Fayolle_4.jpg","../image/image_24/24_Saussignac_Fayolle_5.jpg","../image/image_24/24_Saussignac_Fayolle_6.jpg","../image/image_24/24_Saussignac_Fayolle_7.jpg","../image/image_24/24_Saussignac_Fayolle_8.jpg","../image/image_24/24_Saussignac_Fayolle_9.jpg"]},"Consult_chateau_formulaire7158":{"id":"Consult_chateau_formulaire7158","dept":"24","canton":"Montignac","commune":"Aubas","nom":"Sauveboeuf","type":"Château","periode":"XIV-XVII","histoire":"SAUVEBOEUF, les premières mentions du domaine de Sauvebuf dans les sources écrites datent du milieu du XIVe siècle. On sait alors que le château devient la propriété de la famille De Ferrières, vassal des seigneurs de Montignac. Jean de Ferrières seigneur de Sauveboeuf , de la Brunie et de Pont Breton et en 1483 maître des eaux et forêts, Elie son fils possède Sauveboeuf et Aubas de la Robertie et de la Brunie son petit-fils Jean  épouse Claude des Cars lui apporte une confortable fortune achète de nombreuses terres et fait agrandir Sauveboeuf. Au cours des siècles, et ce jusquau milieu du XVIIIe, la famille De Ferrières, par des jeux dalliance, se développe au sein de la noblesse française. Charles  Antoine de Ferrières de son second mariage avec Marie-Claude de Rousier  dame de Chénorac, un fils unique Charles -Joseph la fille de se dernier Anne -Thérése de Férrières marquise de Vassan hérite Geneviève de Vassan épouse en 1743,  Victor Riquetti marquis de Mirabeau, père du célèbre révolutionnaire français, et appartient à la famille une soixantaine dannées. Au cours du XIXe siècle, lédifice appartient  aux familles Chassagnac Latrade, Dehÿs et Baillemont. En 1891, la famille Oberkampf, célèbre notamment grâce à sa manufacture de toile de Jouy (à Jouy-en-Josas), acquiert Sauveboeuf et y fait dimportantes rénovations. Les Oberkampf revendront le château en 1927. Le château sera un domaine agricole jusquen 1975 (notamment avec la famille Gengen), puis laissé à labandon jusquau rachat, en 1987, par la famille Douce.","architecture":"SAUVEBOEUF, en 1600, le château se présentait comme un carré entourant une cour centrale. Au nord se trouvait le logis encadré par deux pavillons d'angle ; deux autres pavillons formaient les angles sud-ouest et sud-est, et trois chemins de ronde à l'est, au sud et à l'ouest, clôturaient le tout. Le château reconstruit en 1637 remplace les chemins de ronde par des dépendances, celle du sud étant située en retrait des deux pavillons, et l'occidentale devenant une écurie. Au XVIIIe siècle, l'écurie est supprimée et au siècle suivant, le bâtiment sud est lui aussi détruit. Au début du XXIe siècle, le logis et les deux pavillons subsistent au nord, une dépendance orientale est bâtie en équerre vers le sud depuis le pavillon nord-est, vers le pavillon sud-est, et le quatrième pavillon (au sud-ouest) reste isolé. Entre ces deux derniers, une grille et un petit muret ferment la cour d'honneur au sud, et un autre muret en fait autant à l'ouest.","habitants":"Famille De Ferrières                                                       Victor Riquetti marquis de Mirabeau,         \r\n        \"","divers":"A Aubas; Sauveboeuf grav 1 à 5  GPS : 45° 05' 42\" Nord et 1° 11' 55\" Est","gps":"45° 05' 42\" Nord et 1° 11' 55\" Est","images":["../image/image_24/24_Sauveboeuf_1.jpg","../image/image_24/24_Sauveboeuf_2.jpg","../image/image_24/24_Sauveboeuf_3.jpg","../image/image_24/24_Sauveboeuf_4.jpg","../image/image_24/24_Sauveboeuf_5.jpg"]},"Consult_chateau_formulaire8dc9":{"id":"Consult_chateau_formulaire8dc9","dept":"24","canton":"Lanouaille","commune":"Aubas","nom":"Savignac_Lédrier","type":"Chateaux","periode":"XV-XVI-XVII","histoire":"A Savignac-Lédrier, le château de Bard  et de la Forge du XVe, XVIe, XVIIe, XVIIIe et XIXe siècles,      FORGES, en 1817, la famille Lafarge installe une forge à proximité de lancienne abbaye du Glandier près de Beyssac en Corrèze.  Le marquis Jean Louis de Lubersac, ayant émigré à la Révolution, ses biens furent confisqués et vendus, le domaine fut acquis en 1819 par Louis Combescot, issu d'une famille de maîtres de forges et maître de forges lui même.  Lui et ses descendants firent déblayer les ruines irréparables dues à la vetusté et au manque d'entretien, puis s'efforcèrent de maintenir à cette demeure sa beauté et sa vie. Il faut noter encore que la famille Combescot maintient et développe l'activité de la forge jusqu'à une date relativement récente : le haut fourneau fit couler sa  dernière coulée en 1930 et les ateliers de fabrication de pointes et de clés de boîtes de conserves furent définitivement arrêtés en 1975. En 1839, Charles Pouch-Lafarge meurt de façon brutale. Sa femme, Marie Capelle, est accusée de lavoir empoisonné. Elle est condamnée aux travaux forcés à perpétuité.  Cette « affaire Lafarge » demeure aujourd'hui l'une des plus grandes énigmes de l'histoire judiciaire.","architecture":"La construction du château de la Forge date du XVe, XVIe, XVIIe, XVIIIe et XIXe siècles. Celle-ci fabriquait encore des canons au XIXe siècle pour le compte de la Marine et fonctionna jusqu'en 1930.  Le classement du château parmi les M.H.  intervenu en 1979, a permis d'entreprendre les restaurations qui s'avéraient indispensables","habitants":"marquis Jean Louis de Lubersac\r\n        \"","divers":"A  Aubas; Lédier grav 1 à 4. Forge grav 5 GPS : 45° 21' 53\" Nord, 1° 13' 17\" Est","gps":"45° 21' 53\" Nord, 1° 13' 17\" Est","images":["../image/image_24/24_Savignac_L%c3%a9drier_1.jpg","../image/image_24/24_Savignac_L%c3%a9drier_2.jpg","../image/image_24/24_Savignac_L%c3%a9drier_3.jpg","../image/image_24/24_Savignac_L%c3%a9drier_4.jpg","../image/image_24/24_Savignac_L%c3%a9drier_5.jpg"]},"Consult_chateau_formulaire22e4":{"id":"Consult_chateau_formulaire22e4","dept":"24","canton":"Villefranche du Périgord","commune":"Loubejac","nom":"Sermet","type":"Château","periode":"XIV-XVI","histoire":"Loubejac, ancienne propriété de Justin Germain Casimir de Selves, homme politique, qui en a fait le siège de la fondation de Selves, Institut médico-éducatif (IME).                                                           SERMET,   la tradition populaire attribue aux Templiers la construction de cette puissante tour carrée à mâchicoulis. Ils auraient souhaité surveiller la vallée de la Lémance et la route qui mène de lAgenais à Villefranche.","architecture":"SERMET, entre 1310 et 1373, on relève la mention dun Sernatum aux Hospitaliers. On le retrouve en 1460 sous le nom de \"préceptorie de Sernat\" puis Sermet. Une autre hypothèse fait de la construction de Sermet le désir du roi : le souverain de France aurait financé cette tour pour faire face à la forteresse anglaise de Sauveterre. Après les guerres de religion, à la fin du XVIe siècle, on construit sur le site de Sermet un logis Renaissance destiné à la résidence. Au XVIIe siècle, des terrasses et de larges ouvertures sont ajoutés, dans le style Louis XIII. Un nouveau logis est construit et deux pavillons carrés à hautes toitures. Le château, installé au nord-ouest de Loubéjac, sur un coteau, est dun style comparable au château de Besse. Tous deux ont dailleurs été restaurés par le même architecte.","habitants":"Justin Germain Casimir de Selves\r\n        \"","divers":"A Loubejac château de Sermet","gps":"","images":["../image/image_24/24_Sermet_1.jpg","../image/image_24/24_Sermet_2.jpg"]},"Consult_chateau_formulaire6041":{"id":"Consult_chateau_formulaire6041","dept":"24","canton":"Belvés","commune":"Siorac","nom":"Siorac","type":"Château","periode":"XIII-XVIII","histoire":"SIORAC, Jean de Sireuil,  capitaine du régiment de Picardie, fils bâtard de François de Sireuil, frère de Jean II de Sireuil, co-seigneur de Siorac, légitimé par lettre du roi Henri III de décembre 1583. Du mariage de Jean de Sireuil avec Françoise d'Abzac de la Douze est née Marie de Sireuil, dame de Siorac, mariée en 1598 à Pons du Lion de Belcastel. Marie de Sireuil a donné le quart de la seigneurie de Siorac au capitaine Sireuil, son cousin bâtard, qui la lui a restituée par son testament du 12 septembre 1616 appartient longtemps à la famille de la Verrie de Siorac comte de Vivans. Puis à la famille du Lion au XVIIIe siècle aujourd'hui musée des arts culinaires.  Construit  sur lemplacement dun ancien manoir déjà cité au XVIe siècle, le comte Luboff de Koucheleff-Bedbiroko fit bâtir le château actuel au XIXe siècle dans un style néoclassique. Le marquis de Saint-Aulaire fut propriétaire de la demeure en 1860, et se consacra à sa restauration. En 1896, sa fille Marthe, qui a épousé Ernest, marquis de Maleville en 1870, hérite de Siorac. Le château est désormais reconverti en chambres d'hôtes.","architecture":"SIORAC, les anglais entreprirent la construction dune forteresse sur un oppidum dominant la vallée de la Dordogne, ils élevèrent Castel-Réal. Cette forteresse construite sur terre française ne fut jamais achevée. En 1268 un arrêt du Parlement de Paris mit sous séquestre la tour. Pour faire échec à cette forteresse anglaise, Philippe III Le Hardi aurait fait bâtir Domme. La légende conte que sauf une tour, Castel-Réal, lieu de péchés et de crimes, fut précipité dans létang du Bouch. \r\nAu centre du Bourg, le château, reconverti au XVIIIe siècle en une belle et imposante demeure sur les ruines dun  manoir pillé et incendié pendant les guerres de religion, Le château de Siorac  date du XVIIIe siècle. C'est un logis à deux niveaux entre deux pavillons à trois niveaux. Les toits sont brisés et couverts de tuiles et ne comportent pas de lucarnes.\r\nLe château de Siorac date du XVIIIe siècle. C'est un logis à deux niveaux entre deux pavillons à trois niveaux. Les toits sont brisés et couverts de tuiles et ne comportent pas de lucarnes.","habitants":"Capitaine  Jean de Sireuil                                             famille de la Verrie de Siorac\r\n        \"","divers":"Château de Siorac","gps":"","images":["../image/image_24/24_Siorac_1.jpg","../image/image_24/24_Siorac_2.jpg","../image/image_24/24_Siorac_3.jpg"]},"Consult_chateau_formulaire0087":{"id":"Consult_chateau_formulaire0087","dept":"24","canton":"Carlux","commune":"Prats de Carlux","nom":"Sirey","type":"Château","periode":"XV-XVI","histoire":"SIREY,  à Prats-de-Carlux est associé au huguenot Siriès ou Sirey qui en fait son refuge en 1574. Le nom de famille du capitaine protestant ce Siriès » m'est inconnu. Ce surnom provenait d'une petite maison forte, dite aujourd'hui « le Sirey ». C'est, sans aucun doute, le même personnage que le capitaine protestant Cirier, dont parle le chanoine de Syreuilh, dans sa chronique, qui « commandait au château de Flaughac en Quercy quand il fut assiégé en 1572 par les troupes de M. l'amiral de Villars , gouverneur de Guienne. Sa maison est à une lieue de Sarlat, près de Leygue » Nous verrons que le capitaine Siriès finit par être pendu à Sarlat sur la Rigaudie, comme voleur de grands chemins, en 1576.","architecture":"Sirey, Prats-de-Carlux.  Plusieurs édifices du village sont dignes dintérêt, notamment son église romane à clocher-mur, dont les portails et le porche sont ajoutés aux XVIe et XVIIe siècles. On peut également noter les manoirs de Veyssière et Sirey, dont les constructions séchelonnent entre les XVe et XIXe siècles. Le château de Sirey est un  bâtiment en partie du XVe siècle. Grosse tour ronde découronnée. Autre tour ronde postérieure, coiffée en poivrière. A l'angle, tourelle ronde en encorbellement du XVIe siècle, et tourelle carrée en porte à faux. Porte Renaissance encadrée de piliers plats et surmontée d'une large coquille. Les  boiseries de la porte datent du XVIe siècle. Ensemble typiquement sarladais.  Un Sirey, capitaine huguenot, poursuivit les papistes jusqu'à ce qu'on le pende en place publique de Sarlat, en 1576. Par la suite, Sirey appartint successivement aux familles Bloc, Gagnebé, Carrier-Delpeyrat et le peintre Véronique Filozof.","habitants":"Familles Bloc\r\n        \"","divers":"A Prats de Carlux ;Sirey GPS : 44° 53' 14,9\" Nord, 1° 18' 09,5\" Est","gps":"44° 53' 14,9\" Nord, 1° 18' 09,5\" Est","images":["../image/image_24/24_Sirey_1.jpg","../image/image_24/24_Sirey_2.jpg","../image/image_24/24_Sirey_3.jpg"]},"Consult_chateau_formulaire8d40":{"id":"Consult_chateau_formulaire8d40","dept":"24","canton":"Savignac les Eglises","commune":"Sorges","nom":"Sorges_24","type":"Château","periode":"XV-XVIII","histoire":"A Sorges, Chabannes est une propriété privée dont il reste des ruines.  Le château de Sorges du XVIIIe siècle.  Le château de la Vigerie, implanté sur Sorges et sur Sarliac-sur-l'Isle. Le manoir de Jaillac du XVe et XVIe siècles, inscrit depuis 1962. Le manoir des Pautis du XVe et XVIIIe siècles. Le château de Ligueux à l'Ouest sa construction date du XVIIe siècle. \r\nCHABANNES, assiégé en 1397 par les troupes anglaises de Raymond de Laporte. Aujourd'hui, le château  n'est plus qu'une ruine, c'est dommage car les traces des douves, courtines, tours et donjon révèlent que ce devait être un puissant château-fort; il était déjà tenu en 1180 par un Pierre de Chabannes. Au XVe siècle, il appartenait à la famille Flamenc de Bruzac; au XVIe siècle, aux d'Allègre, puis aux Sainte-Aulaire (le fameux seigneur de Coutures dit\"Couturas\", cynique soudard, tantôt faux monnayeur, tantôt assassin, sortait de cette demeure.                      JAILLAC, au XVIIe siècle, c'était la propriété de la famille de Chassarel et au XVIIIe siècle,  des Martin.    PAUTIS, du XVe et XVIIIe siècles. En mai 1655, une nouvelle tentative se solda par un nouvel échec. \r\n SORGES-Bouquet,   la construction du château de Sorges date du XVIIIe siècle. Il possède l'architecture typique des manoirs du Périgord. Il est de forme rectangulaire, sur deux niveaux.","architecture":"CHABANNES, au début du XXe siècle, le propriétaire du château des Chabannes avait fait démonter deux tours. Une de ces tours a été remontée contre le logis principal du château de Montfort à Mitrac en Dordogne. Il ne reste aujourd'hui que des vestiges de l'ancien château des Chabannes                      JAILLAC, bâti au XIVe siècle, présente des éléments architecturaux de défense qui sont alors de mise afin de se protéger des attaques anglaises. Jaillac est un château médiéval. La tour Est, date du Xe siècle ; la tour Ouest du XIIe siècle, Il subsiste encore 75 meurtrières. On y accède par une porte en anse de panier. 0n pénètre dans la cour intérieure autrefois inscrite dans les courtines et l'on aperçoit le logis. C'est une demeure de plan rectangulaire agrafée aux quatre angles d'échauguettes juchées sur cinq corbelets à cinq redans. Son seul souvenir est un tronçon de pieta qui date de la Renaissance.           PAUTIS, La construction date du XVe et XVIIIe siècles, le Manoir des Paulis fut attaqué, en décembre 1654, une centaine d'hommes, des troupes de Marc-Antoine de Coutures dit Couturas, co-seigneur de Sorges. Ce dernier abandonna la bataille après avoir essuyé des coups de feu tirés depuis les fortifications. En mai 1655, une nouvelle tentative se solda par un nouvel échec.","habitants":"Chabannes Famille Flamenc de Bruzac                 Jaillac Famille de Chassarel\r\n        \"","divers":"A Sorges; Bouquet grav 1. Chabannes grav-2 GPS : 45° 18' 26\" Nord, 0° 52' 20\" Est                             Jaillac grav 3-4  GPS : 45° 17' 11,2\" Nord, 0° 49' 11\" Est.  Ligueux Grav-5 GPS : 45° 18' 26\" Nord, 0° 52' 20\" Est.   Pautis Grav 6-7 GPS : 45° 18' 14\" Nord, 0° 49' 46\" Est","gps":"45° 18' 26\" Nord, 0° 52' 20\" Est","images":["../image/image_24/24_Sorges_24_1.jpg","../image/image_24/24_Sorges_24_2.jpg","../image/image_24/24_Sorges_24_3.jpg","../image/image_24/24_Sorges_24_4.jpg","../image/image_24/24_Sorges_24_5.jpg","../image/image_24/24_Sorges_24_6.jpg","../image/image_24/24_Sorges_24_7.jpg"]},"Consult_chateau_formulaire11da":{"id":"Consult_chateau_formulaire11da","dept":"24","canton":"Vélines","commune":"St-Antoine de Breuilh","nom":"St_Antoine_Breuilh","type":"Château","periode":"XV-XVIII","histoire":"A Saint-Antoine de Breuilh  Saint-Ait le château de Valadou\r\nLAROQUE  Vous serez accueillis dans une belle maison de famille du XIXe siècle, perchée sur la colline entourée d'un parc aux arbres plus que centenaires. L'activité du domaine est un vignoble en biodynamie, produisant des vins de terroir fort intéressants. Et Olivier Faurichon de la Bardonnie qui à repris le flambeau familiale en 2007 Chambre d'hôte.","architecture":"VALADOU  demeure du XVIIe siècle des Franc de Ferrière et à appartenu à la femme de Pierre Loti y vécu et à fait bâtir la tour de Style troubadour avec créneaux.                                                                 ROC, la construction  remonte au XVIe siècle, mais la demeure est souvent remaniée au cours des siècles. Le château appartient au XVIIe siècle à une ancienne famille bourgeoise de Mensignac, les Rey. Jacques Rey épouse Marie de Laulanie de Grézeau, dont le père est conseiller du Roi, seigneur des maisons nobles des Thuillères Boudeau et Fonpeyre, et magistrat au siège présidial de Périgueux.  Le château reste la propriété des Laulanie Dugrézeau jusquau début du XXIe siècle. Lun des principaux éléments remarquables de ce château est une fresque du XVIIe siècle située dans la grande salle, représentant une chasse à courre. On y voit deux cavaliers, dont lun porte un faucon sur le poing. À leur droite deux chiens sont menés par un valet muni dune pique, le tout se détache sur un fond de fleurs de lys.","habitants":"St-Aulaye Famille de Pontac                                         Laroque Olivier Faurichon de la Bardonnie \r\n        \"","divers":"A St-Antoine de Breuilh; Breuilh grav 1. Couin grav 2. Laroque grav 3.","gps":"","images":["../image/image_24/24_St_Antoine_Breuilh_1.jpg","../image/image_24/24_St_Antoine_Breuilh_2.jpg","../image/image_24/24_St_Antoine_Breuilh_3.jpg"]},"Consult_chateau_formulaire57bb-2":{"id":"Consult_chateau_formulaire57bb-2","dept":"24","canton":"Neuvic","commune":"Saint-Aquilin","nom":"St_Aquilin","type":"Château","periode":"XV-XVI","histoire":"Château de Bellet du XVe siècle, manoir de Boisset, ancien prieuré. Manoir de Moncé du  XVIIe siècle,et château du Roc\r\nBELLET . En 1495, il est question du \"fief de Beletum\" et en 1510 du \"repayrum de Ressidou\". Bienheureux Alain de Solminihac (1593-1659), homme d'église, abbé de Chancelade puis évêque de Cahors, est né au château de Bellet.   Dans la cour, face à lentrée, se trouve une grange du XVIe qui a conservé sa charpente dorigine. A louest, un pigeonnier rond du XVIIe siècle et sur le Salembre, en contre bas un moulin qui était un moulin seigneurial. Très longtemps ruiné, le château fut sauvé, les murs et les toitures, par le Dr Mauriac puis restauré par M. et Mme Anne, il y a une trentaine dannées. Il est actuellement propriété de M. et Mme Solar qui poursuivent son embellissement.   ROC le château appartient au XVIIe siècle à une famille bourgeoise de Mensignac, les Rey. Jacques Rey épouse Marie de Laulanie de Grézeau  dont le père est conseiller du roi. à la mort de Marie, le château reste dans la famille des Laulanie Dugrézeau jusqu'au début du XXIe siècle.","architecture":"BELLET  Le château actuel a été bâti  au XVe et au XVIe siècle son originalité réside dans le fait quil a été  construit en respectant la pente de la colline ce qui explique quà  lintérieur lescalier desserve les étages par demi-niveau. La partie la plus ancienne comprend un corps de bâtiment flanqué de deux tours circulaires du XVe siècle, puis un deuxième corps de logis accolé au premier et lui aussi flanqué de deux tours carrées à mâchicoulis.  A lintérieur, des  cheminées renaissance dont la plus belle porte linscription suivante: \"fait  par moy Laviole lan 1670\". A lextérieur, accolé à la façade Est du château, se trouve une cave rectangulaire, permettant, grâce aux traces visibles sur le mur, de faire lhypothèse dune construction détruite lors des remaniements de Bellet                                  ROC  la construction remonte au XVIe siècle mais la demeure est souvent remanièe  au cours des siècles.  MONCE, ancienne maison-forte datant de la guerre de cent ans,le château est passé de famille en famille. Cest ainsi quAndré Desvergnes devient propriétaire en 1890. Plus tard, un de ses deux fils, Charles,décide dentreprendre un plan de réaménagement. Le château est composé dun corps de logis en forme de L, monté sur plusieurs niveaux. Le coin est accosté dune tour ronde, surmontée dun toit circulaire pointu, qui se termine par un épi de faîtage. La tour est percée à deux endroits dune fenêtre haute et étroite. Sous la corniche plusieurs petites ouvertures sont disposées à égale distance les unes des autres. On en trouve également deux du même genre sur la tour ronde.","habitants":"Bienheureux Alain de Solminihac                 MONCE André Desvergnes                 \r\n        \"","divers":"A Saint-Aquilin, château de Bellet grav de 1 à 5. de Moncé grav 6. du Roc grav 7.","gps":"","images":["../image/image_24/24_St_Aquilin_1.jpg","../image/image_24/24_St_Aquilin_2.jpg","../image/image_24/24_St_Aquilin_3.jpg","../image/image_24/24_St_Aquilin_4.jpg","../image/image_24/24_St_Aquilin_5.jpg","../image/image_24/24_St_Aquilin_6.jpg","../image/image_24/24_St_Aquilin_7.jpg"]},"Consult_chateau_formulairea9c1":{"id":"Consult_chateau_formulairea9c1","dept":"24","canton":"Saint-Astier","commune":"Saint-Astier","nom":"St_Astier","type":"Château","periode":"XV-XVII","histoire":"Saint-Astier château de Bruneval.  Manoir de Brouillaud sur un site inscrit depuis 1979.  Château de Crognac du XIXe siècle.  Manoir d'Excideuil.\r\nRepaire de Fareyrou ou Chartreuse de Fareyrou du XVIe siècle, inscrite aux M.H. en 2008. Manoir des Ferrières.\r\nFARREYROU, chartreuse du XVIIe siècle est indissociable de la famille de Chalup qui le fit reconstruire dans les toutes premières années du XVIIe siècle.                                                                LABATUT du XVe siècle,  La tour peut être datée du XVe siècle, le manoir étant plus récent. Remanié et modifié assez récemment, il nen garde pas moins son intérêt architectural. Témoignage de loccupation dune grande famille noble dans ce lieu, il sinsère dans le paysage naturel du canal, site remarquable et propice à la promenade, et plus récent, chambres d'hôtes\r\nManoir de Petit-Puy.\r\nPUYFERRAT, aux M.H.  en 1988,  par la famille de La Porte. Le fief passa au XVIe siècle par mariage aux mains de la famille dAloigny, et au XVIIe siècle à une branche des dAbzac.                                                     PUY-SAINT-ASTIER, la présence du Puy-Saint-Astier est attestée par des documents dès 1340, mais lactuel château ne paraît pas antérieur au XVe siècle. De par son implantation dominante sur la vallée de lIsle, le château permettait dassurer un contrôle sur les voies de communication, aussi bien terrestres que fluviales, entre Saint-Astier et Périgueux. Vu limportance des mouvements des troupes tant anglaises que françaises au cours de la guerre de cent ans, on comprend mieux limportance stratégique du site.","architecture":"CROGNAC à Saint-Astier conserve un certain nombre de témoins de son passé comme la chapelle des bois,  des maisons à colombage, ou des châteaux. La paroisse sillustre par sa position stratégique pendant les conflits qui ravagent la région.  le castel moderne de Crognac a succédé à un manoir bâti au XIVe siècle, lui-même construit sur les ruines de la légendaire forteresse de l'évêque Frotaire, celui-ci fut envoyé à Périgueux  en 976, par Hugues Capet, pour élever la grande abbaye de Saint Front qui sera consacrée en 1047.                                                                                  PUY-ST-ASTIER les bâtiments Sud et Est ont été entièrement repris aux XVIIe et XVIIIe siècles. Deux logis en retour d'équerre sont soudés par une tour polygonale contenant l'escalier à vis. Une grosse tour ronde et une plus petite en fer à cheval, s'appuient sur ces grands bâtiments qui ont perdu leurs mâchicoulis au XIXe siècle. À l'est et au sud, l'enceinte intérieure est limitée par deux autres bâtiments en équerre. Deux grosses tours rondes, dont l'une est transformée en chapelle, en renforcent la défense. Les façades et toitures du château,  les restes des remparts et le pigeonnier sont inscrits à l'inventaire des M.H. (arrêté du 1er février 1988)                                                     FARREYROU, est composé de quatre corps de bâtiments articulés autour dune cour carrée. Au centre de laile occidentale, lentrée est marquée par un châtelet crénelé, rappelant larchitecture seigneuriale du Moyen-Age, bien que datant du XVIIe siècle. Le châtelet conserve un décor dorique et mâchicoulis.","habitants":"Puyferrat famille de La Porte\r\n        \"","divers":"A  Saint-Astier; Bonneval grav 3  GPS : 45° 08' 47\" Nord, 0° 31' 45\" Est. Labatut grav 2                  Petit-Puy  GPS : 45° 08' 47\" Nord, 0° 31' 45\" Est","gps":"45° 08' 47\" Nord, 0° 31' 45\" Est. Labatut grav 2","images":["../image/image_24/24_St_Astier_1.jpg","../image/image_24/24_St_Astier_2.jpg","../image/image_24/24_St_Astier_3.jpg"]},"Consult_chateau_formulaire3d1d":{"id":"Consult_chateau_formulaire3d1d","dept":"24","canton":"Saint-Aulaye","commune":"Saint-Aulaye","nom":"St_Aulaye_Jalmoutiers","type":"Chateaux","periode":"XV-XVIII","histoire":"St-AULAYE  du XVe et XVIIIe siècles François de Ségur, seigneur de St Aulaye, épousa Anne De Boisgueheneuc le 28 juin 1615. Daniel, leur seul fils, mourut jeune et sans postérité. Sa jeune sur Jeanne hérita de la seigneurie de St-Aulaye et la transmit à son époux Jacques Louis de LAneau. Leur fille, Marie de LAneau, épousa le 17 avril 1686 Charles de Calvimont qui séteignit au château  le 27 novembre 1718 sans postérité. La famille de Pontac en devint alors propriétaire et Claude Madeleine de Pontac la porta en dot à son époux Marc de La Chataigneraie de Ste Foy. Leur fille, Marie-Françoise, vendit le château et le fief de St-Aulaye en 1772 à Gabriel Romain De Filhol, ancien conseiller au parlement de Bordeaux. A la veille de la Révolution, ce fief appartenait à la famille Moulins De Leybardie. Dans la célèbre nuit du 4 août 1789, les droits seigneuriaux furent abolis.                   A trois km à l'Est à Saint-Vincent de Jalmoutier un chateau.","architecture":"Ste-AULAYE  était occupé dès la préhistoire, c'est au Moyen-Âge que la cité se développe autour de l'église romane du XIIe siècle. La bastide de Saint-Aulaye est fondée en 1288 par Pierre de Bremond. Un château est construit et la cité est fortifiée. Jusqu'à la Révolution et la création des départements, Saint-Aulaye faisait partie de l'élection d'Angoulême. En 1949, lors de la commémoration de l'armistice du 11 novembre, un camion vient percuter la foule recueillie devant le monument aux morts, faisant six morts parmi lesquels trois conseillers municipaux et le secrétaire de mairie, et quinze blessés. Au 1er janvier 2016, Saint-Aulaye fusionne avec Puymangou pour former la commune nouvelle de Saint Aulaye-Puymangou dont la création a été entérinée par l'arrêté du 14 décembre 2015, modifié le 21 décembre 2015, entraînant la transformation de la commune de Puymangou en commune déléguée.","habitants":"Pierre de Bremond                                                          Anne De Boisgueheneuc\r\n        \"","divers":"A  Saint-Aulaye; Jalmoutiers grav de 1 à 7","gps":"","images":["../image/image_24/24_St_Aulaye_Jalmoutiers_1.jpg","../image/image_24/24_St_Aulaye_Jalmoutiers_2.jpg","../image/image_24/24_St_Aulaye_Jalmoutiers_3.jpg","../image/image_24/24_St_Aulaye_Jalmoutiers_4.jpg","../image/image_24/24_St_Aulaye_Jalmoutiers_5.jpg","../image/image_24/24_St_Aulaye_Jalmoutiers_6.jpg","../image/image_24/24_St_Aulaye_Jalmoutiers_7.jpg"]},"Consult_chateau_formulairef668":{"id":"Consult_chateau_formulairef668","dept":"24","canton":"Villefranche du Périgord","commune":"Saint-Cernin de L","nom":"St_Cernin_Lherm","type":"Château","periode":"XV-XVI","histoire":"SINEUIL, Jean IV de Vassal de Rignac, s'est marié en 1584  avec Jeanne de La Basque, fille du seigneur de Baste. Cadet de famille, Marc de Vassal de la Mothe se marie avec Guillelme Delpech, Jean Delpech, son fils unique, Étienne de Vassal, seigneur de Roumégoux à Saint-Cernin, se marie en 1653 avec Béraude de La Capelle de Sineuil, fille de François de La Capelle-Sineuil, petite-fille de Jean de La Capelle-Sineuil et de Béraude de Caors de Carmaing qui s'étaient mariés en 1590. Béraude de La Capelle-Sineuil était veuve de Jean de Gironde, deuxième fils de Brandelin de Gironde, marquis de Montcléra, et mort en 1652, sans postérité. En 1667, veuf de Béraude. Il habite au château de Bargade. Il se remarie en 1689 avec Françoise de Robert, belle-sur de Guyon de Vielcastel, seigneur de Cazals. Elle meurt en 1704. En 1715, Étienne de Vassal fait son testament en faveur de son fils aîné François de Vassal. Ce dernier devient seigneur de Sineuil à la mort de son père. Il s'était marié en 1700 avec une cousine, Jeanne de Vassal de la Capelle de Baste morte en 1725, à Saint-Cernin. Étienne II de Vassal-Sineuil devient seigneur de Sineuil. Malgré deux mariages, il meurt sans postérité en mars 1759. Le château de Sineuil entre dans le patrimoine de Jean de Vassal de Lacoste et de Françoise de Vassal de Bargade, son épouse depuis 1751. Ils se sont installés au château de Sineuil laissant leur ancienne résidence.   Leur fils aîné, Pierre Étienne de Vassal, filleul en 1757 d'Étienne de Vassal, a été seigneur de Sineuil et s'est marié en 1790 avec Marie Charlotte Bibiane de Navarre, fille de messire Pierre de Navarre.                                                                             BARGADE, même famille de Françoise de Laborie, veuve de Marc de Vassal, seigneur de Bargade. Leur fils aîné, Pierre Étienne de Vassal, filleul en 1757 d'Étienne de Vassal, a été seigneur de Sineuil et s'est marié en 1790 avec Marie Charlotte Bibiane de Navarre, fille de messire Pierre de Navarre.","architecture":"SINEUIL,   bâti à Saint-Cernin-de-l'Herm,  La construction date du XVe, du XVIe et du XVIe siècle. Construit dans la deuxième moitié du XVIe siècle, le château de Sineuil se compose d'un logis renforcé de deux tours, avec deux ailes en dépendances encadrant la cour, côté Sud, et un troisième ensemble de communs à l'est du précédent. Le logis et l'une des tours conservent des pièces à voûtes quadripartites. La seconde tour abrite un escalier en vis. Le château de Sineuil est inscrit aux M.H. en 2006.","habitants":"famille de Vassal-Sineuil,\r\n        \"","divers":"A Saint-Cernin de L'herm; St Cernin grav de1à 4. Sineuil grav 5-6  GPS : 44° 39' 45,3\" Nord, 1° 02' 14,3\" Est","gps":"44° 39' 45,3\" Nord, 1° 02' 14,3\" Est","images":["../image/image_24/24_St_Cernin_Lherm_1.jpg","../image/image_24/24_St_Cernin_Lherm_2.jpg","../image/image_24/24_St_Cernin_Lherm_3.jpg","../image/image_24/24_St_Cernin_Lherm_4.jpg","../image/image_24/24_St_Cernin_Lherm_5.jpg","../image/image_24/24_St_Cernin_Lherm_6.jpg"]},"Consult_chateau_formulaireffac":{"id":"Consult_chateau_formulaireffac","dept":"24","canton":"Saint-Cyprien","commune":"St-Chamassy","nom":"St_Chamassy","type":"Château","periode":"XV-XVIII","histoire":"A Saint-Chamassy, le château de la Batut, de la famille de Salis du XVe siècle XVIIIe siècle, passa aux mains de la Borie et ensuite au Lauternier.\r\nLe château de Falgueyrac du XVIIe siècle. Le manoir de Perdigat (ou château de Perdigat) du XVe et XVIe siècles, inscrit aux M.H. depuis 1971. Le manoir du Marais. Le manoir de la Queyzie. Le manoir de Saint-Chamassy du XVe siècle. Le manoir de Verliac.\r\nPlus de dix demeures de caractère (châteaux, manoirs, gentilhommières ou maisons fortes) sont disséminées sur le territoire communal. Le manoir (ou château) de Perdigat est le premier que lon découvre à lentrée du vallon de Saint-Chamassy. Du début du XVe siècle, le Perdigat dominait la plaine et la Vézère qui coulait à ses pieds.                                                LA BATUT, au sud du bourg de Saint-Chamassy, sur le plateau,  Les Salis tinrent le fief du XIIe au XVe siècle, il passa ensuite à la famille de La Borie de La Batud. La demeure vient d'être restaurée avec passion par son propriétaire actuel, M. Lanternier.","architecture":"LA BATUT, au sud du bourg de Saint-Chamassy, sur le plateau, le château de la Batut sertit de remparts et de douves est un important ensemble de logis dissymétriques, juxtaposés dans l'espace, sinon dans le temps, avec une agréable fantaisie: un pont-levis, des tours carrées, cylindriques ou polygonales, des échauguettes, des lucarnes, un portail Renaissance, une chapelle à clocheton effilé, tout cela avec un certain romantisme. En gros, deux logis en équerre des XVe et XVIe siècles, très retouchés, sont soudés par un donjon carré accosté d'un pavillon à tourelle polygonale d'escalier.                                             FALGUERAS, la construction du château a débuté au XVIIe siecle et s'est achevée au XIXe siècle, après diverses modifications et agrandissements. Il est devenu un gite d'hôtes. Le château de Falgueyrac n'est pas inscrit aux M.H. ni classé.","habitants":"Famille de Salis                                                   Famille de La Borie de La Batud\r\n        \"","divers":"A St-Chamassy; St-Chamassy grav 1à3. Batut grav 4 .Falgueras grav 5 GPS : 44° 51' 40\" Nord et 0° 54' 10\" Est. Maubuisson grav 6.","gps":"44° 51' 40\" Nord et 0° 54' 10\" Est. Maubuisson grav 6.","images":["../image/image_24/24_St_Chamassy_1.jpg","../image/image_24/24_St_Chamassy_2.jpg","../image/image_24/24_St_Chamassy_3.jpg","../image/image_24/24_St_Chamassy_4.jpg","../image/image_24/24_St_Chamassy_5.jpg","../image/image_24/24_St_Chamassy_6.jpg"]},"Consult_chateau_formulaireffca-2":{"id":"Consult_chateau_formulaireffca-2","dept":"24","canton":"le Bugue","commune":"St-Cirq","nom":"St_Cirq_24","type":"Château-fort","periode":"XII-XVI","histoire":"Chateau-fort de PECH st-SOURD, grotte préhistorique du Sorcier, ou grotte de Saint-Cirq : La grotte recèle des gravures préhistoriques datant du Magdalénien et notamment le célèbre sorcier ; figure humaine exceptionnelle. Château fort de Pech-Saint-Sourd. Manoir du Clauzel du XVIIe siècle. Manoir des Faures du XVIIIe siècle. Maison forte du Clauzel. \r\nLe Fort de Saint CIRQ  Lapopie dominant le village, est riche de son histoire, c'était le lieu idéal pour éviter l'invasion. C'est tout d'abord Oldoric, Vicomte de Saint Cirq, qui, à partir du Xe siècle, y fit construire le premier château. Dès le XIIIe siècle, trois familles seigneuriales se partagèrent le Fort et y construisirent  leur château. Tout en rendant hommage au comte de Toulouse et aux Rois de France, les Lapopie, les Gourdon et les Cardaillac cohabitèrent au sein de ce même ensemble castral. Le château des Lapopie s'élevait sur la partie la plus haute du rocher, appelée \" le rocher de la Popie\". Celui des Gourdon n'a pas été retrouvé sur le Fort mais on suppose qu'ils auraient construit une tour. Quant au château des Cardaillac, celui-ci se situe en contrebas. A partir du XVIe siècle, les châteaux furent abandonnés par les seigneurs.\r\nSaint Cirq Lapopie aujourd'hui  il subsiste  quelques traces des châteaux des seigneurs. On dénombre une tour du XIIIe siècle, un corps de logis et une enceinte autonome datant de la fin XIIIe au début XIVe siècle.","architecture":"Le nom de la commune provient de saint Cyr, honoré dans l'église paroissiale qui porte son nom, dont les formes occitanes du nom, à partir de Cyricus, sont notamment Circ et Cirgue. En occitan, la commune porte le nom de Sent Circ. \r\nLa falaise dominant le village abrite une grotte préhistorique la « grotte du Sorcier » (ou grotte de Saint-Cirq) qui offre quelques dizaines de gravures datées de 13 000 ans av. J.-C., dont un très beau cheval pommelé et une exceptionnelle représentation masculine. Le Fort de Saint Cirq Lapopie, ce sont aujourd'hui des vestiges de l'histoire. Sur les traces des seigneurs, montez les marches jusqu'au rocher de La Popie; vous pourrez admirer le village médiéval mais également la vallée du Lot, avec ses moulins, barrages, ports, écluses et le célèbre chemin de halage.","habitants":"Famille de Lapopie\r\n        \"","divers":"A St-Cirq château fort","gps":"","images":["../image/image_24/24_St_Cirq_24_1.jpg","../image/image_24/24_St_Cirq_24_2.jpg"]},"Consult_chateau_formulaire87e7":{"id":"Consult_chateau_formulaire87e7","dept":"24","canton":"Mareuil","commune":"St-Crépin de Richemont","nom":"St_Crépin_Richemont","type":"Château","periode":"XV-XVII","histoire":"A Saint-Crépin de Richemont le château de la Barde des XVe et XVIIe siècles; de Richemont, (voir article)    St-CREPIN La construction du château date de la fin du XIXe siècle. Il est localisé à côté de l'église du bourg et ne doit pas être confondu avec le château de Richemont, qui se trouve sur la même commune, mais plus à l'ouest, a été construit, en 1891, sur l'emplacement d'un ancien bâtiment nobiliaire détruit par un incendie, l'année précédente.\r\nBARDE, forteresse médiévale du XVe siècle, fut jusquà la Révolution le siège des Malet de Châtillon dont le contemporain de Brantôme, Guillaume Malet de Châtillon fut lennemi juré. \r\nEnfin la demeure noble du Plessac abrita les de Saulnier du Plessac, lune des nombreuses branches de cette famille du haut Périgord.","architecture":"BARDE, date des XVe et XVIIe siècles, appartenait au XVe siècle à Jeanne Saulnier, demoiselle de La Barde, qui fit passer la propriété dans la famille de Malet de Châtillon par mariage avec Guillaume de Malet de Châtillon, écuyer, seigneur de Serves, ils eurent un fils Henri de Malet de Châtillon, écuyer, seigneur de La Barde qui occupa la demeure jusqu'au XVIe siècle. Ensuite le domaine passa à la famille de La  Reynerie. L'édifice est légèrement cintré. La façade est encadrée de deux tours crénelées à mâchicoulis de la fin du XVe siècle ou du début du XVIe siècle. Au XXe siècle, le bâtiment est transformé en ferme. Puis lensemble est racheté et des restaurations sont entreprises. Les travaux ont permis la reconstruction de lune des tours et la réfection de la toiture. Il est implanté dans le parc naturel régional Périgord Limousin, environ un kilomètre au nord-est du village de Saint-Crépin-de-Richemont, en bordure du ruisseau le Boulou. C'est une propriété privée. Il est formé d'un haut logis orienté est-ouest et flanqué de deux tours moins élevées, le tout ceinturé de mâchicoulis.","habitants":"Famille des Malet de Châtillon\r\n        \"","divers":"A St-Crépin de Richemont; La Barde grav 6 à9 43\" Nord et 0° 36' 53\" Est                                     GrangeGPS : 45°25'43\" Nord et 0°36'53\" Est                                         Richemont monferrie grav 4-5 GPS : 45° 24' 38,5\" Nord et 0° 36' 50,2\" Est                 St-Crépin  grav 1-2-3 GPS : 45° 25' 08\" Nord 0° 35' 59\" Est","gps":"45°25'43\" Nord et 0°36'53\" Est","images":["../image/image_24/24_St_Cr%c3%a9pin_Richemont_1.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_2.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_3.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_4.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_5.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_6.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_7.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_8.jpg","../image/image_24/24_St_Cr%c3%a9pin_Richemont_9.jpg"]},"Consult_chateau_formulairef09d":{"id":"Consult_chateau_formulairef09d","dept":"24","canton":"Nontron","commune":"Saint-Estéphe","nom":"St_Estéphe_Augignac","type":"Château","periode":"XV-XIX","histoire":"PUYCHARNAUD,  du XIXe siècle, rebâti suite à un incendie  vers 1875 sur les restes du repaire de Maisonneuve qui datait de 1596.                                    DRIEUDET, à appartenu aux d'Albret, est à l'état de ruines.                                                                                ST-ESTEPHE, le XIIIe siècle sera une époque importante pour lhistoire de la commune. Cest à partir de cette date que Saint-Estève de Calones (lancien nom du village) deviendra la cure annexe de larchiprêtre de Lesparre, dirigée par Gui Martin de Saint-Estèphe, seigneur de Calon. \r\nAUGIGNAC petit manoir d'Anne de Vandière, chambre d'hôte.   La maison-forte est la propriété de familles illustres du Périgord qui apportent des modifications personnelles, elle appartint aux de Flamenc, de château, Trion de Montalembert, Vandière de Vitrac, de Saint-Aulaire et de Lériget. Le marquis de Saint-Aulaire est célèbre pour ses études historiques, ses monographies et la publication de la correspondance de madame du Deffant.","architecture":"Le château de Brieudet est un ancien château bâti à Saint-Estèphe,  La construction date du XIIIe au XVe siècle. Il a appartenu entre autres aux d'Albret,  à l'état de ruines aujourd' hui.                                                    Aubignac  La maison actuelle est construite aux XIVe et XVe siècles à lemplacement dune ancienne demeure, probablement du XIIe siècle. Il ne subsiste de cette bâtisse primitive quune salle basse voûtée en berceau, au rez-de-chaussée. Certains éléments du château fort du XIVe siècle sont encore présents. On peut observer le logis, flanqué aux quatre angles de tours rondes, dont une est détruite.","habitants":"\"","divers":"Saint-Estéphe château Leygurat","gps":"","images":["../image/image_24/24_St_Est%c3%a9phe_Augignac_1.jpg","../image/image_24/24_St_Est%c3%a9phe_Augignac_2.jpg","../image/image_24/24_St_Est%c3%a9phe_Augignac_3.jpg"]},"Consult_chateau_formulaire7837":{"id":"Consult_chateau_formulaire7837","dept":"24","canton":"Mareuil","commune":"Saint-Felix de Bourdeille","nom":"St_Felix_Bourdeille","type":"Château","periode":"XVI","histoire":"MONDEVYS date du XVI siècle forteresse médiévale ancienne demeure des  Saulnier, des Vendoire et des vendières de Vitrac . Pas d'information histrique pour le manoir de Cotencie.","architecture":"Le château de Mondevy (Monts des Vins) des XVe et XVIe siècles, propriété privée visible à flanc de coteau depuis la départementale 939 reliant Angoulême à Périgueux. Il a la particularité dêtre toujours resté dans la famille, par les femmes,\r\n Le manoir de la Cotencie du XVIIe siècle, propriété privée.\r\nTerritoire boisé et vallonné, vous pourrez découvrir notre village et son patrimoine en parcourant les chemins de randonnées qui le traversent, appréciés pour leur calme.\r\nMondevys composé d'un corp de logis encadré par deux grosses tours rondes à créneaux, à l'opposé de la cour se trouve un autre bâtiment parallèle possédant aussi deux tours l'édifice présente une forteresse médiévale en cours de restauration.","habitants":"Famille des Saulnier\r\n        \r\n        \"","divers":"A Saint-Felix de Bourdeille; Chateau  de mondevy","gps":"","images":["../image/image_24/24_St_Felix_Bourdeille_1.jpg","../image/image_24/24_St_Felix_Bourdeille_2.jpg","../image/image_24/24_St_Felix_Bourdeille_3.jpg"]},"Consult_chateau_formulairee378-2":{"id":"Consult_chateau_formulairee378-2","dept":"24","canton":"Brantôme","commune":"Saint-Front d","nom":"St_Front_Alemps","type":"Château","periode":"XVI-XVIII","histoire":"ROCHE-PONTISSAC, ancien fief des Faures puis propriété des Lafont du Cluzeau, des Neuilher-Nogueira puis demeure de Patrick Esclafer de la Rode. Le château, attesté en 1458, ancien fief des Faure, des Lafont du Cluzeau,des Neuilher-Nogueira puis demeure de M. Esclafer de la Rode.                             St-FRONT-D'ALEMPS, château de Brochard du  XVIIIe siècle. Château de la Roche Pontissac du  XVIe siècle XVIIIe siècle, inscrit aux M.H. depuis 1987.\r\nRuines du château de Rochemorin du  XVe siècle. Manoir des Pompis du XIXe siècle. Manoir du Repaire du  XVIIe et XVIIIe siècles. Brochard ancien domaine des nobles  de Brochard de Puymorin possédèrent le vignoble jusqu'en 1914.                                      ROCHEMORIN, en 1520, Jean de Amelin, était seigneur de Rochemorin   ne conserva que son style architectural. Au début du XVIIe siècle, le château passa entre les mains de la famille de Pesnel, seigneurs et voisine de La Brède.  En 1686, l'ultime héritière de la famille de Pesnel épousa un ancien mousquetaire du roi, Jacques de Montesquieu. De cette union, naquit le 18 janvier 1689, au château de La Brède, un garçon qui allait devenir l'un des plus célèbres et des plus grands philosophes du \"Siècle des Lumières\" : Charles Louis de Secondat, futur baron de Montesquieu et seigneur de La Brède.  En 1919, les établissements Armand Beaumartin, société spécialisée dans l'exploitation forestière racheta le château de Rochemorin. En 1940, la famille Blancan se porta à son tour acquéreur du château , aujourd'hui à André Lurton.","architecture":"BROCHARD était pourvu de deux ailes à l'Est, fermant la cour, le château de plan rectangulaire régulier édifié en moellon de calcaire enduit et pierre de taille, composé d'un étage carré et d'un étage de comble, le château  présente au côté ouest une terrasse à balustres, les travées qui rythment les façades sont soulignés par trois lucarnes centrales  encadrées par deux frontons de deux pavillons.                                  ROCHE-PONTISSAC, en 1512,semble présenter deux phases de construction. Ainsi, les deux travées situées à l'est forment la base d'un ancien manoir, ainsi que la galerie épousant l'angle oriental du château, érigée au XVIe siècle. Les trois travées du logis, situées le plus à l'ouest ont été édifiées à la fin du XVIIe siècle ou au cours du siècle suivant, ainsi que la tour carrée située à l'arrière.  Le logis, élevé en pierre de taille et moellon de calcaire, présente un plan rectangulaire. La façade antérieure, orientée au sud-ouest, est composée de deux étages carrés, rythmée par cinq travées. La partie ouest aux trois travées est homogène, si l'on considère la position axiale de la tour carrée du côté septentrional et celle du portail sud, situé au sommet du terrain pentu du domaine. A l'est, une galerie en pierre de taille et percée par des arcades brisées conserve des réminiscences gothiques. L'ensemble d
