s décors sous fenêtres.","habitants":"Famille de  Jean et Charles de Béron\r\n        \"","divers":"A Saint-Priest les Fougères château de Oches.","gps":"","images":["../image/image_24/24_Oche_1.jpg","../image/image_24/24_Oche_2.jpg","../image/image_24/24_Oche_3.jpg","../image/image_24/24_Oche_4.jpg","../image/image_24/24_Oche_5.jpg","../image/image_24/24_Oche_6.jpg","../image/image_24/24_Oche_7.jpg"]},"Consult_chateau_formulaire4748":{"id":"Consult_chateau_formulaire4748","dept":"24","canton":"Sarlat la Canéda","commune":"St-Vincent de Paluel","nom":"Paluel","type":"Forteresse","periode":"XV","histoire":"PALUEL, du XVe siècle, propriété d'un prince de Croÿ à partir de 1899, il est ensuite acquis par le professeur Jean Lassner, qui y meurt en juillet 2007. À partir de 2011, son nouveau propriétaire britannique entreprend sa restauration en le dégageant de son carcan forestier.     En 1968, le château sert de cadre au tournage du film Le Tatoué de Denys de La Patellière, avec Louis de Funès jouant le rôle d'un marchand d'art et Jean Gabin.  À sa mort en juillet 2007 à Saint-Vincent-le-Paluel, ses quatre enfants mettent en vente la propriété. En 2010, le site est complètement nettoyé par Kevin Cartledge, le nouveau propriétaire britannique : le château retrouve une vue plus dégagée autour de lui et devient susceptible de servir de base pour une restauration. Toutefois, le propriétaire n'arrive plus à payer ses dettes et met le château aux enchères en septembre 2017.  Lassociation « Adopte un château », qui uvre pour la restauration du patrimoine en péril, se fixe pour objectif pour racheter et rénover lédifice, en réunissant 10 000 donateurs qui deviendraient copropriétaires. Cependant, la somme réunie est insuffisante et le 21 septembre 2017, lors de la vente aux enchères à Bergerac, le château est finalement adjugé à Étienne Cluzel, un restaurateur  originaire de la Dordogne. Une société luxembourgeoise a surenchéri de 10 % lors du délai légal de dix jours qui a suivi la vente. Le 21 décembre 2017, le juge de l'exécution de Bergerac a estimé cette surenchère irrecevable.","architecture":"PALUEL, du XVe siècle, l'édifice reste en bon état jusqu'à la fin de la guerre. Il est incendié en juin 1944 par la division SS Das Reich de retour d'Oradour-sur-Glane. Alors qu'elle s'apprête à monter vers le front de Normandie elle rencontre, au bas du château, un résistant armé et l'abat. Une stèle au bas du château commémore cet évènement. En ruine, il n'est jamais restauré et la végétation prend alors le dessus. En 1927, année de son inscription, la description du château de Paluel par les M.H.est la suivante :  « Le château se compose d'un corps de logis flanqué de deux tours d'angle de part et d'autre de la tour d'escalier placée au centre du logis. Derrière ce bâtiment, et relié à lui par un étroit passage, un donjon rectangulaire du XIIe siècle complète l'ensemble. Des mâchicoulis couronnent les tours et le corps de logis. Le donjon a conservé ses mâchicoulis de bois avec remplissage de torchis. Le château est entouré d'une enceinte de courtines.","habitants":"Kevin Cartledge\r\n        \r\n        \"","divers":"A St-Vincent de Paluel, vestiges de la forteresse","gps":"","images":["../image/image_24/24_Paluel_1.jpg","../image/image_24/24_Paluel_2.jpg","../image/image_24/24_Paluel_3.jpg","../image/image_24/24_Paluel_4.jpg","../image/image_24/24_Paluel_5.jpg","../image/image_24/24_Paluel_6.jpg","../image/image_24/24_Paluel_7.jpg","../image/image_24/24_Paluel_8.jpg","../image/image_24/24_Paluel_9.jpg"]},"Consult_chateau_formulaire98a1":{"id":"Consult_chateau_formulaire98a1","dept":"24","canton":"Salignac-Eyvigues","commune":"Paulin","nom":"Paulin_Faurie","type":"Château","periode":"X-XVI","histoire":"PAULIN, une trace écrite datant du Xe siècle fait du château de Paulin un des plus anciens du Languedoc. En 1331, il est pris par des grandes compagnies de routiers pendant la guerre de cent ans. Ils ne quitteront les lieux qu'en 1384 contre rançon. Durant les guerres de religion, il appartient à la famille de Rabastens dont un de ses membres est un leader protestant important dans la région. Il choisit cependant d'organiser ses expéditions guerrières à partir d'autres sites.             FAURIE, c'était le fief des Bars de La Faurie au XVIIe siècle,  des Saint Exupéry et des Auberoche; le logis fut incendié par la Révolution. En effet, Joseph de Bars, seigneur de la Faurie, Archignac, et Vierval, avait accumulé beaucoup de rancunes et même des haines contre lui. De Bars, introuvable, on arrête son neveu, M. Delpech. On le traine à Sarlat accompagné dinsultes et de mauvais coups. Il y arrive à moitié nu et en maivais état. On le jette en prison et les trois détenus sont libérés.","architecture":"PAULIN, le château est construit en schiste sur une barre rocheuse de même nature, la construction se confondant parfois avec son support. Des caves voûtées anciennes datent du château médiéval. Le logis est en deux parties en forme de L qui ne communiquent pas : les étages ne coïncident pas. Le plus proche du donjon a des ouvertures à meneau. Il reste quelques canonnières et traces de fortifications arasées, vestiges du passé guerrier du site et de belles cheminées dont une gothique. Des clés de voûte portent en sculpture le lion de la famille de Rabastens.  Par la suite, les remaniements ont rendu le séjour plus confortable : il a perdu ses remparts et ouvrages avancés, ne restant que le donjon. Une demeure plus récente aménagée au XVIe siècle et XVIIIe siècle témoigne de l'habitation continue du site. L'aile sud a été entièrement reprise au XIXe siècle. Le château a été restauré depuis les années 1970, le sauvant de la ruine.                                            FAURIE Près du bourg de Paulin, au hameau dela Faurie, le château allonge un corps de logis entre deux tours circulaires (celle du sud a été abattue). Ayant refusé de verser son obole à la milice communale, il fut vivement conspué et dut sexécuter. Un jour de foire, on décida d'investir la cour du château et on alluma un grand feu devant le portail qui avait été enfoncé. Le seigneur de Bars porta plainte devant la prévôté et trois manifestants furent emprisonnés à Sarlat.","habitants":"Famille de Rabastens \r\n        \"","divers":"A Paulin le château de Paulin grav 1  et  de Faurie grav 2-3","gps":"","images":["../image/image_24/24_Paulin_Faurie_1.jpg","../image/image_24/24_Paulin_Faurie_2.jpg","../image/image_24/24_Paulin_Faurie_3.jpg"]},"Consult_chateau_formulairebdd1":{"id":"Consult_chateau_formulairebdd1","dept":"24","canton":"Terrasson-Lavilledieu","commune":"Pazayac","nom":"Pazayac","type":"Château","periode":"XVI","histoire":"PAZAYAC,  en 1540  fief  des Souilhac de Montmège détenue  conjointement avec les Saint-Chamans  du  Pescher, ces derniers construisirent le château,  le comte prit le titre de seigneur de Pazayac et, pensant pouvoir rayer d'un trait les acquisitions de la Révolution de 1789, il se comporta comme si celle-ci n'avait pas eu lieu. Homme violent, il était honni de tous et nombreux étaient ceux qui avaient à se plaindre de lui. Après les Saint Chamans, sous l'Empire la demeure passe à Jacques  Soustre de Lagautherie et à Madame née Juliette de la Franconnie, notaire, demeurant à Charrail. Le 19 septembre 1818, le château devient propriété des comtes de Maussac, ceux-ci étaient une famille de la vicomté de Turenne ou ils remplissaient la fonction de sénéchal. Aussi, lorsqu'en août 1830 eut lieu une révolte paysanne, le château faillit être incendié.   Le soulèvement s'inscrit désormais dans l'histoire de la région sous le nom de \"Jacquerie en 1830 au château de Pazayac\".  Au XIXe siècle, Eugène Le Roy, écrivant son \"Jacquou le Croquant\", s'inspira de la jacquerie de 1830 qui avait eu lieu ici, au château de Pazayac, et transposa celle-ci au château de L'herm. En 1911, date à laquelle M. de Pradel de Lamaze notaire à Brive. En 1956, les Delage achetent l'édifice à M. Jacques de Lamaze.","architecture":"PAZAYAC,  le château actuel aurait été bâti vers 1542, s'inscrit dans un parc, à flanc de coteau, édifice au plan carré fort simple qu'agrémentent des ailes abaissées et deux tourelles d'angle percées de meurtrières; la façade Renaissance, équilibrée,  porte un cartouche aux armes des Lamaze, la toiture pentue gagne en élancement grâce à une belle lucarne sculptée. L'étage et ses fenêtres à meneaux, le rez de chaussée en arcades qui s'ouvre sur une terrasse montrent, malgré les tourelles, que l'édifice est un logis d'agrément.  Pazayac reste une demeure de dimensions modestes, à l'échelle humaine, à un étage alors que nombre de ces gentilhommières périgourdines en ont au moins deux.","habitants":"Famille des Saint-Chamans  du  Pescher\r\n        \"","divers":"Château dePpazayac","gps":"","images":["../image/image_24/24_Pazayac_1.jpg","../image/image_24/24_Pazayac_2.jpg","../image/image_24/24_Pazayac_3.jpg","../image/image_24/24_Pazayac_4.jpg","../image/image_24/24_Pazayac_5.jpg","../image/image_24/24_Pazayac_6.jpg"]},"Consult_chateau_formulaire881c":{"id":"Consult_chateau_formulaire881c","dept":"24","canton":"Riberac","commune":"Petit-Bersac","nom":"Petit_Bersac","type":"Château","periode":"XIV-XVII","histoire":"Château de Lavergne (actuellement une ferme), XIVe et XVIIIe siècles gaec de madame Christiane Bittard\r\nLAVERGNE  cette ancienne demeure des Bounet et du comte de Nattes.                                                 MAS de MONTET, les de la Cropte, puis à un membre de la famille de Malleret, Pierre de Malleret, épousa Jacquette, fille de Jean de Signac,  quils avaient dénommée le Mas de Montet. On apprend aussi quen 1765 un aïeul du marquis de Cumond épousa Marie Jacqueline Augustine de la Cropte de Chantérac, fille de François David de la Cropte de Chantérac, descendant du maréchal dAubeterre. Celle-ci, née en 1840, très jeune orpheline, épousa à Paris Pierre Marie Béranger, Marquis de Nattes, né le 25 mai 1829 à Montpellier Le 28 juillet 1912 revenant de Paris en Périgord, la marquise fut victime dun accident de voiture, elle trouva la mort.   Elle laissait pour seul héritier son fils Pierre Paul Armand Béranger, marquis de Nattes, qui sétait marié à Paris le 8 juillet 1905 avec Anne-Marie Berthe Aymardine de Draubrèze. Le domaine dune étendue de cent soixante dix hectares consistait en deux châteaux, lun à Montet, lautre à La Vergne, en maisons de colons situées dans les différentes métairies de Montet, de La Vergne, du Camp et de Richard.  Demeurant à Paris, Pierre de Nattes confia la gestion de son patrimoine à un régisseur nommé Phénix (dit Viviot) de 1912 à 1918 ; . Puis il vendit lensemble du domaine à Léon Vitrac, banquier le 17 février 1918. il fut revendu le 8 juillet 1920 à M. Descubes, médecin major de première classe dont la fille était lépouse de M. Thonnard du Temple qui sy ruina. La propriété fut remise en vente en 1927.  De nombreux propriétaires se sont succédé au Mas de Montet. Lune dentre eux, Mme Rolland, qui cultive le domaine, eut lidée de transformer le château en hôtel luxueux.","architecture":"LAVERGNE  est une construction du milieu du XVIIIe siècle peut être sur une base médiévale. Le pavillon nord prévu initialement n'a jamais été réalisé. Logis rectangulaire flanqué au sud d'un pavillon. L'étage carré est coiffé d'une toiture brisée, en tuile plate pour le brisis, et en tuile creuse pour le terrasson. Le toit du pavillon est entièrement couvert en tuile plate. A l'est, le logis a été élargi et couvert par un appentis en tuile creuse. Les bâtiments de la ferme s'étendent à l'ouest et au sud du logis pour former une cour fermée. Ils ont été très remaniés.                                                    MAS de MONTET, du XVIIIe et XIXe siècles, de style Renaissance, lorigine de la dénomination « Mas de Montet » semble remonter à l'époque gallo-romaine et viendrait du mot « mansion » qui désignait les relais ou stations au bord des routes. Les témoins importants qui restent aujourdhui sont des vestiges des XVe et XVIe siècles et une restauration importante a été entreprise pour les conserver. Sur la carte de Cassini achevée en 1789 on lit « Mas de Montet ». Si le château, ainsi que le moulin à eau et le fossé alors existants, sont clairement montrés sur les relevés de terre de Napoléon, les bâtiments courants ont été clairement ouvrés sur des structures existantes, expliquant certains des compromis architecturaux intéressants faits pour adapter au style Renaissance relativement formel du château d'aujourdhui adapté en hôtel-restaurant. Le château du Mas de Montet fut attribué par son père à Louisa Mathilde Marie du Lau dAllemans, en 1861.","habitants":"Lavergne Famille des Bounet                                Montet Famille de Malleret\r\n        \"","divers":"A  Petit-Bersac; Mas de Montet grav 2-3 GPS : 45° 17' 21\" Nord, 0° 13' 58\" Est. Lavergne grav 1","gps":"45° 17' 21\" Nord, 0° 13' 58\" Est. Lavergne grav 1","images":["../image/image_24/24_Petit_Bersac_1.jpg","../image/image_24/24_Petit_Bersac_2.jpg","../image/image_24/24_Petit_Bersac_3.jpg"]},"Consult_chateau_formulaire8729":{"id":"Consult_chateau_formulaire8729","dept":"24","canton":"Terrasson-Lavilledieu","commune":"Lardin Saint-Lazare","nom":"Peyraux","type":"Maison forte","periode":"XIV-XVII","histoire":"PEYRAUX, les lieus n'ont pas cessé d'être tenus par les Royere depuis le mariage de Philibert avec Marguerite de Badefol qui les lui apporta en dot. La vie, durant le grand siècle, est brillante, on y donne l'hospitalité à tout ce qui a titre et rang dans la société. Jean Marc de Royere rédige un cahier de mémoires recueillant des réflections sur le monde politique qu'il cotoya.","architecture":"PEYRAUX   La première mention remonte à 1328. Les communs forment l'enceinte du château et semblent avoir eu davantage une destination militaire qu'agricole. L'entrée sud était défendue par un châtelet rectangulaire édifié sur un porche et dont l'axe est perpendiculaire à l'axe des autres bâtiments. Ces bâtiments, dont les fondations sont sans doute antérieures au XVIIe siècle, sont élevés, en partie, sur des caves voûtées qui étaient plus des salles de défense et de garde que des caves proprement dites. Une tour circulaire soude ces bâtiments au mur d'enceinte ouest qui maintient la terrasse face au château, la date de 1688 est gravée sur le linteau d'une porte d'étable.","habitants":"Famille de  Royere\r\n        \"","divers":"A Lardin Saint-Lazare le château de Peyraux.","gps":"","images":["../image/image_24/24_Peyraux_1.jpg","../image/image_24/24_Peyraux_2.jpg","../image/image_24/24_Peyraux_3.jpg","../image/image_24/24_Peyraux_4.jpg"]},"Consult_chateau_formulaireb794":{"id":"Consult_chateau_formulaireb794","dept":"24","canton":"Domme","commune":"Daglan","nom":"Peyruzel","type":"Château","periode":"XIV-XVI","histoire":"Château du Peyruzel du XIIIe siècle,  de Paulhiac de la fin du XIVe siècle sci,  Saint Martin, repaire de Calmon.                                                                         PEYRUZEL, la famille de La Roque est seigneur de Saint-Pompont et possède les justices de Peyruzel dans la paroisse de Daglan et de Fournels dans la paroisse de Campagnac. Veuve, elle a hérité de son mari, Jean de Cugnac, la seigneurie de Sermet, de la Bastide, de la Thèze, et d'Allas l'Évêque, près de Sarlat. Jean de Cugnac a été un proche du comte de Périgord Alain d'Albret qui lui a donné mission, en 1521, de récupérer après la mort du cardinal d'Albret de la moitié des seigneuries de Larche et de Terrasson qui lui avaient été vendues par René de Bretagne, comte de Penthièvre. La donation d'Hélie de La Roque à Jean III de Cugnac (né vers 1520), par un acte fait en 1552, le fait seigneur du Peyruzel, de Saint-Pompont, des Fournels à Campagnac-lès-Quercy. La construction du château est terminée au XVIe siècle. En 1595, Marc de Cugnac, probablement à court d'argent à la suite des guerres de religion, vend son fief de Peyruzel à François de Mirandol. Ce besoin d'argent va l'amener à rejoindre la conjuration du duc de Biron et du duc de Bouillon, en 1605. La conjuration ayant été découverte, il doit s'enfuir en Espagne, il est condamnée à mort, ses biens saisis, son château de Giverzac détruit, mais il est finalement pardonné par le roi. La famille de Mirandol possédait aussi le château de Péchaud. Elle a conservé les deux châteaux jusqu'à la Révolution.","architecture":"PEYRUZEL, la construction du château date du XIIIe au XVIe siècle logis accosté d'une tour ronde, très restauré . Sa position élevée lui permettait de surveiller toute la région, de Domme à Gramat, et la route longeant le Céou. Une fenêtre se trouvant sur une des branches de la croix grecque que forme le plan du bâtiment peut être datée du XIIIe siècle.   Le château est attaqué pendant la guerre de cent ans par des routiers anglais  qui se sont installés au château au XIVe siècle de là ils écument la région. En 1760, le château de Peyruzel avait la haute justice sur le village de Daglan. Le monument fait lobjet dune inscription au titre des M.H.depuis le 12 octobre 1948.","habitants":"Peyruzel  famille de La Roque \r\n        \"","divers":"A Daglan;  Peyruzel GPS : 44° 45' 36\" Nord, 1° 11' 49\" Est","gps":"44° 45' 36\" Nord, 1° 11' 49\" Est","images":["../image/image_24/24_Peyruzel_1.jpg","../image/image_24/24_Peyruzel_2.jpg"]},"Consult_chateau_formulaire9017":{"id":"Consult_chateau_formulaire9017","dept":"24","canton":"Bussière-Badil","commune":"Piegut-Pluviers","nom":"Piegut","type":"Vestiges-Châteaux","periode":"XV-XVIII","histoire":"PIEGUT-PLUVIERS, appartenant au comtes de Limoges fut élevé en 1421 en seigneurie, au XVIe siècle, durant les guerres de religion, les huguenots chassent les catholiques enfermés dans le château. Au XVIIe siècle, les croquants attaquent le château.  Nom des propriétaires successifs : au XVe siècle les de La Goublaye. Au XVIIe siècle les Collonge, Pompadours.  Au XIXe siècle les Danjeau,  les Duleau et les Malet. Au XXe siècle, François Marquis de Malet, donne la ruine à la commune. \r\nPUYRAZEAU, situé au sud-est du bourg, dans un bois de châtaigniers, c'est lancienne demeure des Loménie, des Moniès de Sagazan, des Verneilh et des Masfrand.  Il est le lieu de naissance de Joseph Verneilh, député de Dordogne, auteur de nombreux ouvrages, et de Charles Verneilh pionnier de laviation. Il meurt, à 39 ans, alors quil essayait daccomplir une grande trajectoire. Son apport à lhistoire delaviation est primordial.","architecture":"PIEGUT, Les constructions du XVe siècle, sans doute peu confortables, se dégradèrent peu à peu au cours des âges, laissant de nouveau émerger lantique donjon de granit, beaucoup plus résistant, la construction fortifiée montre : Une courtine très arasée, reliant de rondes tours d'angle très arasée. L'ensemble ne montre pas de crénelage ni mâchicoulis. La plus grande des tours d'angle possède encore 4 niveaux éclairés par une ouverture . La tour, effondrait montre ses entrailles.  les 3 autres courtines et les 2 autres angles ont souffert. L'intérieur de la courtine comporte plusieurs vestiges de fente verticale. Avec l'important ébrasement en partie basse,  cela devait être des ouvertures de lumière. Avec les consolidations récentes et le manque d'indice.  Presqu'au centre du château, une haute tour impressionne elle mesure 23 mètres de haut par 7 mètres de diamètre, ses dimensions ne le rendent pas habitable. C'est l'ancien donjon de repli. La porte d'entrée est dans la partie basse, mais à plusieurs mètres du sol. Le sommet montre encore les vestiges des mâchicoulis.\r\nPUYRAZEAU . Le château possède un corps de logis construit au XVIIIe siècle de trois niveaux et lucarnes en combles. Malgré la sobriété de son architecture, son haut toit en croupes lui confère un caractère majestueux, retour en prolongement de part et d'autre sur l'arrière par des bâtiments de deux niveaux avec pavillons en retour d'équerre.","habitants":"Puyrazeau  Famille de Charles Verneilh                Piegut famille de La Goublaye\r\n        \"","divers":"A Piegut-Pluviers; vestiges de Piegut. Château de Puyraseau grav 6","gps":"","images":["../image/image_24/24_Piegut_1.jpg","../image/image_24/24_Piegut_2.jpg","../image/image_24/24_Piegut_3.jpg","../image/image_24/24_Piegut_4.jpg","../image/image_24/24_Piegut_5.jpg","../image/image_24/24_Piegut_6.jpg"]},"Consult_chateau_formulaire3a55":{"id":"Consult_chateau_formulaire3a55","dept":"24","canton":"Bergerac","commune":"Cours de Pile","nom":"Pile","type":"Château","periode":"XVI-XVII","histoire":"PILE, le capitaine Armand de Clermont de Pile vécut en ces murs au XVIe siècle. Nommé par l'amiral de Coligny chef des troupes huguenotes pour le Périgord, il passe pour avoir été la première victime de la St-Barthélémy. Ses exploits  guerriers sont demeurés célèbres par leur cruauté, l'histoire raconte qu'en s'emparant des places fortes catholiques cet homme cruel n'aurait jamais manqué de pendre le curé au clocher de son église ou encore de confectionner des colliers avec les paires d'oreilles de ses vaincus. Propriété aujourd'hui par héritage à la  marquise de Saporta née Héléne  de la Panouse.","architecture":"PILE, deux logis  soudés des XVIe  et XVIIe siècles s'appuient sur une tour ronde à mâchicoulis, très restaurés vers 1900,  De belles fenêtres et lucarnes saillantes et chargées d'écussons, ornent la façade. L'une des tours proches des douves reçoit la chapelle, l'autre est un élément restant du châtelet d'entrée. À l'intérieur, des boiseries grand siècle font l'orgueil de ce château.","habitants":"capitaine Armand de Clermont de Pile \r\n        \"","divers":"A Cours de Pile, château de Pile","gps":"","images":["../image/image_24/24_Pile_1.jpg","../image/image_24/24_Pile_2.jpg"]},"Consult_chateau_formulairebc0d-2":{"id":"Consult_chateau_formulairebc0d-2","dept":"24","canton":"Montignac","commune":"Plazac","nom":"Plazac","type":"Château","periode":"XIII-XV-XVII","histoire":"PLAZAC, château des évêques de Périgueux et ancien cimetière, du XIIe, XIIIe, XVe et XVIIe siècles. Son inscription de 1998 a été annulée lors du classement au titre des M.H.en 2005.\r\nRuines du château de la Vergne, datant de la première moitié du XVIe siècle, incendié en 1923. Le bourg de PLAZAC a été fondé, au Moyen-Age, autour d'une église romane et d'un château-fort.  Ce sont les évêques de Périgueux qui ont construit le château-fort pour protéger l'église et la population. L'évêque de  Périgueux, Hélie Servient, mourut à Plazac le 12 mars 1387.","architecture":"PLAZAC, au cur du Périgord noir, dans la vallée du Vimont, une halte simpose pour savourer ce site des plus authentique. Surplombant la place du bourg sur la pente à lest, cet ensemble église-clocher-château remonte au XIIe siècle.Une restauration générale est en cours.\r\nLéglise remaniée au XVe et XVIIe siècle ouvre par un portail roman, simple, perché sur un prétentieux escalier. A droite le château, relié à léglise, a été transformé en résidence dété pour les Evêques de Périgueux puis en presbytère. Si la porte de léglise reste de bois, empruntez le passage à droite sous le presbytère, vous découvrirez les restes dun enfeu du XIIe siècle, avec des vestiges de fresques représentant un couple.\r\nLe passage sur la gauche vous conduira au dessus de lédifice dans le vieux cimetière. Là, se trouvent de vieilles tombes à lombre des buis et des cyprès.","habitants":"évêques de Périgueux\r\n        \"","divers":"A Plazac château de plazac et Peuch grav 3-4","gps":"","images":["../image/image_24/24_Plazac_1.jpg","../image/image_24/24_Plazac_2.jpg","../image/image_24/24_Plazac_3.jpg","../image/image_24/24_Plazac_4.jpg"]},"Consult_chateau_formulairee387":{"id":"Consult_chateau_formulairee387","dept":"24","canton":"Vergt","commune":"Cendrieux","nom":"Pommerie","type":"Château","periode":"XVIII-XIX","histoire":"POMMERIE, appartient au comte Baudouin-Napoléon de Witt, un descendant de Jérôme Bonaparte (le roi Jérôme), un des frères cadets de Napoléon Bonaparte. Le roi Jérôme eut plusieurs enfants dont la princesse Mathilde qui fut une figure éminente du Second Empire, et le prince Jérôme Napoléon, dit « Plon-Plon », qui fut souvent en désaccord avec le parti bonapartiste, au point que le fils unique de Napoléon III, Eugène-Louis dit le Prince impérial  qui mourra célibataire  préféra confier, par son testament daté du 26 février 1879, la défense de la cause bonapartiste à son cousin, le prince Victor. La querelle dynastique ne prit fin qu'à la mort de « Plon-Plon », et ruina le crédit politique de ses partisans divisés. \r\nVictor Napoléon, fils de Jérôme, devient l'héritier présomptif du trône après la mort de son cousin le Prince impérial, tué le 1er juin 1879 sous l'uniforme anglais lors d'une bataille contre les Zoulous en Afrique australe. Le prince Victor dut s'exiler en Belgique quand, à la suite de ce qu'il avait perçu comme une provocation politique de la part des princes d'Orléans, le gouvernement républicain fit voter le 22 juin 1886 la loi d'exil, interdisant aux prétendants au trône et fils aînés des chefs des familles royale et impériale ayant régné sur la France de vivre en France, qui fut abrogée par une loi du 24 juin 1950. En 1910 il y épousa Clémentine, princesse de Belgique, fille du roi Léopold II, malgré le véto mis par le roi à ce mariage. Laetitia de Witt, docteur en histoire et fille du comte de Witt, a publié en 2007 chez Fayard une biographie de son ancêtre, le prince Victor Napoléon.","architecture":"POMMERIE, sa construction date du XVIIIe au XIXe siècle. C'est devenu un musée. Il appartient à une société privée. Ce musée consacré à Napoléon Ier est ouvert au public. Le château, de même que de très nombreux objets rassemblés dans le musée, font l'objet de protections au titre des M.H. Le « Musée Napoléon », installé dans le château, expose un grand nombre de souvenirs du premier et du second Empire, qui se trouvaient dans la résidence du prince Victor Napoléon, avenue Louise à Bruxelles (Belgique).  De plan oblong à deux niveaux et lucarnes sur combles d'un toit brisé avec deux pavillons aux extrémités toit à l'impérial et pavillon saillant sur partie centrale de la façade avec lucarne sur chiens assis.","habitants":"Comte Baudouin-Napoléon de Witt,\r\n        \"","divers":"A Cendrieux;  Pommerie GPS : 44° 58' 28\" Nord et 0° 50' 13\" Est","gps":"44° 58' 28\" Nord et 0° 50' 13\" Est","images":["../image/image_24/24_Pommerie_1.jpg","../image/image_24/24_Pommerie_2.jpg"]},"Consult_chateau_formulaireb7c6":{"id":"Consult_chateau_formulaireb7c6","dept":"24","canton":"Sigoulés","commune":"Pomport","nom":"Pomport","type":"Château","periode":"XIV-XV-XIX","histoire":"A Pomport, château Bélingard, hôtel,domaine viticole, manoir la Birondie, manoir de Caillevel, manoir de la Gironie,  château Ladesvignes,  château du Malveyran, manoir de Montlong, château de Pécany, XIXe siècle, château de Sanxet du XVe siècle.\r\nLADESVIGNES,  viticulteurs de père en fils depuis 4 générations, de  Véronique et Michel Monbouché auront le plaisir de vous accueillir.                                 PECANY  ancien fief des Courson, Manuel  de la Mothe possédait le domaine en 1636 qui lui venait de sa mère dont la soeur avait épousé Antoine de Courson en 1627.                                                            SANXET Bertrand de Passemar vient de  lâcher la grappe et passe  le sécateur à sa fille Claire et à son mari Joseph. Musée de l'automobile.","architecture":"MALVEYRAN, est un château bâti à Pomport.\r\nPECANY reconstruit au XIXe siècle, est doté de deux ailes en équerre équilibrant un corps de logis orné d'échauguettes  et château de SANXET, du XVe siècle, qui est un domaine viticole. Les manoirs sont : Manoir la Birondie, Manoir de Caillevel, Manoir de la Gironie, et Manoir de Montlong, qui sont des domaines viticoles.","habitants":"Famille de Michel Monbouché                                  Pécany Antoine de Courson                                    Sanxet de Bertrand de Passemar\r\n        \r\n        \"","divers":"A Pomport : Bélingard grav 1. Fagé grav 2. Ladesvignes grav 3 GPS : 44° 46' 49\" Nord, 0° 25' 07\" Est.  Pecany grav 4 GPS : 44° 46' 49\" Nord, 0° 25' 07\" Est. Sanxet grav 5.","gps":"44° 46' 49\" Nord, 0° 25' 07\" Est.  Pecany grav 4 GPS : 44° 4","images":["../image/image_24/24_Pomport_1.jpg","../image/image_24/24_Pomport_2.jpg","../image/image_24/24_Pomport_3.jpg","../image/image_24/24_Pomport_4.jpg","../image/image_24/24_Pomport_5.jpg"]},"Consult_chateau_formulairecd99":{"id":"Consult_chateau_formulairecd99","dept":"24","canton":"La Force","commune":"Prigonnieux","nom":"Prigonnieux","type":"Château","periode":"XVIII-XIX","histoire":"PRIGONNIEUX, chartreuse de Coucombre de la fin du XVIIIe siècle (devenue une propriété viticole portant le nom de « château de Combrillac, chartreuse de Simondie de la fin du XVIIIe siècle. Château de Cavalerie.\r\nChâteau MEYNARD, détruit en août 1944 par les Allemands.\r\nCAVALERIE  reconstruit après son incendie en 1885, en 1963 suite du cycle scolaire de l'abbaye de St Maur. Ce domaine avait appartenu à un comte de La Valette. Pendant l'époque des châtelains  Ce n'est qu'en l'observant des étages du château que l'on découvrait alors qu'il s'agissait d'un corps de femme nue.  Elle est devenue une maison de retraite. Aujourd'hui EHPAD.","architecture":"CAVALERIE l'édifice possède un corps de logis rectangulaire à quatre niveaux avec lucarnes sur comble toit à deux pans flanqué plein cintre en façade d'une tour octogonale  mi-hors-uvre avec toit très pointu, pavillon et tour saillant sur côté gauche  tour polygonale sur l'arrière avec mâchicoulis, crénelée avec une tourelle au centre de cette tour servant de tour de guet et à l'opposée des pavillons saillant de même niveau, l'ensemble est recouvert d'ardoise.","habitants":"Comte de La Valette\r\n        \"","divers":"A Prigonnieux grav 1.                                                     Cavalerie grav 2-3","gps":"","images":["../image/image_24/24_Prigonnieux_1.jpg","../image/image_24/24_Prigonnieux_2.jpg","../image/image_24/24_Prigonnieux_3.jpg"]},"Consult_chateau_formulaire76e4":{"id":"Consult_chateau_formulaire76e4","dept":"24","canton":"Sarlat la Canéda","commune":"Proissans","nom":"Proissans","type":"Manoir","periode":"XV-XVI","histoire":"Plusieurs manoirs à Proissans, celui de  Roussie,  de Cluzeau et de Langlade du XVe siècle.   \r\nCLUZEAU du XVe et XVIe siècles,  est un de ces nombreux petits manoirs qui ornent la campagne périgourdine. Ancien manoir des Sémignon du Rousset. Ce manoir comme le manoir de la Cypière, se trouve dans une combe perdue au milieu de nulle part. Il n'a aucune valeur historique mais une esthétique simple et harmonieuse. Son propriétaire est un brocanteur, manoir inscrit aux M.H. depuis le 7/12/1970 . Les éléments protégés du manoir sont l'enceinte, l'élévation et la toiture.\r\nManoir de LANGLADE du XVe siècle, inscrit au titre des M.H. depuis 1948.\r\nROUSSIE du XIV et XVe siècles, construction fortifiée appartenant aux Ferrières, co-seigneurs de Salignac.  Devenu vers 1535 un manoir huguenot entre les mains de Guillaume du Peyret qui participe activement aux guerres de religion, il est incendié en 1575 sur ordre du maréchal de Montluc.  En 1600, Raynaud de Goudins ayant épousé Jeanne du Peyret, reconstruit le corps du logis et l'entoure de communs formant une cour limitée par la chapelle et le chatelet d'entrée. Le château reste dans la famille pendant 200 ans.  De 1800 à 1895, il appartient aux Viel-Castel qui le cèdent à leur cousin d'Heur des Ages.  Sa fille épouse la même année le comte de Jaubert d'Ysseyrens, en 1926, leur  fille cadette Henriette épouse le docteur de Blanchaud, mais elle meurt 10 ans plus tard. Pendant la guerre de 39-45, le château est inhabité, la résistance y installe une infirmerie. Aujourd'hui a la famille Blanchaud, inscrit au titre des M.H. depuis 1946.","architecture":"CLUZEAU, manoir de plan rectangulaire à trois niveaux, toit en croupe, accolée en façade d'une tour ronde toit en poivrière avec deux lucarnes opposées.                                                                        ROUSSIE, de plan rectangulaire, avec une  façade sobre et harmonieuse longues  de 32 mètres de long, recouverte d'une toiture en \"lauses\", à quatre niveaux, le châtelet d'entrée et son échaugette orientés N-O, les 2 échaugettes suspendues en encorbellement et les latrines du pignon ouest. De la reconstruction en 1600 datent: Le porche central où figure le blason des Goudins,   En 1800 le comte de Jaubert d'Ysseyrens il démolit les bâtiments et la cour pour créer un parc et fait construire la tour carrée (1898), il installe, entre cette dernière et la chapelle, une véranda orangerie qui a disparu vers 1933. Le château a servi de décors pour le film récompensé  \"tout jamais\" en frenchy. Le toit de lauzes est un des plus beau de la région. Aux travaux de la fin du XIXe siècle on doit la tour carrée ornée de créneaux ainsi que les vitraux, la conception et la naissance du parc qui ouvrira des perspectives nouvelles, mettant en valeur la chapelle et le pavillon d'entrée, la construction de nouveaux communs.","habitants":"Famille de Raynaud de Goudins\r\n        \"","divers":"A Proissans; Cluzeau grav 1-2 GPS : 44° 56' 58,33\" Nord, 1° 14' 10,95\" Est.                                               Langlade grav 9.                                                        Roussie grav 3-4-5-6-7  GPS : 44° 55' 14,3\" Nord, 1° 15' 9,7\" Est","gps":"44° 56' 58,33\" Nord, 1° 14' 10,95\" Est.","images":["../image/image_24/24_Proissans_1.jpg","../image/image_24/24_Proissans_2.jpg","../image/image_24/24_Proissans_3.jpg","../image/image_24/24_Proissans_4.jpg","../image/image_24/24_Proissans_5.jpg","../image/image_24/24_Proissans_6.jpg","../image/image_24/24_Proissans_7.jpg","../image/image_24/24_Proissans_8.jpg","../image/image_24/24_Proissans_9.jpg"]},"Consult_chateau_formulaireddde":{"id":"Consult_chateau_formulaireddde","dept":"24","canton":"Saint-Astier","commune":"Saint-Astier","nom":"Puy_St_Astier","type":"Château","periode":"XV","histoire":"A Saint-Astier, le château de Bruneval.  Manoir de Brouillaud, propriété  sur un site inscrit depuis 1979. Château de Crognac, XIXe siècle. Manoir d'Excideuil.  Manoir de Fareyrou ou Chartreuse de Fareyrou, XVIe siècle, inscrite aux M.H. en 2008.  Manoir des Ferrières. Château de la Batud (ou de Labatut) du XVe siècle et plus récent. Manoir de Petit-Puy.  Château de Puyferrat, classé M.H. (voir article) mis à part de ce dernier pas d'information historique.\r\nPUY-SAINT-ASTIER La présence du Puy-Saint-Astier est attestée par des documents dès 1340, mais lactuel château ne paraît pas antérieur au XVe siècle. De par son implantation dominante sur la vallée de lIsle, le château permettait dassurer un contrôle sur les voies de communication, aussi bien terrestres que fluviales, entre Saint-Astier et Périgueux. Vu limportance des mouvements des troupes tant anglaises que françaises au cours de la guerre de Cent Ans, on comprend mieux limportance stratégique du site. Le château actuel fut édifié probablement au XVe siècle, tout comme le château de Puyferrat, par la famille de La Porte. Le fief passa au XVIe siècle par mariage aux mains de la famille dAloigny, et au XVIIe siècle à une branche des dAbzac.                                        LABATUT; le château de Labatut, dans la plaine, entre lIsle et le canal est plus récent que Puyferrat et Puy Saint-Astier. La tour peut être datée du XVe siècle, le manoir étant plus récent. Remanié et modifié assez récemment, il nen garde pas moins son intérêt architectural. Témoignage de loccupation dune grande famille noble dans ce lieu, il sinsère dans le paysage naturel du canal, site remarquable et propice à la promenade.","architecture":"PUY-St-ASTIER, la situation même du château implique quil dut souffrir  des guerres anglaises, de celles de religion et de la fronde. Les bâtiments sud et Est ont été entièrement repris aux XVIIe et XVIIIe siècles. Deux logis en retour d'équerre sont soudés par une tour polygonale contenant l'escalier à vis. Une grosse tour ronde et une plus petite en fer à cheval, s'appuient sur ces grands bâtiments qui ont perdu leurs mâchicoulis au XIXe siècle. À l'est et au sud, l'enceinte intérieure est limitée par deux autres bâtiments en équerre. Deux grosses tours rondes, dont l'une est transformée en chapelle, en renforcent la défense. Les façades et toitures du château, les deux cheminées de la grande salle du deuxième étage, les plafonds voutés au rez-de-chaussée de la tour Nord et de la chapelle, le plafond peint du petit salon, les restes des remparts et le pigeonnier sont inscrits à l'inventaire des M.H.  (arrêté du 1er février 1988)       FAREYROU, le château de Farreyrou est indissociable de la famille de Chalup qui le fit reconstruire dans les toutes premières années du XVIIe siècle. Le château de Fareyrou est composé de quatre corps de bâtiments articulés autour dune cour carrée. Au centre de laile occidentale, lentrée est marquée par un châtelet crénelé, rappelant larchitecture seigneuriale du moyen âge, bien que datant du XVIIe siècle. Le châtelet conserve un décor dorique et mâchicoulis. À l'est du corps de logis proprement dit, que lon peut qualifier de chartreuse de par son élévation, s'étend un jardin.","habitants":"Famille dAloigny\r\n        \"","divers":"A Saint-Astier château du Puy grav 1 à 2. Fareyrou grav 3 et Labattue grav 4.","gps":"","images":["../image/image_24/24_Puy_st_Astier_1.jpg","../image/image_24/24_Puy_st_Astier_2.jpg","../image/image_24/24_Puy_st_Astier_3.jpg","../image/image_24/24_Puy_st_Astier_4.jpg"]},"Consult_chateau_formulaireacd7-2":{"id":"Consult_chateau_formulaireacd7-2","dept":"24","canton":"Nontron","commune":"Saint-Estéphe","nom":"Puycharnaud","type":"Château","periode":"XVI","histoire":"PUYCHARNAUD, l'histoire de cette demeure est intimement lié à l'histoire de la noblesse du nord du département et plus particulèrement aux familles de La Ramière et  de Malet. Les La Ramière sont au XVIe siècle des protestants, et sont notamment des lieutenants de Gaspard de Coligny, le chef Huguenot contre qui la nuit de la Saint-Barthélémy en 1572 était en grande partie dirigée, la famille de La Ramière se convertit au catholicisme sous le règne d'Henri IV dont le seigneur de La Ramière était un proche. Et c'est à cet époque que  l'héritier de cette famille va épouser la fille de celui qui était le maître de Puycharnaud et de ses terres, un Gascon Pierre Emery. Le lieu porte trace de ses anciens maîtres gascons puisque le nom de Puycharnaud vient du gascon Pecharnaud (on retrouve un tel lieu non loin de Clairac, dans le Lot-et-Garonne, ce fief était d'ailleurs propriété des Emery). Le fief de la famille va considérablement s'agrandir lorsqu'au XVIIIe siècle, l'héritière des seigneurs de Piégut, grands maîtres de la région en ces temps, va épouser un membre de la famille royale. Cette fille de la famille des Pompadour (seigneurs de Piégut) va vivre à la cour, et, pour assurer son train de vie elle vend progressivement les terres de son fief. Ce sont les La Ramière qui en profitent et contrôlent, à la veille de la Révolution, un territoire qui s'étend de Nontron jusqu'en Haute Vienne.","architecture":"PUYCHARNAUD, la Révolution en 1789, n'affecte pas la Dordogne, Puycharnaud passent cette période sans dommage. En 1870, un immense incendie ravage le château, on se demande alors s'il faut en construire un nouveau ou restaurer l'ancien. La châtelaine de l'époque décide de se séparer d'une partie de ses terres pour financer la construction d'un nouveau château, comprenant une trentaine de chambres, sur les modèles de la demeure d'une amie à elle qui possédait un château du XVIIIe siècle en Tourraine. Ensuite, le jeu des mariages a fait que ce sont les De Malet qui sont devenus maîtres des lieux et ils ont continuer d'habiter le château de Puycharnaud jusque dans les années 1960 date à laquelle ils avaient vendu une grande majorité de leur terre pour assurer leur train de vie. En 1789, la Révolution française n'affecte pas particulièrement la Dordogne, il faut dire que cette révolution fut principalement urbaine, les La Ramière passent cette période sans perdre de territoires. En 1870, un immense incendie ravage le château, on se demande alors s'il faut en construire un nouveau ou restaurer l'ancien. La châtelaine de l'époque décide de se séparer d'une partie de ses terres pour financer la construction d'un nouveau château, comprenant une trentaine de chambres, sur les modèles de la demeure d'une amie à elle qui possédait un château du XVIIIe siècle en Tourraine.Par la suiite, le jeu des mariages a fait que ce sont les De Malet qui sont devenus maîtres des lieux, ils ont continuer d'habiter ce château jusque dans les années 1960, date à laquelle ils avaient vendu la grande majorité de leur terre pour assurer leur train de vie.","habitants":"Familles de La Ramière \r\n        \"","divers":"A Saint-Estéphe;  Puycharnaud grav 1 à 4","gps":"","images":["../image/image_24/24_Puycharnaud_1.jpg","../image/image_24/24_Puycharnaud_2.jpg","../image/image_24/24_Puycharnaud_3.jpg","../image/image_24/24_Puycharnaud_4.jpg"]},"Consult_chateau_formulaire9770":{"id":"Consult_chateau_formulaire9770","dept":"24","canton":"Saint-Astier","commune":"Saint-Astier","nom":"Puyferrat","type":"Château","periode":"XVI","histoire":"PUYFERRAT, le site faisait partie à lorigine de la seigneurie de Beauronne qui appartenait aux Talleyrand, comtes de Grignols. Au XVIe siècle, le fief passe à la famille de Laporte, originaire du Puy-Saint-Front à Périgueux, et Bertrand Delaporte fait construire le château actuel qui sera terminé au siècle suivant par son fils Bernard. Pendant les Guerres de religion, le château est en janvier 1591 aux mains des protestants, tout comme ceux du Puy-Saint-Astier et de Crognac, qui leur seront tous repris la même année. En 1792, Jean Jacques de Laporte, décide de se retirer à la Martinique avec toute sa famille, sa femme Marie Anne Agathe de Lée étant la fille dun riche colon de la Martinique. Il est considéré comme émigré bien qu'il fasse valoir, depuis la Martinique (territoire français), quil réside toujours en France, et envoie un certificat qui, en raison de linvasion de la Martinique par les anglais, narrivera pas à destination. Les Sérigny prétendent être créanciers de Jean Jacques de Laporte et réclament les revenus de ses biens qui, dabord leur seront refusés puis adjugés. Le 7 septembre 1823, Jean Jacques de Laporte meurt à la Martinique et le 26 août 1824, madame de Sérigny, au nom de son fils mineur, vend Puyferrat à monsieur Paul-François Dupont, lequel fait construire dans le parc une chapelle avec un caveau pour sa famille. En 1830, les deux fils de Jean Jacques de Laporte de retour en France, présentent une requête pour récupérer le château de Puyferrat qui naboutira pas. La famille Maréchal jusqu'en 1955, puis madame Rosenberg jusquen 1998, enfin monsieur et madame Marzat sont tour à tour propriétaires du site. Le château de Puyferrat a été classé au titre des M.H. par liste de 1862.","architecture":"PUYFERRAT, garde de nombreux témoins de larchitecture féodale, notamment un corps de logis de plan rectangulaire couvert dun toit extrêmement pentu et d'une belle charpente en croix de Saint-André. Flanqué de deux tours dangle et deux échauguettes couvertes de toits en poivrière, un chemin de ronde complet sur mâchicoulis en fait le tour. Le chemin de ronde, permet d'apprécier un magnifique panorama sur Saint-Astier et la campagne environnante. Les flancs du château exposés est-ouest permettent à la lumière du matin et de laprès midi de baigner continuellement les trois étages du château.   Il aurait existé au XVe siècle un ancien manoir dont il ne reste plus rien et la construction actuelle du XVIe siècle serait une reconstruction. Au XIIe siècle, des cluzeaux (refuges souterrains) ont été creusés.  Le corps de logis rectangulaire est cantonné d'un côté de deux grosses tours circulaires et, de lautre, de deux tourelles en encorbellement. Le château est surmonté d'un chemin de ronde sur mâchicoulis et a conservé ses arquebuseries. Sur des caves où sont aménagées les cuisines, le rez-de-chaussée comporte une grande salle pavée et les deux étages sont desservis par un monumental escalier à paliers. La remarquable charpente soutient la toiture à quatre pans de tuiles plates. La façade ouest est ornée dune porte de la dernière Renaissance, dun pur style dorique. Une chapelle avec un caveau familial a été construite dans le parc en 1825.","habitants":"Famille de Laporte\r\n        \"","divers":"A Saint-Astier; Puyferrat  grav 1 à 3 GPS : 45° 8' 55,8\" Nord, 0° 30' 23,7\" Est","gps":"45° 8' 55,8\" Nord, 0° 30' 23,7\" Est","images":["../image/image_24/24_Puyferrat_1.jpg","../image/image_24/24_Puyferrat_2.jpg","../image/image_24/24_Puyferrat_3.jpg"]},"Consult_chateau_formulairef60b":{"id":"Consult_chateau_formulairef60b","dept":"24","canton":"Champagnac de Belair","commune":"Villars","nom":"Puyguilhem","type":"Château","periode":"XV-XVI","histoire":"PUYGUILHEM, le 14 mai 1464, noble homme Jehan Flamenc a rendu hommage pour la maison noble de Puyguilhem et son chastel de Condat. Le manoir de Puyguilhem et le chastel de Condat ont été acquis par Pierre Mondot de La Marthonie,  le destinait à servir de résidence secondaire et relais de chasse, premier président au parlement de Guyenne, entre 1509 et 1512, de Jacques Muraut, seigneur de Bort, et Alzias Flamenc, seigneur de Romain. La construction du château  démarre en 1513, commanditée par Mondot de La Marthonie. L'homme est un proche de François Ier et de sa mère Louise de Savoie. Il administre le royaume lorsque le roi est en guerre en Italie. En 1515, le roi François Ier voulant reconnaître ses services, l'a fait venir du parlement de Bordeaux où il était premier président pour le nommer premier président du Parlement de Paris le 3 février 1514/1515. Mondot de La Marthonie meurt à Blois en 1517 dans des circonstances obscures. La construction a dû être poursuivie par son frère Gaston de La Marthonie, évêque de Dax, pour son neveu, Geoffroy de La Marthonie. Le château est resté dans la famille de La Marthonie puis est passé par mariage dans la famille de Chapt de Rastignac, et aux de la Rochefoucauld-Liancopurt qui le revendent à la fin du XIXe siècle il connait ensuite divers propriétaires qui le laissent à l'abandon. Racheté par l'état en 1939 qui le restaure, est géré depuis février 2008 par le centre des monuments nationaux.","architecture":"PUYGUILHEM, il semble que l'édification se soit déroulée en deux étapes : la première s'achevant en 1524, date inscrite dans la frise de la tourelle d'escalier, comprenant les fondations, une partie de la tour d'angle et la tourelle hexagonale, la seconde suivant de près, qui voit le château s'achever en 1535. Sa conception oscille entre deux époques, médiévale et Renaissance. Plusieurs éléments rappellent en effet le style gothique du Moyen-Age, notamment l'absence de symétrie de l'édifice et les parties intérieures tandis que la façade extérieure évoque celles des châteaux de la Loire que son propriétaire connaît bien puisqu'il fréquente la cour du Roi. Le château est modeste dans ses dimensions. l'édifice s'ordonne autour d'un corps de logis rectangulaire entre une tour pentagonale renfermant un escalier d'honneur et une grosse tour ronde, une tourelle octogonale soude celle-ci au bâtiment principal et abrite un autre escalier à vis, ces tours sont couronnées de mâchicoulis et chemin de rondes à l'arrière vaste logis est prolongé par deux ailes  désymétriques, la plus longue à été ajoutée au XVIIIe siècle, Les façades sont percées de fenêtres à meneaux chargées de de balustres certaines sont montées sur lucarnes sculptées au pinacles à fleurons de médaillons et de statuettes.  En 1938, l'État exproprie pour cause d'utilité publique son propriétaire qui a laissé le château tomber en ruine. Il entame une restauration qui durera 20 ans. Classé aux M.H. en 1913.","habitants":"Pierre Mondot de La Marthonie\r\n        \"","divers":"A Villars; Puyguilhem GPS : 45° 25' 33,6\" Nord et 0° 44' 39,5\" Est","gps":"45° 25' 33,6\" Nord et 0° 44' 39,5\" Est","images":["../image/image_24/24_Puyguilhem_1.jpg","../image/image_24/24_Puyguilhem_2.jpg","../image/image_24/24_Puyguilhem_3.jpg"]},"Consult_chateau_formulaire5c55":{"id":"Consult_chateau_formulaire5c55","dept":"24","canton":"Saint-Aulaye","commune":"Puymangou","nom":"Puymangou","type":"Château","periode":"XV","histoire":"PUYMANGOU, du XVe siècle. est mentionné en 1676 lors d'un don de Régis Bouchard d'Esparbes d'Aubeterre, comte de Lussan. C'est vraisemblablement à cette époque que l'ancien manoir de la fin du Moyen-Age a été transformé en une demeure plus vaste. Il a appartenu par la suite à la famille Chapelle de Jumilhac. En 1987  la famille Thierry-Bonne achète le château.","architecture":"PUYMANGOU, malgré son abandon de deux siècles, puis d'un incendie un énorme travail a été  mené en 1988 pour qu'il puisse retrouver son aspect de l'époque, petit château du XVIIe siècle récemment restauré,  idéal pour passer des vacances en famille dans un cadre de caractère et de charme et dans une nature calme et apaisante.  Il se compose d'un corps central qui intègre, au milieu de sa façade Est, les vestiges du manoir primitif. Ce corps est cantonné à l'est de deux tours carrées coiffées de toits en pavillon à tuiles plates. Elles sont percées çà et là de bouches à feu. La plupart des baies s'alignent en travées et présentent des meneaux en bois.","habitants":"Régis Bouchard d'Esparbes d'Aubeterre\r\n        \r\n        \"","divers":"Château de Puymangou","gps":"","images":["../image/image_24/24_Puymangou_1.jpg","../image/image_24/24_Puymangou_2.jpg"]},"Consult_chateau_formulaire24e9":{"id":"Consult_chateau_formulaire24e9","dept":"24","canton":"Sarlat la Canéda","commune":"Marquay","nom":"Puymartin","type":"Forteresse","periode":"XIII-XV-XVI","histoire":"PUYMARTIN, la construction du château a débuté au XIIIe siècle fief des évêques de Sarlat tenu par la famille de Serviens. En 1357, le château devient possession anglaise. Les consuls de Sarlat rachètent le domaine aux anglais et l'abandonnent. Radulphe de Saint-Clar seigneur de Puymartin, vassal du seigneur de Beynac   reconstruit le château en 1450. C'est lui qui reprend Sarlat aux huguenots sous le nom de capitaine de Puymartin. Au XVIIe siècle, Jean de Saint-Clar et sa sur Suzanne  qui épouse Claude de Lapleynie se disputent la possession du château pendant 40 ans. Suzanne en devient finalement propriétaire puis passe à Henri-Claude de Lapleynie fils de François. Puis au XVIIe siècle le château passe par alliance aux Roffignac, resté célibataire, Louis de de Roffignac fils de Guilhemine de Lapleynie  laisse tous ses biens à son neveu François de Carbonnier. Au XIXe siècle, le marquis Marc de Carbonnier de Marzac, grand-père du propriétaire actuel, restaure le château dans un style néogothique grâce à la dot de sa femme.  Après le décès du propriétaire, Henri de Chérade de Montbron, le 31 juillet 2002, sa femme et ses enfants en ont hérité en 2003.","architecture":"PUYMARTIN,  datant des XVe, XVIe et XVIIe siècles, cette seigneurie est dans la même famille depuis le XVe siècle, il a été le siège dassauts conduits par les français, comme par les anglais. Il est même détruit en 1358, puis reconstruit vers 1450 à la fin de la guerre de 100 ans. Au XIXe, une grande campagne de restauration a eut lieu,  dans un style néogothique.\r\nLe château est inscrit au titre des M.H. par arrêté du 6 décembre 1948. L'une de ses chambres du XVIIe siècle, lambrissée et peinte, Cest un élève de Viollet Le Duc qui sest lâché et a carrément reconstruit un grand donjon massif avec terrasse crénelée, des tourelles, créneaux et d' échauguettes d'angles et remparts qui nexistaient plus et des fenêtres à meneaux. A limage du magnifique château de Roquetaillade (33), on se trouve dans un château « trop neuf », même sil est magnifique.","habitants":"Famille de Serviens\r\n        \"","divers":"A Marquay; Puymartin GPS : 44° 54' 38\" Nord, 0° 8' 33\" Est","gps":"44° 54' 38\" Nord, 0° 8' 33\" Est","images":["../image/image_24/24_Puymartin_1.jpg","../image/image_24/24_Puymartin_2.jpg","../image/image_24/24_Puymartin_3.jpg","../image/image_24/24_Puymartin_4.jpg","../image/image_24/24_Puymartin_5.jpg"]},"Consult_chateau_formulaire4533":{"id":"Consult_chateau_formulaire4533","dept":"24","canton":"Mareuil","commune":"Puyrenier","nom":"Puyrenier","type":"Château","periode":"XVII","histoire":"BELLEVUES, du  XVIIe siècle, et sa chapelle Saint-Jean du XVIe siècle.                                                 COMBES, la demeure est dès lorigine le fief de la famille de Maillard. Jean de Maillard, écuyer, obtient le 22 octobre 1606 dIsabelle de Beauville, comtesse des Cars, en tant que Dame de la baronnie de Mareuil, lanoblissement de la maison ainsi que lautorisation de la surélever avec tours, terrasses et mâchicoulis. La famille de Maillard occupera sans discontinuer le château jusquen 1961. Après avoir ensuite plusieurs fois changé de mains, laissée à labandon, elle est finalement achetée en 1970 par la famille Gury qui la restaure alors de manière importante. Madame Edmonde Gury sera Maire de Puyrenier de 1977 à 2008 et doyenne des maires de France durant de nombreuses années.En Janvier 2011, suite au décès de Madame Gury, nous tombons sous le charme des lieux et nous installons pour une nouvelle aventure.","architecture":"BELLEVUE   de plan rectangulaire à deux niveaux et lucarnes sur toit en croupe recouvert d'ardoises accolé d'échauguettes aux angles côté parc et de deux tours carrées sur la façade d'entrée.                             COMBES au nord-ouest de Puyrenier. Au terme dune allée darbres, on accède à La Combe et à ses dépendances par un châtelet muni de mâchicoulis, qui souvre sur une cour intérieure par un portail à lourd ventaux aujourdhui disparus.Latéralement à lentrée, le château, très restauré, allonge des logis du XVIe et XVIIe siècles auxquels se soudent en quinconce deux tours carrées dont lune, à haute toiture à mâchicoulis, est précédée dun escalier donnant à létage. La façade au nord, côté terrasse, domine la Nizonne et une étendue danciens marais.","habitants":"Famille de Maillard\r\n        \r\n        \"","divers":"A Puyrenier château de Bellevue grav 1-2, de la Combe grav de 3 à 6.","gps":"","images":["../image/image_24/24_Puyrenier_1.jpg","../image/image_24/24_Puyrenier_2.jpg","../image/image_24/24_Puyrenier_3.jpg","../image/image_24/24_Puyrenier_4.jpg","../image/image_24/24_Puyrenier_5.jpg","../image/image_24/24_Puyrenier_6.jpg"]},"Consult_chateau_formulaire84f4":{"id":"Consult_chateau_formulaire84f4","dept":"24","canton":"Périgeux","commune":"Périgeux","nom":"Périgeux","type":"Vestiges","periode":"XII-XIV","histoire":"BARRIERE, bâti  à Périgueux, Il date du XIIe siècle, fut construit sur une enceinte gallo-romaine, de la fin du IIIe siècle, pour protéger la cité. Il était le fief de la famille Barrière au XIIIe siècle. Jeanne de Barrière épouse en 1400 Olivier d'Abzac. Aujourdhui ruiné, il conserve toutefois son donjon roman du XIIe siècle et le reste dun logement rectangulaire avec sa tour descalier polygonale du XVe siècle. Côté ouest, les murs reposent sur l'ancienne muraille gallo-romaine, avec ses imposants blocs de pierre. Du château subsistent des murs percés de fenêtres à meneaux et deux tours, à l'est et au sud. La tour orientale, tronquée, offre une porte à décor flamboyant. la propriété revient par legs à la ville de Périgeux              La MAISON des CONSULS,   elle a successivement appartenu à la famille du Lau de la Côte puis aux Cayla. La maison appartenait avant la Révolution à la famille de Fayolle. En 1889, elle est classée au titre des M.H.  Côté rivière, la façade de style gothique flamboyant présente des mâchicoulis décorés surmontés d'un chemin de ronde, des fenêtres à meneaux et deux lucarnes, dont une est ornée de chimères. À l'arrière, des mâchicoulis qui prolongent ceux de l'hôtel Salleton surplombent la rue du Port-de-Graule, une étroite ruelle où se trouve la cour qui donne accès à une tour hexagonale dans laquelle se loge un escalier à vis.\r\nVESONE, tour, vestiges gallo-romain dédié à Vésunna. C'est une tour ronde  située dans un jardin public, le jardin de Vésone, 50 mètres à l'ouest du musée Vesunna qui renferme les vestiges de la domus des Bouquets. Une brèche large de près de neuf mètres éventre son côté Est. A L'ouest à Marsac un magnifique château pas d'information historique.","architecture":"BARRIERE,  fut détruit, en partie, par les Huguenots, en 1575.   Construit sur les fondations des murailles de la ville, ortifications élevées avec les matériaux récupérés sur les ruines romaines de lancienne Vésuna, on trouve des preuves de son existence dés 1245. Il porte le nom de la famille qui le possédait au moyen âge.  Il est classé au titre des M.H. depuis la liste de 1862.                                                                   La Tour MATAGUERRE est une tour bâtie à Périgueux,  sa construction date du XIIIe siècle, est l'ultime vestige du rempart de l'enceinte médiévale qui protégeait le Puy Saint-Front, véritable noyau urbain qui est devenu le centre-ville de Périgueux. La Tour Mataguerre a été entièrement rebâtie au XVe siècle. De 1622 à 1831, elle servit d'endroit pour entreposer la poudre. Délabrée, sa toiture de forme conique fut supprimée en 1807. Construite sur le rocher, elle est de forme circulaire, avec une base plus évasée que le corps principal. Elle est couronnée de mâchicoulis et comporte des archères, est classée aux M.H. en 1840.\r\nVESONE,  tour est le vestige d'un temple gallo-romain construit au Ie ou IIe siècle. Sa hauteur est de 24,6 m. Sa construction cylindrique de 21 mètres au-dessus du sol actuel. En 1833, le site, propriété du Comte Wlgrin de Taillefer, fut cédé à son décès, à la ville de Périgueux.","habitants":"Famille Barrière                                                              Famille du Lau de la Côte\r\n        \r\n        \"","divers":"A Périgueux; vestiges Barrière grav 1 à 5 GPS : 45° 10' 53\" Nord et 0° 42' 44\" Est                                      Tour grav 7 GPS : 45° 10' 57,9\" Nord, 0° 43' 9,1\" Est                       Vésone grav 8 GPS : 45° 10' 46\" Nord, 0° 42' 52\" Est. Maison du Consul grav 8 Marsac grav 9","gps":"45° 10' 53\" Nord et 0° 42' 44\" Est","images":["../image/image_24/24_P%c3%a9rigueux_1.jpg","../image/image_24/24_P%c3%a9rigueux_2.jpg","../image/image_24/24_P%c3%a9rigueux_3.jpg","../image/image_24/24_P%c3%a9rigueux_4.jpg","../image/image_24/24_P%c3%a9rigueux_5.jpg","../image/image_24/24_P%c3%a9rigueux_6.jpg","../image/image_24/24_P%c3%a9rigueux_7.jpg","../image/image_24/24_P%c3%a9rigueux_8.jpg","../image/image_24/24_P%c3%a9rigueux_9.jpg"]},"Consult_chateau_formulairee81b":{"id":"Consult_chateau_formulairee81b","dept":"24","canton":"Thenon","commune":"Azerat","nom":"Rastignac_Azérat","type":"Château","periode":"XVIII-XIX","histoire":"AZERAT, appartenait à la famille de Souilllac de Montmége, aux Gonthier de Laubanie, aux Lubersac, aux Rastignac et aux Rochefoucauld. Transformé en édifice public et en 1887 racheté par la commune pour aménager un groupe scolaire et poste, le château brule en 1903, la partie rénovée est   aujourd'hui l'hôtel de ville.                                                                  RASTIGNAC, édifié de 1811 à 1817 par Mathurin Salat dit Blanchard , a été incendié le 30 mars 1944 par les troupes allemandes de la division Brehmer en représailles contre la Résistance. Le château a servi lors de la seconde guerre mondiale de dépôt duvres dart.  Ligo de la Bachelleria, troubadour, est cité en 1210. Une ancienne maison forte est connue en ce lieu en 1324, sous le nom de Rostinhac. Mais en réalité la Maison-Blanche de Washington, bâtie de 1792 à 1801 par l'architecte James Roban, n'a pas plus servi de modèle que l'inverse.  En 1833 mort du marquis de Rastignac  En 1877 vente du château par  le comte Alfred de la Rochefoucauld petit fils du marquis de Rastignac à Auguste  de Peyronnie, en 1921 le fils de ce dernier le lègue à un de ses cousins le capitaine de Vaisseaux aux Landwick. Le rapprochement est encore plus surprenant à l'intérieur avec l'atrium, l'escalier et le salon ovale. Le 30 mars 1944, des SS débarquent en trombe à Rastignac, ils inspectent les pièces du bâtiment. Aujourd'hui au docteur Richard Smell.","architecture":"AZERAT vestige d'un château transformé en mairie reste une tour de l'enceinte.                                 RASTIGNAC, le château de Rastignac ressemble comme deux gouttes deau à la Maison-Blanche de Washington. Difficile de dire qui a copié qui Certains affirment que Thomas Jefferson aurait vu les plans du château périgourdin lors dune visite en France et quil sen serait inspiré après son élection à la présidence américaine. Sous Louis XIII on évoque un château fort comportant encore des éléments de défense, c'est-à dire tours, chemin de ronde et remparts. Rastignac, édifié de 1811 à 1817, présente une demi-rotonde soutenue par six colonnes circulaires ioniques, posée au centre d'un logis de trois baies symétriques couronnée par une balustrade. La similitude avec la demeure présidentielle américaine surprend. En 1942, le marchand d'art parisien, Josse Bernheim, rien n'a filtré jusqu'à aujourd'hui, mais on sait qu'à cette époque, des voisins, amateurs très éclairés, connaissaient ou pressentaient fortement l'existence de ce dépôt précieux chez les Lauwick. Sont-ils venus juste avant les SS , soixante ans après le forfait où seraient donc cachées toutes ces uvres. Le château a été quasiment reconstruit après la guerre par l'architecte Froidevaux des M.H.  Les murs comme les huisseries ou les parquets, sont aujourd'hui restaurés avec fidélité par les nouveaux propriétaires.","habitants":"marquis de Rastignac\r\n        \r\n        \"","divers":"A Azérat; château de Rastignac","gps":"","images":["../image/image_24/24_Rastignac_Az%c3%a9rat_1.jpg","../image/image_24/24_Rastignac_Az%c3%a9rat_2.jpg","../image/image_24/24_Rastignac_Az%c3%a9rat_3.jpg","../image/image_24/24_Rastignac_Az%c3%a9rat_4.jpg","../image/image_24/24_Rastignac_Az%c3%a9rat_5.jpg","../image/image_24/24_Rastignac_Az%c3%a9rat_6.jpg","../image/image_24/24_Rastignac_Az%c3%a9rat_7.jpg"]},"Consult_chateau_formulaire665d":{"id":"Consult_chateau_formulaire665d","dept":"24","canton":"Saint-Astier","commune":"Razac sur l","nom":"Razac_Marsac","type":"Château","periode":"XV-XVI-XVII","histoire":"A Razac  sur Isle; château d'Antoniac, du  XVIIIe et XIXe siècles.  Château de Marsaguet et à trois km au nord est à  Léguillac de l'Auche le château du But du XVe et XVIe siècles, château de la Faye, ancien prieuré.\r\nRAZAC, au Moyen-âge, la paroisse et la seigneurie de Razac relevaient de la ville et châtellenie de Périgueux, mais durant la guerre de cent ans, le château fut tenu par les anglais à plusieurs périodes (1348, 1416). En 1451, le comte Jean de Périgord octroya la seigneurie de Razac, à un de ses fidèles chevaliers En 1453, Jean de Bretagne donne à Hugues de Bayly, Razac et ses dépendances (en cadeau de mariage). Le nouveau seigneur de Razac fait reconstruire le château: Hugues de Bayly. Les descendants de ce dernier, seront seigneurs de Razac jusqu'à la Révolution française.\r\nBERNADOUX, du XIXe siècle, ancienne colonie de vacances ; correspond aujourd'hui à l'hôtel de ville.\r\nA cinq kilomètres de Razac, Marsac sur Isles; le château de Marsac.   Le château de SALTGOURDE et le terrain de golf y attenant.  Le manoir de CHAMBON, du XIXe siècle.                                                          MARSAGUET, appartenait à l'origine à Jean Delaye le donna à son cousin Jean du Rieu en 1635 qui fit construire le château, le fils François émigra à la Révolution mais décéda  le 15 mai 1812 à Marsaguet il avait épousé Claire de Donneraël  ils eurent six enfants, cette branche conservera le château par alliance passe à la famille de Lavaÿsse jusqu'en 1866 date à laquelle  il fut vendu au docteur Rivière.\r\nMARSAC, au XVIIe siècle,avant que la commune ne devienne Marsac à la Révolution. C'est d'ailleurs durant la période révolutionnaire que Marsac perd près de la moitié de son territoire (nord et ouest de la commune : hameaux de La Croix-Herbouze, Les Combeaux, de Terrassonie, de Lespinasse et de Chercuzac au profit de la commune voisine de Chancelade.","architecture":"RAZAC, en 1799, les limites avec les communes voisines de Coursac et d'Annesse-et-Beaulieu sont modifiées. Razac  y gagne le château de Marsaguet dans sa totalité (Coursac), mais perd le château de Siorac et les hameaux de Gravelle et de Langlade (Annesse-et-Beaulieu).En 1910 eut lieu à Razac la félibrée (manifestation culturelle Occitane). Château d'Antoniac, du XVIIIe et XIXe siècles  il était promu à un destin champêtre. On ne peut manquer d'y évoquer François-Joseph de Chancel (1677-1758) qui, rival de Voltaire, écrivit plusieurs tragédies, trois opéras et une comédie. Famille : des Lagrange-Chancel. \r\nChâteau de Marsaguet, de plan en L, corps de logis à deux niveaux, flanqués aux extrémitées  de pavillons carrés toit à quatre pans, l'ensemble recouvert de tuiles.","habitants":"Razac Comte Jean de Périgord                 \r\n        \"","divers":"A Razac sur l'isle; à Razac-marsac château de Bellevue de Bernadoux grav 4-5 de saltgourde  grav-6. De Marsaguet grav 8.","gps":"","images":["../image/image_24/24_Razac_Marsac_1.jpg","../image/image_24/24_Razac_Marsac_2.jpg","../image/image_24/24_Razac_Marsac_3.jpg","../image/image_24/24_Razac_Marsac_4.jpg","../image/image_24/24_Razac_Marsac_5.jpg","../image/image_24/24_Razac_Marsac_6.jpg","../image/image_24/24_Razac_Marsac_7.jpg","../image/image_24/24_Razac_Marsac_8.jpg"]},"Consult_chateau_formulairef5db":{"id":"Consult_chateau_formulairef5db","dept":"24","canton":"Sigoulés","commune":"Razac- de-Saussignac","nom":"Razac_Saussignac","type":"Chateaux","periode":"XV-XVI","histoire":"Deux châteaux à Razac et Saussignac et le Chabrier                                                                                              CHABRIER, le château actuel fut fondé en 1640. La vigne y est la culture principale depuis le XIe siècle, il y a 28 ans, Pierre Carle et son épouse ont abandonné une vie de famille hautement confortable dans la capitale pour en construire une nouvelle, vibrés par la passion des vins.","architecture":"CHABRIER, au Moyen-Age Le Chabrier était une forteresse et elle fut détruite en 1345 au début de la guerre de cent ans. Le château actuel fut fondé en 1640. Edifice de plan rectangulaire avec deux corps de logis accolé de deux pavillons carrés de trois niveaux de part et d'autre des flancs, la partie centrale saillante de l'édifice en façade à deux niveaux et lucarnes sur comble d'un toit brisé à la mansart.","habitants":"Chabrier Famille Carle\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Razac- de-Saussignac;   Chabrier","gps":"","images":["../image/image_24/24_Razac_Saussignac_1.html","../image/image_24/24_Razac_Saussignac_2.jpg","../image/image_24/24_Razac_Saussignac_3.jpg","../image/image_24/24_Razac_Saussignac_4.jpg"]},"Consult_chateau_formulaire75ab":{"id":"Consult_chateau_formulaire75ab","dept":"24","canton":"Domme","commune":"St-Aubin de Nabirat","nom":"Repaire","type":"Vestiges","periode":"XVI-XVII","histoire":"REPAIRE, ruines du XVIe et XVIIe siècles, inscrites en 2003 au titre des M.H..Ce fut un fief des Pouguet et des Beaumont puis il a  appartenu à dautres familles au cours des siècles et fut abandonnée tel que les Tournier, les Tavernes.  Jean Hélis de Carbonières sa première femme d'ou Imbert du Pouget écuyer seigneur d'Ybirac et autre soeur de noble antoine de Bar seigneur de Villemade et de Mauzac. La suite vous la connaissez, pillages et saccages durant de nombreuses années avant son rachat par des propriétaires privés. Ces derniers ont annoncé des travaux de restauration.","architecture":"Ce château situé à Saint-Aubin-de-Naburat en Dordogne  sur un promontoire domine la vallée du Céou. Son origine remonte au Moyen-Age mais il fut entièrement reconstruit  fin  du XVIe siècle et début XVIIe siècle. Aujourdhui les nouveaux propriétaires soccupent de sa restauration mais son histoire fut assez mouvementée.  Elle comporte deux corps de bâtiments construits de façon perpendiculaire bordant une cour close de murailles et renforcée de tours. Les deux logis longtemps abandonnés sont en cours de restauration, avec ses tours, courtines, murailles et sa terrasse nord.  Très malmené au cours des guerres de religion et de la Révolution, le château était déjà en ruines au début du XXe siècle. Il a été classé M.H. en 2003, une mesure qui devrait permettre d'en assurer la sauvegarde.","habitants":"Fief des Pouguet\r\n        \"","divers":"A St-Aubin de Nabirat;  vestiges du Repaire GPS : 44° 43' 55\" Nord, 1° 17' 22\" Est","gps":"44° 43' 55\" Nord, 1° 17' 22\" Est","images":["../image/image_24/24_Repaire_1.jpg","../image/image_24/24_Repaire_2.jpg","../image/image_24/24_Repaire_3.jpg","../image/image_24/24_Repaire_4.jpg"]},"Consult_chateau_formulaire528d":{"id":"Consult_chateau_formulaire528d","dept":"24","canton":"Perigueux","commune":"Chancelade","nom":"Reynats","type":"Château","periode":"XIX","histoire":"REYNATS,  ce magnifique château de style néo renaissance a été construit en 1840 par un riche notable, le notaire Lagrange, qui voulu en faire un lieu culturel et mondain.  Mais la ruine du notable l'obligea à vendre le château, qui ensuite connut plusieurs propriétaires privés. A la fin du siècle dernier, il fut repris par une famille qui en a fait un établissement dhôtellerie et de restauration par Brigitte Chiorozas . Un parc entoure le château, avec quelques sculptures d'Art moderne.   KERUEL pas d'information historique","architecture":"REYNATS, nous sommes vers 1840, à l'époque où les notaires de Province étaient de beaux messieurs à la barbe carrée qui, lorsqu'ils se rendaient à Paris allaient au théâtre et parfois succombaient aux charmes de jolies ingénues. C'est ce qui dut arriver au notaire Lagrange. L'homme était riche et fit construire le château des Reynats en imaginant d'en faire la résidence d'été de la comédie Française. Le notable périgourdin venait d'inventer le premier de ces festivals qui pullulent aujourd'hui dans la France des vacances. Il mit à exécution son projet et la comédie Française se déplaça, le grand tragédien Mounet-Sully en tête et donna une représentation d'Iphigénie dans le champ qui sépare le château de l'Abbaye.  On en retrouve un propriétaire célèbre à la fin du XIXe siècle, Camille Pelletan, journaliste et critique, ami de Rimbaud et de Verlaine qui finit en politique comme ministre de la marine en 1905. Puis les familles se succédèrent jusqu'à la fin du siècle dernier où la famille Desprez décida de faire du château l'hôtel qu'il est aujourd'hui.                                                                   KEYRUEL, corps de logis de plan en U avec deux retour en équerre saillants à fronton accolé sur la droite d'une tour ronde, fenêtres  en lucarnes jumenées, toit en poivrière en ardoise, et contre cet édifice une dépendance de deux niveaux avec lucarnes sur le toit s'appui contre la tour.","habitants":"Camille Pelletan\r\n        \"","divers":"A Chancelade; Reynats  grav 1-2GPS : 45° 12' 23\" Nord et 0° 39' 58\" Est. Keruels grav 3","gps":"45° 12' 23\" Nord et 0° 39' 58\" Est. Keruels grav 3","images":["../image/image_24/24_Reynats_1.jpg","../image/image_24/24_Reynats_2.jpg","../image/image_24/24_Reynats_3.jpg"]},"Consult_chateau_formulaire98e9":{"id":"Consult_chateau_formulaire98e9","dept":"24","canton":"Verteillac","commune":"Bouteilles Saint-Sébastien","nom":"Richardie","type":"Château","periode":"XVIII","histoire":"RICHARDIE  du XVIIIe siècle. Ancien fief des Fonpitou de Massacré qui comprenait une partie des paroisses de Saint-Paul-Lizonne et de Bouteilles, La Richardie dépendait de la châtellenie de Bourzac. Dominant la Cendronne, le château actuel du XVIIIe siècle, lié alors à la viticulture.","architecture":"RICHARDIE  château actuel du XVIIIe siècle, lié alors à la viticulture, fut  construit sur les fondations du logis médiéval. Pendant la Révolution, deux tours rondes de l'ancienne enceinte fortifiée ont été détruites.\r\nCe château se compose d'un vaste logis à un étage carré et étage de comble protégé par un toit brisé à croupes. Sa façade sur jardin, orientée au sud-est, est rythmée par cinq travées prolongées par celles de deux pavillons. Ces derniers semblent s'imposer par leur légère avancée côté cour et côté jardin, ils dominent d'un demi-étage le corps de logis central. On notera la présence d'un fronton côté jardin, celui de la façade sur cour ayant été supprimé. Du côté nord la cour est fermée par deux ailes de communs séparées de l'habitation, laissant ainsi un passage étroit sur un côté des pavillons.","habitants":"châtellenie de Bourzac\r\n        \"","divers":"A Bouteilles Saint-Sébastien; Richardie château plus mairie","gps":"","images":["../image/image_24/24_Richardie_1.jpg","../image/image_24/24_Richardie_2.jpg","../image/image_24/24_Richardie_3.jpg"]},"Consult_chateau_formulaire9f9a-2":{"id":"Consult_chateau_formulaire9f9a-2","dept":"24","canton":"Mareuil","commune":"St-Crépin  de Richemont","nom":"Richemont_24","type":"Château","periode":"XVI","histoire":"RICHEMONT,  de style Renaissance, construit entre 1564 et 1581 par le chroniqueur Pierre de Bourdeille, abbé de Brantôme, enterré dans la chapelle du château. Depuis lors, dalliances en successions, ce château est resté jusquà ce jour, selon les souhaits de Brantôme, dans la famille, avec une courte interruption au moment de la vente des biens nationaux. passe aux Jussac, puis aux Chabans, Les Joumard de Chabans de Richemont lont occupé, pendant le temps le plus long, jusquau début du XIXe siècle, puis vinrent les de Saint-Légier et aujourd'hui aux Prévost de Sansac de Traversay.","architecture":"RICHEMONT, constitué de deux corps de logis en équerre, L'architecture du château, considérée dans sa globalité, vient rappeler au visiteur qu'il se trouve devant un monument construit à la charnière entre le Moyen Âge et la Renaissance, entre logique de défense et logique de démonstration. Deux ailes en équerre se rejoignent sur une tour à base carrée : \r\nlaile la plus ancienne (achevée vers 1581) est dite aile d'habitation, avec de bas plafonds et des pièces plus sombres. Les ouvrants extérieurs sont très étroits, tandis que ceux donnant sur la cour sont plus larges, avec des meneaux pour certains. l'aile la plus récente (achevée vers 1610) est plutôt une aile de réception, car les plafonds sont plus hauts, les pièces sont plus spacieuses et les fenêtres sont pourvues de meneaux. L'influence de la Renaissance italienne se fait sentir sur le style du château, comme en témoignent ces meneaux, ou plus encore le perron à double révolution, qui mène à la grande pièce. La tour, quant à elle, donne une allure médiévale à l'ensemble : base carrée, meurtrières, chemin de ronde, murs élargis à la base. Tout cela est illusion : la base carrée n'a jamais été utilisée dans les châteaux forts, à cause de la fragilité des flancs ; le chemin de ronde est très étroit, et ne permet pas à deux personnes de se croiser (encore moins à des hommes en armes) ; la base des murs est élargie pour mieux asseoir le bâtiment qui est privé de fondations, et non pour renvoyer les projectiles sur les assaillants.","habitants":"Famille de Brantôme\r\n        \"","divers":"A St-Crépin  de Richemont le château de Richemont","gps":"","images":["../image/image_24/24_Richemont_24_1.jpg","../image/image_24/24_Richemont_24_2.jpg","../image/image_24/24_Richemont_24_3.jpg","../image/image_24/24_Richemont_24_4.jpg","../image/image_24/24_Richemont_24_5.jpg","../image/image_24/24_Richemont_24_6.jpg"]},"Consult_chateau_formulaire1d5d":{"id":"Consult_chateau_formulaire1d5d","dept":"24","canton":"Sarlat la Canéda","commune":"Saint-André d","nom":"Roch","type":"Château","periode":"XVIII","histoire":"St-André d'Allas, château du Roc ou du Roch, XVIIIe siècle.                                                                                ROCH, ce grand vaisseau de pierre ocre paraît assez insolite au cur du Périgord Noir. Deux niveaux de dix baies, plus un troisième à la Mansard, avec deux pavillons formant retour d'angle,s'ouvrent sur la vallée de la Petite Beune. La terrasse sur laquelle est posé cet ensemble monumental ne laisse pas de pouvoir imaginer la succession de campements paléolithiques qui vécurent à guetter le gibier. Avec ses forges à proximité le maître vivait grand train, des Sermet aux Dupuy, des Boucher aux Latour du Roch. De nos jours les Saint Exupéry, actuels  propriétaires, font des miracles pour maintenir en état de si belles et importantes toitures, la demeure passe pour avoir été offerte par le Roi à l'une de ses favorites. Hubert de Boucher dit le comte de la Tour du Roch aurait bâti le beau château de ce nom. En 1753, il fit un excellent mariage en épousant Elizabeth de Brunet de Neuilly.","architecture":"ROCH, la construction date du XVIIIe siècle, le château actuel a succédé à un manoir connu au XVIe siècle. C'est un long corps de logis avec balcon central en ferronnerie, comportant deux pavillons en retour d'équerre sur la façade opposée. Les toitures étaient primitivement en lauze. L'ensemble date du milieu du XVIIIe siècle. Selon une légende, le château aurait été bâti par Louis XV pour l'une de ses maîtresse qu'il voulait éloigner de la cour. Deux pavillons de concierge à toits plats se trouvent dans la cour. Une grille en fer forgé s'ouvre dans le mur de clôture arrondi. Le château du Roch est inscrit aux M.H. depuis le 6/12/1948.","habitants":"Famille de  Saint Exupéry\r\n        \"","divers":"A Saint-André d'Allas; Roch GPS : 44° 54' 26\" Nord, 1° 07' 05\" Est","gps":"44° 54' 26\" Nord, 1° 07' 05\" Est","images":["../image/image_24/24_Roch_1.jpg","../image/image_24/24_Roch_2.jpg","../image/image_24/24_Roch_3.jpg","../image/image_24/24_Roch_4.jpg"]},"Consult_chateau_formulaire11f2":{"id":"Consult_chateau_formulaire11f2","dept":"24","canton":"Sarlat la Canéda","commune":"La Roque-Gageac","nom":"Roque_Gageac","type":"Château","periode":"XV-XVI-XIX","histoire":"La ROQUE-GAGEAC, le fort troglodytique dont une partie de la voûte s'est effondrée en 2010. La commune qui a sécurisé les lieux en 2015 envisage d'en devenir propriétaire.  Les ruines du château des Évêques de Sarlat.\r\nLe manoir de Tarde, du XVe siècle,  Jean Tarde, une des plus grandes figure de la région, naquit à la Roque-Gageac, vers 1561-1562, et ses  chroniques  sont la base de lhistoire médiévale du village, classé depuis 1951 au titre des M.H..","architecture":"TARDE, la guerre de cent ans nébranla pas la ville et à la Renaissance, le calme revenu, elle sembellit avec des tours crénelées, des toits pointus, des fenêtres à la place des meurtrières, adoptant le style de lépoque. De cette ère, il reste les ruines et les traces de lancien château seigneurial des évêques, les forts troglodytiques, les remparts de lancienne forteresse, renforcés en 1662 avant dêtres démantelés au début du XVIIIe siècle, et les maisons fortifiées des nobles, dont le manoir de la famille Tarde, dominant toujours le cur du village.","habitants":"Évêques de Sarlat\r\n        \"","divers":"A La Roque-Gageac;fort troglodytique  et manoir, Tarde GPS : : 44° 49' 34,3\" Nord, 1° 10' 57,3\" Est","gps
