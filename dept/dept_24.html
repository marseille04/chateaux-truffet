Après la Révolution, ses locaux furent utilisés comme moulin et minoterie au XIXe siècle En 1906, la commune de Condat prend le nom de Condat-sur-Vézère. inscrit aux M.H. depuis 1948.                                                   PETITE-FELOLIE, morcelé de toute part, abandonné pendant des années, recouvert d'un crépi épais, oublié par les édiles de la région, le domaine de la Petite-Filolie est repris par un nouveau propriétaire, qui entreprend une courageuse restauration depuis 2007,  devenue le château de Fleunie du XIIe et XVe siècles, sur la rive gauche de la Vézère, aujourd'hui hôtel-restaurant de luxe. Fleunie de plan en U, il se compose de trois corps de logis à deux et trois niveaux flanqué de tours rondes toits en poivrières, orné de lucarnes Renaissance et prolongé en équerre par une aile flanquée d'une tour à mâchicoulis.","habitants":"Famille de François II de Milon\r\n        \"","divers":"Condat petite filolie GPS : 45° 07' 01\" Nord, 1° 13' 44\" Est","gps":"45° 07' 01\" Nord, 1° 13' 44\" Est","images":["../image/image_24/24_Condat_Petite_Filolie_1.jpg","../image/image_24/24_Condat_Petite_Filolie_2.jpg","../image/image_24/24_Condat_Petite_Filolie_3.jpg","../image/image_24/24_Condat_Petite_Filolie_4.jpg","../image/image_24/24_Condat_Petite_Filolie_5.jpg","../image/image_24/24_Condat_Petite_Filolie_6.jpg"]},"Consult_chateau_formulaired517":{"id":"Consult_chateau_formulaired517","dept":"24","canton":"Nontron","commune":"Connezac","nom":"Connezac","type":"Château","periode":"XVII","histoire":"CONNEZAC,  Attesté en 1464, le château de Connezac fut aux Maumont au XVIIe siècle, puis des Conan. Il est maintenant aux Lamberterie.","architecture":"CONNEZAC,  enceinte et châtelet du XVe siècle  près du logis du XVIIe siècle.  Cest à lemplacement dun ancien château fort du XIIIe siècle que se dresse le château de Connezac, près d'une église romane à clocher-mur, la demeure étale ses logis dans une enceinte qui a conservé l'un de ses châtelets à mâchicoulis. Le logis du XVIIe siècle aligne de l'est à l'ouest un bâtiment très sobre entre deux pavillons. Le logis nord-sud est plus tardif: à son extrémité sud est un pavillon d'une heureuse architecture à bossages. Un boulingrin s'allonge au nord. Au sud, une terrasse donne sur les prés et sur un pigeonnier rond: elle offre des vues lointaines d'une infinie douceur\r\nÉléments protégés MH : les façades et les toitures, la terrasse, la chapelle ainsi que le mur d'enceinte : inscription par arrêté du 5 octobre 1946","habitants":"Famille des Maumont\r\n        \"","divers":"Château de Connezac","gps":"","images":["../image/image_24/24_Connezac_1.jpg","../image/image_24/24_Connezac_2.jpg","../image/image_24/24_Connezac_3.jpg","../image/image_24/24_Connezac_4.jpg","../image/image_24/24_Connezac_5.jpg","../image/image_24/24_Connezac_6.jpg"]},"Consult_chateau_formulaire6580":{"id":"Consult_chateau_formulaire6580","dept":"24","canton":"Thiviers","commune":"Corgnac sur Isle","nom":"Corgnac_Isle_Laxion","type":"Forteresse","periode":"XIII-XVI","histoire":"LAXION En 1186, après avoir assiégé vainement le château d'Excideuil, Richard Cur de Lion se rabattit sur la contrée de Corgnac et y exerça de grands ravages. Au XVIe siècle, la justice de Corgnac avait le titre de prévôté. propriété de la branche cadette des Chapt de Rastignac, qui deviennent marquis en 1653. Dès lors, il va devenir le témoignage architectural de lascension sociale de cette famille.\r\nEn 1906, la commune de Corgnac prend le nom de Corgnac-sur-l'Isle. Le château sera vendu en 1963 à un hollandais qui se dit un héritier de Gaston de la Romagnère et de Marguerite de Calvimont qui épousa après la mort de son premier mari Antoine de Chapt de Rastignac.\r\nEn 1943, l'école des cadres du groupement 28 des Chantiers de la jeunesse s'installe au château de Laxion. actuels propriétaires, Gaëlle et François Dumy du XVe et XVIe siècles, inscrit au titre des M.H. depuis 1946. Après deux incendies en 1998 et 2008, il est en cours de restauration.","architecture":"LAXION, lédifice réédifié entre la fin du XVI et le début du XVIIe siècle porte la griffe de Nicolas Rambourg, architecte du château d Hautefort. Il cache derrière une apparence féodale, une cour intérieure toute de grâce et un escalier majestueux. Par contre sil a été préservé de la Fronde au XVIIe siècle, ce château longtemps réputé comme lun des plus beaux de Dordogne, et qui a possédé jusquà quatre-vingts tapisseries, était à la limite de la ruine. Enfoui sous la végétation, victime de tentatives de restauration désastreuses, suite aux incendies, il est maintenant en cours de sauvegarde, dans le cadre dune entreprise collective qui associe les actuels propriétaires, Gaëlle et François Dumy, ainsi que des bénévoles regroupés au sein dune association, lobjectif étant certes de le faire renaitre, mais aussi redécouvrir et ouvrir à tous, fin juillet 2008, le château est racheté par un couple, François et Gaëlle Dumy. Ces derniers ont déjà eu lexpérience de la restauration avec une chartreuse du XVIIe siècle.","habitants":"Famille de Chapt de Rastignac\r\n        \"","divers":"Corgnac sur isle; Laxion GPS : 45° 22' 38\" Nord, 0° 56' 55\" Est","gps":"45° 22' 38\" Nord, 0° 56' 55\" Est","images":["../image/image_24/24_Corgnac_Isle_Laxion_1.jpg","../image/image_24/24_Corgnac_Isle_Laxion_2.jpg","../image/image_24/24_Corgnac_Isle_Laxion_3.jpg","../image/image_24/24_Corgnac_Isle_Laxion_4.jpg"]},"Consult_chateau_formulaire52bf":{"id":"Consult_chateau_formulaire52bf","dept":"24","canton":"Brantôme","commune":"Biras","nom":"Cote_Biras","type":"Château","periode":"XV","histoire":"COTE-BIRAS, les origines du château de la Côte remontent au XVe siècle. Fondé en 1423 par Arnaud de Laudibus originaire du Béarn fait bâtir le château de la Côte, durant la guerre de cent ans,  Jean Marie du Lau d'Allemans, né le 30 octobre 1738 au château de la Côte à Biras, fut assassiné le 2 septembre 1792 à Paris, aux Carmes. Il devient archevêque dArles (du 1er octobre 1775 -1790) le château appartient tour à tour à la famille Dulau durant quatre siècles, jusqu'en 1867, puis à la famille Déthan marchand drapier de retour dAmérique, restaure le château et crée une exploitation agricole  jusquen 1956, date à laquelle la famille Guillaume en fait lacquisition et relance  lexploitation agricole et lélevage et pour le transformer en hôtel restaurant en 1989. Ainsi, grâce à ses propriétaires actuels, Michel Guillaume et son fils Olivier, le château de la Côte incarne la tradition et les valeurs des vieilles demeures françaises et conjugue avec élégance art de vivre traditionnel et confort daujourdhui.","architecture":"COTE-BIRAS, est un château bâti à Biras-Bourdeilles-Brantôme,    le château de la Côte a été reconverti en un superbe hôtel-restaurant 3 Etoiles, situé au cur d'un parc composé d'arbres centenaires, bordés d'allées de buis. Il domine la campagne vallonée du Périgord vert. L'édifice majestueux en plan d'équerre à deux niveaux avec série de lucarnes sur un toit en croupe recouvert d'ardoise accolé côté parc de deux tours rondes à mâchicoulis dont une sans toit l'autre toit en poivrière, une tour intérieure en angle de l'équerre servant de  porte d'entrée à trois niveaux toit en poivrière à l'aile gauche de l'entrée tour carrée toit quatre pans  et une tour ronde toit en poivrière.","habitants":"Arnaud de Laudibus\r\n        \"","divers":"Château à Biras; Cote-Biras GPS : 45° 21' 51\" Nord ET 0° 38' 48\" Est","gps":"45° 21' 51\" Nord ET 0° 38' 48\" Est","images":["../image/image_24/24_Cote_Biras_1.jpg","../image/image_24/24_Cote_Biras_2.jpg","../image/image_24/24_Cote_Biras_3.jpg","../image/image_24/24_Cote_Biras_4.jpg","../image/image_24/24_Cote_Biras_5.jpg"]},"Consult_chateau_formulairef8f6":{"id":"Consult_chateau_formulairef8f6","dept":"24","canton":"Savignac les Eglises","commune":"Coulaures","nom":"Coulaures","type":"Château","periode":"XIV-XV-","histoire":"A Coulaures le château de Conty, ancienne résidence de la famille de Lestrade,  de la Cousse, XIVe et XVIIIe siècles, inscrit aux M.H. depuis 1962 (voir article),  de GLANE, XVe et XVIIe siècles, inscrit depuis 1988,   la Reille, XVIe siècle, inscrit depuis 1975, Tour de la Giboulie,\r\nCONTY, est un château qui  fut l'ancienne résidence de la famille de Lestrade de Conty qui lhabitère  dès le début du XVIIe siècle, elle en reste dailleur propriétaire au fil des siècles et toujours dans cette famille.                                                                              La Tour de la Giboulie est une propriété privée.\r\nREILLE, a appartenut aux Villedieu, des Labbés, des Marqueyssac, des Dupuy et des Escatha.","architecture":"CONTY,  le château domine de vastes terres, le site est constitué de plusieurs corps de bâtiments datant du XVe siècle, ils sont transformés à plusieurs reprises jusquà la première moitié du XIXe siècle. Le corps de logis principal est entouré de plusieurs pavillons et dans quelques uns des éléments de constructions antérieures subsistent toujours. Ils ont été intégrés au fur et à mesure des édifications ultérieures, deux de ces bâtiments sont renforcés par des mâchicoulis et la présence dune tour de plan carré surmontée dun mâchicoulis renforce le caractère défensif des lieux. Enfin, sous laile sud deux arches passent au-dessus de leau. \r\n GLANE, connu dès le XIVe siècle,  est bâti aux XVe et XVIIe siècles. Initialement, il était entouré de douves. Il présente un logis auquel deux ailes perpendiculaires ont été accolées vers l'est, reliées entre elles, à l'opposé du logis, par un mur fermant le tout. L'ensemble, de forme rectangulaire et renforcé par quatre tours d'angle circulaires, délimite une cour intérieure également rectangulaire. Ses façades et toitures, ainsi que la clôture de la cour intérieure, sont inscrites au titre des M.H. le 1er février 1988. \r\nREILLE, le corps de logis principal de plan rectangulaire au fond d'une cour, accolé à une tour  d'escalier éclairée par des fenêtres à meneaux sous les appuis on peut voir les éléments défensif, les créneaux font partie de l'ensemble des défenses.","habitants":"Conty famille de Lestrade   de Conty                     Reille famille de Villedieu,\r\n        \"","divers":"A Coulaures ; Conty Grav 1-2 GPS : 45° 18' 26\" Nord, 0° 58' 50\" Est.                                                                 Cousses GPS : 45° 17' 42,5\" Nord, 0° 59' 35\" Est.                                                                            Tour giboulie grav-3 GPS : 45° 18' 26\" Nord, 0° 58' 50\" Est.                                                                                   Glane grav-4 GPS : 45° 19' 53\" Nord, 0° 57' 8\" Est.                                                                                   Reille grav-5-6-7 GPS : 45° 18' 5,4\" Nord, 0° 58' 36,8\" Est.                                                                                    Roches grav-8","gps":"45° 18' 26\" Nord, 0° 58' 50\" Est.","images":["../image/image_24/24_Coulaures_1.jpg","../image/image_24/24_Coulaures_2.jpg","../image/image_24/24_Coulaures_3.jpg","../image/image_24/24_Coulaures_4.jpg","../image/image_24/24_Coulaures_5.jpg","../image/image_24/24_Coulaures_6.jpg","../image/image_24/24_Coulaures_7.jpg","../image/image_24/24_Coulaures_8.jpg"]},"Consult_chateau_formulairea589":{"id":"Consult_chateau_formulairea589","dept":"24","canton":"Martignac","commune":"Martignac","nom":"Coulonges","type":"Forteresse","periode":"XIII","histoire":"COULONGES, la seigneurie appartenait à la maison Hélie de Coulonges, branche cadette de la famille de Pompadour. La parenté des Hélie de Coulonges et des Pompadour a pour preuves les faits suivants : Hélie est le prénom patronymique de Pompadour; les armes des Hélie de Coulonges sont identiques à celles des Pompadour; un Elie de Pompadour, qui épousa au milieu du XVIe siècle, une demoiselle de Soullac de Montmèze, est qualifié seigneur de Coulonges. L'abbé Lespire donne pour chef, aux Hélie de Coulonges. Gérald Hélie,seigneur de Dompnhon, fils ou petit-fils de Ranout Hélie, chevalier qui fut le premier à prendre le nom de Pompadour et qui épousa Marie d'Estaing avant 1205, Gérald Hélie vivait en 1276. Vers l'an 1475, la seigneurie de Coulonges fut transférée à la famille de Sédières par le mariage de  demoiselle Andrée Hélie de Coulonges avec Louis Boutier seigneur de Sédières, cette famille était originaire du Limousin, (le château de Sédières situé à Champagnac, diocèse de Limoges). Elle conserva Coulonges jusqu'au milieu du XVIIe siècle, époque à laquelle la seigneurie fut transférée à la famille de Rastignac par le mariage de Gabrielle de Sélières avec Jean François Chapt,  marquis de Rastignac. Les Rastignac, comme avant eux les Sédières feront de Coulonges leur domicile habituel. Ce n'est que peu avant la Révolution que Jacques Jean, dernier marquis de Rastignac, quitta Coulonges pour aller demeurer au Sablou, ou il mourut en 1783.","architecture":"COULONGES, campé dans le fond dun vallon,  surgit entre les arbres, avec ses tours rondes, ses mâchicoulis et ses murs en pierre blonde du Périgord. Un pont-levis donne accès à la cour intérieure du castel, qui allie la robustesse de larsenal militaire médiéval au faste de la demeure des grands seigneurs pendant la Renaissance.  château féodal antérieur au XIIIe siècle, avec tours, murs d'enceinte, chemin de ronde et douves. château-fort composé d'un quadrilatère fermé avec quatre tours d'angle. Les bâtiments d'habitation et autres forment un bloc compact  soudés sur les tours. A lissue dun vaste chantier de restauration mené sous légide des bâtiments de France ces dix dernières années, le château souvre à la visite cet été.","habitants":"Famille d'Hélie Pompadour\r\n        \"","divers":"Château de Coulonges à Martignac, et château de Duchène à Montignac grav 5","gps":"","images":["../image/image_24/24_Coulonges_1.jpg","../image/image_24/24_Coulonges_2.jpg","../image/image_24/24_Coulonges_3.jpg","../image/image_24/24_Coulonges_4.jpg","../image/image_24/24_Coulonges_5.jpg"]},"Consult_chateau_formulairecd7e":{"id":"Consult_chateau_formulairecd7e","dept":"24","canton":"Périgueux","commune":"Coulounieix-Chamiers","nom":"Coulounieix_Chamiers","type":"Château","periode":"XVI-XVIII","histoire":"A Coulounieix-Chamiers, le château de la Rolphie, XVIe siècle, inscrit au titre des M.H; depuis 1947. Château des Izards, parc arboré  qui sert de centre culturel et aux expositions. Château de Plague, maison fortifiée des XVIe et XVIIe siècles, tourelles et enceinte au sein d'un parc arboré. Manoir de Beaufort du XVIe siècle rénové au XIXe siècle.\r\nSur l'actuel territoire de Coulounieix-Chamiers, un camp fortifié à la Boissière, En 1824, les communes de la cité et Coulounieix fusionnent. En 1958, Coulounieix prend le nom de Coulounieix-Chamiers\r\nIZARDS, famille du Lau d'Allemans en 1760 c'est le fils ainé d'Armand du Lau, c'est Jean Baptiste comte et maréchal des camps du roi qui en devient propriétaire ce dernier vend  en 1779 à Elie Grégroire Eyriaud de Nancy et c'est son frère François qui en hérite à la mort d'Elie, le domaine vendu à la Révolution comme bien national acquis en 1812 par madame veuve de Palme et le revend peu après au sieur Loubet François ses descendants le vende en 1832 à sieur Etienne Courtey, en 1854 Nelly Léonarde de Courthey héritière à épousé le général Jules Lian son fils René capitaine de cavalerie en hérite va y habiter jusqu'en 1912, sa fille Ida Lian a épousé  le capitaine Louis comte de Malet mort en 1914 Ida meurt en 1917 sa fille Marie de Malet hérite et épouse  Hubert vicomte de l'Hermite ingénieur.                                                                           ROLPHIE, ancien château fort qui était le fief des Bertin. Lhistoire des lieux a été contée par Daniel Piron, propriétaire du château depuis plus de 30 ans ayant uvré toutes ces années pour faire revivre ce très bel édifice inscrit site pittoresque.","architecture":"IZARDS, de style Napoléon III abrite la maison des associations et de la culture de Coulounieix-Chamiers, est une ancienne maison noble comme il en existait d'autres, ainsi que des manoirs souvent sur des buttes. Il domine la vallée de l'Isle, affluent de la Dordogne, pendant plus d'un siècle . Celui-ci doit son nom au lieu dit sur lequel il a été construit, initialement nommé Gizars. Patrimoine privé d'un chanoine, il est vendu en 1794 comme bien national. Propriété privée jusqu'à ce que la commune lachète en 1988 pour en faire une maison des associations après avoir envisagé d'en faire la mairie. Des expositions et autres activités culturelles et de loisirs s'y déroulent. Une ancienne métairie et un parc complètent le domaine.                  ROLPHIE, au XVIIIe siècle où lon a pu admirer les cheminées des XVe et XVIe siècles, le porche dentrée voûté du XVIIe siècle, et, unique en Périgord : un cluzeau creusé dans la falaise qui débouche sur la salle commune du logis.","habitants":"Famille de  Daniel Piron\r\n        \"","divers":"A Coulounieix-Chamiers le château d'Izards grav 1 et 2, et de Rolphie grav 3-4.","gps":"","images":["../image/image_24/24_Coulounieix_Chamiers_1.jpg","../image/image_24/24_Coulounieix_Chamiers_2.jpg","../image/image_24/24_Coulounieix_Chamiers_3.jpg","../image/image_24/24_Coulounieix_Chamiers_4.jpg"]},"Consult_chateau_formulaire910f":{"id":"Consult_chateau_formulaire910f","dept":"24","canton":"Saint-Astier","commune":"Coursac","nom":"Coursac","type":"Château","periode":"XIII-XVI","histoire":"COURSAC, de nombreuses constructions de caractère ont été édifiées au cours des siècles à Coursac et pour n'en citer que quelques-unes on retiendra la Jarthe, le Feuillade, brûlée pendant la guerre de 1939-1945 par les allemands, reconstruite depuis, Maraval, les Embois et aussi Manou.   JARTHE  construit au XIIIe, peut-être par les Templiers. Il servira de résidence à la famille Dupuy de la Jarthe. Cette famille va donner quelque trente consuls et vingt maires à la ville de Périgueux. Possession des familles suivantes : du Puy de La Jarthe du XIVe siècle à 1583, de Chillaud de 1583 au XVIIe siècle, du Saillant du XVIIe siècle au XVIIIe siècle. et de La Roche-Aymon du XVIIIe siècle à 1836. Il a ensuite été racheté par des particuliers au XIXe siècle : la famille Bareau, originaire de la région d'Excideuil puis transmis par héritage à la famille Dezon. \r\nMANOU est beaucoup plus récent : c'est l'ancien fief des Benoît de Loubresse et des Scorailles puis propriété des Marignan, il fut construit au XVIe siècle   Le Périgord retrouve le calme à la fin des révoltes des croquants qui séteignent à la fin du XIXe siècle. Coursac et Périgueux ont, pendant tout cette période, entretenu détroites relations, lévêque de Périgueux étant le seigneur de Coursac jusquà la Révolution.","architecture":"MANOU, charmante demeure construite au XVIIe siècle présentant un logis très allongé entre deux pavillons, avec un élégant portail. On notera la présence de trous de tir. Une chapelle est soudée d'un côté à cet ancien manoir. \r\n JARTHE  Le château est composé d'une galerie principale et de deux ailes. La cour est fermée par une partie ou habitèrent des bonnes et un curé. Il  fait partie de ces trésors architecturaux quon découvre avec surprise au détour dun chemin de traverse. Invisible de la route autant que du bourg de Coursac, dont il est pourtant voisin. Seul le mur denceinte trahit sa présence. Le château est un ensemble élégant aux allures de chartreuse, arborant fièrement ses origines moyenâgeuses. Il a traversé lhistoire depuis le XIIe siècle et porte aujourdhui les marques de chaque époque : un chemin de ronde en bois du temps des chevaliers parfaitement restauré, une chapelle gothique, un pigeonnier à huit colonnes, une tour ronde descalier de type Renaissance, un donjon aussi, doté dune vue imprenable sur le parc arboré de 120 hectares et la campagne alentour.","habitants":"Famille Dupuy de la Jarthe                                              Manou fief des Benoît de Loubresset                         \r\n        \r\n        \"","divers":"Château de Coursac, de Jarthe et de Manou grav-7.","gps":"","images":["../image/image_24/24_Coursac_1.jpg","../image/image_24/24_Coursac_2.jpg","../image/image_24/24_Coursac_3.jpg","../image/image_24/24_Coursac_4.jpg","../image/image_24/24_Coursac_5.jpg","../image/image_24/24_Coursac_6.jpg","../image/image_24/24_Coursac_7.jpg"]},"Consult_chateau_formulaire48df":{"id":"Consult_chateau_formulaire48df","dept":"24","canton":"Savignac les Eglises","commune":"Coulaures","nom":"Cousse","type":"Château","periode":"XIV-XVIII","histoire":"La COUSSE, les premiers propriétaires de Cousse au XIVe siècle les Jaubert rattachait à une famille qui possédait dans la juréduction d'Excideuil, la seigneurie de la Roche-Joubert ainsi que les  seigneuries de Montardit et de Montragnier en 1439 mariage de Marie Jaubert fille de Golfier-Joubert avec Bernard de Lestrade, au XVIIIe siècle prendront le titre de marquis, sous la Révolution, habité par Jean-Baptiste-Claude de Lestrade et par son épouse Marie-Jeanne-Claude victoire de Lasteyrie du Saillant, nièce de Mirabeau, le dernier du nom le petit-fils de Jean-Baptiste-Claude-Ernest sans postérité adopte sa nièce Marthe de Lasteyrie fille d'Anne de Lestrade et de Fortuné Charles-Ernest de Lasteyrie marquis de Saillant. En 1868 héritière de la Cousse épouse Gustave de Garrigues de Flaujac.","architecture":"la COUSSE, tour du XIVe siècle, qui jouxte un bâtiment du XVIIIe siècle, ancien manoir fortifié et remanié : cour d'honneur, grille à pilastres, terrasse à balustres. De la construction primitive du XIVe siècle, il ne reste que deux tours et un corps de logis, défiguré par de nombreux remaniements. C'est un bon exemple des édifices fortifiés du nord du Périgord, où les mâchicoulis étaient remplacés par quatre bretèches en saillie sur le mur et formant lucarnes avec fronton cintré devant la toiture. Les courtines qui se reliaient à la tour ont disparu la suite d'un incendie, au début du XVIIIe siècle (1720) , le corps de logis Est a été reconstruit dans le style de l'époque. La cour a été nivelée et surélevée. Les douves ont disparu. Des caves-celliers subsistent sous le bâtiment nord où se voient encore des embrasures de tir.  L'édifice qui n'a jamais changé de famille est amélioré au cours des siècles à été inscrit à l'inventaire supplémentaire des  M.H. en 1962.","habitants":"Famille de Jaubert\r\n        \"","divers":"Château de Cousse à Coulaures.","gps":"","images":["../image/image_24/24_Cousse_1.jpg","../image/image_24/24_Cousse_2.jpg","../image/image_24/24_Cousse_3.jpg","../image/image_24/24_Cousse_4.jpg"]},"Consult_chateau_formulaire2f66-2":{"id":"Consult_chateau_formulaire2f66-2","dept":"24","canton":"St-Cyprien","commune":"Coux Bigaroque","nom":"Coux_Bigaroque","type":"Château","periode":"XV-XVII-XIX","histoire":"A Coux et Bigaroque les manoir et château celui  de Bigaroque, de Cazenac\r\nManoir les Bretoux, la Carrière, les Constancies, de Salibourne et le Suquet\r\nCoux et Bigaroque a appartenu aux évêques de Bordeaux qui a mis le poste de péage sur la rivière. La guerre de cent ans de mettre un terme à cette acivity rentables ainsi que le château qui, une fois vis à vis du village et la vallée. Le château a été reconstruit, mais à nouveau détruit en 1624.  À la fin du XVIIIe siècle, la commune s'appelait Le Coux avant de devenir Coux au début du XIXe siècle. Les communes de Coux et de Bigaroque ont été réunies en une seule, Coux-et-Bigaroque, par ordonnance du 23 septembre 1825.      les BRETOUX, construit au XIXe siècle pour la famille Lasserre de Monzie, Henri de Lasserrey vécut souvent et y mourut en1900, le domaine  passa au XXe siècle à la famille d'Abadie-d'Arraut.                                MONSEC, la construction commence dans la première moitié du XIVe siècle, sur des bases plus anciennes. Au château de Monsec se sont succédés les familles Laroque vers 1300, les Suquet de la Treilhe vers 1400. En 1560 le propriétaire est Montlouys. Une des filles, Marguerite de Foucaut, épouse François de Feletz. Une descendante de cette union, Anne de Feletz, devient seule héritière du château de Monsec et de ses dépendances en 1610. Elle épouse François de Clermont issu dune famille quercynoise et depuis cette date, le domaine est toujours resté par héritage et mariages dans la même famille. En 1793, un des fils du châtelain, Jean-Baptiste de Touchebuf-Lafage deviendra le premier maire de Mouzens à lâge de 20 ans et le restera pendant 60 ans jusquà son décès en 1854. c'est dans le château de Monsec que Léon Poirier tourna en 1943 son film Jeannou.","architecture":"COUX-BIGAROQUE, au XVIIe siècle, sur le territoire de l'actuelle commune se comptaient une vingtaine de demeures nobles, résidences souvent secondaires, de seigneurs de la région. La multiplicité et la variété des sites permettaient une implantation de défense, de surveillance et dagrément. Certaines de ces demeures existent toujours : Salibourne, le Suquet, la Pomarède, la Carrière haute, les Bretoux, Lamillal, Cazenac, la Viguerie, les Constancies \r\nLes  BRETOUX se compose d'un corps de logis rectangulaire à deux niveaux, pavillon centrals saillants plein cintre et pavillon sur les extrémités rectangulaires et saillant accolé d'une tour ronde toit en poivrière, l'ensemble est couvert de toit en croupe  et à l'impérial  en ardoise avec  lucarnes.\r\nCAZENAC de plan rectangulaire à deux niveaux et série de lucarnes sur comble en croupe flanqué de tour deux rondes à Mâchicoulis dont une crénelée et pavillon carré à droite\r\n CARRIERE Quadrangulaire à deux niveaux avec tour carrées sur angles.                                                     MONSEC, le château se compose d'un châtelet d'entrée datant de la première moitié du XVIIe siècle. Il est prolongé au nord-nord-ouest par un logis Renaissance, accosté d'une tour du XIXe siècle au sud-est, et terminé au nord par un pavillon. Celui-ci présente une échauguette dans son angle nord-ouest. Du pavillon part vers l'est une aile dont les bâtiments remontent du XIVe au XVIe siècle. Deux tourelles ont été ajoutées au XIXe siècle, l'une au nord-ouest et l'autre au nord-est de cette aile. Celle-ci et le logis principal forment un angle ouvert en forme de V.","habitants":"Famille Lasserre de Monzie                                         Famille Laroque \r\n        \"","divers":"A Coux Bigaroque le château de Carrière grav-1, de Cazenac de 2 à 4, de Bretoux grav 5, de Monsec gravde 6 à 8 et de Brunie grav 9.","gps":"","images":["../image/image_24/24_Coux_Bigaroque_1.jpg","../image/image_24/24_Coux_Bigaroque_2.jpg","../image/image_24/24_Coux_Bigaroque_3.jpg","../image/image_24/24_Coux_Bigaroque_4.jpg","../image/image_24/24_Coux_Bigaroque_5.jpg","../image/image_24/24_Coux_Bigaroque_6.jpg","../image/image_24/24_Coux_Bigaroque_7.jpg","../image/image_24/24_Coux_Bigaroque_8.jpg","../image/image_24/24_Coux_Bigaroque_9.jpg"]},"Consult_chateau_formulaire25aa":{"id":"Consult_chateau_formulaire25aa","dept":"24","canton":"Montagrier","commune":"Creyssac","nom":"Creyssac","type":"Château","periode":"XVI-XVIII","histoire":"Château de la Barde du XIXe siècle, il a été bâti sur l'emplacement d'un ancien manoir détruit à la Révolution et dont l'origine remonte au XIVe siècle. Manoir du Boulou du XIXe siècle de la Boissière hôtel.\r\nBARDE, à côté de Creyssac, sur une roche, regardant la Dronne, Il fut successivement la propriété au XIVe siècle, de la famille La Barde, au XVIe siècle aux Saulnier, au XVIIe siècle aux Verneuil de Léoncel, aux Sainte Aulaire au XVIIIe siècle, aux Richardie et enfin les Bellussière prennent possession de la nouvelle demeure au XIXe siècle.","architecture":"BARDE, à côté de Creyssac, sur une roche, regardant la Dronne, le château de La Barde est un gros logis du début du XIXe siècle. La Révolution avait rasé, en 1793, l'ancien manoir composé d'une tour assortie de créneaux et attenante au logis principal. Le château actuel est construit sur une terrasse qui sétire sur un bloc rocheux monumental.","habitants":"Famille La Barde\r\n        \"","divers":"A Creyssac le château de la Barde grav 1-2 GPS : 45° 18' 31\" Nord, 0° 33' 10\" Est, de Boissière grav 3, gué de l'éperon grav-4.","gps":"45° 18' 31\" Nord, 0° 33' 10\" Est, de Boissière grav 3, gué d","images":["../image/image_24/24_Creyssac_1.jpg","../image/image_24/24_Creyssac_2.jpg","../image/image_24/24_Creyssac_3.jpg","../image/image_24/24_Creyssac_4.jpg"]},"Consult_chateau_formulaire06da":{"id":"Consult_chateau_formulaire06da","dept":"24","canton":"Saint-Aulaye","commune":"Saint-Antoine Cumond","nom":"Cumond_Pauly","type":"Château","periode":"XIV","histoire":"CUMOND, la seigneurie de Cumond est citée à partir du XIVe siècle, elle appartenait alors aux sires de Cumont. Au début du XVe siècle, elle relevait de la châtellenie de Chalais puis, en 1464 de celle d'Aubeterre. C'est à cette époque que la seigneurie est démantelée. Elle se divise alors en trois fiefs distincts : Cumont, la Courre et Salleboeuf, ce dernier étant réuni au premier en 1520. En 1600, appartient aux Cumond est aux la Cropte de Bourzac, puis aux d'Arlot de Frugie en 1664.  En 1702, Jacques d'Arlot fait construire le château actuel en lieu et place de l'ancien logis médiéval.                                                             A  deux kilomètres au nord-Est le château de Pauly à Chassaignes  PAULY, sur le fronton de cette grosse demeure bourgeoise est inscrit  1876 château de Mme Bubly fait par Joubert. Cette demeure fait peut-être référence aux châteaux viticoles du Bordelais.\r\nCe château est aussi appelé le Pauly de la Ravelle, fut successivement propriété des Chassaignes, des Jaubert et des Pupuy, le château porte une inscription sur un fronton qui nous permet de le dater.","architecture":"CUMOND édifice de plan oblong rectangulaire à trois  travées centrale sur même plan et les  quatre autres deux de chaque côté  sont légèrement saillantes à deux niveaux et lucarnes sur toit brisés à la mansard.  PAULY maison de plan régulier proche du carré disposant de quatre niveaux : un  sous-sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble. La maçonnerie enduite est réalisée en moellon calcaire. La pierre de taille est utilisée pour les chaînages d'angle, mais aussi sur le fronton qui surmonte l'étage carré en façade sud. Les baies sont ordonnancées sur la façade en trois travées. Un petit escalier droit en pierre permet d'accéder à la porte d'entrée positionnée en travée centrale, la tuile plate est l'unique matériau de couverture sur les pans très inclinés de la toiture en pavillon.","habitants":"Famille de Cropte de Bourzac\r\n        \"","divers":"A Saint-Antoine Cumond; Pauly","gps":"","images":["../image/image_24/24_Cumond_Pauly_1.jpg","../image/image_24/24_Cumond_Pauly_2.jpg","../image/image_24/24_Cumond_Pauly_3.jpg"]},"Consult_chateau_formulaire2ae0":{"id":"Consult_chateau_formulaire2ae0","dept":"24","canton":"Bergerac","commune":"St-Germain et Mons","nom":"Cussac_24","type":"abbaye","periode":"XII-XVII","histoire":"CUSSAC, grande bâtisse rectangulaire du XVIIe siècle. Elle appartenait au XVIIIe siècle à Marie de Beyne. En se mariant avec Charles de Lard, chevalier et seigneur de la Mespoule, elle lui apporta le château en dot. La terre de Cussac a été depuis vendue à des particuliers qui y font lélevage dovins.                      TOUR DE MONS, Le domaine qui appartenait à la famille de la Roque fut morcelé et vendu en 1861 à plusieurs viticulteurs. En 1882, elle fut acquise par un maître de bateau, Jacques Got. Visiteur célèbre, William Cody (Buffalo Bill) y séjourna en octobre 1905. Dominant la plaine de Bergerac, lendroit inspira lécrivain régionaliste Armand Got (1890-1970). En 1943, La Roque, lieu de réunion des résistants locaux, fut le théâtre de parachutage darmes et la demeure, inoccupée, servit de cache. Après la guerre, la demeure tomba en ruine. En 1989, la famille Got commença dimportants travaux de reconstruction, aujourdhui terminés.  \r\nMANOIR DE SIREYGEOL,  il appartient à la famille de Baillet. Très belle perspective à partir de la façade avant. A labandon, malheureusement.","architecture":"MANOIR DE SIREYGEOL, demeure de la fin du XVIIIe, début XIXe siècle. De plan carré pour le logis central raccordé à deux pavillons  carrés toit en pavillons  avec lucarnes en façade.                      TOUR DE MONS, tour du XIe - XIIe siècle. En ruine et sur terrain privé. Cette tour carrée, de 4 mètres de haut devait faire partie dun petit ensemble fortifié.     La Roque de Mons, cette maison des champs de 1774,  cette chartreuse périgourdine de plain-pied, au corps de logis allongé entre deux petites ailes en retour, se trouve sur le site dune ancienne tour de guet.","habitants":"Cussac  Marie de Beyne                                                Famille de la Roque \r\n        \"","divers":"A St-Germain et Mons grav-4, vestiges de Cussac grav 1, la roque du Mons grav-2, Sireygeol grav-3","gps":"","images":["../image/image_24/24_Cussac_24_1.jpg","../image/image_24/24_Cussac_24_2.jpg","../image/image_24/24_Cussac_24_3.jpg","../image/image_24/24_Cussac_24_4.jpg"]},"Consult_chateau_formulaire9f36":{"id":"Consult_chateau_formulaire9f36","dept":"24","canton":"Domme","commune":"Cénac et St-Julien","nom":"Cénac_St_Julien","type":"Château","periode":"XVII-XVIII","histoire":"Six châteaux à Cénac-Saint-Julien                                                                     THOURON  Il fut construit au XVIIIe siècle. Il a été acheté par la commune de Cénac et Saint Julien en 1946. Anciennement utilisé comme logement pour les enseignants, il sera un jour réhabilité. Son escalier a été refait récemment.                                        COSTELCAVE : Demeure du XV-XIXe siècle de la famille du conventionnel Taillefer.  vers 1740 jean baptite Taillefer fait agrandir le château,   à sa mort la falille s'y installa, en 1800  son fils  Guillaume député à la convention fait réunir les deux bâtiments avec deux tours, en 1970 madame Marie-Françoise  propriétaire.  MONTMIRAIL ; les villages de Saint-Julien et de Cénac se développent durant tout lancien régime. Les nombreux manoirs conservés aujourdhui dans la commune témoignent de la prospérité de cette époque. Le château est situé au sud ouest du bourg, à mi-pente dun coteau dominant le Céou. Cet ancien repaire noble est mentionné au XVe siècle. Il appartient alors aux Faures de Montauriol. En 1760, le château avait justice sur quelques maisons de Cénac. L'édifice subit de nombreuses destructions, et doit être reconstruit au XXe siècle. La demeure possède une tour-pigeonnier au toit recouvert de lauzes, seigneurie de 1650 à la Révolution.\r\nMARAVAL  chambre d'hôte d' Anne-Marie et Thierry Sponne, Les premières traces de Maraval remontent au XVe siècle et plus précisément à 1476, où il est question du fief de Maraval. À la fin du XIXe siècle, le château accueillit des surs trappistines qui quittèrent les lieux en 1910.","architecture":"THOURON  Il fut construit au XVIIIe siècle.    AYGUEVIVES corps de logis  de plan rectangulaire   flanqué de deux tours rondes ,  est une demeure du XVIIIe siècle et agrandie sous l'Empire. Elle jouit d'une admirable vue sur Domme, dont le dessin coloré se reflète au miroir de l'étang qui alimente le moulin. Alimenté par le Goujon, il fabriquait de lhuile de noix. Une des tours a été endommagée en 1967. Demeure des Maleville, Ayguevive a été longtemps l'atelier du grand artiste Lucien de Maleville , le charme du Périgord noir.                                                            MONTMIRAIL du XIe, XIVe, XVe, XVIIIe et XIXe siècles. Le château culmine à 320 mètres de hauteur et surplombe le village . Ce château, comme celui de la Marne également, n'a rien à voir avec les films \"Les Visiteurs\". Il est bien conservé et a toujours été habité. Les salles d'armes et les cachots ont été restauré il y a 20 ans.                                                                     Fondaumier : Maison des seigneurs de Fayrac au XIXe siècle du romancier Albert-Camille-Jean Cahuet (dit Albéric Cahuet)\r\nMARAVAL: Repaire noble du début du XIXe siècle. Au début du XIXe siècle, Maraval fut détruit en grande partie par un incendie et cest sur les ruines de lancien château que fut reconstruite la demeure actuelle.","habitants":"Ayguevive  Famille des Malleville                              Thouron Famille de Sénigon                                Montmirail  Faures de Montauriol\r\n        \r\n        \"","divers":"Six châteaux à Cénac-Saint-Julien grav -1-7;   Ayguevives grav 2.  Constelcave grav-3. Mésange bleu  GPS : 45° 08' 53\" Nord, 1° 13' 43\" Est.  Montmirail grav 8 et 9  GPS : 48° 6' 11,99\" Nord, 0° 47' 25,01\" Est.   Miraval grav 4-5. Thouron grav 6","gps":"45° 08' 53\" Nord, 1° 13' 43\" Est.  Montmirail grav 8 et 9  G","images":["../image/image_24/24_C%c3%a9nac_St_Julien_1.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_2.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_3.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_4.html","../image/image_24/24_C%c3%a9nac_St_Julien_5.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_6.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_7.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_8.jpg","../image/image_24/24_C%c3%a9nac_St_Julien_9.jpg"]},"Consult_chateau_formulaire4ae2":{"id":"Consult_chateau_formulaire4ae2","dept":"24","canton":"Belvés","commune":"Doissat","nom":"Doissat","type":"Château","periode":"XVII-XIX","histoire":"DOISSAT, sur les ruînes d'un manoir qui avait été aux Ségur Doyssac par mariage au XVe siècle, aux Caumont Berbiguières, le célèbre capitaine huguenot Geoffroy de Vivans, ami du Béarnais, avait bâti, entre 1580 et 1585, un château en utilisant les pierres de deux églises qu'il avait détruites.                               MONDOL Il a appartenu successivement aux familles Bessou de Signac et Savy. Joseph Savy du Mondiol, fils de Louis Savy et de Mathurine de Bessou, dame du Mondiol, y est né le 29 août 1779, mort à Toulon le 20 juillet 1847. Il est entré à 12 ans dans la Marine sous les ordres de Pierre-Félix Lapalisse (de Belvès). Il s'est battu à Aboukir, à la prise du vaisseau anglais le Swiftsure, au Cap Finistère, et à Trafalgar. Il est nommé capitaine de frégate, en 1821, fut fait chevalier de la Légion d'honneur, en 1822, puis officier en 1835.","architecture":"DOISSAT, de plan rectangulaire à trois niveaux flanqué d'une tour carrée sur flanc droit toit en poivrières à quatre pans et fronton triangulaire sur fàçade. Description, plan et élévations du château si-bien que l'on regrette la disparition de ce riche ensemble de pavillons, logis, tourelles, douves, châtelets, jardins et fontaines. Car en 1794, Lakanal exerça ses services d'entrepreneur de démolition, après avoir opéré une ponction sur le mobilier du château, pour meubler son logis. L'inexorable ruine eût été totale sans la réaction thermidorienne qui arrêta les démolisseurs et ainsi qu'on voit encore quelques terrassements, une tour, une aile, des caves voûtées et deux pavillons (dont l'un porte une inscription funéraire du XVIIe siècle). Un petit château a été reconstruit au début du XIXe siècle sur les ruines de l'ancien. Il est devenu au milieu du XXe siècle le musée de la Noix.                                           MONDOL  manoir bâti à Doissat, constitué d'un corps de bâtiment du XVIIe siècle accosté d'une tour.","habitants":"Capitaine Geoffroy de Vivans                                     famille Bessou de Signac et Savy\r\n        \"","divers":"Doissat  grav 1-2-3                                              Mondol GPS : 44° 43' 56\" Nord, 1° 04' 11\" Est","gps":"44° 43' 56\" Nord, 1° 04' 11\" Est","images":["../image/image_24/24_Doissat_1.jpg","../image/image_24/24_Doissat_2.jpg","../image/image_24/24_Doissat_3.jpg"]},"Consult_chateau_formulaireba5b":{"id":"Consult_chateau_formulaireba5b","dept":"24","canton":"Domme","commune":"Domme","nom":"Domme","type":"Bastide","periode":"XIII-XVIII","histoire":"A Domme le château de Giversac, de Caudon, et l'hôtel du gouverneur mairie.                                     DOMME,  la bastide fut fondée en 1281 par Philippe le Hardi sur un plateau à l'ouest duquel existait déjà un château, la bastide de Domme, perchée sur une falaise à 210 mètres d'altitude, domine la Dordogne. Elle n'offre pas le plan rectangulaire caractéristique des bastides, mais affecte la forme d'un trapèze. Les fortifications qui l'enserrent ont été adaptées dans leur tracé aux nécessités du terrain.  alors dans les mains de la famille de Gourdon.  Au XIVe siècle, durant la guerre de cent ans, la cité est attaquée de nombreuses fois. Les assaillants sont français lorsque la cité est aux anglais et inversement. En 1437, la cité est définitivement dans le Royaume de France. Au XVIe siècle, les terribles guerres de religion divisent le royaume. Les protestants attaquent plusieurs fois la cité de Domme mais sans succès. En 1588, le capitaine Geoffroy de Vivans à la tête de son armée de huguenots s'empare de la cité. En 1589, Henri de Navarre devient Roi de France sous le nom de Henri IV.  La bastide dut faire face à une jacquerie des croquants en 1594 puis ultérieurement en 1637  Domme connaîtra la prospérité au XVIIe siècle puis périclitera, ce qui a facilité sa conservation jusqu'à nos jours.                                                                                 CAUDON,  en 1777, l'avocat Jacques de Maleville, l'un des futurs rédacteurs du code civil, achète le domaine de Las Bories, un ancien manoir. Il y fait édifier le château de Caudon en 1805. Son fils Pierre Joseph aménage ensuite le parc et fait construire des communs et une orangerie. En 1835, Lucien, fils de Pierre Joseph et futur député puis sénateur de la Dordogne, fait rehausser le bâtiment d'un étage et ajouter deux pavillons latéraux.                         GIVERSAC,  fut la propriété de la famille de Cugnac, aux Blancher, aux Javel et aux de Gérard.","architecture":"DOMME ruines éparses d'un château fort, cité au XIVe siècle.  Après la visite en images de Domme, on va s'attarder à La Porte des Tours, principale entrée fortifiée de cette bastide. Cet ouvrage militaire doit sa notoriété au fait que ses murailles enfermèrent 70 prisonniers templiers entre 1307 et 1318. Ces derniers décorèrent alors  les murs de graffitis, émouvants témoignages de leur foi et cris de désespoir sont gravés dans la pierre, des crucifixions, des scènes de batailles, un Graal, des croix sur pieds triangulaires, des vierges, des christs couronnés, etc .  On y trouve même des réquisitoires contre le pape Clément V et le roi Philippe le Bel, les 2 instigateurs de la chute de l'ordre des templier.                                                  CAUDON, de plan en U, le corps de logis de plan rectangulaire à quatre niveaux trois toits en croupes avec lucarnes , fronton triangulaire en façades, retour des ailes en équerre avec pavillon carrées à toit pointus.\r\n GIVERSAC, un corps de logis du XVIIIe siècle a été noyé dans une vaste reconstruction du XIXe siècle avec des ailes en équerre. Une cheminée monumentale bâtie au XVe siècle fut remplacée par une copie de plâtre,l'authentique provenait de Calamane, près de Cahors. Le domaine couvre plus de 132 hectares de bois et prairies coiffant une colline dominant la Dordogne, il comprenait à lorigine le château, pastiche Renaissance, des métairies et des dépendances agricoles, dont la principale constitue aujourdhui un camp de jeunes.","habitants":"Avocat Jacques de Maleville\r\n        \"","divers":"Château de Domme  fortifications.  Caudon grav-5.  GPS : 44° 49' 23\" Nord et 1° 14' 13\" Est. Giversac grav 6 à 9.","gps":"44° 49' 23\" Nord et 1° 14' 13\" Est. Giversac grav 6 à 9.","images":["../image/image_24/24_Domme_1.jpg","../image/image_24/24_Domme_2.jpg","../image/image_24/24_Domme_3.jpg","../image/image_24/24_Domme_4.jpg","../image/image_24/24_Domme_5.jpg","../image/image_24/24_Domme_6.jpg","../image/image_24/24_Domme_7.jpg","../image/image_24/24_Domme_8.jpg","../image/image_24/24_Domme_9.jpg"]},"Consult_chateau_formulaire4468":{"id":"Consult_chateau_formulaire4468","dept":"24","canton":"Bergerac","commune":"Douville","nom":"Douville","type":"Château","periode":"XIII-XV-XVIII","histoire":"A Douville, ruines du château de Roussille du XIIe et XIVe siècles,  la Forge du XVIIe siècle,  Lestaubière du XIXe siècle chambre d'hôtes, Saint-Mamet du XVIIe siècle, du Dougnou.\r\nSt-MAMET  Cette élégante chartreuse a été construite à la fin du XVIIIe siècle par Pierre Chantegereil de la Marcodie,  est l'ancienne demeure des Brou de Laurière.\r\n ROUSSILLE vestiges  mentionné dans les chroniques de Saint-Denis, au XIIIe siècle, le château appartient aux comtes du Périgord, inclus dans le pariage de la bastide de Beauregard réalisée par Edouard 1er dAngleterre en 1286. En 1287, Archambaud III, comte du Périgord, reconnaît tenir du roi dAngleterre le castrum et castellania de Russelis. Pendant la guerre de cent ans, cest le repaire de bandes armées composées de mercenaires sous les ordres dArchambaud V qui livrent de terribles assauts contre Périgueux. Vers 1442, l'édifice est donné à Amaury de Bideran dit Malrigou, partisan des anglais. Il passe aux Albret, puis de Puyguyon, de Calvimont, des Lur-Longa puis en 1599 à la famille de Taillefer. En 1774, il sera en co-propriété entre les Teyssière et les de Cosson jusquà la Révolution.","architecture":"ROUSSILLE,vestiges  mentionné dans les chroniques de Saint-Denis, au XIIIe siècle, le château appartient aux comtes du Périgord, inclus dans le pariage de la bastide de Beauregard réalisée par Edouard 1er dAngleterre en 1286. En 1287, Archambaud III,comte du Périgord, reconnaît tenir du roi dAngleterre le castrum et castellania de Russelis.  . Restent des vestiges de murs et des tours et trois guérites équipées darchères. Une pièce voûtée souvre dans le rempart du côté nord. La tour sud est conservée et celle côté nord est arasée.\r\nSt-MAMET, cette élégante chartreuse a été construite à la fin du XVIIIe siècle Au milieu de noyers, une grande terrasse, ornée autrefois de massifs de fleurs, précède cette demeure. Ce château classique, se compose dun corps de logis à étage. Ses toitures sont couronnées de girouettes. La toiture des travées extérieures est plus haute afin de donner une allure de chartreuse à ce bâtiment de plan rectiligne.","habitants":"Famille de Pierre Chantegereil de la Marcodie              Roussille Famille de Taillefer\r\n        \"","divers":"Forge grav- 1 Douville St-Mamet grav 7 à 8 GPS : 45° 00' 01\" Nord et 0° 35' 11\" Est. Lestaubière de 2 à 5, Roussille grav-6.","gps":"45° 00' 01\" Nord et 0° 35' 11\" Est. Lestaubière de 2 à 5, Ro","images":["../image/image_24/24_Douville_1.jpg","../image/image_24/24_Douville_2.jpg","../image/image_24/24_Douville_3.jpg","../image/image_24/24_Douville_4.jpg","../image/image_24/24_Douville_5.jpg","../image/image_24/24_Douville_6.jpg","../image/image_24/24_Douville_7.jpg","../image/image_24/24_Douville_8.jpg"]},"Consult_chateau_formulaire2c80":{"id":"Consult_chateau_formulaire2c80","dept":"24","canton":"Neuvic","commune":"Douzillac","nom":"Douzillac","type":"Château","periode":"XI-XVI","histoire":"A Douzillac; le château de Mauriac fut construit au XIe siècle.  Château des Chauvaux, chartreuse de Fontpeyre, repaire de Néautouneix, manoir des Rieux, Castel de Valay.                                                    MAURIAC, bâti aux XVe et XVIe siècles, succède à un manoir médiéval, lui-même établi à l'emplacement d'une ancienne demeure gallo-romaine. De retour d'Italie, Montaigne fit halte au château en 1581. En 1730, un autre visiteur, le chevalier de Lagrange Chancel. En 1652, Mauriac nest pas une place forte importante et a été épargné par Balthazar. Ironie de lhistoire le 25 mai 1704 Gabriel de Talleyrand, comte de Grignols, seigneur de Beauséjour se mariera avec Margueritte de Taillefer, dame de Mauriac, et deviendra ainsi seigneur de Mauriac. fut vendu après la Révolution comme bien national. Le propriétaire actuel a consacré un demi-siècle à redonner tout son charme exquis à cette demeure de qualité, il appartient aujourdhui à monsieur Dumoncel.\r\n CHAUVAUX, par alliance plusieurs familles se succèdent aux Chauvaux : Dessagnes, Aubertie puis Aubertie de Labrousse, Savy, Vermeil de Conchard. Cest Franck Vermeil de Conchard qui donnera au château son aspect actuel  Pierre Savy (le père de Jules), né en 1781, était avocat. Dans le fabuleux tourbillon politique que fut le XIXe siècle, il engagea une carrière politique. Élu conseiller général à partir de 1845, il se fit également élire député de la Dordogne à lassemblée constituante de 1848. Il mourra à Chantérac en 1871.","architecture":"CHAUVEAUX, est flanqué de deux tours octogonales et pourvu dune toiture à la Mansart ; à la fin du XIXe siècle, le capitaine légionnaire Philippe Maine, héros du combat de Camérone au Mexique, y finit ses jours. Il est dailleurs inhumé au cimetière de Douzillac.           MAURIAC, du XVe siècle, établi sur des substructures du XIIe siècle. Le corps de logis rectangulaire à toit aigu est flanqué de deux grosses tours rondes  coiffés en cône  et chemin de ronde à mâchicoulis. La tour carrée qui accostait la façade à l'ouest, a disparu à la Révolution ainsi que l'enceinte aux huit tours circulaires, le donjon et la chapelle. La face ouest conserve un important fragment du chemin de ronde sur mâchicoulis. C'est une propriété privée où est autorisée la visite des jardins et de la terrasse. Le château est situé en bordure orientale d'un parc où demeurent deux tours d'angle au sud-ouest et au nord-ouest. On accède au domaine par un châtelet d'entrée en partie détruit, côtés Est et sud. Le château est inscrit au titre des M.H. le 12 octobre 1948,\r\nCastel VALEY, de plan rectangulaire à deux niveaux pavillon d'entrée saillant avec fronton triangulaire  toit en croupe recouvert d'ardoises.","habitants":"Mauriac Gabriel de Talleyrand,                           Chauvaux Franck Vermeil de Conchard\r\n        \"","divers":"Chauvaux  grav de6 - 8 GPS : 45° 05' 09\" Nord et 0° 25' 33\" Est.   Mauriac grav de1 à 5 GPS : 45° 5' 20,2\" Nord et 0° 25' 56,1\" Est.   Valay grav 9 GPS : 45° 05' 09\" Nord, 0° 25' 10\" Est.","gps":"45° 05' 09\" Nord et 0° 25' 33\" Est.   Mauriac grav de1 à 5 G","images":["../image/image_24/24_Douzillac_1.jpg","../image/image_24/24_Douzillac_2.jpg","../image/image_24/24_Douzillac_3.jpg","../image/image_24/24_Douzillac_4.jpg","../image/image_24/24_Douzillac_5.jpg","../image/image_24/24_Douzillac_6.jpg","../image/image_24/24_Douzillac_7.jpg","../image/image_24/24_Douzillac_8.jpg","../image/image_24/24_Douzillac_9.jpg"]},"Consult_chateau_formulaire87ff":{"id":"Consult_chateau_formulaire87ff","dept":"24","canton":"Lanouialle","commune":"Dussac","nom":"Dussac","type":"Château","periode":"XVI-XX","histoire":"Château de Dussac, inscrit au titre des M.H. Les ruines d'un ancien château du XVIe siècle, détruit lors des guerres de religion, ont servi à bâtir l'édifice actuel au XVIIIe siècle. \r\nChâteau de la Robertie, du début du XXe siècle, pas d'information historique.\r\nDUSSAC avant 1546 les vicomtes de limoges se séparent de Dussac au profit des Chauveron, au XVIe siècle devient un repaire noble de la famille de Foucauld qui font remanier le manoir qui à souffert lors des guerres de religion et le garderont jusqu'en 1916  sera vendu par Charlotte-Marie-Julie Lafon du Cluzeau veuve de Charles Maurice Fernand de Foucauld à la commune qui en ont fait la mairie et l'école.","architecture":"DUSSAC, ancien château du XVIe siècle, détruit lors des guerres de religion, ont servi à bâtir l'édifice actuel au XVIIIe siècle. De plan rectangulaire, il est flanqué d'une tourelle aux quatre angles et fait office de groupe scolaire. inscrit au titre des M.H..Les ruines d'un ancien château du XVIe siècle, détruit lors des guerres de religion, ont servi à bâtir l'édifice actuel au XVIIIe siècle, se compose d'un corps de logis rectangulaire   dont la toiture à deux pans repose sur deux pignons  aigus, l'avant corps central  appareillé à refends et couronné par un fronton triangulaire, quatre tourelles en encorbellement au angle coiffé de toits en poivrière. ROBERTIE de plan en équerre  de style moderne à deux niveaux et lucarnes sur toit brisé à la mansard.","habitants":"Famille de Foucauld \r\n        \"","divers":"A Dussac grav  1-2-3 GPS : 45° 23' 41,4\" Nord, 1° 05' 1,7\" Est.  La Robertie grav 4-5.","gps":"45° 23' 41,4\" Nord, 1° 05' 1,7\" Est.  La Robertie grav 4-5.","images":["../image/image_24/24_Dussac_1.jpg","../image/image_24/24_Dussac_2.jpg","../image/image_24/24_Dussac_3.jpg","../image/image_24/24_Dussac_4.jpg","../image/image_24/24_Dussac_5.jpg"]},"Consult_chateau_formulaire29b6":{"id":"Consult_chateau_formulaire29b6","dept":"24","canton":"Savignac les Eglises","commune":"Escoire","nom":"Escoire","type":"Château","periode":"XVIII","histoire":"ESCOIRE, le château date de la deuxième moitié du XVIIIe siècle. Il est connu pour avoir été, dans la nuit du 24 au 25 octobre 1941, le théâtre d'un triple crime resté mystérieux. Henri Girard, qui sera plus tard connu comme écrivain sous le nom de Georges Arnaud, découvre au petit matin le cadavre de son père Georges Girard, propriétaire du château et haut fonctionnaire du gouvernement de Vichy, de sa tante Amélie et de leur bonne Marie Soudeix. Henri qui a dormi dans une aile du château prévient les gardiens du domaine qu'il a trouvé les trois cadavres massacrés à coups de serpe. Face aux circonstances mystérieuses du drame (aucun témoin, absence de mobile, pas de traces d'effraction), Henri est suspecté du meurtre, arrêté et passe dix-neuf mois en prison jusqu'à son procès. Défendu par maître Maurice Garçon, il est finalement acquitté, faute de preuves, le 3 juin 1943. Ce fait divers bénéficie d'une très grande attention médiatique à l'époque, et a inspiré de nombreux écrits et émissions audiovisuelles depuis, notamment le roman La Serpe de Philippe Jaenada, paru en 2017 et qui défend d'innocence d'Henri Girard. Après guerre, le château est racheté  par le père de l'écrivain Michel Peyramaure. de 1950 environ jusqu'à la fin des années 1970, le château d'Escoire fut le lieu de vacances pour les enfants de l'entreprise parisienne LMT (« Le matériel téléphonique »), entreprise rachetée successivement par Thomson, puis Thales. , abandonné pendant des années, le château d'Escoire est actuellement la propriété de Sylvie et Tase Kordalov, originaires de Macédoine mais anciens hôteliers en Normandie, qui habitent dans une aile tandis que l'autre partie a été aménagée en chambres d'hôtes.","architecture":"ESCOIRE, édifice composé d'un corps de logis rectangulaire sur soubassement à trois niveaux,  côté entrée deux pavillons en retour d'équerre sailllant aux extrémités à fronton triangulaire avec oeils de boeuf au centre et pavillons mi-oeuvre plein cintre avec escalier à double révolution  et toit en coupole, et sur face parc un pavillon saillant. Il est inscrit au titre des M.H. pour ses façades et ses toitures en 1954.","habitants":"Famille d' Henri Girard\r\n        \"","divers":"Escoire GPS : 45° 12' 23\" Nord, 0° 50' 46,8\" Est","gps":"45° 12' 23\" Nord, 0° 50' 46,8\" Est","images":["../image/image_24/24_Escoire_1.jpg","../image/image_24/24_Escoire_2.jpg","../image/image_24/24_Escoire_3.jpg"]},"Consult_chateau_formulaire4e55":{"id":"Consult_chateau_formulaire4e55","dept":"24","canton":"Excideuil","commune":"Excideuil","nom":"Excideuil","type":"Forteresse","periode":"XIII-XVI","histoire":"A quelques km au sud ouest à Pantaly d'Excideuil  le château de la Roche.  \r\nROCHE qui a appartenu aux Gasson Bugeaud dIsly  et fut la résidence dété du sociologue Henri Mendras. Ce château est peu occupé par ses propriétaires successifs,  ancien château de Saint-Pantaly qui fut aux Jaubert, aux du Puy, aux Sireuil et aux Marqueyssac. Résidence de Bugeaud après son mariage en 1818 avec Élisabeth Jouffre de Lafaye, notamment les Jaubert du XIVe siècle au XVIe siècle.  EXCIDEUIL.  À la suite de la trahison du vicomte de Limoges Adémar V en 1199, Jean sans Terre se rendit maître de plusieurs châteaux de la vicomté. Le vicomte Gui V ne put récupérer les châteaux d'Aixe, Châlucet, Thiviers et Excideuil que vers 1210.  Lors de la guerre de cent ans, après avoir résisté à un assaut en 1346, il connaît l'occupation anglaise en 1351. Libéré en 1356 puis rendu aux anglais en 1360, en application du traité de Brétigny, il est repris par les troupes de Du Guesclin en 1370. Durant les guerres de religion, le château, toujours sous l'apanage des vicomtes de Limoges, appartient à Jeanne d'Albret, du côté des catholiques. En 1574, il passe aux mains des protestants qui en sont chassés l'année suivante. En 1582, le vicomte de Limoges n'est autre que Henri III de Navarre, le futur roi Henri IV. Il vend la châtellenie d'Excideuil au comte François de Pérusse des Cars. Par mariage, le château passe à la famille de Talleyrand-Périgord et la terre est érigée en marquisat en 1613. Délaissé par ses nouveaux propriétaires qui transfèrent les objets et mobiliers de valeur dans leur château de Chalais, en Charente, le château se dégrade. En 1883, Hélie Roger de Talleyrand-Périgord lègue le château d'Excideuil aux hospices de Chalais. En 1973, un incendie ravage les toitures du châtelet d'entrée. Lors du dernier quart du XXe siècle, la famille Naudet, nouveau propriétaire,","architecture":"ROCHE  fut entièrement remanié aux XVIe et XVIIe siècles. Le corps de logis, massif, est presque carré, recouvert dun toit dardoises à la Mansart, percé de lucarnes à fronton arrondi. Deux tours carrées encadrent le corps principal à l'ouest sur trois étages. La façade Est, côté rivière, est encore proche du bâtiment dorigine avec ses quatre travées et ses échauguettes en culs de lampe coiffées de dômes, à la mode du XVIe siècle.                                                 EXCIDEUIL, cernée par des fortifications, une butte rocheuse de forme ovale, longue d'environ 150 m dans le sens nord-sud et moitié moindre dans le sens est-ouest, sert d'assise au château.  À l'est, le donjon et le logis surplombent la vallée de la Loue de façon abrupte, le rocher ayant été taillé de façon à empêcher les assauts ennemis. Le donjon se compose en fait de deux tours carrées des XIIe et XIIIe siècles reliées entre elles par un haut mur. La surface des logis des XVe et XVIIe siècles a été doublée lors de travaux importants à la fin du XXe siècle, leur redonnant en partie leurs proportions d'antan. \r\nAu sud-ouest, le châtelet d'entrée qui date des XIVe et XVe siècles a été remodelé par Nicolas Rambourg, l'architecte du château de Hautefort, à la fin du XVIe siècle. Il est encadré par deux tourelles décoratives. À côté de cette forteresse médiévale s'élève une demeure Renaissance, avec tourelles et fenêtres à meneaux,","habitants":"Famille de Talleyrand-Périgord \r\n        \"","divers":"château d'Excideuil GPS : 44° 40' 07\" Nord, 0° 23' 48\" Est.  La Roche grav 6.","gps":"44° 40' 07\" Nord, 0° 23' 48\" Est.  La Roche grav 6.","images":["../image/image_24/24_Excideuil_1.jpg","../image/image_24/24_Excideuil_2.jpg","../image/image_24/24_Excideuil_3.jpg","../image/image_24/24_Excideuil_4.jpg","../image/image_24/24_Excideuil_5.jpg","../image/image_24/24_Excideuil_6.jpg"]},"Consult_chateau_formulaire6ba8":{"id":"Consult_chateau_formulaire6ba8","dept":"24","canton":"St-Pierre de Chignac","commune":"Eyliac","nom":"Eyliac","type":"Château","periode":"XVI-XVII","histoire":"A Elyac, le château de la Chalupie du XVIIe siècle; d'Eyliac du XVIe- XVIIe -XVIIIe siècles, avec son pigeonnier, du Puy manoir, du XVIIIe siècle,  ruines  de la Richardie du XVe- XVIIIe siècles, la Roquette-Haute manoir du XVIIe siècle\r\nEYLIAC, ce château appartient à la famille Girard de Langlade dont deux membres, Raymond Girard de Langlade (de 1592 à 1595) et Jean Girard de Langlade (en 1647) devinrent maires de Périgueux. \r\nCHALUPIE, le château actuel date du XVIIe siècle et fait suite à un ancien manoir, déjà connu au tout début du XVIe siècle. Bâti à flanc de coteau, il est entouré dune enceinte quadrangulaire où apparaissent danciens mâchicoulis à certains endroits. Par ailleurs, sous un fronton à ailerons, le portail date du XVIIe siècle est flanqué de pilastres. La demeure présente un plan en équerre composé de deux corps de bâtiments à deux niveaux. Sa toiture, très ancienne, est à quatre pans. Elle est percée de lucarnes permettant léclairage des combles et plusieurs cheminées y prennent place. À lintérieur du château de la Chaloupie, dans une grande salle pavée de galets, une fontaine est installée depuis le XVIIIe siècle. Lécrivain Lagrange-Chancel a vécu dans le château de la Chaloupie pendant le XVIIIe siècle.\r\nRichardie La construction du château  date du XVe au XVIIe siècle. Il ne reste que des ruines.","architecture":"ELYAC, manoir du XVe siècle, autour d'une cour carrée, se trouve le logis côté Ouest faisant face à l'entrée côté Est. Un simple mur barre le côté sud. Le logis possède encore quelques mâchicoulis et son portail encadré par 2 pilastres est surmonté d'un fronton de forme trapézoïdale.                          CHALOUPIE. Il se situe à 1km à l'ouest du village d'Eyliac.   se compose d'un logis de direction nord-sud que flanquent deux tours massives. Il est précédé à l'est de dépendances et au nord-est d'un châtelet d'entrée devant lequel se situaient autrefois des douves.                                                                           PUY, il possède divers traits relatif à l'architecture du Périgord. Il est composé d'une bâtisse, de forme rectangulaire accolée à une aile ou d'une enceinte menant sur un chemin de passage. Le mur est percé dun portail plein cintre et surmonté de 4 fenêtres en chien-assis. Le manoir du Puy évoque les charteuses de la région. Son plan rectangulaire présente un corps de logis flanqué de tours carrées légèrement plus élevées. Sa toiture en lauze, à 4 pans pour les tours et à 2 pans pour le corps principal, est très pentue. Des épis de faîtage sont disposés sur le toit des 2 logis latéraux. Six lucarnes installées sur la façade avant de la toiture, permettent léclairage des combles. Le manoir du Puy a été entièrement restauré par la famille Secrestat, à la fin du XIXe siècle.","habitants":"Famille Girard de Langlade\r\n        \"","divers":"A Eyliac;Chaloupie grav de1 à7  GPS : 45° 09' 38\" Nord, 0° 50' 32\" Est.  Puy gravc 7-8  GPS : 45° 09' 41\" Nord, 0° 51' 19\" Est .                                          Richardie GPS : 45° 09' 41\" Nord, 0° 51' 19\" Est","gps":"45° 09' 38\" Nord, 0° 50' 32\" Est.  Puy gravc 7-8  GPS : 45°","images":["../image/image_24/24_Eyliac_1.jpg","../image/image_24/24_Eyliac_2.jpg","../image/image_24/24_Eyliac_3.jpg","../image/image_24/24_Eyliac_4.jpg","../image/image_24/24_Eyliac_5.jpg","../image/image_24/24_Eyliac_6.jpg","../image/image_24/24_Eyliac_7.jpg","../image/image_24/24_Eyliac_8.jpg","../image/image_24/24_Eyliac_9.jpg"]},"Consult_chateau_formulaireda62":{"id":"Consult_chateau_formulaireda62","dept":"24","canton":"Bergerac","commune":"Eymet","nom":"Eymet","type":"Château-Vestiges","periode":"XIII-XVIII","histoire":"Deux châteaux à Eymet et à St-Capraise d'Eymet le château  de Libersac.                                             EYMET, du XIIIe siècle, par Alphonse de Poitiers avant la création de la bastide dans l'enceinte de laquelle il fut intégré. En 1352  le roi d'Angleterre fait don de la seigneurie à Gilbert de Pellegrue. En 1377, les troupes de Bertrand Du Guesclin prirent le château aux anglais . En 1554 Louise de Pellegrue épouse Germain-Gaston de Foix vicomte et marquis mais le domaine reste à Louise qui meurt prematurément, l'héritière sa soeur qui épouse François de Vivonne seigneur de la Chataigneraie, tué en duel par Guy de Chabot baron de Jarnac et épouse François de Caumont c'est son fils cadet Jacques Nompar rescapée de la nuit de la saint-Barthélémy qui hérite et garderont la seigneurie d'Eymet  jusqu'à la Révolution.  au XXe siècle fut acquis par les Teyssonnière de Gramont, aujourd'hui appartient à la commune, le donjon du château est depuis 1963 transformée en musée. L'ensemble des bâtiments  sont inscrits au titre des M.H. depuis le 30 décembre 1994. \r\nPOUTHET,  appartient à la famille Hoarau de La Source de père en fils depuis 1848, antérieurement  elle a été la propriété de la famille Beausoleil puis de la famille Ferrand.  Dans les années 1860, pour répondre aux activités viticole et agricole, des chais sont construits au nord. Dans les années 1890, les dépendances sont reconstruites au nord-ouest, une tour à faux mâchicoulis est accolée à la tour ouest, et une tourelle est édifiée dans l'angle Est. Un parc paysager et un potager complètent les aménagements du XIXe siècle.                                                              LIBERSAC, c'est l'ancien fief des du Bois de La Grèze, des Cazenave et des Baillet puis propriété des Genevier et des Batt. La demeure, élevée au XIVe siècle, possédait autrefois \"gueriettes et fortifications\". Cité en 1365, cet ancien manoir est aujourd'hui semi-ruiné.","architecture":"EYMET,  c'est un ancien château d'époque médiévale. La construction  date du XIIIe siècle. Son logis a été rebâti au XIXe siècle. Il possède d'mposants vestiges qui datent du XIIIe siècle.  les côtés nord et ouest qui donnent à l'extérieur de la bastide sont protégés par une enceinte et, au nord, par une porte surmontée d'un poste de défense. L'est et le sud donnent à l'intérieur de la bastide. Le côté oriental offre un logis du XIXe siècle. Au sud, l'enceinte défensive est importante, présentant à l'angle occidental d'une échauguette, en son centre la porte d'accès surmontée d'une bretèche et à l'est, un donjon carré massif du XIIIe siècle partie d'un rempart et d'un logis percé d'une fenêtre géminée: la tour Monseigneur. \r\nPOUTHET, construit au XVIIIe siècle, édifice formant un L avec l'ancienne aile des communs, à l'Est. Le corps central rectangulaire est encadré de deux tours carrées. Un escalier convexe permet l'accès au rez de chaussée surélevé, et représente le seul ornement de la façade. Le logis est orienté Est-ouest. Il est borné à chaque extrémité par un pavillon et forme une chartreuse surélevée, accessible côté nord par un escalier d'honneur de quatorze marches et côté sud par un escalier double. Côté Est, une ancienne aile de dépendances forme un L avec le logis. À l'ouest du logis, une tour à faux mâchicoulis est édifiée au XIXe siècle, et côté oriental, une mince tourelle fait le pendant. L'édifice et le domaine sont inscrits au titre des M.H. le 23 juin 2006.","habitants":"Eymet Famille De Caumont                                            Pouthet Famille Hoarau \r\n        \"","divers":"Eymet grav de 1 à 5 GPS : 44° 40' 06\" Nord et 0° 23' 49\" Est   Le Logis, Libersac                                    Pouthet  grav 8 GPS : 44° 40' 49\" Nord et 0° 24' 47\" Est","gps":"44° 40' 06\" Nord et 0° 23' 49\" Est   Le Logis, Libersac","images":["../image/image_24/24_Eymet_1.jpg","../image/image_24/24_Eymet_2.jpg","../image/image_24/24_Eymet_3.jpg","../image/image_24/24_Eymet_4.jpg","../image/image_24/24_Eymet_5.jpg","../image/image_24/24_Eymet_6.jpg","../image/image_24/24_Eymet_7.jpg","../image/image_24/24_Eymet_8.jpg"]},"Consult_chateau_formulairee31c":{"id":"Consult_chateau_formulairee31c","dept":"24","canton":"Excideuil","commune":"Saint-Médart d","nom":"Eyssendiéras","type":"Château","periode":"XV-XVI","histoire":"EYSSENDIERAS, lhistoire du domaine commença avec les Pasquet, seigneur dEssendiéras au XVI e siècle. Pierre Pasquet qui exploitait la forge basse de Gandumas, fit certainement bâtir celui que lon nomme désormais « le vieux château ». Il se composait alors dun corps de logis dont les angles portaient des tours. Ses fils terminèrent les travaux et sy établirent.  En 1791 , François Malet de la Jorie devient suspect au nouveau pouvoir. Il émigra et tous ses biens furent confisqués. En 1793,  Essendiéras fut vendu à titre de « biens nationaux ». Antoine Pouquet notaire à Angoisse l'acheta.  Il fit effectuer des réparations, peut-être le château avait il eu à souffrir des révolutionnaires locaux, et sy installa après 1797. Il vendit son étude de notaire en 1828, il était déjà âgé de 71 ans. Pierre Chéri, fils dAntoine, marié à Emilie Sourdeau devient   le nouveau maître. En 1850, jugeant le château de son père  trop petit et incommode, il fit édifier une vaste maison. Plus confortable, plus vaste, plus ensoleillée elle était aussi la preuve de la réussite de cette famille bourgeoise.   Mais Eugène déplorait que lon ne puisse pas recevoir plus de monde, en même temps. En 1906, il fit coiffer déléments baroques la maison de  Pierre-Chéri et la transforma en un grand château. Terminé en 1908. En 1915 Gaston mourut au château et fut inhumé dans le caveau des Pouquet, au cimetière de Saint-Médard. En 1919 Jeanne refit sa vie avec son cousin Maurice Pouquet. Sa fille Simone Arman de Caillavet née en 1894, après un mariage raté et la naissance dune fille Françoise, épousa en 1926, lécrivain André Maurois, qui  décéda en 1967. Simone dernière descendante de cette dynastie Pouquet  mourut en 1967. L'industriel périgourdin Sylvain Floiraty créa une immense pommeraie. Ellen et Jeroen Bakker rachètent le domaine en 1999.","architecture":"EYSSENDIERAS, manoir du XVe siècle à côté d'un pavillon moderne logis d'André Maurois,  sur quatre cents hectares du domaine deux châteaux se cotoient le premier fut construit au XVIe siècle, le second au XIXe siècle,   Il présente, au sommet d'une hauteur qui domine la vallée de la Loue, avec deux bâtiments distants de quelques mètres formant ce qu'on appelle le château d'Eyssendiéras : au Sud, un castel du XIXe siècle, appelé château Neuf, et à l'Ouest, un manoir composé d'un logis des XVe et XVIIe siècles, accolé à une tour entourée de mâchicoulis. Complété au Nord et à l'Est par des dépendances, l'ensemble délimite une cour intérieure carrée d'une trentaine de mètres de côté. Après avoir été un important domaine agricole  il a évolué vers un concept touristique.","habitants":"Famille de Pierre Pasquet \r\n        \"","divers":"Château d'Eyssendiéras à Saint-Médart d'Excideuil","gps":"","images":["../image/image_24/24_Eyssendi%c3%a9ras_1.jpg","../image/image_24/24_Eyssendi%c3%a9ras_2.jpg","../image/image_24/24_Eyssendi%c3%a9ras_3.jpg","../image/image_24/24_Eyssendi%c3%a9ras_4.jpg"]},"Consult_chateau_formulairec97f-2":{"id":"Consult_chateau_formulairec97f-2","dept":"24","canton":"St-Cyprien","commune":"St-cyprien","nom":"Fages","type":"Vestiges-Château","periode":"XIII-XVI","histoire":"FAGES,  au XIIIe siècle  les seigneurs de la Fages font élever le donjon le château a appartenu au milieu du XVIe siècle à Jean de Fages  sa femme, Anne de Salignac de La Mothe. Leur fille, Anne, a été la dame d'honneur de la reine de Navarre. En 1553, elle épouse Joachim de Monluc, sieur de Lioux,  mort avant 1567. Le château est attaqué et pillé par les protestants en 1568. Anne de Fages se remarie en 1570 avec Jean de Monlezun, sieur de Caussens qui est tué  en 1573. Anne de fages prend pour troisième époux Jacques de la Tour. Le seigneur de Limeuil prend le château en 1574 qui est détruit partiellement par une explosion de poudre. Le château est occupé en 1585 par un chef de bande. En 1637, le château appartient par alliance à Bernard de Montesquiou, chevalier, seigneur de Fages, Saint-Cyprien, Tursac, Le Bousquet. En 1637, sa fille, Catherine de Montesquiou-Monluc-de-Sainte-Colombe épouse au château Jean-Jacques de Saint-Astier. En 1700, Marie de Montesquieu de Montluc a épousé Bernard de Hautefort, dit le marquis d'Ajat, et lui a apporté le château de Fages, d'où : Marie-Thérèse de Hautefort, seigneur d'Ajat, Bauzens, Fages et autres places après la mort de son frère, mariée à Jacques Arlaud de Frugie (1795), comte de La Roque, seigneur d'Ajat , Bauzens, Fages, le Bousquet, le Mas, lieutenant général des armées du roi, commandeur de l'ordre de Saint-Louis ; Suzanne-Thérèse d'Arlaud de Frugie de la Roque mariée en 1759 avec Henri-Jacques de Taillefer (1739-1805)3 ; Henry François Athanase de Taillefer, appelé comte Wlgrin de Taillefer  Marie-Thérèse-Fortunée de Taillefer (1760- ) mariée en 1780 avec Guillaume-Joseph de Lartigue de Casaux, président au parlement de Bordeaux, en 1964 monsieur Louis Durand architecte qui entreprend la restauration.","architecture":"FAGES, face à l'entrée se trouve un logis à étages, rebâti au XVIe siècle, retouché au XVIIe siècle qui contient le grand escalier à deux volées droites par étage. Il est accosté au donjon. Au sud, un nouveau pavillon Renaissance est construit au XVIe siècle sur des caves voûtées, l'édifice a été laissé à l'abandon à la fin du XIXe siècle et devient la proie des démolisseurs. Aucun texte ne permet de préciser à quel moment la construction du pavillon Renaissance a commencé.   Le château est en cours de restauration par l'association de sauvegarde de l'église de Castels et du château. \r\nA saint-Cyprien le château de Fages, XVe et XVIe siècles, ouvert au public, dont la chapelle et les ruines du château sont inscrits au titre des M.H.en 1933, alors que le pavillon Renaissance est classé M.H. en 1965.","habitants":"Bernard de Montesquiou\r\n        \"","divers":"A  St-cyprien grav de 6 à 9;  Fages grav de 1 à 5  GPS : 44° 52' 36\" Nord, 1° 02' 29\" Est","gps":"44° 52' 36\" Nord, 1° 02' 29\" Est","images":["../image/image_24/24_Fages_1.jpg","../image/image_24/24_Fages_2.jpg","../image/image_24/24_Fages_3.jpg","../image/image_24/24_Fages_4.jpg","../image/image_24/24_Fages_5.jpg","../image/image_24/24_Fages_6.jpg","../image/image_24/24_Fages_7.jpg","../image/image_24/24_Fages_8.jpg","../image/image_24/24_Fages_9.jpg"]},"Consult_chateau_formulaire5237":{"id":"Consult_chateau_formulaire5237","dept":"24","canton":"Montignac","commune":"Fanlac","nom":"Fanlac","type":"Château","periode":"XIV-XVII","histoire":"FANLAC château d'Auberoche des XIVe et XVIIe siècles, inscrit au titre des M.H.depuis 1962. \r\nSABLOU, du XVIIe au XIXe siècle. De janvier à décembre 1940, il a servi de camp d'internement pour les militants communistes. En contrebas du château, près du pont de Fanlac sur le Thonac, une stèle commémore cet épisode de la seconde guerre mondiale. Le château du Sablou connaît lui une évolution différente : Il a été bâti au milieu du XVIIIe siècle par la famille Chapt de Rastignac (famille qui acheta Fanlac en 1511), en 1852, il abrite 11 personnes ; la propriétaire  Aglaé de la Luzerne, son fils Edmond de Floirac et sa famille, et des aides. En 1872 le château a 13 habitants qui ont un peu changé : les propriétaires sont maintenant Edmond de Floirac et son épouse, colonie de vacances.","architecture":"FANLAC,  manoir avec partie du XIV-XVe siècle.     bourg de Fanlac, direction Montignac.  En 1940. Une stèle a été érigée près du pont de Fanlac où des panneaux retraçant cette période sont à votre disposition. La maison principale du domaine est le logement privé des propriétaires et résidents. Il comprend également quatre gîtes et une piscine. Il est entouré par un parc contenant des arbres séculaires et une forêt de 85 hectares avec des sentiers piétonniers et deux cavernes. Il surplombe, au-dessus d'une vallée paisible, le village médiéval de Fanlac. La tranquillité absolue règne sur ce domaine.","habitants":"Famille d'Edmond de Floirac\r\n        \"","divers":"Château de Fanlac; la Coudonnie grav-3, de Sablou grav -4.","gps":"","images":["../image/image_24/24_Fanlac_1.jpg","../image/image_24/24_Fanlac_2.jpg","../image/image_24/24_Fanlac_3.jpg","../image/image_24/24_Fanlac_4.jpg"]},"Consult_chateau_formulaire49f7":{"id":"Consult_chateau_formulaire49f7","dept":"24","canton":"Vélines","commune":"Port Ste -Foy la Grande","nom":"Fauga_Mézière","type":"Château","periode":"XVIII","histoire":"MEZIERES  Au Moyen-Âge, Saint Avit de Tizac, le Canet et La Rouquette dépendent de la juridiction de Montravel en Périgord alors que Sainte-Foy est en Agenais.                                                                           FAUGA Le château fait lobjet dune inscription au titre des M.H. depuis le 22 novembre 1989 pour ses façades et toitures, ainsi que pour le « porche d'entrée entourant la cour centrale en terrasse avec son mur de soutènement ». Ce château du XVIIIe siècle appartenait à une famille noble protestante. La date de 1730 est gravée dans la pierre au-dessus de deux des portes. Le 21 février 1745 «Lassemblée du désert du Fauga» eut lieu dans la plaine entre le château et la rivière Dordogne. Elle rassembla plusieurs milliers de Réformés bravant linterdiction royale. Elle fut suivie de répression. Au XIXe et au début du XXe siècle ce fut une annexe dune «colonie agricole pénitentiaire» pour jeunes délinquants. Actuellement cest lexploitation agricole dune société privée. Inscrit aux M.H le 22/11/1989 le domaine est géré par monsieur G.Fenelon.","architecture":"MEZIERES, cette ville bastionnée de Gironde est fondée en 1255 par le frère de Saint-Louis mais les trois villages sont ensuite séparés, lors du découpage administratif effectué durant la Révolution. Le château de Mézières est  l'ancienne demeure de la famille Ballue. Ce manoir a été  reconstruit dans le goût de la Renaissance. C'est dans ses murs que les clefs de la bastide de ste Foy située de l'autre côté de la Dordogne, furent remises à Henri IV alors qu'il allait offrir au duc de La Force son bâton de maréchal. On raconte également que Louis XIII s'est arrêté dans ce château lors de son voyage en Guyenne en 1622.    FAUGA, le château comporte un corps central flanqué de deux ailes, et une tour circulaire coiffée d'un dôme de pierre.  Un second édifice, situé sur le bord de la route à 435 mètres à vol d'oiseau, porte également le nom de château de Fauga. De style quelque peu colonial et de couleur ocre, il s'agit plus d'une grosse demeure que d'un château.","habitants":"famille Ballue\r\n        \"","divers":"A Port Ste -Foy la Grande grav 6 à 8, Fauga-Mézière grav de 1 à 5","gps":"","images":["../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_1.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_2.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_3.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_4.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_5.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_6.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_7.jpg","../image/image_24/24_Fauga_M%c3%a9zi%c3%a8re_8.jpg"]},"Consult_chateau_formulaire4915":{"id":"Consult_chateau_formulaire4915","dept":"24","canton":"Montagrier","commune":"Toscane St-Apre","nom":"Fayolle","type":"Château","periode":"XVII","histoire":"FAYOLLE, mention du repaire noble au XIIe siècle, en 1408 propriété de Jean de Fayolle, occupé par les anglais pendant les guerres de religion André de Bourdeille sénéchal et gouverneur du Périgord installe ces troupes. Au XVIIe siècle la demeure inconfortable les Fayolle  l'abandonèrent au profit de leurs châteaux de Bellet, de Puicheny et du mas-Poitevin,   en 1725 érigée en marquisat  ses propriétaires le marquis de la Fayolle s'y réinstallent et décident  de faire édifier un nouveau château, à la Révolution le marquis de Fayolle qui n'était pas parti en émigration conserve ses propriétés foncières et évite par sa présence des dégradation du domaine.  Le château actuel est le résultat de deux périodes de constructions successives, la première au XIVe siècle et en 1766 est due à l'architecte Chauvin ; la seconde, à la fin du XIXe siècle, est l'uvre de l'ar
