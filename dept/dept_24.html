lle quelle abrita antan une bien jolie histoire damour dont les récits diffèrent selon les époques.","architecture":"BELCAYRE, Bordant la Vézère, le château de Belcayre a été bati sur un éperon rocheux qui culmine à une petite dizaine de mètre de haut. Cest une demeure construite au XIVe siècle, remaniée au XVIe siècle, puis au XIXe siècle. un châtelet d'entrée et le pont-levis précèdent la tour ronde à mâchicoulis du XVe siècle sur laquelle s'appuie le logis carrée. Elle a été construite dans la tradition des châteaux périgourdins et citée dès 1365 de la falaise taillé en proue de navire semble ne faire qu'une avec la demeure qui est posée dessus. L'embarcation semble prête à descendre la Vézère. Dans un abri sous roche,il a été découvert un bloc gravé par l'homme du Magdalénien et sur lequel figure un bouquetin.\r\nVERMONDIE Le manoir et la Tour penchée de la Vermondie, limitrophes de Saint-Léon-sur-Vézère, se trouvent sur la commune de Thonac. La Tour penchée de la Vermondie  de plan carré 5,25 x 5,50m de côté du XIIe siècle serait d'origine gallo-romaine. Le manoir de la Vermondie est inscrit aux M.H depuis 1941.","habitants":"Famille d'Antoine de Reilhac\r\n        \"","divers":"Belcayre GPS : 45° 0' 56,59' Nord et 1° 6' 29,26\" Est  grav de 1 à 7 .                                                            Vermondie grav 8 - 9 GPS : 45° 01' 46\" Nord, 1° 05' 43\" Est","gps":"45° 0' 56,59' Nord et 1° 6' 29,26\" Est  grav de 1 à 7 .","images":["../image/image_24/24_Belcayre_1.jpg","../image/image_24/24_Belcayre_2.jpg","../image/image_24/24_Belcayre_3.jpg","../image/image_24/24_Belcayre_4.jpg","../image/image_24/24_Belcayre_5.jpg","../image/image_24/24_Belcayre_6.jpg","../image/image_24/24_Belcayre_7.jpg","../image/image_24/24_Belcayre_8.jpg","../image/image_24/24_Belcayre_9.jpg"]},"Consult_chateau_formulaire6b09":{"id":"Consult_chateau_formulaire6b09","dept":"24","canton":"Bussière-Badil","commune":"Bussière_Badil","nom":"Belleville","type":"Château","periode":"XVI","histoire":"Le château de Bussière-Badil  bâti à Bussière-Badil, L'ancien château-fort de Bussière ne présente plus qu'un donjon qui date du XIe siècle.                     BELLEVILLE appelé aussi le vieux-château, bâti à Bussière-Badil  de style Renaissance. La construction  date de la fin du XVIe siècle en 1598, pour Jean-Hélie de Colonges, qui racheta le château à la famille de Roffignac. Cette maison forte aurait été construite, vers 1514, pour Jean-Hélie de Colonges, Prieur de labbaye de Bussière-Badil. Il était aussi le frère de Charles-Hélie de Colonges, seigneur de Nontron, depuis 1600. Le château changera plusieurs fois de mains, passant à la famille des Lajame, des Labrousse, des Masfranc, des Roffignac et des Calendreau.","architecture":"BELLEVILLE, cette maison-forte, appelée aussi château de Belleville, a été construit au XVIe siècle, cette demeure comprend une tour descalier avec tourelles en encorbellement. Les fenêtres sont remaniées au XVIIIe siècle, date 1724 inscrite sur le linteau. La tour est refaite dans sa partie supérieure avec des bretèches en béton.  Le château de Belleville possède une tour descalier avec des tourelles en encorbellement. Les fenêtres furent remaniées, au XVIIIe siècle. Sur le linteau, on peut voir la date de 1724. La tour a été refaite, dans la partie supérieure, avec des bretèches en béton il va être restauré.","habitants":"Famille de Jean-Hélie de Colonge\r\n        \"","divers":"Deux château à Bussière; Bussière-Badil grav 1-2 GPS : 45° 39' 09\" Nord, 0° 36' 22\" Est                   Belleville grav 3 GPS : 45° 39' 10\" Nord, 0° 36' 21,4\" Est","gps":"45° 39' 09\" Nord, 0° 36' 22\" Est                   Bellevill","images":["../image/image_24/24_Belleville_1.jpg","../image/image_24/24_Belleville_2.jpg","../image/image_24/24_Belleville_3.jpg"]},"Consult_chateau_formulairea269":{"id":"Consult_chateau_formulairea269","dept":"24","canton":"Belvès","commune":"Belvès","nom":"Belvès","type":"Patrimoine","periode":"XI--XVI","histoire":"BELVES, les Duquesne, propriétaires du château, ont décidé de l'ouvrir au public sur une période très courte (20 août au 30 septembre) afin de faire découvrir la chambre des fresques datant du XVe siècle.  Le beffroi date du XIe siècle et a été surélevé d'un clocher au XVe siècle.  La tour de l'Archevêque était le lieu d'habitation du seigneur de Belvès Bertrand de Goth sacré pape Clément V en 1305.\r\nLa tour de l'Auditoire, ou de l'Auditeur, est un ancien donjon du XIe siècle. Celle-ci a été recouverte au XVIe siècle pour en faire un pigeonnier. La tour du Guet édifiée au XIIIe siècle.\r\n PECH GAUDOU : ce manoir a été construit à partir du XIIe siècle et a été modifié du XIVe au XIXe siècle. Au XVIe siècle, il appartenait à la famille de Commarque qui a combattu du côté protestant. Henri de Navarre  a été reçu par Anet de Commarque en 1577.              CONTI, chartreuse de St-Germain de Belvés, cest à Conty quHenri Lasserre, journaliste de renom sous le Second Empire, écrit le livre Notre Dame de Lourdes, plus fort tirage littéraire de tout le XIXe siècle. Laissée à labandon en 1944, la chartreuse est occupée par des résistants qui y séquestrent le châtelain de Montfort, M. Mercier, avant de lexécuter sous prétexte de collaboration.                                                     CAMPAGNAC, à trois Km à l'ouest à St-Pardoux de Vielvic, Campagnac, sils ont avant tout cherché à créer un bâtiment fortifié, les fondateurs du château nont pas négligé son aspect esthétique. Cet édifice présente une architecture très élégante qui s'inscrit dans un beau cadre sylvestre: les logis en équerre sont soudés par une tour polygonale d'escalier remontant à la Renaissance et ils sont flanqués d'un donjon carré à mâchicoulis et d'une importante tour circulaire. Le château possède encore sa chapelle et une vieille tour du XIIe siècle qui fut un poste de surveillance des troupes anglaises sur la vallée de la Couze. C'était au XVIIe siècle le fief des Roux de Lusson. En 1760, ce repaire noble avait haute justice sur Bouillac,la Sauvetat et Vielvic","architecture":"BELVES construit au début du XIVe siècle, est agrandi au XIXe siècle avec ladjonction dune tour au sud et de pièces assurant la liaison avec le logis médiéval.  Cest à partir de cette période que le nouvel ensemble est nommé « château de Belvès ». Il est aussi connu sous le nom de « Hôtel de Commarque ».   C'est un ancien établissement templier. La construction du château date du XVIe siècle. Des peintures murales de la deuxième moitié du XVe siècle ont été découvertes en 2011. Cette maison date du XVIe siècle qui a, au rez-de-chaussée, quatre arcatures en arcs brisés, les fenêtres sont à meneaux moulurées et sculptées. Une Tour ronde se situe sur l'autre façade. Latrines ou bretèches extérieures. Sa restauration et sa porte date de la fin du XIXe siècle, est inscrit aux M.H. depuis le 6/12/1948. \r\nCONTI, la chartreuse, construite au XVIIIe siècle sur le haut dune colline, présente une façade de sept travées et des baies galbées encadrent la porte axiale qui inscrit son chambranle entre deux pilastres. Elle est bâtie dans la deuxième moitié du XVIIIe siècle par Xavier Lescure qui y meurt en 1822. Il laisse trois fils, Jean, Pierre et Jean-Étienne qui sont devenus respectivement maire de Saint-Germain, prêtre de Saint-Germain et garde dhonneur de la Dordogne. Elle est entourée dun jardin qui correspond à lidéal esthétique du XVIIIe siècle, composé de buis de cyprès ou encore de lauriers roses. Un petit vignoble y est ajouté au début du XXe siècle.","habitants":"Famille de Commarque                                                  Famille de Xavier Lescure\r\n        \"","divers":"Patrimoine de Belvès GPS : 44° 46' 34,3\" Nord, 1° 00' 20,5\" Est Garv 1-7-8-9,                                              Campagnac grav 2-3-4-5. Conti grav 6.","gps":"44° 46' 34,3\" Nord, 1° 00' 20,5\" Est Garv 1-7-8-9,","images":["../image/image_24/24_Belv%c3%a8s_1.jpg","../image/image_24/24_Belv%c3%a8s_2.jpg","../image/image_24/24_Belv%c3%a8s_3.jpg","../image/image_24/24_Belv%c3%a8s_4.jpg","../image/image_24/24_Belv%c3%a8s_5.jpg","../image/image_24/24_Belv%c3%a8s_6.jpg","../image/image_24/24_Belv%c3%a8s_7.jpg","../image/image_24/24_Belv%c3%a8s_8.jpg","../image/image_24/24_Belv%c3%a8s_9.jpg"]},"Consult_chateau_formulairecab2":{"id":"Consult_chateau_formulairecab2","dept":"24","canton":"Saint-Cyprien","commune":"Berbiguières","nom":"Berbiguières","type":"Château","periode":"XII-XVII","histoire":"BERBIGUIERES, le château de Berbiguières apparaît dans les textes dans la seconde moitié du XIIIe siècle. Il est alors la possession de la famille de Castelnau et il est lié avec le château de Castelnaud. En 1273, le château appartient aux fils et aux neveux d'Aymeric de Castelnau qui avait juré hommage à Louis IX en 1240. En 1365, Magne de Castelnau s'est mariée avec Nompar de Caumont et lui apporte les deux castra périgoudins. La châtellenie de Berbiguières comprend les paroisses d'Allas, Berbiguières, Cladeck, Carves, Saint-Germain et Marnac. Le château a été inscrit au titre des M.H. le 6 décembre 1948.","architecture":"BERBIGUIERES la construction du château date du XIIe au XVIIe siècle, édifce de plan en U, trois corps de logis à deux niveaux et lucarnes sur toit à deux pans recouvert de tuiles et pavillons en angles dont un carré. Elevé sur l'emplacement d'une ancienne plate forme,  l'ensemble représente   un polygone est cienturé de remparts à échauguettes qui entoure le château aux dimensions imposantes on y accède par un châtelet autrefois défendu par un pont-levis, percée de baie géminées,  la demeure est formée par  l'assemblage de trois grands corps de bâtiments, des communs et des écuries bâtis au XVIIIe siècle, un logis prend appui sur un donjon  quadrangulaire du XII-XIIIe siècle, le vaste logis du début du XVIIe siècle,  côté nord , il présente une façade austère flanquée de deux pavillons. Côté sud deux ailes en retour, dont l'une se termine par un donjon carré, encadrent la cour intérieure très harmonieuse qui se  prolonge par un jardin et terrasses.  Parc fermé face à la vallée par un mur arcadé.","habitants":"Famille de Castelnau \r\n        \"","divers":"Berbiguières  GPS : 44° 50' 03\" Nord et 1° 02' 29\" Est","gps":"44° 50' 03\" Nord et 1° 02' 29\" Est","images":["../image/image_24/24_Berbigui%c3%a8res_1.jpg","../image/image_24/24_Berbigui%c3%a8res_2.jpg","../image/image_24/24_Berbigui%c3%a8res_3.jpg","../image/image_24/24_Berbigui%c3%a8res_4.jpg","../image/image_24/24_Berbigui%c3%a8res_5.jpg","../image/image_24/24_Berbigui%c3%a8res_6.jpg","../image/image_24/24_Berbigui%c3%a8res_7.jpg","../image/image_24/24_Berbigui%c3%a8res_8.jpg"]},"Consult_chateau_formulairead23":{"id":"Consult_chateau_formulairead23","dept":"24","canton":"Bergerac","commune":"Bergerac","nom":"Bergerac","type":"Château","periode":"XVII","histoire":"LESPINASSAT, Jean Simon de Sorbier de Jaure, sgr de Lespinassat 1728-1797.  Jean Sarrain dit le vicomte de Durfort-Clermont de Durfort-Boissières, sgr de Pile et de  Bergerac à lâge de 34 ans , inhumé le 3 octobre 1775 , officier au régiment de Chartres-cavalerie, fils de Joseph dit le comte de Clermont-Pile de Dufort-Boissières, sgr de Pile et  F Madeleine de Turenne d'Aynac.  il sagit du destin dAnne de Sorbier de Jaure; Fille du seigneur de Lespinassat.\r\nMOUNET-SULLY du XVIe, XVIIIe et XIXe siècle. Il porte le nom de son plus illustre propriétaire, le tragédien bergeracois Jean-Sully Mounet  né à Bergerac en 1841. Entièrement meublé, il présente un théâtre, plafonds, boiseries et cheminées. La partie du XIXe siècle, conçue par Mounet-Sully, porte la patte de lartiste, notamment par la présence du « théâtre », où il aimait travailler quand il résidait à Bergerac. Limmense Sarah Bernhardt y a même séjourné, tout comme le \"gratin\" artistique de cette époque.   La famille de Laurent Peslerbe a acquis le château en 1981                    \r\nPEYRAREDE, au cur historique de Bergerac, le musée du tabac est installé dans la maison Peyrarède. Bien que cet hôtel particulier soit également connue sous le nom de « château Henri IV », la venue du souverain en ce lieu reste hypothétique. Par contre, le Roi Louis XIII qui, dit-on, se plaît à Bergerac, y loge du 13 au 17 juillet 1621. Il est venu pour y apaiser les troubles dus aux guerres de religion.                  MERLES  est un château bâti au XVIIe siècle  à Mouleydier,  Il est devenu un hôtel 4 étoiles, restaurant gastronomique et golf proche de Bergerac. L'ancienne « maison noble des Merles », mentionnée en 1677, a été remplacée par le château ou la  chartreuse , bâti dans la première moitié du XVIIIe siècle. L'édifice fut la propriété du général d'Empire Jean Zacharie Mesclop qui y décèda en 1844.  Le château  se dresse  comme une pièce montée datant du XVIIIe.","architecture":"LESPINASSAT   date des XVIIe, XVIIIe et XIXe siècles. La gentilhommière a remplacé l'ancienne maison forte. Du XVII au XIXe siècle. Façades et toitures du château, y compris celles des deux pavillons d'entrée ; terrasse nord ; fossé entourant l'ensemble, y compris les trois ponts d'accès: construite dans sa majeure partie au XVIIe siècle, elle fut augmentée au XVIIIe d'une galerie, créant en vis à vis du parc, une façade monumentale dont le point fort est un escalier en fer à cheval avec une rampe en fer forgé menant à un avant-corps à fronton. Des pavillons furents construits de chaque côté des entrées Est et Ouest, amorçant ainsi les limites d'une terrasse entourée de douves sèches franchies par un pont. Inscription par arrêté du 22 novembre 1989  PEYRAREDE  en 1950 création du musée par la direction des musées de France. En 1982  installation du musée à la Maison Peyrarède, hôtel du XVIIe siècle, fleuron du patrimoine architectural bergeracois. En 1983 inauguration du nouveau musée doté dun laboratoire de photographie et de restauration ainsi que dun secrétariat administratif. \r\n  MOUNET-SULLY  La première construction date du XVIe siècle. Il sagissait alors dune ferme, comme on en trouvait beaucoup dans les environs. Cest au XVIIIe siècle que la famille Mounet-Sully fait construire une autre aile du château.                                          La Rebière d'Or, maison de maître du XVIIe siècle  chambres d'hôtes. corps de logis rectangulaire à deux niveaux flanqué d'un pavillon carré.","habitants":"Lespinasat; Jean simon de Sorbier de Jaure                                                                                 Jean-Sully Mounet\r\n        \r\n        \"","divers":"A Bergerac le château de Lespinassat grav 2-3-4 GPS : 44° 51' 07\" Nord, 0° 28' 59\" Est                           Mounet-Sully grav 7-8 GPS : 44° 52' 12\" Nord et 0° 27' 25\" Est                                                                      ROC  GPS : 44° 54' 26\" Nord et 1° 07' 05\" Est    Mouleydier Merles grav 5-6.    Péraréde grav 9","gps":"44° 51' 07\" Nord, 0° 28' 59\" Est                           M","images":["../image/image_24/24_Bergerac_1.jpg","../image/image_24/24_Bergerac_2.jpg","../image/image_24/24_Bergerac_3.jpg","../image/image_24/24_Bergerac_4.jpg","../image/image_24/24_Bergerac_5.jpg","../image/image_24/24_Bergerac_6.jpg","../image/image_24/24_Bergerac_7.jpg","../image/image_24/24_Bergerac_8.jpg","../image/image_24/24_Bergerac_9.jpg"]},"Consult_chateau_formulaire39ca":{"id":"Consult_chateau_formulaire39ca","dept":"24","canton":"Mareuil","commune":"Champeaux et la chapelle-Pommier","nom":"Bernardières","type":"Château","periode":"XV-XVII","histoire":"Château des Bernardières du XIIe et XVIIe siècles, inscrit en grande partie (corps de logis central, murs d'enceinte, portail Henri II, tour du XIIIe siècle, donjon et terrasses) au titre des M.H. depuis le 24 juin 1948, puis en totalité le 6 octobre 2016\r\nPUYCHENY du XVe siècle, le territoire Champeaux-et-la-Chapelle-Pommier constitue le fief des Bernardières au XIIIe siècle avant de devenir une châtellenie au XIVe siècle. Le château de  Puycheny est situé à l'est du bourg au milieu des bois, c'est l'ancienne  demeure des Barry, des Fontenay et des Marcillaud de Goursac. \r\nBERNARDIERES, sa construction date du XIIe au XVIIe siècle.  Lédifice juxtapose des parties de lépoque féodale à celles de la fin du XVIIe siècle. Châtellenie dès 1253, ses tours abritent au temps de Louis XII  Antoine dAuthon, dit Barberousse, bey dAlger et amiral de la flotte turque. Cette demeure seigneuriale simprègne de lhistoire locale des maîtres de forges du Haut Périgord puisquon y a fabriqué quantité de munitions pour la marine du roi. Le château des Bernardières, anciennement fortifié, fut la maison d'un maître de forge.   En septembre 1377, Bertrand du Guesclin chasse les  anglais après qu'il y eut mis le feu au château et brûlé les prisonniers. Mais le château fut relevé au XVIIe siècle. Selon la légende, l'un de ses propriétaires, Antoine d'Authon plus connu sous le nom de Khayr-al-Din,  alias \"Barberousse II\", serait devenu un pirate sillonnant la Méditerranée. Après sa conversion à l'Islam, il aurait fini pacha à Alger où il serait mort en 1546. L'auteur de cette légende serait en fait M. Brantôme, dont le grand-père avait acquis le château.","architecture":"BERNARDIERES, plus tard, les comtes d'Aydie  l'agrandissent  et construisent les terrasses. De plan quadrangulaire, ce  mêle des éléments allant du XIIIe au XVIIe siècle. La partie médiévale se compose de tours carrées ou circulaires épaulant des logis dissymétriques. Un donjon ruiné en forme de losange, du XIVe siècle, haut de huit mètres, présente la particularité d'être bâti à même le rocher, sans fondation. La construction du XVIIe siècle est constituée d'un vaste logis, agrémenté d'une terrasse à balustrade classique,  une tour ronde à mâchicoulis défendant la porte et le pont-levis. On peut y admirer des boulets de pierre, un puits de 33 mètres de profondeur, un pont en escalier enjambant la Nizonne ainsi que des jardins à la française. Le château des Bernardières est ouvert au public et se visite. \r\n PUYCHENY, cet ancien repaire noble édifié au XVe siècle est une construction très retouchée. Le corps de logis s'encadre entre des échauguettes et des tours circulaires ; une tour polygonale enferme l'escalier. Créneaux et mâchicoulis datent d'une restauration moderne.","habitants":"Bernardières Famille d'Antoine d'Authon               Puycheny Famille des  Marcillaud de Goursac. \r\n        \r\n        \"","divers":"A Champeaux et la chapelle-Pommier; la Bernardières    grav 1 à5, GPS : 45° 28' 37\" Nord, 0° 33' 53\" Est.                                                                          Puycheny grav 6-7-8.","gps":"45° 28' 37\" Nord, 0° 33' 53\" Est.","images":["../image/image_24/24_Bernardi%c3%a8res_1.jpg","../image/image_24/24_Bernardi%c3%a8res_2.jpg","../image/image_24/24_Bernardi%c3%a8res_3.jpg","../image/image_24/24_Bernardi%c3%a8res_4.jpg","../image/image_24/24_Bernardi%c3%a8res_5.jpg","../image/image_24/24_Bernardi%c3%a8res_6.jpg","../image/image_24/24_Bernardi%c3%a8res_7.jpg","../image/image_24/24_Bernardi%c3%a8res_8.jpg"]},"Consult_chateau_formulairec800":{"id":"Consult_chateau_formulairec800","dept":"24","canton":"Villefranche du Périgord","commune":"Besse","nom":"Besse_Fournels","type":"Château","periode":"XVI","histoire":"BESSE, la construction date de la fin du XVIe au début du XVIIIe siècle. pour Gabriel de Gauléjac, seigneur de Puycalvel et de Besse, chevalier de l'ordre du roi, avant 1560 d'après Jean Secret. Gabriel de Gauléjac avait épousé Gabrielle de Vabres, fille de Michel de Vabres, pour lequel Dominique Bachelier avait reconstruit le château de Castelnau-d'Estrétefonds. Gabriel de Gauléjac a pu racheté la seigneurie de Besse qui avait été aliénée quelques années plus tôt grâce à la dot et une avance sur la succession.  En 1571, un contrat est passé au château neuf de Besse, ce qui laisse à penser qu'il est alors habité par le seigneur du lieu. En 1580 et 1587, des garnisons à la solde du seigneur occupent les travaux.  Gabriel de Gauléjac décèdera en 1588. Son fils, Jean-Marc  se mariera avec Marie de Gironde. Il reçoit, en 1600, une dot  qui lui permetta de reprendre les travaux de rénovation du château de Besse.  A été inscrit aux M.H. en 2012. a six kilomètres au sud à Villefranche en Pérrigord  château de FOURNELS, de la famille Michot « LE FOURNEL » de lépoque renaissance.       A deux kilomètres au nord à Prats du Périgord le château  PRATS du PERIGORD  avec sa tour du XIVe siècle. Dès 1790, la commune de Prats-d'Orliac (devenue Prats-du-Périgord en 1900) a été rattachée au canton d'Orliac qui dépendait du district de Belvès jusqu'en 1795, date de suppression des districts. Lorsque ce canton est supprimé par la loi du 8 pluviôse an IX (28 janvier 1801) portant sur la « réduction du nombre de justices de paix », la commune est rattachée au canton de Villefranche-de-Belvès (devenu canton de Villefranche-du-Périgord en 1893) dépendant de l'arrondissement de Sarlat (devenu l'arrondissement de Sarlat-la-Canéda en 1965).","architecture":"BESSE  a été construit sur une terrasse dominant le bourg et sa belle église. Un quadrilatère de remparts défend l'ensemble; on pénètre dans la cour intérieure par un important châtelet du temps de Louis XIII, autrefois  précédé d'un pont-levis. Ce châtelet, à deux étages, est couronné de mâchicoulis. Il porte aux angles des bossages vermiculés; baies à meneaux et sa porte est d'un bon style, avec pilastres et fronton. La courtine du châtelet s'encadre entre des tours circulaires. Quant au château lui-même, c'est un vaste et haut logis du grand siècle, encadré de pavillons ; ensemble sévère, mais non sans grandeur, grace à la noblesse des proportions et aussi à la qualité de l'appareil, des bossage  d'angle, des cheminées ornées d'épis et du perron accédant au portail plein cintre entre pilastres. L'intérieur recèle de belles voûtes à pénétration.  Gabriel de Gauléjac bâtit la demeure en 1560; endommagée par les guerres de  religion, le château fut restaurée sous Louis XV par les  Clermont-Touchebuf. Les seigneurs et le château de Besse ont façonné et  rythmé lhistoire du village jusquau XVIIIe siècle. Le pavillon d'entrée et les tours rondes sont entrepris avant 1616, par le maçon Jean de Saint-Avit.                                                                                  Le fort de PRATS donjon carré à mâchicxoulis crénelé accolé à un bâtiment à deux niveaux toit à deux pans avec une tourelle carrée toit à quatre pans, l'édifice posséde en prolongement des dépendances de un niveau  avec une tour ronde à l'extrémitée.","habitants":"Famille de Gabriel de Gauléjac                                   Fournels Famille Michot\r\n        \"","divers":"A Besse grav 1 à 4  Coordonnées par GPS : 44° 40' 03\" Nord, 1° 06' 38\" Est.                                              Château de Prats grav 5 à 9.","gps":"44° 40' 03\" Nord, 1° 06' 38\" Est.","images":["../image/image_24/24_Besse_Fournels_1.jpg","../image/image_24/24_Besse_Fournels_2.jpg","../image/image_24/24_Besse_Fournels_3.jpg","../image/image_24/24_Besse_Fournels_4.jpg","../image/image_24/24_Besse_Fournels_5.jpg","../image/image_24/24_Besse_Fournels_6.jpg","../image/image_24/24_Besse_Fournels_7.jpg","../image/image_24/24_Besse_Fournels_8.jpg","../image/image_24/24_Besse_Fournels_9.jpg"]},"Consult_chateau_formulairef687":{"id":"Consult_chateau_formulairef687","dept":"24","canton":"Villambard","commune":"Saint-Jean d","nom":"Beylie","type":"Château","periode":"XVI","histoire":"BEYLIE   en 1247 Preyssac est une châtellenie de Chamberlhiac. En 1347, Adhémar de Neuville, lévêque de Périgueux fit construire  à Château-l'Évêque. En 1364, la paroisse est en partie détruite par les anglais. En 1412, 280 combattants anglais sont sur Château-l'Évêque, brûlent trois maisons, puis prennent et détruisent Pressac. Château-l'Évêque est restauré en 1515 par l'évêque de Périgueux, Gui Ier de Castelnau. Pierre VIII Fournier, évêque de Périgueux, est étranglé par ses domestiques le 14 juillet 1575 dans son château. En 1581, Jean de Montardie, capitaine de larmée catholique part de Preyssac pour reprendre la ville de Périgueux aux protestants. Le 23 septembre 1600, saint Vincent de Paul est ordonné prêtre dans la chapelle du château épiscopal par l'évêque François de Bourdeilles. Fief des Montardit de la Beylie jusqu'en 1713. Cette famille joua un rôle pendant la Fronde. Le fief passa ensuite aux Jehan.   Le château de La Beylie ; une tour et une cheminée sont, dit-on, parties vers le Texas ou le Connecticut. Adieu les souvenirs des Montardit de La Beylie, noble famille dont l'écu ornait la clef d'une croisée d'ogives en l'église de Preyssac. Les Montardit occuperont la propriété jusqu'en 1713, puis le domaine passa à la famille Jehan.","architecture":"BEYLIE, corps de logis de plan en équerre à deux niveaux, tour carrée sur angle intérieur à trois niveaux toit à quatre pans, l'ensemble recouvert de tuiles, l'édifice est accolé d'un bâtiment  de dépendances d'un niveau oblong formant le parc. Le château de la Beylie est à l'état de ruines.","habitants":"Famille de Montardit de la Beylie \r\n        \"","divers":"Saint-Jean d'Estissac, le château de Beylie GPS : 45° 14' 47\" Nord, 0° 41' 11\" Est","gps":"45° 14' 47\" Nord, 0° 41' 11\" Est","images":["../image/image_24/24_Beylie_1.jpg","../image/image_24/24_Beylie_2.jpg","../image/image_24/24_Beylie_3.jpg"]},"Consult_chateau_formulaire4af3":{"id":"Consult_chateau_formulaire4af3","dept":"24","canton":"Sarlat-la-Canèda","commune":"Beynac et Cazenac","nom":"Beynac","type":"Forteresse","periode":"XIII","histoire":"BEYNAC, forteresse féodale du XIIIe siècle, tour à tour anglaise puis française, Beynac fait partie avec Biron, Bourdeille et Mareuil, des quatre baronnies du Périgord et le siège d'une châtellenie s'étendant au XIVe siècle sur neuf paroisses. Vers la plaine, c'est son élévation occidentale, on pense qu'un château primitif à Beynac existait dès le VIIIe siècle lors des invasions arabes. Le premier propriétaire connu est Adhémar de Beynac qui, en 1147, participa à la deuxième croisade. En 1214, le château est rasé par Simon de Montfort. Les Beynac reconstruisent bien vite leur forteresse et demeurent fidèles aux Rois de France. La Dordogne trace une frontière naturelle entre les possessions françaises et le duché de Guyenne, propriété du roi d'Angleterre, à compter du traité d'Abbeville. Beynac fait face à Castelnaud, aux mains de la très puissante famille de Caumont, vassale des Plantagenêts. Les deux lignages se livrent une lutte acharnée pendant la guerre de cent ans. Pons de Beynac  y  met un terme en s'emparant de Castelnaud (1442), c'est la fin de l'occupation anglaise. Lors des guerres de religions Beynac prend parti pour les huguenots, dès 1575. Sous Louis XIII la baronnie devient marquisat et les les Beynac serviront le roi. En 1761, la dernière héritière des seigneurs et barons de Beynac, Marie-Claude, épouse le 10 mars au matin le jeune marquis Christophe de Beaumont. Après huit siècles dhistoire, la lignée des Beynac séteint avec elle en 1811 laissant pour témoignage Beynac et son château. Le château est classé aux M.H. depuis 11 février 1944.","architecture":"Beynac, forteresse féodale du XIIIe siècle, de plan quadrangulaire irrègulier du XIIIe siècle, à droite, c'est un vaste logis percé, au XVIe siècle, de baies à meneaux, agrémenté au sud-ouest d'une tourelle d'angle en encorbellement, tourelle circulaire du XVIIe siècle, à trois étages, sommée d'une coupole de pierre. Au centre c'est un logis à haut pignon avec des baies à meneaux. A gauche un logis très ancien, crénelé, est prolongé vers son angle nord-ouest par une sorte de bastion défensif en forme de proue, fort archaïque, avec des baies géminées, des bretèches, une terrasse crénelée et deux tours d'angle en encorbellement. Derrière cette partie se profile un donjon carré, crénelé, muni de mâchicoulis, d'une tourelle d'angle à poivrière, sa hauteur semble encore exagérée par sa gracilité et son envol. En fait, un deuxième donjon apparaît en arrière plan, accosté d'une tour d'angle carrée démesurément haute. A ces défenses,  il faut ajouter, vers le sud-est, un logis du XIVe siècle, avec des échauguettes circulaires à poivrières, destinées à battre la barbacane, pratiquée dans un rempart solide, crénelé, scandé de tours carrées, lequel se poursuit vers le nord jusqu'à enclore une chapelle, aussi audacieusement juchée sur l'à-pic que le château. A l'intérieur du château, les appartements ont conservé de belles boiseries et des plafonds peints du XVIIe siècle, et de magnifiques cheminées décorées.","habitants":"Famille de Caumont\r\n        \r\n        \"","divers":"Beynac GPS : 44° 50' 25\" Nord et 1° 08' 43\" Est","gps":"44° 50' 25\" Nord et 1° 08' 43\" Est","images":["../image/image_24/24_Beynac_1.jpg","../image/image_24/24_Beynac_2.jpg","../image/image_24/24_Beynac_3.jpg","../image/image_24/24_Beynac_4.jpg","../image/image_24/24_Beynac_5.jpg","../image/image_24/24_Beynac_6.jpg","../image/image_24/24_Beynac_7.jpg","../image/image_24/24_Beynac_8.jpg","../image/image_24/24_Beynac_9.jpg"]},"Consult_chateau_formulairea1d6":{"id":"Consult_chateau_formulairea1d6","dept":"24","canton":"St-Pardoux la Rivière","commune":"Saint-Saud-Lacoussière","nom":"Beynac_st_Saud","type":"Château","periode":"XIV","histoire":"BEYNAC, la  Coussière est le nom dune ancienne châtellenie ayant son siège dans la paroisse de Saint-Saud. Au Xe siècle, la paroisse appartient au comte dAngoulême, elle passe ensuite à la maison de Rochechouart. Avant la Révolution, le domaine était propriété de la famille Faurichon.","architecture":"BEYNAC Ce nest que quand elle est incorporée au canton de Saint-Pardoux-la-Rivière, suite à la Révolution, que la commune de Saint-Saud Lacoussière prend son nom actuel. Le château est situé sur le Palen, affluent de la Queue d'Ane qui irrigait aussi l'abbaye cistercienne de Peyrouse. Rien ne subsiste du Moustier ni de son église à coupoles pourtant à l'ombre du château de Beynac orgueilleux de son faux donjon. On a remonté une partie du cloitre pour supporter une galerie, mais ce n'était qu'un cloitre du XVIIe siècle dont les arcs en anse de panier retombent sur des piles circulaires par l'intermédiaire de chapitaux moulurés, très écrasés.","habitants":"Famille Faurichon\r\n        \"","divers":"Saint-Saud-Lacoussière le château de Beynac Saint-Saud","gps":"","images":["../image/image_24/24_Beynac_St_Saud_1.jpg","../image/image_24/24_Beynac_St_Saud_2.jpg"]},"Consult_chateau_formulairedb48":{"id":"Consult_chateau_formulairedb48","dept":"24","canton":"Saint-Cyprien","commune":"Les Eyzies de Tayac-Sireuil","nom":"Beyssac_Tayac","type":"Château","periode":"XVI","histoire":"A un Km au nord Manaurie le château de Cap del Roc, fin du XIXe siècle. Château de Lortal, XVIIe siècle. Manoir de Roucaudou des XVe et XVIe siècles, inscrit au titre des M.H depuis 1974 pour ses façades et toitures.                                                               BEYSSAC  cité au XIIe siècle des sires de Beynac, les Beynac rejoignent le camp protestant. Seul Jean Guy de Beynac-Tayac reste catholique et conspire contre le roi Henri IV. Découvert en 1605, il est condamné à mort, mais Turenne parvient à le faire gracier. En 1673, Bernard de Commarque, seigneur du lieu, avait été condamné à la roue pour assassinat, la maréchaussée l'assiégea à Beyssac et l'abattit. TAYAC, la plate forme du château fut occupée au temps préhistorique et a livré des gisements d'époques madgalénienne et azilienne. Sous le nom de Roc de Tayac,  En 1595, il subit le siège des croquants révoltés. En 1606, le roi donnal'ordre de le démanteler, sans doute suite à la condamnation de Jean Guy de Beynac, impliqué dans la conspiration du duc de Bouillon. Au XVIIIe siècle,il passa par le mariage dIsabeau de Beynac, à la famille la Borie de Campagne, Isabeau y résida jusquà sa mort. Géraud, son petit-fils désirait réaliser des rénovations de lédifice, mais la Révolution le contraignit àlémigration. En 1798, lessentiel des terres des Eyzies dont le château deveint domaine national. Mis en vente, il fut racheté en 1804 par M.François Lassudrie qui appartenait à une des plus anciennes familles de Tayac, son but en achetant le château dépourvu de son entourage était simple: le démolir. Avant son décès, sa fille Jeanne eut le vieux château en héritage. La cession du château de Tayac fut consentie en 1913 à lÉtat Français représenté par Denis Peyrony, correspondant de la Commission des M.H. afin dabriter Le musée national de Préhistoire","architecture":"BEYSSAC, cité au XIIe siècle construit au XVIe siècle,  donjon carré actuellement musée de la préhistoire. La création officielle de la seigneurie indépendante des  Eyzies date du 14 mai 1622, cest alors que commence le démembrement de celle de Tayac. surplombe le ru d'Allas et montre, entre les rideaux d'yeuses, sur une terrasse à balustrade, une façade du XVIe siècle très retouchée, une tour à mâchicoulis et une échauguette. En conséquence, la demeure fut démantelée. Au pied du château se voient encore des forges qui, aux XVIIe et XVIIIe siècles, fondaient marmites et canons.\r\nTAYAC le château primitif fut élevé aux environs du XIIIe siècle. Tour à tour, français et anglais au cours des guerres de cent ans, il souffrit des sièges successifs et dut être rebâti au XVIe siècle. Le bâtiment est en partie creusé dans le rocher, en partie construit. Ses murs s'élèvent sur un encorbellement de la falaise. Les chambres, lescouloirs et les escaliers sont creusés dans le rocher. L'accès se fait parune porte en plein cintre et à grands claveaux, celle ci donne accès à un passage, partie construite, partie taillé, sous le bâtiment en retour d'équerre de la façade principale et qui barre l'accès de la plateforme.  Parallèle à la falaise, le corps de logis comportait à son angle sud-ouest  une petite tourelle en encorbellement.\r\nA Quelques kilomètres à l'ouest à Le BUGUE château féodal à deux niveaux avec lucarnes  avec tour ronde crénelées toit en poivrières et donjon carrée crénelée, transformée en chambres d'hôtes.","habitants":"Tayac  famille la Borie de Campagne                Bennac   Jean Guy de Beynac-Tayac \r\n        \"","divers":"Les Eyzies de Tayac-Sireuil le château de Tayac grav 1-2   GPS : 44° 56' 10\" Nord et 1° 00' 49\" Est. Lortal grav 1 . Manaurie Roucaudou Cap del Roc  grav  4-5-6- 7-8 GPS : 44° 57' 40\" Nord, 0° 59' 31\" Est.","gps":"44° 56' 10\" Nord et 1° 00' 49\" Est. Lortal grav 1 . Manaurie","images":["../image/image_24/24_Beyssac_Tayac_1.jpg","../image/image_24/24_Beyssac_Tayac_2.jpg","../image/image_24/24_Beyssac_Tayac_3.jpg","../image/image_24/24_Beyssac_Tayac_4.jpg","../image/image_24/24_Beyssac_Tayac_5.jpg","../image/image_24/24_Beyssac_Tayac_6.jpg","../image/image_24/24_Beyssac_Tayac_7.jpg","../image/image_24/24_Beyssac_Tayac_8.jpg"]},"Consult_chateau_formulaire2050":{"id":"Consult_chateau_formulaire2050","dept":"24","canton":"Brantome","commune":"Valeuil","nom":"Biards_Valeuil","type":"Château","periode":"XVIII","histoire":"BIARDS, la construction date du XVIIIe siècle. L'ancienne demeure des Beaupuy de Bascharetie et des Cothet fut sans doute la maison de maître d'un domaine viticole.  Une chapelle abrite une croix avec les armes de la famille de Cothet","architecture":"BIARDS, ce château classique comprend un corps de logis central à un étage carré, flanqué de deux pavillons. La façade orientée au nord donne sur la cour, du côté oriental, des dépendances et, du côté occidental, d'une ancienne métairie du domaine. L'entrée se fait au sud ouest de la cour par une porte charretière complétée d'une porte piétonne, l'accès au corps de logis central s'effectue par le portail au traitement ornemental classique (fronton cintré décor de triglyphes), le bâtiment, couvert d'un toit à deux pans brisés en tuile creuse et plate, est flanqué de deux pavillons rectangulaires, composés d'un étage carré et d'un étage de comble. Les toits en pavillon sont couverts, l'un en tuile plate et l'autre, en tuile creuse pour le terrasson et tuile plate pour le brisis.","habitants":"Famille des Beaupuy de Bascharetie\r\n        \"","divers":"Château de Biards à Valeuil","gps":"","images":["../image/image_24/24_Biards_Valeuil_1.jpg"]},"Consult_chateau_formulaire9e0a":{"id":"Consult_chateau_formulaire9e0a","dept":"24","canton":"Monpazier","commune":"Biron","nom":"Biron","type":"Forteresse","periode":"XII-XV","histoire":"BIRON, date du XIIe, XVe, XVIe et XVIIe siècles. Le propriétaire initial du château Biron était la famille de Gontaut-Biron qui acquit par alliance la baronnie  au XIIe siècle, avant d'être pris par les Albigeois en 1211, par Simon IV de Montfort en 1212, qui exécuta son seigneur, et par les anglais aux XIVe et XVe siècles qui le saccagèrent. L'histoire retient surtout le personnage de Charles de Gontaut-Biron glorieux combattant en Flandre, amiral de France en 1598, il fut érigé en 1598, en duché-pairie. Quatre ans après, Charles de Gontaut, duc de Biron, convaincu d'une nouvelle conspiration contre son roi et son pays et jugé coupable de haute trahison, fut décapité dans la cour de la Bastille, à Paris le 13/07/1602. Son orgueil et son suicidaire entêtement à ne pas reconnaître devant Henri IV son ultime trahison aurait inspiré l'expression populaire \"Con comme Biron\". La famille Gontaut tenait le château de la famille Rudel de Bergerac. Ce château est resté pendant 24 générations au sein de la famille Gontaut-Biron, du XIIe siècle jusqu'en 1938, puis devient la propriété de la famille Copper-Royer.  Le château de Biron est la propriété du conseil départemental de la Dordogne. En 2012, ont commencé des travaux de rénovation de la charpente de l'aile des Maréchaux, prévus pour une durée de deux ans. Le château de Biron est classé aux M.H. depuis 1928 et inscrit aux M.H. depuis 1992.","architecture":"BIRON  En 1214,Simon de Montfort cessera ces troubles en prenant Biron et en y mettant le feu. Le mariage d'Aliénor d'Aquitaine et d'Henri Plantagenet déclenche la guerre de cent ans, durant laquelle le château de Biron subira de multiples assauts, deux de la part des anglais et sera incendié près de cinq fois. Puis les deux frères Gontaut Biron reconstruisent le château, l'agrandissent et le rénovent.  Vers 1715 et 1730, avec le retour de la faveur royale, le gros uvre est terminé et commence la décoration et les aménagements intérieurs. Bâti sur l'emplacement d'une forteresse médiévale du XIe siècle, le château a subi de nombreux dommages, comme en témoigne les différents types d'architecture. En fait, chaque siècle, entre le XIIe et le XVIIIe siècle, a laissé son empreinte sur cette demeure monumentale qui malgré la juxtaposition de bâtiments, offre un ensemble architectural exceptionnel. On peut y admirer le donjon du XIIe siècle, des remparts crénelés et des terrasses du XIIIe et XIVe siècles, la chapelle à double étage du XVIe siècle, de style Renaissance, dans laquelle se trouvent deux tombeaux du XVIe siècle, une cour d'honneur, accessible par un escalier et un couloir voûté d'ogives, un bâtiment seigneurial du XVIe siècle composé de salles ornées de fenêtres Renaissance, une cuisine voûtée, la salle des États dont la charpente carénée a été restaurée au XXe siècle. Encore aujourd'hui, au XXIe siècle, une messe anniversaire est dite chaque année à Biron pour le repos de son âme.","habitants":"Famille de Gontaut-Biron\r\n        \"","divers":"Forteresse de Biron  GPS : 44° 37' 55,32\" Nord et 0° 52' 19,57\" Est","gps":"44° 37' 55,32\" Nord et 0° 52' 19,57\" Est","images":["../image/image_24/24_Biron_1.jpg","../image/image_24/24_Biron_2.jpg","../image/image_24/24_Biron_3.jpg","../image/image_24/24_Biron_4.jpg","../image/image_24/24_Biron_5.jpg","../image/image_24/24_Biron_6.jpg"]},"Consult_chateau_formulaire711f":{"id":"Consult_chateau_formulaire711f","dept":"24","canton":"Saint-Aulaye","commune":"Ponteyraud","nom":"Blérétie","type":"Château","periode":"XIX","histoire":"BLERETIE, la paroisse de Ponteyraud développe ses activités à partir du Moyen Âge. Elle fait alors partie de larchiprêtré de la Double qui est le siège dun prieuré bénédictin fondé par labbaye de Ligueux. De cette époque, la commune conserve une église romane classée M.H..  La commune abrite également le château de la Blérétie du XVIIe siècle.","architecture":"BLERETIE, du XVIIe siècle. Il ne reste presque rien du château initial dont le cadastre napoléonien figure le plan avec tours, cour, dépendances et un moulin alimenté par les eaux de la Rizonne. L'édifice actuel est une réalisation de la fin du XIXe siècle. Le bâtiment est composé d'un corps central jouxté de deux pavillons latéraux formant saillie. Des échauguettes décoratives coiffées d'un toit conique s'inscrivent dans les angles formés entre le corps central et les pavillons. Face aux écuries, un bâtiment abrite une turbine qui produisait de l'électricité.","habitants":"Seigneur locaux\r\n        \"","divers":"Château de Blérétie à Ponteyraud","gps":"","images":["../image/image_24/24_Bl%c3%a9r%c3%a9tie_1.jpg","../image/image_24/24_Bl%c3%a9r%c3%a9tie_2.jpg","../image/image_24/24_Bl%c3%a9r%c3%a9tie_3.jpg"]},"Consult_chateau_formulaire67f0":{"id":"Consult_chateau_formulaire67f0","dept":"24","canton":"Thenon","commune":"Boissière d","nom":"Boissière_Ans","type":"Château","periode":"XV","histoire":"Le château d'Ans pas d'information historique.  Le château des Brouillets, \r\nA cinq kilomètres au nord Est  à ste-Eulalie  d'Ans le château de Belsis dont la construction  date du XVIIIe siècle.  et à deux kilomètres à l'ouest à Cubjac le château de Brouillets.\r\nChâteau de la Barge chambres d'hôtes à Cubjac                                                       BROUILLETS  Sa construction date du XVe siècle. Il appartenait à Jeanne d'Albret, la mère du roi Henri IV, était la propriété des vicomtes de Limoges, qui s'étendait au XIVe siècle sur 18 paroisses. Aujourd'hui encore, on aperçoit les mâchicoulis et le chemin de ronde.","architecture":"BOISSIERE, le château touchait la forge d'Ans (construction des canons pour le compte de l'état sous l'ancien régime). Siège d'une ancienne châtellenie relevant du vicomte de Limoges. Au début du XVIe Siècle, le château est signalé en bon état. La forge d'Ans:  Le terrain où elle se trouve fut acheté au roi Henry IV par le seigneur de Marqueyssac en 1603, l'acte de vente précise: ce qui restait à vendre de la chatellenie d'Ans, soit le château et bourg du dit lieu et le surplus de la paroisse de La Boissière où ils étaient situés. Pendant plus d'un siècle, les hauts fourneaux \"avalerons\" des milliers de m3 de charbon de bois et mettrons à nu les collines de l'Auvézère. L'apogée de la production se situe après la Révolution ( en 1790, 390 canons sortent de la forge pour armer les frégates des révolutionnaires dans les ports de Bordeaux et Rochefort.                                          BROUILLETS, c orps de logis en forme de T prolongé sur l'arrière par des construction de deux niveaux, sur l'édifice dominant on y voit fort bien les mâchicoulis et le chemin de ronde.","habitants":"Jeanne d'Albret\r\n        \"","divers":"Plusieurs châteaux à Boissière GPS : 45° 14' 49\" Nord, 1° 01' 06\" Est.  Barge grav 1-2-3                        Brouillets grav 6  : 45° 13' 45\" Nord, 0° 58' 36\" Est. Belsis grav-4. Cubjac grav-5.","gps":"45° 14' 49\" Nord, 1° 01' 06\" Est.  Barge grav 1-2-3","images":["../image/image_24/24_Boissi%c3%a8re_Ans_1.jpg","../image/image_24/24_Boissi%c3%a8re_Ans_2.jpg","../image/image_24/24_Boissi%c3%a8re_Ans_3.jpg","../image/image_24/24_Boissi%c3%a8re_Ans_4.jpg","../image/image_24/24_Boissi%c3%a8re_Ans_5.jpg","../image/image_24/24_Boissi%c3%a8re_Ans_6.jpg"]},"Consult_chateau_formulairecac8":{"id":"Consult_chateau_formulairecac8","dept":"24","canton":"Champagnac de Belair","commune":"Champagnac de Belair","nom":"Borie_Saulnier","type":"Château","periode":"XIV-XVII","histoire":"BORIE-Saulnier Jean Jules Sarlande (ou Albert Sarlande) (1813 - 1888), maire d'Alger de 1858 à 1870, a acheté le château de la Borie Saulnier. Il est décédé dans son château le 1er décembre 1888.  Son fils, François Albert Sarlande (1847 - 1913), député de la Dordogne de 1876 à 1881, est décédé dans sa propriété du château de la Borie Saulnier le 30 août 1913.\r\nLes propriétaires vous recevront en amis dans cet ancien repaire noble du XIVe et XVIIe siècle, au coeur du Périgord Vert, La Borie fut longtemps le principal manoir de la Henri III lui accorda, en 1578, quatre mille écus, à prendre sur la recette générale de Guienne. Finalement, la famille dArnault préféra vendre sa terre à la famille Saulnier, qui avait acquis une grande fortune dans le commerce du sel et possédait déjà de nombreux fiefs dans la région. Guy Saulnier, marié à Peyronne de Saint-Aulaire releva le vieux repaire de ses ruines. La Borie-Saulnier, les Saulnier de la Borie sunirent aux dAydie, aux La Marthonnie, aux Lafaye de Chardeuil, aux dHautefort  de Marqueyssac et de Rouffignac, aux Ranconnet,  aux Brosse, aux Montalembert. La fille de Mme de Montalembert épousa le marquis de Taillefer, dont la famille tirait son nom dun célèbre exploit guerrier. En 1873, le marquis vendit le château à M. Sarlande, député de Nontron. Napoléon III, qui devait nommer un Sarlande au poste de premier préfet dAlger, fut reçu au château.","architecture":"BORIE-SAULNIER appelé aussi château de Laborie, date des XVIe et XVIIe siècles, enceinte  carrée entourantun logis flanquéd'un donjon, cette demeure du XIIIe siècle, qui fut jadis témoin de guerres de religion, de plan rectangulaire avec un corps de logis en équerre à trois niveaux toitures à deux pans avec échauguettes sur côté parc et sur cour en angle une tour hexagonale à cinq niveaux à toit pointu à quatre pans  et tour carré sur l' autre angle, l'édifice sur soubassement entouré de douves  est fermé par des bâtiments formant la cour et en façade  sur les deux angles tours rondes à deux niveaux couronné de mâchicoulis et chemin de ronde crénelés reliant la tour voisine identique toit en poivrières.","habitants":"Claude et Michel Duseau\r\n        \"","divers":"Champagnac de Belair , le château de Borie-Saulnier GPS : 45° 23' 36\" Nord, 0° 41' 59\" Est","gps":"45° 23' 36\" Nord, 0° 41' 59\" Est","images":["../image/image_24/24_Borie_Saulnier_1.jpg","../image/image_24/24_Borie_Saulnier_2.jpg","../image/image_24/24_Borie_Saulnier_3.jpg","../image/image_24/24_Borie_Saulnier_4.jpg","../image/image_24/24_Borie_Saulnier_5.jpg","../image/image_24/24_Borie_Saulnier_6.jpg"]},"Consult_chateau_formulairefc1a":{"id":"Consult_chateau_formulairefc1a","dept":"24","canton":"Savignac les Eglises","commune":"Saint-Vincent sur l","nom":"Bosvieux","type":"Château","periode":"XX","histoire":"BOSVIEUX, refait en style néorenaissance après un incendie au début du XXe siècle. Elle fut, voici plus de cent ans, dit-on, la demeure d'un faux monnayeur.  Un plan rapproché du château Bosvieux qui appartiendrait à la branche française de la famille Wolf, propriétaire de la marque d'outils de jardinage  implantée en Alsace.","architecture":"Le village de Saint-Vincent-sur-l'Isle, architecture d'une demeure bourgeoise à un seul étage vous surprendra peut-être. Le chien-assis au-dessus de la porte d'entrée est de toute beauté. L'édifice de plan rectangulaire à deux niveaux avec  lucarnes sur les combles recouvert de tuiles, flanqué  de tour rondes à mâchicoulis aux angles dont celle de droite non couverte  et un donjon sur l'arrière.","habitants":"Famille Wolf\r\n        \"","divers":"Bosvieux GPS : 45° 14' 41\" Nord, 0° 53' 45\" Est","gps":"45° 14' 41\" Nord, 0° 53' 45\" Est","images":["../image/image_24/24_Bosvieux_1.jpg","../image/image_24/24_Bosvieux_2.jpg","../image/image_24/24_Bosvieux_3.jpg","../image/image_24/24_Bosvieux_4.jpg","../image/image_24/24_Bosvieux_5.jpg"]},"Consult_chateau_formulaire6413":{"id":"Consult_chateau_formulaire6413","dept":"24","canton":"Issigeac","commune":"Bouniagues","nom":"Bouniagues","type":"Château","periode":"XV","histoire":"BOUNIAGUES  De la fin du XVe siècle et jusqu'après le XVIIe siècle, les seigneurs du château (Charles, Pierre, Isaac, Louis puis Jean de Solminihac) étaient une branche de la maison de Solminihac (dont le plus ancien de la lignée connu aux Archives nationales fut Mathieu de Solminihac (1165-1195). Au début du XVIIIe siècle, à la suite du mariage le 17 août 1701 d'une demoiselle de Solminihac (Marie-Charlotte, fille de Jean de Solminihac) avec Pierre de Saint-Ours, seigneur de Clermont, écuyer, capitaine de dragons au régiment de Saint-Sarlin, le château passa aux mains de la famille de Saint-Ours. Cette union donna naissance à trois enfants, dont Henri de Saint-Ours en 1703. En 1732, Henri (seigneur de Morin) épousa Marie de Cosson de La Suderie, née en 1716 ; ils eurent un fils en 1738, prénommé Pierre. En 1793, ce même Pierre , chevalier de Saint-Louis, seigneur de Bouniagues, la Baume, la Jaubertie, capitaine au régiment de Beauce, est trahi par un de ses domestiques. Après le pillage du château, les sbires du tribunal révolutionnaire de Bergerac le mettent avant le jour sur une charrette avec Anne de Sirvain, sa femme, et leurs huit enfants. Ils étaient déjà près de Bergerac quand accoururent les paysans de Bouniagues, armés de fusils, de piques et de faux qui les délivrèrent à l'approche du bourg de la Madeleine. Après avoir mis en fuite les agents de la Révolution, ils ramenèrent au château de Bouniagues toute la famille de Saint-Ours qu'on n'osa plus inquiéter. Pierre de Saint-Ours décéda en 1806 à l'âge de soixante-huit ans. En 1875, le maire de Bouniagues, Martial Delpit de Castang, acheta le château et en rétrocéda une moitié (la partie ouest), à la commune de Bouniagues, qui y installa le presbytère.","architecture":"BOUNIAGUES, la bâtisse dite « La Baume », est datée du XVe siècle (1489). De plan rectangulaire, elle comprend des fenêtres Renaissance, avec des croisées à meneaux. La tour polygonale. attenante au château sur la façade sud rappelle la vocation défensive de l'édifice.  Cette tour abrite un escalier à vis en pierres, auquel on accède par la porte d'origine, inscrite au titre des M.H. par arrêté du 27 janvier 1948 ; au-dessus de cette porte est sculpté un blason  représentant deux corps de lions aux têtes de créatures difficilement identifiables, il a été émis l'hypothèse qu'il s'agirait de deux têtes d'ours.  Ce blason fait écho aux armes reproduites sur le linteau de la porte intérieure, menant à la salle du quatrième niveau. Sur les façades sud et nord, l'édifice est percé de fenêtres de style Renaissance, surmontées d'arcatures. Les cheminées présentes à l'intérieur datent du XIVe siècle. \r\nLe château possédait à l'origine un niveau supérieur, avant d'être abaissé d'un étage. Il reste encore quelques marques de ce niveau aujourd'hui disparu. Aux angles se trouvent les vestiges des deux tours en encorbellement découronnées. C'est sur cette même partie ouest que le château a abrité un presbytère à partir du XIXe siècle. La partie centrale comprend la tour d'escalier polygonale avec un porche en arc brisé rappelant, par sa forme très particulière, le porche de Lanquais. Hormis ces deux sites, il n'existe pas d'autre porche semblable dans le Périgord. Il s'agirait de luvre du même artiste.","habitants":"Famille de Saint-Ours\r\n        \r\n        \r\n        \"","divers":"Bourniagues GPS : 44° 45' 32,47\" Nord, 0° 31' 38,5\" Est","gps":"44° 45' 32,47\" Nord, 0° 31' 38,5\" Est","images":["../image/image_24/24_Bouniagues_1.jpg","../image/image_24/24_Bouniagues_2.jpg","../image/image_24/24_Bouniagues_3.jpg"]},"Consult_chateau_formulaire81a4":{"id":"Consult_chateau_formulaire81a4","dept":"24","canton":"Verteillac","commune":"Cherval","nom":"Bourbet","type":"Château","periode":"XVII","histoire":"BOURBET, dans le Périgord Vert, dans un ancien fort des Templiers rénové, les propriétaires vous proposent un accueil aussi chaleureux qu'individuel. Aujourdhui chambre d'hôtes de monsieur Wilson Albert.  En effet, le château du Bourbet servait de Kommandantur, car la ligne de démarcation passait entre Cherval et Gout qui était en zone libre. Hélie de Lageard, seigneur du Bourbet qui naquit en 1458, fut avocat général de la comtesse d'Angoulême. Il fut député vers le roi Louis XII, pour le prier de donner sa fille Claude en mariage au comte d'Angoulême (devenu plus tard François Ier), et il signa leur contrat de mariage en 1514. En 1554, Laurent de Lageard, seigneur du Bourbet, fut pourvu de l'office de sénéchal d'Angoumois. Cet office passa de père en fils jusqu'en 1789. Récemment restauré, le château du Bourbet vous propose depuis de belles chambres d'Hôtes.","architecture":"BOURBET, la contruction date du XVIIe et XIXe siècles. Les seigneurs de Bourbet étaient à l'origine de ce château, composé alors d'un corps de logis ceint de deux tours fortifiées, ainsi que de deux pavillons en retour d'équerre. Ce château était protégé par un fossé, nivelé durant la Révolution française, période qui a également emporté les derniers vestiges du pont-levis, ainsi que l'ancienne prison qui jouxtait les caves. Le pavillon Nord a été détruit pendant la seconde guerre mondiale, ainsi que les tours carrées qui cantonnaient le corps de logis, déjà en partie rasées pendant la Révolution.","habitants":"Famille de Lageard\r\n        \"","divers":"Bourbet GPS : 45° 24' 09\" Nord, 0° 21' 43\" Est","gps":"45° 24' 09\" Nord, 0° 21' 43\" Est","images":["../image/image_24/24_Bourbet_1.jpg","../image/image_24/24_Bourbet_2.jpg","../image/image_24/24_Bourbet_3.jpg","../image/image_24/24_Bourbet_4.jpg"]},"Consult_chateau_formulaire014d":{"id":"Consult_chateau_formulaire014d","dept":"24","canton":"Brantôme","commune":"Bourdeilles","nom":"Bourdeilles","type":"Château","periode":"XIII-XVI-XVIII","histoire":"Bourdeilles classés M.H.  médiéval  du XIIIe siècle, et le château dit Pavillon Renaissance, XVe siècle.  Des Francilloux, ancienne demeure des familles de Meyjounissas et Boissat de Mazerat, XIXe siècle. De Mazerat .   Étourneau, XIIIe au XVIe siècles. Maison du Sénéchal, XVe au XVIIe siècle, inscrite aux M.H. pour certains de ses châteaux voir article suivant.\r\n BOURDEILLES de 1183. Sous le règne de Philippe II Auguste (1180-1223). en 1273 : Edouard Ier d'Angleterre investit la place, après 1283 : Géraud de Maulmont fait édifier le \" châteauneuf \". En 1307 : Philippe le Bel l'agrandit  En  1369 : Le Prince Noir s'en empare . En 1377 : Du Guesclin le reprend aux Anglais. En 1481 : François de Bourdeilles  le rachète. De lautre, on découvre un logis Renaissance dont la construction a été commandée par Jacquette de Montbron, une des dames de Catherine de Médicis, belle-sur du célèbre écrivain et historien Pierre de Bourdeilles dit Brantôme (1537-1614). Née en 1542, Jacquette épouse André de Bourdeilles, le frère de Pierre, en 1558. Devenue veuve à lâge de 37 ou 38 ans, elle ne baissera jamais les bras. En 1589 : Jacquette de Montbron fait construire le château Renaissance. Après la guerre de cent ans, le roi de France restitua le château à la famille Bourdeilles qui y resta jusqu'en 1699. Il fut ensuite occupé par le ministre des Finances de Louis XV, Henri Bertin. En 1824, il fut racheté par un membre du vieux lignage des Bourdeilles, et en 1962, M. de Bossu-Walcourt, leur héritier, l'offrit au département de la Dordogne.","architecture":"BOURDEILLES, le donjon octogonal est   l'un des plus remarquables du Périgord. Son logis, bien que moins fastueux que celui de Châlucet, démontre la qualité des constructions de Géraud de Maulmont. Les mâchicoulis en arc plein cintre sur consoles ornant le donjon et les angles de l'enceinte de Philippe IV le Bel, sont sans doute les premiers construits dans un édifice royal. Son architecture particulière, séparée en deux parties bien distinctes, a toujours intrigué. Dun côté, il présente une forteresse médiévale, dominée par un donjon haut de 32 mètres. Car au fil des siècles, écartelé entre les couronnes de France et dAngleterre, ce château  dont la partie féodale a été érigée à la fin du XIIIe siècle, a traversé bien des tempêtes politiques et religieuses.  Cest Jacquette de Montbron qui entreprend, sans laide daucun architecte  la construction de ce logis Renaissance.","habitants":"Famille de Géraud de Maulmont\r\n        \"","divers":"Etourneau-Francilhoux  GPS : 45° 19' 22\" Nord, 0° 35' 16\" Est                                                                             Bourdeilles  GPS : 45° 19' 20\" Nord et 0° 35' 12\" Est","gps":"45° 19' 22\" Nord, 0° 35' 16\" Est","images":["../image/image_24/24_Bourdeilles_1.jpg","../image/image_24/24_Bourdeilles_2.jpg","../image/image_24/24_Bourdeilles_3.jpg","../image/image_24/24_Bourdeilles_4.jpg","../image/image_24/24_Bourdeilles_5.jpg","../image/image_24/24_Bourdeilles_6.jpg","../image/image_24/24_Bourdeilles_7.jpg"]},"Consult_chateau_formulaire9472":{"id":"Consult_chateau_formulaire9472","dept":"24","canton":"Brantôme","commune":"Bourdeilles","nom":"Bourdeilles_Chateau","type":"Château","periode":"XVI-XVII","histoire":"ETOURNEAU,  bâti à Bourdeilles, la construction du château Etourneau  date du XIII-XVIe siècle.           VALADE, la construction du château de la Valade date du XVIIe au XVIIIe siècle. De l'extérieur, on aperçoit son pigeonnier. Il domine de 20 mètres environ le vallon du ruisseau de la Valade, affluent de la Donzelle et sous-affluent de la Dronne. Il fut au XVe siècle, un repaire noble. Le château actuel servit de lycée agricole durant la seconde moitié du XIXe siècle. Le château de la Valade fut érigé au XVIIIe siècle sur une base plus ancienne. Il appartenait aux Gentil, aux Cruveiller et aux Lentilhac. Situé sur un plateau dominant la vallée de la Valade, il  fut un repaire noble à la fin du XVe siècle. Il fut agrandi en 1760. Le domaine possédait alors 600 hectares de terres. Il fut rattaché à la commune de Bourdeilles à la Révolution. C'est lors de ces événements que le château fut vendu par Henri-Antoine Gentil de la Valade à Germain-François Dufaure de Rochefort. Un lycée agricole y fut établi entre 1851 et 1884.                                                Maison du SENECHAL, ce manoir fut construit au XVe siècle et était le siège des Sénéchaux de la Baronnie de Bourdeilles.                                                            PLusieurs châteaux au nord ouest de Bourdeille à Paussac et Vivien   Manoir de Paussac, XVe ou XVIe siècle, transformé en maison ; une gargouille marque son angle ouest.\r\nChâteau de Peignefort (ou manoir de Peignefort), XIXe siècle.\r\nManoir du Prezat, XVIe siècle.","architecture":"ETOURNEAU   date du XVII siècle de plan en équerre à trois niveaux   toit en croupe recouvert de tuiles accolé en prolongement aux dépendances.            Maison du SENECHAL, ce manoir fut construit au XVe siècle.  Ce premier bâtiment comportait en outre la tour polygonale et sa tourelle en encorbellement à l'angle nord-ouest. Il a subi des remaniements et des ajouts aux XVI et XVIIe siècles, dont les 2 pavillons encadrant la cour intérieure de l'entrée, rue de l'Eglise. Le corps de logis carré donnant sur la Dronne date également du XVIIe mais sa tourelle ronde est du XIXe siècle. Sur la façade nord, qui domine la vallée au dessus des talus, le logis initial est prolongé par une terrasse avec balustrade.                                            VALADE  Repaire noble au XVe siècle, le château actuel des XVIIe et XVIIIe siècles l se compose d'un logis flanqué au nord-ouest et au sud-est par deux tours. Un pigeonnier est également présent au sud-est.","habitants":"Famille d'Henri-Antoine Gentil de la Valade \r\n        \"","divers":"Plusieur châteaux à Bourdeilles; Etourneau grav-1, Faurie grav-2, Francilloux grav-3, Fonseigner grav-4, sénéchal grav-6, Valade  GPS : 45° 17' 29\" Nord, 0° 34' 19,5\" Est, et paussac grav 7.","gps":"45° 17' 29\" Nord, 0° 34' 19,5\" Est, et paussac grav 7.","images":["../image/image_24/24_Bourdeilles_Chateau_1.jpg","../image/image_24/24_Bourdeilles_Chateau_2.jpg","../image/image_24/24_Bourdeilles_Chateau_3.jpg","../image/image_24/24_Bourdeilles_Chateau_4.jpg","../image/image_24/24_Bourdeilles_Chateau_5.jpg","../image/image_24/24_Bourdeilles_Chateau_6.jpg","../image/image_24/24_Bourdeilles_Chateau_7.jpg"]},"Consult_chateau_formulairedb5f":{"id":"Consult_chateau_formulairedb5f","dept":"24","canton":"Riberac","commune":"Vauxains","nom":"Brangelie","type":"Château","periode":"XV-XVIII","histoire":"BRANGELIE,  sur une base fortifiée de la fin du XVe siècle ont été rajoutés aux XVIIIe et XIXe siècles. Lors de la Révolution française, en 1793, le seigneur de la Brangelie, marquis de Vanxains, fut séquestré puis étranglé dans les caves du château.","architecture":"BRANGELIE La construction date du XVe et XVIIIe siècle. Sur une base fortifiée de la fin du XVe siècle ont été rajoutés aux XVIIIe et XIXe siècles deux logis et des dépendances.. Le château de la Brangelie corps de logis en équerre à trois niveaux avec lucarnes sur comble toit en croupes recouvert de tuiles, accolé d'une avancée centrale reliant l'entrée formé de deux tours carrées et dépendances d'un niveau en retour d'équerre. Le château de la Brangelie n'est pas inscrit aux M.H.","habitants":"Marquis de Vanxains\r\n        \"","divers":"A Vauxains le château de Brangelie GPS : 45° 13' 17\" nord, 0° 17' 03\" Est","gps":"45° 13' 17\" nord, 0° 17' 03\" Est","images":["../image/image_24/24_Brangelie_1.jpg","../image/image_24/24_Brangelie_2.jpg","../image/image_24/24_Brangelie_3.jpg","../image/image_24/24_Brangelie_4.jpg"]},"Consult_chateau_formulairefec8":{"id":"Consult_chateau_formulairefec8","dept":"24","canton":"Brantôme","commune":"Brantôme","nom":"Brantome_2","type":"Château","periode":"XV-XVI","histoire":"A Brantôme , le château  de Balan, de la Hièrce, de Puymarteau, de la Cote et de Roches des Thermes et du Chatenet pa d'informations historique pour ces trois derniers.                                                                          BALANS, le  château des Balans est l'ancien fief des Durand-Ruez. Cette demeure, aujourd'hui occupée par une maison de convalescence, évoque les Durand Ruel qui accumulèrent autrefois nombre de toiles impressionnistes\r\n la HIERCE ou Castel de la Hierce du XVIe siècle, classé M.H.depuis 1892,  Ce petit château Renaissance a été construit vers 1530 par les Flamenc de la Hierce. Actuellement il est la propriété des Dumoulin de la Plante.                                         PUYMARTEAU, manoir du XVIe siècle a sans doute été construit par la famille des Chevalier, sur les bases d'un édifice plus ancien, habité alors par Jean Chevalier, damoiseau de Puymarteau en 1463. Cette famille restera propriétaire du domaine jusqu'à la fin du XVI siècle. De cette époque, au fil des siècles, ses différents propriétaires se chargèrent de lembellir, mais il conserve de nombreux éléments architecturaux dorigine.\r\nROCHES, THERMES, CHATENET des XVIIe et XVIIIe siècles, pas d'information historique mis à part châtenet aujourd'hui hôtel.\r\nla COTE est un château bâti à Biras-Bourdeilles-Brantôme, Jean Marie du Lau d'Allemans, né le 30 octobre 1738 au château de la Côte à Biras, fut assassiné le 2 septembre 1792 à Paris, aux Carmes. Il devint archevêque dArles (du 1er octobre 1775 -1790). Il est considéré comme bienheureux et martyr par léglise catholique. Le château de la Côte a été reconverti en un superbe hôtel-restaurant 3 Etoiles.","architecture":"BALANS, le château des Balans, situé sur la communede Brantôme, est l'ancien fief des Durand-Ruez. Cette demeure, aujourd'huioccupée par une maison de convalescence, évoque les Durand Ruel quiaccumulèrent autrefois nombre de toiles impressionnistes. Brantôme, \"Venisedu Périgord\", est située entre deux bras de la Dronne, ville-porte du ParcNaturel Régional Périgord-Limousin, est célèbre pour son patrimoinehistorique ; on peut admirer son abbaye édifiée du XIe siècle jusquau XIIIesiècle, l'ancienne tour du château abbatial, le pavillon Renaissance, \r\n La HIERCE  ce petit château Renaissance a été construit vers 1530 . Le corps de logis central se termine par une échauguette à l'ouest et prolongé à l'est par une loggia formant terrasse, bordée par une balustre. Celle-ci se termine par une tour circulaire, jouxtée au sud par un oratoire couvert de pierres plates. En saillie au milieu de la façade nord, se dresse une imposante tour carrée aux nombreuses ouvertures, abritant un escalier.\r\nCHATENET  est un manoir bâti à Brantome  date du XVIIe et XVIIIe siècles. On accède  du côté Ouest par un porche-pigeonnier qui ouvre sur une cour où se trouve un logis, côté Nord. A l'Est, un deuxième logis longe une galerie à arcades.  Exploitant un vignoble, devenue, aujourd'hui, une hôtellerie de luxe.\r\nPUYMARTEAU, avec son pigeonnier, XVIe et XVIIe siècles, inscrit en 1981,  construit au XVIe siècle sur les bases dune ancienne maison forte du XIVe siècle, le château de Puymarteau, manoir du XVIe siècle.","habitants":"Puymarteau  famille des Chevalier                              La Cote Jean Marie du Lau d'Alleman\r\n        \"","divers":"Plusieur château à Brantomme Brantome GPS : 45° 21' 51\" Nord ET 0° 38' 48\" Est . Balangrav-1 chatenay grav-2. Hierce grav de 3 à 5 .Roches grav 6.   Puymarteau GPS : 45° 21' 56\" Nord et 0° 39' 34\" Est grav 7-8 et des Thermes grav-9","gps":"45° 21' 51\" Nord ET 0° 38' 48\" Est . Balangrav-1 chatenay gr","images":["../image/image_24/24_Brantome_2_1.jpg","../image/image_24/24_Brantome_2_2.jpg","../image/image_24/24_Brantome_2_3.jpg","../image/image_24/24_Brantome_2_4.jpg","../image/image_24/24_Brantome_2_5.jpg","../image/image_24/24_Brantome_2_6.jpg","../image/image_24/24_Brantome_2_7.jpg","../image/image_24/24_Brantome_2_8.jpg","../image/image_24/24_Brantome_2_9.jpg"]},"Consult_chateau_formulaire11e6":{"id":"Consult_chateau_formulaire11e6","dept":"24","canton":"Lalinde","commune":"Mauzac et Grand Castang","nom":"Brantome_Abbaye","type":"Abbaye","periode":"XVI","histoire":"BRANTOME, en 1501, lélection abbatiale créa la division avec la nomination de deux abbés. La crise, qui dura trois ans, se termina par la cession de labbatiat au cardinal dAlbret,  en 1538, Pierre de Mareuil, évêque de Lavaur, fut reconnu comme abbé et sefforça de rétablir la vie monastique et la paix dans son abbaye. Il rattacha Brantôme à la congrégation de Chezal-Benoît. Lincorporation fut complète en 1559 et cinq ans plus tard la communauté comptait 37 religieux.  Même dans cette congrégation, labbaye conserva ses abbés commendataires. Le plus illustre dentre eux fut Pierre de Bourdeille, le mémorialiste connu sous le nom de Brantôme (abbé de 1558 à 1614). Son abbatiat sauva labbaye pendant les guerres de religion. Par deux fois les réformés vinrent au monastère qui leur ouvrit ses portes. Les réformés respectèrent labbaye, qui était alors riche et prospère. En 1636 la congrégation de Chezal-Benoît sunit à la congrégation de Saint-Maur. Lors de lédit de 1768, Brantôme ne comptait plus que huit religieux.","architecture":"Brantôme,est une ancienne abbaye bénédictine fondée en 769 par Charlemagne dans le diocèse de Périgueux, château abbatial  a été classée «M.H.» dès 1840, le pavillon dit du « corps de garde » ou « pavillon Renaissance » et la tour ronde dépendant de l'ancienne abbaye l'ont été par arrêté du 2 mars 1891, le pont coudé et trois reposoirs datant de la Renaissance, situés dans l'ancienne abbaye le furent par arrêté du 13 janvier 1912, le cloître du XIVe siècle, les salles du rez-de-chaussée donnant sur le cloître, les façades et toitures, charpentes et escalier intérieur du bâtiment monastique du XVIIe siècle ne furent classés qu'en 1957.  Elle fut supprimée à la Révolution. De nos jours, subsistent léglise abbatiale du XIe-XIIIe siècles, une partie du cloître du XIVe et les bâtiments conventuels du XVIIIe, qui abritent deux musées municipaux ainsi que l'hôtel de ville de Brantôme. La tour ronde du palais abbatial était un élément de la défense sud de l'abbaye. Elle était reliée au pavillon Renaissance par une porte surmontée d'un chemin de ronde, et une muraille à l'ouest rejoignait la falaise. Bien que défensive, elle arbore avec coquetterie 3 mansardes Renaissance. Brantôme fut parmi les premiers à accepter cette incorporation. À cette date labbaye se trouvait dans une situation moralement et matériellement déplorable. Les mauristes restaurèrent ou reconstruisirent les bâtiments.","habitants":"Famille des Durand Ruel \r\n        \r\n        \"","divers":"Patrimoine de Brantomes Balans GPS : 45° 21' 51\" Nord et 0° 38' 48\" Est","gps":"45° 21' 51\" Nord et 0° 38' 48\" Est","images":["../image/image_24/24_Brantome_Abbaye_1.jpg","../image/image_24/24_Brantome_Abbaye_2.jpg","../image/image_24/24_Brantome_Abbaye_3.jpg","../image/image_24/24_Brantome_Abbaye_4.jpg","../image/image_24/24_Brantome_Abbaye_5.jpg","../image/image_24/24_Brantome_Abbaye_6.jpg"]},"Consult_chateau_formulaire3cca":{"id":"Consult_chateau_formulaire3cca","dept":"24","canton":"Belvés","commune":"Grives","nom":"Breuil_Grives","type":"Château","periode":"XVII","histoire":"BREUIL, du XVIIe siècle, chartreuse ayant appartenu au capitoul de Toulouse et maintenant propriété de la famille de Larouzière. La famille Delfau est originaire de Daglan. Ils semblent avoir acquis la terre sur laquelle est construite la chartreuse dans le deuxième quart du XVIIIe siècle,  a  été construite par Pierre-Jacques Delfau, sieur de Las Carbonières. Il s'est marié avec Catherine Maurice en 1727. C'est son fils aîné qui a porté le premier le nom de Delfau du Breuil. Guillaume Delfau, sieur du Breuil, écuyer, né en 1730, avocat puis gendarme de la garde. Il a été anobli par le capitoulat de Toulouse en 1771. Il a pris part aux assemblées générales de la noblesse du Périgord en 1789 ; sa descendance Guillaume Delfau, né au Breuil le 20 août 1766. Il a été élu député de la Dordogne à l'assemblée nationale législative le 10 septembre 1791. Il n'est pas réélu à la convention nationale le 5 septembre 1792. Pendant son temps de député qui a duré un an, il a prononcé un discours le 25 juin 1792 contre le club des jacobins. Il est secrétaire de la préfecture de la Dordogne sous l'Empire. Il meurt à Périgueux le 6 juillet 1815 ;\r\nGuillaume-Antoine Delfau, né à Daglan le 5 avril 1733, jésuite à Sarlat, puis après la dispersion de son ordre, archiprêtre de Daglan en 1770, député du clergé du Périgord aux États généraux de 1789. Il refuse de prêté le serment à la constitution civile du clergé. Prêtre réfractaire, il est arrêté chez les eudistes avec 17 autres le 10 août. Il est massacré aux Carmes le 2 ou 3 septembre 1792. Il a été reconnu comme martyr par l'église, il a été béatifié le 17 octobre 1926, par le pape Pie XI, en même temps que ses compagnons.","architecture":"BREUIL La chartreuse a été construite sur un plan en T. L'aile principale est orientée nord-sud, la façade principale est tournée vers le village de Grives. Elle se termine par deux légers avant-corps, de deux travées chacune, encadrant les quatre ouvertures centrales. L'aile perpendiculaire à la façade principale la divise en deux parties égales. \r\nLa chartreuse a été inscrite au titre des M.H  le 18 septembre 2007.","habitants":"Famille Delfau\r\n        \"","divers":"Château du Breuil à Grives","gps":"","images":["../image/image_24/24_Breuil_Grives_1.jpg","../image/image_24/24_Breuil_Grives_2.jpg"]},"Consult_chateau_formulaire90f9":{"id":"Consult_chateau_formulaire90f9","dept":"24","canton":"Sigoulès","commune":"Ribagnac","nom":"Bridoire","type":"Château","periode":"XII-XV","histoire":"BRIDOIRE,cité au XIIe siècle  par les sires de bridoire, la construction sest échelonnée du XIIe siècle au XIXe siècle, a connu une histoire des plus mouvementée sur fond de guerre de cent ans puis de Religion. Il fut détruit en 1568 par Montluc, reconstruit sous le règne d'Henri IV, mais fut à nouveau assiégé et démantelé sur les ordres du duc dÉpernon, en 1649. De nouveau restauré, il devient, par mariage, la propriété de la famille de Foucauld de 1806 à 1939. Le père de Foucauld y résida par deux fois, en 1911 et en 1913. En 1980, le château est vendu à une société ivoirienne qui représenterait la famille de Bokassa. Le château, laissé à labandon, est alors systématiquement vandalisé et dévalisé de ses meubles. Quinze ans suffiront à ruiner un édifice qui a pourtant résisté à tous les aléas de lhistoire. Le 13.07.2011, le château de Bridoire a un nouveau propriétaire : le couple Jacques et Catherine Guyot, déjà propriétaires du château de La Ferté-Saint-Aubin dans le Loiret, et du château de Saint-Fargeau dans l'Yonne, professionnels de l'animation touristique et amoureux du patrimoine. Le château de Bridoire est classé aux M.H. depuis le 31/07/1992, avec son pigeonnier restauré et inscrit depuis le 19/09/2013.","architecture":"BRIDOIRE du XVe siècle,  a été reconstruit avec fantaisie, sans plan densemble, à lintérieur dun rempart polygonal muni de tours. Lédifice est composé de deux corps de logis en retour déquerre. Quatre tours rondes à mâchicoulis cantonnent leurs extrémités. Chacune delles est pourvue dune petite tourelle descalier, en encorbellement ou partant du pied. Une cinquième grosse tour carrée prolonge les communs et ferme la cour.  lorsque furent construits ses grosses tours rondes à mâchicoulis, puis son pavillon central avec escalier d'apparat. Resté à l'abandon pendant des années, il a retrouvé fière allure depuis sa restauration. Il reprend vie chaque été, à la faveur des Nuits de Bridoire, grâce à des animations théâtralisées. Nombreux jeux anciens installés dans la cour du château et dans les communs.","habitants":"Famille de Foucauld\r\n        \"","divers":"Château de Bridoire GPS : 44° 46' 05\" Nord, 0° 27' 31\" Est grav de 1 à 8.","gps":"44° 46' 05\" Nord, 0° 27' 31\" Est grav de 1 à 8.","images":["../image/image_24/24_Bridoire_1.jpg","../image/image_24/24_Bridoire_2.jpg","../image/image_24/24_Bridoire_3.jpg","../image/image_24/24_Bridoire_4.jpg","../image/image_24/24_Bridoire_5.jpg","../image/image_24/24_Bridoire_6.jpg","../image/image_24/24_Bridoire_7.jpg","../image/image_24/24_Bridoire_8.jpg"]},"Consult_chateau_formulairef3dd":{"id":"Consult_chateau_formulairef3dd","dept":"24","canton":"Notron-Excideuil","commune":"Saint-Mesmin-Saint Pierre de Cole","nom":"Brussy_Bruzac","type":"Château-Vestiges","periode":"XV","histoire":"BRUSSY, bien que trés éloigné l'un de l'autre   l'historique est le même  de  BRUZAC, mais en 1583, le futur Henri IV le donne à son conseiller, Philippe Duplessis-Mornay et en dépossède ainsi la famille de La Marthonie. Celle-ci est de nouveau mentionnée comme propriétaire en 1667. Par mariage, le Bas-Bruzac passe à la famille du baron de Beynac, puis au comte de Bonneval  César Phbus François  en 1764 et à la famille de Beaumont du Repaire, Christophe Marie de Beaumont du Repaire (1732-1802) est marié à Marie-Claude de Beynac (1732-1802), héritière de Marie de La Marthonie, en 1773. Pierre-Henri Ribault de Laugardière remarque que le château du Haut-Bruzac est occupé en 1602 par Jean de Marqueyssac et qu'il n'a donc pas été détruit par les protestants.  le château a dû être démantelé,Il y a 20 ans, Sonia et Jean-Pierre Pouxviel achetaient un morceau de lande avec des ruines, le château de Bruzac.","architecture":"BRUSSY, en l'absence de documents, il émet l'hypothèse que pendant la Fronde, entre 1651 et 1653, la région étant tenue par les troupes du Prince de Condé,  château de Brussy en très mauvais état.  À la Révolution française, les propriétaires  ayant émigré en 1793, il est abandonné,  le château a dû être démantelé, puis a servi de carrière de pierre après 1793. Les ruines du château sont inscrites au titre des M.H. le 27 septembre 1948. après 1793. ouvert au public. Il s'agit, en réalité, des ruines de 2 anciens châteaux, en ruine, juxtaposés sur le même site.          BRUZAC domine la vallée de la Côle qui coule juste à ses pieds le château s'articulait autour d'une tour circulaire et d'une tour polygonale, couronnées de chemins de ronde sur mâchicoulis; il est relié par des courtines au château supérieur fait d'un logis rectangulaire flanqué au nord de grosses tours circulaires, celle du nord commandant le pont-levis, l'ensemble rebâti aux XVet XVIe siècle.","habitants":"Famille de La Marthonie. \r\n        \"","divers":"Saint-Mesmin-Saint Pierre de Cole château de Brussy grav de1 à3  GPS : 45° 21' 11\" Nord, 1° 12' 22\" Est                                                                                        Bruzac GPS : 5° 22' 54,8\" Nord, 0° 48' 10,2\" Est","gps":"45° 21' 11\" Nord, 1° 12' 22\" Est","images":["../image/image_24/24_Brussy_Bruzac_1.jpg","../image/image_24/24_Brussy_Bruzac_2.jpg","../image/image_24/24_Brussy_Bruzac_3.jpg","../image/image_24/24_Brussy_Bruzac_4.jpg"]},"Consult_chateau_formulaireecf4":{"id":"Consult_chateau_formulaireecf4","dept":"24","canton":"Le Bugue","commune":"Le Bugue","nom":"Bugue","type":"Château","periode":"XVI","histoire":"Le Bugue château des Faures et du Treuil dont je n'ai pas d' informations historique pour ces deux châteaux                                                                           FAURES à l'est du Bugue près de St-Cirq  demeure des Montazel propriétaires terriens avant la Révolution, aujourd'hui  chambre d'hôte                        TREUIL chambres d'hôte.","architecture":"FAURES   du XVIIIe siècle château dont le corps de logis rectangulaire à deux niveaux  avec séries de lucarnes   sur combles à toit brisés recouvert d'ardoises, flanqués d'une tour rondes à machicoulis supportant les toits en poivrières et donjon carrée crenelés accolé d'une tourelle de guet.              TREUIL édifice de plan en U à deux niveaux avec série de lucarnes sur toit brisé, deux  corps de logis inséré entre les pavillons carrés à chaque angles.","habitants":"Famille de montazel\r\n        \"","divers":"Château à le Bugue château grav de1 à 5 et du Treuil grav 7 et maison anciènne grav-6.","gps":"","images":["../image/image_24/24_Bugue_1.jpg","../image/image_24/24_Bugue_2.jpg","../image/image_24/24_Bugue_3.jpg","../image/image_24/24_Bugue_4.jpg","../image/image_24/24_Bugue_5.jpg","../image/image_24/24_Bugue_6.jpg","../image/image_24/24_Bugue_7.jpg"]},"Consult_chateau_formulairebbc2":{"id":"Consult_chateau_formulairebbc2","dept":"24","canton":"Saint-Cyprien","commune":"Marnac","nom":"Bétou","type":"Château","periode":"XV","histoire":"BETOU, ce château, très visible depuis la route départementale, était un repaire au XVe siècle appartenant à la famille des Cugnac-Saint-Ours, et au XVe siècle, il passa par mariage aux Cerval; en 1587, le seigneur de Betou, Pons de Cerval, trouve la mort au siège de Saint-Emilion, en prètant main forte aux huguenots. Il fut ensuite aux Caumont et enfin aux Bétou. En 1576 le seigneur en est Denys de Cladech. Des Cladech, il passe en 1588 à la famille de Céton par mariage. Daniel de Céton, époux de Marguerite de Cladech, était gentilhomme ordinaire de la chambre du roi et maître de camp de sa majesté. Leur fille Marguerite épousa en 2e noces Pons du Lion de Belcastel dont le petit-fils épousera en 1695 Jacqueline de Blancher de Lostanges. Puis au début du XVIIIe siècle, le château est vendu à Pierre Tapinoix de Sarlat. Les Tapinoix y habitent après la Révolution et ce jusquau début du XXe siècle.","architecture":"BETOU comme tout le territoire périgourdin, Marnac souffre dela guerre de cent ans. Cest durant une courte période daccalmie, avant le début des guerres de religion, quest édifié le château de Betou. Le site de Masus de Betou est mentionné dans un acte de 1459. Sa construction date du XVe au XVIe siècle  s
