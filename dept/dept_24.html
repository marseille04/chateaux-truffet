ois tours circulaires. Il abrite également une église paroissiale. Très abîmé au cours de la guerre de cent ans, le château est restauré par lévêque de Sarlat Pons de Salignac. Mais le château est incendié à deux reprises lors des guerres de Religion : en 1560 par le marquis de Dursac, puis en 1562 par le prince de Condé. À la Révolution, il est entièrement démantelé. En 1652, l'édifice est pillé et détruit par l'armée du prince de Condé. Il est relevé de ses ruines en 1662, devenant une habitation confortable au milieu du quadrilatère formé par le mur d'enceinte. La tour sud-est fut remplacée par une tour hexagonale dans laquelle un escalier donnait accès au château. Les ruines de cette ancienne maison forte sont classées M.H. depuis le 11 décembre 1969. La visite du château de Temniac, propriété privée, est autorisée lété.","habitants":"comtes de Périgord \r\n        \"","divers":"A Sarlat la canéda; Temniac  vestiges GPS : 44° 53' 34\" Nord, 1° 12' 55\" Est","gps":"44° 53' 34\" Nord, 1° 12' 55\" Est","images":["../image/image_24/24_Temniac_1.jpg","../image/image_24/24_Temniac_2.jpg","../image/image_24/24_Temniac_3.jpg","../image/image_24/24_Temniac_4.jpg"]},"Consult_chateau_formulaireb9df":{"id":"Consult_chateau_formulaireb9df","dept":"24","canton":"Terrasson_Villedieu","commune":"Terrasson-Villedieu","nom":"Terrasson_Villedieu","type":"Château","periode":"XVII-XVIII","histoire":"Le château de l'Abbe, du Fraysse du XVIIe et XVIIIe siècles sur des bases médiévales, inscrit avec son jardin et sa terrasse au titre des M.H.en 2001,  de Montmège et la tour  Jeanne dArc, de Gaubert chambres d'hôtes. \r\nTERRASSON-VILLEDIEU  FRAYSSE  Au XIVe siècle est apparue la famille Saint-Exupéry par mariage avec Marie Vigier du Fraysse, dernière du nom. En juin 1892, on voit encore cette maison à tourelle portant un écusson avec trois épées en pal. Détruite quelques années plus tard par un incendie, il subsiste encore le pied de la tour et un blason, aux armes des Souillac. Le château du Fraysse  du XVIIe et XVIIIe siècles sur des bases médiévales, inscrit avec son jardin et sa terrasse au titre des M.H. en 2001                          JEANNE DARC, construit au XIXe siècle par une riche famille du Périgord, le château compte plusieurs propriétaires notables de la commune, devenu institution religieuse, restauré en 1964 acceuille actuellement les assedic et les services sociaux communal tout en servant d'office du tourisme. La tour du château Jeanne dArc.                                       MONTMEGE, les premiers seigneurs les de Souillac à la mort du général de Souillac en 1655 passe dans la famille de Reillac, jean de Reillac écuyer épouse en 1624 Louise de Souillac héritière. En 1680 Margueritte de Reillac de Montmège  épouse Jean Dubernard, en 1765 Marie-Henriette    Dubernard de Montmège  épouse Symphotien Delon notaire royal, son fils Jacques légataire universel de son oncle le comte  Marc-Antoine  de Montmège mort en 1820.  Jacques Delon  vend en 1828 à Geneviève-Eugénie Lanoix-Lacroze, veuve d'Etienne de Boisset-Chapelle et c'est la famille  Bécaud les propriétaire depuis 1990.","architecture":"FRAYSSE, fut plusieurs fois incendié, au cours des guerres de Religion et de la Fronde. Après la Fronde, la nécessité de se défendre n'apparaît plus comme essentielle, et le château s'ouvre sur l'extérieur. L'édifice est agrandi au cours des XVIIe et XVIIIe siècles. Les décors intérieurs sont retouchés. Les travaux sont interrompus en 1789, et repris en 1815. Une terrasse est également aménagée en remblai devant le château, façade nord, au début du XVIIIe siècle. La terrasse est flanquée à l'est et à l'ouest de vestiges de deux tours de l'ancienne enceinte médiévale.                                                                       ABBE, logis abbatial ravagé par les troupes de Coligny en 1569. En juin 1892, on voyait encore cette maison à tourelle portant un écusson avec trois épées en pal. Détruite quelques années plus tard par un incendie, il subsite aujourd'hui le pied de la tour et un blason aux armes des Souillac.\r\nMONTMEGE, situé sur un petit coteau entouré de deux autres avec des fossés profonds avec escarpe et contrescarpe, trois fenêtres gothiques, de plan d'origine à quatre tours et un corps de bâtiments et murs enfermant une cour, la partie habitable  composée de deux ailes à un seul étage qui s'articulent à angle droit composé d'un plan en L un retour d'équerre formant un plan carré à l'angle sud ouest.                                                                                GAUBERT, chambres d'hôtes de Georges Huillet.","habitants":"Famille Saint-Exupéry                                                 Famille de Reillac\r\n        \"","divers":"A Terrasson-Villedieu grav 6: Fraysse GPS : 44° 50' 4,86\" Nord et 1° 18' 25,17\" Est . Fraysse grav 3 - 5.    Jeanne d'arc-grav 7                                                  Montmége grav 1-2 GPS : 45° 07' 48\" Nord et 1° 18' 05\" Est .  Gaubert grav 8 -9","gps":"44° 50' 4,86\" Nord et 1° 18' 25,17\" Est . Fraysse grav 3 - 5","images":["../image/image_24/24_Terrasson_Villedieu_1.jpg","../image/image_24/24_Terrasson_Villedieu_2.jpg","../image/image_24/24_Terrasson_Villedieu_3.jpg","../image/image_24/24_Terrasson_Villedieu_4.jpg","../image/image_24/24_Terrasson_Villedieu_5.jpg","../image/image_24/24_Terrasson_Villedieu_6.jpg","../image/image_24/24_Terrasson_Villedieu_7.jpg","../image/image_24/24_Terrasson_Villedieu_8.jpg","../image/image_24/24_Terrasson_Villedieu_9.jpg"]},"Consult_chateau_formulaire7f3c":{"id":"Consult_chateau_formulaire7f3c","dept":"24","canton":"Thenon","commune":"Thenon","nom":"Thenon","type":"Château","periode":"XIII","histoire":"3 châteaux à Thenon celui de Thenon, de Basty et Pressac.                                                                   THENON, à l'époque médiévale, l'existence de la paroisse est relevée dans le cartulaire de Saint Amand dès 1185, elle constituait un castrum, position de défense délimitée à l'ouest par des « fossés » aujourd'hui comblés. Il ne subsiste que peu de vestiges de cette époque.  L'orthographe de Thenon a beaucoup varié. Ainsi, jusqu'au début du XIIIe siècle, seul Teno existe. Mais dès 1209, le célèbre troubadour Bertran de Born écrit Thenon.  La seigneurie de Thenon, d'abord possession des La Faye, échut par la suite à la puissante famille des Hautefort, ces liens étant renforcés par des alliances comme celle qui unit en 1237 Aymard de La Faye, fils d'Adhémar, seigneur de Thenon, à Marguerite de Born, petite fille du troubadour Bertran de Born.  Pendant la guerre de cent ans, Mathe de Born a épousé Hélie de Gontaud, seigneur de Badefol et Lalinde qui est alors devenu seigneur de Hautefort et a relevé le nom. Il est mort en 1396. Jean II de Hautefort a été chambellan des rois Charles VIII et Louis XII, gouverneur du Périgord et du Limousin. Il a obtenu de François Ier la création de foires à Hautefort et Thenon.","architecture":"THENON, forteresse, du XIIe siècle, le château se composait d'un corps de logis, d'une tour carrée, d'un pavillon à l'est et d'un mur d'enceinte au nord avec une porte fortifiée de 40 mètres de hauteur qui fut démolie en 1872 car le passage était trop étroit. L'ensemble occupant un emplacement de 1 000 m2 environ, bordé de fossés. Il fut plusieurs fois assiégé et pris pendant la guerre de cent ans. Les anglais commandés par le capitaine Houdington s'emparent de la place forte le 1er septembre 1439. Ainsi, par lettres données à Orléans le 9 octobre 1439, Charles VII s'adressait à l'évêque de Tulle pour remettre « en son obéissance » la place et forteresse de Thenon,  naguères pris par les ennemis. Libéré le 28 décembre, un incendie se déclara au milieu du château, brûlant parchemins et titres. Il dépendait tout d'abord de la châtellenie d'Hautefort. Ancien manoir : fief des La Faye, des de Born et enfin des Hautefort de Vayres. En 1760, il avait haute justice sur la ville et sur une partie d'Azerat. Aujourd'hui, il ne subsiste qu'une partie de son donjon et de ses logis du XIVe siècle.","habitants":"Famille des La Faye\r\n        \"","divers":"A Thenon château de Basty et Pressac.","gps":"","images":["../image/image_24/24_Thenon_1.jpg","../image/image_24/24_Thenon_2.jpg"]},"Consult_chateau_formulaire7ded":{"id":"Consult_chateau_formulaire7ded","dept":"24","canton":"Excideuil","commune":"Prayssac","nom":"Theron","type":"Château","periode":"XIII-XV","histoire":"THERON, les archives ont conservé les noms d'un fils de Bertrand, Raymond, bayle de l'évêque, mort avant 1374, et de son fils Pierre de Valgoudou, seigneur du Théron en 1389 et bayle de Luzech. La dernière héritière, Séguine de Valgoudou épouse avant 1454 Arnal Bénech, donzel de Luzech, et lui apporte ses droits sur le Théron.   L'évêque de Cahors, Jean du Puy, confisque, en 1437, le château à Lenoir, sire de Mauroux ou de Lézergues. L'évêque de Cahors, Jean de Castelnau-Calmont, donne la maison forte du Théron à Béral de Burbuzon. Sa fille, Saure, s'est mariée à Jean du Tilhet, seigneur de La Croze. Jean du Tilhet est seigneur de La Croze et du Théron en 1491. Jean du Tilhet fait restaurer le château après la guerre de cent ans, à la fin du XVe siècle. En 1504, son fils Jean dénombre pour le Théron. La justice, relève de l'évêque de Cahors. En 1761, le château est devenu la propriété de Jean Lefranc, seigneur de Caïx, président de la cour des Aides de Montauban. Il passe ensuite à son neveu Jean-Jacques Lefranc de Pompignan. Préférant résider dans son château de Caïx, il a vendu le château du Théron à Louis-Antoine Vidal de La Pize, du château de Lunegarde. Les biens de Vidal de La Pize ont été saisis à la Révolution. Les meubles du château sont pillés en 1790 et 1791. Le château est vendu comme bien national à un fermier qui a utilisé le château comme carrière de pierre. Le donjon est détruit.  Le château a été acquis en 1970 pour un nouveau propriétaire qui a entrepris sa restauration. Pierre Ledoux, propriétaire du château est décédé le 24 juin 2005. Il a fait de la Fondation de France son légataire universelle, avec un legs particulier pour le château. L'édifice est inscrit au titre des M.H. le 15 mars 1973.","architecture":"THERON, une tour de plan carré a  été construite par Bernard de Valgoudou ou Valgadour au milieu du XIIIe siècle. Les Valgoudou sont une famille de chevaliers du castrum de Puy-l'Evêque. Un Bernard de Valgoudou rend hommage pour ce qu'ils ont à Puy-l'Évêque à l'évêque de Cahors, en 1200. Un logis possédant des archères cruciformes est construit au début du XIVe siècle auquel est associé une enceinte. Une chapelle est construite au XIVe siècle. L'enceinte est renforcée au XVe siècle par quatre tours rondes de 10 à 12 m de haut dont il n'en subsiste que deux.","habitants":"Famille de Valgoudou\r\n        \"","divers":"Château de Théron","gps":"","images":["../image/image_24/24_Theron_1.jpg","../image/image_24/24_Theron_2.jpg"]},"Consult_chateau_formulairefe7b":{"id":"Consult_chateau_formulairefe7b","dept":"24","canton":"Thiviers","commune":"Thiviers","nom":"Thiviers","type":"Château","periode":"XIII-XV-XVII","histoire":"A Thiviers le château de Banceil du XVIe et XVIIe siècles, transformé en logements, le château de la Filolie qui appartint au célèbre parfumeur François Coty, aujourd'hui école ménagère ; le château de Razac du XVIe siècle, et de Vaucocour.               FILOLIE  appartenait au XVe siècle aux Martin, puis au XVIe siècle aux Romagère de Roncessy, lesquels possédaient également, non loin de là, le manoir de La Cipière.\r\nVAUCOCOURT, place forte au Moyen Âge, les origines de Thiviers seraient en fait beaucoup plus lointaines,  A l'intérieur de la ville s'élève Vaucocourt dont les fondations sont du XIIIe siècle, qui firent construire le château du même nom et furent pendant des siècles les nobles et les dirigeants de la cité. La famille de Thiviers, disparue en 1729, était une branche directe de la famille de Vaucocourt. Cette dernière sest éteinte au début du XIXe siècle, mais reste représentée en filiation féminine par les du Mas de Veaucocourt. Château son aspect médiéval nest quasiment plus apparent à la suite de nombreuses rénovations au cours des siècles.\r\nBANCEIL, doit être identifié comme le château de la Cour. En 1775, en effet, son propriétaire Pierre de Banceil, écuyer, est nommé seigneur de la Cour. Banceil est dabord transformé en gendarmerie, avant daccueillir des logements sociaux.\r\n RAZAC, ancien fief des Tenant, puis des Truard et les Vigneral qui le possèdent toujours.","architecture":"La FILOLIE, un haut logis édifié au XVe siècle, accosté d'une tour carrée à mâchicoulis, lance deux ailes du XVIIe siècle en équerre, toutes les deux terminées par des tours circulaires. Un châtelet s'ouvre au levant et donne accès à la cour d'honneur. Un chemin de ronde accentue la note féodale de cette demeure.\r\nVAUCOCOURT, au XIIe siècle,  inclus dans l'enceinte de la ville est bâti à l'est de la cité, se situe en pleine ville de Thiviers. Lors du passage des huguenots en 1575, le château comme les remparts de la ville sont détruits , le château  actuel est reconstruit à la fin du XVIe siècle.                                                                  BANCEIL, la construction  date du XVIe au XVIIe siècle, a été transformé en logements privés. Il est fermé au public.  Au Moyen-Âge, la demeure semble constituer une résidence seigneuriale périurbaine. Le château comprend un logis flanqué dune tour cylindrique et orné dune échauguette, lédifice est complètement restauré. Son style architectural date du XVIe siècle bien que sa construction soit antérieure à cette date sans doute dorigine médiévale.\r\nTHIVIERS, une autre famille est étroitement liée à Thiviers : la famille Theulier. Ses origines thibériennes remontent au moins au XVIIe siècle : un M. Theulier fut nommé consul de la ville en 1608. Depuis 1922, la maison de la famille est devenue la mairie et ses terrains adjacents, le parc Theulier.                       RAZAC est composé de deux parties d'époques différentes, la plus ancienne du XVIIe siècle, possède une tour carrée à mâchicoulis à laquelle est accolée une tour ronde, l'autre partie du XVIIIe siècle est un corps de logis à trois niveaux avec étage de combles percé de lucarnes.","habitants":"Famille de Romagère de Roncessy                              famille de Thiviers                                                  Pierre de Banceil  fief des Tenant\r\n        \"","divers":"Banceil-Razac Grav 5 et 9 GPS : 45° 25' 07\" Nord, 0° 55' 20\" Est                                        Felolie grav 1 à 3 GPS : 45° 25' 07\" Nord, 0° 55' 20\" Est                                     Vaucocour grav 6 - 7  GPS : 45° 24' 52\" Nord, 0° 55' 19\" Est. la maison de Theulier grav 4.","gps":"45° 25' 07\" Nord, 0° 55' 20\" Est","images":["../image/image_24/24_Thiviers_1.jpg","../image/image_24/24_Thiviers_2.jpg","../image/image_24/24_Thiviers_3.jpg","../image/image_24/24_Thiviers_4.jpg","../image/image_24/24_Thiviers_5.jpg","../image/image_24/24_Thiviers_6.jpg","../image/image_24/24_Thiviers_7.jpg","../image/image_24/24_Thiviers_8.jpg","../image/image_24/24_Thiviers_9.jpg"]},"Consult_chateau_formulairea686":{"id":"Consult_chateau_formulairea686","dept":"24","canton":"Sigoulés","commune":"Thénac","nom":"Thénac","type":"Château","periode":"XV-XVII","histoire":"PANISSEAU, situé près de Bergerac au cur du Périgord Pourpre, est à 5 kilomètres à lest de la région viticole de Bordeaux. La propriété couvre 106 hectares, dont 67 hectares de vignes et 44% de forêts, champs et prés. Lancienne demeure des Carbonnières de Jayac, des Luziers, des Alba et des de Laur est caractéristique de la fin du Moyen-Âge avec des échauguettes coiffées de poivrières surmontées dépis et de girouettes en ferronnerie. Le portail à pilastres cannelés et la baie à létage sont surmontés darc en mitre. Lensemble a largement été remanié au XVIIe siècle par les dAlba.","architecture":"THENAC, vestiges du château de Puyguilhem il resté à priorie que des remparts.  Puyguilhem signifie en occitan « colline de Guillaume ». À l'origine, un château existait sur les lieux de ce petit village du Périgord pourpre (région autour de Bergerac). Le 15 mars 1265 , trois seigneurs locaux  Hugues de Puychagut, Grimard de Picon et Hélie de Saint-Michel  cédèrent leurs droits sur la forteresse de Puyguilhem et les terres environnantes au roi d'Angleterre Henri III. En échange, une bastide devait être construite à l'extérieur du château. La fondation de la bastide a été confiée à Jean de Grailly. Elle eut lieu sous le nom de Sainte-Eulalie-de-Puyguilhem. La bastide connut quelques périodes agitées au XIVe siècle et durant la guerre de cent ans. Malgré tout, son importance fut relativement réduite. Elle fut assiégée, en 1338 ou 1339 suivant les sources, par Pierre de la Paine, sénéchal de Toulouse. C'est au cours de ce siège que lartillerie à poudre fut utilisée pour la première fois dans la région. Au XVIIe siècle, elle devint la propriété du duc de Lauzun.","habitants":"duc de Lauzun \r\n        \"","divers":"A Thénac château et Remparts","gps":"","images":["../image/image_24/24_Th%c3%a9nac_1.jpg","../image/image_24/24_Th%c3%a9nac_2.jpg","../image/image_24/24_Th%c3%a9nac_3.jpg"]},"Consult_chateau_formulaire744a":{"id":"Consult_chateau_formulaire744a","dept":"24","canton":"Bergerac","commune":"Creysse","nom":"Tiregand","type":"Château","periode":"XIII-XVIII","histoire":"Château de Tiregand et son domaine du XVIIIe au XIXe siècles, inscrit au titre des M.H. en 2002, le  château du Roc et son pigeonnier, chambres d'hôtes  et restauration.\r\nTIREGAND L'établissement du château primitif au XIIIe siècle serait due à Edward Tyrgan, fils naturel d'Henri III d'Angleterre.  En 1575, les reliques de Saint-Front, dérobées à Périgueux par les Huguenots, sont transportées au château avant d'être précipitées dans la Dordogne. L'actuel château est construit au XVIIIe siècle sous l'impulsion de Jean Charles d'Augeard, président à Mortier auprès du parlement de Bordeaux. Le Vieux Castel est alors transformé en chai. En 1826, le comte Alexandre César de La Panouse, député de Paris de 1822 à 1827, achète le château. Il décède au domaine en 1836. Son fils, César Armand Anatole de La Panouse fait bâtir le logis Est qui arbore les armoiries de la famille ainsi que des médaillons aux lettres entremêlées LP. Au XXe siècle, le château passe à la famille de Saint-Exupéry. Château de Tiregand appartient désormais aux héritiers de La comtesse François de Saint-Exupéry.","architecture":"ROC, magnifique bâtisse ancienne qui encadre son logis moderne entre deux tours polygonales,  avec une terrasse à colonnes classiques.                               TIREGAND, une partie des douves a été conservée mais est désormais à sec. Deux logis sont juxtaposés longitudinalement. Le plus récent et le plus étendu, à l'est, date du XIXe siècle. Il est encadré par deux imposants pavillons. Celui situé à l'ouest fait la transition avec le logis le plus ancien qui remonte au XVIIIe siècle. Les écuries et les communs sont accolés au nord et au nord-est du logis Est. Château de Tiregand et son domaine, du XVIIIe au XIXe siècles, inscrit au titre des M.H. en 2002.","habitants":"Comte Alexandre César de La Panouse\r\n        \"","divers":"A Creysse; Roc grav 1- 3. Tiregand grav 4 à 9 GPS : 44° 51' 22\" Nord et 0° 33' 02\" Est","gps":"44° 51' 22\" Nord et 0° 33' 02\" Est","images":["../image/image_24/24_Tiregand_1.jpg","../image/image_24/24_Tiregand_2.jpg","../image/image_24/24_Tiregand_3.jpg","../image/image_24/24_Tiregand_4.jpg","../image/image_24/24_Tiregand_5.jpg","../image/image_24/24_Tiregand_6.jpg","../image/image_24/24_Tiregand_7.jpg","../image/image_24/24_Tiregand_8.jpg","../image/image_24/24_Tiregand_9.jpg"]},"Consult_chateau_formulaire1eb6":{"id":"Consult_chateau_formulaire1eb6","dept":"24","canton":"Montagrier","commune":"Tocane Saint-Apre","nom":"Tocane_St_Apre","type":"Château","periode":"XV-XVII","histoire":"A Tocane st-Apre le château de Beauséjour du XVe ou XVIe siècle   et à deux Km  au nord Montagrier  (Fayolle Voir Article)\r\nBEAUSEJOUR :La première mention écrite connue du lieu remonte au début du XIIIe siècle sous la forme Sen-Leo,  est bâti en 1340 par le cardinal Hélie de Talleyrand, comme élément défensif avancé du château de Grignols. Lors de la Fronde, en 1652, les troupes du Grand Condé incendient et détruisent le château. Aux XVIIe et XVIIIe siècles, la paroisse de Saint-Léon dépend de la châtellenie de Grignols. En remplacement d'un bac qui assurait la traversée de l'Isle entre Beauséjour et le village, le pont de Saint-Léon-sur-l'Isle est construit en 1880 puis élargi en 1971.  Louise de Lacropte-Chantérac, mère de Fénelon, y est née.                                                      Château de LAVALADE, est mentionné dès 1323  Géraud de Cassaignol y rend hommage devant le comte de Périgord édifié au XVIe siècle\r\nRuines du château de VERMODE dont le donjon est classé M.H. depuis 1886.\r\nHôtel PARADOL, du  XVe siècle : la famille Paradol est anoblie en 1442 par Charles VII. C'est  vers la fin du  XVe siècle que fut construit l'hôtel éponyme. La famille y résidera jusqu'à la Révolution. Un inventaire de 1794 donne une vision précise des aménagements intérieurs.  Les communs comprenaient une grange avec un pressoir et ses cuves ainsi qu'une écurie. Successivement couvent puis école de soeurs avant la dernière guerre, l'hôtel est acheté puis restauré par la commune. Il abrite  une bibliothèque, le syndicat d'initiative, un musée du costume.","architecture":"BEAUSEJOUR, construit du XVe au XVIe siècle. sa chapelle, aujourd'hui en ruines, fut érigée en 1607. Au début du XXe siècle, des bâtiments agricoles ont remplacé les communs. Construite à la charnière des XVe et XVIe siècles, la maison forte de Beauséjour fut remaniée par la suite. A lorigine, elle possédait une enceinte rectangulaire comprenant des tours carrées, qui était doublée de douves. Une chapelle lui fut adjointe au XVIIe siècle.                                             LAVALADE,  du XVIe et XVIIIe siècle le logis actuel a été remanié au XVIIIe siècle, époque à laquelle on construit le pavillon nord et reprend l'ensemble des ouvertures de l'édifice. Au XVIIe siècle, le domaine qui comprenait la métairie des Maureloux et le Moulin de la Rue, appartient à la famille de Noalis, puis, au siècle suivant, il est vendu aux Révolte, peut-être à l'origine des transformations du XVIIIe siècle.               VERMODE, ruiné  du XIIe siècle. C'est un édifice fortifié. Il ne reste que le donjon de Vernode encore debout. Il reste la Tour à base carrée, couverte en coupole sur pendentif. L'accès semble être possible par une hunette, au sommet de la coupole. Elle devait servir de silo ou de basse fosse. Le Donjon de Vernode est inscrit aux M.H. le 12/07/1886 et appartient à la commune.  Le fief a, entre autre, été la possession des Vernodes et des Fayolles. \r\nMONTAGRIER, au XIIe et XIVe siècle, Montagrier possédait des murailles dont il reste aujourd'hui une imposante porte la Porte de Wiridel.    Château de GOUYAS, pas d'information historique du XIXe siècle de plan en équerre à deux niveaux et série de lucarnes sur toit à la mansard.","habitants":"Famille Paradol Famille Guillaume Rouchaud\r\n        \"","divers":"A   Tocane Saint-Apre. Grav 1 à 3. Lavalade-Vernode  GPS : 45° 15' 19\" Nord, 0° 29' 50\" Est              Beauséjour grav  4-5 GPS : 45° 15' 14\" Nord, 0° 28' 30\" Est","gps":"45° 15' 19\" Nord, 0° 29' 50\" Est              Beauséjour gra","images":["../image/image_24/24_Tocane_St_Apre_1.jpg","../image/image_24/24_Tocane_St_Apre_2.jpg","../image/image_24/24_Tocane_St_Apre_3.jpg","../image/image_24/24_Tocane_St_Apre_4.jpg","../image/image_24/24_Tocane_St_Apre_5.jpg"]},"Consult_chateau_formulaired93e":{"id":"Consult_chateau_formulaired93e","dept":"24","canton":"Verteillac","commune":"Cercles","nom":"Tour_Blanche","type":"Vestiges-Forteresse-Château","periode":"XIII-XV-XVI","histoire":"La tour blanche du siècle XIVe siècle, inscrit depuis 1948. Manoir de Nanchapt du XVIe et XVIIe siècles,\r\n  LA TOUR-BLANCHE acheter Peter Overlack  homme d'affaire allemand.  En 1369, le site est possession de la famille Bourdeuille. Au début du XVe siècle, le château est le siège d'une Baronnie. Dans la deuxième moitié du XVIe siècle, le célèbre chroniqueur Pierre de Bourdeille dit Brantôme séjourne au château de sa grand-mère. Durant la deuxième moitié du XVIe siècle, au cours des guerres de religion, les protestants attaquent puis détruisent partiellement le château. Au milieu du XVIIe siècle, durant la Fronde, la ville et le château sont attaqués. Vers 1792, les Révolutionnaires réquisitionnent le château et le vendent comme bien national à plusieurs familles. Au  XIXe siècle, le logis Renaissance est détruit au profit d'un bâtiment plus confortable.  En 1970, l'intérieur du donjon est incendié accidentellement. Liste des propriétaires : comtes d'Angoulême, La Tour, Bourdeuil, De la Brousse, Saint Maure, Labrousse Verteillac, Dennery.\r\n NANCHAPT, pendant près de deux siècles la famille Nanchapt occupe la demeure, qui connaît une grande stabilité architecturale. Au XXe siècle, l'edifice est quelque peu remanié alors que les propiétaires s'y succèdent. Accueillant tour à tour, boucherie, salon de coiffure et agence de publicité, Roumailhac est au centre de lactivité du village mais son état se dégrade profondément. En 2001, la commune acquiert le château également appelé hôtel de Nanchapt.","architecture":"NANCHAPT, cest une grande demeure Renaissance construite entre le XVIe et le XVIIe siècle. Elle est composée de deux corps de logis réunis par une tour octogonale renfermant un escalier à vis. Les lucarnes de la cour ont leur rampant décoré d'un singe et d'un chien sculptés. Des ornements enrichissent lensemble, comme des sculptures singulières représentant des personnages à califourchon et des animaux. Une figure grotesque d'homme enjambe le sommet du rampant.                                                  TOUR-BLANCHE, construit aux XIe siècle, en calcaire du pays, pierre de taille, moellon et tuiles creuses, le style régulier des 3 façades subsistantes , il fut un temps condamné à la destruction, il fut finalement restauré au XXe siècle et son donjon inscrit aux M.H. en 1906. Il ne reste aujourd'hui de ce château que des vestiges, dont le solide donjon carré percé de meurtrières est considéré comme le plus ancien de France. A cause de la dimension impressionnante du donjon à droite, la tour d'angle à gauche paraît petite.  Au XVIIe siècle, un logis de type  Renaissance est construi,   aucune archère ni fente de tir. Bien qu'arasée, elle a gardé ses consoles triples pour les mâchicoulis. Sous les consoles, deux petites ouvertures. La tour coté Sud-Ouest  en encorbellement. A mi-hauteur, de fines ouvertures amènent peu de lumière. Comme pour sa consur, cette tour arasée ne montre que les vestiges des mâchicoulis.  Les contreforts plats sont reliés par de grandes arcatures aveugles en arcs brisés. L'impressionnante épaisseur des murs.","habitants":"Peter Overlack.                                                              famille Nanchapt \r\n        \"","divers":"A Cercles. Fontgrenon grav 4 à 7.     Napchat grav 8  GPS : 45° 21' 57\" Nord et 0° 26' 47\" Est.  Tour-Blanche grav 1 à 3  GPS : 45° 21' 49,9\" Nord et 0° 26' 54,2\" est.","gps":"45° 21' 57\" Nord et 0° 26' 47\" Est.  Tour-Blanche grav 1 à 3","images":["../image/image_24/24_Tour_Blanche_1.jpg","../image/image_24/24_Tour_Blanche_2.jpg","../image/image_24/24_Tour_Blanche_3.jpg","../image/image_24/24_Tour_Blanche_4.jpg","../image/image_24/24_Tour_Blanche_5.jpg","../image/image_24/24_Tour_Blanche_6.jpg","../image/image_24/24_Tour_Blanche_7.jpg","../image/image_24/24_Tour_Blanche_8.jpg"]},"Consult_chateau_formulaire899e":{"id":"Consult_chateau_formulaire899e","dept":"24","canton":"Périgueux","commune":"Trélissac","nom":"Trélissac","type":"Château","periode":"XV-XVII-XX","histoire":"quatre châteaux à Trélissac , Caussade ( voir article ) , Magné dit de Trélissac (voir article) et la Feuilleraie , château du Murat XVIIIe siècle, la Lauterie du XVe et XVIIe siècles, Sept-fonts et la Jarthe pas d'info pour ces deux derniers.                                                      JARTHE date du XIIe au XXe siècle. Il a appartenu aux familes  du Puy de La Jarthe du XIVe siècle à 1583, de Chillaud de 1583 au XVIIe siècle, du Saillant du XVIIe siècle au XVIIIe siècle, et de La Roche-Aymon, du XVIIIe siècle à 1836. La Jarthe a été racheté ensuite au XIXe siècle, par la famille Bareau, originaire de la région d'Excideuil puis transmis par héritage à la famille Dezon. Inscrit aux M.H. depuis le 12.10.1948.                                                                     LAUTERIE, le domaine est inscrit depuis 1985 sur plus de 16 Ha.                                                                  MURAT ancienne demeure des Bonneval, des Borde et des Fournier, Louise de Fournier née à Saint-Domingue épousa Jean Lafon de Cluzeau qui émmigra en 1791 sans retour  sa veuve épousa en 1795 le philosophe Maine de Biran, elle mourut au retour de son mari.                                             FEUILLERAIE,  bâti à Trélissac,  La construction  date du XIXe siècle.","architecture":"A Trélissac, Juste à côté du château Magné se trouvent le vieux (ou petit) château de Trélissac,  se trouvent le vieux château ou appelé aussi le petit château de Trélissac qui date du XVIIe siècle.      SEPT-FONTS du XVIIIe siècle, inscrit depuis 1947,  bâtiment édifié sous Louis XV par l'architecte Louis qui réalisa le grand théâtre de Bordeaux. De plan rectangulaire, le centre de la façade principale forme un léger avant-corps. La façade opposée forme une avancée très marquée, décorée d'ouvertures arrondies.                                                                FEUILLERAIE du  XIXe siècle.                                MURAT du XVIIIe siècle vaste rectangle percé de nombreuses baies un étage dominé par des oeils de boeufs  et orné par un fronton triangulaire.\r\nMONTIGNAC,  date du XVIIIe siècle  était l'ancien fief des Comtes de Périgord.","habitants":"familes  du Puy de La Jarthe\r\n        \"","divers":"A Trélissac    La FeuilleraieGrav 1, Jarthe-Lauterie grav 4 GPS : 45° 11' 48\" Nord et 0° 47' 00\" Est.                                                Montignac GPS : 45° 04' 00\" Nord et 1° 09' 41\" Est.                 Murat-Trélissac  grav 6 GPS : 45° 11' 48\" Nord et 0° 47' 00\" Est.   Sept-Fonds grav 8  GPS : 45° 13' 11,7\" Nord et 0° 45' 18,8\" Est","gps":"45° 11' 48\" Nord et 0° 47' 00\" Est.","images":["../image/image_24/24_Tr%c3%a9lissac_1.jpg","../image/image_24/24_Tr%c3%a9lissac_2.jpg","../image/image_24/24_Tr%c3%a9lissac_3.jpg","../image/image_24/24_Tr%c3%a9lissac_4.jpg","../image/image_24/24_Tr%c3%a9lissac_5.jpg","../image/image_24/24_Tr%c3%a9lissac_6.jpg","../image/image_24/24_Tr%c3%a9lissac_7.jpg","../image/image_24/24_Tr%c3%a9lissac_8.jpg"]},"Consult_chateau_formulaire69d8":{"id":"Consult_chateau_formulaire69d8","dept":"24","canton":"Saint-Cyprien","commune":"Tursac","nom":"Tursac_Reignac","type":"Château","periode":"XV-XVI-XVII","histoire":"Château de Marzac du XVe, XVIe et XVIIe siècles, inscrit au titre des  M.H.\r\nMaison forte de Reignac. \r\nMARZAC, était la propriété de la famille d' Hélie de Campniac est seigneur de Marzac et de l'Herm. Marzac passe ensuite à son fils Hébrard qui transmet l'héritage à son propre fils François, qui le perd au profit de la maison de Roffignac à la suite d'un décret. Christophe de Roffignac (mort en 1572) est seigneur de Couzages et de Marzac. Le château a appartenu à Marie-Madeleine Bart (1697-1781), petite-fille du célèbre corsaire Jean Bart, qui s'est mariée en 1732 avec Marc de la Barthe (1707-1787). En 1756, leur fille Marie de la Barthe de Thermes épouse François de Carbonnier (1727-1802), qui devient marquis de Marzac. En 1865, le domaine passe dans la famille de Fleurieu à la suite du mariage de Marie Marguerite Carbonnier de Marzac avec Henri de Fleurieu (1828-1897). En 1987, il est acheté par une famille danoise. Celle-ci est représentée par une société britannique qui pour améliorer le domaine a contracté une importante créance auprès d'une banque luxembourgeoise. Devant les impayés, la banque a fait mettre aux enchères le domaine en mars 2018. Personne ne s'étant porté acquéreur, cette banque est désormais propriétaire du domaine. \r\nREIGNAC,  château troglodytique, seul château-falaise intact de France, inscrite au titre des M.H.. Le gisement préhistorique, classé, a été occupé depuis le Paléolithique supérieur. Elle date du XVIe siècle. Au XVIIIe siècle, cette demeure dépendait de la seigneurie de Marzac. Conservée dans un état exceptionnel et entièrement meublée dépoque, est le seul monument de ce type « château falaise » totalement intact.","architecture":"MARZAC, est bâti au XVe siècle et des constructions ont été ajoutées ultérieurement. Aux angles du logis rectangulaire s'élèvent quatre tours circulaires. La façade principale est orientée au nord-est, en direction du bourg de Tursac. Une tour d'escalier carrée a été ajoutée contre la façade sud-ouest, à égale distance des deux tours d'angle. La tour sud abrite une chapelle qui a été utilisée comme chapelle funéraire. La majeure partie de l'édifice est couronnée de mâchicoulis et de chemins de ronde. Les façades sont percées de fenêtres à meneaux. Initialement, le château était entouré de douves, qui ont été comblées. Donnant au nord-est sur le précipice qui dévale vers la Vézère, la cour en terrasse est en partie bordée au nord-ouest et au sud-ouest de communs.  \r\nREIGNAC, la maison est constituée d'une façade à quelques mètres en avant de la falaise. Sur la gauche se voit une avancée du bâtiment qui devait être un peu plus élevée à l'origine, et constituer une sorte de tour carrée. Sous les fenêtres se trouvent des meurtrières d'arme à feu, à trois redans. La porte était protégée par un mâchicoulis. Au rez-de-chaussée, la maison masque un abri sous roche. La toiture est en partie formée par l'avancée du rocher, et en partie couverte en tuiles plates. Au-dessus du bâtiment court une terrasse rocheuse qui fut aménagée au  Moyen-Age. C'est le seul château-falaise intact de France. La maison forte de Reignac appartient à la commune de Tursac.","habitants":"Famille de Campniac                                            Famille de Fleurieu\r\n        \"","divers":"A Tursac Marzac grav 1_2 GPS : 44° 57' 46\" Nord, 1° 02' 06\" Est. Reignac grav 3 à 5","gps":"44° 57' 46\" Nord, 1° 02' 06\" Est. Reignac grav 3 à 5","images":["../image/image_24/24_Tursac_Reignac_1.jpg","../image/image_24/24_Tursac_Reignac_2.jpg","../image/image_24/24_Tursac_Reignac_3.jpg","../image/image_24/24_Tursac_Reignac_4.jpg","../image/image_24/24_Tursac_Reignac_5.jpg"]},"Consult_chateau_formulaire261a":{"id":"Consult_chateau_formulaire261a","dept":"24","canton":"le Buisson des Cadouin","commune":"Urval","nom":"Urval_Bourlie","type":"Château","periode":"XIII-XV-XIX","histoire":"Deux châteaux à Urval, la Bourlie et Poujade.            La BOURLIE, en 1356 passe par alliances  de Jehanne de Commarques avec Jean de  Saint-Ours, en 1674 l'héritière de la Bourlie  Jeanne Suzanne de Saint-Ours épouse Jean de Montalembert. En 1808  revient aux Commarques par alliance de Jeanne de Commarque qui le possède toujours. Les héritiers du château de la Bourlie sont Cyril de Commarque, artiste passionné darchitecture et son épouse Ortensia Visconti di Modrone, écrivain. Tous deux philanthropes, amateurs dart et bons vivants bohèmes, ils insufflent naturellement leur vision décalée de la vie de château, dans une version du XXIe siècle.\r\nPOUJADE, une des plus imposantes chartreuses de Dordogne,  érigée par la famille des Saint-Ours, vieille maison de noblesse sarladaise qui possédait, outre la seigneurie dUrval. Suzanne de Saint-Ours épousa, en 1672, Jean de Montalembert et, lui apporta une partie des biens de sa famille. Leur descendante et héritière, Marie-Suzanne, épousa le Marquis de Commarque, en 1806. Passée à la famille Greenwell, dont lhéritière Georgina épousa Raymond de Commarque, La Poujade revient ainsi dans le giron familial. Pendant la seconde guerre mondiale, Gérard de Commarque perdit la vie à Buchenwald. A cette époque, avec laccord de madame de Commarque mère, le quartier général de lEtat-Major inter alliés et André Malraux sétaient installés à La Poujade. Le musée du Louvre, le musée de Nancy, le musée Ingres de Montauban et le musée du grand duché du Luxembourg avaient en outre choisi La Poujade pour mettre à labri certaines uvres majeures de la peinture française. Le comte Hubert de Commarque, actuel propriétaire, continue de maintenir et de faire partager cette demeure, ainsi que le château de la Bourgonie. En 1972, il a racheté les ruines de la forteresse médiévale de Commarque, berceau de sa famille, quil a ouvert au public en 2001 et quil continue de restaurer.","architecture":"La BOURLIE date du XIIIe  XVe au XIXe siècle. Son propriétaire actuel est la famille de Commarque. La mention la plus ancienne du lieu sous la forme « la Borrelia » remonte à 1459. Aux XVIIIe et XIXe siècles, le château se dote de terrasses, d'un jardin et d'un parc. Après une première inscription le 13/11/1973 limitée aux M.H. des façades et toitures du château, le château et son domaine (ses communs, ses dépendances, son parc et ses jardins) sont inscrits en totalité aux M.H. le 12/09/2005.  Le château  se compose d'un corps de logis principal cantonné de  deux pavillons carrés prolongé par une aile en équerre qui enserrent une cour, celle-ci est fermée  sur son quatrième côté par un mur de cloture percé d'une porte cochère et d'une porte piétonnière défendue par une tour cylindrique coiffée d'un toit en poivrière, dans la cour une tour hexagonale du XIe siècle abrite l'escalier à vis. Le château  est muni de solides défenses, des archères et des meurtrières sont percées dans les tours.                                                                                POUJADE, le corps principal accueille la maison, tandis que les ailes abritent écuries, orangerie et chais. Lintérieur de la Poujade a gardé son caractère tout à fait exceptionnel : voûtes, pilastres, colonnes, huisseries, majestueuses cheminées Louis XIV, tout concourt à créer une ambiance intime et mystérieuse. Le château de la Poujade est classé aux M.H.","habitants":"Poujade famille des Saint-Ours Famille Greenwell\r\n        \"","divers":"A Urval;  GPS : 44° 48' 04\" Nord et 0° 56' 57\" Est. Bourlie grav de 1 à 6. Poujade  grav 7-8","gps":"44° 48' 04\" Nord et 0° 56' 57\" Est. Bourlie grav de 1 à 6. P","images":["../image/image_24/24_Urval_Bourlie_1.jpg","../image/image_24/24_Urval_Bourlie_2.jpg","../image/image_24/24_Urval_Bourlie_3.jpg","../image/image_24/24_Urval_Bourlie_4.jpg","../image/image_24/24_Urval_Bourlie_5.jpg","../image/image_24/24_Urval_Bourlie_6.jpg","../image/image_24/24_Urval_Bourlie_7.jpg","../image/image_24/24_Urval_Bourlie_8.jpg"]},"Consult_chateau_formulaire3e2c":{"id":"Consult_chateau_formulaire3e2c","dept":"24","canton":"Brantôme","commune":"Valeuil","nom":"Valeuil","type":"Château","periode":"XVI-XIX","histoire":"A Valeuil, château des Andrivaux du XIXe siècle, des Biards du XVIIIe siècle, (voir article) des Granges du XIXe siècle, de Ramefort du XIIIe, XVe et XIXe siècles, inscrit au titre des M.H. en 1980 pour ses façades et toitures.\r\nGRANGES, un magnifique manoir du XIXe siècle, situé dans six hectares de pelouses boisées et les champs, en bordure de la Dronne. Aujourd'hui chambres  d'hôtes.                                                    ANDRIVAUX, est construit dans la deuxième moitié du XIXe siècle, à l'emplacement d'une ferme dont les dépendances agricoles sont conservées. La famille Rufray occupe le bâtiment au début du XXe siècle. Château édifié en moellon de calcaire enduit et pierre de taille, composé d'un rez-de-chaussée auquel on accède par un escalier tournant à deux volées, d'un étage carré et d'un étage de comble percé de trois lucarnes du côté sud. Rythmée par cinq travées, la façade sud présente une échauguette sur ses angles. L'ensemble de la toiture est couvert en ardoise.      RAMEFORT, les seigneurs de Ramefort sont cités une première fois au XIIe siècle  Vassaux des abbés de Brantôme, Pierre et Guillaume de Ramefort leur rendent hommage officiellement dans un acte de 1449. Passe aux Mourenne au XVIe siècle, aux Barriasson au siècle suivant, Eléonore  Bariasson épouse Jean Durand  qui hérite de Ramefort depuis le XVIIIe siècle. En 1789 habitée par Marie-Marthe Vesigne de la Rue  veuve de Jean Baptiste Durant de Ramefort toujours dans cette  famille.","architecture":"ANDRIVAUX, composé d'un rez-de-chaussée auquel on accède par un escalier tournant à deux volées, d'un étage carré et d'un étage de comble percé de trois lucarnes du côté sud. Rythmée par cinq travées, la façade sud présente une échauguette sur ses angles. L'ensemble de la toiture est couvert en ardoise.             RAMEFORT,  composée d'une tour maîtresse romane, batie sur le rocher et accompagnée d'une tour de guet. Le château est complété, après la guerre de cent ans, par un corps de logis à l'ouest, une grosse tour d'angle au nord-est avec une chapelle au sous-sol, et une tour d'escalier octogonale. Le châtelet d'entrée date aussi du XVe siècle, l'ancienne cour était fermée.  A la fin du XIXe  siècle, Dubet réhausse la tour octogonale, la couvre d'ardoises comme le logis et rajoute un nouveau bâtiment. Les années 1980 voient la surélévation du mur est de la tour maîtresse. Le corps de logis, percé de fenêtres à meneaux, jouxte la tour maîtresse cantonnée d'une tourelle circulaire. Une fenêtre trilobée et une niche dans la grande salle semblent être les seuls vestiges du XIIIe siècle. La circulation entre la tour primitive et le logis du seigneur est rendue possible par la tour de l'escalier à vis, couronnée par un toit conique protégé par de la tuile plate. A l'ouest, un second logis perpendiculaire est accolé à la tour octogonale. A l'est, la chapelle castrale, située au sous-sol, est surmontée d'une tour de plan carré. Le châtelet, couronné de mâchicoulis, protège l'entrée du château du côté nord, alors qu'une enceinte complétait l'à pic à l'Est et la douve sèche à l'ouest.","habitants":"Famille Rufray                                                                Pierre et Guillaume de Ramefort \r\n        \"","divers":"A Valeuil.  Andrivaux grav 1-2.   Granges grav 3GPS : 45° 19' 51,1\" Nord et 0° 35' 48,3\" Est.                Ramefort grav 4 à 7 GPS : 45° 20' 44\" Nord et 0° 37' 26,3\" Est","gps":"45° 19' 51,1\" Nord et 0° 35' 48,3\" Est.                Ramef","images":["../image/image_24/24_Valeuil_1.jpg","../image/image_24/24_Valeuil_2.jpg","../image/image_24/24_Valeuil_3.jpg","../image/image_24/24_Valeuil_4.jpg","../image/image_24/24_Valeuil_5.jpg","../image/image_24/24_Valeuil_6.jpg","../image/image_24/24_Valeuil_7.jpg"]},"Consult_chateau_formulaireebe9":{"id":"Consult_chateau_formulaireebe9","dept":"24","canton":"Saint-Aulaye","commune":"La Roche Chalais","nom":"Valouze","type":"Château","periode":"XIX","histoire":"VALOUZE, en 1407 les anglais occupent le château qui est repris en 1451 par le roi de France Charles VII ; François de Talleyrand est alors seigneur de Chalais et de La Roche. La châtellenie sera détachée de celle de Chalais au XVe siècle ; le château de La Roche est un lieu d'importance quand Isabeau de Talleyrand épouse en 1470 Jeannot de Lannes, vicomte de Belhade, dans les Landes. Est-ce à cette époque que l'on a rajouté « Chalais » au nom de la seigneurie de La Roche. Le château de la Valouze est une bâtisse du XIXe siècle, située dans la commune de La Roche-Chalais en Dordogne. Le domaine de La Valouze recouvre une ancienne métairie du marquisat située sur la paroisse de Saint-Michel-de-Rivière.  Gustave de Saint-Laud en fut le premier propriétaire.","architecture":"VALOUZE, la construction du château de la Valouze date de 1861. Il est de type logis, le domaine de La Valouze recouvre une ancienne métairie du Marquisat située sur la paroisse de Saint-Michel-de-Rivière. Bâti pour le baron Gustave Arlot de Saint-Saud au milieu d'une propriété de 55 hectares, l'ensemble de la construction présente une symétrie parfaite. Le boisement du parc comprend des espèces exotiques : des cyprès chauves, un ginkgo biloba, des eucalyptus associés aux pins et aux chênes-lièges. Durant l'occupation allemande, le château de la Valouze fut occupé par les services de la commandantur. Après leur départ, les légitimes propriétaires constatèrent les déprédations, dont la disparition de toutes les pièces de monnaie qui, posées sur le listel, recouvraient le parquet d'une salle du château de la Valouze.","habitants":"Famille de  Gustave Arlot de Saint-Saud \r\n        \"","divers":"A La Roche Chalais;                        Valouze GPS : 45° 08' 30\" Nord, 0° 00' 16\" Est","gps":"45° 08' 30\" Nord, 0° 00' 16\" Est","images":["../image/image_24/24_Valouze_1.jpg","../image/image_24/24_Valouze_2.jpg","../image/image_24/24_Valouze_3.jpg","../image/image_24/24_Valouze_4.jpg"]},"Consult_chateau_formulaireab71":{"id":"Consult_chateau_formulaireab71","dept":"24","canton":"Ribérac","commune":"Vanxains","nom":"Vanxains","type":"Château","periode":"XV-XVIII-XIX","histoire":"à Vanxains, château de la Brangelie du XVe et XVIIIe siècles, château des Farges du XVe et XVIIIe siècles, château Trompette du XIXe siècle, Maison de Sufferte, au bourg\r\nTROMPETTE une ferme existait à Trompette avant la construction du \"château\" au cours du XIXe siècle, pour la famille de Laage. La construction  date du XIXe siècle. Les actuels résidents du château sont la famille Riom.","architecture":"SUFFERTTE, sa construction daterait du XVIe siècle. L'édifice aurait été édifié, pour les Joumard, pour servir de dépendance au château de Sufferte. C'est à partir du XVIIe siècle que s'y installèrent les archiprêtres de Vanxains. Le premier, Jean Dumonteil en prit possession, le 5/02/1669,  c'est un édifice de plan rectangulaire irrégulier, qui s'étage sur 2 niveaux et un comble à surcroît. Il est construit en moellon de calcaire et recouvert en tuiles creuses. Il est cantonné au Sud par une tour polygonale en pierre de taille qui s'élève sur 3 nivaux et coiffée d'un toit polygonal en tuiles.                                                                        TROMPETTE, à 1km au Nord-Est du bourg de Vanxains,  Le château est composé d'un ensemble rectangulaire, dominé de 3 tours, dont une ronde au Nord-Ouest, et 2 tours carrées, au Sud et au Nord-Est, au toit en pavillon recouvert de tuiles flamandes, la seconde tour carrée au milieu de la façade Sud, couverte en tuile plate. Toutes les baies sont alignées verticalement. L'entrée principale se situe sur le pignon Ouest. Une terrasse surélevée en pierre de taille prolonge le bâtiment à l'Est.","habitants":"Famille de Laage\r\n        \"","divers":"A Vauxains: Sufferte grav 1 GPS : 45° 13' 00\" Nord, 0° 17' 17\" Est.                           Trompette grav 2-3 GPS : 45° 13' 25,8\" Nord, 0° 17' 44,2\" Est","gps":"45° 13' 00\" Nord, 0° 17' 17\" Est.","images":["../image/image_24/24_Vanxains_1.jpg","../image/image_24/24_Vanxains_2.jpg","../image/image_24/24_Vanxains_3.jpg"]},"Consult_chateau_formulaire7ec1":{"id":"Consult_chateau_formulaire7ec1","dept":"24","canton":"Buissière-Badil","commune":"Varaignes","nom":"Varaignes","type":"Château","periode":"XIII-XIV-XVI","histoire":"VARAIGNES, en 1280, Robert de Montbron est seigneur de Varaignes. Antoinette de Montron héritière épouse en 1454 Gauthier de Pérusse seigneur des Cars de la Vauguyon, de la Coussière, de Roussines, de la Tour de Bar, du Repaire et de la Baronnie de St Germain-Vienne, sans descendance directe Varaignes passe à une nièce Marie de Montbron qui s'allie en 1498 à un autre Pérusse sénéchal du Périgord ce dernier meurt en 1550, un des fils François épouse Isabelle de Bourbon de Carency leur fils Jean marié à Anne de Clermont-Tonnerre sera à l'origine de la construction du château Renaissance. Diane de Pérusse, dame de Varaignes porte la seigneurie à la famille de la Maule, après sa mort en 1611 les héritiers ne gardent pas le château qui passera successivement aux Moreau, aux Géraud de Langalerie, aux Marandat puis aux Du Verger et propriété  de la commune en 1968.  Le château communal est inscrit à l'inventaire des bâtiments de France. Il a été restauré grâce aux efforts du syndicat d'Initiative et du Foyer d'Animation Culturelle de Varaignes qui ont reçu le 1er prix du Concours National d'Antenne \"Chef d'uvres en Périls en 1981\" des mains du ministre de la Culture. Le château accueille maintenant l'atelier musée des tisserands et de la charentaise (pantoufle) qui retrace l'histoire du textile de la région au XIXe et XXe siècles à travers la reconstitution d'une maison de tisserand et de différents métiers à tisser et machines à filer et à fabriquer des charentaises propriété de la commune.","architecture":"VARAIGNES, quadrilatère avec une grosse tour au nord , un donjon au sud-ouest, le tout entourant une cour intérieure, les murailles surmontée de chemin de rondes crénelées la construction de ce château a commencée au XIIIe siècle, comme en témoigne son puissant donjon, puis s'est poursuivie en empruntant des éléments architecturaux caractéristiques de chaque période du XIVe au XVIe siècle.\r\nA l'abandon, il a été acheté par la commune en 1965 L'intérêt archéologique de ce château tient au fait qu'il permet d'embrasser l'évolution de l'architecture locale : architecture du donjon carré du XIVe et XVe siècle, architecture gothique de la tour hexagonale du XVe siècle et façade de la cour intérieure  du XVIe siècle d'inspiration Renaissance italienne. Le château actuel était le cur d'une enceinte de défense dont la dernière tour, à l'emplacement de la poste a été détruite en 1920 et restauré avec le concours bénévole de la population qui a obtenu en 1981 le premier prix du concours des chefs d'oeuvres en péril.\r\nIl est inscrit à l'inventaire des M.H.depuis 1948.","habitants":"Famille de Gauthier de Pérusse                           Famille de la Maule\r\n        \r\n        \"","divers":"Forteresse de Varaignes GPS : 45° 35' 56\" Nord, 0° 31' 54\" Est","gps":"45° 35' 56\" Nord, 0° 31' 54\" Est","images":["../image/image_24/24_Varaignes_1.jpg","../image/image_24/24_Varaignes_2.jpg","../image/image_24/24_Varaignes_3.jpg","../image/image_24/24_Varaignes_4.jpg"]},"Consult_chateau_formulairefb5c":{"id":"Consult_chateau_formulairefb5c","dept":"24","canton":"Champagnac de Belair","commune":"Quinsac","nom":"Vaugoubert","type":"Château","periode":"XVIII","histoire":"VAUGOUBERT, la construction du château de Vaugoubert date du XVIIIe au XIXe siècle.  Antoine d'Aydie naquit en 1687, qui, familier de la duchesse du Maine, ourdit un complot avec l'ambassadeur d'Espagne pour faire emprisonner Philippe d'Orléans et le remplacer par Philippe V d'Espagne. Le complot fut découvert à temps mais Antoine d'Aydie eut le temps de gagner l'Espagne où, en reconnaissance, Philippe V le nomma vice-roi de Castille. Amnistié, il revint vers 1730 et construisit le château de Vaugoubert actuel. Le  château de Vaugoubert est inscrit aux M.H. depuis le 6/12/1948,  chambres dhôtes propriété de Fanny et Richard Déroulède.","architecture":"VAUGOUBERT est implanté sur la rive droite de la Dronne, dont il surplombe la vallée, à moins d'un kilomètre au Sud-Ouest de Quinsac. De l'ancien château  du XVe siècle, il subsiste depuis deux  tours d'enceinte. Le logis principal, bâti au XVIIIe siècle par Antoine d'Aydie, a fait l'objet d'une restauration au siècle suivant.","habitants":"Famille Antoine d'Aydie\r\n        \"","divers":"Vaugoubert GPS : 45° 25' 28,3\" Nord, 0° 41' 47,3\" Est","gps":"45° 25' 28,3\" Nord, 0° 41' 47,3\" Est","images":["../image/image_24/24_Vaugoubert_1.jpg"]},"Consult_chateau_formulaire2259":{"id":"Consult_chateau_formulaire2259","dept":"24","canton":"Hautefort","commune":"Cherveix-Cubas","nom":"Vaure_24","type":"Château","periode":"XVI-XVII","histoire":"VAURE  a été construit entre la fin du XVIe siècle et le début du XVIIe.                                                             Tour d'AUSONNE: le manoir qui abrite la mairie a été construit sur les ruines d'une villa gallo-romaine qui aurait appartenu au poète Ausone.","architecture":"VAURE  a été construit entre la fin du XVIe siècle et le début du XVIIe. Il est entouré de douves avec murs d'escarpe et de contrescarpe (murs qui bordent le fossé côté château et côté campagne) sur 3 côtés. Il se compose de 3 corps de bâtiments formant une cour carrée avec 3 gros pavillons carrés aux angles. L'édifice est inscrit au titre des M.H.                           Tour d'AUSONNE: ce manoir a été construit au XVe siècle par les moines bénédictins de l'abbaye de la Sauve Majeure résidance du prieur de Ruch. La tour à pans coupés abrite un escalier à vis,  les fenêtres à meneaux arborent de très belles têtes sculptées. A l'arrière du bâtiment, une mini tour et des fenêtres à meneaux dont une finement sculptée.","habitants":"Famille d'Ausone\r\n        \"","divers":"A Cherveix-Cubas grav de 5 à 9.Ausonne grav 4 .Vaure grav 1à3","gps":"","images":["../image/image_24/24_Vaure_24_1.jpg","../image/image_24/24_Vaure_24_2.jpg","../image/image_24/24_Vaure_24_3.jpg","../image/image_24/24_Vaure_24_4.jpg","../image/image_24/24_Vaure_24_5.jpg","../image/image_24/24_Vaure_24_6.jpg","../image/image_24/24_Vaure_24_7.jpg","../image/image_24/24_Vaure_24_8.jpg","../image/image_24/24_Vaure_24_9.jpg"]},"Consult_chateau_formulaire7e46-2":{"id":"Consult_chateau_formulaire7e46-2","dept":"24","canton":"Verteillac","commune":"Vendoire","nom":"Vendoire","type":"Château","periode":"XVII-XVIII","histoire":"VENDOIRE,  a été édifié aux XVIIe et XVIIIe siècles et restauré au XIXe siècle.  Le bourg de Vendoire, qui fut choisi comme nouveau chef-lieu et non plus le site de l'ancienne motte où un château-fort fut construit au XVe siècle accueillit un premier château, dit de Bourzac, élevé au milieu du XVIe siècle. Détruit depuis 1930 on avait conservé l'ancienne cuisine jusqu'à cette date, il était situé à l'emplacement de l'actuel château de Vendoire. Ce dernier a sans doute été construit à la fin du XVIIe siècle par l'un des descendants des La Cropte, François-Isaac, comte de Bourzac. Il passa à la famille Bouilhac en 1782, puis aux Simonnet au milieu du XIXe siècle.","architecture":"VENDOIRE, la demeure fit l'objet de travaux de rénovation à la fin du XIXe siècle; c'est à cette époque que la décoration sculptée des frontons fut reprise. Ce château de style classique situé à proximité de l'église paroissiale, domine des prairies à l'ouest. La demeure est composée d'un corps de logis central à un étage carré couvert par un toit à deux pans, flanqué de deux importants pavillons de plan  rectangulaire; ces derniers, coiffés d'un toit brisé à croupes, sont percés par des lucarnes dont la facture est du XVIIIe siècle. La façade occidentale dominant un perron à balustres adopte le même schéma que la façade sur cour,  une balustrade court au dessus de l'étage carré du corps de logis, interrompue pour accueillir le fronton semi-circulaire surmontant la travée centrale. De chaque côté de l'édifice, le fronton est sculpté de têtes de lions, de guirlandes et du caducée séparant 2 blasons ovales insérant les  initiales E.S. (Edme Simonnet) et E.K. (Emily Kew). Les dépendances agricoles ont été reconstruites un peu plus à l'écart du château, pilastres supportant un fronton triangulaire.","habitants":"Famille de La Cropte\r\n        \"","divers":"Vendoire GPS : 45° 24' 58\" Nord, 0° 18' 13\" Est","gps":"45° 24' 58\" Nord, 0° 18' 13\" Est","images":["../image/image_24/24_Vendoire_1.jpg","../image/image_24/24_Vendoire_2.jpg"]},"Consult_chateau_formulaire686a":{"id":"Consult_chateau_formulaire686a","dept":"24","canton":"Montignac","commune":"Thonac","nom":"Vermondie","type":"Château","periode":"XIII","histoire":"VERMONDIE, édifié au sommet d'une colline à proximité de la Vézère, ce lieu est caractérisé par le fait que s'y trouvent, côte à côte, une tour gallo-romaine et un petit manoir dont l'origine est incertaine mais qui présente les traces de modifications structurelles importantes réalisées au cours des siècles, depuis le XIIe siècle ou même avant  jusqu'à une époque récente. À différentes périodes de son histoire, le manoir devait en fait être un véritable château plus important car la famille seigneuriale du lieu contrôlait un vaste territoire allant jusqu'aux terres de Fanlac où naquit Jacquou le Croquant, et comprenant le château d'Auberoche et le château du Sablou.  Autrefois, le seigneur de la Vermondie voulait marier sa fille Ermandine (ou Armandine) au riche seigneur de Losse mais la belle aimait un jeune troubadour et ne voulait pas du mariage décidé par son père. Furieux, ce dernier enferma lamoureuse rebelle au sommet de la tour. Chaque jour, le troubadour venait jouer du luth au pied de la prison de la belle, jusquà ce que la grosse tour se penche jusquau sol pour permettre aux amoureux déchanger le baiser des épousailles. Il y a longtemps, languissait dans la tour du vieux Castel un prince infortuné.","architecture":"VERMONDIE, présente la particularité qu'on y trouve dans son cellier, à mi-hauteur de la descente d'un puits circulaire, le départ d'un réseau de souterrains creusés en partie dans la roche. Malgré les éboulements qui les obturent totalement, on distingue clairement l'amorce de trois conduits partant en éventail. L'un d'eux se dirige visiblement vers la tour, les deux autres semblent orientés vers les champs alentour, peut-être pour servir de moyens d'évasion ou de contre-attaque dans le dos des assaillants en cas de siège du bâtiment principal. En raison de l'origine gallo-romaine de la tour qui le côtoie, on peut penser que la bâtisse qui forme la partie la plus ancienne du manoir actuel a pu être, à l'origine, un petit fortin militaire gallo-romain édifié en même temps que la tour et qui aurait été démantelé et reconstruit différemment maintes fois au cours des âges, car un assez grand nombre des pierres qui le constituent semblent contemporaines de celles de la tour. Située sur les hauteurs du village de Thonac, la Tour penchée de la Vermondie faisait probablement partie intégrante du système des points de guet mis en place pour la surveillance de la Vézère. Ici dite démantelée en 732 par les Sarrazins mais ailleurs se réclamant dune construction au XIIIe siècle, elle fait aujourdhui partie dun superbe domaine privé qui longe la route reliant Plazac mais son inclinaison rappelle quelle abrita antan une bien jolie histoire damour dont les récits diffèrent selon les époques.","habitants":"Famille de la Vermondie\r\n        \"","divers":"A Thonac château de Vermondie","gps":"","images":["../image/image_24/24_Vermondie_1.jpg","../image/image_24/24_Vermondie_2.jpg","../image/image_24/24_Vermondie_3.jpg","../image/image_24/24_Vermondie_4.jpg","../image/image_24/24_Vermondie_5.jpg"]},"Consult_chateau_formulaire43a3":{"id":"Consult_chateau_formulaire43a3","dept":"24","canton":"Verteillac","commune":"Verteillac","nom":"Verteillac","type":"Château","periode":"XVI-XVII-XIX","histoire":"A Verteillac celui de Verteillac à disparu, le château du Breuil du XVIe et XVIIe siècles, de la Grénerie du XIXe siècle, et  de la Meyfrenie du XIXe siècle, inscrit au titre des M.H.                                                               BREUIL,  demeure des Lageard de Grézignac et ensuite la famille Debord                                        MEYFRENIE, construit à l'emplacement d'un ancien manoir du XVe siècle attribué aux Pontbriand, aux Lelong au XVIe siècle premier consul de Périgueux, sans descendance passe, au courant du XVIIe siècle à son neveux à François de  Massacré seigneur de Fonpitou, en 1752 cède le domaine aux Lafon, Joseph Lafon sieur du Cheylard et de Lussac à sa mort laisse le domaine à son fils Jean avant son décés en 1828 , un terrible incendie ravage la Meyfrenie et passe par héritage à son neveu  Jean Antoine Pasquy du Cluseau,  qui fait reconstruite les dépendances à l'écart peu après à l'initiative de Jean-Antoine Pasquy du Cluseau. sa veuve meurt en 1897 aprés avoir légué la propriété à l'un de ses neveux Elzéard Deshorties de Beaulieu les descendants de ces dernier cédent La Meyfrenie  en 1920 aux Guinard aprés leur disparition le château passe, à leur fille aînée madame Ferréol de la Ville.                                                                GRENERIE,   ancienne propriété d'Etienne Courcelle Devignaud     et son épouse Marie Delugin, en 1872 vente du domaine.                                                     VASSALDIE, fut construite au  début XVIIIe siècle  par une branche de la famille de Vassal, originaire du Rouergue, arrivée à la fin de la guerre de cent ans avec les troupes françaises. La particularité de la Vassaldie est d'être intact extérieurement depuis sa construction. Elle est inscrite au M.H.","architecture":"BREUIL, du XVIIe siècle, la tour d'escalier plus ancienne, les parties défensives ont été démolies à la Révolution.                                                             GRENERIE, du XIXe siècle à remplacé un ancien manoir du haut Moyen-Âge, construit en pierre de taille et moellon de calcaire enduit le corps de logis orienté à l'Est sur un surélévement, le rez de chaussée est surélevé et l'étage carré précédé d'un étage de comble couvert d'ardoises de part et d'autre s'élèvent deux pavillons à deux étages.                                 MEYFRENIE, côté Est le corps de logis classique, en pierre de taille et moellon de calcaire enduit,est composé d'un corps central avec fronton, protégé par un toit à deux pans couvert en tuile creuse. Il est flanqué de deux pavillons, dont l'un du début du XIXe siècle. Le second, au sud, doit intégrer un fond médiéval, son plan répondant à une première tour carrée située à l'arrière de la demeure. La façade ouest englobe des volumes des XVe et XVIe siècles; ainsi une ancienne tour carrée à deux étages est reliée au corps de logis par l'échauguette contenant la tourelle d'escalier. Une tour ovale fut ajoutée à l'angle sud-ouest de l'édifice au XVIIe siècle.  Le logis fut transformé au XVIIe siècle, le côté Est, reconstruit au XVIIIe siècle en façade classique avec des dépendances face à celle-ci formant une cour fermée. Le plan d'ensemble laisse à penser que le château conserve la physionomie de l'ancienne maison-forte de la fin du XVe siècle bien que noyée dans les transformations postérieures. Le château conserve encore le volume de deux tours carrées qui jouxtaient à l'origine un corps de logis rectangulaire.","habitants":"Famille Debord                                                         Famille de Joseph Lafon                                       Famille d'Etienne Courcelle Devignaud                 Famille de Vassal          \r\n        \"","divers":"A Verteillac  Breuil grav 2, la Grénerie grav 3-4,  la Meyfrenie grav 5 -6, Vassaldie grav 8.","gps":"","images":["../image/image_24/24_Verteillac_1.jpg","../image/image_24/24_Verteillac_2.jpg","../image/image_24/24_Verteillac_3.jpg","../image/image_24/24_Verteillac_4.jpg","../image/image_24/24_Verteillac_5.jpg","../image/image_24/24_Verteillac_6.jpg","../image/image_24/24_Verteillac_7.jpg","../image/image_24/24_Verteillac_8.jpg"]},"Consult_chateau_formulaire4074":{"id":"Consult_chateau_formulaire4074","dept":"24","canton":"Carlux","commune":"Veyrignac","nom":"Veyrignac","type":"Château","periode":"XV-XVI-XVIII","histoire":"Château de Rocanadel (ruines du), XVe et XVIe siècles, inscrit au titre des M.H.depuis 1948.  Veyrignac du XVIIIe siècle, inscrit au titre des M.H.depuis 1962.\r\nROCANADEL, cet antique manoir relevait au XIVe siècle de Domme.  Propriétéde la famille Cournil au XVe siècle, il passa ensuite aux Durfort-Prouillac  et aux Massaut.                                                       VEYRIGNAC,   il a appartenu successivement à la famille Labrousse, aux Terme, aux Durfort-Duras, aux Pascal, aux Génis, et aux Prin.    L'édifice a été incendié par les allemands durant la seconde guerre mondiale, restauré depuis, uvre de Gilles Sermadiras de Pouzols de Lile.","architecture":"ROCANADEL, cet antique manoir relevait au XIVe siècle de Domme. Selon une tradition, des souterrains le relieraient au château de Milhac, dans le Lot. Les vestiges présentent des remparts en ruine épaulés par une tour ronde de défense. Corps de logis avec tour carrée centrale du XVIe siècle et grosse tour d'angle ronde à corbeaux du XVe. Porte d'entrée et cheminées Renaissance.                                                                     VEYRIGNAC, il devait y avoir un château au XVe siècle dont témoignent encore deux tours rondes dans la cour. L'édifice a été reconstruit au XVIIIe siècle sur les plans de Soufflot, mais il est presque certain que ces plans ont été modifiés en ce qui concerne la façade sur la rivière. Sur la cour, le corps de logis est composé d'un rez-de-chaussée, d'un étage et de mansardes. La porte d'entrée sur perron, arrondie, est encadrée de pilastres à une agrafe au centre. Le rez-de-chaussée était entièrement voûté d'arêtes. Deux pavillons en avancée ayant deux étages, terminent la façade sur cour, l'édifice présente un corps de logis encadré de deux pavillons et une chapelle.","habitants":"Famille Cournil\r\n        \r\n        \"","divers":"Veyrignac  Grav 1 à 3, GPS : 44° 49' 59\" Nord, 1° 18' 37\" Est. Rocanadel grav 5","gps":"44° 49' 59\" Nord, 1° 18' 37\" Est. Rocanadel grav 5","images":["../image/image_24/24_Veyrignac_1.jpg","../image/image_24/24_Veyrignac_2.jpg","../image/image_24/24_Veyrignac_3.jpg","../image/image_24/24_Veyrignac_4.jpg"]},"Consult_chateau_formulaire69a6":{"id":"Consult_chateau_formulaire69a6","dept":"24","canton":"Mareuil","commune":"Vieux-Mareuil","nom":"Vieux_Mareuil","type":"Château","periode":"XV-XVII","histoire":"A Vieux-Mareuil, château transformé en hôtel, de Marafy du XVIIIe siècle, Chanet du XVIIe siècle, inscrit au titre des M.H.,  Fronsac du XVIIe siècle            VIEUX-MAREUIL, sous l'ancien régime,  appartient à la baronnie de Mareuil. Il n'a jamais constitué une seigneurie. En 1789, la baronnie de Mareuil appartient à la famille de Talleyrand. M. de Talleyrand y avait un droit de justice, délégué au juge des paroisses de la baronnie et percevait la moitié des dîmes. Le bénéfice de Vieux-Mareuil n'était pas important. \r\nCHANET, François Dubreuil, écuyer, sieur de Chanet. Avec Françoise de La Roussie de Bonreceuil, veuve, elle revient habiter le château de Bonreceuil où elle se remarie en 1641 avec Pierre Alabert de La Borie, conseiller du Roi. le fils de François, Jean Dubreuil, écuyer, sieur de Chanet qui épouse Thérèse Etourneau  qui lui donne François en 1654 et Françoise en 1658   dernier cité est Françoise de La Garde de Mirabel.  La lignée des Lacroze de Chanet,  ses filles avec « Jeanne de Lacroze, demoiselle de Chanet et Catherine de Lacroze, dame de Chanet qui épousent en 1713 et 1721 dans léglise de Vieux Mareuil respectivement Pierre Joseph de Froydefont, écuyer, seigneur des Farges et Léonard Durand (de Brantôme) avocat à la cour.   propriétaire en 1881 est madame Desmaisons .\r\n MARAFY  Le château de Marafy est situé au curdune vaste forêt ponctuée de ruisseaux et détangs, c'est une remarquable demeure au style méridional. Elle est construite en pierre de taille au début du XVIIIe siècle. Le château mêle classicisme français et influences baroques, les façades sont animées par des jeux dombre et de lumière créés par des corniches, des pilastres, des bandeaux et décrochements. Lensemble est harmonieux et régulier. De nombreuses modifications intérieures ont été réalisées, notamment le grand escalier reconstruit au XIXe siècle.","architecture":"CHANET, un premier bâtiment, le logis nord, flanqué d'une tour d'escalier, fut édifié à la fin du XVe siècle ou au tout début du XVIe siècle. D'importants travaux d'agrandissement sont entrepris dans la seconde moitié du XVIe siècle ou au début du XVIIe siècle: creusement de fossés ; construction d'une tour carrée couronnée de  mâchicoulis, et d'un deuxième logis (aile sud) ; mise en place de bâtiments à l'est clôturant l'accès de la demeure ; organisation d'un jardin à l'Est. Après ces travaux, construction d'un gros pavillon reliant le logis nord à la tour carrée, et de l'aile Est couronnée d'une chapelle au décor peint. D'importantes destructions ont eu lieu après 1824.  CHAVEROCHE, sur l'emplacement d'un manoir médiéval dont on retrouve encore quelques vestiges, au nord ouest  offre deux ailes soudées à angle droit par une tour carrée; défenses et traces de courtines y apparaissent çà et là. Ce fut le fief de la famille de Morelon.                                                                           FRONSAC appartenait aux grand parents des époux Rouanet, famille Puyjarin et Alphonse et des Roches de Chassay Marie puis par succession des Rouanet les derniers propriétaire les Puyjarinet Aubi et Teissier Elisse","habitants":"famille deTalleyrand                                                        Chaveroche famille de Morelon.                         Fronsac Famille Puyjarinet\r\n        \"","divers":"a Vieux-Mareuil;  Chanet  grav  1à3,  Chaveroche grav 4 à 6, Fronsac Grav 7,  Marafy grav 8-9GPS : 45° 25' 56\" Nord, 0° 30' 01\" Est","gps":"45° 25' 56\" Nord, 0° 30' 01\" Est","images":["../image/image_24/24_Vieux_Mareuil_1.jpg","../image/image_24/24_Vieux_Mareuil_2.jpg","../image/image_24/24_Vieux_Mareuil_3.jpg","../image/image_24/24_Vieux_Mareuil_4.jpg","../image/image_24/24_Vieux_Mareuil_5.jpg","../image/image_24/24_Vieux_Mareuil_6.jpg","../image/image_24/24_Vieux_Mareuil_7.jpg","../image/image_24/24_Vieux_Mareuil_8.jpg","../image/image_24/24_Vieux_Mareuil_9.jpg"]},"Consult_chateau_formulaire951d":{"id":"Consult_chateau_formulaire951d","dept":"24","canton":"Sigoulés","commune":"Le Monestier","nom":"Vigiers_Monestier","type":"Château","periode":"XVI","histoire":"VIGUIERS, construit entre 1597 et 1620, a été aménagé en hôtel-restaurant de luxe avec golf, est situé dans un magnifique domaine du XVIe siècle. Fief créé, sous Louis XIV, par les seigneurs de Saussignac en faveur d'un cadet de la maison du Vigier de Saint-Martin (d'où son nom). Il passa plus tard à la famille de Gervain qui construisirent le chateau actuel.\r\nAprés la Révolution, le château a appartenu à la famille du Pont du Chambon.\r\n Le domaine de La Tour, fut possédé dés le début du XIXe siècle par M. de Masmontet de Fonpeyrine. Celui ci fut longtemps maire de Monestier. Il a appartenu par la suite à sa petite fille, Mme de Cartier, dont le premier ancêtre fut Jacques Cartier, navigateur célèbre sous François Ier (1535) qui remonta le fleuve St Laurent et découvrit le Canada.","architecture":"Bouzely : cet ancien manoir évoque le souvenir de l'illustre famille de Ségur qui l'a longuement habité et possédé.\r\nLa Tour d'Arfond : Rappelle l'existence d'un antique manoir dont toute trace a disparu. Des vestiges subsistaient encore en 1684.\r\nLes Baudris ou Beaudrys : La famille Abre, anoblie par Louis XIII, habitait cette demeure en 1684. Au début du XVIIIe siècle, cette propriété appartenait aux Condom, proches parents des Brugière de La Tour.   Capblanc ou les Cablans : ( plus anciennement Le Cluzel)    Jean Albert se qualifiait sieur des Cablans en 1650. Cette famille a longuement possédé le fief de Saint-Germain aujourd'hui sur la commune de Saussignac. Elle a donné de nombreux officiers, un consul de Sainte-Foy en 1363 et un conseiller au présidial, maire de Bergerac en 1650.\r\nLes Chagnauds : château moderne situé à la sortie de Coutures, vers Sainte-Foy. Cette importante exploitation agricole et vinicole était possédée par la famille de Monicourt.","habitants":"Vigiers  famille de Gervain                                            Tour M. de Masmontet de Fonpeyrine\r\n        \"","divers":"A Le Monestier grav 1 à 5","gps":"","images":["../image/image_24/24_Vigiers_Monestier_1.jpg","../image/image_24/24_Vigiers_Monestier_2.jpg","../image/image_24/24_Vigiers_Monestier_3.jpg","../image/image_24/24_Vigiers_Monestier_4.jpg","../image/image_24/24_Vigiers_Monestier_5.jpg"]},"Consult_chateau_formulairef1f6":{"id":"Consult_chateau_formulairef1f6","dept":"24","canton":"Riberac","commune":"Villetoureix","nom":"Villetoureix","type":"Château","periode":"XVII","histoire":"A Villetoureix, le château de la Rigale du XVIIe siècle, dont la tour gallo-romaine, datant du Haut Empire romain, est classée M.H. depuis 1905.\r\nde Fayolle et sa chapelle du XIXe siècle. Le manoir de Champagnou, du XIXe siècle.\r\nFAYOLLE  appartenait aux Monteil en 1819 comme l'atteste un plan terrier de cette époque.             RIGALE, au Moyen-Age appartenait  à la famille de Saint-Aulaire en 1667 leur fille Tison d'Argence l'apporta en dot à Jean d'Abzac,  au XVIIe siècle, les seigneurs de Beaupoil de Saint-Aulaire font bâtir le corps de logis attenant à la tour. Aux XIXe et XXe siècles, la château propriété des Abzac de Ladouze, des Beauroyre puis des Roquemaurel,  Le domaine appartient actuellement à la famille de Castellane.","architecture":"FAYOLLE  le logis principal date du XVIIIe siècle, la charretterie et la chapelle de la seconde moitié du XIXe siècle, les maisons d'habitation encadrant la cour ont été bâties vers 1930. Le logis est composé d'un corps central rectangulaire couvert d'un toit à deux pans et d'une croupe au sud en tuile creuse. Il est jouxté de deux pavillons coiffés de toits en pavillon en tuile plate. Le logis possède deux niveaux d'habitation. L'ensemble est complété par des habitations au nord-est et au sud-est. L'angle nord-ouest est occupé par deux bâtiments en équerre,  La chapelle, de plan rectangulaire, est composée de deux travées voûtées darêtes. La façade, où se situe un portail surmonté d'un oculus, et le chevet, percé d'un triplet de baies, sont plats et forment des pignons découverts. Des contreforts talutés rythment les angles de l'édifice ainsi que ses murs gouttereaux. Ceux-ci sont percés de deux baies symétriques. \r\n RIGALE, le château s'est constitué autour des vestiges d'une cella gallo-romaine. Celle-ci, bâtie vers le IIe siècle de notre ère, est une réplique à moindres dimensions de la tour de Vésone. Edifice constitué des vestiges d'un temple gallo romain, aménagé en tour d'habitation à trois étages, accolé à l'est d'un corps de logis rectangulaire. Tour en petit appareil et assises de briques, surmontée d'un toit conique en tuiles plates. Le logis est couvert d'une toiture brisée avec terrasson en tuile creuse et brisis en tuile plate et recevant les lucarnes des combles. Elle est aménagée en habitation dès le XVIe siècle subit des aménagements comme l'ajout de lucarnes, d'un escalier monumental, de meneaux sur les baies de la tour et de porte fenêtres sur les façades.","habitants":"Famille des Monteil                                                     famille de saint-Aulaire\r\n        \"","divers":"A Villetoureix; la Fayolle grav 1 à 3, Rigale grav 4 à 6.","gps":"","images":["../image/image_24/24_Villetoureix_1.jpg","../image/image_24/24_Villetoureix_2.jpg","../image/image_24/24_Villetoureix_3.jpg","../image/image_24/24_Villetoureix_4.jpg","../image/image_24/24_Villetoureix_5.jpg","../image/image_24/24_Villetoureix_6.jpg"]},"Consult_chateau_formulaire5b66":{"id":"Consult_chateau_formulaire5b66","dept":"24","canton":"Sarlat la Canéda","commune":"Vitrac","nom":"Vitrac_24","type":"Château","periode":"XVII-XVIII","histoire":"Le château de Montfort (voir article). Le château de Vitrac, à côté de l'église. Le manoir des Vayssières des XVe et XVIe siècles, inscrit au titre des M.H en 1970 pour ses façades et toitures.\r\nROCHEBOIS  transformé en hôtel de luxe par monsieur Louis de Van de Walle\r\nGRIFFOUL, Le village est composé de trois sites distincts: le vieux bourg, le hameau de Montfort et le port. La commune possède un important patrimoine castral avec pas moins de sept châteaux et manoirs répartis sur son territoire, et parmi eux le château de Griffoul, ancienne demeure des Griffoul de Laroque, des Grézel, des Hauts-Champs et des Saint-Ours.\r\nDe ce manoir déjà cité en 1491, on parle alors de Griffolium, il subsiste des tours découronnées encadrant un logis, très retouché, à côté d'une tourelle carrée à colombages, le tout construit aux XVIIe et XVIIIe siècles, dominant la Couze du haut d'un promontoir rocheux.","architecture":"Le château de MAS-ROBERT est un château bâti à Vitrac, sa construction date du XVIe au XVIIe siècle.     VAYSSIERES, la construction du manoir des Vayssières date des XVe et XVIIIe siècles. Le manoir eut pour origine un prieuré de l'ordre de Grandmont, fondé vers 1140-1145. Il a appartenu en premier au Diocèse de Sarlat. Par la suite, il fut uni au Prieuré de Francou en Quercy. Abandonné en 1370, il tomba en ruine. Au XVe siècle, fut bâti à côté du prieuré, un petit manoir propre à résister aux pillards. L'habitation comporte un corps de logis d'un étage sur rez-de-chaussée, avec un pavillon en retour à chaque extrémité, côté façade principale. Le quatrième côté du quadrilatère ainsi formé, devait à l'origine comporter une muraille. L'accès se faisait alors par le côté Ouest. Au centre de la façade, une tour ronde renferme l'escalier. Une autre renforce l'angle Sud-Ouest. La façade postérieure et la tour d'angle ont été repercées au XVIIIe siècle. L'intérieur a conservé ses plafonds peints du XVIIIe siècle, à décor de rinceaux et feuillage en grisaille, sur fond jaune pâle. Le manoir est inscrit partiellement aux M.H. pour ses façades et toitures, depuis le 23/09/1970.                                    ROCHEBOIS édifice de plan rectangulaire à trois niveaux toit en ardoise en croupe.","habitants":"monsieur Louis de Van de Walle\r\n        \"","divers":"A Vitrac ; Griffouls  grav 3 - 4.        Marobert grav 5. Rochebois grav 6 .Vayssières  grav 7 GPS : 44° 50' 18,4\" Nord, 1° 12' 2,3\" Est.","gps":"44° 50' 18,4\" Nord, 1° 12' 2,3\" Est.","images":["../image/image_24/24_Vitrac_24_1.jpg","../image/image_24/24_Vitrac_24_2.jpg","../image/image_24/24_Vitrac_24_3.jpg","../image/image_24/24_Vitrac_24_4.jpg","../image/image_24/24_Vitrac_24_5.jpg","../image/image_24/24_Vitrac_24_6.jpg","../image/image_24/24_Vitrac_24_7.jpg","../image/image_24/24_Vitrac_24_8.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','24 — Dordogne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
