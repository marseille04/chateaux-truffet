es.","architecture":"ETANG, bien que son nom ne  soit pas relevé avant le XIIe siècle, le village est probablement habité dès la période gallo romaine. Sur sa butte herbeuse, le château de lEtang, construction néo-Renaissance du XIXe siècle, domine un vaste horizon de forêts et de prairies, est élevé à lemplacement du fief du domaine de la Malinie attesté dès le début du XVIIe siècle. Edifié entre 1846 et 1850, il remplace peut être un château précédent. Ilsagit dune demeure présentant un logis à étage, et possédant une toiture dardoise ornée de lucarnes. La façade côté sud est flanquée de tourelles en encorbellement ; lautre façade, côté nord, est encadrée de tours et présente un double balcon soutenu par des colonnes et précédé par un escalier. Le château de lEtang est caractéristique de ces belles demeures bourgeoises du XIXe siècle.         GROSPUY, dont les origines remonteraient au XIIIe siècle ; mentionné en 1306 ; son corps de logis principal flanqué, au milieu d'une de ces façades, d'une tour ronde au toit pointu,  accolée à un logis datant du XVe siècle.","habitants":"Famille de Jean Baptiste Aubriot de la Palme \r\n        \r\n        \"","divers":"Deux châteaux  à Abjat , l'Etang grav 1-2  GPS : 45° 35' 05\" Nord, 0° 45' 28\" Est. De                                      Gros-puy grav 3-4 GPS : 45° 35' 05\" Nord, 0° 45' 28\" Est, et le                                                                          manoir du Puy GPS : 45° 09' 23\" Nord, 1° 00' 57\" Est","gps":"45° 35' 05\" Nord, 0° 45' 28\" Est. De","images":["../image/image_24/24_Abjat_Bandiat_1.jpg","../image/image_24/24_Abjat_Bandiat_2.jpg","../image/image_24/24_Abjat_Bandiat_3.jpg","../image/image_24/24_Abjat_Bandiat_4.jpg"]},"Consult_chateau_formulaire4535":{"id":"Consult_chateau_formulaire4535","dept":"24","canton":"Brantôme","commune":"Agonac","nom":"Agonac","type":"Château","periode":"XII--XVIII","histoire":"AGONAC, c'est un ancien château fort, fondé  par l'évêque Frotaire de Gourdon , il fut rebâti à diverses époques, la construction  date du XIIe au XIXe siècle, l'ancien château fort des Evêques de Périgueux était situé sur la falaise dominant la vallée de la Beauronne.   Propriété de l'évêché, aliéné par Géraud de Gourdon au XIe siècle puis racheté par l'évêché qui l'inféoda plus tard au baron de Bourdeille.  L'Evêque de Frotaire de Gourdon, Géraud de Salignac, des Bourdeille.  Le château d'Agonac n'est pas classé aux M.H. C'est un château privé qui sert d'habitation. Noms des propriétaires :Bruzac, Chabans, Montardy,  Chamberlhiac, l 'Evêque de Frotaire de Gourdon, Géraud de Salignac, des Bourdeille.  En 1791, l'ancien château est vendu comme bien national.","architecture":"AGONAC, une première forteresse dite \"Castrum Agoniacum\" aurait été élevée vers 980 . Plusieurs maisons fortes ont été bâties dans le castrum épiscopal, entre le XIIe et le XIVe siècle. Un manoir du XVIIe siècle, est pourvu d'une tour d'escalier polygonale. A proximité, un logis du XVIIIe siècle et ses dépendances forment une cour quasiment fermée, le château fut régulièrement assiégé, remanié et intégré dans d'autres corps de logis. Il ne subsiste du château fort qu'une partie de la tour maîtresse à contreforts bâtie au XIIe siècle, de plan rectangulaire et construite en pierre de taille, ainsi qu'une salle à 2 nefs voûtées en berceau brisé du début du XIIIe siècle, dont la chapelle castrale. Château aux murs de 2 m 20 d'épaisseur, à contreforts plats, de plan rectangulaire. Le castrum est environné d' une enceinte qui comportait quatre portes: la porte Ripagay qui ouvrait sur la Beauronne au sud-est, la porte Palenchart qui donnait sur le faubourg de l'hôpital à l' ouest, la porte Foscheyrencha qui permettait d' accéder au chemin de la chapelle castrale au nord-ouest et la porte Salseyron, la seule conservée, qui ouvrait sur l' ancienne place de la halle au nord-est.  Les restes visibles datent du XIIe siècle. La chapelle du XIIIe siècle. L'on peut encore admirer un curieux escalier fait de voûtes successives qui dessert le donjon. A côté, une tourelle polygonale d'escalier rappelle le XVIIe siècle avec un portail à fronton entre des colonnes à chapiteaux corinthiens .","habitants":"Evêque Frotaire de Gourdon\r\n        \"","divers":"Agonac GPS : 45° 17' 33,5\" Nord et 0° 45' 1,5\" Est","gps":"45° 17' 33,5\" Nord et 0° 45' 1,5\" Est","images":["../image/image_24/24_Agonac_1.jpg","../image/image_24/24_Agonac_2.jpg","../image/image_24/24_Agonac_3.jpg"]},"Consult_chateau_formulaired9a4":{"id":"Consult_chateau_formulaired9a4","dept":"24","canton":"Thenon","commune":"Ajat","nom":"Ajat","type":"Château","periode":"XVI","histoire":"A deux kilomètres à l'ouest à Limeyrat le château de l'Etang.                                                                   AJAT, à la fin du XVIe siècle, François, compagnon d'armes d'Henry IV et premier marquis de Hautefort, devient seigneur d'Ajat. Décédé en 1640 à l'âge de 92 ans, il avait demandé à avoir sa sépulture dans l'église, son tombeau est visible dans le chur côté épître bien que fortement endommagé lors de la Révolution. Son petit-fils, François, qui forma la branche d'Ajat marié à Jeanne d'Abzac de Ladouze, il transforme la façade nord du château avec sans doute le projet de construire un deuxième logis.\r\nLa famille  des Hautefort et des Arlot (1741) jusqu'à la Révolution. Ensuite les Taillefer et les Catarède et au comte de Cézac acquit en 1989 par la famille Caffier.","architecture":"AJAT, la construction date XIIIe, XVIe et XVIIe siècles. Rien dans les constructions ne semble remonter au delà du XVIe siècle, bien que la tradition attribue à ce château, qui aurait été autrefois relié à l'église, une origine beaucoup plus ancienne qui remonte aux Templiers. L'édifice se compose de deux corps de logis. Le plus important est orienté dans le même sens que l'église. Il est relié à un pavillon par une galerie qui clôture, à l'ouest, une cour intérieure fermée à l'est par un ancien mur de défense. Un vaste escalier à la française fait saillie dans cette cour et complète l'ensemble avec la galerie à double étage. Les façades sont entièrement couronnées de mâchicoulis. On peut y admirer deux corps de logis, une façade surmontée de mâchicoulis et de chemins de ronde, un fronton timbré de deux anges portant les armes des Hautefort et des Arlot,  une courette à Loggias d'où l'on aperçoit une gargouille du XVe siècle, des caves voûtées très anciennes. Les intérieurs sont bien conservés, avec leurs anciens plafonds à solives apparentes et des boiseries du XVIIe siècle. Le château d'Ajat est ouvert au public et se visite. Il est inscrit au titre des M.H. depuis 1925.                                                               ETANG la maison de vacances avec aspet médiéval ne date pas du Moyen-Âge mais bien du XIXe siècle époque ou le propriétaire , un archéologue allemand le fait construire à la fin du XIXe siècle de style variè avec des éléments modernes comme ,les baie.","habitants":"Marquis de Hautefort\r\n        \"","divers":"Deux châteaux à  Ajat celui d'Ajat   grav de 1 à 6 gps 45° 9' 23\" Nord et 1° 0' 55,3\" Est, et de Limeyrat grav 7 à 9","gps":"","images":["../image/image_24/24_Ajat_1.jpg","../image/image_24/24_Ajat_2.jpg","../image/image_24/24_Ajat_3.jpg","../image/image_24/24_Ajat_4.jpg","../image/image_24/24_Ajat_5.jpg","../image/image_24/24_Ajat_6.jpg","../image/image_24/24_Ajat_7.jpg","../image/image_24/24_Ajat_8.jpg","../image/image_24/24_Ajat_9.jpg"]},"Consult_chateau_formulairec881":{"id":"Consult_chateau_formulairec881","dept":"24","canton":"Saint-Cyprien","commune":"Allas les Mines","nom":"Allas","type":"Château","periode":"XIV-XV","histoire":"ALLAS FERRIERES, cet ancien hôtel ou manoir présente des éléments s'échelonnant du XIIIe au XVIIIe siècle. Le château a successivement appartenu aux familles de la Mothe, de Plamon, de Ferrières et de Toucheboeuf de Beaumont des Junies de 1452 jusqu'à la Révolution pour cette dernière famille. Il avait haute justice au XVIIIe siècle sur une partie du bourg. Le Château de Ferrières a reçu le label de la Fondation du Patrimoine, en 2012. Il avait haute justice au XVIIIe siècle sur une partie du bourg d'Allas les Mines (le village s'appelait Allas de Berbiguières avant 1910). Si Allas-les-Mines est modeste, le village possède un riche patrimoine architectural : le château de GOUDOU. Il était déjà mentionné dès le XVe siècle. Son propriétaire initial fut la famille de Ferrières puis la famille de Toucheboeuf- Beaumont-des Junies.  Armand Augustin de Toucheboeuf-Beaumond des Junies ce dernier fut le seigneur du château de Ferrières à Allas et le page du Roi de sa petite écurie, en 1765.","architecture":"FERRIERES,   sa construction a débuté au XIIIe siècle et s'est achevée au XVIIIe siècle.Ce manoir comporte une aile du XIIIe siècle, modifiée à la fin du XVe siècle avec des fenêtres à meneaux et un reste d'échauguette (les fortifications ayant visiblement été arasées à la Révolution), ainsi qu'une aile du XVIIe siècle adossée à une grande terrasse sur voûtes et arches dominant la vallée de la Dordogne. Le château de Ferrières a vue sur les châteaux de Beynac et des Milandes, ce qui devait permettre une surveillance efficace de la vallée. Il est à noter que le caractère défensif de Ferrières a été rapidement abandonné pour devenir une simple demeure seigneuriale. \r\nArmes de la famille de Toucheboeuf de Beaumont, ayant possédé le château de Ferrières de 1452 jusqu'à la Révolution : Les propriétaires actuels sont des descendants des familles de Ferrières et de Toucheboeuf (branche de Monsec)                  GOUDOU  a été édifié deux siècles plus tard que le château d'Allas. La tour centrale serait du XIIe siècle. Demeure de la Renaissance abandonnée dès le XVe Siècle. Ancien repaire noble, mouvant au XIIIe de la châtellenie de Berbiguières (Allas), en 1760, haute justice sur Allas et Cladech.","habitants":"Famille de Ferrières                                                        Famille de Toucheboeuf \r\n        \"","divers":"Deux châteaux à Allas les Mines, celui de  Goudou grav 1-2  GPS : 44°49'778\" Est et 1°5'120\" Est,        de  Ferrières  grav-3 à 5  GPS : 44° 50' 03\" Nord et 1° 04' 23\" Est","gps":"44°49'778\" Est et 1°5'120\" Est,        de  Ferrières  grav-3","images":["../image/image_24/24_Allas_1.jpg","../image/image_24/24_Allas_2.jpg","../image/image_24/24_Allas_3.jpg","../image/image_24/24_Allas_4.jpg","../image/image_24/24_Allas_5.jpg"]},"Consult_chateau_formulaire2b09":{"id":"Consult_chateau_formulaire2b09","dept":"24","canton":"Ribérac","commune":"Allemans","nom":"Allemans_Ribérac","type":"Château","periode":"XIX","histoire":"Château du  Meynard du XIXe siècle, château de la Rigaudie du XIXe siècle MEYNARD Le domaine était la possession des Berne au XIXe siècle,  le manoir du LAU, dit le Presbytère.                                    RIGAUDIE, doté dun riche patrimoine architectural, Allemans conserve plusieurs anciens manoirs parmi lesquels lélégant château de la Rigaudie. Bâti durant le premier quart du XIXe siècle, qui fut  la propriété des familles nobles Rochon du Vigneaud et des Normant, est recensé à lInventaire général du patrimoine culturel.                                                                          Le manoir du LAU, dit le Presbytère, est situé au bourg au pied de l'église. Il a été érigé au XVe siècle par la famille du Lau d'Allemans et possède une tour octogonale. Après avoir servi de presbytère, il devient propriété de la commune en 1905 et sert de logement pour l'institutrice, de cantine scolaire, puis est transformé en logements sociaux jusqu'en 2002. Créée en 2015, une association pour sa sauvegarde en prévoit la restauration, aidée par la fondation du patrimoine. Lors de la seconde guerre mondiale, il a été réquisitionné par les allemands pour leur servir de cantonnement","architecture":"MEYNARD, logis du XVIIIe siècle, entouré de ses dépendances agricoles, est ajouté au XIXe siècle une tour-logis inspirée de la fin du Moyen-Age et ornée dans un style néo Renaissance, s'organise autour d'une cour carrée ouverte au nord.  La tour-logis occupe l'angle sud-ouest et s'étage sur quatre niveaux percés de fenêtres à meneau et croisillon. Le sommet est  posée sur des mâchicoulis coiffés d'un toit conique brisé. A l'est s'étend un logis possédant une aile en équerre vers le nord, il est composé d'un étage de soubassement et un rez-de-chaussée de plain pied avec la cour. Au sud à l'intersection des deux  ailes, le logis s'ouvre sur une galerie coiffée d'un toit en pavillon reposant sur quatre piles octogonales et les dépendances s'espacent au nord de cet ensemble.       RIGAUDIE, ce château, non documenté a été construit au début du XIXe siècle, peut être sur les bases d'un bâtiment antérieur. L'aile sud a été détruite au XXe siècle à la suite d'un incendie.  Demeure dont il ne subsiste que l'aile nord et les dépendances en retour d'équerre. Le logis, de plan régulier en L, porte aux angles des mâchicoulis. Les façades du bâtiment sont rythmées de quatre travées. Les lucarnes occupent le brisis du toit et l'une d'elles porte  encore les fasces et les besants des Rigaudie de Saint-Séverin. Le terrasson de ce dernier est à pente forte et, comme le brisis, recouvert de tuiles plates. Le colombier, circulaire, est situé à l'est de l'ensemble.","habitants":"Famille Rochon du Vigneaud                                  Famille du Lau d'Allemans \r\n        \"","divers":"trois châteaux à Allemans, Meynard grav 1-2,  Rigaudie grav 4,   manoir  grav -3","gps":"","images":["../image/image_24/24_Allemans_Rib%c3%a9rac_1.jpg","../image/image_24/24_Allemans_Rib%c3%a9rac_2.jpg","../image/image_24/24_Allemans_Rib%c3%a9rac_3.jpg","../image/image_24/24_Allemans_Rib%c3%a9rac_4.jpg"]},"Consult_chateau_formulairefb2f":{"id":"Consult_chateau_formulairefb2f","dept":"24","canton":"Lanouaille","commune":"Angoisse-Bouchet","nom":"Angoisse","type":"Château","periode":"XV-XVII","histoire":"BOUCHE, surplombant la vallée de la Loue, comportant des galeries souterraines maçonnées, n'a gardé qu'une tour carrée du XIVe siècle qui porte les armes des Talleyrand-Périgord.  Au XVIIe siècle,  appartenait à une branche des Salignac-Fénelon. Les familles Lastours et Machaud de Pompadour avaient occupée ce domaine précédemment ; leur souvenir se conserve aux clefs de voûte de l'église.              ROUFFIAC, XVe et XVIIe siècles, c'était au XVe siècle le siège des Laporte. remanié au XIXe siècle, inscrit aux M.H.","architecture":"BOUCHE, la Loue coule au pied du promontoire du château qui rappelle le souvenir d'une préceptorerie édifiée vers l'an 1100 par les Templiers. Un nettoyage salutaire a permis récemment de dégager l'importante muraille de protection qui couronnait l'assise du château du Bouchet. Le pont-levis qui enjambait des fossés, repliait ses montants sur la tour d'entrée carrée, seul vestige  des bâtiments reconstruits au XIVe siècle. Si la porte d'entrée de la demeure est modeste, d'importantes constructions souterraines ont subsisté.On notera que l'ancien château était jadis muni de tours crénelées et de mâchicoulis. \r\nROUFFIAC, château entièrement remanié à la fin du XIXe siècle, présentant une composition de tours rondes ou carrées, de tourelles et d'échauguettes. Une bâtisse rectangulaire est figurée sur le cadastre de 1811. Au XIXe siècle, y ont été ajoutés des pavillons et deux tours. Les décors intérieurs remontant à cette période, sont encore intacts (les boiseries, le papier peint, les tapisseries, et la peinture). A l'est du château de Rouffiac se trouve un bâtiment de dépendances. En contrebas du château de Rouffiac, un bâtiment qui servait autrefois de poulailler. Le château témoigne d'une époque peu représentée dans ce secteur.","habitants":"Bouchet Famille desTalleyrand-Périgord                   Rouffiac Famille de Laporte\r\n        \r\n        \"","divers":"deux châteaux ,celui de Bouchet grav 1-2 Rouffiac grav 3- 4-5","gps":"","images":["../image/image_24/24_Angoisse_1.jpg","../image/image_24/24_Angoisse_2.jpg","../image/image_24/24_Angoisse_3.jpg","../image/image_24/24_Angoisse_4.jpg","../image/image_24/24_Angoisse_5.jpg"]},"Consult_chateau_formulaire8b90":{"id":"Consult_chateau_formulaire8b90","dept":"24","canton":"Saint-Astier","commune":"Annesse-et-Beaulieu","nom":"Annesse_Beaulieu","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux à Annesse-Beaulieu    ( Siorac voir article )                                                                 LALANDE , du XVIIIe siècle, aujourd'hui hôtel-restauA deux kilomètres à l'ouest à Léguillac de l'Auche  le  château deLa FAYE ancien prieuré, propriété privée La construction du prieuré commence en 1219, et est remanié aux XVIIe et XVIIIe siècles.\r\nMotte féodale de la Redoute.   Le château du BUT est  bâti à Léguillac-de-l'Auche, La construction date  du XVIe et XVIIe siècles, a été remanié XVIIIe siècle et restauré au XXe siècle. Le château est inscrit aux M.H.  rant. En 1915, il fut réquisitionné pour héberger des prisonniers allemands.\r\nLA ROCHE, ancien fief des Bayly de Razac, des Leymary puis propriété des Koucheleff, des Pradier et des Félix.","architecture":"LA ROCHE, du XIXe siècle dans un style néoclassique. Juché sur un tertre, le château domine l'Isle et contemple au loin Chancelade, Marsac et Périgueux. Au cours de la seconde guerre mondiale, le château a accueilli un hospice de vieillards juifs réfugiés.  Le logis principal, orienté nord-sud, est flanqué côté ouest de deux tours rondes qui servent dappui à deux autres logis perpendiculaires au premier.   Ce château succédait à un ancien repaire noble attesté en 1513. L'édifice abrita au XXe siècle un laboratoire de l'institut Pasteur. Vendu en 1994, il comprenait alors un sous-sol, un rez-de-chaussée, de deux étages et un étage mansardé. On remarquait encore le grand escalier en marbre gris . De la terrasse, située à l'arrière de la demeure, on surplombe l'Isle.","habitants":"Siorac marquis de Saint-Aulaire\r\n        \"","divers":"Trois châteaux à Annesse-Beaulieu, Roches grav 1-2,  Lalande Gav-3-4    GPS : 45° 10' 30\" Nord, 0° 35' 31\" Est                                                                                     Soriac  grav 5-6  GPS : 45° 10' 30\" nord, 0° 35' 31\" est, But grav 7-8-9","gps":"45° 10' 30\" Nord, 0° 35' 31\" Est","images":["../image/image_24/24_Annesse_Beaulieu_1.jpg","../image/image_24/24_Annesse_Beaulieu_2.jpg","../image/image_24/24_Annesse_Beaulieu_3.jpg","../image/image_24/24_Annesse_Beaulieu_4.jpg","../image/image_24/24_Annesse_Beaulieu_5.jpg","../image/image_24/24_Annesse_Beaulieu_6.jpg","../image/image_24/24_Annesse_Beaulieu_7.jpg","../image/image_24/24_Annesse_Beaulieu_8.jpg","../image/image_24/24_Annesse_Beaulieu_9.jpg"]},"Consult_chateau_formulairedbe7":{"id":"Consult_chateau_formulairedbe7","dept":"24","canton":"Savignac les Eglises","commune":"Antonne-Trigonant","nom":"Antonne_Trigonant","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Antonne-Trigonant celui  Des Bories du XVe et XVIe siècles, inscrit aux M.H. De Lanmary, XVe et XVIIIe siècles.\r\nBORIES   En 1497, Jeanne de Hautefort, veuve de Jean de Saint Astier, fait construire un château en ce lieu. Durant les guerres de Religions (1562 à 1598), le château subit au moins 2 sièges. En 1604,  est remanié. En 1792,  est réquisitionné par les révolutionnaires.  Au XIXe siècle, le bâtiment appartient à nouveau à la famille Saint Astier. En 1891, Saint Astier le vende  au comte  de Paris. En 1911, la famille des Nervaux-Loys entreprend des travaux de rénovation et passe à la famille de Lary de Latour par un mariage en 1971m\r\nLANMARY, le centre hospitalier se situe dans un château féodal et renaissance construit au XIIe siècle par Hélie de Laurière et remanié jusqu'au XVIIe siècle. Puis par mariage il devient le fief de grands seigneurs: Les Beaupoil de Saint-Aulaire jusqu'en 1761, transmis par succession aux du Lau d'Allemans.   En 1820, le domaine de Lanmary, comprenant le château, est vendu à monsieur Leroy comte de Barde , receveur général de la Dordogne. Le comte de Barde fait entreprendre une importante restauration progressive de tous les bâtiments de Lanmary. Au début du XXe siècle, Armand Marie Joseph Frainaud comte de la Motte Saint-Génis, achète le domaine puis racheté par le département de la Dordogne qui souhaite créer un préventorium. \r\nTRIGORANT Sur les bases d'un ancien manoir qui dépendait de la châtellenie d'Auberoche, le château actuel fut construit au XVe siècle. La famille Du Puy semble être la première famille, Au XVIIe siècle,les Cugnac de Caussade deviennent les nouveaux propriétaires. Il est inscrit au titre des M.H. depuis le 12 octobre 1948","architecture":"BORIES,  entouré de douves se présente sous la forme d'un logis orienté est-ouest, flanqué d'une tour carrée au sud et de deux tours rondes aux angles nord-est et nord-ouest. La construction  commença en 1494 , sur les restes d'un ancien manoir. Il a été achevé en 1604, il fut assiégé à plusieurs reprises lors des guerres de religion puis lors de la Fronde. Il est classé M.H. depuis le 29 mars 1974.               LANMARY, de lancien rmanoir déjà cité au XIIIe siècle subsistent les quatre tours rondes du XVe siècle pourvues de mâchicoulis. Le logis actuel date du XVIIIe siècle,   date du XIXe siècle il a la forme d'un carré ouvert à louest avec un logis à lest et deux ailes en équerre au nord et au sud, le tout flanqué d'une tour ronde à chaque extrémité. De lancien repaire noble déjà cité au XIIIe siècle subsistent les quatre tours rondes du XVe siècle pourvues de mâchicoulis. Le château de Lanmary est devenu un établissement d'hébergement pour personnes âgées dépendantes (EHPAD). n'est pas inscrit ni classé aux M.H.                                                                           TRIGONANT, établi sur une hauteur surplombant la vallée de l'Isle, il se présente sous la forme d'un petit logis orienté nord-est - sud-ouest, flanqué de quatre tours, le tout entouré de mâchicoulis. Deux tours rondes se trouvent sur la façade regardant l'Isle ; un donjon carré, une tour d'escalier à pans et une tourelle en encorbellement sont placés sur la face opposée. Les meneaux ont été remplacés par des fenêtres à petits carreaux.","habitants":"Bories Famille des Nervaux-Loys                                 Lanmary Monsieur Leroy                                                 Trigognant Famille Du Puy \r\n        \"","divers":"Trois châteaux à Antonne-Trigonant , celui de  Trigonant Grav 5 GPS : 45° 12' 29,3\" Nord, 0° 49' 0,1\" Est.  Bories grav 1-2-3-4    GPS : 45° 13' 09,3\" Nord et 0° 50' 35,1\" Est.   Lanmary grav 6-7-8  GPS : 45° 14' 27\" Nord 0° 48' 56\" Est. Le Pot grav 7","gps":"45° 12' 29,3\" Nord, 0° 49' 0,1\" Est.  Bories grav 1-2-3-4","images":["../image/image_24/24_Antonne_Trigonant_1.jpg","../image/image_24/24_Antonne_Trigonant_2.jpg","../image/image_24/24_Antonne_Trigonant_3.jpg","../image/image_24/24_Antonne_Trigonant_4.jpg","../image/image_24/24_Antonne_Trigonant_5.jpg","../image/image_24/24_Antonne_Trigonant_6.jpg","../image/image_24/24_Antonne_Trigonant_7.jpg","../image/image_24/24_Antonne_Trigonant_8.jpg","../image/image_24/24_Antonne_Trigonant_9.jpg"]},"Consult_chateau_formulairefe75":{"id":"Consult_chateau_formulairefe75","dept":"24","canton":"St-Pierre de Chignac","commune":"Atur","nom":"Atur_Lafaye","type":"Château","periode":"XV-","histoire":"BREUILH, le château du Breuilh, du  XVe et XVIIe siècles.  En 1936, M. Dupérier l'a vendu à M. Marquet qui l'a cédé à M. Devoyer qui l'a rétrocédé le 21 juin 1939 à M. et Mme Ignace et le 3 mars 1980 à M. Joullie.                                                               BEAUVIGUIER, ce château aujourd'hui ruiné également nommé Boisvigier ou Bosvigier dénommé en 1349 \"bosc al vigier\" affecté dans l'aveu et dénombrement de 1680 au Sr Boutin. En 1771, il appartient au seigneur de Froidefond, célibataire dont l'existence se partageait entre son hôtel de Périgueux, rue du Plantier, et sa maison de campagne à Flageat, près de Sainte-Marie-de-Chignac, et qui vient de mourir, désignant son neveu, Pierre Noël comme héritier universel. Celui-ci, qualifié de bourgeois de Périgueux, devient dans les actes notariés \"messire Pierre Noël de Flageat, écuyer, seigneur de Beauvigier. Il ne profite guère de sa nouvelle fortune puisqu'il meurt quelques mois plus tard à l'automne 1772. Sa veuve, Marthe Fargeot, s'efforcera d'assurer un avenir brillant à son fils unique, Élie Joseph de Flageat (1760-1794), au service du roi Louis XVI. Il entre à la première compagnie des mousquetaires gris.                                                                              Le castel de LAFAYE, propriété privée, ancienne demeure des Négrier ; ce castel attesté aux XVIIIe et XIXe siècles, est situé au sud d'Atur.     et au sud-ouest à  cinq kilomètres à    l'Est à Sainte Marie de Chignac le château de   la  ROLANDIE A noter qu'une forge, appartenant un temps aux seigneurs de Lardimalie, existe à Sainte-Marie-de-Chignac dès le XVIe siècle. Les Signac et les bessou l'ont transformé en Métairie.","architecture":"BREUILH, construit à l'origine au XIIe siècle posséda un chemin de ronde ; on peut en apercevoir les corbeaux sur la partie gauche restée la plus ancienne. Au XVIIe siècle, il fut transformé par les la Roche-Aymon et les de Bonneguise. Les murs mesurent 1,40 m à la base et 0,75 m en haut. La porte d'entrée date du XIIIe siècle. À l'intérieur de cette chartreuse, derrière une porte en forme de demi-rond, un escalier de pierre tournant descend vers une fosse appelée les oubliettes. Sur le portail d'entrée s'élevait un clocheton pourvu d'une petite cloche au service du visiteur. Il possédait une chapelle et un cimetière. Lors de la réfection d'un mur d'enceinte, des ossements furent trouvés. Il y avait des servitudes, un puits, des caves, des greniers, avec une superficie en terre très importante qui regroupait les métairies de Caussade, la Lébreterie, la Meynardie, la Fayardie.               ROLANDIE   Cette demeure du XVIIIe siècle est recouverte de verdure et se fond dans le paysage, au milieu des arbres. Deux pavillons sont disposés aux extrémités du logis, leur toiture à quatre pans est très pentue alors que celle du milieu est plus basse. Elle est construite à la Mansart pour permettre un éventuel aménagement des combles. Afin quils soient éclairés par la lumière du jour, des fenêtres en chiens-assis prennent place sur les quatre façades du toit. Dautre part, de grandes portes-fenêtres percent les murs du manoir. L'édifice a été récemment rénové.","habitants":"M. Marquet\r\n        \r\n        \"","divers":"Château d'Atur;  le Breuilh, Beauviguier,Rolandie et de Lafaye","gps":"","images":["../image/image_24/24_Atur_Lafaye_1.jpg","../image/image_24/24_Atur_Lafaye_2.jpg"]},"Consult_chateau_formulaire8b99":{"id":"Consult_chateau_formulaire8b99","dept":"24","canton":"Savignac les Eglises","commune":"le Change","nom":"Aubéroche","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Aubéroche dont celui d'Aubéroche et de la Cave dont je n'ai pa d'information historique.         AUBEROCHE, un premier château aurait pu être construit en 980 par l'évêque Frotaire de Gourdon pour se protéger des normands bâti à le Change, la construction  date du XIV et XVIIe siècle. Il ne subsiste depuis que la chapelle Saint-Michel qui date du XIIe siècle. Elle est classée aux M.H. depuis 1960.  C'est un vestige de l'ancien château d'Auberoche qui fut détruit en 1431.  Le château d'Aubéroche appelé aussi le château du Sablou bâti à Fanlac du XVIIe au XIXe siècle. Auberoches se situe au fond du village de Fanlac. Il est le fief des La Bermondie, puis des Durand du Bastit. De janvier à décembre 1940, il a servi de camp d'internement pour les militants communistes. En contrebas du château d'Aubéroche, près du pont de Fanlac sur le Thonac, une stèle commémore cet épisode de la seconde guerre mondiale.","architecture":"AUBEROCHE, il est composé d'une enceinte carrée du XVe siècle, présentant deux grosses tours à mâchicoulis du XVIe siècle. Le logis principal du XVIIe siècle dispose d'ailes en retour d'équerre. Il conserve des portails de style classique Louis XIII, c'est-à-dire des baies en plein cintre encadrées de pilastreset surmontées d'un fronton qui inscrit une imposte. Ce château est inscrit à l'inventaire des M.H.depuis 1962. \r\nC'est aujourd'hui une demeure privée, il n'est pas ouvert à la visite. Dans l'année 1430 le château fut véritablement rasé, rayé du paysage par les bourgeois en colère en mal de vengeance. Les tours, à l'exception d'une, sont abattues entièrement. Seule, la chapelle castrale trouva grâce devant la pioche des démolisseurs et resta fièrement campée, à l'extrémité de l'éperon de roche blanche qui dicta le nom du site.Un bon portail du XIIe siècle est encore en place et la petite chapelle castrale romane marque encore l'emplacement de l'immence forteresse médiévale des Evêques de Périgueux puis des vicomtes de Limoges.","habitants":"Evêque Frotaire de Gourdon\r\n        \r\n        \"","divers":"Aubéroche grav 1 à 4  GPS : 45° 03' 57\" Nord, 1° 05' 46\" Est          Cave st-Antoine   grav 5 et 6","gps":"45° 03' 57\" Nord, 1° 05' 46\" Est          Cave st-Antoine","images":["../image/image_24/24_Aub%c3%a9roche_1.jpg","../image/image_24/24_Aub%c3%a9roche_2.jpg","../image/image_24/24_Aub%c3%a9roche_3.jpg","../image/image_24/24_Aub%c3%a9roche_4.jpg","../image/image_24/24_Aub%c3%a9roche_5.jpg","../image/image_24/24_Aub%c3%a9roche_6.jpg"]},"Consult_chateau_formulaire4646":{"id":"Consult_chateau_formulaire4646","dept":"24","canton":"Montignac","commune":"Auriac du pérrigord","nom":"Auriac_Fayes","type":"Château","periode":"XIII-XIV","histoire":"FAYE  Bertrand Arnal, abbé de l'abbaye de Terrasson entre 1520 et 1541, date à laquelle il se démet en faveur de son neveu, Pierre.  Marguerite, mariée avec Jean Alphern, Foucauld né en 1476, François, né vers 1485, mort avant 1551, marié en 1520 à Souveraine d'Aubusson de Villac a eu six enfants : Pierre Arnal, succède à son oncle comme abbé de Terrasson en 1541, mort après 1551, Antoinette mariée à Guillaume Migot, Gabrielle Arnal mariée en 1539 avec Bernard IV de Foucauld de Lardimalie, Marguerite Arnal mariée en 1547 à Hélie Cottet, Amanieu Arnal, né en 1533, mort en 1556, marié à Marguerite Catherine Belcier, Guilhane Arnal mariée en 1551 à François Saulnier de Laborie. Amanieu Arnal a eu deux enfants : Pierre Arnal, né vers 1555 et mort avant 1591, marié avec Marguerite de Cugnac, et Catherine Arnal mariée le 13 janvier 1574 avec Jean Pasquet de Savignac, décédée en 1608. En 1580, on trouve Antoine de la Faye, seigneur de La Faye et d'Auriac, capitaine de la ville jusqu'en 1581, Catherine Arnal de la Faye, fille d'Antoine Arnal de la Faye, seigneur de la Faye et de Puygolfier, et de Suzanne de Pérusse-d'Escars, s'est mariée avec François Foucauld. Son fils, Henri Foucauld, seigneur de la Faye d'Auriac, s'est marié en 1673 avec Gabrielle de Rouffignac. Il est seigneur d'Auriac et de la Faye. Sa fille aînée, Anne Foucauld est dame de la Faye et son héritière universelle. Elle se marie par contrat du 25 juin 1718 avec Louis Foucauld de Pontbriand, seigneur de Mesmond. Anne de Foucauld est morte sans postérité en 1752 après avoir testé en faveur de son mari. Celui-ci institue en 1753 pour héritier universel son petit neveu, le comte Louis de Foucauld de Pontbriand, né en 1742. Il a émigré en 1791 vendu comme bien national, l'acquereur Pierre Labrousse l'aubergiste d'Auriac , le domaine passe par alliance au notaire de Montignac Jérome Barbesson, en 1845 à sa mort le domaine passe dans diverses mains avant de revenir par hérirage à la famille Monégier du Sorbier qui fait rajouter une tour à l'angle sud-Est, toujours dans la famille des Sorbier.","architecture":"FAYE,  manoir du XVe siècle avec donjon ruiné.  D'abord, sur le site est un cluzeau, qui est visité depuis des siècles. Au sud, la construction du centre est à la base  d'un donjon carré médiéval, presque aveugle. Véritable tour de guet permettant d'assurer une protection à Montignac. De part et d'autre de ce bâtiment, sont accolées deux puissantes tours carrées, celle de gauche datant de 1359, celle de droite du  XVe siècle. Les fortifications, dont il ne reste que les corbeaux et qui devaient couronner le château, ont cédé leur place à de hautes toitures de lauzes éclairées par deux lucarnes. Un logis barlong sera flanqué de tours modernes aux extrémités au XIXe siècle. En son millieu se trouve une tour bâtie au XVIe siècle, dont la porte, soulignée d'un arc brisé, s'ouvre sur l'escalier. Autour de la cour intérieure est construit un logis appelé les galleries. Un inventaire établi au XVIIIe siècle, note l'utilisation de huit cheminées dans les pièces du château. Jusqu'à la période révolutionnaire. Chaque union de familles apporte sa construction et chaque époque, son style. Une clé de voûte porte les armes des Amal de la Faye, une des familles qui demeura le plus longtemps à La Faye.  Lédifice est à lorigine dédié à Saint-Barthélemy, que lon prie pourguérir les boiteux et les mal-formés. En latin, guérir se dit remedio. Le nom de la chapelle a donc évolué en San-Rémédi, saint guérisseur, qui adonné Saint-Rémi. La chapelle est inscrite à linventaire des M.H. depuis 1848.","habitants":"Famille Arnal de la Faye\r\n        \"","divers":"Château de la Fayes à Auriac","gps":"","images":["../image/image_24/24_Auriac_Faye_1.jpg","../image/image_24/24_Auriac_Faye_2.jpg","../image/image_24/24_Auriac_Faye_3.jpg","../image/image_24/24_Auriac_Faye_4.jpg","../image/image_24/24_Auriac_Faye_5.jpg","../image/image_24/24_Auriac_Faye_6.jpg","../image/image_24/24_Auriac_Faye_7.jpg","../image/image_24/24_Auriac_Faye_8.jpg"]},"Consult_chateau_formulairec606":{"id":"Consult_chateau_formulairec606","dept":"24","canton":"Terrasson-Lavilledieu","commune":"Bachellerie","nom":"Bachellerie","type":"Château","periode":"XV-XVI-XVIII","histoire":"A la Bachellerie;  la chartreuse des Fraux. Le château du Jarry et de Valette,  et à 3 km au nord-Est à Peyrignac le château de la Chapoulie.\r\nFRAUX ( Les ), situé sur un hameau composé du château et de ses dépendances et de plusieurs maisons. Sous Louis XVI, la propriété est détenue par Pierre Labadie du Fraud et ses enfants, puis au XIXe siècle la famille Monégrier leur succède.\r\nVALETTE construit par la famille du même nom au XVIe siècle Jean de Boussier de Rochepine écuyer et seigneur de la Valette, compagnon d'Henry IV.       \r\n JARRY, le château   en face du moulin en 1900 il fut à lépoque habité par la famille Passemard  Mme était née Caroline Denoix  probablement la sur du Dr Denoix qui vivait à Chantemerle à cette date,  Jacques Antoine Passemard  fut  maire  de  La Bachellerie de 1815 à 1820 et également notaire  à la même époque.   Le corps de logis de plan quadilatère à deux niveaux avec série de lucarnes sur combles brisées  pavillons carrées en saillit sur angles.","architecture":"CHAPOULIE, du XIVe siècle, ancien poste militaire, et le Pigeonnier, tous deux classés M.H. se compose d'une tour circulaire à laquelle est accolée une deuxième tour plus élancée. L'ensemble évoque plus l'idée d'un manoir  que d'un château, car il ne semble pas que les deux tours aient fait partie  d'un ensemble de bâtiments. Deux mâchicoulis défendent l'un la porte de la tour d'escalier, l'autre une ouverture d'accès probable dans la grosse tour, sur la face nord. Plus tard, au XVIe et XVIIe siècle, la construction fut percée de petites fenêtres. Au XVIIIe siècle fut accolé de part et d'autre de la grosse tour, un corps de logis en rez-de-chaussée avec un bâtiment de communs en retour sur le côté Est. A quelque mètres au sud, s'élève un pigeonnier octogonal monté sur huit piliers de pierre dont les sommets sont munis d'une collerette contre les rongeurs, la toiture se termine par une sorte de lanterneau muni d'une calotte.                                       FRAUX, chartreuse  située sur la commune de La Bachellerie, il s'agit d'une résidence de notable édifiée au XVIIIe siècle, peu avant la Révolution. Inscrite à l'inventaire supplémentaire des M.H., elle fut conçue sous la forme d'un bâtiment en U comportant un corps de logis d'un seul niveau entouré de deux pavillons et au toit couvert d'ardoises. Il subsiste également trois portails d'accès dont deux sont datés de 1770 et 1789, ceinte d'un mur de clôture, propriété privée, abrite désormais des gîtes et chambres d'hôtes. \r\nVALETTE, du château ne subsiste qu'un corps de logis rectangulaire à deux niveaux toits en croupes du XVIe siècle avec une porte sculptée","habitants":"Famille Monégrier,                                                          Jean de Boussier de Rochepine                                    Famille Passemard \r\n        \"","divers":"A la Bachellerie;  la chartreuse des Fraux grav  4-5-6. Le château du Jarry grav 7.  le château de Valette grav 8-9  et à Peyrignac le Chapoulie grav 1-2-3","gps":"","images":["../image/image_24/24_Bachellerie_1.jpg","../image/image_24/24_Bachellerie_2.jpg","../image/image_24/24_Bachellerie_3.jpg","../image/image_24/24_Bachellerie_4.jpg","../image/image_24/24_Bachellerie_5.jpg","../image/image_24/24_Bachellerie_6.jpg","../image/image_24/24_Bachellerie_7.jpg","../image/image_24/24_Bachellerie_8.jpg","../image/image_24/24_Bachellerie_9.jpg"]},"Consult_chateau_formulaire7175":{"id":"Consult_chateau_formulaire7175","dept":"24","canton":"Hautefort","commune":"Badefols d","nom":"Badefols","type":"Château","periode":"XIII-XIV","histoire":"A quelques kilomètres au sud le château de Larré à Châtres et à l'ouet à Granges d'Ans le château de Redon et Bussac hotel de ville et chambres d'hôtes. pas d'information historique  pour ses deux derniers.    BADEFOLS, au XIIIe  siècle, sur les bases du village Gallo-Romains, construction d'un château fortifié fief de la famille Badefols du XIVe siècle.  En 1548, Jeanne d'Albret offre en dot la seigneurie de Badefols à son futur époux Antoine de Bourbon. L'un des enfants de ce couple devient  Roi de France Henri IV.  En 1608, le propriétaire du lieu signe sur ses actes : Seigneur Badefols de Bonneguise. Au XVIIIe siècle, le château appartient à la famille Royere de Pons.  En 1752, la seigneurie est érigée en marquisat.  En 1944, le comte Jehan (ou Jean) de Lestrade de Conty et son fils, propriétaires du château, soutiennent les groupes de résistants. En représailles, les allemands incendièrent le château. Avant la fin de la deuxième guerre mondiale, Jehan décède à Buchenwald. Durant la deuxième moitié du XXe siècle, le château est restauré au titre des dommages de guerre. En 2007, le château est inscrit aux M.H.","architecture":"BADEFOLS d'ANS du XIVe siècle,  il est remanié par des ouvertures de fenêtre à meneaux.  Un chemin de ronde est aménagé entouré d'un rempart avec des orifices ressemblant à des canonnières. Ce rempart comporte des pierres correctement taillées avec des dimensions identiques. Mais d'autres aux dimensions aléatoires et à la taille rudimentaire apparaissent. En errant dans les rues du bourg, une ronde tour, comme logis, donc la tour accolée n'est point défensive, enfermer un escalier en colimaçon desservant tous les étages. Une archère sur la ronde construction. Certaines possèdent un chemin de ronde avec des archères cruciformes.  La troisième est munie d'un chemin de ronde sur mâchicoulis avec des fentes de tir dans les merlons.  Les parois des tours sont dépourvues de système défensif (archère, fente de tir).   Au XVIe siècle, les salles bénéficient des améliorations de confort de l'époque Renaissance. Une aile latérale et une terrasse ont été réalisées au XVIIe siècle. Incendié en 1944, le château a perdu l'essentiel de ses aménagements anciens intérieurs. Des dépendances et communs complètent l'ensemble. Un parc a été aménagé au XIXe siècle autour du château.","habitants":"Famille Royere de Pons\r\n        \"","divers":"Badefols d'Ans Larrégrav de 1 à6   GPS : 45° 13' 50\" Nord, 1° 11' 47\" Est.                                                     Badefols-sur-Dordogne grav de7 à 9 GPS : 45° 13' 49,7\" Nord, 1° 11' 47,3\" Est.","gps":"45° 13' 50\" Nord, 1° 11' 47\" Est.","images":["../image/image_24/24_Badefols_1.jpg","../image/image_24/24_Badefols_2.jpg","../image/image_24/24_Badefols_3.jpg","../image/image_24/24_Badefols_4.jpg","../image/image_24/24_Badefols_5.jpg","../image/image_24/24_Badefols_6.jpg","../image/image_24/24_Badefols_7.jpg","../image/image_24/24_Badefols_8.jpg","../image/image_24/24_Badefols_9.jpg"]},"Consult_chateau_formulaire7bf5":{"id":"Consult_chateau_formulaire7bf5","dept":"24","canton":"Nontron","commune":"St-Front sur Nizonne","nom":"Bagatelle_24","type":"Château","periode":"XVIII-XIX","histoire":"Saint-Front sur Nizonne; le château de Bagatelle du XVIIIe siècle.\r\nDomaine de Puyberaud, début du XVIIIe siècle.\r\nMaison de maître du bourg de Saint-Front.\r\nRésidence du Repaire du XIIIe siècle, inscrite au titre des M.H. en 1999.\r\nREPAIRE  est bâtie à Saint-Front-sur-Nizonne,. Sa construction date du XIIIe au milieu XIIIe siècle. L'édifice du milieu du XIIIe siècle, construit à 1 km du village sur une hauteur dominant la Nizonne, selon un plan barlong. La façade principale au nord est cantonnée de deux tours cylindriques. L'angle Sud-Ouest est occupé par une grosse tour carrée. La façade principale est percée de deux fenêtres qui ouvrent en retrait sous des arcs à peine brisés. Leur forme, qui diffère des habituelles baies géminées, suit le même tracé que les archivoltes : ce parti est unique dans l'état actuel des connaissances. La Résidence médiévale du Repaire est inscrite aux M.H. le 29/04/1999. C'est une propriété privée, fermée au Public.                                                                     BAGATELLE  Saint-Front-sur-Nizonne a attiré la convoitise de nombreuses grandes familles qui  ont fait construire de belles demeures aménagées au fil de lhistoire de leurs occupants successifs : le château de Bagatelle, le manoir de Puyberaud ou la maison de maître de Pécon.","architecture":"BAGATELLE a attiré la convoitise de nombreuses grandes familles qui y ont fait construire de belles demeures aménagées au fil delhistoire de leurs occupants successifs : le château de Bagatelle, le manoir de Puyberaud ou la maison de maître de Péconl. Le château de  Bagatelle, de plan rectangulaire, est élevé dans le troisième quart du XVIIIe siècle. Il comprend un étage et un grenier. Cette maison est reliée par un bâtiment moderne, à un petit pavillon carré à haute toiture.Lensemble est complété par dimportantes servitudes et un petit logis du XVIIe siècle,  un portail composé dune entrée principale et de portes piétonnes latérales, avec des grilles de fer forgé et des piliers de pierre, limite la vaste cour. Il faut noter que certaines fenêtres sont aveugles afin de réduire limpot sur les ouvertures et pour faciliter laménagement intérieur.","habitants":"maître de Pécon\r\n        \"","divers":"A Front sur Nizonne, château de Bagatelle GPS : 45° 28' 56\" Nord, 0° 38' 12\" Est, grav 1 à 3.","gps":"45° 28' 56\" Nord, 0° 38' 12\" Est, grav 1 à 3.","images":["../image/image_24/24_Bagatelle_24_1.jpg","../image/image_24/24_Bagatelle_24_2.jpg","../image/image_24/24_Bagatelle_24_3.jpg"]},"Consult_chateau_formulaireca03":{"id":"Consult_chateau_formulaireca03","dept":"24","canton":"Lalinde","commune":"Baneuil","nom":"Baneuil","type":"Château-Tour","periode":"XI-XV","histoire":"BANEUIL se situe en Périgord pourpre, dominant la vallée de la Dordogne, il est implanté sur une hauteur, dans le village même de Baneuil.  Cest un château à vocation défensive, c'est l'ancienne demeure des d'Abzac, des Calvimont, des de La Tour et des Grellety.\r\nÉléments protégés MH : le château en totalité : inscription par arrêté du 18 octobre 1946.","architecture":"BANEUIL sa construction date du XIe, XIIe, XVe et XVIe siècle, sur l'emplacement d'une motte féodale, le donjon, simple tour de guet, surveillait les vallées de la Dordogne et de la Couze. Une salle des gardes fut ajoutée puis au XIVe siècle un logis et une tour ronde flanquée d'une échauguette.  Au XVe siècle, un corps de logis flanqué d'une élégante tour ronde à échauguettes fut accolé à une forteresse du XIIIe dont il ne reste plus aujourd'hui que les ruines d'un donjon carré à murs sans contreforts, construit en belles pierres de taille régulièrement appareillées. Le donjon  carré. Le logis accolé d'une tourelle. Long de 7,30 mètres, large de 6 mètres, haut de 15 mètres, le château de Baneuil possède une ouverture unique sur son mur Nord. On accédait autrefois à ce donjon, arrasés et couronné d'yeuses, par une échelle, puis par une poterne vertigineuse donnant sur une salle obscure, à partir de laquelle on atteignait les parties plus hautes par d'autres échelles et oculus. Le château fut assiégé à plusieurs reprises lors de la guerre de cent ans.","habitants":"Famille des d'Abzac,\r\n        \"","divers":"Baneuil  GPS : 44° 51' 08,7\" Nord et 0° 41' 24,2\" Est grav de 3 à 8, la chartreuse de Borie basse et la tour.","gps":"44° 51' 08,7\" Nord et 0° 41' 24,2\" Est grav de 3 à 8, la cha","images":["../image/image_24/24_Baneuil_1.jpg","../image/image_24/24_Baneuil_2.jpg","../image/image_24/24_Baneuil_3.jpg","../image/image_24/24_Baneuil_4.jpg","../image/image_24/24_Baneuil_5.jpg","../image/image_24/24_Baneuil_6.jpg","../image/image_24/24_Baneuil_7.jpg","../image/image_24/24_Baneuil_8.jpg"]},"Consult_chateau_formulaireca5c":{"id":"Consult_chateau_formulaireca5c","dept":"24","canton":"Beaumont","commune":"Beaumont en périgord","nom":"Bannes_Beaumont","type":"Château","periode":"XIV-XV-XVI","histoire":"BEAUMONT est une bastide anglaise fondée en 1272 au nom d'Édouard Ier, roi d'Angleterre, par Lucas de Thaney, sénéchal de Guyenne.                      BANNES,  château fort du sieur Jean de Seignal au XIVe siècle. Ramonet de Sort, capitaine de Castelnau de Berbiguières, sempare de Bannes en 1409 pour le compte des Anglais. Démantelé à la fin de la guerre de cent ans, il devient alors la propriété de Brandelis de Gontaut Biron. Cest Armand de Gontaud, frère de Brandélis et évêque de Sarlat qui procéda à la reconstruction complète. Vendu à Jean II de Losse en 1571, puis en 1882, achat par les Fayolle du Moustier, le château est acquis en 1960 par M. Lemasson  il meuble parfaitement le paysage de cette splendide vallée de la Couze aujourd'hui propriété de la famille  le Masson.                                                               Dans la commune le château de LUZIER, médiéval édifié au XIVe siècle, il est reconstruit au XVIIe et XVIIIe siècles par Jean de Paty qui avait acheté le comté de Beaumont et se trouvait à la fois seigneur de Luzier et comte de Beaumont : deux juridictions distinctes avec prérogatives de haute, moyenne et basse justice. Il devient conseiller au parlement de Bordeaux. Au XIXe siècle le domaine est vendu et des aménagements sont réalisés  le fief appartient aux Paty, aux Vassal, aux Saint-Exupéry et aux de Contenson.                                                                        BAYAC, à un km de Bannes au nord ouest forteresse médiévale du XIVe siècle, le château de Bayac appartenait autrefois à l'archevêque de Bordeaux. IL appartient depuis 1970 à la Ville de Paris qui en a fait une colonie de vacances,  fut réaménagé au XVIe siècle où il reçut une tour ronde dans le style Renaissance. Il fut habité en continuité jusquau XXe siècle, si bien que ses propriétaires firent bâtir de nouveaux logis plus confortables aux XVIIIe et XIXe siècles. Il est inscrit aux M.H. depuis 1970.","architecture":"BEAUMONT-du-Périgord possède encore des vestiges de son enceinte fortifiée et une porte médiévale récemment restaurée, la Porte de Luzier. De 1790 à 2015, la commune a été le chef-lieu d'un canton. Jusqu'en 2001, elle a porté le nom officiel de Beaumont.                                                                             BANNES, la construction du château date de 1510. Il date du XVe et XVIe siècle. Construit au XIVe siècle, après la guerre de cent ans, il fut détruit puis reconstruit, c'est l'un des châteaux de la Renaissance les plus célèbres du Périgord. Le château de Bannes est classé aux M.H. depuis 2002.                               LUZIER,  son assise est une falaise calcaire qui domine la vallée Un premier château médiéval a été édifié  au XIVe siècle, entouré d'une enceinte fortifiée, avec des tours d'angle et des fossés. Le château a été reconstruit à la fin du XVIIe et au début du XVIIIe siècle après sa démolition lors du siège de 1585 par le Vicomte de Turenne. L'ensemble dessine un long rectangle selon un axe nord sud parallèle à la pente. L'ensemble dessine un long rectangle selon un axe nord sud parallèle à la pente. Deux ailes en retour d'équerre se greffent sur son élévation Est. L'une, à l'extrémité sud, complète la clôture de la cour sud, et l'autre fait la séparation entre les cours nord et sud.     BAYAC  bâti à Bayac, La construction date des XVe, XVIe et XIXe siècles. En juillet 1998, un spectacle son et lumière est présenté par les enfants de la colonie, retraçant l'histoire du château. Fin 2010, le château de Bayac a été mis en vente.","habitants":"Bannes Famille d'  Armand de Gontaud                    Luzier Famille de Paty\r\n        \"","divers":"Bannes GPS : 44° 47' 41,1\" Nord et 0° 44' 56,9\" Est grav de 1 à 7 .                                                               Luzier GPS : 44° 46' 11\" Nord, 0° 46' 02\" Est grav 9.                                                                                       Bayac  GPS : 44° 48' 14\" Nord et 0° 43' 44\" Est grav 8.","gps":"44° 47' 41,1\" Nord et 0° 44' 56,9\" Est grav de 1 à 7 .","images":["../image/image_24/24_Bannes_Beaumont_1.jpg","../image/image_24/24_Bannes_Beaumont_2.jpg","../image/image_24/24_Bannes_Beaumont_3.jpg","../image/image_24/24_Bannes_Beaumont_4.jpg","../image/image_24/24_Bannes_Beaumont_5.jpg","../image/image_24/24_Bannes_Beaumont_6.jpg","../image/image_24/24_Bannes_Beaumont_7.jpg","../image/image_24/24_Bannes_Beaumont_8.jpg","../image/image_24/24_Bannes_Beaumont_9.jpg"]},"Consult_chateau_formulaire6508":{"id":"Consult_chateau_formulaire6508","dept":"24","canton":"Isssigeac","commune":"Bardou","nom":"Bardou","type":"Château","periode":"XIV -XV","histoire":"A trois kilomètres au sud-Ouest à la Boisse  le château du Grand-Casset. BARDOU,  il avait haute justice sur Bardou, Nojals,Naussannes et Le Pic. Un Souillac en devient seigneur par mariage avec Charlotte d'Aubusson; en 1685 y naquirent deux jumeaux, dont l'aîné fondera la branche Souillac-Bardou et le cadet sera évêque de Lodève. La famille s'est éteinte avec François de Souillac-Bardou, chef d'escadron des armées navales, et ancien gouverneur des grandes Indes, qui s'éteignit en 1803 à Bardou où il était né en 1732. . Inscrit aux M.H. depuis 1948                              BOISSE GRAND-CASSET   Le château appartenait à la famille de Caumont, ducs de La Force, au XVIIIe siècle.  La commune compte également ce château  dans son patrimoine. Anciennement propriété de Louis Andrieux, homme politique français et père naturel de Louis Aragon, le château du Grand-Casset, appelé également « maison Georges-Lapierre », accueillait des enfants et des jeunes en grande difficulté sociale, mais ne s'occupe plus des enfants gardés par l'assistance publique et sera détruit en 2017 à cause du risque d'écroulement.","architecture":"BARDOU,  sa construction date du XIVe, XVe, et XVIIIe siècle. Il fut bâti au XIe siècle sur l'emplacement d'une motte féodale, construit avec ajout de deux ailes en équerre au XVIIIe siècle,   le donjon, simple tour de guet, surveillait les vallées de la Dordogne et de la Couze. Une salle des gardes fut ajoutée, puis au XIVe siècle, un logis et une tour ronde, flanquée d'une échauguette. Le château de Bardou fut assiégé plusieurs fois, lors de la guerre de cent ans. Deux ailes en équerre furent rajoutées au XVIIIe siècle surveillait le chemin de Beaumont à Issigeac. Repaire noble, Le corps de logis, rectangulaire, est flanqué d'une tour carrée à mâchicoulis du XIVe siècle et d'une tour cylindrique du XVe siècle. Les fenêtres sont à meneaux cruciformes. Au XVIIe siècle, une aile basse en retour d'équerre fut bâtie sur la façade ouest, cette aile est dénommée de l'Evêque car Monseigneur de Souillac, évêque de Lodève, y avait  sa chambre flanquée d'une chapelle, aujourd'hui disparue. Symétriquement,  une autre aile fut élevée en 1777, avec un porche fait de deux baies en plein cintre.         BOISSE GRAND-CASSET est un château bâti à Boisse. L'actuel château a été construit en 1898 à 1901 . Il est luvre de l'architecte Stephen Sauvestre. Le château de Boisse a été construit sur une hauteur qui domine la Vallée. Les abords du château ont été aménagés en terrasses. La construction a fait appel, à la fois, au granit local et à la brique de Bourgogne.","habitants":"Famille François de Souillac-Bardou \r\n        \"","divers":"Bardou GPS : 44° 44' 14\" Nord et 0° 41' 21\" Est  grav 1 à 4 .                                                                          Boisse GPS : 45° 57' 57\" Nord, 1° 11' 52\" Est grav 5.","gps":"44° 44' 14\" Nord et 0° 41' 21\" Est  grav 1 à 4 .","images":["../image/image_24/24_Bardou_1.jpg","../image/image_24/24_Bardou_2.jpg","../image/image_24/24_Bardou_3.jpg","../image/image_24/24_Bardou_4.jpg","../image/image_24/24_Bardou_5.jpg"]},"Consult_chateau_formulaireb45d":{"id":"Consult_chateau_formulaireb45d","dept":"24","canton":"Villambard","commune":"Villamblard","nom":"Barrière_24","type":"Vestiges","periode":"XII-XV","histoire":"BARRIERE, au XIIe siècle, construction d'un petit château fort.\r\nAu XIIIe siècle, agrandissement du château par la famille : Barrière. Au XIVe siècle, le site de Barrière relève de la seigneurie de Grignols.\r\n Au XVe siècle, le site est aménagé pour plus de confort par la famille : De Lur en 1448 . Au XVIe siècle, Jeanne de Lur, devenue huguenote, transforme la chapelle en temple. La petite histoire de France prétend que le château eut la visite de Calvin.  Durant la 2ème moitié du XVIe siècle, le château subit plusieurs sièges des armées catholiques.  Au début du  XVIIe siècle, le château est la possession de la famille Taillefer. Cette puissante famille décore avec goût les intérieurs du château.  En 1761, naissance d'Henri Wilgrin Taillefer .  A la fin du XVIIIe siècle, Henri se passionne pour l'archéologie périgourdine. Au début du XIXe siècle, Henri crée un musée archéologique. En 1809, ne pouvant assumer les frais importants pour l'entretien du château, le comte de Taillefer le vend.  A la fin du XIXe siècle, un incendie ravage le logis renaissance. En 1948, le site est inscrit aux M.H.  Au XXe siècle , le bâtiment est propriété de la commune. Malgré de nombreuses consolidations quelques murs s'effondrent.","architecture":"BARRIERE a été construit au XIIIe siècle, c'est un ancien repaire noble attesté en 1312. Il joua un rôle majeur au cours de la guerre de cent ans.  Au cours des guerres de religion, Jeanne de Lur, devenue huguenote, fit transférer  la chapelle en un temple qui aurait reçu la visite de Calvin.  Le château  Barrière fut assiégé, peu après, ainsi qu'en 1591. Ensuite le château tomba en ruines. En 1980, une tour circulaire s'est écroulée après le passage d'un d'avion supersonique, tandis qu'une autre tour a été coulée, dans le béton, pour éviter sa chute. Seul un inventaire de 1559 nous permet de nous faire une idée de la magnificence de cette demeure.  Ses ruines sont ouvertes au public et se visitent, aujourd'hui.","habitants":"Famille  Barrière.\r\n        \"","divers":"Barrière  GPS : 45° 01' 13,8\" Nord, 0° 32' 13,8\" Est grav de 1 à 5.","gps":"45° 01' 13,8\" Nord, 0° 32' 13,8\" Est grav de 1 à 5.","images":["../image/image_24/24_Barri%c3%a8re_24_1.jpg","../image/image_24/24_Barri%c3%a8re_24_2.jpg","../image/image_24/24_Barri%c3%a8re_24_3.jpg","../image/image_24/24_Barri%c3%a8re_24_4.jpg","../image/image_24/24_Barri%c3%a8re_24_5.jpg"]},"Consult_chateau_formulaireff47":{"id":"Consult_chateau_formulaireff47","dept":"24","canton":"Sarlat-la-Canéda","commune":"Marcillac -st-Quentin","nom":"Barry_Marcillac","type":"Château","periode":"XVI","histoire":"BARRY, cest à François III de Gérard, lieutenant général du Périgord, quest due lacquisition de la maison noble du Barry au début du XVIe siècle. Il se qualifie de seigneur du Barry, de la Ricardie, du Blancher et de la Maletie. François V acquit la paroisse de Marcillac en1772 et se partagea entre Sarlat et le Barry. François VI et son fils Eugène mèneront tout comme lui cette vie de gentilhomme campagnard, cest Eugène qui fit abattre au Barry une partie des bâtiments jugés vétustes et dangereux vers 1850. A partir de cette époque, débute une lente dégradation  du Barry voyant préférer les domaines de Giverzac et de Sarlat. Limportance du domaine en indivision nécessita la mise en fermage en 1888. Les fermiers  furent logés dans le château dont létat était préoccupant. Après le décès  des trois frères indivis, le château du Barry fut vendu en 1925 et fit, par la suite, lobjet de divisions successives, aujourd'hui chambres d'hôtes.","architecture":"BARRY, Ruines du château des sires du Barry; tour. l'édifice  de plan rectangulaire à deux niveaux et lucarnes sur un toit à deux pans recouvert de tuiles, accolé au extrémitées de la même face de deux tours carrées l'une plus hautes que l'autre à toit pointu et en pavillon pour la plus haute d'un étage avec chemin de ronde cette dernière accolée d'une tourelle carrée  à toit très pointue.","habitants":"seigneur du Barry\r\n        \"","divers":"Château de Barry à Marcillac","gps":"","images":["../image/image_24/24_Barry_Marcillac_1.jpg","../image/image_24/24_Barry_Marcillac_2.jpg","../image/image_24/24_Barry_Marcillac_3.jpg"]},"Consult_chateau_formulaire61ab":{"id":"Consult_chateau_formulaire61ab","dept":"24","canton":"St-Pierre de Chignac","commune":"Bassilac","nom":"Bassilac","type":"Château","periode":"XIV-XVI","histoire":"A Bassilac, château du Goudeau, de Rognac et le manoir de Meycourby. \r\n ROGNAC  est une ancienne forteresse médiévale du XVIe siècle et entouré de douves en eaux vives, crées par une dérivation de la rivière l'Isle. Le château de Rognac a notamment été lors de la fronde du XVIIe siècle un repaire de rebelles. \r\nGOUDEAU  est l'ancienne demeure des d'Abzac de Ladouze et de la famille Courtey. Cet ancien repaire noble bâti au XIVe siècle, également orthographié Goudeau, fut restauré à la fin du XIXe siècle.","architecture":"GOUDEAU destinées à protéger la ville des normands. Les vestiges du fort de \"Rupem Bassilhaco\"sont encore visibles aujourdhui à la Roche de Goudaud. Plus tard, le bourg nest pas épargné par les exactions commises pendant la guerre de cent ans ou les guerres de Religion: en effet, le livre noir du consulat de Périgueux, mentionne plusieurs révoltes des croquants. l'édifice de style oblong à deux niveaux sur soubassement et à toits brisées avec séries de lucarnes sur combles à la Mansard deux tours rondes à trois niveaux avec mâchicoulis surmonté de toit en poivrière.\r\nROGNAC, le château de Rognac, contourné par un bras de l'Isle, du XVIe au XVIIe siècles, inscrit aux M.H. depuis 1945  un kilomètre au nord-est du bourg de Bassillac, en bordure et en rive gauche de l'Isle qui le longe au nord-est.  Au nord de l'îlot ainsi formé était implanté un moulin qui comportait des échauguettes. Il est aujourd'hui en ruines. Le château se compose d'une grosse tour ronde qui sert d'avant-bec à l'édifice et sur laquelle s'appuient deux logis accolés en angle droit, à l'opposé deux tours rondes arrasées. Le château et le moulin sont inscrits au titre des M.H. depuis le 12 juillet 1945.","habitants":"Famille Courtey\r\n        \r\n        \"","divers":"A Bassilac, château du Goudeau grav  de 1 à 3, de Rognac grav 4-5 et le manoir de Meycourby grav 6.     Rognac GPS : 45° 11' 55\" Nord et 0° 49' 16\" Est","gps":"45° 11' 55\" Nord et 0° 49' 16\" Est","images":["../image/image_24/24_Bassillac_1.jpg","../image/image_24/24_Bassillac_2.jpg","../image/image_24/24_Bassillac_3.jpg","../image/image_24/24_Bassillac_4.jpg","../image/image_24/24_Bassillac_5.jpg","../image/image_24/24_Bassillac_6.jpg"]},"Consult_chateau_formulairef191":{"id":"Consult_chateau_formulairef191","dept":"24","canton":"Mussidan","commune":"Mussidan","nom":"Bassy_ Mussidan","type":"Château","periode":"XVI-XIX","histoire":"A Mussidan le château de Bassy, à un kilomètre au nords-est à St-Médart de Mussidan le château de Longua  et à cinq km plus à l'ouest à St-Laurent les Hommes   Fournils et la Vigerie.                                   BASSY, l'ensemble immobilier du château de Bassy ne constitue qu'une fraction d'un important domaine agricole qui comportait au début du siècle 4 métairies. Les propriétaires, les fréres Pecoul demeuraient alors dans un ancien chalet situé à l'emplacement du château.  En 1919, un industriel de la région stéphanoise, Mr Grosjiat, acquit cette exploitation.  Sur l'initiative de Mme Lacorre, une des premières femmes ayant titre de ministre sous le ministère de Léon Blum, la caisse Interdépartemental d'assurances sociales de Seine, Seine et Oise acquiert cette propriété en 1939.  Durant la guerre, Bassy accueillera les régiments du 6e Cuirassé et des Tirailleurs Algériens en repli et ce n'est donc, qu'en 1944 qu'il fut décidé d'y aménager un préventorium en 1950 : de jeunes filles de 6 à 16 ans 126 lits     Le centre médical, est un établissement de santé privé d'intérêt collectif (ESPIC).                LONGUA  Au levant de l'église de Saint-Médard de Mussidan, au bord de l'Isle, le château de Longa (ou Longua) fut une demeure qui reçut en 1565, Catherine de Médicis, Charles IX et Jeanne d'Albret. On y rencontra en d'autres temps, Montaigne, Diane de Foix, le Vert Galant et Sully. Primitivement aux Barrière, le fief passa par mariage aux Lur, il était aux Masparand au XVIIe, et aux Leybardie au XVIIIe siècle.   Au vieux logis a succédé une demeure du premier Empire dans un parc immense, ombragé de cèdres bleus. A l'intérieur, un portrait inédit de Joseph de Maistre, en effet, la demeure appartient maintenant aux Vignet de Vandeuil et l'on se rappelle que l'ami et beau-frère de Lamartine, Louis de Vignet, avait épousé une de Maistre.","architecture":"VIGERIE    La paroisse de Saint-Laurent-des-Hommes se divise endeux individualités jusquà la fin du XVIIIe siècle, lune, à louest,dépend de la seigneurie de Montpon et lautre, à lest, de la seigneurie deMussidan. Le château de la Vigerie laisse deviner sa façade modernisée àtravers des ombrages généreux. Il conserve deux portraits d'un abbé Grelletyde la Serve, dont l'un représente un prêtre, de l'âge de 40 ans, auprèsduquel un amour portant l'équerre et le compas, apporte la preuve de sonappartenance à la Franc-maçonnerie.           BASSY , C'est en 1925 que débuta la construction du château tandis que la création du parc est confiée à un pépiniériste-paysagiste renommé, Mr Perdoux de Bergerac. Deux corps de logis un en plan rectangulaire, l'autre en U,  l'ensemble à trois niveaux avec série de lucarnes sur un toit brisées couvertures en ardoise toit en pavillons sur les ailes, l'édifice possède une tourelle carrée  sur angle.     LONGUA,corps de logis de plan rectangulaire à deux niveaux sur soubassement à sept travées donc la centrale légèrement saillante avec fronton triangulaire au niveau du toit en croupe recouvert d'ardoise.\r\n FOURNIL-MUSSIDAN, édifié au XIXe siècle, ancienne résidence de la famille de La Crompe de La Boissière . Construit  de style néo-Renaissance construit selon l'architecte Henri Duphot en 1858, situé à Saint-Laurent-des-Hommes en Dordogne.  Aujourd'hui hôtel.","habitants":"Famille Pécoul                                                                Joseph de Maistre\r\n        \r\n        \"","divers":"A Mussidan le château de Bassy grav de 1 à 4, château de Longua grav  5-6  et à St-Laurent les Hommes   Fournils grav 8-9 et la Vigerie","gps":"","images":["../image/image_24/24_Bassy_Mussidan_1.jpg","../image/image_24/24_Bassy_Mussidan_2.jpg","../image/image_24/24_Bassy_Mussidan_3.jpg","../image/image_24/24_Bassy_Mussidan_4.jpg","../image/image_24/24_Bassy_Mussidan_5.jpg","../image/image_24/24_Bassy_Mussidan_6.jpg","../image/image_24/24_Bassy_Mussidan_7.jpg","../image/image_24/24_Bassy_Mussidan_8.jpg","../image/image_24/24_Bassy_Mussidan_9.jpg"]},"Consult_chateau_formulairea470":{"id":"Consult_chateau_formulairea470","dept":"24","canton":"Thenon","commune":"Thenon","nom":"Basty","type":"Château-Vestiges","periode":"XII","histoire":"BASTY, au sud-est de la commune deThenon,  fut la propriété des Bruzac, des Bastit, des Durand dAuberoche, des Treilhard, des Villechièzes, des Van Lokeren, des Marguerie et des Decoux-Lagoutte. Perché sur un coteau, près dun site préhistorique, ce château a conservé des morceaux du XVe siècle très retouchés au XVIIIe siècle; une tour descalier soude deux logis en équerre. Il abrite aujourdhui une colonie de vacances.\r\nTHENON,a l'époque médiévale, l'existence de la paroisse est relevée dans le cartulaire de Saint Amand dès 1185, elle constituait un castrum, position de défense délimitée à l'ouest par des « fossés » aujourd'hui comblés. Il ne subsiste que peu de vestiges de cette époque. L'orthographe de Thenon a beaucoup varié. Ainsi, jusqu'au début du XIIIe siècle, seule Teno est usitée. Mais dès 1209, le célèbre troubadour Bertran de Born écrit Thenon.  La seigneurie de Thenon, d'abord possession des La Faye, échut par la suite à la puissante famille des Hautefort, ces liens étant renforcés par des alliances comme celle qui unit en 1237 Aymard de La Faye, fils d'Adhémar, seigneur de Thenon, à Marguerite de Born, petite fille du troubadour Bertran de Born. Pendant la guerre de cent ans, Mathe de Born a épousé Hélie de Gontaud, seigneur de Badefol et Lalinde qui est alors devenu seigneur de Hautefort et a relevé le nom. Il est mort en 1396. Jean II de Hautefort a été chambellan des rois Charles VIII et Louis XII, gouverneur du Périgord et du Limousin. Il a obtenu de François Ier la création de foires à Hautefort et Thenon. Plus tard, Jean de Hautefort fit son testament à Thenon.","architecture":"THENON, le château : forteresse, du XIIe siècle, le château se composait d'un corps de logis, d'une tour carrée, d'un pavillon à l'est et d'un mur d'enceinte au nord avec une porte fortifiée de 40 mètres de hauteur qui fut démolie en 1872 car le passage était trop étroit. L'ensemble occupant un emplacement de 1 000 m2 environ, bordé de fossés. Il fut plusieurs fois assiégé et pris pendant la guerre de cent ans. Les anglais commandés par le capitaine Houdington s'emparent de la place forte le 1er septembre 1439. Ainsi, par lettres données à Orléans le 9 octobre 1439, Charles VII s'adressait à l'évêque de Tulle pour remettre « en son obéissance » la place et forteresse de Thenon, « naguères prinse par les ennemis ». Libéré le 28 décembre, un incendie se déclara au milieu du château, brûlant parchemins et titres. Il dépendait tout d'abord de la châtellenie d'Hautefort. Ancien repaire noble : fief des La Faye, des de Born et enfin des Hautefort de Vayres. En 1760, il avait haute justice sur la ville et sur une partie d'Azerat. Aujourd'hui, il ne subsiste qu'une partie de son donjon et de ses logis du XIVe siècle.","habitants":"Basty Famille des Bruzac\r\n        \"","divers":"Château et vestiges à Thenon","gps":"","images":["../image/image_24/24_Basty_1.jpg","../image/image_24/24_Basty_2.jpg"]},"Consult_chateau_formulaireb5a4":{"id":"Consult_chateau_formulaireb5a4","dept":"24","canton":"Terrasson-Lavilledieu","commune":"Beauregard-de-Terrasson","nom":"Beauregard_Terrasson","type":"Château","periode":"XV","histoire":"Château de Bélet, Mellet, XVIIe siècle, inscrit en 1990 au titre des M.H.  Château de Potuverie (ruines du) et à six km au nord à VILLAC Plusieurs châteaux et manoirs ci- joints la liste la Maison Salviat, inscrite en 1979 au titre des M.H. pour ses façades et toitures.  Domaine le Noyer, inscrit en 2016 au titre des M.H.. Manoir de Lapeyre. Manoir (ou château) du Pont.\r\nAncien presbytère XVIe : lucarnes Renaissance (IMH).   Manoir du XVe  Siecle(IMH).  Maisons de pierre rouge.  Manoir de La Mothe XIXe siècle, près d'une motte féodale ; manoir de la Peyre.  Château du Pont.  Ruines du château fort de Muratel.\r\nMELLET. La seigneurie de Mellet a appartenu aux familles Mellet, Albret, Losse, Campagniac, Combret de Marcillac, Boishamon. La terre de Mellet devait l'hommage à l'évêque d'Angoulême, seigneur baron de la châtellenie d'Ans.","architecture":"MELLET La plus ancienne mention d'un château à Mellet date de 1467 quand un acte mentionne le « Repayrium de Meleto ». Le château actuel a été construit dans la seconde moitié du XVIIe siècle sur les fondations du XIIIe siècle. On peut aussi voir la croix du Mellet, peut-être une croix hosannière ou une croix de rogations. Il a été le témoin en juillet 1944 d'une opération de la résistance commandée par Roger Ranoux, alias « Hercule », pour y récupérer des denrées alimentaires. Le château est d'un style très sobre comprenant un corps de logis rectangulaire compris entre deux pavillons avec une toiture en ardoises. Les façades et les toitures du château et des communs sont inscrites au titre des monuments historiques le 2 février 1990.                                           Maison SALVIAT connue sous lappellation de maison \"Louis XIII\" Cette maison possédait un très beau portail d'entrée en pierre de taille ainsi qu'une cour d'honneur qui fut empiétée par la construction de la voie de chemin de fer.","habitants":"Famille Mellet\r\n        \"","divers":"A Beauregard -Terrasson les vestiges de Villac grav 1, le château de Mellet grav 2-3  GPS : 45° 08' 53\" Nord, 1° 13' 43\" Est. A Villac; manoir de Pierre Combette grav 5, de Salviat grav 6-7-8.","gps":"45° 08' 53\" Nord, 1° 13' 43\" Est. A Villac; manoir de Pierre","images":["../image/image_24/24_Beauregard_Terrasson_1.jpg","../image/image_24/24_Beauregard_Terrasson_2.jpg","../image/image_24/24_Beauregard_Terrasson_3.jpg","../image/image_24/24_Beauregard_Terrasson_4.jpg","../image/image_24/24_Beauregard_Terrasson_5.jpg","../image/image_24/24_Beauregard_Terrasson_6.jpg","../image/image_24/24_Beauregard_Terrasson_7.jpg","../image/image_24/24_Beauregard_Terrasson_8.jpg"]},"Consult_chateau_formulaire2fe5":{"id":"Consult_chateau_formulaire2fe5","dept":"24","canton":"Mareuil","commune":"Beaussac","nom":"Beaussac_Poutignac","type":"Château","periode":"XV-XVII","histoire":"A Beaussac château d'Aucors, XVe siècle XVIIe siècle, inscrit aux M.H. depuis 1948.\r\nChâteau de Poutignac, XVe siècle XVIe siècle XVIIIe siècle, inscrit aux M.H. depuis 1948.\r\nChâteau de Bretanges, XVIIe siècle, ancienne résidence de la famille de Lestang de Ringère.\r\nAUCORS, la construction date du XVe siècle. Il a été restauré au XVIIe siècle de style Renaissance, allongée sur une falaise, creusée de grottes. Il est formé de deux corps de logis en équerre et d'une tour d'escalier polygonale positionnée à leur jonction. La façade principale s'orne d'une tourelle en encorbellement. Dans la cuisine s'ouvre un puits.  Famille : Faulcon, Pastoureau, aux Conan et pour finir aux Maillard. Aucors appartient à Mr et Mme Piraud.     BRETANGES  de la famille  de Moneys d'Ordières, le fils de la maison Alain    fut, le 16 août 1870, l'objet d'une tragédie aussi atroce qu'inexplicable. Agé de 31 ans fut assassiné et  brûlé vif. Quelques mois après, la justice condamna les assassins, incapables d'expliquer une telle folie.                                                           POUTIGNAC, Il appartenait aux Villars.","architecture":"AUCORS, Au nord-ouest de Beaussac,  début XVe puis XVIe siècle est situé sur une falaise percée de grottes et fût construit par Johan de Faulcon. Il a été remanié au XVIIe siècle, il garde une tour polygonale, des poivrières et un curieux dallage de galets. Une des particularités de ce lieu se situe dans la salle à manger où réside un puits rejoignant une rivière souterraine.  BRETANGES, bâti au XVIIe siècle, est une gentilhommière composé dun corps logis rectangulaire accolé à un pavillon massif flanqué de deux poivrières, qui se remarquent de loin. POUTIGNAC  autrefois des marécages occupent le site,mais leur assèchement permet un développement démographique et certains nobles ou bourgeois y font élever leur demeure. En effet, on peut apercevoir une dizaine de maisons nobles construites entre les XVe et XVIIe siècles comme l'mposant manoir de Poutignac avec une grosse tour ronde et son chemin de ronde sur corbeaux, tourelle en encorbellement, tour carrée formant corps de logis à fenêtres à meneaux. Autre corps de logis sur la face Est,   surmonté au XVIIIe siècle d'un toit à la Mansart. Des communs sont accolés à l'habitation.","habitants":"Famille de Mr et Mme Piraud                                         Famille de Lestang de Ringère.                                Famille Villars\r\n        \"","divers":"A Beaussac château d'Aucors  GPS : 45° 29' 22\" Nord et 0° 29' 04\" Est  grav 4-5.                              Bretanges 45° 29' 39\" Nord et 0° 30' 00\" Est  grav  6. Poutignac GPS : 45° 29' 39\" Nord et 0° 30' 00\" Est grav 1 à 3.","gps":"45° 29' 22\" Nord et 0° 29' 04\" Est  grav 4-5.","images":["../image/image_24/24_Beaussac_Poutignac_1.jpg","../image/image_24/24_Beaussac_Poutignac_2.jpg","../image/image_24/24_Beaussac_Poutignac_3.jpg","../image/image_24/24_Beaussac_Poutignac_4.jpg","../image/image_24/24_Beaussac_Poutignac_5.jpg","../image/image_24/24_Beaussac_Poutignac_6.jpg"]},"Consult_chateau_formulaireed69":{"id":"Consult_chateau_formulaireed69","dept":"24","canton":"Saint-Astier","commune":"St-Léon sur l","nom":"Beauséjour_St_Léon","type":"Château","periode":"XIV-XIX","histoire":"BEAUSEJOUR, dont les fondations remontent au XIVe siècle, construit par la célèbre famille Talleyrand, met son cadre à votre disposition pour votre mariage,ou toute autre manifestation. Propriété des Talleyrand-Périgord  du célèbre diplomate et gastronome Charles Maurice de Talleyrand-Périgord possède tous les atouts pour vous accueillir dans un cadre pittoresque au bord de la riante vallée de lIsle. Domaine de beauséjour a connu des propriétaires successifs comme les Fayolle, les Candale, les La Cropte et les Salignac de la Mothe Fénelon.","architecture":"BEAUSEJOUR est un château bâti à Saint-Léon-sur-l'Isle, la construction  de plan quadrangulaire  amputé de ses tours circulaires de flanquement date du  XVe au XVIe siècle fut restauré au XVIIe siècle, puis, il fut incendié pendant la Fronde.  Une chapelle complète l'ensemble, en 1607. Vers 1910, les communs ont été aménagés en dépendances agricoles. Le logis abrite un restaurant dans les dernières années du XXe siècle.","habitants":"Famille de Talleyrand-Périgord \r\n        \"","divers":"St-Léon sur l'isle, Beauséjour  GPS sur  00° 29' 44 » E  45° 07' 18 » N. grav 1 à 9.","gps":"","images":["../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_1.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_2.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_3.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_4.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_5.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_6.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_7.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_8.jpg","../image/image_24/24_Beaus%c3%a9jour_St_L%c3%a9on_9.jpg"]},"Consult_chateau_formulaire5fff-2":{"id":"Consult_chateau_formulaire5fff-2","dept":"24","canton":"Nontron","commune":"Lussas-Montronneau","nom":"Beauvais_24","type":"Château","periode":"XVI","histoire":"BEAUVAIS sa construction a débuté en 1533 et fut achevée à la fin du XVIe siècle pour Thibaud de Conan et François du Faure : XVe siècle, famille du Faure : demoiselle de Ségur, fille du comte François d'Escars et de Françoise de Veyrrières. Elle épouse Alain du Faure de la Roderie de la Curée et de Beauvais, baron de Saint Martial, le 10 juillet 1629 à Lussas puis à Saint-Front la Rivière. Veuve, elle se remarie le 9 février 1652, à Pierre de Bonneval, vicomte de Château-Rocher. Enfin, le 11 juin 1663 au château de Rochechouart, Jean de Rochechouart, vicomte de bâtiment. Gabrielle d'Escars, marquise de Saint Projet, fille du marquis Annet d'Escars et de Paule de Montlezun. Elle épouse en octobre 1726,  Jacques de la Font, marquis de Saint-Projet, Montesquiou, vicomte de Lavedan, grand bailli et sénéchal de la Haute Auvergne. Après avoir vécu au château de Saint-Projet avec son époux, elle se retire au château de Beauvais, veuve et sans enfants. Elle décède à plus de 80 ans le 3 avril 1760 et fut inhumé le lendemain dans la chapelle qu'elle avait fait construire, Françoise de Pérusse d'Escars née en 1621 dite « Mademoiselle de Ségur de la Renaudie », fille d'Honneur de la Reine Anne d'Autriche sur de Catherine de Pérusse d'Escars, comtesse de Beauvais. Les marquis de Perusse d'Escars, seigneurs de Beauvais et de Lussas, en 1762 acquis par les Plancher de la Garélie, au XIXe siècle acquis par Alexandre Robin et au XXe siècle passe par héritage au Maillard.","architecture":"BEAUVAIS ancien repaire noble est attesté en 1456. Remparts médièval autour d'un logis Renaissance encadré de deux grrosses tours à mâchicoulis. Le château de Beauvais était appelé autrefois le Repair de Belver, assez vaste, corps de logis à six travées à deux niveaux et lucarnes sur un toit pentu. Au centre des deux façades principales un escalier à rampes et l'autre face nord en fer à cheval avec rampes en fer forgé. Les deux tours cylindriques qui flanquent le corps de logis confèrent à cette demeure de plaisance une allure guerrière, elles portent toutes deux une couronne de mâchicoulis reposant sur des consoles. l'édifice est classé aux M.H depuis le 11/01/2011.","habitants":"Famille du Faure \r\n        \"","divers":"Beauvais  GPS : 45°30'42\" Nord et 0°35'23\" Est","gps":"45°30'42\" Nord et 0°35'23\" Est","images":["../image/image_24/24_Beauvais_24_1.jpg","../image/image_24/24_Beauvais_24_2.jpg","../image/image_24/24_Beauvais_24_3.jpg","../image/image_24/24_Beauvais_24_4.jpg","../image/image_24/24_Beauvais_24_5.jpg"]},"Consult_chateau_formulaire9e9a":{"id":"Consult_chateau_formulaire9e9a","dept":"24","canton":"Montignac","commune":"Thonac","nom":"Belcayre","type":"Château","periode":"XV-XVI","histoire":"Le château de Belcayre remonte aux XVe, XVIe et XIXe siècles.\r\nLe château de Losse, (voir article)\r\nLa tour penchée de la Vermondie, qui pourrait être d'origine gallo-romaine, est inscrite au titre des M.H. depuis 1941.\r\n BELCAYRE, Antoine de Reilhac, qui avait embrassé le parti de la Ligue, y fut fait prisonnier en 1592, après de violents combats qui l'opposèrent aux partisans du duc de Guise commandés par le baron de Beynac. Belcayre connut comme seigneur, un emprunteur qui se faisait prier pour s'acquitter de ses dettes. Comme un homme averti en vaut deux, il était conseillé à ce dernier, éventuel bailleur: d'allez sur le bord de la Vézère, en face du château et interroger fortement : monsieur de Belcayre, êtes-vous bon payeur ? Si l'écho répondpas guère, méfiez-vous !                      VERMONDIE  démantelée en 732 par les Sarrazins mais ailleurs se réclamant dune construction au XIIIe siècle c'est une tour de garde ou fut enfermée la fille du seigneur de la Vermondie qui voulait épouser le seigneur de Losse, elle fait aujourdhui partie dun superbe domaine privé qui longe la route reliant Plazac mais son inclinaison rappe
