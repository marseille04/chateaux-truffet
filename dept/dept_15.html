mages":["../image/image_15/15_St_Martin_Valmeroux_1.jpg","../image/image_15/15_St_Martin_Valmeroux_2.jpg","../image/image_15/15_St_Martin_Valmeroux_3.jpg","../image/image_15/15_St_Martin_Valmeroux_4.jpg","../image/image_15/15_St_Martin_Valmeroux_5.jpg","../image/image_15/15_St_Martin_Valmeroux_6.jpg","../image/image_15/15_St_Martin_Valmeroux_7.jpg","../image/image_15/15_St_Martin_Valmeroux_8.jpg","../image/image_15/15_St_Martin_Valmeroux_9.jpg"]},"Consult_chateau_formulaire6445":{"id":"Consult_chateau_formulaire6445","dept":"15","canton":"Saint-Flour","commune":"Saint Martin sous Vigouroux","nom":"St_Martin_Vigouroux","type":"Château","periode":"XII-XV","histoire":"Quatre châteaux à Saint-Martin sous Vigouroux, de Lescure du XVe siècle de Faydols du XIIe siècle,  de Vigouroux du XIVe siècle (voir article) et de la Volpilhére ruiné.                                                           LESCURE, ancienne ferme avec Tour du XIIe siècle, entourée d'un magnifique jardin. La terre et seigneurie de L'Escure appartenaient à la famille de Brezons. Cependant, dès 1297 cette seigneurie fut la propriété de la famille de Gasc ou Gasquet qui la possédait encore en 1588. Guillaume de Cardaillac, aidé par les Anglais, pilla en 1364 le château alors qu'il dépendait de la vicomté de Murat, sans doute en présence d'une seigneurie importante partagée entre plusieurs propriétaires, cas très courant en Auvergne. La duchesse d'Harcourt, héritière des Brezons, en possédait une partie en 1668, l'autre partie relevant de la châtellenie de Vigouroux. La seigneurie vint ensuite aux Bonnafos, seigneur de Roussille et de Bellinay. Guillaume de Lastic seigneur de Fontio quatrième fils d'Annet II de Lastic de Vigouroux, en devint propriétaire en 1714 suite à son mariage avec Marguerite de Bonnafos. Le château passa ensuite à Joseph de Floirac Gourdon, arrière petit-fils d'Annet II qui le vendit au comte Joseph de Lastic de Vigouroux, le 10 juillet 1810 et qui le vendit au sieur Bousquet. Aujourd'hui chambres d'hôtes de Phoebe Sophie Couillaud . \r\nVOLPILHERE, appartenait d'abord à la famille de Gasc, puis à celle de Greil de La Volpilhère qui l'a conservé jusqu'en 1793, date à laquelle il a été dévasté.","architecture":"On compte au moins trois châteaux sur cette commune : le château de Lescure, le château de La Volpilière qui a donné son nom à une des plus anciennes familles féodales de la province, et enfin le château de Vigouroux dont nous allons parler.                                    Vigouroux le vieux château fut détruit et les pierres servirent à la construction du château actuel dont les premiers éléments datent du XVe siècle . Il fut classé en 1987 dont des  éléments intérieurs auxquels malheureusement nous n'avons pas accès.             Volpilhère, Il comprenait une tour rectangulaire de quatre étages, coiffée de mâchicoulis, avec un corps de logis ajouté au XVIIe siècle avec deux tours et un escalier monumental à deux rampes.","habitants":"Famille de Brezons                                                                              Famille de Lastic\r\n        \"","divers":"Château se Lescure à Saint-Martin de Vigouroux","gps":"","images":["../image/image_15/15_St_Martin_Vigouroux_1.jpg","../image/image_15/15_St_Martin_Vigouroux_2.jpg","../image/image_15/15_St_Martin_Vigouroux_3.jpg","../image/image_15/15_St_Martin_Vigouroux_4.jpg","../image/image_15/15_St_Martin_Vigouroux_5.jpg"]},"Consult_chateau_formulaire8f68-2":{"id":"Consult_chateau_formulaire8f68-2","dept":"15","canton":"Mauriac","commune":"Saint-Paul de Salers","nom":"St_Paul_Salers","type":"Château","periode":"XVII","histoire":"Trois château à Saint-Paul, celui de St-Paul, de la Fauvelte et de Lapierre.                                                                                                  ST-PAUL, la seigneurie de St-Paul,  chef lieu un château situé aux environs  de la commune qui porte encore le nom de Pré du Chastel, appartenait, en 1526, à Pierre de Vie, baron de Calvinet et neveu du pape Jean XXII, passa ensuite à Arnaul de Vielmur, qui, voulant marcher sur les traces de son prédécesseur, les affranchit de la taille aux quatre cas; elle devint plus tard la propriété de la maison de Salers.                                                                                        FAUVELTE (la), jolie maison de campagne  située et très proche de Salers. La Fauvelie était autrefois le chef-lieu d'un petit fief qui appartenait, en 1600, à Christophe de Chalvet, trésorier de France, et qui devint plutard la propriété de la famille de Lafarge de Salers.                                   LAPIERRE Pierre (la), maison de campagne. Cette belle propriété appartenait, en 1611, à la famille de Vigier. Jacques de Vigier, seigneur du Verdier; Antoine de Vigier, seigneur de Prades, et Jean de Vigier, archiprêtre de Mauriac, la vendirent, dans le cours du XVIIe siècle, à Pierre de Lafarges, de Salers, seigneur de la Fauvelie. Pierre de La Farge est né à Salers le 16 juin 1647, de Gervais de La Farge et de Catherine Vaissière. Il s' engagea dans le régiment de cavalerie de Caylus, passa en novembre 1676, dans celui de Saint Aignan, où il devint capitaine le 23 juillet 1677. Aide major au régiment de Royal-Cavalerie, il est fait chevalier de Saint-Louis le 16 avril de la même année et termine sa carrière en qualité de major de la brigade des carabiniers de Cloys. En récompense de ses longs services qui durèrent 43 ans, louis XIV l' anoblit par lettres patentes données à Marly en avril 1711.\r\nPierre De La Farge mourut à Salers le 13 septembre 1737 à l' âge de 90 ans. Le château aujourd'hui appartient à Jean de Roquemaurel.","architecture":"La Pierre, c'est une vaste commune agricole qui sétend sur la haute vallée glaciaire de la Maronne, affluent de la Dordogne, et sur tout le plateau du Puy Violent. Juché face au village, le château de La Pierre, construit vraisemblablement au XVIe siècle, fait admirer son beau donjon carré et sa fine tour d'escalier circulaire.\r\n Fauvelte (la), jolie maison de campagne avantageusement située et très proche de Salers. La Fauvelie était autrefois le chef-lieu d'un petit fief qui appartenait, en 1600, à Christophe de Chalvet, trésorier de France, et qui devint plus tard la propriété de la famille de Lafarge, de Salers.                                                                        Saint-Paul se compose d'un corps de logis central de trois niveaux avec lucarne flanqué à droite d'un donjon  carré de quatre niveaux toiture à quatre pans et échauguettes accolée plein cintres aux niveaux des mâchicoulis , à l'opposé côté sud une tourelle à quatre niveaux  avec mâchicoulis et toit en poivrières, grande dépendance  se prolonge sur la partie gauche toit en croupes.","habitants":"Famille de Pierre de La Farge\r\n        \"","divers":"Château de Lapierre à Saint-Paul de Salers","gps":"","images":["../image/image_15/15_St_Paul_Salers_1.jpg","../image/image_15/15_St_Paul_Salers_2.jpg","../image/image_15/15_St_Paul_Salers_3.jpg","../image/image_15/15_St_Paul_Salers_4.jpg","../image/image_15/15_St_Paul_Salers_5.jpg"]},"Consult_chateau_formulairefa64":{"id":"Consult_chateau_formulairefa64","dept":"15","canton":"Naucelles","commune":"Saint-Projet de Salers","nom":"St_Projet","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Saint-Projet,de Béraldet, le logis de Lamargé  et la Roche  ruiné.                                                                                 BERALDET   cité au XIIIe Siècle. Il tenait son nom d'un certain Béraud qui l'avait fait construire. C'était un fief qui appartenait à l'origine à la maison de Tournemire. Il était entré, vers la fin du XVIe Siècle, dans celle de Nozières Montal, et vers le milieu du XVIIe Siècle, dans celle de Lasalle.                                             LAMARGE, pas d'information historique.                                                La ROCHE  pas d'information historique.  St-PROJET, la seigneurie de Saint Projet de Salers était divisée entre les maisons de Montal et de Tournemire.","architecture":"Le château du Béraldet, cité au XVIIIe siècle,  aujourd'hui, des vestiges sont visibles sur une butte isolée de la montagne du Roussy, village situé sur les bords du ruisseau de Merlius, à l'ouest.\r\nLe logis de Lamargé, datant du XVe siècle, était flanqué de trois tours de plan carré. Maintenant, il ne reste plus de traces de ce bâtiment, et on ne trouve que les bâtiments d'une ferme.\r\nLe château de La Roche, désigné sous le nom de Château-Vieux. En 1789, La Roche était la propriété de M. de la Margé. Les ruines, dont on ne possède aucun document, sont signalées au XIXe siècle sur le sommet d'un rocher d'une grande élévation. Une légende court sur ce Château-Vieux et témoigne de \"l'existence d'une grosse pierre avec un anneau, en dessous de laquelle se trouve le trésor du château. Seulement, sans l'aide de personne, il est impossible de soulever cette imposante pierre, et de retour avec du renfort, il est alors impossible de la retrouver.","habitants":"Famille de M. de la Margé\r\n        \"","divers":"Château de Béraldet et de la Roche à Saint-Projet de Salers","gps":"","images":["../image/image_15/15_St_Projet_1.jpg","../image/image_15/15_St_Projet_2.jpg","../image/image_15/15_St_Projet_3.jpg"]},"Consult_chateau_formulaire6100":{"id":"Consult_chateau_formulaire6100","dept":"15","canton":"Murat","commune":"Saint-Saturnin","nom":"St_Saturnin_Cantal","type":"Château","periode":"XVI","histoire":"trois châteaux à Saint-Saturnin, celui de Peyrelade, des Combes manoir du XVIe siècle de gardelles et de la Vergne du XIXe siècle.                              COMBES, c'était un fief relevant d'Aubijoux. Le château, qui existe encore, était muni de tours, de créneaux et mâchicoulis. Antoine de Salesse, mari de Gabrielle Commolet, en était seigneur en 1559. Jacques de Salesse fit, en 1639, un échange avec Claude de la Vaissière, seigneur de Revel, et lui céda la terre et le château de Combes. Jeanne de la Vaissière, fille de Béraud, porta Combes et St-Saturnin en dot, en 1683, à Guy d'Anglards. Antoine d'Anglards était seigneur de Combes en 1761. Son frère eut la seigneurie de St-Saturnin. Antoine ne laissa que deux filles : l'une d'elles, Françoise-Catherine d'Anglards, épousa en 1785 Michel-Henri Ferrand de Fontorte, de la ville de Riom, qui, étant devenu possesseur de la terre de Combes, la revendit à un spéculateur, qui l'a divisée en plusieurs lots. Le château en ruines existe encore.                                                                                   PEYRELADE François de Peyrelade acheta, en 1601, la montagne de Carteyrou, où se trouve situé le château. Jean d'Estaing, seigneur de Lugarde, donna, en 1623, la haute justice de Carteyrou à François de Peyrelade, en récompense de ses services. Jacques de Peyrelade ayant fait de mauvaises affaires, la terre fut saisie en 1658, et vendue à  François de Beaufort-Canilhac, qui devint ainsi seigneur de Peyrelade Il revendit cette terre avec le château fort et les dépendances, à Gaspard de Canilhac, vicomte de Laroche. Elle fut donnée en dot, à Jeanne de Canilhac, mariée avec François de Chavagnac. Etant morte sans enfants, Peyrelade revint encore à la famille de Canilhac, et Charles de Beaufort la vendit, en 1738, à Jean-Louis de la Vaissière, seigneur de la Vergne. Elle appartient aujourd'hui à M. Grave.                                                                           LA-VERGNE,  a appartenu à Antoine de Lemmet, fermier de la terre d'Aubijoux au XVIIe siècle. Il descendait  des anciens seigneurs de Peyrelade. Il passa à la famille de la Vaissière ; c'était un fief noble.","architecture":"Château de Peyrelade est une construction massive en pierres, comportant deux étages dont le premier est construit sur voûtes et le deuxième sur poutres et solives en bois. Sur la façade principale, une tour cylindrique placée vers le milieu abrite un escalier en pierre à noyau plein. L'entrée se trouve à la base de cette tour, constituée par un fronton triangulaire reposant sur deux pilastres. Dans l'écusson placé au milieu du fronton se lit le millésime 1012. Une tour hors oeuvre sur la façade latérale Est, celle-ci comportait un escalier qui a été démoli. En 1887 au premier étage, une nouvelle distribution a été faite avec des cloisons en menuiserie.                                                                                 Lavergne a appartenu à Antoine de Lemmet, fermier de la terre d'Aubijoux au XVIIe siècle. Il descendait probablement des anciens seigneurs de Peyrelade. Il passa à la famille de la Vaissière.             La Vergne, le château qu'elle a remplacé se composait en 1782; d'une tour carrée, une allée de tilleuls qui subsiste encore.","habitants":"Famille d'Antoine d'Anglards                                                                   Famille de François de Peyrelade\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de la Combe , de Peyrelade et de La Vergne à Saint-Saturnin","gps":"","images":["../image/image_15/15_St_Saturnin_Cantal_1.jpg","../image/image_15/15_St_Saturnin_Cantal_2.jpg","../image/image_15/15_St_Saturnin_Cantal_3.jpg","../image/image_15/15_St_Saturnin_Cantal_4.jpg","../image/image_15/15_St_Saturnin_Cantal_5.jpg","../image/image_15/15_St_Saturnin_Cantal_6.jpg"]},"Consult_chateau_formulairec3ee":{"id":"Consult_chateau_formulairec3ee","dept":"15","canton":"Aurillac","commune":"Saint-Simon","nom":"St_Simon","type":"Château","periode":"XV-XVIII","histoire":"Sept châteaux à Saint-Simon, la Laubie restauré du XIXe siècle, la Bastide du XVe siècle,                                                                           Labeau du XVIIe siècle, ruines de la tour féodale  de la Force, de d'Oyer (voir article) et de la Peyre en ruine.                                 St-Simon, Ruines du château de Vernhes du XVIe siècle, le château aujourd'hui se présente que dans une tour carrée arrondie sur ses angles et à peu près en ruines.  Château de la Bastide du XVe siècle, Boussac médiéval, restauré récemment ; Labeau du XVIIe siècle, Mazic du XIXe siècle, La Veyrine, et Grange-Vieille à abside au Martinet.                                                                      BOUSSAC a été restauré à partir de 1962, il possède une magnifique toiture en lauzes de chyste, et des murs en pierre cernent le parc et le portail.                                                                    FORCE,  château et forteresse,  Pierre Cambom, bourgois d'Aurillac, fit hommage à l'abbé d'Aurillac en 1465 des fiefs. La famille du Trieu jouissait de la Force à la fin du XVe siècle. Catharine du Trieu porta cette seigneurie en dot, en 1553, à Gabriel Saunier, Elle était possédée en 1590 par noble Antoine Parisot, Bourgois d'Aurillac. Un autre bourgois d'Aurillac, Pierre Piganiol était plus tard seigneur de la Force. Ce Pierre Piganiol eut pour fils Jean-Aimar, gouverneur des pages du comte de Toulouse en 1709. Celui-ci voulut se fixer à Paris et vendit en 1751 le pré et château de la Force à noble Guy de l'Olm.  dont les descendants l'ont possédés jusqu'en 1832, date à laquelle monsieur Gustave de Lalaubie l'a vendu à Jean Saphary, qui lui-même l'a revendu à monsieur Establie.                                                                        La BASTIDE  construit en partie vers la fin du XVe siècle pour  Guy de Marcenat. La famille de Leigonye a possédé longtemps le fief forma la branche des Leigonye du Rreuil, en 1780 le fief de la Bastide à son parent,  Esquirou de Parieu, seigneur de Parieu, Puechmège, Montalat, Omps, Duyé et autres lieux, qui vendit alors ses biens seigneuriaux éloignés pour garder la Bastide. La famille Esquirou de Parieu est aujourd'hui représentée par M, Hippolyte de Parieu, maire d'Aurillac toujours dans cette famille.","architecture":"A St-Simon, Le château de Lalaubie du XVIIIe siècle. Le château de la Force\r\nLa grange vieille dans le domaine du Martinet (grange du XVIIe siècle) et le parc et la Tour Saint-Géraud du XIIe siècle à l'église Saint-Sigismond\r\n Ruines de la tour féodale de La Force, Le château ne consiste que dans une tour quadrangulaire arrondie sur ses angles et à peu près en ruines aujourd'hui. Elle surgit en quelque sorte d'un bloc de rocher, en saillie sur une fraîche et verte prairie, qui décline rapidement vers le village de Rouffiac. On y gravit par des escaliers taillés dans le roc, coupé à pic sur un côté. Ses murs portent aujourd'hui une magnifique parure de lierre qui pénètre même au-dedans de la tour, en revêt les parois formant ainsi une tapisserie intérieure de goût le plus original. La tour communique avec une petite terrasse triangulaire. Cette plateforme surplombe le rocher et la prairie, commande la rivière, le village de Rouffiac et offre un coup d'il des plus imposants sur le haut de la vallée. le chateau de Saint-Simon dont la tour de guet accolée à l'église en est la survivance.                                                                       La Bastide, aujourd'hui abandonnée, se compose d'un corps de logis adossé à une tour carrée; elle est située à l'origine des deux branches du ruisseau de la Baïsse ou de Reilhaguet.                  La maison-forte de Boussac, au Moyen-Age, était une des tours de guet assurant la surveillance d'Aurillac. En effet, l'histoire de la commune de St-Simon se confond avec celle de la haute Auvergne et plus particulièrement de l'abbaye d'Aurillac.","habitants":"Famille du Trieu\r\n        \"","divers":"Les châteaux de Saint-Simon","gps":"","images":["../image/image_15/15_St_Simon_1.jpg","../image/image_15/15_St_Simon_2.jpg","../image/image_15/15_St_Simon_3.jpg","../image/image_15/15_St_Simon_4.jpg","../image/image_15/15_St_Simon_5.jpg","../image/image_15/15_St_Simon_6.jpg","../image/image_15/15_St_Simon_7.jpg"]},"Consult_chateau_formulairef0db-2":{"id":"Consult_chateau_formulairef0db-2","dept":"15","canton":"Neuvéglise","commune":"Saint-Urcize","nom":"St_Urcize","type":"Vestiges","periode":"XIII","histoire":"ST-URCIZE, de ce château fort, ne subsiste aujourd'hui qu'une tour carrée, bien conservée, datant du XIIIe siècle. La seigneurie de Saint-treize a appartenu d'abord à une famille de ce nom. Robert de St-Urcize vivait en 1060; il donna au monastère de St-Flour l'église de Saint-Julien de Chaudesaigues , et autres propriétés et villages dans la paroisse d'Anterrieux.\r\nSaint-Urcize passa vers le XIVe siècle à la célèbre famille de Canilhac, originaire de la Roche, paroisse de Saint-Rémy. La baronnie, avec ses dépendances, devint ensuite la propriété de Philippe de Beaufort. Après sa mort, en 1727, cette baronnie fut mise en vente par la famille de Beaufort-Montboissier, qui avait succédé à celle de Canilhac et en avait pris le nom. Elle fut adjugée à Alexis Rogery, avocat au parlement de Paris. Il prit possession, suivant l'usage, soit des droits à l'église, soit de ceux de seigneur à la place où existait jadis la tour et château de St-Urcize.","architecture":"Le château fort de Saint-Urcize s'étendait dans la partie méridionale du bourg. Son donjon, appelé la \" Salle-Court \" et constitué de trois voûtes superposées, se dressait sur l'actuel rocher de la Vierge et dominait ainsi les maisons du village et la vallée de l'Hère. Un souterrain le reliait au \"Portal Souteyra\" et sans doute également au château del Roc; dernièrement, lors de travaux de voirie, un souterrain voûté a en effet été mis à jour entre la maison Vigouroux de Rouby et l'église. Jusquà nos jours, le quartier du fort a conservé son appellation Le château occupait l'emplacement des jardins situés au pied du rocher où de nombreuses pierres de construction servent encore pour édifier les murs de clôture. En 1850, on pouvait encore voir en cet endroit un frêne vivace, \" l'arbre de la liberté \" planté en 1792. Le donjon du fort a été rasé vers 1666, à la suite de la condamnation par contumace du marquis de Beaufort-Canilhac, seigneur de Saint-Urcize, prononcée lors des grands Jours d'Auvergne tenus à Clermont. Du fort, il ne subsiste plus que la tour carrée datant du XIII ou XIVe siècle. Moins haute qu'à sa construction, cette tour de granit est néanmoins assez bien préservée et conserve sur les côtés, les meurtrières servant aux archers. Un chemin de ronde reliait cette tour à la maison Péret où s'élevait anciennement une poivrière.","habitants":"Famille de Robert de St-Urcize\r\n        \"","divers":"La tour de Saint-Urcize et vestige du château fort.","gps":"","images":["../image/image_15/15_St_Urcize_1.jpg","../image/image_15/15_St_Urcize_2.jpg","../image/image_15/15_St_Urcize_3.jpg"]},"Consult_chateau_formulaire88f3-2":{"id":"Consult_chateau_formulaire88f3-2","dept":"15","canton":"Riom ès Montagne","commune":"Saint-Vincent de Salers","nom":"St_Vincent","type":"Château","periode":"XV-XVI","histoire":"deux châteaux à Saint-Vincent de Salers, de Chanterelles, et de la Borie du XVIe siècle.                                                                    CHANTERELLE    cité au XIVe siècle, au XVe siècle, le château de la famille de  Chanterelle surveillait l'accès à la vallée du Mars, il dépendait du prieuré de Fournols situé dans le Puy de Dôme. En 1470 passe par alliance à Delphine de Chanterelle épouse Antoine de Sailhans et au XVIe siècle passe par alliance aux  Valens, Barbe de Valens apporte  le château à Antoine de Tautal qui remanie le château, son fils Jean Tautal meurt en 1666, sa fille héritière Antoinette qui avait épousé  en 1644  Jean de Scorailles. Au XIXe siècle, la famille de Scorailles était propriétaire de Chanterelle et le baron fut maire de Saint-Vincent de Salers. Transmise de génération en génération dans la même famille jusqu'en 1918  vendu à monsieur Jean Peyras et en 1950 vendu à la famille Eggert qui le possède toujours.                                                                                                           LABORIE, Il a été la propriété d'une famille de Raynal, et d'une famille de Chaudes-Aigues.   château agréablement situé au-dessous et près de la Tille, vers Figeac; il appartenait, au XVII siècle, à François de La Borie ou de Renac, et à son épouse, Louise de Martrain; il laissa une fille, Antoinette La Borie, mariée, en 1646, à Antoine de Latour, qui devint seigneur de La Borie. Après lui, Jean de Latour, son fils, épousa Marguerite de Martrain, sa parente, et traita avec M. Pantaléon de Méalet, qui avait épousé Gabrielle de La Borie, et, par cette alliance, jouit du fief et château de La Borie en 1693. La propriété passa plus tard, par le mariage de Raymond de Méalet, à M. de Boutaric, dont le fils, Benoit, en jouissait en 1788. La fille et l'héritière de ce dernier mourut victime d'un drame sanglant, dont le souvenir attriste cette demeure. Un ancien serviteur, excité par la cupidité, assassina cette demoiselle et porta pour ce crime sa tête sur l'échafaud.","architecture":"Chanterelle, remanié au XVIIe siècle, plus gentilhommière que château, de plan rectangulaire,  d'aspect robuste  dépourvue de tours de flanquement défendu au nord et à l'est par des échauguettes, couronnée par un chemin de ronde  à mâchicoulis et meurtrières porté sur corbeaux et bretèches sur angle, tombé en ruine, puis restauré au XXe siècle, l'édifice représente un type de grande maison régionale avec toiture en croupes.                                     Château Laborie  du XVe siècle présentant un corps de logis rectangulaire flanqué d'une tour ronde et d'une carrée au centre des façades nord et sud. Sont visibles d'anciennes baies encadrées de moulures prismatiques. L'entrée se fait au rez-de-chaussée par une porte dont l'encadrement est orné de deux moulures prismatiques et dont l'arc brisé inscrit un tympan sculpté en relief d'un écu présentant un croissant et une tour. Les appartements sont ornés de peintures à fresques, représentant des scènes de l'ancien testament,  et des boiseries sculptées. Dans la salle du rez-de-chaussée, plafond à la française avec un décor peint de fleurs et de rinceaux ornant poutres et solives.","habitants":"Famille de  Chanterelle                                                                         Famille de Méalet\r\n        \"","divers":"Château de la Borie et de Chanterelle à Saint-Vincent de Salers","gps":"","images":["../image/image_15/15_St_Vincent_15_1.jpg","../image/image_15/15_St_Vincent_15_2.jpg","../image/image_15/15_St_Vincent_15_3.jpg","../image/image_15/15_St_Vincent_15_4.jpg","../image/image_15/15_St_Vincent_15_5.jpg","../image/image_15/15_St_Vincent_15_6.jpg","../image/image_15/15_St_Vincent_15_7.jpg","../image/image_15/15_St_Vincent_15_8.jpg"]},"Consult_chateau_formulaire6190":{"id":"Consult_chateau_formulaire6190","dept":"15","canton":"Murat","commune":"Ségur les Villas","nom":"Ségur_Villas","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Ségur les Villas, les vestiges de Valentine, de la Revel et  de Rochevieille.                                                                          La REVEL, il appartenait à Pierre Vidal, seigneur de la Bessade, qui l'habitait en 1609. Jean-Claude de la Vaissière était seigneur de la Revel en 1610. Cette famille le possédait encore en 1752.\r\nROCHEVIEILLE, il avait donné son nom à une ancienne famille. Maurin de Rochevieille vivait en 1250. Pierre de Brezon, chevalier, fit hommage, en 1273, à Guillaume, comptour d'Apchon, pour le château de Rochevieille et les villages de la Cordoue, Soubros et Soutros, et pour le Joland. Raymond Chapel, damoiseau, rendit aussi le fief au comptour d'Apchon pour une partie de la Rochevieille. Le même fief fut également rendu, en 1343, par Amblard et Armand de Murat. Guillaume de Combes, seigneur de Gourdièges, l'était aussi en partie de Ségur et de la Rochevieille en 1411. Hugues de l'Arbre en était seigneur en 1435. Gabriel de Gouzel, qui habitait Allanche, était propriétaire de ce fief en 1575. \r\nVALENTINE, château fort et fief qui avait reçu le titre de vicomté et dépendait de Mercur au XVe siècle, Valentine, hameau où sont les traces d'un château fort, qui avait reçu le titre de vicomté. Sa seigneurie dépendait de la baronnie de Mercur. Jean de Valentine, chevalier, vivait en 1289. Marguerite de Peyre, mariée à Raymond d'Estaing , était dame de Valentine en 1338. Béatrix de Murat-Vernines, qui épousa Milès de Pompriers, en Beaujolais, lui porta la terre de Valentine en 1365. Guillaume de Brezons fut seigneur de cette terre en 1419. Il paraît qu'après lui la terre de Valentine revint à la maison d'Estaing et n'en sortit qu'en 1645, époque où François d'Estaing, baron de Murols, la vendit à N. François de Rochemonteix de Nastrac. Elle passa ensuite à la famille Dufour de Prades.","architecture":"Château de La Revel, ancien château démoli et reconstruit au XIXe siècle\r\nChâteau de Rochevieille, a donné son nom à une famille.\r\nChâteau de Valentine, château fort et fief qui avait reçu le titre de vicomté et dépendait de Mercur.\r\nLa Revel, ancien château du XIIe siècle démoli et reconstruit au XIXe siècle, petit château qui vient d'être remplacé par une jolie maison bourgeoise. Il est situé vis-à-vis de Ségur, à son aspect nord.","habitants":"Famille de Jean-Claude de la Vaissière                                                                    Famille de  Rochevieille                                                                                      Baron François d'Estaing\r\n        \r\n        \"","divers":"Bâtisse à Ségur les Villas","gps":"","images":["../image/image_15/15_Segur_Villas_1.jpg","../image/image_15/15_Segur_Villas_2.jpg","../image/image_15/15_Segur_Villas_3.jpg"]},"Consult_chateau_formulaire8c18":{"id":"Consult_chateau_formulaire8c18","dept":"15","canton":"Saint-Flour","commune":"Saint-Flour","nom":"Ternes","type":"Forteresse","periode":"XIV","histoire":"TERNES, Ermengarde d'Henry, descendante d'Étienne Henry, seigneur des Ternes, épousa vers 1211 Hugues de Lastic auquel elle apporta sa part de la seigneurie en dot.  La seigneurie depuis le XIVe siècle, à deux familles : les Lastic comme héritiers de la famille d'Henry, et les d'Espinchal comme héritiers de la famille des Ternes. Armand des Ternes, damoiseau, eut une fille qui épousa vers 1333 Guillaume d'Espinchal, chevalier. Ces deux familles furent plusieurs fois alliées :Madeleine d'Espinchal, fille de Pierre et de Madeleine de Léotoing, épouse le 28 février 1573 Jean de Lastic, deuxième fils de Claude, seigneur de Montsuc, et de Marguerite de Farges, dame de Sieujac. Propriété de Gaspard d'Espinchal  qui fut condamné à mort en 1665 , et tous ses biens confisqués. Gasparde d'Espinchal, nièce du précédent, fille de François-Gabriel et d'Isabeau de Polignac, épouse en février 1665 Jean de Fontanges, comte d'Auberoque, fils aîné de François-Robert de Fontanges, seigneur de Thinières, et de Delphine de Patris, dame de Sieujac, auquel elle apporte la seigneurie des Ternes. Ils eurent un fils, tué sans alliance en 1693 à la bataille dans le Piémont, et quatre filles dont Marie-Charlotte, qui fut héritière du château de Valon, de Labesserette et des Ternes qu'elle apporta par mariage le 5 avril 1693 à Henri-Joseph de La Garde, comte de Chambonas. Vers 1736, son fils vend les Ternes à la famille Rouillon de Spy, originaire de Lorraine, qui s'était établie à Saint-Flour vers 1670. Par la suite, elle en prit le nom. Ayant perdu son fils unique, la dernière madame des Ternes fit don des châteaux et domaines des Ternes au diocèse de Saint-Flour. Elle faisait partie de la vente consentie le 3 juin 1789 par Gabriel Lhuilier d'Orcières, co-seigneur de Rochegonde, au sieur Beaufils. Acheté en 1909 par Alfred Douet qui en a écrit l'histoire. Propriété de la commune depuis 1974.","architecture":"Un ancien château des Ternes a été rasé en 1573 sur ordre de M. de Canillac. L'actuel château, situé dans le bourg, a été reconstruit au début du XVIe siècle, en même temps qu'était construite la seconde tour latérale. Edifice composé d'un corps de logis  rectangulaire de quatre étages couronné de mâchicoulis avec chemin de ronde, un toit en croupe, la tour ronde principale plein cintre mis hors oeuvre  de six étages mâchicoulis, chemin de ronde couvert d'un toit à poivrière ce dernier avait été abaissé et reconstruit au XXe siècle. Les tours aux angles en façades avec  terrasses crénelées sans mâchicoulis ni toits.","habitants":"Famille d'Henry                                                                                   Famille Rouillon de Spy\r\n        \"","divers":"La forteresse de Ternes à Saint-Flour","gps":"","images":["../image/image_15/15_Ternes_1.jpg","../image/image_15/15_Ternes_2.jpg","../image/image_15/15_Ternes_3.jpg","../image/image_15/15_Ternes_4.jpg","../image/image_15/15_Ternes_5.jpg","../image/image_15/15_Ternes_6.jpg"]},"Consult_chateau_formulaire17e1":{"id":"Consult_chateau_formulaire17e1","dept":"15","canton":"Vic sur Cére","commune":"Thiezac","nom":"Thiezac","type":"Château","periode":"XIII-XVI","histoire":"Il y avait six châteaux à Thiezac, de Céres du XIIIe siècle,  de Trémoulet, de Crozet du XIIe siècle disparu, de Muret Vestiges du XIIIe siècle, de la Rivière du XIXe siècle et de la Roucoule du XIIIe siècle disparu.                                                                                           CROZET,  1268, Domus, hommage par Durand du Crozet à Alphonse de Poitiers. Saiges et Dienne, A donné son nom à une famille de seigneurs possessionnés à Vic et Polminhac. Le château du XIIIe siècle disparu, pas d'autres informations historiques.                                                                                         CERES,  il appartenait, en 1324, à Guillaume de Viescamp, seigneur de Comblat. On y voyait un château appartenant à Christophe de Scorailles en 1730; il échut, en 1768, à Joseph de Scorailles, seigneur de Fontenilles.                                                    MURET appartenait, au milieu du XVIe siècle, à la maison de Tournemire.   Roger de Muret en était seigneur en 1290; Géraud de Teissières possédait des rentes dans les environs en 1404, Astorg de Montamat en était seigneur en 1463; il servait alors de prison pour les débiteurs. Un capitaine en avait la garde. En cas d'absence, un lieutenant le remplaçait; il s'y commit beaucoup d'abus. le 27 août 1571, Jean Dumoulin, seigneur de Veyrac, lieutenant du capitaine Cabannes, reçut l'ordre de faire démolir le château de Muret.                                                                            RIVIERE, Pas d'information historique.                                          ROUCOULE, château au XIV siècle. En 1409, les habitants de la ville de Murat, sous les ordres de Chatard de Rochedragon, bailli des montagnes, s'en emparèrent sur Rénaud II, leur vicomte. Pierre de Recoules maria, en 1300, sa fille, son héritière, à Pierre de Tournemire, seigneur en partie de ce fief. Pierre de Tournemire, dit le Jeune, vendit, en 1371, à Hugues Botisson de Vic, des rentes qu'il avait à Recoules. Guillaume et Béganne de Tournemire, sa fille, vendit, en 1389, tout ce qu'ils y possédaient.                               TREMOULET, hameau et petit château qui était habité, en 1675, par Claude de Boisset de La Salle, seigneur du Pouget. Il occupe un site extrêmement pittoresque, au-dessous duquel se trouve le Pas-de-la-Cère. Le rocher qui sert de plate-forme au château présente un admirable point de vue sur le bassin de Vic. Par contre deux autres châteaux dont je n'ai pas d'information.","architecture":"Muret château fort bâti sur un rocher presque inaccessible. On y distingue encore l'emplacement d'une tour qui existait au XIII° siècle.                                                                                              Rivière subsiste une ancienne tour ronde situé sur une roche et englobée dans une maison moderne.   logis avec un corps de bâtiment rectangulaire à trois niveaux , flanqué d'une tour ronde d'escalier toit en poivrière . Aile reconstruite ou fortement remaniée au XIXe siècle.                                                                          Trémoulet, le logis porte la date de 1857, qui correspond au moins à la réfection de l'élévation principale, mais a conservé le plan masse figuré sur le plan cadastral de 1811 et pourrait dater du XVIIIe siècle ; la grange-étable  porte la date  de 1790; le pigeonnier porcherie porte la date de 1833. Logis de plan allongé à toit à croupes, avec tour postérieure carrée à toit en pavillon, souillarde hors-oeuvre en mur gouttereau postérieur ; étable en rez-de-chaussée, grange et remise en comble, étable double longitudinale ; porcherie sous pigeonnier à trois loges et  trois cours, auges remplies de l'extérieur ; pigeonnier porcherie carré.","habitants":"Famille de Tournemire                                                                                        Famille de Claude de Boisset de La Salle               \r\n        \"","divers":"Château de la Rivière, de Muret, de Céres, de Roucoule et de Trémoulet à Thiézac","gps":"","images":["../image/image_15/15_Thiezac_1.jpg","../image/image_15/15_Thiezac_2.jpg","../image/image_15/15_Thiezac_3.jpg","../image/image_15/15_Thiezac_4.jpg","../image/image_15/15_Thiezac_5.jpg"]},"Consult_chateau_formulaire970c":{"id":"Consult_chateau_formulaire970c","dept":"15","canton":"Ydes","commune":"Beaulieu","nom":"Thinières","type":"Vestiges","periode":"XIII","histoire":"THINIERES était tenue en fief par une famille du même nom et de la maison de La Tour-d'Auvergne. Une partie de cette baronnie, qui se trouvait en Limousin, fut démembrée du corps principal sans doute vers le XIIIe siècle, par le mariage de Delphine de La Tour avec le vicomte Eble de Ventadour; elle portait aussi le nom de Thinières. Le plus ancien seigneur de Thinières connu et Arbert de Thinières, qui vivait en 1166. Son frère, aussi du nom d'Arbert, était prieur de Bort en 1167. Pierre de Thinières , en 1201 , fut seigneur de Val, près de La Nobre. En 1262 la terre de Thinières appartenait a Robert, dauphin d'Auvergne. Dans un partage fait en 1276 entre Bertrand de La Tour, chanoine de Clermont, et Bertrand, son neveu, l'oncle eut pour lui le fief et la baronnie de Thinières, avec le château et les dépendances. Il fut convenu que Pierre de Thinières lui ferait son hommage. En 1280 Bertrand fit son testament et donna Thinières à son neveu, au baron de la Tour, et à Delphine, vicomtesse de Ventadour, sa nièce.  En 1309 Guillaume de Thinières, seigneur de Val, fit hommage à Bernard de La Tour, suivant le traité passé en 1303, sur l'arbitrage d'Ithier de Bréon, Seigneur de Mardogne , et qui mentionné que le château et  la forteresse de Val relevait de Bernard de La Tour et de Béatrix d'Oliergues, sa mère, dame de La Tour. En 1508 Arbert de Thinières, frère mineur, figura dans l'interrogatoire que subirent les Templiers à Clermont, où présidait Arbert, évêque de cette ville. François de Chabannes, marquis de Curton. Cette vente fut maintenue en 1669 par des commissaires nommés à cet effet. En 1779 M. le baron de St-Etienne acquit Thinières du marquis de Chabannes. Suivant la tradition du pays, Marguerite de Valois aurait séjourné quelque temps à Thinières; mais il se pourrait que ce fut une autre reine de France, Catherine de Médicis.","architecture":"Thinières, hameau, avec les ruines d'un château fort qui était le chef-lieu d'une ancienne baronnie. Il ne reste plus aujourd'hui que des pans de murs et la moitié d'une tour carrée occupant la cime d'un mamelon peu élevé, si ce n'est du côté de la Dordogne, où il est coupé à pic et domine la rivière. On trouve, dans les souterrains du château, des brillants semblables à ceux dits cailloux du Rhin.","habitants":"Famille de Thinières \r\n        \r\n        \"","divers":"Vestiges du château de Thinières","gps":"","images":["../image/image_15/15_Thinieres_1.jpg","../image/image_15/15_Thinieres_2.jpg","../image/image_15/15_Thinieres_3.jpg","../image/image_15/15_Thinieres_4.jpg","../image/image_15/15_Thinieres_5.jpg"]},"Consult_chateau_formulaire31d8-2":{"id":"Consult_chateau_formulaire31d8-2","dept":"15","canton":"Murat","commune":"Cheylade","nom":"Tissonières","type":"Château","periode":"XV","histoire":"TISSONIERES ancien fief avec un château qui appartenaient à la famille de Valrus, et de cette famille passa à celle d'Estaing. En 1617, le chevalier d'Estaing ayant commis de grands désordres et vexations dans le pays, ses gens, poursuivis par le prévôt, se réfugièrent dans le château de Tissonières, où ils ne purent être forcés. On trouve à Tissonières les ruines d'un ancien couvent. Tissonières a dû être partagé en deux fiefs, Soubro et Soutro; car nous trouvons, en 1554, Claude Legrand, commandant du château d'Apchon, seigneur de Tissonières. Pierre Reynal était seigneur de Tissonières en 1662; Guillaume en jouissait en 1717, et ses descendants en sont encore propriétaires. D'une autre part, nous trouvons René Teillard, officier supérieur, maréchal-des-logis de la compagnie des gendarmes de la maison du roi, seigneur de Tissonières avant 1781. Jean Teillard, son fils, mestre-de-camp de cavalerie, porte-étendart de la compagnie des gendarmes, prend le titre de seigneur de Tissonières , dans son contrat de mariage, en 1770, avec demoiselle Catherine de Rancilhac de Chazelles. René Teillard combattit à la bataille de Fontenoy avec Jean, son fils, alors âgé de douze ans. L'un et l'autre survécurent à la bataille. Jean, succombant aux fatigues du combat, s'était couché et endormi dans un fossé; on l'avait cru mort, et ce ne fut que le lendemain qu'il fut retrouvé sain et sauf. Comme la compagnie fut presque détruite, il se trouva très jeune à la tête de son contrôle, et devint officier général et chevalier de St-Louis; il avait devant lui un bel avenir militaire, lorsqu'il mourut à quarante-deux ans.","architecture":"Tissonières de plan rectangulaire à deux niveaux et lucarnes sur toitures deux pans accolés en façade d'un pavillon rectangulaire à trois niveaux.","habitants":"Famille d'Estaing           \r\n        \r\n        \"","divers":"Château de la Tissonières à Cheylade","gps":"","images":["../image/image_15/15_Tissonieres_1.jpg"]},"Consult_chateau_formulaire494d":{"id":"Consult_chateau_formulaire494d","dept":"15","canton":"Saint-Flour","commune":"Molédes","nom":"Tour_Colombine","type":"Vestiges-Tour","periode":"X","histoire":"COLOMBINES, le seigneur ayant fait construire cette tour. Ce n'était donc pas la demeure d'un comte ou d'un duc mais d'un vassal, possesseur d'une châtellenie au Xe siècle, une motte castrale est peut être réalisée sur le site et une fortification primitive en bois est peut-être construite. Au XIIe siècle, une tour en pierre est élevée sur la motte. Au XIIIe siècle, avec l'amélioration de la puissance des armes de jet, il est possible que la tour soit surélevée. Au XIXe siècle , une ouverture est pratiquée à la base de la tour facilitant l'accès et peut-être le stockage.   En 1992, le site est inscrit aux Monuments Historiques. Au XXIe siècle, la découverte de la ruine est libre et gratuite.","architecture":"Tour de la Colombines, au Xe siècle, une motte castrale est peut-être réalisée sur le site et une fortification primitive en bois est peut-être construite. Au XIIe siècle, une tour en pierre est élevée sur la motte. Au XIIIe siècle, avec l'amélioration de la puissance des armes de jet, il est possible que la tour soit surélevée. Au XIXe siècle, une ouverture est pratiquée à la base de la tour facilitant l'accès et peut être le stockage. La partie supérieure est composée uniquement de pierres de lave. C'est sûrement une élévation de la tour que l'on rencontre souvent au XIIIe siècle suite à l'amélioration de la puissance de jet des arcs.  Les pierres sont taillées grossièrement, même les angles qui sont d'habitude très soignés. Cela prouverait le peu de richesse dont disposait le seigneur ayant fait construire cette tour.  La tour comporte 2 entrées. Celle du bas est récente. La véritable porte est traditionnellement située entre 4 et 6 mètres du sol, uniquement accessible par une échelle extractible. C'est classique pour une tour de replie.  En faisant le tour de cette construction, je ne distingue aucune archère, et encore moins de bouche à feu. Sur une seule face, une simple petite ouverture verticale est visible servant de trou de lumière. Le confort était minimal.","habitants":"Seigneurs locaux\r\n        \"","divers":"La Tour Colombine à Molèdes","gps":"","images":["../image/image_15/15_Tour_Colombine_1.jpg","../image/image_15/15_Tour_Colombine_2.jpg","../image/image_15/15_Tour_Colombine_3.jpg"]},"Consult_chateau_formulaire547b":{"id":"Consult_chateau_formulaire547b","dept":"15","canton":"Maurs","commune":"Trioulou","nom":"Trioulou","type":"Château","periode":"XIV","histoire":"TRIOULOU, Jacques d'Escaffre, seigneur du Trioulou, acheta en 1540  la haute justice du Trioulou de Pierre de Clermont, baron de Castelnau et de St-Santin. François Begon et Gabriel d'Escaffre servaient avec distinction dans les armées françaises au XVIe siècle. Gabriel fit son hommage au roi en 1609. Les d'Escaffre ont contracté tour à tour des alliances avec les Roquemaurel, les Montarnal, les d'Acier de Cardailhac, les Gausserand, les Clermont de Castelnau, les Nadailhac, les Cat-de-Rastignac, les Boutaric. Jacques d'Escaffre, seigneur du Trioulou, avait épousé Marguerite de Boutaric, sur de Guillaume de Boutaric, conseiller au parlement de Toulouse. Il fit ses preuves de noblesse en 1666. La terre du Trioulou fut vendue par décret a son fils Guillaume, et adjugée, en 1709, à Louis de La Roque de Senezergues. La famille d'Escaffre existe encore. Jeanne de Raynal, veuve de Louis de Senezergues, revendit la terre du Trioulou, en 1720, à Joseph-Louis de Méallet, seigneur de Vitrac , dont la fille unique épousa, en 1738, Guillaume de Salvert-Montrognon, seigneur de la Rodde, de Marse, lieutenant-général des armées du roi, et lui porta la terre du Trioulou a Catherine de Salvert, fille et héritière de ce dernier, s'unit en 1756 au marquis  de Châteauvert, et d'Ussel, qui devint ainsi seigneur du Trioulou. Après sa mort, elle épousa en 1775  Jean Joussinaud, comte de Tourdennet, colonel de cavalerie et chevalier de St-Louis.","architecture":"Le Trioulou a été l'objet de ventes successives, par suite desquelles il est devenu la propriété de la famille Garnier d'Aurillac. Le château consiste d'un corps de logis rectangulaire à deux niveaux et lucarne sur un toit en croupes flanqué aux angles de quatre tours rondes, dont une très élevée, et en outre divers bâtiments; il a été réparé et rendu très habitable.","habitants":"Famille de  Jacques d'Escaffre\r\n        \"","divers":"Château de Trioulou","gps":"","images":["../image/image_15/15_Trioulou_1.jpg","../image/image_15/15_Trioulou_2.jpg"]},"Consult_chateau_formulaire8eab":{"id":"Consult_chateau_formulaire8eab","dept":"15","canton":"Riom ès Montagne","commune":"Trizac","nom":"Trizac","type":"Château-Vestiges","periode":"XIII","histoire":"A Trizac château de Chavaroche, vestiges de Laurichesse et un couvent.                                                                                                   CHEYROUSE, domine le village par les ruines d'un château qui a été le chef-lieu d'un fief important relevant de la seigneurie de La Tour, appartient d'abord aux compteurs de Saignes, puis a des familles de Peyre, de Chalvet et de Chabannes. Une Françoise de Chalvet le porta en dot à Jacques de La Faye-d'Espeisses, avocat-général, puis président à Mortier, enfin premier président au parlement de Paris. Après Jacques, son fils, Charles, conseiller d'Etat et intendant des finances, et son petit-fils, Henri, premier conseiller au conseil du duc d'Orléans, le possédèrent; puis il passa dans la maison de Chabannes                                     CHAVAROCHE ancien château au sud du bourg. Il a donné son nom à une famille qui en avait la seigneurie et qui n'est pas sans illustration. Jean Monteil de Chavaroche, fut anobli, en récompense de ses services militaires, ses quatre fils se distinguèrent dans la même carrière : deux moururent sur le champ de bataille, et deux y perdirent leur liberté; l'aîné d'entre eux, enfin, Antoine de Chavaroche, qui avait épousé Marguerite de Dienne, fut père de deux fils, dont le premier fit partie, en 1689, des cent chevaux-légers de la garde du roi, et le second fut lieutenant colonel au régiment de Noailles.                                                                        LAURICHESSE, on voit près de Laurichesse les ruines d'un château qui a été le chef-lieu d'un ancien fief relevant de la comptoirie de Saignes, et qui a appartenu dans l'origine à une branche de la maison de Claviers-Laurichesse. Ce fiel passa ensuite dans la famille de Ribier. François de Ribier le vendit, en 1743, à Léonard de Chazelles, et de la famille de Chazelles il est passé par mariage dans celle de La Vaissière de Lavergne. On lit dans un ancien titre, que les habitants du village de Laurichesse furent contraints de vendre des communaux pour faire face à la portion mise à leur charge des frais occasionnés par le camp placé devant le château de Miremont, et pour payer les gens d'armes de la compagnie du sieur de Sieughac qui, en 1575, tenaient le pays.","architecture":"Contrairement à la plupart des communes avoisinantes, Trizac ne possédera jamais de forteresse telle que le Moyen-Age en voit pousser un peu partout. Pourtant, à 2 kilomètres au nord, s'élève le site de Cheyrouse, dont le premier seigneur est Odon, comtour de Saignes, attesté en 1187 et lui même vassal de la célèbre maison de La Tour d'Auvergne. Cheyrouse a-t-il vraiment été château. Des écrits, datés de 1309, font état d'une maison forte, d'une grange, d'un étang et d'un moulin. Il semble que les comtours résidaient plus couramment à Saignes et que Cheyrouse n'ait été que peu souvent habité, même si le titre de baron de Trizac et de Cheyrouse perdure quasiment jusqu'à la Révolution.                           Le COUVENT vous offre une prestation de suites spacieuses, confortables et soignées, de chacune d'environ 100 mètres carrés.  C'est une imposante bâtisse, château de village du XVIIe siècle, du baron de Trizac et de Chyrouse  en pensionnat de jeunes filles sous Charles X. Reconverti  en école libre de 1872 à 1993 et chambres d'hôtes depuis 1997 Décors sobres et classiques s'appuyant sur le caractère de la maison.","habitants":"Famille d'Antoine de Chavaroche\r\n        \"","divers":"Vestiges et château à Trizac","gps":"","images":["../image/image_15/15_Trizac_1.jpg","../image/image_15/15_Trizac_2.jpg","../image/image_15/15_Trizac_3.jpg","../image/image_15/15_Trizac_4.jpg"]},"Consult_chateau_formulairea360":{"id":"Consult_chateau_formulairea360","dept":"15","canton":"Mauriac","commune":"Anglards de Salers","nom":"Trémolière","type":"Maison forte","periode":"XV","histoire":"TREMOLIERE, du XVe siècle, Guy de Jouvenroux, était seigneur de la Trémolière et de Roffiac en 1498.  Avant 1592, Antoine de Vigier, seigneur du Verdier, fils de François, seigneur de Retortillade près de Salers, et d'Anne-Françoise Chalvet, était très riche et marié depuis 1572 avec Gilberte Seriers, fille d'Antoine, seigneur de Bellinay et de Claudia Bayard. Il achète la Trémolière au de Tournemire, sans doute pour établir son fils, Jacques-Antoune de Vigier, seigneur de Prades, de Loupiac, coseigneur de Saint-Christophe-les-Gorges, est seigneur de la Trémolière.   Jean-Antoine de Montclar se maria avec sa cousine Gilberte de Montclar, fille de François et de Simone de L'Orme qui possédait la série des dix tapisseries de verdure réalisées pour ses grands parents : Guy de Monclar, seigneur de Montbrun, marié le 8 octobre 1586 avec Renée de Chaslus d'Orcival, fils de Jean, seigneur de seigneur de Mauriac et de Jeanne de Chabannes. Ils eurent au moins un fils qui hérita de la Trémolière : Louis de Montclar, seigneur, qui épouse en 1690 Louise Lescurier, fille de Louis-François et de Marguerite de Valens. En 1830, il fut vendu par Angélique de Montclar, veuve de Louis Alexis Planchard de Cussac, ancien sous préfet de Mauriac, à Guillaume Rongier, avocat de Mauriac et à son épouse Marie Anne Angélique PLanchard de Cussac. En 1855, la fille de ces derniers vendit la Trémolière à la commune d'Anglards qui en fit un presbytère.  Il fut le siège d'une seigneurie appartenant à la famille de Montclar.","architecture":"Le château de la Trémoilière est une maison forte édifiée au XVe siècle constituée d'un corps de logis de plan rectangulaire à trois niveaux flanqué d'une tour d'escalier ronde qui semblerait du XVIe siècle mais datée de 1685. Le château a été inscrit monument historique le 14 octobre 1963, puis en partie classé le 2 mars 1981 (façades, toitures et tour d'escalier, et les deux pièces lambrissées au premier étage et les deux du deuxième étage).","habitants":"Famille de Jean-Antoine de Montclar\r\n        \r\n        \"","divers":"La maison forte de Trémolière à Anlgards de Salers","gps":"","images":["../image/image_15/15_Tremoliere_1.jpg","../image/image_15/15_Tremoliere_2.jpg","../image/image_15/15_Tremoliere_3.jpg","../image/image_15/15_Tremoliere_4.jpg"]},"Consult_chateau_formulairea1e5-2":{"id":"Consult_chateau_formulairea1e5-2","dept":"15","canton":"Murat","commune":"Ussel","nom":"Ussel_illet","type":"Château","periode":"XIII-XVI","histoire":"Trois châteaux à Ussel celui d'Oeillet du XIIIe siècle, de La Mothe et l'hôtel de Ventadour                                                                      USSEL, l'origine remonterait à l'époque gauloise et son nom viendrait du gaulois uxsello, élevé, adjectif qualifiant ce site de hauteur située entre Diège et Sarsonne ou qualifiant une divinité païenne. Au XVIe siècle, Ussel devient le centre administratif du duché de Ventadour. La justice seigneuriale est alors déplacée dÉgletons à Ussel.\r\n ILLET, aujourdhui transformé en ferme, surprend par son cachet architectural, connu depuis 1230, il appartient à partir du XIVe siècle, à la famille de Chazelles lors du mariage entre Pierre de Chazelles et Béraulde de Montal, en 1311. Cette famille, très ancienne, peut-être originaire de Chazelles dans la Margeride, avait essaimé dans la région. Le château se transmit de père en fils jusquà ce que Jean Baptiste, fils de Charles et de Radegonde de Moulier de Prades, vendit la propriété à M. Ruynes, médecin de Murat. Quelques années plus tard, ce docteur vendit la propriété à Etienne de Serre de Saint Roman propriétaire du Sailhant dAndelat. Les nouveaux bourgeois achètent, après la Révolution les manoirs, Oeillet néchappe pas à la règle. En 1831,  François Roussilhe, propriétaire, décéde le 27 janvier 1883. Marguerite Roussilhe, fille de François Roussilhe de la Mallevieille, épouse  Auguste  Lamouroux, frère de lévêque de Saint-Flour en 1844.\r\n MOTHE, ce château est attesté depuis le XIIe-XIVe siècle. Il a appartenu au seigneur de la Mothe, vassal du duc de Ventadour, a appartenu à la famille de Castrie et à la famille de Fontange. D'héritage en héritage, il a appartenu à une vieille demoiselle qui l'a donné à une colonie de vacances de la banque. Il a été dégradé et les propriétaires actuels le restaurent petit à petit.","architecture":"Ussel, le château de la Mothe du XIVe siècle et XVe siècle, il a été restauré au XVIIIe et XIXe siècle. \r\nL'hôtel Ventadour, inscrit à l'inventaire des monuments historiques depuis 1932.\r\nOeillet  Aujourdhui, comme au XVIIIe siècle, le château se compose dun corps de logis à peu près carré, couronné d'un chemin de ronde sur mâchicoulis  dominé par une tourelle d'angle équipée de bouches à feu  est coiffée en poivrière. Il est flanqué, à deux angles opposés, de deux tours rondes, une est coiffée en poivrière. Richelieu en aurait fait détruire une troisième et découronner celle du Nord. La particularité de ce château est davoir conservé son chemin de ronde qui permettait de passer dune tour à lautre. Il est bâti en grosses poutres de bois reposant sur les mâchicoulis de pierre et soutenant la toiture. À côté du logis seigneurial un bâtiment abrite lexploitation agricole qui était la première raison dêtre de ce manoir du XVe siècle.","habitants":"Famille de Chazelles                                                                                Famille de Castrie\r\n        \"","divers":"Château d'Oeillet, de la Mothe, et l'hôtel Ventadour à Ussel","gps":"","images":["../image/image_15/15_Ussel_Oeillet_1.jpg","../image/image_15/15_Ussel_Oeillet_2.jpg","../image/image_15/15_Ussel_Oeillet_3.jpg","../image/image_15/15_Ussel_Oeillet_4.jpg","../image/image_15/15_Ussel_Oeillet_5.jpg","../image/image_15/15_Ussel_Oeillet_6.jpg","../image/image_15/15_Ussel_Oeillet_7.jpg"]},"Consult_chateau_formulaire17e6":{"id":"Consult_chateau_formulaire17e6","dept":"15","canton":"Neuvéglise","commune":"Vabres","nom":"Vabres_Cantal","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Vabres, le Bégus  et de Saint-Gal du XIXe siècle          VABRES   La seigneurie de Vabres dépendait du mandement d'Anglards. Elle appartenait en partie, en 1366, à Jean Aldebert de Sévérac. Guinot de Jouvenroux en était seigneur en 1496, Pierre de Beauverger l'était en partie en 1650. Joachim et Maximilien de Beauverger furent nommés chevaliers de Malte.                                  BEGUS, la famille de Jouvenroux, de St-FIour, a d'abord possédé Bégus. Jean de Méallet, seigneur de Fargues et de Roffiac, héritier de Raymond de Jouvenroux, en devint propriétaire en 1603. Il le vendit, la même année, à  Blandin de La Roche, de la même famille que celle de Perpezat, près de Cezens, qui en devint seigneur, ainsi que de Brossadols. Pierre de Beauverger était seigneur de Bégus et d'une partie de Vabres , en 1631. Sa fille, Simonnette, porta ce fief à Jean de Montvallat; mais étant devenue veuve et sans enfants, elle se remaria avec Jean de Scorailles. En 1685, Balthazar Gillet, conseiller du roi, acquit Bégus.","architecture":"Bégus, joli château restauré à la moderne et qui s'élève sur une petite éminence. Il est composé d'un corps de logis, dont la façade est flanquée vers le milieu par une tour ronde garnie de meurtrières. Sur le derrière est une petite tour carrée. On croit que les quatre angles portaient autrefois des culs-de-lampe. Le château a deux étages, et ses toits sont à mansardes. Au-devant, règne une belle terrasse plantée que bordent des murs en pierres de taille. Des allées en berceau et un grand jardin ornent en outre les premiers plans de cette agréable habitation. Elle domine un gracieux vallon sillonné par plusieurs ruisseaux et semé de bois de chênes et de pins. Bégus et son château constituaient une terre noble jouissant de la haute justice. Il aurait été construit en partie dans la première moitié du XVe siècle.","habitants":"Famille de Pierre de Beauverger                                                                           Famille de Jouvenroux\r\n        \"","divers":"Château de Vabres","gps":"","images":["../image/image_15/15_Vabres_Cantal_1.jpg","../image/image_15/15_Vabres_Cantal_2.jpg"]},"Consult_chateau_formulaire4437":{"id":"Consult_chateau_formulaire4437","dept":"15","canton":"Ydes","commune":"Lenobre","nom":"Val","type":"Forteresse","periode":"XIV","histoire":"VAL, autrefois chef-lieu dune baronnie, appartenant à la famille de Thynières, Val fut vendu par Guillaume de Thynières à Guillot dEstaing, puis à Pierre de Pierrefort. Guillaume IV d'Estaing, né en 1397 de Jean, seigneur de Cheylade, et d'Elise de Pierrefort, est chambellan du roi Charles VII, gouverneur et sénéchal du Rouergue, puis bailli de Nîmes. Il achète Val et fait construire le château actuel. La famille d'Estaing possédera et habitera le château jusqu'à Guillaume V d'Estaing, dit Guillot, seigneur de Val, de Cheylade et de Landorre, né en 1529. En 1660 vende le château plus d'une quinzaine de propriétaires se succèdent et en 1778 acheté par Ignace Dubois de Saint-Etienne et revendu  en 1814 à sieur de Longeville expulsé en 1837 il le vend  en 1865   à Jules Souchard sa veuve le lègue à la vicomtesse d'Arcy et en 1946, la famille d'Arcy est expropriée en vue de l'inondation de la vallée pour le barrage de Bort-les-Orgues. Elle emporte avec elle le mobilier du château. Finalement, la hauteur de l'engloutissement est revue à la baisse et le château ne sera pas englouti. Mais laissé sans surveillance, il est pillé jusqu'en 1951, quand le syndicat d'initiative de Bort-les-Orgues y installe un gardien. Devant l'insistance du président du syndicat d'initiative, Maurice Georges, EDF revend en 1953 le château pour un franc symbolique à la ville de Bort-les-Orgues, bien qu'il se situe sur la rive auvergnate du lac. Le syndicat d'initiative aura par la suite la responsabilité de la rénovation et de la gestion du site. EDF consent quant à elle à financer la construction d'une jetée permettant d'accéder au château lors des eaux hautes. Le château est aujourd'hui un lieu touristique, et peut être visité.","architecture":"Le château de Val, construit au XVe siècle, a été transfiguré par la mise en eau du barrage de Bort qui l'a isolé, avec sa chapelle, sur une presqu'île reliée à la terre par une jetée. Il occupe, depuis, un site des plus pittoresques de la Haute Auvergne. Cette imposante forteresse est flanquée d'un logis rectangulaire à deux étages dominé par cinq tours  rondes couronnées de mâchicoulis et coiffées de toits en poivrière, dont les différentes couvertures donnent à la toiture de Val un original chatoiement de couleurs. Dans la cour dhonneur, une chapelle gothique , également du XVe siècle est dédiée à Saint Blaise.\r\nOn pénètre dans le château par une porte bardée de fer, dont le tympan est orné dun bas-relief aux armes fleur de lys des dEstaing. Un escalier en spirale dessert les divers étages par un vestibule, qui, à lorigine, était une cour intérieure sans toiture.  \r\nLe deuxième étage est réservé, chaque année, aux expositions des uvres des plus grands artistes peintres contemporains. Au dernier étage, du chemin de ronde, on découvre un splendide panorama sur le lac. La charpente des tours est intéressante par limportance et le travail des ses éléments.","habitants":"Familles de Tinières\r\n        \"","divers":"Château du Val à Lenobre","gps":"","images":["../image/image_15/15_Val_1.jpg","../image/image_15/15_Val_2.jpg","../image/image_15/15_Val_3.jpg","../image/image_15/15_Val_4.jpg","../image/image_15/15_Val_5.jpg"]},"Consult_chateau_formulairec1ae-2":{"id":"Consult_chateau_formulairec1ae-2","dept":"15","canton":"Neuvéglise","commune":"Saint-Georges","nom":"Varilettes","type":"Château","periode":"XIV","histoire":"VARILETTES, fut il y a un siècle la résidence de campagne de l'évêque de Saint-Flour, après avoir été, au XIVe siècle le gardien du sceau royal par Hérail de Pothier, seigneur de Varillettes et descendant du consul de Saint-Flour. La   famille du Polier de Saint-Flour  a donné plusieurs consuls de la ville. Hérailh de Polier, fut garde des sceaux du roi et fit construire le château qu'on voit aujourd'hui. Famille de Murat de Rochemore. Catherine de Polier, fille unique et héritière de Jean et d'Antoinette Suat de Chavagnac, apporte Vareilhettes par son mariage le 26 juin 1593 avec François de Murat, fils de Tristan de Murat, seigneur de Rochemore, de Teyssonières et de La Chassaignes, et Jeanne de Greilh, et lui donna deux fils: François, seigneur de Rochemore et  Claude de Murat, seigneur de Vareilhette, né en 1599, maréchal des camps du roi, marié le 7 juillet 1650 avec Louise Mercie qui lui donna un fils: Nicolas de Murat, comte de Gilbertès, colonel d'un régiment d'infanterie qui s'est marié deux fois: En 1686 avec Marie d'Apchier, dame de Gilbertès, fille de Jean de La Tour de Murat, comte de Gibertès, et de Marie de Châteauneuf d'Apchier, dont une fille, Marie-Antoinette de Murat de Gilbertès; En 1691 avec Henriette-Julie de Castelnau (1670-1716), fille de Michel, marquis de Castelnau et de Marie de Foucault du Daugnon, qui lui donne aussi un seul enfant : César de Murat, qui vend les château et domaine de Varillettes à N de Lastic-Sieujac, seigneur de Parentignat famille de Lastic.  Au XIXe siècle, le château devient la résidence d'été de l'évêque de saint-Flour. Aujourd'hui hôtel restaurant.","architecture":"Varilettes, situé près de Saint-Flour, dans le cadre de prés et de bois semble scruter les ondulations des monts de la Margeride. Possède  un corps à trois étages carrés, une tour ronde escalier engagée au milieu de la façade, deux tourelles d'angle en échauguette. Cet esprit reste le gardien de l'âme de cette demeure datant du XVe siècle. Construit comme un donjon de défense, le château reste aujourd'hui le témoin d'un autre âge. Il a conservé le charme de son authenticité et la sobriété minimaliste des décors de l'époque. Le jardin médiéval, parure du château, est décliné en six carrés bordés de buis.","habitants":"Famille du Polier\r\n        \"","divers":"Château de Varilettes à Saint-Georges","gps":"","images":["../image/image_15/15_Varilettes_1.jpg","../image/image_15/15_Varilettes_2.jpg","../image/image_15/15_Varilettes_3.jpg"]},"Consult_chateau_formulairedf60":{"id":"Consult_chateau_formulairedf60","dept":"15","canton":"Maurs","commune":"Sensac de Marmièsse","nom":"Vernières","type":"Château","periode":"XV","histoire":"VERNIERES, il existait deux seigneuries importantes à Sansac, celle de Marmiesse qui est la plus ancienne et dont le château a disparu. Une famille de Veyrières subsistait encore au XVe siècle.\r\nGuillaume de Veyrières, damoiseau, seigneur du lieu qu'il habitait en 1404. Guillaume II de Veyrières, son fils, était seigneur de Veyrières et co-seigneur de Sansac. Plus tard apparaissent deux frères : Jean de Veyrières, qui habitait le château, s'établit à Réquiran par suite de son mariage avec Césarine de La Rocque, dame du lieu. Il a une fille Anne de Veyrières, qui suit, et un frère : Guyon de Veyrières, co-seigneur, résidait à Sansac et il se trouve exproprié en 1601 par Hector de Senectère. Anne de Veyrière, fille et héritière de Jean, épouse avant 1600 Hector de Senectère, fils bâtard de François de Senectère, prévôt du monastère de Montsalvy.  Antoine du Verdier de Marsillac (1746), fils de Charles du Verdier et de Marie-Marguerite de Montheil, dame de Marsillac, page de Louis XV, puis officier de chasseurs, s'est marié en 1788 à Mauriac avec Marianne Lacoste, sur du conventionnel Jean-Baptiste Lacoste. Son frère Charles du Verdier de Marcillac (1742-1807), marié à Jeanne-Josèphe Dubois de Boutary, de Montech. Ils achètent Veyrières en 1814 et ils auront quatorze enfants, dont six filles. Louis du Verdier de Marcillac (1898), leur fils, procureur du roi avant la Révolution de 1830, hérite de Veyrières.  Gorges Gard, ancien officier de chasseurs alpins, fils d'Auguste Gard, avocat, et de Marguerite d'Authier de Rochefort, s'est marié en 1849 avec Monique de Saint-Vincent, fille de Louis de Saint-Vincent et de Madelaine de Rivals-Mazère, propriétaire de Lamartinie, descendant de Charles du Verdier de Marcillac, seigneur de Boutary. Ils ont eu quatre enfants.","architecture":"Le château de Vernières est composé de plusieurs éléments d'époques différentes. Le donjon remontant aux XIIIe et XIVe siècles jusqu'au niveau du chemin de ronde modifié au XVe siècle, époque de la mise en place des quatre tourelles d'angle, des hourdis et de la toiture. Un couloir avec cage d'escalier, appliqué à la face Est du donjon et de même longueur, datant fin du XIVe ou début XVe siècle. Un corps de logis flanqué de deux tours d'angle rondes au nord est et au sud-est, reprenant peut-être des éléments d'une construction antérieure, mais pour l'essentiel postérieur à 1587. Un corps de logis bâti au XVIIe siècle sur la face sud du précédent. Une souillarde surélevée, placée à l'angle de la tour nord-Est et de la façade orientale au XIXe siècle. Un élément formant quart de cercle, placé dans l'angle de la tour sud-Est et de la face Est du bâtiment du XVIIe siècle, mis en place au début du XXe siècle.  En 1730, le donjon a été aménagé de façon plus vivable, avec modification des ouvertures et création, \r\n au premier étage, de deux grandes pièces dont l'une présente un sur plafond décorée de 32 caissons peints en camaïeu. L'ensemble est un excellent exemple de décor du XVIIIe siècle dont il reste, en Auvergne, peu de témoignage.","habitants":"Famille de Veynières \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Vernières à Sensac de Marmièsse","gps":"","images":["../image/image_15/15_Veyrieres_1.jpg","../image/image_15/15_Veyrieres_2.jpg","../image/image_15/15_Veyrieres_3.jpg","../image/image_15/15_Veyrieres_4.jpg","../image/image_15/15_Veyrieres_5.jpg","../image/image_15/15_Veyrieres_6.jpg","../image/image_15/15_Veyrieres_7.jpg","../image/image_15/15_Veyrieres_8.jpg"]},"Consult_chateau_formulaired395":{"id":"Consult_chateau_formulaired395","dept":"15","canton":"Saint-Flour","commune":"Talizat","nom":"Vernières_Talizat","type":"Château","periode":"XIV-XV","histoire":"VERNIERES  Le château de Vernières est un château de plaisance, situé dans la commune de Talizat, le village est situé sur la Planèze de Saint-Flour, haut plateau formé par lancien volcan du Cantal (France). Il a été la propriété durant plusieurs années des familles : Teilhard de Vernière, de Passorio Peyssard. \r\nTransformé en  centre d'hebergement par Marie-Thérèse et Jean-Marc Morand.","architecture":"Le château de Vernières  actuel ne ressemble en rien au premier château à l'architecture féodale sur lequel il s'appuie. Le domaine se compose du château, d'une maison de gardien ainsi que des communs et d'écuries, le tout entouré de dizaines d'hectares de terres et de forêts. Corps de logis de plan rectangulaire à deux niveaux et lucarnes, flanqué de chaque côté de pavillons rectangulaires à trois niveaux.","habitants":"Famille de  Teilhard de Vernière\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de la Vernières à Talizat","gps":"","images":["../image/image_15/15_Vernieres_Talizat_1.jpg","../image/image_15/15_Vernieres_Talizat_2.jpg","../image/image_15/15_Vernieres_Talizat_3.jpg","../image/image_15/15_Vernieres_Talizat_4.jpg","../image/image_15/15_Vernieres_Talizat_5.jpg"]},"Consult_chateau_formulaired21d":{"id":"Consult_chateau_formulaired21d","dept":"15","canton":"Vic sur Cère","commune":"Vic sur Cère","nom":"Vic_Patrimoine","type":"Château","periode":"XIII-XVII","histoire":"VIC, château de Cère, dont il reste une tour ronde sur le promontoire de Trémoules dominant la Cère.\r\nCOLS, lieu de naissance du troubadour, reconstruit à la fin du XIXe siècle, Jardins.\r\nSALLES du XVIe siècle , à Salvanhac, chambres d'hôtes.\r\nOLMET, était une manse au XIIIe siècle. Elle appartenant à R. de La Garde, demeurant près du château de Vic, qui en fait reconnaissance en 1274, puis à Vivien La Garde, coseigneur de Vic, qui en rend hommage au vicomte de Carlat avec d'autres biens. C'est dans cette maison qu'Émile Duclaux, alors âgé de 33 ans, habitait l'été avec sa femme Mary Robinson dans les années 1890. Contrairement à une légende, le château d'Olmet n'a jamais appartenu au colonel de La Rocque dont la famille était originaire du village de La Rocque, sur la commune voisine de Saint-Clément. La confusion provient du fait que François de La Rocque et sa famille y ont passé comme locataires quelques vacances d'été en 1937 et 1938,le domaine a été acquis par la Fondation Jean Mermoz dite de \"l'Aérium des Croix\".              \r\n Hôtel du chevalier des HUTTES à Vic-sur-Cère, ce fut la demeure du président des juges d'appeaux (cour d'appel), puis celle de la famille Pagès des Huttes, cette famille tire son nom de la seigneurie qu'elle possédait déjà en 1616 dans la paroisse de Polminhac  au hameau des Huttes et fut vendue comme bien national en 1793. Jérôme Pagès des Huttes fut garde du corps du Roi dans la compagnie écossaise. Jean Baptiste Pagès des Huttes, né à Vic en 1759 dans cette  demeure, entre au service du roi Louis XVI à 22 ans. Pour avoir favorisé l'organisation de la fuite de Versailles de  la reine Male-Antoinette, il fut tué dans l'émeute du 6 octobre 1789. Son cadavre fut décapité et sa tête hissée en enseigne sur une pique pour accompagner le retour du roi à Paris.","architecture":"Le château de Cols attesté au XIIIe siècle, reconstruit à la fin du XIXe siècle. Les jardins suspendus de Cols sont dominés par un bois sauvage et des rochers verticaux, une véritable falaise. Les fondations de Sully surprennent sans cesse et on a l'impression que le jardin est naturel et que la nature devient jardin. Soit une petite structure de paliers variant les vues de la vallée. Le véritable labyrinthe d'espaces différents, la palette végétale aux couleurs dynamiques attire le regard et permet de découvrir le jardin à la Française et le bassin traité comme un parterre d'eau qu'encadre le jardin exotique.                                                                               Olmet, Le site est sur une terrasse dominant la vallée de la Cère et située en vis-à-vis du château de Comblat dont il reprend un peu les volumes. Bâtiment comportant en pavillon à deux étages carrés et trois travées avec un comble à quatre pans à forte pente, une aile d'un étage avec un comble à la Mansard. Il y a aussi des communs. L'ensemble a été construit à la fin du XIXe siècle dans un style classique de type Louis XIII.\r\n Hôtel du chevalier des HUTTES à Vic-sur-Cère,  mi manoir, mi hôtel urbain, la maison a conservé ses dispositions anciennes avec un corps de logis avec une tour polygonale en façade et une tourelle d'angle en surplomb, lucarnes du XIXe siècle, fenêtres à meneaux. A l'angle sud-ouest, une échauguette est portée en encorbellement sur une rangée de 5 corbeaux moulurés de trois quart  de rond en retrait. La façade Est ouvre sur un jardin.","habitants":"Famille de  La Garde\r\n        \"","divers":"Châteaux de Cols, de Salle , d'd'Olmet de la Huttes, de Quayres à Vic sur Cère.","gps":"","images":["../image/image_15/15_Vic_Patrimoine_1.jpg","../image/image_15/15_Vic_Patrimoine_2.jpg","../image/image_15/15_Vic_Patrimoine_3.jpg","../image/image_15/15_Vic_Patrimoine_4.jpg","../image/image_15/15_Vic_Patrimoine_5.jpg","../image/image_15/15_Vic_Patrimoine_6.jpg","../image/image_15/15_Vic_Patrimoine_7.jpg","../image/image_15/15_Vic_Patrimoine_8.jpg","../image/image_15/15_Vic_Patrimoine_9.jpg"]},"Consult_chateau_formulaire0ca8":{"id":"Consult_chateau_formulaire0ca8","dept":"15","canton":"Vic sur Cère","commune":"Vic sur Cères","nom":"Vic_sur_Cère","type":"Château","periode":"XVXVII","histoire":"Une dizaine de châteaux à Vic sur Cère; de Cère, dont il reste une tour ronde sur le promontoire de Trémoules, de Sistrière, de la Salles du XVIe siècle, d'Olmet, la maison du prince de Monaco, manoir de la Guillaumengue, de Castelsoubro, de Castelvielh, de Comblat (voir article).                                                                          VIC Au Moyen-Age, deux enfants de Vic deviennent de célèbres troubadours, Pierre de Cols, et Pierre de Vic, qui fit des études à l'abbaye d'Aurillac,  rendant ainsi célèbre le nom de la ville dont son père était le seigneur. La viguerie appartenait à Guillaume, seigneur de la Cère, et son siège était en 1279 dans le château de Vic. En 1441, le comte Bernard VII d'Armagnac réorganise la justice de la vicomte de Carlat.  Marguerite de Valois (1553-1615), reine de Navarre et vicomtesse de Carlat. De retour à Paris, c'est elle qui mit en vogue la bourrée comme danse à la cour. Après que le château de Carlat a été rasé en 1603, Vic devient l'unique chef-lieu de la Vicomté de Carlat, dont Louis XIII fait en 1643 le comté de Carladès qu'il donne à Honoré II Grimaldi (1597-1662), prince de Monaco, en dédommagement de la perte de ses domaines au service de la France.  Gardèrent leur suzeraineté jusqu'à la Révolution. Les juridictions du bailliages restèrent royales, tandis que le siège des juridictions comtales paraît avoir été établi à Vic dans l'hôtel à tourelle appelé « Maison des princes de Monaco ».","architecture":"Hôtel du Bailliage Royal de Carladez XVIIe et XVIIIe siècles, Place de l'église.\r\nChapelle du Calvaire, belle vue dominant le vieux bourg.\r\nCastelvielh, site du château vieux dominant le bourg.\r\nAncien hôtel des princes de Monaco : belle demeure en lave datant du XVe siècle, située dans l'ancien bourg (MH). Blotti au creux d'une vallée verdoyante, Vic-sur-Cère vous invite à une balade pittoresque au gré de ses rues bordées de maisons typiques, bâties en pierre volcanique et coiffées de lauze, avant de vous mener aux sources de son eau réputée. De la maison des Princes de Monaco à celle de la Reine Margot, en passant par la maison du Baillage, celle du chevalier des Huttes\r\nMaison natale du Conventionnel Coffinhal du XVIIe siècle.\r\nMaison des eaux minérales ou maison des sources minérales : ancien établissement thermal qui est devenu un musée, près de la gare.\r\nManoir du Terrondou, des années folles, chambres d'hôtes.","habitants":"Prince de Monaco\r\n        \r\n        \r\n        \"","divers":"Vestige de Castelvielh, de Castelsoutro, Presbytaire st-Antoine, château de la Huttes, l'hôtel des princes de Monaco et manoir de Torrondou à Vic sur Cère","gps":"","images":["../image/image_15/15_Vic_sur_Cere_1.jpg","../image/image_15/15_Vic_sur_Cere_2.jpg","../image/image_15/15_Vic_sur_Cere_3.jpg","../image/image_15/15_Vic_sur_Cere_4.jpg","../image/image_15/15_Vic_sur_Cere_5.jpg","../image/image_15/15_Vic_sur_Cere_6.jpg","../image/image_15/15_Vic_sur_Cere_7.jpg","../image/image_15/15_Vic_sur_Cere_8.jpg","../image/image_15/15_Vic_sur_Cere_9.jpg"]},"Consult_chateau_formulaire2deb":{"id":"Consult_chateau_formulaire2deb","dept":"15","canton":"Arpajon sur Cère","commune":"Vieillevie","nom":"Vieillevie","type":"Château","periode":"XIII-XVI","histoire":"deux châteaux à Vieillevie celui de Tensouses et de Vieillevie du XIVe siècle.                                                                                            VIEILLEVIE,    de 1175 à 1450   la  famille Vieillevie qui ne s'arrête pas là, puisqu'on retrouve notamment plus tard Sybille de Vieillevie comme dame de La Salle près de Montsalvy en 1405 et Antoine de Vieillevie co-seigneur d'Auberoque et seigneur de La Salle en 1450. Passe à Guillaume Rolland, bourgeois, qui est seigneur de Cromières et cité comme seigneur de Vieillevie en 1357  et à Jean de Monastier, seigneur de Monestier et de Vieillevie, marié à Catherine de Lescure et décédé vers 1470  et par alliance  d' Anthonie de Monastier, dame de Vieillevie, mariée à Amaury de Moret, seigneur de Moret.  Henri-Victor de Moret, baron de Montarnal et seigneur de Vieillevie marié en 1662 à Marguerite Victoire de Grolée de Peyre. A la veille de la Révolution en 1777, c'est François Figeagols de La Grange  trésorier de France à Montauban qui était baron de Montarnal et dernier seigneur de Vieillevie, puisqu'il meurt le 13 octobre 1792. Il était marié à Marie Sabine Auboi et laisse un fils né en 1772 et décédé en 1842 : Antoine Joseph Eléonore Figeagols de La Grange marié à Marie Thérèse Louise Malaval.                                                             TENSOUSES, était un ancien fief qui a appartenu à la famille de Trémouille, puis à la famille de Conquans. Noble Hugues de Conquans était seigneur des Tensouses en 1580, et Guillaume en 1589. En 1636, Bernard de Conquans, seigneur des Tensouses, fut blessé à mort dans un duel avec Louis de Vielval, seigneur de Favars. Avant la Révolution de 1789, la propriété des Tensouses appartenait au sieur de Pigeagol, qui en était seigneur en 1777.   Les Tensouses, château aujourd'hui inhabité.","architecture":"Le Château-fort de Vieillevie, qui a été édifié à partir de lan mil date principalement des XIIIe et XVIe siècles, se situe dans la vallée du Lot entre le sud du département du Cantal, et le nord de lAveyron, tout près de Conques.  Cette construction du XIIIe siècle a été remaniée à la Renaissance sans rien perdre de son aspect défensif : un système de fortifications remarquable et un corps de logis rectangulaire encadré de hautes tours aux petits toits coniques, dont la sévérité a été atténuée par l'ajout d'ouvertures. \r\nles ancêtres du châtelain sinscrivent au cur de lHistoire, entre Moyen-Age et Renaissance, à découvrir le château, son architecture exceptionnellement conservée avec notamment des souterrains, des vestiges dune église préromane, des coursives de défenses, des archères cruciformes, des hourds de défense en bois, ainsi que la qualité de son décor sculpté des grandes salles renaissance avec cheminées monumentales datant, pour certaines du XIIIe siècle, parmi les plus anciennes de France.","habitants":"Famille Vieillevie                                                                                     Famille de Trémouille\r\n        \"","divers":"Château de Vieillevie","gps":"","images":["../image/image_15/15_Vieillevie_1.jpg","../image/image_15/15_Vieillevie_2.jpg","../image/image_15/15_Vieillevie_3.jpg","../image/image_15/15_Vieillevie_4.jpg"]},"Consult_chateau_formulaire3eaa":{"id":"Consult_chateau_formulaire3eaa","dept":"15","canton":"Saint-Paul des Landes","commune":"Lacapelle-Viescamp","nom":"Viescamp","type":"Château","periode":"XIII-XV","histoire":"VIESCAMP, en 1220, tandis que le seigneur suzerain est Astorg VI d'Orlhac, seigneur de Montal, de Conros, fils d'autre Astorg et de Marie de Carlat, fille d'Henri de Bénavent, on sait que la seigneurie était tenue par une autre famille: Famille Gaucelin En effet, à cette date de 1220, Astorg VI d'Orlhac saisit le château de
