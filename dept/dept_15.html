es guerres de cent ans, elle fut occupé par les anglais de 1358 à 1389 et ruinée . Restaurée, elle  subit des ravages de guerres de religion, possession des Huguenots de 1565 à 1569. Cette seigneurie était, au commencement du XVe siècle, à Guillaume de Combefort, qui l'avait rachetée de Guillaume Deltheil. En 1579, le marquis de Canilhac, gouverneur de la province d'Auvergne, ordonna de la démolir.","architecture":"Broisse petit château dominant le joli vallon d'Oyez et légèrement abrité du nord.                                                                                     Estang, édifiée au XVIIe siècle sur des bases  de l'ancien du XVe siècle, se compose d'un corps de logis rectangulaire  à trois niveaux, de Cinq travées toiture en croupe, accolé sur la partie arrière de dépendance en logis de deux niveaux. la façade principale est exposée à l'Est. l'entrée se fait par un portail voûté   en anse de panier et encadré de deux colonnes engagées avec châpitaux ioniques                                                                    Roquenatou, vestiges,                                                               Marmanhac, dominant des pentes presque abruptes, on accédait au château par la bande de terre du côté du midi - du côté de la route actuelle  avec fossés et pont-levis qui  eux, n'existent plus. Du côté nord, face à la vallée, il s'étageait sur une partie du rocher. les murs de la forteresse abandonnée tombèrent promptement en ruines, et elle ne fut plus habitable.","habitants":"Famille d'Estaing                                                                                   Famille d'Antoine-Louis d'Estang                                                                    Famille de Guillaume Deltheil\r\n        \"","divers":"Château de d'Estang et vestiges de Roquenatou à Marmanhac","gps":"","images":["../image/image_15/15_Marmanhac_1.jpg","../image/image_15/15_Marmanhac_2.jpg","../image/image_15/15_Marmanhac_3.jpg","../image/image_15/15_Marmanhac_4.jpg","../image/image_15/15_Marmanhac_5.jpg","../image/image_15/15_Marmanhac_6.jpg","../image/image_15/15_Marmanhac_7.jpg"]},"Consult_chateau_formulaire4456":{"id":"Consult_chateau_formulaire4456","dept":"15","canton":"Naucelles","commune":"Marmanhac","nom":"Marmanhac_II","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux à Marmanhac, de Niossel ruiné,  de Pellou du XIXe siècle, et de la Voûlte du XVIIe siècle.                                           NIOSSEL, Marguerite de  La Roque, hérita de la seigneurie de Niossel, et la porta en mariage, en 1515, à Guillaume de Combefort, conseiller du roi et co-seigneur de Roquenatou Antoine de Combefort, seigneur de Niossel, fut commandant d'artillerie, capitaine ; il mourut à Paris, sans enfants, en 1634. La seigneurie de Niossel vint à son frère. Nicolas, commissaire des guerres, mort en 1649. Pierre de Combefort, leur troisième frère, seigneur de Niossel, fut lieutenant-général et contrôleur de l'élection de St-Flour. Sa femme, Antoinette Du Verdier, épousa en seconde noce Henri d'Arches, président au présidial d'Aurillac, et lui porta Niossel. En 1723, passa à la famille des Colinet, seigneurs de Labeau, par mariage avec Catherine d'Arches. Jean-Baptiste de Labeau était, en 1752, lieutenant-général-criminel au bailliage d'Aurillac. Leur descendant, qui occupait la même charge en 1789, fut une des premières victimes de la Révolution.                   VOULTE, il a appartenu à l'ancienne maison de Beauclair, et sa construction date du milieu du XVe siècle. Cette famille était néanmoins depuis longtemps propriétaire à Marmanhac. Rigaud de Beauclair seigneur de Pestels d'Armagnac et de la Voulte  jouissait du château en 1344 ; il est mentionné, en 1558, comme possédant par indivis, avec Raymond de Sédaiges. Rigaud de Beauclair fut bailli des montagnes, en 1415, et commissionné pour le siége d'Aurillac par Jean, duc de Berri. Son fils, Guy de Beauclair, fut gouverneur de Roure, en Bourgogne, et chambellan du roi. Son fils lui succéda comme capitaine de Roure. Nicolas de Beauclair, et  François, seigneur de Pestels, d'Armagnac, de La Voulte, fils de Géraud, coseigneur de Fontanges, fit bâtir, en 1471, le château de la Voûlte. Il avait épousé en août 1502 Jeanne de Dienne fille de Guillot , seigneur de Dienne et de Françoise de Mallet dame de Neussargues. Le duc de Bourbon le visita, en 1501, et plusieurs seigneurs du pays vinrent y rendre leur foi et hommage, entre autres, Raymond de Caissac, seigneur de Sédaignes. Pètre-Jean de Beauclair fut gouverneur d'Usson et habitait la Voûlte en 1620. M. de Fumel est aujourd'hui propriétaire de la Voûlte.","architecture":"Niossel, les bâtiments qui le formaient et les tours sont en ruines. Il est situé sur une élévation dominant le vallon d'Oyez et rapproché de celui de la Roquevieille. Le château, en 1724, consistait en une cour avec deux portes cochères et la loge du portier, de belles terrasses, une tour hexagone à plusieurs étages; une tour ronde contenait l'escalier à vis et une chapelle, les bâtiments d'exploitation et les écuries. Sa construction pouvait remonter au commencement du XVe siècle.                                             Pelou;  Logis de plaisance rectangulaire  aux angles arrondies de deux étages carrés et cinq travées régulières, avec tourelle latérale engagée .  La Voûte, construit à la fin du XVe siècle, avec corps de garde, deux tours de guets, la toiture a été refaite au XVIIIe siècle et le château complètement réaménagé vers 1930. Il possède un parc remarquable doté d'une terrasse en terre-plein, un escalier indépendant, un passage couvert, une allée, un moulin, une piscine et une serre.","habitants":"Famille de Nozières                                                                                   Famille de Guy de Beauclair\r\n        \"","divers":"Château de la Voulte et de la Faux à Marmanhac","gps":"","images":["../image/image_15/15_Marmanhac_II_1.jpg","../image/image_15/15_Marmanhac_II_2.jpg","../image/image_15/15_Marmanhac_II_3.jpg","../image/image_15/15_Marmanhac_II_4.jpg","../image/image_15/15_Marmanhac_II_5.jpg","../image/image_15/15_Marmanhac_II_6.jpg","../image/image_15/15_Marmanhac_II_7.jpg"]},"Consult_chateau_formulaire1ba6":{"id":"Consult_chateau_formulaire1ba6","dept":"15","canton":"Mauriac","commune":"Mauriac","nom":"Mauriac_15","type":"Palais","periode":"XVIII","histoire":"MAURIAC a conservé de son riche passé un ensemble de beaux monuments classés monuments historiques ou inscrits à l'inventaire, regroupés dans le centre ancien et bien préservés des atteintes du temps. Principaux monuments :  L'hôtel d'Orcet (actuelle sous-préfecture) : Au milieu du XVIIIe siècle.  Gabriel-Barthélémy de Vigier dOrcet, receveur des tailles des élections de Mauriac et St-Flour, fils et petit fils de subdélégués à Mauriac de lintendant dAuvergne   M. dOrcet reçoit fréquemment la bonne société. A ses côtés, une femme remarquable quil a épousé en 1760, Jeanne Marie Delsol de Volpilhac, intelligente, belle, cultivée, acquise aux idées nouvelles,   en 1785, la belle madame dOrcet est veuve, riche et seule propriétaire de lhôtel, elle donne libre cours à son charmant naturel et à sa fantaisie,  ses amitiés nombreuses dans tous les milieux lui permettent de traverser sans encombre la période révolutionnaire. Sous le Directoire, elle fait la connaissance dun jeune officier du service Pierre Grasset.                                  Château de Sourniac voir article.","architecture":"Construit au XVIIIe siècle à partir d'une tour restaurée du XVe siècle par un receveur des tailles, Gabriel de Vigier d'Orcet, L'hôtel particulier éponyme comporte notamment un beau salon d'apparat avec deux superbes tapisseries d'Aubusson du XVIIIe siècle de style galant représentant des jeux de plein air : jeu du cheval fondu et jeu de la main chaude. Voir aussi les boiseries de la salle à manger et l'escalier de la tour qui mène au 1er étage. Le bâtiment héberge la sous-préfecture. Au-dessus du portail de l'entrée de la cour se trouve un tympan représentant Samson terrassant un lion en présence d'un abbé provenant de l'entrée du réfectoire du monastère Saint-Pierre.  Beaucoup de bâtiments non classés ni inscrits sont intéressants, dont notamment l'hôtel de ville de style restauration, l'ancien palais de Justice et des maisons particulières du XVIIIe siècle sur la place Georges-Pompidou et le boulevard Monthyon, qui comporte par ailleurs une belle fontaine de cette époque avec un vibrant éloge de l'intendant Monthyon par Marmontel au nom de la ville reconnaissante. Une promenade dans la ville historique permet d'admirer aussi les anciens remparts, les nombreux murs en pierres sèches, les toitures en lauze.","habitants":"Famille de Gabriel de Vigier d'Orcet\r\n        \r\n        \r\n        \"","divers":"L'hôtel d'Orcay et Rathaus  et le château de Sournia  à Mauriac","gps":"","images":["../image/image_15/15_Mauriac_15_1.jpg","../image/image_15/15_Mauriac_15_2.jpg","../image/image_15/15_Mauriac_15_3.jpg","../image/image_15/15_Mauriac_15_4.jpg"]},"Consult_chateau_formulaire03d1":{"id":"Consult_chateau_formulaire03d1","dept":"15","canton":"Maurs","commune":"Maurs","nom":"Maurs","type":"Manoirs","periode":"XV","histoire":"Deux manoirs à Maurs, celui de Laborie et de L'Estrade,                            L'ESTRADE, Gaspard Dubois fut seigneur de l'Estrada en 1594, et Amable de Méalet en jouissait en 1637. Jean, son fils, lui succéda et habita l'Estrade en 1666. Jean-Urbain de Méalet, seigneur de ce fief en 1679, habitait la Garrouste, près d'Omps. En 1707, appartenait à Benoît de Renac, fils du seigneur de la Borie, qui vendit fief et château, en 1712, à Jean de Lagarde, comte de Saignes et de Parlan, dont les descendants en sont encore propriétaires.                                                                                LABORIE, manoir agréablement situé au-dessous et près de la Tille, vers Figeac; il appartenait, au XVIIe siècle, à François de La Borie ou de Renac, et à son épouse, Louise de Martrain; il laissa une fille, Antoinette La Borie, mariée, en 1646, à Antoine de Latour, qui devint seigneur de La Borie. Après lui, Jean de Latour, son fils, épousa Marguerite de Martrain, sa parente, et traita avec M. Pantaléon de Méalet, qui avait épousé Gabrielle de La Borie, et, par cette alliance, jouit du fief et château de La Borie en 1693. La propriété passa plus tard, par le mariage de Raymond de Méalet, à M. de Boutaric, dont le fils, Benoit, en jouissait en 1788. La fille et l'héritière de ce dernier mourut victime d'un drame sanglant, dont le souvenir attriste cette demeure. Un ancien serviteur, excité par la cupidité, assassina cette demoiselle et porta pour ce crime sa tête sur l'échafaud.","architecture":"Le manoir de L'Estrade composé d'un corps de logis de plan rectangulaire de trois niveaux avec lucarnes dans la charpente, accolée d'une tourelle à bretèche au dessus des fenêtres, toit en poivrières et à l'opposée tourelle carrée toit à quatre pans.                 Laborie est à lorigine un modeste pavillon de chasse, dans le style  du manoir de l'Estrade, composé de deux corps de logis de plan en T de un et deux niveaux avec lucarnes,  érigé en lan 1500 et flanqué dune tour ronde non symétrique à toit en poivrière.","habitants":"Famille d'Amable de Méalet                                                                 Famille d' Antoine de Latour\r\n        \"","divers":"Manoir de Lestrade et de Laborie à Maurs","gps":"","images":["../image/image_15/15_Maurs_1.jpg","../image/image_15/15_Maurs_2.jpg","../image/image_15/15_Maurs_3.jpg","../image/image_15/15_Maurs_4.jpg","../image/image_15/15_Maurs_5.jpg","../image/image_15/15_Maurs_6.jpg"]},"Consult_chateau_formulairef3e2":{"id":"Consult_chateau_formulairef3e2","dept":"15","canton":"Mauriac","commune":"Salins","nom":"Mazerolles_Cantal","type":"Château","periode":"XVI","histoire":"MAZEROLLES, Raymond de Mazerolles, seigneur de Freluc et de Drugeac, vivant en 1334 et au commencement de 1365, mort  de Raymond, époque à laquelle Jean Yolande et Aigline de Juou, ses héritiers testamentaires Yolande de Jou, épousa Pierre de St-Martial, auquel elle porta la seigneurie de Drugeac,  Il épousa, le 23 avril 1576,  Marie de Salers, nièce du baron du lieu, et  laissant plusieurs enfants, entre autres, François, qui servait sous M. do Lignerac, dans la compagnie de la Châtre, en 1594, et qui mourut sans postérité; 2e Guillaume de Scorailles, qui suit.   Annet I, seigneur de Mazerolles; de son mariage avec Diane-Madeleine de Salers, sa cousine, naquirent onze enfants, neuf garçons et deux filles. Des neuf mâles, huit moururent à l'armée. Annet II de Scorailles, fils de François et de Françoise de Caissac, fut seigneur de Mazerolles et baron de Salers par son aïeul.  Annet de Scorailles épousa, en 1747, Madeleine de Corn, fille de Mercure-Joseph de Corn, marquis de Queyssat, en Limousin, et de Susanne de Turenne-d'Aynac.  De cette union vinrent trois filles :  Marie-Françoise de Scorailles, dame de Salers et de Mazerolles, épouse du comte de Naucaze, et morte sans enfants en 1820;  Marie-Thérèse-Joséphine de Scorailles, mariée, en 1779, au marquis de Corn du Peyroux ; Marie-Madeleine de Scorailles, épouse du comte de Griffol et mère de la comtesse de Maranzac, propriétaire de Mazerolles.  Monsieur de Maranzac, propriétaire actuel  de 1833, est âgé de 87 ans, et, dans l'aisance de ses manières, dans l'élégance de sa parole, on retrouve, m'a-t-on dit, le ton exquis, la fleur de la politesse de la cour de Louis XV.","architecture":"Mazerolles est constitué d'un gros donjon de style médiéval, édifié en 1580, et partiellement reconstruit à la fin du XIXe siècle, et d'un logis des XVIe et XVIIe siècles, disposé en L, et adossé au donjon au sud est. A l'intérieur, le donjon a conservé des cheminées monumentales du XVIe siècle de  cinq étages et une salle à manger entièrement décorée en style troubadour au rez-de-chaussée, le bâtiment est doté de décors des XVIIIe et XIXe siècles.  Les constructions ont été augmentées à différentes époques; que le manoir ne se composait d'abord que de la grosse tour ronde et d'une autre plus petite qui lui est adhérente et renferme l'escalier à vis par lequel on communique aux appartements. Deux corps de logis, qui s'appuient actuellement à ces tours, sont, nous semble-t-il, d'une date postérieure.","habitants":"Famille de  Guillame de Scorailles \r\n        \"","divers":"Donjon de Mazerolles à Salins","gps":"","images":["../image/image_15/15_Mazerolles_Cantal_1.jpg","../image/image_15/15_Mazerolles_Cantal_2.jpg","../image/image_15/15_Mazerolles_Cantal_3.jpg","../image/image_15/15_Mazerolles_Cantal_4.jpg"]},"Consult_chateau_formulaire3f49-2":{"id":"Consult_chateau_formulaire3f49-2","dept":"15","canton":"Murat","commune":"Allanche","nom":"Mercoeur_Cantal","type":"Château","periode":"XV","histoire":"MERCOEUR,  Maillargues était le chef-lieu d'une seigneurie de laquelle Allanche relevait anciennement. On voit encore les ruines de son château fort. Il appartenait en 1262 à Bobert, comte de Clermont; puis il devint la propriété des barons et ducs de Mercur et des comtes du Chayladès. Dans le même village se trouvait encore un autre château, chef-lieu de la seigneurie de La Salle, qui fut longtemps possédé par les Chapel de La Salle. N.Bertrand Chapel, originaire de Murat, faisait son séjour de Maillargues en 1460; Jean Chapel, seigneur de La Salle et d'Anglards, rendit hommage au roi en 1540 et demeurait aussi à Maillargues; il maria sa fille, Antoinette, avec Antoine Gandilhon, riche bourgeois d'Allanche. La noce eut lieu dans le château de La Salle, à Maillargues. Plus tard la seigneurie, de La Salle fut vendue en justice et elle fut acquise par la famille du Chayladès  un incendie dévora le château dans le XVIIe siècle, mais on en rebâtit un nouveau sur les ruines du premier, c'est celui qui existe encore en partie.","architecture":"MERCOEUR, édifice du XVe siècle présentant une façade à deux étages. Un escalier en pierre monte le long de la partie inférieure de la façade. Un premier palier permet l'accès à l'intérieur par une porte gothique moulurée et linteau en accolade. Une seconde volée créée  communique avec un bâtiment perpendiculaire. Deux grandes fenêtres à meneaux en éclairent les pièces. Sous la toiture, défendant les accès inférieurs, sont construits trois mâchicoulis dont un d'angle supporté par des corbeaux en biais. Une cheminée constituée par deux massifs de maçonnerie superposés sort du pignon gauche. A l'intérieur, deux cheminées composées d'une grande pierre reposant sur deux jambages. Un écusson ovale, saillant, est placé au centre, comportant trois étoiles et un quartier de lune couché.","habitants":"Famille Chapel\r\n        \r\n        \"","divers":"Château de Merceur à Allanche","gps":"","images":["../image/image_15/15_Mercoeur_Cantal_1.jpg","../image/image_15/15_Mercoeur_Cantal_2.jpg"]},"Consult_chateau_formulaire3790":{"id":"Consult_chateau_formulaire3790","dept":"15","canton":"Vic-sur-Cère","commune":"Raulhac","nom":"Messilhac","type":"Château","periode":"XIV-XVI","histoire":"MESSILHAC, dés 1283 les premiers possesseurs de la seigneurie de Messilhac sont les Bénavent, branche de la maison de Rodez-Carlat. Les Bénavent, co-seigneurs de Montamat, substituèrent à leur nom celui de Montamat. C'est à la suite d'un mariage avec une descendante des Montamat que la célèbre famille Chapt de Rastinhac entra à Messilhac. Famille dont les maîtres firent leurs preuves aussi bien en qualité de gouverneur de la Haute-Auvergne qu'en qualité de chef de guerre, enfin de paterfamilias prolifiques dont l'un d'eux n'eut pas moins de cinq concubines et des enfants naturels tous reconnus et mariés dans des familles notables du pays. En 1548 passe par alliance à la famille de Saunhac. Le dernier Rastinhac s'éteignit en 1766 et institua comme héritier son neveu Bertrand de Greil de la Volpilière.  La famille de Greil conserva le château de Messilhac jusqu'en 1943, date à laquelle il fut vendu à Richard d'Aulnay dont les descendants le revendront en 1998 aux actuels propriétaires, Olivier Dubois, a entrepris des travaux de restauration. Dans ce château une visiteuse illustre la reine Margot Marguerite de Valois  de 1553 à 1615 y effectua plusieurs séjours.","architecture":"Fondé au XIIe siècle, le château de Messilhac fut modifié au XVIe siècle  Le superbe corps de logis Renaissance construit en 1531 est encadré de deux tours carrées, plus anciennes, dont l'une est du XIIIe siècle. Leurs sommets et celui de la façade sont surmontés d'un chemin de ronde couvert, avec mâchicoulis et échauguettes d'angles.  Le corps de logis,  surmontées d'un chemin de ronde, composé de trois étages, un superbe panorama sur la vallée du Goul, chaque étages  divisé en quatre pièces. Elles ont conservé leurs plafonds à la française et leurs cheminées monumentales. Fenêtres à meneaux, escalier avec ses voûtes à liernes et tiercerons, cheminées et portes moulurées attestent la fortune des propriétaires qui construisirent ou aménagèrent le château de Messilhac. La porte est cantonnée de colonnes fusiformes de style Renaissance alors que les autres ornementations seraient plus de transition.    De l'ancienne enceinte qui protégeait autrefois le château, il subsiste la tour dite de \"l'oubliette\" actuellement reliée au château par une petite aile du XVIIIe siècle. Le pont-levis devait se trouver à l'est. Des vestiges d'autres constructions anciennes montrent l'importance de l'ancien château.","habitants":"Famille Chapt de Rastinhac\r\n        \r\n        \"","divers":"Château de Messilhac à Raulhac","gps":"","images":["../image/image_15/15_Messilhac_1.jpg","../image/image_15/15_Messilhac_2.jpg","../image/image_15/15_Messilhac_3.jpg","../image/image_15/15_Messilhac_4.jpg","../image/image_15/15_Messilhac_5.jpg","../image/image_15/15_Messilhac_6.jpg","../image/image_15/15_Messilhac_7.jpg"]},"Consult_chateau_formulairebe04":{"id":"Consult_chateau_formulairebe04","dept":"15","canton":"Mauriac","commune":"Chalvignac","nom":"Miremont_Cantal","type":"Vestiges","periode":"XII","histoire":"MIREMONT, au XIIIe siècle, le fief de Miremont, comme la plupart des autres grands fiefs de la Haute-Auvergne, était indivis entre des seigneurs différents, situation qui se révélait souvent conflictuelle. Ainsi la famille d'Albars y possédait une tour. En 1398, Guillaume Besseyras, damoiseau, était co-seigneur de Miremont.  La famille de Mauriac en posséda aussi la co-seigneurie du XIIIe au XVIe siècles.  De ces deux fils, l'un, Bernard, partit en Palestine, et l'autre, Guy, lui succéda et prit le nom de Miremont. La maison de Miremont s'éteignit au commencement du XIVe siècle par le mariage de Marthe de Miremont avec Elie de Saint-Exupéry et celui de Marguerite de Miremont avec  Olivier de Saint-Chamand. Au XVIe siècle François de Mauriac et son fils vendirent, leur part à Claude de Levy, chambellan du frère du roi, comte de Charlus et époux de Jeanne de Maumont.  Cependant, à la fin du XVIe siècle, la seigneurie était possédée entièrement par la famille de Saint-Exupéry. Guy de Saint-Exupéry, chevalier, bailli royal des Montagnes d'Auvergne en 1562 épousa Madeleine de Saint-Nectaire, dont il eut deux filles dont l'une, Françoise, fut mariée en 1571 à Henri de Bourbon, baron de Malauze. Ses successeurs vendirent avant 1747  la seigneurie à Louis-Hector, marquis de Simiane, qui achète la seigneurie, et se marie l'année suivante à Clermont-Ferrand avec Marie Esther Émilie Aldebert de Séveyrac, fille de François, seigneur de Saint-Martin et Marie-Angélique de La Vernède, celui même qui fit démolir en 1770 le château du fait de son coût à l'entretien.","architecture":"Vestiges de Miremont situé à 640 mètres d'altitude sur un plateau basaltique au confluent du Labiou et de la Dordogne. Il était défendu à l'est par un rempart en maçonnerie qui fermait l'éperon. À son extrémité Sud se trouvait la porte d'entrée surmontée d'une tour carrée. Les écuries, qui étaient voûtées, étaient adossées à l'intérieur du rempart. Ensuite, un espace vide était creusé d'un fossé, garni d'une contre-escarpe, qui allait jusqu'au bord d'un socle de basalte au bord duquel était bâti le château. On accédait à cette seconde porte par un pont-levis. Au midi, l'enceinte se composait d'un mur en terrasse très élevé ; À l'ouest, le mur d'enceinte formait des angles saillants et rentrants et il s'appuyait du côté Sud à une grande tour, de l'autre à celle qui servait de donjon et qui commandait la porte. les cours et ces jardins assez vastes s'étendaient entre le château et l'enceinte occidentale. Le château n'est plus habité depuis longtemps et coûteux à entretenir : il le fait démolir en 1777.","habitants":"Famille de Saint-Exupéry\r\n        \"","divers":"Vestiges du fort de Miremont à Chalvignac","gps":"","images":["../image/image_15/15_Miremont_Cantal_1.jpg","../image/image_15/15_Miremont_Cantal_2.jpg","../image/image_15/15_Miremont_Cantal_3.jpg","../image/image_15/15_Miremont_Cantal_4.jpg","../image/image_15/15_Miremont_Cantal_5.jpg"]},"Consult_chateau_formulaire4d4c":{"id":"Consult_chateau_formulaire4d4c","dept":"15","canton":"Vic sur Cére","commune":"Polminhac","nom":"Montlogis","type":"Château","periode":"XV","histoire":"MONTLOGIS, la terre de Montlogis était à l'origine une dépendance du petit fief de la famille des Courtines. En 1609  noble Antoine de Teyssières, écuyer, seigneur de Montlogis et de Marfons rend hommage au comte du Carladès pour son château de Marfons. Ce dernier aurait vendu la terre de Montlogis à Louis de Fontanges en 1581 mais  cette vente resta sans effet, car le 27 octobre 1609, Anne de Teyssières, dame de Marfons, dernière du nom, épousa Raymond de Chaunac-Lanzac, originaire du Quercy et lui apporta la terre de Montlogis. En 1668 Antoine\r\n de Chaunac, écuyer, seigneur de Montlogis, réside en son château composé de deux corps de logis et d'une tour  carrée, jardin, basse-cour, comprenant  deux sesterces, et autre petite maison. En 1735 la terre  de Montlogis appartient à la commanderie de Carlat. En 1770  madame François Xavier de Chaunac de Montlogis,  écuyer et damoiselle Jeanne Marie de Montlogis, sa soeur, sont citées habitant le village de Las Courtines au   sujet d'une coupe de bois de Goulèze. La famille de Chaunac ne semble plus résider au château de Montlogis à la fin du XVIIIe siècle. En 1857 il appartient à M.  Maurice Buygues, conservateur des hypothèques à Aurillac. monsieur de Sonis en est l'actuel propriétaire.","architecture":"Le Manoir de Montlogis restaurée au XIXe siècle, conserve son plan-masse de 1811 de plan rectangulaire à deux niveaux et lucarnes en toitures accolé d'une tour ronde et d'une tourelle carrée avec un pigeonnier en forme de tour rectangulaire. Montlogis, hameau et château dominant la rive gauche de la Cère. M. Maurice Bouygues, conservateur des hypothèques à Aurillac, qui l'a restauré et embelli.","habitants":"Famille d'Antoine de Teyssières\r\n        \"","divers":"Château de Montlogis à Polminhac","gps":"","images":["../image/image_15/15_Montlogis_1.jpg","../image/image_15/15_Montlogis_2.jpg"]},"Consult_chateau_formulaire92b5":{"id":"Consult_chateau_formulaire92b5","dept":"15","canton":"Arpajon sur Céze","commune":"Montsalvy","nom":"Montsalvy","type":"Forteresse","periode":"XIV","histoire":"Deux châteaux à Montsalvy, celui de Montarnal pas d'informations historiques  et de Montsalvy.                                                   MONTSALVY  Le passé de ce bel édifice n'est pas connu très précisément. Un premier château aurait été édifié au XIVe siècle. Détruit, il fut reconstruit au XVe siècle, avec l'aide de Bernard de Calmont d'Olt, abbé du monastère de Montsalvy représentant du seigneur de Montsalvy, il prit tout en charge lors du décès de la princesse Isabelle de Montsalvy. Ensuite, il aurait été reconstruit sur les fondations des anciens remparts lorsque ceux-ci n'ont plus eu de fonction défensive. Cette demeure bourgeoise s'est dotée d'une tour datant du XVIIIe siècle d'où son appellation de château. La famille Bonnefons-Delmas en a fait donation à la commune pour y créer une maison de retraite.","architecture":"Montsalvy ancien donjon carré de quatre étages flanquée d'une tour en angle et d'une échauguette à l'opposée et logis abbatial fortement restauré au XIXe siècle                                                                   Montarnal château cantonné de deux tourelles rondes éclairées par trois étages d'oculus toitures en poivrières pour les tourelles et toit en croupe pour le corps de logis de trois niveaux.","habitants":"l'abbé Bernard de Calmont d'Olt\r\n        \"","divers":"Château de Montsalvy et de Montarnal","gps":"","images":["../image/image_15/15_Montsalvy_1.jpg","../image/image_15/15_Montsalvy_2.jpg","../image/image_15/15_Montsalvy_3.jpg","../image/image_15/15_Montsalvy_4.jpg","../image/image_15/15_Montsalvy_5.jpg"]},"Consult_chateau_formulairee087":{"id":"Consult_chateau_formulairee087","dept":"15","canton":"Maurs","commune":"Mourjou","nom":"Mourjou","type":"Château","periode":"XVI","histoire":"Trois châteaux à Mourjou, de Jalenques du XVIII-XXe siècle, de Berbezou du XVIe siècle et de Sadours.\r\nBERBEZOU, Burbuzou, hameau et château sur le ruisseau de Calvinet. Ce fief appartenait, au t du XIIIe siècle, à la famille de Montjou. Noble François de Montjou vivait en 1263; il possédait aussi la seigneurie de Cropières. Ces deux terres restèrent dans cette maison jusqu'en 1531, où Anne de Montjou, héritière de sa famille, épousa Aymeric de Fontanges. Charles de Durfort possédait Burbuzou en 1670, et en fit hommage au prince de Monaco.  qui vit défiler  les familles de Montjou, de Ravel, de Durfort et enfin les Scorailles à la fin de l'ancien régime.  Marc-François de Scorailles était seigneur de Burbuzou en 1720, et habita  parfois ce château. Nicolas Henry, comte de Brieu, baron de Londres, était seigneur de Burbuzou en 1750.                  SADOURS, un fief de la famille de ce nom. Biaise de Sadours vivait a la fin du XVI° siècle. Raymond de Sadours, qui servait comme capitaine pendant les guerres civiles  ne put faire ses preuves en 1666. Cette terre passa par défaut de descendant à Jean de Sadours , curé de Fiagnac, qui la vendit, en 1699, à Henri-Hector de Mouret. Cette vente fut ratifiée en 1712. Le château est situé sur un plateau, près des bois, et dominant la Ressègue.            JALENQUES pas d'information historique.","architecture":"Berbezou composé alors d'une tour carrée et crénelée, adossée à un corps de logis; une deuxième tour ronde accolais aussi au corps de logis. Il y avait quatre étages dont les appartements étaient voûtés; une petite chapelle était contre la tour; une terrasse régnait sur le jardin.                                                                                Mourjou, de plan rectangulaire à trois niveaux et double rangées de lucarnes sur toits brisés , près du ruisseau de Calvinet, la grosse tour carrée et crénelée adossée à un corps de logis du manoir de Berbezou.                                                                                       Jarlenques de plan en U  est composé d'un corps de logis rectangulaire  à deux niveaux  et double rangés de Lucarnes sur toitures imposantes, pavillon d'entrée saillant  surélevé de l'édifice avec terrasse et clocheton,  ailes en retour de même dimension à trois travées.","habitants":"Famille de Montjou                                                                                       Famille de Raymond de Sadours\r\n        \"","divers":"Château de Mourjou de Berbezou et de Jalenques à Mourjou","gps":"","images":["../image/image_15/15_Mourjou_1.jpg","../image/image_15/15_Mourjou_2.jpg","../image/image_15/15_Mourjou_3.jpg","../image/image_15/15_Mourjou_4.jpg","../image/image_15/15_Mourjou_5.jpg","../image/image_15/15_Mourjou_6.jpg","../image/image_15/15_Mourjou_7.jpg"]},"Consult_chateau_formulaire2d13":{"id":"Consult_chateau_formulaire2d13","dept":"15","canton":"Mauriac","commune":"Moussages","nom":"Moussages_Valens","type":"Vestiges","periode":"XII-XV","histoire":"Moussages comptait six châteaux : de Valens du XVe siècle détruit en 1885 par le vandalisme inconscient d'un fermier, le château de Claviers du XIe siècle ruiné, de Grossaldet ruiné , de Valmaison où durant la Fronde la princesse de Condé, au cours de sa fuite triomphale à travers l'Auvergne couche au château avec une escorte de mille hommes, le château d'Algères et enfin de Veysset.  Pas d'informations sur les châteaux de Claviers, de Grossaldet  et de Veysset.                                                             VALENS avait donné son nom à une famille d'ancienne noblesse connue dès le XIIIe siècle. Puis du fait du mariage de Geneviève de Valens, avec Gabriel de Nozières-Montal en 1544, le château changea de famille, vers 1683, cette terre passa aux Crussol par le mariage de Madeleine de Nozières-Montal avec Alexandre Galliot de Crussol, marquis de Saint-Sulpice, lesquels le conservèrent jusqu'à la Révolution.","architecture":"Vestiges du château de Valens à Moussanges","habitants":"Alexandre Galliot de Crussol,\r\n        \"","divers":"Vestiges du château de Valens à Moussanges","gps":"","images":["../image/image_15/15_Moussages_Valens_1.jpg"]},"Consult_chateau_formulaire8231":{"id":"Consult_chateau_formulaire8231","dept":"15","canton":"Saint-Etienne de Maurs","commune":"Saint-Etienne de Maurs","nom":"Murat_Maurs","type":"Château","periode":"XIII","histoire":"MURAT, le château de Murat a appartenu, en 1243, à la famille de Gironde. Cibile, dame de Murat, épousa en 1258   N. Armand de Barres. Jean de Barres, leur fils, fut maréchal de France en 1318. Armand de Gironde, qui épousa Talise de Caumont, était seigneur de Murat en 1298.  Guy de Murat, mari d'Agnès, de St-Etienne-de-Maurs , eut un fils du nom de Guy, seigneur de Murat ; il traita, en 1311, avec  Bernard de Durban, seigneur de Roumegoux ;  il fit son hommage, en 1317,  du château de Murat à Hugues de Castelnau, baron de St-Santin, dans la chapelle, en présence de Géraud de Murat, ouvrier du monastère de Maurs, de Guillaume de Cornac et de Géraud d'Enfabre,  acquis par la famille d'Enfabre  passa à La famille de Bertrand fut héritière de celle de Barras de Cornac, et Bégon de Bertrand, seigneur de Gironde, l'était de Murat en 1363; Guillaume de Bertrand fut seigneur de Murat et vivait en 1445. Il eut Antoine, seigneur de Giralmont; Antoinette, qui épousa Gabriel d'Enfabre, seigneur du Garry, et Guillaume, qui devint le principal héritier, dans cette famille jusqu'en 1600 . Marie de Grignols, fille d'Antoine, mariée à Antoine de Peyronnenq, réunit ainsi les deux châteaux.  Antoine de Peyronnenq y avait fait faire de grandes réparations en 1654, et ses successeurs en 1752 elle était veuve en 1672;  elle fit son hommage à François de Crussol, duc d'Uzès, pour les deux châteaux de Murat. La famille de Peyronnenq  possède encore le château et propriété de Murat.","architecture":"Murat avec corps de logis, grosse tour ronde , qui était un gros corps de logis, grosse tour carrée en joignant, chambre, pigeonnier et chapelle, et le tout avec leurs dépendances, et situé sur la rivière de Rance et le ruisseau d'Anez, surtout à la tour carrée et au corridor qui servait à joindre les deux châteaux.D'après les détails ci-dessus, l'événement tragique des deux frères ennemis qui possédaient les deux châteaux de Murat et qui se seraient tués l'un l'autre à coups d'arquebuse de leurs fenêtres, ne paraît pas historique et ne servait qu'un conte populaire.                                            Murat, St-Etienne de Maurs, pas d'historique sur ce château perché sur un éperon barré, qui aurait été construit au XIIIe siècle, situé sur la commune de Saint Etienne de Maurs, il subsiste un beau logis. Il aurait appartenu au vicomte de Peyronnenq au XVIIIe siècle. Pendant la Révolution, le propriétaire donna l'autorisation d'enlever les girouettes et d'abattre les tours dans une vaine tentative pour empêcher un pillage complet. Mais  le château fut pillé et partiellement détruit.","habitants":"Famille de  Jean de Barres                                                                       Famille de Peyronnenq\r\n        \"","divers":"Château de Murat à Eaint-Etienne de Maurs","gps":"","images":["../image/image_15/15_Murat_Maurs_1.jpg","../image/image_15/15_Murat_Maurs_2.jpg","../image/image_15/15_Murat_Maurs_3.jpg","../image/image_15/15_Murat_Maurs_4.jpg"]},"Consult_chateau_formulaire7780":{"id":"Consult_chateau_formulaire7780","dept":"15","canton":"Murat","commune":"Murat","nom":"Murat_Monuments","type":"Monuments","periode":"XVI-XVIII","histoire":"MURAT, au XIVe siècle, Murat était une ville fortifié « castrum apud castrum de Murat forteresse appuyé au rocher de Murat. A l'abri de ses murailles cétait un nud routier important, une cité active, foires et marchés, auberges, artisanat, professions libérales.\r\nLe château imposant appartenant successivement aux familles de Murat, de Cardaillac, dArmagnac, fut détruit en 1633 par ordre de Richelieu.","architecture":"La vieille ville médiévale. Murat compte de nombreuses maisons médiévales et renaissance, dont sept bâtiments protégés, inscrits à l'Inventaire des monuments historiques :  la collégiale Notre-Dame-des-Oliviers place Gandilhon-Gens-d'Armes: construite entre le XIIe et le XIVe siècle, elle a été progressivement agrandie par la suite. La partie sud du bâtiment a été dégagée en 1926.\r\nl'ancienne maison du bailliage : maison du XVIe siècle, témoin important du passé historique de Murat, présentant une maçonnerie en pierres volcaniques jointoyées à chaux.\r\nla maison style Renaissance : présente un bel appareillage de pierres taillées dans du trachyte.\r\nle tribunal: ancien couvent des Dominicaines enseignantes de Sainte-Catherine-de-Sienne, reconstruit après l'incendie de 1771.\r\nla maison consulaire : façade de la fin du XVe siècle coupée par deux bandeaux aux tranches moulurées en doucine.\r\nla ferme de la Pradal\r\nla maison de la faune, musée situé dans un ancien hôtel particulier du XVIIe siècle et dont les collections illustrent la richesse de la faune locale et exotique.\r\nLe prieuré Sainte-Thérèse.","habitants":"Familles de Murat\r\n        \"","divers":"A Murat les monuments; la maison Consulaire, la maison Hurgon, du Baillage, la mairie et de la Faune","gps":"","images":["../image/image_15/15_Murat_Monuments_1.jpg","../image/image_15/15_Murat_Monuments_2.jpg","../image/image_15/15_Murat_Monuments_3.jpg","../image/image_15/15_Murat_Monuments_4.jpg","../image/image_15/15_Murat_Monuments_5.jpg"]},"Consult_chateau_formulairef435":{"id":"Consult_chateau_formulairef435","dept":"15","canton":"Murat","commune":"Murat","nom":"Murat_Patrimoine","type":"Patrimoine","periode":"XII-XV","histoire":"Plusieurs châteaux à Murat, de Beccoire et de Massebeau (article suivant),   celui de Baraire, de Delpirou, de Lafont et de Roddes pas d'informations historiques.                                                         MURAT, à l'an 1000  date ou un document indique que Murat est une vicomté puissante, avec un château établi depuis longtemps, ses vicomtes rendaient hommages aux vicomtes de Carlat. La ville est alors une place fortifiée. En 1283, elle est dénommée dans un traité. En 1044, Henri le Noir, le roi de Germanie, aurait assiégé le château mais ce fait est peu vraisemblable.    Lors de son dénombrement en 1697, elle comprenait : 25 châteaux forts, 29 châteaux, 59 villages et 110 fiefs.   Château imposant appartenant successivement aux familles de Murat, de Cardaillac, dArmagnac, fut détruit en 1633 par ordre de Richelieu. Il surplombait les orgues basaltiques en lieu et place de la statue de Notre-Dame de la Haute-Auvergne.\r\nBECCOIRE commune d'Albepierre-Bredons. C'était un château royal, qui a servi de siège ambulant du Bailliage des Montagnes d'Auvergne.  Beccoire fut construit en 1258 par saint Louis, pour en faire le chef-lieu de la suzeraineté royale. Il était sur le petit mamelon qui domine l'église de Bredon, et sur la partie la plus escarpée du rocher. On voit encore quelques traces de son enceinte. Il fut rasé à l'époque des hostilités entre les d'Armagnac et Reynaud de Murat.                                                                 MASSEBEAU  première mention de la seigneurie de Massebeau en 1315, dépendant du vicomté de Murat. Le château imposant appartenant successivement aux familles de Murat, de Cardaillac, dArmagnac, fut détruit en 1633 par ordre de Richelieu. il en reste deux bâtiments. A quelques kilomètre au sud la tour du château de Cheylannes à Laveissenet reste d'un château qui a disparu.","architecture":"Château de Beccoire,  aujourd'hui à l'état de vestiges,château royal construit par Saint Louis. Il servait de siège ambulant au bailliage des montagnes. \r\nMassebeau se compose de deux ailes se faisant face de part et d'autre d'une cour, clôturée à l'ouest par un mur et s'ouvrant à l'est par un porche. Un deuxième porche, accolé à l'aile gauche, ouvre sur le vallon. Chaque corps de bâtiment est marqué, au centre de sa façade sur cour, par une tour d'escalier. A l'intérieur, le premier étage du corps de bâtiment nord, conserve un beau plafond à caissons. Au sud, deux cheminées monumentales.","habitants":"le roi de Germanie Henri le Noir\r\n        \"","divers":"Le patrimoine châteaux de Murat;  La tour de Cheylanne, le château de Barraire, de Beccoire, de Delpirou, de Lafont et de Massebeau.","gps":"","images":["../image/image_15/15_Murat_Patrimoine_1.jpg","../image/image_15/15_Murat_Patrimoine_2.jpg","../image/image_15/15_Murat_Patrimoine_3.jpg","../image/image_15/15_Murat_Patrimoine_4.jpg","../image/image_15/15_Murat_Patrimoine_5.jpg","../image/image_15/15_Murat_Patrimoine_6.jpg","../image/image_15/15_Murat_Patrimoine_7.jpg","../image/image_15/15_Murat_Patrimoine_8.jpg","../image/image_15/15_Murat_Patrimoine_9.jpg"]},"Consult_chateau_formulaire6d29":{"id":"Consult_chateau_formulaire6d29","dept":"15","canton":"Ydes","commune":"La Monselie","nom":"Murat_Rabbe","type":"Château","periode":"XV","histoire":"MURAT-la-RABBE, était le chef-lieu d'une seigneurie importante. Il n'est pas certain qu'elle ait appartenu à une famille de Murat; mais on sait qu'elle était possédée, dès 1392, par une branche cadette de la maison de Claviers , dont les armoiries se voient encore sur la porte du vestibule du château. Cette branche se fondit, en 1460, dans une branche de la maison d'Escorailles qui, elle-même, après avoir porté le nom de Claviers pendant un siècle et demi, s'éteignit en la personne de Jacques de Claviers, deuxième du nom, qualifié de seigneur de Murat-la-Rabbe et de Châteauneuf. Catherine de Claviers, sa sur  héritière, porta, en 1596, cette seigneurie dans la maison de Béranger de Montmoton, famille importante du Rouergue, par son mariage avec Laurent de Béranger. Marie-Louise de Béranger de Montmoton, baronne de Murat-la-Rabbe, la porta à son tour dans la maison de Bourbon-Malauze, par son mariage avec Guy, Henri de Bourbon-Malauze, survenu en 1692. Elle passa ensuite dans la famille de Lacroix de Castries, qui en jouit jusqu'en 1781, et finit par la céder à l'Estels de la Chapelle et au comte de Caissac, son gendre. La terre de Murat-la-Rabbe est aujourd'hui la propriété de madame la baronne de Douhet-d'Auzers , héritière de la maison de Caissac.\r\nA quelques kilomètres au nord-est le château de Chomeil à Saint-Etienne de Chomeil.                                                                            CHOMEIL, de la famille Dubois de Saint-Etienne  du XVII au XIXe siècle pas d'autre information historique.","architecture":"Murat la Rabbe, ensemble composé d'éléments d'époques différentes, les différentes parties s'organisent autour d'une cour centrale. Le rempart est encore visible sur tout le périmètre. De la forteresse construite à l'époque romane, restent la chapelle et des vestiges d'enceinte. Le château actuel date du XVe siècle, avec un logis transformé au XVIIIe. Ce logis, construit sur l'ancien donjon dérasé, est prolongé par un bâtiment plus bas faisant office de communs et s'appuyant sur une tour d'angle carrée. Les autres côtés du quadrilatère dominant la cour, présentent un portail du XVIIIe siècle, au sud, conservant le portail ogival de l'ancienne entrée. Près de la chapelle se trouve le portail de l'ancien château féodal, cette porte, datant du XVe siècle, s'ouvre sous un arc brisé orné d'une moulure. Le tympan de cette porte est actuellement dépourvu de décor, mais il devait autrefois comporter un bas relief. Le portail du XVIIIe siècle comporte deux niveaux : la partie inférieure, avec la porte, se termine par un arc surbaissé appareillé à crossettes. Un bandeau mouluré orné de petits chapiteaux sépare le niveau inférieur du niveau supérieur. Il est orné de deux losanges en relief encadrant un rectangle, sans doute destiné à recevoir un blason.                                                                      Chomeil, le château dont la partie la plus ancienne remonte au XIVe siècle, a été modifié et agrandi au XVIIe siècle, et plus tardivement pour les intérieurs. Il conserve sa vieille cuisine du XIVe siècle. Le parc à l'anglaise a été créé en 1900, avec arbres remarquables, cadran solaire et canonial.","habitants":"Famille de  Henri de Bourbon-Malauze\r\n        \"","divers":"Château de Murat la Rabbe et de Chomeil à Monselie","gps":"","images":["../image/image_15/15_Murat_Rabbe_1.jpg","../image/image_15/15_Murat_Rabbe_2.jpg","../image/image_15/15_Murat_Rabbe_3.jpg","../image/image_15/15_Murat_Rabbe_4.jpg","../image/image_15/15_Murat_Rabbe_5.jpg","../image/image_15/15_Murat_Rabbe_6.jpg"]},"Consult_chateau_formulaire15c8":{"id":"Consult_chateau_formulaire15c8","dept":"15","canton":"Maurs","commune":"Saint-Julien de Toursac","nom":"Naucaze","type":"Vestiges","periode":"XIII","histoire":"Trois châteaux à Saint-Julien de Toursac, de Chaumettes , de Naucaze du XIIIe siècle  et de Toursac du XIIIe siècle.   NAUCAZE,  en 1250, Guillaume de Naucaze , en 1597, cest Antoine de Naucaze qui se marie avec Jacquette de Bourdeille, fille de Philibert de Bourdeille, cousin de Henri III de Navare, notre futur Henri IV.  En 1679, François de Naucaze est page à la grande écurie du Roi Louis XIV. Plus tard, le marquis Claude de Naucaze fut un seigneur respecté.  Jean-Baptiste de Naucaze fut le seigneur qui traversa la Révolution française, et son fils Jean-Pierre Thérèse, servi sous les ordres du maréchal Davout pendant les campagnes de Napoléon. Prisonnier en Russie dont il revint, il finit sa carrière militaire comme chef descadron sous Louis-Philippe le 3 septembre 1835. Sa fille Angélique fut la dernière à porter le nom des Naucaze. Son petit-fils, lui, fut le dernier descendant  décédé en 1920.\r\n TOURSAC, en 1315, le château de Toursac appartenait en partie à Guillaume de Meyrinhac ; sa châtellenie était considérable; les limites en avaient été réglées, en 1280, entre le vicomte de Carlat et les emphytéotes. En 1355, Hugues de Méallet, damoiseau, seigneur de Beaufort, avait une part du château ; à la même époque, Aymeri de Mur et Pierre de Durban jouissaient de la moitié. En 1374, Bertrand de Rochefort possédait à Toursac une maison fortifiée; Bernard de Rouziers y avait aussi un repaire. En 1468, il intervint une transaction entre le vicomte de Carlat et le seigneur de Méallet de Fargues, sur l'arbitrage de Guillaume de Bresons, par laquelle le seigneur de Fargues fut dispensé de concourir à la garde du château de Toursac, à cause de la forteresse de Fargues.","architecture":"Vestiges de Naucaze, fut construit rapidement durant le XIIIe siècle, pour se protéger de nombreux troubles, il possède une tour du XIIe siècle qui est lélément architectural le plus ancien. Un corps de logis rectangulaire et flanqué de tours, montre que sa construction est de type château de défense, comme beaucoup de châteaux construits dans cette période du Moyen-Age. Une architecture intéressante, il a subi de nombreuses modifications. Château composé d'un logis dont la construction a fait l'objet de plusieurs campagnes : donjon primitif du XIIe ou du XIIIe siècle agrandi au XVe siècle par l'adjonction d'un logis à tours rondes puis, en 1637, d'un corps de bâtiment permettant de passer de la haute-cour à la basse-cour. Naucase on voit encore les ruines du château  dans une plaine auprès d'un étang. Les fortes murailles, les tourelles, la tour carrée où étaient les prisons, les belles écuries voûtées, tout annonce un important manoir féodal II fut incendié en 1789.\r\nToursac, on doit conclure de ce que nous venons d'exposer, qu'il était non seulement un château fort, mais qu'il formait une forteresse composée de maisons et de bâtiments fortifiés, ceint par une muraille, ce qui viendrait confirmer la tradition populaire qu'en ce lieu il y avait jadis une ville qui aurait été détruite à l'époque de la guerre avec les anglais. A peine aujourd'hui voit-on quelques ruines qui puissent indiquer sa place.","habitants":"Famille d'Antoine de Naucaze\r\n        \"","divers":"Vestige de Naucaze à Saint-Julien de Toursac","gps":"","images":["../image/image_15/15_Naucaze_1.jpg","../image/image_15/15_Naucaze_2.jpg","../image/image_15/15_Naucaze_3.jpg","../image/image_15/15_Naucaze_4.jpg","../image/image_15/15_Naucaze_5.jpg","../image/image_15/15_Naucaze_6.jpg","../image/image_15/15_Naucaze_7.jpg","../image/image_15/15_Naucaze_8.jpg","../image/image_15/15_Naucaze_9.jpg"]},"Consult_chateau_formulaireb22b":{"id":"Consult_chateau_formulaireb22b","dept":"15","canton":"Naucelles","commune":"Naucelles","nom":"Naucelles","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Naucelles, celui de Colognes du XVIe siècle, de Montely du XIXe  siècle, et la tour de Naucelles du XIVe siècle actuellement mairie.                                                                              CLAUX, appartenait depuis le XVe siècle à la famille de Veyre dont une branche possédait la Réginie. Il passe par alliance  à Jeanne Delsol, mariée à Joseph Grasset, officier, maire de Mauriac, qui le reconstruit, et dont les fils le vendent vers 1850 à la famille Grognier.                                                                                     COLOGNE,  au hameau de Cologne existait jadis un château fortifié, dont il ne reste plus  que la tour massive. La demeure appartenait à la famille de Brun au XIVe siècle. Ensuite il passa dans les familles de Mazerolles, de Saint-Martial, de Sartiges, puis de Montsalvy. Acheté en 1548 par François de Scorailles pour sa fille Françoise qui par mariage l'apporte à François de Robert de Lignerac. Celui ci donne la propriété à sa fille Jeanne qui épouse, vers 1620, Annet de Plas de Curemonte. Le château est acheté par le collège des Jésuites d'Aurillac qui le conservera jusqu'à la Révolution. Aujourdhui, il est complètement rénové  est ouvert a la location, soit a la semaine soit pour un week-end.                                                       NAUCELLES, la tradition locale prête à la tour un rôle de poste avancé du château Saint-Etienne d'Aurillac. A la fin du XIIe siècle, l'abbé y entretenait une garnison, elle servait aussi de prison.\r\nJusqu'à 1789 elle appartenait au chapitre de saint-Géraud. A la Révolution la population essaya de détruire ses créneaux histoire de la découronner. Elle fut vendue comme bien national en 1791.\r\nMONTHELY, appartenait à la famille de ce nom, puis aux familles de la Salle d'Ytac et de Conquans. Il est ensuite possédé au XIXe siècle par la famille Majonenc,  puis par successions dans les familles Delzons et Lapeyre. Appartient aujourd'hui à monsieur François Majonenc, ancien banquier, qui y a fait des constructions considérables et des améliorations.","architecture":"Tour de Naucelles du XIe siècle, qui faisait partie du système de défense de l'abbaye d'Aurillac, et lui servait de prison. Actuellement la mairie.\r\nChâteau de Cologne,  existait jadis un château fortifié, dont il ne reste plus actuellement que la tour massive de plan rectangulaire à quatre niveaux toit en croupe et tourelle mi-hors oeuvre toiture en poivrière\r\nChâteau de Monthely, reconstruit dans le style du Consulat, \r\nChâteau du Claux. de plan rectangulaire à trois niveaux toitures en croupe avec lucarnes et tourelle accolée sur flan droit de même niveau toit en poivrière","habitants":"Famille Grognier                                                                                 Famille de Brun\r\n        \"","divers":"A Naucelles la Tour, le château  des Claux, de Cologne et de Monthely.","gps":"","images":["../image/image_15/15_Naucelles_1.jpg","../image/image_15/15_Naucelles_2.jpg","../image/image_15/15_Naucelles_3.jpg","../image/image_15/15_Naucelles_4.jpg","../image/image_15/15_Naucelles_5.jpg","../image/image_15/15_Naucelles_6.jpg"]},"Consult_chateau_formulairebb3c":{"id":"Consult_chateau_formulairebb3c","dept":"15","canton":"Murat","commune":"Neussargues-Moissac","nom":"Neussargues","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Neussargues-Moissac, celui de Benoid, de Margueride , de Neussargues,   et de Sévéraguet ruiné.   NEUSSARGUES Jusquen 1901, la commune sappelait simplement Neussargues.\r\nOn note la présence dun château fort à Moissac, dun autre au Cheylat de la famille de Dienne, dune forteresse à Mardogne dont il ne reste quune tour en ruines des familles de  Tinières, Bréon, Foix. On peut dailleurs admirer le tombeau de Louis de Foix dans léglise de Joursac. La seigneurie de Mardogne, élevée en marquisat par Louis XIII, deviendra une prévôté royale sous Louis XVI.                                                                                             BENOIT du XVe siècle construit par François de Dienne qui fut la résidence secondaire au siècle dernier du compositeur Olivier Messian.                                                                                        MARGUERITE. Nous devons son état actuel à l'ancien maire de Murat : Maurice Guibal, son deuxième propriétaire, qui en a fait achever la construction et lui a donné pour nom le prénom de sa fille. Désormais, le château appartient à la famille Lorient.","architecture":"Neussargues-Moissac, château de plan rectangulaire à quatre niveaux flanqués de trois tours rondes. Marguerite, construction en pierre du XIXe siècle qui s'identifie bien à la ville de Neussargues puisque ce château figure parmi les édifices que l'on retrouve systématiquement sur les cartes postales de la ville au cours du XXe siècle, de plan rectangulaire à deux niveaux  flanqué de quatre tourelles en angles dont deux à toitures en poivrière et deux à créneaux                                                                                    Neussargues, aujourdhui encore, la tour originale à deux étages de ce château à une seule pièce voûtée semble monter la garde dans la partie orientale du bassin, alors que la partie occidentale est surveillée par limposante commanderie Templière, puis Hospitalière de Celles.","habitants":"Famille de Dienne                                                                               Famille de Maurice Guibal\r\n        \"","divers":"A Neussargues dont celui de Neussargues, de Benoit, de Marguerite et de Moissac.","gps":"","images":["../image/image_15/15_Neussargues_1.jpg","../image/image_15/15_Neussargues_2.jpg","../image/image_15/15_Neussargues_3.jpg","../image/image_15/15_Neussargues_4.jpg","../image/image_15/15_Neussargues_5.jpg","../image/image_15/15_Neussargues_6.jpg","../image/image_15/15_Neussargues_7.jpg","../image/image_15/15_Neussargues_8.jpg"]},"Consult_chateau_formulairebe1d":{"id":"Consult_chateau_formulairebe1d","dept":"15","canton":"Saint-Paul des Landes","commune":"Nieudan","nom":"Nieudan","type":"Maison forte","periode":"XVI","histoire":"Deux châteaux à Nieudan celui de Branugues et celui de Bruel.            BRANUGUES, petit château ou repaire qui était habité, en 1650, par Antoine Dubois, seigneur de Languirou. Madeleine, sa sur, veuve d'Antoine de Pralat, seigneur de St-Victor, habitait aussi le château de Branugues.  Jeanne Dubois, devenue héritière d'Antoine, son père, mariée à Joseph de Comargues, seigneur de Leyrède, lui porta, en 1704, le domaine et château de Branugues.                  BRUEL, un château habité par la famille Bourrieu de Boisse, dans le début du XVIIe siècle, le Bruel était possédé par Antoine de Cébié, conseiller du roi, un de ses descendants eut douze fils, tous prêtres, dont un était vicaire général du diocèse de St-Flour en 1757. De ses deux filles, une épousa de Gain de Montaignac, d'une famille originaire du Limousin, illustre par elle et par ses alliances, qui avait figuré dans les croisades et dont un des membres fut évêque de Tarbes. Héritier et veuf de Mlle de Cébié, de Gain de Montaignac, seigneur d'Ourgon et de Cavaroque, s'allia à la famille de Montai. Sa fille, Anne-Elisabeth, épousa  Jean Bourrieu de Boisse, originaire du Rouergue, allié des familles de Bonnal, de Fargues, de Lavalette et de La Rochemontaix de Nastrac. Antérieurement, et en 1650, noble Géraud Bourrieu, sieur de Lacombe, avait épousé demoiselle Delphine de Cébié; en 1720, Pierre Bourrieu, seigneur de Boisse, demoiselle Marie-Camille de Gain de Montaignac, fille de  Henri de Gain, seigneur de Puechardy et d'Ourgon ; et, en 1758, son fils, Jean-Louis, Mlle Marie de Fortet; et sa fille, Rose-Madeleine, Antoine de Falvelly.","architecture":"Bruel   Petit château bâti au XVIIe siècle à partir ou à l'emplacement d'une construction plus ancienne accompagné d'un pigeonnier. La maison forte est un logis rectangulaire construit en moellons de granit, flanqué d'une tour carrée. Un petit corps de bâtiment lui a été accolé vers 1850 pour abriter le logement du régisseur.\r\n Les intérieurs ont été redécorés à cette époque. Le pigeonnier (tour circulaire basse et trapue), est un exemple très bien conservé de cette typologie plutôt fréquente dans les Limagnes, mais rare dans la châtaigneraie et le bassin d'Aurillac. Au rez-de-chaussée, sous le fenil surmonté du pigeonnier, une chapelle dont le décor peint est typique du début du XVIIe siècle.","habitants":"Famille d'Antoine Dubois                                                                      Famille Bourrieu de Boisse\r\n        \"","divers":"Château de Bruel à Nieudan","gps":"","images":["../image/image_15/15_Nieudan_1.jpg","../image/image_15/15_Nieudan_2.jpg"]},"Consult_chateau_formulaire3e77":{"id":"Consult_chateau_formulaire3e77","dept":"15","canton":"Saint-Flour","commune":"Rensetières","nom":"Nubieu_Roussière","type":"Vestiges","periode":"XIII","histoire":"NUBIEU, ruines du château de ce nom qui, au XVIe siècle, appartenait à la famille de Sennectère; il dépendait jadis de St-Poncy. Outre le fief de Brion, les Bréon tenaient au XIIIe et au XIVe siècle plusieurs fiefs et châteaux quon peut voir aujourdhui encore dans le Puy-de-Dôme et le Cantal. Au dauphiné dAuvergne Montpentier et Saint-Hérent relevaient des Bréon au XIIIe siècle.            ROUSSIERE, ce fief dépendait, en 1596, de Joseph de Foix, baron de Mardogne; il appartenait  à la famille de la Trémolière. Celle-ci le vendit à Pierre Dessauret, qui en était seigneur en 1542. Il passa enfin, en 1669, dans la famille de Trémeuge de la Roussière, qui le possède encore aujourd'hui, par suite du mariage de Françoise Dessauret avec Marc de la Roussière. La famille de Trémeuge  de la Roussière est d'origine bretonne. Un de ses membres étant venu se fixer en Auvergne, fit construire dans le Luguet le château qui porte ce nom; ses descendants y ont possédé des montagnes d'une vaste étendue. Cette famille s'allia avec celle de Brezons de Neyrebrousse. Jean-Baptiste de Trémeuge assista aux états tenus à St-Flour, en 1789. Monsieur de la Roussière, père du propriétaire actuel du château, était chevalier de St-Louis, de la Légion-d'Honneur, et avait émigré.","architecture":"Nubieux vestiges du château\r\nLe château actuel de la Roussière est situé à mi-côte et entre deux bois de hêtre dans lesquels ont été tracées des promenades gracieuses. Sa perspective s'étend sur St-Flour, qui forme pour lui un point de vue très-agréable. Il paraît qu'un autre château existait ; mais, comme il avait subi plusieurs dévastations à l'époque des guerres civiles, Mathieu de la Roussière le fit reconstruire en 1630; il se compose aujourd'hui d'une tour ronde avec meurtrière et mâchicoulis à laquelle on a rattaché un corps de logis moderne dont la toiture est à la génoise. L'ancienne tour occupe le centre de cette construction récente; et, ce qui confirme l'existence d'un manoir antérieur, c'est que les pierres des croisées qui ont servi dans la construction postérieure portent l'empreinte des paniers de fer qui y étaient incrustés.","habitants":"Famille de Sennectère                                                                               Famille de Trémeuge\r\n        \r\n        \"","divers":"Vestiges de Nubieu et château de Roussière à Resentières","gps":"","images":["../image/image_15/15_Nubieu_Roussiere_1.jpg","../image/image_15/15_Nubieu_Roussiere_2.jpg","../image/image_15/15_Nubieu_Roussiere_3.jpg","../image/image_15/15_Nubieu_Roussiere_4.jpg","../image/image_15/15_Nubieu_Roussiere_5.jpg"]},"Consult_chateau_formulaireb2c0":{"id":"Consult_chateau_formulaireb2c0","dept":"15","canton":"Vic sur Cère","commune":"Saint-Simon","nom":"Oyez","type":"Maison forte","periode":"XV","histoire":"OYEZ,  le château de la Mothe, date des XIVe et XVe siècles, il a été restauré au XVIIIe et XIXe siècle.  Antoine de La Roque était seigneur d'Oyez, son fils Pierre de La Roque, seigneur d'Oyez, épouse Gaillarde de Caissac, dame de Niossel, à Marmanhac et d'Oyez, fille de Raymond,  et de Marguerite de Rozières, seigneur château de Sedaignes et de  Messac.  Le château actuel a été en partie reconstruit au milieu du XVIe siècle par Guillaume Cambefort, conseiller au présidial d'Aurillac, qui a épousé le 13 septembre 1543 Marguerite de La Roque, dame de Niossel, héritière de Roquenatou en 1579. À partir de la fin du XVIIIe siècle, le château appartient à la famille Peytavi, dont une branche avait pris le nom de La Salle. Antoine Peytavi, avocat né à La Salle, a épousé Anne Clary, fille de Joseph Clary, dit de La Bourgade  et de Catherine Robbert-Lablanche, qui lui a donné une fille : Marie-Thérèse Peytavi de Lasalle, mariée à Aurillac en 1781 avec Jean-Pierre Lespinats de Broussac, fils d'autre Jean-Pierre, seigneur de Broussac, consul d'Aurillac, conseiller de l'hôtel-de-ville, et de Gabrielle Delzons. Marie-Thérèse Lespinats de Boussac, leur fille, Marie-Marguerite Bessière en 1809, sa fille, épouse en 1824 Louis Delzangles. Puis  passa  à la famille Delzangles, qui a donné un maire à Saint-Simon.","architecture":"Ce château d'Oyez  contrôlait le passage dans la vallée de la Jordanne. Près du village,  manoir, autrefois appelé la Salle d'Oyez, qui comprend un bâtiment rectangulaire avec une petite tourelle octogonale en encorbellement et une vieille tour.  Les visiteurs pourront découvrir de véritables petits trésors architecturaux, à l'image des fenêtres moulurées qui s'ouvrent à chaque étage du corps de logis, de la façade située entre les deux tours et ornées de croisées sculptées ou de la superbe porte du XVIe siècle du rez-de-chaussée. A l'intérieur, la visite recèle encore bien d'autres joyaux.","habitants":"Famille de Pierre de La Roque\r\n        \r\n        \"","divers":"Maison forte d'Oyez à Saint-Simon","gps":"","images":["../image/image_15/15_Oyez_1.jpg","../image/image_15/15_Oyez_2.jpg","../image/image_15/15_Oyez_3.jpg","../image/image_15/15_Oyez_4.jpg","../image/image_15/15_Oyez_5.jpg"]},"Consult_chateau_formulaire7281":{"id":"Consult_chateau_formulaire7281","dept":"15","canton":"Saint-Paul des Landes","commune":"Rouffiac","nom":"Pachevie","type":"Château","periode":"XVI","histoire":"PACHEVIE (la),  sous la Restauration la chambre dite de \"Madame\", fut transformée en salon de compagnie et dotée du dessus de porte en papier peint. Il a appartenu à Robert de Tournemire,  La succession de Jean Guiniard-d'Alhignac passa à la famille Chapel de La Salle, seigneur de La Pachevie, qui possédait Bezaudun en 1739 et 1780.","architecture":"La Pachevie, édifice à l'architecture caractéristique des châteaux cantaliens qui allient conception classique et utilisation de matériaux traditionnels locaux. Le fief est mentionné pour la première fois en 1379. L'édifice présente une structure médiévale du XIVe-XVe siècle, une chapelle du début du XVIIe et un corps de logis réaménagé au XVIIIe siècle après un incendie. A l'origine le château se composait d'un donjon entouré d'une enceinte fortifiée, logis central et trois tours. Au XVIIIe siècle, un incendie détruisit une partie du donjon qui perdit sa tourelle d'escalier circulaire en façade, et son couronnement de mâchicoulis. L'avant corps central, les percements et les boiseries intérieures correspondent aux reconstructions de cette époque.","habitants":"Famille de Chapel de La Salle\r\n        \"","divers":"Château de la Pachevie à Rouffiac","gps":"","images":["../image/image_15/15_Pachevie_1.jpg","../image/image_15/15_Pachevie_2.jpg","../image/image_15/15_Pachevie_3.jpg","../image/image_15/15_Pachevie_4.jpg","../image/image_15/15_Pachevie_5.jpg","../image/image_15/15_Pachevie_6.jpg","../image/image_15/15_Pachevie_7.jpg"]},"Consult_chateau_formulaireafff":{"id":"Consult_chateau_formulaireafff","dept":"15","canton":"Mauriac","commune":"Fontanges","nom":"Palmont","type":"Forteresse","periode":"XV","histoire":"PALMONT, en 1704, Françoise Thoury, fille de Bonaventure Thoury sieur de Palmont et Hélips chevalier, arrière-petite fille d'Antoine, épousa Gabriel de Mossier, sieur de Fumel, ancien mousquetaire du Roi. Le 21 février 1731, lors de l'incendie du bourg de Fontanges, des enfants de la localité furent mis à l'abri au château Jean de Mossier mousquetaire du roi, de la 2e compagnie,  le fils de Gabriel  habitait Palmont en 1741. En 1743, sa soeur, Claudine Françoise de Mossier convola avec Pierre Salvaigne de Lamargé. Vendu  à la Révolution, Palmont fut racheté par madame de Lamargé, née Mossier. Les propriétaires suivants furent J. B. Antoine de Lamargé, conseiller à la Cour des Aides de Clermont et maire de Fontanges. Suivi de son neveu, Louis de Lamargé. Maître Raymond Chassagne a ensuite acheté le château, qui a été plusieurs fois vendu depuis.","architecture":"Palmont, donjon à mâchicoulis et chemin de ronde construit en 1480 par Guy de Fontanges sur les ruines d'un château plus ancien. De plan rectangulaire, à quatre niveaux toits en croupes avec lucarnes la demeure est flanquée d'une tour circulaire contenant l'escalier au centre de la face Est, et d'une deuxième tour partiellement engagée à l'extrémité Est de la façade nord, les tours possèdent des mâchicoulis et chemin de rondes. Chacun des cinq niveaux comprend une salle donnant sur l'escalier, une pièce située dans la tour nord. Des boiseries ornent la pièce du deuxième étage. Au XIXe siècle, construction d'un petit château contre le donjon.","habitants":"Famille d'Antoine de Lamargé\r\n        \"","divers":"Château de Palmont à Fontanges","gps":"","images":["../image/image_15/15_Palmont_1.jpg","../image/image_15/15_Palmont_2.jpg","../image/image_15/15_Palmont_3.jpg","../image/image_15/15_Palmont_4.jpg"]},"Consult_chateau_formulaire4a81":{"id":"Consult_chateau_formulaire4a81","dept":"15","canton":"Saint-Paul des Landes","commune":"Parlan","nom":"Parlan","type":"Château vestiges","periode":"XII-XVII","histoire":"PARLAN, la famille de la Garde de Saignes vécut pendant quatre siècles au château. Elle tire son nom dune terre située près de Tulle. De cette famille sortirent plusieurs prélats illustres, dont Guillaume de la Garde, archevêque dArles, à qui lon doit davoir ramené les reliques de Saint- Césaire à Maurs.  Fixé en 1364 à Argentat, dont les descendants sétablirent en Quercy et en Auvergne. Elle produisit des hommes marquants, parmi lesquels Pierre de la Garde, ambassadeur de François Ier en Pologne, en Ecosse et plus tard, au Portugal. Il eut pour fils Louis, Comte de Saignes et Baron de Parlan, Rouziers, Reilhac  choisi par Henry IV, pour représenter après la paix religieuse, le parti catholique du Quercy. Son fils, René de la Garde, gentilhomme du Roi, reprit la ville de Maurs aux protestants. Le château possédait alors une garnison de dix hommes darmes. Cest Jean-Marc de la Garde de Saignes, qui, né au château de Parlan en 1743, considérant quil était inhabitable après la Révolution, décida de se fixer au château de Lestrade à Maurs, doù sa femme était originaire. Arrêté à Toulouse, emprisonné à Aurillac, le tribunal révolutionnaire de Paris avait ordonné sa remise en liberté après des mois de détention. Il semble quensuite, le château nait plus été entretenu. Il deviendra ensuite la propriété du docteur Darses.","architecture":"La commune de Parlan, limitrophe du Lot, porte le nom de son fondateur gallo-romain. Située dans un pays de granit, prairies et cultures y alternent avec les étendues boisées. Ce petit bourg accueillant, ne conserve du puissant château des comtes de Saignes, que les ruines dune tour ensevelie sous la végétation, à proximité de léglise. Petit château à Parlan composé d'un corps de logis à trois niveaux accolé de pavillon rectangulaire de quatre niveaux aux extrémités toits en croupes.\r\nNon loin de Parlan (4 kms), la visite commentée par les propriétaires du château de Bessonies, remanié au XIXe siècle (où se cachait le Maréchal Ney, lorsquil fût arrêté en 1815) mérite un détour, de plan rectangulaire à trois niveaux pavillon d'entrée légèrement saillant plein cintre avec lucarne en fronton, l'édifice possède une tour sur l'angle à droite crénelées avec chemin de rondes et une tourelle sur angle gauche toutes deux à toitures en poivrières.","habitants":"Famille de  Pierre de la Garde\r\n        \"","divers":"Vestige d'une tour de l'ancien château  et château de la Bessonies à Parlan","gps":"","images":["../image/image_15/15_Parlan_1.jpg","../image/image_15/15_Parlan_2.jpg","../image/image_15/15_Parlan_3.jpg"]},"Consult_chateau_formulaire4ede":{"id":"Consult_chateau_formulaire4ede","dept":"15","canton":"Saint-Flour","commune":"Paulhac","nom":"Paulhac_Cantal","type":"Château","periode":"XIV-XVI","histoire":"Sept châteaux à Paulhac, deux châteaux de Belinay du XIVe siècle, le Bracon, le Chambon, le Jarry, le Paulhac et le Turlande  du Xe siècle.                                                                                    PAULHAC Le fief est recensé depuis 1251, date à laquelle on connaîtra les seigneurs d'Anteroches de Combrelles de Peyrusse,  famille toute militaire et très distinguée, dont le plus éminent représentant, lors de la bataille de Fontenoy, dira, d'après Voltaire : « Messieurs les Anglais, tirez les premiers ». Elle passera, ensuite aux mains des Chambon d'Anteroches vers 1285. En 1478, elle sera vendue à Jean Traverse, fils de Guillaume, médecin privé du roi Louis XI, dont la famille la gardera jusqu'à la Révolution. Saisie puis vendue comme bien national , elle sera déchue en bien agricole puis abandonnée au début du XXe siècle.\r\n BELINAY, de la famille des de Bonnafos de Belinay de 1680 à 1840, ces encombrements dans cette partie de la vallée, ont déterminé le gouvernement à construire, le 29 juin 1841, Bélinay en succursale. Monsieur Fareyre, propriétaire du château de Bélinay, en donna la chapelle, qui est sous \" linvocation de Saint Vincent de Paul \".","architecture":"Le château de Bélinay du XVe siècle. Le chapelle du château du Chambon. Le château de Bracon, motte féodale, et vestiges. Le château de Jarry de plan carré avec tour ronde et carrée l'ensemble fortifié de mâchicoulis, toitures en croupes, chapelle fortifiée.                                 Le château de Paulhac XIIIe siècle, XVIe siècle de plan rectangulaire à trois niveaux avec tour ronde à mâchicoulis.  Bélinay   Le joyau de la vallée de lEpie, hameau et château dont larchitecture dénote le XIVe siècle. Il a plusieurs tours, dont lune renferme lescalier. Il était surmonté par des meurtrières et des mâchicoulis. Il est situé à mi-coteau et très rapproché du Plomb du Cantal. Sa situation est si froide que les neiges lencombrent parfois avec une telle quantité, que, pour communiquer de la cour avec les étables, on est obligé de faire un souterrain dans la neige et que les habitants ne peuvent sortir que par une croisée du premier étage.","habitants":"Famille de  Maurice Colosetti  \r\n        \"","divers":"Château de Paulhac de Belinay et de Jarry","gps":"","images":["../image/image_15/15_Paulhac_Cantal_1.jpg","../image/image_15/15_Paulhac_Cantal_2.jpg","../image/image_15/15_Paulhac_Cantal_3.jpg","../image/image_15/15_Paulhac_Cantal_4.jpg","../image/image_15/15_Paulhac_Cantal_5.jpg","../image/image_15/15_Paulhac_Cantal_6.jpg","../image/image_15/15_Paulhac_Cantal_7.jpg","../image/image_15/15_Paulhac_Cantal_8.jpg"]},"Consult_chateau_formulaire4eac":{"id":"Consult_chateau_formulaire4eac","dept":"15","canton":"Vic sur Cère","commune":"Polminhac","nom":"Pesteils","type":"Forteresse","periode":"XIII-XV","histoire":"Sept châteaux à Polminhac, celui de la Cavade  du XVIIe siècle, de Clavières du XIXe siècle (voir article), des Huttes (voir article), de Montlogis du XIXe siècle (voir article), de Pesteils (voir article), de Ribes du XVIe siècle et de Vixouze ( voir article).                  CAVADE,  N. Pierre de Lauremon en était seigneur au milieu du XVIe siècle et y faisait sa résidence. Guillaume d'Auzolles et Antoinette, sa sur, le possédaient en 1669. Guillaume d'Auzolles ayant épousé Claudine de Chazelles ; cette dernière hérita de son mari et donna par testament cette seigneurie, en 1071, à Géraud de Fontanges. Gaspard de Scorailles épousa Marie, fille de Géraud, et devint seigneur de la Cavade en 1695. Après lui, Françoise de Scorailles en prit possession ; il passa par le mariage de Madeleine, sa fille et son héritière, à Nicolas-Henri, comte de Briay, baron de Landres, qui devint seigneur de la Cavade en 1753, la comtesse Roger-Ducos possède aujourd'hui la Cavade.                PESTEILS, la seigneurie de Polminhac, avec son château, cité  en 1219  le fief possédé par les familles de Foulholes et de Tessières  fit partie de la donation testamentaire d'Henri 1er,  en 1219  au comte de Rodez, à Guibert, son fils , sous la réserve de l'hommage au vicomte de Carlat. En 1283, on trouve Raymond de Blanchefort, co-seigneur de Polminhac. Rigaud de Montamat qui avait épousé Benoite de Foulholes possède  la seigneurie de Polminhac,  commença le nouveau château vers 1431. Jean, son fils, y mit la dernière main après la guerre des anglais, Jacques de Montamat n'eut qu'une fille nommée Anne, qui réunit tous les grands biens de sa famille et les porta en dot, en 1510, à Guy de Pesteils, seigneur de Fontanges. Celui-ci devint ainsi seigneur de Pesteils et de Polminhac , leur fils Claude Pesteils, épousa  en 1547 Camille Caraccioli fille du grand sénéchal du royaume de Naples, de ce mariage naquit Jean Claude  qui épousa en 1574 mademoiselle de Lévis-Caylus.  En 1608 par alliance de Camille  fille de Jean Claude de Pesteils avec Charles de Cassagnes de Beaufort de Miramon, gentilhomme de la chambre du roi. A la Révolution confisqué comme bien national, pillé en 1793  puis partagé entre divers propriétaires et racheté  en 1841 par les Miramon-Pesteils, le château  appartenant à la même famille depuis le XIIIe siècle,  est la propriété depuis 1608 de la famille de Cassagne de Miramon Pesteils qui l'habite encore aujourd'hui.","architecture":"Montlogis, château dominant la rive gauche de la Cère. Il est environné de prairies et de bois.  De la famille de Teissières il passa à celle de Chaunac, originaire du Quercy, qui prit son nom; il appartient aujourd'hui à M. Maurice Bouygues, conservateur des hypothèques à Aurillac, qui l'a restauré et embelli. La demeure actuelle, restaurée au XIXe siècle, conserve son plan-masse de 1811 avec un pigeonnier en forme de tour rectangulaire. Deux moulins alimentés par un étang existaient déjà en 1811 au nord-ouest du logis.                                                                                 Pesteils (XIII-XV-XVIIe siècles). Perché sur son roc escarpé à 750 mètres d'altitude, l'ancienne forteresse de Polminhac domine fièrement le vallée de la Cère,  de plan quadrangulaire du XVe siècle il est dominé du côté de l'attaque par un donjon carré haut de 35 mètres couronné de mâchicoulis,  orienté dont les cinq  étages sont percés de fenêtres, le donjon imposant symbolise toute la majesté du château de Pesteils et évoque le Moyen-Age dans sa plus rude expression.  L'ensemble est  flanquées de tours rondes sur angles.  Pendant la deuxième moitié du XVIIe siècle, le corps de logis et le pavillon d'angle ont été refaits, à la mode troubadour, par l'architecte Émile Lemaigre au début du XIXe siècle; tous les projets ont été conservés. Au XIXe siècle leurs décors intérieurs ont été remaniés dans le goût néo-gothique puis réaménagés au début du XXe siècle.","habitants":"Famille de  Guy de Pesteils\r\n        \"","divers":"Château de Pesteils à Polminhac","gps":"","images":["../image/image_15/15_Pesteils_1.jpg","../image/image_15/15_Pesteils_2.jpg","../image/image_15/15_Pesteils_3.jpg","../image/image_15/15_Pesteils_4.jpg","../image/image_15/15_Pesteils_5.jpg","../image/image_15/15_Pesteils_6.jpg","../image/image_15/15_Pesteils_7.jpg"]},"Consult_chateau_formulaire1e37":{"id":"Consult_chateau_formulaire1e37","dept":"15","canton":"Murat","commune":"Peyrusse","nom":"Peyrusse_Cantal","type":"Vestiges","periode":"XV","histoire":"PEYRUSSE, ruines à  Aubejac du château des famille de Gouzel et d'Anteroches du XVe siècle,  appartenait en 1242 à  Eymeri de Roche-Chancel. Dalmas Blan était seigneur de Peyrusse en 1271. De cette famille il passa dans celle de Jaffinel, qui en jouissait en 1300. La famille de Jaffinel était fort ancienne;  Jaubert Jaffinel maria sa fille Alix, en 1390  à Guy de Montclar, celui-ci fit saisir le château et ses revenus. La famille de Gouzel possédait Peyrusse vers 1450.  La seigneurie de Peyrusse passa dans la suite, par succession, dans la famille Duprat, vers 1540. Les religionnaires s'emparèrent de Peyrusse vers 1553 ; mais ils en furent promptement évincés. Thomas et Pierre Duprat vendirent la terre de Peyrusse, vers 1610, à Jean de Brives.","architecture":"Peyrusse-le-Château était un fort sur un rocher escarpé, dont les flancs à pic lui servaient de fossé; il dominait le vallon du ruisseau de Chabasseyre. La principale tour était fort élevée et construite en pierre taillée.Comme le château avait beaucoup souffert lors des guerres de religion, Jean le fit restaurer en 1620. Le devant du château et la maison attenante furent remis à neuf, les mâchicoulis et corps de garde rétablis.  Gaec du château d'Aubejac, groupement agricole d'exploitation en commun.","habitants":"Famille de Gouzel\r\n        \"","divers":"Vestiges du château de Peyrusse à Aubejac","gps":"","images":["../image/image_15/15_Peyrusse_Cantal_1.jpg","../image/image_15/15_Peyrusse_Cantal_2.jpg","../image/image_15/15_Peyrusse_Cantal_3.jpg","../image/image_15/15_Peyrusse_Cantal_4.jpg","../image/image_15/15_Peyrusse_Cantal_5.jpg"]},"Consult_chateau_formulaired348":{"id":"Consult_chateau_formulaired348","dept":"15","canton":"Saint-Flour","commune":"Pierrefort","nom":"Pierrefort_Cantal","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Pierrefort, la Chassagne, le Meynial, le Malabec ruiné, et le  Foulio du XVIe siècle.                                      CHASSAGNE du XIXe siècle, au siècle dernier, le château était une ferme école. Elle bénéficiait de la proximité de la voie ferrée qui reliait Aurillac à Murat.\r\nMEYNIAL.  Le château du Meynial, situé en bordure ouest de la commune de Pierrefort, fut construit au XVe siècle, il était la propriété d'Antoine de Brezons au début du XVIe siècle. Le château fut acquis au XIXe siècle par le major Champagne.                          Le FOULIO  et  MALABEC pas d'information historique.","architecture":"La Chassagne, au siècle dernier, était une ferme école. Charles Louis Napoléon Bonaparte ayant le souhait de faire de la France la 1ère puissance agricole, fut l'instigateur des fermes écoles. La ferme école de la Chassagne ouvrit ses portes en 1868. Un corps de ferme fut rattaché au château lors de la création de cette école. Suite à une enquête mandatée par le ministère de l'agriculture, en 1876, l'école de la Chassagne fut fermée. Le parc du château est classé Jardin remarquable, notament l'allée cavalière, le bassin et la clôture de jardin.                                                                                Le Meynial du XVIIe siècle, corps de logis flanqué de deux tourelles  et colombier.                                                                 Le Foulio du XV Ie siècle, corps de logis rectangulaire à deux niveaux et attiques  avec tour d'escalier au milieu de la façade.","habitants":"Famille d'Oradour\r\n        \"","divers":"Château de la Chassagne, de Fonlio et du Meynial","gps":"","images":["../image/image_15/15_Pierrefort_Cantal_1.jpg","../image/image_15/15_Pierrefort_Cantal_2.jpg","../image/image_15/15_Pierrefort_Cantal_3.jpg","../image/image_15/15_Pierrefort_Cantal_4.jpg","../image/image_15/15_Pierrefort_Cantal_5.jpg"]},"Consult_chateau_formulaire28b8":{"id":"Consult_chateau_formulaire28b8","dept":"15","canton":"Saint-Flour","commune":"Pierrefort","nom":"Pierrefort_Fort","type":"Château","periode":"XII","histoire":"PIERREFORT, c'est entre 1200 et 1250 exactement, que la famille de Pierrefort, qui est une branche de
