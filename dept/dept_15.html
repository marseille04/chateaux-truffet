dues par les actuels propriétaires.","habitants":"Famille d'Antoine Apchin\r\n        \r\n        \"","divers":"Château de Clavières à Velzic","gps":"","images":["../image/image_15/15_Clavieres_Velzic_1.jpg","../image/image_15/15_Clavieres_Velzic_2.jpg"]},"Consult_chateau_formulaire9781":{"id":"Consult_chateau_formulaire9781","dept":"15","canton":"Vic sur Cére","commune":"Vic sur Cére","nom":"Comblat","type":"Château","periode":"XV","histoire":"COMBLAT,   en 1343, Gaucelin seigneur de Viescamp, qui possède les forts de Valeyrane et de Lussat à Vic, construit le château de Comblat, il épouse Helis de Montpeyroux, et n'a qu'une fille  Hélis de Viescamp, dame de Comblat, qui épouse Géraud Palach.  Cette famille, qui est originaire de Palach à Laroquebrou, Pierre de Palach, seigneur de Comblat et co-seigneur de Cols, épouse Flore de Nozières, et ils ont deux filles : Geralde de Pallat, dame de Comblat, qui épouse Guiral de Vixouze, et fait la souche des seigneurs de Vixouze, Jeanne de Palach, dame de Cols, épouse Jean de Lavaissière.  En 1439 Bernard d'Armagnac obtient l'autorisation de construire un nouveau château correspondant au château actuel.  Raymond de Vixouze  épouse en 1507 Soubeyrane de Beaufort qui lui donne deux filles : Antoinette de Comblat, instituée héritière universelle en 1561, qui avait épousé en 1541 Jean Ier de Cabannes, capitaine aux gardes françaises. Famille de Cabanes-Comblat Jean II de Cabanes-Comblat,  capitaine aux Gardes françaises, Antoine de Cabanes-Comblat, son fils, épouse le 6 août 1610 Catherine d'Apchier, François de Comblat, son fils, capitaine au Régiment de Coëtlongon, épouse en 1700 à Aurillac Philiberte Colinet, En 1716, Marie-Françoise de Cabanes Comblat épouse Joseph François de La Carrière,  ils eurent deux  garçons militaires et Amelie de Lacarrière de Comblat, qui rachète Comblat et se marie en 1811 avec Séraphin-François-Gabriel de la Baume Pluvinel (1774-1853), qui reçoit le domaine, Aymar de la Baume (1860-1938), astronome membre de l'Académie des Sciences et neveu du précédent, hérite de Comblat en 1896, à la mort de son oncle. Geneviève de la Baume Pluvinel, fille d'Aymar de la Baume, cède le château de Comblat en 1949 au département du Cantal en vue de l'installation d'abord d'une école ménagère, puis d'un collège agricole féminin.","architecture":"Château de Comblat, construit au XVe siècle sur l'ancien fort de Vallayrane. Le château, sur le petit côté du logis rectangulaire à deux niveaux et attiques  avec lucarnes toitures à la Mansart, le donjon à cinq niveaux quadrangulaire flanqué  d'échauguettes aux angles  toitures en poivrières.  remanié au XVIe siècle, auquel a été accolée au début du XVIIIe siècle une aile sud de style classique, dotée de décors intérieurs de la même époque. Joseph François de La Carrière, vice bailli de la haute Auvergne, qui fait élever l'aile d'habitation à toit brisé, datée 1740 sur la girouette. C'est probablement à ce moment-là que furent bâties les dépendances : chapelle, pavillon de jardin, communs et le parc avec ses terrasses et son bassin.","habitants":"Famille de  Gaucelin\r\n        \"","divers":"Château de Comblat à Vic-sur-Cère","gps":"","images":["../image/image_15/15_Comblat_1.jpg","../image/image_15/15_Comblat_2.jpg","../image/image_15/15_Comblat_3.jpg"]},"Consult_chateau_formulairefa98":{"id":"Consult_chateau_formulairefa98","dept":"15","canton":"Ydes","commune":"Vebret-Antignac","nom":"Couzan_Cantal","type":"Château","periode":"XV","histoire":"COUZAN,   en 1435 Son dernier descendant mâle, Antoine de Currières en faveur de sa sur Marguerite, épouse de Gabriel de Chalus, seigneur de Maurianges, qui devint à son tour baron de Couzan et forma la souche des Chalus de Couzan , qui  reconstruit le château,  la baronnie de Couzan fut plus tard échangée par les descendants de Pierre de Gibien. Charles de Chalus succéda à Maurice dans la propriété de la baronnie de Couzan. Il mourut, en 1589, sans enfants, Maurice de Chalus, fils de François, seigneur du Monteil. Charles mourut en 1622, et, ne laissant pas non plus de descendance mâle, transmit la baronnie de Couzans à son frère François, seigneur de Marchai et du Colombier. Cette terre passa ensuite dans la maison de Fontanges, en 1705, par le mariage d'Antoinette de Chalus avec Charles de Fontanges, fils de Pierre-Hugues de Fontanges, seigneur de la Clidelle, qui a été la souche du rameau de cette maison, connue sous le nom de Fontanges de Couzan.  En 1896, la famille de Vaublanc fait reconstruire le château sur les bases de l'ancien en conservant la tour du XVe siècle. La tradition attribue ces travaux à l'architecte Edme de Vaublanc, originaire de Bourgogne. Parmi les dépendances qui restent, et qui ont pu être aperçues, figurent deux logis accolés portant les dates de 1770 et de 1828, un logis remanié portant la date de 1876, une grange-étable antérieure au cadastre de 1827, un fournil avec logement, une resserre de jardin et une croix portant la date de 1897.","architecture":"Le château de Couzan  en 1435 est ruiné et reconstruit, il subsiste de cette époque une tour carrée construite sur un roc. Au XVIIIe siècle, outre la tour, le château comprend deux corps de logis  de plan rectangulaire à trois niveaux avec lucarnes, accolé d'une tour ronde d'escalier à mâchicoulis et chemin de ronde,  échauguettes en angles et une chapelle. Ces bâtiments délimitent une cour fermée par un portail surmonté d'un corps de garde comporte un donjon datant de la fin du Moyen-Age, avec mâchicoulis. Le corps de logis a été entièrement remanié dans le style néo-gothique au XIXe siècle , la façade du château est ornée des armes des familles de Fontanges, du Fresne de Kerlan et de Vaublanc.  La tour de la chapelle en demi hors-oeuvre engagée dans la tour carrée sont couvertes d'une croupe ronde. La tourelle d'angle et la tour ouest en demi hors-oeuvre du château XIXe ont un toit conique.","habitants":"Famille de Charles de Chalus\r\n        \"","divers":"Château de Couzan à Antignac","gps":"","images":["../image/image_15/15_Couzan_Cantal_1.jpg","../image/image_15/15_Couzan_Cantal_2.jpg","../image/image_15/15_Couzan_Cantal_3.jpg","../image/image_15/15_Couzan_Cantal_4.jpg","../image/image_15/15_Couzan_Cantal_5.jpg","../image/image_15/15_Couzan_Cantal_6.jpg","../image/image_15/15_Couzan_Cantal_7.jpg","../image/image_15/15_Couzan_Cantal_8.jpg"]},"Consult_chateau_formulairee977":{"id":"Consult_chateau_formulairee977","dept":"15","canton":"Maurs","commune":"Saint-Etienne de Maurs","nom":"Devèze","type":"Château","periode":"XVI","histoire":"Quatre châteaux à saint-Etienne de Maurs, celui de St-Etienne vestiges du XIIIe siècle , de Murat, la Guiole  et de Naucaze, pas d'info pour ces deux derniers, une association est crée pour la sauvegarde de Naucaze.                                                              DEVEZE, la châtelleraie, dont la date de construction reste inconnue, appartenait en 1579 à Pierre de Freyne. Son fils Gabriel qui épouse Anne de Naucaze en 1596 apporte en dot la moitié des biens meubles et immeubles de ses parents tandis quAnne apporte une somme dargent. En 1649, Louis de Freyne et François Guillaume des Ondesse se marient. De leur union, naîtront Françoise, Anne et François-Bertrand. Le 2 janvier 1685, leur fils recevra tous les droits immobiliers et les biens de la famille des Ondes hormis le domaine de Laguiac en Rouergue. François-Bertrand consent à la donation de sa mère en 1696 mais refuse lhéritage de son père pour un motif que lon ignore. Louis des Ondes, son fils aura une fille de son mariage avec Marianne Dommare, qui épousera François de Vilien.  En 1751, les revenus de la propriété sauf le château, la grange et un pré seront affermés à Antoine Bouyssou. A son décès, le château reviendra à François-Bertrand des Ondes. A la Révolution, confisqué comme bien national et dévasté en 1793. À ce moment, le domaine de la Devèze est vendu aux enchères puis racheté par la famille de Montarnal. Enfin, en 1872, le château devient la propriété de Monsieur Roudergues et restera dans cette famille pendant prés de 120 ans.","architecture":"Le château dit la Châtelleraie aujourd'hui chambres d'hôtes se compose d'un corps de logis rectangulaire à trois niveaux toit en croupes avec lucarnes  accolé d'une tour ronde d'escalier en façade, toit en poivrière.  Murat a appartenu, en 1243, à la famille de Gironde, nous ne possédons pas d'historique sur ce château perché sur un éperon barré, qui aurait été construit au XIIIe siècle, situé sur la commune de Saint Etienne de Maurs, il subsiste un beau logis. Il aurait appartenu au vicomte de Peyronnenq au XVIIIe siècle. Pendant la Révolution, le propriétaire donna l'autorisation d'enlever les girouettes et d'abattre les tours dans une vaine tentative pour empêcher un pillage complet. Mais le 25 mars, le château fut pillé et partiellement détruit.  corps de logis rectangulaire à trois niveaux toit en croupes avec lucarnes  accolé d'une tour ronde d'escalier en façade, toit arasés.","habitants":"Famille de Pierre de Freyne\r\n        \r\n        \"","divers":"Château de la Châtelleraie  à Devèze","gps":"","images":["../image/image_15/15_Deveze_1.jpg","../image/image_15/15_Deveze_2.jpg","../image/image_15/15_Deveze_3.jpg","../image/image_15/15_Deveze_4.jpg"]},"Consult_chateau_formulairefed7":{"id":"Consult_chateau_formulairefed7","dept":"15","canton":"Vic sur Cère","commune":"Jou-sous-Monjou","nom":"Escalmels","type":"Manoir","periode":"XV","histoire":"ESCALMELS, ce château était la résidence des seigneurs de Montjou avant leur établissement à Cropières, sur la commune de Raulhac. Le propriétaire d'alors, Antoine de Montjou, avait été contraint à cette vente du fait de ses nombreuses actions de brigandages dans la région. Ayant été pris dans les environs de Carlat, il fut jugé et condamné à avoir la langue coupée comme parjure, le poing droit comme batteur des sergents et enfin à être décapité.  En effet les seigneurs de Montjou résidaient à Escalmels depuis au moins le XIIIe siècle notamment  Bertrand de Montjou, co-seigneur du château de Montjou avec Ghy de la Bueil, en 1266, qualifié en 1277 de chevalier, seigneur d'Escalmels.  Les Fontanges des seigneurs de La Salle l'acquérirent en 1541, Antoine de Fontanges, seigneur de la Salle, acquéreur d'Escalmels, y demeure en 1550. En 1627, Jacques de l'Arbre devient seigneur par achat de la seigneurie d'Escalmels. Michel de l'Arbre est seigneur des lieux d'Escalmels et de Jou, en 1638. Son fils Louis de l'Arbre est, en 1656, seigneur d'Escalmels, de Jou et de Las Doulou. Au XVIIIe siècle, Louis de l'Arbre tenait  en franc fief du comté de Carlat le château et le domaine d'Escalmels avec toute sa justice. La seigneurie passa ensuite à François de Lastic en   1774.","architecture":"La date de construction d'Escalmel est inconnue, la disposition du plan et les profils permettent de penser que la  partie ancienne du logis et la tour d'escalier qui en dessert les niveaux remontent à la fin de l'époque gothique: fin XVe siècle ou premières années  du XVIe siècle. Mais il paraît vraisemblable de supposer l'existence d'un château antérieur. Manoir du XV-XVIe siècle à deux étages  avec une poivrière à chaque angles et une tour  a vis en façade,  le château fut réparé à cette période. La partie droite du logis porte la date  de 1842, corps de logis rectangulaire à deux niveaux toit en croupes avec lucarnes, accolé d'un deuxième corps de logis en travers  à deux niveaux dont un compris dans la toiture avec lucarne; vestiges d'une deuxième   tour de plan circulaire; la grange-étable porte la date de 1865. Fortement remanié au milieu du XIXe siècle.","habitants":"Famille d' Antoine de Montjou\r\n        \"","divers":"Manoir d'Escalmels à Jou sous Monjou","gps":"","images":["../image/image_15/15_Escalmels_1.jpg","../image/image_15/15_Escalmels_2.jpg","../image/image_15/15_Escalmels_3.jpg","../image/image_15/15_Escalmels_4.jpg"]},"Consult_chateau_formulaire578b":{"id":"Consult_chateau_formulaire578b","dept":"15","canton":"Mauriac","commune":"Escorailles","nom":"Escorailles","type":"Vestiges","periode":"XI-XIII","histoire":"ESCORAILLES, le site fut abandonné et le château féodal se fixa plus haut où il donna naissance au village actuel vers le XIe siècle. L'aîné alla à La Vigne, le cadet fit souche des seigneurs de Roussilhe. Le château d'Escorailles, où est mentionnée la famille de Scorrailles dès le XIIe siècle, se distingue de cette enceinte. Le site de l'enceinte fortifiée fut abandonné, et le château féodal se fixa plus haut où il donna naissance au village actuel d'Escorailles vers le XIe siècle. À la suite de plusieurs siècles d'indivision, le château menaçant ruine, la forteresse est abandonnée au milieu du XVIe siècle au profit du château de La Vigne que la famille de Scorraille fait construire non loin de là sur un ancien corps de ferme, à Ally.","architecture":"Les ruines de l'enceinte fortifiée 'élèvent au nord-est et en contre bas du village d'Escorailles  sur un éperon rocheux découpé par un profond méandre de l'Auze, endroit  nommé maintenant la \"Trizagues\" . on peut encore distinguer plusieurs formes de retranchements. Aujourd'hui les ruines laissent encore apparaître d'énormes pans de murailles, les anciennes fortifications qui formaient un parallélogramme rectangle dont chaque angle était vraisemblablement terminé par une tour. Une tour est encore en bon état. L'enceinte fortifiée qui date du Haut Moyen-Age a été classée monument historique par arrêté du 8 septembre 1978.","habitants":"Famille de Scorraille \r\n        \"","divers":"Vestiges du château d'Escorailles","gps":"","images":["../image/image_15/15_Escorailles_1.jpg","../image/image_15/15_Escorailles_2.jpg","../image/image_15/15_Escorailles_3.jpg"]},"Consult_chateau_formulaire3c29":{"id":"Consult_chateau_formulaire3c29","dept":"15","canton":"Saint-Flour","commune":"Paulhenc","nom":"Estresse","type":"Maison forte","periode":"XIII-XVI","histoire":"PAULHENC, village et château d'Estresse sur le ruisseau de Théron. Il appartenait en 1708 à François de L'Éparvier, seigneur de Paulhenc, dont le fils Charles avait épousé Jeanne de Sistrières, dame de Las Douloux.\r\nDemeure de Fontanges, XVIe siècle, appartenait à Annet de Fontanges, apostolique, prieur de Paulhenc, seigneur de Las Douloux, Raulhac et Puech Mourier.\r\nAncien château de Turlande, importante chatellenie qui relevait des vicomtes de Carlat et dont il ne reste que des vestiges. Le duc Pierre de Bourbon, devenu vicomte de Carlat et de Murat, fut seigneur de Turlande, ainsi que ses descendants. Cette seigneurie suivit les phases de la vicomté jusqu'en 1643, où elle fut comprise dans l'apanage du prince de Monaco. Importante châtellenie qui relevait des vicomtes de Carlat et dont il ne reste que des vestiges. C'est là que serait né saint -Robert, le fondateur de La Chaise-Dieu. \r\nESTRESSE,   propriété des de Ribier de 1400 à  1600 . Il appartenait en 1708 à François de L'Éparvier, seigneur de Paulhenc, dont le fils Charles avait épousé Jeanne de Sistrières, dame de Las Douloux.","architecture":"Estresse, un petit donjon a d'abord été construit au XIIe ou XIIIe siècle selon le modèle des tours carrées, fréquentes dans le Brivadois, la Haute Auvergne et le Rouergue, et caractérisées par leurs pièces uniques sur deux ou trois niveaux voûtés en berceau et accessibles par un escalier ou une échelle. Cette construction a été englobée dans la maison forte carrée avec tourelle d'escalier, bâtie au XIVe ou XVIe siècle. Vers 1650, un logis flanqué d'une grosse tour ronde fut construit à l'est, isolément du premier. Au cours du XVIIIe siècle, les deux constructions furent reliées par un corps de bâtiment rectangulaire à trois niveaux, tandis qu'était démolie la tourelle d'escalier. Les intérieurs témoignent des différentes époques. La tour ronde conserve des traces de peintures murales du XVIIe siècle. La salle à manger et la salle commune présentent des aménagements lambrissés du XIXe siècle.","habitants":"Famille de François de L'Éparvier                                                         Famille de Ribier\r\n        \"","divers":"Maison forte d'Estresse à Paulhenc","gps":"","images":["../image/image_15/15_Estresse_1.jpg","../image/image_15/15_Estresse_2.jpg","../image/image_15/15_Estresse_3.jpg"]},"Consult_chateau_formulaireb761":{"id":"Consult_chateau_formulaireb761","dept":"15","canton":"Aurillac","commune":"Aurillac","nom":"Fabrégues_Aurillac","type":"Château","periode":"XV","histoire":"FABREGUES, au VIIIe siècle,  cité dans le domaine de Géraud d'Aurillac. Au XVe siècle Fabrègues appartenait à la famille de Pouzols qui recueillit la succession de la Lapanouse de Loupiac et de Viescamp:  Jourdain de Pouzols, fils d'Antoine, commandant du ban  en 1477, et d'Anne de Dienne, épousa Jeanne de Lapanouse, fille et héritière de Charles de Lapanouse, seigneurs de Viescamp, de Marmiesse et d'Anne de Tourzel d'Alègres. Ils eurent pour enfants: noble de Pouzols, catholique, seigneur de Carbonat qui fut nommé par  M. de Saint-Hérem commandant de Carlat pour repousser les menées calvinistes venant du Rouergue; Antoine de Pouzols, calviniste, marié à Catherine de Gouzel, habitait Fabrègues en 1571, Louise de Pouzols, mariée à Guynot de Gouzel, seigneur de Ségur, Françoise de Pouzols, mariée en 1541 avec Gabriel de Prallat, fils de Guy et de Jeanne d'Albars. À la moitié du XVIe siècle, toute la maisonnée depuis les châtelains jusqu'à l'aumônier en passant par les domestiques, abjura sa foi au profit de la Réforme. Repaire des bandes calvinistes qui pillaient la région, le château fut le théâtre de sanglantes répressions,   Hippolyte Esquirou de Parieu (1791-1876), maire d'Aurillac, député du Cantal, achète Fabrègues. Marié à Elisabeth Theilhard, il eut un fils et trois filles : Marie (1815-1893), Claire (1821-1898) et Nelly (1826-1893). Félix Esquirou de Parieu fut un personnage considérable qui entreprit de reconstruire  le château tel qu'on le voit aujourd'hui, famille Richard de Laprade.","architecture":"Château  de Fabrègues mentionné dès le Xe siècle. L'édifice du début du XIXe siècle présente un pavillon carré couronné de mâchicoulis, la partie médiévale du château du XIVe-XVe siècle, un corps de logis disposé en biais du XVIIe avec une tour d'angle à toiture en poivrière, et entre les deux bâtiments, servant de liaison entre eux et le porche d'entrée, un corps de bâtiment étroit dont la façade était percée d'un portail et d'une fenêtre à meneaux et ornée de deux échauguettes à toiture en poivrière du XVe-XVIe siècle. En 1898, le château est reconstruit par l'architecte Viee qui conserve les fondations des pavillons, mais il remplaça celles du porche pour élever un porche monumental. Ce dernier est conçu sur un plan centré, circulaire à l'intérieur et carré à l'extérieur couvert d'un toit à l'impérial surmonté d'un faux lanternon adoptant la forme d'un portique de style antique. Les deux façades sont composées d'un grand portail entouré de pilastres à bossage et au deuxième niveau d'un fronton cintré surmontant une baie cintrée à voussures concaves. A l'intérieur, le porche est surmonté d'une coupole dont le tambour est percé de baies garnies de vitraux géométriques signés Pompey. Le premier niveau est entouré d'une galerie aux murs ornés d'un décor floral au pochoir. La coupole est ornée d'une rosace en céramique colorée.","habitants":"Famille de Jourdain de Pouzols\r\n        \r\n        \"","divers":"Château de Fabrégues à Aurillac","gps":"","images":["../image/image_15/15_Fabregues_Aurillac_1.jpg","../image/image_15/15_Fabregues_Aurillac_2.jpg","../image/image_15/15_Fabregues_Aurillac_3.jpg"]},"Consult_chateau_formulaireb914":{"id":"Consult_chateau_formulaireb914","dept":"15","canton":"Vic-sur-Cère","commune":"Giou de Mamou","nom":"Falhiès","type":"Tour","periode":"XIII","histoire":"FALHIES,  tour carrée, sur le même modèle que celles du château Saint-Étienne d'Aurillac, de Saint-Simon, de Naucelles, faisant partie d'un réseau de guet et de défense mis en place par l'abbaye d'Aurillac afin de prévenir des incursions vikings par la vallée de la Dordogne. Ce système a été reconstitué visuellement en 1986 avec des fumigènes enflammés au sommet du château Saint-Étienne d'Aurillac, au sommet de la Tour de Saint-Simon et à la Tour de Falhiès, et il fonctionne parfaitement.                                           A Giou-de-Mamou est une ancienne seigneurie appartenant à la famille de Giou ,seigneurs de Mamou.Le Marquis de Sistrières dit que le château et la terre de Giou dépendaient en hommage des comtes de Carladès, suivant les aveux de 1321, 1539, 1634 et 1638. Cette terre fut divisée entre le marquis de Lostange, le baron de Langeat et M. Delort, lieutenant-général d'Aurillac, entrés gendres dans la maison de Giou. Cette terre avait plusieurs domaines et rentes à Giou, Saint-Etienne , Vezac, Polminhac et Thiézac. Demoiselle Thérèse Fortet, veuve de M. François Textoris, président en l'élection d'Aurillac, tenait en fief franc et noble, dans la paroisse de Giou, son domaine de la Condamine, suivant l'hommage qu'elle en avait rendu, en 1668, au comte de Carladès.","architecture":"Falhiès les restes subsistants datent du XIe siècle, avec un bel appareillage de pierres de taille. Les dimensions extérieures de la tour sont d'environ 8 mètres sur 8, avec 1,80 m d'épaisseur de murs. Elle comprenait au moins quatre étages, avec un accès au 1er étage par une échelle qu'on retirait. Un boyau de pierre, dans l'épaisseur d'un mur, permettait la montée et la descente facile de nourriture ou d'objets de nécessité. Il reste l'entrée de ce canal sur la façade extérieure Nord. La tour faisait l'angle de fortifications en forme de coquille Saint-Jacques, avec une tourelle avancée, au-dessus du chemin d'accès. Les ruines d'un bâtiment annexe, à quelques mètres au Nord de la tour, contiennent les restes d'un four à pain.  les vestiges de son château sont encore visibles en amont de l'église.","habitants":"Famille de Giou \r\n        \r\n        \"","divers":"Vestiges et tour de Falhiès","gps":"","images":["../image/image_15/15_Falhies_1.jpg","../image/image_15/15_Falhies_2.jpg"]},"Consult_chateau_formulairef789":{"id":"Consult_chateau_formulairef789","dept":"15","canton":"Naucelles","commune":"Saint-Cernin","nom":"Faussanges","type":"Château","periode":"XVI","histoire":"FAUSSANGES, c'était un fief connu au XVIe siècle. Guillaume de Faussanges, clerc, Géraud et Jean, ses frères, firent, en 1293, leur hommage à N.-Guillaume de Tournemire, chevalier, fils de feu Pierre, seigneur dudit lieu, pour le moulin, de Faussanges, sur la Doire. Jean de Faussanges était recteur de Tournemire en 1421. Pierre, dit aussi de St-Cirgues, habitait encore Faussanges en 1459. Antoine Crandelles, fils de Géraud, fut sommé par Jean d'Armagnac, abbé d'Aurillac en 1465, de lui faire son hommage pour ce qu'il possédait; il était alors homme d'armes. Jean Rivet de Faussanges servait sous le capitaine Maleprade en 1595.  Pierre de La Roche possédait ce fief en 1598, et un de ses descendants, François de La Roche, l'habitait en 1659. Cette même année, Guy de Girgols, seigneur de Bassignac, épousa Antoinette de Chazettes, et son fils Jacques fut seigneur de Faussanges. En 1767, c'était N. Delsongles, avocat, seigneur aussi de Marcenat, St-Martin-de-Valois, Laubat, etc. ; il habitait le château qui est aujourd'hui à madame veuve de Vernière. Ce château fut brûlé, il y a quelques années, mais rebâti aussitôt avec plus de goût et d'élégance.","architecture":"Faussanges beau château à la moderne, non loin de Tournemire, bâti en 1815, sans doute par l'architecte Lalliet, le château est un édifice classique de plan massé aux percements réguliers rectangulaire à trois niveaux, toits en croupes, pavillons d'entrée légèrement saillant en façades plein cintre avec fronton triangulaire, il est entouré de dépendances construites au XVIIIe siècle. Décors intérieurs constitués d'un escalier, de boiseries et de cheminées.\r\n Eléments protégés MH: le château en totalité avec ses décors intérieurs comprenant notamment la salle à manger, le grand salon, la cuisine, l'escalier, ainsi que l'orangerie, la chapelle, les bâtiments de communs dont le four, et les jardins avec leurs bassins et leurs terrasses niale","habitants":"Famille de  Guillaume de Faussanges\r\n        \r\n        \"","divers":"Château de Faussanges à Saint-Cernin","gps":"","images":["../image/image_15/15_Faussanges_1.jpg","../image/image_15/15_Faussanges_2.jpg"]},"Consult_chateau_formulairefa74":{"id":"Consult_chateau_formulairefa74","dept":"15","canton":"Mauriac","commune":"Drugeac","nom":"Ferluc","type":"Maison forte","periode":"XV","histoire":"Drugeac pas d'informations historiques FERLUC, en 1420, cette terre et seigneurie passa, par le testament de Guérines de Ferluc, fille de Raymond et de Catherine d'Ornac, dans la famille de St-Chamand, en 1322, à Jean de St-Chamand. La baronnie de Ferluc passa par mariage, vers 1570, à Jacques de Faye d'Espesse, président à Mortier au Parlement de Paris. En 1703, cette terre fut vendue par Arnoul Garnier à demoiselle Anne Rodde, veuve Valette de Salers, qui maria sa fille avec Charles-Henri Pons, Seigneur de Lachau, avocat au Parlement. Jean-Joseph Pons, son fils, habitait le château de Ferluc, et ajouta à son nom  à cette seigneurie. Ferluc appartient aujourd'hui à M. Benoid, originaire de la ville d'Allanche, juge au tribunal de Gannat, dont la mère, madame Pons, était la dernière héritière de cette branche, son frère n'ayant pas eu d'enfants. Par donation du 14 septembre 1849, Annet Pons de Ferluc, oncle de M. Benoid, lui remit l'habitation.","architecture":"Il ne reste plus que quelques ruines du beau château de Drugeac. Il fut incendié par accident quelques années avant la Révolution de 1789. Une partie était déjà en ruines en 1753. Suivant la description que l'on a conservée, il se composait alors de quatre grands corps de logis flanqués aux quatre coins de quatre tours rondes. Au centre de l'une des façades était une tour en forme de carré, munie de meurtrières, créneaux et mâchicoulis en usage dans les XII° et XIII° siècles. Quatre étages étaient superposés l'un sur l'autre, et l'on y parvenait par un escalier extérieur. Les toits étaient couverts de tuiles rouges.\r\nChâteau de Ferluc du XIVe siècle. Isolé sur un promontoire dominant la vallée, il est composé de deux bâtiments accolés, une tour médiévale et un corps de logis du XVIIe siècle de plan rectangulaire à deux niveaux avec lucarnes sur toit à deux pans. Outre ses baies médiévales et classiques et notamment sa porte d'entrée à encadrement sculpté et battants cloutés, le bâtiment a conservé l'essentiel de ses dispositions intérieures d'origine. Isolé sur un promontoire dominant la vallée.","habitants":"Famille de Charles-Henri Pons\r\n        \"","divers":"Maison forte de Ferluc à Drugeac","gps":"","images":["../image/image_15/15_Ferluc_1.jpg","../image/image_15/15_Ferluc_2.jpg","../image/image_15/15_Ferluc_3.jpg"]},"Consult_chateau_formulairea196":{"id":"Consult_chateau_formulairea196","dept":"15","canton":"Mauriac","commune":"Fontanges","nom":"Fontanges_Cantal","type":"Forteresse","periode":"XV-XIX","histoire":"Quatre  châteaux à Fontanges dont celui de Fontanges, de Fromental  du XIXe siècle restaurant , de Lamargé du XV-XVIIIe siècle (voir article), de Seilhols  et de Palmont (voir article). FONTANGES La duchesse de Fontanges, disparue à Port-Royal, a séjourné au château de Mézillac dans le Cantal, non loin de Mur-de-Barrez en Aveyron.  Dès 1280, la seigneurie est à la famille Balaguier, en 1422, le seigneur de Belcastel, Alzias de Sauhnac en possède le tiers, le reste étant au chapitre de Rodez, en 1564, séleva une bâtisse avec tour quon appela » la maison neuve de Fontanges ». Le château actuel fut bâti à la fin du XVIe siècle et au début du XVIIe siècle par un riche drapier du bourg de Rodez, Raymond dAustry. Il fit dresser la tour de cinq niveaux que lon peut voir encore dans la cour centrale de lhôtel, tour conçue par le maître duvre Pierre Radegonde, dont le fils pose la première pierre le 22 janvier 1590. Un autre maçon dAmbec éleva la seconde tour côté Floyrac et un couvreur Fraissinhon les acheva.  En 1654, la veuve de Jean d Austry qui fut président du Présidial de Rodez, affermera le domaine et se réserva lhabitation. Lexploitation passa aux chartreux puis aux Jacobins de Rodez qui laffermèrent régulièrement. Le domaine fut vendu comme bien national le 11 mars 1791, à Descombes du Truel, paroisse de Conulet (Bessuéjouls).\r\nFROMENTAL, érigée au XIXe siècle, chambres  d'hôtes de monsieur et madame Claude et Danielle Bouhours-Vatin.     \r\nSEILHOLS,hôtel restaurant  mariages, réceptions privées, cocktails, événements d'entreprise.","architecture":"Fontanges, imposante demeure dépoque, restaurée depuis peu, des éléments de construction existaient à la fin du XV et au début du XVIe siècle dont la cuisine avec une cheminée en stuc.En 1564, séleva une bâtisse avec tour quon appela  la maison neuve de Fontanges. Le château actuel fut bâti à la fin du XVI et au début du XVII, la tour de cinq niveaux que lon peut voir encore dans la cour centrale de lhôtel,   un autre maçon dAmbec éle va la seconde tour côté Floyrac                                                                    La Fromental est un château construit au XIXe siècle entouré d'un parc de six hectares. Suite à de nombreuses rénovations ratées, le château de La Fromental est complètement dénaturé. A l'intérieur, les parquets parfois encore d'origine sont recouverts d'une multitude de tapis qui donne un aspect feutré et confortable. Les pièces sont décorées de tableaux et d'objets chinés ainsi que de mobilier de style Louis XV et Louis XVI.                                           Seilhols composé d'un corps de logis  rectangulaire a deux niveaux toitures en croupes avec lucarnes accolé  d'une tour carré toit en poivrière et échauguettes sur les angles.","habitants":"Famille d'Antoine de Lamargé\r\n        \"","divers":"Château de Fontanges, de Fromental et de Seilhols.","gps":"","images":["../image/image_15/15_Fontanges_Cantal_1.jpg","../image/image_15/15_Fontanges_Cantal_2.jpg","../image/image_15/15_Fontanges_Cantal_3.jpg","../image/image_15/15_Fontanges_Cantal_4.jpg","../image/image_15/15_Fontanges_Cantal_5.jpg","../image/image_15/15_Fontanges_Cantal_6.jpg","../image/image_15/15_Fontanges_Cantal_7.jpg","../image/image_15/15_Fontanges_Cantal_8.jpg","../image/image_15/15_Fontanges_Cantal_9.jpg"]},"Consult_chateau_formulaire30b0":{"id":"Consult_chateau_formulaire30b0","dept":"15","canton":"Riom-ès-Montagne","commune":"Saint-Bonnet de Condat","nom":"Frayssinet_Cantal","type":"Château","periode":"XIV","histoire":"FRAYSSINET, Pierre de Neyrat, marié en 1642 avec Jeanne de La Boulaie, fille de Jacques, seigneur de Denone, de La Guesle et des Tourrande, habitait au château de Frayssinet en 1675 avec sa belle-sur Charlotte de Brezons. Ils ont eu quatre fils, Pierre, seigneur de Brenal et de Villas, marié en 1699 avec Hélène Pons dont il a cinq garçons et une fille. Antoine mort en 1716,  Charles de Neyrat, prieur du Breuil,  François-Jacques de Neyrat, seigneur de Nuitz, d'Eymas, du Fraissinet, du Chazal et de Rochegude, capitaine des chevaux-légers du dauphin, mort en Italie en 1702. il s'est marié en 1695 avec Anne Le Gros de Grignan, qui lui a donne un fils Antoine de Neyrat,  né en 1696, décédé au Frayssinet en 1728, à l'âge de trente ans,  laissant pour héritier son neveu.","architecture":"Château du XIVe-XIXe siècles, de plaisance avec une tour escalier médiéval située dans le village de Saint-Bonnet-de-Condat","habitants":"Famille de Pierre de Neyrat\r\n        \"","divers":"Château de Frayssinet à Saint-Bonnet de Condat","gps":"","images":["../image/image_15/15_Frayssinet_Cantal_1.jpg","../image/image_15/15_Frayssinet_Cantal_2.jpg"]},"Consult_chateau_formulaire4001":{"id":"Consult_chateau_formulaire4001","dept":"15","canton":"Saint-Paul des Landes","commune":"Glénat","nom":"Grillère","type":"Château","periode":"XV","histoire":"GRILLERE,  Durand de Montal, seigneur de Laroquebrou, fait hommage du château de Glénat en 1251 au comte de Rodez comme vicomte de Carlat. Géraud de la Roque, chevalier, le possédait en arrière-fief en 1269 ; il en fit hommage, en 1269, à Géraud de Montal. Plusieurs seigneurs, dans la suite, eurent des droits sur cette seigneurie. Guillaume de Cayrac, Bernard et Rigaud de Durban ; Richarde, leur mère, et Gallienne de Durban en étaient co-seigneurs en 1302. Cette famille conserva cette châtellenie jusqu'en 1403. Pierre de Teillet fut aussi co-seigneur de Glenat et de Recoules. Cette partie fut vendue, en 1460, à Bertrand de Rilhac, Seigneur de Brives. Philippe de la Grillière en était seigneur en 1502. Cette famille se fondit dans celle de Beauclair, qui en a joui jusqu'à la Révolution. Cette dernière famille a fait construire à la moderne le château actuel, l'ancien étant tombé en ruines.  En 1502, Philippe de La Grillère est le seigneur propriétaire du château bas. Cette famille le possédait encore en 1632. En 1562, M. de Brezons, gouverneur d'Aurillac y place une garnison de soldats. Il passe ensuite aux de Beauclair, seigneurs de Messac. Il est transformé en chambres d'hôtes.","architecture":"La châtellenie de Glenat était considérable à son origine. C'est une forteresse ceinturée en outre de fossés. Il est alors appelé le château supérieur.  Il s'agissait alors d'un château constitué d'une grosse tour et de constructions comportant des créneaux et des mâchicoulis,  le château fait encore partie, en 1650, de ceux considérés comme importants à la défense du pays. Il appartient alors à plusieurs seigneurs qui coopèrent en commun à son entretien. A partir de 1650, construction du château actuel qui ne semble pas avoir connu depuis de modifications. Le manoir se compose d'un corps de logis du XVIIe siècle flanqué sur sa face arrière de deux tours du XIVe-XVe siècle. Ces tours carrées sont les vestiges de l'ancien château-fort. A l'intérieur, le corps de logis conserve un escalier en bois du XVIIe siècle et un plafond peint de la même époque, à motif décoratif dans une chambre du premier étage. Le 12 février 1987, les façades et toitures du château et de la grange, ainsi que son escalier du XVIIe siècle et un plafond peint sont inscrits au titre des monuments historiques.","habitants":"Famille de  Bertrand de Rilhac\r\n        \r\n        \"","divers":"Château de Grillère à Glénat","gps":"","images":["../image/image_15/15_Grillere_1.jpg","../image/image_15/15_Grillere_2.jpg","../image/image_15/15_Grillere_3.jpg","../image/image_15/15_Grillere_4.jpg","../image/image_15/15_Grillere_5.jpg","../image/image_15/15_Grillere_6.jpg"]},"Consult_chateau_formulaired008":{"id":"Consult_chateau_formulaired008","dept":"15","canton":"Vic sur Cère","commune":"Polminhac","nom":"Huttes","type":"Maison forte","periode":"XVII","histoire":"HUTTES, cité en 1266, châtellenie des Huttes, de celui de Bernard de Vic pour sa part des Huttes également et de celui d'Adhémar d'Aude  pour un mas situé aux Huttes. Lors d'une reconnaissance à  J. de Montamat,  en 1486,  \"Las Utas\" sont signalées. En 1583 sont citées \"Las Etas\", en 1584 \"Les Huttes\" font parties de la terre de   Polminhac. En 1609, hommage est rendu au roi pour cette terre des Utes par les prêtres de Polminhac. Blaise   Pagès, habitant de Vic était seigneur des Utes en 1616, et au moins jusqu'en 1675. A cette date il existait un   péage  aux Huttes, qui devait  être très ancien. Durant tout le XVIIIe siècle, la seigneurie des Huttes resta en  possession de la famille Pagès de Vic. Jacques Antoine Pagès de La Valette (1763 - 1833), chevalier de Saint-Louis. Jean-François Pagès des Huttes (1785 - Vic-sur-Cère 1829), marié en 1821 avec Delphine Delrieu (1776 1851), fille de Guillaume et d'Elisabeth Viallard, sans descendant. Marguerite Pagès des Huttes, sa sur, s'est mariée en 1813 avec Jean Latapie de Balaguier, chevalier de Saint-Louis, auquel elle a donné plusieurs enfants, Firmin, Félix et une fille : Marie Latapie de Balaguier, mariée à Vic avec Joseph de La Garde de Saignes, fils de René de La Garde de Saignes, ancien officier des Haras, et de Victoire de L'Enfernat, auquel elle donna une fille et quatre garçons. Le domaine des Huttes est acheté par Jean Saphary (1796-1865), professeur de philosophie, membre de la société cantalienne.","architecture":"Maison de maître de la Huttes de la première moitié du XVIIe siècle, remaniée en 1797 et en 1809 ; l'écurie, accolée, porte la date  de 1700 mais a été surélevée au XXe siècle; son corps de logis est rectangulaire, à un étage sur soubassement voûté, et sous comble, avec une tour d'angle sous toiture à croupes, et une tourelle à toit conique. Deux escaliers en maçonnerie sans jours : un à vis en uvre, un tournant à retour. Sa maçonnerie en moellons de basalte et de tuf volcanique, sa couverture en lauzes.\r\nLogis de ferme à pignon couvert et demi-croupe, portant la date de 1787, à son extrémité Est (côté fournil) et la date  de 1873, sur une lauze (date de réfection de la couverture).","habitants":"Famille de Blaise-Pagès\r\n        \r\n        \"","divers":"Château de la Huttes à Polminhac","gps":"","images":["../image/image_15/15_Huttes_1.jpg"]},"Consult_chateau_formulairef645":{"id":"Consult_chateau_formulairef645","dept":"15","canton":"Murat","commune":"Chapelle d","nom":"Jarrousset","type":"Château","periode":"XV","histoire":"JARROUSSET,  Itier de Ribes possédait la seigneurie de Jarrousset en 1312. Guillaume Bassoles en était seigneur en 1416. Cette seigneurie passa après lui à la famille de Chaumeil-Massebeau. François de Massebeau vint se fixer, en 1538, au château de Jarrousset, nouvellement construit, et en fit hommage au vicomte de Murat. Le Jarrousset resta dans cette famille jusqu'en 1684, où Anne de Massebeau le porta, par mariage, à François de Cabannes de Comblat. La seigneurie et  la propriété passèrent, par acquisition faite en justice en 1709, à N. Jean Berthier, conseiller du roi, seigneur de Bressange; elles furent portées dans la famille de Sauret-d'Auliac, en 1776, par suite du mariage de noble de Sauret, seigneur du Chaylus, avec N. de Berthier, dame de Bressange, qui en était héritière. En 1783, la famille de Sauret du Chaylus se composait de quatre frères, dont' l'un était ecclésiastique. Tous trois  périrent  en cours d'émigration. L'abbé du Chaylus, chanoine honoraire du chapitre cathédrale de Saint-Flour, prit possession du Jarrousset, où il résidait, et l'a donné par testament, en 1848, à M. de Sauret-d'Auliac, de Saint-Flour, son neveu.","architecture":"Jarrousset, le donjon primitif carré domine sur l'angle sud ouest, les restes des constructions qui s'ordonnent autour d'une cour d'honneur située au sud. Ces bâtiments semblent correspondre à deux campagnes distinctes. Un corps de logis allongé du XVIe siècle, adossé contre la face Est du donjon, flanqué par une tour ronde à l'angle nord-est, par une échauguette en encorbellement au sud-est et par une tour d'escalier à l'angle sud-est. Une deuxième campagne de travaux au XVIIe siècle, englobe un bâtiment en L dont la petite barre s'élève dans le prolongement du logis précédent. Le donjon présente un chemin de ronde couvert sur mâchicoulis, et sa face nord est percée de baies médiévales, sa face sud de baies percées au XVIIe siècle, la tour d'escalier est percée d'une porte gothique dont le tympan est frappé aux armes de la famille Sauret. L'aile en retour d'équerre comporte des chambranles moulurés du XVIe (arcs en accolade) qui pourraient être des remplois,  se compose d'une grosse tour carrée, entourée d'un couronnement de  mâchicoulis, et de deux autres tours rondes, dans l'une desquelles est placé un escalier à vis. Deux corps de logis faisant retour en équerre, et le mur du jardin complète la clôture de la cour intérieure. Le Jarrousset a dû être construit en partie avec les matériaux du château de Fourose.","habitants":"Famille de  François de Massebeau \"","divers":"Château de Jarrousset à la Chapelle d'Alagnon.","gps":"","images":["../image/image_15/15_Jarrousset_1.jpg","../image/image_15/15_Jarrousset_2.jpg","../image/image_15/15_Jarrousset_3.jpg","../image/image_15/15_Jarrousset_4.jpg","../image/image_15/15_Jarrousset_5.jpg","../image/image_15/15_Jarrousset_6.jpg"]},"Consult_chateau_formulaire8ca7":{"id":"Consult_chateau_formulaire8ca7","dept":"15","canton":"Naucelles","commune":"Jussac","nom":"Jussac","type":"Château","periode":"XIV","histoire":"Trois châteaux à Jussac, celui de Nozières du XVI- XVIIIe siècles, celui de Fontenille du XIXe siècle et de Moncamp.   Pas d'info sur Fontenille et Moncamp.                                                                    NOZIERES,  Guillaume de Nozières. Jean de Nozières, fils de Guy, seigneur de Nozières-Subro et de Vercueyre, épouse en 1343 Hélène de Montal, fille de Jean II, seigneur de Laroquebrou, dont un fils, Jean Nozières-Montal, qui sera seigneur de Nozières.  En 1381, Gabriel de Nozières-Montal, fils de Jean Nozières-Montal, est bailli des montagnes d'Auvergne et marié à Antoinette de Balzac d'Entraygues, qui lui donne six enfants Paul de Nozières-Montal, marié à Hélène de Montsalvy, qui n'ont qu'une fille Marguerite, Jeanne de Nozières qui épouse en 1530 à Jussac Sébastien de Greil de Volpilhère ; ils auront douze enfants, Gabriel de Montal-Nozières, marié à Françoise de Neuville, Gabrielle de Nozières-Montal, mariée à Jean de Tournemire, seigneur de Leybros à Jussac. Jacques de Tournemire, fils de Claude, seigneur de Leybros et de Louise de Salers, hérite du château en 1595, de sa grand-mère Gabrielle de Nozières-Montal. Il se marie à Françoise de Saint-Chamant, dont il n'a qu'une fille : Louise de Tournemire, mariée en 1625 à Charles de Reilhac, déjà coseigneur de Nozières, et en 1633 à Annet de Sauveboeuf. Ils vivent à Leybros avec leur fils Claude, et vendent Nozières en 1612,  à Henri de Noailles, seigneur de Pénières, bailli des montagnes d'Auvergne. Il épouse en 1578 Jeanne-Germaine d'Espagne, qui lui donne trois enfants: Charles (1589-1648), évêque de Saint-Flour, Marthe-Françoise, mariée à Jean de Gontaut, fils d'Armand de Gontaut, maire de Bordeaux, maréchal de France. François de Noailles, seigneur de Nozières et de Pénières, comte d'Ayen, bailli des montagnes d'Auvergne. Il est le père d'Anne, 1er duc de Noailles. Au XIXe siècle, le château appartenait à M. Couderc.","architecture":"château de Nozières, dit de Saint-Pol, construit au XIVe siècle, eut plusieurs lignées de propriétaires au fil des époques,  ancien château situé en bordure de l'ancienne route royale d'Aurillac à Mauriac, reconstruit au XVIIIe siècle avec une jolie pièce d'eau alimentée par un ruisseau dont le cours a été détourné. composé d'un corps de logis rectangulaire à quatre niveaux  toitures en croupes, accolé d'une tour carrée à mâchicoulis et chemin de rondes, toit en poivrières. À l'intérieur des décors de différentes époques sont conservés: une cheminée monumentale, des boiseries, des cheminées et des parquets des XVIII et XIXe siècles.\r\nFontenille, tour ronde accolée au corps de logis quadrangulaire à deux étages et attiques avec lucarnes. Moncamp, de plan rectangulaire avec tour sur l'arrière, corps de logis à deux niveaux et lucarnes incorporées dans la toiture à la Mansart.","habitants":"Famille de Guillaume de Nozières\r\n        \"","divers":"Château de Fontenille, de Moncamp et de Saint-Pol de Nozières à Jussan","gps":"","images":["../image/image_15/15_Jussac_1.jpg","../image/image_15/15_Jussac_2.jpg","../image/image_15/15_Jussac_3.jpg","../image/image_15/15_Jussac_4.jpg","../image/image_15/15_Jussac_5.jpg"]},"Consult_chateau_formulaire34fc":{"id":"Consult_chateau_formulaire34fc","dept":"15","canton":"Mauriac","commune":"Fontanges","nom":"Lamargé","type":"Château","periode":"XV","histoire":"LAMARGE, le fief de Lamargé, qui avait été acquis vers 1548 par Jacques Salvaiges, bailli de Salers, marié à Françoise Mossier, dame de Palmont, qui commence à construire le château autour d'une vieille tour carrée.  Ce château restera jusqu'à la fin du XXe siècle dans la famille de Salvaiges de Lamargé, il fut vendu par la suite à des propriétaires anglais. Nouveau  propriétaire  Mr et Mrs Bayliss, 21 avril 2004,  ils avaient achetés ce château à Mme de Lamargé,  à Chaudes-Aigues.","architecture":"Lamargé, remanié au cours des siècles, le château se compose d'une tour carrée du XVe siècle incorporée dans le corps de logis de la fin du XVIe siècle, de plan rectangulaire quatre niveaux et attiques avec lucarnes, cantonné de deux tourelles carrées à chaque extrémité de sa façade sud. Au XVIIIe siècle, agrandissement de l'édifice sur l'arrière, et ajout d'une aile. Des communs du XIXe siècle et des terrasses d'époque classique l'entourent. un deuxième  corps de logis de  niveaux inférieur de différentes époques depuis le XVIe siècle  jusqu'au XVIIIe siècle.","habitants":"Famille de  Jacques Salvaiges\r\n        \r\n        \"","divers":"Château de Lamargé à Fontanges","gps":"","images":["../image/image_15/15_Lamarge_1.jpg","../image/image_15/15_Lamarge_2.jpg","../image/image_15/15_Lamarge_3.jpg","../image/image_15/15_Lamarge_4.jpg","../image/image_15/15_Lamarge_5.jpg"]},"Consult_chateau_formulaire8cfc":{"id":"Consult_chateau_formulaire8cfc","dept":"15","canton":"Arpajon sur Cère","commune":"Calvinet","nom":"Lamothe_Calvinet","type":"Château","periode":"XVI","histoire":"LAMOTHE,  Il a appartenu à la famille de Roquefort qui la transmis au XVe siècle, par mariage à la famille de Gausserand. La famille de Bonnafos arrive à Lamothe, toujours par alliance, en 1713, elle en est toujours propriétaire aujourdhui. Nayant pas eu dans cette famille de rôle militaire ni proche de la cour royale, le château na pas été le témoin de grands faits de lhistoire de France, depuis 1713 dans la famille du baron  G. der Bonnafos.","architecture":"Quelques vestiges de l'ancien château de Calvinet, et du noyau primitif sur les hauteurs, traversé par la route appelée  le pavé.                                 Lamothe  les premiers documents datent du XIVe siècle, période de construction de certaines parties du château, comme la tour du milieu coiffée dun toit en oignon, Lamothe  dont le corps de logis de plan d'équerre  à deux niveaux et attiques avec lucarnes, flanqué en façade d'une tour ronde à  toit en poivrière et une échauguette en angle interne, escalier d'accès à double révolution  et ses dépendances ont été construits en plusieurs siècles, chaque génération apportant son évolution.","habitants":"Famille de Roquefort\r\n        \"","divers":"Château de Lamothe à Calvinet","gps":"","images":["../image/image_15/15_Lamothe_Calvinet_1.jpg","../image/image_15/15_Lamothe_Calvinet_2.jpg","../image/image_15/15_Lamothe_Calvinet_3.jpg","../image/image_15/15_Lamothe_Calvinet_4.jpg","../image/image_15/15_Lamothe_Calvinet_5.jpg","../image/image_15/15_Lamothe_Calvinet_6.jpg","../image/image_15/15_Lamothe_Calvinet_7.jpg"]},"Consult_chateau_formulaire643f":{"id":"Consult_chateau_formulaire643f","dept":"15","canton":"Saint-Paul des Landes","commune":"Laroquebrou","nom":"Laroquebrou","type":"Chateaux","periode":"XIII-XVI","histoire":"Trois châteaux à Laroquebrou, celui de la Roque du XIIIe siècle et de Messac du XVI-XIXe siècle                                                   LAROQUE,  Astorg II, viguier d'Orlhac en Viadène était marié avec Marguerite de Montal, fille du viguier d'Arpajon auquel elle donne au moins deux fils: Astorg III d'Orlhac, seigneur de Conros, sans postérité.  Passa à  Durand Ier de Montal, marié à Dia de Carbonières, qui lui donne quatre enfants : Astorg IV marié à Marguerite de Malemort.  Durand II de Montal qui épouse Guillemine de Laroquebrou  Raymond, qui fait hommage en 1251 pour Montal à Hugues IV de Rodez, comme vicomte de Carlat Déodat.  Durand II de Montal devient seigneur de Laroquebrou ; Durand III de Montal, qui accorde en 1281 une charte de franchise aux habitants de Laroquebrou. Passa  par indivis à N. de Montai, son cousin. Rose de Montai, baronne de La Roquebrou, héritière de sa branche, transmit la terre aussi par alliance, en 1593, à François de Pérusse d'Escars, baron de Merville, sénéchal de Guienne, en faveur duquel la baronnie de La Roquebrou fut érigée en marquisat. Habité à partir du XVIIe siècle par la famille de La Roque, des seigneurs de La Moissétie et de Réquiran, connue sous le nom de La Roque-Montal. Jacques de La Roque était seigneur de Montal en 1737. Leurs descendants la possédaient encore en 1780.                                      MESSAC,  fief des haubert, dépendant des abbés d'Aurillac, puis des seigneurs de Conros. Ses premiers possesseurs connus sont une famille de chevaliers, seigneurs du lieu, attestée au XIIIe siècle. Siège d'une justice locale jusqu'au début du XVIIe siècle. Sa ferme possédait une montagne à Girgols avec un Buron. Possédé par plusieurs générations de chevaliers, puis par succession aux familles du Crozet de Bellestat, et de La Garde de Saignes. Vendu comme bien national à la Révolution, est ensuite aux familles Prax et  Maitrier.","architecture":"le château actuel de Laroquebrou ne correspond pas au site castral d'origine qui se trouvait sur un piton schisteux étroit et haut de 30 mètres, inaccessible de tous côtés et placé dans le bourg actuel. Le sommet est couronné par une plate-forme aménagée d'environ 50 mères où une tour de plan carré existait jusqu'en 1653, date où elle fut en partie abattue. Le premier étage de cette tour conservait une chapelle dédiée à la vierge qui est mentionnée au XIVe siècle.   Les tours rondes, au nombre de quatre, étaient crénelées. L'une d'elles enfermait l'escalier. Une cinquième tour, aujourd'hui très en ruine tenait à un mur très élevé, mais était séparée des autres constructions. Une poterne était défendue par un fossé. Elle était surmontée par un mâchicoulis. Sous la terrasse existait un souterrain servant, en temps de siège à communiquer avec la ville.                                                                                 Messac; Gentilhommière composée de deux ailes articulées en équerre sur un escalier en tourelle. Haut de deux étages sur rez-de-chaussée, il remonte à la fin du XVe siècle et avait à l'origine un troisième étage déposé au cours du XVIIIe siècle. Deux cheminées par étage. L'édifice est représentatif de l'architecture civile dans le Cantal à la fin du Moyen-Age.","habitants":"Famille de Montal \r\n        \"","divers":"Château de la Roque et de Messac à Laroquebrou","gps":"","images":["../image/image_15/15_Laroquebrou_1.jpg","../image/image_15/15_Laroquebrou_2.jpg","../image/image_15/15_Laroquebrou_3.jpg","../image/image_15/15_Laroquebrou_4.jpg","../image/image_15/15_Laroquebrou_5.jpg","../image/image_15/15_Laroquebrou_6.jpg","../image/image_15/15_Laroquebrou_7.jpg","../image/image_15/15_Laroquebrou_8.jpg"]},"Consult_chateau_formulaire4fd3":{"id":"Consult_chateau_formulaire4fd3","dept":"15","canton":"Ydes","commune":"Champagnac","nom":"Lavendès","type":"Château","periode":"XVII","histoire":"LAVENDES, Hugues, chevalier, assiste à des mariages importants pour la noblesse de Haute-Auvergne, comme celui de Dauphine de la Tour d'Auvergne et Astorg d'Aurillac en 1314, ou celui de Bertrand IV de la Tour et d'Isabeau de Lévis, en 1320. Il a reçu des mains du roi Philippe VI de Valois la « Fleur de lys d'or », fidélité, encore, aux traditions familiales, son frère Bernard de Lavendès est chevalier de Malte et dirigera la commanderie d'Ydes. Au fil des siècles, les de Sartiges de Lavendès se distinguent, fournissant des prieures à Champagnac ou Brageac et des soldats, notamment pour le régiment de Lévis-Cavalerie. Ainsi François de Sartiges, lieutenant en 1720, dont la descendance va marquer un tournant pour le Lavendès. De fait, avec son fils aîné, Antoine-Marguerite resté célibataire, va s'éteindre en 1779 la branche champagnacoise de la noble maison. Sa soeur, Marie-Pierrette, avait associé leur nom en 1766 à une autre célèbre famille en épousant Jean-Jérôme de Ribier. Avant de mourir, Antoine-Marguerite a vendu le Lavendès à Joseph Dubois de Corbé qui le conserve jusqu'à en être exproprié, en 1787. Le domaine est adjugé, l'année suivante, à Jean-Joseph Milanges dont la fille épouse Pierre-Guillaume Rodde de Lamarge, juge de paix du canton de Saignes. Des onze enfants du couple, Sydonie hérite de Lavendès et épouse Frédéric de Ribier, petit-fils de Marie-Pierrette et de Jean-Jérôme. Une fois encore, les alliances ramènent les noms dans leur fief d'origine. Frédéric, qui va vivre une drôle d'aventure, restée dans les mémoires. Son épouse et lui ont, quasi simultanément, les cheveux qui blanchissent brutalement. La cause du phénomène reste mystérieuse mais, aux alentours, on prendra l'habitude des les nommer, affectueusement, « le Gris et la Grise de Lavendès ». Aujourd'hui chambres d'hôtes.","architecture":"Lavendès, au XVIIe siècle le château est reconstruit. Au XIXe siècle, le château est remanié, notamment la façade, parmi les dépendances il reste, une remise située devant l'édifice et figurant sur le cadastre de 1826, le colombier construit en 1670 (date sur le linteau de la porte) ou figure les armoiries, une grange-étable isolée représentée sur le cadastre de 1826, mais remaniée en 1912, une ferme dont le logis est daté de 1807, un moulin, aujourd'hui détruit, est signalé au XIXe siècle. Excepté la remise, toutes les dépendances sont aujourd'hui dissociées du château transformé en hébergement pour vacances.\r\n Le château n'a pas alors l'aspect qu'il présente aujourd'hui. corps de logis rectangulaire à deux niveaux et attiques avec lucarnes sur un toit brisé. Si nulle image ne semble subsister, on sait qu'il a possédé des tours abattues au XVII e siècle, une chapelle, des dépendances et le monumental escalier de pierre, voûté en ogives, de style roman. Le couple entreprend le remaniement du château, donnant à la façade son image actuelle, mais conservant précieusement l'escalier et le colombier, construit en 1670.","habitants":"Famille de Sartiges\r\n        \r\n        \"","divers":"Château de Lavendès à Champagnac","gps":"","images":["../image/image_15/15_Lavendes_1.jpg","../image/image_15/15_Lavendes_2.jpg","../image/image_15/15_Lavendes_3.jpg"]},"Consult_chateau_formulaire3fb5":{"id":"Consult_chateau_formulaire3fb5","dept":"15","canton":"Ydes","commune":"Saignes","nom":"Layre","type":"Château","periode":"XIX","histoire":"LAYRE, au Moyen-Age,  vers 1910 cette demeure bourgeoise est acquise par Edmont Pochat, propriétaire des mines de Champagnac, puis elle est transformée en château par Emile Lemaigre, architecte à Aurillac.  Emile Lemaigre lui a adjoint Jean-Baptiste de Ribier du Châtelet, né le 16 avril 1779 au château de Layre à Saignes  et décédé le 3 décembre 1844 à Ydes  est un historien français spécialiste du Cantal, maire de Ydes, membre du conseil d'arrondissement de Mauriac.","architecture":"Layre était un petit fief; le château aurait été incendié au XVIIe siècle; au XIXe siècle le bâtiment est qualifié de gracieuse habitation moderne ; La maison primitive remaniée correspond au corps de logis central  deux ailes en retours, deux tours d'angles sur la façade antérieure et une tour d'escalier sur la façade postérieure ; les trois tours sont couvertes d'un toit conique ; l'aile est à un pignon découvert.","habitants":"Jean-Baptiste de Ribier du Châtelet\r\n        \"","divers":"Château de Layre à Saignes","gps":"","images":["../image/image_15/15_Layre_1.jpg","../image/image_15/15_Layre_2.jpg","../image/image_15/15_Layre_3.jpg","../image/image_15/15_Layre_4.jpg"]},"Consult_chateau_formulaireef47":{"id":"Consult_chateau_formulaireef47","dept":"15","canton":"Mauriac","commune":"Anglards de Salers","nom":"Longevergne","type":"Château","periode":"XV","histoire":"LONGEVERGNE, en 1409  Marguerite de Longevergne par alliance  avec Hugues de Bort, fils de Jean, seigneur de Pierrefitte, et de Marguerite de Floyrac, qui était capitaine du château de Claviers. Ils eurent deux fils, Georges et Bertrand.  Georges de Bort, seigneur de Longevergne, se marie avec Claudine de Belvezer en 1499.  Un fils Géraud de Bort sans descendance et une fille Lucque de Bord dame et héritière. Lucque de Bort apporta Longevergne par son mariage en 1493 avec Bertrand d'Anglars, damoiseau, seigneur de Soubrevèze et de Vède, fils de Jean, seigneur de Saint-Victour et de Philippine de Lubertès. Ils eurent un fils, Pierre d'Anglars, et deux filles: Jeanne  et Françoise, Jeanne de Bort, dame de Longevergne, se maria en 1515 avec Guynot de Montclar, fils de Guillaume, seigneur de Montbrun, et de Marie d'Espinchal plusieurs enfants, dont: Jean de Montclar, seigneur de Montbrun à Méallet, et de Lavergne, marié en 1555 avec Anne de Miremont, fille de Bernard de Miremont et de Barbe de Dienne  plusieurs enfants, dont: Guy II dit Guinot de Montclar, marié en 1586 avec Renée de Chaslus, fille de Jean de Chaslus, seigneur de Mauriac et de Jeanne de Chabannes  plusieurs enfants, dont: Jean de Montclar, seigneur de Montbrun et de Longuevergne, marié en 1615 avec Marguerite, fille de François de Saint-Martial, baron de Drugeac et de Juliette de Fontanges  plusieurs enfants, dont: Gilberte de Montclar, héritière de Longuevergne où elle résidait en 1663, mariée en 1666 avec Pierre de Murat de Rochemaure.  François de Sénezergues, abbé de Maurs était seigneur de Longevergne où il habitait en 1777. À sa mort, sa sur Marie-Dorothée de Sénezergues, qui était mariée depuis 1760 avec Raymond Lacarrière, seigneur de Comblat, hérite de Longevergne qu'elle donne à l'un de ses fils: François-Louis de Lacarrière, enseigne en 1779, puis sous-lieutenant en premier des grenadiers au régiment des Gardes Françaises en 1789. Il participa au débarquement de Quiberon où il fut fait prisonnier, et condamné à mort le 2 août 1795. Ses biens furent confisqués et vendus comme bien national. une famille possède le château depuis 1973 comme héritage qui est dans la famille depuis sept générations.","architecture":"Le château de Longevergne est situé dans la vallée du Mars à une altitude de 530 mères.  Ce château existait déjà en 1228, reconstruit à la fin du XVe siècle pour lui donner son aspect actuel. Pendant plusieurs siècles ce château fut une annexe de la commanderie d'Ydes qui appartenait à l'Ordre de Saint Jean de Jérusalem. En 1905, des travaux de reconstruction et d'embellissement dus à l'architecte Bobin, permirent de restaurer les extérieurs et de doter les intérieurs de cheminées de styles néo-gothique et néo Renaissance de plus il a conservé son décor avec papiers peints et boiseries caractéristique de la fin du XIXe siècle. Il est constitué d'un corps de logis rectangulaire de trois niveaux, avec sur une façade une tour octogonale, et sur l'autre deux grosses tours rondes avec un chemin de rondes et toits en poivrières.","habitants":"Famille de Monclar \r\n        \"","divers":"Château de Longevergne à Anglard de Salers","gps":"","images":["../image/image_15/15_Longevergne_1.jpg","../image/image_15/15_Longevergne_2.jpg","../image/image_15/15_Longevergne_3.jpg"]},"Consult_chateau_formulairef7da":{"id":"Consult_chateau_formulairef7da","dept":"15","canton":"Neuvéglise","commune":"Chaliers","nom":"Longevialle","type":"Château","periode":"XVIII","histoire":"LONGEVIALLE,  le château ce trouve sur la rive gauche de la Truyère. Il a été construit au début du XVIIIe siècle par Antoine Guerin de Longevialle,  né en 1667 et mort en 1739 à Saint Flour, puis par son fils Antoine Guerin II   Falcon de Longevialle, et autres places est né en 1700, il épouse le 24 janvier 1729  à Langeac Marie Thérèse de Talemendier, dont il aura six enfants dont trois filles mariés à un de Boissieux, un de Ponsonaille du Chassan et un de Bonnefoi.\r\nNoblesse campargnarde, les Falcon de Longeviale eurent une vie étroitement mélée à la paysannerie, chose peu exceptionnelle  dans une région reculée comme le massif central avant la Révolution. Le blason sur la porte du château est celui des Longevialle marié à celui de Thérèse de Talemendier. Le chateau fut vendu à l'écomusée de Margeride dans les années 1990 et a été racheté depuis par Jean-Yves de Longeviale. Il revient donc de nouveau à cette famille.                           Dans la commune le château de Roudil construit en 1777 pour la famille Roudil. L'édifice est inscrit au titre des monuments historiques en 1992.","architecture":"Le chateau  de Longevialle ce trouve sur la rive gauche de la Truyère.  de plan en U à deux niveaux,                                                                           Roudil, cet édifice est situé dans la ville de Chaliers et sa construction date du XVIIIe siècle, y compris son perron et son trottoir en cailloux, sa cage d'escalier avec sa rampe en pierre et en bois, ses pièces avec leurs décors, boiseries de la salle à manger avec ses dessus-de-porte ornés de papiers peints.","habitants":"Famille d'Antoine Guerin de Longevialle\r\n        \"","divers":"Château de Longevialle et de Roudil à Chaliers","gps":"","images":["../image/image_15/15_Longevialle_1.jpg","../image/image_15/15_Longevialle_2.jpg","../image/image_15/15_Longevialle_3.jpg","../image/image_15/15_Longevialle_4.jpg"]},"Consult_chateau_formulaire6ebd":{"id":"Consult_chateau_formulaire6ebd","dept":"15","canton":"Riom ès montagne","commune":"Lugarde","nom":"Lugarde","type":"Vestiges","periode":"XI","histoire":"LUGARDE,   appartenait au seigneur Maurin du Breuil. Il était situé à 500 m du bourg actuel. Au XVIe siècle, le seigneur du lieu était le vicomte dEstaing, également seigneur de Murol. Vers la Révolution, le château qui appartenait au marquis de Chavagnac servait de lieu de réunion à la conférence dite de Lugarde qui rassemblait annuellement les prêtres de la région. Un village, la Griffoul, à 4 km, possédait sa seigneurie. Le seigneur de « la Griffoul et autres lieux » habitait un petit château qui est devenu maison de ferme et dont les boiseries ont disparus sous les tas de  terre. La façade a été restaurée par lactuel propriétaire. Elle est en basalte apparent et remarquable. Avant la Révolution, le seigneur sappelait Monteil, et de 1743 à 1789, un de ses frères était curé de Saint-Amandin. Ce curé fut prêtre réfractaire et revint mourir à la Griffoul, chassé par un remplaçant ayant prêté le serment. La famille Monteil a traversé la Révolution sans problème et pendant un siècle, jusqu'en 1870, lun de ses membres fut maire de Lugarde.","architecture":"vestiges du château qui  gardait la vallée de la Santoire, rivière aux gorges étroites et abruptes , le Comptour dApchon, précieux auxiliaire du Roy de France pendant la guerre de cent ans dont le chroniqueur Froissard cite souvent le nom.  Le château devait dater du XIe ou XIIe siècle. La commune de Lugarde était autrefois une seigneurie, avec un château fort qui a été détruit au début de la Révolution. Il reste encore des ruines laissant deviner la forme du château. Malheureusement, ces ruines nont pas été classées.","habitants":"Seigneur Maurin du Breuil\r\n        \"","divers":"Vestiges de Lugarde","gps":"","images":["../image/image_15/15_Lugarde_1.jpg"]},"Consult_chateau_formulairec92e":{"id":"Consult_chateau_formulairec92e","dept":"15","canton":"Ydes","commune":"Madic","nom":"Madic","type":"Vestiges","periode":"XIII","histoire":"MADIC, le fief entre dans la famille de Chabannes par le mariage de Gaillarde, fille de Géraud de Mazic, avec Hugues de Chabannes, co-seigneur de Charlus, qui est tué en 1415 à Azincourt.\r\nC'est Gilbert de Chabannes, gouverneur très fortuné, qui fit reconstruire le château entre 1469 et 1480, utilisant pour diriger les travaux son homme d'affaires Blandin Bompart, seigneur d'Auzers, ce qui vaudra à ce dernier d'être dispensé du ban en 1470 par Louis XI. Joachim de Chabannes naquit à Mazic en 1502. Il fit sculpter les armes de la maison de Foix avec celles des Stuart, des Médicis, de Bourbon-Vendôme et de la Tour d'Auvergne. Il était aussi seigneur en Auvergne et Mimousin de Tinières, de Charlus, d'Aurières, de la Roche-Marcalam.\r\nLe 10 juillet 1794, le site du château de Madic a été vendu  comme bien d'immigré. De retour de l'immigration en 1802, Jean-Frédéric de Chabannes est parvenu à racheter, mais le dernier était à un nommé Verneghol qui ne voulut rien savoir. Il revendit donc  à un marchand de biens, qui dut récupérer et l'a revendu à Antoine Gilbert.","architecture":"Vestiges du château de Madic, sur les soubassements de l'ancien château et ne conservant que la tour Saint-Yves   qui s'écroula qu'une trentaine d'années avant la Révolution, Gilbert de Chabannes en fait construire un autre aux environs de 1470. C'était une véritable forteresse avec d'énormes tours dont les murs avaient plus de 3 mètres d'épaisseur, des embrasures y étaient ménagées pour permettre de les garnir de canons. C'est par un pont-levis jeté sur le fossé qu'on avait accès à cette forteresse. A proximité des vestiges un autre château à Madic  c'est construit quadrangulaire se compose d'un corps de logis à trois niveaux avec pavillons carrés sur les angles, en façades d'entrée balcon au 1er et au 2e étage avec fronton en toiture.","habitants":"Géraud Ier de Madic                                                                           Famille de Chabannes\r\n        \"","divers":"Vestiges de la forteresse de Madic et nouveau château","gps":"","images":["../image/image_15/15_Madic_1.jpg","../image/image_15/15_Madic_2.jpg","../image/image_15/15_Madic_3.jpg","../image/image_15/15_Madic_4.jpg","../image/image_15/15_Madic_5.jpg","../image/image_15/15_Madic_6.jpg"]},"Consult_chateau_formulairefa1b":{"id":"Consult_chateau_formulairefa1b","dept":"15","canton":"Riom les montagne ou Mauriac","commune":"Maellet","nom":"Maellet","type":"Château","periode":"XIII-XVI","histoire":"trois châteaux à Maéllet, celui de Courdes ruiné, celui de l'Herm ruiné et celui de Montbrun.                                                      MAELLET, vont, avec le temps, voir s'élever citadelles et tours de guet. Ainsi Courdes, sur lequel on trouve encore les restes d'un ancien château, propriété en 1391 de la maison de Marlat. Les seigneurs de Courdes se succèdent et le fief finit entre les mains de Jean Lizet, maître drapier de Salers, au début du XVI e siècle. Ce dernier, bourgeois, entend bénéficier d'avantages qui lui confèrent son nouveau rang de seigneur et les nobles du cru voient d'un mauvais oeil les prétentions de l'arrivant. Deux familles émergent des fiefs entourant le village, les Montbrun et les Montclar, noms illustres fortement ancrés dans l'histoire féodale.                MONTBRUN,  la baronnie de Montbrun a appartenu, dans lorigine, à la famille de Grossaldet, qui s'éteignit au XIVe  siècle dans la personne de Marguerite, fille unique de Géraud de Grossaldet. Marguerite avait épousé, en 1298, Raymond III d'Escorailles, et de son mariage était issue une fille, Marguerite d'Escorailles, qui hérita de cette seigneurie et la porta, en épousant Bernard de Montclar, bailli des montagnes et gouverneur des terres d'Henri de la Tour, évêque de Clermont, dans la maison de Montclar,  et a appartenu à la même famille, les Montclar, jusqu'en 1789.  Ce n'était donc pas la demeure d'un comte ou d'un duc mais d'un vassal, possesseur d'une châtellenie.\r\nCOURDES, au sommet d'une colline, les restes d'un ancien château qui fut le chef-lieu d'un fief relevant de la châtellenie de Saignes","architecture":"Le château de Montbrun fut construit pour défendre la vallée du Mars. C'est sûrement une élévation de la tour que l'on rencontre souvent au XIIIe siècle suite à l'amélioration de la puissance de jet des arcs. Les pierres sont taillées grossièrement, même les angles qui sont d'habitude très soignés. Cela prouverait du peu de richesse dont disposait le seigneur ayant fait construire cette tour. Après une destruction par les Espagnols en 1452, il est reconstruit. En 1683, un état des lieux décrit le château avec un donjon crénelé et plusieurs tours. La tour comporte deux entrées. Celle du bas est récente. La véritable porte est   située entre 4 à 6 mètres du sol, uniquement accessible par une échelle extractible. C'est classique pour une tour de replie. L'intérieur est très bien meublé avec une salle d'archive. En 1756, le château est abandonné. Montbrun commence à se dégrader ; en 1789, il est partiellement ruiné et ne contient plus aucun meuble. Le logis fut reconstruit au début du XIXe siècle.                                                                                      Herm village. On remarque près de l'Herm, au sommet d'une colline, les ruines d'une tour carrée construite au XIIIe siècle avec des blocs de pierre d'une si grande dimension qu'on est amené, en les voyant, à se demander quels ont pu être les moyens employés pour les transporter sur cette hauteur pour les mètrent en place.","habitants":"Famille  d'Escorailles\r\n        \"","divers":"Château de Montbrun à Maellet","gps":"","images":["../image/image_15/15_Maellet_1.jpg","../image/image_15/15_Maellet_2.jpg"]},"Consult_chateau_formulaire5083":{"id":"Consult_chateau_formulaire5083","dept":"15","canton":"Riom ès montagnes","commune":"Riom ès montagnes","nom":"Marcenat","type":"Château","periode":"XII-XIX","histoire":"MARCENAT, AUBIJOUX, était une seigneurie très-considérable, puis une baronnie. Hugues d'Amboise, marié en 1 181; Madeleine d'Armagnac, prit le titre de baron dAubijoux. Cette seigneurie fut érigée en comté, en faveur de Jacques d'Amboise, marié à Françoise de Biragues,  sans enfant et fut tué à la bataille de Coutras, en 1587. Son frère, François, chevalier de Malte, épousa Louise de Lévy, et leur fils mort en 1656, sans enfant, fut le dernier rejeton mâle de cette illustre famille. Elisabeth d'Amboise, sa sur, mariée en 1645 à Louis de Bermont du-Caylar-de-Toiras, devenue comtesse d'Aubijoux par la mort de son frère, lui porta cette seigneurie. Marie-Elisabeth de Bermont-de-Toiras, héritière d'Aubijoux, la porta en mariage, en 1715, à Alexandre de la Rochefoucaud, duc de la Roche-Guyon et pair de France. Il resta longtemps dans cette famille, Alexandrine-Louise de Roban-Chabot, veuve et héritière de Jean-Baptiste de la Rochefoucaud, duc d'Auville, lieutenant-général des armées navales, épousa en seconde noce le comte Boniface de Castellane, (1867-1932), qui épousa Anna Gould et fit construire le palais rose de l'avenue Foch à Paris, pair de France. Devenue une seconde fois veuve sans enfants, elle partagea, par son testament, la seigneurie d'Aubijoux et du Luguet entre la maison de Rohan et le marquis Henri de Castellane, député du Cantal, petit-fils de son mari, mort, comme nous l'avons dit, dans un âge peu avancé  et le dernier des barons d'Aubijoux. Félix Rastout, propriétaire des lieux.","architecture":"Château d'Aubijoux construit au XIXe siècle à proximité du vieux château éponyme. Vestiges d'un château dit d'Aubijoux, les quatre châteaux successifs et leurs occupants qui ont façonné l'histoire de la région, depuis la première construction en 1008 par Robert 2 Le Pieux jusqu'au manoir actuel. Cette belle propriété a été démembrée, et toutes les terres, montagnes, etc. qui la composaient, vendues en détail par l'une et l'autre famille. Il n'existe plus aujourd'hui de terre d'Aubijoux.                                    Château de Castellane, aujourd'hui détruit.","habitants":"Seigneurie d'Aubijoux\r\n        \"","divers":"Vestiges du château de Castellane et château à Marcenat","gps":"","images":["../image/image_15/15_Marcenat_1.jpg","../image/image_15/15_Marcenat_2.jpg","../image/image_15/15_Marcenat_3.jpg","../image/image_15/15_Marcenat_4.jpg","../image/image_15/15_Marcenat_5.jpg"]},"Consult_chateau_formulaired293":{"id":"Consult_chateau_formulaired293","dept":"15","canton":"Maurs","commune":"Marcolès","nom":"Marcolès","type":"Château","periode":"XVI","histoire":"Trois châteaux sur la commune de Marcolès  la Folat, du Poux et de la Moréthie.                                                                           MORETHIE, de la famille de Séguy à celle des Conquans. et la  Tour auberge, lorsque Louyse de Séguy épousa Pierre-Béranger de Conquans, en 1656, elle lui apporta le château de La Moréthie, situé sur les plateaux environnant la petite ville de Marcolès, dans lequel ils allèrent dorénavant vivre.  La famille de Conquans, entre les murs de son château,  tout en gardant sa noblesse, n'a pas cessé de s'appauvrir au fil du temps.   Lieu de naissance du général d'Estaing, général de Napoléon I, mort en duel, nom inscrit sur l'Arc de Triomphe de l'Étoile à Paris.                                           POUX, au XVIe siècle, le domaine du Poux était détenu par le seigneur de Béthune et avait été pris par les huguenots, le château appartenait alors au seigneur de Pesteils. En 1602, Hector de Cazes était seigneur du Poux. Cette terre passa ensuite dans la famille de Veyre. Jacques de Veyre en était seigneur en 1666. Cette propriété échut à de Veyre, abbé de Beaulieu. Marie de Fortisson, son héritière, porta le domaine en mariage au marquis Henri de Montlezun, seigneur de Belplan, qui vendit le Poux à Guillaume d'Humières ainsi que plusieurs domaines. Le château du Poux appartient encore à cette famille qui y réside souvent.\r\nFAULAT , appartenait à la famille de Méallet qui en avait pris le nom,","architecture":"Mercolès,  ville fortifié lieu d'un vicus où Saint Géraud d'Aurillac venait rendre la justice, \"die Mercoris\", près d'un ancien lieu de culte païen,, médiéval, typique du sud Cantal, construit de pierres de granit et couvert de tuiles canal ou de lauzes. Il subsiste deux portes médiévales qui donnent accès à la rue Longue, et une poterne. Le bourg a gardé sa typologie de l'époque médiévale, avec un parcellaire très serré, et des petites ruelles, les Carrieroux. \r\nLe château de la Morétie, ancien château-tour englobé dans une construction plus récente.\r\nChâteau du Poux, Il a été restauré et très embelli depuis quelques années et des eaux vives font l'ornement de ses jardins, sa vue s'étend sur un vaste horizon. de plan rectangulaire  à rois niveaux et attiques avec lucarnes par tranches sur toits brisée à la Mansart.\r\nLa Roque, sur le chemin de La Morétie, lieu où serait né Jean de Roquetaillade aujourd'hui transformé en ferme.","habitants":"Famille de Conquans                                                                              Famille de Veyre\r\n        \r\n        \"","divers":"Porte à Marcolès et château de la Morétie, du Poux et la Roque.","gps":"","images":["../image/image_15/15_Marcoles_1.jpg","../image/image_15/15_Marcoles_2.jpg","../image/image_15/15_Marcoles_3.jpg","../image/image_15/15_Marcoles_4.jpg","../image/image_15/15_Marcoles_5.jpg","../image/image_15/15_Marcoles_6.jpg","../image/image_15/15_Marcoles_7.jpg"]},"Consult_chateau_formulaire52a2":{"id":"Consult_chateau_formulaire52a2","dept":"15","canton":"Murat","commune":"Joursac","nom":"Mardogne","type":"Vestiges","periode":"XII","histoire":"MARDOGNE,  Pierre-Ithier de Bréon, seigneur de Mardogne, vivait en 1066. Armand de Bréon fut un des seigneurs d'Auvergne qui se croisèrent en 1102. Autre Armand de Bréon, par le mariage de Françoise, dame de Mardogne, avec Maurin de Bréon. Ithier de Bréon n'ayant eu que des filles, partagea sa succession entre elles en 1280. Ithier III de Bréon en devint seigneur. Maurin III de Bréon, en 1338, eut ses fourches patibulaires renversées par les gens de Bertrand de St-Nectaire; le roi ordonna de les rétablir.  Maurin n'eut qu'une fille, Dauphine de Bréon, dame de Mardogne, qui porta cette terre dans la maison de Tinières, par son mariage avec Guillaume de Tinières. Cette famille la conserva longtemps. Il y eut un conflit, en 1447, entre Antoinette de Tourzel, veuve de Guillaume de Tinières, comme tutrice de Jacques de Tinières, son petit-fils, et Claude de Vissac, mari de Marguerite de Tinières, héritière en partie de Mardogne. Jacques de Tinières n'eut qu'une fille nommée Jeanne, qui fut mariée, en 1477, à Germain de Foix. Dans cette famille Joseph de Foix, seigneur de Mardogne, n'ayant pas eu d'enfants de Françoise de Lastic, fille de Thibaud, seigneur de Lastic et de Rochegonde, la fit héritière en 1580. Il en avait eu une fille nommée Gabrielle, mariée avec le comte d'Apchier. Françoise de Lastic épousa en seconde noce Jean de La Guiche, seigneur de Bournoncles ; il n'y eut encore qu'une fille, mariée avec Louis de Larochefoucault. Cette terre fut vendue d'un commun accord à Juan Dufour de Villeneuve, qui la revendit aussi le même jour au prince de Conti, et réunie au duché de Mercur. Ce prince la revendit encore au roi Louis XV, en 1770. Elle fit partie ensuite de l'apanage du comte d'Artois; mais le roi la retira par édit de 1778.","architecture":"Château de La Mardogne, château érigé aux XIIe et XIIIe siècles ne subsistent que quelques ruines, suite à l'incendie de 1720 et à la réutilisation des matériaux par les habitants. Ces ruines consistent en un donjon avec un des quatre maîtres murs, une cave voûtée, des pans de quatre murs principaux au milieu desquels était une cour et une tour carrée avec deux voûtes intactes superposées l'une à l'autre. Chaque étage comprend une pièce. Une citerne cimentée avec de la chaux et de la tuile pilée se trouvait dans la cour du château. Subsiste le grand mur d'enceinte en partie avec son chemin de ronde. Contrairement à ce qui existe dans les tours-donjons de la région, la tour de Mardogne a sa porte d'entrée au rez de chaussée et non au niveau de l'étage. Louis XIII érigea cette belle seigneurie en marquisat; mais les lettres n'en furent pas enregistrées au parlement. Louis XV établit à Mardogne, en 1781, une prévôté royale.","habitants":"Famille d'Armand de Bréon\r\n        \"","divers":"Vestiges de la forteresse de Mardogne à  Joursac","gps":"","images":["../image/image_15/15_Mardogne_1.jpg","../image/image_15/15_Mardogne_2.jpg","../image/image_15/15_Mardogne_3.jpg","../image/image_15/15_Mardogne_4.jpg","../image/image_15/15_Mardogne_5.jpg","../image/image_15/15_Mardogne_6.jpg","../image/image_15/15_Mardogne_7.jpg"]},"Consult_chateau_formulairee2a3":{"id":"Consult_chateau_formulairee2a3","dept":"15","canton":"Naucelles","commune":"Marmanhac","nom":"Marmanhac","type":"Château","periode":"XVII-XVIII","histoire":"Plusieurs châteaux à Marmanhac celui de la Broisse, de d'Estang du XVIIe siècle,  de Sedaignes du XVIIIe siècle (voir article) et de Roquenatou.                                                                                          BROISSE petit château. Une particularité singulière, c'est qu'il fut compris dans le testament de saint-Géraud et donné par lui à Amalfred, fils de Galamon. Antoine-Louis d'Estaing le possédait en 1551. Il resta dans la famille d'Estaing jusqu'en 1707. Il vint ensuite à la famille de Cambolas, et appartient aujourd'hui a M. de Parieu, maire d'Aurilac. Aujourd'hui chambres d'hôtes                    ESTANG, appartient au XIIIe siècle à Jehan Malpel et à sa famille jusqu'au mariage en 1321 d'Alix Malpel d'Estang avec Géraud Vigneroux dont la famille va conserver Estang jusqu'à Antoine-Louis d'Estang, qui décède avant 1743 en laissant comme veuve et héritière Guillemette Green de Saint-Marsault qui se remarie en 1753 avec Jean-Joseph de Scorailles qui décède aussi sans postérité en 1774. En 1820 Louis Geneste, notaire royal à Aurillac, est propriétaire d'Estang qu'il lègue à son fils Jean-Baptiste Geneste (1764-1844), lieutenant particulier civil au présidial d'Aurillac, qui épouse Françoise Grognier, fille de Louis-Furcy Grognier (1777-1832). Un de leurs fils, Émile Geneste, sera maire d'Aurillac.\r\nROQUENATOU, Place forte importante durant l
