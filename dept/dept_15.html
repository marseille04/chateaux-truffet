 la famille de Peyre, apparaît. Désormais, le prénom sera suivi de \"Peyre de Pierrefort\" puis uniquement de \"Pierrefort\". Guillaume de Peyre de Pierrefort est le premier à s'appeler ainsi. Il est cité en 1250. Le village de Pierrefort s'est développé autour d'un rocher de basalte que surmontait une impressionnante forteresse, aujourd'hui disparue, mais qui lui a donné son nom À l'origine, la terre de Pierrefort appartenait à Astorg de Curiole et Bernard Jurquet, qui étaient de la famille d'Oradour. En 1050, l'héritière des Jurquet épousa Astorg de Peyre. La terre passa entre les mains des seigneurs de Peyre, originaires du Gévaudan. C'est à ce moment là que naquit le Fort des Peyre, donc le village de Pierrefort. La présence de la famille de Peyre sur les terres de Pierrefort fut confirmée en 1177 par la donation de plusieurs droits sur le hameau de Fraissinet (près d'Oradour) au monastère de Bonneval par Guibert de Peyre. Au début du XVIe siècle Bertrand de Pierrefort meurt sans postérité. Sa veuve donne la baronnie à René d'Hérail, son neveu. En échange, celui-ci prend le nom et les armes des Pierrefort.","architecture":"Le village de Pierrefort s'est développé autour d'un rocher de basalte que surmontait une impressionnante forteresse, aujourd'hui disparue, mais qui lui a donné son nom d'origine. Cela se passe en parallèle de la construction du château. Sa situation privilégiée sur un éperon basaltique et entouré de grosses murailles, le rend imprenable jusqu'au XVIIe siècle.","habitants":"Famille de Pierrefort\r\n        \"","divers":"le fort de Pierrefort","gps":"","images":["../image/image_15/15_Pierrefort_Fort_1.jpg","../image/image_15/15_Pierrefort_Fort_2.jpg","../image/image_15/15_Pierrefort_Fort_3.jpg","../image/image_15/15_Pierrefort_Fort_4.jpg"]},"Consult_chateau_formulaire1a53":{"id":"Consult_chateau_formulaire1a53","dept":"15","canton":"Saint-Paul des Landes","commune":"Omps","nom":"Plaze","type":"Château","periode":"XVIII","histoire":"PLAZE, le château de La Plaze, du XVIIIe siècle,  appartient à la famille Jalenques, le château-forteresse qui appartenait depuis le XVIe siècle à la famille La Plaze. Par héritage la Plaze devient la propriété de Pierre-Guillaume dHauterives dans les années 1780. Il décide en 1783 de reconstruire le château alors fort délabré.  Cest lédifice actuel, il est d'une expression  style classique, tel quil est répandu en Auvergne dans les années précédant la Révolution. Il diffère peu de réalisations architecturales dautres provinces. On peut évoquer notamment, la charmante demeure de Georges Sand à Nohant.","architecture":"La Plaze de la fin du XVIIIe siècle qui se présente comme une demeure de style classique, sur une terrasse dominant un jardin en gradin. Le logis en avant corps central est encadré de deux pavillons de communs plus bas. Une grange de vastes dimensions s'allonge du côté ouest. A l'intérieur tous les décors du XVIIIe siècle ont été conservés. il est conçu sur un plan rectangulaire, prolongé à chaque extrémité par une aile en léger retrait. Du côté de larrivée, il souvre sur une cour tandis que lautre face domine des jardins en gradins. Il est lui-même placé sur une terrasse. La façade est animée en son milieu par un avant-corps surmonté dun fronton que lon retrouve dans dautres demeures de lépoque. Le corps de logis est à deux niveaux. Le second étage présente un \"oculus\" ovale. La couverture est à la Mansard en lauzes de chiste. Elle est percée dune rangée de fenêtres et de lucarnes. Lintérieur est parfaitement adapté à la réception, avec des pièces en enfilades, un vestibule à litalienne, et un grand salon. Quelques vestiges de lancienne demeure subsistent. Le château de La Plaze a conservé les décors des XVIIIe et XIXe siècles parfaitement authentiques et représentatifs dune demeure de plaisance cantalienne.","habitants":"Famille Jalenques\r\n        \"","divers":"Château de la Plaze à Omps","gps":"","images":["../image/image_15/15_Plaze_1.jpg","../image/image_15/15_Plaze_2.jpg"]},"Consult_chateau_formulaire2add":{"id":"Consult_chateau_formulaire2add","dept":"15","canton":"Neuvéglise","commune":"Loubaresse","nom":"Pompignac","type":"Forteresse","periode":"XIV","histoire":"POMPIGNAC, près de Loubaresse, est une haute et puissante forteresse, de Gaspard de Scorailles, il épousa en première noce  Antoinette de Marcenat \"dame de Pompignac\" qui lui apporte en dot une partie de la seigneurie.Château construit en 1342 par le comte d'Armagnac. En 1585, il transige avec François d'Apchier pour avoir l'autre partie. Ainsi  d'achats en alliances se constitue la seigneurie de Pompignac au profit des Roquelaure en la personne de Gaspard de Roquelaure, seigneur de Montchanson et de Chaliers, de Pompignac, de Laval et autres places. En 1689, Claude-Gabriel de Roquelaure, seigneur de Pompignac et de Laval, est maintenu en noblesse. Suite à plusieurs alliances roturières, le domaine entra en 1760 en possession de Jean-Baptiste Lamouroux, riche négociant de Saint-Flour qui épousa Madeleine, la dernière héritière. A sa mort, son fils cadet Pierre Lamouroux de Pompignac garda le château et le domaine. En 1794, l'ingénieur du district de saint-Flour ordonna la démolition des mâchicoulis qui faisaient le tour de la bâtisse. L'idéologie révolutionnaire souhaitant voir abattre ces vestiges de la féodalité. Le rapport de l'époque montre que le château était alors très bien conservé.   Toujours transmis par héritage  il appartient à madame P. Planchard.","architecture":"Pompignac qui doit son nom au château  du XIVe siècle dont il ne subsiste qu'une tour de guet de six étages en basalte, toiture en croupe, l'austère donjon carré flanqué de deux tours rondes décapitées en 1793 garde la mémoire d'un Pompignac enfermé par Louis XI dans une cage de fer. Deux tourelles ont été rasées au niveau du corps de logis en 1790, ainsi que le chemin de ronde. Le plan présente un grand rectangle flanqué de tourelles sur  deux faces opposées, l'une renferme un escalier, l'autre permet l'accès aux latrines, l'intérieur comprendrait des salles voûtées et de grandes cheminées. Le château de Pompignac est classé au patrimoine culturel de France.","habitants":"Famille de Gaspard de Scorailles\r\n        \"","divers":"La tour forteresse de Pompignac.","gps":"","images":["../image/image_15/15_Pompignac_1.jpg","../image/image_15/15_Pompignac_2.jpg","../image/image_15/15_Pompignac_3.jpg","../image/image_15/15_Pompignac_4.jpg"]},"Consult_chateau_formulaired2ce":{"id":"Consult_chateau_formulaired2ce","dept":"15","canton":"Saint-Paul des Landes","commune":"Cros de Montvert","nom":"Pénières","type":"Maison forte","periode":"XV","histoire":"PENIERES,  en 1561 à la famille de Gontaud-Biron acquit par Antoine de Noailles, ambassadeur de Charles IX à Londres. Pénières deviendra pour les Noailles jusqu'au XVIIIe siècle une prestigieuse résidence en particulier appréciée d'Henri de Noailles (1554-1623). Son fils Charles, né le 25 juillet 1589 à Pénières, fut évêque de Saint-Flour puis de Rodez, son frère François, 1584-1645, lieutenant général du haut pays d'Auvergne et ambassadeur de Louis XIII auprès du pape à Rome. Jean-Baptiste de Noailles,  bâtard d'Henri,  fut abbé. Il résidait à Pénières et y mourut le 6 janvier 1673. Louis-Antoine, fils d'Anne, premier duc de Noailles et de Louise Boyer, naquit au château en 1651, un an après son frère le futur maréchal Anne-Jules de Noailles, 1650-1708. Evêque de Cahors en 1679 puis de Chalon-sur-Saône en 1680, Louis XIV le préfère à Bossuet et Fénelon pour être archevêque de Paris en 1695. Cinq ans plus tard le roi le fera cardinal, il le restera jusqu'à sa mort en 1729 malgré l'affaire avec les jansénistes qui faillit lui faire perdre son titre d'archevêque et de cardinal.  Le neveu du cardinal, Adrien Maurice, duc de Noailles et maréchal de France, exilé de la Cour vient s'établir à Pénières en 1722 et 1723 puis y fit un séjour dans les années 1750. Son petit-fils, Paul-Louis de Noailles, 1739-1824, en hérita en 1766 lorsque son père devint 4e duc de Noailles. Ce fut le dernier propriétaire de Pénières, il était le beau-père du marquis de Lafayette, héros de l'indépendance américaine. Il échappa à la guillotine pendant les journées troubles de septembre de 1792. Une chance que n'eurent pas sa mère, son épouse, sa fille et nombre de ses parents. Ainsi sept générations de cette grande famille se succéderont à Pénières de 1561 à 1791, année où  tout le domaine est saisi puis vendu comme bien national par le citoyen Antoine Bordes, commissaire du district dAurillac. lors de la vente, le château fut morcelé entre plusieurs acquéreurs. Le château est resté au duc de Noailles et de son fils Emmanuel, duc d'Ayen.","architecture":"En 1807, le château de la Pénières est ravagé par un feu dont les origines divergent, selon certains, une verrerie qui s'y était installée sans les précautions que nécessite une telle installation et ce serait la fournaise nécessaire pour la vitrification qui aurait provoqué lincendie. Selon dautres, le feu y aurait pris naissance dans un brasier destiné à opérer une lessive générale. Quelle quen soit la raison, les flammes gagnèrent les appartements où elles trouvèrent des aliments à leur convenance dans les anciennes charpentes et boiseries. En 1825, le duc de Noailles sera dédommagé de la confiscation de son domaine de Pénières et du château dans le cadre de la loi \"du milliard des émigrés\".  En août 2009 une exposition à la salle polyvalente de Cros-de-Montvert, a retracé l'histoire de Pénières et fait découvrir à un public conquis et étonné que ce petit coin du Cantal était chargé d'histoire.","habitants":"Famille de Paul-Louis de Noailles\r\n        \r\n        \"","divers":"Château de Pénières avec ses tours à Cros de Montvert","gps":"","images":["../image/image_15/15_Penieres_1.jpg","../image/image_15/15_Penieres_2.jpg","../image/image_15/15_Penieres_3.jpg","../image/image_15/15_Penieres_4.jpg","../image/image_15/15_Penieres_5.jpg"]},"Consult_chateau_formulaire8a8f":{"id":"Consult_chateau_formulaire8a8f","dept":"15","canton":"Naucelles","commune":"Saint-Cernin","nom":"Rageaud","type":"Château","periode":"XV","histoire":"RAGEAUD, Jean de Reghaud, fait hommage en 1386 au seigneur de Tournemire, son fils: Guillaume de Raghaud, épouse en 1430 Claude de Ribier. Leur fils: Jean de Raghaud, seigneur qui épouse Yolande de Veyrières, dont une fille héritière: Marguerite de Reghaud, dame héritière, mariée après 1522 avec Jehan de La Garde de Saignes, seigneur de Messac. Son fils  Gilbert de La Garde, seigneur de Raghaud, teste en 1545, il est le père de: Marguerite de La Garde, dame de Raghaud, qui se marie à Saint-Cernin avec Gilbert de Corn, et de Jeanne de Vayrac, dame de Queyssac, son fils, Pierre de Corn, seigneur de Malaret et de Reghaud, se marie avec Claire de Gironde, Ils ont pour fille: Catherine de Corn, dame de Reghaud au moment de son mariage en 1726 à Saint-Cernin avec Henri II de Grenier de Pleaux, seigneur du Cambon. Ils ont deux fils, Henri III, seigneur de Pleaux, et Christophe de Grenier de Pleaux, seigneur de Cosniac, du Cambon et de Reghaud. Il se marie avec Marguerite de Courson,  deux filles: Marie qui  vers 1713 épouse Jean-jacques de Pouzols, et une autre qui devient religieuse au couvent du Buis à Aurillac. les Calonne,  originaire de Picardie, achète Raghaud en 1752.  Jean de Calonne d'Avesne, seigneur du Mesnil-Oudin, fait souche en Haute-Auvergne où il épouse à Saint-Cernin Jeanne Fortet, dame du Cros à Saint-Cernin. Il laisse trois fils: Philippe de Calonne,  Jean-Raymond , marié à Bonne-Charlotte de Saint-Chamans, qui devient seigneur du Cambon à Saint-Cernin, et  marquis de Cambon ; Jacques de Calonne.  Philippe de Calonne d'Avesne, seigneur de Raghaud, capitaine au régiment de Noailles-cavalerie, épouse en 1745 Marie-Julienne Rodde de Chalaniat, qui lui donne une fille, Marie-Marguerite, et un fils: Mathieu de Calonne, officier au régiment de Noailles, est seigneur de Raghaud. Il épouse en 1779 Marie-Marguerite-Ursule Mabit du Monteil, qui lui donne deux fils: Auguste de Calonne, comte, marié en 1813 avec Adèle Quarré de Château-Régnault d'Aligny, qui ne laisse pas d'enfants; Géraud de Calonne (1783-1850), marié à Marie Delzangles, qui laisse une fille: Uranie de Calonne d'Avesne (1828-1885), héritière de Raghaud, mariée en  1888 à Aurillac avec Jules Vimal des Prés (1859-1933).","architecture":"Le château de Raghaud date du XVe siècle, mais a été transformé jusqu'au XVIIIe siècle. Des XVe et XVIe siècles, reste le corps de logis flanqué aux angles d'échauguettes à mâchicoulis. Dans la première moitié du XVIIe siècle, construction de l'escalier d'angle en tour octogonale, orné d'une superposition de fenêtres à encadrements et frontons influencés par la Renaissance. Au XVIIIe siècle, une aile nouvelle est ajoutée à celle du XVe siècle. De la même époque datent deux petites dépendances formant deux pavillons au rez-de-chaussée, servant de cuisine et de communs. A l'intérieur, toutes les pièces sont demeurées intactes depuis le XVIIIe siècle. La pièce du rez de chaussée est ornée de boiseries Louis XV de caractère campagnard.","habitants":"Famille de Guillaume de Raghaud\r\n        \r\n        \"","divers":"Château de Rageaud à Saint-Cernin","gps":"","images":["../image/image_15/15_Rageaud_1.jpg","../image/image_15/15_Rageaud_2.jpg","../image/image_15/15_Rageaud_3.jpg","../image/image_15/15_Rageaud_4.jpg","../image/image_15/15_Rageaud_5.jpg"]},"Consult_chateau_formulaire07f3":{"id":"Consult_chateau_formulaire07f3","dept":"15","canton":"Vic sur Cère","commune":"Raulhac","nom":"Raulhac","type":"Château","periode":"XII-XVII","histoire":"Cinq châteaux à Raulhac, celui de Courbelimagne de la fin du XIXe siècle chambres d'hôtes, de Cropières du XVIIe siècle , de Messilhac (voir article) et du Puechmouriez vestiges château fort du XIIe siècle.                                                                                         CROPIERES, château féodal de plaisance, dont est originaire Marie-Angélique de Scorailles, duchesse de Fontanges (1661-1681), favorite du roi Louis XIV, il  lui donna le titre de duchesse de Fontanges,de 1508 à 1616.  le château est habité par les Cropières et les Montjou et les Scorailles de 1616 à 1746; Izarne de Valady de 1746 à 1906; Chefdebien depuis 1906, le château est resté dans la même famille depuis sept siècles. Louis Théodose, mort sans enfants, institua légataire universel son neveu : Jacques Antoine de Freyssinet de Valady (1746). L'abandon du château de Cropières fut l'une des conséquences de la Révolution de 1789. En 1793, et malgré les témoignages de fidélité efficace des deux fermiers successifs (Mondot et Bastide) le comte de Valady quitta Cropières et ne revint jamais y habiter. L'une de ses descendantes épousa le baron de Chefdebien Zagarriga.  toujours dans cette famille.\r\nPUECHMOURIEZ, après les Montjou, le château de Puechmouriez appartint à l'illustre famille des Montal, puis par acquisition et héritage, il revint à la famille de Fontanges de Cropières. Inhabité et mal entretenu, il se détériore peu à peu. Seule la vieille tour semble résister. Des travaux de consolidation ont été effectués par la municipalité de Raulhac en 1992, après que le dernier propriétaire, M. Christian de Chefdebien eut vendu la tour pour un franc symbolique à la commune de Raulhac. Il reste encore beaucoup à faire pour éviter une lente dégradation, ce dont la commune de Raulhac et la communauté de communes Cère et Goul en Carlades s'occupent actuellement.\r\nCOURBELIMAGNE, pas d'information historique, chambres d'hôtes.","architecture":"Cropières , ce superbe château  du XIIIe au XVIe siècle,  le château actuel ne ressemble en rien au premier château à l'architecture militaire et féodale qui est mentionné dès le XIVe siècle, . Abandonné de nombreuses années, ce château est en cours de restauration. L'ancienne forteresse fut totalement transformée, pour y faire une grande pièce de réception. Le roi offrit à sa favorite un très bel escalier extérieur, que l'on peut encore voir aujourd'hui. De l'ancien château féodal ne subsiste que la partie ouest de l'aile nord. À cet endroit le corps de logis nord conserve un important dispositif de maçonnerie entre les pièces voûtées qui pourrait être un vestige de la forteresse médiévale. En ce début du XXIe siècle, le château se développe en L autour d'une cour rectangulaire fermée à l'est par un portail flanqué de deux pavillons. L'aile ouest XVIIe siècle à un seul étage sur rez-de-chaussée occupé par les anciennes écuries, présente un escalier monumental qui aboutit à la terrasse bordée d'une superbe balustrade, au centre de laquelle, on peut voir un buste en piédouche figurant Louis XIV sous les traits du Dieu Mars. Au pied et de chaque côté de l'escalier se trouve un lion couché.                                   Courbelimagne de plan rectangulaire à trois niveaux et lucarnes flanqué sur les angles de tour rondes à quatre niveaux toitures en poivrières, prolongé sur sa droite d'un corps de logis rectangulaire à deux niveaux et lucarnes.  Puechmouriez, la  tour n'est que le débris d'un château fort , le plus fort des environs. Ce château était entouré de fossés, de retranchements, de jardins en terrasse, d'habitations voûtées,  vestige d'un ancien château  fort qui existait au XIIIe siècle, à la fin du XVIIe siècle il était qu'une \"masure inhabitable\".","habitants":"Marie-Angélique de Scorailles Duchesse de Fontanges\r\n        \"","divers":"Château de Cropières de Courbelimagne er les vestiges de Puechmouriez à Raulhac","gps":"","images":["../image/image_15/15_Raulhac_1.jpg","../image/image_15/15_Raulhac_2.jpg","../image/image_15/15_Raulhac_3.jpg","../image/image_15/15_Raulhac_4.jpg","../image/image_15/15_Raulhac_5.jpg","../image/image_15/15_Raulhac_6.jpg","../image/image_15/15_Raulhac_7.jpg"]},"Consult_chateau_formulaire3210":{"id":"Consult_chateau_formulaire3210","dept":"15","canton":"Naucelles","commune":"Reilhac","nom":"Reilhac","type":"Château","periode":"XII-XVI","histoire":"quatres châteaux à Reilhac dont celui de Reilhac du XIIe siècle , la tour de Brousette, celui de Messac du XIII -VIIIe siècles et de Tourloutou.                                                                                                       BROUSETTE construite vers 1335 par Eustache Fabri, puis par successions aux familles de Cayrac, de Veyre, de Roquemaurel, de La Garde de Saignes; à partir de la fin du XVIIIe siècle, il est ensuite possédé par la famille Delzons.  Alexandre Delzons (1800-1859), fils du général d'Empire Alexis Joseph Delzons (1775-1812), était président du tribunal d'Aurillac. Il a fait d'importantes études historiques sur la région d'Aurillac au Moyen-Age. Sa fille Aglaée, qui a passé son enfance à Broussette, a été la mère des trois frères Charmes : Francis Charmes, Xavier (1849-1919),  membre de l'Académie des sciences morales et politiques, Gabriel (1850-1886), brillant écrivain  nommé tuteur de ses neveux Delzons, Xavier s'occupa d'entretenir le parc de Broussette.\r\nMESSAC, il existait au XIIIe siècle une famille de Messac qui possédait le château du même nom. Messac était un fief dépendant des abbés d'Aurillac, puis des seigneurs de Conrot. La convocation aux bans de 1384, puis de 1533, indique que Messac-lez-Reilhac relevait du Carladès et des vicomte de Carlat. Famille de chevaliers, puis par succession aux familles du Crozet de Bellestat, de La Garde de Saignes, ensuite aux familles de Caissac, de Méallet de Fargues, puis Prax et Maitrier.                                   REILHAC  Pas d'information historique.                                TOURTOULON: ancien fief avec château qui a donné son nom à une famille de chevaliers dont un rameau a donné un des premiers militants occitanistes, Charles de Tourtoulon. Le logis de la fin du XVIe siècle a été construit par la famille Serieys qui l'a possédé depuis Antoine, bourgeois d'Aurillac qui achète le mas de Tourtoulou en 1465, jusqu'à Marguerite de Serieys mariée avec Philibert de Vigier qui le lègue à la famille Cambefort. Un oratoire y a été établi au deuxième étage vers 1740 par   Jacques Cambefort. Il est ensuite possédé pendant tout le XIXe siècle par la famille Durif.","architecture":"Brousette,  Tour carrée datée du XVe siècle comportant quatre étages voûtés dont l'accès se faisait avec un escalier extérieur en bois par une ancienne porte au second étage. La salle du premier étage, qui a une voûte ogivale, est accessible par une porte sur le linteau de laquelle se trouve la même inscription, en lettres gothiques cursives, que sur la porte d'accès à la tour de Pesteils:  Corps de logis rectangulaire du début du XIXe siècle.  Messac,  château avec ferme et nouveau lotissement, situés en contrebas du bourg. Le château de Messac est ancien, mais fortement remanié avec une tour ronde du XIIIe siècle qui était le siège d'une justice locale jusqu'au début du XVIIe siècle Le bâtiment se compose d'un corps de logis à trois étages carrés adossé au nord à une ancienne tour ronde. L'ensemble a été flanqué par la suite d'une petite aile en appentis avec une baie simple dont le linteau est en accolade et deux autres voûtées en anse de panier  ce qui date cette partie du XVe siècle. Le cadastre de 1800 ne mentionne pas l'aile et la tour carrée ajoutées au sud au début du XXe siècle. Reilhac il a disparu depuis longtemps; sa source a été canalisée pour alimenter Messac; Une borne milliaire de l'ancien chemin royal subsiste au niveau du col vers Jussac, mais elle a été déplacée de l'autre côté de la route pour faciliter l'accès au lotissement communal.","habitants":"Famille de Cayrac                                                                                    Famille du Crozet de Bellestat                                                                  Famille Cambefort\r\n        \"","divers":"Château de la Brousette  de Messac à Reilhac","gps":"","images":["../image/image_15/15_Reilhac_1.jpg","../image/image_15/15_Reilhac_2.jpg","../image/image_15/15_Reilhac_3.jpg","../image/image_15/15_Reilhac_4.jpg","../image/image_15/15_Reilhac_5.jpg"]},"Consult_chateau_formulaired598":{"id":"Consult_chateau_formulaired598","dept":"15","canton":"Neuvèglise","commune":"Jabrun","nom":"Requistat","type":"Château","periode":"XV","histoire":"REQUISTAT ,e fort, appelé Castelvallatus, était ruiné depuis longtemps, mais il existait un nouveau château habité en 1406 par Pons de Beaumont, seigneur de Beaumont en Vivarais qui en était seigneur. En 1532, le fief de Réquistat appartient à François d'Estaing, seigneur de Murol, puis à son fils Jean d'Estaing, vicomte d'Estaing, seigneur de Murol, Val , Cheylade.\r\nPersonne n'habite l'ancienne forteresse qui est à l'abandon et tombe en ruine. En 1590, un arrêt du parlement attribue les châteaux et fief de Réquistat à François Bourses  de Sainte-Geneviève, qui habitait non loin de Jabrun, au château de Montamat, à Chaudes-Aigues. En 1669, Réquistat est acquis par Jean d'Estaing, seigneur du Sailhant à Andelat, qui en dote sa fille : Marie-Anne d'Estaing qui l'apporte par mariage en 1693 à son fils : Philippe-Claude de Montboissier (1674 - 1765), lieutenant des armées du roi, fils Jean-Gaspard, seigneur de Dienne, qui le vendit à : Pierre Boissière, puis en 1743 à Jean  des Rozières, seigneur du Buisson, paroisse de Saint-Babel, qui le revendit le 18 septembre 1751 à Pierre de Tassy de Montluc (Saint-Flour 1721 - 1796), fils de Jean-François, et Jeanne Chalvet de Rochemonteix, subdélégué de l'Intendant d'Auvergne.","architecture":"Réquistat était d'abord un ancien prieuré, situé dans la montagne, loin du bourg de Jabrun, était un château important  anciennement connue sous le nom de Castrum vallatus et dont les ruines occupaient  une circonférence de plus, de 120 mètres.                                                            le nouveau château reconstruit comporte des tours rondes de meurtrières, de tourelles,et de cul de lampes appuyés au corps de logis de trois niveaux avec lucarnes et au donjon.","habitants":"Famille d'Estaing\r\n        \r\n        \"","divers":"Château de Réquistat à Jabrun","gps":"","images":["../image/image_15/15_Requistat_1.jpg","../image/image_15/15_Requistat_2.jpg"]},"Consult_chateau_formulaire6770":{"id":"Consult_chateau_formulaire6770","dept":"15","canton":"Saint-Flour","commune":"Oradour","nom":"Rochebrune_Oradour","type":"Forteresse","periode":"XII-XV","histoire":"ROCHEBRUNE,  a  appartenu en 1416 à la famille de Latour-St-Vidal,  Raucon de Latour, seigneur de Rochebrune, marié en 1410, fut sénéchal de la Marche. Pons de Latour fut ambassadeur en Hongrie, en 1519. Il remplit sa mission avec tant de distinction qu'il mérita les éloges des cardinaux d'Este et de Ferrare. André de Latour, fils  de Pons, servit longtemps pendant les guerres civiles. Il fut blessé, en 1575, d'une arquebusade. Dans son testament, il fit des dons considérables à l'église d'Oradour. Après sa mort, Rochebrune passa dans la maison de Montvallat. Jeanne de Montvallat, fille unique, en épousant Jean de Molen-la-Vernède, lui porta cette terre en dot en 1596.  Isaac de Molen n'ayant pas laissé d'enfants, ses surs Jeanne et Lucrèce devinrent propriétaires de Rochebrune.  Le château fut choisi en 1616, sous Louis XIII, par les rebelles, pour s'organiser contre le roi. Le prévôt les  débusqua. Peu après, la famille de Brugier hérita de cette seigneurie. Pierre de Brugier, conseiller du roi, la posséda en 1681. Amable, son fils, lui succéda en 1718. Il était pourvu de la charge de lieutenant général du bailliage, en 1734. Jean-Baptiste de Brugier, seigneur de Rochebrune et co-seigneur d'Oradour, périt dans l'émigration avec son fils unique. Le dernier titulaire nominatif fut l'abbé de Rochebrune, qui géra les affaires du diocèse pendant les temps les plus difficiles. On  parlé de lui à l'article des évêques de Flour. Rochebrune fut vendu nationalement en 1798. Il faut dire que Régis Langloys a tenu, de 1966 à 2001 une galerie d'art réputée, rue Saint-Honoré à Paris.","architecture":"Château forteresse de Rochebrune  du XIIe et XVe siècle, construit sur un rocher basaltique et restauré à diverses époques, sa construction paraît remonter au XVe siècle; mais une tour qui surmonte les autres bâtiments appartient à une époque plus reculée. Les créneaux ont été démolis en 1795. Des appartements voûtés occupent cinq étages.   Affichant une silhouette caractéristique de l'architecture féodale du Cantal dans le cadre de ses jardins en terrasses aux tracés classiques,","habitants":"Famille de Latour-St-Vidal\r\n        \"","divers":"Forteresse de Rochebrune à Oradour","gps":"","images":["../image/image_15/15_Rochebrune_Oradour_1.jpg","../image/image_15/15_Rochebrune_Oradour_2.jpg","../image/image_15/15_Rochebrune_Oradour_3.jpg","../image/image_15/15_Rochebrune_Oradour_4.jpg"]},"Consult_chateau_formulaire8e97":{"id":"Consult_chateau_formulaire8e97","dept":"15","canton":"Neuvéglise","commune":"Ruynes en Margerie","nom":"Ruynes_Margerie","type":"Château","periode":"XIII-XVII","histoire":"Quatre châteaux à Ruynes dont les vestiges du château, de Longevialle, de Ligonés et de Prades.                                          LONGEVIALLE, le château a été un écomusée de la paysannerie durant quelques années (1995-2001).  Le domaine a été racheté en juin 2001 par Jean-Yves de Longevialle (Petit-fils de Max, branche ainée), il retourne donc dans la famille. Il est en cours de restauration.\r\nPRADE, chambres d'hôtes,  Pas d'information historique.       LIGONES  pas d'informations historiques.                                       RUYNES, cité en  1119 de Ruynes,  appartenait aux Mercoeur. A la suite de la trahison du Connétable de Bourbon, François Ier le confisque et le revend à l'épouse d'Antoine de Lorraine, la sur du duc de Bourbon,  recouvre les biens familiaux en 1529  Renée de Bourbon  ni elle ni les Vendôme n'y résideront.    Anne Palatine  belle-mère de Louis-Joseph de Vendôme  vend le château en 1719 à John Law, qui aussitôt le rétrocède à Léon de Magdaley de Lesparre, cession annulé  en 1720 au profit du prince Conti. Le château est démembré en 1754 les terres reviennent à Charles Podevigne de Grandval. Louis XV rachète le château en 1773 pour son petit-fils, le comte d'Artois (futur Charles X), puis le cède au comte de Lastic en 1775 qui le garderont jusqu'à la Révolution. Le château à cette date se détériore il est cédé à la commune.","architecture":"Longeviale, le château actuel, sur le bord de la rive gauche de la Truyère, en grand fer à cheval prolongé de deux avant-corps, a évidemment été construit au début du XVIIIe siècle par Antoine Guérin I ou par son fils Antoine Guérin II, dont lécusson surmonte la porte des maîtres. Il est infiniment probable que, dès sa construction, une aile seulement leur servait dhabitation , le reste étant le logement du fermier et les écuries du bétail. Cette disposition était fréquente, pour ne pas dire habituelle, avant la révolution, les gentilshommes campagnards dans la période où ils nétaient pas au service du Roi et, en tout cas, leur famille, menant une vie très mêlée à celle des paysans, surtout dans les régions reculées et traditionalistes du Massif Central.     Au pied de la Tour de Ruynes-en-Margeride, vestige dun château du XIIe  siècle, sétend le patrimoine naturel de la Margeride. \r\nLigonés, composé d'un corps de logis rectangulaire à quatre niveaux et lucarnes toit en croupes, accolé d'une tour carrée à toit pointu  et d'annexe de dépendances flanquant le corps de logis.\r\nPrade, de plan rectangulaire à trois niveaux toiture en croupe en façade plein cintre pavillon d'entrée légèrement saillant avec fronton au niveau du toit.\r\nRuynes, confisqué par la commune sous la Révolution, il est démantelé, et ne subsiste plus que le donjon et quelques vestiges du rempart. Le monument fait lobjet dune inscription au titre des monuments historiques depuis le 18 décembre 1981.","habitants":"Charles Podevigne de Grandval\r\n        \"","divers":"Vestiges de Ruynes château de Longeviale  de Ligonès et de Prade","gps":"","images":["../image/image_15/15_Ruynes_Margerie_1.jpg","../image/image_15/15_Ruynes_Margerie_2.jpg","../image/image_15/15_Ruynes_Margerie_3.jpg","../image/image_15/15_Ruynes_Margerie_4.jpg","../image/image_15/15_Ruynes_Margerie_5.jpg","../image/image_15/15_Ruynes_Margerie_6.jpg","../image/image_15/15_Ruynes_Margerie_7.jpg","../image/image_15/15_Ruynes_Margerie_8.jpg"]},"Consult_chateau_formulaire8de2-2":{"id":"Consult_chateau_formulaire8de2-2","dept":"15","canton":"Arpajon sur Cère","commune":"Sénezergues","nom":"Réghaud","type":"Château","periode":"XIII","histoire":"REGHAUD, premier possesseur connus est un certain Reghaud, chevalier, auteur de le famille de Réghaud. Cette famille qui était fidèle au parti catholique a péri pendant les guerres de religion, et elle avait sa sépulture dans un monument situé près de l'église de Sénezergues. Le château a ensuite appartenu à la famille de Sénezergues, une branche bâtarde de la famille de La Rocque des seigneurs de Sénezergues. Guy de Sénezergues, seigneur de Réghaud, s'est marié  avec Jeanne de Ruir,  et en secondes noces avec Marie Buffamène, dont cinq enfants. Guillaume de Sénezergues, seigneur de Reghaud, marié en 1596 à Aurillac avec Philéberte Dulaurens, fille de François Dulaurens, vice-bailli de Haute-Auvergne et de Léone de Cayraol, dont sept enfants: Maître Jean de Sénezergues, avocat au bailliage et siège présidial d'Aurillac; Anne-Louise Réghaud de Sénezergues mariée en 1639 avec Louis Rougier, viguier d'Aurillac; Guillaume de Sénezergues, major de la ville de Salins en Franche-Comté, il eu un bras emporté à la guerre et fut anobli par lettres patente de Louis XIV. Il s'est marié avec Marie-Antoinette de La Grange et ils habitaient au château de La Rodde. François de Sénezergues, sieur de Longuesserre; Françoise de Sénezergues, mariée en 1624 avec François de Verdelon, et en 1638 avec Pierre de Boschâtel, seigneur de Lamartinie. Pierre de Sénezergues, sieur de La Boigue, marié à Jeanne Cipière, dame de Vayrac; Marguerite de sénezergues, mariée en 1654 avec François de Leygonie, seigneur de Rangouse.                                                                                         A quelques  kilomètres au Sud-Ouest à Cassaniouze le château de la Mothe, et de la Selve.","architecture":"Château de Réghaud  et ancien fief situé près du bourg, à flanc de coteau. Le bâtiment, de plan rectangulaire, est alors flanqué de 4 tours couronnées de mâchicoulis et de créneaux. Malgré quelques altérations lors de la Révolution, ainsi que le comblement des fossés, il présente aujourd'hui une silhouette proche de l'origine. La plus grosse tour est partiellement écroulée. L'accès au château s'effectue par un escalier jusqu'à une porte surmontée d'un écusson portant trois rocs d'échiquier, timbré d'une couronne mutilée en encadré de palmes. La partie inférieure des tours est voûtée en demi calotte sphérique. Le rez-de-chaussée du corps de logis est voûté sur croisée d'ogives. Dans la première moitié du XVe siècle une tour escalier octogonale, ornée d'une superposition de fenêtres à encadrements et frontons encore influencés par la Renaissance, a été ajouté à l'angle des deux bâtiments. Les deux petites dépendances formant deux pavillons au rez-de-chaussée, servant de cuisine et de communs, sont aussi du XVIIIe siècle, comme l'ensemble des décors qui sont restés intacte depuis cette époque. Les boiseries de la pièce du rez-de-chaussée sont d'époque Louis XV.","habitants":"Famille de  Guillaume de Sénezergues\r\n        \r\n        \"","divers":"Château de Réghaud à Sénézergues de la Mothe et de la Selve à Cassaniouze.","gps":"","images":["../image/image_15/15_Reghaud_1.jpg","../image/image_15/15_Reghaud_2.jpg","../image/image_15/15_Reghaud_3.jpg","../image/image_15/15_Reghaud_4.jpg","../image/image_15/15_Reghaud_5.jpg","../image/image_15/15_Reghaud_6.jpg","../image/image_15/15_Reghaud_7.jpg"]},"Consult_chateau_formulairef249":{"id":"Consult_chateau_formulairef249","dept":"15","canton":"Saint-Flour","commune":"Andelat_Roffiac","nom":"Sailhant_Roffiac","type":"Tour-Château","periode":"XV","histoire":"Château à Sailhant et tour sur la commune de Roffiac à quelques kilomètres au sud.                                                                         SAILHANT, de  la famille du Sailhans, en 1285, le château passa par mariage à la famille de Rochefort dAurouze.  En 1359, les Anglais ayant envahi l'Auvergne, s'emparèrent du château et le conservèrent plusieurs années. En 1398, Béraud Dauphin I de Saint-Ilpize, devint sire de Sailhant. Béraud fut nommé seigneur de Saint-Ilpize, Auroze, Combronde et de Sailhant. Puis Sailhant passa à Jacques dAmboise en 1503. Antoinette dAmboise le vendit à Anne Hénard, veuve dAntoine Dubourg, chancelier de France. Son fils Charles-Antoine Dubourg lui succéda dans la baronnie, il épousa Nicole dEndredieu. En 1594, le château fut pris par M. dEnghien et le duc de Genevois. Au XVIIe siècle, la fille de Louis Dubourg et de Jeanne de Lastic, Catherine épousa Jacques dEstaing et ramena le Sailhant à un descendant de lancienne famille.  A la fin du XVIIe et au début du XVIIIe siècle, Joachim-Joseph dEstaing était évêque de Saint-Flour. Etienne de Serre de St Roman acheta le Sailhant en 1753, le domaine resta dans la famille jusquen 1789.   Après la Révolution, le bailleur Jean-Baptiste Rongier, le racheta. A la mort de Rongier en 1816, sa famille vendit l'édifice à Pierre Laurier, un fermier. En 1881, les Laurier vendirent la propriété à Hippolyte-Mary Raynaud. Né de parent fermier en 1844 au pied du château. En 1873, il fonda une banque à Paris nommée: Banque dEtat. En 1888, Raynaud fut lheureux élu à la direction locale et débuta une restauration spectaculaire. En 1891, les travaux du Sailhant furent suspendus et fut vendu aux enchères à sa propre femme. Lors d'une nouvelle vente aux enchères du château en 1904, le docteur Paul Delbet remporta la vente. La veuve du docteur, Antoinette, épousa le comte Claret de Fleurieu qui décéda en 1945,  elle mourut en 1961.  En 1997, Joseph Pell Lombardi acheta le château cinq années de travaux de restauration qui ont été terminées en 2004.","architecture":"Sailhant, a remplacé les abris en bois par une tour carrée en pierres, indépendante et à plusieurs niveaux. A lavènement de la guerre de cent ans, on construisit deux tours du côté nord après la Révolution. Sailhant était en mauvais état, il offrait peu de confort et navait pas souffert de destructions directes, restauré au XIXe siècle, corps de logis rectangulaire  est flanqué de cinq tours rondes couronnés de mâchicoulis et coiffées en Poivrières et à l'extrémité  sur le donjon carré est le vestige d'un château antérieur sa tour carrée crénelée.                                                                          la tour de Roffiac du XVe siècle, vestiges d'un château disparu, subsiste une tour isolée datée du XVe siècle, et quelques pans de murs. elle joignait, au milieu de sa face méridionale, une tour semi-circulaire, la tour contient un escalier de pierre taillée, à noyau en spirale, comptant quatre vingt dix marches. Cet escalier s'ouvrait dans le château par huit portes, deux par étage. Le quatrième étage formait la salle de garde ou de veille, et donnait accès au chemin de ronde. Au niveau du quatrième étage, où s'arrête l'escalier, l'axe de ce dernier se déploie en gerbe aux arcatures rayonnantes dans la voûte et retombantes à la périphérie. Sept clés de voûte, appuyées hors arcatures, sont disposées entre ces rayons alternés.","habitants":"Famille de Jacques dEstaing \r\n        \"","divers":"Château de Sailhant et la tour de Roffiac à Andelat","gps":"","images":["../image/image_15/15_Sailhant_Roffiac_1.jpg","../image/image_15/15_Sailhant_Roffiac_2.jpg","../image/image_15/15_Sailhant_Roffiac_3.jpg","../image/image_15/15_Sailhant_Roffiac_4.jpg","../image/image_15/15_Sailhant_Roffiac_5.jpg","../image/image_15/15_Sailhant_Roffiac_6.jpg","../image/image_15/15_Sailhant_Roffiac_7.jpg","../image/image_15/15_Sailhant_Roffiac_8.jpg","../image/image_15/15_Sailhant_Roffiac_9.jpg"]},"Consult_chateau_formulaire4023":{"id":"Consult_chateau_formulaire4023","dept":"15","canton":"Mauriac","commune":"Salers","nom":"Salers","type":"Patrimoine","periode":"XII-XV","histoire":"SALERS, au XIe siècle, le pouvoir des seigneurs de Salers s'étendait sur la petite cité rassemblée autour d'un donjon, enserrée entre les paroisses de Saint-Paul et  Saint-Bonnet. A partir de 1550, la notoriété de Salers grandit grâce à la récupération par la ville du bailliage des monts d'Auvergne, retiré de Crévecur à Saint-Martin-Valmeroux, un tribunal royal qui fait s'installer de nombreuses familles aisées. C'est à cette époque que sont construites la plupart des demeures de pierre de lave qui entourent l'actuelle place Tyssandier d'Escous. La ville de Salers, essentiellement bourgeoise, va ainsi donner naissance à une noblesse administrative.  En 1666, le baron François de Salers fut destitué de son titre par la Haute Cour de justice de Clermont, pour avoir fait mettre à mort un de ses ennemis sur ses terres, sans avoir eu recours aux procédures royales. Le château fut alors rasé, et les droits de la baronnie rachetés par la famille de Scorailles, qui tint cette charge jusqu'à la Révolution Française. C'est après la seconde guerre mondiale que furent entrepris les grands travaux de modernisation de la commune, alors que M. Feniès était maire. Le couvent des surs de la compagnie de Notre-Dame fut rasé pour permettre l'édification du collège communal. La halle de la place de la mairie fut remodelée et on y installa la statue de Ernest Tyssandier d'Escous. La place Géraud Maigne fut créée à la suite du démembrement d'un pâté de maisons qui était au milieu, et l'esplanade de Barrouze perdit sa fontaine pour permettre de moderniser l'espace.","architecture":"À partir de 1428, la ville de Salers se fortifie dans sa partie haute. Les portes du Beffroi et de la Martille faisaient partie de ce système de défense qui comportait à l'origine quatre portes, dont l'une vers le chemin des Loups. La fortification était due à la lassitude des bourgeois d'être systématiquement pillés lors des incursions des routiers anglais. Ces murailles ne servirent jamais à leur fonction première mais furent salutaires un siècle plus tard.  à l'initiative du baron de Salers, Jean II, invoquant le crime de lèse-seigneurie, qu'il perdit au profit des bourgeois de Salers.                                    Hôtel de ville,  construction du  XVe siècle, la maison dite du Bailliage, ayant été la propriété de la famille Sevestre,   la maison de la famille Chazette de Bargues avec un balcon en pierre de lave du XVe siècle orné de sculptures.                                                                    La maison du commandeur de Mossier.                                                       La maison de la Ronade, une tour de 5 étages commande cette maison du XIVe siècle, dont les fondations datent du XIIIe siècle. Bâtisse de la famille du même nom, elle est aujourd'hui visitable et Philippe Garrigue, un descendant, est l'historien du village.                   la Ronade du XVI-XVIIe siècles,  l'hôtel consulaire du XVe siècle.               la porte du Beffroi et la porte de la Martille qui sont les derniers vestiges de l'ancien rempart médiéval.  Le beffroi de Salers, du XVe siècle, domine la rue commerçante du même nom, c'était l'un des quatre points d'accés de la cité.                                                Maison Bertrandy, elle possède une tour ronde et une très jolie porte.","habitants":"Baron François de Salers \r\n        \"","divers":"Salers, les portes, l'hôtel du Balliage, le beffroi, la maison de Bertrandy, La  Ronade, des Templiers et une maison du XVe siècle.","gps":"","images":["../image/image_15/15_Salers_1.jpg","../image/image_15/15_Salers_2.jpg","../image/image_15/15_Salers_3.jpg","../image/image_15/15_Salers_4.jpg","../image/image_15/15_Salers_5.jpg","../image/image_15/15_Salers_6.jpg","../image/image_15/15_Salers_7.jpg","../image/image_15/15_Salers_8.jpg","../image/image_15/15_Salers_9.jpg"]},"Consult_chateau_formulaire8504":{"id":"Consult_chateau_formulaire8504","dept":"15","canton":"Mauriac","commune":"Salers","nom":"Salers_Chateau","type":"Château","periode":"XVI","histoire":"Cinq châteaux à Salers celui de Jarrigues, celui de Jourdanie hôtel d'époque tel que la Bargues du XVIe siècle,  et le château de la Bastide. BASTIDE, de Pons de la Bastide, actuellement, cette grande bâtisse abrite un hôtel.                                                  JARRIGES,   noble Etienne de Jarriges eut pour héritier Jean Dubourg, seigneur de Malauzat, et Guillaume de St-Pardoux, qui vendirent Jarriges, en 1562, à François de Chalvet, seigneur de Freluc. Françoise de Chalvet, sa fille unique, porta cette terre en dot à Jacques Faye, seigneur Despesses. L'abbé de Langeron héritier, la vendit, vers 1718, à Claude Deschamps.  L'un des descendants de ce dernier la revendit à Marie de Mossier, veuve de Jacques-Antoine de Vigier. Cette propriété est aujourd'hui  transformé en hôtel.\r\nJOURDANIE, en 1537, il appartenait à Antoine de Chalvet, seigneur de Rochemonteix. Mathieu Chalvet, seigneur,  en 1582,  président au parlement de Toulouse,  vend   à Jacques Chalvet et Marguerite de Rigal sa femme. Ceux-ci  revendirent  en 1593 à Guy Dufayet, Seigneur du Fau. Ce nest quen 1664 que la famille Raffin de la Raffinie devint propriétaire,  à loccasion du mariage de noble Antoine de la Raffinie, Seigneur de lEstang, fils Guy Dufayet et sa femme Françoise de Mossier donnèrent tous leurs biens aux mariés. Les Raffin   étaient originaires du Rouergue, et furent maintenus nobles en 1666. Après cette famille, se furent les Lacombe, qui le transforma en  chambres d'hôtes.\r\nMOURIOL, exploitation agricole, auprès de laquelle se sont établis le camping municipal et un complexe hôtelier. Hôtel tel que Bargues du XVIe siècle.                                                                     RONADES,  du XVIe siècle, sa base pourrait remonter au XIIIe siècle, ce qui en ferait l'édifice le plus ancien de Salers. Elle a d'abord appartenu à la famille De Roquemaurel, avant de passer dans les mains des de La Ronade, auxquels elle appartient depuis le XIVe siècle. Ils en ont été privés quelques années pendant la Révolution Française. Période agitée où Donna Marguerite de Tournier d'Agullon veuve d'Antoine Ignace André de La Ronade, fut la seule femme du Cantal à être guillotinée à Aurillac le 4 Thermidor An II (24 juillet 1794), son portrait est visible dans la maison. Et l'hôtel consulaire du XVe siècle.","architecture":"Patrimoine de Salers,  depuis le siècle dernier, la maison Bertrandy est restée intacte extérieurement à l'exception de son escalier : son perron en pierre dont la balustrade forgée, heurtée maintes fois par les camions a cessé d'exister. Jarriges, il est mentionné une tour à l'extérieur qui menaçait de ruine. La maison du fermier était attenante au château. Il semblerait que l'actuelle maison de Jarriges corresponde à la description faite dans l'inventaire de 1784. Seule la tour a été ruinée.\r\nBastide de Salers, l'immeuble se compose de deux corps de logis rectangulaires. Le premier possède un étage au-dessus d'un rez-de-chaussée surélevé dont l'entrée se fait par une porte affichant le millésime 1666. Cette porte ouvre sur une cage d'escalier rectangulaire. L'escalier dessert l'ensemble de l'habitation. Le second corps de logis forme un décrochement en retrait sur le précédent au nord, et retour sur ce dernier au sud. Haut de deux étages, il est accosté au nord-ouest d'une tour circulaire. Cette façade occidentale est précédée d'une terrasse dont le mur de soutènement avait un rôle défensif. Ce mur est précédé d'une seconde terrasse en contre-bas, elle-même posée sur un premier mur de soutien.","habitants":"Famille de Pons de la Bastide                                                                    Famille de Claude Deschamps\r\n        \"","divers":"Salers; château de L'Aubos, la Bastide, les Jarrijes,la Jourdanie et de Flogeac","gps":"","images":["../image/image_15/15_Salers_Chateau_1.jpg","../image/image_15/15_Salers_Chateau_2.jpg","../image/image_15/15_Salers_Chateau_3.jpg","../image/image_15/15_Salers_Chateau_4.jpg","../image/image_15/15_Salers_Chateau_5.jpg","../image/image_15/15_Salers_Chateau_6.jpg","../image/image_15/15_Salers_Chateau_7.jpg","../image/image_15/15_Salers_Chateau_8.jpg","../image/image_15/15_Salers_Chateau_9.jpg"]},"Consult_chateau_formulaire1e8c":{"id":"Consult_chateau_formulaire1e8c","dept":"15","canton":"Naucelles","commune":"Marmanhac","nom":"Sedaignes","type":"Château","periode":"XV","histoire":"SEDAIGNES, repaire militaire dès le XIIe siècle, Sedaiges fut témoin et acteur des luttes franco-anglaises dans l'Auvergne médiévale. Pierre de Sedaiges, chevalier, vend en 1442 le domaine à Jean Calsac ou Caissac, riche bourgeois d'Aurillac. Raymond de Caissac obtient en 1452 des autres seigneurs de Marmanhac la permission de construire un château avec tours et mâchicoulis.\r\nMadeleine de Caissac épouse en 1729 Pierre Béral et apporte Sedaignes dans la famille  qui dès lors en porte le nom.  Le château n'a pas eu a souffrir de la Révolution bien que les deux fils du propriétaire durent émigrés, l'un deux Jean Joseph hérite de Sedaignes en 1809 à la mort de son père  maire de Marmanhac de 1813 à 1830,  il aura de son mariage avec Sophie de Veilhan six fils dont quatre serviront à l'armée. Sa petite fille Anne Matilde de Béral de Sedaignes, épouse en 1863 Georges Fumel de Sedaignes, descendant de la famille Béral devient propriétaire de Sedaignes et maire de Marmanhac. Au décès  de la comtesse de Fumel, Guyonne  de Béral de Sedaignes petite-fille , héritière épouse en 1919 Raoul de Riverieulx de Varax, la famille de Riverieulx de Varax qui possède toujours le château par le comte Patrice de Varax.\r\nAujourd'hui chambres d'hôtes.","architecture":"Sedaignes, bâtiment carré de trois étages cantonné de quatre tours rondes. Reconstruit en forteresse à partir de 1452 puis embelli au XVIIIe siècle, ce château impressionnant offre en outre un exemple unique de l'architecture troubadour du XIXe siècle. En 1741, le château fut remis au goût du jour par l'élargissement des ouvertures et l'ajout de boiseries dans certaines pièces. Vers 1865, l'architecte Parent effectue d'importants travaux sur l'édifice. Le plan général du château fut respecté dans son apparence. Le bâtiment fut habillé dans le style néo-gothique. Fenêtres et portes furent encadrées d'un décor néo-du XVe siècle. Un chemin de ronde fut ajouté aux quatre tours d'angles, à l'imitation de celui conservé sur la façade sud. La cour centrale fut couverte et aménagée en hall. Les éléments de boiseries et les peintures sont traités dans le style de la fin de l'époque gothique.","habitants":"Famille Béral                                                                                          Comte Patrice de Varax\r\n        \"","divers":"Château de Sedaignes à Marmanhac","gps":"","images":["../image/image_15/15_Sedaignes_1.jpg","../image/image_15/15_Sedaignes_2.jpg","../image/image_15/15_Sedaignes_3.jpg","../image/image_15/15_Sedaignes_4.jpg","../image/image_15/15_Sedaignes_5.jpg","../image/image_15/15_Sedaignes_6.jpg"]},"Consult_chateau_formulairecd04":{"id":"Consult_chateau_formulairecd04","dept":"15","canton":"Maurs","commune":"Boisset","nom":"Solignac_Cantal","type":"Château","periode":"XVII","histoire":"SOLIGNAC, noble Guy de Solignac était coseigneur du château de Toursac en 1317. Bernard de Solignac, chevalier, fut homme d'armes de la compagnie du comte de Dammartin, et possédait en 1468 le château, qui passa plus tard, en 1540, à la famille de Lentilhac.  Dans le siècle suivant, ce fief était à une famille de La Borie. Noble Pierre de La Borje, seigneur dudit lieu , habitait le château de Solignac en 1620. Il le tenait de Pierre de la Panouse, seigneur de Colombier, qui l'avait en 1604. François-Louis de Méallet était seigneur de Solignac en 1675. En 1727, Solignac appartenait, ainsi que La Coste, à Louis de Méallet de Fargues, officier de cavalerie. Sa fille , nommée Catherine de Méallet, mariée à Jean-Baptiste de La Garde de Sagnes, vendit Solignac à Frédéric de l'Ecluse, seigneur de La Chaussée, qui en jouissait en 1768, et en partie en 1789. La famille de l'Ecluse de La Chaussée. Elle se distingua, en 1708, par l'exploitation de nos manufactures en Espagne et au Portugal, et par ses armements. Pendant la disette de 1741 , elle fournissait gratuitement des grains. Louis-Frédéric fut doyen des députés. Le roi récompensa ses services. Solignac demeure de la famille d'Elie Peyrissac, ancien maire de Boisset.","architecture":"Solignac de plan rectangulaire à deux niveaux toitures à la Mansard, flanqué d'une tour ronde toiture à l'impérial.","habitants":"Famille de François-Louis de Méallet\r\n        \"","divers":"Château de Solignac à Boisset","gps":"","images":["../image/image_15/15_Solignac_1.jpg"]},"Consult_chateau_formulairee562-2":{"id":"Consult_chateau_formulairee562-2","dept":"15","canton":"Ydes","commune":"Sourniac","nom":"Sourniac","type":"Château","periode":"XVII","histoire":"SOURNIAC, le fief de Sourniac était un démembrement de celui de Sartiges, opéré en 1416. Catherine de Sartiges, mariée à Géraud de La Roche, en devint alors propriétaire, et elle en rendit hommage à Jean de Noailles, seigneur de Montclar et de Chambres,  le 3 mars 1433. Sourniac passa quelques années plus tard à la famille Vaysses, qui paya le droit de franc-fief en 1453. Le comte de Charlus le fit saisir féodalement, en 1581, sur Pierre et de Vaysses, qui refusaient de lui rendre hommage, parce qu'ils pouvaient lui prouver, par des titres antérieurs, qu'ils relevaient du seigneur de Montclar. La famille Vaysses s'étant éteinte  en 1591, sa succession échut, partie à Louis de Charlus, époux de Françoise Vaysses, et partie à Anne d'Autressal, petite-fille de Suzanne Vaysses; mais cette division cessa en 1617, par suite du mariage de Charles de Charlus, fils de Louis , avec ladite Anne d'Autressal, sa cousine, qui. devenue veuve, peu après épousa en seconde noce, le 5 octobre 1631, Gabriel de la Garde, dont la fille, Marie de La Garde, fut mariée, le 20 mars 1660, à Jean de Sartiges, seigneur de la Chassaigne, issu de la branche de Lavandes. Comme il eût été dangereux d'enfreindre une semblable décision, on s'y soumit, puis la situation changea dans les deux familles : Gabriel de La Garde mourut en 1660 ; son fils, Henri, l'avait précédé dans la tombe, A compter de cette époque, Sourniac ne fut plus troublé que par la tourmente révolutionnaire de 1793 ; alors commencèrent les visites domiciliaires, puis la spoliation du château, et enfin l'incarcération de ses maîtres, qui ne recouvrèrent la liberté qu'après la chute de Robespierre.","architecture":"Ce château de Sourniac,  construit au XVIIe siècle dans un style encore médiéval, présente une silhouette typique des manoirs rustiques construits à l'époque par des familles récemment anoblies. Ces demeures semblent des modèles réduits archaïques des grands châteaux médiévaux Cantaliens.  En  1636,  il fut reconstruit après un incendie qui avait dévoré l'ancien. Pendant plus d'un siècle, il ne consista qu'en un gros corps de logis rectangulaire à un étage flanqué de trois tours rondes munies de mâchicoulis surmontés de toitures gracieuses.  deux autres tours aux angles. Plus tard, il fut augmenté d'un pavillon ou second corps de logis à deux étages, renfermant aujourd'hui les appartements. Son propriétaire actuel, le comte Louis de Sartiges, se propose de le restaurer. L'entrée du château est précédée d'une belle pelouse plantée de tilleuls séculaires qui forment une avenue. Une aile de communs élevée au milieu du XVIIIe siècle, fut détruite par un incendie en 1885, et remplacée en 1890 par une chapelle néo-romane sur des plans de l'architecte moulinois René Moreau.  L'ancien manoir féodal de Sartigues a disparu depuis longtemps; il n'en reste plus que de faibles vestiges perdus au milieu d'un terrain.","habitants":"Famille Vaysses\r\n        \"","divers":"Château de Sourniac","gps":"","images":["../image/image_15/15_Sourniac_1.jpg","../image/image_15/15_Sourniac_2.jpg","../image/image_15/15_Sourniac_3.jpg","../image/image_15/15_Sourniac_4.jpg","../image/image_15/15_Sourniac_5.jpg","../image/image_15/15_Sourniac_6.jpg","../image/image_15/15_Sourniac_7.jpg"]},"Consult_chateau_formulaire7a59":{"id":"Consult_chateau_formulaire7a59","dept":"15","canton":"Riom-és-Montagne","commune":"Riom-és-Montagne","nom":"St_Agneau","type":"Château","periode":"XV","histoire":"ST-AGNEAU, château situé dans la vallée même de Riom,  faisait partie autrefois de la terre de Saulou ou Soulou-Lagane, qui avait été démembrée, avant 1343, de celle de Châteauneuf,  La terre de Saulou appartenait à Etienne et Bernard Lagahana en 1343, et le 28 juillet de la même année, Guillaume de Brezons vendit à Bertrand de Latour le fief qu'il avait sur Châteauneuf et Saulo  Cette terre passa dans la maison de Chabannes par le mariage de Gilbert avec Françoise de La tour-d'Auvergne, survenu le 16 novembre 1469, et un Jean-Charles de Chabannes fit reconstruire le château de St-Agneau en 1619. Elle finit par entrer , pendant le cours du XVIIIe siècle, dans la maison de Miramon, par le mariage de Marguerite de Chabannes avec le marquis de Miramont.","architecture":"Le château de St-Agneau, après sa restauration, consistait en un corps de logis flanqué de deux tours; on remarquait les écuries qui étaient d'une grande beauté. Ce château fut dévasté lors de la Révolution de 1789; il a été reconstruit en grande partie par son dernier propriétaire, M. le marquis Napoléon de Miramont, qui en a, en outre, embelli les abords par de magnifiques plantations. La belle propriété, qui dépend du château, était, il y a peu d'années, le siège d'une ferme régionale, qui a été convertie, le 23 septembre 1852, en un établissement destiné à l'amélioration du bétail et de ses produits pour la région des montagnes du centre de la France.","habitants":"Famille de  Jean-Charles de Chabannes\r\n        \"","divers":"Château de Saint-Agneau","gps":"","images":["../image/image_15/15_St_Agneau_1.jpg","../image/image_15/15_St_Agneau_2.jpg"]},"Consult_chateau_formulairee596":{"id":"Consult_chateau_formulairee596","dept":"15","canton":"Mauriac","commune":"Saint-Bonnet de salers","nom":"St_Bonnet_Salers","type":"Tour","periode":"XIV","histoire":"Trois châteaux à Saint-Bonnet, de Chavarvières, Tour de Leybros (XIVe siècle), et  d'Escous, dont les ruines ont été rasées à la fin du XXe siècle.\r\nCHAVARVIERES, Guy de Salers avait acheté Chavarvière en 1277. En 1666, François d'Escorailles, baron de Salers, fut accusé devant la comission des Grands-Jours, à Clermont, de fabriquer de la fausse monnaie dans la tour de Chavarvière. On y fit une perquisition, et il parut en résulter que le seigneur d'Escorailles était dupe d'un Italien qui prétendait pouvoir faire de l'or. On trouva du charbon, des creusets et d'autres appareils propres au genre d'industrie dont on accusait le prévenu. Ces découvertes, jointes à plusieurs griefs d'un autre genre, provoquèrent une sentence de mort qui ne fut pas exécutée; mais le château fut démoli. On voit encore quelques ruines de la tour de Chavarvière.                              LEYBROS, en 1245 vivait un Béraud de Leybros, chevalier.  Eymery de Tournemire, avait épousé Marguerite de Drugeac, dont il eut Leybros et  acheta Brugeac à Finès Ribier d'Angline, sa sur, et de Pierre Ribier. Jean, son fils, lui succéda. Il était, en 1341, seigneur de Leybros et de Bournazel. En 1595 Leybros passa par héritage à Annet de Tournemire, fils de Pétronille de Nozières. La terre de Leybros passa, par succession, de Louise à Claude de Ferrières, comte de Sauvebeuf, fils de son second mari, et qui fut baron de Leybros en 1666. Celui-ci épousa en 1671 Gabrielle-Thérèse dApchon. Son fils, Jean de Ferrières, comte de Sauvebeuf, Seigneur de St-Bonnet, Leybros, St-Martin-Valmeroux, coseigneur de Salers, fut, de plus, grand sénéchal d'Auvergne.  La terre de Leybros ayant été saisie en 1718 sur Claude de Ferrières, fut rachetée par le grand sénéchal François de Ferrières, marquis de Sauvebeuf, seigneur de St-Bonnet, capitaine dans le régiment d'Artois cavalerie, etc., fut seigneur de Leybros en 1781. Il vendit alors plusieurs domaines.","architecture":"CHAVARVIERES, hameau et ancien château dans la plaine, composé d'une grosse tour carrée, sous laquelle était, dit-on, un souterrain qui communiquait avec le château de Salers. Il appartenait à la maison de Salers, dont un des membres, prenait le titre de seigneur de Chavarvière.                                                        Tour de Leybros du XIVe siècle à  quatre niveaux crénelés à mâchicoulis et chemin de ronde.\r\nChâteau d'Escous, hameau avec un ancien château dont il reste à peine quelques vestiges et près du ruisseau de Pailhers. les ruines ont été rasées à la fin du XXe siècle.\r\nLeybros hameau avec une grosse tour isolée, reste de l'ancien château, et qui domine toute la partie ouest de l'arrondissement. Tour du XIVe siècle à  quatre niveaux crénelés à mâchicoulis et chemin de ronde. Les plus anciens seigneurs de Leybros ont été de la maison de Drugeac. . Il se composait alors d'un corps de logis flanqué d'une tour carrée appelée le corps de garde, et renfermant toutes sortes d'armes, et en outre d'une grosse tour. La première fut réparée, ainsi que la grosse tour, Tour du XIVe siècle à  quatre niveaux crénelés à mâchicoulis et chemin de ronde qui menaçait de ruine.","habitants":"Famille de François d'Escorailles,                                                          Famille de Béraud de Leybros\r\n        \"","divers":"Tour de Leybros à Saint-Bonnet de Salers","gps":"","images":["../image/image_15/15_St_Bonnet_Salers_1.jpg","../image/image_15/15_St_Bonnet_Salers_2.jpg"]},"Consult_chateau_formulaire6afa-3":{"id":"Consult_chateau_formulaire6afa-3","dept":"15","canton":"Naucelles","commune":"Saint-Cernin","nom":"St_Cernin","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Saint-Cernin ; Cambon (voir article), Ragheaud  (voir article), du Cros XVIIe siècle, de Faussanges du XIXe siècle, de Marzes, d'Ouzeaux, de Bournazel et de Brolingues. MARZES, seigneurie fort ancienne de la famille de Tournemire. En 1336, Godefroi de Tournemire acheta  Marzes. Jean son fils, seigneur de Marzes, épousa, en 1340, Cibile de Carlat. Louis de Tournemire fut seigneur de Marzes en 1421, Jean de Prallat, chevalier, qui épousa Catherine. Son neveu, Nicolas, était chanoine de Brioude. Son fils, Pierre, épousa en 1448 Antoinette de St-Paul, de la ville d'Aurillac, et fut la souche des seigneurs de Vals. Guy de Tournemire fut quelque temps vice-bailli pour la Haute-Auvergue, vers 1518. Son fils, Jean, était commandeur de Caillac en 1534. En 1546, la seigneurie de Marses passa à Jacques-Robert de Lignerac de La Garde, par son mariage avec Françoise de Tournemire. Jean-Gilbert-Robert de Lignerac, son fils, était en 1586 capitaine du château de Carlat ou il vivait. La terre de Marzes passa , vers 1680, des Lignerac aux Lintilhac de Salvert, puis aux d'Ussel, qui l'ont possédée jusqu'en 1789.\r\nOURZEAUX,  un petit château à tourelle sur la route impériale, au sud du bourg. En 1559, La famille de Cornaro de Curton, originaire dItalie, habité Ourzeaux. Charles de Cornaro, gentilhomme Romain, était fils de Boniface et de Catherine de Spinola ; il vint en France à la suite de Catherine de Médicis et il épousa Jeanne de Renty. Son fils, Altiéri de Cornaro et ses descendants, habitèrent quelque temps à Ourzeaux, puis vinrent se fixer à Marmanhac. Il existe encore quelques branches de cette famille dans le département.\r\nCROS, village sur le chemin de Tournemire, dans le vallon. En 1687, Jean de Pestel et Jeanne de Monteil, son épouse, habitaient le château de Cros, composé de deux tours. Hélène, leur fille, fut mariée à Raymond Fortet, fils de feu Joseph et d'Antoinette de Vigier. Il était au de Calonne en 1730. Faussanges, Bournazel et Brolingues pas d'information historique.","architecture":"Château de Bournazel, avec un moulin sur la Doire.\r\nTour de Marzes, du vieux château de Marzes du XIVe siècle, il ne reste qu'une tour décapité et un corps de bâtiment remanié au cours des siècles. Le château se composait d'une grosse tour carrée à 4 étages, avec deux corps de logis et d'une petite tourelle formant une cour, avec d'autres bâtiments; il y avait une prison et une cave en bas de la tour; une jolie chapelle avec son clocher était contiguë à un des corps de logis. Une partie du château s'écroula en 1747. \r\nChâteau d'Ourzeaux, se compose d'un corps de logis à deux niveaux avec tourelle d'escalier ronde. \r\nCros, se compose d'un corps de logis  de deux niveaux  avec au milieu une tourelle d'escalier ronde de quatre niveaux couronnée de mâchicoulis et tours rondes aux angles.","habitants":"Famille de Tournemire                                                                                                     Famille de Cornaro\r\n        \"","divers":"Château de Bournazel, de Brolingues, de Cros, de Foussanges, de Marzes et de Regheaud à Saint-Cernin","gps":"","images":["../image/image_15/15_St_Cernin_1.jpg","../image/image_15/15_St_Cernin_2.jpg","../image/image_15/15_St_Cernin_3.jpg","../image/image_15/15_St_Cernin_4.jpg","../image/image_15/15_St_Cernin_5.jpg","../image/image_15/15_St_Cernin_6.jpg","../image/image_15/15_St_Cernin_7.jpg","../image/image_15/15_St_Cernin_8.jpg"]},"Consult_chateau_formulairece16":{"id":"Consult_chateau_formulairece16","dept":"15","canton":"Naucelles","commune":"Saint-Chamant","nom":"St_Chamant","type":"Château","periode":"XIV","histoire":"St-CHAMANT; Robert de Balsac, sénéchal d'Agenais et de Gascogne en 1473, conseiller et chambellan du roi Louis XI puis de Charles IX qui le nomme gouverneur de la citadelle de Pise. En 1473, il acquiert la seigneurie de Saint-Chamant et les droits de la famille de Lagarde. Après avoir reconstitué ce fief, en 1484, il fonde à Saint-Chamant, un chapitre de six chanoines, qu'il dote richement. Ce chapitre subsistera jusqu'à la Révolution. Il se marie en 1474 avec Antoinette de Castelnau-Bretenoux, dont il a eu huit enfants. C'est sans doute lui qui fait construire l'actuel donjon du château. Il décède en 1503, est inhumé aux côtés de son épouse, décédée en 1494, Le château reste à ses descendants jusqu'à sa vente en 1589, à la famille Robert de Lignerac. François Robert de Lignerac (1535-1613), capitaine de Carlat et des gardes de  la reines Isabeau d'Autriche et Margot de Valois. Seigneur de Saint-Chamant sans doute par son mariage en 1564 avec Françoise de Scorailles qui descendait de Robert de Balzac, le château reste dans sa famille jusqu'à : Achile Joseph Robert de Lignerac (1733-1783), duc de Caylus. En 1777, ses créanciers font saisir ses biens et en obtiennent la mise en vente judiciaire au Châtelet, à Paris, du château et de la terre de Saint-Chamant. En 1783, les créanciers revendent Saint-Chamant à M. Pierre Couderc, conseiller du roi au Présidial d'Aurillac, audiencier à la chancellerie de la cour des comptes de Montpellier, était marié à Marie Veyrines qui lui donne un fils qui hérite de son importante fortune: François Couderc (1780-1863), intendant en Espagne, membre de la loge Les frères de la vraie lumière de Saint-Flour, nommé receveur-général du Cantal en 1815. Depuis 1783, la famille actuelle maintient cet ensemble bien vivant.","architecture":"Saint-Chamant, donjon du XIVe siècle. Il y avait deux tours mais il ne reste que celle à trois pans, contenant l'escalier. De la tour ronde nord il ne reste que la base prise dans les soubassements du château. Entre 1620 et 1700, diverses campagnes de travaux donnèrent naissance au grand corps de logis qui prolonge la façade ouest du donjon quadrangulaire couronné de mâchicoulis. Des boiseries recouvrent les parois de toutes les pièces. Vers 1820, construction à l'est et au nord du donjon, d'un petit corps de logis qui entraîna l'arasement de la tour ronde, dont les matériaux servirent au nouveau bâtiment. En 1905, un avant-corps fut construit pour permettre des aménagements intérieurs. Le château est entouré de dépendances et d'un parc en terrasses. Cette demeure est très représentative de l'art de bâtir de la région, tant par ses formes que par ses matériaux. Au XVIIe siècle, les Lignerac, futurs ducs de Caylus, construisent un vaste corps de logis.  Le petit corps de logis a été construit vers 1820 avec réemploi des matériaux de la tour ronde. L'avant-corps date de 1905. Le communs comportent une aile datée du XVIIe siècle qui est comme le château lui-même inscrits au monument historique.","habitants":"Famille de Robert de Balsac\r\n        \"","divers":"Château de Saint-Chamant","gps":"","images":["../image/image_15/15_St_Chamant_1.jpg","../image/image_15/15_St_Chamant_2.jpg","../image/image_15/15_St_Chamant_3.jpg","../image/image_15/15_St_Chamant_4.jpg","../image/image_15/15_St_Chamant_5.jpg"]},"Consult_chateau_formulaire4778":{"id":"Consult_chateau_formulaire4778","dept":"15","canton":"Maurs","commune":"Saint-Constant","nom":"St_Constant","type":"Château","periode":"XIII-XVI","histoire":"Trois château à Saint-Constant, de Chaules du XIIIe siècle, de Lacan et de Merle.                                                                        CHAULES, ruines d'un fort bâti sur une petite élévation,  en 1617, le seigneur de Merle, avec le seigneur de la Blanquie et de Fabrègues , ses frères, qui étaient de la famille du Breuil, s'emparèrent du fort de Chaules ; mais le prévôt Lacarrière, sur les ordres du marquis de Noailles, s'y rendit et somma le nommé  Rives, qui le commandait, de le rendre. Celui-ci refusa, sous le prétexte qu'il tenait ce château pour le service du roi, disant néanmoins qu'il le rendrait au marquis  de Noailles .               LACAM, château qui appartient à  la famille de Conquans; il est bâti  sur un point culminant. En 1504, noble Louis de Montai était seigneur de Lacam. François de Conquans l'était en 1691 et vivait encore en 1724; il fut père de Jacques de Conquans qui était seigneur de Lacam et avait épousé Marianne Capelle; il vivait en 1758. Son fils Jacques lui succéda; il eut encore Cécile de Conquans qui épousa Jean-François Dufau, baron de St-Santin, fils de Jean-François, chevalier de St-Louis, et de Françoise du Cayla; il habitait le château de Lisson, en Quercy, avant la Révolution. Noble Etienne de Conquans, et s'était allié à Geneviève de Sarret d'Apcher ; il habitait en 1782 le château de Lacam.                      MERLE, noble Foulques de Merle, damoiseau, vivait en 1308. Du mariage de sa sur,  de Merle, avec Pons de Corbi, naquit au château de Merle, en 1300, Flore de Corbi, qui fut religieuse à Issoudolus, de l'ordre de Malte, en Quercy, et mourut  en 1347. Ce fief passa dans la famille de Breuil ou de Broglio, en 1450. Le château fut démoli par ordre  de Canilhac, gouverneur. En 1614, Jean-Antoine de Lauzeral de Breuil, fils de Jacques de Lauzeral, seigneur de Bilhoux, qui, en épousant la fille unique de Jacques de Breuil, avait pris le nom et les armes de la famille.  Il demeura seigneur de Merle par suite d'un traité avec le seigneur d'Ayrolles, son beau-frère. En 1673, Louis Guirard de Montarnal, seigneur des Oudes, fils de Louis et de Toinette Saunhac, reçut en dot de sa mère la seigneurie de Merle avec le château et la haute justice ; son frère Henri resta seigneur de Senergues. En 1697, Jean de Selves acheta le château et  la seigneurie Derbesle, de la même Toinette de Saunhac. En 1719, Merle était la propriété de la famille Chaules.","architecture":"Chaules,   ruines d'un fort bâti sur une petite élévation il ne reste que des vestiges pans de murs.                                                       Lacam,  château  bâti dans une belle position, sur un point culminant,  corps de logis rectangulaire à deux niveaux avec série de lucarnes tous le tour du bâtiment sur un toits à la Mansard du côté gauche et à deux pans côté droit, l'édifice possède une tour carrée plein avant sur façade d'entrée à trois niveaux à toits pointu, tourelle ronde sur la partie arrière toiture en poivrière. Merle, vestiges, reste d'une tour carré et d'une tourelle ronde à l'état de ruine.","habitants":"Famille de Conquans                                                                            Famille Chaules  \r\n        \"","divers":"Saint-Constant, vestiges de Chaules et de Merle, château de Lacam.","gps":"","images":["../image/image_15/15_St_Constant_1.jpg","../image/image_15/15_St_Constant_2.jpg","../image/image_15/15_St_Constant_3.jpg","../image/image_15/15_St_Constant_4.jpg","../image/image_15/15_St_Constant_5.jpg"]},"Consult_chateau_formulaire1f74":{"id":"Consult_chateau_formulaire1f74","dept":"15","canton":"Aurillac","commune":"Aurillac","nom":"St_Etienne_Aurillac","type":"Forteresse","periode":"XIII-XVI","histoire":"St-ETIENNE, en 856, naissance du comte Géraud, seigneur. Vers 885, celui-ci fonde une abbaye bénédictine qui portera plus tard son nom. En 1233, prétextant les détentions arbitraires par labbé dAurillac, les habitants prirent le château. Une protestation des consuls dAurillac, du 27 mars 1330,  contre lemprisonnement dun enfant dans la tour  montre que les relations restaient difficiles. Après la prise du château Saint-Étienne en 1255 et deux sentences arbitrales appelées les Paix d'Aurillac, les relations se normaliseront.  Entre 1469 et 1471, les conflits entre labbé et les consuls samplifièrent. Fort davoir  délivré le pays des Anglais qui occupaient le château et  la ville, les habitants abattirent et mirent par terre le chastel par deux fois.   Après sa destruction en 1569 par les Huguenots, Charles de Noailles, abbé dAurillac, le fit restaurer. Au début de lEmpire, le château servit de résidence au Préfet. Puis reconstruit au XIXe siècle à l'initiative de Louis-Furcy Grognier dans le style du palais des papes à Avignon. En 1837, une décision ministérielle transféra lécole normale, de Salers à Aurillac.  Il abrite depuis 1991 dans l'aile qui lui fut rajoutée au XIXe siècle un musée des sciences.    Le docteur Mézard, maire dAurillac et président du conseil général, installa la maison des volcans dans le château.","architecture":"St-Etienne; château primitif de St-Etienne du père de Saint Géraud, il comporte une ancienne tour carrée qu'on croit être d'origine et un vaste bâtiment reconstruit au XIXe siècle. La tour du château est le dernier vestige d'une forteresse dont l'origine remonte à l'époque carolingienne. De plan carré, elle s'élevait jusqu'en 1747 à plus de trente mètres, date à laquelle elle fut arasée. Trois périodes de construction se distinguent à l'appareillage : le IXe siècle à la base, le XIIe siècle, puis le XIIIe ou XIVe siècle. L'arase supérieure date du XIXe siècle.  La tour était restée intacte avec ses 32 m de haut, lorsque en 1747, le cardinal de Gesvres obtint du roi lautorisation de la réduire de 12 mètres. La terrasse actuelle a remplacé, au XIXe siècle, une toiture en pavillon qui devait dater de l'arasement du XVIIIe siècle. En 1868, un incendie détruit presque entièrement le corps de logis qui s'élevait au pied de la tour. Ce bâtiment est remplacé par un nouveau château de style néo-gothique construit par l'architecte Juste Lisch, achevé en 1898. Architecture historique inspirée du Palais des Papes.","habitants":"Charles de Noailles\r\n        \"","divers":"Forteresse de Saint-Etienne à Aurillac","gps":"","images":["../image/image_15/15_St_Etienne_Aurillac_1.jpg","../image/image_15/15_St_Etienne_Aurillac_2.jpg","../image/image_15/15_St_Etienne_Aurillac_3.jpg","../image/image_15/15_St_Etienne_Aurillac_4.jpg","../image/image_15/15_St_Etienne_Aurillac_5.jpg"]},"Consult_chateau_formulaire258b":{"id":"Consult_chateau_formulaire258b","dept":"15","canton":"Saint-Paul des Landes","commune":"Saint-Etienne de Cantalès","nom":"St_Etienne_Cantalés","type":"Château","periode":"XIV-XV","histoire":"Trois châteaux à st-Etienne de Cantalès, celui de la Gresse , de Miécaze du XIV-XVe siècle  et de Vabret  du XVe siècle.  St-ETIENNE La seigneurie de Marie de Rodez, seigneur de Conrot, viguier d'Arpajon pour l'abbé d'Aurillac. Jacques de Giou, baron de Giou en 1633, gentilhomme de la Chambre du roi Louis XIII et de sa Fauconnerie, est seigneur de Saint-Étienne. De son mariage en 1627 avec Marie de Murat, il a trois filles, dont la dernière, Suzanne de Giou dite de Saint-Étienne, épouse en 1672 maître Amable Delort, seigneur de Brozelles, lieutenant civil, auquel elle apporte la seigneurie de Saint-Étienne. Leur fils, Isaac Delort de Saint-Étienne, lieutenant civil, devient premier consul d'Aurillac. Par la suite, Antoine Cambefort, procureur du roi au siège d'Aurillac, est seigneur ou co-seigneur de Saint-Étienne. Il était le fils d'Antoine Cambefort, procureur du roi, et d'Antoinette Pagès de Vixouze. Son fils Jean Cambefort de Saint-Étienne, consul d'Aurillac, lui succède.\r\nGRESSE Le château de \"Gresses\", sis au nord de Saint-Etienne, appartenait en 1726 à Marie Dubois qui l'apporta en dot au chevalier Martial Dufayet de la Tour de Saint-Vincent, l'un des 200 chevaux-légers de la Garde ordinaire du roi. Par une alliance contractée en 1785, le château et la propriété sont passés à la maison de Falvelly dont de nombreux descendants ont occupés la fonction de maire de la commune. Appartenait en 1726 au chevalier Dufayet de la Tour de Saint-Vincent. Le château de Gresse a appartenu à la famille du Fayet de La Tour, puis par héritage à la famille de Falvelly qui le possède toujours.\r\nVABRET, château du XVe siècle,  Isabeau de la Panouse, dame de Viescamp, habitait le château de Vabret en 1610.  Laurent du Saulnier,  seigneur de la Courdon, possédait Vabret en 1677, et sa famille l'a conservé pendant plusieurs années.","architecture":"Saint Etienne de Cantalés  fort sur une crête  vestiges d'un donjon et d'une bâtisse.                                                                                            Château de Gresse, corps de logis rectangulaire, flanqué de tours rondes et d'un donjon.                                                                                       Vabret et Miécaze   Pas d'information architecturale.","habitants":"Famille d'Antoine Cambefort                                                                   maison de Falvelly                                                                              Famille de  Laurent du Saulnier\r\n        \r\n        \"","divers":"Château de Gresse et vestiges à Saint-Etienne de Cantalés","gps":"","images":["../image/image_15/15_St_Etienne_Cantales_1.jpg","../image/image_15/15_St_Etienne_Cantales_2.jpg"]},"Consult_chateau_formulairef7a4":{"id":"Consult_chateau_formulairef7a4","dept":"15","canton":"Mauriac","commune":"Saint-Martin-Valmeroux","nom":"St_Martin_Valmeroux","type":"Château","periode":"XIII-XVI","histoire":"Cinq châteaux à Saint-Martin de Valmeroux, vestiges de Crévecoeur du XIIIe siècle, de Bezou, de Montjoly du XVIe siècle, de Castel-soubro et de Saint-Pol de Nozières du XVIe siècle ( voir Jussac).                                                                                CREVECOEUR, château royal, siège du bailliage de Haute-Auvergne entre le XIIIe et le XVIIIe siècle, Les rois entretenaient un capitaine-châtelain à Crèvecur, de 1241 à 1271 siège de la justice  des comtes d'Auvergne de 1271 à 1360 de celle du roi et de 1360 à la fin du XVe siècle  de celle des ducs. Arnail d'Espinals, en 1275 ; Pierre de Ribier, seigneur de Plagnes, en 1418 ; un membre de la famille de Roquemaurel, en 1516 ; François d'Escorailles, en 1690, et Annet d'Escorailles, en 1750, en ont successivement rempli les fonctions. BEZOU, C'est dans les prisons de cette forteresse que furent renfermés, au XIIe siècle. Bernard de St-Mamet, Ségurat de Malégre et Falconel de Vais, brigands fameux.  cédé par la famille del Peuch au sieur Marion, puis aux Saint-Martial,  seigneurs de Drugeac, comme co-seigneurs de Saint-Martin, qui le conservent jusqu'en 1765, date à laquelle le Puech est acheté par le sieur André de La Ronade, qui est déclaré émigré pendant la Révolution. Le domaine est saisi et vendu comme bien national. \r\nMONTJOLY  fief qui était de temps immémorial  de la propriété de la famille Desongles, et a été longtemps connue sous le nom de Desongles-de-Courboulès, et porte aujourd'hui ceux de Desongles-de-Courboulès de-Montjoly.","architecture":"Nozières-Soubra (Saint Pôl) à Nozières du XIVe siècle, dont il reste une tour ruinée.\r\nBézou est une maison forte de trois niveaux  qui possédait une tour ronde à toit en terrasse, aujourd'hui à toit poivrière.                                 Crèvecur, château royal ruiné antérieur au  XIIe siècle, siège du bailliage de Haute-Auvergne entre le XIIIe et le XVIIIe siècle. Bien que le château soit délabré et que le traitement soit très mince, le poste de capitaine gouverneur du château de Crèvecoeur sera recherché par les familles d'ancienne noblesse du pays jusqu'à la fin de l'Ancien Régime.\r\nMontjoly, ruines du château-fort avec chemin de ronde et échauguettes d'angle. Semble avoir été reconstruit au XIIe siècle.","habitants":"Famille de Roquemaurel                                                                            Famille d'André de La Ronade\r\n        \"","divers":"Vestiges de Crévecoeur, tour de Nozières, château de Montjoly et de Bezou à Saint-Martin de Valmeroux","gps":"","i
