Viescamp qu'habitait : Guillaume de Gosselin, puis lui rend sous foi et hommage. En 1283, Bernard de Viescamps, chevalier, fils de Guillaume Gaucelin, donne au roi la moitié d'un affar qu'il possède et ne tient de personne sur la paroisse de Saint-Paul-des-Landes, afin d'y établir une ville franche. La donation est acceptée par Jacques Lemoine, bailli des Montagnes. Cette famille reste seigneur de Viescamp jusqu'à ce qu'elle achète le fief de Comblat en 1343 et s'y s'établisse. La seigneurie passe ensuite dans la maison de Parlan vers 1350. Famille de Parlan, Georges de Parlan et Antonie de Parlan, dite Mademoiselle de Viescamp, fille de Georges de Miers, seigneur de Parlan, l'apporte en 1599 par son mariage avec : Jean de Lavalette, fils de Bérenger et de Catherine de Castelnau. C'est sans doute lui qui a fait construire le premier château. Leur fils leur succède : Famille de La Valette-Parisot, famille de La Panouse originaire du Rouergue. Jean de La Panouse, seigneur de Viescamp, de Pers, épouse Catherine d'Albret, dont au moins deux fils : Isabeau de La Panouse, l'apporte vers 1500 par son mariage avec Pierre de La Panouse en 1482, fils de Jean, seigneur de Loupiac (1449-1505), et d'Isabelle de Marcenac. Leur fils leur succède : Retour à la famille de La Valette-Parisot, Pierre de La Valette épouse en 1641 Rose de Pestels, fille de Jean, seigneur de Merle et de Marguerite de Tournemire. Leur fis leur succède : Louis de La Valette, marié avec Françoise Bonhoure, dont une seule fille : Marianne Valette  en 1728  l'apporte en 1753 par son mariage avec Théodore de Lasserre.","architecture":"Le château médiéval du XVe siècle  comporte un donjon quadrangulaire  couronné d'un chemin de ronde sur mâchicoulis et des créneaux sur des bases du XIIIe siècle. Il a été agrandi au XVIIIe siècle par l'adjonction d'un important corps de logis à trois étages et double rangé de lucarnes  avec un comble à la Mansart. Certains décors intérieurs sont de style troubadour de la fin du XIXe siècle.","habitants":"Famille Gaucelin\r\n        \"","divers":"Château de Viescamp à Lacapelle-Viescamp","gps":"","images":["../image/image_15/15_Viescamp_1.jpg","../image/image_15/15_Viescamp_2.jpg","../image/image_15/15_Viescamp_3.jpg"]},"Consult_chateau_formulaire95c0":{"id":"Consult_chateau_formulaire95c0","dept":"15","canton":"Mauriac","commune":"Ally","nom":"Vigne","type":"Château","periode":"XV","histoire":"La VIGNE,  dabord castrum mérovingien, puis forteresse médiévale, le château fut construit par la famille de Scorailles à la fin de la Guerre de Cent Ans, en1399 : Louis II de Scorailles, comtour de Scorailles, seigneur de Montpensier, est seigneur de La Vigne, en 1470-1485 : Marquès de Scorailles, seigneur de Roussilhe, son petit-fils, construit le château actuel. Passe par alliance en  1743 d'Anne-Charlotte de Scorailles, apporte La Vigne en dot à Bertrand d'Humières qui en 1745 : embellissement de La Vigne par Bertrand d'Humières.  En 1795, la Vigne se trouve situé sur la ligne du méridien de Paris, passage à Ally de l'astronome Jean-Baptiste Delambre pour calculer le mètre. Le château  traverse la Révolution sans dommage. Marguerite d'Humières, petite fille de Bertrand, l'apporte en 1811 en dot à Jean-Baptiste de La Tour d'Auvergne, d'une famille originaire du sud du Cantal. Première vente en 1899  du château à Antoine Fraignac, puis au comte Étienne de Sigaldi. En 1912, reprise et aménagements par Gabriel de Raffin de La Raffinie. De 1942-1945 Robert Jégou, accueil de réfugiés et résistance. Acquisition en 1950 par Georges et Elisabeth du Fayet de la Tour  qui le  transforme en chambres d'hôtes de luxe tenu par sa descendance monsieur et madame Anne et Bruno Du Fayet de la Tour.","architecture":"Le château de la Vigne est situé sur la commune dAlly,  forteresse militaire à larchitecture massive, il a été reconstruit au XVe siècle. Tour carrée construite au XIIIe siècle, à laquelle est ajouté un premier corps de logis rectangulaire flanqué de quatre tours d'angles, trois rondes et une carrée. Il est surmonté d'un chemin de ronde avec des mâchicoulis. Au XVIe siècle, un autre corps de logis est ajouté à l'Ouest et avec un fossé tout autour.  La tour de flanquement Nord-Ouest est détruite au XVIIIe siècle, pour être remplacée au XIXe siècle par une échauguette. Une porte est aménagée dans la tour Nord-Est aux armes des propriétaires actuels.\r\nIl se compose de corps de logis et de tours, lensemble est couronné dun chemin de ronde sur mâchicoulis et a été construit avec de la lave volcanique et du granit de Xaintrie. Témoignage vivant du riche passé de la Haute Auvergne, on peut admirer la décoration intérieure originaire du XVIIIe siècle. Les grandes cheminées de pierre sont remplacées par de charmants trumeaux en bois sculpté et peints dans les tonalités de l'époque. Des lambris élégants ornent certaines pièces en remplacement des peintures murales d'origine.","habitants":"Famille des de  Scorailles\r\n        \"","divers":"Château de la Vigne à Ally","gps":"","images":["../image/image_15/15_Vigne_1.jpg","../image/image_15/15_Vigne_2.jpg","../image/image_15/15_Vigne_3.jpg","../image/image_15/15_Vigne_4.jpg","../image/image_15/15_Vigne_5.jpg","../image/image_15/15_Vigne_6.jpg","../image/image_15/15_Vigne_7.jpg"]},"Consult_chateau_formulairef1a9":{"id":"Consult_chateau_formulairef1a9","dept":"15","canton":"Saint-Flour","commune":"Saint-Martin sous Vigouroux","nom":"Vigouroux","type":"Château","periode":"XVI","histoire":"VIGOUROUX, en 1273, Marquèze de Peyre, veuve de Pierre IV, vicomte de Murat, rendit hommage pour Vigouroux au nom de ses enfants à Henri II de Rodez, comme vicomte de Carlat. En 1328, Helis de Murat, épousa Bernard de Cardaillac. En 1477 la seigneurie supérieure est confisqué à Jacques d'Armagnac qui est décapité et donné à Jean de L'Isle, puis rendu au duc de Nemours. Il sera confisquée à Pierre de Bourbon et annexé à la couronne et se retrouve plusieurs fois dans l'apanage des reines douairières. Jacques de Berthomier, seigneur de La Vernhette, à Brezons et de La Fontio, avait une fille qui apporte le château moderne en dot en 1616 à Annet Ier de Lastic, seigneur de Bellemur, d'Auzolles et de Laterrisse. Ainsi débute la branche de Lastic-Vigouroux.  En 1641, Louis XIII l'attribue en même temps que le Carladès à Honoré II Grimaldi de Monaco et à ses descendants qui l'ont conservé jusqu'à la Révolution Depuis cette époque, ce rameau de Lastic a continuellement résidé au château neuf de Vigouroux dont l'emplacement se trouve à côté de celui de l'ancien fort. Annet II (1609-1688), épousa en 1638 Marie de Greil de la Volpilhère qui lui apporta le seigneurie de Saint-Martin-sous-Vigouroux et lui donna sept enfants. Annet V de Lastic, seigneur de La Vergnette s'est marié en 1720 à Saint-Flour à Marie Coste, fille de François, receveur des Tailles et de Marguerite Delpuech. C'est à cette époque qu'il a ajouté un nouveau corps de logis en équerre avec la tour Est. Joseph-Annet de Lastic (1772-1866), page de Louis XVI, qui était membre de la coalition d'Auvergne, devint chambelan de I'impératrice Joséphine, inspecteur général des Haras, député du Cantal. Il épousa Octavie de Lastic-Sieujac (1785-1861), héritière de sa maison, ce qui a réuni les deux branches de cette famille. Leurs trois fils, Antoine-Annet dit Tony de Lastic (1810-1880), page de Charles X, Harold et Octave de Lastic étaient membres de la société cantalienne.\r\nJoseph de Lastic a vendu le château vers 1845  à M. Beaufils-Coste.","architecture":"Vigouroux le vieux château fut détruit et les pierres servirent à la construction du château actuel dont les premiers éléments datent du XVe siècle. Il fut classé en 1987 dont des  éléments intérieurs auxquels malheureusement nous n'avons pas accès.  Le château de Vigouroux a été construit au XVIe siècle sur les soubassements d'une partie de la forteresse ruinée. Le logis rectangulaire est entouré d'une tour d'escalier centrale, et de deux tours dont celle de l'ouest est portée sur un cul de lampe. Les ouvertures sont à croisées renaissance, sans croisillons.\r\nUn corps de logis en équerre a été ajouté contre la tour Ouest vers 1720 par Anne V de Lastic tandis que le logis et les deux tours ont été réduits d'un étage. La tour des archives, située à l'arrière, a été rasée durant la Révolution et le bas relief qui figurait dans le tympan de la porte de la tour centrale, comme à l'hôtel dit des princes de Monaco à Vic-en-Carladez, a été martelé. Il restait en 1780 un tronçon de tour de l'ancien château qui a été détruit et dont les matériaux ont été utilisés par M. de Lastic pour construire les écuries du château actuel.  Certaines fenêtres conservent des éléments de vitraux aux armes des Lastic du XVIIe siècle. La chambre du deuxième étage est ornée de papiers peints d'époque.","habitants":"Famille de  Helis de Murat\r\n        \"","divers":"Château de Vigouroux, à Saint- Martin de Vigouroux","gps":"","images":["../image/image_15/15_Vigouroux_1.jpg","../image/image_15/15_Vigouroux_2.jpg","../image/image_15/15_Vigouroux_3.jpg","../image/image_15/15_Vigouroux_4.jpg","../image/image_15/15_Vigouroux_5.jpg","../image/image_15/15_Vigouroux_6.jpg"]},"Consult_chateau_formulaireaed8":{"id":"Consult_chateau_formulaireaed8","dept":"15","canton":"Maurs","commune":"Vitrac","nom":"Vitrac","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Vitrac, de la Borie et de Fargues du XIII-XIXe siècle.                                                                                                    FARGUES attesté en 1298 à  Raymond de Méallet qui en était seigneur. Arnal de Méallet, co-seigneur de Méallet pour lequel il rend hommage en 1353 à Jean de Castelnau, baron de Caumont, ainsi que de Fargues dont il rend hommage en 1366 à Jean Ier, duc de Berry; Pierre de Méallet, fils d'Aymeric, seigneur de Fargues, épouse en 1461 Marguerite de Durban, fille de Pierre et d'Aigline de Naucaze, qui lui apporte Roumégoux en dot. Ils ont sept enfants, dont Louis de Méallet de Fargues, seigneur de Fargues, de Roumégoux, de Pers, de Glénat, capitaine du château de Saint-Santin, épouse Antoinette de Durfort, Olympe de Méallet de Fargues (1804), orpheline de père et de mère, épouse en 1826 à Lyon Guillaume-Louis de Cassagnes de Beaufort de Miramon (Paulhac 1797 - Paris 1867) . Ils ont six enfants: Sidonie Julie de Miramon (1827-1912),Anatole de Cassagnes de Beaufort de Miramon (1828-1912), dit le Marquis de Miramon-Fargues, député de la Haute-Loire, qui rachète le château de Pesteils à Polminhac, et qui fait la souche des Miramon-Pesteils; Emmanuel de Miramon-Fargues (1838 - 1905), propriétaire de Fargues, maire de Vitrac. Il épouse en 1864 Marie Roullet de la Bouillerie (1842 - 1927), qui lui donne trois fils et une fille. Marie Alice de Miramon mariée à Joseph de Moré de Pontgibaud (1823 - 1859), fils d'Armad-Victoire de Pontgibaud (1790 - 1855), pair de France, et de Catherine de Larochelambert (1797 - 1873); Marie-Philomène de Miramon.  Bernard de Miramon-Fargues (1865 - 1908), fils d'Emmanuel, historien. Il vivait à Fargues avec sa femme Édith Michet de Varine-Bohan (1874 - 1961) et leur fille Odette de Beaufort-de Miramon-Fargues.\r\nBORIE,  château,  Il a longtemps appartenu à la famille de Boissières. Noble de Boissières, seigneur de la Borie, commandait, en 1565, le fort de St-Santin, en Rouergue , sous les ordres de Noble de Fargues. Antoine de Boissières, seigneur de Lortigues, vendit, vers 1655, le château et domaine de la Borie,  a Amable de Méallet. Il appartient actuellement au marquis de Miramon , auquel il a été apporté en mariage par Jeanne-Olympe de Méallet de Fargues, héritière de sa famille.","architecture":"Borie (la), hameau et fief avec un château, au sud de Vitrac, sur un coteau dominant la Rance.   Ce petit château existe encore; il se compose d'un corps de logis et d'une tour. La voûte de l'une des salles est remarquable par ses nervures.                                  Fargues  Il s'agit d'un château féodal qui a été englobé dans un château moderne. En effet, en 1741, Jean-Joseph de Méallet, évêque de Saint-Claude, a rebâti le château et remplacé les donjons à mâchicoulis féodaux par des constructions confortables du genre Louis XV. Il a dû subir aussi les dégradations de la Révolution de 1789, puis les aménagements pas toujours très heureux de la Restauration.  Château féodal englobé dans un château moderne. \r\n Le parc, du début du XIXe siècle, a été composé par Le Breton, architecte paysagiste. Par sa situation à mi-coteau, il domine la vallée  et offre une vue qui s'étend jusqu'aux rives du Lot vers Decazeville.","habitants":"Louis de Méallet de Fargues                                                                        Famille de Boissières\r\n        \"","divers":"Château de la Borie et de la Fargues à Vitrac","gps":"","images":["../image/image_15/15_Vitrac_1.jpg","../image/image_15/15_Vitrac_2.jpg","../image/image_15/15_Vitrac_3.jpg","../image/image_15/15_Vitrac_4.jpg","../image/image_15/15_Vitrac_5.jpg","../image/image_15/15_Vitrac_6.jpg","../image/image_15/15_Vitrac_7.jpg","../image/image_15/15_Vitrac_8.jpg"]},"Consult_chateau_formulaire6080-2":{"id":"Consult_chateau_formulaire6080-2","dept":"15","canton":"Vic sur Cère","commune":"Polminhac","nom":"Vixouze","type":"Château","periode":"XV","histoire":"VIXOUZE, famille de Vixouze de l'origine à 1400 par l'alliance d'Héléne de Vixouze avec  Robert de Brunenc  né vers 1380  seigneur de Vixouze à partir de 1432, Raymond de Brunet, né vers 1400, seigneur de Vixouze, successeur : Guiral  Brunenc de Vixouze, seigneur de Vixouze, né vers 1420. Il achète en 1439 le château de Comblat, et devient seigneur de Comblat. Epoux de Géralde de Pallat. Il était capitaine-gouverneur du fort de Turlande en 1470, son  fils Guy de Brunet de Vixouze, né vers 1440, et qui fût seigneur de Comblat de 1468 à 1489. Jacques de Brunenc de Vixouze, né vers 1460, seigneur de Vixouze et de Comblat, Il représenta Jehan de La Garde de Saignes, Raymond II dit de Comblat, fils de Jacques, né vers 1480, se maria en 1507 avec Soubeyrane de Beaufort. Raymond II fût seigneur de Vixouze et de Comblat et décéda en 1561. Antoinette de Comblat dite dame de Comblat, née vers 1520 et mariée en 1541 à Jean 1er de Cabanes. De ce dernier mariage naquit en 1542 : Jean II de Cabanes de Comblat marié à Gabrielle de Grenier-Mègemont. De ce mariage naquit : Louise de Comblat apporte la seigneurie et le château de Vixouze à son mari Blaise Pagès devenu donc Blaise Pagès de Vixouze. Ce dernier est fils de Rigal Pagès, seigneur d'Espeils. Du mariage de Blaise et de Louise, il vient : Françoise Pagès, mariée le 16 juillet 1636 avec Paul Lacarrière (1604), vice-bailli du Carladès depuis le 22 juillet 1599. Blaise Pagès, seigneur de Vixouze et des Huttes, dont est issu : Antoine Pagès de Vixouze,  marié le 25 avril 1736 à Aurillac avec Madeleine Boudet, fille de Guillaume, seigneur de Senilhes, et de Marguerite de Cambefort de Mazic,  De son premier lit, il avait eu une fille: Catherine-Rose-Euphrosine Pagès de Vixouze, mariée le 24 avril 1787 à Aurillac avec Jean-François Malroux-Désaurières, avocat du roi au siège présidial d'Aurillac. Ils eurent deux enfants: Eugène et Amélie Malroux-Désaurières, héritière de Vixouze, se maria avec Pierre Dessauret d'Auliac (1787-1868).  un fils : Pierre-Charles Dessauret d'Auliac, décédé à Vixouze en 1882. Le château de Vixouze sera vendu par ses descendants en 1913 à la famille Costes. Vixouze appartient à M. et Mme Serge Pilicer-Moncorger. En 1990, Vixouxe est acheté par André Léonard, artiste peintre depuis 2013.","architecture":"Vixouze, le donjon de défense rectangulaire daterait du XIIIe siècle mais a été remanié et possède des cheminées du XVe siècle, un rez-de-chaussée surélevé et deux étages carrés, toiture en pavillon. L'accès se faisait primitivement par une porte haute (aujourd'hui obturée) au troisième niveau, puis par un accès au rez-de-chaussée surélevé par un escalier extérieur et actuellement par une tour d'escalier hors-uvre. L'enceinte comporte un portail et des tours. Deux ailes ont été édifiées ensuite, le mur de clôture porte la date 1719. La chapelle voûtée en berceau plein cintre et le four à pain en berceau brisé sont du XVIIe siècle. La grange-étable porte les dates  de 1613 et de 1777. Une grange-étable à demi croupes ; un moulin à toit à l'impériale. Le portail avant, avait un toit à lanternon qui a aujourd'hui disparu. La fontaine située à l'entrée du château semble être de création du XIXe siècle, après 1811.","habitants":"Famille de Vixouze\r\n        \"","divers":"Château de Vixouze","gps":"","images":["../image/image_15/15_Vixouze_1.jpg","../image/image_15/15_Vixouze_2.jpg","../image/image_15/15_Vixouze_3.jpg","../image/image_15/15_Vixouze_4.jpg"]},"Consult_chateau_formulairefb81":{"id":"Consult_chateau_formulairefb81","dept":"15","canton":"Vic sur Cère","commune":"Vezac","nom":"Vézac","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Vezac, de Caillac  du XVe siècle et de la Salles du XIIIe siècle plus manoir de Salès, manoir de Dousques et entrée du château du Doux (Maisons de gardes).\r\n CAILLAC En 1302, Bertrand de Calhac, seigneur du lieu. Familles Chaumeil et de Bournazel. François de Buisson de Bournazel, gouverneur et sénéchal de Rouergue, marié en 1592 à Florette de Morlhon Sanvensa. En 1657, il vend la moitié de la terre de Caillac à Jean-Annet de Noailles, abbé de Valette et du Broc, qui l'engage auprès de Jean-Gaspard de Boschâtel. Albert de Malet de La Farge  de 1809 à 1869, seigneur du Dat à Labrousse, et de Caillac, marié en 1836 à Julia du Vergier de La Rochejacquelin, nièce du célèbre général vendéen. Il vend ses deux domaines à M. Marty, négociant à Aurillac. Pierre Marty Il se marie avec Jeanne Boisse de Black, personne savante qui l'aida dans ses recherches scientifiques. Son grand-père, Adolphe Boisse (1810-1896), député de l'Aveyron, et sa sur Yvonne Boisse de Black (1892 -1989) ont été des géologues estimés. Son autre sur, Germaine Boisse, était mariée à Gaston de Butler de Kermaria. Devenue âgée et n'ayant que des neveux, lui et sa fille Jeanne Marty en 1901 confièrent l'ensemble du domaine de Caillac à son amie Germaine Chirac, grand-mère de la famille Stehelin qui recueillit la succession.                                                                                                                                                                                              SALLES vers 1705  Cabanes fut construit par Louis de la Roque-Sénezergues, officier à Aurillac, bien longtemps après le séjour de Marguerite de Valois à Carlat.  Il fut reconstruit et habité à nouveau par la famille de Salles qui, dans la suite sallia aux Clavières dAyrens. En 1815, Jeanne-Gabrielle de Sales épousa le Baron de Glavenas.  Pendant longtemps Salles a été habité par la soeur de Pierre.      Manoir de Salés du XVIIe siècle était un couvent, vendu comme bien national à la Révolution, acquit par la famille  de Murat -Sistrières, puis passa à la famille De Pierre, fut au XXe siècle restaurant, aujourd'hui centre de Vacances.  Le château de Salles est un ensemble hôtelier propriété de M. Liess depuis 1996. Sauvé de la ruine il y a 45 ans par la famille Couillaud, Michel Brevet, vient de racheter le fonds de commerce du château de Salles, le château des Salles a retrouvé au fil des années son élégance sobre, ses lignes fines et équilibrée. Transformé en hôtel restaurant.","architecture":"Caillac, château du XVe siècle de plan en équerre à deux niveaux de lucarnes en deux rangées sur toit en croupes flanqué d'une tour ronde  à l'angle extérieur droit à trois niveaux avec mâchicoulis et chemin de ronde,  tourelle à l'opposée,  la salle de guet du XVe siècle, niché à 700m. d'altitude dans un parc. Elégamment perché sur une colline de Vézac, à portée d'Aurillac, cet ancien château de guet du XVe siècle offre un panorama somptueux sur les monts du Cantal.  Golf. Ce charmant ensemble architectural composé de la demeure principale, corps de logis de plan rectangulaire à deux niveaux et attiques  sur toit brisé et flanqué de trois tours rondes une plein cintre hors-oeuvre et deux autres en angles, toitures en poivrières, il fut remanié au XIXe siècle et de deux longs communs agrémentés de pigeonniers en symétrie, il a retrouvé au fil des années son élégance sobre, ses lignes fines et équilibrées.\r\nManoir de Salés du XVIIe siècle corps be bâtiment imposant en U à quatre niveaux avec attiques, fut au XXe siècle restaurant, aujourd'hui centre de vacances.","habitants":"Familles Chaumeil                                                                                Famille Couillaud\r\n        \r\n        \r\n        \"","divers":"Château de Caillac, de La Salle, manoir de Salés à Vézac","gps":"","images":["../image/image_15/15_Vezac_1.jpg","../image/image_15/15_Vezac_2.jpg","../image/image_15/15_Vezac_3.jpg","../image/image_15/15_Vezac_4.jpg","../image/image_15/15_Vezac_5.jpg","../image/image_15/15_Vezac_6.jpg","../image/image_15/15_Vezac_7.jpg","../image/image_15/15_Vezac_8.jpg","../image/image_15/15_Vezac_9.jpg"]},"Consult_chateau_formulairee799-2":{"id":"Consult_chateau_formulairee799-2","dept":"15","canton":"Ydes","commune":"Ydes","nom":"Ydes","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Ydes celui de Trancis et du Châtelet.                           TRANCIS, une maison bourgeoise est construite vers 1830. Vers 1878, elle est achetée par Jean Galvaing, industriel du textile originaire d'Ydes. Vers 1909, la maison est transformée en château néo Renaissance par l'architecte Raynaud et le sculpteur Emile Gourgouillon. L'intervention de Gourgouillon concerne le décor d'architecture et certains décors intérieurs, d'autres personnes semblent avoir participé au chantier. En 1910, les frères Treyve paysagiste à Moulins, ont donné un projet de parc non réalisé ou du moins modifié. On conserve également une esquisse de décor par G. Maurie. Le château a été converti en hôtel à partir de 1988. A l'ouest du château s'aligne le bâtiment des communs avec notamment une étable à chevaux, une sellerie et des remises, les murs sont enduits, la couverture est en ardoise. Au devant de la face sud du château s'étagent deux terrasses reliées par un escalier symétrique, la plus basse possédait un bassin avec jet d'eau. \r\n CHATELET Dominant la vallée de la Sumène et le village pittoresque dYdes-Bourg, la tour du Châtelet, construite en 1448 par Géraud de Chapitol, riche bourgeois de Saignes, semble assurer de sa protection lancienne place forte des Templiers. Depuis ce remarquable promontoire, on aperçoit également Saignes, sa chapelle et les ruines de son château. Cest dans cette noble demeure quest décédé en 1844 Jean-Baptiste de Ribier du Châtelet, esprit brillant de son temps et auteur du fameux dictionnaire statistique et historique du Cantal, ouvrage certes ancien mais qui fait encore figure de référence lorsque lon procède à quelques recherches historiques concernant le département.","architecture":"Trancis dans un style néo renaissance, possède un corps de logis rectangulaire à deux niveaux et lucarnes et pavillon saillant sur façade d'entrée sur colonne balcon et toit profilé avec un clocheton, venu s'accolait   sur la droite de cette façade une tour carrée avec lucarnes en toiture sur les côtés donnant sur l'extérieur avec un toit profilé  et autres tours rondes une principale à l'arrière du  corps de logis  toit en poivrière et tourelle d'escalier sur l'extérieur et sur angle en façade une échauguette.                                               Châtelet, en 1448, château fort situé à Montfouilloux.  Au XVIIe siècle, il comprend un rez-de-chaussée, deux étages habitables et un troisième étage à usage de grenier, il est couvert d'une terrasse qui correspond au niveau de défense, les étages sont distribués par un escalier placé dans la tour en demi hors-oeuvre. En 1777  les communs sont construits ou remaniés. Au XIXe siècle, le château défensif est transformé en demeure plus confortable, les niveaux plus nombreux sont compartimentés et de nombreuses fenêtres sont créées, la terrasse est couverte d'un toit. Le toit du château est en croupes ; la tour demi hors-oeuvre du château du Châtelet et la tourelle des communs sont couvertes d'un toit conique, recouvrant un chemin de rondes à mâchicoulis.","habitants":"Famille de  J. Galvaing                                                                                      Famille de Géraud de Chapitol\r\n        \"","divers":"Château de Transis et du Chatelet","gps":"","images":["../image/image_15/15_Ydes_1.jpg","../image/image_15/15_Ydes_2.jpg","../image/image_15/15_Ydes_3.jpg","../image/image_15/15_Ydes_4.jpg","../image/image_15/15_Ydes_5.jpg","../image/image_15/15_Ydes_6.jpg"]},"Consult_chateau_formulairea57a":{"id":"Consult_chateau_formulairea57a","dept":"15","canton":"Vic sur Cère","commune":"Yolet","nom":"Yolet","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Yolet, le château de Boudieu et le château du Doux.\r\nDOUX, à côté du bourg le château du Doux, une ancienne motte castrale, situé dans le Cantal à Yolet.\r\nChâteau de Yolet, vestiges sur une motte dans la plaine.","architecture":"Doux a été construit vers 1850, de style néo-classique, influencé par les architectes de la fin du XVIIIe siècle. La présence de niches, de l'étage attique, le plan ramassé et la couverture en tuile canal lui confèrent une allure de villa palladienne, la chapelle face au château est de style troubadour. Le château du Doux se composait d'une aile principale flanquée de deux avant-corps latéraux. La travée droite du corps central et l'avant corps correspondant ont aujourd'hui disparu. Elevé sur un étage de soubassement, il se compose de deux étages nobles surmontés d'un attique. A l'intérieur au rez-de-chaussée, les pièces s'ordonnent en enfilade autour de la cage d'escalier. Décor bourgeois du milieu du XIXe siècle avec cheminées, placards, et boiseries.","habitants":"Seigneurs locaux\r\n        \"","divers":"Le château de Doux à Yolet","gps":"","images":["../image/image_15/15_Yolet_1.jpg","../image/image_15/15_Yolet_2.jpg","../image/image_15/15_Yolet_3.jpg"]},"Consult_chateau_formulairea618":{"id":"Consult_chateau_formulairea618","dept":"15","canton":"Aurillac","commune":"Ytrac","nom":"Ytrac","type":"Château","periode":"XV-XVII","histoire":"Plusieurs Château à Ytrac, dont celui d'Ytrac du XVIIe siècle avec la tour de Bex, d'Espinassol foyer d'acceuil, Demeure de Foulan, de Lamartinie, de Vielle, de la famille Vermenouze,  de Lesbros, de Toulousette du XVIIe siècle. YTRAC, la terre fut la propriété de trois familles qui se succédèrent, les de la Salle, de Montal et de Pérusse dEscars du début du XVIIe siècle jusqu'au XIXe siècle.\r\nLAMARTINIE, servit de refuge aux habitants d'Aurillac lors de la grande peste, qui décima la région.   Cité pour la première fois en 1592, le château eut pour propriétaires successifs les familles de Tournemire, Ollier, Cambefort, Legendre, Aragonnès, de Boschâtel, Bouygues, de Saint-Vincent. En 1895 les Bouygues, une famille limousine de la bourgeoisie de Robe, font restaurer le château par l'architecte Lemaigre-Dubreuil.                                                              LEYBROS, c'est un ancien fief qui appartenait, en 1443, à  Jean de Griffeuilhe, co-seigneur de Vazeille,  Julien de Griffeuilhe en jouissait en 1460, et  Jean de Lourdes, en 1513. Pierre de Veyre,  le possédait en 1518 Ses descendants prirent assez souvent le nom du fief. Annet de Leybros et Gabriel, son fils, habitaient le château en 1575. Pierre de Vigier, receveur des tailles à l'élection d'Aurillac, était seigneur du château de Leybros en 1634 et en 1661. Il avait épousé Philippie de Prallat. François Fargues, avocat d'Aurillac, avait Leybros en 1678. A son décès, Marguerite d'Ampare, sa veuve, épousa de Fortet, président au bailliage d'Aurillac, en 1692, et lui porta la châtellenie de Leybros. Henri Fargues, avocat, fut seigneur de Leybros en 1697. Il avait épousé Françoise de Corn d'Ampare, qui resta veuve. Son fils, Etienne de Fargues, jouissait de Leybros en 1707. En 1771, Joseph Philippe de Fortet était seigneur de Leybros et de Cavanhac. Cette propriété appartient encore à un membre de cette famille, maître de Fortet, juge au tribunal de première instance d Aurillac.                                   ESPINASSOL, Gabriel de Roquemaurel, issu du troisième mariage de Pierre de Roquemaurel avec Marguerite de Jean, épousa par contrat du 19 février 1572, Marguerite dEspinassols, fille et héritière de Me Pierre dEspinassols, seigneur, et dAnne de Cayrac. Marguerite dEspinassols lui apporta la terre. Passa a M Delfour, négociant et président du tribunal de commerce d'Aurillac. C'est une des belles propriétés du Cantal. Aujourd'hui maison de retraite.","architecture":"Ytrac, fut une maison-forte, au XVe siècle des tours renforcèrent sa fonction défensive, plus tard le château fut coiffé d'un toit typique de Haute Auvergne en lauzes avec deux étages de lucarnes.                                                                                      Lamartinie, a été très remanié au cours des siècles et l'ensemble relève de styles architecturaux de différentes époques allant du XVIe au XIXe siècle. Au logis-donjon carré qui compose l'aile sud, sans doute du début du XVIe siècle, a été accolé un logis flanqué d'une tourelle d'escalier polygonale vers la fin du XVIe siècle. Ainsi la partie ancienne du château se compose de deux corps de logis rectangulaires reliés entre eux et d'une tour escalier octogonale.Une aile nord symétrique du donjon sud datée de la fin du XVIIIe siècle ou du XIXe siècle puis en 1895 une tourelle polygonale adossée sur la face Est et une tour de flanquement nord-est, le pendant de la tourelle sud-est couronnée de corbeaux comme le donjon carré, dont on ne connait pas la date de construction. Une aile les relie ce qui délimite une cour intérieure, À l'intérieur du château, le décor est de style troubadour.\r\n Le château de Leybros présente deux grosses tours rondes qui sont accolées au donjon, lui-même accolé au corps de logis flanqué de tourelles, de fenêtres à meneaux et toitures en lauzes de schiste. Il possède également un parc remarquable doté d'une belle allée, d'un portail et clôture de jardin.                                                            Toulousette, corps de logis rectangulaire à trois étages flanqué d'une tourelle d'escalier ronde.                                                  Espinassols fut confisqué pendant la Révolution. Le château très modifié au XIXe siècle a été transformé en centre pour handicapés mentaux.","habitants":"Familles de Tournemire                                                                          Famille deJulien de Griffeuilhe\r\n        \r\n        \"","divers":"Château d'Ytrac, de Lamartinie, de Leybros, d'Espinasols et de Toulousette.","gps":"","images":["../image/image_15/15_Ytrac_1.jpg","../image/image_15/15_Ytrac_2.jpg","../image/image_15/15_Ytrac_3.jpg","../image/image_15/15_Ytrac_4.jpg","../image/image_15/15_Ytrac_5.jpg","../image/image_15/15_Ytrac_6.jpg","../image/image_15/15_Ytrac_7.jpg","../image/image_15/15_Ytrac_8.jpg","../image/image_15/15_Ytrac_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','15 — Cantal'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
