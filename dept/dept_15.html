{"id":"Consult_chateau_formulaire95c0","nom":"Vigne","commune":"Ally","type":"Château","img":"../image/image_15/15_Vigne_1.jpg"},{"id":"Consult_chateau_formulairef1a9","nom":"Vigouroux","commune":"Saint-Martin sous Vigouroux","type":"Château","img":"../image/image_15/15_Vigouroux_1.jpg"},{"id":"Consult_chateau_formulaireaed8","nom":"Vitrac","commune":"Vitrac","type":"Château","img":"../image/image_15/15_Vitrac_1.jpg"},{"id":"Consult_chateau_formulaire6080-2","nom":"Vixouze","commune":"Polminhac","type":"Château","img":"../image/image_15/15_Vixouze_1.jpg"},{"id":"Consult_chateau_formulairefb81","nom":"Vézac","commune":"Vezac","type":"Château","img":"../image/image_15/15_Vezac_1.jpg"},{"id":"Consult_chateau_formulairee799-2","nom":"Ydes","commune":"Ydes","type":"Château","img":"../image/image_15/15_Ydes_1.jpg"},{"id":"Consult_chateau_formulairea57a","nom":"Yolet","commune":"Yolet","type":"Château","img":"../image/image_15/15_Yolet_1.jpg"},{"id":"Consult_chateau_formulairea618","nom":"Ytrac","commune":"Ytrac","type":"Château","img":"../image/image_15/15_Ytrac_1.jpg"}];const FULL={"Consult_chateau_formulairef133":{"id":"Consult_chateau_formulairef133","dept":"15","canton":"Neuvéglise","commune":"Alleuze","nom":"Alleuze","type":"Château fort","periode":"XV","histoire":"ALLEUZE, cette forteresse appartenait à lÉvêque de Clermont qui en fit un grenier à dîme. Investie en 1383 par les bandes du routier Bernard de Garland,  dit \" le méchant bossu \", elle fut démolie par les Sanflorains. La terre d'Alleuze semble avoir été possédée d'abord par la famille de Mercur, dont on connaît bien l'un des grands représentants, Odilon de Mercur. Puis elle fut la propriété du connétable d'Auvergne, Archambault de Bourbon,  puis aux Lastic. Notons qu'en ces temps-là, la Haute-Auvergne ne constituait pas encore un évêché autonome et relevait de celui de Clermont. En contrebas du château, à quelques dizaines de mètres à peine, vous pourrez admirer la très belle chapelle médiévale avec son chemin de croix. Tous les deux ans, la chapelle est la scène d'un spectacle théâtral avec son et lumières et feux d'artifices. Aujourd'hui  propriété de  la commune.","architecture":"Alleuze est bâti sur un piton dont le barrage de Grandval en a fait une presqu'île. Ses ruines majestueuses, qui dominent le ruisseau de Labaisse. Alleuze, est un ancien château fort du XIVe siècle, remanié et restauré à plusieurs reprises et dont l'origine remonte au XIIe siècle. Cet édifice est un donjon rectangulaire,  à deux étages, en 1693, il consistait en un vieux corps de logis et quatre tourelles circulaires percées de hautes archères. Trois dentre elles avaient des corps-de-garde voûtés au premier et au deuxième étage. Dans lune on remarquait un trou carré dit les oubliettes et aujourdhui comblé, on avait percé des canonnières de toute part. Au-dessus des caves du corps de logis sélèvent deux étages. Le château est entouré de deux murs denceinte dont on voit encore les restes.  Aujourd'hui en ruine et maintenu dans cet état. Il est accompagné de la chapelle Saint-Illide, reconstruite au XVe siècle.","habitants":"Famille de Mercur\r\n        \"","divers":"Vestiges de la forteresse d'Alleuze","gps":"","images":["../image/image_15/15_Alleuze_1.jpg","../image/image_15/15_Alleuze_2.jpg","../image/image_15/15_Alleuze_3.jpg","../image/image_15/15_Alleuze_4.jpg"]},"Consult_chateau_formulaire4c14":{"id":"Consult_chateau_formulaire4c14","dept":"15","canton":"Naucelles","commune":"Tournemire","nom":"Anjony","type":"Forteresse","periode":"XV","histoire":"ANJONY, construit par Louis d'Anjony, compagnon de Jeanne d'Arc ayant reçu du Roi Charles VII  la mission de protéger les alentours, le donjon d'Anjony est toujours là, intact et fier, exemple très caractéristique des petites forteresses de montagne du XVe siècle. En 1351, Guillaume Johanini arrive sur les terres de la famille des Tournemire, l'une des plus puissantes maisons féodales d'Auvergne. La famille des Johanini est anoblie en 1360 et adopte de nom d'Anjony. En 1368, Bernard d'Anjony, bourgeois d'Aurillac, épouse Marguerite de Tournemire. Durant la guerre de Cent Ans, les deux familles appartiennent à deux clans distincts, les Anjony faisant acte d'allégeance au roi de France tandis que les Tournemire, souverains sur leur terre, se rallient aux Plantagenêts. Autorisé par Charles VII, Louis d'Anjony fait construire le donjon médiéval, non loin du château des Tournemire, pour abriter le corps armé, ce qui provoque une haine profonde entre les deux familles jusqu'au meurtre de Claude d'Anjony en 1523. En 1590 un accord entre les deux familles reconnaîtra la « parité d'honneur » et la rivalité prend fin vingt ans plus tard par le mariage de Michel II d'Anjony avec l'héritière des Tournemire.\r\nAu XVIIIe siècle, Claude d'Anjony, marquis de Mardogne, lieutenant du corps des gardes royaux, entame la construction du corps de logis qui jouxte l'une des tours.  Le château passe ensuite par héritage dans les familles de Léotoing puis Pélissier de Féligonde. Son histoire fut tumultueuse aux XVe et XVIe siècles, car une véritable \"vendetta\" opposa la famille d'Anjony à celle des Tournemire, trop proches voisins et rivaux. La demeure est toujours habitée par la même famille depuis l'origine, actuellement la propriété du marquis de Léotoing d'Anjony.","architecture":"Anjony; architecture militaire du Moyen-Age, bien que construit autour de 1430. Donjon rectangulaire à trois étages habitables dominés par des tourelles circulaires d'angles, l'une d'entre elles renfermant un escalier hélicoïdal desservant l'ensemble du bâtiment. Il est couronné par un chemin de ronde sur les 4 faces et chaque tour possède le sien propre. Après avoir découvert l'extérieur médiéval et austère et admiré la hauteur des tours environ 40 mètres, on entre par l'une des tours dans la salle d'accueil du château, une vaste salle voûtée dont le sol était autrefois en terre battue et qui servait de cave et de salle des réserves. Il subsiste au plafond de la pièce des crochets qui servaient à pendre victuailles et salaisons. Chemins de ronde et étages militaires. Tout autour du donjon, on peut parcourir les chemins de ronde, avec leurs créneaux et mâchicoulis, en admirant la vue sur toute la vallée. Tout en haut des tours  on remarque la puissance de la charpente qui soutient les toits de lauzes. Au XVIIIe on ajouta à l'austère construction médiévale, un corps de logis plus accueillant et plus conforme aux goûts de l'époque. Riches intérieurs décorés de remarquable fresques du XVIe siècle et mobilier des diverses époques de la vie du château.","habitants":"Famille de Louis d'Anjony\"","divers":"Forteresse d'Anjony","gps":"","images":["../image/image_15/15_Anjony_1.jpg","../image/image_15/15_Anjony_2.jpg","../image/image_15/15_Anjony_3.jpg","../image/image_15/15_Anjony_4.jpg","../image/image_15/15_Anjony_5.jpg","../image/image_15/15_Anjony_6.jpg"]},"Consult_chateau_formulairef1df":{"id":"Consult_chateau_formulairef1df","dept":"15","canton":"Murat","commune":"Laveissière","nom":"Anterroches","type":"Château fort","periode":"XV","histoire":"A Laveissière, le château d'Anteroches, celui de Combrelles et de Chambeuil sont  ruinés.                                                  ANTERROCHES; cité au XIIIe siècle, à la famille de Chambon, Juliane du Chambon qui l'apporte en dot en 1478 à Jean de Laire. Celui-ci revend le domaine et le château à Jean de Traverse. La famille de Traverse est de Murat qui a donné plusieurs médecins du roi. La branche aînée de la famille d'Anterroches s'est éteinte au début du XIXe siècle, avec le décès sans enfants d'Auguste de La Rochelambert, veuf de Louise-Marthe-Catherine d'Anterroches, dernière représentante de sa branche. Le château et le domaine ont alors été rachetés par : Jacques de Brives  seigneur de Peyrusse, fils d'un autre Jacques de Brives et de Marie-Louise Teilhard, receveur des finances. En 1809 de son mariage avec Sophie Tallendier, il eut pour fils et successeur: Eugène de Brives de Peyrusse , dit le comte d'Anterroches, dernier de sa branche, receveur des impôts à Murat, n'ayant qu'une fille mariée sans enfants, revend le château en 1856 à son neveu éloigné de la branche cadette subsistante de la famille d'Anterroches : Louis-François d'Anterroches  dit le baron de Peyrusse, fils de François et d'Anne Rome, devint propriétaire d'Anterroche. Il épousa Fanny Brugerolle de Fraissinette, qui lui donna au moins deux fils: Henri (1850-1924) et Louis (1851-1926) dont les descendants ont conservés le château jusqu'à nos jours.\r\nCHAMBEUIL, le  premier seigneur famille de Beaumarché, puis famille de la Vie de Villemur, puis famille de Julien et la famille de Cosnac et d'Anterroches.                                                             COMBRELLES,  à l'origine, le château est propriété de la maison des Jurquet. Cette famille prétend descendre des comtes de Toulouse et notamment de Raymond Ier de Toulouse-Rouergue, cependant Marcellin Boudet les fait plutôt descendre des Comptours de Nonette. Quoi qu'il en soit, cette famille vient à être à la tête de la seigneurie d'Oradour puis une branche cadette de la famille s'établit à Combrelles.","architecture":"Anteroches du XIIIe siècle de plan quadrangulaire avec en façade un donjon rectangulaire à quatre étages chemin de rondes et mâchicoulis, toitures à quatre pans, les corps de logis de trois niveaux accolés de chaque côté du donjon, et sur la droite trois  tours carrées, une sur l'extérieur accolée à l'ensemble l'autre en saillit à trois niveaux  et une petite saillante  en encorbellement sur deux niveaux avec toit impérial. Sur la gauche deux tours rondes accolées l'une à l'angle chemin de ronde et mâchicoulis et la deuxième entre le donjon et la tour, les deux à toits en poivrière.  À la fin du XIXe siècle, le château a été restauré et agrandi dans le style troubadour.                                                                      Chambeuil, le château est actuellement en ruines. Il ne subsiste que quelques murs ainsi que les vestiges d'une petite tour. Combrelles est un château médiéval, aujourd'hui en ruines.","habitants":"Famille de Traverse                                                                                      Famille de la Vie de Villemur,\r\n        \"","divers":"Château fort d'Anterroches","gps":"","images":["../image/image_15/15_Anterroches_1.jpg","../image/image_15/15_Anterroches_2.jpg","../image/image_15/15_Anterroches_3.jpg","../image/image_15/15_Anterroches_4.jpg"]},"Consult_chateau_formulaire9790":{"id":"Consult_chateau_formulaire9790","dept":"15","canton":"Riom-ès-Montagnes","commune":"Apchon","nom":"Apchon","type":"Vestiges","periode":"XII","histoire":"APCHON  appartenait à l'une des familles les plus prestigieuse et les plus influentes d'Auvergne durant le Moyen-Age. Le titre féodal de \"comtor\" devient un patronyme de la famille à partir du XIIIe siècle et permet aux seigneurs d'Apchon de siéger, les premiers ou presque aux Etats de la Haute-Auvergne; un privilège qui a souvent suscité des querelles avec les seigneurs de Mercoeur et de Pierrefort. En 1265, Eustache de Beaumarchais, bailli des montagnes d'Auvergne, intervient contre les Comptour qui ravagent la région. Au début du XIVe siècle,  Guy s'illustre dans les guerres de Flandres auprès de Philippe VI de Valois. La famille se distingue également lors de la guerre de Cent Ans. En 1358, après la défaite de Poitiers, Guillaume VI d'Apchon est nommé bailli et capitaine général de la province, prenant ainsi la tête de la noblesse du pays dans le but d'organise la résistance face aux Anglais. En 1359 Apchon résiste à trois nouveaux assauts conduits pas Aimerigot Marchès, au service des troupes anglaises qui ravagent alors le Cantal. Le château a dû subir différents assauts tout au long de la seconde moitié du XIVe siècle, ce qui motiva le fils de Guillaume VI, Louis, à le réaménager à partir de 1412. Le successeur de ce dernier, Guillaume VII, est tué a Azincourt en 1415. Son frère étant décédé quelque temps plus tard sans héritier, la succession revient à l'un de ses neveux, Artaud VII de Saint-Germain d'Apchon, à l'origine de la deuxième branche de la maison d'Apchon. Son petit fils, Jean, parvient au statut de chambellan du roi, ce qui procure une toute nouvelle renommée à la seigneurie. Aussi, le XVe siècle marque l'apogée de la famille d'Apchon en Haute-Auvergne. Propriétaire actuel la mairie d'Apchon.","architecture":"Vestiges du château d'Apchon médiéval d'une des plus puissantes et des plus considérés parmi les familles nobles de Haute-Auvergne. Il est situé sur un puech dominant le village d'Apchon dans le Cantal. Implanté en haut d'un dyke basaltique à 1100 mètres d'altitude, qui domine la vallée de la Rhue , de la Santoire et du Marilhou. Situé pendant la guerre  de Cents Ans entre les territoires conquis par les anglais et celui encore contrôlé par le roi de France, il est plusieurs fois attaqué et servira de base de départ pour la reconquête du Limousin. Il a été reconstruit entre 1848 et 1422 avec une enceinte cantonnée de cinq tours rondes et de deux engagées . il n'était plus habitable en 1760. Les ruines du château sont flanqués de tours circulaires d'angles.                                  Pas d'information historique du château de Jaleine.","habitants":"Seigneur d'Apchon\r\n        \"","divers":"Vestiges du fort d'Apchon et château de Jaleine","gps":"","images":["../image/image_15/15_Apchon_1.jpg","../image/image_15/15_Apchon_2.jpg","../image/image_15/15_Apchon_3.jpg","../image/image_15/15_Apchon_4.jpg","../image/image_15/15_Apchon_5.jpg","../image/image_15/15_Apchon_6.jpg","../image/image_15/15_Apchon_7.jpg"]},"Consult_chateau_formulaire3aac":{"id":"Consult_chateau_formulaire3aac","dept":"15","canton":"Ydes","commune":"Arches","nom":"Arches","type":"Château","periode":"XV-XIV","histoire":"ARCHES, néchappe pas à cette règle, on assure quun souterrain, partant de la tour, traverse le village de Jarrige, à quelques kilomètres de là et conduit au ban communal dOrset. Ce qui est par contre tout à fait véridique, cest que cette tour faisait partie dun château en 1475, qui fût cédé par le doyen à la famille de Battut.                                                                                       MONTFORT, le premier seigneur s'appelait d'Austressal. Noble Pierre d'Austressal, damoiseau de Mauriac, vendit en 1329 à Bertrand de Sartiges, seigneur du lieu. Il s'en réservait l'autre partie et  prit le nom lorsqu'il rendit hommage au seigneur de Miremont . En 1346, il avait rendu hommage pour une autre partie de Montfort au commandeur de Carlat.  Galéane de Bort de Pierrefitte, est mariée à Guillaume de Las Vaisses, lorsqu'elle fait son testament à Montfort. Guillaume de Las Vaisses habite toujours le château de Montfort en 1361. Gabrielle de Battut, dame de Montfort, épouse en 1527 Gabriel de Murat, seigneur de Serres et de Tissonières, quatrième fils de noble Philibert de Murat, seigneur de Rochemaure, et de Gabrielle de Sailhant. Il fit hommage au roi en 1540 et fut père de: Bertrand de Murat-Montfort, seigneur de Montfort, qui épouse en 1575 Catherine de Lévy, dont au moins un fils: Claude de Murat-Montfort épouse en 1599 Jacqueline de Sartiges, fille de Pierre, seigneur de Lavandès, et d'Antoinette de Roux. François de Murat-Montfort épouse en 1647 Antoinette de Pélamourgues, Charles de Murat-Montfort,  il se fait remplacer par Bertrand d'Humières, et il est rappelé en 1693  par Antoine de Murat-Montfort, major au Régiment d'Orléans-dragons, est seigneur de Montfort en 1747. Sans d'enfants, il donne Montfort à son neveu Guillaume d'Humières, son fils, est major au régiment d'Orléans-dragons, il eut deux fils de son mariage avec Marie-Louise de Leygonie. L'aîné, Pierre-François-Joseph, épousa en 1777   la fille de Charles Joseph de Saint Martial, baron de Conros, et continua la lignée des seigneurs de Montfort. Son petit-fils, François Victor Joseph Léon, comte d'Humières, fut exproprié de Montfort et fut adjugé le 19 octobre 1894 à Pierre Lafon, dont la famille en était encore propriétaire en 1936.","architecture":"Arches, Le donjon a été rabaissé de 18 m car on a voulu le démolir. Vu la solidité de louvrage, lidée a été abandonnée et cest tant mieux. Toutefois, comme rien ne se perd, les débris de cette tentative de démolition, ont été récupérés afin de construire certaines maisons de la localité. Cette tour, ronde à lextérieur, se révèle hexagonale à lintérieur. Des pierres volcaniques ont été utilisées lors de sa construction. Un escalier très étroit, communiquant aux étages supérieurs, a été réalisé à même la pierre, dans lépaisseur du mur. Le dernier étage de cette tour de garde était voûté et au centre de celle-ci, se trouvait une ouverture, ronde, à laquelle on appliquait une échelle, pour arriver à la plate-forme servant de toit.                                                                    Montfort possède une structure compacte, le corps de logis est d'un seul bloc avec chemin de ronde. La façade est encadrée par deux tours carrées, restaurées au XVIIIe siècle. La partie antérieure comporte une troisième tour carrée, plus massive remontant au XIVe siècle avec chemin de ronde et de mâchicoulis.","habitants":"Famille de Battut                                                                                    Bertrand de Murat-Montfort\r\n        \"","divers":"Château de Montfort à Arches","gps":"","images":["../image/image_15/15_Arches_1.jpg","../image/image_15/15_Arches_2.jpg","../image/image_15/15_Arches_3.jpg","../image/image_15/15_Arches_4.jpg","../image/image_15/15_Arches_5.jpg","../image/image_15/15_Arches_6.jpg"]},"Consult_chateau_formulairef4aa":{"id":"Consult_chateau_formulairef4aa","dept":"15","canton":"Aurillac","commune":"Arpajon sur Cère","nom":"Arpajon","type":"Château","periode":"XV-XVIII","histoire":"Cinq châteaux à Arpajon sur Cére,  celui de Conros, de Ganhac, de la Bastide qui a été détruit lors des guerres de religions,  de Carbonat   (Voir Article) et de Montal.\r\nCONROS, château bâti au début du XIIe siècle par Astorg d'Aurillac. Passa  par alliance d'Alix d'Aurillac (d'Orlhac) héritière qui épouse Louis Ier  de Courcelles seigneur d'Aurouze passe en 1445 à la famille de Courcelles,  leur fils Louis II de Courcelle meurt sans enfants sa veuve Isabeau de Langeac convole vers 1465 avec Jean d'Urfé ce dernier agrandit le corps de Logis. En 1514 Morand et Imbert de Grolée arrière-petit-fils de Jean d'Urfé cèdent Conros  à Pons de Gontaud-Brion,  seigneur de Biron  qui lui apporte également des remaniements à la partie nord du château, Jean de Gontaud héritier de son frère revend peu de temps après le château en 1556 à Rigaud de Saint-Martial est passionnée de plantes odorantes et de parfums. La descendance possédera le château pendant sept générations durant. En 1777  Marie-Geneviève de Saint-Martial épouse Pierre-François-Joseph d'Hunières, leur fils Guillaume, c'est sa veuve Marie-Françoise  en 1838 que le dernier de Saint-Martial resté sans postérité lègue le château à  la famille des d'Humières dont Robert meurt au front en 1915 marque le début de l'abandon. En 1971 monsieur Alain Morgon et son épouse née Maud D'Humières prennent possession du domaine et le remette dans l' état  actuel pour y recevoir de nombreuses manifestations culturelles et des expositions.           GANHAC, actuellement maison de maître, ancien fief adjugé en 1676 à Charles de Broquin, marié avec Jeanne de Cambefort.\r\nPRADE, acheté en 1756 par Marie-Françoise de Broglie, veuve de Charles Robert de Lignerac, qui y fit des travaux considérables. Ruiné par la Révolution.                                                                 MONTAL, habité par les seigneurs de Laroquebrou et de Conros, au XVIIe siècle la famille de la Roque les seigneurs de la Moissétie et de Réquiran,  en 1737 Jacques de la Roque était seigneur de Montal.","architecture":"Le château de Conros est un château médiéval présente plusieurs parties: la tour Nord, la plus ancienne, la tour Sud, un corps de logis rectangulaire avec deux étages, et l'aile en pavillon avec sa couverture en lanterne formant colombier. L'ensemble était surmonté d'un étage sur encorbellement.présente plusieurs parties. L'ensemble était surmonté d'un étage sur encorbellement.   L'imposant donjon médiéval, flanqué d'un corps de logis et deux tours rondes, a été transformé à la Renaissance en une majestueuse demeure.                                                                          Château de Montal, subsiste qu'à l'état vestiges, dont une partie continuait  d'être  habitée à la fin du XVIIIe siècle.","habitants":"Famille d'Astorg                                                                                     Famille de Montal\r\n        \"","divers":"Château de Conros à Arpajon,  Ganhac , Prade et Montal","gps":"","images":["../image/image_15/15_Arpajon_1.jpg","../image/image_15/15_Arpajon_2.jpg","../image/image_15/15_Arpajon_3.jpg","../image/image_15/15_Arpajon_4.jpg","../image/image_15/15_Arpajon_5.jpg","../image/image_15/15_Arpajon_6.jpg","../image/image_15/15_Arpajon_7.jpg"]},"Consult_chateau_formulaire5cd6":{"id":"Consult_chateau_formulaire5cd6","dept":"15","canton":"Aurillac","commune":"Aurillac","nom":"Aurillac","type":"Château","periode":"XIII-XIX","histoire":"Plusieurs châteaux à Aurillac de Fabrégues reconstruit au XIXe siècle (voir article), de Baradel, de Lascanaux du XIXe siècle, de la Moissetie du XIIIe siècle, de Noalhac et de Saint-Etienne musée des Volcans (voir article).                                                         AURILLAC, les monuments historiques dAurillac sont surtout représentés par de grands édifices qui ont traversé des siècles et des histoires.  A l'origine, les consuls de la ville s'y seraient installés vers 1280. Détruite par les guerres de religion, elle fut reconstruite avant d'avoir à subir un incendie au siècle dernier. Bien qu'entièrement restaurée, elle ne se visite pas. Vous pourrez tout de même admirer l'extérieur de l'édifice et sa superbe porte.   Cest au XIIIe siècle que l'on commence à bien connaître les coutumes municipales grâce à un conflit entre les consuls et les abbés. Après la prise du château Saint-Étienne en 1255 et deux sentences arbitrales appelées les Paix d'Aurillac, les relations se normaliseront.                                                                            BARADEL, Jean, sieur de La Combe de Roussy, né en 1671 et décédé en 1749, marié à Geneviève Lagoutte. Jean, sieur de Baradel, né vers 1710 et décédé le 21/3/1780, marié à Marguerite Charmes en 1746  Père de :  Toinette Marie Marguerite,  mariée à Jean Baptiste Grimal.                                                              LASCANAUX, nous ne possédons pas d'historique sur le château.            MOISSETIE, son nom vient de la famille Moisset, viguiers héréditaires de la vallée de la Jordanne pour l'abbé d'Aurillac. Depuis le XIIIe siècle jusqu'au XVe siècle, il reste dans la famille Moisset, puis dans la famille de La Roque de Roquenatou (dont une branche se fixe au château de Montal-lez-Arpajon) jusqu'à la fin du XVIIIe siècle. Il est ensuite acheté par M. Brunon dont la famille le conserve jusqu'à la fin du XXe siècle.","architecture":"Aurillac le château voir article pour le  château de Saint Etienne .              Baradel  pas de Gravure.                                                                  Aurillac, la maison consulaire et le palais de justice la maison d'arrêt et l'ancien groupement de gendarmerie du Cantal à Aurillac                    Lascanaux, est un château en forme de T  deux corps de logis un à deux niveaux  avec lucarnes et accolé d'une tour ronde à toit en poivrières, le deuxième corps de logis formant la partie supérieur du T à trois niveaux Moissetie, remanié au cours des siècles, le château se compose d'une tour d'angle ronde du XIXe siècle cantonnant un corps de logis ancien de plan rectangulaire, la façade daterait du XVIe siècle, la tour circulaire et la tour carrée ont été rajoutées au XIXe siècle.                                                                                  Noalhac, corps de logis rectangulaire à deux niveaux avec donjon sur l'arrière et lucarnes contournant les façades.","habitants":"Famille de  Jean Baptiste Grimal                                                             Famille Moisset\r\n        \"","divers":"A Aurillac, la maison consulaire, le palais de Justice le château de Lascanaux, de Martinie, de la Moissetie et de Noalhac.","gps":"","images":["../image/image_15/15_Aurillac_1.jpg","../image/image_15/15_Aurillac_2.jpg","../image/image_15/15_Aurillac_3.jpg","../image/image_15/15_Aurillac_4.jpg","../image/image_15/15_Aurillac_5.jpg","../image/image_15/15_Aurillac_6.jpg","../image/image_15/15_Aurillac_7.jpg","../image/image_15/15_Aurillac_8.jpg","../image/image_15/15_Aurillac_9.jpg"]},"Consult_chateau_formulaired989":{"id":"Consult_chateau_formulaired989","dept":"15","canton":"Saint-Flour","commune":"Molompize","nom":"Aurouze","type":"Vestiges","periode":"XIII","histoire":"AUROUZES, Bertrand de Rochefort, fils d'Ithier, était seigneur d'Aurouze. Sa sur Françoise apporta en dot le château de Mardogne à la famille de Bréon vers 1240 par son mariage avec Maurin, seigneur de Lugarde. Béraud de Rochefort dAlly, fils d'un autre Bertrand et de Guérine de Dienne, épousa après 1374 Marguerite de Châteauneuf d'Apchier dont il n'eut pas de descendants. À cette époque, Aurouze appartenait aux Lastic. Ils se le firent prendre en 1383 par Aymerigot Marchès, un bandit du parti anglais, qui en fit son repaire et le centre de toutes ses exactions dans le pays. Le bandit accepta de le vendre à Jean III d'Armagnac (1359-1391), vicomte de Murat et de Carlat. Au XVe siècle et après Jean d'Armagnac le concéda l'année suivante à Jean de Courcelles, seigneur du Breuil, qui a un fils : Louis de Courcelles, qui épousa vers 1445 Alix d'Orlhac, héritière de Conros, fille d'Aymeric et de Flore d'Estaing, qui lui donna un seul fils : Louis II de Courcelles, seigneur d'Aurouze et de Conros, qui fut nommé bailli des Montagnes  par le roi Charles VII. Il passa un contrat de mariage le mardi 12 janvier 1462  avec Isabeau de Langeac âgée de treize ans, fille émancipée de Jacques et de Marie de Clermont-Lodève. Le couple n'eut pas d'enfants. Il fit de son épouse l'héritière de tous ses biens. Le frère de Flore, Jean d'Estaing, co-seigneur de Cheylade, attaqua en 1476 le testament. À cette date les terres de Louis II de Courcelles mort sans héritier furent confisquées par le roi Louis XI qui les donna à son capitaine Jean dUrfé, second époux d'Isabeau de Langeac. Le fils de ce dernier, François dUrfé, seigneur dAurouze et de Conros. Il mourut à Pavie en 1525. Sa sur Anne hérita du château.\r\nAnne épousa Gaspard de Bouillé du Charriol le 3 juillet 1493. Le château ne restera pas en possession de cette famille jusquà la fin de la monarchie. Il fut enlevé à Rose de Lignerac, veuve de François de Bouillé par la famille des La Vernède. À lépoque de la Révolution il fut racheté par les Gillet dAuriac et fut brulé et pillé pendant la Révolution.\r\nGeorges de Bussac et Jean Rieuf se sont efforcés de faire inscrire le site du château dAurouze à linventaire des sites. Ils y parvinrent le 8 mai 1968.","architecture":"Actuellement en ruines, le château domine le village dAurouze. Ce sont les restes de la construction de Bertrand de Rochefort dAurouze initiée en 1309 avec lautorisation de Philippe le Bel. La façade est élancée et percée de fenêtres à meneaux et croisillons. Elle est flanquée dun donjon et dune tourelle. Lensemble se termine par une terrasse en éperon.\r\n On distinguait il y a encore une cinquantaine dannées une vaste salle au rez-de-chaussée. dans celle-ci figuraient le casque des Bouillés avec à côté les armes de Rochefort d'Aurouze.","habitants":"Famille de  Bertrand de Rochefort dAurouze \r\n        \"","divers":"Vestiges du château fort d'Aurouze","gps":"","images":["../image/image_15/15_Aurouze_1.jpg","../image/image_15/15_Aurouze_2.jpg","../image/image_15/15_Aurouze_3.jpg","../image/image_15/15_Aurouze_4.jpg","../image/image_15/15_Aurouze_5.jpg"]},"Consult_chateau_formulaire2acb":{"id":"Consult_chateau_formulaire2acb","dept":"15","canton":"Riom-ès-Montagne","commune":"Auzers","nom":"Auzers","type":"Château fort","periode":"XV","histoire":"AUZERS, habité par la même famille depuis le XVe siècle, de nombreux portraits et un intéressant mobilier d'Empire offert par Napoléon à Jean-Louis d'Auzers.  La seigneurie appartenait en 1364  à noble Bernard de Marlat, chevalier et Béatrix sa femme, vendirent à Géraud de Bompart, une partie du lieu d'Auzers dit la Plane.  Géraud,  devint seigneur d'Auzers en partie, et le tenait en fief des barons de La Tour.   Sa fille : Blanche de Marlat épouse en 1402 Blandin Bompart, qui lui donne un fils  Blandin Bompart, seigneur d'Auzers et en 1469 de Cussac, il était régisseur du comte de Boulogne, puis de son gendre Gilbert de Chabannes pour lequel il dirige la construction du château de Madic. Il épouse Hélène de Fontanges qui lui donne une fille qui se marie successivement à deux frères : Alix d'Auzers qui épouse en 1470  Antoine de Douhet, chancelier de Jean, comte de Boulogne et d'Auvergne. En 1579 érigée en baronnie en faveur d'Antoine de Douhet. Ils ont dix enfants. Ensuite Jacques de Douhet dont trois autres enfants. Gabriel de Douhet d'Auzers, seigneur d'Auzers, lieutenant du roi en Haute-Auvergne, fait reconstruire le château tel qu'on le voit aujourd'hui et dont descendent les actuels propriétaires.  A la Révolution Joseph de Douhet, baron d'Auzers capitaine au régiment d'infanterie de la Fére émmigre, le château fut protégé par les habitants du  village. Aujourd'hui toujours dans la famille  de Georges  de Douhet baron d'Auzers.","architecture":"Le château médiéval, construit entre 1470 et 1510,  a été reconstruit au début du XVIe siècle, très caractéristique de l'architecture de Haute Auvergne, conserve intact aujourd'hui tous les attributs de la maison forte, de plan rectangulaire cantonnée de grosses tours d'angles  au sud-est et d'une tour d'escalier au nord-ouest, l'ensemble est couronné par un chemin de ronde, échauguettes et mâchicoulis.  Mais sa conception architecturale reste d'esprit médiéval, toitures en lauzes.\r\nÀ l'intérieur, des décors de différentes époques sont conservés : une cheminée monumentale, des boiseries, des cheminées et des parquets des XVIIIe et XIXe siècles. L'oratoire a de remarquables peintures murales du XVIe siècle.","habitants":"Famille de Blandin Bompart\r\n        \"","divers":"Château fort d'Auzers","gps":"","images":["../image/image_15/15_Auzers_1.jpg","../image/image_15/15_Auzers_2.jpg","../image/image_15/15_Auzers_3.jpg","../image/image_15/15_Auzers_4.jpg","../image/image_15/15_Auzers_5.jpg"]},"Consult_chateau_formulaire6c7a":{"id":"Consult_chateau_formulaire6c7a","dept":"15","canton":"Ydes","commune":"Bassignac","nom":"Bassignac","type":"Château","periode":"XVIII","histoire":"A Bassignac le château de Bassignac et la motte féodales de Charlus avec quelques vestiges.    BASSIGNAC, la famille de Bassignac est attestée depuis 1228. Au début du XVe siècle le château passe à la famille d'Anglars qui le conservera jusqu'en 1898. Ancienne maison forte du XVIe siècle où le grand conté fit halte en 1652 à proximité de la cité médiévale de Salers, des églises romanes, de châteaux de la Haute-Auvergne. Aujourd'hui chambres d'hôtes.          CHARLUS,  Charlus qui fut propriété des plus grands noms et dont l'histoire rejoint, tout simplement, celle de la France.  Les seigneurs de Ventadour vont conserver la citadelle jusqu'en février 1351, date à laquelle Bernard la vend à Guillaume III Roger de Beaufort, vicomte de Turenne. Noble maison s'il en est dont deux papes seront issus : Clément VI et Grégoire XII. Le nouveau seigneur de Charlus est marié à Aliénor de Comminges et leur seul fils Raimond, né en 1352, va plus tard défrayer la chronique. l'automne 1408, Bernard d'Armagnac, vicomte de Carlat et connétable de France, se présente sous Charlus et, après plusieurs mois d'un siège meurtrier, défait la garnison et reprend la place-forte qui est confisquée à Raimond. Décrit comme « un chef de guerre cruel aussi sauvage qu'un loup et aussi fort qu'un ours », le vicomte s'éteint en 1413. cité au XIIe siècle reconstruit au XIVe siècle par Hugues-Roger de Beaufort, frère du pape Clément VI qui en fait hommage à l'évêque de Clermont en 1354; ruiné en 1405, nommé au comte de Charlus en 1413 remanié au début du XVIe siècle et détruit sur ordre de Richelieu en 1633. Charlus, châtellenie et fief dont relevaient 18 paroisses, couvrant un territoire qui s'étendait de Bouissou, à l'est de Champagnac à Valette.","architecture":"Bassignac est attestée depuis 1228, par le fort de Charlus En 1518, mention du repaire et domaine de Bassignac, aujourd'hui il ne reste que la motte féodale avec quelques restes de pans de murs.        Bassignac  aux XVIIIe et XIXe, transformation du château défensif en une belle gentilhommière, reprise ou création de l'escalier, remaniement des tours d'angle et des ouvertures, construction d'une terrasse au devant de la façade. Récemment effondrement de l'étable à chevaux qui était attenante à la face Est du château. A l'emplacement de l'étable aménagement d'une cuisine et d'une terrasse. Le château comprend un étage de soubassement voûté, un étage carré sur l'ensemble du bâtiment et un deuxième étage uniquement dans des tours. Toit en pavillon sur les deux tours d'angle du château ; pigeonnier au dernier étage de la tour nord-est ; fontaine voûtée en contrebas de la terrasse du château.","habitants":"Famille d'Anglars\r\n        \r\n        \"","divers":"Motte féodale de Charlus et château de Bassignac","gps":"","images":["../image/image_15/15_Bassignac_1.jpg","../image/image_15/15_Bassignac_2.jpg","../image/image_15/15_Bassignac_3.jpg","../image/image_15/15_Bassignac_4.jpg","../image/image_15/15_Bassignac_5.jpg","../image/image_15/15_Bassignac_6.jpg"]},"Consult_chateau_formulaire19b8":{"id":"Consult_chateau_formulaire19b8","dept":"15","canton":"Maurs","commune":"Boisset","nom":"Boisset","type":"Château","periode":"XV-XVI","histoire":"quatres châteaux à Boisset,  celui d'Entraigues, de  Lacarière, de Conquans et de Solignac  (voir article).                                   ENTRAIGUES Guillaume d'Aura, fils de Jean de Aura, seigneur se marie en 1664 avec Gilberte de Méallet, fille de Pantaléon de Méallet, seigneur de Fargues et Louise de Bruguier. Ils eurent un fils Amable et deux filles Jeanne et Marguerite qui hérita d'Entraygues par sa sur. Marguerite d'Aura se maria avec Jacques de Beaudières, auquel elle donna une seule fille:  Mélitine de Beaudières, dame d'Entraigues qu'elle apporta par son mariage le 28 juillet 1840 avec Philippe de Falvelly, fils de Jean-Louis-Joseph de Falvelly et de Gabrielle de La Tour de La Placette. Famille de Falvelly. Cette famille possède Entraigues pendant six générations jusqu'à nos jours.\r\nLACARIERE, appartenait à cette famille puis elle passa par alliance en 1734 dans celle de Pruines. Bernard de Pruines fut témoin dans un acte passé, en 1214, entre Henri, comte de Rodez, l'évêque de cette ville et le comte de Montfort. Autre Bernard fut garant et caution de l'évêque de Rodez, et du comte Jean d'Armagnac, dans une transaction passée entre eux en 1315. Aujourd'hui, il ne reste que des ruines. \r\nCONQUANS La seigneurie de Conquans passa dans la famille de Pontanier par le mariage d'Isabeau de Conquans avec Gabriel de Pontanier, seigneur de Cances. Béranger, seigneur de Conquans et de Cances, fit alliance avec Judith de Monstuejoul en 1608. De cette union naquirent sept enfants, parmi lesquels : Louis, qui épousa, en 1659, Marie du Verdier, du château de Cayrigus, et y forma la branche de ce nom, qui existe à Figeac ; François, marié en 1629 avec Jeanne de Jueri ou Joueri, du château de Lacan, est l'auteur de la branche de ce nom fixée a Aurillac. La famille de Conquans s'est distinguée par ses services militaires. Son château est devenu la propriété de M. de Baudières dAntraigues, marié à Mlle de Verdal, et qui habite la tour de Conquans.","architecture":"Château de Boisset  du XVIe siècle avec un corps à trois étages carrés, une tour ronde escalier engagée au milieu de la façade, une tour d'angle et une aile du XVIIIe siècle en retour.                             Le château d'Entraigues., datant du XVIe siècle, présente des plafonds peints d'époque. Il est ouvert à la visite les mois d'été. Comme son nom l'indique, il est situé à une confluence, sur une hauteur entre à La Rance et le ruisseau de Moulogre. Château du XVIe siècle avec un corps à trois étages carrés, une tour ronde escalier engagée au milieu de la façade, une tour d'angle et une aile du XVIIIe siècle en retour.                                                          Conquans, il ne reste qu'une partie du bâtiment rectangulaire incorporé dans un autre bâtiment, fortement remanié, la tour du château de Conquans intègre aujourd'hui une construction contemporaine.                                                                                     Le château de Lacarrière, aujourd'hui, il ne reste que des ruines. Au lieu-dit qui porte son nom, il ne reste plus que les cicatrices du château de Lacarière qui fut  une des plus belles demeures de Boisset. Un autre château de Lacarière prés de Boisset en forme de U à deux niveaux flanqué d'un donjon carré en angles à toit pointu.","habitants":"Famille de Pantaléon de Méallet                                                           Famille de Ginon de Conquans\r\n        \"","divers":"Châteaux d'Entraigues,  de Conquans et de Lacarière à Boisset","gps":"","images":["../image/image_15/15_Boisset_1.jpg","../image/image_15/15_Boisset_2.jpg","../image/image_15/15_Boisset_3.jpg","../image/image_15/15_Boisset_4.jpg","../image/image_15/15_Boisset_5.jpg"]},"Consult_chateau_formulairefc4a":{"id":"Consult_chateau_formulairefc4a","dept":"15","canton":"Saint-Flour","commune":"Bonnac","nom":"Bonnac","type":"Château","periode":"XV","histoire":"BONNAC, Louis de La Vernède, seigneur de Serre, restait en 1657 au château de Bonnac, noble Charles, son fils, seigneur de Vazilles, habitait St-Flour en 1681. Il épousa, en 1676, Marguerite de Tassy, fille de Jean, conseiller du roi, et de Claude Jourdin. Il possédait Mons et le mandement de Roueyre-Vieille en 1698. André de Molen de La Vernède, Sieur de St-Poncy, St-Mar , etc.,  habitait le château de Bonnac vers 1774. Il avait épousé Agnès de St-Hérem. Pierre de Molen était officier de dragons; Maurice officier garde-marine; Raymond archidiacre de St-Flour, Thomas et Yves, frères ou cousins du défunt, servaient avec distinction.  Le château de Bonnac domine le chef-lieu, et n'a rien de remarquable ni d'ancien. Il a été vendu depuis peu par la famille de Saint-Poncy, retirée dans le département de la Vendée.","architecture":"Château de Bonnac possède un  corps de logis quadrangulaire à trois niveaux flanqué au sud par une tourelle d'escalier circulaire aux trois-quart hors-oeuvre, et à l'est, sur les angles, par deux échauguettes. La tourelle d'escalier et l'aile ouest datent du XVIe siècle, l'aile Est du XVIIe siècle, les décors intérieurs du XVIIIe siècle. La partie la plus ancienne conserve une salle voûtée en berceau appareillé, avec une grande cheminée, un four à pain, l'aile Est comporte deux pièces revêtues de lambris: la salle à manger aux moulures Louis XV peintes en rechampi et le salon aux moulures Louis XIV avec plafonds à solives et parquets en pin. Au premier étage, la chambre ouest est aussi ornée de lambris Louis XIV de hauteur et d'une cheminée du XIXe siècle en bois peint en noir surmontée d'un trumeau à colonnettes cannelées.","habitants":"Famille d'André de Molen de La Vernède \r\n        \r\n        \"","divers":"Château de Bonnac","gps":"","images":["../image/image_15/15_Bonnac_1.jpg","../image/image_15/15_Bonnac_2.jpg"]},"Consult_chateau_formulairea434":{"id":"Consult_chateau_formulairea434","dept":"15","canton":"Saint-Flour","commune":"Brezons","nom":"Boyle","type":"Forteresse","periode":"XIV","histoire":"BOYLE  construit par la famille de Brezons, de nos jours ne reste que le donjon datant du XVe siècle. En souvenir des seigneurs de Brezons; Leur château au-dessus de Brezons détruit, ils allèrent le reconstruire au XVe siècle plus en amont à La Boyle en adoptant de savants moyens de défense et délégants mâchicoulis. Richelieu, désireux de mettre au pas cette noblesse turbulente, ne laissa subsister que cette tour altière entourée de terrasses aménagées sur les anciennes fortifications et restaurée depuis peu. L'édifice est inscrit au titre des monuments historiques en 1958. Rocher de La Boyle. Sauvé de la ruine par monsieur  Marcel Martin.","architecture":"forteresse de la Boyle  du XVe siècle, en partie démantelé en 1628. Le donjon subsistant paraît avoir constitué l'essentiel du château. La construction présente un plan quadrangulaire  haut de 37 mètres couronné de mâchicoulis  et du côté de l'attaque il était flanqué d'une tourelle dont on voit encore les traces, au milieu de la façade sud ouest, une tourelle à trois pans coupés renfermant l'escalier à vis accédant aux trois étages. Le rez-de-chaussée surélevé au-dessus d'un sous-sol voûté en berceau, est divisé en deux pièces voûtées d'ogives, profilées d'un filet encadré d'un cavet de chaque côté.   A chaque étage se retrouve la même disposition, avec quelques différences : les salles sont couvertes d'un plafond de bois. L'escalier mène sur le chemin de ronde percé de mâchicoulis et porté en encorbellement sur une rangée de corbeaux, il est percé vers les angles d'archères.","habitants":"Monsieur  Marcel Martin\r\n        \"","divers":"Donjon de la Boyle à Brézons","gps":"","images":["../image/image_15/15_Boyle_1.jpg","../image/image_15/15_Boyle_2.jpg","../image/image_15/15_Boyle_3.jpg","../image/image_15/15_Boyle_4.jpg","../image/image_15/15_Boyle_5.jpg"]},"Consult_chateau_formulaireaf03":{"id":"Consult_chateau_formulaireaf03","dept":"15","canton":"Mauriac","commune":"Pléaux","nom":"Branzac","type":"Vestiges","periode":"XV","histoire":"Deux châteaux à Pléaux Branzac du XVIe siècle et de la Roche.              BRANZAC, après 1324, Aymeric III de Pestels acquiert les droits indivis de la châtellenie et de la viguerie de Branzac de Bertrand de Vigier, puis de Bertrand de Vigouroux. Par la suite, il hérita du surplus de la viguerie en vertu d'un testament de Philippie de Vigouroux, veuve de Hugues de Sérinhac. En outre, Bertrand de La Tour et Guy son fils . En 1636, Jean VI de Tubière de Grimoard de Pestels de Caylus, (1637-1679) comte de Pestels, de Caylus, de Verfeils, seigneur de Fontanges, de Branzac, épouse Madeleine de Bourbon, fille d'Henri III de Bourbon (1577-1649), baron de Malause, et de Marie de Châlon. Le château et la seigneurie de Branzac sont acquis par la famille de Robert de Lignerac. En 1777, Paul d'Anglars de Bassignac (1718-1796), seigneur de Bassignac, Pestels, Fontanges, capitaine d'infanterie au Royal-Roussillon, puis lieutenant des Maréchaux de France au département d'Aurillac, achète Branzac à Achille Robert de Lignerac. Vers la même époque, Pierre-André Beynaguet (1744-1804), devient fermier (régisseur) de la baronnie de Branzac. En 1833, Barthélémy d'Anglars, seigneur de Bassignac, fils du précédent, officier, ancien président de l'assemblée provinciale à Mauriac, vend le château et le domaine de Branzac à Jean Servet, de Saint-Santin-Cantalès.\r\nLa ROCHE appartenait à l'origine à la maison de Ruzolles, qui en fit hommage au baron de St-Christophe; elle passa ensuite dans la famille du Sailhans, par le mariage d'Antoinette de la Roche avec François du Sailhans.  La famille de Chaumeils devint plus tard, et par voie d'alliance, propriétaire d'une partie de cette seigneurie. En 1615, Jacques de Chaumeils céda ce qu'il en possédait au comte de Caylus et à Anne de Pestels, sa mère, en échange de la terre de Saint-Cirgues, et ce fut sur Jean, comte de Caylus, que Henri de Chabannes, en sa qualité de baron de St-Christophe, et comme tel seigneur suzerain de la terre de la Roche, la fit saisir, en 1670, à défaut d'hommage. Cette seigneurie subit en dernier lieu le sort de celle de Branzac et fut acquise, en 1776, par la famille d'Anglards de Bassignac.","architecture":"Vestiges du manoir ou rendez-vous de chasse construit au XVe siècle, formé d'un long rectangle avec quatre étages et deux pièces par étage. Au milieu de la façade principale se dresse la tourelle d'escalier à moitié engagée à l'intérieur, et sur la face opposée, deux tours rondes aux angles.\r\n Le démantèlement est due à la démolition par dynamite d'un angle de l'édifice afin d'utiliser les matériaux pour la construction du viaduc de la voie ferrée. Le château était entièrement orné de fresques exécutées par des artistes Italiens en 1575, puis partiellement recouvertes en 1610 par des scènes plus légères.                                  Le château de la Roche était considérable, en 1649 il était composé de deux corps de logis flanqués d'une tour carrée, du XIIe siècle, et d'une tour ronde; il était garni de mâchicoulis, de créneaux et de défenses de toute sorte. Charles de Thubières de Lévy le fit réparer en 1688 et en augmenta encore les fortifications de ces dernières il  reste  aujourd'hui que quelques ruines insignifiantes.","habitants":"Famille de Robert de Lignerac                                                               Famille de Chaumeils \r\n        \"","divers":"Vestiges du château de Branzac et château de la Roche à Pléaux","gps":"","images":["../image/image_15/15_Branzac_1.jpg","../image/image_15/15_Branzac_2.jpg","../image/image_15/15_Branzac_3.jpg","../image/image_15/15_Branzac_4.jpg","../image/image_15/15_Branzac_5.jpg"]},"Consult_chateau_formulaire7fa6":{"id":"Consult_chateau_formulaire7fa6","dept":"15","canton":"Pléaux","commune":"Barriac les Bosquets","nom":"Burc","type":"Maison forte","periode":"XIII","histoire":"Château de Burc, près de Barriac, l'ancien château du XIIIe siècle, de la seigneurie des Bardet du XIIe siècle jusqu'à la Révolution, a fait place au début du XIXe siècle, à une vaste maison qui a conservée les deux pavillons primitifs qui la flanquent au nord et lui donnent du caractère. Il ne se visite pas. Dés 1309 à la famille de Bardet   et  en 1900 à la famille de La Farge.","architecture":"Burc est  une vaste maison qui a conservée les deux pavillons primitifs qui la flanquent au nord et lui donnent du caractère, corps de logis de plan en U à deux niveaux  toitures en croupes.","habitants":"Famille de Bardet \r\n        \"","divers":"Château de Burc à Barriac","gps":"","images":["../image/image_15/15_Burc_1.jpg","../image/image_15/15_Burc_2.jpg"]},"Consult_chateau_formulaire56c1":{"id":"Consult_chateau_formulaire56c1","dept":"15","canton":"Naucelles","commune":"Saint-Cernin","nom":"Cambon","type":"Château","periode":"XVI","histoire":"CAMBON,  fief des Albars au XIVe siècle et en 1390 appartient à Louis d'Anjony,  axée sur lexistence quotidienne et les fêtes sous le règne de Louis XV. Le site est dédié à Marie-Antoinette. Le château du Cambon restauré lannée même de la naissance de la Reine .\r\nLe Cambon est une plate-forme ligueuse et accueille la reine Marguerite qui fait de Pantaléon de Lignerac et de son épouse , un partage  de famille fait passer Cambon à une de leur fille, Catherine épouse de Vailhan de Pénacors par successions le fief revient à Marguerite de Curson, qui épouse Christophe de Grenier de Pleaux, leur petit fils Jean-Jacques de Pouzols vend en 1753  à Jean Raymond de Calonne et de son épouse Bonne-Gabrielle de Saint-Chamans,  la forteresse féodale est transformée, sous le joug du marquis Jean-Raymond de Calonne d'Avesnes, qui lui donne l'aspect qu'elle possède encore aujourd'hui. A leur mort en 1786 Cambon revient à leur fils unique Antoine qui décède peu de temps après Le domaine est acquis en 1802 par Pierre-Louis Bastid d'Anglards, vieille famille de juristes originaire de Marmanhac qui donnera  plusieurs députés dans le Cantal tel que Paul Bastid ministre du commerce sous la IIIe République Françoise de Surrel de Montbel, héritière du château , la demeure prend vie et la passion de l'ex-président de cour et conseiller à la cour de cassation.  Le domaine est transmit aux de  Monboisse propriétaire actuel.","architecture":"Cambon construction du château en 1580 sur le site de Faumonteil, de plan rectangulaire le corps de logis à deux niveaux et attiques avec lucarnes jouxte à droite une tour carrée, ceintes d'échauguettes, accosté d'une tour d'escalier. A gauche du corps de logis séparé du bâtiment s'élevait  une tour massive ronde à cinq étages couronnée de  mâchicoulis, il s'agissait d'une tour de défense dont la plate-forme supérieure, très élevée sert de vigie. La vaste esplanade devant le château est  ceinturée de hauts murs flanqué de tours carrées aux angles, tous ceci à était détruit.","habitants":"Famille de Jean Raymond de Calonne \r\n        \"","divers":"Château de Cambon à saint-Cernin","gps":"","images":["../image/image_15/15_Cambon_1.jpg","../image/image_15/15_Cambon_2.jpg","../image/image_15/15_Cambon_3.jpg","../image/image_15/15_Cambon_4.jpg","../image/image_15/15_Cambon_5.jpg","../image/image_15/15_Cambon_6.jpg"]},"Consult_chateau_formulaire610b":{"id":"Consult_chateau_formulaire610b","dept":"15","canton":"Aurillac","commune":"Arpajon sur Cère","nom":"Carbonat","type":"Château","periode":"XX","histoire":"CARBONAT,   était une terre dépendant de la seigneurie de Conros. Astorg d'Orlhac l'engagea en 1232 auprès de Géraud d'Auzolles, bourgeois d'Aurillac. Plus tard, au XVIe siècle, le fief semble être passé sous la dépendance des vicomtes de Carlat. C'est Géraud de Pouzols, bourgeois d'Aurillac, anobli en 1371, qui y fait construire le premier château. Son fils Antoine, lieutenant au bailliage ducal des Montagnes d'Auvergne, a un fils Louis de Pouzols, seigneur de Carbonat, qui épousa Jeanne de Monjou et qui l'habite en 1503. Mais suite à des dettes, la terre de Carbonat fut vendue sur décret en 1657, et adjugé à Charles de Montvallat, qui subroja, en 1666 Henri de Saint-Martial, baron de Conros. Il le vendit en 1673 à Guy de Passefons, conseiller à la cour des aides de Montauban. La famille de Passefons, devenue Passefons de Carbonat, a possédé l'édifice pendant plus de 200 ans, jusqu'à la fin du XIXe siècle. Des problèmes financiers et une remise en cause de leur titre de noblesse les amenèrent à céder leur propriété. Tombé à l'état de ruines, il a été restauré au début du XXe siècle. Il possède de très beaux jardins en terrasses à la Française et un parc remarquable.","architecture":"Carbonat, l'édifice, reconstruit sur les ruines de l'ancien château au XXe siècle, est orienté plein sud. Deux cheminées monumentales, décorées d'ornementations, sont situées de part et d'autre du bâtiment. De nos jours, seules trois tours d'une quinzaine de mètres de hauteur permettent de le qualifier de château.  Le château, délabré, a subi des modifications aux alentours de 1905, sous l'influence de la belle époque. Les pierres avaient été cachées par du crépi et la majeure partie des fenêtres d'origines avaient été murées.","habitants":"Famille de Passefons\r\n        \"","divers":"Château de Carbonat à Arpajon sur Cère","gps":"","images":["../image/image_15/15_Carbonat_1.jpg","../image/image_15/15_Carbonat_2.jpg","../image/image_15/15_Carbonat_3.jpg","../image/image_15/15_Carbonat_4.jpg"]},"Consult_chateau_formulaire3701":{"id":"Consult_chateau_formulaire3701","dept":"15","canton":"Vic sur Cére","commune":"Carlat","nom":"Carlat","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Carlat, celui de Carlat de Celles et de Lachau.            CARLAT. Le château de Carlat, mentionné à partir de 839 , est lun des sites castraux majeurs de la Haute Auvergne, siège dun comté au haut Moyen-Age, puis dune vicomté de Carlades, passera par alliance  en 1050 au vicomte de Millau et du Gévaudan puis par héritage  au roi d'Aragon qui le cède au comte de Rodez avant  1196, confisqué par le roi de France, il fut donné à l'un des fils de la maison royal au duc Jean de  Berry, en 1306.  Dès la fin du XIIe siècle, une maison de lordre du Temple est fondée dans lenceinte castrale, situation rare qui donne naissance à la plus importante commanderie de lordre en Auvergne, avant son passage aux hospitaliers au XIVe siècle. Les templiers puis les hospitaliers y possédaient une église paroissiale et des bâtiments dhabitation, ainsi quun cimetière. \r\nLACHAU, d'après inscription au linteau de la porte d'entrée, manoir construit en 1660 pour Jean Benech, qui était notaire, et son épouse, Marguerite Verdier. Propriété de Jacques Trinquard  seigneur en 1668. \r\nCELLES,  est une ancienne gentilhommière qui a appartenu à plusieurs familles tel que  la famille d'Ouvrier, de Boisset de la Salle, puis en 1789 à la famille Cassagnes-Miramont.","architecture":"Carlat, dont il ne reste que quelques vestiges, fut le plus important château de la région d'Auvergne et bien sûr du Cantal. Il fut rasé en 1604 par ordre du roi Henry IV .  Après le levé du plan général du site  et une première campagne de sondages dévaluation , létude approfondie de la commanderie et de son contexte castral est envisagée par la mise en place dune fouille programmée à partir de 2005.                                                                                                Lachau , plus maison forte que manoir  édifié au XVIIe siècle de plan rectangulaire, cantonné sur la façade par deux tours rondes. Au centre de sa façade arrière s'appuie, perpendiculairement, un bâtiment. Derrière la tour gauche s'adosse un four à pain  d'origine, agrandi  d'annexes telles que poulailler, resserre. Le manoir comporte un étage et   un niveau mansardé, il n'a pas subi de transformations extérieures depuis son origine et a conservé  tout son caractère authentique.                                                               Celles,  logis datant de la première moitié du XVIIe siècle, décrit en 1668 comme maison à deux tours, ce qui correspond au logis actuel, et vendu comme bien national en 1794 ; la grange-étable porte les dates  de 1682 sur la porte de l'étable et de 1779 sur la porte de la grange.","habitants":"Famille de Boisset de La Salle\r\n        \"","divers":"Carlat plateau basaltique ou se trouvait la forteresse voir maquette, château de  Celles et de Lachau","gps":"","images":["../image/image_15/15_Carlat_1.jpg","../image/image_15/15_Carlat_2.jpg","../image/image_15/15_Carlat_3.jpg","../image/image_15/15_Carlat_4.jpg","../image/image_15/15_Carlat_5.jpg","../image/image_15/15_Carlat_6.jpg","../image/image_15/15_Carlat_7.jpg","../image/image_15/15_Carlat_8.jpg"]},"Consult_chateau_formulaire46dd":{"id":"Consult_chateau_formulaire46dd","dept":"15","canton":"Murat","commune":"Celles","nom":"Celles","type":"Commanderie","periode":"XIII","histoire":"COMMANDERIE, on sait peu de choses sur l'origine exacte de la commanderie de Celles, elle a  été fondée en 1212 par Dalmas de Celles, mais la première trace citée date de 1293 et provient des comptes de Jean de Trie, Bailli d'Auvergne, faisant le recensement des maison du Temple ayant acquis des biens dans l'année. Passe aux Hospitaliers en 1312.  Durand Charniers cité comme commandeur à Celles à plusieurs reprises entre 1292 et 1304. Durand Charniers (neveu du précédent), sergent à Celles entre 1297 et 1306.  Pierre de Madic, cité comme commandeur de Celles entre 1297 et 1300. Pierre de Moncel, sergent à Celles entre 1300 et 1304. Gui Dauphin, cité comme commandeur de Celles entre 1304 et 1307. Guillaume Aynard, sergent à Celles en 1306.  A partir de 1312, avec la dissolution de l'ordre, les bâtiments furent octroyés, aux Hospitaliers de Saint-Jean de Jérusalem, puis incendiés par les Anglo-saxons en 1360 puis rebâtis vers 1370 par Béraud de Vienne. Vendus comme bien national, en 1793, la commanderie et le domaine seront remaniés, en 1883, pour le corps de logis ouest, dont on supprime les voûtes du rez de chaussée, on élargit les ouvertures, et construit une galerie couverte contre la façade sur cour, puis courant du XIXe siècle, une petite chapelle et une sacristie seront ajoutées au sud de l'église et une salle de catéchisme au nord.","architecture":"L'ensemble des bâtiment se présente sous la forme d'un quadrilatère autour d'une cour, flanqué de tours carrées aux angles. Bien que propriété privée, une bonne partie des bâtiments est encore visible. La chapelle templière sert d'église au petit village de Celles. En observant les murs extérieurs dans la végétation, on peut encore remarquer la présence de solides contreforts destinés à consolider les imposants bâtiments. \r\nLa maison du commandeur sert actuellement d'habitation et ne se visite pas. A côté de cette maison, on peut aussi voir les vestiges tronqués d'une tour circulaire. Les bâtiments forment un quadrilatère sur cour intérieure, avec des tours à chaque angle.  La tour du nord ouest est de forme circulaire, et fait saillie sur l'extérieur, les tours sud, sont d'angle, et la tour nord est en retrait des corps de logis. L'ancienne chapelle de la commanderie, puis l'église, occupe la moitié orientale du bâtiment sud de la forteresse, elle comprend une nef couverte, avec un berceau lisse en plein cintre, entre la nef et le choeur, se trouve un arc triomphal de plein cintre avec chapiteaux sculptés. Les corps de logis du commandeur, la tour escalier nord ouest de la cour, la porte sud de la forteresse, la tour circulaire de flanquement, sont des édifices construits courant XIVe siècle.","habitants":"Guillaume Aynard\r\n        \"","divers":"Commanderie de Celles","gps":"","images":["../image/image_15/15_Celles_1.jpg","../image/image_15/15_Celles_2.jpg","../image/image_15/15_Celles_3.jpg","../image/image_15/15_Celles_4.jpg"]},"Consult_chateau_formulaire22bc":{"id":"Consult_chateau_formulaire22bc","dept":"15","canton":"Neuvéglise","commune":"Faverolles","nom":"Chassan","type":"Château","periode":"XVIII","histoire":"CHASSAN, au XIVe siècle,  Guyot Ponsonnailles, seigneur de Grizols et du Chassan, à Faverolles, épouse le 20 janvier 1594 Charlotte d'Apchier, fille de Jacques, seigneur de Billières et de Jeanne d'Amblard. Ils ont pour fils Mathieu de Ponsonnailles. Raymond-Joseph de Ponsonnailles de Grisols, fils de Mathieu et de Françoise de Chambreuil, épouse le 24 février 1677 Françoise de Montvallat, fille de Charles de Montvallat, seigneur de Tournoël et de Gabrielle d'Apchon.  Jean-François de Ponsonnailles reconstruit le château vers 1755, décède en 1785.  Au XVIIIe siècle, Jean Francois de Ponsonnailles de Grisols dont l'épouse était Gabrielle Falcon de Longevialle, fit démolir le vieux château médiéval et transporter pierres et meubles pour construire l'actuel château. Antoine de Ponsonnailles épouse Hélène Bérauld de Chabriac, dont il a deux fils qui meurent jeunes. Il fait la guerre d'indépendance d'Amérique, émigre, devient le premier conseiller général du canton de Ruynes sous le règne de Louis XVIII. Le dernier de la lignée, Hyppolite de Ponsonnailles de Grisols, à son décès en 1843, lègua le château  à son jeune cousin Alfred Triniac âgé de 16 ans ainsi qu'à sa cousine Philomène Loussert fille d'Alexis, alors âgée de 6 ans par testament olographe du 25 mars 1843 espérant qu'il soit fait un mariage entre eux. Alfred Triniac était le fils d'Etienne (1798-1864) et de Victoire Loussert du Groles (1800-1883), fille de Marie-Anne Bérauld de Charbiac. Alfred Triniac ne se remaria pas avec sa cousine mais racheta la part de celle-ci lors d'une mise aux enchères. La famille Triniac possède le chateau du Chassan depuis quatre générations.  Suzanne Triniac, héritière du Chassan, a épousé le général Gonzague Bosquillon de Jenlis, d'une famille originaire de Montdidier. Leur fille, Laure Bosquillon de Jenlis, et son époux Louis-François Fontant, président de la chambre d'Agriculture du Cantal, habitent le château.","architecture":"Château de Chassan  édifié de 1773 à 1784 à l'emplacement d'une demeure féodale dont il subsiste quelques vestiges. Le château se compose d'un corps de logis de maître précédé d'une cour d'honneur autour de laquelle s'ordonnent les dépendances. La façade arrière donne sur les parterres d'un jardin à la Française, le rez-de-chaussée est surmonté d'un étage et de combles éclairés. A l'extérieur, l'architecte Bellenaud a conjugué un vocabulaire néo-classique. La grande arcade, porteuse du palier du 1er étage, dessine un cintre surbaissé dont la clef porte la date de 1784 fin des travaux. A l'intérieur dans la cage d'escalier, dallage, menuiseries et enduits n'ont jamais été transformés ou restaurés. Les pièces du rez-de-chaussée forment un circuit en enfilade autour de  la cage d'escalier. L'antichambre est une pièce à lambris d'appuis surmontés de tapisseries de Felletin. La salle à manger est lambrissée et comprend une cheminée en bois à manteau en arbalète.","habitants":"Famille de  Guyot Ponsonnailles\r\n        \"","divers":"Château de Chassan à Faverolles","gps":"","images":["../image/image_15/15_Chassan_1.jpg","../image/image_15/15_Chassan_2.jpg","../image/image_15/15_Chassan_3.jpg","../image/image_15/15_Chassan_4.jpg"]},"Consult_chateau_formulairece4a":{"id":"Consult_chateau_formulairece4a","dept":"15","canton":"Neuvéglise","commune":"Chaudes-Aigues","nom":"Chaudes_Aigues","type":"Château","periode":"XVI","histoire":"Deux châteaux à Chaudes-Aigues, celui de Couffour du XVIe siècle et de Montvallat du XII-XVII siècle.                                  COUFFOUR, attesté dès le XIIe siècle, la dénommée Blavia, descendante de Robert de Saint-Urcize, seigneur de Chaudes-Aigues, apporte sa terre de Couffour en dot à Falcon de Reveilhac, noble du Gévaudan qui fonde la seigneurie. Géraud de Reveilhac,  petit-fils, est seigneur du Couffour en 1290. Son fils Étienne adopte le surnom de Besse qui devient le patronyme de ses descendants. En 1406, Antoine de Rochedragon, seigneur de Yolet, achète Couffour à Jean Besse. Chatard de Rochedragon est nommé gouverneur de Carlat par le duc Jean Ier de Berry, et vicomte ensuite. Gabrielle de Pellamourgues apporte en dot le Couffour à Jean de Montvallat. Pendant 25 ans, le château est le théâtre d'orgies sanglantes, dignes de la Tour de Nesle. Aujourd'hui transformé en restaurant par Serge Vieira.\r\nMONTVALLAT, château du XIVe siècle, reconstruit au XVIe siècle, attaqué pendant les guerres de religion et incendié en 1610. Montvallat fut en grande partie reconstruit et fortifié vers 1612 par François II, comte de Montvallat.","architecture":"Le château de  Couffour était une place forte pendant la guerre de Cent Ans.La première construction importante est un bâtiment du XIVe siècle flanqué sur sa façade de sept tours coiffées de toitures coniques. Il subsiste une tour, un bâtiment en face, un muret et un portail formant une cour carrée. Un corps de ferme un peu en contrebas complète l'ensemble. La tour circulaire contient un escalier en spirale qui donne accès aux étages supérieures. Plusieurs pièces possèdent des peintures murales du XVIIe siècle, au motif de fleurs et de portraits féminins. Au XVIIIe siècle, le château est vendu à un bourgeois de la commune. La Révolution et le début du XIXe siècle correspondent à une période de déclin. Pendant tout ce temps, mal entretenu, le château se dégrade.\r\nMontvallat, de forme un quadrilatère, caractérisé par la structure de ses murs (gros blocs de granit et parement de lave de Volvic). Un chemin de ronde à mâchicoulis établi au dessus des façades joint deux échauguettes couvertes en poivrière. Le corps de logis principal, au sud, sert d'habitation et les autres parties d'exploitation rurale.","habitants":"Famille de Jean de Montvallat\r\n        \"","divers":"Château de Coffou et de Montvallat à Chaudes-Aigues","gps":"","images":["../image/image_15/15_Chaudes_Aigues_1.jpg","../image/image_15/15_Chaudes_Aigues_2.jpg","../image/image_15/15_Chaudes_Aigues_3.jpg","../image/image_15/15_Chaudes_Aigues_4.jpg","../image/image_15/15_Chaudes_Aigues_5.jpg","../image/image_15/15_Chaudes_Aigues_6.jpg"]},"Consult_chateau_formulairedde3":{"id":"Consult_chateau_formulairedde3","dept":"15","canton":"Murat","commune":"Chavagnac","nom":"Chavagnac","type":"Château","periode":"XV","histoire":"CHAVAGNAC, a appartenu à la puissante et antique maison de Dienne. Dès l'origine, les seigneurs de Dienne sont aussi seigneurs de Chavagnac. Guillaume de Chavagnac vivait en 1260. Christophe de Chavagnac et d'Ondredieu commandait les religionnaires, dans Issoire, en 1576. En 1650, les sieurs de Chavagnac, d'Ondredieu et du Bousquet, ses frères, commandaient trois régiments pour le prince de Condé. Le château a été reconstruit au XVe siècle et restauré en 1646 puis au XIXe siècle. De la maison de Chavagnac cette terre passa, vers 1775, dans celle de dauphin de Leyval, par mariage avec  Hippolyte de Dienne, héritière de M. de Dienne de Chambonnas, son oncle, mort à Allanche sans enfants. Le château de Chavagnac, avec les bois, terres,  dépendant de la seigneurie furent vendus, ainsi que les montagnes de Courbines et de la Font-de-l'Ase, en 1790, par  la comtesse de Leyval, née de Dienne, à M. de Brives, qui les possède actuellement. La famille de Brives, de Murat, qui en est aujourd'hui propriétaire, l'entretient avec soin.","architecture":"Chavagnac,   Le château fut pris et pillé par les Anglais en 1357 et rasé en 1360. L'ancien donjon, dépendant de l'évêque, fut pris par les bandes de mercenaires anglais en 1357 et sérieusement endommagé en 1382. Le château qui l'a remplacé date du XVe siècle.  Il se compose d'un corps de logis auquel est adossée une grosse tour carrée dans laquelle se  trouve l'escalier. Les quatre angles sont flanqués de quatre tours rondes qui, avant la Révolution, dominaient de leurs têtes crénelées tout l'édifice; mais qui, a cette époque, furent, par l'ordre du propriétaire, abaissées au niveau des toits. C'est un des plus beaux châteaux de l'arrondissement de Murat. Il se compose d'un corps de logis flanqué de quatre tours, autrefois crénelées, et reliées entre elles par un bastion carré.","habitants":"Famille de Guillaume de Chavagnac \r\n        \"","divers":"Château de Chavagnac à Chavagnac","gps":"","images":["../image/image_15/15_Chavagnac_1.jpg","../image/image_15/15_Chavagnac_2.jpg"]},"Consult_chateau_formulaireb457":{"id":"Consult_chateau_formulaireb457","dept":"15","canton":"Ydes","commune":"Sauvat","nom":"Chavaniac","type":"Chaâteau","periode":"XIII","histoire":"CHAVANIAC, La famille de Charpentier, connue depuis 1315, possédait un hôtel à Chavagnac. En 1443, Pierre de Beaufort Turenne, seigneur de Charlus, autorise son vassal Louis de Charpentier à construire un château, il subsiste de cette époque une tour défensive. A la fin du XVIe siècle, après avoir été en indivision, la seigneurie de Chavagnac passe de la famille de Sarran aux de Ribier qui la gardent jusqu'en 1879. Excepté la tour, le château et ses dépendances ont été construits ou remaniés aux XVIIIe et XIXe siècles, le logement de domestique et l'étable à chevaux sont datés de 1731, dates portées sur des linteaux, la grange-étable est antérieure au cadastre de 1826.","architecture":"Excepté la tour, le château de Chavaniac  et ses dépendances ont été construits ou remaniés aux XVIIIe et XIXe siècles, le logement de domestique et l'étable à chevaux sont datés de 1731, dates portées sur des linteaux, la grange-étable est antérieure au cadastre de 1826. Le château est formé d'une tour, de deux corps de logis perpendiculaires et d'un corps de bâtiment occupé par des dépendances. L'ensemble détermine un plan en U délimité par une cour, la tour est bâtie avec des chaînes en pierre de taille. Le rez-de-chaussée à usage de cellier est voûté en berceau, il est surmonté de trois étages ayant chacun une cheminée, celle du second étage porte des traces de polychromie et des armoiries bûchées. L'étage défensif, situé au niveau des mâchicoulis, a disparu, la tour est recouverte d'un toit en pavillon en ardoise,  elle est distribuée par un escalier à vis couvert d'un toit conique en ardoise. La tour jouxte l'un des deux corps de logis perpendiculaires.","habitants":"Familles de Charpentier\r\n        \"","divers":"Château de Chavaniac à Sauvat","gps":"","images":["../image/image_15/15_Chavaniac_1.jpg","../image/image_15/15_Chavaniac_2.jpg","../image/image_15/15_Chavaniac_3.jpg"]},"Consult_chateau_formulaire9f5f":{"id":"Consult_chateau_formulaire9f5f","dept":"15","canton":"Murat","commune":"Dienne","nom":"Cheyrelle","type":"Manoir","periode":"XIX","histoire":"CHEYRELLE, sur le versant opposé au village, a été aménagé dans sa forme actuelle entre 1902 et 1905 par l'architecte parisien René Dulong à partir d'une demeure datant de 1866. Il a été entièrement décoré par le liégeois Gustave Serrurier-Bovy, et inscrit à l'inventaire  des monuments historiques en 1994, puis classé en 2006. Le château a été construit en 1858 par Auguste Felgères, puis transformé au tout début du XXe siècle par le décorateur liégeois Gustave Serrurier-Bovy et l'architecte parisien René Dulong. La famille Mazars, qui vient tout récemment de l'acquérir, a bien l'intention de remédier à ce relatif anonymat. Venus du nord de la France avec ses trois filles, Christophe et Maryse fourmillent de projets au sujet de ce château qui est transformé en hôtel restaurant.","architecture":"Dienne, le premier château fort a résistait longtemps au climat rude mais étant très exposé aux intempéries, les seigneurs étaient obligés de labandonner quelques siècles plus tard à cause de son état vétuste. Aujourdhui, seulement quelques traces de constructions ou de tranchées nous indiquent lendroit où se trouvait ce premier château. \r\nLe deuxième château fut construit à Marchadial dans la vallée, en face du château abandonné. Selon la tradition, les vassaux du seigneur utilisaient la charpente de lancien château pour construire, le même jour, le toit du nouveau. De ce deuxième château nous restent toujours le socle où fut construit maintenant une maison et 2 pans de mur dune des tours. Beaucoup de pierres de tailles, dont les cheminées et les linteaux du château, ont été utilisés après sa destruction pour embellir les maisons de Dienne et de Drils autant à lextérieur quà lintérieur.  La construction de Cheyrelle du milieu du XIX e siècle vaut le détour. Composé d'un corps  de logis de deux étages avec lucarnes sur toit en croupes  accolé de deux tours rondes et une tourelle,  toitures  en poivrières.","habitants":"Famille d'Auguste Felgères\r\n        \"","divers":"Château de Cheyrelle à Dienne.","gps":"","images":["../image/image_15/15_Cheyrelle_1.jpg","../image/image_15/15_Cheyrelle_2.jpg","../image/image_15/15_Cheyrelle_3.jpg","../image/image_15/15_Cheyrelle_4.jpg","../image/image_15/15_Cheyrelle_5.jpg","../image/image_15/15_Cheyrelle_6.jpg"]},"Consult_chateau_formulaire4b96":{"id":"Consult_chateau_formulaire4b96","dept":"15","canton":"Saint-Paul des Landes","commune":"Ayrens","nom":"Clavières_Ayrens","type":"Château","periode":"XVI","histoire":"CLAVIERES, ce fief appartenait en 1284 à Rigaud d'Albars, chevalier, et à son fils Pierre, Antoinette d'Albars de Clavières l'apporte en dot à Antoine de Guirbault. Leur fille, Gilberte de Guirbaud, l'apporte en 1565 en dote à Gilbert Giscard . Après 1579 François de Cardaillac, seigneur de Saint-Cernin, fils de François, seigneur de Lacapelle-Marival et de Madeleine de Bourbon-Malause, puis à son fils Louis de Cardaillac, lieutenant-colonel, co-seigneur de Saint-Cernin, en 1666. On ne lui connaît pas d'alliance, et c'est sa sur : Claudie de Cardaillac, dame de La Sepouse, épouse François Brachet, dont elle a une fille: Isabeau Brachet de Peyrusse, dame de Clavière au moment de son mariage en 1699 avec Louis de Montrognon de Salvert. Ils ont deux fils, dont : François-Gilbert de Montrognon, épouse en 1729 Henriette du Fayet de La Tour, puis en 1732 Philiberte Gautier, dame de Vaurs à Arpajon qui lui donne deux enfants : Jeanne-Marie de Montrognon François-Marie-Henri de Montrognon (1736-1800),  on trouve ensuite que Clavières est possédé par Jean-François Capelle, conseiller au Présidial d'Aurillac, puis par son fils Antoine François Capelle de Clavières, officier de cavalerie,  en était seigneur,  laissant qu'un fils encore enfant. Sa sur lui succède : Jeanne de Capelle de Clavières, et l'apporte en dot à Étienne de Salle du Doux qui restaure le château en 1760. Leur fille, Gabrielle de Salle du Doux, l'apporte en 1815 à Charles de Pollalion de Glavenas. Leur fille, Marie-Françoise de Pollalion, épouse en 1850 Louis-Désiré de La Salle de Rochemaure. Marié le 20 juillet 1882 avec Marie Alphonsine de Forceville. Marc de La Salle de Rochemaure, duc  1883  marié en 1906, Athènes, avec Marika Karoussos dont  F. Romana de La Salle de Rochemaure 1906-1936. Robert de La Salle de Rochemaure  marié en 1921, Toulon, avec Marcelle de Bouteiller 1883-1944.  Gérald de La Salle de Rochemaure 1885-1933  marié avec Rosa Caprioli .","architecture":"Un incendie a ravagé cette résidence le 25 mai 1936, n'en laissant presque que des ruines. Une vente plus récente a privé Ayrens des derniers vestiges de ce château de style troubadour, et la vente malheureuse des deux pavillons d'entrée empêche maintenant l'accès aux vestiges de son magnifique parc à l'abandon. Avant, ou englobé à l'intérieur de cette composition néo-médiévale, il a existé au XIIIe siècle un ancien château fort qui sera détruit au XVIe siècle. Chronologie partielle des propriétaires successifs relevée sur 4 vitraux qui ornaient deux portes d'entrée sur la façade sud du château de Clavières ce détail est visible sur une carte postale du début du XXe siècle.","habitants":"Louis-Désiré de La Salle de Rochemaure\r\n        \r\n        \"","divers":"Château de Clavières à Ayrens","gps":"","images":["../image/image_15/15_Clavieres_Ayrens_1.jpg","../image/image_15/15_Clavieres_Ayrens_2.jpg","../image/image_15/15_Clavieres_Ayrens_3.jpg","../image/image_15/15_Clavieres_Ayrens_4.jpg","../image/image_15/15_Clavieres_Ayrens_5.jpg","../image/image_15/15_Clavieres_Ayrens_6.jpg"]},"Consult_chateau_formulaire3996":{"id":"Consult_chateau_formulaire3996","dept":"15","canton":"Vic-sur-Cére","commune":"Polminhac","nom":"Clavières_Polminhac","type":"Château","periode":"XVIII","histoire":"CLAVIERES, en 1543. Guy d'Albars n'ayant pas laissé d'héritier mâle, Clavières passa par alliance au capitaine Salvatges qui, en 1574, défendit vaillamment avec dix hommes d'armes le château de Calvinet contre les huguenots. La famille de Salvatges était déjà connue dans la paroisse de Polminhac, car, dans un acte du 3 mars 1492, figurent les propriétés de Jacobi ou Jacques de Salvatges. Autre Jean de Salvatges de Clavières,  fils du précédent, était capitaine aux dragons d'Asfeld; il s'y comporta avec tant d'honneur qu'il reçut, en 1690, des lettres de félicitations de Louis XIV pour ses bons et loyaux services. Jacques de Salvatges de Clavières, lieutenant au régiment de Maine, eut de son mariage avec Marie-Louise de Lasvergnes plusieurs fils, savoir: Joseph de Salvatges né en 1749, capitaine au corps royal du génie, mort chevalier de Saint-Louis en 1791. C'était un officier très-distingué dans son arme, et on lui doit les fortifications du Havre. Joseph-François de Salvatges de Prades, lieutenant-colonel du génie, chevalier de St-Louis et de la Légion-d'Honneur, mort à Marseille le 8 juillet 1831. Pierre de Salvatges, ancien garde du corps, puis maire de Polminhac, mort en 1821. le frère aîné , M. Joseph de Salvages de Clavières, est propriétaire du château.","architecture":"Clavières, ce château médiéval, remanié aux XVIIe et XIXe siècles, a été fortement transformé dans un style néo-classique pompéien. Situé dans un parc classé jardin remarquable. Pigeonnier datant du XVIe siècle. La demeure comprend un corps de bâtiment rectangulaire en pavillon de neuf travées régulières et de deux étages carrés sous comble brisé percé d'autant de lucarnes, avec en son centre une tour ronde formant rotonde.","habitants":"Famille de Salvatges\r\n        \r\n        \"","divers":"Château de Clavières à Polminhac","gps":"","images":["../image/image_15/15_Clavieres_Polminhac_1.jpg","../image/image_15/15_Clavieres_Polminhac_2.jpg","../image/image_15/15_Clavieres_Polminhac_3.jpg"]},"Consult_chateau_formulaireba1f-2":{"id":"Consult_chateau_formulaireba1f-2","dept":"15","canton":"Vic sur Cére","commune":"Velzic","nom":"Clavières_Velzic","type":"Château","periode":"XVII","histoire":"CLAVIERES, au XVIIe siècle, il appartenait à Pierre de Gagnac ou de Gaignac, conseiller au présidial d'Aurillac, qui est dit \"Seigneur de Clavières\" en 1619, sa fille Marguerite de Gagnac de Clavières qui a épousé Jean-Antoine del Cros de Bérail, fils de François et de Françoise de Montboissier-Beaufort-Canillac. Ils ont eu un fils : François del Cros de Bérail, marié à Claudia de Prévinquières. En 1680, Jean Apchin, conseiller  décède. En 1688, leur fils Basile et Guillaume Apchin ont possédé cette seigneurie. En 1721, Antoine Apchin, fils de Basile, est encore dit \"Seigneur de Clavières\". Le docteur Jean-Antoine Capelle de Puechjean (1813-1897), maire de Velzic, épousa en première noce Marthe Désirée Roger-Ducos (1822-1855), petite-fille du 3e Consul de la République et par sa mère du baron Jean-Baptiste Perret (1762-1843), qui vécut cloîtrée, enfermée par son mari dans la tour de Falhiès jusqu'à sa mort, et en seconde noce en 1856 Marie-Antoinette Baudière, plus jeune que lui de quarante ans, qui lui donna une fille:\r\nMarie-Amélie Capelle de Puechjean qui vécut dans la tour de Falhiès. et passa à la famille Tribier Le dernier propriétaire du château de Clavières est la famille de La Salle de Rochemaure, dont le membre le plus illustre fut le duc Anne-Louis-Hercule Félix, grand seigneur mégalomane et majoral du Félibrige, historien du pape Gerbert et des troubadours cantaliens. L abbé Raymond Four, curé dAyrens et ami de Vermenouze, était grand ami du duc, si lon en croit la préface écrite pour ses chansons d Auvergne. La guerre de 1914 et des ennuis familiaux ont beaucoup affecté le duc qui séteignit en 1915. Après la mort de la duchesse, en 1930, le château et ses trésors artistiques furent mis en vente par ses fils.","architecture":"Le château de Clavières est une résidence campagnarde qui se composait de deux éléments : le logis principal construit vers 1630 et un pavillon à la suite, ajouté vers 1660. La toiture principale présente un large fronton central et deux fenêtres à fronton-pignon l'encadrant. Edifice typique des demeures bourgeoises cantaliennes. Résidence campagnarde qui se compose de deux éléments : le logis principal construit vers 1630 et un pavillon à la suite, ajouté vers 1660. La toiture principale présente un large fronton central et deux fenêtres à fronton-pignon l'encadrant : cest un édifice typique des demeures bourgeoises cantaliennes.                             Le magnifique édifice ne fut plus entretenu et donc voué à la ruine. Au soir du 25 mai 1936, jour de foire à Aurillac, la foudre tomba sur le château. -Les pompiers, alertés par le fermier, arrivèrent. Hélas, les étangs du château avaient été vidés la veille pour être nettoyés. Les pompiers, impuissants, virent sécrouler les murs du château. Au matin, seul le grand portail des réceptions restait debout. Aujourdhui, il ne reste rien de cette résidence historique que fréquentaient les plus hauts dignitaires de lépoque, les ruines ayant été ven
