canton":"Baume-les-Dames","commune":"Guillon-les-Bains","nom":"Lorangerie","type":"Château","periode":"XIX","histoire":"L'ORANGERIE, ancien établissement thermal construit en 1824 situé dans une petite vallée classée à 7 kilkomètres de Baumes les dames, dans un ancien domaine de 7 hectares traversée par une petite rivière le Cusancin,.un cadre exceptionnel et bucolique, calme et apaisant, spacieux et idyllique un espace adéquate pour vous faire passer dagréables moments.","architecture":"L'Orangerie est un bâtiment moderne construit au XIX siècle plusieurs corps de logis accolés à divers niveaux transformé en établissement thermal.","habitants":"\"","divers":"Château de Lorangerie","gps":"","images":["../image/image_25/25_Lorangerie_1.jpg","../image/image_25/25_Lorangerie_2.jpg"]},"Consult_chateau_formulaire9b08":{"id":"Consult_chateau_formulaire9b08","dept":"25","canton":"Maiche","commune":"Maiche","nom":"Maiche","type":"Château","periode":"XVI","histoire":"MAICHE, à l'époque médiévale, Maîche se développe à proximité de son château fort,. Maîche est alors à la tête d'une seigneurie qui couvre une zone allant de Bretonvillers à Montandon. En novembre 1474, lors de la guerre de Bourgogne qui oppose les États Bourguignons à la confédération suisse, les confédérés assiègent le château de Maîche. Ils sont alors repoussés mais cela n'empêche pas la chute de lEmpire bourguignon et l'annexion de la seigneurie par les Suisses.                                                        Au XVIe siècle, la Franche-Comté est possession de la maison de Habsbourg et connait alors une ère de faste et de prospérité. La ville de Maîche se pare de trois résidences seigneuriales: le seigneur Jean de Guyot fait construire en 1524 l'actuel château Montalembert (voir article) et quitte alors le vieux château-fort tandis que Nicolas Perrenot de Granvelle, chancelier de Charles Quint, fait construire un hôtel particulier), l'actuel hôtel de Granvelle au centre de la localité. Pendant la guerre de dix Ans, la ville est prise une première fois en 1637 par les troupes du duc Bernard de Saxe-Weimar et se trouve livrée aux pillages. Le gouverneur de Maîche, Jean-François Guyot de Malseigne, parvient à contrer les assauts des Suédois de Weimar devant le vieux château en 1638 mais en janvier 1639, le plateau de Maîche est de nouveau mis à sac et de nombreux habitants trouvent refuge en Suisse ou dans les grottes de la vallée du Dessoubre. Comme toute la Franche-Comté, les Maîchois souffrent de plus à cette époque de la peste et de la famine:  la population est décimée, diminuant d'environ un tiers.                                                                                                     Le château du Désert fut construit par Pierre-Juste Ducreux au milieu du XIXe siècle.","architecture":"les châteaux de Maîche; les ruines du Vieux Château construit au Ve siècle par Rodolphe de Burgondie et détruit en 1615, sont encore visibles sur la colline située à la limite de la commune de Mancenans-Lizerne.                                                         \r\nChâteau du Désert, construit au XIXe siècle, deux pavillons relié par un corps de logis à trois niveaux et attiques a gardé ses deux tours rondes aux extrémités, ailes en retour avec pavillon carré, dans les années 1927-1928, l'héritière de Pierre-Juste Ducreux vendit  aux établissements Acier-Outillage Peugeot pour en faire un camp de vacances pour les enfants des ouvriers. En raison de la diminution des inscriptions aux camps de vacances, Peugeot revendit l'édifice à la mairie de Maîche en 1987. Il abrite depuis 1990 la bibliothèque municipale.                                           \r\nL'hôtel de ville est construit en 1867 sur un terrain marécageux qui a été asséché. \r\nLe château de Mérode de forme carrée à trois niveaux et attiques pavillon d'entrée saillant en façades avec fronton construit par Werner de Mérode au cours du XIXe siècle.\r\nL'hôtel de Granvelle, date du XVIe siècle, son portail d'entrée et ses décorations intérieures du XVIIIe siècle. corps de logis en forme de U à trois niveaux égalés.","habitants":"Seigneur Jean de Guyot\r\n        \r\n        \"","divers":"Vestiges du château primitif à Maseigne, du château du Desert, de Mérode, de l'hôtel de Granvelle et vestige de châtillon sous-Maiche.","gps":"","images":["../image/image_25/25_Maiche_1.jpg","../image/image_25/25_Maiche_2.jpg","../image/image_25/25_Maiche_3.jpg","../image/image_25/25_Maiche_4.jpg","../image/image_25/25_Maiche_5.jpg","../image/image_25/25_Maiche_6.jpg","../image/image_25/25_Maiche_7.jpg"]},"Consult_chateau_formulaire6d2b":{"id":"Consult_chateau_formulaire6d2b","dept":"25","canton":"Audeux","commune":"Mazerolles-le-Salin","nom":"Mazerolles","type":"Manoir","periode":"XV","histoire":"MAZEROLLES, l'existence d'une seigneurie de Mazerolles  est connue  en 1665 à la  demande de son seigneur, Charles-François Perrenot de Granvelle. C'est à ce seigneur que l'on doit l'édification  du château. Comme il était coutume à cette époque, le seigneur du lieu Charles François Perrenot de Granvelle avait fait percé dans le mur de l'enceinte une ouverture  qui lui permettait d'accéder directement à l'église.","architecture":"Mazerolles,   bâtiment  le plus imposant du village avec ses 20 m de longueur et 12 m de largeur et  son immense cour. L'édifice a conservé son aspect initial, à l'intérieur se trouve trois cheminées   monumentales  dont  lune porte le millésime 1681, imposant manoir corps de logis rectangulaire à deux niveaux avec attiques toiture en croupe flanqué de trois tours rondes  à toits pointus et mâchicoulis.","habitants":"Charles-François Perrenot de Granvelle\r\n        \"","divers":"Manoir de Mazerolles","gps":"","images":["../image/image_25/25_Mazerolles_1.jpg","../image/image_25/25_Mazerolles_2.jpg"]},"Consult_chateau_formulaire8cdb":{"id":"Consult_chateau_formulaire8cdb","dept":"25","canton":"Audeux","commune":"Miserey-Salines","nom":"Miserey","type":"Maison forte","periode":"XV","histoire":"MISERY; ancienne maison forte modernisée au XVIIe siècle. remaniement des bâtiments au XVIIIe siècle. Jardin paysager établi par Victor Baille en 1854. Au début du  XVIIe siècle, il appartenait aux Gauthiot d'Ancier, à la fin de ce siècle, Jean-Baptiste de Gilley le vendit à Jean Tourbier de Beaumarchey. Au XVIIIe siècle, il passa à la famille Girod puis en 1753, Claude-Antoine Girod, écuyer, le céda à Nicolas-Marin d'Orival, conseiller au parlement de Besançon, dont les descendants l'habitent actuellement.","architecture":"Le château de  Miserey s'étire en longueur sur deux niveaux d'est en ouest parallèle aux dépendances qui se développent au nord, les volumes des deux ensembles se donnent la réplique de part et d'autre de la cour. Au Nord, le bâtiment du XVIe siècle avec  ses ouvertures variées, une tour d'escalier carrée, un toit en   croupe imposant. Au sud, la partie ancienne est occupée par une grosse tour ronde qui  compte à l'étage   trois fenêtres à meneaux, une porte à deux battants est surmontée d'une porte fenêtre à balconnet.  A l'ouest, la construction  d'un étage de comble et d'une terrasse en terre-plein, habillée de dalles et desservie par un escalier à degrés convexes, a modifié l'aspect du XVIIIe siècle de la façade sur parc. Aux environ de 1930, la cour  fut nivelée et  privée de ses arbres,et le mur d'enceinte  fut doté d'une porte cochère due à l'architecte Painchaux de Besançon.","habitants":"Jean Tourbier de Beaumarchey\r\n        \r\n        \"","divers":"Maison forte de Misery","gps":"","images":["../image/image_25/25_Miserey_1.jpg","../image/image_25/25_Miserey_2.jpg","../image/image_25/25_Miserey_3.jpg"]},"Consult_chateau_formulairebdcf":{"id":"Consult_chateau_formulairebdcf","dept":"25","canton":"Marchaux","commune":"Moncey","nom":"Moncey","type":"Château","periode":"XVI","histoire":"MONCEY, le nom Moncey vient d'un hameau que la famille acheta en 1789 au marquis de Cheylard. Au sein de la grande armée, le maréchal Moncey reçut le surnom de « Fabius », fils cadet de François-Antoine Jannot, avocat au parlement de Besançon et de Marie-Élisabeth Guillaume, Bon-Adrien était le frère  de Claude-Marie-Joseph. La famille se compose de 14 enfants : 8 garçons et 6 filles. Appartenant à la petite bourgeoisie, son père a une charge davocat au parlement de Besançon. Il exerce peu, soccupant de lexploitation du domaine dont il espère voir Bon-Adrien prendre la succession, il épousa, le 30 septembre 1790 en la paroisse Saint-Pierre de Besançon, Charlotte Remillet, ils eurent: Anne-Françoise, Bon-Marie, Bon-Louis-Napoléon, Jeanne-Françoise-Hélène mariée le 30 octobre 1824 avec Alphonse-Auguste Duchesne de Gillevoisin, Il resta au duc de Conegliano une fille mariée à M. Duchesne de Gillevoisin, lequel fut autorisé par le roi Charles X à hériter du titre de son beau-père. Bon-Adrien Jeannot de Moncey né à Moncey, paroisse de Palise près de Besançon dans le Doubs, le 31 juillet 1754  et mort à Paris le 20 avril 1842, était un maréchal d'Empire et duc de Conegliano. Son château fut la propriété du Maréchal de Moncey qui mourut en 1842, après avoir été gouverneur des Invalides et avoir assisté au retour des cendres de Napoléon.","architecture":"Le château de Moncey possède un corps de logis rectangulaire a deux niveaux, pavillon d'entrée légèrement saillant avec fronton, deux pavillons carrées aux extrémités et tour ronde sur l'arrière du bâtiment avec escalier à l'intérieur, les cheminées, les lambris et les planchers du XIXe siècle ; bâtiments des communs et dépendances qui prolongent les deux extrémités du corps de logis, remise sur la cour des communs, murs de la cour des communs et de la cour d'honneur avec leurs portes et le portail avec sa grille en fer forgé, mur du jardin anglais bordant la rue, ses portes et le portail avec sa grille en fer forgé; portail de l'angle Sud-Ouest du parc avec sa grille.","habitants":"Maréchal de Moncey\r\n        \"","divers":"Château de Moncey","gps":"","images":["../image/image_25/25_Moncey_1.jpg","../image/image_25/25_Moncey_2.jpg","../image/image_25/25_Moncey_3.jpg","../image/image_25/25_Moncey_4.jpg","../image/image_25/25_Moncey_5.jpg","../image/image_25/25_Moncey_6.jpg"]},"Consult_chateau_formulairefa61":{"id":"Consult_chateau_formulairefa61","dept":"25","canton":"Besançon","commune":"Sauvagney","nom":"Moncley","type":"Château","periode":"XVIII","histoire":"MONCLEY, depuis le Moyen-Age, divers  seigneurs s'y succédèrent. En 1276  Etienne de Moncley fils d'Eudes d'Apremont tenait le fief, en 1570 propriété de Louis de la Tour et en 1625 érigé en Baronnie pour Jean-Jacques de la Tour Saint-Quentin, puis retiré en 1660 en vertu du droit féodal, donné par Louis XIV à  Gaspard de Blictersvich, son fils nommé marquis de Moncley Etienne-Philippe-Joseph colonnel, tué à la bataille de Senef, sa fille unique Françoise-Marie-Gabrielle comtesse de Vaudrey vendit le domaine en 1718 à Antoine  Belot secrétaire du roi, passa à la famille de Terrier. Famille originaire de Vesoul, gentilshommes et marquis de Mailleroncourt, seigneur de Montagney,  François-Félix-Bernard marquis  de Santans Terrier, premier président du parlement de Besançon   fit  bâtir entre 1778 et 1790  à proximité d'une ancienne forteresse féodale d'origine. Il est resté dans la même famille depuis sa construction, à la Révolution incarcéré à Dijon, décéda en 1796, son fils aîné Charles-Suzanne retrouva à son retour d'émigration le domaine,  gentilhomme de la chambre du roi, député du Doubs, maire de Besançon jusqu'en 1830.  Toujours dans la descendance par le comte de Lagarde.","architecture":"Le Château de Moncley, sur un éperon rocheux,Il représente un brillant et rare témoignage d'architecture néoclassique vestige architectural du XVIIIe siècle. L'ensemble des bâtiments du château de Moncley et leurs décors,  façades s'inspirant du Palladio et de l'antique , fronton triangulaire surmontant les quatre colonnes lensemble foncier composant les cours, parc, le portail, les murs de clôture et de soutènement,   les sous-sols du parterre avec les vestiges de l'ancien château à l'est ainsi que plusieurs parcelles cadastrales sur les communes de Moncley et de Emagny font lobjet dun classement au titre des monuments historiques depuis le 23 décembre 2005. La façade donnant sur le jardin s'orne d'une rotonde coiffée d'une coupole. A l'intérieur, le vestibule comporte douze colonnes à chapiteaux corinthiens soutenant une tribune à balustrades, à laquelle vous accédez par un escalier majestueux, à double révolution.","habitants":"François-Felix-Bernard marquis  de Santans Terrier\r\n        \"","divers":"Château de Moncley","gps":"","images":["../image/image_25/25_Moncley_1.jpg","../image/image_25/25_Moncley_2.jpg","../image/image_25/25_Moncley_3.jpg","../image/image_25/25_Moncley_4.jpg","../image/image_25/25_Moncley_5.jpg","../image/image_25/25_Moncley_6.jpg"]},"Consult_chateau_formulaireddd4":{"id":"Consult_chateau_formulaireddd4","dept":"25","canton":"Maiche","commune":"Maiche","nom":"Montalambert","type":"Château","periode":"XVIII","histoire":"MONTALAMBERT, la famille de Montalembert, originaire de l'Angoumois, pouvait faire remonter sa généalogie jusqu'au XIIIe siècle. La tradition familiale était celle de la carrière des armes, dans laquelle s'étaient illustrés la plupart des ancêtres de Charles de Montalembert, notamment, au XVIIIe siècle, son grand-oncle le marquis de Montalembert, général et ingénieur français. Pendant la Révolution, le père de Charles de Montalembert, Marc-René, s'exile en 1792 sous la Terreur, et combat aux côtés des royalistes émigrés dans l'armée de Condé, puis dans la cavalerie britannique. En 1808, il épouse Élise Rosée Forbes, fille de James Forbes. Le 15 avril 1810, leur fils aîné, Charles, naît à Londres. Jusqu'en 1819, il est élevé en Angleterre, à Stanmore par son grand-père maternel. Après la chute de l'Empire, en 1814, le comte de Montalembert rentre en France aux côtés du roi Louis XVIII. En 1816, il est nommé ministre plénipotentiaire à Stuttgart, puis, à partir de 1820, siège à la Chambre des pairs, à Paris. Son fils poursuit ses études à Paris,  puis en 1826, à l'institution Sainte-Barbe. Étudiant zélé et d'une grande précocité intellectuelle, Charles de Montalembert développe alors des idées politiques libérales. Le 25 juillet 1830,   part pour l'Angleterre. Il est à Londres pendant la révolution de Juillet. D'abord favorable à la chute de Charles X, coupable selon lui d'avoir violé la Charte, fondement des libertés garanties par la monarchie constitutionnelle, il réprouve ensuite les excès anti-religieux des libéraux. Anna de Mérode est âgée de 18 ans en 1836. Les deux jeunes gens sont unis le 16 août 1836 à Trélon,  Député sous la Seconde République, Ce lieu fut le théâtre d'une rencontre orageuse entre le Général de GAULLE et Winston CHURCHILL le 13 novembre 1944.","architecture":"Montalambert, cette magnifique demeure est une bâtisse du XVIe siècle, édifiée en 1524 lors de l'abandon du vieux château dont les ruines dominent sur la colline du  même nom, et rénové au XVIIIe siècle. Corps de logis rectangulaire à trois niveaux et attiques, fronton saillant. inscrit aux monuments historiques depuis 1950. Son jardin d'agrément à la française date de 1765. D'autres château dans la commune voir article \"Maiche\".","habitants":"Famille de Montalembert\r\n        \"","divers":"Château de Montalambert","gps":"","images":["../image/image_25/25_Montalambert_1.jpg","../image/image_25/25_Montalambert_2.jpg","../image/image_25/25_Montalambert_3.jpg"]},"Consult_chateau_formulaire9172-2":{"id":"Consult_chateau_formulaire9172-2","dept":"25","canton":"Montbeliard","commune":"Montbeliard","nom":"Montbeliard","type":"Forteresse","periode":"XIII","histoire":"MONTBELIARD, château des ducs de Wurtemberg. L'actuel date du XIIIe siècle et appartient à la famille de Montfaucon, vassal du comté de Bourgogne. En 1407 Henriette de Montfaucon (Henriette d'Orbe) épouse le comte allemand Eberhard IV de Wurtemberg, fils du comte Eberhard III de Wurtemberg, et fait passer Montbéliard dans le domaine de cette famille sous suzeraineté du Saint-Empire romain germanique pour quatre siècles.   Après le décès de son épouse, le 9 janvier 1819, le roi décida de détruire le château de la famille des Wurtemberg  pour y édifier cette chapelle funéraire. En 1793, le château est rattaché à la République Française comme garnison, rôle quil remplit jusquen 1933. Il devient un dépôt de mendicité en 1811 par application du décret impérial du 29 novembre 1810 et ce jusqu'en décembre 1813, date de l'arrivée des coalisés dans le pays de Montbéliard. Il sera alors leur hôpital militaire comme déjà en 1794 pour l'armée du Rhin ou en 1799 pour l'armée du général Masséna après sa victoire à Zürich.\r\nEn 1816, avec le rattachement du pays de Montbéliard au département du Doubs, une maison d'arrêt est installée dans les souterrains du château. Elle y restera jusqu'en 1836.","architecture":"Sur un éperon rocheux dominant la ville construit au XIIIe siècle. Constitué de deux grosses tours rondes, étage de la \"Tour Henriette\" reconstruit par l'architecte Georg Beer  de 1589 à 1591, sur une base plus ancienne,  porte avec la date 1558,  construction d'une nouvelle tour (tour Neuve ou Frédéric) de 1572 à 1598  la tour Henriette et la tour Frédéric 1424 et 1590,le corps principal a été reconstruit en 1751, aujourd'hui musée.                                  Le château fut remanié  au XIXe siècle  par la ville de Montbeliard qui en est propriétaire. Il existait, entre le XVIIe et le XVIIIe siècle, une prison d'État dont la porte cintrée était surmontée d'un ours, c'est le Berloc (Boehrenloch) ou « Trou aux Ours ». La légende veut que ce soit le prince Frédéric qui ait rapporté un ours noir au cours d'une partie de chasse et l'ait installé dans une fosse spécialement aménagée.","habitants":"Comte Eberhard III de Wurtemberg\r\n        \"","divers":"Forteresse de Montbelliard, avec porte de remparts, le châtel arrière et le manoir Peugeot.","gps":"","images":["../image/image_25/25_Montbeliard_1.jpg","../image/image_25/25_Montbeliard_2.jpg","../image/image_25/25_Montbeliard_3.jpg","../image/image_25/25_Montbeliard_4.jpg","../image/image_25/25_Montbeliard_5.jpg","../image/image_25/25_Montbeliard_6.jpg","../image/image_25/25_Montbeliard_7.jpg","../image/image_25/25_Montbeliard_8.jpg"]},"Consult_chateau_formulaire38c6":{"id":"Consult_chateau_formulaire38c6","dept":"25","canton":"Rougemont","commune":"Gondenans-Montby","nom":"Montby","type":"Château","periode":"XIV","histoire":"MONTBY. cité au XIVe siècle. Parmi les nombreux seigneurs de Montby, le plus connu est Jean, fils bâtard de Nicolas de Montmartin, qui a combattu dans l'armée de Charles Quint et capturé, avec d'autres seigneurs comtois, le roi de France François Premier, à la bataille de Pavie en 1525. Ensuite la seigneurie et le château furent vendus plusieurs fois et le dernier possesseur, Iselin de Lanans, émigra à la Révolution. \r\nLe dernier seigneur occupant du château fut probablement Pierre-Charles, dernier descendant de la seconde maison de Montby mort en 1748. À la Révolution, il est vendu comme bien national et transformé en exploitation agricole jusqu'au milieu du XXe siècle. En 2008 est créée lassociation des amis du château de Montby, afin d'aider les nouveaux propriétaires à sauvegarder, restaurer, animer et promouvoir le château, inscrit dès l'année suivante, à linventaire supplémentaire des monuments historiques depuis le 8 décembre 2009.  Il est aujourd'hui la propriété de la famille Mettetal.","architecture":"Le château  assiégé et dévasté en 1351, 1475, 1543 et 1637, le château subit de nombreuses réparations et modifications faisant de lui un édifice architectural  riche, se compose de quatre corps de bâtiment construits sur un plan trapézoïdal, autour d'une vaste cour intérieure, au milieu de laquelle se trouve une citerne.\r\nL'édifice est percé de nombreuses canonnières et comporte sur ses façades, des éléments architecturaux renaissants des fenêtres à meneaux, linteaux en accolade et classiques.\r\nDe plus, les côtés nord et sud sont percés d'un porche. Le premier comporte les traces d'un pont-levis et le second est protégé par une barbacane, aux murs à bossages. Par ailleurs, le côté ouest se compose d'une grande galerie construite sur arcades en 1611, dans un style classique. Le côté Est est quant à lui détruit en 1870, lors de l'occupation prussienne. L'ensemble était cerné de douves aujourd'hui comblées.","habitants":"Fils bâtard de Nicolas de Montmartin\r\n        \"","divers":"Château de Montby","gps":"","images":["../image/image_25/25_Montby_1.jpg","../image/image_25/25_Montby_2.jpg","../image/image_25/25_Montby_3.jpg","../image/image_25/25_Montby_4.jpg","../image/image_25/25_Montby_5.jpg","../image/image_25/25_Montby_6.jpg","../image/image_25/25_Montby_7.jpg","../image/image_25/25_Montby_8.jpg","../image/image_25/25_Montby_9.jpg"]},"Consult_chateau_formulaire9938":{"id":"Consult_chateau_formulaire9938","dept":"25","canton":"Besançon","commune":"Montfaucon","nom":"Montfaucon","type":"Vestiges","periode":"XI","histoire":"MONTFAUCON; vers 1040, première mention cité des sires de Montfaucon. Conon, vassal de larchevêque de Besançon, surnommé Faucon, puis Richard vers 1060. Existence probable, à cette date, dun château  sur le mont Faucon entre les mains de ces seigneurs, qui adopte  le nom de Montfaucon.  lignage des Montfaucon participe à la fondation de nombreuses abbayes tel que Bellevaux, Lucelles, La Grâce Dieu,  et donne deux archevêques de Besançon : Hugues IV (1108- 1109) et Thierry (1180.1190), qui se distingue à la IIIe croisade.\r\nIl sallie aux comtes de Montbéliard, vers 1120. Richard, seigneur de Montfaucon épouse Sophie, lhéritière des comtes de Montbéliard. Cest au temps dAmédée (1228-1280) que les Montfaucon atteignent leur apogée. Cest probablement lui qui entreprend la construction du château et du village sur le site actuel. En 1477, le château est un des rares du Comté de Bourgogne à ne pas être détruit par l'armée du roi Louis XI, après la mort du duc de Bourgogne Charles le Téméraire et la tentative d'annexion militaire par le roi de France de l'état bourguignon dont fait partie le comté de Bourgogne.","architecture":"Premier château de Montfaucon situé sans doute à lextrémité de léperon, là-même où subsistent des vestiges archéologiques, témoins dune occupation militaire prolongée. En effet, fin du XIIIe  siècle, un vieux Montfaucon qui correspondrait à ce site primitif. Il est transmis au XVe siècle en héritage à la famille des Chalon-Arlay-prince d'Orange et restera en leur possession jusqu'à la Révolution Française.\r\nLe château est abandonné définitivement après la guerre de 10 ans (1634-1644) menée par Richelieu cardinal et premier ministre de Louis XIII  pour tenter de reconquérir le comté de Bourgogne aux Habsbourg d'Espagne.\r\nEn 1984, la commune de Montfaucon achète les ruines du château et entreprend depuis un important et long chantier de restauration.","habitants":"Sires de Montfaucon\r\n        \"","divers":"Vestiges du château de Montfaucon,  site narchéologie et fort dit de Woirol","gps":"","images":["../image/image_25/25_Montfaucon_1.jpg","../image/image_25/25_Montfaucon_2.jpg","../image/image_25/25_Montfaucon_3.jpg","../image/image_25/25_Montfaucon_4.jpg","../image/image_25/25_Montfaucon_5.jpg","../image/image_25/25_Montfaucon_6.jpg","../image/image_25/25_Montfaucon_7.jpg"]},"Consult_chateau_formulaire7134":{"id":"Consult_chateau_formulaire7134","dept":"25","canton":"Boussières","commune":"Besançon","nom":"Montferrand","type":"Vestiges","periode":"XII","histoire":"MONTFERRAND, le château-fort fut érigé au début du XIIe siècle   par Jean II de Cicon qui prit  le nom de sa seigneurie En 1300, Eudes de Montferrand, seul possesseur de la seigneurie après avoir acheté les parts de ses frères Jean et Guillaume en 1292, la possédèrent jusqu'au XVe siècle.  Les seigneurs franc-comtois entrent en conflit avec Philippe le Bel et détruisent les châteaux ennemis dOrnans, Clerval et Pontarlier.  Il reste dans cette lignée jusqu'en 1359 environ pour devenir ensuite successivement la propriété des seigneurs de Salins, de Vergy, d'Achey et de Grammont. Les seigneurs ne résidaient pas au château, ils habitaient Besançon, ils ne venaient que de temps à autre à Montferrand pour chasser et percevoir leurs revenus.  Son nom provient des seigneurs de Montferrand du XIIIe siècle, et partageait la rive gauche avec les seigneurs d'Arguel et d'Abbans. Mais le domaine habité par un châtelain, ainsi de 1350  à 1357, celui-ci  se nommait  Guillaume du Palier, on y trouvait  un procureur, un receveur, un notaire et des  hommes d'armes. Une muraille constituait l'enceinte de l'édifice où un donjon dresse encore de nos jours sa silhouette impressionnante. Jusqu'à la guerre de 10 ans (1632-1642), le château abrite les derniers sujets de la seigneurie. Par la suite, les fortifications n'ayant plus d'utilité militaire tombent en ruines faute d'entretien, d'un incendie et des intempéries. Un acte du 16 août 1683 fait foi de cet état de ruine. Le démembrement des fortifications au cours du temps permet la construction des premières maisons du village.","architecture":"Le  château  de Montferrand était bâti sur une petite roche et montagne, il se composait d'une basse-cour dont le bourg était en prolongement, protégé par un pont-levis dominant les fossés, château au XIIIe siècle . Le village était le fief de cette puissante famille, qui possédait la rive droite du Doubs .Du château médiéval ruiné lors de la guerre de dix ans, il reste l'impressionnante silhouette d'un donjon. Perché à 150 mètres au-dessus du village, au sommet d'une corniche qui surplombe la vallée du Doubs, il offre un beau panorama.  Il est aujourd'hui occupé par un Institut médico-pédagogique.","habitants":"Jean II de Cicon \r\n        \"","divers":"Vestiges du château de Montferrand et du nouveau (institut-médico)","gps":"","images":["../image/image_25/25_Montferrand_1.jpg","../image/image_25/25_Montferrand_2.jpg","../image/image_25/25_Montferrand_3.jpg","../image/image_25/25_Montferrand_4.jpg","../image/image_25/25_Montferrand_5.jpg","../image/image_25/25_Montferrand_6.jpg"]},"Consult_chateau_formulaire764e-2":{"id":"Consult_chateau_formulaire764e-2","dept":"25","canton":"Quingey","commune":"Montfort","nom":"Montfort_Doubs","type":"Vestiges","periode":"XIII","histoire":"MONTFORT,  sous la suzeraineté de la maison de Châlon, la seigneurie de Montfort fut détenue (1237-1339) par plusieurs familles : les Chay, Montbéliard, Antigny, Noyers. Puis vinrent jusqu'à fin du XIVe siècle, les Ste Croix, Vienne, Rougemont, Bauffremont, etc. Apparaît alors  fin du XIVe siècle, une famille de Montfort, dont le premier du nom aurait été Thierry de Montfort, et dont le dernier, Guillaume, mourut en 1530 sans postérité.  Sa soeur apporta cette importante seigneurie à Charles de Taillant. La seigneurie de Montfort comprenait en 1584,  les villages de Montfort, Ronchaux, Pointvillers, Samson, Bartherans, Echay, Cussey, Lizine, Doulaize et Refranche.\r\n De la seigneurie de Montfort devenue baronnie vers 1584, dépendait deux vassaux : celui de Châtillon sur Lizon, Châtillon, Courcelles, Rouhe, Goux et d'Echay et celui de Cléron. C'est sans doute en raison de l'importance du fief de Montfort que la descendance des Taillant tint à  relever  le nom de Montfort, tel Charles de Montfort qui en fit le dénombrement  en 1621. Ce fief échut ensuite, par mariage, aux Poligny, puis aux Andelot, puis aux St Martin. Ces derniers le vendirent en 1734 à A. J. Dronier, seigneur du Villard, qui le garda peu de temps. Jacques Marmillon, secrétaire du roi à Besançon, le reprit en 1746 mais sa descendance ne pût le conserver.","architecture":"La forteresse féodale de Montfort était posée sur une butte rocheuse, altitude : 351 m. Ses traces sont aujourd'hui pas repérables car un Institut médico-pédagogique, qui recouvre le site, lui enlève l'aspect qu'il a pu avoir autrefois.  Ancien chef-lieu de seigneurie, le château du XIIe siècle, reconstruit au XIXe siècle forme un ensemble bien conservé. On peut y voir, dans son état actuel, une façade, avec porche d'entrée doté d'un arc de plein cintre, des murailles auxquelles sont adossés dépais contreforts, un pan de tour polygonale, dans l'actuelle tour d'escalier quadrangulaire située à l'angle d'un bâtiment carré ancien logis.  Selon une légende, le château passait pour avoir été hanté par les  sorciers du val.","habitants":"Thierry de Montfort\r\n        \"","divers":"Vestiges du château de Montfort","gps":"","images":["../image/image_25/25_Montfort_Doubs_1.jpg","../image/image_25/25_Montfort_Doubs_2.jpg"]},"Consult_chateau_formulaire2c0b":{"id":"Consult_chateau_formulaire2c0b","dept":"25","canton":"Ornans","commune":"Montgesoye","nom":"Montgesoye","type":"Château","periode":"XIX","histoire":"MONTGESOYE. l'origine du château est confuse, elle remonterait à la fin du IXe siècle, une forteresse aurait été bâtie par la puissante famille de Montgesoye, qui exerçait dans toute la région ses droits de garde et de justice. Mais une partie de la seigneurie de Montgesoye s'allie avec celle de Durnes du XIIIe siècle jusqu'au XVIIIe siècle, où l'on trouve le Docteur Jean Vieille auquel succède une douzaine de propriétaires jusqu'en 1942, date de l'achat par les forces motrices de l'Est,pour une colonie de vacances, intégrée à EDF en 1946. Il est racheté en 1946 pour héberger un centre de vacances. \r\nQuelques personnages illustres jalonnent ce passé.\r\nEn 975  Thomas de Bracon, sire de Montchesoy, 1er seigneur de Châteauvieux. En 1414  Philippe de Montgesoye est l'écuyer de Neufchatel. En  1435  Gaultier de Montgesoye chevalier de Philippe le Bon. Et surtout Aîmé de Montgesoye, poète et troubadour à la cour de Charles le Téméraire.","architecture":"Montgesoye, La première construction de ce bâtiment remonte au IXe siècle.  la tour du IXe siècle et une porte Renaissance. Le château de Montgesoye est rasé par  les mercenaires du capitaine Rosen en 1636. Plusieurs fois reconstruit jusqu'en 1800.\r\nL'édifice actuel est composé de deux corps de bâtiments et datent du XIXe siècle, subsistent du passé une base de la tour du IXe siècle et une porte Renaissance.","habitants":"Famille de Montgesoye\r\n        \"","divers":"Château de Montgesoye","gps":"","images":["../image/image_25/25_Montgesoye_1.jpg","../image/image_25/25_Montgesoye_2.jpg"]},"Consult_chateau_formulaire630b":{"id":"Consult_chateau_formulaire630b","dept":"25","canton":"St-Hippolyte","commune":"Montjoie-le-Château","nom":"Montjoie","type":"Vestiges","periode":"XIII","histoire":"MONTJOIE, siège d'une seigneurie puis baronnie créée par les seigneurs de Glère elle sera transmise aux barons de Thuillières par le mariage de la fille de Guillaume II de Glère-Montjoie avec Didier de Montreux. De cette union naîtra Jeanne, dame de Montreux en Ferrette, qui va épouser Guillaume de Thuillières donnant ainsi naissance à la branche de Thuillières-Montjoie. Assiégé sans résultat en 1428 par Jean de Thierstein, bailli de Ferrette, il fut pris en 1444 par les troupes impériales, en 1475 par les confédérés helvétiques. Il fut définitivement mis en ruines en juin 1635 par les troupes françaises du maréchal de La Force, commandant un corps français de 12000 hommes, vient camper à la fin de mai 1635 sous le château de Montjoie. Saint-Belmont, capitaine lorrain, s'était jeté dans la forteresse, dont l'assise sur un roc élevé au milieu d'une vallée profonde était sa meilleure défense. Une sommation est signifiée à Saint-Belmont, et il refuse de se rendre. Pour attaquer la forteresse avec avantage, le maréchal avait à loger son canon sur un tertre incliné de l'autre côté du ravin, au couchant ; mais pour y arriver, il n'y avait qu'un chemin dans l'étroit espace de cette coupure, au pied même des murs du château.","architecture":"Restes d'un imposant château bâti dès le début du XIIIe siècle par les sires de Glère, durant les guerres de Méranie.","habitants":"Barons de Thuillières \r\n        \"","divers":"Vestiges du château de Montjoie","gps":"","images":["../image/image_25/25_Montjoie_1.jpg","../image/image_25/25_Montjoie_2.jpg","../image/image_25/25_Montjoie_3.jpg","../image/image_25/25_Montjoie_4.jpg","../image/image_25/25_Montjoie_5.jpg"]},"Consult_chateau_formulairefe56":{"id":"Consult_chateau_formulairefe56","dept":"25","canton":"Rougemont","commune":"Huanne-Montmartin","nom":"Montmartin","type":"Château","periode":"XVIII","histoire":"HOUANNE-MONTMARTIN, premier seigneur du nom dont l'histoire fait état, qui a créé le prieuré qui dépendait des bénédictins de Mouthier-Hautepierre auxquels Hugues avait cédé, à titre de fiefs, des terres et des droits. Longtemps après, un curieux différend surgit entre le prieur et les seigneurs de Montmartin, différend qui séternisa pendant plus de deux siècles.  La commune de Montmartin n'existe plus depuis 1910, elle a été rattachée à celle d'Huanne pour devenir Huanne-Montmartin. Mais du XIe au début du XIXe siècle c'était le contraire : Montmartin, par son château et ses seigneurs, dominait et au pied était le Val de Montmartin. Par la grâce des sires de Montmartin, Huanne fut d'abord, au XIIe siècle, une église et un prieuré. Huanne ne compte d'abord que quelques fermes qui appartenaient au couvent et ce n'est qu'en 1444 que les seigneurs de Montmartin firent ériger Huanne en paroisse.    Par la grâce des sires de Montmartin, Huanne fut d'abord, au XIIe siècle, une église et un prieuré.","architecture":"Montmartin bâti sur un éperon rocheux, domine la vallée du Crenu, autrefois appelée Val de Montmartin. Ce village est construit à l'intérieur des murailles du château fort datant du Ve siècle, qui fut incendié par les Suédois en 1639 et démantelé par les troupes de Louis XIV lors de la conquête de la Franche Comté et reconstruit en 1735 dans le style Louis XV. Le château, corps de logis rectangulaire à deux niveaux et attiques pavillons d'entrée légèrement saillants en façades avec fronton complété par deux autres pavillons en retour d'équerres.","habitants":"seigneurs de Montmartin\r\n        \"","divers":"Château de Montmartin","gps":"","images":["../image/image_25/25_Montmartin_1.jpg","../image/image_25/25_Montmartin_2.jpg","../image/image_25/25_Montmartin_3.jpg","../image/image_25/25_Montmartin_4.jpg"]},"Consult_chateau_formulairefee6":{"id":"Consult_chateau_formulairefee6","dept":"25","canton":"Quingey","commune":"Montrond-le-Château","nom":"Montrond_Doubs","type":"Vestiges","periode":"XIII","histoire":"MONTROND, sur la butte du village de Montrond, Amédée de Neufchâtel, seigneur de Montrond, fait bâtir une  forteresse   en 1231, avec laide de Pierre V de Scey  et son fils Richard, dit de Montbéliard. Vers 1276, Richard de Montfaucon-Montbéliard, seigneur de Courchaton, hérite du domaine. Ce lieu était vraisemblablement  fortifié avant cette date par un édifice primitif comme cela était  fréquent au XIIe siècle.. Alors Amédée de Neufchâtel rend hommage au doyen  de Saint-Etienne en 1233 et a Pierre de Scey signe une carte de donation pour cette église en mentionnant ce quil lui doit pour la part  quil possède du château. Un tremblement de terre a provoqué leffondrement dune tour  en octobre 1356. En 1406, Guillaume de Vienne devient seigneur du fief de Montrond, qui comprend alors, Mérey, Villers, Tarcenay, Epeugney, Malbrans, Maizières, Scey-en-Varais, Cademène, Rurey, Lizine ainsi que quelques terres à Orchamps-Vennes et Fuans. En 1446, Montrond est vendu à Thibaud IX de Neuchâtel, maréchal de Bourgogne. En 1505, la forteresse est remise à Guillaume de Furstemberg, mari de Bonne de Neuchâtel, puis en 1605, la seigneurie est acquise par Thomas de Jouffroy, seigneur de Marchaux.  Lorsque la Franche Comté fut annexée par la France, le roi Louis XIV engagea une guerre quil remporta contre la province et le château fut assiégé et démantelé en mai 1674. Il ne fut  jamais relevé,  mais une partie peut être habité, puisqu'en 1743, il y avait un fermier dénommé Pellot qui y habitait.                                Dans la commune le château de Cery.","architecture":"Le château de Montrond  (ruines) . Au sommet, la vue du village entier et du village voisin ainsi que l'horizon au loin sont parfaitement visibles, ce lieu est d'ailleurs classé site panoramique.  Le centre du château, qui devait être à lorigine une cour, a disparu avec les siècles. Jadis transformé en prairie il fut planté de conifères au début des années 70. \r\n Aujourdhui, le château est en cours de consolidation et de nettoyage, ce qui permet de sauvegarder les murs encore en état et de permettre un accès facile.\r\nLes vestiges restants, victimes dun abandon séculaire, sont bien maigres cependant pour le visiteur épris dhistoire.  En faisant le tour de ce qui fut le mur denceinte, on aperçoit une salle voûtée dont louverture est à demi engloutie par les pierres. Il reste des murailles partiellement détruites sur tout le pourtour du château, jalonnées de portions de tours dangle, essentiellement du côté levant. Là, on peut admirer quelques pans de murs percées de fenêtres, sans doute du XVIe siècle, et qui devaient être les restes du logis seigneurial, ainsi quune tour où lon peut accéder par une poterne donnant accès à un conduit vertical.","habitants":"Pierre V de Scey \r\n        \"","divers":"Vestiges du château de Montrond le Château et château de Cery","gps":"","images":["../image/image_25/25_Montrond_Doubs_1.jpg","../image/image_25/25_Montrond_Doubs_2.jpg","../image/image_25/25_Montrond_Doubs_3.jpg","../image/image_25/25_Montrond_Doubs_4.jpg"]},"Consult_chateau_formulaire932d":{"id":"Consult_chateau_formulaire932d","dept":"25","canton":"Morteau","commune":"Morteau","nom":"Morteau","type":"Château","periode":"XVIII","histoire":"MORTEAU. L'église Notre-Dame-de-l'Assomption de Morteau actuelle fut construite entre 1513 à 1515 avec des pierres de ce château.  Morteau s'enorgueillit de deux très belles maisons, le château Pertusier fut construit en 1576 par la famille Cuche. Pendant l'attaque des suédois en 1639, la tourelle qui terminait l'escalier à vis s'enflamma ; la façade ouest fut mitraillée. On voit encore les empreintes des balles  lancées par les biscayens suédois. C'est un Bole qui en était alors propriétaire. Sous la Révolution, un avocat de Besançon, Jean-Charles Pertusier acheta l'immeuble devenu bien national . La maison et son parc furent acquis par la commune en 1935. Cette habitation reste un des rares témoignages de la Renaissance dans le Haut-Doubs. Il abrite depuis 1985 le musée de l'horlogerie de Morteau.\r\nL'actuel hôtel de ville de Morteau, fut bâti en 1590 par les sieurs Fauche. Occupé par les officiers de Saxe-Weimar, il ne souffrit pas de la guerre et passa dans les mains des Bénédictins, puis dans celles des frères Roussel. La commune de Morteau en fit l'acquisition en 1791. Il abrite aujourd'hui une partie des services municipaux et aussi le fameux livre noir, précieusement conservé dans le bureau du maire,  c'est en 1454 qu'un notaire de la ville consigna dans ce livre tous les documents relatifs au prieuré. Il a pour dimensions 30 cm × 22 cm × 6 cm, sa couverture est formée par deux planchettes de bois recouvertes de cuir gaufré noir Il contient 54 chartes concédées de 1188 à 1514, des lettres de franchises, des sentences, des arrêts et des conventions. Emmené en Suisse lors de l'invasion suédoise, il put être récupéré intact après la guerre.","architecture":"Morteau posséda un château féodal. Construit sur l'éminence du Mondey, à l'extrémité Est, il surveillait l'ancienne route celtique qui par Les Fins, le Mondey et Sobey, reliait Besançon à la Suisse. L'hôtel de ville, ancien manoir  corps de logis rectangulaire à deux niveaux  avec fronton et deux  tours carrées aux angles en façades à toits pyramidals.                                                                  Pertusier construit en 1576, richement sculptée, la façade sur la cour d'honneur présente une superbe fenêtre à meneaux, le château de forme rectangulaire à deux niveaux  toits en croupe avec chiens assis un par côtés, a trouvé  son lustre d'antan.","habitants":"sieurs Fauche\r\n        \"","divers":"Château de morteau et hôtel de ville","gps":"","images":["../image/image_25/25_Morteau_1.jpg","../image/image_25/25_Morteau_2.jpg","../image/image_25/25_Morteau_3.jpg","../image/image_25/25_Morteau_4.jpg"]},"Consult_chateau_formulairec6bb":{"id":"Consult_chateau_formulairec6bb","dept":"25","canton":"Mouthe","commune":"Mouthe-St-Antoine","nom":"Mouthe","type":"Fort","periode":"XVIII","histoire":"MOUTHE;  en 1077, Simon de Vexin, originaire de Crépy-en-Valois, qui fut comte d'Amiens, de Vexin et de Valois, se retire dans un monastère près de Saint-Claude. Pour s'infliger des mortifications plus sévères, il décide avec quelques compagnons de remonter aux sources du Doubs et d'y fonder un ermitage. Cet ermitage deviendra un petit prieuré dépendant de l'abbaye de Saint-Oyand de Joux. Malgré les rudes conditions climatiques, quelques paysans s'installent et fondent le village de Mouthe. Manoir actuellement hôtel de ville.  Entrée du fort de Saint-Antoine,  mais on ne peut parler de Saint-Antoine sans citer son fort.                    Les neufs villages de la seigneurie de Mouthe , Sarrageois, Gellin, Boujeons, Rondefontaine, Les Pontets, Reculfoz, Le Crouzet, Petite-Chaux.  Edifié entre 1879 et 1882, il fut baptisé fort Lucotte en 1887 du nom d'un général de la Révolution et de l'Empire. Désaffecté, il a été acheté à l'armée par la commune en 1965 et loué à Marcel Petite en 1966 pour y être transformé en caves d'affinage de comté. Situé à 1 104 m d'altitude au milieu de la forêt, le fort Lucotte abrite dans ses caves voûtées en pierre de taille. Il attire chaque année de plus en plus de visiteurs.","architecture":"Mouthe.  Le château, ancienne maison bourgeoise du XVIIIe siècle entourée d'un parc et qui accueille des colonies de vacances.   L'hôtel de ville de Mouthe, bâtiment surprenant construit après l'incendie de 1849 sur des plans de Pierre Marnotte, est inscrit à l'inventaire des monuments historiques en 1990. Corps de logis rectangulaire à deux niveaux flanqué de tourelles hexagonales en angles à toits pointus.","habitants":"\"","divers":"Manoir de Mouthe","gps":"","images":["../image/image_25/25_Mouthe_1.jpg","../image/image_25/25_Mouthe_2.jpg","../image/image_25/25_Mouthe_3.jpg"]},"Consult_chateau_formulairebac6":{"id":"Consult_chateau_formulairebac6","dept":"25","canton":"Amancey","commune":"Nans-sous-Ste-Anne","nom":"Nans_sous_Ste_Anne","type":"Maison forte","periode":"XV","histoire":"MIRABEAU,  au XVe siècle, les Montrichard, seigneurs de Nans, vassaux des Chalon, abandonnent la forteresse de la  source du Verneau et construisent au village de Nans un château plus confortable  en 1776, proche du Lison, une gentilhommière où le marquis de Monier, ancien président de la cour des comptes de Dole, retiré à Pontarlier. Le président a épousé, à 75 ans, , Sophie de Ruffey, qui, maigrement dotée, a préférée ce mariage de raison au couvent. Il devint la propriété des Monnier au XVIIIe siècle. A la veille de la Révolution, la jeune épouse du vieux seigneur Monnier est séduite par Mirabeau, alors plus ou moins emprisonné à la prison du château de Joux. \r\nLa légende raconte que le château de Nans-sous-Sainte-Anne a accueilli ces amours adultérins, d'où le nom actuel de la demeure. Le tribunal de Pontarlier, qui ne badine pas avec l'amour, condamne par contumace le séducteur à la peine capitale et l'épouse infidèle à la détention perpétuelle dans un couvent. Arrêtés à Amsterdam, les fugitifs sont ramenés en France. Mirabeau conserve sa tête, mais il est condamné à payer 40 000 livres au marquis de Monier et incarcéré pendant 4 ans au donjon de Vincennes. Puis, en 1782, il se constitue prisonnier à Pontarlier. Enfermé à la prison de la ville, il se présente devant le tribunal et arrache de haute lutte l'annulation du 1er jugement.Mais le roman de Nans est fini et Sophie, résignée, reste volontairement au couvent de Gien, où elle a été reléguée après sa fugue.                                               Dans la commune le château de Mirabel transformé en chambres d'hôtes. A quelques kilomètres au sud a Villeneuve-les-Amont,  le château transformé en un centre médical d'handicapés.","architecture":"Château de Nans sous Ste Anne dit de Mirabeau  du XVe siècle, Mirabel,  château du XVIIIe siècle  corps de logis rectangulaire à trois niveaux  tours en angle mis-oeuvres dit de la marquise Mirabelle,  propriété aujourd'hui de monsieur  Carlo de Berti  qui l'a transformé en chambres d'hôtes.","habitants":"marquis de Monier\r\n        \"","divers":"Château dit de Mirabeau, de Mirabelle et de Villeneuve les Amont.","gps":"","images":["../image/image_25/25_Nans_sous_Ste_Anne_1.jpg","../image/image_25/25_Nans_sous_Ste_Anne_2.jpg","../image/image_25/25_Nans_sous_Ste_Anne_3.jpg"]},"Consult_chateau_formulaire6c48":{"id":"Consult_chateau_formulaire6c48","dept":"25","canton":"Audeux","commune":"Noironte","nom":"Noironte","type":"Château","periode":"XIV","histoire":"NOIRONTE, c'est probablement à la suite du mariage en 1634 entre Claude Monnier, docteur en droit, lieutenant général du bailliage d'Amont, et Anne Jacquinot, dame de Noironte, que la terre de ce lieu est acquise à la famille Monnier jusqu'en 1740.   Le château daterait du XIVe siècle, il appartenait aux Fallerans au XVIe siècle, puis il est confisqué et vendu à Claude Franchet en 1581. Après la Révolution, il fut racheté par le général Ruty.  À cette date, Charles, marquis de Monnier la seigneurie de Noironte et autres terres ont été élevées en marquisat en 1713, président honoraire de la chambre des comptes de Dole, vend sa seigneurie à Catherine Françoise Petitcuenot, veuve de Claude Joseph Bullet, seigneur de Bougnon. Noironte est cédée à un membre de la famille de Montrond. Le dernier seigneur de Noironte est madame de Montrond et monsieur de Chateaubrun.  René de Chateaubrun (1875-1942) : sculpteur né à Noironte, maire de Noironte de 1922 à 1928. Il est le fils de Jules de Châteaubrun.","architecture":"L'existence de ce château est évoquée dès le XIVe siècle. Après avoir connu un incendie, il est entièrement reconstruit à partir de 1786 et terminé en 1830. Actuellement, le manoir, entretenu avec soin, se dresse au milieu d'arbres séculaires. Celui-ci et ses dépendances n'ont pas subi de modifications marquées depuis la reconstruction au XVIIIe siècle. Le château se présente sous la forme de deux grands corps de logis disposés en L, et comportant chacun une tour, carrée au nord, ronde au sud. Seule adjonction, face à la tour ronde, une sorte de pavillon, qui, au début de ce siècle servait d'atelier de sculpture à l'avant-dernier propriétaire du château, monsieur de Chateaubrun.","habitants":"Famille Monnier \r\n        \"","divers":"Château de Noironte","gps":"","images":["../image/image_25/25_Noironte_1.jpg","../image/image_25/25_Noironte_2.jpg"]},"Consult_chateau_formulaire1764":{"id":"Consult_chateau_formulaire1764","dept":"25","canton":"Marchaux","commune":"Novillars","nom":"Novillars","type":"Château","periode":"XVI","histoire":"NOVILLARS, un château fort aurait existé vraisemblablement vers 1256, construit par un certain Étienne de Cicon, à   l'emplacement du château actuel. Ce dernier, propriété de la famille Jouffroy  qui possédait également la quasi  intégralité des terres de 1506 à 1760, aurait été restauré à plusieurs reprises du XVIIe siècle au XIXe siècle. En 1814, les troupes autrichiennes occupent le château. En 1883, la famille Broch d'Hotelans devint propriétaire du  domaine et  c'est dans le parc, qu'en 1980, est construit l'hôtel de ville de Novillars et ses annexes. Le château accueille aujourd'hui dans ses murs le centre daide par le travail Les Fougères.                                A quelques kilomètres au sud ouest  la Roche-lez-Beaupré joli château.","architecture":"Château de Novillars du XVIe siècle,  restauré plusieurs fois en 1685,1715 et 1884, corps de logis rectangulaire à deux niveaux et attiques, flanqué de  deux tours latérales sont couvertes d'un toit en tuiles vernissées reprenant les courbes du dôme à l'impériale.","habitants":"Famille Jouffroy \r\n        \"","divers":"Château de Novillars","gps":"","images":["../image/image_25/25_Novillars_1.jpg","../image/image_25/25_Novillars_2.jpg"]},"Consult_chateau_formulairea2a7":{"id":"Consult_chateau_formulairea2a7","dept":"25","canton":"Marchaux","commune":"Ollans","nom":"Ollans","type":"Château","periode":"XVI","histoire":"OLLANS, en 1368, Guy de Montbozon vend à L'abbaye de Saint-Vincent de Besançon, tout ce qu'il possédait à  Henri de la Roche, seigneur d'Ollans.  Quant à la seigneurie acquise en 1564 par la famille d'Andelot, elle sera revendue en 1666 à Philippe-Guillaume de Belot. Ce seraient donc ses descendants qui firent construire le château actuel au milieu du XVIIIe siècle, sur l'emplacement d'une ancienne forteresse. En 1768, Étienne Chabenat de la Malmaison, conseiller au parlement de Paris, s'empare du bâtiment et du marquisat. Toujours est-il que la famille de la Malmaison possède cette demeure pendant la période fort mouvementée de la Révolution à la fin de l'Empire   En 1813, le domaine fut achevé par la famille Baudot dont les chroniqueurs disent quelle l'avait plus ou moins transformé en bâtiment agricole.  Puis en 1836, il passa à la famille Derosne dont les descendants l'occupèrent jusqu'en 1976.","architecture":"Ollans, corps de logis du XVIIIe siècle présentant un plan en U avec tours sur les angles, l'ensemble à deux niveaux tours rondes attenant aux bâtiments sur façades en angles extérieurs . Un jardin fut dessiné à cette époque, de laquelle datent également les statues de Diane et Apollon, fin du XIXe siècle, ajout d'une maison de gardien, d'une serre sur la cour d'honneur, du colombier sur la basse-cour, de l'orangerie, du rucher, de la grotte à mosaïque sur le jardin.","habitants":"seigneur d'Ollans\r\n        \"","divers":"Château d'Ollans","gps":"","images":["../image/image_25/25_Ollans_1.jpg","../image/image_25/25_Ollans_2.jpg","../image/image_25/25_Ollans_3.jpg","../image/image_25/25_Ollans_4.jpg"]},"Consult_chateau_formulairea03f":{"id":"Consult_chateau_formulairea03f","dept":"25","canton":"Ornans","commune":"Ornans","nom":"Ornans","type":"Vestiges","periode":"XII","histoire":"ORNANS, en 1237, Hugues de Chalon et sa femme Alice de Méranie reçoivent de Jean de Chalon le château d'Ornans, où selon la tradition serait né leur fils Othon IV. Ce dernier fonda la chapelle Saint Georges en 1289. En 1295, Othon IV vendit le château fort au comte de Bourgogne, ce qui provoqua la guerre avec les  barons comtois conduits par Jean de Chalon Arlay. Le château fut alors saccagé  et détruit en 1300.  Un accord  fut trouvé entre le roi de France et les barons comtois qui furent obligés de reconstruire le château en 1301, la   date 1369 qui est gravée sur la clef de voûte du coeur correspond sans doute à une reconstruction.   En 1475 l'enceinte fut renforcée par Charles le Téméraire au moment de la guerre contre les Suisses. Vers 1650,  une demi lune est construite  pour défendre les abords de  la grande porte du château. Lors de la première conquête de Louis XIV en 1668,  le château fort capitule sans combattre. Le 5 mai 1674  le château est complètement rasé par le maréchal de Luxembourg à l'exception de la chapelle st Georges. Une maison, bâtie avant le cadastre de 1813, et modifiée depuis, s'élève à l'extrémité  de l'éperon, lors de la seconde conquête de la Franche-Comté. À linstar dOthon IV et Mahaut dArtois, plusieurs personnages célèbres séjournèrent au château. Celui-ci fut administré par le mathématicien Pierre Vernier (1584-1638) qui en était le capitaine. Cest sur ce site quil réalisa son  Quadrant nouveau  dont une application devint le célèbre Vernier  du pied à coulisse, bien utile à tous les mécaniciens et outilleurs.","architecture":"ORNANS Étape stratégique de la Route du Sel, le Château tient ses origines du Moyen-Âge. Construit au XIIe siècle,  fut détruit en l'an 1300. Après de nombreuses rénovations,  fut rasé en 1674 sur les ordres de Louis XIV,  il ne reste plus grand chose, si ce n'est le rocher où se dressait autrefois une forteresse. Celle-ci fut construite au Moyen-Age et rasée en 1674, lorsque les armées de Louis XIV envahirent la Franche-Comté. Elle est entourée de quelques ruines recouvertes par la végétation et d'un petit hameau.\r\nEdifié à l'origine pour protéger la route du sel, le château d'Ornans disposait, au nord, d'une courtine flanquée de deux tours rondes et d'un fossé rectiligne large de 15 mètres débouchant de chaque coté sur le vide des ravins. La courtine était percée d'une porte avec pont-levis qui s'ouvrait sur un escalier entre deux rochers à l'est et servait de sortie de secours. Seule la chapelle Saint Georges datant de 1289 et plusieurs jolies battisses restent à ce jour.","habitants":"Pierre Vernier\r\n        \"","divers":"Vestiges du château d'ornans, musée courbet et couvent","gps":"","images":["../image/image_25/25_Ornans_1.jpg","../image/image_25/25_Ornans_2.jpg","../image/image_25/25_Ornans_3.jpg","../image/image_25/25_Ornans_4.jpg","../image/image_25/25_Ornans_5.jpg","../image/image_25/25_Ornans_6.jpg"]},"Consult_chateau_formulaire1786":{"id":"Consult_chateau_formulaire1786","dept":"25","canton":"Audeux","commune":"Pirey","nom":"Pirey","type":"Château","periode":"XVI","histoire":"PIREY,  La première mention importante de Pirey date de 1334, dans un acte de partage entre Poncart, Guillaume et Jacques de Thoraise. En 1477, prisonnier des hommes du roi de France, Hugues de Chalon-Chatelguyon, seigneur de Pirey, vendit cette terre à Pierre Despotots pour payer sa rançon.\r\nDivers seigneurs se partagèrent ce territoire au cours des siècles suivants : les familles Despotots, Perrenot, Achey, Gorrevod, Thomassin, Arnoulx de Pirey, ainsi que le chapitre métropolitain de Besançon et l'hôpital du Saint-Esprit.\r\nEn 1674, Pirey ressentit les effets désastreux du siège de Besançon par les troupes de Louis XIV. En 1805, la commune acquit une importante partie du mobilier du couvent des Minimes de Consolation. En 1814, le village fut à nouveau ravagé par les troupes d'occupation.","architecture":"Petit château à tours d'angle, relais de chasse du XVIIe siècle, agrandi à la fin du XIXe siècle et entouré d'un parc propriété privée.","habitants":"Pierre Despotots\r\n        \"","divers":"Château de Pirey","gps":"","images":["../image/image_25/25_Pirey_1.jpg","../image/image_25/25_Pirey_2.jpg"]},"Consult_chateau_formulaire0ef7":{"id":"Consult_chateau_formulaire0ef7","dept":"25","canton":"Pontarlier","commune":"Pontarlier","nom":"Pontarlier","type":"Patrimoine","periode":"XV","histoire":"PONTARLIER; après Briançon ville la plus haute de France, station romaine et à partir du Moyen-Age  centre religieux majeur doté  au XVe siècle de remparts et d'un château.  Axe d'échange reliant le nord au sud de l'Europe a fait de Pontarlier, dès le Moyen-Age, le centre commercial d'une région convoitée pour ses frontières avec la Suisse. La Cluse de Joux, située à 5 km de la ville, est connue depuis l'antiquité comme le lieu de passage principal pour traverser le massif du Jura.  Dès le XIIIe siècle il existe à Pontarlier une bourgeoisie, La ville est divisée en deux bourgs portant pour l'un le nom de \"Pontarlier\" et pour l'autre celui de \"Morieux\" plus anciennement \"Mareul\" ou \"Moreul\" qui signifierait \"Marais\" ; en 1336 Jean III de Blonay, sire de Joux reprend de Jean II de Chalon-Arlay  son châtel de Joux, le Moler devant Joux, que le seigneur de Châlon fit bâtir, et la forte place du Molar dessus Pontarlier face au château de Joux sur une éminence de la forêt nommée \"Fauconnière\" aujourd'hui \"Bois de Ban\", là se situe la \"forte place du Molar\" non loin du bourg de \"Morieux\" et de sa porte du même nom.","architecture":"Pontarlier.  La porte st-Pierre construite au XVIIIe siècle , le musée municipal maison du XVe siècle.  Fort Catinat  dit du Larmont ( voir article Joux ), communiquant ainsi par un puissant faisceau vers des forts situés entre 15 et 50 km de distance. Les abris sous roc ont été ajoutés au seuil de la Grande Guerre, . Il est encore en bon état de conservation, malgré les bombardements allemands en Juin 1940.\r\nChose très rare, le fossé ne couvre que 3 des 4 côtés de l'ouvrage, le front de gorge ,l'entrée donnant directement sur la route. C'est d'ailleurs de ce côté-là que les Allemands arrivèrent en Juin 1940 et n'eurent aucun mal à prendre le fort à leur compte.","habitants":"Jean II de Chalon-Arlay\r\n        \"","divers":"Porte st-Pierre et château Sandon","gps":"","images":["../image/image_25/25_Pontarlier_1.jpg","../image/image_25/25_Pontarlier_2.jpg","../image/image_25/25_Pontarlier_3.jpg","../image/image_25/25_Pontarlier_4.jpg","../image/image_25/25_Pontarlier_5.jpg"]},"Consult_chateau_formulaire54c8":{"id":"Consult_chateau_formulaire54c8","dept":"25","canton":"Quingey","commune":"Quingey","nom":"Quingey","type":"Château","periode":"XV","histoire":"QUINGEY, Fief des comtes de Bourgogne,  cest Gérard de Roussillon qui aurait fait construire le château de Quingey an VIII de notre ère, château très prisé par les comtes de Bourgogne dont le père du Pape Calixte II, né à Quingey en 1060, de son vrai nom Gui de Bourgogne. Sur la place des Rives de la Loue où il se situait, ont été construites, la poste inaugurée en 1995, et la perception,  après la destruction de lusine de Quingey devenue vétuste et dangereuse et qui fut successivement clouterie du début du vingtième siècle jusquen 1930, puis sparterie tissage de fibres végétales : nattes, tapis-brosse  pendant quelques années, et, enfin, fabrique de couverts et de plats en inox du temps de Jean Simon.","architecture":"Maison forte de Quingey, corps de logis rectangulaire à deux niveaux accolé d'une tour ronde inférieure dite de Calixte. Deux autres châteaux, le Malpas corps de logis rectangulaire à deux niveaux et attiques flanqué en prolongement de chaque côtés de pavillons avec terrasses, le château de Lavans corps de logis rectangulaire avec fronton à trois niveaux et tourelles sur les extrémités de la façade.","habitants":"Comtes de Bourgogne\r\n        \"","divers":"Maison forte de Quingey, château de Malpas et de Lavans","gps":"","images":["../image/image_25/25_Quingey_1.jpg","../image/image_25/25_Quingey_2.jpg","../image/image_25/25_Quingey_3.jpg","../image/image_25/25_Quingey_4.jpg","../image/image_25/25_Quingey_5.jpg"]},"Consult_chateau_formulaire209c":{"id":"Consult_chateau_formulaire209c","dept":"25","canton":"Audeux","commune":"Recologne","nom":"Recologne","type":"Château","periode":"XVII","histoire":"RECOLOGNE, Cest sans doute Frédéric de Chavirey qui fit construire le château qui existait certainement en 1636 au moment du siège de Dole,  En 1746, la famille de Camus en devint  propriétaire, puis par alliance  en 1787 avec les Chifflet, célèbre famille dérudits bisontins. monsieur de Camus fit raser les ponts-levis et les fortifications  du château en 1789, cétait un aristocrate inconscient, il sattira ainsi les railleries des gens du village.","architecture":"Le château est un édifice en forme  rectangulaire de 40 mètres de long, à deux niveaux et attiques, aux deux façades flanquées de pavillons carrés aux angles à toits pointus. Sur la façade sud-ouest on peut voir un escalier à double volée à garde corps en fer forgé. façades et toitures du bâtiment principal, salon au rez-de-chaussée ainsi que la chapelle au premier étage avec leur décor.","habitants":"Frédéric de Chavirey\r\n        \"","divers":"Château de Recologne","gps":"","images":["../image/image_25/25_Recologne_1.jpg","../image/image_25/25_Recologne_2.jpg"]},"Consult_chateau_formulaire748c":{"id":"Consult_chateau_formulaire748c","dept":"25","canton":"Quingey","commune":"Rennes-sur-Loue","nom":"Rennes_sur_Loue","type":"Château","periode":"XVIII","histoire":"RENNES-sur-LOUE,   vers le milieu du XIIIe siècle, Jean de Chalon donne la seigneurie de Rennes-sur-Loue en fief à Hugues de Rans.  Hormis leur droit de suzeraineté, les Chalon possèdent d'abord peu de biens à Rennes, puis ils multiplient petit à petit leurs possessions. En 1277, Jean II de Chalon achète le bourg.   La famille ne réside pas sur la seigneurie, qui est représentée par un châtelain.  Aux XVe et XVIe siècle, elle est plusieurs fois vendue et rachetée,  les Chalons se réservant à chaque vente le droit de suzeraineté. Les Nassau, princes d'orange, héritent des Chalon vers 1530. Le territoire de Rennes sur Loue est confisqué en 1567 par le roi d'Espagne, après la révolte des Pays-Bas contre la puissance espagnole, menée par Guillaume de Nassau. Edifice construit pour l'essentiel dans la première moitié du XVIIIe siècle par la famille Girod de Rennes, anoblie par charge, est propriétaire de la seigneurie, qui conserve le château.  Les Girod devinrent possesseurs des seigneuries de Miserey et de Rennes  sur Loue, le dernier descendant direct des Girod de Rennes disparut en 1942. Le château est aujourdhui la  propriété de M. Bertrand de Guillebon.","architecture":"Rennes sur Loue, édifice construit pour l'essentiel dans la première moitié du XVIIIe siècle.  Le corps de logis rectangulaire présente une élévation  régulière à deux niveaux et un étage de comble. Grand escalier et éléments de décor des XVIIIe et XIXe siècles dans le corps de logis. L'orangerie date de 1829.","habitants":"Famille Girod\r\n        \"","divers":"Château  de Rennes sur Loue","gps":"","images":["../image/image_25/25_Rennes_sur_Loue_1.jpg","../image/image_25/25_Rennes_sur_Loue_2.jpg","../image/image_25/25_Rennes_sur_Loue_3.jpg"]},"Consult_chateau_formulaire35b9-2":{"id":"Consult_chateau_formulaire35b9-2","dept":"25","canton":"Marchaux","commune":"Rigney","nom":"Roche_Rigney","type":"Château","periode":"XII","histoire":"ROCHE  à Rigney, le premier donjon est construit au XIIe siècle par le baron Othon de la Roche, 1er duc du duché d'Athènes de 1205 à  1225  qu'il conquit durant la quatrième croisade, la famille de la Roche fut propriétaire de Rigney du XIe au XIVe siècle. En 1392, le moulin est mentionné, il a  été modernisé dans le dernier quart du XIXe siècle. Au XVIe siècle, la famille de Plaine reconstruit le logis. Après la Révolution, le domaine fut acheté par le comte de Scey qui y établit une sucrerie en 1811 et une fromagerie en 1847. En 1854, M. Faucompré acquit le domaine  et le transforma en exploitation moderne  et fonda en 1869 une ferme école qui dura jusqu'au début du XXe siècle.  En 1986, Jean de la Rochefoucauld  achète la bâtisse à labandon et la fait entièrement restaurer pour accueillir des expositions artistiques temporaires.","architecture":"Le château de la Roche est construit sur lemplacement dun site gallo-romain, campé sur une falaise qui domine la vallée de lOgnon est formé de bâtiments certains maintenant disparus, entourant trois cours. Le logis au plafonds à la française et cheminées à hotte comporte une chapelle.\r\nLe premier donjon est construit au XIIe siècle.  Le château est un ensemble concerté de bâtiments formant trois cours.  A l'intérieur du logis, sont conservés la chapelle, des plafonds à la française  et plusieurs cheminées. De l'aile Est subsistent le soubassement voûté et la tour du pigeonnier. Du moulin subsistent le barrage, le canal, le bâtiment  du moulin proprement dit avec son matériel.","habitants":"Baron Othon de la Roche\r\n        \"","divers":"Château de la Roche-Rigney","gps":"","images":["../image/image_25/25_Roche_Rigney_1.jpg","../image/image_25/25_Roche_Rigney_2.jpg","../image/image_25/25_Roche_Rigney_3.jpg","../image/image_25/25_Roche_Rigney_4.jpg","../image/image_25/25_Roche_Rigney_5.jpg","../image/image_25/25_Roche_Rigney_6.jpg"]},"Consult_chateau_formulairec04e":{"id":"Consult_chateau_formulairec04e","dept":"25","canton":"Quingey","commune":"Arc-et-Senans","nom":"Roche_sur_Loue_Arc","type":"Château","periode":"XVIII","histoire":"ROCHE, Au Moyen-Âge, les cités d' Arc-en-Valloye, Arc en Val de Loue et Sonans, aujourd'hui Arc-et-Senans appartiennent aux Seigneur de Salins, vassaux du comté de Bourgogne et protégées par deux maisons-fortes: Roche-sur-Loue à l'est et château-Rouillaud, incendié en 1638.\r\nEn 1080, la seigneurie et la forteresse d'origine de Roche-sur-Loue appartiennent à la comtesse Étiennette de Bourgogne épouse du comte Guillaume Ier de Bourgogne et mère du pape Calixte II.\r\nLe château verrouille un nud de communication sur la « route du sel du Jura » et un gué sur la Loue. Il est constitué d'une grande tour fortifiée, située à l'emplacement de l'actuelle grille d'entrée.                          Il a appartenu aux familles de Roche et de Darbonnay par alliance dans les années 1400. Après 1615, le domaine appartient à la famille de Brun qui obtient en 1694 d'être élevé en Marquisat. En 1756 le marquis de Grammont héritier des précédents, fait entièrement reconstruire l'élégant château entre deux tours carrées, avec toit à limpériale sur la forteresse d'origine.\r\nLa saline royale d'Arc-et-Senans voisine est édifiée à Arc-et-Senans en 1775. Comme il n'y a pas de sel dans le sous-sol de cette bourgade, c'est l'immense ressource en bois de chauffage de la forêt de Chaux qui détermine le choix de ce lieu, d'où le premier quintal de sel est produit en 1779. En 1864, Amédée Caron transforme une nouvelle fois le château et implante une activité industrielle dans le domaine.\r\nDepuis 2009, c'est une demeure de style est devenue chambres d'hôtes.","architecture":"A Roche, on y trouve aussi deux châteaux, le château de Roche-sur-Loue et celui d'Arc. Le château de Roche est le plus important. À l'origine il s'agit d'un château fort verrouillant un nud de communication et un gué sur la Loue, reconstruit  en 1756, le château issu de ces travaux que l'on peut voir aujourd'hui, le corps du bâtiment est flanqué de deux tours carrées au toit à l'impérial. En 1864, Amédée Caron le transforme une nouvelle fois et implante une activité industrielle dans le domaine. Il possède un jardin et trois terrasses descendant au bord de la Loue..Le corps de logis à deux  étages dont un étage sous combles est flanqué de deux pavillons et couvert d'une toiture à galbe impérial en ardoise.","habitants":"Marquis de Grammont \r\n        \"","divers":"Château de Roche-sur-Loue à Arc et Senans","gps":"","images":["../image/image_25/25_Roche_sur_Loue_Arc_1.jpg","../image/image_25/25_Roche_sur_Loue_Arc_2.jpg","../image/image_25/25_Roche_sur_Loue_Arc_3.jpg"]},"Consult_chateau_formulaire690e":{"id":"Consult_chateau_formulaire690e","dept":"25","canton":"Hérimoncourt","commune":"Seloncourt","nom":"Roches_Seloncourt","type":"Château","periode":"XVIII","histoire":"ROCHES-Seloncourt est situé à la limite de Seloncourt, en bordure de la route de Bondeval, ce manoir  fut édifié à la fin du XIXe siècle par Philippe Bovet, fils dAlfred Bovet et de Berthe Peugeot et neveu dArmand  Peugeot. Ensuite il devint la résidence de Jean Pierre Peugeot, avant dhéberger le centre de formation du club de Sochaux, cest une des résidences patronales les plus prestigieuses du pays, le premier architecte fut un certain  Charles Mewes de renommée internationale  grâce à la réalisation de grands hôtels comme le Ritz à Paris.\r\nLe château des Roches constitue une réalisation insolite qui na pas son pareil dans le pays de Montbéliard. \r\nLe château du Rocher à Valentigney à quelques kilomètres.","architecture":"Le château Jean-Pierre Peugeot ou château du Bannot, qui fut la demeure du fondateur du football  club Sochaux-Montbéliard (FCSM) en 1928. Il héberge depuis le 8 juin 2000, le centre de formation aux métiers du football Roland Peugeot.                       \r\nLe château Victor Boname est la demeure, à la fin du XIXe siècle, du créateur d'une entreprise d'horlogerie qui installe son atelier à proximité, au lieu-dit la Maltière. Il est la copie des nombreuses demeures bourgeoises édifiées par les familles d'industriels.","habitants":"Jean Pierre Peugeot\r\n        \"","divers":"Château de Pierre Peugeot à Seloncourt,  De la Roches et hôtel de ville","gps":"","images":["../image/image_25/25_Roches_Seloncourt_1.jpg","../image/image_25/25_Roches_Seloncourt_2.jpg","../image/image_25/25_Roches_Seloncourt_3.jpg"]},"Consult_chateau_formulaire3790-2":{"id":"Consult_chateau_formulaire3790-2","dept":"25","canton":"Boussières","commune":"Roset_Fluans","nom":"Roset_Fluans","type":"Château","periode":"XVII","histoire":"ROSET-FLUANS, Le château est cité dès le début du XIIe siècle. Pris par les troupes de Mahaut d'Artois en 1305, le castel médiéval est déclaré au XVIe siècle «désert par fortune de feu et de guerre. Jacques-Antoine de Belot d'Ollans s'en rend acquéreur en 1681 et sa famille reconstruit le château sous sa forme actuelle au début du XVIIe siècle. Le moulin, établi en 1584 sur l'île de la Froidière et propriété du prince d'Orange, fut détruit et reconstruit en 1672. Il cesse son activité vers 1950. En 1800, la famille Renouard de Bussières, qui possède un château à Arc-et-Senans achète celui de Roset pour sy installer  que monsieur le baron de Bussières a échangé contre lancienne école de garçons et le terrain lentourant. En 1907, le domaine passe par alliance dans la famille Bonfils de Dumast. Le caveau, aux armes des Bussières, se situe dans le cimetière entourant léglise et se trouvait autrefois dans lenceinte du parc du château.","architecture":"Roset-Fluans;  ce château possède un corps de logis central rectangulaire à deux niveaux, toits en croupes flanqué de quatres tours carrées en angles de trois niveaux, dépendance en prolongement sur la droite assez conséquente avec bâtiment à deux niveaux.","habitants":"Jacques-Antoine de Belot d'Ollans\r\n        \"","divers":"Château de Roset-Fluans","gps":"","images":["../image/image_25/25_Roset_Fluans_1.jpg","../image/image_25/25_Roset_Fluans_2.jpg","../image/image_25/25_Roset_Fluans_3.jpg","../image/image_25/25_Roset_Fluans_4.jpg"]},"Consult_chateau_formulairea9fd":{"id":"Consult_chateau_formulairea9fd","dept":"25","canton":"Rougemont","commune":"Rougemont","nom":"Rougemont","type":"Vestiges","periode":"XII","histoire":"ROUGEMONT;  Fin du XIIe siècle,  construction par le comte Frédéric II de Ferrette du château fort situé sur un éperon 736 mètres d'altitude dominant le village. Au  milieu du XIIIe siècle, fortification du village de Rougemont et construction du château-bas. Bien que situé en Allemagne, Jean de Ferrette est vassal d'Othon, comte de Bourgogne.  en 1295 Jean de Ferrette fait don à son oncle Thiébaud de Ferrette de  son châtel haut de Rougemont, en 1347  Albert II de Habsbourg, archiduc d'Autriche, hérite de Rougemont et du comté de Ferrette à la mort de son épouse Jeanne de Ferrette.   La seigneurerie de Rougemont restera autrichienne jusqu'à la fin de la guerre de trente ans, en 1648. Fin du XIVe siècle,  siège et incendie du château-haut par une bande de mercenaires conduite par Arnaud de Cervole dit l' Archiprêtre ou par Enguerrand de Coucy.  En 1696  le fief de Rougemont revient au marquis d'Huxelles.                                                                      Dans la commune le château de Vorget EHPAD public.","architecture":"L'histoire de Rougemont est marquée par la construction d'un château . Par la suite, une citadelle est dressée sur la colline au XVIe siècle. Elle avait un donjon central, et quatre tours d'angle carrées, et était entourée d'un fossé. Le château fut démoli, car inhabité et non entretenu, il ne reste que des ruines avec bases de tours.                                                                                       Vorget Son bâtiment comprend deux parties, l'une ancienne, l'autre plus récente. corps de logis rectangulaire à deux niveaux et attiques,  pavillon d'entrée légèrement saillant avec fronton également deux pavillons saillants sur les côtés de la façade, dépendances entourant un parc.","habitants":"Albert II de Habsbourg\r\n        \"","divers":"Vestiges de Rougemont et Château de Vorget","gps":"","images":["../image/image_25/25_Rougemont_1.jpg","../image/image_25/25_Rougemont_2.jpg","../image/image_25/25_Rougemont_3.jpg","../image/image_25/25_Rougemont_4.jpg"]},"Consult_chateau_formulaire633e":{"id":"Consult_chateau_formulaire633e","dept":"25","canton":"Roulans","commune":"Roulans","nom":"Roulans","type":"Maison forte","periode":"XII","histoire":"ROULANS, à l'origine Rollens, fut au XIIe siècle la possession des seigneurs de La Roche. Sibille, dame de Roulans, elle épousait Ponce Ier, sire de La Roche. Elle eut Ponce, Othon et Hugues Othon Ier de La Roche, second fils, il relevait le nom de sa mère. Il épousait Simone de qui il eut : Guy, Guillaume, il fondait la branche d'Aigremont, il aura Hugues, Jean, Luquette, elle épousait Otton de Vaitte chevalier, Isabelle et Sibille. Jean, Elisabeth. Guy de Roulans, son fils.  Pierre de Roulans, fils de  ce dernier  , chevalier. Il eu Pierre, Guy, Isabelle, dame de la Barre.              Jean de Vienne, l'amiral de France durant la guerre de cent ans, fut seigneur de Roulans et épousera Jeanne de Neuchatel. Jeanne de Vienne leur fille unique épousera Jean de Ray de la famille de la Roche, descendant des anciens seigneurs de Roulans. Ainsi Roulans entrera dans la maison des seigneurs de Ray.","architecture":"Château de Roulans, dont les ruines médiévales, le jardin paysager, les terrasses sud, le sous-sol et les vestiges archéologiques qu'il renferme font l'objet d'une inscription au titre des monuments historiques depuis le 28 décembre 1995.  Site auquel s'attache le nom de l'amiral Jean de Vienne qui passa sa jeunesse et séjourna à Roulans.\r\nChâteau attesté au XIIe siècle. C'est un site d'éperon barré dominant la plaine. Presque totalement démoli   pendant la Révolution, le château de Roulans fut  restauré dans un esprit médiéval. Aménagement d'un jardin à la fin du XIXe siècle et découverte de carreaux décorés du XIVe siècle.  \r\nEléments protégés MH : Château, y compris les ruines médiévales, le jardin paysager, les terrasses sud, le  sous-sol et les vestiges archéologiques qu'il renferme.","habitants":"Jean de Vienne\r\n        \"","divers":"Maison forte de Roulans sur plateforme du château féodal","gps":"","images":["../image/image_25/25_Roulans_1.jpg","../image/image_25/25_Roulans_2.jpg","../image/image_25/25_Roulans_3.jpg"]},"Consult_chateau_formulairefaaf":{"id":"Consult_chateau_formulairefaaf","dept":"25","canton":"Audeux","commune":"Ruffey-le-Château","nom":"Ruffey_le_Chateau","type":"Forteresse","periode":"XV","histoire":"RUFFEY, au  Moyen-Age, de nombreux  seigneurs se sont succédés à la seigneurie de Ruffey sur l'Ognon. En 1490, Marie de Rougemont vendit  la Seigneurie de Ruffey à Gauthière d'Azuel et  son mari l'écuyer   Pierre Duvergier. Les derniers seigneurs qui habitaient le château étaient les Princes de Montbarrey, comtes de St-Maurice, seigneurs de Ruffey. Ces derniers seigneurs avaient quitté la commune pour Paris quelque temps avant la Révolution. Ils payaient tribut au Prieuré de Bellefontaine près d'Emagny. La Révolution de 1789 les en a dépossédés. Le Château, dabord loué par fractions fut, une première fois, mis en vente par le receveur des domaines de Recologne, un nommé Pinard, en 1792 , il na pas trouvé damateurs, il fut remis en vente lannée suivante, par fraction, et fut acheté : laile gauche pour la famille Baudoin et lautre portion pour les familles Contet et Baverey. Les armoiries des princes qui ornaient le fronton du château ont été enlevées au ciseau le 25 Germinal, an II de la République, par un entrepreneur de Marnay  Louis Gérard.","architecture":"Ruffey a subi de nombreuses transformations  tout au long de   dures périodes, le château-fort qui était relié par un souterrain au château de Marnay ; un autre souterrain aboutissait dans les bois. Il était défendu par trois rangées de glacis, les seigneurs avaient fait creuser le ruisseau à main dhomme, depuis les petites prés jusquà son embouchure, ils le firent passer sous les murs du château pour en faciliter la défense.  Aujourd'hui, surplombant l'Ognon, il conserve une tour tronquée et une échauguette. Le château était alimenté en eau par un puits qui se trouvait au milieu de la cour et qui avait 27 mètres de profondeur.  Ruffey disposait d'un grand parc qui s'étendait jusqu'au bois du Communaulot.","habitants":"seigneurie de Ruffey\r\n        \"","divers":"Chateau de Ruffey","gps":"","images":["../image/image_25/25_Ruffey_le_Chateau_1.jpg","../image/image_25/25_Ruffey_le_Chateau_2.jpg","../image/image_25/25_Ruffey_le_Chateau_3.jpg"]},"Consult_chateau_formulairee548":{"id":"Consult_chateau_formulairee548","dept":"25","canton":"Audeux","commune":"Sauvagney","nom":"Sauvagney","type":"Château","periode":"XVI","histoire":"SAUVAGNEY, mais cest dans la seconde moitié du XIIIe siècle que la localité entre dans lhistoire avec les comtes de Bourgogne et la famille Chalon-Arlay.  Au XVIe siècle, Sauvagney relève de la seigneurie de Chatillon-le-Duc ; au XVIIe siècle apparaissent les familles Maréchal, Bullet, Chevanney, Marquis, Alviset et Bereur. En 1710, noble Pierre Maréchal achète la seigneurie. A la Révolution, cest la famille Euvrard qui fait parler delle au sujet des prêtres réfractaires.\r\nLa maison commune-école en travaux en 1820, est reconstruite sur les plans de larchitecte Vieille de 1824, mais cest larchitecte Martin qui dirigera les travaux de 1853 à 1856.","architecture":"Sauvagney; manoir de forme rectangulaire à deux niveaux toit en croupe  flanqué de tours carrées en angles. Sur la limite du département le château  de Chaucenne maison forte de style gentilhommière.","habitants":"Famille Maréchal\r\n        \"","divers":"Château de sauvagney et de Chaucenne","gps":"","images":["../image/image_25/25_Sauvagney_1.jpg","../image/image_25/25_Sauvagney_2.jpg","../image/image_25/25_Sauvagney_3.jpg","../image/image_25/25_Sauvagney_4.jpg","../image/image_25/25_Sauvagney_5.jpg","../image/image_25/25_Sauvagney_6.jpg"]},"Consult_chateau_formulairef0d4":{"id":"Consult_chateau_formulairef0d4","dept":"25","canton":"Ornans","commune":"Chassagne-St-Denis","nom":"Scey_St_Denis","type":"Vestiges","periode":"XI","histoire":"SCEY-St-Denis, cité au Xe siècle en 1083, lorsque Guy prince  de Scey, le château passe aux  mains en 1241 aux comtes de Palatins de Bourgogne et en 1359 le revende a Thibaud de Scey. Par le jeu des descendances, la famille de Vienne en deviennent propriétaire, Philippe de Vienne affronte sous ses murs l'armée de Louis XI menée par Charles d'Amboise, en 1479 et en 1494 l'empereur Maximilien autorise la fortification, en 1550 c'est  Nicolas Perrenot de Granvelle garde des sceaux et conseillé de Charles Quint qui en fait l'acquisition de la demeure presque  ruinée.  il sera restauré par ses fils Thomas et Antoine dans les années  1565 et  1576. leurs descendants, les Oiselay-Cantecroix le cède en 1637 au comte de la Baume Saint-Amour.  Définitivement  ruiné par la seconde conquête française en 1674 et reviendra à la famille de Scey en 1678 qui le possède toujours.","architecture":"Après une première occupation humaine dans la seconde moitié du Xe siècle au lieu-dit de Saint-Denis, éperon dominant la rive gauche de la Loue et le village de Scey en Varais, un premier château est mentionné en 1083 . Une première tour,  dont les vestiges dominent encore le site,. La seconde,  dite de Montsoufflot,  à l'extrémité de l'éperon.  Les tours et le bourg sont dévastés par les troupes de Louis XI en 1480, fait reconstruire le
