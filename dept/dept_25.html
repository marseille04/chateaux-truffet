Ie siècle la fille de Richard d'Abbans vend à Jean de Chalon-Arlay le château qu'on appelle\"Devant\" puisqu'il y a un château à l'arrière, dit de Arrière, appartenant à Guillaume d'Abbans frère de Richard, son fils Amiet mort en 1314 le château arrière passe par alliance de Guillemette d'Abbans avec Humbert de Joux, la forteresse échoit par partage à Jacques de Joux  partisan de la maison d'Autriche, une partie de son château est incendié,   château  reconstruit est rassemblé avec la partie avant font un seul ensemble qui passera par alliance de la fille de Jacques de Joux  à Jacques de  Jouffroy seigneur de Marchaux, restera dans cette famille jusqu'à la fin du XXe siècle, Jacques Jouffroy d'Abbans épouse en seconde noce Béatrice de Merceret, il fit transformer la seigneurie en marquisat en 1709 et racheta en 1718  les ruines du château arrière  au prince de Grand de Mérode, vestiges d'une tour perchée au sommet. Son fils  Claude-Jean-Eugène père du célèbre inventeur  du pyroscaphe et  construisit le premier bateau à vapeur en 1776 , et le neveu de ce dernier Astolphe et son fils sont les restaurateurs du château et sera vendu  en 1927 à la mort de Robert dernier des Jouffroy d'Abbans par sa fille à madame de Broë, appartient aujourd'hui à sa descendance.","architecture":"Abbans-Dessus.   à l'origine une maison forte sur un éperon rocheux dominant la Loue, deux entités au XIe siècle  château \"Avant\" de forme linéaire et château \"Arrière\" en forme de V,  la construction du donjon et  grosse tour carrée avec fossé et pont-levis   accolée de la tour perchée du XIIIe siècle, fin XVe siècle. Les  deux forteresses sont  adossées et seront ensuite unifiés à un propriétaire qui effectuera  avec sa descendance des remaniements.  Les deux anciens châteaux datent du XIIIe siècle,  de ce château ils restent  quelques  éléments du XVIIe siècle, aménagés au XVIIIe siècle, dans le nouveau château  une aile nouvelle construite  au XVIIIe siècle qui servit d'atelier pour construire le pyroscaphe ou un bateau y fut installé, aujourd'hui","habitants":"Famille Guillaume D'Abbans \r\n        \"","divers":"Château ancien \"arrière\"et nouveau \"Avant\"","gps":"","images":["../image/image_25/25_Abbans_Dessus_1.jpg","../image/image_25/25_Abbans_Dessus_2.jpg","../image/image_25/25_Abbans_Dessus_3.jpg","../image/image_25/25_Abbans_Dessus_4.jpg","../image/image_25/25_Abbans_Dessus_5.jpg","../image/image_25/25_Abbans_Dessus_6.jpg","../image/image_25/25_Abbans_Dessus_7.jpg"]},"Consult_chateau_formulairec9c0":{"id":"Consult_chateau_formulairec9c0","dept":"25","canton":"Amancey","commune":"Amondans","nom":"Amondans_Amancey","type":"Château","periode":"XVI","histoire":"AMONDANS;  a été construit au XVIe siècle et XVIIe siècle par la famille de Montrichard puis fut, la propriété de Jean Claude du Ban de Cressia (1775-1849), et à sa fille Charlotte (1807-1873), religieuse du Sacré Cur à Besançon. Cette dernière en fit donation à Antoinette Vernier de Byans (1812-1877), femme d'un inspecteur des Postes : Justin Thévenin (1807-1871). Le fils unique de Mme Thévenin, le commandant Henri Thévenin, le possède jusqu'à la fin de la première guerre mondiale. Les deux filles du militaire se partagèrent alors le château, la première était l'épouse de Louis Pommery. Ce n'est qu'au début des années 1960 que les établissements Peugeot achetèrent la magnifique bâtisse pour en faire une colonie de vacances. Plus tardivement, un couple de restaurateur Pascale et Frédéric Médigue en firent un haut lieu international de la gastronomie française, une école de cuisine, organisation de repas pour l'ONU, puis obtinrent une étoile au guide Michelin. Depuis peu, le château transformé en hôtel restaurant  reprend vie en devenant un lieu d'événements.\r\nAMANCEY; château de Fertans( voir article).","architecture":"L'ancien château d'Amondans a été construit au XVIe siècle et XVIIe siècle par la famille de Montrichard. Il a subi de nombreuses transformations mais conserve quelques éléments de son ancienne architecture, dont une tourelle d'angle.  La tourelle de l'ancien château datant du XVIe siècle, se situe rue de l'Église. L'ancienne ferme construite à la fin du XVIIIe siècle ou au XIXe siècle.                                   A quelques kilomètres à l'ouest vestiges à Refranche  manoir.","habitants":"Jean Claude du Ban de Cressia\r\n        \"","divers":"Château d'Amondans et le manoir de Refranche avant et après","gps":"","images":["../image/image_25/25_Amondans_Amancey_1.jpg","../image/image_25/25_Amondans_Amancey_2.jpg","../image/image_25/25_Amondans_Amancey_3.jpg","../image/image_25/25_Amondans_Amancey_4.jpg","../image/image_25/25_Amondans_Amancey_5.jpg","../image/image_25/25_Amondans_Amancey_6.jpg","../image/image_25/25_Amondans_Amancey_7.jpg","../image/image_25/25_Amondans_Amancey_8.jpg"]},"Consult_chateau_formulaire93dc":{"id":"Consult_chateau_formulaire93dc","dept":"25","canton":"Quingey","commune":"Arc-et-Senans","nom":"Arc_Senans","type":"Pavillon","periode":"XVIII","histoire":"ARC-et-SENANS: saline royale conçue au XVIIIe siècle de 1776 à 1779 par l'architecte Claude-Nicolas Ledoux appelé \"cité idéal de Chaux\" commissaire  du roi aux Salines de Lorraine et de Franche-Comté que revint la commande de la Saline, ordonner autour d'un pavillon du directeur.  Les salines ne furent jamais rentables, elles fermeront leurs portes en 1895 incendié en partie en 1918,  le département du Doubs l'acquit en 1926 pour le restaurer par l'institut Claude-Nicolas Ledoux.                                                \r\n Le château d'Arc est plus récent. Il a été construit par M. Chaudois en 1751. Le bâtiment est entouré d'un grand parc de trois hectares protégé par un mur d'enceinte. Il est classé monument historique depuis 1984. Il existait à Arc un troisième château fort, le Châtel-Rouillaud, mais il a brûlé en 1638. Aujourd'hui, il n'en subsiste que la motte sur laquelle il était bâti. Le château  de Liesle a quelques kilomètres au nord -Est et de la Roche-sur- Loue (voir article).","architecture":"Saline royale conçue au XVIIIe siècle pour une population de 5000 habitants autour d'un noyau industriel;  construit de plan circulaire mais seul la moitié a été bâti, le pavillon du directeur précédé d'un portique son fronton triangulaire est supporté par six colonnes doriques à bossages alternant tambours cubiques et cylindriques, de part et d'autre du pavillons,  quatre bâtiments isolés scandent le demi-cercle de la cour à intervalles réguliers identiques , ils se composent d'un pavillon carré formant avant corps et de deux ailes concaves. La cour est limité par le diamètre  du demi-cercle les extrémités sont marquées par deux pavillons de plan carré.  Aujourd'hui musée du sel ainsi que centre international de réflexion sur le futur.","habitants":"Monsieur Claude-Nicolas Ledoux\r\n        \"","divers":"Le c hâteau central et les pavillons tout en demi-cercle et château d'Arc et de Liesle.","gps":"","images":["../image/image_25/25_Arc_Senans_1.jpg","../image/image_25/25_Arc_Senans_2.jpg","../image/image_25/25_Arc_Senans_3.jpg","../image/image_25/25_Arc_Senans_4.jpg","../image/image_25/25_Arc_Senans_5.jpg","../image/image_25/25_Arc_Senans_6.jpg","../image/image_25/25_Arc_Senans_7.jpg","../image/image_25/25_Arc_Senans_8.jpg"]},"Consult_chateau_formulaire8d6d":{"id":"Consult_chateau_formulaire8d6d","dept":"25","canton":"Montbenoit","commune":"Arc-sous-Cicon","nom":"Arc_sous_Cicon","type":"Château","periode":"XVII","histoire":"ARC sous CICON, Ancienne demeure de la seconde moitié du XVIIe siècle, il a appartenu à la famille des Doroz. Etait la propriété de la famille Ravier , Augustin né le 29 mars 1744 à Arc-sous-Cicon, mort en 1811, greffier de justice, il joue un rôle important sous la Révolution. Président du directoire du Doubs, il est juge de paix du canton, puis inspecteur général des forêts jusquà sa mort. Jean-Baptiste-Ambroise, fils du précédent, né le 5 mai 1765, fait les campagnes dItalie et dÉgypte et participe au jugement du duc dEnghien. Général de brigade, baron dempire, commandeur de la légion dhonneur, il meurt en 1828 à Besançon, et passa aux frères Vuillemin: Émile, né à Arc en 1822, ingénieur et administrateur des mines dAniche, président du comité des houillères du Nord, membre de plusieurs sociétés, auteur de multiples publications, comme une étude du bassin houiller du Nord et du Pas de Calais en trois volumes. Louis, né à Arc en 1814, décédé en 1883, élève de lécole centrale des arts et manufactures, ingénieur entré au service des chemins de fer de lEst, président du comité de la société des ingénieurs civils en 1870.","architecture":"C'est l'un des deux châteaux représentés sur les armoiries de la commune, le second étant celui de Cicon, détruit au XVe siècle. Château du XVIIe siècle corps der logis rectangulaire à trois niveaux et attiques avec fronton.","habitants":"Famille Ravier\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château Arc-sous-Cicon et Hôtel de ville","gps":"","images":["../image/image_25/25_Arc_sous_Cicon_1.jpg","../image/image_25/25_Arc_sous_Cicon_2.jpg"]},"Consult_chateau_formulaire67a1":{"id":"Consult_chateau_formulaire67a1","dept":"25","canton":"Montbenoit","commune":"Aubonne","nom":"Aubonne","type":"Manoir","periode":"XVIII","histoire":"AUBONNE, c'est la source d'Albon qui a donné son nom à ce village qui fut une seigneurie au XVIIe siècle. Elle a été occupée très tôt dans l'histoire comme en témoigne le cimetière préhistorique que l'on peut voir au lieu-dit \"sur le Bey\".  D'une simple tour, il fut citadelle puis château fort, au gré des transactions et fur à mesure que se développait la puissance de ses propriétaires : les seigneurs d'Aubonne, la maison de Savoie, les seigneurs de Grandson et le comte de Gruyère.   Arrivée de Jean-Baptiste Tavernier (1605-1689), diamantaire des rois de France et grand voyageur, puis celle d'Henri, marquis Duquesne (1652-1722), firent évoluer cette demeure. Tous deux protestants, exilés de France, font du château d'Aubonne une confortable et noble demeure.   Devenue propriété de la commune d'Aubonne en 1835                                                                             MARGUIER d'AUBONNE; château du XVIIIe siècle. Marguier dAubonne, commissaire à la cour aux comptes de Pontarlier, achète le titre de comte en 1705. La famille Marguier qui arrive au village vers 1760. Sous la Révolution, Antoine Marguier doit défendre le château,  pillé à plusieurs reprises, il sexile à Constance en 1793. La famille Lombardot,  actuels propriétaires, achète les terres du domaine en 1857 et le château en 1919.  Aujourd'hui, aménagé en chambres d'hôtes.","architecture":"Château de Marguier d'Aubonne, du XVIIIe siècle, en pierre de taille, construit vers 1760, facile à défendre de tous les côtés furent installés tout au long des siècles, d'abord un châtelard en bois avec des fossés, un château roman inconfortable dont il reste la base du donjon carré, des bâtiments de plus en plus considérables . Vint ensuite la fameuse tour ronde, souvenir des voyages en Orient de Tavernier et enfin une cour intérieure bordée d'arcades, créée par Duquesne, le fils de l'amiral. C'est aujourd'hui un magnifique ensemble qui domine à l'est le profond ravin de l'Aubonne. On pénètre au château par une barbacane qui a perdu sa porte de bois, la porte franchie, on parvient à la cour extérieure du château par une rampe en demi-cercle et l'on se trouve devant la longue façade nord du château terminée, à l'ouest, par la tour ronde de Tavernier. La tour gigantesque chandelle coiffée de son éteignoir, la tour se dresse, toute blanche sur l'écran sombre du Jura, au-dessus de la ville d'Aubonne.                                                 Dans la commune le Chateau Thevelin et de Marguier.","habitants":"Marguier dAubonne\r\n        \"","divers":"Tour ronde de Tavernier , château d'Aubonne, de Thevelin et de Marguier","gps":"","images":["../image/image_25/25_Aubonne_1.jpg","../image/image_25/25_Aubonne_2.jpg","../image/image_25/25_Aubonne_3.jpg","../image/image_25/25_Aubonne_4.jpg","../image/image_25/25_Aubonne_5.jpg","../image/image_25/25_Aubonne_6.jpg","../image/image_25/25_Aubonne_7.jpg","../image/image_25/25_Aubonne_8.jpg"]},"Consult_chateau_formulairebe55":{"id":"Consult_chateau_formulairebe55","dept":"25","canton":"Audincourt","commune":"Audincourt","nom":"Audincourt","type":"Manoir","periode":"XVIII","histoire":"AUDINCOURT,  PEUGEOT; A la fin du XIXe siècle, la famille Peugeot sinstalle à Audincourt et développe son entreprise. Acquis par la municipalité, le château accueille aujourdhui le service culturel de la ville ainsi que le centre déveil aux arts plastiques et à la BD.                                                                       \r\nTHEVENOT cette belle demeure a toutes les caractéristiques de larchitecture du XVIIIe siècle à Montbéliard  \r\nLe château Thévenot est l'une des belles demeures à avoir survécu à la Révolution.","architecture":"Château Peugeot, On peut donc  considérer que ce château a été construit au début du XXe siècle. Une architecture très soignée, il se compose dun corps central entouré de pavillons  dangles en ressauts, terrasse, une marquise ouvre la façade  sur le Doubs. Les fenêtres du 1er étage sont ornées dun linteau finement sculpté de médaillons, de guirlandes et de coquilles. Un toit dardoise donne à lensemble laspect des belles villas balnéaires dune architecture très soignée.                                                          Le château Thévenot. Il abrite aujourd'hui une bibliothèque, construit au XVIIIe siècle, ce petit château de Montbeliard se compose de quatre niveaux, accessible par un majestueux escalier en pierres, un escalier de service, et un escalier de secours extérieur, située en bordure du Doubs, la demeure est mise en valeur par le parc et admirée pour ses proportions et son imposante toiture à quatre pans.","habitants":"Famille Peugeot\r\n        \"","divers":"Château Peugeot et de Thévenot à Audincourt et à Montbelliard","gps":"","images":["../image/image_25/25_Audincourt_1.jpg","../image/image_25/25_Audincourt_2.jpg","../image/image_25/25_Audincourt_3.jpg","../image/image_25/25_Audincourt_4.jpg","../image/image_25/25_Audincourt_5.jpg","../image/image_25/25_Audincourt_6.jpg"]},"Consult_chateau_formulaired2cb":{"id":"Consult_chateau_formulaired2cb","dept":"25","canton":"Audeux","commune":"Auxon-Dessous","nom":"Auxon","type":"Château","periode":"XVI","histoire":"AUXON-Dessous, bâti au XVIe siècle pour la partie la plus ancienne. Claude-Antoine Buson en fait lacquisition en 1608,  à Louis de Scey seigneur de Chevroz, son fils, héritier, Simon Buson, le reconstruit en 1634. Suite à un incendie qui le  ravage vers 1700, c'est Françoise-Thérèse Buson, épouse dArvisenet qui de nouveau le relève. A la Révolution, vendu comme biens nationaux à M. Bourgon, sa fille Henriette dAugicourt  le lègue en 1892 à la famille Truchis de Varennes qui en fait don à larchevêché et il deviendra, pour ses prêtres âgés, une maison de retraite.\r\nDans la commune le château de la Dame Blanche transformé en hôtel restaurant par la famille Haeberlin., cette maison du XVIe siècle, avec poutres apparentes.","architecture":"Le château  d'Auxon construit entre l'église et le ruisseau est aujourdhui la propriété du département. Construit au XVIe siècle pour la partie la plus ancienne.                                                              Le château de la Dame Blanche,  corps de logis rectangulaire à deux niveaux et attiques toitures à la Mansart, pavillon d'entrée légèrement saillant.","habitants":"Claude-Antoine Buson\r\n        \"","divers":"Château d'Auxon et de la Dame Blanche","gps":"","images":["../image/image_25/25_Auxon_1.jpg","../image/image_25/25_Auxon_2.jpg","../image/image_25/25_Auxon_3.jpg","../image/image_25/25_Auxon_4.jpg","../image/image_25/25_Auxon_5.jpg"]},"Consult_chateau_formulaire678d":{"id":"Consult_chateau_formulaire678d","dept":"25","canton":"Quingey","commune":"Bartherans","nom":"Bartherans","type":"Maison forte","periode":"XVII","histoire":"BARTHERANS, cette bâtisse, appelée château, date de 1660. Elle appartenait à la seigneurie des Mouret de Châtillon. A quelques kilomètres,  la maison forte d'Echays  et le château de   Paroy;  Seigneurie appartenant au prince d'Orange au XVIIe siècle. Le château actuel, du XVIIIe siècle, comporte un   corps de logis et des communs de part et d'autre d'une cour. Les communs intègrent un cellier du XVIIe siècle. Certains décors du logis ont été modernisés à la fin du XVIIIe siècle et au début du XIXe par les Bouchet.  A l'intérieur, il présente un escalier en bois développé à rampe en fer forgé, l'étage est distribué par un grand  couloir central. Plusieurs pièces sont  lambrissées de hauteur. Les cheminées du XVIIIe siècle sont en marbre ou   en bois. Une serre est accolée au corps de logis.  De 1901 à 1912, aménagement du parc, clôturé de murs avec deux portails en fer forgé.","architecture":"Bartherans;  du XVIIe siècle et XVIIIe siècle façades et toitures de l'ensemble des bâtiments de communs et dépendances, mur de clôture de la cour, dans le corps de logis : escalier du XVIIIe siècle avec sa rampe en fer forgé, chambre avec alcôve et cheminée donnant du côté nord-est, à l'étage, avec son décor et grande pièce traversante à l'étage,  inscription par arrêté du 17 juin 1992 ; Façades et toitures du corps de logis, puits et pavage de la cour.","habitants":"Mouret de Châtillon\r\n        \"","divers":"Château de Bartherans, la maison forte d'Echay.","gps":"","images":["../image/image_25/25_Bartherans_1.jpg","../image/image_25/25_Bartherans_2.jpg","../image/image_25/25_Bartherans_3.jpg","../image/image_25/25_Bartherans_4.jpg","../image/image_25/25_Bartherans_5.jpg","../image/image_25/25_Bartherans_6.jpg"]},"Consult_chateau_formulairec01d":{"id":"Consult_chateau_formulairec01d","dept":"25","canton":"Baume-les-Dames","commune":"Baume-les-Dames","nom":"Baume_les_Dames","type":"Patrimoine","periode":"XVI-XIX","histoire":"BAUME les Dames, En 1241 le château de Baume-les-Dames était cité dans une charte d'Othon III, comte de Bourgogne et à partir de 1244 Thiébaud de Neuchâtel-Bourgogne était désigné comme homme-lige du duc de Bourgogne pour le château de Baume-les-Dames. c'est en 1763 que la ville devient chef-lieu d'un bailliage, d'une recette ainsi que la résidence de la maréchaussée.  Aussi en 1647, le magistrat de la ville n'hésita pas à reconnaître le droit de gardiennage de l'abbaye au vicomte-mayeur-capitaine c'est-à-dire à lui-même. Le bailliage était délimité au nord par les prévôtés de Montbozon et Montjustin toutes deux dépendantes du bailliage de Vesoul, par la principauté de Montbéliard, au sud par le bailliage d'Ornans, à l'est par la Suisse et à l'ouest par le bailliage de Besançon. Le bailliage de Baume-les-Dames comprenait les terres et la seigneurie d'Héricourt,  la seigneurie de Blamont,   la seigneurie de Clémont  et les terres et la seigneurie du Châtelot .","architecture":"Baume les dames, il reste une tour hexagonal du château  médiéval  à deux niveaux, un autre château en ville du XVIIIe siècle et d'une autre demeure du XVIe siècle avec cour fermée. Quelques anciennes architectures pour le plaisir des amateurs de vieilles pierres, maisons remarquables au centre ville et surtout l'Abbaye et sa place.","habitants":"Thiébaud de Neuchâtel-Bourgogne\r\n        \"","divers":"Divers patrimoine et châteaux dans la ville et les environs","gps":"","images":["../image/image_25/25_Baume_les_Dames_1.jpg","../image/image_25/25_Baume_les_Dames_2.jpg","../image/image_25/25_Baume_les_Dames_3.jpg","../image/image_25/25_Baume_les_Dames_4.jpg","../image/image_25/25_Baume_les_Dames_5.jpg","../image/image_25/25_Baume_les_Dames_6.jpg"]},"Consult_chateau_formulairef390":{"id":"Consult_chateau_formulairef390","dept":"25","canton":"Clerval","commune":"Belvoir","nom":"Belvoir","type":"Forteresse","periode":"XIII","histoire":"BELVOIR, du XIIe et au  XIIIe siècle par  la maison de Belvoir-Vergy, la seigneurie passera dans la maison de Cusance au milieu du XIVe siècle. Fidèles vassaux des ducs de Bourgogne, les Cusance seront sous les armes jusqu'au désastre de Nancy en 1477. En représailles, le château sera incendié par les troupes de Louis XI en 1480. Restauré et modernisé par Thibaut de Cusance en cette fin du XVe siècle, l'aile orientale fera l'objet d'un nouvel aménagement au début du XVIIe siècle par Claude-François de Cusance, colonel d'un régiment, pour y loger sa jeune épouse Ernestine de Withem, marquise de Bergen-op-Zoom. Leur fille sera la célèbre Béatrix de Cusance, considérée comme l'une des plus belle femme de son temps, épouse en première noces du prince de Cantecroix, petit-fils de l'empereur d'Autriche, puis du duc Charles IV de Lorraine et de Bar. Belvoir ne sera plus régulièrement habité par ses propriétaires à partir de la seconde moitié du XVIIe siècle. Passé de la famille de Lorraine à celle de Rohan, la dernière baronne fut Marie-Louise de Rohan-Soubise, Princesse de Marsan, gouvernante des enfants de Louis XVI et de Marie-Antoinette. Transformé en petit séminaire puis en école catholique, abandonné à l'archevêché de Besançon par les héritiers de la famille de Rohan en 1848, le château sera ensuite morcelé et vendu à plusieurs cultivateurs. Racheté en 1955 par le célèbre peintre Pierre Jouffroy.","architecture":"Belvoir, dominant le val de Sancey, édifié  au XIIIe siècle, ce château était protégé par un bourg fortifié dont l'entrée se faisait par un pont-levis jeté sur le second fossé. La porterie actuelle datée de 1620 comporte une porte voiturière et une porte piétonne portant la trace des pont-levis à poutres.\r\nLe corps de logis forme un long rectangle finissant par la nouvelle chapelle  Le second bâtiment implanté à l'ouest de l'éperon rocheux commence par la tour dite de \"Madge-fâ\" (fin du XVe siècle) qui fut d'abord coiffée d'un toit à l'impériale couvert de tavaillons ou tuiles d'épicéa. Un long bâtiment d'un trentaine de mètres sépare cette première tour d'une seconde: le donjon, le bâtiment appelé l'arsenal était un grenier\" destiné à conserver les denrées périssables et les graines (blé, orge, etc) richesse du seigneur. Ruiné, l'étage a été aménagé au XXe siècle avec des matériaux anciens pour former la belle façade sur cour. Le donjon, maintes fois reconstruit au cours des siècles a été couronné d'une superbe charpente. Les deux tours sont couvertes aujourd'hui de tavaillons (toiles).\r\nAprès le terrible incendie qui dévasta l'aile orientale en 1968, 10 années seront nécessaires pour relever ce bâtiment de la ruine.","habitants":"Pierre Jouffroy\r\n        \"","divers":"Château de Belvoir","gps":"","images":["../image/image_25/25_Belvoir_1.jpg","../image/image_25/25_Belvoir_2.jpg","../image/image_25/25_Belvoir_3.jpg","../image/image_25/25_Belvoir_4.jpg","../image/image_25/25_Belvoir_5.jpg","../image/image_25/25_Belvoir_6.jpg"]},"Consult_chateau_formulaire0b22":{"id":"Consult_chateau_formulaire0b22","dept":"25","canton":"Besançon","commune":"Besançon","nom":"Besancon","type":"Patrimoine","periode":"Xe","histoire":"BESANCON, . Les ducs de Bourgogne, devenus maîtres de la Franche-Comté, sont les « protecteurs » de la ville libre impériale que reste toujours Besançon. C'est pour la cité une période de prospérité . À l'époque de la Renaissance, la Franche-Comté appartient de nouveau à l'Empire germanique. L'empereur Charles Quint fortifie considérablement Besançon qui devient un des boucliers de son empire. Un comtois, Nicolas Perrenot de Granvelle, devient chancelier de l'empire en 1519 puis garde des Sceaux en 1532. Toute la région bénéficie des faveurs de Charles Quint et Besançon devient la cinquième ville impériale et s'embellit de monuments, en particulier le palais Granvelle et l'hôtel de ville dont la façade est ornée d'une statue de Charles Quint. En 1631, la ville accueille à deux reprises le duc Gaston d'Orléans, frère du roi et ennemi personnel du cardinal de Richelieu. La guerre de Dix Ans (1635-1644), épisode bourguignon de la guerre de Trente Ans, apporte dans la région les fléaux de la peste, de la famine et de la misère. Besançon, qui a échappé plusieurs fois à un siège, souffre néanmoins des mêmes fléaux que son arrière-pays dévasté, la peste fait son apparition en 1636 tandis qu'une période de famine s'étend de 1638 à 1644.","architecture":"Besançon patrimoine,classée ville d'Art et d'Histoire, la ville de Besançon possède un riche passé historique dont son patrimoine architectural est un témoin fort. Depuis la fondation d'un oppidum gaulois, la cité n'a cessé de se développer et de s'agrandir avant de devenir un centre culturel, militaire et économique de premier ordre. Tantôt germanique tantôt française, la capitale comtoise a gardé de nombreuses traces des différentes périodes de son histoire de l'Antiquité au XIXe siècle, la porte Noire, un arc de triomphe gallo-romain édifié sous Marc Aurèle au IIe siècle dans le quartier Saint-Jean, les vestiges des arènes de Vesontio sont visibles, domus du Palais de Justice, Palais Granvelle, palais Renaissance du XVIe siècle. Hôtel de ville : édifié par l'architecte Richard Maire qui l'acheva en 1573. Hôtel Mareschal : il appartenait à une importante famille bisontine. Hôtel des Bains : créé en 1890. Casino municipal : installé dans un édifice de style belle époque, il a été inauguré en 1882. Le musée des beaux-arts et d'archéologie fut le premier musée créé en France en 1694, Le théatre le  Kursaal de Besançon.","habitants":"Empereur Charles Quint\r\n        \r\n        \"","divers":"Besançon; hôtel des bains, Maréchal, Musée, préfecture, chateau Castan et de Galland, Casino ,Palais de Justice, de Granvelle, théatre et synagogue","gps":"","images":["../image/image_25/25_Besancon_1.jpg","../image/image_25/25_Besancon_2.jpg","../image/image_25/25_Besancon_3.jpg","../image/image_25/25_Besancon_4.jpg","../image/image_25/25_Besancon_5.jpg","../image/image_25/25_Besancon_6.jpg","../image/image_25/25_Besancon_7.jpg"]},"Consult_chateau_formulaire8412":{"id":"Consult_chateau_formulaire8412","dept":"25","canton":"Besançon","commune":"Besançon","nom":"Besancon_Citadelle","type":"Forteresse","periode":"XVII","histoire":"La citadelle de Besançon a été construite par Sébastien Le Prestre de Vauban (1633-1707), ingénieur militaire du roi Louis XIV.  de 1678 à 1771, en 1674, Henri Jules de Bourbon-Condé, duc d'Enghien et fils du Grand-Condé, prend position devant la cité à la tête d'une armée composée de 15 000 à 20 000 hommes. Vauban participe également au siège. Louis XIV décide de faire de Besançon un des maillons essentiels du système de défense de l'Est de la France et confie à Vauban le soin de réaliser les améliorations nécessaires. La citadelle est ainsi entièrement remanié entre 1674 et 1688, les autres fortifications sont édifiées de 1689 à 1695 et de nombreuses casernes sortent de terre à partir de 1680. La construction de la citadelle coûta très cher, à tel point que Louis XIV aurait demandé si ses murailles n'étaient pas en or. Au cours de la Seconde Guerre mondiale, l'armée allemande entre à Besançon le 16 juin 1940 bien que les autorités militaires françaises aient décidé de faire sauter les ponts à l'approche de l'occupant. La ville se retrouve en zone occupée la ligne de démarcation n'est qu'à environ 30 kilomètres à l'ouest et même en zone interdite, ce qui implique qu'elle soit annexée au Reich en cas de victoire de l'Allemagne. La ville subit globalement peu de destructions durant la guerre, si ce n'est le bombardement dans la nuit du 15 au 16 juillet 1943 du quartier de la Viotte par l'aviation anglaise dont un bombardier s'écrase sur la gare.","architecture":"citadelle, enceinte urbaine composée des remparts et bastions, fort Griffon. Les forts présents sur les autres collines ont tous été construits au XIXe siècle. Les seules fortifications pré-Vauban subsistantes sont la porte Rivotte, la porte Taillée, la tour Carrée et la tour de la Pelote. Le Fort Griffon, dont le nom provient de l'architecte italien qui fut chargé de le construire en 1595, Jean Griffoni, fait figure de seconde citadelle. Il fut ensuite complètement remanié par Vauban. Lenceinte urbaine de Vauban comprend l'ensemble des fortifications de la Boucle qui sont reconstruites de 1675 à 1695. Vauban substitue en effet aux défenses médiévales restaurées et complétées par Charles Quint au XVIe siècle une ceinture pourvue de six tours à canon bastionnées qui sont d'aval en amont: la tour Notre-Dame, la tour de Chamars, la tour  des Marais, la tour des Cordeliers (achevée en 1691), la tour  de Bregille et la tour  de Rivotte. Tour Carrée. Elle a été construite en 1526.  fort de Chaudanne construit de 1837 à 1842. fort de Bregille construit de 1820 à 1832.","habitants":"Sébastien Le Prestre de Vauban\r\n        \r\n        \"","divers":"Citadelle est ses portes","gps":"","images":["../image/image_25/25_Besancon_Citadelle_1.jpg","../image/image_25/25_Besancon_Citadelle_2.jpg","../image/image_25/25_Besancon_Citadelle_3.jpg","../image/image_25/25_Besancon_Citadelle_4.jpg","../image/image_25/25_Besancon_Citadelle_5.jpg","../image/image_25/25_Besancon_Citadelle_6.jpg","../image/image_25/25_Besancon_Citadelle_7.jpg","../image/image_25/25_Besancon_Citadelle_8.jpg","../image/image_25/25_Besancon_Citadelle_9.jpg"]},"Consult_chateau_formulairec3e3":{"id":"Consult_chateau_formulairec3e3","dept":"25","canton":"Marchaux","commune":"Bonnay","nom":"Bonnay","type":"Château","periode":"XVIII","histoire":"BONNAY  Au XIVe siècle, Jean de Boult reprend le fief de Philippe Hardy qui passera ensuite à la famille  de Scey-Montbeliard. Puis à la famille Bouchet. Il fut la propriété de la famille de Buyer, de 1794 jusquen 1970.","architecture":"BONNAY, reconstruit au XVIIIe siècle en 1712 sur les ruines d'une ancienne maison forte, édifice rectangulaire flanqué de deux ailes en retour à pans concaves en adoucissement sur la façade principale qui s'élève sur trois étages et comporte 15 pièces. L'enceinte extérieure est flanquée à ses extrémités de quatre tours circulaires coiffées d'un toit conique.  A l'intérieur, décors Louis XVI, série de quatre cheminées Louis XIV. Le jardin à la française est transformé en jardin à l'anglaise en 1827. Le parc compte un cèdre du Liban vieux de plus de trois siècles.  Le mur d'enceinte est entrecoupé de quatre tours circulaires à toit conique.","habitants":"Famille Bouchet\r\n        \"","divers":"Château de Bonnay et de Buthiers","gps":"","images":["../image/image_25/25_Bonnay_1.jpg","../image/image_25/25_Bonnay_2.jpg","../image/image_25/25_Bonnay_3.jpg"]},"Consult_chateau_formulaire4007":{"id":"Consult_chateau_formulaire4007","dept":"25","canton":"Roulans","commune":"Bouclans","nom":"Bouclans","type":"Château","periode":"XVIII","histoire":"BOUCLANS, au XIIIe siècle, Les seigneurs de Montfaucon construisent un château à Bouclans (attesté vers 1280). En 1391, la seigneurie de Bouclans est cédée par Isabelle de Montfaucon à Etienne, comte de  Montbéliard; et sa petite fille Jeanne de Montfaucon épouse Louis de Châlon, prince dOrange et lui apporte  Bouclans. En 1462 Bouclans est rattaché au Comté de Bourgogne. Guillaume de Châlon, seigneur dArguel  vend le bourg de Bouclans et  son château à Jean de Neufchastel en 1476. A la même date, Bouclans fut pillé, brûlé en septembre par les Ferretois et les Suisses. Jean de Lallemand, sire de Crissey, secrétaire de Charles  Quint, racheta la seigneurie en 1522 et restera plus d'un siècle entre les mains de cette famille avant d'être  acquise en 1622 par la famille Mareschal. En novembre 1749 la terre de Bouclans fut érigée en marquisat au  profit  de Joseph Le Bas de Clevans, baron de Pugey, seigneur d'Ambre, de Glamondans et autres lieux,  qui aurait fait construire le grand édifice rectangulaire, partie la plus récente du château.  Au XIXe Siècle le château est propriété de la famille de Pirey.","architecture":"Bouclans  corps de logis rectangulaire à deux niveaux, toits à deux pans accolé sur un côté d'une tour donjon dont subsiste encore les fortifications, une tour ronde et une grosse tour à cinq pans séparées par un petit corps de logis et d'une tourelle à l'opposé.  Après avoir été un restaurant puis une colonie de vacance,","habitants":"Joseph Le Bas de Clevans\r\n        \"","divers":"Château de Bouclans","gps":"","images":["../image/image_25/25_Bouclans_1.jpg","../image/image_25/25_Bouclans_2.jpg","../image/image_25/25_Bouclans_3.jpg"]},"Consult_chateau_formulaire3f6f-2":{"id":"Consult_chateau_formulaire3f6f-2","dept":"25","canton":"Abbenans","commune":"Cubry","nom":"Bournel","type":"Château","periode":"XV-XIX","histoire":"BOURNEL, c'est en 1429, que le domaine de Bournel entra dans la famille, par le mariage de Jean de Moustier avec Mlle Marguerite de Granvillars, la famille s'installa alors dans le château fort, dans le village de Nans, et c'est là qu'est né Philippe-Xavier, premier marquis , colonel du régiment du Grand-Dauphin et  qui épousa en 1732  Mlle Louise de Bournel, dernière descendante de sa famille qui donne son nom à l'actuelle propriété de la famille du Marquis de Moustier (Mouthier-Haute-Pierre) depuis plus de cinq siècles. Louise de Bournel décide la construction dun nouveau château sur Cubry, mais après la réalisation dun ensemble de bâtiments importants, appelé aujourdhui « Vieux Château », le projet du véritable château fut abandonné, l'arrière petit fils de Philippe Xavier, Léonel de Moustier, marquis, diplomate  de haut vol décida, vers 1860, la construction d'un château néo-gothique sur les plans de l'architecte Clément Parent, élève de Viollet le Duc.\r\nLe marquis Pierre-René de Moustier VIe marquis,  termine la décoration intérieure, fait construire la chapelle inspirée de celle du château d'Amboise, dessine les jardins à la française et plante le parc à langlaise, toujours dans la même famille, transformé en hôtel restaurant par Rainier Wals Palin Von Hoom et Golf.                           En 1944 le général de Gaulle  avait fait de Léonel marquis de Moustier son compagnon de la libération qui malheureusement se dernier fut arrêté par la gestapo  en août 1943  et mourut en 1945 au camp de Farge.","architecture":"Bournel;  vieux château  du XVe siècle remanié en style renaissance après un incendie,  quadrilatère imposant deux grands corps de logis à trois niveaux et attiques formant l'équerre flanqué de tours rondes et carrées, vastes dépendances fermant la cour d'honneur.    Vers 1860 la construction du château neuf est entreprit par Léonel de Moustier et  par  l'architecte Clément Parent pour le construire de style moderne néogothique, de forme rectangulaire à deux niveaux et attiques, édifié en pierre blanche, gré rouge au encadrement portes et fenêtres ainsi que la corniche à modillons prolongée de mâchicoulis sur les tours, flanquant chacun des angles. Tourelles demi-hors oeuvre ornent les façades latérales  Le vieux château  transformé et agrandit entre 1890 et 1900  pour lui donner son aspect actuel. Le château néogothique et sa chapelle ont été classés monument historique le 28 août 1989 alors que les communs, les écuries et la ferme ainsi que la tour d'Orival ont été inscrits. Tours et tourelles, échauguettes, corniches à modillons et faux mâchicoulis composent un bâtiment digne de conte de fées.","habitants":"Famille de Jean de Moustier\r\n        \"","divers":"Château de Bournel","gps":"","images":["../image/image_25/25_Bournel_1.jpg","../image/image_25/25_Bournel_2.jpg","../image/image_25/25_Bournel_3.jpg","../image/image_25/25_Bournel_4.jpg","../image/image_25/25_Bournel_5.jpg","../image/image_25/25_Bournel_6.jpg","../image/image_25/25_Bournel_7.jpg","../image/image_25/25_Bournel_8.jpg","../image/image_25/25_Bournel_9.jpg"]},"Consult_chateau_formulaired01b":{"id":"Consult_chateau_formulaired01b","dept":"25","canton":"Quingey","commune":"Chenecey-Buillon","nom":"Charencey","type":"Vestiges","periode":"XI","histoire":"CHARANCEY, château féodal en ruines datant du IXe ou XIe siècle dominant tout le village et la vallée de la Loue. L'histoire du château est mal connue. Au XIIIe siècle, il appartient aux sires de Chenecey aussi connu sous le nom de Chanecey ou Charencey-sur-Loue. Après l'extinction de la famille de Chenecey; il passa à la famille d'Andelot, aux d'Arguel aux de Chay jusqu'en 1526, ensuite il appartient aux Pillot, une famille commerçante de Besançon. Le château fut probablement détruit par Louis XIV en 1678. Les ruines sont inscrites à l'inventaire des Monuments Historiques depuis 1991.\r\nChâteau de Buillon : belle propriété ayant appartenu au peintre James Tissot et à sa famille.","architecture":"Ruines du château, y compris les substructures et les vestiges archéologiques de l'ancien établissement","habitants":"peintre James Tissot\r\n        \"","divers":"Vestiges du château de Charencey et château de Buillon.","gps":"","images":["../image/image_25/25_Charencey_1.jpg","../image/image_25/25_Charencey_2.jpg","../image/image_25/25_Charencey_3.jpg","../image/image_25/25_Charencey_4.jpg","../image/image_25/25_Charencey_5.jpg","../image/image_25/25_Charencey_6.jpg","../image/image_25/25_Charencey_7.jpg","../image/image_25/25_Charencey_8.jpg"]},"Consult_chateau_formulairee62d":{"id":"Consult_chateau_formulairee62d","dept":"25","canton":"Ornans","commune":"Chateauvieux-les-Fossés","nom":"Chateauvieux_Fosses","type":"Château","periode":"XIII","histoire":"CHATEAUVIEUX les Fossés,  durant le Moyen Âge,  est un village fortifié de la Route du Sel appartenant successivement aux seigneurs de Montgesoye, qui y construisent le premier château fort, au IXe siècle, à ceux de Salins, puis à ceux de Montfaucon, avant que les sires de Rye , n'en fassent l'acquisition en 1620, et ne reconstruisent son château, détruit quelques décennies auparavant par les troupes de Louis XI. A la Révolution française, Châteauvieux devient une commune et le château est vendu comme bien national, avant d'être en partie ravagé par les flammes en 1807, puis restauré, dans la deuxième moitié du XIXe siècle, par la famille Boiteux.","architecture":"Châteauvieux,Un premier château fort aurait été élevé au IXe siècle . Laissé à l'état de ruines, par les troupes de Louis XI, . Il rétablit le château et  augmente les fortifications. En 1807, une grande partie des bâtiments furent détruits. Corps de logis  à deux niveaux  avec tourelles flanquée à l'entrée de la cour d'honneur.\r\n Il subsiste néanmoins quelques façades du milieu du XVIIe siècle.","habitants":"seigneurs de Montgesoye\r\n        \"","divers":"Château de Châteauvieux","gps":"","images":["../image/image_25/25_Chateauvieux_Fosses_1.jpg","../image/image_25/25_Chateauvieux_Fosses_2.jpg","../image/image_25/25_Chateauvieux_Fosses_3.jpg","../image/image_25/25_Chateauvieux_Fosses_4.jpg","../image/image_25/25_Chateauvieux_Fosses_5.jpg","../image/image_25/25_Chateauvieux_Fosses_6.jpg"]},"Consult_chateau_formulaire3166":{"id":"Consult_chateau_formulaire3166","dept":"25","canton":"Quingey","commune":"Châtillon-sur-Lison","nom":"Chatillon_sur_Lison","type":"Château","periode":"XIV","histoire":"CHATILLON sur LISON,  en 1254 Pierre de Châtillon reprenait le fief du comte de Bourgogne. Jean de Châtillon épousait, vers 1280 Agnès de Chaussin, ils eurent Gérard de Châtillon. Robert de Châtillon, chevalier, était gardien du comté de Bourgogne vers la fin du XIIIe siècle et connétable au début du XIVe siècle. Pierre de Châtillon, chevalier, seigneur de Châtillon-sur-Lison, eut Jacques de Châtillon nommé dans un acte du prieuré de Lanthenans en 1345 et Guye de Châtillon, femme de Willemin dit Chassigney, damoiseau, faisait hommage de la maison forte de Châtillon en 1303 et des fiefs qui en relevaient à Vautier de Montbéliard, seigneur de Vuillafans. Jean de Châtillon, écuyer, recevait en 1319 de Simon de Vaudrey, chevalier, des terres à charge pour lui de les tenir en fief. Thierry de Châtillon, chevalier, déclarait en 1341, qu'il se devait de recevoir les gens d'armes du comte de Bourgogne dans son château de Châtillon. Au XIVe siècle le château passait dans la maison de Montagu. Celle-ci était entrée au XIIIe siècle dans une branche de la maison de Vaugrenans. Simon de Vaugrenans, chevalier, prenait en 1280 le titre de seigneur de Châtillon. Il était le père de Richard de Vaugrenans, damoiseau, qui quittait le nom de Vaugrenans pour prendre celui de Châtillon. Dans la commune le château de Fertans (voir article).","architecture":"Château  de Châtillon attesté dès le XIIe siècle et occupé à toutes les époques. Le site actuel correspond à la période du XIIIe siècle. L'essentiel des murs du logis est en place à la fin du XVIe siècle. Campagne de restauration et  d'aménagement vers 1820. Logis en arc de cercle avec tour en saillie au centre  et aile en retour à l'ouest, cour  à deux niveaux. Plusieurs pièces conservent des cheminées et des décors de lambris. Trois pièces au décor Louis XVI sont particulièrement remarquables. Eléments protégés MH : le logis en totalité avec ses décors immeubles par destination, sa cour et ses terrasses, la cour des communs et les façades et toiture de la maison du gardien, les soutènements, murs et arcades des terrasses alentours du corps de logis, la cour des communs, le parterre ovale et le jardin à murs coupe vent, le parc avec la glacière et les murs qui l'entourent, le mur du verger, les sols et les sous-sols.","habitants":"Jean de Châtillon\r\n        \"","divers":"Château de Châtillon sur Lison","gps":"","images":["../image/image_25/25_Chatillon_sur_Lison_1.jpg","../image/image_25/25_Chatillon_sur_Lison_2.jpg","../image/image_25/25_Chatillon_sur_Lison_3.jpg","../image/image_25/25_Chatillon_sur_Lison_4.jpg"]},"Consult_chateau_formulaire204c":{"id":"Consult_chateau_formulaire204c","dept":"25","canton":"Audeux","commune":"Burgille","nom":"Chazoy_Cordiron","type":"Château","periode":"XIII-","histoire":"CHAZOY. était une seigneurie de Cordiron.                \r\nCORDIRON,  le château de Cordiron fût édifié pour la famille d'Oiselay à partir du XIIIe siècle, date pour l'essentiel de la fin du Moyen-Age et du XVIe siècle.  Au XVIe siècle la tour sert de prison. La famille de Bauffremont   hérite de la seigneurie en 1682. Mais au XIXe siècle, Cordiron  devient une exploitation agricole et subit de nombreux dommages par manque d'entretien. Une tour carrée est le seul vestige.  Depuis le début du XXIe siècle, le château a changé de propriétaire et fait l'objet de diverses campagnes de restauration.","architecture":"Chazoy; Il subsiste les vestiges dun pont-levis et une tour octogonale. de plan en U  porche d'entrée  avec tours rondes aux extrémités, corps de logis en retour à deux niveaux pavillon d'entrée saillant toiture avec fronton avec ouvertures en chien assis, Des travaux de restauration ont commencé en 2008.       Cordiron. Une ferme fortifiée dominée par un donjon du XVIe siècle. on pouvait voir un corps de logis avec une grange et une muraille  le long de la tour avec un pont-levis et un pont gisant.  Le bâtiment conserve sur sa façade Est deux grandes fenêtres renaissance, à louest une tourelle descalier est plaquée contre le mur. La porte dentrée surmontée dune tour est dépoque plus récente, ces travaux de restauration visent à sauver l'édifice de la ruine, et à lui restituer son état d'origine. C'est en effet l'un des derniers châteaux de Franche-Comté qui possède un donjon encore debout et d'une grande valeur historique pour la région. La toiture du donjon est remontée à l'identique en mars 2009, et la façade sud fait l'objet de travaux de maçonnerie visant à la consolider, son état menaçait la ruine. Le logis datant du XVIe siècle est remonté sur deux niveaux, on y accède par un escalier à vis du XVIe siècle. Les traces du pont-levis médiéval sont encore visibles dans le mur d'enceinte qui joint le donjon du XIIIe siècle et le corps de logis Renaissance.","habitants":"Famille de Bauffremont\r\n        \"","divers":"Château de Cordiron tour carrée et porte accolée, château de Chazoy","gps":"","images":["../image/image_25/25_Chazoy_Cordiron_1.jpg","../image/image_25/25_Chazoy_Cordiron_2.jpg","../image/image_25/25_Chazoy_Cordiron_3.jpg","../image/image_25/25_Chazoy_Cordiron_4.jpg","../image/image_25/25_Chazoy_Cordiron_5.jpg","../image/image_25/25_Chazoy_Cordiron_6.jpg","../image/image_25/25_Chazoy_Cordiron_7.jpg","../image/image_25/25_Chazoy_Cordiron_8.jpg","../image/image_25/25_Chazoy_Cordiron_9.jpg"]},"Consult_chateau_formulaire4dba":{"id":"Consult_chateau_formulaire4dba","dept":"25","canton":"Audeux","commune":"Chevigney-sur-l`Ognon","nom":"Chevigney","type":"Château","periode":"XVIII","histoire":"CHEVIGNEY, la première mention  apparaît dans une charte de 1122 dans laquelle l'archevêque de Besançon Anseri fait don des droits de l'église de Chevigney à l'abbaye SAINT-PAUL de Besançon. Dans les années 1620, le village est décimé par la peste et ravagé à plusieurs reprises par les Suédois. En 1651 ne survit  que trois familles soit 15 personnes dont les Rabots.   Ferme achetée en 1849 par Louis de Sainte Agathe, industriel bisontin, et transformée en résidence. Les travaux se sont achevés en 1887. Typique des résidences de campagne de la deuxième moitié  du XIXe siècle. Le parc à langlaise a été dessiné par Brülher en 1856, réalisé par l'architecte paysagiste franc comtois Michel Brice. Un château, datant de 1764, qui fait l'objet d'une inscription au titre des monuments historiques depuis le 20 avril 1994, ainsi que son parc à l'anglaise en bordure de l'Ognon.","architecture":"Chevigney; Le château, construit en 1764,  corps de logis rectangulaire à deux niveaux et attiques accolée de pavillons carrés en angles de même hauteur toitures en croupes pour l'ensemble,il a été restauré en 1850 et 1855. Le parc \"à l'anglaise\" qui s'étend jusqu'à la rivière. Il est classé depuis l'année 2000. Dans la commune le château de Chaucenne.","habitants":"Famille Rabots\r\n        \"","divers":"Château de Chevigney et de Chaucenne","gps":"","images":["../image/image_25/25_Chevigney_1.jpg","../image/image_25/25_Chevigney_2.jpg","../image/image_25/25_Chevigney_3.jpg","../image/image_25/25_Chevigney_4.jpg"]},"Consult_chateau_formulaire4153":{"id":"Consult_chateau_formulaire4153","dept":"25","canton":"Bussières","commune":"Chevroz","nom":"Chevroz","type":"Château","periode":"XVI","histoire":"CHEVROZ, château construit au XVIe et remanié au XVIIIe siècle. Avec ses quatre tours carrées surmontées d'un  toit  pyramidal, il devait protéger un gué sur l'Ognon. On a ouvert une façade sud sur le parc au XVIIIe siècle. Le domaine couvrait plus de 400 ha  abritait d'arbres magnifiques que l'on peut admirer aujourd'hui (tulipier, noyer d'Afrique). La même famille est propriétaire depuis plusieurs générations.","architecture":"château construit en forme d'un U au XVIe et remanié au XVIIIe siècle. Avec ses quatre tours carrées surmontées d'un  toit  pyramidal portail d'entrée dans la propriété; grilles  du côté Ouest de la cour et pont sur le fossé , puits dans la cour, façades, avec leurs grilles en fer forgé,   dans le corps de logis, au rez-de-chaussée, cuisine voûtée, mur Sud de la salle à manger attenante, chambre de la tour Sud  et grand salon qui donne à l'Est avec leurs lambris et leurs cheminées.","habitants":"\"","divers":"Château de Chevroz","gps":"","images":["../image/image_25/25_Chevroz_1.jpg","../image/image_25/25_Chevroz_2.jpg"]},"Consult_chateau_formulaireac87":{"id":"Consult_chateau_formulaireac87","dept":"25","canton":"Amancey","commune":"Cleron","nom":"Cleron","type":"Château","periode":"XIV","histoire":"CLERON; Avant le XIIe siècle, la famille des seigneurs de Cléron succède à la famille des seigneurs de Scey pour contrôler le  passage du pont en bois sur la Loue sur la principale Route du Sel de Franche Comté, route qui relie Besançon à Salins  les-Bains et qui assure le prospérité de la région au moyen-age.\r\n Le château de Cléron est construit en 1320 au bord de la Loue par Humbert de Cléron  vassal du comté de Bourgogne. Pendant la guerre  de 10 ans (1634 à 1644) menée par Richelieu  cardinal et premier ministre de Louis XIII, pour tenter de reconquérir le comté de Bourgogne aux Habsbourg d'Espagne.   Le village est dévasté par  des mercenaires Suédois à la solde de la France en 1639,  et une deuxième fois en 1641 par les Français.   Reconstruit partiellement, restauré,  différentes familles qui en furent propriétaires, les Cléron jusqu'en 1691, les Terrier de Santans jusqu'en 1895. Ce château en parfait état de restauration est actuellement propriété privée de la famille de Montrichard.","architecture":"Construit au XIVe siècle (1320)  sur l'emplacement d'un ancien castrum Gallo-Romain, fortement remanié au XVIIIe siècle, malgré sa restauration, il a conservé son aspect défensif, typique de l'architecture militaire moyenâgeuse. Il a entre autre conservé ses défenses, donjon, mâchicoulis, meurtrières et assommoirs soigneusement restaurés. Le corps de logis perpendiculaire à la Loue date du XVe siècle. Il est flanqué d'une tour carrée dite « tour de l'horloge » datant du XIXe siècle. Sur le corps de bâtiment parallèle à la Loue, existe deux autres tours: la plus grande, carrée, le donjon servait également à défendre la tour ronde située un peu plus loin et appelée  tour de La Folle. Une viorbe, escalier à vis d'une centaine de marches permet d'accéder au sommet de la tour de guet. \r\nDans la commune le château de Pater.","habitants":"Humbert de Cléron\r\n        \r\n        \r\n        \"","divers":"Château de Cléron et de Pater","gps":"","images":["../image/image_25/25_Cleron_1.jpg","../image/image_25/25_Cleron_2.jpg","../image/image_25/25_Cleron_3.jpg","../image/image_25/25_Cleron_4.jpg","../image/image_25/25_Cleron_5.jpg","../image/image_25/25_Cleron_6.jpg","../image/image_25/25_Cleron_7.jpg","../image/image_25/25_Cleron_8.jpg"]},"Consult_chateau_formulaire4f67":{"id":"Consult_chateau_formulaire4f67","dept":"25","canton":"Audeux","commune":"Corcondray","nom":"Corcondray","type":"Vestiges","periode":"XII","histoire":"CORCONDRAY; Le château de la seigneurie de Corcondray date du XIIe siècle. La seigneurie de Corcondray est très importante,  cette famille est issue de celle des sires et seigneurs de Montferrand ,  Fromond de Montferrand, dit \"Fromond de Cicon\", chevalier. Il est le fils de Jean de Montferrand et de N... de La Tour. Guillaume de Corcondray, seigneur de Corcondray et d'Avanne, chevalier. Par alliance  et succession, Il épouse Clémence, fille de Jean Ier de Faucogney et d'Helvis de Joinville, de qui il a:  Renaud seigneur de Corcondray et d'Avanne, chevalier. Il désigne son fils Jean comme héritier.  Le château a été construit au XIIIe. Au début du XIVe   siècle, Jean de Corcondray est un des savants les plus réputés de son époque. En 1366 un traité est signé   entre la comtesse de Bourgogne et les Grandes Compagnies dont les troupes ravageaient la région et qui   devaient quitter  la Comté sous  les cinq jours  moyennant le paiement  de milliers  de florins.  Les français brûlent le château en 1477 et en 1584. Il sera ensuite la propriété du Baron Gorrevod puis de ses héritiers successifs les seigneurs de Bauffrement puis ceux de Marnay. Il occupait tout lemplacement du village actuel. Aujourdhui à labandon, il ne subsiste que la tour du donjon.","architecture":"Du château de Corcondray, il reste une magnifique  tour carrée de vingt mètres de hauteur vraiment spectaculaire, avec un large porche  percé dans la muraille crénelée. De vingt mètres de haut comportant  un rez-de-chaussée et 3 étages, elle est presque entièrement couverte de végétation et se détériore au fil du temps. Il ne reste que des vestiges du château médiéval de Corcondray, construit au XIIIe siècle et brûlé en 1477 .\r\n Quelques traces de l'ancienne maison forte peuvent également être aperçues.\r\n Au XVIe siècle, ces ruines étaient utilisées par les seigneurs en tant que poulailler et chenil.","habitants":"seigneurie de Corcondray\r\n        \"","divers":"Vestiges du château de Corcondray","gps":"","images":["../image/image_25/25_Corcondray_1.jpg","../image/image_25/25_Corcondray_2.jpg"]},"Consult_chateau_formulaire31fd":{"id":"Consult_chateau_formulaire31fd","dept":"25","canton":"Ornans","commune":"Durnes","nom":"Durnes","type":"Château","periode":"XVIII","histoire":"DURNES,  Robert et Renaud de Durnes, fils, chevalier,  Jacques de Durnes, seigneur de Durnes. Il est le fils de Thomas de Chacenay et d'Hue de Salmaise. Après avoir été moine à l'abbaye de Clairvaux il se marie avec Agnès, fille d'Hugues du Puiset et de Pétronille de Brienne, de qui il a Gérard, seigneur de Durnes, chevalier, il est l'un des otages donné à Besançon par Jean Ier, comte de Chalon, pour assurer un traité qu'il avait avec cette ville en 1224. Il épouse Marguerite, dame de Vendeuvre, fille d'André de Vendeuvre et de Clémence, de qui il a Jean Ier de Durnes, seigneur , chevalier, il reçoit en fief en 1253 le château d'Étrabonne de la part de Guillaume II de la Tour, archevêque de Besançon.  Gérard II de Durnes, seigneur, chevalier, il épouse Marguerite, fille d'Amaury IV de Joux et de Luquette de Neublans, de qui il a Agnès.  Jean II de Durnes, chevalier, seigneur de Vuillafans. Il teste en 1318 et choisit sa sépulture dans l'église de Saint-Hippolyte. Son épouse est inconnue, son fils Guillaume, damoiseau, il épouse Jeannette d'Usies de qui il a Guillemette, Jacques, docteur en droit, Guyette, elle épouse Perrin, fils de Pierre Lorier, chevalier, Jeannette, elle épouse Jaquemet, Agnès, Vuillemette, Poncette, Clémence. La famille de Vienne Grandson, propriétaire du château  de 1370 à 1526.","architecture":"La date de construction du château de Durnes est incertaine. Il fut vraisemblablement élevé au XIe ou  au XIIe siècle. Le bourg se développa autour de la forteresse. Le château de Durnes fut reconstruit sur le même emplacement au XIXe siècle. A l'emplacement du château au lieu dit \"le château\" est construit aujourd'hui une maison bourgeoise datant du XVIIIe siècle. Du château médiéval subsiste les soubassements situés du côté vallée ce qui permet de se faire une idée sur l'importance du monument initial. Plus bas, au lieu dit \"la Poutane\", présence d'une mare et du lieu dont la tradition orale dit que c'est l'emplacement des pendus. Le château fut détruit en 1674 sur ordre de  Louis  XIV.  Les  communs dont  le linteau de la cheminée porte les armoiries de la famille de Vienne Grandson, ne semblent pas avoir subi de dommage.","habitants":"Robert de Durnes\r\n        \"","divers":"Château de Durnes et de Lombard","gps":"","images":["../image/image_25/25_Durnes_1.jpg","../image/image_25/25_Durnes_2.jpg"]},"Consult_chateau_formulaire39f0-2":{"id":"Consult_chateau_formulaire39f0-2","dept":"25","canton":"Audeux","commune":"Etrabonne","nom":"Etrabonne","type":"Château","periode":"XV","histoire":"ETRABONNE, possède, sur un surplomb de la vallée, un superbe château féodal du   XIe  siècle avec un donjon. Narduin d'Étrabonne premier propriétaire du château vivait à Besançon en 1084. L'Empereur  Frédéric Ier y aurait séjourné avec les chefs des \"trois rois Mages\" les seigneurs auraient ainsi reçu le pouvoir de   guérir les écrouelles. Le château, incendié en 1363, subit au XVe siècle des transformations. \r\nEn 1723, il devint la propriété de Jean Pourcheresse maître de forges. Le logis Nord a été très restauré au XVIIIe siècle. L'ensemble ainsi conservé en impose par l'importance de ses bâtiments médiévaux.","architecture":"Le village d'Etrabonne s'est construit autour de son château féodal, édifié au XIe siècle et dont il ne reste aujourd'hui que des ruines. La plus intéressante est le squelette d'une ancienne tour carrée de trois étages.\r\n Le château fut incendié en 1363, et rénové au XVe siècle,  un bâtiment fut  ajouté d'un  corps en forme de U, pour relever les destructions commises par les grandes compagnies.\r\n L'élément le plus récent du château est une chapelle du XIXe siècle, dans laquelle on peut voir trois statuettes en hommage aux rois mages, qui auraient passé quelques jours à Etrabonne.","habitants":"Narduin d'Étrabonne\r\n        \"","divers":"Vestiges de l'ancien château et batiment sur l'arrière et château de Bailly","gps":"","images":["../image/image_25/25_Etrabonne_1.jpg","../image/image_25/25_Etrabonne_2.jpg","../image/image_25/25_Etrabonne_3.jpg","../image/image_25/25_Etrabonne_4.jpg","../image/image_25/25_Etrabonne_5.jpg"]},"Consult_chateau_formulairec1db":{"id":"Consult_chateau_formulairec1db","dept":"25","canton":"Audincourt","commune":"Exincourt","nom":"Exincourt","type":"Château","periode":"XIX","histoire":"EXINCOURT, demeure bourgeoise, nichée, à quelques kilomètres de la ville, le château Sahler accueille ses hôtes dans un cadre enchanteur. Construit au début du XIXe siècle, il est entouré d'un magnifique parc arboré de quelque cinq hectares. Un court de tennis ombragé ravira les plus sportifs,  le château Sattler on l'appelle parfois du nom du premier  propriétaire, ou Maison Monnot du nom de l'actuel occupant, Bernard Monnot qui en est  le propriétaire.","architecture":"Le château d'Exincourt fut érigé en 1714 sur un emplacement d'où l'on découvrait comme fond de  tableau, le Mont-Bart et les vieilles tourelles du château de Montbéliard.","habitants":"Bernard Monnot \r\n        \"","divers":"Château Salher","gps":"","images":["../image/image_25/25_Exincourt_1.jpg","../image/image_25/25_Exincourt_2.jpg"]},"Consult_chateau_formulaire5734":{"id":"Consult_chateau_formulaire5734","dept":"25","canton":"Amancey","commune":"Fertans","nom":"Fertans","type":"Château","periode":"XIII","histoire":"FERTANS, Au XIIe siècle, une famille vassale des Montfaucon auxquels appartenait la contrée. Un Étienne de Fertans  en 1150 : il avait quatre fils, Guillaume, Hugues, Aymon et Humbert. Au XIIIe siècle, la situation féodale de Fertans est complexe. Il y a une lignée qui appartient à la branche de Scey des Montfaucon-Montbéliard ; la famille des Fertans y possèdent deux maisons-fortes. C'est à cette époque que Jean Ier de Chalon, après avoir renoncé en 1237, à toutes ses possessions outre-Saône, commence à s'implanter dans la région salinoise et sur les plateaux du Jura. Dès 1260, Richard de Montbéliard, sire de Scey, fils de Pierre IV de Scey, se déclare homme-lige de Jean de Chalon pour la prévôté de Fertans. Après la mort de Jean, c'est Étienne de Scey qui déclare tenir en fief de Laure, sa veuve, la maison forte qu'Odon de Fertans tenait de lui.\r\nÀ la fin du XIIIe siècle, la situation se clarifie un peu avec le mariage de Jeanne de Fertans avec Raald de Scey. Dès cette époque, on ne parle plus que d'un seul château de Fertans et les Scey restent, seuls, vassaux des Chalon. Il faut attendre le XVIe siècle pour voir une nouvelle modification féodale, avec le mariage de Madeleine de Scey et d'Étienne de Montrichard, sieur de Flammerane. Ce sont désormais les Monrichard qui vont tenir Fertans. En 1734, Alexandre-Joseph de Montrichard meurt, dernier de sa branche. La seigneurie, est acquise en 1737, par François de Renouard, sieur de Fleurey. Celui-ci était originaire de Bretagne où il portait le titre de comte de Villayer. Pour un demi-siècle, la terre et le village de Fertans s'appelèrent donc Villayer. Ce n'est que le 16 septembre 1791 que Villayer reprend le nom de Fertans,  en janvier 1796, Marcot, un patriote, se rendit acquéreur du château.","architecture":"Le château de Fertans a son origine au XIIIe siècle, mais fut en partie détruit en 1638, période de la guerre de Trente Ans. De cette époque, il ne reste que les vestiges de la partie Est. L'ensemble fut reconstruit au XVIIe siècle. Corps de logis rectangulaire à un niveau et attiques en combles flanqués de deux pavillons carrées à deux niveaux, oeils de boeuf sur attiques dans les toitures à dôme impériale, deux bâtiments accolés en retour d'ailes rejoignant  le mur de fermeture de cour d'honneur avec porte à anse accolée de tours rondes inférieures à toit en poivrières.","habitants":"Richard de Montbéliard\r\n        \"","divers":"Château de Fertans","gps":"","images":["../image/image_25/25_Fertans_1.jpg","../image/image_25/25_Fertans_2.jpg","../image/image_25/25_Fertans_3.jpg","../image/image_25/25_Fertans_4.jpg","../image/image_25/25_Fertans_5.jpg"]},"Consult_chateau_formulaireaf85-2":{"id":"Consult_chateau_formulaireaf85-2","dept":"25","canton":"Quingey","commune":"Fourg","nom":"Fourg","type":"Château","periode":"XVIII","histoire":"FOURG, L'histoire du château est étroitement liée à celle des sires et seigneurs de Montferrand, maison de Montferrand du XIIIe siècle au XVe siècle et affiliée à celle du comté de Bourgogne. Il fait alors partie d'un ensemble de fortifications leur appartenant, comprenant celle de Montferrand-le-Château, Thoraise, Torpes, Corcondray et Avanne. Il est édifié en 1281 par Hugues de Monferrand, sire de Thoraise issu de la maison des sires et seigneurs de Montferrand -le-Château.\r\nEn 1407, le château possédait un moulin et douze chaumières, était encore habité au début du XIXe siècle. Aujourd'hui il n'en reste que quelques pierres.\r\nLa château a été reconstruit dans les années 1770-1780 par Claude Pierre Falton petit-fils du fermier de la seigneurie de Fourg. Il a été la résidence de Marcelle de Lacour célèbre claveciniste (1896-1997) y résida. Le château de Fourg abrite aujourdhui la fondation Marcelle et Robert de Lacour pour la musique et la danse.","architecture":"Au XVIIe siècle, la seigneurie de Fourg comptait trois domaines importants. La famille Faton des Bryans donne au château  sa forme actuelle vers 1770-1780, établi sur deux étages de soubassement, le logis a un plan en U toitures en croupes et attiques, donnant forme à la cour que ferme un portail à grille ornée. Des éléments de décor du XVIIIe siècle sont conservés à l'intérieur. Le parc s'étend jusqu'aux maisons de la rue principale à l'ouest, avec au sud l'ancienne ferme et au nord des communs aménagés vers 1900.","habitants":"Claude Pierre Falton \r\n        \"","divers":"Château de Fourg","gps":"","images":["../image/image_25/25_Fourg_1.jpg","../image/image_25/25_Fourg_2.jpg","../image/image_25/25_Fourg_3.jpg"]},"Consult_chateau_formulairee25a":{"id":"Consult_chateau_formulairee25a","dept":"25","canton":"Audeux","commune":"Franois-Villers-Buzon","nom":"Franois","type":"Château","periode":"XVIII","histoire":"FRANOIS, a été construit en 1774 à côté de l'église de Franois, Il est entouré d'un parc boisé et d'un domaine de quatre hectares ceinturé d'une muraille et de tourelles.\r\nUne inscription latine est inscrite sur la façade de  la rue « Virgineam puram Dum transis ante figuram Praetereundo cave Ne sileatur ave »( Si le nom de Marie en ton cur est gravé, en passant ne t'oublie de lui dire un ave )\r\nLe château est vendu par le chapitre en 1787 juste avant la Révolution Française. Les curés de la paroisse voisine de Serre y logèrent jusqu'en l'An II de la République (1794).\r\nAu début du XIXe siècle il est acheté par le comte Léonce de Liniers   et appartient toujours à sa famille. Le château est privé et non ouvert au public. A quelques kilomètres à l'ouest le château de Maurivard à Villers-Buzon, est une maison forte du XVIe siècle qui comportait une tourelle d'angle disparue vers 1916.","architecture":"Le château de Franois, corps de logis rectangulaire à trois niveaux accolé de pavillons saillants sur les extrémités  est entouré sur trois façades de parterres de topiaires. Il possède un jardin clos avec un pigeonnier et un puits dans un angle. Les vestiges du mur du jardin clos et ses tours sont inscrits monument historique.                     Maurivard est une maison forte du XVIe  datée  de 1549 qui comportait une tourelle d'angle disparue vers 1916. Sa vaste cheminée de pierre possède une platine armoriée de la croix de Saint André que l'on retrouve sur le linteau de la porte de la chapelle seigneuriale de l'église. Ces armoiries appartenaient à la  famille de Saint Claude.","habitants":"Comte Léonce de Liniers \r\n        \"","divers":"Château de Franois et de Maurivard","gps":"","images":["../image/image_25/25_Franois_1.jpg","../image/image_25/25_Franois_2.jpg","../image/image_25/25_Franois_3.jpg"]},"Consult_chateau_formulairebcaa":{"id":"Consult_chateau_formulairebcaa","dept":"25","canton":"Marchaux","commune":"Geneuille","nom":"Geneuille","type":"Château","periode":"XVII","histoire":"GENEUILLE, Lyautey; né à Vellefaux en Haute-Saône, le 27 Novembre 1761, l'ancêtre du maréchal Lyautey se retire au château de Geneuille en 1814. Commissaire ordonnateur en chef dans les armées de l'Empire, père de quatre soldats, dont trois généraux, il passe la fin de sa longue vie dans son château ou vient souvent le visiter son ami tout proche le maréchal Moncey.               Château Lyautey-Béneyton plus ancien que le précédent, il sera attribué à Pierre-Antoine Lyautey lors dune retraite bien méritée après une carrière brillamment menée dans la vie militaire. Cet exemple sera suivi par ses fils et les générations suivantes. Son arrière petit-fils, le maréchal Lyautey, considéré comme le créateur du Maroc moderne, vint en personne poser une plaque au souvenir de Pierre-Antoine Lyautey contre le mur Est de léglise. Pierre-Antoine Lyautey s'éteint à 93 ans le 14 septembre 1854.","architecture":"Le Château de la Dame Blanche: construit dans les années 1880 pour servir dhabitation aux propriétaires des papeteries de France, il sera utilisé une vingtaine dannées, à la fin du XXe siècle, par la communauté chrétienne de la Roche dOr pour des retraites spirituelles. En 1834, la famille Outhenin-Chalandre achète et exploite le vieux moulin sur lOgnon pour produire du papier. Cette famille fortunée fera pendant plus de 100 ans la prospérité de Geneuille. Château Lyautey-Béneyton corps de logis en L à deux niveaux et attiques toits à la mansard avec tour ronde centrale en façades.","habitants":"Maréchal Lyautey \r\n        \"","divers":"Château de la Dame Blanche, de Lyautey-Béneyton et le moulin usine","gps":"","images":["../image/image_25/25_Geneuille_1.jpg","../image/image_25/25_Geneuille_2.jpg","../image/image_25/25_Geneuille_3.jpg","../image/image_25/25_Geneuille_4.jpg","../image/image_25/25_Geneuille_5.jpg"]},"Consult_chateau_formulaire821e":{"id":"Consult_chateau_formulaire821e","dept":"25","canton":"Levier","commune":"Levier","nom":"Grange_Maillot","type":"Château","periode":"XVI","histoire":"GRANGE-MAILLOT, construit sur le site au XIIe siècle,  Le château est détruit par le général dAmboise en 1480 puis reconstruit, en 1516, pour Jean de Scey. Il est à nouveau détruit dans un incendie en 1773. Son propriétaire, Pierre-Georges de Scey, émigre entre 1792. Ses biens sont confisqués et il rentre en France en 1796. Il vend le terrain en 1811 à Louis-Balthazar-Frédéric Prost, un riche négociant strasbourgeois. \r\nEn 1825, Prost vend la propriété à deux maîtres de forges, Vautherin et Vuillier, associés originaires de Lods.  En 1857, le marquis de Saint-Mauris, propriétaire du domaine depuis 1846, entreprend, sur les plans de larchitecte Parent, la construction dun nouvel édifice sur le versant sud du site . Le château est acquis par  René de Moustier en 1906. Le nouveau propriétaire entreprend, entre 1922 et 1932, une importante campagne de travaux dembellissement destinée à gommer laspect austère de la maison. En 1933, le domaine et le château sont transmis, par alliance, à la famille de la Rochefoucauld, son propriétaire actuel.","architecture":"La demeure de la Grange-Maillot ne portera pourtant pas le nom de son commanditaire. Le château tient lieu de mairie à la commune de Grange-Maillot jusqu'à son rattachement à Levier en 1974. L'école privée, financée par la famille de Moustier  était abritée sous son toit de 1920 à 1936 et de 1945 à 1953. Ses matériaux, dispersés au XIXe siècle, servent à la construction de plusieurs maisons dans les communes alentours.","habitants":"Pierre-Georges de Scey\r\n        \"","divers":"Château de la Grange-Maillot","gps":"","images":["../image/image_25/25_Grange_Maillot_1.jpg","../image/image_25/25_Grange_Maillot_2.jpg","../image/image_25/25_Grange_Maillot_3.jpg"]},"Consult_chateau_formulairee30a":{"id":"Consult_chateau_formulairee30a","dept":"25","canton":"Maiche","commune":"Mancenans-Lizerne","nom":"Hermitage","type":"Château","periode":"XVII","histoire":"HERMITAGE; ce ancien monastère fut construit en 1626 par Jean-Renaud Lallemand du Russey, sa chapelle  qui date de 1633 se situe au bord des falaises dominant le Valory. Cest encore de nos jours une magnifique propriété,  sur les grands rochers  face au \"château du diable\", curieuse pyramide rocheuse. Confisqué et   vendu comme bien national en 1792, il fut la possession dun curé originaire du bourg labbé Parent  jusquen 1878, qui céda  lHermitage à des moines. Lorsque les Pères Carmes quittèrent  les lieux en 1892, le château devint la propriété du peintre Joseph Aubert, peintre aux thèmes historiques qui réalisa en ces lieux de belles toiles qui ornent encore aujourdhui nos églises franc-comtoises.","architecture":"Hermitage accroché sur une pente,   monastère transformé en habitation  de forme rectangulaire style église-monastère à trois niveaux avec pavillons d'entré et tourelle à l'opposée à conservé à l'intérieur l'esprit du XIXe siècle,  partout du gothique flamboyant des fresques des tableaux, est une très jolie bâtisse d'une quarantaine de mètres de long.","habitants":"peintre Joseph Aubert,\r\n        \"","divers":"Château Hermitage","gps":"","images":["../image/image_25/25_Hermitage_1.jpg","../image/image_25/25_Hermitage_2.jpg"]},"Consult_chateau_formulaireaefd":{"id":"Consult_chateau_formulaireaefd","dept":"25","canton":"Audeux","commune":"Jallerange","nom":"Jallerange","type":"Château","periode":"XVIII","histoire":"JALLERANGE, ce château  ancien domaine   viticole ou subsistent cave et pressoir du XVIIIe siècle, le jardin à la française a été conçu en 1771 à linitiative  du conseiller Claude Nicolas Marcellin Seguin de Jallerange parlementaire bisontin  exilé sur ses terres a choisit d'accompagner sa résidence d'un jardin à la française. Talus, glacis,  amphithéâtre, vertugadin,  berceaux  de charmilles,  salles de fraîcheur et cabinet de verdure  concourent à la composition de ce charmant jardin qui  a conservé toute son authenticité depuis sa création.","architecture":"Le château de Jallerange est un corps de logis rectangulaire à deux niveaux et attiques  avec pavillon légèrement saillant en façade avec fronton, l'escalier intérieur avec sa rampe en fer forgé inscription par arrêté du 12 juillet 1973 , Jardin et parc, avant-cour, cour d'honneur, ancien potager, jardin à la française, parc, y compris les murs d'enceinte, les portes en fer forgé,","habitants":"Claude Nicolas Marcellin Seguin\r\n        \"","divers":"Château de Jallerange","gps":"","images":["../image/image_25/25_Jallerange_1.jpg","../image/image_25/25_Jallerange_2.jpg","../image/image_25/25_Jallerange_3.jpg"]},"Consult_chateau_formulaire05f4":{"id":"Consult_chateau_formulaire05f4","dept":"25","canton":"Pontarlier","commune":"La Cluse-de-Mijoux","nom":"Joux_Larmont","type":"Forteresse","periode":"XII","histoire":"JOUX-LARMONT; fort construit sur l'éperon rocheux du Géran à 950 m en face du fort de Lormont,  au XIe siècle pour la surveillance du passage de sel qui relie les mines de Salins à la Suisse, en 1248 passe à la maison de Chalon qui s'en sépareront par alliance aux seigneurs de Vevey puis aux de Vienne, et à la fin du XIVe siècle passe  aux comtes de Neuchatel en 1454, le duc de Bourgogne Philippe III le Bon achète la forteresse qui subit alors des assauts des troupes françaises et bourguignonnes et en 1477 à la mort de Charles le Téméraire la Franche-Comté passe aux Habsbourg qui devient le théâtre d'affrontement entre la France et l'Espagne durant le XVIIe siècle et durant cette période le roi Louis XIV confie à Vauban la modernisation de la forteresse qui est située sur la nouvelle frontière du royaume de France. Au XVIIIe siècle il fut transformé en prison parmi les hôtes les plus célèbres Mirabeau de 1774 à 1791. La forteresse  sera de nouveau remanié suite au conflit franco-allemand  de 1870 par Séré de Rivières et par le maréchal Joffre.","architecture":"Le Château de Joux est un exemple d'architecture militaire développée de façon continue au Moyen-Âge du XII au XIXe siècle. Schématiquement, la partie la plus ancienne est le donjon médiéval et le mur Ouest de la troisième enceinte qui donne du côté du Doubs. Viennent ensuite la première enceinte, la tour du fer à cheval, le magasin à poudre et l'entrée de la troisième enceinte avec son pont levis. Le glacis, le chemin couvert et la troisième et quatrième enceintes ont été reprises par Vauban avec un tracé bastionné. La partie Ouest de la cour du donjon l'escalier gris donnant sur la Rochette, la seconde enceinte avec son échauguette et son escalier miné à trappe amovible datent du XIXe siècle. la cinquième enceinte et le plateau de la Rochette ont été totalement reprises par Joffre entre 1879 et 1881.                             Fort Catinat du Larmont supérieur et Fort Mahler; le fort Catinat est situé sur les hauteurs du Larmont, dominant Pontarlier, et fut bâti entre 1880 et 1883 dans le cadre du système Séré de Rivières. Quelque peu réarmé, sa valeur défensive en 1940 était faible. Sa garnison offrit cependant une résistance de près de 8 heures, repoussant les assauts allemands plusieurs fois.","habitants":"comtes de Neuchatel\r\n        \"","divers":"Fort de Joux et le fort de Larmont","gps":"","images":["../image/image_25/25_Joux_Larmont_1.jpg","../image/image_25/25_Joux_Larmont_2.jpg","../image/image_25/25_Joux_Larmont_3.jpg","../image/image_25/25_Joux_Larmont_4.jpg","../image/image_25/25_Joux_Larmont_5.jpg","../image/image_25/25_Joux_Larmont_6.jpg","../image/image_25/25_Joux_Larmont_7.jpg","../image/image_25/25_Joux_Larmont_8.jpg","../image/image_25/25_Joux_Larmont_9.jpg"]},"Consult_chateau_formulairea570":{"id":"Consult_chateau_formulairea570","dept":"25","canton":"Besançon","commune":"Chalezeule","nom":"Juive","type":"Château","periode":"XVI","histoire":"JUIVE, le premier propriétaire connu de la demeure est Monseigneur de Fresnoy en 1780, qui détenait alors une maison de campagne de son épouse Jeanne Antoine de la Grée. Ce personnage était le seigneur de terres en Picardie, chevalier de Saint-Louis, capitaine et sera le dernier seigneur de la commune, puisqu'il se fera élire maire sous le nom de Defresnoy. 1835, l'édifice apparaît comme propriété de M. Mayer  Lippman, alors connu comme étant le juif le plus riche de la cité, fait du bâtiment sa maison de campagne, puis la décore  selon l'époque. Il se marie à Babette Lévy dont il a quatre enfants : Alfred , Auguste , Nathalie et Dina. Cette dernière, mariée au banquier parisien Bénédict Allegri, meurt après avoir donné naissance, en 1827, à Reine Précieuse Léonie Allegri. C'est elle qui sera surnommée la Juive et qui laissera son surnom à la demeure. Mayer Lippman décède le 9 juin 1849 et est enterré au cimetière israélite de la ville, laissant un héritage considérable. Le domaine revient alors à Baruch Allegri, veuf de Dina Lippman  vendus aux enchères acquit par Baruch Allegri dote sa fille Léonie de la demeure, lors de son mariage avec Paul Félix Bernheim  Paul Bernheim décède à la propriété, en 1858, à l'âge de 35 ans, et sa veuve se remarie cinq ans plus tard avec Charles Déodat, comte de Turenne dans la descendance jusqu'en 1919, le château devient la propriété, d'Élie Fourcasse, revendu, le 15 mars 1926, à Joseph Péria, ce dernier, d'origine suisse, chef cuisinier à la cour royale d'Angleterre, il se résout à vendre le château à Alain Gerber, le 12 janvier 1939 , vendu à un couple de cultivateurs, Francine et Camille Barthot-Malat et cédé à René Gavet et sa femme Myriam, hôtellerie.","architecture":"Le château de la Juive est recomposé, entre 1850 et 1870, par l'architecte franc-comtois Alphonse Delacroix, qui le reconstruit presque entièrement à partir des vestiges antérieurs. Le style architectural du logis est largement dominé par le genre gothique, avec en particulier sa tourelle d'escalier et son échauguette. Le château de la Juive est constitué d'un logis, de communs, d'une ferme ainsi que d'un parc. Depuis le 27 décembre 2002, le corps de logis avec ses décors, la façade Est du bâtiment des communs, le parc avec son mur de clôture et son portail  soit la quasi totalité de l'édifice  sont inscrits aux monuments historiques.","habitants":"Monseigneur de Fresnoy \r\n        \"","divers":"Château dit de la juive à Chalezeule","gps":"","images":["../image/image_25/25_Juive_1.jpg","../image/image_25/25_Juive_2.jpg","../image/image_25/25_Juive_3.jpg","../image/image_25/25_Juive_4.jpg"]},"Consult_chateau_formulairedce2-2":{"id":"Consult_chateau_formulairedce2-2","dept":"25","canton":"Audeux","commune":"Lantenne-Vertière","nom":"Lantenne","type":"Maison forte","periode":"XVI","histoire":"LANTENNE, a donné son nom à une famille de chevaliers. En 1197, Henri de Lantenne est cité comme  témoin  dun traité conclu entre le duc de Bourgogne et le comte dAuxonne. En 1254 Jacques de Lantenne  reçoit du  pape  Innocent IV une dispense pour les époux.","architecture":"Lantenne, château du XVIe siècle, cest un corps de logis à deux niveaux avec grange et deux tours rondes, un four, une fontaine, une vaste cour et des jardins.","habitants":"seigneur de Vertière\r\n        \"","divers":"Maison forte de Lantenne","gps":"","images":["../image/image_25/25_Lantenne_1.jpg","../image/image_25/25_Lantenne_2.jpg","../image/image_25/25_Lantenne_3.jpg","../image/image_25/25_Lantenne_4.jpg"]},"Consult_chateau_formulaire7bed":{"id":"Consult_chateau_formulaire7bed","dept":"25","canton":"Ornans","commune":"Lods","nom":"Lods","type":"Maison forte","periode":"XIII","histoire":"LODS, la maison forte des Sires de Thoraise date sans doute du XIIIe siècle, il dominait le passage sur la Loue pour contrôler la route du sel. Lods faisait alors partie de la seigneurie de Châteauvieux Vuillafans. Pendant plus de sept siècles la seigneurie et le château de Lods changeront régulièrement de mains. Lods passera aux comtes  de Montbéliard, aux Montfaucon, à Jacques de Thoraise, aux Quingey, puis  à Nicolas Perrenot de Granvelle et  à Antoine, le célèbre Cardinal, aux Cantecroix puis aux Rye. Il fut épargné au XVIIe siècle par les soudards du Colonel Rosen. A la Révolution, la maison forte est bien entendu confisqué comme bien national  est vendu avec ses dépendances. Il passa ensuite  entre plusieurs mains pour être finalement acquis avant la seconde guerre  mondiale par  le Docteur Conseil  de Tunis. Actuellement son propriétaire est le peintre Roger Roy.","architecture":"Lods; logis de plan en équerre, complété d'une cour soutenue par un mur dont l'angle conserve l'encorbellement  d'une tourelle, le bâtiment sud compte deux étages avec baies à coussiège. Le premier est couvert d'un plafond  à la française, le second est sous les combles. \r\n Le corps de bâtiment nord compte trois salles voûtées en rez de chaussée dont deux à croisées d'ogives, l'étage\r\nsous le comble conserve les éléments d'une chapelle  et des embrasures de tir, le château conserve en élévation des aspects significatifs de la maison forte des XIVe et XVe siècle. Modernisation du logis au XVIe siècle.","habitants":"Nicolas Perrenot de Granvelle\r\n        \"","divers":"Maison forte de Lods","gps":"","images":["../image/image_25/25_Lods_1.jpg","../image/image_25/25_Lods_2.jpg"]},"Consult_chateau_formulaire75b8":{"id":"Consult_chateau_formulaire75b8","dept":"25","
