château entre  1560 et 1576 sur les plans de l'architecte Richard Maire dit de Nancray, ce château est détruit en 1674, les ruines sont consolidées au XIXe. Actuellement fouilles archéologiques et  restaurations se poursuivent. Le site comprend 2 parties distinctes, à l'ouest l'éperon qui domine la vallée de la Loue  à l'est une enceinte renfermant les vestiges de citernes.","habitants":"Guy prince  de Scey\r\n        \"","divers":"Vestiges du château de Scey","gps":"","images":["../image/image_25/25_Scey_St_Denis_1.jpg","../image/image_25/25_Scey_St_Denis_2.jpg","../image/image_25/25_Scey_St_Denis_3.jpg"]},"Consult_chateau_formulairec959":{"id":"Consult_chateau_formulairec959","dept":"25","canton":"Isle-sur-le-Doubs","commune":"Soye","nom":"Soye","type":"Château","periode":"XVI","histoire":"SOYE, un ancien château, plus maison-forte que château-fort existait au XIIe siècle, il apparaît dans les archives à  partir de 1354, date à laquelle la famille de Neuchâtel en était propriétaire. Le prestige de la seigneurie de Soye est en partie expliquée par la proximité de labbaye cistercienne de Lieucroissant, puis des Trois Rois à partir du  XVIe siècle.  En 1555, Charles Quint donne Soye au Baron Ambroise Précipiano, ingénieur, il avait fortifié Dole et Gray à moindre frais. Il apporta de nombreuses modifications  au château, en bâtissant deux tours  percées de trois canonnières, mais il fut  rasé en 1668. Le château actuel mesurant 8 mètres sur 25 mètres date du début  du XVIIIe  siècle. Il se trouve au milieu dun beau et  grand parc coupé au centre par le ruisseau de la Soye. Puis la famille  de Gevigney devint, en 1831, propriétaire  pendant plus dun siècle, leurs biens revinrent ensuite à leurs cousins  de Chambure (titre de noblesse remontant à 1525).","architecture":"Château de Soye,  de nombreuses modifications furent apportés  au château par le Baron  Amboise, Précipiano, en bâtissant deux tours  percées de   trois canonnières, mais il fut  rasé en 1668. Le château actuel mesurant 8 mètres sur 25 mètres date du début XVIIIe  siècle. Il se trouve au milieu dun beau et  grand parc coupé au centre par le ruisseau de la Soye.","habitants":"Baron Ambroise Précipiano\r\n        \r\n        \"","divers":"Château de Soye et château de Soye Champètre","gps":"","images":["../image/image_25/25_Soye_1.jpg"]},"Consult_chateau_formulaire6c05":{"id":"Consult_chateau_formulaire6c05","dept":"25","canton":"Audeux","commune":"Ecole-Valentin","nom":"St_Esprit","type":"Maison forte","periode":"XVI","histoire":"ST-ESPRIT, Le château dÉcole-Valentin était possession de l'Ordre et de son commandeur  du Saint-Esprit, Claude Buffet, il servait de château d'apparat, de lieu de chapitre et gérait les nombreuses fermes des hôpitaux sous sa dépendance sur les terres dÉcole et de Valentin entre autres.  Le château a été inhabité aux XIXe et XXe siècle, et servit cependant comme salle de classe de travaux pratiques pour les élèves maristes du Prieuré, bâtiment créé au milieu du XIXe siècle en face du château, à côté de la mission de Beaupré, très beau monastère situé également à côté du château, datant lui de 1812.\r\nLe château du Saint-Esprit a été racheté en 2000 par la famille Gayet qui le rénove depuis.","architecture":"Château appelé château du Saint Esprit construit de 1557 à 1559, peut-être sur une base médiévale comme en atteste quelques pierres angulaires encore visibles, est adossé aux bâtiments de la mission. Le château est remarquable par sa façade renaissance, ses latrines à double étage en demi-tour ronde, son escalier à vis  dans la tour carrée, ses quatre monumentales cheminées, ses plafonds à la française, etc. On peut y voir à plusieurs endroits le blason du commandeur de l'Ordre ainsi que la croix de l'Ordre du Saint-Esprit.  Au   dessus de la porte d'entrée on peut voir un blason aux armes du Commandeur du Saint-Esprit Claude Buffet 1540-1570 qui dirigea, au début du XVIe siècle, l'hôpital de Saint Esprit à Besançon. Le château était donné en bailliage  de neuf ans à des fermiers. La façade sur  la vallée est  de style Renaissance,  avec une tourelle centrale, une grande galerie couverte à colonnes s'ouvrant sur les jardins.","habitants":"Claude Buffet\r\n        \r\n        \"","divers":"Château de Saint-Esprit à Ecole-Valentin","gps":"","images":["../image/image_25/25_St_Esprit_1.jpg","../image/image_25/25_St_Esprit_2.jpg","../image/image_25/25_St_Esprit_3.jpg"]},"Consult_chateau_formulaire5a26":{"id":"Consult_chateau_formulaire5a26","dept":"25","canton":"Boussières","commune":"Thoraise","nom":"Thoraise","type":"Château","periode":"XV","histoire":"THORAISE; du XIIIe siècle au XVe siècle, son histoire est étroitement liée aux destins des sires et seigneurs de Montferrand. Il fait partie alors d'un ensemble de fortifications leur appartenant, comprenant celles de Montferrand-le-Château, Torpes, Corcondray, Fourg et Avanne. La seigneurie fut fondée en 1250  par l'un des sept fils de sire Jean de Montferrand, deuxième du nom de la maison des sires et seigneurs de Montferrand-le-Château,  Hugues de Monferrand, tige de la maison de Thoraise. En 1268, Pierre de Montferrand, damoiseau puis vicomte en 1260 nommé par Thibaud IV de Rougemont s'engage alors dans une guerre  avec son oncle Hugues de Montferrand qui a fait allégeance au comte de Bourgogne Othon IV et lui promet de lui remettre les seigneuries de Grandfontaine, de Mont et le bois de Vernois, ces deux derniers actuellement font partie intégrale de la commune de Montferrand et détruit le château de Thoraise.     En 1484  le château passe aux mains des ducs de Bourgogne.  En 1534, il devient propriété des seigneurs d'Achey. Au fil du temps, le château change de propriétaire mais continue de défendre ses prérogatives féodales. A nouveau démoli après 1584, il est rebâti de nouveau au XVIIe siècle. En 1793, le dernier aristocrate du cru, Maximilien d'Izelin de Lanans, maréchal de camp des armées du roi, émigre.  Le domaine est immédiatement vendu comme bien national. En 1964 acquis par madame Deprez qui le revendit  en 2011 est un bisontin  monsieur  Bohrer Sylvain.","architecture":"Le Château de Thoraise a la particularité de se situer sur un méandre du Doubs formant une boucle verrouillée par un rocher, fut édifié au XIIe siècle à son aplomb sur un rocher, rebâti au XIIIe siècle, les murailles ont disparu, mais subsiste le bâtiment central est de plan rectangulaire flanqué aujourd'hui de deux tours et d'un donjon, tous trois carrés, coiffée d'un toit en pavillon. Aujourd'hui le parc domanial, cerné par un mur d'enceinte est ouvert en libre circulation par un sentier de randonnée longeant les berges du Doubs.\r\nAu cours du XIXe siècle le château est restauré dans le respect de son équilibre médiéval, dans un style néo-renaissance.","habitants":"Hugues de Monferrand                                                                Maximilien d'Izelin de Lanans\r\n        \"","divers":"Château de Thoraise","gps":"","images":["../image/image_25/25_Thoraise_1.jpg","../image/image_25/25_Thoraise_2.jpg","../image/image_25/25_Thoraise_3.jpg"]},"Consult_chateau_formulaireb104":{"id":"Consult_chateau_formulaireb104","dept":"25","canton":"Besançon","commune":"Torpes","nom":"Torpes","type":"Château","periode":"XVII","histoire":"TORPES, se dresse sur un rocher, à une vingtaine de mètres de haut. Plusieurs personnages importants y ont vécus ou séjourné.\r\nEn 1333, il est acquis par Guillaume Ier de Thoraise, issu de la famille des sires et seigneurs de Montferrand-le-Château, En 1492, il est incendié par Maximilien, en punition du soutien apporté par la châtelaine à Louis XI. . Il passa ensuite aux mains de la Dames de Torpes, la lignée disparaît en 1494, à sa  mort . Le château fut d'ailleurs brûlé en guise de punition. En 1735, le château a toujours son aspect féodal mais dans la deuxième partie du XVIIIe siècle, Voltaire et sa maîtresse la marquise du Châtelet auraient séjourné quelques jours au château de Torpes. Après la Révolution Française, le château est vendu à un maître de forges, Charles Saint, et reste en possession de cette famille jusquà notre époque.","architecture":"Le château construit dans la 2e moitié du XVIIIe siècle par l'architecte Joseph Galezot. Le château fut modernisé au XIXe siècle et perdit alors son aspect féodal. Il a toutefois conservé une cuisine du XVIIIe, ainsi que ses façades sculptées et des boiseries Louis XVI, la cuisine et les soubassements des tours dangle du XIIIe siècle, les façades, les toitures du bâtiment principal, la grille dentrée, seront inscrits à lInventaire des monuments historiques, en 1949.","habitants":"Voltaire et sa maîtresse la Marquise du Châtelet\r\n        \"","divers":"Château de Torpes","gps":"","images":["../image/image_25/25_Torpes_1.jpg","../image/image_25/25_Torpes_2.jpg","../image/image_25/25_Torpes_3.jpg","../image/image_25/25_Torpes_4.jpg","../image/image_25/25_Torpes_5.jpg"]},"Consult_chateau_formulaire0f6a":{"id":"Consult_chateau_formulaire0f6a","dept":"25","canton":"Audeux","commune":"Pelousey","nom":"Uzel","type":"Château","periode":"XVII","histoire":"UZEL,  accueillant au fil des siècles  plusieurs familles nobles et  bourgeoises.  Au XVIIIe siècle, un Lamy de la Perrière  dut vendre en 1779 la bibliothèque et  le beau mobilier suite à ses déboires conjugaux. A partir du XXe siècle, le  château fut acheté par des religieuses de la Sagesse qui y installèrent une institution pour jeunes filles sourdes et muettes. Elles occupèrent  le château de 1914 à 1934. Puis ce sont  les pères Montfortains, en 1934, qui leur succédèrent et qui créérent en 1953 un séminaire et le collège N-D des Grâces qui fonctionnera jusqu'en 1981.\r\n Le château d'Uzel  est réputé dans toute la région, car il abrite  un centre d'aide par le travail géré par l'adapei.","architecture":"Construit sans doute au début du XVIIIe siècle, ce château  est aujourd'hui bien mystérieux. Perché à 259 mètres d'altitude, il domine le village de Pelousey . En forme de L à deux niveaux toitures  pyramidales  en croupes.","habitants":"Lamy de la Perrière \r\n        \"","divers":"Château d'Uzel","gps":"","images":["../image/image_25/25_Uzel_1.jpg"]},"Consult_chateau_formulaire8ba8-2":{"id":"Consult_chateau_formulaire8ba8-2","dept":"25","canton":"Marchaux","commune":"Vaire-Arcier","nom":"Vaire_le_Grand","type":"Château","periode":"XVII","histoire":"VAIRE-le-GRAND, existait dans la première moitié du XVIe siècle, mais était en ruines  en 1632. La seigneurie est acquise en 1685 par Gabriel Boisot, premier président au parlement de Besançon qui   réaménage une partie de l'ancien château pour compléter son hôtel.    Son fils fit construire le château actuel en 1713-1718 en s'inspirant de modèles parisiens comme Issy et Champs sur Marne  qui fut occupé par la célèbre maîtresse de Louis XV madame de Pompadour.  Au milieu du XVIIIe siècle,  nouvelle série de travaux  sous la conduite de l'architecte Claude-Antoine Colombot.  Jean-Antoine Boisot, ruiné et endetté par ses somptueux travaux, vendra le château aux nièces de sa tante maternelle, orphelines du baron Jean-Jacques Pourcheresse d'Etrabonne, contre la jouissance de son domaine durant sa vie.Simone Bonaventure Étiennette seconde des trois surs après avoir épousé le marquis Louis Badier de Verseille s'installera à Vaire-le-Grand dans la seconde moitié du XVIIIe siècle. En 1814, le prince Aloys de Liechtenstein à la tête de trois divisions de troupes autrichiennes installe son quartier général au château durant six mois de la campagne de France.  En 1817, la Comtesse Etiennette de Malarmey de Roussillon nièce de la Marquise de Versaille Bonaventure hérite du château  En 1885, Fanny Morel, veuve du maître de forges Louis Meiner, acquiert la propriété. Le château passe en héritage en 1902 aux enfants puis petits-enfants de madame Morel: Louise-Elisabeth  madame Jules Reboul de la Juillière, Juliette  madame Nicolas Koechlin puis Elisabeth Reboul de la Juillière  madame Frédéric de Turckheim.  Monsieur Duffet l'achète en 1932 puis le revend en 1934 à Georges Feschotte, qui le revend lui même en 1941 à Jacques Georges de la société  Coton Vosges, qui le cède à la société industrielle du textile Boussac en 1948.","architecture":"Chateau de Vaire-le-Grand, le château moderne est construit en 1713 sur une butte rocheuse située au coeur de la vallée du Doubs. La nature offre de toute part un paysage de toute beauté, riche en diversité naturelle. Point stratégique à l'époque gallo-romaine, la butte témoin était couronnée par un castrum. Le château fort fut construit au XIe siècle par Gauthier de Vare. Cet ancien château fort fut ruiné par Louis XI, au XVe siècle. Après la seconde guerre mondiale,  transformation du château  en colonie de vacances  par la société Boussac. Le corps de logis,  aux élévations soignées avec avant corps centraux, conserve des pièces lambrissées et des cheminées au rez-de-chaussée.  Le jardin se développe devant le corps de logis en trois terrasses, avec parterres, ifs taillés et deux bassins.","habitants":"Gabriel Boisot\r\n        \"","divers":"Château de Vaire le grand et du Jardin","gps":"","images":["../image/image_25/25_Vaire_le_Grand_1.jpg","../image/image_25/25_Vaire_le_Grand_2.jpg","../image/image_25/25_Vaire_le_Grand_3.jpg","../image/image_25/25_Vaire_le_Grand_4.jpg","../image/image_25/25_Vaire_le_Grand_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','25 — Doubs'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
