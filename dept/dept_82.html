t dHermangarde de Mondenard. Ces derniers hésitèrent longtemps entre le nom de Montaigut et celui de Mondenard et finirent par opter pour de Mondenard.                                                                                                                                     LAUTURE , le château fut détruit en 1214 par Simon de Montfort, puis en 1320 par les Pastoureaux et en 1445 lors de lexpulsion des anglais. En 1401, Jean de Mondenard, en raison des bons services quil avait reçu de Raymond de Narcès, lui donna tous ses biens à Raymond de Narcès devint seigneur de Mondenard. A la fin du XVIe siècle, la seigneurie de Lauture entra dans la famille de Montagut. En 1578, une descendante de la famille de Montagut épousa Charles dEscayrac. En 1621, Lauture fut incendié et détruit par Maximilien de Béthume, comte dOrval, qui détruisit les propriétés des partisans du roi pendant le siège de Montauban.  Relevé de ses ruines par Mathurin dEscayrac, seigneur de Lauture, de 1630 à 1640, il fut assiégé et pillé le 5 février 1790 par des paysans révoltés.","architecture":"Cazes Calez actuellement très remanié.                                                                                       Lauture, lactuel édifice a été reconstruit en grande partie depuis 1884 par larchitecte bordelais Abel Duphot ; projets de construction par Forestier, Horeau, Petit et Eugène Viollet-le-Duc. De plan rectangulaire à trois niveaux  toits à deux pans coupé par un pavillon rectangulaire à cinq niveaux toit à l'impérial à l'opposé une tour carrée, un pavillon carré hors oeuvres et accolée d'une tourrelle de six niveaux à toit très pointu en poivrières.                                                                                                                                                    Mondenard de plan rectangulaire corps de logis central à trois niveaux accolé de chaque côté de dépendance à deux niveaux avec des toits en croupes.","habitants":"Famille de Mondenard                                                                                       famille de Montagut \r\n        \"","divers":"Château de Cazes, de Lauture et Mondenart","gps":"","images":["../../jctruffet.com/image/image_82/82_Cazes_Mondenard_1.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_2.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_3.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_4.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_5.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_6.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_7.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_8.jpg","../../jctruffet.com/image/image_82/82_Cazes_Mondenard_9.jpg"]},"Consult_chateau_formulaire9b0c":{"id":"Consult_chateau_formulaire9b0c","dept":"82","canton":"Septfonds","commune":"Parisot","nom":"Cornusson","type":"Forteresse","periode":"XV-XVII","histoire":"CORNUSSON,  Le lieu de Cornusson apparaît en 1157 dans l'acte déterminant l'une des quatre parts du castel de Parisot. Il est encore mentionné en 1214 dans la donation faite à l'abbaye de Beaulieu par Pierre Austorc de tous ses biens. En 1391, la terre de Gérald Cornus figure parmi les \"confronts\" de la seigneurie de Parisot, dans un acte d'hommage rendu par Pierre Valette à Bernard d'Armagnac, doit moins sa réputation à son architecture qu'à la famille de la Valette, qui lui est associée. en 1445 dans la succession d'Almaric de la Valette, attribué à son second fils Bernard. Le fils aîné de ce dernier , Pons, le céda en 1500 à son frère Guilhot, auteur de la branche des Valette-Cornusson, le fils de Guilhot, François  de la Valette-Cornusson, évêque de Vabres fit reconstruire en majeure partie l'édifice  au milieu du XVIe siècle, les travaux furent achevés par son petit neveu, également évêques de Vabres, vers 1610. Le plus illustre représentant, Jean de La Valette-Parisot, né au château de Labro, devient grand maître de l'ordre de Saint-Jean de Jérusalem le 21 août 1557 et se distingue en défendant Malte contre les Turcs, en 1565. Il fonde la cité de La Valette et y meurt peu après en 1568. Ses membres exercent des fonctions importantes dans l'Etat et l'Eglise. Certains servent durant les guerres d'Italie ou les guerres de Religion. les marquis de Puylaroque héritèrent du château de Cornusson à la fin du XVIIe siècle et le conservèrent jusqu'en 1802 date à laquelle il fut acquis par maître Jean-Antoine Cambe notaire à Verfeil dont descend l'actuelle propriétaire madame Sabatier Lajous.","architecture":"L'édifice occupe l'extrémité d'un plateau situé au confluent de la Seye et du ruisseau de Fonpeyrouse d'où il domine l'ancien hameau de Cornusson établi à la jonction des deux vallées. L'ouvrage d'entrée et l'aile sud du logis, avec son escalier à vis et probablement la tour sud-ouest sont de la fin du XVe ou du début du XVIe siècle. Le reste du logis fut construit durant le quatrième quart du XVIe siècle. Les communs datent de la fin du XVIe ou du premier quart du XVIIe siècle. A l'intérieur, les cheminées monumentales, ornées de stuc, semblent dater du deuxième quart du XVIIe siècle, celle en bois est postérieure à 1640. Des remaniements intérieurs furent entrepris, dates 1756 et 1777, portées sur une cheminée et une porte, l'aile sud fut cloisonnée et aménagée à la fin du XIXe siècle. Une porte remployée dans le logis provient du château de Pech Rodil à Varen. Communs voûtes en berceau plein-cintre, couverts d'un toit en terrasse; logis couvert d'ardoise; ouvrage d'entrée couvert de pierre; étage de soubassement voûte en berceau en anse de panier.","habitants":"Famille de La Valette-Cornusson\r\n        \"","divers":"Château de Cornusson à Parisot","gps":"","images":["../../jctruffet.com/image/image_82/82_Cornusson_1.jpg","../../jctruffet.com/image/image_82/82_Cornusson_2.jpg","../../jctruffet.com/image/image_82/82_Cornusson_3.jpg","../../jctruffet.com/image/image_82/82_Cornusson_4.jpg","../../jctruffet.com/image/image_82/82_Cornusson_5.jpg","../../jctruffet.com/image/image_82/82_Cornusson_6.jpg","../../jctruffet.com/image/image_82/82_Cornusson_7.jpg","../../jctruffet.com/image/image_82/82_Cornusson_8.jpg","../../jctruffet.com/image/image_82/82_Cornusson_9.jpg"]},"Consult_chateau_formulairee51b":{"id":"Consult_chateau_formulairee51b","dept":"82","canton":"Beaumont de Lomagne","commune":"Cumont","nom":"Cumont","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à Cumont dont celui de Cumont, de Fours  de la Mothe et de Wanlin.                                                                    CUMONT, la seigneurie appartient à la famille de Cumont jusqu'à 1350, puis aux Galard au XVe siècle et aux Montesquiou-Xaintrailles dès 1570. Cumont resta aux mains des Lucmajour au XVIIe siècle. Une période trouble frappa alors la seigneurie: dettes,  aboutirent à l'entrée de Cumont dans la famille de Bacalan, qui s'en sépare en 1754 au profit de François de Pagès, comte de Beaufort. Cette famille gardera la terre de Cumont jusqu'au XXe siècle. En 1908 Auguste Bernard Cassaigneau acquiert le château.                                        FOURS, au XVIIe siècle, le château des Fours était en possession de la famille de Bassabat de Pordéac. Cest au château des Fours que naquit Catherine de Bassabat, fille de Henri de Bassabat, comte de Pordéac et de Noble Françoise de Lary. En 1669, Antoine-Scipion de Bassabat, seigneur de Pordéac, mourut dans sa « Maison noble et seigneuriale des Fours, le 18 septembre 1669 ».  Au XVIIIe siècle, la demeure passa à la famille de Fajolles-Pordéac. En 1811, Jean-François-Marie de Fajolles-Pordéac, conseiller au parlement de Toulouse en 1790 , vendit le château à M. Laroque, notaire à St-Clar. En 1900, son arrière petit fils, Lasserre, était propriétaire du château, qui était déjà en ruine.          LA-MOTHE à Cumont,  il a appartenu à la famille des de Cumont, qui possédait la seigneurie voisine. Depuis le XIIIe siècle la communauté villageoise sorganise autour de sa tour de guet construite en bois et entourée dun fossé.","architecture":"Cumont, le bâtiment se compose d'un sous-sol et un étage carré, le gros-oeuvre: calcaire, pierre de taille, brique crue, enduit. Type de couverture: croupe et toit en pavillon couverts de tuiles creuses et de tuiles plates. Le parc comprend des communs, des écuries, une remise, un four à pain, un chai, des parties agricoles et un pigeonnier.                                                                                        Fours, du XVIIe siècle de plan rectangulaire de style féodal   avec quatre  échauguettes sur angles en encorbellement.                                                               La Mothe, château de style néoclassique et dépoque Louis-Philippe de 1840 (« après 1837 »), avec une élégante façade latérale à balcon central sur la place du village, à lest. La longue façade méridionale regardant les Pyrénées.                                                                                                                                   Wanlin, manoir de plan carré à deux niveaux  et  lucarnes à","habitants":"Famille de Bacalan                                                                                   Famille de Bassabat de Pordéac                                                                     Famille des de Cumont\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Cumont,  de Fours , de la Mothe et de Wanlin à Cumont.","gps":"","images":["../../jctruffet.com/image/image_82/82_Cumont_1.jpg","../../jctruffet.com/image/image_82/82_Cumont_2.jpg","../../jctruffet.com/image/image_82/82_Cumont_3.jpg","../../jctruffet.com/image/image_82/82_Cumont_4.jpg"]},"Consult_chateau_formulaire5b61":{"id":"Consult_chateau_formulaire5b61","dept":"82","canton":"Valence d","commune":"Auvillar-Espalais et Pommevic","nom":"Espalais_Auvillar","type":"Château","periode":"XV","histoire":"Auvillar, voisin d'Espalais dont le château de Lastours  et de Pommevic plus au nord                                                                                                                                                       AUVILLAR, à la fin du XIVe siècle, le nom d'Altavilla apparait au XVe siècle, et il est dû à Aimeric de Peyrac. Le vicomté d'Altavilaris, qui appartient à un fils du roi de France, Philippe le Bel, en 1304, est donné à la famille Bertrand de Goth, futur pape. Celui-ci fait plusieurs séjour à Auvillar et demande la reconstruction de l'ancienne église. Le château d'Auvillar a été détruit en 1572. Le roi de Navarre repris d'ailleurs Auvillar où il séjourna du 13 au 15 novembre 1574, mais il se garda de reconstruire le château. On ignore si les souterrains qui en dépendaient existent encore au-dessous de la place du château.                                                                                                                                     LASTOURS, à Espalais  Imposante bâtisse du XVe siècle, nichée dans un écrin de verdure. Le château de Lastours dresse sa fière et élégante silhouette dans un parc de 3 hectares, il est situé près d'un lac et d'un golf. Ses dirigeants sont M Stanley Pearce et  M Carmel Joseph Jean Muscat. L'édifice est mentionné par la carte de Cassini sous le nom de château d'Espalais. Un plan cadastral de 1807 indique une implantation des bâtiments identique à celle du cadastre  de I8I8.   Le château aujpourd'hui chambres d'hôtes.                                                                                                                                                   POMMEVIC, pas d'informations historiques dont le nom vient du latin \"pomarium vicus\" qui signifie \"village de pommiers\". Ce fut, au Moyen-Age, le siège de l'un des plus important prieuré de l'abbaye de Moissac.","architecture":"Auvillar bien que classé parmi les plus beaux villages de France ne possède plus de château seul la tour de l'horloge du  XVIe siècle  et la maison du consuls.                                                                                                                                            Le château de Lastours bâti au XVe siècle, témoigne des fastes de la Renaissance.Imposante bâtisse flanquée de quatre tours, il se niche dans un écrin de verdure, abrité par des arbres centenaires aux essences rares et dresse sa fière et élégante silhouette dans un parc de 3 hectares situé à proximité dun lac offrant un charme et une sérénité incomparable. Situé au pied d'Auvillar, étape du chemin de St-Jacques de Compostelle et, à la sortie du petit village d'Espalais en Tarn et Garonne, Si le corps central du château,dans son état actuel, peut correspondre au\r\nmoins en partie à celui de 1818, les ailes en retour semblent avoir été entièrement reconstruites, probablement vers 186I. Les travaux ont abouti à une très grande homogénéité de l'édifice.  Les griffons en terres cuites qui ornent la terrasse sud-ouest portent l'inscription Fournel en lettres cursives.                                                                                                          Pommevic, ce gros clocher carré de briques rouges à la croisée du transept est surmonté à son angle sud ouest dun petit campanile. La façade occidentale ne présente rien de particulier. Pour découvrir le chevet, il faut entrer dans le petit cimetière au nord. Cette abside, accolée à un autre bâtiment au sud, est flanquée au nord dune tour escalier cylindrique équipée de meurtrières. Elle possède de son origine une ligne de modillons supportant un entablement droit.","habitants":"Famille de M. Stanley Pearce\r\n        \"","divers":"Château de Lastours à Espalais et à Pommévic et Auvillar, la maison du consul et porte-horloge.","gps":"","images":["../../jctruffet.com/image/image_82/82_Espalais_Auvillar_1.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_2.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_3.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_4.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_5.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_6.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_7.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_8.jpg","../../jctruffet.com/image/image_82/82_Espalais_Auvillar_9.jpg"]},"Consult_chateau_formulaire9ef1":{"id":"Consult_chateau_formulaire9ef1","dept":"82","canton":"Albias","commune":"Molières","nom":"Espanel","type":"Château","periode":"XV","histoire":"ESPANEL, la seigneurie d'Espanel était divisée au XIIIe siècle entre plusieurs familles nobles : les Gourdon de Castelnau, les Durfort, les Saint-Germain, les Caussade et les Montpezat.  Il semble que les Saint-Germain aient possédé une part importante de la seigneurie. En 1251, un membre de la famille de Gauléjac aurait épousé l'héritière des Saint-Germain et aurait alors repris les armoiries de son épouse.  En 1466, Pierre de Gauléjac reçoit du roi Louis XI des lettres de rémission pour sa participation à la ligue du bien public. Son fils aîné, Bertrand, obtient de Charles VIII en 1493 le détachement de la seigneurie d'Espanel de la juridiction de Molières pour tout ce qui touche à la justice.  En 1572, une lettre d'Honorat de Savoie-Villars, gouverneur de Guyenne, demande expressément à Jean-François de Gauléjac, seigneur d'Espanel d'ouvrir son domaine pour accueillir les fuyards. En 1604, le fils de ce dernier, Sébastien de Gauléjac, est assassiné par Gabriel d'Escayrac au château de Lauture, près de Cazes-Mondenard. Son propre fils, Jean-Claude de Gauléjac est tué en 1610 par Raymond de Lastours. La seigneurie passe à la famille, Louise de Gauléjac, qui épouse en 1626 Pierre du Breuil, fils de Jean du Breuil, seigneur de Cas en Rouergue. A son tour, le nouveau seigneur d'Espanel abandonne ses armoiries  pour reprendre celles des Saint-Germain. En 1698, Jean du Breuil d'Espanel est maintenu noble par l'intendant de la généralité de Montauban. En 1773, la dernière héritière des du Breuil épouse Jacques-Antoine de Molières. Le fils de ce dernier, Jacques, décède en 1862 sans descendant. Il lègue le château d'Espanel à son valet de pied Louis Bouniols. Le petit-fils de celui-ci, Gaston Bouniols, président du Conseil Général du Tarn-et-Garonne et sénateur, meurt en 1934, sans enfants. Sa veuve, Louise-Olga, lègue Espanel à Edouard Berthoud, qui le vend en 1968.","architecture":"Espanels plus maison forte que château de plan en V, corps de logis principal à trois niveaux rectangulaire toit en croupe prolongé sur l'arrière d'un bâtiment rectangulaire à toit à deux pans, l'ensemble toit en tuiles et sur  façade prolongé de deux dépendances se terminant par une  tour ronde dont une plus arasé  à toit presque plat.","habitants":"Famille de Jean du Breuil d'Espanel \r\n        \"","divers":"Château d'Espanel à Molières","gps":"","images":["../../jctruffet.com/image/image_82/82_Espanel_1.jpg","../../jctruffet.com/image/image_82/82_Espanel_2.jpg","../../jctruffet.com/image/image_82/82_Espanel_3.jpg","../../jctruffet.com/image/image_82/82_Espanel_4.jpg","../../jctruffet.com/image/image_82/82_Espanel_5.jpg","../../jctruffet.com/image/image_82/82_Espanel_6.jpg"]},"Consult_chateau_formulaire10f7":{"id":"Consult_chateau_formulaire10f7","dept":"82","canton":"Septfonds","commune":"Féneyrols","nom":"Féneyrols","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux à Féneyrols celui de Féneyrols du XIVe siècle et celui de Capduech du XVe siècle                                                                                                       FENEYROLS, l'édifice cité en 1323 par Raymond de Castelnau, seigneur de Féneyrols, est à lorigine une maison forte. Par le mariage dHélips, fille de Raymond de Castelnau, avec Guillalmon de Lafon, la propriété resta pendant 400 ans dans cette famille. En 1763, le domaine fut racheté par adjudication par Antoine de Rous, président trésorier de France du bureau des finances à Montauban et co-seigneur dAubin en Rouergue.                                                        CAPDUELH, en 1323, un donjon est cité appartenant à Raymond de Castelnau. En 1362, les anglais s'emparent du château. En 1363, l'armée royale Française reprend le château. Au XVe siècle, la seigneurie passe par mariage à la famille Lafon. A la fin du XVe siècle, le château est partiellement reconstruit en utilisant ses structures médiévales. En 1763, le château est acheté par Antoine de Rous, trésorier royal à Montauban. En 1951, certaines parties du château sont inscrites aux Monuments Historiques.","architecture":"Féneyrols, se compose d'un corps de bâtiment principal dont la façade date des XVe et XVIe siècles, présente un plan complexe dû aux aménagements successifs dont il a fait lobjet. Du XVe siècle datent lescalier de pierre à vis renfermé dans la tour ronde à la toiture biseautée, les fenêtres à meneaux, certaines baies chanfreinées, équipées intérieurement de siège en pierre et les mâchicoulis qui couronnent le mur ouest. Le chemin de ronde est supporté par des consoles de pierre à trois ressauts en quart de rond. Lintérieur a été transformé au XIXe siècle, comme a été reconstruite laile en retour. Capduelh cité en 1338 ; il est reconstruit à la fin du XVe ou au début du XVIe siècle sur les substructures de l'édifice antérieur ; l'aile nord, le corps de bâtiment en bordure de l'Aveyron et la terrasse sont reconstruits vers 1869 et 1890 ; le moulin, dont la partie inférieure semble médiévale, porte la date 1828 ; une crue de l'Aveyron le détruit partiellement en 1930 , il est reconstruit peu après par l'architecte Olivier.  Les mâchicoulis sont en pan de bois hourdé de tuf, étage de soubassement , 2 étages carrés,  avec escalier demi-hors-oeuvre , escalier à vis sans jour , en maçonnerie gros-oeuvre calcaire , moellon , tuf couverture, toit à longs pans , appentis couverture, tuile creuse.","habitants":"Raymond de Castelnau                                                                              Famille Lafon\r\n        \r\n        \"","divers":"Château de Féneyrols et de Capdueh.","gps":"","images":["../../jctruffet.com/image/image_82/82_Feneyrols_1.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_2.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_3.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_4.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_5.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_6.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_7.jpg","../../jctruffet.com/image/image_82/82_Feneyrols_8.jpg"]},"Consult_chateau_formulaire42f9":{"id":"Consult_chateau_formulaire42f9","dept":"82","canton":"Beaumont de Lomagne","commune":"Gariès","nom":"Gariès","type":"Château","periode":"XVIII-XIX","histoire":"GARIES, le 25 avril 1552, Noble Gilis de Leaumont seigneur de Puygailhard, Gariès et autres places donne à Noble Jehan de Leaumont « capitaine de chevalerie légère » son frère pour sa part des biens, la seigneurie de Gariès avec toutes ses dépendances sauf le moulin qui était commencé à bâtir aux Turratz avec pacte de rachat. Jehan de Léaumont ayant besoin d'argent la vendit à Charles de Peyrusse des Cars, évêque de Poitiers. Finalement par revente elle retourna en 1566 au seigneur de Puygailhard.","architecture":"Le château de Gariès se situe légèrement à l'écart du village ; il reste encore quelques vestiges de la construction primitive. Au XVIe siècle léglise Saint-Jacques fut détruite par les huguenots en 1587 et reconstruite au XVIIe siècle. Logis de la 2e moitié du XVIIIe siècle ; communs construits au début du XIXe siècle avant 1837.","habitants":"Famille de Léaumont\r\n        \r\n        \"","divers":"Château de Gariès","gps":"","images":["../../jctruffet.com/image/image_82/82_Garies_1.jpg","../../jctruffet.com/image/image_82/82_Garies_2.jpg","../../jctruffet.com/image/image_82/82_Garies_3.jpg","../../jctruffet.com/image/image_82/82_Garies_4.jpg"]},"Consult_chateau_formulairec341":{"id":"Consult_chateau_formulairec341","dept":"82","canton":"Valence d","commune":"Gasques","nom":"Gasques","type":"Château","periode":"XIV","histoire":"GASQUES, fondée au Xe siècle par la famille de Gasques, la paroisse de Gasques fut au moins dès le XIIIe siècle, dans la mouvance de Moissac. Aimery de Peyrac la mentionne dans ses chroniques parmi les bénéfices de labbaye. Le château de Gasques a été construit dans la première moitié du XIVe siècle. Guillaume du Lyon est seigneur de Gasques en 1504,  cette famille est propriétaire du château à la Révolution.","architecture":"A Gasques, remaniements importants au XVIIIe siècle (portail daté 1708,  puits daté 1787), construction d'un bâtiment de dépendances et réfection partielle du logis en 1831 (porte la date). L'édifice de plan régulier, se compose d'un étage carré, le gros-oeuvre en pierre, pierre de taille, moellon, brique, bois, pan de bois et enduit partiel, élévation à travées surmontée d'une croupe et toit à longs pans couverts de tuiles creuses et de tuiles plates.","habitants":"Guillaume du Lyon\r\n        \"","divers":"Château de Gasques","gps":"","images":["../../jctruffet.com/image/image_82/82_Gasques_1.jpg","../../jctruffet.com/image/image_82/82_Gasques_2.jpg"]},"Consult_chateau_formulairecfdd":{"id":"Consult_chateau_formulairecfdd","dept":"82","canton":"St-Antonin-Noble-Val","commune":"Ginals","nom":"Ginals","type":"Vestiges Château","periode":"XIV","histoire":"GINALS-PERVINQUIERES,  château  cité en 1370 et 1371 ,  acquis de Bertrand et Brenguier Valete, frères du lieu du Cuzoul. Nous ignorons si le château actuel correspond véritablement au \"repaire\" acheté par les religieux de  Beaulieu, mais son importance a dû être semblable, car le texte mentionne déjà des tours. En février 1587, le château est pris par les protestants. Cette opération n'ayant pas été  autorisée par les consuls de Saint-Antonin, ceux-ci envoient des délégués pour examiner si la position est tenable et si les occupants veulent reconnaître l'autorité des consuls. Quelques jours plus tard, le capitaine Rabastens abandonne le château sans raison apparente.\r\nEn 1789, les religieux détenaient encore un château en ruines et une métairie, le tout situé au village de Pervinquières.","architecture":"Le château primitif de Ginals  de plan rectangulaire (40 m x 37,5 m env.) se composait de plusieurs corps de bâtiment entourant une cour. Au sud, il est cantonné de deux tours carrées. Une enceinte, également cantonnée de deux tours, a été ajoutée ultérieurement au nord pour agrandir l'édifice qui, de ce côté, est installé sur le roc et surplombe une petite source. Le corps de bâtiment ouest et la tour sud-ouest  comportaient au moins un étage, tandis que la tour sud-est  possède encore trois étages.\r\nLes autres bâtiments sont entièrement ruinés, seuls les départs ou les bases de quelques murs permettent de les localiser.  Elèvation nord  : envahie par la végétation, elle ne subsiste que comme mur de soutènement; hauteur actuelle du mur: 6 mètres environ. La protection de la porte était également assurée par la tour sud-est  et peut-être parune autre tour située à l'extrémité de la façade nord-est. Mais dans l'état actuel, il ne subsiste pas de traces de tour de flanquement au nord.","habitants":"Capitaine Rabastens\r\n        \"","divers":"Vestiges du château de Pervenquières à Ginals.","gps":"","images":["../../jctruffet.com/image/image_82/82_Ginals_1.jpg","../../jctruffet.com/image/image_82/82_Ginals_2.jpg","../../jctruffet.com/image/image_82/82_Ginals_3.jpg","../../jctruffet.com/image/image_82/82_Ginals_4.jpg","../../jctruffet.com/image/image_82/82_Ginals_5.jpg","../../jctruffet.com/image/image_82/82_Ginals_6.jpg"]},"Consult_chateau_formulaire7274-2":{"id":"Consult_chateau_formulaire7274-2","dept":"82","canton":"Beaumont de Lomagne","commune":"Goas","nom":"Goas","type":"Gentilhommière","periode":"XIII-XIV","histoire":"Goas Léthymologie de Goas sexplique par le terme occitan « Bofar » qui signifie « souffler ». En effet, le toponyme se rencontre sous les formes de Gofans au XIIe siècle et de Boffeneis au XIVe siècle.\r\nA cette époque la paroisse et le prieuré qui lui étaient adjoints dépendaient de lAbbaye du Mas-Granier ; ils furent cédés au XIIIe siècle à lévêque de Montauban. La seigneurie temporelle a appartenu longtemps à une branche de la famille de Gontaut-Biron, les comtes de Goas, un de ses membres Louis de Biron eut pour parrain le roi Louis XIII.\r\nSes descendants ont possédé une grande partie des terres, sous forme de métairies dont le souvenir se retrouve dans les noms de certains lieux-dits, comme la Grande Borde.  La seigneurie de Goas appartient, en 1271, à Guillaume Assi et relève des seigneurs Jourdain et Jean-Jourdain de l'Isle. Guillaume Assi est probablement de la famille connue sous le nom de Goas ou de Goffas, à qui cette seigneurie appartient avant comme après 1271. Jean de Goas est seigneur du même lieu en 1467, mais peu après la maison de Goas se fond avec celle de Biran d'Armagnac. Un de ses membres, Louis de Biran, eut pour parrain le roi Louis XIII.","architecture":"Entre le XIIe et le XIVe, la paroisse et le prieuré qui lui étaient adjoints dépendaient de lAbbaye du Mas-Grenier ; ils furent cédés au XIIIe siècle à lévêque de Montauban. Goas gentilhommière avec cours fermée  bâtiments oblong de deux niveaux toit en croupe.","habitants":"Famille de Gontaut-Biron\r\n        \"","divers":"Gentilhommière de Goas","gps":"","images":["../../jctruffet.com/image/image_82/82_Goas_1.jpg","../../jctruffet.com/image/image_82/82_Goas_2.jpg"]},"Consult_chateau_formulaire8755-2":{"id":"Consult_chateau_formulaire8755-2","dept":"82","canton":"Valence d","commune":"Golfech","nom":"Golfech","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Golfech tous orientés aujourd'hui vers la restauration et chambre d'hôtes   et à quelques kilomètres au nord ouest direction Agen le château de Larroque  dont je n'ai aucune information historique.                                                                                                                                                     GOLFECH, en 1311 cet ordre fut supprimé et tous ses biens passèrent à celui de Saint-Jean de Jérusalem qui fut appelé à la commanderie de Golfech et rattaché à la commanderie de Castelsarrasin. Vers 1378, Pierre de Varas, le commandeur, fixa les limites de ce qui allait être la commanderie même des Templiers.  De 1311 au 6 février 1793, date à laquelle les biens de l'ordre de Malte furent proclamés « biens nationaux », trente sept commandeurs avaient eu charge de l'administration ; les plus illustres furent semble-t-il Bernard de Montlezun (1465-1477), Pierre d'Esparbès Luzan (1579-1617), André de Grille (1731-1751), Gaspard Hiacynthe de Grille Destoublon (1757-1761). En 1569 et 1588, au moment des guerres de religion, la commanderie toute entière fut mise à sac et incendiée. En 1792 elle fut vendue comme bien national, et toutes ses possessions furent dispersées.","architecture":"Certes, il ne semble apparemment, subsister aucune trace intéressante des anciens bâtiments. Il faut pourtant descendre le chemin qui conduit à « Darré-Loc ».  une importante muraille bâtie en briques rosées, à la façon toulousaine, ayant grande allure avec ses contreforts, ses meurtrières grossières, et sa série d'élégants « oculus » circulaires. Elle forme la façade d'un bâtiment construit sur les remparts, dont le mur nord a été modifié et rebâti en partie. Ce bâtiment actuel comprenait le grenier et la prison de l'ancien château, le grenier à droite, et la prison à gauche. Les « occulus » destinés primitivement à l'éclairage des combles, ont été transformés au cours des circonstances de guerre, en meurtrières, par un ébrasement intérieur très visible.\r\nC'est tout ce qui rappelle l'ancienne commanderie qui, pourtant, comprenait un mur d'enceinte fortifiée, un chemin de ronde avec créneaux, des fossés, un pont-levis, etc. et au centre, une église romane.","habitants":"Seigneurs Locaux\r\n        \"","divers":"Divers châteaux à Golfech","gps":"","images":["../../jctruffet.com/image/image_82/82_Golfech_1.jpg","../../jctruffet.com/image/image_82/82_Golfech_2.jpg","../../jctruffet.com/image/image_82/82_Golfech_3.jpg","../../jctruffet.com/image/image_82/82_Golfech_4.jpg"]},"Consult_chateau_formulairea1de":{"id":"Consult_chateau_formulairea1de","dept":"82","canton":"Valence d","commune":"Goudourville","nom":"Goudourville","type":"Forteresse","periode":"XII-XVII","histoire":"GOUDOURVILLE, ce lieu sappelle  Gothorum villa  car les Wisigoths sinstallent au Ve siècle entre le bas Quercy et Toulouse. Ce territoire carolingien est concédé en 947 à labbaye de Bonneval. Elle sera détruite par les normands. Au XIe siècle, Hughes de Gasques y construit un château en forme de « V »  et y installe la seigneurie de Goudourville, vassale de la seigneurie de Clermont Soubiran et construit le château. Le 24 février 1278, Séguy et Pierre de Gasques octroient les coutumes aux habitants de la châtellenie de Goudourville par acte authentique.\r\nDes personnes illustres sont les hôtes de Goudourville, notamment Bertrand de Goth, 1er Pape d'Avignon sous le nom de Clément V, l'évêque de Lectoure , Henri IV et l'Intendant Royal de Montauban.  La liste des propriétaires, au fil des siècles est parsemée de noms illustres, Durfort, Saint-André, Caumont, d'Affis, d'Orléans, Longueville, autant de familles qui ont fait lhistoire de France. Le pape ClémentV s'y arrêta en  1305, Charles IX y séjourna en 1569 et Henri de Navarre y passa en 1587 après la bataille de Coutras.\r\nAujourdhui, le château de Goudourville propose des séjours médiévaux dans ses murs et organise des soirées à thèmes qui permettent par exemple de sinitier à la cuisine médiévale ou de découvrir les codes moyenâgeux de la beauté et de lhygiène. Les visiteurs peuvent également banqueter à la lueur des chandelles et en costumes dépoque.","architecture":"Cette forteresse de Goudourville  du XIIe siècle remanié au XVe siècle et au XVIe siècle, doit sa notoriété en raison de sa situation, les limites du Quercy devenant les « Marches » du Royaume de France. Poste dhonneur, davant garde, il concède à son possesseur le titre de marquis, le « défenseur des Marches ». En forme de « V » pour que les deux tours dangle fassent des tirs croisés et assurent la sécurité maximale.  Corps de logis  de plan en L  à trois niveaux flanqué aux extrémités de  pavillons rectangulaires de même niveaux dont un avec mâchicoulis et au creux intérieur de l'édifice tour carrée avec terrasses  de trois niveaux crénelée à mâchicoulis.","habitants":"Seigneurie de Goudourville\r\n        \"","divers":"Forteresse de Goudourville","gps":"","images":["../../jctruffet.com/image/image_82/82_Goudourville_1.jpg","../../jctruffet.com/image/image_82/82_Goudourville_2.jpg","../../jctruffet.com/image/image_82/82_Goudourville_3.jpg","../../jctruffet.com/image/image_82/82_Goudourville_4.jpg","../../jctruffet.com/image/image_82/82_Goudourville_5.jpg","../../jctruffet.com/image/image_82/82_Goudourville_6.jpg","../../jctruffet.com/image/image_82/82_Goudourville_7.jpg"]},"Consult_chateau_formulairec098":{"id":"Consult_chateau_formulairec098","dept":"82","canton":"St-Nicolas de la Grave","commune":"Saint-Nicolas de la Grave","nom":"Gramont","type":"Forteresse Château","periode":"XIII-XVI","histoire":"Deux châteaux à Saint-Nicolas de la Grave celui de Gramont du XIIIe siècle et celui des Havarès du XVIIe siècle.                                                                                                     GRAMONT, forteresse, la construction  date du XIIIe au XVIe siècle.  La famille de Montaut édifie au XIIIe siècle un château fortifié sur un fief reçu de Simon de Montfort. En 1491 la seigneurie passe par alliance de Guillaume de Voisins  et Françoise de Montaut, dont l'un des descendants, Aymeric époux d'une filleule de Catherine de Médicis font rajouter une aile. Les Voisins gardent le château jusqu'au début du XVIIe siècle. François de Voisins à sa mort en 1626 laisse deux filles, l'une épousa en 1642    Jean de Baudéan marquis de Parabère, mais le domaine passe peu de temps après à sa nièce Marie Félice de Gourdon de Guenouillac marié à Gaspard le Secq marquis de la  Motte-Saint-Héraye  conseiller au parlement de Paris, à la mort de Gaspard le   château en 1705 est vendu à Guillaume de Caulet président au parlement de Toulouse son descendant meurt  en 1794 sur l'échafaud, sa fille la baronne d'Aspe héritière transmet le domaine à sa fille qui épouse le baron de Montbel ministre de Charles X. Vendu de nouveau  à monsieur  de la Fontan de Goth qui entreprend une restauration  radicale passera ensuite dans diverses mains au XXe siècle et sera à l'abandon, en 1961, acquis par Marcelle et Roger Dichamp qui lui rendront sa beauté et son lustre, grâce à une décoration des années 1970 puis ils feront don du château au centre des monuments nationaux, il le lègue à la caisse nationale des monuments historiques,                                                                                                                                                         Château de Gramont, chambres d'hôtes.                                                                                                                                          Manoir des Havarès  du XVIIe gîtes de France de  Mme Patricia Sigaud.","architecture":"Gramont, d'abord médiéval, il est agrandi à la Renaissance et exprime toute la personnalité et le caractère d'une belle demeure du Sud-Ouest. Il subsiste du château de Gramont du XIIIe siècle, son imposante tour aujourd'hui découronnée, de Simon de Monfort à laquelle fut rajouté au XIVe siècle, un vaste logis. Le château devient une forteresse au XIVe siècle avec la construction de l'entrée gothique, puis entre 1535 et 1545 se construit une belle aile Renaissance formant un L avec le corps de bâtiment primitif, placée en équerre par rapport à l'ancien château, Les façades et toitures, ainsi que le grand salon de réception et l'escalier droit intérieur sont classés au titre des monuments historiques par arrêté du 21 février 1973 ; le reste du château bénéficie d'une inscription depuis le 1er avril 1947. L'accès au château de Gramont se fait par un châtelet au porche surmonté de sculptures de style gothique. Le  château comporte deux parties, une partie gothique et une aile Renaissance. Une fois passé le châtelet on accède à l'aile Renaissance aux fenêtres à meneaux. Un escalier voûté d'ogives, hélicoïdal et sans noyau central, mène à un petit oratoire. Les pièces ont gardés des pavements dorigine.\r\nDe l'ancien château, il ne reste qu'une tour fortifiée : la tour Simon de Montfort.                                                                                                                                     Havenès  de plan rectangulaire à deux niveaux toit en croupes.","habitants":"Famille de Montaut\r\n        \"","divers":"Château de Gramont et d'Havanès  à Saint-Nicolas de la Grave","gps":"","images":["../../jctruffet.com/image/image_82/82_Gramont_1.jpg","../../jctruffet.com/image/image_82/82_Gramont_2.jpg","../../jctruffet.com/image/image_82/82_Gramont_3.jpg","../../jctruffet.com/image/image_82/82_Gramont_4.jpg","../../jctruffet.com/image/image_82/82_Gramont_5.jpg","../../jctruffet.com/image/image_82/82_Gramont_6.jpg","../../jctruffet.com/image/image_82/82_Gramont_7.jpg","../../jctruffet.com/image/image_82/82_Gramont_8.jpg","../../jctruffet.com/image/image_82/82_Gramont_9.jpg"]},"Consult_chateau_formulaire3e02":{"id":"Consult_chateau_formulaire3e02","dept":"82","canton":"Beaumont de Lomagne","commune":"Esparsac","nom":"Haumont","type":"Château","periode":"XVI-XVII","histoire":"HAUMONT, érigé en marquisat à la fin du XVIIe ou au début du XVIIIe siècle, un beau château, comme le qualifie certain document fut probablement construit par les Polastron à cette époque, agrémenté dun parc  dArgombat (1183), Pierre de Balsamont et Raymond de Bessens (1277), de Ferrière (XIV siècle), dArgombat (début XVe siècle.), de Lupé (XVe et XVI e siècle.), de Polastron, par mariage avec une Lupé XVIIe siècle), De Lassere (vers 1740 et jusquà la Révolution).\r\nA la Révolution, le château devient « Bien National » puis est acheté par Jean-Baptiste de Villéle, ministre de Charles X en 1820, président du conseil de 1822 à 1828 et député du Lauragais. Par la suite, le château est acheté par le colonel Loubert de la garde impériale. Le colonel Loubert a été maire d'Esparsac de 1846 à 1848 et de 1853 à 1856. Le château appartient à la famille Clavel depuis 1870 environ. Lactuel propriétaire est le cousin de monsieur Clavel.","architecture":"Le château d'Haumont a été construit dans la deuxième moitié du XVIe ou dans la première moitié du XVIIe siècle, puis reconstruit partiellement en 1840. Le bâtiment est situé sur le sommet d'un vallonnement; il comprend quatre bâtiments: le logis, un bâtiment de dépendance à trois corps disposés en U autour d'une cour, il contient les communs, les dépendances agricoles et l'ancien logement du \"bordier\", et un pavillon à l'entrée de la cour au Nord. Un autre bâtiment, situé à l'arrière du logis sert à l'exploitation agricole. Un portail précède l'allée conduisant à la façade antérieure, un autre portail situé autrefois dans le prolongement du mur Nord du logis aurait permis d'isoler le château des bâtiments destinés à l'exploitation agricole qui possède également un accès indépendant au Nord. Un fossé borde le logis à l'Ouest. Le parc contient un puits. Bâtiment de plan rectangulaire flanqué aux angles Ouest de deux tours; il comprend: un étage carré et un comble à surcroît. Un sous-sol occupe la partie Nord et Ouest. Au rez-de-chaussée, le couloir central commande des pièces de réception et une cage d'escalier. Les façades Est et Sud ont été restaurées pendant le Directoire (1795-1799).","habitants":"Famille de Polastron\r\n        \"","divers":"Château d'Haumont à Esparsac","gps":"","images":["../../jctruffet.com/image/image_82/82_Haumont_1.jpg","../../jctruffet.com/image/image_82/82_Haumont_2.jpg","../../jctruffet.com/image/image_82/82_Haumont_3.jpg","../../jctruffet.com/image/image_82/82_Haumont_4.jpg","../../jctruffet.com/image/image_82/82_Haumont_5.jpg","../../jctruffet.com/image/image_82/82_Haumont_6.jpg"]},"Consult_chateau_formulairea982":{"id":"Consult_chateau_formulairea982","dept":"82","canton":"St-Nicolas de la Grave","commune":"Bardignes","nom":"La_Motte","type":"Château","periode":"XIV-XVIII","histoire":"LA-MOTTE, la seigneurie de la Motte entra dans la famille d'Arnaud Garcie de Goth, vicomte de Lomagne et Auvillar régla en août 1309 les limites de juridiction de Villefranche de Bardigues et d'Auvillar en présence du juge et sénéchal de ces localités. Dès cette époque, Bernard de La Motte possédait la seigneurie d'une partie des terres de Bardigues qui porta le nom de La Motte del Brel ou de Bardigues. Il la vendit le 25 Novembre 1315 à Raymond Arnaud de Goth, seigneur de Rouillac, dont le fils Gaillard de Goth se qualifiait en 1325 seigneur de La Motte à Bardigues. Ancienne demeure féodale des Goths, des Cruzy, le château de Lamothe Bardigues du XIV siècle fut reconstruit au XVIII siècle pour la famille d'Esparbès de Lussan. Cest alors une maison forte appartenant aux vicomtes dAuvillar et de Lomagne. Par mariage, elle devient propriété de la famille dEsparbès de Lussan. Au XVIIIe siècle, Jean-Jacques dEsparbès, qui sétait installé à la cour de Louis XV, décide de se retirer à Lamotte avec sa femme, alors favorite du roi, et ensemble, ils redessinent entièrement le château. Cest à cette époque quAntoine Laumet, de Saint-Nicolas-de-la-Grave, sapproprie les armes des dEsparbès que lon voit sur le portail et part pour lAmérique, se faisant appeler Antoine de Lamothe-Cadillac, pour fonder la ville de Détroit. Cest ainsi que chaque voiture de la marque Cadillac arbore aujourdhui les armes des dEsparbès sur leur calandre. Le dernier représentant des Esparbès fut tué à Gravelotte en 1870 La Motte devient la propriété de sa soeur la vicomtesse de Saint-Exupéry grand mère de Mlles de Greling et du marquis de Boisséron.  Aujourd'hui SCI depuis 14 ans, elle est spécialisée dans le secteur d'activité de la culture de céréales. Maurice Barbara de Labelotterie de Boisséron, est gérant de l'entreprise.","architecture":"Château de la Motte reconstruit dans le troisième quart du XVIIIe siècle, sur la base d'un édifice antérieur du XVIe siècle. Le corps de logis avec sa grosse tour et son pavillon d'escalier fut doublé en superficie. La façade est caractérisée par une belle ordonnance et une ornementation soignée. Le logis clos la perspective d'une allée conduisant à une avant cour entourée de communs, puis à une cour d'honneur où se trouve une superbe fontaine en marbre de Campan. A l'arrière du logis, subsiste le parc et la garenne. Exemple de maison des champs d'une grande famille de l'Ancien Régime, conservée presque intégralement dans son état du XVIIIe siècle. A l'intérieur du château, décor raffiné (lambris et gypseries des XVIIIe et XIXe siècles. Le moulin à vent appartient au domaine du château, reconstruit au troisième quart du XVIIIe siècle. La cour d'honneur est précédée d'une grille portant les armes des d'Esparbès de Lussan.","habitants":"Famille de Raymond Arnaud de Goth\r\n        \"","divers":"Château de la Motte à Bardigues","gps":"","images":["../../jctruffet.com/image/image_82/82_La_Motte_1.jpg","../../jctruffet.com/image/image_82/82_La_Motte_2.jpg","../../jctruffet.com/image/image_82/82_La_Motte_3.jpg","../../jctruffet.com/image/image_82/82_La_Motte_4.jpg","../../jctruffet.com/image/image_82/82_La_Motte_5.jpg","../../jctruffet.com/image/image_82/82_La_Motte_6.jpg","../../jctruffet.com/image/image_82/82_La_Motte_7.jpg"]},"Consult_chateau_formulaire378c":{"id":"Consult_chateau_formulaire378c","dept":"82","canton":"Lafrançaise","commune":"Labarthe","nom":"Labarthe_82","type":"Château-fort","periode":"XI-XVI","histoire":"LABARTHE, c'est au XIe siècle que Gausbert 1er de Gordon, baron de Castelnau des Vaux fit élever un château fort, sur la motte féodale, et c'est au XIIe siècle que la population crée un village autour des murailles.\r\nLors de la croisade contre les cathares en 1214 toute la baronnie et le château furent détruits une première fois. Le château est reconstruit en 1230 et le village va se développer. La seigneurie de Labarthe dépendait alors de la baronnie de Castelnau-de-Montratier. Labarthe est devenu un lieu très important qui ne cessera, pendant un siècle de s'agrandir. La ville possède ses consuls et sa juridiction seigneuriale.\r\nC'est ensuite la guerre de cent-ans, la baronne Hélène fait front contre les anglais, le château fut pris et repris lors de combats terribles. Pendant près d'un siècle le pays se remet de ses blessures, le château est rénové.\r\nMais le baron de Castelnau opte pour la ligue catholique et le château est pillé le jour de Noël 1576 ; c'est en 1622 que les destructions sont les plus fortes, une armée protestante partie de Montauban attaquera le château qui durant ces guerres de religion sera presque entièrement démoli. Il sera quelque peu restauré, mais la Révolution éclate et c'est la fin de la « Baronnie.","architecture":"Château qui durant ces guerres de Religion sera presque entièrement démoli. L'édifice sera quelque peu restauré à la Révolution  Aujourd'hui il ne reste plus du château qu'une partie de la tour, le site cache dans sa terre tous ses souvenirs. l'édifice est constitué d'un corps rectangulaire  deux niveaux sur soubassement toit en croupe accolé à la tour ronde toit en poivrière, une autre tour ronde et une tour rectangulaire à l'angle opposée servant de pigeonnier.","habitants":"Baron de Castelnau \r\n        \"","divers":"Château de Labarthe","gps":"","images":["../../jctruffet.com/image/image_82/82_Labarthe_82_1.jpg","../../jctruffet.com/image/image_82/82_Labarthe_82_2.jpg","../../jctruffet.com/image/image_82/82_Labarthe_82_3.jpg","../../jctruffet.com/image/image_82/82_Labarthe_82_4.jpg"]},"Consult_chateau_formulaire233e":{"id":"Consult_chateau_formulaire233e","dept":"82","canton":"Labastide de Saint_Pierre","commune":"Labastide de Saint-Pierre","nom":"Labastide_St_Pierre","type":"Château","periode":"XI-XVI","histoire":"Plusieurs châteaux  à la Bastide Saint-Pierre, celui de Belaygues de Saint-Louis et de Clau et l'hôtel de ville ancien château.                                                                                                                                                                                                                                               LABASTIDE ST-PIERRE  Alphonse de Poitiers, en 1272. Vers le milieu du XIe siècle, le château fut édifié au bas du bourg . Il devait son importance aux revenus que lui procurait le péage du Tarn. En 1317, le roi de France donna la majeure partie de Labastide à Pierre de Galard, grand maître des arbalétriers de France. À partir de cette époque, il y eut au château une compagnie, Pierre de Galard vendit ses droits seigneuriaux et au fil des ans les seigneurs se succédèrent. En 1504, le marquis de Puylaroque resta seul bénéficiaire de la seigneurie de Labastide. En 1592, Saint-Pierre fut pillé et livré aux flammes par les protestants de Montauban. En 1621, ils soutinrent le siège des Montalbanais et furent pour cela remerciés par Louis XIII en personne. En 1622, le château fut pillé, puis mis à sac et incendié en 1628. Le château rebâti neut plus la même puissance. Il devint une grosse mais simple maison bourgeoise. Le bourg ne se releva que très péniblement. Durant la Révolution, en 1792, les biens des marquis de Puylaroque furent confisqués. Jusquen 1850 environ, le château passa de vente en vente à divers marchands de biens. En 1850, le château fut vendu à lordre des Chartreusines de Saint- Bruno.                                                                                                                                                   CLAU, fût au XVIe siècle une belle résidence de seigneurs et de barons. Richelieu et Henri IV ont séjourné.  Clau na jamais été un château féodal, encore moins une forteresse. Il a surtout été la belle résidence des seigneurs de Corbarieu, barons de Terride. Il fut pris par les protestants de Montauban en 1622 et fut occupé jusquen 1625, contraint de partir, les catholiques semparèrent  et reconstruisent le prieuré de Saint-Lizier en 1648.","architecture":"Labastide st-Pierre, la conception intérieure fut modifiée, les grandes salles furent divisées en cellules.  En 1903 marqua la séparation de léglise et de létat, les chartreusines partirent sinstaller en Italie mais gardèrent possession du château, acheté par une sur sous son nom civil. De 1914 à 1918, le château reçut des personnes résidant en France mais originaires de pays alliés à lAllemagne, les « internés ».Le château resta vide jusquen 1941 où larmée française en prit possession, puis larmée allemande en 1944.                                                                                                                            Clau, de plan en L à trois niveaux avec grandes ouvertures à toits brisés.                                                                                              Belayes de plan rectangulaire à deux niveaux,  toit en croupe flanqué plein cintre d'un fronton triangulaire.                                                                         Saint-Louis viticole, corps de logis en angle du bâtiment oblong toit en croupe arcade sur façade tour carré avec parabole décalé de l'ensemble.","habitants":"Famille de Pierre de Galard\r\n        \"","divers":"Château de Belayes, de Saint-Louis  et de Clau, la Bastide du Temple à la Bastide Saint-Pierre","gps":"","images":["../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_1.jpg","../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_2.jpg","../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_3.jpg","../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_4.jpg","../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_5.jpg","../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_6.jpg","../../jctruffet.com/image/image_82/82_Labastide_St_Pierre_7.jpg"]},"Consult_chateau_formulaire1ecf":{"id":"Consult_chateau_formulaire1ecf","dept":"82","canton":"Castelsarrasin","commune":"Labastide du Temple","nom":"Labastide_Temple","type":"Château","periode":"XIX","histoire":"LABASTIDE DU TEMPLE, village fondé au XIIIe siècle, en 1260 des coutumes sont concédées ou confirmées aux habitants par Rozols de Fos, maître de la maison du temple de Provence. « Sachent tous que les consuls de la Bastide du Temple, du diocèse de Toulouse et de la bailli de Castelsarrasin, ont juré fidélité au roi de France, reconnaissant que ladite Bastide du Temple est sous la garde du seigneur roi et que la communauté de ce lieu doit au seigneur roi l'impôt pour l'armée, ainsi que les autres villes de la comté. Fait à Castelsarrasin, le 8 des Ides de novembre de l'année susdite. »  Le 3 mai de l'année 1260, Rosalin de Foz, maître du Temple en province, tenait, suivant l'usage, son chapitre provincial dans la maison de Saint-Gilles, sa résidence habituelle, lorsque devant cette nombreuse assemblée de chevaliers et de chapelains, se présenta une députation, des notables de la communauté de La Bastide; ces délégués venaient de faire cette longue route pour demander à leurs seigneurs de leur accorder des privilèges, franchises et coutumes, ou plutôt de confirmer par une charte solennelle et aussi, sans doute, d'augmenter les libertés dont ils jouissaient depuis la fondation de la ville.\r\nDécor mosaïque, sujet : armes de la comtesse de Berty de Fabri.","architecture":"Le château de Labastide est reconstruit au XIXe siècle, édifice flanqué de deux échauguettes sur encorbellements  aux angles de la façade après 1836  élévation ordonnancée à un étage carré en  brique ; brique crue ; enduit partiel, couverture en croupe de tuile creuse.","habitants":"Famille de Rozols de Fos,\r\n        \"","divers":"Temple   à Labastide du Temple","gps":"","images":["../../jctruffet.com/image/image_82/82_Labastide_Temple_1.jpg","../../jctruffet.com/image/image_82/82_Labastide_Temple_2.jpg","../../jctruffet.com/image/image_82/82_Labastide_Temple_3.jpg","../../jctruffet.com/image/image_82/82_Labastide_Temple_4.jpg","../../jctruffet.com/image/image_82/82_Labastide_Temple_5.jpg"]},"Consult_chateau_formulaireee3b":{"id":"Consult_chateau_formulaireee3b","dept":"82","canton":"Septfonds","commune":"Lacapelle-Livron","nom":"Lacapelle_Livron","type":"Commanderie","periode":"XII","histoire":"LACAPELLE-LIVRON, commanderie, La première donation remonte à 1225. Grimals, seigneur de Livron ayant fait don de sa seigneurie à l'ordre du Temple puis dès 1227, Raymond VII de Toulouse en fait de même pour son fief de La Capelle. De nombreuses autres donations permettront à ce qui n'était encore que la « grange templière de Monson » de devenir une commanderie. Cette commanderie devint le chef-lieu d'une baille templière à partir de 1260, se substituant à la commanderie de Cahors. On dénombrait en 1268 outre le commandeur, trois chevaliers du Temple, trois prêtres, un chapelain, et huit autres frères à l'occasion d'un chapitre.                                                                              La commanderie de La Capelle-Livron dépendait du Grand prieuré de Saint-Gilles dans la langue de Provence.\r\nElle a été plusieurs fois commanderie magistrale, c'est-à-dire dépendant directement du Grand-Maître qui l'a  conservée dans ses bénéfices. Après une période Templière, une période hospitalière.  Il semble que les seigneuries spirituelles et temporelles acquises par les templiers  soient toutes restées aux mains des hospitaliers. Ils feront de l'ancienne commanderie templière de Carnac-Trévaix un membre de cette commanderie, avec de surcroît l'acquisition du château de Trébaïx. Ils se porteront également acquéreurs du château de Cas.\r\nÀ noter qu'ils avaient également une seconde commanderie d'origine hospitalière à proximité sur la commune d'Espinas. Celle-ci n'est pas d'origine templière.","architecture":"La chapelle et son clocher fortifié ainsi que le pigeonnier, tous deux classés aux monuments historiques, semblent être les uniques vestiges de cette commanderie dans la commune,  Commanderie attestée en 1236, dont reste la chapelle et les deux corps de bâtiment du château; ensemble fortifié de mâchicoulis sur consoles et chemin de ronde en 1487; belle galerie en pan de bois construite en 1619 par Antoine et Raymond Camboux, maîtres charpentiers ; pigeonnier construit en 1678 par Antoine Delteil, maître maçon de Caylus ; tour sud-est et mur d'épaulement reconstruits par Gontar, maître maçon de Saint-Gervais en dauphinois en 1701 ; escalier extérieur élevé par Gontar en 1703 ; repercement des façades et aménagement intérieur réalisés de 1704 à 1706 par Jean Pouret, maître maçon, Coste et Latouche, maîtres charpentiers ; à la fin du XVe siècle la chapelle est devenue l'église paroissiale avec le vocable Saint-Sauveur. Château construit en moellons, sous-sol voûté en berceau plein-cintre. Les parties agricoles et le pigeonnier en moellons sans chaîne en pierre de taille. Galerie en pan de bois.","habitants":"Raymond VII de Toulouse\r\n        \"","divers":"Commanderie de Lacapelle-Livron","gps":"","images":["../../jctruffet.com/image/image_82/82_Lacapelle_Livron_1.jpg","../../jctruffet.com/image/image_82/82_Lacapelle_Livron_2.jpg","../../jctruffet.com/image/image_82/82_Lacapelle_Livron_3.jpg","../../jctruffet.com/image/image_82/82_Lacapelle_Livron_4.jpg","../../jctruffet.com/image/image_82/82_Lacapelle_Livron_5.jpg","../../jctruffet.com/image/image_82/82_Lacapelle_Livron_6.jpg","../../jctruffet.com/image/image_82/82_Lacapelle_Livron_7.jpg"]},"Consult_chateau_formulaire63f0":{"id":"Consult_chateau_formulaire63f0","dept":"82","canton":"St-Nicolas de la Grave","commune":"Lachapelle","nom":"Lachapelle","type":"Château","periode":"XIII-XIX","histoire":"LACHAPELLE  en forme de théâtre italien, restaurée en 2000.\r\nA Lachapelle, le village occupe le sommet dune colline dominant la vallée de lArrats. Il adopte une forme concentrique autour du château du XIe siècle dans lequel est incluse la chapelle.","architecture":"Lachapelle de plan rectangulaire sur soubassement important en façade avec escalier pour accéder au rez de Chaussée, flanqué d'un pavillon rectangulaire à trois niveaux toit en croupe accolé  d'un bâtiment inférieur toit à un seul pan.","habitants":"Seigneur local\r\n        \"","divers":"Château de Lachapelle","gps":"","images":["../../jctruffet.com/image/image_82/82_Lachapelle_1.jpg","../../jctruffet.com/image/image_82/82_Lachapelle_2.jpg","../../jctruffet.com/image/image_82/82_Lachapelle_3.jpg","../../jctruffet.com/image/image_82/82_Lachapelle_4.jpg"]},"Consult_chateau_formulaire828c":{"id":"Consult_chateau_formulaire828c","dept":"82","canton":"Septfonds","commune":"Laguepie","nom":"Laguepie_(82)","type":"Maison-forte","periode":"XV-XVII","histoire":"Deux châteaux à Laguépie , celui de Ginestous et celui de la Roquette                                                                                 GINESTOUS, en 1614, Pierre de Rousset de Ginestous tient le fief avec  maison, basse cour où se fait sa demeure, maison pour habitation d'un métayer, Laguépie :  Compoix de Puech Mignon, 1614, en 1693 noble Jean de Rousset, seigneur de Ginestous  Un état des biens de madame Darribat, du XVIIIe siècle\r\nmentionne la seigneurie de Pechmignon, composé du domaine de Ginestous  avec un petit château qui n'a besoin d'aucune grosse réparation.\r\n A la Révolution, le château appartenait à Raymond Philibert de Montégut, seigneur de Ginestous. vendus en 33 lots au château de Ginestous.\r\nROQUETTE  mentionne l'édifice depuis le XVIIe siècle: En 1614, noble Denis de Barasc tient  le château de la Roquette composé d'une tour carrée\r\ncorps de logis masures granges étables et autres propriétés le tout joignant dans la paroisse. En 1629, Jacques de Barasc tient le lieu et place de la Roquette consistant en château. En 1667, Paul de Barasc dénombre pour un château composé d'une tour carrée et mâchicoulis, avec un corps de logis et  autre petite maison joignant néanmoins hors de la dite basse cour avec une petite grange au devant de la porte, le tout fort ruiné.","architecture":"Ginestous le logis comprend actuellement trois corps, à un étage carré, disposés en U ; les deux corps en équerre du côté nord comportent des vestiges anciens apparents ; la tour d'escalier circulaire, située dans l'angle, contient un escalier à vis. L'aile nord  contient une grande pièce rectangulaire au rez-de-chaussée et au premier étage, celle du rez-de-chaussée est voûtée en berceau. Les deux portes qui commandent l'accès de ces deux pièces depuis l'escalier, présentent des piédroits moulurés en quart-de-rond et des linteaux ornés d'arcs en accolade. Dans l'autre aile, il subsiste les vestiges de décors de stuc sur les hottes des cheminées.                                                                                                           Roquette  il ne subsiste qu'un corps de bâtiment englobé dans une ferme située sur un coteau dominant l'Aveyron. L'élévation ouest  conserve quelques vestiges anciens, fenêtres et latrines aux deuxième et troisième niveaux. Le rez-de-chaussée est voûté en berceau ; un escalier extérieur accolé à la façade qui  permet l'accès au premier étage. Les fenêtres murées et la présence des latrines montrent que le logis présentait au moins un étage de plus.  Le château et la tour auraient été abaissés de deux étages et les matériaux utilisés lors de la reconstruction de l'église de Lez (Laguépie).","habitants":"Famille de Raymond Philibert de Montégut                                           famille de Noble Denis de Barasc\r\n        \"","divers":"Maison forte de Ginestous et de la Roquette à Laguepie","gps":"","images":["../../jctruffet.com/image/image_82/82_Laguepie_(82)_1.jpg","../../jctruffet.com/image/image_82/82_Laguepie_(82)_2.jpg","../../jctruffet.com/image/image_82/82_Laguepie_(82)_3.jpg"]},"Consult_chateau_formulaire6a95":{"id":"Consult_chateau_formulaire6a95","dept":"82","canton":"Auvillars","commune":"Lansac","nom":"Lansac_Merles","type":"Château","periode":"XV","histoire":"LANSAC.     Le fameux chêne d'Henri IV à Merles \r\n« Le vendredi 10 juillet au matin, en 1579, Henri de Navarre, escorté de 44 cavaliers et accompagné de la Reine Margot, sa femme, et dune suite de belles dames et de gentilshommes, sarrêta à lombre du chêne qui porte son nom, à Merles. Il se rendait de Nérac à Montauban. Il y avait à quelques toises du chêne vénérable une fontaine à leau fraîche et limpide. Le roi demanda à son valet Joachim daller quérir une coupe de ce rafraîchissant breuvage. Il sarrêta ensuite au château de Lansac les Merles, qui avait été vendu par labbaye de Belleperche, en 1526, pour payer la rançon de François 1er. Il partit ensuite pour Lavilledieu, prochaine étape de son voyage.","architecture":"le château de Lansac de plan rectangulaire à deux niveaux, toit en croupe.","habitants":"Henri de Navarre\r\n        \"","divers":"Château de Lansac et le chêne","gps":"","images":["../../jctruffet.com/image/image_82/82_Lansac_Merles_1.jpg","../../jctruffet.com/image/image_82/82_Lansac_Merles_2.jpg"]},"Consult_chateau_formulairee56c":{"id":"Consult_chateau_formulairee56c","dept":"82","canton":"Beaumont de Lomagne","commune":"Larrazet","nom":"Larrazet","type":"Château","periode":"XII-XVI-XIX","histoire":"deux  châteaux à Larrazet, dont celui de Larrazet dit Abbés de Belleperche et celui de Brunel.                                                                                                                                         BRUNEL,   H de Rimailos, conseiller du sénéchal et présidial de Toulouse.  Logis construit au XVIIe siècle ; remanié 2e moitié du XVIIIe siècle ou 1ère moitié du  XIXe siècle, avant 1837.                                                                                                                           ABBES de BELLEPERCHE LARRAZET,   en 1283, une sentence arbitrale attribua au vicomte de Terride la moitié de la haute et de la moyenne justice. Comme plusieurs autres dynasties gasconnes, les vicomtes usaient à cette époque dune politique agressive pour agrandir leur espace vital. En 1572, lors du saccage de labbaye de Belleperche par les huguenots, les moines échappés du massacre se réfugièrent au château. Le château abbatial Johan de Cardailhac, oeuvre de Guillaume Jauffre en 1265, reprise le 20 mai 1500 par Jean III de Cardaillac, domine la vallée de la Gimone. Il fut pillé et partiellement détruit pendant la Révolution, devenu un bien national, il fut acheté en 1791 par monsieur Groc qui le préserva en le recouvrant.","architecture":"Brunel, édifice bâti sur un côteau qui dominent le village de Larrazet  et la vallée de la Gimone. Il comprend un bâtiment principal à 3 corps, une grange et un fournil. Le logis occupe le corps principal et un petit corps de bâtiment accolé à l'ouest; le corps de bâtiment situé dans le prolongement au Nord  abrite une étable.                                                                                         Larrazet dit des abbés de Belleperche qui domine la vallée de la Gimone fut construit en 1500 sur une précédente maison forte, à un castelnau.  On note toutefois l'absence de place publique intra-muros, ce qui est le cas de bien des villages de la région, quil s'agisse ou non de bastides.  Le bourg était fermé par une enceinte, avant 1268, cernée par un fossé profond converti en aqueduc périphérique. Lintérêt architectural de ce château réside non seulement dans la façade de style gothique flamboyant et ses cheminées, mais aussi dans la décoration sculpturale intérieure et dans ce magnifique escalier voûté dogives qui tourne autour dun noyau central, selon un procédé nouveau importé dItalie. Sa façade est percée de fenêtres à meneaux à accolades et dune magnifique porte. Loriginalité principale est surtout lescalier voûté dogives et dont la main-courante est directement taillée dans la pierre, cet escalier tourne autour dun noyau central, dont chaque niveau renferme une pièce, ses cheminées et la décoration sculpturale intérieure. Mais au XIVe siècle, la construction des murailles a profondément modifié la structure de cette première agglomération.  remaniement et adjonction d'une aile après 1793 ; destruction de tours et du 2e étage du château à une date indéterminée. Ces initiatives ont porté sur deux importantes constructions.","habitants":"Jean III de Cardailhac\r\n        \"","divers":"Château de Brunel et des Abbés de Belleperche","gps":"","images":["../../jctruffet.com/image/image_82/82_Larrazet_1.jpg","../../jctruffet.com/image/image_82/82_Larrazet_2.jpg","../../jctruffet.com/image/image_82/82_Larrazet_3.jpg","../../jctruffet.com/image/image_82/82_Larrazet_4.jpg","../../jctruffet.com/image/image_82/82_Larrazet_5.jpg","../../jctruffet.com/image/image_82/82_Larrazet_6.jpg","../../jctruffet.com/image/image_82/82_Larrazet_7.jpg","../../jctruffet.com/image/image_82/82_Larrazet_8.jpg","../../jctruffet.com/image/image_82/82_Larrazet_9.jpg"]},"Consult_chateau_formulaire28d8":{"id":"Consult_chateau_formulaire28d8","dept":"82","canton":"Albias","commune":"Réalville","nom":"Lastours_Réalville","type":"Château","periode":"XVII","histoire":"LASTOURS  Le château de Lastours est bâti à l'emplacement d'un château médiéval appartenant aux seigneurs d'Antéjac. Ce château, rasé pendant la guerre de Cent-Ans est reconstruit puis de nouveau détruit pendant des guerres de Religions. Aucun vestige médiéval n'a été observé en élévation, hormis une croisée du XVe siècle aujourd'hui englobée dans des maçonneries postérieures. De l'époque médiévale, le château n'a conservé que son toponyme \"Las Tours\", qui renvoie aux deux tours dont le bâtiment était pourvu. Les vestiges les plus anciens aujourd'hui visibles, datent  du XVIIe siècle. L'essentiel des dispositions actuelles du château (élévations ordonnancées, fenêtres, cheminées, décor stuqué du grand salon, chambre de l'appartement dit de la duchesse de Polignac et boudoir, hall d'entrée et terrasse au sud-est sont des aménagements opérés à la fin du XVIIIe siècle et au début du XIXe siècle, par Jean Dominique Marie Rigail de Lastours. C'est à cette époque que le plan en U du château est fermé avec l'ajout de la terrasse au sud-est. Au cours du XIXe siècle, le château reste aux mains de la famille Rigail de Lastours qui engage divers travaux, notamment en 1866, comme l'indique la date portée sur l'élévation sud-ouest, ou en 1883 pour la construction d'une maison (ou métairie) par Paul Léonce Rigail de Lastours, propriétaire et avocat à Montauban. Le dernier descendant, François Rigail de Lastours, lieutenant de Savorgnan de Brazza dans la conquête du Congo, meurt en 1885, dans une ville qui porte, en sa mémoire, le nom de Lastourville. Aujourd'hui, les propriétaires du château sont les descendants de la famille Rigail de Lastours.","architecture":"Château reconstruit en brique de plan en U au  XVIIe et XVIIIe siècles. Une nouvelle campagne de travaux a également  eu lieu au cours de la seconde moitié du XIXe siècle. Les intérieurs remarquables lui ont notamment valu une inscription en totalité à l'Inventaire des Monuments Historiques, le 27 juin 1983. En 1830, le plan cadastral mentionne au lieu-dit \"Enclos du château de Lastours\", les constructions (maisons, bâtiments, cour et jardin) entourées d'une vaste terre, d'une pâture, de prés, de vignes, mais aussi d'un verger et d'un bois d'agrément. Plusieurs écuries et bâtiments liés au soin des chevaux sont ajoutés à la fin du XIXe siècle et au début du XXe siècle au nord de la propriété. Une partie a disparu.  Dans la salle à manger, la cheminée en pierre avec des piédroits aux bases prismatiques proviendrait du château de Bruniquel ; elle peut dater du XVe siècle.","habitants":"Famille de Jean Dominique Marie Rigail de Lastours\r\n        \r\n        \"","divers":"Château de Lastours à Réalville","gps":"","images":["../../jctruffet.com/image/image_82/82_Lastours_Realville_1.jpg","../../jctruffet.com/image/image_82/82_Lastours_Realville_2.jpg"]},"Consult_chateau_formulaire72e3":{"id":"Consult_chateau_formulaire72e3","dept":"82","canton":"Lafrançaise","commune":"Lauzerte","nom":"Lauzerte","type":"Château","periode":"XIII-XVI","histoire":"Cinq châteaux à Lauzerte, celui de Beaucaire, de Grés, de la Jelie, du Roi de Touffailles et des Vignes pas d'information historique.                                                                                                                                                 BEAUCAIRE, le nom du château de Beaucaire est lié à la plus ancienne histoire du Bas-Quercy. Il semble avoir été occupé  par la famille de Durfort dès le XIe siècle. Siège de la sénéchaussée du Bas-Quercy, il servit de refuge à la garnison du sénéchal en cas de prise et d'occupation de Lauzerte. Le nom de Beaucaire s'unit au XVIIe siècle avec celui de la famille de Pechpeyroux et les marquis de Pechpeyroux-Beaucaire font figure d'importants personnages, tant à Lauzerte, où ils possèdent la maison dite \"Marquisat\" qu'à Moissac, où ils sont suzerains du grand moulin de leur nom.                                                                     GRES, St-JELIE,   pas d'information historique .                                                                                                                   Du ROI, à la fin du XIIe siècle, le comte de Toulouse reçut la colline en don afin d'y construire un castelnau, une cité protégée par un château. La forteresse de Lauzerte, surplombe les vallées de la Barguelonne et du Lendou offrant un site  défensif, avec son château, son enceinte, ses tours et ses six portes fortifiées faisait la fierté de ses habitants et des rois de France. Ainsi Henri IV la dépeignait comme une de nos quatre clefs dudit pays de Quercy presque imprenable, tout à cause de la situation  ainsi que la forteresse. Malgré cela le site connut loccupation anglaise et plus tard les guerres de religion. Vaste construction de pierre à double travée sous voûte octopartite et voûtain profond rayonnant autour d'une clef à huit croisées d'ogives en pans coupés  ensemble robuste bien équilibré. Culots très usés à masques difficilement discernable ou feuillage. Une travée complète, l'autre réduite aux deux tiers par des cloisons encadrant la cuisine du réfectoire, installée dans la travée.","architecture":"Beaucaire vestiges, le donjon est resté presque entier en pierre de taille, la porte ogivale face sud et blocage à la base grande fenêtre, édifié au XIIIe ou XIVe siècle, en calcaire, pierre de taille et moellon                                                                             GRES,   le château du Grès, construit au XVIIe siècle, présente un grand corps de bâtiment en longueur couronné de tourelles rondes. Ensemble de pierre appareillée de façon très soignée aux tourelles et aux encadrements de portes et de fenêtres, avec socle de pierre de base. Le rez-de-chaussée est ouvert de cinq fenêtres plus deux portes, la principale dans un encadrement soigné à moulures, pilastres et denticules. Deux communs en longueur, flanquant le corps de logis, avec petites portes et lucarnes ou fenêtres, portail à droite. Ensemble sobre, assez alluré. Patine ocrée de la pierre, toit de tuiles canal à génoise. Deux pigeonniers : l'un isolé a droite; l'autre accolé a une construction à gauche. Type \"pied de mulet\" en blocage de pierre, forme un peu trapue, muret à courbe formant \"col de manteau\" autour du toit à ressaut, orifice d'accès et d'envol sur la façade sud. La grange accostant le pigeonnier de gauche est un bâtiment rectangulaire de pierre à encadrement soignés de porte charretière et lucarnes cintrés face Est et ouest, toit à double pente à tuiles canal.","habitants":"Famille de Pechpeyroux\r\n        \"","divers":"château de Beaucaire,  de Grés, de la Jelie, du Roi et des Vignes à Lauzerte","gps":"","images":["../../jctruffet.com/image/image_82/82_Lauzerte_1.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_2.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_3.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_4.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_5.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_6.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_7.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_8.jpg","../../jctruffet.com/image/image_82/82_Lauzerte_9.jpg"]},"Consult_chateau_formulaire090e":{"id":"Consult_chateau_formulaire090e","dept":"82","canton":"Albias","commune":"Loubejac","nom":"Loubejac","type":"Château","periode":"XV","histoire":"LOUBEJAC, est un château du XVe siècle, dès le XIIIe siècle le chef-lieu d'une seigneurie importante, reconnue en 1259 à Alphonse, comte de Poitiers et de Toulouse.  Une partie de la seigneurie appartenait encore en 1789 aux Gruzy de Marcillac qui, d'après la tradition orale  en aurait  fait reconstruire le château. Ce dernier   fut ensuite vendu à la famille de Bellerive qui donna un terrain au pied du château pour la construction de l'église de Loubéjac avant 1849.  Le château appartenait encore à cette famille en 1898 .","architecture":"Le château de Loubejac est un château bâti à l'Honor de Cos, le château de Loubejac a été construit au XVe siècle. Il fut détruit lors de la Révolution Française, mais sera reconstruit vers le XIX Siècle. Le château de Loubejac se trouve au coeur d'un magnifique domaine, avec sa salle de réception, préau, piscine, tennis et son parc de 9 hectares vous partagerez de merveilleux instants, en famille, entre amis, où pour vos activités d'entreprise.","habitants":"Famille de  Gruzy de Marcillac\r\n        \"","divers":"Château de Loubejac","gps":"","images":["../../jctruffet.com/image/image_82/82_Loubejac_1.jpg","../../jctruffet.com/image/image_82/82_Loubejac_2.jpg","../../jctruffet.com/image/image_82/82_Loubejac_3.jpg","../../jctruffet.com/image/image_82/82_Loubejac_4.jpg","../../jctruffet.com/image/image_82/82_Loubejac_5.jpg","../../jctruffet.com/image/image_82/82_Loubejac_6.jpg","../../jctruffet.com/image/image_82/82_Loubejac_7.jpg"]},"Consult_chateau_formulairea033":{"id":"Consult_chateau_formulairea033","dept":"82","canton":"Septfonds","commune":"Loze","nom":"Loze","type":"Maisons fortes","periode":"XV","histoire":"Plusieurs manoirs à Loze.                                                                                                         ROQUE de LOZE, il existait également près du village de Loze un château à La Roque de Loze (hameau des Tourettes) appartenant aux comtes de Toulouse, puissants féodaux, puis à la famille seigneuriale des De-Jean. Lautorité des rois de France sur cette région étant très faible, ces familles régnèrent sur la région jusquau XVe siècle environ. Ensuite, la seigneurie revint au seigneur de Saint-Projet pour plus de deux-cents ans.","architecture":"Roque de Loze au XIVe et XVe siècle, la guerre de cent ans fit de nombreux ravages dans la région. Le village de Loze fut certainement détruit pendant cette période. Au Moyen-Age, le village se fortifie, non par des remparts continus mais plutôt par des murets de pierre. Le village de Loze nayant pas de château ni de tour, cest le clocher de léglise qui servait de réduit pour la défense ; comme en témoigne léglise de Loze, pourvue de créneaux et dune galerie saillante reposant sur des mâchicoulis. la période des guerres de religion (deuxième moitié du XVIe siècle) fut une époque très troublée pour le Quercy. Les protestants tenaient les principales villes de la région. Lopposition entre Saint-Antonin convertie à la \"nouvelle religion\" et Caylus restée catholique fit basculer Loze quelques jours dans le protestantisme.\r\nAprès la Révolution Française, la communauté des habitants (ancêtre de la commune et regroupant Loze, Saillagol et Saint-Projet) disparut pour laisser place à la première municipalité de Loze qui fut élue le 21 février 1790.","habitants":"Famille seigneuriale des De-Jean\r\n        \"","divers":"Diverses maisons fortes à Loze et sa tour.","gps":"","images":["../../jctruffet.com/image/image_82/82_Loze_1.jpg","../../jctruffet.com/image/image_82/82_Loze_2.jpg","../../jctruffet.com/image/image_82/82_Loze_3.jpg","../../jctruffet.com/image/image_82/82_Loze_4.jpg"]},"Consult_chateau_formulairee6c6-2":{"id":"Consult_chateau_formulairee6c6-2","dept":"82","canton":"Valence d","commune":"Perville","nom":"Lézy_Perville","type":"Maison forte","periode":"XVI","histoire":"LEZY, le château a été construit au XVIe siècle, très remanié au XVIIe siècle; entièrement dénaturé au XXe siècle; un dénombrement effectué le 28 septembre 1683 par noble Daniel de Goulard, seigneur de Salle de Bru et de Lézy comprend \"une maison et château appelé de Lesy, avec offices, granges, écuries, pigeonnier, terres et prés.","architecture":"Lézy, la cheminée en pierre du premier étage provient de Tayrac, canton de Beauville en Lot-et-Garonne. C'est une vaste construction rectangulaire en bel appareil moyen de pierre encadrée de deux tours circulaires à chaque extrémité. Fenêtres percées au XVIIe siècle cependant qu'existent encore des meurtrières à armes à feu au ras du sol. Intérieur refait au XVIIe siècle et modernisé à nouveau aujourd'hui. L'édifice se compose d'un étage carré, gros-oeuvre en pierre ; pierre de taille et moellon, élévation ordonnancée sans travées, surmontée de toit conique et croupe, couverts de tuiles flamandes et tuiles plates.","habitants":"Famille de Noble Daniel de Goulard\r\n        \r\n        \"","divers":"Château de  Lézy à Perville","gps":"","images":["../../jctruffet.com/image/image_82/82_Lezy_Perville_1.jpg","../../jctruffet.com/image/image_82/82_Lezy_Perville_2.jpg","../../jctruffet.com/image/image_82/82_Lezy_Perville_3.jpg"]},"Consult_chateau_formulaire3159":{"id":"Consult_chateau_formulaire3159","dept":"82","canton":"St-Nicolas de la Grave","commune":"Mansonville","nom":"Mansonville","type":"Château","periode":"XIII-XVIII","histoire":"Deux châteaux à Mansonville celui de Lagarière pas d'information historique et celui de Mauvaisin                                                                                                                                        MANSONVILLE   le village a été acquis en 1274 par Édouard Ier d'Angleterre. Mansonville est mentionné dès la fin du XIe siècle parmi les possessions de labbaye de Moissac, et cest sans doute sous linfluence de la célèbre abbaye que fut construite léglise romane. Plus tard la paroisse fut cédée au chapitre de Lectoure, et les évêques de Lectoure y avaient une maison de campagne dans le village même mais qui aujourdhui est une propriété privée.\r\nEn 1081, la vicomtesse de Brulhois donne l'église de Saint-Saturnin de Mansonville à l'abbaye de Moissac. Cette dernière est confirmée dans cette possession par une bulle du pape Urbain II, rédigée à Toulouse en mai 1097. Elle est à nouveau confirmée par une bulle du pape Grégoire IX datant du 18 juillet 1240, fut acheté, en 1274, par Édouard Ier, roi dAngleterre. Son fils donna la seigneurie en 1313 à Bertrand de Goth, en même temps que les vicomtés de Lomagne et d'Auvillar.","architecture":"L'abbaye fut cédée plus tard au chapitre de Lectoure  Mansonville a fait l'objet de découvertes de vestiges gallo-romains et dobjets mérovingiens. On peut encore y voir de belles maison datant des XVIe et XIXe siècles. Non loin de là se trouve le château du Bosc du XVIIe-
