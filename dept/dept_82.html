du logis de Lagarde, dans l'ancien village fortifié dépendance de l'abbaye de Moissac, dont il reste une tour à côté de la chapelle, inscrit au titre des monuments historiques en 1980.","architecture":"Haut-Castel  C'est une vaste construction carrée à trois niveaux, toit à quatre  pans, avec d'immenses écuries et dépendances.                                   La Garde du Calvaire ruines du Logis de Lagarde, dans l'ancien village fortifié dépendance de l'abbaye de Moissac, dont il reste une tour à côté de la chapelle.                                                                                                                           La Garde du Calvaire du XIIe siècle, XIIIe siècle, XVIIe siècle.  Possession de l'abbaye de Moissac, chapelle du XIIe et XIIIe siècles ; logis du XIVe siècle, remanié aux XVIIe siècle.","habitants":"Famille de Gabrielle de Durfort Léobard de Boissières\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Saint-Amans de Pellagal celui du Haut-Castel et celui de la Garde du Calvaire","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Amans_Pellagal_1.jpg","../../jctruffet.com/image/image_82/82_St_Amans_Pellagal_2.jpg"]},"Consult_chateau_formulaire59bc":{"id":"Consult_chateau_formulaire59bc","dept":"82","canton":"Septfonds","commune":"St-Antonin-Noble-Val","nom":"St_Antonin_Noble","type":"Château","periode":"XII-XVII","histoire":"Deux châteaux à Saint-Antonin-Noble-Val, celui de Bone du XII-XIIIe siècle et de Vilette du XVII-XIXe siècle.                                                                                            SAINT-ANTONIN, Il est aussi connu sous le nom de château de Bône. BONE, en 1247, Isarn, l'un des vicomtes de Saint-Antonin, cède le château au roi de France en même temps que la ville de Saint-Antonin , auparavant il doit révoquer ses donations faites le 23 mai 1238 à R. de Caussade. En octobre 1249 , puis en mars 1251, Bernard Hugues, son frère, abandonne à son tour.   Les seigneurs de Saint-Antonin-Noble-Val embrassèrent l'hérésie albigeoise, ce qui valut à la ville d'être envahie par Simon de Montfort en 1212. En 1226, elle entrait dans le domaine royal ; cette époque allait être l'apogée de sa prospérité économique. Mais, à partir du XVIIe siècle, les habitants perdirent peu à peu leurs privilèges et l'emprise de la ville diminua.\r\nEn 1351 les Anglais envahirent Saint-Antonin. En 1622, pendant les rébellions huguenotes, Louis XIII sempare de la ville. En 1681, tous les protestants étaient exclus du conseil politique et du consulat de Saint-Antonin.                                                         VILETTE, La terre de Vilette a donné son nom à la famille de Vilette, dont un des membres, Jean de Vilette, a transmis ce nom à la capitale maltaise au XVIe siècle le château aurait été construit au début du XVIIe siècle pour Jean de Vilette, gouverneur de Saint Antonin. Jean Regy en aurait été propriétaire en 1801.","architecture":"BONE, le château, établi au départ de l'éperon sur un rocher abrupt, la plate-forme la plus élevée, 35 m de long et 6 m de large, n'a pu porter qu'une tour, dont il subsiste quelques assises de pierre. Dans le prolongement de l'arête rocheuse, à l'est et au sud, plusieurs vestiges de murs pourraient indiquer la présence d'une basse-cour. Une enceinte au tracé irrégulier, justifié par la sinuosité des rochers, devait compléter la défense de la tour. Des habitations ont pu se développer sur les versants sud et est qui conservent de nombreux vestiges de murs. Le site semble avoir été rapidement abandonné, sans doute en raison de son relief accidenté et de la proximité de la ville de Saint-Antonin.                             VILETTE, un mur de soutènement ferme la cour à l'ouest. Au XIXe siècle remaniements et construction des parties agricoles, une aile du logis porte la date 1807 et l'inscription \"Jean Regy\", édifice situé sur le versant d'un coteau dominant le ruisseau de Luserp; il comprend un logis à plusieurs corps disposés en L autour d'une cour bordée au nord par une grange-étable et un bâtiment de dépendance.  Le gros-oeuvre est réalisé en maçonnerie de calcaire, appareil assisé allongé en moellons équarris encadrement des baies et chaînes d'angle en pierre de taille. Une tour circulaire demi-hors-oeuvre flanque le corps de logis sur l'angle ouest. Les deux collages de l'élévation antérieure, visibles en façade, correspondent aux murs de refend séparant l'escalier des pièces.","habitants":"Famille de Fortuné de Valette                                                                               Famille de Bernard Hugues de Caussade\r\n        \"","divers":"Saint-Antonin-Noble-Val, celui de Bone et de Vilette .","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Antonin_Noble_1.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_2.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_3.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_4.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_5.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_6.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_7.jpg","../../jctruffet.com/image/image_82/82_St_Antonin_Noble_8.jpg"]},"Consult_chateau_formulaire79cf":{"id":"Consult_chateau_formulaire79cf","dept":"82","canton":"Lafrançaise","commune":"St-Beauzeil","nom":"St_Beauzeil","type":"Manoir","periode":"XVIII","histoire":"L'HOSTE, pas d'information historique, château de L'Hoste*** restaurant gastronomique    est situé dans le Quercy Blanc, pays de villages médiévaux et de châteaux forts, de vignobles et de tournesols. Admirez le charme des vieilles pierres.","architecture":"L'Hoste manoir du XVIIIe siècle de plan en U à deux niveaux et attiques fermé  par des dépendances toit de l'ensemble en tuiles à deux pans. Deux tours pigeonniers en angles extérieurs.","habitants":"Seigneur local\r\n        \"","divers":"Château de L'Hoste à Saint-Beauzeil","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Beauzeil_1.jpg","../../jctruffet.com/image/image_82/82_St_Beauzeil_2.jpg","../../jctruffet.com/image/image_82/82_St_Beauzeil_3.jpg","../../jctruffet.com/image/image_82/82_St_Beauzeil_4.jpg","../../jctruffet.com/image/image_82/82_St_Beauzeil_5.jpg","../../jctruffet.com/image/image_82/82_St_Beauzeil_6.jpg"]},"Consult_chateau_formulairee8ed":{"id":"Consult_chateau_formulairee8ed","dept":"82","canton":"St-Nicolas de la Grave","commune":"Saint-Loup","nom":"St_Loup_Agre","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Saint-Loup celui de Agre et celui de Lassaigne du XVIIe siècle.                                                                                 AGRE,  Frédéric est le créateur du blason de Saint-Loup   a été créé à la demande du conseil municipal élu durant la période 1988-1996. Il reprend les armoiries de 4 familles célèbres de Saint-Loup :  de Bressolles, du Gout de Lassaigne, du Gout de Bressure et de Gironde.                                                                                  LASSAIGNE, Pierre de Goth de Lassaigne, sieur de Lassaigne, capitaine au régiment d´infanterie d´Artois en 1667.","architecture":"Agre, corps de logis rectangulaire à deux niveaux pavillon saillant plein cintre en façades avec fronton triangulaire, toit en croupe.                             Lassaigne gentilhommière  de plan rectangulaire à deux niveaux toit à deux pans prolongé de dépendances.","habitants":"Familles des de Bressolles                                                                        Famille de Pierre de Goth de Lassaigne\r\n        \"","divers":"à Saint-Loup château d' Agre et celui de Lassaigne","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Loup_Agre_1.jpg","../../jctruffet.com/image/image_82/82_St_Loup_Agre_2.jpg","../../jctruffet.com/image/image_82/82_St_Loup_Agre_3.jpg","../../jctruffet.com/image/image_82/82_St_Loup_Agre_4.jpg","../../jctruffet.com/image/image_82/82_St_Loup_Agre_5.jpg"]},"Consult_chateau_formulaire167e":{"id":"Consult_chateau_formulaire167e","dept":"82","canton":"St-Nicolas de la Grave","commune":"Saint-Michel","nom":"St_Michel_82","type":"Château","periode":"XIX","histoire":"trois châteaux à Saint-Michel dont celui de Saint-Michel du XIXe siècle, de Candes du XVIIIe siècle et de Montbrison du XIXe siècle.                                                                                                                                           St-MICHEL Le château  a été construit dans la première moitié du XIXe siècle, avant 1831, maître d'oeuvre inconnu. Pas d'information historique. Le château a été construit à l'initiative d'une riche famille de négociants céréaliers au début du XIXe siècle, dans l'esprit classique de la fin du XVIIIe siècle. Il s'agissait d'une grande exploitation viticole, ruinée par la crise du phylloxéra et par la mauvaise gestion de l'un de ses propriétaires.                                                CANDES et MONTBRISON  pas d'information historique.","architecture":"Saint-Michel  de  plan symétrique,étage de soubassement ; un étage carré, et attiques, toit en croupe  pavillon saillant plein cintre avec fronton triangulaire  avec oeils de boeuf, l'édifice est flanqué sur angle de la façade de tourelles carrées avec terrasses.                                                                                                                               Candes, de plan carré à deux niveaux et attiques toitures en croupes à l'intérieur d'un chemin de ronde, flanqué de deux ailes  d'un niveau de chaque côté à toit plats.                                                                                                                                                                                          Montbrison, résidence d'été grande maison de campagne de caractère du XIXe siècle à 2 pigeonniers en pierre  dans le style de la Lomagne, ancienne ferme du château de Monbrison, construite au XVII-XVIIIe siècle et déplacée au XIXe siècle face au château St-Roch.","habitants":"Seigneurs Locaux\r\n        \"","divers":"château de Saint-Michel , de Candes  et de Montbrison  à Saint-Michel","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Michel_82_1.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_2.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_3.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_4.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_5.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_6.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_7.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_8.jpg","../../jctruffet.com/image/image_82/82_St_Michel_82_9.jpg"]},"Consult_chateau_formulaire0681":{"id":"Consult_chateau_formulaire0681","dept":"82","canton":"Saint-Nicolas de la Grave","commune":"Saint-Nicolas de la Grave","nom":"St_Nicolas_Grave","type":"Château","periode":"XIII","histoire":"Châteaux à St Nicolas de Grave dit de Richard coeur de Lion et une  autre bâtisse plus maison de maître que château construite  vers 1800  de style Napoléoniene, chambres d'hôtes.                                                                                                                                           RICHARD, ce château légendaire est mentionné dans la charte établie en 1135 entre les abbés de Moissac et les vicomtes de Lomagne, c'est au XIIe siècle que les moines de Moissac édifient un château sur la rive gauche de la Garonne.     En 1135, Guillaume, abbé de Moissac s'associe au vicomte Saxetus de Lomagne et à la vicomtesse Sybille d'Auvillar pour accorder une charte à ce bourg qui devient la « sauveté » de Saint Nicolas (une sauveté est une agglomération fondée par les monastères antérieurement au mouvement de création des bastides) : les habitants sont libres dans l'enceinte de la ville. Car le lieu est un carrefour stratégique et il leur est disputé par les vicomtes de Lomagne. Des souterrains permettent de sortir du château et de rejoindre l'abbaye de Moissac.  Dans un acte additionnel à la charte, le vicomte de Lomagne jure aux moines et aux habitants de Saint-Nicolas de ne jamais leur enlever leur ville ni leur château et de les protéger contre les envahisseurs.  A lépoque, la Garonne coulait à ses pieds et il en gardait les abords.  L'aile Nord repose sur une construction antérieure à cette date. L'aile Est et la tour dite \"des Anglais\" sont attribuées à Richard Cur de Lion qui, au retour de croisade, aurait habité le château à la fin du XIIe siècle. L'aile Ouest et ses deux tours sont luvre de l'abbé Bertrand de Montaigu entre 1230 et 1295.\r\nAu milieu du XIXe siècle, deux tours ont été découronnées.\r\nCe petit Versailles Gascon reçoit aujourdhui les locaux de la Mairie.","architecture":"Ce château de brique à quatre grandes tours n'était à l'origine qu'une tour de guet dominant la Garonne aux pieds des remparts. \r\nAu XIIe siècle, fut ajoutée la \"tour des Anglais\", au Nord-Est, bâtie en grandes briques et dont la base légèrement évasée empêchait les envahisseurs d'y pénétrer. La légende dit qu'elle aurait été érigée sur ordre de Richard Coeur de Lion vers 1185. \r\nSelon le chroniqueur Aimery de Peyrac, l'aile de l'Ouest et ses 2 tours se dressant à 25 et 28m, auraient été construites par Bertrand de Montaigu, qui occupa la chaire abbatiale de Moissac de 1260 à 1295 et résida à St Nicolas. \r\nEn 1791, il est vendu à la municipalité au titre des biens nationaux. La mairie s'y est installée au début du XIXe siècle.","habitants":"Vicomte de Lomagne\r\n        \"","divers":"Château de Saint-Nicolas","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_1.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_2.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_3.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_4.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_5.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_6.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_7.jpg","../../jctruffet.com/image/image_82/82_St_Nicolas_Grave_8.jpg"]},"Consult_chateau_formulairec790":{"id":"Consult_chateau_formulairec790","dept":"82","canton":"Moissac","commune":"Lizac","nom":"St_Onze","type":"Château","periode":"XVII","histoire":"Saint-ONZE, le château de Saint-Onze aurait été offert au XVIIe siècle par Louis XIII à la famille de Saint-Cyr pour sa fidélité au roi après le siège de Montauban en 1628. Le château est resté dans la descendance depuis. L'édifice construit au XVIIe siècle a été modifié dans la partie Nord. L'inondation de 1930 ayant éventré cette partie, elle dût être démolie. Le sommet des tourelles de l'élévation sud a été refait à la fin du XIXe siècle. Il semblerait que cette façade ait été modifié au XVIIIe siècle. Les fenêtres portent des vitraux dont les médaillons centraux proviendraient de la cathédrale de Chartres. A l'intérieur, éléments de décoration du XVIIIe siècle dans la cage d'escalier que l'on retrouve à l'extérieur à travers l'enduit peint: rinceaux et rubans noirs sur fond jaune délimitant des panneaux. Dans la chambre, toile peinte représentant un paysage peut-être de la fin du XVIIIe siècle. Le salon renferme des peintures, portraits de la famille de Beaumont-Niclause exécutés par Caumont et Jacqué.","architecture":"château ,  de plan rectangulaire  à deux niveaux et attiques, flanqués aux angles de tourelles carrées sur encorbellement à créneaux, édifice du XVIIe et XVIIIe en briques cuites, six pigeonniers ou encore une fontaine de 1800.","habitants":"Famille de Saint-Cyr \r\n        \"","divers":"Château de Saint-Onze","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Onze_1.jpg","../../jctruffet.com/image/image_82/82_St_Onze_2.jpg"]},"Consult_chateau_formulaire5c6b":{"id":"Consult_chateau_formulaire5c6b","dept":"82","canton":"Valence d","commune":"Saint-Paul d","nom":"St_Paul_Espis","type":"Château","periode":"XI-XVI-XIX","histoire":"A St-Paul d'Espis, trois châteaux,  le manoir de Saint-Jean hôtel restaurant, les vestiges de Malause, de Piac, celui de Fossat et de Bonhoure, pas d'information  historique pour ces deux derniers.                                                                                                            FOSSAT, plus gentilhommière que château pas d'information.                                                                                                                                                                       MALAUSE, au Xe siècle et pendant près de quatre siècles, Malause est une seigneurie de la famille de Durfort, puissante maison dont le nom se trouve intimement lié non seulement à l'histoire de Malause, mais encore à celle de toute la région. Le 21 février 1489, Louise du Lion, riche héritière, se maria avec Charles, bâtard de Bourbon, sénéchal de Toulouse. Elle apportait à son époux, entre autres, la terre de Malauze et la vicomté de Lavedan.                                                                                                                PIAC, le toponyme paraît bien être dorigine gallo-romaine, désignant un domaine rural  issu dAppius suivi du suffixe Acum donnant Appiacom. Par un testament antérieur à 1468 noble Bertrand de Montesquieu institue pour héritier noble Jean de Gauléjac, bourgeois de Moissac, qualifié en 1488, seigneur de Piac seigneurie conservée jusquà Jacques comte de Gaulejac.\r\nLa haute juridiction lui fut enlevée en 1579, par le parlement de Toulouse, lequel la réunit à la juridiction de Moissac.","architecture":"Fossat, édifice rectangulaire à deux niveaux toit à deux pans avec des mâchicoulis sous toits, qui indique la présence d'un édifice médiéval dont il ne reste plus grand chose en réalité. L'aile en retour devant la maison est pour une grande partie une adjonction  postérieure à 1834 .                                                                        Piac, château reconstruit dans la 1ère moitié du XVIIe siècle après une démolition exécutée sur l'ordre des consuls de Moissac en 1584 ; aménagements divers au XVIIIe siècle ; un incendie en 1913 détruit le 2e étage du corps central, l'édifice actuel semble en effet pour l'essentiel être une reconstruction du XVIIe siècle (croisées, escalier). Le corps central servant de logis fut incendié en 1913 et perdit le 2ème étage. Le sous-sol voûté, servant aujourd'hui de cave, devait servir à l'origine de cuisine. L'aile droite semble  avoir été reprise au XVIIIe siècle, élévation à travées.                                                                                                         Manoir st-Jean de plan rectangulaire à deux niveaux, toit à deux pans avec fronton triangulaire.                                                                                                   Bonhoure corps de logis rectangulaire toit en croupe, flanqué en façade de deux tours carrées toit à quatre pans.                                                                      Malause Vesiges.","habitants":"Famille de Durfort                                                                                             Noble Jean de Gauléjac\r\n        \"","divers":"A St-Paul d'Espis, trois châteaux, le manoir de Saint-Jean hôtel restaurant, les vestiges de Malause, de Piac, celui de Fossat et de Bonhoure.","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Paul_Espis_1.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_2.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_3.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_4.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_5.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_6.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_7.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_8.jpg","../../jctruffet.com/image/image_82/82_St_Paul_Espis_9.jpg"]},"Consult_chateau_formulaire6132":{"id":"Consult_chateau_formulaire6132","dept":"82","canton":"Lafrançaise","commune":"Miramont du Quercy","nom":"St_Pierre_Haut","type":"Château","periode":"XVI-XIX","histoire":"St-PIERRE-HAUT, le château appartient depuis sa construction à la famille Delvolve qui possède des archives privées. D'après le propriétaire actuel, dans un  testament de 1555, il serait fait mention du château de Saint-Pierre-Haut. Dans un autre document , il serait question de travaux à Borde-Basse,\r\nmétairie du château. Au XVII siècle pour un capitoul de Toulouse, seigneur de Borde-Basse, fils ou petit fils du seigneur de Saint-Pierre.","architecture":"le château de Saint-Pierre-Haut, édifice rectangulaire à deux niveaux bâtiment en retour d'équerre, toiture masquée par fronton, toit à deux pans  avec fronton triangulaire accolé de terrasse sur la façade de côté. Tour carrée sur l'arrière.","habitants":"Famille Delvolve\r\n        \"","divers":"Château de Saint-Pierre-Haut","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Pierre_Haut_1.jpg","../../jctruffet.com/image/image_82/82_St_Pierre_Haut_2.jpg","../../jctruffet.com/image/image_82/82_St_Pierre_Haut_3.jpg","../../jctruffet.com/image/image_82/82_St_Pierre_Haut_4.jpg"]},"Consult_chateau_formulaire5152":{"id":"Consult_chateau_formulaire5152","dept":"82","canton":"Septfonds","commune":"St_Projet","nom":"St_Projet_82","type":"Forteresse","periode":"XIII-XVIII","histoire":"Saint-PROJET, cette seigneurie a été donnée par Philippe Le Bel a de Jehan qui fit construire le château primitif sur un tumulus gallo-romain,  cette famille, connue par la suite sous le nom de Jehan de Saint-Projet, a conservé ce fief jusqu'à ce qu'elle s'éteigne en ligne masculine et se fonde en 1560 dans la famille quercynoise de Lafon, par le mariage de Françoise de Jehan avec Flotard Ier de Lafon de Féneyrols.   De leur mariage, ils eurent quatre enfants, Flotard II, Marguerite mariée en 1585 avec Bathazard de Cadrieu, Suzanne mariée en 1590 avec Françoise de Cahuzac, et Jacques marié à Angelote de Castanet, fille de Bernard et de Jeanne de Montfaucon; Flotar II de Lafon, seigneur de Féneyrols et de Saint-Projet, épousa en 1585 Isabelle de Fontenille, dame de Montesquieu, fille de Philippe de La Roche, baron de Fontenille, gentilhomme ordinaire du roi Charles IX, et de Françoise de Lasseran-Massencomme qui était la fille du célèbre capitaine Montluc.\r\nLe petit-fils de Flotard II de Lafon de Féneyrols, Fabien de Lafon de Saint-Projet épousa le 12 novembre 1655  Françoise de Reilhac, dont Joseph Bonaventure, qui épouse Marie Bonaventure de Montclar de Montbrun, le 24 février 1705, dans la chapelle du château de Montbrun, à Méallet (Cantal), fille de Gaspard de Montclar et de Juliette de Fontanges.                                         Château ayant servi de refuge à Marguerite de Valois, la « reine Margot », poursuivie par les troupes du Roi de France Henri III, lors des guerres de religions. Partie de Nérac le 25 septembre 1585, elle couche au village de Brassard, dans l'Agenais, le lendemain, à Saint-Projet; le 27 à Bournazel, dans le Rouergue; le 28, elle est à Entraygues, le 29 à Montsalvy; le 30, chez elle, à Carlat. Là, elle est protégée et gardée par le capitaine du château, Gilbert de Marzes (Gilbert Robert de Lignerac).","architecture":"Bâtisse de Saint-Projet imposante  du XIIIe siècle avec ses quatre tours circulaires, le château se caractérise par son austérité avec son donjon bâti pour la guerre avec ses créneaux. Mais aussi par son aspect très XVIIIe siècle avec ses cinq magnifiques balcons. Ses salles bien décorées d'un mobilier d'époque et son jardin à la Française réalisés suivant les dessins des jardins de Vaux le Vicomte. Ce site du château de la reine Margot constitue un site incontournable de Tarn-et-Garonne.","habitants":"Marguerite de Valois, la « reine Margot \r\n        \"","divers":"Château médiéval de Saint-Projet.","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Projet_82_1.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_2.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_3.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_4.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_5.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_6.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_7.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_8.jpg","../../jctruffet.com/image/image_82/82_St_Projet_82_9.jpg"]},"Consult_chateau_formulaire8193":{"id":"Consult_chateau_formulaire8193","dept":"82","canton":"St-Nicolas de la Grave","commune":"Le Pin","nom":"St_Roch","type":"Château","periode":"XIX","histoire":"St-ROCH, l'architecte Théodore Olivier entreprend les travaux d'un premier château entre 1857 et 1859, pour Edouard Conquéré de Monbrison. Georges de Monbrison en est l'héritier en 1864. Il place l'agrandissement et l'embellissement du château sous la référence artistique de la Renaissance Française et dirige lui-même les choix d'ornementation et de construction dès 1865. Ses références architecturales s'inspirent des demeures seigneuriales de Touraine, plus particulièrement du château de Cangé à Saint-Avertin. Edmond Lechevallier Chevignard peint le décor intérieur du grand salon entre 1864 et 1869, le sculpteur Adrien Doriot se charge de la cheminée monumentale, Ernest Trilhe, architecte-décorateur parisien, réalise les autres salles ainsi que l'escalier monumental de Saint-Roch et les céramistes Genlis et Rudhardt s'inspirent des pavements chatoyants du château d'Ecouen pour le carrelage en faïence polychrome du salon. Les aménagements prennent fin en 1871 avec la bibliothèque.\r\nAujourd'hui hôtel restaurant de André Sagne  et Jean Louis Grugeon.                                                                                                                      Dans la commune du Pin un autre château de style différent.","architecture":"Le Pin est un tout petit village comportant une seule rue bordée de maisons à porches à arcades ou piliers du XVIIIe et XIXe siècle, mais rendu célèbre grâce à son joli château de style néo-Renaissance du nom de Saint-Roch. Monbrison s'attache à meubler son château dans le style de l'édifice et rassemble une collection d'oeuvres d'art éclectique, dont les portraits de personnalités marquantes des guerres de religion et du grand siècle constituent la pièce maîtresse. Il poursuit par ailleurs son oeuvre avec la création d'un parc à l'anglaise par le paysagiste Edouard André.                                                                                                                                            Château, y compris la terrasse avec sa salle des Gardes, l'exèdre située face à l'entrée, les communs avec la fontaine, la maison du gardien et le portail d'entrée du parc.","habitants":"Edouard Conquéré de Monbrison\r\n        \"","divers":"Château de Saint-Roch","gps":"","images":["../../jctruffet.com/image/image_82/82_St_Roch_1.jpg","../../jctruffet.com/image/image_82/82_St_Roch_2.jpg","../../jctruffet.com/image/image_82/82_St_Roch_3.jpg","../../jctruffet.com/image/image_82/82_St_Roch_4.jpg","../../jctruffet.com/image/image_82/82_St_Roch_5.jpg","../../jctruffet.com/image/image_82/82_St_Roch_6.jpg","../../jctruffet.com/image/image_82/82_St_Roch_7.jpg","../../jctruffet.com/image/image_82/82_St_Roch_8.jpg","../../jctruffet.com/image/image_82/82_St_Roch_9.jpg"]},"Consult_chateau_formulaire1b74":{"id":"Consult_chateau_formulaire1b74","dept":"82","canton":"Moissac","commune":"Moissac","nom":"Ste_Livrade","type":"Château","periode":"XV-XVIII","histoire":"SAINTE-LIVRADE dit de Saint Paul, édifice reconstruit aux environs de 1500 pour Jean de Tubières, lieutenant du sénéchal de Quercy, sur ordonnance du parlement de Toulouse de 1487. Jean de Tubières, lieutenant du sénéchal de Quercy, ayant rasé ie château précédent, fut condamné en 1487 par le parlement de Toulouse à le reconstruire. Il passa par la suite à la famille Del Peré de Saint-Paul qui en demeure propriétaire jusqu'au XIXe siècle.","architecture":"Le bâtiment  de  Sainte-Livrade se compose de deux étages carrés, le gros-oeuvre en brique et enduit, élévation à travée, surmontée de toit à longs pans brisés et croupe recouverts de tuiles plates et tuiles creuses. Adjonction et remaniements au XVIIe siècle, puis au XVIIIe siècle. Les tours furent en partie démolies en 1793, puis reconstruites.","habitants":"Famille de Jean de Tubières\r\n        \"","divers":"Château de Sainte-Livrade à Moissac","gps":"","images":["../../jctruffet.com/image/image_82/82_Ste_Livrade_1.jpg","../../jctruffet.com/image/image_82/82_Ste_Livrade_2.jpg","../../jctruffet.com/image/image_82/82_Ste_Livrade_3.jpg","../../jctruffet.com/image/image_82/82_Ste_Livrade_4.jpg","../../jctruffet.com/image/image_82/82_Ste_Livrade_5.jpg","../../jctruffet.com/image/image_82/82_Ste_Livrade_6.jpg","../../jctruffet.com/image/image_82/82_Ste_Livrade_7.jpg"]},"Consult_chateau_formulairea151":{"id":"Consult_chateau_formulairea151","dept":"82","canton":"Beaumont de Lomagne","commune":"Labourgade","nom":"Terride_Labourgade","type":"Forteresse","periode":"XIII","histoire":"TERRIDE;  l'amiral Savoie-Villars avec ses troupes,  prend par ruse l'abbaye de Belleperche et la dévaste sauvagement. Le Roi décide d'intervenir en 1572, après des semaines de siège. Tous les défenseurs sont pendus aux fenêtres du château. La famille de Terrides s'étant éteinte, le château passe aux Lévis- Mirepois. A la suite d'un mariage, en 1639, Terrides revient à Maxilien de Béthume mieux connu sous le nom de Sully. Boucicault revend ses droits sur la vicomté occupée. L'acheteur s'appelle Bertrand de Terrides, et avec son frère le bâtard, il entame une guerre personnelle qui durera 20 ans. A la fin des combats, les Terrides gouvernent une région vaste comme deux départements.\r\nDurant la période révolutionnaire, le château appartiendra au comte de Lanjuinais ardent révolutionnaire, fondateur du club des Jacobins et président de la convention nationale. Sous l'Empire, le domaine passe entre les mains du maréchal de Lauriston, aide de camp de Napoléon Ier. Par la suite, le château sera la propriété d'une famille toulousaine, les Magres, dont l'une des membres, Jane, exploratrice et aventurière, découvrira les frises de Darius en Perse. Enfin, c'est en 1987, que le domaine du château de Terrides sera aménagé en un complexe touristique unique en Midi-Pyrénées. Cette bâtisse monumentale du XIIIe siècle, lieu privilégié de détente, édifiés par les vicomtes de Terrides, a conservé cette majesté à la fois chaleureuse et austère issue d'une histoire fabuleuse. Aujourd'hui hôtel restaurant.","architecture":"la forteresse féodale du château de Terrides quadrangulaire corps de logis à trois niveaux avec en façade  ses trois tours \"donjon\" avec créneaux. A la Renaissance, leur descendant, Antoine de Lomagne, seigneur de Terrides, se distingue en Italie avec le chevalier Bayard. Il est nommé gouverneur du Piémont et à Pigneron, il fait construire la forteresse qui servira de prison au masque de fer. Reconnaissant de tous ses services, le roi François Ier se rend à Terrides le 20 septembre 1540 et lui fait don de nouveaux territoires. Les guerres de religion trouvent quatre frères au château.","habitants":"Famille de Terrides \r\n        \"","divers":"Château de Terride à Labourgade","gps":"","images":["../../jctruffet.com/image/image_82/82_Terride_Labourgade_1.jpg","../../jctruffet.com/image/image_82/82_Terride_Labourgade_2.jpg","../../jctruffet.com/image/image_82/82_Terride_Labourgade_3.jpg","../../jctruffet.com/image/image_82/82_Terride_Labourgade_4.jpg","../../jctruffet.com/image/image_82/82_Terride_Labourgade_5.jpg","../../jctruffet.com/image/image_82/82_Terride_Labourgade_6.jpg"]},"Consult_chateau_formulaire0623":{"id":"Consult_chateau_formulaire0623","dept":"82","canton":"Lafrançaise","commune":"Touffailles","nom":"Touffailles","type":"Château","periode":"XV-XVII","histoire":"deux châteaux à Touffailles dont celui de Touffailles et  celui de Combécane.                                                                       TOUFFAILLES  Le nom de Touffailles viendrait de « Toufels » qui désignerait une tribu de Goths. Cette origine serait identique à la ville espagnole de Tafalla. Sur la commune, qui s'étend sur plus de 10 km, se trouvent plusieurs chapelles : Moissaguel, Saint-Gervais, Sainte-Livrade. La tradition orale veut qu'une chapelle du nom de Sainte-Marthe aurait brûlée au Moyen Âge, à côté du lieu-dit Lacontal près des champs de lavande du Quercy.                                                                                                           COMBECAVE est une entreprise relativement jeune car elle a été créée en septembre 2007. Peut-être construit dans la 1ère moitié XIVe siècle, le château est sans doute démoli au début du XVe siècle et la carte de Cassini le mentionne en ruines. Les deux tours qui subsistaient partiellement se sont effondrées en 1983.   Monsieur le comte Harrington et Anita madame la comtesse Harrington.","architecture":"Touffailles, charmante chartreuse de 600 m², datant du XVIIe siècle, magnifiquement et entièrement rénovée puis décorée dans un style contemporain. Construit en pierre de tuffeau avec un toit de tuiles en terre cuite, le château se compose d'une façade principale avec une tour carrée à chaque extrémité et de deux ailes qui entourent une très jolie cour sur trois côtés. Des jardins paysagers avec des arbres entourent le château, ils offrent une vue panoramique et spectaculaire sur la vallée, le tout sur 25 hectares.   Les remparts d'un ancien château médiéval surplombent le village. Une ancienne ferme et une chapelle en sont les vestiges.","habitants":"Monsieur le Comte Harrington \r\n        \"","divers":"Château  de Combécave à Touffailles","gps":"","images":["../../jctruffet.com/image/image_82/82_Touffailles_1.jpg","../../jctruffet.com/image/image_82/82_Touffailles_2.jpg","../../jctruffet.com/image/image_82/82_Touffailles_3.jpg","../../jctruffet.com/image/image_82/82_Touffailles_4.jpg","../../jctruffet.com/image/image_82/82_Touffailles_5.jpg"]},"Consult_chateau_formulaire24fe":{"id":"Consult_chateau_formulaire24fe","dept":"82","canton":"Lafrançaise","commune":"Tréjouls-saint-Urcisse","nom":"Tréjouls","type":"Château","periode":"XVII-XIX","histoire":"Cinq châteaux à Tréjouls celui de Tréjouls et de Berty, de Sabatie (1597)  et de Granoulet.                                                                                                                                                SABATIE, ce château existe encore, mais il na plus de caractère historique. On y trouve une vieille tour carrée et des salles voûtées. Il faisait office de prison pour St-Urcisse.\r\nGRANOULET : Il est de construction plus récente et na pas de cachet historique.                                                                                                                                  TREJOULS  pas d'information historique.                                                                                                                                           BERTY le comte de Fabry de Berty est venu s'installer en Lot et Garonne, dans le village de Clermont Soubiran  ou Clermont Dessus  où, en 1783, il a fait bâtir un château portant le nom de Coujetou. Ce domaine fut vendu après la Révolution par un notaire de Valence d'Agen. Peu importe si ce blason est représenté en image ou s'il est simplement décrit dans les termes héraldiques.","architecture":"Tréjouls, à des origines fort lointaines comme latteste la découverte de monnaies et dune statuette antique dathlète en bronze. Une partie de ce château, les deux tours, ont été détruites à la Révolution sous prétexte dégalité. (Propriété privée).                                                                                                                   BERTY, château reconstruit au XIXe siècle  ; mentionné au XVIIIe siècle dans la carte de Cassini et signalé avec en plan différent sur le plan cadastral ancien","habitants":"Famille de Fabry de Berty\r\n        \r\n        \"","divers":"Château à Tréjouls","gps":"","images":["../../jctruffet.com/image/image_82/82_Trejouls_1.jpg","../../jctruffet.com/image/image_82/82_Trejouls_2.jpg","../../jctruffet.com/image/image_82/82_Trejouls_3.jpg","../../jctruffet.com/image/image_82/82_Trejouls_4.jpg"]},"Consult_chateau_formulaire2379":{"id":"Consult_chateau_formulaire2379","dept":"82","canton":"Lafrançaise","commune":"Valeilles","nom":"Valeilles","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Valeilles, celui de Quinsac Bas, de Sulavon, et de Touyré.                                                                                      QUINSAC, le bâtiment devient possession des Montpezat en même temps que la seigneurie de Laugnac. Il semble que ce soit un des membres de la famille, Charles, qui en ait fait don à Jean de Preyssas en 1470. Un siècle plus tard, il devient propriété, par mariage, des Malvin de Montazet qui le conservent jusquà la Révolution.                                                                                                                           SULAVON il appartient à Deratier Aline.","architecture":"Quinsac de plan en U corps de logis rectangulaire à trois niveaux flanqué d'une tour carrée  sur angles de la façade.                                                                                                       Sulavon, de plan en U à deux niveaux flanqué de tour carrée, l'appareil en moellons, et peut-être l 'angle arrondi de la tour, la présence de fenêtres à meneaux et d'une porte chanfreinée, ainsi peut-être que la présence de nombreux trous de boulins sur l'élévation sur cour permettraient de situer l 'époque de construction au XVIIe siècle. L'édifice a subi de très nombreux remaniements.                                                                                                  Touyré, construction massive et importante en pierres de tailles et grands éléments de chaînage d'angles et d'encadrements des ouvertures, rares sur les quatre face sud lucarnes en oculus. Autrefois, cour fermée par un portail disparu. Entrée de la maison face Sud par portail cintré surmonté d'un écu datant de  1634 initiales A. R. S. D.  retour d'angle Sud-ouest, retour d'équerre plus récent à l'angle Nord-Est  avec traces d'encorbellement de bretèche, faces Ouest et Nord, austères à forte patine de la pierre Intérieure avec escalier droit à paliers, pierre, boiseries et cheminée à gypseries du  XVIIIe siècle.","habitants":"Famille de  Malvin de Montazet\r\n        \"","divers":"A Valeilles le château de Quissac, de Sulavon et de Touyré","gps":"","images":["../../jctruffet.com/image/image_82/82_Valeilles_1.jpg","../../jctruffet.com/image/image_82/82_Valeilles_2.jpg","../../jctruffet.com/image/image_82/82_Valeilles_3.jpg","../../jctruffet.com/image/image_82/82_Valeilles_4.jpg","../../jctruffet.com/image/image_82/82_Valeilles_5.jpg","../../jctruffet.com/image/image_82/82_Valeilles_6.jpg","../../jctruffet.com/image/image_82/82_Valeilles_7.jpg","../../jctruffet.com/image/image_82/82_Valeilles_8.jpg","../../jctruffet.com/image/image_82/82_Valeilles_9.jpg"]},"Consult_chateau_formulairedb1f":{"id":"Consult_chateau_formulairedb1f","dept":"82","canton":"Valence","commune":"Valence d","nom":"Valence_Agen","type":"Château","periode":"XVII","histoire":"Quatre  châteaux à Valence d'Agen celui de Lanburne du XVIIe siècle, de l'issendou,  et le Sirat du XVIIe siècle et du Castell du XVIIIe siècle.                                                                                               CASTELS, le château fut l'objet d'importants travaux en 1578 et 1581, puis fut reconstruit par Emmanuel de Timbrune dans les premières années du XVIIe siècle. L'ensemble de l'édifice fut restauré et les toitures furent refaites à la fin du XIXe siècle. Dans les années 1930, un incendie rendit nécessaire une réfection des toitures.  une aquarelle de Just Liscre datée de 1876 et réalisée pour l'exposition internationale de 1878 a été présentée qui se tenait au musée des Arts décoratifs à Paris en septembre 1983. Eléments protégés MH : la terrasse du XVIIe siècle; le pont à deux arches.                                                               SIRAT  sire Antoine Herault marchand de Moissac, ayant acheté de Me Raymond de Tresvieulx jadis receveur de la juridiction de Valence une métairie sise en la dite juridiction au terroir de sirat confrontant avec 3 châteaux publics, dans laquelle le docteur Herault a voulu faire édifier une belle maison avec deux tours au deux coins d'icelle; mais noble Jullien de Timbrune  seigneur haut justicier, moyen et bas foncier et directe de Valence, voulant l'en empêcher.  Pierre Marie Gabriel Vidalot du Sirat ou Dusirat, né le 25 mars 1764 au château du Sirat près de Valence-dAgen, mort le 30 décembre 1843 à Valence, est un général français de la Révolution et de lEmpire. Remis en activité en 1809, il commande le département du Tarn-et-Garonne, et le 25 juillet 1815, celui du Lot-et-Garonne. Il est admis à la retraite le 14 août 1815. Il meurt le 30 décembre 1843, à Valence.                                               Pas d'information historique pour le château de laburne et d'Issendou.","architecture":"Castel,   de plan en U corps de logis à deux niveaux  sur soubassement important, série de lucarnes sur toit en croupe flanqué aux extrémité de trois pavillons   rectangulaire et carré à trois niveaux à mâchicoulis toits à l'impérial.                                                                                                                                                      Serat, bâtisse emblématique du site, corps de logis de plan en H à trois niveaux  avec lucarnes toit en impériale  flanquée en angle d'une tourelle ronde à mâchicoulis toit en poivrière et d'une tour carrée toit à l'impérial, l'établissement donne donc accès à cet édifice historique dont il a désormais fait son siège administratif et qui accueille l'exposition «Le château», en dessous : fenêtre, les touvelles furent oonstruites ou reconstruites vers 1860 avec cordon d'étage anti-rongeurs,  au niveau du toit de la maison sous lequel s'insère une série de lucarnes et oeils de boeuf. \r\nLentourne manoir à trois niveaux avec lucarne sur toit brisé flanqué sur façade d'entrée pavillon saillant au angles arrondie avec toit en domes, avec fronton rotondand, l'édidice posséde à chaque angles d'échauguettes polygonales  sur encorbellement.\r\nIssendou de plan carré, corps de logis  à deux niveaux avec  lucarnes centrales entre pavillons carrés aux angles à trois niveaux à toits quatre pans brisés.","habitants":"Emmanuel de Timbrune                     sire Antoine Herault\r\n        \"","divers":"Château  de Castel, d'Issendou, de Lamburne et de Sirat à Valence d'Agen","gps":"","images":["../../jctruffet.com/image/image_82/82_Valence_Agen_1.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_2.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_3.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_4.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_5.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_6.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_7.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_8.jpg","../../jctruffet.com/image/image_82/82_Valence_Agen_9.jpg"]},"Consult_chateau_formulaire69b5":{"id":"Consult_chateau_formulaire69b5","dept":"82","canton":"Septfonds","commune":"Varen","nom":"Varen","type":"Forteresse","periode":"XV-XVII","histoire":"Cinq château à Varen dont celui  de Belpech du XIV-XVe siècle (Voir article),  De Puech-Rodel, de Cadiès du XVIIe siècle,  de la Varen-Doyenné du XIV-XVIIe siècle et le fort de Péchrodil                                                                                                                              VAREN, dit de la Doyenné , le prieuré bénédictin de Varen, mentionné dans un acte de 972, ne fut que tardivement rattaché à l'abbaye d'Aurillac. Au sud de l'église, un ensemble conventuel fut édifié auquel on ajouta au début du XVIe siècle un château afin de servir de résidence aux doyens, seigneurs des lieux. Il fut racheté en 1979 par la commune et réhabilité pour abriter la mairie. Pour un historique détaillé voir également le château dit Doyenné                             PECHRODIL, centrée sur le manoir, l'histoire plus complète de la famille Gros de Péchrodil est consultable par les liens donnés en références, celle ci avait au XVIIIe siècle encore des fiefs, non seulement à Pech-Rodil, sur la paroisse de St Grégoire, mais encore sur celles de Varen, de St Martial-les-Grèges, de Puechmignon, de St Julien de Belpech, de Saint-Cambrairi ou St Caprais.                                                                                        CADIES Pas d'informations historique.","architecture":"Péchrodil, le fort existant au XIIIe siècle, sur cette colline érodée, au dessus du moulin, au bord de la falaise rougie par les eaux, point de vue exceptionnel, véritable guet sur la vallée de l'Aveyron et ses cultures de chanvre, fût le centre de la seigneurie de Péchrodil. Les vestiges subsistants ainsi que les descriptions que les archives et récits nous laissent, permettent de donner du château et des constructions environnantes une description assez précise, résumée ici à l'essentiel de son aspect extérieur.                                                                                                           Varen, la fontaine se trouve sur une grande place irrégulière dominée par la masse très imposante de lancien château, utilisé maintenant par lhôtel de ville. Cest une grosse tour rectangulaire avec une petite tour cubique annexe suspendue au-dessus de larche de la rue. Le premier château fut construit dès le IXe siècle car cétait la ville frontière des comtes dAuvergne au contact avec les comtes de Toulouse, mais le château actuel date du XVe siècle,  cest amusant de le comparer aux châteaux de la même époque en Berry qui sont complètement différents.                                                                                           Doyenné le château composé d'un logis rectangulaire flanqué d'une tour d'escalier est édifié à fin du XVe siècle, sur des structures plus anciennes peut-être du XIVe siècle ; au XVIIe siècle, il est remanié et une aile en retour au sud-est ajoutée ; le château est vendu comme bien national en juin 1793.                                                                                                                       Cadiès, château reconstruit probablement à la fin du XIXe siècle en conservant des vestiges du XVIIe siècle (échauguettes) ; dénaturé.","habitants":"Famille Gros de Pechrodil\r\n        \"","divers":"Château de Varen-Doyenné de Puechrodil et  de Cadiès à Varen","gps":"","images":["../../jctruffet.com/image/image_82/82_Varen_1.jpg","../../jctruffet.com/image/image_82/82_Varen_2.jpg","../../jctruffet.com/image/image_82/82_Varen_3.jpg","../../jctruffet.com/image/image_82/82_Varen_4.jpg","../../jctruffet.com/image/image_82/82_Varen_5.jpg","../../jctruffet.com/image/image_82/82_Varen_6.jpg","../../jctruffet.com/image/image_82/82_Varen_7.jpg","../../jctruffet.com/image/image_82/82_Varen_8.jpg","../../jctruffet.com/image/image_82/82_Varen_9.jpg"]},"Consult_chateau_formulaire6752":{"id":"Consult_chateau_formulaire6752","dept":"82","canton":"Verdun sur Garonne","commune":"Verdun sur Garonne","nom":"Verdun_sur_Garonne","type":"Château","periode":"XII","histoire":"VERDUN-sur-Garonne, ancienne ville fortifiée vous offre aujourd'hui un patrimoine architectural préservé, témoin d'un riche passé. C'est au Xe siècle qu'est mentionné le premier seigneur de Verdun au  Forton-Guilhem. Les princes de Verdun  gouvernent au début un petit territoire appelé de Verdit ou de Guarn, qui s'étendra par la suite en direction de la Gascogne. Après Guillaume de Verdun, dernier seigneur du lieu, la seigneurie entre dans le domaine direct des comtes de Toulouse.  On peut dire que Verdun est né de la Garonne. L'existence de son port, ou plutôt ses ports (car il y en a eu au moins deux sis en aval et en amont de la ville), nous est connue depuis le XIIe siècle. Le port d'escale, pour la navigation fluviale, est cité à cette époque comme étant le premier après Toulouse dans le sens de la descente. Partie la plus ancienne de la cité, elle était surtout constituée de riches commerçants, notables et bourgeois dont les maisons avec jardins donnaient sur la Garonne. \r\nCette ancienne porte de ville donne accès à l'artère principale de la cité, construite en brique, elle comporte trois étages en torchis et colombage sur la façade Est. À l'Ouest, vous pouvez voir une horloge avec fronton du XVIIe siècle.","architecture":"La Villa Maria, construite au XIXe siècle doit son appellation locale à sa situation. En effet, elle est édifiée sur l'emplacement du château seigneurial, entièrement détruit durant les guerres de religions, qui, selon la tradition, aurait abrité la célèbre Reine Margot. Sa tour semble inspirée de celle du château de Castelnau de Levis, près d'Albi. Désormais Verdun figure dans toutes les encyclopédies du judaïsme parmi les lieux de mémoire où le peuple juif a souffert cruellement. Un château aujourd'hui privé y est présent et est surnommé « le château de la reine Margot » et ceci en référence à la légende  qui dit que la reine Margot était envoyée dans ce château lorsqu'elle était punie par le roi. En réalité, ce bâtiment est beaucoup plus récent.","habitants":"Famille de Forton-Guilhem\r\n        \r\n        \"","divers":"Le château de la reine Margot, la porte de la ville et l'hôtel de ville à Verdun sur Garonne.","gps":"","images":["../../jctruffet.com/image/image_82/82_Verdun_sur_Garonne_1.jpg","../../jctruffet.com/image/image_82/82_Verdun_sur_Garonne_2.jpg","../../jctruffet.com/image/image_82/82_Verdun_sur_Garonne_3.jpg","../../jctruffet.com/image/image_82/82_Verdun_sur_Garonne_4.jpg","../../jctruffet.com/image/image_82/82_Verdun_sur_Garonne_5.jpg"]},"Consult_chateau_formulaireb783":{"id":"Consult_chateau_formulaireb783","dept":"82","canton":"Septfonds","commune":"Verfeil","nom":"Verfeil_82","type":"Château","periode":"XIV","histoire":"Trois châteaux à Verfeil celui de Paulhac du XIVe siècle et de Rodés  du XVIIe siècle.                                                                                                                                      PAULHAC, semble avoir appartenu à la famille de Bérail depuis au moins 1338. Il serait passé par mariage en 1581 dans la famille de Murat de Lestang. Mr de Saissac dénombre pour une part de la tour de Paulhac dans un compoix de 1545. Jacques de Lafon, seigneur de Castanet en Rouergue pour une maison \"sive castel ruiné\" appelé la tour de Paulhac, audit lieu, et près des ruisseaux de la Drech et d'Aymert dans un compoix de 1606. En 1665, \"noble J. de Lestang, seigneur de Paulhac, Pomairols, Jamblusse, Belpech et autres lieux tient et possède dans la juridiction de Paulhac, château, tour. Aveu et dénombrement de François de Lestang de Beral en 1734 pour un \"château composé d'une tour ruiné. Le surplus ayant été démoli par ceux de la religion qui forcèrent ledit château\".                                                                                                                                                                                                                                      RODES, bastide créée par Alphonse de Poitiers, comte de Toulouse, entre 1250 et 1269  édifice du XVIIe siècle;  remanié et agrandie au XVIIIe siècle : actuellement dénaturé.","architecture":"Paulhac, ne subsiste que des éléments construits au XIVe siècle, les portes en arc brisé  du XVe siècle, des vestiges de croisées, intégrés dans un édifice partiellement reconstruit et transformé en ferme. L'édifice se trouve à proximité de l'église, dans un hameau situé à l'extrémité d'un plateau dominant la vallée de la Seye et le ruisseau de Nego Saoumo. Il comprend  un logis très remanié, un fournil, un hangar et une grange-étable. Bâtiment principal formé de deux corps en L et flanqué d'une tour carrée sur l'élévation, et il se prolongeait à l'ouest, comme en témoignent les traces d'arrachement sur l'élévation ouest et le vestige du piédroit d'une croisée décorée située dans l'angle sud-ouest. La partie nord comprend un étage de soubassement partiellement voûté, un rez-dechaussée surélevé et un comble à surcroît ; la partie sud contient un deuxième étage carré. La toiture est couverte d'un toit en pavillon.                                                                                      RODES, selon un plan orthogonal ménageant une place centrale. construit au XVIIe siècle, situé en bordure de la vallée de la Seye ; il comprend un bâtiment principal à plusieurs corps, très remanié et un bâtiment de dépendance. Les élévations sont crépies, à l'exception de l'élévation postérieure. Le bâtiment principal présente un plan en L, avec deux tours demi-hors-oeuvre : l'une située sur l'angle sud-est; l'autre à l'ouest, dans l'angle, à la jonction des deux ailes. A l'intérieur, au rez-de-chaussée la pièce principale contient une cheminée engagée, dénaturée mais encore datable du XVIe siècle; la tour d'escalier contient un escalier récent, en bois.","habitants":"Famille de  Murat de Lestang                                                                             \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Paulhac, et de Rodhés à Verfeil","gps":"","images":["../../jctruffet.com/image/image_82/82_Verfeil_82_1.jpg","../../jctruffet.com/image/image_82/82_Verfeil_82_2.jpg","../../jctruffet.com/image/image_82/82_Verfeil_82_3.jpg","../../jctruffet.com/image/image_82/82_Verfeil_82_4.jpg","../../jctruffet.com/image/image_82/82_Verfeil_82_5.jpg"]},"Consult_chateau_formulaire9b5c":{"id":"Consult_chateau_formulaire9b5c","dept":"82","canton":"Beaumont de Lomagne","commune":"Verdun sur Garonne","nom":"Vigueron","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Vigueron celui d'Escudés du XVIIIe siècle et celui de Manas du XIXe siècle                                                                                                                                                       VIGUERON, le nom de Vigueron est attesté au XIIIe siècle sous la forme de Castro Vicaro. En 1261 cette seigneurie appartient à Raymond de Bessens, à Bernard de Barrairac, à Bernard de Villeneuve, à Arnaud de Scuders et à Gautier du Bouzet. Elle est alors sous la suzeraineté de Bernard d'Astaffort.\r\nOdon de Terride, fils de Bernard d'Astaffort, est qualifié de seigneur du Vigueron dans un acte du 28 septembre 1296. Après la mort de Pierre de Gaudoux, la seigneurie revient aux vicomtes de Terride jusqu'à la Révolution.\r\nEn 1317, la paroisse est placée sous le patronage de Sainte-Quitterie, patronne de la Gascogne.                                                                                                                                ESCUDES, son fondateur est le seigneur de Scuders qui résidait au château de Vigueron. L'édifice est rustique et de dimension modeste, ce qui peut expliquer les rares évènements survenus au cours de son histoire.                                                                               MANAS, pas d'information historique","architecture":"Escudés, l'édifice est rustique et de dimension modeste, ce qui peut expliquer les rares évènements survenus au cours de son histoire.                                                                                                 Le château de Manas est situé au centre d'un domaine agricole sur l'un des coteaux bordant la vallée de la Gimone; il se compose d'un corps de logis, d'un pigeonnier et de divers bâtiments ou corps de bâtiments à fonction agricole. Cet édifice est déjà mentionné sur le cadastre de 1837, sur le même emplacement ; sa construction a donc pu intervenir peu de temps auparavant. Le pigeonnier et les deux bâtiments qui l'accompagnent n'étaient pas encore construits à cette date.","habitants":"Famille de Bernard d'Astaffort\r\n        \"","divers":"Château d'Escudès et de Manas à Vigueron","gps":"","images":["../../jctruffet.com/image/image_82/82_Vigueron_1.jpg","../../jctruffet.com/image/image_82/82_Vigueron_2.jpg","../../jctruffet.com/image/image_82/82_Vigueron_3.jpg","../../jctruffet.com/image/image_82/82_Vigueron_4.jpg","../../jctruffet.com/image/image_82/82_Vigueron_5.jpg"]},"Consult_chateau_formulaire1fb6":{"id":"Consult_chateau_formulaire1fb6","dept":"82","canton":"La Bastide St-Pierre","commune":"Verdun sur Garonne","nom":"Villebrumier","type":"Château","periode":"XIX","histoire":"VILLEBRUMIER, Pierre Gerla,  fils du notaire local, devenu député au conseil des cinq cents (la dernière assemblée législative avant le consulat et le Premier Empire), puis revenu au pays, fit construire le château entre 1809 et 1815 sur un grand terrain au bord du Tarn. Pierre Gerla étant mort sans enfants, le château passa à ses neveux puis à leurs propres héritiers, la famille Bénaïs, qui l'habitèrent jusqu'en 1877. Durant cette période le château bénéficia de l'adjonction d'un nouvel étage et de deux tours, et de nombreux embellissements intérieurs et extérieurs. En 1877, en solde d'une dette, le château fut cédé à une famille de nobles mécènes et artistes, le comte et la comtesse de Marigny. De 1890 à 1908, Jean de Marigny fait au château des transformations et des embellissements importants : remaniement de la façade, surélévation des tours, création d'un péristyle, ornementation de façade par des frises en faïences polychromes de Gaston Virebent.  Jean de Marigny entretenait des relations avec de nombreux écrivains, artistes, hommes politiques. En particulier, il se lia d'amitié avec le grand sculpteur Antoine Bourdelle, qui effectua de nombreux séjours au château, et que Jean de Marigny soutient financièrement.  Au décès de Jean de Marigny en 1927, le château fut cédé à la famille d'un médecin toulousain, le docteur Azam, comme résidence de campagne; il passa ensuite à ses héritiers. De 1965 à 1991, le château, devenu la propriété de M. Beaufils héritier lointain des Azam. Après quelque temps il cessa d'être bien entretenu mais servit d'hôpital temporaire pendant la seconde guerre mondiale.  en 1989 une partie du parc fut cédée à la municipalité pour la construction d'une maison de retraite. À partir de 1996 de nouveaux propriétaires, la famille Laporte, ont restauré le château, qui fut inscrit aux monuments historiques.","architecture":"A Villebrumier, Il réutilisa les fondations d'un bâtiment plus ancien faisant partie d'une exploitation agricole, et réalisé d'importantes extensions. Le parc s'est enrichi d'arbres de plusieurs espèces rares,  un château construit sur trois étapes, la chartreuse dorigine bâtie vers 1820 ayant été surélevée pour devenir une maison de maître au XIXe siècle, transformée en château dans les années 1890 avec la contribution de larchitecte Rocher. En 1960, la propriété est louée à un exploitant agricole. Le parc et la forêt de cèdres sont transformés en vergers. Les parcelles ouest ont été vendues à la commune, après 1965  bâtiments non entretenus, se dégradent profondément. En 1989, le mobilier restant est dispersé par une vente aux enchères. En 1991, le château est acheté par un allemand, Manfred Lorenz, pilote instructeur à Airbus. Des problèmes familiaux le contraignent à revendre la propriété. En 1996,  Bernard et Jeannie Laporte acquièrent le château et entreprennent des travaux de réhabilitation et daménagement visant à redonner à cette demeure son faste et son destin de lieu de réceptions.   Le château est devenu un lieu recherché pour des événements tels que des concerts, séminaires scientifiques, mariages et réunions familiales.","habitants":"Pierre Gerla                                                                                     Famille Bénaïs                                                                                                Famille Laporte\r\n        \r\n        \"","divers":"Château de Villebrumier","gps":"","images":["../../jctruffet.com/image/image_82/82_Villebrumier_1.jpg","../../jctruffet.com/image/image_82/82_Villebrumier_2.jpg","../../jctruffet.com/image/image_82/82_Villebrumier_3.jpg","../../jctruffet.com/image/image_82/82_Villebrumier_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','82 — Tarn-et-Garonne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
