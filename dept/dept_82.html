XVIIIe siècle.  Le château, dont on aperçoit encore au-dessus du village les vestiges,                                                                                                                                   Le château de Mauvaisin est un petit château du XVIIe à taille humaine offrant de grands espaces, remaniement du plan et d'une élévation au XVIIIe siècle.","habitants":"Seigneur Bertrand de Goth\r\n        \"","divers":"Château de Mauvaisin à Mansonville","gps":"","images":["../../jctruffet.com/image/image_82/82_Mansonville_1.jpg","../../jctruffet.com/image/image_82/82_Mansonville_2.jpg","../../jctruffet.com/image/image_82/82_Mansonville_3.jpg","../../jctruffet.com/image/image_82/82_Mansonville_4.jpg","../../jctruffet.com/image/image_82/82_Mansonville_5.jpg","../../jctruffet.com/image/image_82/82_Mansonville_6.jpg","../../jctruffet.com/image/image_82/82_Mansonville_7.jpg"]},"Consult_chateau_formulairedf4c":{"id":"Consult_chateau_formulairedf4c","dept":"82","canton":"St-Nicolas de la Grave","commune":"Marsac","nom":"Marsac","type":"Château","periode":"XIII-XVI","histoire":"MARSAC,  en 1277, le château était le siège dune seigneurie appartenant à Sans Garcié de Manas. Toutefois cette seigneurie était partagée avec le seigneur de Preissac et les Montesquiou, baron anglais. Une partie du château fut rasée sous Richelieu. Des écuries et des communs édifiés en 1563 achevaient de clôturer une cour, mais ils seront démolis au XIXe siècle, permettant au logis davoir une belle vue sur le village. En 1641, Jean de Montesquiou devint le seul seigneur du lieu qui revient en 1677 à Jean-Paul de Rochenchouart marquis de Faudoas. En 1741 Melchior François de Reversat de Céles conseiller au parlement de Toulouse devient seigneur de Marsac. Ses descendants, la famille de Marsac, propriétaires.","architecture":"Marsac, tour du XIIIe siècle ; adjonction d'un corps de logis avec escalier dans la 1ère moitié du XVIe siècle ; adjonction d'une galerie au nord vers 1557 pour Hélène de voisins  ; écuries construites en 1563  ; remaniement des ouvertures et du décor intérieur au XVIIIe siècle ; construction d'une aile avec chapelle et destruction des écuries et dépendances au XIXe siècle.","habitants":"Famille de  Jean de Montesquiou\r\n        \"","divers":"Château de Marsac","gps":"","images":["../../jctruffet.com/image/image_82/82_Marsac_1.jpg","../../jctruffet.com/image/image_82/82_Marsac_2.jpg","../../jctruffet.com/image/image_82/82_Marsac_3.jpg","../../jctruffet.com/image/image_82/82_Marsac_4.jpg"]},"Consult_chateau_formulaire6b8a":{"id":"Consult_chateau_formulaire6b8a","dept":"82","canton":"Verdun sur Garonne","commune":"Mas_Grenier","nom":"Mas_Grenier","type":"Château","periode":"XVI","histoire":"Deux châteaux à Mas-Grenier, l'abbaye St-Trescaty                                                            MAS-GRENIER, l'abbaye Saint-Pierre du Mas-Garnier ou Mas de Verdun (anciens noms de Mas-Grenier) existait au début du XVIIe siècle : Jean de Bertier, né à Toulouse en 1556, originaire d'une puissante famille parlementaire, chanoine et archidiacre de Toulouse, fut abbé commendataire de Saint-Pierre de Mas-Garnier, Saint-Sever de Rustan, Saint-Vincent de Senlis et de l'abbaye Notre-Dame de Lieu-Restauré, aussi évêque de Rieux entre 1602 et sa mort survenue en 1620. Il est attesté comme prieur de Saint-Tutuarn en 1605.                                                                                                                             Mas-Grenier fut une place de sûreté protestante à partir de 1645.","architecture":"Château de Frescaty (non visitable) avec une cave voûtée, deuxième moitié du XVIIIe siècle.                                                                                               \r\nLa commune de Mas-Grenier, appelée aussi jusqu'au XIXe siècle Mas-Garnier, Mas de la Cour ou Mas de Verdun, doit son origine à une abbaye bénédictine dédiée à Saint-Pierre, fondée au Moyen-Age. Elle devint avec la réforme une des huit places de sûreté accordées aux protestants de France par le roi Henri III. Le culte catholique fut rétabli en 1600.","habitants":"Famille de Jean de Bertier\r\n        \"","divers":"Château de Frescaty et abbaye à Mas-Grenier","gps":"","images":["../../jctruffet.com/image/image_82/82_Mas_Grenier_1.jpg","../../jctruffet.com/image/image_82/82_Mas_Grenier_2.jpg","../../jctruffet.com/image/image_82/82_Mas_Grenier_3.jpg"]},"Consult_chateau_formulairef2a8-2":{"id":"Consult_chateau_formulairef2a8-2","dept":"82","canton":"Castelsarrasin","commune":"Meauzac","nom":"Meauzac","type":"Château","periode":"XVI-XVIII","histoire":"Deux château à Meauzac celui de Pech et celui des Chanterelles                                              PECH,   Meauzac sa réforme fut introduite de bonne heure dans notre village. Les seigneurs barons de Meauzac, et notamment Guion de Bar adoptèrent les nouvelles croyances et en favorisèrent létablissement. Aussi, la grande majorité des habitants professait la religion réformée : il nest donc pas étonnant que léglise ait été détruite en 1561 et quun temple lait remplacée quelques années après. Ce temple fut construit à proximité du château. Les protestants de Montauban ayant chassé leurs évêques, Jacques Després celui-ci leva une armée pour reprendre la ville et ravager les environs. Meauzac eut à souffrir de ses attaques et le château fut pris par les catholiques. Mais les Montalbanais, commandés par le vicomte de Turenne, chef des protestants, arrêtèrent les courses de lévêque et vinrent mettre le siège devant Meauzac (mai 1575). Le château  a fait lobjet de nombreux assauts.                                                                                                                                           Chanterelles demeure du XIXe siècle à Meauzac.","architecture":"Meauzac-Pech, le logis a été construit au XVIIIe siècle, au XIXe siècle, après 1836 , le château est remanié et la chapelle lui est ajoutée, alors que les communs et les parties agricoles sont entièrement reconstruites. \r\nLe corps de logis présente un couloir en façade desservant des pièces en profondeur et la chapelle en retour. La cuisine occupe la partie sud-ouest du bâtiment.                                                                                                                                      Chanterelles de plan rectangulaire  deux niveaux et attiques toits en croupe, flanqué de deux tourelles carrées aux angles sur la façade arrière.","habitants":"Evêque Jacques Després \r\n        \"","divers":"Château de Pech, de Chanterelles à Meauzac","gps":"","images":["../../jctruffet.com/image/image_82/82_Meauzac_1.jpg","../../jctruffet.com/image/image_82/82_Meauzac_2.jpg","../../jctruffet.com/image/image_82/82_Meauzac_3.jpg","../../jctruffet.com/image/image_82/82_Meauzac_4.jpg","../../jctruffet.com/image/image_82/82_Meauzac_5.jpg","../../jctruffet.com/image/image_82/82_Meauzac_6.jpg","../../jctruffet.com/image/image_82/82_Meauzac_7.jpg","../../jctruffet.com/image/image_82/82_Meauzac_8.jpg"]},"Consult_chateau_formulaire0e37":{"id":"Consult_chateau_formulaire0e37","dept":"82","canton":"Moissac","commune":"Montech","nom":"Mesnil_Montech","type":"Château","periode":"XVI","histoire":"MESNIL propriété des descendants du maréchal toulousain de Pérignon, né à Grenade en 1754  Le maréchal Catherine-Dominique de Pérignon, qui a donné son nom au château et à la célèbre caserne de Toulouse, était un maréchal dEmpire. Né en mai 1754 à Grenade, au nord-ouest de Toulouse, il est élu député de Haute-Garonne en 1791. Après avoir été rappelé au sein de lArmée révolutionnaire en 1793, il remporte plusieurs victoires est  élu représentant de la Haute-Garonne au conseil des Cinq-Cents sous le directoire. En 1799, il fait partie de lexpédition de Bonaparte en Italie et commande les troupes de Ligure. Mort en décembre 1818, il reste un homme historique toulousain de premier plan un peu passé dans loubli.","architecture":"Château du Mesnil de style  Louis XVI propre à ce roi en marbre blanc de Carrare et bronze doré de la garniture de cheminée . De plan carré à trois niveaux toits en croupes  fronton triangulaire sur la façade principale  et tourelles sur la façade arrière se terminant en terrasse avec créneaux et mâchicoulis.","habitants":"Maréchal Catherine-Dominique de Pérignon\r\n        \"","divers":"Château de Mesnil à Montech.","gps":"","images":["../../jctruffet.com/image/image_82/82_Mesnil_Montech_1.jpg","../../jctruffet.com/image/image_82/82_Mesnil_Montech_2.jpg","../../jctruffet.com/image/image_82/82_Mesnil_Montech_3.jpg"]},"Consult_chateau_formulaire5dc8":{"id":"Consult_chateau_formulaire5dc8","dept":"82","canton":"Moissac","commune":"Moissac","nom":"Moissac_(82)","type":"Château","periode":"XVI","histoire":"Six châteaux à Moissac, celui de Bartac, du Castanet (voir article) , Détours , de St-Amans et Sainte-Livrade ( voir article).                                                                                            BARTAC, ce château, propriété d'une importante famille de Lacoste du Bartac  fut construit au XVIe siècle et du XVIIe siècle. Denis Jenck, est gérant de la société gaec du château en activité depuis 20 ans.\r\nDETOURS, constituée en bourg monastique, sest sans doute développée à lombre de la grande abbaye Saint-Pierre dont la légende nous dit quelle fut fondée par le roi Clovis. Le château aurait été construit pour le baron Détours de Montpellier au début du Premier Empire. Acheté vers 1890 par M. Delvolve, ancêtre de l'actuel propriétaire, il voulait lui donner une architecture grandiose et le remania vers 1895. L'ensemble est demeuré inachevé; le magnifique portail occidental porte la date de 1899. La propriété possède un parc, des communs et un pigeonnier.","architecture":"BARTAC, c'est un important bâtiment carré de brique cuite accosté de quatre tours également carrées en avancée d'angle, découronnées irrégulièrement effet de la Révolution. Corniche moulurée de brique, cordon de denticules autour de la construction. Quelques ouvertures d'origine refendues par un meneau vertical. Socles, meneaux et cadre d'ouvertures sont en pierre. Modernisation au rez-de-chaussée. Porte principale du XVIIe siècle, moulures, montant central à feuille d'acanthe, cloutage à clous coniques martelés à la main. Intérieur modernisé, reste l'escalier d'origine de bois à gros clous ronds.                                                DETOURS, pas d'image mis à part la porte d'entrée.                                                                                                                             SERAT,  construction carrée flanquée de 4 tourelles, le tout de\r\nbriques cuites, toit 4 pentes couvert de tuiles cannals. Tourelles carrées minces, à toiture en pyramide courte faisant pigeonnier avec lucarne d'envol sous pignon face Est. En dessous : fenêtre, les tourelles furent construites ou reconstruites vers 1860 avec cordon d'étage anti-rongeurs\r\nau niveau du toit de la maison sous lequel s'insère une série de lucarnes et oeils de boeuf.","habitants":"Famille de Lacoste du Bartac                                                                 Famille du Baron Détours                                                                          Famille de Cérat\r\n        \"","divers":"Châteaux à Moissac, celui de Bartac, du Castanet , Détours , de St-Amans, Serat et Sainte-Livrade.","gps":"","images":["../../jctruffet.com/image/image_82/82_Moissac_82_1.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_2.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_3.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_4.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_5.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_6.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_7.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_8.jpg","../../jctruffet.com/image/image_82/82_Moissac_82_9.jpg"]},"Consult_chateau_formulairea80e":{"id":"Consult_chateau_formulairea80e","dept":"82","canton":"Lafrançaise","commune":"Montaigu du Quercy","nom":"Montaigu_Quercy","type":"Château","periode":"XII-XVI","histoire":"Trois châteaux à Montaigu du Quercy, le Roquebrune, le de Soucis et le château fort de Montaigu.                                                                                                             MONTAIGU,  château fort, d'après une tradition les seigneurs de Montaigu en Agenais seraient  issus du comte de Montaigu ; en réalité les seigneurs de Montaigu, établis dès le XIIe siècle, seraient issus de la maison de Gaurdon et auraient pris le nom de leur principale seigneurie. Auger de Montaigu, en épousant fin XV-début XVIe siècle Jeanne de Lomagne, prit l'obligation de faire porter à ses descendants le nom de Lomagne. En 1230 Géraud  de Gourdon de Montaigu donna tous les droits qu'il avait sur le lieu de Montaigu au comte de Toulouse qui les restitua en 1248.  Il est occupé par les anglais en 1418  qui le ruinent et le démolissent. Vers 1594 il est pillé, vidé, brûlé par les croquants. A la fin de l'année 1595 Armoise de Lomagne en entreprend la restauration.   En 1580, la ville est prise par les protestants commandé par Agrippa d'Aubigné, qui la défend ensuite contre les troupes royales du comte de Lude. Le village de Montaigu escaladant la pente pour rejoindre le château féodal sur son piton. Le guetteur en haut du donjon pouvait voir tout le Quercy et apercevoir le danger  sur de nombreux kilomètres à la ronde, seul le mauvais temps pouvait cacher l'approche d'une troupe amie ou ennemie,  mentionné en 1812 ; propriétaire Louis Fumel; ce serait le marquis François Louis de Fumel-Montaigu.  Le château sera vendu en 1818 par la fille dudit marquis et son époux au sieur Moulis, \"huissier ayant la réputation d'un marchand de biens\".                                                                                                                                           ROQUEBRUNE maître d'oeuvre inconnu : édifice du XVIe ou du XVIIe siècle ; remanié au XVIIIe siècle, puis  remanié ultérieurement.","architecture":"Montaigu  le château était bâti sur une butte qui domine le village. Il aurait été construit au milieu du XIIe siècle et son enceinte en 1180,  la grande maison actuelle n'occupe que la partie centrale de l'ancien château, laissant autour une grande surface dégagée. A droite la situation du piton du château par rapport à la ville,  le château est mentionné en 1812 ; Il semblerait que ce dernier en ait vendu les pierres vers 1830,  servant à bâtir des maisons dans le village \r\nL'association régionale de Midi-Pyrénées pour la sauvegarde du patrimoine a restauré en 1983 et 1984 une partie des remparts. l'édifice actuel se compose d'un plan en U flanqué d'une tour carrée toit quatre pans presque plat.                                                                                                                Roquebrune, sur plan d'équerre corps de logis à deux niveaux  toit en croupes , accolé d'une tour carrée et d'un porche d'entrée avec mâchicoulis.","habitants":"Géraud  de Gourdon de Montaigu                                                                     Marquis François Louis de Fumel-Montaigu\r\n        \"","divers":"A Montaigu du Quercy, le Roquebrune, le de Soucis et le château fort de Montaigu.","gps":"","images":["../../jctruffet.com/image/image_82/82_Montaigu_Quercy_1.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_2.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_3.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_4.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_5.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_6.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_7.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_8.jpg","../../jctruffet.com/image/image_82/82_Montaigu_Quercy_9.jpg"]},"Consult_chateau_formulaire253f":{"id":"Consult_chateau_formulaire253f","dept":"82","canton":"Montauban","commune":"Montalzat","nom":"Montalzat","type":"Château","periode":"XIX","histoire":"MONTALZAT, la bastide, fondée par les seigneurs Bernard, Bertrand et Gaillard de La Garde, fut cédée à Raymond VII le 10 juin 1232. Son nom a été altéré par une fausse étymologie : sa forme primitive était Mont Auzat, c'est-à-dire « mont hardi, mont audacieux ». Deux mottes féodales rappellent qu'elle fut le siège d'une seigneurie qui dépendait de la baronnie de Caussade et dont les principaux seigneurs furent les Caminade et les Boissy d'Auterive.\r\nLe 17 janvier 1369, durant la guerre de Cent Ans, c'est la bataille de Montalzat où les troupes françaises défont les troupes anglaises, dont les survivants seront à nouveau écrasés le 20 janvier à la bataille de Mirabel.","architecture":"Le château de Montalzat est une bâtisse datant des années 1850 flanquée de deux tours et couverte d'ardoise. Il abrite la mairie et a récemment été équipé d'un ascenseur panoramique permettant l'accès à l'étage supérieur à partir d'une terrasse offrant un superbe point de vue. Le château est une bâtisse datant des années 1850 flanquée de deux tours toit en poivrière  couverte d'ardoise.","habitants":"Baronnie de Caussade                                                                           Famille de Boissy d'Auterive\r\n        \"","divers":"Château-Mairie de Montalzat","gps":"","images":["../../jctruffet.com/image/image_82/82_Montalzat_1.jpg","../../jctruffet.com/image/image_82/82_Montalzat_2.jpg","../../jctruffet.com/image/image_82/82_Montalzat_3.jpg","../../jctruffet.com/image/image_82/82_Montalzat_4.jpg","../../jctruffet.com/image/image_82/82_Montalzat_5.jpg"]},"Consult_chateau_formulaire00f4":{"id":"Consult_chateau_formulaire00f4","dept":"82","canton":"Montauban","commune":"Montauban","nom":"Montauban_Chateau","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Montauban dont celui de la Boissonade (voir article), de Capou du XVIe siècle,  de Riblaye et de château de Chaussé à Verlharguet.                                                     CAPOU, cest probablement Odet Capo qui fait construire le château au début du XVIe siècle. En 1621  Capou aurait servi de résidence au duc de Luynes pendant le siège de Montauban. En 1772 Catherine des Mira lègue le château à Jacquette Caumont de la Force. En 1945, vente du château à M. Jean-Yves Brun, négociant à Montauban. En 1946, le département de Tarn et Garonne rachète le domaine de M. Brun et le met à disposition du ministère de l'agriculture pour y installer l'école ménagère agricole.                                                                                                                                                                    RIBLAYE, château construit à la périphérie de la ville au XVIIe siècle. De cette époque, l'édifice conserve la façade sud composée autour d'une cour avec douves. Derrière cet écran se déploie un grand bâtiment de la fin du XIXe siècle totalement réaménagée par le comte Léopold de Gironde qui créa un nouveau décor pour présenter ses collections (tentures en cuirs dorés et polychromes). Au début du XXe siècle, un décor peint fut commandé pour la chapelle à l'artiste Paul Pujol. constitue un très bel exemple de l'architecture de brique montalbanaise.                                                                                                                   VERLHARGUET, le château actuel édifié à lemplacement dune ancienne forteresse qui a appartenu pendant tout le Moyen-Âge à la seigneurie de Montbeton. Aujourd'hui à la famille  de Lattaignant de Ledinghen de Saint-Jué.","architecture":"Capou, à la fin du siècle dernier, il a été fortement remanié, ses tours ont été décapitées, si la partie droite, qui contient une sorte de donjon formé d'une tour polygonale et flanqué d'une échauguette dont la partie inférieure se terminait jadis en poivrière (poivrière renversée) n'a pas été trop modifiée, la partie gauche du château, qui remontait en partie à la fin du XVIIIe siècle a disparu pour faire place à un corps de logis terminé par une rangée de \"mirandes\".                                                                                                                                       Riblaye  Au début du XXe siècle, un décor peint fut commandé pour la chapelle à l'artiste Paul Pujol. Le château de Riblaye constitue un très bel exemple de l'architecture de brique montalbanaise.\r\nEléments protégés MH : les façades et toitures du château et, à l'intérieur, le grand salon orné d'une tenture de cuir doré; la cour sud avec douves, portail et serre de jardin; le jardin en terrasse ouest; la chapelle en totalité: inscription par arrêté du 19 juillet 2007.","habitants":"Famille d'Odet Capo                                                                               Famille de Fabre de Cahuzac                                                                               Famille  de Lattaignant de Ledinghen de Saint-Jué.\r\n        \"","divers":"Châteaux divers sur Montauban","gps":"","images":["../../jctruffet.com/image/image_82/82_Montauban_Chateau_1.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_2.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_3.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_4.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_5.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_6.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_7.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_8.jpg","../../jctruffet.com/image/image_82/82_Montauban_Chateau_9.jpg"]},"Consult_chateau_formulaire2583":{"id":"Consult_chateau_formulaire2583","dept":"82","canton":"Montauban","commune":"Montauban","nom":"Montauban_Patrimoine","type":"Palais-Châteaux","periode":"XV-XVIII","histoire":"MONTAUBAN -Patrimoine, ancien palais épiscopal, musée d'Ingres  et hôtel particulier fin XVIIe siècle, décoré par Jean-Marie-Joseph Ingres, sculpteur, père de Jean-Auguste Dominique Ingres, peintre et sculpteur, ancienne résidence des Intendants. Cet immeuble est devenu le siège de la préfecture dès 1809.                                                                                                                                    BOURDELLES du XVIIe siècle, le musée Ingres abrite mes collections de deux illustres montalbanais, le peintre Jean-Auguste-Dominique Ingres et le sculpteur Antoine Bourdelle. La salle du prince noir, vestige du château érigé par les anglais lors de la guerre de 100 ans abrite les collections archéologiques gallo-romaines. Le rez-de-chaussée accueille les sculptures de Bourdelle, montalbanais célèbre.                                                                                                                     EVECHE dit de Montauriol, l'évêché de Montauban a été fondé en 1317. Pourtant au XVIe siècle les protestants s'imposent et chassent l'évêque de sa ville. C'est la révocation de l'Edit de Nantes en 1685 qui permet la réinstallation des catholiques. Une nouvelle cathédrale est construite à partir de 1692 avec l'aide du roi Louis XIV, ce superbe bâtiment des années 1970 conçu par l'architecte Roger Taillibert et récemment rénové. Les visiteurs découvriront ainsi les \"coulisses\" du Conseil Général en accédant à la salle de la commission permanente. Cohabitant avec l'architecture contemporaine de l'hôtel du département, le château Montauriol datant de 1865.","architecture":"Evéché, Montauriol, c'est un édifice typiquement classique avec ses lignes raides et austères. La façade en calcaire tranche avec le rouge des briques de la plupart des autres bâtiments de la ville, ce superbe bâtiment des années 1970 conçu par l'architecte Roger Taillibert et récemment rénové. Les visiteurs découvriront ainsi les \"coulisses\" du conseil général en accédant à la salle de la commission permanente. Cohabitant avec l'architecture contemporaine de l'hôtel du département, le château Montauriol datant de 1865.                                                                         Musée d'ingres, premier édifice construit  au XIIe siècle par le comte de Toulouse Alphonse de Jourdain fondateur de la ville qui se compléta par un deuxième édifice vaste palais  épiscopal superbe exemple de l'architecture en brique  du XIVe siècle  cet ensemble médiéval servit d'assise au palais épiscopal à partir de 1664, dont les vestiges du château comtal qui défendait le pont vieux demeure  l'extraordinaire salle gothique dite du Prince noir fut hôtel de ville à la Révolution, la mairie se retira au XIXe siècle le musée Ingres put s'étendre par le Baron Vialette de Mortarieu. abrite aujourd'hui  l'office du tourisme et les associations culturelles.","habitants":"Sculpteur Jean-Marie-Joseph Ingres                                                     Baron Vialette de Mortarieu\r\n        \"","divers":"Patrimoine de Montauban","gps":"","images":["../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_1.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_2.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_3.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_4.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_5.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_6.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_7.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_8.jpg","../../jctruffet.com/image/image_82/82_Montauban_Patrimoine_9.jpg"]},"Consult_chateau_formulaired952":{"id":"Consult_chateau_formulaired952","dept":"82","canton":"Montesquieu","commune":"Montesquieu","nom":"Montesquieu_82","type":"Château","periode":"XIII-XVI","histoire":"MONTESQUIEU, à lépoque moderne, les guerres de religions furent une période troublé, Jacques de La Font de Jehan, seigneur de Montesquieu mourut pour la ligue en 1589 à Sarlat. Les habitants durent aussi subir le passage des gens de guerre démobilisés qui vivaient de rapines et brigandages. En 1625 la communauté doit par exemple verser des vivres à monseigneur dEpernon pour éviter le logement de ses gens de guerre. En 1628-1632 lépidémie de peste oblige la communauté à prendre des mesures anti-contagion comme des palissades autour du hameau de Montesquieu et le nettoyage des maisons. Au cours de la Révolution le château fut assiégé le 5 février 1790 et échappa de peu à lincendie. Les terres seigneuriales furent vendues comme biens nationaux vers 1792-93. Remaniements importants aux XVIe et XVIIe siècles, puis vers 1780  pour Marie Pétronville de Cazals et le baron de Mombrel. Vendu comme bien national durant la Révolution  Reconstruit partiellement dans la première moitié du XIXe siècle pour la famille Barnaud Arnal.","architecture":"Le château de Montesquieu fut reconstruit dans la première moitié du XIIIe siècle, après sa destruction en 1214 par Simon de Montfort.  Remplois de la porte de la chapelle Sainte-Madeleine, détruite.\r\nL'édifice est situé sur une butte naturelle et féodale renforcée par de fortes murailles supportant un grand corps de bâtiment en blocage et pierre de taille flanqué par trois tours carrées. Angle sud-ouest en courbe marquée avec une petite fenêtre dans un cadre mouluré du XVe siècle. Porte d'entrée en ogive moderne. La façade nord sur la terrasse avec un escalier en double révolution et ouvertures sans caractère et deux fenêtres à meneaux. Lices formant un développement important, bordées par une ferme avec ses dépendances. Le tout ouvrant par un portail d'accès sous toiture.","habitants":"Famille Barnaud Arnal\r\n        \"","divers":"Château de Montesquieu","gps":"","images":["../../jctruffet.com/image/image_82/82_Montesquieu_82_1.jpg","../../jctruffet.com/image/image_82/82_Montesquieu_82_2.jpg"]},"Consult_chateau_formulaire4bd3":{"id":"Consult_chateau_formulaire4bd3","dept":"82","canton":"Valence d","commune":"Montjoi","nom":"Montjoi_82","type":"Château","periode":"XVII","histoire":"MONTJOI, perchée sur son piton rocheux, la bastide de Montjoi fut fondée au XIIIe siècle par Alphonse de Poitiers. C'est un havre de paix, traversé par des petites rues pavées bordées d'élégantes maison en pierre du Quercy et brique rouge du Midi. Depuis le chemin de ronde qui domine la campagne environnante et la vallée de la Séoune, en passant par la porte d'entrée ogivale du XIVe siècle et en longeant les demeures à colombages et en encorbellement des XIVe et XVe siècles, les visiteurs ne peuvent que tomber sous le charme de cette cité médiévale.","architecture":"Montjoi de plan rectangulaire à deux niveaux toit à deux pans flanqué d'une tourelle sur l'angle arrière toit en poivrière et sur la face avant pavillon central dépassant l'ensemble à toit brisé.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Montjoi avec maison forte à Montjoi","gps":"","images":["../../jctruffet.com/image/image_82/82_Montjoi_82_1.jpg","../../jctruffet.com/image/image_82/82_Montjoi_82_2.jpg","../../jctruffet.com/image/image_82/82_Montjoi_82_3.jpg"]},"Consult_chateau_formulaire0647-2":{"id":"Consult_chateau_formulaire0647-2","dept":"82","canton":"Lafrançaise","commune":"Montpezat du Quercy","nom":"Montpezat_Quercy","type":"Village-Fortifié","periode":"XIII","histoire":"MONTPEZAT, Montpezat de Quercy des vestiges d'un habitat gallo-romain. Le bourg atteint son apogée au Moyen-Age. Son destin fut lié à celui de la famille de Montpezat, apparue à la fin du XIe siècle.  Au XIIIe siècle, la plupart des maisons nobles adoptent le culte cathare. La deuxième famille de Montpezat dut sa célébrité au cardinal Pierre des Prés (1288-1361), mécène et homme d'état, conseiller des papes d'Avignon, en particulier de Jean XXII, lui-même originaire de Cahors. La famille des Prés a donné aussi des évêques à Montauban, la protestante et un maréchal de France ; d'autres ont marqué l'histoire de Montpezat, la blanche.","architecture":"A Montpezat de Quercy vous admirerez la collégiale bâtie au XIVe siècle dans le style gothique.                                                                                                           Manoir de la Bordes des Près  de la fin du XIIIe  début XIVe siècle. La maison actuelle a conservé une porte en arc brisé au premier étage. Des fenêtres géminées gothiques éclairent l'édifice. Selon la tradition, c'est dans cette maison que serait né le cardinal Pierre des Prés, vice chancelier de l'église romaine et alter-ego du pape Jean XXII, fondateur de la collégiale Saint-Martin à Montpezat.","habitants":"Famille de Montpezat \r\n        \"","divers":"Bastide de Montpezat du Quercy","gps":"","images":["../../jctruffet.com/image/image_82/82_Montpezat_Quercy_1.jpg","../../jctruffet.com/image/image_82/82_Montpezat_Quercy_2.jpg","../../jctruffet.com/image/image_82/82_Montpezat_Quercy_3.jpg","../../jctruffet.com/image/image_82/82_Montpezat_Quercy_4.jpg","../../jctruffet.com/image/image_82/82_Montpezat_Quercy_5.jpg","../../jctruffet.com/image/image_82/82_Montpezat_Quercy_6.jpg"]},"Consult_chateau_formulairec485":{"id":"Consult_chateau_formulairec485","dept":"82","canton":"Caussade","commune":"Montricoux","nom":"Montricoux","type":"Commanderie","periode":"XII","histoire":"MONTRICOUX,  ancienne commanderie des Templiers du XIIe siècle : le 14 mai 1181, les moines de Saint-Antonin donnent la commanderie de Montricoux aux chevaliers du Temple. En 1312, Philippe le Bel transmet la commanderie aux hospitaliers de Saint-Jean de Jérusalem. En 1332, la seigneurie devient propriété de la famille de Caraman pendant trois siècles.\r\nEn 1568, les calvinistes montalbanais prennent d'assaut le château, le pillent et l'incendient, pendant les guerre de religion. En 1616, la seigneurie et terre est vendue à Maximilien de Béthune, duc de Sully ; elle est érigée pour lui en comté. En 1653, les demoiselles Marie et Anne de Maurez achètent le château. En 1689, le comté de Montricoux passe dans la famille de Malartic.\r\nEn 1724, Pierre Hippolyte de Malartic hérite du château donné par Angélique de Malartic, qui en conserve la jouissance. En 1730, le comte de Malartic habite le château, fait reconstruire la nouvelle partie XVIIIe en y intégrant le vieux donjon. En 1927, le donjon est inscrit au titre des monuments historiques. Le château abrite le musée Marcel-Lenoir (1872-1931).\r\nLe collectionneur Claude Namy, président fondateur du musée Marcel Lenoir.","architecture":"Le château communique avec le donjon du XIIe siècle. Le donjon comporte au rez-de-chaussée : la salle de garde, une salle voûtée à berceau brisé, une cheminée monumentale, des fresques templieres d'inspiration mauresque, ainsi que deux étages reliés par un escalier à vis. En 1187, la construction du donjon est achevée et forme une forteresse médiévale. La tour était couronnée de quatre tourelles en encorbellement, détruites à la révolution. Elle est carrée, en pierre taillées dans un calcaire dur. les murailles sont hautes d'une vingtaine de mètres, avec quatre contreforts extérieurs. Les deux étages supérieurs sont reliés par un petit escalier à vis. Un petit passage de guetteur surplombe le salle de garde.  Grande demeure d'inspiration toscane, sa rotonde d'entrée ovale, aux quatre statues monumentales réalisées par Jean-Marie-Joseph Ingres, se distribue sur de grandes pièces en enfilade le long de la façade avec des boiseries du XVIIIe siècle, et un escalier en pierre équipé d'une très belle rambarde dans l'esprit « Retour d'Égypte  »Le corps de logis présente un remarquable programme décoratif se rattachant à cette campagne de reconstruction du XVIIIe siècle. Toutefois, le portail et le vestibule conservent un certain attachement stylistique aux formes du début du XVIIe siècle. L'unique date portée, \"1770\" se situe sur la clef d'une porte charretière de l'aile des communs. A la lecture du plan de 1810, il apparaît que l'aile nord du logis a été réduite à l'est et à l'ouest, l'aile sud des communs également. Le peintre Marcel Lenoir a résidé durant les dernières années de sa vie dans le château.","habitants":"Famille de Caraman                                                                                 Famille de Malartic\r\n        \r\n        \"","divers":"Forteresse de Montricoux","gps":"","images":["../../jctruffet.com/image/image_82/82_Montricoux_1.jpg","../../jctruffet.com/image/image_82/82_Montricoux_2.jpg","../../jctruffet.com/image/image_82/82_Montricoux_3.jpg","../../jctruffet.com/image/image_82/82_Montricoux_4.jpg","../../jctruffet.com/image/image_82/82_Montricoux_5.jpg","../../jctruffet.com/image/image_82/82_Montricoux_6.jpg","../../jctruffet.com/image/image_82/82_Montricoux_7.jpg"]},"Consult_chateau_formulairebcc7":{"id":"Consult_chateau_formulairebcc7","dept":"82","canton":"Verdun sur Garonne","commune":"Aucamville","nom":"Nolet","type":"Château","periode":"XVI","histoire":"NOLET, au XVIe siècle Jehan Nolet, capitoul épouse Catherine Assolent. Jean de Nolet  épouse Anne de Forès. Au XVIIe siècle  Jacques de Nolet épouse  Marguerite de Fieubet.  Au  XVIIe siècle.  Bernard de Nolet épouse Marguerite de Pavie de Fourqueveaux. Au XVIIIe siècle  Isabeau de Nolet épouse   J-J des Ezgaulx.   Fin XVIIIe  Famille de  Desegaulx de Nolet. Puis en 1820 à la famille Hocquart, passa en 1850 aux marquis de Castelperse de Panât  qui le revendirent en 1855 au Narbonne-Panât  jusqu'en 1919, suivirent un changement presque annuel par les Luz-Vézan les Brizio les Barbara les Fochedey-Morel, les Soler Puig les Germain, les Cantoni puis en 1999 saisi par une banque Suisse, passa en 2012 à la famille Joubert-Melotte. Aujourd'hui hôtel restaurant.","architecture":"Nolet Lédifice est doté dun plan rectangulaire dune aile avancée en retour déquerre de 9 mètres carré, sorte de pavillon du XXe siècle plus élevé que le corps central qui vient sajouter à la construction. Le corps principal sélevant sur trois niveaux le dernier se situant sous les combles et la façade, dinspiration Louis XIII, est symétriquement flanqué de deux tourelles en encorbellement coiffées en poivrière. Lélégant château tel quil se présente doit son unité et son élégance à lemploi uniforme du matériau du pays : la brique foraine. Les éléments les plus visibles du château tels que les deux tourelles dangle et léchauguette à culot mouluré posée sur un garde corps confèrent au château un aspect moyenâgeux et remplirent surtout une fonction principalement symbolique. Le château entouré dun grand parc ne présente aucun dispositif défensif. A ce titre, il demeure le témoignage dune architecture en pleine évolution associant des influences médiévales avec un nouveau style décoratif, dans le goût du XIXe siècle.","habitants":"Famille de  Jehan Nolet\r\n        \"","divers":"Château de Nolet à Aucamville","gps":"","images":["../../jctruffet.com/image/image_82/82_Nolet_1.jpg","../../jctruffet.com/image/image_82/82_Nolet_2.jpg","../../jctruffet.com/image/image_82/82_Nolet_3.jpg","../../jctruffet.com/image/image_82/82_Nolet_4.jpg","../../jctruffet.com/image/image_82/82_Nolet_5.jpg","../../jctruffet.com/image/image_82/82_Nolet_6.jpg"]},"Consult_chateau_formulairee621":{"id":"Consult_chateau_formulairee621","dept":"82","canton":"Caussade","commune":"Négrepelisse","nom":"Négrepelisse","type":"Vestiges Château","periode":"XI-XVI","histoire":"Trois manoirs à Négrepelisse dont celui  de Négrepelisse, de Barrayous (voir article)  et de Longues -Aygues.                                                                               NEGREPELISSE, le château et ses possessions furent édifiés sous légide des vicomtes de Bruniquel, seigneurs du Tulmonenc. Différents grands seigneurs succédèrent aux vicomtes de Bruniquel :  le roi Philippe III en 1285,  le comte dÉvreux en 1319,  le comte de Caraman seigneur de Montbrun  se nommant Pierre Duèze de Turenne. Les Caraman rebâtirent le site au XVe siècle, En 1846, un projet du seigneur de Tauge, M. De Lastic faillit priver le château de tout un côté des remparts, Il est inscrit au monuments historiques depuis le 26 juin 1989.                                                                                            \r\nLONGUES-AYGUES a appartenu jusqu'en 1962 à la famille Vaïsse-Cibiel  Sylvain Marie Joseph (1862-31 mai 1891 à Toulouse) conseiller général de Nègrepelisse épousa en 1889 Dame Amélie Henriette Marie Germaine Mignard et mourut précipitamment à lâge de 29 ans, un an après la naissance de sa fille unique, Marguerite. Sa générosité fait encore parler de lui puis quil légua des dons en argent à la société protestante et catholique de secours mutuel de Nègrepelisse. Amélie Henriette Mignard (née en 1863) descendante de Pierre Mignard (1612-1695, uvre majeure : décoration du dôme de Val-de-Grâce), nommé premier peintre de Louis XIV en 1690. Construit au début du siècle dernier par une descendante du célèbre peintre Pierre Mignard, aujourd'hui  établissement de soins de suite en alcoologie et en addictologie, l'édifice actuel, inspiré de l'art italien et construit en 1910 à la demande de Dame Henriette Mignard Vaïsse-Cibiel,  Dès lors, le château et ses 6 ha de parc, racheté par M. André Marie en 1962, fut le premier établissement de postcure psychiatrique de France dont linauguration eut lieu en juillet 1964.","architecture":"Negrepelisse, vers 1074 à été bâtie une fortification qui fût remplacée par le château  Le gros uvre date du XIe siècle,  cet édifice de dimension 62,50 m face Nord, 57,50 m face Est, 56,50 m face Sud, et 54,50 m face Ouest , c'est un quadrilatère dont les sommets étaient quatre tours rondes de 7,50 mètres de diamètre desservies par un chemin de ronde. Les murs épais de 2m à 2,50 m soit 6 à 8 pieds.  Deux corps de bâtiments sont construits parallèlement aux courtines.  Dès lors, le château fut laissé à labandon mais grâce à différentes acquisitions et décisions du conseil municipal,  ce champ de ruines fut transformé en une esplanade animée. On ne distingue aujourdhui seulement que trois tours et des murailles abîmées par lérosion et par la démolition du revêtement de la première couche lors de la Révolution. Des travaux de conservation entre 1997 et 2001 ont permis de restaurer le site, lui redonnant une nouvelle jeunesse. le XIXe siècle, après la fin du comblement des douves.                                                                                                      le Château de Longues-Aygues, d'architecture originale d'inspiration italienne, entouré d'un magnifique parc de 6 hectares aux arbres centenaires, offre un cadre de vie exceptionnel. Le style particulier de lédifice rappelle sans conteste larchitecture italienne mais également le style toulousain avec lutilisation de briques en argile cuite cintrant toutes les ouvertures. La toiture avec ses tuiles vernissées, ses scraffitos sur les deux tours réalisés entre 1928 et 1939, des faïences représentant du laurier, de nombreuses moulures symbolisant des anges surplombant les pièces.","habitants":"Pierre Duèze comte de Caraman                                                        Famille Vaïsse-Cibiel \r\n        \r\n        \"","divers":"Vestiges du château de Négrepelisse et château de Longues-Aygues","gps":"","images":["../../jctruffet.com/image/image_82/82_Negrepelisse_1.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_2.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_3.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_4.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_5.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_6.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_7.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_8.jpg","../../jctruffet.com/image/image_82/82_Negrepelisse_9.jpg"]},"Consult_chateau_formulairecc4e":{"id":"Consult_chateau_formulairecc4e","dept":"82","canton":"Septfonds","commune":"Parisot","nom":"Parisot","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Parisot celui de L'Astorguié, de Cornusson (voir article)et celui de  Labro.                                                                                                             ASTORGUIE, est associé à la célèbre famille des Valette-Parisot. Le plus illustre, Jean de la Valette Parisot, est né au château de Labro voisin, il devient grand maître de l'Ordre de Saint-Jean de Jérusalem et se distingue en défendant Malte contre les Turcs en 1565. Il fonde la cité de la Valette et y meurt en 1568. Le château a été construit pour Jean de la Valette-Labro, chevalier de Rhodes.  Ce château abritait précédemment une pharmacie. Ce château fut récemment restauré à l'identique.                                                                                                                                      LABRO, le château de Labro appartenait, en 1410, à Amalric de La Valette, seigneur de Parisot, Le second fils d'Amalric Bernard de La Valette qui dans le partage des biens patrimoniaux reçut la seigneurie de Labro tandis que son frère Pierre gardait celle de Parisot, établit à ce château où demeurèrent également ses fils Pons et Guilhot. Bernard acheta en 1460, de Jeanne de Castanet, veuve de Jean de Fénélous, et de ses deux fils, la rivière de Labro, ce qui nous permet d'induire qu'avant le XVe siècle toute la seigneurie de Labro appartenait aux Fénélous. Le fils de Pons de la Valette, Arnaud, chef de la branche des La Valette-Labro, quitta vers 1500, le château de Labro pour aller habiter à celui de l'Astorguié, récemment édifié par son oncle, Jean de La Valette-Labro, chevalier de Rhodes. Le neveu de Pons, Guilhot de La Valette, auteur de la branche des Cornusson, demeura à Labro. C'est là que naquit, en 1494, et que passa ses premières années, Jean de La Valette-Parisot, second fils de Guilhot, qui devient, en 1557, grand maître de l'ordre de Saint-Jean-de-Jérusalem et dont la gloire brilla d'un si grand éclat.","architecture":"Aqstorguié, le château, aurait été construit vers 1500, situé au sud du village, comprend un corps de logis et deux bâtiments de dépendances. Logis de plan rectangulaire, simple en profondeur, à un étage de soubassement, un étage carré et un comble. Une tour d'escalier circulaire hors-oeuvre flanque l'élévation antérieure, une autre tour occupe l'angle nord-est. Il était une simple maison-forte qui a perdu une partie de ses fortifications (mâchicoulis), mais sa structure est restée homogène. Son intérêt réside dans son plafond peint de la même époque.                                                                                 \r\nDu château de Labro, situé à l'extrémité d'un plateau en bordure de la vallée de la Seye, il ne subsiste que les vestiges d'un tour. Une aile et une tour d'escalier furent ajoutées au début du XVIe siècle; remaniement et reconstruction partielle au XVIIIe siècle. Le pigeonnier construit au XVIe siècle, qui occupe l'angle sud, est à trois niveaux couverts de coupoles, extrados de voûte en couverture, étage de soubassement du logis contenant deux pièces, l'une voûtée d'arêtes et l'autre d'un berceau plein-cintre.","habitants":"Monsieur le Comte Harrington d'Amalric Bernard de La Valette\r\n        \"","divers":"Château d'Astorguié et de Labro à Parisot","gps":"","images":["../../jctruffet.com/image/image_82/82_Parisot_1.jpg","../../jctruffet.com/image/image_82/82_Parisot_2.jpg","../../jctruffet.com/image/image_82/82_Parisot_3.jpg","../../jctruffet.com/image/image_82/82_Parisot_4.jpg","../../jctruffet.com/image/image_82/82_Parisot_5.jpg","../../jctruffet.com/image/image_82/82_Parisot_6.jpg","../../jctruffet.com/image/image_82/82_Parisot_7.jpg"]},"Consult_chateau_formulaire9df0":{"id":"Consult_chateau_formulaire9df0","dept":"82","canton":"Albias","commune":"Piquecos","nom":"Piquecos","type":"Forteresse","periode":"XII-XIII","histoire":"PICQUECOS, construit sur un promontoire rocheux, le château domine de ses imposantes murailles de brique rouge la plaine alluviale irriguée par l'Aveyron, le Tarn et la Garonne. La première mention connue fait état en 1374 de l'achat du château par Arnaud des Près, seigneur de Montpezat dès lors le château appartient aux Montpezat jusque vers 1 700,  En 1463, le roi Louis XI réside au château de Piquecos et participe à des grandes chasses. En 1542, François Ier s'installe à son retour de Perpignan pendant une quinzaine de jours. Le futur roi de France, Henri de Navarre (futur Henri IV) passe une nuit au château de Piquecos.  Pendant les rébellions huguenotes, en 1621, Louis XIII loge au château de Piquecos durant le siège de Montauban et les quatre cents coups de Montauban. Le 7 juin 1622, Louis XIII fait passer l'Aveyron près de Piquecos, à son armée qui bivouaque, en bataille, devant Villemade, à deux lieues de Montauban, espérant que ceux-ci viendrait lui offrir sa revanche. Ceux-ci restant prudemment à l'intérieur de leurs murs, il continue sa marche pour assiéger Montpellier après avoir pris Nègrepelisse et Saint-Antonin.","architecture":"Piquecos,  des XIVe et XVe siècles subsistent le plan carré cantonné de tours, la première enceinte de défense avec son soubassement et les deux tours circulaires, les douves ou fossés, le soubassement de l'ancienne tour d'entrée, en grande partie ruinée et sans doute les parties basses du logis et les sous-sol des corps de bâtiment.  De la première moitié du XVIe siècle, soit de l'oeuvre de Jean IV des Prés, subsistent, malgré les aménagements et les mutilations subies les deux corps de logis, avec beaucoup de fenêtres, encore intactes, les tours dont les ogives au rez-de-chaussée ont des clés de voûte et des culots aux armes des de Près et à l'étage étaient pénétrantes à huit quartiers mais il ne reste aujourd'hui que les retombées, une cheminée à l'étage et la chapelle, soit effectivement la construction presque totale de l'édifice, sur des bases anciennes. Des aménagements du milieu du XVIIe siècle, le corps de logis porte des traces très visibles: une galerie ouverte au rez-de-chaussée, de vastes fenêtres percées à l'étage, une cheminée, une vaste porte d'accès à la cour.","habitants":"Famille de Montpezat\r\n        \r\n        \"","divers":"Château de Piquecos","gps":"","images":["../../jctruffet.com/image/image_82/82_Piquecos_1.jpg","../../jctruffet.com/image/image_82/82_Piquecos_2.jpg","../../jctruffet.com/image/image_82/82_Piquecos_3.jpg","../../jctruffet.com/image/image_82/82_Piquecos_4.jpg","../../jctruffet.com/image/image_82/82_Piquecos_5.jpg","../../jctruffet.com/image/image_82/82_Piquecos_6.jpg","../../jctruffet.com/image/image_82/82_Piquecos_7.jpg","../../jctruffet.com/image/image_82/82_Piquecos_8.jpg"]},"Consult_chateau_formulaire6dbf":{"id":"Consult_chateau_formulaire6dbf","dept":"82","canton":"Verdun sur Garonne","commune":"Pompignan","nom":"Pompignan","type":"Château","periode":"XVIII","histoire":"POMPIGNAN, le château a été bâti au XVIIIe siècle par le poète Jean-Jacques Lefranc de Pompignan dans un style classique, ennemi de Voltaire, le Franc de Pompignan fondateur de l'académie de Montauban.","architecture":"Pompignan, de vastes proportions, il est construit sur une terrasse dominant le village et entouré d'un parc auquel donne accès un porche voûté orné d'une fine grille en fer forgé. De part et d'autre de ce porche, s'étendent les bâtiments de l'hôtellerie et de l'orangerie (transformés en chapelle par les religieuses qui ont occupé le château). Le château possède une partie semi-circulaire sur sa façade nord qui était autrefois occupée par un théâtre. Les jardins sont à mettre en relation avec le site admirable de Pompignan. La terrasse au sud, est un belvédère doù lon domine la campagne alentour et le poète englobe dans la vision de ses jardins le paysage que bornent les lointains pyrénéens.\r\nEléments protégés MH : façades et couvertures du château et du pavillon d'entrée, la grille d'entrée, la terrasse, le mur d'enceinte.","habitants":"Jean-Jacques Lefranc de Pompignan \r\n        \"","divers":"Château de Pompignan","gps":"","images":["../../jctruffet.com/image/image_82/82_Pompignan_1.jpg","../../jctruffet.com/image/image_82/82_Pompignan_2.jpg","../../jctruffet.com/image/image_82/82_Pompignan_3.jpg","../../jctruffet.com/image/image_82/82_Pompignan_4.jpg"]},"Consult_chateau_formulaire8b2b":{"id":"Consult_chateau_formulaire8b2b","dept":"82","canton":"St-Nicolas de la Grave","commune":"Poupas","nom":"Poupas","type":"Château","periode":"XIX","histoire":"POUPAS, le château de Poupas, aujourdhui détruit, appartenait aux vicomtes de Lomagne en 1306 ; de nos jours, seules quelques ruines de cet édifice subsistent. Dautres édifices ont pu exister sur le territoire communal, mais ils ont disparu depuis longtemps. Les guerres de religion, la Révolution, la dépopulation, lindifférence sont les principales causes de leur destruction.                                                                      Quartier Saint-Antoine une maison forte, pas d'informations.","architecture":"Poupas;  édifice actuel construit au XVIIe siècle ; signalé en ruine au XIXe siècle, reconstruit partiellement vers 1860 avec adjonction d'une aile à l'ouest . de plan rectangulaire en trois partie, la plus imposante est le donjon rectangulaire à trois niveaux avec lucarne sur toit en croupe. L'édifice accolée d'un bâtiment oblong à deux niveaux toit à deux pans, prolongé d'un pavillon rectangulaire à deux niveaux accolé sur l'arrière d'un pavillon carré de même niveau.","habitants":"Vicomtes de Lomagné \r\n        \"","divers":"Château de Poupas et Maison forte","gps":"","images":["../../jctruffet.com/image/image_82/82_Poupas_1.jpg","../../jctruffet.com/image/image_82/82_Poupas_2.jpg","../../jctruffet.com/image/image_82/82_Poupas_3.jpg","../../jctruffet.com/image/image_82/82_Poupas_4.jpg","../../jctruffet.com/image/image_82/82_Poupas_5.jpg","../../jctruffet.com/image/image_82/82_Poupas_6.jpg","../../jctruffet.com/image/image_82/82_Poupas_7.jpg"]},"Consult_chateau_formulairee10d":{"id":"Consult_chateau_formulairee10d","dept":"82","canton":"Septfonds","commune":"Puylagarde","nom":"Puylagarde","type":"Château","periode":"XII-XIV","histoire":"PUYLAGARDE, château fortifié en 1318 par Pierrre Dueze(frère du Pape Jean XXII), dans l'antiquité et au début du Moyen-Âge, Lugan fut un centre de vie important alors que Puylagarde n'existait pas. Un regroupement de maisons autour du château s'effectua à la fin du XIIe siècle et donna naissance au bourg de Puylagarde. Dans le village, remparts, puits et pierres en témoignent.","architecture":"Puylagarde château de la fin du XIIe siècle qui donna naissance au bourg de Puylagarde. Le château, l'église et le presbytère formaient un tout. Pendant cinq siècles de guerres permanentes ont modifié considérablement les bâtiments. La tour fut construite au XIVe siècle, un corps de bâtiment dénaturé du XVIe siècle et une petite aile en retour du XVIIe siècle y sont accolés. Le château se compose de trois étages carrés, le gros-oeuvre en calcaire et moellon, toit en pavillon couvert de tuiles plates et tuiles mécaniques. \r\nDu château, fortifié en 1318  demeurent aujourd'hui seulement la grosse tour et un corps de logis. Le château est actuellement une propriété privée.","habitants":"Pierrre Dueze \r\n        \"","divers":"Château de Puylagarde","gps":"","images":["../../jctruffet.com/image/image_82/82_Puylagarde_1.jpg","../../jctruffet.com/image/image_82/82_Puylagarde_2.jpg","../../jctruffet.com/image/image_82/82_Puylagarde_3.jpg","../../jctruffet.com/image/image_82/82_Puylagarde_4.jpg","../../jctruffet.com/image/image_82/82_Puylagarde_5.jpg"]},"Consult_chateau_formulaire4cf4":{"id":"Consult_chateau_formulaire4cf4","dept":"82","canton":"Montech","commune":"Finham","nom":"Pérignon","type":"Château","periode":"XVII","histoire":"PERIGNON, placé à l'entrée du village, ce château a été réaménagé et agrandi en 1750 par une famille noble habitant Montech, celle du maréchal Pérignon. Une partie du château avait été construite peu avant cette date, deux tours ont été ajoutées lors de son extension. Actuellement, il est en bon état de conservation et est habité par un descendant de la famille. Récemment la toiture a été classées ainsi que son caveau familial. Maison de campagne du maréchal Dominique Catherine de Pérignon (1754-1818) qui commanda l'armée des Pyrénées et fut vice-roi de Naples puis gouverneur à Paris et est toujours habité par un descendant de la famille de Pérignon.","architecture":"Pérignon, le bâtiment comprend un corps de maison et deux ailes, l'une d'habitation et l'autre de communs. On accède au corps de logis par un perron sur la façade Est surmontée d'un fronton triangulaire et un perron sur la façade Ouest, le château a été acheté par le maréchal de Pérignon en 1797, transformée par la suite dans le goût néo-médiéval. La chapelle néo-gothique se situe au rez-de-chaussée d'une tour crénelée. Elle possède un tympan en céramique. Dans le parc une chapelle funéraire s'inspirant du style \"retour d'Egypte\". Une partie du château avait été construite peu avant 1797, deux tours ont été ajoutées lors de son extension. Aujourd'hui, il est en bon état de conservation.","habitants":"Famille du maréchal de Pérignon\r\n        \r\n        \"","divers":"Château de Pérignon à Finham","gps":"","images":["../../jctruffet.com/image/image_82/82_Perignon_1.jpg","../../jctruffet.com/image/image_82/82_Perignon_2.jpg","../../jctruffet.com/image/image_82/82_Perignon_3.jpg","../../jctruffet.com/image/image_82/82_Perignon_4.jpg"]},"Consult_chateau_formulaire5acc":{"id":"Consult_chateau_formulaire5acc","dept":"82","canton":"Labastide-St-Pierre","commune":"Reyniès","nom":"Reyniès_82","type":"Château","periode":"XIII-XVII","histoire":"REYNIES, le château de Reyniès fut édifié au XIIIe siècle et il appartient à la même famille depuis douze générations. La famille de Reyniès est l'une des plus anciennes du Quercy et trouve son origine dans la famille Raymond de Grimoard, seigneur de Villebrumier et de Reyniès. Il acquiert ce second titre quelques années après l'édification du château. Quand Antoinette de Grimoard épousa, en 1450, Jacques de La Tour, elle lui apporta en dot la seigneurie de Reyniès. Le château fort de Reyniès fut construit en 1289 par le premier seigneur de Reyniès, Raymond de Grimoard, seigneur de Villebrumier. Ce monument particulier, avec ses trois tours rondes, a été construit en briques cuites fabriquées sur place dans une briqueterie dont lactivité perdura jusque dans les années 1880. Dominant la rive droite du Tarn, ce château fort occupe ainsi une position stratégique qui lui permit de contrôler lintense trafic fluvial jusqu'à la fin du XIXe siècle. Pris dans la tourmente des guerres de religions et du siège de Montauban en 1621 par le roi Louis XIII et ses armées, Les Latour de Reyniès s'étant convertis au protestantisme, le siège fut mis au château en 1622 par le duc de Vendôme, lequel le fit sauter et le détruisit totalement. Le château fut en partie détruit à cette époque. Il fut reconstruit sur ses fondations initiales en 1650 et Étienne Seguin de La Tour, marquis de Reyniès, le fit rehausser dun étage en 1786 lui offrant ainsi sa silhouette actuelle particulièrement imposante. Véritable patrimoine du Tarn-et-Garonne, le château de Reyniès est inscrit, depuis 1974, à l'inventaire des monuments historiques.","architecture":"La construction du château de Reyniès remonte à 1269. Les briques cuites utilisées étaient fabriquées sur place dans la briqueterie sise en amont du pont actuel et qui était encore en service dans les années 1880. L'excellence de la cuisson explique l'inutilité d'un crépi de protection. \r\nCette bâtisse présente une particularité exceptionnelle: elle ne compte que trois tours rondes. Ce type de réalisation résulte en principe d'une contrainte topographique comme la présence d'une tête d'éperon ou d'un bec de confluence.  A Reyniès, il existait largement la place pour prévoir la quatrième tour. C'est pourquoi il a fallu trouver \" une astuce\" pour pallier ce manque: la mise en place de redents qui donnent à la façade côté parc un aspect très original : Un redent ou redan est un ouvrage de fortification constitué de deux murs formant un angle saillant. Ce château-fort occupait une position stratégique remarquable sur la rive droite du Tarn, contrôlant le trafic fluvial important qui a existé jusqu'à la fin du XIXe siècle.","habitants":"Famille de  Raymond de Grimoard                                                                    Étienne Seguin de La Tour\r\n        \r\n        \"","divers":"Château de Reyniès","gps":"","images":["../../jctruffet.com/image/image_82/82_Reynies_82_1.jpg","../../jctruffet.com/image/image_82/82_Reynies_82_2.jpg","../../jctruffet.com/image/image_82/82_Reynies_82_3.jpg","../../jctruffet.com/image/image_82/82_Reynies_82_4.jpg","../../jctruffet.com/image/image_82/82_Reynies_82_5.jpg","../../jctruffet.com/image/image_82/82_Reynies_82_6.jpg"]},"Consult_chateau_formulaireab38":{"id":"Consult_chateau_formulaireab38","dept":"82","canton":"Lafrançaise","commune":"Roquecor","nom":"Roquecor","type":"Château","periode":"XII-XVI","histoire":"Roquecor, date du XIIe siècle, puis au XIVe siècle le village se forma autour du château des seigneurs d'Aspremont, trois châteaux dans ce village, Canussel, Couyssel et   Labarde.          \r\nCANUSSEL,  château familial de Canussel, le général Jean-Baptiste Bessières,  maréchal d'Empire en 1804.  Jean-Baptiste aurait voulu devenir chirurgien comme son père, et fit dexcellentes études, mais des revers de fortune le firent se tourner vers larmée. Leur contrat de mariage comporte les signatures de Napoléon, de Louis son frère, de Joséphine, Hortense et Eugène de Beauharnais.                                                                           COUYSSEL, construit à Roquecor  à la fin du XVe siècle, mais conserve certaines parties qui dateraient du XIIe siècle. Des chevaliers de la maison de Couyssels sont mentionnés dans la seconde moitié du XIIIe siècle. Au XVIe siècle, Louis de Laval fait de son château l'un des principaux centres où se réunissaient les protestants. Couyssels est abandonné bien avant la Révolution en 1789. Le château de Couyssels est inscrit au registre des monuments historiques par arrêté du 22 juillet 1971. La propriété sur laquelle il se trouve appartient à une personne privée.\r\nLABARDE, souvenir de M. et Mme Richerd, qui ont relevé Labarde de ses ruines ; assurer la pérennité de leurs oeuvres  par l'entretien de la propriété, le maintient d'une présence religieuse et la poursuite de leur action sur le plan tant matériel que spirituel ; susciter et encourager la circulation des idées tendant à la reprise et au développement de l'enseignement et du culte catholique autour de Labarde, partout en France et dans tout l'Univers.","architecture":"Rocquecor, c'est au bas Moyen Âge que le village se constitue, autour des châteaux de Roquecor et de Couyssels, tous deux construits au XIIIe siècle. Ils changeront plusieurs fois de mains, et seront maintes fois reconstruits et remaniés au cours de l'histoire, et notamment de la guerre de Cent Ans,   château reconstruit au XVIIe ou XVIIIe siècle, avec tour crénelés à mâchicoulis corps de logis rectangulaire à deux niveaux sur soubassement, remaniements ultérieurs.                                                                                                             Canussels quadrilataire du XIII-XVIe siècle  flanqué de tours carrées à chaque angles,corps de logis en équerre  à tois niveaux.                                                                                                                   Couyssels,  la construction du château actuel remonte à la fin du XVe siècle, mais conserve plusieurs parties datant du XIIe siècle, certains éléments déplacés ont été re-employés au château de Quissac à Valeilles, canton de Montaigu-de-Quercy, deux étages carrés,  escalier à vis sans jour, en pierre, pierre de taille, moellon. Couverture, toit à longs pans, toit en pavillon couverts de tuiles creuses.                                                              Labarde de plan rectangulaire à trois niveaux toits en croupes   retour en équerre d'une dépendance faisant la fermeture de l'édifice.","habitants":"Général Jean-Baptiste Bessières                                                              M. et Mme Richerd\r\n        \"","divers":"Château de Canussels, de  Couyssels, de L'Hoste de Labarte et de Roquecor (Mairie)","gps":"","images":["../../jctruffet.com/image/image_82/82_Roquecor_1.jpg","../../jctruffet.com/image/image_82/82_Roquecor_2.jpg","../../jctruffet.com/image/image_82/82_Roquecor_3.jpg","../../jctruffet.com/image/image_82/82_Roquecor_4.jpg","../../jctruffet.com/image/image_82/82_Roquecor_5.jpg","../../jctruffet.com/image/image_82/82_Roquecor_6.jpg","../../jctruffet.com/image/image_82/82_Roquecor_7.jpg","../../jctruffet.com/image/image_82/82_Roquecor_8.jpg","../../jctruffet.com/image/image_82/82_Roquecor_9.jpg"]},"Consult_chateau_formulaireaf5a-2":{"id":"Consult_chateau_formulaireaf5a-2","dept":"82","canton":"Beaumont de Lomagne","commune":"Gimat","nom":"Ruble","type":"Château","periode":"XVIII","histoire":"RUBLE, pas d'information historique, chambres d'hôtes de M. et Mme Alunni","architecture":"Le château du Ruble a été bâti au XVIIIe siècle. Les communs et les dépendances furent reconstruits au XIXe siècle, après 1837, le gros-oeuvre du château en brique, l'intérieur est entièrement rénové. La propriété reçoit, durant l'été, quelques séminaires ou stages. Le corps de logis rectangulaire à deux niveaux toit à deux pans accolé  d'un pavillon à trois niveaux et à l'opposé d'une tourelle de deux niveaux.","habitants":"Famille Alunni\r\n        \"","divers":"Chateau de Ruble à Gimat","gps":"","images":["../../jctruffet.com/image/image_82/82_Ruble_1.jpg","../../jctruffet.com/image/image_82/82_Ruble_2.jpg","../../jctruffet.com/image/image_82/82_Ruble_3.jpg","../../jctruffet.com/image/image_82/82_Ruble_4.jpg"]},"Consult_chateau_formulaire41e4":{"id":"Consult_chateau_formulaire41e4","dept":"82","canton":"Albias","commune":"Réalville","nom":"Réalville","type":"Château","periode":"XV-XVI","histoire":"Cinq châteaux à Réalville celui de Lastours (voir article) de Martel, de Granès de St-Marcel et celui de Contines de Las-Baros.                                                                                                    REALVILLE,  cette ville fut fondée par le roi Philippe le Bel et bâtie au lieu de Gardemont ; elle remplaça celle qui existait à Almont qui fut alors démolie et dont les matériaux servirent en partie à l'édification de la ville nouvelle.                                                                                                                                      GRANES, construction nouvelle en 1895 à l'emplacement d'une construction plus ancienne représentée sur le plan cadastral de 1830. Le commanditaire de cet édifice est la famille Chalret du Rieu, propriétaire à Granes depuis 1842. C'est Jacques-Paul Lequeux, architecte parisien et également architecte départemental de la Seine et neveu de Victor Baltard (auteur des halles) qui réalisera le château en s'inspirant de l'architecure parisienne du XVIIe siècle.                                                                                           Le château de Lastours ainsi que sa terrasse sud et son jardin est inscrit monument historique. En 1929, le château est racheté par le service des contributions indirectes et sera transformé en centre de soins.\r\nCONTINES de LAS-BARROS est un ensemble rural du XIXe siècle comprenant une maison de maître et diverses dépendances dont un rucher et un four-pigeonnier, est inscrit au monument historique.                                                                                         MARTEL, à cette époque, le château appartient à Jean de Martel-Fontaines, baron de Caussade et de Réalville à partir de 1567. Le château connait une importante campagne de reconstruction au XVIIe siècle, comme l'attestent certaines fenêtres, une cheminée et un plafond peint. Au XVIIe siècle, Jean Daliès est seigneur de Martel.  En 1830, il appartient à Maurice Jean-Jacques Scorbiac, chevalier de la Légion d'honneur, propriétaire à Montauban.","architecture":"Granès, cette imposante demeure, est son unique réalisation en Tarn-et-Garonne.  Des aménagements intérieurs et modifications ont été apportés: l'escalier de distribution intérieur a été remplacé par un ascenseur. Les pièces de cet escalier déposé sont aujourd'hui conservées dans la ferme. Le logis est en grande partie dépourvu de son mobilier.                                                                                 Las Barros, ensemble rural de la seconde moitié du XIXe siècle. Autour de l'habitation, datée de 1866, les bâtiments agricoles comprennent une grange à quatre travées (grange à foin, écuries, étable, remise), des porcheries, un four-pigeonnier, un rucher.                                                               Martel, les vestiges les plus anciens du château semblent dater du XIVe siècle. Il s'agit d'un portail en arc brisé à voussures, situé au rez-de-chaussée de l'élévation nord. La tour d'escalier, les croisées et la partie en pan-de-bois pourraient dater du XVIe siècle.    Le château ne semble pas avoir subi d'importantes modifications au XIXe siècle   Il est probable qu'à la fin du XIXe siècle ou au début du XXe siècle, le second niveau ait été arasé.    Sur le plan cadastral de 1830, le site conserve le toponyme \"château de Martel\" même s'il appartient au courant du XIXe siècle à des religieuses ursulines qui s'en dépossèdent en 1911.  Au cours de la seconde moitié du XXe siècle, des restaurations sont entreprises et la tour d'escalier est coiffée d'un toit en tuile creuse. Alors que le pigeonnier construit au XVIIe siècle est inscrit au titre des monuments historiques en 1988, le château, lui, ne l'est pas.","habitants":"Famille Chalret du Rieu                                                                                    Famille de Jean de Martel-Fontaines\r\n        \r\n        \"","divers":"Châteaux de Martel de Granes de St-Marcel, de Belleville et celui de Contines de Las-Baros à Réalville","gps":"","images":["../../jctruffet.com/image/image_82/82_Realville_1.jpg","../../jctruffet.com/image/image_82/82_Realville_2.jpg","../../jctruffet.com/image/image_82/82_Realville_3.jpg","../../jctruffet.com/image/image_82/82_Realville_4.jpg","../../jctruffet.com/image/image_82/82_Realville_5.jpg","../../jctruffet.com/image/image_82/82_Realville_6.jpg"]},"Consult_chateau_formulairee1c4":{"id":"Consult_chateau_formulairee1c4","dept":"82","canton":"St-Nicolas de la Grave","commune":"Gensac","nom":"Sale_Gensac","type":"Maison forte","periode":"XVI","histoire":"La-Sale,  édifice imposant qui au début du siècle comptait pas moins de neuf métairies, ce patrimoine fut vendu aux enchères en 1908.\r\nIl est aujourdhui le siège dune exploitation agricole familiale dune superficie de 120 hectares. La famille Serre y cultive prairies et céréales .","architecture":"Le château de la Sale aurait remplacé au XVIe siècle un autre édifice situé dans le village de Gensac. De ce nouveau château, il ne resterait qu'une tour susceptible de correspondre au pavillon signalé par Jules Frayssinet en 1881 : \"Seul un pavillon de l'ancienne résidence du XVIe siècle relié au château du côté de l'Est et regardant la forêt. La porte était cintrée et ornée de deux colonnes partagées avec cannelures et chapiteaux\r\ncorinthiens. Les pierres de la frise, commençaient à se disjoindre et à être rongées par le temps ; du lierre donnait un air de mystère à l'inscription suivante gravée en creux.","habitants":"Famille Serre \r\n        \"","divers":"Maison forte de Sale à Gensac","gps":"","images":["../../jctruffet.com/image/image_82/82_Sale_Gensac_1.jpg","../../jctruffet.com/image/image_82/82_Sale_Gensac_2.jpg","../../jctruffet.com/image/image_82/82_Sale_Gensac_3.jpg","../../jctruffet.com/image/image_82/82_Sale_Gensac_4.jpg"]},"Consult_chateau_formulairef38c":{"id":"Consult_chateau_formulairef38c","dept":"82","canton":"Lafrançaise","commune":"Sauveterre","nom":"Sauveterre","type":"Château","periode":"XIII-XVII","histoire":"Deux châteaux à Sauveterre dont celui de Sauveterre du XVIIe siècle et celui de la Vernéde du XIXe siècle.                                                                                                SAUVETERRE, est une petite ville forte, où les maisons sont groupées autour du château bâti sur le roc, domine le bas du village. Il datait du XIIe siècle. Mais Simon de Montfort, lorsquil revint en Quercy pour punir tous ceux qui avaient prêté la main à la prise du château de Lolmie, aurait détruit, en même temps que lensemble des châteaux du voisinage, le château et léglise de Sauveterre, aux environs de lannée 1214. Reconstruit peu après, il fut à nouveau détruit pendant la guerre de cent ans, puis en partie en 1320, par le pastoureaux. Plus tard, en 1621, durant le siège de Montauban, il eut à souffrir du passage de Maximilien de Béthune, comte dOrval.                                                                                                                                       VERNEDE, l'édifice actuel remonterait au XVIIe siècle mais brûlé en 1789. Un nouveau logis fut reconstruit en 1848. Remploi dans le jardin de fragments de sculpture en marbre  du IIe ou IIIe siècle provenant des fouilles de Thézels, commune de Castelnau-Montratier dans le Lot.","architecture":"Sauveterre au XIIIe siècle, le bâtiment principal de quarante mètres, date de la Renaissance, mais  les façades et des aménagements intérieurs ont été remaniés : un escalier néoclassique et des peintures en trompe-lil. Il ne reste aujourdhui sur lemplacement du château quun vieux puits très profond. On voit encore sur la plate forme, dans lépaisseur du mur, une lucarne évidée comme un entonnoir, qui servait à observer le château de Marcilhac, que lon pouvait apercevoir par une échancrure de la colline. La tradition conserve encore le souvenir de cet observatoire, sculpté avec soin. Primitivement, la chapelle du château servit déglise aux habitants.  de plan carré à deux niveaux et attiques.                                                                                                                 Vernède, L'édifice se compose d'un étage carré, le gros-oeuvre en pierre et enduit, élévation ordonnancée surmontée de toit à longs pans et croupe, recouverts de tuiles mécaniques.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Sauveterre, du Bosc  et de Vernéde à Sauveterre","gps":"","images":["../../jctruffet.com/image/image_82/82_Sauveterre_1.jpg","../../jctruffet.com/image/image_82/82_Sauveterre_2.jpg","../../jctruffet.com/image/image_82/82_Sauveterre_3.jpg","../../jctruffet.com/image/image_82/82_Sauveterre_4.jpg"]},"Consult_chateau_formulaire86c4":{"id":"Consult_chateau_formulaire86c4","dept":"82","canton":"Verdun sur Garonne","commune":"Savenès","nom":"Savenès","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Savenès celui de Savenès du XVIIe siècle et de Fourcaran  du XVII-XVIIIe siècle.                                                                                                                  SAVENES, qui est devenu commune en 1901, était, sous l'ancien régime, un fief dépendant des seigneurs de Verdun-sur-Garonne. Les seigneurs du lieu qui ne possédaient que des directes étaient dépourvus du droit de justice. Au XVIe siècle, la seigneurie appartenait aux \"Isalguiers\" puis aux \"Vabres\".  Au XVIe siècle, alors que les routiers occupent la région de Verdun-sur-Garonne, les habitants trouvent refuge dans la maison forte.  En 1612, Henri IV, lors de la rupture de son mariage, cède la seigneurie de Savenès à Margueritte de Navarre.  Savenès devient la propriété de Jean de Pezan procureur de Toulouse. Le château actuel est construit en 1660 par Vital de Pezan en remplacement d'une maison forte souvent attaquée. En 1745 la seigneurie de Savenès échappe à la famille de Pezan, la famille du Barry devient propriétaire du lieu en 1745  François du Barry meurt le 29 Juillet 1751 dans sa propriété.  C'est à cette époque que Paul Majorel négociant en vin, devient le propriétaire du domaine viticole, jusqu'en 1881. Savenès appartient à la famille Cantaulause.\r\nFourcaran,   Le château d'Arailh, du nom d'une importante famille toulousaine, ou de Fourcaran édifié en 1645 pour Jean de Pézan, depuis 2001, M. Bernard Rosès a sauvé cette bâtisse vouée à la disparition et a redonné au château son lustre dantan.","architecture":"Le château de Savenès est un ancien château fort du XIIIe siècle, remanié par la suite. Il est toujours entouré de douves qui servaient, grâce à un pont-levis, à protéger la seigneurie durant la guerre de Cent Ans (1337-1453). Le château à ce moment là devient le cur du village qui se reconstruit autour, l'église étant détruite. Le château de Savenès, anciennement appelé château de Lassalle, est en partie détruit pendant la guerre de Cent Ans, puis les guerres de religion et restauré au XVIIe siècle.                                                                                                                               Fourcaran, pendant la guerre de Cent -Ans, village et église furent détruits et la population préféra reconstruire le village prés du château.  L'édifice quadrangulaire est une magnifique demeure avec un corps central en briques et une façade noble possédant deux tours carrées avec crénelage et fronton circulaire, elle a subi des remaniements au XVIIIe siècle. Côté rue on peut observer à l'est du bâtiment, les communs, avec leurs deux pigeonniers \"Pied de mulet\", dont un se termine au niveau du premier étage par un bel encorbellement.","habitants":"Famille de Pezan                                                                         M. Bernard Rosès                                                                                Famille de Paul Majorel\r\n        \r\n        \"","divers":"Château de Fourcaran et de Savenès","gps":"","images":["../../jctruffet.com/image/image_82/82_Savenes_1.jpg","../../jctruffet.com/image/image_82/82_Savenes_2.jpg","../../jctruffet.com/image/image_82/82_Savenes_3.jpg","../../jctruffet.com/image/image_82/82_Savenes_4.jpg","../../jctruffet.com/image/image_82/82_Savenes_5.jpg","../../jctruffet.com/image/image_82/82_Savenes_6.jpg","../../jctruffet.com/image/image_82/82_Savenes_7.jpg","../../jctruffet.com/image/image_82/82_Savenes_8.jpg","../../jctruffet.com/image/image_82/82_Savenes_9.jpg"]},"Consult_chateau_formulaire2b2f":{"id":"Consult_chateau_formulaire2b2f","dept":"82","canton":"St-Nicolas de la Grave","commune":"Sistels","nom":"Sistels","type":"Maison fortre","periode":"XVI","histoire":"SISTELS, le manoir de Guillaume Bigourdan, l'inventeur des fuseaux horaires.\r\nLe château, édifié par le capitaine Franguet en 1523 et 1524 puis détruit par un incendie le 25 mars 1911.  La seigneurie appartenait à la maison de Durfort tout comme celle de Dunes.","architecture":"Sistels  Le bâtiment aurait été \"flanqué de cinq tours, une au centre et les autres aux angles\". Il est difficile de reconnaître le château actuel dans cette description sommaire. L'édifice est à rapprocher des salles gersoises qui procèdent d'un même esprit architectural. Elles ont en commun la simplicité de leur plan commandé par un escalier à vis contenu dans une tour hors-oeuvre. Si nous supprimons cet escalier  la salle redevient le petit fortin gascon réduit à un donjon dont elle procède à coup sûr et reproduit la masse générale. Château remanié au XVIIIe siècle; couronnement refait au XIXe siècle et partiellement détruit par un incendie en 1911. Château comprenant un sous-sol et un étage carré, le gros-oeuvre en calcaire et pierre de taille, toit à longs pans.","habitants":"Famille des de Durfort \r\n        \"","divers":"Maison forte de Sistel","gps":"","images":["../../jctruffet.com/image/image_82/82_Sistels_1.jpg","../../jctruffet.com/image/image_82/82_Sistels_2.jpg","../../jctruffet.com/image/image_82/82_Sistels_3.jpg","../../jctruffet.com/image/image_82/82_Sistels_4.jpg"]},"Consult_chateau_formulaire36b5":{"id":"Consult_chateau_formulaire36b5","dept":"82","canton":"Lafrançaise","commune":"Saint-Amans de Pellagal","nom":"St_Amans_Pellagal","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Saint-Amans de Pellagal celui du haut Castel du XVIIIe siècle de la Garde du Calvaire du XII-XVIIIe siècle..                                                                                                                          HAUT-CASTEL, reconstruit au XVIIIe siècle, ancienne résidence des sires de la Châtaigneraie, à joué dans le pays un rôle prépondérant jadis. Les propriétaires d'Haut Castel descendent de l'illustre maison de Durfort-Léobard. Pendant la Révolution, Gabrielle de Durfort Léobard de Boissières, que la reine Marie Antoinette avait surnommée Durfort la Jolie, fut emprisonnée à l'Abbaye. L'avocat, chargé de sa défense au tribunal, Louis Cosme Lemaire lui offrit de la sauver en l'épousant. Celle-ci accepta, le consentement de sa mère, la comtesse Louise de Durfort-Léobard, née de Monréal de Sorans, fut obtenu après bien des difficultés car cette hautaine grande dame, avait répondu : \"j'aime mieux voir ma fille morte que mésalliée\". Gabrielle de Durfort-Léobard, chanoinesse de Neuville, mourut à Haut-Castel le 23 février 1841. La propriété appartient ensuite à la famille Gras connue par le général Basile Gras, inventeur du fusil modèle 1874 dit fusil Gras.                                                                                                                                                             LA-GARDE du Calvaire, ruines
