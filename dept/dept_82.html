const FULL={"Consult_chateau_formulaire4b63":{"id":"Consult_chateau_formulaire4b63","dept":"82","canton":"Valence","commune":"Montjoi","nom":"Andas","type":"Château","periode":"XVI-XIX","histoire":"ANDAS, dès 1550 Bertrand de Laurières était qualifié de seigneur\r\nd'Andas et en 1612 Jean Fourastié, maçon, s'engageait à construire\r\nune tour sur le devant de la maison. Une porte en ogive subsiste dans le bâtiment ouest. Le château fut remanié et agrandi dans la deuxième moitié du XIXe siècle pour le père d'Arthur de Coste qui en était propriétaire en 1890.\r\nLa grille d'entrée porte le monogramme que l'on retrouve sur certaines peintures du hall, alors que les autres sont marquées différemment et datées de 1884 . Aujourd'hui c'est un haras qui élève  des Criollos chevaux de race.","architecture":"L'édifice, de plan symétrique, se compose d'un étage carré, le gros oeuvre en pierre; brique; pierre de taille; moellon et enduit, élévation ordonnancée sans travée surmontée de toit à longs pans ; demi-croupe, croupe; toit en pavillon; terrasse et flèche conique, couverts de tuiles mécaniques; tuiles plates; tuiles creuses et ardoises. La propriété comprend une chapelle, une orangerie, des écuries, un four à pain et une fontaine.","habitants":"Famille de Bertrand de Laurières \r\n        \"","divers":"Château d'Andas à Montjoi.","gps":"","images":["../../jctruffet.com/image/image_82/82_Andas_1.jpg","../../jctruffet.com/image/image_82/82_Andas_2.jpg","../../jctruffet.com/image/image_82/82_Andas_3.jpg","../../jctruffet.com/image/image_82/82_Andas_4.jpg"]},"Consult_chateau_formulaire1668":{"id":"Consult_chateau_formulaire1668","dept":"82","canton":"Albias","commune":"Lamotte-Capdeville","nom":"Ardus","type":"Château","periode":"XVIII","histoire":"ARDUS, la famille de la Motta possède Ardus en 1236, hameau lié au site fortifié de lépoque gauloise qui se trouve au-dessus du village, sur Pech Ségur et un autre château, situé à la Mothe Vieille, à louest de léglise, simple fort constitué dun donjon sans flancs, entouré dun fossé sec. En 1628 les guerres de religions laissent la population catholique dArdus meurtrie et les édifices dArdus (moulin, châteaux et églises) en ruines. En 1734, François Duval président de la cour  des aides de Montauban prend le titre de Baron de Lamothe et  fait construire le château sur le bord de lAveyron et devient propriétaire du Moulin. En 1737, il fonde une faïencerie, premier établissement du Montalbanais, qui obtient en 1739, le titre de manufacture royale.                                                                                                                                                          LAMOTHE, le château est classé monuments historiques. C'est une propriété privé. Le moulin de Lamothe est construit par le comte de Lamothe au XVIIIe siècle. La villa Saint-Alban est située à côté du château. La propriété au début du XXe siècle, a appartenu à la famille de Gramont.","architecture":"C'est une élégante villa du XVIIIe siècle, construite par le baron François Duval de Lamothe au bord de lAveyron. Les façades, les toitures et les décors du salon de musique sont classés monuments historiques. Le pigeonnier veille sur la rue du Moulin.                                                                                   Le Moulin construit au XVIIIe siècle par le baron de Lamothe, il a été rénové à la fin du XXe siècle pour devenir un club privé surplombant l'Aveyron, avec vue sur la plage, de plan rectangulaire à quatre niveaux \nLa Villa Saint-Alban située rue du Port, en équerre à deux niveaux toits en croupes.","habitants":"Baron  François Duval                 Famille de Gramont\"","divers":"Château de Lamothe , le Moulin et la villa Saint-Alban à Lamothe-Capdeville","gps":"","images":["../../jctruffet.com/image/image_82/82_Ardus_1.jpg","../../jctruffet.com/image/image_82/82_Ardus_2.jpg","../../jctruffet.com/image/image_82/82_Ardus_3.jpg","../../jctruffet.com/image/image_82/82_Ardus_4.jpg"]},"Consult_chateau_formulaire92c7":{"id":"Consult_chateau_formulaire92c7","dept":"82","canton":"St-Nicolas de la Grave","commune":"Asques","nom":"Asques_Doazac","type":"Château","periode":"XVII","histoire":"A Asques le château de Baleri  pas d'information historique.                                                                                            DOAZAC, ce fut le siège d'une seigneurie qui appartenait au XIIIe siècle aux d'Agra et passa au XVe siècle aux Grossolles, puis au XVIIe siècle à la famille d'Esparbès de Lussan qui la vendirent aux Beauquesne au XVIIIe siècle, cette famille  était originaire des environs de Toulouse et elle occupait depuis le XVIIe siècle un rang distingué dans la haute bourgeoisie de la région Lomagnole. La seigneurie de Doazac fut presque toujours sous la maîtrise de celle d'Asques, ce qui occasionnait des rivalités entre les deux seigneurs. Ses coutumes furent accordées le 7 juin 1512 par Raymond de Grossolles. Elles se composent de 53 articles en occitan traitant des pacages publics, des corvées, des héritages, des dîmes et des divers travaux. Un sinistre a endommagé la tour, l'escalier en bois et tous les murs du château, depuis 2010, l'édifice a été restauré.","architecture":"La commune possédait deux châteaux féodaux dont il reste aujourdhui quelques traces.                                                                                                                    Asques dit de Baléri , plus maison forte que château édifice de plan carré à deux niveaux, toit  en croupes flanqué au sud de deux tours carrées toit en un seul pans de style pigeonnier.","habitants":"Famille d'Esparbès de Lussan\r\n        \"","divers":"Château de Baléri à Asques.","gps":"","images":["../../jctruffet.com/image/image_82/82_Asques_Doazac_1.jpg","../../jctruffet.com/image/image_82/82_Asques_Doazac_2.jpg"]},"Consult_chateau_formulaire0e98":{"id":"Consult_chateau_formulaire0e98","dept":"82","canton":"Albias","commune":"Auty","nom":"Auty","type":"Château","periode":"XVIII-XIX","histoire":"AUTY,  dit château Dumas, la seigneurie d'Auty était mouvance de la baronnie de Castelnau de Montratier. Elle eut néanmoins ses seigneurs particuliers, connus sous le nom d'Auty, dès le XIIe siècle. Le dernier d'entre eux fut Pons d'Auty, chevalier, marié en 1363 à Guiscarde d'Antejac, qui avait vendu en 1346 la moitié de la seigneurie à Bertrand de Prez, seigneur de Montpezat. L'autre moitié appartenait à  la baronne d'Auty qualifiée en 1392, femme de Bertrand de Rouzet, qui le transmit à Louis de Rouzet son fils, par testament en date du 14 novembre 1435. Celui-ci la donna le 7 juillet 1450,  à Jean de Raymond, fils de Pierre, sénéchal de Querçy. Leurs descendants en eurent la jouissance jusqu'en 1764, époque à laquelle Joseph François Xavier d'Aubery, comte et seigneur d'Auty avec Marie de Raymond D'Auty, sa mère, fille de Joseph-François de Raymond, seigneur d'Auty.\r\nL'un des descendants de Bertrand de Prez vendit la moitié de la seigneurie, provenant à celui-ci de Pons d'Auty, à François Dadine, bourgeois de Cahors qui la céda le 9 juillet 1599 à Josué de Raymond d'Auty. Depuis lors, Josué et ses descendants possédèrent toute la terre jusqu'au moment où elle advint par mariage au comte d'Aubery et enfin à Jacques de Beaumont de Verneuil, qui en était seigneur en 1777 .","architecture":"Le château d'Auty se compose de deux bâtiments, un logis et une dépendance qui lui fait face. L'entrée s'effectue par un porche ménagé au centre. Les deux bâtiments sont reliés entre eux par une terrasse arborée, divisée en deux parties par une haute grille en fer forgé est fermée côté nord-est et sud-ouest par une balustrade en tuiles canal reposant sur un épais soubassement en brique. Côté sud-ouest, en contrebas, un jardin à la française agrémente le dénivelé du terrain. Le logis, de plan rectangulaire, possède quatre niveaux. La toiture, à longs pans et croupes en tuile creuse, est percée de lucarnes. Le corps de bâtiment rectangulaire est flanqué de trois tourelles d'angle à deux étages couvertes d'une terrasse (sud-ouest) et d'un toit en pavillon (sud-est et nord-est). Le logis repose sur un étage de soubassement, accessible par une porte percée dans l'élévation nord-est.  Un escalier droit en pierre, décentrée par rapport à l'entrée du logis, est soutenu par deux arcs en brique et donne accès au premier étage. Une autre pièce est voûtée d'arêtes. La dépendance, construite en brique, adopte un plan en L. Sa fonction reste à ce jour non identifiée. Elle possède un étage de soubassement côté nord-ouest, un rez-de-chaussée et un comble à surcroît. Le toit à longs pans est couvert en tuile creuse. L'élévation antérieure (sud-est) présente une composition symétrique : de part et d'autre d'un porche d'entrée, voûté en berceau, sont situés deux corps de bâtiment couronnés d'un fronton.","habitants":"Famille de Bertrand de Rouzet\r\n        \"","divers":"Château d'Auty","gps":"","images":["../../jctruffet.com/image/image_82/82_Auty_1.jpg","../../jctruffet.com/image/image_82/82_Auty_2.jpg","../../jctruffet.com/image/image_82/82_Auty_3.jpg"]},"Consult_chateau_formulairee240":{"id":"Consult_chateau_formulairee240","dept":"82","canton":"Montauban","commune":"Sainte-Juliette","nom":"Baratie","type":"Gentilhommière","periode":"XIII-XVI","histoire":"BARATIE, Bertrand Barat, co-seigneur des lieux, donne son nom à la tour modeste devenue château de la Baratie. Le 12 mai 1259, le comte de Toulouse reçoit les honneurs de la seigneurie. Dépendant du diocèse de Cahors, le pays sidentifie à loccitanie.  Au XIVe siècle, le pays occitan est envahi par des occupants qui ne parlent ni la langue dOc, ni la langue dOy ; ils passent souvent par un chemin qui deviendra le chemin des Anglais. Sur leur route, ils népargnent pas les châteaux dont les blessures sont très visibles à la Baratie, un peu moins à Ste Juliette où la chapelle du XIIIe reste debout ; une tour carrée viendra la renforcer au XVe siècle. Les maisons, les places-fortes sont  dispersées, il ny a pas de haut-lieu stratégique à détruire dans la région ; seul le château de la Baratie perd de la hauteur, voyant ses tours dévastées et décapitées lors de la Révolution. La paroisse Sainte Juliette devient bourg principal et sassocie au hameau de Guitard pour créer la commune de Sainte-Juliette, département du Lot. Château de la Barathie inscrit au titre des monuments historiques en 1971.","architecture":"Sainte-Juliette où la chapelle du XIIIe reste debout ; château du XIIIe ou XIVe siècle ; une fenêtre et des cheminées  du XVIe siècle ; remaniement général (ouvertures et cheminées) dans la 1ère moitié du XVIIe siècle ; tour aménagée en chapelle, porte la date 1633 , une tour carrée viendra la renforcer au XVe siècle. A la Révolution Française le château de la Baratie perd de la hauteur, voyant ses tours dévastées et décapitées. La paroisse Sainte-Juliette devient bourg principal et sassocie au hameau de Guitard pour créer la commune de Sainte-Juliette.","habitants":"Famille de  Bertrand Barat\r\n        \"","divers":"Gentilhommière de la Baratie à Ste-Juliette","gps":"","images":["../../jctruffet.com/image/image_82/82_Baratie_1.jpg","../../jctruffet.com/image/image_82/82_Baratie_2.jpg","../../jctruffet.com/image/image_82/82_Baratie_3.jpg","../../jctruffet.com/image/image_82/82_Baratie_4.jpg"]},"Consult_chateau_formulairecf2c":{"id":"Consult_chateau_formulairecf2c","dept":"82","canton":"Lafrançaise","commune":"Lafrançaise","nom":"Baronnie","type":"Château","periode":"XIX","histoire":"BARONNIE,  la famille des Montratier-Parazols construisit au XIIe siècle le château de la Mothe-Parazols qu'il fut jusqu'en 1800 la demeure de ces seigneurs. Vers le XVIIe siècle, les Parazols édifièrent un simple pied-à-terre et rendez-vous de chasse, le château actuel de la Baronnie.  En 1820, le domaine, appartenant aux Montratier-Parazols se composait au lieu-dit Plaine de l'Hermitage d'une maison et au lieu dit l'Hermitage d'un pigeonnier, une maison avec cour  et une autre maison. La démolition de la maison avec cour est notée en 1882, sa reconstruction se fit en même temps car la mention du château figure dans les nouvelles matrices qui sont  contemporaines. La dépendance de la Plaine de L'Hermitage est notée démolie en 1898, mais sa reconstruction est faite la même année.  Les communs, appartenaient aux Parazols jusqu'en 1941.","architecture":"La Baronnie  le  château  fut reconstruit sur leur l'emplacement d'origine. Les caractéristiques stylistiques et formelles de ses élévations  confirment son appartenance au quatrième quart du XIXe siècle.   La demeure, à son origine, fut construite pour y loger un cadet de la famille et était le lieu de chasse. Puis reconstruction totale de la demeure pour les Parazols, sur un emplacement différent du logis vers 1882 et des communs vers 1898. Logis de plan symétrique, en pierre avec brique en remplissage, possédant un étage carré, un étage de comble et rez-de-chaussée surélevé, élévation ordonnancée, toit d'ardoise ; communs en briques et briques crues, toit de tuiles creuses.","habitants":"Famille des Montratier-Parazols \r\n        \"","divers":"château de la Baronnie avec son orangeraie","gps":"","images":["../../jctruffet.com/image/image_82/82_Baronnie_1.jpg","../../jctruffet.com/image/image_82/82_Baronnie_2.jpg","../../jctruffet.com/image/image_82/82_Baronnie_3.jpg"]},"Consult_chateau_formulaired8f0":{"id":"Consult_chateau_formulaired8f0","dept":"82","canton":"Caussade","commune":"Négrepelisse","nom":"Barrayous","type":"Château","periode":"XVI-XVIII","histoire":"BARRAYOUS, le domaine devient d'Amade par l'union de Claire de Moynier, fille d'Isaac de Moynier, et de Bernard Joseph Amade en 1761, seigneur de Joye, fils de Pierre Guillaume Amade, consul de Castelsarrazin. Leur fils jean-Baptiste Amade, lieutenant de la garde royale de Montauban en 1814 et juge de paix, fut ennobli par lettre patente de Louis XVIII. Adolphe d'Amade, fils de Jean-baptiste fut le père d'Albert d'Amade. La naissance d'Albert , haut dignitaire de l'armée française et de la fin du XIXe siècle au début du XXe siècle marqua de son empreinte et de sa mémoire non seulement cette maison mais l'histoire de notre pays. Cet homme repose aux Invalides à Paris et il appartient à présent aux historiens et exégètes de démêlé  'écheveau de la teneur de ses nombreuses et internationales campagnes. Depuis son édification au XVIe siècle donc, cette demeure à été le témoin d'un passé foisonnant. Elle ne nous a pas encore révélé tous ses secrets, tous ses trésors. Gageons que la plongée dans ses mystères animera encore longtemps le théâtre de nos longues soirées d'hiver. Aujourd'hui  hôtel restaurant de Nadia CHéron.","architecture":"Barrayous, depuis son édification au XVIe siècle donc, cette demeure à été le témoin d'un passé foisonnant.   Le manoir, a depuis sa fondation aux environs de 1570  été placé sous les sobres auspices du protestantisme. La façade sud du bâtiment principal en conserve encore la dissymétrie révélatrice. Les portes et fenêtres de celle-ci ne sont en effet pas alignées sous le fronton, élément d'information déterminant pour les huguenots fuyant les persécutions et à la recherche d'un accueil auprès de gens de leur obédience au sein d'une maison réformée. Ils savaient ainsi à bonne distance qu'ils trouveraient en ces lieux le refuge idéal. Au XVIIe  siècle, les guerres de religion ont dévasté le patrimoine régional. Ainsi en fut-il du manoir des Barrayrous qui brûlant de hautes flammes catholiques, fut reconstruit à l'identique au XVIIe siècle  et remanié au XVIIIe siècle  pendant la Révolution. Les épais murs d'enceinte et de la cave voûtée ont résisté aux assauts de l'histoire, L'époque moderne commençant à la fin du Moyen-Âge  vit le château devenir une baronnie.","habitants":"Seigneurs locaux\r\n        \"","divers":"Manoir de Barrayous à Négrepelisse","gps":"","images":["../../jctruffet.com/image/image_82/82_Barrayous_1.jpg","../../jctruffet.com/image/image_82/82_Barrayous_2.jpg","../../jctruffet.com/image/image_82/82_Barrayous_3.jpg","../../jctruffet.com/image/image_82/82_Barrayous_4.jpg"]},"Consult_chateau_formulaire1099":{"id":"Consult_chateau_formulaire1099","dept":"82","canton":"Castelsarrasin","commune":"Barry-d","nom":"Barry_Islemade","type":"Château","periode":"XIX","histoire":"A Barry-D'Islemade trois châteaux celui de Barry du XIXe siècle, le manoir de Mezger et le château des Chanterelles  du XIXe siècle  au nord.                                                                                                                                     BARRY-D'ISLEMADE, de Turckheim Eveline et Fourcade Mireille semble plus ancien que la date à laquelle le rattache son état actuel, peut-être construit au XVIIe siècle (présence des tours carrées d'angles, forme des fenêtres, etc.).  En 1790, le château appartenait à Jacques de Rapin.","architecture":"Le château  de Barry-d'Islemade, édifice  construit en brique est composé d'un sous-sol, d'un étage carré et étage de comble. Le corps de logis est encadré par deux tours carrées. La propriété comprend un four à pain, une buanderie, une écurie, une orangerie, un parc, un jardin et un puits, peut-être construit au XVIIe siècle (présence des tours carrées d'angles, forme des fenêtres, etc.)  un plan-masse de 1790 reproduisait le plan actuel donné par le cadastre. Les toitures auraient été totalement remaniées à la fin du XIXe siècle. Une réfection complète de l'aménagement intérieur serait intervenue vers 1947.                                                                                                                                                 Chateau Mezger se situe à 10 minutes de route de la commune de Montauban. Il propose une piscine extérieure d'eau de source naturelle . Situé à 3.47 km du centre de Barry-d'Islemade. de plan rectangulaire a trois niveaux avec pavillon saillant.\r\nManoir des Chanterelles, entouré d'un parc, occupe un ancien manoir construit en 1881,  de plan rectangulaire à deux niveaux toit en croupes flanqué en façade de deux tours carrées à toit à quatre pans.","habitants":"Famille de Jacques de Rapin\r\n        \r\n        \r\n        \"","divers":"A Barry-d'Islemade le château, le manoir de Mezger et des Chanterelles.","gps":"","images":["../../jctruffet.com/image/image_82/82_Barry_Islemade_1.jpg","../../jctruffet.com/image/image_82/82_Barry_Islemade_2.jpg","../../jctruffet.com/image/image_82/82_Barry_Islemade_3.jpg"]},"Consult_chateau_formulaireeaa5":{"id":"Consult_chateau_formulaireeaa5","dept":"82","canton":"Beaumont de Lomagne","commune":"Beaumont de Lomagne","nom":"Beaumont_Lomagne","type":"Château","periode":"XVIII-XIX","histoire":"Cinq châteaux à Beaumont de Lomagne celui d'Argoumbat du XVIIIe siècle, de Camberle  du XIXe siècle, de Manau du XIXe siècle, de la Ponchude du XIXe siècle, de Turpin et de Fours du XVe siècle .                                                                                                                          ARGOUMBAT, chambres d'hôtes, du XVIIIe siècle a été restauré par les propriétaires actuels avec beaucoup damour et dengagement et selon les principes écologiques.                                                                                                  CAMBERLE, bâtiment signalé à la fin du XVIIIe siècle comme un \"fief\" ou une \"maison de plaisance\". La confrontation des deux cadastres ancien et récent montre que le bâtiment principal existait déjà avant 1837 et met en évidence un simple changement de surface intervenu pour l'aile en retour sur le jardin, celle-ci était autrefois plus longue.                                                                                        MANAU, pas d'information historique.                                                                                                                                                La PONCHUDE,   on trouve la première mention de la propriété dans les cadastres de 1743, à cette date, noble Arnaud Duilhé tient \"métairie, pigeonnier, grange, tout à un tenant à la Ponchtude\". En 1837,  le domaine appartient à Jean Savy; c'est à lui que sont adressés les différents projets de construction en août 1874.                                                                                                      TURPIN, du XIXe siècle, pas d'information historique.                                                         FOURS, a appartenu  à l'illustre maison de Bassabat-Pordéac dont Pierre, le premier chef connu vivait en 1402 Antoine-Scipion de Bassabat, seigneur de Pordéac mourut dans sa  maison seigneuriale des Fours en septembre 1669.","architecture":"A Beaumont une tour féodal du XVe siècle.                                                              Le château de Manau a été construit entre 1826 date d'un document notarial et 1837. L'édifice se compose d'un étage carré et un étage de comble, le gros oeuvre en brique et enduit, élévation à travées surmontée de toit à longs pans brisés, croupe et toit en pavillon, recouverts d'ardoises, de tuiles creuses et de tuiles plates. Le parc comprend un pigeonnier, une remise, un logement, des écuries et des parties agricoles.                                                                                                                    La Ponchude, l'édifice occupe une des premières terrasses bordant la vallée de la Gimone; il comprend un bâtiment principal  situé dans un parc. La ferme est composée de 5 bâtiments construits en brique. La construction du château a été réalisée sur l'emplacement de l'ancienne métairie en 1837; certains murs anciens ont pu être réutilisés dans le nouvel édifice. La réalisation des divers projets datés d'août 1874 a dû intervenir peu de temps après.     \r\nCamberle, le château a été reconstruit au XIXe siècle. Le domaine est situé dans la vallée de la Gimone; il est composé d'un château et de sa ferme. Le bâtiment principal comprend cinq corps de logis disposés en U: le corps principal sert de logis; dans l'aile Est, un passage permet l'accès dans le jardin; les écuries, les remises et un logement occupent le corps de bâtiment situé dans le prolongement au sud-ouest, le logis est flanqué d'une tour-pigeonnier, que prolonge un corps de bâtiment plus bas. Bâtiment signalé à la fin du XVIIIe siècle comme un \"fief\" ou une \"maison de plaisance\". \r\nTurpin, quadrilatère à deux niveaux flanqué de tours carrées en angles.","habitants":"Noble Arnaud Duilhé \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Beaumont de Lomagne tour celui d'Argoumbat, de Camberle, de Manau, de la Ponchude, de Turpin et de Fours.","gps":"","images":["../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_1.jpg","../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_2.jpg","../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_3.jpg","../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_4.jpg","../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_5.jpg","../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_6.jpg","../../jctruffet.com/image/image_82/82_Beaumont_Lomagne_7.jpg"]},"Consult_chateau_formulaire8be7":{"id":"Consult_chateau_formulaire8be7","dept":"82","canton":"Septfonds","commune":"Varen","nom":"Belpech","type":"Château","periode":"XIV-XV","histoire":"BELPECH, le 10 Juin 1260, Bernard de Belpech déclare avoir la seigneurie du comte de Toulouse: en  1285 il reconnait qu'il tient Belpech en fief du roi qui y possédait la justice haute et moyenne.  A la fin du XIVe siècle, la seigneurie était possédée par la famille Rouergate de Belcastel :Pierre de Belpech hommage au roi le 9 juillet 1399 pour le lieu ou forteresse de Belpech avec ses appartenances dans lequel il tient la forteresse avec maisons et jardins, la seigneurie était partagée avec Jean de Bosco, doyen de Varen, hommage également pour un tiers de la seigneurie de Belpech. En 1468, la seigneurie passe à la famille de Rieu, puis aux Morlhon et aux Berail en 1502, ces derniers conservant la seigneurie jusqu'à la fin du XVIe siècle (en 1581, mariage de Jeanne de Berail et d'Antoine de Murat de Lestang de Pomayrols). Pendant les guerres de religions, les protestants occupent le château qui est évacué le 16 Avril 1586, le capitaine de Rabastens et ses soldats demandent l'entrée à Saint-Antonin. La dernière mention des Berail se situe entre 1733 et 1737, date du dénombrement au roi des biens de Mess. François de Lestang de Berail, seigneur de Paulhac, Belpech et autres places pour un château situé dans la dite paroisse de Saint Julien en un grand corps d'édifice à plusieurs étages avec basse cour écurie petite maison pigeonnier, jardin et verger, confrontant de trois parts avec l'enclos du village de Belpech et  du midi avec le rocher  Belpech ll. En 1781, Jean Baptiste Dupin de Saint André, sieur de Belpech et Pauliac, déclare un château, basse cour, écurie pigeonnier qui n'est point habité.","architecture":"Edifice bâti sur un rocher dominant la vallée de l'Aveyron ; le hameau se développe sur les côtés nord , Est et Sud.  Terrasse en terre-plein à l'est, maintenue par un mur de soutènement (H. 8,70 m env.).  Cour fermée par un mur (vestiges), portail à encadrement chanfreiné et couvrement en plein-cintre (· Gros-oeuvre : appareil assise allongé en moellons de calcaire équarris  ; appareil moyen dans la tour (hauteur des assises entre 23 et 26 cm) ; chaînes d'angle, encadrements et allèges des baies en pierre de taille (grès). Couverture : les corps de bâtiment  sont couverts de tuiles creuses, les deux tours couvertes de lauzes [restauration récente]. Le château comprend actuellement une tour  et deux corps de bâtiment disposés ; une tour circulaire demi hors-oeuvre se trouve à la jonction de ces deux corps du côté ouest.  La tour comporte quatre étages avec une pièce par niveau. Le corps  est simple en profondeur, à deux étages carrés et le dernier niveau correspondant aux mâchicoulis. Le corps  comprend trois étages avec deux pièces par niveau. Distribution intérieure. La tour, de plan circulaire, contient un escalier en vis à noyau, tournant à gauche . A l'intérieur, toutes les portes possèdent des encadrements rectangulaires à moulures en cavet.  La porte d'entrée au rez-de-chaussée est également un remploi.","habitants":"Famille de  Bernard de Belpech\r\n        \"","divers":"Château de Belpech à Varen","gps":"","images":["../../jctruffet.com/image/image_82/82_Belpech_1.jpg","../../jctruffet.com/image/image_82/82_Belpech_2.jpg","../../jctruffet.com/image/image_82/82_Belpech_3.jpg"]},"Consult_chateau_formulaire9c66":{"id":"Consult_chateau_formulaire9c66","dept":"82","canton":"Caussade","commune":"Bioule","nom":"Bioule","type":"Château","periode":"XIV-XVI","histoire":"BIOULE, fondé par la famille de Cardaillac. En 1344, le capitaine Hugues IV de Cardaillac-Bioule a rédigé un document concernant la défense de la ville. Ce document est un des premiers à mentionner l'usage des armes à feu. Quand le château a été remanié, elle a été transformée en chapelle funéraire des Cardaillac et a reçu un décor peint en 1378. Le château de Bioule à la fois tourné vers le village et  lAveyron  est un édifice prestigieux dont la qualité architecturale et létat de conservation de ses dispositions médiévales lui ont valu un classement au titre des monuments historiques, le 28 novembre 1991. Le château de Bioule est une pièce majeure de lhistoire de larchitecture castrale. À linstar de celui de Nègrepelisse voisin à deux kilomètres sur lautre rive  de lAveyron, sa construction est aussi liée au développement dune agglomération au contact dun ancien prieuré de Moissac.  Après cinquante années d'inoccupation, le château est acheté en 1889, par la municipalité de Bessey-de-Boissy pour y installer une école qui depuis occupe toujours une partie des ailes du château, aujourd'hui appartient à la commune de Bioule.","architecture":"château de Bioule  lédification de ce grand château résidentiel à la fin du XIIIe siècle a du sadapter aux constructions préexistantes qui ont également participé à son renom : quadrangulaire  flanqué de tourelles rondes au angles  du XIIIe siècle il ne reste  que les bases en pierres de tailles une église et un donjon romans dont il reste aujourdhui quelques vestiges reconstruit en brique à partir de 1329 sur des soubassements en pierre appartenant à des édifices antérieurs. Le plus fort témoignage de lhistoire de Bioule est dans son château, autrefois remarquable par sa force et sa grandeur, avec un rempart flanqué de trois grosses tours carrées. A lintérieur, un donjon de  cinq étages permettait de couvrir tout lhorizon et une fosse remplie deau courante tirée de lAveyron en défendait les approches. Le château fut en partie détruit, reconstruit en briques rouges, et subit quelques modifications au cours des XIVe et XVIe siècles. Lorsque le château est remanié au XIVe siècle,  En 1378, la chapelle funéraire reçoit un décor peint important réalisé par le peintre Raymond de la Planha. Ce décor peint est classé au titre des monuments historiques, le 26 juin 1950 et fait l'objet d'une première campagne de restauration en 1952.","habitants":"Famille de Cardaillac\r\n        \"","divers":"Château de Bioule","gps":"","images":["../../jctruffet.com/image/image_82/82_Bioule_1.jpg","../../jctruffet.com/image/image_82/82_Bioule_2.jpg","../../jctruffet.com/image/image_82/82_Bioule_3.jpg","../../jctruffet.com/image/image_82/82_Bioule_4.jpg","../../jctruffet.com/image/image_82/82_Bioule_5.jpg","../../jctruffet.com/image/image_82/82_Bioule_6.jpg","../../jctruffet.com/image/image_82/82_Bioule_7.jpg","../../jctruffet.com/image/image_82/82_Bioule_8.jpg"]},"Consult_chateau_formulaire566e":{"id":"Consult_chateau_formulaire566e","dept":"82","canton":"Lafrançaise","commune":"Vazerac","nom":"Blauzac_Vazerac","type":"Forteresse","periode":"XIV","histoire":"Deux châteaux à Vazerac celui de Blauzac et celui de la Labarthe pas d'information historique.                                                                               VAZERAC  le château de Blauzac est un château bâti à Vazerac, fortifié au Moyen-Age, cet édifice a connu diverses fortunes avec les anglais et les différents propriétaires.","architecture":"Blauzac, un important bâtiment carré de brique cuite accosté de quatre tours également carrées en avancée d'angle, découronnées irrégulièrement effet de la Révolution probablement. Corniche moulurée de brique, cordon de denticules autour de la construction.","habitants":"Famille de Modenard\r\n        \"","divers":"Château de  Blauzac et de Labarthe à  Vazerac","gps":"","images":["../../jctruffet.com/image/image_82/82_Blauzac_Vazerac_1.jpg","../../jctruffet.com/image/image_82/82_Blauzac_Vazerac_2.jpg","../../jctruffet.com/image/image_82/82_Blauzac_Vazerac_3.jpg","../../jctruffet.com/image/image_82/82_Blauzac_Vazerac_4.jpg","../../jctruffet.com/image/image_82/82_Blauzac_Vazerac_5.jpg","../../jctruffet.com/image/image_82/82_Blauzac_Vazerac_6.jpg"]},"Consult_chateau_formulaire0967":{"id":"Consult_chateau_formulaire0967","dept":"82","canton":"Montauban","commune":"Montauban","nom":"Boissonade","type":"Château","periode":"XVI-XIX","histoire":"BOISSONADE, dès 1547, année de lanoblissement par Henri II de Pierre de Pechels, en 1685, sont toujours propriétaires. Samuel de Pechels et son épouse,  marquise de Tierry. Les deux fillettes restées à Montauban,  laînée, Anne de Pechels, épousa Louis de Cahuzac, lieutenant principal au Présidial en 1697. La cadette, Suzanne de Pechels, elle fut mariée, alors qu'elle avait moins de quinze ans, le 18 janvier 1700 à André Saint-Sardos, lieutenant. Les deux fils Saint-Sardos, dune famille bourgeoise, vivant à Castelsarrasin embrassèrent la carrière des armes. il était lieutenant dans le régiment dHumières. Ils eurent un fils, Pierre. Celui-ci effectua les vingt premiers années de sa carrière militaire dans la deuxieme compagnie de mousquetaires du Roi. Ses vingt années  dancienneté ajoutées à la carrière de son père permirent  à Pierre Saint-Sardos de la Boissonnade de recevoir la croix de chevalier de Saint-Louis. En 1783 il entreprit dobtenir le titre de marquis et mourut le 30 aout 1785 ayant eu de son mariage avec Hélène dEstanchot de Treslon un fils Jean et une fille Louise, laquelle fut mariée au sieur Mieulet de Larivière. Jean de Saint-Sardos, marquis de Mondenard avait un cousin Pierre-Marie, maire de Gimat dans le Gers de 1808 à 1815. Le sieur Jean-Pierre Perrouteau céda à Joseph de Serres de Prat.  Les de Serres et leurs héritiers de Mondenard gardèrent La Boissonade pendant 90 ans environ. Joseph-Ernest de Mondenard de Monié, aîné de la branche de Bière et dAutièges. Le château de La Boissonade fut vendus en avril 1872 à un intermédiaire M. Boursiac. Puis, Marguerite Lafon, veuve Mirepoix achèta le 30 décembre 1873 à Joseph Ernest de Mondenard. Le 26 décembre 1910, M. et Mme Jean Gaillard et Jean-Marie leur fils unique achètent La Boissonade aux époux Kefler.","architecture":"La famille Lascaux acquit le château de La Boissonade avant la fin du XXe siècle et le restaura. Ce château, d'une architecture très simple et dépouillée, possédait une fabrique d'agrément avec colonnes en pierres de tailles à l'arrière côté Montauban. Sur cette vue aérienne le château se dresse à gauche et les anciens bâtiments de l'exploitation à droite. Apparaissent de part et d'autre de la façade les deux tours carrées et sur l'arrière, plus à gauche encore, la troisième tour orientée vers Montauban. La tour droite de la façade a été heureusement dégagée de constructions basses du XXe siècle sans style.","habitants":"Famille de Pechels                                                                                Pierre Saint-Sardos de la Boissonnade\r\n        \"","divers":"Château de la Boissonade_Montauban","gps":"","images":["../../jctruffet.com/image/image_82/82_Boissonade_1.jpg","../../jctruffet.com/image/image_82/82_Boissonade_2.jpg","../../jctruffet.com/image/image_82/82_Boissonade_3.jpg","../../jctruffet.com/image/image_82/82_Boissonade_4.jpg","../../jctruffet.com/image/image_82/82_Boissonade_5.jpg"]},"Consult_chateau_formulaired81d":{"id":"Consult_chateau_formulaired81d","dept":"82","canton":"Bourg de Visa","commune":"Bourg de Visa","nom":"Bourg_de_Visa","type":"Château","periode":"XV","histoire":"A Bourg de Visa; un château, dont il reste quelques vestiges, fut bâti sur le modèle de ceux de la région : Montaigu, Brassac, Moissaguel.                                                                                     Bourg de Visa  A la Révolution, une partie du château abritant les archives seigneuriales fut incendiée. Toutefois, grâce à des pièces détat civil tenues par les paroisses et aux archives du château de Malherbe, il a pu être reconstitué lessentiel du devenir de Bourg-de-Visa, commune qui suivit tant lévolution du Royaume que le destin des deux Abbayes : Marcilhac-sur-Célé et Saint Maurin.                                                                                                                          BEAUVILE, l'ancien château fort de Beauville, fut la propriété de la famille de Boville, qui le léguèrent, faute de descendants, à des familles de gendarmes  entre 1865 et 1976.  Le château a été inscrit aux monuments historiques.                                              BRASSAC, Bâti sur la limite de l'Agenais et du Quercy, appartient aux Planels, vassaux du duc d'Aquitaine mais établis sur les terres du comte de Toulouse. Peu avant 1190, il fut vendu à ce dernier qui chargea un capitaine de le renforcer et de le doter d'un puits. Livré aux anglais par le troubadour Bernat de Durfort, qui trahit ainsi son ami le comte, le château reçut des améliorations puis revint aux Planels qui le revendirent au comte de Toulouse vers 1200. Il repassa ensuite sous domination anglaise.","architecture":"Beauville, ce château fut construit puis remanié de nombreuses fois, ses soubassements datent des XIIIe et XIVe siècle, une partie de l'édifice date du XVIe, notamment les fenêtres à meneaux, alors que la porte d'entrée et les cheminées en pierre de taille sont d'architecture de style Renaissance.                                                                                                                              Bressac  était à l'origine une simple maison forte entourée de fossés et d'une modeste enceinte où se réfugiaient les habitants des alentours. Il prit son aspect actuel de forteresse au long des XIIIe et XIV siècles, mêlant les conceptions militaires anglaises et françaises. La garnison se composait à l'ordinaire d'une trentaine d'hommes. Cet ouvrage conçu pour la défense passive a malheureusement perdu ses parties hautes, à l'exception du logis seigneurial, rebâti aux XVe et XVIe siècle.\r\n  Moissaguel Peut-être construit dans la 1ère moitié XIVe siècle, le château est sans doute démoli au début du XVe siècle et la carte de Cassini le mentionne en ruines. Les deux tours qui subsistaient partiellement se sont effondrées en 1983.","habitants":"Famille des Planels                                                                                    Famille de Boville\r\n        \"","divers":"Château de Beauville, de Brassac, de Montjoi et de Lasbourdettes","gps":"","images":["../../jctruffet.com/image/image_82/82_Bourg_de_Visa_1.jpg","../../jctruffet.com/image/image_82/82_Bourg_de_Visa_2.jpg","../../jctruffet.com/image/image_82/82_Bourg_de_Visa_3.jpg","../../jctruffet.com/image/image_82/82_Bourg_de_Visa_4.jpg","../../jctruffet.com/image/image_82/82_Bourg_de_Visa_5.jpg","../../jctruffet.com/image/image_82/82_Bourg_de_Visa_6.jpg","../../jctruffet.com/image/image_82/82_Bourg_de_Visa_7.jpg"]},"Consult_chateau_formulairec527":{"id":"Consult_chateau_formulairec527","dept":"82","canton":"Beaumont de Lomagne","commune":"Escatalens","nom":"Boutary","type":"Manoir","periode":"XVIII-XIX","histoire":"BOUTARY est un manoir bâti à Escatalens,  la construction du château de Boutary date du XVIIIe au XIXe siècle. Il se situe sur les bords de la Garonne. Son propriétaire initial était Jean-Paul et Anne Delpelch. Lui-même dérivé de \"Boutaric\", du nom de la famille protestante de Montauban qui céda cette terre vers 1610. Il appartient depuis à la famille de Saint-Vincent. Le château est édifié sous le nom de Boutary par Jean Pierre Anne Delpech (1758-1823), seigneur de Boutary et de Montech, trésorier de France au bureau de Montauban, puis président au bureau des trésoriers de France de Toulouse. Il est ensuite transmis à Théodore Delpech, puis à Marie Delpech de Boutary, morte sans descendance en 1885.  Au milieu du XIXe siècle, il est transmis au baron Marie Joseph de Saint-Vincent de Brassac, de Toulouse, qui en fait sa résidence secondaire. Marie-Joseph Louis, baron de Saint Vincent et marquis de Brassac, puis son fils Félix y effectuent des travaux importants de modernisation et d'aménagement. La baronne Marie-Elizabeth Pulchérie de Saint Vincent, née Fabre de Latude s'y installera à la mort de son mari en 1888, la résidence familiale des barons de Saint Vincent.","architecture":"Le château de Boutary est un logis seigneurial construit vers 1789 sur les terres de Boutary. Château de style néoclassique Le nom vient du nom donné aux terres de la commune d'Escatalens sur lesquelles il fut construit, lui-même dérivé de \"Boutaric\". Le château remanié est un quadrilatère de brique rose, flanqué de deux tours sur la face Nord et d'un fronton en brique rose sur la face Sud. Une chapelle et une serre sont adjointes sur la face Est vers 1880. Le domaine du château comprend un parc, des terres agricoles, une ferme et une orangerie du XVIIIe siècle, un moulin du XVIIe ainsi qu'un bâtiment usine aujourd'hui désaffecté.","habitants":"Famille Delpech\r\n        \"","divers":"Château de Boutary à Escatalens","gps":"","images":["../../jctruffet.com/image/image_82/82_Boutary_1.jpg","../../jctruffet.com/image/image_82/82_Boutary_2.jpg"]},"Consult_chateau_formulaire4d6d":{"id":"Consult_chateau_formulaire4d6d","dept":"82","canton":"Castelsarrasin","commune":"Saint-Jean du Bouzet","nom":"Bouzet","type":"Château","periode":"XVII","histoire":"BOUZET,  château du XVIIe siècle, de la famille du Bouzet . Les substructions dune villa gallo-romaine furent découvertes à la fin du XIXe siècle. Les coutumes furent accordées vers 1300. La seigneurie appartient à la famille du Bouzet  jusquau XVe siècle ; en 1420, par mariage elle passa dans la famille du Gout. Au XVIIIe siècle, Jean-Baptiste dOlivier, conseiller au Parlement de Toulouse, fut qualifié de baron du Bouzet et de Puygaillard. Reconstruit partiellement au milieu du XIXe siècle, après 1842,  puissante famille de la Lomagne dont une branche se trouvait sur son territoire.\r\nLe château existe toujours et date des XVIe et XIXe siècles.","architecture":"Bouzet de plan rectangulaire à trois niveaux sur soubassement toiture en croupe presque plat.","habitants":"Famille du Bouzet\r\n        \"","divers":"Château de Bouzet à Saint-Jean du Bouzet","gps":"","images":["../../jctruffet.com/image/image_82/82_Bouzet_1.jpg","../../jctruffet.com/image/image_82/82_Bouzet_2.jpg","../../jctruffet.com/image/image_82/82_Bouzet_3.jpg"]},"Consult_chateau_formulaire0e11":{"id":"Consult_chateau_formulaire0e11","dept":"82","canton":"Valence-d","commune":"Brassac","nom":"Brassac","type":"Château","periode":"XV-XVI","histoire":"BRASSAC, terres du comte de Toulouse, qui en deviendra propriétaire, avant 1190. Puis il deviendra la propriété des anglais, avant de revenir à nouveau au comte de Toulouse en 1200, puis, à nouveau aux anglais. cétait une baronnie. Autrefois, les seigneurs de Brassac jouissaient d'une forte autorité dans la région. Dès le XIIe siècle, les comtes de Toulouse, leurs suzerains, s'attachent à y installer une solide garnison.  Bertrand de Galard, fils dEléonore dArmagnac, rendit hommage, au roi Henri II dAngleterre, en 1266 et 1291, pour le château de Bressac. C'est à cette période que la famille de Galard de Brassac sallia avec les principales familles des environs. En 1508, François de Galard de Brassac épousa Jeanne de Béarn. Leur descendance prit le nom de Galard de Béarn de Brassac, le château de Brassac nétant quune des multiples possessions de cette famille.  Michel et Maryse Massio, le couple chargé d'entretenir et d'animer le château, ont mis sur pied de nombreuses manifestations.","architecture":"Son importance du château de Brassac était  attestée au XIIe siècle, enceinte quadrangulaire dont  la partie basse remonte au XIIIe siècle est faite de quatre grosses tours rondes  reliées par des courtines qui fut remanié jusqu'au XVIe siècle. Grace a sa position défensive,  entouré de douves installé sur des pentes raides,  est lun des plus importants châteaux de la région , massacre des Albigeois, guerre de Cent Ans, guerres de Religion, sans oublier l'épisode fatidique de la Révolution Française qui verra le château en proie aux flammes pendant plusieurs jours.  Que les médiévistes soient prévenus: seule une note féodale et des restes d'enceinte, ainsi que des fondations, témoignent de l'existence matérielle du château au Moyen-Age. Tout le reste date du XVIe siècle. La partie haute est un corps de logis du XVe siècle avec tourelles d'escalier polygonale. Au Moyen-Age ou Renaissance, on perçoit rapidement que le monument a obéi à des principes de fonctionnalité, de défense militaire. Ici, peu de place à la délectation et au loisir: canonnières, meurtrières, latrines, salles de garde, tours épaisses, autant de témoins d'une vie dédiée à la discipline militaire.","habitants":"Famille de Galard de Brassac \r\n        \"","divers":"Château de Brassac","gps":"","images":["../../jctruffet.com/image/image_82/82_Brassac_1.jpg","../../jctruffet.com/image/image_82/82_Brassac_2.jpg","../../jctruffet.com/image/image_82/82_Brassac_3.jpg","../../jctruffet.com/image/image_82/82_Brassac_4.jpg","../../jctruffet.com/image/image_82/82_Brassac_5.jpg","../../jctruffet.com/image/image_82/82_Brassac_6.jpg","../../jctruffet.com/image/image_82/82_Brassac_7.jpg","../../jctruffet.com/image/image_82/82_Brassac_8.jpg"]},"Consult_chateau_formulaireafe9":{"id":"Consult_chateau_formulaireafe9","dept":"82","canton":"Labaste St-Pierre","commune":"Bruniquel","nom":"Bruniquel","type":"Forteresse","periode":"XIII_XIV","histoire":"BRUNIQUEL,  Le castrum construit en 1176, par les comtes de Toulouse sur les Trencavel. Il est habité par les vicomtes de Bruniquel.  Un deuxième fut élevé, par Maffre de Comminges-Cousserans, en effet, au milieu du XVe siècle, le vicomte Antoine de Comminges, en querelle avec son fils Léonard, vend une partie du domaine à un cousin Maffre De Comminges-Cousserans qui fera construire son propre château de 1485 à 1510,  le château jeune. Pendant trois siècles, les deux branches ne vont cesser de se quereller. Les propriétaires du château vieux étant catholiques et ceux du château « jeune » protestants. Le « château vieux » porte encore les stigmates des attaques, notamment dans la salle des chevaliers. Ce n'est qu'à la fin du XVIIIe siècle que le vicomte du «château vieux », Louis Rigal d'Ouvrier rachète le « château jeune ». Les châteaux de Bruniquel font lobjet dun classement au titre des monuments historiques par la liste de 1840. À cette même époque, un impôt prélevé sur les ouvertures, incitera le vicomte à murer fenêtres et portes de sa nouvelle acquisition. Seul le château vieux continuera à être habité en permanence jusqu'en 1950, puis comme résidence secondaire jusqu'en 1980 année de la mort de la dernière vicomtesse de Bruniquel, madame de Bellefont. Durant deux siècles, le château jeune sera laissé à l'abandon et sera paradoxalement la partie du château la plus abîmée lorsque la municipalité s'en portera acquéreur aux enchères  en 1987. Depuis la municipalité ne cesse de le restaurer.                                                                                                                                  PAYROL, la maison est implantée à l'intérieur de la première enceinte de la ville. D'après l'étude archéologique réalisée en 1997 par Valérie Rousset. Réhabilitée au cours de la seconde moitié du XXe siècle, la maison Payrol abrite aujourd'hui un musée consacré à l'histoire locale. Il abrite une collection lapidaire médiévale d'une grande richesse.","architecture":"Bruniquel, Le site archéologique des quatre abris sous roche du château de Bruniquel,  sur les ruines de ce premier fut construit l'actuel « château vieux » au XIIIe siècle. Après la construction de ce château, un deuxième fut élevé sur la falaise, l'abri Montastruc, l'abri Gandil, Lafa et Plantade, ils offrent quelques raretés telles que le donjon du XIIe siècle, des éléments  allant du XIIIe siècle au XVIe siècle dans ce qui forme le châteaux vieux et le château jeune construit en 1500 est remanié au XVIIe siècle. une cuisine du XVIIe siècle équipé d'un rare potager (ancêtre du fourneau) à neuf trous, la salle d'apparat réaménagé au XVIIIe siècle, une chapelle transformée en cuisine, une galerie surplombant la rivière Aveyron à 90 mètres de hauteur. Une cheminée de ce château a été transférée au XIXe siècle dans la salle à manger du château de Lastour.                                                                                                             la maison Payrol a été édifiée sur un soubassement primitif, à l'extrême fin du XIIIe siècle et au cours de la première moitié du XIVe siècle. Une tour occupait initialement l'angle nord-ouest de l'édifice : elle a été rabaissée. La maison a fait l'objet d'importants remaniements à la fin du XVe siècle. Elle a abrité une famille noble, les Payrol, du XIVe siècle au XVIe siècle. Elle occupe un îlot composé de quatre parcelles en partie identiques à celles du plan cadastral de 1835. Quelques ouvertures ont été percées au XXe siècle. Réhabilitée au cours de la seconde moitié du XXe siècle,","habitants":"seigneur de la  Maffre de Comminges- cousserans\r\n        \"","divers":"Les châteaux de Bruniquel et la maison de Payrol à Bruniquel","gps":"","images":["../../jctruffet.com/image/image_82/82_Bruniquel_1.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_2.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_3.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_4.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_5.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_6.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_7.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_8.jpg","../../jctruffet.com/image/image_82/82_Bruniquel_9.jpg"]},"Consult_chateau_formulairef731":{"id":"Consult_chateau_formulairef731","dept":"82","canton":"Beaumont de Lomagne","commune":"Fajolles","nom":"Cadeilhan","type":"Château","periode":"XIII","histoire":"CADEILHAN,   fief de la baronnie de Terride au XIIIe siècle vendu en 1281 par Odon de Terride.","architecture":"La demeure actuelle, qualifiée de château dans tous les documents \r\ncadastres anciens et récents, pourrait être plus justement assimilée\r\nà une \"maison de maître\" dont la ferme se trouve à proximité ou à une chartreuse dont elle présente bien des caractères, construction isolée, de plan en U, corps de logis en rez-de-chaussée  toit en croupe.","habitants":"Famille d'Odon de terride \r\n        \"","divers":"château de Cadeilhan à Fajolles","gps":"","images":["../../jctruffet.com/image/image_82/82_Cadeilhan_1.jpg","../../jctruffet.com/image/image_82/82_Cadeilhan_2.jpg"]},"Consult_chateau_formulaireb3b4":{"id":"Consult_chateau_formulaireb3b4","dept":"82","canton":"Septfonds","commune":"Castanet","nom":"Cambeyrac_Castanet","type":"Château","periode":"XII-XV","histoire":"Deux châteaux à Castanet celui de Cambeyrac et celui de Cuzoul.         CAMBEYRAC, le domaine dépendait de la seigneurie de Castanet depuis le XIIIe siècle, le château appartient à la famille d'Armagnac de Castanet, en 1467, Jean de Castanet, seigneur de Cambayrac,  En 1585, Cambayrac passe à Georges de Castanet, fils cadet de Pierre. Au siècle suivant,  après le mariage de François de Castanet avec Catherine de Bérail de Mazerolles qui lui apporte en dot. François de Castanet, en 1787, donne le  fermage, à l'exclusion du château. Lors de la Révolution, ses fils émigrent, alors que lui-même décède dans son château en 1792. Cambayrac, vendu comme bien national mais la veuve de François de Castanet arrive à le racheter.   Appartenant, au début du XVIIIe siècle, au marquis de Timbrune-Valence qui, par testament en 1732, l'a donnée à l'hôpital de Moissac.                                                                                     CUZOUL,  château cité en 1570 dans une reconnaissance pour le lieu du Cuzoul appartient au marquis de Cadrieu, seigneur du lieu  Le 2 février 1618, Balthasar de Cadrieu vend à noble Hector de La Capelle seigneur de Cas et de Mordagne \"la place et seigneurie  du Cuzoul, un bail à ferme de la seigneurie du Cuzoul établi le 3 juillet 1642 pour Marianne de La Valette Cornusson, veuve de noble Hector de La Capelle, est accompagnée d'un inventaire du château. Par le mariage de Henriette de La Capelle Cas avec Claude Marie de Lastic le château passe dans cette famille,   en 1771, un bail est passé entre Claude Marie de Lastic et Jean Faure père et fils, maçons de Parisot, Pierre Pechberty charpentier de Parisot et Pierre Barroul charpentier du Cuzoul pour construire et édifier  un bâtiment sur les ruines de l'ancien château.  Le domaine du Cuzoul est vendu le 29 avril 1816 à Jean-Pierre Lacam d'Espinas.","architecture":"Cambeyrac,  se trouve un château entouré dun ensemble de bâtiments remarquables : pigeonnier, ferme de caractère, bâtiment de plan rectangulaire, simple en profondeur à deux étages carrés. Cambeyrac  en 1762, le portail d'entrée des communs est édifié.  Cette demeure avec tour polygonale abritant un escalier à vis est une des plus anciennes de la commune de Moissac. Les formes des ouvertures incitent  à la dater de la fin du XVe siècle ou début du XVIe siècle. La ferme sur cour carrée est également complétée par de nouveaux bâtiments, une date est portée commençant par le millésime  comble. L'élévation antérieure est flanquée d'une tour circulaire hors-oeuvre contenant un escalier à  vis. L'élévation latérale gauche est aveugle, une latrines est supportée par deux corbeaux de  pierre au niveau du deuxième étage.                                                                                        Cuzoul  En 1671, dans un état des biens de M. de La Capelle, l'édifice est décrit comme \"un château fermé avec un grand portail composé d'une grande tour  haute et ayant cinq étages, sans comprendre la plateforme qui est à la cime de ladite  tour, ayant deux salles, l'une basse, et l'autre haute et diverses chambres et prisons, écuries et granges, et une basse cour fermée d'une grande muraille, confrontant le tout avec les  rues du lieu du Cuzoul. Du château, il ne subsiste que les vestiges d'une tour et quelques bâtiments ruinés.","habitants":"Famille de Noble Antoine de Castanet                                                  Famille de Balthasar de Cadrieu \r\n        \"","divers":"Château de Cambeyrac et de Cuzoul à Castenet","gps":"","images":["../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_1.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_2.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_3.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_4.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_5.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_6.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_7.jpg","../../jctruffet.com/image/image_82/82_Cambeyrac_Castanet_8.jpg"]},"Consult_chateau_formulaire1026":{"id":"Consult_chateau_formulaire1026","dept":"82","canton":"Septfonds","commune":"Espinas","nom":"Cas_Espinas","type":"Forteresse","periode":"XII-XX","histoire":"CAS,  est un château bâti à Espinas, du XIIe siècle. Il fut remanié aux XIVe et XVIe siècles. Il sera reconstruit au XXe siècle. Le château de Cas fut apporté en 1767 par Henriette de La Capelle de Cas, lors de son mariage avec Claude-Marie, comte de Lastic Saint-Jal, brigadier des armées du roi, gouverneur de Carcassonne, chevalier de Saint Louis et seigneur de Saint-Antonin. Durant la Révolution, celui-ci fit enlever la totalité de l'argenterie, des objets précieux ainsi que les archives et droits féodaux et fit transporter le tout, à l'hôtel de Lastic à Saint-Antonin. En 1741, durant un hiver très rude, il donna l'ensemble de sa réserve de grain au lieu de le vendre. Pour plaire à son épouse, il détruisit une partie du château de Cas afin, d'édifier une autre demeure (le château de Saleth), pour son épouse qui ne se plaisait pas à Cas. Claude-Marie, comte de Lastic Saint-Jal, aide de camp du duc d'Aiguillon, brigadier de cavalerie et gouverneur de Carcassonne, s'y fixe au cours du XVIIIe siècle. Le château de Cas fut ensuite abandonné jusqu'en 1882, date ou la comtesse de Lastic Saint-Jal, seule survivante, fit remettre le château en état. Ses fils se partageront les biens et, de nouveau, abandonneront Cas. En 1905, Henri-Albert-Joseph Lastic déménage ses biens. Durant la guerre de 1939 à 1945, le château de Cas est utilisé comme dépôt de munitions. Il fut saccagé, la toiture détruite, les étages effondrés et les fenêtres disparurent. Le château de Cas vient d'être restauré. aujourd'hui à  Guy et Patrice Ducreux.","architecture":"Cas Le château, place défensive, a été construit au IXe siècle sur un site occupé par les Gallo-Romains. Devenu le site dune commanderie templier au XIIIe siècle, il faisait partie des possessions de la commanderie de La Capelle-Livron pendant la période hospitalière. Remanié au XIVe siècle puis au XVIIe siècle,  puis de nouveau endommagé durant la seconde guerre mondiale, il est remis en état dans les années 1980. Le château fait lobjet dune inscription au titre des monuments historiques depuis le 11 octobre 1984,  cette magnifique demeure garde le souvenir des siècles passés et de personnages ayant participé à l'histoire de France. Corps de logis en équerre à différents  niveaux avec toit à deux pans  flanqué d'une tour ronde sur l'angle sud  toits presque plats et un donjon sur angle à quatre niveaux toit à quatre pans.","habitants":"Comte de Lastic Saint-Jal\r\n        \r\n        \"","divers":"Château de Cas à Espinas et L'Abbaye","gps":"","images":["../../jctruffet.com/image/image_82/82_Cas_Espinas_1.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_2.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_3.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_4.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_5.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_6.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_7.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_8.jpg","../../jctruffet.com/image/image_82/82_Cas_Espinas_9.jpg"]},"Consult_chateau_formulairee3cd":{"id":"Consult_chateau_formulairee3cd","dept":"82","canton":"Beaumont de Lomagne","commune":"Castelferrus","nom":"Castelferrus","type":"Château","periode":"XVII-XVIII","histoire":"Castelferrus garde les traces d'une occupation très ancienne dès la préhistoire. À Saint-Genès, une station du néolithique moyen , bien que connue depuis près d'un siècle, a fait l'objet de fouilles sérieuses en 1977 et 1978. On y a également découvert une nécropole historique datant du 1er âge du fer, des vestiges de l'époque gallo-romaine dont un four de potier, et des objets de l'époque mérovingienne (boucles de ceinturon, épées, dague, etc.). Sous l'Ancien Régime, Castelferrus dépendait de l'élection de Rivière-Verdun, de l'évêché de Montauban et de la sénéchaussée de Toulouse. À la Révolution, la commune fut un temps rattachée au canton de Castelsarrasin, puis en l'an X, elle a rejoint le canton de Saint-Nicolas-de-la-Grave, dont elle dépend à ce jour.","architecture":"Le château de Castelferrus, château, qui date du XVIIe  siècle ;    Le château était à l'origine une maison-forte édifiée au XIVe siècle, remaniée au XVIIe siècle. Edifice situé au Nord-Ouest du village sur une des premières terrasses bordant la vallée de la Garonne. Il comprend: le logis composé de plusieurs corps de bâtiments; les anciennes écuries surmontées d'un fenil; un bâtiment en bordure de rue, ce dernier a servi de logement. La propriété est fermée au Nord et à l'Est par un mur de brique, au Sud par les vestiges d'un fossé qui la borde encore. L'alimentation en eau a pu s'effectuer par deux puits dans le parc et deux sources situées dans les champs. A l'intérieur des pièces munies de plafonds à la française du XVIIe siècle. Quelques belles cheminées en stuc à décor du XVIIIe siècle. Peintures à thèmes : scènes de batailles, inscription évoquant la mort, instruments de musique, etc. Dans le parc du château, un arbre rare originaire du Japon, le saphora, caractérisé par son feuillage sombre, dense, et des feuilles pennées. Il fait partie de l'ordre des légumineuses, à l'image de la glycine, mais aussi de la lentille.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Castelferrus","gps":"","images":["../../jctruffet.com/image/image_82/82_Castelferrus_1.jpg","../../jctruffet.com/image/image_82/82_Castelferrus_2.jpg","../../jctruffet.com/image/image_82/82_Castelferrus_3.jpg","../../jctruffet.com/image/image_82/82_Castelferrus_4.jpg","../../jctruffet.com/image/image_82/82_Castelferrus_5.jpg","../../jctruffet.com/image/image_82/82_Castelferrus_6.jpg"]},"Consult_chateau_formulaire8251":{"id":"Consult_chateau_formulaire8251","dept":"82","canton":"Valence d","commune":"Castelsagrat","nom":"Castelsagrat","type":"Château","periode":"XIII_XIX","histoire":"Quatre châteaux à Castelsagrat celui de Plombis, de Lamotte et du Sap tout trois chambres d'hôtes.                                                                                                                                                                                                               PLOMBIS , pas d'informatin historique                                                                                     SAP  au début du XVe siècle la seigneurie du Sap dépendait de la seigneurie de Salledebru, commune de Perville, mais la première fois où l'on trouve mention du seigneur, c'est en 1556, au bénéfice de Levis de Lézir, fils d'Antoine et de Jeanne Defeu, dame de Salledebru. Son arrière-petite-fille , Françoise de Lézir, par son mariage en 1646, apporta la seigneurie à Antoine de Giniès, seigneur de Lapujade de Langle. Jean de Giniès, leur descendant, était seigneur du Sap en 1789.","architecture":"le château de Lamotte est construit au XIIIe ou XIVe siècle la porte édifiée dans la première moitié du XVIe siècle a remplacé une structure antérieure dont subsistent des arcs brisés, adjonction d'une tour d'escalier et remaniement du logis à cette même époque. Remaniements ultérieurs ; logement construit au XIXe siècle, après 1818.  Le château est un grand bâtiment massif composé de deux étages en pierres à patine sombre vers le côté droit et claire vers la base du côté gauche et appareil plus réduit surmonté d'une zone de briques. Ouverture haute, étroite encadrée de pierre de taille et fenêtres simples. Haut contre fort séparant la reprise de construction, avec quelques fenêtres à cadre de pierre moulurée dont l'un formant un arc en flamme.                                                                                                                                    PLOMBIS,   du XIXe siècle en pierres à deux niveaux et attiques entouré de mâchicoulis au niveau  du deuxieme étage, toitures en croupes à long fans. Flanqué de trois tours dont une ronde hors oeuvres en façade toit en poivrières.                                                                                                                                                Du SAP,  importante construction massive en pierres appareil moyen soigné tendant vers le grand appareil à partir d'un renforcement occidental donnant deux fortes tours carrées un étage sur galerie face nord. Ouvertures simples de forme rectangulaire hautes, tantôt étroites, tantôt larges face sud  grand oeil de boeuf formant une lucarne. Au nord, façade d'accès sur galerie d'étage accessible par escalier droit, hauts piliers de pierre, porte de rez-de-chaussée à pilastres et entablement mouluré. Face ouest formée par la double avancée des tours encadrant le corps de logis en recul. Toit à quatre pentes de tuiles canal sur double génoise.","habitants":"Famille de Giniès\r\n        \"","divers":"Châteaux de Plombis et du Sap à Castelsagrat","gps":"","images":["../../jctruffet.com/image/image_82/82_Castelsagrat_1.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_2.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_3.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_4.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_5.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_6.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_7.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_8.jpg","../../jctruffet.com/image/image_82/82_Castelsagrat_9.jpg"]},"Consult_chateau_formulaire53c6":{"id":"Consult_chateau_formulaire53c6","dept":"82","canton":"Castelsarrasin","commune":"Castelsarrasin","nom":"Castelsarrasin","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux à Castelsarrasin, celui de Lavalade,  de st-Martin, de Pordegui et de  château-Rouge pas d'information sur ces deux derniers .                                                                                                                         LAVALADE, il appartenait au XVIe siècle à la famille de Vigier, de Moissac. Catherine de Vigier, fille et héritière de Jean-Jacques, seigneur de Ricart, était dame de la Valade lorsquelle épousa en 1629 François de Pechpeyrou, baron de Beaucaire.  Après avoir légué toutes ses terres à son mari par son testament de 1640. Les descendants de François de Pechpeyrou de Beaucaire héritèrent. Le château de Lavalade a sans doute été construit sous la direction de Jean-Antoine de Pechpeyrou, marquis de Beaucaire et de son fils Gilles-Gervais de Pechpeyrou, marquis de Beaucaire céda par testament en 1775 à son cousin-germain Jean-François de Cours, le château et les terres de Lavalade passa donc à la famille de Cours, une très ancienne famille dont le premier représentant cité est Pierre de Cours, en lan 1020. Cette famille allait conserver le domaine de Lavalade pendant 170 ans.  Charles, vicomte de Cours, né le 31 mai 1794 sous le nom de « Boulou Fraternité». Son fils Alfred, baron puis vicomte de Cours (1826-1867). Raymond de Cours (1894-1953) posséda Lavalade en commun avec ses surs Madeleine et Christine : ils étaient les derniers propriétaires de la famille ; en 1946, elle est acquise par Robert Germain, propriétaire et exploitant agricole. En janvier 2015, le domaine est acheté par Bruno, baron de Larminat et son épouse Laurence Préveraud de Laubépierre de Vaumas.                                                                                          ST-MARTIN Installé depuis janvier au château de Saint-Martin-Belcassé, l'éminent professeur Arkadiusz Jadczyk de l'université de Wroclaw en Pologne, physicien, théoricien, mathématicien. Il rejoint ainsi les hypothèses de travail mises en avant par Igor et Grichka Bogdanov  même si elles sont loin d'être partagées par l'ensemble de la communauté scientifique.","architecture":"Lavalade, a été construit dans le quatrième quart du XVIIIe siècle, entre 1806, date d'un plan ancien, et 1836, date du cadastre, sont tracées les trois allées rayonnantes qui mènent au logis ; la chapelle est aménagée dans le troisième quart du XIXe siècle (les deux vitraux de la chapelle, datés 1861 et 1867 sont identiques) c'est sans doute à la même époque que sont construits les portails de la cour. L'édifice, de plan symétrique, se compose d'un sous-sol et d'un étage carré, le gros-oeuvre, brique, élévation à travées surmontée d'une croupe couvert de tuiles creuses et tuiles mécaniques.                                                                                                                 Château-Rouge,    château  édifice du XVIe siècle ; remaniements importants au XVIIIe siècle, le logement et les parties agricoles antérieurs à 1806, date d'un plan ancien, ont été remaniés par la suite.                                                                                                                                           Château St-Martin, situé à Castelsarrasin, sur le lieu-dit Saint Martin Belcassé et jadis dépendance de lAbbaye cistercienne de Belleperche qui a accueilli un monastère dont les moines sont arrivés de lAbbaye-mère de Clairvaux au XIIe siècle, lespace historique communautaire du château Saint-Martin fût une dépendance rurale et agricole,   corps de logis rectangulaire à deux niveaux  avec fronton triangulaire plein cintre en façade.                                                                                                                        Château Pordegui de plan rectangulaire à deux niveaux.                                    Château de Lériet de plan rectangulaire à trois niveaux  ruinés.","habitants":"Famille de Vigier                                                                                  Famille de Cours\r\n        \"","divers":"Château de Lavalade, Château-Rouge, de St-Martin de Pordegui et de Lériet à Castelsarrasin.","gps":"","images":["../../jctruffet.com/image/image_82/82_Castelsarrasin_1.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_2.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_3.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_4.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_5.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_6.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_7.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_8.jpg","../../jctruffet.com/image/image_82/82_Castelsarrasin_9.jpg"]},"Consult_chateau_formulaire70ef":{"id":"Consult_chateau_formulaire70ef","dept":"82","canton":"Beaumont de Lomagne","commune":"Casterat-Bouzet","nom":"Castérat_Bouzet","type":"Château","periode":"XIII-XIX","histoire":"CASTERAT-BOUZET, les territoires de la maison du Bouzet devaient comprendre les communes du Castérat-Bouzet et de Saint Jean du Bouzet. Leurs coutumes furent accordées le 2 août 1300 par Barrau et Gauthier du Bouzet, à la tête de la famille en 1294. Cette famille est connue dans la contrée dès le XIIe siècle et ses coutumes constituent l'un des rares documents que nous possédions sur l'histoire du Castérat et sur les terres du Bouzet.  L'ancien château des vicomtes de Lomagne cité en 1306 ; reconstruit vers 1870. Cette famille du Bouzet est connue dans la contrée au XIIe siècle. Au partage des terres en 1303, Barrau conserve le Castérat et Gauthier les autres communautés. Ce castelnau fut créé avant 1300; à cette époque fut construit le 1er sanctuaire ainsi qu'une tour féodale isolée, surveillant ce coin de Lomagne. Raymond du Bouzet, seigneur du Castérat, meurt en 1477. C'est de lui que descendent les barons du Castérat. Le dernier est le comte du Bouzet qui, au début du XIXe siècle, épouse une cousine de l'impératrice Joséphine. La maison du Bouzet possède la seigneurie jusqu'au XVIIIe siècle.","architecture":"Castérat-Bouzet dont l'édifice se compose d'un sous-sol et de deux  étages carrés avec attique, gros-oeuvre ; calcaire, moellon,  pierre de taille,  bois,  pan de bois, élévation à travées surmontée d'un toit en pavillon et toit à longs pans couverts de tuiles creuses.","habitants":"Famille du Bouzet \r\n        \r\n        \"","divers":"Château de Castérat à Bouzet","gps":"","images":["../../jctruffet.com/image/image_82/82_Casterat_Bouzet_1.jpg","../../jctruffet.com/image/image_82/82_Casterat_Bouzet_2.jpg"]},"Consult_chateau_formulaire7e05":{"id":"Consult_chateau_formulaire7e05","dept":"82","canton":"Septfonds","commune":"Caylus","nom":"Caylus_Mondésir","type":"Château","periode":"XII-XVII","histoire":"Quatre châteaux à Caylus dont celui de Caylus, de Mondésir, de Monplaisir et les vestiges de la vieille tour.                                                                                                  CAYLUS, un castrum existait déjà avant 1176 et appartenait à Armand et Bertrand de Montpesat. Il fut échangé cette année là contre les seigneuries et châteaux de Montpezat-de-Quercy et de Monclar-de-Quercy et devint possession du comte Raymond V de Toulouse,  en 1562, les troupes calvinistes de Symphorien de Durfort, sire de Duras, s'emparent de la ville et massacrent 250 habitants. Caylus prendra le parti catholique, adhère à la parti de la Ligue et accueille en 1622, Louis XIII y établit son quartier général durant le siège de Saint-Antonin.                                                                                                                                   MONDESIR, le château de Mondésir a été construit au XVIIe siècle à l'emplacement d'un château fort médiéval dont subsistent quatre tours et qui constituait un avant poste de vigie pour la bastide anglaise de Villefranche de Lonchat, fondée par Edouard 1er d'Angleterre vers 1285. Ancienne demeure des familles Saint-Jean, Villars et Duvigneau.","architecture":"Caylus,  au XVIIIe siècle, les fortifications furent en grande partie démolies.  Caylus est progressivement devenue un bourg rural. Village médiéval : maisons anciennes (maison des Loups.), halle, place du marché. Porte de ville inscrite aux monuments historiques. Donjon du XIIIe siècle remanié.\r\nManoir de Gauléjac du XVe siècle.\r\nChâteau Mondésir, édifice de la fin du XVe siècle ou du début du XVIe siècle ; en février 1574, les consuls de Caylus firent abattre les dépenses du château menacé par les protestants; toutes les fenêtres furent refaites au XVIIIe siècle; le comble à surcroît fut transformé en étage après 1909. L'édifice se compose d'un sous-sol, un étage carré et un comble à surcroît, le gros-oeuvre : calcaire ; moellon et enduit partiel, élévation à travées.                                                                                                              Château de Monplaisir quadrangulaire avec corps de logis rectangulaire à deux niveaux toit en croupes deux pavillons carrés relié entre eux par un chemin de ronde sur galerie   de la cour en façade, toits à quatre pans.  Vestiges de la tour de Caylus.","habitants":"Famille de Montpezat                                                                           Famille Saint-Jean\r\n        \r\n        \"","divers":"Château à Caylus dont celui de Caylus, de Mondésir, de Monplaisir et les vestiges de la vieille tour.","gps":"","images":["../../jctruffet.com/image/image_82/82_Caylus_Mondesir_1.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_2.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_3.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_4.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_5.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_6.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_7.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_8.jpg","../../jctruffet.com/image/image_82/82_Caylus_Mondesir_9.jpg"]},"Consult_chateau_formulaire79e6":{"id":"Consult_chateau_formulaire79e6","dept":"82","canton":"Septfonds","commune":"Cayriech","nom":"Cayriech","type":"Château","periode":"XIX","histoire":"CAYRIECH, en 1401, Jean d'Escayrac de Lauture est co-seigneur de Cayriech. Il se marie le 16 mai 1401 avec Sobirane Deslacs, dame Barave de Dejean. Il mourut le 2 mars 1408, son fils Thomas qui s'éteignit le 25 juin 1444. Jean-Barthélémy alors co-seigneur avec Astorg Scafredi (vers 1446-1450) trépassa le 29 janvier 1484,  vers 1503, Raymond-Barthélémy co-seigneur avec Gaihard du Lac jusqu'aux environs de 1512-1539. Il mourut avant le 28 décembre 1515. Hugues d'Escayrac fut co-seigneur de Cayriech jusqu'à sa mort le 18 août 1573. En 1554, il servait dans la compagnie d'ordonnance du comte de Villars. Il fut remplacé par son fils Charles jusqu'au 26 juillet 1592. Il fit son testament en 1587, avant de partir à la guerre avec Henri III. Par contrat du 25 mars 1615, Gabriel Descairac traita avec Jean du Lac seigneur de Boisse et co-seigneur de Cayriech et lui céda sa portion à  le sieur de Boisse étant devenu seul maître et propriétaire de l'entière place de Cayriech, il en fit vente à Jean Descairac par contrat du 17 aoust 1617 . Toujours en 1633, nous trouvons mentionné un meunier nommé Gaillard Raynal. Claude d'Escayrac, fille de Jean et de Marguerite de Vignes, fit entrer la seigneurie entre les mains de Louis de Marsa qu'elle épousa le 25 février 1675. Leur fils vendit en 1710 la terre de Cayriech à Pierre de Lacombe, seigneur de Monteils et de Saint-Georges. Pierre de Lacombe mourut à Strasbourg le 23 septembre 1737 laissant ses domaines à son fils Jean-Baptiste qui les transmit à son tour à Jean-pierre-Paul, attesté en 1758 et mort en 1768. En 1775-1776, Charles François de Lacombe de Montcla était le seigneur de Cayriech. En 1780, c'était Charles-Louis de Lacombe.","architecture":"Cayriech château fort,  depuis l'époque carolingienne et jusque vers 1620, Cayriech était une agglomération entourée de fortifications de terre et d'un fossé qui délimitaient un secteur ovale d'un hectare. Ce genre de fortifications était considéré comme des places fortes au Moyen-Âge. Il semblerait même qu'une motte et un donjon furent édifiés dans l'enclos au XIIe siècle. La mention la plus ancienne de Cayriech date de 1262 (Cairegio) dans les enquêtes administratives d'Alphonse de Poitiers, comte de Toulouse (1220-1271). Les charmilles aujourd'hui gîtes de Farnce, de plan rectangulaire à deux niveaux avec tours carrée toit à quatre pans.","habitants":"Famille de Jean d'Escayrac de Lauture\r\n        \"","divers":"Château de Cayriech","gps":"","images":["../../jctruffet.com/image/image_82/82_Cayriech_1.jpg","../../jctruffet.com/image/image_82/82_Cayriech_2.jpg","../../jctruffet.com/image/image_82/82_Cayriech_3.jpg","../../jctruffet.com/image/image_82/82_Cayriech_4.jpg","../../jctruffet.com/image/image_82/82_Cayriech_5.jpg"]},"Consult_chateau_formulaire07b1":{"id":"Consult_chateau_formulaire07b1","dept":"82","canton":"Septfonds","commune":"Cazals","nom":"Cazals","type":"Château","periode":"XIII-XIX","histoire":"CAZALS du château, « La seigneurie de Cazals  appartenait au XIIIe siècle à la\r\nmaison de Penne. Cela résulte   dun acte passé à Montauban, le 13 juin 1251, par Bernard Aimeric, notaire à Toulouse, entre Olivier et  Bernard de Penne, frères, dune part, et Alphonse, comte de Poitiers et de Toulouse, dautre part, par lequel Olivier de Penne céda en échange au comte des terres situées sur le bord de lAveyron, vers Bruniquel, confrontant à un sentier allant vers Montricoux et de là à Saint-Cirq, et de ce point à un chemin tendant de Caussade à Saint-Antonin, mais sous la réserve de la ville de Cazals et de ses dépendances au-dessus de Broas jusquà lAveyron. Cazals devient ensuite\r\naux vicomtes de Bruniquel, de la maison de Comminges, et  appartient à Jean Roger, vicomte de Bruniquel, seigneur de Cazals, de Puygaillard,  du 5 octobre 1858, « M. de Bellerive offre de céder à la commune son château avec le jardin contigu.","architecture":"Du château de Cazals , il ne subsiste qu'un logis dénaturé et une tour d'escalier percées de deux baies, du XVIe siècle,  logis à deux corps disposés en équerre, à deux étages et une tour contenant un escalier à vis sur l'élévation ouest. Il contenait deux pièces à l'est et une pièce en retour à l'ouest. La  petite pièce est une adjonction: le linteau de la fenêtre porte la date  de  1877, il ne subsiste qu'un logis dénaturé. Les quelques baies (croisée et demi-croisées) conservées ainsi que la tour d'escalier témoigne d'une construction de la fin du XVe siècle ou du début du XVIe siècle. Le château est acquis vers 1873 par la commune pour y installer la mairie et l'école. Des travaux pour réaménager l'école ont eu lieu au début du XXe siècle. L'édifice abrite la mairie, un logement et la poste construite en 1993.","habitants":"Famille de Penne\r\n        \"","divers":"Château de Cazals","gps":"","images":["../../jctruffet.com/image/image_82/82_Cazals_1.jpg","../../jctruffet.com/image/image_82/82_Cazals_2.jpg"]},"Consult_chateau_formulaire6a4a":{"id":"Consult_chateau_formulaire6a4a","dept":"82","canton":"Lafrançaise","commune":"Cazes_Mondenard","nom":"Cazes_Mondenard","type":"Château","periode":"XIV-XV-XIX","histoire":"Trois châteaux  à Cazes -Mondenard, celui de Cazes ou Calez du XVIIIe siècle, celui de Mondenard du XVIIIe siècle et de Lauture du XIXe siècle.                                                                                         MONDENARD, la seigneurie de Mondenard du XIIIe siècle. Elle était partagée entre les Durfort, les Gourdon, les Montaigut, les Luzech et les Mondenard. En 1205, Arnaud de Durfort donna à Raymond VI, comte de Toulouse,  Guiraud de Gourdon fit de même en 1230  ainsi que Hugues Arnaud de Creyssac, baron de Luzech. La famille seigneuriale de Montagut et de Mondenard l'abandonnèrent au comte de Toulouse, la tutelle du château et de la seigneurie de Mondenard par un acte établi le 20 avril 1246.  Ces donations  à lexception de celle de la famille de Gourdon nont conféré au comte que des droits de suzeraineté sur les terres de ces seigneurs. Au XIVe siècle, tous les seigneurs précédemment cités ont disparu pour laisser la place aux descendants de Vital de Montaigut e
