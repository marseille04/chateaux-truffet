om":"Labessière","type":"Château","periode":"XVIII","histoire":"LABESSIERE,  construit vers le début du XVIIIe siècle par le baron Louis de Perin de Labessière, lieutenant colonel du régiment de Rouergue, et son épouse, Jeanne de Vassart, issue d'une vieille famille barroise. Au-dessus de la porte d'entrée sont sculptées les armoiries de la famille de Perin de La Bessière entre les mains de laquelle le château est resté jusqu'en 1957. Vendu à un industriel du bois, il a alors été squatté pendant 25 ans environ, avant d'être racheté et restauré par Marie-José et René Eichenauer, les actuels propriétaires qui ont sauvés la demeure qui souffrait du pire mal dont sont affectés de nombreux monuments, l'indifférence des gens face aux témoignages vivants du passé. Chambres d'hôtes et sa table d'hôtes de grande qualité et un beau parc. Le château d'Ancemont est devenu un gite d'hôtes.","architecture":"LABESSIERE  a été construit au XVIIIe siècle. Edifice de plan rectangulaire à toit d'ardoise à croupes, encadré du côté de la façade principale de deux tours carrées à toit en pavillon. Cette façade est percée sur trois niveaux soulignés par un bandeau de fenêtres à linteau en arc segmentaire.                                                                                                           ANCEMONT  le château de la Lance, reconstruit en 1879.  Maison forte des Bardelet très remaniée.","habitants":"Baron Louis de Perin de Labessière\r\n        \r\n        \r\n        \"","divers":"château de la Lance grav 1-2 , Labessière grav-3-4-5                                         gps : 49° 04' 19\" Nord, 5° 24' 25\" Est","gps":"49° 04' 19\" Nord, 5° 24' 25\" Est","images":["../../jctruffet.com/image/image_55/55_Labessi%c3%a8re_1.jpg","../../jctruffet.com/image/image_55/55_Labessi%c3%a8re_2.jpg","../../jctruffet.com/image/image_55/55_Labessi%c3%a8re_3.jpg","../../jctruffet.com/image/image_55/55_Labessi%c3%a8re_4.jpg","../../jctruffet.com/image/image_55/55_Labessi%c3%a8re_5.jpg"]},"Consult_chateau_formulairebd0a":{"id":"Consult_chateau_formulairebd0a","dept":"55","canton":"Revigny-sur-Ornain","commune":"Laheycourt","nom":"Laheycourt","type":"Château","periode":"XVIII","histoire":"LAHEYCOURT, La mairie date du XXe siècle. Elle est de style néo-Renaissance  c'est un imposant bâtiment avec un corps central et, initialement, deux ailes. Elle fut très endommagée à la première guerre mondiale de 1914-1918, durant le bombardement de la bataille de la Marne. Au cours de sa reconstruction, les parties saillantes des deux ailes furent supprimées. Sa façade est maintenant plane.","architecture":"LAHEYCOURT, la villa Teinturier  elle  a été construite et aménagée, de 1923 à 1930, par l'architecte Ernest Médard  est classée aux M.H. en 2014. Elle est organisée sur le modèle néo-palladien, autour d'un puits de lumière centrale qu'achève un belvédère en toiture. Si certains des éléments de décor appartiennent encore au courant naturaliste, elle s'intègre dans l'internationalisme des courants Art nouveau et Art déco. La façade principale mêle un traitement éclectique néo-baroque et néo-roman, avec l'inclusion d'un oculus elliptique. Les façades secondaires sont traitées de façon très simple. La distribution intérieure de la villa n'a pas été modifiée et les aménagements, encore en place, constituent une véritable documentation sur la conception de l'hygiène et la vie domestique dans les demeures bourgeoises du début du XXe siècle.","habitants":"Responsable industriel\r\n        \r\n        \"","divers":"Mairie  grav-1                                                                                     gps : 48° 53' 30\" Nord, 5° 01' 25\" Est                                                              Villa grav-4                                                                                                        gps : 48° 5' 27\" Nord, 5° 01' 05\" Est                                                            Laleycourt grav  2-3","gps":"48° 53' 30\" Nord, 5° 01' 25\" Est","images":["../../jctruffet.com/image/image_55/55_Laheycourt_1.jpg","../../jctruffet.com/image/image_55/55_Laheycourt_2.jpg","../../jctruffet.com/image/image_55/55_Laheycourt_3.jpg"]},"Consult_chateau_formulairec82b":{"id":"Consult_chateau_formulairec82b","dept":"55","canton":"Stenay","commune":"Laneuville sur meuse","nom":"Laneuville_Meuse","type":"Manoir","periode":"XVII","histoire":"LANEUVILLE,  ancienne résidence de la famille de Lapisse de Lamothe, date des XVIIe et XIXe siècles et possède une façade principale sur cour, une porte d'entrée à fronton triangulaire, des dépendances, un colombier et un parc.   Anne Pierre Nicolas de Lapisse (1773-1850), général de brigade français de la Restauration. Il c'est retiré depuis 1835 à Laneuville dans son château, où il est mort le 24 février 1850, à l'âge de 76 ans.","architecture":"LANEUVILLE  Le double nud d'or illustre phonétiquement le toponyme Laneuville jadis Nova villa, Neufville. Avec l'ondé d'argent en soutien illustrant la Meuse, on peut lire : Laneuville-sur-Meuse.  Les deux tours sont celles du mur d'enceinte du château reconstruit au XVIIIe siècle sur l'emplacement d'un château féodal. Ayant tout d'abord un rôle défensif, elles ont été utilisées comme colombier, un apanage de la noblesse sous l'ancien régime. Ainsi elles représentent les seigneurs suzerains successifs, l'abbaye de St Hubert puis celui de Belval ; les comtes de Stenay, de Grandpré, les duchés de Bar, de Lorraine, les princes de Condé avec le Clermontois  puis plusieurs familles de seigneurs locaux successives. La dernière famille de seigneurs puis de châtelain, fut celle des Lapisse de Lamothe.  Le chevron d'argent est celui des armes de Stenay, il rappelle que Laneuville dépendait localement de la prévôté de Stenay.  Les geais des chênes illustrent l'importance des forêts de Dieulet et de Jaulnay environnantes.  L'ancre de marine est celle du monument du Pont Gaudron élevé en mémoire du sacrifice des nombreux soldats des régiments de la 1ère division d'infanterie coloniale pour résister, entre mai et juin 1940 à l'offensive nazie. L'ancre est également l'attribut de Saint Nicolas le patron des marins, elle symbolise la vocation de l'église de Laneuville à ce Saint particulièrement vénéré en Lorraine.  Création Robert André Louis et Dominique Lacorde, adoptée le 23 janvier 2021.","habitants":"Famille de Lapisse de Lamothe\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Laneuville  gps: 49° 29' 32\" Nord, 5° 09' 54\" Est","gps":"49° 29' 32\" Nord, 5° 09' 54\" Est","images":["../../jctruffet.com/image/image_55/55_Laneuville_Meuse_1.jpg"]},"Consult_chateau_formulaire9c00-2":{"id":"Consult_chateau_formulaire9c00-2","dept":"55","canton":"Ligny-en-Barrois","commune":"Ligny en Barrois","nom":"Ligny_en_Barrois","type":"Forteresse","periode":"XIV-XVI","histoire":"LIGNY en BARROIS, en 1367, la châtellenie de Ligny fut érigée en comté par le roi de France, Charles V, en qualité de suzerain du duc de Bar, lui-même suzerain des seigneurs de Ligny. Deux ans plus tard, en 1369, le cardinal-évêque de Metz, Pierre de Luxembourg (1369-1387) vit le jour dans la tour.   En 1544, l'empereur Charles Quint  envoya une armée, conduite par le condottière italien Ferdinand 1er de Gonzague, mettre le siège devant Ligny. Les Impériaux enlevèrent rapidement la cité et la saccagèrent. En 1650, le duc de Lorraine s'empara de Ligny alors aux mains des Français. Le maréchal de La Ferté la reprit dans la foulée. En 1719, la ville fut vendue au duc Léopold de Lorraine. Au XVIIIe siècle, Stanislas fit détruire le château et les remparts médiévaux en conservant la tour de Luxembourg qui servit alors de prison cantonale. Les pierres servirent à construire d'autres monuments. En 1814, des escadrons russes bombardèrent Ligny au moment même où Napoléon 1er tentait de se maintenir au pouvoir,\r\n vestige de l'enceinte médiévale, la Tour de Luxembourg, de forme semi-circulaire, elle est couronnée de mâchicoulis sur consoles (refait au XIXe siècle) au-dessus desquels figurent trois gargouilles. Les murs comportent également des ouvertures de tirs.                                                         VALERAN, deux tours encadraient autrefois la porte des Moulins : la tour des canons, disparue depuis 1878, et la tour Valéran  dite tour de Luxembourg également, haute de 22,50 m et d'un diamètre de 8 m à sa base. La construction de l'édifice démarre au XIIe siècle, la tour Valéran est achevée sous Valéran III, comte de Ligny, seigneur issu de la maison de Luxembourg qu'il dirige de 1374 à 1415.  Les Impériaux saccagèrent la ville.","architecture":"LIGNY en BARROIS,  est un château bâti à Ligny-en-Barrois, c'était un château fort. La construction date du XVIe au XIXe siècle. Cet élégant château est inscrit aux M.H. Il a conservé ses éléments d'origine (cheminées, boiseries, trumeaux, tomettes, escalier à vis, canonnières) avec de vastes dépendances qui comprennent une grande maison de gardien,  sur cour. Environ 4,5 hectares de jardin et terres libres avec ruisseau en contrebas dans un environnement calme et verdoyant. Le domaine possède une cour et un jardin d'agrément. Il est inscrit aux M.H. Deux archères à étriers du XIIIe siècle et deux canonnières de la fin du XVe siècle. Une latrine, en saillie du parement, complète l'ensemble. L'utilisation de pierres à bossage pour la moitié inférieure de la tour était à la fois décoratif et permettait surtout de dévier les boulets tirés par les assaillants.  A l'intérieur de cette tour se trouve une chambre voûtée sur croisée d'ogives à laquelle on accède par un escalier à vis. Il semblerait que cette pièce fut le lieu de naissance du cardinal-évêque de Metz, Pierre de Luxembourg. En 1840, l'édifice est classé M.H.                                                                     VALERAN, la base a pour appareil des pierres en bossage qui permettait de dévier les boulets tirés par les assaillants alors que le parement de la partie supérieure est lisse. Les meurtrières, les canonnières et les bretèches rappellent sa fonction militaire. Au cours des XVIIIe et XIXe siècles, elle servit de prison cantonale jusqu'en 1840. Le puits servait de cachot aux condamnés punis. Éléments protégés MH : la tour de Luxembourg : classement par liste de 1840.","habitants":"seigneurs de Ligny\r\n        \"","divers":"Ligny-en-Barrois  gps : 48° 41' 23\" Nord, 5° 19' 30\" Est                                   Porte Dauphine   gps 48° 41' 25\" nord, 5° 19' 12\" est                                Tour valéran  grav -5-6                                                                      gps   48° 41' 25\" nord, 5° 19' 37\" est","gps":"48° 41' 23\" Nord, 5° 19' 30\" Est","images":["../../jctruffet.com/image/image_55/55_Ligny_en_Barrois_1.jpg","../../jctruffet.com/image/image_55/55_Ligny_en_Barrois_2.jpg","../../jctruffet.com/image/image_55/55_Ligny_en_Barrois_3.jpg","../../jctruffet.com/image/image_55/55_Ligny_en_Barrois_4.jpg","../../jctruffet.com/image/image_55/55_Ligny_en_Barrois_5.jpg","../../jctruffet.com/image/image_55/55_Ligny_en_Barrois_6.jpg"]},"Consult_chateau_formulaire70d8":{"id":"Consult_chateau_formulaire70d8","dept":"55","canton":"Stenay","commune":"Lion devant Dun","nom":"Lion_devant_Dun","type":"Château","periode":"XVIII","histoire":"Trois châteaux dans cet article; Lion devant Dun; Dun sur Meuse et Breuilles sur  Meuse .                                                                                                 LION-DEVANT-DUN, la construction du château de Lion date du XVIIIe siècle, il fut restauré, en 1700. Tout autour, se trouvent les dépendances, au lieu-dit la Sassée, a une construction massive, flanquée de tourelles féodales. Son emplacement, qui domine le village, indique la somptueuse demeure du seigneur d'autrefois et impose le respect. En l'an 1698, le château de Lion appartenait à messire Jean Tille de Genty, seigneur et écuyer de Tailly, et à dame Marie-Anne de Vion, son épouse. De l'an 1783 à 1810, le château de Lion appartenait toujours à la famille Léonard de Saint-Cyr, retirée, en 1810, à Saint-Nicolas-de-Port. En 1811, le château de Lion passa dans les mains de la famille Derobe.                                                                                      DUN,  le Chastel fut de tous temps le lieu de passage des armées pour les grandes invasions. Cet intérêt stratégique fut lenjeu constant des luttes entre les ducs de Lorraine, leurs alliés, et le royaume de France. Le château fut édifié de 1053 à 1055 par le grand duc Godefroy le Barbu dans les domaines de sa femme Béatrix de Bar. Le 1er châtelain, haut voué du château, chargé de défendre cette forteresse et la vouerie fût Alo, de Dannevoux et de Dun. La forteresse fut démantelée, comme la plupart des forteresses du Nord-Meusien, sur ordre de Richelieu en 1742. Faute de moyens pour en faire une nouvelle citadelle comme à Montmédy, Louis XIV fit achever sa destruction en 1648. Occupée par les allemands durant la première guerre mondiale, la cité subit des bombardements intensifs qui détruisirent ce qui restait de la forteresse.","architecture":"DUN,  sur Meuse à cinq  K.M au sud ouest, aux alentours de 1053, un château fut construit sur la colline et au XVIe siècle, la place fortifiée de Dun était alors une des clés de la Lorraine. La place a été assiégée et prise, en 1591, par le Duc de Bouillon. Dès 1642, elle fut démantelée  comme la plupart des places fortes de Lorrraine. Il subsiste à Dun-Haut de magnifiques vestiges, que lassociation Dun-le-Chastel restaure au fil des ans. Parmi les anciennes fortifications, vous pourrez découvrir la Porte de Milly qui date de 1402 : elle était la sortie Est de la ville fortifiée, et la Porte aux chevaux qui date des XVe siècle et XVIIe siècle : par une volée d'escalier et via la rue Mi-le-Mont. Elle donne accès à la ville basse de Dun-sur-Meuse, fut sans doute à l'origine un oppidum qui permit d'améliorer la défense des camps romains de la côte Saint-Germain et de la côte du Châtelet, et de défendre le passage de la Meuse. Le village fortifié sur une butte isolée a conservé de nombreuses traces de son système défensif médiéval. Seul monument à avoir résisté aux conflits à travers les siècles. Découvrez aussi des engins médiévaux, un jardin médiéval.  Chaque été, un chantier de restauration est mené sur les remparts, tandis que l'association Dun le Chastel oeuvre durant toute l'année pour l'aménagement, le fleurissement et la valorisation du site. L'accès à l'ancienne forteresse et au circuit des remparts est libre et gratuit. Des supports ludiques sont également disponibles pour découvrir en autonomie l'ancienne forteresse. Des visites guidées peuvent être proposées pour les groupes adultes, scolaires et centres de loisirs.                                                               Plus au sud à six K.M de Dun à Breuilles sur Meuse. Le Prieuré des Prémontrés, dont le premier bâtiment fut construit pour les Prémontrés de 1645 à 1655. Puis il fut reconstruit en grande partie en 1754 et 1756. La Résidence des Prémontrés a été classée aux M.H. en 1994. Elle appartient depuis à une société privée.","habitants":"Messire Jean Tille de Genty\r\n        \"","divers":"Prémontres grav 6                                                                           gps : 49° 24' 41\" Nord, 5° 13' 49\" Est                                                                  Dun sur Meuse grav 1 à 5                                                                    gps : 49° 23' 12\" Nord, 5° 11' 02\" Est                             Breuiilles sur meuse grav 7                                                                             gps : 49° 20' 10,75\" Nord, 5° 11' 3,13\" Est","gps":"49° 24' 41\" Nord, 5° 13' 49\" Est","images":["../../jctruffet.com/image/image_55/55_Lion_devant_Dun_1.jpg","../../jctruffet.com/image/image_55/55_Lion_devant_Dun_2.jpg","../../jctruffet.com/image/image_55/55_Lion_devant_Dun_3.jpg","../../jctruffet.com/image/image_55/55_Lion_devant_Dun_4.jpg","../../jctruffet.com/image/image_55/55_Lion_devant_Dun_5.jpg","../../jctruffet.com/image/image_55/55_Lion_devant_Dun_6.jpg","../../jctruffet.com/image/image_55/55_Lion_devant_Dun_7.jpg"]},"Consult_chateau_formulaire5f8c-2":{"id":"Consult_chateau_formulaire5f8c-2","dept":"55","canton":"Ancerville","commune":"Lisle en Rigault","nom":"lisle_en_Rigault","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article; Lisle, Combles et Jean d'Heurs                                                                                          LISLE  Lexistence du premier château est attestée dès le début du XIIIe siècle. De cette époque il ne reste guère que le fossé défensif, formé par un bras naturel de la Saulx, et le porche voûté dogives du XIVe siècle. Réédifié au début du XVIIIe siècle, le château est un long bâtiment rectangulaire dont le corps central est coiffé dun toit à croupes. Au nord, une aile en retour déquerre, et au sud, contiguë à la poterne, une chapelle dédiée à Saint Jean-Baptiste réservée aux châtelains. Le château échoit en 1707 à François Le Besgue de Nonsart qui fit réaliser son décor intérieur. Son fils Charles-Philippe de Nonsart, prêtre et aumônier du roi de Pologne Stanislas, fut le dernier seigneur de Lisle et y mourut en 1808 à lâge de 95 ans. En 1812, le château est vendu par lots et le logis seigneurial devient presbytère. Le château a connu des périodes de prospérité et dabandon. Ses lambris de style rocaille, les peintures de ses trumeaux et le remarquable plafond peint, qui couvre lescalier, subsistent intacts. Éléments protégés MH : l'ancien logis seigneurial, à l'exception des parties classées : inscription par arrêté du 18 février 1992. Les intérieurs de l'ancien logis seigneurial : classement par arrêté du 29 avril 1994.                                                                 A cinq K.M. au nord -Est à   COMBLES en Barrois  est un château de la Renaissance., il a été transformé en chambres d'hôtes.","architecture":"JEAN D'HEURS, le domaine abritait à lorigine l'abbaye des Prémontrés construite vers 1742. Transformée en château par le maréchal Oudinot, on peut voir encore des vestiges de lancienne abbaye avec les arcades du cloître, l'escalier à la française et quelques unes des salles du rez-de-chaussée qui ont conservé leur architecture classique. Au XVIIIe siècle, il devient une demeure de faste à limage de la grille du grand escalier réalisée par Jean Lamour qui dessina également les grilles de la place Stanislas de Nancy. Le parc du château de Jean d'Heurs est sûrement lun des plus beaux du 1er Empire. Malheureusement le parc est visible que 4 jours dans l'année, merci pour les touristes, la visite est réservée aux meusiens uniquement. Il date du XVIIIe, XIXe siècle. Fondée vers 1140, une ancienne abbaye de Prémontrés;  Cette demeure de style Louis XV, en pierre blanche de Savonnières, est entourée d'un parc paysager, arrosé par la Saulx, représentant les jardins lorrains, au XIXe siècle. Diverses constructions, fonctionnelles ou décoratives s'y trouvent, telles que les anciennes écuries  transformées en centre équestre  l'orangerie et autres fabriques, caractéristiques du style du Premier Empire. Le château de Jean d'Heurs a été classé aux M.H. en 1972 et en 1989. Il est devenu la propriété d'une société privée que vous pourrez louer, pour y fêter vos évènements festifs.","habitants":"François Le Besgue de Nonsart                                                    Prémontrés ; le maréchal Oudinot,        \r\n        \r\n        \"","divers":"lisle Rigault gps : 48° 43' 3,32\" Nord, 5° 2' 54,61\" Est                                          lisle  grav-6                                                                                 GPS : 48° 43' 03\" Nord, 5° 02' 55\" Est                                                                 J-Heurs grav 1 à 5                                                                               GPS : 48° 43' 36\" Nord, 5° 02' 45\" Est","gps":"48° 43' 3,32\" Nord, 5° 2' 54,61\" Est","images":["../../jctruffet.com/image/image_55/55_Lisle_en_Rigault_1.jpg","../../jctruffet.com/image/image_55/55_Lisle_en_Rigault_2.jpg","../../jctruffet.com/image/image_55/55_Lisle_en_Rigault_3.jpg","../../jctruffet.com/image/image_55/55_Lisle_en_Rigault_4.jpg","../../jctruffet.com/image/image_55/55_Lisle_en_Rigault_5.jpg","../../jctruffet.com/image/image_55/55_Lisle_en_Rigault_6.jpg"]},"Consult_chateau_formulaire4b60":{"id":"Consult_chateau_formulaire4b60","dept":"55","canton":"Montmédy","commune":"Louppy sur Loison","nom":"Louppy_sur_Loison","type":"Château","periode":"XVII","histoire":"LOUPPY sur LOISON, le château de Louppy sur Loison offre par sa monumentalité, limportance de son décor, et par son histoire lun des plus surprenants exemples du style Renaissance de la région. Il fut édifié dans la première moitié du XVIIe siècle par Simon II de Pouilly, maréchal de Barrois, gouverneur militaire de Stenay attaché au duché de Lorraine. Ce programme architectural unique dont lintérêt était daffirmer la puissance de son commanditaire permettait, entre autre, daccueillir le duc et sa Cour, Louis XIV y résida durant le siège de Montmédy en été 1657. Lors de la première guerre mondiale, il fut l'objet d'un pillage organisé de l'armée allemande. Lors de la deuxième guerre mondiale, Louppy fut occupé et servit de camp de prisonniers. L'intérêt architectural de Louppy réside essentiellement dans ses portails et porches sculptés avec fantaisie (portail des écuries, entrée du château,) monsieur de Roffignac en devient propriétaire.\r\nTransformations intérieures et extérieures au XVIIIe siècle : on agrandit un grand nombre de fenêtres, suppression des croisées de pierre, interruption des panneaux moulurés. La cour intérieure reçoit alors des enduits muraux. Au XIXe siècle, le corps de bâtiment central est remanié : au rez-de-chaussée se trouvait une sorte de halle ouverte sur la cour et le parc. Les arcades sont alors murées et des fenêtres pratiquées au travers des murs. Nouvelles fenêtres à mansardes ouvertes dans les toitures à pentes aiguës.\r\nÉléments protégés MH : les façades et les toitures du château et des dépendances, y compris le pigeonnier, ainsi que les ruines de l'ancien château : classement par arrêté du 6 février 1980.","architecture":"LOUPPY sur LOISON,   date du XVIIe siècle. Il est de style renaissance. Le château de Louppy, malgré sa beauté, demeure un château méconnu du public. Il ressemble à un véritable vaisseau de pierre, qui domine la vallée du Loison. Il fait partie du patrimoine lorrain. C'est lun des plus surprenants exemples de style Renaissance de la région. Il fut édifié dans la première moitié du XVIIe siècle par Simon II de Pouilly, maréchal de Barrois, gouverneur militaire de Stenay attaché au duché de Lorraine. Achevé en 1632, ce programme architectural unique, permettait entre autres daccueillir le duc et sa cour. Louis XIV y résida pendant le siège de Montmédy durant lété 1657. Lors de la première guerre mondiale, il fut l'objet d'un pillage organisé de l'armée allemande. Lors de la seconde guerre mondiale, Louppy fut occupé et servit de camp de prisonniers. La visite du château de Louppy-sur-Loison permet de découvrir ses différentes cours, ainsi que ses portails et porches sculptés. Lentrée se fait par la basse-cour centrée autour dun grand colombier fort bien conservé.  La visite se poursuit par la cour dhonneur caractérisée par une immense richesse sculpturale concentrée sur trois portails monumentaux, dont lun représente les quartes éléments et une série de scènes mythologiques. De la cour dhonneur, on arrive, par un petit portail orné à la chapelle, qui conserve le souvenir de labbaye bénédictine voisine de Juvigny et de ses abbesses. Enfin, la visite sachève dans son parc à langlaise qui se développe le long dun méandre de la rivière du Loison et est constitué dessences rares.","habitants":"Monsieur de Roffignac\r\n        \"","divers":"Louppy sur Loison  gps : 49° 26' 37\" Nord 5° 20' 51\" Est","gps":"49° 26' 37\" Nord 5° 20' 51\" Est","images":["../../jctruffet.com/image/image_55/55_Louppy_sur_Loison_1.jpg","../../jctruffet.com/image/image_55/55_Louppy_sur_Loison_2.jpg","../../jctruffet.com/image/image_55/55_Louppy_sur_Loison_3.jpg","../../jctruffet.com/image/image_55/55_Louppy_sur_Loison_4.jpg","../../jctruffet.com/image/image_55/55_Louppy_sur_Loison_5.jpg","../../jctruffet.com/image/image_55/55_Louppy_sur_Loison_6.jpg"]},"Consult_chateau_formulaire8957-2":{"id":"Consult_chateau_formulaire8957-2","dept":"55","canton":"Bar le Duc","commune":"Bar le Duc","nom":"Marbeaumont","type":"Palais","periode":"XVIII-XX","histoire":"MARBEAUMONT, 1812, création de la banque  Varin Brenier à Bar le Duc en 1866, construction  d'une première villa par Gabriel Varin quartier  Marbot neveu du fondateur, ce dernier décède en 1874 son fils Paul lui succède à la tête de la banque.  Château  édifié de 1903 à 1905 pour le banquier Paul Varin-Bernier, par l'architecte local Jules Renard, et réalisé par l'entreprise France Lanord et Bichaton, en 1916 après le décès de Paul Varin-Bernier le château reste habité par sa veuve, endommagé lors de la première guerre mondiale utilisé comme  quartier général par un corps  d'armée français et pendant la seconde guerre par l'état major allemand qui incendie les dépendances avant leur départ. En 1946 le château est vendu à la ville de Bar-le-Duc, entre 1948 et 1992, il abrite les services  de la direction départementale de l'agriculture et de la forêt, amputé d'une partie de son parc inscription par arrêté du 24 décembre 1980. Restauré depuis 1992 il acceuille aujourd'hui la médiathèque Jean-Jeukens  de la ville.","architecture":"MARBEAUMONT, château  édifié de 1903 à 1905, l'édifice de plan massé présente  deux niveaux en élévation un sous-sol et un étage sous toiture,  conjugue un luxe bourgeois à l'intérieur, clinquant et exubérant, avec une façade rappelant le château de Blois ou les châteaux Louis XIII. La façade postérieure donne sur le parc est comporte unbow-window centré, précédé par une terrasse interrompue par un escalier en fer à cheval pourvu d'une rampe d'appui en pierre. La façade antérieure offre un avant corps en légère saillie  percée au rez-de-chaussée d'une porte d'entrée surmontée d'une élégante marquise sous une loggia ouverte sous la  vaste  baie en plein cintre qui perce le comble. Bâti en brique et pierre de style Renaissance et Louis XIII. Il est immédiatement reconnaissable et remarquable grâce à ses murs en pierre d'Euville et en briques, et sa toiture en ardoise et en zinc. Des sculptures décoratives ornent le bâtiment d'architecture classique, mais aux procédés de construction ultra modernes pour l'époque (ciment armé, charpente métallique. Le château de Marbeaumont disposait également de tout le confort nécessaire. Magnifiquement restauré et installé dans un immense parc aux essences rare.   Éléments protégés MH .","habitants":"Paul Varin-Bernier\r\n        \"","divers":"Marbeaumont gps : 48° 46' 26\" Nord, 5° 10' 18\" Est","gps":"48° 46' 26\" Nord, 5° 10' 18\" Est","images":["../../jctruffet.com/image/image_55/55_Marbeaumont_1.jpg","../../jctruffet.com/image/image_55/55_Marbeaumont_2.jpg"]},"Consult_chateau_formulaire4367":{"id":"Consult_chateau_formulaire4367","dept":"55","canton":"Vaucouleurs","commune":"Montbras_Burey","nom":"Montbras_Burey","type":"Château","periode":"XVI-","histoire":"Deux châteaux dans cet articlre Montbras et Burey la côte. MONTBRAS,  Claude II de Verrières et Louise des Salles entreprennent la construction en 1598 interrompue en 1611, par la mort de Louise des Salles. Les travaux reprirent après le remariage, le 7 octobre 1611, de Claude de Verrières avec Julia Della Valle, devenue veuve Julia Della Valle fais don de Montbras à la nièce de son époux. Marie de Méry à l'occasion  du mariage de cette dernière  avec Jacques de Leviston  capitaine au régiment de Batilly et se séparent du château en 1643 au profit de Simon de Sommyère et de son épouse Catherine de Méry dont le premier  Sommyère à résider  sera leur fils Jacques, bailli d'Auxois prend le titre de baron, en 1765 c'est à son fils Jean Gaspard épouse Marie de Choiseul nièce du cardinal,  c'est à Gaspard qu'il faut attribuer des remaniements de la disposition du rez-de-chaussée et du premier étage qui ont bien le caractère du commencement du XVIIIe siècle, ce travail ne fut jamais achevé. En 1838  la famille de Sommyère se défait de Montbras. puis à son fils Jean-Baptiste Laure   en 1876 passa en mauvais état au comte de Chanteau qui le restaure resta dans cette famille jusqu'en 1958  date ou il fut acquis par la famille Raymond Roux est aujourd'hui à Claude Thomas, qui, durant 30 ans, consacra une grande partie de sa vie et de son argent, pour redonner tout son lustre à cette bâtisse majestueuse, qui possède un décor extérieur et intérieur, particulièrement, raffiné.  Le château a dû beaucoup souffrir des guerres du commencement du XVIIe siècle et c'est peut être à cette époque qu'il fut partiellement brûlé. A une ou des dates indéterminées, l'aile droite fut détruite et l'aile gauche mutilée.","architecture":"MONTBRAS,  la construction fut entreprise après le 11 août 1598, une ferme forme l'angle nord-est de la basse-cour, sa partie nord-est est bastionnée et comporte une meurtrière dans le mur sud qui remonte à la construction du château au XVIIe siècle. Une porte charretière porte la date 1840. La moitié de l'aile gauche subsiste aujourd'hui, mais sa façade sud a été rebâtie au XVIIIe siècle. La façade nord offre un précieux reste d'architecture : la partie gauche d'un portail monumental, surmonté d'un fronton et décoré de trophées, qui mettait en communication au moyen d'un pont-levis la cour avec la basse-cour du château. Ce portail comportait sans doute une grande baie entre deux petites, la petite baie qui subsiste, en cintre surbaissé, est aveugle. Il est impossible de déterminer la nature du bâtiment ou de la courtine qui réunissait les deux tours placées en avant des ailes. Il est impossible également de déterminer la date à laquelle ont disparu les mâchicoulis des tours, seules ici les consoles subsistent, toutes mutilées en ce qui concerne la tour nord. Les caves et le rez-de-chaussée sont voûtés en berceau en anse de panier, à l'exception du rez-de-chaussée de la tour sud qui est voûté d'arêtes, ardoise sur le corps principal et les tours ouest, tuile mécanique sur l'aile nord, le chenil et le four, tuile plate sur les tours Est, tuile mécanique et creuse sur la ferme. Éléments protégés MH : les façades (avec leurs statues) et les toitures ; la cour d'honneur, classement par arrêté du 28 juin 1974. Les intérieurs du corps principal : inscription par arrêté du 15 mai 2012.                                                                                                                              BUREY LA COTE  La construction du château de Burey-la-Cote date du XVIe siècle, est inscrit aux M.H. depuis 1923 et 1993.","habitants":"Claude de Verrières et Julia Della Valle\r\n        \"","divers":"Montbrasgrav 1-2-3  et Burey la côte grav 4-5 .                              Burey gps: 48° 30' 9,09\" Nord, 5° 42' 0,97\" Est                                                      Montbras gps 48° 31' 40\" nord, 5° 41' 41\" est","gps":"48° 30' 9,09\" Nord, 5° 42' 0,97\" Est","images":["../../jctruffet.com/image/image_55/55_Montbras_Burey_1.jpg","../../jctruffet.com/image/image_55/55_Montbras_Burey_2.jpg","../../jctruffet.com/image/image_55/55_Montbras_Burey_3.jpg","../../jctruffet.com/image/image_55/55_Montbras_Burey_4.jpg","../../jctruffet.com/image/image_55/55_Montbras_Burey_5.jpg"]},"Consult_chateau_formulairec0e0":{"id":"Consult_chateau_formulairec0e0","dept":"55","canton":"Dieue sur Meuse","commune":"Dieue sur Meuse","nom":"Monthairons","type":"Château","periode":"XIX","histoire":"MONTHAIRONS   Le château des Monthairons a été construit vers 1857 par Charles-Henri de la Cour sur l'emplacement de l'ancienne résidence seigneuriale que la famille possédait depuis 1685 par dotation, à la suite d'un mariage de Marie Nicolas avec Henry de la Cour, seigneur de Villier devant Dun, noblesse de haute lignée, une branche cadette vint s'établir en Lorraine en 1447, après la mort de Charles le Téméraire. Cette famille a donné un général de génie, Nicolas de la Cour et Dom Didier de la Cour qui naît en 1550 à Montzéville, près de Charny, il entre à 17 ans à l'abbaye de Sainte Vanne à Verdun, puis étudie à l'université de Pont à Mousson. Devenu prieur claustral à Sainte Vanne, il commence en 1600 . En 1685 le domaine passe par mariage à la famille de la Cour Marie-Nicolas dame de Monthairons avec Henri de la Cour, en 1811 transfert dans la chapelle du parc des restes de dom Didier de la Cour et en 1857 à 1859 reconstruction du château sur les plans de l'architecte Demonget et en  1902  la famille La Cour vend le domaine au baron Chadenet  anobli par l'empereur Napoléon III pour l'avoir fortement soutenu.  qui s'en défait quelques années plus tard,  la forêt en partie détruite ainsi que les archives du domaine qui a servit d'hôpital pendant la guerre 14-18   pour les troupes américaines. L'hôpital fonctionna pendant toute la guerre , et dans la seconde guerre par les allemands. Quelques années plus tard, les 1950 ha de forêts furent vendus aux frères Nathan, les bois prirent le nom de bois Nathan,  il est racheté  en  1985 par la famille Thouvenin qui à restauré et modernisé parc et château qui abrite aujourd'hui une hôtellerie de Luxe.","architecture":"MONTHAIRONS, Les fondations de l'ancienne demeure, devenue plus vétuste au cours des siècles, ajoutés aux guerres et à la Révolution, servirent à l'édification du château actuel, bâti dans un parc planté d'arbres aux nombreuses essences.  A l'intérieur du parc, sur les plus hauts arbres existe encore une héronnière très peuplée, chaque année, ces mêmes occupants reviennent en nombre pour le printemps. Selon une jolie légende dont nous connaissons mal l'origine, la présence de hérons aurait donné son nom au village et au château des Monthairons, Mont des Hérons. En fait l'étymologie proviendrait aussi de Mont Aride, en référence à la colline qui avoisine le village à l'ouest La grille monumentale et la porte finement ouvragée surmontée d'une couronne comtale, ennoblissent cette construction, dû au coup de crayon de l'architecte Demoget, le corps de logis double en profondeur est élevé sur un rez-de-chaussée, un étage carré, un attique sur un étage de comble, il est flanqué de  deux pavillons latéraux qui font saillie sur chacune des façades. Du  côté parc, les pavillons sont cantonné de deux tourelles en encorbellement  coiffées de  toits en poivrière, travées régulières, soulignées horizontalement par  de forts cordons de pierre. Certaines baies offrent un linteau sculpté parfois surmonté d'un fronton, les combles, hérissés de hautes souches de cheminées sont éclairés par des lucarnes encadrées de pilastre et coiffées de frontons cintrés ou circulaires, avec motifs répétant les blasons des constructeurs, le château des Monthairons, le parc de 14 ha est bordé sur tout le côté ouest par la Meuse. Entièrement clos, ce parc abrite deux chapelles et une héronnière.","habitants":"famille La Cour\r\n        \"","divers":"Monthairons                                                                                              gps: 49° 03' 13,93\" Nord, 5° 4' 37,13\" Est                                     et 49° 03' 40\" nord, 5° 24' 33\" est","gps":"49° 03' 13,93\" Nord, 5° 4' 37,13\" Est","images":["../../jctruffet.com/image/image_55/55_Monthairons_1.jpg","../../jctruffet.com/image/image_55/55_Monthairons_2.jpg","../../jctruffet.com/image/image_55/55_Monthairons_3.jpg","../../jctruffet.com/image/image_55/55_Monthairons_4.jpg","../../jctruffet.com/image/image_55/55_Monthairons_5.jpg"]},"Consult_chateau_formulaire8853":{"id":"Consult_chateau_formulaire8853","dept":"55","canton":"Ligny-en-Barrois","commune":"Montiers sur Saulx","nom":"Montiers_sur_Saulx","type":"Forteresse","periode":"XIII-","histoire":"MONTIERS sur SAULX,  c'est un château de style Renaissance. Il ne reste debout que la tour de l'ancien château. Le roi Henri II a dormi au château de Montiers-sur-Saulx le 7/04/1552, ainsi que François de Guise. Il ne reste depuis qu'une tour de l'ancien château : le château fut construit en 1302 par Anselme sire de Joinville.  En 1302, le seigneur des lieux, Anseau de Joinville (1265-1343), fils du célèbre chroniqueur de Saint-Louis, Jean de Joinville, fit construire le premier château juste après son premier mariage  avec Laure de Sarrebruck, fille de Simon IV de Sarrebruck-Commercy, seigneur de Commercy, et de Mathilde de Sexefontaine.  La forteresse possédait alors quatre tours reliées entre-elles par des courtines crénelées et un pont-levis desservait son entrée ; une petite garnison était sensée la défendre. En 1315, Anseau de Joinville fit ajouter une chapelle dédié à Saint-Nicaise au second étage de l'une des tours et en confia l'office aux moines de l'abbaye d'Ecurey, écart de Montiers.  Le 24 décembre 1317, Anseau de Joinville devint seigneur de Joinville à la mort de son père. En 1323, après le décès de sa première épouse, le seigneur de Montiers-sur-Saulx et de Joinville, se remaria avec Marguerite de Vaudémont, fille d'Henri III de Vaudémont et d'Isabelle de Lorraine.\r\nDe cette nouvelle union, naquirent trois enfants : Henri, le futur Henri V de Vaudémont,  Isabeau et Mathilde. Cette dernière, mariée trois fois, transmit la seigneurie de Montiers-sur-Saulx à son dernier époux, Ferry 1er de Vaudémont en 1393.","architecture":"MONTIERS sur SAULX, en 1473, René II, duc de Lorraine et de Bar, hérita du château et de la seigneurie. En 1520, Philippe de Gueldre, légua l'ensemble, 12 ans après la mort son époux, à leur fils Claude, après s'être retirée comme religieuse chez les Clarisses à Pont-à-Mousson l'année précédente. Claude de Lorraine, premier duc de Guise et compagnon d'armes de François 1er, aimait séjourner au château  pour des parties de chasse qu'il partageait avec son suzerain. Lors du conflit opposant François 1er à Charles Quint, la forteresse devint un lieu de ralliement pour les troupes françaises. Le 21 juillet 1542, le premier traité d'alliance entre la  France et la Suède y fut signé. En 1544, le château subit les assauts des soldats de l'empereur et fut endommagé. Par son testament du 2 mars 1550, Claude de Lorraine donna Montiers-sur-Saulx et Joinville à son  fils François 1er de Lorraine, 2e duc de Guise, dit le balafré, qui sera assassiné en 1563. En 1552, le roi Henri II de France séjourna au château de Montiers-sur-Saulx lors du \"voyage d'Allemagne\", expédition militaire contre Charles Quint. En octobre 1559, le roi François II de France se trouvait au château avec sa sur Élisabeth pour  la nomination des gouverneurs de ses deux frères, les futurs Charles IX et Henri III. Montiers-sur-Saulx devint baronnie en 1585 avant d'être vendue, en 1600, par Henri, duc de Guise, alors très endetté en raison de ses implications guerrières. En janvier 1617, Charles 1er de Lorraine, 4e duc de Guise, la racheta et confia la garde à François Vautier, nouveau capitaine ducal. En 1737, la courtine a reçu un nouveau bâtiment avec des fenêtres à arc surbaissé. En 1796, vendu comme bien national, le château de Montiers-sur-Saulx fut racheté par la commune en 1851 qui y installa la gendarmerie jusqu'en 1887, date à laquelle une école des filles occupa les lieux. Aujourd'hui, c'est l'école primaire qui  occupe une partie des bâtiments. De l'ancien château féodal subsiste l'une des tours rondes édifiées au XIVe siècle.","habitants":"Anselme sire de Joinville\r\n        \"","divers":"Montiers grav 1 à 4 mairie grav-5 gendarmerie-6                                          gps : 48° 31' 54\" Nord, 5° 16' 08\" Est","gps":"48° 31' 54\" Nord, 5° 16' 08\" Est","images":["../../jctruffet.com/image/image_55/55_Montiers_sur_Saulx_1.jpg","../../jctruffet.com/image/image_55/55_Montiers_sur_Saulx_2.jpg","../../jctruffet.com/image/image_55/55_Montiers_sur_Saulx_3.jpg","../../jctruffet.com/image/image_55/55_Montiers_sur_Saulx_4.jpg","../../jctruffet.com/image/image_55/55_Montiers_sur_Saulx_5.jpg","../../jctruffet.com/image/image_55/55_Montiers_sur_Saulx_6.jpg"]},"Consult_chateau_formulaire3423":{"id":"Consult_chateau_formulaire3423","dept":"55","canton":"Montmédy","commune":"Montmédy","nom":"Montmédy","type":"Château-Citadelle","periode":"XVI-XVII","histoire":"Trois châteaux dans cet artcle;  Fresnois, Laval et Grande Flassigny.                                                                                                        FRESNOIS, construit en 1618 par Mathieu d'Awans, lieutenant gouverneur de Montmédy. Au milieu du XVIIe siècle, la terre et le château de Fresnois passèrent à la famille de Reumont. En 1874, Louis d'Ansan d'Egremont et son épouse Louise de Reumont abandonnent le vieux château et en font construire un nouvel édifice par un architecte parisien en 1877. Après la guerre de 1914-1918, le château passe aux mains du baron d'Huart, de Longwy, qui en 1923 fit raser le château du XVIIe siècle, n'en conservant que l'orangerie construite au XVIIIe siècle, le portail d'entrée, la porte piétonne ouvrant sur le village, et les terrasses descendant vers la Chiers. Une statue de la Vierge est située dans un groupe d'arbres appelé le \"bosquet de la Vierge\" ; le bassin est orné d'un vase Médicis en fonte sur un piédestal d'où jaillit l'eau qui alimente le bassin.                                                                                                                      LAVAL,  la seigneurie de Laval appartenait au XVIIe siècle à Guillaume Crochart, capitaine de la prévôté de Montmédy. La terre de Laval échut en 1810 (datation par travaux historiques) à Frédéric Johannot de Crochart, trésorier aux armées, qui reconstruisit le château en 1810, il fut restauré et embelli par son petit-fils Albert de Benoît vers 1890. Orangerie avec un toit à croupes, des écuries en U couvertes d'un toit à la Mansart, un chenil au corps central de plan octogonal prolongé par quatre petits corps rectangulaires disposés en croix.","architecture":"FRESNOIS, éléments protégés MH : les bâtiments de dépendances, y compris le portail du XVIIe siècle ; le parc avec ses murs de terrasses, les escaliers et les bassins, y compris la colonnade et l'orangerie : inscription par arrêté du 9 avril 1990., le château de Fresnois est de style Renaissance. La construction date du XVIIe au XIXe siècle. Visite libre du parc, des jardins en terrasses et de l'Orangerie. L'intérieur du château est privé.  Le parc et les jardins présentent une succession de terrasses, agrémentées de colonnades, d'une orangerie, de bassins, formant un ensemble harmonieux ouvert sur la vallée de la Chiers et sur la Belgique. Le château de Fresnois est inscrit aux M.H. en 1990.                                                                                                                                                                                     A 15 K.M Flassigny maison forte GRANDE-FLASSIGNY,  édifiée en 1572 (date sur le linteau de la porte sud). Plafonds à solives et cheminée de la cuisine du XVIe siècle. Charpente du XVIIe siècle. Façades remaniées au XIXe siècle  toitures : inscription par arrêté du 13 février 1997.","habitants":"Fresnois; famille de Reumont                                                          Laval ; Guillaume Crochart\r\n        \"","divers":"Fresnois  grav 1-2-3                                                                     gps 49° 31' 55\" nord, 5° 23' 20\" est, Laval grav -4    et Grande Flassigny-grav-5.                                                                     gps  49° 28' 26\" nord, 5° 26' 27\" est                                                            Signy  Frenois gps : 49° 31' 13\" Nord, 5° 22' 00\" Est","gps":"49° 31' 13\" Nord, 5° 22' 00\" Est","images":["../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_1.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_2.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_3.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_4.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_5.jpg"]},"Consult_chateau_formulairebe0f":{"id":"Consult_chateau_formulairebe0f","dept":"55","canton":"Montmédy","commune":"Montmédy","nom":"Montmédy_citadelle","type":"Forteresse-Citadelle","periode":"XVI-XVII-XIX","histoire":"MONTMEDY, la citadelle est un ouvrage militaire est construite sur ordre de Charles Quint, vers 1545.   La place est prise en 1657 après un siège où sur les huit ingénieurs recrutés Vauban sera le seul survivant. Après la conquête de la région par le roi de France Louis XIV, le Roi Soleil, une caserne, une église, une école et des logements pour les familles ont été construits dans la forteresse.  Elle est cédée à la France en 1659 dans le cadre du traité des Pyrénées. Elle est remaniée par Vauban au XVIIe siècle puis par Séré de Rivières au XIXe siècle. Avec ses remparts et ses glacis sont classés au titre des monuments historiques par arrêté du 31 octobre 1990 est un château fort bâti à Montmédy,  La construction date du XVI, XVIIe et XIXe siècle.  A la Révolution, Montmédy est la destination finale choisie par Louis XVI pour sa fuite de Paris en juin 1791, la garnison de la forteresse étant restée fidèle. De là, lui et d'autres royalistes loyaux espéraient mener la résistance contre le régime qui l'avait renversé pendant la Révolution française de 1789. Cependant, avec sa femme Marie-Antoinette et leur suite, il est reconnu et arrêté à Varennes-en-Argonne, à une cinquantaine de kilomètres de Montmédy. Dans la ville voisine de Thonnelle, une plaque sur la maison où il devait vivre commémore cet événement historique. Cette citadelle appartenait à la ligne de défense construite par Sébastien  Le Prestre de Vauban à la frontière nord de la France et il a apporté de nombreuses modifications aux fortifications, comme l'agrandissement des bastions.","architecture":"MONTMEDY, sous la guerre Napoléonniene, la forteresse est assiégée par les alliés du 16 juillet au 22 septembre 1815. Après la défaite, la forteresse a été gravement endommagée. Idem pour les guerres suivantes.   Montmédy a été le lieu d'implantation de plusieurs ouvrages de la ligne Maginot (177 blockhaus et 36 tourelles, sept casemates, quinze maisons fortes, batteries de 155 L 77 au sud-est de Montmédy, sept PC et quatre observatoires). Le tunnel ferroviaire de Montmédy est relié à la citadelle par une galerie de 539 mètres de long permettant le contrôle rapide de ce passage stratégique. A l'intérieur de la citadelle se trouvent deux musées :  le musée Jules Bastien Lepage (1848-1884), entièrement dédié à l'artiste peintre meusien.  le musée des fortifications qui a pour vocation de faire connaître la richesse, la diversité et l'intérêt du patrimoine meusien dans le domaine de l'architecture militaire. La « Ville-Haute », à lintérieur des Remparts, a été jusquà la fin du XIXe siècle le centre administratif de la cité. Après cette époque, la « Ville-Basse » se développe à son détriment, faisant delle, avec son église de 1757, un lieu de tourisme remarquable pour la qualité de ses fortifications. Montmédy a développé, et entend la poursuivre, depuis quelques années, une politique hardie de sauvegarde et de valorisation de son patrimoine historique.  La citadelle de Montmédy a été classée aux M.H. en 1991. Elle est ouverte au public et se visite.","habitants":"Montmédy; Séré de Rivières                                                           Laval ;Guillaume Crochart\r\n        \r\n        \"","divers":"Montmédy                                                                              gps : 49° 30' 57,75\" Nord, 5° 21' 35,41\" Est                               citadelle gps 49° 30' 58\" nord, 5° 21' 35\" est","gps":"49° 30' 57,75\" Nord, 5° 21' 35,41\" Est","images":["../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_citadelle_1.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_citadelle_2.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_citadelle_3.jpg","../../jctruffet.com/image/image_55/55_Montm%c3%a9dy_citadelle_4.jpg"]},"Consult_chateau_formulaire2981":{"id":"Consult_chateau_formulaire2981","dept":"55","canton":"Ligny-en-Barrois","commune":"Chanteraine","nom":"Morlaincourt","type":"Manoir","periode":"XVI-XVIII","histoire":"MORLAINCOURT, au XIIIe siècle, Morlaincourt a été le centre dun fief important appelé Malberg. Le premier seigneur connu, Evrard, chevalier de Vargnenciaux, était vassal de comte de Ligny. Le château a été rasé en 1544 par les soldats de Charles Quint venus assiéger Ligny en Barrois. Possession de Bernard de Malberg et Elisabeth de Merode, l'édifice a été acheté par Vanault Collesson, juriste et conseiller à la chambre des comtes de Bar, qui construisit un nouveau château, terminé en 1577. Au XVIIIe siècle, les jardins ont été remplacés par des communs, et les cuisines, situées au sous-sol, ont été remontées le long de la rue et reliées au château par une pièce. Ensuite le fief a été acheté peu avant la Révolution par le fermier général de Ligny, Jean Brigeat de Lambert. Le château a été occupé par les prussiens en 1870, puis par les américains en 1917-1919, et par ladministration allemande pendant la deuxième guerre mondiale.  Éléments protégés MH : les façades et les toitures, le grand salon au rez-de-chaussée : inscription par arrêté du 16 novembre 1988.  Aujourd'hui propriété de mademoiselle Brion.","architecture":"MORLAINCOURT est un château bâti à Chanteraine, la construction du château de Morlaincourt date du 3e quart du XVIe, du XVIIIe, du XXe siècle, de plan rectangulaire à trois niveaux toit en croupe, l'édifice est  flanqué de quatre tourelles  rondes aux angles toit en poivrière. Le château est inscrit partiellement aux M.H. depuis e 16/11/1988 pour ses façades, ses toitures, et le grand salon du rez de chaussée.","habitants":"Famille de Bernard de Malberg \r\n        \"","divers":"Morlaincourt  GPS : 48° 40' 48\" Nord, 5° 22' 15\" Est","gps":"48° 40' 48\" Nord, 5° 22' 15\" Est","images":["../../jctruffet.com/image/image_55/55_Morlaincourt_1.jpg","../../jctruffet.com/image/image_55/55_Morlaincourt_2.jpg"]},"Consult_chateau_formulaireea56":{"id":"Consult_chateau_formulaireea56","dept":"55","canton":"Revigny-sur-Ornain","commune":"Nettancourt","nom":"Nettancourt","type":"Château","periode":"XIX","histoire":"NETTANCOURT, le château de Nettancourt fut reconstruit au XIXe siècle.  En mai 2015, Frédéric et Aïcha ont acheté le château Nettancourt. Avec leurs enfants Daan et Bo, ils ont décidé de quitter la Belgique pour rénover ce château, est entouré par le village idyllique, mais sur sa propre île. La paix, le silence, la nature ici sont les plus grands atouts. Cette belle propriété est un authentique château installé au coeur du village. Vous vous sentirez immédiatement chez vous dans de belles suites entièrement rénovée. Vous disposerez d'une piscine, d'une terrasse solaire, d'une aire de jeux, d'un terrain de pétanque, jeux pour les enfants et bien d'autres équipements qui rendront votre séjour inoubliable, vous pourrez profiter le soir de notre table d'hôtes.  Chambres d'hôtes.","architecture":"NETTANCOURT, en 2015, Frédéric et Aïcha ont  acheté le château  de Nettancourt. Un rêve est devenu réalité. Avec leurs enfants Daan et Bo, ils ont décidé de quitter la Belgique pour commencer un charmant chambre d'hôtes en France. Dans de nombreuses villes de la région tels que Bar le Duc, Verdun, Reims, Metz, Nancy . Château de Nettancourt est la base idéale pour découvrir toutes ces belles villes. Mais les amoureux de la nature seront comblés par sa traction. . Ce qui est connu comme la plus verte du  département en France. De vastes champs, les forêts, les lacs, beaucoup de choix pour la marche, le vélo.","habitants":"Famille de Frédéric et Aïcha\r\n        \"","divers":"Nettancourt                                                                                       gps : 48° 52' 33\" Nord, 4° 56' 37\" Est.                                                             gps48° 52' 47\" nord, 4° 56' 18\" est","gps":"48° 52' 33\" Nord, 4° 56' 37\" Est.","images":["../../jctruffet.com/image/image_55/55_Nettancourt_1.jpg"]},"Consult_chateau_formulaire13c8":{"id":"Consult_chateau_formulaire13c8","dept":"55","canton":"Ligny-en-Barrois","commune":"Naix aux forges","nom":"Raffè","type":"Château","periode":"XIX","histoire":"RAFFE, date probablement du milieu du XIXe siècle et devait être la résidence du \"maitre\" des forges dont il reste de beaux vestiges et à propos desquelles internet est également silencieux.                                                             NAIX La cité de Naix  du latin Nasium  est issue du déplacement du site de hauteur de l'oppidum de Boviolles, occupé par le peuple gaulois des Leuques, vers la vallée toute proche et se développa rapidement dès le début de l'occupation romaine. Cette ville gallo-romaine, dont les vestiges s'étalent actuellement sur le territoire de trois villages fait l'objet en ce moment de nombreuses recherches et investigations dans le domaine archéologique et fournit de nombreux arguments pour considérer et classer celle-ci comme chef-lieu de cité au haut-Empire.","architecture":"RAFFE, corps de logis central rectangulaire  à deux niveaux  sur soubassement lucarnes sur combles à toit brisé, le corps de logis est accolé de pavillons latéraux rectangulaire de même hauteur  C'est devenu une maison de vacances. Le château de la Raffé dispose d'une terrasse avec vue sur la rivière. Il date de XIXe siècle. Il offre une vue sur le jardin. Vous pourrez en outre pratiquer des activités variées dans les environs.  Cette maison de vacances vous laissera un souvenir impérissable, tant l'accueil chaleureux de son propriétaire vous impressionnera ainsi que ses conseils pour découvrir la région.","habitants":"Personnages industriels\r\n        \"","divers":"Raffé                                                                                                      gps    : 48° 38' 14\" Nord, 5° 22' 40\" Est","gps":"48° 38' 14\" Nord, 5° 22' 40\" Est","images":["../../jctruffet.com/image/image_55/55_Raff%c3%a9_1.jpg","../../jctruffet.com/image/image_55/55_Raff%c3%a9_2.jpg","../../jctruffet.com/image/image_55/55_Raff%c3%a9_3.jpg"]},"Consult_chateau_formulaireeb21":{"id":"Consult_chateau_formulaireeb21","dept":"55","canton":"Commercy","commune":"Geville","nom":"Rangeval","type":"Château","periode":"XII-XVIII","histoire":"RANGEVAL. l'abbaye de Rangéval est une abbaye de Prémontrés, fondée au XIIe siècle par Hadwige, femme de Thierry d'Apremont, de l'ordre des Prémontrés. Elle reçut des confirmations pontificales en 1179 et en 1186. L'abbaye s'enorgueillissait de posséder des reliques insignes parmi lesquelles les langes de l'Enfant-Jésus, le chef de l'apôtre saint-Matthieu, un cilice de sainte-Marie Madeleine et des ossements de saint-Christophe. Elle est établie dans un vallon, au pied des côtes de Meuse, sur la route de Commercy à Toul. Elle était placée sous le double patronage de Notre-Dame et de sainte-Madeleine. L'église abbatiale fut démantelée à la Révolution. La Révolution supprima l'abbaye de Rangéval et vendit tous ses biens (1791), entre autres la chapelle de Jévaux, qui fut démolie. Mais l'abbaye conserve toujours son demi-cloître ainsi qu'un logis classique. Philippe de Neuville gérant.","architecture":"RANGEVAL, les bâtiments actuels datent du début du XVIIIe siècle et sont un exemple d'architecture classique. En 1729, l'architecte Nicolas Pierson supervisa le début de la reconstruction de Rangéval : église, bâtiment conventuel et logis abbatial (deux ailes en équerre, cloître voûté d'ogives, salle capitulaire à colonnes corinthiennes, sacristie à deux nefs voûtées en étoile, réfectoire à voûtes d'ogives en arc brisé, grand escalier à colonnes ioniques, cheminées), murs d'enceinte, communs. L'abbaye a été classée monument historique par arrêté du 12 juillet 1965. Il est possible de la visiter lors des journées du patrimoine, ainsi que lors des journées \"Rendez-vous aux jardins\".  Le mur d'enceinte parfaitement conservé d'une hauteur impressionnante (3 à 4 mètres) est réalisé en gros blocs de pierre taillée dont certaines sont marquées d'une petite croix gravée. Outre la parc, Il ne subsiste que deux ailes en équerre présentant des restes du cloître, la salle capitulaire, deux sacristies et un escalier.","habitants":"Thierry d'Apremont\r\n        \"","divers":"Rangéval\r\ngps 48° 45' 44\" nord, 5° 43' 25\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Rang%c3%a9val_1.jpg","../../jctruffet.com/image/image_55/55_Rang%c3%a9val_2.jpg"]},"Consult_chateau_formulairefd1b":{"id":"Consult_chateau_formulairefd1b","dept":"55","canton":"Clermont-en-Argonne","commune":"Rarécourt","nom":"Rarécourt","type":"Château","periode":"XIV-XVII","histoire":"RARECOURT  appelé le château de la Vallée est un chateau bâti à Rarécourt, il date du XVIIe siècle. Au XIVe siècle, la maison forte appartient à la famille Rarécourt de la vallée de Pimodan. Une nouvelle maison forte fut édifiée, en pierre de taille, sans doute au XVIIe au XVIIIe siècle, à l'emplacement de l'ancienne maison forte. On découvre désormais un bâtiment avec une tour, un porche en plein cintre et une tour centrale. Le musée de Maison Forte : A partir de 1870, une laiterie s'y installa. En 1969, elle fut transformée en musée par son propriétaire. Elle abrite plus de 800 pièces de faïences et poterie des Islettes, Waly, Lavoye, Rarécourt, Salvange, Froidos. Une collection d'archéologie, de parchemins, d'autographes et de souvenirs de l'époque révolutionnaire complète le musée.","architecture":"RARECOURT, la famille de Rarécourt de La vallée de Pimodan, usuellement appelée la famille de Pimodan, est une famille française d'extraction chevaleresque, attestée en 1363, titrée duc pontifical au XIXe siècle. Le château de Rarécourt se visite . Celui-ci date du XVIIe siècle. Dans cette maison forte se trouve le musée des faïences d'Argonne,  il a été installé dans les murs du château. Le musée de la faïence est ouvert au public.","habitants":"Famille Rarecourt \r\n        \"","divers":"Château de Rarécourt à Rarécourt","gps":"","images":["../../jctruffet.com/image/image_55/55_Rar%c3%a9court_1.jpg"]},"Consult_chateau_formulaire5944-2":{"id":"Consult_chateau_formulaire5944-2","dept":"55","canton":"Montmédy","commune":"Rupt sur Othain","nom":"Rupt_sur_Othain","type":"Manoir","periode":"XVIII","histoire":"RUPT sur OTHAIN, l'ensemble actuel est le résultat de différentes campagnes de constructions et reconstructions entre la fin du XVIIIe siècle et le début du XXe siècle. Le logis est construit en 1782. A l'avant du château est aménagée une cour pavée close par un mur et un portail alors qu'à l'arrière est dessiné un jardin à la française encore visible sur les plans du cadastre de 1847. En 1805, une grande ferme de plan carré est construite au nord. Elle est alors reliée au château par une aile en retour qui ferme la cour côté Est.  Les parties suivantes du château de Rupt-sur-Othain, localisées sur le plan annexé à l'arrêté.","architecture":"RUPT sur OTHAIN, les façades principales, couronnées par un fronton triangulaire percé d'un oculus ovale, sont ordonnancées à sept et huit travées de fenêtres aux 1er et 3ème niveaux, de fenêtres à linteau en arc segmentaire au deuxième niveau. Sur toute la largeur de la façade nord, une terrasse compense la dénivellation du terrain descendant vers l'Othain.  Ce village, à l'origine annexe de Grand-Failly, était jadis divisé entre les bans des écuyers de Failly et les dames de Juvigny.\r\nUn château féodal y était établi. Aujourd'hui, il n'existe plus qu'un simple manoir, reconstruit en 1782, à la façade sobre, surmontée d'un fronton triangulaire, agrandi, au cours des remaniements du XIXe siècle, d'un bâtiment réservé aux offices, et encadré, sur les côtés, d'une ferme et de communs. La demeure (avec grand parc à l'arrière) est abritée derrière de hauts murs. Avant 1790, Rupt-sur-Othain faisait partie du Luxembourg français (prévôté et bailliage de Marville). Était rattaché au diocèse de Trèves, Archid de Longuyon et Doy de Juvigny\r\nÉléments protégés MH : les parties suivantes du château de Rupt-sur-Othain : le logis, l'exploitation agricole, les façades et les toitures des communs; le parc: inscription par arrêté du 7 mai 2015.","habitants":"écuyers de Failly \r\n        \"","divers":"Rupt gps 49° 25' 11\" nord, 5° 29' 38\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Rupt_sur_Othain_1.jpg","../../jctruffet.com/image/image_55/55_Rupt_sur_Othain_2.jpg"]},"Consult_chateau_formulaire108b":{"id":"Consult_chateau_formulaire108b","dept":"55","canton":"Dieue-sur-Meuse","commune":"Sampigny","nom":"Sampigny_Meuse","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article Sampigny, Sorbey et Clos   SAMPIGNY, la naissance illégitime de Louis de Guise, quelques jours seulement avant que son père naturel fut assassiné à Blois, n'empêcha nullement Louis de Guise d'avoir sa place dans le jeu matrimonial et politique de la famille de Lorraine. Il fut élevé à la cour de Lorraine, proche du duc Henri II et l'un de ses favoris, Louis de Guise fut d'abord presser pour épouser sa fille la princesse et future duchesse Nicole, mais, la noblesse lorraine s'y opposa, trouvant qu'un bâtard de la maison de Guise était indigne d'accéder au trône ducal. Il épousa alors, en 1621, Henriette de Vaudémont, petite-fille du duc Charles III, tandis que le frère d'Henriette, futur duc Charles IV, épousait, lui-même, Nicole. Louis possédait la baronnie d'Ancerville. En 1629, Charles IV, son beau-frère devenu duc de Lorraine voulut donner à sa sur Henriette de Lorraine, le titre de princesse et érigea en principauté, pour elle et son époux, les seigneuries de Phalsbourg et Lixheim. Callot grava le portrait équestre de Louis de Guise, sous le titre de prince de Phalsbourg. Louis posséda les titres de comte de Boulay, de Bitche et d'Hombourg, de baron d'Aspremont, de Neufchâteau et de Sampigny. Le vieux château de Sampigny, étant délabré, Louis et Henriette firent entreprendre, en dehors du périmètre de l'ancien édifice, la construction d'un nouveau château digne de leur rang. Du même tempérament fantasque que son frère Charles IV, Henriette était inconstante ; Louis s'éloigna d'elle pour soutenir le duc, engagé en Bavière contre les Suédois.","architecture":"SORBEY ; fort militaire.                                                                                                             SAMPIGNY,  le prince de Phalsbourg fut tué, en 1631, à Munich. Plus tard, Henriette fit ramener le corps de son mari à Sampigny, où il fut inhumé dans léglise Sainte-Lucie. Les deux maris suivants d'Henriette de Lorraine portèrent également le titre de princes de Phalsbourg. En 1756  fabrique de Voiture et en 1815 dépot de cavalerie jusqu'à son incendie en 1914 avant d'être  revendut à des particuliers, l'édifice de plan en U, flanqué à l'Est de deux haut pavillons de plan bastionné à trois niveaux, autrefois coiffées de bulbes octogonaux.  l'édifice scandée de chaînes d'angle en bossages, son élévation générale est à deux niveaux fenêtres du premier étage sont coiffées  de frontons courbes , tandis que le deuxième niveaux comporte des lucarnes pendantes à fronton triangulaires .                                                                                                                CLOS, situé en haut du village, fut construit pour le président Raymond Poincaré à Sampigny, le village de sa mère qui y possédait une maison. Il a un style néo-Louis XIII en brique et pierre, où les multiples volumes et les formes variées des toitures forment un ensemble plutôt pittoresque, tempéré par sa discrète décoration. Endommagé, lui aussi, pendant la grande guerre, le château du Clos fut alors restauré. Conformément aux dernières volontés de Raymond Poincaré, un orphelinat de garçons y fut créé le 1/10/1947, a fonctionné jusqu'en 1981. Il est devenu la propriété du département de la Meuse et abrite maintenant le musée Raymond Poincaré. Le château du Clos appelé le Clos Poincaré a reçu le Label « Maison des Illustres » en 2011.","habitants":"Louis de Guise                                                                          Président Raymond Poincaré \r\n        \"","divers":"Clos  grav-7                                                                                   gps : 48° 49' 39\" Nord 5° 30' 27\" Est                                                                   48° 49' 32\" nord, 5° 30' 42\" est                                                Henriette grav-                                                                                             7 Gps : 48° 49' 24,58\" Nord, 5° 30' 49,26\" Est                           Pointcarré grav 4- 5-6                                                                              gps : 48° 49' 39,24\" Nord, 5° 30' 27,69\" Est","gps":"48° 49' 39\" Nord 5° 30' 27\" Est","images":["../../jctruffet.com/image/image_55/55_Sampigny_clos_1.jpg","../../jctruffet.com/image/image_55/55_Sampigny_clos_2.jpg","../../jctruffet.com/image/image_55/55_Sampigny_clos_3.jpg","../../jctruffet.com/image/image_55/55_Sampigny_clos_4.jpg","../../jctruffet.com/image/image_55/55_Sampigny_clos_5.jpg","../../jctruffet.com/image/image_55/55_Sampigny_clos_6.jpg","../../jctruffet.com/image/image_55/55_Sampigny_clos_7.jpg"]},"Consult_chateau_formulaire9bb5":{"id":"Consult_chateau_formulaire9bb5","dept":"55","canton":"Ancerville","commune":"Stainville","nom":"Stainville","type":"Château","periode":"XVI","histoire":"Trois châteaux dans cet article ; Choiseul, Condé et des Douanes.                                                                                                     CHOISEUL, le château de Choiseul fut construit au XVIe siècle, propriété de lancienne et illustre maison de Stainville, connue déjà au XIIIe siècle. En 1350, ce château était féodal. Reconstruit puis remanié à la Renaissance, il adopte alors une toiture percée de lucarnes ouvragées. En 1364, le sire Perrinet de Stainville se reconnaît homme-lige du duc de Bar. Baronnie érigée en marquisat en 1722. Louis XV donne la baronnie de Beurey, la terre de Mussey et la seigneurie de Bazincourt en 1748 à Etienne François de Choiseul Stainville neveu dEtienne de Stainville et futur ministre des affaires étrangères. Puis celui-ci érige ce marquisat en duché-pairie de France pour  Choiseul Etienne -François, duc de Stainville.\r\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 10 juin 1932.","architecture":"CONDE en Barois, vous y trouverez des chambres d'hôtes.                                                                                                                       DOUANES ou des ferme à Ligny en Barrois.L'hôtel des Douanes appelé aussi l'hôtel des Fermes à Ligny-en-Barrois  il est inscrit partiellement aux M.H. depuis 1928, pour sa façade sur rue, sa façade sur cour et ses balcons en fer forgé.","habitants":"Famille de Stainville\r\n        \"","divers":"Quatre châteaux                                                                       Choiseul, grav 1 à 4                                                                              gps   48° 39' 14\" nord, 5° 11' 05\" est                                                    Condé gps : 48° 52' 05\" Nord, 5° 10' 03\" Est                                                 Douanes gps : 48° 52' 05\" Nord, 5° 10' 03\" Est","gps":"48° 52' 05\" Nord, 5° 10' 03\" Est","images":["../../jctruffet.com/image/image_55/55_Stainville_1.jpg","../../jctruffet.com/image/image_55/55_Stainville_2.jpg","../../jctruffet.com/image/image_55/55_Stainville_3.jpg","../../jctruffet.com/image/image_55/55_Stainville_4.jpg"]},"Consult_chateau_formulairedff0-3":{"id":"Consult_chateau_formulairedff0-3","dept":"55","canton":"Stenay","commune":"Stenay","nom":"Stenay","type":"Château","periode":"XV-XVII-XX","histoire":"Deux châteaux dans cet article Bronelle et Cerisy.                                      BRONELLE  la construction du château de Bronnelle date du XVe siècle. A partir de 1463, il entre en possession de François dOrnes et de ses descendants, bien que le domaine soit repris par le premier-né en mariage avec la famille Aboncourt et Lioncourt, et en 1575 avec Nicaise de Tige de Montquintin. Le domaine est ensuite transmis à la famille Chamisso, seigneurs de La Chapelle et Andeanne par le mariage de Nicole de Tige avec Jacques de Chamisso en 1612. Il est resté dans la famille jusquen 1700 environ lorsque Bronelles est racheté par Jean-Baptiste de Fenerolles, gardien du prince de Condé, qui reconstruisit la chapelle et agrandit les dépendances. En 1708, sa fille Marie-Francoise-Christine épousa François de Maret de la Loge, commandant et gardien du Clermontois pour le prince de Condé. Le château resta dans la famille de Maret jusquà la Révolution où il fut exproprié et vendu à Jean-Pierre Gilet, né à Brouennes. Fils de lancien fermier du château, capitaine de gendarmerie, il se distingue par la prise du général Pichegru lors de la bataille de Cadudal en 1804. Vers 1830, le domaine est vendu à Jean-Baptiste Jamin. Né à Villecloye, il est proclamé baron de lEmpire en 1811 et Pair de France en 1846. Il prend une part active à la lutte de lAlgérie.Le château a été rendu à la famille de Maret en 1880. Madame Brucelles, née Autusta-Caroline de Maret de la Loge, a racheté Bronelle.","architecture":"le château des Tilleuls (1876/1877). hôtel de ville.                                                                       BRONELLE, le château, reconstruit au XVIIe siècle, était dans un état de délaissement. Il a été restauré et complètement adapté au style du début du XVIe siècle, ce qui en fait lun des plus beaux châteaux de la région.                                                                                                                    CERVISY, la construction du château de Cervisy date du XVIIe siècle, construit de 1876 à 1877, partiellement détruit, en 1940, rasé au lendemain de la Libération. Il fut reconstruit ensuite plus modestement.","habitants":"Bronelle; de François dOrnes et  famille Chamisso\r\n        \"","divers":"Bronelle grav -1-2                                                                        GPS : 49° 29' 27\" Nord, 5° 11' 11\" Est                                                                 Cervizy  grav-3                                                                                    GPS : 49° 29' 27\" Nord, 5° 11' 11\" Est","gps":"49° 29' 27\" Nord, 5° 11' 11\" Est","images":["../../jctruffet.com/image/image_55/55_Stenay_1.jpg","../../jctruffet.com/image/image_55/55_Stenay_2.jpg","../../jctruffet.com/image/image_55/55_Stenay_3.jpg","../../jctruffet.com/image/image_55/55_Stenay_4.jpg","../../jctruffet.com/image/image_55/55_Stenay_5.jpg"]},"Consult_chateau_formulaire0caf":{"id":"Consult_chateau_formulaire0caf","dept":"55","canton":"Ancerville","commune":"Tronville en Barrois","nom":"Tertre_55","type":"Château","periode":"XVIII","histoire":"TERTRE, au milieu du XVIIIe siècle, Dom Calmet relevait que le roi Stanislas  est seul seigneur de la partie qui est du comté de Ligny et M. du Tertre est seigneur de l'autre partie, qui a le titre de baronnie et ci-devant de prévôté, du bailliage du Bar. Le roi et M. du Tertre  y ont chacun un château. Conseiller et avocat général à la chambre des comptes de Bar, François Vyart devint conseiller d'état et procureur général . C'est à ces titres que, les 26 et 27 décembre 1721, le duc Léopold érigea en sa faveur Tronville en Baronnie. Parmi ses enfants, Thérèse épousa vers 1720 Charles du Tertre, conseiller au parlement de Metz. C'est certainement à l'initiative de Charles du Tertre alors âgé de 39 ans que fut élevé, en 1732 le château actuel. Thérèse Vyart lui survécut de longues années, puisqu'elle décéda en 1782. De leur fils Antoine-Louis, disparu en 1789.","architecture":"TERTRE,  vendu comme bien national en 1795, le château fut racheté le 20 février 1859 par la commune qui en fit un presbytère, puis une perception, jusqu'à ce que la mairie s'y installe enfin, le 2 novembre 1983. Précédé par une cour longtemps bordée d'une entrée monumentale dont subsiste un pavillon, le château est un corps rectangulaire d'un niveau unique, couvert d'une haute toiture d'ardoises à croupes. Sa façade principale, au nord-est, est construite en pierre de taille que percent quatre hautes fenêtres au linteau en arc segmentaire, encadrant un avant-corps central à fronton triangulaire de trois baies en plein cintre, que précède un escalier à deux volées latérales. L'ordre toscan des pilastres, soutenant un entablement bombé, les agrafes en mascaron à têtes féminines des baies et la date \"1732\" en petits chiffres espacés agrémentent cette noble façade. Les autres façades, en mllons crépis, sont plus sobrement traitées. Au nord-ouest, sur cour, un corps de dépendances de deux niveaux de fenêtres rectangulaires prolonge le logis.\r\nÉléments protégés MH : le château en totalité, ainsi que les façades et les toitures de ses dépendances : inscription par arrêté du 7 avril 1998.","habitants":"Famille de  Charles du Tertre\r\n        \"","divers":"Tertre gps 48° 43' 14\" nord, 5° 16' 49\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Tertre_55_1.jpg","../../jctruffet.com/image/image_55/55_Tertre_55_2.jpg"]},"Consult_chateau_formulaire127f":{"id":"Consult_chateau_formulaire127f","dept":"55","canton":"Dieue-sur-Meuse","commune":"Thillombois","nom":"Thillombois","type":"Château","periode":"XIX","histoire":"THILLOMBOIS,  est un château bâti à Thillombois. La construction du château de Thillombois date du XIXe siècle, construit à la fin du Moyen Age transformé par la suite, a sauvé ses vieilles pierres grâce aux colonies de vacances. Aujourdhui, le site revit et  restera au sein de la famille Nettancourt-Vaubécourt jusqu'en 1961. Il est devenu un pôle danimations. Le château de Thillombois est inscrit aux M.H. depuis 1995.","architecture":"THILLOMBOIS, acquis en cette année 1961 par la commune de Mantes-la-Ville (78), il devient un centre de colonie de vacances. Le centre tombe en désuétude dans les années 1980. Il est laissé à son sort jusqu'aux débuts des années 1990, date à laquelle il est pris en location par l'association culturelle Connaissance de la Meuse. Cette dernière le restaure, le meuble et le fait vivre grâce à différentes manifestations. En 2010 l'association en devient propriétaire, afin que cet édifice reste dans le domaine public. \r\nPour la 21ème édition, le château revêtira son plus bel apparat et scintillera de mille feux pour fêter la Saint-Nicolas,","habitants":"famille Nettancourt-Vaubécourt\r\n        \"","divers":"Thilombois grav 1 à 5                                                                            gps  48° 57' 23\" nord, 5° 23' 55\" est                                                 gps : 49° 04' 38\" Nord, 5° 07' 28\" Est","gps":"49° 04' 38\" Nord, 5° 07' 28\" Est","images":["../../jctruffet.com/image/image_55/55_Thillombois_1.jpg","../../jctruffet.com/image/image_55/55_Thillombois_2.jpg","../../jctruffet.com/image/image_55/55_Thillombois_3.jpg","../../jctruffet.com/image/image_55/55_Thillombois_4.jpg","../../jctruffet.com/image/image_55/55_Thillombois_5.jpg"]},"Consult_chateau_formulaire74a0":{"id":"Consult_chateau_formulaire74a0","dept":"55","canton":"Ancerville","commune":"Haironville","nom":"Varenne_55","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article Varenne et la Tour.                                La VARENNE date des XVIe, XVIIIe, XIXe siècles. Pierre Merlin, récompensé de son commerce par mer est nommé prévôt de la baronnie d'Ancerville. Il se trouve alors que sa maison d'Haironville n'est plus en accord avec ses nouvelles dignités et fait faire construire sur son emplacement, en 1506, le corps de logis principal de l'actuel château. Au moment de la Révolution, le château de la Varenne appartient à Didier-Charles Lallemant, procureur syndic du District de Bar. Aujourd'hui, le château de la Varenne est habité par la famille Pétin. Pierre Merlin descend de Philippe (originaire de la province de Calabre) qui fut anobli, vers 1430, par le roi René, duc de Lorraine. Il a épousé mademoiselle Godet, sur du grand argentier du roi François 1er. Leur fille Louise, épouse. Philippe d'Anglure était lieutenant général du roi de France au XVIIIe siècle.                                                                                                la TOUR  à Varenne, cette demeure a appartenu au XVIIe siècle et pendant quatre générations à la famille Joleaud des Forges. En 1642, Jean-Baptiste Joleaud des Forges a acheté cette ferme fortifiée. Alors écuyer du roi, le propriétaire la transformée en château. Quatre générations plus tard, son arrière-petit-fils en ayant hérité, il décède brutalement en ayant laissé par testament le château à sa fiancée. Celle-ci épousera Jean-Baptiste Bouthier de Rochefort en 1770. Le château changera de famille, le propriétaire choisissant alors le nom de Bouthier de la Tour. Son petit-fils, prénommé également Jean-Baptiste, en héritera en 1848. Directeur de la ferme école de Saint-Aubin-en-Charolais jusquen 1874, on lui doit la technique dengraissement des bovins à létable, à lépoque révolutionnaire. Il a reçu la Légion dhonneur pour son rôle dans le développement de lélevage de la race bovine charolaise.","architecture":"La VARENNE, édifié en 1506, cest le plus ancien château dHaironville. Il fut construit à lemplacement dune maison forte par Pierre Merlin, à la veille de la Révolution, il appartenait à Didier Charles Lallement, procureur syndic du district de Bar. Sa fille, la comtesse de Beurges, le vend avec bois et fermes dans la première moitié du XIXe siècle à madame Leblanc dont la petite fille épousera monsieur de Massy, préfet de la Meuse de 1877 à 1882, puis il passe dans la famille Pétin par son petit fils, le général Pétin.  Le parc du château de la Varenne est un des fleurons de la région. Dominé par le château du XVIe-XVIIIe siècle, de pur style Renaissance, le parc remanié dans un style romantique est ponctué de bosquets et ceinturé d'un boisement plus ou moins dense qui gravit les coteaux situés de part et d'autre de la composition. Promenade, à l'ombre, le long de la Saulx, bancs de pierre et jolis points de vue sur la rivière ou sur le château, ! Un parcours botanique indique le nom des arbres les plus intéressants. Certains ont plus de 100 ans, d'autres ont été replantés après la tempête de décembre 1999. Sur son parcours, plusieurs bancs de pierre invitent au repos, face à des vues choisies.Éléments protégés MH : les façades et les toitures ; la cour d'honneur et la balustrade ; le vestibule et l'escalier intérieur avec sa rampe fer forgé : classement par arrêté du 12 octobre 1972. Le parc du château : inscription par arrêté du 29 juin 1993.","habitants":"Famille de Philippe Merlin\r\n        \"","divers":"Deux châteaux , Varenne et la tour grav-5.                            GPS : 48° 41' 12\" Nord, 5° 05' 07\" Est                                                Gps 48° 41' 10\" nord, 5° 04' 58\" est                                                        tour l'horloge Gps 49° 13' 37\" nord, 5° 02' 01\" est","gps":"48° 41' 12\" Nord, 5° 05' 07\" Est","images":["../../jctruffet.com/image/image_55/55_Varenne_55_1.jpg","../../jctru
