const FULL={"Consult_chateau_formulaireff8e":{"id":"Consult_chateau_formulaireff8e","dept":"55","canton":"Ligny-en-Barrois","commune":"Abainville","nom":"Abainville","type":"Château","periode":"XVIII","histoire":"ABAINVILLE, construit dans le dernier quart du XVIIIe siècle, pour la famille Circourt de Gérauvilliers, vendu comme bien national en 1794.","architecture":"ABAINVILLE, cet édifice est composé d'un sous-sol et d'un rez-de-chaussée. Le gros-oeuvre est en calcaire, en moellon et enduit, avec des élévations ordonnancées surmontées de toit à longs pans. Sa croupe est recouverte de tuiles plates. Le Château d'Abainville est privé, fermé au public.","habitants":"famille Circourt de Gérauvilliers\r\n        \"","divers":"Abainville                                                                                           gps: 48° 31' 56\" Nord, 5° 29' 43\" Est","gps":"48° 31' 56\" Nord, 5° 29' 43\" Est","images":["../../jctruffet.com/image/image_55/55_Abainville_1.jpg"]},"Consult_chateau_formulairefdd3":{"id":"Consult_chateau_formulairefdd3","dept":"55","canton":"Bouligny","commune":"Arrancy sur Crusne","nom":"Arrancy_Crusne","type":"château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Arancy et Sorbey.                                                             ARRANCY sur CRUSNE, le château actuel a été édifié sur l'emplacement de l'ancien château des prévôts détruit en 1756. Pendant la première guerre mondiale le 12e groupe de brancardiers divisionnaires s'installe au château d'où seront évacués les blessés.   Éléments protégés MH : les façades et les toitures du château, du pavillon sud et de la grange; le mur de clôture; la cour pavée; la cheminée de la cuisine au rez-de-chaussée : inscription par arrêté du 11 octobre 1982.                                                                                           A cinq K.M. au sud ouest SORBEY, La maison de nom et d'armes de Sorbey est d'ancienne chevalerie. L'héraldiste du XVIIe siècle Matthieu Husson L'Escossois la fait remonter, mais sans en donner la date, à Thiébault de Sorbey, chevalier, cette seigneurie fut transmise par Jeanne de Sorbey à la maison de Lavaulx par son mariage avec Wary de Lavaulx. Jean de Lavaulx, son fils, n'eut qu'une fille, Marie, qui en hérita et s'unit avec Guillaume de Croix.  fils de Tassinet de Croix et de Jeanne des Armoises, dont Thomas, et Louis qui vendit cette terre a Arnould de Gorcy, rachetée par Jean de Croix pour en avantager les sieurs de La Fontaine et de L'Escamoussier. La maison de Sorbey était éteinte au XVIIe siècle. On en compte plusieurs branches ou maisons distincte, toutes de l'ancienne chevalerie et qui suivent.","architecture":"ARRANCY sur CRUSNE  La construction du château date du XVIIe siècle. Selon Joffin, l'ancien  se trouvait dans l'enceinte de l'église. Le château d'Arrancy-sur-Crusne actuel a été édifié sur l'emplacement de l'ancien château des Prévôts, détruit en 1756. Le corps de bâtiment central très sobre de ligne est flanqué, de chaque côté, d'une tour carrée. La toiture est en ardoise. Une encoche pratiquée à l'angle extérieur de la tour droite est décorée d'une pierre sculptée aux traits du général Charles de Bollémont. A l'intérieur, se trouve une taque de cheminée qui porte la date de 1685. Des pierres de différents aspects utilisées dans les murs font penser que des restaurations ont été effectuées, à différentes époques. Le château d'Arrancy-sur-Crusne est inscrit aux M.H. depuis 1982.","habitants":"Arancy; Général Charles de Bollémont   Thiébault de Sorbey    \r\n        \"","divers":"Deux châteaux Arancy grav-1 et Sorbey grav-2.                               gps : 49° 24' 47,24\" Nord, 5° 39' 26,77\" Est","gps":"49° 24' 47,24\" Nord, 5° 39' 26,77\" Est","images":["../../jctruffet.com/image/image_55/55_Arrancy_Crusne_1.jpg","../../jctruffet.com/image/image_55/55_Arrancy_Crusne_2.jpg"]},"Consult_chateau_formulaireef44":{"id":"Consult_chateau_formulaireef44","dept":"55","canton":"Bar le Duc","commune":"Bar le Duc","nom":"Bar_le_Duc","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux dans cet article; Bar le  Duc et Mauvages.                                                                                                                                              BAR le DUC  Une maison forte existait déjà à Jametz au XIVe siècle, elle appartenait aux seigneurs de Sedan, de la famille des La Marck, elle résista victorieusement aux assauts des troupes de Charles Quint en 1521 , au XVIe siècle, les princes de Sedan se convertirent au protestantisme et Jametz devint une citadelle du calvinisme, pour la réduire, l'évêque de Verdun, le cardinal de Vaudémont fit appel au duc Charles III de Lorraine, durant le XVIe siècle, Jametz vit s'élever un château particulièrement puissant en partie réalisé par Erard de Bar Le Duc, ingénieur du prince de Sedan ; la ville elle-même, au nord du château, s'était entourée d'une enceinte en partie bastionnée ; le siège de Jametz dura vingt mois, en 1588 et 1589 ; la ville se rendit le 29 décembre 1588 et le château le 14 juillet 1589 ; la ville fut démantelée mais les lorrains gardèrent le château qu'il remanièrent, puis ils l'évacuèrent, Jametz revint alors au duc de Montpensier, héritier des La Marck, qui en 1596 la vendit au duc Charles III ; Jametz connut alors une Renaissance, les fortifications du château furent renforcées en 1601, 1602 ; la guerre de Trente Ans fit de Jametz une ville française, sa population fut presque anéantie entre 1636 et 1640.","architecture":"BAR LE DUC , détruit dans sa quasi-totalité en 1670, le château formait un vaste ensemble ceint de murailles et comprenait le logis, des jardins, la collégiale Saint-Maxe, nécropole ducale, les bâtiments canoniaux, et des communs. La salle du trésor des chartes et le Neuf Castel, bâtis sous les principats de René II et de Charles III, abritent aujourd'hui le musée Barrois. Éléments protégés MH : la salle voûtée dite grand trésor des chartes de René II ; la porte nord-ouest : inscription par arrêté du 23 avril 1981.                                                                                                                MAUVAGES,  de taille modeste, le château date du XVIIIe siècle, malgré des allures médiévales. Celui d'origine, édifié au XVe siècle, avait été détruit. En 1628, Antoine de Gâtinois et Renée de Lovigny, sa femme, avaient cédé la forteresse à Charles de Vigneulles, et le nouveau château fut édifié sur son emplacement en 1704 pour Antoinette, fille de Charles. Il ne reste aujourd'hui que le corps de logis, le portail, certaines parties des dépendances et une tour percée d'une canonnière.   Jean-Charles Pellerin (Imagerie d'Épinal) dont le père, Nicolas Pellerin, était originaire de Mauvages. Noël Lancien, compositeur (prix de Rome), directeur de conservatoires et chef d'orchestre, mort à Mauvages en 1999.","habitants":"René II et Charles de Vigneulles, Nicolas Pellerin\r\n        \"","divers":"Trois châteaux ; Bar le  Duc,  et Mauvages grav 1-2-3.  Bar le duc grav_4                                                                                                    gps  48° 46' 18\" Nord, 5° 09' 22\" Est                                                                                                                                                 Mauvages gps: 48° 35' 40\" Nord, 5° 33' 16\" Est","gps":"48° 35' 40\" Nord, 5° 33' 16\" Est","images":["../../jctruffet.com/image/image_55/55_Bar_le_Duc_1_1.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_1_2.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_1_3.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_1_4.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_1_5.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_1_6.jpg"]},"Consult_chateau_formulairecfb5":{"id":"Consult_chateau_formulairecfb5","dept":"55","canton":"Bar le Duc","commune":"Bar le Duc","nom":"Bar_le_Duc_2","type":"Château","periode":"XIV-XIX-XX","histoire":"BAR le DUC, la construction date du début du Xe au XIXe siècle. C'est un château de style Renaissance, perché sur un éperon rocheux, au bout de la Ville Haute, il domine la vallée de l'Ornain et la ville basse. Sur l'ordre du roi de France Louis XIV, le château des Ducs-de-Bar fut démantelé. Il ne reste aujourd'hui plus que le Neuf-Castel,  quelques vestiges de ses fortifications. Le château des ducs-de-Bar servit de lieu d'habitation aux comtes et ducs de Bar, puis, exceptionnellement, de lieu de villégiature aux ducs de Lorraine. Depuis 1970, le Neuf-Castel abrite le musée Barrois.  A été inscrit partiellement aux M.H. depuis le 23/04/1981. Le château des Ducs-de-Bar est inscrit aux M.H. depuis 1981. Il a été restauré en 2011. Il est ouvert depuis au public et se visite.                                                                          L'HOTEL de PREFECTURE, Néo-byzantin, néo-roman, néo-gothique, néo-classique de la Meuse est un hôtel bâti à Bar-le-Duc,  Il se situe sur l'emplacement de l'ancienne commanderie des Antonistes datant du XIVe siècle. La façade de la rue du Bourg, date du XIXe siècle. Elle est de style néo-classique avec un portique à colonne, tandis que la façade sur la place Reggio, date du XXe siècle. Elle est de style Néo-Renaissance. L'hôtel de préfecture de la Meuse a été classé aux M.H. depuis le 30.12.1992. Plus loin, le café des oiseaux possède une façade richement décorée, du XIXe siècle, dans un style Renaissance.","architecture":"BAR-LE-DUC, le quartier Renaissance de Bar-le-Duc constitue le joyau de la ville, une visite lui est consacrée chaque semaine en été. Comment, en effet, passer à côté de ce patrimoine dont la remarquable homogénéité fait sa particularité.\r\nConstruite autour du château, siège des pouvoirs civils et religieux, la ville haute offre une vision emblématique de ce que fut la Renaissance. Laissez-vous ainsi séduire, le temps dune visite, par léglise Saint-Étienne, la place Saint-Pierre, la rue des ducs et la Tour de lHorloge.","habitants":"comtes et ducs de Bar\r\n        \"","divers":"Bar le duc                                                                                      gps : 48° 46' 26,04\" Nord, 5° 09' 29,16\" Est                                Bar le duc  gps  48° 46' 18\" Nord, 5° 09' 22\" Est","gps":"48° 46' 26,04\" Nord, 5° 09' 29,16\" Est","images":["../../jctruffet.com/image/image_55/55_Bar_le_Duc_2_1.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_2_2.jpg","../../jctruffet.com/image/image_55/55_Bar_le_Duc_2_3.jpg"]},"Consult_chateau_formulaire2022":{"id":"Consult_chateau_formulaire2022","dept":"55","canton":"Ancerville","commune":"Bazincourt_Saulx","nom":"Bazincourt","type":"Maison-forte","periode":"XVI","histoire":"BAZINCOURT, Maison-forte dite \"Le Château\", d'origine médiévale, \r\nÉléments protégés MH : la cheminée : classement par décret du 7 novembre 1923. La maison-forte : classement par arrêté du 8 septembre 1967. Le château de Bazincourt-sur-Saulx est la propriété d'une personne privée, fermée au public. Le château de Bazincourt a été classé aux M.H. depuis le 7/11/1923 et le 8/09/1967.","architecture":"BAZINCOURT, c'est une ancienne maison-forte, cette demeure est darchitecture Renaissance, avec ses meneaux, son échauguette ou son escalier circulaire, les formes en reste simples, encore influencées par un Moyen-Âge pas si loin. Ses percements furent remaniés dans les années 1500-1530. A lintérieur de la bâtisse, la grande salle possède des poutres et solives avec ses cheminées Renaissance. La construction du château de Bazincourt-sur-Saulx date du XVIe siècle. La cheminée est protégée aux M.H.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Bazincourt-Saullx                                                                        gps : 48° 40' 30\" Nord, 5° 08' 24\" Est","gps":"48° 40' 30\" Nord, 5° 08' 24\" Est","images":["../../jctruffet.com/image/image_55/55_Bazincourt_Saulx_1.jpg","../../jctruffet.com/image/image_55/55_Bazincourt_Saulx_2.jpg","../../jctruffet.com/image/image_55/55_Bazincourt_Saulx_3.jpg"]},"Consult_chateau_formulaired6e6":{"id":"Consult_chateau_formulaired6e6","dept":"55","canton":"Ligny-en-Barrois","commune":"Dainville-Bertheléville","nom":"Bertheléville","type":"Château","periode":"XVI-XVIII","histoire":"Beaupré et Dainville village proche;  deux châteaux dans cet article Beaupré et Bertheléville                                                                              BEAUPRE, château édifié au début du XIVe siècle pour la famille de Joinville. Au début du XVe siècle, il devient propriété des Haraucourt et au début du XVIe siècle celle des Choiseul Beaupré jusqu'à la fin du XVIIIe siècle. Au siècle suivant, le château passe au comte de Messey et enfin à la famille Gontaut Biron. Le donjon construit au XIVe siècle est repercé  au XVIIIe siècle. Le corps de logis est ajouté dans la première moitié du XVIIIe siècle, transformé et agrandi vers 1823. La ferme date du XIXe siècle. Lavoir construit avant 1835. Puits daté 1755.  Éléments protégés MH : le château et le puits ; le lavoir ; la ferme ; le parc, avec la grotte, l'étang du Fourneau et sa digue, ainsi que l'étang du Petit-Moulin : inscription par arrêté du 31 juillet 1991.                                                                                                BERTHELEVILLE, propriété des Salles jusqu'en 1801, des Germigney jusqu'en 1853, revendu successivement en 1856, 1861, 1865 et 1878. Colombier daté de 1733. Porte de France de la première moitié du XVIIIe siècle. Dépendances agricoles du XVIIIe siècle, agrandies et remaniées dans la première moitié du XIXe siècle. Pont du XIXe siècle. Maisons d'ouvriers du XVIIIe et XIXe siècles liées à la présence d'une forge depuis le XVIIe siècle, et remise en activité au XVIIIe siècle par la famille des Salles, à ses héritiers jusqu'en 1856. Éléments protégés MH : la porte dite Porte de France ; le château ; le colombier : inscription par arrêté du 6 juillet 1990.","architecture":"BEAUPRE à Chassey, cette ancienne maison forte, fut agrandie aux XVIIIe et XIXe siècle. Le corps de logis est ajouté dans la première moitié du XVIIIe siècle, transformé et agrandi vers 1823. Lavoir construit avant 1835.  Éléments protégés MH : le château et le puits ; le lavoir ; la ferme ; le parc, avec la grotte, l'étang du Fourneau et sa digue, ainsi que l'étang du Petit-Moulin : inscription par arrêté du 31 juillet 1991.  Le domaine de Beaupré est inscrit aux M.H, depuis le 31/07/1991. Le château de Beaupré est une propriété privée, fermée au public.                                                                                                                   BERTHELEVILLE, la construction du château date du XVIIIe au XIXe siècle. Bertheléville représenta longtemps, dans la région, l'unique type du vieux domaine féodal et rustique, immense et désert : un château d'aspect campagnard, des cultures, quelques maisons groupées autour d'une église en ruines, une forge sur le ruisseau, avec de grands bois couvrant tout l'horizon, et changera régulièrement de propriétaires ensuite. La présence de cet édifice et le développement important de ses parties communes est dû  à l'activité des forges qui existaient autrefois. Aujourd'hui l'activité n'existe plus mais le patrimoine hérité est d'une qualité remarquable et situé dans un écrin de verdure qui appelle à la sérénité. Cette vaste propriété seigneuriale resta à la famille des Salles, elle fut démembrée en 1869. La masse des forêts fut alors séparée des terres et du village. Le château de Bertheleville a conservé ses dépendances : son colombier, sa porte monumentale, sa forge. Il a été inscrit aux M.H. en 1990.","habitants":"Famille des Choiseul Beaupré                                    Berthéléville Famille des Germigney\r\n        \"","divers":"Beaupré et Bertheléville                                        Berthevillegps : 48° 26' 30\" Nord 5° 30' 37\" Est                                                                     Beaupré  à Chassey                                                                         gps : 48° 27' 21\" Nord, 5° 25' 09\" Est","gps":"48° 26' 30\" Nord 5° 30' 37\" Est","images":["../../jctruffet.com/image/image_55/55_Berthel%c3%a9ville_1.jpg"]},"Consult_chateau_formulaire1829":{"id":"Consult_chateau_formulaire1829","dept":"55","canton":"Revigny-sur-Ornain","commune":"Beurey sur Saulx","nom":"Beurey_Saulx","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Claudot et Contrisson.                 CLAUDOT, ancien château féodal des seigneurs de Beurey et de Chardogne détruit au XVIe siècle, près duquel fut édifié, en 1595, le château Claudot (du nom de son propriétaire au XVIIe siècle). Petit par sa dimension, le château Claudot ne fait pas moins honneur à la tradition barroise, il applique en effet les esthétiques locales en s'inspirant du mouvement renaissance, en utilisant la pierre de savonnière et en adoptant un plan assez simple avec un haut toit à la française. Des échauguettes viennent rappeler le besoin de démonstration de puissance à travers l'imaginaire médiéval. Demeure privée et non accessible au public, le château Claudot est cependant bien visible de l'extérieur.                                                                           A six K.M au nord-est à  CONTRISSON,  l'évêque Charles-Bernard Colin l'avait augmenté d'une magnifique façade, laquelle fut démolie vers 1795. Ce château habité une partie de l'année par l'évêque des Thermopyles, fut vendu par son frère Jean-Antoine Colin à Mr. Moinot-Montigneule. De son habitation, le seigneur se rendait à l'église en traversant le paquis, un jardin appartenant à Mr Sanfaute, le ruisseau du Chevol tout cela sous terre par une allée, malheureusement pas conservée.","architecture":"CLAUDOT, la construction du château Claudot date de la 2ème moitié du XVIe siècle. Construit avec la pierre locale dite de Savonnières, ses ouvertures et ses décors intérieurs ont été mis au goût du jour au XVIIIe siècle. Il est de forme carrée, flanqué d'échauguettes ostentatoires décoratives et coiffé d'un haut toit. C'est un château visible de l'extérieur, en particulier en hiver quand les arbres perdent leurs feuilles. C'est un château inscrit aux M.H. depuis 1989 il est privé, fermé au public. Éléments protégés MH : les façades et les toitures du château Claudot : inscription par arrêté du 20 janvier 1989.                                                      CONTRISSON, la porte d'entrée, en plein cintre, surmontée d'une rangée balustrade à fuseaux en pierre de taille, existe encore aujourd'hui.","habitants":"Famille de Claudot\r\n        \"","divers":"Beureygps : 48° 45' 31\" Nord, 5° 01' 40\" Est                                                              Contrisson  grav 3 -4-5                                                                gps : 48° 48' 12\" Nord, 4° 57' 23\" Est                                                          Claudot grav 1-2 gps   48° 45' 23\" nord, 5° 01' 28\" est","gps":"48° 45' 31\" Nord, 5° 01' 40\" Est","images":["../../jctruffet.com/image/image_55/55_Beurey_Saulx_1.jpg","../../jctruffet.com/image/image_55/55_Beurey_Saulx_2.jpg","../../jctruffet.com/image/image_55/55_Beurey_Saulx_3.jpg","../../jctruffet.com/image/image_55/55_Beurey_Saulx_4.jpg","../../jctruffet.com/image/image_55/55_Beurey_Saulx_5.jpg"]},"Consult_chateau_formulaire5711":{"id":"Consult_chateau_formulaire5711","dept":"55","canton":"Saint-Mihiel","commune":"Bouconville-sur-Madt","nom":"Bouconville","type":"Château","periode":"XIV","histoire":"BOUCONVILLE, Le fief de Bouconville appartint à une branche comtale de Bar, la lignée des sires de Bar-Pierrefort. Le premier du nom, Pierre 1er de Bar (1300-1348) était un frère du comte Henri III. Au château de Bouconville, son fils Henri (1348-1380) fonda une chapelle desservie par des chanoines. C'est à Bouconville que le dernier de la lignée, Pierre II de Bar, se réfugia en 1380 : le terrible damoiseau de Pierrefort, aventurier belliqueux, intriguant et pillard, poursuivi par ses ennemis coalisés, y fut forcé comme une bête traquée et périt sous les coups à la fin d'octobre 1380 le jour de la bataille dite de Bouconville.","architecture":"BOUCONVILLE, côté construction on voit un ancien château de plan carré en terrasse flanqué de quatre tours rondes et entourés de fossés.  Aujourd'hui on distingue encore très nettement la porte d'entrée et le mur de la façade principale. Le reste du site est occupé par l'exploitation agricole organisée en plan carrée comme l'était l'ancien château. Peut-être qu'il y reste d'autres éléments à l'intérieur. Les vues aériennes confirment bien la persistance de l'ancien château sur le site, même du point de vue topographique.\r\nDommage que ce patrimoine médiéval reste sans protection. Pour le moment, une partie nous est parvenue mais l'avenir n'est pas toujours certain.","habitants":"sires de Bar-Pierrefort.\r\n        \"","divers":"Bouconville-sur-Madt château de Bouconville","gps":"","images":["../../jctruffet.com/image/image_55/55_Bouconville_1.jpg","../../jctruffet.com/image/image_55/55_Bouconville_2.jpg","../../jctruffet.com/image/image_55/55_Bouconville_3.jpg"]},"Consult_chateau_formulaire8b9e":{"id":"Consult_chateau_formulaire8b9e","dept":"55","canton":"Ancerville","commune":"Haironville","nom":"Bourbons_Forges","type":"Château","periode":"XVI-XVIII","histoire":"BOURBONS  la FORGES   On découvre le château de la Forge, construit en 1735 en plein centre du village, à lemplacement dune maison ancienne ou monastique du XVIIe siècle, par Jacques Louis Bourlon, qui anobli depuis peu, et son épouse Agnès Bouland, ne se satisfaisaient peut-être plus de leur modeste château de la Tour moins élégant. Après 1789, le château fut vendu et changea souvent de propriétaires avant de finir dans l'oubli. En mauvais état dans les années 1980, c'est monsieur Georges Dumesnil qui prit soin de le restaurer.  Autrefois, le roi en était seigneur. Avant la Révolution, il y avait à Haironville deux fiefs nommés l'un « de la Tour », l'autre appelé le fief d'Haironville. Ce dernier avait été érigé le 11 mai 1723 par le Duc Léopold. Une famille de la Tour possédait aux XVIe et XVIIe siècles une part de la seigneurie d'Haironville. Elle s'allia aux Fouraut du Clermontois qui prirent ainsi le nom de la Tour. Les deux anciens châteaux existent encore.Au XIXe siècle, le château changera  plusieurs fois de propriétaires. Il sera achevé en 1907, par l'historien Pierre Arthur Lefebvre. Par mariage, il passera dans les mains de l'organiste Félix Raugel, dans la famille duquel il se trouve toujours. Après le décès de la famille Raugel, le château reste à l'abandon, et pratiquement laissé à l'état de ruine. La maison des Bourbons est inscrite partiellement aux M.H. pour les façades et toitures du bâtiment principal, depuis le 9/06/1947. Elle est privée, fermée au public. Depuis 2015, le château de la Forge appartient à Mr et Mme Laurent Frydlender qui, après une restauration de plus de 6 mois, ont su rendre au château de la Forge, ses lettres de noblesse, en respectant les codes du XVIIIe siècle.","architecture":"BOURBONS La FORGES  la construction date du XVIIIe siècle,  est aussi appelé la maison dite des Bourbons. Il est de style Renaissance. C'est en 1721, que les vieilles Forges de Haironville, créées au milieu du XVIe siècle, furent vendues au duc de Lorraine Léopold, par Philippe d'Orléans. En 1723, les forges, le moulin, le fourneau, le pressoir sont en si mauvais état que, Léopold ne peut les réparer. Jacques Louis Bourlon, de Saint-Dizier, fermier général des domaines de la baronnie d'Ancerville, obtient la rétrocession du fief d'Haironville. Il fut anoblie par le duc Léopold en 1723. La construction du château en 1735, est attribué à Jacques Louis Bourlon et son épouse Agnès Bouland, suivant la date portée sur l'avant-corps central. A la Révolution Française, le château sera vendu comme bien national. Mr Georges Dumesnil le racheta et le fit rénover. Le parc du château de la Forge a été labellisé « Jardin remarquable ».Éléments protégés MH : les façades et les toitures du bâtiment principal : inscription par arrêté du 9 juin 1947.","habitants":"Jacques Louis Bourlon,\r\n        \"","divers":"Bourbons la Forges                                                                            gps : 48° 41' 12' Nord, 5° 05' 07\" Est                                                                                     Forges gps : 48° 41' 09,39\" Nord, 5° 05' 03,06\" Est","gps":"48° 41' 12' Nord, 5° 05' 07\" Est","images":["../../jctruffet.com/image/image_55/55_Bourbons_Forges_1.jpg","../../jctruffet.com/image/image_55/55_Bourbons_Forges_2.jpg"]},"Consult_chateau_formulaire156b":{"id":"Consult_chateau_formulaire156b","dept":"55","canton":"Etain","commune":"Ville-en-Woëvre","nom":"Brandecourt","type":"Château","periode":"XVII-XVIII","histoire":"BRANDECOURT, le château de Brandecourt appartint fin XVIIe, début XVIIIe siècle à Henri le Bouteillier et passa par alliance au XIXe siècle à Antoine Louis baron de Klopstein, conseiller général de la Meuse, mort en 1860. Détruit au cours de la guerre 1914-1918 il n'en subsiste que les deux pavillons d'entrée dont l'un, voûté d'ogives, fut la chapelle.","architecture":"BRANDECOURT, au XVIIIe siècle, l'aile, en retour d'équerre, occupée par la chapelle, fut repercée. Oriel rajouté au XIXe siècle à l'angle du corps Est. L'ensemble fut endommagé par les bombardements, en 1916 et restauré, après la guerre. Les dépendances, une partie de l'aile de la chapelle, et les canonnières ont été supprimées.","habitants":"Famille d' Henri le Bouteillier                               \r\n        \"","divers":"Brandecourt                                                                                  gps : 49° 07' 51\" Nord, 5° 37' 39\" Est","gps":"49° 07' 51\" Nord, 5° 37' 39\" Est","images":["../../jctruffet.com/image/image_55/55_Brandecourt_1.jpg"]},"Consult_chateau_formulaire2caf":{"id":"Consult_chateau_formulaire2caf","dept":"55","canton":"Etain","commune":"St_Jean_lès_Buzy","nom":"Buzy_Darmont","type":"Château","periode":"XIV-XVI-XVIII","histoire":"BUZY_Darmont, château mentionné aux XIIIe et XIVe siècles, reconstruit en 1508 (date portée par le linteau de la porte de la tour d'escalier), pour un membre de la famille Lenoncourt. Passé à la fin du XVIe siècle à la famille de Raigecourt qui le conserva jusqu'à la Révolution. Endommagé pendant la guerre de Trente Ans, transformé et partiellement repercé au XVIIIe siècle, le bâtiment est devenu bien national durant la Révolution. Converti au XIXe siècle en exploitation agricole.","architecture":"BUZY, Le 1er janvier 1973, devient Buzy-Darmont à la suite de sa fusion-association avec Darmont. Le 1er janvier 2011, la fusion de Buzy-Darmont avec Darmont est transformée en fusion simple. Château construit au XVIIIe siècle, appartient en 1742 à Louis Antoine de Raigecourt. La propriété passe ensuite à Marguerite Habert, comtesse d'Auflance, mère  de Custine et Nicolas de la Tour en Woëvre. Restauration en 1848, date portée par le piédroit du portail. Le bâtiment se compose d'un étage carré, gros-oeuvre en calcaire, moellon, enduit et pierre de taille, élévations à travées surmontées d'un toit en pavillon recouvert de tuiles mécaniques.","habitants":"famille Lenoncourt et Louis Antoine de Raigecourt \r\n        \"","divers":"Buzy-Darmont                                                                                gps   49° 10' 13\" nord, 5° 42' 40\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Buzy_Darmont_1.jpg","../../jctruffet.com/image/image_55/55_Buzy_Darmont_2.jpg"]},"Consult_chateau_formulaire8043":{"id":"Consult_chateau_formulaire8043","dept":"55","canton":"Vaucouleurs","commune":"Chalaines","nom":"Chalaines","type":"Château","periode":"XVIII","histoire":"CHALAINES,   château construit en 1784, date portée par l'agrafe située sous la corniche, au droit de la porte d'entrée de la façade sur cour, pour Jean Baptiste Pernot, conseiller du roi et procureur en la juridiction des traités de Vaucouleurs, par Jean Baptiste Pernot, conseiller du roi Louis XVI et procureur en la juridiction des traites de Vaucouleurs,  son épouse, Marie était la sur du baron Louis, qui fut ministre des finances sous la restauration et sous le roi Louis Philippe. Le château de Chalaines resta dans la famille Pernot jusqu'en 1844. Il fut alors vendu au consul honoraire de Russie Fabin, puis à la famille Gillon.  L'édifice est demeuré dans cette famille jusqu'en 1844, il a été vendu à plusieurs reprises à différents propriétaires et racheté vers 1914 par la famille de ses propriétaires actuels.","architecture":"CHALAINES la construction date de du XVIIIe siècle, il fut construit en 1784. On peut voir la date gravée au-dessus de l'entrée principale,  l'intérieur est réaménagé dans le courant du XIXe siècle, dépendances et colombier de la même époque que le château.\r\nÉléments protégés MH : le domaine du château de Chalaines : inscription par arrêté du 1er juin 1992.","habitants":"Famille Pernot \r\n        \"","divers":"Chalaines,                                                                                        gps 48° 36' 14\" Nord, 5° 40' 53\" Est","gps":"","images":["../../jctruffet.com/image/image_55/55_Chalaines_1.jpg"]},"Consult_chateau_formulaireeebf":{"id":"Consult_chateau_formulaireeebf","dept":"55","canton":"Stenay","commune":"Mouzay","nom":"Charmois","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article Bas Charmois  et Haut-Charmois. BAS-CHARMOIS  Charmois est un petit écart de la commune de Mouzay, au sud de Stenay. Comptant deux châteaux pour un même lieu, le premier, que l'on aperçoit en venant du village, est dit \"Bas Château\" dans la mesure où le second est légèrement plus en hauteur (il s'agit cependant d'un site de plaine). Construit comme son \"frère\" de pierre au XVIIe siècle, il a été transformé dans un style dit troubadour en 1870. Métamorphose à la mode au XIXe siècle, c'est un ensemble plus néo-Renaissance que troubadour qui domine les façades du château. Si le domaine connaît deux châteaux, c'est qu'à l'origine deux frères se partageaient ces terres, bastion arrière des fortifications de Stenay.  Les châteaux Haut et Bas de Charmois, avec leur chapelle castrale. Ils sont inscrits aux M.H. depuis le 6/02/1981.                                                                              HAUT-CHARMOIS,  La construction du château du Haut-Charmois date de 1615, de style  Renaissance. Il fut longtemps la propriété du comte d'Herbemont, parent de l'inventrice de la canne blanche, Guillemine d'Herbemont. On ne peut saluer l'initiative de son propriétaire actuel qui a racheté le château, en 1980 et qui, depuis, n'a eu de cesse de le restaurer et le valoriser.","architecture":"CHARMOIS, la construction du château de Bas-Charmois date du XIXe siècle. Il a conservé son volume ancien et ses deux tours rondes. Il a été reconstruit au XVIe siècle. Le seigneur dHerbeumont était déjà présent sur ce domaine dès 1299. Il fut le quartier général allemand durant l'occupation. Une micro brasserie s'est actuellement installée sur le site du château du Bas-Charmois. Elle est ouverte aux visites. Saviez-vous que Dagobert II ou Saint-Dagobert est né vers 652 et décédé le 23/12/679 à Mouzay.                                                                                                                     HAUT-CHARMOIS, ce château est indissociable de son voisin le Bas Charmois dans cet écart de la commune de Mouzay. Cependant, contrairement au Bas-Château, le Haut-Château a conservé en grande partie son aspect d'origine. Il est daté du début du XVIIe siècle, à la Renaissance lorraine finissante mais on peut se poser la question de l'exactitude de cette seule date. En effet l'aspect général de la bâtisse du point de vue de ses formes rappelle la fin du Moyen-Âge, peut-être aussi du fait de son caractère défensif dû à son emplacement. L'édifice aurait ainsi été construit avant le XVIIe siècle et aurait été remanié d'un point de vu stylistique en 1615. Au delà des questionnements historiques et artistiques. Éléments protégés MH : les façades et les toitures ; l'escalier intérieur : inscription par arrêté du 6 février 1981. transformé en chambres d'hôtes.","habitants":"Comte d'Herbemont\r\n        \"","divers":"Deux châteaux Bas Charmois grav 1-2                                                                           gps 49° 26' 49\" nord, 5° 14' 08\" est  et Haut-Charmois. Charmois haut grav-3-4-                                                           gps : 49° 26' 49,21\" Nord 5° 14' 08,2\" Est                                         GPS : 49° 27' 47\" Nord, 5° 13' 04\" Est                                                                                  charmois grav-5 mouzay                                                                    gps : 49° 26' 55\" Nord, 5° 13' 58\" Est","gps":"49° 26' 49,21\" Nord 5° 14' 08,2\" Est","images":["../../jctruffet.com/image/image_55/55_Charmois_1.jpg","../../jctruffet.com/image/image_55/55_Charmois_2.jpg","../../jctruffet.com/image/image_55/55_Charmois_3.jpg","../../jctruffet.com/image/image_55/55_Charmois_4.jpg","../../jctruffet.com/image/image_55/55_Charmois_5.jpg"]},"Consult_chateau_formulairebbe0":{"id":"Consult_chateau_formulairebbe0","dept":"55","canton":"Commercy","commune":"Commercy","nom":"Commercy","type":"Palais","periode":"1708-1713","histoire":"Trois châteaux dans cet article ; Stanislas, la Forge  et Winter                                                                             STANISLAS, échoit au XIVe siècle à une branche cadette de la famille  de Sarrebruck, passa par alliance aux Silly, comtes de la Roche-Guyon et  de la Roche Pot, famille maternel du cardinal de Retz qui  s'installe en 1662 à Commercy, et le vend en viager à François-Marie de Loraine prince de Lillebonne  et son épouse Anne de Lorraine fille du duc Charles IV en 1699 la ville de Commercy et le château deviennent la propriété de la princesse de Lillebonne. En 1699 le neveu de la princesse  le duc de Léopold  acquiert dont il fait don   en 1707  à Charles-Henri de Lorraine prince de Vaudémont, fils naturel du duc Charles IV  et de Béatrice de Cusange, le prince de Vaudémont  bâti  le château Stanislas  de 1708 à 1713 un palais et en 1717.  Les architectes qui supervisèrent les travaux sont Boffrand et Dorbay et le maitre d'oeuvre est Durand Léopold. Le château Stanislas fut la résidence de la duchesse douairière de Lorraine et de Bar, Élisabeth-Charlotte d'Orléans, nièce de Louis XIV, puis de Stanislas Leszczynski, le roi déchu de Pologne mais qui fut le beau-père du roi Louis XV, qui fait aménager, parc, bassins fontaine en 1766 rattachement du duché à la Couronne, Louis XV néglige Commercy laisse vendre  le mobilier fontaines  et vasques pour transformer le bâtiment en caserne  de cavalerie,, ravagée par un incendie en 1944 par les américains. Acquis par la ville en 1957  classé aux M.H. depuis le 20/07/1966 abrite aujourd'hui les services municipaux.                                                                                                                           à Gaucourt_WYNTER, la construction du château de Wynter date d'avant 1766, pour la famille de Gaucourt, puis il passe aux mains de la famille Wynter, par alliance. Le maître d'oeuvre est inconnu. La construction du château de Wynter date du milieu XVIIIe siècle. Le château de Wynter a été transformé en un immeuble collectif géré par l'O.P.H.L.M. en 1979.","architecture":"STANISLAS, appelé aussi de Commercy est un château, de type Palais, bâti à Commercy,  en forme de U reposant sur des caves voûtées, reste de l'ancienne construction et  présente sur la façade postérieure  un haut soubassement formant terrasse et duquel part un escalier monumental descendant vers les jardins  en partie aménagés   sur l'emplacement des douves comblées, le corps de logis central élevé sur un rez-de-chaussée et un étage carré présente un avant corps  à trois travées d'ouvertures en plein cintre  et est sommé par un important fronton triangulaire  supporté par des colonnes corinthiennes d'ordre colossal. L'ensemble de la construction couvert de hautes toitures d'ardoise en croupes, et flanqué du côté cour de deux ailes latérales terminées par des pavillons, la cour d'honneur fermée par une grille qu'encadrent deux pavillons d'angle, débouche sur une vaste avenue. Éléments protégés MH : le château, sauf parties classées : inscription par arrêté du 24 novembre 1926. Les façades et les toitures du château Stanislas ; les communs ; les substructions du château du Moyen-Age ; le sol de la cour d'honneur : classement par arrêté du 20 juillet 1960. laile gauche accueille loffice de tourisme du pays de Commercy.                                                                                                       La FORGE, château édifié dans le premier quart du XIXe siècle vers 1823 pour le maître de forges Stanislas Demimué lors de son acquisition des forges de Commercy, propriété de la famille Grosdidier à partir de 1862. Serre détruite au XXe siècle. L'édifice se compose d'un sous-sol et d'un étage carré, le gros oeuvre en calcaire et pierre de taille, élévation à travées ; élévation ordonnancée surmontées d'un toit en pavillon recouvert de tuiles mécaniques, élévation à travées et ordonnancée\r\nétages : sous-sol, un étage carré escalier intérieur : escalier en fer-à-cheval,  en calcaire, et pierre de taille.","habitants":"Famille de  Stanislas Leszczynski,                                \r\n        \"","divers":"Trois châteaux  ; Stanislas, la Forge  et Wynter                                                gps : 48° 45' 49\" Nord, 5° 32' 32\" Est                                                               Wynter grav 8-9                                                                               gps  : 48° 45' 43\" Nord, 5° 35' 34\" Est                                                      Forges gps 48° 41' 09\"nord, 5° 05' 03\" est","gps":"48° 45' 49\" Nord, 5° 32' 32\" Est","images":["../../jctruffet.com/image/image_55/55_Commercy_1.jpg","../../jctruffet.com/image/image_55/55_Commercy_2.jpg","../../jctruffet.com/image/image_55/55_Commercy_3.jpg","../../jctruffet.com/image/image_55/55_Commercy_4.jpg","../../jctruffet.com/image/image_55/55_Commercy_5.jpg","../../jctruffet.com/image/image_55/55_Commercy_6.jpg","../../jctruffet.com/image/image_55/55_Commercy_7.jpg","../../jctruffet.com/image/image_55/55_Commercy_8.jpg","../../jctruffet.com/image/image_55/55_Commercy_9.jpg"]},"Consult_chateau_formulaire3876":{"id":"Consult_chateau_formulaire3876","dept":"55","canton":"Montmédy","commune":"Delut","nom":"Delut_Fays","type":"château","periode":"XVIII","histoire":"DELUT , détruit à la Révolution  Celui-ci porte le nom tout simple de château de Delut aujourd'hui. Il fut construit en 1749, la tour porche date de 1773 et le pigeonnier de 1774. La cour dhonneur est encadrée par la maison principale au sud et par les deux tours  au nord. Durant la première guerre mondiale les allemands avaient réquisitionné la maison pour la transformer en hôpital de campagne. A la seconde guerre mondiale la maison fut réquisitionnée toujours par les Allemands pour loger les prisonniers polonais en charge dexploiter les terres. Le pigeonnier est en assez bon état et conserve ces nids (1000 Boulins) qui correspondait à lépoque des privilèges de lancien régime, à une exploitation agricole denvirons 300 Ha. La tour porche abritait avant la seconde guerre mondiale le logement du jardinier.  lensemble a été transmis de génération en génération en ligne directe à la même famille : Jean-François Masson, seigneur de Delut en 1700 et Barbe Jacquinot (1705-1746). Marguerite Elisabeth Masson de Delut 1729 et Pierre Louis de La Chapelle, seigneur de Croizel (1722-1771).\r\nJean Baptiste de La Chapelle de Croizel (1770-1859) et Josephine Sophie d'Ansan d'Egremont (1784-1864). Félicie de La Chapelle de Croizel (1817-1889) et Louis Adolphe Magnien de Magnienville (1800-1882).  Lucien Magnien de Magnienville (1846-1914) et Marie Louise Lucie Anne de Chanlaire de Clomorat (1856-1912).  Charles Magnien de Magnienville (1886-1963) et Madeleine de Gigord (1892-1963). François Magnien de Magnienville 1929 et Marie-Ange Le Pays du Teilleul (1932-1987). Nicolas-François Magnien de Magnienville en 1956.","architecture":"DELUT, cest larchitecte Albert Laprade qui en 1922 a été chargé de la restauration de la propriété en modifiant la cour dhonneur, en créant une pergola et en apportant lélectricité et le chauffage central. Trois tableaux en couleur de cette époque ont été réalisées par le peintre Malquit.  Le toit est en ardoise dit à la Mansart avec les quatre cheminées recouvertes également dardoise. La tour porche et la tour Pigeonnier sont également en ardoise. Les autres bâtiments dont ceux de la cour de ferme sont en tuile. La cour de ferme a été en partie restaurée récemment. Un cadran solaire a été transféré de la tour porche à larrière de la maison avec linscription suivante : La vie ainsi que lombre en peu dheure se passe.","habitants":"Famille de Jean-François Masson\r\n        \"","divers":"Château de Delut à Fays","gps":"","images":["../../jctruffet.com/image/image_55/55_Delut_Fays_1.jpg","../../jctruffet.com/image/image_55/55_Delut_Fays_2.jpg","../../jctruffet.com/image/image_55/55_Delut_Fays_3.jpg"]},"Consult_chateau_formulaire3e5e":{"id":"Consult_chateau_formulaire3e5e","dept":"55","canton":"Dieue-sur-Meuse","commune":"Dieue sur Meuse","nom":"Dieue_Meuse","type":"Château","periode":"XVIII-XIX","histoire":"DIEUE, construit à la fin du XVIIIe siècle ou au début du XIXe siècle. Le château actuel a été construit à proximité de l'église paroissiale, à l'initiative d'Ignace de Bercheny (1689-1778), maréchal de France en garnison à Saint-Mihiel. Le château de Dieue-sur-Meuse fut occupé, au début du XIXe siècle, par Nicolas Charles Chavelot, ancien directeur du génie à Verdun, puis par Briot de Montremy, fils d'un ancien député de Verdun. Propriété au début du XIXe siècle,  \r\n Depuis 1989, il a été transformé en un somptueux hôtel-restaurant tenu par la famille Thouvenin. Éléments protégés MH : les façades et les toitures ; le portail d'entrée sur parc avec sa grille.","architecture":"DIEUE  de Dieue-sur-Meuse, succédant au château de l'évêque de Verdun du XIIIe siècle, détruit sous Louis XIII, et à celui de la famille Du Hautoy, disparu à la Révolution. Le château actuel a été construit à proximité de l'église paroissiale. L'édifice se compose d'un étage carré, le gros-oeuvre en calcaire et pierre de taille, élévations ordonnancées, surmontées d'un toit à longs pans et croupe recouverts d'ardoise. Éléments protégés MH : les façades et les toitures ; le portail d'entrée sur parc avec sa grille. : inscription par arrêté du 13 novembre 1980.","habitants":"Famille d'Ignace de Bercheny   et de    M. Briot de Montremy\r\n        \"","divers":"gps : 49° 4' 6,68\" Nord, 5° 25' 16,05\" Est","gps":"49° 4' 6,68\" Nord, 5° 25' 16,05\" Est","images":["../../jctruffet.com/image/image_55/55_Dieue_Meuse_1.jpg"]},"Consult_chateau_formulairee305":{"id":"Consult_chateau_formulairee305","dept":"55","canton":"Verdun","commune":"Dugny sur meuse","nom":"Dugny","type":"Château","periode":"XIX","histoire":"DUGNY, en 1581 on trouve Dugny en Prévôté de Charny sur Meuse. Le roi était seul seigneur haut justicier. Dugny, appartenait au diocèse de Verdun, à l'archidiaconé d'Argonne et au doyenné de Souilly.  Quelques dates concernant Dugny dans les archives de Bar le Duc : En 1647, le village est abandonné par ses habitants. En 1657, les habitants refusent d'obéir à la justice. Bailliage de Bar-le-Duc,  le Barrois s'étendait sur les deux rives de la Meuse, ayant pour bornes au Nord la Lorraine proprement dite et une partie de l'évêché de Verdun, au sud la Champagne et les Vosges.   Ce pays forme aujourd'hui à peu près tout le département de la Meuse et une partie de celui des Vosges.\r\nLe Barrois na pas toujours été sous la même domination que la Lorraine, et a été pendant longtemps soumis à des comtes et ducs particuliers. En 1554, la Lorraine et le Barrois qui appartenaient encore à la descendance de la maison de Gérard dAlsace étaient composés.","architecture":"DUGNY, les documents sur Dugny sont nombreux et on y retrouve beaucoup d'actes de justice, d'administration et de réglementation. Ils remontent au XVIe siècle pour certains. Avant 1790, Dugny a appartenu au Barrois mouvant, à la Prévôté des Montignons, au Bailliage de Bar, au présidial de Chalons, au parlement de Paris.Le village intègre le Royaume de France en 1766.  Lors de cette organisation, Dugny devint chef lieu de lun des cantons dépendants du district de Verdun canton. Ce canton est composé des municipalités de : Ancemont, Belleray, Dugny, Landrecourt lEmpire, dépendant du district de Verdun.  Le fort de Dugny construit de 1875 à 1877 (qualifié au départ de Redoute) édifié pour empêcher toute réédition du siège de 1870, appartient aux Redoutes dit « de la Panique » et a pour mission, couplé avec celui dHaudainville sur lautre rive, de verrouiller le vallée de la Meuse en amont de Verdun.  Au XIXe siècle, lagglomération bénéficie de lindustrialisation, elle sétend vers le nord autour de la route et de la voie ferrée Sedan-Lérouville, créée en 1875.En 1919, par le traité de Versailles, l'Alsace-Lorraine annexée par les allemands en 1871 est rendue à la France.","habitants":"maison de Gérard dAlsace \r\n        \"","divers":"Château de Dugny sur meuse","gps":"","images":["../../jctruffet.com/image/image_55/55_Dugny_1.jpg","../../jctruffet.com/image/image_55/55_Dugny_2.jpg"]},"Consult_chateau_formulaire6e22":{"id":"Consult_chateau_formulaire6e22","dept":"55","canton":"Etain","commune":"Etain","nom":"Etain","type":"Château","periode":"XIX","histoire":"trois châteaux dans cet article; Etain, Fontaine au Rupt et Paul.                                                                                          ETAIN, en 1760, lhôtel de ville est devenu trop petit pour contenir lensemble des services administratifs. Il fut remplacé par un édifice de belle allure. Ce nouveau bâtiment a été terminé en 1787. Comme léglise Saint-Martin, il fut totalement détruit pendant la première guerre mondiale. Cest larchitecte nancéien Joseph Hornecker qui dirige la construction en respectant les plans originels, de style XVIII siècle. La reconstruction dura de 1922 à 1926. Lintérieur sinspire de lépoque Second Empire avec un vaste hall, un majestueux escalier en ferronnerie et un magnifique salon dHhonneur. Sollicité en 2001 par le conseil municipal, le classement à l'Inventaire Supplémentaire a été obtenu à la fin 2002. La mairie est implantée dans les murs du château d'Etain.                                     FONTAINE au RUPT, château élevé vers 1890 pour M. Hutin, directeur de l'usine la Baleine puis Petitcolin qui fabriquait des baleines de corsets et des peignes en fanons de baleine. Endommagé pendant la première guerre mondiale, restauré après 1918. L'édifice se compose d'un étage carré et un étage de comble, le gros oeuvre en calcaire ; moellon ; enduit et fonte, élévations à travées, toit recouvert d'ardoise.","architecture":"ETAIN  FONTAINE, endommagé pendant la guerre 1914-1918, le château de la Fontaine-au-Rupt a été restauré après la guerre. Endommagé pendant la première guerre mondiale, il fut restauré après 1918, il est composé d'un étage carré et d'un étage de comble, le gros oeuvre en calcaire, de moellon, d'un enduit et de fonte, des élévations à travées et d'un toit recouvert d'ardoise. Le château de la Fontaine vous propose un châpiteau de 600 m2 pour fêter vos manifestations. Il se trouvera à l'arrière du château dans les jardins.                                                                                                                           PAUL,  le château a été construit en 1890 pour Mr. Hutin, détruit pendant la guerre de 1914-1918 à l'exception des deux pavillons encadrant la cour devenus la gendarmerie (à gauche), la perception et le bureau d'enregistrement (à droite), modifiés après 1918.  propriété de l'État, édifice fiscal;  élévation à travées ; élévation ordonnancée: toit à longs pans ; croupe en  ardoise.","habitants":"Famille de Mr. Hutin, Mr Justin Paul,\r\n        \"","divers":"trois châteaux  Etain grav-1-2, Fontaine au Rupt grav -3-4    et Paul grav -5-6.                                                                            Etain gps 49° 12' 46,98\" Nord, 5° 38' 11,29\" Est                                            Fontaine gps 49° 13' 00\" Nord, 5° 38' 00\" Est                                                    Paul  GPS : 49° 13' 00\" Nord, 5° 38' 00\"  Est","gps":"49° 13' 00\" Nord, 5° 38' 00\"  Est","images":["../../jctruffet.com/image/image_55/55_Etain_1.jpg","../../jctruffet.com/image/image_55/55_Etain_2.jpg","../../jctruffet.com/image/image_55/55_Etain_3.jpg","../../jctruffet.com/image/image_55/55_Etain_4.jpg","../../jctruffet.com/image/image_55/55_Etain_5.jpg","../../jctruffet.com/image/image_55/55_Etain_6.jpg"]},"Consult_chateau_formulairecdef":{"id":"Consult_chateau_formulairecdef","dept":"55","canton":"Ligny-en-Barrois","commune":"Dammarie sur Saulx","nom":"Fourneau","type":"Château","periode":"XIX","histoire":"FOURNEAU, château daté de 1861, avec une salle de bain d'époque 1900. Le jardin est aménagé de 1820 à la fin du Second Empire. Si certains bâtiments annexes du château datent de ces époques antérieures, notamment du XVIIIe siècle, le château a donc était construit au XIXe siècle dans un parc qui avait déjà était réaménagé 40 ans plus tôt. Nombreux sont les éléments de qualité qui composent cet ensemble remarquable qui participe à l'histoire des fonderies de la vallée de la Saulx.  Éléments protégés MH : le le domaine à savoir : le parc comprenant les façades et les toitures du château et sa salle de bains, les bâtiments et fabriques, les cinq ponts et les dispositifs hydrauliques, le mur de clôture, potager, comprenant le mur de clôture, les façades et les toitures de la maison de garde, l'escalier, l'orangerie et les serres : inscription par arrêté du 3 mars 1993.\r\n le château et son parc sont malheureusement actuellement à l'abandon. L'état général n'est pas encore catastrophique mais nul doute que si rien n'est fait la pérennité de ce site surprenant risque d'être mise à mal. En tout état de cause le château du Fourneau a plus d'un atout pour attirer un futur propriétaire.","architecture":"FOURNEAU, la construction du château du Fourneau date de 1861 et au XXe siècle. C'est un château de style Renaissance qui comporte une serre, des escaliers et une orangerie. Il possède une salle de bain de 1900 d'origine. C'est à la fin du Second Empire, en 1861, que le jardin fut créé. Le château du Fourneau est inscrit aux M.H. depuis le 3/03/1993.","habitants":"Personnage industriel\r\n        \"","divers":"Fourneau                                                                                         gps : 48° 35' 39\" Nord, 5° 14' 24\" Est                                                                      gps 48° 36' 07\" nord, 5° 14' 32\" est","gps":"48° 35' 39\" Nord, 5° 14' 24\" Est","images":["../../jctruffet.com/image/image_55/55_Fourneau_1.jpg","../../jctruffet.com/image/image_55/55_Fourneau_2.jpg"]},"Consult_chateau_formulaire6274":{"id":"Consult_chateau_formulaire6274","dept":"55","canton":"Etain","commune":"Fresnes en Woëvre","nom":"Fresnes_Woèvre","type":"Vestiges","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article;  Aulnois et Muravaux.                                AULNOIS, ancien fief du temporel des évêques de Verdun vendu en 1342 par Henri d'Apremont, évêque de Verdun, à la collégiale d'Hattonchâtel qu'il avait fondée en 1328, la seigneurie, passée à la famille des Armoises, échut par mariage, en partie, à Nicolas de Gourcy vers 1620, puis fut réunie entre les mains de cette famille en 1707.                                                                                                                                          A  trois K.M. à l'Est  à Bonzé château MURAUVAUX,  château fort construit au XVIe siècle dont il subsiste une tour ronde au nord; bâtiment au sud-est reconstruit au début du XIXe siècle ; ferme construite dans la deuxième moitié du XIXe siècle, de style néo-gothique, canonnière dans la tour. L'édifice se compose d'un étage carré, gros-oeuvre en calcaire, pierre de taille, brique, moellon et enduit, type couverture : toit à longs pans et toit conique, couverts de tuiles mécaniques et d'ardoise.","architecture":"AULNOIS, par la suite elle fut vendue à plusieurs reprises. Reste encore la base d'une des tours du château médiéval munie de canonnières. D'un second château, érigé au XVIIIe siècle, augmenté d'une tour d'angle en 1810 et mis au goût du jour vers 1910, et détruit pendant la guerre 1914-1918, il ne subsiste que d'importants vestiges.","habitants":"Aulnois; famille des Armoises\r\n        \r\n        \r\n        \"","divers":"Aulnois grav-1-2-3                                                                                     Muravaux grav 4","gps":"","images":["../../jctruffet.com/image/image_55/55_Fresnes_Wo%c3%a8vre_1.jpg","../../jctruffet.com/image/image_55/55_Fresnes_Wo%c3%a8vre_2.jpg","../../jctruffet.com/image/image_55/55_Fresnes_Wo%c3%a8vre_3.jpg","../../jctruffet.com/image/image_55/55_Fresnes_Wo%c3%a8vre_4.jpg"]},"Consult_chateau_formulairedb0e":{"id":"Consult_chateau_formulairedb0e","dept":"55","canton":"Vaucouleurs","commune":"Vaucouleurs","nom":"Gombervaux","type":"Vestiges","periode":"XIV","histoire":"GOMBERVAUX , son propriétaire initial était Geoffroy de Nancy, en 1338, Philippe VI de Valois accorde le fief de Gombervaux à son fidèle chevalier Geoffroy de Nancy qui construit le château actuel. En 1363, le comte Henri de Vaudémont, aidé de soldats anglais, assiège Gombervaux pendant six jours. Après la mort du dernier descendant de Geoffroy en 1477, le château passe entre de nombreuses mains. à la famille de Salles chambellan du duc René II de Lorraine qui recueille  du fait de son épouse Nicole de Vernancourt, un patrimoine constitué de plus de quatre vingts seigneuries. A la génération suivante Philippe de salles chambellan du duc Antoine prend par à l'expédition menées contre les luthériens d'Alsace. A son décès  en 1559 l'héritage est  partagé entre ses six enfants. Jean de Salles finit par regrouper le domaine En 1617, les seigneurs du royaume se soulèvent contre Marie de Médicis et son favori Concini ; occupé par des insurgés, le château est libéré par les Valcolorois. Pendant la guerre de Trente Ans, la France envisage de détruire Gombervaux afin qu'il ne tombe aux mains du duc de Lorraine, allié de l'Autriche. En 1660, pour récompenser Gabriel de Myon, seigneur de Gombervaux, de ses bons et loyaux services, Louis XIV l'érige en baronnie, en 1766 rattacher à la Couronne. Vendu au XVIIIe siècle à Claude-François le Breuil de la Brossardière, leur petite fille Jeanne-Thérése qui épouse en 1766 Charles-François de Mallard. Après la Révolution plus habité la propriété de la famille Plauche Gillon, classé au M.H en 1994. Depuis 1989, \"l'association Gombervaux\" réhabilite le château afin de susciter un flux touristique et contribuer au développement du canton.","architecture":"GOMBERVAUX  de style médiéval, cette maison forte, dont il ne reste qu'une façade, était dotée de 4 tours d'angle et d'un altier donjon-porche à créneaux. Une partie du château fut utilisée comme carrière de pierres, par les habitants des villages alentours. Donjon à deux étages carrés ; logis sud en rez-de-chaussée surélevé ; voûte en berceau pour l'entrée du donjon ; voûte en berceau en anse de panier dans le sous-sol sous le logis sud ; coupole dans les tours ; toit à longs pans et toit à croupes, couverts de tuiles mécaniques et creuses, sur la ferme ; logis de la ferme à un étage carré ; le château est en pierre de taille, la ferme en moellon et enduit. Sur l'élévation sud du donjon armes de Geoffroy de Nancy, et sur la face extérieure de la courtine sud à l'est armes d'Agnès de Pulligny. Le château, y compris les fossés et l'emprise au sol de la cour. Il est entouré de douves remplies d'eau, alimentées par 3 sources. L'eau des douves est régulée par une vanne et le trop-plein s'écoule dans le fossé de Gombervaux, a permis de sauver le château qui était totalement à l'abandon, ses douves n'existaient plus, et sa végétation avait envahi le château. Grâce aux efforts de l'association, il  pu renaître de ses ruines, de nombreux éléments ont été restaurés. L'Association Gomberaux anime le lieu en organisant des actions culturelles et touristiques, attirant un large public soucieux de mieux connaitre ce patrimoine régional. Savez-vous quil existe une légende sur le château de Gombervaux. Il parait qu'il fut construit par le diable, lui-même. Celui-ci fit bâtir le château sur une butte, qui surplombait les environs. Tout travail mérite salaire, évidement  Mais le seigneur des lieux décida de ne jamais payer le diable. De colère, le diable décida de se venger et fit disparaître la butte, sur laquelle se trouvait le château.","habitants":"Geoffroy de Nancy \r\n        \"","divers":"Château de Gombervaux                                                                           gps : 48° 38' 02\" Nord, 5° 39' 04\" Est","gps":"48° 38' 02\" Nord, 5° 39' 04\" Est","images":["../../jctruffet.com/image/image_55/55_Gombervaux_1.jpg","../../jctruffet.com/image/image_55/55_Gombervaux_2.jpg","../../jctruffet.com/image/image_55/55_Gombervaux_3.jpg","../../jctruffet.com/image/image_55/55_Gombervaux_4.jpg"]},"Consult_chateau_formulairefc0f":{"id":"Consult_chateau_formulairefc0f","dept":"55","canton":"Ligny-en-Barrois","commune":"Gondrecourt le château","nom":"Gondrecourt","type":"Maison-Forte","periode":"XIV-XV-XVIII","histoire":"Trois châteaux dans cet article Gondrecourt, Delouze et Vouthon.\r\nGONDRECOURT, est un château bâti à Gondrecourt-le-Château, est un ancien château fort construit au XIVe, XVIIIe, XIXe siècle. On peut admirer sa tour de l'extérieur. La tour ronde du château de Gondrécourt date du XVe siècle, fusionne avec lancien tribunal du XVIIIe siècle, qui abrite le musée lorrain du Cheval, ouvert aux visiteurs en juillet-août. Le château est inscrit aux M.H.                                                                                                                          DELOUZE  A 5  K.M.  au nord  château construit en 1766, la lecture des deux derniers chiffres étant incertaine, date portée par le linteau de la porte charretière du corps latéral droit, peut être une maison ayant appartenu à Louis Charles Hyacinthe, aile en retour d'équerre sur jardin, construite après 1834. L'édifice se compose d'un étage en rez-de-chaussée, le gros-oeuvre en calcaire et moellon, élévations à travées surmontées d'un toit à longs pans et demi-croupe couverts de tuiles mécaniques et tuiles creuses.                                                                              VOUTHON, maison-forte appartenant à Simon de Paroye, attestée des 1333. Propriété des Vernancourt au XIVe siècle, la seigneurie passe par alliance en 1490 aux des Salles, qui la garderont jusqu'à la Révolution. Château reconstruit sans doute au début du XVIIIe siècle, sur un plan en U. Vendu comme bien national en 1795. En partie détruit avant 1834, il n'en subsiste actuellement qu'une partie du corps de logis gauche.","architecture":"GONDRECOURT fut fondé par Gondoin, comte dOrnois au septième siècle. Mais, un certain nombre de vestiges retrouvés sur le territoire témoignent dune importante activité depuis le néolithique : mégalithes, tombes mérovingiennes, divers objets de lépoque gauloise et même des armes de bataille entre les Francs et les Huns (certaines de ces reliques sont conservées au musée Barrois de Bar-le-Duc). En effet, le village a toujours été au carrefour de royaumes en guerre, à toutes époques (Champenois, Barrois, Messins, Bourguignons, Lorrains, etc.). Au cours du Moyen Âge, la ville fut tour à tour attaquée, assiégée, brûlée et reconstruite. Des 7 tours qui couronnaient les remparts (érigées à différentes époques) il ne reste que la tour du XVe siècle. En effet, la forteresse fut définitivement détruite en 1633, quand Richelieu ordonna le démantèlement dune grande partie des places fortes de France pour fédérer le royaume.","habitants":"Delouze  Louis Charles Hyacinthe                                               Vouthon-Famille de  Simon de Paroye\r\n        \r\n        \"","divers":"Château de Gondrecourt                                                                      gps 48° 30' 43\" nord, 5° 30' 21\" est , et  Delouze  et Vouthon                                              gps : 49° 07' 51\" Nord, 5° 37' 39\" Est","gps":"49° 07' 51\" Nord, 5° 37' 39\" Est","images":["../../jctruffet.com/image/image_55/55_Gondrecourt_1.jpg","../../jctruffet.com/image/image_55/55_Gondrecourt_2.jpg","../../jctruffet.com/image/image_55/55_Gondrecourt_3.jpg","../../jctruffet.com/image/image_55/55_Gondrecourt_4.jpg"]},"Consult_chateau_formulaire1349":{"id":"Consult_chateau_formulaire1349","dept":"55","canton":"Goussaincourt","commune":"Goussaincourt","nom":"Goussaincourt","type":"Château","periode":"XII-XVII","histoire":"GOUSSAINCOURT, le château voit le jour au cours du XII° siècle et appartient à une branche de la famille des Gondrecourt. Les possesseurs du château se succèdent. Au XIIe siècle nous y trouvons la famille de Bourlemont et au XIVe siècle celle des Lenoncourt. Bien que situé à proximité de Domremy, le château semble n'avoir joué aucun rôle dans l'épopée johannique. Au XVIe siècle, Goussaincourt est possédé conjointement par le roi de France Louis XII, le duc de Lorraine René II, le sire de Brixey et Geoffroy de Foug seigneur de Maxey. En 1663 le château féodal est transformé alors qu'il échoit par mariage à Pierre Lafitte de Pellapore qui a épousé Anne de Chastenoy  de Mandres. Les propriétaires se succéderont jusqu'en 1904 lorsque le château est acquit par le comte de Viansson-Ponté. De nos jours  reste une propriété privée qui ne se visite pas. Le château est inscrit sur la liste des M.H. le 7 juillet 2009. Comme la plupart des châteaux il a évolué avec le temps et les destructions.  Reconstruit au XVIIe siècle sur le plan du château médiéval qui préexistait, il en reprend aussi des éléments de défense qui prennent là un aspect décoratif. Mais ne nous y trompons pas, avec ses remaniements au  XVIIIe siècle il a confirmé sa nouvelle destination de résidence de charme plutôt que de forteresse.  Presqu'en ruines il y a quelques années, un passionné l'a racheté et le restaure avec respect historique et architectural. S'il n'est pas ouvert à la visite on peut en faire le tour et s'attarder à la fontaine qui jouxte le mur du château.","architecture":"GOUSSAINCOURT, la maison seigneuriale fut profondément remaniée à partir de 1663. Le château présente un plan parallépipédique, avec une tour carrée sur l'angle sud-ouest et une haute aile perpendiculaire à l'extrémité de la façade nord. Les ouvertures anciennes de la façade principale ont été transformées au XVIIIe siècle en fenêtres à linteau en arc segmentaire percées sur deux niveaux. Les charpentes datent de la construction de l'édifice. La distribution des pièces en enfilade a été conservée. Les cheminées, les lambris moulurés, les peintures et les petites alcôves datant des XVIIIe et XIXe siècles, témoignent de l'art de vivre des gentilshommes campagnards. Au sud, le mur de clôture enserre le pigeonnier. Les dépendances, qui ferment le parc au nord, abritent une salle voûtée d'arêtes retombant sur des piliers de plan carré. Le monumental portail d'entrée d'ordre toscan, en pierre de taille, est encadré de deux portes piétonnes. Bien que fortement remanié aux XVIIe et XVIIIe siècles, le château conserve encore certains traits de caractères médiévaux comme une échauguette, une bretèche et des canonnières.\r\nLe château en totalité, y compris les jardins et le mur d'enceinte, à l'exclusion du lavoir : inscription par arrêté du 7 juillet 2009  Le château se trouve à l'entrée Est du village.","habitants":"Famille de Gondrecourt\r\n        \"","divers":"Goussaincourt gps 48° 29' 05\" nord, 5° 41' 30\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Goussaincourt_1.jpg","../../jctruffet.com/image/image_55/55_Goussaincourt_2.jpg","../../jctruffet.com/image/image_55/55_Goussaincourt_3.jpg","../../jctruffet.com/image/image_55/55_Goussaincourt_4.jpg","../../jctruffet.com/image/image_55/55_Goussaincourt_5.jpg","../../jctruffet.com/image/image_55/55_Goussaincourt_6.jpg"]},"Consult_chateau_formulaire8f20":{"id":"Consult_chateau_formulaire8f20","dept":"55","canton":"Revigny-sur-Ornain","commune":"Nettancourt","nom":"Grange_Champs","type":"Château","periode":"XII-XV","histoire":"GRANGE aux CHAMPS, cette terre dArgonne, jadis en Champagne a donné son nom à une illustre famille de France et de Lorraine qui légua en 1237 ses biens en partie à labbaye voisine de Montiers en Argonne. Cest ainsi que celle ci devait y établir une \"grange\", qui devint en 1500, propriété de la famille de Thannois qui rebâtit lactuel centre des bâtiments sous forme de maison-forte. La famille de Nettancourt devait racheter le domaine en 1634 et en faire une ferme. La propriété fut vendue en 1785 à une famille Lallemand de Fontenoy qui entreprit de nombreux travaux de restauration communs, lavoir et étang, et enfin à la famille Lignot, et le domaine na plus été vendu. En 1870, il servit d'hôpital de campagne. En 1916 le château fut choisi comme quartier général pour la troisième armée d'abord, pour le groupe de l'armée du centre ensuite. En 1940, il fut réquisitionné par les allemands qui y établirent un peloton de gendarmerie. Mais André Lignot et sa femme continuaient de lhabiter pour le préserver.  Avant la Révolution et tout de suite après, le jardin est régulier à la française. Grande allée de pins se rendant directement à la porte d'entrée de l'époque, bassin circulaire muni d'un jet d'eau juste devant l'entrée principale et canal rectangulaire sur lequel veillait déjà la statue de Neptune. A la fin du XIXe siècle, le parc est redessiné, à partir de ses éléments déjà existants par Philippe et Arbeaumont paysagistes et pépiniéristes à Vitry le François.   Éléments protégés MH : le domaine de la Grange aux Champs, y compris les intérieurs : inscription par arrêté du 30 juillet 1993.","architecture":"GRANGE aux CHAMPS, il sagit dun parc pittoresque de 22 Ha  Initialement à la Française, il fut redessiné à la fin du XIXe en un parc anglais, romantique, par Philippe et Arbeaumont paysagistes et pépiniéristes installés à Vitry-le-François. Aujourdhui il est labellisé \"Jardin Remarquable\", et offre un cadre exceptionnel où se succèdent de nombreux viviers, un étang et un cours deau, la Leurande. On peut y admirer deux statues du XVIIIe siècle, représentant Neptune et Amphitrite, une grotte en rocaille, un charmant lavoir argonnais, un petit pont menant à une double serre, un rucher, un joli pavillon de pierre bordé de tilleuls centenaires ou encore une petite pêcherie en torchis. De nombreuses essences rares tant dEurope que dAmérique ou dAsie se succèdent : érables du japon, érables negundo, sycomores bronze, hêtres pourpre, séquoia, alisier blanc, févier dAmérique, chênes fastigiés, tulipier de virginie, ifs communs, chicot du Canada, frênes pleureurs, des hydrangéas, cornouillers, pivoines, seringats. la statue de Neptune est juchée sur une grotte-rocaille ou nymphée. La symétrie du parc est recomposée à la mode anglaise, ceci à la faveur de la route qui borde le parc qui n'existait pas auparavant et qui a obligé à changer la grille d'accès de place et donc favorisé la recomposition. Les deux statues qui ornent le parc ont été exécutées au XVIIIe siècle par un sculpteur parisien Louis Humbert, enfin, au bout du parc, une petite pêcherie en torchis se niche au coin de l'étang des Hauts de Bran. Éléments protégés MH : le domaine de la Grange aux Champs, y compris les intérieurs : inscription par arrêté du 30 juillet 1993.","habitants":"Famille Lallemand de Fontenoy \r\n        \"","divers":"Grange-Champs                                                                                 gps: 49° 04' 41\" Nord, 6° 09' 10\" Est","gps":"49° 04' 41\" Nord, 6° 09' 10\" Est","images":["../../jctruffet.com/image/image_55/55_Grange_Champs_1.jpg","../../jctruffet.com/image/image_55/55_Grange_Champs_2.jpg","../../jctruffet.com/image/image_55/55_Grange_Champs_3.jpg"]},"Consult_chateau_formulaire1c24":{"id":"Consult_chateau_formulaire1c24","dept":"55","canton":"Etain","commune":"Ville-en-Woëvre","nom":"Hannoncelles","type":"Château","periode":"XV","histoire":"HANNONCELLES, date au début du XVIe, XVIIe, XXe siècle, propriété tour à tour des familles de Sampigny, de ville et de Lenoncourt au cours du XVe siècle, il fut habité par Jacquette de Baudricourt fille du sireur de Baudricourt  qui permit à Jeanne d'Arc de se rendre près du roi à Chinon et à René de Moidrey prédicateur et missionnaire qui influença des écrivains comme Léon Bloy   ou Barbey d'Aurevilly. La terre passa en 1494 à Thierry Ier des Armoises qui, avec son épouse Babeline d'Oriocourt, en 1506 fit reconstruire le vieux château médiéval qui demeure dans cette famille jusqu'en 1689. Il changea de nombreuses fois de propriétaires au XVIIIe siècle.  L'aile en retour d'équerre, occupée par la chapelle, fut repercée au XVIIIe siècle. Ensemble endommagé par les bombardements en 1916 et restauré après la guerre. A cette occasion ont été supprimées les dépendances et une partie de l'aile de la chapelle, éléments défensifs (canonnières).\r\nÉléments protégés MH : les façades et les toitures du château et des deux pavillons d'entrée ; la chapelle au premier étage du château.","architecture":"HANNONCELLES, le château d'Hannoncelles est une maison forte de la fin du Moyen Âge. Il connaît quelques ajouts pendant la Renaissance, relevée de ses ruines après la première guerre  de 1914-1918  ainsi que d'autres modifications sont apportées. Le bâtiment présente notamment des meurtrières, des arbalétrières, deux pavillons, dont celui dit \"du duc de Lorraine\", ainsi qu'une chapelle au premier étage toujours visible.   L'aile en retour d'équerre, occupée par la chapelle, fut repercée au XVIIIe siècle. Oriel rajouté au XIXe siècle à l'angle du corps Est. Ensemble endommagé par les bombardements en 1916 et restauré après la guerre. A cette occasion ont été supprimées les dépendances et une partie de l'aile de la chapelle, éléments défensifs (canonnières).  Façades ornés de fenêtres à meneaux et toitures du château et des deux pavillons d'entrée ; chapelle au premier étage du château.  Éléments protégés MH : les façades et les toitures du château et des deux pavillons d'entrée ; la chapelle au premier étage du château : classement par arrêté du 31 août 1992.","habitants":"Famille de Thierry Ier des Armoises \r\n        \"","divers":"Château d'Hanoncelles                                                                          gps   49° 07' 51\" nord, 5° 37' 39\" est  gps 49° 07' 24\" nord, 5° 38' 03\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Hannoncelles_1.jpg","../../jctruffet.com/image/image_55/55_Hannoncelles_2.jpg","../../jctruffet.com/image/image_55/55_Hannoncelles_3.jpg","../../jctruffet.com/image/image_55/55_Hannoncelles_4.jpg","../../jctruffet.com/image/image_55/55_Hannoncelles_5.jpg","../../jctruffet.com/image/image_55/55_Hannoncelles_6.jpg","../../jctruffet.com/image/image_55/55_Hannoncelles_7.jpg"]},"Consult_chateau_formulaire0527":{"id":"Consult_chateau_formulaire0527","dept":"55","canton":"Saint-Mihiel","commune":"Vigneulles lès Hattonchâtel","nom":"Hattonchatel","type":"Château","periode":"IX-XVII","histoire":"HATTONCHATEL, le château fort, initialement construit en 860 par l'évêque Hatton, évêque de Verdun, le bâtiment devient possession des ducs de Lorraine à partir de 1546. le cardinal Jean de Lorraine cède  la seigneurie ainsi que dix huit villages à son frère Antoine,  en 1546  son successeur, Nicolas de Lorraine au profit de son neveu, le duc Charles III, érigé en marquisat, mais ne sera dés lors plus guère habité. Occupé en 1670 par les troupes de Louis XIV, il est acquis en 1707 par le prévôt Nicolas de Fallonnet qui en restaure une partie et une portion de l'enceinte. Entièrement reconstruit de 1923 à 1928 par Henri Jacquelin, architecte normand originaire d'Evreux, qui réalise l'ultime château \"troubadour\" de la Lorraine, un pastiche qui reprend quelques vestiges du XIe siècle, peu avant son décès. L'ensemble a été financé par une bienfaitrice américaine, Miss Belle Skinner, américaine, bienfaitrice de Hattonchâtel dont elle contribua à relever les ruines après la guerre de 1914-1918. On lui doit la reconstruction du château d'Hattonchâtel, de la mairie-école et du lavoir. En 1933 le château revient par leggs à l'évêché qui s'en sépare quelques années plus tard.","architecture":"HATTONCHATEL, c'est un château fort, qui fut détruit lors de la première guerre mondiale.  La demeure est en grande partie démantelée  en 1634 sur ordre de Richelieu,  et pillé et ravagé en 1636 . Reconstruit vers 1707, le château est à nouveau détruit lors de la première guerre mondiale.   l'entrée constituée d'une poterne surmontée d'une tour et précédée d'un pont-levis permettait d'accéder à la cour, bordée de deux corps de bâtiment, celui du nord est était flanqué à son extrémité des tours de Malcouverte et de la Vis de Bois, et à son extrémité ouest des tours du Moynier et de Haraucourt, le corps de logis lui faisant pendant, au sud abritait la cuisine ainsi qu'une suite d'appartement aménager au XVIe siècle pour les Lorainne -Vaudémont. Il fut ensuite reconstruit entre 1923 et 1928, dans le style Troubadour, en forme de L  quadrilatère ouvert vers l'est La construction du château a repris une partie des anciens bâtiments : une grande partie du mur nord, s'appuie sur l'ancienne muraille médiévale et s'achève à l'est par deux tours d'angle éclairé  au rez-de-chaussée par des fenêtres à meneaux et à l'étage par des fenêtres sommées de frontons-pignons, à l'ouest une tour hexagonale dotée d'une porte du XVe siècle avec  arc du portail.   Éléments protégés MH: les façades et les toitures des bâtiments, les vestiges des fortifications et la salle des Burgraves: inscription par arrêté du 25 juin 1986.","habitants":"ducs de Lorraine\r\n        \"","divers":"Château d'Hattonchatel                                                                                         gps : 48° 59' 32,28\" Nord, 5° 42' 18,36\" Est                                                    gps 48° 59' 34\" nord, 5° 42' 21\" est","gps":"48° 59' 32,28\" Nord, 5° 42' 18,36\" Est","images":["../../jctruffet.com/image/image_55/55_Hattonchatel_1.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_2.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_3.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_4.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_5.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_6.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_7.jpg","../../jctruffet.com/image/image_55/55_Hattonchatel_8.jpg"]},"Consult_chateau_formulaire8f3e":{"id":"Consult_chateau_formulaire8f3e","dept":"55","canton":"Montmédy","commune":"Juvigny sur Loison","nom":"Hugnes","type":"Château","periode":"XVII","histoire":"HUGNES, en 874, mes ancêtres la reine Richilde d'Ardennes (845/910) et son époux, le roi Charles II  dit Le Chauve (823/877)  fondent une abbaye de femmes où sont déposées les reliques de sainte Scolastique, vénérée comme étant sur de saint-Benoît de Nursie tous les 2, quarante abbesses président au travers des siècles aux destinées de l'abbaye, la première d'entre elles aurait été la reine Richilde  Saint-benoit et ste scholastique-même. En 1588, venu par Stenay, African dHaussonville, baron d'Ornes, et 200 arquebusiers qui pillent, saccagent et rançonnent toute la région depuis des année sinstalle à Juvigny.","architecture":"HUGNES, en 1629, les travaux de construction de lhôpital de labbaye et de la grande muraille de clôture entourant tout le monastère débutent. En 1634, après la construction de la grande maison des prévôts, la maison des chapelains est achevée.  En 1635, irruption des cravates, Suédois, Allemands, Polonais qui désolent le pays et font des ravages épouvantables sur les frontières. En 1641, par le traité de Saint-Germain, le duc de Lorraine, Charles IV, cède à la France Clermont, Jametz, Dun et Stenay. Ces 3 dernières villes situées en lisière dArgonne sont données en apanage au prince de Condé en 1648, ainsi que tout le Clermontois. Labbaye en fait partie et le village prend parfois le nom de Juvigny-en-Clermontois. En 1773, le prince de Condé fait un don de 3 000 livres aux habitants de Juvigny, pour la construction d'une nouvelle église.","habitants":"African dHaussonville, baron d'Ornes\r\n        \"","divers":"Château d'Hugnes à Juvigny sur Loison","gps":"","images":["../../jctruffet.com/image/image_55/55_Hugnes_1.jpg","../../jctruffet.com/image/image_55/55_Hugnes_2.jpg","../../jctruffet.com/image/image_55/55_Hugnes_3.jpg"]},"Consult_chateau_formulairee9a9":{"id":"Consult_chateau_formulairee9a9","dept":"55","canton":"Ancerville","commune":"Cousances Les Forges","nom":"Isles_Cousances","type":"Château","periode":"XVI","histoire":"L'ISLES, le château de lIsle a été construit au XVIe siècle, le bâtiment est typique des demeures de style renaissance qui ont vu le jour dans le duché de Bar au début du XVIe siècle. On y arrivait autrefois par un pont-levis aujourd'hui disparu.   Construit en 1534, le château de l'Isle est typique des édifices de style renaissance qui ont vu le jour dans le duché de Bar à cet époque.  Sur le bord du village, le château est constitué d'un seul corps de bâtiment surmonté d'un haut toit. Admirable par son harmonie, ses proportions modestes n'en font pas moins un édifice majestueux qui n'est malheureusement pas ouvert au public. On se contentera donc de regarder ce beau château de l'extérieur.","architecture":"LISLE, c'était un logis seigneurial du XVIIIe siècle, qui, aujourd'hui, est devenue une propriété privée qui se visite. Le logis, en dehors des parties classées, est inscrit aux M.H. depuis le 18 février 1992. Les intérieurs du château de Lisle sont classés au titre des M.H. Admirable par son harmonie, la demeure est constituée d'un seul corps de bâtiment surmonté d'un haut toit. Les façades portent les traces de modifications. L'intérieur très dégradé a été restauré par les nouveaux propriétaires. On y trouve plusieurs pièces, dont une très grande salle avec une cheminée monumentale portant la date de 1534. Cette cheminée privée de taque a été classée M.H..Éléments protégés MH : la cheminée monumentale : classement par décret du 11 mars 1927. Le château : classement par arrêté du 19 novembre 1976. Le château de l'Isle possède encore une cheminée monumentale classée aux M.H. le 11/03/1927 et le reste du château l'a été depuis le 19/11/1976.","habitants":"Seigneur locaux\r\n        \"","divers":"château de lIsles gps  48° 36' 40\" nord, 5° 05' 01\" est","gps":"","images":["../../jctruffet.com/image/image_55/55_Isle_Cousances_1.jpg","../../jctruffet.com/image/image_55/55_Isle_Cousances_2.jpg"]},"Consult_chateau_formulaired5bb":{"id":"Consult_chateau_formulaired5bb","dept":"55","canton":"Dieue-sur-Meuse","commune":"Ancemont","n
