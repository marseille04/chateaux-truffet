ffet.com/image/image_55/55_Varenne_55_2.jpg","../../jctruffet.com/image/image_55/55_Varenne_55_3.jpg","../../jctruffet.com/image/image_55/55_Varenne_55_4.jpg","../../jctruffet.com/image/image_55/55_Varenne_55_5.jpg"]},"Consult_chateau_formulaireb234":{"id":"Consult_chateau_formulaireb234","dept":"55","canton":"Vaucouleurs","commune":"Vaucouleurs","nom":"Vaucouleurs_55","type":"vestiges","periode":"XI-XIII-XVIII","histoire":"Trois châteaux dans cet article  Vaucouleurs , Tusey et Woyvres.                                                                    VAUCOULEURS, est un château bâti à Vaucouleurs, est en ruines aujourd'hui. Contrairement aux apparences, il ne reste que de très minces vestiges du château. On peut aujourdhui voir ce qui reste de la crypte de lancienne chapelle castrale, des remparts, de quelques tours et de la porte de France. La chapelle castrale a été bâtie de 1923 à 1929. Tandis que la chapelle primitive date de 1234. Le château quant à lui est très ancien puisquil aurait été édifié grâce au seigneur de Joinville, Étienne de Vaux, en 1026. Il est dit que le château et son enceinte étaient plus importants que la cité de Carcassonne. Il sera détruit pour la première fois en 1056.  La construction  date des XIe, XIVe, siècles,  du château de Robert de Baudricourt où le destin de Jeanne d'Arc se décida, il ne subsiste que la crypte de la chapelle castrale et la Porte de France, celle-ci faisait à la fois office de porte du château et de porte de la ville. Édifiée initialement au XIIIe siècle, elle a été emprunté par Jeanne d'Arc et son escorte le 23/02/1429, quittant sans retour sa Lorraine natale (chaque année, a lieu à cette date une fête médiévale en son honneur. Les vestiges actuels du château de Vaucouleurs datent de sa restauration réalisée, en 1733, sur les restes de la muraille primitive, il est inscrit aux M.H. depuis 1953 et classé aux M.H. en 1993.","architecture":"TUSEY, construit dans la deuxième moitié du XVIIIe siècle, le château appartint à la famille du Breuil de la Brossardière jusqu'en 1833, date à laquelle il passa par mariage dans la famille Fourier de Bacourt. En 1837, quand une fonderie fut créée à proximité du château, il devint le château de la Fonderie. Corps de bâtiment à un étage carré et un étage de comble, toits à croupes couverts d'ardoise ; dépendances, bâtiment nord-est : deux étages carrés, toit en pavillon couvert de tuiles mécaniques ; dépendances, bâtiment nord-ouest : en rez-de-chaussée, toit à longs pans couvert de tuiles mécaniques.                                                                                                                                    VAUCOULEURS, les vestiges du château sont en moellons et pierre de taille ; les éléments de la façade principale du monument national à Jeanne d'Arc sont en pierre de taille.  Éléments protégés MH : la porte de France et les restes de la chapelle castrale y attenant : classement par arrêté du 8 août 1893. Les vestiges du château et terrains de fouilles qui les entourent: inscription par arrêté du 19 mars 1953. Les restes des remparts et la tour dite des Anglais : classement par arrêté du 14 novembre 1979. La tour du Roi : classement par arrêté du 14 novembre 1979.                                                                                                                             WOYVRES, le château édifié à Neuville les Vaucouleurs dans la seconde moitié du XIXe siècle, est un édifice imposant de plan rectangulaire couvert d'un toit à croupes à faible pente. Les façades principales sont ordonnancées symétriques à trois niveaux de cinq travées, soulignés par des cordons, avec travée centrale encastrée de chaînes et surmontée d'une large lucarne à fronton cintré à l'ouest et d'un fronton à l'est. Toutes les ouvertures, rectangulaires ont des clefs ornées de motif rocailles ou mascarons, seuls éléments décoratifs qui animent ces façades austères.","habitants":"Tusey , famille du Breuil de la Brossardière                                                         Vaucouleurs   de Robert de Baudricourt \r\n        \"","divers":"Vaucouleurs grav-1-2, Tusey grav-4  et Woyvres grav-3.  Point-jour grav-5                                                                         gps : 48° 36' 09\" Nord, 5° 39' 57\" Est                                                                     gps,48° 36' 07\" nord, 5° 39' 51\" est","gps":"48° 36' 09\" Nord, 5° 39' 57\" Est","images":["../../jctruffet.com/image/image_55/55_Vaucouleurs_55_1.jpg","../../jctruffet.com/image/image_55/55_Vaucouleurs_55_2.jpg","../../jctruffet.com/image/image_55/55_Vaucouleurs_55_3.jpg","../../jctruffet.com/image/image_55/55_Vaucouleurs_55_4.jpg","../../jctruffet.com/image/image_55/55_Vaucouleurs_55_5.jpg"]},"Consult_chateau_formulaireff53":{"id":"Consult_chateau_formulaireff53","dept":"55","canton":"Verdun","commune":"Verdun","nom":"Verdun","type":"Château","periode":"XVI-XVIII","histoire":"TOURELLES, il s'agit d'une construction datant de 1896 qui se trouve 50 avenue de la 42e division non loin de l'église Saint-Jean-Baptiste. Cette demeure est un exemple du faste bourgeois de l'époque qui, ici, s'illustre à travers une architecture néo-gothique assez surprenante.                                                                                                        à 10 K.M à l'est de Verdun WATRONVILLE, c'est un château fort. La construction du château de Watronville date du XVe au XXe siècle, il est inscrit à l'Inventaire des M.H.","architecture":"VERDUN est une petite ville du nord-est de la France, sur les berges de la Meuse. Elle est connue comme le site de la bataille de Verdun, qui s'est déroulée pendant la 1ère guerre mondiale. Les champs de bataille de Verdun sont marqués par des musées et des mémoriaux, comme l'ossuaire de Douaumont, qui abrite les restes de plus de 100 000 soldats. Au nord-ouest de la ville se trouve le cimetière américain de Meuse-Argonne. Dans la ville, l'immense porte Chaussée faisait autrefois partie de l'enceinte médiévale.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Palais des oficiers  grav-8 -9                                                        Château Princerie-grav-6                                                             Tourelles grav-1-2 Porte grav 3-4-5                                   Watronville  Grav-7 GPS : 49° 08' 16\" Nord, 5° 32' 33\" Est","gps":"49° 08' 16\" Nord, 5° 32' 33\" Est","images":["../../jctruffet.com/image/image_55/55_Verdun_1.jpg","../../jctruffet.com/image/image_55/55_Verdun_2.jpg","../../jctruffet.com/image/image_55/55_Verdun_3.jpg","../../jctruffet.com/image/image_55/55_Verdun_4.jpg","../../jctruffet.com/image/image_55/55_Verdun_5.jpg","../../jctruffet.com/image/image_55/55_Verdun_6.jpg","../../jctruffet.com/image/image_55/55_Verdun_7.jpg","../../jctruffet.com/image/image_55/55_Verdun_8.jpg","../../jctruffet.com/image/image_55/55_Verdun_9.jpg"]},"Consult_chateau_formulaire5250":{"id":"Consult_chateau_formulaire5250","dept":"55","canton":"Ancerville","commune":"Ville sur Saulx","nom":"Ville_sur_Saulx","type":"Château","periode":"XVI-XVIII","histoire":"GILLES de TREVE, vers 1550, Gilles de Trêves, mécène et humaniste apprécié de Montaigne, fit construire, avec la présence du sculpteur Ligier Richier, sa demeure des champs au coeur d'une nature d'exception. Cette demeure Renaissance du XVIe siècle est entourée dun parc classé \"jardin remarquable\" par le conseil national des \"Parcs et Jardins en France\". Les jardins accompagnant l'architecture vont évoluer au XVIIIe siècle dans le style paysager. Bordé par la Saulx, il abrite plus de 500 espèces darbres et darbustes et de fleurs. Quant aux jardins, ils conservent une collection mondiale de seringats et une autre de pivoines.","architecture":"GILLES de TREVE  appelé le château de Trèves est un château bâti à Ville-sur-Saulx, également sur la commune de Lisle-en-Rigault à Ville-sur-Saulx,  La construction du château de Ville-sur-Saulx date des XVIe, XVIIIe siècles pour le seigneur du village, Ligier Richier. C'est un château de style Renaissance. Le château de Trèves fut construit en 1533 et remanié au XVIIIe et XIXe siècle : le logis carré est flanqué d'échauguettes d'angle, haut toit d'ardoise à lucarnes, tour-porche, dépendances, colombiers, parc. Le château de Ville-sur-Saulx est inscrit aux M.H. en 1995.","habitants":"de Gilles de Trêve\r\n        \"","divers":"Château de Gilles de Trève                                                                         gps : 48° 42' 41\" Nord, 5° 03' 19\" Est                                                                                        Ville  gps 48° 42' 45\" nord, 5° 03' 14\" est .                                                            48° 42' 44\" nord, 5° 03' 16\" est","gps":"48° 42' 41\" Nord, 5° 03' 19\" Est","images":["../../jctruffet.com/image/image_55/55_Ville_sur_Saulx_1.jpg","../../jctruffet.com/image/image_55/55_Ville_sur_Saulx_2.jpg"]},"Consult_chateau_formulaire3430-2":{"id":"Consult_chateau_formulaire3430-2","dept":"55","canton":"Vaucouleurs","commune":"Void_Vacon","nom":"Void_Ourches","type":"Château","periode":"XIV","histoire":"VOID, la construction du château date du XIVe siècle. L'existence de Void est connue depuis l'époque mérovingienne. C'était un carrefour important au croisement du fleuve et de la voie romaine de Reims à Toul et Metz. Possession du chapitre de lévêché de Toul, un château détruit au XIXe siècle mais dont il reste quelques vestiges gardait cette position stratégique. La tour aux Pigeons et la tour de la Poterne, toutes deux du XIVe siècle, sont les vestiges du château de Void, qui en comportait trois autres : la tour des Loups, la tour de la Lanterne, et la tour Bontemps. Ce château de forme quadrangulaire avait des murailles longues de 75 m à 80 m, hautes de 15 m et épaisses de 2,5 m. On entrait dans le château de Void par la tour de la Poterne, aussi appelée tour de l'Audience car selon la tradition, on y rendait la justice. Les façades et toiture de la Poterne sont inscrites depuis le 18 juin 1938 aux M.H. Les murailles furent démolies au début du XIXe siècle. Le château de Void est inscrit aux M.H. en 1938.                                                                                               A cinq K.M. à l'est  OURCHES est un ancien château fort bâti à Ourches-sur-Meuse. il a été construit au XVIe siècle, et a été transformé en une ferme privée, contient une tour du XIVe siècle, un contrecur des cheminées.","architecture":"VOID-VACON, du château du XIVe siècle, il ne subsiste plus que la tour aux pigeons et la Poterne. Le château était la principale place forte de l'évêché de Toul. Il avait une forme quadrangulaire. Ses douves étaient alimentées par le Vidus. Les murailles atteignaient 15 mètres de haut et avaient une épaisseur de 2,5 mètres à la base. Il était composé de cinq tours : deux rondes (Tour aux pigeons et Tour des loups) et trois carrées (Tours de la lanterne, Bontemps et la Poterne). La façade externe de la Poterne offre une porte en rez-de-chaussée, deux fenêtres au premier étage et deux autres sous la toiture. On voit également le chemin de ronde et le blason de la cité. Trois profondes rainures verticales rappellent la présence d'un pont-levis. La tour aux pigeons est composée de trois étages, dont une cave voutée, le premier étage servait de prison.\r\nÉléments protégés MH : les façades et la toiture de la Poterne, dite Tour de l'Audience : inscription 18 juin 1938.","habitants":"seigneur local\r\n        \"","divers":"Ourches;  gps : 48° 39' 41\" Nord, 5° 42' 22\" Est                                               Vod;  gps 48° 41' 11\" nord, 5° 37' 07\" est","gps":"48° 39' 41\" Nord, 5° 42' 22\" Est","images":["../../jctruffet.com/image/image_55/55_Void_Ourches_1.jpg","../../jctruffet.com/image/image_55/55_Void_Ourches_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','55 — Meuse'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
