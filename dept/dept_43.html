e en 1771.  C'est encore par mariage qu'il passa aux Longevialle en 1858. Ces derniers le vendirent en 1877 aux religieuses de Saint-Joseph du Puy. Celles-ci y établirent une école qui devaient fermer ses portes en 1988.  Aujourd'hui propriété d'une famille lyonnaise. \r\nROCHEGUDE, a l'origine le domaine relevant de l'évêque du Puy, constituait une des baronnies d'Auvergne, autrefois un puissant château de la région de l'Auvergne en France. Aujourd'hui, il ne reste du château qu'une tour circulaire et la chapelle romane.","architecture":"La bâtisse de Saint-Privat d'Allier ne retrouva jamais sa splendeur passée et de château ne conservait guère que le nom. A l'extrémité sud du bourg de Saint-Privat, sur l'éperon rocher dominant les gorges de l'Allier, à côté de l'église. Le château, mutilé, ne garde que de lointains souvenirs de son esthétique d'origine, les bâtiments prêtent leurs murs ancestraux à l'art contemporain et sont un témoignage vibrant de ce lien indéfectible entre passé et présent.                                                                                     Le château de Rochegude, autrefois un puissant château de la région de l'Auvergne en France. Aujourd'hui, il ne reste du château qu'une tour circulaire et la chapelle romane. Ce château, qui se trouvait sur le chemin de saint Jacques de Compostelle, se situe à 3 km du bourg à l'ouest, face au hameau de Rochegude. Son accès est libre.","habitants":"Famille Mercoeur                                                                                 Famille Bouchard\r\n        \"","divers":"Vestige du fort de Saint-Privat d'Allier, château de Saint-Privat  et vestiges de Rochegude.","gps":"","images":["../image/image_43/43_St_Privat_Allier_1.jpg","../image/image_43/43_St_Privat_Allier_2.jpg","../image/image_43/43_St_Privat_Allier_3.jpg","../image/image_43/43_St_Privat_Allier_4.jpg","../image/image_43/43_St_Privat_Allier_5.jpg","../image/image_43/43_St_Privat_Allier_6.jpg","../image/image_43/43_St_Privat_Allier_7.jpg","../image/image_43/43_St_Privat_Allier_8.jpg"]},"Consult_chateau_formulaired51c":{"id":"Consult_chateau_formulaired51c","dept":"43","canton":"St-Didier-en-Velay","commune":"St-Romain-Lachalm","nom":"St_Romain_Lachalm","type":"Château","periode":"XIV","histoire":"SAINT-ROMAIN Lachalm, édifice d'origine médiévale, habité par la même famille depuis le XIVe siècle, ayant fait l'objet au XIXe  siècle d'importantes restaurations. Extérieurement, elles visèrent à redonner à l'édifice ses dispositions médiévales amoindries au cours des siècles (tours d'angle),  intérieurement, installation d'un confort avec boiseries et cheminées. Cet édifice est représentatif de la réécriture médiévale propre au XIXe siècle. L'origine du château est une maison forte construite au XIe ou XIIe siècle, composée d'un donjon entouré de fossés, d'une enceinte fortifiée avec chemin de ronde  et pont-levis.","architecture":"Château de st Romain Lachalm,  corps de logis rectangulaire flanqué sur l'un des grands côtés de deux tours rondes , à l'opposé de deux échauguettes d'angle et d'une tour octogonale au milieu de la façade, cité en 1360, reconstruit au XVe siècle , remanié sous Louis XIII endommagé à la Révolution restauré en 1875 .  Une deuxième enceinte fermée  d'un mur défendu par deux tours basses,  englobait les communs. Les fossés furent comblés en 1827.   De plan carré,  le château se compose de quatre ailes autour d'une cour intérieure. Il reste une tour ronde à l'angle  nord ouest, une tour polygonale demi hors oeuvre au centre de la façade sud des échauguettes aux angles sud est et sud ouest. Une autre échauguette flanqué sur  le côté ouest de la tour polygonale.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Saint-Romain de Lachalm et manoir","gps":"","images":["../image/image_43/43_St_Romain_Lachalm_1.jpg","../image/image_43/43_St_Romain_Lachalm_2.jpg","../image/image_43/43_St_Romain_Lachalm_3.jpg","../image/image_43/43_St_Romain_Lachalm_4.jpg"]},"Consult_chateau_formulaire5196":{"id":"Consult_chateau_formulaire5196","dept":"43","canton":"Langeac","commune":"Siaugues-Ste-Marie","nom":"St_Romain_Siaugues","type":"Vestiges","periode":"XIII","histoire":"St-ROMAIN,  le nom de la seigneurie de Saint-Romain seigneurie connue dès le XIIIe siècle  apparaît pour la première fois sur les documents relatifs au dénombrement des vassaux dAlphonse de Poitiers, frère du roi Saint-Louis et comte  de Toulouse vers 1250.  Au XIVe siècle, les seigneurs de Saint Romain sont les Beauforts-Canillac et les Bertrand, vassaux des sires de Polignac  ensuite aux vicomtes de Polignac. Durant la période agitée de la guerre de Cent- Ans, le château est pris et occupé par des adversaires du sire de Polignac, Robert Dauphin en 1359, Armand de La Roue en 1372. Seigneur de Saint-Romain à partir de 1415,  aux Mottiers de Lafayette, en la personne de Gilbert IV fils du maréchal, Gilbert de Lafayette fit dimportants travaux dans son château, le rendant ainsi plus confortable à habiter et plus difficile à conquérir qui a été reconstruit le château après avoir épousé Isabeau de Polignac en 1469. La branche Saint Romain des Lafayette poursuivit son oeuvre de développement de la seigneurie, mais elle séteignit à la fin du XVe siècle, lun de ses derniers descendants mâles fut le Père Joseph, lEminence Grise, conseiller particulier de Richelieu. Domaine de la Duchesse dUzès au XVIIe siècle, le château nabrite alors que des gardes et des officiers seigneuriaux.","architecture":"Le château de Saint-Romain,  construit au sommet de la colline qui domine lactuel bourg de Siaugues-Saint-Romain, Saint-Romain jouissait dune vue imprenable sur les alentours et nul doute que ses assaillants devaient avoir à affronter des gardes bien préparés pour en venir à bout, le château est très ruiné, il n'en  reste plus que trois tours rondes, la tour nord la plus importantes et la plus conservée, possède  encore son couronnement de mâchicoulis sur corbeaux avec arcatures tréflés du XVe siècle, au sud  est accolé le reste d'un corps de logis  et vestiges d'une tourelle d'escalier. Au sud-est, se trouve une autre tour, découronnée  et au sud-ouest la troisième tour également découronnée. Le quadrilatère du château était protégé par une enceinte externe dont ne subsiste que les terrasses et les deux  tours encadrant la porte d'entrée. Du château lui-même  reste le donjon,  une tour et une partie de la tourelle d'escalier desservant le logis lié au donjon. Le donjon s'ouvre en quatre niveaux  vers le corps de logis intérieur.  Des vestiges de peintures murales  apparaissent au deuxième étage du donjon. Habité en partie jusqu'au milieu du XVIIIe siècle, après avoir changé plusieurs fois de propriétaire, le château fut pillé à la Révolution. Aujourd'hui propriété privée, figé sur son promontoire envahi par la forêt, l'antique demeure seigneuriale semble encore défier le temps et ses outrages, elle domine fièrement Siaugues et ses habitants qu'elle a si souvent protégés mais qui semblent l'avoir oubliée.","habitants":"Seigneurs Beauforts-Canillac\r\n        \"","divers":"Vstiges du fort de St-Romain de Siaugues","gps":"","images":["../image/image_43/43_St_Romain_Siaugues_1.jpg","../image/image_43/43_St_Romain_Siaugues_2.jpg","../image/image_43/43_St_Romain_Siaugues_3.jpg","../image/image_43/43_St_Romain_Siaugues_4.jpg","../image/image_43/43_St_Romain_Siaugues_5.jpg","../image/image_43/43_St_Romain_Siaugues_6.jpg","../image/image_43/43_St_Romain_Siaugues_7.jpg"]},"Consult_chateau_formulairee7da-2":{"id":"Consult_chateau_formulairee7da-2","dept":"43","canton":"Loudes","commune":"St-Vidal","nom":"St_Vidal","type":"Forteresse","periode":"XII","histoire":"ST-VIDAL, maison forte du Moyen-Age des sires de Saint-Vidal cité depuis le XIIe siècle, puis château  reconstruit au XIIIe siècle transformée au XVIe siècle en une imposante forteresse par les Barons .\r\nSous l'impulsion de son propriétaire  Antoine II de la Tour, chef de la Ligue en Velay, le château acquiert son aspect actuel afin d'en aménager le logis et  d'en compléter la défense  y firent ajouter un donjon aux trois tours existantes et construire une première enceinte.  Le baron de Saint-Vidal avait pour objectif de  doter la forteresse d'un système lui permettant de résister à  une attaque  par armes à feu. Les travaux ont été menés de 1563  à 1578, il fit également ajouter une tour sur l'angle sud ouest, et construire des communs prolongés par une courtine sud. Plus tard, le château passera de mains en mains, et notamment entre celles de lévêché qui nen fera pas grand cas. Tombé en désaffection, mal entretenu, le château a été sauvé grâce à ses nouveaux propriétaires,  monsieur de Sailly qui, depuis 1930, na de cesse de le restaurer, de lembellir et de le faire visiter pour partager ce remarquable témoignage du patrimoine historique. aujourd'hui propriété de monsieur Viannet d'Alençon","architecture":"La forteresse de Saint-Vidal conserve de son origine féodale, du XIIIe siècle, XIVe siècle, XVIe siècle, enceinte du XVIe siècle, vaste quadrilatère composé de, quatre logis qui ferment la cour bordé de voûtes d'ogives du XVe siècle, flanqué d'un donjon de forme allongé et de tours rondes, des caves voûtées et une cuisine ogivale aux immenses cheminées. Le château constitue, pour la région, l'ensemble fortifié le plus important de l'époque des guerres de religion, à  la Renaissance, sans perdre aucun de ses attributs défensifs, le château se modernise, les ouvertures sélargissent et lintérieur se fait plus confortable. On peut admirer les remarquables caves voûtées, la cuisine ogivale et ses monumentales cheminées.","habitants":"Antoine II de la Tour\r\n        \r\n        \"","divers":"Forteresse de Saint-Vidal","gps":"","images":["../image/image_43/43_St_Vidal_1.jpg","../image/image_43/43_St_Vidal_2.jpg","../image/image_43/43_St_Vidal_3.jpg","../image/image_43/43_St_Vidal_4.jpg","../image/image_43/43_St_Vidal_5.jpg","../image/image_43/43_St_Vidal_6.jpg","../image/image_43/43_St_Vidal_7.jpg","../image/image_43/43_St_Vidal_8.jpg"]},"Consult_chateau_formulaire444e":{"id":"Consult_chateau_formulaire444e","dept":"43","canton":"Blesle","commune":"St-Etienne-de-Blesle","nom":"Torsiac","type":"Château","periode":"XIII","histoire":"TORSIAC, un seigneur de Torsiac est mentionné à partir de 1268. Dabord propriété des Templiers,  Itier et Hugues de Sarrazin  seigneurs des lieux en 1271 et 1302. Ce fief appartint par la suite à une famille qui en prit le nom et dont deux dentre eux, Faucon et Vital de Torsiac, figurent à larmorial de 1450. Torsiac, ainsi que Brugeilles et les autres  mas  de la commune dépendaient de la justice des Mercur et du commandement de Blesle pour la juridiction. en 1842, le colombier a disparu, ainsi qu'un grand bâtiment situé au sud du château. En revanche de nouveaux bâtiments, comprenant une grange-étable, ont été bâtis au nord du château.                                                                                      POUZOLS, il est complètement en ruines, seuls subsistent quelques pans de murs. De lui, on sait quil dépendait de la seigneurie de Torsiac et quil fut apporté à Jean-Baptiste du Cheni par son épouse Catherine de Boisset. Sous Louis XIV, leur petit-fils Guillaume de la Salle, seigneur de Pouzols, avait fait nommer Charles de Valois, Baron de Mercur, pour son « mas » de Marmaissat et son « mas » de Valette. Ainsi Pouzols, Sanson et Marmaissat formaient, avec le chef-lieu Torsiac, une baronnie possédée par la famille de Boisset de Torsiac.","architecture":"Torsiac,  sa partie la plus ancienne, le donjon carré, a été construit par les templiers dont la commanderie était commise à la garde du gué de lAlagnon, au lieu dénommé « La Nau », ce nom signifie « lendroit où stationnait une barque pour le passage de la rivière, un corps de bâtiment flanqué de quatre tourelles circulaires a été adjoint au donjon rectangulaire édifié au XIVe siècle et modifié au XVe siècle par l'adjonction d'une tourelle d'escalier en encorbellement, de latrines, d'une cheminée au  premier étage et de fenêtres à croisillons. Ce château a été très restauré dans la seconde moitié du XIXe siècle, entre 1853 et 1902. Le corps de logis et le donjon ont été soudés et une quatrième tour a été édifiée dans l'angle sud, les tours  qui le flanquent a été surélevé d'un niveau, le donjon était pourvu de créneaux  et de mâchicoulis.   Le château de Pouzols, il est complètement en ruines, seuls subsistent quelques pans de murs.","habitants":"Vital de Torsiac\r\n        \"","divers":"Château de Torsiac et vestiges du manoir de Pouzols","gps":"","images":["../image/image_43/43_Torsiac_1.jpg","../image/image_43/43_Torsiac_2.jpg","../image/image_43/43_Torsiac_3.jpg","../image/image_43/43_Torsiac_4.jpg","../image/image_43/43_Torsiac_5.jpg","../image/image_43/43_Torsiac_6.jpg","../image/image_43/43_Torsiac_7.jpg"]},"Consult_chateau_formulaire4c0b":{"id":"Consult_chateau_formulaire4c0b","dept":"43","canton":"Monistrol-sur-Loire","commune":"St-Maurice-sur-Lignon","nom":"Tour_Maubourg","type":"Château","periode":"XV-XVIII","histoire":"TOUR-MAUBOURG, l'origine des Faÿ de la Tour-Maubourg, constituent une très ancienne famille originaire des confins du Velay et du Vivarais. La branche aînée s'éteint avec Philippa de Faÿ, mariée vers 1185 à Aymar de Poitiers, comte de Valentinois. Mais de nombreuses branches cadettes subsisteront. Arnaud de Faÿ, seigneur de Chapteuil épouse en 1320 l'héritière de Peyraud et sera le père de Guillaume, Seigneur de Chapteuil et de Peyraud, grand bailli du Vivarais et du Forez, tué à la bataille de Brignais en 1361. Ses descendants sont à l'origine des Faÿ-Peyraud et des Faÿ-Solignac. Artaud est à l'origine des Faÿ-Gerlande et des Faÿ de Latour-Maubourg. Joseph de Faÿ de la Tour Maubourg. Commandeur de lOrdre de Malte, sera chanoine-comte de Lyon en 1718 et abbé de Beaulieu en 1747. De nouveau, trois frères vont marquer Maubourg, Charles César de Fay de La Tour-Maubourg (1756 1831) à la Révolution, colonel du Régiment du Soissonnais en 1789, il est élu député de la noblesse du Velay aux États Généraux,  emprisonné avec La Fayette par les Autrichiens, il revient en France en 1798 et deviendra membre du corps législatif en 1801, puis du sénat impérial en 1804 ainsi que général de division et gouverneur militaire de Cherbourg en 1808. César de la Tour-Maubourg assumera la tâche de faire reconstruire Maubourg, détruit par un incendie sous la Terreur. Victor de la Tour-Maubourg donnera son nom à un grand boulevard parisien ainsi qu'à plusieurs casernes, dont une à Paris, près des Invalides, et une autre à Valence (Drôme). Il a fait construire le château de Moyeux (La Chapelle-Rablais, Seine-et-Marne). À la mort de la marquise. Les biens des Faÿ de la Tour-Maubourg, dont elle avait hérité de son mari, passent à la dernière descendante de la famille Faÿ, de la branche des Faÿ-Solignac (filiation remontant au XIVe siècle), mariée au Baron de Framond. Le domaine sera ensuite vendu en 1937.","architecture":"Le château de la Tour-Maubourg est le premier château, construit par les Malet, remonte au XIIIe siècle. Agrandi au XVe puis au XVIe siècle par la famille Fay de La Tour-Maubourg, il est à nouveau transformé au XVIe siècle, puis entouré d'aménagements de plaisance, glacière au XVIIe siècle, orangerie et parc . En 1798, les bâtiments sont démolis, hormis une tour, et le château reconstruit à l'emplacement des anciens communs, par César de Latour-Maubourg. Quatre ailes de style Directoire sont disposées symétriquement autour d'une cour rectangulaire, et complétées par un parc à l'anglaise. En 1875, César de La Tour-Maubourg fait édifier un mausolée de style néo-roman pour abriter la dépouille de son fils, mort à la guerre. Vers 1950, son utilisation comme centre de colonie de vacances altère extérieurs et intérieurs. Cependant, la distribution et le décor des pièces de l'étage, notamment les chambres des maîtres de maison, ont été conservées.  Le château quadrilatère a deux niveaux est actuellement en cours de rénovation pour y faire des logements. lOrangerie, construite au début du XVIIIe siècle pour abriter des essences rares, en assez bon état , la Tour du XIVe siècle, vestige du premier château détruit à la Révolution.","habitants":"Charles César de Fay de La Tour-Maubourg\r\n        \"","divers":"Château de la tour-Maubourg et tours","gps":"","images":["../image/image_43/43_Tour_Maubourg_1.jpg","../image/image_43/43_Tour_Maubourg_2.jpg","../image/image_43/43_Tour_Maubourg_3.jpg","../image/image_43/43_Tour_Maubourg_4.jpg","../image/image_43/43_Tour_Maubourg_5.jpg"]},"Consult_chateau_formulaireaf0a":{"id":"Consult_chateau_formulaireaf0a","dept":"43","canton":"Monastier-sur-Gazeille","commune":"Présailles","nom":"Vacheres","type":"Château","periode":"XIV","histoire":"VACHERES; de la baronnie diocésaine de Vachères qui  a été cédée par lévêque du Puy au seigneur de Roche-en-Reigner. Le fief de Vachères passe en 1336 par alliance ensuite par alliance à Philippe de  Lévis-Lautrec jusqu'en 1463, il est vendu à Jean, duc de Bourbon, évêque du Puy, qui fait réaliser vers 1480 dimportants travaux au château,  cest de cette époque que daterait le chemin de ronde couvert sur mâchicoulis. En 1504, les Lévis-Lautrec reprennent aux Bourbons leurs droits sur la baronnie de Vachères quils revendiquaient depuis l'achat en 1463. Diane de Châteaumorand héritière des Lévis devient propriétaire de Vachères. Le château restera dans leur famille jusquen 1592. elle le vendit aux la Motte-Brion puis passa par alliance en 1669 aux Sassenage,  il est alors à létat dabandon et de ruines. Une importante remise en état, au moins de la couverture, a sans doute eu lieu vers 1600. En 1720, le château est vendu à Jean de Mailhet et à Honoré, son fils, qui le louaient depuis 1680. Durant tout le XVIIIe siècle, dimportants travaux sont réalisés par les Mailhet ; cest à eux que lon doit en grande partie lapparence actuelle du château. En 1893, le baron Joseph de Mailhet, mort sans postérité, légua Vachères à son neveu le comte Georges de Loirey, dont les descendants le possèdent encore.                                                         A quelques kilomètres à l'Est  le château de Freycenet la Cuche.","architecture":"Vachères est une construction féodale des XIIIe et XIVe siècles qui se présente comme un gros donjon cantonné de quatre tourelles, placé au centre d'une esplanade elle-même cantonnée de quatre tours basses. D'importants  percements ont été effectués au XVIIIe siècle. Au XIXe siècle les quatre tours ont été remontées. Auparavant, Vachère devait être une résidence fortifiée. Larchitecture du château de Vachères  carré presque parfait flanqué par quatre tours dangle coiffées en poivrières  témoigne de sa construction en une seule phase, selon un plan régulier typique des XIIIe-XIVe siècles. Il sagit en fait dun donjon entouré dune basse-cour fortifiée, elle-même de plan régulier. Lédifice est bâti sur trois niveaux auxquels sajoute létage du chemin de ronde sur mâchicoulis.                                                                    FREYCENET, château du XVIIe siècle, sans doute bâti sur des bases plus anciennes. Il est à noter que les matériaux utilisés ainsi que le décor sculpté intérieur sont analogues à ceux utilisés à la Chartreuse de Bonnefoy dont  dépendait la paroisse. La maison forte adopte le plan rectangulaire caractéristique de ce type d'architecture.  Elle est flanquée, sur sa façade ouest, d'une tourelle d'escalier demi hors-oeuvre. Une cour ceinte d'un mur et fermée par  un portail s'étend devant cette façade. A l'intérieur, l'espace est divisé sur chaque niveau en  deux pièces principales. L'édifice contient deux grandes cheminées du XVIIe siècle.","habitants":"Philippe de  Lévis-Lautrec \r\n        \"","divers":"Château de Vachères et de Freycenet la Cuches","gps":"","images":["../image/image_43/43_Vacheres_1.jpg","../image/image_43/43_Vacheres_2.jpg","../image/image_43/43_Vacheres_3.jpg","../image/image_43/43_Vacheres_4.jpg","../image/image_43/43_Vacheres_5.jpg","../image/image_43/43_Vacheres_6.jpg"]},"Consult_chateau_formulaire0136":{"id":"Consult_chateau_formulaire0136","dept":"43","canton":"Bas-en-Basset","commune":"Valprivas","nom":"Valprivas","type":"Maison forte","periode":"XV","histoire":"VALPRIVAS,  fut le fief d'Antoine Verd du Verdier, lieutenant général du Roi Henri IV, magistrat lyonnais ami des poètes de la Pléiade, qui fit aménager dans le style Renaissance le château familial. Le plus ancien titre connu sur Valprivas remonte à 1341. Bâtit au XVe siècle, le château subit des transformations au XVIe siècle. Les artistes seraient flamands, de seconde école lyonnaise, contemporaine de la seconde école de Fontainebleau. A la  Révolution, le château fut vendu comme bien national. Il fallut attendre 1963 pour que soient entreprises les campagnes de restauration. En tant que centre culturel, le château a de nombreuses activités et propose diverses manifestations et animations,  stages et ateliers, concerts et spectacles, bibliothèque et discothèque.","architecture":"Le château dont une partie date du XIe siècle, fut rénové et embelli à la Renaissance. Le plus ancien titre connu sur Valprivas remonte à 1341.  L'édifice se présente comme une construction médiévale transformée par des propriétaires éclairés qui l'ont doté, à l'extérieur,  d'un décor Renaissance soigné. Une campagne de percement des baies  fut entreprises au XVIIIe siècle. Le corps de bâtiment principal   et ses deux ailes en retour entourent   une cour intérieure fermée   par un  portail.  Construit à l'origine sur un plan carré et flanqué sur les angles nord ouest et sud ouest de deux tours rondes, le château fut privé, en 1793, de son angle sud ouest avec sa tour.","habitants":"Antoine Verd du Verdier\r\n        \"","divers":"Château de Valprivas","gps":"","images":["../image/image_43/43_Valprivas_1.jpg","../image/image_43/43_Valprivas_2.jpg","../image/image_43/43_Valprivas_3.jpg","../image/image_43/43_Valprivas_4.jpg","../image/image_43/43_Valprivas_5.jpg","../image/image_43/43_Valprivas_6.jpg"]},"Consult_chateau_formulairebc7c":{"id":"Consult_chateau_formulairebc7c","dept":"43","canton":"Yssingeaux","commune":"St-Julien-du-Pinet","nom":"Vaux_Glavenas","type":"Château","periode":"XIV","histoire":"VAUX,  dit de Glavenas, château fort construit vers le XIIe siècle sur un piton rocheux, à 979 m d'altitude. La seigneurie de Glavenas, dont ce château constituait le centre, connut rapidement le déclin dans la première moitié du XIIIe siècle, suite à une saisie par Philippe-Auguste, à la mise sous tutelle de lévêché du Puy, et enfin, à la scission de la seigneurie en deux mandements distincts, le château fut alors laissé à l'abandon. donjon de la fin du XIVe siècle. En 1653, le château passe à la famille Jourda de Vaux qui fit la conquête de la Corse en 1769,  qui le possède encore. A la fin du XIXe siècle, importante campagne de travaux, remodelage du parc par l'architecte Monnier  démolition des anciens bâtiments en 1893 puis reconstruction du château en 1893-1894 par l'architecte Martin  et décor en 1895 par le peintre Mayoli.    La commune de Saint-Julien-du-Pinet  Pierre de Saignard, seigneur de Vernet, qui testa le 22 décembre 1639  Catherine Celle de Dubis, seigneur de Mortesagne, Saignard, Queyrières, Maumeyres et en partie de Glavenas de  Mortesaigne en 1625, investiture portant  du manoir primitif, il reste une tour ajourée, une porte assez remarquable.","architecture":"Le Château de Vaux, non loin du hameau de Veyrines, dans le nord de la commune, comporte un donjon de la fin du XII-XIVe siècle, avec mâchicoulis, bretèche défensive et tourelles dangle, mais fut pour le reste reconstruit à la fin du XIXe siècle. Protégé au titre des monuments historiques, \r\nLa maison forte de Mortessagne, datée des XIIe et XVe siècles, comprend une tourelle descalier circulaire et une bretèche défensive surplombant lentrée.","habitants":"Jourda de Vaux \r\n        \"","divers":"Châteaux de Vaux et Mortesagne","gps":"","images":["../image/image_43/43_Vaux_Glavenas_1.jpg","../image/image_43/43_Vaux_Glavenas_2.jpg","../image/image_43/43_Vaux_Glavenas_3.jpg","../image/image_43/43_Vaux_Glavenas_4.jpg","../image/image_43/43_Vaux_Glavenas_5.jpg","../image/image_43/43_Vaux_Glavenas_6.jpg"]},"Consult_chateau_formulaire0fdc":{"id":"Consult_chateau_formulaire0fdc","dept":"43","canton":"Vorey","commune":"Chamalières-sur-Loire","nom":"Ventressac","type":"Maison forte","periode":"XV","histoire":"VENTRESSAC, en 1611 à Charlotte de Galbert qui en  fait donation  à Pierre de Girard puis à la famille d'Usson de Granoux en 1695. Les châteaux passèrent à la famille Jourda de Vaux par le  mariage de Marie d'Usson avec Jean Jourda de Vaux de  Chabanolles en 1719. Le propriétaire le plus illustre fut Noël Jourda de Vaux,\r\nbaron de Roche en Régnier et des Etats du Velay, seigneur de Chamalières, Retournac, Artias, Yroüer et de sainte Vertu en Bourgogne. Il naquit au château de Vaux le 5 mars 1705.  Lors de ses campagnes militaires, il fut le pacificateur de la Corse et mourut à Grenoble le 14 septembre 1788 où le roi l'avait envoyé comme gouverneur. Son cercueil fut ramené à Retournac dans la chapelle Ste-Anne de l'église. Pendant la\r\nterreur, des fanatiques jetèrent celui-ci dans la fosse commune. Sa famille continua à habiter Chamalières et donna en 1815 et 1848 deux maires à la commune.\r\nGaston Jourda de Vaux, membre et lauréat de la société française d'archéologie, il est enterré dans la chapelle Jourda de Vaux du cimetière de Chamalières. Les propriétés furent vendues l'une en 1909 à M.Peyrache et appartient toujours à la famille. L'autre est acquise par M Goudon limonadier puis par Jean Chapuis qui le vendit à Robert Morel en mai 1979. Jean-Pierre Arnould reprit le château le 19 juillet 2005 et restaure ce bâtiment qu'avait commencé à rénover M Morel, on lui doit le porche de l'entrée.      Château du village Le « Artias» de Chamalières, (voir article) date du XVe siècle, mais a été considérablement remanié par la suite. Il semble aujourdhui passablement délabré.","architecture":"Maison forte édifiée au XVe siècle,située au pied du mont Gerbizon, dans le hameau de Ventressac à louest de Chamalières, présentant une masse cubique de construction rustique. Elle fut bâtie au XVe siècle, mais subit ensuite plusieurs remaniements, notamment au XVIe siècle  percement de fenêtres, tourelle à escalier à langle sud-est du XVIIIe siècle aménagements intérieurs, tour hexagonale contenant un escalier à vis à l'angle sud est. L'édifice   a été remanié dans ses percements. Peuvent être datées du XVIe siècle les salles du rez de chaussée avec leurs plafonds a caissons ainsi que la tour  hexagonale de l'escalier à vis, néanmoins lédifice, qui était dabord destiné à protéger contre le brigandage, a gardé plusieurs de ses éléments défensifs que sont ses trois échauguettes d'angle et une petite bretèche défendant la façade nord. La maison forte figure à linventaire des monuments historiques.","habitants":"Jean Jourda de Vaux de  Chabanolles\r\n        \"","divers":"Maison forte de Ventressac et vestiges d'Artias","gps":"","images":["../image/image_43/43_Ventressac_1.jpg","../image/image_43/43_Ventressac_2.jpg"]},"Consult_chateau_formulairedfa6":{"id":"Consult_chateau_formulairedfa6","dept":"43","canton":"Loudes","commune":"Vergezac","nom":"Vergezac_Thiolent","type":"Château","periode":"XV-XVIII","histoire":"VERGEZAC a été construit vers 1445, fortifié avant 1446 par Pierre de Queyrières dit de Vergezac, selon la lettre de rémission  accordée audit Pierre en août 1446 par le roi Charles VII. Il a été reconstruit au début du XVIIe siècle à son emplacement actuel. Tout au long du XVIIIe siècle, le château a été embelli.                    THIOLENT, Le château du Thiolent a été construit vers 1445. Il a été reconstruit au début du XVIIe siècle à son emplacement actuel. Tout au long du XVIIIe siècle, le château a été embelli. Il a appartenu aux du Thiolent jusqu'au décès de la dernière représentante de cette famille en 1615. Il est ensuite passé aux de Rochefort d'Ally qui l'ont acquis par alliance en 1648. A la fin du XVIIIe siècle, le château a été transmis aux d'Apcher par succession, puis au XIXe siècle, il est passé par alliance à la famille de Veyrac.  Seigneurie du Thiolent à Vergezac et dépendances à Vergezac, Jalavoux, La Bauche, le château du Thiolent en 1996  les descendants de Louis et Françoise du Thiolent, frère et soeur.","architecture":"Château  Vergezac   dont la structure remonte à la fin du Moyen-Age, d'abord simple demeure sans fossés au XIVe siècle, l'autorisation est donné en 1445 d'en faire une maison forte avec fossés. Reconnu insuffisant ce manoir aurait été remplacé au XVIIe siècle par un château plus important, pour en faire une habitation  répondant aux goûts de l'époque, bâtisse à cinq tours dont l'une crénelée  avait l'aspect de donjon. Les baies ont été repercées. De 1767 à 1770 se tiennent des travaux de réaménagement . La Révolution détruit le couronnement de la grande tour. \r\nThiolent;  construit en 1711 au milieu d'un beau parc, quadrilatère avec  corps de logis rectangulaire entre tours carrées en angles à trois niveaux toitures en croupes et tour carré à cinq niveaux sur la partie arrière et tour ronde semi hors oeuvre.","habitants":"Pierre de Queyrières                                                                          François du Thiolent\r\n        \"","divers":"Vestiges et  château de Vergezac  château de Thiollent","gps":"","images":["../image/image_43/43_Vergezac_Thiollent_1.jpg","../image/image_43/43_Vergezac_Thiollent_2.jpg","../image/image_43/43_Vergezac_Thiollent_3.jpg","../image/image_43/43_Vergezac_Thiollent_4.jpg","../image/image_43/43_Vergezac_Thiollent_5.jpg"]},"Consult_chateau_formulaireef2a":{"id":"Consult_chateau_formulaireef2a","dept":"43","canton":"Blesle","commune":"Lubilhac","nom":"Vernieres","type":"Vestiges","periode":"XIII","histoire":"VERNIERES, au Xe siècle à une famille de Vernières à laquelle se liait Hugues de Vernières seigneur de Favars en 1314 ;  Autre Hugues de Vernières capitaine du château de Murat en 1412, et Jean de Vernières, chanoine de Brioude en 1401, Jeanne de la Chassagne, dame de Vernières, Massiac et Vernols, à la fin du XVe siècle, transféra la terre de Vernières dans la famille d'Apchon. Par le mariage de Marie d'Apchon avec François d'Espinchal, la châtellenie passa dans la famille d'Espinchal laquelle la vendit à Jacques Rodde, lieutenant des maréchaux de France. Celui-ci prit le nom de Vernières et ses descendants transmirent ce domaine à Monsieur de Chalagnat qui le possède actuellement, mais réduit à sa plus simple expression, c'est-à-dire au château lui-même, les dernières propriétés ayant été vendues au cours des années 1893.","architecture":"Les vestiges de Vernières fut pris et mis à sac par les Grandes Compagnies au temps de Du Guesclin et qu'il était classé, comme forteresse de second ordre. Il fut démantelé plus tard par ordre de Richelieu, les grandes croisées grillagées avec des barreaux métalliques que l'on voit aujourd'hui furent ouvertes en vertu du même édit. Les murs du château de Vernières affectent la forme d'un polygone irrégulier à six côtés dont les sommets étaient occupés par des tours rondes et carrées. Les créneaux comme les mâchicoulis sont écroulés, mais on voit disséminées çà et là, à la surface des murs les anciennes meurtrières.  Deux fossés, l'un en escarpe, l'autre en contre-escarpe défendaient l'accès de la forteresse. Ce dernier, large et profond, a près d'un kilomètre de développement et est occupé actuellement par des terre-pleins, des chaussées laissant apercevoir çà et là des mares remplies d'eau.","habitants":"Hugues de Vernières \r\n        \"","divers":"Vestiges du château de Vernières","gps":"","images":["../image/image_43/43_Vernieres_1.jpg","../image/image_43/43_Vernieres_2.jpg","../image/image_43/43_Vernieres_3.jpg"]},"Consult_chateau_formulairecd31":{"id":"Consult_chateau_formulairecd31","dept":"43","canton":"Le Puy-en-Velay","commune":"St-Germain-Laprade","nom":"Villard_St_Germain","type":"Château","periode":"XV","histoire":"VILLARD, érigé par la famille Pons de Goudet, ce château fut donné en héritage deux siècles plus tard à Hugon de La Tour Saint-Vidal qui avait épousé Catherine de Goudet, dont il reste encore aujourdhui les armoiries dans lentrée principale du château. Ce sont ses descendants (et notamment Antoine 1er de La Tour Saint-Vidal, fils de Vidal-Hérail et de Guillemette dAlbon) qui au XVIe siècle entreprirent les plus grands travaux en érigeant une aile supplémentaire et en intégrant les communs quils firent reliés par une galerie à deux niveaux dont il reste aujourdhui quelques vestiges de piliers et darcatures. Cest là que fut percé le monumental porche dentrée. Au cours des XVIIIe et XIXe siècles  il changea plusieurs fois de maîtres. Se succédèrent notamment Charlotte de Rochefort-dAlly, Jean dAureille, comte de Bouzols, Guillaume Bertrand, vice-président du tribunal civil du Puy-en-Velay, Maurice de Veyrac, Gustave, marquis Pons de Frugières, maire de Saint-Germain-Laprade de 1853 à 1858 qui le céda à Claude-Auguste Reynaud. Sa fille Élise épousa un Vernière. Cest elle qui fit les plus intelligentes réparations du château, ce qui lui permet dêtre aujourdhui classé parmi les plus intéressants castels du Velay. La succession se poursuivit ensuite par les filles. Margueritte Vernière fille unique épousa Léonce Tézenas dont elle eut une fille, et ainsi de suite jusquau  propriétaires actuels.","architecture":"Villard,  château qui a subi de multiples évolutions depuis sa construction au XIe siècle. Ce castel est une masse imposante, hérissée de pignons, cuirassée dépaisses murailles ajourées de meurtrières et de fenêtres à meneaux dont les fines moulures révèlent lépoque lointaine où elle fut élevée. Actuellement, le château est composé de deux bâtiments distincts se faisant face, séparés par une cour dhonneur. Le manoir primitif à gauche est flanqué de deux tours rondes et précédé dune belle avenue le long dune verdoyante prairie quarrose les eaux cristallines de la Gagne. À droite est la bâtisse érigée par Antoine de Saint-Vidal qui était reliée à lépoque à lautre partie par un troisième corps de logis doù était pratiquée lentrée dont il reste quelques vestiges dembrasures.","habitants":"Famille Pons de Goudet\r\n        \"","divers":"Château de Villard à st-Germain laprade","gps":"","images":["../image/image_43/43_Villard_St_Germain_1.jpg","../image/image_43/43_Villard_St_Germain_2.jpg","../image/image_43/43_Villard_St_Germain_3.jpg","../image/image_43/43_Villard_St_Germain_4.jpg"]},"Consult_chateau_formulairefe5d":{"id":"Consult_chateau_formulairefe5d","dept":"43","canton":"Ste-Sigolène","commune":"Ste-Sigolène","nom":"Villard_Ste_Sigolene","type":"Château","periode":"XIII","histoire":"VILLARD, l'histoire de Sainte-Sigolène est fortement marquée par la passementerie et la plasturgie. C'est un ingénieur de Rhône-Poulenc, en villégiature à Sainte-Sigolène, qui suggéra à un entrepreneur local la voie du polyéthylène. Dès lors, passementiers ou tisserands de père en fils, les hommes du plateau muèrent en lespace de quelques années en plasturgistes avertis, grâce à une capacité à « rebondir » désormais légendaire qui a inspiré la devise de la commune « Surgit ad futura ». Au cours de la période révolutionnaire de la convention nationale (1792-1795), la commune a porté le nom de Ségolaine-les-Bois.","architecture":"Le château du Villard Situé au bout d'une allée bordée d'arbres plus que centenaires, le château du Villard fut jadis l'une des baronnies du Velay. Il comprenait au XIIIe siècle plusieurs corps de logis flanqués de quatre tours reliées par des créneaux. Devant le château, s'étendait un jardin, où l'on peut encore voir un arbre aux branches immenses : le Sully. De nombreuses dépendances dont une chapelle et de grandes écuries au style particulier rappellent les richesses du temps passé. Le vieux castel fut profondément transformé au XIXe siècle par la famille Dugas du Villard. Le château reste privé. Aux environs, un étang dans un écrin de verdure permet aux promeneurs et aux pêcheurs de retrouver calme et sérénité.","habitants":"Famille de  du Villard\r\n        \"","divers":"Château de Villard à Sainte- Sigolène","gps":"","images":["../image/image_43/43_Villard_Ste_Sigolene_1.jpg","../image/image_43/43_Villard_Ste_Sigolene_2.jpg","../image/image_43/43_Villard_Ste_Sigolene_3.jpg","../image/image_43/43_Villard_Ste_Sigolene_4.jpg"]},"Consult_chateau_formulaired604":{"id":"Consult_chateau_formulaired604","dept":"43","canton":"Le Puy-en-Velay","commune":"Coubon","nom":"Volhac","type":"Château","periode":"XII-XIX","histoire":"VOLHAC Le lieu-dit est mentionné dès 1097 par une maison forte.le « fortalicium » de Volhac est cité dès 1320 ; cétait une possession des Tournon qui avaient succédé aux Deydier et qui étaient alliés aux Chapteuil.  Armand de Polignac la transmet à sa fille qui épouse Pons de Fay,  après les Polignac  le fief  passera  par alliance  au XIVe siècle  de Béatrix de Deydier, fille de Claude de Deydier seigneur de Volhac et de Servissas. En 1544 le seigneur de Bouzols cède ses droits de justice a Michel Spert qui exercera à plusieurs reprises les fonctions de premier consul du Puy et se porte acquéreur du château, le léguera à son fils Jean qui lui aussi sera premier consul au Puy en 1579. En 1594  pendant les guerres de religion, le duc de Ventadour assiège et l'incendie partiellement, et en 1650  le château passera par alliance de Marie-Isabeau Spert à Jacques-Hugues de Pradier d'Agrain, ces derniers le cèderont aux le Maistre qui le vendent en 1784 au maréchal  de camp Pierre Chardon des Roys , incendié à nouveau à la Révolution  la petite fille de Pierre  fait rentrer Volhac dans la famille de Vinols par son mariage en 1818 avec Raymond-Marie-Noël-Hippolyte de Vinols, et fut acquis en 1989 par la famille Muller.    Le bâtiment a subi les vicissitudes de lhistoire, lors de la Révolution après la fuite de son propriétaire Pierre Chardon des Roys. Il est inscrit à linventaire supplémentaire des Monuments Historiques en 1966.","architecture":"Château de Volhac à l'origine maison forte, puis transformé en château dans un but défensif, de forme trapézoïdal allongé en bec flanqué à chacun de ses angles d'une échauguette porté par un culot jouant un rôle de bretèche défendant l'entrée, au fil des ans la transformation se termina en une confortable demeure seigneuriale, malgré  qu'en 1594, l'édifice fut incendié au cours des guerres de religion après avoir été pris par le duc de Ventadour. L'édifice reste ruiné de 1594 à 1732. En 1790, le château est pillé. Au XIXe siècle, des modifications y sont apportées avec percements et surélévation. Les murs enduits,  les tourelles,  les mâchicoulis en hotte sont typiques des constructions semi fortifiées de la région.","habitants":"Armand de Polignac\r\n        \"","divers":"Château de Volhac à Coubon","gps":"","images":["../image/image_43/43_Volhac_1.jpg","../image/image_43/43_Volhac_2.jpg","../image/image_43/43_Volhac_3.jpg","../image/image_43/43_Volhac_4.jpg"]},"Consult_chateau_formulaire2e69":{"id":"Consult_chateau_formulaire2e69","dept":"43","canton":"Yssingeaux","commune":"Yssingeaux","nom":"Yssingeaux","type":"Patrimoine","periode":"XV","histoire":"YSSINGEAUX   a une origine gallo-romaine, mentionnée au Xe siècle dans le cartulaire de Chamalières. Ville fortifiée, elle est incorporée à l'Auvergne, au comté de Toulouse puis à la couronne. Seigneur Pierre de Choumouroux, L'origine de la famille remonte à Jean de Sanhard, seigneur de Saignard, paroisse de Saint-Voy en Velay. La seigneurie passe par le mariage à la famille de Saignard, Pierre de Saignard de Choumouroux, 1626-1708 Jean-Joseph de Saignard , 1653-1711 Jean de Saignard, 1669  Pierre-Louis de Saignard , 1681-1760  Joseph Raymond Bénigne de Saignard , 1734-1812  Joseph-Alphonse de Saignard, chevalier de la légion d'honneur, a servi en Espagne et a été député du département de la Haute-Loire à la chambre de 1815.                                                     Dans la commune plusieurs châteaux, dont je n'ai pas d'information historique, le château de Borie à Tence,  l'hôtel de ville ancien château, Treslemont, Chamouroux, Montbarnier, Mortesaigne et Roméas.","architecture":"Yssingeaux; Hôtel de ville place de l'ancien château fort, édifié par l'évêque Jean de Bourbon résidence d'été. Château de la Borie  petite construction militaire remanié aux XVe et XVIe siècles mais qui doit avoir des origines plus anciennes.  Cette maison forte a été édifiée après la guerre de cent ans, contre les anglais et les routiers qui ravagèrent la région. Le plan présente un corps de bâtiment carré flanqué d'une tour massive servant d'escalier, de protection  et de guet, lui-même protégé aux angles par des bretèches avec mâchicoulis.   Sont conservées autour   du donjon et   de la tourelle une série d'échauguettes. Cet édifice est caractéristique des maisons fortes régionales des XVe et XVIe siècles. Château Artias musées des  manufactures de dentelles.","habitants":"Seigneur Pierre de Choumouroux,\r\n        \r\n        \r\n        \"","divers":"Châteaux à Yssingeaux  Montbarnier, Bessamorel devenu mairie, Mortesaigne, Roméas et Treslemont.","gps":"","images":["../image/image_43/43_Yssingeaux_1.jpg","../image/image_43/43_Yssingeaux_2.jpg","../image/image_43/43_Yssingeaux_3.jpg","../image/image_43/43_Yssingeaux_4.jpg","../image/image_43/43_Yssingeaux_5.jpg","../image/image_43/43_Yssingeaux_6.jpg","../image/image_43/43_Yssingeaux_7.jpg","../image/image_43/43_Yssingeaux_8.jpg","../image/image_43/43_Yssingeaux_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','43 — Haute-Loire'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
