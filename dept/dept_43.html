eau dAgrain de 1768 à 1789. Le sénéchal du Puy ,  Chaste, alla assiéger le château dAgrain, situé dans le Velay, à quatre lieues de cette ville, vers les frontières du Gevaudan. Chambonas, capitaine protestant, sétait emparé, en décembre, de ce château, doù il faisait des courses dans le pays. Chaste voyant quil ne pouvait lemporter de vive force, reçut  de ce capitaine, qui exigea mille écus pour lévacuer, et à qui cette somme fut comptée.                      \r\nDans la commune le château de Prunet.","architecture":"Agrain,  le château dont-il ne reste que des vestiges est presque caché dAlleyras, derrière le Mont-Gros, ancien volcan, et aux pieds du Moulard et de Ouïdes une commune voisine du plateau du Devès. Ses derniers propriétaires au début du siècle, à court dargent, firent démonter le toit pour ne plus payer dimpôts. Ainsi commença la lente dégradation des bâtisses, avec le pillage des plus belles pierres par certains visiteurs sans scrupules.  Un acte de saisie du château du XVIIe siècle, décrit un ensemble important de bâtiments dotés de nombreuses cheminées, d'une chapelle, de communs avec étables, fournil, colombier et jardin. Aujourd'hui, ce qui reste du château est réduit au noyau primitif, composé d'un donjon qui est la partie la plus ancienne, d'un corps de logis allongé, auquel furent adossés plusieurs autres rajouts dont la barbacane d'entrée, le château comportait deux étages nobles et un étage de couronnement pour tourné par un chemin de ronde. Le rez de chaussée du donjon comporte une salle voûtée en berceau.    Prunet, corps de logis rectangulaire à trois niveaux.","habitants":"Godefroy de Cayres \r\n        \"","divers":"Vestiges d'Agrain et château de Prunet","gps":"","images":["../image/image_43/43_Agrain_1.jpg","../image/image_43/43_Agrain_2.jpg","../image/image_43/43_Agrain_3.jpg","../image/image_43/43_Agrain_4.jpg","../image/image_43/43_Agrain_5.jpg"]},"Consult_chateau_formulaire6e55":{"id":"Consult_chateau_formulaire6e55","dept":"43","canton":"Allègre","commune":"Allègre","nom":"Allegre_43","type":"Vestiges","periode":"XII","histoire":"ALEGRE,  Au XIIe siècle, le site se nommé Grazac,  la Potence est le nom donné aux étonnants vestiges du château bâti au sommet du volcan de Baury.  En 1226, le seigneur Armand d'Alègre s'illustre dans des faits d'armes aux cotés du roi Louis VIII. En 1267, le seigneur Hugues d'Alègre.  En 1285, Armand III d'Alègre.  En 1310, Eustache d'Alègre cité et devient  en 1343  baronnie  et début de la construction du château.  Armand IV est tué à la guerre de cent ans et  en 1365, Alix demande au Duc de Berry de reconquérir le château  prit par un neveu  Bertrand de St-Nectaire,  le retrouve six mois après. Siège de la seconde baronnie d'Auvergne.  En 1385 au décès d'Alix, le duc de Berry  donne la baronnie au   Morimont de Tourzel,  En 1418, mort de Morimont, son fils, Yves Ier de Tourzel d'Alègre continue les travaux de fortification,  En 1442, Jacques Ier de Tourzel  Il est baron d'Alègre. Vers 1490, Yves II, fils aîné de Jacques, devient le nouveau baron et  en 1512 à la bataille de Ravenne, son fils Gabriel de Tourzel devient à son tour  baron. En 1538, Gabriel  a sa mort c'est son troisième fils qui devient le nouveau baron  sous le nom de Yves III, vers 1560, et la baronnie est en 1576 érigée en marquisat.   En 1592, Yves IV est assassiné par son épouse.  En 1605, Christophe II habite le château, en 1640, Christophe meurt. Claude Yves de Tourzel devient marquis d'Alègre.  En 1665, Claude Yves meurt et le nouveau marquis se nomme Yves V de Tourzel.   En 1698 le 15 novembre, Yves V réside au château. En 1733, Yves V meurt sans héritier.  Fin de la seigneurie le château étant ruiné. La maréchale de Maillebois, fille dYves V, fit édifier un manoir « moderne » aux pieds des ruines quelle aimait. Elle mourut en 1756.   Il fut rasé en 1830.   Hôtel du Chier, presque en face, au fond de ce petit bout de Charreyron, reste de sa cour dhonneur, apparaît la tour descalier de lhôtel du Chier. Il fut fondé en 1435 par Pons seigneur du Chier, aujourd'hui hôtel.","architecture":"Le château fut construit à la fin du XIVe siècle  à 1093 mètres d'altitude, sur un plan comportant trois enceintes fortifiées, et 23 tours, Il ne reste que des vestiges de cette forteresse d'Allègre, sur un plan comportant trois étages. L'édifice a soutenu plusieurs sièges pendant la guerre de cent ans et contre la Ligue en 1593;  Il a été détruit par un incendie le 15 novembre 1698. Reste que deux tours réunies à leur sommet par une galerie de  mâchicoulis tréflés. Une potence qui s'insérait dans la façade méridionale du château.  Au-dessus de la porte un assommoir, ou une bretèche, complétait le dispositif vertical central. La glissière de la herse est en parfait état.  Murs visibles sur la base des deux tours sont les vestiges de barbacanes qui défendaient l'accès de cette porte.  Porte de \"Ravel\",  tour à meurtrières, entrée nord du château, symétrique à la porte de \"Monsieur\" au Sud, celle-ci gênant le passage des charrettes, pourtant plus large de 30 cm. que la Porte de Monsieur, elle fut démolie en 1845. On  conserva cette tour dont on devine encore l'emplacement de la herse et les équipements identiques à ceux de la Porte de \"Monsieur\".   Les ruines se limitent aux deux angles en forme de tour  mâchicoulis du chemin de ronde, et la base d'une tour d'angle de l'enceinte.   Bénéficiant des acquis d'architecture militaire de la Bastille de Charles V.","habitants":"Armand d'Alègre \r\n        \"","divers":"Vestiges du château d'Allégre, porte et tour de la ville.","gps":"","images":["../image/image_43/43_Allegre_43_1.jpg","../image/image_43/43_Allegre_43_2.jpg","../image/image_43/43_Allegre_43_3.jpg","../image/image_43/43_Allegre_43_4.jpg","../image/image_43/43_Allegre_43_5.jpg","../image/image_43/43_Allegre_43_6.jpg"]},"Consult_chateau_formulaire8f57":{"id":"Consult_chateau_formulaire8f57","dept":"43","canton":"Pradelles","commune":"Arlempdes","nom":"Arlempdes","type":"Vestiges","periode":"XII-XV","histoire":"ARLEMPDES,  fief des sires de Montlaur qui gardèrent la forteresse  plus de deux siècles. Passa au Montlaur de Poitiers en 1429, par Charles III de Poitiers-Valentinois qui épousa la fille du baron de Maubec, devenu baron dArlempdes par son alliance avec Anne de Montlaur de la maison dArlempdes, y vécut et transforma le château, renforcements des défenses. Sa petite fille, Diane de Poitiers, dame dArlempdes, qui influença avec tant de charme le roi Henri II.  En 1538, un siècle plus tard, le calme dArlempdes est troublé par les guerres de religion, pris par Antoine de la Garde. Le château tombe entre les mains du fameux capitaine huguenot Antoine de Chambenas seigneur du Bouchet, toute la région fût saccagée, meurtre et le pillage. Le baron de Saint-Vidal, chef des ligueurs, marcha sur Arlempdes pour délivrer le pays mais loccupant était solidement établi dans cette forteresse naturelle. Finalement, le cadet de Chambenas tomba sous lépée dun soldat et les catholiques, avec la duchesse de Bouillon, dame de la baronnie dArlempdes, reprirent possession du domaine. Après Diane de Poitiers le château se transmet par descendance aux de Brézé puis aux la Marck et  cest en 1596, qu'Henri de la Tour dAuvergne, vicomte de Turenne, maréchal de France, devenu baron dArlempdes, puis en 1720 passe à la famille Laval, à la famille de Goys alliés aux d'Arlempdes assure ensuite la garde du château,  achat de la seigneurie  par Pierre de Serres, aux Beauvoir celui-ci revient à plusieurs familles qui le laissent peu à peu à l'abandon, en 1963 les descendants des Goys rachètent le domaine crée une communauté du Prado de Lyon pour entreprendre des travaux de consolidations.","architecture":"Arlempdes, château fort féodal du XII au XVe siècle, surplombant la Loire, il ne reste que des vestiges, cité en 1267.  En 1450, les Poitiers firent restaurer et reconstruire le  château. En 1585,  lors des guerres de Religion, le château fut pillé. La chapelle, seul vestige du château primitif,  date du XIIe siècle, double enceinte,  les soubassements du XIIIe siècle et le reste des constructions et fortifications Est du XVe siècle et du XVIe siècle. à l'exception de la chapelle  et du bâtiment près de celle-ci. Le sud-est,  à pic sur la Loire, n'est pas fortifié. Les autres côtés sont défendus par des murs flanqués de tours. Au sud-ouest se développe un chemin de ronde. Au nord et au nord-est se trouvait des murailles. Ces côtés sont flanqués de six tours rondes  et d'une tour carrée.   La partie nord comprend l'entrée et des bâtiments dont il ne subsiste que le rez de chaussée voûté d'un corps de  bâtiment et la chapelle. Le château est divisé en deux par une muraille médiane avec grosse tour ronde. La partie sud forme une grande esplanade.","habitants":"Diane de Poitiers\r\n        \"","divers":"Vestiges du château d'Arlempdes ert porte de la ville","gps":"","images":["../image/image_43/43_Arlempdes_1.jpg","../image/image_43/43_Arlempdes_2.jpg","../image/image_43/43_Arlempdes_3.jpg","../image/image_43/43_Arlempdes_4.jpg","../image/image_43/43_Arlempdes_5.jpg","../image/image_43/43_Arlempdes_6.jpg","../image/image_43/43_Arlempdes_7.jpg","../image/image_43/43_Arlempdes_8.jpg","../image/image_43/43_Arlempdes_9.jpg"]},"Consult_chateau_formulaire796e":{"id":"Consult_chateau_formulaire796e","dept":"43","canton":"Retournac","commune":"Chamalières-sur-Loire","nom":"Artias","type":"Vestiges","periode":"XII","histoire":"ARTIAS;  château fort du XIIe siècle, alors qu'il était propriété indépendante, en 1165, le château fut placé sous la mouvance des comtes-évêques du Puy. Il fut la propriété de nobles et puissantes familles proches du trône de France  les Artias dabord, puis, de 1212 à 1220 aux Pons de Chapteuil. Passe ensuite à la baronnie de Roche-en-Régnier en 1267. Quelques années plus tard, le baron de Roche, Guiguon III, propriétaire  du château et du mandement d'Artias. A travers les siècles, Artias appartient à différentes baronnies, les Lévis-Lautrec (1344-1463), la maison de Bourbon (1463-1582).  Le château fut le témoin du meurtre de Jean de Berry, secrétaire du duc Jean de Bourbon, perpétré en 1488 suivant les instructions de son fils, le bâtard de Bourbon.  Lévis-Ventadour (1582-1661), Maison de Nérestag (1673-1730) et maison de Vaux (1730-1789). Abandonné depuis le XVIIIe siècle. Au XIXe siècle, il est racheté par un carrier, François Régis Experton qui le démentéle pour récupérer les matériaux. Il ne reste aujourd'hui que les traces d'une seule tour qui dominait l'édifice du côté des gorges de la Loire, des débris de créneaux, de mâchicoulis et autres moyens de défense. à la Révolution pour être finalement vendu, alors quil était abandonné depuis longtemps, par la baronnie de Roche-en-Régnier à la commune de Retournac.                          Dans la commune et environ le château de Chabanoles, de Mercuret,  de Bourange  (voir article) et plusieurs maisons fortes:  à Chabanoles (dans le sud de la commune voir article), et à Ribes et à Jussac (dans le nord). Ces maisons fortes, construites aux XIIe et XIIIe siècles.","architecture":"Château fort dArtias (XIe-XVIe siècle) en ruines,  apparaît dès lan mil, perché à 723 m daltitude, , le corps de logis du château dresse encore son altière silhouette. Près de lui sa petite chapelle, en partie sauvée, révèle sa lourde architecture romane, remanié au XVIe siècle. Sa façade a gardé une partie de son campanile. Tout autour, les restes de ses dépendances et remparts, preuve de limportance de cette place forte, essayent de résister aux attaques du temps et des hommes. Parmi les ruines actuelles, on trouve quelques grands pans de muraille faisant partie de lancien logis seigneurial du XIVe et XIIe siècles, des restes de muraille de lancienne cour du XIIe siècle), les vestiges de trois tours, les restes dune porte à lentrée du château, et les ruines de la chapelle castrale.  La porte d'entrée abrité sous un grand arc entre deux contreforts a été refaite au XVIe- XVIIe siècles. Le campanile qui s'élève sur la façade semble remonter à la même époque. Sur les restes intérieurs  se remarquent des chapiteaux ornés de feuillages. L'un d'eux présente des personnages  aux bras levés. L'abside était semi-circulaire.  Les chapiteaux, colonnes, bénitier et statue de bois polychrome du XVe siècle ont été pillés.","habitants":"Baronnie de Roche-en-Régnier\r\n        \"","divers":"Vestiges du fort d'Artias","gps":"","images":["../image/image_43/43_Artias_1.jpg","../image/image_43/43_Artias_2.jpg","../image/image_43/43_Artias_3.jpg","../image/image_43/43_Artias_4.jpg","../image/image_43/43_Artias_5.jpg"]},"Consult_chateau_formulaire32ae":{"id":"Consult_chateau_formulaire32ae","dept":"43","canton":"Aurec-sur-Loire","commune":"Aurec-sur-Loire","nom":"Aurec","type":"Château","periode":"XIII-XVI","histoire":"AUREC, construit par les chevaliers de Malte Clément IV, le français Guy Foulques est un ancien évêque du Puy et en 1267   lévêque du Puy régnant est un de la Roue, de la famille qui possède le château dAurec, ancienne propriété de la famille Fustier, est jusqu'au XVIIIe siècle, une partie de ce bâtiment servait de résidence au Moine-Sacristain, en plein cur de la ville, abrite aujourd'hui l'office de tourisme. Il abrite aussi un musée du vin Maison de Nerestang  ces derniers seigneurs d'Aurec.\r\nCHAZOURNES, Félix de Chazournes, écrivain né à Aurec en 1887, ancien château d'habitation, abrite aujourd'hui le collège de Chazournes. Gérard Feldzer, né à Aurec en février 1944, fils de Vadim Feldzer, résistant, mort pour la France en août 1944.\r\n GRANGEASSE, cet édifice  et construit au XVIIIe siècle et entouré d'un ensemble complet de dépendances agricoles et d'un parc boisé. Même s'il a fait l'objet de certains   aménagements au XIXe siècle il  a conservé l'intégralité de ses ornements intérieurs du XVIIIe siècle .                                                                                    TOUR d'ORIOL, sur les hauteurs de la commune d'Aurec-sur-Loire, on retrouve les restes d'un ancien château féodal, dont l'histoire s'est perdue au fil des ans, seuls subsistent une tour et quelques vestiges baignés de mystères.  Louis Mandrin s'est caché dans les grottes portant son nom en remontant les gorges de la Semène.                                                                          \r\nDans cette commune le château de Moine-Sacristain.","architecture":"Aurec, Le château primitif a probablement été construit vers 1100 . Le château actuel  dit du moine sacristain été élevé essentiellement aux XVe et XVIe siècles. Une des plus importantes forteresses de la région par ses dimensions, sa position stratégique ainsi que son rôle historique. Nombreuses transformations aux cours des siècles. Dès le XIIe siècle, la cité d'Aurec se blottit dans ses remparts et sur l'angle sud-ouest est édifié une imposante tour de défense construite en 1484 par Pierre de la Roue. Cette tour s'intégrera plus tard au château du Moine Sacristain qui, petit à petit, au cour des siècles, prendra la forme que nous lui connaissons aujourd'hui.  \r\nLe château de Chazournes, ancien château d'habitation, abrite aujourd'hui le collège.                                                            Grangeasse; château avec son décor intérieur de boiseries, cheminées et dessus de porte peints, la cage  d'escalier, les pièces suivantes  avec leur décor, rez-de-chaussée, chambre  des quatre saisons, salle à manger, salon aux médaillons, premier étage.\r\nLa tour d'Oriol, seul vestige du château féodal  se dresse au-dessus des rives escarpées et sauvages de la Semène, petite rivière se jetant dans la Loire. Près de cette tour, on peut voir une des grottes à Mandrin.","habitants":"Famille Fustier\r\n        \"","divers":"Château d'Aurec, de la tour des sacristain, de Chazournes, de Grangeasse et la tour d'Oriol.","gps":"","images":["../image/image_43/43_Aurec_1.jpg","../image/image_43/43_Aurec_2.jpg","../image/image_43/43_Aurec_3.jpg","../image/image_43/43_Aurec_4.jpg","../image/image_43/43_Aurec_5.jpg","../image/image_43/43_Aurec_6.jpg","../image/image_43/43_Aurec_7.jpg","../image/image_43/43_Aurec_8.jpg"]},"Consult_chateau_formulaire8281":{"id":"Consult_chateau_formulaire8281","dept":"43","canton":"Auzon","commune":"Auzon","nom":"Auzon","type":"Château","periode":"XVI","histoire":"AUZON, château-fort du XIIe siècle, peut-être même avant, un mur d'enceinte protégeait le château, l'église et ses dépendances du XIV au XVIe siècle dont le premier seigneur connu, Bernard d'Auzon, est mentionné en 1078. Vers 1260, Alphonse de Poitiers et Bompar d'Auzon accordèrent aux bourgeois alzoniens leurs franchises communales.  Durant les guerres de Religion, le château fut pris  en 1589  par les Ligueurs de Monsieur de Randan, le château fut presque  entièrement détruit . Toute la ville fut ensuite fortifiée. Vers le milieu du XIVe siècle, un différend survenu au sein de la famille comtale d'Auvergne, entraîna un conflit entre le roi de France et celui d'Angleterre. A la suite de ces hostilités, la place forte d'Auzon entra en partie dans le domaine royal, y resta jusqu'en 1537 et figura parmi les treize bonnes villes d'Auvergne. Le roi de France eu son château en ce lieu (le château Bourbon), et posséda une partie importante de cette seigneurie. En 1537, François de Montmorin acheta le château Bourbon. Au siècle suivant, le bâtiment céda la place à un monastère de bénédictines. Parmi les personnalités remarquables, il faut citer Henri Doniol (1818-1906), qui fut préfet de Grenoble, Nantes, Marseille et Bordeaux. La pittoresque ville d'Auzon conserve son aspect médiéval avec ses murs d'enceinte, ses rues étroites et quelques maisons anciennes. Vendu à la Révolution comme bien national, avec ses terres.                                                                              Dans la commune le château à Lugeac (voir article).","architecture":"L'édifice  d'Auzon est constitué d'une enceinte fortifiée bâtie à l'ouest de l'éperon rocheux dominé par le rempart sur trois faces. La quatrième face est barrée par une courtine percée d'une porte. A l'extrémité du flanc nord, présence d'une tour circulaire avec plusieurs canonnières horizontales qui assuraient le flanquement en enfilade de la courtine. Château fort  du XIIe siècle en partie détruit et fortifications, porte fortifiée de l'enceinte, logis à galeries avec escalier à vis, caves voûtées, fortifications extérieures à l'exclusion des constructions modernes,  au XVIIe siècle  les bâtiments furent  en partie démolis.  Le corps de logis central  fut presque entièrement détruit à la Révolution.  Seule reste une tour d'escalier accolée de galeries à arcades, voûtées d'arêtes, qui desservaient les étages. Porte de Brugel.","habitants":"Famille de François de Montmorin \r\n        \"","divers":"Château d'Auzon et château de Lugeac","gps":"","images":["../image/image_43/43_Auzon_1.jpg","../image/image_43/43_Auzon_2.jpg","../image/image_43/43_Auzon_3.jpg","../image/image_43/43_Auzon_4.jpg","../image/image_43/43_Auzon_5.jpg","../image/image_43/43_Auzon_6.jpg"]},"Consult_chateau_formulaire03dc":{"id":"Consult_chateau_formulaire03dc","dept":"43","canton":"Monastier-sur-Gazeille","commune":"Beaufort-de-Goudet","nom":"Beaufort_Goudet","type":"Vestiges","periode":"XIII-XVI","histoire":"BEAUFORT les Goudet, château-fort  bâti pour surveiller et dominer la vallée de la Loire, le château constitue un exemple intéressant de l'adaptation d'un château féodal du XIIIe siècle à l'évolution de la construction militaire, notamment l'artillerie.  Il a connu durant les guerres de Cent ans et de Religion une grande importance mais a été victime d'un abandon progressif après la Révolution qui l'a réduit à l'état de ruine. \r\nVers lan 850 fut fondé un ermitage par un personnage nommé Didier, après avoir été en partie démoli il a donné place à un quartier de Goudet appelé le Clos, on retrouve dans ce quartier des traces de cet ermitage.\r\nEn 869, le roi de France Charles le Chauve ratifie le don, fait à l'abbé Geilon et aux moines de Saint-Philibert, du lieu nommé « Godit », dans le diocèse du Puy, pour y fonder un monastère. En 1264 le fief relève des évêques du Puy.\r\nLiée par la Loire, lhistoire de Goudet saccouplera à celle dArlempdes. Baronnies du Velay, Antoine de Latour, Baron de St-Vidal, Seigneur de Goudet, retranché en 1533 dans les murs du château pendant le long siège dArlempdes alors que les protestants sen étaient emparés. Et la légende nous dira que les catholiques avaient construit de Goudet à Arlempdes un souterrain qui leur permit et facilita la prise du château. Antoine de la Tour apporta au XVIe siècle des remaniements.","architecture":"Au XIIIe siècle, Goudet deviendra une place forte grâce au château de Beaufort, il sera détruit durant la guerre de Cent Ans. Reconstruit au XVe siècle, il défendra Goudet pendant les guerres de religions.  L'édifice présente un mur d'enceinte, en partie reconstruit au XVe siècle, qui entourait la forteresse à mi-pente de la butte. Le château était, dès l'origine,  de plan carré avec une cour occupée sur le côté sud  par un logis adossé. Antoine de la Tour fait ajouter au XVIe siècle  une tour sur l'angle nord-ouest, une grosse tour en fer à cheval sur l'angle sud-ouest, une fausse braie dont subsiste le pan nord et une partie du pan sud avec tour d'angle.  A l'intérieur de l'enceinte, quelques vestiges au sol  laissent deviner les séparations des parties habitées. Au nord-est, reste d'une salle voûtée  et d'une cheminée. La tour du XVe siècle était renforcée intérieurement par un mur de doublure et percée d'archères et de canonnières.","habitants":"Famille d' Antoine de La Tour\r\n        \"","divers":"Vestiges du fort de Beaufort et manoir à Goudet","gps":"","images":["../image/image_43/43_Beaufort_Goudet_1.jpg","../image/image_43/43_Beaufort_Goudet_2.jpg","../image/image_43/43_Beaufort_Goudet_3.jpg","../image/image_43/43_Beaufort_Goudet_4.jpg","../image/image_43/43_Beaufort_Goudet_5.jpg","../image/image_43/43_Beaufort_Goudet_6.jpg","../image/image_43/43_Beaufort_Goudet_7.jpg","../image/image_43/43_Beaufort_Goudet_8.jpg","../image/image_43/43_Beaufort_Goudet_9.jpg"]},"Consult_chateau_formulairee7dc":{"id":"Consult_chateau_formulairee7dc","dept":"43","canton":"Vorey","commune":"Beaulieu","nom":"Beaulieu_Adiac","type":"Château","periode":"XIV-XIX","histoire":"BEAULIEU,  ADIAC,  maison forte du XIVe siècle  du baron de Saint-Vidal,   de la fin du Moyen-Age des sires d'Adiac qui devait se composer à l'origine d'un donjon. Dénué d'ouvrages défensifs suffisants, le château ne put résister aux calvinistes qui le prirent  en 1574. Le baron de Saint-Vidal le reprit.Puis passa à François de Polignac, sieur dAdiac.                                                              MARGEAIX, le site gallo-romain a laissé place au château \"néo-wagnerien\" de Margeaix qui fut entrepris en 1884 par larchitecte départemental Riboud pour son propriétaire, lindustriel et homme daffaires, Jacques Viallet. Le château juché sur un promontoire rocheux dominant la rive droite de la Loire est l'un des plus parfaits exemples du \"second souffle\" néo-gothique mêlant le pastiche au pittoresque.                                                                                     A quelques kilomètres au Nord-Est la maison forte de Breux à Mézéres. Le plateau de Margeaix abrita à l'origine une résidence thermale gallo-romaine où maintes découvertes de fontaines jaillissantes, des établissements de bains, des palais de marbre agrémentaient autrefois la vallée en ces lieux désignés sous le nom de Margines Aquae. On ne retrouve aujourdhui que peu de traces dun passé riche de souvenirs                                                                  SENEUIL,   Au sud à st-Vincent   existait déjà en 1027, en 1171 le Vicomte Armand et son fils cédaient Seneuil à l'évêque du puy. En 1329 et 1334 on parle des seigneurs de Seneuil. \r\n Au XVIIe Seneuil fut acquis en partie par le vicomte de Polignac dit \"le grand justicier\", le château manque de tomber aux mains du seigneur de la Roue en 1354, il ne reste aujourd'hui  que la motte féodal.                                                                                               Dans la commune la maison forte  de Breux au hameau de Mézéres et le manoir de Conches et de Piereys lieu d'élevages de vaches laitières.  le château de Recours est attesté en 1273 ruiné il ne reste que la base d'une tour (visitable).","architecture":"Adiac, maison forte de la fin du Moyen-Age qui devait se composer à l'origine d'un donjon présentant une pièce à chaque étage,   flanqué d'une tourelle circulaire. Une aile lui a été ensuite ajoutée,  avec son escalier à refend central. L'ensemble en U autour d'une cour rectangulaire et a conservé son caractère défensif. Elle a été remanié au XVIIIe siècle,  avec repércement des baies de la façade sud. La redistribution des pièces à cette époque a touché l'ensemble de la bâtisse sauf le premier étage du donjon.  L'intérieur montre un bel escalier à balustres du XVIIe siècle et un salon dont le décor peint serait du XIXe siècle.                             Le château de Beaulieu est mentionné en 1273 par Armand Vicomte de Polignac. Il sera de nouveau mentionné par ses successeurs en 1307 et 1310. En 1527, les habitants de Recours s'engagent à surveiller le château. La dernière mention apparait le 13 juillet 1557 où le seigneur de Polignac donne Recours à son fils. Importante forteresse  en pierre  corps de logis quadrangulaire à trois niveaux et attiques flanquée d'un donjon carré à cinq étages   et de tours ronde à l'opposé.                                                        Margeaix; corps de logis en équerre à trois niveaux flanquée d'une tourelle et à l'opposée d'une tour ronde crénelée.","habitants":"seigneur de Polignac \r\n        \"","divers":"Château d'Adiac, de Breux , de Conches, et de Margeaix","gps":"","images":["../image/image_43/43_Beaulieu_Adiac_1.jpg","../image/image_43/43_Beaulieu_Adiac_2.jpg","../image/image_43/43_Beaulieu_Adiac_3.jpg","../image/image_43/43_Beaulieu_Adiac_4.jpg","../image/image_43/43_Beaulieu_Adiac_5.jpg","../image/image_43/43_Beaulieu_Adiac_6.jpg","../image/image_43/43_Beaulieu_Adiac_7.jpg","../image/image_43/43_Beaulieu_Adiac_8.jpg","../image/image_43/43_Beaulieu_Adiac_9.jpg"]},"Consult_chateau_formulaire5522":{"id":"Consult_chateau_formulaire5522","dept":"43","canton":"Cayres-et-Saugues","commune":"Alleyras","nom":"Beaume","type":"Maison forte","periode":"XVII","histoire":"BEAUME,  La Beaume, assis sur un sol volcanique. C'est le seul endroit au de la de l'Allier, dans l'arrondissement du Puy,  appelé Poutez, habité par MM. Chauchat.   Le chevalier, ancien capitaine, homme instruit, se fera un plaisir de guider les voyageurs vers un sommet granitique, au-dessus de la côte qui domine le hameau. Le Château d' Agrain du XIIIe siècle. Le Château de Vabres, bâti sur un éperon rocheux, ce château témoigne encore de l'emprise des seigneurs de Montlaur, sur le Devès, et la Vallée de l' Allier.  Vabres est aussi connue pour sa poterie qui  remonterait au Moyen-Age,                                                                                                        Dans la commune le château de Rochefort du XIIIe siècle et les ruines  du château à Vabras, construit sur un éperon rocheux, témoin de l'emprise des seigneurs de Montlaur.","architecture":"Beaume, l'édifice a été reconstruit aux XVIIe et XVIIIe siècles, dans un style médiéval qualifié de rustique, dont le principal élément décoratif est l'encadrement sculpté de la porte d'entrée. Eléments protégés MH : château en totalité avec décors intérieurs: cuisines, escalier, cabinet voûté orné de scènes peintes, grande salle, salon, chambres avec  leurs cheminées à trumeaux, alcôves et plafond peint, ainsi que les communs et le jardin clos.        Vestiges du château d'Agrain et de Rochefort base de tour ronde, notre village date vraisemblablement de l'époque gallo-romaine et tiendrait son nom d'un nommé Cilius. Dès le Moyen Age, il est fortifié, dans la partie haute, le château fort, ses dépendances et l'église romane dominent de plus de 70 m le cours de l'Alli.","habitants":"MM. Chauchat\r\n        \"","divers":"Château de la Beaume","gps":"","images":["../image/image_43/43_Beaume_1.jpg","../image/image_43/43_Beaume_2.jpg","../image/image_43/43_Beaume_3.jpg","../image/image_43/43_Beaume_4.jpg"]},"Consult_chateau_formulaire6d8c":{"id":"Consult_chateau_formulaire6d8c","dept":"43","canton":"Monistrol-sur-Loire","commune":"Beauzac","nom":"Beauzac","type":"Château","periode":"XII-XVII","histoire":"BEAUZAC, en 1180, à Pierre de Beauzac. berceau de la famille Jourda de Vaux. En 1248, noble Pons de Beauzac, son descendant, cédait à l'évêque du Puy des Cens, rente et justice sur la ville de Bas. De 1309 à 1334, Pons de Beauzac dit Ponchot rendait hommage à l'évêque du Puy de sa part des châteaux et mandements de Beauzac et Bas. Aux Rochebaron-Usson succédèrent pour leur part, les Sémur par le mariage de Pierre avec Béatrix de Rochebaron-Usson avant 1373. Leur fille unique, Alise de Sémur apporta Beauzac en dot à Jean de Lavieu, et à la génération suivante, vers 1480, Marie de Lavieu fit de même avec Artaud III de Saint-Germain d'Apchon. Enfin Artaud IV, un degré en dessous, vendit en 1525 sa terre dite de Beauzac la Brosse, et toutes ses appartenances et droits seigneuriaux  à noble Guiot de Beauzac, descendant de la famille des autres possesseurs du fief. En 1666, c'est Justine de Paturel qui était dame de Beauzac, seigneurie qu'elle apporta à son mari Jean de Cusson, seigneur de la Roue. Aux Fillière maîtres de Beauzac ,au XVIIIe siècle, passa à Armand de Colomb.  Le dernier Jean De Colomb le vendit  à la congrégation des surs St Joseph. Jean-François de Colomb fut le dernier seigneur de Beauzac,  sous la Révolution, Adélaïde de Colomb épousa un Richond, dont les descendants vendirent le château aux religieuses de Saint Joseph, toujours propriétaires, aujourd'hui Ecole Saint-Joseph.                                                                   Dans la commune le château de la Dorlière et de la Grange.","architecture":"Beauzac ville fortifié  en 923, le village de Beauzac est une des paroisses les plus anciennes du diocèse du Puy-en-Velay. Au XIIe siècle furent édifiés un château, ainsi que des murailles denceinte, formant ensemble un périmètre rectangulaire encore aisément reconnaissable aujourdhui . De cette ancienne place forte ont été conservés que deux porches de forme ogivale et des consoles en bois soutenant les galeries qui couronnent les façades des maisons aménagées dans les anciennes murailles. Des quatre tours plantées aux coins de la citadelle, seule reste celle du château derrière l'église.  De cette place forte, ne subsiste plus que les deux portes en arc brisé, les corbeaux en bois couvrant les façades des maisons édifiées sur les anciens remparts et une tour de défense (les tours Sud-Est et Sud-Ouest ont été démolies dans les années 30). Le château de Beauzac connu de nombreux seigneurs. On peut admirer sa belle cuisine voutée et au deuxième étage une grande salle dont les solives sont ornées de peintures datées de 1567.                                                                          Château de la Dorlière, corps de logis carré à trois niveaux flanqué d'une tour octogonale, à l'opposé prolongement d'habitation de même niveau se terminant d'un corps de bâtiment avec toiture en croupe.","habitants":"Pierre de Beauzac\r\n        \"","divers":"Porte de Beauzac, château de Dorlières et de la Grange","gps":"","images":["../image/image_43/43_Beauzac_1.jpg","../image/image_43/43_Beauzac_2.jpg","../image/image_43/43_Beauzac_3.jpg","../image/image_43/43_Beauzac_4.jpg","../image/image_43/43_Beauzac_5.jpg","../image/image_43/43_Beauzac_6.jpg"]},"Consult_chateau_formulaire20a5":{"id":"Consult_chateau_formulaire20a5","dept":"43","canton":"Tence","commune":"La Besseyre-St-Mary","nom":"Besset_Tence","type":"Maison forte","periode":"XVI","histoire":"BESSET, les seigneurs de Besset sont attestés dès le XIIIe siècle. Tence une moitié composée des armes de Jean de Naturelli, originaire de Bourgogne, bénédictin et prieur de Tence en 1523,  trois merlettes sans pattes de sable noir symbolisant la justice, la loyauté, la beauté, et la bonne réputation, sur le fond or.\r\nl'autre moitié est composée par les armes du Languedoc, comté de Toulouse, dont Tence dépendait jusqu'à la Révolution.  Au XIe siècle, un prieuré est créé à Tence, dirigé par des bénédictins qui seront alors co-seigneurs avec ce même évêque. Le prieuré sur lemplacement duquel on trouve aujourdhui lhôtel de ville forme le noyau principal de la ville défendu par un rempart sûrement détruit au XVIIe siècle avec deux portes daccès, porte du Sud et porte Saint Antoine. La forte présence dhommes déglise, puissants seigneurs qui se partagent le pouvoir, entraîne la création de grandes propriétés, de fiefs, qui avec le climat de guerre régnant  pendant  la guerre de cent ans puis guerres de religions, prendront la forme de châteaux ou maisons fortes résidences et exploitations agricoles de la petite noblesse afin de se constituer des abris.\r\nNous pouvons citer entre autres les châteaux de Joux (voir article) , tous de lépoque féodale avec rénovations et ajouts ultérieurs, ainsi que les maisons fortes de La Borie ou du Mazel (même période) et le château de Chamblard bâtisse du XVIIe siècle de Pompeyrin et de Hontès.","architecture":"La seigneurie du Besset apparaît dans les textes au milieu du XIIIe siècle. Au XIVe siècle, construction de la grosse tour carrée muni de bretèches aux angles sur lesquels s'appuie un logis flanqué d'une tourelle ronde. A l'époque des guerres  de religion, le château a un rôle important dans la lutte contre les protestants dans la région. La liaison entre la tour  et le corps de logis semble dater   du XVIIIe siècle. Au XIXe siècle, d'importants travaux sont réalisés avec l'agrandissement du corps de logis rectangulaire, dont la surface a été doublée, et l'adjonction, entre le donjon et la tour, d'un corps de bâtiment qui assure la liaison  directe entre les deux. Le château comprend un donjon carré  situé sur l'angle nord est d'un corps de logis rectangulaire, cantonné sur l'angle sud-est d'une grosse tour ronde. Il comporte une pièce à chaque niveau. Le logis a été très agrandi au XIXe siècle. Il est divisé en quatre pièces à chaque étage et le rez-de-chaussée comporte une grande salle voûtée.","habitants":"Jean de Naturelli\r\n        \"","divers":"Château du Besset et hôtel de ville, château de Chamblard","gps":"","images":["../image/image_43/43_Besset_Tence_1.jpg","../image/image_43/43_Besset_Tence_2.jpg","../image/image_43/43_Besset_Tence_3.jpg","../image/image_43/43_Besset_Tence_4.jpg","../image/image_43/43_Besset_Tence_5.jpg","../image/image_43/43_Besset_Tence_6.jpg","../image/image_43/43_Besset_Tence_7.jpg"]},"Consult_chateau_formulaire847a":{"id":"Consult_chateau_formulaire847a","dept":"43","canton":"Blesle","commune":"Blesle","nom":"Blesle","type":"Forteresse","periode":"XIII","histoire":"BLESLE, fief des  barons de Mercoeur au début du XIIIe siècle, ce donjon, que l'on appelle également la tour aux Vingt-Angles, fût le témoin de la lutte qui opposa les Mercoeur et les religieuses de l'Abbaye Saint-Pierre, cette tour et son château bâtis vers 1250 permirent aux puissants barons d'asseoir leur suprématie dans le village et les environs. N'ayant plus d'héritier dès le XIVe siècle, la famille de Mercoeur séteint. Leurs terres passent aux Dauphins dAuvergne vers 1354, puis à la famille de Bourbon-Montpensier au XVe siècle, la maison de Lorraine au XVIe siècle et la maison de Vendôme au XVIIe siècle, il faut attendre 1716 pour que la seigneurie et le château soient rachetés par Henri-Louis de Chavagnac. Faisant table rase du passé, il décide la destruction des ruines du château et fait construire une belle demeure dans le style classique. Conservant tout de même le donjon, la famille de Chavagnac est contrainte de se séparer de l'ensemble durant la Révolution avant de récupérer ses biens en 1815. Le château est par la suite vendu aux Touchebouf puis à la commune qui rachète le tout en 1845. Installant la mairie, une école et la gendarmerie dans les bâtiments du XVIIIe siècle, la tour servit durant quelque temps de prison. de nos jours désaffecté, le donjon reste un  témoignage du glorieux passé des Mercoeur.                                          BOS; Propriété rurale de la famille Blanc du Bos, ce château a été construit au XVIIe siècle.                                                                  La FAGE à St-Etienne de Besle,  en 1883 lorsque la famille Basse-Vitalis devient propriétaire, le château est l'objet de nombreuses transformations, une des tours du XVe siècle, placée désormais au milieu de la façade du bâtiment principal, est détruite, une autre tour ronde est bâtie à l'angle Est du même bâtiment, remployant la porte chanfreinée de l'ancienne tour.","architecture":"La tour de Blesle,  est un donjon de plan rectangulaire de 26 mètres de haut. toit à longs pans, huit contreforts contrebutent les angles et les mâchicoulis portés, entre les contreforts, par des arcs jumeaux bandés sur des consoles médianes formées d'assises en encorbellement. château  en forme de U comprend  trois étages,  dont 2 voûtés en berceau,  le premier plein cintre, le second brisé, encadrements en lave, croupe et toit en pavillon.                         Le château de Bos a été construit au XVIIe siècle, présente un corps de logis rectangulaire flanqué sur l'angle sud ouest d'une tour carrée,  dans le prolongement de cette tour, se positionne le corps de bâtiment du XVIIIe siècle, à côté d'un château médiéval ruiné, et complété au XVIIIe siècle par un bâtiment supplémentaire. Au sud, s'étend une grande prairie sur laquelle a été conservée une tour médiévale, restes de l'ancien château du  Bos.\r\nLa Fage, tour ronde de la deuxième moitié du XIIIe siècle, abandonnée au XVe siècle au profit d'une maison forte construite à côté, comportant un bâtiment rectangulaire flanqué de deux tours rondes, l'une à l' angle nord, l'autre à l'angle sud. En 1661, une ferme est édifiée au sud de la tour ronde. Au XVIIIe siècle, la demeure, dont les ouvertures sont refaites,  et le donjon, sont reliés par un bâtiment en retour d'équerre, prolongeant au sud-est la maison forte. Ce agrandissement, dont l'aile jouxtant la tour ronde constitue les communs, est sans doute contemporain de la construction de la bergerie Grange.","habitants":"Baron de Mercoeur\r\n        \"","divers":"Blesle tour des vingt angles, château des Mercoeur tour de Massadou, château du Bos et de la Fage.","gps":"","images":["../image/image_43/43_Blesle_1.jpg","../image/image_43/43_Blesle_2.jpg","../image/image_43/43_Blesle_3.jpg","../image/image_43/43_Blesle_4.jpg","../image/image_43/43_Blesle_5.jpg","../image/image_43/43_Blesle_6.jpg","../image/image_43/43_Blesle_7.jpg","../image/image_43/43_Blesle_8.jpg","../image/image_43/43_Blesle_9.jpg"]},"Consult_chateau_formulaire2a04":{"id":"Consult_chateau_formulaire2a04","dept":"43","canton":"St-Julien-Chapteuil","commune":"St-Pierre-Eynac","nom":"Bonneville_Chamblas","type":"Maison forte","periode":"XVI","histoire":"BONNEVILLE, en 1300 fief des Chapteuil de Bonneville qui gardèrent la seigneurie jusqu'en 1630 et passa à Amable de Myet qui prit le titre de seigneur de Bonneville  Christophe de Chapteuil, puis à la famille Brunel d'Allentin, puis aux  Brunel de Bonneville du XVIIe-XIXe siècle,  passa  aux de Leyssac  aux de Châteauneuf de Condres de Cussac du XVIIIe siècle,  aux de Colomb d'Hauteville de Gast, et aux Pradier d'Agrain et  au XVIIIe siècle  à la famille de Bonneville.                                                                    Dans la commune le château de Chamblas ou a été tué monsieur de Marcellange.","architecture":"Château de Bonneville, la construction du château en l'an 1326. Des éléments d'arcatures gothiques existent encore au pied du château qui dut être fortement remanié aux  XVIe  et XVIIe siècles, en particulier à la Renaissance, qui  aujourd'hui est relativement bien conservé. Saint-Pierre dépend comme tout le Velay à cette époque, du Parlement de Toulouse et se situe à l'extrême nord du Languedoc.  L'un des seul château encore habité sur la commune. L'aile ouest a été ajoutée,  deux tours restent du manoir primitif  qui, à l'origine, dut être limité au corps central dont l'escalier en vis éclairé par deux oculis limitaient l'importance, le grand salon, aménagé sous Louis XIV.","habitants":"Brunel de Bonneville \r\n        \"","divers":"Château de Bonneville et de Chamblas.","gps":"","images":["../image/image_43/43_Bonneville_Chamblas_1.jpg","../image/image_43/43_Bonneville_Chamblas_2.jpg"]},"Consult_chateau_formulaire3aa7":{"id":"Consult_chateau_formulaire3aa7","dept":"43","canton":"Yssingeaux","commune":"Chénereilles","nom":"Borie_Chenereilles","type":"Château","periode":"XV-XVII","histoire":"BORIE à Chenereilles, château dont l'origine remonte à la fin du XIVe ou au début du XVe siècle fondé par Jean de Bourbon évêque du Puy. Il a été transformé au XIXe siècle  avec l'ajout d'ailes. La première mention écrite apparaît entre 1360 et 1410 : Amé Vert, seigneur de Chenereilles et  bailli de Forez  est autorisé par  Louis II de Bourbon à fortifier son château, si ce seigneur peut le fortifier c'est qu'il existait déjà à cette date une maison forte. Au XVe siècle les St-Germain sont seigneurs de Chenereilles. En 1732 Claude Vital Groseillier, conseiller au parlement fait agrandir la demeure en y ajoutant deux ailes à l'est, supprime les fossés et construit également une terrasse. En 1903, Jean-Pierre-Alexis Beyssac , historien , puis la famille d'Assier de  Boisredon se succèdent dans cette demeure. \r\nBORIE (la), construite en 1603 ou naissait Jean-André de Véron de la Borie , compagnon de Rochambeau. A dix kilomètres prés du barrage de Lavalette reste d'une maison forte du Fomental du XVe siècle et à cinq cent mètres au sud la maison forte de Treslemont.","architecture":"La Borie, petite construction militaire remanié aux XVe et XVIe siècles mais qui doit avoir des origines plus anciennes. Cette maison forte a été édifiée après la guerre de Cent ans, contre les Anglais et Routiers qui ravagèrent la région. Le plan présente un corps de bâtiment carré flanqué d'une tour massive servant d'escalier, de protection et de guet, lui-même protégé aux angles par des bretèches avec mâchicoulis, sont conservées autour du donjon et de la tourelle une série d'échauguettes.                           Maison forte de la Borie édifiée au XIIIe siècle et typique dans le Velay,  a été modifiée dans ses percements au XVe siècle puis à diverses autres époques. De plan presque carré, l'édifice est flanqué d'une grosse  tour ronde et   prolongé par une  aile de communs.  L'intérieur a conservé son caractère avec des décors quasiment complets salle à manger, salon Louis XV.","habitants":"Seigneurs de Chénereilles\r\n        \"","divers":"Château de la Borie à Chenereilles","gps":"","images":["../image/image_43/43_Borie_Chenereilles_1.jpg","../image/image_43/43_Borie_Chenereilles_2.jpg","../image/image_43/43_Borie_Chenereilles_3.jpg","../image/image_43/43_Borie_Chenereilles_4.jpg","../image/image_43/43_Borie_Chenereilles_5.jpg","../image/image_43/43_Borie_Chenereilles_6.jpg"]},"Consult_chateau_formulaire85b9":{"id":"Consult_chateau_formulaire85b9","dept":"43","canton":"Allègre","commune":"Céaux-d`Allègre","nom":"Borie_Courbiere","type":"Château","periode":"XV-XVII","histoire":"BORIE-Chambarel,  maison forte se trouvant au lieu-dit de La Borie qui existe depuis le XIIIe siècle. Dépendance du seigneur dAllègre, le fief de Chambarel passa en 1370 aux de Posterle, puis en 1420 par mariage dAymarde de Posterle aux Guerrin de Pouzols. Pierre III de Guerrin modernise cette maison forte à la fin du XVe siècle. Ses Armes losange dargent et de sable sont visibles sur lécu qui surmonte lentrée principale et à dautres divers endroits  En 1774, la propriété est achetée par A.Digonnet avocat au Puy et en 1874 vendue à des fermiers.                                                             COURBIERE,  château construit au XVe siècle par les chevaliers de Bar, qui se sont distingués lors des Croisades seigneurs de Courbières à partir de 1200. Décors intérieurs du XVIIIe siècle.","architecture":"Maison forte ou château de la Borie-Chambarel, du XIIIe siècle au XVe siècle, façades et toitures de la maison-forte et du grenier attenant escalier à vis avec l' oratoire, salon avec son décor de boiseries au rez-de-chaussée, elle a été modifiée dans ses percement au XVe siècle puis à diverses autres époques. De plan presque carré, l'édifice est flanqué de quatre tours et  prolongé par une  aile de communs.  L'intérieur a conservé son caractère avec des décors quasiment complets. En dépit des vicissitudes du temps qui vit le démantèlement du chemin de ronde et lécrêtement de ses tours, la maison a conservé des éléments de décor intéressants, fenêtres à meneaux et archivoltes à crossettes frappés décus, linteaux chargés de têtes sculptées. Les meneaux sont des montants et compartiments de pierre de taille, ou assemblages de pièces de bois, divisant en plusieurs vides la surface dune fenêtre des monuments de style gothique ou Renaissance.                                                                                Courbière, édifié au XIIIe siècle.  maison forte du XIVe siècle remanié au XVIIe siècle,    tour carrée  découronnée de l'étage supérieur et des mâchicoulis et percées de fenêtres. Château, y compris les communs du XVIIIe siècle, le donjon médiéval, de plan carré avec une tourelle d'escalier à l'angle nord-est, a été modernisé au XVIIIe siècle.  A cette époque également, construction d'une aile à l'angle nord-est du donjon. L'ensemble des bâtiments est disposé autour d'une cour intérieure. Du côté Est de cette cour, en retour sur l'aile du XVIIIe siècle, se trouve un bâtiment de communs.","habitants":"Guerin de Pouzols\r\n        \"","divers":"Château de Borie à Chambanel, château de Courbiere et vestiges à Céaux d'Allègre","gps":"","images":["../image/image_43/43_Borie_Courbiere_1.jpg","../image/image_43/43_Borie_Courbiere_2.jpg","../image/image_43/43_Borie_Courbiere_3.jpg","../image/image_43/43_Borie_Courbiere_4.jpg","../image/image_43/43_Borie_Courbiere_5.jpg","../image/image_43/43_Borie_Courbiere_6.jpg"]},"Consult_chateau_formulaire3aef":{"id":"Consult_chateau_formulaire3aef","dept":"43","canton":"Brioude","commune":"Bournoncle-St-Pierre","nom":"Bournoncle","type":"Vestiges","periode":"XV","histoire":"BOURNONCLE, Le prieuré du XIe siècle a été sauvé de la ruine grâce à un important programme de soutien financé par des fonds privés.  François de Larochefoucauld seigneur  de Bourgonde  est vraisemblablement décédé, après 1700. Le 8 février 1707, un couple de bourgeois Louis Bastier et son épouse Marguerite Trioullier, acquièrent la terre de Barlières appartenant à Maximilien de Rochemonteix, Seigneur de La Roche et de Vernassal, tandis que leur installation se fait à Bournoncle. Présents à Bournoncle en 1724 ils vivent des rentes de leurs domaines. En 1747, leur fille Claudette épouse Pierre Dalbine notaire royal à Jumeaux qui, en 1774, porte le titre de « Châtelain de Bournoncle et de ses dépendances ». Jusquen 1830, les Bastier restent propriétaires des domaines de Bournoncle et de Barlières. Pierre Gilbert Bastier vend  à monsieur Alteroche avocat à Issoire en juin 1830, tandis que celui de Barlières est cédé à monsieur Doniol dAuzon en mai 1833. Les derniers acquéreurs vendent à leur tour toutes les parcelles éloignées ou détachées. La villa de Barlières est cédée à la famille Vachier puis acquise par la famille Casati en 1885.  Celle de Bournoncle est vendue à sur Thérèse Casati, religieuse de Saint-Vincent de Paul et propriétaire de lécole libre des filles.                                   LAROCHE-Faugères oeuvre des Rochefort d'Ally, originaires de la région de Massiac. C'est durant cette période qu'ils remplacent une famille Ungle entre Brioude et Blesle, ce édifice affirme par sa présence la puissance territoriale de ses fondateurs et de leurs successeurs,  les Rochefort de La Roche, dont l'une des descendantes Marguerite épouse Jean De Chalvet de Rochemonteix en 1587.  La Seigneurie demeure dans cette famille qui choisit de résider au château voisin de Vernassal, entraînant l'abandon et la ruine du château féodal.","architecture":"Bournoncle sur  un site escarpé le château épouse le socle rocheux d'un dyke basaltique et comprend deux éléments distincts : un châtelet et la tour proprement dite commande l'accès au bâtiment principal qui se fait par une étroite rampe en corniche taillée au flan du rocher, exposée au tir des archères du châtelet. Une première enceinte comprenant des restes de tours circulaires subsiste au pied du rocher. La porte d'entrée du XVIe siècle, s'ouvre sous un cordon de faux-mâchicoulis symboliques. Cette enceinte inclut un village dont les vestiges sont illisibles.                        Château de la Laroche-Faugères sa construction semble remonter au début du XIIIe siècle   situé sur la rive droite d'un affluent de l'Allier, est l'un des plus anciens du Brivadois. Il ne reste que les ruines.","habitants":"François de Larochefoucauld \r\n        \"","divers":"Vestiges du fort et château de Laroche-Faugères","gps":"","images":["../image/image_43/43_Bournoncle_1.jpg","../image/image_43/43_Bournoncle_2.jpg","../image/image_43/43_Bournoncle_3.jpg","../image/image_43/43_Bournoncle_4.jpg","../image/image_43/43_Bournoncle_5.jpg"]},"Consult_chateau_formulaire8e04":{"id":"Consult_chateau_formulaire8e04","dept":"43","canton":"Le Puy-en-Velay","commune":"Arsac-en-Velay","nom":"Bouzols","type":"Forteresse","periode":"XII","histoire":"BOUZOLS, en 1046 le fief est attribué par l'évêque du Puy à son neveu Ithier de Mercoeur, en 1220 les sires de Bouzols, au XIIIe siècle  le seigneur est Jaucerand de St-Romain, au XIVe siècle  aux Poitiers qui le vendent  en 1347 au cardinal Hugues  Roger de La Tour celui-ci l'abandonne  en 1351  à son neveu Guillaume Roger comte de Beaufort et frère du pape entre 1347 et  1427. Antoinette de Beaufort femme de Jean Le Meingre dit Boucicaut, maréchal de France mort en captivité en Angleterre, y vécut au début du XIVe siècle. Sa qualité de nièce du pape Clément VI, ancien abbé de la Chaise-Dieu lui permit sans doute de faire procéder à dimportants travaux de restauration et notamment daménager une petite chapelle intérieure. Au cours de cette période la forteresse eut à subir en 1400 un siècle mémorable  de la part de Pons de Langeac, Chambellan du Duc de Berry   qui sopposait à la famille de Beaufort au sujet de certains héritages légués à cette maison par la reine Jeanne épouse de Charles V. En 1420 il est occupé par les Armagnacs et en  1535 les de  La Tour d'Auvergne en prenne possessions et remanie les parties basses. Au XVIe siècle, il fut le théâtre de nombreux et  vigoureux affrontements  entre protestants et catholiques puis entre royalistes et ligueurs. Sa position lui conférait en effet une très grande importance stratégique dans la défense de la cité  Ponote toute  acquise à la ligue. Ainsi le baron de Lestrange gouverneur du Puy loccupait-il avec ses troupes entre 1585 et 1598. Peu à peu négligé puis abandonné au cours du XVIIIe siècle par ses possesseurs qui vivaient à la cour, il fut  vendu  comme bien national, mais les acheteurs  s'en désistèrent en faveur dAnne Paule Dominique de Noailles, épouse Montagu, cette dernière était la sur de madame De Lafayette. Bouzols appartient depuis 1808 à la famille Beaud  de Brive et aujourd'hui, Jean Louis de Brive entreprend des travaux de sécurisation pour ouvrir l'édifice au public.\r\nDans la commune le château de Rohac.","architecture":"En 1220  Bouzols entouré d'une ligne de défense dont-il reste des fragments  de courtine et une tour  circulaire, composé de deux parties bien distinctes et d'âges différents, la forteresse comprend le château primitif ou donjon quadrangulaire flanquée aux angles  de tours circulaires pleines et les bâtiments d'habitation, dont on est a peu près certain que la première construction date du XIIIe siècle. A l'entrée, une petite chapelle romane à nef unique voûtée en berceau plein cintre , remonte probablement à la fin du XIe siècle.  Immense esplanade, la citadelle offre  à la vue un four à pain  en très bon état, une cave à provisions et une très curieuse citerne creusée dans le roc. Le grand parc du château ensuite, appelé Faisandier, laisse entrevoir   des lieux d'habitation   du XIXe siècle. Très ombragé il offre une promenade historique, des jardins entretenus   et  des grottes primitives, lieux de vie d'une autre époque.","habitants":"Jaucerand de St-Romain \r\n        \"","divers":"Forteresse de Bouzols et château de Rohac","gps":"","images":["../image/image_43/43_Bouzols_1.jpg","../image/image_43/43_Bouzols_2.jpg","../image/image_43/43_Bouzols_3.jpg","../image/image_43/43_Bouzols_4.jpg","../image/image_43/43_Bouzols_5.jpg"]},"Consult_chateau_formulaire9452":{"id":"Consult_chateau_formulaire9452","dept":"43","canton":"Brioude-Auzon","commune":"Brioude","nom":"Brioude_Grezes","type":"Château","periode":"XV","histoire":"BRIOUDE, dans le sillage du moment ducal, la famille des Mercur se distingue en Haut-Allier et à Brioude plus particulièrement, grâce à Saint-Odilon, ancien chanoine de Brioude mais surtout abbé de Cluny (994-1049), constructeur de la plus vaste église d'Occident et l'un des promoteurs de la Trêve de Dieu ainsi que de la fête des morts. Les Mercur fourniront jusqu'au XIVe siècle l'essentiel des doyens du chapitre et réclameront encore à la fin du XVe siècle des droits patrimoniaux sur les revenus attachés à cette dignité. Au nord-est   après le château Lamothe (article) à Agnat  le château des Grèzes dont je n'ai pas l'historique, et côté sud à 8 kilomètres à , Saint-Just près de Brioude le château du Mas.","architecture":"Brioude;   La ville de Brioude qui n'à rien de féodal mis à part une porte et quelques bâtiments offre  aux touristes un chef-d'uvre de l'architecture romane , la basilique saint-Julien construite entre le XIe et le XVe siècle.                                                                            Château des Grèzes en forme de U   trois corps de logis à deux niveaux flanqués de tours rondes en angles.                               Château du Mas quadrilatère flanqué de tours rondes et d'échauguettes à trois niveaux.","habitants":"Famille des Mercur\r\n        \"","divers":"Patrimoine à Brioude château de Grèzes et de Mas à Saint-Just","gps":"","images":["../image/image_43/43_Brioude_Grezes_1.jpg","../image/image_43/43_Brioude_Grezes_2.jpg","../image/image_43/43_Brioude_Grezes_3.jpg","../image/image_43/43_Brioude_Grezes_4.jpg","../image/image_43/43_Brioude_Grezes_5.jpg","../image/image_43/43_Brioude_Grezes_6.jpg","../image/image_43/43_Brioude_Grezes_7.jpg","../image/image_43/43_Brioude_Grezes_8.jpg","../image/image_43/43_Brioude_Grezes_9.jpg"]},"Consult_chateau_formulaire6756":{"id":"Consult_chateau_formulaire6756","dept":"43","canton":"Tence","commune":"Tence","nom":"Brosse_Tence","type":"Château","periode":"XV-XVII","histoire":"BROSSE, sous l'ancien régime, était une baronnie dont le premier seigneur connu est Pons-Imbert de La Garde signalé entre 1296 et 1309. Du XIVe au XVIe siècles, de nombreuses familles se succèdent à La Brosse,  Malet   de La Tour-Maubourg, Rochebaron-Usson, Semur, Lavieu, St-Germain  d'Apchon. Dans la première moitié  du XVIe siècle, La Brosse passe aux Clermont de Chaste  qui le gardent  jusqu'en 1751. Cette famille a joué un  rôle important  dans le Velay  pendant les guerres de religions. En 1752, par son mariage, Marie-Charlotte de  Clermont de Chaste apporte La Brosse à Marie-Louis de Caillebot de Salle, sénéchal du Velay, lieutenant général gouverneur de la Marche en 1778, qui transforme l'ancienne maison forte en château de plaisance. En 1789, l'édifice est vendu à la famille Maurin, les descendants sont  toujours propriétaires. Cette demeure, dont l'état  s'était lourdement  dégradé depuis 1935, a été  restaurée à partir des années 1970 par l'architecte Claude Perron,  les travaux ont touchés l'agencement intérieur.  Nous pouvons citer entre autres les châteaux de Joux (voir article),   du Besset (voir article), tous de lépoque féodale avec rénovations et ajouts ultérieurs, ainsi que les maisons fortes de La Borie et du Mazel (même période).","architecture":"la maison forte de la Brosse devenue château se compose d'un corps de logis de forme allongé  et d'une tour ronde. De l'ancienne maison forte il subsiste essentiellement  le sous-sol avec ses caves, la tour d'angle couverte d'un toit conique et la face nord du château. Cette dernière, surmontée de vestiges de mâchicoulis, présente des reprises de maçonnerie. La façade principale, reconstruite en 1778, offre une élévation à deux étages et cinq travées. Jusqu'au  milieu du XXe siècle elle était encadrée  par deux pavillons en retour d'angle  à un étage sans doute édifiés au  XIXe siècle. Seul le pavillon, côté est, subsiste aujourd'hui, il renferme le logement des gardiens. L'escalier  intérieur du château, remanié, comportait autrefois  trois volées contre deux actuellement. Les trois niveaux de la tour ont une coupole en couverture. Les dépendances jouxtent le château à l'est, remise, grange étable. Le  jardin s'étend devant la façade principale du château, au-devant d'une cour. Son extrémité sud, formant   terrasse, est supportée par des voûtes en berceau.","habitants":"Clermont de Chaste\r\n        \"","divers":"Château de la Brosse","gps":"","images":["../image/image_43/43_Brosse_Tence_1.jpg","../image/image_43/43_Brosse_Tence_2.jpg"]},"Consult_chateau_formulaire3690":{"id":"Consult_chateau_formulaire3690","dept":"43","canton":"Monistrol-sur-Loire","commune":"Grazac","nom":"Carry","type":"Vestiges","periode":"XIII","histoire":"CARRY, le château de Carry qui s'appelait Vertamise, était dès le XIIIe siècle une forteresse d'une seigneurie de Saussac. Le château de Saussac  siège d'une des dix-huit baronnie du Velay et  à partir de 1782, le château perd  progressivement sa fonction résidentielle et en 1827, il est loué à un fermier et tombe en ruine. Autrefois, une enceinte fortifiée devait en défendre l'accès.                   Dans la commune plusieurs châteaux celui de Chabanolles (voir article) de Chabrespine à St-Martial (voir article) de la planche, de Verchères (voir article) de Villedomont et de Lavoute.","architecture":"Ruines des châteaux de Carry et de Saint-Martial sur la rive du Lignon et ruine de Vertamise du XVe siècle,  Au XIIIe siècle le château primitif est aménagé pour améliorer sa défense en l'adaptant aux progrès de l'architecture militaire, notamment avec l'adjonction d'éléments en surplomb remarquable exemple d'habitation  simple et massive du XVIe siècle, l'édifice fut probablement la demeure de l'intendant de Polignac dont l'importante forteresse s'aperçoit à quelques kilomètres. Le volume et les lignes générales sont, à l'extérieur. Aujourd'hui, le château se compose de deux parties distinctes, un châtelet fortifié de plan massé et une tour pentagonale. Le système défensif global de l'édifice meurtrières,  bretèches,  tours de flanquement en surplomb et éperon est entièrement tourné vers le sud-ouest, seul côté de terre ferme à protéger.  La tour comportait  autrefois quatre niveaux  dont le dernier est arasé. Le rez de chaussée est encore voûté en  berceau brisé. Au nord de la tour se trouve la porte d'entrée   surmontée de fenêtres aux chambranles arrachés, à l'est restent des fenêtres en plein cintre qui permettent de dater cette construction du XIIe ou XIIIe siècle.","habitants":"Seigneur de Carry\r\n        \"","divers":"Vestiges du fort de Carry","gps":"","images":["../image/image_43/43_Carry_1.jpg","../image/image_43/43_Carry_2.jpg","../image/image_43/43_Carry_3.jpg","../image/image_43/43_Carry_4.jpg","../image/image_43/43_Carry_5.jpg","../image/image_43/43_Carry_6.jpg"]},"Consult_chateau_formulairee2ac":{"id":"Consult_chateau_formulairee2ac","dept":"43","canton":"Besle","commune":"Lorlanges","nom":"Chabannes_Vedrines","type":"Château","periode":"XV-XX","histoire":"CHABANNES, anciennement la Franconnière château vraisemblablement bâti au XVIe siècle, lorsque la famille de la Reynerie le possède ; l'édifice   a connu des restaurations dès 1618, date inscrite sur une porte, ainsi que des bouleversements comme la  disparition de la majorité des toitures à la Révolution; le château a été restauré au début du XXe siècle par  Achille Proy, architecte du Puy. Toit conique sur  les deux tours principales, toit en appentis sur la troisième  tour..Le \" château \", situé à la sortie du village, accueillait des enfants juifs, français et étrangers.           Château de VEDRINES,  vraisemblablement construit au XVIe siècle, et repris vers 1652. Il a été entièrement réhabilité  vers 1880, lorsque la famille de Roquefeuil en devint propriétaire.","architecture":"Chabannes au printemps 1975. Le \" château \", à labandon, nétait plus quune bâtisse  a  trois niveaux,  flanquée de quatre rondes en angles.   Vedrines,  vraisemblablement construit au XVIe siècle,  Les communs  et les dépendances  datent du XVIIIe siècle. Le colombier date sans doute du XVIe siècle. Château composé d'une tour carré à trois étages,  d'un corps de logis rectangulaire à deux étages cantonné de deux tours rondes,  l'une en façade, l'autre dans un angle. La tour carrée et le logis ont un toit à longs pans et  croupe, une des tours rondes a un toit en terrasse, et la seconde a un toit conique couvert de tuile plate. Le colombier a un toit conique couvert de tuile plate, les communs et les dépendances anciennes ont des toits à longs pans couverts de tuile creuse et les dépendances les plus récentes ont des toits à longs pans couvertes  de tuiles plates mécaniques.","habitants":"Famille de la Reynerie\r\n        \"","divers":"Château de Chabannes et de Védrines","gps":"","images":["../image/image_43/43_Chabannes_Vedrines_1.jpg","../image/image_43/43_Chabannes_Vedrines_2.jpg","../image/image_43/43_Chabannes_Vedrines_3.jpg","../image/image_43/43_Chabannes_Vedrines_4.jpg","../image/image_43/43_Chabannes_Vedrines_5.jpg","../image/image_43/43_Chabannes_Vedrines_6.jpg","../image/image_43/43_Chabannes_Vedrines_7.jpg","../image/image_43/43_Chabannes_Vedrines_8.jpg","../image/image_43/43_Chabannes_Vedrines_9.jpg"]},"Consult_chateau_formulaire5aae":{"id":"Consult_chateau_formulaire5aae","dept":"43","canton":"Retournac","commune":"Retournac","nom":"Chabanolles","type":"Maison forte","periode":"XII-XIII","histoire":"CHABANOLLES, La seigneurie de Chabanolles est mentionnée pour la première fois en 1190, propriété des moines de Saint-Gilles. Pierre de Chabanolles en devient propriétaire au XIVe siècle, appartenant à la même famille depuis plus de huit siècles. A partir de 1650, l'édifice connaît   plusieurs remaniements, en particulier le rajout du portail classique et le remplacement de l'escalier en vis par un escalier droit à mur d'échiffre.  Les Jourda de Vaux de Chabanolles. Jacqueline de Terrasse sur de Jean de Terrasse de Chabanolles héritière  le porte par mariage à François Jourda de Vaux vers le milieu du XVIIe siècle,  la famille Jourda est issue des du Fraisse, Jean Jourda seigneur du Fraisse achète en 1653, le château et domaine de Vaux, transmis à son fils ainé Noël alors que le cadet François devient Seigneur de Chabanolles par alliance.    En 1956 Pierre-Noël Jourda de Vaux de Chabanolles et sa cousine rachètent diverses parts dont celle dHélène Dufau petite fille de Claude Hector, restée sans descendant.  Aujourd'hui centre équestre et chambres d'hôtes Axelle et Lionel ont restauré eux-mêmes ce domaine où ils élèvent des chevaux.                              BOURANGE appelée aussi maison de guet, situé dans le hameau du même nom, dans le nord-est de la commune, remonte du XIIe siècle et se dresse du haut dun escarpement bordant la Loire.  transformé aujourd'hui en chambres d'hôtes.                            MERCURET  Dans les années 1940,  la propriété relevant du château de Mercuret fut endommagé au XIXe siècle, et les bâtiments appartinrent aux hospices de Retournac dans les années 1940. Restauré par des particuliers vers la fin du XXe siècle.","architecture":"Cette maison forte de Chabanolles du XIIe siècle,  présente un corps de logis presque carré, flanqué au nord et au sud par deux tours rondes demi hors oeuvre, à l'ouest et à l'est par deux échauguettes dont seuls les culs-de-lampes subsistent. Maison forte de Bourange  corps de logis carré à trois niveaux à toits plats avec bretèche sur cour défensive dotée dune meurtrière, et présente un portail dentrée classique avec linteau armorié. Restaurée, elle est habitée par des particuliers.\r\nMercuret; maison forte , dont la construction nest pas précisément datée, est caractéristique de l'architecture rustique de cette région du Velay à la fin du Moyen-Age, quoique le caractère médiéval en est  altéré par plusieurs remaniements, en particulier au XVIIIe siècle. Le domaine consiste en un enclos formé de différents corps de bâtiments reliés par un mur, la maison forte proprement dite, édifice rectangulaire flanquée de deux tours demi-engagées au centre des façades sud et nord, et dotée aux angles de quatre échauguettes ; une tour ronde sélevant au nord-est, un peu en dehors du mur d'enceinte ; la chapelle, qui se compose d'une tour ronde, oratoire à lorigine, à laquelle fut ajouté au XVIIe ou XVIIIe siècle un petit bâtiment rectangulaire, correspondant à la nef, à louest enfin, le corps de bâtiment de la grange. Trois tours furent rasées pendant la Révolution, en 1793.","habitants":"Pierre de Chabanolles\r\n        \"","divers":"Château de Chabanolles et de Bourange","gps":"","images":["../image/image_43/43_Chabanolles_1.jpg","../image/image_43/43_Chabanolles_2.jpg","../image/image_43/43_Chabanolles_3.jpg","../image/image_43/43_Chabanolles_4.jpg","../image/image_43/43_Chabanolles_5.jpg"]},"Consult_chateau_formulaire432b":{"id":"Consult_chateau_formulaire432b","dept":"43","canton":"Monistrol-sur-Loire","commune":"Grazac","nom":"Chabrespine_Vercheres","type":"Vestiges","periode":"XII","histoire":"CHABRESPINE,  construit au XIIe siècle et au XVe siècle. En 1383 le château devient propriété des barons de La Tour-Maubourg familles des Malet Page puis de Faÿ, il y reste jusqu'au XVIIIe siècle. Après son abandon au XVIIIe siècle il tomba peu à peu en ruines. Le nom du château pose de nombreux problèmes, en effet la carte du diocèse du Puy-en-Velay marque le château sous le nom de Chabrespine contrairement aux habitants de Grazac, qui le connaissent sous le nom de Saint-Martial. Ce changement de nom s'explique par le fait quand 1678, les reliques de Saint-Martial sont apportés au château et à l'église de Grazac, seigneur Messire Florimond du Fay marquis de la Tour Maubourg de Gerlande, comte de Moncha, vicomte de Lestrange, baron de la ville de Privas Boulogne et deuxième seigneur de Saint-Maurice de Lignon, Sainte-Sigollène, Chabrespine de La Batie, la Motte de Galaure et autres places, chevalier de lordre royal et militaire de Saint-Louis, très puissante dame Marie-Françoise de Vachon de Bellmon, marié et résidante ordinairement en son château dudit La Motte.  Dans la commune plusieurs châteaux,                                                    VERCHERES  dans la commune de Grazac, château mentionné en 1591. Il fut vendu en 1770, puis en 1821 aux demoiselles de l'Instruction qui   y installèrent une école avec classes et dortoirs. Jusqu'en 1904, l'édifice fut appelé château des Dames. Après cette date, il fut utilisé comme école de jeunes filles jusqu'en 1929, et en salle paroissiale. A partir de 1935, des colonies  de vacances de différentes paroisses  l'utilisèrent périodiquement jusqu'en 1962.","architecture":"Ruines dun château   médiéval de Chabrespine du XIIIe siècle, situé sur une pointe rocheuse remarquable, le château est entouré par un ruisseau peu avant son confluent avec le Lignon. Seule laile sud-est encore visible. Celle-ci est percée dune fenêtre en plein cintre sur laquelle saccroche les vestiges des ailes Nord-Est et Sud-Ouest.                                                                               Verchères, l'édifice présente un corps de logis carré, flanqué sur l'angle sud-ouest par une tour d'escalier circulaire aux trois-quart hors oeuvre. Quelques rares percements sont situés, pour l'essentiel, sur la façade sud, avec porte à tympan frappé d'un blason, fenêtres à meneaux. Le flanquement vertical de la porte d'entrée est assuré par une bretèche en surplomb sur corbeaux, dans l'angle formé par la tour d'escalier et le mur du corps de logis. Elle offre la particularité d'avoir une face convexe, épousant le tracé de la tour à laquelle elle est adossée. Une salle du premier étage, à plafond à solives, conserve une cheminée monumentale de pierre à manteau et pied-droits moulurés sur bases prismatiques. Cette maison-forte est typique d'une lignée de constructions remontant, pour la plupart, aux guerres de religion.","habitants":"Barons de La Tour-Maubourg \r\n        \"","divers":"Vestiges du fort de Chabrespine","gps":"","images":["../image/image_43/43_Chabrespine_Vercheres_1.jpg","../image/image_43/43_Chabrespine_Vercheres_2.jpg","../image/image_43/43_Chabrespine_Vercheres_3.jpg","../image/image_43/43_Chabrespine_Vercheres_4.jpg","../image/image_43/43_Chabrespine_Vercheres_5.jpg","../image/image_43/43_Chabrespine_Vercheres_6.jpg"]},"Consult_chateau_formulairec039":{"id":"Consult_chateau_formulairec039","dept":"43","canton":"Brioude","commune":"St-Laurent-Chabreuges","nom":"Chabreuges","type":"Château","periode":"XV","histoire":"CHABREUGES, pas d'information historique.","architecture":"CHABREUGES, le château fut édifié au XIVe siècle ou XVe siècle sur un plan quadrangulaire délimité par une courtine reliant un logis au sud flanqué de quatre tours d'angle et d'un avant-corps central, un donjon circulaire au nord-ouest et   une autre tour circulaire au nord est.  Des écuries et une chapelle complétèrent le domaine à l'époque classique. A  la fin du XIXe siècle, une grande campagne de restauration  d'agrandissement fut entreprise,  nouveau corps de  bâtiment à l'ouest, aménagement   d'une terrasse, édification de nouveaux bâtiments de communs à l'arrière des écuries. Les intérieurs du Château et de la chapelle furent  dotés de décors d'une grande richesse (papiers peints  et peintures au pochoir).","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Chabreuges","gps":"","images":["../image/image_43/43_Chabreuges_1.jpg","../image/image_43/43_Chabreuges_2.jpg","../image/image_43/43_Chabreuges_3.jpg","../image/image_43/43_Chabreuges_4.jpg","../image/image_43/43_Chabreuges_5.jpg","../image/image_43/43_Chabreuges_6.jpg"]},"Consult_chateau_formulaire008c":{"id":"Consult_chateau_formulaire008c","dept":"43","canton":"Retournac","commune":"St-André-de-Chalencon","nom":"Chalencon_Chazelle","type":"Vestiges","periode":"XI","histoire":"CHALENCON, le bourg fait son apparition sous le règne de Philippe Ier, entre 1021 et 1047, dabord sous lautorité et la juridiction des abbés du Monastier-sur-Gazeille et de Chamalières, puis en tant que siège de la baronnie des Chalencon. Par sa situation, et par ses ponts au-dessus de lAnce, le bourg est à lépoque féodal un important lieu de passage, et ses seigneurs, disposant de caravanes de mulets, pratiquaient le commerce de marchandises entre le Velay et la vallée du Rhône. En 1349, lorsque Guillaume II épousa Walpurge de Polignac, la famille de Chalencon sallia à la puissante maison des Polignac, la maison de Chalencon cessant alors dexister en tant que telle. Bien quappartenant à la paroisse de Saint-André-de-Chalencon depuis 1644, les habitants  disposent à partir de la fin du XVIIe siècle dun chapelain habilité à pratiquer une partie du culte. Le dernier chapelain disparut cependant en 1751, et la chapelle fut vendue aux habitants de Chalencon au début du XIXe siècle.\r\nDans la commune le château de Chazelle transformé en chambres d'hôtes et centre équestre.","architecture":"Les vestiges du château de Chalencon  situé au sommet d'un piton rocheux dominant l'Ance. Il subsiste une tour ronde  surmonté de créneaux,   consistent en trois terrasses de niveau différent, dont lune, située à louest, surplombe le village. Il reste peu de choses des anciens bâtiments et murailles, hormis le  donjon circulaire restauré  au sommet crénelé, subsistent encore deux tourelles dangle, en partie reconstruites au début du XXe siècle et quelques fenêtres de la fin du XIIIe siècle. Le château fut définitivement abandonné aux alentours de 1600. Le château fut surtout connu pour sa bataille qui opposa l'armée de Napoléon III et du capitaine prussien Herlter,  on raconte que cent hommes furent tués au cours de cette bataille, bien sûr le héros  fut Belotus de Veyrac,  noble et comte de Veyrac. \r\nChâteau de Chazelle corps de logis rectangulaire à deux niveaux et attiques.","habitants":"Famille de Chalencon\r\n        \r\n        \"","divers":"Vestiges du fort de Chalencon  et château de Chazelle.","gps":"","images":["../image/image_43/43_Chalencon_Chazelle_1.jpg","../image/image_43/43_Chalencon_Chazelle_2.jpg","../image/image_43/43_Chalencon_Chazelle_3.jpg","../image/image_43/43_Chalencon_Chazelle_4.jpg","../image/image_43/43_Chalencon_Chazelle_5.jpg","../image/image_43/43_Chalencon_Chazelle_6.jpg"]},"Consult_chateau_formulairee36f":{"id":"Consult_chateau_formulairee36f","dept":"43","canton":"Lavoûte-Chilhac","commune":"Chambon-sur-Lignon","nom":"Chambon","type":"Manoir","periode":"XV","histoire":"CHAMBON, fief vassal des seigneurs de Chilhac, en 1409  Guillaume de Blau, seigneur de Gibertès, Auvers et Cronce, acheta la seigneurie du Chambon et abandonna son château de La Roche-Blau au profit de ce lieu du Chambon. La famille s'éteignant au XVIIe siècle avec Françoise de Gibertès, le château fut vendu à un bourgeois de Langeac, Jean Véal. Sa descendance le possédait encore à la Révolution. Jean Balthazar Véal de Blau, brillant officier de l'armée de Condé se montra hostile au nouveau régime, et dut émigrer. Ses biens furent placés sous séquestre mais il rentra en France sous la Restauration et devint maire de Langeac. Décédé sans postérité, il céda ses biens à messieurs de Lastic et de Chazelles. Le château changea ensuite plusieurs fois de propriétaires.    A partir de 1930, date à laquelle il fut vendu à monsieur Ripert d'Alauzier, il ne fut plus entretenu. Les propriétaires suivants, entreprirent d'importants travaux sans pouvoir les achever. A partir de 1946, les propriétaires actuels s'efforcèrent d'agrandir le parc, de l'aménager et de réaliser dans le château les travaux nécessaires.                                            \r\nPlus au sud Fay-sur-Lignon Au début du Xe siècle, La famille \"de Fay\", branche des \"Chapteuil\", installa sur le dyke basaltique une forteresse qui donnât naissance au bourg. La première mention connue du village en 1097 sous une forme improprement latinisée Faino. La paroisse prit le nom de \"Fay-le-Froid\" en 1602, pour la distinguer des nombreux Fay. \r\nManoir de Matras.","architecture":"Le château de Chambon, situé dans la vallée du Haut-Allier, entouré d'un parc bien entretenu,  apparaît comme une importante maison forte du XVe siècle humanisée au cours des siècles et dotée au XIXe siècle d'un décor de boiseries très soignées. Un assez grand parc aménagé, traversé par une allée d'accès et ceint d'un grand mur entoure le château. Le plan est très simple, rectangulaire avec une grosse tour d'angle au nord-ouest et une tourelle d'escalier demi hors oeuvre au centre de la façade sud.  Les façades sont d'un aspect sobre et assez rustique. Seule la façade principale sud-est en pierres appareillées, les autres sont petites, en moellons, et ont perdu l'enduit qui les revêtait. La toiture est soutenue, sur tout son pourtour, y compris celui des tours, par une rangée régulière de corbeaux à trois ressauts. La façade sud, est la façade principale, sur cour.","habitants":"Guillaume de Blau\r\n        \"","divers":"Manoir à Cerzat, au pont de Mars et Fay sur Lignon","gps":"","images":["../image/image_43/43_Chambon_1.jpg","../image/image_43/43_Chambon_2.jpg","../image/image_43/43_Chambon_3.jpg","../image/image_43/43_Chambon_4.jpg"]},"Consult_chateau_formulaire66c2":{"id":"Consult_chateau_formulaire66c2","dept":"43","canton":"Tence","commune":"St-Jeures","nom":"Changheas_Salcrupt","type":"Château","periode":"XV-XVI","histoire":"CHANGHEAS-SALCRUPT, la seigneurie de St-Jeures dépendait de  la tour de la Rochette sur les châteaux de la commune , le château des Changheas, de St-Salcrupt et de la Borie, Changhéas passa à Isabeau Pons, puis à  Joseph-François et aux de Banne de Boissy, aux  de Bayle et aux de Julien de Villeneuve 1749-1811,  et le château des Hermens.  En 1310, existence d'un \"mas des Hermens\" où fut bâtie une maison-forte au cours du XVIe siècle, dans la vague de construction de petits édifices rustiques élevés pour des raisons défensives dans le Velay, pendant  une période troublée. L'ensemble des  bâtiments, disposés  en L  autour d'une cour, comprend   le logis avec sa  tour demi hors-oeuvre en façade sud, l'étable accolée   à la façade ouest du logis, et la grange en retour vers le sud.  Le logis s'élève sur trois niveaux d'ouvertures ainsi que la tourelle.  La grande salle du premier étage, ainsi  que la chambre à alcôve, sont revêtues de boiseries du XIXe siècle.                A quelques kilomètres à  l'ouest le château d'Araules et les ruines du château de Bonnas.","architecture":"CHANGHEAS, maison forte bâtie au XVIe siècle,  aménagée intérieurement aux XVIIe et XVIIIe siècles. Le domaine, ceint d'un mur de clôture, se compose d' un porche d'entrée accolé à un corps de logis d'habitation , une grange écurie, un bâtiment de commun longé par un abreuvoir, relié au porche d'entrée  par un muret, un jardin et  un verger. Le logis adopte le plan massé  de ce type d'habitation. Une tour de défense  est située sur l'angle  nord-est, et une tour d'escalier demi hors-oeuvre est au centre de la façade sud.                                                                           SALCRUPT,   Maison forte des XVe-XVIe siècles, doublée au XVIIIe siècle, Salcrupt apparaît comme un édifice rustique resté authentique, caractéristique des constructions de granit de la partie orientale du Velay. Le château présente  un plan rectangulaire constitué de deux corps de bâtiments accolés, desservis et défendus par une tour d'escalier  demi hors-oeuvre située au centre de la façade principale. Un mur d'enceinte délimite côté sud une cour. Des  bâtiments de communs servent, du côté Est, à fermer cette cour. Un mur de clôture extérieur forme une sorte de  seconde enceinte le long des voies communales, englobant les terrains d'exploitation à l'est et au nord du château. Un vaste bâtiment de ferme  complète ce mur du côté ouest.","habitants":"Joseph-François de Changheas\r\n        \"","divers":"Château de Changheas et de Salcrupt","gps":"","images":["../image/image_43/43_Changheas_Salcrupt_1.jpg","../image/image_43/43_Changheas_Salcrupt_2.jpg","../image/image_43/43_Changheas_Salcrupt_3.jpg"]},"Consult_chateau_formulaire9c00":{"id":"Consult_chateau_formulaire9c00","dept":"43","canton":"Loudes","commune
