":"Loudes","nom":"Charrouilh","type":"Château","periode":"XIII","histoire":"CHARROUILH; L'historique de Charrouilh et de Mestrénac est similaire à celle de Loudes étant le point central de la seigneurie. En 1250  le seigneur de Ceyssac qui possède des terres près de Loudes, fonde un château au Charrouilh.  En 1280  le seigneur de Ceyssac installe Hugon de Chattes comme co-seigneur du Charrouilh. En 1310  le seigneur Jourdan de Ceyssac installe sa résidence principale au Charrouilh. En 1348  mort de Durand de Ceyssac, seigneur du Charrouilh  Le château passe à sa fille Béatrix épouse de Louis de Vissac. Leur descendante directe, Jeanne, se marie ensuite à Perceval Raybe, seigneur de Saint-Marcellin-en-Forez, à qui elle apporte en dote le château du Charrouilh. Il appartient ensuite à Antoine Raybe, puis Hugues Raybe dit Galles et  enfin en 1568 à Antoine II Raybe. Le château est ensuite vendu à Claude Ranquet, un bourgeois du Puy, qui le vend à son tour à Hugues de Fillère écuyer, seigneur de La Bornette, conseiller du roi. Vers 1800, la famille Fillère cède le château au comte Amable de Rochenegly. À la mort de celui-ci, le château est vendu à Bernard Burtin. Il est ensuite vendu à Pierre Achard, puis à Claude Blanc-Furnon, puis à Madame Aulagnier. Il appartient à l'heure actuelle à la famille Turin-Toulemonde.   23 décembre 1943 : une réunion secrète de la résistance a lieu au château du Charrouilh. C'est en ce lieu qu'Henry Ingrand est nommé président du comité régional de libération Auvergne.       MESTRENAC construit selon la tradition par les Templiers vers 1250. Sous l'ancien régime il appartenait à la famille Rouchon. Il avait acheté le manoir grâce à la générosité d'un seigneur guéri par eux.\r\nMaison de la Béate de Civeyrac : construite en 1755, l'assemblée de Civeyrac, servit du XVIIIe siècle au XIXe siècle d'école pour filles.  À la fin des années 1990, madame le maire de Loudes, Nicole Allary, la fait aménager en petit musée.","architecture":"Château du Charrouilh : construit vers 1250 par la famille de Ceyssac. Pendant les guerres de religion, le château est occupé par la garnison royaliste du baron de Chastes. En 1748, le château médiéval est détruit par le feu et est restauré.  Château de Mestrénac : construit selon la tradition par les Templiers vers 1250. Au XVIIIe siècle le château est converti en ferme et pourvu de granges. La porte d'entrée est surmontée d'un cartouche portant un blason ou figure un calice entouré d'une couronne d'épines.","habitants":"Seigneur de Ceyssac                                                                            Famille Rouchon\r\n        \"","divers":"Château de Charrouilh, de Mestrenac, bâtisse de Béate de Civeyrac.","gps":"","images":["../image/image_43/43_Charrouilh_1.jpg","../image/image_43/43_Charrouilh_2.jpg","../image/image_43/43_Charrouilh_3.jpg","../image/image_43/43_Charrouilh_4.jpg","../image/image_43/43_Charrouilh_5.jpg","../image/image_43/43_Charrouilh_6.jpg"]},"Consult_chateau_formulairecbe6":{"id":"Consult_chateau_formulairecbe6","dept":"43","canton":"Auzon","commune":"Champagnac-le-Vieux","nom":"Chassignolles","type":"Vestiges","periode":"XIII","histoire":"CHASSIGNOLLES, avant le XIIIe siècle, le domaine doit certainement être sous la protection des comtes d'Auzon et des comtes d'Auvergne. La première mention de la famille de Chassignolles n'apparaît pas avant la deuxième moitié du XIIIe siècle. Lhéritière de cette maison appartenant vraisemblablement au lignage des Auzon  transmet alors cette terre à celle des seigneurs de Chalencon, proches parents des vicomtes de Polignac. Cette union donnera naissance à la branche des Chalencon-Chassignolles. La seigneurie passera ensuite dans la maison de Montmorin, puis dans celle des Clermont-Chaste. Ces seigneurs de Chassignolles sont en partie seigneurs de Saint-Martin d'Ollière.                                                                          A quelques kilomètres au Sud-Est le village fortifié de SAINT-VERT appartient jusqu'à la Révolution à l'abbaye de La Chaise-Dieu. Le château, au moment de la vente des biens du clergé (biens nationaux), le curé de Saint-Vert, Claude Champanhac s'en porte acquéreur. Il propose par la suite à la commune de le lui racheter mais celle-ci n'en a pas les moyens. Champanhac, quelques jours avant sa mort (1819), le vend à son successeur, Jean-Augustin Totel, curé de Saint-Vert depuis 1804. Celui-ci le lègue à son neveu, Jean Totel. Acquis par la suite par la commune de Saint-Vert.","architecture":"Chassignolles est une réalisation architecturale du XIIIe siècle dans l'esprit des constructions de Philippe Auguste. Construit entre 1240 et 1250, le château est remanié au XVe siècle. Transformation des archères, modification de la tour sud-est.   Remaniement des logis et de la tour carrée.  Au XVIIe siècle, percement d'une porte ornée de pilastres au deuxième niveau de la tour Est. En 1860, le château est incendié. Le plan est constitué d'un rectangle avec une tour circulaire à chaque angle. A l'est et à l'ouest,  en milieu de courtine, présence d'une tour carrée. Jusqu'à la fin du XIXe siècle, la façade sud conserve un portail d'entrée aménagé dans une tour carrée. Des courtines s'élèvent au 3ème niveaux des tours. La rigueur géométrique du plan  et la qualité des aménagements défensifs  et résidentiels font de ce château un élément important de l'histoire de l'architecture militaire.               Le château de Saint-Vert, situé au centre du bourg, est en effet assez vaste pour abriter la mairie, le presbytère et l'école. Pendant un demi-siècle,   le château abrite l'école, la mairie et le presbytère. Dans la nuit du 24 au 25 décembre 1921, le bâtiment est en partie détruit par un incendie.","habitants":"Famille de Chassignolles\r\n        \"","divers":"Château de Chassignolles","gps":"","images":["../image/image_43/43_Chassignolles_1.jpg","../image/image_43/43_Chassignolles_2.jpg","../image/image_43/43_Chassignolles_3.jpg","../image/image_43/43_Chassignolles_4.jpg","../image/image_43/43_Chassignolles_5.jpg","../image/image_43/43_Chassignolles_6.jpg","../image/image_43/43_Chassignolles_7.jpg"]},"Consult_chateau_formulaireb194":{"id":"Consult_chateau_formulaireb194","dept":"43","canton":"Lavoûte-Chilhac","commune":"Chilhac","nom":"Chilhac","type":"Château","periode":"XI","histoire":"CHILHAC,  Odilon de Mercur, connu comme Saint-Odilon de Cluny, a durablement marqué le paysage architectural de Lavoûte-Chilhac par la création d'un site clunisien au sein du village. Issu d'une importante famille de la noblesse auvergnate possédant les terres de Saint-Cirgues et Lavoûte-Chilhac, il est élu abbé de l'ordre de Cluny en 994 et sera à l'origine du rayonnement et de la montée en puissance de ce ordre. Il cède, avec l'appui de sa famille, ses terres de Lavôute-Chilhac le 14 septembre 1025 pour y fonder le prieuré Sainte-Croix.   En 1251, Béatrix de Bourbon marié en 1238 à Béraud VIII, seigneur de Mercur, fait son testament au château de Chilhac. Une ancienne coutume, abolie en 1522, voulait que le 1er juillet, à la fête de la Saint-Gal, patron de la ville de Langeac, le châtelain du bourg de Chilhac et les autres gens de justice arrivent solennellement à Langeac avec des paniers d'ufs et en jettent mille à douze cents dans les rues. On tenait tant à ce usage qu'en 1360, lorsque la ville de Langeac était fermée à cause des bandes ennemies qui ravageaient le pays, une requête fut présentée pour que les portes puissent être ouvertes.","architecture":"Notre village date vraisemblablement de l'époque gallo-romaine et tiendrait son nom d'un nommé Cilius. Dès le Moyen Age, il est fortifié, dans la partie haute, le château fort, ses dépendances et l'église romane dominent de plus de 70 m le cours de l'Allier. Le château a disparu, mais on peut observer les remparts qui l'entouraient et protégeaient les habitants.\r\nPrieuré Sainte-Croix de Lavoûte-Chilhac, du XVe siècle, où se trouve la statuette de Notre-Dame-Trouvée.\r\nChilhac d'une superficie de 411 ha est la plus petite commune du canton de Lavoute-Chilhac et ne comporte pas de hameau. L'ancien château construit dans la boucle a laissé de nombreux vestiges visibles le long de la rivière. Ce château a fait place ensuite à l'actuel Prieuré.","habitants":"Famille d'Odilon de Mercur\r\n        \"","divers":"Patrimoine de Chilhac avec château St-Maurice et le prieuré ancien château.","gps":"","images":["../image/image_43/43_Chilhac_1.jpg","../image/image_43/43_Chilhac_2.jpg","../image/image_43/43_Chilhac_3.jpg","../image/image_43/43_Chilhac_4.jpg"]},"Consult_chateau_formulaireaf09":{"id":"Consult_chateau_formulaireaf09","dept":"43","canton":"Langeac","commune":"Mazeyrat-d`Allier","nom":"Cluzel","type":"Château","periode":"XVII","histoire":"CLUZEL,  Demeure du début du XVIIe siècle, sans doute exécutée à partir du remaniement d'un édifice plus ancien. berceau de la famille Bouillé et en  1739   naquit le marquis devenu général de Bouillé, resté célèbre par sa tentative de sauver Louis XVI.","architecture":"L'édifice de Cluzel  se présente comme un vaste quadrilatère flanqué de deux tours rondes.  La face sud est encadrée de deux pavillons entourant eux-mêmes  un pavillon central les dominant au-dessus de l'escalier central. L'intérêt de l'édifice réside uniquement dans son intérieur  qui conserve, dans deux pièces, deux beaux exemples de décoration  du début du XVIIe siècle. L'une de ces pièces est décorées  de boiseries à petits   panneaux peints de sujets divers, typique du style Louis XIII.  L'autre pièce est décorée de lambris à grands panneaux encadrés de fortes moulures figurant des feuillages et   des fruits. Les dessus de porte et la cheminée sont peints. Le style de cet ensemble évoque la décoration bourguignonne du XVIe siècle.","habitants":"Général de Bouillé\r\n        \"","divers":"Château de Cluzel","gps":"","images":["../image/image_43/43_Cluzel_1.jpg","../image/image_43/43_Cluzel_2.jpg","../image/image_43/43_Cluzel_3.jpg","../image/image_43/43_Cluzel_4.jpg"]},"Consult_chateau_formulaireb466":{"id":"Consult_chateau_formulaireb466","dept":"43","canton":"Loudes","commune":"Loudes","nom":"Coubladour","type":"Vestiges","periode":"XV","histoire":"COUBLADOUR  construit vers 1300 par une famille de nobles. La châtellenie de Coubladour reste dans la mouvance de l'évêque du Puy-en-Velay.                                                                                  A Loudes, en l'an 1000   c'est crée  la baronnie de Lode  est rester dans cette dernière jusqu'en  1590, mort de François de Loudes, homme d'armes de Christophe de Chalencon, dernier représentant de la branche cadette de la famille de Lode, issue de Jousserand de Lode.  Par alliance en avril 1616  Philibert des Serpens, baron de Loudes, en avril 1668  Antoinette de Polignac est entrée au couvent des Carmélites à Paris. Elle lègue ses biens au roi Louis XIV qui ayant accepté l'héritage, le rétrocède au vicomte Armand XIX de Polignac. Par la suite  devient une baronnie diocésaine.","architecture":"Maison forte de Coubladour : construit vers 1300 par une famille de nobles.\r\nLoudes, l'existence d'une maison-forte remonte à l'époque romane, une tour carrée et massive composait l'édifice. La maison forte a été bâtie pour l'essentiel à la fin du XVe siècle et au début du XVIe siècle. Au cours du XIXe siècle, elle se transforma progressivement en exploitation agricole. L'édifice se compose d'un corps de logis trapézoïdal donnant au sud sur une cour de ferme, et flanqué sur l'angle nord-ouest par une tour hors-oeuvre ronde percée d'archères-canonnières. La tour, qui est voûtée sur deux étages, communique par la gorge avec le reste du  bâtiment. La courtine nord porte des traces de reprise permettant de déceler trois campagnes de construction, la partie ouest  du bâtiment collé à la tour, domine  le reste du corps de logis d'un demi étage.                     Château de Loudes. Vers 1220  A. Jocobin écrit que le château était en éminentes ruines. L'habitat des barons se recentre autour de la grosse tour. Les restes de la muraille sont détruits à la demande du conseil municipal de Loudes le 25 septembre 1807. Il ne reste aujourd'hui que deux grosses tours, trois petites tours et une partie du mur de la cour du château,  la tour est percée à sa base d'une meurtrière commandant l'ensemble de la courtine nord.","habitants":"Baron de Loudes\r\n        \"","divers":"Maison forte de Coubladour et tourdu château.","gps":"","images":["../image/image_43/43_Coubladour_1.jpg","../image/image_43/43_Coubladour_2.jpg","../image/image_43/43_Coubladour_3.jpg","../image/image_43/43_Coubladour_4.jpg","../image/image_43/43_Coubladour_5.jpg"]},"Consult_chateau_formulairee333":{"id":"Consult_chateau_formulairee333","dept":"43","canton":"Puy-en-Velay","commune":"Coubon","nom":"Coubon_Gendriac","type":"Château","periode":"XV","histoire":"COUBON, Cobone  est cité dès 1090 dans le cartulaire de l'abbaye de St-Chaffre du Monastier. Coubon est à cette époque une étape stratégique, c'est ici que la route du Puy à Avignon franchit La Loire, itinéraire déjà fréquenté par les légions romaines. Une maison carrée de Jean-Louis Baud qui deviendra le manoir des surs St-Charles puis sera incorporé dans la maison de retraite, la maison  de Vidal Pommarel deviendra la mairie. Un béal longe La Loire et alimente plusieurs moulins à eau, utilisés pour moudre le grain, opération très pénible à la main ; le seigneur local bénéficiait du droit de ban en contrepartie de l'utilisation de l'eau de La Loire.                       de nombreux châteaux dans cette commune  le château de Charentus, Vissac actuel mairie,  de Brive maison de retraite,  de Gendriac, de Poinsac (voir article), et Volhac     ( voir Article).       GENDRIAC, le château se distingue par son donjon pittoresque perché sur un piton volcanique. Depuis le XIIe siècle, ce fut la propriété des Azon qui le cédèrent ensuite aux Béraud. Ces derniers descendant dune branche cadette des Mercoeur, sallièrent aux Dalmas de Poinsac. Jeanne Béraud de Jendriac épousa le 20 janvier 1526 Thèofréde de Poinsac, elle était la filleule de Diane de Poitiers alors favorite d Henri II.                       \r\nTOUR-DANIEL, Château de Latour-Daniel son nom vient de  Turris Neillis. Le logis du XVe siècle a été magnifiquement orné par les Rochebaron, tourelle descalier, cheminées témoignent dun art consommé de la sculpture appartenait à un réseau de défense existant depuis le haut Moyen-Age. Aucun document ne mentionne la Tour-Daniel avant le XIVe  siècle. Propriété du comte et de la comtesse de Franclieu.","architecture":"Gendriac, l'origine des constructions actuelles remonte au XIIIe siècle, il en reste la partie basse du donjon et le tracé de l'enceinte. Fin XVIe siècle début XVIIe siècle, on construisit la tourelle d'escalier avec sa porte sculptée. Le logis sud fut ajouté au XVIIIe siècle et doté de décors intérieurs, complétés au cours du XIXe siècle.\r\nTour Daniel    son nom vient de  Turris Neillis  ou Tour Noire, allusion au basalte noir dont les blocs ont servi à la construction du donjon qui date du XIVe siècle, château qui commandait le passage de la Loire et la route du Puy, appartenait à un réseau de défense existant depuis le haut Moyen-Age.","habitants":"Jean-Louis Baud\r\n        \"","divers":"Château de Gendriac, de Causans, et la Tour Daniel","gps":"","images":["../image/image_43/43_Coubon_Gendriac_1.jpg","../image/image_43/43_Coubon_Gendriac_2.jpg","../image/image_43/43_Coubon_Gendriac_3.jpg","../image/image_43/43_Coubon_Gendriac_4.jpg","../image/image_43/43_Coubon_Gendriac_5.jpg","../image/image_43/43_Coubon_Gendriac_6.jpg"]},"Consult_chateau_formulaire2260":{"id":"Consult_chateau_formulaire2260","dept":"43","canton":"Craponne-sur-Arzon","commune":"Craponne-sur-Arzon","nom":"Craponne_Arzon","type":"Vestiges","periode":"X","histoire":"CRAPONNE sur Arzon, à lère féodale, le bourg était entouré dune muraille denceinte, construite en 1450,  deux petites tours défensives ont été préservées jusqu'aujourdhui, était défendu en outre par un château, démoli, à lexception du donjon, en 1576. Ce château appartient jusqu'en 1240 aux barons de Beaumont, avant de passer aux mains des seigneurs de Chalençon, qui deviendront les Polignac en 1420. Dans les environs  vestiges du château d'Arzon commune de Saint-Pierre du Champs   mentionné au Xe siècle et compris dans la province du Velay en 1789.  et le château de Bellevue en Montagne.","architecture":"Le bourg  de Craponne  sur Arzon a gardé deux tours défensives de lancienne enceinte murée, la tour du Marchédial (au nord-est) et la tour Pasturel (à lest), toutes deux datant de la fin du XVIe siècle.\r\nLe donjon, haute tour carrée datant du XIIe ou du début du XIIIe siècle, est le seul élément qui subsiste de lancien château démoli en 1576. Répondant à une finalité militaire, la tour, daspect austère, nest percée que de deux portes, dune étroite fenêtre, et de trous de boulin près du sommet, propres sans doute à recevoir des consoles amovibles devant supporter autrefois un hourdage de bois.  Vestiges des anciennes fortifications.                                     Chomelix à 8 kilomètres.  Le moyen-âge fut particulièrement riche. Quatre importants châteaux furent construits aux XIe et XIIe siècles, Chomelix le Haut, aujourdhui totalement détruit, Chomelix Le Bas, dont il reste les vestiges dune tour, Sereys, plusieurs fois détruit et remanié et Arzon dont les imposantes ruines dominent le ruisseau lArzon. Durant très longtemps, Chomelix le Haut et Chomelix le Bas furent des villages fortifiés, indépendants, et même ennemis. En atteste les guerres désastreuses que se sont livrés à plusieurs reprises les seigneurs de Chomelix le Haut et le Bas.","habitants":"Barons de Beaumont\r\n        \"","divers":"Tour à Craponne, château à Bellevue en Montagne et vestiges st Pierre du Champs","gps":"","images":["../image/image_43/43_Craponne_Arzon_1.jpg","../image/image_43/43_Craponne_Arzon_2.jpg","../image/image_43/43_Craponne_Arzon_3.jpg","../image/image_43/43_Craponne_Arzon_4.jpg"]},"Consult_chateau_formulaire1b88":{"id":"Consult_chateau_formulaire1b88","dept":"43","canton":"Brioude","commune":"Javauges","nom":"Cumingnat","type":"Château","periode":"XV-XVIII","histoire":"CUMIGNAT, château du XVe siècle largement remanié par la famille de Crozet de Ballestat et  des Cumingnat. A servit au tournage de film pour une série américaine.                                                                            A quelques kilomètres  au Nord-Est le château de SERVIERES  sur la commune  de Saint-Didier sur Doulon  du XIIIe siècle pas d'historique.","architecture":"Cumignat;    château du XVe siècle largement remanié.               Servières, le castrum de Servières est mentionné en 1250. La maison forte date du XIIIe siècle, et a conservé son  logis donjon et sa basse cour assez peu remanié. L'édifice est formé d'un bâtiment rectangulaire de trois niveaux  flanqué, du côté de l'escarpement, de deux tours.  Il est protégé à l'opposé, par une enceinte formée de bâtiments  d'époques variées qui paraissent reprendre le plan d'origine. Les percements datent du XVe siècle. Intérieurement la disposition ancienne subsiste au rez-de-chaussée avec   des belles salles voûtées. Les étages ont été subdivisés  au XVIIIe siècle et les pièces ont reçu un décor rustique (plafond à la française, papiers peints et lambris peint).","habitants":"Famille Crozet de Ballestat\r\n        \"","divers":"Château de Cumignat maison forte de Servières","gps":"","images":["../image/image_43/43_Cumignat_1.jpg","../image/image_43/43_Cumignat_2.jpg","../image/image_43/43_Cumignat_3.jpg","../image/image_43/43_Cumignat_4.jpg"]},"Consult_chateau_formulaire998e":{"id":"Consult_chateau_formulaire998e","dept":"43","canton":"Paulhaguet","commune":"Domeyrat","nom":"Domeyrat","type":"Forteresse","periode":"XIII","histoire":"DOMEYRAT, chateau-fort cité en 1114, le fief appartenait aux vassaux d'Alphonse de Poitiers dressé entre 1250 et 1260 , Astorgius et son fils Bertrand de Papabeuf construisirent la forteresse. La famille des Papabeuf en reste propriétaire jusqu'en 1348, date à laquelle elle semble s'éteindre.  Pierre de Montaigut, mentionné en 1368, Catherine de Châteauneuf en 1375 avec Adhémar Jory, à qui elle cède alors la moitié de la terre lui appartenant.  Domeyrat revient ensuite à la famille de Langheac. sénéchal de la province, à qui l'on reconnaît le titre de seigneur de Domeyrat en 1387. De successions en successions, la famille de Langheac reste propriétaire jusqu'en 1619, date à laquelle s'éteint la dernière descendante Françoise de Langheac.  Par son mari, Domeyrat passe dans les biens de la famille de la Rochefoucauld. Après avoir agrandi le domaine, Françoise de Langheac et Jacques de la Rochefoucauld laissent Domeyrat à leur fils. D'abord co-seigneurie entre Charles-Ignace héritier du titre et François à qui revient la jouissance du fief et qui sera l'un des derniers seigneurs résidant au château. Son héritier, Henry de la Rochefoucauld, établi à Brassac,  grevé de dettes, il vend Domeyrat en 1656 à Christophe de Beaune. François-Marie et Louis François Marie Fargès en 1773. Le domaine est agrandi, bien qu'ils n'y résident pas.  Le château fut habité jusqu'en 1789. Après leur décès, en 1790 et 1792, les filles mineures héritent de Domeyrat. Le Conseil Général de la Haute-Loire l'a racheté  à différentes familles.\r\nA quelques kilomètres nord-est le château de Vals le Châtel et au sud le château de St-Roch à Salzuit de  Bruno et Anne-Marie Promeyrat.","architecture":"Domeyrat est une forteresse carrée du XIVe siècle, domine le village  et les confluents de la Senouire et du Doulon dont la partie inférieure pourrait remonter au XIIe siècle. C'est un donjon-résidence de plan cantonné, constitué d'un donjon rectangulaire flanqué à chacun de ses angles d'une tour ronde. La seconde enceinte constituée de tours et de courtines a disparu. Les tours d'angle de cette haute forteresse carrée du XIVe siècle sont bien ébréchés, Il fut transformé en carrière sous la Révolution. On peut admirer la coupole décorée de fresques du XVIe siècle, ainsi que des peintures murales dans les tours nord-ouest et sud-ouest. Le Pont date des XVe et XVIe siècles. Deux des tours conservent des vestiges de peintures, l'une ornée de scènes de chasse, d'amours et d'arabesques du XVIe siècle, l'autre de scènes religieuses du début du XVIIe siècle.\r\nSAINT-ROCH; ancienne bâtisse seigneuriale du XVIIIe siècle, il a été rénové avec des techniques et des matériaux respectueux de lenvironnement et de la santé. Il conserve cependant son caractère ancien auquel se marie admirablement le confort moderne.  Installée dans un écrin de verdure dominant la vallée, cette bâtisse du XVIIIe siècle fut construite sur les fondations remontant au Moyen-Age. Le château dispose dune terrasse avec vue remarquable ainsi quune magnifique cour en galets, un parc boisé et une chapelle.","habitants":"Bertrand de Papabeuf \r\n        \"","divers":"Vestiges de Domeyrat, du château de St-Roch et de Vals le Chastel","gps":"","images":["../image/image_43/43_Domeyrat_1.jpg","../image/image_43/43_Domeyrat_2.jpg","../image/image_43/43_Domeyrat_3.jpg","../image/image_43/43_Domeyrat_4.jpg","../image/image_43/43_Domeyrat_5.jpg","../image/image_43/43_Domeyrat_6.jpg","../image/image_43/43_Domeyrat_7.jpg","../image/image_43/43_Domeyrat_8.jpg","../image/image_43/43_Domeyrat_9.jpg"]},"Consult_chateau_formulaire8905":{"id":"Consult_chateau_formulaire8905","dept":"43","canton":"Montfaucon-en-Velay","commune":"Dunières","nom":"Dunieres","type":"Vestiges","periode":"XIV","histoire":"DUNIERES, Briand de Retourtour fit construire, tout près du château des St-Didier, une haute tour et un château-fort, plus tard appelés de la Roue, du nom de Maragde de la Roue, troisième épouse et héritière du Seigneur de Retourtour. A sa mort, la terre de Dunières, bien que revendiquée par Guy de St-Priest qu'elle avait épousé après son veuvage, resta l'apanage des cadets de la Roue. En 1719, Henri-Joseph et Marie-Charlotte de la Garde-Chambonas, familiers du duc et de la duchesse du Moine et de la cour brillante du château de Sceaux, vendirent leur moitié de la seigneurie de Dunières au marquis de Maubourg, maréchal de camp aux armées du Roi. En 1753, Claude Florimond de Fay comte de Maubourg, rachetait à Thomas d'Espinchal la deuxième moitié de la terre de Dunières, devenant ainsi maître de toute la baronnie, qu'il transmit à son fils aîné, Marie-Charles-César De Fay de la Tour-Maubourg. En 1801, la famille de la Tour-Maubourg racheta le château-bas et reprit possession de la tour et des ruines qui l'entouraient. Beaucoup de pierres avaient été prises ou descellées des ouvertures et emportées.\r\nEn 1895, madame de La Tour-Maubourg confia à Florentin Malartre son désir de consolider sa vieille tour. Le 23 juillet, une convention était signée avec messieurs Vial et Geneste pour l'ensemble des travaux. Le dernier héritier de la tour, sans descendance, la proposa à François Malatre (1865-1951), qui en devint propriétaire en 1938.                                                                                                       Dans la commune  le château de Malatre.","architecture":"La Tour de Dunières du vieux château de Joyeuse subsistent les soubassement dune vieille tour, ainsi que la tour qui domine encore le plateau. Construite au XIVe siècle, cette dernière garde fière allure après la restauration qui lui a restitué ses créneaux écroulés. Aujourdhui, ce bâtiment est la propriété dune famille Dunièroise. Dans la maison des Soeurs de Saint-Joseph, qui occupe lemplacement du château de la Roue, subsiste une majestueuse cheminée de la salle dhonneur de lancien château.","habitants":"Briand de Retourtour\r\n        \"","divers":"La tour du château de Dunières et château de Malatre.","gps":"","images":["../image/image_43/43_Dunieres_1.jpg","../image/image_43/43_Dunieres_2.jpg"]},"Consult_chateau_formulaireac6e":{"id":"Consult_chateau_formulaireac6e","dept":"43","canton":"Le Puy-en-Velay","commune":"Le Monteil","nom":"Durianne","type":"Manoir","periode":"XV","histoire":"DURIANNE dès 1301, une famille Gachet y est connue. Elle cède sa place aux Chabades,  au XIVe siècle, Guillaume mort en 1452 et son fils Vital, font preuve d'un certain faste et pourraient bien avoir reconstruit le bâtiment actuel au début du XVIe siècle. Au siècle suivant, les seigneurs de Duriane sont les Nogaret Pons puis son fils Gui. Claude Dorlhac acquiert la seigneurie  que son petit-fils Jacques possède encore en 1652. C'est ensuite la famille Colomb qui l'achète à cette époque. Dans la première moité du XVIIIe siècle,  Durianne sert de résidence à Jean de Jerphanion,  syndic du Velay. La famille  Chabrier les a remplacé en 1757, Jean ensuite Régis en 1774. A la veille de la Révolution en 1782, les Reboul de Fonfreyde s'installent à Durianne.  En 1836, Florimond Balme du Garay achète le chateau à Joseph de Fonfreyde, la propriété est depuis restée dans  sa descendance.                              Le château dElbe datant du XIXe siècle   famille d'origine chevaleresque tirant son nom du château de la Rodde  de  notables  Antoine de Vertoley, sieur d'Elbe,  descendant de la famille Bolindrod de Masclaux, sieur du Serre d'Arlempdes.","architecture":"Durianne est une maison forte où l'élément défensif est aujourd'hui très discret.   Déjà mentionné au XIIIe siècle, logis rectangulaire flanqué de deux tours rondes et d'une tour carrée en encorbellement du XIVe siècle On notera sur la  tourelle d'escali.","habitants":"Famille de Nogaret Pons \r\n        \"","divers":"Maison forte de Durianne","gps":"","images":["../image/image_43/43_Durianne_1.jpg","../image/image_43/43_Durianne_2.jpg","../image/image_43/43_Durianne_3.jpg"]},"Consult_chateau_formulairef23b":{"id":"Consult_chateau_formulairef23b","dept":"43","canton":"Saugues","commune":"Esplantas","nom":"Esplantas","type":"Forteresse","periode":"XIII-XVI","histoire":"ESPLANTAS, château-fort du Moyen-Age du XIIIe siècle, ancienne place forte des Mercur constituée d'un donjon circulaire découronné au XIIIe siècle et d'un corps de logis. Odilon de Mercoeur évêque de Mende de 1247 à 1274 seigneur d'Esplantas qui le fit construire. L'ensemble a été restauré par son nouveau propriétaire. Ancienneté et authenticité caractérisent cette place forte du Gévaudan. Occupant une position très forte, au sommet d'une butte granitique dominant le bassin de la Seuge, le château fut construit  afin de protéger le flanc Sud de ses possessions Saugaines. Propriété de Michel Servant.                                              A une dizaine de kilomètre au sud ouest le château de Chazette à Chanareilles.","architecture":"Esplantas, le donjon de forme cylindrique, haut de 18 mètres et  11,5 de diamètre, date du XIIIe siècle. Le logis qui enveloppe en partie le donjon, sur un plan polygonal, a été remanié au XVIe et XVIIIe siècles. On accède à cette tour maîtresse dérivée des constructions de Philippe Auguste à partir dun corps de logis qui communique avec elle au moyen dune passerelle édifiée au niveau du 1er étage. Le corps de logis possède des éléments Renaissance (fenêtres à meneaux) ainsi quun décor intérieur du XVIIIe siècle (remarquable trumeau de cheminée représentant un camp militaire).\r\nL'ensemble du château a fait l'objet d'important travaux de restauration. Sauvé de la ruine, il pu être ainsi ouvert aux visiteurs.","habitants":"Odilon de Mercoeur\r\n        \"","divers":"Château d'Esplantas et de Chazette à Chanareilles","gps":"","images":["../image/image_43/43_Esplantas_1.jpg","../image/image_43/43_Esplantas_2.jpg","../image/image_43/43_Esplantas_3.jpg","../image/image_43/43_Esplantas_4.jpg","../image/image_43/43_Esplantas_5.jpg","../image/image_43/43_Esplantas_6.jpg","../image/image_43/43_Esplantas_7.jpg"]},"Consult_chateau_formulaire8f76":{"id":"Consult_chateau_formulaire8f76","dept":"43","canton":"Montfaucon-en-Velay","commune":"Montfaucon-en-Velay","nom":"Figon_Montfaucon","type":"Château","periode":"XVI","histoire":"FIGON-Montfaucon, le 9 octobre 1293, Armand de Retourtour, seigneur de Montfaucon, cède au roi Philippe le Bel , la moitié de sa seigneurie . Au cours de la guerre de cent ans, Montfaucon fût brûlé  par ses ennemis, provoquant la destruction de ses archives. Aussi, Charles V en 1370 lui confirme ses privilèges. La ville de Montfaucon était au Moyen-âge, une cité riche et puissamment défendue par son enceinte de murailles, ses tours et ses fossés.  Son château pouvait contenir une garnison de plus de 500 hommes. Son seigneur y avait sa résidence, ainsi que les officiers du roi . La justice y était publiquement rendue et sa grosse tour servait de prison. cest en 1559 quun officier de Catherine de Médicis hérite de lensemble par mariage. Il se nomme Carlo Figoni, un florentin arrivé avec la reine. Il épouse Florye Faure de Marnas, fille du baron de Montregard. Sur cet imposant site, il érige une grande maison forte, où est construite la ferme, dont il reste encore un immense four à pain, une rôtisserie et soit disant le départ dun souterrain reliant le Chazelet. Au XVIe siècle la ville de Montfaucon sera rapidement réoccupée par les troupes royales commandées par le baron de la Brosse.  Au XVIIe siècle, lensemble est détruit par un incendie. Sa reconstruction sera cependant épargnée lors de la Révolution de 1789. Cette bâtisse principale sera démolie sous Louis Philippe et la construction dun nouveau château sachèvera en 1844 par la famille  de Fraix de Fignon toujours dans la famille. Dans la commune le château de Montregard domaine de Louise de Romazin qui s'est reconvertit  au catholicisme.","architecture":"La ville de Montfaucon au XVI siècle, est une enceinte rectangulaire avec , au nord , des fossés profonds, au sud le château et la tour Briande la défendent.A lest et à louest, des portes bastionnées protègent les entrées de la ville. Lenceinte comprend le château, léglise, la cure, le cimetière et des habitations occupées par une vingtaine de familles nobles. Château de Figon La construction du mur denceinte de la propriété par un artisan durera à temps plein une quarantaine dannées. Pour sa part, le parc renferme différentes essences : tulipiers de Virginie, cyprès chauves de Louisiane, araucarias, catalpa de Nouvelle-Orléans, azalées orange du Canada. Mais pour Guy Henry, ce patrimoine nécessite beaucoup dinvestissement pour son entretien.","habitants":"Louise de Romazin\r\n        \"","divers":"Château de Figon , de Montregard et de Bruyère.","gps":"","images":["../image/image_43/43_Figon_Montfaucon_1.jpg","../image/image_43/43_Figon_Montfaucon_2.jpg","../image/image_43/43_Figon_Montfaucon_3.jpg","../image/image_43/43_Figon_Montfaucon_4.jpg","../image/image_43/43_Figon_Montfaucon_5.jpg"]},"Consult_chateau_formulairea6be-2":{"id":"Consult_chateau_formulairea6be-2","dept":"43","canton":"Paulhaguet","commune":"St-Georges-d`Aurac","nom":"Flageac","type":"Manoir","periode":"XIX","histoire":"FLAGEAC, construction médiévale par Loys  de Flaghac sur les ruines d'un château détruit pendant les guerres de cent ans dotée d'un important système de fortifications tours, douves, enceintes successives.  Restauré au début du XXe siècle par l'architecte Moreau; toitures, ouvertures plus vastes, décors  intérieurs du XVIIIe siècle,  la maison forte reconstruite au XVe siècle par Loys de Flaghac sur les ruines de l'ancien château.  Première mention de la chapelle en 1062. Du bâtiment d'origine du XIe ou XIIe siècle, il ne reste que le coeur. Des chapelles ont été ajoutées au XVe siècle,  la nef et la façade nord ont été reconstruites au XIXe, les vitraux Est  datés de 1857.                                                                  Dans la commune la maison forte d'Azinière.","architecture":"Flageac, maison forte du XVe siècle  logis rectangulaire flanqué de tours circulaires aux angles, façades et toitures du château, douves avec leurs quatre tourelles d'angle, terre-plein entouré par les douves,  les pièces suivantes avec leurs décors,  escalier, cuisine et salle des gardes (rez-de-chaussée), salon, salle à manger, ancien oratoire, bibliothèque, salle d'archives, chambre à alcôve, chambre du Roy et galerie (premier étage) ; cinq chambres (deuxième étage) ; chambre et lingerie (troisième étage) ; chemin de ronde couvert (quatrième étage), inscription par arrêté du 10 août 2000.","habitants":"Loys de Flaghac\r\n        \"","divers":"Château de Flageac","gps":"","images":["../image/image_43/43_Flageac_1.jpg","../image/image_43/43_Flageac_2.jpg","../image/image_43/43_Flageac_3.jpg"]},"Consult_chateau_formulairea45c":{"id":"Consult_chateau_formulairea45c","dept":"43","canton":"La Chaise-Dieu","commune":"Malvières","nom":"Folgoux","type":"Maison forte","periode":"XIV","histoire":"FOLGOUX, la seigneurie de Folgoux est attestée en 1318, et dépendait de la haute justice de l'abbaye de la Chaise-Dieu.  Le château est incendié et pillé vers  1590 pendant les guerres de Religion, quelques éléments anciens subsistent comme la cheminée de la cuisine, la tour carrée avec son escalier à vis ainsi que la fenêtre. L'édifice est reconstruit au début du XVIIe siècle. En 1785 le propriétaire procède au réameublement.","architecture":"Le domaine de Foulgoux se compose d'une maison forte, un portail donne accès à une première cour entourée de bâtiments de communs  à l'est et à l'ouest. Elle est fermée au nord  par un muret et un portail qui donne accès à une deuxième cour intérieure délimitée sur le côté ouest  par le prolongement des communs,  du côté nord par le logis d'habitation et du côté Est par le muret et le portail du jardin.  Le château fut probablement construit en 1344,  de plan rectangulaire, est composé de la juxtaposition de deux corps de bâtiments accolés.  Le premier représente l'habitation primitive,  le second est garni en son centre d'une tour d'escalier carrée. Une tour ronde et basse, située à l'angle sud-est, abrite la chapelle. Les jardins étaient autrefois composés à la Française. A l'intérieur du château, décors des XVIIe et XVIIIe siècles.","habitants":"Seigneurie de Folgoux \r\n        \"","divers":"Maison forte de Folgoux et ses dépendances","gps":"","images":["../image/image_43/43_Folgoux_1.jpg"]},"Consult_chateau_formulaireba46":{"id":"Consult_chateau_formulaireba46","dept":"43","canton":"St-Didier-en-Velay","commune":"St-Victor-Malescours","nom":"Fraisse_Malploton","type":"Château","periode":"XIV-XVI","histoire":"FRAISSE,  dans la famille en 1220 par le mariage de demoiselle Quitterie du Fraisse, dernière descendante de la famille du même nom, avec Urbain des Monstiers.\r\nLe Fraisse au XIII° siècle était un \" logis noble \", dont il ne reste presque rien aujourd'hui. Il fut brûlé en 1356 par le fameux prince Noir.  appartenait à la fin du XVIe siècle à Antoine Drevet qui s'y était retiré. Sa fille apporta le domaine à la famille Duplay, en épousant Marcellin Duplay, Il fut reconstruit après la Guerre de Cent Ans par sieur Jacques des Monstiers. C'est le  vieux château  du XVe siècle formant la partie droite de l'ensemble des bâtiments.\r\nLa partie principale, du XVIe siècle, fut construite par Jean des Monstiers, évêque de Bayonne et ambassadeur des rois François 1er et Henri II auprès de Charles Quint.\r\nPassionné par la Renaissance, il fait appel à l'architecte italien Sebastiano Serlio pour agrandir la maison familiale. Depuis plus de 780 ans le Fraisse est resté dans cette famille. Il s'est transmis de père en fils depuis plusieurs dizaines de générations, la dernière en 2009. Jean François, Marquis des Monstiers Mérinville qui la transformé en hôtel et séminaire mariage etc.                              MALPLOTON,  autrefois appelé Mas Ploton, ce château possession des barons de Saint Didier fut attribuée en dot à Isabelle de Saint Didier lors de son mariage en 1335 avec Henri  Ploton  de Rochebaron. En 1372, il fut acheté par Jehan Allier en même temps que la terre de la Fressange dont il prit le nom. En 1615, Jehan IV de la Fressange cède le château à son beau-frère Pierre de la Fayolle. Sa veuve le transmet à son fils  Innocent de Soubeyrand.  De 1733 à 1782, le château a été la propriété de la famille du Peloux de Saint-Romain. De 1782 à 1889, le château a appartenu à la famille Souvignet. En 1889, Théodore Véron de La Combe acquiert Le Malploton, et le fait rebâtir par l'architecte Vaucanson. Ses descendants possèdent toujours le château.  Dans ce château est issue Ignés de la Fraissange.","architecture":"Château du Fraisse: de la gentilhommière du Fraisse se détache surtout la chapelle et une petite tour.  C'est le \" vieux château \" du XV° siècle formant la partie droite de l'ensemble des bâtiments en forme de U à deux niveaux et attiques avec tourelles en angles  de cour intérieure.                                                              \r\nMalploton, du manoir primitif du XIVe siècle, il reste une tour et une échauguette à toitures en poivrières, trois fenêtres à meneaux et des meurtrières à tir rasant. La partie  du XIXe siècle est d'inspiration néo-Renaissance.","habitants":"Marquis des Monstiers Mérinville,                                                      Famille Souvignet et de la Fraissange\r\n        \"","divers":"Château de Fraisse et de Malploton","gps":"","images":["../image/image_43/43_Fraisse_Malploton_1.jpg","../image/image_43/43_Fraisse_Malploton_2.jpg","../image/image_43/43_Fraisse_Malploton_3.jpg","../image/image_43/43_Fraisse_Malploton_4.jpg"]},"Consult_chateau_formulaire9d4e":{"id":"Consult_chateau_formulaire9d4e","dept":"43","canton":"Langeac","commune":"Chanteuges","nom":"Grande_Maison","type":"Château","periode":"XV","histoire":"GRANDE-MAISON, la première trace écrite remonte à 936, date à laquelle elle fut fondée  par le prévôt du chapitre. À la fin du XIe siècle, elle est ruinée par la rébellion des moines rouges  et sous limpulsion de labbé Étienne de Mercur devient un prieuré de labbaye de la Chaise-Dieu.\r\nAu début du XVe siècle, labbé Jacques de Senectaire fait réaliser dimportants travaux. Le cardinal de Rohan, impliqué dans laffaire des colliers de la reine, en exil à La Chaise Dieu, séjourna à plusieurs reprises à Chanteuges.                                           \r\nDans la commune le château de Bénac.","architecture":"Grande-Maison, les moines entreprennent alors la restauration du prieuré pour en faire un lieu de villégiature. Pendant la Révolution, labbaye et ses biens furent vendus comme biens nationaux. Aménagée dans le site exceptionnel du village de Chanteuges, maison du XVe siècle construite sur une chapelle du XIIe siècle, restaurée avec goût, située au pied de l'Abbaye Romane transformé en chambres d'hôtes.","habitants":"Jacques de Senectaire\r\n        \"","divers":"Château de Grande-Maison et château de Benac","gps":"","images":["../image/image_43/43_Grande_Maison_1.jpg","../image/image_43/43_Grande_Maison_2.jpg","../image/image_43/43_Grande_Maison_3.jpg","../image/image_43/43_Grande_Maison_4.jpg","../image/image_43/43_Grande_Maison_5.jpg","../image/image_43/43_Grande_Maison_6.jpg"]},"Consult_chateau_formulairec094":{"id":"Consult_chateau_formulairec094","dept":"43","canton":"Blesle","commune":"Grenier-Montgon","nom":"Grenier_Montgon","type":"Vestiges","periode":"XIV","histoire":"MONTGON,  en effet, Béraud, seigneur de Léotoing meurt sans descendance. La seigneurie de Léotoing revient alors à la branche cadette de la famille. A cette époque, la seigneurie de Léotoing est en effet un vaste domaine, riche et en pleine croissance. Les défenses sont remaniées une nouvelle fois au début du XVIe siècle par Jean de Léotoing-Montgon, semble t-il. A la mort de Jacques de Léotoing-Montgon, fils de Jean, le domaine tout entier revient à la famille de Corde-Boeuf de Beauverger-Montgon, possesseur de Chalet. Ils habiteront le château jusqu'en 1690. Abandonné, les pilleurs de pierre ruineront l'édifice au cours du XIXe siècle. En 1969 les ruines sont rachetées à la commune et loué à l'association \" Les amis du Vieux Montgon \" qui lance sa restauration.                                                                          FLORIVAL,  Le château construit au XVe siècle comprenait un corps de logis de plan rectangulaire.                                            MELINE; ce château appartenait à Henriette de Pouilly fondatrice du couvent des chanoinesses régulières de Saint-Augustin  de Lançon, elle y mourut en 1754, il servit de refuge aux religieuses du même ordre qui furent expulsées en Hollande en 1717.","architecture":"Montgon, vestiges du château de Montgon, la grosse tour date probablement du XIIIe siècle ou du XIVe, la tour d'angle nord-est de la première enceinte qui lui est identique doit être contemporaine.   Érigé à flanc de colline, Montgon est composé d'une grande enceinte triangulaire érigé avant le XVIe siècle, flanquée de deux tours au milieu de laquelle trône un corps de logis rectangulaire. Une tour maîtresse, ou petit donjon, est accolé au corps de logis. Elle a certainement été bâtie sur les fondations du premier château à l'endroit même d'une massive tour carrée, ce qui pourrait expliquer son premier niveau quadrangulaire alors que la nouvelle tour est circulaire.                                                         Florival; le château construit au XVe siècle comprenait un corps de logis de plan carré flanqué d'une tourelle d'escalier dans son angle nord-est,  ce bâtiment fut agrandi au sud dans la deuxième moitié du XVIe siècle, l'aile nord  a été ajoutée au XVIIIe siècle, cette aile fut prolongée à l'ouest par un moulin, à la même époque, les percements de la façade est du corps de logis principal étaient refaits, l'aile nord fut prolongée à l'est par une grange-étable de même hauteur.                                                                         Méline, corps de logis rectangulaire à deux niveaux, grosse tour ronde  hors oeuvre à droite de la façade.","habitants":"Seigneurie de Léotoing \r\n        \"","divers":"Vestiges de Grenier-Montgon, château de Florival et de Méline","gps":"","images":["../image/image_43/43_Grenier_Montgon_1.jpg","../image/image_43/43_Grenier_Montgon_2.jpg","../image/image_43/43_Grenier_Montgon_3.jpg","../image/image_43/43_Grenier_Montgon_4.jpg","../image/image_43/43_Grenier_Montgon_5.jpg","../image/image_43/43_Grenier_Montgon_6.jpg","../image/image_43/43_Grenier_Montgon_7.jpg","../image/image_43/43_Grenier_Montgon_8.jpg"]},"Consult_chateau_formulaire7b22":{"id":"Consult_chateau_formulaire7b22","dept":"43","canton":"Saugues","commune":"Grézes-Agnat","nom":"Grezes_Clauze","type":"Vestiges","periode":"XIII","histoire":"GREZE-CLAUZE,  enceinte avec tours rondes et tour de La Clauze donjon heptagonal du XIIIe siècle, tour du Moyen-Age. Elle constituait le donjon du château ravagé en 1788. La Clauze a été fief des Léotoing, des Espinchal, des La Rochefoucauld, des La Tour-dAuvergne, au château des Grèzes en 1669, la seigneurie est tenue par la famille Guerin de Lugeac.                             BILHERIE- Grézes, dont la seigneurie dépendait du château  de Clauze.  En 1575, pillage du château. Le chemin de ronde n'éxiste plus. La tour a conservé  son entrée par un deuxième niveau auquel on devait accéder par une échelle. Au niveau supérieur, les hautes meurtrières sont des fentes déclairage. Larchère du 1er niveau accessible par une niche, présente une fonction de prestige, confirmée par le couronnement de mâchicoulis à la provençale, sans fonction défensive.","architecture":"GREZE,  De plan octogonal, ce donjon date du 14e siècle et se veut un témoin de l'architecture militaire en Gévaudan. En 1575, pillage du château. Le chemin de ronde manque entièrement. Ne subsistent que les corbeaux de mâchicoulis.                               Bilherie, de plan  octogonal, ce donjon date du XIVe siècle et se veut un témoin de l'architecture militaire en Gévaudan grande demeure campagnarde comportant une partie de façade du XVIIe siècle, en granit appareillé et  une autre du XVIIIe siècle en moellons et pierre de taille.                                                           Maison dAssemblée à La Clauze avec des fenêtres à meneaux et linteaux de portes sculptés. L'accès présente un portail à fronton tronqué appuyé  sur deux pilastres. Une pointe de diamant lie pilastres  et fronton. La base de chaque pilastre est décorée d'un losange. Cette porte pourrait dater du début  du XVIIe siècle. La construction s'ouvre en façade sud avec cinq travées et trois niveaux. La porte principale est à linteau délardé en arc segmentaire. Un bossage continu anime linteau et pied-droits. Une corniche protège la porte à double battant. Cette façade est datable de la fin du XVIIIe siècle par ses fenêtres à linteau cintré.","habitants":"Famille Guerin de Lugeac\r\n        \"","divers":"Vestiges du château de Gréze-Clauze et maison forte de Bilherie.","gps":"","images":["../image/image_43/43_Grezes_Clauze_1.jpg","../image/image_43/43_Grezes_Clauze_2.jpg","../image/image_43/43_Grezes_Clauze_3.jpg","../image/image_43/43_Grezes_Clauze_4.jpg","../image/image_43/43_Grezes_Clauze_5.jpg","../image/image_43/43_Grezes_Clauze_6.jpg"]},"Consult_chateau_formulaire0165":{"id":"Consult_chateau_formulaire0165","dept":"43","canton":"Pradelles","commune":"Rauret","nom":"Joncheres_Jagonas","type":"Vestiges","periode":"XII-XIII","histoire":"JONCHERES, au XIIe et  XIIIe siècles, les seigneurs de Jonchères apparaissent comme les vassaux de l'évêque du Puy. En 1285, le site de Jonchères est tenu en co-seigneurie par Gilbert de Saint-Haon et Ebrard de Pradelles, avoués de l'évêque du Puy.\r\nA partir du XVe siècle, les seigneurs de Vilate, descendants d'Ebrard de Pradelles sont les seuls possesseurs de la baronnie de Jonchères. Le mariage de Gilberte Vilate avec Jean de Belvezer au XVIe siècle entraîne une campagne de réhabilitation du château.\r\nA la fin du XVIIIe siècle, c'est un docteur en médecine, J-G Sauzet, qui rachète la baronnie. Jonchères reste dans  cette famille jusqu'en 1958, date de son rachat par la commune. La ruine de la baronnie daterait  de la période 1769-1806, fut le siège d'une baronnie du Velay. Au fil des siècles, la baronnie qui remplaça la Viguerie perdit de son étendue, mais resta importante. Jusqu'à la Révolution, elle fut l'une des 18 Baronnies Diocésaines qui donnaient à leur seigneur le droit de siéger aux états particuliers du Velay.\r\nLes communes de Jagonas et Jonchères furent réunies à Rauret en 1832.\r\nJAGONAS;  pas d'information sur ce magnifique château du XIIIe siècle remanié aux XIXe et XXe.                                         \r\nMaison forte avec tour à Joncherettes.","architecture":"Les vestiges du château de Jonchères est implanté sur un éperon rocheux limité par un ruisseau, la Tioule, et les gorges de l'Allier qu'il domine. Au plus haut rocher d'assise, un haut pan de mur au parement de lave et de granit appareillé aux angles, subsiste seul du donjon quadrangulaire. On y décèle la trace d'appui de trois niveaux,  Les ruines comprennent un château fort des XIIe-XIIIe siècles, une tour carrée, une tour circulaire, la façade d'un corps de logis reconstruit au XVIIIe siècle. Bien que décharnées, les ruines sont d'autant plus majestueuses  que la façade principale, percée de cinq baies, sur trois niveaux, dominent la vallée, c'est le seul vestige médiéval du château.                                                    Jagonas, quadrilatère avec corps de logis principal à trois niveaux et attiques deux tours rondes accolées aux angles, prolongement du corps  par un bâtiment en équerre de même niveaux, retour en équerre sur un bâtiment identique accolée d'une tourelle dépassant l'ensemble et d'une tour  crénelée.","habitants":"les seigneurs de Vilate\r\n        \"","divers":"Vestiges de Jonquères et château de Jagonas Rauret","gps":"","images":["../image/image_43/43_Joncheres_Jagonas_1.jpg","../image/image_43/43_Joncheres_Jagonas_2.jpg","../image/image_43/43_Joncheres_Jagonas_3.jpg","../image/image_43/43_Joncheres_Jagonas_4.jpg","../image/image_43/43_Joncheres_Jagonas_5.jpg","../image/image_43/43_Joncheres_Jagonas_6.jpg"]},"Consult_chateau_formulaired3ac":{"id":"Consult_chateau_formulaired3ac","dept":"43","canton":"Tence","commune":"Tence","nom":"Joux_Tence","type":"Maison forte","periode":"XV-XVIII","histoire":"JOUX, cette maison forte  du XIIe siècle remanié en 1308 par l'évêque du Puy, en 1379 Pierre de Mayol aurait acheté la seigneurie de Joux à Bertrand Monédier. La famille Mayol  conserve Joux   jusqu'au XVIe siècle. En 1584, Gasparde Geoffroy   de Joux épouse François Duranc. La famille Durranc demeure à Joux jusqu'au XVIIIe siècle. En 1732, Anne-Marie Durranc épouse Jean-Joseph de La Fayolle de Mars. En 1889, leur descendant vend le château à Fritz Meurer, négociant en soieries  à Lyon.","architecture":"Le château  de Joux est couvert d'un toit à   croupes. Une échauguette moderne est couverte d'un toit conique. La tour crénelée est couverte d'une terrasse. Il n'y a pas de communications entre l'intérieur de la demeure et la tour. Le château et ses principales dépendances forment  un plan en U. L'aile nord est une grange-étable. L'aile ouest  renferme une étable à chevaux avec un logement, un porche couvert et la chapelle. L'aile sud comprend un logement de fermier et une grange-étable. Il ne subsiste aucun élément significatif de la maison forte primitive sinon la base d'une échauguette à l'angle sud ouest  de l'édifice. Cette dernière est composée d'éléments hétérogènes harmonisés à la limite   des XVIIIe-XIXe siècles. La tour qui flanque l'angle sud-est  a été bâtie vers 1850.  Au nord et à proximité du château une maison est accolée à un corps de ferme, elle a été construite en 1894 pour servir d'annexe à la demeure.  L'escalier central est en deux parties, un escalier droit  en pierre dessert le 1er étage, un escalier tournant en charpente mène au second.","habitants":"Bertrand Monédier\r\n        \"","divers":"Château de Joux à Tence","gps":"","images":["../image/image_43/43_Joux_Tence_1.jpg","../image/image_43/43_Joux_Tence_2.jpg","../image/image_43/43_Joux_Tence_3.jpg","../image/image_43/43_Joux_Tence_4.jpg"]},"Consult_chateau_formulaire54a5":{"id":"Consult_chateau_formulaire54a5","dept":"43","canton":"Pradelles","commune":"Lafarre","nom":"Lafarre","type":"Vestiges","periode":"XV","histoire":"LAFARRE, château du Cros de Lafarre cité en 1165 reconstruit au XV-XVIe siècle.                                                                                   TOUR de MARIAC; cité en 1183 mention du château de Lafarre et de son seigneur, en 1274, Héracle de Montlaur en  rend hommage à Guillaume de la Roue évêque du Puy, en 1302 Pons le seigneur de Goudet en rend hommage  à Guy de Montlaur seigneur de Montlaur.","architecture":"Lafarre, château du Cros de Lafarre du XVIe siècle, château rectangulaire à quatre niveaux flaqué d'une tour d'escalier hors oeuvre plein cintre    et d'une autre tour en angle à trois niveaux.                                La Tour carrée de Mariac du XIIIe siècle est campée à l'extrémité d'une longue arête basaltique au dessus de la confluence de la Loire avec la Langougnole,  cette tour se rattache à un ensemble de constructions médiévales caractéristiques du système seigneurial des XIIe et XIIIe siècles s'appuyant sur des tours et forteresses à usage à la fois militaire et résidentiel donjon bien conservé de plan carrée de 6,5 sur 6,5 mètres, on y accède par le premier étage par une porte plein cintre à trois mètres du sol.","habitants":"Seigneur de Lafarre\r\n        \"","divers":"Château de Cros et la tour de Mariac.","gps":"","images":["../image/image_43/43_Lafarre_1.jpg","../image/image_43/43_Lafarre_2.jpg","../image/image_43/43_Lafarre_3.jpg","../image/image_43/43_Lafarre_4.jpg","../image/image_43/43_Lafarre_5.jpg"]},"Consult_chateau_formulaireb893":{"id":"Consult_chateau_formulaireb893","dept":"43","canton":"Paulhaguet","commune":"Chavaniac","nom":"Lafayette_Chavaniac","type":"Château","periode":"XIV","histoire":"LAFAYETTE. Le marquis de La Fayette y est né en 1757. Il s'est marié en 1774  avec Adrienne de Noailles, avec laquelle il a eu quatre enfants, Henriette, morte en bas âge, puis Anastasie, Georges et Virginie qui ont séjourné au château. Héros de la guerre d'indépendance américaine et de la Révolution, Lafayette est honoré puis rejeté par les révolutionnaires français, car il vote contre la mort du roi. La chute de la monarchie en 1792, le force donc à quitter la France. Lafayette est alors fait prisonnier par l'Autriche et emprisonné à la forteresse d'Olmütz. Il est alors considéré comme un traître n'ayant pu sauver Marie-Antoinette qui est d'origine autrichienne et le roi de France.   Le château sera modernisé par Lafayette (architecte Vaudoyer) puis vendu comme bien d'émigré en 1793, suite à son départ, mais c'est la tante de La Fayette qui rachète le château. le marquis  de  Lafayette ne reviendra en France qu'en 1799. \r\nEn 1917, un industriel américain d'origine écossaise, John Moffat, lachète au nom de l'association « Memorial Lafayette » et le fait rénover de fond en combles afin dabriter les collections historiques de Lafayette, glanées des deux côtés de l'Atlantique. Il est meublé en style Louis XVI.  Suite à la mort de John Moffat en 1966, l'association franco-américaine « Memorial Lafayette » poursuit la gestion du château puis en transfère la propriété, en juillet 2009, au conseil général de la Haute-Loire, qui à son tour reprend l'administration du château et fait refaire la toiture.","architecture":"Le château de Chavaniac, dont la construction remonte au XIVe siècle a été en partie détruit par un incendie en 1701 encadrée par deux tours en pierres noires d'Auvergne a été construit au XIVe siècle. Le château et ses décors intérieurs ont été inscrits au titre des monuments historiques, le 21 août 1989.\r\nLe Mémorial Lafayette, en 1916, malgré son respect pour le château, l'a rendu plus imposant en faisant construire la tour carrée, sorte de donjon.\r\nLa demeure comprend un grand escalier d'honneur à rampe en bois, une galerie ornée de peintures murales et une salle à manger Louis XIII, la salle des gardes, la salle de l'écho au papier peint chinois. Au premier étage se trouvent le grand salon, la bibliothèque, la chambre de Clèves, la chambre rose, la chambre natale de Lafayette, la chambre Adrienne, la chambre verte mitoyenne ainsi que la chambre Floride et son appartement. Au deuxième étage, on trouve la grande coursière, la chambre Armand, la chambre Persane et au troisième étage, la chambre Gilbert avec une salle de bain et un sauna. La chambre carton à chapeaux et le salon de l'amitié franco-américaine sont situés au quatrième étage.","habitants":"Marquis de La Fayette \r\n        \"","divers":"Château de Lafayette à Chavaniac","gps":"","images":["../image/image_43/43_Lafayette_Chavaniac_1.jpg","../image/image_43/43_Lafayette_Chavaniac_2.jpg","../image/image_43/43_Lafayette_Chavaniac_3.jpg","../image/image_43/43_Lafayette_Chavaniac_4.jpg","../image/image_43/43_Lafayette_Chavaniac_5.jpg","../image/image_43/43_Lafayette_Chavaniac_6.jpg","../image/image_43/43_Lafayette_Chavaniac_7.jpg"]},"Consult_chateau_formulaire92d1":{"id":"Consult_chateau_formulaire92d1","dept":"43","canton":"Tence","commune":"Chambon-sur-Lignon","nom":"Lambert","type":"Manoir","periode":"XVI","histoire":"LAMBERT,  le manoir a été bâti ou reconstruit en 1615, sans doute par la famille Lambert (date portée sur le linteau de porte). En 1642, Pierre Lambert, avocat au Puy, vend à Pierre Marlhens sa maîtairie. En 1653,  Pierre Marlhens est nommé Bailly du  mandement  du Chambon. En 1679, un autre Pierre Marlhens, petit-fils du précédent, est  nommé châtelain,  en 1729  le manoir appartient à  Mathieu Marlhens. Dans la première moitié du XIXe siècle, les Marlhens sont   encore propriétaires. A la limite des   XIXe et XXe siècles, les dépendances agricoles situées  à  l'est sont remplacées par une maison-bloc et une remise  avec four à pain. Au XXe siècle le  manoir et ses dépendances sont restaurés. Propriété de monsieur Berthelot.","architecture":"Lambert se compose d'une  maison carrée et  d'une grange en partie couverte en  lauzes,  d'une basse-cour ,  pour le four construit en moellons et couvert d'un toit à deux croupes. La principale salle du rez-de-chaussée renferme un potager en embrasure de fenêtre et une cheminée portant des armoiries bûchées du XVIIe siècle. La demeure conserve diverses boiseries anciennes, parfois déplacées. L'escalier hors oeuvre est construit en pierres de taille et couvert d'un toit à  croupe. Il est de type rampe sur rampe et à deux volées. Ses paliers et ses retours sont voûtés d'arêtes. La porte extérieure de l'escalier a un linteau sculpté qui porte les armoiries martelées, la date et un monogramme formé de deux M inversés et d'un L pour Mathieu Marlhens-Lambert. Une bretèche est à l'aplomb de cette porte. Ce même mur porte des latrines. Les ouvertures du mur ouest résultent de diverses modifications.","habitants":"Famille Lambert \r\n        \"","divers":"Manoir de Lambert","gps":"","images":["../image/image_43/43_Lambert_1.jpg","../image/image_43/43_Lambert_2.jpg"]},"Consult_chateau_formulaire5824":{"id":"Consult_chateau_formulaire5824","dept":"43","canton":"Brioude","commune":"Lamothe","nom":"Lamothe","type":"Château","periode":"XIII-XIV","histoire":"LAMOTHE, le château fort  appartenait à Pierre de Bulhon, puis à ses trois frères , Bertrand, Rodolphe et Dalmas de Mota.  Au XIIe siècle, le château passa sous la domination du comte et du dauphin d'Auvergne. En 1206, Guy II, comte d'Auvergne. En 1248, Pons V, vicomte de Polignac et de La Mothe, se croisa avec Saint-Louis et mourut en Terre Sainte.  En 1304, Guillaume, dit Armand VII de Polignac, fit dresser le terrier de La Mothe.  En 1344, Guillaume II dit Roger, frère aîné du pape Clément VI, acquit la vicomté de La Mothe.  En 1366, le marquis de Beaufort, seigneur de Canilhac, autre fils de Guillaume, et frère de Pierre Roger, élu pape en 1370 sous le nom de Grégoire XI, reçut La Mothe, qui devint La Mothe-Canilhac.  Il épousa, en 1369, Catherine, fille du dauphin d'Auvergne, qui lui rapporta les droits que ce dernier possédait sur sa terre. En 1386, il fut nommé par Charles VI de France, lieutenant en Rouergue.   Son fils Louis de Beaufort Canilhac, vicomte de La Mothe,  chambellan du roi, il fut nommé bailly de Montferrand et d'Usson de 1468 à 1472.  Son neveu Jacques de Montboissier Beaufort Canilhac devint vicomte de La Mothe et épousa en seconde noce en 1526 Charlotte de Vienne. Gabriel de Montboissier Beaufort Canilhac participa activement à la fronde et fut condamné à mort et décapité aux grands jours d'Auvergne en 1665. Ses biens confisqués furent attribués au sieur Bartillat, garde du trésor royal. Ce dernier les restitua en 1673 à Anne de Laubespin, veuve de Gabriel.   En 1680, la Mothe passa par mariage à la famille de Barentin, puisque Madeleine Perrot, nièce de Anne de Laubespin épousa Jacques Honoré Barentin, président de la cour. Les Barentin possédèrent La Mothe jusqu'à la Révolution Charles-Paul-Nicolas Barentin de Montchal, dernier seigneur, émigra en 1790.  Propriété de monsieur Pouygheon.","architecture":"Les bases du château  fort actuel de Lamothe, construit sur le ravin, remontent sans doute au XIIIe siècle. Le village se développe autour du château en commençant par le nord-est, où se situe aujourd'hui le quartier  le fort, puis il s'étend jusqu'à l'actuel quartier de la Côterie. Entouré de remparts, le village était protégé du côté le plus accessible par  le grand Vallat  percé encore aujourd'hui de deux portes, le Théron  et  le Soulard.   Architecture du XVIIe et du XVIIIe siècle issue d'une reconstruction à partir d'une base médiévale du XIVe siècle. Il ne reste de l'édifice primitif   que l'étage supérieur. Les salles médiévales sont conservées, dont une chambre dite \"Chambre Papale\" au plafond peint. La reconstruction au XVIIe siècle comprend quelques pièces décorées de la fin du XVIIIe siècle.\r\n Au XIXe siècle, le château fut transformé en couvent, puis cédé en partie à la commune qui y installa l'école et le presbytère. Aujourd'hui propriété privée, le château est peu à peu restauré.                             Au nord à quelques kilomètres le château d'Agnat au lieu dit des Grézes,   de cette seigneurie, en 1669 était tenue par la famille de Lugeac, trois maisons fortes dans cette commune, Chadriat, Chamalière et Pieboudry.","habitants":"Pierre de Bulhon\r\n        \"","divers":"Vestiges des remparts du village, château de Lamotte, d'Agnat et du Prieuré","gps":"","images":["../image/image_43/43_Lamothe_1.jpg","../image/image_43/43_Lamothe_2.jpg","../image/image_43/43_Lamothe_3.jpg","../image/image_43/43_Lamothe_4.jpg","../image/image_43/43_Lamothe_5.jpg","../image/image_43/43_Lamothe_6.jpg","../image/image_43/43_Lamothe_7.jpg"]},"Consult_chateau_formulaire357a":{"id":"Consult_chateau_formulaire357a","dept":"43","canton":"St-Julien-Chapteuil","commune":"St-Pierre-Eynac","nom":"Lardeyrol","type":"Vestiges","periode":"XI","histoire":"LARDEYROL au XIe siècle, la seigneurie passe tour à tour sous le contrôle de différents seigneurs du Velay, parmi lesquels les Chapteuil et les Polignac, il en est de même de la seigneurie dEynac et de Bonneville. La commune s'articule à cette époque autour de différents châteaux. Le château de Lardeyrol dont il ne subsiste qu'une tour en partie effondrée contrôle le passage du col du Pertuis, route importante vers le Forez et le Lyonnais. Le château d'Eynac qui est un point de passage important avec la présence du chemin vers Saint-Jacques de Compostelle. Pour finir le château de Bonneville remanié en maintes fois, en particulier à la Renaissance, qui seul demeure encore aujourd'hui relativement bien conservé. Saint-Pierre dépend comme tout le Velay à cette époque, du parlement de Toulouse et se situe à l'extrême nord du Languedoc.  Dans la commune le château de Chamblas du XVIe siècle propriété des seigneurs de Chamblas, puis aux de la Roche Negy, il a été racheté quelques années plus tard par un membre de la famille nommé Bergeron, commerçant au Puy.                        Château de Bonneville, classé monument historique depuis 1973 L'un des seuls châteaux encore habité sur la commune ( voir article), et le château de Champ à St-Hostein.","architecture":"La forteresse de Lardeyrol commandait le passage.  On ne peut aujourd'hui apercevoir que les ruines du château, le pan de mur érigé jusqu'à nos jours est tombé avec une tempête dans les années 80, qui en fit disparaître une grande partie. Du haut de ces pans doù semblent surgir des ombres fantastiques, tant et tant de preux seigneurs pourraient nous conter la peine des hommes entre le fracas des armures et les chevauchées de la croisade.                        Château d'Eynac,  à l'origine sur la motte féodale a été détruit à la Révolution et servait auparavant de passage obligé pour les marchandises et les hommes à destination du Puy qui sacquittaient d'un péage.                                                            Maison forte de Champ du XVIe-XVIIe siècle, typique de la région, elle consiste en un corps de bâtiment de plan rectangulaire, muni déchauguettes à ses quatre angles, une tour isolée à langle nord-ouest, une douve autrefois remplie deau complétaient le système défensif, elle fut agrandie par l'ajout d'un corps de logis Renaissance. Différents aménagements  eurent lieu pendant la première moitié du XVIIIe siècle,  construction de l'aile.","habitants":"Seigneur de Lardeyrol\r\n        \"","divers":"Vestiges de Ladeyrol, château de Bonneville, de Champ et de Chamblas","gps":"","images":["../image/image_43/43_Lardeyrol_1.jpg","../image/image_43/43_Lardeyrol_2.jpg","../image/image_43/43_Lardeyrol_3.jpg","../image/image_43/43_Lardeyrol_4.jpg","../image/image_43/43_Lardeyrol_5.jpg","../image/image_43/43_Lardeyrol_6.jpg"]},"Consult_chateau_formulairebda1-2":{"id":"Consult_chateau_formulairebda1-2","dept":"43","canton":"Brioude","commune":"Beaumont","nom":"Lauriat","type":"Vestiges","periode":"XV","histoire":"LAURIAT, au XVe siècle, le château  appartient à la famille de Rochefort dAlly. Vers 1480, Dauphine de Rochefort dAlly, dame de Lauriat, fille de Hugues et dIsabeau de Rohan épouse Antoine de Saint Ahond. Lauriat passe à la famille  de Saint Ahond. Leur fils Pierre prend le titre de seigneur  et épouse Marguerite de Pons.  De ce mariage naît Antoinette de Saint-Ahond qui épouse en 1575 François de Pélacot.  Passe dans la famille des  de Pélacot. François de Pélacot transmet la seigneurie à son fils  Alexandre qui épouse à son tour Gabrielle du Perier. Du couple naissent deux enfants, Charles  qui prend le titre de seigneur de Lauriat mais décède sans postérité, Marie de Pélacot née vers 1620 qui a le titre de  dame de Lauriat,  hérite du château. Elle épouse vers 1640, Charles de Gouzel. La seigneurie de Lauriat passe dans la famille des  de Gouzel  et y reste jusquà Marc de Gouzel né en 1755.\r\nA la Révolution, Marc de Gouzel qui a disparu est considéré comme émigré et Lauriat est vendu à un particulier. Marc de Gouzel qui détient  le secret de la rage  fait lobjet de protection par les paysans du brivadois. Il meurt à Brioude en 1818 sans être inquiété. Auparavant, il aura transmis le fameux  secret de la rage  à son régisseur Antoine Pialoux retiré à Bournoncle Saint-Julien.","architecture":"Lauriat; sur une butte isolée face à Baumont, ancien corps de logis entre deux tours rondes très anciennes accolées à la plus haute, dépendances et corps de logis à l'extérieur.","habitants":"Famille de Rochefort\r\n        \"","divers":"Vestiges du château de Lauriat","gps":"","images":["../image/image_43/43_Lauriat_1.jpg","../image/image_43/43_Lauriat_2.jpg","../image/image_43/43_Lauriat_3.jpg","../image/image_43/43_Lauriat_4.jpg","../image/image_43/43_Lauriat_5.jpg"]},"Consult_chateau_formulaire6e77":{"id":"Consult_chateau_formulaire6e77","dept":"43","canton":"St-Paulien","commune":"Lavoûte-sur-Loire","nom":"Lavoute_Polignac","type":"Château","periode":"XIII","histoire":"LAVOUTE-POLIGNAC,  au XIIIe siècle, la forteresse récupérée par Armand de Polignac évêque du Puy qui à sa mort en 1257, la lègue à son frère Pons, le petit fils de ce dernier mort en 1355 transmet Lavoute aux descendants de son frère.  Randon Armand X de Polignac vicomte remanie la forteresse,  Melchior de Polignac, né en 1661 comte et futur cardinal et évêque d'Auch. A la Révolution, le château fut vendu comme bien national,après l'émigration des Polignac pour lAutriche, est racheté par une famille locale, mais faute dargent, le château est réduit à l'état de ruine.  Au XIXe siècle, la famille de Polignac rachète le château qui  fit restaurer laile Sud qui est le seul bâtiment du corps de logis encore debout aujourd'hui. Personnage important ayant vécu à Polignac  Mme la duchesse de Polignac née Gabrielle de Polastron.  Le prince Jules de Polignac (1780-1847).  Le cardinal Melchior de Polignac.   Hélène de Bauffremont.   Le comte Melchior de Polignac et  le comte Pierre de Polignac.","architecture":"Le château de Lavoute Polignac  du XIIIe siècle reconstruit au XVe siècle, remanié à la Renaissance, se situe sur un éperon rocheux dominant une boucle de la Loire. A l'est, trois lignes de défenses successives semblent protéger le point le plus élevé de l'éperon, choisi pour la construction du donjon. De plan rectangulaire, flanqué de deux tours rondes le donjon a perdu  sa partie nord. Il y avait 4 tours dangle et 3 ailes, défendu par une double ligne de rempart. Se trouvait aussi un donjon intérieur au centre de la cour qui contenait lescalier et servait autrefois de clocher. Château presque entièrement  reconstruit au XIXe siècle. Les vastes bâtiments qui entouraient la cour disparurent dans un incendie. En 1793, ne restait debout   que l'aile construite  au-dessus  du ravin. L'édifice fut vendu  comme bien national et  entièrement vidé. Les parties anciennes sont réduites à  quelques pans de murs,  une porte du XIVe et XVIIe siècle, quelques fenêtres et la chapelle (salle voûtée d'ogives).  Le bâtiment central comportant deux étages a été  restauré. Il comprend la porte d'entrée datée de 1634.","habitants":"Melchior de Polignac\r\n        \"","divers":"Château de Lavoute-Polignac","gps":"","images":["../image/image_43/43_Lavoute_Polignac_1.jpg","../image/image_43/43_Lavoute_Polignac_2.jpg","../image/image_43/43_Lavoute_Polignac_3.jpg","../image/image_43/43_Lavoute_Polignac_4.jpg","../image/image_43/43_Lavoute_Polignac_5.jpg"]},"Consult_chateau_formulairec9cb":{"id":"Consult_chateau_formulairec9cb","dept":"43","canton":"Blesle","commune":"Léotoing","nom":"Leotoing","type":"Vestiges","periode":"XIII","histoire":"LEOTOING, château fort du XIVe siècle.  Le fief passe aux Rochefort de La Roche, dont l'une des descendantes Marguerite épouse Jean De Chalvet de Rochemonteix. La seigneurie demeure dans cette famille qui choisit de résider au château voisin de Vernassal, entraînant l'abandon et la ruine du château féodal. Vers 1420 le château occupait une motte délimitée par un fossé, située au point le moins élevé du site. A la suite de dissensions au sein de la famille comtale d'Auvergne, Léotoing fit partie des fiefs donnés par jugement royal à Robert Dauphin, comte de Clermont qui les légua à son fils Hugues au début du XIVe siècle. Les Dauphins donnèrent au château seigneurial un nouveau visage, une tour maîtresse et ses annexes furent édifiées en aménageant une terrasse sur le piton rocheux voisin. Vers 1365, un autre Robert Dauphin renforça les défenses du château afin de dissuader toute attaque éventuelle. Ce fut le temps de la guerre de Cent Ans et des compagnies de mercenaires occupèrent Brioude. Au XVe siècle, un dernier programme d'aménagements résidentiels acheva de donner au château sa physionomie définitive. Béraud III, dernier représentant des Dauphin, maria sa fille unique à Louis de Bourbon, comte de Montpensier. De cette famille comtale puis ducale des Montpensier, la seigneurie passa aux ducs d' Orléans.\r\nLaissé sans entretien il tomba en ruines à partir du XVIe siècle et fut vendu comme bien national à la Révolution, il servit alors de carrière pour les habitants du village.\r\nDans la commune le manoir de Farreyroles maison du Temple d'abord, puis commanderie de l'Ordre de Saint-Jean de Jérusalem, après 1312.                                                                        VERNASSAL; Avant 1530, une maison modeste, appartenant à la famille des Chalvet de Rochemonteix, devait occuper l'emplacement actuel du château, passa aux Suat de Chavagnac, aux d'Auzon de Montravel.","architecture":"Léotoing, sur un piton rocheux, importants vestiges du château fort du XIVe siècle, servit de repaire aux brigands qui dévastèrent la région. Le châtelet commande l'accès au bâtiment principal qui se fait par une étroite rampe en corniche taillée au flan du rocher. Une courtine épouse le rebord de l'escarpement rocheux en reposant sur des arcs de décharge en plein cintre. Ne possédant aucun élément de flanquement, elle protège le chemin d'accès qui mène à la tour. Une première enceinte comprenant des restes de tours circulaires subsiste au pied du rocher.  La porte d'entrée du XVIe siècle, s'ouvre sous un cordon de faux-mâchicoulis symboliques.            Fareyrolles, au XVIe siècle, édifice bâti, sur l'emplacement d'une commanderie plus ancienne. Le bâtiment est flanqué d'une tour ronde dans un angle, une autre tour  existait dans l'angle opposé. Les percements et une partie de la façade principale ont été refaits au XVIIIe siècle.                                                                              Le château de Vernassal   fut reconstruit une première fois au XVIIe siècle . L'aménagement se  poursuit en 1741. Le pavillon sud commencé en 1675, reste inachevé à cette date. L'ensemble se compose du  château  et des communs comprenant des écuries,  un pigeonnier carré, deux terrasses et une cour d'honneur. flanqué de deux pavillons de deux travées,  ordonnancé en trois travées de part et d'autre d'un avant-corps central à deux ressauts couronné par un fronton triangulaire orné des armes de Rochemonteix.","habitants":"Jean de Chalvet de Rochemonteix \r\n        \"","divers":"Vestiges du fort de Léotoing, château de Vernassal et maison forte de Faveyrolles-Boinsac.","gps":"","images":["../image/image_43/43_Leotoing_1.jpg","../image/image_43/43_Leotoing_2.jpg","../image/image_43/43_Leotoing_3.jpg","../image/image_43/43_Leotoing_4.jpg","../image/image_43/43_Leotoing_5.jpg","../image/image_43/43_Leotoing_6.jpg","../image/image_43/43_Leotoing_7.jpg","../image/image_43/43_Leotoing_8.jpg","../image/image_43/43_Leotoing_9.jpg"]},"Consult_chateau_formulairea0f2":{"id":"Consult_chateau_formulairea0f2","dept":"43","canton":"Brioude","commune":"St-Beauzire","nom":"Lespinasse","type":"Château","periode":"XII-XIV","histoire":"LESPINASSE,  en 1280 villa Spinatia fief de la famille de Lespinasse et au début de la guerre de cent ans qu'Erard I de Lespinasse chevalier et seigneur de Changy, nommé capitaine des montagnes d'Auvergne fait construire le château, au service du duc Louis II de Bourbon, son petit fils épouse vers 1430 Jeanne d'Auvergne issue des dauphins d'Auvergne agrandissent le château et par alliance de Claude, fille et héritière de Poncet de Lespinasse épouse en 1501 Arnaud de Langeac, lui apportent le château en dot, puis par autres alliances passera aux Polignac, aux Chabannes de la Palice et aux de la Rochefoucauld qui s'en sépare en 1620 au profit de Mas de Lodines qui le gardera que six ans pour le vendre à Pierre Arnauld commissaire de la marine royale, ce dernier apportera de diverses transformations à ce bâtiment tel que les meurtrières remplacés par des fenêtres et portes fenêtres donnant sur la terrasse. A la mort  en 1737 d'Etienne Arnauld  de l'Espinasse le château revient à l'un de ses petits-neveux Pierre-Joseph de Gueyffier de Longpré lieutenant au régiment de Bresse. A la Révolution le château perd ses éléments se rapportant à la période féodale sans autre dommage, il passe au XIXe siècle aux Boisset de Torsiac descendants des Gueffier et ensuite acquis par le comte de Froidefond de Florian ancêtre des Brye de Vertamy.   Il est aujourd'hui la propriété de la famille Berchebru de Foucaud, et reste ouvert aux visites publiques.        BOSBOMPARENT,  château fort des XIII-XIVe siècles,  construction militaire, agrandie principalement au XVIIe siècle.  La commune possède un patrimoine important notamment  avec ses trois châteaux,  château de la Chomette privé, les de Faugères détiennent le château de 1480 jusquau XVII siècles.          \r\nChâteau de Vazeillette, et de Baissat.","architecture":"Lespinasse,  c'est une construction militaire datant des XIVe et XVe siècles, agrandie principalement au XVIIe siècle, pour s'adapter à des fonctions exclusivement rurales. En 1358, construction du donjon crénelé  avec mâchicoulis  et tourelle d'escalier en encorbellement. Il forme le  fond de la cour intérieure dont  une rampe à  escalier irrégulier sur une montée assure la liaison avec  le chemin de ronde de la poterne d'entrée et avec un bâtiment ajouté au XVIe siècle avec échauguettes d'angle.   Cette construction centrale,  couronnée de créneaux,  avec  accès par porte en tiers point défendue par une herse est encadrée  de deux tours engagées  dont le crénelage a été également enlevé en 1793.  Le château se poursuit à  l'est par un corps de logis construit en 1450,  avec   deux tours défendues par des meurtrières. Leur intérieur est décoré au rez-de-chaussée de boiseries Louis XV. Un escalier en vis, prenant en face du donjon dans la cour   intérieure, donne accès à tout ce corps de bâtiment. La grande salle du 1er étage renferme une cheminée à hotte du XVe siècle, avec écusson sculpté aux armes d'Auvergne.  A l'intérieur,  certaines boiseries du XVIIIe siècle, d'un style très local, sont à retenir.                   Bosbomparent, il forme un bel ensemble de l'architecture des XIIIe siècle et XVe siècle, le château se dégrade au cours du XIXe siècle avant d'être incendié et abandonné jusqu'en 1976. L'édifice comprend un logis principal flanqué par une tourelle d'escalier sur cour  et une grosse tour d'angle. Le logis est relié par une enceinte à une tour carrée haute et presque aveugle. Donjon du XIIIe siècle. Il est le témoin vivant du patrimoine historique et architectural du brivadois. Visites des extérieurs, terrasse, découverte architecturale, tour de cantonnement, glacis fenêtres a croisées.","habitants":"Famille de Lespinasse\r\n        \"","divers":"Château de Lespinasse et de  Bosbomparent.","gps":"","images":["../image/image_43/43_Lespinasse_1.jpg","../image/image_43/43_Lespinasse_2.jpg","../image/image_43/43_Lespinasse_3.jpg","../image/image_43/43_Lespinasse_4.jpg","../image/image_43/43_Lespinasse_5.jpg","../image/image_43/43_Lespinasse_6.jpg","../image/image_43/43_Lespinasse_7.jpg","../image/image_43/43_Lespinasse_8.jpg","../image/image_43/43_Lespinasse_9.jpg"]},"Consult_chateau_formulaire10c3-2":{"id":"Consult_chateau_formulaire10c3-2","dept":"43","canton":"Auzon","commune":"Auzon","nom":"Lugeac_Lavaudieu","type":"Château","periode":"XVI","histoire":"LUGEAC,  De son vrai nom Charles Antoine de Guérin de Lugeac, il est de la descendance de Pierre III de Guérin qui tenait seigneurie à Pouzols dépendante de la baronnie dAllègre. Vers 1420, le fils de Pierre II, Guérin III, épouse Aymarde de Posterle qui apporte en dot la seigneurie de Chambarel située dans la paroisse de Céaux dAllègre. Dotés du titre de  Seigneur de
