 Pouzols et de Chambarel, un descendant de la famille, François de Guérin épouse le en mai 1548 à Montferrand, Michelle de Dorette, fille dAntoine de Dorette, alors puissant baron de Lugeac. Par une transaction  en juillet 1577, la terre de Lugeac, alors qualifiée de baronnie et la majeure partie du bourg de Lavaudieu passe de la maison de Dorette à celle de Guérin ces derniers prennent alors le titre de baron et fixent leur demeure en ce lieu. En 1715, Gilbert-Agathange de Guérin de Lugeac épouse Antoinette de Clugny dune famille de Bourgogne. Du couple naissent six enfants dont deux décèdent en bas âge: Charles-Antoine né à Lugeac le 25 mai 1720 son fils Charles-Adrien embrasse une carrière de militaire. Entré à lÉcurie du roi en 1735, Lugeac devient lieutenant en second au régiment du roi le 12 juillet 1737 et obtient une lieutenance le 17 août 1738. qui ne manque pas dambition, cherche à se sortir du rang, de retour de la campagne des Frandres, Lugeac sinstalle à Versailles à la demande du roi. Il épousera Jeanne-Charlotte-Victoire-Elisabeth de Baschi. En  1763, Charles-Antoine devient lieutenant général et entre dans le gouvernement de Toul. Le marquis acquiert la baronnie de Tilly, comprenant Saint-Fargeau et Maison Rouge. Le  beau Lugeac  séteint au château de Coudray le 2 novembre 1782 alors âgé de 62 ans,  Charles-Antoine de Guérin a été le dernier seigneur.","architecture":"Le château,  navait gardé que son caractère dancienne forteresse mais il est encore une preuve visible de son ancienne noblesse. Situé sur un rocher escarpé, il domine toute la plaine. Ceint, autrefois, dune double de murailles élevées, il était à labri des attaques ennemies. En 1789, les bâtiments sont en ruines et les révolutionnaires nauront aucune difficulté à les abattre après avoir tombé le clocher de Lavaudieu. Aujourd'hui le corps de logis rectangulaire à cinq travées de deux niveaux et attiques  avec deux tourelles en toitures en poivrières sur angle de la façade.","habitants":"Gilbert Agathange de Guérin de Lugeac\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Lavaudieu","gps":"","images":["../image/image_43/43_Lugeac_Lavaudieu_1.jpg","../image/image_43/43_Lugeac_Lavaudieu_2.jpg"]},"Consult_chateau_formulaire9b14":{"id":"Consult_chateau_formulaire9b14","dept":"43","canton":"Montfaucon-en-Velay","commune":"Montregard","nom":"Marcoux","type":"Maison forte","periode":"XVI","histoire":"MARCOUX, ancienne demeure de Louise de Romezin, protestante convertie au catholicisme par Jean-François-Régis,  Aujourd'hui, le château entièrement rénové par l'association de Romazin. Dans cette catégorie se retrouvent quelques unes des plus importantes familles citées à diverses reprises en liaison avec le lieu et ses habitants. Les de  Banne de  Boissy, les Figon, les Fraix, les Lagrevol,  les Largier de Chaillans,  les Le More,  selon Jourda de Vaux, un certain André d'Escoffier d'Armand originaire de Chanéac, au pied du Mézenc serait entré en possession de Marcoux.","architecture":"Situé en pleine campagne, le château de Marcoux est à la limite de l'Ardèche et de la Haute-Loire, à quelques kilomètres de Saint-Bonnet le Froid. Aujourd'hui, le Château de Marcoux dresse fièrement ses tours, dans son cirque de bois, de coteaux, et de vallons. Pour vous accueillir dans ses murs plusieurs associations de salles sont possibles, la salle de la Cheminée, la salle du XIXe siècle, vieille demeure du XVIe siècle est loué régulièrement pour des mariages.","habitants":"André d'Escoffier d'Armand\r\n        \"","divers":"Manoir de Marcoux","gps":"","images":["../image/image_43/43_Marcoux_1.jpg","../image/image_43/43_Marcoux_2.jpg","../image/image_43/43_Marcoux_3.jpg"]},"Consult_chateau_formulaireebe2":{"id":"Consult_chateau_formulaireebe2","dept":"43","canton":"Monastier-sur-Gazeille","commune":"Monastier-sur-Gazeille","nom":"Monastier","type":"Château","periode":"XIV","histoire":"MONASTIER, au XIVe siècle,  les abbés du Monastier durent assurer leur sécurité  en faisant construire en 1364  le château abbatial par l'abbé Jacques de Causan qui disparait en 1525.  Le château actuel fut reconstruit au XVIe siècle sur l'emplacement de l'ancien et servit de demeure pendant 130 ans à la puissante famille des Sennecterre (Saint-Nectaire) qui fournit plusieurs abbés. Il abrite aujourd'hui un musée et l'école de musique intercommunale. Les tours furent arasées entre 1782 et 1786 pour éviter de les réparer sur demande de monsieur Lefranc de Pompignan évêque de Vienne. La commune en fit acquisition après la Révolution pour en faire une école, aujourd'hui musée.                       A quelques kilomètres au nord-est le château de Valette, l'édifice appartient à la vague de constructions de maisons fortes dans le Velay  dans la seconde  moitié du XVIe siècle. Les troubles dus aux pillards et aux troupes militaires organisées entraînent le développement d'une architecture proche des forts médiévaux, avec logis  de plan massé  flanqué de deux tours rondes intégrant un massif  plus élevé. L'évolution des armements est prise en compte avec la présence de canonnières de différents modèles.","architecture":"Le Monastier étant une ville fortifiée, un donjon a dû exister très tôt. Après l'occupation du Monastier par les anglais au XIVe siècle, un premier château abbatial vaste quadrilatère flanqués de tours rondes à ses angles fut construit puis incendié pendant les guerres de religion.  dont les vestiges ne représentent que la base d'un édifice à l'origine plus élevé, et dénaturé par des percements. Cette décision suivit le siège du Monastier ravagé par les routiers en 1361. Le château resta sans modification jusqu'au milieu du XVIe siècle. La porte de la tourelle d'escalier  gothique et Renaissance. Vers 1550 des modifications furent apportées à la tour d'entrée, dans les salles du rez de chaussée et les fenêtres  avec leur encadrement mouluré  sur colonnettes prismatiques, transformèrent la forteresse en une habitation  plus confortable. A l'intérieur, une cheminée et deux salles voûtées d'ogives sont les seuls vestiges intéressants. Les tours furent arasées entre 1782 et 1786 pour éviter de les réparer sur demande de monsieur Lefranc de Pompignan évêque de Vienne.","habitants":"Famille des Sennecterre\r\n        \"","divers":"Château de Monastier et de Valette à Chadron","gps":"","images":["../image/image_43/43_Monastier_1.jpg","../image/image_43/43_Monastier_2.jpg","../image/image_43/43_Monastier_3.jpg","../image/image_43/43_Monastier_4.jpg","../image/image_43/43_Monastier_5.jpg","../image/image_43/43_Monastier_6.jpg","../image/image_43/43_Monastier_7.jpg"]},"Consult_chateau_formulaired29a":{"id":"Consult_chateau_formulaired29a","dept":"43","canton":"Monistrol-sur-Loire","commune":"Monistrol-sur-Loire","nom":"Monistrol","type":"Château","periode":"XVII","histoire":"CHAMBON   (Voir Article)                                                         FLACHAT, c'est un manoir antique dont on ne peut préciser exactement l'origine. Quatre familles célèbres se sont succéder dans ce château, les de Flachat, les de Béget, les Charbonnel, et enfin les Néron-Bancel  depuis le XIXe siècle.\r\nFOLETIER,  il est la résidence de la famille Jourda de Vaux. A la mort de Jean-François Jourda de Vaux de Foletier, le château fut vendu aux enchères. Depuis la Révolution, plusieurs propriétaires s'y sont succédés avant qu'il ne revienne à nouveau dans la famille de Vaux.                                                                                 MARTINAS, il est situé sur la route d'Aurec. L'histoire des maîtres de Martinas semble devoir remonter au début du XIVe siècle. Parmi les résidents du château, on peut notamment citer les seigneurs Baile, les seigneurs de Clavières, la famille Néron, et André Néron-Bancel maire de Monistrol de 1931 à 1939 et de 1940 à 1944.\r\nAutre château MONTBARNIER  Messieurs Alain Ducasse et Yves Thuriès  l'utilise comme école supérieur de la pâtisserie.","architecture":"Chambon,  château reconstruit en 1930 avec les pierres du château d'origine, dans un style médiéval et partiellement fortifié. voir article.                                                                               Flachat;   Corps de logis carré à deux niveaux flanqué d'une tour ronde sur un angle. Remanié au cours des siècles, le château ne manque pas d'allure, avec sa tour pointue coiffée de tuilettes bleutées et sa large façade. Un escalier à vis conduit à l'emplacement d'un ancien poste de garde aux meurtrières soigneusement conservées d'où le regard balaie toute la plaine de Bas en Basset et les monts de la Madeleine.                                  Foletier, Erigé dès le XVe siècle, il fut plusieurs fois remanié.  Les multiples restaurations dont il fut l'objet aux cours des siècles ont su lui conférer ce cachet féodal qui rappelle les rigueurs des temps Moyenâgeux.                                                                            Martinas, donjon à trois niveaux sur le côté flanqué d'échauguettes, accolé également au corps de logis à deux niveaux avec tourelles en façade plein cintre et d'une échauguette carrée en encorbellement sur angles;  la demeure ne manque ni d'élégance, ni de cachet, avec ses baies multiples, ses nombreuses et opulentes poivrières qui descendent jusqu'au 1er étage, et dont les cônes effilés s'élancent au-dessus des arbres du parc.","habitants":"Seigneur locaux\r\n        \"","divers":"Château  de Monistrol de Foletier de Flaclat et de Martinas","gps":"","images":["../image/image_43/43_Monistrol_1.jpg","../image/image_43/43_Monistrol_2.jpg","../image/image_43/43_Monistrol_3.jpg","../image/image_43/43_Monistrol_4.jpg","../image/image_43/43_Monistrol_5.jpg","../image/image_43/43_Monistrol_6.jpg","../image/image_43/43_Monistrol_7.jpg","../image/image_43/43_Monistrol_8.jpg"]},"Consult_chateau_formulaire611e":{"id":"Consult_chateau_formulaire611e","dept":"43","canton":"Monistrol-sur-Loire","commune":"Monistrol-sur-Loire","nom":"Monistrol_Eveques","type":"Château","periode":"XIV-XVII","histoire":"MONISTROL, EVEQUES,  le château et la ville de Monistrol appartenaient aux évêques du Puy, Guillaume de la Roue, en fait acquisition en 1270. le seigneur de St Didier le vendit à l'évêque du Puy qui devint aussi seigneur de Monistrol.  Les évêques du XIVe siècle ne tardèrent pas à se rapprocher de la ville en construisant un château neuf, qui sest développé au fil du temps. Avec la fin des guerres de religions, le château devient une  maison de plaisance, constamment embellie,  Au XVIIe siècle, l'évêque Armand de Béthune entreprit d'y construire de nouveaux bâtiments et un large escalier de pierres de taille.   Antoine de Sénecterre (1561-1593), évêque du Puy, restaure le château et protège la ville durant les guerres de religion. Armand II de Béthune (1635-1703), neveu de Sully, est nommé en 1661 évêque du Puy. Amoureux des lieux, il donne au château et à son parc un visage classique. Le maréchal de Jourda de Vaux (1703- 1787), vainqueur et gouverneur de la Corse, fréquente l'école de Monistrol et le château de Foletier, une des demeures familiales. L'historien érudit Augustin Simon Irailh (1717-1794),  Marie-Joseph de Galard de Terraube (1774-1802) est le dernier seigneur de Monistrol. Homme de cour, fidèle à Louis XVI, il refuse la constitution civile du clergé et se réfugie dans la cité avant d'émigrer. Le conventionnel Bonet de Treyches (1757-1828) est juge de paix à Monistrol. Après cinq siècles, en 1791, le château et son parc sont vendus aux enchères comme bien national. Armand de Charbonnel (1802-1891), né à Monistrol, est le premier évêque de Toronto (Canada), puis grand prédicateur capucin. La commune  depuis 1811, est désormais responsable de la totalité du château.","architecture":"Château des Evêques mentionné dans les textes à partir du XIIIe siècle, mais existant sans doute avant.  En 1448, l'évêque Jean de Bourbon y fait construire une grosse tour, amputée de 17 mètres à la Révolution, selon la tradition. Les évêques du Puy y fixent leur résidence d'été au XVIIe. Monseigneur de Béthune fait apporter au château de  nombreux embellissements . Ces éléments ont disparu à partir de 1793.\r\n Le château apparaît comme un vaste quadrilatère encadrant une cour intérieure,  dont l'intérêt se marque par la  façade avec ses tours massives, le corps de logis relie les deux tours, ajouté dans son état actuel au XVIIe  siècle. De la même époque date la galerie méridionale,  le grand escalier avec sa rampe en fer forgé, laquelle  semble dater du XVIIIe siècle. Le donjon, ancien corps de garde de la porte de l'Arbret, est un des derniers vestiges du mur de la  ville, chargé de protéger certains quartiers comme celui du château, aujourd'hui très dégradé. Malgré tout, de nombreux efforts sont entrepris pour mettre en valeur ce patrimoine.        Plusieurs châteaux sont situés dans la commune: château du Chambon, ruiné (reste la tour),du Flachat. de Martinas,  de Foletier, qui abrite chaque été un festival de piano, château du Betz de la famille de Charbonnel  et château de Paulin, ruiné. Voir article Monistrol châteaux.","habitants":"Guillaume de la Roue\"","divers":"Château des Evèques à Monistrol et donjon","gps":"","images":["../image/image_43/43_Monistrol_Eveques_1.jpg","../image/image_43/43_Monistrol_Eveques_2.jpg","../image/image_43/43_Monistrol_Eveques_3.jpg","../image/image_43/43_Monistrol_Eveques_4.jpg","../image/image_43/43_Monistrol_Eveques_5.jpg","../image/image_43/43_Monistrol_Eveques_6.jpg","../image/image_43/43_Monistrol_Eveques_7.jpg"]},"Consult_chateau_formulairea6a8":{"id":"Consult_chateau_formulairea6a8","dept":"43","canton":"Le Puy-en-Velay","commune":"Le Puy-en-Velay","nom":"Mons_le_Puy","type":"Château","periode":"XVI","histoire":"MONS, cité  en 1299, en 1331, le jour de la fête de Saint Mathieu, Armand, vicomte de Polignac, chevalier, Antoine II de la Tour Saint-Vidal, possédait une assise territoriale importante en Velay avec des seigneuries comme Saint-Vidal, St Quentin, Mons, Goudet,  en 1342 il quitte le château de Mons et le revend à Gilbert de St-Germain Laprade, seigneur du dit lieu et de Mons. La veille de la trinité 1594, vint le duc de Ventadour, avec son armée, à la réquisition du dit Chaste et sa femme la vicomtesse. Ils sont venus loger à Brives, à Villeneuve et au château de Mons qui leur fut rendu par Madame de St Vidal.  Enfin le 5 avril 1596 la paix devient définitive au Puy. Vente faite par Pierre Morel à Jean Philibert de sa métairie de Mons en 1614. en 1637 vente de la terre et seigneurie de Mons par Pierre Antoine de la tour de Rochefort, baron de St-Vidal.  acquisition faite par noble Hugues Spert , Seigneur de Volhac Hugues Spert mourait le 9 mars 1650, Il laissa donc sa fille unique, Marie Isabeau, qui plaisait si fort à Charles de Molette que celui-ci, seigneur de Morangiers, premier consul du Puy,  acquisition de la métairie de Mons par le sieur Louis Perbet, maître apothicaire (1664-1723).  En 1759, le château de Mons devint propriété du séminaire du Puy et ce jusquà la Révolution,  Il fut acquis par le grand séminaire du Puy comme maison de vacances et de repos. Au moment de l'exil de 1880, le château fut acquis par deux familles amies, les Verac et les Sinéty qui le laissèrent à la disposition du diocèse et de la Compagnie.   Maison de retraite Aujourd'hui fermé racheté par un particulier.","architecture":"Mons, tour principale du XVe siècle. Travaux de réaménagement dans la seconde partie du XVIe siècle. Château dévasté par un incendie en 1683. Portail et oratoire du XVIIIe siècle. Au XIXe siècle, installation des Jésuites de Vals, qui y réalisent de nombreux aménagements : construction de l'aile des dortoirs, de la grande chapelle, de la galerie à étages, l'aile sud rajoutée y compris la chapelle, l'exèdre et l'oratoire du parc.","habitants":"Gilbert de St-Germain Laprade\r\n        \"","divers":"Château de Mons","gps":"","images":["../image/image_43/43_Mons_le_Puy_1.jpg","../image/image_43/43_Mons_le_Puy_2.jpg","../image/image_43/43_Mons_le_Puy_3.jpg"]},"Consult_chateau_formulaire58c6":{"id":"Consult_chateau_formulaire58c6","dept":"43","canton":"Blesle","commune":"Autrac","nom":"Montmoirat","type":"Maison forte","periode":"XVI","histoire":"MONTMOIRAT, fut élevé par Jacques du Prat qui acheta la terre après le décès de Jacques-Jérôme de la Volpilière, seigneur de Montmoirat, le premier décembre 1635, en 1669 lorsque son fils, Jean du Prat lègue le domaine à son cousin François de Douhet, Montmoirat est inachevé comme l'attestent les pierres d'attente, les deux granges étables alignées  datent vraisemblablement du XVIIe siècle, les autres bâtiments agricoles ont été bâtis plus tard  au XVIIIe siècle. Encadrement des portes et des fenêtres en lave, lauze de Gneiss sur le château.","architecture":"Le site de Montmoirat existait au XIIIe siècle. Le début de la construction du château actuel remonte à 1635. Le domaine est constitué d'une maison-forte entourée de ses dépendances disposées autour d'une cour non close. Du côté nord, deux bâtiments accolés, à fonction de grange et d'étable. Du côté Est, une bergerie accolée à une maison d'habitation. Ce château forme un ensemble intéressant d'architecture rurale du XVIIe siècle.","habitants":"Jacques-Jérôme de la Volpilière\r\n        \"","divers":"Château de Montmoirat","gps":"","images":["../image/image_43/43_Montmoirat_1.jpg"]},"Consult_chateau_formulaire25b4":{"id":"Consult_chateau_formulaire25b4","dept":"43","canton":"Saugues","commune":"Saugues","nom":"Ombret","type":"Château","periode":"XVI","histoire":"OMBRET, la construction du château médiéval revient aux Barons de Mercur, édifié à la fin du XVIe siècle par la famille de Morangies, le château dOmbret apparaît comme le prototype même dun grand nombre de maisons.  Ancienne place forte du Gévaudan, elle s'est développée dès le XIIe siècle sous l'autorité des évêques de Mende et des seigneurs de Mercur. Les premiers titulaires de la seigneurie de Thoras furent les Douchanez. Vers 1230, à la suite dun conflit armé avec lévêque-comte de Mende, Pons de Douchanez est obligé de reconnaître la suzeraineté de Béraud V de Mercoeur. Avant de séteindre sans descendance, le dernier des Douchanez lègue ses biens à Astorg de Peyre. Vers 1420, Thoras entre par mariage dans la famille dApchier qui procède vraisemblablement à lédification du château. Les modernisations successives de la ville ont effacé les traces des fortifications médiévales, seule subsiste une imposante tour du XIIIe siècle, le centre historique fut dévasté par un incendie en 1788.","architecture":"Ombret  édifié à la fin du XVIe siècle, ce château est une construction entièrement médiéval, assez caractéristique de la région par la sobriété de son architecture. Il est constitué d'un bâtiment de plan rectangulaire flanqué d'une grosse tour quadrangulaire à deux étages habitables,  couronné de mâchicoulis et de trois échauguettes d'angles et une tour ronde.  La défense est assurée par un chemin de ronde à mâchicoulis couronnant lensemble du bâtiment.  Des bouches à feu protègent lentrée et la tour descalier  La plupart des baies à meneaux et croisées paraissent d'époque moderne. La porte principale de la façade Est est de style première Renaissance.                                                  Le château de Beauregard bâti au début du XVIe siècle sapparente à une maison de campagne installé au cur de jardins en terrasse, bordée par une allée darbres qui mène à une chapelle.","habitants":"Famille de Morangies\r\n        \"","divers":"Château d'Ombret et de Beauregard à Saugues","gps":"","images":["../image/image_43/43_Ombret_1.jpg","../image/image_43/43_Ombret_2.jpg","../image/image_43/43_Ombret_3.jpg","../image/image_43/43_Ombret_4.jpg","../image/image_43/43_Ombret_5.jpg"]},"Consult_chateau_formulaire0173":{"id":"Consult_chateau_formulaire0173","dept":"43","canton":"Brioude","commune":"Paulhac","nom":"Paulhac","type":"Château","periode":"XII-XIX","histoire":"PAULHAC, dès le XIIe siècle,  à la famille de Paulhac, Bertrand Ebrard, seigneur de Paulhac, passe à Hérald II de Paulhac chevalier,en 1259.  Smaragde de Paulhac Chabreugheol, passe par alliance, en 1312 à Pierre II Bompar, dit Bayard.  Catherine de Lastic,passe  par alliance en 1328, à Raymond de Monstuéjouls. Marie de Monstuéjouls, transmet par alliance, en 1350, à Bertrand de Rochefort. Dauphine de Rochefort d'Aurouze, toujours par alliance, en 1355, à Henri de Courcelles,  leur fils, Louis de Courcelles, chevalier, marié en 1387, avec Hélips d'Aurillac,  Louis III de Courcelles, marié, en 1461, avec Isabeau de Langeac.  Il mourut  en 1470, laissant le Breuil et Paulhac à sa femme qui épousa en 1472, Jehan d'Urfé, dit Paillard, et vendit, en 1473 la seigneurie de Paulhac à Roffet II de Balsac, chevalier, Passe à son fils, Roffet III de Balsac, mort sans postérité en 1489, laissant Paulhac à son oncle, Robert de Balsac,  marié en 1474, avec Annette de Castelnau. leur fils, Pierre de Balsac, marié, en 1499, avec Anne Mallet de Graville. Jeanne de Balsac, leur fille, dame de Paulhac, le porte par mariage, en 1582, à Claude d'Urfé. Louise d'Urfé passe par alliance en 1553, à Gaspard de Montmorin, Catherine de Montmorin, leur deuxième fille, dame de Paulhac, Balsac et Rilhac, par alliance, en 1580, à Gilbert de Saint-Aignan, Gilberte de Saint-Aignan, leur fille, les porte par alliance, en 1609, à Jacques de Brezons de Neyrebrousse, son fils héritier universel Charles-Jacques-Joseph de Cassagnes de Beaufort. son fils Claude-Jacques qui, en 1670, avait épousé Jeanne d'Aurelle de Colombines laissa Alexandre de Cassagnes de Beaufort, chevalier, marquis de Miramon, marié le en 1725, avec Esther de la Tour du Pin-Gouvernet, dont Jean-Gaspard de Cassagnes-Beaufort,  reste dans la famille de Cassagnes de Miramon jusquen lan 2001. Tous les hommes sont chevalier et seigneur de Paulhac et autres lieux non cités. A quelques kilomètre au sud le château de Chabreuges dont les seigneuries devait être identique.","architecture":"Paulhac  du Moyen-Âge  Un des plus beaux d'Auvergne, il est mentionné au Xe siècle. Sur un promontoire rocheux entouré d'un rempart, il domine tout le Brivadois à partir d'un donjon circulaire du XIIe ou XIIIe siècle, construction au XVe siècle d'un château articulé en deux ailes perpendiculaires. Aménagements et décors des XVIIe-XVIIIe siècles. Remaniement. A la fin du XIXe  pour rendre l'édifice plus confortable  tout en accentuant son caractère médiéval  par un style néo-gothique. Travaux effectués par l'architecte Honoré Vianne. \r\n Chabreuges, le château fut édifié au XIVe siècle ou XVe siècle , logis quadrangulaire  délimité par une courtine reliant un logis au sud flanqué de quatre tours d'angle et d'un avant-corps central,  tours rondes posées en diagonale du XIVe siècle, restauré au XIXe siècle,   un donjon circulaire au nord-ouest et   une autre tour circulaire au nord-est.","habitants":"Hérald II de Paulhac\r\n        \"","divers":"Château de Paulhac.","gps":"","images":["../image/image_43/43_Paulhac_1.jpg","../image/image_43/43_Paulhac_2.jpg","../image/image_43/43_Paulhac_3.jpg","../image/image_43/43_Paulhac_4.jpg"]},"Consult_chateau_formulaire4b9b":{"id":"Consult_chateau_formulaire4b9b","dept":"43","canton":"Le Puy-en-Velay","commune":"Coubon","nom":"Poinsac","type":"Château","periode":"XIV","histoire":"POINSAC; fief des vicomtes de Polignac, les Falcon branche cadette  des seigneurs d'Olliergues, la façade ouest a été reconstruite dans le goût de lépoque par Jacques de Poinsac qui fréquentait alors la cour de Louis XV.  Passa aux Dalmas qui lont occupé pendant 800 ans avant de le vendre à la veille de la Révolution.  La dernière des Falcon épousa Dandonnet Erailh   dernier  seigneur des Poinsac, le château fut cédé à un neveu au XVIIIe siècle  Scipion de la famille des Vocance, lequel le vendit en 1763 aux Veyrac seigneur de la Valette, la dernière des Veyrac la marquise de Boysseult le légua à sa petite fille Renée de Boysseult  comtesse de la Batut propriétaire actuelle du château.       \r\nLATOUR-DANIEL,  à 1 km au nord de Coubon; son nom vient de « Turris Neillis » ou Tour Noire, Voir article sur Coubon.        VOLHAC, le « fortalicium » de Volhac est cité dès 1320 ; (Voir article sur Volhac).\r\nMaison de Charentus : dans le hameau de Charentus, citée dès le XVIe siècle ; tour descalier à colimaçon, propriété de la famille Pascal.","architecture":"Château de Poinsac au Sud-Ouest sur les flancs de lArgentaine dominant Coubon; le château a fière allure. Son donjon carré fut construit en 1389, les parties les plus anciennes datent du XIIe siècle, donjon carré, flanqué de grosses tours rondes. Sous Louis XIII, le château est brûlé en représailles au ralliement du seigneur de Poinsac à la cause du duc d'Orléans. Par la suite,  le château est restauré au XVIIIe siècle, les travaux extérieurs affectent la façade occidentale, et à l'intérieur mise en place de boiseries et  de stucs de style Louis XIV.  Nouveaux aménagements au début  du XXe siècle. Dans le donjon, une salle conserve   un plafond peint du XVe siècle. Au-dessus, un étage de défense et un chemin de ronde sur mâchicoulis en voûtains et échauguettes. Une salle a été transformée à la fin du XIXe siècle, mais conserve sa cheminée du XVe siècle avec crosses   et sommiers.","habitants":"Vicomtes de Polignac\r\n        \"","divers":"Château de Poinsac","gps":"","images":["../image/image_43/43_Poinsac_1.jpg","../image/image_43/43_Poinsac_2.jpg","../image/image_43/43_Poinsac_3.jpg","../image/image_43/43_Poinsac_4.jpg"]},"Consult_chateau_formulaire2f1f":{"id":"Consult_chateau_formulaire2f1f","dept":"43","canton":"Le Puy-en-Velay","commune":"Polignac","nom":"Polignac","type":"Vestiges","periode":"XI-XVI","histoire":"POLIGNAC, Armand de Polignac, en 886, les vicomtes héréditaires du Velay en prirent le nom à partir du XIe siècle et en firent  leur résidence jusquau début du XVIIe siècle, date à laquelle ils lui préfèrent le château de La Voûte Polignac.  Surnommés  les rois des montagnes, les Polignac se sont opposés fréquemment aux évêques du Puy  pour la perception du péage sur la route du pèlerinage à Notre-Dame du Puy-en-Velay,  de Pons II de Polignac (1055-1112) reste  dans cette famille jusqu'en  1533, par François-Armand XVI,  surnommé le grand Justicier en raison de son grand nombre de procès, reçut François 1er en route vers Marseille, avant son passage au Puy ; il suivra le roi contre Charles-Quint.  Lors des guerres de religion, les Polignac prirent le parti dHenri IV, faisant du château le bastion des royalistes face au Puy ligueur. Philiberte de Clermont-Tallard, la 2ème épouse du grand justicier, vicomtesse et douairière de Polignac, répara  le donjon de 1565 à 1566 et  lengloba dans  un glacis. Melchior (1661-1742), petit-fils de François-Armand, fut un grand diplomate, archevêque dAuch et académicien au fauteuil de Bossuet.  Son petit neveu Jules François (1745-1817) fut marié à Yolande de Polastron, qui fut gouvernante des enfants de France,  le couple émigrera en Ukraine et nen revint pas. Leur fils aîné, Armand devient duc et pair à la mort de son père. \r\nCHEYRAC;  le château porte le nom  de celui d'un petit village entre la Loire et la forteresse de Polignac, demeure seigneuriale Renaissance était la propriété d'Antoine Fornel.","architecture":"la forteresse de Polignac occupe un énorme rocher volcanique , à 700 m daltitude, de couleur rouille  caractéristique. La plateforme est  dotée sur son pourtour dune enceinte crénelée, Cantonnée de quelques tours.  Côté nord, à lorigine défendu par une triple ligne de remparts et 6 portes. Il ne reste que des vestiges des 3 premières. La quatrième, défendue à sa gauche par la  tour de la Géhenne, du XIIIe siècle, conserve un pont-levis, une herse et une grande arcade en avancée qui cache un  assommoir. Une autre est défendue par des bouches à feu.   Flanqué dune tourelle abritant un escalier en vis, le donjon surplombe labîme du haut de ses 32 mètres. La base des murs est fortement talutée. Sa porte dentrée, basse et étroite, couverte par un arc brisé, souvre à lest au rez-de-chaussée. On accède, par un passage très étroit le long du rempart. La partie supérieure de cette tour-résidence  est divisée par des planchers, en 3 étages, chacun doté  de fenêtres et dune belle cheminée en pierre. Le couronnement (voûte et mâchicoulis) fut rétabli de 1893 à 1897. Auprès du donjon, les restes dun logis seigneurial du XVe siècle, et dun autre logis appuyé au rempart. Dans la cour qui les sépare, un puits, fouillé au XIXe, profond de 83,50 m.                                                                                   Cheyrac, habitation  simple et massive du XVIe siècle, l'édifice était la demeure de l'intendant de Polignac dont l'importante forteresse s'aperçoit à quelques kilomètres. Corps de logis rectangulaire flanquée de deux tours inégales à largeurs différentes  ainsi que le vieux escalier qui le traverse sur son axe principal sous une travée surélevée plein centre, un escalier central rampe sur rampe donnant accès à des pièces placées de part et d'autre.","habitants":"Armand de Polignac\r\n        \"","divers":"Château de Polignac et de Cheyrac.","gps":"","images":["../image/image_43/43_Polignac_1.jpg","../image/image_43/43_Polignac_2.jpg","../image/image_43/43_Polignac_3.jpg","../image/image_43/43_Polignac_4.jpg","../image/image_43/43_Polignac_5.jpg","../image/image_43/43_Polignac_6.jpg","../image/image_43/43_Polignac_7.jpg","../image/image_43/43_Polignac_8.jpg","../image/image_43/43_Polignac_9.jpg"]},"Consult_chateau_formulaire4c97":{"id":"Consult_chateau_formulaire4c97","dept":"43","canton":"Lavoûte-Chilhac","commune":"Chambon-sur-Lignon","nom":"Pont-de-Mars","type":"Château","periode":"XVI","histoire":"PONT-de-MARS,  sa noblesse remonte à l'année 1507 pour Régis Valette. puis à la famille  Pierre de Molin, seigneur du Pont-de-Mars  en Vivarais et du Chambon au diocèse du Puy, ce Pierre de Molin aurait été fils de Guillaume de Molin, seigneur du Pont-de-Mars, qui avait épousé en 1475 Alarie d'Arlempdes, à la fin du XVIIe siècle, les membres de cette famille ont abandonnés leur nom primitif pour ne plus s'appeler que du Pont puis du Pont de Ligonnès pour la branche aînée, et \"du Molin du Fraisse\" pour la branche cadette. Pierre de Molin a un fils Claude de Molin 1520-1547, seigneur du Pont-de-Mars, notaire royal, qui épouse Agnès Vialotte et qui poursuit la descendance.  La famille du Pont de Ligonnès a obtenu trois jugements de maintenue en la noblesse au XVIIe siècle. Le 4 janvier 1670 par l'intendant du Languedoc Claude Bazin de Bezons. Le 30 janvier 1698 par l'intendant du Languedoc Nicolas de Lamoignon. En 1754, par héritage de son oncle Jean-Baptiste de Roux de La Loubière, marquis de Paulhac, baron de Pomayrols, Jean-Baptiste du Pont prend le titre de marquis de Ligonnès et son fils, Charles-Gabriel du Pont, celui de comte de Ligonnès. La famille du Pont de Ligonnès (Dupont de Ligonnès depuis le XIXe siècle) est une famille noble française subsistante. Du Vivarais, elle s'est ensuite transplantée en Gévaudan. De cette famille sont issus des officiers dans les armées, un prélat de l'église catholique, des décorés de Saint-Louis et de la Légion d'honneur. En 1827, un du Pont de Ligonnès épouse une sur d'Alphonse de Lamartine.\r\nCette famille porte les titres de noblesse de marquis, comte et vicomte de Ligonnès.","architecture":"PONT-de-MARS, maison forte située au fond d'une vallée, n'était pas une bonne position de défense militaire. Avant 1583, l'édifice ne paraît pas avoir été une forteresse importante. Après les pillages   et les destructions  de Saint-Vidal en 1580, le seigneur du lieu Guilhot de Moll fit de nouvelles constructions un fossés côté ouest et en 1928  M. A. de Chalendar fit construire le château en utilisant les matériaux de l'ancien abandonné depuis 1848, la veille  tour et le mur d'enceinte en appareillée subsistent. Dans le voisinage la maison forte de Malleval qui a conservé la base de deux échauguettes d'angles.                                                             Tour Le château du Pont-de-Mars au Chambon-sur-Lignon, propriété des Molin du Pont du XVIe au XVIIIe siècle.","habitants":"Pierre de Molin\r\n        \"","divers":"Chäteau du pont de Mars et de Mallaval","gps":"","images":["../image/image_43/43_Pont_de_Mars_1.jpg","../image/image_43/43_Pont_de_Mars_2.jpg","../image/image_43/43_Pont_de_Mars_3.jpg","../image/image_43/43_Pont_de_Mars_4.jpg","../image/image_43/43_Pont_de_Mars_5.jpg"]},"Consult_chateau_formulairef958":{"id":"Consult_chateau_formulairef958","dept":"43","canton":"Pradelles","commune":"Pradelles","nom":"Pradelles","type":"Patrimoine","periode":"XVI","histoire":"PRADELLES, Jean Baudouin, l'un des premiers membres de l'Académie Française, est né à Pradelles en 1590. Jeanne La Verdette qui sauva la ville suite à la chute d'une pierre qui blessa le capitaine, c'est au portail de la Verdette que se déroula, le 10 mars 1588, l'assaut du capitaine huguenot Chambaud, le fait d'armes le plus connu et le plus légendaire de l'histoire de Pradelles. A la fin du XVIIIe siècle  André Bruno de Frévol de Lacoste, général de brigade, tué au siège de Saragosse.\r\nBouchareinc de Chaumeils de Lacoste de Louis Michel, né le 30 mai 1798 à Pradelles.\r\nGui de Mortessagnes,(1714-1796), né à Pradelles, est un frère cadet de Jean-Baptiste Boutavin de Mortessagnes qui fut curé de Pradelles durant une quarantaine d'années.                                 La tour appartenait au système de fortification de la ville.\r\n Elle porte le la famille de Rochely. Le titre de noblesse \"de Rochely\" fut acheté par les \"Johanny\" au cours du XVIIIe siècle, ainsi le fanion qui coiffe la tour porte les initiales \"JR\" comme \"Johanny de Rochely\".\r\nDans la commune la maison forte de Maziron. Patrimoine classé, étudié ou inscrit dit 'Manoir du Mazonric' à pradelles. L'édification du Mazonric correspond à la période d'expansion et de prospérité de la famille Belvezer, connue dès le XVe siècle pour tenir un rang distingué dans les montres et revues, et se signaler par le nombre de ses fondations pieuses et de ses riches alliances.","architecture":"Pradelles autrefois  entourée de remparts,  la porte de la Verdette construite au XIIIe siècle a conservé les corbeaux de pierre des mâchicoulis, les pierres primitives constituant l'escalier montant au rempart et une Vierge à l'Enfant.  l'édifice de l'époque Renaissance appelé château aussi maison de la famille Boutavin de Mortesagne, était compris dans les remparts. La tour de Rochely est très proche de la porte de la Verdette et devait être un de ses éléments de défense. La porte du Besset qui n'a conservé aucun appareil défensif était munie d'une herse dont les glissières sont encore bien visibles.\r\nLa maison Templier ancienne demeure des Boutavin de Mortesagne, la maison Frévol, la maison aux arcades construite au XVIe siècle par Antoine Vigne, sont place de la Halle et forment un ensemble urbain construit du XVe au XVIIe siècle. \r\nLa façade ornée de deux portes gothiques de la maison Thomas, en contrebas de l'église paroissiale, font penser à une construction à partir de vestiges de l'ancien prieuré de Pradelles dépendant de la Chaise-Dieu. \r\nLe manoir du Mazonric daté de 1572 possède une tour d'escalier sur un corps de logis rectangulaire. \r\nLe château du Mazigon daté de 1642 et son parc ont été inscrits aux monuments historiques le 10 novembre 1997.","habitants":"Jean-Baptiste Boutavin de Mortessagnes\r\n        \"","divers":"Patrimoine de Pradelles le château Maziron, tour Rochely, porte de la Verdette et de besset","gps":"","images":["../image/image_43/43_Pradelles_1.jpg","../image/image_43/43_Pradelles_2.jpg","../image/image_43/43_Pradelles_3.jpg","../image/image_43/43_Pradelles_4.jpg","../image/image_43/43_Pradelles_5.jpg","../image/image_43/43_Pradelles_6.jpg","../image/image_43/43_Pradelles_7.jpg","../image/image_43/43_Pradelles_8.jpg"]},"Consult_chateau_formulaire3252":{"id":"Consult_chateau_formulaire3252","dept":"43","canton":"Le Puy-en-Velay","commune":"Le Puy-en-Velay","nom":"Puy_en_Velay","type":"Patrimoine","periode":"XII","histoire":"PUY-en-VELAY, aux  évêques du Puy,  en 1142, Raymond II, comte de Tripoli (1137-1142), fils de Pons de Saint-Gilles, donne à l'évêque du Puy, Humbert d'Albon (1128-1144), tout ce qu'il possède dans le « comté des Vellaves ». C'est la première mention d'un comté du Velay. Jusque là on utilisait la formule « Pagus Vellaicus ». Le Velay était une partie de l'Auvergne. Ce document est transmis à Robert III qui est comte d'Auvergne et du Velay ils recevront notamment en 1213 lhommage pour la vicomté de Polignac, mais il ny a pas de preuve quils prirent le titre de comte du Velay avant 1405. Le Velay dépend du gouvernement royal de la généralité du Languedoc  ayant pour chef-lieu Montpellier, une sénéchaussée indépendante demeure au Puy jusquen 1789. À la Révolution, le Velay retrouva le nom du peuple Gaulois qui avait consacré à leur dieux ces lieux magnifiques, sous lEmpire, le département de la Haute-Loire avec Le Puy comme chef-lieu.\r\nDans la commune le château de Mons (voir article) la maison forte d'Espaly , d'Ebde et le château d'Ours.   Tour principale du XVe siècle. Travaux de réaménagement dans la seconde partie du XVIe siècle. Château dévasté par un incendie en 1683. Portail et oratoire du XVIIIe siècle. Au XIXe siècle, installation des Jésuites de Vals, qui y réalisent de nombreux aménagements, construction de l'aile des dortoirs, de la grande chapelle, de la galerie à étages. Au nord Ouest à Brive-Charensac le château FARNIER, maison forte construite au XVIe siècle par Pierre Farnier, marchand drapier et seigneur de Saint-Martin de Fugères.","architecture":"Commanderie du XIIIe siècle, La ville s'entoure de remparts entre 1220 et 1240 qui vont lui servir de limite jusqu'au XVIIIe siècle. La Tour Pannessac est l'un de ses vestiges. Elle a été classée Monument Historique fin XIXe siècle.  Le rocher Corneille avec la statue de Notre-Dame de France, de la plateforme on a une belle vue sur les toits rouges de la ville. Le rocher est surmonté d'une statue de la Vierge Marie, qui mesure plus de 16 mètres et pèse 110 tonnes, peinte en rouge. Elle fut érigée en 1860 avec la fonte du fer de 213 canons venant de la prise de Sébastopol en 1855 pendant la guerre de Crimée et donnés par Napoléon III. (Sculpteur : Jean Marie Bienaimé Bonnassieux ; fondeur : Prenat à Givors). Elle a été rénovée fin 2012, retrouvant sa couleur « rouge cuivrée datant de 1986.   Les hôtel de particuliers de Chaumeils, Fillière de Charrouihl, Girardin, Coubladour (gravure) Cambacérès,la Battut Mailhet de Vachères, de Marcelange, Miramon, Monteyremard, Pons des Ollières, Pradier d'Agrain,d la Prévôté,  Sanhard, Sénejol, Vinols, et la tour Pannesac à mâchicoulis le musée Crozatier                      Mons, Chantier en cours, les propriétaires ont commencés l'aménagement du bâtiment le plus récent du château dont la ruine était quasi totale il y a 4 ans à la suite de plusieurs vandalisme et incendie. Le travail le plus intéressant est pour l'instant celui de la réfection d'une vingtaine d'ouverture refaites à l'ancienne en 2013.                Farnier,  La propriété forme un  quadrilatère de bâtiments et de murs autour d'une cour intérieure. La partie Est du bâtiment sud a conservé sa voûte en berceau au rez de chaussée ainsi que la tourelle d'escalier centrale en vis, la façade sud  a conservé une échauguette d'angle  ainsi qu'une bretèche. Le bâtiment est-ouest  a perdu une tour circulaire au XXe siècle.","habitants":"Adhémar de Monteil, Pierre Farnier\r\n        \"","divers":"Patrimoine du Puy en Velay château de Bonnasou, de Borne, de Bornette, de Jalavoux, du Fieu, de l'Ours et tour de Pannessac.","gps":"","images":["../image/image_43/43_Puy_en_Velay_1.jpg","../image/image_43/43_Puy_en_Velay_2.jpg","../image/image_43/43_Puy_en_Velay_3.jpg","../image/image_43/43_Puy_en_Velay_4.jpg","../image/image_43/43_Puy_en_Velay_5.jpg","../image/image_43/43_Puy_en_Velay_6.jpg","../image/image_43/43_Puy_en_Velay_7.jpg","../image/image_43/43_Puy_en_Velay_8.jpg","../image/image_43/43_Puy_en_Velay_9.jpg"]},"Consult_chateau_formulaireef5d":{"id":"Consult_chateau_formulaireef5d","dept":"43","canton":"Auzon","commune":"Vergongheon","nom":"Rilhac","type":"Vestiges","periode":"XIII","histoire":"RILHAC, le nom de Rilhac est connue depuis le IXe siècle, avant que la maison forte féodale soit édifiée en marge de la cour. Au Xe siècle, le vicomte du Vellay Armand de Polignac et sa femme Berthilde de Chanteuge, également maître de la cour de Fontannes, profitent des revenues de cette terre pour lexercice de leur charge vicomtale.  Il faut attendre Le XIIIe siècle pour que le château et sa forteresse apparaissent clairement dans les textes comme un fief comtal. Il est dépendant du chapitre de Brioude et fut \"concédé\" aux d'Auzon. Il en est fait mention pour la première fois en 1206 par le comte de Clermont. Son histoire accompagne cette famille féodale qui tiendra le gros bourg et son château jusquà la fin du XIIIe siècle. Viendra la puissante famille de Montorrin qui avec les Polignac ensuite, hériteront de la châtellenie alzonienne et des hautes murailles de Rilhac.\r\n En 1729, les Chalet de Rochemonteix achètent Rilhac et le transmettent aux Domangeville. Cette dernière acquisition amènera le château à la ruine.                                                                          Les riches terriers du domaine regroupait Lubière, Bergoide, Ouillandre, Le Monteil, Pont-Servier.","architecture":"Les origines du fief de Rilhac demeurent assez obscures avant le XIIIe siècle. La villa surement antique, doit être rapprochée d'une ancienne dépendance du domaine fiscale de Lubières-Brassac, cependant, sans que cela ne soit prouvé par l'archéologie, quelques vestiges du donjon pourrait faire remonter sa construction aux Xe-XIe siècle et peuvent se rattacher à un premier état de construction.   Les vestiges de l'enceinte actuelle datent du XIIe-XIIIe siècle. Les fortifications et la basse-cour sont renforcées à la fin du Moyen-Age. Les matériaux de construction sont en partie composés de galets de l'Allier ainsi que de basalte. L'évolution des bouches à feu est typique de l'époque des guerres de religion.","habitants":"Famille de Montorrin \r\n        \"","divers":"Vestiges de Rilhac.","gps":"","images":["../image/image_43/43_Rilhac_1.jpg","../image/image_43/43_Rilhac_2.jpg","../image/image_43/43_Rilhac_3.jpg","../image/image_43/43_Rilhac_4.jpg"]},"Consult_chateau_formulaire5ba1":{"id":"Consult_chateau_formulaire5ba1","dept":"43","canton":"Vorey","commune":"Roche-en-Regnier","nom":"Roche_en_Regnier","type":"Vestiges","periode":"XII","histoire":"ROCHE-en-REGNIER, l'histoire du  village de la Roche prend le nom de son seigneur, Régnier, en 950. A cette époque le château n'est certainement qu'une construction en bois.  C'est au XIIIe siècle qu'est construit le donjon rond en pierre, dont l'accès se fait au premier étage alors que le rez-de-chaussé aveugle sert de réserve. Une enceinte contenait certainement plusieurs bâtiments et au moins une tour d'angle. Au court de ce siècle, le village connait une certaine prospérité économique qui aboutit en 1265 à une charte de franchise, réclamée par les habitants, et au rapprochement des grandes familles du Vivarois par les Roche-en Régnier.\r\nA la mort du dernier héritier des Régnier en 1340, c'est la puissante famille de Lévis qui récupère le château, étendant son domaine du Velay à la vallée du Rhône.\r\nAu XVe siècle Jean de Bourbon reçoit la forteresse en apanage et Roche devient l'une des 9 villes consulaires du Velay. Au XVIe siècle la seigneurie est confisquée par François Ier, puis rendue à la famille de Bourbon.\r\nLe château est en ruine au XVIIIe siècle mais le maréchal Noël Jourda de Vaux interdit aux villageois d'en prendre les pierres, chose qui se fait souvent à la sortie de la Révolution.","architecture":"Du château, édifié au XIIIe siècle sur un piton rocheux dominant le bourg, subsiste surtout, outre quelques murailles, le donjon circulaire, devenu lemblème de cette commune. Alors que cette tour avait tôt cessé dêtre la résidence ordinaire des barons. Conçu comme un ouvrage défensif, le donjon a sa porte dentrée aménagée au premier étage, accessible uniquement au moyen dune échelle, afin de le rendre plus difficile à prendre. Le rez-de-chaussée de la tour abrite les réserves de céréales, de vin et dhuile, tandis que létage est occupé par le logis seigneurial.                        Outre la grande bâtisse. La maison Burianne notamment en constitue un bel exemple, quoique transformée en ferme, elle présente une belle porte avec linteau en accolade surmonté dune croix de protection et dun cadran solaire, tandis que les armoiries de la famille ornent la façade.                                                           Au milieu du bourg se dresse le porche qui servit de prévôté à la baronnie de Roche-en-Régnier. Lédifice, qui porte dans un écusson la date de 1649, se compose dune sorte de loggia supportée par deux arcs très surbaissés et une voûte à nervures, les arcs sappuient à un des angles sur un pilier circulaire orné dune fausse gargouille représentant un buste de femme le visage tourné vers le sol.","habitants":"Famille de Régnier\r\n        \"","divers":"Vestiges de la Roche en Regnier","gps":"","images":["../image/image_43/43_Roche_en_Regnier_1.jpg","../image/image_43/43_Roche_en_Regnier_2.jpg","../image/image_43/43_Roche_en_Regnier_3.jpg","../image/image_43/43_Roche_en_Regnier_4.jpg","../image/image_43/43_Roche_en_Regnier_5.jpg"]},"Consult_chateau_formulaire8ba5":{"id":"Consult_chateau_formulaire8ba5","dept":"43","canton":"Yssingeaux","commune":"Bas-en-Basset","nom":"Rochebaron","type":"Vestiges","periode":"XIII","histoire":"ROCHEBARON,  Au XIe siècle, aux sirs de Rochebaron. En 1214, une bulle Papale place le château sous la suzeraineté de l'évêque du Puy. Au XVe siècle, les fortifications coté Ouest sont améliorées. Au XVIe siècle, le château est modernisé. En 1618, Catherine de Chalencon-Rochebaron épouse Claude Isserpens. En 1638, Catherne et Claude se séparent. En 1652, Catherine d'Isserpens épouse Louis de la Rochefoucault. A partir de 1654, cette forteresse médiévale est peu habitée par ses seigneurs. A la fin du XVIIe siècle, ce château  n'a pas la chance de voir son seigneur,  Charles Ignace de la Rochefoucaul. Il préfère les résidences modernes.  Aucun entretient sera réalisé sur cette vieille forteresse de Rochebaron. En 1741, le mandement est vendu à François- Joseph de Giry. En 1775, château et terres sont vendus à Jean Baptiste de Fisicat. L'acte précise que le château est en ruine. Depuis 1826, il semble que la famille Fisicat ne revendique pas la possession de la ruine. En 1980, une association est créée pour la sauvegarde du château.                                           Dans la commune le château de Chomette  du XVIIIe siècle transformé en gîtes de France.","architecture":"sur une crête dominant la rive gauche de la Loire, vestiges historiques des XIe et XVIe siècles perchés sur un éperon rocheux, enceinte quadrangulaire ceinturé flanquée de deux tours rondes, commandée par  un donjon triangulaire entouré de trois enceintes fortifiées et une tour de 24 mètres de haut récemment restaurée. Davril à novembre, on peut assister à un magnifique spectacle des Aigles de Rochebaron, moment démotions et de complicité avec les fauconniers et leurs rapaces.\r\nle château fut remanié aux XIVe et XVe siècles, avant d'être abandonné sous Louis XIV. Les imposantes ruines se composent d'une enceinte quadrangulaire, flanquée de tours rondes et défendue par une tour cylindrique du côté de l'attaque, et d'une tour triangulaire reliée à la tour ronde par une courtine à double défense.\r\nEn 1419, la duchesse de Bourbon et le Bailli du Forez firent saisir le château par Jean Fournier (prévôt de Montbrison). En 1422, le château fut assiégée par la troupes du Lyonnais. Depuis  1775 le château est en ruine.","habitants":"Sirs de Rochebaron.\r\n        \"","divers":"Vestiges de la forteresse  de Rochebaron et château de Chomette.","gps":"","images":["../image/image_43/43_Rochebaron_1.jpg","../image/image_43/43_Rochebaron_2.jpg","../image/image_43/43_Rochebaron_3.jpg","../image/image_43/43_Rochebaron_4.jpg","../image/image_43/43_Rochebaron_5.jpg","../image/image_43/43_Rochebaron_6.jpg","../image/image_43/43_Rochebaron_7.jpg","../image/image_43/43_Rochebaron_8.jpg"]},"Consult_chateau_formulaire6bb2":{"id":"Consult_chateau_formulaire6bb2","dept":"43","canton":"Bas-en-Basset","commune":"St-Paulien","nom":"Rochelambert","type":"Château","periode":"XVI","histoire":"ROCHELAMBERT, le premier seigneur connu  des lieux est le chevalier Pierre de la Rochelambert dont il est  fait mention dans une transaction en 1164. Avant lutilisation des armes à feu ce château était réputé imprenable, mais il est en partie pillé et incendié en 1562 par Blacon, lieutenant du baron des Adrets. Hélène de Lestrange épouse et veuve  de François, soccupa en 1578 de la reconstruction. les Rochelambert d'une lignée à l'autre pourvus d'un titre de marquis restent fidèles à leur provence tout en s'illustrant dans la carrière des armes. Alliance de Gabriel-François-René de la Rochelambert avec la fille  du marquis de Deux-Brézé grand-maître des cérémonies à la cour. Au XIXe siècle l'héritier épouse Apollonie  de Bruges-Montgomery, fille  d'un ancien gouverneur  de l'ile de Saint-Domingue, les deux demoiselles de la Rochelambert  une épouse Edgar Ney, prince de la Moskowa, et faute d'héritier, la lignée s'interrompt en 1935. Le château fut acheté par la famille de Brisset en 1938   actuel propriétaire .  Au cours de son voyage en Velay, Georges Sand visite le château le 14 juin 1859. M. Bresset,  Il la remeublé avec goût de pièces anciennes qui vous sont présentées lors de la visite.","architecture":"Le château de la Rochelambert, ressemble à s'y méprendre au château de \"la belle au bois dormant\", accroché sur une falaise de basalte, reste d'un ancien volcan. Le sommet de cette falaise fut jadis, occupé par un important oppidum gaulois, celui des Vellaves.  Les fondations sont du XIIe siècle, les barbacanes sur la tour sud du XIIIe siècle, les mâchicoulis de la tour octogonale et les corps de bâtiment  qui lencadrent datent du XIVe siècle. Le château est adossé à la coulée de basalte. Dans certaines pièces la roche apparaît, le château a été relevé  après l'incendie de 1562 dont-ils subsistait de l'époque la tour centrale et les bases des corps du bâtiment, un long corps de logis flanqué sur sa gauche d'une mince tour cylindrique, s'organise autour d'une tour centrale formant le donjon primitif. Les façades  élevées en lave de couleur fauve  sont percées de fenêtres à meneaux. la porte d'entrée de la tour centrale avec son tympan en accolade  de  style gothique flamboyant du XVe siècle, les meurtrières percées dans la façade.  Toit en poivrières coiffant les tours avec ceinture en mâchicoulis  sur la tour central et sur le pourtour du bâtiment dissimulant un chemin de ronde.","habitants":"Famille des Rochelambert \r\n        \"","divers":"Château de la Rochelambert","gps":"","images":["../image/image_43/43_Rochelambert_1.jpg","../image/image_43/43_Rochelambert_2.jpg","../image/image_43/43_Rochelambert_3.jpg","../image/image_43/43_Rochelambert_4.jpg","../image/image_43/43_Rochelambert_5.jpg"]},"Consult_chateau_formulaire48e2":{"id":"Consult_chateau_formulaire48e2","dept":"43","canton":"Saugues","commune":"Saugues","nom":"Saugues","type":"Tour","periode":"XIII","histoire":"SAUGUES, chef-duvre darchitecture militaire de la fin du XIIe siècle, la tour dite des Anglais fut restaurée et aménagée à linitiative de Lucien Gires dans les années 70.Ancienne place forte du Gévaudan, elle s'est développée dès le XIIe siècle sous l'autorité des évêques de Mende et des seigneurs de Mercur.  Du sommet de la tour, au-delà des trois couleuvrines en bronze, un magnifique panorama sur le pays de la bête du Gévaudan.                                 CHANALEILLES et sa région était au Moyen-Age le siège d'une seigneurie qui a donné son nom à l'une des plus anciennes et illustres familles du Vivarais, la famille de Chanaleilles, maison d'origine chevaleresque, qui remonte à Guillaume III de Chanaleilles, qui vivait vers 1228. Cette famille a fourni des chevaliers Bannerets, des capitaines d'hommes d'armes, des officiers de terre et de mer, des lieutenants de roi de province, et des sénéchaux de noblesse. En 1422, Pierre de Chanaleilles aida, comme seigneur Banneret, le dauphin Charles, avant qu'il  devienne Charles VII, pendant que ce jeune prince était retiré au pays du Velay. Après être monté sur le trône, ce monarque remercia Pierre de Chanaleilles, par une lettre clause, des services qu'il lui avait rendus, et le reçut chevalier. Ce même Pierre de Chanaleilles fut le premier bailli d'épée installé au nom du roi de France en Vivarais et Valentinois. Dès le début du XIVe siècle, les seigneurs de la maison de Chanaleilles se qualifiaient, dans leurs actes, de  nobles et puissants.                                                                      Dans la commune  Châteaux privés de Servières, Beauregard, Ombret (article), Les Salettes.","architecture":"La Tour devrait son nom au siège subi en 1362 pour en déloger des routiers partisans des Anglais. Un chevalier anglais, mort en 1380, repose dans une tombe gothique du cimetière. Elle abrite aujourd'hui un musée de la Forêt et offre un beau panorama depuis son sommet. Tour du Moyen-Age du début XIIIe siècle. Elle constituait le donjon du château ravagé en 1788. Grandes toiles de Lucien Gires sur la forêt, les métiers et les travaux des champs d'autrefois. De la terrasse, vue sur la Margeride, pays des aventures de la Bête du Gévaudan. Riche en vieilles maisons, Saugues, dont la spécialité était le tournage des \"esclops\", (les sabots de bois) est dominée par la Tour dite \"des Anglais\", un donjon carré du XIIIe siècle.\r\n Une étude d'histoire architecturale, avec analyse archéologique du bâti, a été publiée par Christian Corvisier.                               SERVIERES Le castrum de Servières est mentionné en 1250. La maison forte date du XIIIe siècle, et a conservé son logis donjon et sa basse cour assez peu remaniés. L'édifice est formé d'un bâtiment rectangulaire de trois niveaux  flanqué, du côté de l'escarpement, de deux tours.  Il est protégé à l'opposé, par une enceinte formée de bâtiments   d'époques variées qui paraissent reprendre le plan d'origine. Les percements datent du XVe siècle. Intérieurement   la disposition ancienne subsiste au rez-de-chaussée avec   des belles salles voûtées. Les étages ont été subdivisés  au XVIIIe siècle et les pièces ont reçu un décor rustique (plafond à la française, papiers peints et lambris peint).","habitants":"Pierre de Chanaleilles\r\n        \"","divers":"Tour des Anglais et le château de Chanaleilles et de Servières.","gps":"","images":["../image/image_43/43_Saugues_1.jpg","../image/image_43/43_Saugues_2.jpg","../image/image_43/43_Saugues_3.jpg","../image/image_43/43_Saugues_4.jpg","../image/image_43/43_Saugues_5.jpg"]},"Consult_chateau_formulaire8327":{"id":"Consult_chateau_formulaire8327","dept":"43","canton":"Cayres","commune":"St-Jean-Lachalm","nom":"Sejallieres_Seneujols","type":"Château","periode":"XV","histoire":"SEJALLIERES, Maison forte du XVe siècle, modifiée plusieurs fois postérieurement, caractéristique des maisons-fortes vellaves de la fin du Moyen-Age. Son histoire est liée aux seigneurs d'Agrain qui s'efforcèrent de détenir des châteaux occupant les plateaux dominant l'Allier, position stratégique. Séjallières forma, comme Prunet, une co-seigneurie. Les sires de Prunet se prétendirent, au XIVe siècle, seigneurs de Séjallières, jusqu'à ce que  Louis de Goys réunisse  les 2 maisons par mariage au XVIe siècle. L'autre partie de la seigneurie dépendait, au XIIIe siècle, des seigneurs de Montlaur. En 1508, les seigneurs d'Agrain firent momentanément saisir  le château féodal, cette part resta au XVIe siècle aux barons d'Agrain dont une branche s'intitule au XVIIIe siècle, Agrain de Séjallières.                                                                                          Le domaine de BELVEZET près Saint-Jean-Lachalm provenait des Templiers du Puy.\r\nEn 1335, Artaud de Fay, commandeur de Saint-Jean-la-Chevalerie et les maîtres de l'Hôpital Notre-Dame du Puy. En 1661, le chevalier de Langeac afferma Belvezet pour 6 ans. En 1709, le commandeur de la Richardie l'afferma.                                 MIRAMANDE,  le château aurait été détruit au XVe siècle, mais le mandatement  qui comprenait St-Jean, Conils, Conilhet, Fontfreyde, Lie et Sanssaguet subsista sous le nom de Miramande jusqu'à la Révolution.                                                                       Dans la commune le château de la tour-Prunet, et a quelques kilomètres à l'Est la maison forte de Séneujols.","architecture":"Sejallières; La maison adoptait à l'origine un plan en L, complété par un bâtiment en retour plus élevé au nord ouest. Le corps de bâtiment servant de grange est accessible d'une part au rez-de-chaussée par une porte donnant accès à l'écurie; d'autre part au premier niveau par une montée en plan incliné aboutissant à la grange. Sur l'angle ouest, une tour carrée se trouve légèrement en avancée au sud et à l'est.                                                          Château de la Miramande ,l ne reste plus qu'un pan de mur  et n'est indiqué sur aucune carte ancienne ou moderne Le château aurait été détruit au XVe siècle, mais le mandatement qui comprenait St Jean, Conils, Conilhet, Fontfreyde, Lie et Sanssaguet subsista sous le nom de Miramande jusqu'à la Révolution.\r\n le château de la Tour-Prunet, ce qu'il en reste un corps de logis rectangulaire à trois niveaux et attiques.                                    Séneujols  ce château est représentatif de l'évolution de l'architecture seigneuriale du Velay. Le donjon du XIVe siècle et son enceinte ont été renforcés durant les guerres de Religion, puis transformés aux XVIIe et XIXe pour en faire un lieu à la fois résidentiel et agricole. Au cours de la dernière guerre, un prisonnier italien a couvert un petit salon de peintures de paysage.","habitants":"Seigneurs de Séjallières\r\n        \"","divers":"Château de Séjallières, de Seneujols et maison forte de Glutonie.","gps":"","images":["../image/image_43/43_Sejallieres_Seneujols_1.jpg","../image/image_43/43_Sejallieres_Seneujols_2.jpg","../image/image_43/43_Sejallieres_Seneujols_3.jpg","../image/image_43/43_Sejallieres_Seneujols_4.jpg","../image/image_43/43_Sejallieres_Seneujols_5.jpg","../image/image_43/43_Sejallieres_Seneujols_6.jpg","../image/image_43/43_Sejallieres_Seneujols_7.jpg"]},"Consult_chateau_formulaire68eb-2":{"id":"Consult_chateau_formulaire68eb-2","dept":"43","canton":"Le Puy-en-Velay","commune":"Solignac-sur-Loire","nom":"Solignac","type":"Vestiges","periode":"XII","histoire":"SOLIGNAC, le bourg médiéval du chef-lieu  de cette commune est établi sur un promontoire rocheux dominant la vallée de la Loire, à lextrémité duquel se dressait autrefois un château fort. De ce dernier ne subsiste  plus aujourdhui que quelques pans de muraille, et le cimetière du village a été aménagé sur son emplacement.                         Château de la Beaume à Solignac.                                              Valettes à  Chadron, cet édifice appartient à la vague de constructions de maison fortes dans le Velay dans la seconde  moitié  du XVIe siècle. Les troubles dus aux pillards et aux troupes militaires organisées entraînent le développement  d'une architecture proche des forts médiévaux, avec logis  de plan massé  flanqué de 2 tours rondes intégrant un massif barlong plus élevé. L'évolution des armements est prise en compte avec la présence de canonnières  de différents modèles.  Des éléments isolés de décor témoignent d'une tentative de se conformer à la mode Renaissance. Le château  conserve des décors muraux peints datant du XVIIe siècle.                                                     A quelques kilomètres au nord-ouest à Saint-Christophe sur Dolaison maison forte cité en 1343 remanié fin XVIe siècle avec une seigneurie et dernièrement restaurée.","architecture":"SOLIGNAC, ruines du château, masquée par une imposante forêt qui s'est emparée anarchiquement des lieux, cachée pour partie sous un épais tapis de mousse, la bâtisse s'offre au regard du promeneur curieux. \r\n un imposant porche qui tient encore, miraculeusement debout. \r\n la plupart des murs sont en partie écroulés.  Mais l'ensemble, même s'il n'apparaît dans aucun classement \"officiel\" des monuments historiques, présente quand même un intérêt patrimonial.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges du château de Polignac et maison forte de la Baume et château à Saint-Christophe sut Dolaison","gps":"","images":["../image/image_43/43_Solignac_1.jpg","../image/image_43/43_Solignac_2.jpg","../image/image_43/43_Solignac_3.jpg","../image/image_43/43_Solignac_4.jpg","../image/image_43/43_Solignac_5.jpg"]},"Consult_chateau_formulairedd90":{"id":"Consult_chateau_formulairedd90","dept":"43","canton":"Monastier-sur-Gazeille","commune":"Salettes","nom":"Soubrey","type":"Maison forte","periode":"XV","histoire":"SOUBREY, a été édifié aux XVe et XVIe siècles par les Itier, seigneurs de Géorand et de Soubrey, sur une demeure héritée de la famille de Trau. En 1601, Anne Itier porte le château à son mari, Charles Motier de La Fayette. En 1614, la foudre incendie la plus haute tour. En 1793, Soubrey est pillé. A la Révolution, le château est vendu. La porte principale est transportée à « Maiguezin » où lon aperçoit lécu timbré aux armes des Itier, reproduit aujourdhui par Jean-Marie Palloix. Le château de Soubrey apparaît constitué de deux corps de logis parallèles reliés par une courtine qui délimite une cour intérieure. Chaque corps de logis est flanqué dune grosse tour sur son angle Est.   Le château est en cours de restauration par son propriétaire.","architecture":"Vestiges féodaux du château de Soubrey des XIVe et XVe siècles.  Le général Colomb veut en faire une base pour lutter contre les contre-révolutionnaires très actifs dans la région, mais l'édifice est tellement délabré  que le commandant de la garnison doit demander le retrait  des troupes. Au  XIXe siècle,  la dégradation se poursuit et le château,  partiellement reconstruit, sert d'exploitation agricole. L'édifice est constitué de deux corps de logis parallèles  reliés par une courtine  qui délimite une cour intérieure. Chaque corps de logis est flanqué d'une grosse tour sur son angle Est. Sur l'angle nord ouest a été ajouté ultérieurement un autre corps de bâtiment carré. Au  rez-de-chaussée de la tour nord-est est aménagée une chapelle voûtée d'ogive avec clef de voûte.","habitants":"Famille Itier, seigneurs de Géorand\r\n        \"","divers":"Vestiges du château de Soubrey","gps":"","images":["../image/image_43/43_Soubrey_1.jpg","../image/image_43/43_Soubrey_2.jpg","../image/image_43/43_Soubrey_3.jpg"]},"Consult_chateau_formulaire3f3a":{"id":"Consult_chateau_formulaire3f3a","dept":"43","canton":"Langeac","commune":"St-Arcons-d`Allier","nom":"St_Arcons","type":"Maison forte","periode":"XIII","histoire":"St-ARCONS  La lave des volcans a sculpté les fabuleux paysages du Midi de lAuvergne.     La famille de Saint-Arcons occupe  les lieux fortifiés jusqu'au XIIIe siècle puis l'édifice passe  à différentes familles. Au XIVe siècle, les De Peyre donnent le château, en tant que prieuré, à l'abbaye bénédictine des Chazes. Ce prieuré est réuni à l' immense abbatiale en 1403.  Le  petit château dit des deux Abésses  du XIIe siècle, qui domine le village perché sur un éperon de basalte, niché entre deux rivières.","architecture":"Le château  des deux Abbesses présente un corps de bâtiment s'appuyant, du côté sud-est, sur l'église. La façade nord Est ouvre sur la cour intérieure avec remparts de soutènement maçonnés.  La façade sur l'Allier  conserve une tour   semi-circulaire hors oeuvre,  ayant conservé des archères de flanquement.  La façade sur cour Est flanquée en son centre d'une tour d'escalier en vis du XVe siècle. Cette tour s'ouvre d'une porte à linteau horizontal à saillie supérieure  formant larmier avec retombées latérales sur écu. La tour est couverte d'une voûte d'ogives sexpartite  à retombée centrale en pénétration sur le noyau de l'escalier.  Cette voûte a gardé de beaux vestiges peints,  ces constructions du XIe au XVe siècle  ont été fortement mutilées, une partie a été transformée en maisons agricoles.","habitants":"Famille de Saint Arcons\r\n        \"","divers":"Maison forte des deux Abbésses","gps":"","images":["../image/image_43/43_St_Arcons_1.jpg","../image/image_43/43_St_Arcons_2.jpg","../image/image_43/43_St_Arcons_3.jpg","../image/image_43/43_St_Arcons_4.jpg","../image/image_43/43_St_Arcons_5.jpg"]},"Consult_chateau_formulaire231b":{"id":"Consult_chateau_formulaire231b","dept":"43","canton":"Cayres","commune":"St-Didier-d`Allier","nom":"St_Didier_Allier","type":"Château","periode":"XIV","histoire":"ST-DIDIER, sentinelle surveillant les gorges de l'Allier, le château est connu depuis 1256. L'édifice est dévasté au XIXe siècle par les troupes et reconstruit aussitôt. Les dispositions sont celles d'une simple maison forte . Les ouvertures ont été percées essentiellement sur les façades nord et sud, au XVIIIe siècle.  La façade ouest a gardé sous la toiture un alignement de consoles à ressauts qui devaient supporter, à l'origine, un appareil défensif. L'entrée des caves se fait par un arc en tiers pont  qui permet de dater ce niveau  du XIIIe siècle. Le deuxième niveau  de cave remonte à la période romane, comme l'indique  système de voûte en plein cintre.","architecture":"château surveillant les gorges de l'Allier, maison forte de plan presque carré, flanquée d'une tourelle d'escalier demi hors-oeuvre sur la façade nord. Un mur d'enceinte défend les côtés nord et ouest.","habitants":"Seigneurs locaux\r\n        \"","divers":"Maison forte de Saint-Didier d'Allier","gps":"","images":["../image/image_43/43_St_Didier_Allier_1.jpg","../image/image_43/43_St_Didier_Allier_2.jpg","../image/image_43/43_St_Didier_Allier_3.jpg","../image/image_43/43_St_Didier_Allier_4.jpg","../image/image_43/43_St_Didier_Allier_5.jpg"]},"Consult_chateau_formulaire6f3a-2":{"id":"Consult_chateau_formulaire6f3a-2","dept":"43","canton":"St-Didier-en-Velay","commune":"St-Ferréol-d`Auroure","nom":"St_Ferreol_Auroure","type":"Château","periode":"XVII","histoire":"TOUR d'ORIOL, le château dOriol fut construit probablement au XIe siècle pour défendre, avec Aurec et de la Tour, le Velay contre les empiétements des comtes de Forez.  La Semène faisait, à cette époque, la limite entre  ces deux provinces.\r\nDans la 2ème moitié du XIIIe siècle le château appartenait aux « de la Roue ». Dans les années 1500 Oriol était devenu une prison. Vers 1586 le château est inhabitable. Les  de la Roue  avaient établi au château dAurec leur résidence dhiver et ils passaient lété dans leur terre de Montpeloux. Leurs finances ne leur  permettaient plus de faire réparer lancien manoir sur les bords de la Semène. Quelques années plus tard un document nous montre « les prisons dOriol sans porte, les fers des prisonniers enlevés, le toit du château Gasté et tombé   étant plus debout quune tour à laquelle est une petite chambre voûtée.  En 1609 Oriol fut vendu à la famille de Nérestang. Labandon définitif des prisons dOriol doit sans doute coïncider avec la suppression du bailliage de St Ferréol qui eut lieu en 1767.  A la Révolution, la terre et les ruines du château dOriol furent vendues comme bien national.             VILLENEUVE dans  la famille  depuis 1674,  bienfaitrice de la paroisse. Plusieurs de ses membres furent élus maires toujours dans la famille.                                                                                Dans la commune la maison forte de la Borie.","architecture":"Tour d'Oriol,  selon les limites géographiques, elle est située sur la commune d'Aurec-sur-Loire mais elle est accessible facilement du pont du Gour de l'Ane. Il s'agit en fait des ruines d'un ancien château fort du XIIe siècle construit par un comte du Forez. L'endroit était stratégique au fond de la vallée de la Semène entre le Velay et le Forez.  Vers 1500, le château a été abandonné et la tour fut transformée en prison sous les ordres du bailli de St Ferréol jusqu'à la Révolution Française.  A l'entrée du château, se trouvait une chapelle dédiée à Saint-Simon.","habitants":"Famille de Nérestang\r\n        \"","divers":"Château de Villeneuve, la tour d'Oriol et le manoir de la Batie","gps":"","images":["../image/image_43/43_St_Ferreol_Auroure_1.jpg","../image/image_43/43_St_Ferreol_Auroure_2.jpg","../image/image_43/43_St_Ferreol_Auroure_3.jpg"]},"Consult_chateau_formulaire9e63":{"id":"Consult_chateau_formulaire9e63","dept":"43","canton":"Le Puy-en-Velay","commune":"St-Germain-Laprade","nom":"St_Germain","type":"Château","periode":"XVI","histoire":"St-GERMAIN . En 1219, à Bertrand de Cayres,  en 1272, à Pierre, seigneur de Saint- Germain, dun fils de Bertrand de Rochebaron. Au XIVe siècle, les De Glavenas, seigneurs de Lardeyrol, létaient également de Saint-Germain. Dès le début du XVIe siècle, la famille de Poinsac apparaît à Saint-Germain, en 1519, François de la Tour, Vicomte de Turenne, Baron de Bouzols, cède à Jean de Poinsac la seigneurie de Saint-Germain-Laprade et tous les droits qui y étaient attachés. En 1579, le château de Saint-Germain est vendu à Gabriel de Morgues, Bailli de Solignac. La grande figure de cette famille fut Mathieu de Morgues (1582  1670) Baron de Saint Germain dit  lAbbé de Morgues. Il consacra son âge mûr à combattre le tout puissant Richelieu, et dans ce duel mémorable, il déploya de belles qualités décrivain. Comme beaucoup dautres châteaux du Velay, celui de Saint-Germain eut à souffrir des ravages des guerres civiles du XVIe siècle. Claude de Morgues,  gouverneur du Velay pour le Roi, avait mis son manoir sous lobéissance royale, se ravisa ensuite et embrassa la cause de la Ligue. Le 11 février 1590, il vit son château brûlé par les royalistes profitant de la faiblesse de la garnison. Usant de représailles, les Ligueurs marchèrent sur la Coste quils incendièrent. Depuis 1863, le château de Saint-Germain-Laprade appartient aux héritiers de Joséphine de Morgues de Saint-Germain, comtesse de Clérico. Le village est aussi connu pour avoir été le théâtre dun tragique épisode des guerres de religion en 1590 : la garnison dirigée par Gabriel de Morgues fut passée au fil de lépée.  Dans la commune le château du Pin et les ruines du château de Servissac.","architecture":"St-Germain est connu par son château et sa baronnie depuis le XIIe siècle.   A la fois maison forte et construction classique, la majeure partie de la maison remonte au début du XVe siècle. Par la suite, elle a été remise au goût du jour à plusieurs époques, en particulier aux XVIIe et XIXe siècles avec l'adjonction d'une aile et la remise en état du décor intérieur. Cet édifice constitue un témoignage des petites seigneuries rurales du pays Vellave. Saint-Germain devint commune en 1790.                                                 Château du Bourg, portail d'entrée, façades et toitures, cuisine avec sa cheminée au sous-sol, grand salon avec son décor, salle à manger avec son décor de toiles au premier étage.","habitants":"Claude de Morgues\r\n        \"","divers":"Château de Saint-Germain-Laprade","gps":"","images":["../image/image_43/43_St_Germain_1.jpg","../image/image_43/43_St_Germain_2.jpg","../image/image_43/43_St_Germain_3.jpg","../image/image_43/43_St_Germain_4.jpg","../image/image_43/43_St_Germain_5.jpg"]},"Consult_chateau_formulaire67db":{"id":"Consult_chateau_formulaire67db","dept":"43","canton":"St-Julien-Chapteuil","commune":"St-Hostein","nom":"St_Hostein","type":"Château","periode":"XV","histoire":"CHAMP, cette maison forte fut bâtie au XVe siècle, au nord-est du village, pas d'historique. Typique des maisons fortes de la région. Un corps de logis Renaissance fut ajouté aux XVIe et XVIIe siècles. (Inscription monuments historiques en 1978, puis en 1984).","architecture":"Champ,  représentatif des maisons-fortes du XVe siècle dans cette région, ce château modeste par sa taille et son architecture extérieure, conserve de ses aménagements d'époque classique un ensemble de dessus de portes de facture tout à fait charmante. Il contrôlait le col du Pertuis qui commande le passage entre la région du Puy et celle d'Yssingeaux. Au XVe siècle, il était entouré de douves alimentées  par plusieurs aqueducs souterrains.  Au XVIe-XVIIe siècle, il fut agrandi par l'ajout d'un corps de logis Renaissance, les fenêtres furent agrandies et l'escalier en vis en pierre remplacé par un escalier en bois. Différents aménagements du château  eurent lieu pendant la première moitié du XVIIIe,  construction de l'aile  Est, décors intérieurs. Le corps de logis principal, de forme rectangulaire, est flanqué d'échauguettes d'angle. Une tour isolée assurait  un flanquement à l'angle nord-ouest, puis servit de pigeonnier.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de st-Hostein et des Champ","gps":"","images":["../image/image_43/43_St_Hostein_1.jpg","../image/image_43/43_St_Hostein_2.jpg"]},"Consult_chateau_formulaire71f8":{"id":"Consult_chateau_formulaire71f8","dept":"43","canton":"Lavoûte-Chilhac","commune":"St-Ilpize","nom":"St_Ilpize","type":"Vestiges","periode":"XI","histoire":"SAINT-ILPICE, citadelle construite sur un piton volcanique,  domine la vallée du Haut-Allier.  Son implantation daterait du  XIe siècle.  la seigneurie,  la première mention d'une construction fortifiée remonte à 1030, elle échoit en 1201 au dauphin d'Auvergne. La forteresse de Saint-Ilpice, rapidement dotée de plusieurs enceintes, permettait aux dauphins d'Auvergne de surveiller les gorges de l'Allier. Le château de Saint-Ilpice fut la résidence pendant plus de 150 ans des Dauphins dAuvergne, durant la guerre de cent ans, la citadelle subit plusieurs attaques, dont celle de Thomas de la Marche, capitaine des routiers  qui s'en empare en 1361. \r\nALLERET, à quelques kilomètres à l'est, fut construit à la fin du XIXe siècle, au sein même du cratère dAlleret. Transformé en hôtel restaurent.  Il offre ainsi une vue superbe sur un paysage de cultures bordées de forêts ; vaste cratère denviron 2 km de diamètre en pente douce.","architecture":"De la citadelle Il ne reste, aujourdhui, que  dimposantes ruines, le logis seigneurial   du XIVe siècle. Seule le chapelle, bijou de larchitecture  romane, en pierres volcaniques avec son clocher à  arcade à  deux baies à  retrouvé son éclat grâce à  une rénovation. Au XIVe siècle le logis seigneurial. Les murailles sont dominées par l'ancienne chapelle et une tour carrée servant de clocher. Plusieurs enceintes successives, flanquées de tours, enserraient basses-cours et quartiers de la ville, qui s'étendait au XVIe siècle jusqu'à l'Allier. Seule l'enceinte supérieure, qui protégeait le logis seigneurial qui était adossé à la partie  sud de l'enceinte, présente une structure homogène au sommet de la butte.  L'enceinte dessine un cercle à pans irréguliers auquel on accède par une rampe nord partant de la place de l'église. Plusieurs chicanes, bastions et poternes défendaient l'accès à la cour basse dans laquelle l'accès s'effectue par une porte en arc brisé. En contrebas, l'enceinte inférieure est garnie d'une tourelle nommée \"épaulette\". Le logis seigneurial était adossé contre la partie sud de l'enceinte.     Alleret, corps de logis rectangulaire à deux niveaux et attiques, toitures en croupes en façade tour carrée en avant corps à toits pointus.","habitants":"Dauphin d'Auvergne\r\n        \"","divers":"Vestiges de la forteresse de Saint-Ilpize.","gps":"","images":["../image/image_43/43_St_Ilpize_1.jpg","../image/image_43/43_St_Ilpize_2.jpg","../image/image_43/43_St_Ilpize_3.jpg","../image/image_43/43_St_Ilpize_4.jpg","../image/image_43/43_St_Ilpize_5.jpg"]},"Consult_chateau_formulaired5ba-2":{"id":"Consult_chateau_formulaired5ba-2","dept":"43","canton":"Bas-en-Basset","commune":"St-Pal-de-Chalençon","nom":"St_Pal_Chalencon","type":"Château","periode":"XVI","histoire":"St-PAL de CHALENCON,   château construit pour le compte de l'évêque de Rodez à la fin du XVe siècle.  En avril 1264 le puissant seigneur Bertrand de Chalençon place son château sous  la suzeraineté du comte du Forez. A la fin du XVIIe siècle, le château passe aux Polignac, cependant ceux-ci ne gardèrent pas longtemps cette seigneurie. Une cinquantaine d'années plus tard, pour subvenir aux dépenses qu'entraînaient la vie à la cour  ils se trouvaient dans l'obligation de la vendre. Elle passa, dès lors, de mains en mains, pour aboutir, à la veille de la Révolution, entre celles de Marie Louise de Besse de la Richardie,  épouse de Jean Hector de Genestet,  comte de St Didier.\r\nDans le canton le château de Chamblard,  inhabité depuis plus de 15 ans.","architecture":"château de Chalençon conçu  en système de défense constitué par le château et son enceinte et transformé dans le goût des débuts de la Renaissance, une partie sert actuellement de presbytère. On y admire  une magnifique cheminée  en pierre de taille  de sept mètres de long, dans la vaste salle ogivale du rez-de-chaussée, ainsi que l'escalier d'honneur du donjon, qui ne comporte pas  moins de 86 marches de pierre et dont les sculptures s'épanouissent au sommet en de remarquables feuilles de palmier.   Il est probable que la reconstruction du château au début du XVIe siècle s'était accompagnée d'une réfection au moins partielle de l'enceinte fortifiée du bourg. Il en subsiste deux tours et trois portes, dont les plus anciennes, celles du Nord et celle du Sud sont classées.","habitants":"Famille de Chalencon\r\n        \"","divers":"Château de St-Pal les Chalencon et château de Chamblard","gps":"","images":["../image/image_43/43_St_Pal_Chalencon_1.jpg","../image/image_43/43_St_Pal_Chalencon_2.jpg","../image/image_43/43_St_Pal_Chalencon_3.jpg","../image/image_43/43_St_Pal_Chalencon_4.jpg"]},"Consult_chateau_formulaire2b5f":{"id":"Consult_chateau_formulaire2b5f","dept":"43","canton":"Loudes","commune":"St-Privat-d`Allier","nom":"St_Privat_Allier","type":"Château","periode":"XVI","histoire":"ST-PRIVAT-d'ALLIER, en 1429,aux Mercoeur, et aux  Montlaur, et aux Poitiers Saint-Vallier qui  n'occupèrent vraisemblablement jamais le château. Un capitaine châtelain les représentait. Les premiers propriétaires à demeurer au château furent sans doute les Guitard, famille bourgeoise du Puy-en-Velay qui en fit l'acquisition au début du XVIe siècle.   Antoine de Coubladour, héritier des Guitard, leur succéda en 1556. Sa fille Jacqueline épousa en juillet 1584, François de Bouchard. Son petit-fils Jacques, hérita des châteaux et seigneuries de Saint-Privat. Le fils de Jacques de Bouchard, se rendit coupable d'exactions de toutes sortes envers les seigneurs voisins, comme s'il était responsable des actes de banditisme de son maître, le château fut condamné à l'arasement.  Ce n'est qu'en 1723 que les propriétaires purent enfin obtenir de l'intendant d'Auvergne l'autorisation de faire reconstruire le château, mais pas à l'identique.  À la Révolution, toujours propriété de la famille Bouchard, La famille d'Apchier le reçu par mariag
