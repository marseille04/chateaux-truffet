e fief, le domaine et le manoir, qui relevaient de Laval, ont appartenu à Oierre Le Corn, un rude capitaine ligueur, en 1577.","architecture":"PROVOSTERIE, la terre de la Provôterie a donné son nom au château moderne. Le château de la Provôterie a appartenu à Robert Le Maçon, chancelier de France, sous Charles VII et protecteur de Jeanne d'Arc. La Provôterie fut un fief mouvant de Laval sous le devoir d'un « chapelet de roses » à la fête de la Consécration; ses seigneurs jouissaient de la haute, moyenne et basse justice et du banc de sépulture dans l'église paroissiale, 1460. En échange de son droit d'usage dans la forêt de Concise, en 1760, François Le Clerc de la Galorière obtint le titre de seigneur de la paroisse. La seigneurie de paroisse relevait alors du comté de Laval - dont il fut le directeur, sous le même hommage que la terre de la Provôterie et sans préjudice de la pré-éminence du suzerain.  Le fermier Haulmay, qui servait dans les Chouans, fut tué, croit-on à l'attaque du poste d'Ahuillé. En 1792, N. Le Clerc de la Provôterie était capitaine des grenadiers du 2e bataillon du 4e régiment d'infanterie à Saint-Domingue.                                                   VIEUX COUR, une maison seigneuriale faite à l'antique, chapelle, écurie, grange, colombiers, cours, jardins, vergers,une dizaine de métairies ou de closeries, les moulins et étangs de Goulias, la Paillardière, les Mottes, des vignes aux Cureaux de Quelaines, les fiefs et seigneuries de la Vieux-Cour et de la Motte-Tannier, et autres en dépendant, avec droits honorifiques dans les églises d'Ahuillé et de Loiron.","habitants":"Vieux cour; famille d'Olivier de la Roussière                             Barbotière, famille Barbot                                                        Provôterie; Famille de Robert Le Maçon, \r\n        \"","divers":"Ahuillé grav-1 GPS : 48° 00' 06\" Nord, 0° 50' 47\" Ouest                         Provosterie  grav 2-3  GPS : 48° 01' 26\" Nord, 0° 52' 44\" Ouest  Grav1                                                                                Vieux-Cour grav-4   GPS : 48° 01' 42\" Nord, 0° 51' 29\" Ouest","gps":"48° 00' 06\" Nord, 0° 50' 47\" Ouest                         P","images":["../image/image_53/53_Ahuill%c3%a9_1.jpg","../image/image_53/53_Ahuill%c3%a9_2.jpg","../image/image_53/53_Ahuill%c3%a9_3.jpg","../image/image_53/53_Ahuill%c3%a9_4.jpg"]},"Consult_chateau_formulaire746d":{"id":"Consult_chateau_formulaire746d","dept":"53","canton":"Mayenne","commune":"Alexian","nom":"Alexian","type":"Château","periode":"XV-XVI","histoire":"MARIE d'ALEXAIN, mentionné en 1577, son fief mouvait de Mayenne, il fut la propriété de Jean de Brée  seigneur en 1422. II échut à Guillaume L'Enfant Blason famille  L'Enfant de la Patrière, seigneur à la suite de son mariage avec Isabeau de Brée. En unissant sa destinée à celle de René Le Cornu, seigneur du Plessis de Cosmes, le 14 mai 1648, Anne L'Enfant apporta la Marie à la Blason famille Le Cornu, époux de Jacquine de La Dufferie, Blason famille Le Cornu,  Jean Le Cornu se titrait de seigneur de la Marie entre 1600 et 1628. Son petit neveu, Gilles de La Dufferie, lui succéda. Quant à Catherine-Françoise de la Dufferie, épouse de Gilles Troisvarlets, elle habitait le château en 1692. Colonel des grenadiers du roi, Blason famille  du Plessis d'Argentré, Charles-Marie-Camille du Plessis d'Argentré y mourut le 28 décembre 1772. La demeure devint ensuite la propriété du comte Thibault de Robien, colonel des Hussards puis elle subit une occupation militaire en 1871.  Le 14 juillet 1875, une belle fête inaugura la grotte de Notre-Dame de Lourdes de la Marie, une grotte qui s'ouvre dans le flanc de la roche, au fond de l'étroite vallée creusée par l'Anxure sur la rive gauche de la rivière. \"La Marie\" passa ensuite par alliance à la famille Farcy de la Villedubois puis Rorthays.","architecture":"FEUILLEE, il existe toujours, mais après avoir été saccagé pendant la Révolution française, il a été reconstruit en 1809, sauf les servitudes du XVIe siècle, qui ont subsisté. Il a longtemps appartenu à la famille d'Orange  qui le possédait depuis le XIIe siècle.                                                 GUITTERIE, du XVI-XVIIe siècle lentrée du château de la Guitterie est formée de deux tours reliées entre elles par un pavillon formant châtelet d'entrée,  petit château fort destiné à défendre l'accès du château. Il tient son nom de Jean Guittier, chanoine dAngers.  Le château conserve quelques vestiges de l'ancien pont-levis qui permettait l'accès à la cour carrée et à la demeure. Le corps de logis occupe la partie nord de la cour fermée, les deux côtés recevant les servitudes et la chapelle. Jean Guittier, archidiacre d'Outremaine et chanoine d'Angers, fonde en 1464 la chapelle dédiée à Saint-François d'Assise.","habitants":"Alexain;  Famille Le Cornu                                                         Feruillée, famille d'Orange                                                       Guitterie; Famille de Jean Guittier\r\n        \"","divers":"A Alexain  l'hôtel de ville grav-1-2-3-4 (château), la Guiterie grav 4 -5","gps":"","images":["../image/image_53/53_Alexain_1.jpg","../image/image_53/53_Alexain_2.jpg","../image/image_53/53_Alexain_3.jpg","../image/image_53/53_Alexain_4.jpg","../image/image_53/53_Alexain_5.jpg"]},"Consult_chateau_formulaire3e65":{"id":"Consult_chateau_formulaire3e65","dept":"53","canton":"Cossé le Vivien","commune":"Cossé le Vivien","nom":"Alleux","type":"Château","periode":"XVII-XVIII","histoire":"ALLEUX; les Alleux étaient une seigneurie fort ancienne. La charte de La Roë, au XIIe siècle, fait mention de Vivien des Alleux. Si lon connaît les familles qui se succédèrent dans la possession de la propriété des Alleux, aucun document ne permet de situer la date de construction du premier château. La seule date est celle de 1746 gravée au fronton de lentrée principale. Il ne sagit pas de la première construction puisque dans un inventaire fait aux Alleux, en 1694, il est fait allusion à une maison de campagne bien dotée en mobilier, notamment en argent et même en or, ce qui était fort rare à lépoque. On est tenté den conclure que la maison, à cette époque, devait déjà avoir un certain caractère. Six familles sont mentionnées comme propriétaires des Alleux : la famille des Alleux, de 1150 à la fin du XIVe siècle, la famille du Layeul, du XVe au XVIe siècle, la famille de la Dinaie, à la fin du XVIe siècle, la famille de la Corbière, du XVIIe au milieu du XVIIIe siècle, la famille du Hardas à la fin du XVIIIe siècle et la famille de Vauguyon, au XIXe siècle.","architecture":"ALLEUX,  château des Alleux fut longtemps enserré, de tous côtés, par lOudon. La comparaison du plan cadastral de 1817 avec létat actuel de la propriété bâtie, montre quun corps de logis important a été démoli. Il est possible que les gravats aient pu servir au comblement du bras de lOudon qui contournait la demeure par le sud. Pendant la Révolution, ce château fut souvent visité par les Républicains et les Royalistes. Il accueillit de 1873 à 1880 une communauté de Jésuites italiens chassés de leur pays. On prétend que ce sont eux qui ont procédé aux travaux de démolition évoqués au paragraphe précédent, sans doute pour rendre les lieux plus salubres.","habitants":"Famille de la Dinaie                                                                      Famille du Harda\r\n        \"","divers":"GPS : 47° 56' 43\" Nord, 0° 54' 42\" Ouest","gps":"47° 56' 43\" Nord, 0° 54' 42\" Ouest","images":["../image/image_53/53_Alleux_1.jpg","../image/image_53/53_Alleux_2.jpg"]},"Consult_chateau_formulaire5cb5":{"id":"Consult_chateau_formulaire5cb5","dept":"53","canton":"Château-Gontier","commune":"Ampoigné","nom":"Ampoigné","type":"Château","periode":"XI-XVIII","histoire":"Deux châteaux à Ampoigné dont celui d'Ampoigné et de la Cour. AMPOIGNE, a l'entrée du bourg le château, tout comme la localité à laquelle il appartient, a conservé le nom de ses premiers seigneurs issus d'une famille de chevalerie. Ils ont possédé la terre et porté le nom d'Ampoigné du XIe siècle jusqu'au milieu du XIIIe siècle. Mentionné dès 1080, date à laquelle Alléaume d'Ampoigné figurait comme témoin d'un don fait aux religieuses du Ronceray d'Angers. Vers 1250 la terre d'Ampoigné devint la propriété des Cheorchin, une famille d'ancienne chevalerie qui a laissé son nom à La Motte Sorchin de Cosmes. En 1328, Guillaume Cheorchin décéda en laissant ses biens et la terre, à son unique héritière, sa sur Jeanne qui avait épousé Jean de Quatrebarbes, seigneur de la Membrolle. Vers la fin du XIVe siècle, Marguerite d'Auvers, veuve de Jean de Quatrebarbes, reçut la terre d'Ampoigné en douaire. Marie de Couliette, veuve de Gilles de Quatrebarbes, en rendait aveu en 1413 et 1414. Marie de Couliette épousa Guillaume d'Avaugour, fidèle serviteur de Charles VII. Veuf de Marie de Couliette, d'Avaugour épousa Blanche de La Tour Landry. En 1434, il avait des prétentions sur la seigneurie d'Ampoigné, et il réussit à obtenir du duc d'Alençon, une dispense de garde à Château-Gontier. En 1435 Louis de La Tour Landry, mari de Jeanne de Quatrebarbes, rendait lui même aveu de la terre d'Ampoigné. En 1606, René de La Tour Landry rédigea un acte de vente de la propriété en faveur de Jean et Julien Guilloteau, mais ce fut Jean d'Héliand qui finit par en devenir acquéreur en 1609. Ses descendants conservèrent Ampoigné et prirent souvent le nom. En 1652  M. d'Héliand prétendait au droit d'avoir comme seigneur d'Ampoigné, un poteau à ses armes à Chemazé.","architecture":"AMPOIGNE, édifié par la famille d'Héliaud au XVIIe siècle, le château d'Ampoigné comporte deux tourelles rondes qui montent la garde de chaque côté du portail d'entrée. Le corps de logis, composé d'un rez de chaussée, d'un étage et de combles, est doté d'un fronton triangulaire lui même précédé d'un escalier à double rampe. Sur le fronton les restes d'un double écusson mutilé et encadré de feuillages. A l'intérieur, un escalier monumental qui conserve au rez-de-chaussée, un très original arc rampant. En 1885, la terre et le château devenaient la propriété de la famille de Champagné.                                                                                             La COUR, sur un emplacement fortifié dès le XIIIe siècle pour des familles féodales angevines, la nouvelle fortune des officiers royaux de Château-Gontier, après les troubles des guerres de religion, permet à la famille d'Héliaud d'édifier un château pendant la première moitié du XVIIe siècle. Ce château, à escalier monumental et pavillon, est agrandi au XVIIIe siècle. A noter que sue cette commune se trouve une grange seigneuriale à grain, exemple exceptionnel d'architecture de la fin du Moyen Age n'ayant pas subi de modifications depuis la fin du XVe ou le début du XVIe siècle. C'est un bâtiment rectangulaire à trois niveaux, long de trente mètres environ et comprenant une grange de cinq travées, desservie à l'est par un escalier en vis. Il a conservé sa charpente ancienne.  Eléments protégés MH : le château en totalité, y compris les tourelles du portail et l'habitation indépendante du XVIIIe siècle : inscription par arrêté du 26 janvier 1987.","habitants":"Ampoigné; famille de Jean et Julien Guilloteau                         La Cour; Famille d'Héliaud \r\n        \r\n        \r\n        \"","divers":"Ampoigné GPS : 47° 48' 40\" Nord, 0° 49' 27\" Ouest Grav 1 à 4                  La Cour grav 5-6-7","gps":"47° 48' 40\" Nord, 0° 49' 27\" Ouest Grav 1 à 4","images":["../image/image_53/53_Ampoign%c3%a9_1.jpg","../image/image_53/53_Ampoign%c3%a9_2.jpg","../image/image_53/53_Ampoign%c3%a9_3.jpg","../image/image_53/53_Ampoign%c3%a9_4.jpg","../image/image_53/53_Ampoign%c3%a9_5.jpg","../image/image_53/53_Ampoign%c3%a9_6.jpg","../image/image_53/53_Ampoign%c3%a9_7.jpg"]},"Consult_chateau_formulairebcef":{"id":"Consult_chateau_formulairebcef","dept":"53","canton":"Cossé-le-Vivien","commune":"Saint-Martin du Limet","nom":"Ansaudière","type":"Château","periode":"XVI-XIX","histoire":"ANSAUDIERE, au XVIe siècle, l'Ansaudière appartenait à la famille Mauviel qui a donné des sénéchaux à la baronnie de Craon. Au milieu du XVIIIe siècle, en 1754, Jean Cournée de La Noë achète la demeure et c'est l'un de ses descendants, François de la Porte qui fait construire le château et crée le parc.","architecture":"ANSAUDIERE, le château se compose de deux corps de bâtiments dont le plus ancien est un logis rectangulaire du XVIIe siècle, à hautes toitures, aux ouvertures encadrées de tuffeau. Aux XVIIIe et XIXe siècles, est construit, perpendiculairement, un autre bâtiment flanqué de tours rondes aux angles; une tour carrée à la jonction des deux constructions est des vestiges plus anciens, ce château assez \"troubadour\" dans son aspect est couvert d'une toiture en ardoises de 4035 m², les communs, à l'arrière, de construction soignée, pour la partie en briques, forment un ensemble très important. La chapelle date du XVIe siècle.","habitants":"Famille, Jean Cournée de La Noë \r\n        \"","divers":"GPS : 47° 48' 57\" Nord, 1° 01' 11\" Ouest  grav 1  à 3","gps":"47° 48' 57\" Nord, 1° 01' 11\" Ouest  grav 1  à 3","images":["../image/image_53/53_Ansaudi%c3%a8re_1.jpg","../image/image_53/53_Ansaudi%c3%a8re_2.jpg","../image/image_53/53_Ansaudi%c3%a8re_3.jpg"]},"Consult_chateau_formulaireecd1":{"id":"Consult_chateau_formulaireecd1","dept":"53","canton":"Azé","commune":"Argenton notre-dame","nom":"Argenton_notre_dame","type":"Château","periode":"XVIII-XIXe","histoire":"Trois châteaux à Argenton ,celui e la Bossivière (voir article), de Fautraise et de Sionnièrie.  \r\nFAUTRAISE , est un fief mouvant de Romfort. Il fut reconstruit vers 1750, par René Louis François Chailland, curé d'Argenton de 1731 à 1768, seigneur de la Fautraise, qui y habitait et avait un vicaire au bourg. La chapelle qu'il y avait jointe et dont on demande la conservation en l'an XII, existait en 1824, elle a été remplacée par une chapelle de style ogival. En 1863, M. Emile de Beaumont acheta le château et le fit restaurer. Cette demeure moderne, avec son pavillon central, présente un toit en pyramide couronné d'une lanterne. Ce fut dans ce logis que Marin Pierre Gaullier colonel royaliste, déposa les armes de sa division de 2400 hommes. Il les remit au général Henri Pierre Delaage qui vint de Château-Gontier en 1796, traiter avec lui. Mais d'après les Mémoires de Bernard de la Frégeolière, ce désarmement eut lieu au château de Beaumont à St Laurent des Mortiers, situé à 4 km environ du château de la Fautraise. En 1796, ce logis appartenait à Henri Gabriel Germain de Villoutreys et sa femme Marie Henriette Thérèse de la Forêt d'Armaillé. On notera que ce n'est qu'en 1863 que le logis fut acquis par M. de Beaumont, dont le nom est peut-être à l'origine de la confusion.","architecture":"SIONNIERE, le château de la Sionnière, situé au nord-est d'Argenton-Notre-Dame, est une demeure bâtie au XVIIe siècle. La Sionnière est devenue propriété de la famille du Boul à la suite du mariage de Charles du Boul et de Renée Possart en 1655. Elle passa à la famille de Quatrebarbes en 1675, lorsqu'Anne du Boul se maria avec Alexis de Quatrebarbes. En 1775, le roi réunit à la Sionnière les seigneuries de la Potterie, l'Hommaie, Châtelain et Romfort en faveur d'Hyacinthe-René de Quatrebarbes. Pendant la Révolution, malgré une vente nationale qui ne fut qu'un moyen de sauver l'héritage de cette famille, le domaine de la Sionnière est resté la propriété des Quatrebarbes. Le 11 septembre 1794, le château et les caves sont pillées par les bataillons de la Nièvre et du Calvados.  Orné au centre d'un fronton triangulaire, le bâtiment est accosté, à chaque extrémité d'un pavillon et d'une aile en retour. Un vaste perron s'étend au-devant du château qui est entouré de pelouses, de prairies et de bosquets. Au fronteau de la demeure sont les armes de la famille des Quatrebarbes.","habitants":"Fautraise; Famille  M. Emile de Beaumont                               Sionnière; Famille du Boul \r\n        \"","divers":"Fautraise grav1-2-3-4  GPS : 47° 46' 27\" Nord, 0° 36' 09\" Ouest                 Sonnerie grav-5","gps":"47° 46' 27\" Nord, 0° 36' 09\" Ouest                 Sonnerie","images":["../image/image_53/53_Argenton_notre_dame_1.jpg","../image/image_53/53_Argenton_notre_dame_2.jpg","../image/image_53/53_Argenton_notre_dame_3.jpg","../image/image_53/53_Argenton_notre_dame_4.jpg","../image/image_53/53_Argenton_notre_dame_5.jpg"]},"Consult_chateau_formulairec143":{"id":"Consult_chateau_formulairec143","dept":"53","canton":"Bonchamp-lès-Laval","commune":"Argentré","nom":"Argentré","type":"Château","periode":"XVIII- XIXe","histoire":"quatre châteaux à Argenté , Grenusse, Mantaigu, Vaussenay et Hauterive voir article. Et à  3 Km au Sud la Louvigné le château des Roches.                                                                                                   GRENUSSE, le château de Grenusse, situé à Argentré, dans le département de la Mayenne, a été construit au XIXe siècle, vers 1845, pour Léon Périer du Coudray.  Étages : sous-sol ; un étage carré ; étage de comble Fros-oeuvre : calcaire ; moellon ; revêtement Couverture  : toit à longs pans ; croupe ; pignon couvert ; toit conique en ardoise                                                                      MONTAIGU,   situé à Argentré, a été construit au XVIIIe siècle et fut agrandi au XIXe siècle. Plan : plan régulier Élévation : élévation ordonnancée en deux étages : sous-sol ; un étage carré ; étage de comble, Escaliers : escalier demi-hors-oeuvre :  Couverture  toit à longs pans brisés ; croupe brisée en ardoise.                                               VAUCENAY    La chapelle, les communs et le logis datent du XVIIe siècle. Ce dernier est ensuite agrandi entre 1830 et 1850 puis à nouveau vers 1890. Le bâtiment se compose d'un étage carré et d'un étage de comble, gros-oeuvre en grès; calcaire; moellon; revêtement ; pisé. Toit à longs pans ; toit à longs pans brisés; croupe ; pignon couvert; toit en pavillon; toit en bâtière; toit conique; toit polygonal;  terrasse, recouverts d'ardoise. Armoiries des Couannier de Launay et des du Vigneau.","architecture":"ROCHES, à Louvigné à un kilomètre au sud  château des Roches date du XIXe siècle. Auguste Simon du Tertre a habité le château des Rôches, dès 1834. Il le revendit, en 1842, à Louis du Mans de Chalais. Après un séjour en Ecosse, Louis du Mans de Chalais fit transformer, pour lui donner son aspect actuel, qui ressemble à un château écossais.","habitants":"Génusse; famille de  Léon Périer du Coudr                           Vaucenay; Famille des du Vigneau                                                                         Hauterive Famille du Bellay                                                    Roches; Famille de   Louis du Mans de Chalais\r\n        \r\n        \"","divers":"Trois châteaux à Argenté , Grenusse grav-1, Mantaigu grav-2, Roches grav-3  GPS : 48° 03' 28\" Nord, 0° 37' 45\" Ouest","gps":"48° 03' 28\" Nord, 0° 37' 45\" Ouest","images":["../image/image_53/53_Argentr%c3%a9_1.jpg","../image/image_53/53_Argentr%c3%a9_2.jpg","../image/image_53/53_Argentr%c3%a9_3.jpg","../image/image_53/53_Argentr%c3%a9_4.jpg"]},"Consult_chateau_formulaire4afb":{"id":"Consult_chateau_formulaire4afb","dept":"53","canton":"Lassay-les-Châteaux","commune":"Aron","nom":"Aron_Tour_Eugène","type":"Château","periode":"XI-XV","histoire":"ARON, était protégé par des fossés. Eugène Sue (1804-1857) était le parent du Maître des Forges Louis Bigot et aurait rédigé son roman Le Juif errant au premier étage de la Tour d'Aron, faisant ensuite parvenir ses écrits, à son journal par la diligence de Paris. Les ravages de la guerre de Cent ans, puis de la Ligue, contribuèrent à sa destruction.","architecture":"ARON, c'était un château fort, de type Médiéval, protégé de fossés. Il ne reste qu'une tour, appelé la Tour Eugène Sue, unique vestige situé dans le Parc des Forges d'Aron. C'est une tour ronde, entourée d'un fossé comblé, aujourd'hui. Il ne reste que le Donjon du château d'Aron qui date du XIe siècle, seul vestige de l'ancien château, qui se trouve dans le parc des Forges. Eugène Sue vécut au XIXe siècle dans cette tour de style Médiéval. Ses vestiges sont situés dans le parc des Forges d'Aron.","habitants":"Maître des Forges Louis Bigot\r\n        \"","divers":"A Aron la tour Eugène                                                                     GPS : 48° 17' 51\" Nord, 0° 33' 30\" Ouest","gps":"48° 17' 51\" Nord, 0° 33' 30\" Ouest","images":["../image/image_53/53_Aron_Tour_Eug%c3%a8ne_1.jpg","../image/image_53/53_Aron_Tour_Eug%c3%a8ne_2.jpg"]},"Consult_chateau_formulairea49a":{"id":"Consult_chateau_formulairea49a","dept":"53","canton":"Meslay-du-Maine","commune":"Arquenay","nom":"Arquenay_Champfleury","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux à Arquenay; Champfleury et Motte-Henry CHAMPFLEURY,  fut érigée en châtellenie en 1578. Elle englobait les seigneuries des paroisses d'Arquenay, Le Bignon et Maisoncelles. Propriété de la famille d'Arquenay dès 1418. En 1567 le domaine échut à la famille d'Angennes à la suite du mariage de Julienne d'Arquenay (âgée de 15 ans) avec Nicolas d'Angenne. En 1652, Philippe de Bouillé, comte de Créance et son épouse, Maris du Bois, achetèrent le château et les seigneuries annexes. Julien Chaudet, sieur de l'Étang, maître d'hôtel à Champfleury, fut assassiné par un domestique le 7 mars 1660. Saisie en 1682 à la requête de Jean Baptiste Colbert, ministre d'État, l'édifice fut acquis le 9 mai 1692, par Hyacinthe de Quatrebarbes, marquis de la Rongère et seigneur de Saint-Denis du Maine. En 1708, une nouvelle vente permettait à Champfleury de devenir la propriété de René François de Farcy, seigneur de Pont Farcy, passant ainsi dans la famille de Farcy. Suite à l'émigration de François Annibal de Farcy, cette terre fut mise en vente comme bien national. Jambe d'Argent, le 28 septembre 1794, vient s'aboucher dans ses murs avec Monsieur Jacques. Le château fut également l'un des centres d'action du soulèvement de 1832. A cette époque Camille de Farcy en était le châtelain.","architecture":"CHAMPLEURY, Il comporte encore des douves.C'est en 1578, que la terre de Champfleury fut érigée en châtellenie.  le château de Champfleury est orienté nord-sud. La façade sud présente un corps de logis flanqué de deux pavillons carrés. Elle est composée d'un rez-de-chaussée, d'un étage et des combles, sans oublier les escaliers qui la précèdent. La façade opposée, qui donne sur les douves, est dotée d'un pavillon. Surmonté d'un dôme et d'un clocheton, qui renferme, l'escalier. A l'intérieur du château, outre un élégant escalier en tuffeau, trône un billard construit selon le goût du XIXe siècle, Champfleury possède une cave voûtée qui conserve, été comme hiver, une température invariable de 14° C.                                    MOTTE-HENRY,  du XIXe,  est construit autour de 1850 à proximité dune authentique motte féodale, dont les superstructures ont disparu depuis le XVe siècle. Éléments primitifs fondamentaux de la castellologie médiévale, la motte et sa basse-cour sont bien conservés et méritent lintérêt. Le château moderne est cantonné aux angles de quatre tours circulaires à mâchicoulis et doté dun avant-corps carré à lallure de châtelet, il combine des éléments du gothique flamboyant et de la Renaissance, il le fait toutefois sans surcharge ni démesure excessives. La décoration intérieure se signale par les lambris et des plafonds à caissons du XIXe siècle, transformé en hôtel par la comtesse d'Argouges.\r\nÉléments protégés MH : la motte médiévale à deux enceintes : inscription par arrêté du 26 juillet 1991.","habitants":"Champfleury; Famille de Farcy\r\n        \r\n        \r\n        \"","divers":"Champfleury; grav-1-2-3                                                               GPS : 47° 59' 49\" Nord, 0° 36' 50\" Ouest                                                       Motte Henry grav-4                                                                           GPS : 47° 58' 23\" Nord, 0° 35' 15\" Ouest","gps":"47° 59' 49\" Nord, 0° 36' 50\" Ouest","images":["../image/image_53/53_Arquenay_1.jpg","../image/image_53/53_Arquenay_2.jpg","../image/image_53/53_Arquenay_3.jpg","../image/image_53/53_Arquenay_4.jpg"]},"Consult_chateau_formulaire1db6":{"id":"Consult_chateau_formulaire1db6","dept":"53","canton":"Lassay-les-Châteaux","commune":"Martigne sur Mayenne","nom":"Aulne_Montgenard","type":"Château","periode":"XVII","histoire":"Il existe quatre châteaux dans le village : dont   Aulne, la Motte Husson du XIXe siècle , des Essarts et de Mythème du XIXe siècle.                                                                       AULNE-MONTGENARD. les Montgenard disparurent de bonne heure et après Jean de Montgenard qui vivait encore en 1219, nous trouvons une grande lacune jusquen 1477. Montgenard fût détaché entre 1477 et 1501 du Grand Montgenard. Cest sans doute de Tristan de Fontenailles, capitaine du château de Mayenne en 1589, que Montgenard pris le nom de « Montgenard le Capitaine ». Les Fontenailles en seront propriétaires de 1501 à 1665. Le nom de lAulne-Montgenard est dû à la famille de Montpinçon au milieu du XVIIIe siècle. Xavier dOzouville acquit lAulne vers 1860. Il mourût en 1863. Sa sur Isabelle dOzouville en devint propriétaire en rachetant les parts de ses frères et surs. La petite fille dIsabelle née en 1899, hérite de lAulne Montgenard, elle épouse Antoine de Lambertye, ils neurent pas denfants. Leur neveu par alliance, Jean-François Marès achète lAulne-Montgenard en 1975.","architecture":"AULNE-MONTGENARD, la construction du château de l'Aune-Montgenard date du XVIIe siècle. A lorigine, le grand Mongenard et le petit Montgenard ne devaient former quune seule terre.   Cette même année, il y installe son élevage de poneys du Connemara qui prend comme affixe « LAulne ». Lélevage Connemara de lAulne se distingue au niveau national et international tant en concours délevage quen compétitions. Lélevage est visible sur leur site internet. Se compose d'un corps de logis rectangulaire à trois niveaux dont le troisième dans les combles d'un toit brisé avec lucarnes, flanqué aux extrémités de pavillons carrées et deux pavillons plus importants sur la face côté parc avec lucarnes.","habitants":"Famille de Montpinçon\r\n        \"","divers":"Aulnes grav_1-2                                                                           GPS : 48° 11' 40\" Nord, 0° 39' 47\" Ouest","gps":"48° 11' 40\" Nord, 0° 39' 47\" Ouest","images":["../image/image_53/53_Aulne_Montgenard_1.jpg","../image/image_53/53_Aulne_Montgenard_2.jpg","../image/image_53/53_Aulne_Montgenard_3.jpg"]},"Consult_chateau_formulaire9f2f":{"id":"Consult_chateau_formulaire9f2f","dept":"53","canton":"Ernée","commune":"La Croixille","nom":"Barillère","type":"Château","periode":"XV-XVII","histoire":"BARILLERE, le château se trouve dans le bocage, dans le calme dune demeure familiale au milieu d'un parc aux arbres séculaires, un environnement paisible et une architecture de 700 ans d'histoire,    il nen reste de vestiges quune tour qui date de la domination anglaise et qui donnerait à penser que ce château a été fortifié (travers de château ou douves à lOuest). La Barillère est dabord la propriété du sieur Baril de qui elle détient probablement le nom. Elle devient par la suite château de la Barillère. Elle est confisquée par le duc de Bretagne François II à Raoul le Porc et Jeanne de la Barillère et est donnée à Thibault du Matz. Guerre de 100 ans époque de notre sainte Jeanne dArc.","architecture":"BARILLERE, en 1518 elle entre dans la famille dancienne noblesse bretonne. Ceux-ci au gré des ans ajoutent à la tour un manoir puis des bâtiments à lOuest et une chapelle à lEst qui sera démolie en 1863 reconstruite un peu plus loin dans le parc. Cette démolition est faite pour donner au château de grandes pièces de réception sur laile Est. A larrière du château sur la partie manoir du XVe siècle, on trouve à lextérieur des fenêtres à moulurations, un vantail de porte à pli de serviettes qui sera réemployé dans les combles du château.   Au XVIIe siècle on réaménage lescalier à vis central très usé par un escalier de bois à volées droites et balustres tournées. Les pièces du rez de chaussée du corps central sont lambrissées en style louis XV, des appartements sont aménagés avec lambris et parquets à coulisses à létage de laile ouest. Le rez-de-chaussée à louest reste réservé au service. Dans le dernier quart du XIXe siècle (1860), la Barillère connait la transformation fréquente dans la France de louest dun manoir en château pour des raisons bien connues de vie sociale et démulation entre familles. Depuis 1980, le château est petit à petit laissé à labandon. Les toitures commencent à prendre leau et lintérieur du château se dégrade : poutres et plafonds seffondrent, peintures qui sécaillent, boiseries qui pourrissent. Lallée dhonneur qui permettait daccéder au château est envahie par les arbres et disparaît.","habitants":"Famille de la Barillière\r\n        \r\n        \"","divers":"A  le Croixille le château de Barillière grav de 1 à 4:                          GPS : 48° 12'18\" Nord, 1° 03' 21\" Ouest","gps":"48° 12'18\" Nord, 1° 03' 21\" Ouest","images":["../image/image_53/53_Barilli%c3%a8re_1.jpg","../image/image_53/53_Barilli%c3%a8re_2.jpg","../image/image_53/53_Barilli%c3%a8re_3.jpg","../image/image_53/53_Barilli%c3%a8re_4.jpg"]},"Consult_chateau_formulaire831b":{"id":"Consult_chateau_formulaire831b","dept":"53","canton":"Azé","commune":"Bierne","nom":"Barre_Bierne","type":"Château","periode":"XVI-XVIII","histoire":"BARRE, la construction du château de la Barre date du XVIe siècle, pour la famille de Chivré. Le château fut construit sur l'ancien château de la Guénaudière, la Barre sera reconstruit au début du XVIIe siècle, pour Cécile de Montceaux, épouse de Jacques de Chivré. Dans le château, il existe une chapelle ou repose Catherine de Chivré, filleule de Catherine de Bourbon, sur dHenri IV. Le château de la Barre fut un lieu important du comte de la Barre. Au XIVe siècle, la seigneurie appartient à la famille Auvré, les seigneurs successifs sont : Colin Auvré (1362), Robin Auvré (1395), Pierre Auvré (1405) et Jeanne Auvré épouse d'Olivier de Feschal.\r\nFamille de Marigné. En 1414, le seigneur de la Barre est Guillaume de Marigné. En 1474, le seigneur du PLessis de Chivré à Étriché, Jean de Chivré épouse Jacqueline de Marigné. Famille de Chivré et marquisat de la Barre. En 1539, Hector de Chivré marié à Jeanne de Haies déclare son fief de la Guénaudière au sénéchal d'Anjou, vient ensuite Jacques de Chivré dont l'épouse Jeanne de Bouillé était dame d'honneur de la duchesse de Bar. Lui succède Jacques de Chivré dont l'épouse fut Cécile de Montceaux, dame d'honneur de Catherine de Bourbon, sur dHenri IV.  Cécile de Montceaux fait ériger le château de la Barre en lieu et place de celui de la Guenaudière. Le château devient en 1729 la propriété de la famille du marquis de Torcy, Jean-Baptiste Colbert ; il fait ériger le marquisat en comté de la Barre-de-Bierné. L'époux de Constance Colbert de Torcy, Joseph-Augustin, comte de Mailly, maréchal de France hérite du domaine avant que son héritière Anne-Marie-Constance de Mailly vende le château en 1774.","architecture":"BARRE, Famille Dubois Olivier-Ambroise Dubois qui était un contrôleur de Guerre acquiert le château de la Barre. Par un mariage avec un de ses héritiers la famille de Rubiens se trouve en possession du château avant de le céder en 1892 de Chivré de Sottevast. Durant les guerres de la Chouannerie, le château accueille des rassemblements de Chouans. Famille de Chivré. Au XIXe siècle, le baron Alfred de Chivré, capitaine-commandant dans le régiment de dragons, chevalier de la Légion d'honneur et maire de Bierné, rachète le marquisat de la Barre. Ce dernier entreprend d'importants travaux de modernisation du château. Se compose  sur plan d'équerre de trois niveaux, flanqué de pavillons carrées avec fenêtres à meneaux, toit en croupes pour l'ensemble.","habitants":"Famille Auvré,                                                                               Famille de Chivré\r\n        \"","divers":"Château de Barre à Bierne GPS : 47° 49' 23\" Nord, 0° 32' 55\" Ouest","gps":"47° 49' 23\" Nord, 0° 32' 55\" Ouest","images":["../image/image_53/53_Barre_Bierne_1.jpg"]},"Consult_chateau_formulaire4b31":{"id":"Consult_chateau_formulaire4b31","dept":"53","canton":"Lassay-les-Châteaux","commune":"Moulay","nom":"Basmont","type":"Château","periode":"XVII","histoire":"BASMONT, il fut construit en 1669 par Germain Ricur, maître de forges, lun des premiers industriels de la région. Le château du Basmont, intégré dans le domaine de la Marjolaine, à Moulay, à trois kilomètres de Mayenne, vient dêtre entièrement restauré par son propriétaire, Jean-Marie Chapin Celui-ci invite le public à le visiter, le tout au profit de lassociation France-Alzheimer.","architecture":"BASMONT, comme  la Marjolaine \"hôtel\", construction rectangulaire à deux niveaux toit en croupes avec série de lucarnes sur combles recouvert d'ardoises, les deux édifices sont prolongés sur les flancs droit et gauche par des prolongement d'un niveau en retour d'équerre. Habité depuis cinq ans, il prenait leau, se délabrait à vue dil, se souvient Jean-Marie Chapin. À part la façade, tous les murs ont été écroulés avant dêtre rebâtis. On en a profité pour lagrandir et rétablir sa symétrie. Charpente et toiture ont aussi été refaites à neuf. \r\nBien quil ne soit pas classé M.H., seulement inscrit, le château a bénéficié dune restauration « dans les règles de lart », insiste Jean-Marie Chapin. À lintérieur, des salles de séminaire, une salle de billard français, un hammam, un jacuzzi, une salle de sport et dix chambres dhôtel.","habitants":"Famille Chapin\r\n        \r\n        \"","divers":"Château de Basmont à Moulay","gps":"","images":["../image/image_53/53_Basmont_1.jpg","../image/image_53/53_Basmont_2.jpg"]},"Consult_chateau_formulaire464d":{"id":"Consult_chateau_formulaire464d","dept":"53","canton":"Cossé-le-Vivien","commune":"Saint-Saturnin du Limet,","nom":"Beauchêne_53","type":"Château","periode":"XVIII","histoire":"BEAUCHENE, le nouveau château de Beauchêne fut construit de 1778 à 1780 par le marquis René Jacques de Juigné avec les pierres de lancien château en ruine qui se trouvait aux Bocquetières. En 1778.","architecture":"BEAUCHENE, présente un vaste corps de bâtiment rectangulaire percé de multiples ouvertures. En façade, le fronton triangulaire conserve les sculptures de maître Rouade de Toulouse. De part et d'autre de la cour d'honneur, deux bâtiments, d'une architecture tout aussi rigoureuse et symétrique, abritent communs et écuries, dotés d'une belle charpente. Tout ici révèle le goût de la symétrie du constructeur du bâtiment, reflet de l'architecture des Lumières. L'alliance de Juigné et du Boberil, symbolisée par les deux écus qui ornent le fronton triangulaire de la façade, intervient en 1786, lors du mariage de la fille de René Jacques de Juigné avec le marquis du Boberil. Bien que dépouillé de son mobilier lors de la Révolution, le château de Beauchêne n'a pas été endommagé et des membres de la famille du Boberil y résident toujours.","habitants":"marquis René Jacques de Juigné\r\n        \"","divers":"Saint Saturnin du Limet le château de Beauchêne                                     Gps 47° 48' 43? nord, 1° 04' 05? ouest","gps":"","images":["../image/image_53/53_Beauch%c3%aane_53_1.jpg","../image/image_53/53_Beauch%c3%aane_53_2.jpg","../image/image_53/53_Beauch%c3%aane_53_3.jpg"]},"Consult_chateau_formulairee001":{"id":"Consult_chateau_formulairee001","dept":"53","canton":"Saint-Berthevin","commune":"Changé","nom":"Beauvais_53","type":"Château","periode":"XIV-XV-XIX","histoire":"BEAUVAIS, par la famille des seigneurs de Mayenne. Famille de Mathefelon, Thibault Ier de Mathefelon, époux de Mahaud de Mayenne. Thibault II de Mathefelon. Phoquet ou Foulques II de Mathefelon,Thibault III de Mathefelon, à la mort de son frère, en 1255.   Famille de Montenay, Guérin et Bouchard  Guillaume de Montenay, Aymeric Guérin, époux de Jeanne de Montenay. Jean Bouchard, époux d'Aymerie Guérin  Pierre Bouchard.   Famille du Bailleul et de Favières. Famille de Charnières et de Dampierre. Famille de Quatrebarbes, puis à  René Dorion,  Jean-Gabriel Levesque des Valettes, époux de Marie-Marthe Dorion . Marie-Catherine Levesque des Valettes, épouse de Jérôme-Pierre Leclerc des Gaudesches. Marie Leclerc des Gaudesches, Hardy de Lévaré. Frédéric Godeau.  Général Charles de Gaulle (1890-1970), en juin 1940  lors du repli du gouvernement français à Tours, Charles de Gaulle alors sous secrétaire à la défense nationale au sein du gouvernement de Paul Reynaud logea quelques jours au château de Beauvais.                                                                                                            RICOUDET, dinspiration néo-moderne, doit sa construction en 1864 à « un caprice de dame ». Le Comte Christian dElva avait reçu en dot le château familial, actuelle mairie de Changé. En contrepartie, son père, le Comte Auguste dElva, fit construire pour son épouse, Alix de Quelen, le château. Le comte Christian dElvan, né à Changé le 21 septembre 1850,  sy installa et embrassa rapidement une carrière politique sous la IIIème République naissante. Il fût maire de Changé de 1884 à 1925, conseiller général de Laval de 1889 à 1925, député de la Mayenne de 1889 à 1906 puis sénateur de 1906 à sa mort en 1925. Il siégeât dans le groupe parlementaire conservateur de la Gauche Républicaine et fût très impliqué dans la vie politique du département.","architecture":"BEAUVAIS, c'était un château fort, de style Médiéval. Il était le siège d'une châtellenie assez considérable, qui relevait, pour la plus grande partie de la châtellenie de Saint-Ouën-des-Toits, membre du Comté de Laval. Sa mouvance s'étendait sur un grand nombre de terres et fiefs de moindre importance, situés dans les paroisses d'Andouillé, Changé, La Baconnière, Le Bourgneuf-la-Forêt, Le Genest, Saint-Germain-le-Fouilloux, Saint-Jean-sur-Mayenne et Saint-Ouën-des-Toits. En 1388, un accort fait entre messire Guy, sire de Laval, et Pierre, sire de Mathefelon, pour raison de deux estangs sis au dessous de l'herbegement de Beauvoirs et aultres choses y contenues. Cette pièce porte la date du vingtième jour du mois de mars lan de grace mil trois cens quatre vingt et huit. Le sire de Mathefelon et le sire de Laval avaient eu de nombreux et longs démêlés au sujet de deux étangs qu'ils possédaient en commun tout près du château de Beauvais et de plusieurs faits exercés par les gens et officiers de justice des deux seigneuries. En 1388, un accord intervint entr'eux pour régler et terminer ces différends. En 1710, la haute et moyenne justice, ainsi que le titre de châtellenie n'étaient plus attachés au fief de Beauvais.                                       RICOUDET Inspiré des villas italiennes de la Renaissance, avec son plan massé, la saillie de son avant-corps ouvert sur la rivière, il offre depuis sa terrasse et son belvédère une large vue sur la vallée de la Mayenne. Le bâtiment à trois niveaux possède une tour carré belvédère au nord, une serre accolée au sud et un avant corps avec oriel (la loggia) au sud-est. La toiture est bordée de balustrades.","habitants":"Famille de Mathefelon \r\n        \"","divers":"Deux châteaux à Changé celui de Beauvais grav -1 et de  Ricoudet grav 2-3                                                                 GPS : 48° 06 00\" Nord, 0° 47' 27\" Ouest","gps":"48° 06 00\" Nord, 0° 47' 27\" Ouest","images":["../image/image_53/53_Beauvais_53_1.jpg","../image/image_53/53_Beauvais_53_2.jpg"]},"Consult_chateau_formulaireb20d":{"id":"Consult_chateau_formulaireb20d","dept":"53","canton":"Villaines-la-Juhel","commune":"Champfrémont","nom":"Bellière","type":"Château","periode":"XVII-XIX","histoire":"BELLIERE, la seigneurie de La Bellière est connue depuis au moins 1478. Un logis a été édifié par la famille des Portes au XVIIe siècle. L'Architecte était Delarue. Apporté par mariage aux Vaucelles de Ravigny en 1695, sa silhouette reste la même jusqu'à ce qu'Emmanuel-Alexandre de Vaucelles entreprenne une vaste campagne de \"mise au goût du jour\" de 1798 à 1813 : L'Architecte était Delarue. Au XVIIe siècle, un logis fut construit par la famille des Portes. Il fut apporté en dot à la Famille de Vaucelles de Ravigny en 1695. Emmanuel-Alexandre de Vaucelles de Ravigny le fit remanier, entre 1790 et 1813.  Son propriétaire actuel est la Famille Mery de Bellegarde.","architecture":"BELLIERE, sa construction date du XVIIe à 1813.l'édifice est réhaussé et chemisé, le décor intérieur est entièrement repris et le jardin classique laisse place à un parc à l'anglaise, le tout sous la direction de l'architecte Delarue, d'Alençon. Le décor intérieur remarquable est à rapprocher de l'oeuvre de Percier et Fontaine. Ses décors intérieurs sont de style Directoire et Empire. Son propriétaire actuel est la Famille Mery de Bellegarde. Le château de la Bellière est inscrit partiellement aux M.H. depuis le 6/09/1995. Le Domaine est ouvert davril à septembre : horaires et jours douverture disponibles à lOffice du Tourisme de Saint Pierre des Nids (21, grande rue, 53370). Le parc et les jardins sont ouverts pour une visite guidée,lors Journées Européennes du Patrimoine le 3ième WE de septembre.  Éléments protégés MH : le château et l'aile de communs du XVIIe siècle ; les façades et les toitures des communs du XIXe siècle, les douves ainsi que les jardins avec leurs clôtures : inscription par arrêté du 6 septembre 1995.","habitants":"Famille des Portes\r\n        \"","divers":"Château de Béllière  grav 1-2-3  à Champfrémont                           GPS : 48° 25' 37\" Nord, 0° 04' 42\" Ouest","gps":"48° 25' 37\" Nord, 0° 04' 42\" Ouest","images":["../image/image_53/53_Belli%c3%a8re_1.jpg","../image/image_53/53_Belli%c3%a8re_2.jpg","../image/image_53/53_Belli%c3%a8re_3.jpg"]},"Consult_chateau_formulaired3f1":{"id":"Consult_chateau_formulaired3f1","dept":"53","canton":"Lassay-les-Châteaux","commune":"Rennes en Grenouille","nom":"Bois_du_Maine","type":"Château","periode":"XV-XVII","histoire":"BOIS du MAINE, placé à la frontière de la Normandie et du Maine, cité au XIe siècle et très impliqué dans la guerre de Cent Ans, ce château est attesté en 1415 comme \"clos à douves\" et détenteur dun droit de haute et basse justice. En 1330, Bois du Maine appartenant à Guillaume de Boulay, chevalier et seigneur du lieu, le bâtiment fut occupé par les troupes anglo-navarraises au début de la guerre de Cent Ans, de 1356 à 1364.","architecture":"BOIS du MAINE,  sa construction se fait en plusieurs phases : tandis que la tour Nord serait du XIVe ou du XVe siècle, le corps central est édifié au XVe siècle, et restauré aux XVIIe et XVIIIe siècles, la tour sud date de 1769. Laspect du bâtiment, dominé par la fausse symétrie existant entre les deux tours, est composite. Lélément le plus intéressant en est la tour nord qui conserve plusieurs éléments des XIVe et XVe siècles, des mâchicoulis, une charpente en parapluie, au niveau des caves et plusieurs archères destinées à protéger les douves,  la construction du château date du XIe, XVe, XVIe, XVIIe siècle. Il fut cité au XIe siècle, très impliqué dans la Guerre de Cent Ans, ce château est attesté en 1415 comme «clos à douves» et détenteur dun droit de haute et basse justice. lélément le plus intéressant en est la tour Nord qui conserve plusieurs éléments des XIVe et XVe siècles : ses mâchicoulis, une belle charpente en parapluie et, au niveau de ses caves, plusieurs archères destinées à protéger les douves. Le château de Bois-de-Maine se situe sur la rive gauche de la Mayenne. Le château du Bois-du-Maine est inscrit aux M.H. le 27/10/1967, partiellement, pour ses façades et toitures. Le château du Bois-du-Maine est privé, mais ouvert au Public,monsieur Mollat Desmontier propriétaire actuel.  Éléments protégés MH : les façades et toitures du château du Bois du Maine : inscription par arrêté du 27 octobre 1967.","habitants":"Famille de  Guillaume de Boulay\r\n        \"","divers":"château du Bois du Maine à Rennes en Grenouille                 GPS : 48° 29' 50,28\" Nord, 0° 31' 04,44\" Ouest","gps":"48° 29' 50,28\" Nord, 0° 31' 04,44\" Ouest","images":["../image/image_53/53_Bois_du_Maine_1.jpg","../image/image_53/53_Bois_du_Maine_2.jpg"]},"Consult_chateau_formulaire17d2":{"id":"Consult_chateau_formulaire17d2","dept":"53","canton":"Lassay-les-Châteaux","commune":"Lassay les Châteaux","nom":"Bois_Thibault","type":"Vestiges","periode":"XII-XV","histoire":"BOIS-THIBAULT,  forteresse  est attestée dès le XIIe siècle. Elle appartient alors aux puissants seigneurs de Mayenne, avant de passer à la famille de Vendôme au siècle suivant, les du Bellay. Destruction et réparée en 1385 elle est presque ruinée à l'issue d'un siège infructueux, en 1417. Charles VII demande son démantèlement en 1422 afin d'éviter qu'elle ne serve de point d'appui à l'ennemi. Jean II de Vendôme obtient de ce souverain l'autorisation de la reconstruire en 1457. Détruite durant la Guerre de Cent Ans, elle est entièrement reconstruite dans la deuxième moitié du XVe siècle. Transmise par liens de sang ou par mariage, la demeure fut habitée jusquen 1830. Abandonné en 1830, le château sombra dans l'oubli. En 1862 il fut classé M,H. la mairie l'achète et une association se charge de sa restauration. C'était lun des châteaux les plus importants de la Baronnie de Mayenne. Il fut transmis constamment aux descendants de la même famille et fut habité jusquen 1830. L'Association Bois-Thibault, \"Passé & Avenir\" a été créée en 1984. Elle organise chaque année, des chasses au trésor et plusieurs animations. La Commune de Lassay-les-Châteaux a racheté le château en 1988. Depuis le 8 mai 2013, il ouvre ses portes au Public de façon régulière.","architecture":"BOIS-FROU, la construction du château de Bois-Frou date du XVIe siècle. C'est le 3ème château sur la route de Niort-la-Fontaine. Il comporte des détails de la Renaissance. Il s'agit d'une construction postérieure à 1590, date du mariage de Jean de Madaillon avec Judith de Chauvigné, Dame de Bois-Frou. Le Marquis de Lassay donne en 1769, cette description : « au Bois-Frou, manoir, maison, écurie, quatre tours aux coins de la principale cour, une fontaine avec jet deau au milieu de ladite cour close de murailles, et pont-levis et en partie entourée de douves ; autre cour dentrée, aussi close de murailles ; deux poteaux dentrée et de sortie ; la chapelle fondée de Sainte-Anne, placée au bout de la cour ; trois petites tours proches desdits poteaux, une terrasse au-dessous plantée despaliers, un pigeonnier et le colombier à 6 piliers». Seul, au milieu des près qui étaient autrefois de somptueux jardins, le Château du Bois Frou ouvre les portes de limagination pour reconstituer une demeure disparue.                                                                   BOIS-THIBAULTfut construit sur l'emplacement d'un ancien château féodal, détruit après la Guerre de Cent Ans. Le corps de logis est constitué de deux bâtiments en équerre flanqués de 2 tours rondes. L'ensemble était desservi par une tour escalier de forme octogonale. C'était lun des châteaux les plus importants de la Baronnie de Mayenne.Le Château du Bois-Thibault est classé aux M.H. depuis 1925.\r\nÉléments protégés MH : le château de Bois-Thibaut (vestiges) : classement par arrêté du 22 octobre 1925.","habitants":"Famille de Vendôme et Seigneur locaux\r\n        \"","divers":"Vestige de Bois-Thibault et  Bois-Frou  grav 8                                             GPS : 48° 26' 42,58\" Nord, 0° 31' 3,14\" Ouest","gps":"48° 26' 42,58\" Nord, 0° 31' 3,14\" Ouest","images":["../image/image_53/53_Bois_Thibault_1.jpg","../image/image_53/53_Bois_Thibault_2.jpg","../image/image_53/53_Bois_Thibault_3.jpg","../image/image_53/53_Bois_Thibault_4.jpg","../image/image_53/53_Bois_Thibault_5.jpg","../image/image_53/53_Bois_Thibault_6.jpg","../image/image_53/53_Bois_Thibault_7.jpg","../image/image_53/53_Bois_Thibault_8.jpg"]},"Consult_chateau_formulaire570d":{"id":"Consult_chateau_formulaire570d","dept":"53","canton":"Cossé-le-Vivien","commune":"La Boissière","nom":"Boissière_53","type":"Forteresse","periode":"XIV-XV","histoire":"La BOISSIERE, le château de La Boissière aux confins de deux provinces a été occupé par les Anglais durant la guerre de Cent Ans et a fait partie des forteresses restituées au roi de France par le traité de Brétigny. Le roi le confia par la suite à la famille d'Argennes qui l'a conservé jusqu'en 1627. Jacques d'Argennes, seigneur de Rambouillet était en 1567, sénéchal du Maine. En 1698 il est acquis par Gabriel de Scepeaux dont la famille y habitera jusqu'au XVIIIe siècle. Une tour de guet est construite au XIIe siècle, sur la frontière entre l'Anjou et la Bretagne. Il existait déjà à cet endroit un gué franchissant la rivière et ce depuis fort longtemps puisqu'on y a retrouvé deux rouelles gauloises. Une voie romaine passait sur la crête, face à la tour de guet, celle ci est toujours en place neuf siècles après sa construction. Au XIIIe ou XIVe siècle, elle est dotée au sud, d'un corps de logis avec une tourelle d'escalier extérieure placée en coin, entre les deux bâtiments. A la fin du XIVe siècle, une tour de remplissage vient compléter ces deux bâtiments et un rempart est aménagé perpendiculairement à la tour de guet du XIIIe ou XIVe siècle. Au XVIIe siècle, le rempart et cette tour sont arasés pour aménager un corps de ferme. À partir de cette époque, le château n'est plus qu'un bâtiment de la ferme, jusqu'à son achat en 1980 par l'actuel propriétaire M. Aubry qui s'emploie depuis à lui rendre son aspect originel.","architecture":"BOISSIERE, les matériaux employés à sa construction sont le grès bleu de Craon, le roussard et le schiste. Sur la façade ouest apparaissent des fenêtres à meneaux de grès, fermées. Sur celle du nord deux fenêtres romanes ont été rouvertes et le petit édicule en saillie correspond au four à viande aménagé dans une des cheminées du logis. L'intérieur est desservi par un escalier à l'axe de grès bleu. Les pièces ont gardé leurs belles cheminées. Une belle charpente du XIVe siècle a été conservée, la terrasse permet d'embrasser un très vaste horizon. Les douves du nord et de l'ouest sont alimentées par le Chéran, affluent de l'Oudon, au sud et à l'est, elles sont surélevées de 1,25 m et sont alimentées par des sources...\r\n  Il n'existait au XIIe siècle, qu'une seule tour de guet, utilisée par les soldats, pour défendre le duché d'Anjou contre le duché de Bretagne. La tour fut bâtie au niveau d'un gué, pour permettre de franchir, le Chéran, une rivière locale. L'accès aux étages de la tour s'effectuait grâce à des échelles intérieures. Ce n'est qu'au XIVe siècle, que la tour va devenir un château par une adjonction au sud, apportant une grande pièce, à chaque étage, ainsi qu'un grand escalier dans une tourelle. Puis à la fin du XIVe siècle, une tour de remplissage apportera au château de la Boissière sa forme carré actuelle, en y apportant des latrines. Jouxtant le château  un ancien rempart est arasé au XVIIe siècle, pour y construire un corps de ferme. Restauré depuis 1980, \r\nÉléments protégés MH : le corps de logis et les douves : inscription par arrêté du 16 janvier 1987.","habitants":"Famille d'Argennes \r\n        \"","divers":"Château de la Boissière                                                                GPS : 47° 46' 57\" Nord, 0° 58' 34\" Ouest","gps":"47° 46' 57\" Nord, 0° 58' 34\" Ouest","images":["../image/image_53/53_Boissi%c3%a8re_53_1.jpg","../image/image_53/53_Boissi%c3%a8re_53_2.jpg","../image/image_53/53_Boissi%c3%a8re_53_3.jpg","../image/image_53/53_Boissi%c3%a8re_53_4.jpg"]},"Consult_chateau_formulaire44b7":{"id":"Consult_chateau_formulaire44b7","dept":"53","canton":"Meslay-du-Maine","commune":"Torcé Viviers en Charnie","nom":"Bouillé_Torcé","type":"Château","periode":"XV-XVI","histoire":"BOUILLE, les ruines du château de Bouillé, datent du du XVe au XVIe siècle. Pendant la guerre de Cent Ans, les Anglais s'emparent du château. Ils en sont chassés par Ambroise de Loré, défenseur de Sainte-Suzanne. Éléonore-Renée de Bouillé, seule héritière d'une immense fortune, épousa en 1644 Henry de Daillon, marquis d'Illiers, fils du comte du Lude, dont elle n'eut pas d'enfants. Éléonore (1681) est l'une des plus célèbres figures de la famille de Bouillé. Mentionnée dans la correspondance de Madame de Sévigné, elle paraît peu à la Cour et préfère se consacrer à sa passion, la chasse, en forêt de Charnie. Elle a fait l'objet de légendes mettant en scène sa cruauté. On dit que son spectre, celui de la \"Dame verte\", hantait les murs du château du Rocher à Mézangers, propriété de la famille de Bouillé à partir de 1624. Le château de Bouillé, vendu d'abord en 1684 au duc de Conti par un acte que la princesse de Conti révoqua, fut définitivement acquis par Jean-Louis Portail, chevalier, seigneur de Vaudreuil, président à mortier au parlement de Paris, le 26 mars 1732. Une vente nationale du domaine, divisé en 19 lots, eut lieu le 19/06/1794 et, fut attribuée à Louise-Aglaé de Conflans, duchesse de Rohan-Montbazon, héritière de Louis-Gabriel, marquis de Conflans et d'Antoinette Portail. Ses goûts l'éloignèrent toujours de la cour, où son rang lui donnait entrée. Elle ne se plaisait que dans ses terres, avec ses chevaux et ses chiens à courre les cerfs et les chevreuils de la Charnie; elle y mourut en 1681, dans sa résidence de la Meute, et fut inhumée dans le caveau de l'église de Torcé. Il ne reste aujourd'hui de l'ancien château de Bouillé, que sa tour, transformée depuis en une maison d'habitation.","architecture":"BOUILLE,  le château et le bourg de Bouillé furent brûlés au moment de la guerre des Anglais, ce qui força Foucquet de Bouillé et Jeanne de Boisgamats, sa femme, à se réfugier à Laval et à demeurer pendant quelque temps. Le château-fort augmenté successivement, ressemblait plutôt à une ville qu'à une maison particulière, l'incendie força à le rebâtir et à en faire une des plus belles maisons du royaume. Le château en 1689, est composé \"d'un corps de logis où il y a plusieurs accompagnements et logements de salles basses et hautes, de chambres et antichambres, de cabinets, de cuisines, d'offices, de caves une chapelle au bout dudit accompagnement, une cour close de murailles, trois cours aux environs d'icelle, écuries, portes cochères, ponts-levis, planchettes, terrasses et fossés revêtus de fortes murailles, une basse cour composée de plusieurs bâtiments et écuries, granges et étables; tous lesdits bâtiments couverts d'ardoises; jardins, vergers et issues joignant ledit château, et trois avenues revêtues de bois de haute futaye, deux jeunes bois de haute futaye proche les avenues nommés les Semés contenant environ trois arpens au milieu desquels est un bâtiment logeable avec chapelle du Semé, fondée sous le nom de Saint René\". Pendant la guerre de Cent Ans, les Anglais s'emparent du château, ils en sont chassés.                                      ORBIERE  La construction  date de 1901 à 1903, par l'architecte Léopold Ridel, qui  s'est inspiré de l'architecture normande, en vogue à cette époque. A été commandité par Adolphe Masseron, industriel lavallois du textile, Fondateur de laérodrome de Beausole il et président de la chambre de commerce et dIndustrie de Mayenne, en 1900. En juin 1940, le château de l'Orbière fut réquisitionné par les Allemands. En 1952, le général de Gaulle et sa femme séjournent à LOrbière.","habitants":"Famille de Bouillé\r\n        \r\n        \"","divers":"Deux châteaux à Torcé Bouillé grav 1-2-3-(4 Mairie) et Orbière grav 5-6-7.                                                              GPS : 48° 06' 13\" Nord, 0° 15' 12\" Ouest","gps":"48° 06' 13\" Nord, 0° 15' 12\" Ouest","images":["../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_1.jpg","../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_2.jpg","../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_3.jpg","../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_4.jpg","../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_5.jpg","../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_6.jpg","../image/image_53/53_Bouill%c3%a9_Torc%c3%a9_7.jpg"]},"Consult_chateau_formulaire0f2a":{"id":"Consult_chateau_formulaire0f2a","dept":"53","canton":"Evron","commune":"Montourtier","nom":"Bourgon_53","type":"Château","periode":"XV-XVII","histoire":"BOURGON,  est un ancien château fort qui date du XVe siècle. En 600 ans, le château de Bourgon na été vendu que 2 fois. Il a appartenu aux Montmorency au XVIIe siècle. C'est un château construit au XVe siècle et en six cents ans.  la marquise de Sablé, épouse dUrbain de Montmorency Laval, une chapelle datant de 1528 et un pont traversant les anciennes douves. Il a été racheté en 2004 par M. et Mme Ducatillon, un couple venant de la région du Nord de la France.","architecture":"BOURGON, c'est un château de style Renaissance construit au XVe siècle. Le château reconstruit au XVe siècle. La salle principale et lescalier sont du XVe siècle, avec une construction de pierres. Les autres pièces ont été rajoutées plus tardivement (sauf le petit salon qui serait une des parties de l'ancien château, et possèdent de remarquables boiseries du XVIIIe siècle. Le château renferme des pièces très particulières : une bibliothèque garnie des livres de quelques centaines dannées, un chartrier datant de plus de 600 ans où sont conservées les archives du château, la chambre très particulière nommée « le cabinet bleu » de la marquise de Sablé, épouse dUrbain de Montmorency-Laval, une chapelle datant de 1528 et, un pont traversant les anciennes douves qui sont asséchées depuis. Communs de la fin du XVIIIe siècle. Les jardins occupent les mêmes parcelles qu'aux XVIe et XVIIe siècles. L'aménagement intérieur de la salle à manger et du salon datent du XVIIIe siècle (entre 1734 et 1761). Le décor actuel de la salle à manger date du début du XXe siècle, le salon a gardé ses décors des environs de 1830. L'actuelle salle de bains (ancien cabinet peint) possède un plafond peint du XVIIe siècle, de même que la chambre peinte dont le plafond est peint en trompe-l'oeil imitant la tapisserie au point de Hongrie (1er quart XVIIe siècle). Ces pièces ont conservé leurs sols du XVIIe siècle. Il est classé aux M.H. depuis 9/08/1996. La French Héritage Society fait un don en 2009 pour la restauration du château de Bourgon et des travaux importants de toiture furent programmés, de 2010 à 2012, agréés par demeure historique. De la route, on aperçoit le château, sa tour médiévale et la chapelle.","habitants":"Famille de Montmorency.\r\n        \"","divers":"Château de Bourgon à Montourtier                                                GPS : 48° 13' 22,8\" Nord, 0° 33' 39,6\" Ouest","gps":"48° 13' 22,8\" Nord, 0° 33' 39,6\" Ouest","images":["../image/image_53/53_Bourgon_53_1.jpg","../image/image_53/53_Bourgon_53_2.jpg","../image/image_53/53_Bourgon_53_3.jpg","../image/image_53/53_Bourgon_53_4.jpg"]},"Consult_chateau_formulaire244f":{"id":"Consult_chateau_formulaire244f","dept":"53","canton":"Meslay-du-Maine","commune":"Bouère","nom":"Bouère","type":"Château","periode":"XVII","histoire":"Le château de la Vezouzière et orangeries (XVIIIe),  des Rochers (XIXe), de la Sevaudière (XIXe), Daviers (XIXe) et du Plessis  (face à l'entrée secondaire du \"Bois-Jourdan\").                                                      BOIS-JOURDAN,   a e´te´ construit sous le règne de Louis XIII par Franc¸ois de Boisjourdan, le nom proviendrait des exploits de Hugues du Bois, membre le plus ancien de cette famille, durant une croisade sur les bords du Jourdain.                                                                    SEVAUDIERE, la Petite Sévaudière était la ferme du château et bénéficie de ce fait d'un bâti historique de grande qualité. Vous pourrez y découvrir des étables à l'ancienne avec auges en pierres et râteliers en bois mais aussi l'orangerie du château ainsi que la boulangerie et le fruitier.Cette ensemble bien préservé s'inscrit par ailleurs dans un bocage encore très serré et de bonne qualité.               DAVIER pas d'information historique, gîtes de France.","architecture":"BOIS-JOURDAN,  est construit sur le Fondreux. Le corps principal du logis date du XVIIe siè`cle, mais a du être reconstruit sur l'emplacement d'un ancien château féodal. La chapelle, au toit en contre-courbe, a été´ construite sur un rocher au siècle de Louis XIV. Les bâtiment qui jouxtent le château, l'orangerie et la buanderie, datent du XVIIe siècle également. Éléments protégés MH : les façades et les toitures du château et des dépendances à savoir : la chapelle, la buanderie, le bâtiment à tourelle accolé au château, la grande fuie et l'orangerie, le grand salon avec son décor Directoire : inscription par arrêté du 18 mars 1980,  la construction du château du Bois-Jourdan date du XVIe au XVIIe siècle, avec ses dépendances. Les éléments protégés du château aux M.H. le 18/03/1980      sont : les communs, la chapelle, la buanderie, le pigeonnier, l'orangerie, la tourelle, le salon, l'élévation, la toiture et le décor intérieur du château.","habitants":"Famille de Bois-Jourdan\r\n        \"","divers":"Le Château de la Vezouzière, des Rochers,                                la Sevaudière grav  5 ,                                                                   Daviers  grav 3-4-                                                                             Plessis , Bois-Jourdan   grav 1-2                                                 GPS : 47° 51' 37\" Nord, 0° 29' 49\" Ouest","gps":"47° 51' 37\" Nord, 0° 29' 49\" Ouest","images":["../image/image_53/53_Bou%c3%a8re_1.jpg","../image/image_53/53_Bou%c3%a8re_2.jpg","../image/image_53/53_Bou%c3%a8re_3.jpg","../image/image_53/53_Bou%c3%a8re_4.jpg","../image/image_53/53_Bou%c3%a8re_5.jpg"]},"Consult_chateau_formulaire6a2d":{"id":"Consult_chateau_formulaire6a2d","dept":"53","canton":"Evron","commune":"Deux-Evailles","nom":"Béchère","type":"Vestiges","periode":"XIII","histoire":"BECHERE, le château de la Béchère, ou Château de la Beschère ou encore château de la Bessière, est un ancien édifice situé à Deux-Évailles. Le chartrier de la Beschère contient 18 chapitres. La Béchère relevait en partie du duché de Mayenne et en partie de Thuré. Il avait droit de haute, moyenne et basse justice, sans que l'on ne voit pas que ce droit ait jamais été mis en exercice. Il n'y avait pas d'autre officier que le procureur fiscal. Les fiefs de la Beschère s'étendaient sur la presque totalité de la paroisse de Deux-Evailles et sur plusieurs terres de Gesnes, Commer, Bais et Martigné. Cette terre appartenait, de 1200 à 1350 environ, à la famille de Deux-Evailles. En 1350, elle est portée en mariage par Marguerite de la Beschère à Jean Bois-Guémars ou Glamard, mort sans enfant, et, par un second mariage à Guillaume Bessonneau. Les possesseurs successifs, seront les Deux-Evailles, les Bessonneau et les Beauvau. à la suite d'un don de Guillaume-François d'Ozouville. Le château de la Béchère est, en ruines, aujourd'hui.","architecture":"BECHERE; Le château fut, sans doute, ruiné, pendant la Guerre de Cent ans, à laquelle le seigneur Pierre de Beauvau prend part. La Béchère n'était pas une forteresse, mais une maison fortifiée, dans une presqu'ile. Cet inventaire est fort précieux pour l'histoire locale. Il est conservé aux Archives départementales de la Mayenne.","habitants":"Famille de Deux-Evailles\r\n        \r\n        \"","divers":"Vestiges de  Béchères au Deux Evailles   GPS : 48° 11' 41,4\" Nord, 0° 31' 42,96\" Ouest","gps":"48° 11' 41,4\" Nord, 0° 31' 42,96\" Ouest","images":["../image/image_53/53_B%c3%a9ch%c3%a8re_1.jpg"]},"Consult_chateau_formulaire2bbd":{"id":"Consult_chateau_formulaire2bbd","dept":"53","canton":"Ernée","commune":"Chailland","nom":"Chailland","type":"Château","periode":"XIII-XIX","histoire":"Deux châteaux à Chailland ; Clivoy et la Forge.                                         CLIVOY, est occupé au XVIe siècle, après la famille Rabault par celle de Goué, originaire de Fougerolles du Plessis, qui le conserve jusqu'au XVIIIe siècle. Il passe successivement à Gilbert du Bois Berranger, puis aux le Bouteiller, des Nos, du Bois de Maquillé et du Breil de Pontbriand, actuels possesseurs. Avant 1848, Anatole des Nos et son épouse, Laurence de Thellusson, fille d'un banquier associé de Necker, font édifier un corps de logis contre la tour carrée servant d'escalier, ils confient à l'architecte parisien Lorotte, le soin de construire le château que l'on voit aujourd'hui. Propriété d'Hubert de Pontbriand                                                                                   FORGE, les maîtres de Forges et fermiers : Ernoult, 1550, Sébastien Lelièvre, mari de Mathurine Cazet, 1571, 1574, Zacharie Chouet, sieur des Fourches, 1604, François Garnier, sieur de Narbonne, 1639, Tanneguy de Riqueur, sieur des Vaudelles, mari de Marie Lebourdais, 1644, Olivier Dubois, 1652, Jacques Treton, sieur de Fiégérard, inhumé à Aron, 1664, René Arnoul, procureur du grenier à sel de la Gravelle, 1721, 1725, Delamotte et Nicolas Tricard, 1730, Michel Mary, 1746, Tripier de la Grange, 1755, Michel Dubois, mort le 2 mai 1760, Foucault de Laubinière et Martin de Ligonnière, 1792, 1794.                                                                                  VILLENEUVE, avec son fourneau et sa forge situés sur l'étang du château (vieux de plus de deux siècles, ayant été autrefois la propriété de la duchesse de Mazarin qui possédait alors ceux de Chailland)","architecture":"CLIVOY, se compose côté cour, le bâtiment est rehaussé. Il est flanqué à gauche d'une tour octogonale et d'un nouveau bâtiment, bâti plus haut pour abriter un grand salon et une bibliothèque. Du côté de la vallée, une tour ronde est ajoutée ainsi qu'une galerie. Après la restauration de Clivoy, la démolition de cette galerie et la recomposition de la façade arrière, les propriétaires s'attachent à redonner vie au parc et au jardin pour doter le château d'un environnement harmonieux.  La physionomie actuelle du château résulte des transformations apportées vers 1860 par son propriétaire dalors, le comte Anatole des Nos. Sous la direction de son architecte parisien monsieur Lorotte, le bâtiment dorigine a été très significativement agrandi et transformé : un grand corps de bâtiment a été élevé au Nord sur le plateau rocheux, une tour au Sud et une galerie à lEst (aujourdhui disparue) ont complété lensemble.                                                                                    La FORGE,  au siècle dernier, en 1834, le marquis de Chavagnac acheta la Forge, la forêt et les domaines alentours. A quelques pas de la Forge, le château du même nom s'élève sur l'emplacement de l'ancien manoir d'Aubert, dans une situation magnifique, il domine la vallée profonde et accidentée de l'Ernée à la lisière de la forêt de Mayenne. La chapelle qui remplace l'ancienne fondation de Saint-Jean d'Aubert est un élégant édifice roman. Ses vitraux ont été peints par Ottin de Paris en 1878.","habitants":"Clivoy; Famille Rabault                                                            Forges;  marquis de Chavagnac \r\n        \"","divers":"Trois châteaux à Chailland ;                                                           Clivoy grav 1-2-3 et la Forge grav 4-5, et de Villeneuve grav 6-7.                                                                                                                 Chailland 48° 13' 26\" nord, 0° 52' 23\" ouest","gps":"","images":["../image/image_53/53_Chailland_1.jpg","../image/image_53/53_Chailland_2.jpg","../image/image_53/53_Chailland_3.jpg","../image/image_53/53_Chailland_4.jpg","../image/image_53/53_Chailland_5.jpg","../image/image_53/53_Chailland_6.jpg","../image/image_53/53_Chailland_7.jpg"]},"Consult_chateau_formulairee920-2":{"id":"Consult_chateau_formulairee920-2","dept":"53","canton":"Saint-Berthevin","commune":"Changé","nom":"Changé_53","type":"Manoir","periode":"XV-XVIII-XIX","histoire":"Trois châteaux à Changé la Coudre, Buzandière et Ricoudet.                                                                                         La COUDRE, au XVIIe siècle la maison seigneuriale  était habitée par demoiselle  Françoise de Boisberger, qui cède la métairie  en 1725 à Jean Lemoine , en 1768 par Joseph Duchemin  des Auvais et par la veuve   Daumenil deviendra une ferme pendant deux cents ans,   à la Révolution, lors de la vente des différentes propriétés que possédait l'ancien prieuré de Changé, la famille d'Elva avait acquise le grand domaine prieural situé au centre du bourg. En 1878, le château était achevé avec sa chapelle domestique et ses dépendances entourés de son immense prairie. Lors du conflit de 39-45, les troupes allemandes occupent le château. Henriette, fille aînée de Christian d'Elva, et son époux Edmond Liger de Chauvigny abandonnent les lieux. Le château, investi par l'Etat-Major, fait l'objet de pillages.  Après le départ des allemands la propriété reste inoccupée durant plusieurs années, et en 1946, le château de Changé est mis à la disposition du ministère des prisonniers, déportés et rapatriés qui y installe une antenne médicale, en 1952, le conseil municipal envisage d'acheter parc et château. En 1985, à la mort de Madame Liger de Chauvigny, dernière figure de la famille d'Elva, puis à la famille Masson, la totalité du domaine est cédée à la commune. Hôtel de ville.                                            BUZANDIERE, en 1280 de la famille de Clinchamps  au XVe siècle  Guyon fait construire le manoir et la chapelle, la seigneuie est acquise par Pierre -Girard de l'Epinay à sa mort  le domaine revient à sa fille Marie veuve du maréchal jacques de Castelnau passe  ensuite à la descendance  à la comtesse de Murat qui y décède  en 1716.","architecture":"La COUDRE a été construit, en 1580, sur un aplomb rocheux de la rive droite de la Mayenne. C'est un manoir du XIVe siècle avec une vue imprenable sur la Mayenne, qui permettait de surveiller la rivière au XIVe siècle, et de constituer une défense avancée du château de Laval. A l'origine, ce manoir n'était constitué que d'un seul bâtiment rectangulaire. Un deuxième corps de bâtiment fut ajouté perpendiculairement puis une tour circulaire contenant un escalier à vis. De 300 m² habitables, sur 3 niveaux, vous serez séduits par son côté authentique, ses murs en pierre apparente, cloisons de torchis à pans de bois, cheminées en granit, parquet massif.                                                                                           BUZANDIERE, Marie Charlotte de Murat épouse en 1806 le comte de Nicolay lui apportant  ses biens hérités, entre autres la terre de Montfort le Rotrou ou le ménage fait construire un vaste château et n'utilise plus le Buzardière que comme rendez de chasse, aux XXe siècle, les bâtiments privés d'entretien se dégradent, dès 1953 la foudre provoque un incendie.                                                  RICOUDET,  dinspiration néo-moderne, doit sa construction en 1864 à « un caprice de dame ». Le comte Christian dElva avait reçu en dot le château familial, actuelle mairie de Changé. En contrepartie, son père, le comte Auguste dElva, fit construire pour son épouse, Alix de Quelen, le château du Ricoudet.  Inspiré des villas italiennes de la Renaissance, avec son plan massé, la saillie de son avant-corps ouvert sur la rivière, il offre depuis sa terrasse et son belvédère une large vue sur la vallée de la Mayenne. Le bâtiment à trois niveaux possède une tour carré belvédère au nord, une serre accolée au sud et un avant corps avec oriel (la loggia) au sud-est. La toiture est bordée de balustrades.","habitants":"Le Coudre; Famille d'Elva                                                                     Buzandière; Famille de Murat                                \r\n        \"","divers":"Trois châteaux à Changé l'hôtel de ville grav -1 ,                             la Coudré grav 2-3-4                                                             Buzandière grav 5-6                                                                            Ricoudet  grav 7                                                                          Chenillé grav 8                                                                                    GPS : 48° 06' 00\" Nord, 0° 47' 27\" Ouest","gps":"48° 06' 00\" Nord, 0° 47' 27\" Ouest","images":["../image/image_53/53_Chang%c3%a9_53_1.jpg","../image/image_53/53_Chang%c3%a9_53_2.jpg","../image/image_53/53_Chang%c3%a9_53_3.jpg","../image/image_53/53_Chang%c3%a9_53_4.jpg","../image/image_53/53_Chang%c3%a9_53_5.jpg","../image/image_53/53_Chang%c3%a9_53_6.jpg","../image/image_53/53_Chang%c3%a9_53_7.jpg","../image/image_53/53_Chang%c3%a9_53_8.jpg"]},"Consult_chateau_formulaired628":{"id":"Consult_chateau_formulaired628","dept":"53","canton":"Lassay-les-Châteaux","commune":"Thubuf","nom":"Chantepie","type":"Château","periode":"XIX","histoire":"CHANTEPIE, la construction du château de Chantepie date du XIXe siècle, relevait autrefois de la châtellenie de Lassay. Les seigneurs sont mentionnés dès le XIVe siècle. Au XVe siècle, le domaine est la propriété de la famille de Pennart qui le conserve jusqu'au XVIIIe siècle, époque où il passe à celle de Malterre. Durant la Révolution, Anne Françoise de Pennart, veuve de Louis de Vaufleury de Malterre reste à Chantepie avec ses deux enfants pour défendre ses biens.","architecture":"CHANTEPIE, du premier château de Chantepie, reste un pavillon carré, à l'extrémité Est du corps de logis central. L'Oisellerie, tel était son nom, possède encore des murs très épais, surmontés d'une toiture à trois pans. Au XIXe siècle, la construction antérieure a été entièrement remaniée. En 1865, le pavillon ouest est bâti et trois ans plus tard, le reste de la maison est surélevé. Le pavillon central est doublé et relié à l'Oisellerie en 1890. A la fin du XIXe siècle, construction du pavillon situé à l'extrémité des communs de l'est. La grille du parc, forgée par Girard à Couterne, est posée. Elle fut exécutée sur le modèle simplifié de la grille de la cour d'honneur. Les éléments protégés sont les façades, les toitures et les communs, inscrits aux M.H. depuis le 29/12/1986.","habitants":"Famille de Pennart \r\n        \"","divers":"Le château de Chantepie à Thubuf    plus château de Thuboeuf                                                                                             GPS : 48° 30' 40\" Nord, 0° 26' 14\" Ouest","gps":"48° 30' 40\" Nord, 0° 26' 14\" Ouest","images":["../image/image_53/53_Chantepie_1.jpg","../image/image_53/53_Chantepie_2.jpg"]},"Consult_chateau_formulaire133f":{"id":"Consult_chateau_formulaire133f","dept":"53","canton":"Meslay-du-Maine","commune":"La Chapelle-Rainssouin","nom":"Chapelle_Rainssouin","type":"Château","periode":"XV-XIX","histoire":"BAILLY,   du XVe et XVIIe siècles, agrandi et reconstruit à la fin du XIXe siècle en style néogothique par l'architecte Jules Reboul.                                                                                     CHAPELLE-RAINSSOUIN, château construit vers 1472 pour René de La Chapelle, château modifié vers 1660 pour Nicolas Leprestre. Reconstruction partielle de la demeure en 1884-1885 par Jules Reboul pour Monsieur de Vaujuas Langan.","architecture":"CHAPELLE-RAINSSOUIN,   l'édifice, de plan régulier,  se compose d'un étage carré et d'un étage de comble, gros-oeuvre en grès; granite; appareil mixte et moellon. Elévation à travées surmontées de toit en pavillon; toit à longs pans ; croupe ; demi-croupe ; noue, couverts d'ardoise.","habitants":"Famille de René de La Chapelle\r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux à la Chapelle Rainssoin  grav-4  Bailly grav 1-2-3  Gps 48° 05' 55\" nord, 0° 31' 12\" ouest","gps":"","images":["../image/image_53/53_Chapelle_Rainsouin_1.jpg","../image/image_53/53_Chapelle_Rainsouin_2.jpg","../image/image_53/53_Chapelle_Rainsouin_3.jpg","../image/image_53/53_Chapelle_Rainsouin_4.jpg"]},"Consult_chateau_formulaire8adf":{"id":"Consult_chateau_formulaire8adf","dept":"53","canton":"Meslay-du-Maine","commune":"Grez-en-Bouëre","nom":"Chasnay","type":"château","periode":"XVIII-XIX","histoire":"CHASNAY, en 1395, le premier seigneur connu Guillaume Le Maire en 1449, Jeanne de Chasnay épouse François de Baubigné seigneur  du Vieil-Aunay.  Au XVIIe siècle la famille de Baubigné s'allie avec celle de Boisjourdan  Antoinette de Beaubigné  épouse François de Boisjourdan. Quelques années avant la Révolution,  Philippe Madeleine de Boisjourdan en 1776 épouse un mousquetaire noir Henri René Julien Jarret de La Mairie, veuve en 1781 dont elle a trois enfants. Durant la Révolution, elle vit à Chasnay avec ses fils qui participent à la Chouannerie. Elle décide vers 1805, de bâtir une nouvelle demeure à Chasnay pour accueillir ses petits-enfants. Elle fait édifier le château que nous connaissons aujourd'hui. Le fils ainé hérite du château des Courans à Longuefuye Chasnay revient au fils puiné Jarret de La Mairie, son petit fils par Louis Ambroise Augustin, et aîné de 10 enfants, hérita du domaine à la mort de son père en 1870, qui épouse Angèle de Gouz du Plessis. Anatole Augustin fils ainé ancien élève de l'école militaire de St-Cyr.  De son second mariage avec Marie-Thérèse -Pauline Durey  de Noinville, trois enfants dont Anatole-Louis Marie la fille de ce dernier Marie-Thérèse épouse en 1899 Marc-Raphaël-Raymond de Thomas de Labarthe ancêtre des propriétaire actuels.","architecture":"CHASNAY, en 1765, présence en ce lieu d'un premier édifice constitué d'un modeste bâtiment flanqué d'une tourelle à chacun de ses angles. Ce bâtiment inconfortable et vétuste est accompagné d'un pigeonnier toujours existant. L'édifice remplacé  de plan massé et de forme rectangulaire, haute d'un étage sous les combles, et  un étage et dotée d'un grand porche pour accueillir les voitures, est construite à côté du pigeonnier, de style XVIIIe, la façade d'arrivée est couronnée par un fronton triangulaire percés d'un oculus, toit en croupe couvert d'ardoise, coiffé de lucarnes haute d'un étage sous les combles. En avant se trouvent les pièces à vivre à gauche du hall, deux salons; à droite, la salle à manger et une pièce; à l'arrière les pièces de service   liquidation de la succession en 1871 chez maître Sesbouë à Château-Gontier. Il a fait réaliser, en 1864, le parc à l'anglaise qui a remplacé devant sa demeure, l'ancien jardin à la française. La basse cour a conservé de beaux communs du XVIIe siècle parmi lesquels un remarquable bûcher.","habitants":"Famille de Baubigné\r\n        \"","divers":"A Grez-en-Bouëre le château de Chasnay                                                     GPS : 47° 52' 27\" Nord, 0° 31' 21\" Ouest","gps":"47° 52' 27\" Nord, 0° 31' 21\" Ouest","images":["../image/image_53/53_Chasnay_1.jpg","../image/image_53/53_Chasnay_2.jpg"]},"Consult_chateau_formulaire870b":{"id":"Consult_chateau_formulaire870b","dept":"53","canton":"Château-Gontier","commune":"Château-Gontier","nom":"Château_Gontier","type":"Château","periode":"XIII- XVII-XIX","histoire":"Cinq châteaux à Château-Gontier dont celui de Château gontier, de Mirvault,  de Montivant et deux Hôtels Fouquet et Lantilly.                                                                                  CHÂTEAU-GONTIER, il reste des vestiges des fortificat
