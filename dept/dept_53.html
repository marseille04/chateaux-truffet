ert de Chièvres, propriétaire de Pierre Fontaine. Le manoir de Pierre Fontaine est inscrit aux M.H. depuis le 7/12/1925. Il se situe à moins de 2 km au Nord-Est du bourg.                                                 PLESSIS BURET, la voie romaine du Mans à Jublains passait à 40 mètres du portail du Plessis-Buret, c'était la Châtellennie mouvante de Sainte-Suzanne et de Sillé ; augmentée par acquisition des fiefs de Sourches et des terres de Crun et de Dommier. Contre les seigneurs de la Cour de Sainte-Gemmes et de Villiers, Jeanne Hérisson se fit reconnaître dame de Sainte-Gemmes en 1527, et de nouveau, au siècle suivant, le comte de la Suze affirma dans un mémoire qu'ayant seul le droit de châtellenie, il devait avoir prééminence avant ses vassaux en l'église de Sainte-Jamme ; il invoquait en outre les littres ou ceintures funèbres de l'église armoriées : d'argent à un hérisson d'or et de gueules, à une croix d'argent ; d'azur à une croix de gueules chargées de cinq crouzilles d'argent et environnée de seize aiglerons ; - d'argent traversé de fusées de gueules au premier et dernier quartier. Ce sont là, pour l'abbé Angot, des lectures bien fautives, mais dans lesquelles, on reconnaissait les armoiries des anciens seigneurs du Plessis-Buret. Charles Maucourt de Bourjolly parle d'un château du Plessis-Buret, ruiné par les Normands.","habitants":"Famille de Henry-François de Biars\r\n        \"","divers":"Cour grav-3-4                                                                                   GPS : 48° 11' 57\" Nord, 0° 22' 15\" Ouest                                                    Pierre-Fontaine grav-1-2                                                                     GPS : 48° 12' 27\" Nord, 0° 21' 14\" Ouest                                                        Plessis  Grav-5                                                                                                 GPS : 48° 10' 55\" Nord, 0° 22' 02\" Ouest","gps":"48° 11' 57\" Nord, 0° 22' 15\" Ouest","images":["../image/image_53/53_Ste_Gemme_Robert_1.jpg","../image/image_53/53_Ste_Gemme_Robert_2.jpg","../image/image_53/53_Ste_Gemme_Robert_3.jpg","../image/image_53/53_Ste_Gemme_Robert_4.jpg","../image/image_53/53_Ste_Gemme_Robert_5.jpg"]},"Consult_chateau_formulaire1485":{"id":"Consult_chateau_formulaire1485","dept":"53","canton":"Meslay-du-Maine","commune":"Sainte Suzanne","nom":"Ste_Suzanne","type":"Vestiges- château","periode":"XI-XVIIe","histoire":"Sainte_SUZANNE, au Xe siècle  le domaine entre par alliance dans la famille de Beaumont le château est caractéristique de l'époque Henri IV, style de transition entre la Renaissance et l'architecture classique. Passe  au XVe siècle des Beaumont de Brienne. à la famille d'Alençon,  en 1537  la dame d'Alençon Françoise  épouse Charles de Bourbon, ce dernier hérite de la Baronnie et du château qu'il cède à son épouse achète à la première épouse du roi, Marguerite de France (la Reine Margot), les ruines de la vieille forteresse pour transformer l'ancien château en demeure résidentielle elle s'en défait en 1604, Guillaume Fouquet de la Varenne, homme d'État et ministre de Henri IV. Ce projet n'est pas achevé, car l'assassinat du roi en 1610 amène la déchéance de Guillaume Fouquet de la Varenne, il reste de cette période le logis, un beau corps de bâtiment dans le plus pur style du début du XVIIe siècle. Sainte Suzanne, devenue baronnie puis marquisat, passe à la famille de Champagne de Villaines, puis à César Gabriel de Choiseul-Praslin, à Charles de Beauvau Craon et à Ange Hyacinthe Maxence, baron de Damas. Dès lors le château n'est plus transmis par héritage, mais par aliénation (sauf de 1865 à 1980 au sein de la famille de Vaulogé). En 1984 devient la propriété.  Aujourd'hui, propriété du conseil départemental de la Mayenne, il abrite depuis juin 2009 le Centre d'interprétation de l'architecture et du patrimoine (CIAP) du Pays d'art et d'histoire Coëvrons-Mayenne\r\nCHAMMES a un kilomètre au sud , cette grande propriété atypique date du XVIe au XVIIe siècle.","architecture":"Sainte_SUZANNE, assiégé par le Duc de Normandie et le roi d'Angleterre Guillaume-le-Conquérant de 1083 à 1086, il est la seule place forte que le Conquérant ne put prendre, est un château fort datant du XIe siècle, ses remparts, comme ceux de la cité médiévale, sont classés M.H. depuis 1862 et le logis, construit entre 1608 et 1610-1613 par Guillaume Fouquet de la Varenne, est classé par arrêté du 28 décembre 1984.  Aujourd'hui, propriété du conseil départemental de la Mayenne, il abrite depuis juin 2009 le centre d'interprétation de l'architecture et du patrimoine (CIAP) du Pays d'art et d'histoire Coëvrons-Mayenne, et plus généralement du département de la Mayenne. Le château avec son donjon, son pont-levis, ses remparts et son logis XVIIe, propose un parcours complet du Patrimoine local et mayennais (Centre d'interprétation de l'architecture et du patrimoine).                                                                                                   DONJON, de Sainte-Suzanne en Mayenne est un château fort datant du XIe siècle. Le donjon, barlong, est le monument le plus ancien de la cité médiévale de Sainte-Suzanne. Datant de la première moitié ou du milieu du XIe siècle, il mesure 19,45 m de long, 15,5 m de large, pour une hauteur maximale de 19 m et des murs de 3 m d'épaisseur; il est antérieur au siège de la cité. Ce donjon est un bon exemple des tours-maîtresses quadrangulaires qui marquent la silhouette de nombreux châteaux aux XIe siècle et XIIe siècles dans l'ouest : Loches, Falaise, Domfront et Nogent-le-Rotrou notamment. Des escaliers ont été récemment installés afin de permettre aux visiteurs de découvrir les 3 niveaux de l'édifice et certaines pièces installées dans l'épaisseur des murs (évier, garde-robe, latrines, salle du trésor). Le Donjon est classé aux M.H.","habitants":"Famille de Charles de Bourbon,                                                          la Reine Margot)\r\n        \r\n        \r\n        \"","divers":"Château et vestiges de sainte -Suzanne                                                        GPS : 48° 05' 51\" Nord, 0° 21' 11\" Ouest                                                 Donjon    GPS : 48° 05' 49\" Nord, 0° 20' 55\" Ouest","gps":"48° 05' 51\" Nord, 0° 21' 11\" Ouest","images":["../image/image_53/53_Ste_Suzanne_1.jpg","../image/image_53/53_Ste_Suzanne_2.jpg","../image/image_53/53_Ste_Suzanne_3.jpg","../image/image_53/53_Ste_Suzanne_4.jpg","../image/image_53/53_Ste_Suzanne_5.jpg","../image/image_53/53_Ste_Suzanne_6.jpg","../image/image_53/53_Ste_Suzanne_7.jpg","../image/image_53/53_Ste_Suzanne_8.jpg"]},"Consult_chateau_formulaire3aa4":{"id":"Consult_chateau_formulaire3aa4","dept":"53","canton":"Loiron","commune":"Ruillé le Gravelais","nom":"Terchant","type":"Château","periode":"XVI","histoire":"TERCHANT, il n'y a aucune mention avant le dernier quart du XVIe siècle, ont été créés par Jean du Matz, plus connu sous le nom de Montmartin après l'acquisition des seigneuries de Cossé, Saint-Cyr, Loiron, Ruillé et la Guéhardière. Henri IV l'érigea en vicomté, et Marie de La Tour d'Auvergne, duchesse de la Trémoïlle, procuratrice de son mari, ratifia cet acte le 9 avril 1629 ; toutes les terres surnommées, ainsi que les fiefs de Berne, de la Tour, de Chamaillard, de la Lande-Sorchin, devaient relever du comté de Laval sous une seule foi et hommage lige. Le vicomte de Terchant renonçait à la juridiction en matière civile. Les comtes de Laval contestèrent plus tard, et jusqu'en 1736 les privilèges de la vicomté ; ils réclamaient diverses rentes, entre autres celle de 116 chevalerets d'avoine. Claude-Charles de Goyon en appela au parlement contre la démolition des poteaux à ses armes plantés à Cossé et à Ruillé. Le titre fut en fait reconnu de tous temps.","architecture":"TERCHANT  La construction du Château de Terchant date du XVIe siècle. Le château fut remanié au XIXe siècle. Le domaine et le château de Terchant, dont il n'y a aucune mention avant le dernier quart du XVIe siècle,  Le château de Terchant dont une des deux ailes fut démolie, a été complètement restauré à la fin du XIXe siècle. D'après l'abbé Angot, il était surtout remarquable par l'aménagement de ses jardins, ses bois et son étangs.","habitants":"Famille de la Trémoille\r\n        \"","divers":"Château de Terchant à Ruillé le Gravelais                                                GPS : 48° 03' 42\" Nord, 0° 59' 48\" Ouest","gps":"48° 03' 42\" Nord, 0° 59' 48\" Ouest","images":["../image/image_53/53_Terchant_1.jpg","../image/image_53/53_Terchant_2.jpg"]},"Consult_chateau_formulaireea71":{"id":"Consult_chateau_formulaireea71","dept":"53","canton":"Gorron","commune":"Ambrières les Vallées","nom":"Tertre_53","type":"Château","periode":"XIX","histoire":"TERTRE, le château du Tertre se situe à quelques centaines de mètres de la petite route qui relie Ambrières au Pas, le château se niche tout près de la Varenne, sous les frondaisons d'arbres centenaires. Viollet Le Duc l'a dessiné mais a confié la réalisation à son gendre, Maurice Ouradou. Eugène Viollet Leduc avait observé les lieux: la Varenne qui coule au pied, le chemin d'accès à 120° par rapport à la rivière. L'originalité : En 1980, il est transformé en maison de vacances par le groupe Forget, et racheté en 1991 par le groupe touristique anglais PGL.","architecture":"TERTRE,  cette maison de campagne a été dessiné par Eugène Viollet-le-Duc, au XIXe siècle. Son propriétaire initial était Auguste Griois. Le château du Tertre se niche tout près de la Varenne, sous les frondaisons d'arbres centenaires. Sa construction date de 1867 à 1872. Eugène Viollet-le-Duc, inspecteur général des édifices diocésains, était venu à Laval en 1855 pour inspecter à la fois la cathédrale de la Sainte-Trinité et les emplacements choisis pour l'évêché et le séminaire ou l'on rencontre Mgr Casimir Wicart. Eugène Viollet-le-Duc rencontra Auguste Griois (1818-1884), un riche rentier et fils d'un notaire parisien qui racheta le château du Tertre, en 1856. Il y fit construire une maison sur la taillère du Grand-Aulnay, terrain compris dans la closerie du Tertre sur 9,20 ares. Sur ce terrain, en 1872, les archives départementales de la Mayenne notent la construction d'un château, C'est autour de cet axe qu'est imaginé le château. En entrant dans le superbe vestibule soutenu par des colonnes de granit, on peut y admirer toutes ses pièces. La cheminée se trouvait sous la fenêtre du cabinet de travail et les conduits de chaque côté. Réalisé en brique rouge (aujourd'hui couverte d'un enduit) et en granit, la « maison de campagne » s'est vu adjoindre plus tard une tourelle qui a alourdi énormément la bâtisse. La restauration entreprise lors de l'acquisition du château du Tertre par le ministère de la Justice, en 1966, a davantage contribué à déséquilibrer la construction. Son propriétaire actuel est le Groupe en PGL. Le château restera vide jusqu'en 1950 et il restera dans la famille jusquà sa vente en 1966. Il devient alors une maison de redressement pour garçons gérée par le ministère de la Justice.","habitants":"Viollet Le Duc\r\n        \"","divers":"Ambrières les Vallées le château de Tertre                                                       GPS : 48° 24' 55\" Nord, 0° 38' 12\" Ouest","gps":"48° 24' 55\" Nord, 0° 38' 12\" Ouest","images":["../image/image_53/53_Tertre_53_1.jpg","../image/image_53/53_Tertre_53_2.jpg"]},"Consult_chateau_formulaire3b13":{"id":"Consult_chateau_formulaire3b13","dept":"53","canton":"Evron","commune":"Bazouges des Alleux","nom":"Thuré","type":"Château","periode":"XV-XVI","histoire":"THURE. M. Daudier la fit bénir de nouveau le 13 novembre 1853.\r\n Château de Thuret est un château bâti à La Bazouge-des-Alleux, il date du XVIe siècle. Il existe 2 châteaux dans la commune à découvrir : le Château de Thuré du XVIe siècle, inscrit partiellement aux M.H. depuis le 15/05/1974 pour sa chapelle, son pavillon, l'élévation et sa toiture.\r\nÉléments protégés MH : les façades et les toitures du château, ainsi que celles des deux pavillons et de la chapelle : inscription par arrêté du 15 mai 1974.","architecture":"THURE, il subsiste deux tours crénelées construites dans le XVe siècle. Des murs d'enceinte et de larges fossés formaient avec ces tours la défense complète de ce château fort. En dehors de cette ligne sur les anciens fossés aujourd'hui comblés s'étend un magnifique jardin anglais. À l'entrée de l'allée du Château de Thevalles existait, autrefois, une vieille construction portant le nom de Maladrerie. Au XIXe siècle, une élégante chapelle gothique fut construite à la porte du château. La chapelle du XVIIe siècle, fort simple est dédiée à Saint-Sébastien. On en demanda la conservation en l'an XIII, mais pour la livrer à des usages profanes. M. Daudier la fit bénir de nouveau le 13 novembre 1853.","habitants":"Famille Daudier\r\n        \"","divers":"A Bazouges des Alleux le château de Thuré                                                 GPS : 48° 11' 00\" Nord, 0° 36' 36\" Ouest","gps":"48° 11' 00\" Nord, 0° 36' 36\" Ouest","images":["../image/image_53/53_Thur%c3%a9_1.jpg","../image/image_53/53_Thur%c3%a9_2.jpg","../image/image_53/53_Thur%c3%a9_3.jpg"]},"Consult_chateau_formulairefd78":{"id":"Consult_chateau_formulairefd78","dept":"53","canton":"Meslay-du-Maine","commune":"Chéméré le roi","nom":"Thévalles","type":"Château","periode":"XI-XVI-XIX","histoire":"THEVALLES, en 1415, le domaine sert d'hébergement. En 1428, il sera assiégé par les Anglais, commandés par John Talbot. Lorsque fut entrepris la route de Laval à Brûlon, en 1852, en ouvrant une tranchée près du château, un grand nombre d'ossements furent découverts, appartenant aux soldats anglais tués au cours du combat. En 1495, la terre comprend un hébergement, un manoir, une maison. Le 6 février 1558, un acte dacquisition de la terre de Thévalles mentionne le château nouvellement reconstruit. L'édifice à 1 500 m du bourg, au-dessus de l'Erve. Il domine le cours de l'Erve et sa vallée du haut d'un roc taillé à pic ainsi que Le moulin de Thévalles, reconstruit en 1850, qui est situé en contrebas du château. Le château fut la propriété des Familles de Thévalles, de Condé, de Maillé, de La Rochelambert, de La Poeze, de Vitton de Peyruys.","architecture":"THEVALLES, c'est un château de style Renaissance. Le château actuel repose sur les fondations d'un bâtiment construit au XIe siècle contre les invasions des Normands. Une partie des constructions modernes date du XVIe siècle et l'autre au XVIIe siècle, il subsiste deux tours crénelées construites dans le XVe siècle. Des murs d'enceinte et de larges fossés formaient avec ces tours la défense complète de ce château fort. En dehors de cette ligne sur les anciens fossés aujourd'hui comblés s'étend un magnifique jardin anglais. À l'entrée de l'allée du Château de Thevalles existait, autrefois, une vieille construction portant le nom de Maladrerie. Au XIXe siècle, une élégante chapelle gothique fut construite à la porte du château.","habitants":"Familles de Thévalles\r\n        \r\n        \"","divers":"A Chéméré le roi le château de Thévalles GPS : 47° 58' 13,8\" Nord, 0° 25' 02,28\" Ouest","gps":"47° 58' 13,8\" Nord, 0° 25' 02,28\" Ouest","images":["../image/image_53/53_Th%c3%a9vales_1.jpg","../image/image_53/53_Th%c3%a9vales_2.jpg","../image/image_53/53_Th%c3%a9vales_3.jpg","../image/image_53/53_Th%c3%a9vales_4.jpg"]},"Consult_chateau_formulaire08d9":{"id":"Consult_chateau_formulaire08d9","dept":"53","canton":"Evron","commune":"Deux Evailles","nom":"Trankalou","type":"Château","periode":"XIII-XVI","histoire":"TRANKALOU, en 1394, le domaine appartient à Jean du Tronc au Loup et à sa femme Hersan La Rousse, qui habitaient à Montourtier. Le Château de Trankalou fut vendu le 24/08/1602, à Ambroise Le Cornu. Depuis, la terre est toujours demeurée unie à la châtellenie de Brée. Le domaine est acheté en 1664 par Charles de Montesson, époux de Marie Prévost de Saint-Cyr. En 1829, le bois de Brée, les fermes du Buisson, la Loge, et les Trancalous sont vendus par dame Jacquine-Renée-Charlotte-Adélaïde Rouillon22 à Alexandre Bourdon du Rocher, député de la Sarthe, demeurant à Chemiré-en-Charnie. Revendue vers 1852, à M. Foucault de Vauguyon, le Domaine est racheté, en 1887, par Georges Gamard, Conseiller Municipal de Paris, puis Député de la Mayenne. Il y fit construire en 1887, un château, situé à 2 km à l'est du village, qui est pour l'extérieur la reproduction d'un château anglais du comté de Surrey.","architecture":"TRANKALOU,  le château de Trancalou est en ruines. Proche des bois de Bourgon et dHermet, Trancalou est sans doute un relais de chasse de la famille de Laval au XIIIe siècle. C'est là que Robert Ier d'Alençon, mari d'Emma de Laval, mourut en 1217, d'après le récit de Pierre Le Baud, confirmé par une tradition locale que Charles Maucourt de Bourjolly recueillit sur les lieux. Le Domaine de Trancalou est la propriété de Guy VIII de Laval, à la suite de son mariage avec Jeanne de Brienne, en 1270. Eustache de Bauçay, épouse d'André de Laval donnait le bail de Trancalou en exigeant que le fermier transporte chaque année un muy de vin de Gérigné au Tronc au loup et du Tronc au loup à Gérigné, en allant querré le dit vin, un millier de merrein à vin.","habitants":"Guy VIII de Laval,\r\n        \"","divers":"A Deux Evailles le château de Trankalou                                       GPS : 48° 12' 20\" Nord, 0° 30' 46\" Ouest","gps":"48° 12' 20\" Nord, 0° 30' 46\" Ouest","images":["../image/image_53/53_Trankalou_1.jpg","../image/image_53/53_Trankalou_2.jpg"]},"Consult_chateau_formulaire3c15":{"id":"Consult_chateau_formulaire3c15","dept":"53","canton":"Meslay-du-Maine","commune":"Vaiges","nom":"Vaiges","type":"Manoir","periode":"XVI-XIX","histoire":"Deux châteaux à Vaiges ; Aubigné , Lessières à Champéon et Vaiges                                                                                  AUBIGNE,  le manoir d'Aubigné à Vaiges. Un lieu où se mélange avec harmonie laques de Chine et fenêtres à meneaux du XVIe siècle La construction d 'Aubigné date du XVe au XVIe siècle (1521), possède une tourelle polygonale qui date de la fin du Moyen-Age. Le Manoir d'Aubigné appartient à une personne privée, d'Aubigné est inscrit aux M.H. depuis le 19/12/1985. Il existe 2 manoirs et 1 château sur la commune de Vaiges à découvrir : Le Manoir du Vauberger, d'Aubigné et ldu Coudray.   De 1739 à 1855, le manoir est exploité par la famille de La Rochelambert.                                                                                               VAIGES, le château de Vaiges faisait partie d'une des dix châtellenies du comté de Laval. En 1456, c'était un chastel où résidait de façon épisodique René de Vays et Anne de Champaigne. . C'est un château de 6 pièces sur 160 m².","architecture":"AUBIGNE  Les seigneurs d'Aubigné sont connus dès le XIe siècle, et obtiennent le droit en 1552 de fermer la maison et la doter d'un pont-levis (aujourd'hui disparu) C'est un édifice de bien jolies proportions avec tour d'escalier à toit aigu. Il figure en façade trois fenêtres à frontons en pénétration dans la toiture - toutes divisées par des meneaux - comme d'ailleurs les autres fenêtres des étages inférieurs L'abbé Angot, dans son dictionnaire historique de la Mayenne, le qualifie de manoir à style, ce qui chez lui est preuve de grande qualité, la dernière remontant à l'année 1998 par l'imprimerie de la manutention à Mayenne.                                        VAIGES  Le manoir date de 1830, offrant des pièces lumineuses. Trois chambres dont une suite parentale. Avec un Grenier aménageable de 80 m². Le logis est complété dune dépendance avec une grande salle de 75 m² parquetée et d'un pavillon avec une chambre et une salle d'eau. Le Parc à l'anglaise est vallonné, avec de beaux arbres et des fleurs de collections.","habitants":"Aubigné   Famille de La Rochelambert                                          Vaiges ; René de Vays \r\n        \"","divers":"Deux châteaux à Vaiges ; Aubigné , lessières          Champéon et Vaiges                                                                Aubigné  GPS : 48° 3' 16\" Nord, 0° 27' 38\" Ouest                                          Vaiges GPS : 48° 02' 27\" Nord, 0° 28' 34\" Ouest","gps":"48° 3' 16\" Nord, 0° 27' 38\" Ouest","images":["../image/image_53/53_Vaiges_1.jpg","../image/image_53/53_Vaiges_2.jpg","../image/image_53/53_Vaiges_3.jpg","../image/image_53/53_Vaiges_4.jpg"]},"Consult_chateau_formulaireb289":{"id":"Consult_chateau_formulaireb289","dept":"53","canton":"Château-Gontier","commune":"Epineux le Seguin","nom":"Varennes_Enfant","type":"Château","periode":"XVI","histoire":"VARENNES L'ENFANT, la châtellenie de Varennes, érigée en baronnie vers 1570 en faveur de François de la Chapelle, était vassale de l'évêché du Mans par la baronnie de Touvoie, à charge par le seigneur de servir le prélat une fois par an depuis son entrée dans son diocèse, avec armes et chevaux, quinze jours à ses propres dépens et huit jours défrayé. L'évêque, de son côté, devait protection à son vassal. Cette vassalité est reconnue sans interruption du XIIIe siècle au XVIe siècle.  Le domaine comprenait en 1530 : moulin sur la rivière de Trulon, les métairies de la Cour, de la Perrière, des Granges, le domaine de la Morinière, le bois d'Epineu contenant cent journaux. On parle en 1403 d'un domaine de Saint-Martin. Quant au château lui-même, c'est au XIIIe siècle un hébergement avec son domaine, heberga mentum et masuram in qua situm est. L'aveu de 1403, rendu par Séguin L'Enfant à l'évêque Adam Châtelain, traduit et explique.    Le château de Varennes fut vendu  à René-Étienne Perrier, qui l'habitait en 1818. Le Château de Varennes-L'Enfant fut racheté, en 1820, par l'ancien propriétaire, devenu Ministre d'État.","architecture":"VARENNES, en 1487, Hardouin L'Enfant mentionne plus sommairement son chastel, chastellenie et hébergement de Varennes, avec les douves, fossés, jardins, vergers. Vers 1570, François de la Chapelle en faveur duquel la terre fut érigée en baronnie, reconstruit ou augmenta au moins le château ; il reste encore quelques vestiges de son uvre. Lui-même y fut assailli, vers la fin des guerres de religion, par Georges Le Clerc, frère du seigneur de Juigné-sur-Sarthe ; il s'échappa, mais sa femme et ses enfants y furent pris, mis à rançon, et le château fut dévasté. En 1688, alors que le château, déjà bien délaissé, va être totalement abandonné de ses nouveaux maîtres, on y remarque plusieurs bâtiments irréguliers enfermant une cour, dont la porte d'entrée avec pont-levis et planchette est tournée au midi ; des fossés secs, un grand escalier à pans voûté, une petite chapelle dont une partie de la couverture est tombée, un jeu de longue paulme. Sur la pointe du rocher, sur la rivière, est bâtie une petite chapelle, une chambre à feu, un grenier dessus, un four au bout y joignant, nommé l'Hermitage de Saint-Philbert, plus loin est la chapelle du village. L'ermitage de Saint-Philbert était dû sans doute à Philbert de la Chapelle. Un combat acharné eut lieu au village, le 17 mars 1796, entre la compagnie de Jean-Daniel hlert et celle de Marin-Pierre Gaullier.\r\nUn château moderne, résidence privée de la famille d'Albaret, de style antique, d'architecture militaire, a été construit depuis les années 1850 sur les anciennes fondations. Une belle et monumentale boiserie ancienne, habilement restaurée, orne la cheminée d'une des salles, dont les plafonds à soliveaux et parquets apparents, sont d'un effet très décoratif.","habitants":"famille d'Albaret                                                                         Famille de René-Étienne Perrier\r\n        \"","divers":"a Epineux le Seguin le château de Vareznnes l'enfant                                 GPS : 47° 56' 27\" Nord, 0° 19' 26\" Ouest","gps":"47° 56' 27\" Nord, 0° 19' 26\" Ouest","images":["../image/image_53/53_Varennes_Enfant_1.jpg","../image/image_53/53_Varennes_Enfant_2.jpg"]},"Consult_chateau_formulairedf79":{"id":"Consult_chateau_formulairedf79","dept":"53","canton":"Meslay-du-Maine","commune":"St-Denis du Maine","nom":"Vauberger","type":"Château","periode":"XV-XIX","histoire":"VAUBERGER, c'est un château construit au XVe siècle. Vauberger est entouré de douves et d'un oratoire. La terre et seigneurie de Vauberger s'étendait, autrefois, sur les paroisses de Saint-Denis-du-Maine et de la Bazouge-de-Chemeré. Il relevait, à demi, à foi et hommage de la chatellenie de Saint-Denis, l'autre moitié étant sous la suzeraineté de Chemeré. Le Manoir de Vauberger changea plusieurs fois de propriétaires. En 1367, il appartenait à la famille  de Grazay. Au milieu du XVe siècle, par alliance, il ira dans les mains de la famille Ferrand. Puis le Manoir appartiendra en 1559, à la Famille de la Hune. Puis il ira à la Famille Fouquet. En 1592, il appartient à la Famille des Rotours. En 1627, le Manoir de Vauberger ira dans les mains de la famille  de Sévigné. Christophe-Jacques de Sévigné et Jacques-Christophe de Sévigné héritent de ce dernier du château du Coudray, et Vauberger. En 1700, à la suite de la mort de Jacques-Christophe de Sévigné, Christophe-Jacques continue à la posséder indivisément avec sa nièce Marie-Charlotte de Sévigné qui, en sa qualité de fille unique du défunt, avait succédé aux droits de celui-ci. En 1715, lors de la vente par décret aux requêtes de l'hôtel, sur Christophe-Jacques de Sévigné, de la terre du Coudray, Marie-Charlotte de Sévigné, nièce de celui-ci et femme de messire Toussaint le Bihan, chevalier, seigneur de Pennelé, avait obtenu distraction à son profit de la terre de Vauberger ainsi que des métairies de la Chesnave et du Boullay.","architecture":"COUDRAY, il existait au lieu-dit le Coudray un hébergement dès le XIVe siècle, qui devint une habitation seigneuriale avec tour pentagonale, chapelle et douves. Le château, restauré à la fin du XIXe siècle est une construction en pierres du pays avec encadrements en tuffeau et toit en ardoises.                                                                                                                       Château du BOURG, daté du XIXe siècle\r\nLUCE, situé dans la pointe Nord-Ouest du territoire - route d'Arquenay, ce château d'apparence XIXe jouxte le hameau les Lucés qui comprend plusieurs fermes anciennes                                                                                            La MOTTE : ancienne motte féodale. Une maison du XVIe siècle située à proximité de la motte.                                                                                 VAUBERGER, le manoir du XVe siècle situé au Nord-Ouest - route de St Georges le Fléchard, est accompagné de douves et d'un oratoire. Ces terres continuèrent donc à être possédées par l'arrière-petite-fille de Radegonde des Rotours, tandis que celle du Coudray, réunie à la châtellenie de Saint-Denis-du-Maine, passait aux mains des Guillaud de la Motte. En 1724, Georges Raison, curé de la Cropte et chapelain de la chapelle de Vauberger, étant venu à mourir, M Toussaint Le Bihan, chevalier, seigneur de Pennelé, époux de Marie-Charlotte de Sévigné, présenta au bénéfice vacant maître Guillaume Pelliet, prêtre, de l'évêché de Cornouaille, qui, avant de prendre possession, fit le serment de condamner les 5 propositions de Jansénius, et ce, par acte passé au Château de Pennelé, dans la Paroisse Saint-Martin, près de Morlaix, en l'Evéché de Léon. Au début du XXe siècle, le manoir de Vauberger appartenait au Comte du Pontavice.","habitants":"famille  de Grazay.                                                                           Famille Christophe-Jacques de Sévigné, \r\n        \"","divers":"A St-Denis du Maine  le château de Lucé grav 3 Vauberger grav 1-2                 GPS : 47° 58' 00\" Nord, 0° 31' 38\" Ouest","gps":"47° 58' 00\" Nord, 0° 31' 38\" Ouest","images":["../image/image_53/53_Vauberger_1.jpg","../image/image_53/53_Vauberger_2.jpg","../image/image_53/53_Vauberger_3.jpg"]},"Consult_chateau_formulairea790":{"id":"Consult_chateau_formulairea790","dept":"53","canton":"Lassay-les-Châteaux","commune":"Champéon","nom":"Vaux_Levaré","type":"Château","periode":"XVe","histoire":"VAUX, la famille des Vaux partage son existence entre la Grande-Bretagne et la Mayenne. Certains se seraient croisés et il est certain quil y a des représentants des Vaux dans toutes les contrées des XIVe et XVe siècles. Ils servent sous les ordres de Bertrand Du Guesclin et on les retrouve à Avranches, Angers, Pontorson, Dol-de-Bretagne et Paris. Cest au XVe siècle quun Jean des Vaux est nommé capitaine du chastel et place de Mayne et se distingue lors de la bataille de Vieil-Baugé en 1421. Pendant les guerres de religion, une partie de la famille rejoint lAngleterre anglicane pour ne pas être obligée de renier sa foi. Un autre Jean, lieutenant du roi en pays de Maine est tué à la bataille de Pavie en 1525. Son fils, Jean, est en 1567 gouverneur et lieutenant général des villes, baronnies des châteaux, et autres places dépendantes de lélection de Mayenne. Il chasse les huguenots de la province après avoir fait lever le siège de Lassay en 1571. Cest ce même Jean qui épouse Marie de Lévaré en 1539 et qui fait construire lactuel château de Lévaré. En 1753, la famille des Vaux se sépare en deux branches ; Champéon et Lévaré. Cette séparation sest faite juridiquement mais les causes en sont inconnues. Les descendants des Vaux de Lévaré y habiteront jusquen 1860. Le dernier des Vaux séteindra en 1817.                                                                                                LEVARE, possédant déjà le château du Bailleul à Gorron, la famille Leray se porte alors acquéreur du château de Lévaré. Dimportants travaux de restauration sont entrepris, notamment grâce à la fortune de la femme de Maurice Leray, désormais 4ème duc dAbrantès. Ils ont trois fils, Andoche (1871-1954), Alfred (1873-1920) et Michel (1880-1949).","architecture":"VAUX, était en ruine au XVIe siècle. Il sinscrit dans une parcelle cadastrée et dessine un corps allongé encadré de deux retours. Il faut noter que l'édifice actuel était en ruine lorsquil a été acquis par lactuel propriétaire. Il ne subsiste du château quune porterie constituée de deux corps de garde encadrant lentrée actuellement occupée par la tour descalier. On retrouve lencadrement de ce passage dans le mur nord du bâtiment. La grande salle de létage était une salle de garde éclairée au sud par deux ouvertures remarquablement ouvragées ; celle de gauche est décalée par rapport à la porte quelle domine. Elles étaient murées et ont été découvertes lors des travaux. Les deux fenêtres rectangulaires ont été rajoutées au XVe siècle. Le niveau supérieur était atteint grâce à une échelle. Au XVe siècle, la tour défendue par une bretèche a été ajoutée et le corps de lactuel logis a été allongé vers louest par déplacement du pignon et ajout de murs en moellons qui tranchent sur lappareil en pierres de taille du corps de garde. A langle nord-ouest, léchauguette a  été construite au XVe siècle. Le pignon ouest est aveugle mais il est occupé par les latrines des deux étages et un four à pain y a été adossé ultérieurement. La chapelle est un petit édifice rectangulaire construit en moellons et pierres de taille. Sa couverture est en tuiles et le pignon, percé dune porte en plein cintre, est surmonté dun clocher à quatre pans couvert dardoises. Au chevet, une fenêtre à redan, très largement ébrasée, était primitivement son unique éclairage. La voûte en berceau est lambrissée et lon remarque la finesse des entraits et poinçons. Elle a fait lobjet dune importante restauration terminée en 1988.","habitants":"Famille des Vaux                                                                        Famille Leray \r\n        \"","divers":"a Champéon le château de Vaux et de                                         Levaré gps 48° 24' 54\" N, 0° 54' 33\" Ouest","gps":"","images":["../image/image_53/53_Vaux_Levar%c3%a9_1.jpg","../image/image_53/53_Vaux_Levar%c3%a9_2.jpg","../image/image_53/53_Vaux_Levar%c3%a9_3.jpg","../image/image_53/53_Vaux_Levar%c3%a9_4.jpg"]},"Consult_chateau_formulaire66bf":{"id":"Consult_chateau_formulaire66bf","dept":"53","canton":"Laval","commune":"Vieux Ville","nom":"Vieux_Ville","type":"Manoir","periode":"XIII-XV","histoire":"VIEUX-VILLE  Il appartenait aux seigneurs de ce nom, dès le XIIIe siècle. Durant la guerre de Cent Ans, alors que la baronnie de Fougères était aux mains des ducs dAlençon, Marie de Bretagne, Duchesse dAlençon, choisit, en 1426, Alain de la Vieuxville, Gouverneur de Fougères, comme curateur du jeune duc d'Alençon Jean II, fut prisonnier à Verneuil, en 1424. Il dut veiller au rachat de la liberté de Jean II : la baronnie de Fougères en devint l'enjeu. En décembre 1428, le duc Jean II la vendit à son oncle, le duc de Bretagne. Il existe 1 manoir et 2 châteaux à Vieux-Ville : Manoir de la Vieuville, le château de la Vieuville et le château de la Folletière et le jardin botanique de Haute-Bretagne. Il regroupe 24 jardins sur 25 hectares en trois ensembles : les jardins de l'Arcadie, les jardins romantiques et les jardins du crépuscule.","architecture":"VIEUX-VILLE,  le manoir, est une belle demeure du XVIIe siècle. Il représente un grand pavillon en granit appareillé élevé sur deux étages sous lesquels s'ouvre une large porte cintrée, sommée d'une archivolte. Il est orné dune corniche modilonée et couvert dun toit à croupes : ce pavillon est accosté dune tourelle assez élégante, plus ancienne  du XVIe siècle, dont la couverture à l'impériale est coiffée dun campanile.Le toit du logis aligne des lucarnes ouvragées. Ce logis daté de 1665 était prolongé dun second pavillon à couloir démoli au XIXe ; les deux autres lucarnes à fronton triangulaire qui équilibraient la façade ont été déposées et placées sur le toit des communs du nouveau château, à l'époque de sa reconstruction. Les rampes du perron d'accueil sont garnies de balustres incurvés. Devant le manoir, s'étendait autrefois un parc à la française. On accède au manoir de Vieuville par une grande allée plantée, fermée par une belle grille en fer forgé du XVIIIe siècle, venue de l'ancien hôtel Le Harivel, rue Pinterie  à Fougères. Les alentours portent l'ombrage imposant de hêtres et de chênes, plusieurs fois séculaires.","habitants":"Baronnie de Fougères Famille de Vieux-Ville\r\n        \"","divers":"Le château de Vieux Ville","gps":"","images":["../image/image_53/53_Vieux_Ville_1.jpg","../image/image_53/53_Vieux_Ville_2.jpg"]},"Consult_chateau_formulaire0f91":{"id":"Consult_chateau_formulaire0f91","dept":"53","canton":"Cossé-le-Vivien","commune":"La chapelle -Craonnaise","nom":"Villegrand","type":"Manoir","periode":"XVII","histoire":"VILLEGRAND, mentionné en 1247, habité au XIVe siècle par les Du Bois passe ensuite aux Guérif dont l'un des menbres, Bertrand sera tué en duel par Guillaume du Buat en 1535. Au XVIIe siècle Jacquine Hunault, héritière des seigneuries du Plessis de Denazé, du Deffay et de Villegrand, les apporte en dot lors de son mariage avec Jean de la Barre gentilhomme, appartient   en 1697 à Christophe Fouin sieur de Fuseaux, receveur du grenier à sel de Craon. Son fils, Christophe qui hérite de la charge de son père lègue  Villegrand  à Marie Marsollier qui à son tour  cède  la demeure à Anselme de la Barre, la propriété est demeurée dans la descendance dans cette famille jusqu'à son extinction de cette dernière au XXe siècle venue par héritage aux Couetoux du Tertre, longtemps utilisé comme ferme.","architecture":"VILLEGRAND, de dimensions modestes, le manoir se compose d'un corps de logis rectangulaire dont la façade principale est séparée en deux par une tour abritant  l'escalier à vis en bois.  La partie gauche de l'élévation plus haute que la droite présente une travée centrale terminée par une lucarne  à linteau cintré. La fenêtre à meneaux du rez-de-chaussée à conservé  la grille de défense.","habitants":"Famille de Villegrand\r\n        \"","divers":"A  La chapelle -Craonnaise le manoir de Vllegrand 47° 53' 56\" nord, 0° 54' 56\" ouest","gps":"","images":["../image/image_53/53_Villegrand_1.jpg","../image/image_53/53_Villegrand_2.jpg"]},"Consult_chateau_formulairef46b":{"id":"Consult_chateau_formulairef46b","dept":"53","canton":"Meslay-du-Maine","commune":"Villiers-Charlemagne","nom":"Villiers_Charlemagne","type":"Château","periode":"XIV-XVII","histoire":"POIRIERS à trois kilomètres à l'ouest à Saint-Sulpice  le château  de Poirier; ce fief relevait de la seigneurie de Château-Gontier. En 1506, on signale le lieu et appartenances des Périers que possédaient Bertrand de la Corbière. Il vendit, vers 1520, le domaine des Periers à Jean Doublard. Antoine Amys du Ponceau, fut élu Président de Château-Gontier. René du Laurent, en 1702, fut chevalier. Jules Simon, écuyer, devient seigneur de Kerviou. Dans la première moitié du XIXe siècle, les Poiriers appartiennent à la famille Laumaillé qui fit remanier complètement le château des Poiriers. Léon Laumaillé, fut maire de Loigné-sur-Mayenne, en 1871. Il était le frère d'Albert Laumaillé.                                                            VILLIERS-CHARLEMAGNE, Charlemagne serait venu à Villiers vers 778, lors de la préparation de l'expédition contre les Basques révoltés. Le lieu lui aurait plu, et du fait de la proximité de la frontière bretonne, il aurait formé le projet d'y construire une forteresse défensive contre les Bretons  Francon d'Ollivier, qui venait de dédicacer une église à Saint-Ernée, aurait eu une entrevue avec Charlemagne également à Villiers. Il se serait fait restituer les biens appartenant à l'Église du Mans appropriés par plusieurs seigneurs. Wilibert, seigneur de Villiers, aurait été chargé par l'empereur de rendre les biens temporels, dîmes et revenus appartenant à l'Église et aux abbés de Saint-Calais.","architecture":"Plusieurs châteaux à Villiers-Charlemagne                                                              LAUNAY-VILLIERS,  château de Villiers (vestiges du château fort) du XIVe siècle et sa chapelle du XIXe siècle. Robert III de Vitré, en lutte contre le duc de Bretagne Conan IV dut trouver refuge sur les terres de Guy IV de Laval, se retranchant dans une motte féodale située à Launay-Villiers. Il appartient à la communauté de communes du Pays de Loiron.","habitants":"famille Laumaillé\r\n        \r\n        \r\n        \"","divers":"Villiers-Charlemagne grav-4    GPS : 47° 55' 23\" Nord, 0° 40' 30\" Ouest      Falette grav 1  Lézière grav 2             Launay villiersGPS : 48° 08' 03\" Nord, 1° 00' 32\" Ouest                       Poirier GPS : 47° 52' 24\" Nord, 0° 44' 52\" Ouest  Valette grav 3","gps":"47° 55' 23\" Nord, 0° 40' 30\" Ouest      Falette grav 1  Lézi","images":["../image/image_53/53_Villiers_Charlemagne_1.jpg","../image/image_53/53_Villiers_Charlemagne_2.jpg","../image/image_53/53_Villiers_Charlemagne_3.jpg","../image/image_53/53_Villiers_Charlemagne_4.jpg"]},"Consult_chateau_formulaire81c7":{"id":"Consult_chateau_formulaire81c7","dept":"53","canton":"Evron","commune":"Vimarcé","nom":"Vimarcé","type":"Château","periode":"XVI-XVII","histoire":"COURTALIERU, c'est un château en ruine qui se situe au sommet d'une colline qui sert de point de vue. La famille de Courtaliéru était vassale des Vicomtes du Maine jusqu'au XIIIe siècle. Quant aux souterrains, M. le baron de Wismes en parle après plusieurs autres, mais ils n'ont jamais été visités. Là comme ailleurs, on a pris pour des galeries profondes ce qui n'était que l'amorce de caveaux ordinaires ou de grottes dans le calcaire. Le château de Courtalieru et sa chapelle sont en ruines.","architecture":"PUYZ,  a un kilomètre au sud Saint Martin de Connée En 1455, le fief du Puyz relevant de Foulletorte et d'Orthe, est décrit comme \"domaine du Puiz, hébergement, court, issuz, vergiers et jardins, garennes, bussons, boys\". Aux XVe et XVIe siècles, la famille du Puyz habite le château puis s'y succèdent les Trajin aux XVIe et XVIIe siècles, les Clinchamp du XVIIe au XVIIIe siècle, les Boismauclerc et les Richer de Montauban aux XVIIIe et XIXe siècles. Entre 1827 et 1883 habitent les Saint-Rémi et les Jarret de la Mairie. C'est Agathe Marie de Saint-Rémi et son époux Louis Jarret de la Mairie qui font reconstruire le château. Louis Jarret de la Mairie sera maire de Saint Martin de Connée en 1878. La demeure se compose d'un grand corps de bâtiment flanqué de quatre tours rondes aux angles et d'un pavillon en saillie à gauche. Cette partie même a été construite en 1878 et l'ensemble de la construction, dont la partie centrale, la plus ancienne date du XVe siècle, a été mis en harmonie. La chapelle est de 1878, ornée de vitraux sortis des ateliers du Carmel du Mans.","habitants":"Famille de Courtaliéru\r\n        \r\n        \r\n        \"","divers":"Château de Courtalièru et de Puyz grav -2-3-4  à Vimacé,  du tertre grav 1  GPS : 48° 11' 25\" Nord, 0° 14' 01\" Ouest","gps":"48° 11' 25\" Nord, 0° 14' 01\" Ouest","images":["../image/image_53/53_Vimarc%c3%a9_1.jpg","../image/image_53/53_Vimarc%c3%a9_2.jpg","../image/image_53/53_Vimarc%c3%a9_3.jpg","../image/image_53/53_Vimarc%c3%a9_4.jpg","../image/image_53/53_Vimarc%c3%a9_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','53 — Mayenne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
