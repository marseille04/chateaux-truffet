ions dans la rue du Théâtre. La construction  date du XIIIe siècle. Des galeries souterraines, vestiges de l'ancien château fort, ont été découvertes au moment des démolitions. Une autre maison est construite, en 1731 sur l'emplacement de l'ancien château; elle existe encore. Le château de Château-Gontier est inscrit aux M.H. depuis 1930.                                                                                                           HOTEL LANTILLY, date du XVIe et XVIIe siècle, par la famille de Lantivy, à partir de 2 maisons qui dataient du XVIe siècle. Château-Gontier possède environ 40 hôtels environ qui datent du XVIe et XVIIe siècle. Le plan de l'édifice est un rectangle cantonné de deux tours, l'une en angle au pignon nord, l'autre en angle sud-est. Ces deux tours sont en liaison avec les maçonneries du corps de logis. A l'ouest, un bâtiment de plan rectangulaire abrite un escalier à deux rampes. L'édifice a conservé toute sa charpente et les petites lucarnes du XVIe siècle. Les menuiseries intérieures (du XVIIe siècle) sont également conservées ainsi que les vitraux en plomb d'origine. Dans la disposition ancienne, chaque niveau, desservi par l'escalier, correspondait à un corps de logis. Il s'agit là d'un exemple typique de l'urbanisme post-médiéval. L'Hôtel de Lantivy a été classé par arrêté du 5/10/1988.                                                                          MIREVAULT,  situé au cur dun parc clos et vous pourrez vous promener au milieu de prairies ou de bosquets. Restaurée au XIXe siècle, cette demeure familiale  depuis 1573, à la campagne est pleine de charme.","architecture":"Hôtel FOUQUET, présente une exceptionnelle collection dantiquités grecques et latines, ainsi quun ensemble important de peintures françaises et hollandaises du XVIIe siècle, dont un tableau de Charles Le Brun. Il possède également une uvre de Camille Claudel un dessin « Portrait de la comtesse Arthur de Maigret ». En 1998, Pierre Logé, collectionneur, passionné dart contemporain, a fait don à la ville de Château-Gontier de plus de deux cents uvres achetées pendant quarante cinq années de sa vie à des artistes vivants dont Philippe Favier, Philippe Cognée, David Ryan, Carmelo Arden Quin, Eric Fonteneau, Jean-Pierre Pincemi.  Une des cinq salles dexposition du musée est consacrée à cette collection, complétée par un bel ensemble de bronzes animaliers, témoin de la passion du vétérinaire Pierre Logé pour lart et lanimal réunis.                                                                                                                              MONTIVANT, la construction du Manoir de Montviant date du XVIIIe et XIXe siècle. Le manoir de Montviant est inscrit partiellement aux M.H. depuis le 24.06.1975. Sont protégés par les M.H. ses façades, les toitures du manoir et des communs, la salle à manger, la bibliothèque et le salon au rez-de-chaussée et trois chambres à l'étage.                                           MIRVAULT,  est rénové au XIXe siècle, le château de Mirvault a une activité dhébergement touristique dite « chambres d'hôtes ».\r\nPropriétaires successifs  1902 - Christian Le Tessier de Coulonge, décédé au château. 1910 - Ludovic Le Tessier de Coulonge (1837-1910), décédé au château. 1911 - Comte Joseph Gouin d'Ambrière (1867-1948), capitaine de corvette, chevalier de l'ordre national de la Légion d'honneur en 1904, épouse en 1895 Jacqueline Marie Charlotte Le Tessier de Coulonge.  Présent  Famille Gouin d'Ambrière.","habitants":"Famille de Lantivy\r\n        \r\n        \r\n        \"","divers":"Cinq châteaux à Château-Gontier dont celui de Château-Gontier grav-1-2- Chêne Vert grav 3-4-5, de Mirevault grav  6-7,  de Montivant et deux Hôtels Fouquet et Lantilly.                      GPS : 47° 49' 33\" Nord, 0° 42' 14\" Ouest                                                           Fouquet    GPS : 47° 49' 43\" Nord, 0° 42' 10\" Ouest                                    Hotel lantilly   GPS : 47° 49' 43\" Nord, 0° 42' 10\" Ouest              Mirevault gps  47° 50' 33\" nord, 0° 42' 06\" ouest                                           Montivant  GPS : 47° 50' 19\" Nord, 0° 43' 43\" Ouest","gps":"47° 49' 33\" Nord, 0° 42' 14\" Ouest","images":["../image/image_53/53_Ch%c3%a2teau_Gontier_1.jpg","../image/image_53/53_Ch%c3%a2teau_Gontier_2.jpg","../image/image_53/53_Ch%c3%a2teau_Gontier_3.jpg","../image/image_53/53_Ch%c3%a2teau_Gontier_4.jpg","../image/image_53/53_Ch%c3%a2teau_Gontier_5.jpg","../image/image_53/53_Ch%c3%a2teau_Gontier_6.jpg","../image/image_53/53_Ch%c3%a2teau_Gontier_7.jpg"]},"Consult_chateau_formulaire264c":{"id":"Consult_chateau_formulaire264c","dept":"53","canton":"Meslay-du-Maine","commune":"Le Bignon du maine","nom":"Clavières","type":"Château","periode":"XIX","histoire":"CLAVIERES, la construction du château de Clavières date du XIXe siècle. Son propriétaire initial était Louis Guays des Touches qui en avait fait sa résidence. Le domaine de Clavières fut acquis, en 1833, par Louis Guays des Touches, juge à Laval, marié en 1827 à Reine Blanche Bucher de Chauvigné (1803-1868). Il y fait construire un château avec une chapelle. Son fils Auguste Guays des Touches (1828-1874), léguera par testament en 1874 son château de Clavières au Séminaire de Laval, à la condition qu'une messe quotidienne soit célébrée dans la chapelle où se trouve sa sépulture et celles de ses parents. Les frères de Saint-Laurent-sur-Sèvre acceptèrent en 1875 la proposition d'y établir un noviciat.","architecture":"CLAVIERES, devint la maison d'études des frères de Saint-Gabriel. En 1882, le noviciat fut remplacé par un juvénat. Deux corps de bâtiments seront rajoutés en 1891-1893, pour y recevoir un scolasticat, en 1896. Situé dans l'ancien château de Clavières, le sanatorium  était une station sanitaire au moment de la guerre 1914-1918, l'hôpital auxiliaire de Laval, pour le soin des militaires tuberculeux. Après la guerre, le sanatorium accueillera des malades civils tuberculeux. En 1975, il devint le centre médical de la Fontaine-au-Bac. Le centre médical du château de Clavières a été fermé depuis 2008.","habitants":"Famille de Louis Guays des Touches\r\n        \"","divers":"GPS : 47° 56' 22\" Nord, 0° 38' 42\" Ouest","gps":"47° 56' 22\" Nord, 0° 38' 42\" Ouest","images":["../image/image_53/53_Clavi%c3%a8res_1.jpg","../image/image_53/53_Clavi%c3%a8res_2.jpg"]},"Consult_chateau_formulaire2e34":{"id":"Consult_chateau_formulaire2e34","dept":"53","canton":"Meslay-du-Maine","commune":"Saint-Denis du Maine","nom":"Coudray_53","type":"Château","periode":"XV-XVIII","histoire":"Il existe 2 manoirs et 1 château sur la commune de Saint-Denis-du-Maine : Le manoir du Vauberger, le manoir d'Aubigné  (voir article)                                                                                              COUDRAY, La construction du château du Coudray date du XVe et XVIIIe siècle. Il a été restauré à la fin du XIXe siècle, est une construction en pierres du pays avec un encadrements en tuffeau et un toit en ardoises. Le logis initial a été agrandi, en 1569, d'un corps de bâtiment. Deux pavillons sont construits en 1777. Un jardin à la française, un potager et un verger sont créés en 1783 au sud à l'emplacement des douves.                                                               AUBIGNE, les seigneurs d'Aubigné sont connus dès le XIe siècle, et obtiennent le droit en 1552 de fermer la maison et la doter d'un pont-levis (aujourd'hui disparu).La carte de Cassini (ancêtre de nos cartes IGN actuelles) situe le manoir dès le XVIe sur la route de Chammes, à la sortie de Vaiges. C'est un édifice de bien jolies proportions avec tour d'escalier à toit aigu. Il figure en façade trois fenêtres à frontons en pénétration dans la toiture - toutes divisées par des meneaux - comme d'ailleurs les autres fenêtres des étages inférieurs. De 1739 à 1855, le manoir est exploité par la famille de La Rochelambert. L'abbé Angot, dans son dictionnaire historique de la Mayenne, le qualifie de manoir à style, ce qui chez lui est preuve de grande qualité. Rappelons que les quatre tomes de cet ouvrage majeur pour le patrimoine mayennais ont été judicieusement réédités à sept reprises, la dernière remontant à l'année 1998 par l'imprimerie de la manutention à Mayenne. Rappelons qu'Isabelle de Marseul-Montéran restaure les laques anciennes depuis plus de trente-cinq ans.","architecture":"AUBIGNE, l'ensemble bâti d'Aubigné, inscrit à l'inventaire supplémentaire des M.H. depuis 1985, surmonte une belle plantation de feuillus dominant un plan d'eau accueillant de nombreuses espèces de canards. Le manoir à tourelle polygonale de la fin du Moyen-Age est entouré de deux longères formant les communs. Celle de droite abrite de nos jours l'activité professionnelle du couple de propriétaires : un bureau d'études d'architecture intérieure et un atelier de restauration et création de laques de Chine.                                                                                                                   COUDRAY, le château du Coudray existait au lieu-dit le Coudray un hébergement dès le XIVe siècle, qui devint une habitation seigneuriale avec tour pentagonale, chapelle et douves. Le château, restauré à la fin du XIXe siècle, est une construction en pierres du pays avec encadrements en tuffeau et toit en ardoises. L'édifice est partiellement entouré de douves avec bâtiments annexes et jardins, chapelle, orangeries et écuries. Situé route de la Bazouge de Chémeré. Il fut la résidence de  la marquise de Sévigné Marie de Rabutin-Chantal. Éléments protégés MH : le logis ; la chapelle ; les communs ; la fuie ; l'ancien parc ordonnancé : inscription par arrêté du 19 décembre 1985.     Éléments protégés MH : le logis ; la chapelle ; les communs ; la fuie ; l'ancien parc ordonnancé : inscription par arrêté du 19 décembre 1985.","habitants":"Marquise de Sévigné Marie de Rabutin-Chantal.\r\n        \r\n        \"","divers":"Il existe 2 manoirs et 1 château sur la commune de Saint-Denis-du-Maine à découvrir : Le manoir du Vauberger, le manoir d'Aubigné et St-Denis   grav-4-5-6                             Gps 47° 58' 00\" nord, 0° 31' 38\" ouest                                                     le château du Coudray. Grav 1-2-3 GPS : 47° 58' 59\" Nord, 0° 30' 11\" Ouest","gps":"47° 58' 59\" Nord, 0° 30' 11\" Ouest","images":["../image/image_53/53_Coudray_53_1.jpg","../image/image_53/53_Coudray_53_2.jpg","../image/image_53/53_Coudray_53_3.jpg","../image/image_53/53_Coudray_53_4.jpg","../image/image_53/53_Coudray_53_5.jpg","../image/image_53/53_Coudray_53_6.jpg"]},"Consult_chateau_formulaire519c":{"id":"Consult_chateau_formulaire519c","dept":"53","canton":"Evron","commune":"Brée","nom":"Courbe_de_Brée","type":"Forteresse","periode":"XIV-XV","histoire":"COURBE de BREE, la terre était composée du domaine avec cens, rentes et droits seigneuriaux sur la majeure partie de la paroisse, et deux cents arpens de landes dans les landes de la Charnie, en Livet et en Saint-Christophe-du-Luat. Ce château relevait pour sa haute, moyenne et basse justice et pour ce qu'emportent les fossés, le pré de la Salle, les champs et les  prairies des Marais, du chapitre du Mans par sa châtellenie d'Assé-le-Béranger ; de Monsieur, frère du roi, pour les deux cents arpens de landes de la Charnie ; et du château de Brée, à foi et hommage lige, pour le surplus et pour son titre de Châtellenie.\r\nL'édifice fait l'objet d'une inscription au titre des M.H depuis le 22 septembre 1995. Les premiers seigneurs de La Courbe, reconnus par titres authentiques, appartenaient à la famille Le Vayer de Voutré, famille d'écuyers. Jean de Vassé, époux de Perrette Le Vayer, est dénombré dans la montre de la compagnie d'ordonnance du connétable Bertrand du Guesclin en 1370. En 1402 il fit plusieurs dons au chapelain de son château. Devenu veuf, le seigneur de Vassé épousa en secondes noces Jehanne de Landevis avant 1410. Du mariage de Jean de Vassé et Perrette Le Vayer est issu Groignet, qui suit. Quant à son autre fille, Catherine de Vassé, dame de Montfouloux, Saint-Jean-sur-Mayenne et de la Girardière, elle épousa Jean des Écotais, chevalier seigneur dudit lieu et de Jublains ; celui-ci, devenu veuf, se remaria avec Jeanne d'Orange ; il avait eu du premier lit Jean IV des Écotais.l faut ajouter aux deux précédents : Perrine le Cornu, fille aînée de noble homme Ambroys le Cornu, l'aîné.","architecture":"COURBE de BREE, vers la fin du XIVe siècle, un étage est ajouté au-dessus de la grande salle et permet d'installer une salle haute  suivie d'une chambre carrée qui existe encore. Les ouvertures de la grande salle sont remaniées; une tour de latrines est construite à l'angle sud-est de la grande salle et dessert, via une galerie extérieure, les deux pièces de l'étage.  Dans la 2e moitié du XVe siècle, de larges transformations sont opérées : transformation du vieux logis en cuisine, construction de la tour de gloriette, de la chapelle, surélévation de la moitié est du logis neuf, construction d'une tour de latrines. Vers 1560 on achève la surélévation du logis neuf, avec chambre haute et cabinet. La galerie est poursuivie vers l'ouest pour desservir les lieux. Sur la façade, on surmonte les fenêtres de frontons à décors de volutes et pots à feu.  Vers la fin du XVIe siècle, au moment de la Ligue, un mur d'enceinte défendu par 4 tours vient renforcer les défenses extérieures.  4 bâtiments de service sont édifiés à proximité :    le porche d'entrée du XIIIe??XIVe siècle, muni d'un double pont-levis ;    le bâtiment de service fermant la cour au nord (antérieur à la fin du XVe siècle) ;   la grange (XVIe siècle) une fuie existait au XVIIe siècle.","habitants":"famille Le Vayer  de Voutré\r\n        \"","divers":"Château de Brée à Courbe de Brée                                              Gps 48° 08' 40\" N, 0° 29' 49\" Ouest","gps":"","images":["../image/image_53/53_Courbe_de_Br%c3%a9e_1.jpg","../image/image_53/53_Courbe_de_Br%c3%a9e_2.jpg","../image/image_53/53_Courbe_de_Br%c3%a9e_3.jpg"]},"Consult_chateau_formulaire48a6":{"id":"Consult_chateau_formulaire48a6","dept":"53","canton":"Cossé-le-Vivien","commune":"Courbeveille","nom":"Courbeveille","type":"Château","periode":"XV-XIX","histoire":"PATRIERE, en 1854, le comte de la Barre a fait reconstruire le château. Précédemment on y voyait 14 tours, flanquant l'édifice ou fortifiant l'enceinte. Le château de la Patrière est mansardé, flanqué de pavillons à frontons triangulaires. L'avant-corps est couronné d'une lanterne. La tour est isolée avec une toiture en poivrière et il existe encore des passerelles sur les douves.","architecture":"COURBEVEILLE, il est construit sur les marches de Bretagne comme un grand nombre de châteaux. Il est mentionné au XIIe siècle dans le castrum curvae villae. Possession de la famille de Laval, en 1269, Guy VII de Laval reconnait à sa fille Yolande les droits sur la terre de Courbeveille. En 1292, Guy VIII de Laval donne la terre de Courbeveille à ses enfants issus de son deuxième mariage avec Jeanne de Beaumont. Son fils, André de Laval, mari d'Eustache de Beaucay, en bénéficie, puis la donne à leur fils Jean de Laval-Châtillon. Jeanne de Laval-Tinténiac, sa fille épouse Guy XII de Laval. Anne de Laval laisse Courbeveille à André de Lohéac, auquel succède son frère Louis de Laval-Châtillon.\r\nOn retrouve en 1443 et 1444 dans les aveux de Courbeveille rendus à Laval premièrement la mote et l'emplacement du chastel ancien, avec les douves.","habitants":"Famille  de Laval\r\n        \"","divers":"Deux châteaux à  Courbeveille Patrière grav -1-2 ,                               GPS : 48° 00' 27\" Nord, 0° 52' 45\" Ouest","gps":"48° 00' 27\" Nord, 0° 52' 45\" Ouest","images":["../image/image_53/53_Courbeveille_1.jpg","../image/image_53/53_Courbeveille_2.jpg"]},"Consult_chateau_formulaire88c7":{"id":"Consult_chateau_formulaire88c7","dept":"53","canton":"Evron","commune":"St-Thomas de Courceriers","nom":"Courcerier","type":"Vestiges -Château","periode":"XVI-XVII","histoire":"COURCERIER. Guillaume de Courcerier dit le jeune fonda en 1418 la chapelle saint Jean et la dota d'une métairie en Pézé le Robert. Sa porte ogivale fut surmontée d'une rosace suite à un incendie qui dévasta la nef au milieu du XIXe siècle. Guillaume maria sa fille Guillemette à Ambroise. Ce gendre, engagé très jeune dans la lutte contre les anglais mena dans le Maine attaques et embuscades. En 1419, réfugié au château de Courceriers les anglais l'attaquèrent et s'emparèrent de la forteresse. Incapables de la défendre, ils préférèrent la détruire. François du Plessis-Châtillon fit construire un petit château terminé en 1590. Amoureux de l'Italie qu'il avait parcourue en 1577 et 1578, il en décore la salle principale d'une fresque représentant un César triomphant. On lui apporta des modifications au XIXe. Il fut totalement détruit dans les années 1960. Du château médiéval, ruiné par les anglais en 1451, reconstruit à la fin du XVIe siècle et embelli au milieu du XVIIe siècle, il ne subsiste depuis la démolition de 1961 que des ruines. L'élément le plus intéressant est le portail, situé à l'ouest du château auquel le relie sur une longue avenue. Ce bâtiment daté 1657, voûté à rez-de-chaussée, servant de colombier à l'étage, présente une belle qualité d'appareil et conserve des témoins d'une charpente à la Philibert Delorme  d'une tour servant aujourd'hui de chambre d'hôtes.","architecture":"COURCERIER, le premier seigneur à avoir engagé la construction de la forteresse médiévale semble être Gervais de Courcerier. Son nom figure parmi les assistants à la fondation du prieuré de Fontaine-Géhard. Il fut généreux donateur des abbayes d'Etival et Evron. Croisé avec Geoffroy de Mayenne, il assista au siège de Jaffa.    Aujourd'hui, de cette époque, s'élèvent à une quinzaine de mètres, les ruines de la porte d'entrée avec à droite une tour carrée et à gauche une tour ronde. La motte avait été nivelée à la fin du XVIe siècle. Sur la tour à la toiture en forme de cloche, on retrouve quelques traces d'ouvertures en plein cintre ainsi que dans le bâtiment qui lui est proche. Sur un des pignons de celui-ci, une avancée en surplomb d'éléments d'architecture soignée et décorée peut faire penser à des latrines du XIVe siècle. Haute muraille médiévale isolée en tant que ruines ; tour subsistante du château de la fin du XVIe siècle ; bâtiment rectangle à bretèche en pignon ; logis de garde et portail au lieudit Le portail : inscription par arrêté du 20 mars 1987   Les vestiges actuels se composent : d'un portail d'entrée situé à l'ouest du château, composé d'une charpente dite à la Philibert Delorme ;  d'une porte d'entrée monumentale située au nord de l'allée,  du logis ; Haute muraille médiévale isolée en tant que ruines ; tour subsistante du château de la fin du 16e siècle ; bâtiment rectangle à bretèche en pignon ; logis de garde et portail au lieudit Le portail : inscription par arrêté du 20 mars 1987.","habitants":"Famille de   François du Plessis-Châtillon\r\n        \r\n        \"","divers":"Courceriers  Gps 48° 16' 19\" N, 0° 15' 10\" Ouest","gps":"","images":["../image/image_53/53_Courceriers_1.jpg","../image/image_53/53_Courceriers_2.jpg","../image/image_53/53_Courceriers_3.jpg","../image/image_53/53_Courceriers_4.jpg","../image/image_53/53_Courceriers_5.jpg","../image/image_53/53_Courceriers_6.jpg","../image/image_53/53_Courceriers_7.jpg"]},"Consult_chateau_formulaire491c":{"id":"Consult_chateau_formulaire491c","dept":"53","canton":"Château-Gontier","commune":"Craon","nom":"Craon_Cosmes","type":"Château","periode":"XVIIe-XIXe","histoire":"CRAON, a été construit en 1770 pour le marquis d'Armaillé. Il a été vendu une seule fois, en 1828, à la famille Champagné. En janvier 1790, le marquis d'Armaillé, se sentant menacé, abandonne son château aux troupes révolutionnaires qui y cantonnent. Il se réfugie dans son hôtel parisien. En octobre 1793, le général Charles Marie de Beaumont d'Autichamp et l'armée catholique et royale de Vendée en chassent les soldats républicains du général Chambertin, qui y reviennent en janvier 1794. Des combats ont lieu dans le parc, suivis d'exécutions sommaires par le général Vachot au cours de l'été suivant.   Celle-ci resta propriétaire du domaine jusqu'en 1954, ou elle le cède au comte Louis de Guébriant, père de l'actuel propriétaire. Construit en tuffeau, il décline une façade au fronton curviligne et aux baies ornées de guirlandes Louis XVI. aujourd'hui à la famille de Quatre-Barbe.                                                                       A quelques kilomètres au nord à Cosmes  COSMES  Du château qui fut la demeure de Pierre Le Cornu, le fougueux ligueur et gouverneur de Craon, on n'a conservé que la motte seigneuriale bien réduite, la chapelle servant au début du XXe siècle de hangar et un large écusson sculpté sur tuffeau encastré, vaille que vaille, dans une bâtisse quelconque. La demeure du batailleur qui avait visité et ravagé les châteaux de tous les huguenots ou royaux du Craonnais ne pouvait échapper aux désastres de la guerre ; Pierre Le Cornu ne voulut plus revenir à la paix ; il se fit bâtir un château qu'il nomma le château de Bon-Repos. Mathieu Foucher, sieur du Grès, mari de Marguerite Heureau, demeurait au Plessis en 1599 et après lui Mathieu Foucher et Françoise Lefebvre, sa femme. Le château est devenu depuis une ferme, située à 1 200 mètres au Sud-Ouest de Cosmes.","architecture":"CRAON; c'est un château de style classique et néo-Classique,Construit en tuffeau, il décline une façade au fronton curviligne et aux baies ornées de guirlandes Louis XVI. élévation sur cour de style néo-classique. On trouve au rez-de-chaussé les pièces de réception : le grand vestibule et son escalier d'honneur à la rampe en fer forgé, la salle à manger et quatre salons, au mobilier Louis XVI, et aux belles boiseries. Récemment restaurés,. Éléments protégés MH : les façades et les toitures du château, de la chapelle et de l'orangerie ; les parterres situés devant le château ; le vestibule et l'escalier d'honneur avec sa rampe en fer forgé ; les pièces suivantes du rez-de-chaussée avec leur décor, classement par arrêté du 19 mars 1971. Les vestiges de l'implantation médiévale du château, à savoir l'ancienne casemate avec son vestige roman et l'ensemble du mur sud formant terrasse ; le château et le parc des XVIIIe et XIXe siècles : le pavillon d'agrément qui lui est symétrique, les façades et les toitures du manège-haras ainsi que les étables et les logements qui y subsistent, la buanderie-lavoir, la glacière, le pigeonnier-boulangerie, les façades et les toitures du pavillon du portier et grille de Laval, les façades et les toitures des deux pavillons et la grille de Bel Air, les deux ponts du domaine à arches maçonnées et garde-corps métalliques, le parc proprement dit:  On trouve au rez-de-chaussé les pièces de réception : le grand vestibule et son escalier d'honneur à la rampe en fer forgé, la salle à manger et quatre salons, au mobilier Louis XVI, et aux belles boiseries. Récemment restaurés.                                                                                                                  COSMES   Sous lAncien Régime, la commune faisait partie du fief de la baronnie angevine de Craon, dépendait de la sénéchaussée principale d'Angers et du Pays d'élection de Château-Gontier.En 1790, lors de la création des départements français, une partie du Haut-Anjou, dont la commune de Cosmes.","habitants":"Marquis d'Armaillé\r\n        \"","divers":"Cosmes; GPS : 47° 54' 53\" Nord, 0° 53' 27\" Ouest                                         Craon  grav 1 à 6                                                                                GPS : 47° 51' 8,88\" Nord, 0° 57' 2,91\" Ouest                                             Motte GPS : 47° 50' 38\" Nord, 0° 58' 56\" Ouest","gps":"47° 54' 53\" Nord, 0° 53' 27\" Ouest","images":["../image/image_53/53_Craon_Cosmes_1.jpg","../image/image_53/53_Craon_Cosmes_2.jpg","../image/image_53/53_Craon_Cosmes_3.jpg","../image/image_53/53_Craon_Cosmes_4.jpg","../image/image_53/53_Craon_Cosmes_5.jpg","../image/image_53/53_Craon_Cosmes_6.jpg"]},"Consult_chateau_formulairee121":{"id":"Consult_chateau_formulairee121","dept":"53","canton":"Meslay-du-Maine","commune":"Saulges","nom":"Crosnières","type":"Château","periode":"XVII","histoire":"CROSNIERES, la construction du château  date du XVIIe siècle. La seigneurie de Saulges fut acquise en 1556, par Jean de Thévalle, le dernier et le plus célèbre de ce nom, qui réunit ce nouveau domaine à sa terre de Thévalle, dont le château féodal s'élève tout près de là, au-dessus du cours de lErve. Il laissa pour unique héritière Jacqueline de Thévalle, dont, il fallut, à lépoque de son mariage  en  1597 avec Charles de Maillé-Brezé, prouver par témoignage la légitimité, car les registres paroissiaux de Chémeré-le-Roi avaient été brûlés par les bandes de huguenots anglais qui avaient dévasté le pays en 1592. Urbain de Maillé-Brézé, marquis de Brézé, issu de ce mariage, devint, par ses mérites personnels et surtout par la protection du cardinal de Richelieu, dont il avait épousé la sur, maréchal de France et chevalier des Ordres du roi. Agée de 13 ans, Claire-Clémence de Maillé-Brézé, fille du maréchal, en 1641, devint l'épouse de Louis II de Bourbon de Condé. Ce fut le cardinal-ministre qui l'imposa à Louis II de Bourbon-Condé. Deux ans plus tard, il fut le vainqueur de Rocroi, et devint le Grand Condé, grâce à de nombreuses victoires. Marié, le futur héros devint le seigneur de Thévalle, le seigneur de Saulges et le patron temporel de cette église.","architecture":"CROSNIERES , ce domaine était bien peu de chose dans l'immense fortune d'un prince de sang. Condé y fit cependant acte de maître et seigneur, non en personne, mais par procureur. Puis, au temps où exilé pour ses multiples révoltes contre Mazarin et la cour, il vit tous ses biens saisis, la terre de Thévalle et celle de Saulges, son annexe, furent saisies, elles aussi. Quant le prince rentra en grâce à la cour, il récupéra tous ses biens qui avaient été confisqués et fut, jusqu'à sa mort, seigneur de Thévalle et de Saulges. Henri Jules de Bourbon-Condé, fils du Grand Condé, devint seigneur de Saulges. Il était, lui aussi, grand maître de France. Le château de la Croisnière est inscrit aux M.H. depuis 1935.","habitants":"Famille de  Jean de Thévalle,\r\n        \"","divers":"Château de Crosnières                                                                    GPS : 47° 59' 00\" Nord, 0° 24' 16\" Ouest","gps":"47° 59' 00\" Nord, 0° 24' 16\" Ouest","images":["../image/image_53/53_Crosni%c3%a8res_1.jpg","../image/image_53/53_Crosni%c3%a8res_2.jpg"]},"Consult_chateau_formulaire4bea":{"id":"Consult_chateau_formulaire4bea","dept":"53","canton":"Azé","commune":"Daon","nom":"Daon","type":"Château","periode":"XVI-XVII","histoire":"A Daon plusieurs  châteaux, dont  l'Escoublère, XVIe siècle, classé au titre des M.H depuis 1927.(voir article)   De Mortreux, classé au titre des M.H. depuis 1933. Des Places. des Lutz. De la Porte. De Bréon.  De la Nouairie. De la Noierie.  La Touche-Belin.  De Bellevue, dite Villa Bellevue,  et De Beaumont.                                                DAON, faisait partie de la sénéchaussée angevine de Château-Gontier dépendante de la sénéchaussée principale d'Angers depuis le Moyen Âge jusqu'à la Révolution française. Daon envoie Louis-François Martinet comme représentant du clergé aux états généraux de 1789. En 1790, lors de la création des départements français, une partie du Haut-Anjou a formé le sud mayennais, région aujourdhui appelée Mayenne angevine.                                           PORTE, fief mouvant de la châtellenie de Daon, le château de la Porte moderne, renouvelé en 1859 par M. Lévy, architecte de Paris, admirablement situé, dominant le cours de la Mayenne, détache sur la verdure du coteau boisé et sur le ciel la blancheur éclatante de ses murs et les toits élancés de ses tours et pavillons. Une eau-forte de Tancrède Abraham, dans l'Album de Château-Gontier, représente le paysage plutôt que l'édifice. Dans le salon, il y avait un tableau représentant le combat du vaisseau la Couronne, commandé par Isaac de Rasilly, contre la flotte anglaise devant la Rochelle, en 1625.","architecture":"LUTZ  Datant du XVIIe siècle, le château des Lutz propose des hébergements de style chambre d'hôtes dans un château authentique avec une piscine située dans le grand parc. Le château des Lutz vous propose ses chambres d'hôtes pour un séjour inoubliable.                                  MORTREUX Sa construction date du XVIe siècle. Le château de Mortreux est classé partiellement aux M.H. depuis le 6/05/1933.                                                                 PORTE, fief mouvant de la châtellenie de Daon, ayant des garennes, et un droit de banc dans l'église de Daon dans une chapelle près de  l'autel de Notre-Dame, droit de chasse et d'usage dans le bois de la Porte pour son chauffage et pour ses maisons, si démolies estoient, par mer et montrée du seigneur de Bréon-Subert. Le fief de Mauvinet en Saint-Michel-de-Feins lui fut uni.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château à Daon  Lutz grav 2-3-4 GPS : 47° 45' 00\" Nord, 0° 38' 20\" Ouest.   Porte  grav 7-8                                                  Montreux  Grav 5-6GPS : 47° 45' 10\" Nord, 0° 36' 42\" Ouest                   La Jallerie grav 1, Petit-Marigné grav-9","gps":"47° 45' 00\" Nord, 0° 38' 20\" Ouest.   Porte  grav 7-8","images":["../image/image_53/53_Daon_1.jpg","../image/image_53/53_Daon_2.jpg","../image/image_53/53_Daon_3.jpg","../image/image_53/53_Daon_4.jpg","../image/image_53/53_Daon_5.jpg","../image/image_53/53_Daon_6.jpg","../image/image_53/53_Daon_7.jpg","../image/image_53/53_Daon_8.jpg","../image/image_53/53_Daon_9.jpg"]},"Consult_chateau_formulaire2376":{"id":"Consult_chateau_formulaire2376","dept":"53","canton":"Évron","commune":"Montsurs","nom":"Ducherie","type":"Château","periode":"XVIII","histoire":"A la Ducherie manoir des Herbiers, du Rochet et la tour.                       DUCHERIE : Philippe Bidailler, fermier de la châtellenie de la Chapelle-Rainsouin, 1574 ; Christophe B., 1630, prêtre habitué à l'église Saint-Vénérand de Laval, 1650 ; noble Pierre Moreau et Catherine Hardy, sieur et dame de la Roche, 1695 ;  Charles Lasnier, mari de Marie Moreau, veuve en 1784. Le domaine est vendu par François Brochard, d'Andouillé à Delphine Le Corgne de Trimadeuc, femme du colonel Charles Théophile de Plazanet en 1864.  La Ducherie, est constitué d'un château et d'une ferme. Fief vassal de la Chapelle-Rainsouin. Pierre-François Davelu écrivait en 1780 : Il y a à Saint-Ceneré une montagne qui couvre la Ducherie qui paraît avoir été autrefois un fort. Il y avait probablement auparavant un châtelier. Le château domine le bourg de Saint-Cénéré, proche de la vallée où coule la Jouanne. Furent sieurs de la Ducherie : Philippe Bidailler, fermier de la châtellenie de la Chapelle-Rainsouin, 1574 ; Christophe B. 1630, prêtre habitué à l'église Saint-Vénérand de Laval, 1650 ; noble Pierre Moreau et Catherine Hardy, sieur et dame de la Roche, 1695 ; Charles Lasnier, mari de Marie Moreau, veuve, 1784. Le domaine fut vendu par François Brochard, d'Andouillé, à Delphine Le Corgne de Trimadeuc, femme du colonel Charles Théophile de Plazanet, 1864. Aujourd'hui, le château de la Ducherie est mis en vente.","architecture":"DUCHERIE , le château est construit vers 1860 par Charles Théophile de Plazanet. Il comprend : quatre pavillons surélevés aux angles, galerie contournant tout le château à l'entablement, perrons aux quatre façades. L'architecte était Constant Boissière. Les travaux ont commencé en 1854 pour sachever en 1871. Puis la famille de Plazanet nayant pas denfant, le couple lègue son château à un de leurs cousins, Paul de Marsac. Ce dernier y a habité de 1920 jusquà sa mort en 1947. Le château de la Ducherie, qui date du XIXe siècle, a été racheté en novembre 2018 par  Korap et Sylviane Spahijia, les nouveaux propriétaires, sont arrivés avec lenvie de restaurer le bâtiment, dans la commune de Montsûrs-Saint-Cénéré. Paul Clapier est devenu le 3e propriétaire en épousant une des filles de la famille de Marsac. Avant la reprise de la Ducherie par le dernier propriétaire, la famille Spahijia, M. et Mme Lemaire y ont installé leur imprimerie Téki en 1960.","habitants":"Famille de Plazanet\r\n        \"","divers":"A la Ducherie manoir des Herbiers, du Rochet et la tour.                               GPS : 48° 07' 18\" Nord, 0° 35' 41\" Ouest","gps":"48° 07' 18\" Nord, 0° 35' 41\" Ouest","images":["../image/image_53/53_Ducherie_1.jpg"]},"Consult_chateau_formulaire68ed":{"id":"Consult_chateau_formulaire68ed","dept":"53","canton":"L","commune":"Entrammes","nom":"Entrammes","type":"Château","periode":"XVII","histoire":"A Entrammes , Vallon et vestiges château féodal;,le Grand Rocca et le Coudre.                                                                                                               VALLON, le château est aujourd'hui la propriété de l'industriel français Emmanuel Besnier, le PDG de Lactalis. Le 28 octobre 2016, le groupe Lactalis a obtenu du tribunal de grande instance de Laval l'interdiction de la rediffusion du reportage de l'émission Envoyé Spécial, initialement diffusée le 13 octobre 2016 sur France 2, au motif que celui-ci contient des images du château, domicile d'Emmanuel Besnier. Mais par un arrêt du 24 janvier 2017, la cour d'appel d'Angers informe ce jugement et autorise France Télévisions à rediffuser ce programme. Par jugement du 25 septembre 2017, le tribunal de grande instance de Laval déboute sur le fond Emmanuel Besnier de sa demande de dommages-intérêts, le juge estimant que « le nom et la localisation » de la propriété du chef d'entreprise étaient déjà connus du public et que « France Télévisions n'a fait que reprendre ce qui est de notoriété publique et mettre des images sur des éléments connus du patrimoine de M. Besnier. Le château comme « moderne, cantonné de tours aux quatre angles ; au centre, lucarne avec écu armorié ; supporté par deux grands lions en ronde bosse.","architecture":"ENTRAMMES, cité pour la première fois dans les sources écrites en 1046, Robert dEntrammes passe pour avoir été lun des principaux vassaux de Guy de Laval.  Aussi, apparaît-il tout à fait logique que Guy ait confié à lun de ses hommes de confiance le contrôle dun point de passage important sur cette rivière, en loccurrence lancien chemin rennais la franchissant à gué à hauteur de Port-Ringeard. Par la suite, Hamon, son successeur, demeure dans lentourage de Guy et on le voit notamment témoigner lors des fondations des prieurés dArquenay et surtout de Saint-Martin de Laval, en 1055, où son nom occupe la première position dans la liste des personnes présentes. Lexistence dun lieu de résidence pour un lignage noble simpose à lépoque comme une évidence et se matérialise généralement sous les traits dune motte féodale. Lanalyse du cadastre napoléonien, daté de 1810, laisse entrevoir la forme dune parcelle circulaire le long de la rue principale du bourg à quelques centaines de mètres du château actuel.  Du moins, peut-on constater aujourdhui que les vestiges subsistants du château dEntrammes relèvent dun bâtiment maçonné en pierre adoptant la forme générale dun T. Le curieux qui sen approche par la prairie située au sud peut aisément en distinguer le caractère médiéval, notamment de par la tour circulaire percée dune archère qui en marque langle oriental. Aucune preuve nest en mesure de venir étayer lhypothèse selon laquelle cest Thibault III de Mathefelon qui, au début du 13ème siècle, vint moderniser le château des premiers seigneurs dEntrammes. Tout juste sait-on que ce monument, symbole du pouvoir séculaire des seigneurs dEntrammes, disparût en partie dans lincendie allumé par les chouans en 1794.","habitants":"Famille d'Emmanuel Besnier\r\n        \"","divers":"Vestiges d'Entrammes Grav 1                                                        château Vallon grav 2,                                                                  Grand Rocca grav 3-4.                                                           Le Coudre-Grav-5","gps":"","images":["../image/image_53/53_Entrammes_1.jpg","../image/image_53/53_Entrammes_2.jpg","../image/image_53/53_Entrammes_3.jpg","../image/image_53/53_Entrammes_4.jpg","../image/image_53/53_Entrammes_5.jpg"]},"Consult_chateau_formulairee7b5":{"id":"Consult_chateau_formulairee7b5","dept":"53","canton":"Cossé le Vivien","commune":"Livré-la-Touche","nom":"Eperonnière","type":"Forteresse","periode":"XV-XIVe","histoire":"EPERONNIERE,  cité en 1300 est alors en possession des Macé de Scépeaux cette famille donnera plusieurs abbés à l'abbaye de Roé. un Guillaume Esperon, seigneur de Livré, aurait donné son nom au lieu où est édifié la demeure. Le fief est mentionné dès le XIVe siècle et était un fief vassal relevant de la baronnie de Craon. Il semble qu'il ait été bâti au XVe siècle. L'Éperonnière a appartenu du XIVe au XVIe siècle, à la famille de Scépeaux, Antoinette de Scépeaux l'apporte en dot à Georges de Chauvigny  et au milieu du XVIe siècle à la famille de La Chevalerie qui était de confession protestante. En 1589, Michel de La Chevalerie, retiré dans sa maison de l'Eperonnière, tient tête au ligueur Le Cornu du Plessis de Cosmes. Il meurt ruiné en 1597, sa maison ayant été brûlée partiellement trois fois. Il laisse onze enfants dont les descendants abjurèrent en 1685, lors de la Révocation de l'Édit de Nantes. En 1697, l'édifice passe à Louis Pierre de Lantivy puis en En 1720 Marie de Lantigny épouse de René de la Barre qui hérite de l'Eperonnière, et passe par alliance en 1782 aux vicomtes de Pierres , seigneur de Fougeray et de Vrigné. en 1826, la succession se fait par les femmes Eugénie de Pierres apporte le domaine à son époux le comte de la Sayette, la fille du ménage née en 1830  Zénaïde de la Sayette, s'allie en 1850 au comte Xavier de Quatrebarbes, leur fille Antoinette  transmet par alliance à son époux de Pierre de Roquefeuif, aïeule de l'actuelle propriétaire madame Norbert Benoit née Bérangère de Roquefeuil.","architecture":"EPERONNIERE, est une ancienne maison forte bâtie à Livé-la-Touche. La construction de la maison forte de l'Éperonnière date du XIVe siècle, de plan rectangulaire, coiffé d'une toiture pentue reposant sur deux pignons. Il est  élevé  sur un rez-de-chaussée et trois étages, dont un sous comble. l'édifice est flanqué à son angle sud-est d'une échauguette  en encorbellement percée d'ouvertures de tir et à son angle nord- ouest d'une tourelle carrée coiffée d'un toit en pavillon. Sur la façade sud   une travée couronnée par une lucarne à fronton, comporte deux niveaux de Baies à encadrement mouluré et colonnettes prismatiques  s'insère entre la tourelle et une tour pentagonale hors-oeuvre abritant un escalier à vis. Cette tour est elle même accostée dans sa partie haute par une tourelle abritant un escalier qui dessert les combles. Contre le pignon ouest s'appuie une petite construction   du  XVIIIe siècle abritant un cellier et une chambre. Sa chapelle, les sols et ses douves ont été comblées, et sont classés aux M.H. depuis le 30/09/1994.","habitants":"Famille des Macé                                                                                 Famille de Scépeaux   \r\n        \"","divers":"Eperonnière grav 1 à 4,                                                                  GPS : 47° 54' 13,01\" Nord, 1° 0' 22,54\" Ouest","gps":"47° 54' 13,01\" Nord, 1° 0' 22,54\" Ouest","images":["../image/image_53/53_Eperonni%c3%a8re_1.jpg","../image/image_53/53_Eperonni%c3%a8re_2.jpg","../image/image_53/53_Eperonni%c3%a8re_3.jpg","../image/image_53/53_Eperonni%c3%a8re_4.jpg"]},"Consult_chateau_formulaire5869":{"id":"Consult_chateau_formulaire5869","dept":"53","canton":"Ernée","commune":"Montenay","nom":"Ernée","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Ernée: Pannard  et Basmagnée à Montenay.                                                                             ERNEE, en 1789, en prévision des états généraux, M. Grandin, curé d'Ernée, est élu député du clergé et Delalande, lieutenant du maire, député du Tiers état. Le 2 novembre 1793, le bourg est le théâtre d'un combat entre les républicains et les Vendéens. Ernée est chef-lieu de district de 1790 à 1795. Ernée était desservie par la ligne de chemin de fer départemental reliant Laval à Landivy. Cette ligne fut ouverte le 18 décembre 1901 et son déclassement fut décidé par le conseil général le 11 mai 1938. En 1902, la gare d'Ernée-Ville avait accueilli 32 007 voyageurs, ce qui en faisait la plus fréquentée du réseau juste après Laval-Ville. La halte d'Ernée-Échange avait accueilli 4 796 voyageurs cette même année.               PANNARD Famille de Pannard, Pichot, Hugues et Gaultier de Panard, 1124  Guérin de Pannard, 1160. Henri de Fichers, donne quelques dîmées à Fontaine-Daniel, avant 1209 ; Nicolas de Chauvigné, époux de Marie de Panard, vers 1460 ; Ambroise de Mégaudais, du chef de sa femme Catherine de Chauvigné, veuve de Guillaume de Froullay Blason Ambrieres-les-Vallees.svg, 1511, 1527 ;Jean de Mégaudais, époux de Marie Nepveu, 1534, 1569 ;  Jean Le Cornu,  famille Le Cornu, sieur du Parc, époux de Marie de Mégaudais, demeure au manoir, d'où : Jacquine, mariée en 1612 à Louis de Palluel, de Sainte-Gemmes près d'Avranches. Guillaume de Mégaudais, beau-frère de Jean Le Cornu et curé d'Ernée, demeurait aussi à Pannard, 1591. Marie de Mégaudais convola en 1602 avec René des Nos Blason famille de Nos d'où : René, 1603 ; Urbain, 1611 ; René, 1612 baptisés à Ernée.","architecture":"BASMAGNEE, château  à un kilomètre au sud -est à Motenay. Le château vous propose son gîte d'hôtes et la location de ses salles pour votre mariage.                                                                                                                       PANNARD, suite Une hache néolithique a été trouvée à Pannard. Le domaine et fief du Grand et Petit Pannard relevait de Charné-Bazeille, 1669. Le château, bâti au-dessus de la vallée boisée de l'Ernée, composé d'un corps principal et d'une aile en retour, d'aspect un peu lourd, et a été modernisé. Les servitudes ont des pilastres en blocs cyclopéens. Famille des Nos, Jean-Baptiste des Nos, mari de Gilonne Legeay, d'où : Charles des Nos, époux de Marie-Renée de Malescot, remariée en 1693 à Jacques de la Meignannerie, seigneur des Vaux, après avoir fait abandon à ses fils Charles et Philippe, en 1683 ; Charles des Nos, époux :  de Marie Le Clerc des Gaudesches, d'où : Charles-René, Marie et Charlotte qui furent Ursulines à Rennes ; en 1720, de Rose de la Corbière,  Charles-René des Nos, veuf en 1750 de Marie-Renée du Prat, avec trois enfants mineurs ; Charles-Louis des Nos, militaire d'où Nicolas-Charles des Nos, qui eut d'Eugénie Le Bouteiller : Anatole-Charles des Nos, comte des Nos, né en 1815, et marié en 1843 à Antoinette-Jeanne-Laurence de Thellusson. Le Château de Pannard, bâti au-dessus de la vallée boisée de l'Ernée, composé d'un corps principal et d'une aile en retour. La galerie possédait au début du XXe siècle, les portraits de la Famille des Nos, un Ecce Homo attribué à Guido Reni, les portraits du roi Louis XVIII en pied, du Duc de Penthièvre et de Stanislas Leszczynski, Roi de Pologne. Dans une des chapelles de l'église de Charné avait été fondée une chapellenie de 2 messes qui fut transférée à l'autel Saint-Jean de la nouvelle église d'Ernée en 1701 et dotée de la tierceraye des dîmes de Panard, acquise de l'Abbaye de Fontaine-Daniel pour 150 écus, par Jean Le Cornu et Marie de Mégaudais, en 1576.","habitants":"Famille Le Cornu\r\n        \"","divers":"Trois châteaux à Ernée: Pannard grav 6-7 et Basmagnée grav 1-2 à Montenay                                                                                 Emée 48° 17' 49\" nord, 0° 55' 58\" ouest                                                        GPS : 48° 17' 19\" Nord, 0° 53' 34\" Ouest                                                       Pannard GPS : 48° 18' 12\" Nord, 0° 56' 36\" Ouest                                       Fontaine grav-3,                                                                         Gastine grav-4                                                                                                 Montguerre grav 5-6","gps":"48° 17' 19\" Nord, 0° 53' 34\" Ouest","images":["../image/image_53/53_Ern%c3%a9e_1.jpg","../image/image_53/53_Ern%c3%a9e_2.jpg","../image/image_53/53_Ern%c3%a9e_3.jpg","../image/image_53/53_Ern%c3%a9e_4.jpg","../image/image_53/53_Ern%c3%a9e_5.jpg","../image/image_53/53_Ern%c3%a9e_6.jpg","../image/image_53/53_Ern%c3%a9e_7.jpg","../image/image_53/53_Ern%c3%a9e_8.jpg"]},"Consult_chateau_formulairec702":{"id":"Consult_chateau_formulairec702","dept":"53","canton":"Azé","commune":"Chemazé","nom":"Escorcés","type":"Château","periode":"XV-XVI","histoire":"ECORCES il appartenait en 1522 à François Le Verrier.  1522 - François Le Verrier puis   à son fils en  1561 René Le Verrier, passa en  1567 à N. de la Sélinaye,  revient en   1580 à  Charles Le Verrier et Guy Le Verrier. En   1680  Bonaventure Moyson, écuyer, et en 1750 à  Charles Bucher des Brosses. En  1761 à  Anselme-René Bucher de Chauvigné (1734-1794), neveu du précédent.\r\n En   1791 à Anselme-François Bucher de Chauvigné (1761-1835), fils du précédent, et en   1842 à Anselme-René Bucher de Chauvigné (1787-1874), fils du précédent. En   1874  le Vicomte Léon de Vaujuas-Langan, chevalier de l'Ordre de Saint-Grégoire-le-Grand en 1912, capitaine de la garde nationale mobile, chevalier de l'Ordre national de la Légion d'honneur en 1871, épouse en 1871 Caroline-Marie Huchet de Cintré, fille du député Huchet de Cintré. Et en  1926  la comtesse du Réau de la Gaignonnière, née Françoise de Vaujuas-Langan, veuve de Maurice du Réau de la Gaignonnière.","architecture":"ECORCES, la construction du Château des Ecorcés actuel date du XIXe siècle. Il est de style du XIXe siècle. C'était une résidence. Au XVIe siècle, le fief de l'Écorce, appartenait à la famille Le Verrier. Une chapelle fut fondée en 1522 par François Leverrier, prêtre. Une vierge en tuf venant de cette chapelle est conservée dans l'oratoire Notre Dame à la Rose à Chemazé. Au XVIIe siècle, le fief de l'Écorce est un fief vassal du marquisat de Château-Gontier. En 1750, le domaine est acquis par Charles Bucher des Brosses, l'oncle de Anselme René Bucher de Chauvigné, seigneur de l'Écorce et Maire d'Angers, en 1785. En 1830, sous la direction de Anselme François Bucher de Chauvigné, le fils ainé de Anselme René, Seigneur de l'Écorce, maire de Chemazé de 1815 à 1821, le château fut reconstruit à l'emplacement d'une ancienne demeure. Il fut remanié, restauré et entouré dun parc à la fin du XIXe siècle.","habitants":"Famille de François Le Verrier\r\n        \r\n        \r\n        \"","divers":"Château d'Escorcés à Chemazé                                                                           GPS : 47° 47' 17\" Nord, 0° 46' 25\" Ouest","gps":"47° 47' 17\" Nord, 0° 46' 25\" Ouest","images":["../image/image_53/53_Escorc%c3%a9s_1.jpg","../image/image_53/53_Escorc%c3%a9s_2.jpg"]},"Consult_chateau_formulaire891d":{"id":"Consult_chateau_formulaire891d","dept":"53","canton":"Azé","commune":"Daon","nom":"Escoublère","type":"Forteresse","periode":"XVIe-XVIIe","histoire":"ESCOUBLERE, par alliance Philippe de Salles  devient seigneur de l'Escoudière, la demeure est  édifiée  par Jean des Salles, est dotée. À cette époque, au XVIIe siècle, l'Escoublère change de mains et l'un des ses propriétaires, René du Guesclin en a laissé une description: \"chasteau et maison seigneuriale. En 1795 l'Escoublère a été pendant la guerre civile, le quartier général de Joseph-Juste Coquereau, chef des Chouans de la région de Daon. Après avoir été vendu à plusieurs reprises et être devenu une exploitation agricole, l'Escoublère est racheté en 1933 par M. et Mme de Montéty qui l'ont restauré et lui ont redonné l'aspect que nous lui connaissons aujourd'hui et après eux, leur fille et leur gendre, M. et Mme Cavalier continuent leur uvre. Éléments protégés MH : le château de l'Escoublère classement par arrêté du 27 avril 1927.","architecture":"ESCOUBLERE, il est de style Renaissance et fut construit au XVIe siècle. La date est gravée sur le puits, précisant le style de l'édifice. vers 1570 du châtelet d'entrée, de la tourelle détachée, à gauche du logis, ainsi que du joli puits de sa cour. Au XVIIe siècle, un nouveau corps de logis est greffé sur le premier. À l'extérieur, de l'autre côté de la douve, la chapelle du XVIe siècle, transformée en pigeonnier est aujourd'hui désaffectée, Il comprend le château proprement dit, flanqué de tours aux angles et en façade, et d'un châtelet où aborde une passerelle en bois qui remplace l'ancien pont-levis. Au-dessus du porche, une fenêtre à meneaux en croix, couronnée d'un fronton triangulaire et bas, avec écusson au centre. Les deux tours ont un toit en forme de cloche surmontée d'une lanterne. Les douves sont murées, profondes, l'eau n'y manque jamais. Le puits, dans la cour intérieure, est une uvre d'art ; aux angles de la margelle carrée, quatre colonnes à chapiteaux composites supportent une architrave avec frise et inscription : « In te, Domine, speravi, non confundar in æternum ; in justitia tua libera me », et au-dessus une coupole imbriquée. La chapelle est au nombre de celles dont la conservation semble utile en l'an XII, est inscrit aux M.H. depuis 1927.","habitants":"M. et Mme de Montéty\r\n        \"","divers":"La forteresse Escoublère à Daon                                                    GPS : 47° 45' 45\" Nord, 0° 36' 58\" Ouest","gps":"47° 45' 45\" Nord, 0° 36' 58\" Ouest","images":["../image/image_53/53_Escoubl%c3%a8re_1.jpg","../image/image_53/53_Escoubl%c3%a8re_2.jpg","../image/image_53/53_Escoubl%c3%a8re_3.jpg","../image/image_53/53_Escoubl%c3%a8re_4.jpg","../image/image_53/53_Escoubl%c3%a8re_5.jpg","../image/image_53/53_Escoubl%c3%a8re_6.jpg"]},"Consult_chateau_formulaire092d":{"id":"Consult_chateau_formulaire092d","dept":"53","canton":"Meslay-du-Maine","commune":"Préaux","nom":"Favry","type":"Manoir","periode":"XV-XVI","histoire":"FAVRY  Perrette de Ballée, femme de Nicolas Fouquereau ; Noble Guillaume Fouquereau, 1519 ; En 1581 noble François de Bouschet, était sieur du Vau, il avait épousé Marguerite de Launay dont il eut Christophe. Lui et sa femme étaient morts en 1598. Christophe de Bouschet cité lui aussi à Préaux en 1584, était sieur du Vau en 1598, et rendait en cette qualité aveu à la seigneurie de Ballée pour certaines portions de pré, au pré dit de la Guierche. René de Saint-Rémy, seigneur du Pin, par acquisition, 1605 ; En 1625 Claude de Lorme était seigneur du Vau, il épouse en cette année Françoise de Coulonge, fille du seigneur du Plessis, en Préaux. Il est parrain lannée suivante de Louise de Saint-Rémy. Il fut inhumé au cimetière de Préaux par Me Jacques Rousseau, curé, le 26 juin 1635. Il est qualifié dans lacte de sépulture de « noble et illustre ». Il est écuyer. Jacques Nepveu, acquéreur ; Daniel Nepveu, sieur d'Étriché, 1636 ; En 1722, R. d'Héliand, seigneur de la Gravelle, ancien président au présidial de Château-Gontier et Marie Delaporte, son épouse, demandent contre Louis Freuslon à rentrer en possession du moulin de Haut-Favry, pour cause d'inexécution du contrat de rente. En 1772, Charles-François Mezière, écuyer, seigneur de Pervanches, ancien lieutenant des troupes du Canada, et Marie-Anne-Testard, sa femme, demandent contre René Raison, curé de Louvigny-en-Sonnois, le retrait lignager d'une rente due sur le moulin à tan du Haut-Favry. Il est aussi écrit le château de Fau-Favry.","architecture":"FAVRY, le manoir dispose d'un logis principal flanqué de 2 pavillons carrés et d'une tour hors d'oeuvre. Les lucarnes sont géminées ainsi que les fenêtres à meneaux. A l'extérieur, un jardin à la française, un potager médiéval, une rivière forme une île et presqu'île entourant le manoir. On y accède par la D573.","habitants":"noble François de Bouschet\r\n        \"","divers":"Château de Favry  à Préaux.                                                             GPS : 47° 56' 09\" Nord, 0° 27' 58\" Ouest","gps":"47° 56' 09\" Nord, 0° 27' 58\" Ouest","images":["../image/image_53/53_Favry_1.jpg","../image/image_53/53_Favry_2.jpg","../image/image_53/53_Favry_3.jpg"]},"Consult_chateau_formulaire1e9e":{"id":"Consult_chateau_formulaire1e9e","dept":"53","canton":"L","commune":"Forcé","nom":"Forcé","type":"Château","periode":"XIXe   XVIe-XIXe","histoire":"Deux châteaux à Forcé ; Mazure et Poligny.   A cinq kilomètres au Sud est à Parné sur Roc le château de Plessis pas d'historique.                                                      MAZURE, le château de la Mazure a été construit à la fin XIXe siècle pour Germain Tribert. La propriété sétend sur près de 200 hectares constitués de bois, prairies, cultures et étangs. Le paysage typique du bocage mayennais permet de simmerger et de découvrir toute la faune naturelle : faisans, chevreuils, sangliers, perdrix sont présents autour du cur de la propriété. Le château de la Mazure adossé à une forêt de 60 hectares témoigne de la démesure de cette époque. Donnant sur une entrée monumentale, les salons se répartissent et jouissent dune vue ouverte sur une large plaine. A lépoque, les hôtes étaient accueillis dans le grand salon, allaient ensuite dîner dans la grande salle à manger, puis les hommes passaient au fumoir pour apprécier un petit cigare et les femmes dans le petit salon pour aborder tous les sujets leur tenant à cur. Le château se compose dune enfilade de salons de 25 à 50 mètres carrés : la bibliothèque, le grand salon et le petit salon séparés par une grande porte coulissante, le fumoir, la grande salle à manger et la petite salle à manger.","architecture":"POLIGNY, ancienne seigneurie mouvante du comté du Maine, Poligny, anciennement Poligné, est attestée depuis le XIIIe siècle. Le seigneur du lieu était tenu de faire guet et garde avec ses hommes au Pont-Perrin au Mans. Vers 1400, ce dernier, entreprenant de faire \"lever justice à 3 piliers\" se fit reprendre par le comte qui le présente comme \"simple vassal sans aucune préminence de chastellenie\". Par la suite ce titre ne lui fut plus contesté. Il obtient notamment le sceau des contrats, justice à quatre piliers en 1603, garennes défendables à poil et à plume, puissance d'édiffier chasteau, ponts-levys et forteresse. Le domaine comprenait en 1627 \"château circuit de murs, granges, étables, jardin, mottes d'environ la court, boys de haulte fustaye et cheynaye\". Hormis la base d'une tour bastionnée du milieu du XVIe siècle, il reste actuellement peu de vestiges médiévaux. Le château actuel, datant en partie du XVIIIe siècle, a été remanié puis augmenté au XIXe siècle par l'architecte Delavue. Une chapelle funéraire souterraine fut également construite dans le dernier quart de ce siècle.Le château comporte une chapelle funéraire souterraine et des décors de marbre italien originaux. Le château de Poligny est inscrit aux M.H. depuis le 5/05/1992. Il appartient aujourd'hui à l'écrivain Emmanuel de Waresquiel. Il existe 3 châteaux et 1 manoir à Forcé à découvrir. Éléments protégés MH : la chapelle funéraire souterraine du château de Poligny : inscription par arrêté du 5 mai 1992.","habitants":"Seigneurs locaux                                                                         Poligny; écrivain Emmanuel de Waresquiel\r\n        \"","divers":"Deux châteaux à Forcé ; Mazure et Poligny  et Pamé grv 3                          Mazure GPS : 48° 02' 00\" Nord, 0° 41' 59\" Ouest                                         Poligny GPS : 48° 02' 18\" Nord, 0° 42' 23\" Ouest","gps":"48° 02' 00\" Nord, 0° 41' 59\" Ouest","images":["../image/image_53/53_Forc%c3%a9_1.jpg","../image/image_53/53_Forc%c3%a9_2.jpg","../image/image_53/53_Forc%c3%a9_3.jpg","../image/image_53/53_Forc%c3%a9_4.jpg"]},"Consult_chateau_formulaireff4c":{"id":"Consult_chateau_formulaireff4c","dept":"53","canton":"Gorron","commune":"Fougerolles du Plessis","nom":"Fougerolles_Plessis","type":"Château","periode":"XVIe-XVIIe","histoire":"GOUE, une habitation seigneuriale fut bâtie à Goué dès le commencement du XIVe siècle. Du premier château. Au mois de février 1517 Patrice de Goué obtint un monitoire contre les malfaiteurs qui avait saccagé son château. En avril 1615, il fut mis à sac par les soldats du régiment du chevalier de Nedain. Le 18 juillet 1794, le château subit les attaques des gardes nationaux. Le château de Goué est inscrit au titre des M.H. le 13 novembre 1973 , il fut entièrement reconstruit en 1519 par Thomas de Goué et agrandi vers 1650.  En avril 1615, il fut mis à sac par les soldats du régiment du chevalier de Nedain. En juillet 1794 il subit les attaques des gardes nationaux. À partir de 1803 où il a été vendu pour la première fois, Goué a changé de mains à de nombreuses reprises. En 1936 alors que M. Guy, père de l'avant dernier propriétaire, venait de l'acquérir et envisageait de le restaurer (ce que mena à bonne fin son fils, Robert, la Commission d'Histoire et d'Archéologie de la Mayenne souhaitait que la demeure soit sauvée. Le grand escalier avait failli être vendu en 1916. Depuis cette période, par la ténacité de ses propriétaires, Goué a été sauvé et son décor préservé.","architecture":"GOUE, éléments protégés MH : le plafond peint de la chambre de la tour, les parties anciennes du décor du grand salon et du salon d'angle dit salle de la Renommée des Goué : classement par arrêté du 13 novembre 1973. Les façades et les toitures ; l'escalier d'honneur avec sa rampe à balustres en bois : inscription par arrêté du 13 novembre 1973.  il ne reste plus que sa grosse tour ronde et ses murs attenants, il fut entièrement reconstruit en 1519. D'après les plans, il ressemble à un lion assis. Sa façade est de style Louis XIII. Le château fut pillé à plusieurs reprises.     La chapelle à l'extrémité du bâtiment de gauche, dans la cour d'honneur, a été construite vers 1650. Le bâtiment qui lui fait face porte le nom de Sergenterie.                                                                                                    HAUTONIER, c'est le plus ancien château de la commune dont il ne reste plus que l'emplacement. Ruiné, les pierre du château ont été vendues, entre les deux guerres mondiales à des \"amateurs américains\", qui firent rebâtir avec, dans leur pays, une demeure d'exception. Dès le XVIIIe siècle, la Famille de la Hautonière « émigra » à Saint-Ellier-du-Maine où ils firent construire la Malouinière de la Pihoraye. Les armoiries des familles Goué et de la Hautonière, martelées à la Révolution,\r\nréunies par le mariage de Jean Baptiste 1er Goué, avec Françoise de la Hautonière.","habitants":"Famille de  Thomas de Goué \r\n        \"","divers":"Goué GPS : 48° 28' 09\" Nord, 0° 58' 06\" Ouest    Grav-4-5-6                        Hautonière  Grav 1-2-3                                                              GPS : 48° 28' 29\" Nord, 0° 58' 20\" Ouest","gps":"48° 28' 09\" Nord, 0° 58' 06\" Ouest    Grav-4-5-6","images":["../image/image_53/53_Fougerolles_Plessis_1.jpg","../image/image_53/53_Fougerolles_Plessis_2.jpg","../image/image_53/53_Fougerolles_Plessis_3.jpg","../image/image_53/53_Fougerolles_Plessis_4.jpg","../image/image_53/53_Fougerolles_Plessis_5.jpg","../image/image_53/53_Fougerolles_Plessis_6.jpg"]},"Consult_chateau_formulaire6685":{"id":"Consult_chateau_formulaire6685","dept":"53","canton":"Saint-Berthevin","commune":"Saint-Germain le Fouilloux","nom":"Fouilloux","type":"Château","periode":"XVIIIe","histoire":"FOUILLOUX, Foylleux en 1416, la seigneurie est un fief vassal relevant de la châtellenie de Laval. Le domaine est érigée en châtellenie par acte de Guy XII de Laval en 1542. En 1601, le château est décrit comme chasteau et maison seigneuriale avec autres maisons comprises au circuit et enclos d'icelle; grand jardin clos de murailles et deux vergers autour, sur le bord des fossés d'icelluy chasteau. En 1671, Louis-Joseph de Montecler, seigneur de la châtellenie de Fouilloux, doit vingt livres de taille à Henri III de La Trémoille, comte de Laval, pair de France ; il doit 40 sols pour la terre de Saint-Jean de Mayenne il doit pour la châtellenie de Montchevrier 4 livres de taille et quarante jours et quarante nuits de garde en la ville de Laval. Louis-Joseph, gouverneur de Laval, fut inhumé en 1686 dans l'église de Saint-Tugal.  Le domaine du Fouilloux est acheté par Louis de la Chapelle à Louis-Joseph de Monteclerc, gouverneur de Laval. Le château actuel est édifié sur les plans de l'architecte Jean-Baptiste Tellot de Laval, vers 1785 par Michel René François du Mans, époux de Louise de la Chapelle. Son fils Michel du Mans de Bourglevesque est maire de Saint-Germain-le-Fouilloux et député de la Mayenne de 1829 à 1830.","architecture":"FOUILLOUX, il est composé de deux étages sous des combles à lucarnes. A l'ouest se trouve un jardin en terrasses agrémenté d'une belle charmille. Au sud ouest, la chapelle sainte Catherine, antérieure au château du XVIIIe siècle. D'importants communs, construits au XIXe siècle, complètent l'ensemble.    Éléments protégés MH : le château du Fouilloux, en totalité le corps principal de logis y compris laile en retour; la chapelle avec son soubassement ; la fuie ; les aménagements paysagers (la cour dhonneur avec son portail dentrée et sa grille, le jardin potager avec les degrés, les murs de clôture et murs de soutènement, les deux serres, la charmille avec sa statuaire, la terrasse devant le château au sud avec ses murs de soutènement; les façades et les toitures du pavillon de garde, des grands bâtiments de communs (grands communs, orangerie, faisanderie et ancien chenil) : inscription par arrêté du 1er septembre 2016.. Le château actuel a été édifié dans le dernier quart du XVIIIe siècle par Michel-René-François du Mans de Chalais, seigneur du Bourg-l'évêque, époux de Marguerite Louise de la Chapelle, descendante de Louis de la Chapelle, avocat et procureur fiscal à Laval qui avait acheté le Fouilloux à Louis-Joseph de Montécler, gouverneur de Laval. Il est construit sur un plan très simple: un corps de logis flanqué d'un pavillon en équerre, avec deux étages sous des combles à lucarnes. On y trouve un jardin en terrasses. Il subsiste aussi une chapelle du XVIIIe siècle. L'édifice et son domaine font l'objet d'une inscription au titre des monuments historiques depuis le 1er septembre 2016","habitants":"Michel-René-François du Mans de Chalais\r\n        \r\n        \"","divers":"Saint-Germain le Fouilloux.                                                   Gps 48° 08' 44\" N, 0° 46' 53\" Ouest","gps":"","images":["../image/image_53/53_Foullioux_1.jpg","../image/image_53/53_Foullioux_2.jpg"]},"Consult_chateau_formulairea215":{"id":"Consult_chateau_formulairea215","dept":"53","canton":"Evron","commune":"Saint Georges sur Erve","nom":"Foulletorte","type":"château","periode":"XVIe","histoire":"FOULLETORTE, l'actuel château de Foulletorte, construit sur l'emplacement d'un château fort, en 1570 environ. C'est un des plus beaux châteaux de cette époque conservés en Mayenne. Il n'est pas comparable pour la richesse de l'ornementation, avec la galerie de style renaissance du château du Rocher ou d'autres édifices d'une autre époque, mais pour la majesté de l'ensemble, pour l'ampleur des lignes, Foulletorte est d'une grande beauté. À peine construit, le château fut le théâtre de faits d'armes: en 1571, il est occupé par René Bourré, seigneur de Jarzé, à qui les habitants de Villaines viennent se recommander. En 1590 Antoine de Vassé y est assiégé, sur ordre du roi et du prince de Conti, par René de Bouillé. En 1643, le château est qualifié de maison-forte, avec cour fermée de murs, tours, douves, fossés, pont-levis; on y signale une motte pareillement entourée de douves et fossés et le bois des Haies, de 100 journaux. Au mois de février 1795, un groupe  de chouans occupait le château. Le 16 ventôse an III, \"le général Gency ordonne au commandant d'Évron de fouiller le château, repaire de brigands, et un de leurs arsenaux\".","architecture":"FOULLETORTE, la façade du corps de logis attire le regard par le pavillon en loggia qui abrite l'escalier d'honneur, les pièces sont à double exposition et se commandent entre elles. Les façades arrière sont toutes austères et  donnent sur les douves. Une tour d'angle s'est effondrée et n'a pas été reconstruite. Les douves couvrent 1,3 ha, les toitures deux ha, et les planchers ne couvrent pas moins de 5 000 m² . On comprend à l'énoncé de telles dimensions que les Vassé se soient essoufflés à entretenir une pareille demeure, jamais habitée en permanence. Aussi durent-ils la céder à leur créancier, l'abbé Hardy, conseiller au parlement de Paris. En 1830, Foulletorte passa, par mariage, à la famille de Malherbe qui le possède toujours. Le comte Marie Pierre René de Malherbe maître des lieux entre les deux guerres, était lieutenant-colonel, croix de guerre, pionnier de l'aviation militaire française. Il est mort à Villacoublay en 1931 dans un accident d'avion en service commandé.","habitants":"Famille de  René de Bouillé\r\n        \r\n        \"","divers":"Saint Georges sur Erve, Foulletorte,                                        GPS : 48° 10' 31\" Nord, 0° 16' 21\" Ouest","gps":"48° 10' 31\" Nord, 0° 16' 21\" Ouest","images":["../image/image_53/53_Foulletorte_1.jpg","../image/image_53/53_Foulletorte_2.jpg"]},"Consult_chateau_formulaireb20b":{"id":"Consult_chateau_formulaireb20b","dept":"53","canton":"Loiron","commune":"Le Bourgneuf la Forêt","nom":"Fresnay","type":"Château","periode":"XVIIe","histoire":"FRESNAY, mentionné par Hubert Jaillot (château, chapelle, étang et landes), Fresnay constituait un fief et domaine mouvant de la seigneurie de La Forêt, et en arrière-fief, à trois fois et hommages liges, de la châtellenie d'Ernée. Le seigneur de Frênay ayant fait mettre un siège au chanceau de l'église en 1492, il reconnut que ce serait sans préjudice des droits du seigneur de La Forêt. Le château, à double pavillon formant marteau, n'est pas antérieur au XVIIe siècle, la terre a toujours été habitée par ses possesseurs. Le 30 août 1792, le château est pillé par les gardes nationaux de la Baconnière, Andouillé et La Brûlatte. Les seigneurs famille de la Loré de 1387 à  1577, ensuite la famille de Chalus en 1675 Nicolas la Pestre, ensuite Charles-Paul de Bailly, chevalier, épouse Suzanne Le Prestre, dame de Fresnay et de La Chapelle-Rainsouin jusqu'en 1850   La marquise de Vaujuas-Langan, mère de M. de Vaujuas et de Mme Paul Le Gonidec Henri de Vaujuas-Langan, député et homme politique français né et décédé au château (1830-1907).","architecture":"FRESNAY, le représentant du peuple en mission dans la Sarthe ayant écrit au directoire de la Mayenne de lever le séquestre mis sur le château de Fresnay, on lui répond qu'il a été le berceau de la Chouannerie, et que les propriétaires l'ont toujours favorisée et que ce sont les républicains et non les chouans qui ont pillé la maison.                                                                             Éléments protégés MH : les parties constitutives suivantes du château, des communs et du parc : le château, l'aile nord des communs avec la chapelle ; le jardin-parterre clos ; la cour de communs desservant le vivier ; le canal,  l'avenue longeant le canal ; l'allée annulaire devant la façade ouest ;; les communs avec le pigeonnier au sud; le jardin clos de murs ; la bordure longeant le jardin ; l'avenue principale depuis le sud-ouest du château ; le dépôt ; l'avenue depuis le nord-ouest du château ; le chemin vers le nord ; le Trianon, la maison de garde : inscription par arrêté du 14 juin 1994.","habitants":"Famille de Chalus\r\n        \"","divers":"Fresnay à Le-Bourgneuf-la-Forêt                                                  GPS : 48° 10' 17\" Nord, 0° 57' 52\" Ouest","gps":"48° 10' 17\" Nord, 0° 57' 52\" Ouest","images":["../image/image_53/53_Fresnay_1.jpg","../image/image_53/53_Fresnay_2.jpg"]},"Consult_chateau_formulaireb03d":{"id":"Consult_chateau_formulaireb03d","dept":"53","canton":"Lassay-les-Châteaux","commune":"Champéon","nom":"Fresne_53","type":"Château","periode":"XVIe-XVIIe","histoire":"FRESNE, la première mention d'un seigneur du Fresne remonte à 1245 et figure sur le cartulaire de l'abbaye de Savigny, dans la Manche. À partir du XVe siècle et jusqu'à 1594, le Fresne appartient à une vieille famille du Bas Maine, celle d'Anthenaise. En 1594, Honorat-Benjamin de Beauregard, d'une famille originaire de Touraine épouse Magdeleine d'Anthenaise sera la cornette du duc de Vendome. La famille de Beauregard occupera Le Fresne jusqu'en 1783.  En 1750 Louis -Charles de Beauregard lieutenant des maréchaux de France et seigneur de Chivré continue les travaux de ses aïeux. Madeleine Marie de Moré héritière des Beauregard  apporte le domaine du Fresne en dot à René Pouyvet de la Bélinière capitaine des dragons, l'un des fils  Charles-Henri-Marie, officier au régiment Royal Cravate émigre à la Révolution, de retour à Fresne décède en 1813, Fresne échoit à une fille de son frère, Marie-Renée épouse de Jean-Anne de Launay, l'une des fille  Emilie, s'allie avec Gabrielle Bouchard de la Poterie chef de bataillons de la marine. En 1890, les héritiers vendent le Fresne à la famille Poirier. Appartient aujourd'hui à la famille Wéber.","architecture":"FRESNE, de plan rectangulaire, le corps de logis, médiéval et classique, encadré de deux ailes de communs en retour construit sur un socle granitique protégé de douves sur trois côtés et d'un étang artificiel sur l'autre. Vantail vitré, du XVIIe siècle, de la porte de la façade du logis. Le colombier sur colonnes, en pierres, briques et ardoises, datant de 1589, est exceptionnel pour la région. Décors lambrissés, sculptés et peints du salon d'apparat du XVIIe siècle. Toit en croupes couvert d'ardoises, chevauché par des lucarnes sommées de frontons triangulaires.\r\nÉléments protégés MH : la chapelle, le corps de logis, à l'exclusion des parties classées, et les dépendances : inscription par arrêté du 17 avril 1986. Les deux pièces à décor du rez-de-chaussée ; le pigeonnier : classement par arrêté du 8 septembre 2008.","habitants":"Famille Poirier\r\n        \"","divers":"A Champéon château de Fresne                                                 GPS : 48° 21' 26\" Nord, 0° 32' 44\" Ouest","gps":"48° 21' 26\" Nord, 0° 32' 44\" Ouest","images":["../image/image_53/53_Fresne_53_1.jpg","../image/image_53/53_Fresne_53_2.jpg","../image/image_53/53_Fresne_53_3.jpg"]},"Consult_chateau_formulairea0aa":{"id":"Consult_chateau_formulairea0aa","dept":"53","canton":"Azé","commune":"Fromentières","nom":"Fromentières","type":"Château","periode":"XV-XIX","histoire":"Il existe aussi à Fromentières , 3 autres châteaux : le château de la Tour,  d'Erbrée et de Gand-Coulonges.                                             BEAUBIGNE, logis seigneurial de la fin du XVe siècle, agrandi au début du XVIIe siècle. Restauration au XIXe siècle par l'architecte Jules Dussauze, complétée par l'édification de communs. . En revanche, à louest et au nord de l'édifice se développent un parc paysager et un vaste potager pourvu dune ancienne serre et dune orangerie. Logis constitué d'éléments d'époques différentes. La tour ronde devait appartenir à une maison forte du XIVe siècle ruinée au début du XVe siècle. Le corps de logis principal se divise en une salle seigneuriale chauffée par une cheminée de granit, et une cuisine possédant une cheminée et une souillarde. L'escalier en vis dessert deux appartements composés chacun de deux pièces, avec des latrines indépendantes. La cloison séparant les deux chambres est ornée d'un ruban qui se déroule le long de la poutre, formant des cartouches géométriques. Dans ces cartouches, ont été peints des bouquets de fleurs ou des paysages avec architectures, caractéristiques du 17e siècle. Le domaine fut saisi et vendu en 1689, éléments protégés MH : les façades et les toitures du logis et de tous les bâtiments de communs ; l'atelier de peintre avec son décor et l'écurie avec tous ses aménagements en totalité ; les jardins avec la \"petite maison des enfants\" et les murs de soutènement des terrasses au sud : inscription par arrêté du 19 août 2002.","architecture":"ERBREE, le fief d'Erbrée est connu depuis le début du XIVe siècle. Le logis en L, encore cerné de douves en eau, visible sur le cadastre de 1833, est bientôt remplacé par un château à la sobre architecture néo-classique. Si la démolition de l'ancien logis était en cours en février 1835, elle avait été précédée, dès 1830, par des \"constructions nouvelles et des plantations qui nécessitaient des bouleversements de terre\". Le château, accompagné d'un parc paysager et de bâtiments de communs, a conservé ses distributions d'origine. Éléments protégés MH : les éléments suivants composant le château : les façades et les toitures du logis, le bâtiment de communs abritant les écuries en totalité, le jardin potager avec ses murs, les chenils, les poulaillers, la tourelle des commodités, l'abri sur poteaux de bois, le vestige des communs de l'ancien château, et le parc paysager avec l'allée d'accès depuis l'ouest: inscription par arrêté du 8 juillet 2010.          BEAUBIGNE, le château de Beaubigné est inscrit aux M.H. depuis 2002. C'est un château privé, fermé au Public.","habitants":"Seigneurs locaux\r\n        \"","divers":"il existe aussi à Fromentières   grav-4,  et 3 autres châteaux : le Château de Beaubignè grav 3 Tour,                                             le château d'Erbrée grav 1                                                                    et le château de Gand-Coulonges grav 2.  GPS : 47° 52' 22\" Nord, 0° 41' 23\" Ouest","gps":"47° 52' 22\" Nord, 0° 41' 23\" Ouest","images":["../image/image_53/53_Fromenti%c3%a8res_1.jpg","../image/image_53/53_Fromenti%c3%a8res_2.jpg","../image/image_53/53_Fromenti%c3%a8res_3.jpg","../image/image_53/53_Fromenti%c3%a8res_4.jpg"]},"Consult_chateau_formulaire1564":{"id":"Consult_chateau_formulaire1564","dept":"53","canton":"Evron","commune":"Brée","nom":"Gde_Courbe_de_Brée","type":"château","periode":"XV-XVI","histoire":"COURBE de BREE, au milieu du XIVe siècle,  Le château relevait pour sa haute, moyenne et basse justice, pour ce qu'emportent le pré de la Salle et prairies des Marais; du Chapitre du Mans par sa châtellenie d'Assé le Béranger. Et de Monsieur, frère du roi, pour les deux cents arpens de landes de la Charnie, et du château de la Courbe de Brée, à foi et hommage lige, pour le surplus et pour son titre de châtellenie.","architecture":"OURBE de BREE, au milieu du XIVe siècle, un second bâtiment, le vieux logis, avec entrée spécifique, est construit en angle de la grande salle, laquelle est rétrécie au niveau de la nef centrale et la cheminée déplacée sur le mur ouest, construit à cette époque. Une cuisine et ses dépendances est également construit perpendiculairement de la grande salle. Substantiellement modifié et surélevé par la suite, ce bâtiment constitue le logis neuf. Vers la fin du XIVe siècle, un étage est ajouté au dessus de la grande salle et permet d'installer une salle haute suivie d'une chambre carrée qui existe encore. Les ouvertures de la grande salle sont remaniées; une tour de latrines est construite à l'angle sud est de la grande salle et dessert, via une galerie extérieure, les deux pièces de l'étage. Dans la deuxième moitié du XVe siècle de grands travaux sont opérés; avec transformation du vieux logis en cuisine, la construction de la tour de gloriette, de la chapelle, surélévation de la moitié est du logis neuf et construction d'une tour de latrines. Vers 1560, on achève la surélévation du logis neuf avec une chambre haute et un cabinet, la galerie est poursuivie vers l'ouest. Sur la façade, on surmonte les fenêtres de frontons à décors de volutes et pots à feu. Vers la fin du XVIe siècle un mur d'enceinte défendu par quatre tours renforce les défenses extérieures. Quatre bâtiments de service sont édifiés à proximité : le porche d'entrée, XIIIe-XIVe siècle, muni d'un double pont-levis; le bâtiment de service, la grange du XVIe siècle et un pigeonnier du XVIIe siècle.","habitants":"Chapitre du Mans\r\n        \r\n        \r\n        \"","divers":"Grande Courbe de Bree a Bree                                                      GPS : 48° 08' 40\" Nord, 0° 29' 49\" Ouest","gps":"48° 08' 40\" Nord, 0° 29' 49\" Ouest","images":["../image/image_53/53_Grande_Courbe_1.jpg","../image/image_53/53_Grande_Courbe_2.jpg"]},"Consult_chateau_formulaire2be7":{"id":"Consult_chateau_formulaire2be7","dept":"53","canton":"Château-Gontier","commune":"Peuton","nom":"Girouardière","type":"Château","periode":"XIIIe-XVIIe","histoire":"GIROUARDIERE, le château éponyme, fief de la famille Hardouin possédait le fief depuis une date antérieure à 1360., se présente comme un ensemble complet de bâtiments (chapelle, four à pain banal, pigeonnier, écurie, longère, vivier, logis). Il ne reste actuellement aucun vestige antérieur au XVIe siècle facilement identifiable. Cependant, il est à peu près certain que le système défensif a été aménagé à une époque plus ancienne. Le ruisseau le plus proche ne semble pas permettre lalimentation directe de la douve. Celle-ci pourrait résulter dun creusement de main dhomme avec reprise des terres sur la parcelle dite \"la butte\" pour protéger le flanc est du domaine. La délimitation cadastrale de cette parcelle constitue une ligne de crête au dénivelé important. Si chacun de ces bâtiments d'origine ne possède pas la qualité architecturale et de décor de maints édifices de Mayenne, l'ensemble, bien conservé, est un témoin rare de l'habitat local hobereau des XVIe et XVIIe siècles.","architecture":"GIROUARDIERE,le logis et ses dépendances s'inscrivent dans un quadrilatère, jadis protégé à l'ouest et au sud par des douves, à l' est par une levée de terre. L'entrée se faisait par le nord, protégée par une tour carrée, le long bâtiment de communs fermant la cour. Le logis proprement dit est un bâtiment long et étroit, orienté est-ouest. Le pignon sud, flanqué de tours de défense carrées, est éclairé d'une travée de baie des années 1525 au vocabulaire décoratif particulièrement original. Guillaume Hardouin marié à Aliénor de la Corbière en janvier 1525 semble avoir voulu marquer, avec les macles et les fleurs de lys, le double lien vassalique qui le liait aux Rohan portant \"de gueules à neuf macles d'or\" et aux Bréon portant \"d'argent à la fasce de gueules fleurdelisé et contre fleurdelisé\". Leur fils, marié en 1550, homme d'armes du duc de Lorraine, fait son testament à Metz en 1552 et meurt peu après. C'est donc à son fils unique, Eustache Hardouin, marié en 1571, qu'il faut attribuer la plus importante campagne de travaux (armoiries sculptées sur le manteau de la cheminée d'une salle du rez-de chaussée). Le logis est desservi de fond en comble par un escalier rampe sur rampe voûté d'un blocage de briques enduites. Le repos et le palier pouvait être éclairé par des lampes à huile posées dans des niches prévues à cet effet. La charpente est à chevrons portant ferme à entraits retroussés. Le logis est accompagné d'un bâtiment de communs, d'une chapelle et d'un four à pain. Éléments protégés MH : le le logis, la chapelle, le four à pain. la tour protégeant l'entrée nord en totalité; les façades et les toitures du bâtiment de communs, ainsi que le terrain d'assiette archéologique de l'ancien sy
