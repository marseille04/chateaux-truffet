e disposition du XVIIe siècle ( façade sur cour avec deux ailes et façade sur jardin encadrée de deux pavillons ) atteint une certaine grandeur par la sévérité de son architecture.","architecture":"MONTFLAUX, c'est un château situé à 3 km Ouest-Nord-Ouest sur la route de Carelle. Seigneurie mouvante de Mayenne par Charné-Bazeille, à foi et hommage simple, et érigée en comté le 28 octobre 1670 avec annexion des terres de Champorin, l'Outagerie, Ivoy et Carelles. Elle possédait la seigneurie de paroisse. Au manoir et logis seigneurial mentionné au XVIe siècle, Charles de Froulay substitua, vers le milieu du XVIIe siècle, le château actuel, vaste, imposant par ses proportions, son entourage. Habité longtemps par la puissante famille de Froulay, visité encore quelquefois par la marquise de Créquy jusqu'à l'approche de la Révolution française, Montflaux fut envahi le 1er juin 1790 par une centaine d'individus qui vinrent se faire livrer les grains, restes de celui que la bonne châtelaine leur distribuait si libéralement, et menacèrent le régisseur, M. Testard, de lui fendre la tête et de le jeter dans l'étang. Les derniers Chouans se casernèrent à leur tour, le 15 décembre 1799, au nombre de quatre ou cinq cents, pour 20 jours, dans le château et en emportèrent 1400 livres de plomb. L'abbé Angot, signale qu'au début du XXe siècle, la galerie du château possédait les portraits de la famille de Froullay, coudoyant ceux de révolutionnaires ou de républicains de marque, comme Ledru-Rollin et Cavaignac, d'autres tableaux remarquables et des souvenirs des Talleyrand-Périgord, la table où fut signée la déchéance de l'empereur Napoléon Ier. Le château est inscrit aux M.H. depuis 1929.","habitants":"Famille de  Charles de Froullay\r\n        \"","divers":"a  Saint Denis de Gastines le château de Montflaux                   GPS : 48° 21' 13,32\" Nord, 0° 53' 30,84\" Ouest","gps":"48° 21' 13,32\" Nord, 0° 53' 30,84\" Ouest","images":["../image/image_53/53_Montflaux_1.jpg","../image/image_53/53_Montflaux_2.jpg"]},"Consult_chateau_formulaire6882":{"id":"Consult_chateau_formulaire6882","dept":"53","canton":"Château-Gontier","commune":"Saint-Quentin les Anges","nom":"Montiercrolles","type":"Château","periode":"XVe-XVIe","histoire":"MONTIERCROLLES,  Renaud d'Ancenis, marié avant 1351 à Isabeau de Clisson, héritière d'Amaury, son frère ; Bertrand du Guesclin, cousin du connétable Bertrand Du Guesclin, mari d'Isabeau d'Ancenis, inhumé à Brissarthe vers 1396, tandis que les trois dames de Mortiercrolles qui précèdent l'avaient été à l'abbaye de Bellebranche. La dernière, qui avait donné partage provisionnel à ses beaux-frères en son hostel de Mortiercrolles le 17 janvier 1402 c'est un château de style Renaissance, date du XVe siècle au XVIIIe siècle et appartenait à Pierre de Rohan, maréchal de Gié.  Charles II de Rohan, né en juillet 1633, qualifié de baron de Mortiercrolles, décédé fou en Belgique en 1699. Charles III de Rohan, né le 30 septembre 1655 de ce mariage, après la mort de Jeanne-Armande, sa nièce, qui nomme le sénéchal de Mortiercrolles en 1695.Le plus jeune de leurs fils, Ferdinand Maximilien Mériadec de Rohan, vendit Mortiercrolles en 1763. Famille de Preaulx (XVIIIe et XIXe siècle      Jeanne du Tertre de Sancé, fille unique de Jean-Baptiste du Tertre, marquis de Sancé, épousa en 1754 Joseph-François de Paule, 5e marquis de Préaulx du 1721-1789   et porta Mortiercrolles à la famille de Préaulx.    Joseph-Hilaire, 8e marquis de Préaulx (1814-1884), fils du précédent, marié en 1838 avec Sophie de Gibot hérita de Mortiercrolles.  Odet, marquis de Montault, en hérita à son tour. Après sa mort, sa veuve (née Agnès de Rohan-Chabot, fille du 10e duc de Rohan) se remaria avec Arthur de Rougé, 5e duc de Caylus. Leur fille Antoinette, 6e duchesse de Caylus (1890-1954) hérita ensuite de Mortiercrolles.","architecture":"MONTIERCROLLES,  le château fut rebâti dans les dernières années du XVe siècle par Pierre de Rohan, maréchal de Gié. Si on le compare aux ruines de Montjean, on comprend que de 1460 à 1500 la paix avait été assurée en France, et que le vent de la Renaissance avait soufflé sur le pays. Le choix et lagencement des matériaux, les assises alternées de tuffeau et de briques, les larges ouvertures sétageant jusquau faîte des toits, grâce aux frontons des lucarnes, les corbeaux des mâchicoulis, gracieusement évidés et décorés de fines sculptures, remplacent avec grâce les lourdes masses qui 50 ans plus tôt avaient la prétention de résister à lartillerie encore à ses débuts. Lenceinte, au delà des larges douves qui la protègent, avait aux angles quatre tours avec tourillons en encorbellement. Le châtelet surtout est bien conservé et élégant. La chapelle, avec ses murs ébréchés, mais solides et dun effet si décoratif grâce à lalternance de ses assises blanches et brunes. Éléments protégés MH : les façades et les toitures du château et des dépendances, l'enceinte du domaine avec sa porte d'entrée et ses tours, ainsi que les ruines de la chapelle : classement par arrêté du 2 janvier 1924.","habitants":"Famille de Pierre de Rohan\r\n        \r\n        \"","divers":"a Saint-Quentin les Anges  le château de Mortiercrolles                GPS : 47° 45' 59\" Nord, 0° 52' 34\" Ouest","gps":"47° 45' 59\" Nord, 0° 52' 34\" Ouest","images":["../image/image_53/53_Montiercrolles_1.jpg","../image/image_53/53_Montiercrolles_2.jpg","../image/image_53/53_Montiercrolles_3.jpg","../image/image_53/53_Montiercrolles_4.jpg","../image/image_53/53_Montiercrolles_5.jpg","../image/image_53/53_Montiercrolles_6.jpg"]},"Consult_chateau_formulaire97d7":{"id":"Consult_chateau_formulaire97d7","dept":"53","canton":"L","commune":"Montigné le Brillant","nom":"Montigné_Brillant","type":"Château","periode":"XIXe","histoire":"La VILETTE ou VILLATTE , le château de la Villatte est construit sur une éminence surplombant la vallée du Vicoin. Naguère au cur d'un important domaine foncier, la demeure est restée telle qu'elle fut bâtie en 1900. C'est une imposante bâtisse où l'architecte Guinebretière a su allier l'art de vivre aristocratique aux derniers progrès de la technique d'alors. Son parc à l'anglaise, reflet du romantisme en vogue au XIXe siècle, offre un écrin pittoresque à cet ensemble constitué du château et de ses communs.","architecture":"VERGER, est de style Médiéval. Le château du Verger de Montigné, construit pour François de la Pommeraie, en 1500, avait, en 1663, un portail, un corps de logis, des pavillons, deux tours, des galeries, une fuye à pigeons, deux cours et trois jardins. Le tout était clos de murailles, contenant ensemble deux journaux et demi ; deux vergers et un petit étang à la proximité des jardins, contenant ensemble trois journaux ; le parc tout enclos de murailles, consistant en deux chesnaies et une châtaigneraie, contenant 7 à 8 journaux, dans lequel il y a des jeux de pail-mail, de paulme et de bille. Tout a été détruit vers 1800, sauf les 2 tours qui donnent encore un cachet féodal au bourg, qu'elles dominent. Le seigneur du Verger se présentait à la chapelle de Sainte-Marguerite. René de La Porte, acquéreur, prit le titre de seigneur de Montigné dans l'inscription d'une cloche qu'il nomma vers 1700. M. Duchemin, en 1723, nomme son manoir le château de Montigné. Le Duc de la Trémoïlle protesta, contre ces innovations, qui tendaient à une usurpation de ses droits de châtelain. Il reste que des vestiges du Château médiéval du Verger : Les deux tours circulaires à toit en poivrière et un pavillon carré, vestiges du château du Verger construit vers 1500, situé à proximité de léglise. La juxtaposition du château du Verger, de léglise, de la mairie, de lancienne poste aujourdhui maison paroissiale et de lécole (début XXe siècle) fait de cet espace un cur de bourg éclectique et disparate.","habitants":"Famille de François de la Pommeraie\r\n        \"","divers":"A Montigné le Brillantle château Verger grav-5,                               de Vilatte grav 3-4 et                                                                      des Essarts Grav 1-2                                                                     GPS : 48° 00' 31\" Nord, 0° 48' 51\" Ouest","gps":"48° 00' 31\" Nord, 0° 48' 51\" Ouest","images":["../image/image_53/53_Montign%c3%a9_Brillant_1.jpg","../image/image_53/53_Montign%c3%a9_Brillant_2.jpg","../image/image_53/53_Montign%c3%a9_Brillant_3.jpg","../image/image_53/53_Montign%c3%a9_Brillant_4.jpg","../image/image_53/53_Montign%c3%a9_Brillant_5.jpg","../image/image_53/53_Montign%c3%a9_Brillant_6.jpg"]},"Consult_chateau_formulaire2e13":{"id":"Consult_chateau_formulaire2e13","dept":"53","canton":"Loiron","commune":"Montjean","nom":"Montjean","type":"Vestiges","periode":"XII-XVI","histoire":"Il existe 5 châteaux à Montjean à découvrir :  de Montflaux,  de Rigardon,de Bellevue,  de la Ferté et  du Bourg.                                        LANFRIERE, le château a été construit en 1840 par le comte Estève, trésorier de Napoléon, il est offert à sa petite-fille lors de son mariage avec Bernard de Monti de Rezé. L'édifice se compose  d'une façade sud d'un dessin très régulier à base de tuffeau. Avec ses trois têtes représentant le propriétaire et sa famille et quatre tourelles d'angle, une façade nord au milieu de laquelle on peut voir au premier étage l'arrière de la chapelle de pur style troubadour et un escalier d'honneur en bois. Devant le logis se trouve un jardin français limité par une balustrade datant de la construction de la maison et un salon de verdure en charme, un grand parc à l'anglaise, et un ensemble de bâtiments de services parfaitement homogène avec deux grands corps de bâtiments et un pigeonnier chinois. Une plaque des religieuses du couvent des oiseaux de Versailles remercie les hôtes du château de les avoir hébergés pendant les années mouvementées, de 1870 et de 1871, par la guerre franco-prussienne et la commune.                                                 MONTJEAN, cet ancien château fort est de style médiéval. La construction du château de Montjean date du XIIe siècle.  Appartenait aux comtes de Laval. Le château de Montjean était au XVIe siècle une place importante qui défendait le comté de Laval royaliste contre les bandes de Mercur et les ligueurs de l'Anjou. Il fut reconstruit par André de Lohéac, après la Campagne de Bretagne et de Normandie en 1448-1449.  Le 15 août 1818, M. Morin de la Blottais acquit de la famille de la Trémoïlle. Pour l'abbé Angot, au début du XXe siècle, l'espace enclos par l'étang et les douves a plus d'un demi-hectare, tout entier occupé par les murs d'enceinte flanqués de fortes tours. Le château de Montjean est en ruines, aujourd'hui.","architecture":"MONTJEAN, ce n'est qu'une motte de terre au centre d'un domaine protégé par des fossés, le château est un édifice de pierre qui est en partie détruit par un incendie en 1385. Montjean est aux mains de Briand de Couesmes et semble assez important pour qu'on le relève. Il est détruit par l'anglais d'Arundel entre 1429 et 1433. En 1448, ses murs sont rachetés à Jean et Robert de Landivy, par le maréchal André de Lohéac, fils de Jean de Montfort et d'Anne de Laval. Le nouveau propriétaire entreprend de le reconstruire entre 1466 et 1477 pour en faire une forteresse digne de défendre le comté de Laval. Cette place importante, habitée jusquau XVIIe siècle, fut abandonnée peu à peu, et ce fut au cours des siècles suivants une carrière que lon pilla au profit des constructions nouvelles, le donjon couronné de hourds a été restauré récemment lui redonnant fière allure. Les ruines sont superbes, c'est un amateur de ruines romantiques qui a acheté le château pour en faire sa demeure. Le château de Montjean était au XVIe siècle une place importante qui défendait le comté de Laval royaliste contre les bandes de Mercur et les ligueurs de l'Anjou. Situé à quatre lieues de Laval, sur les confins de la Bretagne,  La majesté de ses ruines, la grandeur de son enceinte, ses vastes fossés donnent encore aujourd'hui la mesure de son importance.  l'espace enclos par l'étang et les douves a plus d'un demi-hectare, tout entier occupé par les murs d'enceinte flanqués de fortes tours. Le côté opposé à l'étang ne présente plus qu'un amas informe de décombres, toute cette partie ayant, pendant un siècle, été exploitée comme une carrière. Vers la chaussée de l'étang, les fossés étaient doubles.   Le château de Montjean est en ruines, aujourd'hui.","habitants":"Lantrière;Bernard de Monti de Rezé                                             Montjean; famille de la Trémoïlle\r\n        \"","divers":"Il existe 5 châteaux à Montjean à découvrir :  de Montflaux,  de Rigardon,de Bellevue,  de la Ferté et  du Bourg vestiges  grav 1-2.  Lanfrière grav-3                                                                    GPS : 48° 00' 04\" Nord, 0° 55' 27\" Ouest","gps":"48° 00' 04\" Nord, 0° 55' 27\" Ouest","images":["../image/image_53/53_Montjean_1.jpg","../image/image_53/53_Montjean_2.jpg","../image/image_53/53_Montjean_3.jpg"]},"Consult_chateau_formulaire47a7":{"id":"Consult_chateau_formulaire47a7","dept":"53","canton":"Evron","commune":"Montsurs","nom":"Montsurs","type":"Château","periode":"XVIe","histoire":"Trois châteaux à Montsurs dont celui de Montsurs et d'Ifs et de Rochet , pas d'informations historiques  pour ce dernier.               IFS, la chapelle Saint-Ouie est le seul vestige intact du château des Ifs. C'est un petit édifice construit au début du XVIe siècle possédant quelques détails d'architecture intéressants tels que la porte d'entrée et le lavabo. Des peintures murales remontant au XVIIe siècle apparaissent sous les badigeons. Mentionnons également les vestiges du château des Ifs. Éléments protégés MH : la chapelle Saint-Ouie et le portail du château, en totalité : inscription par arrêté du 2 novembre 1998.   la chapelle Saint-Ouie est le seul vestige intact du château de Ifs.","architecture":"MONTSURS, du  XIVe-XVe siècle,  où naquit André de Lohéac, compagnon de Jeanne d'Arc. Le château était situé sur des escarpements naturels renforcés par de profondes douves alimentées par la Jouanne et le Vesnard. La ville de Montsûrs était une des dix châtellenies du comté de Laval. On voit par les ruines qui existaient encore au XIXe siècle que ce château pouvait avoir de 12 à 1 500 mètres de circuit. Il était flanqué de plusieurs tours avec bastions, et avait un pont-levis et des fossés larges et très-profonds.  Avec son armée puissante, Louis XI en conflit avec Jean II de Valois, passa par Montsûrs; mais il ne s'y arrêta pas. Le roi, en quittant Laval, se réfugia à l'Abbaye de la Roë au mois de septembre 1472 pendant que son armée était devant la Guerche. Au début du XIXe siècle, les vestiges de cinq tours et du château étaient encore visibles. Ils subsistent actuellement deux tours : la tour dite « de la Fuye » et la Tour Renaise. Le reste est totalement détruit entre 1833 et 1855 pour la construction de l'église paroissiale de Montsûrs.  Château ruiné en 1426 et en 1434 par les Anglais. Chapelle des trois Marie reconstruite entre 1384 et 1386 pour Jean de Laval. Restaurée après 1426 pour Jeanne de Laval, après 1434 la chapelle Sainte Anne est restaurée et agrandie pour Anne de Laval. Vestiges des tours et du logis détruits au début du XIXe siècle, chapelle détruite entre 1833 et 1855. Actuellement, il reste la motte, la base d'une tour (propriété de la commune), et le pigeonnier transformé en maison (propriété privée). La tour est inscrite MH en 1925.","habitants":"Famille de Jean de Laval\r\n        \"","divers":"châteaux à Montsurs dont celui de Montsurs grav 1-2-3-4 et d'Ifs  grav 5-6 .                                                                             Montsurs Gps 48° 08' 01? N, 0° 33' 09? O","gps":"","images":["../image/image_53/53_Montsurs_1.jpg","../image/image_53/53_Montsurs_2.jpg","../image/image_53/53_Montsurs_3.jpg","../image/image_53/53_Montsurs_4.jpg","../image/image_53/53_Montsurs_5.jpg","../image/image_53/53_Montsurs_6.jpg"]},"Consult_chateau_formulaire4c3a":{"id":"Consult_chateau_formulaire4c3a","dept":"53","canton":"Château-Gontier","commune":"Niafles","nom":"Niafles","type":"Château","periode":"XVIIe-XVIIIe","histoire":"La LANDE, fief mouvant de la baronnie de Craon par Saint-Amadour.  Le duc de Montpensier mit garnison au château en octobre 1560, et le capitaine Goulay s'en empara vers 1589. C'était alors une des places fortes des huguenots.  seigneurs  de la Chesnaies de 1310 à 1620, les Lantivy  de 1668 à 1825.  La terre de la Lande a été acquise sur ses descendants vers 1825 par Michel Séguin, chevalier de la légion d'honneur, maire de Château-Gontier et conseiller général du département, démissionnaire en 1830 ;\r\nElle passa ensuite à Daniel Daudier, époux de Sophie Seguin, agronome distingué, qui fit de cette propriété une exploitation agricole modèle et contribua au développement de l'agriculture dans le Craonnais par l'introduction des instruments perfectionnés et de la race Durham pure.                                                           HULINIERES,  en furent sieurs et y habitèrent : Jean Hullin, mari de Jeanne de Mesmes, dont la fille, Madeleine Hullin, épouse en 1559 Jean de la Fléchère. Noble homme Jean Hullin, mari de Marguerite Fardeau, procureur fiscal à Craon ; Gabrielle, sa fille, est baptisée à Craon, 1603. Georges Hullin le Jeune, 1656. Ce fut la seule terre, dit René de Quatrebarbes, que la mauvaise administration de Joachim de la Chesnaie laissa à sa fille, Anne de la Chesnaie, mariée à René de Leviston Blason Lantivy-Leviston svg, 1669. Les Demoiselles Déborah et Jeanne de Leviston firent abjuration du protestantisme le 31 décembre 1685 et le 19 janvier 1686. Déborah de Leviston, mariée en 1694 à Charles-Gédéon de Ridouet, seigneur de Sancé, fait baptiser en 1701 Gédéon-Pierre Amaury de Ridouet, son fils.\r\nM. Minault de la Heslaudière est seigneur de la Hullinière en 1737.","architecture":"La LANDE, on mentionne en 1697 « maison seigneuriale faite à murailles. chapelle donnant sur la cour, à l'entrée de laquelle y a un grand portail sur lequel est un pigeonnier en pavillon. » Il ne reste plus de maison que la cour, disposée comme en 1680, les douves desséchées et la chapelle, près de laquelle furent retrouvés, les fondements d'une grosse tour. Le logis actuel est une construction du XVIIIe siècle sur des fondations plus anciennes, était environné au début du XXe siècle de jardins prolongés par une allée de hêtres séculaires aboutissant à la route de Saint-Aignan à Craon, avec à droite, de vastes futaies percées.  Le château de la Lande de Niafles est inscrit aux M.H. en 1987.                                                                                   MOTTE -DAUDIER, est situé à 2 000 mètres à l'Est du bourg. A côté du château de la Hulinière, trop petit pour son importante famille, la construction d'un château est entreprise par Foulques de Quatrebarbes et terminée en 1892. Il porte le nom de la jeune fille de son épouse Cécile Daudier.","habitants":"la Lande; capitaine Goulay                                                         motte; Foulques de Quatrebarbes.\r\n        \"","divers":"Quatre châteaux à Niafles; la Landes grav 1-2 ,Hulinière, La Motte Daudier grav 3-4 et de Nicoulière grav 5.                                   GPS : 47° 51' 01\" Nord, 0° 59' 43\" Ouest","gps":"47° 51' 01\" Nord, 0° 59' 43\" Ouest","images":["../image/image_53/53_Niafles_1.jpg","../image/image_53/53_Niafles_2.jpg","../image/image_53/53_Niafles_3.jpg","../image/image_53/53_Niafles_4.jpg","../image/image_53/53_Niafles_5.jpg"]},"Consult_chateau_formulaire545b":{"id":"Consult_chateau_formulaire545b","dept":"53","canton":"Azé","commune":"Bierné-les-Villages","nom":"Noirieux","type":"Château","periode":"XVIII","histoire":"NOIRIEUX. Mme Veuve Léonce Grenet céda une partie des terres agricoles en juin 1972 à la Safer du Maine et revendit le château de Noirieux, ses dépendances, les parcelles restant des terres pour 10 hectares 37 ares 31 centiares en octobre 1973 à la société civile dexploitation agricole dite du domaine de Noirieux, dont le gérant était Mr Jean-Claude Tête. Mr Jean-Claude Tête et son épouse, née Chantal Sauvage, acquirent donc Noirieux le 22/10/1973. Ces personnes se lancèrent dans lexploitation de chèvres et transformèrent Noirieux en gîte rural. Acculés, ils vendirent tout ce qui pouvait lêtre dans la maison, dont la plaque rappelant la construction du château, puis coupèrent, après avoir vendu Noirieux, de nombreux chênes multi-centenaires. Mr François-Xavier Potier et Mme Chantal Dejean de La Bâtie acquièrent la propriété le 14/04/1978. Ils entreprirent la restauration du château et de son environnement, il  est inscrit aux M.H. depuis le 11/04/1990.","architecture":"NOIRIEUX, la construction du château de Noirieux date de 1747 à 1850. Mr et Mme Grenet firent de gros travaux, dont les toitures, mais ne touchèrent pas à lintérieur de la maison. Durant la seconde guerre mondiale, Noirieux accueillit d'abord des réfugiés du Nord et de l'Est, puis fut occupé par larmée allemande, ce qui lui ajouta quelques graffitis peu convenables écrits en écriture gothique sur les murs du deuxième étage. Puis une communauté de religieuses de Rennes y installa son noviciat, entrainant de nombreuses modifications pour y construire des cellules et linstallation dune impressionnante collection de porte-manteaux. Ces modifications étant de très mauvaise qualité, elles disparurent au fur et à mesure des restaurations.  Le public est admis dans le parc, ce qui nous permet de voir les parties classées du château, qui sont les façades, les toitures  et lorangerie. L'entrée du parc est gratuite. L'intérieur du château de Noirieux est privé, fermé au Public. Seuls les extérieurs se visitent.","habitants":"Famille de Mr Jean-Claude Tête\r\n        \"","divers":"Châteaux de Noirieux  à Bierné-les-Villages                                                     GPS : 47° 47' 06\" Nord, 0° 32' 36\" Ouest","gps":"47° 47' 06\" Nord, 0° 32' 36\" Ouest","images":["../image/image_53/53_Noirieux_1.jpg","../image/image_53/53_Noirieux_2.jpg"]},"Consult_chateau_formulairec6a9":{"id":"Consult_chateau_formulairec6a9","dept":"53","canton":"Gorron","commune":"Saint-Ellier du Maine","nom":"Pihoraie","type":"Château","periode":"XVIIe","histoire":"PIHORAIE, un premier château avait été habité depuis le XVe siècle, par la famille de La Hautonnière, succédant à une famille de La Pihoraie mentionnée dans des actes du XIVe siècle. A la famille de La Hautonnière, succéda celle de Valori. Charles-Paul-Eugène de Valori, né en 1715, hérite de La Pihoraie en 1748 et entreprend à partir de 1760, la construction du château que nous voyons aujourd'hui. Un membre de cette famille accompagna Louis XVI dans son équipée de Varennes. En 1769, les travaux étaient toujours en cours. C'est de tradition d'attribuer à l'ingénieur Simon de Garangeau, disciple de Vauban, la paternité architecturale de la Pihoraie qui s'apparente aux malouinières des environs de Saint Malo. Le château passa ensuite à la famille le Forestier d'Osseville, puis à la famille de Sénevas toujours propriétaires. Construit sur un plan massé, l'édifice comporte un corps de bâtiment double, soit deux pièces en profondeur. Le rez-de-chaussée est surélevé, surmonté d'un étage de combles. Par son plan, La Pihoraie tout de granit est d'une simplicité qui n'exclue pas l'élégance.","architecture":"PIHORAIE, la construction du château de la Pihoraie date du XVIIe siècle. Il fut construit pour les seigneurs de la Hautonière en Fougerolles-du-Plessis, pour en faire leur résidence. Le château de La Pihoraye a été commandité par Eugène de Valory et sa femme Gabrielle d'Auray de Saint-Pois. C'est en 1765, dans le style des malouinières, au XVIIIe siècle, au cur d'un parc à la Française, orné de rhododendrons, qu'il fut construit. Le château de la Pihoraie est inscrit aux M.H. depuis 1976.","habitants":"Famille de La Hautonnière\r\n        \"","divers":"a Saint-Ellier du Maine  le château de Pihoraie GPS : 48° 23' 38\" Nord, 1° 00' 56\" Ouest","gps":"48° 23' 38\" Nord, 1° 00' 56\" Ouest","images":["../image/image_53/53_Pihoraie_1.jpg"]},"Consult_chateau_formulaire2b28":{"id":"Consult_chateau_formulaire2b28","dept":"53","canton":"Villaines-la-Juhel","commune":"Saint-Pierre-des-Nids","nom":"Plessis_Brochard","type":"Maison forte","periode":"XV-XVIII","histoire":"PLESSIS-BROCHARD,  reconstruit au milieu du XVIIIe siècle par René André de La Fournerie, Seigneur de la Ferrière et de Chain, descendant des maîtres de forges qui avaient acquis la seigneurie en 1610 en conservant une des tours médiévales de l'ancien logis fortifié  du XIVe siècle. Décor intérieur exécuté au début du XIXe siècle. Chapelle du XVIe siècle transformée en maison de jardinier. Château inhabité depuis 1880.  Le château de Bochard était un lieu de défense datant de la fin du XVe siècle, près de Saint-Pierre-des-Nids. Actuels propriétaires, Catherine et Jean Mery de Bellegarde ont fait découvrir les travaux réalisés pour réhabiliter le château et son jardin.","architecture":"PLESSIS-BROCHARD, il existait un édifice fortifié dès le XVe siècle comme en témoigne la tour de guet avec un escalier desservant les étages du logis actuel. Lintérieur a été entièrement redécoré au début du XIXe siècle. De chaque côté de la bâtisse, deux constructions alignées soit une chapelle et une écurie prolongée dune boulangerie, le château de Bochard était un lieu de défense datant de la fin du XVe siècle, près de Saint-Pierre-des-Nids. Actuels propriétaires, Catherine et Jean Méry de Bellegarde vous font découvrir ce lieu riche dhistoire.  Éléments protégés MH : le logis, la chapelle et les communs comprenant l'écurie la boulangerie et le décor intérieur : inscription par arrêté du 15 mai 1996.     Le Vieux Logis, manoir du début du XVIIIe siècle .","habitants":"Famille de  Catherine et Jean Méry de Bellegarde \r\n        \r\n        \"","divers":"A  Saint-Pierre-des-Nids le château de Plessis-Bochard,             gps  48° 23' 56\" nord, 0° 05' 58\" ouest                                              48° 23' 23\" nord, 0° 04' 27\" ouest","gps":"","images":["../image/image_53/53_Plessis_Bochard_1.jpg","../image/image_53/53_Plessis_Bochard_2.jpg","../image/image_53/53_Plessis_Bochard_3.jpg","../image/image_53/53_Plessis_Bochard_4.jpg","../image/image_53/53_Plessis_Bochard_5.jpg"]},"Consult_chateau_formulairef5f1":{"id":"Consult_chateau_formulairef5f1","dept":"53","canton":"Loiron","commune":"Port-Brillet","nom":"Port_Brillet","type":"Manoir","periode":"XVIII","histoire":"A trois kilomètres au nord ouest Launay-Villiers château dont je n'ai pas d'information historique.                                                                      PORT-BRILLET, lhistoire du village est liée aux forges. La présence d'un moulin dès le milieu du XIe siècle, une topologie et une géologie favorable, accrédite l'hypothèse de la présence d'une forge rudimentaire au milieu du XIe siècle. Des écrits mentionnent la présence de la forge dès 1452 (laveu du comté de Laval en 1452 mentionne la forge Brielle). À proximité du moulin de la Poulardière, Michel Deguerre en 1619 obtient le droit de faire bâtir et construire une grosse forge avec les bâtiments des forgerons. Ces forges sont dues à l'initiative de Nicolas Lemaçon (Le Maczon), sieur de la Poulardière, datent de 1621. En 1799, deux frères, François Paillard-Ducléré et Paillard-Dubignon, font valoir ensemble les grosses forges et fourneaux de Port-Brillet. En 1817, Constant Paillard-Ducléré est élu député et réélu jusqu'à sa mort en 1839. Pendant cette période, il laisse la direction de l'établissement métallurgique à son frère cadet qui lui écrit quotidiennement. Cette correspondance est conservée aux archives de la Sarthe. Leur clientèle était principalement de la région Domfront-Tinchebray.     A trois kilomètres nord ouest à Launay-Villiers plusieurs châteaux dont celui de Launay Villiers.","architecture":"PORT-BRILLET, pendant la Révolution française, alors que les communes environnantes soutenaient la chouannerie, les forgerons de Port-Brillet sétaient constitués en gardes nationaux. Naissance de la commune : le village autour des Forges ayant grossi, Port-Brillet est érigé en commune en 1874. Port-Brillet était une paroisse détachée de celle d'Olivet, au spirituel, en 1828, érigée en succursale par ordonnance du 26 mars 1840, en commune par décret du 4 août 1874. Les forges qui devinrent le principal revenu du comté de Laval avaient donné naissance à la première agglomération.   Au bord d'un étang Petit manoir de plan carré à deux niveaux flanqué de pavillons saillants et d'un porche d'entrée avec galerie et terrasse sur flanc.                                                                                                   La CITARDIERE, le château est classé au titre des M.H. en 1989.","habitants":"Famille de Michel Deguerre \r\n        \"","divers":"Château de Port-Brillet grav-1-2-3                                                      Gps  48° 06' 44\" nord, 0° 58' 18\" ouest                                                Launay- Villiers  grav 4-5 et la Chetardière grav 6                        Gps46° 32' 03\" nord, 0° 44' 24\" ouest","gps":"","images":["../image/image_53/53_Port_Brillet_1.jpg","../image/image_53/53_Port_Brillet_2.jpg","../image/image_53/53_Port_Brillet_3.jpg","../image/image_53/53_Port_Brillet_4.jpg","../image/image_53/53_Port_Brillet_5.jpg","../image/image_53/53_Port_Brillet_6.jpg"]},"Consult_chateau_formulairee456":{"id":"Consult_chateau_formulairee456","dept":"53","canton":"Meslay-du-Maine","commune":"Ruillé Froid Fonds","nom":"Puy_53","type":"Château","periode":"XVII-XIX","histoire":"PUY, constitué dune maison de maître et de bâtiments annexes (maison de gardien, pavillon dentrée, chapelle), cet ensemble remonte pour lessentiel à la fin du XVIIe siècle, bien que dimportantes transformations aient été apportées à la maison principale au début du XIXe siècle (1820), on note la sévérité de larchitecture initiale de la demeure, et la nature des ajouts du XIXe siècle (corniches, frontons, pilastres) qui restructurent la façade dans un esprit entièrement nouveau. Le site vaut surtout pour lagencement densemble des différents bâtiments du XVIIe siècle constituant une cour dhonneur et pour la perspective dun jardin à la française qui se prolonge à larrière jusquau tracé ancien dun labyrinthe et dune charmille.","architecture":"PUY a été construit au XVIIe siècle. Le château du Puy, construit au XVIIe et XVIIIe siècle, se dresse au coeur d'un magnifique parc, agrémenté de charmilles et d'étangs. La chapelle est inscrite aux M.H. depuis le 16/07/1984, le domaine depuis le 3/10/1988. Le château du Puy, la chapelle et son retable sont du XVIIe siècle        Éléments protégés MH  : inscription par arrêté du 16 juillet 1984. Le logis ; la maison du gardien ; les deux pavillons d'entrée ; les façades et les toitures des autres bâtiments des communs ; la grande et la petite cour d'arrivée ; la charmille ; la petite allée ; le potager ; les pelouses ; le canal ; le jardin ; le petit jardin formant digue ; l'étang ; la grande allée ; la vieille allée : inscription par arrêté du 3 octobre 1988.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"A Ruillé Froid Fonds le château du Puy                                                            GPS : 47° 54' 3,6\" Nord, 0° 35' 57,12\" Ouest","gps":"47° 54' 3,6\" Nord, 0° 35' 57,12\" Ouest","images":["../image/image_53/53_Puy_53_1.jpg"]},"Consult_chateau_formulaire0442":{"id":"Consult_chateau_formulaire0442","dept":"53","canton":"Cossé-le-Vivien","commune":"Cossé le Vivien","nom":"Robert_Tatin","type":"Musée","periode":"XX","histoire":"Le Musée ROBERT-TATIN est un « environnement d'art » créé par l'artiste Robert Tatin, entre 1962 et 1983, sur le lieu-dit La Frénouse à Cossé-le-Vivien, C'était au début, une maison ancienne, aménagée par l'artiste pour y vivre avec sa femme. Au fil des ans, il a construit un domaine décoré de grandes sculptures en ciment coloré, en s'inspirant notamment de ses voyages et des courants artistiques du passé. L'Art naïf y est largement représenté.Le site regorge d'ailleurs de références aux religions du monde, à l'histoire et aux grands artistes. Robert Tatin l'avait imaginé comme un lien entre les civilisations de l'Orient et celles de l'Occident. Depuis,le site est devenu un musée ouvert à la visite après la mort de l'artiste. Des salles d'exposition présentent ses peintures tandis que des espaces sont laissés aux artistes actuels. A l'extérieur, vous pourrez admirer la Porte du Soleil, le Dragon, la Porte des Géants, etc. La commune est propriétaire du Musée, le musée Robert Tatin, palais peuplé de sculptures colossales; l'artiste vous propose de pénétrer dès l'allée des Géants : une allée de 19 statues représentant les repères de l'artiste dans l'aventure humaine. De Vercingétorix à Paul Gauguin en passant par jules Verne et André Breton, autant de références pour un artiste qui a toujours refusé d'appartenir à un mouvement artistique. L'allée des géants mène au coeur du musée, une structure labyrinthique où l'on découvre le jardin des méditations. Le dragon, avec ses 4 m de hauteur constitue l'une des plus imposantes statues du lieu.","architecture":"ROBERT-TATIN, tout au long de sa vie, Robert Tatin a accumulé expériences et connaissances qui font de lui un artiste bâtisseur à la créativité exceptionnelle. En 1962, à l'âge de soixante ans, il s'installe définitivement, avec sa femme Lise, sur sa terre natale en Mayenne, au lieu-dit La Frénouse, près de Laval, où il a érigé la plus spectaculaire de ses uvres. À dater de cet instant et à partir de l'antique « Maison des Champs » où il vit, toute son énergie et son savoir sont voués à modeler une sculpture monumentale en harmonie avec le paysage bocager qui l'accueille. Autour de cette maison, il réalise pendant 21 ans (jusqu'à sa mort en 1983) l'uvre d'aboutissement de sa carrière et de sa vie, l'étrange musée de Robert Tatin ». Devenu communal dès 1967, puis « musée contrôlé » par le cabinet d'André Malraux en 1969, année de son inauguration, il a, depuis 2002, le statut de « musée de France ».","habitants":"Robert Tatin\r\n        \"","divers":"A Cossé le Vivien  le musée de Robert-Tatin                                              GPS : 47° 55' 59,08\" Nord, 0° 53' 48,02\" Ouest","gps":"47° 55' 59,08\" Nord, 0° 53' 48,02\" Ouest","images":["../image/image_53/53_Robert_Tatin_1.jpg","../image/image_53/53_Robert_Tatin_2.jpg","../image/image_53/53_Robert_Tatin_3.jpg"]},"Consult_chateau_formulaire8a1f":{"id":"Consult_chateau_formulaire8a1f","dept":"53","canton":"Evron","commune":"Saint-Ouën des Vallons","nom":"Roche_Pichemer","type":"Château","periode":"XVI-XIX","histoire":"ROCHE-PICHEMER, fief mouvant de La Chapelle Rainsouin, auquel est attaché, au moins dès le XVe siècle, la seigneurie paroissiale de Saint-Ouën.  Propriété du comte de Ozouville.","architecture":"ROCHE-PICHEMER,  Certainement construit au XVIe siècle par Louis du Plessis, le château comprend un corps de logis rectangulaire, avec pavillon carré à chaque angle de la façade, en avant-corps. Au centre, une porte à plein cintre, pilastre et fronton triangulaire, une fenêtre géminée au premier étage, une lucarne aussi à double baie, surmontée d'un fronton cintré et de fleurons dans les combles, s'étagent, appareillés en assises de granit. Le même motif de décoration se reproduit dans les autres ouvertures de la façade et des pavillons, sauf que les frontons sont triangulaires et moins massifs. Un corps de logis faisant retour d'angle, construit postérieurement dans un style plus simple, a été harmonisé à l'ensemble depuis 1840. La façade nord conserve une tour ronde à l'angle nord ouest, on suppose qu'avant la construction de l'aile Est, il en existait une seconde, symétrique. La chapelle est mentionnée en 1630, une demande de conservation est faite en 1804; depuis elle a été installée dans le château il domine un ravin au fond duquel coule la rivière des Deux-Évailles.  De style Renaissance, il a été construit du XIIIe au XVIe siècle. Il est composé de 2 corps de logis, encadrés par 3 pavillons et d'une chapelle remaniée au XIXe siècle. Éléments protégés MH : les façades et les toitures du château et des trois pavillons ; la fuie ; les pièces suivantes du château avec leur décoration, au rez-de-chaussée le salon, la salle à manger, la chambre rouge et la petite salle à manger ; au premier étage la bibliothèque : classement par arrêté du 17 septembre 1973. Les façades et les toitures des communs du château : inscription par arrêté du 17 septembre 1973.","habitants":"Comte d'Ouzouville\r\n        \"","divers":"a Saint-Ouën des Vallons le château de Roche Pichemer GPS : 48° 09 59\" Nord, 0° 32 10\" Ouest","gps":"48° 09 59\" Nord, 0° 32 10\" Ouest","images":["../image/image_53/53_Roche_Pichemer_1.jpg","../image/image_53/53_Roche_Pichemer_2.jpg","../image/image_53/53_Roche_Pichemer_3.jpg","../image/image_53/53_Roche_Pichemer_4.jpg","../image/image_53/53_Roche_Pichemer_5.jpg"]},"Consult_chateau_formulaire6679":{"id":"Consult_chateau_formulaire6679","dept":"53","canton":"Evron","commune":"Mézangers","nom":"Rocher_53","type":"Château","periode":"XVe-XVIIIe","histoire":"ROCHER  il existait au moyen âge  deux châteaux situé à quelque distance l'un de l'autre, celui de Mézangers,  siège de la seigneurie de ce nom. et du Rocher   relevant de la châtellenie de Sainte Suzanne, est cité en 1282 sous le nom de Rocher, avec Jean le Maire, seigneur du Rocher, le fief au seigneur du Rocher en 1446, en 1477 Charles le Maire époux  de marguerite de Favières et en 1498 Jean de Bouillé rend hommage pour le Rocher à Marguerite de Lorraine dame de Sainte-Suzanne. En 1512 le fils de  Jean du Bouillé hérite du château; En 1665 Eléonore de Bouillé duchesse du Lude vent le Rocher à son beau frère le duc de Roquelaure et la baronnie du Rocher en 1741. La terre, fief, seigneurie et baronnie du Rocher, en 1775. Au XVIIIe siècle, Benoît Eynard, grand maître des Eaux et Forêts de la généralité de Tours, acquéreur du Rocher le 18 avril 1728, aménage de nouveaux appartements à la suite de l'aile nord, les jardins,. Il procède au nivellement du terrain et veille à l'exploitation du domaine, pour laquelle il fait bâtir les immenses greniers dont parle le châtelain du château de Bourgon, son voisin. L'entrée du château, autrefois située au sud, étroite et incommode, est aménagée de manière à mieux faire valoir la partie centrale. Après le décès  en 1771 de madame de la Ferronay  acquièrent le Rocher qui passe ensuite aux Plessis d'Argentré par succession le château est transmis aux le Gonidec  de Tressan, aux Couasnon.     À la fin du XIXe siècle, des restaurations sont réalisées par le comte Horric de Beaucaire.  Le château du Rocher appartient à la famille De Chavagnac, propriétaire actuel.                                                              Manoir de CRUCHET du XVe siècle transformé en chambre d'hôtes par la famille Marie-Thérèse et Léopold Nay.","architecture":"ROCHER, il est de style Renaissance. Un château primitif antérieur au XIVe siècle a peut être laissé des vestiges vers l'angle où se joignent les deux corps de bâtiments actuels. on élève un manoir plus habitable, visible encore à l'ouest et au nord, sur les étangs, avec ses tours multiples. Il date du XIIIe et XVe siècle.  Le château du Rocher est une demeure qui se reflète avec charme dans un étang. Construite en granit, elle est éclairée de fenêtres hautes et cantonnée de tours à toits pointus. Une galerie de cinq arcades en anse de panier, animant la gracieuse façade Renaissance, relie l'ancien corps de logis du XIIIe siècle à la chapelle du château du XIVe siècle. Il possède de beaux Jardins à la Française  à l'extérieur des façades. Connaissez-vous la dame légendaire de la Roche-Pichemer, Catherine-sans-pitié  Ce n'était pas une \"bonne dame\". Entre autres méfaits, on l'accuse d'avoir attachés ensemble un homme et un buf, pour voir lequel survivrait à l'autre, et les avoir laissés mourir de faim. Elle a été justement condamnée, pour des siècles, à des courses nocturnes sur un char de feu pendant les longues nuits d'hiver. Comme il existe plusieurs Catherine dans les dames de la Roche-Pichemer, il serait téméraire de dire laquelle fut sans pitié. En 1650, Eléonore de Bouillé, héritière du Rocher, épouse dans la chapelle, Henri de Daillon, marquis d'Illiers, duc du Lude. Grande chasseresse, cette femme, au caractère bien trempé, qui  est entrée dans la légende du Maine sous le nom de \"la dame verte\". Elle hanterait les lieux apparaissant vêtue de vert, aux jeunes mariés.   Le château de Mézangers est classé aux M.H. depuis le 13 août 1963.","habitants":"Famille de Bouillé\r\n        \"","divers":"a  Mézangers le château du Roche  manoir de Cruchet grav 5.                      GPS : 48° 11' 22,92\" Nord, 0° 26' 31,92\" Ouest","gps":"48° 11' 22,92\" Nord, 0° 26' 31,92\" Ouest","images":["../image/image_53/53_Rocher_53_1.jpg","../image/image_53/53_Rocher_53_2.jpg","../image/image_53/53_Rocher_53_3.jpg","../image/image_53/53_Rocher_53_4.jpg","../image/image_53/53_Rocher_53_5.jpg"]},"Consult_chateau_formulaire3354":{"id":"Consult_chateau_formulaire3354","dept":"53","canton":"Azé","commune":"Saint-Sulpice,","nom":"Rongère","type":"Château","periode":"XVIe-XVIIIe","histoire":"RONGERE, Macé de Quatrebarbes avait acheté en 1293 le domaine de La Rongère, à Hardouin de Fougères. Cette famille se transmettra La Rongère jusqu'au début du XVIIIe siècle. Le roi Louis XIV tenait en estime René V de Quatrebarbes pour avoir défendu la cause royale durant la Fronde en Anjou. Cette estime s'est transmise à son fils Hyacinthe, pour lequel il érige en 1684, la terre de La Rongère en marquisat. Au XVIIIe siècle, faute d'héritier masculin, La Rongère passe par mariage à la famille de Turbilly, puis de Montecler et à celle de Chavagnac, en 1784. La Rongère traverse la Révolution sans dommage grâce à la présence en ses murs de Mme de Montecler, revenue de l'étranger où elle avait accompagné son mari parti en émigration, pour défendre ses biens personnels dont elle demande la levée du séquestre le 27 juin 1792. Propriété de Jacques de Chavagnac.","architecture":"RONGERE,le château de la Rongère est édifié en plusieurs phases : dabord le corps de logis principal entre 1545 et 1571 : puis, en arrière deux corps de bâtiment dans des axes différents, lun autour de 1675, lautre au XVIIIe siècle. Lintérêt du site est lensemble de jardins conçus en fonction du château, en utilisant les pentes du terrain: un premier ensemble de terrasses en trois niveaux descendant dans laxe du château du XVIe siècle crée, avec des bassins et des pavillons, une perspective à la Le Nôtre, sur le côté, légèrement décalés par rapport au bâtiment, deux terrasses échelonnées rassemblent en quatre compartiments carrés les éléments principaux des jardins classiques : labyrinthe, allées de grands arbres en berceau, charmilles, la Rongère, dont la construction a débuté au XVIe siècle, a fortement été remanié au XIXe siècle.  il comprend trois corps de bâtiments d'époques et d'élévations différentes.La façade principale, du XVIIe siècle, cantonnée de deux pavillons carrés. Un corps du XVIIe siècle, en retour vers le nord, s'élève sur troix niveaux, plus bas que ceux du premier logis. Le troisième corps, du XVIIIe siècle, est moins élevé. Les toits ont été modifiés au XIXe siècle.  L'entrée de la cour d'honneur est encadrée de deux pavillons, la chapelle et un porche menant vers les communs. Elle est bordée par l'orangerie disposée en retour d'équerre par rapport au logis. Le parc est un des éléments les plus remarquables du château de la Rongère. Présentant les caractéristiques d'un jardin régulier agrémenté d'un bassin rond, d'un labyrinthe, de charmilles et salles de verdure, sa construction date du XVIe et XVIIe siècle. C'est un ancien château fort. Vous pourrez y découvrir son beau parc à la Française. On accède au château par une belle et longue allée de frênes. Le château de la Rongère appartient aujourd'hui à une société privée. Il est construit sur trois niveaux. La visite du château est libre,  est inscrit et classé aux M.H. depuis 1991.","habitants":"Famille de Turbilly\r\n        \"","divers":"a St-Sulpice le château de Rongère                                              GPS : 47° 54' 32\" Nord, 0° 43' 00\" Ouest","gps":"47° 54' 32\" Nord, 0° 43' 00\" Ouest","images":["../image/image_53/53_Rong%c3%a8re_1.jpg","../image/image_53/53_Rong%c3%a8re_2.jpg","../image/image_53/53_Rong%c3%a8re_3.jpg","../image/image_53/53_Rong%c3%a8re_4.jpg"]},"Consult_chateau_formulairea4eb":{"id":"Consult_chateau_formulairea4eb","dept":"53","canton":"Cossé-le-Vivien","commune":"Ballots","nom":"Roseray","type":"Château","periode":"XVIIIe","histoire":"ROSERAY, en 1675, le Roseray, fief d'un rameau de la famille de Farcy, conseillers au parlement de Bretagne, les Farcy du Roseray, . Jacques de Farcy et son épouse Isabelle Pineau, tous deux de confession protestante, abjurèrent le 5 novembre 1685, auprès de Monseigneur Fléchier, évêque de Lavaur. Le 16 mars 1691, l'évêque d'Angers leur permit de faire élever dans leur château, une chapelle qui existe toujours. Le château a perdu tout aspect défensif afin de devenir une demeure avec un raffinement qui rejoint celui des hôtels urbains. Les salons ont conservé leurs boiseries et parquets du XVIIIe siècle et leurs cheminées à la française. Le parc est planté d'arbres en quinconce et agrémenté de charmilles.","architecture":"ROSERAY, le domaine au XVIIe siècle appartient aux Farcy du Roseray, fief d'un rameau de la Famille de Farcy, conseillers, au Parlement de Bretagne, se composait de maisons, cours closes de murailles, jardins, avenue, bois, taillis, métairie et closerie, constituant le domaine agricole dont le château est le centre. Celui-ci pouvant remonter au XVe siècle était une demeure austère encore défensive. Au XVIIe siècle, les Farcy du Roseray, comme une bonne partie de la noblesse de la région, appartenaient à la religion réformée. Le 16/03/1691, sur l'autorisation de l'évêque d'Angers, une chapelle est élevée.\r\nÉléments protégés MH : le château, avec les anciennes étables, les douves, les grands tracés subsistants du parc (dont l'allée verte) : inscription par arrêté du 6 février 1989.","habitants":"Famille de Farcy du Roseray\r\n        \r\n        \"","divers":"A Ballots le château de la Roseray                                             GPS : 47° 55' 02\" Nord, 1° 04' 29\" Ouest","gps":"47° 55' 02\" Nord, 1° 04' 29\" Ouest","images":["../image/image_53/53_Roseray_Ballots_1.jpg"]},"Consult_chateau_formulaire1b84":{"id":"Consult_chateau_formulaire1b84","dept":"53","canton":"Meslay-du-Maine","commune":"Saulges","nom":"Saulges_Soulgé","type":"Château","periode":"XVI","histoire":"SAULGES, la seigneurie de Saulges fut acquise en 1556, par Jean de Thévalle, le dernier et le plus célèbre de ce nom, qui réunit ce nouveau domaine à sa terre de Thévalle, dont le château féodal s'élève tout près de là, au-dessus du cours de lErve. Il laissa pour unique héritière Jacqueline de Thévalle, dont, il fallut, à lépoque de son mariage (1597) avec Charles de Maillé-Brezé, prouver par témoignage la légitimité, car les registres paroissiaux de Chémeré-le-Roi avaient été brûlés par les bandes de huguenots anglais qui avaient dévasté le pays en 1592. Urbain de Maillé-Brézé, marquis de Brézé, issu de ce mariage, devint, par ses mérites personnels et surtout par la protection du cardinal de Richelieu, dont il avait épousé la sur, maréchal de France et chevalier des ordres du roi.\r\nArmes de la maison de Condé à partir de 1588. Quand Claire-Clémence de Maillé-Brézé, fille du maréchal, eut atteint lâge de treize ans, en 1641, le cardinal-ministre l'imposa comme épouse à Louis II de Bourbon-Condé, qui, deux ans plus tard, était le vainqueur de Rocroi, et qui, par une série de victoires, est devenu dans lhistoire le Grand Condé.","architecture":"SAULGES, par son mariage avec Claire-Clémence de Maillé, le futur héros était devenu seigneur de Thévalle, seigneur de Saulges et patron temporel de cette église. Ce domaine était bien peu de chose dans l'immense fortune d'un prince du sang. Condé y fit cependant, dans plusieurs circonstances, acte de maître et seigneur, non en personne, mais par procureur. Puis, au temps où exilé pour ses multiples révoltes contre Mazarin et la cour, il voyait tous ses biens saisis, la terre de Thévalle et celle de Saulges, son annexe, l'étaient elles aussi. Mais le prince rentra en grâce à la cour, dans la jouissance de ses biens confisqués et fut depuis, jusqu'à sa mort, seigneur de Thévalle et de Saulges. Henri Jules de Bourbon-Condé, fils du grand Condé, était seigneur de Saulges ; il était lui aussi grand maître de France.","habitants":"Famille de Thevalle\r\n        \"","divers":"A Saulges le château de Saulgé     Saulgé grav 3-5                       Plessis grav-6                                                                               Vieux -logis grav-7                                                                         Gps 47° 59' 00\" nord, 0° 24' 16\"  ouest","gps":"","images":["../image/image_53/53_Saulges_Saulg%c3%a9_1.jpg","../image/image_53/53_Saulges_Saulg%c3%a9_2.jpg","../image/image_53/53_Saulges_Saulg%c3%a9_3.jpg","../image/image_53/53_Saulges_Saulg%c3%a9_4.jpg","../image/image_53/53_Saulges_Saulg%c3%a9_5.jpg","../image/image_53/53_Saulges_Saulg%c3%a9_6.jpg","../image/image_53/53_Saulges_Saulg%c3%a9_7.jpg"]},"Consult_chateau_formulairea2cd-2":{"id":"Consult_chateau_formulairea2cd-2","dept":"53","canton":"Cossé-le-Vivien","commune":"Senonnes","nom":"Senonnes","type":"Forteresse","periode":"Xv-XVI","histoire":"SENONNES, la seigneurie de Senonnes relevait de Pouancé à Chargé, de 9 et 78 truelles d'avoine du devoir et, de 40 jours de garde au château. En 1570, Jeanne Deffay, Veuve de François Le Poulchre, était créancière de Jean du Boisjourdan. Antoine du Boisjourdan, fils du précédent consentit envers François Le Poulchre, sans doute fils de la dame veuve de la Benestaie, une obligation de 1153 écus, et il s'acquitta le 6/08/1592. Néanmoins, Jean-Marquis de la Motre, héritier de la Demoiselle de Sévigné, elle-même héritière des Le Poulchre, réclamait, en 1623, le montant de l'obligation à François du Boisjourdan, fils du souscripteur. Mais ce dernier produisit la quittance.  les seigneurs de 1332 à 1465 famille des  Tinténiac, de 1520 à 1616 Famille des les Poulchre de 1568 la famille de la Motte-Baracé, : et Cyr Nicolas du Crest de Lorgerie. Un contrat fut passé à cet effet pour 9 années de 1785 à 1794. A dater de 1785, ce fut donc Cyr Nicolas du Crest de Lorgerie qui commanda : Procureur, Sénéchal, Notaire, Greffier, Gardes attachés à la châtellenie de Senonnes. Le marquis et la marquise sont guillotinés à Paris le 7 avril 1794 ;","architecture":"SENONNES, n'est pas aussi ancien qu'on pourrait le supposer puisque la décoration comporte les armoiries d'Adrienne de Salles, probablement veuve alors. On n'y a employé que le schiste ardoisier du pays qui ne se prête à aucun travail d'art. Deux étagements d'ouvertures, portes, fenêtres et lucarnes, dans l'angle Sud-Ouest de la cour, ont seuls quelque caractère. Il existait un mur d'enceinte dont une tour, maintenant isolée, faisait partie. Avec son terrain d'assiette archéologique, le château de Senonnes a été classé aux M.H. le 17/02/1988.","habitants":"Famille de  François du Boisjourdan\r\n        \"","divers":"Senonnes   GPS : 47° 47' 54,6\" Nord, 1° 12' 10,44\" Ouest","gps":"47° 47' 54,6\" Nord, 1° 12' 10,44\" Ouest","images":["../image/image_53/53_Senonnes_1.jpg","../image/image_53/53_Senonnes_2.jpg","../image/image_53/53_Senonnes_3.jpg","../image/image_53/53_Senonnes_4.jpg"]},"Consult_chateau_formulaireaca5":{"id":"Consult_chateau_formulaireaca5","dept":"53","canton":"Cossé-le-Vivien","commune":"Simplé","nom":"Simplé","type":"Château","periode":"XV-XIX","histoire":"plusieurs châteaux à Simplé de la Bouchefollière du XVIe siècle\r\n la Ferronnière du XVIIIe siècle.                                                                     la FERRONNIERE : demeure : le 2 pluviose II partages de la succession Jallot-Lemonnier,  Jean Poupart cultivateur mari de Marie Jallot demeurant à la Ferronnière à Simplé près de Craon.                                                                      BOURG-L'EVEQUE,  la terre du Bourg-l'Évêque relevait autrefois du chapitre de la cathédrale d'Angers, d'où son nom. Cependant au XVe siècle, le petit Bourg-l'Évêque devient une seigneurie qualifiée de châtellenie. Le premier château est construit à cette époque par la famille de Saint Melaine. En 1722, il est acquis par Jacques du Mans de Chalais, conseiller en la Grand Chambre du parlement de Paris et abbé de Barzelles. Après lui, le Bourg l'Évêque passe à son frère, Michel-Jean du Mans de Chalais.","architecture":"BOURG-L'EVEQUE, la demeure, des XVe-XIXe siècle dotée avant la Révolution d'une très riche bibliothèque et de belles tapisseries, est envahie le trois septembre 1795 et cinq de ses défenseurs y trouvent la mort. La demeure fut reconstruite au XIXe siècle dans un style d'une grande austérité, seulement rompue par la belle rotonde reposant sur des colonnes, elle n'en possède pas moins beaucoup de charme.","habitants":"Famille de Saint Melaine\r\n        \"","divers":"à Simplé de la Bouchefollière grav-1\r\n la Ferronnière grav-5                                                                             et Bourg l'évêque  grav-2-3-4                                                  Simplé  Gps 47° 53' 15\" nord, 0° 51' 05\" ouest","gps":"","images":["../image/image_53/53_Simpl%c3%a9_1.jpg","../image/image_53/53_Simpl%c3%a9_2.jpg","../image/image_53/53_Simpl%c3%a9_3.jpg","../image/image_53/53_Simpl%c3%a9_4.jpg","../image/image_53/53_Simpl%c3%a9_5.jpg"]},"Consult_chateau_formulairea8dc":{"id":"Consult_chateau_formulairea8dc","dept":"53","canton":"Azé","commune":"Argenton Notre Dame","nom":"Sionnière","type":"Vestiges_Château","periode":"XIII-XVII","histoire":"SIONNIERE, la châtelaine en profita alors pour remettre certains droit féodaux aux curés « afin que ceux-ci prient plus volontiers pour elle ». Ce fut ainsi que le seigneur de la Sionnière reçut le titre de la paroisse d'Argenton. En 1776, Hyacinthe-Roger de Quatrebarbes obtenait des lettres patentes qui réunissaient les justices d'Argenton, de la Sionnière et des châtellenies de Châtelain et de Romfort. Argenton relevait alors du marquisat de Château-Gontier. Orné au centre d'un fronton triangulaire, il est accolé, sur chaque extrémité d'un pavillon et d'une aile en retour. Un vaste perron s'étend au-devant de la demeure qui est entourée de pelouses, de prairies et de bosquets. Les armes des Quatrebarbes se situent au fronteau du château de la Sionnière. Les seigneurs   en 1450 à 1605  la famille de Possart. La Sionnière est devenue la propriété de la famille du Boul à la suite du mariage de Charles du Boul et de Renée Possart, veuve, en 1655.  Charles du Boul, 1608, 1645  Michel du Boul, sieur de Grigné, 1655, veuf d'Anne Le Gué, 1675, 1679 . Famille de  Quatrebarbes de 1675 à 1794  Pendant la Révolution, malgré une vente nationale qui ne fut qu'un moyen de sauver l'héritage de cette famille, le domaine de la Sionnière est resté la propriété et la demeure des Quatrebarbes. Le château et ses caves subirent le pillage des bataillons de la Nièvre et du Calvados qui y logeaient, le 11 septembre 1794.","architecture":"SIONNIERE,  la construction du château date du XVIIe siècle. Il se situe à 600 mètres de la commune. Michel Possart, sieur de la Sionnière acheta la seigneurie, en 1460. Orné au centre d'un fronton triangulaire, il est accosté, à chaque extrémité d'un pavillon et d'une aile en retour. Un vaste perron s'étend au-devant de la demeure qui est entourée de pelouses, de prairies et de bosquets. Sa veuve, née Rossignol, fit tenir des assises sur un terrain dépendant du fief curial, en 1480. Mais comme elle avait négligé de payer au curé de la paroisse « les cousterets » de vin et le blé qu'elle lui devait sur la Sionnière et sur l'Hommée, on lui dit reconnaitre ces devoirs qu'on évalua approximativement à six boisseaux de froment.","habitants":"famille de Quatrebarbes\r\n        \r\n        \"","divers":"Forteresse de Sonnière.                                                               GPS : 47° 47' 00\" Nord, 0° 34' 54\" Ouest","gps":"47° 47' 00\" Nord, 0° 34' 54\" Ouest","images":["../image/image_53/53_Sionni%c3%a8re_1.jpg","../image/image_53/53_Sionni%c3%a8re_2.jpg"]},"Consult_chateau_formulaire2032":{"id":"Consult_chateau_formulaire2032","dept":"53","canton":"Saint-Berthevin","commune":"Saint-Berthevin","nom":"St_Berthevin","type":"Château","periode":"XVII","histoire":"Trois châteaux à St-Berthevin ; châtelier, Fenardière et Corbusson.                                                                          CHATELIER, le Châtelier est une propriété privée, lactuel propriétaire est Mr De Chalains. La propriété est constituée de plusieurs bâtiments édifiés à différentes époques, le bâtiment avec la tour remonte au XIVe siècle, le logis date du XVIIe siècle, puis remanié au XIXe siècle. Le parc du château du Chatelier est inscrit au pré-inventaire des jardins remarquables.                                                               La seigneurie dépendait du comté de Laval, par la châtellenie de Saint-Berthevin. La chapelle est au nombre de celles dont on demande la conservation en l'an XII. Un moulin existait en 1407. Il y avait au Châtelier un poste républicain pendant la Révolution française. Hayer qui en avait le commandement écrit au Comité révolutionnaire le 10 floréal an II qu'il a été nommé par le Général Chabot : « Je suis fâché, dit-il, si vous ne vous entendez pas ensemble. » Le 9 frimaire an III, le poste découvre derrière le four, 2 paquets de papiers, qui sont remis au citoyen Pontavice, commandant à Laval. A la fin du XIXe siècle, le château du Châtelier devient la maison de campagne du Grand-Séminaire de Laval. La ferme en a été distraite en 1873.","architecture":"CORBUSSON, le château de Corbusson appartenait aux sires de Mathefelon aux XIVe et XVe siècles. Puis, y demeure Jean Hardy, sieur de la Bellangerie, clerc en 1743. En 1966, cette propriété est occupée par lassociation Chanteclair qui accueille des enfants et des jeunes en difficulté. Aujourd'hui le château est un hôtel de charme. Le parc du château de Corbusson est inscrit au pré-inventaire des jardins remarquables. Ouvert au public pour les journées du patrimoine.                                  FENARDIERE Francis Rondeau, lun des médecins de la Maison médicale de St-Berthevin, propriétaire du site, a été très heureux daccueillir plus de 500 personnes dans le parc, en compagnie de Roland Tonnelier et de Guy Lenain.","habitants":"Mr De Chalains\r\n        \r\n        \"","divers":"Trois châteaux à St-Berthevin ; châtelier grav 1-2,               Fenardière grav-4 et Corbusson grav-3. GPS : 48° 04' 06\" Nord, 0° 49' 33\" Ouest","gps":"48° 04' 06\" Nord, 0° 49' 33\" Ouest","images":["../image/image_53/53_St_Berthevin_1.jpg","../image/image_53/53_St_Berthevin_2.jpg","../image/image_53/53_St_Berthevin_3.jpg","../image/image_53/53_St_Berthevin_4.jpg"]},"Consult_chateau_formulaire4327":{"id":"Consult_chateau_formulaire4327","dept":"53","canton":"Meslay-du-Maine","commune":"Saint-Brice","nom":"St_Brice_53","type":"Château","periode":"XII-XIII-XVIII","histoire":"Cinq châteaux à Saint-Brice; Agets, Bellebranche, Forges, Pressoir et Cousinières.                                                                                                    SAINT-BRICE, les vestiges sont visibles à 200 mètres du bourg de Saint-Brice, sur le bord de la Taude, au point de rencontre de ce cours d'eau avec le chemin conduisant à Saint-Loup. Il s'agissait d'une construction militaire élevée sur l'emplacement du donjon détruit en 1173 par Maurice II de Craon, qui soutenait contre les seigneurs d'Anjou et du Maine du parti français la cause de son suzerain Henri II d'Angleterre. Le château de Sablé, à la prise duquel les moines de l'Abbaye de Bellebranche perdirent les effets précieux et les approvisionnements qu'ils y avaient déposés, et le château de Saint-Brice dont le voisinage les rendait continuellement victimes des déprédations de la garnison, tombèrent, au pouvoir des Anglais, le premier à une date inconnue, le second, en 1358. Bertrand du Guesclin les avait reconquis lui-même, vers la fin de 1361. Il ne reste que des vestiges du château de Saint-Brice qui fut détruit pendant la guerre de Cent Ans.                                                                             Le PRESSOIR,  la menuiserie de Bichot a  était entièrement restauré, ce joli manoir il y a quelques années. Sur la façade XVIIIe siècle, les fenêtres mouton et gueule de loup cintre surbaissé ont été restituées ainsi quune porte-fenêtre avec imposte surbaissée. Sur la façade datant du XVIIe siècle, des châssis à meneau bois ont été fabriqués et posés par nos compagnons menuisier.","architecture":"BELLEBRANCHE, la Tour Saint-Michel du XIIe siècle est érigée dans un paysage de paix, entouré détangs, retiré des bruits du monde, offre un cadre de vie prestigieux et rare. Récemment restaurée dans le total respect de son architecture d'origine, la Tour Saint-Michel est un îlot de sérénité, mettant en valeur la pureté de larchitecture cistercienne et un art de vivre raffiné dans un décor élégant, épuré, chaleureux et confortable. En ouvrant ce lieu, Claudine et Cyril le Tourneur dIson souhaitent partager un peu de leur univers, lié au voyage et à la photographie. Aussi, la Tour Saint-Michel est-elle un prétexte dexposition permanente où chaque photo exposée peut être acquise par ceux qui le désirent.                                                                                                                   \r\nCOUSINIERES, le logis comprend deux bâtiments d'habitation. La maison Louis XV, construite en 1754, contient un décor de boiseries. Le vieux logis proprement dit fut construit entre le XIIe et le XIIIe siècle. C'est un bâtiment rectangulaire avec une tour de défense au pignon sud et un grand colombier contre les cheminées. C'est la maison forte classique pour une exploitation agricole, construction primitive. Ce bâtiment comportait au rez-de-chaussée une cave avec pressoir et une écurie ; au premier étage une grange et une pièce. Le chartrier a été construit par Julien François Couppel pour les besoins de sa charge. Façades et toitures, escalier intérieur avec sa rampe en bois, salon et salle à manger au rez-de-chaussée ainsi que deux chambres au premier étage avec leur décor de boiseries du bâtiment Louis XV  : inscription par arrêté du 21 février 1974.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \"","divers":"Cinq châteaux à Saint-Brice grav 4-5; Agets grav-1, Bellebranche grav 2-3-4, Forges grav -9, Pressoir-7 et Cousinières grav-8. GPS : 47° 51' 35\" Nord, 0° 26' 26\" Ouest","gps":"47° 51' 35\" Nord, 0° 26' 26\" Ouest","images":["../image/image_53/53_St_Brice_53_1.jpg","../image/image_53/53_St_Brice_53_2.jpg","../image/image_53/53_St_Brice_53_3.jpg","../image/image_53/53_St_Brice_53_4.jpg","../image/image_53/53_St_Brice_53_5.jpg","../image/image_53/53_St_Brice_53_6.jpg","../image/image_53/53_St_Brice_53_7.jpg","../image/image_53/53_St_Brice_53_8.jpg","../image/image_53/53_St_Brice_53_9.jpg"]},"Consult_chateau_formulairee504":{"id":"Consult_chateau_formulairee504","dept":"53","canton":"Azé","commune":"St-Denis d","nom":"St_Denis_Anjou","type":"Château","periode":"XIX","histoire":"BEAUMONT ou Folie de la Bouqutière, ce petit bâtiment est situé en lisière de forêt sur un domaine privé qui peut être visité lors des Journées européennes du patrimoine. Sa façade est ornée de deux niches et de quatre ouvertures, elle est accompagnée de deux fausses tours latérales et surmontée dun fronton avec médaillon gravé NG (Naveau Gruau). Ce château-folie construit entre 1829 et 1848, a été restauré en 2007. Auguste Naveau, marchand de draps, est né en 1807 à Saint-Denis-dAnjou. Son épouse Marthe Gruau y est née en 1800, fille dun ciergier (cirier). Propriétaires du domaine, ils sont inhumés à Saint-Denis-dAnjou en 1866 et 1875. Les Naveau sont alliés des Bouttier eux-mêmes alliés de la famille Bessonneau (corderies dAngers). En 1849, leur fille unique Joséphine se marie à 20 ans avec Eugène Richou, industriel de la meunerie. Ils habitent la Saulaie puis le château de la Maison Blanche, à Brain-sur-Longuenée. La famille Richou compte des marchands meuniers, banquiers, architectes, constructeurs de fermes, maires de leur commune, et est alliée des Raffray du Grand Saultray. Auguste Naveau et son épouse Marthe Gruau ont pu éventuellement souhaiter se mettre à la hauteur dune belle-famille illustre en bâtissant cette demeure, qui fut restaurée, en 2007, par la famille Beron.","architecture":"ROI-RENE,Le village actuel de Saint-Denis a été reconstruit à partir de cette époque, avec l'encouragement de Jeanne de Laval, duchesse d'Anjou, femme de René, la maison de la reine Jeanne, ainsi nommée en raison du royaume de Jérusalem et de Naples, est devenue la maison du roi René et du chapitre d'Angers (la maison du chapitre est l'actuelle mairie). le château de Saint-Martin possédait jusqu'à la Révolution française un puissant donjon dont, la maison du roi René et du chapitre d'Angers la maison du chapitre est l'actuelle mairie et chambres d'hôtes en Anjou.                                                                                                            BEAUMONT, bien quil ne soit pas classé M.H, seulement inscrit, le château a bénéficié dune restauration « dans les règles de lart », insiste Jean-Marie Chapin. À lintérieur, des salles de séminaire, une salle de billard français, un hammam, un jacuzzi, une salle de sport et dix chambres dhôtel.","habitants":"Famille Naveau\r\n        \"","divers":"trois châteaux à St-Denis d'Anjou grav-4, et de Beaumont grav-7  du Roi René  Grav 1-2-3   de Martigne grav-5 et de Morlière Grav-6     GPS : 47° 47' 27\" Nord, 0° 26' 28\" Ouest","gps":"47° 47' 27\" Nord, 0° 26' 28\" Ouest","images":["../image/image_53/53_St_Denis_Anjou_1.jpg","../image/image_53/53_St_Denis_Anjou_2.jpg","../image/image_53/53_St_Denis_Anjou_3.jpg","../image/image_53/53_St_Denis_Anjou_4.jpg","../image/image_53/53_St_Denis_Anjou_5.jpg","../image/image_53/53_St_Denis_Anjou_6.jpg","../image/image_53/53_St_Denis_Anjou_7.jpg"]},"Consult_chateau_formulaire5d08":{"id":"Consult_chateau_formulaire5d08","dept":"53","canton":"Azé","commune":"Saint Laurent des Mortiers","nom":"St_Laurent_Mortiers","type":"Manoir","periode":"XVIIIe","histoire":"JUQUAISE, au commencement, l'antique manoir de Brullon était construit autour des douves. Celles-ci étant un édifice militaire construit sur autorisation royale. Quelque temps après, le manoir n'est plus considéré comme confortable. Il est donc détruit et en lieu et place est construit, en 1746, le Logis que nous découvrons aujourd'hui (maison, communs et bâtiment d'exploitation). Depuis 1746, le Logis de la Juquaise n'a connu aucun remaniement. Il possède une architecture datant du XVIIIe siècle composée de fenêtres traversantes laissant entrer la lumière, de cheminées en tuffeaux, d'un grand escalier, de pilastres et d'un fronton en tuffeaux. Éléments protégés MH : le logis, chapelle, le terrain d'assiette de l'ancien logis et les douves, ainsi que les façades et les toitures des communs du XVIIIe siècle : inscription par arrêté du 18 mai 1993. La construction du Logis date du milieu du XVIIIe siècle. On y voit des monuments funéraires, qui datent de la seconde moitié du XVIIe siècle, dans la chapelle du XIXe siècle.","architecture":"JUQUAISE, il possède une architecture datant du XVIIIe siècle composée de fenêtres traversantes laissant entrer la lumière, de cheminées en tuffeaux, d'un grand escalier, de pilastres et d'un fronton en tuffeaux. Éléments protégés MH : le logis, la chapelle, le terrain d'assiette de l'ancien logis et les douves, ainsi que les façades et les toitures des communs du XVIIIe siècle : inscription par arrêté du 18 mai 1993. La construction du Logis date du milieu du XVIIIe siècle. On y voit des monuments funéraires, qui datent de la seconde moitié du XVIIe siècle, dans la chapelle du XIXe siècle. La construction du Logis seigneurial de la Juquaise est inscrit aux M.H. depuis 1993. Vous trouverez des chambres d'hôtes.","habitants":"Noirieux; Monsieur Jean-Claude Tête\r\n        \"","divers":"Saint-Laurent des Mortiers le château de Juquaise","gps":"","images":["../image/image_53/53_St_Laurent_Mortiers_1.jpg","../image/image_53/53_St_Laurent_Mortiers_2.jpg"]},"Consult_chateau_formulaire83c2":{"id":"Consult_chateau_formulaire83c2","dept":"53","canton":"Azé","commune":"Chémazé","nom":"ST_Ouen","type":"Château","periode":"XVe","histoire":"Trois châteaux à St- Ouen ,Chémazé, Montivent et Mollières .                                                                                SAINT-OUEN, à la fin du XVe siècle Guy Leclerc de Goulaine, abbé de La Roë depuis 1493, fait construire  un manoir de style Louis XII, composé d'un corps de logis desservi par un escalier à vis aménagé dans une tourelle hexagonale, toujours en place, que Guy Leclerc fait construire, à partir de 1505, un corps de logis. À cette date Guy Leclerc, abbé de l'abbaye de la Roë, devient aumônier de la reine, Anne de Bretagne. Il est évêque de Saint Pol de Léon en 1515, il résilie sa charge et se retire en 1521 dans son beau logis de Chemazé Guy Leclerc y décède en 1523. Le château de Saint-Ouen est demeuré la propriété de l'abbaye de La Roë jusqu'à la Révolution. Vendu comme bien national à un closier de Chemazé, À partir du XVIIe siècle, il est habité par le fermier général chargé de gérer les biens de l'abbaye,  vendu à  Julien Chevrollier, et   le 14 mars 1791, devenu par la suite, la propriété du comte de Sèze, celui-ci fit restaurer le château de Saint-Ouen et lui rendit sa beauté, qui fait disparaître le décor de crosses, fleurs de lys et croix. Le comte Henry de Sèze achète la bâtisse et en 1830 vendu à  Julien Chevrollier Il s'efforce de lui restituer sa splendeur en aménageant les abords et l'intérieur, en 1880, le comte Henry de Sèze achète la bâtisse et fait détruire les bâtiments de ferme jouxtant le château depuis 1951 le domaine appartient au vicomte Gabriel du Pontavice qui a restauré la chapelle et continue l'embellissement de l'édifice.","architecture":"SAINT-OUEN,  à la fin du XVe siècle  construction d'un manoir composé d'un corps de logis desservi par un escalier à vis aménagé dans une tourelle hexagonale. L'abbé Angot signala qu'il avait trouvé, parmi ses amis, Simon Hayeneuve, de dessiner et diriger l'exécution de la Tour carrée du château de Saint-Ouen-de-Chemazé. La tour carrée où circule l'escalier, si vaste et si riche, s'adapterait à un palais. Plusieurs écrivains, refusèrent de croire que cette belle oeuvre fut  celle d'un abbé de la Roë et préférèrent l'attribuer à la reine Anne de Bretagne. De  sa construction de 1505. on remarque surtout dans l'une des chambres, dont la cheminée au chiffre répété de Guy Le Clerc, est admirablement dessinée et sculptée. La large frise est surtout fouillée avec un soin et un art remarquable. Guy Le Clerc, se plut dans ce manoir abbatial, malgré ses attaches à la cour, et sa nomination à l'évêché de Léon. Deux ans avant sa mort, il s'y fixa définitivement et y mourut. Ses successeurs aimèrent eux aussi le château de Saint-Ouen-de-Chemazé. Quant les abbés furent des personnages absolument étrangers à la région et à leur bénéfice, Saint-Ouen fut délaissé, livré à un fermier général, puis vendu, nationalement,  Le château de Saint-Ouen de Chemazé est classé aux M.H. depuis le 13/12/1923, le logis et la tour sont classés le 4/05/1944, pour le pavillon Nord et la Chapelle.","habitants":"Famille de Guy Leclerc.                                                                     Comte de Sèze\r\n        \r\n        \"","divers":"Trois châteaux à St- Ouen grav 1-2-3, Chémazé grav 7, Montivent grav-6 et Mollières grav 4-5                                                      GPS : 47° 47' 30,52\" Nord, 0° 46' 18,86\" Ouest","gps":"47° 47' 30,52\" Nord, 0° 46' 18,86\" Ouest","images":["../image/image_53/53_St_Ouen_1.jpg","../image/image_53/53_St_Ouen_2.jpg","../image/image_53/53_St_Ouen_3.jpg","../image/image_53/53_St_Ouen_4.jpg","../image/image_53/53_St_Ouen_5.jpg","../image/image_53/53_St_Ouen_6.jpg"]},"Consult_chateau_formulaired99e":{"id":"Consult_chateau_formulaired99e","dept":"53","canton":"Loiron","commune":"Saint-Ouen des toits","nom":"St_Ouen_des_Toits","type":"Vestige Maison forte","periode":"XV","histoire":"Saint -OUEN des TOITS  Le château de Saint-Ouën-des-Toits, de style Renaissance, dont on attribue la construction à la Reine Anne. C'était une des dix châtellenies du Comté de Laval. le Château de Saint-Ouën-des-Toits est un ancien château fort, de style Renaissance, ayant appartenu en premier, aux Comtes de Laval. Il est construit sur les marches de Bretagne comme un grand nombre de châteaux. Sa position et ses fortifications étaient placées comme à lavant garde de la ville de Laval. Cette terre est livrée à la concurrence entre les Seigneurs de Laval et les Seigneurs de Mayenne. Guy XII de Laval acquiert le domaine en 1408. Lors de la Guerre de Cent Ans, la garnison du château, sous la conduite de Guillaume d'Aubert et dautres chevaliers, ne cesse de harceler les Anglais. En 1427, une troupe anglaise commandée par John Fastolf sempare du château. Le château est inadapté pour Falstof et « nest pas tenable ». Le château est démantelé. Le logis du château sera reconstruit après la guerre de Cent ans. Il ne reste de cette époque les ruines des remparts que lon découvre depuis le sentier de promenade à Saint-Ouën-des-Toits.","architecture":"Saint -OUEN des TOITS, lors de la grande charte de distraction en 1481, Olivier de la Chapelle, seigneur de Saint-Ouen, obtient de Guy XIV de Laval la réunion en un seul hommage lige de plusieurs seigneuries afin de réparer le préjudice que constitue la réunion au comté de Laval des seigneuries de Saint-Ouen et de Juvigné. Ces châtellenies qui jusque-là étaient dans la mouvance d'Ernée, sera à l'avenir membre du comté de Laval. Les sujets tenant fiefs et arrière-fiefs, tant du comté de Laval que de la seigneurie de Saint-Ouën et Juvigné, ne pourront être mis en cause ailleurs, que devant le sénéchal ou bailly du Comte de Laval. Les appels ne seront plus portés devant le juge du Maine mais directement au parlement de Paris. Les oppositions des officiers du Mans sont mises à néant. En 1388, on y trouve un chastel et une chastellenie.","habitants":"Famille des seigneurs du comté de Laval\r\n        \r\n        \r\n        \"","divers":"GPS : 48° 08' 18\" Nord, 0° 54' 16\" Ouest","gps":"48° 08' 18\" Nord, 0° 54' 16\" Ouest","images":["../image/image_53/53_St_Ou%c3%abn_Toits_1.jpg"]},"Consult_chateau_formulaire5d2d":{"id":"Consult_chateau_formulaire5d2d","dept":"53","canton":"Ernée","commune":"Saint Pierre des Landes","nom":"St_Pierre_Landes","type":"Château","periode":"XIXe","histoire":"Deux châteaux à Saint-Pierre des Landes; Mégaudais et Fontenailles.                                                                                            MEGAUDAIS, construit à la fin du XVIIe siècle pour Bertrand de Mégaudais, seigneur de Marolles, et sa femme Catherine de Langan. L'édifice, situé en bordure de la nationale 12, fut restauré en 1846, puis agrandi en 1895 pour la famille de Robien par Angier, architecte de Saint Brieuc. Le parc avec sa pièce d'eau, son avenue de châtaigniers et l'orangerie, est classé \"jardins remarquables\", réalisé par l'architecte-paysagiste André Edouard, mais aussi horticulteur, botaniste, théoricien et écrivain.                                                                                                                FONTENAILLES, château du 19e siècle dans son écrin romantique où nous vous accueillerons pour vos manifestations : mariages, réceptions, réunions familiales, séminaires et évènements en tous genres. transformé en hôtel restaurant , société de madame Josephine  Suen.","architecture":"MEGAUDAIS, la construction du château de Mégaudais date de la fin du XVIIe siècle, l'édifice de plan rectangulaire à trois niveaux  flanqués de pavillons carrés saillants aux angles avec toits à l'impérial et lucarnes, corps de logis d'entrée saillant plein cintre et lucarnes saillantes à galbes et imposante sur le toit le château a été restauré en 1846. Bien que privé et fermé au Public, le château de Mégaudais est visible de la route.                                                      FONTENAILLES  Le château de Fontenailles reconstruit au XIXe siècle, de plan rectangulaire à deux niveaux  lucarnes sur toit brisés, flanqués au centre de la façade d'une tour d'entrée saillante à trois niveaux toit à l'impériale  et de deux tourelles  au angles du corps central  toits en poivrières, flanqué de part et autre de prolongement de bâtiment d'un niveau avec lucarnes en façades.  Propose à la location dimmenses salles de réceptions, et dispose dune terrasse de 200m2.","habitants":"Famille de Bertrand de Mégaudais\r\n        \"","divers":"Deux châteaux à Saint-Pierre des Landes; Mégaudais grav_1-2   et Fontenailles grav 3-4-5 .                                   Mégaudais GPS : 48° 16'27\" Nord, 01° 01' 41\" Ouest","gps":"48° 16'27\" Nord, 01° 01' 41\" Ouest","images":["../image/image_53/53_St_Pierre_Landes_1.jpg","../image/image_53/53_St_Pierre_Landes_2.jpg","../image/image_53/53_St_Pierre_Landes_3.jpg","../image/image_53/53_St_Pierre_Landes_4.jpg","../image/image_53/53_St_Pierre_Landes_5.jpg"]},"Consult_chateau_formulaire1567":{"id":"Consult_chateau_formulaire1567","dept":"53","canton":"Evron","commune":"Sainte- gemmes le  Robert","nom":"Ste_Gemme_Robert","type":"Château","periode":"XVII","histoire":"COUR, la Cour date de 1237, avec le premier seigneur, Robert de Sainte-Jame, sergent Royal, qui exerçait des fonctions qui équivalent aujourdhui à celles dhuissier et dofficier de police judiciaire. La demeure passe aux Rivau et aux Champagné qui ont acquis par ailleurs vers 1680 la Cour de Sainte-Gemme. Le 8 mai 1732, Henry-François de Biars seigneur de lHommois, officier du régiment du roi, est propriétaire des lieux par son mariage avec Marie-Charlotte du Rivau. La terre de Sainte-Gemmes appartient à la famille de Baglion de Poitier à la fin du XIXe siècle. Originaires dItalie, les Baglioni étaient en 1480 les Maîtres de Pérouse. Le XXe siècle préserva le château des conflits mondiaux. Les propriétaires qui sy succédèrent apportèrent peu de modification, seule la tour descalier nord et le pont-levis ont disparu. Aujourdhui, Alain et Marie-Christine Levejac vous accueillent dans des chambres dhôtes raffinées. Les douves en eau ainsi que les jardins à la française donnent à lensemble de la propriété une nuance de mélancolie rêveuse où il fait bon de se ressourcer, location chambres d'hôtes de Mr et Mme Levéjac.","architecture":"PIERRE-FONTAINE, la construction du manoir date du XVe siècle La construction du logis actuel, sur des bases plus anciennes, est dû à Jacques de Bouillé en 1540, au XVIIe siècle. Restauré par son propriétaire la Famille Robert de Chièvres. La construction du logis actuel, sur des bases plus anciennes, est dû à Jacques de Bouillé en 1540. Le manoir a été restauré pour la Famille Rob
