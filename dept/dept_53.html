stème de défense : inscription par arrêté du 14 juin 2002.","habitants":"Famille de la Girouardière\r\n        \"","divers":"Château de la  Girouardière  à Peuton","gps":"","images":["../image/image_53/53_Girouardi%c3%a8re_1.jpg","../image/image_53/53_Girouardi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire33f2":{"id":"Consult_chateau_formulaire33f2","dept":"53","canton":"Ernée","commune":"Andouillé","nom":"Goisnière","type":"Château","periode":"XVI","histoire":"GOISNIERE, à 2km au sud-ouest d'Andouillé. Ce domaine fut un fief mouvant de Saint-Ouën-des-Toits, par le fief de Beauvais. On y signale en 1751; \"château, bois, métairie, domaine, prés, bois, vignes, tant en fief que roture\". Il a vu défiler les familles Guérif (1532), Le Clerc (1582) et Coustard.","architecture":"GOISNIERE, le château de la Goinière est une élégante construction moderne qui a remplacé un ancien manoir qui fut la propriété des Le Clerc et Coustard. La demeure actuelle est cantonnée d'une tour, à chacun de ses 4 angles. De nos jours, si quelque châteaux sont restés entre les mains de la famille héritière, nombre d'entre eux ont changé de propriétaire, et appartiennent maintenant à des membres de la classe aisée : chefs d'entreprises, professions libérales.\r\nL'entretien et la préservation d'un château sont des opérations très coûteuses, du fait de la taille de ces bâtisses et des techniques requises, pour le respect de leur authenticité La préservation du patrimoine architectural est à ce prix.","habitants":"Famille Guérif \r\n        \"","divers":"Goisnière à Andouillé                                                                        GPS : 48° 10' 06\" Nord, 0° 48' 24\" Ouest                                                         Lattay grav -4-5","gps":"48° 10' 06\" Nord, 0° 48' 24\" Ouest","images":["../image/image_53/53_Goisni%c3%a8re_1.jpg","../image/image_53/53_Goisni%c3%a8re_2.jpg","../image/image_53/53_Goisni%c3%a8re_3.jpg","../image/image_53/53_Goisni%c3%a8re_4.jpg","../image/image_53/53_Goisni%c3%a8re_5.jpg","../image/image_53/53_Goisni%c3%a8re_6.jpg"]},"Consult_chateau_formulaired318":{"id":"Consult_chateau_formulaired318","dept":"53","canton":"Villaines-la-Juhel","commune":"Villaines la Juhel","nom":"Grand_Coudray","type":"Château","periode":"XII-XV","histoire":"GRAND-COUDRAY, c'est une imposante demeure formée d'un corps de logis flanquée de deux pavillons et d'une tour surmontée d'un clocher et de dépendances attenantes. Elle fut bâtie par la famille Lecureul en 1904 sur l'emplacement d'un ancien château. La propriété fut revendue à la famille actuelle propriétaire à la suite de la faillite de la famille Lecureul. En 1534, le domaine appartenait à Pierre de La Haie, châtelain de Lassay et descendant de Jean de La Haie, baron de Coulonces. À la suite du mariage d'Anne de La Haie avec Brandelis de Champagne en 1642, il devenait propriété de la famille de Champagne, le 10 janvier 1680 est enterrée à Villaines-la-Juhel une certaine Anne de La Haye, âgée de 77 ans, donc née en 1603, épouse de noble Brandelis de Champagne, écuyer, seigneur de La Roche et du Coudray ; ce Brandelis pourrait être un fils et un frère cadet des marquis de Villaines, Brandelis (IV) et Hubert ci-dessus , ou du moins un parent proche. Signe cet acte un certain Gaspard de Champagne : un des comtes de Champagne-La Suze porte ce nom, petit-neveu de Brandelis  René Moulé de la Raitrie acheta le Grand-Coudray en 1678. Le château fut vendu comme bien national, le 2e germinal an II pour 20 000 livres, puis démoli et remplacé par l'actuel château.","architecture":"GRAND-COUDRAY,   en 1419, Ambroise de Loré fut pris par les Anglais, qui s'emparèrent de la ville, en 1420, et qui revinrent, en 1446, grâce à la complicité d'un traître, Jean Poisson. Par la suite, un calvaire a été construit sur les ruines du château du Grand-Coudray  comprenant des fossés, des douves, des murailles et des tours avec deux réservoirs à poissons. Rue du Château, une forteresse fut construite au XIIe siècle sur une butte. Elle est en ruine depuis la guerre de Cent Ans. Seuls subsistent, aujourd'hui, les soubassements d'un donjon carré, un ensemble de murs en glacis soigneusement appareillé. Cette élévation n'a probablement pas servi de demeure au seigneur du lieu mais bien plutôt d'abri pour les populations lors des invasions anglaises de la guerre de Cent Ans. un calvaire a été construit sur les ruines du monument.","habitants":"Famille de Pierre de La Haie,\r\n        \"","divers":"gd-Coudray   GPS : 48° 20' 40\" Nord, 0° 16' 47\" Ouest                         GPS : 48° 20' 40\" Nord, 0° 16' 47\" Ouest","gps":"48° 20' 40\" Nord, 0° 16' 47\" Ouest                         G","images":["../image/image_53/53_Grand_Coudray_1.jpg"]},"Consult_chateau_formulaireafe5":{"id":"Consult_chateau_formulaireafe5","dept":"53","canton":"Lassay-les-Châteaux","commune":"Grazay","nom":"Grazay","type":"Château","periode":"XII-XV","histoire":"Deux châteaux à Grazay celui de la Cour et le Logis du bois                                                                                            COUR    Au XIIe siècle, la seigneurie de Grazay était un fief vassal de la baronnie de Mayenne et appartenait aux Courceriers. Le château semble être une demeure dagrément plutôt quune forteresse défensive. La demeure se compose d'une tour hexagonale en façade datée de 1577, une galerie couverte en bois entre la tour et le pavillon et au nord une chapelle coiffée d'un beau toit en coupole. Il conserve la seigneurie de la paroisse jusqu'à la fin du XVIIIe siècle dans la famille de Bazogers.","architecture":"LOGIS du BOIS  Sa construction date du XVe au milieu du XIXe siècle. Le logis est attesté depuis le XVe siècle. Les douves furent comblées au XVIIIe siècle. Les vestiges du système de défense datent du XIVe siècle. Les communs, le chenil et l'orangerie ont été bâtis au milieu du XIXe siècle. Le Logis du Bois est inscrit aux M.H. depuis le 28.03.1995. Il existe 3 autres demeures seigneuriales à découvrir à Grazay : le Logis du Bois (Privé), Le château de la Cour, le Logis de la Roche.","habitants":"Cour, Famille de Bazogers\r\n        \r\n        \"","divers":"Deux châteaux à Grazay celui de la Cour grav 1-2-3 et le Logis du bois  grav 4-5-6                                                                   Cour     GPS : 48° 17' 26\" Nord, 0° 28' 56\" Ouest                                          Logis-Bois   GPS : 48° 17' 02\" Nord, 0° 28' 33\" Ouest","gps":"48° 17' 26\" Nord, 0° 28' 56\" Ouest","images":["../image/image_53/53_Grazay_1.jpg","../image/image_53/53_Grazay_2.jpg","../image/image_53/53_Grazay_3.jpg","../image/image_53/53_Grazay_4.jpg","../image/image_53/53_Grazay_5.jpg","../image/image_53/53_Grazay_6.jpg"]},"Consult_chateau_formulaire8213":{"id":"Consult_chateau_formulaire8213","dept":"53","canton":"Bonchamp-lès-Laval","commune":"Argentré","nom":"Hauterives_53","type":"Château","periode":"XII-XVIII","histoire":"HAUTERIVES, la construction du château date du XIIIe au XVIIIe siècle. En septembre 1209, Guillaume d'Hauterives reconnaît devant Savary d'Anthenaise, seigneur de Bazougers, tenir de lui son manoir d'Hauterives avec toutes ses dépendances et lui devoir service à cheval et armée. Le comte de Laval lui accorda en 1485 la remise de ses droits féodaux. Le château, qualifié d'hébergement en 1533, pouvait être considéré comme un asile sûr. Pendant les troubles de 1616, on y vient de Saint-Céneré mettre en sûreté des objets précieux. Hauterives appartenait au seigneur de Bazougers et deux siècles plus tard au seigneur de Villiers, puis par héritage, il arriva dans lillustre famille Du Bellay, alliée, plus tard, aux Hauteforts. Les seigneurs de Hauterives  possédaient plusieurs droits à l'église Saint-Vénérand de Laval. Lun des descendants vendit la propriété en 1737 à Jean Baptiste Berset, négociant lavallois. Les descendants lont conservé par le biais des Fitzgerald et des Montalembert qui ont été inhumés dans la chapelle. Le château et la chapelle actuelle ont été construits par Jean-Marie Berset. Il devint ainsi seigneur d'Argentré. Les Berset possédaient encore Parreneau en Parné et une foule d'autres terres qui en faisaient la famille la plus riche de Laval. La dame veuve Berset de Vaufleury se fit représentée à l'assemblée de la noblesse du Maine en 1789.","architecture":"HAUTERIVES. le château et la chapelle sont mis à sac en 1795. Le 15 juin 1795, un détachement de républicains, commandé par Gency et suivi dune bande de femmes pour chasser les Chouans, mais surtout pour piller le château dHauterives. Ils saccagèrent tout et emmenèrent le linge, les meubles, les portes, les fenêtres, les boiseries. Reconstruit au XVIIe siècle, le Manoir a été augmenté de tourelles en encorbellement. Elles ont été très remaniés au XIXe siècle, dont une tour d'angle, abattue à la fin du XXe siècle. Vendu à des Italiens, le château de Hauterives appartiendra en 1980, à l'imprimeur Yves Floc'h. Le château d Hauterives sera inoccupé jusqu'en 2007 et subira divers pillages et de dégradations importantes : il ny avait ni chauffage, ni électricité, ni mesures de sécurité. Le 21/02/2007, Roxane et Patrick Matton vont racheter le château pour le restaurer. Les travaux furent confiés à des artisans de la région et durèrent plus de 20 mois. 82 entreprises ont travaillé à sa restauration. Le 5 septembre 2008 en présence du maire d'Argentré Christian Lefort, du maire de Laval Guillaume Garot et du sénateur Jean Arthuis, la préfète Fabienne Buccio inaugurait le château de Hauterives. Deux jours plus tard, soit le 7 septembre 2008, les quatre propriétaires recevaient dans leurs jardins tous les résidents d'Argentré.","habitants":"famille Du Bellay   et Guillaume d'Hauterives\r\n        \r\n        \"","divers":"Château de Hauterives à Argentré                                                          GPS : 48° 05' 38,75\" Nord, 0° 38' 58,02\" Ouest","gps":"48° 05' 38,75\" Nord, 0° 38' 58,02\" Ouest","images":["../image/image_53/53_Hauterives_53_1.jpg"]},"Consult_chateau_formulaireafe1":{"id":"Consult_chateau_formulaireafe1","dept":"53","canton":"Lassay-les-Châteaux","commune":"Charchigné","nom":"Hauteville","type":"Château","periode":"XVIII","histoire":"HAUTEVILLE, la construction date du XVIIIe siècle. La plus grande partie de ses ruines est sur le territoire de Charchigné, les bâtiments nord se situant sur Chevaigné-du-Maine, sa construction à Charchigné en 1526, Lancelotte d'Hauteville, unique héritière, apporta le domaine aux d'Arquenay en épousant Antoine d'Arquenay. À la suite du mariage de Julienne d'Arquenay, petite-fille de Jean, avec Nicolas d'Angennes en 1581, Hauteville est devenu la propriété de cet homme qui, quoique catholique, devait rester attaché à Henri IV. Membre d'une famille angevine, originaire de la terre du Hardas de Louvaines, Thomas du Hardas acheta Hauteville à Nicolas d'Angennes avant 1586. Ses successeurs conservèrent cette terre que Pierre de Hardas légua à Charles, en 1793, date de 1788 sous l'impulsion du marquis Charles du Hardas et de son épouse Françoise de La Corbière de Juvigné. Veuve depuis 1819, Françoise transmet de son vivant le château de Hauteville et ses terres à son petit-fils Charles Alexis du Hardas et son épouse, Mélanie Françoise Prudhomme de la Boussinière. En 1882, le château devient la propriété de Émilie de Pérusse des Cars et de son époux, le comte Bertrand de Montesquiou-Fezensac. Leur fille unique, Mathilde de Montesquiou-Fézensac, hérite du domaine en 1902, mais mineure, la gestion de la propriété est confiée à sa tante Lady Hélène Standish, née de Pérusse des Cars et son oncle Lord Henry Noailles Widdrington Standish of Standish. Ce château est détruit par un incendie le 13 novembre 1922.","architecture":"HAUTEVILLE, ce fut Charles du Hardas, qui commanda la construction du château d'Hauteville à l'architecte Pierre Pommeyrol, vers la fin du XVIIIe siècle. Pommeyrol est le créateur des châteaux : château de Craon, château de Bel-Air et l'ancien Hôtel Piquois à Laval, etc. Il édifia en 1788 à Hauteville une demeure, d'une « uvre classique et de belle ligne », qui devait rester inachevée dès les premières lueurs de la Révolution française, en 1789. Précédée d'une avenue de 800 m, due à André Le Nôtre, d'un perron de cinq marches, elle présentait un vaste corps de logis de trois étages percés de multiples fenêtres. Au milieu de la façade de 40 m de long, se dressait un fronton triangulaire, orné des blasons et des chiffres de la famille du Hardas et surmonté d'un belvédère. De chaque côté du château, des pavillons irréguliers complétaient tout un ensemble « d'une construction séreuse et solide ». Sa somptueuse avenue bordée d'une double haie de hêtres était la troisième de France   Le 13 novembre 1922, vers 3 h du matin, le tocsin sonne à Charchigné pour alerter la population. Le château est la proie des flammes. Le château, en ruines depuis 40 ans, avec ses vastes dépendances toujours debout, devient dans les années 1960 la propriété de M. Roger Bordelet, fils des anciens métayers de l'une des fermes proches du château.","habitants":"Famille de Lancelotte d'Hauteville,\r\n        \"","divers":"A Charchignéle château de Hauteville                                                                     GPS : 48° 25' 33\" Nord, 0° 23' 49\" Ouest","gps":"48° 25' 33\" Nord, 0° 23' 49\" Ouest","images":["../image/image_53/53_Hauteville_1.jpg","../image/image_53/53_Hauteville_2.jpg"]},"Consult_chateau_formulaire6dc1":{"id":"Consult_chateau_formulaire6dc1","dept":"53","canton":"Cossé-le-Vivien","commune":"St-Martin de Limet","nom":"Joubardière","type":"Manoir","periode":"XVII","histoire":"JOUBARDIERE, Jusquen 1996, le manoir de la Joubardière était une exploitation agricole et la conservation du patrimoine nétait pas un souci pour ses propriétaires bien que lédifice ait été inscrit en 1991. Son propriétaire était alors le dénommé Jobert, prieur de La Roë en 1184. Le vieux logis a été bâti au milieu du XIVe siècle et remanié au XVIe par ajout dun étage et de combles avec lucarnes. La tour ainsi que le grand logis sont du tout début du XVe siècle. Acquis en 1996 par monsieur Alain Plaute docteur.","architecture":"JOUBARDIERE, Trois années ont été nécessaires pour arriver à bout des dépendances en tôles, des 125 tonnes de béton et des déchets divers. Les études de datation des mortiers et des bois ainsi que les recherches menées par Mme Plante ont permis de localiser le logis-tour initial à lemplacement de la tour carrée actuelle et de le dater de la fin du XIIe siècle.  Depuis 1643, le bâti na subi aucune modification si ce nest la démolition de la fuye remplacée par un bâtiment de servitude et la construction des soues. Le fronton de la lucarne du logis est orné des armoiries des familles Amyot, Beaudevis, Mauviel et de Quatrebarbes.\r\nAvec son bâti en moellons ferrugineux liés au mortier ocré, ses ouvertures encadrées de grès marbré de vert ou de tuffeau et ses 1200 m2 de toitures en ardoise, ce manoir et ses dépendances se marient parfaitement avec lenvironnement.","habitants":"Familles Amyot\r\n        \r\n        \"","divers":"Joubardière à St-Martin de Limet                                                   Gps 47° 48' 55\" nord, 1° 01' 15\" ouest","gps":"","images":["../image/image_53/53_Joubardi%c3%a8re_1.jpg","../image/image_53/53_Joubardi%c3%a8re_2.jpg","../image/image_53/53_Joubardi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire1660":{"id":"Consult_chateau_formulaire1660","dept":"53","canton":"Ernée","commune":"Juvigné","nom":"Juvigné","type":"Château","periode":"XVII","histoire":"deux châteaux à Juvigné; Bourgon (voir article) et Feu                             FEU  édifié au XVIIIe siècle sur les vestiges du précédent, est implanté sur une plate-forme cernée de douves en eau. Il se compose d'un jardin qui, aujourd'hui principalement potager, devait servir de jardin d'agrément. Entouré d'un fossé et d'une promenade surélevée, cet espace verdoyant était complété par une orangerie et une serre. A l'exception de quelques modifications réalisées au XIXe siècle, le château du Feu a conservé l'essentiel de ses aménagements du XVIIIe siècle, ainsi que l'attestent les décors de boiseries et la rampe de l'escalier principal en ferronnerie. L'édifice se démarque au premier étage par la présence d'alcôves et de cheminées portant les armoiries de la famille de La Corbière, propriétaire dès le XVIIe siècle.","architecture":"FEU, le logis proprement dit ; les douves avec leurs murs de soutènement  ; les pièces d'eau; les façades et toitures des bâtiments de communs et pavillons fermant la cour, avec le portail  , ainsi que des deux bâtiments de l'ancienne métairie ; l'avant-cour , les plantations d'alignements de part et d'autre de la voie communale n° 494 dite de \" l'allée du Feu \" ; et du chemin rural n° 182 dit \" du Boulay du Feu \" , ainsi que la partie restante de l'allée depuis le sud-est avec ses plantations d'alignements de part et d'autre ; le jardin en totalité, avec ses fossés, murs, plantations structurantes, promenades plantées et bâti: inscription par arrêté du 26 mai 2010.","habitants":"Famille de La Corbière\r\n        \"","divers":"trois châteaux à Juvigné; Goeland grav-3                                                       Feu grav 1-2                                                                                    Gps 48° 13' 23\" N, 0° 33' 40\" Ouest","gps":"","images":["../image/image_53/53_Juvign%c3%a9_1.jpg","../image/image_53/53_Juvign%c3%a9_2.jpg","../image/image_53/53_Juvign%c3%a9_3.jpg"]},"Consult_chateau_formulairebe65":{"id":"Consult_chateau_formulairebe65","dept":"53","canton":"Azé","commune":"Fromentière","nom":"la_Cour_Fromentière","type":"Château","periode":"XIV-","histoire":"La COUR  La construction du Château de la Cour date du XVIIIe siècle. Le Château de la Cour, que Mathurin de Montalais, gouverneur du duché de Beaumont sous Henri IV, seigneur de Fromentières, vicomte de Guer, baron du Plessis de Ker, fit construire en 1631.  L'ancien domaine se nommait La Quanterie. Fief et seigneurie devint le principal manoir, vers 1450. Parmi les chapelains Jean Michel (1410), Roland de Léon (mort en 1626), Louis de La Grandière (mort en 1672), Nicolas Thévenard (mort en 1714). Les seigneurs qui se sont succédé à la Quantrie, aujourd'hui appelé la Cour : Agayce dame de Forges et de Vigré, femme de Guillaume de Mauvinet, veuve dès 1388. Hue de Montalais 1399, 1407. Hugues de Montalais, seigneur de Chambellay, relevait du seigneur de Fromentières pour des biens dont Guy de Laval, du chef de sa femme, lui devait hommage, 1423, 1452. Mathurin de Montalais fut seigneur de la Quanterie et de Fromentières, 1488, mari de Jeanne de Meaulne, 1500. Jeanne de La Jaille 1502, 1503. Jean de Montalais 1503, rend aveu à Bellebranche pour la Quanterie, le Buharay, la Bretéchère, 1508, vit en 1529. Mathurin de Montalais, veuf de Renée de Goulaines, 1533. René de Montalais, chevalier de l'ordre du Roi, 1559, 1571. Sa veuve, Louise de Malestroit vit en 1577. Mathurin de Montalais, frère du précédent donne partage à ses surs Françoise, Louise et Renée en 1594. Il meurt au château le 3 janvier 1636 laissant avec sa femme Anne Le Voyer trois enfants (Renée 1593, René 1595 et Gabriel 1605).","architecture":"La COUR,  Tristan de Martineau meurt en 1646 et sa femme Barbe de Montalais est enterrée dans l'église près du banc seigneurial le 30 décembre 1679. Alexandre de Martineau, né en 1644 reçoit Fromentières de sa mère en 1675. Il meurt le 8 septembre 1692. Sa femme, Marguerite de Beaumanoir avait acquis le domaine obéré à son mari le 20 juin 1692. Elle en avait vendu deux métairies à Francois Dublineau un an plus tard puis en avait fait démission à ses enfants. François Dublineau se fit adjuger le tout en 1698, expulsa le propriétaire évincé, mais dut le rétrocéder à la famille en 1720. Louis-Dauphin de Martineau, mort en 1750. Louis-Dauphin-Gilbert-Urbain de Martineau 1752-1779. Augustin de Martineau a vendu la terre en 1785 à Mme Louise-Françoise d'Héliand  et a sa fille unique Louise Amédée Pouteau de Brive qui, prisonnière pendant la Terreur fut libérée le 4 brumaire an III. Louise Amédée Pouteau de Brive épousa le 4 prairial an XIII le 24 mai 1805, Pierre Marie Sylvain de Penfentenyo, marquis de Cheffontaines (1776-1852). Ce dernier fut condamné par Louis Philippe pour révolte contre son autorité à la tête d'une compagnie de Chouans : dès 1815, il était capitaine dans la compagnie de Fromentières, sous les ordres de Louis d'Andigné. La famille de Cheffontaines occupe toujours le Château de la Cour.","habitants":"Famille de Montalais\r\n        \"","divers":"GPS : 47° 51' 52\" Nord, 0° 39' 55\" Ouest","gps":"47° 51' 52\" Nord, 0° 39' 55\" Ouest","images":["../image/image_53/53_La_Cour_Fromenti%c3%a8re_1.jpg","../image/image_53/53_La_Cour_Fromenti%c3%a8re_2.jpg"]},"Consult_chateau_formulaire4224":{"id":"Consult_chateau_formulaire4224","dept":"53","canton":"L","commune":"Nuillé-sur-Vicoin","nom":"Lancheneil","type":"Château","periode":"XVIe-XXe","histoire":"LANCHENEIL, entré dans la famille de Préaulx en 1719, le château de Lancheneil est remanié au XIXe siècle par le 9e marquis de Préaulx (1821-1886). Sa fille Marie Charlotte de Préaulx, dernière marquise d'Aligre (née 1854 au château d'Oublaise à Luçay-le-Mâle dans l'Indre, morte en 1926) le fait remanier, profondément, de 1908 et 1917, dans un style néo-gothique, par larchitecte parisien Delarue. Elle le lègue à Amaury de Préaulx, dernier marquis de Préaulx, mort en 1971. Depuis 1961, le château appartient à l'Association Lancheneil qui regroupe plusieurs établissements (ESAT, SA ESAT, Foyer dhébergement et Foyer de vie) dont la mission est daccompagner dans lautonomie des personnes en situation de handicap psychique et mental. Le Château de Lancheneil et son ensemble sont inscrits aux M.H. depuis le 10/12/1927.","architecture":"LANCHENEIL, la construction du château de Lancheneil date du XVIe siècle. Il reste aussi ses anciens colombier,  les origines du château remontent au XIVe siècle et jusquau XVIe siècle, la seigneurie est détenue par la famille des Mathefelon dorigine angevine. Ce sont les Mathefelon qui élèvent le château dont il reste aujourdhui des éléments importants, en particulier les deux tours de la façade Est et les deux tours dangle de la cour. Le château passe par mariage à Jean de Brie puis à François de Brée et se succèdent différentes familles. Entre 1908 et 1917, la marquise dAligre fait transformer le château, par larchitecte parisien Delarue. Celui-ci conserve quelques parties anciennes de lancien château, comme les deux tours de la façade Est. Mais surtout, il reconstruit et se livre à une véritable recréation gothique. On note le sens des proportions, la variété et le soin des détails décoratifs et la variété du choix et du traitement des matériaux. Le château de Lancheneil se trouve être lun des derniers fleurons de lart néo-gothique de la Mayenne. Éléments protégés MH : le château de Lancheneil et ses anciens colombiers : inscription par arrêté du 10 décembre 1927.","habitants":"Famille des Mathefelon\r\n        \"","divers":"Nuillé-sur-Vicoin château de Lancheneil                                         GPS : 47° 59' 04\" Nord, 0° 46' 33\" Ouest","gps":"47° 59' 04\" Nord, 0° 46' 33\" Ouest","images":["../image/image_53/53_Lancheneil_1.jpg","../image/image_53/53_Lancheneil_2.jpg","../image/image_53/53_Lancheneil_3.jpg"]},"Consult_chateau_formulaire85a0":{"id":"Consult_chateau_formulaire85a0","dept":"53","canton":"Lassay les Châteaux","commune":"Lassay les Châteaux","nom":"Lassay_les_Chateaux","type":"Forteresse","periode":"XII-XV","histoire":"LASSAY, Le château de Lassay fut reconstruit, en 1458, dans sa forme actuelle par Jehan de Vendôme. Il a conservé ses 8 tours, ses courtines, sa barbacane à deux étages et son châtelet. En 1600 adjugée à Charlotte du Tillet dame d'atours de la reine Marie de Médicis, les terres font retour en 1636 à la famille Madaillan qui obtiennent l'appellation  en Marquisat en 1647 son fils Louis  lui succède remanie la façade du corps e Logis. A la mort du dernier des Madaillan en 1750  le château passe à un neveu Louis-Léon-Félicité de Brancas comte  de Lauraquais en hérite. Le marquis de Beauchêne fin du XIXe siècle, début du XXe siècle, historien, fut le propriétaire du château de Lassay, de 1895 à 1939. Victor Hugo, écrivain et poète y séjourna  le 20 juin 1836  en compagnie de sa maîtresse, Juliette Drouet, alors qu'ils étaient en route pour Fougères. Dans une lettre adressée à sa femme, Adèle Foucher, il écrivait : \"Depuis Alençon, j'ai vu Lassay, charmante petite ville demi-sauvage, plantée tout au beau milieu des chemins de traverse, qui a trois vieux châteaux,  vendu à la Révolution le château passe en 1823 par les Guesdon de Beauchesne et passe par héritage  à la famille de Montalembert qui le possède Toujours.","architecture":"LASSAY, c'est un ancien château fort bâti du XIIe au XVe siècle. Le vieux château qui datait du XIIe siècle, fut démoli durant la guerre de Cent Ans. Il fut ensuite reconstruit en une année vers 1456-1458. Lenceinte était renforcée de deux tours cylindriques au sud-ouest et au sud-est, quatre tours semi-cylindriques adossées à la muraille (deux à l'ouest, une à l'est et une au sud) et deux tours à l'entrée (au nord) elles-mêmes protégées par une puissante barbacane. Le château de Lassay-les-Châteaux est privé et habité par ses propriétaires. Il fait l'objet d'un classement au titre des M.H.","habitants":"Famille Madaillan\r\n        \r\n        \"","divers":"Le fort de Lassay grav- 1                                                                    GPS : 48° 26' 20\" Nord, 0° 30' 00\" Ouest                                                La forteresse grav de 2 à 8.","gps":"48° 26' 20\" Nord, 0° 30' 00\" Ouest","images":["../image/image_53/53_Lassay_les_Chateaux_1.jpg","../image/image_53/53_Lassay_les_Chateaux_2.jpg","../image/image_53/53_Lassay_les_Chateaux_3.jpg","../image/image_53/53_Lassay_les_Chateaux_4.jpg","../image/image_53/53_Lassay_les_Chateaux_5.jpg","../image/image_53/53_Lassay_les_Chateaux_6.jpg","../image/image_53/53_Lassay_les_Chateaux_7.jpg","../image/image_53/53_Lassay_les_Chateaux_8.jpg"]},"Consult_chateau_formulairef0f1":{"id":"Consult_chateau_formulairef0f1","dept":"53","canton":"Cossé-le-Vivien","commune":"Laubrières","nom":"Laubrières","type":"Manoir","periode":"XVII","histoire":"LAUBRIERES, le village est traversé par deux axes routiers principaux : la RD11 reliant Laval à Châteaubriant et la RD127 reliant Craon à Vitré. Il se distingue par la présence de deux châteaux privés ; le domaine et le château de la Cour. Au Moyen-Âge et sous l'Ancien Régime, Laubrières dépendait de la sénéchaussée d'Angers.  Depuis la création du département de la Mayenne, Laubrières qui est dans le Haut-Anjou, fait partie de la Mayenne angevine. La construction du château de la Cour date XVIIIe siècle.    Membre d'une famille angevine originaire de La Roë, François Lefebvre de Laubrières possédait la terre, à la suite d'acquisitions successives. Dès le XVIIe siècle, cette famille habitait le manoir de la Cour de Laubrières. A la suite de l'érection de la paroisse, François Lefebvre de Laubrières abandonna sa chapelle, par acte en forme, en se réservant toutefois le droit de présentation du titulaire.","architecture":"LAUBRIERES et son territoire furent distraits de Méral en 1661. Avant cette date, le quartier situé entre le Pont-Contemp..., les moulins de Mée, de Melouin, de Bigot jouissait déjà d'une certaine autonomie car il se trouvait séparés de Méral par la taille et le sel, en vertu des lettres patentes de 1643 et leurs habitants pouvaient assister aux offices dans la chapelle du château de la Cour de Laubrières, dite chapelle de secours. Le 1er juillet 1661, ces habitants adressaient une requête à l'évêque dans laquelle ils se plaignaient de la distance de deux lieues les séparant de l'église de Méral et surtout du mauvais état des chemins si fâcheux qu'il fallait deux bonnes heures pour se rendre à Méral,  par temps pluvieux  inaccessibles à cause des étangs et chaussées à bardeaux. Le 16 juin de la même année, le curé de Méral reconnaissait, lui aussi, la nécessité d'une nouvelle paroisse pour le salut des âmes de ce quartier et le curé de Livré-la-Touche, chargé de l'enquête, émit un avis favorable en octobre 1661.   La TOUR, la paroisse de Laubrières a donc conservé le nom de ses premiers seigneurs. On l'a doté d'un territoire de 831 ha qui se présente sous la forme d'une plaine où l'altitude extrême ne dépasse pas 90 m. Arrosé par la Mée, il dénombrait 49 fermes en 1843. De nos jours, il est recouvert de nombreux pâturages ; ses agriculteurs s'adonnent à la pratique de la polyculture et à l'élevage.","habitants":"François Lefebvre de Laubrières\r\n        \r\n        \"","divers":"Château de Laubrières                                                                   GPS : 47° 56' 29,14\" Nord, 1° 05' 02,5\" Ouest","gps":"47° 56' 29,14\" Nord, 1° 05' 02,5\" Ouest","images":["../image/image_53/53_Laubri%c3%a8res_1.jpg"]},"Consult_chateau_formulaire7565":{"id":"Consult_chateau_formulaire7565","dept":"53","canton":"Laval","commune":"Laval","nom":"Laval_53","type":"Château","periode":"XVIe-XIXe","histoire":"LAVAL, Guy 1er le \"fondateur\" bâtit vers 1020 un château sur un promontoire rocheux dominant la Mayenne, destiné à contrôler un gué d'origine gallo-romaine, possédait une enceinte de terre. Il est fort probable qu'une seconde motte était établie à l'intérieur de cette enceinte, près de l'emplacement de la galerie (château neuf). Vers la fin du XIe siècle, le logis primitif, dont l'arase des murs subsiste, est agrandi vers l'est d'un édifice de plan rectangulaire qui sera aménagé en chapelle vers 1170. Au début du XIIIe siècle le château se replie sur l'extrémité de l'éperon où est construit un donjon circulaire en pierre, ses hourds sont réalisés entre 1210 et 1223. A la même époque, des logis seigneuriaux sont réalisés ; ils seront très fortement remaniés au milieu du XVe siècle à l'instigation du comte Guy 14 qui en 1456 aménage la vaste salle couverte d'une voûte lambrissée. Au début du XVIe siècle, des travées à hautes lucarnes en pierre sculptée viennent orner les façades sur cour. Face à ce \"vieux château\", le projet d'une vaste galerie est élaboré en 1508. Le \"château neuf\" est ainsi réalisé vers 1542 sous la direction de Jean Garnyer pour Guy XVII. Il sera réparé et embelli par Danjou en 1747. A la Révolution, les tribunaux s'installent au château neuf, tandis que les prisons sont transférées dans le vieux château. L'architecte Pierre-Aimé Renous restaure la chapelle du vieux château en 1851, puis il réalise le pavillon nord et l'aile en retour de la galerie à partir de 1854.","architecture":"LAVAL, à partir de 1911, l'architecte Louis Garnier restaure le vieux château devenu propriété de la ville en 1909.  La voûte lambrissée de la salle d'honneur est refaite en 1913. Le vieux château est progressivement devenu un musée à partir des années 1920 Le gros oeuvre du vieux château est en moellon. Les ouvertures sur cour sont en granite au rez-de-chaussée et en calcaire aux étages. Au sommet du donjon subsiste des hourds en bois. Le château neuf est en pierre de taille de calcaire côté cour et en moellon enduit côté rivière. L'ensemble des toitures est en ardoise, hormis celle du campanile de la galerie qui est en cuivre. Le décor sculpté de la Renaissance est présent sur les travées d'ouvertures du vieux château et dans les pleins de travées du château neuf. Au vieux château : escalier hors-oeuvre (escalier de Clermont), escalier dans-oeuvre entre la cour et la rue du Val-de-Mayenne, et escalier dans-oeuvre dans le donjon. Au château neuf, escalier dans-oeuvre à retours avec jour. Le donjon date du XIIe siècle il mesure 45 m de haut et 14 m de diamètre. Le Château Neuf de Laval nest en fait quune partie de toute une infrastructure de remparts, destinés à protéger la ville. Au pied du château, sétendaient les douves. Le château-neuf, ancien palais de justice de Laval, est en cours de rénovation sont déjà été investis dans les travaux de l'aile Sud. Cette partie du bâtiment fut construite au XIXe siècle tandis que le monument central date de la Renaissance. La toiture de l'aile sud a été entièrement refaite, toutes les portes et fenêtres ont été remplacées et les pierres de la façade en tuffeau ont été analysées, une par une. C'est devenu un Musée.","habitants":"Seigneurs comte Guy 14\r\n        \"","divers":"Châteaux neuf et vieux et remparts de Laval                                                    GPS : 48° 04' 07\" Nord, 0° 46' 17\" Ouest","gps":"48° 04' 07\" Nord, 0° 46' 17\" Ouest","images":["../image/image_53/53_Laval_53_1.jpg","../image/image_53/53_Laval_53_2.jpg","../image/image_53/53_Laval_53_3.jpg","../image/image_53/53_Laval_53_4.jpg","../image/image_53/53_Laval_53_5.jpg","../image/image_53/53_Laval_53_6.jpg","../image/image_53/53_Laval_53_7.jpg","../image/image_53/53_Laval_53_8.jpg","../image/image_53/53_Laval_53_9.jpg"]},"Consult_chateau_formulaire4f1a":{"id":"Consult_chateau_formulaire4f1a","dept":"53","canton":"Laval","commune":"Laval","nom":"Laval_Chateaux","type":"Château","periode":"XVII-XVIII","histoire":"Divers château à Laval dont Bas du Gast, de Rouesse, Montfrand etc.                                                                                                                             BAS DU GAST,  L'hôtel particulier Du Mans du Chalais se trouve dans le bas de la place du Gast, 6 Rue de la Halle-aux-Toiles, à Laval. château des XVIIe et XVIIIe siècles, construit en 1742, par le receveur de la gabelle (grenier du sel), Michel Jean du Mans de Chalais. La demeure est dotée de décors intérieurs et de boiseries de grande qualité. Des lambris sont venus compléter le décor dans la deuxième moitié du XVIIIe siècle. L'emprise des jardins a perduré depuis le XVIIIe siècle avec des transformations, notamment la création d'un jardin à l'anglaise et d'un jardin à la française (dans les années 1920) aujourd'hui hôtel.                                                                       ROUESSE Rouesse Manoir de Nathalie-et-Pierre-Olivier-occupant un manoir du XVe siècle avec douves et meurtrières, cette maison d'hôtes est dépaysante. Calme avec son parc de 3 hectares, vous pourrez vous détendre sur sa terrasse ou lire au coin du feu tout en étant à 5 mn du centre ville.","architecture":"BAS DU GAST, Éléments protégés MH : L'hôtel est construit en U. Il était entouré de plusieurs jardins: un jardin à la française, un jardin à l'anglaise. Sur la façade, le fronton triangulaire est décoré de deux pigeons entourant une corbeille de fleurs en signe d'amour et de pureté. Ce bâtiment fait lobjet dune inscription au titre des monuments historiques depuis le 10 juin 19971. le logis avec ses décors intérieurs; les façades et les toitures des communs et bâtiments annexes; soubassements de l'ancien grenier à sel formant terrasse ; les jardins avec les murs de soutènement des terrasses ainsi que les murs de clôture : inscription par arrêté du 10 juin 1997.  Location chambres d'hôtes de charme et une suite de monsieur Villiat.","habitants":"Michel Jean du Mans de Chalais.\r\n        \"","divers":"Divers châteaux à Laval dont Bas du Gast de 1 à 6,                                     de Rouesse-7-8                                                                            Montfrand grav-9                                                                                GPS : 48° 11' 40\" Nord, 0° 39' 47\" Ouest","gps":"48° 11' 40\" Nord, 0° 39' 47\" Ouest","images":["../image/image_53/53_Laval_Chateaux_1.jpg","../image/image_53/53_Laval_Chateaux_2.jpg","../image/image_53/53_Laval_Chateaux_3.jpg","../image/image_53/53_Laval_Chateaux_4.jpg","../image/image_53/53_Laval_Chateaux_5.jpg","../image/image_53/53_Laval_Chateaux_6.jpg","../image/image_53/53_Laval_Chateaux_7.jpg","../image/image_53/53_Laval_Chateaux_8.jpg","../image/image_53/53_Laval_Chateaux_9.jpg"]},"Consult_chateau_formulaire05b5":{"id":"Consult_chateau_formulaire05b5","dept":"53","canton":"Meslay-du-Maine","commune":"Vaiges","nom":"Lesnières","type":"Château","periode":"XVIII-XIX","histoire":"LESNIERES, en 1418, le Château de Lesnières appartenait à Michel Isambart. Puis il deviendra la propriété de la famille de Lesnières, en 1612, par Jean de Rougé, qui fut décapité, pour faux monnayage, en 1600. Le château fut racheté, en 1806, par Ambroise Duchemin de Bois-du-Pin. Sa fille Renée (1800-1855), mariée à Armand Soucany de Landevoisin, en devient à son tour propriétaire. Il ira ensuite dans les mains de fils ainé Edmon (820-1871), puis à ses 3 fils qui revendront en 1889, le château de Lesnières et son domaine à Francis Robert, négociant à Paris, frère du maire et conseiller général de Vaiges Anatole Robert. Après la mort de celui-ci, en 1905, le château de Lesnières est racheté par la famille Bellier de Villentroy, dont une descendante l'habite, encore aujourd'hui, en 1860, pour Edmond Soucany de Landevoisin qui hérita du château de Lesnières, de sa mère, en 1855. Il décéda en 1871. Plusieurs lucarnes ont conservées les armoiries de la famille, de son épouse Mélite Louise de la barre et de ses 3 enfants.","architecture":"LESNIERES, la construction du château de Lesnières date des XVIIIe-XIXe siècles.  de la première moitié du XIXe siècle, de la 2ème moitié du XIXe siècle. En 1600, le château fut totalement démoli après l'exécution de Julien de Lesnières, Il est reconstruit au XVIIe siècle. Dans le 3ème quart du XVIIIe siècle, selon Davelu, il possédait une chapelle elle a été rebâtie en 1838. En 1840 le château \"vient d'être construit à neuf par M. de Bois Dupin\". Il s'agit en réalité d'un réaménagement complet de l'intérieur du château. Le gros-oeuvre et la charpente qui datent du XVIIe siècle ont été conservés et de la reconstruction de la chapelle, de style néo-gothique.  Les façades du logis furent remaniées, en 1860.  Plusieurs lucarnes ont conservées les armoiries de la famille,  La grille d'entrée du XIXe siècle du château de Lesnières provient du château de Laval. Elle aurait été réalisée par Francis Robert et porte l'initiale R.","habitants":"Famille de Lesnières\r\n        \"","divers":"Château de Lesnières à Vaiges;                                                   GPS : 48° 02' 27\" Nord, 0° 28' 34\" Ouest","gps":"48° 02' 27\" Nord, 0° 28' 34\" Ouest","images":["../image/image_53/53_Lesni%c3%a8res_1.jpg","../image/image_53/53_Lesni%c3%a8res_2.jpg"]},"Consult_chateau_formulaire1d73":{"id":"Consult_chateau_formulaire1d73","dept":"53","canton":"Gorron","commune":"Lévaré","nom":"Levaré","type":"Château","periode":"XI-XVI-XVIIIe","histoire":"LEVARE,  en 1539, Jean des Vaux épouse Marie de Lévaré et construit le château actuel.  lédification du château actuel remonte au XVIe siècle par Jean IV des Vaux. Ce dernier y vit avec son épouse, de 1530 à 1593. Gentilhomme du roi Charles IX, il est nommé par ce dernier, en 1567, gouverneur et lieutenant général des villes et baronnies de Mayenne, Ernée, Pontmain, Lassay, Ambrières, Villaines et Gorron. La famille des Vaux est maîtresse des terres jusquà la Révolution française. Cest ensuite une autre grande famille qui habite les lieux : celle du duc dAbrantès. Au XIXe, la famille Montecot, dont la mère Olive des Vaux avait épousé le marquis de Montecot, vend le domaine à Mme Le Ray. En 1869, Maurice le Ray, son fils, épouse Jeanne, arrière-petite-fille du général Junot et en enlève le titre. Sa petite-fille transmettra le titre à Maurice le Ray en lépousant en 1869. Le nouveau duc dAbrantès mourut en 1900. Andoche Le Ray dAbrantès succède alors à son père. La famille dAbrantès conservera le château jusquen 1950, le domaine est vendu à un marchand de biens M. Lemonnier. En 1956, un incendie détruit en partie laile droite de la demeure. En 1960, les douves larges de 14 m et datant du XVIe siècle, sont nettoyées et remises en eau sur trois côtés. En 2001, Françoise et Henri Jean Anglade Bosc acquièrent le château et entreprennent de nouveaux travaux (plomberie, électricité, salle de bains, cuisine) pour y habiter et faire revivre le château.","architecture":"LEVARE, le premier site du château féodal remonte au XIe siècle. Si un château féodal existait déjà autrefois, avant de tomber en ruines, au XVe siècle, lédification du château actuel remonte au XVIe siècle .Éléments protégés M.H. : l'allée reliant le château au cour du village, avec ses talus et arbres d'alignement ; la plate-forme, avec ses douves et leurs aménagements (murs de soutènement, viviers et systèmes défensifs : vestiges des anciennes tours, pont, ancien pont-levis, le portail vers le jardin potager ; les façades et les toitures de la partie sud-ouest du logis ; en totalité : l'escalier et la partie nord-est du logis, l'ancien donjon et la chapelle ainsi que l'ancien jardin potager avec ses murs de clôture ; les façades et les toitures des bâtiments de communs et l'ancienne fuye marquant l'angle sud de la plate-forme : inscription par arrêté du 30 octobre 2006.","habitants":"Famille de Jean IV des Vaux\r\n        \"","divers":"Château de Levaré à Levaré.                                                               GPS : 48° 24' 54\" Nord, 0° 54' 33\" Ouest","gps":"48° 24' 54\" Nord, 0° 54' 33\" Ouest","images":["../image/image_53/53_Levar%c3%a9_1.jpg","../image/image_53/53_Levar%c3%a9_2.jpg","../image/image_53/53_Levar%c3%a9_3.jpg"]},"Consult_chateau_formulaire78c7":{"id":"Consult_chateau_formulaire78c7","dept":"53","canton":"Meslay-du-Maine","commune":"Ballée","nom":"Linières","type":"Manoir","periode":"XVIIe","histoire":"LINIERES,  château bâti vers 1640-50 pour Philippe de Girard. , on lisait vers 1900 le nom de Jean Nail, aujourd'hui disparu. Le 31 juillet 1641, Julien Poitrineau, tailleur de pierre et maître-maçon, s'engage à démolir le pavillon du portail et à le reconstruire plus loin, afin que le portail soit plus à découvert et mieux en valeur. Les colonnettes sont en marbre, toits à imbrications.","architecture":"LINIERES, château bâti vers 1640-50 pour Philippe de Girard. Le corps de logis est cantonné sur la façade postérieure de deux pavillons symétriques de ceux de la façade principale. Sur l'une des lucarnes à frontons triangulaires, on lisait vers 1900 le nom de Jean Nail, aujourd'hui disparu. Les lucarnes des pavillons sont plus ornées que celles du corps de logis avec frontons brisés et pinacles feuillus.  Éléments protégés MH : les éléments suivants composant le château de Linières, selon lemprise délimitée par un trait rouge sur le plan annexé à larrêté : les éléments bâtis de la haute cour en totalité (logis, vestiges des tours, ponts, murs de clôture) ; la plate-forme fossoyée avec ses douves et leurs murs de soutènement ; les façades et les toitures du bâti de la basse cour, ses murs de clôture et les vestiges du portail ; les terrasses et les terrains dassiette des anciens jardins, les parterres et le verger : inscription par arrêté du 26 janvier 2017.","habitants":"Famille de Julien Poitrineau,\r\n        \"","divers":"Château de  Linières à Ballée ;                                                       GPS : 47° 56' 37\" Nord, 0° 24' 07\" Ouest","gps":"47° 56' 37\" Nord, 0° 24' 07\" Ouest","images":["../image/image_53/53_Lini%c3%a8res_1.jpg","../image/image_53/53_Lini%c3%a8res_2.jpg"]},"Consult_chateau_formulaireb445":{"id":"Consult_chateau_formulaireb445","dept":"53","canton":"Azé","commune":"Longuefuye","nom":"Longuefuye","type":"Château","periode":"XV-XVII","histoire":"VILETTE, château d'origine XVe-XVIIe siècles pour le corps de bâtiment principal flanqué dune tourelle, et XVIIe-XVIIIe siècles pour la partie servitudes qui forment une aile. Cité au XVe siècle \"clarisum substus montem de villette\" le fief de Villette est fort ancien ; une maison féodale entourée de douves occupait ce site. Jean de Beaucey en est le premier seigneur connu. Vers 1450, sa fille Jehanne, se marie à Pierre de Baubigné (de la branche cadette de Chasnay), le fief de Villette restera dans cette famille jusquen 1620, date à laquelle Madeleine de Baubigné, veuve de Jean Girard, le reçoit en héritage. Les Girard vont sallier aux Charnacé, occupés à embellir le château de Linières à Ballée, et vendent la terre de Villette à Germain Jousse, avocat au présidial de Château-Gontier. La propriété devait rester plus de 200 ans dans cette famille de robe, passant par alliances successives aux Syette puis aux Guays des Touches.","architecture":"COURANS, s'est un château bâti à Longuefuye,  le château de Courans date du XVIIIe siècle. C'est devenu un gite d'Hôtes. , le château des Courants vous propose 70 couchages. Le domaine des Courans rassemble 5 gites, une piscine chauffée et une belle salle de réception de l'Orangerie, pour vous accueillir en famille, entre amis ou professionnellement (de 40 à 70 personnes). Il s'agit du Pavillon Galant, La Closerie des Cèdres, La Faisanderie, Baudron, le Petit Pavillon et l'Orangerie.  Les salons des gites peuvent constituer facilement des salles de réunions complémentaires à LOrangerie pour vos besoins professionnels.","habitants":"Vilette ;Jean de Beaucey                            \r\n        \"","divers":"Château de Longuefuye Vilette grav-1                               GPS : 47° 52' 00\" Nord, 0° 36' 51\" Ouest                         Courans Grav -2.                                                                          GPS : 47° 52' 10,\" Nord, 0° 36' 04,7\" Ouest","gps":"47° 52' 00\" Nord, 0° 36' 51\" Ouest                         C","images":["../image/image_53/53_Longuefuye_1.jpg","../image/image_53/53_Longuefuye_2.jpg"]},"Consult_chateau_formulaire34f4":{"id":"Consult_chateau_formulaire34f4","dept":"53","canton":"Bonchamp-lès-Laval","commune":"Louverné","nom":"Louverné","type":"Château","periode":"XIXe","histoire":"Trois châteaux à Louverné la BIgotière, la Motte Babin et Ronceray.                                                                                                                BIGOTIERE, appartient en 1659 à Louis Pichot, chirurgien à Laval, puis en 1730 à Étienne Trillon, sieur de Barbé et également chirurgien à Laval, et en 1830 à Étienne et Jean Couasnier. Le château, construit par M. de Rouffigni, comprend un corps de bâtiment principal et deux pavillons. La chapelle est édifiée par labbé Marandais, beau-frère de M. de Rouffigni.                                                                     MOTTE-BABIN, logis construit au XIXe siècle flanqué de deux tours, avec chapelle de style néo-roman construite par Eugène Boret père. La Motte Babin faisait autrefois partie du domaine de la Troussière. L'édifice de plan régulier se compose de deux étages carrés, surmontés de toit à longs pans; croupe et toit conique, recouverts d'ardoise. Le décor de la chapelle est contemporain de sa construction au milieu du XIXe siècle. En ruines en 1981 ce décor est aujourd'hui résiduel.","architecture":"RONCERAY, ancien fief mouvant de Louverné. Il est fait mention en 1752 de la grande maison du Ronceray, la chapelle, cour, jardins et tourelles; le lieu et métairie du Ronceray, le lieu et closerie du Ronceray, alias du Val, le moulin de Vau et la prairie Touchard. Le château fut agrandi et remanié vers 1850, par M. du Mans du Chalais, qui fit également édifier les communs et les écuries. La chapelle ancienne, dédiée à Sainte Marguerite, fut restaurée et plaquée d'une façade néo-gothique dans les mêmes années, plan régulier  élévation à travées  un étage carré ; étage de comble : enduit  Couverture (type) : toit à longs pans ; toit conique ; toit en pavillon en  ardoise.","habitants":"Bigotière;  Louis Pichot                                                                                Motte-Babin; Famille de Eugène Boret \r\n        \"","divers":"Trois châteaux à Louverné la Bigotière grav 1,                                   la Motte Babin grav-2                                                                          Ronceray  grav-3-4-5-6","gps":"","images":["../image/image_53/53_Louvern%c3%a9_1.jpg","../image/image_53/53_Louvern%c3%a9_2.jpg","../image/image_53/53_Louvern%c3%a9_3.jpg","../image/image_53/53_Louvern%c3%a9_4.jpg","../image/image_53/53_Louvern%c3%a9_5.jpg","../image/image_53/53_Louvern%c3%a9_6.jpg"]},"Consult_chateau_formulairec6ef":{"id":"Consult_chateau_formulairec6ef","dept":"53","canton":"Azé","commune":"Menil","nom":"Magnanne","type":"Château","periode":"XVIIe","histoire":"MAGNANNE  Sa construction date du XVIIe siècle. Il a été construit à la fin du XVIIe siècle, pour Michel de Racappé, seigneur de Ménil. Le château de Magnanne, dont la terre fut érigée par Louis XIV en marquisat en 1701, est devenu, par alliance en 1755, la propriété de la famille de La Tullaye, puis, en 1883, toujours par alliance, de la famille de Sabran-Pontevès. Il est vendu en 1923 par le duc de Sabran-Pontevès au Baron Édouard Creuzé de Lesser. Il fut revendu, en 1928, par le  duc de Sabran-Ponteles au baron Edouard Creuzé de Lesser. Les Pottier, propriétaire des lieux depuis 2005, rappelle :\r\nCette perle a été attribuée à Michel Racapé, lun de ses généraux de gendarmerie en raison de sa fidélité au roi et de ses bons et loyaux services envers la couronne. Michel Racapé a été élevé au rang de maréchal et anobli marquis de Magnanne. Sur sa cassette personnelle, Louis XlV fit bâtir ce château. Une belle histoire. Lactuel propriétaire succédant aux illustres familles Racapé, La Tullaye, baron De Lesser, a envie de créer des gîtes, relancer les séminaires et cérémonies dans ce lieu chargé dhistoire, cadeau du Roi-Soleil. toujours dans la famille des de la  Tullaye.","architecture":"MAGNANNE,  le château de Magnanne à proximité de Ménil est un des plus grand château classique de la Mayenne. C'est un bel exemple de larchitecture de lépoque Louis XIV: toiture à la française, bâtiment central encadré de deux pavillons légèrement en avant. Dans le grand salon, des lambris du début du XVIIIe siècle, et dessus de porte d'après Pater et Watteau exécuté en 1730.  Le château de Magnanne possède un salon des portraits et un salon comportant de nombreux masques. Éléments protégés MH : les façades et les toitures du corps de logis principal et des deux ailes en retour ; les façades et les toitures du bâtiment des communs situé au Sud ; le sol de la cour et les douves ; le vestibules d'entrée et l'escalier de marbre ; les deux escaliers de service ; la salle à manger et la pièce qui lui fait suite au sud ; le grand salon situé au Nord avec sa console ; le salon des portraits et le salon des masques : classement par arrêté du 6 août 1958. Deux pavillons de moindre hauteur épaulent lhabitation principale, agrémentés dun toit à la Mansart. Des dépendances complètent la demeure avec, en particulier, un ancien et vaste cellier dont le fronton sorne de gerbes de blé et de grappes de raisin. Un jardin à la française prolonge la façade ouest, et des douves, probablement témoins dun premier château limitent la cour dhonneur à lest.","habitants":"Famille de La Tullaye                                                                   Famille de Sabran-Pontevès\r\n        \"","divers":"Château de Magnanne  à Ménil                                                          GPS : 47° 45' 56\" Nord, 0° 41' 20\" Ouest","gps":"47° 45' 56\" Nord, 0° 41' 20\" Ouest","images":["../image/image_53/53_Magnanne_1.jpg","../image/image_53/53_Magnanne_2.jpg","../image/image_53/53_Magnanne_3.jpg","../image/image_53/53_Magnanne_4.jpg"]},"Consult_chateau_formulaire0fc1":{"id":"Consult_chateau_formulaire0fc1","dept":"53","canton":"Château-Gontier","commune":"Marigné-Peuton","nom":"Marigné_Peuton","type":"Château","periode":"XVII","histoire":"BREON ou Daon, était la résidence de la Famille de Lancrau de Bréon. Il existe un autre château sur la commune à découvrir : Le château de l'Aunay.                                                                            MARIGNE-PEUTON,  existait à l'époque Gallo-Romaine comme l'étymologie de son nom le suggère.  La seigneurie de paroisse fut unie de tous temps à celle du Plessis, château et domaine qui semble même n'avoir été constitués qu'à l'époque relativement moderne.  On trouve comme seigneurs : Roland de Coesmes, vivant en 1244; Hardouin de Maillé 1440; puis les Rohan, avant 1603. Thérèse de Rohan présente encore au bénéfice de Saint-Blaise en 1734. Françoise-Sébastienne Elisabeth Hay des Nétumières, veuve. Le Chat de Vernée, reçoit, comme dame de Marigné, les ventes de la seigneurie de l'Aunay, 1761, et avait pour héritière en 1777 Guillaume-Guy Lesrat, seigneur de Briottières, veuf de Françoise-Julie Le Chat. La commune faisait partie de la sénéchaussée angevine de Château-Gontier dépendante de la sénéchaussée principale d'Angers depuis le Moyen Âge jusqu'à la Révolution française.\r\nEn 1790, lors de la création des départements français, une partie de Haut-Anjou a formé le sud du département de la Mayenne ; cette région est aujourdhui appelée Mayenne angevine.","architecture":"PLESSIS: 800 m Ouest du bourg,  la terre comprenait Marigné, Peuton et Laigné, et les aveux se rendaient au roi - En furent seigneurs : les L'Hermite, Couesmes, Maillé, de Rohan. En juillet 1747, Claude Mathieu Bouchard, sgr du Coudray et Gabrielle Quentin sa femme l'acquiert, mais par suite de cession de retrait féodal, elle passe le 15.5.1751 à Alexis Gabriel de Lancrau sgr de Bréon et Henriette Minault sa femme -\r\nEn furent fermiers : René Chesneau prend le bail à ferme le 1.7.1673, qui sera prolongé 4 fois à Paris, à lui puis à ses héritiers. En 1697, sa fille Louise Chesneau et son petit fils Mathieu Bodin  au lieu seigneurial du Plessis de Marigné rendent compte de leur gestion à Anne de Rohan princesse de Guemené. Pratiquement, c'est Pierre Crespin, époux de Louise Chesneau qui l'a géré entre temps.","habitants":"Divers seigneurs\r\n        \"","divers":"a Marigné château de Bréon Grav-1-2, de Plessis grav 3-4, Daon grav-5.                                                                                       GPS : 47° 52' 10\" Nord, 0° 48' 47\" Ouest","gps":"47° 52' 10\" Nord, 0° 48' 47\" Ouest","images":["../image/image_53/53_Marign%c3%a9_Peuton_1.jpg","../image/image_53/53_Marign%c3%a9_Peuton_2.jpg","../image/image_53/53_Marign%c3%a9_Peuton_3.jpg","../image/image_53/53_Marign%c3%a9_Peuton_4.jpg","../image/image_53/53_Marign%c3%a9_Peuton_5.jpg"]},"Consult_chateau_formulaire1b5e":{"id":"Consult_chateau_formulaire1b5e","dept":"53","canton":"Azé","commune":"Saint-Fort","nom":"Maroutière","type":"Château","periode":"XIIIe-XVe","histoire":"MAROUTIERE,  le château devrait son nom à une famille Marot. Pendant la guerre de Cent Ans, son seigneur est Louis des Barres, dit Le Barrois, valeureux chevalier. Après la fin des hostilités, le Maine connaît une grande vague de reconstruction de nombreux logis endommagés ou abandonnés. C'est de la seconde moitié du XVe siècle que semble dater les réaménagements de la Maroutière. Au XVIIIe siècle, c'était un rendez vous pour les chasseurs de loups. , chargées de siècles, voisinent avec l'hippodrome aménagé au début du XXe siècle par M. Desnoës, propriétaire de la Maroutière et fondateur de la Société des Courses, propriété de madame de Walsh-Serrant.","architecture":"MAROUTIERE,  est une demeure massive dotée d'épais contreforts. Elle est animée par les lignes verticales de sa tour d'escalier de forme octogonale, édifiée sur la façade.L'escalier enfermé dans la tour dessert l'ensemble du logis. Ses pierres.  Éléments protégés MH : les façades et les toitures, l'escalier à vis de la tour octogonale et les six cheminées anciennes : une dans la salle à manger et dans le grand salon au premier étage, une au deuxième étage, deux au troisième étage, une au quatrième étage : inscription par arrêté du 28 décembre 1978.","habitants":"Famille Marot\r\n        \r\n        \r\n        \"","divers":"Maroutière à Saint-Fort grav 1-2","gps":"","images":["../image/image_53/53_Marouti%c3%a8re_1.jpg","../image/image_53/53_Marouti%c3%a8re_2.jpg"]},"Consult_chateau_formulaire24f6":{"id":"Consult_chateau_formulaire24f6","dept":"53","canton":"Lassay-les-Châteaux","commune":"Martigné-sur-Mayenne,","nom":"Martigné_Mayenne","type":"Château","periode":"XIXe","histoire":"deux châteaux à Martigné sur Mayenne,Aulne (voir article) Motte-Husson (voir article ) Mythéme et les Essarts                                    MYTHEME, le château de Mythème a été construit au XIXe siècle dans le style ogival pour la famille de Jourdan, d'origine angevine, qui y appose ses armes. Il est encadré de deux tours circulaires et précédé d'un perron à double révolution,  est entouré d'un joli parc arboré de sept hectares, le château de Mythème domine de sa haute stature, le bourg de Martigné. Le château a été construit, vers 1850, par la Famille de Jourdan, dorigine angevine. Au XVIe siècle, Mythème était une métairie. Catherine Viel, veuve de Jean Brault, donna le closerie pour titre sacerdotale à son fils, en 1620. Ce domaine sera transmis à Marie-Catherine Boisleau qui épousa, en 1699, dans léglise de Martigné, Mathieu-Pierre dArmagnac, chevalier, Marquis de la Motte. Mythème fût vendu en 1748 à Etienne Vital, conseiller au grenier de sel de Mayenne, ancêtre des propriètaires du futur château. Amédée de Jourdan figure au recensement de 1901. Le château de Mythème est ensuite habité par la famille De Laubrières, puis sera cédé plus tard, à une famille hollandaise. En février 2006, M. et Mme dAbbundo acquièrent le château qui subira dimportants travaux qui  appartient aujourdhui à Mme Dominique Chardon. Il existe 2 autres châteaux à découvrir dans le village : le château de la Motte-Husson et le château de l'Aulne-Montgenard.","architecture":"Manoir des ESSARTS La construction du manoir date du XIIIe siècle. Henri des Essarts était le maître et seigneur des lieux en 1312. Puis ce fût Simon de Mondot de 1405 à 1416. Etienne de Mondot vendit le domaine, en 1445, à Patry Lebreton. Un peu avant 1458 et jusquen 1758, les Grands et Petits Essarts appartiendront à la famille Bérault. En 1722, le domaine fût séparé entre deux héritiers, Marguerite Bérault et son frère Jean. Par la suite, la seigneurie et la terre des Essarts furent vendues le 12/05/1758, à Nicolas Avrillé, négociant à Laval. La terre des Essarts, divisée par la suite, passe en 1804 aux familles Frin de Saint-Germain, aux Leclerc de la Provôterie, et par alliance à la famille Duchemin de Vaubernier. Le manoir, va rester pendant les XIIIe et XIVe siècles, à usage de ferme. Plusieurs propriétaires se succèderont aux Essarts. Il y a quelques années, M. et Mme ONeill, sintéressent au manoir qui prenait leau de toutes parts. Des travaux importants de rénovation furent entrepris. Aujourdhui, cest une belle demeure. On peut remarqué la massive tour ovale qui abrite lescalier sur larrière, le toit rénové à la Mansart qui existait déjà, au XVIIe siècle et la bretèche, située à larrière, du Manoir des Essarts.","habitants":"Mythéme;  Famille de Jourdan,\r\n        \"","divers":"deux château à Martigné sur Mayenne,  Mythéme grav 2-3 et les Essarts grav-1                                                                   Essarts  GPS : 48° 11' 40\" Nord, 0° 39' 47\" Ouest                                          Mythéme GPS : 48° 11' 40\" Nord, 0° 39' 47\" Ouest","gps":"48° 11' 40\" Nord, 0° 39' 47\" Ouest","images":["../image/image_53/53_Martign%c3%a9_Mayenne_1.jpg","../image/image_53/53_Martign%c3%a9_Mayenne_2.jpg","../image/image_53/53_Martign%c3%a9_Mayenne_3.jpg"]},"Consult_chateau_formulaire42ea":{"id":"Consult_chateau_formulaire42ea","dept":"53","canton":"Lassay-les-Châteaux","commune":"Martigné sur mayenne","nom":"Martigné_Mayenne_II","type":"Château","periode":"XVIII-XIX","histoire":"MOTTE-HUSSON, au XIVe siècle, le fief de la Motte-Husson dépend de la paroisse de la Motte. Henri de Husson, seigneur de Montgiroux vers 1406, reçoit aveu de Jeanne « La Voyère d Aron » en 1394. Le château de la Motte-Husson a été construit au XIXe siècle sur l'emplacement d'une ancienne motte castrale et château fort du XVe siècle. D'après une description faite en 1600 lors de l'acquisition du château par la famille de Baglion, descendant des princes de Pérouse ; « La Motte-Husson possédait un portail où il y a un pont-levis, une chambre sur le dit portail, un pigeonnier sur le tout, couvert d'ardoises,  derrière une petite cour, des fossés et des douves autour des cours, un chenil auprès du portail ». À la demande de la comtesse Louise-Dorothé Baglion de la Dufferie.","architecture":"MOTTE-HUSSON, le château de la Mothe-Husson actuel a été construit de 1868 et 1874. Il est flanqué de 2 grandes tours à poivrière et possède un perron à double rampe. Il est entouré d'anciennes douves carrées, avec un jardin potager, une écurie, une orangerie et un parc.  en 2015, le château de la Motte-Husson fut racheté à la famille Baglion de la Dufferie par le présentateur de télévision anglais Dick Strawbridge  et son épouse Angela, une série télévisé nommée « Escape to the Château » sur la chaine britannique Channel Four fut consacré à la rénovation, et à la mise aux normes du château en raison de la présence de mérule, d'amiante et de plomb dans le bâtiment.  sa destination actuelle permet d'en faire une résidence, séminaires, hébergement touristique et autre  de courte durée.","habitants":"Motte; Famille de Husson                                                                   Famille Baglion de la Dufferie                                                           Aulne; Famille de Montpinçon\r\n        \r\n        \"","divers":"Martigné le château de la Motte-Husson                                                     GPS : 48° 13' 23,43\" Nord, 0° 41' 52,85\" Ouest","gps":"48° 13' 23,43\" Nord, 0° 41' 52,85\" Ouest","images":["../image/image_53/53_Martign%c3%a9_Mayenne_II_1.jpg","../image/image_53/53_Martign%c3%a9_Mayenne_II_2.jpg"]},"Consult_chateau_formulairef02a":{"id":"Consult_chateau_formulairef02a","dept":"53","canton":"Gorron","commune":"Landivy","nom":"Mausson","type":"Château","periode":"XVe-XVIe","histoire":"MAUSSON, le château de Mausson fut rasé durant la Guerre de Cent Ans. Ce château fut tantôt rival, tantôt ami de celui du Pontmain, beaucoup plus ancien mais aujourd'hui détruit. Un simple regard sur un tel édifice permet d'imaginer le long passé qui veille ou sommeille ici, de luttes féodales, droits particuliers aux limites de la France et de la Bretagne, chouannerie. Reconstruit au XVe siècle, il conserve de très jolies sculptures Renaissance. Ce domaine seigneurial fut possédé par d'illustres familles, les de Landivy, de Scépeaux, de Romilly, d'Alba, etc. jusqu'à la Révolution Française.","architecture":"MAUSSON; Éléments protégés MH : est  composé d'un corps de logis et de diverses parties ruinées : classement par arrêté du 3 février 1912.","habitants":"Famille les de Landivy\r\n        \"","divers":"Château de Mausson à Landivy","gps":"","images":["../image/image_53/53_Mausson_1.jpg"]},"Consult_chateau_formulairee8f6":{"id":"Consult_chateau_formulairee8f6","dept":"53","canton":"Mayenne","commune":"Mayenne","nom":"Mayenne","type":"Forteresse","periode":"XI-XV-XVIe","histoire":"A cinq kilomètres à l'ouest à St Georges de Betevant le Bois-Salar.                                                                                           BOIS-SALAIR, sa construction date du XIXe siècle. Son propriétaire initial était Charles Weyher, se situe dans la forêt de Salair, en bordure de Fontaine-Daniel. Ce château aux allures de château écossais, est doté d'une tour qui domine la forêt environnante, c'est là qu'il mena ses expérimentations sur les tourbillons et trombes marines. Petit à petit, à partir de la fin du XXe siècle, il accueille des orthodoxes. En 2006, les propriétaires Anita et Gabriel Bornand en firent don au Monastère Saint-Antoine-le-Grand à Saint-Laurent-en-Royans. Fin 2013, le Monastère Orthodoxe de la Nativité de la Mère de Dieu déménage, de Godoncourt dans les Vosges, pour venir s'installer à Bois-Salair.                                                                          MAYENNE,  en 1361-1364 est occupé par les anglais. les propriétaire compteront parmi des hommes célèbres, les grandes familles d'Anjou et de Lorraine se succèdent, puis érigée en baronnie ensuite en marquisat en 1544 et au rang de duché-prairie  en 1573 au profit de de Charles de Lorraine. En 1654 c'est le cardinal Mazarin qui s'en porte acquéreur le léguant ensuite à une de ses nièces, Hortense Mancini qui fera bâtir non loin  du château devenu inhabitable un grand logis, toujours visible. Depuis 1777 date du mariage de la duchesse de Mazarin avec le prince de Monaco, passe donc au Grimaldi qui ne résideront pas au château loue à partir des années 1720 comme prison, fonction qui était la sienne jusqu'en 1935 puis laissé à l'abandon, campagne de restauration à partir de 1990. Éléments protégés MH : le château de Mayenne en totalité : inscription par arrêté du 19 octobre 1927.","architecture":"MAYENNE, au XIXe siècle, de style militaire médiéval. Érigé pour affirmer le pouvoir carolingien face aux Bretons et aux Normands, un palais, conservé sur trois niveaux, a progressivement été enserré dans des structures défensives, jusqu'à devenir un véritable château fort.   Prend lors de la désagrégation de lEmpire carolingien une importance majeure qui se concrétise par la construction précoce autour de 900 dun château de pierre, il se développe au XIIIe siècle en une \"basse-cour\" flanquée de douze tours et une \"haute-cour\" fortifiée comprenant un donjon circulaire et un corps de logis. Aménagé au XVe siècle en fonction des nouveaux besoins de lartillerie, lensemble est remblayé en terrasse et les tours partiellement arasées au XVIIe siècle. Spécimen intéressant de larchitecture du XIIIe siècle, militaire et résidentielle, il apparaît surtout comme un site archéologique majeur, avec la récente découverte du bâtiment carolingien partiellement en élévation dans la haute-cour, un musée de site (crypte) présente ces différents aspects. La plupart de ses éléments visibles datent du XIIIe siècle, dont son logis et le donjon circulaire. L'apparence extérieure est typique du Moyen Age : l'enceinte flanquée de tours épouse la forme d'un promontoire rocheux, et une haute-cour confinée sur le sommet du promontoire. Suite aux guerres  des transformations successives ont grandement altéré l'édifice, et celui-ci ne présentait qu'un intérêt modeste, avant 1993. Cette année-là, des travaux de rénovation furent entrepris. Ils permirent de découvrir des arcades en brique de l'époque carolingienne. Cette découverte est majeure, car les édifices militaires carolingiens encore visibles sont extrêmement rares en Europe. D'importantes fouilles furent conduites, de 1996 à 2000,  a été transformé en un Musée, qui domine la vieille ville, est le monument le plus remarquable de Mayenne. La Ville de Mayenne en est propriétaire. Le château de Mayenne est classé aux M.H depuis 1927.","habitants":"Famille de Charles Weyher\r\n        \r\n        \r\n        \"","divers":"A cinq kilomètres à l'ouest à St Georges de Betevant le Bois-Salair       GPS : 48° 18' 10\" Nord, 0° 37' 05\" Ouest                                                 Bois Salair Grav-6   GPS : 48° 16' 31\" Nord, 0° 41' 04\" Ouest","gps":"48° 18' 10\" Nord, 0° 37' 05\" Ouest","images":["../image/image_53/53_Mayenne_1.jpg","../image/image_53/53_Mayenne_2.jpg","../image/image_53/53_Mayenne_3.jpg","../image/image_53/53_Mayenne_4.jpg","../image/image_53/53_Mayenne_5.jpg"]},"Consult_chateau_formulaire44cf":{"id":"Consult_chateau_formulaire44cf","dept":"53","canton":"Meslay du Maine","commune":"Meslay du Maine","nom":"Meslay_Arcis","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Meslay du Maine ; Arcis et la  Touche.                       ARCIS,  Robert Le Vexel fut le premier propriétaire connu des Arcis au XIVe siècle siècle,  Catholique ayant participé aux guerres de religion, au début du XVe siècle Charles de Cervon donne entre 1575 et 1622 . Au XVIIIe siècle, les Arcis deviennent la propriété de la famille de Montesson puis des Avril de Pignerolle, bien connus à Angers où ils dirigeaient une académie déquitation, ils mettent les Arcis au goût du jour : les murs de la cour sont abattus et le pont-levis a disparu. Les grilles au bout dun pont dormant donnent accès à l'édifice. Henriette Avril de Pignerolle apporte par son mariage la propriété à la famille Raguenet de Saint Albin, ceux-ci entreprennent en 1890 et 1910 la   construction   d'un pavillon à l'angle interne, il servit de lieu de rassemblement lors de l'insurrection légitime  de 1832,  dimportants travaux de restauration, mais doivent se séparer des Arcis en 2003. Les propriétaires actuels ont à cur de continuer les restaurations des bâtiments et d'aménager le beau parc.                                                         La TOUCHE, le manoir de la Touche fut acheté, avec ses terres, en 1634, par les ursulines à René dHéliand, seigneur de la Touche.Dès son achat les ursulines commencèrent leur uvre denseignement des jeunes filles dans ce manoir avant la construction du couvent. En 1642, le manoir sintégra aux nouveaux bâtiments du couvent. A lintérieur dune cour fermée, une tour descalier à vis polygonale permet daccéder aux différents niveaux de la demeure : un rez-de-chaussée qui constituait la grande salle, un premier étage divisé en deux salles et un étage sous comble.Aujourdhui, le bâtiment abrite lOffice de tourisme et lécole de musique.","architecture":"ARCIS, au début du XVe siècle quadrilatère  délimité par de large douves.  il ne reste plus de cette époque que des vestiges de tours. aux Arcis un plan de forteresse médiévale et son aspect souriant de château de la fin de lépoque Renaissance. Une vaste cour carrée, bordée d'un corps de logis en équerre, les bâtiments des communs flanqués du colombier et d'un donjon commandent l'entrée de la cour.  Éléments protégés MH : les éléments suivants composant le château : en totalité le donjon et la tour surmontée d'un dôme qui flanque les bâtiments des servitudes ; le grand et le petit salon au premier étage du logis avec leur décor ; les douves avec leurs murs ou talus de soutènement ; l'avant-cour ; le portail et garde-corps métalliques qui bordent la plate-forme du logis ; les hauts et bas jardins, les ponts qui en permettent l'accès ; l'orangerie ; le garde-corps en claustra qui domine les parcelles du jardin potager ;  la maison du jardinier ; le bâtiment dépendant de la ferme du château. Les façades et les toitures du bâtiment des servitudes et du logis proprement dit, des bâtiments du domaine des XVIIIe et XIXe siècles : inscription par arrêté du 28 février 2006.","habitants":"Arcis; famille de Montesson\r\n        \r\n        \"","divers":"Trois châteaux à Meslay du Maine ;                                                         Arcis et la Touche grav 6-7                                                             GPS : 47° 56' 03\" Nord, 0° 31' 06\" Ouest","gps":"47° 56' 03\" Nord, 0° 31' 06\" Ouest","images":["../image/image_53/53_Meslay_Arcis_1.jpg","../image/image_53/53_Meslay_Arcis_2.jpg","../image/image_53/53_Meslay_Arcis_3.jpg","../image/image_53/53_Meslay_Arcis_4.jpg","../image/image_53/53_Meslay_Arcis_5.jpg","../image/image_53/53_Meslay_Arcis_6.jpg","../image/image_53/53_Meslay_Arcis_7.jpg"]},"Consult_chateau_formulairec14c":{"id":"Consult_chateau_formulairec14c","dept":"53","canton":"Evron","commune":"St-Christophre de Luat","nom":"Montecler","type":"Château","periode":"XVI-XVII","histoire":"MONTECLER, partie sur la commune de Saint-Christophe-du-Luat, lautre partie sur celle de Châtres-la-Forêt. En janvier 1616, pour reconnaître les services d'Urbain de Montecler, « même aux derniers mouvements », le roi Louis XIII érige la châtellenie « en titre, dignité et prééminence de marquisat, sous le nom de Montecler ».  Le 21 février 1644, André de Montecler, qui venait d'acquérir la seigneurie du Tremblay, obtint du baron d'Entrammes de relever nûment du roi, « en franc alleu noble, à raison de sa baronnie de Château-Gontier ». Plus tard le baron d'Entrammes cède tous ses droits sur le château de Montecler, moyennant une somme  et permet au marquis de se donner au roi, comme seigneur et baron de Château-Gontier, en franc-aleu, sans préjudicier toutefois à la mouvance du Tremblay qui continue d'obéir en entier à la baronnie d'Entrammes, dont le seigneur conserva le droit de rachat. De nouvelles acquisitions et de précieux privilèges agrandirent et décorèrent ensuite Montecler. Le « titre de marquisat » relevait directement de la couronne ; les fiefs de Moncrintin, la Paillerie, la Saugère, Saint-Léger, les Pins, Saint-Christophe, de Sainte-Suzanne, « à charge de quinze jours de garde » ; le Tremblay, de Château-Gontier.  Le château de Montecler relevait, avant 1789, de Monsieur, frère du roi, par sa baronnie de Sainte-Suzanne, pour la partie située sur Châtres-la-Forêt, et pour l'autre du Tremblay, en Saint-Christophe-du-Luat. \r\nÀ la Prézais, il existe un château du XVIe et du XVIIe siècle. Maintenant, il sert de communs à la ferme.","architecture":"MONTECLER, le château de Montecler demeura inhabité durant la Révolution, il ne reçut que des visites passagères, car, au retour de l'émigration, Mme de Montecler s'installa à Paris où elle était mieux placée pour défendre ses intérêts. M. de Montécler resta à la Rongère, la vie de Paris ne convenait pas à sa santé ébranlée et ses rares voyages dans la capitale n'avaient pour but que de revoir les membres de sa famille pendant la saison d'été tous se trouvaient réunis à la Rongère.\r\nLe domaine de Montecler étant négligé depuis longtemps, M. de Montécler se rendit compte de la nécessité d'avoir un régisseur et nomme, M. Bourmault, qui sera maire d'Évron de 1800 à 1807.\r\nMorin, à son tour, avec les réfractaires de 1812, occupe souvent les bois de Montecler. Enfin, le 27 mai 1832, c'est au château que se réunissent les insurgés royalistes, prêts à tenter un coup de main sur Évron, quand vient le contre-ordre.                                                                                                   CHESNELIERE, sa construction date du XVIe_siècle. Le manoir est inscrit partiellement aux M.H. depuis le 10.12.1927. La porte fortifiée ainsi que le bâtiment à gauche de la porte sont protégés. Le manoir de la Chesnelière est privé et fermé au Public. À la Chesnelière, il reste, dun ancien château, lentrée avec deux petites tours, des meurtrières et des créneaux. Le portail est classé monument historique.","habitants":"Famille de Montecler\r\n        \r\n        \"","divers":"Château de Montecler et de Chesnelière grav 6 à St-Christophre de Luat                                                                     GPS : 48° 8' 58,11\" Nord, 0° 27' 7,16\" Ouest                                             Montecler 48° 07' 37\" nord, 0° 25' 47\" ouest","gps":"48° 8' 58,11\" Nord, 0° 27' 7,16\" Ouest","images":["../image/image_53/53_Montecler_1.jpg","../image/image_53/53_Montecler_2.jpg","../image/image_53/53_Montecler_3.jpg","../image/image_53/53_Montecler_4.jpg","../image/image_53/53_Montecler_5.jpg","../image/image_53/53_Montecler_6.jpg"]},"Consult_chateau_formulaire7d83":{"id":"Consult_chateau_formulaire7d83","dept":"53","canton":"Evron","commune":"Bais","nom":"Montesson","type":"Château","periode":"XVIe-XVIIe","histoire":"MONTESSON , en 1586, Henri III autorisa René de Montesson à fortifier de nouveau son château.  Un procès-verbal d'estimation des biens de Jean-Baptiste le Montesson, mort en 1769, dressé le 26 juillet 1771, donne la description de la maison seigneuriale de Montesson:   Devenu le siège d'un marquisat en 1660, en faveur de Charles de Montesson, le château sera délaissé au profit de La Roche Pichemer, souvenir d'une croisade à laquelle il avait participé  Le château de Montesson est inscrit aux M.H. depuis 1996. Aujourd'hui, grace aux propriétaires M. et Mme Mithouard, il fait l'objet d'importants travaux de restauration.  Edifice dont la construction s'étale sur plusieurs époques : ancien logis seigneurial d'époque médiévale, châtelet d'entrée de la fin du XVIe siècle, logis du XVIIe siècle. Pavillon d'entrée couvert d'une toiture à l'impériale.","architecture":"MONTESSON: deux corps de bâtiments d'un bout à l'autre distribués d'une salle avec cheminée, un cellier, la cuisine à côté, deux chambres, grenier dessus ; un porche au devant de la salle, deux petites chambres dessus, un petit escalier au derrière de la salle, une tour au devant de la cuisine où est l'escalier, un toit à porcs à côté de la dite tour, la chapelle, le portail d'entrée en la cour sur lequel il y a un dôme, deux tours aux deux côtés, le pont au devant. C'est alors qu'il creusa les douves, qu'on construisit encore une enceinte flanquée de tours aujourd'hui rasées à hauteur de parapet, et qu'on édifia le pavillon carré, flanqué de tourelles rondes, qui couvrait le proche et son double pont-levis. Le second corps de logis du château de Montesson est remarquable avec ses tours coiffées de toits, de style arabe, La cour enclose de murs et entourée de fossés, le tout flanqué de trois tours et un pavillon, deux desquelles tours servirent autrefois de fuye. C'est alors qu'il devient principalement une exploitation agricole. Aujourd'hui, grace aux propriétaires M. et Mme Mithouard, il fait l'objet d'importants travaux de restauration.\nÉléments protégés MH : les façades et les toitures du logis du XVIIe siècle ; les murs de soutènement de la plate forme et les tours arasées, les douves protégeant le jardin avec les ponts de pierre, l'assiette archéologique de la plate-forme fortifiée ainsi que la charmille à l'extérieur des douves : inscription par arrêté du 3 juin 1996.  Façades et toitures du logis du XVIIe siècle ; tous les autres éléments subsistants du château, y compris les murs de soutènement de la plate-forme avec ses tours arasées, les douves en eau et les douves sèches protégeant le jardin avec les petits ponts de pierre, l'assiette archéologique de la plate-forme fortifiée ainsi que la charmille à l'extérieur des douves: inscription par arrêté du 3 juin 1996.","habitants":"Famille de Montesson\"","divers":"château de Montessson à Bais         GPS : 48° 15' 08\" Nord, 0° 22' 30\" Ouest","gps":"48° 15' 08\" Nord, 0° 22' 30\" Ouest","images":["../image/image_53/53_Montesson_1.jpg","../image/image_53/53_Montesson_2.jpg"]},"Consult_chateau_formulairecd37":{"id":"Consult_chateau_formulairecd37","dept":"53","canton":"Ernée","commune":"Saint Denis de Gastines","nom":"Montflaux","type":"Château","periode":"XVIIe","histoire":"MONTFLAUX, siège dune petite seigneurie citée au XIVe siècle, le château est construit autour de 1635 pour Charles de Froullay époux d'Angélique de Beaudéan, dame d'honneur de la reine Anne d'Autriche. Louis XIV érigea la terre de Montflaux en comté, le 28 octobre 1670, pour Charles de Froullay grand Maréchal des Logis du roi. En 1714, Renée-Caroline de Froullay marquise de Créqui, y a vu le jour. Après avoir passé son enfance à Montflaux, elle gagna Paris où elle tenait un salon et recevait des philosophes. Montfiaux passa ensuite au baron de Breteuil, aux Matignon, aux Montmorency, aux Talleyrand-Périgord de Valençay, puis aux d'Etchegoyen qui le vendirent en 1931. Montflaux plus ou moins abandonné, occupé pendant la deuxième guerre mondiale par l'hospice de Laon, s'est dégradé. Les propriétaires actuels, Madame Rousseau et sa fille, tentent de sauver ce qui peut l'être encore. Le bâtiment qui présente un
