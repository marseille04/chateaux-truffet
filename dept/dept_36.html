 demeure, de plan rectangulaire, est installée au fond d'une petite cour et conserve une courtine entourée d'un fossé d'eau vive. Ses façades manifestent encore un goût pour la dissymétrie. Un escalier en fer à cheval monte jusqu'à la porte d'entrée.  Le château actuel se présente en un corps de logis rectangulaire de trois niveaux, dressé sur un terre plein quadrangulaire au fond d'une cour que défend un mur percé d'un portail, reste une courtine entourée d'un fossé d'eau, témoin de l'ancien appareil militaire. L'étage noble de la demeure est accessible par un escalier extérieur en fer-à-cheval, à une volée. La porte d'entrée est flanquée de pilastres portant un entablement muni d'une corniche à denticule. L'édifice est couvert d'un toit à deux versants et croupes, en ardoises.                 La ROCHES de plan en équerre à deux niveaux avec  un pavillon d'entrée à trois niveaux lucarnes sur toits brisés.","habitants":"Anjouin; Famille de  Jehan Cheval\r\n        \r\n        \r\n        \r\n        \"","divers":"Château d'Anjuoin; grav 1-2 de la Roches grav 3 à 5","gps":"","images":["../image/image_36/36_Anjouin_1.jpg","../image/image_36/36_Anjouin_2.jpg","../image/image_36/36_Anjouin_3.jpg","../image/image_36/36_Anjouin_4.jpg","../image/image_36/36_Anjouin_5.jpg"]},"Consult_chateau_formulaire1b2d":{"id":"Consult_chateau_formulaire1b2d","dept":"36","canton":"Ardentes","commune":"Ardentes","nom":"Ardentes","type":"Château","periode":"XVI","histoire":"Trois châteaux à Ardentes celui de Clavières, de Villejovet et de Bonnet.                                                                            BONNET  Au sud du village, comprenant une cinquantaine d'habitants, Théodore Patureau, de Châteauroux, avait formé vers 1820, le projet de créer un haras en utilisant certains prés situés sur les bords de l'Indre,  il vendit sa propriété, le 3 décembre 1832, à Alexandre Grenouillet, maître de forges, demeurant au château de Clavières. A sa mort, Bonnet fut, par sa fille Amélie Grenouillet, apporté en mariage à Louis Morin, avocat à Bourges.  Ce sera Raymond Morin qui fera de l'ensemble un château élégant                                                                                                                    CLAVIERES, le château fut construit par Antoine Jugleron et sa femme Catherine de Grobost. En 1680, il servait d'habitation pour les fermiers des forges. Plusieurs fortunes industrielles se succédèrent: Claude Leblanc de Marnaval, Antoine Grétré, la famille Grenouillet. M. Grétré l'acheta comme bien national et le revendit en 1826 à Aubertot, un autre maître de forges. En 1876, le domaine est acheté par M. Berthier de Grandry, dont la famille le possède toujours. \r\nVILLEJOVET est agréablement situé sur un coteau dont le pied est baigné par l'Indre. Son histoire, récente, remonte au milieu du XIXe siècle, période à laquelle M. Armand achète le domaine pour y faire construire une maison bourgeoise. En 1854, M. Bourin, conservateur des hypothèques, y rajoute une tourelle et fait dessiner tout autour un parc. Sa fille, Grillon Desormeaux, le transmet par alliance à la famille de Nègre du Clat. Le moulin au pied du château est mentionné dès le XVIIe siècle. La propriété, restaurée et modernisée en continue de 1998 à 2001, constitue aujourd'hui une location de vacances","architecture":"BONNET  d'immenses baraquements devant servir d'abri de chevaux. Telles est l'origine de la vieille demeure, couverte de lierre, que le propriétaire construisit à proximité pour surveiller facilement son haras. Quant Patureau eut renoncé à l'élevage de chevaux, qui modifia complètement la disposition des dépendances.                                                                                                CLAVIERES, d'après un aveu de 1540 la seigneurie consistait en une maison forte, deux tours, le tout entouré de fossés. Une chapelle dédiée à saint Éloi, fut construite dans la partie droite du château. En 1680,  la restauration de l'édifice fut confiée à Alfred  Dauvergne qui intervint sur les parties hautes et sur les ouvertures des façades. Bordé sur un côté par l'Indre le château est entouré d'un parc de platanes centenaires. On y accède par une entrée flanquée de deux pavillons du XVIIIe siècle. Le corps de logis flanqué de tourelles a subi de nombreuses restaurations. La partie qui forme l'angle sud-est est la plus ancienne et la plus intéressante, elle date du XVIe siècle.","habitants":"Bonnet; Famille Grenouillet                                                           Clavières; Claude Leblanc de Marnaval.                                Villejovet; M. Bourin\r\n        \r\n        \"","divers":"Ardentes château Bonnet grav 1-2 .                                          Clavières; grav 4-5; 46° 44' 35\" Nord et 1° 49' 54\" Est.                                                       Villejovet grav-5.","gps":"","images":["../image/image_36/36_Ardentes_1.jpg","../image/image_36/36_Ardentes_2.jpg","../image/image_36/36_Ardentes_3.jpg","../image/image_36/36_Ardentes_4.jpg","../image/image_36/36_Ardentes_5.jpg"]},"Consult_chateau_formulaireeb12":{"id":"Consult_chateau_formulaireeb12","dept":"36","canton":"Argenton sur Creuse","commune":"Argenton sur Creuse","nom":"Argenton_Creuse","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux à Argenton sur Creuse celui de la  Bazannerie et de Palis.                                                         BAZANNERIE,  érigé au cours du XVIe siècle, mais malheureusement aujourd'hui complètement ruiné. Le propriétaire du château na pas les moyens de lancer des travaux. Pour sauver lédifice, Dominique Moulin tente d'alerter un maximum de monde sur le devenir du château avec des tableaux de peinture.                                                                                                  PALIS, au XVe siècle, il s'agit d'un manoir de plaisance relevant en fief du château de Montusson à  Chasseneuil et habité par la famille d'Émery Fricon, en 1885 et en 1901, par l'architecte Trolliet pour la famille Huard du Plessis de Lamothe. De 1904 à 1914, il fut loué par un romancier populaire, Jules Mary.","architecture":"BAZANNERIE, le corps de logis en pierre calcaire, situé au fond d'une cour, comporte une tourelle d'escalier en ruine. Le toiture du bâtiment, crevé par endroits, est couvert en tuile plate. La grange, long bâtiment rectangulaire du XVIIIe siècle, ferme l'un des côtés de la cour. Le vestige le plus  important consiste en une tour-porche, il s'agit d'une tour carrée animée par une retraite talluttée à larmier. Une baie rectangulaire maçonnée interrompu, en façade, une porte en plein cintre donne accès à la cour. À droite de l'entrée, une mare indique l'emplacement des anciens fossés qui entouraient le site. Une partie du château tient encore debout, mais elle menace de sécrouler.                                                                                         PALIS. reste deux tourelles d'escalier sur la façade nord. La tour cylindrique d'escalier, au sud, datant probablement du XVe siècle, fut convertie en pavillon carré à la suite des grands travaux de reconstruction du XIXe siècle. En effet, le château a subi de nombreux remaniements, notamment en 1865. De nos jours on peut voir deux corps de logis à angle droit ouverts par de larges baies rectangulaires et couverts par une toiture à deux versants en ardoise. Quatre tours et tourelles animent les façades. De ce château dépendaient, au XIXe siècle, trois moulins à farine : du Palis, de Saint-Marin et des Chambons.","habitants":"Bazannerie;   Dominique Moulin                                                 Palis;  famille d'Émery Fricon. \r\n        \r\n        \"","divers":"vestiges de la Bazanerie grav 1-2 et de Palis grav 3.","gps":"","images":["../image/image_36/36_Argenton_Creuse_1.jpg","../image/image_36/36_Argenton_Creuse_2.jpg","../image/image_36/36_Argenton_Creuse_3.jpg"]},"Consult_chateau_formulaire5300":{"id":"Consult_chateau_formulaire5300","dept":"36","canton":"Buzançais","commune":"Argy","nom":"Argy","type":"forteresse","periode":"XV-XVI","histoire":"ARGY, au XIe siècle dépendait du seigneur de Buzançais, un cadet de la famille de Brillac, originaire du Poitou, épouse au XIIIe siècle, l'héritière de la seigneurie d'Argy, le manoir fut racheté par Guy de Brillac en 1444 puis remanié à la fin du XVe siècle, par son fils Pierre, reconstruit  au début du XVIe siècle, par Charles de Brillac juste avant qu'il ne trouve la mort aux cours des guerres d'Italie en 1509. Parmi les seigneurs d'Argy qui succèdent aux Brillac, Il faut noter toutefois Jean Phelypeaux, seigneur de Buzançais et de Palluau. Après diverses familles de haute noblesse, la châtellenie d'Argy échut par adjudication à Claude Douet de la Boulaye en 1766. C'est lui ou son successeur qui firent abattre l'aile Ouest du château.  Au début du XIXe siècle, le domaine d'Argy passa à la famille De Lamotte qui s'occupa aussi avec intérêt du domaine et résida au château. C'est probablement cette famille qui a fait construire l'aile au XIXe siècle à la place du corps de logis primitif. Différents propriétaires se succèdent ensuite, jusqu'à l'abandon des bâtiments à la dernière guerre mondiale. En 1975, le club du Vieux Manoir devient également propriétaire du parc ainsi que des communs dont il entreprend également le sauvetage et la restauration.","architecture":"ARGY, manoir fortifié au XIIe siècle, pré-Renaissance de style Louis XII, situé en pleine campagne berrichonne, Argy propose une vue historique et architecturale dun site militaire de plaine allant du Moyen-Âge jusquà laménagement dune demeure bourgeoise au XIXe siècle. Le château, les communs du XVIIe siècle et le parc de 40 hectares composent un patrimoine dont l'unité a été reconstituée à partir de 1966. Le château et les annexes forment un quadrilatère formé de deux parties: la haute-cour avec le château lui-même et la basse-cour, composée essentiellement de l'église et des communs. La forteresse militaire de plaine datant du XIIe siècle a été transformée dès la fin du XVe siècle par Pierre de Brillac, majordome ordinaire et conseiller de Louis XI avant que son fils le remplace. \r\nL'édifice est classé au titre des M.H. depuis le 14 mai 1930.","habitants":"Famille de Brillac\r\n        \r\n        \"","divers":"Château d'Argy GPS : 46° 56' 20\" Nord et 1° 26' 08\" Est  grav de 1 à 8","gps":"46° 56' 20\" Nord et 1° 26' 08\" Est  grav de 1 à 8","images":["../image/image_36/36_Argy_1.jpg","../image/image_36/36_Argy_2.jpg","../image/image_36/36_Argy_3.jpg","../image/image_36/36_Argy_4.jpg","../image/image_36/36_Argy_5.jpg","../image/image_36/36_Argy_6.jpg","../image/image_36/36_Argy_7.jpg","../image/image_36/36_Argy_8.jpg"]},"Consult_chateau_formulairebd25":{"id":"Consult_chateau_formulairebd25","dept":"36","canton":"La Châtre","commune":"Lourquer Saint-Laurent","nom":"Ars_Indre","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Lourquer st-Laurent ; celui d'Ars de la Châtre et de Vilaine  ARS, la seigneurie d'Ars, revient à Marguerite d'Ars, veuve de Jean de Confolens. Elle le vend  à Marguerite Douerou, veuve de Jean de la Forest. La fille de Marguerite, Anne de la Forest, et son époux Pierre de Chamborant, seigneur de Montgivray et baron de Neuvy-Saint-Sépulcre deviennent propriétaires en 1584. Le château est dans l'héritage de leur fille Marguerite, épouse de René Ysoré, baron d'Hervault et de Pleumartin. Au XVIe siècle Anne de la Forest gouvernante fit terminer les façades, c'est ensuite la famille de Chamborant qui, en 1560 en achève la façade avant de laisser la place à la famille de Béthune, Plusieurs propriétaires se succèdent et en 1727,  puis en 1755, Joseph Hermet receveur des gabelles de La Châtre, Jérôme Bardon qui lui ajoute un parc, le château est adjugé à Jean-Jérôme Bardon, écuyer, secrétaire de Roy. Jean-Baptiste Papet, et son frère Jacques étaient fermiers à Sarzay, près de Nohant, en 1780. Les deux frères l'acquièrent, vers 1782, le château d'Ars, auprès de la Châtre de Jean-Jérôme Bardon Un ami de l'écrivain Georges Sand, Gustave Papet médecin de son état, en fait par la suite l'acquisition au XIXe siècle. Il fut transformé en dépôt d'archives de la Compagnie de Pont-à-Mousson, avant de devenir, en 1980, propriété de La Châtre qui en a entrepris la restauration.   À la mort de Gustave Papet, petit-fils de Jean-Baptiste Papet, en 1892, le château devient par succession propriété de la famille Baucheron de Lécherolles. En 1926, le château est vendu.                                                                                                                             CHÂTRE, en 1937, lancien donjon des Chauvigny devint le musée George Sand.","architecture":"ARS date du XIVe siècle, et est remanié au XVIe siècle. Les origines du château sont encore aujourdhui inconnues, de plan rectangulaire sur soubassement de six travées à deux étages avec lucarnes gothiques sur un toit en croupes accolé de part et autre de tours rondes à mâchicoulis et créneaux sous un toit en poivrière avec lanternon, pavillon  d'entrée saillant reliant l'opposée à trois niveaux  flanquée en façade d'échauguettes en encorbellement sur deux niveaux, ce magnifique château, abrité dans un vaste parc non moins remarquable fut, avant de devenir propriété de la municipalité, la résidence principale des seigneurs d'Ars.                                                                                                     CHÂTRE, la tour rectangulaire est tout ce qui reste du château seigneurial de la puissante baronnie de la Châtre. Au XVIIIe siècle, le donjon est transformé en prison. La tour fut sans doute réédifiée en même temps que les derniers remparts de la ville, entre 1417 et 1440. L'intérieur des quatre étages est desservi par un escalier de pierre à vis en tourelle et composé, à chaque palier, d'une vaste pièce avec cheminée, d'une autre plus petite et d'un cabinet noir.                                                                                             VILAINE, hôtel particulier fut édifié par Bargat à la fin du XVIIIe siècle pour le marquis Étienne-Philippe de Villaines, chef de brigade des gardes du corps du roi, maréchal des camps et armées en 1790. Acheté par la municipalité en 1807, il abrita le collège de la ville jusqu'en 1954. Depuis, il est le siège de la bibliothèque.","habitants":"Marguerite d'Ars                                                                          Famille de Chambrant.                                                                    La Châtre; Famille des Chauvigny \r\n        \r\n        \"","divers":"A Lourquer St-Laurent le Château d'Ars;  gra 1-2-3. 46° 36' 09\" nord, 2° 00' 16 est. La châtre grav -4-5-6 (donjon) Hôtel Vilaine grav 7","gps":"","images":["../image/image_36/36_Ars_Indre_1.jpg","../image/image_36/36_Ars_Indre_2.jpg","../image/image_36/36_Ars_Indre_3.jpg","../image/image_36/36_Ars_Indre_4.jpg","../image/image_36/36_Ars_Indre_5.jpg","../image/image_36/36_Ars_Indre_6.jpg","../image/image_36/36_Ars_Indre_7.jpg"]},"Consult_chateau_formulaire8a43":{"id":"Consult_chateau_formulaire8a43","dept":"36","canton":"Ardentes","commune":"Arthon","nom":"Arthon","type":"Château","periode":"XIII-XIV-XIX","histoire":"Cinq châteaux à Arthon dont celui d'Arthon, de Chandaire, de Corbilly, de Tremblaire et de Puymoreau (pour ces trois derniers  voir article suivant).                                                                                                                                ARTHON,  était au XIIIe siècle, aux seigneurs de Châteauroux. Dès 1313, elle passe aux mains des de Varennes. En 1422, Jean de Varennes se fit accorder, par son suzerain Guy de Chauvigny, la permission de fortifier son château et fit bâtir trois corps de bâtiments avec trois tours, des douves, un pont-levis et un colombier. En 1683, le château d'Arthon voit passer les familles Daussigny, puis Patureau de Leffe en 1766, et Charlemagne jusqu'à nos Jours. Raoul Charlemagne, à la fin du XIXe siècle, fait réaliser d'importants travaux. \r\n CHANDAIRE, la seigneurie de Chandaire, possédée du XIVe au XVIIe siècle par la famille de Laigue, relevait de Châteauroux. L'édifice fut acquis en 1637 par Michel Crublier, sieur du Casson. En 1884, Ernest Crublier de Chandaire succéda à son cousin, de la branche de Fougères, et son fils André, confia à l'architecte Henri Dauvergne la construction d'un château, qui fut bâti en deux campagnes entre 1892 et 1900.","architecture":"ARTHON  présente un corps de bâtiment rectangulaire à un étage, la partie nord avec sa toiture à combles brisés, a été aménagée au XVIIIe siècle, le reste remonte à la fin du XIXe siècle. Cette dernière partie est flanquée d'une tour presque centrale abritant l'escalier et d'une deuxième tour d'angle légèrement plus petite, percée de fenêtres à meneaux.                                                                          CHANDAIRE, le manoir consistait alors en un logis d'un étage couvert d'un vaste toit en pavillon, datant probablement du XVIe siècle, prolongé latéralement par deux ailes basses du XVIIe siècle aux toitures mansardées.  Dominant le ruisseau du Creusançais, ce vaste bâtiment présente deux corps de logis d'un étage, réunis en équerre, et percés de nombreuses fenêtres avec plusieurs balcons. L'ensemble est couvert par de hautes toitures d'ardoise, sous lesquelles sont aménagés des combles éclairés par des lucarnes. Les pignons aigus à rampants, ornés de crochets, les fenêtres à meneaux et les souches de cheminées, dont certaines rondes, confèrent à l'édifice son caractère néogothique.","habitants":"Arthon Familles Daussigny.                                                Chandaire  Famille de Laigue.\r\n        \"","divers":"Château d'Arthon 46° 41' 40\" nord, 1° 42' 01\" est ; Arthon grav de 1 à 3.  Chandaire grav 4-5","gps":"","images":["../image/image_36/36_Arthon_1.jpg","../image/image_36/36_Arthon_2.jpg","../image/image_36/36_Arthon_3.jpg","../image/image_36/36_Arthon_4.jpg","../image/image_36/36_Arthon_5.jpg"]},"Consult_chateau_formulaire2736":{"id":"Consult_chateau_formulaire2736","dept":"36","canton":"Ardentes","commune":"Arthon","nom":"Arthon_II","type":"Chateaux","periode":"XV-XVII","histoire":"CORBILLY, du XVIIIe siècle parc naturel de la Brenne,  pays de George Sand, renommée pour son calme. En 1373, la seigneurie de Corbilly appartient à Pierre de Vernusse et compte deux moulins. A partir du XVe siècle, c'est les familles de Laigue, et ensuite de Barbançois qui s'y succèdent. Dès 1691, et durant plus d'un siècle le domaine passe entre les mains de la famille Crublier de Chandaire. Édouard Desjobert, ancien officier de cavalerie et sous préfet de La Châtre de 1815 à 1870, achète la propriété en 1822, après 1865, son fils Léopold fait rajouter au bâtiment un pavillon central.                                                                                                                                                                            PUYMOREAU, abergement mentionné en 1292, le fief est détenu jusqu'au début du XVIe siècle par la famille de Greuille, avant d'échoir aux familles Asse,  d'Orléans puis Crublier à partir de 1622. La propriété resta longtemps divisée entre différents propriétaires, avant d'être réunifiée au cours du XIXe siècle, et de devenir la propriété de la famille Manceron en 1879. Après 1920, M. Desanges, nouveau propriétaire, fit élever, par le célèbre architecte Albert Laprade, un imposant logis dans le style des maisons de maître du XVIIIe siècle      La TREMBLAIRE, l'histoire de la Tremblaire est assez récente puisqu'elle ne remonte pas au delà de 1825, date à laquelle Ernest Périgois le fait construire. Ami de George Sand, républicain convaincu, il est préfet de la Creuse, puis député de l'Indre. En 1857, le château est vendu à M. Beaufumé, puis à Léopold Desjobert de Corbilly.","architecture":"PUYMOREAU, les deux tours du château médiéval de Puy-Moreau se dressent sur une colline bordée par la Bouzanne, non loin de la forêt de Châteauroux. Aujourd'hui,l'ensemble visible, présente un caractère hétérogène. De la maison-forte médiévale, il reste deux tours rondes à l'arrière du logis, encadrant un  édifice totalement remanié dans la première moitié du XXe siècle, et dépourvu de la tourelle d'escalier qui devait se trouver en façade. Vers1900, une campagne de travaux, effectuée pour le colonel Manceron, vit  l'édification de vastes dépendances.                                                                                                         TREMBLAIRE en 1825   l'édifice présente un aspect régulier et symétrique puisqu'il se compose d'un bâtiment rectangulaire flanqué de deux pavillons en retour. Côté jardin, des lucarnes à fronton triangulaire reprennent le rythme régulier des baies du rez-de-chaussé, un pavillon rectangulaire surélevé qui comporte deux étages. Récemment restaurée à usage collectif, le château de La Tremblaire abrite aujourd'hui un centre sportif","habitants":"Corbilly, familles de Laigue.                                      Tremblaire,   Ernest Périgois.                                         Puymoreau, famille de Greuille.\"","divers":"A Arthon le château de Corbilly grav-1. Puymoreau grav_2. Tremblaire_3","gps":"","images":["../image/image_36/36_Arthon_II_1.jpg","../image/image_36/36_Arthon_II_2.jpg","../image/image_36/36_Arthon_II_3.jpg"]},"Consult_chateau_formulaire35a6":{"id":"Consult_chateau_formulaire35a6","dept":"36","canton":"Mézières en Brenne","commune":"Azay le Ferron","nom":"Azay_le_Ferron","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Azay celui d'Azay et celui de Boussée.                                           AZAY-le-FERRON, plusieurs grandes familles ont été propriétaires notamment Grégoire Michel, banquier pour les armées de Napoléon. Famille Turpin de Crissé de 1250 à 1412,  de Frotier de 1423 à 1559, de Crevant de 1560 à 1695, de Le Tonnelier de Breteuil de 1699 à 1731.   Le château passa au XIXe siècle, à la famille Luzarche, famille de \"Maitres de Forges\". En 1951, madame Hersent, fille de madame Luzarche. En 1925 : Marthe, sa fille aînée, hérite du domaine. Elle a épousé Georges Hersent, ingénieur civil, ils vont gérer le domaine jusqu'à leur mort. Ils étaient sans héritiers directs et Mme Hersent, dernière survivante, à légué toute la propriété à la ville de Tours.                                                         BOUSSEE, cette seigneurie relevait de la baronnie de Preuilly. Louis de La Loüe, écuyer,seigneur de Boussée fit hommage au seigneur de Preuilly le 10 juillet 1579. Acquis durant la Révolution par Pierre Cupif, le domaine est vendu en 1819 à Charles-Ignace Casse, neveu du financier Michel Jeune. Celui-ci achète la propriété de son neveu en 1832, pour la revendre aussitôt aux familles Luzarche et Aubertot. À la fin du XIXe siècle, Charles Navers, ancien garde général des propriétés de Michel,  devient propriétaire. Du manoir des La Loüe,il ne reste qu'une grosse tour du XVe siècle, intégrée dans une ferme.","architecture":"AZAY-le-FERRON,  constitué de quatre parties construites à différentes époques : la tour Frotier de la fin XVe siècle, l'aile d'Humières de mi-XVIIe siècle, le pavillon François 1er du XVIe , et le pavillon Breteuil du XVIIIe siècle. Les communs, dits l'aile Cingé, sont quant à eux du XVIIe siècle et sont reliés au château par une galerie  construite en 1926.  Le corps principal d'habitation est composé de quatre pavillons qui témoignent du développement des bâtiments en fonction des goûts et des besoins des différents propriétaires. Ainsi, la tour est le seul vestige important du château féodal qui devrait se prolonger vers l'est. Élevée par Prégent Frotier à la fin du XVe siècle, la date de 1496 est donnée par une inscription au sommet de cette tour, dont la masse trapue est agrémentée de fenêtres percées à une date postérieure, lorsque l'appareil défensif n'eut plus dutilité.  L'aile à haut pignon qui fait suite à la tour, élevée en 1638, est due à Louis III de Crevant que l'on doit la construction du grand commun, terminé par le pavillon Cingé qui présente la même simplicité ornementale que l'aile du XVIIe siècle.\r\nBOUSSEE, le château actuel, construit vers 1840, à l'est de l'ancien manoir, peut être attribué à Alcide Créchet, architecte à Châtillon sur Indre. Château de style XVIIIe, de plan quadrangulaire, en pierres de taille, bâti sur deux étages. La façade Est qui s'ouvre sur un vaste parc à l'anglaise, présente un avant corps en légère saillie ornée de quatre pilastres à chapiteaux  corinthiens. La partie centrale est surmontée d'un fronton triangulaire percé d'un oculus. Le toit à quatre pentes, en ardoises, s'appuie sur une corniche à modillons.","habitants":"Azay; Famille Luzarche.                                                           Boussée Famille de Charles-Ignace Casse.\r\n        \"","divers":"Azay le Ferron ;46° 51' 09\" Nord et 1° 04' 12\" Est. Le château d'Azay grav 1 -à- 5. Boussée grav 6-7_8","gps":"","images":["../image/image_36/36_Azay_le_Ferron_1.jpg","../image/image_36/36_Azay_le_Ferron_2.jpg","../image/image_36/36_Azay_le_Ferron_3.jpg","../image/image_36/36_Azay_le_Ferron_4.jpg","../image/image_36/36_Azay_le_Ferron_5.jpg","../image/image_36/36_Azay_le_Ferron_6.jpg","../image/image_36/36_Azay_le_Ferron_7.jpg","../image/image_36/36_Azay_le_Ferron_8.jpg"]},"Consult_chateau_formulaire3fbb":{"id":"Consult_chateau_formulaire3fbb","dept":"36","canton":"Saint-Christophe en Bazelle","commune":"Bagneux","nom":"Bagneux_Venet","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Bagneux dont Bagneux et Venet et à deux KM à  l'ouest le château de S -Christophe                                                                                   BAGNEUX, au XVIIIe siècle, M. de Mellony est seigneur de Venet et de Bagneux. Au début du XIXe siècle, la propriété appartient à Louis Beaubois qui la vend en 1821 à Ferdinand Agougué de Piemond, garde du corps de Louis XVIII. Vers 1850 elle est acquise par M. Normant, propriétaire de filatures à Romorantin, et passe à sa fille, Marguerite Galand de Longuerue. Les descendants de cette dernière la possèdent toujours. \r\n VENET, la seigneurie de Venet fut créée en 1357 par Renaud de Graçay pour Renaud, son fils bâtard, qui s'en défit en 1373. À la fin du XVe siècle, elle était à Imbault de Grosbois. Elle échut successivement par alliance aux Le Roy, de Perrouin, de Launay, puis de Melloni. Ces derniers, d'origine italienne, firent presque entièrement reconstruire le château au XVIIIe siècle.                                                                                                             ST-CHRISTOPHE,  le château estacheté en 1683 par la famille Mérigot. À la suite de l'union de Catherine Mérigot avec Philippe Heurtault, seigneur de Chaumé et de Villaines, il devient la propriété des Heurtault de Saint-Christophe, ancienne famille  échevinale de Bourges fixée à Issoudun, et de leurs descendants directs depuis 1686. C'est dans la deuxième moitié du XIXe siècle qu'intervinrent  les modifications décisives: démolition des murs d'enceinte, construction de deux tours crénelées en 1868 par l'architecte Alfred Dauvergne et d'une grosse tour d'angle.","architecture":"BAGNEUX, se composait au XVIIIe siècle de deux pavillons de maître et d'un bâtiment composé d'un rez-de-chaussée avec des échoppes, la route passait alors entre les deux pavillons. Après la guerre de 1870, les propriétaires réunirent les ensembles pour obtenir un seul corps de logis. De cette époque, date probablement la tour à briques et colombages. Près du château, présence d'un pigeonnier de 340 nichoirs en grès.                                    \r\nVENET, l'édifice est constitué de deux corps de bâtiments en retour d'équerre. Le premier, à niveau unique, est percé sur la cour de quatre fenêtres et d'une porte-fenêtre surmontée d'un fronton triangulaire. Le deuxième comporte un étage sous un toit à deux versants. La façade compte trois baies par niveau rigoureusement alignées et une petite porte. Au XIXe siècle, une construction prolongea le bâtiment vers le nord, et une galerie encadrée de deux tours rondes, coiffées d'un cône d'ardoise, était plaquée sur la façade arrière. Légèrement à l'écart enfin, se trouve la chapelle.                                                                                                                ST-CHRISTOPHE, le château est situé dans un parc constitué de prairies ponctuées de bosquets de grands chênes, c'est peut-être à l'époque gallo romaine que remonte l'occupation du site. Les fondations anciennes du château datent du XIe siècle, le Château était protégé par des douves dont l'eau s'écoulait vers la métairie des Prés. Le donjon actuel remonte au XVe siècle, la partie centrale de la façade nord date de la Renaissance, les deux grosses tours rondes à mâchicoulis, du XIXe siècle.","habitants":"Bagneux Louis Beaubois.                                                             Venet; famille de Melloni.                                                                 St-Christophe  famille Mérigot.\r\n        \"","divers":"A Bagneux le château de Bagneux grav 1-2,  de Venet 3 à 5 et de St-Christophe 6-7","gps":"","images":["../image/image_36/36_Bagneux_Venet_1.jpg","../image/image_36/36_Bagneux_Venet_2.jpg","../image/image_36/36_Bagneux_Venet_3.jpg","../image/image_36/36_Bagneux_Venet_4.jpg","../image/image_36/36_Bagneux_Venet_5.jpg","../image/image_36/36_Bagneux_Venet_6.jpg","../image/image_36/36_Bagneux_Venet_7.jpg"]},"Consult_chateau_formulaire4669":{"id":"Consult_chateau_formulaire4669","dept":"36","canton":"Belâbre","commune":"Belâbre","nom":"Belabre","type":"Château","periode":"XIX","histoire":"quatre châteaux à Belabre celui de Belabre,  de Jauvard, de Tardets                                                                                                        BELABRE, la prochaine conférence de l'Académie du centre sera présentée par Françoise Trotignon et aura pour thème : Le château de Bélâbre et son parc (vers 1650-1926).Chancelier de Gaston d'Orléans, Jacques Le Coigneux, participe à tous les complots de l'entourage de Marie de Médicis. Il finit par être condamné à mort et ses biens confisqués. Louis XIII le gracie avant de mourir. La régente le gratifie dune charge de Premier président au Parlement de Paris. Il acquiert la terre de Bélâbre qu'il réussit à faire ériger en marquisat en 1650. Sa veuve Eléonore de Chaumont s'installera à Bélâbre où débute la construction d'un hôtel particulier de campagne, entouré dun superbe parc dont la construction nécessitera d'énormes travaux.\r\n Vendu comme bien national en 1793 et inhabité, il sera restauré grâce au milliard des émigrés. Ayant en partie retrouvé son lustre, le château sera détruit par l'implacable vengeance de la dernière marquise de Bélâbre, Marie Vincent de Panette. \r\nJAUVARD, un débarcadère, transformé en abreuvoir, existe au bord de l'Anglin. La terrasse dominant la rivière a été construite au début du XIXe siècle et financée par le propriétaire, M. de Lauradour, grâce à la vente de son portrait peint par Toulouse Lautrec. À noter, les combles éclairés par des houteaux, les épis de faîtage et la belle toiture à la Mansart semblable à celle du château de Bélâbre.                                                                                 TARDETS,  était à l'origine une maison de maître dans laquelle on trouve, comme propriétaire, Monsieur Huard du Plessis à la fin du XIXe siècle. C'est peut-être lui qui fut le bâtisseur du château actuel, qui passa ensuite à ses descendants, les Villatte de Peufeilhoux.","architecture":"BELABRE, publiquement humiliée par les témoignages des habitants de sa commune lors du procès en divorce que lui avait intenté son mari elle fut sauvée in extrémis par son décès. Elle racheta le château en sous-main et le laissa tomber en décrépitude jusquau jour où elle lotit le parc et livra la demeure historique aux démolisseurs en 1926.  Il n'en reste désormais que le soubassement dans l'ile longeant l'Anglin, rappelant au passant la chute de la maison Le Coigneux.\r\nJAUVARD, près du village pittoresque de Jauvard, réuni à Bélâbre en 1822, avec sa chapelle de pèlerinage, son prieuré et ses bâtiments ruraux, s'élève au bord de l'Anglin, dans un parc peuplé de charrmilles et de buis, un beau petit château du XVIIIe siècle, réduction du château de Bélâbre. Les deux habitations communiquaient par bateau.                                                                               TARDETS, il s'agit d'une grande demeure au plan complexe, construite au cur d'un parc aux larges espaces. Plusieurs corps de bâtiment, imbriqués les uns dans les autres, offrent un intéressant jeu de volumes que l'on retrouve dans les belles toitures dont la plus haute est ponctuée par un fin campanile, l'édifice jouit d'une abondante décoration, notamment les ouvertures toutes dotées de croisillons de pierre ainsi que les lucarnes.","habitants":"Jauvard; M. de Lauradour,                                                            Tardets; Monsieur Huard du Plessis\r\n        \"","divers":"A Belabre le châteaux de Belabre grav 1 de Tardets grav 2 et Jouvard grav 3.","gps":"","images":["../image/image_36/36_Belabre_1.jpg","../image/image_36/36_Belabre_2.jpg","../image/image_36/36_Belabre_3.jpg"]},"Consult_chateau_formulaire7112":{"id":"Consult_chateau_formulaire7112","dept":"36","canton":"Vatan","commune":"Saint-Pierre de Jards","nom":"Bellechasse","type":"Château","periode":"XIX","histoire":"BELLECHASSE au centre-Val de Loire, construit au XIXe siècle pour remplacer l'ancien château de la Guichonnerie, propriété de la famille Gaignault de Beaulieu depuis 1771.  le paysagiste Paul de Lavenne de Choulot, pour Sophie de Villesaison, descendante des Gaignault. Le comte de Choulot est à l'origine des dessins et installations de plus de 300 jardins en France et en Europe entre 1820 et 1863, parmi lesquels les parcs paysagers de la commune du Vésinet en Île-de-France.","architecture":"BELLECHASSE, propriété possédant un magnifique parc du XIXe siècle dessiné par le comte de Choulot pour Sophie de Villesaison. Le parc de Bellechasse couvre six hectares. Deux promenades concentriques partent du perron de la  façade Est pour y revenir. Tout au long de l'une ou l'autre de ces promenades, des vues cadrées sont aménagées vers le château de Bellechasse. Ces promenades, dans la conception du comte de Choulot, étaient basées sur le principe de la découverte d'un parc à l'anglaise. Son dessin original a très peu changé. Vous découvrirez au cours de votre promenade, une roseraie, un potager et même un labyrinthe qui vient d'être réaménagé. Le château de Bellechasse se présente en un corps principal à quatorze baies de façade sur deux niveaux, prolongé à chaque extrémité d'une aile dont l'une d'elle est flanquée d'une tour carrée coiffée d'un toit en pavillon surmonté d'un lanternon.","habitants":"Famille Gaignault de Beaulieu\r\n        \"","divers":"Château de Bellechasse","gps":"","images":["../image/image_36/36_Bellechasse_1.jpg","../image/image_36/36_Bellechasse_2.jpg","../image/image_36/36_Bellechasse_3.jpg"]},"Consult_chateau_formulairec7c6":{"id":"Consult_chateau_formulairec7c6","dept":"36","canton":"Châtillon sur Indre","commune":"Châtillon sur Indre","nom":"Bigorne_Pouzieux","type":"Château","periode":"XIII-XVIII","histoire":"BIGORNE,  à la fin du XVIIIe siècle, Bigorne appartenait à la famille de Préville dont son descendant, Pierre Rullière, ancien Lieutenant aux gardes du corps du Roi Charles X, le conserva jusqu'en 1866.                                                  POUZIEUX, le château est formé d'une partie qui devait être l'ancien donjon du XIIIe siècle, avec à l'arrière un bâtiment flanqué de quatre tours qui semble appartenir au XVe siècle. La chapelle, située au deuxième étage du donjon, est ornée de peintures murales dont une scène de crucifixion au-dessus de l'autel. Divers éléments permettent de dater l'édifice actuel du XVe siècle, probablement par Jean de Sorbiers. La présence de la famille de Sorbiers, propriétaire de nombreuses seigneuries dans la région, est en effet attestée en 1428 et 1526, cette famille conservera Pouzieux jusqu'au XVIIIe siècle.","architecture":"BIGORNE, le château, très simple, se compose d'un haut pavillon Le château est formé d'une partie qui devait être l'ancien donjon du  XIIIe siècle, avec à l'arrière un bâtiment flanqué de quatre tours qui semble appartenir au  XVe siècle. La chapelle, située au deuxième étage du donjon, est ornée de peintures murales dont une scène de Crucifixion au-dessus de l'autel, couvert de vigne vierge, flanqué d'une aile en retour en rez-de-chaussée.                                                                                                           POUZIEUX , du XIIIe et XVe siècles,  est formé d'une partie qui devait être l'ancien donjon du XIIIe siècle, avec à l'arrière un bâtiment flanqué de quatre tours. Divers éléments permettent de dater l'édifice actuel du XVe siècle, probablement par Jean de Sorbiers. La présence de la famille de Sorbiers, propriétaire de nombreuses seigneuries dans la région, est en effet attestée en 1428 et 1526, cette famille conservera Pouzieux jusqu'au XVIIIe siècle.","habitants":"Bigorre famille de Préville  \r\n        \"","divers":"Le châteaux fort de Bigorne","gps":"","images":["../image/image_36/36_Bigorne_Pouzieux_1.jpg","../image/image_36/36_Bigorne_Pouzieux_2.jpg","../image/image_36/36_Bigorne_Pouzieux_3.jpg","../image/image_36/36_Bigorne_Pouzieux_4.jpg"]},"Consult_chateau_formulaire975f":{"id":"Consult_chateau_formulaire975f","dept":"36","canton":"Mézières en Brenne","commune":"Saint-Michel en Brenne","nom":"Blizon","type":"Château","periode":"XIV","histoire":"BLIZON, le Blizon était une commanderie de l'ordre du Temple, qui, après la dissolution de l'ordre fut attribuée au XIVe siècle aux chevaliers de Saint-Jean-de-Jérusalem, son domaine s'accrut progressivement au XVIIe siècle. Vendu nationalement en 1793, Le château du Blizon appartenait en 1815 à Antoine Delacoux de Marivaux. En 1872, cette vaste propriété fut acquise par l'industriel Jean Lebaudy.","architecture":"BLIZON se présente sous la forme d'un quadrilatère, dont les faces nord et est sont plus hautes. La façade nord, plus importante, est élevée d'un étage sur entresol et d'un étage en attique. Le corps de bâtiment à cinq travées est flanqué de deux fortes tours d'angle à poivrière du XVe siècle, dont les ouvertures, créées au XIXe siècle comme sur l'ensemble du bâtiment, sont identiques à celles du corps central. La façade est prolongée par une ligne de bâtiments terminée par une tourelle. L'ensemble est sobre et serait même sévère s'il n'était entouré d'un parc comportant un beau massif d'ifs taillés.","habitants":"Famille d'Antoine Delacoux de Marivaux\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Blizon","gps":"","images":["../image/image_36/36_Blizon_1.jpg"]},"Consult_chateau_formulaire3dbf":{"id":"Consult_chateau_formulaire3dbf","dept":"36","canton":"Buzençais","commune":"Neuillay-les-Bois,","nom":"Bois_Robert","type":"Manoir","periode":"XVI-XVIII","histoire":"BOIS-ROBERT, sur la carte de Nicolaï, dessinée en 1571, le \"Boisrobert\" désigne un bois de vaste étendue figuré à l'ouest de la forêt de Châteauroux. Un fief de ce nom, mouvant féodalement de Châteauroux, était une annexe de la tour de Rançay, paroisse de Niherne. François de Douault, seigneur de Rançay, mort avant 1609, le transmit à Madeleine de Douault qui épousa Silvain du Château, écuyer, seigneur de Châteauneuf. Celui-ci fit aveu en 1610 du lieu,  fief et maison seigneuriale de \"Boisrobert\" ainsi que de la métairie et du moulin de Laleuf, qui déjà en 1455 dépendait de Rançay. La terre fut détachée de celle de Villedieu et vendue le 23 août 1878 à M. Adolphe Porcheron qui la céda le 15 décembre 1884 à M. des Champs de Verneix. M.Julien Peyrot Grillon, qui s'en étant ensuite rendu acquéreur, fit bâtir en 1885, une habitation sur les plans de M. Moreau, architecte de Moulins. Cette propriété, au milieu des bois est acquise en 1921 par la famille Patureau Mirand.","architecture":"BOIS-ROBERT, manoir dont l'édifice central et rectangulaire sur soubassement à trois niveaux, pavillons saillants et lucarnes sur le toit  deux pans et tour à toit pointus.","habitants":"Famille de François de Douault\r\n        \"","divers":"Manoir de Bois Robert à Neuillay","gps":"","images":["../image/image_36/36_Bois_Robert_1.jpg","../image/image_36/36_Bois_Robert_2.jpg"]},"Consult_chateau_formulaire5ec6":{"id":"Consult_chateau_formulaire5ec6","dept":"36","canton":"Saint-Gaultier","commune":"Chitray","nom":"Boismarmin","type":"Château","periode":"XV-XVII","histoire":"BOISMARMIN, le plus ancien  titre concernant \"Boys Marmin\" est un aveu fait en 1443 par André de Malleret à Georges de Sully, seigneur de Voluais et Cors. André de Malleret  est sans doute le constructeur du château dont la partie ancienne du corps de logis date du XVe siècle. La famille Malleret conserve ce fief jusqu'à lamort de Jehan en 1640. Vers 1610, ce dernier prolonge le logis et le dote, au nord, d'une deuxième tour. Jehan n'ayant pas d'héritier direct, le château passe à son neveu Claude Fournier. Son fils et son épouse, Charlotte de Barville, vont amménager les intérieurs à la fin du XVIIe siècle. Le logis est prolongé d'une aile en retour par Louis Charles Fournier de Boismarmin au XVIIIe siècle. Son fils n'ayant pas d'héritier mâle, la propriété passe par mariage dans la famille Thomas des Colombiers, dont les  descendants sont toujours propriétaires.","architecture":"BOISMARMIN, le logis est prolongé d'une aile en retour, l'édifice se compose de deux ailes à deux étages flanquées de deux tours rondes. Le logis primitif occupe l'extrémité ouest et présente en avant de sa façade une ancienne tour d'escalier","habitants":"Famille Malleret\r\n        \"","divers":"Château de Boismarin à Chitray","gps":"","images":["../image/image_36/36_Boismarmin_1.jpg","../image/image_36/36_Boismarmin_2.jpg"]},"Consult_chateau_formulaire8219":{"id":"Consult_chateau_formulaire8219","dept":"36","canton":"Issoudun-Sud","commune":"Bommiers","nom":"Bommiers","type":"Vestiges","periode":"XII","histoire":"Trois châteaux à Bommiers,  celui de Bommiers , des Minimes et du Bourg.                                                                                                                                                                                    BOMMIERS-MINIMES  A la fin du XIIe siècle, Robert de Bommez propriétaire du lieu. Ce personnage peu connu a pourtant été mandé par le Roi de France Philippe Auguste pour fidéliser de nombreux Barons du royaume.  En 1288,  à la famille Thibault. En 1310, le dernier représentant de la famille  décède sans héritier mâle, passe en 1403, à la famille Dauphin. En 1415, Guichard II Dauphin décède à la bataille d'Azincourt. En 1444, à Georges de La Trémouilles. Durant ce XVe siècle, de nombreux travaux sont effectués au château. En 1446, le château appartient à Catherine de l'Isle. En 1474 , Louise de Trémouille est dame de Bommiers. En 1485, par mariage avec Marie de Sully (fille de Catherine), le château est possession de Jean de La Trémouille. A partir de 1494, Jacques de Trémouille, chambellan du Roi, accompagne Charles VIII dans la campagne d'Italie. En 1515, Jacques de Trémouille décède. passe à son frère Louis II. En 1525, Louis II est tué à la bataille de Pavie. A la fin du XVIe siècle, des casemates d'artillerie sont construites. En 1610, Charlotte-Catherine donne le château à son fils Henri II de Bourbon. En ce début du XVIIe siècle, Henri II achète le Duché de Châteauroux. Par  cet acte, il condamne par l'abandon le château de Bommiers. Les douves sont asséchées. En 1737, après le rachat du Duché de Châteauroux par Louis XV , le site semble abandonné. Ruine sera son avenir.","architecture":"BOMMIERS, vestiges, rien de ce qui subsiste ne semble antérieur au XIIIe siècle. Il dut subir un siège pendant la Fronde en 1630. Sa ruine ne commença qu'après le rachat du duché de Châteauroux par Louis XV. Les vestiges comportent une basse-cour quadrangulaire dont ne subsiste quune impressionnante courtine (début XIIIe), une cour dont il ne reste que lenceinte en forme de botte. Aucune autre tour ne flanquait les courtines presque intégralement conservées. Un saillant rectangulaire : mur gouttereau nord dune chapelle romane. Puis une impressionnante motte portant jadis un donjon du XIIe, il ne reste que la base de 14 m. Il était protégé par une chemise polygonale renforcée par deux tours du XIIIe encore bien conservées. Comme la plupart des châteaux du Bas-Berry, Bommiers a subi dimportantes reconstructions après la Guerre de Cent Ans, seule subsiste lossature ancienne. Il est parmi les rares châteaux à motte fossoyée et cour des XIIe/XIIIe s, au côté de Châtillon, Cluis et Brosse.                                                                              BOURG Le château comprend trois enceintes : celle de la motte du donjon, celle dela basse-cour, et celle de la grande cour communiquant avec la précédente par un pont-levis. Le donjon est une tour circulaire avec chemin de ronde  fermé par une enceinte ovale, flanqué au nord de deux tours. L'accès à la basse cour se fait par un portail cintré flanqué de deux tours, casemates dans l'enceinte voûtée en berceau. Au fond de la grande cour se trouve le manoir du XVe siècle.","habitants":"Bommiers Famille Thibaul\r\n        \"","divers":"Vestiges  à Bommiers 46° 47' 44\" nord, 1° 59' 10\" est","gps":"","images":["../image/image_36/36_Bommiers_1.jpg","../image/image_36/36_Bommiers_2.jpg","../image/image_36/36_Bommiers_3.jpg","../image/image_36/36_Bommiers_4.jpg","../image/image_36/36_Bommiers_5.jpg","../image/image_36/36_Bommiers_6.jpg"]},"Consult_chateau_formulaireb147":{"id":"Consult_chateau_formulaireb147","dept":"36","canton":"Le Blanc","commune":"Rosnay","nom":"Bouchet_Brenne","type":"Forteresse","periode":"XIII-XIX","histoire":"Deux châteaux à Bouchet celui de Bouchet et de Anscebon.                                                                                   BOUCHET, le château devint la propriété de Pierre de Naillac. À sa mort survenue vers 1360, le château revient à sa veuve, Héliotte de Prie, qui l'avait déjà quitté pour Artaud dUssel, chef de bandes. Ce dernier livre le Bouchet à Gautier Mellot, partisan anglais qui à son tour le lègue à un autre partisan anglais Jannequin Durant, qui le laisse à son épouse Isabelle de Bret et sa fille Sybille la Feuille. Vers 1370, le château est repris par Pierre dOradour, issu dune grande famille poitevine, cousin germain et le plus proche parent et héritier de Pierre de Naillac. Le Bouchet restera dans la famille d'Oradour jusqu'en 1451 où il devient la propriété de la famille Taveau de Mortemer. En 1447, dans un procès, il est dit que le seigneur du Bouchet Louis d'Oradour, dit Sandebaud, est lépreux et que sa femme Jeanne de Maillé est obligée de vivre avec lui, mais qu'elle s'enfuit auprès de son oncle Geoffroy Taveau, contrariant le mari qui décèdera en 1449. En 1519, le château était la propriété de Gabriel de Rochechouart, premier duc de Mortemart. En 1789, Victurnien de Mortemart émigre et le château vendu à Pierre Huard de La Vignauderie, capitaine des chasses du duc de Mortemart, le rachète en 1796, pour le restituer au duc à son retour en France en 1802. En mars 1808, le château est vendu par le duc de Mortemart, au maire de Rosnay, Victor Hérault de la Véronne, dont descend l'ancienne propriétaire, Chantal Hérault de La Véronne, classement au titre des M.H. depuis le 23 septembre 1955,                                                                                                   ANSCEBON   Un rendez-vous de chasse a été construit avant 1880 pour M. Girard de Villesaison et agrandi à la fin du XIXe siècle.","architecture":"BOUCHET est une ancienne forteresse médiévale, elle  est bâtie autour dune cour fermée, entouré de fossés. Le corps de bâtiment et les 2 tours situés à droite de lentrée dans la cour, datent du XIIIe siècle. Ces deux tours, dites du « pigeonnier » et « prison » sont encore reliées par une courtine portant un chemin de ronde. Le grand donjon à gauche de lentrée a été construit au XIVe siècle, et le « petit donjon » ou « donjon anglais », construit par les anglais pendant la guerre de cent ans fut construit au XVe siècle. L'unique entrée dans la forteresse, fut un pont levis, pour piétons et cavaliers. Dans la cour intérieure, des pierres saillantes devaient soutenir des galeries en bois sur lesquelles donnaient des portes maintenant bouchées. Le reste de la forteresse de la partie sud-ouest, a été détruite au XVIIe siècle, pour la remplacer par une demeure de villégiature. Des traces de cette démolition sont encore visibles dans la cour à proximité du « donjon anglais ». La démolition a permis de construire deux ailes , avec la galerie et la terrasse dominant létang de la Mer Rouge et la Brenne, qui ont été accolés à un mur médiéval. \r\nANSCEBON, la façade nord a reçu un avant-corps vers 1930. Brique et pierre sauf pour l'avant corps de 1930, en moellon de grès avec chaînes de calcaire ; toits à longs pans à pignons couverts pour l'ensemble, en tuiles plates pour le logis et les écuries, la remise et le chenil, en ardoises pour les communs et le logement de domestiques ; toit conique en tuiles en écailles pour les deux tours ; toit en pavillon en tuiles plates pour l'avant corps de 1930.","habitants":"Famille Taveau de Mortemer.\r\n        \"","divers":"Bouchet: 46° 43' 6,74\" Nord, 1° 10' 21,53\" Est","gps":"","images":["../image/image_36/36_Bouchet_Brenne_1.jpg","../image/image_36/36_Bouchet_Brenne_2.jpg","../image/image_36/36_Bouchet_Brenne_3.jpg","../image/image_36/36_Bouchet_Brenne_4.jpg","../image/image_36/36_Bouchet_Brenne_5.jpg","../image/image_36/36_Bouchet_Brenne_6.jpg","../image/image_36/36_Bouchet_Brenne_7.jpg"]},"Consult_chateau_formulairec179":{"id":"Consult_chateau_formulairec179","dept":"36","canton":"Argenton sur Creuse","commune":"Bouesse","nom":"Bouesse","type":"Château","periode":"XIII-XV","histoire":"BOUESSE, au  XIIIe siècle, construction du château par Eudes de Cluis, vassal du seigneur de Châteauroux. En 1239, un acte autorise le seigneur de Bouesse à exercer les droits de basse et haute justice.  Au XVe siècle, le château est acheté par une riche famille Picarde : Les Gaucourt. \r\nVers 1792, les Révolutionnaires vendent le château. En 1855, le château est en mauvais état. Étienne Thimel, son nouveau propriétaire, tente une restauration. A la fin du XIXe siècle, le fils de Etienne les continues.  Au début du XXe siècle, Georges Poussielgue-Russand, gendre d'Etienne, embellit le château et décore la façade coté parc. Au début du XXIe siècle, la découverte de l'extérieur est libre et gratuite. La visite de l'intérieur est interdite. Mais peut être qu'en mangeant dans le restaurant ou en dormant dans l'hôtel, certaines caractéristiques architecturales vous seront révélées.","architecture":"BOUESSE, il date du XIIIe siècle, l'architecture du bâtiment est fondamentalement modifiée avec l'ouverture de fenêtres, grandes salles de confort, larges cheminées, mais en respectant les systèmes défensifs de ce siècle, est devenu un hotel-restaurant étoilés. C'est un château de 17 pièces, pour de grandes receptions avec cuisine professionnelle aux normes, 15 chambres avec chacune leur salle de bain.","habitants":"Famille d' Étienne Thimel\r\n        \"","divers":"Château de Bouesse 46° 37' 01\" Nord, 1° 41' 19\" Est","gps":"","images":["../image/image_36/36_Bouesse_1.jpg","../image/image_36/36_Bouesse_2.jpg","../image/image_36/36_Bouesse_3.jpg","../image/image_36/36_Bouesse_4.jpg","../image/image_36/36_Bouesse_5.jpg","../image/image_36/36_Bouesse_6.jpg"]},"Consult_chateau_formulaireff61":{"id":"Consult_chateau_formulaireff61","dept":"36","canton":"Levroux","commune":"Bouges le château","nom":"Bouges_Chateau","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Bouges dont celui de Bouges et  Sainte-Colombe.                                                                           BOUGES,  En 1759 Charles le Blanc de Marnaval acquiert le domaine et fait construire entre 1763 et 1770,  en 1781  Leblanc de Marnaval assiste à la saisie judiciaire de ses biens, le château passe au marquis de la Rochedragon, ses héritiers le vendront en 1818  à Talleyrand en 1820 l'héritière est Pauline Talleyrand-Périgord. Vers 1828, Antoine-Achille Masson, comte de Montalivet, fit aménager le parc. en 1853 à Mahmoud Benaïad fermier général du pays du Bey à Tunis  et en  1857 à la famille Dufour qui le conserveront jusqu'en 1917. Entre 1897 et 1909, les paysagistes Henri et Achille Duchêne recréèrent, selon une interprétation contemporaine, des jardins à la française aux abords immédiats du château et aménagèrent le parc paysager pour Henri Dufour. En 1917, monsieur et madame Viguier propriétaire  et directeur  du bazar de l'hôtel de ville en ont fait l'acquisition font  procéder à divers embellissements du parc et, dans les années 1950, ils ont fait réaliser un jardin de fleurs, à l'emplacement de l'ancien potager. L'intérêt des jardins tient à la coexistence en parfaite harmonie de ses parties constituantes d'époques et de styles différents. Le château a été légué en 1966 à la caisse Nationale des M. H. et des Sites, devenue le centre des Monuments Nationaux.                                                                                                 SAINTE -COLOMBE transformé en logis de France par  la famille Duquenbronne.  Ce lieu appartenait à Pierre de Boisé en 1543. C'est une ancienne capitainerie qui dépendait de Romsac; selon la tradition orale, un souterrain relierait les deux sites. Sous la Révolution les bâtiments furent transformés en mairie. Le château était flanqué de deux tours rondes, dont une est détruite. La tour carrée est de construction récente.","architecture":"BOUGES, de style néoclassique, élevé sur une terrasse cernée par une balustrade, la cour d'honneur terminée en hémicycle, la grille d'entrée et une perspective vers une allée cavalière dessinée dans les bois du domaine, été attribué sans preuve à Ange-Jacques Gabriel sur la foi d'une approximative similitude avec le Petit Trianon de Versailles bâti par le célèbre architecte entre 1762 et 1768 soit exactement à la même époque, ce qui suffit à rendre cette attribution hautement improbable.  Le château est une construction de plan rectangulaire massé de 28 x 21 mètres comprenant neuf travées sur les grandes façades et cinq travées sur les façades latérales. Les façades principales ouvrent l'une sur la cour d'honneur et l'autre sur la grande perspective du tapis vert. Sous un fronton triangulaire, les trois travées centrales se détachent en léger ressaut, formant un faux avant-corps, sur un fonds de refends continus répondant aux angles traités en bossages à refends. Au rez-de-chaussée, ce faux avant-corps est percé de trois baies en plein cintre, dont la porte d'entrée à laquelle on accède par un perron de quelques marches, et à l'étage de trois baies rectangulaires réunies par un balcon soutenu par quatre consoles. L'axe médian est également marqué par l'utilisation d'un fronton triangulaire, l'emploi de refends continus et l'utilisation d'une baie centrale en plein cintre au rez-de-chaussée, et rectangulaire au premier étage, encadrées d'ils-de-buf percés ou simulés. Chaque croisée des façades latérales est soulignée par un encadrement de plates-bandes qui anime les murets de pierres lisses.","habitants":"Bouges,Famille de  Charles le Blanc de Marnaval.                            Ste Colombe;  famille Duquenbronne.\r\n        \"","divers":"Bouges grav 1 à 4  ; 47° 02' 32\" Nord et 1° 40' 23\" Est, Ste Colombe grav 5 et 6.","gps":"","images":["../image/image_36/36_Bouges_Chateau_1.jpg","../image/image_36/36_Bouges_Chateau_2.jpg","../image/image_36/36_Bouges_Chateau_3.jpg","../image/image_36/36_Bouges_Chateau_4.jpg","../image/image_36/36_Bouges_Chateau_5.jpg","../image/image_36/36_Bouges_Chateau_6.jpg"]},"Consult_chateau_formulaire46c2":{"id":"Consult_chateau_formulaire46c2","dept":"36","canton":"La Châtre","commune":"Briantes","nom":"Briantes","type":"Château","periode":"XV-XVI","histoire":"Château de Montveillé (XIXe siècle)  du Virolan (XIXe siècle)\r\nChâteau du Bois Doré. Un des châteaux du roman Les Beaux Messieurs de Bois-Doré de George Sand. Privé et fermé au public\r\nBRIANTES, au cours des XIIIe et XIVe siècles, la seigneurie de Briantes appartint à une famille de Garet, puis de Malval, alliée ensuite à celle de Cluis, cette dernière conserva le fief jusqu'en 1569. A la Révolution, les biens furent vendus et le château transformé en exploitation agricole. Acquis par Mme Douet de Villesanges née Godefroy, la propriété passa à M. Pierre Malval qui, en 1910 la céda à Adrien Blanchet, membre de l'Institut. George Sand, décrit ainsi le château;                                                                                                                MONTVEILLE, si George Sand fut \"la bonne dame de Nohant\", Charles Delavau fut le grand homme du Boischaut sud: maire de La Châtre de 1830 à1870, président du conseil général de 1848 à 1870, puis député. George Sand stigmatise le \"parti Delavau\", ami de l'ordre et des fortunes acquises. Montveillé est le signe de sa réussite. Ses descendants Richer-Delavau le possèdent toujours. \r\nConstruit en 1857 dans un beau grès du pays, il présente du côté dominant la vallée de l'Igneraie une façade très simple flanquée de deux belles tourelles en quasi hors-uvre. La façade d'arrivée est plus ornée dans le goût néo-Renaissance qui culmine dans une lucarne centrale abondamment décorée de coquilles, pilastres et volutes.","architecture":"BRIANTES dit BOIS-DORE,un pavillon tout neuf, blanc, fluet, couvert d'ardoises. Un autre pavillon déjà très ancien, mais très bien restauré\". La tour dans laquelle se trouve un escalier en vis, haute de 35 m environ, n'a subi aucun changement, seule la base de la porte d'entrée a subi des réparations. Les cheminées à hotte, très simples, du troisième étage sur la façade sud sont anciennes, au deuxième, celle de la chambre dite Renaissance date de la fin du XVIIIe siècle, au moment où le château était un rendez-vous de chasse du marquis de Villaines. À l'extrémité sud-est du parc, le pigeonnier du XVe siècle, avec ses deux mille cinq cents boulins est peut-être le plus beau de la région                                                          MONTVEILLE; de plan rectangulaire  sur soubassement à deux niveaux et lucarnes sur combles, toit en croupes,  accolé en angles de la façade de tourelles à quatres niveaux.","habitants":"Briantes; famille de Garet                                            Monveille  George Sand\r\n        \"","divers":"Château de Briantes grav 1 à 3 et de Montveille grav 4","gps":"","images":["../image/image_36/36_Briantes_1.jpg","../image/image_36/36_Briantes_2.jpg","../image/image_36/36_Briantes_3.jpg","../image/image_36/36_Briantes_4.jpg"]},"Consult_chateau_formulaire6ef7":{"id":"Consult_chateau_formulaire6ef7","dept":"36","canton":"Ardentes","commune":"Buxières d","nom":"Buxières_Aillac","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Buxières d'Aillac celui d'Aillac et de Buxière.                                                                             AILLAC,  le château d'Aillac ou également de L'Orme, fut bâti au début du XIXe siècle par monsieur Bonnault de Villemenard, époux d'une demoiselle Le Roy, héritière d'une partie de la seigneurie de Buxières. .                                                                                                                            BUXIERES, possédée par Adenet de Sully en  1337, la terre de Buxières relevait des seigneurs de Châteauroux. Elle passa  au XVe siècle à la famille de Thianges, puis au siècle suivant dans celle de La Marche, avant d'échoir, au début du XVIIe siècle, à Jean Le Roy. Ses descendants conservèrent Buxières jusqu'en 1849, date à laquelle le domaine fut racheté par la famille Ruyneau de Saint-Georges.","architecture":"AILLAC, cette belle et grande maison de maître flanquée de deux pavillons, l'un carré et l'autre octogonal, est régulièrement percée de larges baies. Cette belle demeure s'inscrit dans une belle perspective boisée non loin du bourg de Buxières.                                                          BUXIERES, du \"chastel et maison noble\" probablement bâti au cours du XVe siècle, il ne subsiste, à l'ouest de l'ensemble actuel, que de vastes communs. C'est vers 1820 que le bâtiment actuel aurait été construit, placé sous une toiture à croupes d'ardoise, il est régulièrement percé de baies en arc surbaissé, et la porte, encadrée de pilastres, est surmontée d'un fronton triangulaire. Une aile en équerre intègre deux lucarnes en remploi du XVIIe siècle à l'arrière. À la fin du XIXe siècle, un pavillon carré d'inspiration orientale, couronné de créneaux et de lanternons, fut adjoint à cet ensemble, que borde un vaste parc.","habitants":"Aillac   Monsieur Bonnault de Villemenard.                    Buxière  famille de Thianges.\r\n        \"","divers":"Le château de Buxières grav 1-2 et d'Aillac grav 3","gps":"","images":["../image/image_36/36_Buxi%c3%a8res_Aillac_1.jpg","../image/image_36/36_Buxi%c3%a8res_Aillac_2.jpg","../image/image_36/36_Buxi%c3%a8res_Aillac_3.jpg"]},"Consult_chateau_formulaire5e57":{"id":"Consult_chateau_formulaire5e57","dept":"36","canton":"Buzançais","commune":"Buzançais","nom":"Buzancais","type":"Château","periode":"XV-XVIII","histoire":"Cinq châteaux à Buzençais celui de Boisrenault, de Chaume, de Landais de Bonneau et de Brosse .                                                                         BOISRENAULT, au XVe siècle:  les familles de Laigue, Couhé de Lusignan, Bertrand du Boisrenault, puis de Guénand s'y succèdent jusqu'à la fin du XVIIIe siècle. Lorsque  Joseph Huard de Boisrenault , en fait l'acquisition en 1788 pour le mariage à sa fille Marguerite qui épousa le vicomte Léonce de Maussabré. Leur plus jeune fils, Louis, y vivra avec son épouse Denise.  En effet, Denise est venue de Belgique avec sa soeur Henriette car cette dernière devait se marier (sans jamais l'avoir vu, -mariage arrangé-) avec le vicomte René Le Pelley du manoir qui habitait à St-Pierre de Lamps. Le mariage de Denise et Louis fut tardif. Quand son neveu Yves du Manoir se marie avec Sylvie, Denise est veuve et leur propose de partager sa demeure.  Ils ont 3 enfants : Olivier, Florence et Véronique.  En février 2000, Yves décède et Sylvie préfère cesser cette activité qui est reprise par Véronique, son mari Miguel  et leurs enfants Hadrien et Yarelli. Miguel,  Florence, qui habitait tout à côté avec ses enfants Elfie, Colas et Marin, revient dans sa maison denfance, et depuis janvier 2016, Elfie et Colas ont repris le flambeau, chambres d'hôtes. \r\nCHAUME, Pierre Poitelon de Chaumes, contrôleur du grenier à sel de Buzançais, en était le propriétaire en 1785.","architecture":"BOISRENAULT,  a été construit de 1882 à 1896 de style renaissance, petite seigneurie comportant une maison de maître avec colombier et deux domaines. L'ancien logis subsiste toujours, mais relégué au rang de communs lors de la construction du château actuel. La façade principale possède un corps principal d'un étage, élevé sur une terrasse abritant les pièces de service, à laquelle on accède par un perron. Il est flanqué à l'est d'un imposant pavillon à deux étages et combles et à l'ouest d'une tour ronde plus élevée que le bâtiment principal et coiffée d'un toit en poivrière. \r\nCHAUME, auprès d'un grand étang sur lequel évoluent des cygnes, le petit château des Chaumes se compose d'un simple corps de bâtiment du XVIIIe siècle au toit de tuiles éclairé par trois lucarnes de pierre. L'édifice est flanqué d'un pavillon plus élevé qui donne à  l'ensemble une certaine dignité. Pierre Poitelon de Chaumes, contrôleur du grenier à sel de Buzançais, en était le propriétaire en 1785.                                                                                  Hermitage à Buzancais hôtel par Alice Sanson","habitants":"Boisernault; famille de Laigue                                                   Chaume, Famille de  Pierre Poitelon de Chaumes\r\n        \"","divers":"Boisrenault à Buzancais ; 46° 53' 27\" Nord, 1° 25' 24\" Est            Grav 5 Chaume","gps":"","images":["../image/image_36/36_Buzancais_1.jpg","../image/image_36/36_Buzancais_2.jpg","../image/image_36/36_Buzancais_3.jpg","../image/image_36/36_Buzancais_4.jpg","../image/image_36/36_Buzancais_5.jpg"]},"Consult_chateau_formulaire3c76":{"id":"Consult_chateau_formulaire3c76","dept":"36","canton":"Buzançais","commune":"Buzançais","nom":"Buzancais_Indre","type":"Château","periode":"XVI-XVII","histoire":"Dans cet article le château de Bonneau, de la Brosse de Landais  et de Marécreux.                                                                                                                  BONNEAU, le hameau de Bonneau fut, de 1645 à 1865, le siège des forges qui exploitait l'énergie de l'Indre et faisait venir le minerai des communes avoisinantes. En 1805, l'usine n'employait pas moins de 300 ouvriers. C'est sans doute le dernier maître de forges qui fit construire l'actuelle maison carrée, de style classique avec ses façades régulières aux appareillages de tuffeau et aux éléments décoratifs discrets, La demeure s'élève sur trois niveaux au-dessus d'un entresol, on accède au rez-de-chaussée de la façade nord par un escalier en fer à cheval qui allège l'ensemble.\r\n BROSSE, a appartenu au XVIIe siècle à la famille de Brouilly mais le château a probablement été bâti par Louis Albert de La Marvaillière, seigneur de La Brosse en 1757, ou par son fils François Albert qui possédait la seigneurie de Saint-Lactencin. En 1795, l'édifice est à Dominique Bonneau de La Perrière, président de la sté d'agriculture. Des adjonctions seront effectuées par ce dernier puis par Adélaïde Pâtureau son épouse, entre 1800 et 1830, sans nuire au style général. On y accède par une avenue bordée de marronniers.                                                                                 Et à quatre kilomètres àl'Est le château de Marécreux à Saint  Lactencin     MARECREUX, vers 1503, Florent de Poix, seigneur de Forges, épousa Catherine du Quartier, dame de Montchenin près de Marécreux qui lui apporta sans doute la seigneurie. Les de Poix gardèrent Marécreux jusqu'en 1844, date à laquelle la marquise d'Aigurande, née de Poix, le vendit au Vicomte de Tanoüarn, époux de Noémie Pocquet de La Mardelle, dont la famille possédait le château de La Mardelle, à quelques lieues de Marécreux. La propriété appartient toujours aux descendants des Tanoüarn.","architecture":"BROSSE, le corps de logis central à deux étages comporte cinq travées légèrement asymétriques. Il est surmonté d'un haut toit d'ardoises percé de trois lucarnes. De chaque côté du corps central deux pavillons moins élevés  sont partiellement masqués par les communs. Côté parc, un large escalier en fer à cheval donne accès au château. Un jardin à la française, cloisonné de charmes, complète agréablement cette belle demeure.                                                                                                            LANDAIS, cette propriété de l'abbaye cistercienne du Landais se composait d'un bâtiment imposant avec un corps central à toiture à pans brisés, encadré de deux pavillons carrés plus élevés. Une grande cour close de murs avec pavillons d'angle, communs, vaste grange, montre que Le Landais était au XVIIIe siècle une exploitation agricole importante en même temps qu'une résidence d'agrément pour les abbés. Les terres plantées en partie de vignes, dominant le faubourg des Marchis, s'étendaient sur les pentes du côteau bien ensoleillé.                                              MARECREUX, le château date du XVIIIe siècle, un plan terrier de 1773 donne une illustration semblable à l'édifice actuel, la tradition familiale indique qu'il fut remanié en 1845. L'édifice, de plan rectangulaire et simple en profondeur, présente deux façades pratiquement identiques, les pavillons présentant toutefois un léger ressaut sur la façade ouest. Les façades sont rythmées de sept travées à chainage de brique et pierre, motif que l'on retrouve aux chaînages d'angle. Le toit à la Mansart, éclairé par trois lucarnes situées au centre et au-dessus des pavillons, souligne l'équilibre des proportions.","habitants":"Brosse; famille de Brouilly\r\n        \"","divers":"A Buzancais le château Bonneau grav 1, de la Brosse grav 2, de Marécreux grav 3, la maison des ducs grav 4-5 et le Landais Grav 6-7.","gps":"","images":["../image/image_36/36_Buzancais_Indre_1.jpg","../image/image_36/36_Buzancais_Indre_2.jpg","../image/image_36/36_Buzancais_Indre_3.jpg","../image/image_36/36_Buzancais_Indre_4.jpg","../image/image_36/36_Buzancais_Indre_5.jpg","../image/image_36/36_Buzancais_Indre_6.jpg","../image/image_36/36_Buzancais_Indre_7.jpg"]},"Consult_chateau_formulaire08f7":{"id":"Consult_chateau_formulaire08f7","dept":"36","canton":"Argenton sur Creuse","commune":"Le Pont-Chrétien-Chabenet","nom":"Chabenet","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Chabenet dont celui de Chabenet, de Cluzeau et Petit Broutet                                                                                                                     CHABENET  construit dans  la deuxième partie du XVe siècle. Il est terminé en 1471.  En 1544, le petit fils de Josselin, Jean du Bois, dit « le rouge », enlève la fille du procureur des causes royales de Poitiers. Il est condamné à mort et se réfugie chez Aubert de Montjohan, qui le cache. Profitant de la situation, celui-ci acquiert le château.  Pendant les guerres de religion, il appartient à la maison protestante Pierre de Buffière. Ce château reste propriété protestante de 1585 à 1735. En 1635, il est partiellement démantelé par Richelieu. Vendu comme bien démigré en 1793, il est racheté en 1803 par la famille de Poix. Louis Thomas Benjamin comte de Poix le fait restaurer en 1850, puis le lègue à sa filleule, Joséphine de Boisé. Il est acheté par M. Leclerc, puis, en 1940 par M. Willem . M. Billon en 1970 , M. Marek en 1980 qui le restaura, M. Petrau en 1990 : et enfin Hapimag en  2000.  L'édifice est inscrit au titre des M.H. en 1927. Dans les années 90 ce répend la rumeur d'un potentiel achat du chateau de la part de Michaël Jackson, certain avançant même la venue du chanteur dans la demeure à ce moment là, mais la vente n'a dans tous les cas finalement pas lieu.\r\nCLUZEAU, vers le XVIe siècle un démembrement se fit, distinguant le Bas et le Haut Cluzeau. Antoine Matheron fut le 1er seigneur du bas Cluzeau, à sa mort en 1607, le domaine passe aux mains de la famille Bien qui le  conserve jusqu'à la fin du XVIe siècle. La famille Dubet, puis Dubet du Bas-Cluzeau, en fut propriétaire jusqu'en 1765. À cette date le château est acheté par Jean-René Couté de Paumule et passe par héritage, au XIXe siècle, à la famille de La Motte-Broons jusqu'à la fin du XXe siècle.","architecture":"CHABENET, en 1471, des fossés larges de 8 toises (15,50 m) sont creusés par une entreprise de Saint-Gaultier. Il comprenait alors 14 tours et un donjon. Forteresse  dont le corps de logis central à quatre niveaux accolé de tours rondes crénelées avec mâchicoulis et chemin de rondes, échauguettes et donjon de plan carré toit à quatre pans .                                                                                       PETIT-BROUTET, gentilhommière au Moyen Âge, il relevait de Chabenet de 1520 à 1790. Il appartient à la famille Du Bost, en 1794 puis fut vendu comme bien démigré à Jean Rivet. Après la Révolution, il est racheté par la famille du Bost qui le conserve jusquen 1869, puis fut acheté par M. Barault cultivateur qui le cède à sa fille mariée à un Poitrenaud. En 1898, il est vendu au baron Liebert de Nitray, puis en 1902, il devient la propriété de M. Gleyrose. En 1925 M. Vacher industriel lachète et en 1929, à sa mort en 1958, cest M. Ballereau diplomate qui en est le propriétaire. Son héritier Ballereau fils demande à M. Bouchetal, directeur chez Hachette, de le vendre et cest ainsi que la commune en devient propriétaire et y installe la mairie. \r\n le Petit Broutet construit au XVe siècle comprend un corps de logis flanqué à ses extrémités de tours rondes en poivrières, dont une à mâchicoulis, l'entrée ayant autrefois été protégé par un pont-levis.","habitants":"Chabenet; Famille de Josselin du Bois                                          Petit Broutet  famille Du Bost                                              Cluseau;famille Dubet\r\n        \"","divers":"Château de Chabenet Grav 1 à 7; 46° 37' 30\" Nord et 1° 29' 55\" Est                                                                                                  Petit-Brouté;46° 37' 51\" Nord, 1° 28' 53\" Est grav 8 ,              Cluzeau à Chasseneuil grav 9.","gps":"","images":["../image/image_36/36_Chabenet_1.jpg","../image/image_36/36_Chabenet_2.jpg","../image/image_36/36_Chabenet_3.jpg","../image/image_36/36_Chabenet_4.jpg","../image/image_36/36_Chabenet_5.jpg","../image/image_36/36_Chabenet_6.jpg","../image/image_36/36_Chabenet_7.jpg","../image/image_36/36_Chabenet_8.jpg","../image/image_36/36_Chabenet_9.jpg"]},"Consult_chateau_formulaire666e":{"id":"Consult_chateau_formulaire666e","dept":"36","canton":"Saint-Christophe en Bazelle","commune":"Chabris","nom":"Chabris","type":"Château","periode":"XV","histoire":"Quatre  châteaux à Chabris celui de Campoix, de Beauregard de Laborde et de Poulaine.                                                                                                             BEAUREGARD,   fut habité jusque vers l'année 1880 par la famille de Béthune, le marquis l'avait acquis en 1605  de Guillaume de Rabeau, à l'époque seigneur  de Beauregard de Chabris.                                                                         CAMPOIX   Sans doute dû à M. Achille Auger, cet édifice néogothique est construit dans la seconde moitié du XIXe siècle. Il remplace une construction d'origine médiévale. Campoix apparaît en effet en 1453, et relève de la baronnie de Graçay et est détenu par Pierre Le Roux. Il est ensuite aux mains des Grangier au XVIe siècle, de La Primaudaye au XVIIe siècle avant de passer aux de Villamblin. Sa vente en 1802 marque la fin du caractère noble du lieu.                                                                POULAINE, la dendrochronologie a daté les deux parties ouest et est du château des années 1504-1507 pour lune et 1519-1520 pour lautre. La période de travaux révélée par létude de Dendrotech correspond donc pleinement à celle de la détention de la seigneurie de Poulaine par François Herpin et Catherine du Bois, entre leur union vers 1504  1505 et le décès de François Herpin en 1525, en 1741 acquisition par Hyppolyte du Coudreau, succession de feu Jacques du Chalais», propriétaire de Poulaine depuis 1762, en 1816  décès de Jean-Baptiste Hippolyte Godeau. Le château passe à Marie-Joséphine, sa fille, épouse de Victor de Brettes, en 1846  mariage de Sylvie-Anne de Brettes, fille de Victor, avec son cousin Martial de Brettes à Poulaine. Au  XXe siècle\r\nLe domaine de Poulaine sera vendu au milieu du XXe siècle à M. Brillard. Les actuels propriétaires le rachèteront à ses descendants en 1991.","architecture":"BEAUREGARD, de plan en équerre  à deux niveaux et lucarnes sur combles, pavillon saillant en façade.                                                                                                     CAMPOIX, le château actuel présente un étage au-dessus d'un rez-de-chaussée surélevé dont l'accès se fait par un escalier droit ornementé, aboutissant à un porche clos, surmonté d'un balcon. L'ensemble est coiffé d'un haut toit d'ardoise à quatre pans supporté par une corniche, ornée de gargouilles saillantes aux angles. Trois grosses tours circulaires flanquent l'édifice, deux sur les angles, la troisième en milieu de façade. Celle-ci présente, au sommet, un chemin de ronde protégé par un parapet sur mâchicoulis. L'ensemble est complété par des communs de brique et de pierre particulièrement soignés.                                                                                                                           LABORDE à Varennes sur Fouzon . Celui-ci fut construit de 1860 à 1863, dans un style néo-Renaissance par l'architecte Alfred Dauvergne pour Gustave Boullet. Il se compose d'un imposant massif carré, flanqué d'une tour ronde sur chaque angle. La façade principale est marquée par un avant-corps central saillant, ornés d'échauguettes d'angle. En avant de celui-ci s'élève un escalier monumental permettant l'accès depuis la terrasse au rez-de-chaussée surélevé. Le château de la Borde présente sur ses murs un décor abondant: cordons, pilastres, chapiteaux et corniche au sommet. Les combles sont éclairés par des lucarnes d'esprit Renaissance, et enfin l'entrée du domaine est ornée de deux grands portails.                                                                                                          POULAINE, de plan rectangulaire à deux niveaux et lucarnes sur un toit recouvert d'ardoise à deux pans, tour carré à l'écart sur parc à la française ainsi que des grandes  dépendances.","habitants":"Hyppolyte du Coudreau,\r\n        \r\n        \r\n        \"","divers":"A Chabris le château de Beauregard grav 1,  de Campoix grav 2-3, de Laborde grav 4 de  Poulaine grav 5.","gps":"","images":["../image/image_36/36_Chabris_1.jpg","../image/image_36/36_Chabris_2.jpg","../image/image_36/36_Chabris_3.jpg","../image/image_36/36_Chabris_4.jpg","../image/image_36/36_Chabris_5.jpg"]},"Consult_chateau_formulairefd64":{"id":"Consult_chateau_formulairefd64","dept":"36","canton":"Saint-Benoit-du Sault","commune":"Chaillac","nom":"Chaillac","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux  à Chaillac celui de Chaillac et de Raidoux ,  de Bernarderie, de Brosse et de forges la M.F, du Grand Missée et du Breuil sur article suivant pour ces trois derniers.                                                                                                      CHAILLAC,                                                                                 \r\nM .F.du Breuil, le petit château, ou maison-forte du Breuil, a été construit à la fin du XVIe siècle. Le Breuil, fief relevant de la châtellenie de Chaillac, est demeuré dans la famille de Fougières de 1597 à 1820\r\nM.F. de la Grande Missée, cet ensemble architectural est caractéristique des maisons seigneuriales de la fin du Moyen-Age et du début de l'époque moderne dans cette région. Il s'inscrit dans une cour rectangulaire et présente une allure défensive (enceinte maçonnée, tours circulaires) à valeur essentiellement symbolique. Le logis est organisé selon un plan allongé en fond de cour et sa distribution a été préservée. Trois pièces occupent chaque étage et un escalier à vis ménagé dans une tour en avant de la façade assure les communications intérieures. Une remise avec écurie datant du XIXe siècle est encore visible ainsi que le colombier. La grange-étable est aujourd'hui en ruines.\r\nRAIDOUX, le château décrit d'abord comme métairie, étang et bois en 1484, Le Riadoux devient \"hôtel et lieu noble\" en 1529.","architecture":"CHAILLAC, d'allure massive, cette belle bâtisse s'élève au centre du bourg, à une quarantaine de mètr
