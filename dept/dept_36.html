     \r\n        \"","divers":"St-Hilaire Grav 2_3  Aigues 46° 33' 46\" Nord et 1° 04' 32\" Est                                                                        Céré; Grav 4 .  46° 33' 46\" Nord et 1° 04' 32\" Est                 Villemarzault grav 5","gps":"","images":["../image/image_36/36_St_Hilaire_Benaize_1.jpg","../image/image_36/36_St_Hilaire_Benaize_2.jpg","../image/image_36/36_St_Hilaire_Benaize_3.jpg","../image/image_36/36_St_Hilaire_Benaize_4.jpg"]},"Consult_chateau_formulairefc76":{"id":"Consult_chateau_formulairefc76","dept":"36","canton":"Belâtre","commune":"Saint Hilaire sur Benaize","nom":"St_Hilaire_sur Benaize","type":"Château","periode":"XIX","histoire":"AJONCS appartenaient au milieu du XIXe siècle à la famille Thomassin. En 1870, Oscar Thomassin légua la propriété, avec des moyens financiers, à la commune de Saint-Hilaire pour fonder un hospice. Celui-ci fonctionna de 1884 à 1937. Dordonnance symétrique, le château se compose dun corps de logis présentant curieusement quatre ouvertures en rez-de-chaussée, alors que le premier étage comporte cinq travées. Au centre de celui-ci la porte fenêtre centrale souvre sur un vaste balcon. À chaque extrémité du corps de logis, en légère avancée et reliées au corps central par une petite aile, sélèvent deux tourelles à toit en poivrière flanquées de pavillons dont lune abrite une petite chapelle.                                                                                                   FORGES Il ne sagissait au départ que dun « hostel » non fortifié, dépendant de la seigneurie du Blanc. Au XIIe siècle, la rivalité qui éclate entre les Plantagenêt (roi dAngleterre, ducs dAquitaine et de Normandie et comtes dAnjou) et les Capétiens transforme la bande sud du Berry en zone frontière.    En 1442 par lettres patentes, Charles VII autorise Jean de Poix à fortifier et remparer Forges.","architecture":"AJONCS est un château bâti à Saint Hilaire-sur-Benaize, Au XIXe siècle. Dordonnance symétrique, le château est composé dun corps de logis avec quatre ouvertures au rez-de-chaussée, alors que le premier étage comporte 5 travées. Au centre, la porte fenêtre souvre sur un vaste balcon. Aux extrémités du corps de logis, en légère avancée et reliées au corps central par une petite aile, deux tourelles à toit en poivrière s'élèvent.                                                                                                                                     FORGES, se compose dun donjon rectangulaire flanqué de quatre grosses tours, entouré dune enceinte dotée de tours dangle et dune chapelle. Les premières constructions pourraient remonter au XIe siècle.. On voit alors les châteaux les plus anciens se doter de système de défense.  La classique maison forte à quatre tours dangles, est donc dotée, sur trois cotées, dune enceinte renforcées de tours circulaires.","habitants":"Ajoncs;  Famille Thomassin.                                                   Céré; Famille des Valzergues\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Grav 1 Ajoncs: 46° 33' 46\" Nord et 1° 04' 32\" Est                                        Brosse ; 46° 24' 55\" Nord et 1° 19' 13\" Est                                           Forges   grav 3; 46° 35' 30\" Nord et 1° 00' 11\" Est","gps":"","images":["../image/image_36/36_St_Hilaire_sur_Benaize_1.jpg","../image/image_36/36_St_Hilaire_sur_Benaize_2.jpg"]},"Consult_chateau_formulairec935":{"id":"Consult_chateau_formulairec935","dept":"36","canton":"Châteauroux-Ouest","commune":"Saint-Maur","nom":"St_Maur","type":"Château","periode":"XV-XVII-XIX","histoire":"Grand-COLOMBIER, le qualificatif Grand lui sert à se démarquer du Petit Colombier, partie démembrée du domaine. Il appartenait au XVe siècle à la famille de Pons et en 1481 à Olivier et François Guérin. On y trouve ensuite Jean Sanson en 1572, René Guérin et Anne Troussebois en 1639. Le bâtiment date du XVe siècle, il subit des modifications au XVIIIe siècle et à l'époque moderne.                                                                           PARCAY, le château fut élevé au XIXe siècle par Pétrely Grenouillet, d'une famille de maître de forges. Vendu en 1872, il a été acheté par son petit-neveu, Prothade Grenouillet. La construction n'est donc pas très ancienne. Il se pourrait que le lieu ait été auparavant celui d'une métairie, relevant de Rançay, laquelle est mentionnée en 1455.                                                                                                                                                 LALEUF, la terre de Laleuf, qui relevait du fief de Châteauroux, est mentionnée depuis le milieu du XIVe siècle. L'édifice actuel date de 1761 et est représentatif des \"maisons des champs\" de la bourgeoisie aisée de province à cette époque.                                                                                                                                                                                           PLANCHES, édifié en 1815 par Monsieur Boislereine, Baron de Surins. M. Masquelier, venu de Lille, l'acquiert. Pendant la deuxième guerre mondiale, la famille Ansbacher, dorigine juive, en est propriétaire.  La demeure sera transformée ensuite en restaurant, puis lOTAN rachète la propriété. Un  lycée international, annexe du Lycée Jean Giraudoux fonctionne jusquen 1967 et devient collège jusquen 1974, la commune rachète la propriété dans les années 80, est une construction quadrangulaire néo-classique à deux niveaux, coiffée d'un toit à croupes d'ardoises. Au centre de la façade principale un avant-corps en légère saillie est divisé en trois travées.","architecture":"Grand-COLOMBIER, présente un long corps de logis quadrangulaire à deux niveaux coiffé d'un toit en bâtière de tuiles plates. Les combles sont en partie éclairés sur une extrémité par deux lucarnes à croupe débordant et interrompant l'avant-toit. Ces ouvertures sont récentes, mais l'édifice présente des baies d'origine dont une fenêtre à meneaux située à proximité de la tour d'escalier. Celle-ci, de forme ronde et couverte d'un cône d'ardoises, prend place en milieu de façade. Une deuxième tour plus imposante et à la couverture identique flanque un angle de la face arrière.                                                                                             PARCAY,  le corps de logis rectangulaire, ouvert sur deux niveaux de sept fenêtres, est d'une extrême sobriété. Tout au plus peut-on compter comme décor les pilastres placés sur les angles des façades où ils supportent la corniche du toit à croupes, ou les trois lucarnes ajourant le toit ; mais seule celle du centre, plus importante, comporte de légers ailerons. Enfin, la porte, rigoureusement située dans l'axe central, est couronnée d'un entablement.                                                                                                            LALEUF, la maison du XVIIIe siècle devait être une grande bâtisse rectangulaire, couverte en tuiles, à deux niveaux et à l'élévation symétrique, présentant une légère saillie au centre de la façade antérieure et un avant-corps sur la façade sur jardin. Les deux pavillons latéraux de la façade principale n'appartiennent peut-être pas à la construction des années 1760. La galerie qui les réunit en avant de la façade du corps principal a été ajoutée au cours de la première moitié du XIXe siècle.","habitants":"Gd-Colombier;  René Guérin                                        Parcay; Prothade Grenouillet.                                      Planches; famille Ansbacher\r\n        \r\n        \"","divers":"Dans cet article; le gd Colombier grav 1.  Parcay grav-2. Laleuf grav 3-4 . La Planches grav 5-6. château de Von grav 7","gps":"","images":["../image/image_36/36_St_Maur_1.jpg","../image/image_36/36_St_Maur_2.jpg","../image/image_36/36_St_Maur_3.jpg","../image/image_36/36_St_Maur_4.jpg","../image/image_36/36_St_Maur_5.jpg","../image/image_36/36_St_Maur_6.jpg","../image/image_36/36_St_Maur_7.jpg"]},"Consult_chateau_formulairec66f":{"id":"Consult_chateau_formulairec66f","dept":"36","canton":"Châteauroux-ouest","commune":"Saint-Maur","nom":"St_Maur_Indre","type":"Château","periode":"XVIII-XIX","histoire":"La LIENNE, en 1820, la terre est achetée par le Dr Testaud-Marchain lequel entreprend la construction du château. Mort avant de l'avoir achevé, les travaux sont menés à leur terme par son fils Léonce, sur les plans d'Alfred Dauvergne, en ajoutant de part et d'autre au corps de bâtiment une chapelle de style gothique et une orangerie.                                                                                                La MARTINIQUE, cette demeure baptisée d'un nom évoquant les Antilles par les frères Landré, riches épiciers, fut construite peu après 1815. Le château appartint ensuite à MM. Bidault et Desjobert de Prahas.","architecture":"La LIENNE, le corps de logis est une construction quadrangulaire comportant deux niveaux au-dessus d'un sous sol et sous un étage de combles. Il est coiffé d'un toit à croupes, couvert en ardoises. Au centre de la façade principale, encadrée de deux échauguettes à toit conique, prend place un escalier. Le corps de logis se prolonge sur les côtés par deux galeries de deux travées à deux niveaux sous une terrasse joignant la chapelle et l'orangerie. Cette dernière est flanquée d'une tour à pans en demi hors-uvre. La chapelle est mise en évidence par un campanile surmonté d'une flèche au-dessus du transept. Récemment restauré, le château est entouré d'un parc important.   \r\n La MARTINIQUE, il fut quelque peu remanié à la fin du XIXe siècle. Il est constitué d'un corps de logis rectangulaire bâti en pierres de taille accosté à chaque extrémité de deux pavillons carrés. Son élévation compte un niveau au-dessus d'un sous-sol exhaussé. L'accès s'effectue à l'étage par un escalier sur chaque façade. Le premier est droit et le second donnant vers le parc est tournant à deux volées: une première volée en fer à cheval aboutit à un repos, poursuivi par une volée droite. Les façades, d'ordonnance similaire, présentent au-dessus de la porte d'entrée un fronton triangulaire avec oculus ovale. Le bâtiment est encore complété par deux corps de dépendances et d'une petite fuye cylindrique fermant sur trois côtés la cour d'honneur rectangulaire. Devant la façade sud, le parc descend en pente douce jusqu'à l'Indre.","habitants":"La Lienne; Dr Testaud-Marchain                                                    La Martinique; Famille des Desjobert de Prahas\r\n        \"","divers":"Château de la Lienne grav 1 ,                                                               château de la Martinique grav-2 et Cantins  grav-3","gps":"","images":["../image/image_36/36_St_Maur_Indre_1.jpg","../image/image_36/36_St_Maur_Indre_2.jpg","../image/image_36/36_St_Maur_Indre_3.jpg"]},"Consult_chateau_formulairef068":{"id":"Consult_chateau_formulairef068","dept":"36","canton":"Levroux","commune":"Saint-Pierre de Lamps","nom":"St_Pierre_Lamps","type":"Château","periode":"XVII","histoire":"Deux châteaux, celui de la Ferrière à Saint-Martin de lamps et de la Jarrerrie à Sougé.                                                                                                            SAINT-PIERRE DE LAMPS, le château fut construit en plusieurs étapes sur un terrain situé à proximité de l'église désaffectée au profit de Saint-Martin-de-Lamps. L'édifice fut acquis en 1858 par la famille belge Delrue, ancêtres des actuels propriétaires. Après plusieurs projets, Alfred puis Henri Dauvergne bâtirent, de 1873 à 1883, le pavillon nord contre l'ancien presbytère.","architecture":"SAINT-PIERRE DE LAMPS, en 1891, une deuxième campagne de travaux commença avec démolition du presbytère et construction de la partie \"brique et pierre\" du château de style Louis XIII. Il se compose d'un corps de logis de sept travées avec un avant-corps légèrement décentré, appareillé en tuffeau et abondamment décoré.  Au pavillon nord, un pavillon bas en terrasse rejoint l'aile ouest, presque aussi vaste que le corps principal mais d'architecture plus simple, terminé par une tour carrée. L'ensemble, recouvert en ardoises, serait un peu raide s'il n'était égayé par une tourelle de style gothique surmontée d'un haut campanile à dôme, digne d'un château de la Loire.","habitants":"Famille belge Delrue\r\n        \r\n        \"","divers":"St-Pierre de Lamps grav 1-2-3.    46° 58' 19\" nord, 1° 30' 48\" est. La Ferrière grav-4","gps":"","images":["../image/image_36/36_St_Pierre_Lamps_1.jpg","../image/image_36/36_St_Pierre_Lamps_2.jpg","../image/image_36/36_St_Pierre_Lamps_3.jpg","../image/image_36/36_St_Pierre_Lamps_4.jpg"]},"Consult_chateau_formulaireb80a":{"id":"Consult_chateau_formulaireb80a","dept":"36","canton":"Issoudun-Sud","commune":"Sainte-Fauste","nom":"Ste_Fauste_Ferté","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux à Sainte-Fauste celui de la Ferté et celui de la Tremblère                                                                                                                    FERTE,  il appartient à un chevalier, Eudes de Fougères, dépendant de la seigneurie de Vouillon. On trouve plus tard les familles de Menou, d'Ars, de Wissel, Drechesne et Ouvrard. Durant la Révolution, les patriotes du bourg dirigés par le maire et le curé Jacques Chauveau, vinrent perquisitionner pour en extraire les armes de guerre ou de chasse : peut-être un règlement de comptes, les châtelains, Charles-Marie-Paul de Bizoton et Catherine de Wissel de La Ferté, s'étant mariés par le ministère du curé   assermenté. Et le 4 frimaire An II (24 novembre 1793), la châtelaine devait déposer à la porte du château ses titres féodaux, qui furent brûlés.                                                                                                                     TRAMBLERE,  en 1380, Guillaume Guérin, écuyer, rend hommage à Guyon de Sully, seigneur de Vouillon, pour son fief de la Tremblère. Vers 1535, on trouve Antoine Meunier, époux de Catherine d'Orsanne, dame de La Tremblère. Dans un aveu daté de 1615, \"l'Hôtel noble\" est dit ruiné et ce sont vraisemblablement les époux Grazan La Châtre qui font reconstruire, vers 1635 \"un pavillon. Vers 1800, Louis Pinon de Beaumont, époux de Brigitte Victoire de La Châtre, Pinon La Châtre). L'édifice est acquis au début du XIXe siècle par Marie Raveau, veuve de J.-P. Pesneau, représentant de l'Indre au Conseil des Anciens. Vers 1836, le château est à Paul Patureau Mirand, président du tribunal de Châteauroux, il passe à un de ses descendants en 2002.","architecture":"FERTE, le château médiéval est cité en 1390,  Le XIXe siècle a complètement transformé l'édifice du XVe siècle, édifié sur le plan classique d'une aile flanquée de tours avec retour d'équerre. Les toitures, les lucarnes, les ouvertures (à l'exception de la porte de la tour  d'escalier) sont de la deuxième moitié du XIXe siècle, pour créer, avec une certaine sobriété, une maison claire et confortable.                                                                                        La TREMBLERE, construction du château  en 1380, et la construction de la façade en fermant le L pour former un carré flanqué de quatre tourelles, le fronton de la façade sur le parc porte le monogramme P.L.C .","habitants":"Ferté ;familles de Menou                                                                                    Tremblère       Guillaume Guérin,                                        Pierre d'Artenay\r\n        \r\n        \"","divers":"Ste Fauste : 46° 51' 29\" nord, 1° 51' 58\" est château de la Ferté grav 1 , la Tremblère grav-2.","gps":"","images":["../image/image_36/36_Ste_Fauste_Fert%c3%a9_1.jpg","../image/image_36/36_Ste_Fauste_Fert%c3%a9_2.jpg"]},"Consult_chateau_formulaire0670":{"id":"Consult_chateau_formulaire0670","dept":"36","canton":"Mézières en Brenne","commune":"Sainte-Gemme","nom":"Ste_Gemme_Indre","type":"Château","periode":"XIX","histoire":"Trois châteaux à Sainte-Gemme celui de Prolière, de Bordes et de Oince, pas d'information pour ces deux derniers.                                          PROLIERE,   construit vers 1850 par M. Rattier dont les armes parlantes, trois rats, figurent discrètement au-dessus de la porte d'entrée. M. Rattier ne posséda La Prolière que brièvement. La demeure, qui passa à la famille de Pardaillan, la conserva jusque dans les années 1930.","architecture":"BORDES,   de plan carrée à deux niveaux et belles lucarnes flanque de tours en angles et d'échauguettes                                                                                                         PROLIERE, se reflétant dans une pièce d'eau bordée de beaux platanes, ce petit château se compose d'un logis carré flanqué de quatre tourelles d'angle, couvertes de toits de tôle peinte en forme de pagode quelque peu surprenants dans la région. Ces tourelles sont postérieures à la construction du pavillon qui fut construit vers 1850.","habitants":"Prolière M. Rattier \r\n        \r\n        \"","divers":"à Sainte-Gemme celui de Prolière grav 5, de Bordes et de Oince;   46° 52' 45.4404\" N and 1° 21' 43.7868\" E.","gps":"","images":["../image/image_36/36_Ste_Gemme_Indre_1.jpg","../image/image_36/36_Ste_Gemme_Indre_2.jpg","../image/image_36/36_Ste_Gemme_Indre_3.jpg","../image/image_36/36_Ste_Gemme_Indre_4.jpg","../image/image_36/36_Ste_Gemme_Indre_5.jpg"]},"Consult_chateau_formulaire6f12":{"id":"Consult_chateau_formulaire6f12","dept":"36","canton":"Sainte-Sévère sur Indre","commune":"Sainte-Sévère sur Indre","nom":"Ste_Sévère","type":"Patrimoine","periode":"XII-XVI","histoire":"Ste-SEVERE; passée à la famille Palesteau, la vaste seigneurie de Sainte-Sévère échut par mariage, vers 1240, à Hugues, vicomte de Brosse. Tombée aux mains des Anglais en 1370, la ville eut à subir un siège resté fameux sous la conduite de Du Guesclin, en 1372, puis un nouveau pillage en 1437.   La famille de Brosse en conserva la propriété jusqu'au début du XVIe siècle. En 1517 le site appartient aux Blanchefort. En 1578 à la famille Bourbon, puis en 1697 aux de Flexelles  dernier propriétaires le château est abandonné,  en 1947  Jacques tati l'utilise pour son film.       Édifié au pied du donjon, par Pierre-Michel de Brosse, baron de Sainte-Sévère, pour lui servir de résidence dans les années 1770, il est ensuite modifié par l'adjonction de deux ailes par la famille de Villaines au XIXe siècle, qui fait également figurer ses armes sur la façade nord. C'est cette famille qui fit aussi aménager un vaste parc (partiellement conservé) sur la pente descendant vers l'Indre, et qu'appréciait George Sand. Le château est actuellement occupé par la maison de retraite Le Castel.","architecture":"Sainte-SEVERE Le castellum qui surveillait probablement le passage à gué d'une route venant du Limousin, est mentionné pour la première fois dans un acte du milieu du XIe siècle. Au début du XIIe siècle existait un château dont la motte constitue le principal vestige. De forme ovale, elle mesure environ 30 à 50m à la base et atteint environ 15m de hauteur. Elle est entamée, sur sa face nord, par les cours de plusieurs maisons. Probablement reconstruit au cours du XIIIe siècle, le château comportait une tour mentionnée lors du siège de la ville, en 1372. Cette tour de schiste couronnée par des mâchicoulis était accolée à un logis rectangulaire flanqué, sur sa face sud, d'une tour d'escalier. De ce corps de logis ne subsistent que des pans de maçonnerie de l'angle sud-ouest. Restauré durant les guerres de Religion, le château est signalé en masures dès 1577. La tour qui servit de pigeonnier au XVIIIe siècle, maintint la présence symbolique de l'édifice féodal. Elle s'effondra partiellement vers 1855. Un second éboulement, survenu vers 1900-1910, réduisit à un tiers sa circonférence. Dans les années 1770, une nouvelle résidence seigneuriale fut bâtie au pied de la motte, à l'ouest. Au XIXe siècle, deux ailes perpendiculaires furent ajoutées. La demeure fut surélevée au début du XXe siècle. Un ouvrage d'entrée à deux tours rondes, rappelant les pavillons médiévaux, avait été établi entre les deux châteaux. Vers 1850, un vaste parc à l'anglaise fut aménagé sur la pente de la motte descendant vers l'Indre. Agrémenté d'un labyrinthe de buis, ce jardin fut très apprécié par George Sand qui fit du château le cadre de son roman \" Mauprat \".","habitants":"Ste-Sévére; Famille Bourbon  et la  famille de Brosse\r\n        \r\n        \"","divers":"fortifications de Sainte-Sévère et château","gps":"","images":["../image/image_36/36_Ste_S%c3%a9v%c3%a8re_1.jpg","../image/image_36/36_Ste_S%c3%a9v%c3%a8re_2.jpg","../image/image_36/36_Ste_S%c3%a9v%c3%a8re_3.jpg","../image/image_36/36_Ste_S%c3%a9v%c3%a8re_4.jpg","../image/image_36/36_Ste_S%c3%a9v%c3%a8re_5.jpg"]},"Consult_chateau_formulaire4584-2":{"id":"Consult_chateau_formulaire4584-2","dept":"36","canton":"Issoudun-Sud","commune":"Ségry","nom":"Ségry_Chouday","type":"Château","periode":"XVI","histoire":"CHOUDAY, quand Guillaume Lamanière et son épouse Catherine Félicité Raffeneau, ruinés, ont dû vendre tous leurs biens à Paris et dans sa région, ils sont venus s'installer en 1799, avec leur \"tribu\", dans le vieux château de Chouday, qu'ils possédaient encore en Berry.\r\nEn effet, en plus de leur fille Désirée, habitent avec eux les cinq enfants issus du premier mariage de Félicité avec monsieur de Sarrauton : Auguste , Frédéric-Grand, Honoré, Félicité et Déric de Sarrauton. Ils logent aussi gratuitement depuis quelques années la sur de Félicité, Rose Raffeneau , ses trois enfants, Alexandrine , Frédéric-Petit et Honoré de Montureux, ainsi que le 2e mari de Rose, Joseph Veiron.                                                                                                                                                GOUERS, étymologiquement Gouers signifie gué. En ce lieu se tenait le prieuré de Saint-Denis de Gouers. On ignore à quelle date il fut créé, mais ce fut antérieurement à 1081. En effet, cette année-là, Richard II, archevêque de Bourges, en ordonnait la restitution à l'abbaye de  Saint-Denis dont il dépendait par l'intermédiaire de Reuilly. Vendu à la Révolution, il est acheté par M. Pignot, médecin d'Issoudun.","architecture":"GOUERS  Le prieuré fut transformé en un beau château. Même si son architecture semble conserver une touche encore médiévale, il fut, sinon entièrement reconstruit, du moins profondément remanié au XIXe siècle. Il se présente en un corps de logis principal, haut d'un étage et un niveau de combles, accosté sur une extrémité d'un imposant pavillon coiffé d'un très haut toit à croupes et d'élévation identique, et, à l'opposé, de deux tours rondes sommées d'un toit conique.","habitants":"Gouers M. Pignot                                                                     Chouday Guillaume Lamanière\r\n        \r\n        \"","divers":"A Ségry  grav 2-3,   Château de Gouers grav 1 et de Choudray grav _4.","gps":"","images":["../image/image_36/36_S%c3%a9gry_1.jpg","../image/image_36/36_S%c3%a9gry_2.jpg","../image/image_36/36_S%c3%a9gry_3.jpg","../image/image_36/36_S%c3%a9gry_4.jpg"]},"Consult_chateau_formulaire5eb3":{"id":"Consult_chateau_formulaire5eb3","dept":"36","canton":"Argenton-sur- Creuse","commune":"Tendu","nom":"Tendu","type":"Château","periode":"XV-XVI-XIX","histoire":"A Tendu Château de Prunget du XIIe et XVe siècles : il fait lobjet dun classement au titre des M.H., depuis le 14 mars 1927. Des Sallerons  du XIXe siècle.  Mazières : il fait lobjet dun classement au titre des M.H., depuis le 5 avril 1988. De La Rocherolle. Du Broutay du XVe et XVIe siècles.\r\nGRAND-BROUTET , en 1356, l'hostel du Brotuel relevait du seigneur de Prunget qui reconnaissait à son vassal droit de chasse par toute la terre de Prungé. Jean de Laigue est propriétaire en 1366 ; Claude du Bost est seigneur en 1480, puis Mathieu de Laage, écuyer, seigneur du Grand-Broutay et de Perajoux, fait foi et hommage en 1620.  Sur un escarpement de la rive droite de la Bouzanne, commandant un gué sur cette rivière, le château du Broutet se découvre progressivement : tout d'abord, au nord, à une centaine de mètres de l'édifice, un beau pigeonnier du XVIe siècle, puis, plus bas, une petite tour dans le mur qui ceinture la propriété, on parvient enfin au logis de forme sensiblement carrée, prolongé d'une petite tour au nord, puis en diagonale du bâtiment, d'une plus grosse tour au sud, sur élevée au début du XXe siècle. Cette partie, bâtie sur l'emplacement d'un logis ancien, date du XVIe siècle. Le château fut remanié par l'architecte Alfred Dauvergne à la fin du XIXe siècle.                                                                                                       MAZIERES, Sylvain Château l'acquit comme bien national en l'an IV. Sa fille, madame Louis Bernard, mourut en 1895 et sa succession donna lieu à un procès long, à la suite duquel M. Renaud se porta acquéreur. Aujourd'hui  il appartient à M. Jean Plaignaud.","architecture":"MAZIERES, seigneurie remontant au XIIe siècle au moins (construction du donjon). Au XIVe siècle, on ajoute les tourelles d'encorbellement. Le donjon du XIIe siècle faisait partie d'un système défensif, comprenant sept tours et une chapelle. Le donjon carré est surmonté de quatre tourelles en encorbellement. L'intérieur, détruit, possédait des cheminées du XVe siècle. La chapelle fut détruite sous la Révolution.  La grange fermant la cour a été récemment reconstruite après l'incendie.                                                                                                                                       ROCHEROLLE, il s'agit d'un véritable château-fort, dont les toits d'ardoise et les mâchicoulis émergent de la verdure dans un site pittoresque, même si l'édifice comporte tours, courtines, mâchicoulis et meurtrières, il n'a point l'air belliqueux, construit après 1430 sur les restes d'un hôtel seigneurial, relevant tout d'abord de Tendu puis de la seigneurie de Châteauroux, le bâtiment actuel semble devoir être attribuée à la famille de Montménard. Les armes d'Hélion de Montménard et celles de Catherine de Montjohan, son épouse, figurent à la clef de voûte d'une tour en forme de fer à cheval aménagée en chapelle. Celle-ci est voutée en croisée d'ogives à deux travées, agrémentée de nervures peintes de fleurs de lys. Au XIXe siècle, c'est Joséphine de Boisé qui fit restaurer le château, alors réduit à l'état de ferme. L'édifice est acquis vers 1920 par Mme Rocherolle dont les descendants sont les actuels propriétaires. À noter, au pied de la roche du château, une magnifique fontaine qui jaillit dans un bassin de pierre et arrose les jardins.","habitants":"Gd-Broutet; Claude du Bost                                                        Mazières; M. Renaud                                                            Rocherolles; Hélion de Montménard \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Broutay; Grav-1  : 46° 38' 42\" Nord et 1° 33' 32\" Est                                       Mazières grav 2-3    ,46° 38' 07,99\" Nord et 1° 34' 41,73\" Est                           Rocherolle  grav 4-5-6  ;46° 37' 39,62\" Nord, 1° 32' 34,93\" Est","gps":"","images":["../image/image_36/36_Tendu_1.jpg","../image/image_36/36_Tendu_2.jpg","../image/image_36/36_Tendu_3.jpg","../image/image_36/36_Tendu_4.jpg","../image/image_36/36_Tendu_5.jpg","../image/image_36/36_Tendu_6.jpg"]},"Consult_chateau_formulaire27d5":{"id":"Consult_chateau_formulaire27d5","dept":"36","canton":"Argenton sur Creuse","commune":"Tendu_Mosnay","nom":"Tendu_Indre","type":"Château","periode":"XII-XV-XVIII","histoire":"PRUNGET, le nom de Prunget paraît être celui d'une ancienne famille depuis longtemps éteinte qui possédait un château en ces lieux au XIIe siècle, et qui rendait foi et hommage au seigneur de Gargilesse.                                        CHAISE St-ELOI, à Mosnay était à l'origine comprise dans le domaine seigneurial de Prunget et bénéficiait des privilèges de haute moyenne et basse justice et du droit de posséder des serfs. Les querelles entre les pouvoirs laïc et ecclésiastique se multiplièrent au fil des ans, jusqu'à la signature en 1302 d'une transaction entre Raoul de Prunget et le frère Thomas, prieur de La Chaise. Christophe de Brillac, prévôt de Saint-Benoît-du-Sault, causa la ruine du prieuré en s'en réservant les revenus au détriment des moines qui furent contraints de le vendre. La terre de La Chaise fut adjugée à Jean de Leymarie, écuyer, seigneur de Châteauvieux. En 1882, les ruines du château du XVe siècle furent relevées par M. Deschellerins de Poitiers, sous la direction de M. Coulomb, architecte parisien.","architecture":"PRUNGET  était le plus puissant des châteaux féodaux, avec Chabenet, qui gardaient le passage de la Bouzanne et surveillaient le chemin de Paris à Limoges. Le château médiéval comportait, semble-t-il, une double enceinte et de nombreuses tours. Il ne subsiste que le donjon aujourd'hui, construction rectangulaire comprenant sept étages, bâti sur une base rectangulaire, renforcé de contreforts plats typiques de l'architecture du XIIe siècle. Les murailles sont garnies de mâchicoulis. Au sommet, chaque angle présente une échauguette, le toit est actuellement recouvert de zinc. Des reprises furent effectuées sur le donjon au XVe siècle, d'autres en 1609 par Claude de Montjohan. À la fin du XIXe siècle, l'édifice était en ruines, le donjon est alors surmonté d'un toit couvert d'ardoises qui restera jusqu'en 1965, il était encore habité en1900, mais un logis plus confortable a été réalisé dans les anciens communs. La construction du Château de Prunget date du XIIe et du XVe siècle, est classé aux M.H. depuis le 14.03.1927.                                                                                                SALLERONS,  manoir a deux niveaux sur soubassement  toit en croupe avec lucarnes , l'édifice est accolé d'une tour polygonale mi-hors oeuvres en façade à trois niveaux toit style asiatique      CHAISE St-ELOI,  à Mosnay,  le château actuel reproduit, à l'exception d'une tourelle d'escalier qui était à droite du donjon, le plan initial de l'ouvrage. L'inventaire effectué à cette occasion parle de la maison et fort de La Chaise, ayant des murailles en très bonne matière avec des ouvertures et une cheminée en pierre de taille, trois appartements en ruine et sans toiture.","habitants":"Prunget; Famille de Chabenet                                                  Chaise;    M. Deschellerins de Poitiers                                                                                       \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Chaise grav de 1 à 5.  Prunget grav -6;           6° 37' 56,38\" Nord et 1° 34' 7,13\" Est                                                                   Sallerons; grav 7     46° 38' 42\" Nord et 1° 33' 32\" Est","gps":"","images":["../image/image_36/36_Tendu_Indre_1.jpg","../image/image_36/36_Tendu_Indre_2.jpg","../image/image_36/36_Tendu_Indre_3.jpg","../image/image_36/36_Tendu_Indre_4.jpg","../image/image_36/36_Tendu_Indre_5.jpg","../image/image_36/36_Tendu_Indre_6.jpg","../image/image_36/36_Tendu_Indre_7.jpg"]},"Consult_chateau_formulairee97e":{"id":"Consult_chateau_formulairee97e","dept":"36","canton":"Tournon-Saint-Martin","commune":"Tournon-Saint-Martin","nom":"Tournon_St_Martin","type":"château","periode":"XII","histoire":"A Tournon Saint-Martin le château de Jartraux : il s'agit d'un manoir du XVIIIe siècle, qui a subi une extension au XIXe siècle.  Ruines du château de Prinçay du XVe siècle et le château de Soudon et le château de Néons sur Creuse.                                                                                                                                        NEONS, il existait depuis le début du Moyen-Âge une maison forte à Néons, l'antique Noviomagus gallo-romain. Mais l'essentiel de la construction semble postérieur. Néons appartenait alors à une famille Boucher: Jean Boucher est cité en 1488. Depuis 1730, le château appartenait à la famille du Trochet, qui portait le titre de marquis de Néons. Les Trochet ayant émigrés en 1792, le château fut vendu comme bien national. Il appartint pendant un siècle aux familles de La Roche, puis Ginesteix. Racheté, puis restauré à partir de 1990, il a retrouvé sa dignité première. \r\n SOUDUN, mentionné dès l'an 1000, un important château y avait été construit et la famille qui le possédait était alliée aux barons de Preuilly. Pris et repris pendant la guerre de Cent Ans, le fief demeura aux mains de la famille de Cenis qui le tenait toujours à la fin du XVe siècle.Une fois la paix établie, il perdit son utilité militaire et ne semble pas avoir été occupé du XVIe au XIXe siècle. Vendu à plusieurs reprises, l'édifice fut réduit à l'état de ferme. Racheté en 1844, le domaine passa par héritage aux Moranvillé qui le possédèrent jusqu'à la fin du XXe siècle. C'est Louis Henri Moranvillé, bibliothécaire à la Bibliothèque nationale, qui a fait restaurer complètement le château avant et après la première guerre mondiale, l'aile d'habitation date de cette époque.","architecture":"NEONS  s'ordonne à partir de quatre tours disposées en trapèze, les deux de la façade sud encadrent la porte d'entrée, défendue par une herse dont l'emplacement est visible entre deux arcs du vestibule. Deux corps de bâtiment prolongent l'enceinte jusqu'aux deux autres tours dont l'une, côté est, a été rebâtie postérieurement. Aux XVIIe et XVIIIe siècles l'édifice a été transformé pour devenir une demeure d'agrément. La grande avant-cour du château est entourée de communs, ils servent de cadre à des manifestations.                                                                                SOUDUN, le donjon, grosse tour circulaire des XIIe-XVe siècles, a été surmonté de mâchicoulis et d'une poivrière. Une chapelle romane, voûtée en berceau, est couverte de tuiles rondes. Une belle porte de style flamboyant provient des ruines du château de Prinçais.","habitants":"Néons Famille Boucher                                                              Soudon Famille  Cenis                 \r\n        \r\n        \r\n        \"","divers":"château de Soudon grav 3-4-5  et le château de Néons sur Creuse grav 1-2","gps":"","images":["../image/image_36/36_Tournon_St_Martin_1.jpg","../image/image_36/36_Tournon_St_Martin_2.jpg","../image/image_36/36_Tournon_St_Martin_3.jpg","../image/image_36/36_Tournon_St_Martin_4.jpg","../image/image_36/36_Tournon_St_Martin_5.jpg"]},"Consult_chateau_formulaireda3c":{"id":"Consult_chateau_formulaireda3c","dept":"36","canton":"Valençay","commune":"Valençay","nom":"Valencay_Chateau","type":"Palais","periode":"XVI","histoire":"VALENCAY, construit en 1530-1599 par la famille d'Estampes, a l'extension de cette famille le château est acquis en1761 par Philippe Charles Legendre de Villemorien administrateur des postes royales.                              En 1803 acquis par le prince Charles Maurice de Talleyrand-Périgord, alors ministre des affaires étrangères de Napoléon,  Talleyrand en fit l'acquisition à la demande de Napoléon. Il y restera jusqu'à la restauration, au décés de Talleyrand le château passe au petit-neveu du diplomate Louis-Napoléon de Talleyarnd-Bonaparte duc de Valençay  le domaine  se   transmet dans la même famille jusqu'au début des années 1970,    ce somptueux édifice, entouré d'un grand parc de plusieurs dizaines d'hectares, constitue un domaine d'exception, tout à fait impressionnant qui a accueilli de grand hommes politiques.  Symbole de la puissance impériale, incarne le goût et lélégance avec ses marbres, ses tableaux, ses objets dart et son exceptionnel mobilier Empire orné de bronzes dorés, appartient aujourd'hui à une association. classé aux M.H. depuis 2011.","architecture":"VALENCAY, sa construction a débuté au Xe siècle et s'est achevée au XVIIe siècle, savant mélange d'architecture renaissance et classique, se dresse fièrement, dominant la vallée et la rivière le Nahon. Le château de Valencay est de style Renaissance.  À lintérieur, les collections dévoilent tout le raffinement de cette époque. Les salons, les chambres, les galeries, sont meublés dun superbe mobilier de style Empire. Les cuisines, loffice et les caves témoignent de lattention portée par le maître de maison à sa table, renommée dans toute lEurope. Enfin, le Théâtre, véritable joyau de 1810, se visite plusieurs fois par semaine dans le cadre de visites privées. Construit pour la distraction des Princes Espagnols lors de leur séjour forcé à Valençay, il conserve lensemble de ses décors et toiles de fond dépoque. La visite se fait aux intérieurs et extérieurs. Le parc et les jardins du Château de Valençay sétendent sur un domaine de plus de 53 hectares. Les Jardins à la Française accueillent les visiteurs, puis lon découvre la cour dhonneur donnant sur le jardin de la duchesse, installé en terrasse.","habitants":"Famille d'Estampes\r\n        \r\n        \r\n        \r\n        \"","divers":"Valencay;  47°09'27\" Nord et 1°33'48\" Est","gps":"","images":["../image/image_36/36_Valencay_Chateau_1.jpg","../image/image_36/36_Valencay_Chateau_2.jpg","../image/image_36/36_Valencay_Chateau_3.jpg","../image/image_36/36_Valencay_Chateau_4.jpg","../image/image_36/36_Valencay_Chateau_5.jpg","../image/image_36/36_Valencay_Chateau_6.jpg"]},"Consult_chateau_formulaire174b":{"id":"Consult_chateau_formulaire174b","dept":"36","canton":"Valençay","commune":"Valençay","nom":"Valencay_Garenne","type":"Château","periode":"XX","histoire":"GARENNE, ce pavillon de plaisance fut construit pour Talleyrand, de 1805 à 1806. Il aurait été inspiré par Renard, son architecte. Mais la mort de ce dernier, en 1807, aurait conduit son successeur Bonnard à achever cette construction originale, est de style rustique à litalienne, dont il ne reste que peu dexemples en France. Ce pavillon faisait partie initialement du château dont il a été séparé par la déviation du tracé de la route vers Châteauroux. Sa première destination servait de lieu de distraction aux princes dEspagne, pendant leur exil à Valençay. Ils pouvaient ainsi, sans sortir de leur prison dorée. Par la suite, c'est la duchesse de Dino, nièce de Talleyrand, qui utilisera le Pavillon pour y organiser de nombreuses réceptions. Cest ainsi quelle reçut avec éclat, en 1834, le jeune Duc dOrléans, fils aîné du roi Louis-Philippe. Après le décès du prince, en 1838, le pavillon est ramené à sa première destination : un rendez-vous de chasse et ce jusquau début du XXe siècle. Les façades et les toitures du logis et des deux bâtiments annexes, la grille en fer forgé du XVIIIe siècle et ses piliers ont été classés M.H..\r\nBREVIANDES, appelé successivement la Marquette, puis les plantations de Bréviandes par Roland Biette Lefebvre, son nouvel acquéreur, Damien Marion la rebaptisé le château de Bréviandes, il offre les avantages de lesthétique ancienne et ceux du confort moderne, vous propose la location de ses salles pour vos mariages, vos séminaires ou vos réceptions privées dans un cadre magnifique, chaque étage remplit une fonction. Aujourd'hui à  M. et Mme Péan","architecture":"BREVIANDES,   le château était connu à une certaine époque, sous le nom des Pantations de Bréviandes. En lérigeant entre 1971 et 1978, c'est un dernier né des châteaux de la Loire. Il est bâti dans un cadre discret au caractère idyllique propice aux événements festifs et conviviaux de manière à protéger lintimité des convives. Construit dans le style des villas Italiennes du XVIIIe siècle, il est de style Trianon. Le château de Bréviandes offre des façades et des intérieurs raffinés agrémentés de fenêtres à impostes et de balustrades, ainsi que dun toit-terrasse lui apportant un caractère exceptionnel et le plaçant sans aucun doute dans une lignée dédifices royaux tels que le Petit Trianon de Versailles en France et le Bialy Domek Petite Maison Blanche à Varsovie en Pologne.                                         GARENNE, le pavillon en hémicycle, sur deux niveaux, de style antique, construit en 1807 est un rendez-vous de chasse de style antique différent de l'architecture vernaculaire des constructions voisines. Ce pavillon est accompagné de deux annexes, l'une servait de remise aux calèches, l'autre d'écurie. Les bâtiments sont inscrits à l'inventaire ISMH.  Le pavillon en hémicycle, avec deux niveaux, est un rendez-vous de chasse.","habitants":"Famille de Damien Marion\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Bréviandes grav 1-2 et de Garenne grav de 3 -6","gps":"","images":["../image/image_36/36_Valencay_Garenne_1.jpg","../image/image_36/36_Valencay_Garenne_2.jpg","../image/image_36/36_Valencay_Garenne_3.jpg","../image/image_36/36_Valencay_Garenne_4.jpg","../image/image_36/36_Valencay_Garenne_5.jpg","../image/image_36/36_Valencay_Garenne_6.jpg"]},"Consult_chateau_formulaireaf9e":{"id":"Consult_chateau_formulaireaf9e","dept":"36","canton":"Valençay","commune":"Varennes sur Fouzon","nom":"Varennes_Fouzon","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Varennes sur Fouzon, celui de la Borde et de Préblame.                                                                                LA BORDE, il existait préalablement au château de la Borde, une ferme fortifiée. De cette dernière, la plupart des éléments ont disparu, seule subsiste une grosse tour isolée à quelques dizaines de mètres en avant de l'édifice actuel, celui-ci fut construit de 1860 à 1863, dans un style néo-Renaissance par l'architecte Alfred Dauvergne pour Gustave Boullet  \r\nPREBLAME, au XVe siècle la seigneurie était la possession des Mareuil, elle passe ensuite par alliance aux d'Augustin. Au XVIIIe siècle, l'édifice passe par mariage à la famille Carré de Villebon. Elle va effectuer des transformations sur le bâtiment bâti au siècle précédent. Si la base du XVIIe siècle est conservée, elle est réaménagée et incorporée aux agrandissements qui en doublent la surface au sol. Au XIXe siècle, les Carré de Villebon vendent le château à un armateur de Dieppe. Élisa Strutt, sa veuve se marie avec un Trouard-Riolle dont les descendants en sont toujours propriétaires.","architecture":"LA BORDE, il se compose d'un imposant massif carré, flanqué d'une tour ronde sur chaque angle. La façade principale est marquée par un avant-corps central saillant, ornés d'échauguettes d'angle. En avant de celui-ci s'élève un escalier monumental permettant l'accès depuis la terrasse au rez-de-chaussée surélevé. Le château de la Borde présente sur ses murs un décor abondant: cordons, pilastres, chapiteaux et corniche au sommet. Les combles sont éclairés par des lucarnes d'esprit Renaissance, et enfin l'entrée du domaine est ornée de deux grands portails.                                                                                                 PREBLAME, le logis apparaît comme une grande construction quadrangulaire à deux niveaux. Peu visible, la partie ancienne se devine par son rez-de-chaussée surélevé. Les baies marquent un décrochement qui est récupéré au deuxième niveau. Malgré l'époque, les ouvertures ne se conforment nullement à la symétrie classique. Percé de plusieurs lucarnes à croupe débordante, le logis est surmonté d'un singulier lanternon.","habitants":"Préblame Famille Carré de Villebon\r\n        \r\n        \"","divers":"Deux châteaux à Varennes 47° 12' 50\" nord, 1° 36' 24\" est château de la Borde  grav de 1  à 4 et de Préblame grav 5-6","gps":"","images":["../image/image_36/36_Varennes_Fouzon_1.jpg","../image/image_36/36_Varennes_Fouzon_2.jpg","../image/image_36/36_Varennes_Fouzon_3.jpg","../image/image_36/36_Varennes_Fouzon_4.jpg","../image/image_36/36_Varennes_Fouzon_5.jpg","../image/image_36/36_Varennes_Fouzon_6.jpg"]},"Consult_chateau_formulaire3f62":{"id":"Consult_chateau_formulaire3f62","dept":"36","canton":"Vatan","commune":"Vatan","nom":"Vatan_Magny","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Vatan, celui de Laubépinière, de Magny, et de Vatan. \r\nMAGNY, dit la Chantrerie Au XVIIIe siècle, la famille Gaudreffroy possède cette seigneurie. Le domaine est détenu en 1829, par Adélaïde, fille de Jacques Gaudeffroy, épouse de Jules Baucheron de Lecherolle. Leurs deux filles Joséphine, épouse de Yonnel d'Aussigny et Marie Claire, épouse du marquis Chalvet de Rochemonteix, héritent du domaine, qui passe à la fille de ces derniers, épouse du comte Jules Boselli. Il est vendu, en 1932, à la famille Levasseur, qui le détient toujours.                                                                                                                                    LABEAUPINIERE à Reboursin à 2 KM, vers 1430, un manoir fut édifié par la famille Herpin. Il passa par mariage à la famille de La Thuile en 1498 et y resta jusqu'en 1618. Il fut ensuite aux du Refuge, puis aux du Mesnil. Vers 1830, le nouveau propriétaire, le docteur Herpin y fit de nombreuses modifications,  En 1850, M. Vuillaune, ancêtre des propriétaires actuels, acheta en 1910 ce lieu. Monsieur Louis Guenet et le baron d'Ussel, son gendre, firent appel à l'architecte de Blois, M. Lafargue, spécialiste de la Renaissance.","architecture":"MAGNY, le château a été construit en deux campagnes ; le corps de logis central et la mince tour carrée qui flanque un angle de sa façade datent du XIXe siècle. Le premier est une construction quadrangulaire comptant deux niveaux percés chacun de trois baies et coiffé d'un toit à croupes. La tour comprend trois étages dont le dernier est éclairé par une lucarne surmontée d'un fronton triangulaire. De chaque côté, mais placées selon une orientation différente, sont accolées deux ailes. Leurs toits à la Mansart mariant tuiles et ardoises témoignent pour ces parties d'une plus grande ancienneté.                                                                     VATAN de nombreuses modifications, faisant disparaître toute trace de la féodalité sur l'édifice. Les tours furent abattues, les meneaux supprimés des fenêtres et la chapelle Saint-Augustin rasée,  devenu une maison bourgeoise, décorée d'attiques, de petits balcons, et surmontée d'un lanterneau. Une restauration imposée par le mauvais état des bâtiments.  Les seuls vestiges du XVe siècle restés en place se situent à gauche de la tour d'entrée. Les murs, le solivage et la charpente ont été conservés.","habitants":"Magny famille de Jacques Gaudeffroy                                          Vatan-Labeaupinière famille Herpin.\r\n        \r\n        \r\n        \r\n        \"","divers":"A Vatan Labaupinière grav 1-2. magny grav 3. Menet grav 4.la chantrerie  grav-5. Villechauvon grav_6","gps":"","images":["../image/image_36/36_Vatan_Magny_1.jpg","../image/image_36/36_Vatan_Magny_2.jpg","../image/image_36/36_Vatan_Magny_3.jpg","../image/image_36/36_Vatan_Magny_4.jpg","../image/image_36/36_Vatan_Magny_5.jpg","../image/image_36/36_Vatan_Magny_6.jpg"]},"Consult_chateau_formulaire700d":{"id":"Consult_chateau_formulaire700d","dept":"36","canton":"Ardentes","commune":"Velles","nom":"Velles_II","type":"Château","periode":"XVF-XX","histoire":"COURCENAY  la construction  date du XVe siècle. Il ne reste ajourd'hui que des ruines.                                                                                                                                       PLESSIS, c'était à l'origine un hostel entouré de fossés, renforcé au milieu du XVe siècle, mais très modeste et constituant la résidence d'un gentilhomme rural. Le château du Plessis passe de mains en mains, mais les propriétaires ne l'habitent pas. L'édifice est acheté en 1674 par Charles du Ligondès de Bois Bertrand, dont le fils François y réside. C'est sans doute un des enfants de François qui fit en 1759, certaines transformations. Après la Révolution, Le Plessis change à nouveau plusieurs fois de mains. M. Charles Balsan, manufacturier à Châteauroux, l'achète en 1874 et en fait une exploitation agricole modèle. Ses descendants ajoutent, au château, une résidence moderne d'aspect classique en 1930.                                                                                                                                   VILLEDOIN, le manoir de Villedoin a été construit à partir de 1913 pour M. de Boisrémond pour sa jeune femme qui n'en voulut point et le revendit à la famile Limousin qui le possède toujours. C'est au réputé architecte parisien, Roger-Henri Expert qu'il en confie la conception, Albert Laprade étant chargé de suivre le chantier. Son architecture témoigne des recherches afin de sortir de l'image traditionnelle du manoir sous l'influence de l'architecture anglaise du mouvement Arts and Crafts.","architecture":"PLESSIS actuellement présente un corps de logis à deux étages qui a conservé son aspect de castel ancien, malgré les transformations de 1759. Il est flanqué d'une tourelle cylindrique d'escalier, le toit à mansardes est couvert en tuiles, le corps de logis est prolongé par une construction basse, avec toit mansardé et trois lucarnes.                                                                                                            VILLEDOIN, de plan carré sous un toit à quatre pans percés de grandes lucarnes en chiens-assis et surmonté de hautes cheminées, le manoir montre une façade arrière particulièrement originale: un escalier abrité par l'avant-toit soutenu par deux puissantes piles donne accès à une terrasse qui forme un plaisant belvédère sur la vallée de la Bouzanne. Les propriétaires actuels, depuis trois générations, en ont fait un lieu de charme en plein cur du Berry. Les expositions et vernissages se situent dans un cadre de vie exceptionnel sur la vallée de la Bouzanne.","habitants":"Plessis; Charles du Ligondès de Bois Bertrand                               Villedoin; M. de Boisrémond\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Courcenay;  46° 42' 19,74\" Nord, 1° 39' 35,83\" Est                    Plessis ;46° 39' 40,14\" Nord, 1° 36' 57,36\" Est Plessis 1 à 3 Villedoin grav 4","gps":"","images":["../image/image_36/36_Velles_II_1.jpg","../image/image_36/36_Velles_II_2.jpg","../image/image_36/36_Velles_II_3.jpg","../image/image_36/36_Velles_II_4.jpg"]},"Consult_chateau_formulaire18df":{"id":"Consult_chateau_formulaire18df","dept":"36","canton":"Ardentes","commune":"Velles","nom":"Velles_Indre","type":"Château","periode":"XV-XVI","histoire":"Le village de Velles totalise 4 châteaux et un manoir dont Beauregard, Boisé, Vauzelle.  Plessis Courcenay , Villedoin.                                                                                                 BEAUREGARD, date du XVe siècle, inscrit aux M.H. depuis le 6/10/1933.  \r\nEn 1597, ce sont les Chamborant qui s'y installent, mais ne s'y établissent pas longtemps: dès 1642, Beauregard est adjugé à François d'Au, c'est sans doute lui qui transforme et aménage la demeure. \r\nBOISE, le Grand-Boisé fut le berceau patronymique de la famille de Boisé qui possédait Courcenay, Beauregard et Chabenet. C'est Philippe III de Boisé qui fit commencer la construction du manoir de Boisé                                                      VAUZELLE, mentionné en 1367, Vauzelles comporta un premier château à motte, ruiné au XVIe siècle, d'abord possédé par les familles de Chamborand, de Menou et de La Touche, avant de passer, en 1671, à la famille de La Faire. C'est Jean de La Faire, seigneur du lieu, qui fit bâtir l'actuelle demeure dans l'enclos de l'ancien château, en 1726, ainsi qu'en témoigne une inscription visible sur la façade. Ce bâtiment rectangulaire d'un étage est percé d'ouvertures sobres et régulières. Au rez-de-chaussée deux portes fenêtres ont été ouvertes, dont l'une au début du XXe siècle. Le domaine de Vauzelles fut acquis en 1833 par Mme Petit et M. Bouffard-Madiane, La famille Petit racheta le domaine et y poursuivit les recherches agronomiques, en important notamment des plants américains lors de la crise du phylloxéra.","architecture":"BEAUREGARD, construit du XVI au XVIIe siècle, l'ensemble se compose d'un corps de logis principal, flanqué de tours aux angles et d'une  haute tourelle centrale du XVIe siècle, contenant l'escalier, et deux ailes basses encadrant la cour d'honneur carrée. Les parties les plus anciennes paraissent dater du XVe siècle avec les tours d'angle. Le corps de logis principal a été remanié aux XVIIe, XVIIIe et XIXe siècles. Il renferme un salon orné de boiseries Louis XV. Les deux ailes, qui ont dû être reconstruites au début du XIXe siècle, contiennent encore deux vestiges des parties anciennes. Dans l'aile ouest se trouve une cheminée du XVe siècle. Dans une tour de l'aile Est, un oratoire couvert d'une voûte en coupole, conserve des fresques d'époque Louis XV, représentant l'Annonciation, Saint-François d'Assise, et Saint-Vincent de Paul.                                                                                                BOISE ou Manoir de Grand-Bois est un manoir bâti à Velles,  La construction du manoir de Boisé date du XVIe siècle. Il a conservé une fière allure. L'ancienne forteresse initiale a pratiquement disparue, ayant été plusieurs fois saccagée, par les anglais, durant la guerre de cent ans. La construction du manoir de Boisé a commencé vers 1540 mais sera interrompue par le décés de son constucteur. Il était entouré de douves et de fossés. Le Grand-Boisé est composé d'un haut corps de bâtiment, avec un pignon Ouest garni de crochets, sur les remparts.  Le logis est flanqué d'une tour de forme circulaire, avec un toit conique en tuiles. Le bâtiment est entouré de deux ailes basses. La façade principale dévoile des fenêtres et portes gothiques avec des traces de meneaux.","habitants":"Beauregard;    François d'Au                                        Boise;   famille de Boisé                                                            Vauzelle;  famille de La Faire.          \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Velles totalise 4 châteaux et un manoir dont Beauregard, Boisé, Vauzelle.  Beauregard-Vauzelles grav 2-3-4  : 46° 41' 20\" Nord, 1° 39' 01\" Est .  46° 41' 20\" Nord, 1° 39' 01\" Est","gps":"","images":["../image/image_36/36_Velles_Indre_1.jpg","../image/image_36/36_Velles_Indre_2.jpg","../image/image_36/36_Velles_Indre_3.jpg","../image/image_36/36_Velles_Indre_4.jpg"]},"Consult_chateau_formulaire0e99-2":{"id":"Consult_chateau_formulaire0e99-2","dept":"36","canton":"Buzançais","commune":"Vendoeuvres","nom":"Vendoeuvres","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Vendoeuvres, celui de Beauche et de Lanscome. BEAUCHE, Beauché fut pendant cinq siècles le siège de la maison de Crevant, importante famille tourangelle. En 1738, Martin Louis, marquis de Crevant, vendit la terre à Louis-Alexandre Savary, baron puis marquis de Lancosme, d'une autre famille illustre de la région. En 1881, son arrière-petit-fils, le comte de Lancosme Brèves, vendit la propriété à M. Francisque Vincent de Vaugelas.                                                                                                                                   LANSCOME, dès 1287, Philippe Savary, chevalier, est seigneur de Lancosme. En 1730, Louis François Alexandre Savary acquit la terre de Beauché, lui permetant d'ériger l'ensemble en marquisat sous le nom de Lancosme en 1741. En 1850 Louis Satanislas comte de Savary  de lancosme-Bièvres vendit la propriété à un belge  à Benoist Crombez, d'une famille belge. Son fils Georges Louis Crombez continua les travaux déjà entrepris par les Savary. Ses descendants, les Lestrange, le baron Hubert de Lestrange présent dans les mémoires à cause de la guerre  que lui livra  Henri Villemont,   possédèrent le château jusqu'en 1945, à cette date il hébergea une école d'agriculture. Puis racheté à Christophe Vandaele  un dunkerquois en 1985  qui créa avec sa famille à une société Exilog spécialisé dans l'informatique , monsieur Vandaele actuel maire de la commune.","architecture":"BEAUCHE, du château d'origine, il ne reste que la façade nord-ouest du bâtiment et sa tour du XVe siècle. D'importants remaniements au XIXe siècle, furent réalisés par les Lancosme et surtout par M. de Vaugelas. L'architecte Dauvergne reconstruisit partiellement les bâtiments et tenta de donner un équilibre aux divers éléments à l'édifice notamment par l'adjonction d'une tour faisant pendant à la tour du XVe siècle, et par le remodelage des façades qui se virent dotées d'une décoration inspirée des demeures Renaissance du XVIIe siècle. Dans le parc, la chapelle du XVe siècle est richement décorée de motifs flamboyants.                                                                                                       LANSCOME, de l'ancien château ne demeurent que les trois tours rondes; un donjon et deux tours d'angle, l'ensemble a été profondément remanié vers 1850 et surtout en 1880 sous la direction d'Henri Dauvergne. Le style de l'ensemble est typique des réalisations de Eugène Viollet-le-Duc, avec des fenêtres à meneaux, de faux mâchicoulis, les lucarnes richement décorées et armoriées, les portes richement ornées témoignent de l'aisance du commanditaire.","habitants":"Beauché; Martin Louis,                                                                      Lanscome; Louis François Alexandre Savary\r\n        \r\n        \"","divers":"à Vendoeuvres, celui de Beauché grav 1 à 3 et de Lanscome grav 4  à  7. Et de ste-Thérése grav 8","gps":"","images":["../image/image_36/36_Vendoeuvres_1.jpg","../image/image_36/36_Vendoeuvres_2.jpg","../image/image_36/36_Vendoeuvres_3.jpg","../image/image_36/36_Vendoeuvres_4.jpg","../image/image_36/36_Vendoeuvres_5.jpg","../image/image_36/36_Vendoeuvres_6.jpg","../image/image_36/36_Vendoeuvres_7.jpg","../image/image_36/36_Vendoeuvres_8.jpg"]},"Consult_chateau_formulaire6fee":{"id":"Consult_chateau_formulaire6fee","dept":"36","canton":"Valençay","commune":"Veuil","nom":"Veuil","type":"Château","periode":"XIV-XV-XVI","histoire":"Deuxc châteaux à Veuil, celui de Veuil et la tour du Breuil.                              TOUR DU BREUIL, construit sur les bords du Nahon, le château du Breuil fut d'abord un manoir fortifié dont le premier seigneur connu, Guillaume de Flory (ou Fleury), vivait en 1342. Au XVe siècle, la seigneurie, qui devait foi et hommage aux seigneurs de Valençay, fut possédée par la famille de Signy, avant d'échoir à la famille seigneuriale de Vicq sur Nahon, les d'Orléans. Louis II d'Orléans vendit la terre du  Breuil à Pierre Gauguery en 1633, et ce serait Louis Gauguery fils de Pierre, qui aurait fait rebâtir le château de 1642 à 1645.                                                  VEUIL, au Moyen-Age, la seigneurie est aux du Mesnil, puis à Louis de Marafin qui la vend en 1500 à Jacques Hurault, chambellan  qui entreprend la construction du château actuel. Après sa mort en 1519, son fils Jean, conseiller au parlement de Paris, réside au château et bâtit vers 1520, une belle résidence ordonnée selon un plan régulier. Il ajoute au corps de bâtiment et aux deux tours de l'entrée, trois ailes, afin de créer une cour d'honneur, dont l'élévation est plus basse, à rez-de-chaussée et comble. Cette nouvelle campagne s'inspire du style des derniers châteaux de la Loire, mais également d'édifices plus récents, comme le château de La Rochefoucauld en Charente. Le domaine est érigé en comté en 1726, sous le nom de Veuil-Argenson, avec les châteaux de Veuil, Villentrois et Lye et Veuil resta aux mains des Hurault. Passé aux mains de Talleyrand il sera démoli en 1806 sur son ordre,  propriétaire Henri Hurault.","architecture":"TOUR DU BREUIL, l'élément le plus  remarquable et le plus authentique est le pavillon abritant la chapelle, et inciterait à dater la reconstruction à la fin du XVIe siècle. L'édifice fut modernisé en observant une volonté d'unité et de régularité, tout en conservant des parties anciennes de la vieille demeure et un appareil militaire : les douves avec le pont-levis conduisant au terre plein, la grosse tour de défense sud qui donna le nom à la terre, une tour ronde flanquant l'angle sud-ouest. Les murs du pavillon de la chapelle, situé à l'angle de la plate forme pour surveiller l'entrée, furent percés de canonnières. Vers 1760, une avant-cour précédée d'un rond point, bordée par des dépendances fut aménagée selon un plan régulier par la famille Huet de La Tour du Breuil. A la tour médiévale démolie en 1834, succéda, en 1853, un pavillon carré qui évoque le souvenir de la tour de défense, tout en reprenant le décor du château classique. Au cours de la première décennie du XXe siècle, une galerie néo-classique fut élevée en avant de la façade sur cour du corps de logis. La partie la plus authentique de ce château remanié à diverses reprises, demeure l'élégant pavillon de la chapelle.                                                VEUIL, en 1927, les vestiges du château sont inscrits à l'inventaire supplémentaire de M.H.  Le château, dans un état de ruine avancé, est acquis par Jean-Claude Guyot et se jure de lui redonner vie. En seulement cinq ans, en sappuyant sur une solide équipe damis, d'artisans et bénévoles, Jean-Claude Guyot, à la fois inlassable travailleur et animateur hors pair, a commencer sa restauration.","habitants":"Veuil; Jacques Hurault                                                                    Tour du  Breuil ; famille de Signy\r\n        \r\n        \"","divers":"Veuil; 47° 07' 20\" Nord, 1° 31' 33\" Est  tour du Breuil grav 1. Veuil grav 2-3","gps":"","images":["../image/image_36/36_Veuil_1.jpg","../image/image_36/36_Veuil_2.jpg","../image/image_36/36_Veuil_3.jpg"]},"Consult_chateau_formulairef0cf":{"id":"Consult_chateau_formulairef0cf","dept":"36","canton":"La Châtre","commune":"Vicq-Exemplet","nom":"Vicq_Exemplet","type":"tour","periode":"XVI","histoire":"A Vicq Exemplet  le château de Boulaise, A cinq kilomètres au nord ouest le château de la Berthenoux et le château de la Pouzerie à Thevet st Julien.                                                                                                                              BERTHENOUX, à peu de distance, un autre château, appelé par les habitants \"le château d'en bas\", a été construit vers 1850 par la famille Palienne, dont les descendants l'ont conservé.                                                  BOULAISE, la grande terre de Boulaise, du nom de l'affluent de l'Igneraie, avec ses deux métairies, son moulin ainsi que sa forêt, faisait partie de la seigneurie de Néret. Lorsqu'en 1783, ce grand domaine fut mis en vente par les héritiers de M. Paris de Montmartel, marquis de Brunoy, ce fut Philippe Robin de La Cotardière, seigneur justicier de Néret, qui l'acquit. En 1845, la propriété revint par alliance au comte de Bryas, député de l'Indre et fondateur de la manufacture des Tabacs.                                                                                                                                                                      POUZERIE, siège d'une seigneurie possédée en 1459 par Jacques des Barres, écuyer, le manoir appartient dans la seconde moitié du XVIe siècle à Pierre de Chamborand. Dès 1588, La Pouzerie était aux mains de la famille Bourdaloue: Jean Bourdaloue, parent du fameux prédicateur, fut sieur de La Pouzerie au début du XVIIe siècle. Le domaine passa au XVIIIe siècle à Étienne Peschant de La Pouzerie, capitaine des chasses du comte d'Artois, en 1781. Il appartint aussi à Claude-Charles Duguet, érudit et historien régionaliste connu sous le pseudonyme de Jean du Pontaulais.","architecture":"BOULAISE  de la propriété dispersée par ses derniers fils, il est à retenir le grand logis rectangulaire de la \"grande mestairie\" datant du XVIIIe siècle, avec ses trois chambres basses et ses beaux combles mansardés. Il est menacé d'abandon.                                                                                                                   BERTHENOUX, une cour-jardin est limitée sur deux côtés par des bâtiments bas, à l'origine à usage agricole. Le château s'élève sur deux niveaux plus combles. L'entrée est mise en valeur par un perron appuyé contre un soubassement en pierre de taille. Le toit, à quatre pans, est couvert en ardoise comme les deux arrière-corps qui encadrent le logis. Deux petites tours, l'une carrée, l'autre ronde, la tour de l'ancienne enceinte fortifiée en 2012  le flanquent à chaque extrémité. Des fortifications (douves et tours d'enceintes) sont érigées au XIIIe siècle et au XIVe siècle. Une des tours porte une inscription au nom de Chamborant, abbé de Massay au XIVe siècle. Une charte de franchises est octroyée en 1536.                                                                                                       POUZERIE, la Pouzerie est un haut corps de bâtiment rectangulaire de trois niveaux, flanqué côté cour d'une tour d'escalier circulaire, et à l'arrière d'une deuxième tour, plus imposante, contenant des cabinets. Quelques fenêtres à meneaux horizontales animent les façades, tandis que des rampants encadrent la haute toiture de tuiles. À l'exception de quelques bouches à feu mentionnées par l'ingénieur Delalande en 1794, le château de La Pouzerie ne semble guère avoir été réellement fortifiée, ce qui pourrait indiquer une reconstruction vers le début du XVIe siècle.","habitants":"Boulaise M. Paris de Montmartel,                       Berthenoux, Famille Palienne                                               Pouzerie  Famille Bourdaloue\r\n        \r\n        \"","divers":"château de la Berthenoux  grav-1-2. La Boulaise grav-3 le château de la Pouzerie grav 4-5-6 à Thevet st Julien.","gps":"","images":["../image/image_36/36_Vicq_Exemplet_1.jpg","../image/image_36/36_Vicq_Exemplet_2.jpg","../image/image_36/36_Vicq_Exemplet_3.jpg","../image/image_36/36_Vicq_Exemplet_4.jpg","../image/image_36/36_Vicq_Exemplet_5.jpg","../image/image_36/36_Vicq_Exemplet_6.jpg"]},"Consult_chateau_formulairec1c7":{"id":"Consult_chateau_formulairec1c7","dept":"36","canton":"Valençay","commune":"Vicq sur Nahon","nom":"Vicq_Nahon","type":"Château","periode":"XV-XVIII","histoire":"A Vicq sur Nahon le château de la Moustière et le château de Coubloust\r\n COUBLOUST, cette tour-maison date pour sa partie ancienne du XIIIe siècle, le nom du seigneur, Jean Museau, n'est connu qu'en 1386. À la fin du XVe siècle, le fief est à Christophe, puis à Jean de Forestin. Durant tout le XVIe siècle, il est à la famille de Mareuil, à l'issue de cette période. De 1715 à 1729, il est à Chrétien Gorge. En 1869, il est vendu à un carrossier de Paris qui va effectuer d'importantes modifications.                                                                                                                MOUSTIERE, ce château fut construit vers 1745 par Joseph-Abel Couture pour Ermond Le Prestre de Neubourg, receveur général des Finances de la généralité de Caen. Aujourd'hui appartient au baron d'Entraigues.","architecture":"COUBLOUST, est toujours une grosse tour rectangulaire flanquée sur une face, l'une contre l'autre, d'une tour carrée et d'une tour d'escalier. Le bâtiment compte quatre niveaux, les deux intermédiaires ayant fonction résidentielle. En 1869, il est vendu à un carrossier de Paris qui va effectuer d'importantes modifications. Le toit à deux pans et les pignons porteurs sont rasés. Il ajoute une grosse tour à faux mâchicoulis, faisant pastiche de la Renaissance en Val de Loire. À la fin du XIXe siècle, Coubloust fut le siège d'une entreprise vinicole dotée de bâtiments fonctionnels avec pressoir, chai, logements ouvriers, qui n'eurent qu'une brève vie, mais que le propriétaire actuel a su préserver avec discernement comme témoignage des idées philanthropiques du XIXe siècle.                                                                                                 MOUSTIERE, de style classique, forme un quadrilatère. Le bâtiment principal est prolongé de deux petites ailes. Une avancée centrale encadrée d'un effet de pilastres, est dominée par un fronton triangulaire. Les décorations utilisent les guirlandes en fort relief pour la porte d'entrée, la fenêtre au-dessus, le fronton et les oeils-de-boeufs. Pots à feu et clefs sculptées sont également utilisés. Au sud, la cour d'honneur est encadrée de dépendances basses. A l'est se trouve un long commun. Face au château, de chaque côté de l'allée d'arrivée, deux autres bâtiments semblent du XVIIe siècle. La chapelle est marquée par un fronton à l'italienne, reposant sur deux pilastres plats. A l'intérieur, les salons en enfilade sont entièrement décorés de boiseries. Parquets à la Versailles.","habitants":"Coubloust;famille de Mareuil,                                                   Moustière;  Ermond Le Prestre de Neubourg\r\n        \r\n        \"","divers":"A Vicq sur Nahon le château de la Moustière grav-1-2 et le château de Coubloust grav-3-4","gps":"","images":["../image/image_36/36_Vicq_Nahon_1.jpg","../image/image_36/36_Vicq_Nahon_2.jpg","../image/image_36/36_Vicq_Nahon_3.jpg","../image/image_36/36_Vicq_Nahon_4.jpg"]},"Consult_chateau_formulaire78fe":{"id":"Consult_chateau_formulaire78fe","dept":"36","canton":"Buzençais","commune":"Villedieu sur indre","nom":"Villedieu","type":"Château","periode":"XV","histoire":"Trois châteaux à Villedieu celui de Chamousseau et du Puy. Ruines du château de Villedieu-sur-Indre .                                                           CHAMOUSSEAU, de nombreuses familles, nobles ou non, se sont succédé sur la terre de Chamousseau depuis les origines, ainsi, les Barbançois au XVe siècle, Douhault de 1601 à 1787, de Maussabré qui en furent les derniers seigneurs, puis le conventionnel Thabaud-Boislareine. La terre est acquise en 1821 par Henry Pâtureau, banquier à Châteauroux.                                                                                                                 VILLEDIEU, l'histoire de Villedieu remonte au IXe siècle avec la fondation d'un prieuré par Robert de Déols. En 1287 Raoul de Chauvigny, descendant des comtes de Déols, vit son château rasé pour avoir enlevé Isabelle de Bommiers. Dix ans plus tard, il obtint du roi Philippe le Bel de réédifier et fortifier sa maison. Vendu nationalement à la Révolution, il est acheté en 1812 par Charles Stuart, duc de Berwick, 1er gentilhomme du comte d'Artois. En 1922, il est acquis par la famille Gillès de Pélichy, d'origine belge.\r\nDU-PUY   C'était à l'origine une dépendance du fief tout proche de Chamousseau qui, lui-même, relevait de Buzançais. En 1472, Jean de Barbançois, seigneur de Chamousseau, abandonna ses droits sur Le Puy en faveur de son voisin Jacques de Joumieu. L'arrière petit-fils de celui-ci, Daniel de Joumieu, fit construire le pavillon et deux des tours du château actuel, ainsi que le relate un acte de partage de 1618.","architecture":"CHAMOUSSEAU, englobe l'édifice primitif qui comportait un corps de bâtiment flanqué de trois tours, la façade principale donnant sur le parc clos de murs, comporte un bâtiment à quatre travées, élevé d'un étage et surmonté de lucarnes à décor médiéval. Cette partie centrale est flanquée de deux tours à poivrière, faisant partie du bâtiment d'origine. À l'ouest une tour carrée, disposée diagonalement, reposant sur des arcades et abondamment décorée de motifs d'esprit gothique flamboyant. La façade sud, donnant sur les dépendances, avec une tour carrée et une tourelle d'angle encadrant une tour centrale qui sert d'accès.                                                                                                     VILLEDIEU, : abandonné, situé au milieu du village, présente un spectacle attristant :  toitures et planchers effondrés, murs envahis de végétation, ouvertures béantes, il semble attendre le mécène qui lui redonnera vie. L'édifice, ceinturé de douves alimentées par la Trégonce, comporte une partie  du  XVe siècle consistant en un corps de bâtiment à quatre travées, élevé sur deux étages et combles, reliant deux tours massives dont les couronnements ont été refaits au XIXe siècle par Dauvergne ainsi que la façade sud.                                                                                                     DU-PUY, consiste en une forte tour carrée, couverte en forme de dôme d'une charpente très belle et fort élevée, à deux coins de cette tour, deux autres tours, l'une servant d'escalier, la façade ouest, simple, comporte deux grosses tours à poivrière encadrant le corps principal, reste de la \"forte tour carrée\". À l'est, la disposition est plus originale car l'unique tour se trouve placée en saillie au centre du bâtiment. Plus haute que le reste du logis, elle comporte un balcon semi-circulaire construit au XIXe siècle et est coiffée d'une toiture en pignon elle-même sommée d'une sorte de lanternon.","habitants":"Chamousseau; famille  de Maussabré\r\n Villedieu     Charles Stuart, duc de Berwick  \r\n        \"","divers":"à Villedieu celui de Chamousseau de  5-6-7 . Ruines du château de Villedieu-sur-Indre  grav 1 à 4.","gps":"","images":["../image/image_36/36_Villedieu_1.jpg","../image/image_36/36_Villedieu_2.jpg","../image/image_36/36_Villedieu_3.jpg","../image/image_36/36_Villedieu_4.jpg","../image/image_36/36_Villedieu_5.jpg","../image/image_36/36_Villedieu_6.jpg","../image/image_36/36_Villedieu_7.jpg"]},"Consult_chateau_formulaire19a9":{"id":"Consult_chateau_formulaire19a9","dept":"36","canton":"Levroux","commune":"Villegongis","nom":"Villegongis","type":"Forteresse","periode":"XV","histoire":"A deux K.M.au nord de Villelongis le château de Boishaut.                      VILLEGONGIS,  au XVe siècle un premier château est acquis par la famille de Menou par alliance passe à la maison Beaumont Brizay. Le château est bâti en 1530 par Jacques de Brizay seigneur et capitaine et par alliance  au  Avoye de Chabannes arrière petite fille naturelle du roi Louis XI. Les héritiers de Jacques de Brizay vendent la propriété en 1570, à Madeleine de Launay, épouse de Geoffroy de Neuchèze et après le mariage de leur fille, elle passe à la famille de Barbançois. En 1767 érigé en marquisat.  En 1787, Charles-Hélion de Barbançois fit abattre plusieurs parties du château ruinées. Pendant la Révolution, l'édifice ne fut pas dégradé. Vers 1880, des restaurations importantes, commandées par les Barbançois à l'architecte Dauvergne, ont modifié les façades, en particulier celles de l'escalier, mais ont respecté le décor du logis. En 1914 mort du dernier des Barbençois passe à sa fille qui épouse  le baron Philippe de Montesquieu.                                                                                                   BOISHAUT, le seigneur possédait l'un des rares moulins à vent de la région attesté au XVIIe siècle porté sur la carte de Cassini. Nous y trouvons les familles de Douhault, Duris de Vineuil, puis il est acquis, avec ses 1600 ha en 1811, par M. Michel Pâtureau, banquier à Châteauroux, conseiller général, qui fit rebâtir l'ensemble, ses descendants en resteront propriétaires jusque dans les années 1940.","architecture":"VILLEGONGIS, Il ne reste maintenant qu'une aile avec deux tours. Il comporte des emprunts au château de Chambord comme l'ordonnance des façades avec un décor d'incrustations d'ardoises. Coté cour, on trouve un pavillon en façade  et vers les douves, une travée de fenêtres plus petites que les autres de l'édifice. L'édifice entouré de douves  se compose d'un corps de bâtiment rectangulaire flanqué, à ses angles nord-est et nord-ouest, de deux grosses tours cylindriques à mâchicoulis. A l'intérieur, le rez-de-chaussée présente une suite de salons. Le premier étage est réservé aux chambres. Lucarnes et cheminées évoquent Chambord, ainsi que le détail caractéristique des plaques de schiste incrustées. L'escalier de pierre est accusé en façades par les baies jumelles encadrées de doubles pilastres, qui l'éclairaient à chaque étage.                                                             BOISHAUT, dans un aveu de 1536, le seigneur rappelle son droit d'avoir des fossés autour de son hôtel, avec pont-levis, comme ses prédécesseurs en avaient et comme il en reste derrière sa maison. Il a aussi un colombier, une garenne, des jardins attenants à son logis et 300 arpents de bois situés tout près. Le château actuel porte sur le linteau de la porte d'entrée principale la date de 1729 et date en partie du XIXe siècle ; une tour qui flanque le logis sert de pigeonnier. Il n'y a plus de trace des fossés de cette maison forte, l'étang, la basse-cour mentionnés en 1546 ont disparu.","habitants":"Villelongis  Famille des  Avoye de Chabannes                          Boishaut  Familles de Douhault\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Villelongis  grav 1 à 4   le château de Boishaut grav 5-6-7.","gps":"","images":["../image/image_36/36_Villelongis_1.jpg","../image/image_36/36_Villelongis_2.jpg","../image/image_36/36_Villelongis_3.jpg","../image/image_36/36_Villelongis_4.jpg","../image/image_36/36_Villelongis_5.jpg","../image/image_36/36_Villelongis_6.jpg","../image/image_36/36_Villelongis_7.jpg"]},"Consult_chateau_formulaire4f71":{"id":"Consult_chateau_formulaire4f71","dept":"36","canton":"Valençay","commune":"Villentrois","nom":"Villentrois","type":"Forteresse-vestiges","periode":"XI-XV","histoire":"VILLENTROIS, au début du Xe siècle, les terres appartiennent au sieur Adelaud, et possession du comte d'Anjou Foulque le Roux. Il en donne la garde au seigneur de Buzançais. Au début du XI siècle, le comte d'Anjou Foulque Nerra fait construire une forteresse à l'extérieur du bourg nommé Villenstrada, celui-ci en confia la garde à un de ses fidèles, Roger, dont la mission était de faire face aux comtes de Blois. Villentrois était la forteresse située la plus à l'Est du dispositif militaire du comte d'Anjou. Le but est de surveiller la partie Est du territoire de son ennemi : Le comte de Blois Eude II. Au milieu du XIe siècle, une famille de Villentrois est citée. Au XIIIe siècle, le seigneur de Villentrois fonde le prieuré de Saint Mandé.  En 1472, l'héritière du château apporte le site en dot à son mari Philippe de Commynes.\r\nA la fin du XVe siècle, Philippe, seigneur de Villentrois, fait démolir l'ancienne forteresse pour construire l'actuel château. Au XVIIe siècle, le château n'est plus habité.  En 1920, les 2 portes fortifiées du château sont détruites. En 1927, les nouveaux propriétaires la famille Pourcher réalisent quelques restaurations et consolidations, en 1950 la famille Marty restaure un grand bâtiment. Au début du XXIe siècle, la découverte de l'extérieur depuis les rues du bourg est libre. En 1985  olivier Péronnin propriétaire.","architecture":"VILLENTROIS . L'ensemble suit un plan pentagonal du XIe siècle\r\nA la fin du XIXe siècle, les propriétaires ont enlevé au château des matériaux, en particulier les planchers et les solives ou poutres en chêne, pour les transporter ailleurs en vue de leur réemploi à des constructions modernes. Le château ne comporte plus ni toitures, ni planchers, ni menuiseries. Le château était entouré autrefois d'une enceinte fortifiée avec tours de défense et porte monumentale. Une galerie de communication en encorbellement  devait exister autrefois au-dessus du mur Est, deux portes se faisant vis à vis, au même niveau, l'une à la tour nord-est, l'autre à l'aile centrale. De l'aile centrale, descente à la terrasse-jardin antérieure par un escalier de pierre, avec perron. A l'angle sud-est de la terrasse-jardin, se trouve une tour octogonale en saillie.","habitants":"Famille de Philippe de Commynes\r\n        \r\n        \"","divers":"Villentrois 47° 11' 41\" nord, 1° 27' 48\" est","g
