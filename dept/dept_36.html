mtes de Vierzon , la châtellenie est aux  mains des Linières, au XIVe siècle fief des Châteauneuf passe par alliance aux Viersac au XVIe siècle à Claude de La Châtre qui emploie une partie de la dot de sa femme Anne Robertet, fille de Florimont sieurs des Allues leur fils Claude maréchal de France meurt en  1614 laisse son fils pour héritier maréchal également, la fille de Louis Henriette épouse Claude Pot seigneur de Rhodes, leur fille Marie Elisabeth  épouse François-Marie de l'Hôpital duc de Vitry et maréchal de France, le château est cédé en 1656 à Jacques de Lafond conseiller du roi, à la mort de Jean Charles de Lafond en 1740 sans héritier, sa mère  veuve convole  avec Charles Jean de Riffardeau qui veuf à son tour aura de son second mariage le second duc de la Rivière et en 1792, ce dernier se défait  du domaine au profit  du fermier général Christeau acquis en 1794  par Courrayer  dont les descendants le cèdent  en 1824 à Claude Pradet, puis aux Hemery  de Lazenay, aux Geoffre de Chabrignac et les Escherny et dernièrement aux Espivent de la Villeboisnet.\r\nORMETEAU, après 1312, elle fut dévolue aux Hospitaliers. Le château de l'Ormeteau connaît aussi une bataille lors des guerres de religion, en septembre 1589.  En 1429, les anglais occupaient Lormeteau, Ardelon et Mennetou-sur-Cher. Après les destructions engendrées lors de la guerre de cent ans, le commandeur Jean de Marcenac obtint en 1457 du roi Charles VII lautorisation de relever les fortifications. Les fenêtres furent ensuite ouvertes à la Renaissance. Le dernier commandeur, Savary de Lancosme, a quitté l'Ormeteau en 1790.","architecture":"La FERTE, fut construite entre 1656 et 1659, suivant les plans de François Mansard. Ses profils avaient de la précision et de la correction et personne n'avait mieux conçu que lui la distribution générale d'un plan, mais on lui a reproché, en s'éloignant totalement de l'élégance et de la grâce caractéristiques du siècle de François I er, en exagérant la noblesse et la dignité pour donner plus de grandeur à ses édifices, il est tombé dans la pesanteur. De plan quadrilatère se composait à l'origine de quatre corps de bâtiment dont l'un a été abattu   pour ouvrir la cour d'honneur avec à ses angles une tour cylindrique coiffée d'un toit  à l'impérial sommé d'un clocheton. Lucarnes sur combles à fronton triangulaire.                                                                                                ORMETEAU, les bâtiments qui subsistent de nos jours sont composés d'un quadrilatère flanqué de quatre tours d'angles de diamètres différents, avec des couvertures en poivrière. Au sud, une tour carrée abrite un escalier. Un peu plus loin se dresse le pigeonnier reconstruit au XIXe siècle. L'emplacement des fondations de la chapelle est encore visible, ainsi que différents vestiges. On accédait à l'étage habitable par une échelle jusqu'en 1400, puis par un escalier extérieur.  Les fenêtres furent ensuite ouvertes à la Renaissance, le dessus de la porte principale porte les écus des rois de France, de saint Jean de Jérusalem et du commandeur hospitalier de Marcenac. Une prison fut installée au début du XVIIe siècle dans une des tours.","habitants":"Ferté; Famille de Claude de La Chatre                      Ormeteau;commandeur Jean de Marcenac\r\n        \r\n        \"","divers":"Ferté; 47°03'55\" Nord et 2°02'25\" Est    grav 1-2-3-4                               Ormeteau ;47° 04' 15\" Nord, 1° 58' 25\" Est  Grav 5-6-7","gps":"","images":["../image/image_36/36_Fert%c3%a9_Reuilly_1.jpg","../image/image_36/36_Fert%c3%a9_Reuilly_2.jpg","../image/image_36/36_Fert%c3%a9_Reuilly_3.jpg","../image/image_36/36_Fert%c3%a9_Reuilly_4.jpg","../image/image_36/36_Fert%c3%a9_Reuilly_5.jpg","../image/image_36/36_Fert%c3%a9_Reuilly_6.jpg","../image/image_36/36_Fert%c3%a9_Reuilly_7.jpg"]},"Consult_chateau_formulaire5139":{"id":"Consult_chateau_formulaire5139","dept":"36","canton":"Vatan","commune":"Fontenay","nom":"Fontenay_Indre","type":"Château","periode":"XV","histoire":"deux châteaux à Fontenay, celui de Fontenay et celui de Dimes.                                                                                           DIMES, la famille de Boisvilliers acquiert la terre dans la deuxième moitié du XVIe siècle, sans doute par le mariage d'Odet, seigneur de Buxeuil, avec l'héritière de Léonard de Guisarme. Ce dernier détenait La Dîme de son beau-père, Jean Gamat, acquéreur du fief en 1547, et en rendit hommage pour moitié au seigneur de Buxeuil. La partie la plus ancienne forme de nos jours l'aile en retour et est l'uvre de Charles Jean de Boisvilliers, seigneur de La Dîme au début du XVIIIe siècle. Elle présente un niveau unique sous un étage de combles éclairé de deux lucarnes de pierre. Le corps de logis, construit en 1771 par Charles-François de Boisvilliers, dernier seigneur de La Dîme.                                           FONTENAY   pas d'information historique.","architecture":"DIMES, est un bâtiment quadrangulaire à trois niveaux. Il se prolonge sur le côté par une construction basse du XIXe siècle au toit à la Mansart. Baigné par les douves qui cernent partiellement l'édifice, une tour carrée au toit en pavillon complète l'ensemble. Au-delà des jardins, la propriété comprend d'anciennes granges dîmières, à l'origine du nom du lieu et un charmant théâtre dans l'esprit du XVIIIe siècle.                       FONTENAY, située au milieu d'un vaste parc, la belle façade rouge et blanche du château de Fontenay, jadis appelé La Vente, se mire dans un large étang. Construit vers 1890, il semble que ce château soit la réplique d'un édifice situé dans le bourg d'Écueillé. Cette demeure présente toutes les caractéristiques d'un style néo-Louis XIII, fréquemment utilisé à la fin du XIXe siècle et dans ce cas très bien maîtrisé; utilisation d'un mélange brique et tuffeau, compacité de l'édifice élevé sur un petit entresol, et surtout une grande rigueur, voir sècheresse dans l'ordonnance des façades","habitants":"Dimes; famille de Boisvilliers \r\n        \r\n        \"","divers":"Château de Fontenay","gps":"","images":["../image/image_36/36_Fontenay_Indre_1.jpg","../image/image_36/36_Fontenay_Indre_2.jpg"]},"Consult_chateau_formulairec8a4":{"id":"Consult_chateau_formulairec8a4","dept":"36","canton":"Eguzon-Chantôme","commune":"Gargilesse-Dampierre","nom":"Gargilesse_Indre","type":"Château","periode":"XVII","histoire":"GARGILESSE, l'histoire connue débute au VIIIe siècle, les Cuens ou comtes de Gargilesse y ont édifié un puissant château-fort et ont guerroyé sans relâche pour défendre leur fief. Au XIIe siècle, Hugues de Naillac, devient seigneur de Gargilesse par son mariage. Hugues de Naillac construit la chapelle romane attenante au château, aujourd'hui église du village. Faute de successeurs directs, Gargilesse échut à Jean de Prie en 1389. Au début du XVIIe siècle, Charlotte de Rochefort vend le château à René du Bost du Breuil, gentilhomme de petite noblesse mais fort riche,  désireux de porter le titre de comte qui s'y rattachait. Il va provoquer la ruine de Gargilesse. Partisan de la Fronde, il vient se réfugier au château avec 91 hommes d'armes, 29 serviteurs et 150 chevaux. Le château fut assiégé pendant 15 jours par un détachement des armées de Turenne, pris d'assaut, incendié et démantelé. Gargilesse n'est plus que ruines et s'endort pour 100ans. En 1750, l'épouse de Louis Charles du Bost du Breuil, Olympe de  Chevigny, construit sur les ruines un château neuf. C'est un  manoir de style du XVIIIe siècle qui se visite aujourd'hui.","architecture":"GARGILESSE, de l'ancienne demeure féodale, il ne subsiste que la poterne et des contreforts. La tour carrée, également conservée lors de la reconstruction, date du XVIIe siècle et était à l'origine, le tombeau des seigneurs de Gargilesse. Le château va traverser sans dommage la bourrasque révolutionnaire, Louis Charles Pierre du Bost du Breuil fut emprisonné sous la Terreur, il échappa à la guillotine et  retrouva ses biens. L'arrière-petite-fille d'Antoine Charles, la comtesse de Danne sera la dernière propriétaire titrée de la demeure. De 1960 à 1986 son époux laisse le bâtiment à l'abandon, proie du lierre et des vandales. Mais un couple de particuliers, le sauve de la ruine totale en restaurant l'ensemble du gros oeuvre et en 1998, une artiste peintre passionnée de vieilles pierres rachète le château. Elle poursuit sa restauration, elle a eu l'idée de lui redonner vie en y installant une Galerie d'Art, ce lieu prestigieux a été inauguré le 8 mai 1999.","habitants":"Famille de René du Bost du Breuil\r\n        \r\n        \"","divers":"Gargilesse; 46° 30' 39\" Nord, 1° 18' 31\" Est","gps":"","images":["../image/image_36/36_Gargilesse_indre_1.jpg","../image/image_36/36_Gargilesse_indre_2.jpg","../image/image_36/36_Gargilesse_indre_3.jpg","../image/image_36/36_Gargilesse_indre_4.jpg","../image/image_36/36_Gargilesse_indre_5.jpg","../image/image_36/36_Gargilesse_indre_6.jpg","../image/image_36/36_Gargilesse_indre_7.jpg"]},"Consult_chateau_formulaired029":{"id":"Consult_chateau_formulaired029","dept":"36","canton":"Ardentes","commune":"Sassièrgues Saint-Germain","nom":"Greuille","type":"Château","periode":"XV","histoire":"GREUILLE,  Étienne de Greuille, damoiseau, fit aveu du fief de Greuille au seigneur de  Châteauroux, en 1292. L'ancienne motte de Greuille, désignée en 1452 dans l'aveu qu'en fit Marie de La Mothe, devient sous Henri IV, une petite maison-forte entourée de fossés. Possessions de la famille de Mousseaux au cours du XVIe siècle, puis cédés à Claude de Boisbertrand, écuyer, le fief et le château furent acquis par la famille Bertrand en 1699. À la fin du XIXe siècle, Jenny de Vasson, photographe bien connue, y passera une partie de sa jeunesse. En 1900, on démolit une partie des bâtiments et une tour d'angle, le propriétaire, M. de Vasson, fit construire un nouvel édifice  d'après les plans de l'architecte Henri Dauvergne.","architecture":"GREUILLE, nouvel édifice  d'après les plans de l'architecte Henri Dauvergne, en intégrant deux corps  de bâtiment ayant fait partie de la résidence d'origine, l'édifice principal de plan rectangulaire à trois niveaux flanqués de tour ronde, pavillon d'entrée saillant, toit en deux pans flanqué de lucarnes. Du château de Greuille dépend une chapelle qui fut bénie en 1744, et qu'il est encore possible d'apercevoir dans le parc.","habitants":"Famille d'Étienne de Greuille,\r\n        \r\n        \"","divers":"Château de Greuille","gps":"","images":["../image/image_36/36_Greuille_1.jpg","../image/image_36/36_Greuille_2.jpg","../image/image_36/36_Greuille_3.jpg","../image/image_36/36_Greuille_4.jpg"]},"Consult_chateau_formulaire3286-2":{"id":"Consult_chateau_formulaire3286-2","dept":"36","canton":"Le Blanc","commune":"Ingrandes","nom":"Ingrandes","type":"forteresse","periode":"XV","histoire":"A Ingrandes le château et le Manoir de la Croix Blanches.                              INGRANDES, au XVIe siècle la seigneurie été la possession d'Olivier de la Haye qui vendit en 1548 à Guillaume de Foucault donné ensuite  par Henri IV à Antoine d'Aloigny, en 1652 Louis le fils d'Antoine en est le seigneur les biens seront transmis à son fils Antoine, en 1687 le frère de celui-ci Henri-Louis. L'unique héritière  Marie-Henriette d'Aloigny, citée par Saint-Simon comme étant une intrigante, fut exilée de la cour de Versailles et vécut au château d'Ingrandes où elle fit construire le logis XVIIe siècle  et en 1714, le domaine est saisie et acquis par Mathieu Pinsonneau seigneurs de Coulanges, trois ans après vend à Marie-Madeleine de la Vieuville veuve de César de Beaudéan comte de Parabère en 1738 cède le domaine à Claude Dupin conseiller et secrétaire du roi,  la fille de Claude Dupin épousera un Vallet de Villeneuve,   le fermier général Claude Dupin, grand-père de George Sand (née Aurore Dupin), devint, en 1739, acquéreur de l'ensemble des châteaux du Marquisat du Blanc. Les circonstances de la destruction du corps de logis sont mal connues : celle-ci pourrait remonter à la fin du XVIIIe siècle. Le château d'Ingrandes resta la propriété des descendants Dupin, le baron de Villeneuve jusqu'au début de ce siècle. En 1923, il devint alors la propriété de la famille Combescure qui l'exploita en tant que ferme jusque dans les années 1970. Alain et Jacqueline Drouart font l'acquisition des ruines du château féodal d'Ingrandes en 1982, ont aménagés des chambres d'hôtes","architecture":"INGRANDES, il reste une partie de l'enceinte avec ses courtines et ses tours, le donjon et l'ancienne tour d'escalier inscrits M.H. le 1er octobre 1987 ainsi que la partie ancienne du logis datée du XVe siècle. Le logis médiéval est complété par un logis construit au XVIIe siècle et rehaussé au XIXe siècle.  Le château fut ensuite reconstruit aux XIVe siècle et XVe siècle. Les vestiges nous restent aujourd'hui. La charpente de la tour à hourds a été datée de 1465. Les tours en poivrières du donjon et de l'enceinte furent semble-t-il tronquées en application des décrets royaux de 1626 ordonnant la destruction de l'appareil militaire des places-fortes du royaume. Un dossier de demande de protection est déposé. À ce jour, le logis du XVe siècle est totalement restauré, le donjon est sauvé et les travaux se poursuivent. En 2005, un hourd a été reconstruit sur une des tours d'enceinte. Le 17 avril 2008, une nouvelle toiture est posée sur la tour escalier.                                                CROIX-BLANCHE , est une demeure de style poitevin, flanqué dune tour et dun porche fortifié. A la fin du XIXe siècle, une galerie à colonnade a été édifiée sur la façade et le côté sud, de type andalou mauresque avec sculpture sur les chapiteaux de colonnes. Le nouveau bâti donne lieu à une multiplicité de formes au niveau des couvertures. Le toit à croupes du bâtiment originel est entouré d'appentis, de toits en pavillon, de toits coniques et de toits polygonaux. Entre le parc et le château se trouvent de très belles dépendances présentant un caractère original.","habitants":"Famille   d'Olivier de la Haye\r\n        \r\n        \r\n        \"","divers":"Ingrandes; 46° 35' 50\" Nord et 0° 57' 45\" Est  grav 1 à 4;  le château de la Croix Blanches grav  5-6","gps":"","images":["../image/image_36/36_Ingrandes_1.jpg","../image/image_36/36_Ingrandes_2.jpg","../image/image_36/36_Ingrandes_3.jpg","../image/image_36/36_Ingrandes_4.jpg","../image/image_36/36_Ingrandes_5.jpg","../image/image_36/36_Ingrandes_6.jpg"]},"Consult_chateau_formulairea947":{"id":"Consult_chateau_formulairea947","dept":"36","canton":"Châtillon sur Indre","commune":"Clion","nom":"Isle_Savary","type":"Forteresse","periode":"XIV-XV","histoire":"A cinq kilomètres au sud ouest à Murs le château d'Allogny                             ISLE-SAVARY, le fief et le château sont attestés dès le XIIe siècle, au XIIIe siècle possession de la famille de Savary jusqu'au XIVe siècle qui passa aux Brabant, puis aux Harcourt avant  d'échoir au maréchal Boucicaut, son neveu  Jean le Meingre se défait de l'Isle au profit de  Guillaume de Varye, compagnon de Jacques Coeur, acquéreur en 1464 pour une somme considérable fit raser l'ancien château pour le reconstruire entièrement peu avant sa mort en 1469. l'entreprise se poursuit par Charlotte de Bar sa veuve qui convolera en 1470 avec Pierre Doriole général des finances en Languedoil, épargné par les guerres de religion comme par la Révolution, n'a subit aucune transformation jusqu'au XIXe siècle. Vers 1820, le marquis de Jouffroy nouveau propriétaire, modernise le bâtiment.                                                                               ALLOGNY, à la fin du XVIe siècle, le château Allogny appartenait à René de La Motte, seigneur de Douai. En 1789 Marguerite d'Allogny, veuve de François de La Motte, vote à l'assemblée de Touraine des Etats Généraux. En 1900, le dernier propriétaire portant ce nom, René de La Motte d'Allogny, est chambellan du prince de Monaco.","architecture":"ISLE-SAVARY, entouré sauf sur la face nord de profonds fossés, le château consiste dans trois ailes de même hauteur qui s'organisent autour d'une cour d'honneur carrée, jadis fermée au sud par un mur d'enceinte le corps de logis du fond est flanqué sur ses angles extérieurs de deux tours carrées en forte saillie et sur lesquelles se continue le chemin de ronde sur mâchicoulis qui ceint l'ensemble des bâtiments, les façades régulièrement percées de fenêtres à meneaux. Il était totalement fermé, la courtine sud a disparu, pour le rendre plus agréable à habiter. Dans son état actuel, construit en une seule phase au XVe siècle,  Conservant de nombreux éléments de l'architecture militaire médiévale, plan carré, donjon, fortes défenses (mâchicoulis, chemin de ronde, douves et ponts-levis), il présente aussi, par ses élégantes proportions, la régulière symétrie de ses façades, la qualité de ses ouvertures, son organisation intérieure tous les éléments de l'architecture nouvelle. Vers 1820, le marquis de Jouffroy nouveau propriétaire, modernise le bâtiment démolition du mur  fermant la cour d'honneur et démolit deux escaliers placés dans deux tourelles polygonales édifié aux angles de la cour d'honneur et installe des lucarnes à fronton triangulaire.  C'est dans les dépendances du château que fut créée au XIXe siècle, la première École Pratique d'Agriculture.                                                                       ALLOGNY, du château primitif, il subsiste un pavillon central jouxtant l'amorce d'un corps de logis et une petite aile en rez-de-chaussée. La partie sud est une reconstruction du XIXe siècle, sans recherche esthétique. Il existait une chapelle dédiée à Notre-Dame et invoquée par les femmes pour avoir du lait.","habitants":"Isles Savary Famille de Savary                                         Allogny  René de La Motte\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Isle Savary;  46° 56' 32\" Nord, 1° 14' 00\" Est grav 1 à 5; Allogny à Murs grav 6-7-8","gps":"","images":["../image/image_36/36_Isle_Savary_1.jpg","../image/image_36/36_Isle_Savary_2.jpg","../image/image_36/36_Isle_Savary_3.jpg","../image/image_36/36_Isle_Savary_4.jpg","../image/image_36/36_Isle_Savary_5.jpg","../image/image_36/36_Isle_Savary_6.jpg","../image/image_36/36_Isle_Savary_7.jpg","../image/image_36/36_Isle_Savary_8.jpg","../image/image_36/36_Isle_Savary_9.jpg"]},"Consult_chateau_formulaire3f29":{"id":"Consult_chateau_formulaire3f29","dept":"36","canton":"Issoudun","commune":"Issoudun","nom":"Issoudun","type":"Vestiges -Château","periode":"XII-XV","histoire":"A Issoudun quatre châteaux celui de  Frapesle, le Beffroi et la Tour Blanche et les Planches.                                                                                                                        FRAPESLE, Balzac s'est inspiré de la vie à Issoudun, du parc du château et des alentours pour y situer le cadre de son roman La Rabouilleuse qui est le surnom donné à l'héroïne, Flore Brazier, à cause de son habitude de troubler l'eau d'une petite rivière bordant le jardin de Frapesle pour y pêcher des écrevisses, ce qu'on appelait localement « rabouiller \". Il a également emprunté le nom de Frapesle dans Le Lys dans la vallée quand il y décrit le château de Valesne qui se trouve à Saché. \r\nLe château est aujourd'hui propriété privée appartenant à la famille Luneau. Avec son parc, le château fait lobjet dune inscription au titre des M.H. depuis le 9 août 1993. \r\nTOUR BLANCHE, la tour Blanche du XIIe siècle, est un donjon attribuée à Richard Cur de Lion, récemment restaurée.                                                                                    Les PLANCHES, parc romantique paysager, créé au XIXe siècle par Ferdinand de Lesseps pour son fils aîné Charles, composé d'arbres bicentenaires. Au XVIIIe siècle, la seigneurie appartient à la famille Aupic, famille de notables d'Issoudun et passe par alliance aux Boursault du Troncay, sur qui le fief est saisi comme biens d'émigrés et vendu. L'édifice est démoli en 1846 et le château actuel est construit en 1865 par Charles de Lesseps qui fait insérer sur les façades de beaux bas reliefs de marbre Italien. Au décès de Charles de Lesseps, en 1923, le nouveau propriétaire fût son neveu jusquen 1935. En 1936, il appartient à la famille Labre Bussy, puis le château sera détenu par les familles Chauveur et Préault. Aujourd'hui à la famille Spada.","architecture":"BEFFROI  Le Beffroi date des XIIe et XVe siècles. La façade nord-est décorée dans un style Renaissance, ces deux tours rondes inégales marquent l'emplacement de l'une des sept portes fortifiés de la ville la maison d'habitation a été modifiée sous le Second Empire, par l'ajout d'un balcon de style colonial posé sur pieds avec une avancée de toit.                                                                  TOUR BLANCHE, haute de 27 m, elle a des murs de 4 m d'épaisseur. Un escalier de 150 marches permet d'accéder aux trois étages de la tour et de profiter du panorama.                              LES-PLANCHES Le style de la bâtisse s'inspire de l'architecture gothique. On peut ainsi voir une tour à pans coupés ou des fenêtres à meneaux sur les façades, des lucarnes interrompant l'avant-toit, une demi-croupe ou des flèches en ardoises. Le château possède un beau parc romantique paysager, créé au XIXe siècle pour Ferdinand de Lesseps, composé d'arbres bicentenaires, une rivière et des étangs.","habitants":"Frapesle;Famille Luneau                                                          Planches; famille Charles de Lesseps \r\n        \r\n        \"","divers":"Issoudun mairie beffroi grav 1 - 2                                                   Frapesle, 46° 57' 39\" nord, 1° 59' 40\" est  grav 3 - 4-5                       Tour Blanche grav 6-7.                                                                          Les Planches grav 8","gps":"","images":["../image/image_36/36_Issoudun_1.jpg","../image/image_36/36_Issoudun_2.jpg","../image/image_36/36_Issoudun_3.jpg","../image/image_36/36_Issoudun_4.jpg","../image/image_36/36_Issoudun_5.jpg","../image/image_36/36_Issoudun_6.jpg","../image/image_36/36_Issoudun_7.jpg","../image/image_36/36_Issoudun_8.jpg"]},"Consult_chateau_formulaire2af2":{"id":"Consult_chateau_formulaire2af2","dept":"36","canton":"Ardentes","commune":"Jeu les Bois","nom":"Jeu_Bois","type":"Château","periode":"XVII-XVIII","histoire":"A Jeu, château du Bellevue et de la Villeneuve\r\nBELLEVUE,  tire son nom de sa position dominante sur la vallée de la Bouzanne. La seigneurie existe au XIIIe siècle, elle appartenait aux seigneurs de Châteauroux et malgré plusieurs démembrements, furent toujours considérés comme les seigneurs de la paroisse. La construction d'un château ne semble pas remonter au-delà du XVIIe siècle. Charles Ancellon en est le propriétaire en 1610, avant de le céder en 1627, par le mariage de sa fille Anne, à la famille de Laigue. Cette famille en reste propriétaire jusqu'aux environs de 1760 lorsque Louis Girard, seigneur de Vasson, devient seigneur de Bellevue.                                                   VILLENEUVE,  si la villa nova apparaît dès 1292, c'est au début du XIXe siècle que l'actuelle demeure fut construite sur l'emplacement d'une métairie possédée au XVIIIe siècle par la famille Crublier de la Villeneuve, dont François fut maire perpétuel de Châteauroux. Augmenté avant 1900 d'un avant-corps au toit aigu au centre de sa façade, le bâtiment, passé par alliance à M. Delouche de Pémoret, échut finalement à la famille Dubois de La Sablonnière. Le parc est constitué d'après les dessins du paysagiste Édouard André.","architecture":"BELLEVUE, le corps de logis principal, à un étage, est couvert d'une toiture de tuiles à quatre pans. Deux ailes plus basses lui sont accolées perpendiculairement et délimitent ainsi une cour. La travée centrale du bâtiment est soulignée par un fronton triangulaire percé d'un oculus et surmonté d'un haut et curieux belvédère hexagonal éclairé de petites fenêtres. Une restauration réussie a été effectuée récemment.                                                                  VILLENEUVE sur un plan rectangulaire, le corps de logis à trois travées deux niveaux au centre pavillon saillant sur l' avant et l'arrière et toit surélevée fenêtre jumenée au premier étage, l'édifice est prolongé sur ces flancs d'aile de deux niveaux toit en croupe.","habitants":"Famille de Charles Ancellon \r\n        \r\n        \"","divers":"Château de Bellevue grav 1-2.                                                    Villeneuve grav 3-4-5","gps":"","images":["../image/image_36/36_Jeu_Bois_1.jpg","../image/image_36/36_Jeu_Bois_2.jpg","../image/image_36/36_Jeu_Bois_3.jpg","../image/image_36/36_Jeu_Bois_4.jpg","../image/image_36/36_Jeu_Bois_5.jpg"]},"Consult_chateau_formulaire11d6":{"id":"Consult_chateau_formulaire11d6","dept":"36","canton":"Valençay","commune":"Langé","nom":"Langé_Entraigues","type":"Château","periode":"XVI-XIX","histoire":"ENTRAIGUES, à l'origine c'est un fief dépendant de l'ordre du Temple: dès 1280 le seigneur est Guyard Maloches puis son fils Gilbert. Au cours du XIXe siècle, le château fut remanié avec l'adjonction d'une friseau sommet des murs du corps de logis, et le repercement complet des façades, en 1870 fut découverte une femme retrouvée emmurée, debout, en habit de cour, il pourrait s'agir de Louise de Brichanteau de Nangis, femme du duc de Falari.                                                                                                                 LANGE,  le fief de Langé est cité depuis 1216. À compter de cette date, on y trouve une longue liste de familles féodales qui furent également présentes à  Coubloust ou La Quesnière. Ce sont les Langé tout d'abord, les Merlay, les Maloches, Forestin et Mareuil. Il fut acquis sous l'Empire par Antoine Bernard Finot, préfet du Mont Blanc. C'est son fils, le baron Jules Finot, qui entreprit, dans les années 1860, de raser pratiquement l'édifice.","architecture":"ENTRAIGUES, le parc du château est partiellement entouré de douves. Elles délimitent une vaste cour où prend place l'imposante tour-maison. Le corps de logis est un bâtiment carré à trois niveaux éclairés sur les quatre faces, flanqué de quatre grosses tours rondes à deux étages dont une a gardé ses éléments de tir. La partie résidentielle était cantonnée au premier étage là ou se trouvait une chapelle, dédiée à Sainte-Marguerite. Si les tours sont coiffées en poivrière, le corps de logis est sommé d'un haut toit en pavillon rehaussé d'un belvédère carré. Autour du château s'étend un grand parc dessiné au XIXe siècle par le comte de Choulot, paysagiste de renom.                                                                                                          LANGE, En 1860, l'édifice fut raser  en  conservant les deux tours de la façade principale qui offre, par son allure et son décor, un exemple réussi de style néo-gothique, imité des châteaux de la Loire. Elle est marquée, dans sa partie centrale, d'un avant-corps en légère saillie et est encadrée par les deux grosses tours circulaires qui furent rhabillées et surmontées d'un faux chemin de ronde sur mâchicoulis ajouré d'une lucarne pendante. À l'intérieur l'architecture s'organise autour d'un grand escalier en bois à l'impériale. Une orangerie et, dans la forêt, le pavillon dit de la Quesnière, édifié en 1908 dans le goût du XVIIIe siècle, complètent l'ensemble qui a été restauré dans les années 1990.","habitants":"Entraigues; duc de Falari                                                            Langé; Antoine Bernard Finot\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Langé grav 1-2-3,                                               d'Entraigues  4-5-6","gps":"","images":["../image/image_36/36_Lang%c3%a9_Entraigues_1.jpg","../image/image_36/36_Lang%c3%a9_Entraigues_2.jpg","../image/image_36/36_Lang%c3%a9_Entraigues_3.jpg","../image/image_36/36_Lang%c3%a9_Entraigues_4.jpg","../image/image_36/36_Lang%c3%a9_Entraigues_5.jpg","../image/image_36/36_Lang%c3%a9_Entraigues_6.jpg"]},"Consult_chateau_formulaire6289":{"id":"Consult_chateau_formulaire6289","dept":"36","canton":"Le Blanc","commune":"Le Blanc","nom":"Leblanc","type":"Château","periode":"XV-XVIII-XIX","histoire":"Plusieurs châteaux à Blanc dont celui des Anges, de Cholterie, de Chapes, Lapresle, de Nervault, Rouilly et le vieux château dit de Chaillac.                                                                                                                                ANGES, manoir dont le logis,La famille de Bichier                                                                                                      CHOLTIERE, fut construit qu'en 1844, date portée sur la façade, La Choltière est bâtie sur l'emplacement d'une ancienne seigneurie qui appartenait, au début du XIXe siècle, à M. Gastebois d'Insac, ancien sous préfet du Blanc. Il fut la propriété de M. Randon de Pully avant la première Guerre Mondiale.                                                                                               QUAI AUBEPIN, il fut crée à la fin du XVIIIe siècle, refait lors de la construction du pont à lemplacement des murailles denceintes de la ville haute et bordé dhôtels particuliers dont la maison dElizabeth Bichier des Ages, fondatrice de lordre des filles de la Croix. On peut y voir dimposantes toitures ornées dépis de faîtage en céramique.","architecture":"ANGES, la tour maîtresse, les deux corps de bâtiment qui encadrent le logis et le bâtiment au nord de la cour sont des XVIIe; au XIXe siècle, reconstruction totale du bâtiment à l'est de la cour et réfection de la tour ouest frappée aux armes des Bichier, remaniement du logis  et des deux corps de bâtiment qui le flanquent. Toits à longs pans à pignons couverts, en ardoises pour les trois actuels corps de logis et le bâtiment Est, en tuiles pour les bâtiments au nord ouest de la cour; toits coniques en tuiles pour les tours sauf pour la tour ouest, couverte en ardoises, escalier en vis, refaite au XIXe siècle.                                                                                                                                                                                                                                      CHOLTIERE, la construction est demeurée inchangée depuis l'origine, exceptée l'adjonction d'un portique sur la façade postérieure en 1983. Elle se compose d'un corps de bâtiment rectangulaire à un étage couvert d'un toit en croupe d'ardoise. La façade ouest, où se concentre l'essentiel du décor, présente une élévation ordonnancée à sept fenêtres par niveau. L'axe central à trois travées est délimité par deux pilastres soutenant un fronton triangulaire. Son tympan est percé de deux petites baies en plein cintre jumelées, cernées d'un décor de pilastres, d'ailerons à volutes, surmonté d'armoiries. Deux lucarnes, comportant un décor moindre, encadrent l'ensemble. La façade est accostée à chaque extrémité d'une tour octogonale coiffée d'un toit à l'impériale.                                                                                                       ETAPES, château construit dans la deuxième moitié du XIXe siècle. Le gros oeuvre est en moellon de calcaire avec chaînes et encadrement des ouvertures à assises alternées de briques et  de pierres.","habitants":"Anges famille de Bichier                                                              Choltière de M. Randon de Pully \r\n        \r\n        \"","divers":"à Blanc dont celui des Anges, grav 1-2,  de Cholterie   grav 3-4,  Mairie grav 5 , Etape grav 6","gps":"","images":["../image/image_36/36_Leblanc_1.jpg","../image/image_36/36_Leblanc_2.jpg","../image/image_36/36_Leblanc_3.jpg","../image/image_36/36_Leblanc_4.jpg"]},"Consult_chateau_formulaire5157":{"id":"Consult_chateau_formulaire5157","dept":"36","canton":"Le Blanc","commune":"Le Blanc","nom":"Leblanc_Indre","type":"Château","periode":"XII-XVII","histoire":"ETAPE, hôtel de la famille Seiller.                                                                 NERVAULT, à compter du XVIIe siècle, le château appartint aux Delacoux de Marivault. Son dernier seigneur, Antoine Jérôme Delacoux de Marivault fut juge, maire \"électif et breveté du Roi\" du Blanc, de 1770 à la Révolution. Au XIXe siècle et jusqu'en 1910, il fut la propriété de M. Couvreux.                                                                                                                       ROUILLY, la reconstruction d'un petit édifice connu par le plan cadastral de 1817 se déroule en trois phases terminées en 1886, 1895 et 1903. L'origine du fief remonte au XVe siècle et relève des Hautes Tours du Blanc. Entre 1650 et 1666, il appartient à Antoine Marnet, sénéchal du Blanc. Jusqu'au XVIIIe siècle, ses descendants possèdent Rouilly. Puis, au milieu du XIXe siècle, il est à M. Baucheron de Boissoudy et, à la fin du siècle, à la famille Huard du Plessis de La Motte.","architecture":"NERVAULT, le bâtiment principal du  corps de logis date de la seconde moitié du XIXe siècle. Il présente un plan en L, et s'élève sur un étage. Il est prolongé sur son extrémité ouest d'un corps de bâtiment plus ancien, du XVIIe siècle, à niveau unique. Celui-ci est flanqué sur son angle nord-ouest d'une tour cylindrique dont la base est  datée du XVe siècle. Une seconde tour identique, à l'angle sud-ouest de la cour, est indépendante de l'ensemble. Les bâtiments sont en moellons de grès rouge de Brenne et, pour la plupart, recouverts d'enduit. Les couvertures sont des toits à longs pans et croupes d'ardoise ou, pour les tours,coniques. Le château est prolongé sur le flanc sud par une vaste cour de ferme et des communs.                                          ROUILLY, le corps de logis principal possède deux étages carrés et étage de comble ; un escalier de 17 marches conduit du parc au premier étage; les deux tourelles qui lui sont accolée sont à trois étages et un étage de comble ; le corps de liaison comporte une partie en terrasse sur rez-de-chaussée et une autre avec étage de comble sur rez-de-chaussée avec toit à longs pans brisés ; toutes les autres parties de l'édifice ont des élévations à travées et sont couvertes de toits brisés en pavillon.                                              VIEUX-CHATEAU dit de Chaillac, dernier château parmi les deux qui gardaient la vallée de la Creuse au XIIe siècle, le second disparu étant le donjon en Poitou. C'est l'un des rares exemples de donjons jumeaux connu. Ces donjons sans contreforts et à murs lisses, ont leurs côtés parallèles. Ils sont implantés sur deux axes indépendants et parallèles, opérant un décrochement. Après 1714, ils ont été reliés par un bâtiment bas.","habitants":"Etape   famille seiller                                                                    Nervault  Antoine Jérôme Delacoux de Marivault \r\n        \r\n        \"","divers":"Etape grav 1 ,de Chapes, Lapresle grav 2_3-4-, de Nervault grav-5, Rouilly et le vieux château dit de Chaillac grav 6.","gps":"","images":["../image/image_36/36_Leblanc_Indre_1.jpg","../image/image_36/36_Leblanc_Indre_2.jpg","../image/image_36/36_Leblanc_Indre_3.jpg","../image/image_36/36_Leblanc_Indre_4.jpg","../image/image_36/36_Leblanc_Indre_5.jpg"]},"Consult_chateau_formulaire4a6d-2":{"id":"Consult_chateau_formulaire4a6d-2","dept":"36","canton":"Levroux","commune":"Levroux","nom":"Levroux","type":"Vestiges","periode":"XII6XIII","histoire":"A Levroux château de Levroux et de Romsac,                                                                                      LEVROUX, reconstruit au milieu du XIIIe siècle par André de Chauvigny, le seigneur du lieu. En 1413, Louis du Peschin, seigneur de Levroux, décrit au Roi Charles VI l'état du château dans un texte. Il semble que les défenses nécessitent de gros travaux et que l'entretien des courtines soit minimal.  En 1416, Jacquette du Peschin épouse Bertrand V de La Tour d'Auvergne. Il devient le nouveau seigneur de Levroux et va devenir le commanditaire du château. Vers 1460 , commencent les travaux d'entretien et de modernisation du château. En 1461, Bertrand V meurt. Son fils Bertrand VI de La tour d'Auvergne devient le nouveau seigneur de Levroux. Des travaux ont ensuite été réalisés à partir de 1416 par Bertrand de La Tour d'Auvergne devenu seigneur de Levroux. dont la succession passa aux Bouteiller de Senlis.\r\nROMSAC  En 1453, Pierre Hemery, obtint de la dame de Levroux la permission de faire bâtir un petit château de l'environner de fossés, d'y construire un pont-levis. En 1628, Charles de Caries de Pradines achète cette propriété et fait édifier à partir de 1629, par l'architecte des bâtiments du Roi, Jacques Lemercier, un château d'une grande simplicité.  En 1652, il élève un nouveau pavillon. Il meurt en 1669, Romsac passa à son fils, à ses petits-fils, puis à la famille de sa belle-fille. Le marquis de Barbançois, seigneur de Villegongis, l'achète en 1755 mais le perd par retrait féodal exercé par Antoine, marquis de Longaunay, seigneur de Levroux. En 1793, les fils Longaunay, ayant décidé d'émigrer, vendent Romsac à Armand d'Aiguirande; sa famille le gardera jusqu'au début du XXe siècle. Après 1905, l'édifice passe à la famille Gratier de Levroux, qui le conserve jusqu'en 1981.","architecture":"LEVROUX,. Seul subsiste l'entrée du château entourée de deux grosses tours rondes. Il présente les restes de deux tours cylindriques en ruines  et entre les deux les traces d'un ancien pont-levis. , la première construction remonte à l'An Mil. L'enceinte du château enserrait une surface d'environ deux hectares autour des tours. Le donjon a été endommagé au moment de la prise de Levroux par le roi Philippe II Auguste. Il a été endommagé au moment des guerres de religion puis progressivement abandonné. Au XIXe siècle les fossés sont comblés et une bonne partie des murs démolis.   La Porte de Champagne, cette porte était sur le côté Sud de l'enceinte médiévale. Un impôt spécial est établi sur les habitants pour payer les coûts de construction. La Porte de Champagne  est le seul reste de cette enceinte, son nom fait référence à la Champagne Berrichonne qui s'étend de son côté. Elle comporte deux tours cylindriques avec d'étroites meurtrières à mi-hauteur. En hauteur elle possède des mâchicoulis et est surmontée par des créneaux de grande taille, eux-mêmes recouverts par une toiture.                                                                                                               ROMSAC de plan en équerre à deux niveaux et attiques, lucarnes sur un toit en croupes  flanqué aux extrémités et à l'angle de pavillons rectangulaires à trois niveaux avec lucarnes.","habitants":"seigneurs de Levroux,  André de Chauvigny                          Romsac; Famille de Charles de Caries de Pradines \r\n        \r\n        \r\n        \"","divers":"Levroux grav 1 à 5,                                                                    Chaudenay grav-6                                                                  Romsac grav_7","gps":"","images":["../image/image_36/36_Levroux_1.jpg","../image/image_36/36_Levroux_2.jpg","../image/image_36/36_Levroux_3.jpg","../image/image_36/36_Levroux_4.jpg","../image/image_36/36_Levroux_5.jpg","../image/image_36/36_Levroux_6.jpg","../image/image_36/36_Levroux_7.jpg"]},"Consult_chateau_formulaire7afa":{"id":"Consult_chateau_formulaire7afa","dept":"36","canton":"Aigurande","commune":"Lourdoueix St-Michel","nom":"Lourdoueix_Indre","type":"Château","periode":"XII-XIV-XIX","histoire":"Deux châteaux celui de Gramdmont et de Plaix-Joliet.\r\nGRANDMONT, du XIXe siècle, le prieuré de Grammont fut  fondé vers 1205 par Hugues Le Brun, sire de Lusignan, comte de la Marche, au profit de religieux de l'ordre de Grandmont fondés par Saint Étienne de Muret. Il ne restait plus rien du prieuré,  C'est là qu'un M. Laurencel fit construire à la fin du XIXe siècle, un petit château. \r\nPLAIX-JOLIET, les premiers propriétaires furent la famille de Saint-Julien au XIVe siècle,  aujourd'hui  propriété de la famille de Jean Yves Fontenaille le petit fils du général Mangin.","architecture":"GRANDMONT, le prieuré de Gramdmont fut  fondé vers 1205   Il ne restait plus rien du prieuré, vendu nationalement, le  petit château, l'architecture de la façade est une réplique exacte des deux tourelles crénelées de l'église de Lourdoueix Saint-Michel toute proche.                                                                                              PLAIX-JOLIET est un château bâti à Lourdoueix-Saint-Michel,  date du XVe au XIXe siècle. La construction de l'édifice remonte probablement au XVe siècle, se présentant alors comme un château-cour orthogonal, régulièrement flanqué. Actuellement, l'édifice présente un plan en U. Ne subsistent que les côtés ouest et sud du quadrilatère et une partie de la courtine nord. Les bâtiments fermant la cour à l'est et au nord ont été détruits au cours des travaux du XIXe siècle transformation des façades sur cour. Le batiment d'entrée est cantonné d'échauguettes aux angles, avec mâchicoulis couvert formant chemin de ronde, et parapet orné d'arcs trilobés. Cet ensemble est caractéristique des châteaux forts de la fin du Moyen-Age dans cette région. Le château est inscrit aux M.H. depuis le 27.07.1988. Le château du Plaix-Joliet est privé et fermé au public.","habitants":"Plaix-Joliet; famille de Saint-Julien                          Grandmont; M. Laurencel\r\n        \r\n        \"","divers":"Lourdoueix, évéchée grav 1-2                                                      Grammont; 46° 25' 39\" Nord et 1° 43' 51\" Est, grav 3-4                     Plaix-Joliet st Michel  grav 5-6;  46° 25' 39\" Nord et 1° 43' 51\" Est","gps":"","images":["../image/image_36/36_Lourdoueix_Indre_1.jpg","../image/image_36/36_Lourdoueix_Indre_2.jpg","../image/image_36/36_Lourdoueix_Indre_3.jpg","../image/image_36/36_Lourdoueix_Indre_4.jpg","../image/image_36/36_Lourdoueix_Indre_5.jpg","../image/image_36/36_Lourdoueix_Indre_6.jpg"]},"Consult_chateau_formulaired399":{"id":"Consult_chateau_formulaired399","dept":"36","canton":"Vatan","commune":"Lucay-le-Libre","nom":"Lucay_Libre","type":"Château","periode":"XIV-XV","histoire":"Trois châteaux à Lucay le Libre dont celui de Lucay, de Coudray, et de Pelotte.                                                                                                                             LUCAY, le 11 décembre 1371, Renaud de Graçay cède à Jean duc de Berry, frère de Charles V, \"la baronnie, seigneurie, terre, châteaux et chastellenies de Gracey, Lucey en Champaigne, Giro, Nouhant d'entre les eaux, Gauffregne et de la Chapelle Moine-Martin\".  Au milieu de cet enclos, le comte Sébastien de Raulhac et Suzanne de Montbel son épouse, firent construire en 1910 le château actuel, d'après les plans d'Alfred Trolliet.                                                                                                                               COUDRAY-Herpin relevait de la baronnie de Graçay. Il fut assiégé par les Anglais au XVe siècle, et les Ligueurs y passèrent en 1590. Pierre Pallardy et son épouse ont vécu au château du Coudray, à Luçay-le-Libre pendant dix-huit ans   C'est le lieu où la baronne Dudevant rencontra Jules Sandeau le 30 juillet 1832. Elle allait partager une partie de sa vie et de son nom en devenant George Sand.                                                                                           PELOTTE,  fut édifié vers 1860 par la famille de Bar, probablement d'après les plans d'Édouard Marganne, architecte à Vendôme. Malgré une courte histoire, La Pelotte changea de nombreuses fois de mains passant de Mme de Bar à M. Reverdy, puis à la famille des Harts. Devant la demeure s'étend un beau parc dessiné par le comte de Choulot.","architecture":"LUCAY, le plan du village de Luçay-en-Champagne, devenu Luçay-le-libre, est marqué par celui d'une ancienne fortification. Le centre du dispositif fortifié est un tertre rond, d'une soixantaine de mètres de diamètre et de 3 m de haut, entouré d'un fossé partiellement en eau. Le fossé a été coupé par des aménagements récents. Contre ce tertre, il y a deux enclos de plan quadrangulaire, l'un au nord-est et l'autre au nord-ouest, entourés de fossés aujourd'hui en grande partie comblés. Dans l'enclos du nord-est, vers le talus qui sépare l'enclos du fossé du tertre central, il y a une maison du XVIIIe siècle et une tour ancienne. La tour carrée fut bâtie sur une légère éminence.\r\nCOUDRAY-HERPIN, le château comprend deux édifices: un manoir du XVe siècle remanié au XVIIe siècle, composé d'une tour carrée d'entrée et d'une tour semi-circulaire; un bâtiment du XVe siècle avec entrée principale et galerie reposant sur cinq et trois piliers, de part et  d'autre de l'entrée. Les arcades sont légèrement surbaissées sur piliers polygonaux surmontés de chapiteaux. \r\nPELOTTE, de style néo-Louis XIII, l'édifice se caractérise par un jeu polychrome de matériaux en associant la brique et la pierre pour les murs, et l'ardoise pour les couvertures, il est bâti selon un plan massé proche du carré. Chaque niveau est divisé en cinq travées poursuivies au niveau des combles par des lucarnes. Quatre oeils-de-buf encadrent une lucarne passante à fronton triangulaire. Les faibles dimensions n'excluant pas la symétrie, l'axe central de la façade est marqué par un avant-corps formant pavillon en légère saillie.","habitants":"Lucay; comte Sébastien de Raulhac                        Coudray; Renaud de Graçay\r\n        \r\n        \r\n        \"","divers":"Château de Lucay Libre","gps":"","images":["../image/image_36/36_Lucay_Libre_1.jpg","../image/image_36/36_Lucay_Libre_2.jpg"]},"Consult_chateau_formulairefd80":{"id":"Consult_chateau_formulairefd80","dept":"36","canton":"Valençais","commune":"Lucay le Male","nom":"Lucay_Male","type":"Château","periode":"XIII-XV-XVII","histoire":"LUCAY 36\r\nle chateau de Luçay le mâle et lAllemandiere furent les lieux de la famille de Rochefort. Luçay tombe dans lescarcelle de Jen de Rochefort en 1518 par son mariage avec Antoinette de Chateauneuf, dame de Luçay et de Gargilesse. Luçay disparait des biens de la Maison de Rochefort vers 1740 (les actes ne sont pas très clairs sur ce sujet) par sa vente à Antoine Chaumont de la Milliere.\r\nLa maison de Rochefort « senorgueillit » de 2 chanceliers de France, Guillaume et Guy (fin du 14è siècle) et dun pamphlétaire Henri Rochefort (1830-1913).  famille originaire du jura\r\n    1- Le patronyme  2- Les premiers Rochefort 3- Jean de Rochefort 4- Jacques de Rochefort  5- Jean de Rochefort  6- Guillaume et Guy de Rochefort, chanceliers de France   7- Jean de Rochefort  8- Claude I de Rochefort  9- Claude II de Rochefort\r\n    10- François de Rochefort  11- Claude III de Rochefort  12  François et Dominique de Rochefort  13- Dominique de Rochefort  14- Pierre de Rochefort   15- Gabriel de Rochefort 16- François Louis de Rochefort-Luçay 18- Caroline de Rochefort-Luçay\r\n    19-Henri de Rochefort-Luçay","architecture":"COGNEES,  sur l'emplacement d'un ancien manoir qui comportait, au moment de la Révolution, trois corps de logis. Le logis principal était flanqué de tourelles et le tout renfermait une cour close par un mur, dans lequel s'ouvrait une porte surmontée de mâchicoulis. Le château actuel est de plan rectangulaire avec deux tours d'angle.                                                                                            \r\n LUCAY, celui-ci est une ancienne gentilhommière avec une tour d'angle à mâchicoulis et un corps de logis divisé par des pilastres à chapiteaux corinthiens,  occupe l'extrémité d'un promontoire dont l'extrémité est isolée par un fossé. Le terrain est entièrement entouré de murs de défense. Un pont de pierre qui remplace le pont-levis aboutit à la poterne que flanque à sa gauche l'ancien donjon rectangulaire au sommet garni de mâchicoulis. Adossé au donjon se trouve le corps de logis principal, comprenant un pavillon central accosté de deux ailes. Face à ce logis la cour est bordée par des communs. A l'extrémité des communs, une tour ronde en dehors du mur d'enceinte, forme un deuxième donjon. D'autres tours flanquaient les remparts dont ne subsistent que les bases.                            ALLEMANDIERE, la tour carrée à mâchicoulis, malgré son aspect médiéval, a été élevée vers 1615, comme l'atteste une autorisation de l'époque. L'actuel bâtiment englobe en partie l'ancien corps de logis, rhabillé avec une façade du XIXe siècle, néo-classique, sobre, cantonnée de deux pilastres ioniques.                                                             OUBLAISE, de plan quadrangulaire, il est flanqué de quatre tours d'angles carrées et d'une tour donjon carrée, crénelée, à mâchicoulis,  Le domaine est constitué d'un parc de 80 hectares composé d'une forêt, de champs et agréablement orné de jardins et parterres .","habitants":"Cognées; M. Pourcher                                                   Allemandière; famille de Baillou                              Oublaise;Guillaume de Varye\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Lucay le Male,   47° 07' 51\" Nord, 1° 26' 32\" Est    Grav-1-2-3-4 -5 ; Allemendière, grav 5 ;Blondiere grav 6 ; Oublaise grav 7-8 ; 47° 07' 51\" Nord, 1° 26' 36\" Est;    Cognées grav-9","gps":"","images":["../image/image_36/36_Lucay_Male_1.jpg","../image/image_36/36_Lucay_Male_2.jpg","../image/image_36/36_Lucay_Male_3.jpg","../image/image_36/36_Lucay_Male_4.jpg","../image/image_36/36_Lucay_Male_5.jpg","../image/image_36/36_Lucay_Male_6.jpg","../image/image_36/36_Lucay_Male_7.jpg","../image/image_36/36_Lucay_Male_8.jpg"]},"Consult_chateau_formulairee29f":{"id":"Consult_chateau_formulairee29f","dept":"36","canton":"Tournon-Saint-Martin","commune":"Lurais","nom":"Lurais_Luray","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à Lurais celui de Luray-Comte, de Morteneaux et de la Ridelière.                                                                                                                        LURAIS,  aurait été un prieuré qui dépendait de l'abbaye St-Cyprien de Poitiers. Un établissement monastique est attesté vers 1217. A la fin du XVe siècle, le logis est transformé en résidence abbatiale fortifiée. Le château se composait d'un corps central flanqué de quatre tours d'angles et peut être daté des XIVe et XVe siècles. La tour sud-ouest fut démolie et les niveaux supérieurs du logis ont été arasés. A la fin du XIXe siècle, une construction fut accolée à la partie sud. L'abbaye Saint-Cyprien ne paraît pas avoir maintenu son prieuré de Lurais au-delà du début du XVIIe siècle. Vers 1700, le château devient ferme. Vendue comme bien national à la Révolution, la propriété est morcelée au XIXe siècle.\r\nLURAY-COMTE, si l'on se rapporte à la date tracée au dessus de laporte d'entrée, le château aurait été construit en 1620, sans doute par François Gréaulme, écuyer, seigneur de Varenne. En 1775, il appartient à Jean-René Picart de Phélipeaux. Vendu comme bien national en 1792, le domaine échoit à François Fillain, puis à François Jallet.                            MORTENEAUX servait de lieu de perception de la dîme aux évêques de Poitiers.                                                                                                                             RIDELIERE,  fut reconstruit au XIXe siècle par la famille de La Roche dans un style néo-renaissance . En 1564, le fief est détenu par la famille d'Argy puis par Philippe de François. La famille de La Roche, par héritages successifs, détient le domaine depuis les années 1788.","architecture":"LURAY, le château est une longue construction rectangulaire flanquée, d'un côté, de deux tourelles à toits coniques. Une seule des tourelles à l'aspect ventru, semble d'origine et ses deux meurtrières en croix sont encore visibles. De l'autre côté, à l'angle sud-est une échauguette aveugle qui n'est pas d'origine. La façade sur cour du logis principal à l'est, a été remaniée au XIXe siècle et comporte quatre travées non régulières. Elle est percée de portes-fenêtres au rez-de-chaussée et de larges baies rectangulaires au 1er étage. Les quatre lucarnes du toit semblent être des vestiges de la demeure primitive.                                                MORTENEAUX, l'édifice actuel ne semble pas remonter au-delà du XVe siècle. Il se compose de deux bâtiments indépendants, séparés par une cour en terrasse: un corps de logis flanqué d'une tour carrée et d'une tour ronde; un donjon carré surplombant l'Anglin. D'autres bâtiments devaient s'organiser autour de la cour. La partie ouest est occupée par les bâtiments d'exploitation. Les tours sont couronnées de faux mâchicoulis, certaines façades ont été transformées à la fin du XIXe et au début du XXe siècle. Le château représente l'une des maisons-fortes rurales qui se bâtissent à la fin du Moyen-Age sans avoir abandonné tout appareil militaire.                                                                                                RIDELIERE, il se distribue autour d'un gros pavillon central prolongé sur deux côtés de courtes ailes dont l'une est accostée d'un second pavillon.","habitants":"Luray, Comte ; François Gréaulme                                 Ridelière; famille de La Roche\r\n        \r\n        \"","divers":"Château de Lurais Monteneaux grav de 1 à 4;  Soudon grav-6-7.","gps":"","images":["../image/image_36/36_Lurais_Luray_1.jpg","../image/image_36/36_Lurais_Luray_2.jpg","../image/image_36/36_Lurais_Luray_3.jpg","../image/image_36/36_Lurais_Luray_4.jpg","../image/image_36/36_Lurais_Luray_5.jpg","../image/image_36/36_Lurais_Luray_6.jpg","../image/image_36/36_Lurais_Luray_7.jpg","../image/image_36/36_Lurais_Luray_8.jpg"]},"Consult_chateau_formulaire4679":{"id":"Consult_chateau_formulaire4679","dept":"36","canton":"Tournon-Saint-Martin","commune":"Lureuil","nom":"Lureuil","type":"Château","periode":"XVI","histoire":"Château de La Brosse du XIXe siècle, château de Pazereux, pas d'informations                                                                                                                        LA BROSSE  du XIXe siècle.  Au XVIe siècle, le fief de la Brosse appartenait aux du Cher, famille d'ancienne noblesse qui possédait de nombreuses terres dans la région. À partir de 1646 René de Besdon ajoute, à son titre de seigneur de Lingé, celui de seigneur de La Brosse et vient s'installer à Lureuil. Les Charcellay de Bors leur succèdent à une date inconnue.","architecture":"BROSSE, bâti sur des bases anciennes, le château, sur deux niveaux, a été reconstruit au XIXe siècle, sa façade, cantonnée de deux hautes tours rondes toits  en poivrière, est surmontée d'un fronton-pignon en plein cintre surhaussé et de deux lucarnes percées dans les combles. Elle comporte un porche d'entrée formé de deux colonnes supportant un balcon. L'ensemble forme l'aile ouest de la demeure principale, accolée en retour d'équerre à d'importants communs élevés au XVIIIe siècle.                      Les ruines représentent une porte avec son guichet sans aucune défense, en face de la porte, des masses de maçonneries, dont une conserve une partie de tour polygonale, sans doute le corps de logis. En avant, un puits avec margelle. Tout autour, des restes de murailles plus ou moins effondrées montrent le plan de l'ancienne forteresse. Il n'en subsiste aujourd'hui que le donjon circulaire et sa courtine du XIIIe siècle et les tours qui les flanquent, remaniées au XVe siècle. L'enceinte couronnant le promontoire est de la fin du XIIIe siècle.                                                                                                                          PAZEREUX,de plan rectangulaire à un niveau toit en croupe.","habitants":"Les Charcellay de Bors \r\n        \r\n        \"","divers":"Lureuil grav 1-2.                                                                           Brosse grav 3 à 5; 46° 44' 41\" nord, 1° 02' 36\" est,    Pazereux grav-6","gps":"","images":["../image/image_36/36_Lureuil_1.jpg","../image/image_36/36_Lureuil_2.jpg","../image/image_36/36_Lureuil_3.jpg","../image/image_36/36_Lureuil_4.jpg","../image/image_36/36_Lureuil_5.jpg","../image/image_36/36_Lureuil_6.jpg"]},"Consult_chateau_formulairea578":{"id":"Consult_chateau_formulairea578","dept":"36","canton":"Saint-Gaultier","commune":"Luzeret","nom":"Luzeret","type":"Château","periode":"XV","histoire":"LUZERET, au XVe siècle, appartenait à la famille de Saint-Julien. L'édifice passa au XVIIe siècle à la famille Chauvelin puis en 1682, à Vincent de Marans. Au XVIIIe siècle, il devient une exploitation agricole et tombe en ruines. De 1825 à 1950, c'est la famille Taupinard de Tillière, originaire de Normandie, qui le possède, mais n'y réside pas. En 1988, les propriétaires actuels l'acquièrent et y entreprennent des travaux importants.","architecture":"LUZERET, les bâtiments de l'ancienne commanderie conservent un portail avec trace de double pont-levis, décoré d'un bas-relief mutilé et une fenêtre encadrée de moulures avec culots de feuillage. Derrière, double portail avec herses et porte moulurée sur la cour. Les corps de logis sont ornés sur cour de fenêtres et de portes moulurées du XVe au XVIIe siècle, ainsi que les restes de quatre grosses tours découronnées, frappé par son puissant mur d'enceinte en forme de quadrilatère irrégulier, rythmé par une tour circulaire à chaque angle. Remarquable également, au sud, un pavillon d'entrée, parfaitement restauré, avec rainures d'un ancien pont-levis et deux portes, l'une piétonne et l'autre charretière. Le corps de logis au nord, possède deux portes en plein cintre à bossages et une tourelle d'escalier. Le logis était flanqué d'un deuxième porche d'entrée surmonté d'un blason et d'un pont-levis au-dessus des douves. Le côté ouest était couvert par une courtine et un donjon carré.","habitants":"Famille Chauvelin\r\n        \r\n        \"","divers":"Château de Luzeret","gps":"","images":["../image/image_36/36_Luzeret_1.jpg","../image/image_36/36_Luzeret_2.jpg","../image/image_36/36_Luzeret_3.jpg","../image/image_36/36_Luzeret_4.jpg"]},"Consult_chateau_formulairedcd7":{"id":"Consult_chateau_formulairedcd7","dept":"36","canton":"Valençay","commune":"Lye","nom":"Lye_Indre","type":"Château","periode":"XIV","histoire":"Deux châteaux à Lye dont celui de Lye et celui de Saray.                                          LYE, les plus anciens propriétaires connus sont les Dreux au XIVe siècle, puis Philippe des Essards, panetier du roi en 1458 et maître d'hôtel en 1464. Sa famille conserve le château jusqu'au XVIe siècle, date à laquelle elle céda ses titres à la famille d'Estampes, de Valençay. La châtellenie de Lye et de Villentrois et la seigneurie de Veuil, furent érigées en comté sous le nom de Veuil Argenson, en faveur de Marc René de Voyer d'Argenson, garde des sceaux et ministre de la guerre de Louis XV. L'édifice appartient au début du XIXe siècle au général Bertrand, grand maréchal du palais.                                                                                                 SARAY, la plus ancienne trace connue de cette seigneurie, date de l'an 1300, elle appartenait à la famille de Saray, le fief relevait de Saint-Aignan. En 1527, le propriétaire du fief est Michel Sarrazin dit \"Saray\". Geoffroy du Breuil, écuyer, seigneur de Saray, rendit hommage de la seigneurie au comte de Saint-Aignan en 1548. En 1653, Georges L'Huilier, écuyer, seigneur de La Mardelle et de La Coudre, devient seigneur de Saray.","architecture":"LYE, le château était composé de quatre corps de bâtiments formant un carré régulier entouré de douves. Actuellement il n'en reste plus qu'un, qui a conservé des traces d'arrachement. Modifié, le château a néanmoins gardé un intérêt archéologique certain.                                                                                                                   SARAY, ce grand logis rectangulaire, à un étage, comporte aux deux angles de sa façade sud-est, des échauguettes du XVIIe siècle, toute cette façade présente, par ses ouvertures, un aspect plutôt XIXe siècle. Le côté opposé possède en son milieu une tour carrée du XVIIe siècle, de l'autre côté de la cour se dresse une tour-chapelle carrée avec canardières, reste de l'ancien château féodal, derrière des bâtiments agricoles, et non loin du beau portail du XVIIe siècle, un colombier, récemment restauré, a conservé son échelle tournante en excellent état, desservant 1440 boulins.","habitants":"famille d'Estampes\r\n        \r\n        \"","divers":"Château de Lye grav 1                                                                          Saray grav-2","gps":"","images":["../image/image_36/36_Lye_Indre_1.jpg","../image/image_36/36_Lye_Indre_2.jpg"]},"Consult_chateau_formulaire5e45":{"id":"Consult_chateau_formulaire5e45","dept":"36","canton":"Neuvy-St-Sépulchre","commune":"Neuvy-St-Sépulchre","nom":"Lys_St_Georges","type":"Forteresse","periode":"XIV-XVI","histoire":"LYS-ST-GEORGES, au XIVe siècle, construction s'appuye sur les traces de l'ancienne fortification. Le fief relève du seigneur d'Archambault de Crevant. En 1440, Antoinette Archambault de Crevant épouse Jesseaume Bertrand. Apporté en dot, le château change de famille, ce dernier prend  le nom de Bertrand Du Lys ceci pendant trois siècles. Au XVe siècle, modification du château suite à l'amélioration des armes à poudre. En 1498, le château appartient à Gilbert Bertrant qui, après avoir été capitaine des archers du Roi, est gouverneur du Berry.  Au début du XVIe siècle, dans le donjon, Louis XII  met en résidence surveillée Ludovic Sforza, duc de Milan. En 1502, le château est érigé en Châtellenie.  En 1504, Ludovic est transféré au château de Loches.  Au XVIe siècle, amélioration de confort. En 1737, Paul François Bertrand est l'auteur d'un meurtre. Il s'enfuit en Espagne. Le château est réquisitionné par la justice Royale. Il est vendu à la famille Du Breuil Du Bost de Gargilesse. Vers 1792, durant la Révolution, Lys-Saint-Georges change de nom : \"Lys le Pelletier\". Ceci en hommage à monsieur Le Pelletier de Saint Fargeau, révolutionnaire qui a voté la mort de Louis XVI. En 1877, début des restaurations des bâtiments par Alfred Dauvergne. Durant ces 10 années, quelques éléments d'architecture sont profondément modifiés.  Passé par alliance des Mareschal aux Maussabré. Aujourd'hui  appartient à la famille De Reviers De Mauny. En 1969, est inscrit au M.H.","architecture":"LYS-SAINT-GEORGES, le donjon devait déjà exister à l'époque de la guerre de Cent ans, occupé par les Anglais. Le château lui-même fut peut-être construit par la suite. Il est mentionné comme ayant appartenu à Jacques Coeur dans les \"Riches heures\" de ce dernier, conservées à la pinacothèque de Munich. La poterne date du XVe siècle et comporte les armes de Bertrand du Lys et de Navarre.  La partie la plus ancienne est le \"donjon\" (de forme ovoïde) antérieur au XVe et le logis du début du XVIe siècle A la Révolution, le château fut vendu comme bien national, et sous le Directoire fut détruite la partie supérieure du donjon à pans coupés, ainsi que la vis de l'escalier, le donjon  contenait tous les éléments de confort de l'époque (cheminées à tous les étages, latrines incorporées) , et était muni d'un système défensif complet  pont-levis, meurtrières. Le dernier étage, en retrait et polygonal, constituait un chemin de ronde muni de créneaux et de mâchicoulis. L'enceinte et les douves forment la première défense du donjon. Des tours ponctuaient les angles. Le corps de logis du XVe siècle est orné de sculptures de style flamboyant. Restauré au XIXe siècle, ses façades et toitures ont été dénaturées.","habitants":"Famille de Gilbert Bertrant \r\n        \r\n        \"","divers":"Château de Lys;     46° 38' 34\" Nord, 1° 49' 27\" Est","gps":"","images":["../image/image_36/36_Lys_St_Georges_1.jpg","../image/image_36/36_Lys_St_Georges_2.jpg","../image/image_36/36_Lys_St_Georges_3.jpg","../image/image_36/36_Lys_St_Georges_4.jpg","../image/image_36/36_Lys_St_Georges_5.jpg","../image/image_36/36_Lys_St_Georges_6.jpg","../image/image_36/36_Lys_St_Georges_7.jpg","../image/image_36/36_Lys_St_Georges_8.jpg"]},"Consult_chateau_formulaireb356":{"id":"Consult_chateau_formulaireb356","dept":"36","canton":"Neuvy-Saint-Sépulchre","commune":"Mers-sur-Indre","nom":"Magnet","type":"Château","periode":"XVI-XVII","histoire":"MAGNET,  au milieu du XIIIe siècle, la famille de Praheles ayant succédé à Evrad de Presles, sest éteinte faute dhéritier, et le vaste domaine a été divisé entre les maisons de Naillac, le Groing et Guérin. la terre de Magnet échoua à la famille Naillac, une des plus anciennes et illustres du Berry, en 1507, Louise de Clac était qualifiée de dame de Montipouret et du Magné. Elle tenait ses terres de sa mère Jeanne de Naillac mariée à Pierre II de Clac. A la suite de son mariage avec Louise de Giac, Jacques de la Queuille fut propriétaire ainsi que ses fils Guillaume (chambellan de Louis XI), petit-fils Charles chambellan  et arrière petits-fils François. Ce dernier, capitaine de cent hommes darmes, acheta à Pierre Guérin, la seigneurie de Presles en 1518,  plusieurs familles alors se succédèrent. En 1544 Jacques de Genouillac (marié à Françoise de la Oueille) François de Genouillac (marié à Louise dEtampes, celle-ci héritant du Magnet en 1563, mais sans descendance cède le fief à sa soeur Jacqueline de la Châtre, la nouvelle châtelaine était mariée à Guillaume Pot seigneur de Rhodes. Charles Pot, fils aîné mourut en 1706 en laissant une fille Louise-Charlotte qui mourut en 1715. Elle laissa le domaine en 1715 à Jacques-Auguste de Thou,  qui vendit le Magnet en 1719 à Louis-Charles de la Porte.  En 1719 Louis Charles de la Porte acheta le Magnet, Presles Chanteloube et Montipouret. Louis-Charles de la Porte était de Paris Conseiller secrétaire du Roi,  il fit agrandir le Magnet en ajoutant une aile au château. Louis Charles de la Porte mourut en 1745 veuf et sans enfants. En 1745 Pierre Jean François, son neveu  Il devint propriétaire,  il transforma le Magnet en marquisat de Presles en 1748. (suite dans architecture)","architecture":"MAGNET, en 1757 la propriété concernait 22 fiefs. Mais il perdit vite toute sa fortune, il était parait-il joueur et indiscipliné. En 1776 il vendit ses biens de la région en majeur partie à Jacques Aymar de Moreton, comte de Chabullan dune illustre famille du Dauphiné, se maria en 1752 et eut un fils qui mourut avant lui en 1795,  fit réparer le château, en 1791 suite à la Révolution et se montra très généreux pour les pauvres en leur donnant du travail,  Il fut membre du conseil général de lIndre et mourut en 1802, le Magnet passa à son petit fils Jacques Ayrné Constant né en 1780. Il mourut en 1847. Jacques Aimé-Constant de Chabrillan dut sa fortune à Napoléon 1er. Il devient officier dordonnance et comte dempire en janvier 1811, et son fils Lionel-Paul.-Josselin hérita du Magnet en 1847, son second fils Lionel Paul Josselin né en 1818 devint propriétaire du Magnet. En 1851 Ernest Simons achète le Magnet.  Ernest Simons (armateur), en Angleterre pendant la guerre, ne revint pas au Magnet et vendit le château à madame Guérineau, en 1946, est maintenant un hébergement de vacances, localisé Route de Fourche à Mers-sur-Indre, en 1507 nous précise que chastel, maison et place-forte de Presles était alors en ruines et que par contre, existait au Magnet un grand et beau chastel, et maison-fort, avec tours et mâchicoulis en bois et de hautes futaies appelées la Touche du Magnet\". Aujourd'hui l'édifice de plan rectangulaire flanqué d'un pavillon d'entrée à trois niveaux entre deux tours rondes accolée à d'autres tours ainsi qu'aux angles et sur la façade arrière.","habitants":"Famille Naillac\r\n        \r\n        \"","divers":"Château de Magnet","gps":"","images":["../image/image_36/36_Magnet_1.jpg","../image/image_36/36_Magnet_2.jpg","../image/image_36/36_Magnet_3.jpg","../image/image_36/36_Magnet_4.jpg"]},"Consult_chateau_formulaire253b":{"id":"Consult_chateau_formulaire253b","dept":"36","canton":"Saint-Christophe en Bazelle","commune":"Semblencay","nom":"Maison_Berry","type":"Château","periode":"XV","histoire":"MAISON-BERRY, malgré son nom, cette propriété se trouve dans l'ancienne province de Touraine, dont dépendait Châtillon sur Indre. Surplombant la vallée de l'Indre, La Maison-Berry, également appelée Beauvais, figure sous ce dernier nom sur la carte de Cassini de 1760. C'est alors un modeste logis appartenant à la famille Pellerin de Beauvais, encore  représentée de nos jours. À la fin du XVIIIe siècle, le château passe aux familles Franquelin, puis Huet de La Tour du Breuil en 1838 avant d'être acquis, à la fin du XIXe siècle, par la famille Le Pitancier de Montigny.","architecture":"MAISON-BERRY, de  l'édifice original des Pellerin, il ne subsiste que le pavillon de gauche et une partie du corps de bâtiment central, sur lequel a été plaquée, au milieu du XIXe siècle, une façade néo-classique en tuffeau typique des maisons de Touraine. Les communs, en revanche, et le pavillon qui termine le mur de soutènement, rappellent la proximité du Berry avec leurs murs enduits et leurs toits de tuiles.","habitants":"Famille Pellerin\r\n        \r\n        \"","divers":"Château dit Maison Berry","gps":"","images":["../image/image_36/36_Maison_Berry_1.jpg"]},"Consult_chateau_formulaire1b90":{"id":"Consult_chateau_formulaire1b90","dept":"36","canton":"Ardentes","commune":"Mâron","nom":"Maron","type":"Château","periode":"XVI","histoire":"Trois château à Maron celui de Märon, de Piou, et de Rezay\r\nMARON, la maison seigneuriale, dépendant de la châtellenie de Vouillon, était, en 1484, un simple \"hostel et manoir\" dont Georges Guérin, écuyer, fit l'aveu. En 1579, Jean de Boisbertrand pour sa femme Martine de La Roche-Aymon fait don d'un manoir. Le château est vendu en 1686 à Paul de Lassée de Mâron, d'une famille d'officiers des princes de Condé. Par mariage l'édifice passe aux Baucheron de Lescherolles dont les descendants le possèdent toujours.                                                                                                     PIOU, c'est en 1838 que le château de Piou fut bâti par M.Paul Baucheron de Lescherolles, ancien capitaine d'artillerie du Premier Empire. Une inscription gravée dans la pierre, sur la face nord en témoigne:\"posée par Mlle Alix Baucheron et par Messieurs Philippe Paul et Arthur  Baucheron le 17 juillet 1838\". \r\n REZAY, c'est en 1686 qu'apparaît pour la première fois le nom de Rezay, mais avec une orthographe différente: Resé, provenant peut-être de Rosay ou Roset, lieu où croissent les roseaux. Il existait dès 1647 un domaine important qui appartenait à Jean Grazan, mais qui ne comportait pas de château proprement dit. Au XIXe siècle, cette terre appartient à Eugène Tailhandier du Plaix, originaire du château de ce nom, près de lignières, qui fait reconstruire le château par Alfred Dauvergne, vers 1860. Le vaste corps de logis est flanqué de deux pavillons carrés, du côté de l'entrée, et sur l'autre façade de deux tours circulaires.","architecture":"MARON,  le château actuel, situé au cur du bourg, près de l'église, est un grand bâtiment élevé, de forme rectangulaire, avec étage. Sa haute toiture à deux pentes est couverte de petites tuiles. Une grande et belle lucarne perce la toiture côté sud. Cette baie, très ouvragée, est de style proche de celui des sculptures de la Renaissance italienne. Une grosse tour ronde, tronquée, s'appuie sur l'angle nord-est du corps de bâtiment. Dans les communs, tout proche, se trouve encore un vaste colombier.                                                                                                               PIOU, les matériaux proviennent des carrières d'Ambrault et de la forêt de Bommiers. La demeure, de plan rectangulaire offre une élévation classique, le petit fronton triangulaire sur pilastres en légère avancée qui couronne les trois travées centrales de la façade, est caractéristique du style néo-classique.                                                         REZAY, le vaste corps de logis est flanqué de deux pavillons carrés, du côté de l'entrée, et sur l'autre façade de deux tours circulaires. Des hautes cheminées rondes évoquent le style anglais, les réminiscences gothique s'alliant à l'allure générale classique.","habitants":"Maron; Paul de Lassée de Mâron                                              Piou; Famille Baucheron                                                        Rezay; Eugène Tailhandier du Plaix\r\n        \r\n        \"","divers":"a Maron le château de Boulieu grav 1 , de Piou grav 2 De Rezay grav-3-4-5","gps":"","images":["../image/image_36/36_Maron_1.jpg","../image/image_36/36_Maron_2.jpg","../image/image_36/36_Maron_3.jpg","../image/image_36/36_Maron_4.jpg","../image/image_36/36_Maron_5.jpg"]},"Consult_chateau_formulaired610":{"id":"Consult_chateau_formulaired610","dept":"36","canton":"Tournon-Saint-Martin","commune":"Martizay","nom":"Martizay","type":"forteresse","periode":"XVI","histoire":"Château de Beaupré et Notz-l'Abbé du XIXe siècle \r\nNOTZ, au XVIe siècle, Notz passe aux mains de la famille Tourangelle, Voyer d'Argenson, qui conservera la propriété jusqu'en 1730. Le 20 octobre1790, le Directoire du district du Blanc fit vendre le prieuré comme bien national à François-Armand Gatelois. Achetée par François Soubrier au début du XXe siècle, la propriété, fut restaurée et embellie par son fils Jean-Louis, infatigable fondateur de l'association Maisons Paysannes de France, grand défenseur du patrimoine rural de France. La chapelle Saint-Antoine est un témoin intéressant du passé.                         DURTAL, en 1487, Ëtienne du Saix était seigneur de Durtal et de Tourneau. La terre passa aux Louault au XVIe siècle et aux Mauléon, seigneurs de Beaupré, à la fin du XVIIe siècle. En 1765 la seigneurie échut par manage a la famille de Crémille, dont le dernier, Alexandre Joseph émigra à la Révolution. Vendu comme bien national, Durtal, relégué au rang d'exploitation agricole, revint à la famille Dutens et à leurs descendants Patureau-Mirand.","architecture":"DURTAL, baigné par la Claise, le manoir de Durtal, longtemps transformé en ferme, mais maintenant partiellement restauré, se compose d'un logis en équerre. L'aile nord, datant du XVe siècle, comporte une échauguette donnant sur les fossés et une tourelle d'angle. Au nord se trouve les dépendances que Jouxte l'ancienne fuye                                                                                                                                                      NOTZ, les constructions sont rassemblées autour d'une cour centrale, seul l'aspect défensif a disparu au fil du temps. Au nord de la cour, un colombier-porche donne sur l'allée accédant au château, qui semble remonter au XVIIe ou au XVIIIe siècle. Le logis est un bâtiment en équerre remodelé dans l'esprit du XVIIIe siècle. Datant  de la fondation du prieuré, elle aurait été construite peu après 1228. Elle a probablement servi au culte jusqu'à la veille de la Révolution. Au XIXe siècle, la chapelle est transformée en cellier. Les deux pignons et les deux murs latéraux ont été surélevés. Le clocheton qui dominait la toiture a été démoli. A l'intérieur, les murs, les arcs et les voûtes sont ornés de peintures murales, se détachant sur un quadrillage ocre rouge qui simule des joints de pierre ou de brique. Elles ont été exécutées sans doute vers 1500. Elles représentent le Christ en majesté entouré du tétramorphe, la décollation d'un martyr, Saint-Georges terrassant le dragon. La peinture représentant Saint-Christophe peut dater du XVe siècle.","habitants":"Notz; famille Tourangelle                                                                      Durtal; famille de Crémille\r\n        \r\n        \"","divers":"Martizay grav 1 à 4 ; Notz grav-5 divers 6-7","gps":"","images":["../image/image_36/36_Martizay_1.jpg","../image/image_36/36_Martizay_2.jpg","../image/image_36/36_Martizay_3.jpg","../image/image_36/36_Martizay_4.jpg","../image/image_36/36_Martizay_5.jpg","../image/image_36/36_Martizay_6.jpg","../image/image_36/36_Martizay_7.jpg"]},"Consult_chateau_formulaire4563":{"id":"Consult_chateau_formulaire4563","dept":"36","canton":"Belâtre","commune":"Mauvières","nom":"Mauvières","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux à Mauvière celui de l'Isle, de Peubert , de St-Forget et la M.F. de Villiers                                                                                                                 ISLE, en 1527, Jean Bienassis, écuyer, fait aveu de son fief à Philibert de Saint-Romain, seigneur de Cors. En 1740, L'Isle appartient à la famille de Bardin. Charles de Bardin émigre en 1791, et la propriété est vendue comme bien national. Propriété au XIXe siècle de Charles de Chergé, archéologue poitevin, \r\n VILLIERS  La construction de la maison forte remonterait à la fin du XVe siècle ou début du XVIe siècle, par la famille de Mauvise qui détint la seigneurie de Villiers du XVe siècle au moins jusqu'à la Révolution.                                                PEUBERT, le premier propriétaire connu de Peubert est Gamaliel de lizanne, dans la première moitié du XVIe siècle. En 1563, le fief est tenu par Claude Courjaud. Pierre Pinault y habite en 1603, avant de devenir en 1618 seigneur de Peubert. Au XIXe siècle, il appartient aux familles Ladmirault, puis de Chergé, la famille de l'archéologue poitevin le conserva jusqu'en 1910.. Le colombier, composé de 13 étages de boulins en pierres de taille, se trouve au premier étage.","architecture":"ISLE,  le château du XVe siècle subit alors de nombreux remaniements pour aboutir à son aspect d'aujourd'hui, un corps de logis rectangulaire flanqué de tours. Côté jardin, trois niveaux de baies déterminent des horizontales avec des types d'ouvertures très simples. Cette façade est encadrée d'une échauguette d'une part et d'une tour circulaire d'autre part, brisant ainsi la symétrie de l'ensemble. La tour est percée de baies rectangulaires dont une plus haute avec traverse. Côté cour, la façade est rythmée par une tourelle centrale, qui contient un escalier, et d'une autre tour ronde à un angle.                                 VILLIERS, des transformations ont eu lieu au XVIIIe siècle, date de la construction du petit bâtiment d'habitation fin XIXe ou début XXe siècles. La plupart des ouvertures ont été agrandies au XVIIIe siècle, avec des encadrements moulurés pour certaines. Les peintures murales de la tour d'angle ont été datées vers 1500.\r\nPEUBERT, est constitué de bâtiments de tailles et de formes variables, accolés les uns aux autres. Ce qui semble être le corps d'habitation, comporte trois chambres qui communiquent entre elles et un petit réduit leur est contigu. Ce dernier paraît être la partie la plus ancienne de l'édifice, Des deux tours d'origine, il n'en reste qu'une. Un des éléments les plus intéressants est le pigeonnier. Il comprend un rez-de-chaussée formant cellier et percé de meurtrières. Ce type d'ouverture, l'épaisseur des murs et la taille des autres baies, tendrait à prouver la vocation défensive primitive de l'édifice.","habitants":"Isle; Famille de Charles de Chergé                                       Villiers  famille de Mauvise \r\n        \r\n        \"","divers":"Château de Mauvières grav 1 Peubert grav de 2 à 6;                   Isles grav-7","gps":"","images":["../image/image_36/36_Mauvi%c3%a8res_1.jpg","../image/image_36/36_Mauvi%c3%a8res_2.jpg","../im
