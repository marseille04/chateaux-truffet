age/image_36/36_Mauvi%c3%a8res_3.jpg","../image/image_36/36_Mauvi%c3%a8res_4.jpg","../image/image_36/36_Mauvi%c3%a8res_5.jpg","../image/image_36/36_Mauvi%c3%a8res_6.jpg","../image/image_36/36_Mauvi%c3%a8res_7.jpg"]},"Consult_chateau_formulairee9a3":{"id":"Consult_chateau_formulairee9a3","dept":"36","canton":"Issoudun-Sud","commune":"Meunet-Planches","nom":"Meunet_Planches","type":"Château","periode":"XIX","histoire":"A un kilomètre au nord Ouest le château de Brives à Brives en Indre.                                                                           BRIVES, est situé dans la vallée de la Théols sur la voie romaine reliant Bourges à Argenton. Lors de la donation de Déols en 917, la vicaria Brivatensis est citée, c'était le siège d'une circonscription de justice (viguerie). Le château appartient à la seigneurie de Déols. Les bâtiments actuels sont du XVe siècle et sans cesse réparés par la suite.  En 1757, on renonce à réparer le château, on y prend même des pierres afin de consolider l'église. En 1758, un devis propose de démolir la tourelle attachée en cul de lampe à la tour du grand escalier. Brives appartint au XVIIIe siècle à François Pigelet et au XIXe siècle à la famille Aubertot de Coulange, puis passa par alliance aux Combarel de Leyval. Le peintre Paul  Cathoire en fut propriétaire au début du XXe siècle.                                                                                PLANCHES, au XVIIIe siècle, la seigneurie appartient à la famille Aupic, famille de notables d'Issoudun et passe par alliance aux Boursault du Troncay, sur qui le fief est saisi comme biens d'émigrés et vendu. L'édifice est démoli en 1846 et le château actuel est construit en 1865 par Charles de Lesseps qui fait insérer sur les façades de beaux bas reliefs de marbre Italien. Au décès de Charles de Lesseps, en 1923, le nouveau propriétaire fût son neveu jusquen 1935. En 1936, il appartient à la famille Labre Bussy, puis le château sera détenu par les familles Chauveur et Préault.","architecture":"BRIVES; une description figure dans un terrier de 1710  demeure seigneuriale, tours, pavillons d'entrée, écurie, grange, greniers, le tout entouré d'anciens fossés, le mur de la basse-cour au-devant du dit château en laquelle est une ancienne fuye à fond de cuve, ruiné depuis longtemps.                                                                PLANCHES, le style de la bâtisse s'inspire de l'architecture gothique. On peut ainsi voir une tour à pans coupés ou des fenêtres à meneaux sur les façades, des lucarnes interrompant l'avant-toit,   une demi-croupe ou des flèches en ardoises. Le château possède un beau parc  romantique paysager, créé au XIXe siècle pour Ferdinand de Lesseps, composé d'arbres bicentenaires, une rivière et des étangs.","habitants":"Brives; famille de François Pigelet                     Planches;famille Aupic\r\n        \r\n        \"","divers":"Meunet-Planches; 46° 50' 17\" Nord, 1° 57' 28\" Est","gps":"","images":["../image/image_36/36_Meunet_Planches_1.jpg","../image/image_36/36_Meunet_Planches_2.jpg","../image/image_36/36_Meunet_Planches_3.jpg","../image/image_36/36_Meunet_Planches_4.jpg","../image/image_36/36_Meunet_Planches_5.jpg"]},"Consult_chateau_formulaire880b":{"id":"Consult_chateau_formulaire880b","dept":"36","canton":"Vatan","commune":"Meunet sur Vatan","nom":"Meunet_Vatan","type":"Château","periode":"XIV-XVI-","histoire":"Deux  châteaux à Meunet sur Vatan, Bois la Vigne et Epagne.                                                                                     BOIS la VIGNE, en 1586, Antoine de La Thuille, écuyer, est seigneur, il acquiert les terres de Meunet, de Jacques de Mareuil. La seigneurie dépend alors de celle de Graçay, qui elle-même relève de la Sainte Chapelle de Bourges. Le domaine est vendu en 1614, par François de la Thuille à François Champeaulx, marchand d'Issoudun. Il passe par alliance à François Heurtault, sieur de Saint Valentin, époux de Françoise Champeaulx. Ces derniers saisis, cèdent la propriété à leur cousin, François de Salestault de Brissantier, conseiller du Roi au baillage d'Issoudun et marié à Marie Grazan. Transmis par alliance en 1840 à la famille Regnard, le château est vendu à Prothade Grenouillet, à la fin du XIXe siècle, ses descendants le possèdent toujours.\r\n MEUNET-EPAGNE, appartenait en 1407 à Jacques de La Thuille. Il demeura dans cette famille jusqu'en 1585, puis il passa, par mariage, à la famille de François. En 1807, il est vendu à Marie-Charlotte de Senneville, aïeule des propriétaires actuels.","architecture":"BOIS La VIGNE, la demeure de plan en U est constituée d'un long corps de logis principal, prolongé de deux ailes en retour. L'élévation est à deux niveaux, chacun percé de quatre baies sur la face principale, couverte par un haut toit à longs pans marqué par des croupes  sur les pignons des ailes.                                                                                                   EPAGNE, le château est construit sur une plate-forme de plan ovale entourée d'un fossé, l'accès à la plate-forme se fait par un petit pont de bois dont une partie était fixe et l'autre mobile. Le pont-levis était commandé depuis un pavillon carré à un étage, comportant des mâchicoulis et une bouche à feu. Ce pavillon est flanqué d'une tour tronquée et d'une tourelle ronde. À l'opposé de la plate-forme, deux bâtiments à un étage plus comble, reliés entre eux, conservent des éléments de la fin du Moyen-Âge. Les ouvertures et les toitures ont été remaniées. Une tourelle ronde munie d'une bouche à feu, est accolée à l'angle de l'un de ces bâtiments. Le bord de la plate-forme est protégé par un mur d'enceinte doublé sur une partie de son trajet d'une courtine. La base d'une tour semi-circulaire qui en faisait partie est encore en place. Un beau colombier circulaire se trouve près des bâtiments d'habitation.","habitants":"Bois la vigne; famille de François Heurtault                            Epagne; Jacques de La Thuille\r\n        \r\n        \"","divers":"Château Epagne grav-2","gps":"","images":["../image/image_36/36_Meunet_Vatan_1.jpg","../image/image_36/36_Meunet_Vatan_2.jpg"]},"Consult_chateau_formulaire9b95":{"id":"Consult_chateau_formulaire9b95","dept":"36","canton":"Saint-Sévère-sur-Indre","commune":"Sazeray","nom":"Mont_36","type":"Château","periode":"XIV-XV","histoire":"MONT, le château du Mont est mentionné pour la première fois en 1385,  La seigneurie a comporté un certain nombre de serfs (famille Baronnet, Pierre de Pouzoult, Guillaume Pochat en 1385, Perrot du Poirier en 1501 et 1518, la famille Amartin, du Poirier, au XVIIe siècle. dans un acte d'hommage que rend Guillaume des Ages, chevalier, seigneur du Mont, pour son \"lieu et manoir du Mont\". Le château et la seigneurie passent ensuite au XVe siècle à la famille de La Châtre, puis sont divisés entre deux seigneurs de 1540 environ à 1639. Le château est alors racheté et transformé par Sylvain de Bridiers puis par son fils Louis, qui meurt en 1694. La seigneurie, devenue un domaine de rapport, passe ensuite entre les mains de plusieurs familles qui n'y résident pas. Anne-Marie de Villaines, baronne de Sainte-Sévère, est la dernière dame du Mont avant la Révolution.","architecture":"MONT, les parties les plus anciennes remontent probablement au XIVe siècle. Le corps de logis principal a été édifié en 1457, et la vaste grange en 1640. Le tracé carré de la cour close de murs, d'une cinquantaine de mètres de côté, est encore nettement visible. A l'angle sud-est se trouve une tour circulaire ainsi que les fondations d'un ancien corps de bâtiment ruiné après la Révolution. L'angle nord-ouest comporte les vestiges d'une tour carrée contenant anciennement la chapelle, visitée en 1734 par l'archevêque de Bourges. Le bâtiment principal, d'une vingtaine de mètres de hauteur, consiste en un vaste rectangle flanqué sur chaque face principale d'une tour circulaire, celle du sud contenant l'escalier en vis, et celle du nord supportant deux latrines en bretèche. L'ensemble est couvert par une haute toiture à deux versants percée de lucarnes.","habitants":"Mont; famille Baronnet Lavaubonneuil; famille de Bernard de Jarrye \r\n        \"","divers":"Château du Mont; 46° 27' 41? nord, 2° 04' 02? est   Grav-5 Lavaubonneuil","gps":"","images":["../image/image_36/36_Mont_1.jpg","../image/image_36/36_Mont_2.jpg","../image/image_36/36_Mont_3.jpg","../image/image_36/36_Mont_4.jpg","../image/image_36/36_Mont_5.jpg"]},"Consult_chateau_formulairec0e2":{"id":"Consult_chateau_formulairec0e2","dept":"36","canton":"Mneuvy st-Sépulchre","commune":"Montgivray","nom":"Montgivray","type":"Château","periode":"XIII-XV","histoire":"MONTGIVRAY, cité au XIIIe siècle, Montgivray était un quadrilatère comprenant des fossés, larges et profonds, alimentés par l'Indre. Une quinzaine de tours rondes, garnies de mâchicoulis, quatre tours rondes ou carrées dans l'enceinte de la forteresse permettaient aux habitants de soutenir un siège, l'artillerie anglaise en eut toutefois raison en 1360. La seigneurie changea souvent de propriétaire; on trouve en 1223, Hugues, sénéchal de Châteauroux, en 1347 Philippe de Châteauneuf, et vers 1450, Zacharie Thurin, chevalier, seigneur de La Beauce. Puis, pendant plus de trois cents ans, le château appartint aux différents seigneurs d'Ars. En 1750, il fut adjugé au sieur Perraud, avocat, qui en prit le nom. En 1875, la fille de George Sand, Solange Clésinger, l'acquiert et confie sa restauration néo-médiévale à l'architecte Alfred Dauvergne. Le château de Montgivray fut vendu en 1899. La demeure restera abandonnée jusqu'à son rachat, en 1956, par la commune. La mairie en occupe une partie. En 1980, la commune le racheta, auprès des héritiers Aucante, la grange et les étables du château.","architecture":"MONTGIVRAY, le château est composé d' une tour carrée avec créneaux et mâchicoulis avec une lucarne à meneaux et gable sculpté, à laquelle est joint un corps de logis flanqué de tours rondes comportant aussi un chemin de ronde avec créneaux et mâchicoulis. La plus grande partie des boiseries, cheminées de la salle à manger et du salon, en bois sculpté, lambris dans les couloirs, subsiste. Escalier dans la tour nord.","habitants":"Famille de Zacharie Thurin, \r\n        \r\n        \"","divers":"Montgivray  46° 36' 15\" Nord, 1° 59' 00\" Est","gps":"","images":["../image/image_36/36_Montgivray_1.jpg","../image/image_36/36_Montgivray_2.jpg","../image/image_36/36_Montgivray_3.jpg","../image/image_36/36_Montgivray_4.jpg"]},"Consult_chateau_formulaire2a81":{"id":"Consult_chateau_formulaire2a81","dept":"36","canton":"Châteauroux-Est","commune":"Montierchaume","nom":"Montierchaume","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Montierchaume  celui de Fleuranderie, de Neuil et du Mée pas d'information historique pour ces deux derniers et à trois K.M. à l'ouest à Coings le château de Coings                                                                                                                           FLEURANDERIE, fut construit au XIXe siècle pour mademoiselle Legrand de La Fleuranderie. Elle avait hérité cette terre de son père, Jérôme Legrand, avocat du roi au bailliage de Châteauroux, député du Tiers État en 1789. La propriété resta à ses descendants, Charlemagne, pendant plus d'un siècle. En 1777 M. Legrand avait acheté à la famille Dupin cette ancienne métairie citée depuis 1577, elle relevait alors de Neuvy-Pailloux.                                                                                                                                      COINGS, le château de Coings est une maison de maître du XIXe siècle que des constructions plus anciennes ont précédée sur ce site. Au milieu du XVIIe siècle, la propriété appartient à M. de Lassée, et en 1735 nous trouvons Rose de Lassée de Coings  veuve du chevalier de Brossard, à partir de 1740, Claude Leblanc de Marnaval, maître de forges, et ses héritiers, Girard de Vasson et de Durat, enfin M. Jules Duris Dufresne député de l'Indre sous l'ancien régime, le château appartient aux familles de Lassée et Leblanc. À la fin du XIXe siècle la demeure est entre les mains de la famille Desjobert de Prahas.","architecture":"FLEURANDERIE, se compose d'un corps de logis quadrangulaire. Haut de trois niveaux sous un étage de combles éclairés par des lucarnes et couvert d'un toit à croupes d'ardoises. Deux tours ont été ajoutées au corps de logis L'ensemble est complété d'un bâtiment à niveau unique et d'une maison d'habitation d'origine plus ancienne. Un parc d'arbres majestueux constitue un agrément supplémentaire.                                                                                COINGS, ce très beau château situé près de Châteauroux est entouré d'un beau parc délimité de fossés. Accolé à une tour massive du XVe siècle, vestige d'un bâtiment antérieur, un corps de bâtiment simple s'élève sur deux étages, dont un sous combles. Aujourd'hui, c'est une grande demeure du XIXe siècle dans un environnement très calme, entourée d'un parc de dix hectares aux essences rares. Chaque chambre, spacieuse, est meublée et décorée de meubles et objets anciens de famille. On y voit toujours un pigeonnier du XVe siècle avec ses trous de boulins ; elle est entourée de jardins remarquables aux arbres appartenant à des essences variées, un magnifique cèdre a été malheureusement renversé en 2010 par la tempête Xynthia.","habitants":"Fleuranderie Famille de Legrand                                    Coings M. de Lassée,\r\n        \r\n        \"","divers":"Montierchaume  celui de Coings grav 1-2, de Fleuranderie grav 3, du Mée grav 4 -5 et de Neuil Grav 6","gps":"","images":["../image/image_36/36_Montierchaume_1.jpg","../image/image_36/36_Montierchaume_2.jpg","../image/image_36/36_Montierchaume_3.jpg","../image/image_36/36_Montierchaume_4.jpg","../image/image_36/36_Montierchaume_5.jpg","../image/image_36/36_Montierchaume_6.jpg"]},"Consult_chateau_formulaired318-2":{"id":"Consult_chateau_formulaired318-2","dept":"36","canton":"La Châtre","commune":"Montlevicq","nom":"Montlevicq","type":"Maison forte","periode":"XII-XV","histoire":"MONTLEVIC, au XIIe siècle première construction d'une maison forte par   la famille de Vernage, au siècle suivant la seigneurie passe à Pierre le Groing,   dont la fille épouse Hugues de La Celle seigneur de Boéry, c'est leur petit-fils Raoulin de la Celle fils d'un autres Hugues  et d'Anne de la Porte qui fit construire au XVe siècle la partie la plus ancienne du château, puis passe aux des Ars, aux Chamborant, aux Saint-Mor avant d'échoir au XVIe siècle à Louis et Gabrielle  de Poyenne la seigneurie est passée aux famille de la Béraudière et de la Rochefoucauld, en 1681, achat par Jacques d'Orsanne, d'une vieille famille d'Issoudun, achète la seigneurie. Appartient aujourd'hui à la famille de la Cotardière.","architecture":"MONTLEVIC,  en équerre autour d'une cour, ces trois bâtiments sont rythmés de tours d'angle, l'allure générale est du XVe siècle, avec restaurations des XVIIe et XVIIIe siècles. Le corps de logis le plus ancien est celui du nord. La grosse tour, dans un angle de la cour, contient un escalier en vis. Au sommet, une tourelle à escalier lui est accolée. L'édifice à l'est faisait partie de la  construction primitive et possède deux portes anciennes surmontées d'un arc en accolade avec un écu. Le corps de logis du sud appelé \"le petit Logis\"date du XVIIe siècle. À son extrémité ouest s'élève un portail à toit aigu à quatre faces du XVe siècle. Deux colombiers du XVIIIe siècle encadrent l'entrée près de l'église. La ferme voisine du château conserve une grange dîmière.","habitants":"famille de Vernage\r\n        \r\n        \"","divers":"Château de Montlevicq","gps":"","images":["../image/image_36/36_Montlevicq_1.jpg","../image/image_36/36_Montlevicq_2.jpg","../image/image_36/36_Montlevicq_3.jpg","../image/image_36/36_Montlevicq_4.jpg","../image/image_36/36_Montlevicq_5.jpg","../image/image_36/36_Montlevicq_6.jpg"]},"Consult_chateau_formulairec112":{"id":"Consult_chateau_formulairec112","dept":"36","canton":"La Châtre","commune":"Motte-Feuilly","nom":"Motte_Feuilly","type":"Château","periode":"XI-XIV-XVIII","histoire":"MOTTE-FEUILLY,  dès le XIe siècle, à Roger Palestal, puissant seigneur. En 1210, Raymond IV Palesteau, seigneur de Sainte Sévère , au XIIIe siècle, par mariage, le domaine est transmis à la famille Vicomtal   de Brosse, au XIVe siècle, en épousant Eude IV de Sully, Aliénor de Brosse donne le château à cette illustre famille. Au milieu du XIVe siècle, Aliénor de Sully épouse Messire Vaudenay. En 1476, le château appartient à la famille Chamborant. En 1487, le fils de Jean IV de Culan hérite du château. Il semble que la \"porterie\" soit modifiée.  Charlotte d'Albret sur de Jean d'Albret roi de Béarn et de Navarre épouse délaissée de César Borgia se retira en 1504 au château de la Motte Feuilly, ou elle vécu avec sa fille Loyse jusquà sa mort le 11 mars 1514. \r\n Charlotte d'Albret, dame de Châlus, est née en 1480 . Elle fut la fille d'Alain d'Albret le Grand, seigneur d'Albret, duc de Guyenne et vicomte de Tartas et de Françoise de Bretagne (Françoise de Blois), Vicomtesse de Limoges. Elle épousa César Borgia, fils du pape Alexandre VI, en 1499. En 1514, à la mort de Charlotte, sa fille, Louise Borgia, devient propriétaire du château. En 1517, Louise épouse Louis II de la Trémouille  et apporte ce château en dot. En 1530, Louise, devenue veuve, épouse Philippe de Bourbon, Baron de Busset.  au XVIIe siècle, le bâtiment, d'héritage en mariage, passa à des familles de moindre envergure, les Chavannes, Fradet et enfin les Maussabré à la fin du XVIIIe siècle. Au XIXe siècle, la famille Dumayet l'acquit, et demeura jusqu'aux dernières années du XIXe siècle dans le patrimoine familial. Il appartient maintenant à une association d'aide aux handicapés.","architecture":"MOTTE-FEUILLY, donjon,  haute tour ronde, cette construction fut la tour maîtresse du château.  des \"mâchicoulis\" avec ses panneaux en bois. C'est une sorte de hourdage  fixe, de rares fentes de tir. L'enceinte est privée de ses fossés. Toute une courtine a été abattue au siècle dernier afin d'éclairer la cour intérieure. Restent trois courtines, dont deux seulement ont conservé leur aspect fortifié ; à l'ouest, la courtine du corps principal de logis a été percée. L'édifice actuel est un quadrilatère occupé sur trois de ses faces par des bâtiments, alors que la quatrième est ouverte. Les flanquements sont au nombre de cinq, la tour de la porterie à l'angle est, le donjon à l'angle nord, une tour semi-circulaire sur la façade nord, une deuxième tour semi-circulaire à l'angle ouest et une tour rectangulaire au quatrième angle, à vrai dire non flanquante. La tour-porte est ménagée sous un arc, abritant tout à la fois les rainures des flèches du pont-levis et trois assommoirs. Le donjon circulaire est flanqué par une tourelle d'escalier demi hors-oeuvre. Au sommet on découvre une superbe charpente d'origine hourdée, avec au centre un pilori. Ce hourd est l'un des attraits majeurs du donjon.","habitants":"Alain d'Albret le Grand\r\n        \r\n        \"","divers":"Château de la Motte Feuilly; 46° 32' 34? nord, 2° 05' 27? est","gps":"","images":["../image/image_36/36_Motte_Feuilly_1.jpg","../image/image_36/36_Motte_Feuilly_2.jpg","../image/image_36/36_Motte_Feuilly_3.jpg","../image/image_36/36_Motte_Feuilly_4.jpg","../image/image_36/36_Motte_Feuilly_5.jpg","../image/image_36/36_Motte_Feuilly_6.jpg","../image/image_36/36_Motte_Feuilly_7.jpg"]},"Consult_chateau_formulaire51f3-2":{"id":"Consult_chateau_formulaire51f3-2","dept":"36","canton":"Staint-Benoît-du-Sault","commune":"Mouhet","nom":"Mouhet","type":"Château","periode":"XIII-XVI-XVIII","histoire":"Deux châteaux à Mouhet celui d'Archys et celui de Rhodes.                        ARCHYS, seigneurie mentionnée dès le XIIIe siècle. Le château a été construit au milieu du XVIIIe siècle par le grand-père de l'écrivain Henri de Latouche. A la fin du XIXe siècle, il fut agrandi et agrémenté d'un parc paysager, résidence de campagne du sénateur Forichon, qui en a fait don à l'hospice de Châteauroux. Racheté il y a quelques années, Archy a fait l'objet d'une restauration exemplaire.                                                         RHODES, le premier seigneur de Rhodes connu est Guy de Céris, seigneur des Croix-de-Rhodes, sénéchal de Rouergue. Le château appartint du XIVe au XVIIIe siècle à la célèbre famille Pot. Dans la deuxième moitié du XVIe siècle, Jean Pot, seigneur de Rhodes, apporte des modifications au château, dont la double porte d'entrée de la première cour surmontée de mâchicoulis. La chapelle du château porte les armes de ce seigneur. En 1756, la propriété est vendue par le comte de Beaujeu à Marguerite-Henriette de La Roche, veuve de Jean-Baptiste Boucher dont la fille épouse Louis François de Rochechouart-Ponville. Le château a été remanié au XIXe siècle.","architecture":"ARCHYS,  l'édifice présente un plan en U sur un rez-de-chaussée. L'ensemble est couvert de toits à croupes de tuiles plates. Les façades sont largement percées. Avec son domaine, il est un témoin préservé d'un mode d'exploitation et d'habitat rural traditionnel de la vallée noire sous l'ancien régime et au XIXe siècle.                                                                                                                            RHODES, édifié au XIIIe siècle sur une hauteur, le château domine un beau panorama. On y accède par une grande allée. Les constructions se sont échelonnées entre le XIIIe et le XVIe siècle. Le château, dans son état actuel, se compose de deux corps de bâtiments perpendiculaires. Dans l'angle intérieur, une tour carrée abrite un escalier en spirale et deux portes donnant accès aux cours. L'aile principale comporte deux tours rondes","habitants":"Archys; écrivain Henri de Latouche                                       Rodhes; famille Pot\r\n        \r\n        \"","divers":"Porteà Mouhet château d'Archys grav 2 , de Rhodes grav 3","gps":"","images":["../image/image_36/36_Mouhet_1.jpg","../image/image_36/36_Mouhet_2.jpg","../image/image_36/36_Mouhet_3.jpg"]},"Consult_chateau_formulairebdd6":{"id":"Consult_chateau_formulairebdd6","dept":"36","canton":"Tournon-Saint-Martin","commune":"Mérigny","nom":"Mérigny","type":"Château","periode":"XII-XIX","histoire":"Trois châteaux à Mérigny celui de Plaincourault de Roche-Bellusson    et de Puychevrier.                                                                                                                                         PUYCHEVRIER, ce prieuré, de l'ordre de Gandmont, doit dater de la fin du 12e siècle. L'ordre fut supprimé vers 1740, et Puychevrier fut réuni au séminaire de Poitiers. Les biens furent vendus en 1790. La chapelle est voûtée en berceau brisé.                                                                                          PLAINCOURAULT, un château féodal de la fin du XIIe siècle fut construit sur le domaine de Plaincourault pour accueillir la commanderie des Hospitaliers de l'Ordre de Malte. Les commandeurs, chargés de collecter les aumônes, se succédèrent jusqu'à la Révolution française.  Le château, non occupé de 1791 à 1850, tomba petit à petit en ruines par manque d'entretien. Si bien qu'un nouveau château fut reconstruit en 1872 sur ses fondations. Il fut racheté par Emile Châtenet en 1898, famille à laquelle il appartient encore aujourd'hui. De même que le parc pourrait servir de lieu de tournage de films.\r\nROCHE-BELLUSSON,  un certain Guyot Clerbaud possédait le domaine en 1330 ; Avant cette date, l'histoire du château nous est inconnue. A cette époque, la seigneurie était sous l'autorité de la baronnie d'Angles des évêques de Poitiers. En 1401 le château subit l'attaque des Anglais comme les châteaux du Blanc et d'Angles ; Il fut  défendu par Jean du Plessis. Plusieurs grands seigneurs se succédèrent comme en témoignent les nombreux écussons retrouvés dans l'église et les documents administratifs. Ainsi les familles de Salignac, de Bressoles, de La Châtre, de Maufrais et Bénazet se succédèrent.  Le château féodal, racheté en 1861 par Mme Bénazet.","architecture":"MERIGNY  possède une belle tour cylindrique recouverte d'une poivrière d'ardoise permettant l'accès au corps de logis principal qui aurait appartenu à la famille Gaujard-Rome. Cette tour contient certainement un escalier à vis et offre une porte moulurée. L'ensemble s'inscrit au cur d'un jardin verdoyant et possède un  certain charme.                                                                               \r\nPLAINCOURAULT, Il fut restauré en 1924 et aménagé par la suite pour des raisons de confort moderne. Du château féodal, il subsiste la pierre que fit sculpter son fondateur, Guys de Caveron, en 1291, la porte datant du XVe siècle ainsi qu'un superbe pigeonnier de 10 mètres de hauteur. Le château est une propriété privée. Les deux salles du rez-de-chaussée, dernièrement restaurées, peuvent être proposées pour des événements familiaux.                                                                                      PUYCHEVRIER, la grande porte, à l'ouest, est ornée de deux tores en plein cintre. La porte des moines, au sud, est en arc brisé. L'aile Est comporte la salle capitulaire. Ensuite viennent le réfectoire puis la cuisine. Le premier étage renfermait le dortoir. L'aile sud, diminuée, fut dotée au XVII e siècle d'un escalier monumental occupant l'infirmerie. Autrefois accolée à l'aile sud se tenait une tour carrée. L'aile ouest contenait les bâtiments agricoles et le logement du prieur. A l'entrée se trouvait la maison du frère portier. Le cloître était en bois.                                                                                              ROCHE-BELLUSSON, fut entièrement démoli. Un château de style XIXe siècle fut reconstruit à la place et un vaste parc arboré fut aménagé. En 1863, l'installation d'une turbine hydraulique au niveau de l'Anglin fournissait l'eau pour remplir et alimenter les bassins d'agréments. Par la suite, ce système alimentait le château en eau et en électricité. Actuellement, la turbine ne fonctionne plus. Le domaine de La Roche Bellusson fut racheté en 1951 par les associations d'Anciens Combattants de l'Indre et de la Vienne pour accueillir des résidents à la retraite.","habitants":"Plaincourault; famille  d'Emile Châtenet                                        Roche-Belluson; familles de Salignac\r\n        \r\n        \"","divers":"Château de la Roche grv 1-2, Plaincourault grav 3-4                  Puychevrier grav 6 à 7","gps":"","images":["../image/image_36/36_M%c3%a9rigny_1.jpg","../image/image_36/36_M%c3%a9rigny_2.jpg","../image/image_36/36_M%c3%a9rigny_3.jpg","../image/image_36/36_M%c3%a9rigny_4.jpg","../image/image_36/36_M%c3%a9rigny_5.jpg","../image/image_36/36_M%c3%a9rigny_6.jpg","../image/image_36/36_M%c3%a9rigny_7.jpg"]},"Consult_chateau_formulaired788":{"id":"Consult_chateau_formulaired788","dept":"36","canton":"Le Blanc","commune":"Mézières","nom":"Mézières","type":"Château","periode":"XIV","histoire":"BEAUREGARD,  Imposant édifice de style Second Empire, Beauregard a été construit en 1902 par Monsieur Létang, architecte de la ville de Châteauroux, pour le marquis de Vassal Montviel, mais le riche aristocrate ne l'a possédé que quinze ans. En 1919, le château et son immense domaine de 3000 hectares était vendu et de nombreux propriétaires se sont succédé depuis, notamment une colonie de vacances de la RATP. Acquis il y a quelques années par un investisseur asiatique.                                                                                                                        CLAVEAU,    entre le XIVe et le XVIIIe siècle, il passa entre les mains de plusieurs familles, et à deux reprises revint à la famille d'Azay, dont l'un, Claude, fut assassiné en 1528 sur l'ordre de sa sur, elle ne fut condamnée qu'à une amende et hérita du château. À sa mort, la seigneurie fut acquise par Nicolas d'Anjou, seigneur de Mézières, les descendants l'apportèrent à Dieudonné de Bridieu, gouverneur de MEZIERES , qui fit reconstruire le château. Le dernier seigneur du Claveau fut Charles-Louis de Maussabré, d'une importante famille tourangelle et berrichonne.                                                                                     MEZIERES,  l'antiquité du château est connue par une charte du XIe siècle. Ce fief faisait partie du diocèse et de la généralité de Bourges, mais était du ressort féodal et judiciaire de Tours. Du château médiéval, compris dans une enceinte en forme d'ellipse entourée de fossés, il ne subsiste que des ruines : trois tours rondes entre lesquelles s'élevaient les corps de bâtiments, refaits à partir de 1464 par Louis d'Angou. A partir de 1750, il cessa d'être entretenu. Sa destruction, ordonnée par un décret de la convention d'août 1793, fut progressive, le portail d'entrée, le donjon, la chapelle et les dépendances avaient disparu en 1836.","architecture":"CLAVEAU, il fut  construit ou fortement modifié dans les dernières années du XVIe siècle. Le château frappe par son aspect imposant; il est flanqué sur sa façade ouest de deux grosses tours à poivrière. Au centre du bâtiment, un étroit et haut pavillon central surprend, sur la façade est, par l'élégance de sa décoration contrastant avec la relative austérité du reste de l'édifice : porte encadrée de pilastres et timbrée d'un fronton armorié abondamment décoré de motifs militaires et de chasse, et surmontée de trois étages de fenêtres géminées rappelant l'architecture des châteaux de la Loire.                                                                     MEZIERES, du château médiéval, compris dans une enceinte en forme d'éclipse entourée de fossés, il ne reste que des ruines : trois tours rondes entre lesquelles s'élevaient les corps de bâtiments refaits vraisemblablement à partir de 1464 par Louis d'Angou. A partir de 1750, le château cessa d'être entretenu. Sa destruction, ordonnée par un décret de la convention d'août 1793, fut progressive.","habitants":"Beauregard     le marquis de Vassal Montviel                                    Claveau  la famille d'Azay,                                                             Mézières   Louis d'Angou.\"","divers":"Mézières 46° 49' 18\" nord, 1° 12' 41\" est                                              Claveau grav 1-2                                                                              Beauregard grav 3-4","gps":"","images":["../image/image_36/36_M%c3%a9zi%c3%a8res_1.jpg","../image/image_36/36_M%c3%a9zi%c3%a8res_2.jpg","../image/image_36/36_M%c3%a9zi%c3%a8res_3.jpg","../image/image_36/36_M%c3%a9zi%c3%a8res_4.jpg"]},"Consult_chateau_formulaire21ee":{"id":"Consult_chateau_formulaire21ee","dept":"36","canton":"Le blanc","commune":"Mézières","nom":"Mézières_Indre","type":"Château","periode":"XVIII","histoire":"AULNAY, construit par la famille Faguet, Launay fut acheté au début du XXe siècle par le baron Le Febvre qui avait acquis d'importantes terres en Brenne.                                                                                                                              EBEAUPIN, château dont la chance est de n'avoir subi aucune restauration, mais d'avoir toujours bénéficié d'un entretien respectueux du passé. Une inscription sur le fronton donne la date de 1807 qui est celle de la reconstruction sur les bases de l'ancienne demeure. L'Ébeaupin, qui était une simple métairie jusqu'au début du XVIIIe siècle, appartint à Joseph Thibault qui le possédait en 1802, érudit local, il constitua un remarquable fonds documentaire sur la Brenne et la Touraine berrichonne.","architecture":"AULNAY , le château, construit en 1862 comme l'atteste l'inscription du fronton nord, est une solide et agréable maison du Second Empire dans le style sobre qu'on retrouve dans certaines propriétés de la région, avec pavillon central à un étage, flanqué de deux ailes en rez-de-chaussée avec lucarnes. Sur la façade principale, au sud, l'architecte a doté la travée centrale d'un deuxième niveau, sommé d'un fronton triangulaire.                                                              EBEAUPIN  De plan rectangulaire allongé, d'un étage, les ouvertures ont toutes conservé leurs fenêtres à petits bois et leurs verres anciens. L'édifice est surmonté d'un toit à brisis en tuiles, égayé de lucarnes et des girouettes anciennes représentant des scènes domestiques, motifs qui se retrouvent sur les toits des communs. Les deux façades, qui ont conservé leur enduit en mortier de chaux d'origine, sont pratiquement similaires. La façade sud, qui est agrémentée d'une vénérable glycine, donne sur un beau jardin. Au nord, les communs, dominés par un pigeonnier carré surmonté d'un lanternon, s'ordonnent autour d'une grande cour rectangulaire.","habitants":"Joseph Thibault \r\n        \r\n        \"","divers":"chateau d'Aulnay et Aubepin","gps":"","images":["../image/image_36/36_M%c3%a9zi%c3%a8res_Indre_1.jpg","../image/image_36/36_M%c3%a9zi%c3%a8res_Indre_2.jpg","../image/image_36/36_M%c3%a9zi%c3%a8res_Indre_3.jpg"]},"Consult_chateau_formulairedc45":{"id":"Consult_chateau_formulairedc45","dept":"36","canton":"Le Blanc","commune":"Le Blanc","nom":"Naillac","type":"Château","periode":"XII-XVII","histoire":"NAILLAC, le financier Claude Dupin et son épouse Louise de Fontaine se rendent acquéreurs du marquisat du Blanc et de la châtellenie de Cors, le 24 avril 1738, précédemment propriété de la comtesse de Parabère. Le marquisat du Blanc comprend le château-Naillac, le château de Roche, de Rochefort, de Cors, de Forges, des propriétés, fermes, étangs et terres. Le château-Naillac étant peu confortable car les bâtiments servaient de prison, M. et Mme Dupin achètent également le 23 novembre 1748, l'hôtel particulier du bailli Louis Fontenettes, dans la ville basse du Blanc, sur la Grande-Place en face du couvent des Augustins. Cette dernière résidence accueille donc les nouveaux propriétaires du marquisat, pendant leurs séjours irréguliers au Berry. Cet hôtel prendra le nom de « Maison de la Marquise », en l'honneur de Madame Dupin, qui est venue quelques fois au Blanc Madame Dupin n'ayant pas de postérité, elle lègue le marquisat du Blanc en 1799, dont le château-Naillac, à son petit-neveu, Auguste-Louis Vallet de Villeneuve, né à Paris le 4 août 1779. Le frère d'Auguste et René Vallet de Villeneuve, propriétaire du château de Chenonceau. Auguste Vallet de Villeneuve a le titre de baron. Il est chef d'escadron, trésorier de la garde nationale depuis 1809 et receveur municipal de la ville de Paris dès 1801. Sa résidence à Paris se situe  rue d'Anjou-Saint-Honoré. Il a épousé Laure de Ségur (1778-1812), fille du comte Louis-Philippe de Ségur et dont la nièce n'est autre que la romancière Sophie Rostopchine, comtesse de Ségur (1799-1874). Le baron Auguste Vallet de Villeneuve meurt dans son château de la ville du Blanc, le 24 octobre 1837. devient, en 1986, le siège de l'Écomusée de la Brenne et abrite depuis l'exposition permanente : Des hommes, un pays, une histoire.","architecture":"NAILLAC, il existe alors déjà un gros château, construit au XIIe siècle, qui lui-même a précédé un fort en bois. La particularité de ce gros château médiéval, Il a deux donjons, de plusieurs étages  Des donjons carrés typiquement romans. Les Naillac meurent sans héritiers mâles au cours du XVe siècle, situé sur la commune du Blanc, est un des derniers châteaux parmi les deux qui gardaient la vallée de la Creuse au XIIe siècle, le second disparu étant le donjon en Poitou. C'est l'un des rares exemples de donjons jumeaux connu. Ces donjons sans contreforts et à murs lisses, ont leurs côtés parallèles. Ils sont implantés sur deux axes indépendants et parallèles, opérant un décrochement. Après 1714, ils ont été reliés par un bâtiment bas. \r\nLes façades et toitures du château, les caves situées sous le donjon Nord, les vestiges de la première enceinte du château (haute-cour) : courtines, tours et portails d'entrée Nord et Sud, les vestiges de la tour ronde subsistant de la deuxième enceinte du château sont inscrits aux titre des M.H. par arrêté du 17 septembre 1986.","habitants":"Famille d'Auguste Vallet de Villeneuve \r\n        \r\n        \"","divers":"Naillac;46° 37' 44\" nord, 1° 03' 46\" est","gps":"","images":["../image/image_36/36_Naillac_1.jpg","../image/image_36/36_Naillac_2.jpg","../image/image_36/36_Naillac_3.jpg"]},"Consult_chateau_formulairefba7":{"id":"Consult_chateau_formulairefba7","dept":"36","canton":"Neuvy Saint Sépulchre","commune":"Neuvy Saint Sépulchre","nom":"Neuvy_Indre","type":"Château","periode":"XIV-XV","histoire":"Plusieurs château à Neuvy celui de Neuvy, de Limanges de Garnier et de Pailloux pas d'information historique pour ces deux derniers.                                                                                                    CHEZAL-GARNIER,  fief du duché de Châteauroux, Chézal-Garnier dut appartenir en partie à l'abbaye de La Prée. En 1567, le fief est acheté par Catherine Robert au seigneur de Neuvy-Pailloux, ensuite il passe en 1668 à Pierre Fouton. Il est acquis en 1757 par Michel Pâtureau, conseiller du roi, et greffier. L'actuelle construction, comprenant un logis, une chapelle et des dépendances fut réalisée vers 1770 par son gendre, Philippe Cornuau, échevin de Châteauroux et directeur du domaine du duché, puis passa à sa fille, Mme Desjobert du Bessin. La propriété demeura dans cette famille jusque dans les années 1960.                                                                   LIMANGES, sa construction remonte au XVe siècle. Il était alors un fief aux mains des Aucapitaine. A partir de 1620, il était à Léon de Barbançois avant de passer en 1661 à Louis, puis à François de Bridiers. Au XIXe siècle, devenu propriété d'Ernest Périgois, républicain, ami de George Sand, il est presque entièrement reconstruit.                                                                                                                     NEUVY, à la tête de ce fief, relevant de Châteauroux, on trouve les familles de Chauvigny, La Trémoille, Bourbon et Montmorency.                                                                           THIZAY, a quelques kilomètres au nord  de Neuvy-Pailloux  est un ancien fief relevant d'Issoudun. Parmi les différents seigneurs l'ayant possédé, on trouve au début du XIVe siècle Pierre d'Artenay. Centre d'une propriété cernée de murs, le bâtiment est situé dans le bourg, face à l'église. La restauration du XIXe siècle, due à la famille Renaud d'Avesne des Méloizes qui achète le  château en 1850.","architecture":"LIMANGES,  un grand corps de bâtiment quadrangulaire placé sous un toit d'ardoise à croupes. De l'édifice médiéval, il subsiste juste une tour ronde coiffée d'un cône d'ardoise d'où jaillit une girouette.                                                                                                              CHEZAL-GARNIER,  l'actuelle construction, comprenant un logis, une chapelle et des dépendances fut réalisée vers 1770  Côté cour  de plan en U avec les dépendances  corps de logis à deux niveaux et série de lucarnes jumenées sur la centrale  en chien assis avec fronton triangulaire, côté entrée deux pavillons saillants avec balconnet au premier.                                                  THIZAY, le bâti est principalement constitué de bâtiments à vocation agricole délimitant une grande cour carrée. Le château de Thizay consiste en un corps de logis rectangulaire à un étage sous un niveau de combles. Il est couvert d'un long toit à deux pans de tuiles à pignons découverts. Il comporte deux lucarnes à fronton triangulaire et deux hautes souches de cheminées. Le logis se complète de deux tours rondes à toits d'ardoises en poivrière, la 1ère prend place au centre de la façade sur cour, tandis que la seconde flanqué à  un angle. Face au château, s'élève un important colombier rond coiffé d'un toit conique.                                                                                                          NEUVY, il ne subsiste du château que des vestiges, dont un logis du XIVe siècle, trois tours, dont une seule est conservée en totalité et une entrée. . Les axes des deux monuments ne sont pas alignés, une tourelle ronde a été rajoutée.","habitants":"Limanges; Famille de François de Bridiers.                         Neuvy; famille de Chauvigny                                               Famille de Catherine Robert                                          Thizay;Pierre d'Artenay\r\n        \r\n        \"","divers":"Neuvy-pailloux 46° 53' 12\" nord, 1° 51' 40\" est grav 1 à 3,   Thizay grav 4-5, Chezal-Garnier grav 6-7","gps":"","images":["../image/image_36/36_Neuvy_Indre_1.jpg","../image/image_36/36_Neuvy_Indre_2.jpg","../image/image_36/36_Neuvy_Indre_3.jpg","../image/image_36/36_Neuvy_Indre_4.jpg","../image/image_36/36_Neuvy_Indre_5.jpg","../image/image_36/36_Neuvy_Indre_6.jpg","../image/image_36/36_Neuvy_Indre_7.jpg"]},"Consult_chateau_formulairedb15":{"id":"Consult_chateau_formulairedb15","dept":"36","canton":"Châteauroux-Ouest","commune":"Niherne","nom":"Niherne","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Niherne celui de Rancay, de la Saura, de Surins, de Tecq et celui de Vaux, pas d'informations historiques pour ces trois derniers. RANCAY,  il existait à Rançay un fief relevant de Châteauroux et comportant hôtel et métairie. Mentionné à partir de 1429, il est difficile de connaître ses détenteurs avant 1550. Plusieurs lignées, Du Mesnil, Guérin et Marolles, coexistent et s'allient entre 1443 et 1540, tandis que différents vocables, hôtel et métairie, Rancay le vieux ou tour de Rancay supposent une coseigneurie ou un démembrement  ancien ou un lieu de vassalité. Le fief est acheté par Francois de Douhalt, puis passe de Timoléon Tasureau en 1615 à Etienne de Barbanson en 1638 et à Silvain Ajasson de Gransagne en 1660. À la Révolution, le sieur du Verdier émigre, ses biens sont saisis et vendus.\r\nSAURA,  il fut construit au XIXe siècle par l'architecte Murison pour la comtesse de Sugny. Il passa ensuite à son fils, M. Douard de Saint-Cyran (auquel les Castelroussins doivent leur ancien théâtre).","architecture":"RANCAY, le château actuel, construit au XIXe siècle, est un bâtiment de style néo-gothique du à l'architecte Dauvergne et constitué d'un corps de logis principal à deux étages et d'un pavillon en légère sailli. Sur l'extrémité opposée est accolée une élégante chapelle à trois travées. Cet ensemble est réalisé pour le baron d'Astier de La Vigerie                                                                                                              SAURA, situé sur la rive gauche de l'Indre, le château de La Saura est installé au cur d'un vaste parc bordé par un étang, le  château est une imposante construction se présentant en un vaste corps de bâtiment quadrangulaire, il comporte en élévation trois niveaux couverts d'un toit à croupes d'ardoises. Deux lucarnes y encadrent, de chaque côté, un haut fronton interrompant l'avant toit. En avant du premier niveau s'étend enfin une coursière en encorbellement, à la rambarde en fer forgé identique à celle du balcon. L'accès s'effectue par deux escaliers droits monumentaux de chaque côté de la façade.","habitants":"Rancay; Francois de Douhalt                                                    Saura; M. Douard de Saint-Cyran \r\n        \r\n        \"","divers":"Châteaux à Niherne celui de Rancay grav 1-2,, de la Saura grav 3-4 ,de Surins grav-5, de Tecq grav-6 et celui de Vaux grav-7-8.","gps":"","images":["../image/image_36/36_Niherne_1.jpg","../image/image_36/36_Niherne_2.jpg","../image/image_36/36_Niherne_3.jpg","../image/image_36/36_Niherne_4.jpg","../image/image_36/36_Niherne_5.jpg","../image/image_36/36_Niherne_6.jpg","../image/image_36/36_Niherne_7.jpg","../image/image_36/36_Niherne_8.jpg"]},"Consult_chateau_formulaireb899":{"id":"Consult_chateau_formulaireb899","dept":"36","canton":"La Châtre","commune":"Nohant le vic","nom":"Nohant_Vic","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Nohan le Vic celui de Georges Sand dit de Nohant et de Laleuf.                                                                                                                          NOHANT-le -Vic,  Aurore Dupin (1804 - 1876) est la fille dun officier de lEmpire. Elle suivit son père en Espagne mais à la mort de celui-ci en 1808 elle fut élevée par sa grand-mère paternelle Marie-Aurore de Saxe au château de Nohant. Elle se marie en 1822 au baron Dudevant dont elle eut deux enfants. Elle se sépare de lui en 1831, la séparation judiciaire est proclamée en 1836. Elle sinstalle à Paris où elle mène une vie mouvementée et publie ses premiers ouvrages sous le nom de George Sand. En 1839, elle se retire à Nohant et y meurt le 31 mai 1876. Le domaine de George Sand, et acquit en 1793 par Madame Dupin de Francueil, grand-mère de l'écrivaine.  y passa son enfance et son adolescence et y écrivit la majeure partie de son uvre. Elle y reçut des hôtes illustres : Liszt et Marie d'Agoult, Balzac, Chopin, Flaubert, Alexandre Dumas fils, Delacroix qui y eut son atelier. Le domaine est aujourd'hui propriété de l'État et géré par le centre des monuments nationaux. conserve encore aujourdhui le mobilier et les objets de lécrivain. Le jardin qui entoure la maison, labellisé Jardin Remarquable, témoigne également de la riche personnalité de George Sand et de son attachement à la nature.","architecture":"NOHANT, le domaine de George Sand : la gentilhommière de la fin du XVIIIe siècle construite pour le gouverneur de Vierzon, sur l'emplacement de l'ancien château féodal des Villelume, la maison dans laquelle vécut George Sand, en Centre-Val de Loire au coeur du Berry, témoigne de la vie exceptionnelle de cette femme du XIXe siècle.                                                                                                             LALEUF, un aveu de 1529, rendu à Françoise de Maillé de LaTour Landry, dame de Châteauroux, mentionne l'hôtel de Laleuf et Guillaume de Malleret, écuyer, seigneur de Laleuf. C'est en 1549 que Jacques de Malleret, écuyer, fit aveu d'une maison et appartenances sises à Laleuf, à M. d'Aumont,seigneur de Châteauroux. Antoine Bigot, docteur en médecine, en hérite de sa mère Huguette de Mayet en 1611, veuve de M. Bigot, receveur de la terre de La Châtre pour le roi. Antoine Bigot vend le château peu de temps après à Augier Cougny. Le domaine devient propriété de la famille Heurtault, puis de Claude Baraton, seigneur de Chouday qui le cède en 1699 à Jacques Thomas, receveur de la terre de La Châtre et seigneurie de Nohant-Vic. Au XIXe siècle, la terre de Laleuf sera vendue à la famille Girard de Vasson qui l'a conservée depuis lors. L'ensemble, avec ses tours, offre tous les caractères d'une maison-forte, probablement construite au XVe siècle et réaménagée aux XVIIe et XVIIIe siècles, sans grands remaniements depuis. Un portail avec portes piétonne et charretière donne accès à la cour.","habitants":"Laleuf;  Antoine Bigot                                                                           Nohan; de George Sand \r\n        \r\n        \"","divers":"Château de Nohant le Vic et Laleuf grav 5","gps":"","images":["../image/image_36/36_Nohant_Vic_1.jpg","../image/image_36/36_Nohant_Vic_2.jpg","../image/image_36/36_Nohant_Vic_3.jpg","../image/image_36/36_Nohant_Vic_4.jpg","../image/image_36/36_Nohant_Vic_5.jpg"]},"Consult_chateau_formulaire36f7":{"id":"Consult_chateau_formulaire36f7","dept":"36","canton":"Mézières en Brenne","commune":"Obterre","nom":"Obterre","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Obterre celui d'Effougeard,  de Michaud et de Paulnay.  EFFOUGEARD, cet ancien fief relevait de la baronnie de Preuilly et pour partie de la châtellenie des Effes. Il fut la propriété, sous l'Ancien Régime, des familles Robin de Montgenault, de Guénand et de Gamaches.\r\nGIROUARDIERE  La famille Hardouin possèdait le fief depuis une date antérieure à 1360. Le logis et ses dépendances s'inscrivent dans un quadrilatère, jadis protégé à l'ouest et au sud par des douves, à l' est par une levée de terre. Guillaume Hardouin marié à Aliénor de la Corbière en janvier 1525 semble avoir voulu marquer, avec les macles et les fleurs de lys, le double lien vassalique qui le liait aux Rohan portant \"de gueules à neuf macles d'or\" et aux Bréon portant \"d'argent à la fasce de gueules fleurdelisé et contre fleurdelisé\". Leur fils, marié en 1550, homme d'armes du duc de Lorraine, fait son testament à Metz en 1552 et meurt peu après. C'est donc à son fils unique, Eustache Hardouin, marié en 1571                                                                                                            MICHAUD, dépendant à l'origine de la baronnie de Preuilly, le château des Michauds sont en grande partie l'uvre de la famille Mascarel, dont sont issus les propriétaires actuels.","architecture":"EFFOUGEARD, le château actuel, reconstruit à la fin du XIXe siècle par la famille Navers, propriétaire à l'époque du château voisin de la Boussée, est une maison de style composite, constituée d'un corps central à cinq travées surmonté de lucarnes, il est relié à l'ouest par une tourelle en encorbellement à un pavillon de style Louis XIII à deux étages. Une tour en poivrière, accolée à l'est du bâtiment central, fut ajoutée ultérieurement, et rééquilibre l'ensemble qui est entouré d'un parc aux belles essences.                                                                                                         GIROUARDIERE L'entrée se faisait par le nord, protégée par une tour carrée, le long bâtiment de communs fermant la cour. Le logis proprement dit est un bâtiment long et étroit, orienté est-ouest. Le pignon sud, flanqué de tours de défense carrées, est éclairé d'une travée de baie des années 1525 au vocabulaire décoratif particulièrement original.                                                                                              MICHAUD, figurent côte à côte, du nord au sud, un pavillon néo-gothique surmonté de pinacles à décor de choux frisés, un corps de bâtiment très simple qui représente l'ancienne demeure surélevée d'un niveau, une tour hexagonale d'esprit gothique, suivie d'une galerie à l'italienne surmontée d'un étage en combles, à fenêtres à la Mansart, un pavillon de style Louis XIII à deux étages sobre, une chapelle de style roman et un salon turc que n'aurait pas désapprouvé Pierre Loti. La façade ouest est d'apparence extérieure plus classique, mais la grande aile en retour contient une très grande salle à manger de style gothique avec vitraux, loggia et décoration médiévale. La propriété, bien entretenue, ne manque pas d'allure, un parc à l'anglaise aux larges perspectives, forme un cadre agréable qui équilibre l'éclectisme des bâtiments.","habitants":"Effougeard; familles Robin de Montgenault                                           Michaud; famille Mascarel\r\n        \r\n        \"","divers":"à Obterre celui d'Obterre grav 1, celui d'Effougeard grav-2,  de Michaud grav 3-4 Paulnay grav-5","gps":"","images":["../image/image_36/36_Obterre_1.jpg","../image/image_36/36_Obterre_2.jpg","../image/image_36/36_Obterre_3.jpg","../image/image_36/36_Obterre_4.jpg","../image/image_36/36_Obterre_5.jpg"]},"Consult_chateau_formulaire02cd":{"id":"Consult_chateau_formulaire02cd","dept":"36","canton":"Aigurande","commune":"Orsennes","nom":"Orsennes","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Orsennes celui de Breuil-Yvain et celui de Marches.                                                                                 BREUIL-YVAIN,  il a été construit en 1450 pour Yvain du Mont, seigneur du Breuil et des Marches d'Orsennes au retour d'un voyage en outremer où il avait accompagné le Roi Charles VII,  au XVIe siècle  des Marches d'Orsennes est rattachée à celle du Breuil.  Le dernier  seigneur Jean-Baptiste du Mont décède en 1818 lègue à sa nièce la comtesse de la Celle La seigneurie. Le château de Breuil Yvain a accueilli, en 1972, le tournage du film Mauprat, réalisé pour la télévision pour Jacques Tréboutat.  Aujourd'hui à la famille d'Amarzit.                                                                                                   MARCHES, il s'agit de l'ancien siège de la seigneurie d'Orsennes, même si le bâtiment actuel n'a plus grand chose à voir avec le centre féodal. Orsennes appartint d'abord aux Naillac, puis aux Chamborant. Au XVIIIe siècle, par mariage le château passa dans la famille de Préaux, seigneur de Beauvais, qui le conserva jusqu'à la Révolution, puis, par alliance, il est à Gilbert Besse de Fromental qui fait détruire l'ancien château et construire l'actuel en 1807. En 1865, le domaine fut acheté par Léon Clément, aïeul des propriétaires actuels, sénateur, qui fit divers aménagements.","architecture":"BREUIL-YVAIN, ancien fief fortifié, dont l'origine remonte à 1236, se présente sous la forme d'un plan carré, cerné de doubles douves. L'accès est commandé par un châtelet aux deux tours à toit en poivrière. Au XVIIe siècle le corps de logis  est détruit par un incendie reconstruit au XVIIIe siècle. Le logis actuel, rénové au XIXe siècle, date pour l'essentiel des XVIIe et XVIIIe siècles et les communs du XVIIe siècle. L'édifice comporte trois niveaux, le dernier étant sous combles. Malgré des différences de dimension entre les travées des extrémités, il est élevé selon le principe de symétrie de l'architecture classique. L'édifice est coiffé d'un toit de tuiles à la Mansart percé de trois souches de cheminée. A l'intérieur, les cheminées, ornées de fleurs et de feuilles de châtaigniers, évoquent les châtaigneraies qui entouraient jadis la propriété.                                                                                MARCHES, les actuels communs constituent les restes de l'ancien logis du XVIIe siècle. L'édifice se présente en un long corps de bâtiment sans étage, couvert d'un toit de tuiles à pente brisée, à deux longs pans et croupes. Le logis récent, élevé sur trois niveaux dont un sous combles, couvert d'un toit d'ardoises à la Mansart. Il se prolonge, à l'extrémité ouest, d'un bâtiment à deux travées et à un étage mansardé auquel est accolée une tour circulaire. Un peu à l'écart s'élève l'ancien colombier, transformé à la fin du XIXe siècle en chapelle.","habitants":"Breui-Yvain; Jean-Baptiste du Mont                                      Marches;  famille de Preaux\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Orsennes celui de Breuil-Yvain grav 1 à 4 et celui de Marches grav-5-6.","gps":"","images":["../image/image_36/36_Orsennes_1.jpg","../image/image_36/36_Orsennes_2.jpg","../image/image_36/36_Orsennes_3.jpg","../image/image_36/36_Orsennes_4.jpg","../image/image_36/36_Orsennes_5.jpg","../image/image_36/36_Orsennes_6.jpg"]},"Consult_chateau_formulaire0603-2":{"id":"Consult_chateau_formulaire0603-2","dept":"36","canton":"Saint-Gaultier","commune":"Oulches","nom":"Oulches","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux à Oulches celui de Cors , de Castel Biray  et de Longefond et autres tel que Montaignon et Margoux.                                                     CORS, le château trouve son origine en 1066, dans une donation à l'abbaye de Preuilly.                                                                                                           CASTEL-BIRAY, sur le plateau a été construit au XIXe siècle un élégant château moderne, Castel-Biray. Ce dernier a appartenu à Paul Blanchemain, fils de Prosper Blanchemain, poète de Longefont, et poète lui-même. Au joli chalet, comportant deux bâtiments en équerre avec dans l'angle, une tourelle octogonale à balcon et toit pointu, est venue s'ajouter un peu plus tard, un corps de logis principal plus long, qui dépasse considérablement la tourelle.                                                                                                          LONGEFONT, l'actuel château de Longefont est l'ancien manoir prieural du prieuré Notre-Dame-de-Longefont créé en 1110 par Robert d'Arbrissel, fondateur de l'ordre de Fontevrault. Prosper Blanchemain, poète et propriétaire du domaine au XIXe siècle, L'église, joyau roman du XIIe siècle, a été récemment restaurée par les propriétaires actuels. Elle comporte une série de 48 chapiteaux, en majorité historiés. Des terrasses on jouit d'une vue remarquable sur le barrage et les boucles de la rivière                                                                                                                           MARGOUX, en 1677  François Honorat de Boislinard, chevalier seigneur de Margoux  décéda en 1722 son épouse  Élisabeth de Béchillon décéda en 1724. ces enfants  apporta la seigneurie de Margoux  dans la famille de La Faire.","architecture":"CORS. l'édifice comporte un grand corps de logis, entièrement refait au XIXe siècle, à part les soubassements peut-être. En amont, subsiste du vieux Château fortifié, un ensemble très remanié au XVIIe siècle. Ce bâtiment est flanqué, côté rivière, de deux tours et d'un corps central circulaire voûté. La tour principale, ancien donjon, a conservé au dernier étage une pièce carrée en pans de bois. Autour de cette pièce, un chemin de ronde épouse la forme cylindrique et s'appuie sur la saillie des mâchicoulis qui forme un encorbellement sur corbeaux à triple saillie moulurée. A l'intérieur de l'édifice, trois pièces conservent des cheminées du XVe siècle, date probable de la construction, peut être édifiée sur de plus anciennes fondations. Une petite tourelle termine le vieux logis.                                                                LONGEFONT, du XIIe siècle, la Révolution marque la fin du monastère. Outre le manoir, de l'ancien couvent restent les murs de soutènement formant terrasse, un bâtiment dit \"maison du confesseur\" et l'église. Le château, construit en 1702, est constitué d'un corps de logis rectangulaire. Il est surmonté d'une haute toiture à la Mansart, en vieilles tuiles, percée de lucarnes \"chapeau de gendarme\" domaine au XIXe siècle, l'a flanqué de deux tours correctement proportionnées auxquelles sont accolés deux bâtiments en retour.                                                                                         MONTAIGNON, du XVIe siècle, dont les façades et toitures sont inscrites aux M.H. par arrêté du 23 octobre 1972.","habitants":"Longefond; Prosper Blanchemain\r\n        \r\n        \"","divers":"à Oulches grav 1 à 3,  celui de Cors grav-5 , de Castel Biray  Grav-4, de Longefond  grav 6-7, Montaignon grav-8 et Margoux grav 9.   Oulches 46° 36' 58\" nord, 1° 17' 53\" est","gps":"","images":["../image/image_36/36_Oulches_1.jpg","../image/image_36/36_Oulches_2.jpg","../image/image_36/36_Oulches_3.jpg","../image/image_36/36_Oulches_4.jpg","../image/image_36/36_Oulches_5.jpg","../image/image_36/36_Oulches_6.jpg","../image/image_36/36_Oulches_7.jpg","../image/image_36/36_Oulches_8.jpg","../image/image_36/36_Oulches_9.jpg"]},"Consult_chateau_formulairef1ff":{"id":"Consult_chateau_formulairef1ff","dept":"36","canton":"Valençay","commune":"Faverolles en Berry","nom":"Pacaudière_Berry","type":"Château","periode":"XV-XIX","histoire":"PACAUDIERE, du comté et enfin du duché-pairie de Saint-Aignan en Berry, sauf la maison forte et la tour qui relevaient de la baronnie de Châteauroux pour passer en 1440 dans le ressort du baillage de Blois. C'était un noble fief, ayant toute justice, Les terres de Pichouët, de la Malaisée, des grand et petit Mil (Micq actuel), de la Maison-Rouge, le moulin des Bancs, le moulin du Roy  en relevaient en fiefs.  D'après un contrat de rachat reçu par Mathieu Tuffet, tabellion à Faverolles, en 1436, la Pacaudière était une vaste construction fortifiée. À cette date, elle est à Eudes Le Fort, seigneur de Condé, lequel la tient de son épouse, Jehanne de Châteauneuf. Transmise ensuite par les femmes, la seigneurie est dans la deuxième moitié du XVe siècle à Guillaume Herpin d'Orfond puis vers 1500 à Robert Carré de Villebon, chambellan de François 1er. À partir de 1598, le château est détenu par Raoul d'Auvergne, puis par ses descendants jusqu'en 1771, année où Pierre de Senneville, veuf de Dorothée d'Auvergne, le vend à Gabriel Haincques. En 1850, les Haincques le revendent à Ernest Deuzy ancien député-maire d'Arras, premier vice-président du conseil général du Pas-de-Calais, membre du conseil des agriculteurs de France, membre perpétuel de la société royale d'agriculture d'Angleterre, et par madame Henriette Dufour, son épouse. Le château est alors en partie réédifié suivant le style de Louis XII. Puis il appartint à M. Viennot, bibliothécaire à la Bibliothèque Nationale.","architecture":"PACAUDIERE,  consistait en maison forte et grosse tour, plus en vastes communs et bâtiments, clos de grands murs. Les Haincques  reconstruisirent  la Pacaudière dans un style néo-gothique, mais une des ailes en retour pourrait être plus ancienne, et sans doute, la plupart des bases des divers autres murs. Le corps de logis, au centre, est composé de quatre corps de bâtiments. Les extrémités sont occupées par deux pavillons quadrangulaires, à deux niveaux, sommés d'une terrasse à créneaux et mâchicoulis. Dans l'axe du corps central, une lucarne présente un important registre ornemental.","habitants":"Famille de Gabriel Haincques\r\n        \r\n        \"","divers":"Château de la Pacaudière","gps":"","images":["../image/image_36/36_Pacaudi%c3%a8re_Berry_1.jpg","../image/image_36/36_Pacaudi%c3%a8re_Berry_2.jpg","../image/image_36/36_Pacaudi%c3%a8re_Berry_3.jpg"]},"Consult_chateau_formulaire014a":{"id":"Consult_chateau_formulaire014a","dept":"36","canton":"Châtillon sur Indre","commune":"Palluau-sur-Indre","nom":"Palluau_Frontenac","type":"Château","periode":"XI- XIII-XV","histoire":"Trois châteaux à Palluau dont celui de Palluau, celui de la Joubardière et de Paray (voir article suivant ).                                                                                 PALLUAU-FRONTENAC,  le château relevait dès le XIe siècle du comte d'Anjou et de Touraine, devenus au siècle suivant roi d'Angleterre. En 1188, Philippe Auguste prit le château d'assaut et vainquit les Anglais qui l'occupaient.  Louis de Buade, comte de Frontenac, était également seigneur de Palluau, a été construit en 1073 par Foulques le Réchin. Il est ensuite donné à son vassal, Jean de Palluau, est ensuite incendié par le Prince Noir et subit de graves destructions pendant la guerre de cent-ans. Victime de plusieurs sièges, le château est définitivement abandonné par les Anglais en 1360. Il appartient à cette époque à la famille de Tranchelion qui le garde jusquen 1537. En 1606, le Roi de France Henri IV demande à lun de ses plus fidèles compagnons dacheter le domaine de Palluau qui représente toujours une véritable place de défense sur cette partie de la Touraine. Cest Antoine de Buade de Frontenac qui fait cette acquisition. Viennent ensuite Henri de Buade qui meurt très jeune (26 ans) au siège près de Montauban, puis Louis de Buade qui, né a Saint-Germain-en-Laye en 1622, passe quelques années denfance à Palluau. En 1700 Paul de Beauvillier Pair de france en  est propriétaire, meurt en 1714, la seigneurie passe à son fils Hippolite, en 1770 Hippolite le cède à à René -François de Montbel et en 2009, le château est vendu à Jean-Roger Morvan toujours propriétaire,","architecture":"PALLUAU, château construit sur un éperon rocheux qui domine le bourg, ruiné à la fin du XIIe siècle, le château souffrit en 1560 et 1582 des guerres de Religion. En mars 1796, une révolte locale dite \"Vendée de Palluau\", lui causa des dommages. Le château primitif devait occuper un espace rectangulaire dont trois côtés étaient entourés de fossés qui subsistent en partie. Des bâtiments des XIIe et du  XIIIe siècles, subsistent la base des murs qui servent d'assise au château actuel, et la tour d'angle ouest qui serait, d'après la légende, celle sur laquelle Philippe Auguste planta la bannière de France. Les bâtiments actuels datent du XVe siècle ou du début du XVIe, et occupent les côtés sud-est et sud-ouest. A l'angle Est, une grosse tour ronde, souvenir de l'ancienne forteresse, est reliée au corps de logis. Au rez-de-chaussée du bâtiment Est se trouve la chapelle ornée de peintures murales qui retracent l'histoire de la Vierge. Des peintures murales ont également été conservées dans l'une des salles de la grosse tour.","habitants":"Palluau;Foulques le Réchin\r\n        \r\n        \"","divers":"Château de Palluau Frontenac,  46° 56' 41\" Nord et 1° 18' 45\" Est","gps":"","images":["../image/image_36/36_Palluau_Frontenac_1.jpg","../image/image_36/36_Palluau_Frontenac_2.jpg","../image/image_36/36_Palluau_Frontenac_3.jpg","../image/image_36/36_Palluau_Frontenac_4.jpg","../image/image_36/36_Palluau_Frontenac_5.jpg","../image/image_36/36_Palluau_Frontenac_6.jpg","../image/image_36/36_Palluau_Frontenac_7.jpg","../image/image_36/36_Palluau_Frontenac_8.jpg"]},"Consult_chateau_formulaire2451":{"id":"Consult_chateau_formulaire2451","dept":"36","canton":"Châtillon-sur-Indre","commune":"Palluau-sur-Indre","nom":"Palluau_Indre","type":"Château","periode":"XIV-XVI","histoire":"JOUBARDIERE, la seigneurie de La Joubardière est donnée en dot à Louise de Palluau, femme de Roger de Cholet, baron d'Anjou. Ce château ,l'un des plus forts de la province de Touraine, est détruit sous le règne de Louis XI, car Elyon de Cholet qui en était possesseur, eut le malheur de suivre le parti de Charles, Duc de Guienne, frère du Roi, mais le château fut rebâti sous le même règne, par le dit Elyon, qui obtint de sa majesté des Lettres de grâce et de rémission le 8 mars 1469. Trois cents ans plus tard, cette famille risque de ne pas survivre à la Révolution ; François-Hyacinthe de Chollé, chevalier, fondé de pouvoir à l'assemblée électorale de la noblesse de Touraine, en 1789. L'aîné des frères Chollé ajoute à son nom celui de la Salle, qui lui vient d'une propriété voisine de Montrichard. Le deuxième est communément appelé le chevalier de La Rimbaudière ou de la  Joubardière, et le troisième connu sous le nom de Chollé-Rança, se cache  à Villentrois. Ils participent aux combats de 1796 et leur petit château de La Joubardière devient le quartier général des insurgés.                                                                         PARAY, c'est en 1436 que Jean de La Châtre, échanson du roi, épousa Jeanne de Paray qui lui apporta en dot la terre qui portait son nom. En 1715, Charles de Wissel, commissaire général d'artillerie, épousa Bénigne de La Châtre. Lui succédèrent, toujours par héritage, les familles de Trémiolles, de Falaiseau et de Bry d'Arcy.","architecture":"JOUBARDIERE,   de plan en T, deux corps de logis rectangulaires à deux niveaux toit à deux pans dont un en transversale plus haut    avec lucarnes, l'édifice  est flanqué d'une tourelle polygonale à toit pointu de cinq pans.                                                                                                PARAY,  on accède au château de Paray par une belle porte fortifiée du XVe siècle en pierre de taille, surmontée d'une tour avec mâchicoulis à ogives. Les communs du XVIIe siècle, conservent des éléments décoratifs intéressants. Le château, qui jouit d'une vue étendue sur la vallée, était à l'origine un bâtiment cruciforme, cette forme subsiste dans les murs porteurs, mais elle est occultée par l'adjonction par l'architecte Alfred Dauvergne, de deux pavillons de deux et trois travées, qui ont constitué une façade uniforme de huit travées sans élément décoratif autre que les lucarnes de toit, la plus importante étant géminée et sommée d'un fronton triangulaire.","habitants":"Joubardière, famille d' Elyon de Cholet                                             Paray; famille de Trémiolles\r\n        \r\n        \"","divers":"Palluau,  46° 56' 41\" Nord et 1° 18' 45\" Est                                Château de la Joubardière grav 1 à 4, Paray grav 5 à 7","gps":"","images":["../image/image_36/36_Palluau_Indre_1.jpg","../image/image_36/36_Palluau_Indre_2.jpg","../image/image_36/36_Palluau_Indre_3.jpg","../image/image_36/36_Palluau_Indre_4.jpg","../image/image_36/36_Palluau_Indre_5.jpg","../image/image_36/36_Palluau_Indre_6.jpg","../image/image_36/36_Palluau_Indre_7.jpg"]},"Consult_chateau_formulaire1d6b":{"id":"Consult_chateau_formulaire1d6b","dept":"36","canton":"Saint-Benoît-du-Sault","commune":"Parnac","nom":"Parnac_Indre","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Parnac celui de Parnac,  de Boisremond, et de Montgarnaud.                                                                                                           PARNAC,  a appartenu en 1550 à François de La Marche de Puyguillon. Par alliance, il passe à la famille de Forges de Barreneuve, qui le vend en 1756 à Sylvain Delouche de Boisrémond. Au XXe siècle, Raymond Rollinat, naturaliste et herpétologue, vivant à Argenton, fit du château un rendez-vous de chasse.                                                                                                  BOISREMOND, le château a été bâti en 1626 par Michel Delouche, seigneur de La Roche de Mouhet, de la Ronde et de Parnac, lieutenant de Robecourte de la sénéchaussée de Montmorillon puis procureur du roi. Légué au bureau de bienfaisance de Parnac en 1882 par Émilie Delouche de Boisrémond, veuve d'Arthur Baucheron, le château a été vendu dans les années 1920.\r\n MONTGARNAUD, à  l'origine, ancienne métairie qui appartenait au prévôt de Saint-Benoît,  cet ensemble de bâtiments datant des XVIe et XVIIe siècles,était une simple métairie surplombant la vallée du Portefeuille, avec en vis à vis le village de Saint-Benoît du Sault. il fut vendu en 1275 aux moines par Hélie de Montgarnaud.  A partir du XIVe siècle, les Dury, seigneurs de Montgarnaud, rendent hommage, c'est sans doute Louis Dury qui élève au début du XVIe siècle une petite maison forte sur plan carré, flanquée de deux tours rondes. En 1710, l'édifice passe à la famille Couhé de Lusignan qui le vend en 1720 à Nicolas Vézien des Ombrages, seigneur du Cluzeau, maître de forge. Étienne Fossiat des Châtres l'achète en 1768, ses descendants le vendent en 1817 à M. Alix Delouche de Boisrémond, maire de Parnac. Longtemps abandonné, le château fait l'objet d'une restauration de grande qualité.","architecture":"PARNAC, du XVIIIe siècle,  le corps central simple à un étage avec un haut toit à la Mansart en tuiles. Un escalier droit avec un palier à mi étage et une balustrade en bois, dessert le logis. Au début du XIXe siècle, ont été accolés deux pavillons. Des vestiges subsistent : une grosse tour ronde du XVe ou du XVIe siècle tronquée, des douves entourant le logis, auxquelles on accède par un pont dormant rappelant l'ancien pont-levis, et à l'intérieur une grande cheminée gothique.                                                                                                    BOISREMOND , l'édifice est un corps central flanqué de deux tours carrées en quinconce, percées de meurtrières et de bouches à feu, coiffées de lanternons en bardeaux de châtaignier. Un escalier droit en granit, placé face à la porte d'entrée, divise la maison en deux parties. Les ouvertures sont de moyenne grandeur, les plus anciennes ont conservé des barreaux de fer aux fenêtres et les autres ont été agrandies au XVIIIe siècle, époque où un pavillon à la Mansart, couvert de tuiles a été construit à l'entrée de la propriété. Des douves en eau en forme de U, côtés sud et ouest, protègent la façade arrière, restée dans le style maison-forte.                                                                                     MONTGARNAUD,  le château fut construit à la fin du XVIe siècle. L'édifice présente une tour carrée, des douves et un pont de pierre. A l'origine, cet ensemble de bâtiments datant des XVIe et XVIIe siècles,  a conservé de ses constructions de l'extrême fin du XVIe siècle, une tour ronde, une tour carrée à trois étages, deux pavillons et un pigeonnier. Longtemps abandonné, le château fait l'objet d'une restauration de grande qualité.","habitants":"Parnac; famille de Forges de Barreneuve                                Boisrémond; famille  de Michel Delouche                    Montgarnaud; famille Couhé de Lusignan\r\n        \"","divers":"châteaux à Parnac Grav 1 à 8  celui de Parnac,  de Boisremond, et de Montgarnaud.                                               Parnac 46° 27' 15\" nord, 1° 26' 35\" est","gps":"","images":["../image/image_36/36_Parnac_Indre_1.jpg","../image/image_36/36_Parnac_Indre_2.jpg","../image/image_36/36_Parnac_Indre_3.jpg","../image/image_36/36_Parnac_Indre_4.jpg","../image/image_36/36_Parnac_Indre_5.jpg","../image/image_36/36_Parnac_Indre_6.jpg","../image/image_36/36_Parnac_Indre_7.jpg","../image/image_36/36_Parnac_Indre_8.jpg"]},"Consult_chateau_formulaire63bc":{"id":"Consult_chateau_formulaire63bc","dept":"36","canton":"Ecueillé","commune":"Pellevoisin","nom":"Pellevoisin_Mée","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux à Pellevoisin, celui de Mée et de Montbel.                                                                                  MEE, le premier propriétaire du fief au XIVe siècle était la famille Menou, originaire du Perche, issue d'une terre située dans la baronnie de Châteauneuf en Thymerais. La construction de cet imposant château date des années 1440. C'est une typique maison forte du XVe siècle dont on trouve peu d'exemples conservés dans l'Indre. Une réplique de ce château est visible à Culan, près de Châteaumeillant, en empruntant la route de la Châtre à Montluçon. Il a été restauré avec le concours de l'administration des M.H.. Il a été classé à l'inventaire supplémentaire en 1980.\r\nMONTBEL, c'est par lettre patente d'avril 1770 que la terre de Palluau en Touraine fut érigée en comté sous le nom de Montbel en faveur de René François de Montbel, sous-gouverneur des enfants de France. Le château de Poiriers fut construit au XVIIe siècle par Antoine de Montbel. Le personnage le plus important de la famille fut la comtesse de Montbel, dame d'honneur de la Reine Marie-Antoinette. C'est elle qui, vers 1770, entreprit d'embellir la décoration intérieure du château, notamment par la mise en place de belles boiseries du rez-de-chaussée et du premier étage. A la suite d'un mariage, les de Montbel s'allièrent à la famille de La Rochefoucauld. Ainsi naquit la branche La Rochefoucauld-Montbel dont les descendants vécurent au château de Poiriers. Il fut vendu comme le château du Mée, en 1976, à un industriel belge qui en est toujours le propriétaire.","architecture":"MEE, le château fut un important poste militaire pendant la guerre de Cent ans. Il comportait alors cinq tours. L'édifice se compose actuellement d'un corps de logis auquel sont accolées deux tours rondes à étage de mâchicoulis. Cette partie primitive du château a été modifiée au XVIIIe siècle. Deux annexes ont été accolées sur la façade ouest, dans l'angle sud des tours. La façade Est a été complètement refaite . A l'extrémité sud de ce corps de logis, a été bâtie au XVIIIe siècle une aile perpendiculaire. A l'écart du château ont été conservés des éléments de l'ancien édifice : une tour située à l'Est dans le prolongement de l'aile sud  une ferme ; au fond du jardin, un petit bâtiment semi-circulaire.                                                                        MONTBEL, est composé d'un corps principal cantonné de courtes ailes et s'élève sur deux niveaux, la seule animation réside dans l'avant-corps central, en faible saillie, surmonté d'un fronton triangulaire éclairé d'un il-de-buf. À partir de 1930, la famille de la Rochefoucauld entreprend des restaurations sur l'aile droite, ouverte côté parc par de larges baies surbaissées et le réaménagement des pièces du premier étage. Le parc est réaménagé par les paysagistes Henri et Achille Duchesne qui composent, du côté de l'entrée de Montbel, un jardin à la française et à l'arrière un vaste parc à l'anglaise. Dans le parc, une grotte bâtie sur le lieu des apparitions de la Vierge à Estelle Faguette, domestique des La Rochefoucauld, en 1876.","habitants":"Mée; famille Menou                                                                      Montbel; Famille de René François de Montbel\r\n        \r\n        \"","divers":"Grav de 1à 3   Mée-46° 59' 02\" Nord et 1° 24' 54\" Est.                 Montbel grav  4","gps":"","images":["../image/image_36/36_Pellevoisin_M%c3%a9e_1.jpg","../image/image_36/36_Pellevoisin_M%c3%a9e_2.jpg","../image/image_36/36_Pellevoisin_M%c3%a9e_3.jpg","../image/image_36/36_Pellevoisin_M%c3%a9e_4.jpg"]},"Consult_chateau_formulaire1761":{"id":"Consult_chateau_formulaire1761","dept":"36","canton":"Valençay","commune":"Poulaines","nom":"Poulaines","type":"Manoir","periode":"XVI","histoire":"POULAINES, siège d'une seigneurie féodale, qui faisait partie de la baronnie de Graçay, le manoir de Poulaines est le dernier témoin d'un ancien château-fort. Il appartenait en 1340 à Pierre III de Graçay et passa par alliance au XVIe siècle, de cette famille aux de Boys puis à Fançois Herpin. À la fin du XVIe siècle, il est détenu par Louis Herpin qui meurt en 1611 sans postérité. La terre de Poulaines passe à ses neveux Courault et est vendue en 1614 à Pierre de La Porte, époux de Madeleine Courault. Elle est transmise, par alliance, à Pierre de Crespin et reste au sein de cette famille jusqu'au début du XVIIIe siècle. Cédée à la famille de Noblet, puis vendue, en 17 41 par les héritiers à Hippolyte du Coudreau, elle est revendue en 1762 à Jean Baptiste Duchalais (famille de tanneurs d'Issoudun). En 1800, Poulaines est adjugé à Hippolyte Godeau, inspecteur des Domaines, dont la fille Marie Joséphine épouse le vicomte Victor de Brettes. Au XIXe siècle la fille de ces derniers transmet la propriété à sa nièce qui épouse son\r\ncousin, Sévère Martial de Brettes.","architecture":"POULAINES, occupant le côté d'une cour, le manoir est constitué de deux corps de logis contigus, de dimensions analogues réunis sous un toit d'arclaise à deux hauts versants à pignons découverts. Un troisième, de construction plus récente, et de moindre taille, les prolonge. Les combles sont éclairés de lucarnes de formes diverses accusant des remaniements. Au centre, deux lucarnes fronton passantes de tailles inégales. L'édifice, percé de grandes baies, dont certaines à meneaux, est élevé en grande partie en moellons, le tout recouvert d'un enduit. La pierre de taille se trouve sur les encadrements des baies, sur les contreforts à retraites successives situés contre l'un des murs pignons, dans les chaînes d'angle et sur les rampants des toits. Les cheminées sont montées de briquettes. Détachée de l'ensemble se dresse une tour polygonale coiffée d'un dôme.\r\nMalgré une architecture rendue hétérogène par des reprises à des périodes diverses, il semble que la base de la construction soit médiévale, probablement du XVe siècle.","habitants":"famille de Noblet\r\n        \r\n        \r\n        \"","divers":"Château de Poulaines  47° 09' 10\" nord, 1° 39' 51\" est","gps":"","images":["../image/image_36/36_Poulaines_1.jpg","../image/image_36/36_Poulaines_2.jpg","../image/image_36/36_Poulaines_3.jpg","../image/image_36/36_Poulaines_4.jpg"]},"Consult_chateau_formulaire7cfe":{"id":"Consult_chateau_formulaire7cfe","dept":"36","canton":"Saint-Sévère-sur _Indre","commune":"Pouligny-Notre-Dame","nom":"Pouligny_Notre_Dame","type":"Château","periode":"XV","histoire":"POULIGNY NOTRE DAME, à l'origine le fief un des plus grands de l'ancienne baronnie de Sainte Sév
