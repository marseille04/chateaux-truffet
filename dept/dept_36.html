ère, en a toujours dépendu depuis le Moyen-Age. Il comprenait de nombreuses terres, des prés et des bois. Plusieurs petites seigneuries dépendaient de cette terre, celles de Beaumont, le Chézeau et Richemont. Au Moyen-Age, la seigneurie de Pouligny Notre-Dame, ressortissant de la baronnie de Ste-Sévère, appartint à la famille de Ceris. Elle passa par mariage à la famille de Vignolles. Un Christophe de Vignolles fit hommage de ses terres en 1470 à Jean de Brosse, seigneur de Boussac. Le Manoir de Pouligny appartenait en 1944 à un avocat, sans cause d'ailleurs, qui s'appelait Pierre Tassin. Presque en ruine, les fossés en partie comblés, il fut racheté en 1963 par Messieurs Verly et Amungual qui avec l'aide de Mick Micheyl, le restaurèrent complètement et en firent l'élégant manoir que nous pouvons admirer aujourd'hui. Il abrite un hôtel avec un parcours de golf, un centre de Balnéo et Spa, deux bars, trois restaurants et six salles équipées pour des réceptions.","architecture":"POULIGNY NOTRE DAME,   l'édifice était une construction féodale, entourée de fossés, avec tours aux angles et portes fortifiées avec pont-levis. Des événements inconnus, les guerres, les mariages, les héritages modifièrent et transformèrent la forteresse; les tours d'angles bâties en pierres et moellons, tirés près des alentours furent rasées, il en reste les emplacements, mais les fossés sont conservés après reconstitution. Les tours et les tourelles ont aujourd'hui disparu et une partie des fossés est transformée en jardins. Jouxtant les murs du château, la métairie de la Porte était élevée en bois et mortier de boue, couverte en paille ou en roseaux. Un système de vannes, qui existe toujours, mais n'est plus en état de fonctionner, faisait communiquer certains étangs ou plans d'eau avec les fossés du château, ce qui permettait leur mise en eau.","habitants":"Famille de Jean de Brosse,\r\n        \r\n        \"","divers":"Pouligny Notre- Dame; : 46° 28' 56\" Nord, 2° 00' 15\" Est","gps":"","images":["../image/image_36/36_Pouligny_Notre_Dame_1.jpg","../image/image_36/36_Pouligny_Notre_Dame_2.jpg","../image/image_36/36_Pouligny_Notre_Dame_3.jpg"]},"Consult_chateau_formulaire4a6d-3":{"id":"Consult_chateau_formulaire4a6d-3","dept":"36","canton":"Le Blanc","commune":"Pouligny st-Pierre","nom":"Pouligny_St_Pierre","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Pouligny St-Pierre celui de Benavent de Parc-Aude et Parc Rabault.                                                                                                                   BENAVENT, il existait avant le château du Parc à Aude construit vers 1840 une métairie tenue au début du XVIIIe siècle par Jean Pinault de Bonnefonds qui l'acheta. La dernière héritière, Anne-Charlotte en se mariant à Louis-Félix de Poix l'apporta à cette nouvelle famille. C'est leur fils, Jean, qui fit bâtir le château par un architecte belge. Les vicomtes de Poix conservèrent Bénavent jusqu'en 1899, année de sa vente à Aude, érudit local.                                                                                                PARC-AUDE, achevé en 1844  pour son propriétaire Jean-Charles de Poix, lui même architecte, qui en est vraisemblablement l'auteur.                                                     PARC-RABAULT, la propriété datant du XVIIIe siècle au moins est rachetée en 1810 par M. Rabaud.","architecture":"BENAVANT, puissant corps de bâtiment quadrangulaire à deux étages, le château est coiffé d'un toit à croupes d'ardoise au faîte orné d'une crête en zinc. Les combles sont éclairés par deux lucarnes sémi-circulaires et deux chatières. Les murs sont recouverts d'enduit, mais le corps central est en pierre de taille et est couronné au sommet par un fronton triangulaire, un balcon à balustrade, placé sur une galerie à trois arches, est plaqué en avant.                                                                                                                     PARC-AUDE,  construit au bord de la Creuse, le corps central, avec balcon et fronton triangulaire, est construit en pierre de taille les angles du bâtiment ont des chaînes avec bossage à refend ; le faîte du toit est orné d'une crête en zinc. deux étages carrés.                                                                                                                      PARC-RABAULT, il reste de l'édifice ancien, le corps de logis principal et un ancien logis transformé en bâtiment agricole en 1839. Le château est transformé, agrandi et aménagé à l'intérieur en plusieurs campagnes au XIXe siècle, dont une achevée en 1869 et une autre probablement vers la fin du siècle, la maison du fermier,ses dépendances agricoles et les écuries à chevaux sont reconstruites vers le début du XXe siècle. Un seul corps de bâtiment du château et la maison du fermier n'ont qu'un rez-de-chaussée et un étage de comble. Un corps de bâtiment du château est décoré d'un pilastre cornier toscan. Les divers corps de bâtiment du château ont des toits conique, en appentis massé, et brisé, en pavillon, à longs pans brises à croupes, un logis et un bâtiment agricole ont des toits en pavillon, le château est couvert d'ardoise, avec une crête, une girouette et des épis de faîtage.","habitants":"Benavent; Famille de Jean Pinault de Bonnefonds                           Parc-Aude;Jean-Charles de Poix                                                       Parc-Barrault; Famille de M. Rabaud \r\n        \r\n        \"","divers":"Pouligny St-Pierre grav 1-2-3  46° 40' 54\" nord, 1° 02' 24\" est. Benavant grav 4.","gps":"","images":["../image/image_36/36_Pouligny_St_Pierre_1.jpg","../image/image_36/36_Pouligny_St_Pierre_2.jpg","../image/image_36/36_Pouligny_St_Pierre_3.jpg","../image/image_36/36_Pouligny_St_Pierre_4.jpg"]},"Consult_chateau_formulairee9c5-2":{"id":"Consult_chateau_formulairee9c5-2","dept":"36","canton":"St-Gaultier","commune":"Prissac","nom":"Prissac_Roches_Chevreux","type":"Château","periode":"XVII","histoire":"Deux châteaux à Prissac celui  de Roche-Chevreux  et de la Garde-Giron. \r\nGARDE-GIRON, féodal des XIVe et XVe siècles ayant appartenu à Alain Giron, compagnon d'armes de Jeanne d'Arc, sur le chemin de Jeanne d'Arc on trouve la boîte sous forme d'une cache classique.\r\nDans un endroit au calme et d'où on peut voir ce petit château privé et peu connu. Constitué de trois ailes de bâtiments prenant place autour d'une cour carrée, le château de la Garde-Giron est un beau bâtiment qui fut restauré au XIXe siècle. Abrité dans un cadre remarquable, cet ancien édifice féodal constitua, au XIVe siècle, la dot de Catherine de Chauvigny, future épouse d'Alain Giron, un seigneur d'origine bretonne, compagnon de Jeanne d'Arc. Il contient une cheminée monumentale classée.                                                                                                                                       ROCHE-CHEVREUX dès le XIIIe siècle. En 1204, Guillaume Chevreux, figure dans une donation de Guy de La Trémoille à l'abbaye de La Colombe. En 1356, Guyonnet de Chevreux fait concession à Pierre Couraud, seigneur de La Roche, du château, terre et seigneurie de La Roche-Chevreux. La famille Couraud conserve le domaine jusqu'en 1768, date à laquelle il passe par alliance, aux mains de la famille Thibaud de La Rochethulon dont les descendants le possèdent toujours.","architecture":"GARDE-GIRON ,  de plan octogonal, il est flanqué de pavillons et de tours circulaires aux angles, et est entouré de fossés. Le château a fait l'objet d'une importante campagne de travaux au XIXe siècle, qui a porté essentiellement sur les percements, les couvertures et les aménagements intérieurs. Le corps de logis principal a été agrandi en profondeur pour réaliser une galerie au rez-de-chaussée et à l'étage. La façade ouest a été construite dans la seconde moitié du XIXe siècle, portant un décor peint.                                                                                                      ROCHE-CHEVREUX, le château se compose de deux bâtiments en équerre avec plusieurs tourelles. L'un des bâtiments est composé de deux corps de logis couvert à la Mansart et percé, de façon régulière, de larges fenêtres rectangulaires et de lucarnes surmontées d'un fronton triangulaire, la saillie des tourelles vient rompre la monotonie d'une ordonnance parfaite. Ces éléments, qui offrent un ensemble harmonieux, sont antérieurs aux XVIIe et XVIIIe siècles, et ont été restaurés au siècle suivant. Le deuxième bâtiment, couvert d'une toiture à deux pans, présente, côté vallée, une façade plus simple.","habitants":"famille Couraud \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Prissac celui  de la Garde Giron    Grav 1 à 5 46° 30' 39\" Nord, 1° 18' 31\" Est                                                                   Roche chevreux grav  6_7; 46° 30' 39\" Nord, 1° 18' 31\" Est","gps":"","images":["../image/image_36/36_Prissac_Roches_Chevreux_1.jpg","../image/image_36/36_Prissac_Roches_Chevreux_2.jpg","../image/image_36/36_Prissac_Roches_Chevreux_3.jpg","../image/image_36/36_Prissac_Roches_Chevreux_4.jpg","../image/image_36/36_Prissac_Roches_Chevreux_5.jpg","../image/image_36/36_Prissac_Roches_Chevreux_6.jpg","../image/image_36/36_Prissac_Roches_Chevreux_7.jpg"]},"Consult_chateau_formulairebbc7":{"id":"Consult_chateau_formulairebbc7","dept":"36","canton":"Eguzon-Chantôme","commune":"Ceaulmont","nom":"Prune_au_Pot","type":"Vestiges","periode":"XII-XV","histoire":"PRUNE-AU-POT, château fort de plaine, entouré de douves en eau, construit par la famille Pot du XIIe au XVe siècles a appartenu ensuite à la famille de Montmorency jusqu'en 1613. Le château, abandonné par les Pot vers le XVe siècle, n'a pas été habité ensuite. Au XVIIe siècle, la seigneurie échut aux Bourbons, puis entra dans le domaine royal. La terre fut séquestrée après la Révolution. Le château hébergea Henri IV lors du siège d'Argenton. Au bord de la ruine, il a été acquis en 2000 par C. et B. Aguttes qui en ont entrepris la restauration. Sans cette intervention, le donjon carré serait maintenant à terre. Au XVIIe siècle, la seigneurie échut aux Bourbons, puis entra dans le domaine royal. La terre fut séquestrée après la Révolution. Le château hébergea Henri IV lors du siège d'Argenton. Depuis le début du XVIIe siècle, le château était inhabité et en ruines. Des restaurations sont en cours.                                                            A Trois kilomètres au nord à le Menoux château dit le MANOIR, un hôtel noble est cité au Menoux en 1525 dont les familles de Paray, de Sorbier, de La Châtre furent les détenteurs aux XVe et XVIe siècles. C'est probablement la vieille bâtisse que Paul Pirot, héritier en 1902 de la famille Mestivier qui le possède au XIXe siècle, entreprend de transformer entre 1905 et 1908. C'est l'architecte Alfred Trolliet de Saint-Gaultier, grand spécialiste du genre, qui va la transformer en pittoresque et confortable manoir,  acquis en 1937 par la famille Main-Pigelet qui le vend dans les années 1980 à son propriétaire actuel.","architecture":"PRUNE-AU-POT, dit fort de plaine, entouré de douves en eau, construit par la famille Pot du XIIIe au XVe siècle, acquis en ruines en 2000 par les propriétaires actuels. Château rural du début du XIIIe siècle, qui conserve des cheminées monumentales, des escaliers à vis et des gargouilles sculptées.  L'ensemble de la fortification forme une cour carrée close d'un mur couronné de mâchicoulis. Il enserre une tour carrée et deux tours rondes. La poterne est percée d'une grande porte ogivale et d'une petite carrée, chacune ayant son pont-levis. La plus grosse des tours et  l'ancien donjon, avec escalier desservant tous les étages. En entrant se trouve une cave voûtée avec fontaine. Au premier, la salle hexagonale comporte des latrines. La tour rectangulaire, dite tour Colin, comporte un escalier logé dans une tourelle accolée semi-hexagonale. Entre la tour de la Fontaine et la tour Colin, la maison du métayer est moderne.                                                         MANOIR, il conserve l'ancien corps de bâtiment dont plusieurs fenêtres nouvellement percées sont refaites en pierre blanche, la tour d'escalier et la bretèche au-dessus de l'ancienne entrée et construite à neuf le haut pavillon qui surmonte les toits. Deux cheminées sont aussi les témoins de l'ancienne construction. Le manteau de la cheminée du grand salon du rez de chaussée est orné d'un médaillon dont le décor peint a disparu et d'initiales gravées GD MI LPD OC, sans doute celles d'anciens propriétaires. Un chai ferme la cour le long de la rue Haute.","habitants":"Prune au pot famille Pot                                                              Manoir  famille paray\r\n        \r\n        \"","divers":"Vestiges du château de la Prune au pot  grav 1 à 7                                 6° 37' 56,38\" Nord et 1° 34' 7,13\" Est et à Menoux le Manoir et le pavillon grav 8 et 9","gps":"","images":["../image/image_36/36_Prune_au_Pot_1.jpg","../image/image_36/36_Prune_au_Pot_2.jpg","../image/image_36/36_Prune_au_Pot_3.jpg","../image/image_36/36_Prune_au_Pot_4.jpg","../image/image_36/36_Prune_au_Pot_5.jpg","../image/image_36/36_Prune_au_Pot_6.jpg","../image/image_36/36_Prune_au_Pot_7.jpg","../image/image_36/36_Prune_au_Pot_8.jpg","../image/image_36/36_Prune_au_Pot_9.jpg"]},"Consult_chateau_formulaire961b":{"id":"Consult_chateau_formulaire961b","dept":"36","canton":"La Châtre","commune":"Pruniers","nom":"Pruniers","type":"Château","periode":"XV","histoire":"Deux châteaux à Pruniers celui de Pruniers et celui de la Motte.  \r\nPRUNIERS  Le fief dépendait de l'abbaye Saint-Sulpice de Bourges et appartint à la famille de Lignières. C'est dans la deuxième moitié du XIXe siècle que M. Montet fait construire par Alfred Dauvergne","architecture":"PRUNIERS,  un corps de logis central flanqué de deux pavillons rectangulaires fortement saillants. Une grosse tour hexagonale est accolée à la façade ouest. Il s'agit d'un édifice d'une extrême sobriété dont l'architecture obéit aux principes stricts d'alignement et de symétrie. A peu de distance, au nord, un énorme mur à demi ruiné et des traces de douves rappellent que s'élevait, au Moyen-Âge, un imposant château fort dont l'église actuelle de Pruniers occupe approximativement le centre.","habitants":"famille de Lignières\r\n        \r\n        \"","divers":"Château de Pruniers    grav  1-2-3                                                                    46° 47' 22\" nord, 2° 03' 08\" est","gps":"","images":["../image/image_36/36_Pruniers_1.jpg","../image/image_36/36_Pruniers_2.jpg","../image/image_36/36_Pruniers_3.jpg","../image/image_36/36_Pruniers_4.jpg"]},"Consult_chateau_formulaire908d":{"id":"Consult_chateau_formulaire908d","dept":"36","canton":"Eccueillé","commune":"Préaux","nom":"Préaux","type":"Château","periode":"XVI","histoire":"PREAUX,  Il a été construit pour Guillaume Raoul de Préaux Jean de Préaux en 1334, au XVIIIe siècle, à la suite de deux alliances avec la famille de Meaulne, la famille de Préaux délaisse un peu le berceau familial de Préaux et s'installe dans le Maine. Au milieu du XIXe siècle un incendie ravage en partie le château. Le comte Charles-Marie de Préaux le restaure et l'agrandit. Il y ajoute une aile et le réaménage complètement. Pendant la seconde guerre mondiale, le château est loué à la famille Say. Sa belle-fille, la dernière comtesse de Préaux (veuve du comte René de Préaux mort en 1934 des suites des gazages de la guerre de 14-18) décède en 1977. Brouillée avec ses héritiers, elle lègue le château, tous les meubles, tableaux et objets historiques le garnissant ainsi que l'ensemble de ses nombreux biens à l'ARC22 (Association pour la recherche sur le cancer dont les malversations de Jacques Crozemarie, son fondateur, défrayèrent la chronique dans les années 90   Les Préaulx contractèrent des alliances locales et parisiennes, délaissant quelque peu le bâtiment familial au XIXe siècle et, en 1976, la dernière Vicomtesse de Préaulx fit don du château à l'ARC- 22  qui le revendit aussitôt.","architecture":"PREAUX, il est sur le territoire de la commune d'Ecueillé et remonte au XIIIe siècle.  Il a été reconstruit au XVIe siècle mais est endommagé par un incendie en 1895. Après être resté abandonné il a été remanié au XXe siècle en conservant un style XVe. Le château est établi sur une terrasse, le corps de logis est flanqué d'une tour sur chaque façade.  La famille de Préaulx fit bâtir un premier château dont il ne reste aujourd'hui qu'une tour ronde. À cette tour est accolé au XVIe siècle un nouveau château qui fut brûlé lors des guerres de religion et dont subsiste un corps de logis avec de nombreuses fenêtres à meneaux ainsi qu'une chapelle. Sur une terrasse bordant l'Igneray, le château subit des restaurations importantes au XIXe siècle. Un pavillon et une tour de style Renaissance furent ajoutés ainsi que de hautes lucarnes a gâble, les ouvertures modifiées par l'adjonction de meneaux et traverses. Sur la façade nord a été rapporté un bas relief de style Renaissance représentant Adam et Ève, entouré d'un cadre à rinceaux bordé d'une guirlande de fleurs.","habitants":"famille de Preaulx \r\n        \r\n        \"","divers":"Château de Préaux 47° 01' 19\" nord, 1° 17' 36\" est","gps":"","images":["../image/image_36/36_Pr%c3%a9aux_1.jpg","../image/image_36/36_Pr%c3%a9aux_2.jpg","../image/image_36/36_Pr%c3%a9aux_3.jpg"]},"Consult_chateau_formulaire8217":{"id":"Consult_chateau_formulaire8217","dept":"36","canton":"Argenton sur Creuse","commune":"Le Péchereau","nom":"Péchereau","type":"Château","periode":"XIV-XV-XIX","histoire":"Quatre châteaux à Péchereau celui de Péchereau, de Courbat, de Thibauts  et de Paumule.                                                                              \r\nCOURBAT, le fief  relevait d'Argenton. Le célèbre Jean Mauduit, bailli de cette ville, l'ayant acquis en 1614, commença la restauration et l'agrandissement du château qui furent continués par son fils au cours du XVIIe siècle et aux Chevestre. Aujourd'hui, le château du Courbat est le siège de la mairie du Pêchereau.                                                                                                      THIBAUTS, construit par larchitecte Henri Dauvergne en 1890. À lorigine, cette terre était une métairie dépendant de Prunget. En 1556, Aubert de Montjohan qui la possédait sen défit au bénéfice de Claude et François de Montjohan, écuyers, qui y demeuraient. Elle passa ultérieurement à Jean de Savary, sieur des Thibauds et de Villerandoux et fut vendue en 1767 par Claude Dupin de Boislarge et son frère Pierre Dupin de Fleuranderie à Etienne Pépin, marchand à Argenton. À ce jour, le récent propriétaire, monsieur Olivier Chapus, a entrepris dimportants travaux de rénovation afin de refaire vivre la demeure.\r\nPAUMULE, existait en 1612, une dîme appartenant pour partie à Guillaume Couraud, damoiseau, seigneur du Vivier.  Pierre Bien est propriétaire de Paumule en 1666, puis cette terre passe à Charles de Saint-Julien, marié à Jeanne Bien ; cest aux descendants de ceux-ci quen 1714, Jean Coute, conseiller du roi, racheta la propriété. Ultérieurement, la famille Coute connut deux branches : celle des Coute de Paumule et celle des Coute du Cluzeau. Le château demeura dans cette famille jusquen 1950.","architecture":"COURBAT, ce manoir, entouré par l'eau des douves, bien que de dimension relativement modeste forme un ensemble architectural ayant particulièrement fière allure. La tour, le corps de logis couvert de tuile et le portail précédé autrefois d'un pont-levis, forment un ensemble original et coquet. Au-dessus de la porte d'entrée, faisant face au midi, on lit en lettres majuscules gravées dans la pierre, une phrase sentencieuse : « Passant à force de les passer, tu pourois bien demeurer ». Cette inscription pourrait se rapporter à un ancien cadran solaire. Au-dessous de l'inscription, se trouve la date de 1662. Dans les dépendances du château, se trouve une fuye ou colombier où les pigeons trouvaient leur gîte dans 840 boulins disposés sur 14 rangs. L'on voit encore l'échelle, tournant autour d'un poteau vertical en bois, au moyen de laquelle on pouvait facilement visiter les nids. Ce pivot s'engage à la partie supérieure dans une poutre horizontale portant la date de construction : « Jean Maudut m'a fait l'an 1625 ».                                                                                             PAUMULE corps de logis rectangulaire à deux niveaux accolé d'une tour polygonale à toit pointu.                                                                            PECHEREAU, du Haut-du-Pêchereau, il ne subsiste malheureusement pas grand-chose du château haut du Pêchereau. Seul un pigeonnier témoigne de lancienneté du site.","habitants":"Courbat; Jean Mauduit  Thibault; Aubert de Montjohan                             Paumule; famille de Pierre Bien \r\n        \r\n        \"","divers":"à Péchereau celui de Péchereau grav 1-2, de Courbat  grav 3-4, de Thibauts grav-7  et de Paumule grav 5 -6.                        Le Péchereau 46° 34' 44\" nord, 1° 32' 54\" est","gps":"","images":["../image/image_36/36_P%c3%a9chereau_1.jpg","../image/image_36/36_P%c3%a9chereau_2.jpg","../image/image_36/36_P%c3%a9chereau_3.jpg","../image/image_36/36_P%c3%a9chereau_4.jpg","../image/image_36/36_P%c3%a9chereau_5.jpg","../image/image_36/36_P%c3%a9chereau_6.jpg","../image/image_36/36_P%c3%a9chereau_7.jpg"]},"Consult_chateau_formulaired42a":{"id":"Consult_chateau_formulaired42a","dept":"36","canton":"Saint-Sévère-sur _Indre","commune":"Pérassay","nom":"Pérassay","type":"Château","periode":"XIX","histoire":"A quelques kilomètres au sud à Vijon le château de Beaulieu                                                                           PERASSAY,  le château de la famille La Rochethulon, a été construit en 1870 dans le style néogothique qui l'a conservé jusqu'en 1919. . Le château est entouré d'un grand parc avec un étang. Il a été vendu par les propriétaires (comte de la Rochethulon) au département de l'Indre. Actuellement, il est devenu foyer de vie départemental,  devenu en 1938 un aérium pour enfants affectés par la tuberculose, accueille aujourd'hui un foyer pour personnes handicapées                                                            BEAULIEU, au XIVe siècle, l'épouse de Raoul de Beaulieu fit un don à l'église de Vijon. Possédé par Pierre Guyonnet, écuyer, en 1446, puis au XVIe siècle par la famille Bertrand, le fief appartenait à Louis Bertrand, seigneur de Beaulieu et de La Pérouse, en 1670. Par alliance, Beaulieu passa dans la famille du Carteron: Jean du Carteron en était seigneur en 1694. Passé au XIXe siècle au comte de Saint-Georges, puis à son gendre Richard Hay de Siade, le château de Beaulieu accueillit à partir de 1929 un pensionnat, avant son rachat en 1979.","architecture":"PERASSAY, de style néo-gothique, installé au milieu d'un vaste parc, a été édifié en 1870. Le corps de logis de trois niveaux est flanqué aux angles par deux fines tourelles, et par une forte tour quadrangulaire couronnée de faux mâchicoulis. L'ensemble est couvert de toitures aiguës en ardoise, agrémentées de plusieurs lucarnes à hauts frontons.                                                                        BEAULIEU, les parties les plus anciennes de l'actuel château datent du XVIe siècle, notamment le pavillon situé à gauche du portail d'entrée. Mais la majeure partie des constructions est attribuable au siècle suivant: trois logis couverts de toitures à croupes d'ardoise percées de lucarnes, délimitent une cour ornée par les linteaux en anse de panier des portes et fenêtres. D'autres bâtiments ont été ajoutés récemment, complétant cet ensemble près de deux étangs.","habitants":"Perassay famille                                                                 La Rochethulon Beaulieu Famille de Pierre Guyonnet\r\n        \r\n        \r\n        \"","divers":"Château de Pérassay 46° 28' 21\" nord, 2° 08' 54\" est. grav 1-2. Beaulieu Vijon grav -3","gps":"","images":["../image/image_36/36_Perassay_1.jpg","../image/image_36/36_Perassay_2.jpg","../image/image_36/36_Perassay_3.jpg"]},"Consult_chateau_formulairec997":{"id":"Consult_chateau_formulairec997","dept":"36","canton":"Saint-Sévère-sur-Indre","commune":"Saint-Sévère-sur-Indre","nom":"Raoul","type":"Château","periode":"XVI-XVII","histoire":"RAOUL, Denise de Déols, née en 1173 et morte en 1207, est lhéritière  qui détenait la seigneurie de Châteauroux. Veuve à seize ans, Richard Cur de Lion la donne pour épouse à André de Chauvigny, en 1189. En 1367, le château est détruit par un incendie, lors du siège de la ville par le Prince noir. Vers 1450, il est reconstruit dans le style d'un hôtel seigneurial, par Guy III de Chauvigny, vicomte de Brosse, baron de Châteauroux.  Le 16 juillet 1497 Charles VIII érige la seigneurie de Châteauroux en comté, en faveur de Jean V d'Aumont. À la mort du dernier Chauvigny (1503), la terre de Châteauroux est divisée en deux parts : le château échoit aux Maillé de La Tour-Landry, les co-partageant les d'Aumont faisant construire le château du Parc. Henri II de Bourbon-Condé achète l'ensemble en 1612. Le grand Condé exile son épouse Claire-Clémence de Maillé-Brézé dans le château en 1671; elle y reste jusqu'à sa mort, en 1694. Louis XV achète le duché en 1737 à la famille de Condé et l'offre à sa favorite Marie-Anne de Mailly-Nesle. Le roi la titre duchesse de Châteauroux le 20 octobre 1743 et la présente à la cour le 24 octobre 1743. Au milieu du XVIIIe siècle, le château est la résidence des administrateurs du duché et de leur famille. Un de ces administrateurs est Henri Bertrand, père du futur général Henri Gratien Bertrand, maréchal de Napoléon, qui naît au château en 1767. De 1778 à 1789, le fermier général Charles Louis Dupin de Francueil, grand-père de George Sand, habite le château. Le 8 août 1792, le château est acheté par le conseil général. D'importants travaux de restauration sont entrepris par Alfred Dauvergne dans un style néo-gothique et 1879, et achevés en 1914 par son fils Henry.","architecture":"RAOUL, à  partir de 1112 au plus tard, ce château est nommé « château Raoul », en raison du prénom fréquent chez les seigneurs de Déols. Avec son enceinte, de plan en équerre, dont plusieurs tours subsistent encore, trois tourelles sur l'extérieur et sur angles intérieurs toits en poivrières, le château Raoul  est alors une puissante forteresse, à la frontière du domaine du roi de France et de l'Aquitaine. À labri de cet emplacement fortifié nait une bourgade dartisans et de commerçants. Le château Raoul a donné son nom à la ville de Châteauroux. Les seigneurs de Châteauroux sont puissants : leur domaine couvre les deux tiers de lactuel département de lIndre; au XIe siècle, ils ont leur propre monnayage. C'est ce nouveau château qui est protégé par les M.H.","habitants":"Famille d'Henri II de Bourbon-Condé \r\n        \r\n        \"","divers":"Château de Raoul 46° 48' 45\" N, 1° 41' 10\" E","gps":"","images":["../image/image_36/36_Raoul_1.jpg","../image/image_36/36_Raoul_2.jpg","../image/image_36/36_Raoul_3.jpg","../image/image_36/36_Raoul_4.jpg"]},"Consult_chateau_formulaire1c72":{"id":"Consult_chateau_formulaire1c72","dept":"36","canton":"Saint-Gaultier","commune":"Rivarennes","nom":"Rivarennes","type":"Château","periode":"XVI- XVIII","histoire":"A Rivarennes; château de la Tour de Barreneuve, de Terrières,  de Villeneuve, de la Romagère, de Pleinpinard - ruines et le Pavillon : tour carrée qui fut un logis bâti en 1603, sur une « salle du temps des Anglais.                                                                              TERRIERE, c'était le siège d'un fief ancien qui relevait de Cors. On y trouve, dès le  XVIIIe siècle, la famille de Boislinard. L'édifice a été partiellement reconstruit pour M. Varennes à partir de 1899 par l'architecte Alfred Trolliet. \r\nROMAGERE, le château a été construit à l'emplacement d'un ancien fief appartenant au XVIe siècle à la famille Baraton. Au XVIIe siècle, La Romagère fut transmise par héritage aux Boislinard des Chézeaux qui la conservèrent jusqu'en 1805. Le château connut différents propriétaires jusqu'à la famille Baubiet qui le possède encore aujourd'hui. Le château a été bâti au XIXe siècle puis remanié par Trolliet (plan et façade) entre 1891 et 1914. .                                                                                                         VILLENEUVE, le château primitif du XIIIe siècle s'appelait autrefois Villeneuve-Couraud, du nom des anciens propriétaires, la famille Couraud de Cors. Brûlé durant la guerre de cent ans, il fut reconstruit au XVe siècle par la famille de Vouhet qui le conserve jusqu'au début du XVIIe siècle. Au XIXe siècle, une restauration importante est l'uvre de Gaston de La Faire.                                                                                                   FOLTERTRE; la propriété de Foltertre résulte de la transformation en 1873, par Jules de Vorys, de la vieille demeure de la famille Fauconneau, implantée à Chitray depuis le XVIIe siècle. Le château est vendu en 1888 à Albert Rouxel qui fait réaliser des travaux à partir de 1891. La famille le conserve jusqu'en 1925, date à laquelle il passe, par alliance dans les mains de la famille de Rochambeau qui le possède toujours.","architecture":"ROMAGERE, le château a été bâti au XIXe siècle puis remanié par Trolliet (plan et façade) entre 1891 et 1914. Une ancienne chapelle dédiée à sainte-Anne s'élève à proximité de la demeure.                                                                                                      TERRIERE, c'est un ensemble au plan complexe avec de nombreux corps de bâtiments reliés entre eux ou flanqués de tours rondes et carrées. La toiture, couverte d'ardoise présente de belles lucarnes à frontons en plein cintre.                                                      VILLENEUVE , le château présente un corps de logis rectangulaire à deux étages flanqué de deux tours rondes. L'ordonnance des baies est régulière et des lucarnes, ornées de gâbles sculptés néo-gothiques, éclairent la toiture d'ardoises à quatre pans. Les deux tours avec mâchicoulis, sont plus élevées que le corps de logis. Au nord-est, et reliée au bâtiment par une galerie construite par l'architecte Trolliet en 1896, se trouve une troisième tour ronde remarquable, vestige des restaurations du XVe siècle. Une bretèche servait de latrines au premier étage. Au deuxième étage, la ceinture de corbeaux formant mâchicoulis qui vient couronner la tour, s'éloigne assez du mur pour un chemin de ronde. La chapelle a été élevée par l'architecte Trolliet.","habitants":"Terrière; famille de Boislinard.                                            Romagère; famille Baraton\r\n        \r\n        \"","divers":"A Rivarennes grav -1, châteaux de Foltertre grav 2-3-4 ,  de Villeneuve grav 5, de la Romagère grav 6-7, de Pleinpinard -Barreneuve;: 46° 38' 11\" Nord 1° 23' 11\" Est                                 romagère; : 46° 38' 11\" Nord 1° 23' 11\" Est","gps":"","images":["../image/image_36/36_Rivarennes_1.jpg","../image/image_36/36_Rivarennes_2.jpg","../image/image_36/36_Rivarennes_3.jpg","../image/image_36/36_Rivarennes_4.jpg","../image/image_36/36_Rivarennes_5.jpg","../image/image_36/36_Rivarennes_6.jpg","../image/image_36/36_Rivarennes_7.jpg"]},"Consult_chateau_formulaire70b1":{"id":"Consult_chateau_formulaire70b1","dept":"36","canton":"Saint-Gaultier","commune":"Rivarennes","nom":"Rivarennes_Tour","type":"Forteresse","periode":"XIII","histoire":"TOUR-RIVARENNES, c'était jadis un fief dépendant de la châtellenie de Cors dont les premiers propriétaires furent les membres de la famille Couraud au XIIIe siècle. demeure de la duchesse Anne de Clermont-Tonnerre , au majestueux château de la Tour. Edifié au XIVe siècle, cette demeure chaleureuse se trouve dans un cadre exceptionnel au bord de la Creuse. Le château fort de Rivarennes a été édifié au XIV°siècle. Il appartenait jusqu'au XVe siècle aux seigneurs de l'Ile Bouchard. Puis il changea ensuite de nombreux propriétaires dont les familles de Sainte-Maure et les Baraton. Les deux plus importantes étaient celles de la Tour et de Barneuve. De nombreux procés opposèrent les propriétaires de ces seigneuries, jaloux de leurs droits.  Incendié par les Anglais pendant la guerre de cent-ans, le château est racheté en 1561 par Pierre de Boislinard, dont les descendants forment la branche des Boislinard de La Tour de Rivarennes. Entre 1894 et 1909, l'architecte A. Trolliet effectue d'importantes restaurations pour la famille de La Rochefoucault. Au XVIIIe siècle, la seigneurie de Barneuve fut acquise par le seigneur de la Tour, Savary de Lancosme.","architecture":"TOUR -Rivarennes, la partie la plus remarquable du château est la grosse tour carrée qui domine le bâtiment. Malgré les restaurations qui ont remplacé les tourelles par des échauguettes aux quatre angles, elle présente plusieurs éléments architecturaux d'origine: contreforts, meurtrières et ouvertures. Cette tour aurait eu pour objet de surveiller un pont et d'en exiger le péage. Au XVIIe et XIXe siècles, un corps en L, flanqué d'une tour au niveau de l'angle est venu s'accoler à la grosse tour. L'ordonnance régulière des façades s'oppose à celle de la tour carrée, plus ancienne. La tour d'angle, à toit conique, présente un grand nombre de fenêtres.  Le château de Pleinpinard est en ruines aujourd'hui. Il ne reste encore debout qu'un haut mur agrémenté de mâchicoulis. A l'époque, il avait une position stratégique car il  surveiller les vallées de l'Indre et de la Loire.                                                                                            FOLTERTRE,  le château se compose de deux bâtiments rectangulaires à trois niveaux et formant équerre, communiquant entre eux par deux tours situées à la jonction de chacun d'eux.  Dessiné par l'architecte Dauvergne,  L'aile gauche, dite de Saint-Gaultier, fut reconstruite par le marquis René de Rochambeau de 1930 à 1933, qui choisit un parti architectural sobre afin de respecter l'unité du château. Cette aile est flanqué de deux tours. Chacune des quatre tours est percée de meurtrières et présente des créneaux à la base de sa toiture. Les communs ont été édifiés vers 1897 sur les plans de l'architecte Trolliet.","habitants":"famille Couraud                la duchesse Anne de Clermont-Tonnerre\r\n        \"","divers":"Rivarennes;  46° 38' 11? nord, 1° 23' 11? est","gps":"","images":["../image/image_36/36_Rivarennes_tour_1.jpg","../image/image_36/36_Rivarennes_tour_2.jpg","../image/image_36/36_Rivarennes_tour_3.jpg","../image/image_36/36_Rivarennes_tour_4.jpg","../image/image_36/36_Rivarennes_tour_5.jpg"]},"Consult_chateau_formulaireb13d":{"id":"Consult_chateau_formulaireb13d","dept":"36","canton":"Le Blanc","commune":"Sauzelles","nom":"Rochefort_Indre","type":"Château","periode":"XIV","histoire":"ROCHEFORT, apparaît au début du XIVe siècle entre les mains de Guy II de la Trémoille, il relève de Montmorillon mais, dès 1341, Guillaume en rend hommage au seigneur du Blanc. Après Guillaume II, le château échoit en 1364 à son beau frère, Pierre d'Aloigny, seigneur de la Millandière. Ses descendants possèdent Rochefort jusqu'en 1714. Au XVIIe siècle, les d'Aloigny deviennent puissants avec Louis qui, proche de Louis II de Bourbon, obtient nombre de titres et faveurs comme l'érection de Rochefort en marquisat du Blanc. À partir de là l'histoire de Rochefort se calque sur celle du Blanc. Élevé par les La Trémoille, le château-fort était en ruine à la fin du XVIIIe siècle.","architecture":"ROCHEFORT, de nos jours, il ne subsiste que quelques pans de murs d'un logis ayant compté deux étages et une tour de flanquement. En revanche au-delà des fossés qui le bordaient sur trois côtés, la basse-cour est toujours encombrée de constructions, dont des bâtiments de ferme du XIXe siècle. Il y demeure surtout un pavillon flanqué d'une tourelle datant du XVIIe siècle","habitants":"Famille d'Olligny\r\n        \r\n        \r\n        \"","divers":"Château de Rochefort","gps":"","images":["../image/image_36/36_Rochefort_Indre_1.jpg","../image/image_36/36_Rochefort_Indre_2.jpg","../image/image_36/36_Rochefort_Indre_3.jpg"]},"Consult_chateau_formulairef055":{"id":"Consult_chateau_formulairef055","dept":"36","canton":"Le Blanc","commune":"Ciron","nom":"Romefort_Ciron","type":"Forteresse","periode":"XII-XV","histoire":"ROMEFORT, il apparaît en 1182 avec Gaudin de Romefort, de 1309 à 1452, il est possession des Culant. Georges de Sully en fait l'acquisition en 1452 mais l'indivision entre ses enfants est le prélude à son abandon, alors acheté le 10 avril 1548 par Pierre de Segondat, général des finances de Guyenne. Une querelle éclate avec la famille de Sully qui avait fermé la moitié de la propriété. C'est son gendre, Jean d'Harambure dit « le borgne », qui obtient raison le 18 novembre 1597. En effet celui-ci épouse sa fille Marie de Segondat et devient seigneur de Romefort pour la totalité du domaine. Son fils Jean d'Harambure, à la tête d'une fortune considérable grâce à son épouse Marie Tallemant (cousine de Gédéon Tallemant des Réaux). Il est tué en Italie au combat de la Route en 1640 et c'est son frère Henri d'Harambure qui lui succède dans ses fiefs. Ceux-ci sont partagés entre ses six enfants. La révocation de l'Édit de Nantes et ses conséquences amènent les descendants du fameux « Borgne », restés protestants, à se réfugier à Preuilly-sur-Claise et à abandonner Romefort. Il s'ensuit une série de procès qui ne se terminent qu'après un dédommagement de Jean Samuel, marquis d'Harambure et gouverneur de Poitiers. Romefort est ensuite entre les mains des marquis de Belabre jusqu'à la Révolution qui marque la disparition de la seigneurie. Le château est ensuite acquis par la famille de Bondy et se trouve maintenant dans sa descendance. En 1872 au comte Lionel de Blondy fit appel à l'architecte Harveuf pour redonner vie au donjon.","architecture":"ROMEFORT, le donjon est un colosse de 12 mètres de côté et 30 mètres de hauteur  avec quatre tours rondes crénelées qui flanquent sont aussi hautes que le donjon avec un diamètre de 6 mètres, l'édifice construit entre 1180 et 1190 et restauration de ce dernier reconstruction de l'enceinte primitive entre 1872 et 1877 dans le « style troubadour » sous la direction d'Alexandre Arveuf-Fransquin, élève de Questel. Le corps de logis situé entre une tour ronde du XVe siècle et une tour carrée du XVIIe siècle est remanié en 1921.  Le corps de logis situé entre une tour ronde du XVe siècle et une tour carrée du XVIIe siècle ; le logis a été remanié en 1921.  Défenses du donjon ; courtines ouest et nord-ouest reliant le donjon au corps de logis, ainsi que leurs tours de flanquement ; façades et toitures du corps de logis ; façades et toiture de la tour semi-circulaire nord-ouest ; façades et toiture de la tour carrée nord-est ; vestiges de l'enceinte sud du château, à savoir : façades et toitures des deux tours de l'ancienne entrée, façades et toitures des corps de bâtiments jouxtant ces tours, vestiges de la courtine sud-ouest flanquée d'une tour semi-circulaire: inscription par arrêté du 18 février 1993 ; Donjon du château et moulin avec son mécanisme : classement par arrêté du 2 septembre 1994.","habitants":"Famille de Georges de Sully\r\n        \r\n        \"","divers":"Château de Romefort à Ciron","gps":"","images":["../image/image_36/36_Romefort_Ciron_1.jpg","../image/image_36/36_Romefort_Ciron_2.jpg","../image/image_36/36_Romefort_Ciron_3.jpg","../image/image_36/36_Romefort_Ciron_4.jpg","../image/image_36/36_Romefort_Ciron_5.jpg","../image/image_36/36_Romefort_Ciron_6.jpg","../image/image_36/36_Romefort_Ciron_7.jpg","../image/image_36/36_Romefort_Ciron_8.jpg"]},"Consult_chateau_formulairea0c5":{"id":"Consult_chateau_formulairea0c5","dept":"36","canton":"Le Blanc","commune":"Ruffec","nom":"Ruffec_indre","type":"Château","periode":"XV-","histoire":"Trois châteaux à Ruffec celui d' Epineau, de Lafont, de Pellorgues et de Rabaud.                                                                                                                               EPINEAU, fief dépendant de la seigneurie de Belâbre, l'Épineau est connu dès le XVe siècle, les familles Auboutet en 1454, de Boisbertrand en 1475, Ducher, et Renoncet en 1641 s'y succèdent. Le dernier seigneur de Belâbre, Jean Jacques Lacoigneux, remanie l'édifice en 1790 en y ajoutant notamment les salons octogonaux. Vendu comme bien national, l'Épineau change plusieurs fois de mains avant d'être acquis en 1857 par Clément Laurier, avocat et futur député du Var et de l'Indre. Républicain convaincu, il attirera artistes et hommes politiques : Courbet en 1856, qui fera le portrait de la jeune épouse de Laurier après avoir fait celui de l'avocat. La fille de Clément Laurier épouse Henry Hornbostel, fils d'un avocat ami de Laurier, la propriété demeurera chez leurs descendants jusqu'à 1981, date de son acquisition par la famille Hemery.                                                                                                                   PEULORGUES, le château du XVe siècle a été profondément remanié au cours du quatrième quart du XIXe siècle par Charles Roques, architecte à Angers, pour le baron Alfred d'Oiron. Le premier projet, dressé en juillet 1878, a été modifié (position de l'escalier,  profil des toitures, volume du corps de bâtiment dans l'angle sud.                                                               RABAUD, une simple maison sans doute construite au XVIIIe siècle et rachetée en 1810 par la famille Rabaud, des campagnes d'aménagements et d'agrandissements en 1839 et 1869, à la fin du siècle et au début du suivant vont donner à la demeure son envergure actuelle et le lieu va prendre le nom de ses propriétaires afin de devenir le \"château Rabaud\".","architecture":"LAFONT, le logis et les communs datent des XVIIe et XVIIIe siècles. On note aussi des remaniements importants au cours de la deuxième moitié du XIXe siècle, notamment la reprise totale du logis et son agrandissement du côté Est au cours du XIXe siècle,  le donjon comporte un sous-sol et deux étages carrés avec un escalier à vis, le logis comporte un sous-sol, un étage carré et un étage de comble, avec un escalier tournant à retours.                                                                                                     PELLORGUES, du château du XVe siècle n'ont été conservés que le donjon et sa tourelle d'escalier à l'exclusion des parties hautes qui ont été refaites, l'orangerie est située sous la terrasse du château. Une partie de l'étage de soubassement est voûtée, une partie du XVe siècle a un escalier demi hors oeuvre, la partie XIXe un escalier dans oeuvre, la description des types de couvertures concerne le seul château ; le bâtiment a une couverture en tuiles ainsi que la plupart des bâtiments d'exploitation; ceux-ci ont des toits à longs pans.                                                                                                   RABAUD,  l'ensemble est constitué par d'importantes parties résidentielles et de nombreuses dépendances à usage agricole. Il subsiste de la demeure primitive un ancien logis transformé en bâtiment agricole et le corps de logis principal. Celui-ci est imbriqué dans un ensemble de bâtiments qui présentent pour la plupart un étage sous un niveau de combles. Les toits sont divers par leurs formes coniques, en appentis massé ou à longs pans, à croupes, avec ou sans brisis. Il en est de même pour les lucarnes: on y trouve un il-de-buf, lucarne à fronton triangulaire ou sommée d'une corniche. Au niveau décoratif, l'édifice comporte une tourelle en encorbellement ou un pilastre cornier toscan.","habitants":"Epineau; Famille de Belâbre                                     Pellelorgues;Charles Roques\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Ruffec celui d' Epineau grav 3  de Geigueil grav -4 de  londigny grav 5 Lafont de Pellorgues grav-6-7 et de Rabau et  de Ruffec Grav -1-2;  46° 37' 48\" nord, 1° 10' 20\" est","gps":"","images":["../image/image_36/36_Ruffec_Indre_1.jpg","../image/image_36/36_Ruffec_Indre_2.jpg","../image/image_36/36_Ruffec_Indre_3.jpg","../image/image_36/36_Ruffec_Indre_4.jpg","../image/image_36/36_Ruffec_Indre_5.jpg","../image/image_36/36_Ruffec_Indre_6.jpg","../image/image_36/36_Ruffec_Indre_7.jpg"]},"Consult_chateau_formulaire1eb5":{"id":"Consult_chateau_formulaire1eb5","dept":"36","canton":"Forteresse","commune":"Sarzay","nom":"Sarzay","type":"Forteresse","periode":"XIV","histoire":"SARZAY, la seigneurie de Sarzay appartenait à la famille de Barbançois depuis le milieu du XIVe siècle. C'est une famille de chevaliers dont les fils s'illustrèrent dans les batailles de la guerre de cent ans. Cette famille construisit le château et en resta propriétaire jusqu'en 1720 ; cette seigneurie fut érigée en marquisat en 1651. Au départ, il s'agit d'un motte castrale entourée d'un fossé et défendue par une enceinte dont il ne reste plus qu'une tour-chapelle. En 1360, le seigneur de Sarzay, Guillaume de Barbançois, bouta les Anglais hors de la ville de La Châtre, avant de piller la ville pour son propre compte. Sarzay était à la limite du royaume de France, face aux Poitou, Limousin et Aquitaine, possessions anglaises, des guerres de religion, de la Fronde, de la Révolution. En 1538, dans un duel judiciaire, Hélion de Barbançois, âgé de 70 ans, tua François de Saint-Julien, sous l'il étonné de François Ier.","architecture":"SARZAY, actuel a été construit aux XVe siècle et au XVIe siècle, corps de logis flanqué de quatre tours, dont une desservant les étages. Les tours sont couronnées de mâchicoulis.\r\nLes vestiges de la première enceinte sont percés d'un porche agrémenté d'armoiries du XVe siècle, 38 tours auraient jalonné cette enceinte mais cela semble un chiffre exagérée. La basse-cour comporte divers bâtiments du XVe siècle et un logement du XIXe siècle. Le  donjon-logis  se compose d'un corps rectangulaire, cantonné aux angles de quatre tours rondes. Sa porte, refaite au XVIIe siècle est située au pied d'une des tours. Le donjon-logis comporte quatre étages et la salle des gardes est au quatrième étage. De nombreuses salles meublées ont conservé leur authenticité. Le sommet des tours, où se situe une superbe charpente, permet de découvrir la beauté du paysage. Des douves profondes restaurées, la chapelle et la halle complètent la beauté du site.Une tour de l'enceinte comporte au rez-de-chaussée la chapelle fortifiée.\r\nLe château dans son ensemble fait lobjet dun classement au titre des M.H. depuis le 29 janvier 1912.","habitants":"Famille de Barbançois \r\n        \r\n        \r\n        \"","divers":"Forteresse de Sarzay; 46° 36' 02\" nord, 1° 54' 23\" est.","gps":"","images":["../image/image_36/36_Sarzay_1.jpg","../image/image_36/36_Sarzay_2.jpg"]},"Consult_chateau_formulaire3b20-2":{"id":"Consult_chateau_formulaire3b20-2","dept":"36","canton":"Mézières en Brenne","commune":"Saulnay","nom":"Saulnay","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux  à Saulnay la cigogne, le Notz-Marafin et la Marchandière. CIGOGNE, en limite de la Brenne, dans le paysage bocager de la vallée de l'Ozance s'élève le petit château probablement nommé ainsi à cause d'un puits à bascule, appelé cigogne, Lemanoir d'origine a disparu. L'actuelle demeure, construite au milieu du XIXe siècle par la famille Cassin de Saurches, est un bâtiment d'aspect classique en tuffeau de Touraine, élevé d'un étage avec combles, composé d'une partie centrale à quatre travées et flanquée de deux pavillons, comportant une ouverture par étage. Les héritiers des Cassin de Saurches, les familles Liebert de Nitray et Gille de Fontenailles conservèrent Cigogne jusque dansles années 1970.                                                                                                       NOTZ-MARAFIN   Louis de Marafin, conseiller et chambellan du roi, entreprit vers 1467 la construction du château de Notz qui succédait à un bâtiment antérieur. Par alliance, la terre passa aux familles Conningham puis de Barville. Lors de la vente du château en 1750, le marquis de Vassé, seigneur de Mézières, exerça le retrait lignager et réunit la terre de Notz à celle de Mézières. L'édifice échut à Victor Luzarche qui fit reconstruire le château en 1834. François Cavé, son successeur, fut un des fondateurs de l'industrie mécanique moderne.","architecture":"MARCHANDIERE, le château de La Marchandière n'était guère en droit d'afficher, au moins par son architecture, des prétentions seigneuriales ou féodales. L'ancienne demeure de la famille de Sorbiers est modeste, mais ne manque pas d'allure avec son haut toit de tuiles dont la partie droite se détache en forme de pavillon. Le bâtiment date du XVIe siècle et l'inspiration Renaissance se retrouve dans les curieuses fenêtres géminées ainsi que sur des ouvertures intérieures. Au-dessus de la porte principale, sommée d'un linteau, on peut voir un reste d'armoiries, bûchées à la Révolution, sans doute après que M. de Sorbiers se fut signalé par ses actes contre-révolutionnaires. Il fut condamné à mort le14 avril 1796 et fusillé à Buzançais avec d'autres participants à la Vendée de Palluau. Dans la cour, un colombier carré, assez dégradé, rappelle le statut seigneurial de La Marchandière.                                                                                                                               NOTZ-MARAFIN, le château actuel, construit sur les bases de l'ancienne construction dont les douves et les fondations sont encore visibles, possède trois niveaux rehaussés de combles. Les quatre tours, avec toits à l'impériale, sont coiffés de lanternons, l'alternance, dans la façade, de fenêtres à linteaux droits, cintré, à gâble gothique forment une alliance qui parvient à donner une certaine majesté à l'ensemble.","habitants":"Cigogne; famille Cassin de Saurches                              Notz-Marafin; Louis de Marafin\r\n        \r\n        \"","divers":"à Saulnay la Cigogne  grav 1-2, le Notz-Marafin grav 4-5  et la Marchandière grav_3","gps":"","images":["../image/image_36/36_Saulnay_1.jpg","../image/image_36/36_Saulnay_2.jpg","../image/image_36/36_Saulnay_3.jpg","../image/image_36/36_Saulnay_4.jpg","../image/image_36/36_Saulnay_5.jpg","../image/image_36/36_Saulnay_6.jpg"]},"Consult_chateau_formulaireb878":{"id":"Consult_chateau_formulaireb878","dept":"36","canton":"Sainte-Sévère en Indre","commune":"Sazeray","nom":"Sazeray","type":"Château","periode":"XV-","histoire":"A Sazeray, le château de Lavaubonneuil du XVe siècle, du Mont  du XVe siècle ( voir article)et Vestiges du château de Lavaupilière du XVe siècle.                                               LAVAUBONNEUIL,  Antoine de Jarrye, bailli d'Aunis et seigneur du lieu entre 1474 et 1521 fut sans doute le constructeur de l'actuel château, il dut remplacer un édifice précédent puisqu'en 1470, son père, Bernard de Jarrye, obtenait de Jean II de Brosse, dans un acte ratifié par le Roi Charles VIII, tous les droits de justice pour sa terre de La Vallée, et un siècle auparavant, son arrière-grand-père, Louis de Bonneuil, rendait déjà hommage du fief au seigneur de Sainte-Sévère.\r\nLAVAUPILIERE, mentionnée pour la première fois en 1479, la seigneurie de Lavaupilière appartenait à Blaise Sémin, écuyer, seigneur du Sou, en 1537 et 1571. Gaspard Thibaudin, capitaine de Sainte-Sévère, y résidait en 1627. À la mort de son fils, vers 1640, le fief fut divisé ; le logis, de taille modeste, fut partagé en trois parties. Vers 1641, les co-seigneurs en étaient Gaspard de Vérines, Sylvain de Bridiers et Jacques de Brandon. Leurs héritiers leur succédèrent, dont Hugues de Bridiers en 1681 et Jacques de Vérines, qui réussit à réunir le fief avant qu'il ne soit saisi sur lui en 1697. Adjugée à Léon Tixier, seigneur du Cluzeau de Sainte-Sévère, le château de Lavaupilière échut à sa petite-fille, Françoise-Madeleine de Villaines lorsqu'elle épousa, en 1764, Claude de Montsaulnin, baron de Fontenay.","architecture":"LAVAUPILIERE, de la maison-forte du XVe siècle, il subsiste un long corps de logis d'un étage, couvert d'une toiture à deux pans de tuiles, et présentant quelques ouvertures d'origine, dont une bouche à feu. Il subsiste toujours la grosse tour circulaire, couverte en poivrière, à l'angle ouest du logis                                                                                                  LAVAUBONNEUIL, le château se présente en trois corps de bâtiment disposés en U autour d'une cour carrée, close sur le quatrième côté par un mur d'enceinte, entièrement pavée et renferme un puits au nord ouest, Coiffé de hauts combles et installé au-dessus d'une longue cave voûtée, le corps de logis situé au nord-est se compose de deux niveaux. Sur chaque façade vient se positionner une tour, d'un côté défensif et de l'autre utilitaire. Des ailes en retour qui constituaient les communs restent celle du nord-ouest et l'autre démolie, mais la tour qui en marquait l'angle sud et flanquait le mur d'entrée a été conservée.","habitants":"Lavaubonneuil; famille de Bernard de Jarrye          Lavaupilière; Famille de Blaise Sémin \r\n        \r\n        \"","divers":"Châteauà Sazeray;46° 25' 44\" nord, 2° 03' 13\" est","gps":"","images":["../image/image_36/36_Sazeray_1.jpg","../image/image_36/36_Sazeray_2.jpg","../image/image_36/36_Sazeray_3.jpg","../image/image_36/36_Sazeray_4.jpg"]},"Consult_chateau_formulairebd28":{"id":"Consult_chateau_formulairebd28","dept":"36","canton":"La Châtre","commune":"Saint-Août","nom":"St_Aout","type":"Château","periode":"XV","histoire":"A St-Août deux châteaux, celui de St-Août et celui de la Vilette pas d'information pour ce dernier.                                                                                                                                 St-AOUT, Tour du XVe siècle avec hourds et bardeaux. La plus grande partie des bâtiments date du XVIIe siècle. Château fortifié, résidence des seigneurs de Saint-Août. Ancienne possession des princes de Déols, dont le dernier, Raoul VII, accorda aux habitants une charte de franchise, confirmée en 1212 par son petit-fils Guillaume 1er de Chauvigny. Transfert du corps de Saint-Août en présence d' Agathe de Lusignan, en 1269. Visite de Jeanne de France, duchesse du Berry, en 1478. Seigneurs : les Chauvigny, les de Sully, aux XIVe et XVe siècles. Vers 1505, les de La Trémoille. Ils le vendent le 7 septembre 1571 à Jérôme Gendrot, qui le vend à Pierre de Chamborand. Puis les Bouffet, les Fradet, les de Plessis-Chatillon. Ces derniers vendent en 1757 à Jean Paris de Montmartel, secrétaire du roi, trésorier général des Ponts et Chaussées, garde du Trésor Royal, marquis de Brunoy. Ses enfants vendent à Pierre-Michel, vicomte de Brosse, maréchal de camp, comte de Châteaumeillant et de Saint-Août. Celui-ci vend à François-René-Luc Cousin de Martigne. Par descendance à : Marie-Eugènie Gabrielle Cousin de Martigne, épouse de Louis Joseph Edouard Aujay de La Dure.","architecture":"Saint-AOUT, très important château fortifié au XVe siècle dont il subsiste une tour avec hourds et clocheton qui commandait la poterne principale, trois tours rondes raccourcies et modifiées au XVIIe siècle. Du XVIIe siècle, deux grands bâtiments sans étage, couverts de tuiles, à lucarnes, se faisant vis-à-vis de chaque côté d' une grande cour carrée. Trois portails très semblables du XVIIe siècle, avec porte piéton. Dans la première cour, communs et écuries, à toiture de tuiles, remaniés au XIXe siècle. La tour de la poterne du XVe siècle, une des plus belles tours de cette époque avec sa toiture bien conservée surmontée d' un petit clocheton hexagonal et d' une coupole en forme de chapeau. Hourds en bois couverts de bardeaux. L' intérieur a été remanié en partie au XIXe siècle, mais non défiguré. Bâtiment nord-ouest : toiture sans lucarne, perron sur le parc au centre. Encadré par les deux tours. La grosse tour a pu être le donjon du XVe siècle avant sa réfection. Côté sud, façade avec quatre fenêtres et une porte, pieds-droits et linteaux en brique et pierre. La belle porte est encadrée de belles pierres de taille bien appareillées avec imposte. Quatre marches. Au-dessus, une lucarne ronde en pierre. Adjonction à l' ouest d' un pavillon sans style du XIXe siècle, près de la grosse tour. Bâtiment lui faisant face au sud-est. Très semblable comme proportions mais avec un caractère XVIIe siècle plus accusé. Les portes, fenêtres, les trois lucarnes sont en brique et pierre. Le toit en tuiles. A chaque extrémité une tour ronde à toit de tuiles.","habitants":"Famille de La Trémoille\r\n        \r\n        \"","divers":"Château de st -Aout  grav 1-   et de la vilette grav 2-3-4 , 46° 43' 56\" nord, 1° 57' 59\" est","gps":"","images":["../image/image_36/36_St_Aout_1.jpg","../image/image_36/36_St_Aout_2.jpg","../image/image_36/36_St_Aout_3.jpg","../image/image_36/36_St_Aout_4.jpg"]},"Consult_chateau_formulaire3685":{"id":"Consult_chateau_formulaire3685","dept":"36","canton":"St-Gaultier","commune":"St_Benoit-du-sault","nom":"St_Benoit_Sault","type":"Château","periode":"XV-XVI","histoire":"St-BENOIT du SAULT dit de VILLEBUXIERE , l'histoire du village est aussi liée aux vicomtes de Brosse, d'où l'aspect toujours médiéval perché sur une butte rocheuse (site inscrit), les maisons XVe siècle et XVIe siècle et autres ruelles et places pittoresques. Les armoiries actuelles du village (trois brosses d'or liées de gueule sur fond d'azur) sont celles de la famille de Brosse.   La terre de Villebuxière relevait autrefois de la châtellenie d'Argenton. Le plus ancien seigneur connu est Dauphin de La Cour qui en 1317 rend foi et hommage au vicomte de Brosse pour ses fiefs. L'ancien manoir a été transformé en château de plaisance.","architecture":"VILLEBUXIERE, de l'époque médiévale subsistent deux cheminées, des corbeaux et des pièces voûtées. Les tours d'angle, symétriques, remontent au XVe siècle, les ailes au XVIIe siècle. Les façades sur cour ont été remaniées à la fin du XVIIIe siècle. Elles sont décorées de quelques mascarons de terre cuite ornés de têtes. Le pont-levis a été remplacé par un pont de pierre. Les balcons, les épis de faitage et la grille en fer forgé marquée SB, pour Scévole Barmont, concourent à donner à la demeure un aspect raffiné. Les communs comportent un porche avec une écurie à mulets, une forge, une écurie à chevaux et une étable. Une chapelle dédiée à saint Pierre en grande partie ruinée est située à quelque distance du bâtiment principal, son linteau porte la date de 1596. Des jardins aménagés en terrasse descendent du château vers l'Abloux.","habitants":"Dauphin de La Cour\r\n        \r\n        \"","divers":"Château à Saint-Benoit du sault grav de 1- 3 et de Villebuxière grav 4-5;   46° 26' 29\" nord, 1° 23' 29\" est","gps":"","images":["../image/image_36/36_St_Benoit_Sault_1.jpg","../image/image_36/36_St_Benoit_Sault_2.jpg","../image/image_36/36_St_Benoit_Sault_3.jpg","../image/image_36/36_St_Benoit_Sault_4.jpg","../image/image_36/36_St_Benoit_Sault_5.jpg"]},"Consult_chateau_formulairea629":{"id":"Consult_chateau_formulairea629","dept":"36","canton":"La Châtre","commune":"Saint-Chartier","nom":"ST_Chartier","type":"Château","periode":"XII-XVI-XIX","histoire":"Deux châteaux  à Saint-Chartier le château des Maîtres Sonneurs  et celui de la Vallée Bleue.                                                                                             MAITRES SONNEURS, cette demeure était au XIIIe siècle la résidence favorite des Chauvigny, seigneurs de Déols, princes du Bas-Berry ; c'est de cette époque que date la galerie dite du \"Jeu de Paume\" qui semble avoir été en fait un promenoir destiné à agrémenter les jardins du château. Les remparts et communs furent eux aussi remaniés au XVe siècle par Marguerite de Chauvigny, veuve de Jean II de Bretagne, et conservent d'importants témoignages des aménagements de cette époque (lucarnes, fenêtres à meneaux, cheminées et charpente en vaisseau). Au sud du château, une galerie, peut-être un ancien cloître est transformée en habitation, remises, poulailler. Le château inspira à George Sand son roman \"Les Maîtres sonneurs\".                                                  VALLEE-BLEU, en janvier 1896, Madame Pestel, veuve d'un médecin de George Sand, engagea l'architecte Henri Dauvergne afin de réaliser de grands changements dans sa demeure bâtie en 1870. La construction primitive comprenait un corps de logis flanqué d'une pièce de plain pied à toiture en terrasse. Les remaniements ont procuré plus de mouvement à la façade, avant la création de deux avant-corps, d'une aile latérale et d'une tour. Georges Auclerc donna alors au château le nom de \"La Clef\". La dénomination de \"vallée bleue\" s'inspire du roman de George Sand, \"Le meunier d'Angibault\", ou la romancière conduit l'une de ses héroïnes, Mme de Blanchemont, sur un panorama de la Vallée Noire; \"du haut des chaumières de Corlay, offrant la variété infinie des formes et des nuances, dans une harmonie générale de verdure sombre tirant sur le bleu\". hôtel restaurant.","architecture":"Maitres SONNEURS les remparts du château de Saint-Chartier, comme tous les gros murs existants, y compris le donjon, furent bâtis au XIIe siècle, la colonnade du jeu de paume est située dans un mur qui ferme sur sa face Est, un bâtiment situé à une centaine de mètres du donjon. Elle se compose d'une suite en ligne de 19 colonnes ; 17 ont conservé leur chapiteau. La base des colonnes, de plan carré, repose sur un entablement qui les place à environ un mètre du sol. Disposition originale, en haut du fut et de chaque côté sont ménagés deux appuis en saillie sculptés ou prennent appui des arcs en bois, la moitié environ de ces arcs subsiste. Les chapiteaux sont décorés de feuilles et de fleurs, un seul animal y figure, l'abeille, une seule représentation humaine, une tête de Bacchus barbu qui orne discrètement l'angle d'un chapiteau. Les remparts ferment actuellement les limites d'une partie du parc actuel. Face au bourg court le rempart est-ouest, le grand bâtiment des communs s'y appuie tout du long avec à chaque extrémité une tour d'angle. Le rempart nord-sud gagne une troisième tour d'enceinte. Les pieds de toutes ces parties étaient autrefois garnis de douves pleines d'eau. Le bâtiment adossé au rempart du XIIe siècle est déjà protégé au titre de l'Inventaire supplémentaire des M.H. dans sa partie ouest (vieille tour et courtine attenante, avec fenêtre du XVIe siècle). La partie qui rejoint la tour sud comporte des fenêtres et des lucarnes du XVe siècle. On y voit la trace d'autres lucarnes ruinées dont il subsiste les soubassements richement décorés et la trace du surplomb de l'ancienne courtine.","habitants":"Maitres Sonneurs; famille de Chauvigny                                          Vallée Bleu; famille Pestel\r\n        \r\n        \"","divers":"Grav 1 à  5  Maître-sonneurs; Vallée Bleue grav 6.                 46° 38' 50\" Nord et 1° 58' 36\" Est.  St-Chartier;  46° 38' 50\" Nord et 1° 58' 36\" Est","gps":"","images":["../image/image_36/36_St_Chartier_1.jpg","../image/image_36/36_St_Chartier_2.jpg","../image/image_36/36_St_Chartier_3.jpg","../image/image_36/36_St_Chartier_4.jpg","../image/image_36/36_St_Chartier_5.jpg","../image/image_36/36_St_Chartier_6.jpg"]},"Consult_chateau_formulaired221":{"id":"Consult_chateau_formulaired221","dept":"36","canton":"Châtillon-sur-Indre","commune":"Saint-Cyran du Jambot","nom":"St_Cyran_Jambot","type":"Château","periode":"XIX","histoire":"Trois châteaux à saint-Cyran-Jimbot celui de Chaudenay de Migny et de St-Cyran.                                                                                                                      CHAUDENAY, possédé depuis des siècles par l'une des plus anciennes familles nobles du canton, a été entièrement reconstruit à la fin du XIXe siècle et modifié vers 1910. On peut y voir un équipage de chasse avec cent chiens et une douzaine de chevaux, l'équipage est utilisé deux fois par semaine de septembre à mars pour la chasse à courre. Le propriétaire, M. Stanislas de Chaudenay, est  maire de la commune de Saint-Cyran-du-Jimbot.                                                                                       MIGNY, fut du XIIIe siècle au XVIe siècle le fief d'une famille du même nom et passa par mariage aux d'Augustin. Le dernier de la famille, Augustin de Migny fut tué 1672  par son voisin et neveu, Henri Le Vaillant de Chaudenay; sa fille épousa Étienne Gaultier dont la famille posséda Migny jusqu'au XIXe siècle.                                                                                                                          ST-CYRAN,  Etienne Franquelin et son épouse Sylvie Godesolle sont arrivés vers 1640 au château de Saint Cyran en qualité de fermier général. La propriété venait alors dêtre rachetée par Hélie Dalige, lieutenant général de lartillerie de France. En 1650, Louis XIV ordonne lérection de la terre de Saint-Cyran en Châtellenie. A la mort d'Etienne en 1646, son fils Guillaume et son épouse Catherine Vitas vont lui succéder à ce poste de régisseur. En 1650. ils auront un fils Jean-Louis, qui partit pour la Nouvelle-France, dessina de nombreuses cartes de cette lointaine terre, pour la plupart conservées au service historique de la Marine au château de Vincennes.","architecture":"CHAUDENAY,  corps de logis rectangulaire à deux niveaux toits en croupes  flanqué côté parc de deux tours carrées à trois niveaux  et de tours rondes  côté entrée.                                                                                                       MIGNY, une photo du début du XXe siècle nous montre le château de Migny avec son logis seigneurial surplombant la vallée de l'Indre, le château est orné au centre du bâtiment d'une tourelle à poivrière et mâchicoulis et percé de nombreuses ouvertures dont certaines à meneaux. La tourelle subsiste ainsi que les murs de soutènement transformés en terrasse, le logis a été détruit. Une grosse tour carrée, située à l'est de l'ancien logis, contient à sa base une chapelle.                                                                              ST-CYRAN,  a subi de nombreuses transformations aussi bien au XIXe siècle qu'au XXe siècle. Cependant on distingue un corps de logis du XVIe siècle érigé sur un bâtiment plus ancien partiellement conservé. Aujourd'hui le bâtiment, son parc et ses dépendances se sont adaptés aux besoins d'un lycée agricole et d'un centre équestre. Le parc du lycée agricole, ancienne demeure du botaniste Emmanuel Drake del Castillo, abrite plusieurs arbres remarquables. Ce parc peut se visiter lors des journées portes ouvertes du lycée.","habitants":"Chaudenay; M. Stanislas de Chaudenay                       Migny; famille, Augustin de Migny                                           ST-Cyran; Etienne Franquelin\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à saint-Cyran-Jimbot grav 1-2 celui de Chaudenay  grav 3 -4 de Migny grav -5.","gps":"","images":["../image/image_36/36_St_Cyran_Jimbot_1.jpg","../image/image_36/36_St_Cyran_Jimbot_2.jpg","../image/image_36/36_St_Cyran_Jimbot_3.jpg","../image/image_36/36_St_Cyran_Jimbot_4.jpg","../image/image_36/36_St_Cyran_Jimbot_5.jpg"]},"Consult_chateau_formulaireb537":{"id":"Consult_chateau_formulaireb537","dept":"36","canton":"Aigurande","commune":"St-Denis du Jouhet","nom":"St_Denis_Jouhet","type":"Château","periode":"XV-XVII","histoire":"A Saint Denis du Jouhet le château de Seguières : sa tour domine la vallée du Gourdon,  de Fourson : maison forte du XVe siècle. de Lusignan : c'est une belle maison de maître au bord d'un bois.et au nord à cinq K.M. à Fougerolles le château de Rochefolle et à quelques kilomètres au sud le château de  de la Lande à Crozon sur Veauvre\r\nROCHEFOLLE, en 1420, le château est aux mains de Jean de Borniers. De 1574 à 1630, il est aux seigneurs de Rochefolle et de Villemont. Il est acheté en 1729 par louis-Charles de la Porte de Montval, seigneur du Magnet, grand maître des eaux et forêts du Berry.\r\nSEGUIERES, les premiers  propriétaires sont identifiés seulement à partir du XVIIe siècle. En 1629,la seigneurie est saisie, le château est à Pierre d'Oiron, sieur de Brosse. En 1633, il est possédé par  Sylvain d'Oiron, puis il appartient aux Pouradier Outeil d'une vieille famille bourgeoise de La Châtre.                                                                                                                        La LANDE,  à Crozon sur Veauvre,  une famille chevaleresque de La Lande est attestée au XVe siècle, en 1672, la propriétaire est Charlotte du Mont. En 1680, grâce à Balthazar du Mont, seigneur de la Lande. le domaine fut réuni aux deux fiefs de Fonteny et du Moudurier. Au XVIIIe siècle, le château passa à la famille des Billiers, et à la fin du XVIIIe siècle ou au début du XIXe siècle, à la famille du Pouget de Nadaillac.","architecture":"ROCHEROLLES, A l'origine, il se présentait selon un plan quadrangulaire. Une seule tour circulaire complétait le dispositif. Celle-ci existe toujours, positionnée sur un angle saillant. Les quelques ouvertures sont dues à des réaménagements tardifs. Cette tour est couverte d'un court cône de tuiles plates au sommet duquel prend place une girouette. Les corps de bâtiments, disposés en L, présentent peu de percements vers l'extérieur, ils ne semblent pas être d'origine. L'ancien corps de logis plus élevé que la construction en retour.                                                                                          SEGUIERES;  la tour d'escalier coiffée d'un toit conique et placée sur un angle de l'édifice suppose une construction du XIVe siècle. Hormis les ouvertures quadrangulaires éclairant  la tour  qui est percée à sa base d'une porte couverte d'un arc en plein cintre. Une seconde porte située dans la tour est sommée d'un arc en accolade, sous ce dernier vient s'inscrire un blason sculpté aux armes des Chauvigny. Le logis attenant, apparaît avoir été fortement remanié au XVIIe siècle et ne présente pas une grande particularité architecturale.                                                                            La LANDE, du château médiéval fortifié,  Mais c'est au siècle suivant que, sur des fondations anciennes est édifié l'actuel château,  est constitué de deux corps de bâtiment, disposés en L, avec cour intérieure. Un bâtiment rectangulaire, encadré de deux gros pavillons carrés, couronnés de hourds sur mâchicoulis, présente sur son second étage trois lucarnes orientées au nord. Deux autres bâtiments de plan rectangulaire, disposés bout à bout, comportent à l'ouest, respectivement, quatre à six lucarnes. Une aile fermant la cour sur un troisième côté a été ajoutée au XIXe siècle.","habitants":"Rocherolle; Louis-Charles de la Porte de Montval                                Seguières; famille de Pouradier Outeil\r\n        \r\n        \"","divers":"St-Denis de Jouet; grav 1. 46° 31' 53\" nord, 1° 52' 09\" est                      Rocherolles grav 2 .                                                                              La Lande grav 3 à 7.","gps":"","images":["../image/image_36/36_St_Denis_Jouhet_1.jpg","../image/image_36/36_St_Denis_Jouhet_2.jpg","../image/image_36/36_St_Denis_Jouhet_3.jpg","../image/image_36/36_St_Denis_Jouhet_4.jpg","../image/image_36/36_St_Denis_Jouhet_5.jpg","../image/image_36/36_St_Denis_Jouhet_6.jpg","../image/image_36/36_St_Denis_Jouhet_7.jpg"]},"Consult_chateau_formulairec25a":{"id":"Consult_chateau_formulairec25a","dept":"36","canton":"Saint-Gaultier","commune":"Saint-Gaultier","nom":"St_Gaultier_Thenay","type":"Château","periode":"XIX","histoire":"Deux châteaux à st-Gaultier celui de st-Gaultier et celui de la Flante  pas d'information pour ce dernier,  et en face de l'autre côté de la Creuse Thenay.                                                                                                                                    SAINT-GAULTIER,  il semble bien qu'il n'y ait eu qu'un seul et même château, en tout cas un seul site castral à Saint Gaultier, son nom ayant changé selon ses possesseurs successifs. D'abord les seigneurs de Lignac, relevant en fief d'Argenton, puis il est à Charles de La Trémoille, seigneur de La Barre, lorsque Henri IV y séjourne en 1597. En 1626, Antoine et Blaise Peyrot le vendent à Henri de Bourbon. Le château, devenu de Condé, est mis en adjudication en 1740, il sera dépecé et démoli.                                                                                                                                        Deux châteaux à Thenay celui de Conives  et celui des Landes.                                                                                      CONIVES, cette propriété a appartenu aux familles Couraud et de Leffe, puis à celle de Boisbertrand et du Ligondès dont les descendants le possèdent toujours. Le château s'élève au milieu de prairies et d'un joli parc.                                                                                                                                      De LANDES, le château de Landes est une construction de 1876 agrandie par l'architecte Trolliet en 1903 pour la  famille Couraud . Elle présente une juxtaposition de trois corps de bâtiment d'inégale hauteur, provoquant un intéressant jeu de toitures. A l'angle formé par deux des trois corps, un petit pavillon à un seul niveau fait terrasse. L'ensemble est recouvert d'ardoise.","architecture":"SAINT-GAULTIER , ce grand château, bâti en 1888-89 par l'architecte Alfred Trolliet, rassemble d'une façon quelque peu hétéroclite les éléments néo-gothiques et néo-Renaissance appliqués comme un décor à un corps de bâtiment massif. Près des communs, une fausse ruine médiévale ajoute une touche romantique. Près du parc touffu aux arbres magnifiques, une ferme, de la même époque que le château, s'organise autour d'une cour fermée avec, aux angles, des tourelles carrées à toit en pavillon qui ne manquent pas de fantaisie.                                    CONIVES, il se compose d'un corps de bâtiment rectangulaire cantonné de deux tours et couvert d'une toiture d'ardoises à la Mansart. Ce dernier élément permet de donner la fin du XVIIe siècle comme date de reconstruction du château. Le corps central abrite deux étages. Côté jardin la façade présente cinq travées de fenêtres régulières. Seules trois petites lucarnes à fronton triangulaire ornent les combles. De part et d'autre de la façade se trouve une grosse tour ronde à haut toit conique abritant deux étages. Les tours du XVe siècle ont été sans doute repercées de fenêtres, contemporaines du corps de logis, côté cour, la façade propose une ordonnance rigoureuse et symétrique. La différence entre les deux façades se trouve au niveau des combles où les lucarnes sont au nombre de cinq et de formes différentes. Une petite chapelle seigneuriale, accolée au logis, et un pigeonnier près du jardin complètent cet ensemble harmonieux.","habitants":"Charles de La Trémoille                                                         Conives; familles Couraud                                                                Landes; familles Couraud \r\n        \r\n        \"","divers":"St-Gaultier Grav 1-2-3  ; 46° 38' 10\" nord, 1° 25' 16\" est .               Les Flantes grav -4.                                                                     Conive grav 5                                                                          . Thenay grav 6.","gps":"","images":["../image/image_36/36_St_Gaultier_Thenay_1.jpg","../image/image_36/36_St_Gaultier_Thenay_2.jpg","../image/image_36/36_St_Gaultier_Thenay_3.jpg","../image/image_36/36_St_Gaultier_Thenay_4.jpg","../image/image_36/36_St_Gaultier_Thenay_5.jpg","../image/image_36/36_St_Gaultier_Thenay_6.jpg"]},"Consult_chateau_formulaire7a11-3":{"id":"Consult_chateau_formulaire7a11-3","dept":"36","canton":"Belâbre","commune":"St-Hilaire de Benaize","nom":"St_Hilaire_Benaize","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à St-Hilaire de Benaize celui d'Aigues Joignant, Forges  et d'Ajoncs, Céré ,  Villemuzault                                                                           AIGUES-JOIGNANT,  est à Saint Hilaire-sur-Benaize. Le château appartenait autrefois à la seigneurie de Cors tenue par les Sénebaud. Aux environs de 1130, un membre de la Famille Sénébaud donna son fief à lAbbaye de lÉtoile, récemment installée en Poitou. Deux incendies le ravagèrent. Au XVIe siècle, le prieuré fut entièrement remanié. Lancienne chapelle fut remplacée par un bâtiment rectangulaire comportant une terrasse et un logis principal, avec un étage et décoré dornements de style néo-renaissance, comme les meneaux ou les créneaux. Il est flanqué de deux tours rondes qui datent du XVIe siècle. La grosse tour ouest abrite une belle salle gothique voutée dogives.\r\nCERE, ancienne demeure féodale fortifiée qui assurait la surveillance de la vallée. La première mention de Céré remonte à 1390. Au XVIe siècle, le château de Céré passe par alliance au mains des Valzergues, des Loubes de la Gâtevine, puis aux Bridiers de Gardempes. Au XVIIe siècle, par alliance avec ces derniers, les Desmarquets firent l'acquisition de Céré. A la Révolution, le château est vendu comme bien national à Benjamin Desmarquets. Déchu de ses droits, le propriétaire le vend à un proche en 1807, Dupeiron de la Coste, directeur de la Monnaie. En 1863, son descendant lègue sa fortune à un neveu, le général Baret de Rouvray. Une de ses filles, Marguerite, épousa le comte Elzéar de Tristan, dont les descendants détiennent toujours le château.","architecture":"La BROSSE,  est le monument le plus ancien de Saint-Hilaire-sur-Benaize, son donjon carré date du XIIe siècle, il gardait le gué du même nom qui permettait de traverser la Benaize. Ce château a servi décole à partir de 1851. Lécole laïque de filles demeura jusquen 1920 dans ce château.                                                                                CERE, la construction du bâtiment semble remonter au XVe siècle. Accolé à la partie ancienne, un pavillon classique a été construit sur la façade sud du château (fin XVIIe-début XVIIIe siècles), la partie la plus ancienne présente un logis quadrangulaire de trois étages à haut comble, flanqué de cinq tours circulaires: celle du nord-ouest, dite à la lanterne est couronnée en hourdis, celle du nord-est abrite un oratoire voûté décoré de peintures murales. Une aile à deux étages et toit brisé a été ajoutée au XVIIe siècle.                                                               VILLEMUZAULT, le château a été construit au XVIe siècle par Guillaume Barbaud autorisé par le seigneur de Cors son suzerain. Les biens en dépendant étaient le Bois d'Usson, le Bois du Quart, Lavaudieu, le Galop et la Suie. Une tour porte la date 1346. La famille Bastide l'occupe jusqu'à la fin du XVIIIe siècle. L'intérieur offre de grandes salles avec cheminées en pierre. Chapelle castrale. Villemuzault possède un corps de logis rectangulaire flanqué de tours, côté Benaize, et d'échauguettes côté cour. Il ne possédait pas de vocation militaire. Seule la grosse tour, datant du XIVe siècle, accolée au logis, est plus redoutable. Au XXe siècle l'édifice passa entre plusieurs mains avant d'être restauré par les propriétaires actuels.","habitants":"Aigues Famille Sénébaud                                                         Céré; Bridiers de Gardempes\r\n        \r\n        \r\n        \r\n
