es de l'église. Elle comporte un entresol et deux étages, plus combles. On accède au niveau d'habitation par deux escaliers latéraux aboutissant sur un perron. La porte d'entrée est  surmontée d'un grand linteau monolithe décoré d'un écusson surmonté d'une double accolade. Contre la façade, à droite du perron, une grosse tour est percée d'une meurtrière à son premier niveau. Une tourelle ronde flanque l'angle opposé. L'ensemble a été très remanié par la création de grandes baies au XVIIe ou au XVIIIe siècle. La toiture est du XIXe siècle.                                                                                                 M.F BREUIL le petit château, a été construit à la fin du XVIe siècle, le logis comporte une tour circulaire sur le devant, surmontée d'une échauguette et une tour carrée à un angle postérieur. Le pont-levis a disparu, mais des fossés empierrés sont encore visibles et profonds sur trois côtés, devait être entourée d'eau. Au nord, s'étendait une basse-cour rectangulaire, elle aussi limitée par des fossés.                                                                                                    RAIDOUX , ce château primitif dont l'édification remonte au début du XVIe siècle a été rasé. Le château actuel, construit à proximité du premier édifice, date de la fin du XIXe siècle. Certaines pierres, comme celles du fronton, ont été réutilisées. Les anciens fossés qui entouraient l'enclos rectangulaire du château primitif sont encore visibles.","habitants":"\"","divers":"A Chaillac le château  du Breuil grav 1-2, de Gates grav 3 et de Raidoux grav-4","gps":"","images":["../image/image_36/36_Chaillac_1.jpg","../image/image_36/36_Chaillac_2.jpg","../image/image_36/36_Chaillac_3.jpg","../image/image_36/36_Chaillac_4.jpg"]},"Consult_chateau_formulaire550a":{"id":"Consult_chateau_formulaire550a","dept":"36","canton":"St-Benoit du Sault","commune":"Chaillac","nom":"Chaillac_Indre","type":"Château","periode":"XV-XVI","histoire":"BENARDERIE, ayant appartenu à Alexandre Dubreuil, chevalier, seigneur de Montot, la seigneurie  est passée par achat à la famille de Leffe en 1569. D'après l'acte de vente, il apparaît que le château n'existait pas; il a été édifié après que Pierre de Leffe eut pour sa part, la terre de La  Bernarderie, dans le partage fait entre lui et son frère vers 1567, André de Leffe fut le dernier seigneur de La Bernarderie qu'il vendit vers 1818 à Pierre Nicaud. Après la mort de son père, en 1826, Dorothée Nicaud, mariée à Jean Augustin de Lauzon en 1814, en hérita, ses descendants la possèdent toujours.                                                                                                                          BROSSE, il a été construit au Xe siècle, par le vicomte Géraud de Limoges, époux de Rothilde de Brosse, appartint aux seigneurs de Brosse, de Chauvigny et à la famille de Bourbon-Montpensier, fut incendiée par les Anglais au cours de la guerre de Cent Ans. une tour qui appartenait à Adhémar fut rasée. Adhémar mourut en 1025 après avoir été dépossédé de Brosse par Hugues. Le château passa en 1328 à André II de Chauvigny, par son mariage avec Jeanne de Brosse. Il est toujours dans les mains des Chauvigny à la fin du XVe siècle. Ayant cessé d'être habité par ses seigneurs au XVe siècle, il fut racheté par Joseph de Fougières en1768, qui entreprit de récupérer les pierres de parement et la destruction continua jusqu'au XIXe siècle. Ce château fait lobjet dune inscription au titre des M.H., depuis le 11 mars 1935. \r\nFORGES, en 1465, Philippe de Fougières obtient la permission de fortifier son hôtel et d'y faire archurer canonnières. Est un fief de la châtellenie de Chaillac dépendant de la vicomté de Brosse. Il tire son nom d'anciennes forges qui étaient installées dans la vallée. Il est mentionné en 1394, il appartient alors à la famille de Laigue. Il passe ensuite par succession à la famille de Fougières de 1445 à 1587 puis aux Paute, déjà co-seigneurs du fief, puis aux Couraud jusqu'à la Révolution, qui le transmettent à leurs descendants de La Rochethulon.","architecture":"BENARDERIE Le château a été édifié au sommet d'un coteau dominant la vallée de l'Anglin.L'édifice est formé d'un corps de bâtiment rectangulaire à deux étages plus combles, flanqué de deux pavillons à un étage. Il subsiste les deux tours qui flanquaient les angles du corps de bâtiment principal sur l'arrière. Devant, se trouve une terrasse limitée par un mur flanqué de deux tourelles. L'ensemble présente un aspect plus résidentiel que fortifié.\r\nBROSSE, d'allure massive, cette belle bâtisse s'élève au centre du bourg, à une quarantaine de mètres de l'église. Elle comporte un entresol et deux étages, plus combles. On accède au niveau d'habitation par deux escaliers latéraux aboutissant sur un perron. La porte d'entrée est surmontée d'un grand linteau monolithe décoré d'un écusson surmonté d'une double accolade. Contre la façade, à droite du perron, une grosse tour est percée d'une meurtrière à son premier niveau. Une tourelle ronde flanque l'angle opposé. L'ensemble a été très remanié par la création de grandes baies au XVIIe ou au XVIIIe siècle. La toiture est du XIXe siècle. \r\nFORGES, en 1465, Philippe de Fougières  y établi murettes, palissades, pont-levis, fossés, créneaux et mâchicoulis en la forme et manière que bon lui semblera\". Le corps de logis, de plan rectangulaire, renferme une cour intérieure. La porte est ornée des armoiries de Fougières. Une tour d'angle située à l'ouest est consolidée par une butte de terre.  L'ensemble est pris dans une enceinte polygonale de 50 m de long, délimitée par un mur.","habitants":"Forges Famille de Laigue\r\n        \"","divers":"Château de la Bernarderie Grav-1; 46° 24' 55\" nord, 1° 19' 13\" est. La Brosse grav 2 à 6,  Forges grav 7 - 8.","gps":"","images":["../image/image_36/36_Chaillac_Indre_1.jpg","../image/image_36/36_Chaillac_Indre_2.jpg","../image/image_36/36_Chaillac_Indre_3.jpg","../image/image_36/36_Chaillac_Indre_4.jpg","../image/image_36/36_Chaillac_Indre_5.jpg","../image/image_36/36_Chaillac_Indre_6.jpg","../image/image_36/36_Chaillac_Indre_7.jpg","../image/image_36/36_Chaillac_Indre_8.jpg"]},"Consult_chateau_formulaireb84d":{"id":"Consult_chateau_formulaireb84d","dept":"36","canton":"Belâtre","commune":"Chalais","nom":"Chalais_Indre","type":"Château","periode":"XIV-XVI","histoire":"A Chalais le château de la Gatevine le manoir de Rocheblond.                                                                                                                                                                                                                                                       GATEVINE, les autres bâtiments de la cour sont démolis pour ouvrir le château sur la campagne. Le nom de Gâtevine signifierait terre inexploitable, terre gâtée. Ancien français : \"gast\", inculte, lui-même issu du latin \"vastum\", terrain stérile, désert ou dévasté, de \"vastus\", dévasté, gâté, désert. Le suffixe vine pourrait signifier vin. La première mention d'une résidence seigneuriale en ce lieu remonte à 1337 et dépendait du marquisat de Bélâbre.  En 1450, la maison noble est fortifiée.                                                                                                                      ROCHEBLOND, qui commande l'Anglin est mentionnée dès le XIIe siècle. Il s'agissait d'un fief relevant de Château-Guillaume, en 1239, Audebert III de la Trémoille se dit seigneur de Château-Guillaume et de Rocheblond. En 1629, une partie de la seigneurie est aux mains de la famille de Jean Autor et en 1677, elle est adjugée par décret à Gabriel Lecoigneux, second marquis de Bélâbre. En 1685, l'autre partie est détenue par une famille protestante, les Loube de la Gâtevine. En émigrant, ils permirent à Lecoigneux de réunir la seigneurie. Aujourd'hui propriété de monsieur Allignet.","architecture":"La GATEVINE;  un corps de logis trapézoïdal et deux tours circulaires demi hors-oeuvre dans l'angle, s'élevant sur un étage et un étage de comble éclairé par des lucarnes sculptées. Les portes de la façade sud sont à arc cintré à claveau central. La façade nord a été transformée au XIXe siècle avec le percement d'ouvertures encadrées en pierre de taille. Deux porches marquent l'entrée, côté nord et côté sud : porches en pierre à arc en plein-cintre avec les armes de la famille Loubes sculptées sur le claveau central. Ces porches se trouvaient sur un chemin nord-sud qui passait le long du château. Une cave avec accès extérieur et entrée voûtée se trouve au milieu de la cour. Une grosse tour se trouvait au-dessus, elle a été détruite. L'ensemble a été, selon les propriétaires, beaucoup plus grand, avec deux autres tours.                                                                      ROCHEBLOND, les murs ont une épaisseur variable, autour de 1, 50 mètres. La majorité des ouvertures d'origine ont des linteaux et même parfois des encadrements entiers chanfreinés en creux. Une porte au rez-de-chaussée a un linteau en accolade qui est un réemploi. Une fenêtre à meneaux est également visible sur la façade nord-ouest. Certaines ouvertures ont aussi été percées au XIXe siècle avec encadrement en grès taillé et au XXe siècle  couvert en tuile plate. Les deux premiers niveaux ont été assez transformés, par contre les autres ont conservé certaines caractéristiques de l'époque de construction : cheminées,  petites ouvertures, porte avec clous et serrure en bois, volets intérieurs avec vantaux.","habitants":"Rocheblond; famille de Jean Autor                                                    Chatelier famille Alabonne de Malicornay                      \r\n        \"","divers":"Chalais 46° 32' 15\" nord, 1° 11' 52\" est   grav 1-2 Rocheblond grav 3,        Gatevine 46° 32' 15\" Nord, 1° 11' 52\" Est Grav 4_5","gps":"","images":["../image/image_36/36_Chalais_Indre_1.jpg","../image/image_36/36_Chalais_Indre_2.jpg","../image/image_36/36_Chalais_Indre_3.jpg","../image/image_36/36_Chalais_Indre_4.jpg","../image/image_36/36_Chalais_Indre_5.jpg"]},"Consult_chateau_formulaireb748":{"id":"Consult_chateau_formulaireb748","dept":"36","canton":"Levroux","commune":"Brion","nom":"Chapelles_Brion","type":"Château","periode":"XVIII","histoire":"CHAPELLES,  propriété de la famille Grillon puis des Adam à la mort d'Amador Grillon des Chapelles, le 15 janvier 1868. Ce dernier, conseiller de préfecture, secrétaire général du département de l'Indre, est l'auteur d'Esquisses biographiques du département de l'Indre et d'une notice sur l'abbaye de Déols.  Rappelant de petits sanctuaires à La Grange-Neuve, aux Grandes Chapelles et aux Aubiers, le château fut habité au XIXe siècle par une famille de Châteauroux, les Grillon, qui se firent désormais appeler Grillon des Chapelles.","architecture":"CHAPELLES, l'édifice fut élevé à la fin du XVIIIe siècle sans que l'on sache par qui. Il fut peu après, au cours de la première moitié du siècle suivant, remanié et restauré. La construction se présente en un imposant corps de logis quadrangulaire à deux niveaux d'ouvertures, coiffés d'un long toit à deux versants, ses combles sont éclairés en particulier par un énorme il-de-buf situé au sommet de l'axe central de la façade d'entrée. Cette dernière est éclairée par une succession de fenêtres, à l'exception de la partie centrale du rez-de-chaussée qui est déclinée en trois travées. Les baies mises en valeur par un décor architectural, sont ici placées sous des arcs plein cintre à archivolte dont la naissance est soulignée par un cordon.","habitants":"Famille Grillon\r\n        \"","divers":"Château de la chapelles Brion et de Ballou grav 1","gps":"","images":["../image/image_36/36_Chapelles_Brion_1.jpg","../image/image_36/36_Chapelles_Brion_2.jpg"]},"Consult_chateau_formulairec041":{"id":"Consult_chateau_formulairec041","dept":"36","canton":"Neuvy-Saint-Sépulchre","commune":"Maillet","nom":"Charron_Maillet","type":"Château","periode":"XV","histoire":"CHARRON, le château était au XVe siècle, un fief qui relevait de Cluis-Dessus, dont le seigneur était Eudes de Magnac. La famille de Barbançois acquit le domaine en 1554 et le conserva jusqu'en 1720, date à laquelle le château fut vendu à Charles de La Porte Montval. Thabault de Liérie, receveur des tailles à Issoudun se rend acquéreur de l'édifice. Marie de Roqueborne de Fussy, Léon Crublier de Chandaire de Miran, Conseiller du Roi au bailliage de Châteauroux, Michel Vergne et en 1847, les banquiers Ollier et Duret se succédèrent à la tête de la propriété. La famille Duchan l'achète vers 1860 et fait restaurer le bâtiment par l'architecte Alfred Dauvergne. Au début du XXe siècle, il appartient à Joseph Pierre, amateur d'art. Une nouvelle  restauration fut conduite en 1898 par l'architecte Trolliet.","architecture":"CHARRON, baigné par un affluent du Creusançais, le château comprend un logis auquel sont accolées une grosse tour au nord de quatre niveaux à mâchicoulis chemin de ronde, toit en poivrière avec lanternon et une aile moderne en retour d'angle au sud. De l'autre côté, une chapelle, en partie reconstruite par Dauvergne, jouxte la grosse tour.","habitants":"Famille de Barbançois\r\n        \"","divers":"Château de Charron à Maillet","gps":"","images":["../image/image_36/36_Charron_Maillet_1.jpg","../image/image_36/36_Charron_Maillet_2.jpg"]},"Consult_chateau_formulaire968b":{"id":"Consult_chateau_formulaire968b","dept":"36","canton":"Belâtre","commune":"Lignac_Belâbre","nom":"Chateau_Guillaume","type":"Forteresse","periode":"XIII-XVI","histoire":"GUILLAUME,  au XIIIe siècle est le fief de la famille de La Trémoille.  Au début du XVIe siècle, Jacqueline de La Trémoille  épouse Claude Gouffier, duc de Roannez.  Claude Gouffier, dame d'honneur de Catherine de Médicis, dame de Château-Guillaume, épouse en 1549 Léonor Chabot, comte de Charny. Charlotte Chabot épouse Jacques le Veneur comte de Tillières sans enfant, lègue  en 1612, à Pierre Riffaud  dont la famille le conserveront jusqu'en 1676 . François Riffaud, seigneur de Bouchaut à Saint-Pierre-de-Trimouille et de Château-Guillaume, épouse Louise de Fougières qui lui donne une seule fille : Françoise de Riffaud, dame héritière, se marie le 16 février 1629 avec Jean de la Faire, seigneur de Vauzelle et de Mazières, fils de François et de Claude de La Châtre, ils ont trois fils : Claude de La Faire, qui suit, Jacques et Pierre. En 1676, le château appartient à la famille De la Faire.  Jacques de La Faire, fils de Claude de La Faire, seigneur de Bouchaud, et de Marie Simonnit, avec Marie-Louise de Roffignac, fille de Mondot, seigneur de La Salle et de Gabrielle de Leffe. François de La Faire, seigneur de Château-Guillaume, lieutenant au régiment de Gèvres-Cavalerie, a épousé Marthe de Boislinard, fille d'Honorat et d'Elisabeth de Béchillon qui lui donne deux fils dont : Pierre-François de La Faire, sieur de Château-Guillaume, marié en 1789 à La Trimoille avec Marie-Thaïs des Colards des Hommes. Passé par héritage aux Prévost de Sensac de Traversay, échoit ensuite aux Robert de Beauchamp.\r\n  Au milieu du XIXe siècle, la comtesse Robert de Beauchamp achète le château.  A la fin du XIXe siècle, le château est remanié par Charles Casaux, disciple de Viollet le Duc, toujours dans la famille de la comtesse de Beauchamp.","architecture":"GUILLAUME, construit entre 1087 et 1112,  le vieux donjon du XIe siècle est agrandi. Les tours ayant des salles planchéiées ont été garnies de voûtes. Son donjon a été agrandi au XIIIe siècle par son fils Guillaume X d'Aquitaine.  Au XIVe siècle, les possessions Royales s'agrandissent dans le Berry et l'ancien territoire des Plantagenets. Lentement le Château-Guillaume perd de son importance. A la fin du  XVe siècle, de nombreux systèmes défensifs sont en ruine. Certains bâtiments sont abattus ou désarmés dont la tour Saint Michel. Au XIVe siècle, le vieux donjon roman se voit encadrer par quatre grosses tours cylindriques et est couronné de mâchicoulis. En 1526, dans cette vieille forteresse médiévale, le sir Gouffrier fait couvrir d'un toit le donjon et la tour de La Trémouille pour éviter une détérioration par les intempéries. Durant le XVIIe siècle, excepté le donjon qui est rapidement consolidé, les vieux bâtiments et éléments fortifiés sont délaissés. Leurs pierres servent à la réalisation d'une habitation confortable avec un escalier à deux volées. Le pont-levis est remplacé par un pont dormant.\r\nLe château, démantelé sous Richelieu, a été classé au titre des M.H. par la liste de 1862 et restauré par un disciple de Viollet-le-Duc.  En 1819, le hameau de Château-Guillaume est réuni administrativement à la commune de Lignac.","habitants":"Famille  de  Claude Gouffier\r\n        \"","divers":"Château Guillaume à Lignac ;46° 28' 49\" Nord, 1° 11' 30\" Est","gps":"","images":["../image/image_36/36_Chateau_Guillaume_1.jpg","../image/image_36/36_Chateau_Guillaume_2.jpg","../image/image_36/36_Chateau_Guillaume_3.jpg","../image/image_36/36_Chateau_Guillaume_4.jpg","../image/image_36/36_Chateau_Guillaume_5.jpg","../image/image_36/36_Chateau_Guillaume_6.jpg"]},"Consult_chateau_formulaire8416":{"id":"Consult_chateau_formulaire8416","dept":"36","canton":"Le Blanc","commune":"Le Blanc","nom":"Chateau_Naillac","type":"Forteresse","periode":"XV","histoire":"CHÂTEAU-NAILLAC, le financier Claude Dupin et son épouse Louise de Fontaine se rendent acquéreurs du marquisat du Blanc et de la châtellenie de Cors, le 24 avril 1738, précédemment propriété de la comtesse de Parabère, étant peu confortable car les bâtiments servaient de prison, M. et Mme Dupin achètent également le 23 novembre 1748, l'hôtel particulier du bailli Louis Fontenettes, dans la ville basse du Blanc, sur la Grande-Place en face du couvent des Augustins. Cette dernière résidence accueille donc les nouveaux propriétaires du marquisat, pendant leurs séjours irréguliers au Berry. Cet hôtel prendra le nom de « Maison de la Marquise », en l'honneur de Madame Dupin, qui est venue quelques fois à le  Blanc.  Madame Dupin n'ayant pas de postérité, elle lègue le marquisat du Blanc en 1799, dont le château-Naillac, à son petit-neveu, Auguste-Louis Vallet de Villeneuve, né à Paris le 4 août 1779. Le frère d'Auguste est René Vallet de Villeneuve, propriétaire du château de Chenonceau. Auguste Vallet de Villeneuve a le titre de baron. Il est chef d'escadron, trésorier de la garde nationale depuis 1809 et receveur municipal de la ville de Paris dès 1801. Il a épousé Laure de Ségur (1778-1812), fille du comte Louis-Philippe de Ségur et dont la nièce n'est autre que la romancière Sophie Rostopchine, comtesse de Ségur (1799-1874). Le baron Auguste Vallet de Villeneuve meurt dans son château de la ville du Blanc, le 24 octobre 1837. Le château-Naillac devient en 1986 le siège de l'Écomusée de la Brenne et abrite l'exposition permanente : Des hommes, un pays, une histoire.","architecture":"CHATEAU-NAILLAC, forteresse berrichonne du Blanc, se situe au XIIe siècle, au cours de la deuxième moitié du siècle, les deux donjons, remaniés aux XVe, XVIIIe et XIXe siècles, datent de cette époque. La porte d'entrée du donjon ouest, la cheminée romane et la baie géminée du donjon Est sont les éléments les plus remarquables. Au XVe siècle, la cour est remblayée, faisant que l'ancien premier étage devient le rez-de-chaussée, et la réfection des donjons est entreprise avec adjonction de tourelles d'escalier, construction d'un hourd en 1475, modifications des ouvertures, cheminées, toitures. La tour située au milieu du mur ouest de l'enceinte date de la même campagne. Au début du XVIIIe siècle, les deux donjons sont reliés par un corps de bâtiment. L'édifice sert de caserne en 1848-1849. En 1851, il est acheté par la commune et devient une école. La restauration du château est entreprise en 1978 en vue de l'installation de l'écomusée de la Brenne, à cette occasion, en 1991 et 1992, la cheminée romane et le hourd sont découverts. Cette restauration se termine par la réfection du donjon Est.","habitants":"Famille Dupin\r\n        \"","divers":"Château de Naillac à le Blanc","gps":"","images":["../image/image_36/36_Chateau_Naillac_1.jpg","../image/image_36/36_Chateau_Naillac_2.jpg","../image/image_36/36_Chateau_Naillac_3.jpg"]},"Consult_chateau_formulaire446c":{"id":"Consult_chateau_formulaire446c","dept":"36","canton":"Châteauroux","commune":"Châteauroux","nom":"Chateauroux","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux à châteauroux, la Pointerie , Parc  et l'hotel Bertrand.                                                                             CHATEAUROUX, la port Saint-Martin se situe dans la rue de la vieille prison, qui voit passer Charles IV Le Bel en 1324, Louis XIII en 1632 et la duchesse de Longueville, l'âme de la Fronde en 1651. La rue est à forte pente. Sa tour du XVe siècle inscrite à l'inventaire supplémentaire des M.H est utilisée dans les années 1750 comme prison avec un rôle stratégique. Elle permet de contrôler l'accès en chicane au château Raoul. Aujourd'hui, elle permet l'accès au site du quartier médiéval primitif .                                                                                                                                                                                                                               \r\n  PARC , il est aussi appelé le Château Balsan, la tour de la Dame Blanche est le seul vestige subsistant de l'ancien château du Parc construit au XVe siècle par la famille d'Aumont et propriété du Prince de Condé jusqu'à la Révolution. Édifiée dans un style Renaissance en 1513, elle est connue pour avoir servie d'oratoire à Claire Clémence, épouse du Grand-Condé et envoyée en résidence surveillée pendant 24 ans dans ce château, où elle meurt. Son achat, en 1856, par Pierre Balsan, un lodévois, changea le visage de l'entreprise.  Il fit construire entre 1860 et 1867, une nouvelle usine de six hectares, à l'ouest de la première, où il maintint avec succès la production traditionnelle du drap de troupe.                                                                 BERTRAND hôtel du XVIIIe siècle devenu musée en 1921.                          POINTERIE, l'édifice semble suffisamment ancien pour envisager d'en faire remonter la construction au XVIIIe siècle. Au XIXe siècle, des adjonctions, par Alfred Trolliet, architecte parisien, comme l'aile en retour d'équerre vont lui accorder une nouvelle ampleur.  Au XXe siècle la propriété appartient aux familles Béraud-Villars puis d'Ornano.","architecture":"PARC Le château est construit sur l'ancienne aile des teinturiers de la manufacture royale transformée en résidence dans la seconde moitié du XIXe siècle, dans le style néo-gothique En 1751, un drapier de Lodève établit dans l'ancien château médiéval du Parc, dépendant du domaine royal, une manufacture privilégiée pour la fabrication des draps de troupe. L'histoire de l'entreprise et les bâtiments conservés montrent que, dès sa création, la manufacture a fait l'objet d'une conception d'ensemble réfléchie, un compromis entre le regroupement sous le même toit, des processus de production et le maintien à domicile d'un grand nombre d'artisans ruraux, est inscrit aux M.H. depuis 1996.                                                                                        POINTERIE  La jonction des deux ailes est marquée par une tour carrée  surmontée d'un toit de tuiles plates comme pour l'ensemble des couvertures, peu élevé et en pavillon. Cette tour carrée est éclairée au-dessus des autres toitures par un oculus. L'aile ancienne comprend un étage et un niveau sous combles ajouré de lucarnes à croupes. Elle comprend également, rejetée vers l'angle au rez de chaussée, la porte d'entrée, elle est surmontée de l'unique décor visible sur les façades, un fronton triangulaire. L'aile récente présente trois niveaux sous la couverture","habitants":"Chateauroux duchesse de Longueville                        Pointerie  Famille Béraud-Villars                                                  Parc; famille d'Aumont \r\n        \"","divers":"Châteauroux, le Parc grav 1 à 5 ; 46° 48' 43,49\" Nord, 1° 40' 51,56\" Est.                                                                                  Pointerie grav 6 et divers porte et hôtel Bertrand 7-8-9","gps":"","images":["../image/image_36/36_Chateauroux_1.jpg","../image/image_36/36_Chateauroux_2.jpg","../image/image_36/36_Chateauroux_3.jpg","../image/image_36/36_Chateauroux_4.jpg","../image/image_36/36_Chateauroux_5.jpg","../image/image_36/36_Chateauroux_6.jpg","../image/image_36/36_Chateauroux_7.jpg","../image/image_36/36_Chateauroux_8.jpg","../image/image_36/36_Chateauroux_9.jpg"]},"Consult_chateau_formulairee731":{"id":"Consult_chateau_formulairee731","dept":"36","canton":"Eguzon-Chantôme","commune":"Pommiers","nom":"Chatelier_Bethenet","type":"Forteresse","periode":"XV","histoire":"Deux châteaux à Châtelier dont celui de Châtelier et  celui de Bethenet.                                                                                     BETHENET, en 1307, Gaspard du Mont, puîné d'une fratrie de trois garçons, recevait en héritage de son père le fief de Béthenet. Antoine du Mont en est seigneur en 1540, et, au XVe siècle tandis qu'Yvain du Mont relevait Le Breuil, l'un d'eux entreprit la construction de l'actuel château. En 1670, nous trouvons François de Bridiers de Gartempe, chevalier, seigneur de Béthenet, époux en 1672 d'Anne du Rieu. Les actuels châtelains sont les descendants de cette famille.                                                                      De CHATELIER,  au milieu du XVIIIe siècle, la famille Alabonne de Malicornay. À la fin du siècle suivant, la maison de maître du Châtelier appartenait à M. Cormier,   et à la veille de la Révolution à la famille de Lusignan.","architecture":"BETHENET, le château se présente en une série de corps de logis disposés en U autour d'une cour, était protégé par des tours dont une demeure, décoiffée, à l'ouest. L'accès se faisait par un pont-levis, qui a disparu, mais les passages de flèches ont été conservés. Au-dessus du porche se trouvent deux salles ouvertes sur les fossés par une fenêtre rectangulaire. Le dernier élément protecteur symbolique, jouxtant la porte cochère, est la chapelle où l'on devine des peintures murales du XVIe siècle.                 CHATELIER  au XIIe siècle devait exister un important ensemble fortifié comprenant donjon, chapelle, bâtiments d'habitation, communs, puits et cour intérieure, le tout entouré de douves. Subsiste le donjon séparé par la cour intérieure du château. Les appartements flanquant le donjon sur la gauche ont été démolis à la suite d'un incendie. A sa droite, d'autres bâtiments existaient encore au XIXe siècle et fermaient le quadrilatère. Le château principal ou poterne, borde toute la façade Est du quadrilatère. L'accès se fait par un pont à deux arches. Deux ailes et deux avant-corps constituent un ensemble d'époque Louis XIII. Des murs extérieurs fortifiés dominaient les douves. Le remplacement du pont-levis par une arche fixe a sans doute été effectué au XVIIe siècle. Une tour ronde du XIIe siècle flanque la façade sur cour. Le bâtiment comporte, sur toute sa longueur, une cave voûtée devant servir d'écurie. La date de 1620 correspond sans doute à la transformation de la demeure féodale en résidence plus accueillante.","habitants":"Bethenet famille d'Antoine du Mont                                           Chatelier  famille Alabonne de Malicornay\r\n        \"","divers":"Château de Bethenet à Pommiers","gps":"","images":["../image/image_36/36_Chatelier_Bethenet_1.jpg","../image/image_36/36_Chatelier_Bethenet_2.jpg","../image/image_36/36_Chatelier_Bethenet_3.jpg","../image/image_36/36_Chatelier_Bethenet_4.jpg","../image/image_36/36_Chatelier_Bethenet_5.jpg","../image/image_36/36_Chatelier_Bethenet_6.jpg","../image/image_36/36_Chatelier_Bethenet_7.jpg"]},"Consult_chateau_formulaire58ca":{"id":"Consult_chateau_formulaire58ca","dept":"36","canton":"Châtillon sur Indre","commune":"Châtillon sur Indre","nom":"Chatillon_Indre","type":"Château et vestiges","periode":"XII-XVII-XVIII","histoire":"Deux châteaux à Châtillon celui de Bigorre, de Chaillou, vestige  de la forteresse (tour)  et Pouzieux (voir article  Bigorre-Pouzieux)                                                                                                                                                                                                                                                          CHAILLOU, dépendait de la Paroisse de St-Martin deVertou avant dêtre rattaché à Chatillon. Le château appartint au XVIe siècle à la famille de Sorbiers, qui posséda nombre de seigneuries de la région. Le 14 avril 1547, René de Sorbiers, écuyer, fait hommage au Roi Henri Il pour sa seigneurie des Pruneaux. A la fin du XVIIe siècle, le domaine devint la propriété de la famille Amelot de Chaillou, Les Pruneaux furent remplacés par le nom de Chaillou. En 1809, Chaillou fut acheté par Philippe Robin de La Cotardière, qui était aussi propriétaire du château de Saint-Cyran du Jambot. Chaillou appartient à la même famille depuis six générations.                                                                                                    CHATILLON  La construction d'une porte fortifiée, encadrée par deux tours circulaires, fut entreprise sur l'ordre du baron de Sennevières, capitaine du château et de la ville en 1610. Elle ne fut jamais achevée,  le donjon a été reconstruit à partir de 1160 par Henri II Plantagenet, en effet celui-ci était alors le suzerain de Châtillon et il cherchait alors à asseoir sa tutelle sur le Bas-Berry. En 1274, le roi de France Philippe III donne à son conseiller et chambellan Pierre de la Brosse la Chatellenie de Châtillon, y compris le château et la ville. Celui-ci fait construire des logis au pied de la forteresse.","architecture":"CHAILLOU, le château est composé de deux ailes en équerre surmontées d'une haute toiture éclairée par d'importantes lucarnes. La façade du XVIIe siècle englobe des parties plus anciennes: au Sud Est on peut voir les restes du château du XVe siècle, avec deux tours à poivrière encadrant une façade percée de fenêtres d'époque Renaissance. À l'intérieur de l'aile ouest un salon a pris la place d'une chapelle datant du XVIe siècle.   \r\nCHATILLON dit la Tour César, est le plus ancien donjon cylindrique voûté de France. De cette forteresse subsiste le donjon légèrement conique et sa chemise de plan polygonal, implantés sur une motte. Trois courtines clôturaient la cour du château : l'une au nord, flanquée de tours carrées, irrégulièrement espacées (dont deux encore existantes), une autre à l'est, détruite au XIIIe siècle, lors de la construction du logis, et la troisième au sud, détruite au début du XIXe siècle. L'enceinte du bai le fut ensuite complétée par plusieurs tours rondes. Réuni au domaine royal, le château fut confié à Dreux de Mello, de 1206 à 1249. Elle n'existait pas encore en 1226 ;  elle est citée pour la première fois en 1280. Sa charpente fut reprise au XIVe ou au XVe siècle. Contre la courtine nord s'appuie un bâtiment utilisé comme prison de 1595 au XIXe siècle. Sa charpente, à chevrons portant fermes en berceau brisé, correspondant à un toit en appentis, a été mise en place entre 1379 et 1384. Délaissé par la royauté dès le début du XVIe siècle, Châtillon fut alors fréquemment engagé, jusqu'à son aliénation définitive par échange en 1745. La grande salle du logis accueillait aux XVIIe et XVIIIe siècles, l'auditoire de justice.","habitants":"Bigorre famille de Préville                                                         Chaillou famille de Sorbiers\r\n        \"","divers":"A Chatillon, la Tour  César; 46° 59' 11\" Nord et 1° 10' 28\" Est Grav de1 à 6,                                                                                     le château de Chaillou grav -7","gps":"","images":["../image/image_36/36_Chatillon_Indre_1.jpg","../image/image_36/36_Chatillon_Indre_2.jpg","../image/image_36/36_Chatillon_Indre_3.jpg","../image/image_36/36_Chatillon_Indre_4.jpg","../image/image_36/36_Chatillon_Indre_5.jpg","../image/image_36/36_Chatillon_Indre_6.jpg","../image/image_36/36_Chatillon_Indre_7.jpg"]},"Consult_chateau_formulaireacdb":{"id":"Consult_chateau_formulaireacdb","dept":"36","canton":"Saint-Benoit du Sault","commune":"Chazelet","nom":"Chazelet","type":"Forteresse","periode":"XV-XVI","histoire":"CHAZELET Le château de Chazelet fut construit vers le milieu du XVIe siècle par François Pot, seigneur de Chassingrimont. La  seigneurie était aux mains de Guillaume d'Aubusson au XVIe siècle, et fut érigée en marquisat au XVIIIe siècle, construit vers le milieu du XVIe siècle par François Pot, seigneur de Chassingrimont. En 1860, l'architecte Alfred Dauvergne travailla à moderniser l'ancien château du XVe siècle. Le propriétaire de l'époque, le marquis Taupinart de Tilière, souhaitait construire un pont supplémentaire sur les douves. Dauvergne proposa un pont métallique mais le propriétaire choisit de lui faire réaliser un pont en ciment armé dont Joseph Monier venait de déposer le brevet d'invention. Monier vint donc en 1875, réaliser à Chazelet ce qui fut le premier pont réalisé en béton armé en France.                                                        Vestiges d'un château fort à Chassingrimont","architecture":"CHAZELET, le château est flanqué de cinq tours rondes et d'une tour carrée avec meurtrières et mâchicoulis, une porte d'entrée à mâchicoulis. Malgré l'aspect imposant, les qualités défensives de l'édifice sont médiocres: nombreux angles morts, l'épaisseur des murs relativement faible et la largeur des tours réduites. Il s'agit de montrer  sa puissance, c'est plus un manoir qu'un château, ce qui lui vaut d'avoir été toujours habité. Deux bâtiments ruinés sont situés au-delà des douves au sud, dont l'un est peut-être antérieur au château actuel.","habitants":"Famille de François Pot\r\n        \r\n        \r\n        \"","divers":"Chazelet; 46° 30' 28\" Nord, 1° 26' 25\" Est","gps":"","images":["../image/image_36/36_Chazelet_1.jpg","../image/image_36/36_Chazelet_2.jpg","../image/image_36/36_Chazelet_3.jpg","../image/image_36/36_Chazelet_4.jpg"]},"Consult_chateau_formulaire130d":{"id":"Consult_chateau_formulaire130d","dept":"36","canton":"Issoudun-Nord","commune":"Les Bordes","nom":"Château_Gaillard","type":"château","periode":"XVI","histoire":"CHATEAU-GAILLARD,  doit  son nom, à une place forte antérieure, au XVIe siècle, il appartint à Esclisson, puis à Antoine Bras de Fer.  Paul Roquier, prévôt d'Issoudun, en est propriétaire. Sa fille épouse, en 1731, Martin de Chizay, fermier général de la seigneurie de Reuilly. Leur fille apporte en 1769, la propriété à son mari, Robert François Xavier de Sainthorent, leurs héritiers la vendent en 1821, à Cyr de La Châtre. Vers 1860, ses descendants cèdent la demeure à Amédée Hemery qui fait démolir le bâtiment qui fermait la cour, ouvre l'allée d'arrivée, fait installer la grille et réaménage le parc. Le domaine est cédé par les héritiers, aux familles Surtel et Babinet qui arrachent les vignes. Les actuels propriétaires, l'achètent en 1997 et replantent la parcelle de vignes.","architecture":"CHATEAU-GAILLARD, bâtiment, de style Louis XIII (briques et pierres), à un rez de chaussée, coiffé d'un toit à croupes aux combles mansardés. Il est fait mention de cet édifice dans un acte de 1685 traitant des vignes du prieuré de Reuilly. Le château d'origine a été doublé, à la fin du XVIIIe siècle, de bâtiments agricoles et viticoles.","habitants":"Famille d' Antoine Bras de Fer.\r\n        \"","divers":"Château de Gaillard à les Bordes","gps":"","images":["../image/image_36/36_Chateau_Gaillard_1.jpg","../image/image_36/36_Chateau_Gaillard_2.jpg"]},"Consult_chateau_formulaire7be4":{"id":"Consult_chateau_formulaire7be4","dept":"36","canton":"Le Blanc","commune":"Ciron","nom":"Ciron","type":"Château","periode":"XV","histoire":"plusieurs châteaux à Ciron celui de la Barre, la Boissière, de Chémeray, de lépine, de Pellebuzan, de Vouliers et de Romefort (voir article)                                                                                                                                         BOISSIERE; mentionné pour la première fois en 1407. La maison seigneuriale est datée de la seconde moitié du XIIIe siècle et fut remaniée au XVe siècle.                                                                                                    PELLEBUZAN  dépendait du prieuré fontevriste de Longefont\r\nVOULIERS, le fief en 1595 de la seigneurie du Bouchet, Migné et Dasdé, dont il dépendait En 1870, son propriétaire, M. Charpillon, l'augmente en adjoignant sur l'autre extrémité, un deuxième corps de logis. À la fin du siècle, Maurice Guérineau, gendre du précédent, fait un nouvel et dernier agrandissement.","architecture":"BOISSIERES, présentait comme une tour de plan presque carré, comprenant une salle basse surmontée de deux étages. La maison forte est laissée à l'abandon jusqu'en 1598. Près du logis se trouve une tourelle ronde dont la partie supérieure abrite un colombier et un cellier. Au XVIIIe siècle, l'escarpe du fossé Nord est reconstruite et le pont-levis remplacé par une arche dormante. Avant 1818, il fut ajouté un corps de bâtiment contre la tour.                                                                                                   PELLEBUZAN, à la suite d'un incendie, un château est reconstruit en 1893. Il est constitué de deux bâtiments à trois étages accolés, de style néo-classique: l'un rectangulaire, de cinq travées, avec une toiture à pans coupés et percée d'oculi ; l'autre de plan carré de deux travées et couronné d'une simple toiture à quatre pans comportant des lucarnes. Seule la façade du 1er corps de bâtiment, dont le perron permet d'accéder à une terrasse,  est décorée. Sa travée centrale est mise en valeur par l'utilisation d'une allège et d'un tympan mouluré au niveau de la baie du deuxième étage.                                                                                                                VOULIERS, comprenant plusieurs corps de logis, remonte au XVIIIe siècle. Formant une aile à un étage et un étage de combles éclairé de lucarnes à croupe, elle est accostée par un pavillon carré à un étage de la même époque. Haut d'un étage et coiffé d'un toit à la Mansart, ce bâtiment utilise l'ardoise en couverture.  En retour d'équerre, par rapport au précédent, il ajoute plusieurs corps de bâtiment à un, deux ou trois niveaux. Pavillon carré, rectangulaire et tour circulaire déterminent des couvertures variées: longs pans, demi-croupe, croupe, cane, pavillon et terrasse à balustrade.","habitants":"Boissière; segnieur locaux                                                      Vouliers;  M. Charpillon\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Ciron les châteaux; Boissière grav 1 ;   Pellebuzan grav 2 ; Vouliers grav-3","gps":"","images":["../image/image_36/36_Ciron_1.jpg","../image/image_36/36_Ciron_2.jpg","../image/image_36/36_Ciron_3.jpg","../image/image_36/36_Ciron_4.jpg"]},"Consult_chateau_formulaire2d42":{"id":"Consult_chateau_formulaire2d42","dept":"36","canton":"Le Blanc","commune":"Le Blanc","nom":"Ciron_Indre","type":"Château","periode":"XV-XVII-XIX","histoire":"La BARRE, château du XVe siècle apparemment repris pour Louis de Valenciennes qui l'avait acquis en mauvais état en 1733 (reprise des ouvertures notamment), la tour logeant une chapelle au sud du château,                                                                                                                                    EPINE, château bâti au cours du quatrième quart du XIXe siècle à partir d'une maison plus ancienne pour Gustave du Puynode  \r\nCHEMERAY, il y avait sur le site au XVIIe siècle un fief qui appartenait à Jean de Boislinard. La maison de maître et les communs, probablement dans la première moitié du XIXe siècle, furent profondément remaniés à partir de 1920 pour M. Copper Royer.","architecture":"BARRE, la tour logeant une chapelle au sud du château, abrite de belles peintures murales, élevée dans le parc en 1851. Dans ce parc subsistent une remise, des écuries, un puits,un pavillon d'entrée et un bâtiment de communs, élevé dans la deuxième moitié du XIXe siècle, remanié vers 1960; en 1933, le château a presque entièrement brûlé; reste une tour et les constructions du XIXe siècle.                                                                                                            CHEMERAY  maison transformée en sorte de château médiéval (la famille possédait le château de Biron) par l'adjonction de deux tours rondes, d'un corps rectangulaire et d'un chemin de ronde sur la façade ouest, celui-ci est supprimé en 1990; le bâtiment principal de communs à été aménagé en salle de billard et bureau pour le propriétaire.                                                                                                             EPINE, l'ancienne demeure correspond au corps principal; communs contemporains de cette transformation, à l'exception de la partie sud couverte en tuiles, semblant dater du XVIIIe siècle. Bâtiments en calcaire, sauf une partie des nouveaux communs en pan de bois à remplissage de brique; couvertures en ardoises sauf les anciens communs et le bûcher, couverts en tuiles; sous-sol, voûte en berceau en anse-de-panier, deux étages carrés et étage de comble pour le corps de bâtiment ajouté au château à la fin du XIXe siècle; toit à longs pans à croupes et toits en pavillon pour le château, toits en pavillon pour les pigeonniers, toits à longs pans à pignons couverts et appentis pour les communs.","habitants":"La Barre;  Louis de Valenciennes                                              Epine; Gustave du Puynode                                   Chémeray; Jean de Boislinard\r\n        \r\n        \r\n        \"","divers":"Châteaux à Ciron, la Barre grav 1-2-3, Chémeray grav 4-5-6, Lépine grav 7-8-9.","gps":"","images":["../image/image_36/36_Ciron_Indre_1.jpg","../image/image_36/36_Ciron_Indre_2.jpg","../image/image_36/36_Ciron_Indre_3.jpg","../image/image_36/36_Ciron_Indre_4.jpg","../image/image_36/36_Ciron_Indre_5.jpg","../image/image_36/36_Ciron_Indre_6.jpg","../image/image_36/36_Ciron_Indre_7.jpg","../image/image_36/36_Ciron_Indre_8.jpg","../image/image_36/36_Ciron_Indre_9.jpg"]},"Consult_chateau_formulaire73ef":{"id":"Consult_chateau_formulaire73ef","dept":"36","canton":"Neuvy-Saint-Sépulchre","commune":"Cluis","nom":"Cluis_Dessous","type":"Vestiges-Manoir","periode":"XII-XV","histoire":"CLUIS-DESSUS, la châtellenie de Cluis, Cluis Dessus relevait en fief de la seigneurie de Déols, possédée autrefois par des seigneurs de ce nom se divisa au XIIIe siècle en deux seigneuries : Cluis Dessus et Cluis Dessous eurent chacune leurs seigneurs particuliers. en 1433 possession des Culant en 1462 acquit par  la famille de Gaucourt en 1745 aux Montagnac  et en 1886 acquis par la municipalité.                                                                                                          CLUIS-DESSOUS, par mariage, la seigneurie de Cluis-Dessous passe entre les mains des Chauvigny à la fin du XIIe siècle. Cette famille s'éteint en 1508 et les biens passent aux Bourbons, par Louise, dernière épouse d'André de Chauvigny. Après les Bourbon-Montpensier, la châtellenie est vendue avec les seigneuries d'Aigurande et de Sainte-Sévère en 1697 à Nicolas Léonor de Flexelles, marquis de Brégy, ambassadeur en Pologne et en Suède. La descendance mâle du marquis s'éteint en 1762. \r\nEn 1767, le seigneur de Cluis-Dessus, Gabriel de Montaignac, achète la châtellenie de Cluis-Dessous et réunit les deux paroisses. En 1818, la commune de Cluis est formée de la fusion des anciennes communes de Cluis-Dessus et Cluis-Dessous.\r\nPUY-D'AUZON,  était autrefois un fief relevant de Cluis Dessous, appartenant en 1489 à François de Bernaize. Il passa ensuite à la famille d'Arreau qui le conserva jusqu'en 1778. Il est acheté en 1832 par M. Vayssiere de Saint Martin Valogne et son épouse, née Gerbaud de Malgane. La reconstruction du château à partir de 1876 est l'uvre de leur fils unique, Aymé, sur les plans d'Alfred Dauvergne.","architecture":"CLUIS-DESSUS; le manoir construit au XVe siècle (escalier à tourelle avec porte en accolade), a subi une importante restauration au XVIIe siècle. Les façades ont été presque totalement reconstruites.                                                                           CLUIS-DESSOUS, vestiges; est l'un des maillons de la chaîne des places fortes où prirent place des combats pendant la première partie de la guerre de Cent Ans. Il est mentionné en 1001. Du château, il ne reste que quelques ruines, encore imposantes. Le donjon des XIIe-XIIIe siècles et l'enceinte, en particulier l'entrée du XIIIe siècle, flanquée de deux tours semi-circulaires qui encadraient le pont-levis. Dès le XVIe siècle, le château-fort ne fut plus habité que par un garde et sa famille. Peu à peu faute dentretien de ses propriétaires, il se dégrada jusquà servir de carrière de pierres après la Révolution.                                                                                                         PUY DAUZON, l'ensemble est édifié autour d'un corps de bâtiment rectangulaire à deux niveaux coiffé d'un haut toit d'ardoise à deux versants. Les combles, ménagés sous ce dernier, sont éclairés par un ensemble de quatre lucarnes situées au sommet de chaque façade. En avant de la façade principale, se positionne au centre, une grosse tour-porte carrée, crénelée, cantonnée sur ses angles de deux tourelles en encorbellement, sur les extrémités, deux pavillons carrés. Entre ces trois éléments, couverts d'un toit en pavillon, une galerie avec terrasse est plaquée contre la façade.","habitants":"Cluis dessus; famille de Gaucourt                                                  Puy d'Auzon; famille d'Arreau\r\n        \r\n        \r\n        \"","divers":"Cluis dessus; 46° 32' 45\" Nord et 1° 44' 57\" Est    Grav 1 à 5,                     Cluis dessous; 46° 32'45\" Nord et 1°44'57\" Est                                  Puy d'Auzon; 46° 32' 45\" Nord et 1° 44' 57\" Es, t grav-6-7.","gps":"","images":["../image/image_36/36_Cluis_Dessous_1.jpg","../image/image_36/36_Cluis_Dessous_2.jpg","../image/image_36/36_Cluis_Dessous_3.jpg","../image/image_36/36_Cluis_Dessous_4.jpg","../image/image_36/36_Cluis_Dessous_5.jpg","../image/image_36/36_Cluis_Dessous_6.jpg","../image/image_36/36_Cluis_Dessous_7.jpg"]},"Consult_chateau_formulaire3d9e":{"id":"Consult_chateau_formulaire3d9e","dept":"36","canton":"Le Blanc","commune":"Concremiers","nom":"Concremiers","type":"Forteresse","periode":"XIV-XV","histoire":"Deux châteaux à Concremiers celui des Forgres et de Roches.                                                                                                                              FORGES, dans la famille picarde des Tyrel, sires de Poix, Jehan de Poix, échanson de Charles VII, Forges reste près de trois siècles dans la même famille jusquà Marguerite de Poix  Cette dernière épouse vers 1600 Antoine de Lage, seigneur de la Palisse, dont elle na pas de postérité. Sa sur, Renée de Poix, qui en hérite, épouse Pierre de Muzard sa fille Catherine de Muzard, dame de Forges, mariée à Charles de Montmorency, et Gabrielle de Muzard, dame de la Rochebellusson. Forges est alors vendu au marquis de Lussac, qui le cède vers 1715 à Matthieu Pinsonneau. Ce dernier, devenu marquis du Blanc, le vend vers 1719 à la belle et sulfureuse Marie-Madeleine de la Vieuville, marquise de Parabère, fille de René-François de La Vieuville et maîtresse officielle du régent Philippe d'Orléans. Ruinée par la vie fastueuse quelle mène à la cour, elle est contrainte de vendre en 1738 ses terres du Blanc, dont, entre autres, celles de Forges, à Claude Dupin de Franceuil. Fermier général et seigneur de Chenonceaux, Claude Dupin était aussi conseiller du Roi Louis XV. Il demeurait à Paris et était le grand-père de George Sand. Après sa mort, Forges passe entre les mains de son petit-neveu Claude de Villeneuve, qui le vend à Léon Chézeau, paysan, qui le cède ensuite à Fernand Aubier,  qui le remet en état, tel qu'on le voit aujourd'hui. Ses héritiers, enfin, le vendent à la vicomtesse Félix de Poix, grand-mère du propriétaire actuel.    Le château des forges est classé au titre des M.H. depuis le 26 octobre 1964. Chambres d'hôtes.","architecture":"FORGES, cette forteresse citée au début du XIVe siècle est l'une des mieux préservées de sa région et n'a pas subi d'aménagements ultérieurs qui auraient pu altérer sa cohérence esthétique. Elle est composée d'un donjon carré, flanqué aux angles de quatre tours rondes et entouré de trois côtés de murailles sur lesquelles sappuient cinq tours percées darchères, dont lune constitue le colombier.   Il comporte donjon et courtine, est cantonné de tours avec bâtiments de communs entourant la petite cour intérieure. Le donjon massif, carré, présente une tour à chacun de ses angles                                                                                      ROCHES, du XVe siècle. Des aménagements ont été pratiqués au XVIIe siècle, construction d'un escalier rampe sur rampe coiffé d'un toit en pavillon et celle d'une cheminée monumentale. Il existe une description précise en 1714. En 1868, des travaux ont été réalisés pour le baron de Villeneuve,  deux projets différents ont été dressés par Dauvergne en 1868. Le programme exécuté est le suivant : destruction des bâtiments anciens à l'exception du château proprement dit et de la dépendance à l'ouest, construction d'une tour à l'angle sud-ouest, réfection des charpentes et des toitures, remaniement de la façade sud (la porte d'entrée, la lucarne, la corniche), des pignons, construction d'une chapelle et des dépendances. Quelques transformations ont eu lieu vers 1990, la destruction de la tour carrée nord-est du XVIIIe siècle et celle de la cheminée du XVIIe siècle.","habitants":"Claude Dupin de Franceuil\r\n        \r\n        \r\n        \"","divers":"A Concremiers château des  Forges,46° 35' 30' Nord, 1° 01' 11\" Est grav de 1 à 6.                                                                      Les Roches grav 7","gps":"","images":["../image/image_36/36_Concremiers_1.jpg","../image/image_36/36_Concremiers_2.jpg","../image/image_36/36_Concremiers_3.jpg","../image/image_36/36_Concremiers_4.jpg","../image/image_36/36_Concremiers_5.jpg","../image/image_36/36_Concremiers_6.jpg","../image/image_36/36_Concremiers_7.jpg"]},"Consult_chateau_formulairefb59":{"id":"Consult_chateau_formulairefb59","dept":"36","canton":"Levroux","commune":"Buxeuil","nom":"Cormaillon","type":"Château","periode":"XIX","histoire":"CORMAILLON Bernardin de Cormaillon est cité au XVe siècle. Plus tard, Blanche de Mansart épouse le seigneur de Poulaines. Au XIXe siècle, le château appartient à un Berruyer, Jacques Douard des Gadeaux. Par alliance, il passe à la famille Devaulx de Chambord, dont descend l'actuelle propriétaire.","architecture":"CORMAILLON  Simple logis gothique de belle apparence qui, sans habitat noble ou bourgeois au XIXe siècle, a conservé sa pureté, Cormaillon est composé d'un corps de bâtiment unique à toiture très pentue, des ouvertures à meneaux d'un côté et de l'autre des fenêtres cintrées du XVIIIe siècle. L'aménagement a été réalisé du côté de la cour et de la belle tourelle ronde d'escalier. Les chaînages d'angle laissent apparaître des traces d'anciennes échauguettes. L'édifice pouvait accueillir deux lances de cavalerie, soit une trentaine de soldats.","habitants":"Famille Devaulx de Chambord,\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Cormaillon à Buxeuil","gps":"","images":["../image/image_36/36_Cormaillon_1.jpg"]},"Consult_chateau_formulairec5a8":{"id":"Consult_chateau_formulairec5a8","dept":"36","canton":"Rosnay","commune":"Cosnay","nom":"Cosnay","type":"Château","periode":"XVII","histoire":"COSNAY,  en 1292, parmi les fiefs relevant de La Châtre, se trouve celui du chanoine Hugonin de La Châtre qui disposait d'une maison à Cosnay. Au XVIIe siècle, la seigneurie de Cosnay, elle fut la résidence de l'écrivain Laisnel de La Salle (1801-1871), ami de George Sand et surtout célèbre pour ses ouvrages de folklore. Il laissa, entre autres, un manuscrit : Fastes de Cosnay.\r\nLa construction du château actuel, par M. Lemoine, maire de Lacs, date de 1907. Des pierres sculptées ainsi qu'une porte à gros clous provenant de la demeure d'origine y ont été remployées.","architecture":"COSNAY, la construction du château actuel, par M. Lemoine, maire de Lacs, date de 1907. Des pierres sculptées ainsi qu'une porte à gros clous provenant de la demeure d'origine y ont été remployées. Au XVIIe siècle, la seigneurie de Cosnay, que borde l'Igneraie, consistait en une maison-forte, trois corps de logis, entouré de fossés avec droit de pont-levis, moulin à blé, fuye à fond et garenne garnie d'un fort et gros buisson avec droit de vénerie. De cet ensemble subsistent encore l'ancienne poterne, le moulin ainsi qu'un petit bâtiment d'habitation.","habitants":"l'écrivain Laisnel de La Salle\r\n        \r\n        \"","divers":"Château de Cosnay","gps":"","images":["../image/image_36/36_Cosnay_1.jpg"]},"Consult_chateau_formulaire3c09":{"id":"Consult_chateau_formulaire3c09","dept":"36","canton":"La Châtre","commune":"Verneuil sur Igneraie","nom":"Coudray","type":"Château","periode":"XV-XVII","histoire":"COUDRAY, au fil des années, a été très remanié au début du XIXe siècle, par son propriétaire Charles Robin Duvernet, le château du Petit Coudray est devenu un incontournable pour tous ceux qui veulent découvrir les sites sandiens. En effet, c'est ici qu'Aurore Dupin, future romancière à succès plus connue sous le nom de George Sand, rencontre Jules Sandeau. Avec lui, elle discute, écrit, philosophe, aime, revit. En juillet 1830, le jardin du Coudray est  comme qui dirait le point de concours où nos deux planètes sont venues se rencontrer pour faire ensuite le voyage de la vie en commun  (Histoire de ma vie, George Sand). Lydie et Pierre Rauzy vous accueillent dans cette maison de maître des XVe et XVIIe siècles dont ils sont tombés amoureux et qu'ils ont restaurée avec application. Un joli coup de coeur. Des animations sont organisées l'été (concerts, contes). Dans l'histoire littéraire, Le Coudray est le lieu où la baronne Dudevant rencontra Jules Sandeau le 30 juillet 1832 et allait partager une partie de sa vie et de son nom en devenant George Sand. Aujourd'hui  Mme de Lezy.","architecture":"COUDRAY, sur le sommet d'un coteau dominant la vallée de l'Igneraie, c'est le siège d'un ancien fief féodal mentionné dans un aveu du XIIIe siècle. Ce corps de logis élevé comportant deux étages, a été très remanié au début du XIXe siècle. Le bâtiment du XVe siècle, consistait en une maison carrée  flanquée d'une tour au milieu. Les murs épais étaient percés de meurtrières. De nos jours, le pignon ouest conserve son mur massif. Au deuxième étage subsiste une petite fenêtre à linteau et pied-droit à cavet du XVe siècle. L'écrivain regrettait les transformations de ce qui avait été une  maison ornée de son escalier extérieur en pierre et de son perron massif. Un demi siècle plus tard, dans la maison voisine des Épingués, se réunit un groupe d'artistes régionalistes.","habitants":"Famille de Charles Robin Duvernet\r\n        \r\n        \"","divers":"Le château de Coudray grav 1-2-3 et l'hôtel.","gps":"","images":["../image/image_36/36_Coudray_1.jpg","../image/image_36/36_Coudray_2.jpg","../image/image_36/36_Coudray_3.jpg","../image/image_36/36_Coudray_4.jpg"]},"Consult_chateau_formulaire8230":{"id":"Consult_chateau_formulaire8230","dept":"36","canton":"Eguzon-Chantôme","commune":"Cuzion","nom":"Cuzion","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à  Cuzion celui de Bonnu, de Châteaubrun et de Couveilles.                                                                                                                           BONNU, à l'origine, Bonnu était une tour de signaux qui servait de relais entre les châteaux des environs : Crozant, Châteaubrun, la Prune au Pot, Éguzon, qui formaient au Moyen-Âge une ceinture de défense. On sait très peu de chose sur les propriétaires de cette petite forteresse édifiée aux XIIIe et XIVe siècles. Parmi eux, on trouve en 1439, Marguerite Remironne, veuve de Guillaume Vincent, seigneur de Bonnu, en 1613, Françoise de Poyenne, veuve de Louis Ajasson, et, en 1768, Charles de Maussabré. Mais c'est grâce à la famille lyonnaise Sérullaz que le château a retrouvé sa noblesse. Henri Sérullaz l'achète en 1906 et entreprend d'importants travaux sous la direction de M. Trolliet, architecte: les fossés sont recreusés et remis en eau, et les restaurations confèrent à l'ancienne forteresse plein de pittoresque. L'épouse du poète Maurice Rollinat était la sur d'Henri Sérullaz, dont le fils, Maurice, artiste peintre et conservateur au musée du Louvre, continua son uvre. Le domaine bénéficie depuis quelques années d'une campagne de restauration exemplaire menée par son nouveau propriétaire.                                                                                                                                               CHATEAUBRUN, une tradition attribue la construction de la demeure à Hugues le Brun, sire de Lusignan, comte de la Marche de 1180 à 1208. Antoine de Forges, vécut dans le vieux château de Châteaubrun en ruines et inspira à George Sand, son roman. Le Péché de Monsieur Antoine . Aujourdhui restauré, l'édifice présente une collection des uvres du potier, sculpteur et propriétaire Guy Baudat. Aujourd'hui propriété de Mlle Marthe Brasseur.                                                                                                                 COUVEILLES, pas d'historique.","architecture":"CHATEAUBRUN, à la Révolution, la place présentait un fossé cerné d'une enceinte, complétée d'ouvrages avancés. Un pont-levis accédait à une porte ogivale à double herse, défendue par une tour à mâchicoulis et meurtrières. Dans la cour s'élève le donjon de 7 étages dont l'accès se fait à plusieurs mètres au-dessus du sol. Le logis seigneurial carré était flanqué d'une échauguette ronde à chaque angle et occupait la partie sud de l'enceinte. Des communs étaient adossés à l'enceinte. L'intérieur du château s'ornait de peintures murales. Aujourdhui restauré, l'édifice présente une collection des uvres du potier, sculpteur et propriétaire Guy Baudat. Ces sculptures monumentales trouvent, dans ce cadre historique, un formidable écrin qui les met en valeur, et fait ressortir leurs forces et leurs messages                                                                                          COUVEILLES, l'alliance de la brique et de la pierre calcaire peut paraître incongrue dans l'environnement granitique de la vallée de la Creuse. Sans doute est-ce par goût de la fantaisie que le propriétaire de ce château, bâti dans les dernières années du XIXe siècle, choisit ce parti. Deux tours octogonales surmontées de toits en poivrière très pentus, encadrent le logis à un étage couvert d'ardoise. Les lignes blanches verticales qui rythment les façades et les tours, les encadrements des portes sont en pierre,  des baies et des lucarnes centrales sont comme d'aimables allusions à la fois au répertoire de la Renaissance et au style classique.","habitants":"Bonnu; famille de Henri Sérullaz                                      Chateaubrun; famille de Hugues le Brun\r\n        \r\n        \"","divers":"a Cuzion le château de Bonnu  de Châteaubrun; 46° 28' 03\" Nord, 1° 36' 12\" Est","gps":"","images":["../image/image_36/36_Cuzion_1.jpg","../image/image_36/36_Cuzion_2.jpg","../image/image_36/36_Cuzion_3.jpg","../image/image_36/36_Cuzion_4.jpg","../image/image_36/36_Cuzion_5.jpg","../image/image_36/36_Cuzion_6.jpg","../image/image_36/36_Cuzion_7.jpg"]},"Consult_chateau_formulaire9054":{"id":"Consult_chateau_formulaire9054","dept":"36","canton":"Argenton sur Creuse","commune":"Célon","nom":"Célon","type":"Château","periode":"XV","histoire":"CELON, au XIIIe siècle, le fief de Celon se composait dun simple hébergement entouré de fossé et de pêcheries, ayant droit de haute et basse justice. Il dépendait de la châtellenie dArgenton. Pierre de la Marche fait aveu et dénombrements de Celon au seigneur dArgenton en 1291. Le mariage d'Hélie de Céris, chevalier des Ternes, avec Marguerite Foucault de Saint-Germain en 1398, fait passer le domaine dans la famille des de Céris. Cest Jean de Céris, seigneur des Ternes et de Celon, qui bâti probablement le château actuel vers 1458. Le manoir est décrit ainsi dans un aveu de dénombrement en 1476,  La propriété demeura dans cette famille jusquau mariage de Renée de Céris avec Pierre de Douhault. A la veille de la Révolution, le manoir appartient à la famille de Lagarde, qui le restaure et le remanie. Cest vers 1820 quont été accolée au manoir, les communs avec sa triple charpente. Une maison pour des serviteurs fut construite à la même époque face au château. Aujourdhui, le fief est la propriété de la famille Guez Kaslin qui le restaure avec l'aide d'un certains nombre d'artisans de la région. En faisant le maximum pour lui redonner la force et la beauté de ce passé glorieux.","architecture":"CELON, place forte et manoir de Cellon avec les prés, clotures de fossés, basse-cour, bergerie et vol de chapon . Manoir, place cloturée.  Corps de logis  rectangulaire à trois niveaux inséré entre deux tours rondes à cinq niveaux chemin de rondes sur mâchicoulis à toit en poivrières .","habitants":"Famille des de Céris\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Célon","gps":"","images":["../image/image_36/36_C%c3%a9lon_1.jpg","../image/image_36/36_C%c3%a9lon_2.jpg"]},"Consult_chateau_formulaire3f9d":{"id":"Consult_chateau_formulaire3f9d","dept":"36","canton":"Issoudun-nord","commune":"Paudy","nom":"Dangy","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Dangy celui de Dangy et de Paudy.                                    DANGY, les terres furent la propriété depuis 1448 des chanoines de Sainte-Croix dOrléans. Pendant la Révolution, il est saisi et vendu comme bien national. Le château actuel est édifié en 1843 et est la propriété de Pierre-Arthur de la Villegille, aide de camp du Duc dAumale pendant la prise de la Smala dAbdel kader en 1843. Cette demeure a été occupée sans interruption par les descendants dArthur de la Villegille, le dernier étant Jean Millescamp, aide de camp de son altesse sérénissime le Prince Louis II de Monaco. Son fils le prince Rainier, qui aimait le château, a souvent séjourné à Dangy. Aujourd'hui, ce magnifique château appartient à la famille Coste qui l'a réhabilité et lui a redonné une nouvelle vie.                                                                      PAUDY-TOUR, le constructeur du château pourrait être Raoul de Déols, seigneur d'Issoudun de 1092 à 1164. Au milieu du XIIIe siècle, il fut transmis à un parent du Roi Louis IX, Raoul de Courtenay. Au début de la guerre de Cent Ans, il passa par alliance à Jean de La Personne, chambellan du duc de Berry. Dans la première moitié du XVe siècle, il était à \"l'écorcheur\" Jean de Blanchefort (mercenaire armagnac)","architecture":"DANGY, le château se compose d'un corps de bâtiment quadrangulaire d'inspiration Renaissance, flanqué en façade d'une tour cylindrique coiffée d'un toit conique, et accosté sur un de ses angles d'une tour hexagonale attribuée à l'architecte Goubault, disciple de Viollet le Duc.                                                          PAUDY-TOUR, cette tour est le seul reste de l'ancien château du XIIe siècle et servait de porte d'entrée à la forteresse. Le plan en est carré, sauf une tourelle d'escalier sur la façade sud. La porte est conservée, avec sa voûte et l'emplacement des herses et du pont-levis. Au-dessus se trouvent deux salles avec trois cheminées. La charpente et la toiture datent du XVIIIe siècle. Des quatre tours, dont le château était flanqué, aucune ne subsiste dans son entier, et le pont levis a disparu vers 1810. Ce donjon est un exemple bien conservé d'architecture militaire.","habitants":"Dangy; Famille de Pierre-Arthur de la Villegille                                    Paudy; Jean de La Personne,\r\n        \r\n        \"","divers":"Château de Dangy grav 1-2,    47° 02' 20\" Nord et 1° 55' 10\" Est;  latour  de 3 à 6.","gps":"","images":["../image/image_36/36_Dangy_1.jpg","../image/image_36/36_Dangy_2.jpg","../image/image_36/36_Dangy_3.jpg","../image/image_36/36_Dangy_4.jpg","../image/image_36/36_Dangy_5.jpg","../image/image_36/36_Dangy_6.jpg"]},"Consult_chateau_formulaired3a7":{"id":"Consult_chateau_formulaired3a7","dept":"36","canton":"Ardentes","commune":"Diors","nom":"Diors","type":"Château","periode":"XV","histoire":"Deux châteaux à Diors  celui  ayant appartenu aux princes de Graçay et l'autre Montaboulin                                                                                                     DIORS, différentes familles se sont succédé sur les terres du château. La chapelle de Diors fut construite vers 1830 par Charles-Célestin Lucq, un riche armateur belge résidant à Cannes et qui fut l'un des propriétaires du domaine. En 1850, sa fille Alice-Marie inaugure dans les bois, entre Diors et Ablenay, un oratoire en pierre abritant la petite Bonne Dame des bois de Diors, une statue de la Vierge installée depuis de nombreuses années dans un tronc de chêne. Tous les 15 août, une messe est toujours dite à cet oratoire. En 1932, Charles-Armand de Gontaut-Biron fit transformer l'intérieur de la chapelle de Diors, qui devient Notre-Dame des Ailes, en l'honneur des aviateurs présents au camp de la Martinerie. En mars 1942, il contribua à la construction du Logis des jeunes, où de nombreux scouts se retrouvaient.\r\nDiors a été bombardée le 17 août 1944 par l'aviation américaine à la suite d'un faux renseignement concernant la présence des troupes allemandes qui avaient réquisitionné le château et une partie des communs. Le château a été en grande partie détruit. Seule la chapelle proche a été épargnée. Le musée de guerre berrichon fut construit à la demande de la comtesse Gaston de Gontaut-Biron dans les communs du château pour entretenir le culte de la patrie. Il contenait des souvenirs de 1870, 14-18, 39-45, l'Indochine, l'Algérie, Suez.","architecture":"DIORS, en 1944, lHistoire sinvite dans les flammes au sein de cette commune tranquille de lIndre lorsque les forces américaines bombardent le château, convaincues que ce dernier abrite des officiers allemands. En vérité ces derniers ont déjà quitté les lieux. Lévénement ne fait, fort heureusement, aucune victime. Mais les bombes incendiaires se déclenchent le lendemain matin et réduisent en cendres le château et une partie des dépendances sont abimées.                                                 MONTABOULIN, était un fief de la seigneurie de Vouillon, un aveu de 1380 nous apprend que le fief de Montaboulin comprenait le château, un colombier et un arpent de vigne. En 1504, Jean de Mareuil occupe le château. A la fin du XVIIIe siècle, il appartint à Henri Edme Crublier d'Opterre de 1772 à 1810, député à l'Assemblée législative et général de la Révolution, à son gendre Dupertuis, puis au conseiller de préfecture Trumeau qui le légua à son neveu Aucheron de Lescherolles, dont les descendants le possèdent encore aujourd'hui. D'allure XVIIe siècle, le château de Montaboulin se compose d'un logis accosté de deux pavillons plus modestes et encadré de communs. Deux tours circulaires rappellent l'ancienne enceinte.","habitants":"Diors; Famille de Charles-Célestin Lucq                                        Montaboulin; Famille de Jean de Mareuil \r\n        \r\n        \"","divers":"Château de Diors et de Montaboulin","gps":"","images":["../image/image_36/36_Diors_1.jpg","../image/image_36/36_Diors_2.jpg","../image/image_36/36_Diors_3.jpg","../image/image_36/36_Diors_4.jpg","../image/image_36/36_Diors_5.jpg","../image/image_36/36_Diors_6.jpg"]},"Consult_chateau_formulaire58ae":{"id":"Consult_chateau_formulaire58ae","dept":"36","canton":"Le Blanc","commune":"Douadic","nom":"Douadic","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux à Douadic celui d'Avignon, de Bon Asile et du Pin.                                                                                                                                                                                                              AVIGNON, ce fief mouvant de château Naillac  est vendu en 1442 par les Maugivray aux Morelon. Les Tarade effectuent une importante restauration, achevée en 1879 et 1882, de nombreux détails sont modifiés et l'enceinte avec tour est détruite, restauration partielle en 1967-1968 pour le docteur Remérand, les quatre tours, dont celle de l'escalier et la tourelle sur cul-de-lampe, portent un toit conique, et la partie nord du bâtiment, un toit en pavillon.                                                                                      BON-ASILE, qui appartenait en 1607 à Gaspard de Rochechouart. situé à proximité du siège de l'ancien fief de Dasdé qui faisait partie de la seigneurie du Bouchet en Brenne, Bon Asile fut bâti vers 1837 par le comte Beugnot puis agrandi vers 1857. Quelques années plus tard, le domaine était augmentée par la construction d'une maison de gardien et d'une ferme. À la fin du XIXe siècle, le château passa à la famille Dollfus qui la conserva jusque dans les années 1960.                                                              PIN,   à lemplacement dun petit rendez-vous de chasse, les Pinault de Bonnefonds construisirent au XVIIe siècle un élégant manoir.  Transmit aux Liron dAiroles en 1869,  Le livre de raison de M. Pinault de Bonnefonds, écrit en 1774, atteste de la construction progressive du domaine du Pin depuis 1504. Il y relate les différents travaux de confort ou de sécurité réalisés. Marc et Elisabeth Zacharie sont pour leur part tombés amoureux du Pin en 1995. toujours dans la descendance.","architecture":"AVIGNON, la partie nord du manoir, avec la tour nord-ouest et celle de l'escalier, pourrait remonter au milieu ou de la deuxième moitié du XVe siècle, le reste, avec deux tours et une tourelle d'escalier sur cul de lampe, est élevé dans la première moitié du XVIe siècle.                                                                                             BON-ASILE, il était amputé de ses ailes, ne conservant que le corps central. Aujourd'hui le château, haut de deux étages, est couvert d'un toit à croupe d'ardoise. Il est marqué en milieu de la façade d'un avant-corps saillant à trois travées couronné d'un pignon couvert. Plaquée contre ce dernier se trouve une tribune à laquelle on accède par un escalier monumental. À peu de distance, les bâtiments de la ferme s'organisent autour d'une cour, dont l'entrée est encadrée de deux tours à toit en poivrière, sans doute les vestiges du château.                                                                                                        PIN,son aspect actuel. En 1873, un étage supplémentaire fut élevé, les ardoises remplacèrent les tuiles et une avancée fut construite sur le parc.","habitants":"Avignon;Maugivray aux Morelon                                                                      Bon-Asile; famille Dollfus                                                        Pin;les Pinault de Bonnefonds\r\n        \r\n        \"","divers":"à Douadic celui d'Avignon, de Bon Asile et du Pin.","gps":"","images":["../image/image_36/36_Douadic_1.jpg","../image/image_36/36_Douadic_2.jpg","../image/image_36/36_Douadic_3.jpg"]},"Consult_chateau_formulaire64bb":{"id":"Consult_chateau_formulaire64bb","dept":"36","canton":"Eguzon-Chantôme","commune":"Eguzon-Chantôme","nom":"Eguzon_Chantome","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Eguzon dont celui d'Eguzon  de Faisceau et de Clavière. EGUZON : il fut racheté en 1791 par Denis Robin de Scévole. Aujourd'hui il ne reste plus que le porche. La commune l'a racheté en 2000 et a installé les bureaux de la mairie à l'intérieur. Certaines tours sont particulières avec un éperon au-dessus des douves. Le portail à mâchicoulis existe encore, mais le pont-levis a été maçonné. A l'intérieur de l'enceinte se trouvent des bâtiments modernes : un manoir et une bergerie du XVIIIe siècle, les communs du XIXe siècle, le tout rebâti sur le corps de logis du XVe siècle et sur les restes du chastel du XVIIe siècle. L'ensemble doit sans doute conserver des salles et galeries souterraines non encore explorées.                                                                       FAISCEAU, au cur de la forêt domaniale qui lui valut son nom, s'élève le château du Faisceau. Appartenant à M. de Jaurnou.  Cet édifice fut construit au début du XXe siècle, dans un style néo-Louis XIII, sur les plans d'un architecte monsieur Trollier de Saint-Gaultier.                                                                                                            CLAVIERE, la demeure actuelle a été construite de 1645 à 1650 par Étienne de Chamborant, lieutenant général, gouverneur de Philipsbourg. L'édifice fut établi sur les vestiges d'une place forte féodale appartenant aux domaines des familles de Brosse, puis de Forges jusqu'en 1267, date à laquelle Marguerite de Forges l'apporte en dot à Pierre de Chamborant. En 1731, la Clavière fut vendue à Martial Morel, baron  de Fromental, dont la femme était la tante maternelle du général Bertrand.Ce dernier à son retour de Saint-Hélène, fit un séjour à la Clavière. le dernier propriétaire le marquis André-Claude de Chamborant de la Clavière était colonel-mestre de camp du régiment de Chamborant-hussards.","architecture":"CLAVIERE, le château est composé d'un corps de logis à deux niveaux en pierre de granite, prolongé à chacune de ses extrémités d'une aile rectangulaire qui se développe perpendiculairement, les bâtiments ainsi disposés délimitent une cour d'honneur, qui est précédée d'une avant-cour, plus vaste, entourée de bâtiments agricoles. Les toitures très hautes sont animées par des ressauts.\r\n EGUZON, forteresse fondée au XIIe siècle. Au XVIIe siècle, elle comprenait des douves entourées de hautes murailles, flanquées de huit tours.  A l'intérieur se trouvait le pavillon, des corps de logis,  de ces éléments subsistent les enceintes, deux des tours ayant conservé leurs toitures. Les tours comportent de un à trois étages consistant en salles de tir et de défense faisant de cette édifice un spécimen de l'architecture militaire.                                                                                             FAISCEAU, au cur de la forêt domaniale qui lui valut son nom, s'élève le château . À une forme très traditionnelle, de style classique avec ses toitures d'ardoises, ses lucarnes et ses belles façades décorées. Le château se présente comme un vaste corps de bâtiment quadrangulaire, accosté de deux pavillons eux-mêmes flanqués d'une tour carrée. L'ensemble se décline en façades rythmées de travées régulières et comprend, en élévation, trois niveaux sous un niveau de combles. En plus des effets polychromes, l'ornementation est importante. Ainsi le deuxième étage du corps de bâtiment est éclairé par des fenêtres couronnées d'un fronton semi-circulaire, l'axe central est marqué par un avant-corps en légère saillie sommé d'un fronton cintré brisé. Les combles reçoivent le jour par une série d'ils-de-buf. Des balcons à balustrades ponctuent le pourtour, tandis que des pilastres nus scandent les angles.","habitants":"Clavière;  Étienne de Chambrant                              Faisceau; Trolliet\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Eguzon dont celui d'Eguzon grav 1à 5  de Faisceau grav 7 et de Clavière grav 8- 9.","gps":"","images":["../image/image_36/36_Eguzon_1.jpg","../image/image_36/36_Eguzon_2.jpg","../image/image_36/36_Eguzon_3.jpg","../image/image_36/36_Eguzon_4.jpg","../image/image_36/36_Eguzon_5.jpg","../image/image_36/36_Eguzon_6.jpg","../image/image_36/36_Eguzon_7.jpg","../image/image_36/36_Eguzon_8.jpg","../image/image_36/36_Eguzon_9.jpg"]},"Consult_chateau_formulaired3d5":{"id":"Consult_chateau_formulaired3d5","dept":"36","canton":"Ardentes","commune":"Etrechet","nom":"Etrechet","type":"Château","periode":"XV","histoire":"Deux châteaux à Etrechet celui d'Auzans st celui de Fougères.                                                                            AUZANS, inscrit dans un cadre boisé, le château d'Auzans fut précédé, en 1292, d'un \"chasaul\" que Guillaume Buret reconnaissait tenir du seigneur de Châteauroux, avec droit de basse justice. Le fief fut possédé aux XVe et XVIe siècles par la famille de Barbançols. En 1545, la maison et lieu noble d'Auzans était accompagnée d'une chapelle, placée sous le vocable de Notre Dame, fut visitée en 1736 par l'archevêque de Bourges. C'est à Martin Bouchet, seigneur du lieu, que l'on doit l'édification du logis actuel, à la fin du XVIIIe siècle. La demeure passa ensuite au père du général Bertrand, et à ses descendants, les Duris-Dufresne.                                                                                                                   FOUGERES,  une famille chevaleresque de Fougères existe en 1292. Au XVe siècle, le château passe aux Chamborant puis aux La Roche-Aymon. La famille conserve l'édifice jusqu'en 1563, date à laquelle le domaine tombe dans le douaire de Marie Stuart, reine d'Écosse et veuve du Roi de France  François II.","architecture":"AUZANS, plusieurs remaniements, survenus au cours du XIXe siècle et au début du XXe siècle, ont remodelé l'édifice, avec adjonction d'une aile en équerre,surélévation de la tour carrée et la réalisation d'un décor néo-gothique. L'ancien pigeonnier a été conservé, intégré au parc aménagé par l'architecte Arveuf.                                                                                                                                             FOUGERES le logis est composé d'un corps de bâtiment rectangulaire à un étage, flanqué de tours circulaires et couvert d'une longue toiture d'ardoises à quatre pans. La façade se développant côté parc est la plus symétrique et présente six travées. La décoration est réservée aux lucarnes à pinacles gothiques, la façade côté cour a conservé ses fenêtres à meneaux de pierre. La tour, qui abrite la cage d'escalier, est percée d'une belle porte d'entrée dont le décor allie le style gothique finissant et celui du début de la Renaissance. Une tour ronde, ancien colombier, est visible près du château. Les communs abritent des écuries et un chenil de l'équipage bien connu du Bois Chaut Bas Berry.","habitants":"Auzans; famille de Barbançols                                              Fougères; douaire de Marie Stuart,\r\n        \r\n        \"","divers":"Château à Etrechet; Auzan grav 1-2 de Fougères grav 3-4","gps":"","images":["../image/image_36/36_Etrechet_1.jpg","../image/image_36/36_Etrechet_2.jpg","../image/image_36/36_Etrechet_3.jpg","../image/image_36/36_Etrechet_4.jpg"]},"Consult_chateau_formulairee03e":{"id":"Consult_chateau_formulairee03e","dept":"36","canton":"Issoudun-Nord","commune":"Reuilly","nom":"Ferté_Reuilly","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Reuilly celui de la Ferté et celui d'Ormeteau.                                                                        FERTE, au XIe siècle le fief appartient aux vico
