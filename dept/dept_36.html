ps":"","images":["../image/image_36/36_Villentrois_1.jpg","../image/image_36/36_Villentrois_2.jpg","../image/image_36/36_Villentrois_3.jpg","../image/image_36/36_Villentrois_4.jpg"]},"Consult_chateau_formulaireee6b":{"id":"Consult_chateau_formulaireee6b","dept":"36","canton":"Châtillon-sur-Indre","commune":"Le Tranger","nom":"Villeret_Mardelle","type":"Château","periode":"XV","histoire":"La MARDELLE, le premier seigneur connu est Jean Hérissard, seigneur de Vitray en 1535, marié à Antoinette de Maussabré, succède Jean Raoulx, puis au XVIIe siècle la famille de Thienne. En 1819, le château de la Mardelle appartient à Claude Pocquet, anobli par Louis XVIII en 1823. Ses descendants posséderont la demeure jusqu'en 1980.                                                                                      VILLERET, le premier acte citant Villeret date du 30 janvier 1490 et concerne un accord entre Louis de Marafin, seigneur de Notz-Marafinet Jean de Crevant, seigneur de Beauché, tous deux importants seigneurs de la région. Le 23 février 1695, la seigneurie appartient à Marie de Boisgaultier, épouse de Nicolas Pellerin de Beauvais, lieutenant criminel au bailliage de Châtillon-sur-Indre. Les Pellerin de Beauvais conservent Villeret jusqu'à la fin du XVIIIe siècle.  .","architecture":"La MARDELLE, le château actuel, entouré sur trois côtés de fossés, résulte de la construction d'une maison classique bâtie en 1822, entre deux des quatre tours du XVe siècle qui constituent l'enceinte du château primitif. Avant la Révolution, le logis seigneurial était situé entre les deux autres tours, maintenant isolées. Les quatre tours à mâchicoulis, construite en bel appareil de tuffeau, couvertes d'ardoises, conservent leur architecture d'origine, notamment une chapelle sur croisée d'ogives ainsi qu'une autre pièce de même construction. Les vastes communs, de belle ordonnance, recouverts en tuile, datent du début du XIXe siècle, mais englobent des éléments plus anciens tels que le pigeonnier carré.                                                                                              VILLERET, quelque peu dégradé, entouré de bâtiments agricoles, Villeret a conservé son logis percé d'ouvertures régulières surmonté d'un toit en tuiles à quatre pentes, trois tourelles d'angle et une tour carrée qui délimitent les douves, en partie comblées. On peut encore voir sur la façade ouest, l'ancien pont-levis qui donnait accès à la cour. Une restauration drastique a récemment été effectuée.","habitants":"Villeret Famille de Nicolas Pellerin de Beauvais                                Mardelle; Famille de Thienne\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_36/36_Villeret_Mardelle_1.jpg"]},"Consult_chateau_formulaire9d7a":{"id":"Consult_chateau_formulaire9d7a","dept":"36","canton":"Mézières-en-Brenne","commune":"Villiers","nom":"Villiers","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Villiers celui de Burlande et celui de Fromenteau.                                                                    BURLANDE, au XVe siècle, la seigneurie de Burlande appartenait à la famille de Mursins qui la conserva jusqu'au XVIIe siècle. En 1653, elle fut vendue par adjudication à Louis de Buade, comte de Frontenac, seigneur de Palluau. Puis la demeure revint au chapitre Sainte-Marie-Madeleine de Mézières, qui la posséda jusqu'à la Révolution.                                                                            FROMENTEAU, la légende selon laquelle Agnès Sorel serait née et aurait possédé la seigneurie de Fromenteau résulte d'une confusion; en effet, la maîtresse de Charles VII étant dame de Beauté et de Fromentel ou Fromenteau, tous deux situés en Brie. Le fait qu'Agnès Sorel ait résidé à Loches et qu'Hector de La Jaille vendit, en 1452 la seigneurie à la collégiale de Loches a sans doute accrédité cette tradition bien ancrée car la place du village porte maintenant le nom d'Agnès Sorel. En 1789, Marie-Sophie Scheneck de Schmittbourg est qualifiée dame de Fromenteau. L'actuel château a été élevé au milieu du XIXe siècle par le comte Magallon de la Morlière qui possédait Fromenteau en 1841 ou par ses successeurs, les familles Morillon et Verbeckmoës.   Dans la famille  de Mme du Joncquoy.","architecture":"BURLANDE, il subsiste la poterne qui donnait accès à la cour intérieure et le pigeonnier avec ses cases. En bordure des anciennes douves se trouve un bâtiment avec fenêtres à meneaux. Le puits du château existe toujours. Des bâtiments plus récents se sont ajoutés aux vestiges.                                                  FROMENTEAU, construit dans le style Louis XIII, il comporte un haut pavillon à trois travées, surmonté d'un toit d'ardoises à forte pente et flanqué de deux ailes en rez-de-chaussée. La cour d'entrée est encadrée de communs à toits de tuiles; un pavillon de chasse décoré sur ses façades de trophées de chasse et un chenil où s'élève une tourelle insolite.","habitants":"Burlande; Famille de Mursins                                       Fromenteau; Agnès Sorel\r\n        \r\n        \r\n        \"","divers":"à Villiers celui de Burlande grav 1 et celui de Fromenteau grav-2.","gps":"","images":["../image/image_36/36_Villiers_1.jpg","../image/image_36/36_Villiers_2.jpg"]},"Consult_chateau_formulaire842d-2":{"id":"Consult_chateau_formulaire842d-2","dept":"36","canton":"Levroux","commune":"Vineuil","nom":"Vineuil","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Vineuil celui de la Rivière et celui de Prahas.                                                                                           LA RIVIERE, l'actuel château de La Rivière, situé au bord de la Trégonce, date du XVIIIe siècle. Mais le site est plus ancien et la première mention remonte au XVe siècle, en 1457, le seigneur de Châteauroux interdit à Pierre de La Vrille, bourgeois et marchand de Châteauroux, de tenir colombier à La Rivière. Ce fief noble fut acquis par Simon Mathieu en 1528. Dans la première moitié du XVIIe siècle, on trouve à sa tête une succession de noms différents: Pierre de La Rivière en 1629, Jean Pataud en 1644 ou Claude Vigner en 1649. On ne sait s'ils furent seigneurs de La Rivière où s'ils se la partagèrent en petite et grande rivière.                                                                                PRAHAS, Ernest Desjobert de Prahas fit bâtir en 1870 ce château dans l'esprit des XVIe et XVIIe siècles,  sur la terre des Villemartins qu'avait acquise, en 1822 son grand-père François Patureau de Miran de M. Duris Dufresne, héritier de la famille Bertrand. Le nom de Prahas était celui d'un fief familial des Desjoberts à Culan. Le château est resté dans cette famille jusqu'à ces dernières années. Implanté au milieu  d'un grand parc boisé, il nécessitait une remise en état, ce qui est aujourd'hui chose faite","architecture":"La RIVIERE; est composé d'un corps de logis rectangulaire, marqué en son centre par un léger avant-corps sommé d'un fronton triangulaire percé d'un oculus, et deux lucarnes éclairent les combles situées sous le toit à croupes. Tout près, dans le jardin, s'élève un imposant colombier                                                                               PRAHAS  Le château est resté dans cette famille jusqu'à ces dernières années. Implanté au milieu  d'un grand parc boisé, il nécessitait une remise en état, ce qui est aujourd'hui chose faite.","habitants":"Rivière; Pierre de La Rivière                                       Prahas Ernest Desjobert de Prahas\r\n        \r\n        \r\n        \"","divers":"grav-12 Vineuil: 46° 54' 05\" nord, 1° 38' 10\" est.                             Prahas grav 2","gps":"","images":["../image/image_36/36_Vineuil_1.jpg","../image/image_36/36_Vineuil_2.jpg","../image/image_36/36_Vineuil_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','36 — Indre'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
