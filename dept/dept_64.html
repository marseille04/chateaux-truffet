ervent un décor du XVIIe siècle ou remanié au XVIIIe  siècle.","habitants":"Famille des  Camarasa  Bénédicte du Cheyron Monroe                                                                           Famille de Zacharie de Laffite\r\n        \"","divers":"Château de Cassaber (1) 43° 29' 35 nord, 1° 00' 38 ouest de Lassalle(2) et le château de Louastou grav 3 à Caresse-Cassaber","gps":"","images":["../../jctruffet.com/image/image_64/64_Cassaber_1.jpg","../../jctruffet.com/image/image_64/64_Cassaber_2.jpg","../../jctruffet.com/image/image_64/64_Cassaber_3.jpg"]},"Consult_chateau_formulaire6fbe":{"id":"Consult_chateau_formulaire6fbe","dept":"64","canton":"Oloron Ste-Marie","commune":"Castet","nom":"Castet","type":"Château","periode":"XI-XVI","histoire":"CASTET Le château de Mont-Disse, dit Castet, date en partie du XVIe siècle. Il fut constamment agrandi et remanié au cours des siècles suivants.  Perchée sur sa motte, en dehors du village, la Tour dAbadie conserve de splendides vestiges de lépoque où elle était une résidence des vicomtes dOssau et de Béarn. Au XIe siècle déjà, il appartient aux vicomtes de Béarn.","architecture":"Le château de Castet dit Tour dAbadie constitue le seul château dorigine vicomtal dans la vallée dOssau.  En 1450, celui-ci est cependant à moitié détruit. Il a été restauré en 1894-1895 puis en 1970. Il apparaît juché sur une butte haute de 3 mètres environ, construite en alluvions, afin de mieux dominer les alentours. Celle-ci était au Moyen-Âge ceinturée à sa base par une vaste enceinte polygonale construite au XIIIe siècle. Des lignes de retranchement en terre, dorigines plus anciennes, ceignaient également la butte à mi-pente. Le camp retranché englobe aussi léglise Saint-Polycarpe et le cimetière. Il ne reste de ce bâtiment que des vestiges, des pans de lenceinte qui surplombent le gave, construits en appareil moyen régulier.\r\nCastet  Construction du XVIe siècle, agrandie probablement dans les années 1770,  le petit château se compose dune salle carrée de 9 mètres de côté ; elle est flanquée au nord-est dune tour carrée de 4 mètres de côté en légère saillie, haute de 18 mètres et coiffée dun toit crénelé.","habitants":"Vicomtes de Béarn                                                            Famille de Hiton\r\n        \"","divers":"Vestige tour à Castet","gps":"","images":["../../jctruffet.com/image/image_64/64_Castet_1.jpg","../../jctruffet.com/image/image_64/64_Castet_2.jpg","../../jctruffet.com/image/image_64/64_Castet_3.jpg"]},"Consult_chateau_formulairec408":{"id":"Consult_chateau_formulairec408","dept":"64","canton":"Morlaàs","commune":"Lespourcy","nom":"Castet_Belloc","type":"Château","periode":"XVIII","histoire":"CASTET de BELLOC , situé en bordure dun parc, est au XVIIIe siècle le siège de la seigneurie de Lespourcy. La seigneurie de Lespourcy, érigée en baronnie en 1649. Ce château est aujourdhui une propriété privée. Il ne se visite pas.","architecture":"Un château  de Belloc est construit sur le territoire au XVIIIe siècle, puis complètement remanié au XIXe siècle. Il comprend un corps de logis principal et des dépendances où lon trouve un logement pour les domestiques, une grange, un poulailler, une porcherie qui forment une cour au nord.","habitants":"Seigneurie de Lespourcy\r\n        \"","divers":"Château de Belloc à Castet","gps":"","images":["../../jctruffet.com/image/image_64/64_Castet_Belloc_1.jpg"]},"Consult_chateau_formulairea59a":{"id":"Consult_chateau_formulairea59a","dept":"64","canton":"Orthez","commune":"Castetbon","nom":"Castetbon_Pimbo","type":"Patrimoine","periode":"XV-XVI","histoire":"CASTETBON, le site semble avoir été fortifié par les Vascons-Romains qui le nomment Castrum Bonom. Placé sur une butte offrant un large panorama, rapidement doté d'un enclos, le lieu voit sa population augmenter au XIIe siècle, le seigneur Arnaud Guilhem d'Audaux . Le petit bourg prend alors le nom de Castetbon-la-neuve.\r\n PIMBO, entouré de bois, le château de Pimbo est situé à lécart du bourg de Castetbon, sur une colline dominant la vallée du Saleys.\r\nDans les années 1333-1334, le seigneur de Pimbo achète plusieurs petites parcelles qui bordent son moulin, pour y faire bâtir une demeure. En 1538, le domaine sétend sur environ 70 hectares. Plus tard, la famille Laborde, seigneurs de Pimbo, siège aux États de Béarn. Aujourdhui, le château de Pimbo est une grande bâtisse qui accueille une exploitation agricole.","architecture":"Castetbon était autrefois entouré d'une muraille dont il ne subsiste aujourd'hui qu'une porte, dite occidentale (ou également Porte du sel), les pierres de ladite muraille ayant été utilisées par les habitants pour l'édification ou la réparation des demeures et ce, dès la Révolution française                                                     Pimbo,  darchitecture massive, la demeure présente des murs épais et de vastes pièces. Un escalier de deux mètres de large dessert létage. Dans les années 1930, un pigeonnier, privilège du seigneur, se dresse encore dans le champ.   Pimbo grande bâtisse de deux niveaux à toitures de tuiles imposantes.","habitants":"Seigneur Arnaud Guilhem d'Audaux\r\n        \"","divers":"Vestiges de Castetbon et château de Pimbo grav 3 et 4","gps":"","images":["../../jctruffet.com/image/image_64/64_Castetbon_Pimbo_1.jpg","../../jctruffet.com/image/image_64/64_Castetbon_Pimbo_2.jpg","../../jctruffet.com/image/image_64/64_Castetbon_Pimbo_3.jpg","../../jctruffet.com/image/image_64/64_Castetbon_Pimbo_4.jpg"]},"Consult_chateau_formulaire6f05":{"id":"Consult_chateau_formulaire6f05","dept":"64","canton":"Serres-Castet","commune":"Castetpugon","nom":"Castetpugon","type":"Château","periode":"XIX","histoire":"CASTETPUGON, occupé dès le néolithique, jouit dune situation géographique privilégiée qui a permis le développement dun bourg castral important au Moyen-Âge. Trois villas antiques ont ainsi été mises à jour, dont la plus grande fait jusquà un demi-hectare.\r\nAu Moyen-Âge, la situation de la commune sur une plate-forme de cinq à six cents mètres de long sur une centaine de mètres de large est à lorigine de linstallation dun camp retranché de type « double éperon barré » avec un château (aujourdhui disparu) en son centre. Puis, au XIe siècle, le seigneur du lieu, Bernard-Guillaume de Castetpugon, membre de la cour comtale, est à linitiative de la création dun castelnau autour du château médiéval. Les seigneurs qui lui succèdent, aux XIIIe et XIVe siècles, sont membres du parti anglais, présent dans la Gascogne toute proche.","architecture":"Aujourdhui, à Castetpugon on peut encore admirer dans la commune, les vestiges du château dÉtienne de Ger-Angosse, construit en 1744 à partir dun castera très vaste, entouré de talus artificiels.","habitants":"Famille de Bernard-Guillaume de Castetpugon\r\n        \r\n        \"","divers":"Château de Castetpugnon","gps":"","images":["../../jctruffet.com/image/image_64/64_Castetpugon_1.jpg"]},"Consult_chateau_formulaired93c":{"id":"Consult_chateau_formulaired93c","dept":"64","canton":"St-Jean de Luz","commune":"Ciboure","nom":"Ciboure","type":"Villa","periode":"XVII","histoire":"A Ciboure le fort Socoa (voir article)                   CIBOURE La villa Leïhorra, rue du Docteur-Micé, est inscrite aux M.H ;  Caroline Signoret acheta  un vaste terrain dominant la mer, sur la colline de Bordagain à Ciboure. Elle revenait du Mexique où son père avait fait fortune avec une chaine de magasins. Son gendre Joseph Iriart, architecte, commençait à être bien connu dans le Pays Basque. Elle lui confie la réalisation d'une villa. Comme tout \"Amaricanoak \" (les bergers basques souletins qui sont partis trouver meilleure fortune en  Amériques appelés ainsi en hommage au chêne, emblème du Pays basque ) Elle veut exposer sa réussite. Elle lui laisse donc carte blanche mais lui impose trois conditions : être la plus belle des villas,  avoir un patio intérieur qui lui rapellerait sa jeunesse au Mexique et se réserver de choisir des meubles basques. La constrution commence en 1926.","architecture":"Tour de Bordagain et les villas                                        La maison Neria, rue du Docteur-Micé, date du XVIIe siècle. Elle servit d'hôpital aux troupes de Wellington en 1813 et 1814 ; La maison natale de Maurice Ravel, quai Ravel, date du XVIIe siècle ;\r\nLa villa Lehen-Tokia, chemin Axotareta, construite entre 1924 et 1926, est inscrite aux M.H. ;La commune a érigé en 1955 une stèle des évadés de France, à la mémoire des résistants qui quittèrent la France pour rejoindre l'armée de la libération via l'Espagne durant la Seconde Guerre mondiale.\r\nAu bord de la Nivelle, le quartier Zubiburu, inauguré en 2008, rassemble des hôtels et des immeubles résidentiels de type néobasque.","habitants":"Famille de Caroline Signoret\r\n        \"","divers":"Tour à Bordaguain et villa Lïehorra","gps":"","images":["../../jctruffet.com/image/image_64/64_Ciboure_1.jpg","../../jctruffet.com/image/image_64/64_Ciboure_2.jpg","../../jctruffet.com/image/image_64/64_Ciboure_3.jpg","../../jctruffet.com/image/image_64/64_Ciboure_4.jpg"]},"Consult_chateau_formulaire99db-2":{"id":"Consult_chateau_formulaire99db-2","dept":"64","canton":"Serres-Castet","commune":"Claracq","nom":"Claracq","type":"Château","periode":"XVI","histoire":"CLARACQ, au XVIe siècle, Claracq dépendait de la baronnie de Coarraze. En 15461, Garlède et Claracq ne formaient qu'une seule et même commune.   Ce château est le siège de la seigneurie de Claracq depuis le XVIe siècle au moins. Il a dabord appartenu à la famille Saraute de Larquer puis à celle de Gramont et ensuite à la famille des Hiton à partir de 1673. Le château qui date en partie du XVII  siècle fut possession de la famille de Gramont. Quant à léglise, elle possède un portail renaissance qui présente un écusson orné de la vache héraldique de Béarn.","architecture":"Le magnifique château de Claracq est reconstruit au XIXe siècle à lemplacement dune demeure plus ancienne.  Ce château est le siège de la seigneurie de Claracq depuis le XVIe siècle au moins. Il est entièrement reconstruit au XIXe siècle pour laisser la place à la demeure que lon peut admirer aujourdhui. Celle-ci comporte un étage carré et un étage de combles et est couverte dune toiture en ardoise. La mairie souhaite créer dans le château un musée de lAntiquité et de la Préhistoire en Vic-Bilh.","habitants":"Famille de Gramont\r\n        \"","divers":"Château de Claracq à Serres Castet","gps":"","images":["../../jctruffet.com/image/image_64/64_Claracq_1.jpg"]},"Consult_chateau_formulaire2a8a":{"id":"Consult_chateau_formulaire2a8a","dept":"64","canton":"Pontacq","commune":"Coarraze","nom":"Coarraze","type":"Château","periode":"XIV-XVIII","histoire":"COARRAZE Siège de lune des quatre plus importantes baronnies du Béarn. En 1492, lhéritière du château, Catherine, lègue la propriété à son petit-fils, Gaston de Foix, comte de Carmaing. Celui-ci profite de son statut pour rançonner les voyageurs. Après une condamnation par la cour de justice du Béarn, il fait appel au parlement de Toulouse qui en profite pour dénoncer lindépendance béarnaise. Ses exactions prennent fin avec le siège du château par le vicomte de Béarn qui le démantèle et lincendie en 1508. La baronnie passe ensuite entre les mains de Raymond de Coarraze, son cousin. En 1515, lédifice est reconstruit. Cest par la femme dun des propriétaires postérieurs, Suzanne de Bourbon-Busset épouse de Jean d'Albret, leur fils le jeune Henri IV est élevé en ces lieux, au milieu des années 1550,  Henri IV, roi de Navarre, y passa son enfance jusqu'à ses 7 ans.  Le château est ensuite à nouveau détruit par un incendie en 1684 puis reconstruit tel quil apparait aujourdhui, le château passa à Charles de Lorraine comte de Marsan par alliance avec Marie d'Albret, leur fils vendit  en 1722 à Jean-Jacques de Mouaix, son neveu le revendit au baron de Boeil qui le céda en 1789 au baron de Bouillac. l'antique demeure féodale avait été abandonnée au XVIIIe siècle et remplacée  par le château actuel acquit en 1836  à Louis de Dufau  ancien député des basses Pyrénées arrière grand-père du  propriétaire Bernard  De Dufau vit toujours. Mais le combat face aux assauts du temps est perpétuel comme l'explique François-Régis De Dufau, le fils du propriétaire   Niché au cur du Béarn, dans le village de Coarraze.","architecture":"le château de Coarraze est à la hauteur de la richesse et de la puissance de ses seigneurs. Il sélève à un emplacement stratégique, à proximité de la frontière avec la Bigorre. De la construction médiévale du château de Coarraze, il ne subsiste quun donjon pentagonal, malgré les deux incendies, seule la tour d'origine a survécu. Dans la bâtisse construite au XVIIIe siècle dans le style italien, exhaussée sur une terrasse et coiffée de hauts combles d'ardoise à la Mansart. Le pavillon central plus élevé, est coiffé d'un fronton. un escalier à double révolution permet d'accéder au jardin. Un donjon du XIIIe siècle . On retrouve également, dans le sous-sol, quelques traces des constructions précédentes. Un portail monumental accueille aujourdhui les visiteurs du château de Coarraze, dont différents éléments sont inscrits aux M.H.","habitants":"Famille de François-Régis De Dufau\r\n        \r\n        \"","divers":"Château de Coarraze 43° 10' 00 nord, 0° 13' 48 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Coarraze_1.jpg","../../jctruffet.com/image/image_64/64_Coarraze_2.jpg","../../jctruffet.com/image/image_64/64_Coarraze_3.jpg","../../jctruffet.com/image/image_64/64_Coarraze_4.jpg"]},"Consult_chateau_formulaireb5e4":{"id":"Consult_chateau_formulaireb5e4","dept":"64","canton":"Serres-Castet","commune":"Corbère-Abère","nom":"Corbère_Abère","type":"Château","periode":"XVII","histoire":"Deux châteaux à Corbères dont Corbères et Bordenave D'Arbère                                              CORBERES Le château de Corbère-Abères, construit au XVIIe siècle et réaménagé au siècle suivant, reste célèbre pour avoir hébergé au XXe siècle la couturière Coco Chanel et le cinéaste Robert Bresson. en 1684 début de la construction de lédifice au XVIIe siècle. A cette époque, le château est le siège de la baronnie de Corbère, qui administre également le bourg voisin dAbères, en concurrence avec les châteaux de Castetpugon et Portet. La demeure seigneuriale est transformée par Jean-Paul dAngosse au XVIIIe siècle. Vendu en 1945, à la comtesse de Valenziani, il est actuellement propriété anglaise.\r\nBORDENAVE ABERE, la seigneurie dAbère apparut au Xe siècle. Elle fut successivement la propriété de Gratien de Navailles, de Bernard dAbère, de Jehannot de Cauna, de Jehan de Laplace, de Timothée de Béarn. Enfin, le château de Bordenave appartient aux Bordenave dAbère, les derniers seigneurs, au XIXe siècle. Le château de Bordenave est privé.","architecture":"Le château date de la fin du XVIIe siècle. Au XVIIIe siècle, ont lui adjoint notamment le grand escalier de la tour orientale et le pigeonnier. Mais on peut encore reconnaître de nombreux éléments architecturaux datant du XVIIe siècle, comme les deux grandes tours dangle carrées.  Lancienne basse-cour au nord, bordée par le Larcis, est devenue aujourdhui un plan deau très apprécié pour les promenades et une belle réserve pour les canards et les oiseaux de la région. Le pigeonnier du lieu-dit Audipont semble dater du XVIIIe siècle.                                                                  Château de Bordenave d'Abère est un château bâti à Abère, date du début du XVIIIe siècle, a été remanié au début du XVIIIe siècle. Le château est édifié au XVIe siècle, comme l'atteste la présence dune ouverture, de style Gothique, sur sa façade. La seigneurie dAbère apparut au Xe siècle.","habitants":"Couturière Coco Chanel                                                Cinéaste Robert Bresson\r\n        \r\n        \"","divers":"Château de Corbère 43° 28' 20 nord, 0° 04' 57 ouest et de Bordenave 43° 23' 19 nord, 0° 10' 23 ouest à Corbère-Abère","gps":"","images":["../../jctruffet.com/image/image_64/64_Corb%c3%a8re_Ab%c3%a8re_1.jpg","../../jctruffet.com/image/image_64/64_Corb%c3%a8re_Ab%c3%a8re_2.jpg"]},"Consult_chateau_formulairea2a1":{"id":"Consult_chateau_formulairea2a1","dept":"64","canton":"Serres-Cantet","commune":"Crouseilles","nom":"Crouseilles","type":"Château","periode":"XVIII","histoire":"CROUSEILLES, lhistoire du château de Crouseilles remonte à 1737, lorsque Dombidau de Crouseilles racheta au seigneur de Sadirac une seigneurie composée de lactuel vignoble du château.\r\nEn 1950, une poignée de vignerons pionniers, fiers de leurs traditions et imprégnés de valeurs fortes, créent la cave de Crouseilles et travaillent entre autre ce vignoble du château.","architecture":"Construit sur sa motte féodale, le château  est un élégant manoir du XVIIIe siècle corps de logis rectangulaire à deux niveaux  avec 2 pavillons à chaque extrémité du logis rectangulaires également avec série de lucarne sur le toit en tuiles et entouré dun grand parc. Site touristique, appartenant à la cave coopérative de Crouseilles.","habitants":"Famille de Dombidau de Crouseilles\r\n        \"","divers":"Château de Crouseilles  43° 31' 15 nord, 0° 05' 16 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Crouseilles_1.jpg","../../jctruffet.com/image/image_64/64_Crouseilles_2.jpg"]},"Consult_chateau_formulaire082f-2":{"id":"Consult_chateau_formulaire082f-2","dept":"64","canton":"Mourenx","commune":"Cuqueron","nom":"Cuqueron","type":"Château","periode":"XVII","histoire":"CUQUERON,  est une bâtisse de caractère restaurée au XVIIe siècle.  A la fin du XVIe siècle, Jean de Montgaurin, receveur général des finances de Navarre et de Béarn, est le seigneur des lieux. Lédifice appartient ensuite à Charles de Colomiès, puis à la famille de Casaux. Aujourdhui le château de Cuqueron est associé à un domaine viticole qui produit des vins dAOC Jurançon.","architecture":"CUQUERON,  est une bâtisse de caractère restaurée au XVIIe siècle.  Le chateau de Cuqueron, présente une architecture audacieuse, entourée dune végétation généreuse. Un modeste château aurait été construit à lemplacement de la demeure actuelle. Celle-ci est composée dun long corps de logis a deux niveaux  avec série de lucarne sur comble, toit en croupe, flanqué de deux ailes en retour. Au centre de la façade donnant sur le jardin est a l' opposée une tour polygonale. De part et dautre, se trouvent trois travées sélevant sur deux niveaux et un étage de combles ouverts par des lucarnes.","habitants":"Famille de Jean de Montgaurin\r\n        \"","divers":"Château de Cuqueron","gps":"","images":["../../jctruffet.com/image/image_64/64_Cuqueron_1.jpg","../../jctruffet.com/image/image_64/64_Cuqueron_2.jpg","../../jctruffet.com/image/image_64/64_Cuqueron_3.jpg"]},"Consult_chateau_formulaire5825-2":{"id":"Consult_chateau_formulaire5825-2","dept":"64","canton":"Serres-Cantet","commune":"Diusse","nom":"Diusse_Lavielle","type":"Château","periode":"XVII-XVIII","histoire":"DIUSSE, le château de Diusse date de la fin du XVIIe siècle. Cest la puissante famille des Brumont-Disse, seigneurs du village et propriétaires terriens enrichis, ayant acheté des charges nobles, qui est à lorigine de sa construction. Les Brumont-Disse conservent leur bien jusquau XIXe siècle, époque où lédifice passe à la famille ossaloise des Bordeu après le don dun Brumont-Disse en 1830. Acheté en 1838 par Jean Jacob, il passe ensuite à la famille des Saint-Julien en 1852. Cest cette dernière qui donne au château sa physionomie actuelle. Après être passée entre différentes mains, la demeure est vendue à un certain Sansoube en 1940, qui réaménage lorangerie, reconstitue lescalier et décore plusieurs pièces.\r\nDepuis lacquisition de ce lieu par monsieur Baillet dans les années 1970, les dépendances du château sont un Centre dAide par le Travail (CAT) qui exploite une quinzaine dhectares de vignes. Trois vins dappellation et origine contrôlées y sont produits : Madiran, Pacherenc du Vic-Bilh et rosé du Béarn.         A cinq kilomètres au nord à Portet le château de Laveille pas d'information historique.","architecture":"Diusse est construit à la fin du XVIIIe siècle, transformé au début du XIXe. Toit pourvu dun campanile dans laxe de lavant-corps.  Le domaine comprend un corps de logis, des dépendances, une orangerie et un parc. On leur doit notamment les mosaïques du vestibule aux armes de la famille. Le bâtiment dorigine, sil garde un plan classique du XVIIe siècle, annonce déjà par ses ouvertures larchitecture du XVIIIe siècle. On accède à ce château en passant par un portail monumental, dont il reste aujourdhui quelques traces.  Le corps de logis à deux niveaux (un étage carré et un de comble) est flanqué de deux pavillons dune travée, plus haut dun demi-étage. La porte, située dans laxe, est encadrée de pilastres supportant une corniche surmontée de trois boules. Des oculus sont percés au sommet des pavillons et dans le fronton triangulaire situé au-dessus de la travée centrale façade flanquée de deux (faux) pavillons et dune lucarne-fronton. Toit pourvu dun campanile dans laxe de lavant-corps.Le domaine comprend un corps de logis, des dépendances, une orangerie et un parc.                                               LAVIELLE  à 2 kilomètre au nord à Portet un ensemble fortifié dit la Justice ou Moutha, comprenant une motte, château dans le même style que Diusse, une basse-cour et un fossé, provient semble-t-il des XIIe, XIIIe et XIVe siècles.  L'ancienne abbaye laïque de Portet était installée dans la demeure de notable dite château Lavielle. Une autre demeure de notable dite château Quintàa, datant de 1835, est visible au lieu-dit Quintàa.","habitants":"Famille des Brumont-Disse\r\n        \"","divers":"Château de Diusse et de Lavielle à Diusse","gps":"","images":["../../jctruffet.com/image/image_64/64_Diusse_Lavielle_1.jpg","../../jctruffet.com/image/image_64/64_Diusse_Lavielle_2.jpg","../../jctruffet.com/image/image_64/64_Diusse_Lavielle_3.jpg","../../jctruffet.com/image/image_64/64_Diusse_Lavielle_4.jpg"]},"Consult_chateau_formulaire9837":{"id":"Consult_chateau_formulaire9837","dept":"64","canton":"Oloron Ste-Marie","commune":"Laruns","nom":"Dognen_Espalungue","type":"Château","periode":"XV","histoire":"Trois châteaux à Laruns celui de d'Orrognen, de Sensaudens pas d'information pour ces châteaux, seul celui d'Espalungue.                                                         ESPALUNGUE,  construit au XVe siècle par Jean de Poey. La famille de Poey ne semble pas habiter le château pendant les guerres de Religion, en 1569 cest le baron dAbère, qui occupe les lieux. Le château passe par alliance aux mains des Abadie, aux Boyrie, aux Ségure. Selon la légende, Aramis, le mousquetaire, serait mort dans le château dEspalungue.   Puis la construction a évolué avec la famille de Rague vers 1602.  On retrouve la famille d'Espalungue sous Henri IV, un Bertrand d'Espalungue ayant été compagnon de route du Navarrais lors de sa campagne pour conquérir Paris. Mais au XVIIe siècle, c'est la famille de Livron qui occupe le château. En 1760, dix familles d'Assouste avaient acheté l'ensemble des estives en haute vallée. On trouve trace en 1856 à Laruns d'un acte notarié où les descendants de ces familles achètent le bois d'Assouste à M. de Livron, de Saint-Abit, héritier de son grand-père.  Toutefois, tandis que la famille d'Espalungue est devenue pépinière de magistrats palois jusqu'à la Révolution, la famille de Livron occupe le château. À la Révolution, le maître doit s'enfuir et le château est vendu comme bien d'émigré,  puis sous l'impulsion du marquis de Livron à la fin du XVIIe siècle.","architecture":"ESPANLUNGUE  Haute bâtisse du XVIe siècle à la tour polygonale,  se tient sur un éperon rocheux. Au départ, il y aurait eu une tour de guet à cet emplacement, datant du IXe siècle.  Nous sommes en pleine guerre de religion et le domengé s'est converti au protestantisme. Mais arrive le capitaine Bonnasse, lui-même domengé d'Arette, et ses sbires au service du camp catholique. Il sagit dune demeure de trois niveaux surmontée dun toit à deux pentes en ardoises, éclairé de grandes fenêtres étroites et allongées.Le bâtiment est flanqué de deux tours quadrangulaires sans ouverture, elles avaient un rôle de défense. Le château est entouré dun mur denceinte, qui confirme ce rôle. Lintérieur conserve une belle cheminée Renaissance","habitants":"Famille d'Aramis, le mousquetaire                       Famille de Poey                                                           Famille de Bertrand d'Espalungue\r\n        \"","divers":"Château d'Espalungue à Laruns","gps":"","images":["../../jctruffet.com/image/image_64/64_Dognen_Espalungue_1.jpg","../../jctruffet.com/image/image_64/64_Dognen_Espalungue_2.jpg","../../jctruffet.com/image/image_64/64_Dognen_Espalungue_3.jpg"]},"Consult_chateau_formulairee8f4":{"id":"Consult_chateau_formulairee8f4","dept":"64","canton":"Serres-Cantet","commune":"Doumy","nom":"Doumy","type":"Château","periode":"XVIII","histoire":"DOUMY, lactuel château de Doumy est reconstruit au début du XVIIIe siècle sur les traces du château originel des premiers seigneurs et barons du village, dont on peut encore voir une motte dans le parc. On trouve à présent un château du XVIIIe siècle, dernier siège de la seigneurie et baronnie de Doumy.  Le château primitif appartient  à différentes familles béarnaises. En 1647, il est en possession de Jacob de Labaig. Entre 1653 et 1670, il est vendu à Louise de Mesples. Jeanne Dupla en est  la propriétaire avant de le vendre à M. de Courrège, conseiller au parlement en 1725. Jusquà la veille de la Révolution, le nouveau château est la propriété de la famille Courrège.  À la Belle Époque, le riche industriel Étienne Balsan, amant de Coco Chanel, y habite avant dacheter la maison Abescat dans le village voisin dAuga.","architecture":"Doumy, le château fut édifié aux XIe et XIIe siècles puis remanié au XIXe siècle. On peut y voir deux statues (lions couchés) de la deuxième moitié du XVIIIe siècle. la neuvième grande baronnie de Béarn, vassale de la vicomté de Béarn. On trouve à présent un château du XVIIIe siècle, dernier siège de la seigneurie et baronnie de Doumy.   Larchitecture de cet édifice se caractérise par des lucarnes néo-gothiques et un somptueux décor intérieur de boiseries et de cheminées. Doumy présente un ensemble de fermes et de demeures du XIXe siècles.","habitants":"Famille Courrège\r\n        \"","divers":"Château de Doumy 43° 26' 47 nord, 0° 22' 20 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Doumy_1.jpg","../../jctruffet.com/image/image_64/64_Doumy_2.jpg"]},"Consult_chateau_formulairedb92":{"id":"Consult_chateau_formulairedb92","dept":"64","canton":"Oloron Ste-Marie","commune":"Sévignacq Meyracq","nom":"Druon","type":"Château","periode":"XIX","histoire":"Deux chateau à  Sévignacq Meyracq celui de Druon et celui d'Etgny (voir article)                                             DRUON, pendant l'occupation de la famille Druon, le château était entouré d'un grand domaine et de nombreuses maisons. En 1882, Mlle Louise Tardan qui habitait Biarritz, en devint propriétaire puis Mme Knox née Edge Ethel Laura née le 7.8.1869 en Irlande décédée le 27.1934 à 64 ans, mariée à Queens County en Irlande avec le capitaine Stuart George Knox, lieutenant- colonel des Indes. Ce couple eut 2 fils, Stuart Georges né en 1896 et John né en 1904. Cette famille appelait leur demeure le châlet Barrailh, du nom du terrain sur lequel il était implanté. De mars à fin octobre 1929, a été scolarisé à Sévignacq, un enfant de 7 ans, Georges Knox, fils de Hilda etGeorges Imman Knox, sculpteurs à Paris, y fut scolarisé. En 1938, le château Duron fut transféré à Edouard Coumeig- Palisses, un Industriel. En octobre 1941, les enfants Michèle et Bernard, 8 ans et 6 ans, fils de l'industriel Palisses partirent à Pau pour rejoindre leur mère malade. En 1946, un nouveau propriétaire rachète le chateau, Pierre Duffroy, qui le revendra en 1950, à la Caisse d'Allocations Familiales des Landes. En 1956, l'Entraide sociale basco-béarnaise en est propriétaire jusqu'à sa dissolution. Elle y tenait des colonies de vacances jusqu'en 1980.  Depuis, le château Druon est la propriété privée de Mme et Mr Ringenbach.","architecture":"DRUON, était, autrefois, un chalet, bâti en 1877, par Fernand Druon, membre du Conseil Général et Maire de Sévignacq-Meyracq. Edifié durant l'époque anglaise, la mode dans le domaine de l'architecture était la construction de châlets. Aujourd'hui, jolie petit manoir.","habitants":"Famille Druon\r\n        \"","divers":"Château de Druon à Sévignacq Meyracq","gps":"","images":["../../jctruffet.com/image/image_64/64_Druon_1.jpg","../../jctruffet.com/image/image_64/64_Druon_2.jpg"]},"Consult_chateau_formulaire0513":{"id":"Consult_chateau_formulaire0513","dept":"64","canton":"Oloron Ste-Marie","commune":"Eaux-Bonnes","nom":"Eaux_Bonnes","type":"Chateaux","periode":"XVII-XIX","histoire":"EAUX-BONNES, c'est au cours du XVIe siècle qu'est citée, pour la première fois dans la bibliographie, l'édification d'un bâtiment. C'est un hôpital militaire, construit par François Ier et destiné aux Béarnais blessés à la bataille de Pavie (1525) par de nouvelles armes : les arquebuses. Un siècle plus tard, en 1648, la comtesse d'Ancenis prenait l'eau aux Eaux-Bonnes mais logeait prudemment au château de Béost. En 1771, le comte Antoine-Marie de Cluzel, officier de l'armée de Condé, écrit y avoir fait construire la « première maison honnête, avec vitres ». Un an plus tard, en 1772, le duc de Biron fait un séjour aux Eaux-Bonnes. En 1907, en échange de concessions hydro-électriques à Gabas destinées à électrifier son réseau, la compagnie des chemins de fer du midi s'engage à construire un tramway à voie unique jusqu'aux deux stations. Si la ligne aurait été édifiée jusqu'à Gabas, partageant la route avec les automobiles avant d'être enfouie dans le bitume, l'embranchement vers les Eaux-Bonnes restera un projet.  Au début du XXe siècle, le monopole d'approvisionnement en vivres de la station pour la saison thermale fait encore l'objet d'une adjudication publique, une mesure instaurée par les jurats de Laruns dès le XVIe siècle. Dès 1881 et jusquen 1916, la commune concède l'exploitation du minerai aurifère et argentifère découvert sur le site de Gourette. Une quarantaine de tonnes de minerai est triée et concassée chaque jour avant dêtre transférée à Laruns par tombereaux pour embarquer en chemin de fer pour Bayonne, lAngleterre ou lEspagne.","architecture":"L'établissement thermal : il remplace en 1830 un premier édifice. Lorsqu'en 1887 Guy de Maupassant publie Mont-Oriol, l'histoire du développement d'une petite ville thermale du Massif central, Eaux-Bonnes comporte déjà tous les ingrédients du modèle urbain idéal de la ville d'eaux. Les « Thermes du Mont-Oriol » comportent un hôtel, des villas et un casino de style mauresque. Le jardin public et les promenades pittoresques sont également présentes, entourant l'établissement thermal.","habitants":"Duc de Biron                                                                 Comtesse d'Ancenis \r\n               \"","divers":"Casino et villa de l'impératrice à Eaux-Bonnes","gps":"","images":["../../jctruffet.com/image/image_64/64_Eaux_Bonnes_1.jpg","../../jctruffet.com/image/image_64/64_Eaux_Bonnes_2.jpg","../../jctruffet.com/image/image_64/64_Eaux_Bonnes_3.jpg","../../jctruffet.com/image/image_64/64_Eaux_Bonnes_4.jpg"]},"Consult_chateau_formulaired76b":{"id":"Consult_chateau_formulaired76b","dept":"64","canton":"Bayonne","commune":"Etcharry","nom":"Elgart","type":"Château","periode":"XVII","histoire":"ELGART  De nos jours, le centre denseignement du château dElgart est destiné aux métiers du social, à la formation agricole et à laccompagnement à lemploi. Lié à la Fraternité Sacerdotale Saint-Pie X, et créé en 1989, a acquis en juillet 2016 le château Elgart dEtcharry mis en vente par lAssociation pour la formation en milieu rural (AFMR) qui en était propriétaire mais se trouvait proche du dépôt de bilan.","architecture":"ELGART, est un édifice Renaissance, surtout connu pour le centre de formation quil abrite. Cette demeure est située au cur du domaine du même nom. Ce château de style Renaissance est édifié au XVIIe siècle et fait lobjet de remaniements ou de restaurations au XIXe siècle. Le château dElgart est reconnaissable à sa très haute toiture qui rend possible deux niveaux de combles. Il est flanqué de deux tours carrées à la toiture en pointe et possède doriginales cheminées de pierre, elles aussi très élevées. De nos jours, le centre denseignement du château dElgart est destiné aux métiers du social, à la formation agricole et à laccompagnement à lemploi.","habitants":"Fraternité Sacerdotale Saint-Pie X\r\n        \"","divers":"Château d'Elgart à Etcharry","gps":"","images":["../../jctruffet.com/image/image_64/64_Elgart_Etcharry_1.jpg","../../jctruffet.com/image/image_64/64_Elgart_Etcharry_2.jpg","../../jctruffet.com/image/image_64/64_Elgart_Etcharry_3.jpg"]},"Consult_chateau_formulaire4cac":{"id":"Consult_chateau_formulaire4cac","dept":"64","canton":"Orthez","commune":"Escos","nom":"Escos","type":"Château","periode":"XIX","histoire":"ESCOS est un village navarrais, malgré son appartenance aujourd'hui au canton de Salies. Un quartier du village n'appartenait pas au même royaume que le centre du bourg : « Lagarde d'Escos » dépend lui en effet de la juridiction d'Hastingues et, à ce titre, était en « France », en l'espèce sur le territoire de la sénéchaussée de Dax, voué à la location pas d'information historique","architecture":"ESCOS,  date sans doute du milieu du XIXe siècle. Construit à lemplacement dune demeure plus modeste, cest une imposante bâtisse qui surprend par son architecture audacieuse. Le château primitif se limite au corps central. Il sagit dune sorte de grand manoir sur lequel viennent se greffer la Rotonde à louest et le Belvédère à lest. Lédifice a connu certes quelques vicissitudes (abandon et parc laissé en friche), mais sa rénovation-transformation récente, lui attribue une indéniable prestance. de plan rectangulaire à quatre étages lucarnes sur combles et attiques, pavillon formant un T avec l'ensemble à cinq étages tour ronde mi-hord oeuvre sur sa partie centrale couverte d'un toit en poivrière sur colonne, en façade un pavillon d'entrée saillant avec toit à fronton et tour héxagonale accolé sur angle.\r\nAujourdhui, le château dEscos est une copropriété à laquelle on accède par un monumental portail de fer forgé avec dorures.","habitants":"Lagarde d'Escos \r\n        \"","divers":"Château d'Escos  43° 26' 48 nord, 0° 59' 45 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Escos_1.jpg","../../jctruffet.com/image/image_64/64_Escos_2.jpg","../../jctruffet.com/image/image_64/64_Escos_3.jpg","../../jctruffet.com/image/image_64/64_Escos_4.jpg","../../jctruffet.com/image/image_64/64_Escos_5.jpg","../../jctruffet.com/image/image_64/64_Escos_6.jpg"]},"Consult_chateau_formulaire0e57":{"id":"Consult_chateau_formulaire0e57","dept":"64","canton":"Oloron Ste-Marie","commune":"Escout","nom":"Escout","type":"Manoir","periode":"XVII","histoire":"ESCOUT, a appartenu à de nombreuses familles : aux Lescun, à Corisande dAndoins, qui le vend en 1591, à la famille dAbadie, aux Fréchou, puis aux Duplaa, qui le conservent jusquau XIXe siècle. Jean-Vincent d'Abbadie de Saint-Castin était le 3e baron de Saint-Castin et fut aussi chef amérindien. Il est né en 1652 à Escout. Charles Laborde connu sous le pseudonyme de Chas Laborde, né à Buenos Aires (1886), mort à Paris (1941), passa son enfance au château Duplaa d' Escout, propriété de son père qui fit fortune en Argentine. Dessinateur, graveur, illustrateur, peintre et écrivain, il laissa ses souvenirs dans \" Théodore et le Petit Chinois\", édité par Lacourière en 1943.","architecture":"Le château dEscout, appelé aussi château Duplâ, se situe au sud-est du village. Cet édifice a connu un passé glorieux même si son état actuel nen laisse rien transparaître.  Il est reconstruit au XVIIe siècle et se compose dun corps de logis de trois travées à deux niveaux. Il est encadré de deux pavillons saillants avec des baies rectangulaires. Une aile a été ajoutée à louest. La travée centrale présente une riche ornementation avec une porte principale à pilastres surmontée dun fronton cintré. Lensemble est couvert dun toit béarnais en pente à ardoises. Le château dEscout possède également, à lest, un ancien pigeonnier remarquable.","habitants":"Famille de Charles Laborde \r\n        \"","divers":"Château d'Escout","gps":"","images":["../../jctruffet.com/image/image_64/64_Escout_1.jpg","../../jctruffet.com/image/image_64/64_Escout_2.jpg"]},"Consult_chateau_formulaire4453":{"id":"Consult_chateau_formulaire4453","dept":"64","canton":"Cambo les Bains","commune":"Espelette","nom":"Espelette","type":"Château","periode":"XI-XV-XVII","histoire":"ESPELETTE, les barons dEzpeleta firent bâtir le château vers lan 1000, Ces barons féodaux étaient à lorigine vassaux du roi de Navarre. Le premier sujet connu de cette ancienne famille est Don Aznar, seigneur dEzpeleta en lan 1059. Il faisait partie des 12 barons du royaume de Navarre. Les seigneurs dEzpeleta en Labourd étaient associés, dès le XIe siècle, aux plus puissants barons de Navarre, suite au mariage dEléanor et dHenri Plantagenêt, lAquitaine, dont le Labourd faisait partie, passa sous la domination des rois dAngleterre jusquau XIVe siècle, et les barons dEzpeleta guerroyaient contre le roi de France. Le cardinal de Richelieu confisqua donc en 1637 les terres du baron Bertrand II dEzpeleta et les habitants détruirent le château. Bertrand II mourut peu de temps après, vers 1640, laissant à sa soeur Barbe tous les biens quil avait en France.  Suite à cette demande, Barbe réintégra le domaine familial, et les habitants furent condamnés à payer à leur suzeraine  pour la reconstruction du château, cette dette ne fut acquittée quen 1670.   A la mort de la baronne, en 1690, le roi Louis XIV, par droit daubaine, donna la seigneurie à Antoine de Gramont, souverain de Bidache. Dès lors, Dona Juliana Henrique, petite nièce de Barbe protesta et récupèra les terres et le château, abandonnant les autres biens au Duc de Gramont. La baronne Juliana Henrique mourut sans descendance en 1694, et légua aux habitants dEspelette le château et les droits seigneuriaux qui y étaient attachés. Les Ezpeletars devinrent ainsi possesseurs dune terre noble. Dès lors, le château servit de presbytère jusquen 1967, il abrita également justice de paix et lécole publique. L'ancien château des Barons d'Ezpeleta a été racheté par la commune, devenu le musée Bigouden.","architecture":"ESPELETTE   les origines ce château remonteraient aux début du XIe siècle. Il fut la propriété d'une même lignée jusqu'à la fin du XVIIe siècle. La tour dangle a été inscrite à linventaire des M.H en 1937 et lensemble du château en 1993.  Des vestiges de la forteresse de jadis, ont été trouvé à proximité. Sa destination actuelle est entre autre : des bureaux de la Mairie, d'office de tourisme.  Il mesure environ 45 mètres de longueur pour 10 de large. Il fut très largement rénové en 1997. En 1998, à la demande du Service Régional de lArchéologie dAquitaine et de la Mairie dEspelette, la société HADES a réalisé létude archéologique du château. Une prospection archéologique à sa périphérie, sous forme de sondages en tranchées a révélé les vestiges dune forteresse de la fin du Moyen-Age.\r\nEn 1998, la rénovation complète du château a débuté, sous le contrôle de madame Payen, architecte des bâtiments de France, qui sest fondée sur létude de la société HADES pour restituer les baies disparues et supprimer les ouvertures parasites.","habitants":"Famille d' Antoine de Gramont\r\n        \"","divers":"Château d'Espelette  43° 20' 25 nord, 1° 26' 45 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Espelette_1.jpg","../../jctruffet.com/image/image_64/64_Espelette_2.jpg","../../jctruffet.com/image/image_64/64_Espelette_3.jpg","../../jctruffet.com/image/image_64/64_Espelette_4.jpg","../../jctruffet.com/image/image_64/64_Espelette_5.jpg"]},"Consult_chateau_formulaire40e6":{"id":"Consult_chateau_formulaire40e6","dept":"64","canton":"Mauléon-Licharre","commune":"St-Etienne de Baigorry","nom":"Etchaux","type":"Château","periode":"XVI","histoire":"ETCHAUX, date du XVIe siècle. L'édifice actuel, construit à la demande de Gratien d'Etchaux, date de 1555. Si l'on se réfère à un passé toujours présent on découvre un château carré à quatre tours, reflet de l'histoire d'une grande famille, celle de Jean et Bertrand d'Etchauz, cette famille des vicomtes de Baïgorri, plus tard nommés vicomte d'Etchauz qui a régné pendant cinq siècles sur la vallée. Elle se distingua à la Cour de France et Bertrand d'Etchauz fut nommé évêque de Bayonne en 1599 et devint l'homme de confiance de Louis XIII. Au XVIIIe siècle, la maison vicomtale passa aux mains de Caupenne qui entretinrent des relations tendues avec les gens de la vallée. Et à la Révolution, vendu comme bien national, le château fut racheté par le père du futur maréchal Harispe qui obtint de Napoléon l'autorisation de créer un régiment d'infanterie légère, les chasseurs basques. Ce fut l'enfant le plus célèbre de Baïgorri, enterré dans le cimetière du village. Ce n'est qu'en 1850 que le château, fut racheté par la famille d'Abbadie d'Arrast et reçut la visite de Charlie Chaplin dont Harry d'Abbadie d'Arrast était le scénariste. En à sa mort sa veuve Eléanor Bozrdman se défait du château qui passe dans différentes mains avant d'être acquis en 1995 par monsieur  Pierné.","architecture":"ETCHAUX fut modifié au milieu du XVIIIe siècle, puis restauré à la fin du XXe siècle. Le château d'Etchaux est inscrit aux M.H. depuis 1989.  Dans un écrin de verdure, domine le village de Saint-Etienne de Baïgorry. Il est un témoignage vivant du Moyen-Age et de la Renaissance en pays Basque .Le portail franchi, l'allée boisée traversée, l'édifice vous apparaît dans toute sa splendeur, imposant de simplicité, de plan rectangulaire à trois étages et attiques toits en croupes recouverts de tuiles  accolé de tour rondes en angles, une grosse, deux moyennes et une échauguettes en encorbellement toit en poivrières en ardoises . Tons pastels, lignes harmonieuses, l'ensemble est parfaitement entretenu .","habitants":"Charlie Chaplin                                                          Famille d'Harry d'Abbadie d'Arrast               \r\n        \"","divers":"Château d'Etchaux à Saint-Etienne de Baigorry  43° 10' 39 nord, 1° 20' 44 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Etchaux_1.jpg","../../jctruffet.com/image/image_64/64_Etchaux_2.jpg","../../jctruffet.com/image/image_64/64_Etchaux_3.jpg","../../jctruffet.com/image/image_64/64_Etchaux_4.jpg"]},"Consult_chateau_formulairef3a9":{"id":"Consult_chateau_formulairef3a9","dept":"64","canton":"Serres-Castet","commune":"Théze","nom":"Fanget","type":"Château","periode":"XIV-XVII","histoire":"FANGET, en 1476, Madeleine de France, sur de Louis XI et régente du vicomte de Béarn, anoblit la maison de Fanget, première propriétaire du château. Au XVIe siècle, la maison appartient aux Lanusse. Au XVIIIe siècle, la famille Vergès lacquiert, puis en 1647, Jacques Vergès fait construire le bâtiment actuel.  Le château de Fanget, actuelle mairie de Thèze, est acheté en 1959 par la commune. Il est ainsi sauvé de la démolition en 1960 grâce à son inscription à lInventaire supplémentaire des M.H.","architecture":"Le château de Fanget présente un bel exemple de gentilhommière béarnaise. Intégré au tissu urbain, le château est orienté comme les autres maisons du village. Il comporte deux étages carrés. Cinq fenêtres largement espacées, plus hautes au rez-de-chaussée quà létage, scandent la façade. La porte dentrée présente un fronton brisé, surmonté dun petit fronton circulaire avec de chaque côté deux lions dressés et trois colonnettes au niveau de limposte.Les vestiges de deux ensembles fortifiés des XIe et XIIe siècles, témoignent du passé ancien de la commune. L'un des sites, dit le Moutta, porte actuellement un calvaire. Le pigeonnier situé à son pied est construit à l'emplacement de l'ouvrage d'entrée primitif.\r\nLa gentilhommière du XVIIe siècle, appelée château de Fanget du nom de la famille est située au point haut du village et fut restaurée après une longue période de ruine pour abriter des locaux municipaux. Son parc a été cédé et construit, son pigeonnier carré détruit en 1964.","habitants":"Famille de Fanget\r\n        \"","divers":"Château de Fanget 43° 28' 34 nord, 0° 20' 54 ouest  à Théze","gps":"","images":["../../jctruffet.com/image/image_64/64_Fanget_1.jpg","../../jctruffet.com/image/image_64/64_Fanget_2.jpg","../../jctruffet.com/image/image_64/64_Fanget_3.jpg"]},"Consult_chateau_formulairecd94":{"id":"Consult_chateau_formulairecd94","dept":"64","canton":"Mauléon-Licharre","commune":"Mauléon-Licharre","nom":"Fort_Mauléon","type":"Fort","periode":"XI-XIII","histoire":"FORT-MAULEON,  En 1261, le roi anglais qui a en Soule le titre de vicomte, décide de faire représenter son autorité, notamment militaire, au moyen d'un capitaine-châtelain, rémunéré par ses soins. Entre 1272 et 1287, Édouard Ier, soucieux de la qualité de ses places fortes, impose des réparations et un renforcement des fortifications du château, travaux poursuivis de 1319 à 1374 sur décision des capitaines-châtelains. Après de vaines tentatives de reconquête sur l'Angleterre, tentatives parfois couronnées de succès (comme entre 1295 et 1307), le Comte Gaston IV de Foix-Béarn, favorable au roi de France, initie, en 1449, la reconquête de la Guyenne par la prise de Mauléon. À sa mort sur le champ de bataille, en 1472, le château, de même que l'ensemble de la Soule, est définitivement rattaché à la France. Il subit de nouveaux assauts en 1523 mais de courte durée, ceux du prince d'Orange et du seigneur de Luxe. Dans la seconde moitié du XVIe siècle, le château souffre des guerres de religion et il est d'ailleurs incendié à cette occasion. En 1642, sur ordre de Louis XIII, le château fort est démoli. En 1648 une reconstruction partielle est organisée mais le château est finalement abandonné. Sous la Révolution française, il est employé comme prison, une fonction qu'il garde pendant des années. En 1831, le ministre de la guerre refuse sa restauration bien qu'il abrite une garnison et ce, jusqu'en 1870, date à laquelle la ville en devient propriétaire. Le vieux château de Mauléon est un château fort inscrit M.H par arrêté du 4 mai 1925.","architecture":"FORT-MAULEON, le fort est bâti au sommet d'une colline dominant la ville devant la colline du Matalon (439 m). Il a la forme d'un pentagone orienté nord-est sud-ouest. Devant le château, deux espaces plats sont situés à chaque extrémité et hébergeaient des habitations au Moyen-Âge. Celui au sud-ouest est aujourd'hui envahi par la végétation. On accède au château sur le côté nord-est par une excroissance, un pont en pierre à 3 arches et autrefois un petit pont-levis. L'essentiel des bâtiments se trouve sur ce côté nord-est. Ils se composent de pièces de petite taille qui accueillaient une petite garnison. Les murs sont rehaussés du fait de la construction du château sur une butte. Ils ne sont pas crénelés. Ils sont renforcés par trois tours d'angle. Ils sont percés de meurtrières pour l'artillerie, surtout du côté de la ville. Dans la cour du château, on trouve :  L'entrée très étroite des oubliettes au pied des bâtiments. Un puits profond de 29m pour atteindre la nappe phréatique. Au sud-ouest, les ruines quasi-arasées du donjon médiéval abattu au XVIIIe siècle.Le pont-levis a été démonté (notamment les chaînes de relevage) et remplacé par des planches.                                                                           Manoir de Bela de construction récente du  XIXe siècle plan rectangulaire à trois niveaux avec un retour en équerre pour englobé une tour ronde à cinq niveaux toit en croupe avec lucarnes.","habitants":"Comte Gaston IV de Foix-Béarn\r\n        \"","divers":"Le fort de Mauléon Fort de Mauléon 43° 13' 09 nord, 0° 53' 11 ouest et le manoir de Bela","gps":"","images":["../../jctruffet.com/image/image_64/64_Fort_Maul%c3%a9on_1.jpg","../../jctruffet.com/image/image_64/64_Fort_Maul%c3%a9on_2.jpg","../../jctruffet.com/image/image_64/64_Fort_Maul%c3%a9on_3.jpg","../../jctruffet.com/image/image_64/64_Fort_Maul%c3%a9on_4.jpg","../../jctruffet.com/image/image_64/64_Fort_Maul%c3%a9on_5.jpg","../../jctruffet.com/image/image_64/64_Fort_Maul%c3%a9on_6.jpg"]},"Consult_chateau_formulaire2026":{"id":"Consult_chateau_formulaire2026","dept":"64","canton":"Pau","commune":"Bastisde de Gan","nom":"Gan_Marca","type":"Patrimoine","periode":"XIII-XVI","histoire":"GAN est créé en 1335 par Gaston II, vicomte de Foix-Béarn, qui choisit son nom en souvenir de la Gand flamande connue lors dune expédition militaire. Cette fondation a pour but la mise en valeur des terres des vallées du Néez et de Las Hies.  La maison Corisande construite par le marchand Guillaume dAndoins avec sa tour datée de 1593, maison dite de Jeanne dAlbret, remaniée au XIXe siècle.                                             Château MARCA: maison natale de Pierre de Marca du XVIe siècle","architecture":"La  Tour  de la maison Corisande  abritant un escalier à vis, selon la mode du XVIe siècle.  Porte nord dite de la prison de 1371) classée M.H, la bastide originelle comportait deux autres portes, chemin de ronde qui longeait les fossés et les palissades. Place de la bastide: mairie reconstruite au XIXe siècle, une halle avec arcades au rez-de-chaussée. Maisons anciennes avec pignon sur rue ou plus récentes avec façade symétrique. Maison dArrac de 1542 : sa tour escalier à vis a été tronquée au XXe siècle.    La cité est ceinturée par des palissades et par deux canaux parallèles, ils sont comblés en 1960. La porte nord, seule conservée, date du XIVe siècle.\r\nAu XVIe siècle, un incendie ravage le bourg ; la reconstruction nous a laissé trois maisons caractéristiques avec tourelle.                                        Château MARCA: maison natale de Pierre de Marca du XVIe siècle agrandie en 1635, corps de bâtiment en équerre reliés par une tour d'escalier à vis. A proximité de beaux encadrements en ogive.","habitants":"Gaston II, vicomte de Foix-Béarn\r\n        \"","divers":"La mairie de Gan, la maison Corisande grav 1, la tour porte grav 3 et le château de  Marca grav 2 et 4","gps":"","images":["../../jctruffet.com/image/image_64/64_Gan_Marca_1.jpg","../../jctruffet.com/image/image_64/64_Gan_Marca_2.jpg","../../jctruffet.com/image/image_64/64_Gan_Marca_3.jpg","../../jctruffet.com/image/image_64/64_Gan_Marca_4.jpg"]},"Consult_chateau_formulairec073":{"id":"Consult_chateau_formulairec073","dept":"64","canton":"Serres-Castet","commune":"Garlin","nom":"Garlin","type":"Château","periode":"XV","histoire":"BASTIDE GARLIN, en 1302, la vicomtesse de Béarn renforce la frontière qui la sépare des terres anglaises en créant là une bastide. Maison du seigneur de Garlin, celui de la mairie se distingue en raison de sa résidence de qualité. En effet, il s'agit d'une ancienne demeure de seigneur de Garlin, qui fut bâtie aux XVIIe et XVIIIe siècles. Celle-ci fut, entre 1744 et 1772, la demeure de la famille de Hiton, seigneur de Garlin. Ensuite, la famille Pergade y demeura jusqu'en 1827.               \r\nAutre demeure du XVIIe, très bien restaurée, lactuelle mairieest installée dans le château de Hiton, du nom de Hiton de Conchez, capitaine huguenot anobli en 1691 par Henri IV.  Ancien hospice st-Pierre construit à la fin du XIXe siècle,  celui-ci demeure un témoin très important de l'histoire de la commune depuis le XXe siècle.  Ce beau et impressionnant bâtiment construit en 1883 fut inauguré, d'abord, en tant qu'hospice Saint-Pierre. Lors de la Première Guerre mondiale, il était aisément capable d'accueillir de nombreux blessés et convalescents des campagne de 1914 - 1915, grâce à cette qualité. \r\nEnsuite, cet ancien hospice devient, à nouveau, une maison de retraite en 1967, et cela resta jusqu'en 2005. La commune donna enfin une nouvelle vie à ce bâtiment, depuis 2011, il s'agit de la médiathèque de la commune, établissement le plus fréquenté à Garlin.","architecture":"Maison du seigneur de Garlin, celui de la mairie se distingue en raison de sa résidence de qualité. L'acquisition par la commune fut achevée vers 1950. Non seulement le siège de la mairie bénéficie, donc, de la qualité de l'établissement, mais également elle possède son parc municipal distingué, grâce aux arbres remarquables ainsi qu'au vestige d'un pilier de l'ancienne bastide, à la suite de cette acquisition.    Ancien hospice st-Pierre Il s'agit certes d'un bâtiment construit à la fin du XIXe siècle, celui-ci demeure un témoin très important de l'histoire de la commune depuis le XXe siècle. Ce beau et impressionnant bâtiment construit en 1883 fut inauguré, d'abord, en tant qu'hospice Saint-Pierre.  Celui-ci gardait sa fonction jusqu'en 1918. Une fois la guerre terminée, en 1923, l'établissement fut transformé en bâtiment public, à savoir le siège de la mairie. En outre, il était en usage, comme les sièges de l'harmonie, de la salle de Justice de Paix et du greffe, de l'école de garçons ainsi que des services bancaires.","habitants":"Famille de Hiton de Conchez\r\n        \"","divers":"Château Hiton grav 1 et 2 et Saint Pierre grav 3 et 4  à Garlin","gps":"","images":["../../jctruffet.com/image/image_64/64_Garlin_1.jpg","../../jctruffet.com/image/image_64/64_Garlin_2.jpg","../../jctruffet.com/image/image_64/64_Garlin_3.jpg","../../jctruffet.com/image/image_64/64_Garlin_4.jpg"]},"Consult_chateau_formulaire6a99":{"id":"Consult_chateau_formulaire6a99","dept":"64","canton":"Saint-Palais","commune":"Mendionde","nom":"Garro","type":"Château","periode":"XVI","histoire":"GARRO,  les barons de Garro faisaient partie de la noblesse du Labourd.\r\nAu XVIIe siècle, Mendionde et Gréciette, qui étaient alors des villages distincts,  appartenaient au seigneur de Garro.   Le retour des exilés et le recouvrement de leurs biens furent décidés par une série d'arrêtés pris le 29 septembre et le 1er octobre 1794, poussés dans ce sens par le directoire d'Ustaritz : «  La récupération des biens ne se fit pas sans difficulté ; ceux-ci avaient été mis sous séquestre mais n'avaient pas été enregistrés et avaient été livrés au pillage : « Les biens, meubles et immeubles des habitants de Sare, n'ont été ni constatés ni légalement décrits ; tous nos meubles et effets mobiliers ont été enlevés et portés confusément dans les communes voisines  au lieu de les déposer dans des lieux sûrs, on en a vendu une partie aux enchères, et une autre partie sans enchères.  À la mort du dernier seigneur en 1923, le château fut la propriété de monsieur Lesca qui le légua à la ville de Bayonne. En 1995 il devient la propriété de la commune de Mendionde. A ce jour, le dernier héritier légitime Ramuntxo Biscay dit Garro revendique la propriété du domaine. Aujourd'hui, dans l'attente d'une reconnaissance officielle de son statut de baron, il n'a pas d'autre choix que de s'adonner à de basse pratique d'insémination artificielle.","architecture":"Le château de Garro abrite dans ses murs, aujourd'hui, l'école d'agriculture.  Imposante bâtisse dont le corps de logis rectangulaire à tois niveaux sur soubassements et attique accolé aux extrémités de pavillons rectangulaires de même niveaux toit en croupe recouvert de tuiles, l'ensemble est relié à un grand bâtiment rectangulaire de dépendance à quatre niveaux.   En 1995 il devient la propriété de la commune de Mendionde. Il a abrité  la première  école d'agriculture du pays Basque (aujourd'hui Lycée Armand David à Hasparren), une unité de fabrication de fromage, une colonie de vacances et un lieu de catéchisme.\r\nDe nos jours il abrite un atelier de sculpteur et sert de cadre à des manifestations culturelles","habitants":"seigneur de Garro\r\n        \"","divers":"Château de Garro   3° 20' 42 nord, 1° 16' 51 ouest à  Mendiode","gps":"","images":["../../jctruffet.com/image/image_64/64_Garro_1.jpg","../../jctruffet.com/image/image_64/64_Garro_2.jpg","../../jctruffet.com/image/image_64/64_Garro_3.jpg","../../jctruffet.com/image/image_64/64_Garro_4.jpg","../../jctruffet.com/image/image_64/64_Garro_5.jpg","../../jctruffet.com/image/image_64/64_Garro_6.jpg"]},"Consult_chateau_formulaire7669":{"id":"Consult_chateau_formulaire7669","dept":"64","canton":"Artix","commune":"Malaussanne","nom":"Gaye","type":"manoir","periode":"XVI","histoire":"GAYE,  Malaussanne est une ancienne commanderie de Saint-Antoine, dépendant du prieuré de Toulouse.\r\nMalaussanne dépendait de la Chalosse et de la subdélégation de Saint-Sever. Pas d'information historique","architecture":"L'ensemble fortifié  basse-cour, motte, fossé, enceinte, appelé parfois camp romain, date des XIe et XIIe siècles.\r\nLe manoir, dit château Gaye, date du XVIe siècle et fut remanié aux XVIIIe et XIXe siècles. Logis de plan presque quadrangulaire complété par une tour située au milieu de l'élévation antérieure sud et par une pièce en appentis à l'ouest. La porte de la tour possède un linteau décoré d'une accolade. La partie droite de la façade sud est équipée de deux fenêtres à bord inférieur mouluré. La grange, rectangulaire, est équipée de quatre portes cochères et à l'extrémité droite d'une porte piétonne avec accolade sculptée sur le linteau. Cette partie abritait le logement des domestiques qu'un mur intérieur sépare de la grange. Un escalier en bois conduit à l'étage. Les deux portes cochères ont été agrandies au XIXe siècle et sont surmontées d'un arc surbaissé. Les deux autres ont perdu leur linteau mais conservent leur jambage en pierre chanfreinée.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château Gaye  à Malaussanne","gps":"","images":["../../jctruffet.com/image/image_64/64_Gaye_1.jpg","../../jctruffet.com/image/image_64/64_Gaye_2.jpg"]},"Consult_chateau_formulaire6e9c":{"id":"Consult_chateau_formulaire6e9c","dept":"64","canton":"Serres-Castet","commune":"Gayon","nom":"Gayon","type":"Château","periode":"XIII-XVI","histoire":"GAYON, dans le vignoble du Madiran et du Pacherenc du Vic-Bilh, le château de Gayon, datant du XIIIe siècle,  au XVe siècle, le château de Gayon appartient aux vicomtes bigourdans du Lavedan avant de devenir la propriété de François de Navarro. Ce médecin du roi de Navarre partage ladministration de la seigneurie avec la vicomté de Béarn.","architecture":"Château de Gayon, datant du XIIIe siècle, offre une vue panoramique sur les vignes, les coteaux et les Pyrénées. Cest au XIIIe siècle que les seigneurs locaux édifient le château de Gayon en surplomb de la vallée du Lèes, à lest dune motte castrale,La demeure seigneuriale est largement reconstruite au XVIe siècle, avec notamment lajout de fenêtres à meneaux classiques. Au siècle suivant, on adjoint au corps de bâtiment rectangulaire une tour carrée. De lédifice primitif du XIIIe siècle, il ne reste quune tour ronde à louest du bâtiment, qui présente encore deux meurtrières. subsistent les maçonneries dune tour ronde à larrière du bâtiment reconstruit au XVIe siècle avec fenêtres à meneaux et remanié au XVIIIe siècle.","habitants":"Monsieur Lionel Trieulet\r\n        \"","divers":"Château de Gayon à Serres Castet","gps":"","images":["../../jctruffet.com/image/image_64/64_Gayon_1.jpg","../../jctruffet.com/image/image_64/64_Gayon_2.jpg"]},"Consult_chateau_formulaire1cbe":{"id":"Consult_chateau_formulaire1cbe","dept":"64","canton":"Pau","commune":"Gelos","nom":"Gelos","type":"Château","periode":"XVIII","histoire":"A Gelos  cinq châteaux dont celui de Gelos haras, le Clos Mirabel, le Beterette, l'Estefani et le Tout-y-Croit, pas d'information historique  pour ces derniers.     GELOS, le haras national de Gelos occupe le château, qui date de 1784. Le haras possède des voitures hippomobiles classées au titre d'objet aux M.H.  Plus important édifice béarnais de la seconde moitié du XVIIIe siècle,  a été bâti par Martin-Simon, baron de Duplaa (1721-1817), président à mortier au Parlement de Navarre en 1751 et propriétaire de labbaye laïque de Gelos. Fils de Bertrand, Jean Duplàa épouse Jeanne de Fréchou, possédant un fort héritage fait rentré des gens de robes, avocat au parlement de Paupuis conseiller à la même cour Jean devient maire d'Oloron en 1697, à la suite son fils Martin-Simon épouse la fille du marquis de Charitte.  Ce baron eut lidée saugrenue de joindre ce château à son hôtel particulier de Pau, aujourdhui démoli, par un pont suspendu traversant la vallée et le Gave.  En 1808, Napoléon, venu loger au château, décide dacheter la demeure pour y faire installer un haras en 1817  quelques jours avant sa mort Martin Simon de Duplàa vend le domaine à l'administration des haras.               Voisin de Gelos, le village de Jurançon à l'ouest le manoir de CLOS -MIRABEL est un magnifique domaine de 6 ha, entre mer et montagne. Du XVIIIe siècle est situé dans un parc privé. C'est un lieu de paix, de lumière et de détente à quelques minutes du centre de Pau.","architecture":"Le château de Gelos comprend un corps central élevé sur un rez-de-chaussée et un étage surmonté d'un attique, qu'encadrent deux pavillons de même hauteur, auxquels  viennent s'accoler  deux petits pavillons qui ne comportaient à l'origine qu'un rez-de-chaussée  sur cour , au sud, la façade présente seize travées, dont une travée d'axes, aux angles soulignés de chaînages, qu'amortit un fronton triangulaire  portant une inscription datant de 1791, les fenêtres du corps central, sommées d'une corniche, sont rectangulaires, celles des pavillons en saillie légèrement cintrées. Courant le long de la façade un bandeau de pierre séparant les deux premiers niveaux et une corniche sous l'attique souligne l'ensemble. L'avant corps à deux travées s'ouvre par deux portes fenêtres sur le parc. Lintérieur du château de Gélos conserve son décor dorigine, avec notamment un grand salon décoré de boiseries rocailles et une cheminée de marbre dont le trumeau est orné de paysages champêtres.                                                                     Clos Mirabel de plan en U à deux niveaux recouvert d'un toit en croupes en ardoises.","habitants":"Martin-Simon, baron de Duplaa \r\n        \"","divers":"Le château du haras de  Gelos  le Clos-Mirabel grav 4 et 5, à  Gelos","gps":"","images":["../../jctruffet.com/image/image_64/64_Gelos_1.jpg","../../jctruffet.com/image/image_64/64_Gelos_2.jpg","../../jctruffet.com/image/image_64/64_Gelos_3.jpg","../../jctruffet.com/image/image_64/64_Gelos_4.jpg","../../jctruffet.com/image/image_64/64_Gelos_5.jpg"]},"Consult_chateau_formulaire3c59":{"id":"Consult_chateau_formulaire3c59","dept":"64","canton":"Pau","commune":"Gelos","nom":"Gelos_Chateau","type":"Château","periode":"XVIII","histoire":"BETERETTE le président du parlement de Navarre Pierre de Gassion, puis François de Bordeu, médecin royal de Barèges à la fin XVIIe siècle\r\nEn 1784, l'abbaye et le titre passèrent au baron Martin-Simon Duplaa, président du parlement de Navarre. Il y fit construire le château actuel qu'il aurait souhaité relier à son hôtel particulier à Pau, Aujourd'hui est un établissement médico-social.                                     ESTEFANI, prit son nom actuel quand un banquier espagnol nommé Estefani acheta la demeure au XIXe siècle. En 1836, le duc de Montebello, maire de Gelos sous le Second Empire et fils du maréchal Lannes, maréchal d'empire sous Napoléon Ier, acheta le château Estefani.  La propriété fut ensuite acquise par le comte Paul de Gontaut-Biron, époux d'une princesse russe nommée Hélène Troubetzkoy. Il agrandit la demeure en 1882. En 1940, un cousin du comte, le marquis de Castellane, une des familles aristocratiques les plus anciennes de France, occupa le château Estefani. Antoine Boniface de Castellane était le fils d'Anne Gould , une héritière américaine citée dans plusieurs ouvrages. Il se maria à Yvonne Patenotre, fille de l'ambassadeur français des Etats-Unis. Ils ont eu une fille qui se maria à Robert Bertin, directeur d'une maison d'édition.                                    TOUT-Y-CROIT, la légende veut qu'un jour la reine Jeanne se serait exclamée : « Mais tout y croît donc sur cette terre! ». A partir de 1560, le seigneur de Casaus, chirurgien de la reine, fut autorisé à annexer au domaine « Tout y Croît » bon nombre de journaux de terre (mesure de Morlaas) et de bois affermés aux habitants de Gelos. Un peu plus tard, la propriété fut anoblie. Ainsi Gelos posséda une domenjature (terre noble).","architecture":"BETERETTE, de plan en équerre avec deux corps de logis à deux et trois étages est une bâtisse importante flanqué d'une tour heptogonales  crénelée de six étages dans le prolongement du bâtiment       ESTIFANI  ,fut construit sur les anciens terrains de chasse du Roi de France et de Navarre Henri IV. Nommé à l'origine château \"Boize\" ou \"Borie Bois\",  resta dans la famille Bertin jusqu'en janvier 2006 date à laquelle l'entrepreneuse Teresa Ward acheta la demeure. Tombée amoureuse de la propriété, Teresa Ward entama de grands travaux de rénovation qui se finirent en 2007 et redonna au chàteau son éclat d'antan. En juillet 2012, elle décida d'ouvrir le château au public en faisant une splendide chambre d'hôte et donna la gérance à un jeune couple de la région Marie Fath et Alexandre Darracq.\r\nTOUT-Y-CROIT, corps de logis de plan d'équerre à deux niveaux avec lucarnes sur comble toit en croupe recouvert d'ardoises, accolé de chaque côté de l'édifice deux tours rondes toits en poivrières et un retour en équerre  d'un bâtiment oblong d'un étage.","habitants":"Maréchal Lannes                                                        baron Martin-Simon Duplaa \r\n        \r\n        \"","divers":"Le Beterette grav1 et 2 le manoir d'Estefani grav 3 et le manoir de Tout-y-Croit grav 4 à Gelos","gps":"","images":["../../jctruffet.com/image/image_64/64_Gelos_Chateau_1.jpg","../../jctruffet.com/image/image_64/64_Gelos_Chateau_2.jpg","../../jctruffet.com/image/image_64/64_Gelos_Chateau_3.jpg","../../jctruffet.com/image/image_64/64_Gelos_Chateau_4.jpg"]},"Consult_chateau_formulaireb56a":{"id":"Consult_chateau_formulaireb56a","dept":"64","canton":"Oloron-Ste-Marie","commune":"Goès","nom":"Goès","type":"Château","periode":"XIV","histoire":"GOES, sa première mention apparaît en 1385. Il appartient à la famille de Montesquiou-Sainte-Colomme qui bâtit une maison forte au XVIe siècle et la vendit à un chanoine dOloron. La propriété passe ensuite à Gaillard de Gassion, puis à la famille Colomiè, et enfin aux Casaucau.\r\nLe rez-de-chaussée du château de Goès accueille actuellement un club hippique.","architecture":"GOES, le château de Goès se dresse face à léglise du village. Cette ancienne maison forte, dont les origines remontent au XIVe siècle, revêt aujourdhui les apparences dune belle demeure dagrément.  Lédifice actuel date du début du XVIe siècle et a été remanié au XVIIe siècle. Il se présente sous la forme dun logis rectangulaire à un étage coiffé dun toit béarnais à  forte pente double, couvert dardoises. La façade est flanquée dune tourelle ronde et dune carrée. Lentrée se fait par une porte cintrée avec un linteau qui porte linscription \"1617\". Notons que dans la pièce à gauche de lentrée se trouve une cheminée Renaissance en calcaire de Lasseube. Le peu douvertures et les quelques meurtrières attestent le rôle défensif de lancienne maison forte.","habitants":"Famille de Montesquiou-Sainte-Colomme\r\n        \"","divers":"Château de Goès","gps":"","images":["../../jctruffet.com/image/image_64/64_Go%c3%a8s_1.jpg","../../jctruffet.com/image/image_64/64_Go%c3%a8s_2.jpg"]},"Consult_chateau_formulaireca72":{"id":"Consult_chateau_formulaireca72","dept":"64","canton":"Nive-Adour","commune":"Guiche","nom":"Guiche_Bourgarde","type":"Vestiges","periode":"XI-XVI","histoire":"Deux châteaux à Guiche celui de Guiche dit de Bourgade et celui de Gramont (voir article).  BOURGADE,  dit de Guiche, demeure des ducs de Gramont également,  Il passe alternativement des Albret aux Gramont, pour définitivement devenir un fief des Gramont dans la première moitié du XVIe siècle. Le fils aîné des Gramont obtient le privilège de porter le titre de comte, puis duc de Guiche. Le manoir dit ancienne maison noble de Labadie date du XVIe siècle.  La ferme du lieu-dit du Grand-Borde  date du XVIIe siècle. La maison de Marchand date du XVIIe siècle.  Guiche possède des maisons de maître datant du XVIIe siècle. Le pigeonnier soutenu par trois colonnes, ayant successivement servi d'école puis de mairie, date de 1760.","architecture":"Le château de Guiche-Bourgade apparaît pour la première fois dans les textes à la fin du XIe siècle, patrimoine classé, étudié ou inscrit dit 'château de Guiche' à guiche. a une position élevée et ses murs sont d'une épaisseur très importante. Après avoir été incendié, fortifié, reconstruit, pris d'assaut et dévasté, ses ruines sont aujourd'hui en travaux de restauration tout comme le château de Bidache.  La bourgade forme un ensemble dans le prolongement du château.  Le premier noyau d'habitat semble avoir vu le jour au pied du château.  Celui-ci reçoit la forme qu'on lui connaît aujourd'hui. Il est composé d'une enceinte rectangulaire d'environ 20m x 30m dans la partie Est se trouve intégrée la tour, avec à sa base la porte d'entrée. Dans la partie nord-ouest de l'enceinte est incluse une tour massive servant de logis (13m x 13m). A partir de 1615, date où les troupes protestantes du duc de la force menaçaient Guiche, le château ne connut pas d'autres épisodes militaires. Au moment de la Révolution il était habité seulement par un concierge.","habitants":"Famille des Gramont\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de la Guiche","gps":"","images":["../../jctruffet.com/image/image_64/64_Guiche_Bourgade_1.jpg","../../jctruffet.com/image/image_64/64_Guiche_Bourgade_2.jpg","../../jctruffet.com/image/image_64/64_Guiche_Bourgade_3.jpg","../../jctruffet.com/image/image_64/64_Guiche_Bourgade_4.jpg","../../jctruffet.com/image/image_64/64_Guiche_Bourgade_5.jpg","../../jctruffet.com/image/image_64/64_Guiche_Bourgade_6.jpg"]},"Consult_chateau_formulaire47dd":{"id":"Consult_chateau_formulaire47dd","dept":"64","canton":"Oloron Ste-Marie","commune":"Gurmençon","nom":"Gurmencon","type":"Château","periode":"XV","histoire":"GURMENCON, une seigneurie se met ensuite en place et la maison noble s'installe sur la terrasse surplombant le gave d'Aspe et l'ancien moulin seigneurial mentionné dès le XVIe siècle. Un acte en date du 15 avril 1639 fait autorisation à M. De Lassalle, seigneur des lieux,   de prendre le bois qui lui sera nécessaire pour construire au lieu de Gurmençon, un château et un moulin.  Les familles Lamoureux et Pailette, succéderont au Lassalle. Un autre seigneur local entra un temps en possession des thermes de Saint-Christau.","architecture":"En 1307, la commune bénéficie d'un acte d'affièvement dans les landes, bois et territoires d'Agnos et d'Asasp.  D'abord destiné à la mouture, il fut aussi utilisé comme foulon à draps.\r\nLe  village est situé à proximité d'Oloron sur la route d'Espagne, bien campé sur la haute terrasse du gave d'Aspe. Le centre primitif était plus bas qu'actuellement, à proximité du \"château\", en fait l'ancienne abbaye laïque, et se trouvait traversé par le vieux chemin de Sainte-Marie-Lez-Oloron.","habitants":"M. De Lassalle\r\n        \"","divers":"Château de Gurmencon","gps":"","images":["../../jctruffet.com/image/image_64/64_Gurmencon_1.jpg","../../jctruffet.com/image/image_64/64_Gurmencon_2.jpg"]},"Consult_chateau_formulaire6fde":{"id":"Consult_chateau_formulaire6fde","dept":"64","canton":"Oloron Ste-Marie","commune":"Gurs","nom":"Gurs","type":"Château","periode":"XVI","histoire":"GURS, pas d'information historique.","architecture":"GURS Le château de Gurs domine la colline de ce charmant village Béarnais prés de Navarrenx. Le château se compose d'un rez-de-chaussée surélevé d'une marquise en fer forgé, un hall d'entrée, un séjour donnant accès à une terrasse, un petit et un grand salon, une bibliothèque et cuisine. Au 1er étage : un salon central, une suite parentale, deux chambres avec salles d'eau, une salle de bain, et des wc indépendants. Au 2ème étage : 5 chambres, caves et combles. Tous les éléments de construction sont de qualité. Le château de Gurs est bâti en pierre claire d'Angoulême sur un soubassement de pierre grise d'Arudy, les menuiseries, parquets, escaliers sont en chêne. Le parc de 6000 m² arboré est clos par un mur en maçonnerie surmonté d'une grille en fer forgé.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Gurs","gps":"","images":["../../jctruffet.com/image/image_64/64_Gurs_1.jpg","../../jctruffet.com/image/image_64/64_Gurs_2.jpg","../../jctruffet.com/image/image_64/64_Gurs_3.jpg","../../jctruffet.com/image/image_64/64_Gurs_4.jpg"]},"Consult_chateau_formulaire5ba4-2":{"id":"Consult_chateau_formulaire5ba4-2","dept":"64","canton":"St-Jean de Luz","commune":"Ultaritz","nom":"Haltya","type":"Château","periode":"XIX","histoire":"HALTYA, perché sur les hauteurs dUstaritz dans le quartier Herauritz, le château Haltya est luvre dun des  Indianos  dUstaritz. Les  Indianos , aussi appelés les Américains , désignent les Basques qui partent massivement à partir de 1830 en Amérique du Sud essentiellement au Chili et au Mexique pour y faire fortune.\r\nSauveur Halty, natif dEspelette, est lun dentre eux. De retour du Mexique, il décide donc de faire construire ce château. Halty épouse en 1899 Marie-Catherine Sescosse, elle-même fille dun autre  Indiano  qui fit fortune au Mexique. Ce dernier bâtit à Ustaritz la maison Guadaloupea en 1843.  Le château Haltya fut la demeure du docteur Souberbielle, maire dUstaritz, de 1910 à 1939, fut ensuite, durant peu de temps, un hôtel-restaurant, dans les années 2000.  \r\n Le château Haltya a été vendu le 19 avril dernier.","architecture":"HALTYA,  parfaitement restauré et entretenu, le château Haltya est aujourdhui transformé en chambres dhôtes et ouvert à la location pour des événements divers (mariages, réceptions ou séminaires).Sa silhouette Néo-Renaissance corps de logis rectangulaire à deux niveaux avec série de lucarnes  l'édifice est accolé de quatre pavillons carrés saillants sur les angles et en façade s'ajoute deux tourelles à trois niveaux à toitures trés pointus, domine le quartier de la Guadeloupe, à lextrémité dun parc qui longe la côte, séparant Hiribehere de Hérauritz. Côté Hérauritz, la grille dentrée majestueuse laisse la place à une allée bordée de chênes centenaires (espace boisé classé).","habitants":"Famille de Sauveur Halty\r\n        \"","divers":"Château d'Haltya à Ultaritz","gps":"","images":["../../jctruffet.com/image/image_64/64_Haltya_1.jpg","../../jctruffet.com/image/image_64/64_Haltya_2.jpg","../../jctruffet.com/image/image_64/64_Haltya_3.jpg","../../jctruffet.com/image/image_64/64_Haltya_4.jpg"]},"Consult_chateau_formulaireef9c":{"id":"Consult_chateau_formulaireef9c","dept":"64","canton":"Hendaye","commune":"Hendaye","nom":"Hendaye","type":"Patrimoine","periode":"XVII","histoire":"HENDAYE , témoin de ce passé, le fort Gaztelu Zahar maintes fois détruit puis reconstruit, qui fut embelli par les travaux de Vauban puis définitivement rasé ainsi que toute la ville lors des guerres de la Révolution. C'est sur l'île des Faisans au milieu de la rivière Bidassoa que le roi Louis XIV rencontra le roi dEspagne et que furent signés le traité des Pyrénées en 1659 et plus tard le contrat de mariage entre Louis XIV et l'infante Marie-Thérèse. En 1867, Urrugne restitue à Hendaye 762 hectares concédés par Louis XIV. La commune était jusque là un village de 33 hectares. C'est à la gare d'Hendaye qu'eut lieu, le 23 octobre 1940, l'entrevue entre Hitler et le général Franco, ce dernier respectant l'engagement pris lors des accords Bérard-Jordana signés le 25 février 1939 et réaffirmant le non-engagement de son pays dans la seconde guerre mondiale.   Pierre Loti acquiert la villa Adamena en 1904. Avant cette date, il y séjourne comme locataire en raison de son statut dofficier de marine. Cest lui qui la rebaptise Bakar Etxea, la maison du Solitaire. En 1914, il commande des travaux pour lui conférer une esthétique plus traditionnelle de la région, ce qui lui donne à première vue un style néo-basque.","architecture":"Le casino d'Hendaye fut construit en 1988 dans le cadre du projet de développement de la station balnéaire. Son exploitation est aujourd'hui assuré par le groupe Sokoburu qui inaugura son casino en 1994. Le complexe Sokoburu a été édifié dans le style néo-basque.                                                                        La villa maison Rouge (Edmond Durandeau), rue des Citronniers, est inscrite aux monuments historiques.                                                                      La villa Mauresque et son jardin ainsi que la villa Bakhar villa de style néo-mauresque construite avec les pierres du Vieux-Fort pour le prince Jules de Polignac, fils du ministre de Charles X en 1866-1867. \r\nVilla Bakhar  Etchea de Pierre Loti ont été inscrits en totalité au titre des M.H  en 2010.","habitants":"Maréchal Vauban\r\n        \"","divers":"Le casino grav 1, villa escualdina grav 2et 3, villa Mauresque grav 5 La Maison Rouge grav 4 et la maison de Pierre Loty Grav 6 et 7 villa herzabia_8","gps":"","images":["../../jctruffet.com/image/image_64/64_Hendaye_1.jpg","../../jctruffet.com/image/image_64/64_Hendaye_2.jpg","../../jctruffet.com/image/image_64/64_Hendaye_3.jpg","../../jctruffet.com/image/image_64/64_Hendaye_4.jpg","../../jctruffet.com/image/image_64/64_Hendaye_5.jpg","../../jctruffet.com/image/image_64/64_Hendaye_6.jpg","../../jctruffet.com/image/image_64/64_Hendaye_7.jpg","../../jctruffet.com/image/image_64/64_Hendaye_8.jpg"]},"Consult_chateau_formulaireb159":{"id":"Consult_chateau_formulaireb159","dept":"64","canton":"Mauléon-Licharre","commune":"Saint-Jean le Vieux","nom":"Irumberry","type":"Château","periode":"XIII-XVI","histoire":"IRUMBERRY, les d'Irumberry, seigneur de d'Irumberry et Salaberry, qui ne peuvent démontrer leur origine \"royale\", est une des familles les plus distinguées de la chevalerie du royaume de Navarre. Son nom provient d'un fief du pays de Cize, près de Saint-Jean-Pied-de-Port, sa filiation prouvée n'a pu être remontée au-delà de 1467. Illustrée dans les armées de terre et dans la marine, comme dans la chambre des comptes de Paris du XVIe au XVIIIe siècle. Admis dans la noblesse du Béarn qui date de 1189, est le plus ancien de la commune. Le premier des Irumberry pris part à la huitième croisade en 1270 avec Saint-Louis et Thibaut II de Navarre.  Au XVIe siècle, un Irumberri de Salaberri s'illustra à la bataille de Coutras, dans l'armée de Henri IV, y gagnant sa devise: \"Force à superbe, mercy à faible\".  Au XVIIe siècle, Charles Michel Irumberri de Salaberry remporta la victoire de Châteauguay, qui eut lieu à un endroit stratégique sur les berges de la rivière du même nom, à 50 km au sud-ouest de Montréal, près de la frontière américaine, contre les américains le 26 octobre 1813. Le colonel Charles-Michel de Salaberry, et son groupe de 300 hommes, y arrêtèrent les troupes américaines venues envahir le Bas-Canada. Cette victoire fut décisive pour l'indép
