ui classé à linventaire des M.H.","habitants":"Famille de Baure\r\n        \"","divers":"Château de Baure à Sainte Suzanne  43° 28' 45 nord, 0° 48' 44 ouest,","gps":"","images":["../../jctruffet.com/image/image_64/64_Baure_1.jpg","../../jctruffet.com/image/image_64/64_Baure_2.jpg"]},"Consult_chateau_formulairea4e8":{"id":"Consult_chateau_formulairea4e8","dept":"64","canton":"Mourenx","commune":"Bugnien","nom":"Baylac","type":"Château","periode":"XVI","histoire":"BAYLAC chambres d'hôtes 4 étoiles","architecture":"Baylac,  dans le hameau de Bugnein, au sommet d'une colline et dans une propriété privée de 4 hectares entre bois et vallons, domine le château de Baylac. Cette demeure chargée dhistoire est classée aux bâtiments de grand caractère. Son architecture insolite témoigne du passage de personnages et artistes farfelus en ses terres. L'ensemble élégant qui allie charme authentique et caractère contemporain et les prestations haut de gamme en son sein sont à découvrir absolument.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Baylac à Bugnien","gps":"","images":["../../jctruffet.com/image/image_64/64_Baylac_1.jpg","../../jctruffet.com/image/image_64/64_Baylac_2.jpg","../../jctruffet.com/image/image_64/64_Baylac_3.jpg","../../jctruffet.com/image/image_64/64_Baylac_4.jpg","../../jctruffet.com/image/image_64/64_Baylac_5.jpg","../../jctruffet.com/image/image_64/64_Baylac_6.jpg","../../jctruffet.com/image/image_64/64_Baylac_7.jpg"]},"Consult_chateau_formulairef061":{"id":"Consult_chateau_formulairef061","dept":"64","canton":"Bayonne","commune":"Bayonne","nom":"Bayonne","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Bayonne le caradoc, le Marracq,le Château-Neuf (voir article) et Vigneau.     CARADOC, doit son nom à un lord anglais, le général Caradoc, qui sest illustré dans la carrière des armes et de la diplomatie. Le général Caradoc, par ailleurs Lord Howden, ambassadeur de sa majesté à Madrid, dans les années 1856 navait certainement pas prédit que sa luxueuse demeure, la Casa Caradoc, située au coeur du quartier Saint Etienne; À la mort du général Caradoc, le château revient à madame Édouard Olier qui le transmet à son tour à son neveu Emmanuel Bocher. Il échoie enfin au marquis Fuente Hermosa.   Aujourd'hui une clinique psychiatrique.  la société Cantegrit sest rendue acquéreuse du château.\r\nMARRACQ, le château de Marracq est de style Louis XIV. Sa construction date du XVIIIe siècle, construit au XVIIIe siècle à l'initiative de Marie-Anne de Neubourg, le château de Marracq n'a jamais été véritablement habité. En revanche, Napoléon Ier y a séjourné. En 1808, le château fut le théâtre de la signature de l'abdication du roi d'Espagne Charles IV en faveur de l'empereur français. Dès lors, Joseph Bonaparte fut installé sur le trône ibérique.\r\nVIGNEAU, c'est un ancien domaine viticole situé au nord-ouest de la citadelle, racheté en 1848 et restauré par la famille Fonsèque, importante parmi la communauté juive de Bayonne, le château du Vigneau a accueilli Pierre Mendès France à plusieurs reprises. Au XIXe siècle, cet ancien domaine viticole fut transformé en maison de campagne, restauré et embelli, en 1918. L'architecte fut Mr Gomez. Depuis 1964, les propriétaires actuels Mr et Mme Gilles Schmidt-Lissarrague, s'attachent à préserver l'édifice et son parc.","architecture":"CARADOC  du château original, Albano ne garde que les fondations. Sur ces bases, il élève une résidence somptueuse flanquée à chaque angle de tours octogonales. La demeure est ensuite entourée dun parc qui figure parmi les hauts lieux de lhorticulture française. Le marquis apporte des améliorations à la demeure. Dans un décor intérieur aménagé avec goût et faste, il organise au château des soirées mondaines très courues. Le château de Caradoc accueille désormais une maison municipale de retraite   MARRACQ, en 1825, une partie du château part en fumée et suite à cet incendie, château et parc sont laissées à l'abandon 80 ans. Depuis 1907, les ruines sont classées M.H. Depuis 2012, les ruines du château sont en cours de rénovation car  il y avait un risque d'effondrement et une érosion accélérée du fait qu'il n'y ait plus de toit. Les murs ont été lessivés, les clés de voûte et les pierres réparées ou remplacées. L'aménagement extérieur et la sécurisation sont en cours. Le château de Marracq a été racheté par la commune. Aujourd'hui à l'état de ruines,         VIGNEAU, d'une architecture simple, possède des proportions élégantes et de nombreux éléments de décor, à l'extérieur comme à l'intérieur. Le jardin actuel se compose de 3 parties distinctes : le Jardin d'agrément qui entoure le château du Vigneau, la terrasse qui surplombe la pente du vallon et le vallon en contrebas.","habitants":"Le général Caradoc,                                                       Joseph Bonaparte                                                  Famille Fonsèque\r\n        \"","divers":"Château de Caradoc grav de 1 à 4, de Marracq 43° 28' 48 nord, 1° 29' 01 ouest  de 5 à 7 et de Vigneau 8 43° 30' 20 nord, 1° 28' 11 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bayonne_1.jpg","../../jctruffet.com/image/image_64/64_Bayonne_2.jpg","../../jctruffet.com/image/image_64/64_Bayonne_3.jpg","../../jctruffet.com/image/image_64/64_Bayonne_4.jpg","../../jctruffet.com/image/image_64/64_Bayonne_5.jpg","../../jctruffet.com/image/image_64/64_Bayonne_6.jpg","../../jctruffet.com/image/image_64/64_Bayonne_7.jpg","../../jctruffet.com/image/image_64/64_Bayonne_8.jpg"]},"Consult_chateau_formulairee1f0":{"id":"Consult_chateau_formulairee1f0","dept":"64","canton":"Bayonne","commune":"Bayonne","nom":"Bayonne_Chat_neuf","type":"Château-fort","periode":"XV-XVI","histoire":"CHATEAU-NEUF de BAYONNE, la citadelle aurait dû être rasée par ordre du roi de France en 1621, mais le comte de Gramont, gouverneur de la ville, nobéit pas à linjonction royale. Par la suite, Vauban inclut le château dans son projet de fortification. Lédifice est alors affecté au logement dune garnison. Il est endommagé en 1793 par lexplosion de barils de poudre. On profite de la remise en état pour construire une caserne à lintérieur de lenceinte. Le Château-Neuf poursuit sa carrière militaire jusquau XIXe siècle. Lédifice traverse alors une période creuse de semi-abandon et il faut attendre 1929 pour quil soit inscrit à la liste supplémentaire des M.H.\r\nAcheté par la mairie de Bayonne, le château-Neuf abrite aujourdhui plusieurs entités publiques, telles que ladministration du musée basque et un IUT dinformatique. Intégré dans un grand projet urbain, le Château-Neuf devrait bientôt côtoyer la bibliothèque universitaire.","architecture":"Au lendemain de la prise de Bayonne aux Anglais en 1451, le roi Charles VII na quune préoccupation : construire un édifice de défense capable de protéger la ville, mais aussi de la surveiller.En 1463, cest Louis XI qui poursuit le souhait de son père en faisant expertiser des terrains de la butte de Morocon, dans la perspective dy construire le futur Château-Neuf. Le chantier nécessite lexpropriation de 28 maisons, 84 jardins et 25 parcelles, puis la destruction de tous les bâtiments existants. Dès 1489, sous le règne de Charles VIII (1451-1498), deux grosses tours font face au quartier Bourgneuf. Elles sintègrent dans un imposant ouvrage défensif. Le Château-Neuf mesure pas moins de 64 mètres du nord au sud et 53 mètres dest en ouest. Il contribue à renforcer lenceinte ancienne, mais aussi à surveiller les quartiers du Borc Nau et de Panecau. Perçu comme une menace par la population de Bayonne, lédifice est surnommé « Qui quen grogne ».   Le château-Neuf se trouve au Petit Bayonne. Il est construit à partir du XVe siècle. Il se situe à l'entrée de la ville.  Le château a été un élément restauré et requalifié en 2010. Aujourd'hui, il y a l'université et sa bibliothèque.","habitants":"Maréchal  Vauban\r\n        \"","divers":"Château Neuf de Bayonne de 1 à 6  43° 29' 23 nord, 1° 28' 13 ouest, l'hôtel de ville 7 et 8","gps":"","images":["../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_1.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_2.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_3.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_4.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_5.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_6.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_7.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_neuf_8.jpg"]},"Consult_chateau_formulaireee01":{"id":"Consult_chateau_formulaireee01","dept":"64","canton":"Bayonne","commune":"Bayonne","nom":"Bayonne_Chat_Vieux","type":"Château","periode":"XII-XVII","histoire":"Château- VIEUX BAYONNE,  en 1130, Don Alfonso le Batailleur, Roi de Navarre séjourne au château. En 1151, Bayonne est ville Anglaise (pour 3 siècles).  A la fin du XIIe siècle, Richard Cur de Lion, Roi d'Angleterre, duc de Normandie, duc d'Aquitaine, comte du Maine et comte d'Anjou, accorde de nombreux privilèges à la ville de Bayonne. La cité devient prospère. Au milieu du XIVe siècle, Edward Plantagenêt, dit Édouard de Woodstock Brackembury et aussi nommé \"Le Prince Noir\",  capitaine de guerre anglais durant la guerre de cent ans, séjourne au château. Vers 1367, Pierre Ier de Castille séjourne au château. En 1451, Bayonne est ville Française. En 1463, Louis XI  séjourne au château. Au XVIe siècle, la fortification est Espagnole. En 1526, François Ier séjourne au château.  En 1565, Charle IX , roi de France, séjourne au château.  A partir de 1678, Vauban fortifie Bayonne, ville frontière avec l'Espagne. Il fait abattre le donjon dénommé Floripes. Voir la vue de Bayonne au XVIIe siècle. En 1660, le grand roi de France, Louis XIV, séjourne au château. En 1706, Marie Anne de Neubourg, Reine d'Espagne, séjourne au château. En 1809, le général de Palafox, défenseur de Saragosse, séjourne au château.  En 1886, l'enceinte Romaine est classée aux M.H.  En 1931, les remparts entre le château Vieux jusqu'à la Tour du Sault, sont inscrits aux M.H.","architecture":"Le Château Vieux  est la principale défense de Bayonne.  Bayonne est une ville fortifiée, A la fin du XIe siècle, C'est d'abord un donjon hexagonal. Au XIIe siècle, deux corps de bâtiment sont ajoutés au donjon. Le château construit en bordure du site d'un castrum romain qui abritait la garnison et l'administration de la région nommée « Lapurdum ». À partir de la fin du XIe siècle, les vicomtes de Labourd édifient une forteresse qui s'appuie sur trois tours romaines puissamment renforcées. Elle prend le nom de château-Vieux à la fin du XVe siècle, après la construction d'un nouveau château, dit château-neuf, dans le quartier du Petit-Bayonne.  Au XVIIe siècle, sur les ordres de Vauban qui entreprend de fortifier la place, le château devient le point d'appui Nord-Ouest. Le donjon est détruit, et on lui ajoute une avant-cour fortifiée. Il sera épargné par les modifications apportées plus tard au système de fortifications de Vauban. Le château-Vieux, propriété de l'Armée, est depuis toujours le siège des autorités militaires de la ville, qui accueille le 1er R.P.Ma.   Plusieurs niveaux de fortifications sont visibles et datées différemment. On y trouve des fortifications romaines, médiévales et celles construites au XVIe siècle.  Mais ce sera surtout Vauban qui entreprendra de grands travaux pour transformer Bayonne en véritable ville forteresse de 1638 à 1685, construction de bastions , glacis, dédoublement des remparts etc..Le déclassement de l'enceinte fortifiée de Bayonne en 1907 permet certes l'ouverture de la ville, mais au dépens du patrimoine puisqu'une partie des remparts est détruite (au nord du Château-Vieux).","habitants":"Édouard de Woodstock Brackembury \r\n        \"","divers":"Château Vieux de Bayonne","gps":"","images":["../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_1.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_2.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_3.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_4.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_5.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_6.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_7.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_8.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Chat_Vieux_9.jpg"]},"Consult_chateau_formulaire3216":{"id":"Consult_chateau_formulaire3216","dept":"64","canton":"Bayonne","commune":"Bayonne","nom":"Bayonne_Citadelle","type":"Forteresse","periode":"XV","histoire":"CHÂTEAU-VIEUX, de Bayonne  en 1620, le comte de Gramont fait édifier un châtelet carré flanqué de deux tours rondes et entouré de douves. Ce dispositif fait du Château-Vieux lune des défenses les plus imprenables de Bayonne. Célèbre par son imposante architecture, le château-Vieux lest aussi par la multitude de têtes couronnées et dillustres gouverneurs qui sy sont succédés. Du Guesclin, Prince de Galles, Louis XI, François Ier, Charles IX ou encore Louis XIV ont façonné lhistoire du château. En 1526, François Ier séjourne au château. En 1565, Charle IX , roi de France, séjourne au château.\r\nA partir de 1678, Vauban fortifie Bayonne, ville frontière avec l'Espagne. Il fait abattre le donjon dénommé Floripes. Voir la vue de Bayonne au XVIIe siècle. En 1660, le grand roi de France, Louis XIV, séjourne au château.  En 1706, Marie Anne de Neubourg, Reine d'Espagne, y séjourne.  En 1809, le général de Palafox, défenseur de Saragosse, séjourne au château. Subissant de constantes modifications, objet de toutes les attentions, le Château-Vieux est pourtant voué à la destruction en 1808, par un décret de Napoléon qui nest finalement pas appliqué.  Au début du XXe siècle, le château est la propriété de lÉtat, affectée au ministère de la Défense. Il abrite alors une garnison. Il est pourtant convoité par Garat, maire de Bayonne, qui souhaite en faire en 1912 le musée municipal et le lieu dexposition des uvres de Bonnat. Le Château-Vieux reste néanmoins aux mains de lArmée. En 1929, lédifice est classé M.H. Depuis, le Château-Vieux a fait lobjet de restaurations régulières, résidence des gouverneurs anglais durant trois siècles, cette forteresse sert aujourd'hui de mess aux officiers de la garnison de la ville","architecture":"CHÂTEAU-VIEUX, de Bayonne acquiert son nom à l'occasion de sa construction sur la rive opposée de la Nive, dans les années 1460, la citadelle défensive de Château-Neuf édifié entre le XIe siècle et XIIe siècle par les rois dAngleterre sur les bases dune forteresse construite par les vicomtes de Labourd, le Château-Vieux  de plan quadrangulaire prend appui sur deux côtés dun ancien castrum romain. Lédifice est construit à partir de grosses pierres de taille et de grès coquillier jaunâtre qui semblent provenir des carrières situées sur la rive droite de la Nive. Au centre de la cour sélevait le donjon de Floripès, imposante tour hexagonale de 30 mètres, aujourdhui disparue. Vauban décide en effet de la démolir en raison de sa vétusté.  Le corps principal du Château-Vieux a une forme rectangulaire avec de puissantes tour d'angle et des tours flanqués avec les mêmes caractéristiques. Un petit morceau de mur Romain apparaît mais ce sont les pierres médiévales et surtout les aménagements de Vauban qui sont visibles.  Comme pour les remparts, les tours et les murs possèdent des fenêtres et même des balcons en encorbellement. Ces modifications n'ont pas diminué la puissance de ce château fort qui a fait évoluer ses défenses durant 7 siècles,   les canonnières ainsi qu'un morceau de mâchicoulis ayant survécu.","habitants":"Le comte de Gramont \r\n        \r\n        \"","divers":"Citadelle de Bayonne avec château vieux grav 7-8-9, 43° 29' 31 nord, 1° 28' 40 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_1.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_2.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_3.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_4.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_5.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_6.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_7.jpg","../../jctruffet.com/image/image_64/64_Bayonne_Citadelle_8.jpg"]},"Consult_chateau_formulaireb0c8":{"id":"Consult_chateau_formulaireb0c8","dept":"64","canton":"Oloron Ste-Marie","commune":"Précilhon","nom":"Bazerque","type":"Château","periode":"XVII","histoire":"BAZERQUE, son nom est mentionné pour la première fois dans un document qui expose le droit des habitants de Sainte-Marie à aller faire paître leurs bêtes dans les bois de Barbeille. Ce sont les délimitations de lexploitation des bois qui fixent les fondements du village. La commune reste pendant longtemps sous les mêmes seigneuries, celles du baron de Gayrosse, de Luger, puis  des Courrèges.\r\nLe village de Précilhon est un lieu de légendes. Son moulin, sur lEscou, aurait été fréquenté par des sorcières.                                                                          Le château de Bourdette pas d'information historique","architecture":"Dorigine gallo-romaine, la commune de Précilhon se trouve dans la vallée de lEscou, non loin dOloron. De son histoire très ancienne, elle conserve quelques beaux vestiges du château avec une tour de trois étages en angles.","habitants":"Famille  de Courrèges.\r\n        \"","divers":"Château de Bazerques 43° 11' 47 nord, 0° 34' 45 ouest, de Bourdette  43° 11' 44 nord, 0° 34' 31 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bazerque_1.jpg","../../jctruffet.com/image/image_64/64_Bazerque_2.jpg"]},"Consult_chateau_formulairee611":{"id":"Consult_chateau_formulairee611","dept":"64","canton":"Orthez","commune":"Baigts de Béarn","nom":"Bellevue","type":"Château","periode":"XVI","histoire":"BELLEVUE  est un établissement de travail protégé propose de savoureux produits du terroir, de vraies qualité gustatives. Ce sont 90 personnes en situation de handicap qui sont accueillies au château. Elles y sont accompagnées par une cinquantaine de salariés qui travaillent principalement au sein de létablissement dans des activités de production allant de lélevage de volailles à la conserverie, en passant par des activités agricoles nécessaires à la pleine maîtrise de la filière. Cette dernière est certifiée IGP. Depuis 1987, le château Bellevue possède une grande expérience et savoir-faire dans les produits de conserverie et foie-gras. Tous les produits sont élaborés dans les ateliers favorisant l'insertion par le travail des ouvriers en situation de handicap. Méthode de fabrication traditionnelle sans conservateur. Maîtrise de l'abattage, de la transformation et du conditionnement.","architecture":"A Baigts de Béarn, le château Bellevue est un établissement de travail adapté qui se trouve sur les hauteurs avec une vue imprenable sur les Pyrénées. De conception féodale corps de logis rectangulaire à trois niveaux accolé d'un donjon de cinq niveaux  toit presque plats accolés d'une échauguette ronde sur encorbellement et à toit en poivrière, d'autre dépendance sont accolé au corps de logis utilisé pour la conserverie.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Bellevue à Baigts de Béarn","gps":"","images":["../../jctruffet.com/image/image_64/64_Bellevue_1.jpg","../../jctruffet.com/image/image_64/64_Bellevue_2.jpg"]},"Consult_chateau_formulaire2c77":{"id":"Consult_chateau_formulaire2c77","dept":"64","canton":"Orthez","commune":"Bellocq","nom":"Bellocq","type":"Vestiges","periode":"XIII","histoire":"BELLOCQ, a la fin du XIIIe siècle, Bellocq se trouvait à la frontière avec la Guyenne sous domination anglaise. Gaston VII de Béarn construisit le château sur les rives du gave de Pau. La construction s'étala de 1250 à 1280. Dès l'origine, le château était censé accueillir une forte garnison. Un an après l'achèvement du château, Gaston VII fit construire une bastide à proximité, qui avec l'église fortifiée de Bellocq, deveint partie intégrante de l'ensemble.\r\nEn 1370, Gaston Fébus renforça le château et construisit de nouvelles places fortes pour préserver l'indépendance de son territoire contre les puissants royaumes de France d'Angleterre et de Navarre.\r\nEn 1542, Henri II d'Albret renforça le château pour parer à toute invasion espagnole. À partir de cette date les rois de Navarre délaissaient parfois leur château de Pau pour celui de Bellocq. Au cours du XVIe siècle, Jeanne d'Albret y séjourna régulièrement pendant ses périodes de cure à Salies-de-Béarn. En 1568, le roi Charles IX envoya le baron de Terride conquérir et gouverner le Béarn, majoritairement protestant. Les troupes de Terride occupèrent la région et rétablirent la hiérarchie catholique. L'année suivante, Jeanne d'Albret demanda au comte Gabriel de Montgomery de former une armée de résistance, le château de Bellocq étant passé aux mains catholiques. Le château résista au siège de Montgomery. En 1620, les Protestants béarnais regagnant de l'influence, Louis XIII fit brûler la forteresse pour éviter qu'ils puissent l'utiliser dans le futur.À partir de 1620, le château n'eut plus de rôle dans l'histoire de la région et tomba en ruines. Il est en partie démantelé à partir de 1622.","architecture":"BELLOCQ cette forteresse béarnaise  de style médiéval de la fin du XIIIe siècle, sera remaniée au XIVe siècle. Lédifice prend la forme dun quadrilatère irrégulier  barlong construit pour sadapter à la forme du terrain. Présentait quatre tours rondes, une tour semi-circulaire et deux autres carrées, l'une d'entre elles constituant l'entrée. Les remparts crénelés étaient percés d'archères en forme de croix. Ce dernier sétend sur une surface dun hectare, dont la moitié se concentre à lintérieur de lenceinte du château, mesurant 220 mètres de périmètre. Le système est sans donjon, mais comprend sept tours reliées par une muraille de 8 mètres de haut et de 1,50 mètre dépaisseur moyenne renforcé de sept tours, relié à la maison forte construite en 1281. Elle fut transformée au XIVe siècle. Le château de Bellocq fut brûlé par Louis XIII en 1620 pour éviter qu'il ne soit utilisé par les protestants. Il appartient à une personne privée et à la commune de Bellocq. Le château de Bellocq est classé aux M.H. depuis 1997","habitants":"Famille d'Henri II d'Albret \r\n        \"","divers":"Vestiges de la forteresse de Bellocq  43° 31' 03 nord, 0° 54' 51 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bellocq_1.jpg","../../jctruffet.com/image/image_64/64_Bellocq_2.jpg","../../jctruffet.com/image/image_64/64_Bellocq_3.jpg","../../jctruffet.com/image/image_64/64_Bellocq_4.jpg"]},"Consult_chateau_formulaire1427":{"id":"Consult_chateau_formulaire1427","dept":"64","canton":"Saint-Palais","commune":"Ayherre","nom":"Belzunce","type":"Vestiges","periode":"XIII-XVI","histoire":"Trois châteaux à  Ayherre, les vestiges de Belzunce le château de Méharin et de Helette.                                 BELZUNCE, dominant la vallée de lArberoue, le château de Belzunce est la résidence de lune des plus grandes familles de Navarre. Son prestige tient autant à sa taille imposante quà son histoire. En 1321, Garcie Arnaud II, représentant de lautorité à Labastide-Clairence, fait édifier un château à Ayherre  gigantesque pour l'époque, à la mesure de ses prestigieux seigneurs.  Le 18 mars 1450, le Labourd revient à la couronne française, après la signature du traité de paix au château de Belzunce à Ayherre, marquant la fin de l'influence anglaise dans la région.  Lédifice est de taille démesurée, montrant ostensiblement la richesse et la puissance des seigneurs. Il devient le lieu de résidence de la famille de Belzunce, seigneurs dAyherre et de Macaye.   Le château de Belzunce date des XIIIe, XIVe et XVIe siècles. La terre est érigée en vicomté en 1424 par le roi de Navarre et le château voit dès lors de nombreux propriétaires issus de la noblesse sy succéder. Avant le XVIIe siècle, la liste de ceux-ci reste difficile à établir mais lon sait que le domaine passe par mariage de la famille dArmendaritz à celle des Belzunce. Cette dernière, qui compte déjà deux autres résidences féodales, habite au château de Méharin jusquau XVIIIe siècle. Les Belzunce abandonneront le château d'Ayherre pour celui de Méharin, lors du mariage de Armand II de Belzunce avec Marie de Méharin en 1600.                                                                                 A quelque kilomètres au environ le château de Méharin et de Helette.","architecture":"BELZUNCE, situé sur une petite colline, de la commune d'Ayherre, voici les ruines de ce qui fut le château de Belzunce. Un château historique de Navarre, qui accueillit pendant plusieurs générations la lignée des Belzunce.  Sa création remonterai au XIIIe siècle, il fut abandonné au XVIIe, et tomba en ruine. Sa face Sud ici présente comporte deux tours d'angle rondes. Les pierres utilisées, l'architecture des ouvertures, et sa tragique destinée rappellent sensiblement le château de Bidache, situé non loin de là. Ce château, qui était en réparation lors de mon passage, est privé et ne se visite pas, cependant il est visible de la route qu'il surplombe. Manoir de Belzunce cette grande bâtisse dépoque féodale, qui voit défiler nombreuses familles nobles, dresse toujours ses échauguettes pointant à chacun de ses angles.\r\n En 1600  le château d'Ayherre était en très mauvais état, les fenêtres à meneaux datent du XVIe siècle, mais les moyens financiers manquaient pour une réhabilitation et c'est sans doute Jean V, le père de Armand II, mort vers 1630, qui sera le dernier occupant de l'imposant château. Il fait lobjet dune inscription aux M.H  depuis 1992.","habitants":"Famille de Garcie Arnaud II\r\n        \"","divers":"Vestiges du château de Belzunce   43° 22' 47 nord, 1° 14' 01 ouest  château de Hélette grav-6 et de Méharin grav 7, 43° 13' 11 nord, 0° 53' 26 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Belzunce_1.jpg","../../jctruffet.com/image/image_64/64_Belzunce_2.jpg","../../jctruffet.com/image/image_64/64_Belzunce_3.jpg","../../jctruffet.com/image/image_64/64_Belzunce_4.jpg","../../jctruffet.com/image/image_64/64_Belzunce_5.jpg","../../jctruffet.com/image/image_64/64_Belzunce_6.jpg","../../jctruffet.com/image/image_64/64_Belzunce_7.jpg"]},"Consult_chateau_formulaire3050":{"id":"Consult_chateau_formulaire3050","dept":"64","canton":"Orthez","commune":"Léren","nom":"Bergeras","type":"Château","periode":"XVI","histoire":"BERGERAS,  Léren dépendait de l'archiprêtre de Rivière-Gave, nom d'un archiprêtre du diocèse de Dax qui tirait son nom du gave de Pau. La commune ressortissait au duché de Gramont.Jusqu'en 1790, principauté de Bidache. Le village a toujours son petit château de Bergeras, siège d'une justice seigneuriale depuis le XVIe siècle et supprimée en 1790.  Le village fut un important lieu de passage vers Compostelle. On découvrit vers 1990, plusieurs corps de pèlerins enterrés au chevet de l'église. Le village comptait aussi une ancienne hospitalerie pour soigner les pèlerins, l'actuelle maison Lartique. Enfin, il faut y voir aussi la très ancienne maison Lassalle, qui date du XVIe siècle, et qui fut le siège d'une notairie.","architecture":"Le village de Léren a une étymologie incertaine. Peut-être \"La run\" qui veut dire \"frontière\". Le village confronté au Béarn et à la Gascogne.  Un pont sur le Gave est mentionné au Moyen-Age, il fut remplacé par un gué puis un bac.  l'actuelle maison Lartique. Enfin, il faut y voir aussi la très ancienne maison Lassalle, et le château de Bergeras  qui date du XVIe siècle, Le corps de logis principal de plan rectangulaire à deux niveaux avec une série d'oeil de boeufs au dernier étage, toit en croupe, l'édifice est accolé à une tour rectangulaire à quatre étages toit en croupe couvert de tuiles.","habitants":"Duché de Gramont\r\n        \"","divers":"Château de Bergeras à Leren","gps":"","images":["../../jctruffet.com/image/image_64/64_Bergeras_1.jpg","../../jctruffet.com/image/image_64/64_Bergeras_2.jpg"]},"Consult_chateau_formulaire88da":{"id":"Consult_chateau_formulaire88da","dept":"64","canton":"Morlaàs","commune":"Bernadets","nom":"Bernadets","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Bernadets celui de Bernadets et celui de Péllizaa.                                                           BERNARDETS  Au XIe siècle, Bernadets dépendait de Saint-Castin du bailliage de Pau, et le fief de cette paroisse était vassal de la vicomté de Béarn. Un premier château est construit au XIIIe siècle, qui appartient alors à Jean de Sorbet. Par la suite, il est racheté par Jean-Gratien de Laussat en 1766, à Joseph de Laugar, conseiller du parlement de Navarre. Cette demeure médiévale est détruite en 1785 et reconstruite en 1792 par le marquis Clément de Laussat. Ce dernier fait bâtir une petite chapelle en 1789, qui sert aujourdhui déglise paroissiale.  A partir de la fin du XIXe siècle, la famille Pré de Saint-Maur est propriétaire des lieux.                                           PELLIZZA, à deux kilomètres à l'ouest à  Saint-Castin est apparu au XIXe siècle provenant de Sanctus Castinus en 980.  Trois personnalités ont marqué l'histoire de la commune : le Baron de Saint-Castin, Jean Vincent d'Abbadie, parti à l'âge de 15 ans en Nouvelle France soldat du Roi Louis XIV défendant les comptoirs français, il épousa une fille de chef indien de la tribu des Abénakis. La ville de Castine dans lÉtat du Maine aux USA est inscrite dans l'histoire commune aux deux Nations. Le docteur Duboué (1834-1889) natif de Saint-Castin qui s'illustra par ses travaux réalisés dans la plaine de Montardon et surtout par ses théories concernant la rage dont Pasteur s'appropria la découverte.  La famille Pellizza, descendante du docteur Duboué. Elle a laissé son nom à une demeure bourgeoise du XXe siècle : le château Pellizza qui domine l'un des coteaux de la commune.","architecture":"Pellizza, la ville de Castine dans lÉtat du Maine aux USA est inscrite dans l'histoire commune aux deux Nations. La famille Pellizza,  elle a laissé son nom à une demeure bourgeoise du XIXe siècle : le château Pellizza qui domine l'un des coteaux de la commune.\r\nBERNARDETS, un premier château  de Bernardets est bâti au XIIIe siècle, qui appartient alors à Jean de Sorbet. Possession en 1537 de Jean de Sorbet, et fut reconstruit à la fin du XVIIIe siècle.  En 1860, le château subit de nombreux réaménagements. Le bâtiment, couvert dun toit en pavillon, est surélevé. Il comprend deux étages carrés et un étage de combles. C'est à la même époque que le paysagiste Buller réalise un parc entourant le château. Le château et la chapelle sont inscrits à linventaire des M.H depuis 1999.                                                                            PELLIZAA, le château Pellizza qui domine l'un des coteaux de la commune, de plan rectangulaire à deux niveaux flanqué d'une série de lucarnes sur un toit brisé en croupe.","habitants":"Marquis Clément de Laussat.\r\n        \r\n        \"","divers":"Château de Bernadets 43° 22' 45 nord, 0° 17' 11 ouest et de Péllizaa grav 3 et 4","gps":"","images":["../../jctruffet.com/image/image_64/64_Bernardets_1.jpg","../../jctruffet.com/image/image_64/64_Bernardets_2.jpg","../../jctruffet.com/image/image_64/64_Bernardets_3.jpg","../../jctruffet.com/image/image_64/64_Bernardets_4.jpg"]},"Consult_chateau_formulairefc88":{"id":"Consult_chateau_formulairefc88","dept":"64","canton":"Saint-Palais","commune":"Beyriè sur Joyeux","nom":"Beyrié","type":"Vestiges","periode":"XII","histoire":"BEYRIE, lexistence dun seigneur de Beyrie est mentionnée dans les écrits dès le XIIe siècle, mais ce nest quen 1320 que le château de Beyriè-sur-Joyeuse, ou Salle de Beyriè est citée pour la première fois.\r\nLes Beyriè constituent une famille influente en Navarre. En 1436, lunique héritière, Jeanne, épouse Guillaume de Domezain, scellant ainsi lunion des deux domaines. Cest dans des circonstances similaires quil tombe dans le giron de la famille Montréal en 1573 qui le conserve jusquen 1830. A laube du XXe siècle, il est vendu aux Etchats et restauré.","architecture":"Beyriè-sur-Joyeux possède un curieux château ayant l'air d'un gros manoir, malheureusement fort dégradé. La face principale est curieusement orientée au Nord. Même si quatre corps de logis sont élevés, un seul devait constituer, au départ, la Salle de Beyriè. De nombreuses adjonctions sont faites mais le pavillon contenant lescalier peut seul être daté avec certitude : la mention de 1629, ainsi que celle de son propriétaire de lépoque, est portée sur lun des linteaux. Occupé par les allemands lors de la seconde guerre mondiale, le château de Beyriè a subi de nombreuses dégradations qui le rendent inhabitable. On contemple aujourdhui ses belles ruines.","habitants":"Famille Montréal\r\n        \r\n        \"","divers":"Vestiges du château de Beyrié","gps":"","images":["../../jctruffet.com/image/image_64/64_Beyri%c3%a8_1.jpg","../../jctruffet.com/image/image_64/64_Beyri%c3%a8_2.jpg","../../jctruffet.com/image/image_64/64_Beyri%c3%a8_3.jpg","../../jctruffet.com/image/image_64/64_Beyri%c3%a8_4.jpg","../../jctruffet.com/image/image_64/64_Beyri%c3%a8_5.jpg"]},"Consult_chateau_formulaire67b7":{"id":"Consult_chateau_formulaire67b7","dept":"64","canton":"Biarritz","commune":"Biarritz","nom":"Biarritz","type":"Villa","periode":"XIX","histoire":"Ville de châteaux ; chateau Boulart (voir article)   Palais Eugénie et domaine de Françon ( voir article suivant) et villa Belza, Martine, Genin,  Natacha et Roche-Ronde.                                                           BIARRITZ, domaine de Françon, est un édifice dont la construction, dans le dernier quart du XIXe siècle, fut confiée aux architectes Ralph Selden Wornum et Edward Salomo. Son propriétaire, Lord Pennington Mellor était un armateur fortuné qui voulu sortir de l'Angleterre pour s'installer en France; selon lui pour faciliter son commerce nautique.  A été vendu à la Caisse nationale des allocations familiales en 1948, et a été transformé en centre d'accueil en 1985. Il est désormais propriété de VTF, de style Anglo-Normand. En vue externe, il possède des baies vitrées, deux tourelles et quelques vitraux. Il est classé au titre des M.H depuis 1999.                                                  BELZA villa, uvre de larchitecte Alphonse Bertrand  pour Ange du Fresnay a été construite en honneur de son épouse Marie-Belza née Dubreuil son nom de \"Belza\", qui signifie noir en basque, son architecture avec son donjon néo moyenâgeux et sa tourelle, son emplacement près du \"Pont du Diable \", en ont fait un lieu empli de mystères.  Depuis le rocher du Cachaous, elle propose une vue immanquable sur le Rocher de la Vierge de Biarritz.                         MARTINE, villa, en décembre 1897, le comte de Montalivet fait construire sa villa. Il la revend en 1922 à Léon-Joseph Capdeville, qui  la cède à son tour à Frédérick-Henry Prince, banquier, président des abattoirs de Chicago et patron de 46 compagnies de chemin de fer. Ce dernier y est mort en février 1953 à lâge de 94 ans.  En décembre 1897, le comte de Montalivet fait construire sa villa, chef-duvre de savante asymétrie avec son assortiment de toits et de décrochements, nommée alors Castel-Adour, au début du XXe siècle.","architecture":"GENIN cette construction voulue par Auguste Genin, réplique de la tour Quinette d'Etampes  dit la Jacqueline  par un triste matin de Novembre 1963, on rasa le château pour construire un disgracieux immeuble en béton.                                                   CLAIR DE LUNE est un manoir du XIXe siècle situé à 4 km du centre de Biarritz. Transformé en  hôtel par la famille Beyrière.                                                       NATACHA, en 1978, la ville de Biarritz acquiert la demeure pour y installer les archives darchitecture de la côte basque construite au début du XXe siècle par larchitecte Henri Sauvage accompagné de Charles Sarazin. La villa est inscrite à linventaire des M.H en 1993.                                                                                 ROCHE-RONDE, le premier propriétaire est Paul Bernain, descendant du premier maître lithographe de Bayonne. La villa passe ensuite aux mains du docteur Eugène Willemin en janvier 1907 puis, en 1924, à Madame Eliot. Cest alors quest construite une tourelle dangle qui abrite un escalier de service. Des hôtes de marque y séjournent, tels que Mata Hari ou la reine Fabiola de Belgique. Cette dernière participe aux soirées régulières données à la villa, qui est un manoir néogothique, construit en 1884 par larchitecte Alphonse Bertrand. Elle présente laspect dun château fort avec ses mâchicoulis, ses créneaux et échauguettes, ses cheminées en fût de canon.","habitants":"Riches propriétaires anglais\r\n        \"","divers":"Villa Francon grav 4, villa Belza grav 9, villa martine grav 6, villa Clair de Lune grav 3, villa Natacha grav 7 villa Roche ronde grav 1","gps":"","images":["../../jctruffet.com/image/image_64/64_Biarritz_1.jpg","../../jctruffet.com/image/image_64/64_Biarritz_2.jpg","../../jctruffet.com/image/image_64/64_Biarritz_3.jpg","../../jctruffet.com/image/image_64/64_Biarritz_4.jpg","../../jctruffet.com/image/image_64/64_Biarritz_5.jpg","../../jctruffet.com/image/image_64/64_Biarritz_6.jpg","../../jctruffet.com/image/image_64/64_Biarritz_7.jpg","../../jctruffet.com/image/image_64/64_Biarritz_8.jpg","../../jctruffet.com/image/image_64/64_Biarritz_9.jpg"]},"Consult_chateau_formulaire2234":{"id":"Consult_chateau_formulaire2234","dept":"64","canton":"Biarritz","commune":"Biarritz","nom":"Biarritz_Palais","type":"Palais","periode":"XIX","histoire":"BIARRITZ, la naissance de la ville remonte à la deuxième moitié du XIXe siècle, alors que Napoléon III et lImpératrice Eugénie, les têtes couronnées dEurope et des familles fortunées de lépoque firent de ce site sauvage une des plus fameuses destinations où il est de bon ton davoir sa résidence.  En contraste aux villes uniformes (nées essentiellement au Moyen-Age), Biarritz se démarque par son individualisme qui caractérise une bourgeoisie et noblesse royale ou dEmpire engagées dans la révolution industrielle. Et si ailleurs, les nouvelles cités sont tirées au cordeau, la jeune station balnéaire privilégie un urbanisme épousant un paysage naturel découpé. De 1876 à 1881, près de trois cents demeures se construisent dans un Biarritz cosmopolite et balnéaire.                                                                    Palais BIARRITZ dit de l'impératrice Eugénie, épouse de l'empereur Napoléon III, construite en 1854 dans un style Second Empire.","architecture":"Palais BIARRITZ L'édifice est construit à l'emplacement où se trouvait la résidence d'été de l'impératrice Eugénie Dénommée Villa Eugénie, elle garde ce nom jusqu'en 1893, date à laquelle elle est transformée en hôtel, avant d'être détruite par un incendie en 1903 et remplacée par un grand hôtel de luxe baptisé « Hôtel du Palais ».  Parmi les caractéristiques, on peut noter : 147 chambres et suites de Édouard VII de 152 m2 et Alphonse XIII de 177 m2 avec vue sur l'Océan Atlantique, 2 restaurants : la Villa Eugénie et l'Hippocampe au bord de la piscine, Le bar impérial, un spa impérial avec Guerlain : salle de fitness, piscine d'eau de mer chauffée, sauna, institut du cheveu, golf et l'accès direct à la plage. L'hôtel du Palais est inscrit aux M.H. depuis 1993","habitants":"Impératrice Eugénie\r\n        \"","divers":"Le palais Eugenie et divers hôtel tel que le victoria et le casino  Françon grav 9 43° 27' 43 nord, 1° 33' 36 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Biarritz_Palais_1.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_2.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_3.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_4.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_5.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_6.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_7.jpg","../../jctruffet.com/image/image_64/64_Biarritz_Palais_8.jpg"]},"Consult_chateau_formulaire8931":{"id":"Consult_chateau_formulaire8931","dept":"64","canton":"Saint-Palais","commune":"Bidache","nom":"Bidache","type":"Forteresse","periode":"XII-XVIII","histoire":"A Bidache deux châteaux celui de Gramont et celui de Bassilour( voir article Bidart).                               GRAMONT, appelé aussi le château des Ducs , en 1523 incendie du château par les troupes impériales, vite réabilité  il reçoit les Gramont pour deux siècles, au XVIIIe siècle, fut de nouveau ravagé par les flammes à plusieurs reprises.   En 1604 naissance d'Antoine III de Gramont, duc de Gramont et prince de Bidache, descendant des Rois de France,  son héritier  laisse le château  aux habitants. Ce drame laisse en héritage, l'avenir d'un château écartelé entre la population et des propriétaires absents.  Il avait 62 ans et s'appelait Antoine XIV  Armand-Odélric-Marie-Henri de Gramont. Le prince de Bidache a été enterré dans le village basque, le 7 mars 2014, dans l'église Saint Jacques de Majeur, où se trouve déjà le tombeau des Ducs de Gramont. Il laisse deux châteaux qui reviendront à son fils, Antoine XV, âgé de 8 ans et demi, depuis la lignée royale dont il descendait avait enfanté des Princes de Bidache, souverains depuis le début du XVIe siècle. Il a accueilli des hôtes prestigieux comme Catherine de Médicis ou plus tard le prince de Galles, futur roi Édouard VII.  Toujours dans la descendance du  duc de Gramont.","architecture":"Château de Gramont, construit en 1329 c'est un château forteresse il connaît aujourd'hui des travaux de consolidation. On peut déjà voir les résultats sur l'entrée principale . La fameuse volerie n'est plus sur les lieux, grace à une association régionale, ce château est un témoin exceptionnel de lévolution architecturale des châteaux depuis le Moyen-âge. Incendié en 1523, le château de Gramont fut reconstruit et transformé. Le corps de logis  de style Renaissance, sa splendeur était réputée dans tout le royaume, avec sa grosse tour cylindrique et les tours d'entrée remontent au  Moyen-Age, l'aile ouest et les deux pavillons du XVIIe siècle. Au XVIIIe siècle, un second incendie le laissera ruiné alors qu'il était transformé en hôpital. Aujourdhui, le château a été restauré et sécurisé. L'esplanade verdoyante devant le château est en accès libre toute lannée. Le château de Gramont est ouvert au public et se visite. Il est en cours de restauration. Dans cette noble commune du Pays basque intérieur, se trouve cet imposant château du XIIe siècle. Classé M.H en 1942.","habitants":"Famille d'Antoine, Duc de Gramont \r\n        \"","divers":"Vestiges du château de Bidache 43° 29' 15 nord, 1° 08' 18 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bidache_1.jpg","../../jctruffet.com/image/image_64/64_Bidache_2.jpg","../../jctruffet.com/image/image_64/64_Bidache_3.jpg","../../jctruffet.com/image/image_64/64_Bidache_4.jpg","../../jctruffet.com/image/image_64/64_Bidache_5.jpg","../../jctruffet.com/image/image_64/64_Bidache_6.jpg"]},"Consult_chateau_formulaire4c95":{"id":"Consult_chateau_formulaire4c95","dept":"64","canton":"St-Jean de Luz","commune":"Bidart","nom":"Bidart","type":"Château","periode":"XVIII","histoire":"A Bidart le château de Ibrarritz, le château de Bassilour l'hôtel de la famille Vachet et le Pavillon royal château du baron de L'Espée                                       IBRARRITZ, est une imposante bâtisse qui domine locéan. Le baron Albert de lEspée, riche héritier dune famille dindustriels lorrains, elle déconcerte ses contemporains par son extravagance. Le baron de lEspée, séduit par la ville de Biarritz lors dun séjour de convalescence, décide de sy établir. Répondant au souhait du baron, larchitecte Gustave Huguenin conçoit un château pour un seul habitant et une armée de domestiques. En 1894, lédifice sort de terre. La propriété compte une quinzaine de constructions secondaires, une trentaine de refuges et sept cuisines séparées du château, pour éviter les odeurs quelle que soit la direction du vent. On trouve encore sur le domaine deux chenils, un pavillon maritime, un étang avec son moulin qui fait office de petite centrale hydroélectrique, un château-fort miniature, un vivier, une étable. Toutes ces constructions sont reliées entre elles par un insolite réseau de chemins de fer couvert. Le baron fait enfin construire, jouxtant ce domaine dédié à son bon plaisir, une villa des Sables pour sa maîtresse, lactrice Biana Duhamel.  Victime de son site exceptionnel, le domaine excite toutes les convoitises. Vendu en 1910 et transformé en sanatorium dans les années 1920, il sert à laccueil de réfugiés espagnols en 1936, démembré il perd la plupart de ses dépendances au fil des années.\r\nBASSILOUR occupe un manoir restauré du XVIIIe siècle entouré d'un jardin, en périphérie de Bidart.Transformé en hôtel restaurant par la famille de Vachet.","architecture":"Domaine de Nathalie de Serbie, le château: \"Sacchino\" aujourd'hui « Les Ailes » appartient de nos jours à la famille Latécoère         IBRARRITZ . Par la suite, il sert dhôpital pendant la première guerre mondiale, de camp pour des réfugiés espagnols  en 1936 et  de QG allemand lors de la seconde guerre. Laissé à labandon, le château est abandonné aux pilleurs jusquen 1958 où il est racheté et transformé en hôtel.  Revendu en 1986, fermé pendant plusieurs années, le château, bien que classé (toiture, façades, salle dorgue, grand escalier, décoration intérieure) a souffert de son manque dentretien. Un projet de restauration denvergure est à létude. Il est finalement classé, en partie,  au M.H depuis 1990.  Le château a été vendu en juillet 2014 à l'homme d'affaires atypique  et entrepreneur français Bruno Ledoux, actionnaire de référence du journal Libération, pour y réaliser un hôtel étonnant avec le concours du célèbre designer Ora ItoIl ne subsiste du domaine du château dIlbaritz à lheure actuelle que létable et les cuisines ouest transformées en bar-restaurant pour les dépendances. Une large partie du domaine est occupée par un centre dentraînement de golf.","habitants":"Baron Albert de lEspée                                                       famille de Vachet\r\n        \"","divers":"Château de Bidart  43° 27' 31 nord, 1° 34' 35 ouest et de Bassalour grav 7 et 8","gps":"","images":["../../jctruffet.com/image/image_64/64_Bidart_1.jpg","../../jctruffet.com/image/image_64/64_Bidart_2.jpg","../../jctruffet.com/image/image_64/64_Bidart_3.jpg","../../jctruffet.com/image/image_64/64_Bidart_4.jpg","../../jctruffet.com/image/image_64/64_Bidart_5.jpg","../../jctruffet.com/image/image_64/64_Bidart_6.jpg","../../jctruffet.com/image/image_64/64_Bidart_7.jpg","../../jctruffet.com/image/image_64/64_Bidart_8.jpg","../../jctruffet.com/image/image_64/64_Bidart_9.jpg"]},"Consult_chateau_formulaired8f7":{"id":"Consult_chateau_formulaired8f7","dept":"64","canton":"Oloron Ste-Marie","commune":"Bielle","nom":"Bielle","type":"Château","periode":"XVIII","histoire":"BIELLE, le château de Bielle se situe à lentrée septentrionale du village. Il est construit par Jean-Joseph Laborde, banquier de la cour dorigine béarnaise, en 1768. Il constitue un des monuments principaux de Bielle.   Il semble que Jean-Joseph Laborde ait fait construire cette demeure pour son cousin, Jean de Laborde, qui lui avait permis dobtenir le droit dentrée aux états de Béarn.\r\nLe château est séparé de la rue par une grille alternant avec des pilastres, et se trouve au fond dune cour étroite.","architecture":"Le château est séparé de la rue par une grille alternant avec des pilastres, et se trouve au fond dune cour étroite. Le bâtiment présente une façade à deux niveaux et sept travées. Lavant-corps sachève par un fronton triangulaire percé dun oculus. Les fenêtres sont en plein cintre et un bandeau sépare les étages. Les grandes lucarnes à pilastres et frontons se détachent devant une toiture dardoises. La façade sur jardin est identique. L'édifice est inscrit aux M.H depuis 2004.","habitants":"Famille de Jean-Joseph Laborde\r\n        \"","divers":"Château de Bielle  43° 03' 21 nord, 0° 25' 59 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bielle_1.jpg","../../jctruffet.com/image/image_64/64_Bielle_2.jpg"]},"Consult_chateau_formulaire4a49":{"id":"Consult_chateau_formulaire4a49","dept":"64","canton":"Hendaye","commune":"Biriatou","nom":"Biriatou","type":"Forteresse","periode":"XIII","histoire":"BIRIATOU, en 1813, Biriatou est un des points de résistance des armées du maréchal Soult, qui battent en retraite face au troupes alliées (Espagnols, Portugais et Anglais). Le quartier général du maréchal Soult se trouve alors à Saint-Jean-de-Luz, alors que les deux divisions du général Reille sont disposées à Biriatou, tenant le pont de Béhobie.\r\nAprès loffensive des troupes alliées, le 7 octobre 1813, Biriatou demeurera occupée durant toute lannée 1814.","architecture":"Biriatou, de plan rectangulaire cette forteresse avec peu d'ouverture paraît robuste avec ses tours à mâchicoulis.","habitants":"Maréchal Soult\r\n        \"","divers":"Forteresse de Biriatou","gps":"","images":["../../jctruffet.com/image/image_64/64_Biriatou_1.jpg"]},"Consult_chateau_formulairedbad":{"id":"Consult_chateau_formulairedbad","dept":"64","canton":"Saint-Palais","commune":"Labets Biscay","nom":"Biscay","type":"Château","periode":"XV","histoire":"BISCAY, en dépit de sa reconstruction moderne, le château de Biscay évoque le passé féodal de la commune de Labets-Biscay. Cest une famille noble qui donne son nom au village indépendant de Biscay dès le Moyen-Âge. À cette époque, les seigneurs régissent ces terres et y possèdent un château édifié sur une motte castrale aujourdhui disparue.  Lactuel château de Biscay, plus tardif et construit par cette même famille, se trouve aux alentours du village.","architecture":"Lédifice médiéval a laissé place à une demeure darchitecte  édifiée au XVIIIe ou au XIXe siècle. Ses proportions généreuses et son esthétique relèvent davantage de larchitecture urbaine que de la construction rurale, un privilège que seuls peuvent saccorder les nobles ou les riches propriétaires, de plan rectangulaire à deux niveaux et lucarnes sur un  toit en croupe recouvert de tuiles.","habitants":"Famille de Biscay\r\n        \"","divers":"Château de Biscay","gps":"","images":["../../jctruffet.com/image/image_64/64_Biscay_1.jpg","../../jctruffet.com/image/image_64/64_Biscay_2.jpg","../../jctruffet.com/image/image_64/64_Biscay_3.jpg","../../jctruffet.com/image/image_64/64_Biscay_4.jpg"]},"Consult_chateau_formulaireb32b":{"id":"Consult_chateau_formulaireb32b","dept":"64","canton":"Oloron-Ste-Marie","commune":"Rébénacq","nom":"Bitaubé","type":"Château","periode":"XVIII","histoire":"BASTIDE REBENACQ;  Le château de Bitaubé doit son nom à une famille béarnaise, originaire de Gan, dont l'un des membres, Jean-Baptiste, expatrié comme beaucoup de cadets, revint d'Espagne en 1775, fortune faite, pour s'établir au pays. Ce personnage ayant fait construire l'édifice dès son retour, les travaux ont dû se dérouler vers 1775-1780. Les descendants de Jean-Baptiste en furent propriétaires juqu'en 1875. Depuis le 9 juillet 1998, le château de Bitaudé est inscrit à linventaire des M.H. façades, toitures, terrasse en terre-plein, jardins, clôture et escaliers.","architecture":"Le château de Bitaubé qui tient davantage de la grosse demeure que de lédifice castral, se compose dun corps de logis élevé sur quatre niveaux et encadré de pavillons. Lessentiel du décor conservé se retrouve au rez-de-chaussée : salons et salle à manger avec lambris, stucs, cheminées, fontaine. Deux anciennes écuries encadrent la façade ouest et délimitent une cour prolongée par un ancien jardin dagrément clos de murs. Lescalier daccès au jardin est orné dune clef de voûte. La façade est bordée dune grande terrasse qui domine lemplacement dun second jardin plus récent. Le château, juché sur un épaulement dominant le bourg de Rébénacq, est bien représentatif de ces grosses demeures béarnaises, très sobres extérieurement, mais non dépourvues d'un souci de qualité au niveau du décor extérieur.","habitants":"Famille de Roger dArrevénac\r\n        \"","divers":"Château de Bitaudé  43° 09' 35 nord, 0° 24' 08 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Bitaub%c3%a9_1.jpg","../../jctruffet.com/image/image_64/64_Bitaub%c3%a9_2.jpg"]},"Consult_chateau_formulaire91c6":{"id":"Consult_chateau_formulaire91c6","dept":"64","canton":"Pau","commune":"Bizanos","nom":"Bizanos","type":"Château","periode":"XVI","histoire":"BIZANOS, chaque année, en septembre, Pierre-François Blanchard, président des Amis du château de Franqueville et ancien responsable du service viticole à la chambre d'agriculture des Pyrénées-Atlantiques, le projet de vignes au château de Franqueville a débuté en 2008.  Le projet a été suivi par Pascal Labasse, le producteur du domaine Bellegarde à Monein, et Pierre-François Blanchard, président des amis du château de Franqueville et ancien responsable du service viticole à la chambre d'agriculture. Jusqu'au XVIIe siècle, le château sert de bâtiment de guerre. Par héritage, il passe ensuite entre les mains de différents seigneurs jusqu'en 1854 où il est occupé par le comte Albert de Franqueville. Comme le bon docteur Taylor à Pau, il semble que ce Normand d'origine se soit installé au château de Bizanos pour profiter des bienfaits du climat béarnais. En 1871, à son décès, son fils, le comte Gaston de Franqueville, prend en mains le domaine. En 1919, la famille de Pruines s'y installe.  Après être passé entre les mains de différents seigneurs, il est acquis par Albert Belhomme de Franqueville qui lui donne son nom actuel, puis il est vendu en 1950 aux hospices civiles de Pau, qui en font une maison de repos.  Il devient alors un sanatorium, jusqu'à son acquisition par la commune de Bizanos en 1988. Le conseil municipal donne une nouvelle destination à l'édifice et entreprend sa réhabilitation. Fin 1992, le château ouvre ses portes à la location.  Il est appelé aussi le château de Pau. Bizanos a été classé aux M.H. en 1840 et 2004.","architecture":"le château de Bizanos verrouille une série de coteaux venant de lest. Cette ancienne forteresse présente aujourdhui tous les atouts dun château dagrément. Siège séculaire des seigneurs de Bizanos, cet édifice sert de forteresse jusquau XVIIe siècle. Il est reconstruit trois fois et présente actuellement la forme dune confortable demeure de style Renaissance. Depuis 1988, il est propriété de la commune de Bizanos qui y a mené des restaurations et aménagé le chemin Henri IV qui permet daccéder au château en traversant un parc avec vue sur la chaîne des Pyrénées, de plan rectangulaire à deux niveaux flanqué en façade  plein cintre d'un fronton triangulaire et deux lucarnes sur toits en croupe recouvert d'ardoises, sur angle gauche une tourelle heptogonal toit en poivrières et à l'opposée une autre tour  heptogonal également mais de plus grande dimension.","habitants":"Comte Albert de Franqueville\r\n        \"","divers":"Château de Bizanos","gps":"","images":["../../jctruffet.com/image/image_64/64_Bizanos_1.jpg","../../jctruffet.com/image/image_64/64_Bizanos_2.jpg","../../jctruffet.com/image/image_64/64_Bizanos_3.jpg","../../jctruffet.com/image/image_64/64_Bizanos_4.jpg","../../jctruffet.com/image/image_64/64_Bizanos_5.jpg"]},"Consult_chateau_formulaireef8b":{"id":"Consult_chateau_formulaireef8b","dept":"64","canton":"Serres-Cantet","commune":"Séméacq","nom":"Blachon","type":"Château","periode":"XVI","histoire":"BLACHON, ancienne abbaye laïque. Auger de l'Abadie de Blachon est présent en 1343 à la cour des nobles d'Escurès. Les Camon Dadou sont abbés laïques à partir de 1566, par le mariage de Jean de Camon avec Jacqueline de Navailles, fille de Jacquette de l'Abadie de Blachon. C'est Jean de Camon qui fit construire la demeure en 1586. La famille de Camon Dadou conserva la maison jusqu'au XIXe siècle. Portail deuxième moitié du XVIIe siècle. Restauration du corps de logis principal et construction de l'aile en retour vers 1770-1780. Fontaine portant la date 1750.","architecture":"Le château de Blachon est construit au XVIe siècle pour être le siège de labbaye laïque.   Malgré le faible nombre de foyers recensés en 1385 à Blachon, on signale un abbé laïque depuis 1343, Auger de lAbadie de Blachon, qui est présent à la cour des nobles dEscurès.  Le titre dabbé laïque de Blachon passe dès 1566 par mariage à Jean de Camon, qui fait alors élever un château en 1586. Cette demeure seigneuriale reste dans la famille Camon-Dadou jusquau XIXe siècle.  Il sagit dun bâtiment en équerre qui donne sur une cour intérieure, flanqué au nord dune tour carrée et dune tourelle. À la fin du XVIIIe siècle, on lui adjoint laile ouest et une deuxième tourelle. Si le château de Blachon ne se visite pas aujourdhui, on peut admirer, à cent mètres, un pigeonnier circulaire du dernier quart du XVIIIe siècle ainsi que léglise toute proche et une fontaine portant la date de 1750.","habitants":"Famille de Camon Dadou\r\n        \"","divers":"Château de Blachon","gps":"","images":["../../jctruffet.com/image/image_64/64_Blachon_1.jpg","../../jctruffet.com/image/image_64/64_Blachon_2.jpg"]},"Consult_chateau_formulaire014c":{"id":"Consult_chateau_formulaire014c","dept":"64","canton":"Pontacq","commune":"Boeil-Bézing","nom":"Boeil_Bézing","type":"Château","periode":"XIX","histoire":"BOEIL BEZING, les barons de Boeil étaient seigneurs de Baudreix, Beuste, Clarac, Lagos et à la fin du XVIIIe, barons de Coarraze. Après la réforme, le protestantisme est présent surtout à Bezing où les membres de la communauté sont surnommés Lous huganautz de Bezing. À Boeil, village plus catholique, on parle des candélès de Boeil. Aujourd'hui encore, comme dans plusieurs villages de la plaine, mais plus particulièrement à Boeil-Bezing, les maisons des vieilles familles protestantes sont reconnaissables aux piliers du portail surmontés d'une boule alors que chez les catholiques, les piliers sont surmontés d'une coupe.\r\n  Le château est construit au début du XIXe siècle par la famille de Jean-Baptiste Bernadotte, maréchal dEmpire sous Napoléon Ier, avant de devenir roi de Suède en 1818. La mère de ce militaire illustre est originaire de Boeil et décide dy faire construire un édifice en rapport avec son rang. Jeanne de Saint-Jean (1728-1809), mère du maréchal Bernadotte, est née à Boeil. Le 20 février 1754, elle épouse Henri Bernadotte à Boeil. Leur fils Jean-Baptiste devient maréchal de Napoléon, puis roi de Suède et de Norvège sous le nom de Charles XIV de Suède. Son neveu est enterré à Boeil-Bezing.Le village compte deux moulins à eau le long du canal du Baniou, ouvrage construit en dérivation du gave de Pau.","architecture":"BOEIL-BEZEING, le château est ainsi élevé dans un style classique au langage architectural simplifié, proche du style Empire. De plan carré, l'édifice domine le village par ses dimensions imposantes. De la façade principale se détache un avant-corps central dont la partie supérieure évoque un fortin ou une tour-forte. Le château de Boeil-Bezing rappelle par la pureté de ses lignes une architecture napoléonienne. On peut bien sûr faire le parallèle avec lattachement de ses propriétaires à la figure de lempereur.  Les restes de la motte féodale témoignent de l'ancienneté du village.","habitants":"Famille de Jean-Baptiste Bernadotte,\r\n        \r\n        \"","divers":"Château de Boeil et musée de Bernadotte","gps":"","images":["../../jctruffet.com/image/image_64/64_Boeil_B%c3%a9zing_1.jpg","../../jctruffet.com/image/image_64/64_Boeil_B%c3%a9zing_2.jpg"]},"Consult_chateau_formulaire1551":{"id":"Consult_chateau_formulaire1551","dept":"64","canton":"Oloron-Ste-Marie","commune":"Borce","nom":"Borce","type":"M.F","periode":"XV-XIX","histoire":"BORCE  pas d'information historique à part l'anecdote historique, un cas d'emmurement d'animal est signalé à Borce : « M. W. Webster cite le fait, dont il a eu personnellement connaissance, de l'emmurement d'un coq avec toutes ses plumes au milieu d'un mur au centre d'une maison du XIVe siècle, qu'il vit démolir sous ses yeux à Borce, dans la vallée d'Asp.","architecture":"BORCE, la commune présente un ensemble de maisons des XIVe, au XIXe siècle , ainsi que des maisons fortes du XV et XVIe siècles. À l'entrée du village, la maison Sayerse est une ancienne tour de guet. Au cur du village, la maison Tarras présente une petite tour. Dans la rue principale, la maison de Bernard de Salefranque, notaire royal sous Jeanne dAlbret, se distingue par sa hauteur, son écusson à l'envers, ses fenêtres à meneaux ainsi que ses sculptures sur les chambranles de la fenêtre nord. Enfin, les fours à pain, le lavoir, les quatre fontaines et les fenêtres en ogives témoignent de l'histoire médiévale du village.","habitants":"Seigneurs locaux\r\n        \"","divers":"le  Mayor's-office à Borce.","gps":"","images":["../../jctruffet.com/image/image_64/64_Borce_1.jpg","../../jctruffet.com/image/image_64/64_Borce_2.jpg"]},"Consult_chateau_formulaire484a":{"id":"Consult_chateau_formulaire484a","dept":"64","canton":"Biarritz","commune":"Biarritz","nom":"Boulart","type":"Château","periode":"XIX","histoire":"BOULART ou Folie Boulart a été édifié par l'architecte Duc, à la demande de Charles Boulart, dont l'épouse, née Marthe Darricau était demoiselle d'honneur de l'Impératrice Eugénie. Elle pouvait alors participer à la vie mondaine de Biarritz lorsque l'impératrice et sa cour y venait et y fit donc des séjours. C'est un édifice dont la construction est Néo Renaissance.  Il fait l'objet d'une inscription auprès des monuments historiques depuis 1975.","architecture":"BOULART, c'est un édifice dont la construction est Néo Renaissance. En 1870 ce château était entouré d'un parc qui fut vendu en lots pour lotissement. Il est situé dans le centre de Biarritz peu visible. On peut le trouver au niveau du 62 avenue du Maréchal Foch au bout d'une allée.","habitants":"Famille de Boulart\r\n        \"","divers":"Château Boulart  43° 28' 30 nord, 1° 33' 32 ouest à Biarritz","gps":"","images":["../../jctruffet.com/image/image_64/64_Boulart_1.jpg","../../jctruffet.com/image/image_64/64_Boulart_2.jpg","../../jctruffet.com/image/image_64/64_Boulart_3.jpg","../../jctruffet.com/image/image_64/64_Boulart_4.jpg"]},"Consult_chateau_formulairef56f":{"id":"Consult_chateau_formulairef56f","dept":"64","canton":"Orthez","commune":"Orthez","nom":"Brassalay_Biron","type":"Château","periode":"XII-XV","histoire":"BRASSALAY-BIRON, la famille seigneuriale éponyme, issue du corps des Domengers, est signalée dès le XIIe siècle  Sa longévité est exceptionnelle. Acquise au protestantisme, elle fut liée de près aux évènements de la fin du XVIIe siècle : Arnaud de Brassalay est nommé en effet, en 1538, lieutenant du gouverneur de Navarrenx forteresse huguenote, dont son fils Bernard lui succédera. Son autre fils Fortic deviendra un des capitaines du baron d'Arros et après la victoire huguenote, il se verra confier le capitanat du château d'Orthez. Après être resté dans la famille Brassalay jusqu'au XVIIIe siècle, le château périclita et le domaine servit d'exploitation agricole. Il est aujourd'hui une maison d'accueil à caractère social.","architecture":"BRASSALAY est une gentilhommière du XVIe siècle qui participe beaucoup au charme de Biron, est un exemple type de ce que fut l'architecture au XVIe siècle. Érigé sur une colline, surplombant la vallée de Maslacq, il fait la fierté architecturale du village. Son donjon et une tour polygonale restent relativement bien conservés, ce château aurait été construit à la fin du XIVe siècle ou au début du XVe siècle. Il sagit sans doute à cette époque, dune maison forte. La date de 1611, qui surmonte le portail de pierre monumental, correspond aux agrandissements réalisés par David.","habitants":"Famille d'Arnaud de Brassalay \r\n        \"","divers":"Maison forte de Brassalay-Biron  43° 27' 25 nord, 0° 44' 33 ouest à Orthez","gps":"","images":["../../jctruffet.com/image/image_64/64_Brassalay_Biron_1.jpg","../../jctruffet.com/image/image_64/64_Brassalay_Biron_2.jpg","../../jctruffet.com/image/image_64/64_Brassalay_Biron_3.jpg"]},"Consult_chateau_formulairec743":{"id":"Consult_chateau_formulairec743","dept":"64","canton":"Serres-Castet","commune":"Burosse Mendousse","nom":"Burosse","type":"Château","periode":"XVI","histoire":"BUROSSE, en 1385  Burosse dépendait du bailliage de Lembeye. Le château de Burosse-Mendousse date de la fin du XVIe siècle et du début du XVIIe siècle. Il succède à un premier édifice du XIIIe siècle qui a appartenu aux marquis de Gramont. En 1540, le château appartient à la famille des Ferrand, puis à celle des Lassalle à partir de 1650 et ce jusquà la Révolution.","architecture":"BUROSSE,  un château dont les premiers vestiges datent du XVIIe siècle se dresse à Burosse. Remanié aux XVIIIe et XXe siècles, lédifice comporte un étage de soubassement surmonté de deux niveaux dhabitation, dont lun a en partie disparu sur la partie ouest du bâtiment, deux tourelles circulaires dangle sont flanquées de part et dautre de la façade nord, lune delles a été rabaissée et sert de poulailler. Toutes deux présentent des traces danciennes bouches à feu, aujourdhui obstruées.\r\nSur le perron auquel on accède par un escalier à volée double, la porte dentrée est flanquée de deux pilastres ioniques et surmontée dun fronton cintré, lui-même situé au-dessus dune frise décorée de sculptures en bas-relief et dun blason érodé. Des écorchures sur lactuel crépi montrent que les murs du corps de logis  sont construits en galets, briques et moellons de mollasse, mélangés dans du mortier. Des blocs de grès taillés sont utilisés comme pierres dangle. Un double feston de génoise (fermeture davant-toit, formée de plusieurs rangs de tuiles creuses renversées et remplies de mortier).","habitants":"Famille des Ferrand\r\n        \"","divers":"Château de Burosse 43° 31' 19 nord, 0° 12' 52 ouest à Mendousse","gps":"","images":["../../jctruffet.com/image/image_64/64_Burosse_1.jpg","../../jctruffet.com/image/image_64/64_Burosse_2.jpg"]},"Consult_chateau_formulaireb308":{"id":"Consult_chateau_formulaireb308","dept":"64","canton":"Oloron Ste-Marie","commune":"Aste-Béon","nom":"Béon","type":"Maison forte","periode":"XVI","histoire":"BEON  Il semble que la seigneurie de Béon remonte au IXe siècle où lon évoque un duel entre le seigneur et un chef normand. Mais cest en 1596 que M. de Talazac, seigneur de Bahus, est admis aux États de Béarn pour la seigneurie dAste-Béon.    Durant toute son histoire, il demeura la possession de la maison de Béon, jusqu'à sa lente extinction au XIXe siècle. Inscrit au M.H. depuis mars 2005, il est aujourd'hui complètement restauré.  Eléments protégés MH: le château en totalité : inscription par arrêté du 1er mars 2005   Gîtes de france","architecture":"Le château de Béon remonte au XIVe siècle. Il fut remanié au XVIIe siècle avant d'être laissé à l'abandon jusqu'aux années 1980. Située sur la rive du Gave, au fond dune ruelle, la maison-forte de Béon se détache dun arrière-plan de montagnes et de forêts pour former un tableau empli de charme. Le bâtiment se présente sous une forme rectangulaire de trois étages avec un toit dardoises à quatre pentes, et des échauguettes avec bouche à feu. Les tourelles reposent sur des encorbellements, le portail dentrée date du XVIIe siècle et ne présente aucune sculpture. Lédifice est assez riche en ouvertures.","habitants":"Famille de M. de Talazac\r\n        \"","divers":"La maison forte de Béon  43° 02' 0 nord, 0° 25' 06 ouest à Aste-Béon","gps":"","images":["../../jctruffet.com/image/image_64/64_B%c3%a9on_1.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9on_2.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9on_3.jpg"]},"Consult_chateau_formulaire9078":{"id":"Consult_chateau_formulaire9078","dept":"64","canton":"Oloron Ste-Marie","commune":"Béost","nom":"Béost","type":"Château","periode":"XVI","histoire":"BEOST, attenant à l'église Saint-Jacques-le-Majeur, le château de Béost ressort du paysage grâce à sa tour. Il s'agit d'une abbaye laïque, inscrite aux M.H. Etape pour le pèlerin de Saint-Jacques-de-Compostelle au XIIe siècle,  Elle devient au XVIe siècle une demeure seigneuriale dite \"château dAramitz\", mousquetaire du roi et  parent de la famille dEspalungue.  Au XVIe siècle une demeure seigneuriale lorsqu'il est acheté par Bertrand d'Espalungue, cette famille y vécut jusqu'en  1851. Aujourd'hui, ce site appartient à l'association Los Auzelets qui se charge de sa restauration et de son entretien depuis 1951 à travers des chantiers de jeunes bénévoles, ainsi qu'avec des groupes de jeunes en situation sociale difficile et des scoots de France.  Aujourd'hui propriété de la famille de monsieur Jean Auzias","architecture":"Château de Béost : attenant à l'église. Cette ancienne abbaye laïque du XIIe siècle était une étape des pèlerins de Saint-Jacques. Une salle médiévale flanquée d'une haute tour carrée du XIIIe siècle, agrandie au XVIe siècle. d'une aile avec deux fenêtres à meneaux et une porte cochère. Dans la cour intérieure, porte en marbre blanc du XVIIe siècle.    La bâtisse de plan rectangulaire comprend trois niveaux, coiffés dun toit quadrangulaire pentu et mansardé, couvert dardoises. La tour carrée qui domine le corps de logis date du XVe siècle. Elle est agrandie au XVIe siècle. Au-dessus de larc du portail de la façade sur une dalle devait figurer les armes de la famille. La demeure comprend des fenêtres Renaissance à meneaux et linteaux, dont lune est sculptée de personnages. Sur le côté ouest, on remarque une porte à piédroits surmontée dun fronton circulaire orné dune croix.  Le château de Béost appartient à l'association Los Auzelets qui se charge de le restaurer (chantiers de jeunes bénévoles). Abbaye laïque inscrite aux M.H.","habitants":"Famille de Bertrand d'Espalungue\r\n        \"","divers":"Château de Béost  42° 59' 38 nord, 0° 24' 53 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_B%c3%a9ost_1.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9ost_2.jpg"]},"Consult_chateau_formulaire2463":{"id":"Consult_chateau_formulaire2463","dept":"64","canton":"Orthez","commune":"Bérenx","nom":"Bérenx","type":"Château","periode":"XIX","histoire":"BERENX  C'est sur le camp fortifié qu'est construit le château féodal de Mongiscard en 1103 par Gaston IV de Béarn., après que, de retour de la première croisade il l'ait enlevé aux vicomtes de Dax. Ce château est entouré de fossé profonds et de deux hautes tours, permettant de voir à plus de 60 km alentours. En 1368, Gaston Fébus y concentre plus de cent lances, en prévention d'attaques éventuelles du duc d'Anjou.  Lors de révolte protestante de 1620, le château est le théâtre de violents combats : le capitaine huguenot Bensin se réfugie dans la place forte, mais doit se rendre à l'issue d'un siège. Louis XIII, fils d'Henri IV, ordonne la démolition du château de Mongiscard en 1621.                                               SAUBADE   a brûlé dans la nuit du 26 au 27 septembre 2010, à Bérenx appartenait à Philippe Lopez  et à Philippe Auberger maison de maître construite en 1778)   Château de Saint-Picq  chambres d'hôtes","architecture":"Château de Saubade il ne reste que de vestiges suite à l'incendie                                                                                                             St-Picq manoir avec un corps de logis  de trois travées entre deux pavillons rectangulaire à toit trés élevés avec lucarnes l'ensemble de  deux niveaux.","habitants":"Famille de Philippe Auberger\r\n        \r\n        \r\n        \"","divers":"Château de St-Pic grav 2et 3 et de Saubade grav 4","gps":"","images":["../../jctruffet.com/image/image_64/64_B%c3%a9renx_1.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9renx_2.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9renx_3.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9renx_4.jpg","../../jctruffet.com/image/image_64/64_B%c3%a9renx_5.jpg"]},"Consult_chateau_formulaire1b05":{"id":"Consult_chateau_formulaire1b05","dept":"64","canton":"Cambo les Bains","commune":"Cambo les Bains","nom":"Cambo_les_Bains","type":"Villa","periode":"XVII","histoire":"CAMBO les BAINS, à quelques kilomètres au sud à Itxassou le château de SOUBELETA chambres d'hôte de madame Régérat,  Au sommet du Mondarrain, un château ou une tour de guet appartenant au roi de Navarre, et dont il ne reste que des vestiges, fut construit au Moyen Âge. Le site fut occupé jusqu'au XVe siècle.                                                                 ARNAGA Edmond Rostand (1868 / 1918 )auteur dramatique célèbre pour ses comédies, poèmes et ses drames héroïques : Cyrano de Bergerac, L'aiglon, Chantecler, les Musardises, les Romanesques, ....\r\nVenu en 1900 pour soigner une pleurésie, Edmond Rostand décide de s'installer à Cambo. Sur les plans établis par l'architecte Joseph-Albert Tournaire, il fait construire en 1903 une somptueuse demeure, Arnaga dont les travaux se termineront en 1906. Décorée par des artistes de renom, cette maison s'ouvre sur de magnifiques jardins.  En 1918 décés d'Edmond Rostand, la famille se sépare de la villa elle est acquise par la commune en 1962.                            Villa ROSEANIA  pas d'information historique","architecture":"Villa ARNAGA, est un modèle de luxe et de bon goût, aussi bien en intérieur quen extérieur   Décorée par des artistes de renom, cette maison s'ouvre sur de magnifiques jardins.   A l'intérieur de cette villa de style néo-basque, une collection originale d'objets et d'uvres d'art évoque le célèbre écrivain et sa famille à travers un ensemble de 19 pièces. Site classé  M.H, « Musée de France » et « Maison des illustres ». Pour l'extérieur de la demeure, Edmond Rostand s'inspire des fermes traditionnelles basques à façade blanche, pans de bois rouges et toitures à deux pentes inégales. Il traite l'intérieur comme un somptueux décor de théâtre. La villa a deux jardins, lun aménagé à la française, le second à langlaise. La maison et les jardins sont désormais classés «M.H» et «Jardin Remarquable». Arnaga, cest aussi un musée dédié à Edmond Rostand.  Aujourdhui, en hommage à la créativité de cet auteur, on organise des événements culturels et autres moments de partage festif.       SOUBELETAT corps de logis de plan en équerrre à trois niveaux toit en croupe, l'édifice est accolé d'une tourelle ronde à escalier sur angle intérieur de la façade.                                                                     ROSEANIA, corps de logis rectangulaire à trois niveaux sur soubassement accolé de deux pavillons un en façade toit à deux pans , l'autre en angle à quatre niveaux, toit à quatre pans.","habitants":"Famille d'Edmond Rostand \r\n        \r\n        \"","divers":"Villa  Arnaga  et château de Sebeletat grav 4 et 5, villa Roseania grav 6 à Cambo les bains","gps":"","images":["../../jctruffet.com/image/image_64/64_Cambo_les_Bains_1.jpg","../../jctruffet.com/image/image_64/64_Cambo_les_Bains_2.jpg","../../jctruffet.com/image/image_64/64_Cambo_les_Bains_3.jpg","../../jctruffet.com/image/image_64/64_Cambo_les_Bains_4.jpg","../../jctruffet.com/image/image_64/64_Cambo_les_Bains_5.jpg","../../jctruffet.com/image/image_64/64_Cambo_les_Bains_6.jpg"]},"Consult_chateau_formulaire6905":{"id":"Consult_chateau_formulaire6905","dept":"64","canton":"Serres-Castet","commune":"Pouliacq","nom":"Caplane","type":"Manoir","periode":"XVII","histoire":"CAPLANE, le château de Caplane est une ancienne maison noble dite de Luc, autrefois siège de la baronnie de Mondebat, avant de devenir le siège de celle de Caplane au XVIIe siècle. Le château est situé dans un vaste domaine agricole de 22 hectares qui comprend autrefois un moulin et un étang à poissons. Ancienne maison noble, il est reconstruit au XVIIe siècle par Thimothée de Caplane, pour qui la baronnie de Caplane est créée en 1658. Le château a également appartenu aux demoiselles Tavernier, avant dêtre revendu à la Révolution.","architecture":"Le château dit de Caplane fut édifiée durant la deuxième partie du XVIIe siècle. Restauré au XIXe siècle, le corps de logis est ensuite partiellement démoli au début du XXe siècle. Des boiseries sont déplacées à Thèze dans la maison Pedelabat et le portail est déplacé à Séby.\r\nLe château est inscrit depuis peu à lInventaire des M.H.","habitants":"Famille de Thimothée de Caplane\r\n        \"","divers":"Château de Caplane à Pouliacq  43° 31' 20 nord, 0° 21' 06 ouest eyt le châateau de Mounicq grav 3","gps":"","images":["../../jctruffet.com/image/image_64/64_Caplane_1.jpg","../../jctruffet.com/image/image_64/64_Caplane_2.jpg","../../jctruffet.com/image/image_64/64_Caplane_3.jpg"]},"Consult_chateau_formulaire5838":{"id":"Consult_chateau_formulaire5838","dept":"64","canton":"Orthez","commune":"Caresse-Cassaber","nom":"Cassaber","type":"Château","periode":"XV_XVII","histoire":"Trois châteaux à Caresse-Cassaber celui de Cassaber, de Etchauz (voir article) , de Lassalle et celui de Louastou                                                      CARESSE-CASSABER, le village béarnais a connu une histoire très riche liée à la présence prestigieuse d'une famille de grands d'Espagne de 1812 à 1933, la dernière famille noble qui habita le château, les Camarasa. « On cultivait le savoir-vivre espagnol, la délicatesse de l'âme, la courtoisie légendaire des grands d'Espagne, et une générosité sans faille dont les habitants gardent un souvenir inaltérable. On parlait castillan ; la mode, les domestiques, les murs étaient espagnols. »Le village a vu habiter la marquise de Montehermoso, maîtresse du roi d'Espagne, les marquis de Camarasa et surtout Paul-Jean Toulet qui y passa son adolescence et y vécut jusqu'à l'âge de 29 ans.  Carresse a été réuni à Cassaber en 1972.      LOUASTOU, la propriétaire actuelle, Bénédicte du Cheyron Monroe, qui vit à létranger, a entièrement rénové Loustaou. Elle souhaite lui redonner vie en accueillant des familles qui soient, comme elle, sensibles au charme authentique de la demeure de son enfance, et respectueuses de la nature.                 LASSALLE, la seigneurie de Cassaber est mentionnée depuis le XVe siècle.  Elle est achetée en 1612 par Zacharie de Laffite, noble protestant, qui fait construire l'édifice actuel, terminé en 1643.","architecture":"La commune de Carresse-Cassaber connaît plusieurs personnalités, dont le comte dEchauz. Il y possède un château reconnaissable par son imposante architecture.\r\nLOUASTOU, cette grande bâtisse sinscrit dans la tradition architecturale des domaines nobiliaires encore attachés aux tâches agricoles. La maison de maître est vaste, et elle appartient à un espace clos par des bâtiments annexes, lensemble étant fermé par un mur.   Louastou du XVIIe siècle                          LASSALLE, le bâtiment originel en L, composé d'une aile Nord et d'une aile Est perpendiculaire à la précédente, a été agrandi à l'Est, ultérieurement, d'un nouveau corps de logis puis, au XIXe siècle, d'un pavillon abritant les commodités. La majeure partie des ouvertures remonte au XVIIe siècle, comme la porte sous fronton à boules d'amortissement.A l'intérieur, plusieurs pièces cons
