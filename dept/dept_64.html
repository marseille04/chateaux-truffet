endance du Canada.","architecture":"IRUMBERRY, au XVIe siècle, l'édifice original fut détruit, soit lors de la reprise de la Basse Navarre par les troupes navarraises, soit au cours des guerres de Religion. La construction actuelle ainsi que le pigeonnier semblent remonter au XVIe siècle. Le château, qui domine la rivière Laurhibar et le quartier de La Madeleine, a été restauré dans le courant des XVIIIe et XIXe siècles.Un blason à l'inscription illisible est placé au-dessus de la porte d'entrée.","habitants":"Famille de Charles Michel Irumberri de Salaberry \r\n        \"","divers":"château d'Irumberry","gps":"","images":["../../jctruffet.com/image/image_64/64_Irumberry_1.jpg","../../jctruffet.com/image/image_64/64_Irumberry_2.jpg","../../jctruffet.com/image/image_64/64_Irumberry_3.jpg"]},"Consult_chateau_formulaire25ec":{"id":"Consult_chateau_formulaire25ec","dept":"64","canton":"Mauléon-Licharre","commune":"Hispoure","nom":"Ispoure","type":"Maison forte","periode":"XVI","histoire":"ISPOURE Situé aux portes de Saint-Jean-Pied-de-Port, ISPOURE, durant le Moyen-Age, en constituait son premier rempart. \r\nA louest, la maison Laustainia du XIII-XIVe siècle barrait le défilé qui fermait le pays de Cize sur la Nive ; elle subsiste encore et comme à dautres monuments du pays Basque, il sy rattache la légende selon laquelle les «laminak» (lutins) auraient construit lédifice en une nuit. \r\nA l'Est, le château de Larrea du XVIe siècle, très bien restauré, fut la demeure durant plusieurs générations, des capitaines châtelains de Saint-Jean Pied de Port dont le soutien à Jeanne d'Albret ne fit jamais défaut et dont les terres furent même érigées en baronnie en 1724.","architecture":"De la maison forte de plan carrée à deux niveaux  prolongé de dépendances.","habitants":"Seigneurs locaux\r\n        \"","divers":"La maison forte d'Ispoure","gps":"","images":["../../jctruffet.com/image/image_64/64_Ispoure_1.jpg"]},"Consult_chateau_formulairea223":{"id":"Consult_chateau_formulairea223","dept":"64","canton":"Oloron Ste-Marie","commune":"Izeste- Louvié-Juzon","nom":"Izeste","type":"Maison forte","periode":"XVI","histoire":"IZESTE la commune comptait une abbaye laïque, vassale de la vicomté de Béarn.\r\nA deux kilomètre au sud-est à Louvié-Juzon le château dit Villa-Tourné","architecture":"A Izeste Maisons des XVIe, XVIIe et XVIIIe siècles.\r\nMaison natale de Théophile de Bordeu médecin réputé (maison forte du Domec).                                                    A Louvié-Juzon le château de plan restangulaire à trois niveaux avec lucarnes sur comble à toit à la mansard, tour sur l'arrière","habitants":"Famille de Théophile de Bordeu\r\n        \"","divers":"Château d'Izeste et de Louviè-Juzon","gps":"","images":["../../jctruffet.com/image/image_64/64_Izeste_1.jpg","../../jctruffet.com/image/image_64/64_Izeste_2.jpg","../../jctruffet.com/image/image_64/64_Izeste_3.jpg","../../jctruffet.com/image/image_64/64_Izeste_4.jpg"]},"Consult_chateau_formulaire3b21-2":{"id":"Consult_chateau_formulaire3b21-2","dept":"64","canton":"Mourenx","commune":"Jasses","nom":"Jasses","type":"Château","periode":"XVI","histoire":"JASSES, du XVIe siècle à la Révolution, le château de Jasses appartient à la famille du marquis de Jasses, mais il reste, à ce jour, peu déléments de la bâtisse originelle. Pendant la Révolution, le château est brûlé dans la nuit du 16 au 17 brumaire de lannée révolutionnaire. Le marquis de Jasses est alors contraint de quitter la région avec sa famille. La baronnie de Jasses, datant de 1644, dépendait de la vicomté de Béarn et comprenait Araujuzon, Araux, Jasses, Montfort et Viellenave.","architecture":"JASSES, le bâtiment que lon peut voir à lheure actuelle est une reconstruction du XVIIIe siècle. De forme rectangulaire, il est dirigé nord-sud, en amont du gave dOloron et du Layou. Lentrée se fait par un escalier à double entrée sur les côtés. Il comporte deux étages dont un, sous les combles, est éclairé par des lucarnes en chien-assis.","habitants":"Marquis de Jasses \r\n        \"","divers":"Château de Jasses","gps":"","images":["../../jctruffet.com/image/image_64/64_Jasses_1.jpg","../../jctruffet.com/image/image_64/64_Jasses_2.jpg"]},"Consult_chateau_formulaire61e2":{"id":"Consult_chateau_formulaire61e2","dept":"64","canton":"Saint-Palais","commune":"Aroue-Ithorots-Olhaiby","nom":"Juantho","type":"Château","periode":"XVIII","histoire":"JUANTHO, édifié au XVIIIe siècle, le château de Joantho est la propriété de la famille noble de Joantho dAroue. Il se trouve sur la Via Podiensis de la route jacobite, ce qui lui vaut dêtre cité systématiquement dans les itinéraires compostellans. Lhistoire des seigneurs de Joantho est difficile à établir. Cette famille est cependant relativement puissante, ce que traduit leur grand château.\r\nDe nos jours, le château de Joantho est une propriété privée accueillant le siège dune société agricole.","architecture":"JUANTHO, le château de Joantho constitue, si ce nest une étape, au moins un point de repère sur le chemin de Saint-Jacques-de-Compostelle entre Aroue et Ostabat.  Ce dernier est composé de plusieurs corps de bâtiment, dont le principal sélève sur trois niveaux, dont un étage de combles éclairés par des lucarnes. De plus, les seigneurs de Joantho érigent une chapelle sur leur domaine, signe supplémentaire de leur importance.","habitants":"Famille noble de Joantho dAroue\r\n        \"","divers":"Château de Juantho  43° 18' 49 nord, 0° 54' 50 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Juantho_1.jpg"]},"Consult_chateau_formulaire9384":{"id":"Consult_chateau_formulaire9384","dept":"64","canton":"Pau","commune":"Maspie-Lalonquère-Juillacq","nom":"Juillacq","type":"Château","periode":"XVI","histoire":"JUILLACQ, en 1385 Maspie comptait seize feux, Lalonquère dix et Juillacq vingt-trois. Les trois paroisses dépendaient du bailliage de Lembeye. Lalonquère était un membre de la commanderie de l'ordre de Malte de Caubin et Morlaàs. Il y avait à Juillacq une abbaye laïque, vassale de la vicomté de Béarn. Juillacq fut annexé à l'ensemble Maspie-Lalonquère en 1842, lui-même créé en 1833 par l'union de Maspie et Lalonquère.","architecture":"La maison, dite château, à Juillacq, date du XVIe siècle. On y trouve une girouette du XVIIIe siècle inscrite à l'Inventaire général du patrimoine culturel.\r\nLa commune présente un ensemble de maisons et de fermes des XVIIe, XVIIIe et XIXe siècles. L'une des demeures du lieu-dit Coume à Juillacq possède une peinture monumentale de la fin du XIXe siècle représentant Pau et ses environs.","habitants":"Vicomté de Béarn\r\n        \"","divers":"Château de Juillacq","gps":"","images":["../../jctruffet.com/image/image_64/64_Juillacq_1.jpg"]},"Consult_chateau_formulaire5c44":{"id":"Consult_chateau_formulaire5c44","dept":"64","canton":"Jurançon","commune":"Jurançon","nom":"Jurancon","type":"Villas-Châteaux","periode":"XIV-XVI","histoire":"JURANCON Au censier de 1604 le bourg et les coteaux qu'on appelait Bourdalat totalisent respectivement 132 et 129 maisons. On compte 8 maisons une minorité persécutée depuis le Moyen-Âge sur les bords du Neez. La minorité protestante après la restauration du catholicisme sous Louis XIII y est très forte, et Jurançon gardera un des cinq derniers temples du Béarn.   Le fief de Jurque, créé en 1617, était également vassal de la même vicomté. Sous la Révolution on emprisonna les riches propriétaires des côteaux, M. de Perpignàa, M. de Ségure, M. de Navailles, Moureu, le maire, le curé, et les propriétaires des deux moulins qui étaient deux nobles. Mais ceux-ci retrouvèrent leur rang social juste après.\r\nQuand Pau devient ville anglaise, Jurançon bénéficia de l'affluence de riches parlementaires qui s'y installèrent. Ils bâtirent ou agrandirent de magnifiques villas agrémentées de jardins ou de belles demeures sur les coteaux,  le château de Perpignàa, domaine de Mont-Plaisir,  Ollé Laprune,","architecture":"château de Perpignàa, domaine de Mont-Plaisir, domaine Ollé Laprune, ces domaines témoignent de l'élégance architecturale de l'époque. Un quart-est du village est dominé par le château de Louvie, qui existe depuis le XIVe siècle et possède 38 hectares formant un polygone entre la place de la Croix-du-Prince au nord, le croisement de l'actuelle rue de la République  avenue Rauski au sud-ouest, et le pont du Capitaine à Gélos à l'Est. ce château est acheté le 16 juillet 1829 par Charles Jean XIV, roi de Suède, de Norvège, des Goths et des Vandales né Jean-Baptiste Bernadotte, natif de Pau, qui en fait donation le 17 juillet 1829 à son neveu Joseph Félix Oscar, 2e baron Bernadotte Pau, 10 novembre 1807 - Jurançon, 12 août 1883 qui épousa le 4 novembre 1841, à Labatut-Figuières, Pauline Gabrielle Louise Valérie de Navailles-Labatut  à Béziers, 15 juillet 1823 - Les Angles, 14 février 1874, trois de leurs cinq enfants allaient naître à Jurançon.","habitants":"Seigneurs locaux\r\n        \"","divers":"Le château de Perpignaà grav 1, de Lafitte grav 2, d'Henriade grav 3, du Mont Riand grav 4, maison Napoli gav-5, de Olle-Laprune grav 6 de Sarrot grav 7  de Faustenbas grav 8 et la poste grav 3 possible que certain ai changé de nom ou disparu.","gps":"","images":["../../jctruffet.com/image/image_64/64_Jurancon_1.jpg","../../jctruffet.com/image/image_64/64_Jurancon_2.jpg","../../jctruffet.com/image/image_64/64_Jurancon_3.jpg","../../jctruffet.com/image/image_64/64_Jurancon_4.jpg","../../jctruffet.com/image/image_64/64_Jurancon_5.jpg","../../jctruffet.com/image/image_64/64_Jurancon_6.jpg","../../jctruffet.com/image/image_64/64_Jurancon_7.jpg","../../jctruffet.com/image/image_64/64_Jurancon_8.jpg","../../jctruffet.com/image/image_64/64_Jurancon_9.jpg"]},"Consult_chateau_formulaired5e8":{"id":"Consult_chateau_formulaired5e8","dept":"64","canton":"Orthez","commune":"Laas","nom":"Laas","type":"Château","periode":"XIII-XVII","histoire":"LAAS cité au XIIIe siècle en 1538 seigneurie de Perrarnaud de Forpelad refusa de se soumettre au exigence de Jeanne d'Albret  il en mourat en 1569. La seigneurie passe à Jean de Forpelat ce dernier meurt en 1613, sa petite fille en hérita en 1633  après la mort de son frère, elle épousa Charles de Lataulade qui  à succédé de son père la lieutenenance  du gouverneur de Navarrenx, son fils Charles héritera de la charge et ajoutera  celle du sénéchal du Béarn, il épousera  Anne Henriette d'Asson d'Argelès, seule survivrat une fille Marianne alliée  à Marc Antoine de Luger seigneur de Percillon puis à Jean de larralde baron d'Harriette, ses deux fils étant morts sans postérité, la baronnie revient à un cousin Charles Léonard de Lataulade capitaine grenadier  de Laas restera dans cette famille qui n'à pas émmigré pendant la Révolution jusqu'en 1806 date de la vente du domaine à Jean-Pierre Gaztelu qui passa par héritage  aux PaÏssa, puis aux Casenave  avant d'être vendu en 1880 à la comtesse de Caltavutoro veuve d'un général espagnol, en 1885 Laàs change de propriétaire au profit de Charles Ferdinand Latrille, comte de Lorencez fils d'un général d'Empire et petit fils par sa mère du maréchal Oudinot. En 1921  passe dans différentes mains pour être acquis en 1946 à Louis Serbat en 1965 madame Serbat veuve  légue le château et les collections au Touring Club de France et depuis 1980 à la charge du département des Pyrénées  Atlantiques qui en assure la mission de présentation des collections.","architecture":"LAAS  dans un parc de 12 ha, au sein d'une ancienne baronnie du Béarn, une gentilhommière reconstruite au XVIIe siècle  suite à un incendie. La nouvelle construction  de plan rectangulaire à deux niveaux sous une trés hautes toitures   d'ardoise percée de lucarnes à fronton triangulaires  sur laquelle se détachent des souches de cheminées couronnées de pots à feu, la porte d'entrée surmontée d'un fronton cintré  portant les armoiries  des Lataulade s'encadre dans la façade orientale, la bâtisse est flanquée à son angle nord d'un gros pavillon carré, l'intérieur un musée  abrite l'une des plus belles collections d'arts décoratifs d'Aquitaine. Désormais propriété du Conseil Général des Pyrénées-Atlantiques, le domaine sert d'écrin à ce remarquable legs d'objets d'art ainsi qu'à de nombreuses animations culturelles. Collections classées M.H.","habitants":"Famille de Perarnaud de Forpelat\r\n        \"","divers":"Château de Laas 43° 22' 43 nord, 0° 51' 01 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Laas_1.jpg","../../jctruffet.com/image/image_64/64_Laas_2.jpg","../../jctruffet.com/image/image_64/64_Laas_3.jpg","../../jctruffet.com/image/image_64/64_Laas_4.jpg"]},"Consult_chateau_formulairee914":{"id":"Consult_chateau_formulairee914","dept":"64","canton":"Orthez","commune":"Villefranche","nom":"Labastide_Villefranche","type":"Château tour","periode":"XIII-XVII","histoire":"BIJOU, la fierté du village, avec la tour de défense, est le surprenant château-Bijou. Il s'agissait à l'origine d'une simple gentilhommière construite par un certain Dussine, puis aménagée par madame Combes, née Saint-Macary, qui dépensa des fortunes considérables pour construire le château actuel. Le parc accueille un cloître breton du XIIIe siècle reconstitué, un temple de l'Amour, un embarcadère, une chapelle néo-gothique dans laquelle on trouvait autrefois un ancien crucifix sévillan.  Après des fortunes diverses, le château fut abandonné. Bijou construit en 1863, rénové de 1914 à 1923, , appartenait à la Mutuelle de la Police quand un incendie s'y est déclaré. C'était en 2000, sa toiture de zinc ne reflète  les splendeurs passées. Depuis l'automne 2009, il est la possession de M. Vidalinc et sa rénovation est en cours.                                            Maison LASALLE, construite sur un ancien temple romain dédié à Mercure à proximité du château, cette maison était le logement des officiers de la garnison. En 1814, elle fut occupée par des officiers anglais.\r\nMaison dite « de JEANNE d'ALBRET»Elle y dormit avec son fils Henri IV en 1564. Dans cette maison fut torturé aux fins d'aveux, le malfaiteur Pilate, lieutenant de Audijos, en révolte contre la gabelle.\r\nChâteau MALHERBE Il s'agit d'une ancienne résidence des Habas, magistrats du parlement de Navarre à Pau.","architecture":"Labastide-Villefranche est un village qui se situe à la limite Nord-Ouest du Béarn avec la Soule. La frontière avec l'Aquitaine médiévale est plus au Nord.  Elle a été créée comme bastide en 1292 par la vicomtesse Marguerite de Béarn afin de faire face à la bastide aquitaine (Anglaise) de Hastingues et à celle navarraise de Sordes. \r\n Le donjon dit tour carrée  permettait de surveiller les environs et de prévenir la capitale Orthez en cas de danger. Il faisait partie d'un château détruit par les armées de Charles-Quint, roi d'Espagne, en 1523. Ce donjon s'élève à 28 mètres de hauteur et son rez de chaussée est aveugle.  Une tour carrée, à moitié en calcaire et à moitié en granit, est le seul vestige d'une forteresse construite en 1338 et nommée la « Bastide de Béarn » dans les chartes. Elle était destinée à protéger le royaume de France contre les possessions anglaises en Navarre et en Guyenne. Le rez-de-chaussée était occupé par une basse fosse sans ouverture et le premier étage ouvert de meurtrières. La tour a été surélevée au XVe siècle et l'élévation rajoutée percée de fenêtres. Les mâchicoulis ont disparus. Un château fort se trouvait peut-être à proximité. La tour, abîmée par la foudre en 1853, est enregistrée aux M.H. depuis 1915.","habitants":"Monsieur de Vidalinc.                                                     Madame Combes\r\n        \"","divers":"Château de Bijoux 3° 27' 20 nord, 1° 01' 18 ouest  à  Labastide de Villefranche et sa tour","gps":"","images":["../../jctruffet.com/image/image_64/64_Labastide_Villefranche_1.jpg","../../jctruffet.com/image/image_64/64_Labastide_Villefranche_2.jpg","../../jctruffet.com/image/image_64/64_Labastide_Villefranche_3.jpg","../../jctruffet.com/image/image_64/64_Labastide_Villefranche_4.jpg"]},"Consult_chateau_formulaire4995":{"id":"Consult_chateau_formulaire4995","dept":"64","canton":"Nay","commune":"St-Abit","nom":"Labbadie_Livron","type":"Château","periode":"XVII","histoire":"ST-ABIT de ses origines anciennes, attestées par des sources écrites depuis le XIIIe siècle, ce petit village rural conserve de beaux vestiges en la présence notamment de vieilles demeures béarnaises et dun château du XVIIIe siècle. Au XIVe siècle, deux seigneurs se partagent les terres de Saint-Abit et prêtent tous deux serment au vicomte du Béarn. Il sagit dArnaud de Saint-Avit et de Bernard de Saint-Avit. En 1373, Gaston Fébus, vicomte du Béarn, dote le chef de lune des compagnies de son armée, Arnaud-Guilhem de Saint-Avit, du titre dabbé laïque. Celui-ci devient alors le titulaire de droit de léglise du lieu, dont il est patron et protecteur, et de la demeure qui sy rattache.                                                        LABBADIE, les ordonnances de 1571 firent du calvinisme la religion officielle du Béarn. Le catholicisme ne fut même plus toléré. Bon catholique, Jean de Saint-Abit est proscrit, ses biens sont saisis par ordre de Jeanne dAlbret en  1569. Même son père, Bernard, pourtant décédé est proscrit à titre posthume et ne sera pas amnistié lors du pardon général de 1599. Lors du rétablissement du culte catholique en Béarn autorisé par lÉdit de Fontainebleau, signé par Henri IV, Jean de Saint-Abit retrouve ses biens et prérogatives.  Le château de Livron date du XVIIe siècle.","architecture":"ST-ABIT,   à partir du XVIe siècle, on compte deux châteaux dans le village qui appartiennent à deux abbayes laïques différentes et concurrentes. Au XVIIe siècle, aux États régionaux du Béarn, une délibération officialise la présence dune seigneurie divisée entre trois seigneurs : les Peyré demeurant dans leur abbaye laïque, les dAbadie de Livron qui ont un petit château et les dEspalungue dArros qui demeurent dans ce village. Ces trois familles se partagent la dîme et les revenus des terres du village. En 1772, le seigneur de Peyré et le sieur de Livron sont reconnus comme les deux abbés laïques officiels et obtiennent le droit de nommer alternativement le curé du village. Les deux familles sunissent par la suite grâce au jeu des alliances. Des propriétés de la famille de Livron, il reste aujourdhui à Saint-Abit un château du XVIIIe siècle, ainsi quun manoir du XIIe siècle, réduit en ruines.","habitants":"Famille de Jean de Saint-Abit\r\n        \"","divers":"Château de Labadie-Livron","gps":"","images":["../../jctruffet.com/image/image_64/64_Labbadie_Livron_1.jpg","../../jctruffet.com/image/image_64/64_Labbadie_Livron_2.jpg","../../jctruffet.com/image/image_64/64_Labbadie_Livron_3.jpg"]},"Consult_chateau_formulaire5080":{"id":"Consult_chateau_formulaire5080","dept":"64","canton":"Mauléon-Licharre","commune":"Lacarre","nom":"Lacarre","type":"Château","periode":"XIV-XVI","histoire":"LACARRE, château de Lacarre dit château Harispe au pied dune colline, le château de Lacarre est lancien domaine des premiers seigneurs de Lacarre, du XIIe siècle, appartenant à une seigneurie, lédifice passe ensuite dans les mains des familles dAsiayn au XIVe siècle, dArbide au XVIe siècle, puis de Lafuntzun  au XVIIe siècle. Mais le propriétaire le plus fameux demeure le général Harispe, futur maréchal de France, qui acquiert la propriété en 1820. Remanié au XVIIIe siècle, le château est par la suite  transformé en 1880. Resté dans la descendance il appartient maintenant à  monsieur Marcel Dutey Harrispe.","architecture":"Lacarre,  bâti entre les XIe et XIIIe siècles, le château de Lacarre est à lorigine une maison forte qui tire partie de sa position géographique privilégiée à lintersection des Pays de Cize, dOssès, dIrissarry et de lOstabarret, remanié à diverses reprises au XVIe siècle fut restauré et transformé à la fin du XIXe siècle sous la direction de monsieur Doyère architecte du château de Pau  son architecture médiévale au profit dun mélange de styles combinant des façades néo-Renaissance et néo-Louis XIII. La décoration intérieure est quant à elle de style Empire. Doté de deux étages carrés, lactuel château est flanqué de deux tourelles au sud et dun grand balcon qui surplombe la porte dentrée, décorée aux armes du maréchal Harispe. Dans le parc, lancien jardin à la française et son orangerie sont aujourdhui remplacés par une vaste pelouse avec pigeonnier et dépendances.\r\nLe château Harispe est inscrit  aux M.H.","habitants":"Général Harispe\r\n        \"","divers":"Château de Lacarre  43° 11' 32 nord, 1° 09' 50 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Lacarre_1.jpg","../../jctruffet.com/image/image_64/64_Lacarre_2.jpg","../../jctruffet.com/image/image_64/64_Lacarre_3.jpg","../../jctruffet.com/image/image_64/64_Lacarre_4.jpg"]},"Consult_chateau_formulairef025":{"id":"Consult_chateau_formulairef025","dept":"64","canton":"Orthez","commune":"Lahontan","nom":"Lahontan","type":"Château","periode":"XVIII","histoire":"LAHONTAN, la baronnie de Lahontan sort de lombre au XVIIe siècle alors quelle est achetée par Issac de Lom dArce. Cet homme dépense des sommes importantes pour aménager le Gave de Pau afin de le rendre navigable jusquà Bayonne. Quand son fils, Louis, naît en 1666, la famille est pratiquement ruinée. Sans espoir davoir une position sociale en France, le jeune Louis sengage dans larmée et part en Amérique en 1683. Un an plus tard, ne pouvant faire face aux créances, le domaine de Lahontan est saisi et vendu à Charles Casamajour. La baronnie de Lahontan reste désormais attachée au nom de Louis dont les récits de nature ethnographique montrent un réel intérêt pour les Indiens dAmérique. Pas d'information historique, le château en vente magnifique château érigé au  XVIIIe siècle et d'un ancien hôtel érigé par un assureur écossais pour accueillir la clientèle anglaise pour les thermes au coeur d'un magnifique parc de 10000 m² aménagé et arboré à 50 m des thermes à 50 m du centre ville de Salies de Béarn.","architecture":"Lahontan quadrilataire à deux niveaux flanqués en retour d'équerre sur les flans de pavillons à toit en croupes recouvert de tuiles, en façade pavillon légèrement saillant avec fronton rotondant.","habitants":"Famille d'Issac de Lom dArce\r\n        \r\n        \"","divers":"Château de Lahontan","gps":"","images":["../../jctruffet.com/image/image_64/64_Lahontan_1.jpg"]},"Consult_chateau_formulaire29e2":{"id":"Consult_chateau_formulaire29e2","dept":"64","canton":"Serres-Castet","commune":"Lalongue","nom":"Lalongue","type":"Château","periode":"XVIII","histoire":"LALONGUE la seigneurie de Lalongue, à laquelle on ajoute une abbaye laïque, passe entre les mains de plusieurs seigneurs au cours des siècles jusquà Jeanne de Béarn à la fin du XVIIe siècle, Abbaye laïque dénombrée en 1538 par Anna de Narf puis Simon Roger de Hagedet sur l'emplacement de la ferme Castelbielh dans le parc.   Réunie à la seigneurie peu après  appartenant à Arnaud Raymond d'Espoey (1060), à Sansaner de Lescun (1385), au seigneur de Moncaubet en 1538, aux Andoins en 1576, vendue en 1611 à Guillaume de Lamarque, puis aux Latapy, vendue en 1652 aux Germenaud, puis en 1681 à Anne de Béarn et en 1695 à Charles Deschiens de Laneuville. Celui-ci revendit Lalongue aux Dufau qui la vendirent à leur tour après saisie à Pierre d'Arripe directeur de la monnaie de Bayonne en 1766.\r\nAujourdhui, le château de Lalongue est réputé pour son parc à langlaise aménagé par Alexandre de Yermeloff à la fin du XIXe siècle et qui y fait planter des espèces rares.","architecture":"LALONGUE,  éléments protégés MH : les façades et les toitures du château, façades et toitures de la grange et des écuries, parc avec ses terrasses, son belvédère et ses murs de clôture, jardin avec ses terrasses, son puits et son pigeonnier: inscription par arrêté du 9 juillet 1998 cest sur une éminence naturelle, au lieu-dit « Castelbielh », que sélève dès le XIe siècle le premier château de Lalongue. Tombant en ruine, il est entièrement reconstruit au XVIIIe siècle. Au XIXe siècle, ce dernier subit le remaniement de toutes ses baies et est agrandi. Il conserve néanmoins sa disposition du XVIIIe siècle.  Edifice agrandi et considérablement remanié par M. de Yermoloff dans la deuxième moitié du XIXe siècle.","habitants":"Famille de Pierre dArripe \r\n        \"","divers":"Château de Lalongue","gps":"","images":["../../jctruffet.com/image/image_64/64_Lalongue_1.jpg","../../jctruffet.com/image/image_64/64_Lalongue_2.jpg"]},"Consult_chateau_formulairea9a1":{"id":"Consult_chateau_formulairea9a1","dept":"64","canton":"Oloron Ste-Marie","commune":"Moumour","nom":"Lamothe_Moumour","type":"Château","periode":"XIII","histoire":"Le château de LAMOTHE remonte aux années 1200. Il a été notamment la résidence d'été des évêques d'Oloron pendant presque 600 ans.  Actuellement chambre d'hôtes.","architecture":"Le château de Lamothe est un château bâti à Moumour, construit au sommet d'une colline, offre une vue idéale à 360 degrés, rappelant la position stratégique du lieu au cours de l'histoire.  Face à ce paysage idyllique, vous profiterez du confort de l'édifice dont la construction et la décoration invitent à la découverte. Grâce à la manière dont a été construit le château.","habitants":"Des évêques d'Oloron \r\n        \r\n        \"","divers":"Château de Lamothe à Moumour","gps":"","images":["../../jctruffet.com/image/image_64/64_Lamothe_Moumour_1.jpg","../../jctruffet.com/image/image_64/64_Lamothe_Moumour_2.jpg","../../jctruffet.com/image/image_64/64_Lamothe_Moumour_3.jpg","../../jctruffet.com/image/image_64/64_Lamothe_Moumour_4.jpg"]},"Consult_chateau_formulairef054":{"id":"Consult_chateau_formulairef054","dept":"64","canton":"Nay","commune":"Nay","nom":"Langladure","type":"Château","periode":"XVII","histoire":"LANGLADURE Hôtel Restaurant  de Mme Dominique Lanneretonne.","architecture":"Entre Pau et Lourdes, le château de Langladure vous offre une vue panoramique sur la vallée environnante qui vous transportera jusqu'à la chaîne des Pyrénées. Une vue époustouflante pour un lieu unique qui a vu se succéder depuis des décennies divers événements et notamment de nombreux mariages.\r\nVenez célébrer votre évènement dans ce cadre magique qui vous laissera un souvenir indélébile. Le parvis du château est à votre disposition ainsi que 2 salles de réception et une arrière cuisine avec accès privé.","habitants":"Famille de Lanneretonne\r\n        \"","divers":"Château de Langladure à Nay","gps":"","images":["../../jctruffet.com/image/image_64/64_Langladure_1.jpg","../../jctruffet.com/image/image_64/64_Langladure_2.jpg"]},"Consult_chateau_formulaire90b1":{"id":"Consult_chateau_formulaire90b1","dept":"64","canton":"Mourenx","commune":"Sus","nom":"Laroque_Sus","type":"Château","periode":"XVIII","histoire":"LAROQUE, la communauté sest installée à Sus, au château Laroque en 1983. Au début des années 1990, le groupe achète une propriété de 11 hectares à Angous, situé à 4 km de Sus. Mais après une décision de justice en 1997, douze maisons construites sans permis sur un terrain inconstructible sont détruites,   la communauté « Tabithas Place » sinspire du mouvement « The Twelve Tribes », né aux Etats-Unis en 1972 sous limpulsion dun couple de fondamentalistes protestants : Elbert Eugen Spriggs et Marsha Spriggs.  Il fallait donc reconstruire les douze tribus dIsraël. La communauté est en France reconnue comme une secte par la commission parlementaire denquête sur les sectes. Elle est aussi connue sous le nom d« Ordre apostolique », « Douze tribus » ou « Ruben ans Brothers ».","architecture":"Laroque, entouré dun petit parc arboré, le château Laroque à Sus est une demeure de plaisance à larchitecture raffinée se compose dun corps de logis quadrangulaire à deux niveaux et sept travées cantonné de deux tourelles polygonales sur les angles de la façade antérieure. Les baies sont rectangulaires au deuxième niveau, et cintrées en segment au rez-de-chaussée. Un léger avant-corps central, à trois travées, est marqué par la présence dun perron, dun balcon au premier étage, et par un discret décrochement de la toiture. Les combles sont éclairés par quatre lucarnes en oculus ovale, et une grande lucarne centrale à fronton triangulaire. Lensemble, agréablement ordonnancée, montre une influence de larchitecture classique du XVIIIe siècle, atténuée par la présence des deux tourelles.","habitants":"Elbert Eugen Spriggs et Marsha Spriggs\r\n        \"","divers":"Château de Laroque à Sus","gps":"","images":["../../jctruffet.com/image/image_64/64_Laroque_Sus_1.jpg","../../jctruffet.com/image/image_64/64_Laroque_Sus_2.jpg","../../jctruffet.com/image/image_64/64_Laroque_Sus_3.jpg","../../jctruffet.com/image/image_64/64_Laroque_Sus_4.jpg"]},"Consult_chateau_formulaire7a84-3":{"id":"Consult_chateau_formulaire7a84-3","dept":"64","canton":"Oloron Ste-Marie","commune":"Sauccède","nom":"Larrey","type":"Château","periode":"XVIII","histoire":"LARREY, appartenait autrefois à la famille Larrey et comprenait à l'origine un corps de ferme érigé en 1789. Un siècle plus tard, les descendants y adjoindront un castel, doté comme dans de nombreuses fermes béarnaises, d'une cour intérieure avec une galerie dont les murs furent peints de fresques en \"trompe l'oeil\" d'inspiration néo-classique. C'est en 1913 que l'arrière-grand-père de l'actuel propriétaire, Pierre Beighau, en fit l'acquisition. Dès lors chaque génération y apporta sa contribution dans le souci constant de conservation de ce patrimoine familial. Après avoir été tout au long du XXe siècle une propriété agricole, la demeure s'est ouverte au public en 2009 avec la création de trois chambres d'hôtes. Cette maison de famille est labellisée \"Gîtes de France\", 4 épis \" Charme\". Malgré tout, son propriétaire n'oublie pas de rappeler qu'il s'agît de chambres d'hôtes, et non d'un gîte.","architecture":"Larrey, perchés sur un coteau surveillant la chaîne des Pyrénées, la bâtisse et son parc datent des XVIIIe et XIXe siècles. Cette maison de famille au charme exquis présente une particularité : une cour intérieure ornée d'une galerie avec des peintures en « trompe l' oeil ». Un corps de logis de plan carré  à deux niveaux avec lucarnes sur comble  bâtisse entre deux tours carrées aux angles de la façade de trois niveaux et lucarnes sur comble du toit réduit  en quatres pans recouvert d'ardoises.","habitants":"Famille Larrey\r\n        \"","divers":"Château de Larrey à Sauccéde","gps":"","images":["../../jctruffet.com/image/image_64/64_Larrey_1.jpg","../../jctruffet.com/image/image_64/64_Larrey_2.jpg","../../jctruffet.com/image/image_64/64_Larrey_3.jpg","../../jctruffet.com/image/image_64/64_Larrey_4.jpg"]},"Consult_chateau_formulairee076":{"id":"Consult_chateau_formulairee076","dept":"64","canton":"Oloron Ste-Marie","commune":"Bedous","nom":"Lassalle_Bedous","type":"Manoir","periode":"XVII-XX","histoire":"LASSALLE , manoir dit château Lassalle,  Pierre Laclède, né en 1729 à Bedous et mort en 1778 sur le fleuve Mississippi (États-Unis), est le fondateur de la ville de Saint Louis aux États-Unis d'Amérique.\r\nWilhelm Friedmann, né en 1884 à Vienne, est un romaniste et philologue austro-allemand. Il se suicide en 1942 à Bedous.","architecture":"BEDOUS, manoir dit château Lassalle du XVIIe, XIXe et XXe siècles et le château Fénart.                             Le château Lassalle du XVIIe, flanqué de tourelles rondes, domine sur une terrasse le Gabarret, torrent qui descend du village perché d'Aydius. Reconverti en maison de retraite.                                                       Le château  Laclède  du XVIIe siècle, sur l'autre rive, a une tour et un pignon en escalier. Il fut bâti par une famille qui donna de grands commis au royaume de Béarn et de Navarre. La vallée d'Aspe a été illustrée par la famille des Laclède, dont trois générations ont laissé des souvenirs d'aventures et de gloire.","habitants":"Famille des Laclède,\r\n        \"","divers":"Château Lasalle  42° 59' 54 nord, 0° 35' 58 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Lassalle_Bedous_1.jpg","../../jctruffet.com/image/image_64/64_Lassalle_Bedous_2.jpg","../../jctruffet.com/image/image_64/64_Lassalle_Bedous_3.jpg","../../jctruffet.com/image/image_64/64_Lassalle_Bedous_4.jpg","../../jctruffet.com/image/image_64/64_Lassalle_Bedous_5.jpg"]},"Consult_chateau_formulaire70df":{"id":"Consult_chateau_formulaire70df","dept":"64","canton":"Oloron Ste-Marie","commune":"Bidos","nom":"Lassalle_Bidos","type":"Château","periode":"XVI-XVIII","histoire":"LASSALLE, le château Lassalle de Bidos date dans sa forme actuelle de la seconde moitié du XVIIIe siècle est à lorigine une maison forte, édifice fortifié destiné à la défense. Il possède notamment un tympan caractéristique du XVe siècle. En 1637, Beaz Forbet, seigneur de Bidos, obtient du roi lanoblissement de la maison et de ses dépendances. Les familles Navailles, Guimbeau, Lassalle, puis Supervielle succèdent aux Forbet. Jean Antoine de Supervielle devient dailleurs, en 1832, le maire de Bidos. \r\nAujourdhui, encore propriété des Supervielle, la maison noble de Lassalle est inscrite aux M.H.","architecture":"Lasalle, ancienne maison forte dont la présence est attestée dès le XVIe siècle, maison noble d'origine ancienne, remaniée  dans la seconde moitié du XVIIIe siècle, tant à l'extérieur qu'au niveau du décor intérieur. Elle se compose d'un ensemble de bâtiments disposés autour d'une cour intérieure, le logis étant au sud. La salle à manger conserve un ensemble de peintures sur toiles tendues sur les murs, représentant une pastorale et des scènes mythologiques.   Sa façade sud, caractéristique du XVIIIe siècle français, est percée de deux rangées de fenêtres à arc segmentaire. Les différents corps de logis sont couverts de toits en pavillon aux extrémités légèrement incurvées et pourvus de lucarnes à la capucine. En outre, un ensemble de peintures sur toile représentant des scènes mythologiques est conservé dans ce château, attribué au peintre oloronais, Bernard Montaut (1774-1830).","habitants":"Famille de Supervielle\r\n        \"","divers":"Château de Lasalle 43° 10' 45 nord, 0° 36' 11 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Lassalle_Bidos_1.jpg","../../jctruffet.com/image/image_64/64_Lassalle_Bidos_2.jpg"]},"Consult_chateau_formulaired7a2":{"id":"Consult_chateau_formulaired7a2","dept":"64","canton":"Saint-Palais","commune":"Ostabat-Asme","nom":"Laxague","type":"Château","periode":"XIV","histoire":"LAXAGUE, le château fort de Laxague est édifié au début du XIIIe siècle sur un lieu stratégique, dans le village dOstabat, et lun des plus connus est Pées. Chambellan de Charles III de Navarre, il récupère le château au XIVe siècle.  Les seigneurs de Latsaga sont mentionnés dès 1270, un Laxague accompagnant Saint-Louis à la croisade. Le personnage le plus illustre de cette famille est Pées de Laxague, mort en 1393. Homme de Cour de Charles II et Charles III de navarre, il devient chambellan de ce dernier. Des restes de rempart détruits en 1228 par Sanche le Fort, roi de Navarre sont visibles dans l'angle sud-ouest de la ville.","architecture":"L'édifice de Laxague actuel est le résultat de deux campagnes majeures de construction. Dans un premier temps, une maison forte est édifiée dans le courant du XIIIe siècle. Dans la deuxième moitié du XIVe siècle, sous l'impulsion de Pées de Laxague, la maison forte originelle est englobée dans une enceinte comprenant une tour-porche située à l'est. La maison forte devient alors corps de logis du nouvel édifice. Des fossés, en partie comblés depuis, sont creusés autour de l'enceinte. Plus tard, des échauguettes, ou guérites de guet, permettent daccéder au chemin de ronde, améliorant le système de circulation et de surveillance du château.  Au XVe siècle des transformations et aménagements interviennent, des ouvertures sont percées dans la maison forte notamment, des bâtiments sont construits à l'intérieur de l'enceinte. Latsaga est abandonnée et tombe en ruines au cours du XVIIe siècle. Au XIXe siècle, l'édifice est transformé en exploitation agricole. Des ouvertures à encadrement de bois sont percées, notamment au deuxième niveau de la tour-porche. Actuellement, l'édifice, envahi en partie par la végétation, est en mauvais état, mais est toujours utilisé comme ferme. L'enceinte a perdu son couronnement, l'échauguette et la tour nord sont en partie ruinées.","habitants":"Famille de Pées de Laxague\r\n        \"","divers":"Château de Laxague 43° 15' 10 nord, 1° 04' 58 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Laxague_1.jpg","../../jctruffet.com/image/image_64/64_Laxague_2.jpg","../../jctruffet.com/image/image_64/64_Laxague_3.jpg","../../jctruffet.com/image/image_64/64_Laxague_4.jpg","../../jctruffet.com/image/image_64/64_Laxague_5.jpg"]},"Consult_chateau_formulaireb4db":{"id":"Consult_chateau_formulaireb4db","dept":"64","canton":"Serres-Cantet","commune":"Lembeye","nom":"Lembeye","type":"Bastide","periode":"XI-XIV","histoire":"LEMBEYE, Lembeye fut la capitale politique, commerciale et religieuse du Vic-Bilh. Un consensus s'est dégagé sur l'étymologie du nom, pour en faire un « lieu bien situé qui suscite l'envie ». Mentionnée en 1286 sous le nom latin d'Invidia par Gaston VII, de nombreux dictons jouent sur le mot l'enveja qui signifie « l'envie » en occitan ; Lembeye est la transcription française de la prononciation béarnaise. Il s'agit d'une bastide apparue dès le  XIe siècle, qui était directement sous les ordres du vicomte. Plus tard vint s'adjoindre un abbé laïc qui était le baron de Samsons. Au XVIIe siècle, Lembeye était la 6e ville du Béarn. Ce bourg eut à souffrir à plusieurs reprises de troubles et invasions, mais ce sont les troubles religieux qui vont le plus lui nuire. Cité protestante, Lembeye est ravagée en 1569 ; pillée et brûlée en partie par les troupes de Terride, capitaine de Catherine de Médicis, à la tête de l'armée catholique française, ce qui entraîna la décadence de la cité.","architecture":"Les vestiges d'un ensemble fortifié datant partiellement de la fin du XIIIe siècle et ayant rassemblé un ouvrage d'entrée, un fossé, une église, une maison, une motte et une enceinte, témoignent du passé ancien de la commune. Une porte de ville, datant du XIVe siècle, est recensée par les monuments historiques, tout comme la cloche du début du  XIXe siècle qu'elle recèle.","habitants":"Baron de Samsons\r\n        \"","divers":"Porte de la ville de Lembeye","gps":"","images":["../../jctruffet.com/image/image_64/64_Lembeye_1.jpg"]},"Consult_chateau_formulaireab01-2":{"id":"Consult_chateau_formulaireab01-2","dept":"64","canton":"Serres-Castet","commune":"Coslédaà Lube Boast","nom":"Lendresse","type":"Bastide","periode":"XIII-XVII","histoire":"LENDRESSE, si la seigneurie de Boast est attestée dès le recensement de 1385, le château semble dater de la seconde moitié du XVIIe siècle et construit tout près de léglise romane de Boast. La maison de Labat est anoblie en 1630 sous le nom de Lendresse avec les seigneurs de Boast, Coslédaà, Sévignacq Loubée et Bazie.  Au XVIIIe siècle, la maison est anoblie en faveur de Théophile de Lendresse (1730) dont la famille conserve le château jusquà la Révolution.      BOURGUINAT, siège de la seigneurie et abbaye laïque de Cosledaà. Porté Herran sur la carte de Cassini, le château figure sur le plan cadastral de 1829 avec un jardin à la française au Nord-Est.\r\nEdifice construit à la fin du XVIIIe siècle. Logis en rez-de-chaussée; comble de l'aile droite habitable. Deux cheminées a hotte stuquée décor de pilatres, allégorie de l'espérance premier quart XIXe siècle.  La seigneurie appartenait en 1734 et 1746 à Clément de Batz-Diusse et en 1780 aux Elissalde.","architecture":"LENDRESSE, le château de Lendresse-Boast, construit au XVIIe siècle, est à lorigine la demeure de labbé laïque qui possède également léglise du village, le château semble dater seulement de la seconde moitié du XVIIe siècle. Appelé aussi maison de Labat, ce château est construit tout près de léglise romane de Boast. Cette proximité sexplique par le fait que cette demeure est celle de labbé laïque, propriétaire de lédifice.   Au début du XXe siècle, lédifice est surélevé et largement reconstruit. De son visage dorigine demeure larc à brossage du vestibule et des éléments de baies visibles en façade.  Au château de Boast\", ancienne maison de maître datant du XVIe siècle.   Erigée en baronnie en 1643 en faveur de Théophile de Lendresse, ce dernier est  le constructeur du château dans le 2e quart du XVIIe siècle avec  des arcs à bossages du vestibule, fenêtre du pavillon central, défiguré par des restaurations récentes. Bâtiments autour d'une cour fermée par un portail monumental. Reste dans cette famille jusqu' à la Révolution. Très restauré et surélevé début du XXe siècle.","habitants":"Famille de Clément de Batz-Diusse\r\n        \"","divers":"Château de Lendresse et de Bourguinat","gps":"","images":["../../jctruffet.com/image/image_64/64_Lendresse_1.jpg","../../jctruffet.com/image/image_64/64_Lendresse_2.jpg","../../jctruffet.com/image/image_64/64_Lendresse_3.jpg","../../jctruffet.com/image/image_64/64_Lendresse_4.jpg"]},"Consult_chateau_formulaire9552":{"id":"Consult_chateau_formulaire9552","dept":"64","canton":"Ortthez","commune":"Oraas","nom":"Leu_Oraas","type":"Château","periode":"XIII","histoire":"LEU, situé dans le quartier Peyréde dOraàs, le château du Leü date de la fin du XIIIe siècle. Il sagit dune maison massive dOraàs, construite sur une motte au sommet de la colline. Jusquau XVIe siècle, les seigneurs dOraàs, qui jouissent de nombreux privilèges, portent seulement le titre « du Leü ». Puis, le domaine passe aux mains des familles Doumy, Saint-Cricq, Lons I, Saint-Macary et Lons II.    Ce seigneur a donc le droit de tenir un bateau sur le gave entre Oraàs et Abitain. De plus, il détient sur ses terres une fontaine salée.  En 1725, le château est encore « entouré dun double fossé, grange, écuries, pressoir, basse-cour, jardin », mais on le signale comme étant pratiquement en ruine, à la Révolution.  Par ailleurs, le chroniqueur Froissart rend célèbre un des premiers seigneurs du lieu, Espan du Leü, ami de Gaston Fébus et abbé laïc dOrthez.\r\n Ainsi, on sait quen 1678, Antoine de Lons possède deux moulins. Le plus ancien, dit dArbus, est bâti sur le ruisseau Agnès. Quant au moulin du Leü, il se situe sur la rive gauche du gave, à Abitain.\r\nLe château du Leü abrite aujourdhui une exploitation agricole.","architecture":"Oraàs est une commune étendue, située sur la rive droite du gave dOloron. Elle est divisée en plusieurs quartiers : le bourg près de léglise, Bii, la Saline, les Bordes et Peyréde où se trouve le château du Leü.\r\nLe château du Leü semble sélever sur trois niveaux. Lépaisseur de ses murs varie entre 1,20 mètre et 1,30 mètre. Ils sont percés de nombreuses fenêtres aux dimensions diverses. Ces ouvertures sont disposées sans symétrie et ouvertes à différents niveaux. Sous le toit de tuiles rouge à quatre pans, une double génoise couronne les murs.\r\nDe plus, on découvre des corbeaux, des meurtrières et des archères. Tous ces éléments témoignent du caractère défensif de la bâtisse dorigine.","habitants":"Familles Doumy\r\n        \"","divers":"Château de Leu à Oraas","gps":"","images":["../../jctruffet.com/image/image_64/64_Leu_Oraas_1.jpg"]},"Consult_chateau_formulaire7a11-2":{"id":"Consult_chateau_formulaire7a11-2","dept":"64","canton":"Serres-Castet","commune":"Vialer","nom":"Loo","type":"Château","periode":"XVII","histoire":"LOO, le château  à Vialer, dit aussi de Trinquat, apparaît dans les sources dès 1385 où est mentionné lostau dAramon de Lo. Toutefois, lactuelle demeure, qui a abrité plusieurs générations de seigneurs locaux, date du XVIIe siècle. En 1538, cest Pierre de Lème qui possède ce domaine. Puis, cette famille est ensuite propriétaire du domaine sous le nom de Loo jusquà la fin du XVIIe siècle. Ils sont donc à lorigine de la construction du corps de logis qui remonte à la première moitié du XVIIe siècle et qui a été fréquemment remanié et réaménagé au siècle suivant. Par la suite, ce sont les Soubiron, puis les Deschiens de Laneuville, puis les Dufau et enfin les Germenaud Lassède qui détiennent le château. À la fin du XVIIIe siècle et jusquen 1837, la demeure est la propriété de monsieur de Marignan, puis de la famille de Lostalot-Bachoué.","architecture":"Le château de LOO est situé sur le côté dune cour où se distribuent aussi les communs. La façade nord du XVIIe siècle possède deux tourelles dangle carrées reposant sur double trompe une section de voûte formant saillie et supportant la poussée verticale dun élément de construction en encorbellement. La tourelle du nord-est ne possède toutefois plus que son soubassement. Les trompes appareillées en grès tranchent avec les tourelles de briques rouges au toit pentu à quatre pentes. La façade ouest est aveugle mais décorée douvertures en trompe-lil qui datent du XVIIIe siècle. Enfin, la façade principale à lest a vu ses fenêtres complètement redistribuées à la même époque.   Ce petit château privé a été entièrement remanié, il ne subsiste pas grand chose de l'ancien château de Loo, il conserve une tourelle à encorbellement, des toits typiques du Vic-Bilh et des cheminées sculptées à la mode du XVIe siècle.","habitants":"Famille de Pierre de Lème\r\n        \"","divers":"Château de Loo à Vialer","gps":"","images":["../../jctruffet.com/image/image_64/64_Loo_1.jpg","../../jctruffet.com/image/image_64/64_Loo_2.jpg","../../jctruffet.com/image/image_64/64_Loo_3.jpg","../../jctruffet.com/image/image_64/64_Loo_4.jpg"]},"Consult_chateau_formulaire8cca":{"id":"Consult_chateau_formulaire8cca","dept":"64","canton":"Cambo les Bains","commune":"Macaye","nom":"Macaye","type":"Château","periode":"XVII","histoire":"MACAYE, les seigneurs de Belzunce, famille importante dépendante des rois de Navarre jusquau XVe siècle, puis du roi de France, font édifier une maison noble au lieu-dit Paganduru. château de Macaye, comme plusieurs villages alentours, celui-ci est, durant la Terreur, considéré comme étant une « commune infâme », car trop proche de la frontière espagnole. A la suite de larrêté du 13 ventôse an II (3 mars 1794), une grande partie de la population est déportée dans des « maisons nationales » situées dans les départements voisins. Macaye devient plus tard une vicomté appartenant aux Belzunce dès le XIIe siècle. Le XVe siècle marque la fin de la domination anglaise présente dans le Sud-Ouest depuis le XIIe siècle et le traité notant cette annexion est signé à Macaye.   Le château est abandonné puis acheté en 1640 par Antoine de Castagnoles, gendre dArmand de Belzunce. Il passe ensuite entre les mains de Pierre de Haraneder, fils de commerçants bayonnais.\r\nMacaye est entre autres la patrie de Jean Anchordoqui, dit « Ganich de Macaye », contrebandier particulièrement impliqué dans la première guerre carliste, entre 1833 et 1840.","architecture":"MACAYE,  refait, il présente les particularités de larchitecture noble du XVIIe siècle typique du Pays Basque. Aujourdhui le château est dans un parfait état de conservation et est désormais un lieu daccueil pour les camps de vacances.  dans la province du Labourd et proche de locéan Atlantique, Macaye est une paisible commune au cur dune nature préservée. Au lieu-dit Mendizabale et près du pic de Mokorreta, la présence de plusieurs cromlechs, des monuments mégalithiques, témoigne dune occupation préhistorique du site de Macaye.","habitants":"Seigneur de Macaye\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_64/64_Macaye_1.jpg"]},"Consult_chateau_formulairea389":{"id":"Consult_chateau_formulairea389","dept":"64","canton":"Lagor","commune":"Loubieng","nom":"Maladenx","type":"Chateaux","periode":"XVI-XVIII","histoire":"A Loubieng le chateau de Maladenx et le château de Baylac  chambres d'hôtes de la famille Darrigrand      \r\nMALADENX cette belle demeure existe déjà lors du recensement de 1385, et sappelle alors Lasalle. Compte tenu de sa proximité avec léglise il sagit certainement de labbaye laïque dorigine. La seigneurie de Lasalle passe par héritage dans la famille des Maladenx vers la fin du XVIIIe siècle. La demeure porte ce nom depuis cette date.\r\nLédifice comprend un corps de bâtiment qui est la partie la plus ancienne de la demeure et une tour. Le château des Maladenx abrite également plusieurs bâtiments agricoles.                                                       Le domaine de Tilh vous accueille dans une maison de Maître du XVIIIe siècle,   Aujourd'hui chambres d'hôtes.","architecture":"LOUBIENG, le domaine de Tilh  une maison de Maître du XVIIIe siècle,    aux sommets des coteaux de Loubieng, petit village proche d'Orthez, en pleine campagne  béarnaise. C'est dans une ancienne grange restaurée à l'architecture exceptionnelle,","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Maladenx et de Baylac grav 4 à6","gps":"","images":["../../jctruffet.com/image/image_64/64_Maladenx_1.jpg","../../jctruffet.com/image/image_64/64_Maladenx_2.jpg","../../jctruffet.com/image/image_64/64_Maladenx_3.jpg","../../jctruffet.com/image/image_64/64_Maladenx_4.jpg","../../jctruffet.com/image/image_64/64_Maladenx_5.jpg","../../jctruffet.com/image/image_64/64_Maladenx_6.jpg"]},"Consult_chateau_formulaireb1b8":{"id":"Consult_chateau_formulaireb1b8","dept":"64","canton":"Serres-Castet","commune":"Mascaraàs Haron","nom":"Mascaraas","type":"Château","periode":"XII-XIII-XVI","histoire":"MASCARAAS, a des origines qui remontent au haut Moyen Âge. Il fut transformé par la suite aux XVIe et XVIIe siècles, le château est le siège dune abbaye laïque, d'Ainaut Guilhemet  cest-à-dire que le seigneur qui y vit possède également léglise paroissiale dont il reçoit la dîme. Au XVIe siècle, ce site aurait été un relais de chasse de Jeanne dAlbret, reine de Navarre et mère dHenri IV.  Agrandi au XVIIe siècle par les seigneurs de Batz-Diusse,  au XVIIIe siècle agrandissement  et remaniements du corps de logis, au milieu du XIXe siècle le château passe  à la famille Pazat et en 1989 le peintre Eric de Derluyn rachète le domaine y habite toujours. Des lambris de revêtement en bois peint (scènes mythologiques) et taillé, ainsi que neuf cheminées  sont inscrites à l'inventaire général du patrimoine culturel.","architecture":"Le château de Mascaraàs est situé dans le nord-est du Béarn sur une colline fortifiée e village de Mascaraàs-Haron possède un château dont lorigine remonte à une motte défensive du début du Moyen Âge.   Le bâtiment actuel date de cette période   Il est alors construit sur les vestiges de labbaye laïque. Agrandi au XVIIe siècle par ses propriétaires,   ceux-ci le remanient à nouveau au XVIIIe siècle. Du château médiéval, il reste peut-être la porte chanfreinée (décorée de demi-biseaux que lon forme en abattant larête dune pierre) et des pierres sculptées en remploi. Les deux façades au sud du côté de l'arrivée, le château est précédé par une terrasse fermée par un mur de Cloture interreromput par un portail au centre encadré de deux piliers ornées de volutes. Un long corps de logis rectangulaire à un étage  toiture en tuiles à double pans, flanqué à ses extrémités d'un pavillon en saillie coiffée d'un haut toit à quatre pentes avec des lucarnes.  A conservé un tel ensemble d'intérieurs d'époque, du XVIIIe siècle : nombreuses cheminées en marbre d'Arudy, décors à l'italienne peints sur les boiseries en châtaignier, salon mythologique dont les boiseries sont recouvertes d'une suite de tableaux illustrant le thème de l'amour, meubles basques et béarnais, sculptures gothiques, bibliothèque exposant des reliures anciennes, des éditions rares et des gravures incunables.","habitants":"Reine de Navarre Jeanne dAlbret\r\n        \"","divers":"Château de mascaraàs  43° 32' 35 nord, 0° 13' 35 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Mascaraas_1.jpg","../../jctruffet.com/image/image_64/64_Mascaraas_2.jpg","../../jctruffet.com/image/image_64/64_Mascaraas_3.jpg"]},"Consult_chateau_formulaire2427":{"id":"Consult_chateau_formulaire2427","dept":"64","canton":"Mourenx","commune":"Maslacp","nom":"Maslacp","type":"Château","periode":"XVI-XVIII","histoire":"MASCLACP, est lancienne demeure de la famille dAbbadie dArboucave. Il sagit autrefois dune abbaye laïque, mentionnée au XVIe siècle fut, avant la Révolution française, la résidence des abbés laïques de cette agglomération villageoise. Parmi les titulaires qui se sont succédés au Moyen-Age, la famille d'Abbadie d'Arboucave a laissé un souvenir particulier : Elle a assumé cette fonction par filiation pendant près de 3 siècles.  Puis le château fut occupé par la famille de Barbotan jusqu'au début du XXe siècle. Durant le second conflit mondial, l'école des Roches s'y replia.","architecture":"Le château de MASLACQ Le bâtiment actuel est rebâti au milieu du XVIIIe siècle. De forme classique. Il est construit en moellon de couleur claire. Cet appareil est laissé apparent sur la façade, mais se trouve crépi sur les autres côtés. Le château actuel est la reconstruction, en 1774, de la résidence d'origine. \r\n Il comporte deux étages et se compose dun corps de logis principal flanqué de deux ailes.   Le centre de la façade principale du château, qui souvre au nord, est orné dun fronton triangulaire, portant le blason de la famille. Quant à la porte dentrée, elle est précédée dune large terrasse à laquelle on accède par un escalier à double volée. Enfin, la toiture pentue et en tuiles plates arrondies est percée de lucarnes. En face du château de Maslacq, de lautre côté de la route, se trouve un important pigeonnier circulaire, coiffé dun dôme et couvert de tuiles plates. Sa porte est datée de 1732.","habitants":"Famille dAbbadie dArboucave\r\n        \r\n        \"","divers":"Château de Masclap 43° 26' 18 nord, 0° 41' 36 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Maslacp_1.jpg","../../jctruffet.com/image/image_64/64_Maslacp_2.jpg","../../jctruffet.com/image/image_64/64_Maslacp_3.jpg","../../jctruffet.com/image/image_64/64_Maslacp_4.jpg"]},"Consult_chateau_formulaire4d03":{"id":"Consult_chateau_formulaire4d03","dept":"64","canton":"Oloron Ste-Marie","commune":"St-Goin","nom":"Mesplès","type":"Château","periode":"XVIII","histoire":"MESPLES le château construit de 1710 à 1715 par Jean Anchot de Mesplès Marquis de Mesplès qui possède les seigneuries d'Esquiule, Berbielle, Ilhasse, Saint Goin et autres lieux sur les bases de l'ancienne maison Noble Anhanh dont il reste encore de nombreux vestiges visibles\".  En 1732, la seigneurie de Saint-Goin sera adjointe à la baronnie de Mesplès pour être érigée en Marquisat par Louis XV. Il est l'un des rares témoignages de l'architecture aristocratique du début du XVIIIe siècle en Béarn et il se caractérise par une belle façade ordonnancée sous un toit d'ardoises à lucarnes. Demeure attachée aux plaisirs de l'aristocratie, le château s'ouvre directement sur un parc clos de murs. Acheté par Emmanuel Lagarde à la marquise de Verthamon, fille unique du Marquis de Jean César de Mesplès en 1822, il sera exploité en hôtel de luxe à destination d'anglais ou d'américains fortunés, attirés par la pêche au saumon dans le gave d'Oloron à compter des années 1890 jusqu'en 1935 environ. Après la seconde guerre mondiale, il sert à accueillir des enfants espagnols orphelins de parents persécutés par le régime franquiste avec l'aide de l'Unitarian Service Committee, association américaine pilotée en France par Miss Persis Miller. Aujourd'hui propriété de monsieur Frédéric Bertails.","architecture":"MESPLES,  Il est remarquable par son architecture classique du début XVIIIe siècle . Il est construit entre 1710 et 1715 et composé d'un grand corps de logis (34x15m), coiffé dune toiture massive dardoises avec coyaux, développe deux grandes façades au Nord-Est et au Sud-Ouest au rythme rigoureux de 9 et 7 travées sur deux niveaux. La largeur du corps de logis au Nord-Ouest était occupée par une façade ouverte à trois travées. La largeur Sud-Est à une seule travée sur un petit avant corps, ouvre sur la cour des communs. Cet édifice se caractérise notamment par une belle façade ordonnancée sous un toit dardoises à lucarnes. Vers les années 1920, il est transformé en hôtel restaurant avec tennis et golf.  Aujourdhui,  le château des Marquis de Mesplès reprend vit avec une restauration d'ampleur pour lui redonner sa splendeur du XVIIIe siècle.","habitants":"Marquis de Jean César de Mesplès\r\n        \r\n        \r\n        \"","divers":"Château de Mesplés à Saint-Goin","gps":"","images":["../../jctruffet.com/image/image_64/64_Mespl%c3%a8s_1.jpg","../../jctruffet.com/image/image_64/64_Mespl%c3%a8s_2.jpg"]},"Consult_chateau_formulairef9a2-2":{"id":"Consult_chateau_formulairef9a2-2","dept":"64","canton":"Pontacq","commune":"Pontacq","nom":"Meyracq","type":"Château","periode":"XVI","histoire":"MEYRACQ, en 1600  Joseph de Montesquiou, seigneur de Sainte Colome vend à Antoine de Monaix l'abbaye laîque de Meyrac . En 1610, Nicolas de Monaix, héritier est le premier à être qualifié d'Abbat et domenger de Meyrac et Sevignac. Il épouse Gabrièle d'Espalungue de Louvie. En 1671, Pascal de Cassou, gendre de Nicolas est admis aux Etats de Béarn. Il est marié à Jeanne de Monaix, demoiselle de Meyrac.  En 1695, Samson de Cassou de Pontacq est reçu aux Etats de Béarn en qualité d'abbé laîque. Les investigations conduisent au Pontacquais Pascal Ducasse, reçu en 1671 aux États de Béarn comme seigneur de Meyracq, un titre dont hérita son fils Sanson, maire de Pontacq en 1703. Celui-ci passera aux mains de plusieurs familles dont les Beaumont,  en 1880, il est occupé par Palmer Whalley, rentier et esquire, seigneur d'Ecton en Angleterre qui venait lors de cures dans les stations des Pyrénées. En 1890 et 1891, la reine Nathalie de Serbie et sa soeur la princesse Ghika y séjournent deux fois. Les familles Filleul de Brohy et de Briey les accompagnent en 1892 de Henri Megret de Serilly baron d'Etigny et de Teil, comte de Chapeleine demeurant au château Colombie de Baliros. Devient la propriété en 1845 de Henri Lavignolle, procureur du Roy à Oloron demeurant à Bescat,  en 1920 Mme Vve Herman Lavignolle Edmée Caroline Marie demeurant à Paris vend à M.et Mme Lembeye, meuniers chez Lardit   derniers propriétaires en date avant qu'Huguette et Bernard Veyssière ne s'en portent acquéreurs en 1984.    Il est inscrit aux M.H. depuis 2006. Le château de Meyracq est devenu un hôtel 4 étoiles.","architecture":"Meyracq était autrefois un vaste domaine de plus de 58 hectares, s'étendant jusqu'à Barzun. L'édifice et ses dépendances s'organisent autour d'une cour carrée. La demeure, du XVIe siècle (tour d'escalier polygonale), a été remodelée aux XVIIIe et XIXe siècles. Elle est prolongée au nord par un jardin clos, sans doute l'ancien potager. A l'est du bief s'étendent le potager actuel, clos de murs, ainsi dque le parc créé vers le milieu du XIXe siècle.\r\nEléments protégés MH: le logis, les dépendances, les deux jardins, le parc, les murs de clôture et l'ancien bief: inscription par arrêté du 27 février 2006.  On suppose que le manoir communément appelé \"château\" par la population locale.","habitants":"Huguette et Bernard Veyssière\r\n        \"","divers":"Château de Meyracq 43° 11' 57 nord, 0° 06' 35 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Meyracq_1.jpg","../../jctruffet.com/image/image_64/64_Meyracq_2.jpg","../../jctruffet.com/image/image_64/64_Meyracq_3.jpg","../../jctruffet.com/image/image_64/64_Meyracq_4.jpg","../../jctruffet.com/image/image_64/64_Meyracq_5.jpg"]},"Consult_chateau_formulaireeb87":{"id":"Consult_chateau_formulaireeb87","dept":"64","canton":"Morlaàs","commune":"Pontiacq Villepinte","nom":"Minvielle","type":"Château","periode":"XVIII","histoire":"MINVIELLE  sur les ordres de Marie-Louise dArtiguelouve en 1676. Le château de Minvielle, que lon voit aujourdhui, est construit au XVIIIe siècle mais le site sur lequel il est implanté rappelle le passé médiéval de la commune. Ce château est en effet édifié sur une ancienne motte entourée de larges fossés. Lexistence de la seigneurie de Pontiacq est attestée dès le XIVe siècle. Cependant, son occupation remonte à une époque bien plus lointaine comme le laisse supposer la découverte de deux tumuli au lieu-dit Les Puyolets.  Au début du XVIIIe siècle, la seigneurie appartient à Jacques de Puyoo. Ce bachelier en théologie est resté dans les mémoires pour son ouvrage Le rêve de labbé Puyoo. \r\nLes Pontiacquais sont affublés au XIXe siècle du sobriquet de ahumats , qui signifie « enfumés » en gascon. Ce surnom fait référence à leur principale activité, la fabrication de charbon de bois. Dautre part, le ruisseau qui traverse Pontiacq se nomme Carbouère, qui veut dire charbonnière. Le château, désormais inscrit à lInventaire des M.H, appartient à un propriétaire privé. Pas d'autre information.","architecture":"MINVIELLE, le château de Minvielle, situé sur le territoire de Pontiacq, date du XVIIIe siècle. Il est construit sur les vestiges dun ancien château fort, ce qui témoigne du passé médiéval de la commune.  Lactuelle demeure est donc édifiée sur une ancienne motte rasée, là où se trouvait certainement le donjon. De cette première construction demeurent aujourdhui les fossés qui entourent le château Minvielle.  Le corps de logis, couvert dun toit en ardoise, est composé dun étage carré et dun étage en surcroît. Il souvre à louest sur une cour, au fond de laquelle on peut apercevoir une tour carrée. Au XIXe siècle, le château subit dimportants travaux daménagement afin den améliorer le confort.                                                        À Viellepinte, la ferme dite maison Gachie fut construite en 1809. La ferme Clos  est quant à elle un édifice du XVIe siècle remanié au XVIIIe siècle.","habitants":"Marie-Louise dArtiguelouve \r\n        \"","divers":"Château de Minvieille à Pontiacq Villepinte","gps":"","images":["../../jctruffet.com/image/image_64/64_Minvielle_1.jpg"]},"Consult_chateau_formulaireaa3a":{"id":"Consult_chateau_formulaireaa3a","dept":"64","canton":"Artix","commune":"Momas","nom":"Momas","type":"Château","periode":"XIV-XVI","histoire":"MOMAS, en 1344, le seigneur prête dailleurs hommage à Aliénor de Comminges qui nest autre que la mère du futur vicomte de Béarn Gaston Fébus.  Jusquà la Révolution, la seigneurie demeure la propriété du marquis de Jasses. Puis, le château est vendu comme bien national, et acquis par le docteur Jacques Terrier, un révolutionnaire qui entreprend de nombreux travaux de rénovation, dont laménagement de lintérieur avec un revêtement en bois récupéré dans léglise du village. La date de 1807, inscrite sur une plaque qui se trouve au-dessus de lentrée du sud, symbolise la fin de la restauration de lédifice.  Le château de Momas a été inscrit à linventaire des M.H en 1989.  Lancienne demeure des seigneurs de Momas retrouve ses charmes perdus grâce à Mme Teillard, propriétaire du château, qui conserve dans ses jardins des milliers de plantes à fleurs et de légumes rares dhier et daujourdhui.","architecture":"château à Momas dès le XIVe siècle  se présente sous la forme dun vaste édifice rectangulaire à un étage surmonté dun toit en tuiles picon. Il conserve du XVIe siècle une tour carrée descalier en saillie, dun étage plus haut que le reste du château, située à lextrémité nord-ouest, le bâtiment dhabitation des seigneurs de lépoque est détruit sans quon sache précisément dans quelles circonstances. On peut toutefois supposer quun incendie ravage lédifice. Elle présente aux visiteurs des jardins restaurés d'inspiration médiévale. Par conséquent, ce nest quau XVIe siècle, sur les ruines de cette construction initiale, quest édifié le château actuel. On raconte que le roi Henri IV se serait arrêté dans ce château, de même que Louis XIII lorsquil vient à Pau en 1620.","habitants":"Famille de madame Teillard\r\n        \"","divers":"Château de Momas  43° 26' 57 nord, 0° 26' 40 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Momas_1.jpg","../../jctruffet.com/image/image_64/64_Momas_2.jpg","../../jctruffet.com/image/image_64/64_Momas_3.jpg"]},"Consult_chateau_formulaire51c4-2":{"id":"Consult_chateau_formulaire51c4-2","dept":"64","canton":"Serres-Castet","commune":"Moncaup","nom":"Moncaup","type":"Château","periode":"XVII","histoire":"MONCAUP, dit de FLORIS est une entreprise familiale  depuis 4 générations. Le vignoble est planté sur 10 hectares. , exploitation agricole à responsabilité limitée est en activité depuis 21 ans,  elle est spécialisée dans le secteur d'activité de la culture de la vigne.","architecture":"Moncaup présente un ensemble de demeures et de fermes  dont la construction s'étale du XVIIe au XIXe siècles, ainsi qu'une fontaine-lavoir du XIXe siècle. Les  bâtisses sont  de plan rectangulaire  à deux étages toit en croupes recouvert de tuiles.   Les vestiges d'un ancien ensemble fortifié du XIe siècle témoignent du passé ancien de la commune.","habitants":"Famille Floris\r\n        \"","divers":"Château de Moncaup","gps":"","images":["../../jctruffet.com/image/image_64/64_Moncaup_1.jpg","../../jctruffet.com/image/image_64/64_Moncaup_2.jpg","../../jctruffet.com/image/image_64/64_Moncaup_3.jpg"]},"Consult_chateau_formulairea51a":{"id":"Consult_chateau_formulairea51a","dept":"64","canton":"Serres-Castet","commune":"Moncla","nom":"Moncla","type":"Château","periode":"XVII","histoire":"MONCLA, le château de Moncla est le siège dune seigneurie qui dépend directement du vicomte du Béarn, ce qui démontre son importance malgré la modestie du village. La seigneurie de Moncla appartient dabord aux Saintes-Colome, puis passe ensuite aux de Forgues, puis, par alliance, à Galactoire de Marca, fils du célèbre historien béarnais. Celui-ci revend la seigneurie à David de Benquet en 1653. Ce dernier construit lactuel château qui reste dans la famille jusquà la Révolution. Du château, dépendent un jardin, une écurie, une remise, une grange, une étable à vaches, un poulailler, une porcherie et plusieurs puits.","architecture":"MONCLA, il est agrandi et très remanié dans la première moitié du XIXe siècle. Le bâtiment en lui-même présente deux étages, dont lun est carré et lautre en surcroît. Le gros uvre est réalisé à partir de grès, galets, moellons, appareil mixte, enduit partiel et tuiles plates et creuses. L'inventaire général du patrimoine culturel a enregistré un castelnau, composé d'une enceinte, d'une motte, d'un fossé et d'une basse-cour, datant des XIVe et, semble-t-il du XVe siècles. \r\nMoncla présente un ensemble de maisons et de fermes datant des XVIIIe et XIXe siècles.","habitants":"Famille de  David de Benquet\r\n        \"","divers":"Château de Moncla","gps":"","images":["../../jctruffet.com/image/image_64/64_Moncla_1.jpg","../../jctruffet.com/image/image_64/64_Moncla_2.jpg","../../jctruffet.com/image/image_64/64_Moncla_3.jpg"]},"Consult_chateau_formulaire8177":{"id":"Consult_chateau_formulaire8177","dept":"64","canton":"Mourenx","commune":"Monein","nom":"Monein","type":"Château","periode":"XIV-XVI","histoire":"deux châteaux à Monein celui de Lamothe, de Forcade  et à 12 km au sud-Est dans la commune de Lacommande la maison forte de Luc.                                                       Pas d'information historique pour ces deux deux châteaux qui sont des châteaux viticoles.","architecture":"Lamothe, de plan rectangulaire  à deux niveaux flanqué de deux tourelles rondes toit en poivrières, accolée à l'opposée d'une tour carrée, l'édifice  possédez un pavillon en deux  retour d'équerre de même niveaux un toit brisés recouvert d'ardoises. accolée d'une tour carrée. Les terres formaient alors une vaste propriété agricole, la vigne et le vin occupant déjà une activité importante du domaine.                                                                         Forcade de plan rectangulaire à deux niveaux et attiques, flanqué en façades de deux tours rondes toit en poivrières.","habitants":"Famille de Philippe et Brigitte Arraou\r\n        \"","divers":"A Monein le château de Lamothe grav 1 2 3 de Forcade grav 4.","gps":"","images":["../../jctruffet.com/image/image_64/64_Monein_1.jpg","../../jctruffet.com/image/image_64/64_Monein_2.jpg","../../jctruffet.com/image/image_64/64_Monein_3.jpg","../../jctruffet.com/image/image_64/64_Monein_4.jpg"]},"Consult_chateau_formulaire1e05":{"id":"Consult_chateau_formulaire1e05","dept":"64","canton":"Mourenx","commune":"Charre","nom":"Mongaston","type":"Château-fort","periode":"XIII-XVIII","histoire":"MONGASTON, édifié par Gaston VII de Béarn  au XIIIe siècle quelques seigneurs de Mongaston sont attestés au XIVe et au XVIe siècle. En 1658 le château est acquis par Jean du Peyré, neveu du capitaine des mousquetaires de Tréville. En 1692 il passe par mariage à Pierre de Casamayor de Gestas, et en 1847 au fameux Xavier de Bachoué de Barraute. Puis le bien de famille fut abandonné aux outrages des ans, vendu, et finalement ravagé en 1929 par un incendie, qui trouva dans la toiture de bardeaux un aliment de choix.   Ce n'était plus alors qu'une ruine, et on aurait fortement surpris les visiteurs de l'époque en leur disant que ces quelques murs broussailleux et branlants pourraient revivre. Pourtant, le miracle s'est produit : avec le concours d'équipes bénévoles, sa propriétaire actuelle Mme Garnier-Collot, de surcroît descendant des anciens châtelains, l'a courageusement sauvé, restauré, et en assure l'animation estivale. On verra à l'intérieur une collection de poupées évoquant l'histoire du Béarn, quelques meubles curieux et une collection de documents familiaux, du  XVIIe au  XIXe siècle.","architecture":"MONGASTON, édifié  au XIIIe siècle garde ses murs primitifs remanié au XIVe siècle et au XVIe siècle, isolé, perché sur une colline comme un petit nid d'aigle, dressé face à la rive souletine du Saison, dont il commande un gué.  S'il eut des seigneurs particuliers, ceux-ci le fortifièrent pour le service du souverain. Bien qu'il ait été fortement remanié au XVIIIe siècle,  cette maison forte étroite et élancée, haute de deux étages, avec quatre fenêtres à meneaux et un toit pointu, pourrait en effet avoir tout simplement été aménagée dans le donjon primitif, qui daterait de Gaston VII. Ainsi s'explique mieux l'échauguette qui se trouvait à l'angle nord, entre les deuxième et troisième niveaux, et dont subsistent la base, et un trou béant. La belle tour polygonale, qu'on dit du XIVe siècle, a en tout cas été si visiblement rattachée au reste du gros uvre, que la vétusté menace aujourd'hui de l'en détacher.  À l'extérieur, on a mis au jour un four, un puits, et le fameux « souterrain », qui, si souvent mythique dans les vieux châteaux, existe bel et bien ici : on marche sur le sommet de sa voûte.","habitants":"Famille de Mme Garnier-Collot\r\n        \"","divers":"Château de Montgaston  43° 18' 28 nord, 0° 51' 46 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Mongaston_1.jpg","../../jctruffet.com/image/image_64/64_Mongaston_2.jpg"]},"Consult_chateau_formulaire9972":{"id":"Consult_chateau_formulaire9972","dept":"64","canton":"Artix","commune":"Mont","nom":"Mont_64","type":"Château","periode":"XIX","histoire":"Deux châteaux à Mont celui de Lestapie et celui de Lesparda.                                                                 LESPARDA  La famille de Lesparda est mentionnée en Béarn au début du XVIIIe siècle.                          LESTAPIE, le château de Mont a été construit au XIXe siècle par la famille de Lestapis  implanté sur 14 hectares a longtemps appartenu à Elf-Aquitaine.   Il a connu des moments forts en accueillant de Gaulle, Khrouchtchev ou de nombreux chefs détats africains qui venaient, avec leur famille, passer quelques jours en France pendant que des négociations sengageaient avec notamment le président Loïck Le Floch Prigent pour les recherches pétrolières et gazières en Afrique. Le château de Mont avait été vendu à un couple dEcossais. Puis quelque temps plus tard, la demeure a été revendue aux enchères  à la Communauté de communes de Lacq-Orthez.  Après sa vente par Elf, il avait subi de grandes dégradations. Il nous avait donc semblé indispensable de préserver un lieu remarquable, à la fois de lhistoire locale et du patrimoine architectural béarnais.","architecture":"LESPARDA, la commune de Mont, composée de plusieurs villages anciens, comporte plusieurs châteaux et maisons nobles, parmi lesquels le château de Lesparda. Celui-ci est situé en position isolée, au sud du hameau de Gouze, ancienne paroisse indépendante rattachée à la commune de Mont.  Il se compose de deux ailes principales en retour déquerre, dont les façades irrégulièrement ordonnancées présentent deux ou trois niveaux délévation.\r\nLes baies, de tailles et de forme variées, sont rectangulaires ou cintrées en segment. La porte, à chaine harpée, parait dater du XVIIe siècle. Les combles sont éclairés par des petites lucarnes en bois. Le château de LESTAPIE, symbole de lhistoire du Bassin de Lacq, a été touché en mai 2017  par un important incendie. Une enquête a été ouverte. Situé sur la commune de Mont.  Le château, fermé, nétait plus habité. Aucune victime ne serait à déplorer. Les pompiers, qui navaient pu pénétrer à lintérieur, devaient lancer une opération de reconnaissance des lieux, afin décarter la présence éventuelle de squatteurs.","habitants":"Famille de Lestapis   \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Lesparda grav de 1 à 4 et de Lestapie de 5 à 8 à Mont","gps":"","images":["../../jctruffet.com/image/image_64/64_Mont_1.jpg","../../jctruffet.com/image/image_64/64_Mont_2.jpg","../../jctruffet.com/image/image_64/64_Mont_3.jpg","../../jctruffet.com/image/image_64/64_Mont_4.jpg","../../jctruffet.com/image/image_64/64_Mont_5.jpg","../../jctruffet.com/image/image_64/64_Mont_6.jpg","../../jctruffet.com/image/image_64/64_Mont_7.jpg","../../jctruffet.com/image/image_64/64_Mont_8.jpg"]},"Consult_chateau_formulaire5e6a":{"id":"Consult_chateau_formulaire5e6a","dept":"64","canton":"Morlaàs","commune":"Pontiacq-Viellepinte","nom":"Montaner","type":"Forteresse","periode":"XIV","histoire":"MONTANER,  est l'un des plus beaux vestiges de l'architecture militaire de la région. Cette oeuvre de briques est l'oeuvre d'un flamboyant Prince des Pyrénées : Gaston Fébus. Montaner offrait à Fébus de défendre son état souverain face à la Gascogne anglaise, grâce à ce poste stratégique important. De ses hauteurs il fera construire sa plus imposante forteresse, dotée dun donjon haut de 42 mètres. La réalisation fut confiée à Sicard de Lordat, Les travaux furent achevés en 5 ans. Pour signer sa construction, Fébus fit poser, une pierre héraldique frappée aux armes de Foix-Béarn, surmontée de la formule « Febus me fe » (Fébus me fit) au dessus de la porte dentrée. Ce n'est qu'en 1569 que le chateau de Montaner sera assiégé et passera sous le contrôle des Huguenots jusquen 1621,   incendié par les troupes du duc d'Epernon. En 1642, Henri Montesquiou dArtagnan, dernier capitaine du château de Montaner, fera transformer le donjon en prison. Cest finalement un entrepreneur en démolition qui va acheter, illégalement, le château de Montaner, en 1803, pour le transformer en carrière de matériaux. Face aux dégâts, les Montanérais se révoltèrent. Dimportants travaux débutèrent dès 1970, grâce au dévouement des \"bénévoles\" de lassociation Pierres et Vestiges.","architecture":"Cette imposante forteresse de brique rouge fut construite entre 1375 et 1380 par Sicard de Lordat à la demande de Gaston Fébus comte de Foix et vicomte de Béarn pour fortifier les frontières du  Béarn et se protéger de la Bigorre et de l'Armagnac. Conquis par les huguenots en 1569, le château resta entre leurs  mains jusqu'en 1621Le donjon est classé en 1840, et en 1854 le département des Basses Pyrénées (devenu Pyrénées-Atlantiques) achète ce qu'il reste du château et le sauve de la ruine. Du haut de cette tour, on partage le rêve de Gaston Fébus,  flamboyant prince du Béarn, d'instaurer un grand état pyrénéen.  Au nord à un dizaine de kilomètre à Labatut un château dit château de Navailles, date partiellement du XVIe siècle. Il est antérieur au château de Barbanègre, au lieu-dit du même nom, du XVIIe et XVIIIe siècles.","habitants":"Famille de Sicard de Lardat\r\n        \r\n        \"","divers":"La forteresse de Montaner 43° 20' 57 nord, 0° 00' 45 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Montaner_1.jpg","../../jctruffet.com/image/image_64/64_Montaner_2.jpg","../../jctruffet.com/image/image_64/64_Montaner_3.jpg","../../jctruffet.com/image/image_64/64_Montaner_4.jpg","../../jctruffet.com/image/image_64/64_Montaner_5.jpg"]},"Consult_chateau_formulaire431b":{"id":"Consult_chateau_formulaire431b","dept":"64","canton":"Morlaàs","commune":"Morlaàs","nom":"Morlaas","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Morlaàs celui de Sarrabat du XIX siècle et celui de Baratnau de 1540.                      BARATNAU, au lieu-dit Grange de Baratnau fut édifié, quant à lui, vers 1540.   Morlaàs battait monnaie au château de la Hourquie  ou la Fourquie, dont la localisation exacte nous est aujourd'hui inconnue depuis le IXe siècle ; le sol morlan eut cours dans tout le Midi de la France pendant tout le Moyen-Âge. En 1690, l'atelier monétaire fut transféré à Pau. Les poids et mesures de Morlaàs servaient d'étalons dans tout le Béarn et jusqu'à Soule et Basse-Navarre.\r\nSARABAT, Château construit vers 1880-1890 par l'architecte Gustave Coustal pour la famille de Paule, au lieu-dit du même nom, fut construit à la fin du XIXe siècle. Jean-Anne-Henri Depaule, né en 1811 à Morlaàs et décédé en 1883, fut chef de clinique à Paris, chirurgien à lhôpital des enfants assistés, professeur de clinique obstétricale à la faculté, et aussi conseiller général du canton de Morlaàs. Il mourut dans sa propriété, au château de Sarrabat, anobli par Napoléon III, d'où le « de » de Depaul. Son buste de bronze fut fondu par les Allemands ; sa reconstitution est maintenant installée près de l'église.","architecture":"SARRABAT,  château construit vers 1880-1890, la seigneurie de Morlàas, capitale du Béarn au Moyen Âge, a connu un formidable essor pendant plusieurs siècles comme en attestent les nombreux vestiges architecturaux encore présents. Une maison de Sarrabaig est signalée en 1676.  L'édifice se compose de deux étages carrés et d'un étage en surcroît, le gros oeuvre en calcaire, brique, moellon et enduit partiel, élévation ordonnancée surmontée de toit en pavillon, pignon découvert, croupe, recouverts d'ardoise.                                                                         A Morlaas la demeure de Jeanne d'Albret.","habitants":"Famille de Jean-Anne-Henri Depaul\r\n        \"","divers":"Château de Sarabat Morlaas et la maison de Jeanne grav 3","gps":"","images":["../../jctruffet.com/image/image_64/64_Morlaas_1.jpg","../../jctruffet.com/image/image_64/64_Morlaas_2.jpg","../../jctruffet.com/image/image_64/64_Morlaas_3.jpg"]},"Consult_chateau_formulaire2f43":{"id":"Consult_chateau_formulaire2f43","dept":"64","canton":"Artix","commune":"Morlanne","nom":"Morlanne","type":"Forteresse","periode":"XIV-XVI","histoire":"MORLANNE, c'est en 1373, que le demi-frère naturel de Gaston Fébus, comte de Foix, Arnaud de Guilhem fit construire le château de Morlanne. Modernisé au XVIe siècle, restauré il y a que
