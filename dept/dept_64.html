lques années.  Dressé sur une butte entourée de douves, le château de Morlanne offre l'un des plus beaux exemples de forteresse du XIVe siècle en Béarn,  Il fut élevé à la demande de Gaston Fébus pour son frère naturel   Arnaud-Guilhem. En 1947  l'historien Raymond Ritter et son épouse Hélène rachètent le château en ruine, et à partir de 1969 investissent toute leur fortune dans une restauration remarquable. Le château paraît avoir traversé, intact, les six siècles de son histoire.  En 1971, Raymond et Hélène Ritter lèguent le château et l'ensemble  de ses riches collections de meubles, objets d'art et tableaux de maîtres au département des Pyrénées-Atlantiques.","architecture":"MORLANNE, imposante forteresse de brique, formée d'une enceinte polygonale autour d'un logis seigneurial de la fin du XVIe siècle. À l'origine un puissant bâtiment de 1373, avec portes, cour, douves et haut donjon, il présente aux visiteurs une importante collection de meubles, peintures dont un dessin de Maurice Quentin de La Tour et un de Jean Honoré Fragonard, tapisseries et de sculptures. Marqué par les multiples remaniements de ses propriétaires, le château de Morlanne a traversé les siècles en devenant un lieu de vie accueillant.  En 1970, les derniers travaux de restauration initiés par Hélène et Raymond Ritter permettent le sauvetage et la renaissance de la forteresse. Ayant voué leur vie à sa restauration, le couple Ritter légua ses murs ainsi que toute sa collection dobjets dart au département des Pyrénées-Atlantiques. Protégés au titre des M.H, le château, a été entièrement rénové entre 2012 et 2015 par le conseil départemental, actuel propriétaire.","habitants":"Famille d'Arnaud-Guilhem\r\n        \r\n        \"","divers":"La forteresse de Morlanne 43° 30' 36 nord, 0° 32' 08 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Morlanne_1.jpg","../../jctruffet.com/image/image_64/64_Morlanne_2.jpg","../../jctruffet.com/image/image_64/64_Morlanne_3.jpg","../../jctruffet.com/image/image_64/64_Morlanne_4.jpg","../../jctruffet.com/image/image_64/64_Morlanne_5.jpg"]},"Consult_chateau_formulaire970b":{"id":"Consult_chateau_formulaire970b","dept":"64","canton":"Mouguerre","commune":"Mouguerre","nom":"Mouguerre","type":"Château","periode":"XVI-XVIII","histoire":"MOUGUERRE, le château  se situe à la sortie du village, au lieu-dit Aguerria. La demeure est mentionnée dès le XVIe siècle sous le nom de Salle de Saint-Jean de Bieutz. En 1505, elle appartient à Petry Daguerre. Après 1835, le domaine est la propriété des Darréguy, héritiers dun riche négociant anobli et marié en 1775 à la dernière représentante de la famille Daguerre. Après 1835, les bénédictins du monastère de Belloc acquièrent le domaine et y installent un orphelinat et une école dagriculture, sous le nom de Ferme Saint-Isidore. Le château accueille depuis 2007 la mairie de Mouguerre.","architecture":"MOUGUERRE  le château est recontruit entre 1756 et 1758 présente un étroit corps de logis enserré entre trois pavillons dangle en forte saillie, coiffés de toitures de tuiles plates. Les chaînages dangle sont très marqués. Les deux niveaux sont de même hauteur. Il reste du décor intérieur une rampe de fer forgé dun escalier du XVIIIe siècle.","habitants":"Famille Daguerre\r\n        \"","divers":"Château de Mouguerre","gps":"","images":["../../jctruffet.com/image/image_64/64_Mouguerre_1.jpg","../../jctruffet.com/image/image_64/64_Mouguerre_2.jpg"]},"Consult_chateau_formulaire27c2":{"id":"Consult_chateau_formulaire27c2","dept":"64","canton":"Artix","commune":"Méracq","nom":"Méracq","type":"Manoir","periode":"XVII","histoire":"MERACQ  le manoir, hôtel de voyageurs, dit château, au lieu-dit Marioulet, date de 1604.    Méracq avait une étude de notaire royal, tenue aux XVIIe et XVIIIe siècles par la famille Dubern. Sous Louis XV, l'un de ces notaires Dubern était aussi juge de la baronnie de Roquefort-de-Tursan, transformé en hôtel restaurant.","architecture":"Manoir  de Méracq, corps de logis rectangulaire à trois niveaux sous un toit en ardoise à deux pans entre deux tourelles carrées à toit  à quatre pans pointus.","habitants":"Famille Dubern\r\n        \"","divers":"manoir  de Méracq","gps":"","images":["../../jctruffet.com/image/image_64/64_M%c3%a9racq_1.jpg","../../jctruffet.com/image/image_64/64_M%c3%a9racq_2.jpg","../../jctruffet.com/image/image_64/64_M%c3%a9racq_3.jpg"]},"Consult_chateau_formulaire4073":{"id":"Consult_chateau_formulaire4073","dept":"64","canton":"Serres-Castet","commune":"Navailles-Angos","nom":"Navailles_Angos","type":"Forteresse","periode":"XIV","histoire":"NAVAILLES, cest dans la seconde moitié du XIVe siècle, que Giraude, baronne héritière de Navailles et son mari Roger-Bernard II de Foix-Castelbon ont fait  rebâtir le château , selon le modèle du château de Mauvezin, dont ils sont les seigneurs, et selon une technique élaborée par Gaston Fébus et Sicard de Lordat à Morlanne et Montaner. Les Barons de Navailles se sont succédés en ces lieux jusquen 1346 date à laquelle, la baronnie passera par mariage au Grailly-Foix, Carmain-Foix, Andoins et Montaut-Benac dont est issu le maréchal de Navailles, un des brillants militaires de Louis XIV.  En 1686, elle fut vendue aux Gontaut-Biron, illustre famille du Périgord dont ils sont les premiers barons, mais fortement implantés en Béarn.  Ils la revendirent rapidement en  1694 à la famille  Desclaux-Mesplès,   en 1850, le château fut racheté par Elie de Gontaut-Biron, le futur ambassadeur de France en Allemagne pendant la terrible période qui suivit la guerre de 1870, soit de 1871 à 1877. Les Gontaut-Biron en firent un lieu de réception admirable, y accueillant, pendant des décennies, nombre de célébrités du monde des lettres, des arts et de la politique. Toutefois, ils durent, à regret, sen séparer en 1981 et le vendirent à M. et Mme Lacay-Burato. Cette dernière fut une artiste peintre de renom à qui lon doit, entre autres, les fresques du théâtre St. Louis de Pau. Après sa mort, en 2003, le château fut acheté par M. Jean-Gérard Pilloy et M. Xavier Guiraud de Saint-Eymart qui, depuis douze ans maintenant, contribuent à lui rendre son lustre dantan.","architecture":"Navailles, le château de Navailles est mentionné dès 1088. Il demeure des vestiges de cette partie édifiée au XIe siècle. Le château actuel, profondément remanié au XIXe siècle conserve une tour ou donjon du XIVe siècle de Gaston Fébus. Sur une motte, le corps de logis en forme de S  à trois niveaux et quelques lucarnes sur un toit en croupe, l'ensemble englobe un donjon  carré en brique de cinq étages aux murs  près de deux mètres dépaisseur et qui mesure 27 mètres de haut  crénelé à mâchicoulis.   Tout en conservant la structure extérieure de lantique forteresse, il réaménagea totalement lintérieur, lui conférant un décor typique de la seconde moitié du XIXe siècle, alliant le style néogothique à celui du Second Empire, associé au confort le plus moderne. Le patrimoine architectural comprend notamment un château, remanié au XIXe siècle, qui a conservé son donjon du XIVe siècle.","habitants":"Famille  Desclaux-Mesplès\r\n        \r\n        \"","divers":"La forteresse de Navailles  43° 24' 51 nord, 0° 19' 49 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Navailles_Angos_1.jpg","../../jctruffet.com/image/image_64/64_Navailles_Angos_2.jpg","../../jctruffet.com/image/image_64/64_Navailles_Angos_3.jpg","../../jctruffet.com/image/image_64/64_Navailles_Angos_4.jpg"]},"Consult_chateau_formulaireddbb":{"id":"Consult_chateau_formulaireddbb","dept":"64","canton":"Morlaàs","commune":"Labatut","nom":"Navailles_Labatut","type":"Château","periode":"XIV","histoire":"LABATUT, la première mention de ce village apparait au XIVe siècle. On apprend que Labatut subit en 1382 les attaques des troupes de Jean II dArmagnac. Les conséquences se font sentir dans le recensement de 1385 où le village ne compte alors plus que treize foyers. À la fin du XVe siècle, la seigneurie est rachetée par la famille de Navailles, qui la conserve jusquà la Révolution. Un siècle plus tard, François de Navailles-Labatut épouse Marguerite dAlbret, fille de Jean dAlbret. Le château de Labatut, dit château de Navailles, date partiellement du XVIe siècle. Il est antérieur au château de Barbanègre, au lieu-dit du même nom, du XVIIe et XVIIIe siècles.","architecture":"Le château de Labatut du XVIe siècle est également connu sous lappellation « château de Navailles » en référence à ses premiers occupants. La famille de Navailles achète le fief de Labatut à la fin du XVe siècle. Le château primitif nétant pas assez raffiné  ou peut-être trop insalubre,  les Navailles décident de faire construire leur propre demeure à partir du début du XVIe siècle. La bâtisse est édifiée sur une terrasse qui domine la vallée du Louet, tout comme le premier château. Le nouveau bâtiment sert alors de siège seigneurial jusquà la Révolution. Au XIXe siècle, il est revendu à un particulier et subit dimportants remaniements. Il ne reste que très peu déléments anciens. On peut toutefois encore admirer la tour descalier hors oeuvre, percée de fenêtres à meneaux, témoin de larchitecture Renaissance en Béarn.","habitants":"Famille de Navailles\r\n        \"","divers":"Château de Navaille Labatut","gps":"","images":["../../jctruffet.com/image/image_64/64_Navailles_Labatut_1.jpg","../../jctruffet.com/image/image_64/64_Navailles_Labatut_2.jpg"]},"Consult_chateau_formulaired036":{"id":"Consult_chateau_formulaired036","dept":"64","canton":"Mourenx","commune":"Navarrenx","nom":"Navarrenx","type":"Forteresse","periode":"XII-XVI","histoire":"NAVARRENX, ancienne bastide rurale devenue, dans la première moitié  du XVIe siècle, la principale place forte du Béarn. Le passage sur le gave livrant un accès à la Navarre est un lieu stratégique très ancien. Prévu dès 1180, le pont sera construit en pierre en 1280. Le bourg médiéval reçoit en 1316 le statut de bastide avec un marché. Le plan de la cité encore visible comporte une place  centrale et des rues à angle droit. Au XVIe siècle Henri II dAlbret, roi de Navarre, fait construire des remparts capables de résister à lartillerie à poudre et aux boulets\r\nmétalliques. Navarrenx devient ainsi la première cité bastionnée en France, un siècle avant Vauban. Aujourd'hui encore, les imposants remparts  montrent  bien la nouveauté de larchitecture militaire caractérisée par labsence dangles morts. Ils abritent de nombreux bâtiments où résonnent des noms prestigieux, mais la place forte des temps guerriers est devenue place d'étape pour ces milliers de pélerins des temps modernes en route pour Compostelle.\r\nLes remparts, l'église et son clocher et la porte St-Antoine sont classés M.H.","architecture":"Navarrenx  s'est développée au Moyen-Age surtout à partir de la fin du XIIe siècle. Au XIIIe siècle, le vicomte de Béarn Gaston VII fait réaliser des fortifications et un pont de pierre qui franchit le Gave d'Oloron, quelques éléments de cet ancien pont subsistent dans les piles du pont moderne.  Navarrenx devient une bastide au début du XIVe siècle, elle en conserve un plan en damier, elle est alors une ville riche et active. \r\n Pendant les Guerres de Religion la ville bascule vers le Protestantisme. L'armée Catholique commandée par Terride échoue à s'emparer de la place. Le Catholicisme est restauré au début du XVIIe siècle.  Lors de la la Révolution Française, la ville devient le premier chef-lieu du nouveau département des Basses-Pyrénées. Au XVIe siècle les remparts sont reconstruit  pour résister à lartillerie à poudre et aux boulets métalliques  et qu'il n'y a pas d'angles morts. En même temps Navarrenx devient une place forte qui peut servir de base pour la reconquête de la Navarre Espagnole perdue en 1512.  Les fortifications réalisées subsistent toujours, elles anticipent celles conçues et construites dans le royaume de France par Vauban un siècle et demi plus tard. Ces fortifications se composent de cinq saillants s'appuyant sur trois bastions. En pratique elles n'ont jamais servi mais restent un bel exemple d'architecture militaire.","habitants":"Roi Henri II dAlbret\r\n        \r\n        \"","divers":"Forteresse de Navarrenx","gps":"","images":["../../jctruffet.com/image/image_64/64_Navarrenx_1.jpg","../../jctruffet.com/image/image_64/64_Navarrenx_2.jpg","../../jctruffet.com/image/image_64/64_Navarrenx_3.jpg","../../jctruffet.com/image/image_64/64_Navarrenx_4.jpg"]},"Consult_chateau_formulairebbbe":{"id":"Consult_chateau_formulairebbbe","dept":"64","canton":"Saint-Palais","commune":"Iholdy","nom":"Olce_Iholdy","type":"Château","periode":"XIV","histoire":"OLCE,  est mentionnée comme maison noble du royaume de Navarre en 1300. En 1422, Arnauton et Peyroton sont \"doncels\" du roi. Le premier reçoit de Charles III le territoire d'Eulza. La seigneurie est érigée en baronnie en 1655. Le château actuel date du troisième quart du XVIIe siècle. Il se situe au bas de la colline où s'élevait, selon une tradition, l'édifice primitif, une maison-forte. Le commanditaire de ce bâtiment de style classique est Mgr Jean d'Olce, évêque de Bayonne, qui célébra le mariage de Louis XIV en 1660.                                                                          IHOLDI, dit de Olce  par  monseigneur d'Olce, évêque qui bénit le mariage de Louis XIV et de l'Infante d'Espagne. Le château est habité.","architecture":"Olce  cette maison-forte réside dans l'appareil des murs de l'angle ouest du bâtiment en moyen appareil de calcaire, atteignant 0,9 mètres d'épaisseur, les niveaux actuels ne sont pas ceux du bâtiment d'origine; sous le rez-de-chaussée du pavillon de gauche, apparaissent les restes d'une cave aux murs appareillés, dont la voûte a été détruite. À la fin du XXe siècle, des travaux de restauration ont sauvé le bâtiment d'une ruine certaine. Le château se compose d'un corps de logis central flanqué de deux pavillons latéraux en saillie, légèrement plus élevés. L'ensemble possède deux étages carrés. Le corps central est surmonté d'un toit à croupe couvert de tuiles creuses, les pavillons de toits en croupe également, recouvertes de tuiles plates.                                                             IHOLDI, dans un site exceptionnel, au pied de la montagne, ce château mentionné  dès le Moyen Âge remonte dans ses parties les plus anciennes au XIVe siècle. Il fut cependant considérablement remanié en 1664, dans son état actuel, la façade date du XVIIe siècle. La noble demeure de ce prélat a gardé entier et intact limportant et riche décor de sculpture du Grand Siècle emprunté à lécole de Fontainebleau,\r\n le grand escalier à vide central, sa rampe, ses pots à feu, lexceptionnelle coupole à voussure  dinspiration italienne, la chapelle au plafond et retable richement  décorés, mais aussi une série dadmirables cheminées monumental                                                                      Manoir Elizabelar, avec ses échauguettes aux quatre coins du bâtiment.","habitants":"Mgr Jean d'Olce,\r\n        \"","divers":"Château de Olce à Iholdy","gps":"","images":["../../jctruffet.com/image/image_64/64_Olce_Iholdy_1.jpg","../../jctruffet.com/image/image_64/64_Olce_Iholdy_2.jpg","../../jctruffet.com/image/image_64/64_Olce_Iholdy_3.jpg","../../jctruffet.com/image/image_64/64_Olce_Iholdy_4.jpg","../../jctruffet.com/image/image_64/64_Olce_Iholdy_5.jpg","../../jctruffet.com/image/image_64/64_Olce_Iholdy_6.jpg"]},"Consult_chateau_formulaire75cc":{"id":"Consult_chateau_formulaire75cc","dept":"64","canton":"Oloron Ste-Marie","commune":"Oloron Ste-Marie","nom":"Oloron_Ste_Marie","type":"Château-Tour","periode":"XIII-XVI","histoire":"Oloron ste-Marie, le château de Légugnon, de Ribière et la la tour de Grède date du Moyen Âge.                   OLORON,  les remparts Établie pour l'essentiel à Sainte-Marie sur la terrasse alluviale sur laquelle sera établie la future cathédrale, c'est aussi une citadelle dotée de remparts sur la butte de Sainte-Croix d'Oloron. Le promontoire de Sainte-Croix en est l'oppidum. En 506, Gratus, premier évêque connu assiste au Concile d'Agde et devient saint Grat, dont la fête est aujourd'hui encore célébrée à l'automne.;\r\nLEGUGNON   le château de Legugnon date du XVIe siècle.     Eléments protégés MH : façades et toitures du corps de logis et divers communs dont le pigeonnier et la chapelle, mur de clôture bordant la route; les quatre portails; allée cavalière : inscription par arrêté du 8 octobre 1993.","architecture":"LEGUGNON ancienne abbaye laïque caractéristique de la région construite au XVIe ou XVIIe siècle. Le château sélève sur quatre niveaux en deux travées avec un grenier de charpente en chêne. Lescalier central est logé dans une tour plus haute que le logis. Au nord-ouest de la façade ouest, il existe une porte au rez-de-chaussée qui ouvrait sur un cachot, cette façade donne sur une cour entourée de communs. Lentrée se faisait par la façade sud. L'édifice comprend un pigeonnier circulaire. La chambre de Jeanne dAlbret conserve une vaste alcôve à encadrement en bois, des cheminées à manteau de bois sculpté surmonté de motifs en stuc. Lancien propriétaire a réalisé des appartements dans les trois étages pour y installer des locataires, cela explique les dégradations.\r\nTour de GREDE Silhouette atypique bien connue des Oloronais, la Tour de Grède offre une vue panoramique sur la ville et ses alentours, cette tour n'en fut pas toujours une. Probablement dédiée au commerce, le bâtiment prend de l'ampleur annonçant ainsi le rang social de ses propriétaires. De lourds travaux ont redonné vie à la tour de Grède, ce bâtiment imposant du XIIIe siècle qui s'appelait à l'époque Oustau de Poey, situé près de l'église Sainte-Croix. A la fin du XIVe siècle, c'est la famille d'Agreda qui procède à quelques aménagements pour la rendre habitable                                                                            RIBIERE de plan rectangulaire sur soubassement à deux niveaux avec série de lucarnes sur un toit brisée à la Mansard flanqué en façade de tours polygonales toit en poivrières.","habitants":"Famille d'Agreda \r\n        \"","divers":"La tour de Gréde grav de 1 à 3. château de Légugnon 43° 12' 08 nord, 0° 37' 12 ouest, de Ribière 43° 11' 08 nord, 0° 36' 04 ouest grav 6","gps":"","images":["../../jctruffet.com/image/image_64/64_Oloron_Ste_Marie_1.jpg","../../jctruffet.com/image/image_64/64_Oloron_Ste_Marie_2.jpg","../../jctruffet.com/image/image_64/64_Oloron_Ste_Marie_3.jpg","../../jctruffet.com/image/image_64/64_Oloron_Ste_Marie_4.jpg","../../jctruffet.com/image/image_64/64_Oloron_Ste_Marie_5.jpg","../../jctruffet.com/image/image_64/64_Oloron_Ste_Marie_6.jpg"]},"Consult_chateau_formulairea675":{"id":"Consult_chateau_formulairea675","dept":"64","canton":"Orthez","commune":"Orion","nom":"Orion","type":"Château","periode":"XVII","histoire":"ORION, au XVII siècle, cest la famille Casamayor qui est propriétaire de cette abbaye laïque jusquà la Révolution française. La famille Jean Ninon Larrouy en fait ensuite lacquisition après avoir fait fortune dans le commerce du célèbre jambon de Bayonne. Henriette Larrouy en devient lhéritière, et épouse Paul Reclus, fameux chirurgien, créateur de la «pommade Reclus», protocole anesthésique à base de cocaïne. Deux des célèbres frères Reclus ont aussi été accueillis  par l'Elisée, géographe et anarchiste de renom, Armand, officier de marine et ingénieur naval, qui participa à la construction du canal de Panama. Jean Labbé, petit fils de Paul Reclus en fut le dernier héritier. Il épousa dans les années 50, Marguerite Bérard, fille de lacadémicien et ministre de lEducation Léon Bérard. Cette dernière vit toujours au château. Pendant la deuxième guerre mondiale, le château abritait un célèbre réseau de résistance. La ligne de démarcation, qui sépara la France en 1940 en zones occupées et non-occupées, se trouvait à proximité du château. En 2003, madame Labbé vend le château à la famille Premauer, tel quil est depuis des décennies, avec ses meubles, ses tableaux, sa vaisselle, ses costumes, ses correspondances. Aujourd'hui  maison dhôtes.","architecture":"Sur ce bel endroit appelé Orion, le château a été construit au XVII siècle, il a évolué et sest agrandi au cours des siècles suivants. Le château et l'église adjacente forment le noyau de ce petit village avec environ 6 bâtiments de ferme à l'origine. L'ensemble est construit dans le style typique du Béarn, identifié par le toit béarnais et les fenêtres encadrées de pierres.","habitants":"Famille Casamayor\r\n        \"","divers":"Le château d'Orion  43° 25' 07 nord, 0° 51' 52 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Orion_1.jpg","../../jctruffet.com/image/image_64/64_Orion_2.jpg","../../jctruffet.com/image/image_64/64_Orion_3.jpg"]},"Consult_chateau_formulaireb483":{"id":"Consult_chateau_formulaireb483","dept":"64","canton":"Orthez","commune":"Orthez","nom":"Orthez","type":"Patrimoine","periode":"XI-XIII-XV","histoire":"A Orthez le château de Brassalay-Biron (voir article).  ORTHEZ capitale du Béarn pendant deux siècles, doit beaucoup à son bâtisseur Gaston VII de Moncade ou il résidait. Au XIe siècle, elle fut aussi le fief protestant de Jeanne dAlbret, qui favorisa la création\r\ndune université. Orthez garde de nombreux témoignages du passé : le Pont-Vieux, lhôtel de la Lune ; la maison Jeanne dAlbret évoque lhistoire du protestantisme et 400 ans dhistoire du Béarn\r\nainsi que de grandes figures historiques, Henri IV, Elisée Reclus, quant au château Moncade, construit en 1242 il fut complété par le flamboyant Gaston Fébus en 1300 qui y résida et y installa sa cour fastueuse, et confia en 1368 à Sicard de Lordat de réaménager la citadelle et de remanier le donjon avec trois niveaux supplémentaires.  La ville racheta cet édifice en 1841, qui en est toujours propriétaire.        PREVILLE transformé en clinique est un établissement de psychiatrie générale.                                                 Maison de Jeanne d'Albret  est un des édifices intéressants de la ville, elle remonte au XVe siècle. Elle accueille maintenant d'une part l'office du tourisme de la ville et d'autre part un musée (Jeanne d'Albret) dédié à l'histoire des protestants (Huguenots) en France et dans le Béarn.","architecture":"la Tour Moncarde, il s'agit de l'un des derniers vestiges d'un ensemble plus vaste comprenant un ancien château,  ce site est situé au Nord de la ville d'Orthez, sur une colline d'une centaine de mètres de hauteur.  Elle surplombe le Gave de Pau et fait face aux Pyrénées. Il s'agit d'un château ancien puis ses origines remontent au XIIIe siècle. C'est sous limpulsion de Gaston VII de Moncade en 1242, que commencèrent le début des travaux de ce complexe remarquable, dont il ne reste que le donjon (Tour pentagonale avec éperon tourné vers le sud) des murs près de 2 mètres 50 d'épaisseur, de 33 mèyres de haut et sa porte d'entrée au premier étage dotée d'un assommoir, ce site fut terminé quelques années plus tard, sous le règne de Gaston de Fébus.\r\n Le rez-de-chaussée de la tour   abritait un cachot avec une trappe pour seule ouverture, au premier étage salle des gardes éclairés par trois fenêtres étroites et un escalier aménagé dans le mur  pour les quartiers  d'habitation aux étages supérieurs. L'ensemble comprenait un vaste château protégé par un système de rempart très novateur pour l'époque. En 1569, un incendie abîma l'ensemble de l'époque et quelques ruines. Il subit de nouvelles séquelles lors des guerres locales.\r\nPréville de plan rectangulaire  à deux niveaux et lucarnes sur le toit, accolé d'un donjon carré crénelé possédant d'une échauguette au niveau des créneaux servant de tour de guet et tourelle à l'opposée de même niveau avec toit pointu.","habitants":"Gaston VII de Moncade\r\n        \"","divers":"la tour de Moncade grav de 1 à 4 43° 29' 31 nord, 0° 46' 12 ouest la maison de la Reine, le château de Préville grav de 6 à 7","gps":"","images":["../../jctruffet.com/image/image_64/64_Orthez_1.jpg","../../jctruffet.com/image/image_64/64_Orthez_2.jpg","../../jctruffet.com/image/image_64/64_Orthez_3.jpg","../../jctruffet.com/image/image_64/64_Orthez_4.jpg","../../jctruffet.com/image/image_64/64_Orthez_5.jpg","../../jctruffet.com/image/image_64/64_Orthez_6.jpg","../../jctruffet.com/image/image_64/64_Orthez_7.jpg","../../jctruffet.com/image/image_64/64_Orthez_8.jpg","../../jctruffet.com/image/image_64/64_Orthez_9.jpg"]},"Consult_chateau_formulaire6ae9":{"id":"Consult_chateau_formulaire6ae9","dept":"64","canton":"Saint-Palais","commune":"Irissarry","nom":"Ospitaléa","type":"Commanderie","periode":"XVII","histoire":"OSPITALEA, il est installé dans l'édifice Ospitalea qui est chargé d'une longue histoire puisqu'il était une commanderie construite au début du XVIIe siècle par lOrdre des Hospitaliers pour prendre directement la suite d'une première commanderie médiévale qui existait dès le XIe siècle exactement au même emplacement.   La dénomination  d'Ospitalea  attribuée à la commanderie est directement liée au nom de lordre qui l'a fondé qui, à son origine au Moyen-Âge, s'intitulait l'Ordre des Chevaliers-Hospitaliers de Saint-Jean-de-Jérusalem. Au XVIIe siècle, l'ordre des Hospitaliers est devenu l'Ordre de Malte puisque c'est sur cette île où, après Chypre et Rhodes, s'est installé son quartier général.","architecture":"Aussi, le majestueux édifice qu'il est impossible de manquer au centre du village est-il connu sous plusieurs appellations. Son nom officiel actuel, bien sûr, le centre d'éducation au patrimoine Ospitalea, ou bien ses initiales:  Mais son nom historique est encore tellement  présent qu'il est très souvent identifié d'abord comme \"Ospitalea\". Et de son riche passé, il conserve toujours son appellation de \"commanderie\" même si, depuis la Révolution Française et l'expulsion des hospitaliers, il n'en a évidemment plus le statut.  En 1607, le commandeur d'Irissarry, Martin de Larrea entreprit la reconstruction d'Ospitalea (hôpital) et en fit à l'époque le plus beau bâtiment de Navarre. L'oratoire fut ensuite construit et devint l'église Saint-Jean-Baptiste actuelle dont une partie a la particularité d'être pavée de dalles funéraires. L'église a été transformée en 1860.","habitants":"l'Ordre des Chevaliers-Hospitaliers \r\n        \"","divers":"La commanderie d'opitaléa","gps":"","images":["../../jctruffet.com/image/image_64/64_Ospital%c3%a9a_1.jpg"]},"Consult_chateau_formulaire55e3":{"id":"Consult_chateau_formulaire55e3","dept":"64","canton":"Saint-Palais","commune":"Osserain-Rivareyte","nom":"Osserain","type":"Château","periode":"XIV-XVII","histoire":"OSSERAIN, mentionné dès le XIVe siècle, le château dOsserain est dabord convoité pour sa situation stratégique, au carrefour de plusieurs provinces basques, non loin du pont qui servait de péage.\r\nAvant le XVIIe siècle, les seigneurs dOsserain sont mal connus et les guerres de Religion survenues au XVIe siècle ont sans doute perturbé le destin par ailleurs tranquille de cet édifice où les familles nobles se succèdent. La propriété appartient notamment un temps à la branche cadette de la prestigieuse famille de Gassion.\r\nA l'origine, la traversée de la rivière se faisait à gué. Le pont d'Osserain était à péage au bénéfice du Vicomte de Béarn. C'est pas loin de ce pont, dans le borne Pausassac, qu'eut lieu le 12 avril 1462 la rencontre entre Louis XI  et, Jean II d'Aragon et de Navarre  et son gendre Gaston IV comte de Foix et de Bigorre et vicomte de Béarn.","architecture":"Les deux bourgs - Osserain et Rivareyte - situés de part et d'autre du Saison ont été réunis le 5 août 1842. Le Saison servait de frontière entre la Soule et le Béarn; les deux territorires cultivaient depuis toujours un antagonisme tenace. Bien que de fondation ancienne, le château dOsserain a lallure dun bâtiment du XVIIe siècle. Celui-ci a peut-être été détruit au XVIe siècle, lors de guerres de Religion, et par la suite été restauré ou reconstruit. Lédifice jamais laissé à labandon se dote au fil du temps décuries, de métairies, de vignobles et de moulins. Le château d'Osserain, connu au XIVe siècle, reconstruit au XVIIe siècle, surplombait ce pont frontière. Les deux maisons nobles d'Osserain et de Rivereyte, contrôlaient l'ensemble de l'habitat. En effet en 1377, sur les vingt maisons citées dans les deux bourgades, trois relèvent de la Salle de Riverayte et seize de celle d'Osserain; il n'y avait qu'une seule maison franche.","habitants":"Famille de Gassion\r\n        \"","divers":"Le château d'Osserain","gps":"","images":["../../jctruffet.com/image/image_64/64_Osserain_1.jpg","../../jctruffet.com/image/image_64/64_Osserain_2.jpg","../../jctruffet.com/image/image_64/64_Osserain_3.jpg","../../jctruffet.com/image/image_64/64_Osserain_4.jpg","../../jctruffet.com/image/image_64/64_Osserain_5.jpg"]},"Consult_chateau_formulaire37c0":{"id":"Consult_chateau_formulaire37c0","dept":"64","canton":"Nay","commune":"Pardies-Piétat","nom":"Pardies_Piétat","type":"Château","periode":"XIV-XVIII","histoire":"PARDIES-PIETRAS  un château datant du début du XVIIIe siècle. Dans la commune de Pardies-Piétat est conservé. Pas d'information historique.","architecture":"PARDIES-PIETRAT du début du XVIIIe siècle, est un grand édifice de plan rectangulaire, construit en pierre locale et couvert dardoise. La façade principale est flanquée dun avant-corps coiffé dun toit en pavillon et dune tourelle de plan circulaire. Celle-ci abrite un escalier à vis caractéristique de larchitecture noble depuis le XVe siècle. Les murs de lédifice reçoivent des traitements différents : ceux du corps de logis principal sont recouverts denduit, tandis que la pierre est apparente au niveau de la tourelle. On peut supposer que ce traitement hétérogène est le résultat des remaniements successifs des différentes parties du château de Pardies-Piétat au cours des siècles.                                                                    Palais BIARRITZ L'édifice est construit à l'emplacement où se trouvait la résidence d'été de l'impératrice Eugénie.","habitants":"l'impératrice Eugénie\r\n        \"","divers":"Château de Padiès-Piétat","gps":"","images":["../../jctruffet.com/image/image_64/64_Pardi%c3%a8s_Pi%c3%a9tat_1.jpg","../../jctruffet.com/image/image_64/64_Pardi%c3%a8s_Pi%c3%a9tat_2.jpg"]},"Consult_chateau_formulaire859d":{"id":"Consult_chateau_formulaire859d","dept":"64","canton":"Pau","commune":"Autour de Pau","nom":"Pau_Chateau","type":"Château","periode":"XVI","histoire":"IDRON;  la baronnie d'Idron fut créée en 16553 . Elle étendait son ressort à Higuères et était vassale de la vicomté de Béarn.  Chaque année, une délégation de militaires polonais se déplace à Idron, afin de se recueillir face à l'Oratoire Polonais d'Idron, monument à la Vierge de Czestochowa (la « Czarna Madonna » ou Madone Noire ou Vierge Noire de Czestochowa) qui rappelle le passage de l'armée polonaise dans le camp militaire d'Idron, aujourd'hui chambre d'hôtes. GASSION, ou hôtel Gassion, fut construit entre 1867 et 1872 sous l'impulsion de l'homme d'affaire béarnais Jean Lafourcade-Camarau. fils aîné d'une famille de paysans de Simacourbe, il fit fortune dans le commerce au Brésil. Au milieu du XIXe siècle, il eut pour projet de créer un hôtel de luxe à Pau afin de satisfaire la nombreuse clientèle étrangère de la ville. À l'époque, seul l'hôtel de France pouvait accueillir ces riches touristes venant dans la capitale du Béarn pour son bon air et sa douceur de vivre.                         PEYRE   Depuis sa construction  au début du XVIIe siècle, cet hôtel de Peyre est toujours resté dans la même famille. Depuis 1802 il a été lhéritage de la fille ainée.  Alexandre Dumas a puisé dans lhéritage des Peyre pour trouver les personnages des \"TROIS MOUSQUETAIRES\" ...","architecture":"IDRON, de plan rectangulaire sur soubassement à deux niveaux et lucarnes sur toit en tuiles, accolé sur côté gauche d'une tour rectangulaire à toit  en croupe pointu et à l'opposé d'une tourelle toit avec clocheton.   PALAIS BEAUMONT   Dans le cadre prestigieux dun palais de plus de 100 ans dhistoire, vous profitez des infrastructures issues des dernières technologies. Le réseau du Palais Beaumont est configuré pour permettre 2000 connexions simultanées ! Vous bénéficiez dun véritable réseau « VIP », personnalisable à la carte et accessible librement sans authentification.                                                                L'HOTEL PEYRE  La partie centrale est la plus ancienne,  fin du XVIe, les pavillons de chaque cotés ont suivi très rapidement. La salle des gardes et la cuisine sont maintenant le restaurant \"Belle Demeure\". Les réserves dharnachements et le grenier à foin sont occupés par le magasin de souvenirs.            GASSION  L'hôtel de Gassion,Le nouveau palace construit était composé de 8 étages : deux de sous-sol, un rez-de-chaussée niveau cour, un entresol et quatre étages avec combles. L'étage noble était notamment composé d'un centre de loisirs avec un casino comprenant une vaste salle de bal et de concert, une salle de billard, un salon de lecture, un fumoir, diverses pièces de jeux et de réunion. L'ensemble donnait vers le nord sur une cour intérieure où pénétraient les voitures avec les indispensables écuries et remises. Fait rare pour l'époque, un ascenseur hydraulique avait également été mis en place pour desservir les différents étages du palace.","habitants":"Baronnie d'Idron                                                           Famille de Peyre\r\n        \"","divers":"Château d'Idron grav 1 à 3, le palais Beaumont grav 4, château Gassion grav 5,  Hôtel Peyré grav 6 43° 17' 41 nord, 0° 22' 28 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Pau_Chateau_1.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_2.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_3.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_4.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_5.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_6.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_7.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_8.jpg","../../jctruffet.com/image/image_64/64_Pau_Chateau_9.jpg"]},"Consult_chateau_formulaire0c2b-2":{"id":"Consult_chateau_formulaire0c2b-2","dept":"64","canton":"Pau","commune":"Pau","nom":"Pau_Forteresse","type":"Foreteresse","periode":"XII-XVIII","histoire":"PAU, le XIVe siècle Gaston III de Foix-Béarn, mieux connu sous le nom de Gaston Fébus.  Henri d'Albret y réside accompagné de son épouse Marguerite d'Angoulême, sur de François Ier, et plus connue sous le nom de Marguerite de Navarre, auteur de l'Heptaméron. Le futur Henri IV naît au château le 13 décembre 1553. Après le passage illustre du futur roi Henri et le décès de ses grands-parents, plus aucun souverain ne résidera à Pau jusqu'au XIXe siècle. Le château fut confié à la garde de la famille des Gramont, et fut ainsi entretenu, bien que préservé de la démolition sous la Révolution française, le château arrive en piteux état lorsque Louis-Philippe décide de le restaurer. Celui-ci voulut allier les idéaux de la Révolution et ceux de la monarchie, il eut donc l'idée de restaurer à partir de 1838 le château de celui qui réconcilia catholiques et protestants pour en faire une résidence royale, mais il n'y résidera cependant pas.  A partir de  1853, les architectes se sont cumulés pour la maintenance du château. Les destructions des bâtiments côté ville avaient fait apparaître un mur du château sans aucune ouverture. Il fallait pour lui faire entrer l'air et la lumière dans la cour d'honneur du château qui était jusque-là sombre et humide. En 1859, on commence la démolition du bâtiment et il ont construit le portique. Les deux médaillons représentant Henri d'Albret et Marguerite de Valois placés au-dessus sont commandés en 1861 au sculpteur Charles-Martial Baury par le comte Émilien de Nieuwerkerke.","architecture":"PAU, il s'agit d'un ouvrage avant tout militaire, c'est un château fort typique, les dynasties successives des vicomtes de Béarn font construire trois tours à cette forteresse. La cour du château dispose d'une forme originale, ponctuée de sculptures et de médaillons aux portes et fenêtres. La tour Gaston-Fébus au sud-est, également nommée donjon. Les tours Mazères et Louis-Philippe à l'extrémité ouest, la tour Mazères est la plus ancienne du château puisqu'elle date du XIe siècle tandis que la tour Louis-Philippe a été édifiée au milieu du XIXe siècle pour faire échos à sa tour jumelle. Les deux tours mesurent chacun 22,5 m. La tour Mazères fait référence au village de Mazères-Lezons, de l'autre côté du gave de Pau. La tour Montaüser au nord, qui signifie monte oiseau en béarnais car la tour était dépourvue d'escalier à son origine au XIIe siècle.  La tour Billère au nord-ouest du château, fait référence au village de Billère dans lequel le bon roi Henri fut nourri dans la maison Lassensàa. Cette tour mesure 30 mètres de haut en comptant les combles, elle a été édifié au XIIe siècle. La tour Napoléon III, celle-ci a été réalisée à la fin du XIXe siècle sous les ordres de l'empereur en face de la tour Gaston-Fébus. Elle termine le château à son extrémité nord-est.  Trois enceintes de murailles entouraient le château afin de le protéger des agressions extérieurs. Au XVe siècle, deux enceintes furent détruites puis la troisième le fut également à la Renaissance lorsque les souverains délaissèrent le style des châteaux-forts pour des palais plus ouverts.","habitants":"Gaston III de Foix-Béarn                                                Famille des Gramont\r\n        \"","divers":"La forteresse de Pau 3° 17' 41 nord, 0° 22' 30 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Pau_Forteresse_1.jpg","../../jctruffet.com/image/image_64/64_Pau_Forteresse_2.jpg","../../jctruffet.com/image/image_64/64_Pau_Forteresse_3.jpg","../../jctruffet.com/image/image_64/64_Pau_Forteresse_4.jpg","../../jctruffet.com/image/image_64/64_Pau_Forteresse_5.jpg","../../jctruffet.com/image/image_64/64_Pau_Forteresse_6.jpg","../../jctruffet.com/image/image_64/64_Pau_Forteresse_7.jpg"]},"Consult_chateau_formulaire604d":{"id":"Consult_chateau_formulaire604d","dept":"64","canton":"Mouguerre","commune":"St-Pierre d","nom":"Petit_Lissague","type":"Manoir","periode":"XVII","histoire":"PETIT-LISSAGUE, le château du Petit-Lissague est en fait lancienne maison noble des seigneurs de Iruber, mentionnée dans le livre dor de Bayonne en 1234. Elle passe aux mains des Lissague au XIVe siècle, puis des Belsunce et des Lespès de Hureaux. Le château du Petit-Lissague est encore aujourdhui célèbre pour avoir accueilli la reine dEspagne en exil entre 1713 et 1717.","architecture":"Le domaine de Lissague est scindé en deux en 1719. Il comprend alors le Grand-Lissague, rebaptisé Villa Quieta en 1878, et le Petit-Lissague qui comporte lancienne maison noble. Jusquau XVIIe siècle, lhabitation ne présente pas laspect que nous connaissons aujourdhui. Il sagit dune construction massive avec des murs épais et des fenêtres aux petites dimensions. Elle possède deux salles carrées dallées de grandes lauzes avec un plafond bas soutenu par des poutres de chêne. Lintérieur ne conserve quune cheminée.\r\nLes éléments de cette maison forte sont encore visibles au rez-de-chaussée. Deux tours carrées sont ajoutées aux XVIIe et XVIIIe siècles.","habitants":"Famille de Lissague\r\n        \"","divers":"Château du petit-Lissague","gps":"","images":["../../jctruffet.com/image/image_64/64_Petit_Lissague_1.jpg"]},"Consult_chateau_formulairee023":{"id":"Consult_chateau_formulairee023","dept":"64","canton":"Serres-Castet","commune":"Peyrelongue Ados","nom":"Peyrelongue","type":"Château","periode":"XVIII","histoire":"PEYRELONGUE;  le château de Peyrelongue est édifié au XVIIIe siècle par la puissante famille des Nays-Candau. Fait curieux, il nest pas bâti à lemplacement du château médiéval, comme cest généralement le cas. La seigneurie de Peyrelongue est signalée dès les XIe et XIIe siècles. Après être passée aux mains des Andoins jusquen 1554 puis à la famille de Cassanhère, la seigneurie appartient, au début du XVIIe siècle aux Miossens qui la transmettent par mariage aux Nays-Candau, deux célèbres familles béarnaises. Cest probablement ces derniers qui font élever le château de Peyrelongue au XVIIIe siècle.","architecture":"Peyrelongue, des vestiges d'ensembles fortifiés des XIe et XIIe siècles à Abos et Peyrelongue témoignent du passé ancien de la commune.\r\nLa demeure dite maison Billières à Peyrelongue, date de la fin du XVIe siècle. Le château de Peyrelongue date, semble-t-il, du XVIIIe siècle.Cest alors une grande demeure composée dun corps de logis à un étage, surmonté dune large lucarne-fronton. En 1943, le château est détruit par un incendie mais il subsiste aujourdhui les communs et le portail monumental. Le château est aujourdhui inscrit à lInventaire général du patrimoine culturel.","habitants":"Famille de Cassanhère\r\n        \"","divers":"Château de Peyrelongue","gps":"","images":["../../jctruffet.com/image/image_64/64_Peyrelongue_1.jpg","../../jctruffet.com/image/image_64/64_Peyrelongue_2.jpg"]},"Consult_chateau_formulaire92fe-2":{"id":"Consult_chateau_formulaire92fe-2","dept":"64","canton":"Oloron Ste-Marie","commune":"Estos","nom":"Peyré_Estos","type":"Château","periode":"XVII","histoire":"PEYRE   évoque les châteaux de la Loire, se trouve à la limite de la commune dEstos, à laplomb du gave dOloron. Lorigine du bâtiment principal est certainement ancienne, mais aucun texte ne fait mention dun seigneur des lieux. Dans la banlieue nord oloronaise, Estos possède un manoir du XVIIIe siècle où vécut et mourut le chanteur Pierre de Jélyotte, né à Lasseube en 1719. Il devient la coqueluche de la cour de Louis XV, où il fit connaître et apprécier, à l'instar de l'aspois Cyprien Despourrins, plus tôt, les chants pyrénéens.lédifice est peut être lié à lexploitation dune sablière appartenant en 1773 au sieur Mauco.","architecture":"PEYRE,  la propriété est mentionnée sous le nom de Dufraisse sur le cadastre de 1809 et comporte des bâtiments agricoles et des communs. Le domaine est lié au moulin, plus en amont et au bâtiment situé au bord du gave afin d'utiliser la force hydraulique. Le corps de logis comprend un bloc rectangulaire, des échauguettes et une tourelle octogonale, le tout étant coiffé de toitures en flèche. Les encadrements des baies sont moulurés sur lensemble des façades, hormis pour celle qui donne sur le gave puisquune avancée est ajoutée au XIXe siècle.","habitants":"Famille de Dufraisse\r\n        \"","divers":"Château de Peyré à Estos","gps":"","images":["../../jctruffet.com/image/image_64/64_Peyr%c3%a9_Estos_1.jpg"]},"Consult_chateau_formulaire209e":{"id":"Consult_chateau_formulaire209e","dept":"64","canton":"Lons","commune":"Poey des Lescar","nom":"Poey_Lescar","type":"Château","periode":"XVIII","histoire":"POEY-LESCAR ; aujourd'hui lycée Jacques Monod.  En 1351, le village était sous la dépendance de Raymondius de Podio, chanoine de Lescar. En 1385, Poey se trouvait sous la tutelle de la famille De La Salle, ainsi que Lons et Billère. À cette époque, Poey dépendait du bailliage d'Oloron. Lescar devient un centre éducatif, tout d'abord avec l'installation de l'Académie protestante du Béarn en 1562, puis avec la décision d'Henri IV d'implanter un collège de Barnabites. Ce collège du début du XVIIe siècle est le lointain ancêtre de l'actuel lycée Jacques-Monod, une maison noble est édifiée par la famille dAbbadie. En 1757, cette dernière la vend à Dominique de Pont Pédeprat qui décide de construire lédifice actuel. Cest donc en 1769 seulement que le château est édifié sur les ruines de la demeure dAbbadie.                          BILAA est situé à l'est de la cité médiévale de Lescar  est une demeure bourgeoise construite en 1853 par le baron Auguste d'Ariste. Fortement dégradé, le château est abandonné par la famille d'Ariste en 1967 et le domaine vendu en trois parties. En 2005, la municipalité de Lescar décide de réhabiliter le château il est  depuis 2011, le nouvel hôtel de ville de Lescar.","architecture":"POEY LESCAR, le château est une demeure seigneuriale datant de 1769, cette demeure emprunte de nombreuses caractéristiques de larchitecture noble du XVIIIe siècle. De plan rectangulaire il présente une façade principale surmontée dun fronton triangulaire. Lédifice compte deux étages carrés et un étage de comble pourvu de lucarnes dites « à la capucine », cest-à-dire couvertes dun toit à trois pans formant une croupe sur le devant. Le corps de logis est couvert dune haute toiture en ardoise doù sortent six cheminées, sa construction présente un portail avec piliers flanqués dailerons sculptés, une toiture en ardoise, six cheminées et lucarnes en capucine.  Un mur de cailloux bien calibrés de la côte de léglise, datant de 1856, aurait longé la voie ferrée Bayonne-Toulouse si le premier projet avait été retenu. Cet édifice constitue un très bon exemple des nombreuses demeures seigneuriales édifiées en Béarn au XVIIIe siècle.                                                                               Le domaine du  BILAA  est implanté à l'extrémité d'un plateau dominant la vallée du gave de Pau au centre d'un domaine forestier de plusieurs hectares. Le château est situé sur une levée de terre qui pourrait être un ancien oppidum protohistorique, néanmoins des fouilles n'ont pas permis de confirmer cette hypothèse.","habitants":"Famille De La Salle\r\n        \"","divers":"Chateau de Poey-Lescar 3° 20' 45 nord, 0° 28' 07ouest grav 4 à 8   et l'hôtel de ville 2, château Bilaa grav 1","gps":"","images":["../../jctruffet.com/image/image_64/64_Poey_Lescar_1.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_2.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_3.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_4.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_5.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_6.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_7.jpg","../../jctruffet.com/image/image_64/64_Poey_Lescar_8.jpg"]},"Consult_chateau_formulaire5369":{"id":"Consult_chateau_formulaire5369","dept":"64","canton":"Artix","commune":"Pomps","nom":"Pomps","type":"Château","periode":"XVI","histoire":"POMPS  est édifié au XVIe siècle pour Henri de Montesquiou, alors seigneur de Sadirac et de Pomps à partir de 1547. Puis, en 1580, il vend la seigneurie à la famille Saint-Cricq dont lhéritière épouse Antoine de Faget de Doat à la fin du XVIIe siècle. Bien conservé, lédifice appartient depuis cinq générations à la famille de Frouté, au début du XVIIIe siècle, la propriété devient une baronnie.","architecture":"Pomps, au début du XVIIIe siècle, cest à cette époque que dimportants travaux de restauration sont effectués, comme latteste la présence dune fontaine, datée de 1722, en contrebas du château. De son aspect dorigine, ce manoir ne conserve quune tour descalier hexagonale. La batisse rectangulaire, bordée à lEst par un ravin, est couverte dun haut toit pentu en tuiles rouges. Des dépendances ferment la cour du logis et complètent cet ensemble architectural. À présent, une longue allée de platanes conduit au manoir isolé au milieu dune grande propriété clôturée.","habitants":"Famille Saint-Cricq \r\n        \"","divers":"Château de Pomps 43° 29' 38 nord, 0° 32' 21 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Pomps_1.jpg"]},"Consult_chateau_formulairecb44":{"id":"Consult_chateau_formulairecb44","dept":"64","canton":"Oloron Ste-Marie","commune":"Etsaut et Borce","nom":"Portalet_Urdos","type":"Fort","periode":"XVI","histoire":"PORTALET, date du XIXe siècle. Le fort du Portalet date du XVIe siècle  la construction du fort commence sur décision du Roi Louis-Philippe. Les travaux s'achèveront en 1870. Le fort du Portalet va remplacer un ancien poste, situé sur la route impériale. Il était important à cette époque, de construire des fortifications pour contrôler le passage de l'Espagne en maîtrisant la route du col du Somport, en cas de guerre avec les espagnols, les travaux furent réalisés dans un environnement très pénible.  Il appartenait à l'Armée Française. C'est l'une des défenses les plus abouties de toutes les fortifications des Pyrénées. Le fort était conçu pour abriter 400 hommes, capables de résister à un siège d'une semaine. Il sera occupé de 1871 à 1925  par le 18e Régiment d'Infanterie de Pau. Vendu aux enchères, à un particulier, ayant un projet immobilier, mais celui-ci laissera le fort du Portalet à l'abandon. Depuis il a été racheté à la communauté de communes de la Vallée d'Aspe.  Son fort et sa prison ont été rénovés au XIXe siècle.","architecture":"Le fort du Portalet, construit à 765 mètres d'altitude, sur une falaise dominant le gave, il prend le nom de l'ancien péage médiéval de la vallée d'Aspe, le Portalet qui était situé 100 mètres plus bas. À cette date, il est abandonné par l'armée et loué à une colonie de vacances jusqu'en 1939. Sous le régime de Vichy, il sert de prison politique pour des personnalités de la IIIe République (Daladier, Reynaud, Blum, Mandel, le général Gamelin, etc.) de 1941 à 1943 et qui, après l'occupation allemande de la zone libre, seront envoyés en Allemagne. Le fort va alors abriter une garnison allemande. Il est repris par les maquisards en 1944. Le maréchal Pétain y est détenu 3 mois du lendemain de son procès le 15 août 1945 jusqu'à son transfert à la forteresse de l'île d'Yeu le 16 novembre 1945, gardé par un peloton de gardes mobiles.","habitants":"Roi Louis-Philippe\r\n        \r\n        \"","divers":"Fort du Portalet  42° 53' 11 nord, 0° 33' 46 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Portalet_Urdos_1.jpg","../../jctruffet.com/image/image_64/64_Portalet_Urdos_2.jpg","../../jctruffet.com/image/image_64/64_Portalet_Urdos_3.jpg","../../jctruffet.com/image/image_64/64_Portalet_Urdos_4.jpg","../../jctruffet.com/image/image_64/64_Portalet_Urdos_5.jpg","../../jctruffet.com/image/image_64/64_Portalet_Urdos_6.jpg"]},"Consult_chateau_formulaire24f0":{"id":"Consult_chateau_formulaire24f0","dept":"64","canton":"Mouguerre","commune":"Sames","nom":"Poulit","type":"Château","periode":"XIX","histoire":"POULIT En 1817, au lieu-dit « Poulit », à Sames, seule une ancienne ferme apparaît sur le cadastre. Fief des vicomtes de St-Martin. Le château est sans doute construit à la fin du XIXe siècle. Lancienne ferme est alors agrandie et transformée en dépendance.","architecture":"Poulit, le château a probablement été construit dans le 4e quart du XIXe siècle. Sur le cadastre ancien de 1817 ne figure que l'ancienne ferme, agrandie pendant la construction du château. Bâtiment de plan quadrangulaire flanqué au nord-ouest et au sud-est de deux tours engagées.  L'élévation nord présente un avant-corps central à cinq pans sur deux niveaux surmonté d'une terrasse. Un escalier de distribution extérieur droit à degré convexe permet d'accéder au rez-de-chaussée surélevé. Les chaînes d'angle harpées, les chaînes horizontales portant bandeau et les chambranles des ouvertures sont en bossage rustique. L'étage de comble présente cinq lucarnes à croisée surmontées d'un fronton triangulaire et une lucarne centrale à double croisée surmontée d'un fronton cintré.","habitants":"Vicomtes de St-Martin\r\n        \"","divers":"Château de Poulit à Sames","gps":"","images":["../../jctruffet.com/image/image_64/64_Poulit_1.jpg","../../jctruffet.com/image/image_64/64_Poulit_2.jpg"]},"Consult_chateau_formulairec0bf":{"id":"Consult_chateau_formulairec0bf","dept":"64","canton":"Anglet","commune":"Anglet","nom":"Prinkipo","type":"Villa-Château","periode":"XIX","histoire":"PRINKIPO, Anglet devient, au début des années folles, le centre des festivités de la société fortunée séjournant sur la côte basque. De riches familles sinstallent et se font construire des villas. La présence de la piscine de la chambre damour et louverture du golf de Chiberta favorisent linstallation dune société riche et cosmopolite. En bordure de golf, la villa Prinkipo, à lallure arabo-andalouse, sort ainsi de terre au début des années 1930, pour la famille Poole. Elle présente une façade au caractère hispanisant. \r\nCet ensemble est aujourdhui une copropriété, la villa fut construite dans la forêt de pins attenant au golf de Chiberta, et dispose de vues longues sur le golf qui sétend à ses pieds. Mais la disparition de la pinède a profondément modifié la physionomie du jardin : aujourdhui ouvert, lumineux et plus sec, il est peu à peu occupé par des végétaux méditerranéens, tout en restant adapté au milieu salin.   En bordure de golf, la villa Prinkipo, à lallure arabo-andalouse,  transformé en hôtel.","architecture":"La villa Prinkipo, énigmatique construction en ciment imitant la pierre rose, témoigne du renouveau dAnglet dans les années 1925-1930.  De style éclectique dinspiration mauresque et pré-romane, une grande étendue demprunts, cohabitation de formes sur plus de cinq siècles. On y trouve notamment des connotations pré-romanes, du roman avec les arcs en plein cintre de plan rectangulaire à trois niveaux sur soubassement avec terrasses, l'édifice à ouvertures  de styles différents, elle présente une façade au caractère hispanisant. flanqué d'une tour carrée de cinq niveaux avec terrasse sur galerie Les architectes souhaitent couvrir la maison de vigne vierge pour accentuer son caractère exotique et lui donner un aspect luxuriant.","habitants":"Famille Poole\r\n        \"","divers":"Château de Prinkipo à Anglet","gps":"","images":["../../jctruffet.com/image/image_64/64_Prinkipo_1.jpg","../../jctruffet.com/image/image_64/64_Prinkipo_2.jpg","../../jctruffet.com/image/image_64/64_Prinkipo_3.jpg","../../jctruffet.com/image/image_64/64_Prinkipo_4.jpg","../../jctruffet.com/image/image_64/64_Prinkipo_5.jpg","../../jctruffet.com/image/image_64/64_Prinkipo_6.jpg","../../jctruffet.com/image/image_64/64_Prinkipo_7.jpg"]},"Consult_chateau_formulaire0307-2":{"id":"Consult_chateau_formulaire0307-2","dept":"64","canton":"Mauléon-Licharre","commune":"Assurucq","nom":"Ruthie","type":"Château","periode":"XV-XVIII","histoire":"RUTHIE, le lieu apparaît pour la première fois dans une charte de l'abbaye de Roncevaux en 1189, qui y fonda un hôpital pour les pélerins se rendant à Saint-Jacques de Compostelle. En 1569, le baron de Sénégas, envoyé par Montgomery, incendia la plupart des maisons nobles du pays de Soule qui durent être relevées par la suite.","architecture":"RUTHIE, construit  au  XVe siècle; remanié au XVIIe siècle et au  XVIIIe siècle se compose actuellement de deux corps de logis du XVIIIe siècle, flanqués de deux grosses tours du XVe siècle. L'intérieur conserve des lambris de chêne du XVIIIe siècle dans une salle à manger, surmontés de panneaux formés par des encadrements moulurés en plâtre. Dans la grande salle, il ne reste plus de l'ancienne décoration qu'une belle cheminée en chêne du XVIIIe siècle au plafond des poutres fort bien moulurées.","habitants":"Baron de Sénégas\r\n        \"","divers":"Château de Ruthie 43° 08' 59 nord, 0° 56' 02 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Ruthie_1.jpg","../../jctruffet.com/image/image_64/64_Ruthie_2.jpg","../../jctruffet.com/image/image_64/64_Ruthie_3.jpg","../../jctruffet.com/image/image_64/64_Ruthie_4.jpg"]},"Consult_chateau_formulaire5ae5":{"id":"Consult_chateau_formulaire5ae5","dept":"64","canton":"Serres-Castet","commune":"Taron Sadirac Viellenave","nom":"Sadirac","type":"Château","periode":"XVIII","histoire":"SADIRAC, la vicomté de Sadirac, vassale de celle de Béarn, comprenait les paroisses de Maumusson, Ribarrouy, Sadirac, Taron et Viellenave. Entre 1790 et 1794, Taron absorbe Viellenave, qu'elle recède entre 1795 et 1800. En 1822, la commune fusionne avec Sadirac et Viellenave pour former la nouvelle commune de Taron-Sadirac-Viellenave.                        En contrebas de la motte médiévale, on peut apercevoir une demeure de notable du XVIIIe siècle, dite maison Pehau. Ce petit château est édifié entre 1784 et 1790 par Jacques de Casemajor, baron dOneix et dernier seigneur de Sadirac.","architecture":"Au XVIIIe siècle, parmi les parties constituantes de la propriété, on compte dautres bâtiments à vocation agricole, tels une grange, une étable à vaches, une porcherie, un pigeonnier, une remise, un logement, un chai et un pressoir. Composé dun étage carré et dun étage de comble, le corps de logis est relativement allongé. Il est couvert dun toit en ardoises et en tuiles plates mécaniques. Des décors intérieurs dorigine, il ne reste aujourdhui quun escalier logé dans la pièce centrale.  Létat de la propriété sétant détérioré, celle-ci a fait lobjet dune restauration à la fin du XXe siècle.","habitants":"Famille de Jacques de Casemajor\r\n        \"","divers":"Château de Sadirac","gps":"","images":["../../jctruffet.com/image/image_64/64_Sadirac_1.jpg","../../jctruffet.com/image/image_64/64_Sadirac_2.jpg","../../jctruffet.com/image/image_64/64_Sadirac_3.jpg"]},"Consult_chateau_formulairefeda":{"id":"Consult_chateau_formulairefeda","dept":"64","canton":"Serres-Castet","commune":"Anoye","nom":"Salettes_Anoye","type":"Château","periode":"XVI","histoire":"SALETTES, place stratégique importante au Moyen Âge située sur le chemin de Compostelle,  la commune dAnoye voit sinstaller nombre de familles nobles. Cest le cas des Labarthe qui font élever le château de Salettes à la fin du XVIe siècle.\r\nAprès avoir appartenu à la famille Labarthe de 1666 à 1746  puis par mariage aux Nays-Candau, le château doit son nom à ses derniers propriétaires, les Salettes, qui loccupent dans la seconde moitié du XIXe siècle. Aujourdhui, le château, bien conservé, présente, à louest, dadmirables jardins à la française","architecture":"SALETTES, édifice XVIIe siècle  remanié au XVIIIe siècle. Installé en bordure du village dAnoye, cette imposante demeure possède un étage carré et un étage en surcroît. Elle est le témoin des luttes de pouvoirs entre les nobles installés à Anoye aux XVIIe et XVIIIe siècles. En effet, les Labarthe, puis les Nays-Candau, sopposent aux seigneurs dAstis, fondateurs de labbaye laïque. On rapporte même un duel pour des raisons dÉglise entre Jacques dAstis et Jean de Labarthe qui entraîne la mort de ce dernier.","habitants":"Famille de Salettes\r\n        \"","divers":"Salettes  43° 23' 37 nord, 0° 08' 32 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Salettes_Anoye_1.jpg"]},"Consult_chateau_formulaire1060-2":{"id":"Consult_chateau_formulaire1060-2","dept":"64","canton":"Mouguerre","commune":"Bardos","nom":"Salha_Bardos","type":"Château","periode":"XVII","histoire":"SALHA-BARDOS, en plein centre de Bardos se dresse une magnifique demeure, le château de Salha qui abrite aujourdhui les services de la mairie. Le château de Salha est construit à lemplacement dune ancienne demeure médiévale mentionnée en 1546 comme « la salle du dit lieu de Bardos appelée Vinetaire tenue à la foi et hommage par Charles Ier de Gramont ». Les terres de Bardos sont alors sous la souveraineté de lune des branches cadettes des seigneurs de Gramont depuis 1285. À la fin du XVe siècle, la propriété est acquise par la famille Suhigaray de la Salle de Bardos. En 1676, elle est transmise à la famille Salha qui obtient par alliance la seigneurie de Bardos.  En 1954, le château de Salha, vendu à une association, est converti en colonie de vacances. La mairie en fait lacquisition en 1978. Vers 1980, il fait lobjet dune restauration afin daccueillir la mairie et des logements sociaux. Les dépendances, dabord transformées en école, sont finalement converties en appartements, en commerces et en salles dactivités et dexpositions mises à la disposition des associations.    Le manoir dit château de Miremont fut érigé au XVe siècle, puis agrandi au cours du XIXe siècle. Cette demeure, qualifiée au XVIIe siècle de \"maison noble\", appartient aux De Miremont, famille d'écuyers de Bardos.","architecture":"Le château de Salha fut construit dans la seconde moitié du XVIIe siècle. Un édifice primitif médiéval existait cependant dès 1456. Aucun vestige architectural n'est aujourd'hui existant, dont les armes ont été conservées par ma municipalité pour représenter la commune. il sera ensuite remanié au XIXe siècle en résidence bourgeoise par plusieurs propriétaires successifs. Le château reste entre les mains des Salha jusquau XIXe siècle, où il est transformé en demeure bourgeoise par un négociant de Bayonne. Il ne reste ainsi rien de nos jours de lancienne demeure médiévale. Le château de Salha est construit postérieurement par étapes successives. Il se compose de deux corps de bâtiment en équerre surmontés de deux étages carrés. Laile sud serait de la première moitié du XVIIIe siècle, laile nord de la seconde moitié.  Deux tours édifiées à la fin du XVIIe siècle encadrent le bâtiment : lune circulaire à quatre niveaux, lautre octogonale à cinq niveaux. Toutes deux sont coiffées de toits polygonaux en ardoise.  Miremont corps de logis de plan rectangulaire à trois niveaux toit à deux pans accolé d'une tour exagonale à quatre niveaux.","habitants":"Famille de Charles Ier de Gramont \r\n        \"","divers":"Château de Salha 43° 22' 47 nord, 1° 14' 01 ouest et le manoir de Miremont","gps":"","images":["../../jctruffet.com/image/image_64/64_Salha_Bardos_1.jpg","../../jctruffet.com/image/image_64/64_Salha_Bardos_2.jpg","../../jctruffet.com/image/image_64/64_Salha_Bardos_3.jpg","../../jctruffet.com/image/image_64/64_Salha_Bardos_4.jpg","../../jctruffet.com/image/image_64/64_Salha_Bardos_5.jpg"]},"Consult_chateau_formulairec10f-2":{"id":"Consult_chateau_formulairec10f-2","dept":"64","canton":"Orthez","commune":"Saliès de Béarn","nom":"Saliès_Chateau","type":"Château","periode":"XVII-XVIII","histoire":"A Saliès de Béarn,le pavillon de Médicis, le Castillet, le château des Cheminots, le pavillon de Louis XV du XVIIIe siècle de Chibas,Le chateau de Saint-Pé, les grands hôtels et les thermes, maison Saint Joseph, de bellevue.   chateau d'Hermines                           SALIES  Le centre ville, ancien, est intéressant par sa construction centrée sur la place du Bayaà, où se situait la fontaine salée. On y voit de nombreuses maisons à colombages et murs en saillies dans les vieilles ruelles. Une fontaine commémorative du millénaire de la cité fut édifiée en 1927. On trouve rue Larroumette les vestiges du château de Saint-Pé, noté comme \"Domenjadure\" ou maison noble avant 1385, lors du dénombrement des maisons de Béarn sous le vicomte Gaston III Febus (+ 1391).  Restauré en 1611, aurait abrité un tribunal de procès en sorcellerie au XVIIe siècle. La rue des Docteurs-Foix comporte de belles maisons de maîtres dont le Pavillon Louis XV. Située à la limite du vieux bourg, dans le paysage des bords du Saleys, cette demeure fut édifiée vers 1770-1780. Elle est la maison natale des Coustalé Larroque dont le plus illustre représentant, Jean Brice, fut mèdecin de Napoléon III et ardent protagoniste des eaux de Salies.       Les grands hôtels,","architecture":"Le grand Hôtel a servi de décor au film de Jean Périssé sorti en mars 2008 L'Occitanienne ou le dernier amour de Chateaubriand.   Le centre ville, ancien, est intéressant par sa construction centrée sur la place du Bayaà, où se situait la fontaine salée.   \r\nSituée à la limite du vieux bourg, dans le paysage des bords du Saleys, cette demeure fut édifiée vers 1770-1780. Elle est la maison natale des Coustalé Larroque dont le plus illustre représentant, Jean Brice, fut mèdecin de Napoléon III et ardent protagoniste des eaux de Salies.    St -PE,  hôtel BELLEVUE, édifié l'Hôtel Bellevue en 1891 , le Hameau Bellevue est actuellement un Institut d'Education Motrice et de Formation Professionnelle (I.E.M.F.P.). Il accueille des enfants, des adolescents et des jeunes adultes en situation de handicap moteur.  Lardaas Tour d'époque Jeanne III de Navarre Albret, XVIe siècle.\r\nGd hotelcasino La construction du coté gauche de la tour fut ajoutée dans l'époque Napoleon III.      Hôtel construit en 1891-1892 par Xavier Saint-Guily, qui a participé au chantier de la basilique de Lourdes.       Les THERMES  Le premier établissement thermal, construit en 1857 dans l'enceinte de l'usine à sel de Salies et agrandi en 1880, a brûlé en 1888. Reconstruction dès 1889 par l'architecte palois Lagarde d'un bâtiment beaucoup plus vaste, de style romano-byzantin. Une salle des fêtes, qui complétait l'édifice, fut remplacée en 1930 par une piscine après un incendie.","habitants":"Famille de  Coustalé Larroque\r\n        \"","divers":"Pavillon Louis XV de Coustalé Laroque grav 1 et 2, le Castillet  grav 3, Saint-Pé  grav 4-5, Bellevue grav 6, Chibas grav 7, Hermines grav 8, Lardaas grav 9","gps":"","images":["../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_1.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_2.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_3.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_4.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_5.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_6.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_7.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_8.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_Chateau_9.jpg"]},"Consult_chateau_formulaire46ea":{"id":"Consult_chateau_formulaire46ea","dept":"64","canton":"Orthez","commune":"Saliès de Béarn","nom":"Saliès_de_Béarn","type":"Patrimoine","periode":"XV_XIX","histoire":"SALIES de BEARN, était un fief  vassal de la vicomté de Béarn, la seigneurie de Saint-Martin appartenait au marquisat de Gassion.  Selon la légende, un sanglier serait à l'origine de la ville au XVIIe siècle : blessé par des chasseurs, il serait allé mourir dans les marais au milieu des forêts qui recouvraient la région. Les chasseurs l'ayant retrouvé plusieurs jours après dans un bon état de conservation découvrirent à cette occasion que le marais contenait du sel. Le sel était alors fort prisé à l'époque et une bourgade se forma autour de cette découverte exceptionnelle. Depuis lors, l'emblème de la ville est un sanglier.  En réalité, le lieu est nommé Salinae dès le Xe siècle au cartulaire de Bigorre.  En fait, de l'eau dix fois plus salée que celle de l'océan est exploitée depuis plus de 3500 ans.  Depuis 1587, ce sont les « voisins de la fontaine salée » qui sont les propriétaires de génération en génération de l'eau salée et de différents bâtiments. L'exploitation familiale et artisanale a laissé place à une production semi artisanale de sel alimentaire et de bains au sein des salines, aujourd'hui gérées par la compagnie Fermière. Salies-de-Béarn connut son apogée au XIXe siècle et pendant la première moitié du XXe siècle, les thermes étaient réputés et de grands hôtels de luxe accueillaient une clientèle","architecture":"Le centre ville, ancien, est intéressant par sa construction centrée sur la place du Bayaà, où se situait la fontaine salée. On y voit de nombreuses maisons à colombages et murs en saillies dans les vieilles ruelles. Une fontaine commémorative du millénaire de la cité fut édifiée en 1927. On trouve une rue Larroumette les vestiges du château de Saint-Pé.\r\nLa rue des Docteurs-Foix comporte de belles maisons de maîtres dont le Pavillon Louis XV. Les grands hôtels, tels l'hôtel du Parc qui accueille aujourd'hui un casino et un service hôtelier et l'hôtel de France et d'Angleterre (ruiné par un incendie) témoignent de l'ancien lustre de la ville.\r\nLe casino de Salies-de-Béarn, centre de congrès, date de 1930. Le grand hôtel du Parc fut édifié en 1891 tout comme l'hôtel Bellevue. Ces trois constructions sont recensées aux M.H, tout comme le kiosque à musique, situé dans le jardin public.\r\nLa maison natale des Coustalé Larroque, cette demeure fut édifiée vers 1770-1780, dont le plus illustre représentant, Jean Brice, fut mèdecin de Napoléon III et ardent protagoniste des eaux de Saliès de plan en équerre à deux niveaux.\r\nLe musée du sel et des traditions béarnaises présente des collections traduisant l'activité économique et traditionnelle de la région.","habitants":"marquisat de Gassion\r\n        \"","divers":"Château de Médicis grav 1 et vieux château grv 2, des Cheminots grav 3, des Thermes grav 4, le château hôtel de France incendié grav 5  Casino grav 6 ,                       fig 8. 43° 28' 14 nord, 0° 55' 26 ouest St-Joseph grav 7","gps":"","images":["../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_1.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_2.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_3.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_4.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_5.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_6.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_7.jpg","../../jctruffet.com/image/image_64/64_Sali%c3%a8s_de_B%c3%a9arn_8.jpg"]},"Consult_chateau_formulaire26da":{"id":"Consult_chateau_formulaire26da","dept":"64","canton":"Artix","commune":"Sallespisse","nom":"Sallespisse","type":"Château","periode":"XVII","histoire":"SALLES, à lorigine, la forteresse appartient à linfluente famille de Salles qui y reçoit le chroniqueur Froissart, grand témoin de cette époque. Dautres personnalités de la noblesse béarnaise sy succèdent, jusquà sa destruction par un incendie, lors des guerres de Religion. A la fin du XIVe siècle, c'est la famille de Laur qui possède la seigneurie de Salles. En 1608, Jean Bertrand de Salles achète aux Grammont la baronnie de Gabaston, en 1617, celle de Lescun. En 1630, il revend cette dernière, le titre de la baronnie de Lescun étant porté sur le nom de Laur. On compte notamment, les familles de Navailles et de Laur, dont un membre, Messire Philippe de Laur, était en 1705, seigneur de Lescun, seigneur de Salles, Bonnegarde et autres lieux, gouverneur de la ville et château dOrthez. Le manoir de Salles passe à la fin du XIXe siècle à la famille de Bigaud de Cazanove dont un des membre est le poète Arnaury de Cazanove. Celui-ci y reçoit son ami et poète dOrthez Francis Jammes, qui rend hommage au lieu et à sa source dans ces vers : « Il est près de Salles, à droite, une source claire, des fougères noires. Le dernier baron de Laur meurt sans descendant en 1837.  A la fin du XIXe siècle, le château de Salles appartient à la famille de Bigault de Cazanove.","architecture":"Le manoir de Salles est construit à lemplacement dun ancien château défensif, établit sur une motte autour de laquelle sétend la commune de Sallespisse.  Les corps de logis à 4 travées, de larges fenêtres à corniches, saillants, assez espacés, sur 2 niveaux. Les 2 fenêtres de droite, à l'étage, ont conservé un meneau. La porte à simples pilastres, est dans l'angle droit. Au dessus des 2 travées centrales, se trouvent 2 grandes lucarnes, pendantes, à croisées de pierre, coiffées de frontons semi-circulaires, avec 3 boules. Le nouveau château, ou manoir de Salles, épouse la forme de la motte bien conservée, sur laquelle il est élevé. Il se voit complètement remanié une première fois au XVIe siècle, puis au début du XVIIe siècle et au cours des siècles qui suivent. Autour de la motte, aménagée en cour, les bâtiments arborent de multiples styles architecturaux, dus à ses nombreuses restaurations. On descend ainsi dans la cour par un escalier monumental, issu de la fin du XVIIIe siècle. De plus, un vestibule à colonnes engagées du début du XIXe siècle dessert, à lintérieur, des pièces du XVIIe siècle. Lors des conflits franco-anglais en Béarn, on établit dans le manoir de Salles une infirmerie, qui offre un asile bienvenu, aux blessés de guerre.","habitants":"Famille de Salles \r\n        \"","divers":"Château de Salles à Sallespisses","gps":"","images":["../../jctruffet.com/image/image_64/64_Sallespisse_1.jpg","../../jctruffet.com/image/image_64/64_Sallespisse_2.jpg","../../jctruffet.com/image/image_64/64_Sallespisse_3.jpg","../../jctruffet.com/image/image_64/64_Sallespisse_4.jpg"]},"Consult_chateau_formulairee8d4":{"id":"Consult_chateau_formulairee8d4","dept":"64","canton":"Artix","commune":"Sault de Navailles","nom":"Sault_Navailles","type":"Vestiges","periode":"XI-XIV","histoire":"Sault de Navailles l'ancien château de Sault et le château de Vignes.                                             SAULT,  la vicomté de Sault était placée entre le duché d'Aquitaine (ou Gascogne selon l'époque), dont elle relevait, et la vicomté de Béarn. Anglais et Béarnais se disputent tout au long du XIIIe siècle la suzeraineté de cette seigneurie et le contrôle de son château, qui occupe alors une position stratégique, sur une motte dominant la vallée du Luy-de-Béarn, à la frontière historique entre Aquitaine et Béarn. De cette situation, les seigneurs féodaux pouvaient surveiller et guetter le moindre signe étranger depuis la tour qui surplombait la Carrère (rue principale aujourd'hui nommée rue de France) et contrôler les passages du Luy. Le château subit  les assauts des vicomtes de Béarn et des ducs d'Aquitaine : le vicomte de Leicester en fait le siège en 1225, il est pris par Simon V de Montfort en 1249. En 1263 le seigneur de Sault, allié de Gaston VII de Béarn, est contraint d'en abattre le donjon. Gaston de Béarn y est retenu prisonnier en 1273 sur ordre d'Édouard Ier d'Angleterre. Le siège par le duc d'Anjou en 1374 porte un coup fatal au château .                                                                 VIGNES, le château de Vignes, ou de Castelbajac, est construit au XVIIe siècle. Son appellation renvoie aux noms des seigneurs qui sy succèdent jusquau XIXe siècle, après avoir acheté la baronnie de Sault.  Le château de Vignes est inscrit à linventaire des M.H., depuis 1996.","architecture":"SAULT, de nos jours, seuls subsistent les vestiges d'une tour de forme rectangulaire aux murs épais, hauts d'une quinzaine de mètres et d'une partie du mur d'enceinte. Le donjon comportait deux étages composés chacun d'une seule pièce. Celle du rez-de-chaussée donnait sur une cour intérieure, tandis qu'on accédait à l'étage par des trappes ou une échelle. La cour intérieure devait accueillir des bâtiments dont le corps de logis, semble-t-il, contre le mur Est. Il n'en reste que peu de vestiges : un pan de mur et des soubassements visibles du sol.   C'était un chateau à motte, construit au XI au XIVe siècle. Cette ancienne forteresse, construite sur une motte castrale, datant du XIIe siècle.. Il ne subsiste aujourd'hui, du château de sault, qu'une tour restaurée et un pan de mur.\r\nVIGNES, de style Renaissance, le château est composé dun corps de logis orienté à lest. Sa façade est remaniée selon un style néo-gothique au XIXe siècle. Lentrée principale, sur un perron dune dizaine de marches, se trouve au centre de la façade Louis XIII. On peut aussi remarquer que la porte à pilastres et son fronton sont taillés dans des blocs de calcaire de la région.  Enfin, le toit pentu de tuiles rouges, est typiquement béarnais Le bâtiment principal est flanqué de deux pavillons carrés, plus hauts dun étage. De plus, il est annexé dun petit hangar ainsi que dune chapelle, tous deux bâtis avec les mêmes matériaux locaux.","habitants":"Vicomtes de Béarn\r\n        \"","divers":"Château de Sault 43° 32' 59 nord, 0° 40' 22 ouest, des Vignes 43° 33' 16 nord, 0° 41' 13 ouest grav 4 et 5.","gps":"","images":["../../jctruffet.com/image/image_64/64_Sault_Navailles_1.jpg","../../jctruffet.com/image/image_64/64_Sault_Navailles_2.jpg","../../jctruffet.com/image/image_64/64_Sault_Navailles_3.jpg","../../jctruffet.com/image/image_64/64_Sault_Navailles_4.jpg","../../jctruffet.com/image/image_64/64_Sault_Navailles_5.jpg"]},"Consult_chateau_formulaire075b":{"id":"Consult_chateau_formulaire075b","dept":"64","canton":"Orthez","commune":"Sauveterre de Béarn","nom":"Sauveterre_Béarn","type":"Tour-Château","periode":"XII-XV","histoire":"A Sauveterre de Béarn le château de Marsan, de Sus et des barons de Salettes aujourd'hui hôtel de ville, ancienne demeure du XVIe siècle, autrefois propriété des \"maquis de Nays, comtes de Salette.      SAUVETERRE, au XVe siècle, la cité est toujours une ville-frontière économique, de garnison et de réception royale. En effet, lors de la campagne de Catalogne de 1456 à 1466, en 1462 puis en 1463, Gaston IV de Foix-Béarn reçoit le roi de France Louis XI à Sauveterre. Ce dernier rencontre en 1462 Jean II, roi dAragon, sur le pont dOsserain. Les vicomtes de Béarn, deviennent légitimement rois de Navarre à la suite  dune guerre de succession  en 1479. Sauveterre jouera un rôle important dans lindépendance de la Navarre durant le XVIe siècle grâce à son statut de ville-frontière. Un troisième bourg, « le bourg Pléguignou » va être totalement réaménagé comme un bourg militaire face à la Navarre. Larsenal y est dailleurs édifié dès le XVe siècle.                                                                      Tour de Montréal  L'histoire de cette tour débute aux alentours du XIIe siècle comme pour le reste du village. Elle avait pour but de défendre cette Sauveté placée à un endroit stratégique entre la Navarre et l'Aquitaine, le long d'une boucle du Gave d'Oloron.   Durant de nombreux siècles les terribles meurtrières les puissants créneaux ont longtemps fait trembler les armées redoutables d'Espagne et d'Angleterre. En 1523 gardienne du Béarn et de sa souveraineté, défendant Sauveterre, résistant à l'armée venant d'Espagne, conduite par le prince d'Orrange, Philibert de Challon.  Le donjon du château Vicomtel, longeant la courtine Sud, seigneurs et chevaliers pouvaient se réfugier dans ces murs. Au deuxième étage celui du hourd de bois, la belle baie géminée éclairait le logement du seigneur.                                               Manoir de Marsan à Sauveterre hôtel restaurant d'andré Capdet.","architecture":"La tour Montréal,  classé MH (1886) bâtie au cours du XIIe siècle, haute de 37 mètres, était une tour de défense et d'habitation. Elle servait à surveiller les incursions espagnoles et basques. Elle abrite aujourd'hui la maquette reconstituant la cité médiévale de Sauveterre entre les XIIIe et XVIe siècles. A l'instar de la Tour Moncade d'Orthez, elle faisait parti d'un ensemble plus vaste aujourd'hui disparu. Toutefois cette massive tour de 30 mètres de hauteur est parvenue presque intacte à nos jours, malgré les tumultes connus dans cette partie de la France.          La maison forte. Il s'agit d'un ancien bastion qui avait pour but de protéger la ville. Des meurtrières étaient disposées sur sa façade, elles sont de nos jours couvertes d'enduit.  De très nombreuses meurtrières sur les côtés Sud et Est de l'édifice qui prend une forme rectangulaire de 15 mètres de longueur pour 10 de largeur. Elle était partie intégrante d'un ensemble défensif assez complet comprenant des remparts, 3 ponts fortifiés, une maison forte, des portes intermédiaires. Les ruines du château vicomtal,  Inscrit MH (2014)30, bâti par Gaston VII de Béarn (1225-1290) et remanié par Gaston Fébus (1349-1391) au XIVe siècle. Lhôtel de ville, ancienne demeure du XVIe siècle, autrefois propriété des \"maquis de Nays, comtes de Salette. La porte de Lester du XIIe siècle. La porte du Datter,  Inscrit MH en 1937  ainsi que les remparts du XIIe au XIXe siècles.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Tour de Montréal  grav de 1 à 6 143° 23' 53 n
