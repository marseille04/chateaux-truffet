ord, 0° 56' 23 ouest Château des baron de Salette grav 7 de Marsan grav 8 et de Sus grav 9","gps":"","images":["../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_1.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_2.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_3.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_4.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_5.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_6.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_7.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_8.jpg","../../jctruffet.com/image/image_64/64_Sauveterre_B%c3%a9arn_9.jpg"]},"Consult_chateau_formulairea56e-2":{"id":"Consult_chateau_formulairea56e-2","dept":"64","canton":"Serres-Castet","commune":"Arrosès","nom":"Sauvéméa","type":"Château","periode":"XVIII","histoire":"SAUVEMEA, en 1564, Jean de Mauret, écuyer de la Reine Jeanne dAlbret  achète la seigneurie de Sauvéméa. Ce Capitaine Huguenot commande une compagnie de vingt arquebusiers à cheval. Il est nommé capitaine de Morlaas en 1569. Il fait son testament le 3 octobre 1592 et demande à être enterré près de la tour qui se trouve au couchant. Au lieu-dit Mombet se trouve une demeure de notable construite au XVIIIe siècle, dite château de Sauvéméa. On y trouve une dalle funéraire datée de 1762 ainsi qu'un buffet et une girouette, tous deux du XVIIIe siècle. Une ferme, au lieu-dit Flandres, date de la même époque.","architecture":"Le château Sauvéméa est un gîte de pays aménagé dans les dépendances d'une demeure du XVIIIe siècle, sur une propriété viticole, au cur du vignoble du Madiran. Sauvéméa est situé sur la commune dArroses à la frontière du Béarn, de lArmagnac et de la Bigorre. Pour la première fois en 1323, le nom de Sauvéméa est mentionné. Le premier dénombrement fait en Béarn en 1385 atteste lexistence de six foyers à Sauvéméa.  Léthymologie de Sauvéméa pourrait sexpliquer ainsi : SAUVE qui au XII siècles voulait dire clairière défrichée ou cultivée et MEA du latin, à  moi ce qui peut se traduire par terre noble, terre franche.","habitants":"Famille de Jean de Mauret\r\n        \"","divers":"Château de Sauvéméa  43° 33' 06 nord, 0° 06' 22 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Sauv%c3%a9m%c3%a9a_1.jpg","../../jctruffet.com/image/image_64/64_Sauv%c3%a9m%c3%a9a_2.jpg","../../jctruffet.com/image/image_64/64_Sauv%c3%a9m%c3%a9a_3.jpg"]},"Consult_chateau_formulaire1262":{"id":"Consult_chateau_formulaire1262","dept":"64","canton":"Serres-Castet","commune":"Simacourbe","nom":"Simacourbe","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Simacourbe celui de Moncaudet et celui de Parage.                                                      MONCAUBET Des vestiges d'un ensemble fortifié. On peut voir les vestiges d'un château au lieu-dit Moncaubet, datant du XVIe siècle tout comme le château dit de Parage, ou les vestiges d'un pigeonnier  dépendant de l'ancienne abbaye laïque.  Le presbytère fut, quant à lui, édifié à la fin du XVIIIe siècle. On y trouve une croix d'autel du XIXe siècle et deux statues du XVIIe siècle inventoriées par le ministère de la Culture. Bernard-Auguste de Parage : né à Pau, propriétaire du château éponyme, maire de Simacourbe.                                                             PARAGE  Le château dit de Parage est construit au XVIIIe siècle à lemplacement de lancienne abbaye laïque de Simacourbe, signalée dès le XVIe siècle.  Ce château, est la propriété des Gassion puis du seigneur de Barinque et Escurès, Jacques de Lomagne Tarride. Il appartient au XIXe siècle aux Parage qui donnent leur nom à ce château, que la commune installe en 1873 la mairie, lécole des filles et le logement de linstituteur. Aujourdhui, elle abrite toujours lécole municipale.","architecture":"MONCAUDET  vestiges du château  seigneurie jumelée avec celle de Lalongue jusqu' en 1668, achetée alors par Charles de Mirassor. Appartient aux Mirassor jusqu' à la Révolution. Pas de maison en 1548. Edifice en ruine au XIXe siècle, portée sur la carte de Cassini. Deux pierres sculptées du  XVIe siècle (extrémités de rampants de toit) déplacées au château de Corbère.\r\nPARAGE en 1754, Jacques de Lomagne Tarride, seigneur de Barinque et Escurès meurt dans son château de Simacourbe. Cette demeure est construite en réutilisant des bâtiments antérieurs, qui abritent alors labbaye laïque. De lancienne abbaye du XVIe siècle subsistent un écu armorié sur le linteau de la porte et les décors des baies.  Cette vaste demeure rectangulaire, qui possède un étage carré et un étage sous combles, est flanquée dune tour descalier hors-uvre circulaire. Elle présente en façade une disposition asymétrique, indiquant le réemploi du corps de logis antérieur. La demeure fut sans doute reconstruite peu avant cette date en réutilisant des bâtiments antérieurs.","habitants":"Famille de Jacques de Lomagne Tarride                         Famille de Bernard-Auguste de Parage\r\n        \"","divers":"Château de parage à Simacourbe","gps":"","images":["../../jctruffet.com/image/image_64/64_Simacourbe_1.jpg","../../jctruffet.com/image/image_64/64_Simacourbe_2.jpg","../../jctruffet.com/image/image_64/64_Simacourbe_3.jpg","../../jctruffet.com/image/image_64/64_Simacourbe_4.jpg"]},"Consult_chateau_formulairea9a4":{"id":"Consult_chateau_formulairea9a4","dept":"64","canton":"St-Jean de Luz","commune":"Ciboure","nom":"Socoa","type":"Fort","periode":"XVII","histoire":"SOCOA le fort de Socoa à Ciboure est un édifice important dans l'histoire de la cité. L'histoire du fort commence sous Henri IV. Soucieux de protéger Saint-Jean-de-Luz de l'ennemi espagnol, il envisage de construire une forteresse. Des divergences entre les différentes communes feront échouer le projet. Le fort de Socoa ne verra le jour que sous le règne de Louis XIII. En 1636, les espagnols prennent le fort et nomme la citadelle fort de Castille. Quelques années plus tard, la souveraineté française est rétabli, l'ouvrage est alors achevé et prend le nom de fort de Socoa.","architecture":"Le fort du Socoa date du XVIIe siècle construit pour protéger Ciboure des invasions espagnoles, ce fort est construit autour dune tour centrale. Le fort mèle architecture militaire du Moyen-Age et de style Vauban. En 1686, Vauban en tournée d'inspection dans les Pyrénées entreprend de renforcer le fort et projette de construire une jetée pour améliorer l'accès. Les travaux du Fort furent dirigés par Fleury et s'achevèrent en 1698. Le site abritait une caserne et une chapelle, habité par les douaniers au XIXe siècle et une garnison de la marine nationale au début du XXe siècle, il ne fut rendu aux civils quen 1935, avant larrivée des troupes allemandes. A la Libération, après avoir été incendié, il fut restauré par larchitecte A. Pavlovsky. De 1947 à 2002, il fut occupé par les activités liées à la voile. La tour est inscrite à linventaire des M.H depuis 1925 et lensemble du fort depuis 2008. La communauté de communes sud pays Basque la racheté à létat le 3 mai 2012. \r\nLintérieur du fort ne se visite pas mais on peut se promener à ses pieds et sur sa longue digue de protection doù lon a une vue magnifique sur la mer et sur les côtes.","habitants":"Maréchal VAUBAN\r\n        \"","divers":"Fort de Socoa 43° 23' 46 nord, 1° 41' 00 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Socoa_1.jpg","../../jctruffet.com/image/image_64/64_Socoa_2.jpg","../../jctruffet.com/image/image_64/64_Socoa_3.jpg","../../jctruffet.com/image/image_64/64_Socoa_4.jpg","../../jctruffet.com/image/image_64/64_Socoa_5.jpg","../../jctruffet.com/image/image_64/64_Socoa_6.jpg","../../jctruffet.com/image/image_64/64_Socoa_7.jpg","../../jctruffet.com/image/image_64/64_Socoa_8.jpg","../../jctruffet.com/image/image_64/64_Socoa_9.jpg"]},"Consult_chateau_formulaireeea8":{"id":"Consult_chateau_formulaireeea8","dept":"64","canton":"Anglet","commune":"Anglet","nom":"Sofia","type":"Château","periode":"XIX","histoire":"SOFIA La villa Sofia à Anglet demeure lun des plus intéressants exemples de larchitecture néo-médiévale et rococo de la côte basque. À partir de la fin du XIXe siècle, la ville de Biarritz se peuple de plus en plus. Pour échapper à la foule et à la pression immobilière, certains résidents se replient à Anglet. La princesse Yourievsky, épouse du tsar Alexandre II, choisit de sinstaller dans la villa Sofia, qui\r\n voit passer le roi dAngleterre Édouard VII, la princesse de Lucinge-Faucigny, le baron Cottu, le comte de Laborde, ou encore la princesse Barriatinsky.","architecture":"La villa Sofia à Anglet demeure lun des plus intéressants exemples de larchitecture néo-médiévale et rococo de la côte basque de la fin du XIXe siècle, fut construite dans la forêt de pins attenant au golf de Chiberta, et dispose de vues longues sur le golf qui sétend à ses pieds. Mais la disparition de la pinède a profondément modifié la physionomie du jardin : aujourdhui ouvert, lumineux et plus sec, il est peu à peu occupé par des végétaux méditerranéens, tout en restant adapté au milieu salin,    On y accède par un portail dont les piliers sont ornés de sculptures représentant un loup et un sanglier. Depuis le portail, on aperçoit une façade chargée, encadrée de deux tours, dont lune est crénelée. Le corps de bâtiment est surmonté dun dôme Le jardin est parsemé de statuaires en fonte. Des monogrammes portant la lettre S sont sculptés dans les socles de pierre.\r\nLarchitecture extravagante de la villa Sofia saccorde à la perfection avec la personnalité fantasque de la princesse. La demeure est lécrin des réceptions éclatantes quelle aime donner.","habitants":"La princesse Yourievsky\r\n        \"","divers":"Villa Sofia à Anglet","gps":"","images":["../../jctruffet.com/image/image_64/64_Sofia_1.jpg","../../jctruffet.com/image/image_64/64_Sofia_2.jpg"]},"Consult_chateau_formulaireeda0-2":{"id":"Consult_chateau_formulaireeda0-2","dept":"64","canton":"Mouguerre","commune":"Urcuit","nom":"Souhy","type":"Château","periode":"XVII-XIX","histoire":"SOUHY, la commune dUrcuit possède, au lieu-dit de Souhy, un château qui appartient à la famille éponyme, dont certains membres, sous lAncien Régime, sont au service des seigneurs de Gramont comme juges de Bidache. Le château est construit vers 1631 comme latteste linscription portée sur lélévation est des dépendances. Il est cependant profondément remanié pendant la deuxième moitié du XIXe siècle. Lintérieur conserve deux cheminées du XVIIIe siècle.  Les armoiries de la famille de Souhy sont représentées à la clé de larc de la porte dentrée.","architecture":"SOUHY, le château appartient à la famille de Souhy au moins depuis le XVIIIe siècle, mais le château, en soit, date  du XVIIe siècle, avec des remaniements au XIXe siècle. Deux cheminées du XVIIIe siècle subsistent à lintérieur.  Sur lélévation Est des dépendances, on peut noter la date 1631. Sous lancien régime, certains membres de la famille de Souhy ont été au service des seigneurs de Gramont en tant que juges de Bidache. Le corps de logis de plan carré cantonné par 4 pavillons à couverture dardoise. Le cadastre de 1831 indique un corps de bâtiment qui reliait à langle nord-ouest le château aux dépendances.  Les dépendances divisées intérieurement en étable, écurie et bergerie possèdent un toit à longs pans à pignons couverts et couverture en tuile creuse.\r\n La chapelle privée où se déroulait les cérémonies des rogations possède un toit à croupes avec une couverture de tuile plate dite picon.\r\nLe gros oeuvre est constitué de calcaire, de moellon et denduit. Le décor est composé de sculptures.","habitants":"Famille de Souhy\r\n        \"","divers":"Château de Souhy à Urcuit","gps":"","images":["../../jctruffet.com/image/image_64/64_Souhy_1.jpg","../../jctruffet.com/image/image_64/64_Souhy_2.jpg"]},"Consult_chateau_formulaire0154":{"id":"Consult_chateau_formulaire0154","dept":"64","canton":"Orthez","commune":"St-Dos","nom":"St_Dos","type":"Château","periode":"XVI","histoire":"St-DOS le premier château de Saint-Dos date du XVIe siècle. Il constitue un bel exemple darchitecture civile en Béarn, issue de la Renaissance.  La demeure remplace une motte féodale dont le seigneur est « le Basque gentil », héros local.Pillé en 1793, il fut restauré par le baron de Crouseilhes qui y venait parfois. Occupé par les autorités allemandes de 1940 à fin 1942, puis par des métayers, il est aujourd'hui transformé en remise agricole mais décèle encore de très beaux éléments d'architecture Renaissance.\r\nLe château MOUSSEIGNE est une gentilhommière de la fin du XVIIe siècle qui porte le nom de la famille qui l'a construite. On y recense un Jean Mousseigne de Sendos en 1700, grands propriétaires terriens, devaient leur fortune surtout au commerce maritime. Au XVIIe siècle, ils commerçaient au-delà des mers et avaient d'importants actifs aux Indes, à l'île Maurice et à Saint-Domingue.                                                           A deux kilomètres au nord le château de Labernéde à Saint-Pé de Léren pas  d'information historique","architecture":"St-DOS, le château des comtes de Béarn Sendos (Sintos) à l'architecture civile du XVIe siècle, a remplacé une motte féodale. Le château primitif se trouvait à la jonction entre les terres du roi d'Angleterre et celles du vicomte du Béarn durant la guerre de cent ans. Cette remarquable bâtisse connait une histoire mouvementée. En 1728, le seigneur de Saint-Dos restaure le château, mais il est saccagé peu de temps plus tard, à la Révolution. Il devient ensuite propriété du baron Bomdibau de Crouseilhes, ministre des cultes de Napoléon III, puis passe de mains en mains.  Aujourdhui, le château de Saint-Dos est en ruine, mais présente de beaux vestiges. On peut admirer une façade noble aux fenêtres à meneaux et de nombreuses décorations intérieures encore intactes, dont une grande cheminée dorigine.          LABARNEDE corps de logis à deux niveaux, toits presque plat.","habitants":"Baron Bomdibau de Crouseilhes\r\n        \r\n        \"","divers":"Château de Saint-Dos","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Dos_1.jpg","../../jctruffet.com/image/image_64/64_St_Dos_2.jpg","../../jctruffet.com/image/image_64/64_St_Dos_3.jpg"]},"Consult_chateau_formulaire42f7":{"id":"Consult_chateau_formulaire42f7","dept":"64","canton":"Mauléon-Licharre","commune":"St-Etienne de Baigorry","nom":"St_Etienne_Baigorry","type":"Château","periode":"XV-XVII","histoire":"SAINT-ETIENNE de Baigorry, un camp protohistorique est situé au lieu-dit Lamotainpareta et des fortifications, sont présentes au lieu-dit Quarraquey ; La maison forte appelée Jauregia d'Urdos date des XIVe et XVIIe siècles,  le château d'Etxauz (Etchauz voir article). La ferme Itze  date du XVIIe siècle tout comme la ferme Makozain et la maison Martinxoloenia ;  La forge d'Etchaux montre encore des vestiges de ses hauts fourneaux datant des XVIIe et XVIIIe siècles. Elle produisait les canons et les boulets des corsaires ; La ferme Berhoa date du XVIIIe siècle tout comme les fermes Iturraldea, et Jokoberro et la maison Zuburia.                                            LIECERASSE ou Lizarazu est mentionné dès 1366  Cette famille joue un rôle important pour le royaume de Navarre. Elle est la souche de la maison de Beaumont. Louis II de Beaumont, comte de Lévin, livra la Navarre à Ferdinand le Catholique. Charles II le Mauvais, roi de Navarre, fut lié à la famille de Lizarazu.","architecture":"LIECERASSE  L'édifice actuel est dû à un remaniement du XVIIIe siècle. Il est ensuite restauré et remanié aux XIXe et XXe siècles, se compose d'un corps de logis avec élévation ordonnancée à 3 travées et 1 étage carré,  sont accolées à droite une partie de logis et à gauche une chapelle. Les murs sont édifiés en moyen appareil et moellon de calcaire et de grès recouverts d'enduit. Le corps de logis a reçu un toit à longs pans et croupe de tuiles creuses, la chapelle ainsi que la partie postérieure sont couvertes d'un toit en pignon. Les murs sont percés de croisées en calcaire, dont certaines portent des appuis et des larmiers moulurés. Des ouvertures sous lucarnes sont percées au niveau du comble. En élévation postérieure se trouve la partie la plus ancienne de l'édifice, vestiges de la maison forte médiévale, conserve un meneau qui pourrait dater du XVIIIe siècle.","habitants":"Famille de Lizarazu\r\n        \r\n        \r\n        \r\n        \"","divers":"Château à St-Etienne de Baygorry","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Etienne_Baigorry_1.jpg","../../jctruffet.com/image/image_64/64_St_Etienne_Baigorry_2.jpg","../../jctruffet.com/image/image_64/64_St_Etienne_Baigorry_3.jpg","../../jctruffet.com/image/image_64/64_St_Etienne_Baigorry_4.jpg"]},"Consult_chateau_formulaire75a9-2":{"id":"Consult_chateau_formulaire75a9-2","dept":"64","canton":"Morlaàs","commune":"Artigueloutan","nom":"St_Jean","type":"Château","periode":"XIX","histoire":"SAINT-JEAN  Aujourdhui, Artigueloutan conserve un patrimoine architectural intéressant, dont le château dit Saint-Jean faisant chambres dhôtes, de monsieur Patrice Nicaise, un moulin et léglise Saint-Jean-Baptiste, construite au milieu du XIXe siècle.","architecture":"St-Jean,  arrosée par lOusse et lOusse des Bois, deux affluents du gave de Pau, la commune dArtigueloutan possède un beau patrimoine de moulins et de châteaux, témoins de sa prospérité passée. Le village est en outre dominé par une motte au sommet de laquelle trône un camp dit de César.\r\nLe site dArtigueloutan est occupé dès lAntiquité comme en témoigne la présence de plusieurs camps retranchés : le « Castéra », le « Fort de César » et le « Casteide Bieilh » (vieux château), ainsi que celle de tumuli qui sont des éminences artificielles en terre ou en pierres recouvrant une sépulture. Lun de ces derniers a livré un important matériel lithique (galets, pierres, silex) ainsi que des céramiques.\r\nSous lAncien Régime, le territoire est divisé en deux seigneuries : celle du roi qui faisait administrer la justice par les jurats de Pau et la seigneurie locale.\r\nAvec ladjonction, au milieu du XIXe siècle, de lancienne commune « Lou Bouey », avec sa chapelle et son cimetière, le village a connu une période dexpansion démographique poussant son effectif à huit cents habitants en 1867.","habitants":"Monsieur Patrice Nicaise\r\n        \"","divers":"Château de Saint-Jean à Antigueloutan","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Jean_1.jpg","../../jctruffet.com/image/image_64/64_St_Jean_2.jpg"]},"Consult_chateau_formulaire174d":{"id":"Consult_chateau_formulaire174d","dept":"64","canton":"St-Jean de Luz","commune":"St-Jean de Luz","nom":"St_Jean_de_Luz","type":"Maison forte","periode":"XVII","histoire":"ST-JEAN-de-LUZ, la  maison de l'infante, son nom évoque celui de Joannot de Haraneder, riche armateur anobli par Louis XIII pour  services rendus au siège de La Rochelle.\r\nL'infante Marie-Thérèse d'Espagne résida dans cette élégantedemeure de style italien lors de son mariage avec Louis XIV en juin 1660.\r\nLOHOBIAGUE- Enea connue sous le nom de Maison Louis XIV, cette vieille demeure s'appelait à l'origine Lohobiague-Enea, pour avoir été construite en 1643 par Joannis de Lohobiague, riche et puissant armateur luzien. Le Roi-Soleil y résida pendant quarante jours, en mai et juin 1660, à  l'occasion de son mariage avec l'Infante Marie-Thérèse alors que le  cardinal Mazarin négociait sur place la signature du traité des  Pyrénées.","architecture":"A Saint-Jean de Luz,  maison Lohobiague-Enea, cette ancienne demeure a accueilli le roi Louis XIV, devenu la mairie. Elle est classée aux M.H. depuis 2005.   La maison Joanoenia, la maison de l'infante  M.H depuis 1925\r\n la maison de l'infante construite au début du XVIIe siècle, on visite sa chambre, antichambre du grand salon qui présente une remarquable décoration datant du XVIIe siècle : cheminée  monumentale de pierre sculptée de dauphins couronnés, têtes d'angelots, poutres richement décorées d'êtres mythiques, monstres fabuleux, fruits exotiques et constellations célestes. L'oratoire qui prolonge ce salon offre une vue splendide sur le port et la Rhune.  Cette maison noble est bâtie comme une maison traditionnelle  basque, son architecture extérieure est élégante et distinguée dans le  style très classique de l'époque.  Ses cinq pièces de l'étage de maître, riches en meubles d'époque, animées avec des personnages de cire permettent de découvrir l'histoire de la ville et du mariage royal.                                                           Villa Victoria de plan carrée à deux niveaux avec série de lucarnes sur un toit  brisé.","habitants":"Famille de Joannis de Lohobiague\r\n        \"","divers":"La maison de l'Infante 43° 23' 16 nord, 1° 39' 55 ouest, la maison de Lohobiague 3° 23' 15 nord, 1° 39' 50 ouest   Château victoria grav 7","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_1.jpg","../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_2.jpg","../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_3.jpg","../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_4.jpg","../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_5.jpg","../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_6.jpg","../../jctruffet.com/image/image_64/64_St_Jean_de_Luz_7.jpg"]},"Consult_chateau_formulaire4e6b":{"id":"Consult_chateau_formulaire4e6b","dept":"64","canton":"Mauléon-Licharre","commune":"St-Jean le Vieux","nom":"St_Jean_le_Vieux","type":"Château","periode":"XIII-XVI","histoire":"Plusieurs châteaux à st-Jean Irumberri (voir article) celui d'Harrieta  et de Salha.                                           St-JEAN  le VIEUX, en 1177, Richard Coeur de Lion y prit le château de Saint-Per.                                            HARRIETA  du  XIIIe siècle, très restauré au XIXe, qui fut le berceau d'un Harriet qui fonda Mobile en Alabama (USA).  Ce fut le plus grand centre hospitalier sur la route de Compostelle.                                     SALHA, situé à proximité du bourg, en bordure de la D18 qui part vers Iraty, date de 1368. C'est  le successeur de l'antique \"Salles des seigneurs\" ou \"Donapetri\", détruite en 1177 par Richard Cur de Lion.  La famille Salha devient une première fois propriétaire du château à la fin du XVIe siècle, puis au XVIIIe siècle, la maison étant ainsi appelée indifféremment depuis cette époque château Sala ou château de Saint-Pée. Le conseiller général, député et syndic Louis Etcheverry, célèbre pour avoir créé le journal Escualduna en 1887, le restaure au XIXe siècle. Aujourd'hui, le château Salha accueille des colonies de vacances.","architecture":"St-Jean le Vieux, Le camp romain et vicus routier, situé au lieu-dit Burgoxaharre, date des Ie et IIIe siècles ;\r\nLa motte féodale Kasko Handia est le seul vestige de lancien  château Saint-Perou Saint-Pée.\r\nLe château de Harrieta date de la fin du Moyen Âge, tout comme l'ancienne commanderie d'hospitaliers, l'actuelle ferme Arsoritzea.\r\nLes fermes Haritzaldea, Mariotenea et Sokarroa datent du XVIIIe siècle.\r\n Le château d'Harrieta fut édifié au XIIe siècle, il était en 1150-1170 la propriété de Othsoa de Ferriette et figure comme palacio en 1388. En 1710, il appartenait à Jean de Larralde. C'était, au XVIIe siècle, le berceau de la famille de Harrieta, exploitants de sel.  C'est dans ce château que se réunissaient les délégués du Pays de Cize, lors de la tenue des Juntes.\r\nEn face de la maison se trouvait une chapelle détruite au début du XXe siècle.  Au Sud de la maison noble, des dépendances et des communs partiellement ruinés ont abrité un relais de poste. La façade Nord, autrefois façade principale, a conservé son aspect médiéval austère avec ses murs non enduits et ses deux tours. La demeure appelée château Sala ou château de Saint-Pée date des XVIIIe et XIXe siècles ;\r\nLa redoute de Bella Esponda  fut élevée en 1793 à 1813 .","habitants":"Famille de Harrieta                                                       Famille Salha                                  \r\n        \"","divers":"Château d'Harriéta grav -1 e Salha grav 2 et 3","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Jean_le_Vieux_1.jpg","../../jctruffet.com/image/image_64/64_St_Jean_le_Vieux_2.jpg","../../jctruffet.com/image/image_64/64_St_Jean_le_Vieux_3.jpg"]},"Consult_chateau_formulaire6b9f":{"id":"Consult_chateau_formulaire6b9f","dept":"64","canton":"Mauléon-Licharre","commune":"St-Jean-Pied de Port","nom":"St_Jean_Pied_de_Port","type":"Forterresse","periode":"XV-XVII","histoire":"ST-JEAN-PIED de PORT, en 1512, Ferdinand le Catholique enlève la Navarre à ses souverains légitimes, Jean et Catherine d'Albret, qui se réfugient en Béarn. Larmée espagnole franchit les Pyrénées et prend Saint-Jean en août 1512. Le duc d'Albe fait renforcer les défenses du château à partir de septembre.En 1516, Jean d'Albret sen empare, mais échoue à prendre la citadelle. Battu dans les défilés de Roncevaux, il meurt le 17 juin. En 1530, Charles Quint abandonne aux Foix-Albret-Navarre cette ville qui lui semble trop coûteuse à conserver, et en détruit le château. La partie nord de la Navarre devient alors la Basse-Navarre par opposition à la Haute-Navarre. C'est pourquoi Henri IV, lorsquil accède au trône, se fait appeler roi de France et de Navarre, titre que ses successeurs portent jusquà Charles X.  En mars 1789, réunis à Saint-Jean-Pied-de-Port, les États de Navarre, considérant que la Navarre nest pas une simple province française, refusent denvoyer des députés aux États généraux. Lors d'une session en juin, ils envoient néanmoins quatre députés, aux mandats très stricts, dont le respect de leurs fors. Cela reste vain : leurs privilèges sont abolis dans la nuit du 4 août 1789. La Basse-Navarre, avec les deux autres provinces du pays basque nord, est rattachée au Béarn pour former le département des Basses-Pyrénées.                                                                       BRANA, domaine viticole","architecture":"Citadelle dit de Mendiguren, cest Vauban, suite à sa visite de 1685, qui avança lidée de la construction dune muraille de pierre pour défendre ce quartier. Initiés dès 1690, les travaux furent interrompus en 1713. Cest entre 1842 et 1848 que lenceinte fut définitivement achevée. Flanquée de tours bastionnées, percée de meurtrières pour fusils et de trois portes, cette ceinture de pierre enserrait le quartier dEspagne, du moulin à la place du jeu de paume jusquau pont de la manutention. Lentrée souvre sur un corps de garde suivi de cellules disciplinaires. Un escalier exigu permet daccéder à une vaste salle souterraine médiévale voûtée en ogive. Actuellement, une exposition sur le pélerinage de Saint-Jacques-de-Compostelle permettra de sévader au Moyen-Age et constater que depuis ces temps reculés, la ville de Saint-Jean-Pied-de-Port demeure une ville jacquaire à la tradition daccueil affirmée.  Hors de lenceinte fortifiée de la ville, la maison dite Mansart se dresse sur la place du marché. Construite au début du XVIIIe siècle, elle était celle dun négociant en laine fortuné, David de Fourré. Ce très bel hôtel particulier de style Louis XIV, à lharmonieuse façade en grès rose de lArradoy lui confère un charme particulier.  Les mansardes couronnant le grand toit dardoises lui ont donné cette appellation. En 1935, la municipalité de Saint-Jean-Pied-de-Port devient propriétaire de la bâtisse et peut y installer lhôtel de ville dans les années 1950. La ville haute de Saint-Jean-Pied-de-Porc est protégée par une imposante enceinte fortifiée.","habitants":"Famille de David de Fourré\r\n        \r\n        \"","divers":"La citadelle de Mendiguren 43° 09' 44 nord, 1° 14' 02 ouest Domaine de Brana grav 9","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_1.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_2.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_3.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_4.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_5.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_6.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_7.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_8.jpg","../../jctruffet.com/image/image_64/64_St_Jean_Pied_de_Port_9.jpg"]},"Consult_chateau_formulairef92f-2":{"id":"Consult_chateau_formulairef92f-2","dept":"64","canton":"Serres-Castet","commune":"St-Jean Poudge","nom":"St_Jean_Poudge","type":"Château","periode":"XVI","histoire":"ST-JEAN-POUDGE, le château de Saint-Jean-Poudge, qui date du XVIe siècle, subit au XIXe siècle de nombreux dommages qui lui ont fait perdre son luxurieux décor intérieur. Lédifice reste célèbre pour avoir certainement hébergé le roi Henri IV. Depuis le XIVe siècle, le site appartient aux Miossens. Puis, de 1650 à 1674, il voit saffronter les Albret-Miossens et les Hiton, qui en revendiquent tous deux la propriété. Enfin, de 1728 à la Révolution, cest la famille Montaut qui détient cette demeure.  Au XXe siècle, la demeure est la propriété dun poète béarnais, Bernard Baudorre.","architecture":"Le château de Saint-Jean-Poudge date de la fin du XVIe ou du début du XVIIe siècle. Des deux bâtiments en équerre, seule laile nord de lédifice, au décor de stuc de la deuxième moitié du XVIIIe siècle, est actuellement conservée. On sait cependant que des pièces au décor luxurieux ont existé : salon des Gobelins, pièce tendue de cuir de Cordoue, salle à manger lambrissée avec médaillons de Watteau, dont les panneaux ont été vendus. Un escalier du XVIIe siècle, avec rampe en chêne, a également été vendu et transporté dans lancienne école libre de Cadillon où lon peut toujours le voir.\r\nLe château est profondément transformé dans la deuxième moitié du XVIIIe siècle, avant dêtre partiellement détruit au milieu du XIXe siècle. On pénètre dans la propriété par un portail à fronton de lépoque Louis XIII. Sur une terrasse, qui entoure le château et où se trouvaient auparavant deux tourelles en encorbellement, des vestiges de vieilles murailles épaisses ont été mis au jour. Il sagit peut-être des restes de lhôpital des chevaliers du Temple que la tradition locale évoque. La demeure de notable enregistrée à l'inventaire général du patrimoine culturel est une ancienne métairie anoblie en 1538.","habitants":"Famille Montaut\r\n        \"","divers":"Château de st-Jean de Poudge","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Jean_Poudge_1.jpg"]},"Consult_chateau_formulaireda7d":{"id":"Consult_chateau_formulaireda7d","dept":"64","canton":"Mauléon-Licharre","commune":"Ahaxe-Alciette-Bascassan","nom":"St_Julien","type":"Château","periode":"XV","histoire":"ST-JULIEN  Au Moyen-Age, il est mentionné une maison appelée Ahatsa Gaztelu ou Ahatsa Jauregi (1194 \"domina de ahacha\", 1366 \"el palacio de hadssa\"). Au début du XIIe siècle, la fille aînée de Bouet, seigneur d'Ahaxe, épouse Arnaud-Sanche, seigneur de Guiche. Au début du XIIIe siècle, la seigneurie se trouve réunie par mariage à la seigneurie de Tardets. La famille, vassale des rois de Navarre, prend part à de nombreux conflits. En 1370, par mariage toujours, la seigneurie d'Ahaxe entre dans la famille de Luxe. Elle y était encore en 1567 quand les troupes de Montamat, lieutenant de Montgomery, incendièrent le château durant les guerres de Religion. La porte rectangulaire au linteau sur coussinet pourrait être du  XIVe siècle ou du  XVe siècle.","architecture":"St-JULIEN,  château fort assis sur sa motte, ne subsiste plus que le donjon, de forme circulaire, entouré de deux enceintes entre lesquelles prenait place la basse-cour. La partie supérieure du donjon est effondrée. Le premier niveau présente encore les vestiges d'une porte dont le linteau est supporté par des coussinets, ainsi que sept ouvertures défensives à ébrasement intérieur plus ou moins bien conservées. Les murs très épais sont en moyen appareil de calcaire, plus rarement en moyen appareil de grès. La partie inférieure est en moellons dégrossis. Le blocage est fait de galets d'ophite de couleur verte et de moellons de calcaire et de grès, réunis dans un mortier jaunâtre très dur. Au même niveau que le donjon et à une dizaine de mètres, se trouvent les vestiges de l'enceinte intérieure en galets. Quelques mètres plus bas, la plate-forme de la basse-cour plane est également entourée d'une enceinte extérieure en galets, encore visible par endroits.","habitants":"Famille de Luxe\r\n        \"","divers":"Château de Ahaxe à St-Julien","gps":"","images":["../../jctruffet.com/image/image_64/64_St_Julien_1.jpg"]},"Consult_chateau_formulairee0ab":{"id":"Consult_chateau_formulairee0ab","dept":"64","canton":"Ustaritz","commune":"St-Pée sur Nivelle","nom":"St_Pée_Sur_Nivelle","type":"Vestiges","periode":"XV","histoire":"SORCIERES, à lextrémité ouest de Saint-Pée-sur-Nivelle se trouvent les ruines du château dit « des Sorcières ».Construit au XVe siècle, le château appartient aux marquis de Caupenne et dAmou, seigneurs de Saint-Pée-sur-Nivelle. Il doit son nom aux retentissants procès en sorcellerie qui sy déroulent en 1609. Orchestrés par Pierre de Lancre, chasseur de sorcières envoyé par le parlement de Bordeaux, ces instructions ont alors pour but de purger la région de tous les sorciers et sorcières, guérisseurs et autres cartomanciennes. Mais, après  six cents procès et tout autant de femmes et de prêtres torturés puis brûlés, le parlement de Bordeaux rappelle Pierre de Lancre sur ordre dHenri IV, craignant un soulèvement de la population. Pillé et incendié durant la Révolution, le château nest pas reconstruit par la suite. Les ruines actuelles qui sélèvent encore sur quatre niveaux ne laissent que mal entrevoir lédifice originel désormais recouvert de lierre.\r\nLe château des Sorcières est inscrit aux M.H en 1925.","architecture":"St-Pée, il existe des traces d'un ancien château où réside au XVe siècle le seigneur bailli de la province.  Le château de Saint-Pée-Sur-Nivelle fut détruit à plusieurs reprises, pendant des guerres et la révolution française. En 1609, le juge Pierre De Lancre est envoyé par Henri IV en lui donnant tous les pouvoirs afin darrêter, de juger, de condamner et de brûler. Cette terreur dura environ trois mois, emportant avec elle de nombreux morts.   Mais celle-ci sarrêta lorsquil vint à Saint Jean De Luz, une violente révolte de milliers de marins en retour de leur saison de pêche à la morue lobligea à rentrer à Bordeaux. Son architecture s'est ouverte ensuite au style renaissance. Le conseiller Pierre de Lancre y habite en 1609 pendant la chasse aux sorcières qu'il orchestre avec minutie. Le château est aujourd'hui en ruine.","habitants":"Famille de Pierre de Lancre \r\n        \"","divers":"Château de Saint-Pée sur Nivelle 43° 21' 12 nord, 1° 32' 55 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_1.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_2.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_3.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_4.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_5.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_6.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_7.jpg","../../jctruffet.com/image/image_64/64_St_P%c3%a9e_sur_Nivelle_8.jpg"]},"Consult_chateau_formulaire0f32-2":{"id":"Consult_chateau_formulaire0f32-2","dept":"64","canton":"Oloron Ste-Marie","commune":"Sainte-Colome","nom":"Ste_Colome","type":"Vestiges","periode":"XIV","histoire":"STE-COLOME, durant les XIIe et  XIIIe siècles, les seigneurs de Sainte-Colome se livrèrent à des expéditions punitives contre les habitants de la commune limitrophe de Pont-Long. En 1385, Sainte-Colome comptait 91 feux et dépendait du bailliage d'Ossau. En août 1569, en pleine guerre de Religion, Sainte-Colome a été victime d'une attaque de Montgoméry, ancienne maison forte des XIIIe et XIVe siècles. Il a été incendié en 1569, lors de la campagne des Huguenots pour reprendre le Béarn à Charles IX. Durant cet épisode (troisième guerre de religions), les Huguenots étaient commandés par Gabriel de Montgomery, lieutenant général de la reine de Navarre, Jeanne III d'Albret.  Maisons du XVIe siècle et du  XVIIe siècle. Certaines sornent de linteau ouvragé ou de personnages et d'angelots encadrant les fenêtres.                                                   .\r\nLa commune de Lys a été séparée de Sainte-Colome en 1858. Le château de Sainte-Colome est une ancienne maison forte des XIIIe et XIVe siècles. Il est inscrit aux M.H. depuis 1999","architecture":"Le château, maison forte ruinée, datant des  XIIIe et XIVe siècles, composé d'une basse-cour entourée d'un mur avec les vestiges de son enceinte ainsi que le chemin d'accès au château bordé des vestiges de murs  l'enceinte et ces murs faisant fonction de murs de soutènement  d'un logis renforcé d'une tour d'angle. Voûte d'ogives du XIVe siècle dans la tour.                   La maison forte de Sainte-Colome possède une tour latérale, éventrée, protégeait l'habitation (une archère défendant son entrée est encore visible sur un pan de mur). L'habitation était accessible par un escalier de pierre qui était logé dans la tour. L'espace résidentiel comportait deux étages sans ouverture au rez-de-chaussée (la porte cochère est postérieure). Moins coûteuses à construire et à entretenir que les châteaux, mais moins bien défendues en l'absence de fossés et d'enceintes, les maisons fortes incarnent un compromis entre le souci de sécurité et la préoccupation de confort. Beaucoup ont été construites à la fin du XIIIe siècle ou au début du XIVe siècle dans les vallées pyrénéennes et dans l'Entre-deux-Mers.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Sainte-Colome 43° 06' 04 nord, 0° 24' 12 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Ste_Colome_1.jpg","../../jctruffet.com/image/image_64/64_Ste_Colome_2.jpg","../../jctruffet.com/image/image_64/64_Ste_Colome_3.jpg","../../jctruffet.com/image/image_64/64_Ste_Colome_4.jpg"]},"Consult_chateau_formulaire5d8d":{"id":"Consult_chateau_formulaire5d8d","dept":"64","canton":"Pontacq","commune":"Igon","nom":"Ste_Marie","type":"Château","periode":"XVI","histoire":"STE-MARIE, sur le territoire de la commune dIgon, on peut découvrir un vaste château, qui porte le nom de Sainte-Marie. Ses parties les plus anciennes remontent au XVIe siècle.  Igon a appartenu, au cours des temps, aux plus grandes familles de Béarn, la famille de Navarre et les de Navailles. La seigneurie de Sainte-Marie d'Igon est mentionnée au XIVe siècle. pour un hommage aux Etats de Béarn datant de 1391. Mais le château a souffert, semble-t-il, des incendies des Guerres de Religion qui détruisirent les titres de noblesse et la famille de Ste-Marie mit quelques temps à rétablir ses droits.","architecture":"Le château Sainte-Marie par ses différentes étapes de construction, présente une histoire originale de larchitecture castrale dans le Béarn, le château occupe une place stratégique, près du gave et face à celui de Coarraze. La tour polygonale centrale, en pierres de taille, constitue la partie la plus ancienne du château actuel qui a bénéficié de nombreux remaniements, de réaménagements et d'agrandissements au cours des siècles, dans des styles divers. Les fenêtres à meneaux y côtoient les fenêtres pivotantes du XIXe siècle.  En 1937, la propriété dite \"Château de Sainte-Marie\", de quelque 3 ha, est acquise par l'uvre des Pupilles de l'Ecole Publique des Basses Pyrénées. En 1948, ouverture d'un aérium, école de plein air, relevant d'un agrément du secteur sanitaire. En 1971, tout en restant dans le secteur sanitaire, l'établissement devient un institut somato  psychologique (I.S.P.).","habitants":"la Famille de Navarre\r\n        \"","divers":"Château de Sainte Marie à Igon","gps":"","images":["../../jctruffet.com/image/image_64/64_Ste_Marie_1.jpg","../../jctruffet.com/image/image_64/64_Ste_Marie_2.jpg","../../jctruffet.com/image/image_64/64_Ste_Marie_3.jpg","../../jctruffet.com/image/image_64/64_Ste_Marie_4.jpg"]},"Consult_chateau_formulaire650a":{"id":"Consult_chateau_formulaire650a","dept":"64","canton":"Saint-Palais","commune":"Luxe Sumberraute","nom":"Sumberraute","type":"Château","periode":"XIV-XVII","histoire":"SUMBERRAUTE, le château des seigneurs de Luxe date du Moyen-Âge, alors que celui de Sumberraute date des XVIIe et XIXe siècles.  Il est dabord propriété de Pées de Laxague. Ce chambellan de Charles III de Navarre devient seigneur de Sumberraute en 1320. A sa mort, en 1393, le domaine passe ensuite à la famille de Luxe ses plus célèbres propriétaires. La dynastie prend en effet ici les armes à plusieurs reprises lors des conflits de pouvoir, mais aussi pour protéger le catholicisme contre les troupes protestantes menées par Jeanne dAlbret.  Le château est ensuite érigé en baronnie en 1624  pour ses nouveaux propriétaires les Esquilles, mais il est incendié en 1630, au cours de la reprise des affrontements entre catholiques et protestants durant le règne de Louis XIII.  Il est reconstruit en 1656 et ses propriétaires le conservent jusquà la Révolution. Il passe ensuite aux mains des Arthez-Lassalle, puis de leurs successeurs, les Lacombe. Le site du château de Sumberraute a été classé le 19 juillet 1944 tandis que lédifice a été inscrit partiellement aux M.H le 27 décembre 1993.","architecture":"La construction du château de Sumberraute date du XIVe siècle. Malgré un incendie survenu au XVIIe siècle, peu de modifications sont apportées à la bâtisse dorigine, ce qui en fait toute la particularité. Le château compte également à lintérieur quelques belles cheminées. Peu de modifications sont apportées à lédifice du XIVe siècle lors de sa reconstruction, trois siècles plus tard. Nombreux éléments du XVIIe siècle sont encore visibles à lintérieur. Son corps de logis flanqué de pavillons, a depuis été complété au XIXe siècle, par de nouveaux bâtiments qui servent aujourdhui de communs.","habitants":"Famille de Luxe\r\n        \"","divers":"Château de Samberraute 43° 21' 46 nord, 1° 04' 24 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Sumberraute_1.jpg","../../jctruffet.com/image/image_64/64_Sumberraute_2.jpg","../../jctruffet.com/image/image_64/64_Sumberraute_3.jpg","../../jctruffet.com/image/image_64/64_Sumberraute_4.jpg"]},"Consult_chateau_formulaired5e5":{"id":"Consult_chateau_formulaired5e5","dept":"64","canton":"Oloron Ste-Marie","commune":"Sévignacq Meyracq","nom":"Sévignac","type":"Château","periode":"XVII","histoire":"SEVIGNAC   du XVIIe siècle appelé le château d'Etigny, était la propriété privée du Baron d'Etigny. Le propriétaire pendant les guerres de religion était Arnaud de Casaux, médecin de Jeanne d'Albret qui lui offrit 60 journaux de terres pour l'avoir soignée et rendu la santé à son fils, le futur Henri IV. Durant l'épidémie de peste qui sévit dans la région d'Oloron de 1651 à 1654, M.de Casaux eut un comportement exemplaire. Comme Arnaud Mirassou, il visitait les malades et faisait le point sur l'avancée de la maladie. La fille d'Arnaud, Isabeau épousa Pierre de Moustrou, doyen au parlement de Pau en 1620. Par le mariage de leur fille Catherine en 1668, le château d'Etigny devient le patrimoine de l'importante famille de Jean-Cosme Claverie. Au XVIIIe siècle, le château appartenait à Jean-Pierre Noguès qui le tenait d'Arnaud Noguès, avocat. En 1765, il le transmit à son fils François qui était 1er échevin (maire) de Bayonne. A la Révolution, alors que François en était toujours abbé-laïque, le château fut mis sous séquestre. La famille réussit à le reprendre car Marie-Thérèze de Noguès, mère de François y mourut, en 1818. En 1848, M.Lavignolle, un important négociant qui vivait à Paris l'acheta et le loua, en 1880, à un aristocrate anglais, Palmer Whalley qui y venait pour ses cures dans les stations pyrénéennes. En 1892, la famille d'Etigny qui vivait au château Colombie à Baliros, rachèta le château, est inscrit aux M.H. depuis le 9/07/1998.                                                                        Chateau d'Arudy   hôtel de Poutz abrite dans ses murs le Musée de la Vallée d'ossau. Ce dernier fait partie du réseau des musées de France.","architecture":"SEVIGNAC-ETIGNY, cette ancienne abbaye laïque de Sévignacq, actuellement désignée sous le nom de château d'Etigny, est indissociable de l'église Saint-Pierre contiguë. Quatrilatère irrégulier, il jouit d'un point de vue sur le Gave d'Ossau qui lui donne un air stratégique et de fierté indiscutable. il dut être reconstruit, suite aux tremblements de terre de 1527 et de 1617, sa construcion date du 1er quart du XVIIe siècle au XIXe siècle.  Le château de Sévignac et son parc, édifiés sur une butte, occupent l'emplacement d'un ancien castera. Ce château comporte deux corps de logis cantonnés de pavillons, un jardin clos de murs, des dépendances et un parc boisé. Son style d'aspect général, les petites tours, ses grandes baies ont l'élégance du XVIIe siècle.  On n'est pas renseigné sur l'aspect des bâtiments antérieurs mais les mentions sur son existence sont nombreuses.","habitants":"Famille d'Arnaud de Casaux                                    Famille de Jean-Cosme Claverie.\r\n        \"","divers":"Château de Sévignac  43° 06' 49 nord, 0° 24' 49 ouest et le château d'Arudy grav 6","gps":"","images":["../../jctruffet.com/image/image_64/64_S%c3%a9vignac_1.jpg","../../jctruffet.com/image/image_64/64_S%c3%a9vignac_2.jpg","../../jctruffet.com/image/image_64/64_S%c3%a9vignac_3.jpg","../../jctruffet.com/image/image_64/64_S%c3%a9vignac_4.jpg","../../jctruffet.com/image/image_64/64_S%c3%a9vignac_5.jpg","../../jctruffet.com/image/image_64/64_S%c3%a9vignac_6.jpg"]},"Consult_chateau_formulaire27cf":{"id":"Consult_chateau_formulaire27cf","dept":"64","canton":"Artix","commune":"Castédis","nom":"Trois_Poètes","type":"Château","periode":"XVII","histoire":"TROIS-POETES, le château à Castétis, a longtemps abrité une maison de retraite.  Une société essaie de relancer lactivité. En vain pour linstant, le château des Trois Poètes est lui aussi en attente d'une résurrection. Vigny, Lamartine et Francis Jammes ont fréquenté les lieux, d'où le nom donné à la bâtisse. La maison de retraite qu'il abritait a été  fermée en 2000. Un groupe niçois, Bel-âge, a repris l'ensemble et espère relancer l'activité. Mais la création d'un établissement pour personnes âgées (EHPAD) reste soumise au déblocage de crédits de l'État. Mais à ce jour, ce n'est pas encore d'actualité. Ils pourront peut-être le faire par transfert de lits un jour, note le premier magistrat castétisien.","architecture":"Les Trois-Poètes est le surnom récent donné à lancien château de Candau, sur la commune de Castétis. Cette imposante bâtisse au charme certain date du tout début du XVIIe siècle. Son corps de logis rectangulaire sélève sur trois niveaux. Elle est flanquée de deux tourelles circulaires et une tour polygonale est apposée au milieu de sa façade. Son surnom est un hommage à trois grands noms de la poésie : Alphonse de Lamartine, Alfred de Vigny et Francis Jammes, dOrthez. Ces derniers auraient séjourné à Castétis, afin dy puiser linspiration de leurs uvres. Pendant plusieurs années, le château des Trois-Poètes a accueilli un hôtel et une maison de retraite.","habitants":"Alphonse de Lamartine, Alfred de Vigny et Francis Jammes, dOrthez\r\n        \"","divers":"Château des Trois Poètes à Castétis","gps":"","images":["../../jctruffet.com/image/image_64/64_Trois_Po%c3%a8tes_1.jpg"]},"Consult_chateau_formulaire917a":{"id":"Consult_chateau_formulaire917a","dept":"64","canton":"Mauléon-Licharre","commune":"Trois-Villes","nom":"Trois_Villes","type":"Château","periode":"XVII","histoire":"Château de TOIS VILLES dit château Elizabea fut acquit  entre 1660 et 1663  par  Arnaud-Jean de Peyrer, comte de Tréville, capitaine des\r\nmousquetaires du Roi, immortalisé par Alexandre Dumas dans son célèbre roman. Arnaud Jean de Peyrer très riche rachète de nombreuses terres appartenant au domaine royal, la baronnie de Gramont à Montory, Hazux, Laguige, Restoue, Absense, Sibas, Atherey et Sunharette en 1264 la baronnie passe en comté et y fit construire un château, les deux fils de'Arnaud Jean de Peyrer  s'éteindront sans descendance et Trois-Villes  passera  au petit neveu du capitaine Armand-Jean de Montréal marquis de Monein avant d'être acquis au début du XXe siècle par la famille d'Andurain. Edifice et parc inscrits à l'inventaire supplémentaire desM.H (intérieur et extérieur).                                                                                                          .","architecture":"ELIZABEA,le château est bâti de 1660 à 1663 pour le compte de Jean-Armand du Peyrer, comte de Tréville, élégante demeure de style classique de la région  François Mansart en aurait dessiné les plans, corps de logis rectangulaire flanqué de deux pavillons en légère saillie. Il comporte deux étages. Sa façade principale exposée à l'Est compte trois travées à deux niveaux de même hauteur, tandis que les ailes n'en comptent qu'une seule surmonté d'un fronton triangulaires ou cintrés alternant par travées et par étage est ornée de hautes fenêtres rectangulaires à meneaux et encadrée de deux avant-corps. La toiture en ardoise, à comble brisé, est percée de lucarnes à croisées et frontons triangulaires. Le parc à l'anglaise, planté au milieu du XIXe siècle, occupe une superficie de six hectares.  Construit sur une terrasse dominant le gave du Saison, il fait face aux montagnes de Haute-Soule.","habitants":"Famille d'Arnaud-Jean de Peyrer\r\n        \"","divers":"Château de  Elizabéa  43° 07' 52 nord, 0° 52' 39 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Trois_Villes_1.jpg","../../jctruffet.com/image/image_64/64_Trois_Villes_2.jpg","../../jctruffet.com/image/image_64/64_Trois_Villes_3.jpg","../../jctruffet.com/image/image_64/64_Trois_Villes_4.jpg"]},"Consult_chateau_formulairebae5":{"id":"Consult_chateau_formulairebae5","dept":"64","canton":"Artix","commune":"Cabidos","nom":"Trubessé","type":"Château","periode":"XVI","histoire":"TRUBESSE, le château  est construit en contrebas du village de Cabidos. Il doit son nom à la famille éponyme qui posséde la seigneurie entre le XIVe et le XIXe siècle.Cest à Jacques que revint le titre de baron de Trubessé en 1554. Il réalisa dimportants travaux au château dont il ne conserva que deux tourelles et y adjoint un corps de logis plus conforme à la vie dune noble famille. Jacques passa toute sa vie au château. Durant le XVIIIe siècle les successifs barons de la maison Trubessé ajoutèrent un second logis aux côtés Est et nord du château ainsi quune terrasse. La démolition dune des deux dernières tourelles permit ces agrandissements ainsi que la construction dun chai pour conserver le produit des vignes de Cabidos.\r\nDepuis 1997, le château de Trubessé est inscrit à linventaire des M.H.                                                    CABIDOS la tradition viticole du domaine du château de Cabidos a été relancée avec succès au début des années 90 après avoir été abandonnée pendant plus dun siècle  du comte de Philippe De Nazelle. Au fil des successions et des cessions la première moitié du XXe siècle vit le château de Cabidos avec ses terres et ses vignes perdre de sa superbe jusquau mariage en 1953 dIsabelle Cogombles, arrière-petite-fille de Marie-Catherine de Trubessé avec Philippe, comte du Cauzé de Nazelle.   Le château de Cabidos revenu dans la famille, Philippe de Nazelle, décida en 1972 de venir vivre dans ce lieu magique des vacances de jeunesse de son épouse Isabelle.","architecture":"En contrebas du village, le château de Cabidos, dit de Trubessé, date du XVIe siècle. Certaines parties sont classées à l'inventaire des M.H depuis 1997. Lorigine du manoir est antérieure au XVe siècle, puisque lédifice est déjà le siège de la baronnie de Trubessé en 1419, au moment de son achat par Arnauton Guilhem Du Vignau. Il prend alors la forme dun corps de logis dont la façade ouest est flanquée dune tourelle ronde. Lédifice est certainement cantonné à lorigine par quatre tours.  Au XVIIIe siècle, il fut augmenté dun second bâtiment accolé aux côtés nord et à l' Est du premier et bordé dune terrasse. Ces agrandissements auraient entraîné la destruction des deux tourelles Est. Puis, au XIXe siècle, un petit pavillon nord est ajouté à lentrée du château. Vers 1930, le second ensemble de dépendances est détruit ainsi que quelques autres communs.\r\nCabidos possède également des fermes des XVIIe, XVIIIe et XIXe siècles.\r\nLe manoir du lieu-dit Luyoo date des XVIIe et XVIIIe siècles. La présence de deux châteaux sur le village peut être expliquée par l'ancienne place forte.","habitants":"Famille de Trubessé\r\n        \"","divers":"Château de Cabidos 43° 32' 19 nord, 0° 27' 49 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Trubess%c3%a9_1.jpg","../../jctruffet.com/image/image_64/64_Trubess%c3%a9_2.jpg","../../jctruffet.com/image/image_64/64_Trubess%c3%a9_3.jpg","../../jctruffet.com/image/image_64/64_Trubess%c3%a9_4.jpg"]},"Consult_chateau_formulaire4076":{"id":"Consult_chateau_formulaire4076","dept":"64","canton":"Saint-Palais","commune":"Uhart-Mixe","nom":"Uhart_Mixe","type":"Château","periode":"XIV","histoire":"UHART-MIXE comme la plupart des châteaux et maisons nobles aux alentours, la première mention faite du château dUhart date de la fin du XIVe siècle. Il porte le nom dune puissante famille de Navarre qui loccupa entre le XVI et le XVIIIe siècle.\r\nLa famille dUhart était en effet lune des plus grandes familles militaires de Navarre. Ils sallient par mariage à une autre famille très influente, les de Luxe et deviennent, de ce fait, seigneurs de la paroisse voisine de Sorhapuru. Au XVIe siècle, lhéritier de la famille, Gabriel, soppose à la reine Marguerite de Navarre. Elle constitue une menace pour leur statut en voulant récupérer ses territoires des Pyrénées, autrefois confisqués par lespagnol Ferdinand II dAragon. La puissante famille continue ainsi à affirmer son pouvoir au fil des siècles jusquà élever son château au rang noble de marquisat : nous sommes alors au XVIIIe siècle. Avec la chute de lEmpire, les succès de la noblesse deviennent moindres et la famille se voit contrainte de vendre nombre de ses biens dont le château. Il devient dabord la possession de la famille Berdoly puis les propriétaires se multiplient jusquau début du XXe siècle.","architecture":"UHART-MIXE, le bâtiment a connu divers remaniements. Lunique corps de logis, rectangulaire, à deux étages, sest vu rehaussé dun étage, ainsi que flanqué dune aile au sud. La date de 1699 figurant sur un linteau permet de dater cette vague de travaux extérieurs. Lintérieur, lui, a été remanié au cours des XVIIIe et XIXe siècle. Le site est inscrit depuis le 03 novembre 1944. Le château et son pigeonnier, sont eux inscrits aux M.H depuis le 27 mars 1996.","habitants":"Famille dUhart\r\n        \"","divers":"Château d'Ubart-Mixe 43° 16' 46 nord, 1° 01' 09 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Uhart_Mixe_1.jpg","../../jctruffet.com/image/image_64/64_Uhart_Mixe_2.jpg","../../jctruffet.com/image/image_64/64_Uhart_Mixe_3.jpg","../../jctruffet.com/image/image_64/64_Uhart_Mixe_4.jpg"]},"Consult_chateau_formulaire4898":{"id":"Consult_chateau_formulaire4898","dept":"64","canton":"Hendaye","commune":"Urugne","nom":"Urtubie","type":"Château","periode":"XIV","histoire":"URTUBIE,   cest en 1341 que Martin de Tartas seigneur d'Urtubie reçoit du Roi dAngleterre, duc dAquitaine, lautorisation de construire un château avec murailles et fossés. En 1415 l'héritière Domilia Martinez d'Urtubie par alliance fit passer le château à Saubat de Sault, leur fils Jean de Montréal époux de Maria Téresade Lezcano sera le père de Marie qui incendiera le château aussitôt reconstruit. À cette occasion, il nomma Jean d'Urtubie comme chambellan et l'emmena à la cour où le petit Louis d'Urtubie fut élevé avec le futur Louis XII. En 1505, Louis XII alors Roi de France, autorisa son ami d'enfance Louis d'Urtubie à agrandir le château. Il fit donc construire l'actuelle salle de chasse et les salles du haut (aujourdhui le grand salon et les chambres d'hôtes) et la tour centrale avec son escalier « à vis suspendu ».  En 1654, soit 6 ans avant son mariage à Saint-Jean de Luz, Louis XIV érigea le domaine en Vicomté et Salvat d'Alzate dUrtubie fut nommé Bailli dépée du Labourd,  sa petite-fille Jeanne de Lalande Gayon apporte le domaine à Pierre Raymond de Lalande qui fera des aménagements au château en 1745 la physionomie qu'il a conservé depuis. En 1830 Pierre Eloi de Raymond Lalande vend à un descendant de Salvat d'Alzate François de Larralde-Dieustéguy maire de d'Urrugne meurt sans postérité le château revient à sa soeur mariée à Jules Labat la comtesse Paul de Coral née Labat hérite en 1911  son fils Bernard maire député le rénove pour le rendre plus habitable et c'est le petit-fils  le comte Paul-Philippe de Coral qui l'a fait réaménagé, en un bel hôtel de charme.","architecture":"La construction du château  d'URTUBIE remonte à 1341.  On ne sait que peu de choses sur les premières familles d'Urtubie qui ne semblent pas avoir possédé de maison forte sur la seigneurie. un château de pierre avec murailles et fossés, \"parce quil nen existe pas dautre à trois lieues de là \", afin de contrôler la route dEspagne. Martin mourut tragiquement à Bayonne en 1343 et cest son frère, Auger de Tartas, qui achève la construction dUrtubie. À la fin du XVIIe siècle, son fils fit enlever les tuiles du toit pour les remplacer par des ardoises, aménagea les fenêtres mansardées et fit construire la chapelle. \r\nAu XIVe siècle, le château se composait dun donjon avec quatre échauguettes, dun chemin de ronde qui entourait le donjon et dun châtelet constitué de deux tours qui formaient le poste de garde et encadraient le pont levis. Il subsiste encore aujourdhui le donjon, les deux tours du châtelet et les murailles de la partie nord du chemin de ronde. Entre 1700 et 1743, les douves furent rebouchées. Le vicomte dUrtubie aménagea, par-dessus, un parc à l'anglaise et y fit construire une orangerie. Il ajouta également une aile, orientée au sud, dans laquelle se trouve le petit salon. Au début du siècle, la terrasse fut aménagée en partie sur les anciennes murailles et le châtelet fut agrandi pour y loger le fils ainé.  Le château d'Urtubie est classé aux M.H. depuis 1974.","habitants":"Famille de Martin d'Urtubie\r\n        \"","divers":"Château d'Uturbie  43° 22' 00 nord, 1° 41' 18 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Urtubie_1.jpg","../../jctruffet.com/image/image_64/64_Urtubie_2.jpg","../../jctruffet.com/image/image_64/64_Urtubie_3.jpg","../../jctruffet.com/image/image_64/64_Urtubie_4.jpg","../../jctruffet.com/image/image_64/64_Urtubie_5.jpg","../../jctruffet.com/image/image_64/64_Urtubie_6.jpg","../../jctruffet.com/image/image_64/64_Urtubie_7.jpg"]},"Consult_chateau_formulaireae05":{"id":"Consult_chateau_formulaireae05","dept":"64","canton":"Serres-Castet","commune":"Tadousse-Ussau","nom":"Ussau","type":"Château","periode":"XVIII","histoire":"USSAU Le village de Tadousse-Ussau qui apparaît dès le XIIe siècle dans les sources, est situé dans la vallée du Léez.  La paroisse dUssau est également mentionnée dès le XIIe siècle. Un château y est construit sur linitiative de Jeanne dAlbret, reine de Navarre au XVIe siècle et mère dHenri IV. Remanié au XVIIIe siècle, il appartient à Jean dIdron au XVIe siècle et à lécrivain béarnais du XXe siècle Bernard Nabonne.","architecture":"Le château d'USSAU  date de la fin du XVIIIe siècle. Cette installation au cur dune vallée, et la proximité de la frontière de lArmagnac, ont profondément influencé lhistoire du village qui remonte à lAntiquité. Ainsi, au cours du XIVe siècle, le village de Tadousse est incendié avec dautres bourgs par les Armagnacs. La commune possède pourtant un castel cerné de fossés et talus sur trois côtés.","habitants":"Famille de Jean dIdron \r\n        \"","divers":"Château de Tadouse Ussau","gps":"","images":["../../jctruffet.com/image/image_64/64_Ussau_1.jpg"]},"Consult_chateau_formulaire7822":{"id":"Consult_chateau_formulaire7822","dept":"64","canton":"Saint-Palais","commune":"Ustaritz","nom":"Ustaritz","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Ustaritz celui de Haîtze, de Haltya, Larreguienea de Lota, de la Motte (actuel mairie) et Herauzitz.                                                  USTARITZ  En 1193, Guillaume-Raymond de Sault, successeur d'Arnaud-Bertrand, vendit ses droits sur la vicomté du Labourd au roi d'Angleterre. En 1245 Henri III put donc achever le projet de Richard Ier d'instituer un représentant permanent du roi auprès de l'administration locale. Cette charge de bailli, installée à Ustaritz, devint viagère à compter de 1337.  Auger de Sault en fut le premier titulaire puis héréditaire sous la domination des rois de France, à partir du XVe siècle.                                                                      MOTTE, le château de la Motte abrite aujourd'hui les services de la Mairie d'Ustaritz. Connu autrefois sous le nom de Gaztelua, ancienne demeure des vicomtes du Labourd et des ducs d'Aquitaine.","architecture":"La commune d'USTARITZ possède de nombreuses maisons des XVIIe et XVIIIe siècles reflétant le style labourdin. Il faut citer, entre autres, la maison Chokolatenea de 1694, qui fut la demeure d'un chocolatier, les maisons de la rue de Ferrondoa de 1572, , la maison Chachoenea,  de 1648, la maison Haroztegia  qui est un exemple typique de la maison labourdine, et la maison Hoperena, qui abrita le général anglais Hope, en guerre contre les armées napoléoniennes. Enfin la maison Mokopeita, fut la demeure d'André Trébuchet, peintre qui y résida dès 1925 et qui participa en 1946 à la réfection en peinture de l'intérieur de l'église. Cette dernière date de 1601 et a été rénovée en 1673. André Trébuchet y travailla jusquen 1947.                                                             La MOTTE  possédait à chaque angle une tour en poivrière  a disparu au XIXe siècle. Une inscription, gravée dans une plaque en pierre, rappelle aujourdhui le passé historique de la bâtisse :  Ici, les Labourdins tenaient leurs assemblées.","habitants":"Famille de Guillaume-Raymond de Sault\r\n        \"","divers":"La Motte grav 1.","gps":"","images":["../../jctruffet.com/image/image_64/64_Ustaritz_1.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_2.jpg"]},"Consult_chateau_formulairee9a6":{"id":"Consult_chateau_formulairee9a6","dept":"64","canton":"Ustaritz","commune":"Ustaritz","nom":"Ustaritz_Chateau","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs  châteaux à Ustaritz , de Haitze   de Arkiberria, d'Haltya (voir article), de Lamothe de  Larreguienea et de Lota.                                            HAITZE, maison noble citée en 1193, le château fut reconstruit sur l'emplacement d'une maison forte du Moyen-Âge. Les Haitze sont connus depuis 1168, Bonnet de Haitze est cité par les gentilshommes labourdins en 1193. Parmi les plus illustres membres de la famille Haitze se trouvent Sanz dHaitze, évêque de Bayonne au XIIIe siècle, et André de Haitze, maire dUstaritz durant seize années entre 1795 et 1832. Pierre de Haitze, fils de Bernard et de Placide, seigneur dHaitze et de Berriots, meurt en 1798. Son frère André de Haitze, ancien gouverneur de Socoa, devient seigneur dHaitze et Berriots. Mort sans postérité en 1838, il légua ses biens à son neveu André de Laborde Noguez dont les descendants sattachent aussi à valoriser ce lieu.                         ARKIBERRIA Lécrivain Philippe Jullian en fit une description dans son ouvrage \"Château-Bonheur\" en 1960.                                                                                LARREGUIENEA du XVII e siècle, Le 30 septembre 1786, le chanteur Pierre-Jean Garat, encore peu connu, sy produit.  Le 19 juillet 1838, Joachim Turmann, propriétaire du château.                               LOTA, les commanditaires du château Lota étaient Bernard dit Baptiste Duhart et son épouse Dominique-Rosalie Ainciondo. Ils firent construire en 1873 cette demeure, de style néo-Renaissance.De ce château, ancienne demeure d'Amerikanoak abrite aujourd'hui l'institut culturel basque.","architecture":"HAITZE   du  XVIIIe siècle, surplombant une colline, est la demeure dune des plus anciennes familles de nobles du Labourd, se compose actuellement  d'un corps de logis en équerre  à trois niveaux flanqués en façades de deux pavillons saillants.   A louest dUstaritz, le château de Haitze surplombant une colline est la demeure dune des plus anciennes familles de nobles du Labourd. Inscrit aux M.H. en 1987, le château de Haitze appartient depuis 1838 à la famille Laborde-Noguez.                                                 LOTA Les façades extérieures à la modénature raffinée sont insolites, le faisant ressembler à un château de la Loire en miniature,  de plan rectangulaire à trois niveaux sur soubassement flanqué aux extrémités de pavillons saillants et en façade pavillon de quatre niveaux décallés et plus élevés avec toit à quatre pans la qualité de la décoration intérieure et extérieure est rare et dénote dans le paysage local. Construite en 1873 cette demeure, de style néo-Renaissance, dans leur village natal dUstaritz après avoir fait fortune au Chili et lui donnèrent le nom d'un port houiller chilien, centre de leur activité commerciale. Les façades extérieures à la modénature raffinée sont insolites, le faisant ressembler à un château de la Loire en miniature, la qualité de la décoration intérieure et extérieure est rare et dénote dans le paysage local. Le château Lota est inscrit aux M.H. depuis 2013.","habitants":"Famille Haitze \r\n        \"","divers":"Château d'Haïtze grav 1143° 23' 47 nord, 1° 27' 43 ouest  ,  Haltaya 43° 24' 31 nord, 1° 28' 00 ouest, grav-5,  de Lota grav2 à 4   43° 23' 50 nord, 1° 27' 18 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_1.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_2.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_3.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_4.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_5.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_6.jpg","../../jctruffet.com/image/image_64/64_Ustaritz_Chateau_7.jpg"]},"Consult_chateau_formulaire5c78":{"id":"Consult_chateau_formulaire5c78","dept":"64","canton":"Nay","commune":"Uzos","nom":"Uzos","type":"Château","periode":"XIII-XVIII","histoire":"A Uzos deux châteaux celui de Chazal et de la Motte.                                                                          CHAZAL, il porte le nom de son premier propriétaire, le général Chazal. Lédifice serait à lorigine un don de lempereur Napoléon III de 1851 à 1870 au général Chazal. Celui-ci aurait lui-même choisi lemplacement du château pendant une promenade avec lempereur à Pau, sur le boulevard des Pyrénées. Le promeneur qui emprunte cette artère peut en effet contempler au loin le spectacle de la chaîne des Pyrénées.                    LA MOTTE D'UZOS, le petit château des seigneurs Uzos est bâti vers 1200 sur une motte denviron deux mètres de haut.  La seigneurie est longtemps restée entre les mains de la famille de Loyard dont le membre le plus célèbre fut Cyprien, vicaire général archidiacre de lévêché dElne et conseiller au parlement.","architecture":"CHAZAL  installé sur les coteaux à proximité du village dUzos, le château de Chazal est un splendide édifice dagrément, depuis la vallée, on peut apercevoir dans la verdure environnante les tourelles du château de Chazal et ses toitures, qui individualisent les différentes parties de la construction.                         UZOS, le château de la Motte  occupé dès lépoque gallo-romaine, le site dUzos na cependant pas livré de vestiges de cette période. Uzos  possède un patrimoine architectural de valeur datant du XIXe siècle était alors délimitée par une palissade circulaire et permettait de se protéger. Très restauré, lédifice ancien se présente comme une maison forte rectangulaire munie dun petit donjon carré à lun de ses angles. Le corps de logis carré, couvert dun toit en tuiles à quatre pentes, comporte deux étages. Au rez-de-chaussée, deux baies étroites et allongées correspondent à danciennes archères modifiées. La pièce principale dhabitation se trouvait au premier étage où deux petites fenêtres géminées en plein cintre dorigine ont été conservées (angle sud-est). Lensemble du château sur motte dUzos est construit en pierres et galets du gave qui ont assuré par leur solidité sa conservation.                                                château de Taillefer disparu après la guerre.","habitants":"Famille de Loyard                                                   Général Chazal\r\n        \"","divers":"Château de Chazal grav 1 et de la Motte d'Uzos grav 2","gps":"","images":["../../jctruffet.com/image/image_64/64_Uzos_1.jpg","../../jctruffet.com/image/image_64/64_Uzos_2.jpg"]},"Consult_chateau_formulaire4b0e":{"id":"Consult_chateau_formulaire4b0e","dept":"64","canton":"Mauléon-Licharre","commune":"Ascarat","nom":"Vergues","type":"Château","periode":"XVIII-XIX","histoire":"ASCARAT Le château de Larregoyen, à Ascarat, propriété de la famille du même nom depuis le Moyen-âge, fut vendu en 1741 à la famille de Guiroye, par Pierre de Larregoyen. La famille de Guiroye : nouveau propriétaire du château Larregoyen (1741-1777) Jean de Guiroye, marchand à Saint-Jean-Pied-de-Port, se maria le 5 septembre 1718 à Saint-Pierre-dOrthez avec Marie-Magdeleine Vidal. Par contrat du 9 juillet 1741 d'Abinorits, notaire royal, contrôlé à Saint-Jean et insinué au sénéchal le 6 septembre, Pierre de Larregoyen dAscarat vendit ce fief au Sieur Jean de Guiroye, de Saint-Jean-Pied-de-Port Salomon-Barthélémy d'Etchepare : nouveau propriétaire du château Larregoyen (1777- 1794). En 1777, Ce château échoua à une prestigieuse famille noble des terres dOstabarret, à savoir les d'Etchepare dIbarrolle. Ce grand lignage nobiliaire était implanté à la salle dEtchepare à Ibarrolle, située près de léglise paroissiale Saint-Barthélémy. La demeure Larregoyen fut achetée par Salomon-Barthélémy dEtchepare. Le château dAscarat, devenu bien national en 1794, fut racheté par la famille des Fargues de Saint-Jean-Pied-de-Port.","architecture":"Ascarat  abrite un manoir dit château de Vergues ou château de Fargas. Datant  du XVIIIe siècle, le manoir est remanié au cours des XIXe et XXe siècles. Massif et rectangulaire, le château de Vergues est construit sur trois niveaux avec un étage carré et une élévation. Il est surplombé par trois tours : deux carrées encadrant la façade avant et une polygonale placée au centre de la façade arrière. Actuellement, en cours de réhabilitation et de rénovation, le manoir devrait accueillir les services de la mairie dAscarat et surtout le premier centre International de la Diaspora Basque.   La commune possède un ensemble de fermes des XVIe et XVIIe siècles, inscrites à l'Inventaire général du patrimoine culturel. La ferme Harizpea  date de 1587 et la maison Uhaldea de la fin du XVIIIe siècle ou du début du XIXe siècle. Le manoir dit château de Vergues ou château de Fargas date, quant à lui, du XVIIIe siècle.","habitants":"Famille de Guiroye\r\n        \"","divers":"Château de Vergues","gps":"","images":["../../jctruffet.com/image/image_64/64_Vergues_1.jpg"]},"Consult_chateau_formulairea0ad-2":{"id":"Consult_chateau_formulairea0ad-2","dept":"64","canton":"Oloron Ste-Marie","commune":"Ledieux","nom":"Verlée","type":"Château","periode":"XVIII","histoire":"VERLEE, se situe au sud-est de léglise de Ledeuix. Il sagit dune ancienne abbaye laïque, autrefois dirigée par un abbé-seigneur. Ce monument marque la commune par son architecture et son histoire.\r\nCette abbaye laïque est mentionnée pour la première fois au XIVe siècle, date à laquelle elle appartient aux Esgoarrabaque, puis aux seigneurs de Luxe. Elle passe aux mains des Verlée uniquement au XVIIIe siècle, dont lune des membres épouse Talleyrand.","architecture":"Lédifice  de Verlée se présente sous la forme dun quadrilatère avec une cour intérieure, cela permet de regrouper les dépendances agricoles et les appartements du maître. Les combles sont percés de lucarnes aux toitures dardoises en capucine.   La façade principale comprend une porte charretière et une porte à pilastres. Le côté est encadré de tours dangle, lune coiffée dun toit pentu, lautre dun dôme à limpérial. À lintérieur du château Verlée, un escalier conduit aux appartements dont certains ont conservés leurs boiseries et gypseries du XVIIIe siècle représentant les saisons.","habitants":"Famille de Verlée\r\n        \"","divers":"château de Verlée  43° 12' 50 nord, 0° 37' 13 ouest à Ledieux","gps":"","images":["../../jctruffet.com/image/image_64/64_Verl%c3%a9e_1.jpg","../../jctruffet.com/image/image_64/64_Verl%c3%a9e_2.jpg","../../jctruffet.com/image/image_64/64_Verl%c3%a9e_3.jpg"]},"Consult_chateau_formulaire0019":{"id":"Consult_chateau_formulaire0019","dept":"64","canton":"Mourenx","commune":"Vielleségure","nom":"Vielleségure","type":"Château","periode":"XVII","histoire":"Deux châteaux à Villeségure celui de Castet de Bianne et celui de la Fontaine.                                                 CASTET-BIANNE, le castet de Bianne a servi de demeure aux seigneurs de Bianne. Il sagit dune petite seigneurie juridictionnelle, située au nord-ouest de Vielleségure, construction du XVIe siècle, agrandie dans les années 1770, 1780 par la famille de Hiton. Remaniée aux XIXe et XXe siècles. Seigneurie signalée dès le début du XIIe siècle. Propriété au XVIIe siècle des Lapuyade, Espalungue, d'Abadie d'Arboucave, au XVIIIe siècle aux Tarride jusqu'en 1753 au moins, puis aux Hiton jusqu'en 1844.            \r\nBASTIDE COMTAL, fondée en 1339 par Gaston II vicomte de Béarn. Viela segura est une «ville sûre ». La  rue du Castet  évoque cette ancienne construction, ainsi que certaines rues encaissées. Un nouveau château, le Castet Bianne, est construit près de la place au XVIIe siècle.                                               FONTAINE à la famille de Ségabache, quelle doit son apparence. En effet, cette famille lhabite de la fin du XVIIe siècle jusque vers 1900 et est à lorigine des principaux aménagements. Elle améliore notamment le confort, en y amenant leau courante. La maison appartient au XVIIe siècle, à un notaire protestant de la commune.","architecture":"VILLESEGURE bastide Viela segura est fondée en 1339 pour protéger la  population environnante et contrôler la voie de communication  traversant son territoire. Entourée de fossés et de palissades, la bastide était défendue par un  château féodal que Gaston Fébus fit restaurer au XIVe siècle ; il est déjà en ruine au XVIe siècle.\r\nUn nouveau château dit de Bianne, est construit au XVIIe siècle près de la place, le bâtiment dessine une forme en L. À langle des deux corps de bâtiments se trouve une petite tour carrée, couverte dun toit dardoises à quatre pans. Quant à la cour, elle est fermée par un mur percé dun petit portail en bois et dune large grille en fer forgé. En se dirigeant vers lintérieur de ce château de Vielleségur, le bâtiment est percé de deux portes. Lune dentre elles, est surmontée dun encadrement en forme darc. De plus, les fenêtres sont à meneaux.  Le côté sud du château Castet de Bianne est bordé par un petit jardin en surplomb.                                                                         FONTAINE, le château La Fontaine, implanté à Vielleségure au XVIIe siècle, est remanié un siècle plus tard. Cette vaste demeure de plan rectangulaire à deux niveaux avec série de lucarnes sur toit en croupe en tuiles, possède un petit parc, fermé par un portail et des grilles en fer forgé.","habitants":"Famille de Hiton                                                                 Famille de Ségabache\r\n        \r\n        \"","divers":"Chateaux de Bianne et de Fontaine fig 4 à Villeségure","gps":"","images":["../../jctruffet.com/image/image_64/64_Vielles%c3%a9gure_1.jpg","../../jctruffet.com/image/image_64/64_Vielles%c3%a9gure_2.jpg","../../jctruffet.com/image/image_64/64_Vielles%c3%a9gure_3.jpg","../../jctruffet.com/image/image_64/64_Vielles%c3%a9gure_4.jpg"]},"Consult_chateau_formulairec8bd":{"id":"Consult_chateau_formulairec8bd","dept":"64","canton":"Serres-Castet","commune":"Vivens","nom":"Vivens","type":"Château","periode":"XVII-XVIII","histoire":"VIVENS, sa construction date du 3eme quart du XVIIIe siècle. Surpris par la Révolution, le marquis de Mesplès quittera la demeure en 1793. Elle sera vendue après le décès de la marquise survenu au château en 1807. La légende raconte que Napoléon 1er offrit le château à Jean Navailles, haut fonctionnaire colonial des Antilles, pour avoir sauvé le Trésor français lors de la prise de la Guadeloupe par les Anglais. La pierre tombale de Jean Navailles est scellée contre les communs. Tout au long du XIXe siècle, des anciens esclaves noirs des Antilles, affranchis par leur maître travaillèrent dans les jardins. Lun dentre eux fut inhumé dans le caveau seigneurial, exemple quasi-unique en Béarn. Visité par le cardinal dAstros et par Pierre Loti, .Propriétaires actuel M. et Mme Graciet","architecture":"Vivens, château de Lamarche pas d'information historique                                                                         Au coeur du Béarn, le château de Vivens, dont la première mention date du XIe siècle, a été entièrement remanié au milieu du XVIIe siècle puis au XVIIIe siècle, le château de Vivens a fait lobjet de travaux de sauvegarde importants et de restauration par les propriétaires actuels depuis 1982.  de plan rectangulaire à deux niveaux et côté parc  avec série de lucarnes sur un toit en croupe imposant et haut, la bâtisse est accolée à un autre corps de logis  en retrait à deux niveaux au toit plus restraint. Le jardin du château de Viven est labellisé \"Jardin remarquable\" depuis juin 2006. En 1989, le château, les jardins et l'ensemble des bâtiments ont été inscrits à l'Inventaire des M.H.","habitants":"Marquis de Mesplès\r\n        \"","divers":"Château des Vivens 43° 27' 36 nord, 0° 22' 40 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Vivens_1.jpg","../../jctruffet.com/image/image_64/64_Vivens_2.jpg","../../jctruffet.com/image/image_64/64_Vivens_3.jpg","../../jctruffet.com/image/image_64/64_Vivens_4.jpg","../../jctruffet.com/image/image_64/64_Vivens_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','64 — Pyrénées-Atlantiques'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
