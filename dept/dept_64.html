const FULL={"Consult_chateau_formulaire435b":{"id":"Consult_chateau_formulaire435b","dept":"64","canton":"Hendaye","commune":"Hendaye","nom":"Abbadia","type":"Palais","periode":"XIX","histoire":"ABBADIA,  Antoine dAbbadie naît à Dublin en 1810 de père basque et de mère irlandaise. La famille dAbbadie installée à Toulouse entre 1820-1827 vient régulièrement sur la côte basque. Puis elle sinstalle à Paris jusquen 1837. Antoine rejoint alors avec son frère Arnauld une expédition dune douzaine dannées en Abyssinie (Éthiopie) ; le futur château sera imprégné par cette région. Après un premier court séjour aux confins du Béarn, Antoine dAbbadie sinstalle à Urrugne en 1849 et continue de voyager pour ses recherches en Norvège, Espagne, Algérie. En 1852, il est élu à lAcadémie des Sciences de Paris comme membre correspondant dans la section de géographie et de navigation. En dépit de tous ses déplacements à lAcadémie des Sciences et à létranger, Antoine dAbbadie très attaché à la culture basque comme illustrent les inscriptions et les archives du château, poursuit ses travaux sur la langue basque. À sa mort, il sera surnommé Euskaldunen Aita en raison de son investissement pour la culture basque. En 1859, Antoine dAbbadie épouse Virginie de Saint-Bonnet (1828-1901), originaire du Dauphiné et, de 1864 à 1870, il fait construire le château sur la corniche basque par Eugène Viollet-le-Duc et Edmond Duthoit sur une commande d'Antoine d'Abbadie. Le couple dAbbadie s'est investi dans la construction de l'édifice, et en fera don à l'académie des sciences en 1896. Antoine d'Abbadie meurt en 1897. il est inscrit aux M.H. depuis 2012. Le château d'Abbadia est devenu l'Académie des Sciences depuis.","architecture":"Abbadia, est de style Néo-Gothique. Le château  a été construit par Viollet-Le-Duc en 1864 et fut achevé en 1879,   de style néogothique pour Antoine dAbbadie, ethnologue, géographe, homme de science  est inspiré des modèles de châteaux forts du Moyen-Age et porte la marque de la passion orientaliste de son propriétaire. Sur les façades du château dAbbadia, les crocodiles tutoient les éléphants et les singes admirent les étoiles. A lintérieur, la décoration est inspirée par les nombreux voyages du savant : symboles africains, salon arabe, références irlandaise. Entièrement meublées et restaurées, toutes les pièces du château se visitent  : lobservatoire et sa lunette méridienne, la bibliothèque, la chapelle, les chambres, les salons et boudoirs notamment.","habitants":"Famille d'Antoine dAbbadie\"","divers":"Le château d'Abbadia à Hendaye","gps":"","images":["../../jctruffet.com/image/image_64/64_Abbadia_1.jpg","../../jctruffet.com/image/image_64/64_Abbadia_2.jpg","../../jctruffet.com/image/image_64/64_Abbadia_3.jpg","../../jctruffet.com/image/image_64/64_Abbadia_4.jpg","../../jctruffet.com/image/image_64/64_Abbadia_5.jpg","../../jctruffet.com/image/image_64/64_Abbadia_6.jpg","../../jctruffet.com/image/image_64/64_Abbadia_7.jpg","../../jctruffet.com/image/image_64/64_Abbadia_8.jpg","../../jctruffet.com/image/image_64/64_Abbadia_9.jpg"]},"Consult_chateau_formulaire6396":{"id":"Consult_chateau_formulaire6396","dept":"64","canton":"Saint-Palais","commune":"Aroue-Ithorots-Olhaiby","nom":"Abbadie","type":"Château","periode":"XVII","histoire":"ABBADIE, le territoire dAroue-Ithorots-Olhaiby possède plusieurs demeures dexception, dont le château dAbbadie.\r\nÉdifié au XVIIe siècle, ce château est la propriété des seigneurs dAbbadie dIthorots. Bien que lhistoire de cette maison noble comprenne encore des zones dombres, Bertrand dAbbadie occupe les fonctions de président à Mortier au parlement de Navarre.\r\n le château dAbbadie est aujourdhui une propriété privée.","architecture":"maison noble d'Abbadie, la taille importante de lédifice indique une certaine puissance. Dailleurs, on sait quà la moitié du XVIIIe siècle. Le vaste château sélève sur deux niveaux et comporte une toiture très pentue où lon peut voir des petites lucarnes. Sa façade ordonnancée sétend sur onze travées, les trois travées extérieures sont en léger avant-corps, ce qui donne limpression de pavillons, quant aux trois travées centrales, plus étroites, elles sont surmontées par un fronton triangulaire. Dun grand intérêt architectural de par ses proportions.","habitants":"Bertrand dAbbadie\r\n        \"","divers":"Le château d'Abbadie  43° 19' 04? nord, 0° 57' 07? ouest à  Aroue-Ithorots-Olhaiby","gps":"","images":["../../jctruffet.com/image/image_64/64_Abbadie_1.jpg"]},"Consult_chateau_formulairea73c":{"id":"Consult_chateau_formulairea73c","dept":"64","canton":"Mourenx","commune":"Laà-Mondrans","nom":"Abbadie_de_Laa","type":"Château","periode":"XVII-XX","histoire":"ABBADIE de LAA, lexistence du château à Laà-Mondrans, est attestée dès le XIIIe siècle. Il sagit alors dune demeure en bois, propriété du seigneur et abbé laïque de Laà.\r\nEn 1340, Gaston II, comte de Foix et vicomte de Béarn, autorise le propriétaire Pierre de Laà, à rebâtir sa maison en pierre et à y faire des fortifications.","architecture":"La commune de Laà-Mondrans est située à quelques kilomètres dOrthez.  Ce premier édifice connaît un agrandissement dès le XVIIe siècle.  La réunion des deux villages nest officielle quà la fin du XIXe siècle, mais ils sont pourtant déjà liés à la fin du Moyen-Âge.\r\nLe lieu est connu des archéologues depuis quon y a découvert une petite « meule dormante », dorigine préhistorique. De plus, non loin de la ferme Peyraube, sélève une motte avec fossés, provenant de lépoque médiévale.","habitants":"Abbé laïque de Laà\r\n        \r\n        \"","divers":"Le château de Laa Mondrans","gps":"","images":["../../jctruffet.com/image/image_64/64_Abbadie_de_Laa_1.jpg","../../jctruffet.com/image/image_64/64_Abbadie_de_Laa_2.jpg"]},"Consult_chateau_formulaire65ac":{"id":"Consult_chateau_formulaire65ac","dept":"64","canton":"Mourenx","commune":"Abos","nom":"Abos","type":"Maison forte","periode":"XVII","histoire":"ABOS, le château dAbos, dont les fondations sont très anciennes, était la demeure de Pierre de Marca il y a demeuré durant le XVIIe siècle. Lune de ses filles, Christine, épousa Pierre de Navailles baron de Mirepeix. le château qui fut habité dans le début des années 1600 par Pierre de Marca (Historien du Béarn, Archevêque de Toulouse et de Paris) qui tomba amoureux de cet endroit.  Pierre de Marca légua dans son testament son bien au fils de Christine alors seigneur dAsson et dAbos.\r\nAu XVIIIe siècle les terres furent adjugées propriétés nationales, puis revendiquées par Christine devenue comtesse de Girardin. Madame Batsale en fit lacquisition en 1795.","architecture":"Le château d'Abos. Pierre de Marca de 1595 à 1662, né à Gan archevêque de Toulouse puis de Paris, président du parlement de Navarre et grand historien du Béarn occupera cette gentilhommière. Le château Marca et le site du Castet dAbos seront les refuges des maquisards pendant loccupation de 1942 à 1945. Aujourd'hui, le site de cet ancien camp romain est la propriété de Régis Lafon et ses vignes produisent un excellent Jurançon. Sur ce plateau de 5 ha sont situées les vignes.  La maison forte d'Abos de plan en équerre à deux niveaux flanqué au centre intérieur d'une tourelle ronde toit en poivrières.","habitants":"Famille de Pierre de Marca\r\n        \"","divers":"La maison forte d'Abos \r\n43° 21' 34? nord, 0° 33' 56 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Abos_1.jpg","../../jctruffet.com/image/image_64/64_Abos_2.jpg","../../jctruffet.com/image/image_64/64_Abos_3.jpg"]},"Consult_chateau_formulaireaaad":{"id":"Consult_chateau_formulaireaaad","dept":"64","canton":"Nay","commune":"Asson","nom":"Abère","type":"Château","periode":"XV","histoire":"ABERE,  il faut remonter à l'année 1150 pour voir qu'il appartient à un certain Goalhard de Badie et était répertorié comme maison d'Abadie. Cette appartenance est confirmée par le dénombrement de 1385 puis par une sentence de la cour Majour en 1422 qui reconnaît à la Maison d'Abadie la propriété de la 8ème partie des bois et herms d'Asson. Par le truchement de mariages, successions et ventes, la propriété du château va souvent changer de mains. On doit la dénomination de château d'Abère à un testament rédigé en 1501 par Bertrand de Boeil qui lègue la Maison d'Abadie à la famille d'Abère. Celle-ci sera anoblie le 12 septembre 1524 en tant que seigneur du lieu, Pascal d'Abère se déclare propriétaire de la maison abbatiale de Minvielle, attenante à l'église St-Christau; il revendique aussi le droit de prendre la jambe droite de chaque porc qui sera tué et vendu, de prélever une poignée de sel et un verre sur chaque charge qui passera à Asson. En août 1569 après avoir reçu en sa maison le capitaine protestant Montgomery ; le lendemain, lui et sa fille sont assassinés par le capitaine catholique Bonasse. Puis, peut-être par confiscation des biens, le domaine échoit à la famille protestante d'Incamps qui, le 27 novembre 1662 vend l'ensemble à la famille de Gassion. Bien plus tard, la Révolution Française passe par là et le dernier héritier en date, Jean François de Caumia Baillenx, vend la maison d'Abère et ses dépendances à Antoine Valérien Lescun, maire d'Asson. Trente ans plus tard, le 8 mai 1837, son fils revend le tout à la famille d'Angosse. C'est par alliance que le château d'Abère revient à la famille de Luppé qui en est propriétaire depuis la moitié du XIXe siècle.","architecture":"ABERE, à Asson puise ses origines dans les temps les plus reculés du Moyen Âge. Au cours des siècles, il change maintes fois de propriétaires, qui tous participent au façonnement de son aspect actuel. Corps de logis rectangulaire de trois niveaux intercalé de deux tours carrées à quatre niveaux et de tours hexagonales à toit en poivrière.","habitants":"Famille d'Abère                                                                  Famille de Luppé\r\n        \"","divers":"Château d'Abère à Asson","gps":"","images":["../../jctruffet.com/image/image_64/64_Ab%c3%a8re_1.jpg","../../jctruffet.com/image/image_64/64_Ab%c3%a8re_2.jpg"]},"Consult_chateau_formulaire1b5d":{"id":"Consult_chateau_formulaire1b5d","dept":"64","canton":"Oloron Ste-Marie","commune":"Agnos","nom":"Agnos_Soeix","type":"Château","periode":"XVII","histoire":"AGNOS,  a appartenu à la famille de Florence et à celle des Courrèges.  Le château se situe à louest du village dAgnos, dont il est séparé par le ruisseau de la Mielle. La construction de la demeure, accolée à un moulin, est due à linitiative de Jean de Luger, en 1602, lorsquil hérite de ce fief par sa mère. On sait quen 1674 le seigneur de Précilhon a le droit de basse et moyenne justice dans sa maison. Cest en 1764 que Jean-Raymond de Courrèges acquiert les terres.  Le château de Courrèges est la demeure des Laborde, des Luger et des Courrèges, tous grands seigneurs de Précilhon dont les noms ont marqué lhistoire du Béarn.                                                                              Château de Soeix village voisin à l'est pas d'information historique.","architecture":"AGNOS, la motte qui supportait la maison seigneuriale présente de nos jours une plate-forme de 7 à 8 mètres de diamètre, entourée de deux fossés. Ce château est érigé au XVIIe siècle, il sagit alors dun ancien pavillon de chasse, de style Renaissance. Il comprend un portail à bossages  partie saillante du mur destinée à lornementation, surmonté dun couronnement massif qui précède un bâtiment à deux niveaux de travées régulières, avec des fenêtres, lucarnes et frontons à létage. Il comprenait une fresque représentant des scènes galantes et une bibliothèque riche de cartes géographiques encadrées. Malheureusement un incendie, en 1764, dévaste le château, détruisant les bâtiments originels.","habitants":"Famille de Jean-Raymond de Courrèges \r\n        \"","divers":"Le château d'Agnos 43° 09' 50 nord, 0° 37' 19 ouest et le château de Soeix figure 3 et 4   Soeix  43° 10' 09 nord, 0° 35' 29 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Agnos_Soeix_1.jpg","../../jctruffet.com/image/image_64/64_Agnos_Soeix_2.jpg","../../jctruffet.com/image/image_64/64_Agnos_Soeix_3.jpg","../../jctruffet.com/image/image_64/64_Agnos_Soeix_4.jpg"]},"Consult_chateau_formulaire890e":{"id":"Consult_chateau_formulaire890e","dept":"64","canton":"Mauléon-Licharre","commune":"Ordiarp","nom":"Ahetzia","type":"Château","periode":"XVII","histoire":"AHETZIA, la première mention de la terre noble dAhetzia à  Ordiarp remonte au XIIIe siècle, mais le château nest construit sur le domaine que quatre siècles plus tard. Lélégant édifice se dresse toujours dans le quartier dAhetzia. Ahetzia est au Moyen-Âge lune des deux maisons nobles de la localité.  Le domaine et son château restent dans la famille noble dAhetzia jusquau XIXe siècle. Aujourdhui, propriété de la famille Breuil, le château dOrdiarp sert dhabitation.   De siècle en siècle, on la nommée Ahetzia.\r\nLe texte traduit la pérennité de la maison et de son nom et sa vocation daccueil. De part et dautre, des sculptures représentant des scènes de chasse, de pêche, des animaux et une date de 1743.","architecture":"Ahetzia a été, au Moyen-Age, lune des deux maisons nobles de la petite Arbaille. Lélégant édifice se dresse toujours dans le même quartier. Le bâtiment est flanqué dune tourelle cylindrique, coiffée dun toit pointu, et la façade ouest comporte deux pavillons, dont lun sélève sur trois niveaux. Lédifice comporte sinon deux niveaux de fenêtres dont on remarque les corniches et meneaux de bois moulurés. La toiture comporte quant à elle trois lucarnes à croisées de pierre et frontons triangulaires.  Ce fief est mentionné en 1375 Dubarat : la Commanderie et lHôpital dOrdiarp. On voit, au dessus de la porte dentrée, des sculptures variées  des armoiries, le lion de Soule et larbre de vie, symbole de prospérité et de fécondité.","habitants":"Famille noble dAhetzia\r\n        \"","divers":"Château d'Ahetzia 43° 11' 46 nord, 0° 57' 21 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Ahetzia_1.jpg"]},"Consult_chateau_formulairedf1f":{"id":"Consult_chateau_formulairedf1f","dept":"64","canton":"St-Palais","commune":"Aicirits camou Suhast","nom":"Aicirits_Camou_Suhast","type":"Château","periode":"XII-XVII","histoire":"CAMOU, il date du XVIIe siècle, le château de Camou recèle des collections d'outils anciens et de maquettes de machines tirées des plans de Léonard de Vinci. Le château de Camou est inscrit aux M.H. depuis 1993.  Le domaine fut transmis aux Gassion jusqu'en 1791 et érigé en  marquisat.                                             SALHA, depuis le Moyen-Âge, la commune dAïcirits est protégée par des maisons nobles, dont celle de la famille Salha. Bien quaujourdhui le château de Salha soit une grande demeure du XVIIIe ou du XIXe siècle, il existe les ruines du château médiéval de la famille Salha sur un monticule proche du village.   Datant du XIIe siècle, ces ruines illustrent les traditions architecturales du Moyen-Âge puisque lancienne demeure seigneuriale est située sur une motte castrale. À linstar des autres grandes familles locales, la famille Salha prend part aux conflits navarrais du XVe au XVIIe siècle. De nos jours, le château de Salha a changé de propriétaires. Il ne faut pas le confondre avec les demeures homonymes de Bardos et de Saint-Jean-le-Vieux. L'ancien château de Camou, inscrit au M.H depuis 1993.","architecture":"AICIRITS, proche de Saint-Palais à Camou (commune d'Aicirits), cette maison forte du XVIe siècle, située sur une motte féodale du XIe siècle, a fait lobjet dune importante restauration. Lescalier en colimaçon situé dans la tourelle vous mène ensuite à létage où est évoqué lhistorique du lieu complété dune collection originale de maquettes en fonctionnement, inspirée de modèles de la Renaissance et de Léonard de Vinci.     CAMOU, érigé sur une motte datée du XIIe siècle, ce domaine fut occupé par  la famille de Camou qui, à la fin du XVIe siècle  s'éteignit faute d'héritier.  Entre 1850 et 1860, l'édifice fut démoli en partie et réduit de moitié.  Le bâtiment qui subsista fut alors utilisé par son propriétaire comme grenier à maïs pendant de nombreuses années. En 1983 il sera enfin acheté, pour le franc symbolique, par la commune d'Aïcirits-Camou-Suhast. Depuis cette date, la commune y effectue d'importants travaux de sauvegarde. La salle du rez-de-chaussée présente une collection d'outils anciens et relate la vie rurale et agricole. L'escalier en colimaçon mène ensuite le visiteur à l'étage où est retracée l'histoire des seigneurs de Camou et de la famille des Gassion dans le royaume de Navarre. Une collection de maquettes fonctionnelles réalisées à partir de notes et croquis de Léonard de Vinci et Francesco Di Giorgio y est également exposée.","habitants":"Famille Salha                                                                 Famille des Gassion\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Salhla grav 1 et 2 et Camougrav 3 et 4 à  43° 21' 54 nord, 1° 01' 09 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Aicirits_Camou_Suhast_1.jpg","../../jctruffet.com/image/image_64/64_Aicirits_Camou_Suhast_2.jpg","../../jctruffet.com/image/image_64/64_Aicirits_Camou_Suhast_3.jpg","../../jctruffet.com/image/image_64/64_Aicirits_Camou_Suhast_4.jpg"]},"Consult_chateau_formulairee6c7":{"id":"Consult_chateau_formulairee6c7","dept":"64","canton":"Mauléon-Licharre","commune":"Mauléon-Licharre","nom":"Andurain_Maytie","type":"Château","periode":"XVI-XVII","histoire":"ANDURAIN, à Mauléon, dit de Maÿtie , est un bel exemple de l'architecture du début du XVIIe siècle au pays basque. Edifié dans les années 1600 par l'évêque d'Oloron, Arnaud Ier de Maÿtie, le château est toujours habité par les descendants de la famille.  Le château fut édifié par Arnaud de Maÿtie, nommé évêque d'Oloron par Henri IV en 1598 avec pour mission de rétablir le culte catholique dans un diocèse à majorité protestant. Le château, jamais vendu, est conservé dans la même famille depuis sa construction.  Le château d'Andurain est un exemple remarquable.  Quant au mobilier, il date des XVII-XVIII-XIXe siècles. Le château est habité par les Maÿtie est la propriété de la famille dAndurain d'Azémar de Fabrègues. Le château est toujours la propriété des descendants de l'évêque Maÿtie.                            Manoir de Bela de construction récente XIXe siècle plan rectangulaire à trois niveaux avec un retour en équerre pourenglobé une tour ronde à cinq niveaux toit en croupe avec lucarnes.","architecture":"ANDURAIN, l'architecture est de style renaissance,  des lucarnes ouvragées. L'inclinaison de l'immense toit, ainsi que les matériaux dont il est recouvert, des bardeaux de châtaignier, témoignent de l'influence de l'époque médiévale au même titre que les gargouilles situées aux angles des tours.  A l'intérieur, on peut admirer, outre de remarquables cheminées   sculptées, un escalier à volées droites ajourées d'une élégante  arcature. Dans les combles, on découvre l'audacieuse charpente en triple carène de navire renversée. La totalité du château est inscrite au M.H le 19 mai 1925 ; les façades, toitures et cheminées intérieures sculptées sont classées le 2 octobre 1953 ; laile sud du château, dans sa totalité est inscrite le 24 novembre 2005. Le château présente une forme rectangulaire,  avec une façade particulièrement remarquable par son élégance : fenêtres à meneaux et à frontons, des lucarnes ouvragées, arcs brisés allégeant les lignes, mascarons, balcon ouvragé. Cette façade forme le contrepoint de l'imposante toiture à la charpente en bardeaux de châtaignier, haute de trois étages. Sa partie centrale d'un étage plus comble est de forme rectangulaire. Trois tours seulement subsistent des quatre tours d'origine, la quatrième ayant été brûlée puis abattue lors de la révolte du curé Matalas en 1661.","habitants":"Famille de Maÿtie\r\n        \"","divers":"Château d'Andurain   43° 13' 11 nord, 0° 53' 26 ouest à Mauléon-Licharre","gps":"","images":["../../jctruffet.com/image/image_64/64_Andurain_Maytie_1.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_2.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_3.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_4.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_5.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_6.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_7.jpg","../../jctruffet.com/image/image_64/64_Andurain_Maytie_8.jpg"]},"Consult_chateau_formulaireceba":{"id":"Consult_chateau_formulaireceba","dept":"64","canton":"Pontacq","commune":"Angaïs","nom":"Angais","type":"Château","periode":"XX","histoire":"ANGAIS, le château dAngaïs est construit par les architectes Pierre Gabarret et Jules-Antoine Noutary en 1907-1908.  En 1385  la commune accueillait une abbaye laïque, vassale de la vicomté de Béarn.  Angaïs dépendait alors du bailliage de Pau. La baronnie d'Angaïs, créée en 1656, comprenait Beuste, Ousse et Sendets. Angaïs ressortait de la notairie de Nay. Le château d'Angaïs, construit en 1907 - 1908, est inscrit à l'inventaire supplémentaire des M.H depuis le 30 juin 2000.\r\nCe château était, dans les années 1970, un centre de traitement et de convalescence. Il accueillait des enfants atteints de cardiopathies, Rhumatismes Articulaires Aigus, Néphrites.","architecture":"Dans la commune dAngaïs se trouve un imposant château emblématique de larchitecture béarnaise du début du XXe siècle.  Il comprend outre le château proprement dit, des écuries et un remarquable parc dessiné par larchitecte paysagiste Decorges. Ancré au coeur du village, ce parc à langlaise à effet très naturel a conservé sa structure initiale. Le corps de logis principal de plan rectangulaire à trois niveaux avec lucarnes et attiques sur toit brisé,  flanquée d'un pavillon rectangulaire sur le flan de droite même niveau et toit trés pentus à l'opposé donjon en angles  toit à lucarnes très pointu avec lanternon et sur l'arrière pavillon carré.","habitants":"Famille de Pierre Gabarret et Jules-Antoine Noutary\r\n        \r\n        \"","divers":"Château d'Angaîs  à Angaïs 43° 14' 15 nord, 0° 14' 47 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Angais_1.jpg","../../jctruffet.com/image/image_64/64_Angais_2.jpg","../../jctruffet.com/image/image_64/64_Angais_3.jpg"]},"Consult_chateau_formulaire7e91":{"id":"Consult_chateau_formulaire7e91","dept":"64","canton":"Anglet","commune":"Anglet","nom":"Anglet_Villa","type":"Villa-Château","periode":"XVIII-XIX","histoire":"A ANGLET, plusieurs châteaux  et villas, le château de BAROJA  (voir article) BRINDOS, appartenant à Serge Blanco, hôtel 5 étoiles.                                                 Chateau de CADAROC, l'anglais, Lord Howden, ancien ambassadeur d'Espagne et propriétaire du château de Caradoc à Bayonne.                                  le château BEATRIX Enea met en valeur sur 3 salles les arts visuels et les démarches artistiques tant novatrices qu'éclectiques. Le parc accueille également des oeuvres. Deux grandes expositions sont présentées par an.                                                         CHIBERTA, hôtel golf se developpa à partir de 1925 avec la création du financier belge Leowenstein et de l'architecte anglais M.T. Simpson.                                  Villa SOFIA (voir article)","architecture":"Villa Campbell, Villa Sapiéta, Villa Béatrix-Enéa, Villa Brindos  Villa  Chiberta, Villa Hel-Hogar, Villa Bagueras et la Villa Souzanna. Toutes ces villas sont de construction du XIXe siècle et de style différents  typiquement du Béarn.","habitants":"Les frères Gomez\r\n        \r\n        \"","divers":"Villa  Chiberta grav 1,    Villa Bagueras grav 2,  Villa Béatrix-Enéa grav 3 et 4,     Villa Hel-Hogar grav 5,  Villa Souzanna grav 6.  Villa Sapiéta grav 7,   Villa Campbell grav 8 et la  Villa Brindos grav 9 .","gps":"","images":["../../jctruffet.com/image/image_64/64_Anglet_1.jpg","../../jctruffet.com/image/image_64/64_Anglet_2.jpg","../../jctruffet.com/image/image_64/64_Anglet_3.jpg","../../jctruffet.com/image/image_64/64_Anglet_4.jpg","../../jctruffet.com/image/image_64/64_Anglet_5.jpg","../../jctruffet.com/image/image_64/64_Anglet_6.jpg","../../jctruffet.com/image/image_64/64_Anglet_7.jpg","../../jctruffet.com/image/image_64/64_Anglet_8.jpg"]},"Consult_chateau_formulairebe35":{"id":"Consult_chateau_formulairebe35","dept":"64","canton":"Artix","commune":"Arthez-d","nom":"Angosse","type":"Château","periode":"XVII","histoire":"ANGOSSE en  1772 de Jean-Paul dAngosse. Sénéchal et gouverneur dArmagnac, marquis de Louvie. Il est peut-être le seul à avoir dirigé les forges, en tout cas pendant la Révolution. Il y fut secondé par son fils Armand. Il obtint la création de la communauté indépendante dArthez-dAsson, accordée en 1787, malgré lopposition dAsson. En 1798 : Armand dAngosse qui fut le premier maire dArthez-dAsson ; il dirigea les forges pendant quelques années, avant de les remettre, en 1809, entre les mains de son frère ainé Charles en 1809 devient marquis dAngosse, fils ainé de Jean-Paul dAngosse. À la Révolution, il émigra en Espagne, en 1835  Casimir dAngosse, comte, frère dArmand et de Charles. Après la mort de Charles en 1835, Casimir avait reçu la propriété des forges et du domaine. Mais cest Armand qui en avait lusufruit et qui soccupa à nouveau de la gestion. En 1838  Charles dAngosse, marquis, fils de Casimir. Mais cest Armand dAngosse qui continua à diriger les forges jusquà sa mort en 1852. En 1873  Casimir dAngosse, à la mort de son père Charles, le vend en 1875  à sa sur Gabrielle, épouse du vicomte de Borelli,  Gabrielle dAngosse tenta brièvement, en 1898, de reprendre une activité dexploitation du minerai de Baburet. Elle vendit finalement le domaine à Mme Laquiante en 1906.  propriétaire à Paris.   La famille dAngosse conserve le domaine et lexploitation minière jusquà la fin du XIXe siècle. Parfaitement conservé au fil des siècles, le château de Corbère-Abères sillustre par la célébrité de ses occupants. Il devient la propriété de Coco Chanel dans les années 1930, quand le célèbre cinéaste Robert Bresson acquiert lune des dépendances. Vendu en 1945, à la comtesse de Valenziani, il est actuellement propriété anglaise.","architecture":"Angosse  Aux abords de la commune dArthez-dAsson se trouve un château du XVIIe siècle dénommé château dAngosse. Ce bâtiment imposant possède des écuries monumentales présentant une architecture des plus originales. Situé à lécart du village, au fond dun parc, le château, alors appelé des Forges est construit en 1690 par Paul dIncamps, ancien propriétaire des forges dArthez-dAsson. En 1772, Jean-Paul dAngosse hérite des forges dArthez-dAsson. Il sinstalle alors dans le château qui prend le nom de la famille dAngosse.  Le château conserve des écuries visiblement postérieures à lédification. Elles prennent la forme de deux corps de bâtiments perpendiculaires percés darcades en anse de panier. Ces grandes baies sont surmontées de lucarnes et de pignons à redents.","habitants":"Famille dAngosse\r\n        \"","divers":"Le château d'Angosse et ses écuries","gps":"","images":["../../jctruffet.com/image/image_64/64_Angosse_1.jpg","../../jctruffet.com/image/image_64/64_Angosse_2.jpg"]},"Consult_chateau_formulairec442":{"id":"Consult_chateau_formulairec442","dept":"64","canton":"Bayonne","commune":"Bussunanits-Sarrasquette","nom":"Aphatéa","type":"Château","periode":"XV-XVIII","histoire":"APHATEA, Aphatea 'abbaye' est un ancien fief de Bussunarits vassal du royaume de Navarre mentionné sous la forme Aphat  dans le dictionnaire topographique du Béarn-Pays basque. La maison noble d'Apat est citée dans la liste des feux du royaume de Navarre en 1313 sous le nom de Appate et en 1366 sous palacio dapate. La seigneurie appartient à la famille d'Ahaxe en 1413 et au XVIe siècle à une branche de la famille de Saint-Esteben. Au début du XVIIe siècle, l'édifice est en possession des Lostal de Saint-Palais. Par mariage, il revient aux Etchepare de Sarrasquette en 1664, Un blason aux armes des Etxepare de Sarrasquette est accompagnée de l'inscription Pax Sit Huic Domui renovato en 1731. Puis au XIXe siècle à la famille Van den Zande dont descendent les propriétaires actuels.","architecture":"APHATEA date des XVe et XVIIIe siècles, époque au cours de laquelle les tours sont construites.  La porte murée au nord-ouest paraît dater du XVIIe siècle, elle occupe l'emplacement de la porte d'origine. Une nouvelle campagne de restauration a lieu en 1731, date portée sur la nouvelle porte d'entrée pratiquée au nord-est. La maison se compose d'un corps de logis de plan presque carré à un étage carré et un étage de comble cantonné de tours circulaires hors-oeuvre. Les murs, de plus de un mètre d'épaisseur, sont en moyen appareil de calcaire. Le corps principal est surmonté d'un toit à longs pans et croupe en tuiles creuses, les tours avec toit polygonal dont chaque pan repose sur une section de corniche de forme bombée. Les tuiles plates sont disposées en écailles de poisson. Une corniche identique couronne chaque élévation du corps de logis. La tour ouest abrite un escalier à vis sans jour. L'appareil de calcaire est nettement plus régulier sur cette façade qu'ailleurs, dans un soucis d'esthétisme peut-être. On y retrouve un blason sculpté sur la clé de l'arc de la porte. La façade principale ordonnancée à trois travées est au nord-est depuis la restauration de 1731.  L'élévation sud-est, plus étroite, surplombe un ruisseau accessible par un escalier en pierre. La dépendance la plus proche abrite un bûcher et anciennement un four à pain, détruit. La dépendance en U dans la cour abrite des étables.","habitants":"Famille d'Ahaxe\r\n        \"","divers":"Château d'Aphatéa 43° 09' 43 nord, 1° 10' 34\r\n ouest  a à Bussunants-Sarrasquette","gps":"","images":["../../jctruffet.com/image/image_64/64_Aphat%c3%a9a_1.jpg"]},"Consult_chateau_formulaired51b":{"id":"Consult_chateau_formulaired51b","dept":"64","canton":"Oloron ste-Marie","commune":"Cette-Eygun","nom":"Arancé","type":"Château","periode":"XIII-XV","histoire":"ARANCE, situé au cur des Pyrénées, dans le village de Cette-Eygun, le chateau d'Arance vous accueille dans un établissement datant du XIIIe siècle. Il propose une terrasse offrant une vue panoramique sur les montagnes environnantes. Hôtel restaurant.","architecture":"Château du XIV-XIXe siècle, corps de logis rectangulaire avec partie décallé sur l'intérieur   à deux niveaux sur soubassements important et toit imposant recouvert d'ardoise et lucarne, l'édifice est accolé d'un donjon à quatre niveaux toit à quatre pans.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château d'Arancé à Cette Eygun","gps":"","images":["../../jctruffet.com/image/image_64/64_Aranc%c3%a9_1.jpg","../../jctruffet.com/image/image_64/64_Aranc%c3%a9_2.jpg","../../jctruffet.com/image/image_64/64_Aranc%c3%a9_3.jpg"]},"Consult_chateau_formulaire3d05":{"id":"Consult_chateau_formulaire3d05","dept":"64","canton":"Mourenx","commune":"Araux","nom":"Araux","type":"Château","periode":"XIX","histoire":"ARAUX  entouré dune végétation abondante, est construit à la fin du XIXe siècle. Il est accessible par une allée boisée, au départ du bourg dAraux.  Elle devint une dépendance de la baronnie de Jasses, datant de 1644, qui comprenait, outre Araux, Araujuzon, Jasses, Montfort et Viellenave.","architecture":"ARAUX, sa façade de style Île-de-France, élevée sur deux niveaux, est rythmée par cinq travées ouvertes par de grandes baies au sommet arrondi. Elle est recouverte dun crépi orangé qui contraste avec la blancheur des pierres de taille, entourant les fenêtres. Le troisième niveau est aménagé sous un toit dardoises. On remarque quil est éclairé par trois lucarnes ovales, bordées de pierres de taille.\r\nÀ lintérieur du château, létage est desservi par un escalier en arc de cercle, implanté au fond du hall dentrée. \r\nDans la cour du château dAraux, une ferme de construction plus ancienne est suivie dune grange, récemment aménagée en logement. Lensemble est rattaché au corps principal.","habitants":"Baron de Jasses\r\n        \"","divers":"Château d'Araux","gps":"","images":["../../jctruffet.com/image/image_64/64_Araux_1.jpg"]},"Consult_chateau_formulaire926c":{"id":"Consult_chateau_formulaire926c","dept":"64","canton":"Saint-Palais","commune":"Arbouet-Sussaute","nom":"Arbouet","type":"Château","periode":"XV","histoire":"ARBOUET, évoque lhistoire des barons dArbouet, grande famille du village depuis le Moyen-Âge. À la fin du Moyen-Âge, il existe dans les environs du village les demeures seigneuriales de cette famille : elles sont baptisées les palais dArbouet. Aucun vestige de ces bâtisses nest visible de nos jours. La famille dArbouet sunit avec les dUhart grâce au mariage de leur fille, Marie de Laplace, avec Armand dUhart. Cela permet à la famille daccroître son pouvoir sur les terres bas-navarraises. Comme la plupart des grandes familles locales, elle participe aux conflits qui déchirent la Navarre jusquau XVIIe siècle.","architecture":"Aujourdhui, le château dArbouet est une demeure édifiée probablement au XVIIIe siècle, comme en témoigne le fronton placé au-dessus de lune de ses entrées. Arbouet de plan en U à deux niveaux toits en ardoise en croupe  pavillon  d'entrée saillant avec fronton sur flan.","habitants":"Famille dArbouet\r\n        \"","divers":"Château d'Arbouet","gps":"","images":["../../jctruffet.com/image/image_64/64_Arbouet_1.jpg"]},"Consult_chateau_formulaire2697":{"id":"Consult_chateau_formulaire2697","dept":"64","canton":"Lons","commune":"Arbus","nom":"Arbus","type":"Château","periode":"XVIII","histoire":"ARBUS,  en 1311, Arnaud Arbusi fut évêque de Lescar, en 1385, lors du recensement de Gaston Fébus était gouverné par un domengerv. « Lostau deu seignor » y est recensé.   Le 24 Octobre 1489, François de Navaille, seigneur de Peyre et dArbus consentit « laffièvrement » des bois de la commune à ses vassaux. Lors des guerres de religion, Arbus ayant refusé le protestantisme, Jean de Gassion, procureur de la reine Jeanne dAlbert, et Arnaud de Caze, greffier, se rendirent le mardi 21 Février 1569 au château dArbus pour vendre les biens, meubles, récoltes, vins et affermer le château, terres et dépendances. Le seigneur étant en fuite, cest sa dame Michelle de Corcelles qui les reçut. Refusant de dire où était son mari, elle fut menacée dexpulsion immédiate, mais elle résista farouchement et obtint un sursis. La maison seigneuriale avec ses « vignes, camps, pachéras, böscs, moulin deu löc dArbus » fut affermée devant tous ces personnages réunis. Les diverses ventes apportèrent 700 écus dor.\r\nEn 1714, les habitants se soulevèrent contre Gassion à cause dune fiscalité excessive. Néanmoins, Arbus resta sous sa dépendance jusquà la Révolution.","architecture":"ARBOS, le site du château d'Abos, point culminant de la commune (260 m) est un oppidum (ancien camp romain). Sur ce plateau de 5 ha sont situés les vignes (1.7 ha) et le château qui fut habité dans le début des années 1600 par Pierre de Marca (Historien du Béarn, Archevêque de Toulouse et de Paris) qui tomba amoureux de cet endroit.                                               ARBUS, le château dArbus est particulier, car si ses origines en tant que château fort remontent au XIIe siècle, il est avant tout érigé sur les vestiges dun antique castera. Lédifice actuel date cependant du XVIIIe siècle. de plan rectangulaire à deux niveaux et lucarnes sur toit en croupes. Le castera sur lemplacement duquel sélève le château dArbus est un camp préhistorique gallo-romain datant a priori du IIIe siècle.","habitants":"Famille de Jean de Gassion\r\n        \"","divers":"Château d'Arbus 43° 19' 51 nord, 0° 30' 31 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Arbus_1.jpg"]},"Consult_chateau_formulaire8b2c":{"id":"Consult_chateau_formulaire8b2c","dept":"64","canton":"Bidache","commune":"Sillégue","nom":"Arbérats","type":"Château","periode":"XVIII","histoire":"ARBERATS, édifiée vers lan 1000, ses commanditaires sont  la grande famille dArbérats qui donne par la suite son nom au village. La première habitation, baptisée le Palacio dArbérats, est construite dès le XIIe siècle et perdure au moins jusquen 1387. Depuis la motte castrale jusquau XIXe siècle, lhistoire du château dArbérats est  marquée par trois familles : les dArbérats, les dArmendaritz dArbérats et les dArthez Lassalle. Le blason à 10 coquilles dor sur fond rouge appartient à la famille dArbérats. Selon une légende plausible, ces coquilles furent gagnées par les chevaliers, conduits par le Roi Ramire I de Léon, à la bataille de Clavijo, en 846, contre les Maures.  Malgré le caractère récent de la construction, elle est détruite au XIXe siècle sur linitiative de sa propriétaire Mathilde de Lalande dOlce, épouse dArmand Arthez Lassalle, ancien maire de la commune. Femme dépensière, éprise de mondanités, elle aurait fait détruire le château pour y faire construire, entre 1895 et 1898, la somptueuse demeure que lon peut encore admirer aujourdhui.   Le 21 février 1948, le château devient la propriété de la caisse dallocations familiales de Gironde, pour être un centre de colonies de vacances jusquen 2005.","architecture":"En dépit de son style du XIXe siècle, les origines du château dArbérats sont très anciennes puisquelles datent du Moyen-Âge. La bâtisse actuelle résulte de diverses campagnes de reconstruction. Comme la plupart des demeures seigneuriales médiévales, cest initialement une motte castrale qui se trouve à lemplacement définitif du château.    Il est possible que cette construction soit conservée jusquau XVIIIe siècle, époque à laquelle un nouveau château est édifiée.  En 1993, une partie de lédifice est rénové et transformé en site de vacances, labellisé gîtes de France, mais lopération na eu que très peu de succès.","habitants":"Famille dArbérats\r\n        \"","divers":"Château d'Arbérats à Sillègue","gps":"","images":["../../jctruffet.com/image/image_64/64_Arb%c3%a9rats_1.jpg"]},"Consult_chateau_formulairea7ed":{"id":"Consult_chateau_formulairea7ed","dept":"64","canton":"Ustaritz","commune":"Arcangues","nom":"Arcangues_Bosquet","type":"Château","periode":"XII-XVII","histoire":"Deux châteaux à Arcangues celui d'Arcangues et celui du Bosquet                                                             ARCANGUES, reconstruit en 1900 sur les plans du précédent qui datait du 17e siècle, au milieu d'un jardin aux chênes centenaires, préserve à travers les siècles l'âme et la passion de ses ancêtres ainsi que son patrimoine demeuré intact. La visite de ce musée, à l'intérieur même des grandes salles du château, permet de revivre l'histoire d'une famille illustre qui fréquenta et accueillit les grands de ce monde et les artistes de son temps.  Napoléon III et son épouse receptionnent des personalités de la vie mondaine et enfin, la chambre que le  Duc de Wellington occupé en 1813.  Au XXe siècles le marquis d'Arcanges fit de grandes receptions eurent lieu avec  de hautes personnalités. En 1973 à la mort du huitième marquis d'Arcangues, son fils Guy marquis d'Iranda prends la main du château en créant un golfe et un hôtel.      BOSQUET Situé dans le quartier Lanchipiette. Le château du Bosquet est contemporain au château dArcangues fut reconstruit en 1905 par Jean-Baptiste Ernest Lacombe pour le compte d'André Soulange-Bodin, ministre plénipotentiaire. Il est situé au quartier Lanchipiette. Sa particularité est de présenter au nord, une façade édifiée dans le style anglais, et au sud, une façade dans le style basco-normand. Il ouvre sur un vaste panorama de la chaîne des Pyrénées et du golfe de Gascogne appartient durant le XXe siècle à la famille Soulange-Bodin.","architecture":"ARCANGUES, première mention  du XIIe siècle en maison forte incendié en 1636, reconstruit au XVIIe siècle, en 1900 menace de s'éffronder, reconstruit  en style balnéaire  comporte un corps de logis central, encadré par deux importants pavillons d'angles plus élevé d'un demi-étage se prolongeant sur l'arrière pour donner à l'édifice un plan en H. Sur la façade sud, une tour fait saillie. Ce quatrième château offre une apparence plaisante avec ses façades percées de larges ouvertures et hérissées de bow-windows. L'aspect un peu massif et ses pavillons d'angle, plus élevés  que le corps de logis principal est atténué par les toits plats reposant sur des consoles de bois sculptées dans un style basques espagnol. De hautes lucarnes à frontons cintrées chevauchent  les combles, le centre de la façade sud est marqué par une tourelle cylindrique coiffée d'un toit conique                       BOSQUET Il est situé au quartier Lanchipiette. Sa particularité est de présenter au nord, une façade édifiée dans le style anglais, et au sud, une façade dans le style basco-normand. Il ouvre sur un vaste panorama de la chaîne des Pyrénées et du golfe de Gascogne.  Pour cette nouvelle réalisation, Lacombe, spécialiste des monuments historiques, choisit loriginalité en créant deux façades aux styles totalement différents, lune anglaise, lautre basco-normande.","habitants":"Famille d'Ogier d'Arcanges                                        Famille Soulange-Bodin\r\n        \"","divers":"Château d'Arcangues 43° 26' 10 nord, 1° 31' 01 ouest et du Bosquet à Arcangues","gps":"","images":["../../jctruffet.com/image/image_64/64_Arcangues_Bosquet_1.jpg","../../jctruffet.com/image/image_64/64_Arcangues_Bosquet_2.jpg","../../jctruffet.com/image/image_64/64_Arcangues_Bosquet_3.jpg","../../jctruffet.com/image/image_64/64_Arcangues_Bosquet_4.jpg","../../jctruffet.com/image/image_64/64_Arcangues_Bosquet_5.jpg","../../jctruffet.com/image/image_64/64_Arcangues_Bosquet_6.jpg"]},"Consult_chateau_formulairedb23":{"id":"Consult_chateau_formulairedb23","dept":"64","canton":"Mourenx","commune":"Cardesse","nom":"Arcet","type":"Château","periode":"XV-XIX","histoire":"ARCET,  bien que la Révolution chasse les derniers seigneurs, le château demeure un symbole puissant de cette riche histoire. Jean d'Arcet ou Jean Darcet, né le 7 septembre 1724, à Doazit (où résidait sa famille, mais baptisé dans le village voisin dAudignon), mort le 12 février 1801 à Paris, est un chimiste français. il est dabord précepteur des fils de Montesquieu, dont il sera lami jusquà sa mort. Il est reçu médecin en 1762, puis, sétant lié damitié avec Guillaume-François Rouelle, il étudie la chimie. En 1774, il est nommé professeur au Collège de France, puis directeur de la manufacture de Sèvres, inspecteur des monnaies, membre de lAcadémie des sciences, où il remplace Pierre Joseph Macquer. On lui doit lart de fabriquer la porcelaine, que jusqualors on importait, lextraction de la gélatine des os, une contribution, en tant que contrôleur des travaux de Nicolas Leblanc, à la fabrication de la soude à partir du sel marin, linvention de lalliage fusible qui porte son nom, et de nombreuses analyses chimiques. Il est nommé au Sénat conservateur le 4 nîvose an VIII, représentant avec dautres (Gaspard Monge) la composante savante de cette assemblée. Jean dArcet est le père de Jean-Pierre-Joseph d'Arcet.","architecture":"ARCET, face à léglise, témoigne dune longue histoire seigneuriale à Cardesse, cette bâtisse ne date que du XIXe siècle, la présence dune demeure seigneuriale est attestée déjà au XVe siècle. La façade donnant sur la rue est alignée sur celle de léglise jusquà ce que cette dernière modifie son plan à la fin du XIXe siècle. Nous retrouvons les éléments architecturaux qui donnent toute la noblesse à cette grande demeure béarnaise : un toit dardoise dont la surface imposante est égayée par des fenêtres lucarnes nombreuses et symétriques ; et enfin un portail monumental et une grande grille ornés de boules qui annoncent une maison de maître.","habitants":"Famille de Jean d'Arcet\r\n        \"","divers":"Château d'Arcet à Cardesse","gps":"","images":["../../jctruffet.com/image/image_64/64_Arcet_1.jpg","../../jctruffet.com/image/image_64/64_Arcet_2.jpg"]},"Consult_chateau_formulaire27ab":{"id":"Consult_chateau_formulaire27ab","dept":"64","canton":"Oloron Ste-Marie","commune":"Aren","nom":"Aren","type":"Château","periode":"XV-XVII","histoire":"AREN, le premier seigneur d'Aren connu est Auger d'Aren mentionné vers 1100, ainsi que son épouse Bialana. Leur descendante : Béatrix, dame d'Aren  née vers 1165  se maria en 1189 à Géraud de Mauléon.\r\nLa baronnie établie en 1658 était vassale de la vicomté de Béarn.  Le château d'Aren  date du XVe siècle.  Agrandi et érigé en baronnie au XVIIe siècle, date à laquelle le baron Paul de Mesplès en est propriétaire.  Au XVIIIe siècle, la demeure passe à la famille des Charitte.","architecture":"AREN, érigé face à léglise paroissiale dAren, le château date pour ses parties les plus anciennes du XVe siècle. Sa physionomie actuelle relève cependant davantage dune campagne de construction du XVIIe siècle. Il est le monument emblématique de la commune dAren. Il ne reste cependant que peu de traces du château fort originel qui est agrandi et érigé en baronnie au XVIIe siècle,  La nouvelle demeure englobe lancienne, les deux échauguettes médiévales en encorbellement de la façade sud sont intégrées.\r\nLe château comprend deux corps de bâtiment de deux étages à toit mansardé. Lun, du XVe siècle, est édifié en blocs de grès beige, doré à rouille ; lautre en galets disposés en feuilles de fougère et de briques. Un bel escalier en calcaire succède à la porte.  Le château dAren est sauvé de la ruine en 1978 et, depuis 1984, les façades et les toitures sont inscrites à linventaire des M.H et la salle du premier étage avec sa peinture murale de laile sud sont classées.","habitants":"Baron Paul de Mesplès\r\n        \"","divers":"Château d'Aren 43° 15' 39 nord, 0° 41' 20 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Aren_1.jpg"]},"Consult_chateau_formulairee8a9":{"id":"Consult_chateau_formulairee8a9","dept":"64","canton":"Serres-Castet","commune":"Luc-Armau","nom":"Armau","type":"Château","periode":"XII-XVI","histoire":"Trois châteaux à Armau dont celui d'Armau de Lascazères  et de Luc.                                                 ARMAU, au lieu-dit Manibete, date, quant à lui, du XVIIe siècle.  Le château dArmau jouit dun emplacement stratégique, en surplomb de la vallée du Vic-Bilh et à la frontière de la Bigorre. Il est édifié primitivement aux XVIe et XVIIe siècles sur la terre noble de Lassède et appartient alors aux seigneurs de Germenaud. Le château dArmau fait actuellement office de ferme.                                                          LASCAZERES , centre médico  professionnel.              LUC À Luc, la commanderie de lordre de Malte, qui est rattachée plus tard à Caubin, est signalée dès le XIIe siècle. De ce riche passé, on peut encore admirer la Ferme Lacommande. Linstallation dune commanderie à Luc sexplique sans doute par sa situation en bordure de la Bigorre, sur le chemin de Saint-Jacques-de-Compostelle. Cette ancienne voie romaine est en effet très tôt empruntée par les pèlerins de Compostelle sur la voie de Provence. À cette époque, le commandeur est seigneur des deux villages de Luc et dArmau, qui fusionnent en 1381. Sa puissance est avérée par son admission aux États de Béarn.","architecture":"ARMAU, complètement remanié au XIXe siècle, il conserve de sa première construction ses deux tours rectangulaires, encadrant le corps de bâtiment.  Ses éléments les plus remarquables consistent en une grande cheminée à faux manteau et un pigeonnier sur piliers du XVIIe siècle, mais qui se révèlent tous deux fort remaniés. Il est édifié aux XVIe et XVIIe siècles sur la terre noble de Lassède et appartient alors aux seigneurs de Germenaud.  Le château dArmau fait actuellement office de ferme.\r\nLUC, commanderie mentionnée au XIIIe siècle et rattachée à la Commanderie Caubin (Arthez de Béarn) avant 1540. L'hôpital était ruiné en 1557 et en 1640. Réaménagé dans la 2e moitié du XVIIe siècle. Baie du XVIe siècle en remploi. De plan rectangulaire à trois niveaux et attiques flanqué d'un troit en croupe et accolé en façade interne de deux tours rondes toits en poivrières.                                                                        LASCAZERES, corps de logis prrincipal imposant de trois niveaux avec lucarnes sur un toit en croupe deux pavillons de plan carrés saillant sur les extrémités et donjon circulaire  a crénaux et mâchicoulis sur l'arrière.","habitants":"seigneurs de Germenaud\r\n        \"","divers":"Château d'Armau, de Lascazères et du Luc à Armau","gps":"","images":["../../jctruffet.com/image/image_64/64_Armau_1.jpg","../../jctruffet.com/image/image_64/64_Armau_2.jpg","../../jctruffet.com/image/image_64/64_Armau_3.jpg","../../jctruffet.com/image/image_64/64_Armau_4.jpg","../../jctruffet.com/image/image_64/64_Armau_5.jpg"]},"Consult_chateau_formulairef16d":{"id":"Consult_chateau_formulairef16d","dept":"64","canton":"Mourenx","commune":"Rivehaute","nom":"Arramée","type":"Château","periode":"XVI","histoire":"ARRAMEE ou Larramée, situé à lextrémité sud de Rivehaute, présente une architecture raffinée qui témoigne de limportance de ses commanditaires. Il appartient à la famille de Casamajor de Gestas de la fin du XVe siècle jusquen 1847. Il est ensuite légué par le dernier descendant à un cousin Bachoué, comte de Barraute. La famille de Bachoué le conserve jusquà la moitié du XIXe siècle, où il revient à un cousin issu de la famille Bachoué-Barraute.","architecture":"Le château d'Arramée se présente sous la forme dun édifice rectangulaire, dont la longueur est orientée est-ouest. Il est constitué dun corps de logis percé de cinq travées sur deux niveaux et encadré par deux tours quadrangulaires. Les parties supérieures forment un jeu de toitures, couvertes dardoises. Celle du corps de logis est mansardée, tandis que celles des tours sont pointues. Aux jointures de ces trois parties, on peut voir deux souches de cheminées couronnées dun bandeau en saillie, avec des boules à chaque angle.\r\nLes trois lucarnes des combles surmontées de candélabres témoignent quant à elles de la grandeur architecturale due aux nobles qui sinstallent à Rivehaute à la fin du XVe siècle.Enfin, lentrée dans le château de lArramée se fait sur la façade nord. On distingue encore au-dessus de la porte les restes dun fronton cintré, en bloc de grès jaunâtre, sûrement aménagé au cours du XVIIe siècle.","habitants":"Famille de Casamajor de Gestas\r\n        \"","divers":"Château d'Arramée à Rivehaute","gps":"","images":["../../jctruffet.com/image/image_64/64_Arram%c3%a9e_1.jpg","../../jctruffet.com/image/image_64/64_Arram%c3%a9e_2.jpg","../../jctruffet.com/image/image_64/64_Arram%c3%a9e_3.jpg","../../jctruffet.com/image/image_64/64_Arram%c3%a9e_4.jpg","../../jctruffet.com/image/image_64/64_Arram%c3%a9e_5.jpg"]},"Consult_chateau_formulaire7a46":{"id":"Consult_chateau_formulaire7a46","dept":"64","canton":"Serres-Castet","commune":"Arricau-Bordes","nom":"Arricau_Bordes","type":"Château","periode":"XVI","histoire":"trois châteaux à Arricau-Bordes celui d'Arricau-Bordes, de Lahitole et de Blachon à  Séméacq.                     ARRICAU BORDES, citée dès 1150, Arricau-Bordes semble avoir abrité la plus ancienne seigneurie de la région du Vic-Bilh, à lextrême nord du Béarn, certainement grâce à sa situation défensive, à flanc de coteau, les seigneurs dArricau sétablissent très tôt sur ce territoire et bâtissent le castel dArricau au XIVe siècle. Au XVIIe siècle passe à la famille d'Abbadie par alliance  et  en 1751 toujours par alliance à la famille Montesquiou d'Artagnan. Les seigneurs dArricau y demeurent, jusquà la Révolution, en 1781 Marie de Montesquiou décéde sans héritier, légué à un neveu Martrin d'Abbadie dont la fille épouse François Lacoste propriétaire lorsque éclate la Révolution  prennent le chemin de l'exil, leur fille Magdeleine de Lacoste apporte Arricau à son époux Jean Louis de Pratvie passera à leur petite-fille des Lacoste,  Augustine de Lagarrigue, baronne de Nays-Candau qui s'en défait en 1879 au profit d'un prêtre catholique britanique, Alfred Guillaume Dolmann, à la mort de ce dernier le château passe de main en main  avant d'être acquis en 1968 par monsieur Gilbert Terradot qui le restaure.  LAHITOLLE du XVIII-XXe siècle pas d'information historique.                                                                SEMEACQ, A deux kilomètres au nord-Est, le château de Blachon date de la fin du XVIe siècle.","architecture":"Le château d'Arricau est établi depuis le XIVe siècle, construit de 1572 à  1585. Il est classé par les M.H inscription datant de 1988.  Le château dArricau est construit sur une motte, au bout dun éperon rocheux qui surplombe la vallée du Lèes. Il est composé de deux corps de bâtiment au centre desquels se tient la cour intérieure dite des Gardes. Le corps de logis à gauche est dédié à Saint-Michel, lautre, à droite, à Saint-Jacques. La porte dentrée se situe au pied dune tour octogonale qui surplombe la tour Saint-Jacques. La date de 1583 gravée sur son linteau indique déjà un premier remaniement, dont on suppose que Jean dArricau, abbé de Monpezat, est le maître duvre. La terrasse, la tour descalier octogonale et le pigeonnier datent de cette époque. Son échauguette fait l'objet d'un classement de la part du ministère de la Culture.                                            À Bordes, la demeure dite château de Bordès apparaît au XVIIIe siècle. Pittoresque par son site et son architecture dun type très courant au XVIe siècle, (maison avec tour descalier et échauguette), modifié aux XIXe et XXe siècle.","habitants":"Seigneurs d'Arricau\r\n        \"","divers":"Chhâteau d'Arricau-Bordes   43° 29' 54? nord, 0° 09' 06 ouest    de Blachon grav 6, de Séméacq  grav 7.","gps":"","images":["../../jctruffet.com/image/image_64/64_Arricau_Bordes_1.jpg","../../jctruffet.com/image/image_64/64_Arricau_Bordes_2.jpg","../../jctruffet.com/image/image_64/64_Arricau_Bordes_3.jpg","../../jctruffet.com/image/image_64/64_Arricau_Bordes_4.jpg","../../jctruffet.com/image/image_64/64_Arricau_Bordes_5.jpg","../../jctruffet.com/image/image_64/64_Arricau_Bordes_6.jpg","../../jctruffet.com/image/image_64/64_Arricau_Bordes_7.jpg"]},"Consult_chateau_formulaire38bf":{"id":"Consult_chateau_formulaire38bf","dept":"64","canton":"Nay","commune":"Arros de Nay","nom":"Arros","type":"Château","periode":"XII-XVI-XIX","histoire":"ARROS de NAY, citée dès le XIe siècle en tant que baronnie.  Au XIIe siècle, une famille noble qui possédait les seigneuries de Rode, Vauzé et la viguerie de Lembeye prit possession du fief qui devient par la suite Arrode puis Arros. Elle est dailleurs la septième du Béarn en terme dimportance et ce, jusquau XVIe siècle où Jeanne dAlbret, mère du futur Henri IV, convertie au protestantisme, est reine de Navarre. Cest Bernard dArros, qui, à ce moment-là prend fait et cause pour la Réforme. Nommé capitaine des armées de la Régente, il est ainsi chargé de la défense de la citadelle de Navarrenx. Le nom des Arros disparaît ensuite, lorsquen 1589 la petite-fille de Bernard dArros épouse Pierre de Gontaut-Biron, puis passe aux d'Espalungue. Aujourdhui, cest dailleurs un descendant de la branche cadette des Arros qui possède le château,  propriété de monsieur Pierre Joly.","architecture":"Le château d'Arros l'entrée du domaine fermée par une monumentale grille de fer forgé se trouve près de l'église actuelle. Situé au milieu d'un parc magnifique traversé par un ruisseau (le Luz), le château se compose d'un grand corps de logis principal datant du XVle siècle. Sa base est rectangulaire, la façade principale est orientée vers le Sud-Est. Deux ailes en équerre ont été ajoutées : celle du Sud-Ouest, encadrée de deux tourelles édifiées sur des vestiges du château primitif, date de la fin du XVllle siècle et celle du Nord-Est, terminée par une tour d'angle polygonale, a été construite au milieu du XIX siècle.  Le majestueux corps de logis principal, construit en pierre dArros d'un appareil très soigné, comprend un rez-de-chaussée sur caves et deux étages, le tout couvert d'une immense toiture d'ardoises à forte pente. Sa façade principale est très harmonieuse, avec aux extrémités ses deux portes fenêtres à perron en pierre, et ses dix fenêtres à meneau. Celles du second étage sont surmontées de frontons triangulaires ou en arc de cercle, date partiellement du  XVIIe siècle. Son inscription par les M.H date de 1988. ainsi que les façades du château mais aussi les toitures du corps principal ainsi que des anciennes écuries, le salon et son décor, sont inscrits à linventaire des M.H.","habitants":"Famille d'Arros\r\n        \"","divers":"Château d'Arros 43° 11' 56 nord, 0° 17' 26 ouest à Arros de Nay","gps":"","images":["../../jctruffet.com/image/image_64/64_Arros_1.jpg","../../jctruffet.com/image/image_64/64_Arros_2.jpg"]},"Consult_chateau_formulaireb2ee":{"id":"Consult_chateau_formulaireb2ee","dept":"64","canton":"Lons","commune":"Artiguelouve","nom":"Artiguelouve","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Artigelouve les vestiges du premier château, le deuxième château et celui de  Cinquau     ARTIGUELOUVE, installé sur la rive gauche du gave de Pau, le château dArtiguelouve surveille depuis ce lieu le gué historique qui permettait notamment aux pèlerins de Compostelle de traverser le fleuve. Ces atouts stratégiques ont permis à Artiguelouve de se constituer en place forte et en seigneurie, dès le XIe siècle. En 1652, le château est acheté au dernier descendant des seigneurs dArtiguelouve par Pierre de Fouron, maître des monnaies de Béarn et de Navarre. La famille Fouron le conserve jusquà la Révolution.\r\nVers 1850, le nouveau propriétaire, M. Thierry, entreprend de restaurer le domaine en remaniant toutes les baies des bâtiments, et en couvrant les toitures dardoises.                                                    CINQUAU dans la famille  de viticulteur depuis 1617, entouré de 9 hectares de vignes.","architecture":"Artiguelouve, le donjon carré du château, haut de plus de 30 mètres, remonte à la fin du XIVe siècle et fait penser aux constructions de Gaston Fébus, qui méprisait la mode des tours rondes, de rigueur à lépoque.   Les deux corps de logis à angle droit qui entourent le château datent pour leur part de la fin du XVIe siècle, et suivent un plan en équerre peu usité en Béarn.  Dans le parc se trouve une ancienne chapelle castrale, qui date du XIVe siècle, qui servait à la fois de chapelle  et déglise du village.  Malheureusement, il y a plus de vingt-cinq ans, un incendie ravage le donjon, entraînant la destruction partielle des corps de logis latéraux. La chapelle, en partie écroulée, se trouve également dans un piteux état. Les ruines du château dArtiguelouve se trouvent donc isolées au milieu des prés et englouties par la végétation.         CINQUAU  Dans un espace de verdure étonnamment orchestré, entre vallons verdoyants, vignes et sobres circuits joliment tracés, aux couleurs naturelles, s'est lové un théâtre, en demi cercle, à l'image d'une arène aux gradins de pierre. une impressionnante baie vitrée, devant une immense terrasse donnant sur les vignes, dans un festival de lumière, une salle à l'acoustique parfaite, au spectaculaire plafond de bois  et dehors comme dedans on peut tout imaginer","habitants":"Famille de Fouron \r\n        \"","divers":"Château d'Artiguelouve  43° 19' 29 nord, 0° 29' 11? ouest et le château de Cinquau grav 5","gps":"","images":["../../jctruffet.com/image/image_64/64_Artiguelouve_1.jpg","../../jctruffet.com/image/image_64/64_Artiguelouve_2.jpg","../../jctruffet.com/image/image_64/64_Artiguelouve_3.jpg","../../jctruffet.com/image/image_64/64_Artiguelouve_4.jpg","../../jctruffet.com/image/image_64/64_Artiguelouve_5.jpg"]},"Consult_chateau_formulairecf76":{"id":"Consult_chateau_formulairecf76","dept":"64","canton":"Nay","commune":"Assat","nom":"Assat","type":"Château","periode":"XII-XVII","histoire":"ASSAT, la \" bastide de Durfort \" aurait été créée vers 1280 par le vicomte de Durfort, à côté dun bourg préexistant.  Elle sest peu développée, et en 1391 elle est rattachée au village voisin dont elle adopte le nom : Assat. Une longue tradition en fait la plus ancienne bastide du Béarn.    Les assises du château paraissent remonter au XIIe siècle. Les armes de Gaston Fébus figurent sur une des portes de la tour  ce qui est peut être une indication sur la date de son édification au milieu et  à la fin du XIVe siècle . Vers le début du XVIIe siècle, le château fut transformé en une gentilhommière à larges fenêtres à meneaux et croisillons  pour la famille de Noguès, alors propriétaire du château et seigneur du fief le plus important d'Assat, celui de Saint-Aubin. Au XIXe siècle, la salle du premier étage a été ornée de peintures mythologiques, classées « monument historique » en 1959, ainsi que la salle et les toitures. Le château est une propriété privée,  salle, élévation, toiture et décor intérieur du château classés\r\nM.H. Propriété de monsieur Henri Graciès.","architecture":"Les vestiges du château d'Assat primitif pourraient remonter au XIIe siècle. Château du XIVe et   du XVIIe siècles, est bâti dans la partie ouest du village. C'est un bâtiment de 21 m sur 16 m à trois niveaux, flanqué d'une tour rectangulaire à quatre niveaux surmontée d'un toit pyramidal,  le château actuel comporte une tour donjon sans  doute édifiée à la fin du XIVe siècle, puis aménagée au début du XVIIe siècle.  Le donjon carré du château, haut de plus de 30 mètres, remonte à la fin du XIVe siècle et fait penser aux constructions de Gaston Fébus, qui méprisait la mode des tours rondes, de rigueur à lépoque. On raconte dailleurs que ce dernier a installé son rendez-vous de chasse dans le corps du château.  Au XlVe siècle, cette forteresse faisait partie du système défensif, afin  de verrouiller les frontières orientales de la vicomté de Béarn. Les parements du donjon construits en assises de galets et lits de  briques, ainsi que la porte daccès à la tour, frappée des armes de Gaston Fébus, datent de cette époque.\r\nAu XVIIe siècle, la priorité nétait plus à la défense, le corps de logis fortifié fit place à une élégante résidence décorée de fenêtres à meneaux et croisillons, où primait la notion desthétique. Au XIXe siècle, le plafond de la grande salle du premier étage du château dAssat fut orné dun décor peint mythologique. Le parc fut fermé par un mur en galets et souvrit par un portail monumental (grille en fer forgé).","habitants":"Vicomte de Durfort\r\n        \"","divers":"Château d'Assat   43° 15' 00 nord, 0° 18' 04 ouest à Assat","gps":"","images":["../../jctruffet.com/image/image_64/64_Assat_1.jpg","../../jctruffet.com/image/image_64/64_Assat_2.jpg","../../jctruffet.com/image/image_64/64_Assat_3.jpg","../../jctruffet.com/image/image_64/64_Assat_4.jpg"]},"Consult_chateau_formulaire7344":{"id":"Consult_chateau_formulaire7344","dept":"64","canton":"Orthez","commune":"Athos_Aspis","nom":"Athos_Aspis","type":"Vestiges","periode":"XIV","histoire":"ASTHOS, le célèbre mousquetaire de la garde royale, fils cadet d'Adrien de Sillègue, seigneur d'Athos et d'Auteville. Ce mousquetaire, homme d'épée rendu célèbre par le roman d'Alexandre Dumas sous le nom d'Athos, est mort à Paris en 1643. L'ancienne abbaye, dédiée à saint Martin de Sunarthe et devenue par la suite seigneurie, a appartenu à une branche des ascendants des Sillègue d'Athos.  Cette demeure dAthos-Aspis, dont ne subsistent que quelques pans de murs, pourrait être la maison natale dArmand de Sillègue, connu sous un nom romanesque. Armand de Sillègue dAthos dAutevielle est en effet célèbre sous un nom de la littérature, celui dAthos, mousquetaire du roi. Cadet de famille, né en 1615, il entre vers 1640 dans le régiment des mousquetaires de la garde du roi. Il meurt, 3 ans plus tard. En réalité, le mousquetaire Athos, héros du roman dAlexandre Dumas, emprunte peu au personnage réel, si ce nest sa fonction et une partie de son nom. Dans le roman, Athos mène en effet une vie plus longue, plus héroïque, et est issu dune famille beaucoup plus illustre. Lancien château de La Salle, ou Lassale, peut être la maison natale dArmand de Sillègue, mais il est possible également que sa naissance ait lieu dans la maison forte de Moliède dans le même village, ou encore dans le village dAutevielle, dont son père est également seigneur. La renommée de son nom étant tardive, et purement littéraire, lhistoire ne conserve que peu de traces de ce personnage réel, cadet du Béarn comme beaucoup dautres.","architecture":"ATHOS, outre l'église d'origine romane, se dressent l'ancien fief de Moliède d'Athos où se trouvait un bac célèbre et les ruines d'un moulin.   la maison forte de Moliède d'Athos, dont il reste de forts murs. À lécart dAspis, au lieu-dit Castet, se trouve le château dAspis.                                                                          ASPIS est situé sur le rebord du plateau qui domine les terres alluviales et la rive droite du gave dOloron.  La seigneurie dAspis est mentionnée dès le XIIe siècle. Puis, lorsque Gaston Fébus reçoit lhommage de nombreux seigneurs béarnais en 1364, on sait que Guilhem, senhor dEspis, en fait partie. À la fin du XVe siècle, la maison dAspis est anoblie par Catherine de Navarre. Elle devient ainsi seigneurie « de paroisse », avec droit de basse et moyenne justice, droit de créer baile et jurats et droit pour le propriétaire de siéger aux États de Béarn. À lépoque, la maison basse à un étage est entourée de fossés, granges, pressoir, basse-cour, ainsi que dun jardin avec deux pigeonniers. Après la Révolution, cette demeure que lon appelle « lo castet » passe à la famille Davant qui en est toujours propriétaire.  Ravagé par un incendie en 1943, le château dApis est complètement modifié. Les murs sont enduits dun crépi et le toit est couvert de tuiles modernes.","habitants":"Famille d'Armand Sillègue d'Athos\r\n        \"","divers":"Vestiges du château d'Asthos et château à Aspis","gps":"","images":["../../jctruffet.com/image/image_64/64_Athos_Aspis_1.jpg","../../jctruffet.com/image/image_64/64_Athos_Aspis_2.jpg","../../jctruffet.com/image/image_64/64_Athos_Aspis_3.jpg"]},"Consult_chateau_formulaire9e22":{"id":"Consult_chateau_formulaire9e22","dept":"64","canton":"Mourenx","commune":"Audaux","nom":"Audaux_Gassion","type":"Château","periode":"XVI","histoire":"AUDAUX,  cest à la famille Gassion que lon doit laspect actuel du château dAudaux, cest pourquoi il est connu dans la région, sous le nom de château de Gassion. Pendant les guerres de Religion, son héritier, Armand de Gontaut, Sénéchal de Béarn et Seigneur dAudaux, soppose aux saccages des églises, organisés par les troupes de Jeanne dAlbret. À cause de cet affront, le château est incendié en 1569 par les protestants. À la mort dArmand de Gontaud en 1592, lédifice est en partie reconstruit,  en 1650, le château est acheté par Jean de Gassion, président au parlement de Navarre, et son fils y entreprend des travaux de rénovation quelques années plus tard. \r\nLe château est ainsi en très bon état lorsquil est vendu en 1806 par le dernier descendant des Gassion. Sy succèdent ensuite de nombreux propriétaires. Dès 1849, Antoine dAbbadie dArrast y aménage son premier observatoire scientifique avant de le revendre au profit dun domaine situé à Hendaye, où il fait construire le fameux château dAbbadia. En 1919 acquis par monsieur Wilcox.   En 1944, le domaine est acheté par la Fondation des Orphelins Apprentis dAuteuil, une fondation reconnue dutilité publique depuis 1929, qui est toujours propriétaire des lieux et qui abrite désormais les établissement scolaires et éducatifs Sainte-Bernadette. Enregistré par les M.H depuis 1947.","architecture":"AUDAUX, mentionné dès 1423, sa construction sapparente  à celles des célèbres édifices qui bordent la Loire, ce qui vaut à la demeure le surnom de petit château de la Loire en Béarn,  sa construction dit de Gassion date du XVIe siècle. De plan en U se compose d'un corps de logis, flanqué de deux pavillons en saillie, eux mêmes prolongés par deux ailes en équerre terminées par des pavillons qui délimitent la cour d'honneur. Le corps central sur cour a une façade de style Renaissance avec des lignes horizontales soulignées par des bandeaux à la base des fenêtres et des bandaux doubles entre les étages et une corniche à la naissance du toit. En 1592, lédifice est en partie reconstruit, toujours dans le style Renaissance. De cette époque,  il conserve, entre autres, les fenêtres à meneaux de la cour intérieure encadrée de pilastres. Le toit d'ardoise en croupes est chevauché par des lucarnes à pilastres et à entablements incrustés de marbres que somment des frontons triangulaires accostées de volutes.  Ces remaniements de style classique donnent au château son aspect définitif, à lexception de laile gauche, incendiée au XIXe siècle. Laménagement de deux ailes allongées de sept travées permet dencadrer le bâtiment central, afin dapporter une certaine homogénéité à lensemble, une porte plein cintre dont la clé et les écoinçons sont en pointes de Diamant. Sur le comble les lucarnes alternent avec des oculus donnant sur la cour fermée.","habitants":"Famille de  Gassion \r\n        \r\n        \"","divers":"Château d'Audaux 43° 21' 27 nord, 0° 47' 37 ouest  à Audaux","gps":"","images":["../../jctruffet.com/image/image_64/64_Audaux_Gassion_1.jpg","../../jctruffet.com/image/image_64/64_Audaux_Gassion_2.jpg","../../jctruffet.com/image/image_64/64_Audaux_Gassion_3.jpg","../../jctruffet.com/image/image_64/64_Audaux_Gassion_4.jpg","../../jctruffet.com/image/image_64/64_Audaux_Gassion_5.jpg","../../jctruffet.com/image/image_64/64_Audaux_Gassion_6.jpg","../../jctruffet.com/image/image_64/64_Audaux_Gassion_7.jpg"]},"Consult_chateau_formulairefc5c":{"id":"Consult_chateau_formulairefc5c","dept":"64","canton":"Lagor","commune":"Audéjos","nom":"Audéjos","type":"Château","periode":"XVIII","histoire":"AUDEJOS le château dAudéjos appartient sous lancien régime à la seigneurie de Gayrosse qui est une des dix grandes baronnies du Béarn connut depuis le XIIIe siècle.","architecture":"AUDEJOS, reconstruit au XVIIIe siècle, il présente une architecture sobre et raffinée, sur la motte dorigine, sélève encore au début du XVIIIe siècle, un quadrilatère de dimensions modestes, flanqué de quatre tours. Partiellement détruit par un incendie en 1743, il est reconstruit au cours des années suivantes, mais les tours dangles ne sont pas rebâties, cependant, une des tour dorigine subsiste, au nord-ouest. Le corps de logis est orienté vers le sud. Il se compose de deux niveaux. La partie centrale, en léger avant-corps, est coiffée dun fronton triangulaire appareillé, percé dun oculus. De chaque côté, deux travées plus étroites de fenêtres sont légèrement cintrées. Des lucarnes en plein cintre leur correspondent dans la haute toiture.\r\nLa motte a été aménagée en terrasse de trois côtés, à laquelle on accède par une quinzaine de marches. À lest, sous la terrasse, est ménagé laccès de plain-pied aux cuisines et aux caves. À lest du château dAudéjos, se déploie un jardin à la française avec parterres et charmilles.","habitants":"Seigneurie de Gayrosse \r\n        \"","divers":"Château d'Audéjos","gps":"","images":["../../jctruffet.com/image/image_64/64_Aud%c3%a9jos_1.jpg","../../jctruffet.com/image/image_64/64_Aud%c3%a9jos_2.jpg","../../jctruffet.com/image/image_64/64_Aud%c3%a9jos_3.jpg"]},"Consult_chateau_formulairec99a":{"id":"Consult_chateau_formulairec99a","dept":"64","canton":"Morlaàs","commune":"Sedze-Maubecq","nom":"Augerot","type":"gentilhommière","periode":"XVIII","histoire":"AUGEROT, Le recensement de 1385 fait mention de cette abbaye laïque. Elle est alors habitée par labbé , plus connu en Béarn sous le nom de Domenger. Cest un seigneur local qui possède des droits et des privilèges comme un banc permanent dans le chur de léglise, une chapelle privée ou le droit de sépulture dans le lieu de culte. Au cours des fêtes de fin dannée, il a même droit au tiers des offrandes. En 1538, labbaye appartient à Anselme de Momas, et passe ensuite par héritage aux Marsan puis aux Poey.\r\nAu XVIIIe siècle, la propriété est transmise par mariage aux dAugerot, qui cumulent alors les charges de seigneurs et dabbés laïques de Sedze jusquà la Révolution. Labbaye est réaménagée en demeure familiale selon les critères architecturaux à la mode.\r\nLe château est aujourdhui une propriété privée.","architecture":"Augerot, situé sur lancienne commune de Sedze, est à lorigine une abbaye laïque transformée en demeure de plaisance au XVIIIe siècle;  mentionné en 1385 : l'Ostau de l'Abadie. L'édifice date du 4e quart du XVIIIe siècle.","habitants":"L'abbé Domenger\r\n        \"","divers":"La gentilhommière d'Augeros à  Sedze Maubecq","gps":"","images":["../../jctruffet.com/image/image_64/64_Augerot_1.jpg","../../jctruffet.com/image/image_64/64_Augerot_2.jpg","../../jctruffet.com/image/image_64/64_Augerot_3.jpg"]},"Consult_chateau_formulaire05ef":{"id":"Consult_chateau_formulaire05ef","dept":"64","canton":"Orthez","commune":"Andrein","nom":"Baillenx","type":"Château","periode":"XVI","histoire":"Trois châteaux à Andrein celui de Baillenx, de Betouzet  et Bachoué pas d'information historique et image pour ce dernier.                                              BAILLENX  est mentionné pour la première fois en 1544. Il sagit du château le plus ancien dAndrein, situé dans la partie primitive du village, près de léglise. Propriété de la famille de Caumia-Baillenx, à la fin du XVIIe siècle et au début du XVIIIe siècle, elle est ensuite très remaniée par Claire-Madeleine de Gassion.                                                         BETOUZET,   est un fief créé en 1614, vassal de la vicomté de Béarn.","architecture":"Château de Baillenx situé dans la partie primitive du village, près de léglise. Lédifice est à lorigine une abbaye laïque. Cette demeure seigneuriale aux dimensions modestes est entourée dun grand fossé, de granges, décuries et dun parc. On peut aussi y découvrir un jardin, avec un pigeonnier remarquable et une métairie.  Au XVIII e siècle  la propriétaire fait notamment aménager les combles. De nombreuses cheminées sont ajoutées et le toit refait  est ouvert de trois lucarnes.  La façade principale au sud  comporte trois travées avec deux étages et les combles. Un petit escalier et un perron précèdent la porte dentrée à encadrement mouluré et entablement travaillé, à lintérieur du château de Baillenx, un escalier central de style Louis XIII à gros balustres dessert les étages.  Domaine de BETOUZET avec une aile Louis XIII, une façade Louis XIV, une terrasse à litalienne, un pont de bois, et un pigeonnier orné de faïences mauresques.","habitants":"Famille de Caumia-Baillenx\r\n        \"","divers":"Château de Baillenx  43° 23' 22 nord, 0° 53' 54 ouest  et de Bétouzet Bachoué 43° 23' 33 nord, 0° 53' 21 ouest","gps":"","images":["../../jctruffet.com/image/image_64/64_Baillenx_1.jpg","../../jctruffet.com/image/image_64/64_Baillenx_2.jpg"]},"Consult_chateau_formulaireef64":{"id":"Consult_chateau_formulaireef64","dept":"64","canton":"Anglet","commune":"Anglet","nom":"Baroja","type":"Château","periode":"XVII","histoire":"BAROJA, une famille dorigine mexicaine, les Santos Suarez, fait construire un château au cur dun parc, dès 1876. En 1899, la propriété est rachetée par Joachim de La Gandara y Navarro, marquis de Baroja, et dont le domaine prend le nom et le conserve. Après lachat du château par la famille de la Gandara, en 1899, le château connaît quelques transformations exécutées sous la direction de larchitecte Gustave Huguenin, originaire de Biarritz.  La marquise Flora décède en 1942 et les officiers allemands occupent la Villa; des prisonniers sénégalais furent \"logés\" dans les écuries. La famille s'exile vers l'Italie et la Suisse. Vers 1944 les enfants de Joachim de la Gandara, héritiers du domaine, décident de louer puis rapidement  et de vendre le château à la ville de Toulouse qui y installe une colonie de vacances et agrandit le domaine et construction de nouveaux bâtiments. En 1997, la propriété de Baroja est acheté par la ville dAnglet qui récupère un important patrimoine au cur de la ville. Depuis, le domaine accueille diverses manifestations et des expositions dart contemporain.  La ville dAnglet a investi 2,8 millions deuros pour remettre aux normes le château de Baroja, qui accueille le centre de loisirs sans hébergement (CLSH) pour les 613 ans.","architecture":"BAROJA, la famille Santo Suarez, d'origine mexicaine, fait construire la Villa et aménager le parc dès 1876. En 1899 la propriété est rachetée par Joaquim de la Gandara y Navarro, marquis de Baroja et fait exécuter quelques transformations par l'architecte Gustave Huguenin. Le corps de logis principal de plan  rectangulaire à deux niveaux sur soubassements à cinq travées avec lucarnes sur toit brisé, la travée centrale légèrement en retrait et fronton pour les quatre autres, sur les flans pavillon rectangulaire à trois niveaux et lucarnes sur toit à l'impérial.  Jusque-là, seul le rez-de-chaussée était utilisé. Désormais lensemble du château est accessible.","habitants":"Famille des Santos Suarez\r\n        \"","divers":"Château de Baroja","gps":"","images":["../../jctruffet.com/image/image_64/64_Baroja_1.jpg","../../jctruffet.com/image/image_64/64_Baroja_2.jpg","../../jctruffet.com/image/image_64/64_Baroja_3.jpg","../../jctruffet.com/image/image_64/64_Baroja_4.jpg","../../jctruffet.com/image/image_64/64_Baroja_5.jpg"]},"Consult_chateau_formulaired896":{"id":"Consult_chateau_formulaired896","dept":"64","canton":"Orthez","commune":"Sainte-Suzanne","nom":"Baure","type":"Château","periode":"XVI","histoire":"BAURE, cette imposante maison noble de Sainte-Suzanne appartient à lorigine à Perarnaud de Baure, qui lui donne son nom, autrefois, le domaine était une exploitation importante, qui sétendait   jusquà Salles-Mongiscard. Lhistoire du château est ancienne : lassociation Mémoire du canton de Lagor et de la vallée du Laà lui a consacré un article fouillé dans un bulletin, que sest procuré Lionel Bénichou. « La propriété était déjà répertoriée en 1385 », note-t-il. Elle doit son nom à la famille de Baure, qui la habitée au XIXe siècle. Le député des Basses Pyrénées a en effet laissé son nom à la demeure et même à la rue qui longe le tribunal de Pau.\r\nAujourdhui, le domaine na plus sa fonction dexploitation. La famille Bénichou a progressivement remplacé les fermages par des peupliers, dans lesquels le vent vient fredonner sa musique.  Nous sommes très attachés à cette propriété, conclut Lionel Bénichou. Nous nous y sentons bien.","architecture":"Baure, Installée au bord du Laà, cette imposante maison noble de Sainte-Suzanne appartient à lorigine à Perarnaud de Baure, qui lui donne son nom. Entouré dun parc, le château se compose dun logis, de dépendances et dun moulin. Ce dernier, construit sur un îlot, est accessible grâce à un pont sur le Laà.  Le bâtiment principal, de forme rectangulaire, présente deux étages et une tour descalier cylindrique. Son toit pointu est recouvert dardoise, comme le veut lusage en Béarn. De plus, la construction, de type classique, utilise le calcaire et le grès, matériaux très présents dans la région dOrthez, est aujourdh
