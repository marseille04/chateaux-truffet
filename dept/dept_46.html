. Des croisées témoignent de travaux réalisés au XVIe puis au XVIIe siècle.","habitants":"Commandeur Pierre Martel à Déodat de Barasc\r\n        \r\n        \r\n        \"","divers":"La maison forte d'Espédaillac","gps":"","images":["../../jctruffet.com/image/image_46/46_Espedaillac_1.jpg","../../jctruffet.com/image/image_46/46_Espedaillac_2.jpg","../../jctruffet.com/image/image_46/46_Espedaillac_3.jpg","../../jctruffet.com/image/image_46/46_Espedaillac_4.jpg","../../jctruffet.com/image/image_46/46_Espedaillac_5.jpg"]},"Consult_chateau_formulaire1457":{"id":"Consult_chateau_formulaire1457","dept":"46","canton":"Figeac","commune":"Faycelles","nom":"Faycelles","type":"Château","periode":"XII-XV","histoire":"FAYCELLES,  le château ne connaîtra pas, comme au temps de la Guerre de Cent Ans, la honte d'une capitulation, en 1343, le cardinal de Montfavet, en faveur des \"cassotz\" de Faycelles par l'intermédiaire de Bertholomévia, tante d'Arnaud de Bouxal, commanderesse de ladite \"malaudia\"  en 1369, le château fût pris par les anglais. Durant 25 ans, entre cette date et 1394 ou l'abbé de Figeac publia un édit de repeuplement, la population disparut entièrement. Elle se reconstitua tout au long du XVe siècle.   Faycelles fût d'abord un domaine du duc d'Aquitaine \"Fiscella villa Nostra\", avant que l'abbé de Figeac vers le XI- XIIe siècle en devienne le seigneur. La construction du château du XIIe siècle. Elle se reconstitua tout au long du XVe siècle. Madame de Caylus donc, de son nom de jeune fille Suzanne d'Estissac, en première noce, le 2 décembre 1565, Jacques de Balaguier, baron de Montsalès, surnommé \"Le Brave\", à cause de ses brillants services durant les luttes religieuses. Il fut tué le 13 mars 1569, à la bataille de Jarnac, gagnée par les catholiques sous les ordres du duc dAnjou. De cette union était née une fille : Marguerite de Balaguier.  Claude d'Hébrard qui épousa, le 2 septembre 1604, Emmanuel de Crussol. C'est ainsi que, par voie d'héritage, Faycelles passa sous la tutelle de cette maison célèbre dont un rameau était implanté au château de Montsalès. Cette union fut stérile. A la mort de sa femme, Emmanuel de Crussol épousa en secondes noces Marguerite de Chasseron dont il eut six enfants. L'un d'eux, Alexandre Galliot, épousa Rose des Cars de Montai et de la Roquebrou. C'est leur fils, Emmanuel de Crussol d'Uzès qui, en 1705, en exécution d'un édit royal, opéra la rétrocession de la seigneurie de Faycelles, qui fit alors retour à l'abbaye de Figeac, après une éclipse de plus d'un siècle.","architecture":"Dans la première moitié du XIIIe siècle, lors du mouvement communal, à une date incertaine que l'on peut situer vers 1230, par référence aux localités avoisinantes et à la dernière trace d'occupation de la \"Crosa de La Mostarda\", il s'établit sur la crête voisine où il s'érigea en bastide. Les documents de l'époque parlent à son sujet de \"La Bastizo\", et l'actuel \"fond de Faycelles\", situé au pied de l'ancien château, est désigné par l'expression : \"polio de la bastizo\". Les rues se coupent en angles droits selon une disposition caractéristique des bastides de ce temps-là, visible encore de nos jours sur le terrain, plus encore sur la carte dite  du Consulat, conservée aux archives du Lot. Celles qui dévalent vers l'Est débouchaient sur l'ancien chemin de Toirac à Figeac, par un goulot à visée défensive dont il reste encore un témoin. Sur le pourtour, les maisons aux murs élevés, aux ouvertures placées très haut pour être inaccessibles, formaient remparts à elles seules. Les toponymes encore en usage sont typiques : la barrière, le portail, la tourelle. Ceux que l'on trouve dans les documents du passé ne le sont pas moins : la maison du Fort, la Terrasse, la place Gaillarde, la Porte Faute, la Porte Basse, le Barri de Callot, le Barri de Carbes. Peut-être le château était-il antérieur à la bastide. En effet, selon Champeval de Vyers , vers le IXe siècle, LAbbaye de Figeac avait construit, pour sa défense, une ceinture de fortifications qui le protégeaient de tous côtés.","habitants":"l'Abbé de Figeac.\r\n        \r\n        \"","divers":"Le château de Faycelles.","gps":"","images":["../../jctruffet.com/image/image_46/46_Faycelles_1.jpg","../../jctruffet.com/image/image_46/46_Faycelles_2.jpg","../../jctruffet.com/image/image_46/46_Faycelles_3.jpg","../../jctruffet.com/image/image_46/46_Faycelles_4.jpg"]},"Consult_chateau_formulaireb47e":{"id":"Consult_chateau_formulaireb47e","dept":"46","canton":"Puy-L","commune":"Sérignac","nom":"Ferrières_Lot","type":"Château","periode":"XVIII","histoire":"FERRIERES, en 1392, Pons de Lézergues, seigneur de Sérignac, épouse Proessa de Mauroux. Les Lézergues se maintiennent dans les lieux jusqu'au milieu du  XVe siècle : de 1459 à 1461, Guillaume de Lézergues, seigneur de Sérignac, apparaît aux côtés des seigneurs de Mauroux, Lavalette et Luzech lors d'un accensement dans la paroisse de Plalong. En 1504, Raymond de Caussade, seigneur de Puycornet et vicomte de Calvignac, dénombre pour Ferrières et Sérignac, parmi de nombreux autres biens, et une Armande de Lézergues est alors mariée à Bertrand de Luzech. La seigneurie est passée aux mains des Bécave avant 1589, date à laquelle Jeanne de Montaigu épouse Pons de Bécave, alors qualifié de seigneur de Sérignac, et en 1708, M. de Bécave possède toutes justices dans la paroisse de Sérignac. Vincent-Sylvestre de Timbrune, a hérité des biens de sa mère. Il s'est retiré sur ses terres de Ferrières en 1763. Il a décidé de faire construire,  un nouveau château. Après sa mort, en 1795, son fils, Jean-Baptiste Cyrus de Timbrune de Thiembronne, général des armées de la République,  Il a émigré après la bataille de Neerwinden, vécu près d'Utrecht à Oud Naardin pour suivre la famille d'Orléans. Le château est alors abandonné à des fermiers. Revenu d'exil, il est devenu sénateur sous l'Empire, grâce à l'appui de madame de Montesson, amie de Joséphine et femme du père de Philippe-Egalité. Le général qui avait épousé une nièce de madame de Genlis. Le château avait été saisi comme bien d'émigré pendant la Révolution mais n'avait pas pu être vendu. Il a obtenu la levée du séquestre et a pu le récupérer, mais il est en piteux état. La seconde fille du général de Valence, Louise Rose Aimé de Timbrune-Thiembrone de Valence, a épousé le 10 août 1816 le maréchal Gérard. Les deux filles du général de Valence ont vendu le château en 1834 à un beau-frère du maréchal Bessières. Une première restauration du château est entreprise qui a duré jusqu'en 1891. Une seconde est commencée après 1918. A la fin du XIXe siècle, le château appartient à un certain Lescole.","architecture":"Avec des vestiges d'un bâtiment du XIIIe ou XIVe siècle, l'état actuel de l'édifice résulte principalement d'une reconstruction du XVIIIe siècle. Une première restauration du château fut entreprise qui dura jusqu'en 1891. Une seconde restauration commença après 1918, de plan rectangulaire toit en croupe pavillons saillant en façades accolé côté parc de deux tours  carrées toit à quatre pans.  Commencée en 1775 à l'emplacement d'un édifice antérieur, la construction fut interrompue en 1789. Le château est compris entre une cour au nord, et les jardins au sud. Il comprend un rez-de-chaussée, établi sur un terre-plein à l'ouest et sur un sous-sol voûté à l'est. Les façades sont de style classique XVIIIe siècle. A l'intérieur, le salon présente une ordonnance ionique, et devait à l'origine, être couvert d'une voussure. Les pièces possèdent des cheminées en marbre Louis XV, surmontées de trumeaux à décor de plâtre mouluré et sculpté. Deux tours de l'édifice médiéval subsistent aux angles nord-est et nord-ouest de la cour. Le château de Ferrières est inscrit aux M.H. depuis le 21/07/1960.","habitants":"Vincent-Sylvestre de Timbrune\r\n        \r\n        \r\n        \"","divers":"Château de Ferrières à Sérignac","gps":"","images":["../../jctruffet.com/image/image_46/46_Ferrieres_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Ferrieres_Lot_2.jpg"]},"Consult_chateau_formulaire7d52":{"id":"Consult_chateau_formulaire7d52","dept":"46","canton":"Figeac","commune":"Figeac","nom":"Figeac","type":"Château","periode":"XV-XVIII","histoire":"A Figeac et à ses environs de nombreux petit châteaux  tel que Bia Lostanges et Piale autres dont je n'ai pas les noms ni l'historique.                                                                                     BIA, un acte de 1483 mentionne une tour et une salle commune appartenant à Guillaume de Bia, marchand de Figeac. Néanmoins aucunes traces de la fin du XVe siècle ne sont perceptibles.","architecture":"Bia,  le corps de logis actuel remonterait au XVIe siècle au début XVIIe siècle. La tour originelle du XVe siècle a disparu au profit d'une tour plus massive datant probablement de la fin du XVIIe siècle ou du début du XVIIIe siècle. Le toit du logis a été surélevé à la fin du XVIIIe siècle ou au début du XIXe siècle. De cette période dateraient les bâtiments d'exploitation mitoyens et indépendants du logis. L'ensemble est actuellement à l'abandon.","habitants":"Guillaume de Bia\r\n        \r\n        \"","divers":"Divers châteaux et manoir à Figeac","gps":"","images":["../../jctruffet.com/image/image_46/46_Figeac_1.jpg","../../jctruffet.com/image/image_46/46_Figeac_2.jpg","../../jctruffet.com/image/image_46/46_Figeac_3.jpg","../../jctruffet.com/image/image_46/46_Figeac_4.jpg","../../jctruffet.com/image/image_46/46_Figeac_5.jpg","../../jctruffet.com/image/image_46/46_Figeac_6.jpg","../../jctruffet.com/image/image_46/46_Figeac_7.jpg"]},"Consult_chateau_formulairecb88":{"id":"Consult_chateau_formulairecb88","dept":"46","canton":"Figeac","commune":"Figeac","nom":"Figeac_Château","type":"Patrimoine","periode":"XIV-XVI","histoire":"FIGEAC, le château de Figeac, de Ceint-d'Eau, du Viguier du Roi, de Tuscan, (voir article suivant)                                                                                                                                                                      SAINT-DEAU, la première mention d'un seigneur de Saint-Dau, nommé Pierre de Cayron, remonte à 1559 : le château n'est probablement pas plus ancien. Gabriel de Cayron est seigneur de Saint-Dau en 1565, et en 1580 le château est assiégé par les protestants , sans que l'on sache dans quelle mesure cet événement a pu affecter l'édifice, il faut probablement attribuer à Pierre de Cayron la construction du château dans la première moitié du XVIe siècle. La fille de Gabriel de Cayron, Catherine  épouse François de Boisset de la Salle avant 1602 ; elle meurt en 1631 et son mari l'année suivante. Entre temps, le 16 mars 1631, a été fondée la chapellenie de Saint-Dau, avec une chapelle aménagée au premier niveau de la tour sud. Le 18 juillet 1636, le château est vendu à Jean Vignes, bourgeois et garde des sceaux de Figeac, puis il passe à François Dumont vers 1650. Après un partage survenu le 16 juin 1723, le château est la propriété du prêtre Exupère de Blanchefort de Pause, puis celle de son neveu Jean-Jacques Lombard. Ce dernier le vend le 30 septembre 1749 à François Guary. Le nom de Ceint-d'Eau a remplacé le nom d'origine après la Révolution.                                                                                         VIGUIER du ROI, château avec sa façade classé, au coeur de la cité Médiévale de Figeac, constitue un heureux mariage de sept siècles darchitecture, depuis le XIIe siècle, dominé par sa tour, construite en 1302.  Les intérieurs sont décorés en concordance avec lépoque des constructions : Gothique pour la Tour du Roy, Louis XV avec ses parquets et boiseries dépoque rehaussées dor, rédiévale avec ses coussièges, Romantique avec ses poutraisons apparentes, ainsi que Renaissance avec sa cheminée monumentale en pierre, transformé en hôtel restaurant.","architecture":"FIgeac, dans le centre historique de la cité médiévale de Figeac, les promeneurs sarrêtent forcément devant le château du Viguier du Roy. Cet édifice, qui date des XIVe et XVIIIe siècles, a été construit sous Philippe IV Le Bel, à partir de différents bâtiments dont le plus ancien remonte au XIIe siècle. Lensemble de 5 000 m2, en parfait état, occupe la quasi-totalité dun quartier du centre-ville et donne sur la place Champollion, actuellement aménagé en un hôtel-restaurant 4 étoiles                                                                                                                             Saint-D'Eau, cette belle demeure date du début du XVIe siècle. Des dispositions générales sont encore médiévales , corps de logis flanqué de tours rondes, mâchicoulis, mais les fenêtres à meneaux  ont des profil Renaissance, les lucarnes à frontons triangulaires. Le château fut remanié plusieurs fois. Son nom conduirait à penser qu'il est entouré d'eau, il n'en ai rien, le bâtiment est sur une sorte d'éminence, il tient son nom du village. Le château est agrandi au nord-est dans le style néo-Renaissance et les ouvertures de l'élévation nord sont remaniées vers 1920. Les culots d'une fenêtre de la tour sud-ouest portent les armes de la seule famille de Cayron : Les armoiries représentées sur les cheminées permettent d'attribuer à Catherine de Cayron et à François Boisset de la Salle l'achèvement ou le remaniement des corps de logis, à la fin du XVIe siècle ou au début du XVIIe siècle.","habitants":"Famille de Gabriel de Cayron\r\n        \r\n        \"","divers":"Figeac château la Balène gravure 1, le Viguier du Roy gravure 2-3 , le Saint-d'eau gravure 4, 5,6, de Tuscan gravure 7  à Figeac","gps":"","images":["../../jctruffet.com/image/image_46/46_Figeac_Chateau_1.jpg","../../jctruffet.com/image/image_46/46_Figeac_Chateau_2.jpg","../../jctruffet.com/image/image_46/46_Figeac_Chateau_3.jpg","../../jctruffet.com/image/image_46/46_Figeac_Chateau_4.jpg","../../jctruffet.com/image/image_46/46_Figeac_Chateau_5.jpg","../../jctruffet.com/image/image_46/46_Figeac_Chateau_6.jpg","../../jctruffet.com/image/image_46/46_Figeac_Chateau_7.jpg"]},"Consult_chateau_formulairecc25":{"id":"Consult_chateau_formulairecc25","dept":"46","canton":"Figeac","commune":"Figeac","nom":"Figeac_Patrimoine","type":"Patrimoine","periode":"XII-XVI","histoire":"Patrimoine de Figeac, maison de la Baleine, de Champollion, la maison du Griffon maison de la Monnaie et de nombreux hôtels et les remparts.                                                                                                                               FIGEAC, dès le XIIe siècle Figeac connait un développement important, signe manifeste d'une économie prospère et rapidement le pouvoir laïc des marchands s'oppose au pouvoir seigneurial de l'abbaye, profitant de cette rivalité Philippe le bel, roi de France étand son autorité  sur la ville en 1302. Désormais , un viguier représente le pouvoir royal  et la gestion de la cité et aux mains des consuls,   la situation enviable de Figeac a fait delle une ville florissante par sa vocation marchande et devint une étape sur le chemin de Saint-Jacques de Compostelle. Cest dans cette ambiance chaleureuse que se révèle un ensemble de maisons et de palais urbains datant du Moyen-Age, construits  par les riches marchands de Figeac.                                                                                                                                                              Hôtel de la monnaie, office du tourisme maison médiévale du XIIIe siècle.,                                                                                                                                                   Musée Champollion maison natale de Jean-François Champollion  égyptologue renommé, dont la maison reconvertie en musée des écritures abrite ses souvenirs de voyage et raconte cinq mille ans d'histoire de l'humanité, des tablettes de Sumer à l'ordinateur.                                                                                                                                                        Hôtel Colomb,   Hôtel particulier du début du XVIIe siècle, actuel Hôtel de ville. Centre d'interprétation de l'Architecture et du Patrimoine: exposition permanente sur l'histoire et l'architecture de la ville \"Portrait d'une ville : Figeac.                                                 Maison du Griffon du XIIe siècle.                                                                                                                                                  Hôtel de la Balène,   palais urbain du XIVe .","architecture":"Figeac, des arcades des boutiques médiévales aux « soleilhos » (greniers ouverts) où lon faisait sécher les fruits, on peut ainsi lire sur les façades de grès les évolutions de larchitecture. un bout de la Vallée du Célé, une ville qui surprend; des palais à profusion, du Moyen-âge ou de la Renaissance.\r\nEtape notoire de la Via Podiensis, cette cité médiévale est une ville d'histoire. Figeac fut la ville natale de Champollion, \r\n Maison du Griffon   du XIIe siècle se caractérise par son rez-de-chaussé commercial,  ses baies triples à l'étage et son pan de bois                                                                                                       Hôtel de la Balène, palais urbain du XIVe siècle autour d'une cour intérieure, le portail d'entrée était surmonté d'une tour, les fenêtres à meneaux sur les façades montre la présence de salle.                                   REMPARTS sont un signe éminent des racines médiévales de cette commune quercynoise ; un monument rappelant à tous, en entrée de ville, la richesse du patrimoine de la cité. Situés rue du Champ Saint-Barthélémy, dominant le foirail, ces remparts, longs de 350 mètres, sont les derniers vestiges monumentaux de lenceinte de la cité médiévale. Tracés au XIIe siècle, édifiés en pierres de taille de grès, ces fortifications ont été régulièrement érigées, reconstruites et remaniées jusquau XVIIe siècle. Classés Monument Historique depuis 1995, les remparts ont bénéficié de campagnes régulières dentretien. Aujourdhui, des travaux conséquents de sauvegarde et de réhabilitation sont indispensables sur le tiers Sud, soit une section de 70 mètres de long, intégrant une tour et deux courtines, lune delle ayant été déjà affectée par un éboulement en 2013. Une fois entièrement restaurée, cette partie des remparts enrichira la parure monumentale de la Ville de Figeac. Lensemble des fortifications redeviendra un témoin à la grande force symbolique, visible par tous, habitants et visiteurs, sur un emplacement stratégique de la cité.","habitants":"Jean-François Champollion\r\n        \r\n        \r\n        \"","divers":"Palais Champollion gravure 1 et 2, du Griffon gravure 3,  Préfecture gravure 4, la Monnaie gravure 8, et les remparts","gps":"","images":["../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_1.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_2.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_3.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_4.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_5.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_6.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_7.jpg","../../jctruffet.com/image/image_46/46_Figeac_Patrimoine_8.jpg"]},"Consult_chateau_formulaire3286":{"id":"Consult_chateau_formulaire3286","dept":"46","canton":"Martel","commune":"Floirac","nom":"Floirac","type":"Tour","periode":"XIII-XV","histoire":"A floirac le manoir de Foussac et la tour  de Floirac.                                                                        FLOIRAC, le site est pourvu d'une importante tour de défense sur un rocher appelé Aguda, proche du château construit au XIXe siècle, que nous pouvons voir aujourd'hui. L'ancien château portait le nom d'Agude, la seigneurie de Floirac et d'Agude est détenue au XVe siècle par les Lestrade, sous la suzeraineté des vicomtes de Turenne qui possédaient les terres de Floirac depuis le XIIIe siècle. En 1394, Marguerite de Lestrade, seigneuresse de Floirac et d'Agude, réside dans la  forteresse dont elle est chassée par un capitaine et qui est ensuite libérée par des gens d'armes fidèles. Les Lestrade posséderont la propriété jusqu'en 1679, lorsque Marie de Lestrade se marie avec Jean de Lagrange-Gourdon, seigneur de Lavercantière, gentilhomme ordinaire de la chambre du roi, et lieutenant du fort de Pignerol. Les Lagrange-Gourdon résident à Floirac jusqu'à la Révolution, ayant émigrés, la propriété est confisqué. Le mobilier est vendu aux enchères publiques puis la demeure est adjugée en 1794.                                                                                                                             Le château est vendu comme bien national.","architecture":"Manoir de Foussac dans un village reposant et calme. La bâtisse a été construite sur les bases d'un château des templiers datant du XIIe siècle, il s'agissait d'un hospitallet accueillant les pèlerins.                                                                        FLOIRAC, cétait au XIVe siècle le point fort pour la  défense du castrum de Floirac, protégé par une  enceinte sommaire. Vu sa hauteur elle contrôlait  tout le cirque de Floirac et offrait un refuge pour les habitants à lépoque ou les pillards  ravageaient la région, pendant la guerre de 100 ans. Au XVIIIe siècle elle fut le symbole de la justice  seigneuriale, abritant la prison et à létage lauditoire où siégeait le juge. Le château était composé de deux corps de logis perpendiculaires avec une tour d'escalier orthogonale engagée dans l'angle formé par les ailes. Seul vestige restant, cette tour du XVe siècle, couronnée de mâchicoulis.    A la Révolution elle devient bâtiment communal et pendant ces périodes troubles, sa prison sert à  incarcérer les républicains pris par les contre-révolutionnaires !  Pigeonnier au XIXe siècle, elle devient réservoir en partie basse pour alimenter la fontaine voisine. Les petites niches à coquille qui animent un culot de la voûte invitent à ne pas dater la construction de la tour qui subsiste avant le début du XVIe siècle.","habitants":"Famille de Jean de Lagrange-Gourdon\r\n        \r\n        \"","divers":"Tour de Floirac et manoir de Foussac gravure 4","gps":"","images":["../../jctruffet.com/image/image_46/46_Floirac_1.jpg","../../jctruffet.com/image/image_46/46_Floirac_2.jpg","../../jctruffet.com/image/image_46/46_Floirac_3.jpg","../../jctruffet.com/image/image_46/46_Floirac_4.jpg"]},"Consult_chateau_formulaire2767":{"id":"Consult_chateau_formulaire2767","dept":"46","canton":"Luzech","commune":"Bélaye","nom":"Floiras","type":"Château","periode":"XVI","histoire":"FLOIRAS, A l'extrême fin du XIIIe siècle, le domaine passe par mariage à la famille de Commarque, comme en témoigne, en 1301, l'hommage de Gaillarde de Floiras, veuve de Bertrand de Commarque, pour le fief de Floiras. Peu avant 1391, Amalvin de Gironde hérite des biens d'Arnaud de Comarque et Jean de Gironde, également seigneur de Montcléra, hommage en 1461 pour Floiras et ses biens de Bélaye. Pourtant, en 1504, c'est Antoine Delbosc, seigneur de Cousserans, qui déclare tenir à Floiras deux maisons inhabitables, tandis que le seigneur de Montcléra, Jean de Gironde, ne dénombre qu'une maison noble à Bélaye. On peut  supposer qu'il a également fait l'acquisition, à la même époque, du domaine de Floyras qui était à l'état d'abandon après la guerre de Cent Ans. Les Gironde ont cependant dû rapidement reprendre en main le fief : en 1537, ils possèdent en effet la maison forte de Floiras dans laquelle réside un prêtre de Montcléra, serviteur des Gironde. Un dénombrement de 1540 fait également état des possessions de Jean de Gironde à Floiras. Cette famille reste à la tête du domaine jusqu'au XVIIIe siècle, puis le vend en 1726 à la famille de Bercegol. Le temps a déjà marqué de son empreinte les pierres centenaires. La toiture est éventrée et les murs chavirent : le château fait pâle figure. Il y a urgence. La direction régionale des affaires culturelles se réunit autour de ce dossier. Elle pourrait émettre un avis favorable ensuite transmis à une commission nationale pour décider le classement d'urgence du château, cette décision permettrait à l'État de se substituer au propriétaire pour réaliser des travaux.","architecture":"Floiras est un édifice imposant datant du XVIe siècle aux bases médiévales, fortement remanié au début du XVIIIe siècle. Une maison forte est mentionnée dès 1504 mais les structures conservées sont de peu postérieures à cette date. Composées d'un corps de logis cantonné d'une tour ronde au nord-est et d'une aile en retour d'équerre, elles témoignent d'une importante campagne de reconstruction commanditée dans le premier tiers du XVIe siècle par la famille de Gironde, marquis de Montcléra. Le château ainsi reconstruit est mentionné en 1602 dans le compoix de Bélaye, associé à un moulin et à un pigeonnier. Une série de bâtiments annexes, abritant communs et dépendances agricoles, ont été construits par la suite dans le prolongement du logis, autour d'une vaste cour centrale. Il définissait une enceinte ouvrant par un portail vers le sud et renforcée, dans les angles sud et sud-ouest, par deux tours circulaires pouvant dater du XVIIe siècle. L'une d'elle abritait la chapelle domestique du château. Un pigeonnier monumental s'élève aux abords de cet ensemble.  Le corps principal a été étendu et remanié en 1811. Outre les maçonneries percées de baies en arc segmentaire, il subsiste de cette campagne de construction une partie des menuiseries ainsi que l'ensemble des cheminées et des enduits peints de style néo-classique. D'autres remaniements ont ensuite été réalisés au début du XXe siècle, en particulier au niveau de l'aile en équerre qui a été transformée en grange. Un mur d'enceinte fermant la cour côté route a par ailleurs été démoli.","habitants":"Famille de Gironde\r\n        \r\n        \"","divers":"Château de Floiras","gps":"","images":["../../jctruffet.com/image/image_46/46_Floiras_1.jpg","../../jctruffet.com/image/image_46/46_Floiras_2.jpg","../../jctruffet.com/image/image_46/46_Floiras_3.jpg","../../jctruffet.com/image/image_46/46_Floiras_4.jpg","../../jctruffet.com/image/image_46/46_Floiras_5.jpg","../../jctruffet.com/image/image_46/46_Floiras_6.jpg"]},"Consult_chateau_formulaire1842-2":{"id":"Consult_chateau_formulaire1842-2","dept":"46","canton":"Puy-l","commune":"Floréssas","nom":"Floréssas","type":"Château","periode":"XIII-XIV","histoire":"Trois châteaux à Floréssas, celui de Chambert, de Laur viticole de Laur Patrick et celui de Floréssas                                                                                                                                        CHAMBERT, viticole, cela fait plus de 3 siècles que les vignes du château de Chambert occupent les plus beaux terroirs des hauts coteaux de Cahors et produisent des cuvées de malbec qui régalent rois, papes et tsars En 1994, Joël Delgoulet, fils de Marc Delgoulet reprend les rênes de l'exploitation familiale et entreprend l'agrandissement des locaux de l'exploitation en respectant l'environnement : murs recouverts de pierre taillée, isolation naturelle de fabrication suisse, etc. En 2007, le château de Chambert est racheté par Philippe Lejeune. Le XXIe siècle représente le lancement des grands travaux viticoles. Avec l'aide précieuse du consultant Stéphane Derenoncourt, Philippe Lejeune entreprend la refonte du vignoble.\r\nFLORESSAS   à partir de 1350 les terres étaient propriété des seigneurs de Floréssas, Beynac, Lagorse-Limoges et enfin Brachet de Peyrusse, marquis. En 1690, mademoiselle de La Valette, puis en 1810 les Lathèse, bourgeois anoblis, cultivent le domaine, fut pendant des siècles le fief des Beynac, branche cadette des seigneurs de Commarques en Périgord.  Sous le règne de Louis XIV, il fut érigé en marquisat en récompense des services rendus par son propriétaire, le seigneur Gilbert Brachet de Peyruse.  En 1870, la famille Bataille succède aux Lathèse. Sous le règne de Louis XIV, il fut érigé en marquisat en récompense des services rendus par son propriétaire, le seigneur Gilbert Brachet de Peyruse. En l'an IV, le château sera vendu comme bien national.","architecture":"Chambert, maison forte  et son vignoble sont administrés depuis une ferme fortifiée du XIIIe siècle, appelée \"repaire\", située à l'emplacement actuel du château de Chambert. Le bâtiment est au trois quart détruit par un incendie en 1886. Il est reconstruit en gardant la partie centrale restante. Deux tours rondes dans le style du château du XVIe siècle sont construites en 1985.                                                                           Floréssas,  sa construction remonterait à la deuxième moitié du XIVe siècle. De cette époque subsistent les deux tours carrées et le sous bassement du logis central. Sans doute déjà détruit à cette époque, il figura comme donjon et tour . La construction a conservé les traces de deux corps de bâtiment, remaniés aux XVIIe et XIXe siècles, cantonnés d'une tour et d'un donjon. Arasé, le donjon forme l'angle nord-ouest du bâtiment, il possède  des proportions plus importantes que la tour.  Au XIXe siècle grâce à dimportantes améliorations de la navigation sur le Lot, le château accroît encore sa réputation de style Viollet-le-Duc est finit de construire en 1873, sur les bases dun château fortifié du XVIe siècle. Construction du mur denceinte et emménagement du parc dans le glacis défensif du château et mur d'enceinte.","habitants":"Famille de Chambert                                                                          seigneur Gilbert Brachet de Peyruse.\r\n        \r\n        \r\n        \"","divers":"Château de Chambert gravure de 1 à 3, de Floréssas de 4 à 7 et le château de Laur gravure 8","gps":"","images":["../../jctruffet.com/image/image_46/46_Floressas_1.jpg","../../jctruffet.com/image/image_46/46_Floressas_2.jpg","../../jctruffet.com/image/image_46/46_Floressas_3.jpg","../../jctruffet.com/image/image_46/46_Floressas_4.jpg","../../jctruffet.com/image/image_46/46_Floressas_5.jpg","../../jctruffet.com/image/image_46/46_Floressas_6.jpg","../../jctruffet.com/image/image_46/46_Floressas_7.jpg","../../jctruffet.com/image/image_46/46_Floressas_8.jpg"]},"Consult_chateau_formulaire5ceb":{"id":"Consult_chateau_formulaire5ceb","dept":"46","canton":"Figeac","commune":"Gagnac sur Cére","nom":"Gagnac_Lot","type":"Manoir","periode":"XVII","histoire":"GAGNAC, passe vers 1160, aux  vicomtes de Turenne. Ceux-ci lérigent en châtellenie, et y édifirent, dans la deuxième moitié du XIIe siècle, un castrum : Gagnac est alors une des sept villes murées de leur vicomté, une des trois de la vicomté en Quercy, avec Martel et Saint-Céré. Le fort est mis à mal pendant la guerre de Cent Ans ; à lapproche de son terme  en 1427  le vicomte ordonne de le  refortifier. Les anciens petits nobles locaux, les Tourte, les Del Port, les Del Vernh, ces derniers à qui le vicomte avait confié la châtellenie à la fin du XIVe siècle sont partis, ou ont cédé leurs biens et ont perdu de leur puissance, à lexception des seigneurs de Laborie, confortés, eux, sous Henri IV. Ce sont des notables enrichis qui tiennent maintenant le haut du pavé : les Lagrènerie, possesseurs du moulin de ce nom et du passage du Port, alliés à des familles nobles dAuvergne et du Limousin, anoblis eux-mêmes en 1655, habitant le petit château quils ont fait bâtir au XVIIe siècle ; les Lavaur de Gagnac, ou encore de Laboissière, qui ont acquis vers 1600 lancienne demeure des Del Vernh, les Laumon du Claux de La Raufie, les Daumarès. Les privilèges viscontins disparaissent avec la vente de la vicomté, en 1738, à Louis XV. Mais limportance de Gagnac est alors réaffirmée, puisquil y est créé, en 1750, une prévôté royale dont la compétence sétend à lancienne châtellenie et à celle de La Millière de Comiac et de Sousceyrac. Le château a été bâti au début du XVIIe siècle par la famille Laumond du Claux, depuis longtemps propriétaire des lieux, et dont les descendants vivaient encore là au XIXe siècle. Cependant, en 1887, Adolphe Laumond, dernier de la lignée, meurt sans héritier, il a choisi comme légataire universelle sa belle-soeur, madame Noémie Bouyssonie, née Mazeyrac. Vers 1920 la demeure est achetée par un notaire dAurillac.","architecture":"Le château se compose de deux tours rondes, contenant l'escalier à vis, et flanquent la façade principale. Elles sont surmontées d'une toiture en poivrière, la date de 1617 est inscrite au-dessus de la porte d'entrée d'une des tours. Le petit château du XVIIe siècle de Lagrènerie a été incendié le 9 juin 1944 lors du passage dun détachement de la Division  Das Reich. Il reste, au hameau de La Raufie, un plaisant petit manoir, également du XVIIe siècle, longtemps propriété des Laumon du Claux, puis, autour de 1900, dune famille Bouyssonie, acquis par le conseil général du Lot pour y installer une maison denfants en difficulté. Port-de-Gagnac, hameau étiré en longueur entre la route et la voie ferrée, sous le rocher de Roquefort, au bord dun plan deau de la Cère retenue de lancien moulin du Port reconverti en microcentrale a été très modifié au XXe siècle mais nen présente pas moins beaucoup dagrément. On y remarque notamment une croix de Malte  de 1704.","habitants":"Famille Laumond du Claux\r\n        \"","divers":"Château de Gagnac","gps":"","images":["../../jctruffet.com/image/image_46/46_Gagnac_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Gagnac_Lot_2.jpg"]},"Consult_chateau_formulairecce4":{"id":"Consult_chateau_formulairecce4","dept":"46","canton":"Saint-Céré","commune":"Loubressac","nom":"Gamot","type":"Manoir","periode":"XV","histoire":"GAMOT, au 17e siècle, Gamot est la propriété des Vinhals, une famille de robe : Jean-Louis de Vinhals y réside en 1660. Puis le domaine passe en 1728, par alliance, à Gilles de Pailhasse, qui fait construire la chapelle, et le vend en 1745 à Jean-André de Condamine, avocat à Saint-Céré. Les parties les plus anciennes pourraient dater du XVe siècle. La date de 1606, inscrite sur la tour ronde, pourrait correspondre à la construction du premier noyau de l'édifice ; le manoir au lieu-dit «Gamot», caché sous les arbres, à l'abri des regards il est une remarquable bâtisse qui surplombe la Bave. C'est le discret et douillet château de «Gamot», beaucoup moins connu que son homologie du plateau. Cette demeure du XVIIe siècle, faisait partie de la châtellenie de Loubressac. Les Vinhals en sont les propriétaires en 1660. Un mariage apporte le domaine, en 1728, à Gilles de Pailhasse, qui élève la chapelle du château. En 1745, il vend le domaine à Jean André Condamine, avocat de Saint-Céré. Ensuite le château connaîtra différents propriétaires, jusqu'en 1934, date de son acquisition par les aïeux des propriétaires actuels.                                                                                                              MIRAMONT, aucun document ne semble renseigner l'histoire de ce manoir, dont la construction pourrait se situer à la fin du XVe siècle ou du début du XVIe siècle.","architecture":"Gamot, la demeure possède un corps de logis quadrangulaire avec une aile en équerre sur la façade est 2 tours, l'une ronde d'escalier, l'autre carrée font saillie sur sa façade ouest. La tour ronde, dont une en pierre indique la date de 1606, peut être considérée comme le noyau originel de l'édifice à partir duquel s'est construit le reste du logis. Actuellement cette propriété privée offre un ensemble de 3 gîtes.                                                                                                                                   Miramont, aucun document ne semble renseigner l'histoire de ce manoir, dont la construction pourrait se situer à la fin du XVe siècle ou du début du XVIe siècle.","habitants":"Famille de  Jean-Louis de Vinhals \r\n        \r\n        \"","divers":"Le château de Gamot et le manoir de Miramont gravure 4 à Loubressac","gps":"","images":["../../jctruffet.com/image/image_46/46_Gamot_1.jpg","../../jctruffet.com/image/image_46/46_Gamot_2.jpg","../../jctruffet.com/image/image_46/46_Gamot_3.jpg","../../jctruffet.com/image/image_46/46_Gamot_4.jpg"]},"Consult_chateau_formulaire043a":{"id":"Consult_chateau_formulaire043a","dept":"46","canton":"Martel","commune":"Gignac","nom":"Gignac_Lot","type":"Bastide","periode":"XVI","histoire":"GIGNAC  est pris en 1356. En 1369, depuis Carlux dont ils se sont rendus maîtres, les Anglais lancent des attaques meurtrières sur Gignac, poste avancé de la vicomté de Turenne. Manoir des XVIe et XVIIe siècles.  Le village subit de nouveaux troubles pendant les guerres de religion en 1586. Gignac est mis à sac en 1569. Le 4 février 1586 l'armée du duc de Mayenne prend Montignac. Il est à la tête d'une impressionnante armée : six régiments de Français, un de Suisse, une gendarmerie française, trois d'Albanais et quatre de reîtres, faisant plus de douze cents chevaux. Il s'empare aisément de Gignac aux premiers coups de canon. Le village est de nouveau dévasté. Le duc fait pendre les soldats huguenots dans l'église de Gignac et dans la grande salle du château de Tersac. Les deux paroisses de Gignac et Saint-Bonnet dépendaient de la vicomté de Turenne, qui fut vendue au roi de France Louis XV le 8 mai 1738. En 1748, le roi revend les terres de l'ancienne vicomté aux enchères, paroisse par paroisse. Le 29 février 1748, le duc de Noailles achète la seigneurie des paroisses de Gignac et Saint-Bonnet. En 1790, les paroisses de Gignac et Saint-Bonnet sont transformées en communes. Au  début du XIXe siècle, la commune de Saint-Bonnet est supprimée et rattachée à celle de Gignac.","architecture":"Gignac fut complètement dévasté et vidé de ses habitants pendant la Guerre de Cent Ans. Gignac devient pendant cette période un village fortifié dominé par un donjon plusieurs fois rehaussé comme le montrent les divers appareillages de ce qui est devenu le nouveau clocher de l'église en 1987.","habitants":"vicomté de Turenne\r\n        \"","divers":"Les tours de Gignac","gps":"","images":["../../jctruffet.com/image/image_46/46_Gignac_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Gignac_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Gignac_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Gignac_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Gignac_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Gignac_Lot_6.jpg"]},"Consult_chateau_formulaireb3a4":{"id":"Consult_chateau_formulaireb3a4","dept":"46","canton":"Gourdon","commune":"Ginouillac","nom":"Ginouillac","type":"Manoir","periode":"XV","histoire":"GINOUILLAC, l'édifice pourrait être daté du troisième quart du XVe  siècle, d'après son architecture et la modénature des fenêtres et de la cheminée, proches de celles du château de Vaillac dont la construction pour Jean de Ricard et Jeanne de Rassiols se situe sans doute pour une large part en 1445 et 1479 . Il semble être une copie réduite du principal château de Ginouillac, détruit après la première guerre mondiale  d'un cadet de la famille Ricard de Ginouillac.  Le château de Ginouillac, dont le célèbre Galiot de Genouillac tire son  nom, est une élégante construction, occupé par le  presbytère de la paroisse au début du XXe siècle.\r\nCaractérisée par sa haute tour en pierre flanquant la façade, la demeure\r\nfut édifié  dans le centre du petit bourg de Ginouillac  par la famille de Ricard de Gourdon, détentrice de la seigneurie de  Vaillac. De cette famille est issu Galiot de Genouillac, grand écuyer de  France sous François Ier et seigneur dAssier","architecture":"Le château, amputé de sa partie septentrionale, est formé dun plan\r\nsimple rectangulaire composé de deux pièces par niveaux, et que\r\ncantonne sur la façade principale une tour en pierre semi-circulaire\r\nréservée à lescalier en vis qui dessert les étages.\r\nLe rez-de-chaussée et le premier étage sont armés de canonnières\r\npermettant les tirs flanquants des armes à feu sur tout le pourtour de\r\nlédifice. est intégré dans un grand enclos ceinturé dun haut mur denceinte bâti en moellons calcaires. Le flanc nord de la muraille intègre une archère cruciforme encore en place, qui pourrait témoigner dun état de construction antérieur au XVe siècle. Lédifice réparti aujourdhui sur trois niveaux possédait à lorigine un quatrième étage rendant sans doute accessible un niveau de mâchicoulis couronnant le logis ainsi que la tour descalier. Celle-ci est semi-circulaire et plate sur la face nord où souvre le portail dentrée. Les rares ouvertures qui en percent la belle maçonnerie de pierre sont de fines archères ou des petites fenêtres rectangulaires aux encadrements bordés dun simple chanfrein. Le rez-de-chaussée est accessible par la vis de lescalier en pierre, mais également par une porte sur larrière qui, daprès létonnante feuillure qui lencadre à lextérieur, aurait été liée à un petit pont-levis. Ce niveau, dans lequel  est installée la cuisine avec sa cheminée monumentale, ne compte pas moins de cinq canonnières. La forme et les moulures de la cheminée (proches de la cheminée du château de Vaillac), la présence de latrines dont le coffre est porté en encorbellement au Sud, et la qualité du plafond à la française, permettent de considérer le second étage, avec sa grande salle (laula), comme létage \"noble\".","habitants":"Galiot de Genouillac\r\n        \r\n        \"","divers":"Château de Ginouillac","gps":"","images":["../../jctruffet.com/image/image_46/46_Ginouillac_1.jpg","../../jctruffet.com/image/image_46/46_Ginouillac_2.jpg","../../jctruffet.com/image/image_46/46_Ginouillac_3.jpg","../../jctruffet.com/image/image_46/46_Ginouillac_4.jpg"]},"Consult_chateau_formulaired5f5":{"id":"Consult_chateau_formulaired5f5","dept":"46","canton":"Livernon","commune":"Corn","nom":"Goudou","type":"Château","periode":"XVII","histoire":"GOUDOU, la paroisse de Corn comptait au Moyen Age, quatre châteaux dont trois subsistent : le manoir de Mandens, sur la route de Figeac et les châteaux de Goudou et de Roquefort, situés de part et d'autre du Célé. Le château de Corn qui se trouvait au centre du village a, lui, disparu.","architecture":"Le château de Goudou, dans son état actuel date du XVIIe siècle et ce malgré d'importants remaniements entrepris à la fin du siècle dernier, pour le transformer en maison de maître. Goudou est une déformation locale du mot goth. Goudou, dans certaines de ces parties, conserve un fort aspect militaire dû sans doute aux convictions religieuses de ses propriétaires. Ceux-ci étant restés fidèles aux catholiques, en pleine région protestante, vaudra quelques désagréments. Vers 1880, le château subira de nombreuses modifications. Il reste dans les murs de la façade nord une porte voûtée en plein cintre, des latrines, deux fenêtres à meneaux et des vestiges de corbeaux ceinturant sa partie supérieure.","habitants":"Seigneurs locaux                               \r\n        \r\n        \"","divers":"Château de Goudou","gps":"","images":["../../jctruffet.com/image/image_46/46_Goudou_1.jpg","../../jctruffet.com/image/image_46/46_Goudou_2.jpg"]},"Consult_chateau_formulairecc6e":{"id":"Consult_chateau_formulairecc6e","dept":"46","canton":"Gourdon","commune":"Gourdon","nom":"Gourdon_Lot","type":"Château","periode":"XIV","histoire":"GOURDON, le site de Gourdon devint au Moyen-Age un castrum, bâti sur un éperon, avec château fort et remparts circulaires. Un certain Odolric, dorigine wisigothe, en aurait été le seigneur et serait à l'origine de la puissante famille de Gourdon. Géraud III de Gourdon fut seigneur de Gourdon vers le Xe siècle. Un membre de cette famille, Bertrand de Gourdon, aurait tué Richard Cur de Lion lors du siège de Châlus.  La seigneurie de Gourdon échoit au XIVe siècle aux Cardaillac, puis à Jean d'Armagnac.  Elle avait alors un château protégé d'épaisses murailles. Sous le règne de Charles VII, ce château fut démoli par les Anglais au moment de leur départ. Fortanier de Gourdon fonde également un relais à mi-distance entre leur domaine de Gourdon et les châteaux de Cénevières et Montbrun : la bastide fortanière ou bastida fortanieta de Gordonio qui devient aussitôt un abri pour les pèlerins de Rocamadour.                                                                                                                                                    MONT-MARSIS, le château porte le nom d'une vieille famille de la bourgeoisie gourdonnaise, les Marsis, vieille lignée dont les membres sont déjà cités dans des actes datant de la fin du XIVe siècle.                                                                                                                                  Manoir à Tourelles chambres d'hôtes","architecture":"Gourdon   d'un corps de logis de plan rectangulaire à trois niveaux toits en tuiles en croupes accolés de pavillons à deux niveaux saillants  et d'une tourelle à toit en poivrière.                                                                                                                      Mont-Marsis, le corps de logis pourrait dater du XVIe siècle avec des remaniements au XVIIIe siècle, les ouvertures sont agrandies. Au XXe siècle, construction d'une aile perpendiculaire au corps de bâtiment primitif, flanqué d'une sorte de tour carrée ceinte en son sommet de magnifiques mâchicoulis à colombage. Une belle tourelle en encorbellement flanque l'angle sud est du logis. Une seconde tour existait à l'angle nord-est, disparue dans les modifications apportées par les travaux d'aménagement.","habitants":"Famille de Gourdon                                                                             Famille de Marsis\r\n        \r\n        \"","divers":"Gourdon avec sa mairie et son château et Marsis gravure 6 et 7, manoir à tourelles gravure 8","gps":"","images":["../../jctruffet.com/image/image_46/46_Gourdon_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_6.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_7.jpg","../../jctruffet.com/image/image_46/46_Gourdon_Lot_8.jpg"]},"Consult_chateau_formulaire5204-2":{"id":"Consult_chateau_formulaire5204-2","dept":"46","canton":"Biars-sur-Cère","commune":"Sousceyrac","nom":"Grugnac","type":"Château","periode":"XV-XVII","histoire":"GRUGNAC, le fief de Grugnac est mentionné en 1334 dans un hommage rendu au vicomte de Turenne par Bertrand de Narbonnès. Le fief est encore cité en 1441 dans une reconnaissance féodale faite par Eustache de Narbonnès, seigneur de Puylaunès, à un tenancier qui doit s'acquitter d'un cens. Les Narbonnès ont l'entière justice sur le fief. Jean de Narbonnès, seigneur de Puylaunès, vend le fief de Grugnac avec la justice à Pierre Massip , notaire à Sousceyrac, en 1593. En 1597 il rend hommage au vicomte de Turenne en 1597 pour le « fief noble du villaige de Grunhac » et toutes ses justices. La première mention dans les textes d'une \"maison noble\" à Grugnac n'apparaît qu'à partir de l'hommage fait au vicomte de Turenne en 1643 par Amalric de Massip, qualifié de seigneur de Grugnac et de La Boisse. Joseph de Massip afferme le domaine de Grugnac aux Scribe, famille de Sousceyrac. François Lauricesque, héritier d'Amalric de Massip, vend le fief en 1659 avec le château à Durand Scribe (vers 1615-vers 1672), bourgeois de Sousceyrac. Durand Scribe, fils de Pierre Scribe, s'est marié avec Marguerite de Massip, parente des anciens seigneurs. Jean Louis Scribe, seigneur de Grugnac et de Combal, habite le château en 1671. En 1790, la propriété et le château sont passés par héritage à Louis de Verdal de Lestang (1715-1812), petit-fils de Jean Louis Scribe, capitaine dans le régiment de Penthièvre, infanterie qui a émigré avant de revenir en France.\r\nL'édifice est inscrit au titre des monuments historiques le 30 mai 19893.","architecture":"Le château de Grugnac, aux allures militaires que lui confèrent ses tours circulaires et ses mâchicoulis, fut érigé dans le paysage verdoyant du Ségala au cours de la première moitié du XVIIe siècle. solide construction en granit, présente toutes les  apparences dune maison forte de la fin du XVe siècle avec son corps de logis de plan carré cantonné de trois tours massives et rondes, lensemble couronné de mâchicoulis. Lanalyse des baies qui en percent les hautes façades accuse pourtant un chantier qui ne saurait être antérieur au début du XVIIe siècle, ce que confirme un hommage de 1643 qui mentionne pour la première fois la  maison noble, les portes et les fenêtres restent, à la fin du Moyen-Age, une tour circulaire flanquant la façade principale tournée vers le Sud loge lescalier à vis qui dessert les différents niveaux de lhabitation. Laccès est pratiqué par un beau portail dentrée encadré de pilastres et coiffé dun fronton triangulaire orné de boules. Même si quelques rares fenêtres aux encadrements rectangulaires chanfreinés rappellent des formes médiévales, les autres baies, larges, aux pourtours lisses et soulignées dappui moulurés appartiennent au vocabulaire du  XVIIe siècle. Les deux étages du corps de logis sont chapeautés par des mâchicoulis\r\nportés par des consoles de pierre à triple ressaut, est sont percées de\r\npetites ouvertures carrées ainsi que des fentes de tir en forme de\r\nsimples raies horizontales, comme au château de Grezels, darchères canonnières  verticales avec ou sans petits orifices de tir circulaires, ou\r\nencore darchères constituées de petites croix comme on les trouve au château dAynac.","habitants":"Famille de Eustache de Narbonnès\r\n        \r\n        \"","divers":"Château de Grugnac à Sousceyrac","gps":"","images":["../../jctruffet.com/image/image_46/46_Grugnac_1.jpg","../../jctruffet.com/image/image_46/46_Grugnac_2.jpg","../../jctruffet.com/image/image_46/46_Grugnac_3.jpg","../../jctruffet.com/image/image_46/46_Grugnac_4.jpg","../../jctruffet.com/image/image_46/46_Grugnac_5.jpg","../../jctruffet.com/image/image_46/46_Grugnac_6.jpg","../../jctruffet.com/image/image_46/46_Grugnac_7.jpg","../../jctruffet.com/image/image_46/46_Grugnac_8.jpg"]},"Consult_chateau_formulairea65b":{"id":"Consult_chateau_formulairea65b","dept":"46","canton":"Carjac","commune":"Sauliac sur Célé","nom":"Géniez","type":"Château","periode":"XV","histoire":"SAULIAC, le village ancien (le Vieux Sauliac) est accroché à la falaise, percée ici de grottes fortifiées qui servirent de refuge pendant les guerres. On y grimpait par des échelles, les malades et les animaux étaient hissés à l'aide de cordes dans de grands paniers.  Par le chemin en corniche, on longe les ruines d'un château, d'où l'on peut voir sur la rive opposée le château de Géniez du XVIe siècle, dressant sur une sorte d'isthme son logis à la Mansard et sa tour ronde.  Cette avancée rocheuse bordant la boucle du Célé fut occupé dès le XIIIe siècle par une borie appartenant à la puissante famille des Cardaillac.                                                                                                                                                  GENIEZ, il y aurait eut en ces lieux au XIIIe siècle une borie appartenant à un Cardaillac, co-seigneur de Saint-Cirq Lapopie, qui en aurait fait don à un Geniez. En 1573, les de Geniez qui avaient embrassé la cause protestante, furent attaqués dans leur château par les catholiques. Son propriétaire M. de Geniez fut emprisonné le 25 avril de cette année dans les geôles de Cahors où il fut assassiné. Ruiné par les catholiques, le château fut vendu le 9 juin 1576 par Gisbert de Geniez à noble Pierre de Peyronenc de Saint-Chamarand. Très vite, les Peyronenc, en la personne de Bertrand, sénéchal dAgenais, vendirent le fief à noble Jean Viguier de Fraust de Souilhol. Par alliance, le château revient aux Viguier dAuglanat au cours du XVIIIe siècle, Mais cest au cours de ce siècle que la forteresse, alors propriété des Viguier dAnglanat de Souilhol, prit lallure dune luxueuse et confortable demeure couverte dun toit à la Mansart.  le cédèrent en 1748 à Jacques Salgues, notaire et bourgeois de Sauliac, qui possédait auparavant les rentes des métairies du domaine. En 1943, la mort du dernier propriétaire-résidant marqua définitivement labandon de la demeure. Madame Salgues de Genies, épouse Byet, hérita du domaine en 1970 ; ses héritiers uvrent depuis à restaurer et faire vivre ces lieux.","architecture":"GENIEZ, situé en fond de vallée sur une plateforme rocheuse surplombant le Célé, le château fut édifié au XVe siècle par les de Geniez à  lemplacement dune ancienne borie. Il fut  réaménagé en demeure de plaisance au XVIIIe siècle. Le château de la famille de Geniez est dominé par le village de Sauliac et son \"château des Anglais\" dont les pans de murs ruinés sont encore accrochés à la falaise assez écartée du mur du rocher pour avoir conservé sa valeur militaire, c'est un corps de logis rectangulaire  flanqué d'une tour ronde coiffée d'un éteignoir.  A Giniez,  Il en reste encore la tour fortifiée, englobée dans le château construit au lendemain de la guerre de Cent Ans. Ce dernier se présente sous la forme de deux corps de logis séparés par une basse-cour, associée à un chemin de ronde dominant la rivière au Sud et fermée au Nord par une courtine au sommet de laquelle subsistent les vestiges de créneaux. Le corps de logis occidental englobe la tour du XIIIe siècle, que couronnaient des mâchicoulis dont on observe encore les consoles en pierre. Une courtine achevée par une tourelle fortifiée le complétait côté ouest. Lédifice fut pourvu dune tour militaire circulaire à lOuest et à lEst dun nouveau corps de logis conservant des canonnières, meurtrières, latrines et de nombreuses baies aux encadrements chanfreinés caractéristiques de la période gothique. Lancienne tour fut alors cantonnée sur ses faces Sud et Est dune extension bâtie. De nouvelles pièces dhabitation furent ainsi créées ; elles sont desservies par une galerie et des escaliers en bois inscrits dans une grande loggia  ouverte sur une terrasse à balustres vers la rivière.","habitants":"Famille des Cardaillac\r\n        \r\n        \"","divers":"Château de Géniez et des anglais troglodite.","gps":"","images":["../../jctruffet.com/image/image_46/46_Geniez_1.jpg","../../jctruffet.com/image/image_46/46_Geniez_2.jpg","../../jctruffet.com/image/image_46/46_Geniez_3.jpg","../../jctruffet.com/image/image_46/46_Geniez_4.jpg","../../jctruffet.com/image/image_46/46_Geniez_5.jpg","../../jctruffet.com/image/image_46/46_Geniez_6.jpg","../../jctruffet.com/image/image_46/46_Geniez_7.jpg"]},"Consult_chateau_formulaire6164":{"id":"Consult_chateau_formulaire6164","dept":"46","canton":"Cahors","commune":"Cieurac","nom":"Hauteserre","type":"Château","periode":"XVII","histoire":"HAUTESERRE, durant le Moyen-Age, le domaine s'étendait sur plus de 1000 hectares  était la propriété de l'Abbaye de Lagarde. Le domaine fut vendu en 1578 à Géron Dadine, c'est ainsi que commença la dynastie des Haute-Serre, les Dadine d'Hauteserre feront carrière dans la magistrature. On ignore la date de construction du château mais on peut la situer au début du XVIIe siècle, la famille Dadine d'Haute-Serre l'occupera jusqu'en 1745. La demeure sera ensuite la propriété des Vidal de Lapize jusqu'au milieu du XXe siècle. Durant plusieurs siècles, le vignoble de Haute-Serre était situé au cur du vignoble Cadourque, planté à cette époque sur les coteaux. Le domaine fut anéanti par le phylloxéra vers 1880, puis abandonné aux ronces. Il fallut attendre près dun siècle, et lacquisition de Haute-Serre par Georges Vigouroux pour redonner à ce terroir sa prestigieuse vocation viticole. Aujourd'hui c'est son fils, Bertrand-Gabriel Vigouroux, qui a repris les rennes du domaine et façonne les millésimes dans  la même quête d'excellence. Oenologue de formation, le Malbec.","architecture":"Hauteserre de plan rectangulaire à deux niveaux et attiques séries de lucarnes  sur chaque travées sur un toit en tuiles en croupe,  l'édifice est flanqué plein cintre d'une tour carrée à trois niveaux toit à quatre pans, des dépendances sur l'arrière non visible.","habitants":"Famille de Dadine d'Hauteserre\r\n        \r\n        \"","divers":"Château de Hauteserre","gps":"","images":["../../jctruffet.com/image/image_46/46_Hauteserre_1.jpg","../../jctruffet.com/image/image_46/46_Hauteserre_2.jpg"]},"Consult_chateau_formulaired2b1":{"id":"Consult_chateau_formulaired2b1","dept":"46","canton":"Puy-L","commune":"Les Juniès","nom":"Juniès","type":"Château","periode":"XIII-XV","histoire":"JUNIES, les Junies tire son nom dune riche famille de loligarchie marchande de Cahors, les de Jean, à qui lévêque de Cahors Guillaume de Cadaillac a légué cette ancienne seigneurie épiscopale en 1214. La terre s'est d'abord appelée le Joanies avant de prendre le nom de les Junies. Le cardinal Gaucelm de Jean, familier du pape Jean XXII, y a implanté, entre 1343 et 1355, un monastère de dominicaines dont il subsiste l'église et deux ailes du couvent qui entouraient le cloître et abritaient la salle capitulaire. Les de Jean, seigneurs des Junies, ayant pris le parti du roi d'Angleterre, le château des Junies a été assiégé par les troupes du roi de France. Il es sorti ruiné de la guerre de Cent Ans. La terre des Junies est passé par héritage à Jean de Cardaillac-Bioule, archevêque de Toulouse qui l'a vendue au comte d'Armagnac en 1386. La seigneurie des Junies est passée ensuite à la famille de Morlhon de Sanvensa. Jeanne de Morlhon, fille d'Antoine de Morlhon, procureur au parlement de Toulouse, est mariée à Guillaume de Roderel. En 1526, à la mort de son mari, elle a vendu la seigneurie des Junies à Jean du Pré, compagnon d'armes de François Ier. En 1573, à sa mort, sa veuve désigna comme héritier des Junies Antoine de Goux. Puis la seigneurie revint un temps dans la famille de Morlhon.\r\nLa seigneurie entra ensuite dans la famille de Touchebuf-Beaumont, jusqu'à la Révolution, par le mariage en 1608 d'Antoine de Touchebuf-Beaumont avec Hélène du Buisson de Bournazel, fille de François du Buisson, baron de Bournazel et sénéchal de Rouergue, et de Florette de Morlhon, fille de Jean III de Morlhon, sur de Jean IV de Morlhon.","architecture":"Le château cité dès le XIIIe siècle sur cet emplacement, reconstruit autour de 1500 englobe lancien château des de Jean. Le château actuel a adopté un plan massé rectangulaire, encadré au sud-ouest par deux tours rondes. Une extension au sud-est est cantonnée par une troisième tour circulaire. Le double fenêtre à meneaux du deuxième étage et les vestiges d'une porte intérieure indiquent un aménagement fait par Jean du Pré, seigneur des Junies après 1526. Le décor en gypseries et les boiseries de style Louis XV pourraient dater de Jean-François de Touchebuf-Beaumont qui a hérité du château des Junies après 1750. Lové dans un nid de verdure en bordure du ruisseau, à la porte du bourg, ce petit château fort, largement modifié semble dater du XIIIe siècle. Au XVIe siècle de larges fenêtres à double meneau ont été ouvertes au premier étage. Au XVIIIe siècle. Le rez-de-chaussée servait de cave, de cellier et probablement d'écuries. Il est vraisemblable, avec la proximité de la rivière, que le château  était entouré de fossés, comblés par la suite. L'accès au premier étage se fait par un escalier implanté dans la tour ouest. Les combles étaient destinés à la défense. Le crénelage extérieur a disparu.","habitants":"Famille de Morlhon de Sanvensa\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Juniès","gps":"","images":["../../jctruffet.com/image/image_46/46_Junies_1.jpg","../../jctruffet.com/image/image_46/46_Junies_2.jpg","../../jctruffet.com/image/image_46/46_Junies_3.jpg","../../jctruffet.com/image/image_46/46_Junies_4.jpg","../../jctruffet.com/image/image_46/46_Junies_5.jpg","../../jctruffet.com/image/image_46/46_Junies_6.jpg","../../jctruffet.com/image/image_46/46_Junies_7.jpg"]},"Consult_chateau_formulairecfc4":{"id":"Consult_chateau_formulairecfc4","dept":"46","canton":"Biars-sur-Cère","commune":"Laval de Cère","nom":"La_Borie","type":"Château","periode":"XVII","histoire":"LA-BORIE, située en vicomté de Turenne et relevant de la châtellenie de Gagnac, la seigneurie de Laborie était détenue jusqu'au XVIIIe siècle par une famille originaire d'Auvergne, les Grenier. Un certain Jean de Grenier, seigneur de Laborie et de Comiac, aurait pris part, en 1215, à la Croisade des Albigeois au  côté de Louis, fils de Philippe Auguste.  La famille de Grenier à la seigneurie de Comiac, met en doute cette affirmation. En revanche, un hommage de Raymond de Grenier rendu au vicomte de Turenne en 1334, pour ses biens de Gagnac, Cahus et Comiac, appuie l'hypothèse d'une assise seigneuriale ancienne à Laborie. En 1504, noble Jean Grenier, seigneur de Laborie, tient le repaire avec justice basse sous la suzeraineté du seigneur de Castelnau.\r\nLa POSTE, en effet, cette bâtisse fut le berceau du maréchal François, un certain Canrobert, celui-ci fut d'abord aide de camp du Prince Louis Napoléon (futur Napoléon III), d'ailleurs il prit part au coup d'état du 2 décembre 1851, puis il commanda en 1855 le corps expéditionnaire français en Crimée. Il se distingua encore en 1870 à la bataille de Saint-Privat en Moselle. Après la guerre il fut élu sénateur du Lot. Son corps repose actuellement aux Invalides. La maison du héros, acquise par la municipalité en 1935 abrite donc depuis lors le bureau de poste.","architecture":"La Borie, la demeure seigneuriale, probablement bâtie à la période médiévale, est endommagée lors des guerres de Religion et semble entièrement reconstruite en 1600 pour Henri de Grenier, d'après la date inscrite au-dessus d'une fenêtre de la tour d'escalier,  un corps de logis rectangulaire et flanqué sur ses deux angles du même côté de deux grosses tours rondes La grosse tour ronde, accrochée sur l'angle, est bâtie en moellon de tout venant et pourrait appartenir à une campagne de travaux ultérieur.  La face opposée étant coupée en son centre par une tourelle d'escalier polygonale, cette tourelle est la seule à conserver son chemin de ronde à mâchicoulis du XVe siècle.   Le château est restauré pour un certain Matre à la fin du XIXe siècle.                 \r\nLa Poste s'installe dans cette grande maison bourgeoise sans doute du XVIIIe siècle que l'on qualifie parfois, dans la région, de « château » à cause de sa tour centrale, de ses deux bretèches et de ses deux linteaux en accolade. La tour est couverte d'un toit en lauzes de schistes. Outre son architecture, c'est aussi le passé de cette maison occupée par la Poste qui remplit de fierté le cur des habitants de Laval de Cère.","habitants":"Famille des Grenier\r\n        \r\n        \"","divers":"Château  de La-Borie et le manoir de la poste gravure 5.","gps":"","images":["../../jctruffet.com/image/image_46/46_La_Borie_1.jpg","../../jctruffet.com/image/image_46/46_La_Borie_2.jpg","../../jctruffet.com/image/image_46/46_La_Borie_3.jpg","../../jctruffet.com/image/image_46/46_La_Borie_4.jpg","../../jctruffet.com/image/image_46/46_La_Borie_5.jpg"]},"Consult_chateau_formulaire349a":{"id":"Consult_chateau_formulaire349a","dept":"46","canton":"Puy-L","commune":"Grézels","nom":"La_Coste","type":"Forteresse","periode":"XIV-XVI","histoire":"LA-COSTE , dès le XIIIe siècle, il est fait mention de la Salla de La Coste, appartenant à Bernard de Guiscard. Pendant la guerre de Cent Ans, les Guiscard resteront fidèles et dévoués au roi de France. Les Anglais occuperont la forteresse pendant une douzaine d'années. Durant les guerres de Religion, en 1580, les huguenots prennent d'assaut le château et le pillent, il ne restera que ruines. Jean III de Guiscard va le relever à la fin du XVIe siècle. Le mariage de Marie-Josèphe-Charlotte de Guiscard-Cadrieu avec Sarran de Durfort-Boissières fait entrer la seigneurie dans cette famille. Pendant la Révolution, ce seigneur émigre en Angleterre. Confisqué comme bien national, le château est vendu à un parisien, M. Perrouteau Lanauze. Celui-ci revend l'édifice dès 1825, à un M. Clément qui l'habitera jusqu'en 1847. Le château connaît une succession de propriétaires qui le laisseront à l'abandon jusqu'en 1960, date de son rachat par un banquier, M. Bacquié, qui va le restaurer. En 1983, le château est racheté par un couple qui va s'atteler à reprendre la restauration de l'édifice.","architecture":"La-Coste, architecture militaire des XIVe et XVe siècles, restauré à la fin du XVIe siècle après sa ruine en 1580 lors de sa prise par les troupes protestantes. A l'origine simple tour de guet, le château de plan carré est flanqué de deux tours carrées massives et rectangulaires à l'ouest, et de deux tours cylindriques à l'est. Il se compose d'un corps de logis rectangulaire prolongé de deux ailes et un mur de courtines au sud qui ferme la cour. L'aile nord ayant servi de réserve de pierres pour édifier la maison d'un ancien propriétaire a été pourvue d'une galerie à claire-voie pour assurer l'étanchéité. Le corps de bâtiment présente quatre niveaux: des salles voûtées en contrebas, deux salles l'une plafonnée, l'autre voûtée au XVIIe siècle ; le troisième étage est destiné à l'appartement; le quatrième étage est occupé par les combles avec mâchicoulis, l'ensemble est desservi par un escalier à noyau droit, les deux tours carrées conservent leurs latrines dans l'angle avec le corps de logis.","habitants":"Famille de Bernard de Guiscard\r\n        \r\n        \"","divers":"Château de La Coste à Grézels","gps":"","images":["../../jctruffet.com/image/image_46/46_La_Coste_1.jpg","../../jctruffet.com/image/image_46/46_La_Coste_2.jpg","../../jctruffet.com/image/image_46/46_La_Coste_3.jpg","../../jctruffet.com/image/image_46/46_La_Coste_4.jpg","../../jctruffet.com/image/image_46/46_La_Coste_5.jpg","../../jctruffet.com/image/image_46/46_La_Coste_6.jpg","../../jctruffet.com/image/image_46/46_La_Coste_7.jpg","../../jctruffet.com/image/image_46/46_La_Coste_8.jpg"]},"Consult_chateau_formulaire0aad":{"id":"Consult_chateau_formulaire0aad","dept":"46","canton":"Luzech","commune":"Belmontet","nom":"La_Devie","type":"Château","periode":"XVII","histoire":"LA-DEVIE, en 1444, Guillaume de Luzech donne à cens à Pierre Solacroup appartient à une famille de laboureurs originaires de la commune de Thérondels, canton de Mur-de-Barrez, dans le Rouergue. La Devie est la demeure d'un domaine agricole dont l'histoire locale dit qu'elle a été construite à l'emplacement d'un ancien repaire dit « de l'évêque » détruit pendant la guerre de Cent ans. Dans les dépendances situées côté Est, on peut relever des vestiges médiévaux dans les élévations. On trouve aussi des souterrains. Pierre Solacroup a testé à Ladevie en 1459 et a laissé 14 enfants en vie. La famille Solacroup va prospérer et faire des alliances flatteuses qui vont l'amener à acquérir une certaine noblesse. Au début du XVIIIe siècle, Jean Solacroup marié à Jeanne de Lalbenque marie sa fille Françoise à l'héritier des Foissac du repaire de Bellegarde. Sous la Restauration, Jeanne-Paule Solacroup se marie avec Charles de Testas de Folmont et lui apporte la demeure de La Devie en dot. Charles de Folmont était le fils d'Antoine de Testas de Folmont fusillé à Vannes le 2 août 1795 après le débarquement de Quiberon par les armées de la République. Le fils de Charles, Dieudonné de Testas de Folmont (1829-1882) a épousé Marie de Bercegol. C'est lui qui a donné à la demeure son aspect actuel. Il a fait construire la tour-pigeonnier, prolonger le mur d'enceinte et bâtir des annexes. Le château de La Devie est resté la propriété de la branche aînée des Solacroup jusqu'à son extinction en 1861 en la personne de Marie-Jeanne-Paule Solacroup (1789-1861), de Ladevie, veuve du chevalier Charles, Joseph, Étienne de Testas de Folmont (1790-1858), ancien député du Lot, en 1827-1828. La demeure passe ensuite entre les mains de plusieurs propriétaires avant d'être achetée en 1936 par la famille des propriétaires actuels. Le château a été inscrit au titre des monuments historiques depuis le 11 octobre 1996.","architecture":"Domaine à vocation agricole depuis le XIVe siècle, les bâtiments du domaine présentent un caractère défensif par un dispositif de cour fermée par accès unique sous une haute tour pigeonnier et des trous de tir percés dans les bâtiments longeant cet accès. Des vestiges médiévaux ont été conservés dans les élévations des dépendances avec un réseau de souterrains aménagés avec silos et escaliers taillés dans le roc. Les bâtiments Est abritent des pièces à fonction domestique, avec un four et une partie de logements. L'aile en retour au nord abrite une ancienne écurie avec une partie logis. Au nord-est de cette aile un deuxième pigeonnier-tour quadrangulaire est installé en bordure de falaise. La décoration intérieure a été remaniée au XIXe siècle mais conserve quelques portes du XVIIIe siècle. Des pièces plus petites sont disposées le long de l'élévation postérieure. Elles abritent des caves, garde-manger voûtés qui s'ouvrent  sur la cuisine et la salle à manger. Le plan de la demeure, avec sa cour fermée et une seule entrée sous une haute tour pigeonnier et des trous de tir percés dans les bâtiments longeant l'accès, lui donne un caractère défensif. Les bâtiments sont à fonction domestique, avec un ancien four et une partie logement. L'aile en retour, au nord, abrite une ancienne étable ou écurie, et une partie logis. Un second pigeonnier-tour quadrangulaire est installé au nord-est de l'aile, en bordure de falaise.\r\nLa décoration intérieure conserve quelques portes du XVIIIe siècle. Elle a été remaniée au XIXe siècle.","habitants":"Famille de Pierre Solacroup \r\n        \r\n        \"","divers":"Château de la Deviè à Belmontet","gps":"","images":["../../jctruffet.com/image/image_46/46_La_Devie_1.jpg","../../jctruffet.com/image/image_46/46_La_Devie_2.jpg"]},"Consult_chateau_formulaire0b36":{"id":"Consult_chateau_formulaire0b36","dept":"46","canton":"Cahors-3","commune":"Labastide-Marnhac","nom":"Labastide_Marnhac","type":"Château","periode":"XV","histoire":"LABASTIDE-MARNHAC, cest une de ses plus anciennes bastides, fondée par le seigneur de Lard, famille aisée de Cahors.Les seigneurs de Labastide avaient le titre de barons. La seigneurie passa ensuite à d'autres riches Cahorsins : les de Jean, à l'heure actuelle avec l'apport des diverses constructions ajoutées par les différents propriétaires qui se sont succéder du XIVe siècle à nos jours, il reste une masse imposante de bâtiments disposés autour d'une vaste cour intérieure surplombant les anciens remparts. Une vue dégagée s'étend jusqu'au Pyrénées. Le château  de la fin  du XIVe, début XVe  siècle a été édifié après la guerre de Cent Ans sur les ruines du précédent par Héliot de Jean. construit sur une butte de 318 m d'altitude, à la limite d'un plateau, il domine  les collines et les vallées largement évasées qui entourent Cahors. Il est par excellence un site de défense et le seul au sud de Cahors ; c'est pourquoi son rôle historique pendant des siècles est très intéressant.   C'est à l'époque de Flotard de Lafon seigneur de Fénérols, Après la Révolution, Mr Valette fit bâtir une grande maison carrée dans le style Bas-Quercy reliée à la partie du XVIIe siècle par une terrasse percée d'une entrée voûtée donnant une sortie Est vers une garenne.","architecture":"Labastide-Marnhoac, c'est un important bâtiment de deux étages.  à l'heure actuelle avec l'apport des diverses constructions ajoutées par les différents propriétaires qui se sont succéder du XIVe siècle à nos jours, il reste une masse imposante de bâtiments disposés autour d'une vaste cour intérieure surplombant les anciens remparts. On y pénètre par l'ancien pont-levis encadré de deux tours de défense munies de meurtrières. Le bâtiment du XIVe siècle a conservé au rez-de-chaussée deux grandes salles voûtées et deux étages desservis par un escalier à vis. Certaines portes sont surmontées de décors ornementaux ; une salle possède une cheminée du XVe siècle. Au début du XVIIe siècle qu'a été édifié ce bâtiment, sur les anciens remparts un vaste logis en angle et comportant une tour carrée.  Au rez-de-chaussée dont une partie a été restaurée, 7 grandes pièces ont conservé leur carrelage d'origine.    Le château a subi de multiples dégradations à la Révolution, et a ensuite été utilisé en bâtiment agricole, les salles voûtées servant de grenier à blé, les étages de séchoir à tabac. Le poids du tabac a contribué à l'affaissement des charpentes. Une tour s'est effondrée à la Libération. Depuis une quarantaine d'années des travaux ont été effectués par les propriétaires successifs en vue de la remise en état de l'ensemble des constructions que comporte cet important domaine immobilier.","habitants":"Famille d'Eliot de Jean\r\n        \r\n        \"","divers":"Château de Labastide-Marnhac","gps":"","images":["../../jctruffet.com/image/image_46/46_Labastide_Marnhac_1.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marnhac_2.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marnhac_3.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marnhac_4.jpg"]},"Consult_chateau_formulairec838":{"id":"Consult_chateau_formulairec838","dept":"46","canton":"Castelnau-Montratier","commune":"Beauregard","nom":"Labastide_Marsa","type":"Château","periode":"XIII-XVIII","histoire":"LABASTIDE, la famille de Marsa est une famille de chevaliers de la châtellenie de Caylus. Elle apparaît au début du  XIIIe siècle dans le cartulaire des Templiers de Lacapelle-Livron. En 1267, les Templiers accusent le seigneur de Marsa de percevoir indûment les dîmes dues à l'Ordre. Alphonse de Poitiers reçoit la plainte de l'Ordre et les Marsa, chevaliers modestes, doivent s'incliner. La tour carrée qui flanque le château au nord-est peut dater de cette époque. Elle est implantée près de la bastide de Beauregard. Aux XIVe siècle, on trouve des membres de la famille écuyers à la cour pontificale à Avignon. Jean de Marsa occupe le château après la guerre de Cent Ans. Les ravages provoqués dans la population l'oblige à faire venir de nouveaux laboureurs pour peupler ces terres.  En 1504, lors d'un dénombrement du ban et de l'arrière-ban, Pierre de Marsa fait la liste de ses biens mais il habite dans son fief de Saillac. Au XVIIe siècle, le château appartient à Emmanuel de Lagardelle, un parent de la famille. Les enfants d'un de ses descendants ont eu comme précepteur Guillaume Lacoste, historien, auteur d'une histoire générale du Quercy. En 1786 Jean de Saint-Martin est devenu le propriétaire du château. La branche cadette de la famille de Marsa de Saillac s'est éteinte au XVIIIe siècle. Le château a été inscrit au titre des monuments historiques le 27 juillet 1979.","architecture":"Le château est composé de deux corps de logis carrés reliés par un bâtiment rectangulaire qui doit dater du XVIIe siècle. Ce bâtiment repose sur une salle basse voûtée en berceau. La tour carrée qui flanque le bâtiment au nord-Est peut dater du XIIIe siècle. Le corps de logis au sud-est porte des traces de mâchicoulis datant du XVe siècle.\r\nToutes les fenêtres sont à meneaux. Les galeries du bâtiment central sont éclairées de part et d'autre par trois fenêtres. Elles conservent des traces de peintures murales et un plafond à la française. Les étages sont desservis par un escalier à vis.","habitants":"Famille deJean de Marsa \r\n        \r\n        \r\n        \"","divers":"Château de Labastide à Beauregard","gps":"","images":["../../jctruffet.com/image/image_46/46_Labastide_Marsa_1.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marsa_2.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marsa_3.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marsa_4.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marsa_5.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marsa_6.jpg","../../jctruffet.com/image/image_46/46_Labastide_Marsa_7.jpg"]},"Consult_chateau_formulairea870":{"id":"Consult_chateau_formulairea870","dept":"46","canton":"Gourdon","commune":"Labastide-Murat","nom":"Labastide_Murat","type":"Château","periode":"XVIII-XIX","histoire":"LABASTIDE-MURAT, Joachim Murat est né à Labastide-Fortunière en 1767. Marié à Caroline Bonaparte, il est Grand-Duc de Berg et de Clèves quand il a décidé de faire construire le château pour sa famille et sa mère, en 1807. Le château a été construit sur les plans de larchitecte parisien Étienne-Chérubin Leconte, qui réalise un des rares château néo-classique en Quercy. La mère de Joachim Murat meurt avant le premier coup de pioche. La construction a été arrêtée un temps quand Joachim Murat est nommé par Napoléon Ier roi de Naples. Les travaux reprennent en 1812 et se terminent en 1815. Son frère, André Murat, bénéficiaire d'un « majorat héréditaire avec titre de comte », en 1810, a assuré le suivi des travaux du château. Joachim Murat a été fusillé à Pizzo, le 13 octobre 1815. André Murat a été le premier occupant du château, jusqu'à sa mort en 1841. Le château devient la propriété de son fils, Gaëtan Murat, député du Lot, marié en 1827 à Marie-Pauline de Méneval. Il meurt en 1847. Il a fait construire une serre et une chapelle qui ont été détruites en 1914. Son fils, Joachim Joseph André Murat (1828-1904), a restauré les appartements et fait modifier la façade occidentale en y ajoutant un lanterneau au niveau des combles. La décoration a été conservée. Le château passe ensuite à Jean Lebaudy, fils de Paul Lebaudy et de Marie Pauline Adolphine Clotilde Murat. Jean Lebaudy a financé l'aménagement de la grotte de Pech Merle qui se trouvait sur des terrains ayant appartenu aux Murat au début du XIXe siècle. Le château fait lobjet dune inscription au titre des monuments historiques depuis le 16 octobre 1991 alors que le parc fait l'objet d'une inscription depuis le 24 mars 1992.","architecture":"Lélégant château de Labastide-Murat de plan rectangulaire reflète lengouement sous lEmpire  du style néo-classique. Ses deux façades largement ouvertes sur le parc sont structurées par des avants-corps médians, peu saillants. Au rez-de-chaussée, sont placées trois baies en plein cintre scandées de pilastres doriques, portant un entablement orné de triglyphes, patères et bucranes. Des cordons moulurés règlent chacun des niveaux des façades, percées de grandes fenêtres. La symétrie de la composition était accentuée par la présence de deux ailes plus basses à couronnement de balustres, détruites au XXe siècle, mais dont témoigne encore une photographie prise par Armand Viré. Le perron, placé dans laxe de lallée bordée de platanes, mène à un grand  vestibule, ouvert par des arcades sur le grand salon qui constitue lun des  plus beaux exemples du style Napoléon III.  Un bel escalier en pierre sy développe pour desservir létage, où deux chambres sont ornées dun décor resté intact.","habitants":"Famille de  Joachim Murat\r\n        \r\n        \"","divers":"Château à Labastride-Murat","gps":"","images":["../../jctruffet.com/image/image_46/46_Labastide_Murat_1.jpg","../../jctruffet.com/image/image_46/46_Labastide_Murat_2.jpg","../../jctruffet.com/image/image_46/46_Labastide_Murat_3.jpg","../../jctruffet.com/image/image_46/46_Labastide_Murat_4.jpg"]},"Consult_chateau_formulaire5492":{"id":"Consult_chateau_formulaire5492","dept":"46","canton":"Puy-L","commune":"Lacapelle-Cabanac","nom":"Lacapelle_Cabanac","type":"Château","periode":"XVIII","histoire":"LACAPELLE-CABANAC, se situe à l'extrême ouest de l'appellation Cahors, sur les terres du village qui porte le même nom. Les vignes sont situés sur le causse calcaire
