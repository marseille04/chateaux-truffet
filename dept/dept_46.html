 à environ 300 mètres d'altitude, bénéficient d'un climat plus frais que celles de la vallée du Lot. C'est un sol drainant très propice à la vigne. La plante doit plonger profondément ses racines dans les fissurations du sous-sol pour capter l'eau.  Le domaine est de 19 ha rassemblé autour du château, Lensemble des terres du domaine est cultivé en respectant le cahier des charges de lagriculture biologique et  contrôlé par Agrocert.  Août 2001, Thierry Simon et Philippe Vérax deviennent propriétaires du château Lacapelle Cabanac. En venant sinstaller dans le Lot, à Lacapelle-cabanac, ils souhaitaient réaliser un rêve déjà ancien : devenir vigneron et élaborer un vin dont ils pourraient être fiers. Le domaine du château Lacapelle Cabanac avait tout pour les satisfaire.\r\n HAUT-MONPLAISIR, c'est dans un écrin de verdure que Cathy et Daniel Fournié cultivent 29 hectares de vignes sur les prestigieuses troisième terrasses argilo-siliceuses et caillouteuses de la Vallée du Lot. Le château Haut-Monplaisir propose également trois cuvées en IGP Côtes du Lot","architecture":"Lacapelle Cabanac,   trois corps de bâtiment de plan en U à trois niveaux et attiques (occulus) accolé hors uvre d'une tour carrée toit à quatre pans.                                                                                                                                                       Monplaisir de plan en équerre à deux niveaux toit en croupe flanqué d'une tourelle carrée sur angle extérieure.","habitants":"Thierry Simon et Philippe Vérax \r\n        \r\n        \r\n        \"","divers":"Château de  Lacapelle-Cabanac et de Haut-Monplaisir gravure-6","gps":"","images":["../../jctruffet.com/image/image_46/46_Lacapelle_Cabanac_1.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Cabanac_2.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Cabanac_3.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Cabanac_4.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Cabanac_5.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Cabanac_6.jpg"]},"Consult_chateau_formulaire5887":{"id":"Consult_chateau_formulaire5887","dept":"46","canton":"Lacapelle-Marival","commune":"Lacapelle-Marival","nom":"Lacapelle_Marival","type":"Forteresse","periode":"XII-XV","histoire":"LACAPELLE-MARIVAL, Géraud 1er de Cardaillac, premier seigneur de Lacapelle sy installa en 1270 , la place forte familiale de Cardaillac.  La  seigneurie des Cardaillac octroya en 1294 aux habitants du gros bourg qui sétait formé autour du château, des libertés et des franchises, puis, fin XVe siècle une charte des coutumes. Il fut alors administré par des consuls et érigé par Louis XIV en marquisat.  Fin du XVe siècle, sous les règnes de Charles VIII et Louis XII, le seigneur de Lacapelle, Astorg de Cardaillac, participe aux guerres d'Italie avec Galiot de Genouillac seigneur d'Assier. Il favorise l'implantation d'une verrerie qui acquit une grande réputation. Les frères Colomb, originaires de Laguépie, s'enrichissent et furent anoblis. Sous le règne de François Ier, le fils aîné d'Astorg, Jean de Cardaillac, lieutenant d'artillerie, fut tué en 1521. Il n'eut qu'une seule fille Françoise. Gilibert, frère de Jean, s'empara de la succession malgré les actions en justice devant le parlement de Toulouse des trois tuteurs de Françoise. Gilibert, paisible seigneur, mourut en 1536. La seigneurie élevé en 1645 au rang de marquisat. Le château fut vendu au XVIIIe siècle aux Loupiac de Ladevèze avant dêtre pillé à la Révolution et de voir son mur denceinte démantelé, et les matériaux utilisés dans les constructions du village. A noter la force quasi royale de la devise des Cardaillac « toto noscontur in orbe » qui marque leur fière ambition,  ils furent connus dans le monde entier. Nombre dentre eux lont démontrés puisquils participèrent aux croisades avec le comte de Toulouse, fournirent de nombreux prélats et au XVIe siècle Antoine de Cardaillac fut Sénéchal du Quercy.  Classé Monument Historique depuis 1939, le château est aujourdhui propriété de la commune qui a installé les locaux de la mairie dans laile ouest.","architecture":"A lorigine, Il construisit une ceinture fortifiée au château comportant 7 tours, entoura le village dune enceinte propre et aménagea la tour initiale en véritable donjon une tour carrée du début du XIIIe siècle construite par le seigneur de Cardaillac, faisant face à une chapelle romane du XIIe siècle, assurait la sécurité dun important carrefour de routes où se croisaient une ancienne voie gallo-romaine reliant Lyon à Bordeaux, une route locale reliant Figeac à Saint-Céré deux grosses bourgades très commerçantes et un des chemins de Saint-Jacques de Compostelle. Solide construction carrée de 18 mètres de côté avec des murs épais de plus de 3 mètres sélevant à 30 mètres de haut et comportant 3 étages,  chacun divisés en 4 pièces. Ce donjon fut remanié  au XVe siècle, en même temps que furent percées des fenêtres à croisée dans les murs, il reçut la finition quil a conservé de nos jours, à savoir un étage supplémentaire avec chemin de ronde sur mâchicoulis, 4 échauguettes dangles et une toiture pentue couverte en lauzes de schiste.  Les 2 tours semi-circulaires, au sud, faisaient partie dune puissante muraille qui entourait le donjon et une vaste cour intérieure. Elles se trouvent aujourdhui intégrées dans une aile Renaissance, qui, la sécurité étant acquise, fut construite au cours des XVIe et XVIIe siècle et donna au château une vocation de résidence, ouverte au sud sur de vastes jardins. Le massif donjon carré, à mâchicoulis et flanqué d'échauguettes à chacun de ses angles, remonte au XIIIe siècle, tandis que le corps de logis, cantonné de grosses tours rondes, qui lui est accolé, a été ajouté au XVe siècle. Les membres de l'association des amis du château organisent des visites en juillet et août.","habitants":"Famille des Cardaillac\r\n        \r\n        \"","divers":"Château de Lacapelle-Marival","gps":"","images":["../../jctruffet.com/image/image_46/46_Lacapelle_Marival_1.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_2.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_3.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_4.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_5.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_6.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_7.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_8.jpg","../../jctruffet.com/image/image_46/46_Lacapelle_Marival_9.jpg"]},"Consult_chateau_formulaire709f":{"id":"Consult_chateau_formulaire709f","dept":"46","canton":"Gourdon","commune":"Salviac","nom":"Lacoste_Salviac","type":"Château","periode":"XVII","histoire":"LACOSTE, les barons de Gourdon ont fondé la cité de Salviac au XIe siècle. Il reste peu de traces du castrum primitif. Le château Lacoste dit « des templiers » est implanté sur lancienne tour des Cazelles, maison noble érigée au XIIIe siècle par un chevalier vassal des barons à lemplacement supposé de la partie occidentale de l'enceinte du castrum primitif. Cette maison noble comprenait une tour carrée et une aile occidentale contiguë. Dans son hommage de Bertrand de Gourdon au comte de Toulouse, en 1226, le fief de Salviac est inclus dans ses biens. Son fils, Guillaume de Gourdon, fondateur de l'abbaye Sainte-Marie de Gourdon, renouvelle l'hommage en 1246. Son gendre Aymeric de Malemort, fils de Géraud de Malemort, sénéchal du roi dans le Quercy, a recueilli l'héritage. Elle est vendue en 1310 à Pierre de Balène, puis achetée en 1337 par Philippe de Jean, seigneur des Junies. Un peu avant 1387, le fief devient une possession des Cazeton, qui deviennent barons de Salviac. À partir de 1438 la baronnie de Salviac revient aux Durfort-Boissières, qui l'ont conservé jusquà la Révolution. Au XVIe siècle, c'est une maison-forte propriété des du Sirech. Devenu au siècle suivant le château de Lacoste, il a alors pour propriétaires les Grandault-Lacoste. Cette famille apparaît dans des actes au XVIIe siècle.","architecture":"Le château de Lacoste est établi sur les murs d'anciennes fortifications. Il est constitué par trois corps de logis groupés autour d'une cour, un quatrième corps, plus récent, se développant le long d'un parc. Un escalier à vis en pierre, situé à l'angle rentrant de deux corps de bâtiment, permet d'accéder de la cour aux divers corps de bâtiments qui sont à des niveaux décalés. Au XVIIIe siècle, un grand perron a été construit le long de la façade sur cour du corps de logis ouest. Un deuxième perron, démantelé, permet d'accéder du parc au corps de logis sud. A l'intérieur, des pièces ont conservé leurs boiseries du XVIIe siècle, avec plafonds à la française.","habitants":"Famille des Grandault-Lacoste\r\n        \r\n        \"","divers":"Château de Lacoste à Salviac","gps":"","images":["../../jctruffet.com/image/image_46/46_Lacoste_Salviac_1.jpg","../../jctruffet.com/image/image_46/46_Lacoste_Salviac_2.jpg","../../jctruffet.com/image/image_46/46_Lacoste_Salviac_3.jpg","../../jctruffet.com/image/image_46/46_Lacoste_Salviac_4.jpg","../../jctruffet.com/image/image_46/46_Lacoste_Salviac_5.jpg","../../jctruffet.com/image/image_46/46_Lacoste_Salviac_6.jpg"]},"Consult_chateau_formulaire5e21":{"id":"Consult_chateau_formulaire5e21","dept":"46","canton":"Luzech","commune":"Caillac","nom":"Lagrézette","type":"Château","periode":"XV","histoire":"Deux châteaux à Caillac ceui de Lagrézette et celui de Langle (voir article suivant).                                                          LAGREZETTE du XVIe au XVIIe siècle a été bâti  par Pierre de Massault dont le frère, Gilibert, homme de goût très raffiné, était archidiacre de Cahors. C'est leur père, Adhémar, qui avait souhaité la construction de ce château. Il avait souhaité voir construire le bâtiment sur  la petite Grèze qui domine le Lot dans leur propriété. Son fils, Pierre de Massault le fit construire en mémoire de son père et pour sa fille, Marguerite de Massault qui, dès les premiers plans, le baptisa la Grézette. À la mort de son père, Margueritte de Massault hérita du château. Elle épousa Pierre de Maffre de Camburat en 1503. Le château a été ensuite la propriété des familles de Malegat, Lebrun, de Belcastel, de Malartic, d'Ambert. Du  XIXe au XXe siècles le général Jean-Jacques Ambert (1765-1851) général de division de la Révolution, en devint propriétaire par son mariage avec Sophie-Amable de Malartic. Joachim Ambert, futur général de brigade, né au château de Lagrézette le 8 février 1804, fut inspecteur général de la gendarmerie, conseiller d'État sous le Second Empire, maire du 8e arrondissement de Paris, écrivain, biographe et historien.  Le château appartient ensuite à Jules Duverger, un négociant en gros de Cahors, organisateur d'un important commerce avec l'Asie. Le château reste dans ses mains jusqu'aux années de la guerre de 1914-1918. Le comte Jean-Roger, Alexandre dit Axel de Barde descendant de la famille Leroy de Barde, est ensuite, jusqu'en 1934, le propriétaire du château. Celui-ci est alors revendu à madame Roux-Marcé, puis à la famille Chevalier dans les années 1939-1940. En déclin depuis les années 30, le château, entouré de vignes, est découvert par Alain-Dominique Perrin en 1979. Le coup de cur est immédiat. Il achète le domaine un an plus tard et se lance dans une ambitieuse restauration du château et de ses jardins qui durera douze ans.","architecture":"Le château  de la Grézette adopte effectivement un parti architectural en vogue depuis la seconde moitié du XVe siècle. Le logis de plan rectangulaire est encadré sur sa façade arrière par deux tours rondes, et flanqué sur le devant par une tour polygonale dans laquelle se développe lescalier à vis qui dessert les trois niveaux de lhabitation. La porte dentrée au bas de la tour principale, les cheminées et les portes placées dans la vis de lescalier sont richement ornées dun décor foisonnant qui marque, en ce début du XVIe siècle, linfluence italienne sur larchitecture  en  quercynoise et annonce la première Renaissance française.  Aux motifs que lon retrouve sur le portail de léglise de Caillac ou sur les croisées du château des Junies - cordelettes, colliers doves, rinceaux, fleurons et feuilles dacanthe - sajoutent des oiseaux, des masques et des putti, ainsi que des portraits logés dans des médaillons. Une figure féminine accompagnée de linscription \"Dame dhonneur\" orne ainsi le manteau de la grande salle. A lEst, la cour dhonneur sétend sur un vaste périmètre protégé à lorigine   par des murs de courtine soudés aux angles par deux grosses tours circulaires. Celle au Nord-Ouest abrite une chapelle dont une des clefs de voûte est frappée des armes de lévêque Antoine dAlamand qui donna, au XVe siècle,  les terres de Caillac à Adhémar de Massaut.","habitants":"Famille de Pierre de Massault\r\n        \r\n        \r\n        \"","divers":"Château de Lagrézette à Caillac","gps":"","images":["../../jctruffet.com/image/image_46/46_Lagrezette_1.jpg","../../jctruffet.com/image/image_46/46_Lagrezette_2.jpg","../../jctruffet.com/image/image_46/46_Lagrezette_3.jpg","../../jctruffet.com/image/image_46/46_Lagrezette_4.jpg","../../jctruffet.com/image/image_46/46_Lagrezette_5.jpg","../../jctruffet.com/image/image_46/46_Lagrezette_6.jpg"]},"Consult_chateau_formulairea4e5-2":{"id":"Consult_chateau_formulairea4e5-2","dept":"46","canton":"Luzech","commune":"Caillac","nom":"Langle","type":"Château","periode":"XV","histoire":"LANGLE, les terres de Langle auraient été données vers 1420 par Guillaume-Amalvin de Luzech à son fils cadet Gasbert, qui serait à l'origine de la construction du château, poursuivie par son fils Dorde, marié à Catherine de Lolmie en 1470 . Dorde est décédé avant 1504, date à laquelle sa veuve dénombre au nom de son fils François de Luzech pour la \"maison de Langle\", tenue de monsieur de Cessac avec toutes justices. C'est cependant leur fille Jeanne, mariée en 1505 à Antoine III de Geniès qui hérite de Langle. En 1680, Suzanne de Geniez épouse, au château de Langle, Louis de la Tour, qui prendra le titre de baron de Langle,  les la Tour se maintiennent dans les lieux jusqu'au XVIIIe siècle, puis la seigneurie passe en 1777, par mariage, aux du Bois de Gaudusson qui conservent le château après la Révolution.  Les travaux engagés par Gaspert et Dorde de Luzech étaient probablement achevés en 1504. La chapelle aurait été construite à la fin du XVIIe siècle.","architecture":"L'édifice de Langle a été très fortement restauré au XIXe siècle, vers 1882 . L'essentiel du logis correspond bien cependant à une construction de la seconde moitié du XVe siècle, l'ancien château-fort fut grandement transformé au XIXe siècle pour le rendre moins austère : une toiture en ardoise, une tour donjon et de nouvelles ouvertures donnèrent un caractère plus médiéval à un château du XVe siècle. La façade principale du château possède une cloche dont l'anecdote nous apprend qu'elle pouvait être très dangereuse, voir anticléricale, car sa chute fut responsable du décès d'un membre du clergé.","habitants":"Famille de Dordé de Luzech\r\n        \r\n        \"","divers":"Château de Langle à Caillac","gps":"","images":["../../jctruffet.com/image/image_46/46_Langle_1.jpg","../../jctruffet.com/image/image_46/46_Langle_2.jpg","../../jctruffet.com/image/image_46/46_Langle_3.jpg","../../jctruffet.com/image/image_46/46_Langle_4.jpg","../../jctruffet.com/image/image_46/46_Langle_5.jpg","../../jctruffet.com/image/image_46/46_Langle_6.jpg"]},"Consult_chateau_formulaire762a":{"id":"Consult_chateau_formulaire762a","dept":"46","canton":"Gourdon","commune":"Dégagnac","nom":"Lantis","type":"Château","periode":"XV-XVI","histoire":"LANTIS,  il apparaît dans les archives du Lot dès 1453 en tant que maison fortifiée dit  de la Trémolada. Pendant la guerre de Cent Ans des mercenaires français à la solde des anglais font irruption dans le village de Lantis et massacrent les quelques habitants laissant le village désert. Par la suite des colons auvergnats repeuplèrent la région. Au XVe siècle, messire Annet de Rampoux cède la Motte de Lantis à Jacques de Durfort, seigneur et baron de Boissières. Début  du XVIIe siècle, Jean de Gatignol épouse Gaudine de Hébrard et devient acquéreur des rentes sur le fief de Lantis. Pendant les guerres de religion Jean de Gatignol pris du service dans larmée du roi de France Henri IV et, par sa bravoure revient gratifié de lordre de chevalier, sieur de Lantis et de Fonnadal en 1657. Le château sert ensuite de refuge aux catholiques en lutte contre les huguenots. Quelques soldats veilleront à la sécurité du village. Le domaine sera transmis dans la famille de Gatignole jusqu'à son extinction, le 2 février 1807, date à laquelle il sera légué à un neveu, Amédée de Boysson, qui s'en défera trois ans plus tard. Abandonné avant la Révolution, il tombera lentement en ruine avant d'être restauré dans les règles de l'art par ses propriétaires actuels, pour redevenir le monument le plus appréciable du village et retrouver son apparence de maison forte.  Propriété de Françoise et Michel Barbier-Damiette qui l'ont acquis à l'état de ruines en 1993, transformé en gîtes de France.","architecture":"Le Château de Lantis, La qualité de la réhabilitation a permis à ses propriétaires d'être primés plusieurs fois. En 1453 : construction du castrum dominant le village de Dégagnac.\r\nEn 1625  le château prend son plan actuel sous la famille de Gatignole. De plan rectangulaire à deux niveaux sur soubassement et lucarnes sur toit en croupe en tuiles, accolé de deux tours carrées sur angles opposés, cet édifice possède de belles fenêtres à meneaux. Au XVII siècle des remaniements architecturales (portes fenêtres).\r\nEn 1993 début de la restauration, en 2003  incendie de la grande tour frappée par la foudre, et en 2004 obtient le prix de Sauvegarde des Vieilles Maisons Françaises et obtention du Label Patrimoine.","habitants":"Famille de Gatignole\r\n        \r\n        \"","divers":"Château de Lantis à Dégagnac.","gps":"","images":["../../jctruffet.com/image/image_46/46_Lantis_1.jpg","../../jctruffet.com/image/image_46/46_Lantis_2.jpg","../../jctruffet.com/image/image_46/46_Lantis_3.jpg","../../jctruffet.com/image/image_46/46_Lantis_4.jpg"]},"Consult_chateau_formulaire7581":{"id":"Consult_chateau_formulaire7581","dept":"46","canton":"Carjac","commune":"Larnagol","nom":"Larnagol","type":"Château","periode":"XIII","histoire":"LARNAGOL, Larnagol est la propriété de Bertrand de Cardaillac, co-seigneur de Saint-Cirq-Lapopie, qui rend d'ailleurs hommage en 1215 pour cette terre à Simon de Montfort. Le fief passe ensuite à la famille Barasc, puis aux vicomtes de Calvignac, ces derniers élèvent un nouveau logis au début du XIVe siècle, flanqué dune tour maîtresse, édifié en contrebas du premier château : on distingue donc aujourd'hui ce château \"inférieur\" du château \"supérieur\". Au XVIIe siècle, la seigneurie est acquise par Pierre de Laporte, dont le petit fils, Jean, entreprend dès 1710, la reconstruction dune grande partie du château, les travaux sont achevés par son fils Etienne Alexandre, vers 1780.  Situé au cur du village de Larnagol, le château est associé au bâtiment de l'actuelle mairie ; ils forment un ensemble restructuré au XVIIIe siècle sur les fondations du castrum des XII-XIIIe siècles. L'édifice a surtout été remanié au XVIIIe siècle par la famille des Laporte, barons de Larnagol. Devenu propriétaire du château en 1924, le célèbre ferronnier d'art Raymond Subes s'est attaché à maintenir et à entretenir ce patrimoine de qualité.  En 2011, Bruno Pierron et Michèle Conte ont acheté le château de Larnagol, dont l'intérieur, les extérieurs et les jardins sont inscrits au titre des monuments historiques depuis 2001.","architecture":"Larnagol, édifice complexe s'est développé à partir d'un donjon roman du XIIIe siècle, puis a été remanié jusqu'au XVIIIe siècle. Un donjon à contreforts plats et les vestiges dun logis seigneurial construits dans la première moitié du XIIIe siècle témoignent dun noyau primitif implanté dans la partie haute de léperon. Des édifices du castrum médiéval subsistent principalement, dans le château \"supérieur\", les restes d'une maçonnerie qu'il faut peut-être attribuer au XIe siècle, la base d'une tour à contreforts plats, qu'il faut peut-être dater du XIIe ou du XIIIe siècle, englobée dans une reconstruction de la fin du XIIIe siècle ou du XIVe siècle, et dans le château \"inférieur\", l'une des élévations d'un bâtiment à deux étages dans laquelle sont conservées des baies géminées datables  du XIVe siècle, dont les chapiteaux sont tout à fait semblables à ceux de Cavaniès.  La construction médiévale est profondément remaniée, agrandie et complétée de corps de bâtiment (chai, cuvier, orangerie) et de jardins en terrasses. Enfin, en 1924, lune des deux parties du château est acquise par Raymond Subes, ferronnier dart parisien, qui l'agrémente d'un beau portail,","habitants":"Famille de Pierre de Laporte\r\n        \r\n        \"","divers":"Château de Larnagol.","gps":"","images":["../../jctruffet.com/image/image_46/46_Larnagol_1.jpg","../../jctruffet.com/image/image_46/46_Larnagol_2.jpg","../../jctruffet.com/image/image_46/46_Larnagol_3.jpg","../../jctruffet.com/image/image_46/46_Larnagol_4.jpg","../../jctruffet.com/image/image_46/46_Larnagol_5.jpg","../../jctruffet.com/image/image_46/46_Larnagol_6.jpg","../../jctruffet.com/image/image_46/46_Larnagol_7.jpg"]},"Consult_chateau_formulaire27fd":{"id":"Consult_chateau_formulaire27fd","dept":"46","canton":"Cahors-2","commune":"Laroque-des-Arcs","nom":"Laroque_Arcs","type":"Forteresse","periode":"XIII-XVI","histoire":"LARROQUE-DES-ARCS, dit Borie de Polminhac, le château de Polminhac dit \"de Laroque\" est situé sur le territoire actuel de la commune de Cahors. Mentionné en 1237, il doit son nom au proconsul romain Polemius, qui gouvernait le Quercy sous le règne de Constantin Le Grand. L'édifice appartient au XIIIe siècle à la famille de Gourdon. En 1258, Fortanier de Gourdon en fait don à son fils Pons. Pendant la guerre de Cent Ans, la demeure sera assaillie par les troupes anglaises, mais sera libéré en 1407. Au XVIe siècle, la demeure est à nouveau en possession des Gourdon. En 1607, Gilberte de Gourdon, héritière du domaine, épouse Antoine Jean de Fontanges. Leur héritière sera leur filleule Juliette de Fontanges, épouse de Gaspard de Montclar.   Cest au domaine de Sainte-Marguerite, qui appartenant aux Bénédictins de la Daurade, que le célèbre historien du Quercy, Guillaume Lacoste, mourut en 1831.","architecture":"Laroques des arcs,  château construit autour d'un donjon circulaire du XIIe siècle siècle, fut restauré au XVe siècle, puis remanié au XVIe siècle, et possède quatre tours rondes et est entouré d'une enceinte. Les corps de logis en arc de cercle se développent autour d'une cour intérieure. Habité depuis lépoque romaine, fut fondé au XIIe siècle pour protéger les \" arcs \" de laqueduc romain amenant leau de Font Polémie aux thermes de Cahors. Le pont romain, à trois rangs darcades, fut démoli en 1370, sur lordre des consuls de Cahors. Il sagissait dempêcher les bandes anglaises de sy retrancher. Le château, lui aussi détruit en 1370, est attesté dès 1237, élevée sur une base talutés au-dessus des bâtiments du logis agencés de façon circulaire autour dune cour intérieure, la tour constitue avec lenceinte édifiée en appareil de blocs calcaires lorigine du bâtiment. Le rez-de-chaussée de plan circulaire placé en contrebas de la cour intérieure reste indépendant des niveaux supérieurs. Accessible par une porte en arc brisé en pierre, elle était à lorigine couverte dun plafond soutenu par un cordon façonné dans le calcaire. Un escalier maçonné dans lépaisseur du mur, éclairé par des jours en plein cintre assure le lien avec les deux niveaux supérieurs voûtés de calottes en pierre. Complétée de tours de flanquement au XVe siècle, lorsque on recomposa la partie méridionale en établissant deux travées de grandes fenêtres rigoureusement encadrées doculi taillés dans la pierre.                                                                                                                                    Vestiges de la Tour de péage du XIIe siècle, servant comme bureau d'octroi sur la rivière Lot. La tour est inscrite au titre des monuments historiques en 1979.","habitants":"Famille de Gourdon  et Guillaume Lacoste\r\n        \r\n        \"","divers":"Château de Laroque des Arcs et de la tour de péage gravure 6, 7 et 8 et manoir gravure 9.","gps":"","images":["../../jctruffet.com/image/image_46/46_Laroque_Arcs_1.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_2.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_3.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_4.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_5.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_6.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_7.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_8.jpg","../../jctruffet.com/image/image_46/46_Laroque_Arcs_9.jpg"]},"Consult_chateau_formulaire7406":{"id":"Consult_chateau_formulaire7406","dept":"46","canton":"Carjac","commune":"Larroque-Toirac","nom":"Larroque_Toirac","type":"Forteresse","periode":"XIII-XV","histoire":"LARROQUE-TOIRAC,  possession des Barasc, seigneurs de Montbrun, est mentionné en 1233 avant de passer pour moitié en 1320 à Pierre Duèze, frère de Jacques qui fut pape sous le nom de Jean XXII.  Dès le XIIIe siècle, le lieu servait aussi de résidence à une lignée de simples  chevaliers, les de La Roque, qui ne devinrent que plus tard co-seigneurs du  lieu. En 1333, les Duèze vendirent leurs droits aux Cardaillac-Brengues ; Bertrand  de La Roque  était alors co-seigneur et vassal des Montbrun.  Claude de La Roque fut à lorigine de la reconstruction du château à partir de 1467.  Un siècle plus tard, un revers de fortune conduisit son fils Bertrand à vendre les bâtiments, le domaine et la seigneurie à un bourgeois de Figeac, Pierre dHujols.  Cette famille, qui conserva la seigneurie jusquen 1732, fut à lorigine de la disparition dun bon nombre de dispositifs de défense. Raymond de Pontanier du Saulon ayant succédé à Jean Joseph dHujols, le fief fut acquis peu après, avant 1760, par Jean-Joseph Dufau de Villefranche de Rouergue. En 1793, les révolutionnaires sattaquèrent à la décoration intérieure du château, ainsi quau donjon pentagonal quils laissèrent en létat de ruine.  Jean-Joseph Dufau disparut vers 1810, et cest lun de ses descendants qui vendit le domaine en différents lots entre 1834 et 1840. En 1883, la bâtisse était partagée entre quatre propriétaires dont la commune, qui par la suite racheta\r\nles trois autres lots afin dinstaller en ces lieux lécole des garçons, celle des filles ainsi que la mairie, comme logements pour les instituteurs. Jean Wagner- Autesserre, magistrat figeacois racheta le château en 1923 et, avec son épouse, se consacra à sa restauration jusquen 1969. Son fils, Pierre Wagner-Autesserre et son épouse perpétuent aujourdhui son uvre.  En 1946, le château est inscrit sur la liste complémentaire des monuments historiques avant d'être classé monument historique en 1995.","architecture":"Le château de Larroque-Toirac,  a été construit au XVe siècle, il a conservé dans sa partie médiévale tout son système défensif,  le renforcement de l'enceinte au XIVe siècle et le nouveau château au XVe siècle.  Les de La Roque édifièrent en premier un donjon pentagonal, dit à Cinq  Cayres à cinq côtés, dont les vestiges sont placés à lécart du château, à lEst, en contrebas des abris troglodytiques de la falaise qui furent les premiers habitats du site. Bâti en bel appareil de pierres calcaires, il sapparente au donjon du château de Roussillon à Saint-Pierre-Lafeuille et atteste une occupation de cet endroit  dès le milieu du XIIIe siècle. Ils mirent ensuite en chantier au cours du XIIIe siècle un logis (hospitium) en forme de tour. Lédifice, bâti en moellons calcaires, fut englobé dès le XIVe siècle dans différentes constructions et flanqué dune tour circulaire défendant lentrée du château grâce à ses meurtrières, sa chausse-trappe et les casemates abritant des arbalétriers. Le deuxième corps de bâtiment fut mis en chantier à partir de 1467 sur le côté Est, par les La Roque enrichis par des alliances avec des familles puissantes et riches de laristocratie locale. Une haute tour descalier à vis fut ainsi édifiée, afin de desservir un logis de plan rectangulaire établi sur 7 niveaux et cantonné au Sud-Est par une  tourelle de 40 m de haut comprenant 103 marches.  La demeure seigneuriale, où subsiste la cuisine d'origine, comporte de très belles cheminées du XVe siècle ainsi que des fresques du XVIe siècle. Les décorations sont datées de 1515 à 1531 et des aménagements ont été effectués au XVIIe siècle.","habitants":"Bertrand  de La Roque\r\n        \r\n        \"","divers":"Château de Larroque -Toirac","gps":"","images":["../../jctruffet.com/image/image_46/46_Larroque_Toirac_1.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_2.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_3.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_4.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_5.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_6.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_7.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_8.jpg","../../jctruffet.com/image/image_46/46_Larroque_Toirac_9.jpg"]},"Consult_chateau_formulaire9ffe":{"id":"Consult_chateau_formulaire9ffe","dept":"46","canton":"Gramat","commune":"Durbans","nom":"Lasalle_Durbans","type":"Château","periode":"XV","histoire":"SALLES-DURBAN, commanderie d'hospitaliers de Saint-Jean-de-Jérusalem la Salle Durbans.  L'histoire de la création de la commanderie de Durbans pose de nombreux problèmes, elle aurait été une commanderie de templiers, fondée vers 1160, avant d'échoir à l'ordre des hospitaliers de Saint-Jean-de-Jérusalem vers 1315, comprenant alors une maison forte, la salle, et trois métairies ; elle en devient alors une commanderie, le commandeur d'Espaillac étant contraint de s'y retirer sous la pression des Cardaillac-Thémines, devenus seigneur d'Espédaillac à Durbans, c'est une petite circonscription que l'Ordre de Saint-Jean possédait dans le Quercy et dont nous ignorons l'origine. Elle comprenait les châteaux et les juridictions de Durbans et de Salomès, et la seigneurie spirituelle des paroisses voisines d'Espedaillac et de Grèzes. En 1307 donation par noble Géraud de Sonac à l'hôpital d'Espedaillac de rentes sur le tènement de Cloup. En 1447 arbitrage entre Pierre de Montlezun, commandeur de Durbans, et noble Raymond de Cardaillac, seigneur de Cardaillac et de Thémines, au sujet de certains fiefs situés dans Espedaillac. En 1490 coutumes octroyées aux habitants de Salomès. En 1526 accord entre le commandeur et les consuls d'Espedaillac au sujet des droits d'usage et dépaissance. En 1548, nouvel accord entre les mêmes. Le château aurait été incendié en 1573 par les protestants, puis restauré, en 1793 il est vendu comme bien national.","architecture":"A la maison forte appartiennent les deux ailes nord et est, que la fenêtre géminée conservée pourrait situer dans la 2e moitié du XIIIe siècle. La tour placée en l'angle n'est peut-être pas antérieure au XVIe siècle ; à la même époque appartient sans doute aussi la croisée dont les vestiges sont visibles au premier étage de l'aile Est. L'aile ouest a sans doute été ajoutée au  XVIIe siècle : la datation pourrait être précisée par l'identification des armoiries qui s'y trouvent. Melchior de Barras de Clemens fait construire une chapelle pour le service d'hiver au milieu du XVIIe siècle. L'ensemble a fait l'objet d'une importante campagne de travaux au XVIIIe siècle, puis de nouvelles modifications sont intervenues après la vente comme bien national : fenêtre datée en 1797, porte néo-classique au nom de Dupuy datée en 1811, grange datée en 1835. Les deux bornes, déposées, datées en 1741 marquaient la limite du domaine et des seigneuries voisines.  Trois corps de logis médiévaux se développent  sur les trois côtés d'une cour, une tour se loge dans un angle. Le château à été transformé en ferme, et le corps de logis central a reçu une de ces jolies galeries qui font le charme des maisons rurales de la région.","habitants":"Melchior de Barras de Clemens                           \r\n        \r\n        \"","divers":"Château de Lasalle Durbans","gps":"","images":["../../jctruffet.com/image/image_46/46_Lasalle_Durbans_1.jpg","../../jctruffet.com/image/image_46/46_Lasalle_Durbans_2.jpg","../../jctruffet.com/image/image_46/46_Lasalle_Durbans_3.jpg","../../jctruffet.com/image/image_46/46_Lasalle_Durbans_4.jpg","../../jctruffet.com/image/image_46/46_Lasalle_Durbans_5.jpg"]},"Consult_chateau_formulairef9fb":{"id":"Consult_chateau_formulairef9fb","dept":"46","canton":"Luzech","commune":"Sainte-Croix","nom":"Lastours_Lot","type":"Château","periode":"XII-XIV","histoire":"LASTOURS,  le premier château fut construit au XIIe siècle pour le comte de Toulouse pour assurer la défense contre les anglais, du château fort élevé aux XIIIe subsiste une partie de l'enceinte armée de tours. Il appartient au XVe siècle à la famille de Rozet, puis il passe par alliance aux Luzech. Le logis résulte pour sa plus grande part de travaux réalisés au XVIIe siècle. En 1817, Henri de Puniet et sa demi-soeur Agnès Caudron s'installent à Lastours, mais ils n'occupent que la tour sud et le pavillon attenant. Vendu en 1854, le château est alors transformé en édifice agricole. Deux grandes cheminées en pierre ont été vendues en 1939, dont une a été remontée au château de Gayrac, la tour sud s'est effondrée en 1940 . La restauration de Lastours été engagée après le changement de propriétaire intervenu en 1992, après son rachat  par un descendant de la famille Puniet, qui lui redonne vie.","architecture":"Château de Lastours est composé d'un corps de logis rectangulaire avec de grandes fenêtres à doubles meneaux, flanqué de deux grandes tours carrées. A la tour ouest est accolé, en retour d'équerre, un corps de logis prolongé par une salle voûtée en berceau qui pourrait être l'ancienne chapelle. La grande tour a gardé, à l'angle nord-est, les corbeaux d'une échauguette. Une porte encadrée d'une double moulure et surmontée d'un fronton triangulaire, s'ouvre dans la façade sud et donne accès à un escalier rampe sur rampe. Seuls des plafonds à la française témoignent de l'état premier du château. Au sud du corps de logis, une vaste cour est délimitée à l'ouest et au sud par les vestiges d'une enceinte. A l'angle sud ouest subsiste une tour carrée, à l'angle sud-est, une tour ronde.","habitants":"Famille de Rozet\r\n        \r\n        \"","divers":"Château de Lastour à Sainte-Croix","gps":"","images":["../../jctruffet.com/image/image_46/46_Lastours_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Lastours_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Lastours_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Lastours_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Lastours_Lot_5.jpg"]},"Consult_chateau_formulaire891c":{"id":"Consult_chateau_formulaire891c","dept":"46","canton":"Souillac","commune":"Reilhaguet","nom":"Laval_Lot","type":"Maison-forte","periode":"XIII-XIV","histoire":"LAVAL, la terre de Reilhaguet fut vendue en même temps que celles de Baussac et de Lunegarde, en 1315, par Bertrand de Gourdon à son beau-frère Malfred de Salignac. Une famille de ce nom est citée au cartulaire dAubasine : Guillaume de Laval en 1168 ; Raymond de Laval en 1173 ; les De Pelegri sont seigneurs en 1443 ; noble Raymonde de Pélegri donne par donation entre vifs à noble Guillaume de Soyris le lieu et castrum de Laval en ladite paroisse de Payrac. En 1452 noble Jean de Luquet seigneur de Chaylar au nom du vicomte de Turenne donne le repaire de Laval dans la paroisse de Camy. En 1484, Antoine de Louybrayrie est seigneur de Laval. Mais lors du dénombrement de 1504, c'est Antoine de Loubrayrie qui est seigneur de Laval, avec toutes justices  Les Loubrayrie sont encore dans les lieux au moment de la Révolution. En 1515 Jean de Loubrayrie dénombre Laval au vicomte. En 1600 Guy de Lafage est seigneur de Laval ; en 1628 Marc Antoine Dalbert est seigneur de Laval, puis en 1557 François de Vervaix en 1645 Marc Antoine de Vervaix, en 1672 Jean-François de Belcastel , en 1750 Jean de Vidal de Lapize, seigneur haut justicier de Laval, et la terre relève du roi. Après la Révolution, il y a eu un curé : cest en 1803 Vaysse remplacé en 1846 par Gouloumès,  en 1874 par Méjecaze, en 1892 Cauzinille jusquen 1920 où la paroisse est rattachée à Reilhaguet.","architecture":"Les bâtiments, de plan en U le corps de logis en équerre toit en tuiles à deux pans,la tour possède un toit en  tuiles à un seul pans avec des fenêtres jumenées, pour une large part, et en particulier la tour, datent pour l'essentiel du XIVe siècle mais présentent les traces d'une construction légèrement plus ancienne. Une demi-croisée témoigne d'une campagne de travaux survenue à la fin du  XVe siècle ou au début du XVIe siècle, époque à laquelle il faut attribuer également les remarquables décors peints conservés entre autres dans la tour.","habitants":"Famille des Loubrayrie\r\n        \r\n        \"","divers":"Château de Laval à Reilhaguet","gps":"","images":["../../jctruffet.com/image/image_46/46_Laval_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Laval_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Laval_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Laval_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Laval_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Laval_Lot_6.jpg"]},"Consult_chateau_formulaire707b":{"id":"Consult_chateau_formulaire707b","dept":"46","canton":"Gourdon","commune":"Lavercantière","nom":"Lavercantière","type":"Château","periode":"XIV","histoire":"LAVERCANTIERE, aurait été conquis et pillé en 1197 par les hommes de Richard Cur de Lion ; en représailles, Bertrand, laîné des Gourdon aurait ordonné à lun de ses  arbalétriers datteindre mortellement le roi Richard, ce qui fut fait en réalité  lors du siège de Chalus en Limousin. Plus sûr est par contre le mariage en 1525 de lhéritière des Gourdon avec le fils aîné des Lagrange, originaires de Rocamadour. Cest lun de leur descendants, Guyon, qui fut à lorigine de la reconstruction de la demeure  occupant la limite occidentale de lancien castrum. Les Lagrande-Gourdon de Lavercantière conservèrent le fief et le château jusquà la Révolution.  En 1200 dans les Coutumes de Lavercantière Alphonse de Poitiers, seigneur de Lavercantière, fait don du Frau, terre boisée de chênes, aux habitants de Lavercantière. Durant la seconde guerre mondiale, une organisation américaine gérée par  les Quakers accueillit dans ces murs des réfugiés espagnols.   Dans les siècles qui suivirent cette forêt fut utilisée pour la fabrication du fer, les vestiges de fours sont nombreux. Elle fut totalement détruite. Ce n'est que depuis quelques décennies que le Frau a fait l'objet de mesures de plantations de forêts. Auparavant, le Frau n'était qu'une lande de fougères et de bruyères. Aujourd'hui l'Office national des forêts et la commune ont réalisé un sentier d'interprétation. Ce circuit de promenade allie la découverte de l'environnement naturel et une étape sportive. Le Frau possède une loge typique, qui est un abri végétal, construction rurale par l'homme en matériel végétal. Elle servait d'abri pour les animaux, elle a même servi d'habitation au début du XIXe siècle.","architecture":"Le château se compose de deux bâtiments perpendiculaires l'un à l'autre, dotés de trois niveaux. Sur la façade extérieure des imbrications de pierre laissent penser que le plan initial n'a pas été complètement réalisé. Le château  reste toutefois non achevé, sans que lon en connaisse les raisons. Le château se compose donc de deux corps de bâtiment rectangulaires soudés ensemble pour former un plan en T. ; seule laile occidentale fut élevée, mais il fallut pour cela attendre plus dun siècle. Le premier corps de logis à lEst est le plus ancien, bâti par Guyon de Lagrange. Sa façade, rythmée par les fenêtres \"bâtardes\" et les cordons dappui, saccompagne dun beau portail encadré de pilastres qui indique la cage de lescalier monumental desservant les deux corps de logis. A droite, la salle des gardes est un grand espace voûté. Le second bâtiment à lOuest, construit au XVIIIe siècle, souvre sur les jardins et réunit une grande cave voûtée,  est inscrit au titre des monuments historiques depuis le 16 septembre 1991 protégeant : les façades et toitures, la salle dite des Gardes au rez-de-chaussée, l'escalier principal.","habitants":"Famille de Gourdon et Guyon de Lagrange\r\n        \r\n        \r\n        \"","divers":"Château de Lavercantière.","gps":"","images":["../../jctruffet.com/image/image_46/46_Lavercantiere_1.jpg","../../jctruffet.com/image/image_46/46_Lavercantiere_2.jpg","../../jctruffet.com/image/image_46/46_Lavercantiere_3.jpg","../../jctruffet.com/image/image_46/46_Lavercantiere_4.jpg","../../jctruffet.com/image/image_46/46_Lavercantiere_5.jpg"]},"Consult_chateau_formulaire212e-2":{"id":"Consult_chateau_formulaire212e-2","dept":"46","canton":"Gramat","commune":"Le Bastit","nom":"Lebastit","type":"Château","periode":"XIII","histoire":"LE-BASTIT l'histoire de l'implantation des Templiers au Bastit est obscure. Cet établissement religieux apparaît pour la première fois dans la documentation écrite en 1225. Il est alors pleinement institué car il est gouverné par le frère P. del Castel, qualifié de \"maître du Bastit\". Mais cette \"domus\" n'est réellement documentée qu'à partir de la seconde moitié du XIIIe siècle. La tradition historiographique convoque l'association de raisons économiques à la présence d'une ancienne voie romaine et d'une route de pèlerinage vers le sanctuaire de Rocamadour pour expliquer l'origine de cette fondation que l'on suppose avoir été réalisée ex nihilo. Les sources écrites interdisent, en l'état actuel des connaissances, d'appréhender plus avant la création de cet établissement religieux. Aujourd'hui gîtes de France.","architecture":"L'ensemble du domaine et le \"château de Bastit\" sont vendus comme bien national en 1793 à Bessières, de Gramat.  Le corps principal semble avoir été presque entièrement reconstruit au XIXe siècle, en ne conservant que le premier niveau, qui peut dater du XIIIe siècle, de plan rectangulaire à deux niveaux avec série de lucarnes sur un toit en tuiles en croupe, accolé sur angle arrière de deux tours à quatre niveaux, toit à quatre pans, et dépendance accolé sur flanc gauche.                                   \r\nVestige de la tour de Dimes.","habitants":"Les Templiers\r\n        \r\n        \"","divers":"château et tour à le Bastie","gps":"","images":["../../jctruffet.com/image/image_46/46_Lebastit_1.jpg","../../jctruffet.com/image/image_46/46_Lebastit_2.jpg","../../jctruffet.com/image/image_46/46_Lebastit_3.jpg","../../jctruffet.com/image/image_46/46_Lebastit_4.jpg","../../jctruffet.com/image/image_46/46_Lebastit_5.jpg"]},"Consult_chateau_formulairee776":{"id":"Consult_chateau_formulairee776","dept":"46","canton":"Saint-Céré","commune":"Autoire","nom":"Limargue","type":"Château","periode":"XV","histoire":"LIMARGUE, demeure dun compagnon darmes du roi Charles VIII, érigée au XVe siècle, le château de Limargue se distingue par sa haute tour descalier flanquée dune fine tourelle. Cest en contrebas et sur le flanc sud-ouest de lancien fort médiéval dAutoire quun dénommé Lafon, nommé chevalier par Charles VIII en reconnaissance de sa bravoure durant les guerres dItalie, fit édifier à la fin du XVe siècle cette maison forte connue sous le nom de \"château de Limargue\".  une légende court au village concernant ce château. Pour récompenser la bravoure d'un certain Lafon sur les champs de bataille d'Italie, le roi Charles VIII l'aurait récompensé en lui donnant le privilège d'avoir un logis avec tours et mâchicoulis qui était un droit attaché à la noblesse. Le dénommé Lafon aurait alors ajouté à son logis de simples tours et gravé sur un linteau d'une tour le blason qu'il s'était choisi, une étoile, peut-être celle qui porte chance. Une porte à accolade donne accès à l'escalier à vis. La tour fait lobjet dune inscription au titre des monuments historiques depuis le 6 avril 1929.","architecture":"La construction du château de Limargue date du XVe siècle. La porte de la tour est encadrée d'une mouluration torique qui forme une accolade sur le linteau. A mi-hauteur, la tour s'accoste d'une tourelle en poivrière en encorbellement. La demeure sarticule autour dune tour descalier à vis en poivrière logée dans  langle réunissant deux corps de logis. La porte principale de la maison au bas de la tour est ornée dun arc en accolade sculpté. Dans la partie haute de la tour dont lescalier distribue les différents niveaux dhabitation se greffe une guette en encorbellement. La seconde tour dans laquelle se superposent des pièces dhabitation est plus imposante : armée de canonnières, elle participait à la défense de la demeure  dont le sommet était, si lon en croit la tradition orale, couronnée de mâchicoulis.  Il ne reste rien de ce dispositif dans la construction dont les deux corps de logis ont été remaniés aux XVIIIe et XIXe siècles notamment lors du percement de  fenêtres à lemplacement danciennes croisées en pierre.","habitants":"Faémille de Lafon\r\n        \r\n        \"","divers":"Château de Limargne à Autoire","gps":"","images":["../../jctruffet.com/image/image_46/46_Limargue_1.jpg","../../jctruffet.com/image/image_46/46_Limargue_2.jpg","../../jctruffet.com/image/image_46/46_Limargue_3.jpg","../../jctruffet.com/image/image_46/46_Limargue_4.jpg","../../jctruffet.com/image/image_46/46_Limargue_5.jpg","../../jctruffet.com/image/image_46/46_Limargue_6.jpg","../../jctruffet.com/image/image_46/46_Limargue_7.jpg","../../jctruffet.com/image/image_46/46_Limargue_8.jpg"]},"Consult_chateau_formulaire17c3":{"id":"Consult_chateau_formulaire17c3","dept":"46","canton":"Limognes en quercy","commune":"Limognes en quercy","nom":"Limognes","type":"Commanderie","periode":"XII-XVI","histoire":"LIMOGNES, au  XIe siècle : implantation d'une commanderie en 1059  scission des chanoines en deux ordres, les séculiers et les réguliers, au XIIe siècle  le chemin de Saint Jacques de Compostelle ne passe plus par les lieux mais par Rocamadour. En 1145  fondation du prieuré par Bertrand de Grifeuilles. En 1155  Bertrand de Grifeuilles confie le prieuré à l'ordre des chanoines réguliers de Saint Augustin.  au XIIIe siècle  construction d'un nouveau monastère fortifié. En 1244  passage de Louis IX (saint Louis) et de sa mère Blanche de Castille. En 1368  les anglais sont chassés sur ordre du roi Charles V. De 1381 à 1385  pillage par Ratie à la tête des routiers de Puylagarde. Au XVe siècle,  l'évêque Jean de Castelnau occupe le prieuré et y décède. De 1588 à 1589  occupation par les calvinistes. En 1589 délivrance par Antoine de Bournazel, sénéchal du Rouergue. En 1661  les pères jésuites de Toulouse prennent possession du prieuré. En 1762  bannissement des jésuites. En 1793  à la révolution le prieuré est vendu comme bien national au citoyen Joseph Alexandre Bergeron. En 1846  le prieuré est revendu en 4 lots.  En 1960  le prieuré déserté est envahi par la végétation. En 1974  il devient la propriété de monsieur et madame Touvet qui commencent sa restauration. En 2004  les chemins de Saint Jacques de Compostelle repassent par le prieuré. Depuis, des propriétaires successifs se sont passionnés pour ce site s'efforçant de le remettre en état pour lui redonner vie.","architecture":"LIMOGNES, cour intérieure et jardins en terrasse s'ouvrant sur la campagne avec un bel environnement, exceptionnel Prieuré du XIIe siècle, d'environ 900m² édifié sur une commanderie du Xe siècle.  Aujourd'hui le monument a conservé une grande richesse d'authenticité : Salle capitulaire, hospitium, donjon, réfectoire, galerie du cloître, salle souterraine. Habitation d'environ 200m²  6 pièces principales à rénover, entrée sur l'allée du cloître, salle capitulaire 36m², sacristie, salle voûtée des moines, le passage aux champs, salle voûtée romane l'hospitium 80m², chapelle 105m² dans laquelle une deuxième voûte a été aménagé par les jésuites au XVIIe siècle pour créer le réfectoire au 1er étage. La cuisine de 50m² (donjon). Il existe une salle souterraine voûtée dans le jardin du cloître, lieu de refuge. De 1840 à 1856  prolongation du bâtiment sud par une succession de petits bâtiments. En 1928  inscription à l'I.S.M.H. (inventaire supplémentaire des monuments historiques). La tour du gouffre (écroulée).","habitants":"monsieur et madame Touvet \r\n        \r\n        \"","divers":"Commanderie à Limognes et château hôtel gravure 3 et  4.","gps":"","images":["../../jctruffet.com/image/image_46/46_Limognes_1.jpg","../../jctruffet.com/image/image_46/46_Limognes_2.jpg","../../jctruffet.com/image/image_46/46_Limognes_3.jpg","../../jctruffet.com/image/image_46/46_Limognes_4.jpg"]},"Consult_chateau_formulairee9a2":{"id":"Consult_chateau_formulairee9a2","dept":"46","canton":"Saint-Céré","commune":"Loubressac","nom":"Loubressac","type":"Château","periode":"XIII-XV","histoire":"Loubressac  possède plusieurs châteaux dont celui de  Loubressac de Gamot et de Miramont pour ces deux derniers (voir  article Gamont).                                                                                                                                           LOUBRESSAC,  est une bastide fortifiée  en 1259, Hugues de Castelnau hommage au comte de Toulouse, Alphonse de Poitiers. En 1350, Guérin de Castelnau s'avoue vassal du vicomte de Turenne pour la baronnie de Gramat et ses appartenances, dont la châtellenie de Loubressac qui  était occupé par les Anglais depuis au moins 1387, Elzéar d'Aigrefeuille demande dix ans plus tard au comte d'Armagnac d'aider son neveu, seigneur de Gramat, à le reprendre. Les d'Aigrefeuille conserve la seigneurie jusqu'en 1476, date à laquelle elle passe à Béraud de Faudoas-Barbazan, qui la vend et la rachète plusieurs fois . Lors du dénombrement de 1504, c'est Jacques de Genouilhac, dit Galiot, seigneur d'Assier, qui tient la baronnie et le château de Gramat et Loubressac qui en dépend , mais dès 1507 le fief est à nouveau vendu à Jean d'Auriolle, évêque de Montauban et à son frère Aymar, dont la fille Anne d'Auriolle épouse Raymond de Gontaud-Cabrerets en 1546. Anne d'Auriolle fait procéder à d'importants travaux d'aménagement au cours de la première moitié du XVIe siècle. Loubressac est occupé par les protestants en 1572, et la seigneurie est vendue  à Henri de Noailles l'année suivante, puis rachetée vingt ans plus tard par les Goutaud-Cabrerets qui la conservent jusqu'en 1730 .                                                                     Manoir à tour carré dans le bourg de Loubressac","architecture":"Le château de Loubressac  est vendu comme bien national à la Révolution. Les tours et les créneaux des remparts sont rasés à la fin du XIXe siècle, puis le château est restauré au début du XXe siècle, avant 1922, par l'écrivain Henri Lavedan. La fenêtre ternée de l'élévation nord, au-dessus de l'escarpement, témoigne de l'existence d'un édifice à cet emplacement dès la fin du XIIe siècle ou le début du XIIIe siècle, et les croisées de l'importance des travaux réalisés pour Anne d'Auriolles.","habitants":"Famille de Castelnau  Famille de Vinhals\r\n        \r\n        \"","divers":"Château de Loubressac et manoir dans le bourg gravure 7.","gps":"","images":["../../jctruffet.com/image/image_46/46_Loubressac_1.jpg","../../jctruffet.com/image/image_46/46_Loubressac_2.jpg","../../jctruffet.com/image/image_46/46_Loubressac_3.jpg","../../jctruffet.com/image/image_46/46_Loubressac_4.jpg","../../jctruffet.com/image/image_46/46_Loubressac_5.jpg","../../jctruffet.com/image/image_46/46_Loubressac_6.jpg","../../jctruffet.com/image/image_46/46_Loubressac_7.jpg","../../jctruffet.com/image/image_46/46_Loubressac_8.jpg","../../jctruffet.com/image/image_46/46_Loubressac_9.jpg"]},"Consult_chateau_formulaire08fd":{"id":"Consult_chateau_formulaire08fd","dept":"46","canton":"Souillac","commune":"Loupiac","nom":"Loupiac","type":"Château","periode":"XIV","histoire":"LOUPIAC, au XIIIe siècle, les Vassal, seigneurs de Belcastel, et les Stéphani possédaient les terres de Loupiac situées dans la baronnie de Belcastel. Au milieu du XIVe siècle, Guillaume de Vassal est attesté à Loupiac, possesseur d'une maison-forte, aujourd'hui disparue. En 1410, Guy de Peyronnenc, héritier des Vassal, est propriétaire des lieux, en 1460, son fils Michel possède la seigneurie et va construire le château que l'on voit aujourd'hui. La propriété passe par mariage à la famille de Pontbriant, mais pour très peu de temps, car son fils revendra Loupiac en 1539 à Jean de Gironde. Puis le château sera occupé par les familles Gontaud Saint-Geniès en 1605, d'Estresse en 1705, Véry en 1827 et enfin il est acquis en 1974 par ses propriétaires actuels qui réaliseront une belle restauration.                                                                                                                                           CROS, ce château du XIIe-XIVe siècle, construit sur lemplacement dune ancienne motte féodale avec autorisation du roi Edouard III dAngleterre, domine toute la vallée de la Garonne et du Ciron.","architecture":"Château reconstruit dans la seconde moitié du XVe siècle.\r\nVendu en 1827, le château est alors modifié. L'édifice a été restauré entre 1974 et 1996, avec en particulier la restauration des croisées des fenêtres ; la cheminée du rez-de-chaussée a été remontée après déplacement. L'édifice se compose de deux ailes en retour d'équerre comportant aux extrémités un pavillon carré surmonté d'une toiture à quatre pans. Une tour ronde est édifiée à l'intérieur de l'angle formé par les deux bâtiments.                                                                                                     Cros vestiges de la maison forte du XIIe siècle  ont  du consolider le château pour éviter la ruine dun bâtiment qui fait partie du patrimoine culturel de notre région et de Loupiac.","habitants":"Famille de Guy de Peyronnenc\r\n        \r\n        \"","divers":"Château de Loupiac et de Cros gravure 4 à 6.","gps":"","images":["../../jctruffet.com/image/image_46/46_Loupiac_1.jpg","../../jctruffet.com/image/image_46/46_Loupiac_2.jpg","../../jctruffet.com/image/image_46/46_Loupiac_3.jpg","../../jctruffet.com/image/image_46/46_Loupiac_4.jpg","../../jctruffet.com/image/image_46/46_Loupiac_5.jpg","../../jctruffet.com/image/image_46/46_Loupiac_6.jpg"]},"Consult_chateau_formulairede3e":{"id":"Consult_chateau_formulairede3e","dept":"46","canton":"Figeac","commune":"Lunan","nom":"Lunan","type":"Château","periode":"XV-XVII","histoire":"Lunan, du 4e quart du XVe siècle, au XVIIe siècle, oeuvre de Giragols Jean tailleur de pierre. En 1464, noble Pierre Boysson, marchand de Figeac, passe contrat avec  Jean Giragols, d'Aubin en Rouergue, pour l'ajout d'un étage au repaire de Seyrignac, qui est parfois qualifié de \"tour\". Les Boysson avaient été anoblis en 1437.\r\nAu siècle suivant les lieux sont tenus par les Durfort de Séguier. En 1610, Françoise de Palestron est dite \"dame de Sérignac\" et la terre de Seyrignac est achetée en 1650 par Marguerite de Cussonnel, mariée à Bertrand de Cardaillac, seigneur de Marival. Le domaine appartient aux Salles au XVIIIe siècle et au XIXe siècle, avant d'être remplacés par les Gironde.","architecture":"A première vue, Lunan, les parties les plus anciennes ont été conservées dans l'édifice actuel  principalement la tour d'escalier ne sont pas antérieur  au 4e quart du XVe siècle, corps de logis de plan rectangulaire à deux niveaux avec déport en façade entre la tour d'escalier et la tourelle. Le château a connu de très importantes modifications aux  XVIIe et XVIIIe siècles, et surtout au XIXe siècle. La chapelle a été construite au XIXe siècle, après 1833.","habitants":"Giragols Jean \r\n        \r\n        \"","divers":"Château de Lunan","gps":"","images":["../../jctruffet.com/image/image_46/46_Lunan_1.jpg","../../jctruffet.com/image/image_46/46_Lunan_2.jpg","../../jctruffet.com/image/image_46/46_Lunan_3.jpg"]},"Consult_chateau_formulaire627b":{"id":"Consult_chateau_formulaire627b","dept":"46","canton":"Carjac","commune":"Lunegarde","nom":"Lunegarde","type":"Château","periode":"XVIII","histoire":"LUNEGARDE, le fief de Lunegarde a été une possession de la chantrerie de l'abbaye Saint-Pierre de Marcilhac-sur-Célé. Il a d'abord été un fief de la famille de Gourdon, puis il a appartenu à Guillaume Balène, entre 1290 et 1301. Le château de Lunegarde, qui devait initialement se trouver près de l'église, a été apporté par mariage à Mafre de Solignac.  Le château est détruit pendant la guerre de Cent Ans. Au XVe siècle, Les Gauléjac de Puycalvel possèdent la seigneurie d'après l'abbé Clary. Au dénombrement de 1504, elle appartient à Jean d'Auriole, mais elle est rachetable par le seigneur de Puycalvel. Elle passe ensuite aux Lagarde de Reilhac et aux Ginouilhac puis aux Crussol d'Uzès. Le duc d'Uzès a affermé la seigneurie à Antoine Vidal de Lapize en 1659. Le château appartient aux descendants de la famille Vidal de Lapize.   Le château se trouvait à l'origine près de l'église : l'édifice actuel, édifié en bordure du village, est dû aux Vidal de Lapize : Le corps de logis et l'aile ouest sont de 1736, l'aile est datée de 1773. L'écrivain Pierre Benoît a intitulé l'un de ses romans, publié en 1942, \"Lunegarde\".","architecture":"De style classique, le château de Lunegarde fut édifié au XVIIIe siècle par les Vidal de Lapize, aux abords dun petit bourg du causse de Gramat.  Lélégante et sobre bâtisse, au centre dun parc planté dallées de buis, est composée dun corps de logis encadré par deux pavillons délimitant une cour ouverte.  Les travaux de construction, débutés en 1736, sachevèrent en 1773 par lédification de laile orientale. Côté communs, un grand portail aux murs en demi-lune donne accès depuis un petit chemin bordé de mur en pierres sèches à une vaste prairie enclose de murs. A quelques mètres de là, un second portail mène à une longue allée qui dessert la façade principale de la demeure. Les fenêtres et les portes fenêtres des deux niveaux dhabitation souvrent ici sur une cour légèrement surélevée, en une composition classique répartie  symétriquement de part et dautre de la porte dentrée surmonté dun entablement mouluré.  La base des hautes toitures de tuiles plates est rythmée par des lucarnes en  pierre aux ailerons en volutes et aux frontons curvilignes, agrémentés de décors sculptés et de boules.","habitants":"Famille Vidal de Lapize\r\n        \r\n        \"","divers":"Château de Lunegarde","gps":"","images":["../../jctruffet.com/image/image_46/46_Lunegarde_1.jpg","../../jctruffet.com/image/image_46/46_Lunegarde_2.jpg"]},"Consult_chateau_formulaire9ee1":{"id":"Consult_chateau_formulaire9ee1","dept":"46","canton":"Luzech","commune":"Luzech","nom":"Luzech","type":"Château-fort","periode":"XII","histoire":"Plusieurs châteaux à Luzech, celui de Pécot, de Caïx dit de la reine du Danemark (voir article), de Vincens, de Croisille.                                                                                                       LUZECH, L'Evèque de Cahors, Guillaume de Cardaillac racheta ce qui restait du château, devint de ce fait seigneur de Luzech et autorisa le baron à construire un deuxième château de moindre importance sur le rocher de la Trincade. Lors de l'affrontement entre Richard Cur de Lion et Philippe Auguste, le château tombe aux mains des anglais et ne sera repris que bien plus tard. Passé sous le giron des cathares, le village et la forteresse tombe sous les attaques des croisés et Simon de Montfort ordonne l'incendie du lieu. La crise albigeoise terminée, le domaine est acquis par Guillaume de Cardaillac, évêque de Cahors. Les familles de Luzech et Cardaillac en seront les co-seigneurs.  Lors de la guerre de 100 ans, le village est par miracle épargné. Il semble que les anglais aient préféré ne pas se mesurer à la puissante citadelle. La seigneurie sera vendue au XVIIe siècle aux Rastignac qui occuperont le château jusqu'à la Révolution. Des fouilles archéologiques ont été menées sur le site dès la fin du XIXe siècle, révélant l'étonnante richesse historique du lieu. Malheureusement, il ne reste en bon état que le donjon de la forteresse ainsi que quelques remparts ruinés.                                                                  PECOT, le château se situe au centre même de Luzech, sur l'avenue Uxellodunum. Le château Pécot est exploité par la famille Siutat, vignerons de père en fils depuis plusieurs générations.                                                                                                                                       VINCENS, viticole de la famille Foussal                                                                                            CROISSILLE, viticole de Cécile et Bernard Croisille.                                                                                  Pas d'historiques pour les autres châteaux.","architecture":"Luzech le site est particulièrement propice à l'édification d'une fortification de par son emplacement et sa topographie. En effet, un plateau de 150m de haut borde la rivière. C'est sur cet éperon rocheux, reste du château du XIIe siècle le donjon de 24 m de haut, aujourd'hui est bien carré aux angles emboîtés dans des contreforts, et de par sa forme, caractéristique de l'école architecturale du midi. Les tours rondes étaient de règle dans le domaine du Roi de France. Mais le Quercy relevait à l'époque du Duché de Guyenne. L'ensemble a été largement pillé au XIXe siècle. Du château descend une muraille qui allait rejoindre les remparts aux sept portes ceinturant le bourg, côté Lot et côté douve jusqu'au rocher de la Trincade. Une rue principale traversait la Cité, de la porte du Fossé à la porte du Ruffier.  Des vestiges subsistent encore dans de nombreuses caves, arc en ogives ou en plein cintre, des étals, la Maison des Consuls, la Chapelle des Pénitents.                                                                                                                      Pécot, Vincens et Croisille des constructions fonctionnels pour les exploitations viticoles.","habitants":"Famille de Rastignac\r\n        \r\n        \"","divers":"Tour et châteaux à Luzech, Rives d'Olt gravure 5-6.","gps":"","images":["../../jctruffet.com/image/image_46/46_Luzech_1.jpg","../../jctruffet.com/image/image_46/46_Luzech_2.jpg","../../jctruffet.com/image/image_46/46_Luzech_3.jpg","../../jctruffet.com/image/image_46/46_Luzech_4.jpg","../../jctruffet.com/image/image_46/46_Luzech_5.jpg","../../jctruffet.com/image/image_46/46_Luzech_6.jpg"]},"Consult_chateau_formulaire6d53":{"id":"Consult_chateau_formulaire6d53","dept":"46","canton":"Luzech","commune":"Saint-Cyprien","nom":"Marcillac","type":"Château","periode":"XIV","histoire":"MARCILLAC, le château de Marcillac et son fief appartenaient au XIVe siècle à la famille de Lard, avant de passer en 1427, par lunion de Jeanne de Lard et dHugues dOrgueil, dans les biens de ce dernier, la famille dOrgueil, détentrice de la seigneurie du XVe au XVIe siècle.  En 1565, leur descendante apporta en dot la seigneurie aux de Cruzy, qui conservèrent le château dans lequel ils firent de nombreux aménagements, notamment au XVIIe siècle et jusquau XVIIIe siècle lorsque le domaine fut vendu aux Saint-Jean.  Bertrand de Saint-Jean, engagé dans la petite armée \"contre-révolutionnaire\" du marquis dEscayrac, attira les foudres des paysans qui incendièrent et  pillèrent le château le 20 décembre 1790. Au XIXe siècle, Mère Clotilde de la Volvène, fondatrice de lordre de la Miséricorde de Montcuq, racheta la demeure laissée à labandon pour y installer sa congrégation.  Après la première guerre mondiale, le château à nouveau délaissé fut livré aux mains des démolisseurs arrachant à lancienne forteresse des pans entiers de murs.  Depuis une vingtaine dannées, de nouveaux propriétaires ont repris en main le destin de lédifice qui est devenu le siège du Festival de musique classique du Quercy Blanc.","architecture":"Marcillac, le château médiéval,  est un grand quadrilatère, aux angles flanqués de tours carrées, dont les corps de logis entourent une cour intérieure dotée dun puits. Des archères simples ou cruciformes, incisées dans les murs en appareil de gros moellons calcaires, sont les derniers témoins du dispositif déployé pour la défense de cette petite forteresse. En partie arasée sous la Révolution, une haute tour construite en pierres et en briques dans sa partie supérieure fait figure de tour maîtresse et commandait lentrée dans la cour. Une tour circulaire, dans laquelle est logée un escalier à vis ainsi que des fenêtres à meneaux, ont été mis en place à la fin du XVe siècle dans lédifice.  L'édifice a conservé des éléments anciens, en particulier les restes d'un château du XIIIe siècle. Au XVIe siècle, le château connaît de nombreuses améliorations dans un style moins guerrier. D'aspect médiéval, le bâtiment se rattache aux dispositions militaires. Dans la cour intérieure, un escalier à vis, abrité dans une tour circulaire, dessert les pièces principales cantonnées à l'est et au sud. L'escalier du XVIIe siècle dans la partie Est du château est à rampe droite et déploie un décor géométrique sur les pilastres, d'angelots, de guirlandes de fruits, de palmes et de volutes.","habitants":"Famille de Lard\r\n        \r\n        \"","divers":"Château de Marcillac","gps":"","images":["../../jctruffet.com/image/image_46/46_Marcillac_1.jpg","../../jctruffet.com/image/image_46/46_Marcillac_2.jpg","../../jctruffet.com/image/image_46/46_Marcillac_3.jpg","../../jctruffet.com/image/image_46/46_Marcillac_4.jpg","../../jctruffet.com/image/image_46/46_Marcillac_5.jpg"]},"Consult_chateau_formulaire6ed8":{"id":"Consult_chateau_formulaire6ed8","dept":"46","canton":"Martel","commune":"Martel","nom":"Martel","type":"Château","periode":"XII-XV","histoire":"MARTEL  avec ses tours,  le beffroi de Raymondie , le château des Tuileries chambres d'hôtes, à Mirandol Lagardelle et à Saint-Denis les Martel, le moulin de Briance et les Termes chambres d'hôtes (voir article) . Martel cité au XIIe siècle   protégée par les vicomtes de Turenne.                                                                                                                                    MARTEL, lorsque Charles-Godefroy de la Tour d'Auvergne, petit-fils d'Henri de la Tour d'Auvergne-Bouillon, le \"Grand Turenne\", vendra à Louis XV la vicomté de Turenne le 8 mai 1738 pour honorer le paiement de ses dettes de jeu, Martel perdra de son autonomie (la vicomté de Turenne était le dernier fief français, c'est-à-dire un État dans l'État; à la suite de cette vente, les Viscomtins, devenus rattachés directement au domaine royal, sont alors contraints à l'impôt) et déclinera lentement jusqu'à la Révolution.                                                                                                                                                                                                         MIRANDOL, Gaillard de Mirandol accompagne le vicomte de Turenne lors de la première croisade en 1095, en épousant Catherine de Faure en 1335, Guérin de Mirandol accepte de joindre à ses armes celles des Faure, mais au siècle suivant le nom de Faure se substitue à celui de Mirandol , et en 1504, c'est un François Faure qui dénombre pour Mirandol. En 1681, la seigneurie passe par alliance aux Lasterie de Saillant qui se maintiennent dans les lieux jusqu'en 1795, date à laquelle le château est vendu à Etienne de Maynard .","architecture":"Martel, Beffroi de l'hôtel de la Raymondie, tour rectangulaire avec clocheton, cheminée et horloge, du XIIIe siècle, crénelé, seize arcades ogivales, plusieurs échauguettes aux angles du palais, 35 mètres de hauteur pour le beffroi neuf fenêtres Renaissance quadrilobés.\r\nTour Tournemire : tour de guet, et également prison, du XIIe siècle et XIVe siècle, tour carrée avec créneaux recouverts, 25 mètres.\r\nTour du couvent des Cordeliers, tronquée à la Révolution, tour carrée, du XIVe siècle, 25 mètres.  Tour de la maison Fabri, tour ronde du XIIe-XIVe et XVIe siècle de 23 mètres. Tour de l'hôtel Vergnes de Ferron, tour ronde avec clocheton et échauguette, tourelle en façade nord, du XIVe siècle de  23 mètres. Tour de l'hôtel de Mirandol de 1469, tour carrée avec échauguette et clé de voûte remarquable de 24,5 mètres et  d'autres tourelles dans Martel.                                                                                                                          Mirandol, le repaire de Mirandol est attesté dès la fin du XIe siècle ; des remparts de cette époque auraient été démolis à la mine au XIXe siècle, il subsiste du château du Moyen-Age une porte couverte d'un arc brisé, ancienne porte d'entrée donnant aujourd'hui accès à la cave, cette porte date du XVe siècle. L'édifice a été en grande partie reconstruit au début du XVIIe siècle, il a subi de nombreux remaniements en particulier au XIXe siècle. Une fortification connue sous le nom de \"grotte des Anglais\" subsisterait dans la falaise au sud du château.                                                                                                                            La Tuilerie est une charmante demeure du XIXe siècle où  Françoise et Guy Raynal en ont fait des chambres d'hôtes, corps de logis de plan rectangulaire à trois niveaux toits en ardoises en croupes avec lucarne centrale sur la façade accolé de deux tours rondes aux angles de cette dernière avec toits en poivrières.","habitants":"Famille de  Gaillard de Mirandol\r\n        \r\n        \"","divers":"Patrimoine et château sur Martel et le château de la Gardelle 5-6 et 7,  la Tuilerie gravure 8 et 9","gps":"","images":["../../jctruffet.com/image/image_46/46_Martel_1.jpg","../../jctruffet.com/image/image_46/46_Martel_2.jpg","../../jctruffet.com/image/image_46/46_Martel_3.jpg","../../jctruffet.com/image/image_46/46_Martel_4.jpg","../../jctruffet.com/image/image_46/46_Martel_5.jpg","../../jctruffet.com/image/image_46/46_Martel_6.jpg","../../jctruffet.com/image/image_46/46_Martel_7.jpg","../../jctruffet.com/image/image_46/46_Martel_8.jpg","../../jctruffet.com/image/image_46/46_Martel_9.jpg"]},"Consult_chateau_formulaireb82b-2":{"id":"Consult_chateau_formulaireb82b-2","dept":"46","canton":"Souillac","commune":"Masclat","nom":"Masclat","type":"Château","periode":"XV","histoire":"MASCLAT, au cur du village : le château de Masclat, ancien repaire sous la seigneurie des Cardaillac puis des Thémines au XIVe siècle, occupé par les Anglais de 1355 à 1362, il fut reconstruit au siècle suivant. Lédifice est à létat de vieille masure  en 1856. La réfection des toitures permettra sa sauvegarde. De nombreux seigneurs ou co-seigneurs se succédèrent au gré des alliances et transactions. Nous trouverons notamment diverses familles : les de Massaut, les d'Auriole, les de Blanchefort, les de Mareuil, les de Fontanges. Les de Vervaix resteront seigneurs de Masclat du XVe au XVIIe siècle. Viendront ensuite les familles de Landons-Sauvat  puis les Lantrons de Saint-Hubert et enfin à la veille de la Révolution : les Corneilhan. Le château sera vendu aux enchères en 1859 et adjugé à M. Planchou, propriétaire et maire de Masclat. Revendu depuis peu, il a longtemps appartenu à la famille Pebeyre  originaire de Masclat.","architecture":"un château de Musclat dont les murs beiges et massifs, percés de larges fenêtres et flanqués de pigeonniers, est entouré de vignes orientées .\r\nBel édifice, construit autour dune haute tour carrée, le corps de logis principal est flanqué de deux tours rondes de la fin  du XVe siècle, tronquées mais encore équipées de canonnières, la troisième tour ronde, à larrière du bâtiment, loge lescalier à vis. À gauche, dans la cour, lancien « grenier du château » servit dauberge de 1919 à 1960. À proximité, dans lencadrement du portail, trône lécu à trois bandes des Salignac Fénelon.","habitants":"Famille de Vervaix\r\n        \r\n        \"","divers":"Château de Masclat","gps":"","images":["../../jctruffet.com/image/image_46/46_Masclat_1.jpg","../../jctruffet.com/image/image_46/46_Masclat_2.jpg","../../jctruffet.com/image/image_46/46_Masclat_3.jpg","../../jctruffet.com/image/image_46/46_Masclat_4.jpg","../../jctruffet.com/image/image_46/46_Masclat_5.jpg","../../jctruffet.com/image/image_46/46_Masclat_6.jpg","../../jctruffet.com/image/image_46/46_Masclat_7.jpg","../../jctruffet.com/image/image_46/46_Masclat_8.jpg"]},"Consult_chateau_formulaire217e":{"id":"Consult_chateau_formulaire217e","dept":"46","canton":"Puy-L","commune":"Mauroux","nom":"Mauroux_Lot","type":"Vestiges","periode":"XIV-XX","histoire":"MAUROUX vestiges et château qui  appartenait aux seigneurs de Mauroux également nommés barons d'Orgueil, du nom de la cité disparue, et ce jusqu'à la veille de la Révolution comme le stipule un acte daté du 4 novembre 1779 : \" Jean Baptiste Joseph Marc Duroc de Mauroux, baron d'Orgueil, seigneur haut et bas justicier de Mauroux, Cabanac, Lacapelle, Touzac et Labastide d'Entéroque \".                                                                                                                                                                                                                                                  LATUC viticole par la famille de  Meyan.","architecture":"Au début du siècle précédent, Mauroux possédait encore des vestiges importants de son château dont les parties les plus anciennes remonteraient au XIVe siècle. Démolitions et transformations n'ont laissé subsister qu'une tour, une partie du corps de logis et quelques dépendances. En partie détruit par un incendie au début du XXe siècle, son possesseur morcela alors la propriété et vendit pierre à pierre les bâtiments restants. Matériaux et éléments de décoration ont été récupérés et vendus pour d'autres usages, comme en témoigne les montants du portail d'entrée, qui entre les deux guerres, furent démontés et remontés à l'entrée de la Source bleue à Touzac, alors propriété de l'actrice Marguerite Moréno. La porte à tabernacle qui ornait l'entrée du château, fut également vendu.","habitants":"Jean Baptiste Joseph Marc Duroc de Mauroux,\r\n        \r\n        \"","divers":"Vestiges et château de Mauroux et château de Latuc figure 6.","gps":"","images":["../../jctruffet.com/image/image_46/46_Mauroux_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Mauroux_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Mauroux_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Mauroux_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Mauroux_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Mauroux_Lot_6.jpg"]},"Consult_chateau_formulaire5c4a":{"id":"Consult_chateau_formulaire5c4a","dept":"46","canton":"Souillac","commune":"Mayrac","nom":"Mayrac","type":"Château","periode":"XV","histoire":"MAYRAC, au XVe siècle, le Vicomte de Turenne était haut justicier du village jusqu'en 1738, époque où le roi de France acquit la vicomté.   Au XVIIe siècle, les Salignac de Lamothe-Fénelon sont les seigneurs des lieux, puis par alliance, c'est Pierre-Joseph de Lachèze-Murel qui occupe la demeure, royaliste fidèle qui défendra le Roi aux Tuileries, dénoncé, il sera emprisonné à la Conciergerie.  Pendant ce temps, ses biens sont saisis et affermés à un paysan du village. En 1856, Pierre Lachèze-Murel vend l'édifice à Jean-Baptiste Fayette dont les descendants occupent toujours la propriété.","architecture":"MAYRAC,  il ne reste a priori rien de ces aménagements défensifs, lélégante bâtisse est toujours présente face à léglise paroissiale de Saint-Martin. Elle se compose de deux corps de logis en équerre, reliés par une tour ronde à demi engagée. Lescalier de pierre, qui se développe en vis dans la tour, souvre sur lextérieur par un portail encadré de pinacles et surmonté dun grand arc en accolade orné de feuilles de choux frisés et de fleurons. Au centre, deux griffons élèvent lécu mutilé, frappé à lorigine des armes des Luquet.  La porte d'entrée se trouve au bas de la tour, avec montants moulurés reposant sur des bases prismatiques. La porte d'entrée est surmontée par une accolade et un fronton orné de fleurons, accompagné de chaque côté de pilastres. Les pièces sont ornées de cheminées en pierre époque où le Roi de France acquit la vicomté.  De petites bouches à feu, perçant ici la maçonnerie, permettait la défense de la demeure. Les deux étages de lhabitation sont signalés en façade par des croisées  et fenêtres à traverses, toutes richement moulurées et pourvues darc en accolade. Les pièces du bâtiment nord étaient dotées de latrines dont les coffres en saillies sont encore greffés sur la façade arrière.","habitants":"Famille de Pierre Lachèze-Murel\r\n        \r\n        \r\n        \"","divers":"Château de Mayrac","gps":"","images":["../../jctruffet.com/image/image_46/46_Mayrac_1.jpg","../../jctruffet.com/image/image_46/46_Mayrac_2.jpg","../../jctruffet.com/image/image_46/46_Mayrac_3.jpg"]},"Consult_chateau_formulaire73c8":{"id":"Consult_chateau_formulaire73c8","dept":"46","canton":"Cahors-1","commune":"Mercuès","nom":"Mercuès","type":"Château","periode":"XII-XIV","histoire":"MERCUES, fut la résidence favorite des comtes-évêques de Cahors. Ceux-ci construisirent dabord, au XIVe siècle, une maison de campagne une forteresse  sur les falaises qui dominent le Lot en aval de Cahors. La bastide qui se développe à lOuest du château fut créée dès le XIIe siècle. En 1426 : il fut assiégé par les troupes du captal de Buch et de Raymond de Durfort-Boissières, qui l'occupèrent jusqu'en 1428. En 1568  Incendié par les huguenots, De 1626 à 1637  l'évêque Pierre Habert, le relève de ses ruines. L'intérieur, richement décoré, abrite divers portraits et la chambre où le bienheureux Alain de Solminihac s'éteignit le 31 décembre 1659.  Au XVIIe siècle, monseigneur Habert, évêque de Cahors, le releva et y créa la terrasse et les jardins que lon admire encore aujourdhui. Monseigneur Le Jay et monseigneur Briqueville de la Luzerne, qui édifièrent le palais épiscopal de Cahors, sintéressèrent également à la demeure. En 1861  racheté par l'Evêque de Cahors, il a été embelli, aménagé et devint la résidence d'été des Evêques. En 1904  monseigneur Le Jay et monseigneur Briqueville de la Luzerne, qui édifièrent le palais épiscopal de Cahors, sintéressèrent également à la demeure. Les derniers travaux datent de la fin du XIXe siècle et furent réalisés par un élève de Viollet-le-Duc. Le château resta dans les mains des évêques de Cahors jusquà la séparation des Eglises et de lEtat, en 1905.  le château fut vendu. En  1914  le professeur Faure, membre de l'Institut, en devint l'acquéreur. A sa mort en 1944, il avait remis le domaine de Mercuès en état. Ses filles le transformèrent en château-hôtel. En 1966  Georges Hereil le père de la Caravelle nouveau propriétaire, l'agrandit avec passion et il en fit un des plus beaux d'Europe. Depuis 1983 est la propriété de Georges Vigouroux, d'importants travaux ont redonné au site ses lettres de noblesse, il abrite désormais un très bel hôtel.
