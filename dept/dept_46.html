ctruffet.com/image/image_46/46_Touzac_2.jpg","../../jctruffet.com/image/image_46/46_Touzac_3.jpg","../../jctruffet.com/image/image_46/46_Touzac_4.jpg"]},"Consult_chateau_formulaire1bee":{"id":"Consult_chateau_formulaire1bee","dept":"46","canton":"Souillac","commune":"Pinsac-Lacave","nom":"Treyne_Lacave","type":"Château","periode":"XIV-XVI","histoire":"LA-TREYNE, cité dés 1356 puis aux  Rouffilhac et en 1462, le vicomte de Turenne offre la seigneurie avec toutes justices , Annet Hugon du Cluzel. passa aux de la Ramière Le château aurait été reconstruit dans le deuxième quart du XVIe siècle : Jeanne de Coustin, dame de La Treyne et alors veuve de Jean de Cluzel. Occupé par les Huguenots, ce château neuf est incendié en 1586. En 1607, le protestant Jean de La Ramière hérite du château dont la destruction est ordonnée en 1622 par le Parlement de Toulouse. Gédéon de la Ramière, fils de Jean, entreprend sa restauration en 1625 : une grande partie de l'édifice date de cette époque. En 1711, le château passe par alliance à la lignée de Cardaillac-Végennes. François-Emmanuel fait agrandir le château en 1760 et relève le titre de marquis de Cardaillac. La famille conserve le château jusqu'au début du XXe siècle. En 1910, il est acheté par Auguste-Gabriel Savard, industriel parisien, le château change de mains à plusieurs reprises. En 1922 un industriel espagnol Fontana rachète le domaine. En 1954, le nouvel acquéreur, M. Santiard le transforme en hôtellerie raffinée du Périgord.","architecture":"La Treyne Le château aurait été reconstruit dans le deuxième quart du XVIe siècle, la tour carré du XIVe siècle a été abaissée perdant son statue de donjon fortifié.  L'édifice de plan rectangulaire sur une falaise, deux corps de logis à deux niveaux avec série de lucarnes sur toit brisé, pavillon d'entrée plein cintre à quatre niveaux, fenêtre jumenés toit à quatre pans et à l'opposé sur angle droit une tour ronde à quatre niveaux toit en poivrière.","habitants":"Famille d'Annet Hugon du Cluzel\r\n        \r\n        \"","divers":"Château de la Treyne gravure 1 à 4 château  de Souillac et hôtel à Lacave","gps":"","images":["../../jctruffet.com/image/image_46/46_Treyne_Lacave_1.jpg","../../jctruffet.com/image/image_46/46_Treyne_Lacave_2.jpg","../../jctruffet.com/image/image_46/46_Treyne_Lacave_3.jpg","../../jctruffet.com/image/image_46/46_Treyne_Lacave_4.jpg","../../jctruffet.com/image/image_46/46_Treyne_Lacave_5.jpg"]},"Consult_chateau_formulaire8a5a":{"id":"Consult_chateau_formulaire8a5a","dept":"46","canton":"Luzech","commune":"Villesèque","nom":"Trébaîx","type":"Vestiges-Tour","periode":"XIII","histoire":"TREBAIX, en 1313 eut lieu la transmission de la commanderie, victime de la vindicte royale contre l'ordre des Templiers, aux hospitaliers de Saint-Jean-de-Jérusalem. Un inventaire de la commanderie de Lacapelle-Livron, maison mère des Templiers du Quercy, l'atteste, déposé aux archives de Haute-Garonne. Pendant la guerre de Cent Ans, les consuls de Cahors ordonnèrent au commandeur de doubler la garde en son château de Trébaïx, redoutant une attaque anglaise. On ignore si leurs craintes furent fondées, et si la vieille demeure eut à subir les assauts des armées anglaises.","architecture":"Vestige d'une commanderie des Templiers, la tour date du XIIIe siècle. Elle a subi d'importants remaniements au XIVe siècle. Deux clefs de voûtes de l'étage inférieur représentent l'agneau de saint Jean et la croix bifide des Hospitaliers. Le corps de logis, ruiné au XIXe siècle, n'existe plus. La chapelle du XIVe siècle est surmontée d'une chambre haute remaniée au XVIe siècle.","habitants":"Les Templiers\r\n        \r\n        \r\n        \"","divers":"Tour de Trébaix à Villeséque","gps":"","images":["../../jctruffet.com/image/image_46/46_Trebaix_1.jpg","../../jctruffet.com/image/image_46/46_Trebaix_2.jpg","../../jctruffet.com/image/image_46/46_Trebaix_3.jpg"]},"Consult_chateau_formulaire947e":{"id":"Consult_chateau_formulaire947e","dept":"46","canton":"Gourdon","commune":"Uzech","nom":"Uzech","type":"Château","periode":"XII-XV","histoire":"UZECH,  élevé à l'extrémité du Pech où s'est implanté le bourg à l'époque médiévale, il est d'abord appelé au XVe siècle château de Pechbernat. En 1302, Aymeric de Gourdon rend hommage de son fief d'Uzech au chapitre de Cahors. Puis une branche cadette, les Gourdon de Lavercantières, occupent la propriété qui va connaître les tourments de la guerre de Cent Ans. Les du Garric et les del Sirech se succèdent à Uzech avant de se fondre en une seule famille, elle y résidera jusqu'à la fin du XVIIe siècle. Le château subit une restauration importante qui s'étale de 1626 à 1659, affectant l'ensemble des bâtiments. actuellement chambres d'hôtes.","architecture":"Uzech construit au XIIe siècle, remodelé et démantelé à plusieurs reprises, le château d'Uzech doit sans doute son caractère de permanence à deux tours, l'une française et l'autre anglaise et à son rempart. dans un parc à demi-fermé, un corps de logis de deux niveaux  toit en croupes, une tour polygonale dans l'angle  du parc.","habitants":"Famille de Les du Garric\r\n        \r\n        \"","divers":"Château de Uzech","gps":"","images":["../../jctruffet.com/image/image_46/46_Uzech_1.jpg","../../jctruffet.com/image/image_46/46_Uzech_2.jpg","../../jctruffet.com/image/image_46/46_Uzech_3.jpg"]},"Consult_chateau_formulaire7e64":{"id":"Consult_chateau_formulaire7e64","dept":"46","canton":"Gourdon","commune":"Vaillac","nom":"Vaillac","type":"Château","periode":"XIV","histoire":"VAILLAC  La seigneurie appartenait alors à la famille de Gourdon de Genouillac dont sortent trois évêques de Tulle, mais l'émouvante petite Galiote de Genouillac. A sept ans cette petite fille prononçait ses voeux monastiques, elle était prieure à quinze ans et mena une vie édifiante.. Le château a été reconstruit au XIVe siècle sur d'anciennes fondations. Le village est occupé par les Anglais en 1369, puis incendié à la suite d'une bataille. Propriété du capitaine de vaisseaux  Gérald d'Antin de Veillac.","architecture":"Le château de Vaillac, situé au cur du Lot, est un édifice de belle taille. date des XVe-XVIIe siècle avec corps de logis, chapelle castrale, écuries monumentales du XVe siècle, lensemble flanqué de 9 tours, installé sur terrasse surplombant le village. Le château est un exemple remarquable de larchitecture militaire de la fin du Moyen-Age du XVe siècle dans le Quercy.  l'édifice comprend  un corps de logis cantonné de cinq tours rondes ; quatre aux angles et une engagée sur une face, un donjon carré est accolé à un petit côté et un imposant massif rectangulaire fait saillie sur le grand côté  opposé à la tour engagée. Son logis au allure de donjon est flanqué de tourelles, un chemin de ronde à mâchicoulis faisait le tour de cette masse fortifiée, malheureusement les quatre tours d'angle ont été arasées au niveau de la couverture du grand comble, seule la tour centrale a conservé son système défensif.   Il est entouré par une enceinte assez vaste et relativement bien préservée. Au XIVe siècle il a été témoin et a souffert des guerres entre français et anglais. Il possède encore des écuries monumentales de la fin XVIe siècle, voûtées au RDC, grange de 50 mètres à l'étage, s'inscrivant dans son système de défense, et rare exemple de cette époque en France.  Le village s'est rapproché du château pour permettre sa défense.","habitants":"Famille de Gourdon de Genouillac\r\n        \r\n        \"","divers":"Château de Vaillac","gps":"","images":["../../jctruffet.com/image/image_46/46_Vaillac_1.jpg","../../jctruffet.com/image/image_46/46_Vaillac_2.jpg","../../jctruffet.com/image/image_46/46_Vaillac_3.jpg","../../jctruffet.com/image/image_46/46_Vaillac_4.jpg","../../jctruffet.com/image/image_46/46_Vaillac_5.jpg","../../jctruffet.com/image/image_46/46_Vaillac_6.jpg","../../jctruffet.com/image/image_46/46_Vaillac_7.jpg","../../jctruffet.com/image/image_46/46_Vaillac_8.jpg","../../jctruffet.com/image/image_46/46_Vaillac_9.jpg"]},"Consult_chateau_formulaire6351-2":{"id":"Consult_chateau_formulaire6351-2","dept":"46","canton":"Castelnau-Montratier","commune":"Vaylats","nom":"Vaylats","type":"Château","periode":"XVIII","histoire":"Aucun seigneur ne porte le nom de Vaylats ; toutefois dans l'histoire de Lacoste, on trouve au XIIIe siècle le nom de Guilhem de Vaylats. La paroisse de Vaylats est une annexe du prieuré de Bach à la Révolution française. La famille de Godaille possède une partie des terres ; la seigneurie était, semble-t-il, la dot de sa femme. À la veille de la Révolution, son descendant, le marquis de Cieurac, habite Montauban dont il devient le maire, mais il est arrêté en 1790 et mis en prison par le parti révolutionnaire. Il est envoyé à Paris avec un convoi de prisonniers ; jugé coupable, il est envoyé à l'échafaud. Ses biens confisqués seront vendus comme biens nationaux.                                                                                             Le couvent actuel de Vaylats a été construit au début du XIXe siècle sur des terres vendues par un descendant de la famille de Godaille à un prêtre, Jean Lausiu - né en 1785 dans une famille de Vaylats. Il fonde une communauté qui devient une école en 1820 . L' hôtellerie du Couvent de  Vaylats  près de Lalbenque  est un petit village, loin de leffervescence urbaine.  Cest ici quà la fin XVIIIe, le Père Jean Liausu pose les premières pierres fondatrices de la congrégation des filles de jésus et de lédifice qui les abrite.  Au 1er Avril 2014, la communauté de religieuses décide de laisser la gestion du couvent à une association gestionnaire créée pour loccasion dont le nom est tout trouvé : « Association Jean Liausu », cette association a pour vocation de poursuivre lexploitation des lieux dans le respect des valeurs fondatrices.","architecture":"Ce bâtiment majestueux aux allures de château abrite aujourdhui trois structures et différentes activités ce qui en fait un lieu unique de rencontres et déchanges. de plan en U avec tourelles sur les angles à trois niveaux flanqué en façades de deux tourelles toit en poivrières, entre deux le pavillon saillants d'entrée à fronton triangulaire. Lhostellerie du couvent SAS gère la résidence avec services composée à terme dune quarantaine de logements neufs. Lentreprise assure aussi des prestations daccueil de groupes et de particuliers dans une aile  dun bâtiment.                                                                                               Maison forte à Concots, le noyau primitif du village correspond à l'emprise du castrum dont l'élément le mieux conservé est le donjon datable du  XIIIe ou du XIV siècle. A en juger d'après le plan cadastral ancien, l'enceinte subsiste sans doute encore en partie au début du XIXe siècle. Les vestiges relevés à l'extérieur du noyau primitif montre un développement hors les murs au moins depuis le XVe siècle.","habitants":"Père Jean Liausu \r\n        \r\n        \"","divers":"Château de Vaylats et de Concot gravure 7","gps":"","images":["../../jctruffet.com/image/image_46/46_Vaylats_1.jpg","../../jctruffet.com/image/image_46/46_Vaylats_2.jpg","../../jctruffet.com/image/image_46/46_Vaylats_3.jpg","../../jctruffet.com/image/image_46/46_Vaylats_4.jpg","../../jctruffet.com/image/image_46/46_Vaylats_5.jpg","../../jctruffet.com/image/image_46/46_Vaylats_6.jpg","../../jctruffet.com/image/image_46/46_Vaylats_7.jpg","../../jctruffet.com/image/image_46/46_Vaylats_8.jpg"]},"Consult_chateau_formulaire965f":{"id":"Consult_chateau_formulaire965f","dept":"46","canton":"Puy-L","commune":"Vire-sur-Lot","nom":"Vire_sur_Lot","type":"Château","periode":"XVI","histoire":"GAUDOU, le nom « Gaudou » que porte le château et le lieu-dit, indique une ancienne occupation pendant le moyen âge de la colline.\r\nQuant à la famille Durou, sa présence est attestée par les registres paroissiaux dès le XVIe siècle. Les anciens livres de comptes font état dun commerce européen. Les tonneaux de vin étaient transportés en péniche jusquau port de Bordeaux. Ce fut notamment loeuvre de Jean-Charles Durou, à la fin du XIXe siècle son fils unique, Jean-Louis Durou, très vite maîtrisa lalchimie du vin pour enrichir les pratiques  quotidiennes de la viticulture locale.                                                                                                        NOZIERES  exploitation viticole par la famille Maradenne.","architecture":"Un château dont les murs beiges et massifs, percés de larges fenêtres et flanqués de pigeonniers, est entouré de vignes orientées . Lensemble du vignoble est certifié en lutte raisonnée, nous portons une grande attention à la pérennité de nos terroirs.\r\nEn compagnie dautres domaines viticoles prestigieux, Gaudou se situe au sein du village mythique de Vire sur Lot, surnommé le     «Beverly Hills de lappellation Cahors» par Michel Bettane.","habitants":"Famille Durou                                                                                        famille Maradenne\r\n        \r\n        \r\n        \"","divers":"Château de Vires sur Lot et de Nozières gravure 3","gps":"","images":["../../jctruffet.com/image/image_46/46_Vires_sur_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Vires_sur_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Vires_sur_Lot_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','46 — Lot'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
