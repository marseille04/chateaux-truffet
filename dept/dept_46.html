e Durfort est resté fidèle au roi de France. Son petit-fils, Raymond-Bernard de Durfort a combattu aux côtés du roi d'Angleterre. Il participe à la prise du château de Mercuès, en 1426. Dans les années suivantes il a fait des ravages dans la région avec une petite armée. Il s'est marié en secondes noces avec Marguerite de Cazeton qui lui apporté en dot les seigneuries de Salviac, Léobard, Saint-Germain, Septfons, Saint -Clair, Costeraste, Lafontade, Coupiac, Laval et le Mont-Saint-Jean, soit une grande partie du Gourdonnais. Pour récupérer le château de La Chapelle dont il avait hérité, il s'allie avec Naudonnet de Lustrac (vers 1395-1470), chef du partie français. En 1430, les États du Quercy finissent par lui payer une rançon pour qu'il évacue le château épiscopal de Mercuès. Il meurt en 1448.  Au XVIIe siècle, la famille de Losse devient propriétaire du château. En 1672, Jean-Cyrus de Losse, seigneur et marquis de Calamane, rend hommage pour sa seigneurie. Après les Pousargues, les Laroche-Lambert deviennent seigneurs de Calamane au XVIIIe siècle. Jean-Gaspard de Laroche-Lambert ayant émigré au début de la Révolution, ses biens sont confisqués et vendus aux enchères. Les tours du château sont arasées. Il est guillotiné en 1794. Sa veuve a pu acquérir le château en 1796.  En 1862, le château est acheté par Basile Albert, natif de Maxou, aïeul du propriétaire actuel. Le château a été inscrit au titre des monuments historiques depuis le 29 mars 1929.","architecture":"Le château est construit à la fin du XVe siècle, de style maison forte est un édifice rectangulaire cantonné aux angles d'un même côté  de deux grosses tours rondes de 3,50 m d'épaisseur à leur base, arasées à la Révolution, débordant d'une façade nord austère. Des traces de mâchicoulis rappellent les anciens systèmes de défense du château. Dans la cour d'honneur, une tour hexagonale Renaissance fait saillie de la façade sud. Elle renferme un escalier à vis. Le château repose sur de vastes caves voûtées.","habitants":"Famille de Durfort\r\n        \r\n        \"","divers":"Maison forte de Calamane","gps":"","images":["../../jctruffet.com/image/image_46/46_Calamane_1.jpg","../../jctruffet.com/image/image_46/46_Calamane_2.jpg"]},"Consult_chateau_formulaire9af1":{"id":"Consult_chateau_formulaire9af1","dept":"46","canton":"Carjac","commune":"Calvignac","nom":"Calvignac","type":"Château","periode":"XV","histoire":"A Calvignac  le château de Calvignac et le château de la Garrigue.                                                                               CALVIGNAC,  implanté entre causse et rivière dont il contrôle l'activité, le village s'impose dès le Xe siècle comme l'une des 4 vicomtés du Quercy, avec Saint-Cirq Lapopie, Brassac, Bruniquel. Le castrum originel se compose d'un fort, d'une ville et quartier bourgeois roturier fermé par des portes. Les vicomtes de Calvignac sont attestés dès le XIIe siècle, en 1190 lors d'un acte de vente concernant des biens en Dordogne.Calvignac subit la croisade contre les Albigeois et les guerres de Religion.                                                                                                                                          GARRIGUE dit le mas de Sarah et Stéve,  propriétaire irlandais qui l'ont transformé en chambres d'hôtes.","architecture":"Calvignac, la position stratégique qu'occupe le château en fait une place âprement convoitée lors de la guerre de Cent ans. La structure de l'ancien castrum est toujours visible, avec son mur d'enceinte percé d'une porte fortifiée en arc brisé, ses tours et ses maisons médiévales à arcades gothiques..                                                                                                               Garrigue, au XVe siècle ferme fortifiée, puis tourné vers la chasse, le mas de Garrigue est aujourd'hui une belle demeure,  Majestueuses cheminées en pierre, beaux volumes, poutres imposantes de chêne blond, fenêtre du XVe, meurtrières, jolies souillardes composent un décor d'exception, sans oublier un très beau pigeonnier.","habitants":"Vicomtes de Calvignac \r\n        \r\n        \"","divers":"Château de Calvignac et de la Garrigue gravure 5-6 et 7.","gps":"","images":["../../jctruffet.com/image/image_46/46_Calvignac_1.jpg","../../jctruffet.com/image/image_46/46_Calvignac_2.jpg","../../jctruffet.com/image/image_46/46_Calvignac_3.jpg","../../jctruffet.com/image/image_46/46_Calvignac_4.jpg","../../jctruffet.com/image/image_46/46_Calvignac_5.jpg","../../jctruffet.com/image/image_46/46_Calvignac_6.jpg","../../jctruffet.com/image/image_46/46_Calvignac_7.jpg"]},"Consult_chateau_formulaire2f63":{"id":"Consult_chateau_formulaire2f63","dept":"46","canton":"Luzech","commune":"Luzech","nom":"Camy","type":"Château","periode":"XVI-XVIII","histoire":"CAMY, la demeure fut la propriété des Chapt de Rastignac. Cette famille originaire du Limousin avait hérité en Quercy des biens des barons de Luzech, en 1600, grâce au mariage de Jacquette de Ricard de Gourdon, veuve de Jean II de Luzech, avec Jean Chapt de Rastignac. Celui-ci, attaché au service de Louis XIII, puis de Louis XIV, évita au bourg de Luzech les aléas de la Fronde. En 1617, la terre de Rastignac fut érigée en marquisat, et Jean devint maréchal de camp. Dans une lettre à lui adressée, Louis XIII écrivit : Je vous ai toujours en la considération que vous méritez. Sur ce, je prie Dieu, monsieur le comte, de vous avoir en sa Sainte Garde.\" Ancienne Borie, c'est-à-dire, en Quercy, métairie, le château de Camy fut une résidence secondaire des Rastignac, où ils vécurent lors de leurs séjours à Luzech. En effet, le château ancestral des Barons était depuis longtemps complètement ruiné. Ils possédèrent Luzech jusqu'au milieu du XVIIIe siècle. Leur descendant, Alfred de la Rochefoucauld, dont la mère était née Zénaïde de Rastignac, vendra tous les biens de la famille, et cédera à la commune ce qui restait du château des Barons. Le château de Camy connaîtra ensuite différents propriétaires, puis sera divisé en deux demeures : l'aile gauche, et l'aile droite. Cette seconde est la plus importante et porte toujours le nom de château de Camy, qui fut racheté en 1965 par ses hôtes actuels.","architecture":"Le bâtiment, partiellement enterré dans le remblai de la route, est en équerre, recouvert d'ardoises noires, particularité de la région et reconnaissable à des kilomètres vu du ciel. Une tour carrée est accolée à l'angle Est. Le petit corps de logis situé à droite est chapeauté d'une toiture à la Mansart. Il conserve une belle fenêtre géminée ornée d'un chapiteau à palmettes. Sur l'autre corps de logis, on peut remarquer le vestige d'une fenêtre trilobée, ce qui indique la présence d'un bâtiment remontant au XIVe siècle, qui fut complètement remanié au XVIIIe siècle. Les armes des Chapt de Rastignac étaient d'azur au lion d'argent, armé, lampassé et couronné d'or, leur devise : In Domino Confido (Laissez dire).","habitants":"Famille de Chapt de Rastignac.\r\n        \r\n        \"","divers":"Château de Camy","gps":"","images":["../../jctruffet.com/image/image_46/46_Camy_1.jpg","../../jctruffet.com/image/image_46/46_Camy_2.jpg"]},"Consult_chateau_formulaire0cdc":{"id":"Consult_chateau_formulaire0cdc","dept":"46","canton":"Figeac","commune":"Capdenac","nom":"Capdenac_Lot","type":"Vestiges","periode":"XII","histoire":"CAPDENAC, durant la guerre de cent ans, Capdenac résista farouchement à lennemi anglais, au cours de plusieurs sièges. À la fin du XIVe siècle la famille d'Armagnac, se rendit propriétaire de la place, avant d'en être chassée par Louis XI, alors dauphin du royaume de France. Galiot de Genouillac, grand maître d'artillerie du royaume de France, en fut également le seigneur au cours du XVIe siècle. Les guerres de religions népargnèrent pas la petite cité, qui fut longtemps tenue par les protestants.\r\nSully vint s'y retirer après la mort d'Henri IV. Le seigneur de Capdenac Maximilien de Béthune, duc de Sully, plus connu sous le nom de Sully (1560 - 1641), ministre d'Henri IV, vécut 15 ans dans son château de Capdenac.                                                                                    A quelques kilomètres à l'Est à Cuzac le manoir de la Salamandre chambres d'hôtes.","architecture":"Capdenac la forteresse médiévale de Capdenac-le-Haut sétire le long dun rocher en forme de presqu'île, surplombant de plus de 110 mètres un méandre du Lot. Si le village reste marqué par son passé médiéval,  il figure en bonne place parmi les oppida du Quercy, prétendant au titre «dUxellodunum», siège de la dernière bataille gauloise menée par César. Le site de Capdenac, particulièrement propice à un habitat, a été occupé de très longue date. Au début de l'année 1972, les vestiges de deux civilisations séparées dans le temps y furent mis au jour : champs dUrnes du Bronze final III et Chasséen. Cest au Chasséen qu'est attribuée la statue de Capdenac aujourd'hui conservée au musée de Cahors Henri-Martin.                                                                                                 La Salamandre à  Cuzac, dans une demeure de charme, ancienne ferme bourgeoise du XVIIe au XIXe avec pigeonniers, une aile est consacrée aux chambres d'hôtes.","habitants":"Maximilien de Béthune,\r\n        \r\n        \"","divers":"Vestiges de Capdenac, manoir dit la Salamandre gravure 8 à Cuzac.","gps":"","images":["../../jctruffet.com/image/image_46/46_Capdenac_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_6.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_7.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_8.jpg","../../jctruffet.com/image/image_46/46_Capdenac_Lot_9.jpg"]},"Consult_chateau_formulaire095c":{"id":"Consult_chateau_formulaire095c","dept":"46","canton":"Lacapelle -Marival","commune":"Cardaillac","nom":"Cardaillac","type":"Tours","periode":"XIII","histoire":"CARDAILLAC-HORLOGE, la tour  dite aussi des Barons  est un des trois donjons construits au XIIIe siècle par les seigneurs de Cardaillac dans le fort qu'ils détenaient au Moyen-Age. Le fort médiéval, bâti par la puissante famille des Cardaillac, occupe un éperon rocheux bordé par les vallées creusées par les ruisseaux du Murat et du Drauzou. Le bourg fut le siège d'une baronnie dont une famille de vieille chevalerie avait pris le nom au XIIe siècle. Les Cardaillac formeront par la suite différentes branches qui toutes joueront un rôle dans l'histoire du Quercy. Pendant la guerre de cent ans le bourg et le château subissent l'occupation anglaise. Plus tard, des compagnies de routiers investissent la place et s'y installent jusqu'en 1484.                                                                      A quelques kilomètres à l'ouest le château de Piale chambres d'hôtes  d'Adeline et Bertrand Spindler.","architecture":"Cardaillac,  protégé par l'enceinte triangulaire du castrum, les anciennes demeures médiévales de Cardaillac sont aujourd'hui dominées par deux tours seigneuriales édifiées dans les premières années du  XIIIe siècle : la tour de Sagnes et la tour de lHorloge, de plan  quadrangulaire, la tour des Barons était composée de quatre niveaux dont deux étaient voûtés. L'appellation actuelle de ce donjon est due à la cloche de lhorloge municipale installée sur sa plate-forme avant la seconde guerre mondiale. Une troisième tour, dite de \"Marquèze\", complétait la défense du site sur sa pointe sud-est, avant dêtre détruite en 1816.  Implantée au coeur du fort, la tour de lHorloge est construite en blocs de grès siliceux dextraction locale, parfaitement équarris et assistés très régulièrement. La construction, de plan carré de 8,15 m de côté à la base, culmine à 25,40 m. Sa base en rez-de-chaussée est en maçonnerie pleine afin de  résister aux coups de bélier : on retrouve ce dispositif à la tour de Sagnes voisine, et à la tour des Cardaillac à Concots. la porte daccès dans la tour est placée au premier étage, soit ici à 3,20 m au-dessus du sol extérieur, nécessitant ainsi la pose dun escalier amovible, retiré en cas dassaut. Le caractère défensif de cette ouverture est renforcé par un dispositif à double porte tel quon le retrouve.                                                                                             Piale du XVIIIe siècle.","habitants":"Famille des Cardaillac\r\n        \r\n        \"","divers":"Les tours de Cardaillac et Piale à Fons dit de Salamandre","gps":"","images":["../../jctruffet.com/image/image_46/46_Cardaillac_1.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_2.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_3.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_4.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_5.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_6.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_7.jpg","../../jctruffet.com/image/image_46/46_Cardaillac_8.jpg"]},"Consult_chateau_formulaired6ed":{"id":"Consult_chateau_formulaired6ed","dept":"46","canton":"Biars-sur-Cère","commune":"Prudhomat","nom":"Castelnau_Bretenoux","type":"Forteresse","periode":"XIII","histoire":"CASTELNAU-BRETENOUX, en 1248, un baron de Castelnau. En 1280, le baron de Castelnau réussit à obtenir de rendre hommage au roi de France. Maffre III de Castelnau épouse en 1293 Alasie de Calmont d'Olt. Le roi Philippe IV le Bel confirme en 1308 l'acte de Philippe III au profit du baron de Castelnau. En 1315, Hugues III de Castelnau-Calmont (1294 - 1356) hérite des biens des Calmont d'Olt  En 1329, Pierre de Castelnau-Bretenoux, frère de Hugues III évêque de Rodez. En 1370, Bégon de Castelnau-Calmont, fils de Hugues III,  évêque de Cahors  En 1395, à la mort de Jean Ier de Castelnau-Calmont, les biens passent à son neveu, Pons Ier de Castelnau-Caylus (1419) fils d'Hélène de Castelnau et petit-fils d'Hugues III époux de Catherine de Roquefeuil (14 janvier 1396). Il rend hommage en 1396 au roi Charles VI. Lui succède Antoine de Castelnau-Caylus (1419-1465), nommé en 1442 lieutenant général du roi Charles VII en Quercy. En 1530, à la mort de Jean III de Castelnau-Caylus, conformément au testament de Jean II, les biens et titres passent à Pierre Guilhem de Clermont-Lodève (1537), descendant de Pons Ier de Castelnau-Caylus. Jeanne-Thérèse d'Albert de Luynes, baronne de Castelnau, hérite des possessions de la famille. Elle va vendre en 1720 les titres et les terres de Clermont-Lodève. La baronnie de Castelnau est léguée en 1756 au duc Charles d'Albert de Luynes. La baronnie restera dans la famille d'Albert de Luynes jusqu'à la Révolution. En 1830, le duc de Luynes vend la terre de Castelnau  à l'ancien avocat Jean-Baptiste Lacoste. Ces terres sont vendues en 1831 à un descendant de l'ancien fermier général, Antoine Molin de Teyssieu. Le château est vendu à Eugène Bacle de Saint-Loup qui le revend en 1853 à Dubousquet de Montanceaux. L'abbé Selves l'achète en 1873. Il est ensuite vendu aux enchères en 1880, à Gustave Deldon de Pradelle. En 1896, le château est vendu au chanteur de l'Opéra-Comique de Paris, Jean Mouliérat. malgré son importance ce château fait chambres d'hôtes","architecture":"Castelnau-Bretenoux  est une belle représentation du château fort médiéval. Il possède tout larsenal de défense pour tenir un siège : muraille, tours défensives, donjon, fossé , une faille naturelle lui permettant dêtre positionné à lextrémité dun plateau rocheux formant un éperon. Cette position idéale lui permet de contrôler les vallées où coulent pas moins de quatre rivières : la Bave, la Cère, affluents de la Dordogne et le Mamoul.  Lenceinte basse forme une haute muraille dune longueur de 250 mètres comprenant 6 tours semi-cylindriques et 3 bastions en éperon. Entrée de l'enceinte basse est accessible par une rampe, la seule entrée se situe au sud. Cette dernière se compose dune porte charretière surmontée par des mâchicoulis. Autrefois, une herse et un assommoir complétait cette pièce de défense, une enceinte triangulaire de 80 m de côté environ, renforcée par une fausse-braie.  Au nord-est de ce triangle se situe limposante tour militaire dite « Tour de lartillerie » dun diamètre de 14 mètres. Au nord-ouest, il y a également une tour ronde mais de taille moindre. Au Sud, 3 tours cohabitent, dont le donjon du XIIIe siècle culminant à 30 mètres.  Sur le front Est du château, un pont dormant enjambe un profond fossé et vous mène au châtelet corps de garde. Ce dernier est composée dune tour dentrée carré avec mâchicoulis et rainures de herse. Le châtelet est néanmoins fortement détérioré, car les tours rondes le précédent ont été partiellement arasées au XVIIe siècle et son pont-levis a été détruit à la fin du XVIIIe siècle.","habitants":"Famille de Castelnau-Bertenoux\r\n        \r\n        \"","divers":"Château de Castelnau-Bretenoux","gps":"","images":["../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_1.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_2.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_3.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_4.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_5.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_6.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_7.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_8.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Bretenoux_9.jpg"]},"Consult_chateau_formulaire52ff":{"id":"Consult_chateau_formulaire52ff","dept":"46","canton":"Castelnau-Montratier","commune":"Montratier","nom":"Castelnau_Montratier","type":"Château","periode":"XIV-XV","histoire":"A Castelnau-Montratier le château de la Boisse, d'Escayrac de Génibréde et de Rigal   et pour Castelnau-Montratier  pas d'information historique.                                                                 BOISSE, c'est  au Xe siècle que le fief de Boisse avait été donné  aux Lapérarède, aurait été reconstruit au XIVe siècle pour Arnaud de La Pérarède. Par le mariage en 1503 de Catherine de la Pérarède, La famille La Pérarède va occuper les lieux jusqu'en 1503 date à laquelle le mariage de Catherine de La Pérarède avec Antoine d'Eslacs. En 1566, leur héritier, François d'Eslacs, seigneur du Cayriech, est toujours possesseur de Boisse. En 1699, le fief appartient à Henri-Joseph, comte de Salignac-Fénelon. Celui-ci va vendre le domaine aux Gardarenc. Pendant la Révolution, le château appartient à un sieur Belair de Bonal, ancien régisseur des seigneurs de Castelnau.  Le château est pillé pendant la Révolution .\r\nESCAYRAC, le fief d'Escayrac ou de Saint-Aureil, est à l'origine du nom d'une famille de chevaliers dont trois membres participèrent à la croisade de 1249 ; en 1273, ce sont Bernard, Armand et Guiscard d'Escayrac. En 1504, noble Raymond d'Escayrac possède la \"maison\" d'Escayrac avec métairie et vignes. Vendue à la Révolution, la demeure est mise en métayage puis abandonnée, avant d'être démolie vers 1934 et reconstruite en remployant les matériaux                                                                                                                         GENIBREDE, cité en 1200 : au décès de Pons de Gourdon, ses fils Pons et Ratier se partagent l'héritage, mais Flaugnac, Castelnau et Ginibrède restent indivis entre eux. En 1258 les lieux seraient  un alleu appartenant aux comtes de Toulouse. Il passe ensuite aux Donazac, puis, par alliance, aux Saint-Géry, seigneur de La Ginibrède en 1451. La  maison noble de Génibrède, avec métairie et moulin, appartient en 1504 à Jacques de Saint-Géry. Au XVIe siècle la seigneurie passe aux Ginestet de Selves, dont ce sont peut-être les armes qui figurent sur une cheminée. Le dernier seigneur est Victor de Pommeirol-Ginac et, au XIXe siècle, la demeure est achetée par les Limayrac.\r\n RIGAL, le nom du lieu est celui d'une famille qui est en particulier connue, pour le Moyen-Age, pour avoir cédé aux consuls une maison qu'elle possédait dans le bourg de Castelnau-Montratier afin d'y loger les seigneurs de Roquefeuil, barons de Castelnau.  il aurait été détruit pendant la guerre de Cent ans.","architecture":"MONTRATIER, est appelé localement la Maison Vaysse. La construction du château de Castelnau-Montratier date du XIIIe siècle. Le château possède une façade du XIIIe siècle, construite en pierre et dans laquelle s'ouvrent 3 fenêtres géminées. Ses arcs en tiers point retombent sur un chapiteau sculpté. Boisse Sous réserve d'une étude de l'édifice, il semble que rien ne subsiste du repaire antérieur au XVe siècle. L'état le plus ancien date de la reconstruction de l'édifice au  XVIe siècle.                                                                                                                                  Le château de la Boisse aurait été reconstruit au XIVe siècle, on trouve les premières mentions en 1470 et 1480, Reconstruit au XlVe siècle certains éléments datent du XIIIe siècle, comme la large fenêtre murée au premier étage du corps de logis carré situé à gauche de la cour. Une porte, obturée elle aussi, située à la base de la plus petite tour, est décorée par un tronc écoté, caractéristique des ornemanistes quercynois au début du XVIe siècle.                                                                                                La Bouréde, le domaine, à vocation agricole, aurait été une dépendance du château voisin de Bateng, propriété des Lamothe puis des Belleud de Saint-Jean. Les deux tours pourraient appartenir à un premier état du XVIIe siècle alors que le corps principal semble avoir été  reconstruit à la fin du XVIIIe siècle ou au début du XIXe siècle.                                                                                                                                     Génibréde, les parties anciennes qui subsistent peuvent dater de la fin du XIIIe siècle. Le corps de bâtiment sud a été  transformé, et peut-être en partie rebâti, au XIXe siècle.  La porte principale se trouve à l'est, il y a une salle basse à l'ouest et une autre au midi, et deux salles hautes et une grosse tour.                                                                                                                RIGAL l'édifice actuel, très remanié aux XIXe siècle, comporte un corps de logis du XVIIe siècle. Un bâtiment conserve cependant des bases datables du XIVe siècle.","habitants":"Famille La Pérarède                                                                       Famille de Guiscard d'Escayrac                                                        Famille de Jacques de Saint-Géry                                                    Famille de Rigal\r\n        \r\n        \r\n        \"","divers":"Château de Montratier gravure 1, de la Boisse gravure 2, de la Ginibréde gravure 3, de Rigal gravure 4, de la Bouréde gravure 5.","gps":"","images":["../../jctruffet.com/image/image_46/46_Castelnau_Montratier_1.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Montratier_2.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Montratier_3.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Montratier_4.jpg","../../jctruffet.com/image/image_46/46_Castelnau_Montratier_5.jpg"]},"Consult_chateau_formulaire5e10":{"id":"Consult_chateau_formulaire5e10","dept":"46","canton":"Martel","commune":"Cavagnac","nom":"Cavagnac","type":"Château","periode":"XIII-XIV","histoire":"CAVAGNAC, la seigneurie est tenue par les Robert de Cavagnac  au XIIe siècle. En 1365, Bertrand, seigneur de Cavagnac, est le lieutenant du vicomte de Turenne Guillaume Roger de Beaufort. À la fin du XIVe siècle la famille de Guiscard, originaire de Gagnac, hérite du château par le mariage de Bertrand de Guiscard avec Y. de Cavagnac.  Antoine de Guiscard est seigneur de Cavagnac en 1455. Lui succède son neveu, Antoine de Guiscard, seigneur de Cornac,  en 1504. La seigneurie de Cavagnac devient une baronnie au XVIIe siècle. Pour finir le château est saisi et vendu comme  Bien National. Les Guiscard séteignent en 1790 avec le décès de Jean Pierre de Guiscard, baron de Thédirac, seigneur de Cavagnac et autres lieux époux de Paule Augustine de Plas, issue de la noble maison des Plas de Curemonte. Les liens entre les deux familles ne sarrêtent pas là puisque Marie Madeleine de Guiscard, la sur de Jean-Pierre de Guiscard, avait épousé le marquis de Plas de Curemonte. Cest un descendant de la famille des Plas, branche des comte Desplaces qui est aujourdhui propriétaire du château de Cavagnac. Gustave, comte Desplaces, (1820-1869) issue de la famille des Plas, branche du Quercy. Son père le comte Claude Desplaces ayant été secrétaire du baron dHaussez, ministre de Charles X.  Gustave Desplaces est lun des principaux artisans du développement des chemins de fer en France dans la première moitié du XIXe siècle. En 1852 il construit le pont de Tarascon qui enjambe encore aujourdhui le Rhône, reliant ainsi la Provence au Languedoc. On lui doit aussi notamment la gare Saint-Charles à Marseille et les docks de la Joliette, le chantier le plus cher du second Empire. Décoré de la légion dhonneur à lâge de 30 ans par Napoléon III il épouse Alice Dumalle de Colonjon, fille de Reine de Montgolfier et nièce de Marc Seguin, linventeur de la chaudière tubulaire, qui lui donne deux fils dont  un écrivain le comte Henri Desplaces (1869-1922), grand-oncle de lactuel propriétaire de Cavagnac. aujourd'hui propriété de M. Ph. Viguié Desplaces.","architecture":"Le château de Cavagnac est construit sur le site dune ancienne villa romaine, le bourg  de Cavagnac est un cas remarquable de castrum, aujourd'hui, à l'exception évidemment des données topographiques,  Mais il reste le château à l'extrémité de l'éperon. Avec sa tour du Xllle siècle, séparée du logis seigneurial, l'enceinte murée qui cerne le parterre. Sur cet éperon dominant la Tourmente on distingue, au sud et au sommet de la butte, l'hospitium est une demeure seigneuriale et ses vestiges, ainsi que la grosse tour carrée du XIVe siècle, l'aile Est-Ouest avec les transformations subies du XVIe au XIXe siècle. La grande aile au classicisme sévère, avec façade au midi, est articulée au bâtiment précédent vers 1750. Au nord, l'enclos est occupé par diverses dépendances,  subsiste le donjon dont on voit encore les restes de mâchicoulis et une haute tour dite « Romane » ou « Sarrasine ».  Le château féodal laisse la place au XVIe siècle à un nouveau château, flanqué dun monumental corps de logis au milieu du XVIIIe siècle dont la façade est remarquable de sobriété. Le château reprend les plans de larchitecture dune belle demeure parisienne et témoigne du gout et de la puissance des Guiscard.  La Tour-Maîtresse qui est conservée date du XIIIe siècle, ainsi peut-être que les vestiges d'un logis primitif reconstruit ou réaménagé aux XVe et XVIIe siècles. Caractérisé par ses fenêtres chanfreinées à appuis épais et ses canonnières pour arme de faible calibre percées pour certaines d'entre elles dans les allèges, le pavillon bastionné, pentagonal, qui prolonge l'aile orientale, en dépit de son allure médiévale, ne date apparemment que de l'extrême fin du XVIe siècle ou des premières décennies du siècle suivant.","habitants":"Gustave Desplaces \r\n        \r\n        \"","divers":"Château de Cavagnac et sa tour.","gps":"","images":["../../jctruffet.com/image/image_46/46_Cavagnac_1.jpg","../../jctruffet.com/image/image_46/46_Cavagnac_2.jpg","../../jctruffet.com/image/image_46/46_Cavagnac_3.jpg","../../jctruffet.com/image/image_46/46_Cavagnac_4.jpg","../../jctruffet.com/image/image_46/46_Cavagnac_5.jpg","../../jctruffet.com/image/image_46/46_Cavagnac_6.jpg"]},"Consult_chateau_formulaire99fe":{"id":"Consult_chateau_formulaire99fe","dept":"46","canton":"Gourdon","commune":"Cazals","nom":"Cazals_Lot","type":"Maison-forte","periode":"XV","histoire":"CAZALS, fondé par la puissante famille des seigneurs de Gourdon, est mentionné pour la première fois en 1196. En 1544, Pons de Salviac de Vielcastel se marie avec Françoise de Valon, une riche héritière qui permet d'améliorer le château. À partir du milieu du XVIe siècle, la communauté protestante va augmenter et va exacerber les conflits religieux et entraîner de nouvelles destructions. Les Vielcastel sont restés catholiques et fidèles au roi de France. Au  XVIIe siècle, les Vielcastel sont les principaux seigneurs du castrum où ils possèdent le château et plusieurs maisons. Le 2 janvier 1616, Henri de Bourbon, prince de Condé, donna à Jean de Salviac de Vielcastel, marié à Anne de Maleville, fils de Donnat Ier de Salviac de Vielcastel. Le mariage de Donnat II de Salviac de Vielcastel, fils de Jean de Salviac de Vielcastel, baron de Verdun, avec Béraude Chaunac de Lanzac, en 1627, va apporter une dot. Charles de Salviac, baron de Vielcastel, né en 1766, page du roi en 1781 jusqu'en 1784. Il émigre avec quatre de ses frères en 1791 et participe à la campagne de 1792 dans l'armée des Princes. Il est de retour en France en 1793, arrêté, il est finalement libéré. Il n'est plus propriétaire du château de Cazals depuis 1794 qu'il a vendu à un notaire. Il a été chambellan de l'impératrice Joséphine. En 1814, il a été nommé colonel de la garde nationale de Versailles puis colonel chef d'état-major jusqu'en 1818. Il s'est rendu à Fontainebleau pour saluer Napoléon avant son départ en exil. \r\nLe château a connu ensuite différents propriétaires. Il a été racheté en 1972 par des propriétaires qui le restaurent. En 2008 le castrum a été racheté par un couple hollandais, Renée et Guillaume Oosterhof qui ont le projet de le mettre en valeur.","architecture":"Cazals,  actuellement, le château se compose d'un logis en équerre dont les ailes se soudent sur un pavillon carré. Tout autour, une enceinte vaguement bastionnée, comprend une fausse braie et plusieurs niveaux de terrasses. Une partie importante de ces murs a été restaurée au XIXe siècle, mais certains tronçons remontent au XVIe  siècle.  D'importants vestiges du castrum médiéval existent encore : les vestiges de l'ancienne « maison de Guerre », du nom de ses possesseurs, à la base de l'actuel pavillon du château,  une seconde construction quadrangulaire dite « tour de La Roque » ou de Ruppe dans l'angle ouest de l'enceinte,  un troisième bâtiment quadrangulaire, peut-être la « tour de La Marca » était implantée à l'opposé, à l'angle est de l'enceinte. D'autres « ostals » étaient implantés dans le fort. Une tour appartenant aux Gourdon était également implantée dans le fort, à proximité de la chapelle Saint-Martin.","habitants":"Famille de Jean de Salviac de Vielcastel,\r\n        \r\n        \"","divers":"Château de Cazals","gps":"","images":["../../jctruffet.com/image/image_46/46_Cazals_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Cazals_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Cazals_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Cazals_Lot_4.jpg"]},"Consult_chateau_formulaire4df0":{"id":"Consult_chateau_formulaire4df0","dept":"46","canton":"Luzech","commune":"Luzech","nom":"Caïx","type":"Château","periode":"XIV","histoire":"CAIX, est aujourdhui une demeure royale et une propriété viti-vinicole produisant du cahors. Au XIVe siècle, le château constitue déjà une place-forte pour contrôler la navigation sur le Lot. Au XVe siècle, la propriété appartient à la famille de Couderc, notaires de Luzech.  Au XVIe siècle, les seigneurs de Caïx sont issus de la maison de Courtois.  En 1640, par son mariage avec Hélène de Courtois, le président de la Cour des aides de Cahors, Géraud Lefranc, devient seigneur de Caïx.  Ainsi en fut-il de Jean-Jacques Lefranc de Pompignan, né à Montauban le 10 août 1709, arrière-petit-fils de Géraud. Il tient de nom de Pompignan de la propriété qu'il détient en Tarn-et-Garonne où il fit édifier un château. Élève au collège Louis-le-Grand, à Paris, il eut pour maître Porée, l'éducateur de Voltaire.  Il mourut à Montauban en 1784.  Son frère plus jeune, Jean-Georges Lefranc de Pompignan, fut archevêque de Vienne, en Dauphiné. Député du clergé aux États généraux de 1789, Jean-Georges se joignit au tiers état, fut ministre de Louis XVI, puis président de l'Assemblée Nationale de Versailles. Durant son épiscopat, il eut maille à partir avec les « philosophes », notamment Voltaire. Ainsi publia-t-il un mandement contre l'édition projetée de ses uvres. En 1747, il avait prononcé l'oraison funèbre de la Dauphine et, en 1768, celle de la reine Marie Leczinska. Il aimait sa propriété de Caïx, qu'il appelait \"Caïanus meus\", et se faisait appeler \"Lefranc de Caïx\". Sa terre de Pompignan (Tarn-et-Garonne) fut élevée en marquisat par Louis XV. Il mourut à Paris, sur la paroisse de Saint-Sulpice, le 29 décembre 1790 à l'âge de 75 ans.  En 1975, le château devient la propriété de la reine Margrethe II de Danemark, et de son époux le prince Henri de Danemark, dont les attaches familiales sont dans le Lot, le prince Henrik de Danemark (né Henri de Laborde de Monpezat).","architecture":"Caïx de construction rectangulaire, est flanquée de quatre tours rondes, une à chaque extrémité, et d'une tour carrée, au centre de l'édifice, formant le côté sud. Deux façades principales du midi et de l'est. Devant la façade du midi, une belle terrasse et un beau jardin. Quelques mètres plus loin, sur le flanc de la montagne et surplombant à une grande hauteur la rivière du Lot, se trouve un élégant belvédère, orné de sept colonnes rondes, d'ordre dorique. De là on a une vue superbe, en face de Parnac, sur la vaste plaine qui s'étend au loin. C'est en vue de ce panorama grandiose que Lefranc allait chercher l'inspiration et composa sa « Didon » et ses uvres poétiques. » Ce château fut la demeure favorite des Lefranc au XVIe siècle.","habitants":"la reine Margrethe II de Danemark,\r\n        \r\n        \r\n        \"","divers":"Château de Caïx à Luzech.","gps":"","images":["../../jctruffet.com/image/image_46/46_Caix_1.jpg","../../jctruffet.com/image/image_46/46_Caix_2.jpg","../../jctruffet.com/image/image_46/46_Caix_3.jpg","../../jctruffet.com/image/image_46/46_Caix_4.jpg","../../jctruffet.com/image/image_46/46_Caix_5.jpg"]},"Consult_chateau_formulairee91e":{"id":"Consult_chateau_formulairee91e","dept":"46","canton":"Luzech","commune":"Montcup","nom":"Charry","type":"Château","periode":"XV","histoire":"CHARRY, construit par la famille Charry qui est une famille de marchands de Montcuq. Un membre de cette famille est consul de Montcuq en 1336. Ils vont accéder à la noblesse au milieu du XVe siècle. Pons de Charry, marié à Jeanne de La Dugie, est qualifié de donzel vers 1460. Augier de Charry, son fils, marié à Fine del Castanhier d'Aucastels, est capitaine de Montcuq et de Lauzerte. Il habitte dans le repaire de Malmon-le-Petit qui est déjà appelé Charry en 1519. Il a fondé une dynastie essentiellement militaire qui, après atteint son apogée au XVIe siècle, va décliner jusqu'à connaître la misère au XVIIIe siècle. Le plus célèbre des membres de cette famille est Laurent de Charry (1530-1563) qui a eu une conduite héroïque pendant les guerres d'Italie qui lui vaut d'être surnommé par Montluc, de  second Bayard. Catherine de Médicis lui a confié l'organisation de la garde royale chargée de la protection du roi Charles IX.  Il a été assassiné en 1563, sur le pont Saint-Michel, à Paris, sur l'instigation  d'Andelot, frère de Gaspard de Coligny par M. du Châtelier-Potaut. Catherine de Médicis l'a fait inhumé dans le chur de Notre-Dame de Paris. Sa nièce, Peyrone de Charry, a épousé Jean de Vezins, sénéchal de Quercy. La famille Charry a conservé la seigneurie jusqu'à la Révolution. Le château est ensuite passé aux Lavaur de Charry, et  ensuite acquis en 1984 par le colonel Bonnafous de Caminel qui a commencé la restauration du château qui avait été mal entretenu. L'édifice est inscrit au titre des monuments historiques le 6 octobre 1976. L'écrivain anglais David Garnet était locataire d'une partie de la propriété et y  mourut en 1981.","architecture":"Le premier château de Charry a été construit dans la seconde moitié du XVe siècle avec un donjon flanqué de deux tours polygonales. Il est protégé par une enceinte dont il subsiste la troisième tour ronde et la barbacane. Lédifice, agrandi sur larrière, était protégé par une enceinte englobant  deux tours rondes défensives. Lune, convertie au XVIIe siècle, en chapelle est ornée dun décor peint semé détoiles et de flammèches ; lautre fut raccordée au logis par un corps de galerie.\r\nCes aménagements, réalisés au cours des XVIIe et XVIIIe siècles par les de Vezins, successeurs des Charry, furent étendus au logis comme lindiquent, les croisées à meneau lisse ainsi que lextension bâtie au Nord. Le château a été modifié au XVIIIe siècle par l'ajout de deux corps de logis. Mal entretenu, le château est parvenu au XXe siècle à l'état de ruines ; sa restauration a débuté en 1984.","habitants":"Famille Charry \r\n        \r\n        \"","divers":"Château de Charry","gps":"","images":["../../jctruffet.com/image/image_46/46_Charry_1.jpg","../../jctruffet.com/image/image_46/46_Charry_2.jpg","../../jctruffet.com/image/image_46/46_Charry_3.jpg","../../jctruffet.com/image/image_46/46_Charry_4.jpg","../../jctruffet.com/image/image_46/46_Charry_5.jpg"]},"Consult_chateau_formulaire7df7":{"id":"Consult_chateau_formulaire7df7","dept":"46","canton":"Martel","commune":"Cressensac","nom":"Chaussenège","type":"Château","periode":"XIII-XIV","histoire":"CHAUSSENEGE,  premiers seigneurs de Tersac, les vicomtes de Turenne en conservent la justice jusqu'en 1738. La seigneurie est tenue par les Faydit, une famille originaire du Limousin, au XIIIe siècle ; ils la partagent un temps avec les Réveillon puis redeviendront les seuls seigneurs de Tersac à partir de 1460 . Alors que le château est pris par les Anglais en 1357, les Faydit se réfugient à Cressensac. En 1504, nobles Louis et Guillaume de Tersac, seigneurs de Tersac et co-seigneurs de Saint-Michel-de-Bannières, dénombrent pour Tersac avec maisons, jardins et trois métairies. Les Castres succèdent aux Faydit en 1748 ; mis sous séquestre pendant la Révolution, le château passe par alliance, en 1830, aux Quercy qui le conservent jusqu'en 1918.","architecture":"Incendié en 1897 le château de Chaussenège fut entièrement  restauré dans un style de la première Renaissance. Seul le donjon du XIIIe siècle échappa à l'incendie.  C'est cependant une jolie demeure quelque peu abandonné dans son grand domaine. Les bâtiments se distribuent autour d'une cour d'honneur ouverte sur l'extérieur par deux grandes arcades en tiers-point caractéristique de ces pastiches du XIXe siècle qu'on à baptisés gothiques troubadour. Le donjon rectangulaire à conservé sa rudesse militaire, il est seulement  percé par des baies géminées dont les colonnettes ont été refaites. Une tour ronde flanque le bâtiment opposé  au donjon de l'autre côté de l'entrée. Des échauguettes neuves se dressent sur les angles des corps de logis, mais peut-être ont-elles remplacé des organes anciens car un culot authentique permet de supposer qu'il y eut des modèles. Les fenêtres conservées permettent de proposer la date du logis initial au début du XIVe siècle. La tour d'escalier date du XVIe siècle ; elle était accolée à une tour ronde qui s'est effondrée au XXe siècle. Le logis a été doublé vers l'est à l'époque moderne.","habitants":"Famille de Tersac\r\n        \r\n        \r\n        \"","divers":"Château de Chaussenège","gps":"","images":["../../jctruffet.com/image/image_46/46_Chaussenege_1.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_2.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_3.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_4.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_5.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_6.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_7.jpg","../../jctruffet.com/image/image_46/46_Chaussenege_8.jpg"]},"Consult_chateau_formulaire33e9":{"id":"Consult_chateau_formulaire33e9","dept":"46","canton":"Cahors-3","commune":"Cieurac","nom":"Cieurac","type":"Château","periode":"XIII-XV","histoire":"CIEURAC, la seigneurie appartenait au Moyen-Age à la maison d'Hauteferres qui construisirent le château au XVe siècle.  En 1372, ils confièrent à Bertrand de Cardaillac d'en assurer la garde. En 1469, Jean de Cardaillac hommage pour la baronnie de Cardaillac et plusieurs châteaux dont Cieurac. De même que ceux de Saint-Cirq-Lapopie, Biars et Concots, le château de Cieurac aurait été démoli sur ordre de Louis XI pour punir Raymond de Cardaillac d'avoir pris le parti du duc de Berry ; en 1590, Charles VIII le nomme sénéchal de Quercy et Raymond de Cardaillac aurait alors choisi d'établir sa résidence à Cieurac. Son fils Jacques de Cardaillac, sénéchal du Quercy, la construction du nouveau logis, que ses formes situent vers 1500, devrait être attribuée à Jacques de Cardaillac et son épouse Jeanne de Peyre, dont les armes figurent en différents endroits.  dénombre pour Cieurac, entre autres lieux, en 1504 ;  et il obtient du roi, en 1512, en raison des services rendus par son père Raymond, de vêtir le lion de son écu d'une cotte d'armes d'azur semé de fleurs de lys. Leur héritier Antoine-Hector, seigneur de Saint-Cirq-Lapopie, de Peyre et de Cieurac, épouse en 1540 Marguerite de Caumont ; converti au protestantisme, il meurt vers 1567. Le château aurait été arasé au niveau du premier étage sur ordre de Richelieu. Cieurac est possédé par les Cardaillac jusqu'en 1629, date à laquelle Jacques Dayrac en hérite, puis passe par alliance aux Godailh qui le conservent jusqu'à la Révolution. Le château est pillé en 1790  puis vendu comme bien national en 1794 au citoyen Caminel ; en 1850, le contrôleur des contributions y remarque encore  la place des fossés et des ponts-levis, des restes de créneaux, des croisées fort belles, des cheminées, en regrettant que le propriétaire ait mutilé l'édifice en lui enlevant sa toiture pour la remplacer par un toit de maison bourgeoise. Incendié par la division Das Reich en 1944, le château a fait l'objet d'une reconstruction très fidèle dans les années 1970.","architecture":"Cieurac, le logis est un rectangle prolongé sur le côté par un bâtiment qui forme un décrochement est  conserve à son extrémité nord le vestige d'un corps de bâtiment du  XIIIe ou du XIVe siècle. les harmonieuses  façades sont percées de grandes fenêtres à double croisillon de pierre. A l'opposé, les arrachements laissés par la destruction de deux salles superposées montrent un buste de femme, sculpté sur un culot, qui permettrait de dater le bâtiment disparu de la fin du XIIIe siècle ou du début du XIVe siècle.  Le début du chantier pourrait se situer vers 1503, avec un arrêt après 1512, puisque le lion des Cardaillac porte la cotte d'armes sur le blason placé au-dessus de la fenêtre haute de la travée de l'escalier, sur l'élévation Est, le décor montre cependant d'apparentes incohérences,  les armes des Peyre, des Caumont et des Cardaillac sont placées sur des cuirs découpés, motif qui se diffuse dans les années 1540 ; ceux-ci sont associés, sur des clefs rapportées, à des couronnes décoratives dont les motifs appartiennent au vocabulaire de la Renaissance, tout à fait absent du reste du décor architectural qui reste fidèle aux formes gothiques.","habitants":"Famille de Raymond de Cardaillac\r\n        \r\n        \r\n        \"","divers":"Château de Cieurac","gps":"","images":["../../jctruffet.com/image/image_46/46_Cieurac_1.jpg","../../jctruffet.com/image/image_46/46_Cieurac_2.jpg","../../jctruffet.com/image/image_46/46_Cieurac_3.jpg","../../jctruffet.com/image/image_46/46_Cieurac_4.jpg","../../jctruffet.com/image/image_46/46_Cieurac_5.jpg","../../jctruffet.com/image/image_46/46_Cieurac_6.jpg","../../jctruffet.com/image/image_46/46_Cieurac_7.jpg","../../jctruffet.com/image/image_46/46_Cieurac_8.jpg"]},"Consult_chateau_formulaireb4e0":{"id":"Consult_chateau_formulaireb4e0","dept":"46","canton":"Espère","commune":"Concorès-Linars","nom":"Clermont_Lot","type":"Château","periode":"XIII-XVI","histoire":"CLERMONT, au XIIIe siècle le fief appartient à une famille de chevaliers, les Gavis. Il en rende hommage aux guerres de Mechmont. Le fief rentre dans les possessions de la famille de Touchebuf lors du mariage, en 1449, de l'héritière du château, Marquèse de Gavis, avec Jean Touchebuf, procureur du roi. Ils sont à l'origine de la branche des Touchebuf-Clermont. Le château des Gavis est sorti ruiné de la guerre de Cent Ans. Les Touchebuf-Clermont vont entreprendre de le relever au XVIe siècle. En 1642, la seigneurie et baronnie de Clermont est érigée en comté en faveur de messire Antoine de Touchebuf. Après la mort de Jacques-Victor de Touchebuf, comte de Clermont, en 1689, sa fille Anne de Touchebuf, mariée en 1670 à Armand II de Durfort, comte de Boissières, lui transmis la seigneurie de Clermont. Un procès a été fait par son cousin François de Touchebuf, seigneur de Monsec, pour la substitution des biens de la seigneurie. Par un accord passé en 1699, Anne de Touchebuf céda la seigneurie de Besse avec la justice à son cousin et conserva le château de Clermont. Le seigneur du lieu ayant émigré pendant la Révolution, en 1791, le château est mis sous séquestre. Laissé à la garde du régisseur, celui-ci, après s'être approprié les biens qui s'y trouvaient, en a brûlé les archives. Le château est ensuite vendu comme bien national et partagé entre plusieurs acquéreurs qui finissent de le piller et de le transformer en carrière de pierres. Le château est acheté en 1930 par Jeanne Palluel qui s'est employée à le restaurer après l'avoir fait classer au titre des monuments historiques. Depuis 2001, monsieur et madame Lust ont entrepris des travaux à l'extérieur et à l'intérieur pour restaurer le corps de logis principal, les anciennes écuries, la chapelle, les murs d'enceinte et les salles voûtées du XIIIe siècle.","architecture":"Le château est constitué de trois corps de logis ordonnés autour dune cour dhonneur fermée au nord-est par une courtine dans laquelle était placée lentrée. Celle-ci était défendue par un pont-levis franchissant un fossé sec, et par deux grosses tours circulaires avec canonnières. Une enceinte extérieure, aujourdhui détruite. Il ne subsiste de laile nord-ouest que le soubassement dans lequel se  succèdent des salles voûtées et un four à pain.  Laile sud-ouest, reconstruite au XVIe siècle sur les vestiges dun corps de logis du XIIIe siècle, constituait le corps de logis principal réservé à la salle de justice et aux appartements. Ses différents niveaux sont desservis, non pas comme dans les anciennes forteresses par un escalier à vis mais, comme dans les châteaux de Montal et dAssier, par un escalier à rampes droites dont les voûtes sont ornées de motifs décoratifs de la Renaissance Française. La façade arrière et la façade sur cour étaient percées de fenêtres à croisées détruites sous la Terreur. Les deux tours circulaires qui encadrent ce bâtiment englobent à la base les vestiges des tours du XIIIe siècle, dont les salles basses voûtées ont été complétées de canonnières. Les étages supérieurs étaient ouverts par des croisées à traverses moulurées, et munis de cheminées en pierre et de latrines. Abandonné à partir de la Révolution, le château fut pillé, détruit par ses différents propriétaires pour être réduit en une immense carrière de matériaux. La chapelle a été classée au titre des monuments historiques le 3 août 1932 et le reste du château a été inscrit au titre des monuments historiques le 7 novembre 1932.","habitants":"Famille de Touchebuf-Clermont\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Clermont à Concorès-Linars","gps":"","images":["../../jctruffet.com/image/image_46/46_Clermont_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Clermont_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Clermont_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Clermont_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Clermont_Lot_5.jpg"]},"Consult_chateau_formulaire4386":{"id":"Consult_chateau_formulaire4386","dept":"46","canton":"Castelnau-Montratier","commune":"Varaire","nom":"Couanac","type":"Château","periode":"XIII-XVI","histoire":"COUANAC, le domaine de Couanac appartenait au XIIIe siècle au chevalier Bertrand de Lapopie , cette famille conserva le fief jusquau XVe siècle, avant quil ne revienne par le jeu des alliances aux Hébrard de Saint-Sulpice. En 1482, le lieu de Couanac avec toutes juridictions appartient au seigneur de Saint-Sulpice, Raymond Hébrard débuta la reconstruction du château à Couanac dans les premières années du XVIe siècle. Mais cest sans doute à Jean Hébrard, son fils, ambassadeur du roi de France et membre du conseil privé de Catherine de Médicis, gouverneur et surintendant de la personne et des biens du duc dAlençon quatrième fils de la reine, que revient linitiative den achever la construction aux alentours de 1550-1580. La carrière fulgurante de Jean Hébrard à la cour de France lobligea à vivre loin de ses terres, comme son épouse Claude de Biron, dame dhonneur de Catherine de Médicis. En 1573, alors que son château était pris par une compagnie darquebusiers menée par le capitaine protestant Bayer,  deux des fils de Jean, voués au service de larmée royale, moururent tôt, lun au siège de La Rochelle, lautre assassiné au château de Blois. Un autre fils, Antoine, fut nommé évêque de Cahors en 1576 à lâge de 18 ans. Bertrand, le benjamin, qui hérita de Couanac, trouva la mort à la bataille de Coutras en 1587. Bertrand Hébrard, sans descendance, laissa le domaine aux Crussols dUzès, auquel il était apparenté par alliances. Ces derniers se désintéressèrent de Couanac, comme du château dAssier quils possédaient alors. En 1771, les seigneuries de Bach et de Couanac furent vendues à Antoine-Joseph-François Deslacs, marquis dArcambal.  Couanac fut très rapidement revendu et, en 1787, passa à Gaspard Goreau de Gorenflot, puis à la  famille Héliot et, enfin, aux dArmagnac de Castanet qui le possèdent toujours.","architecture":"Le château de Couanac fut construit au XVIe siècle,  sur lemplacement dun château antérieur, en intégrant une partie dune ancienne église romane dédiée à saint Georges. Lédifice de style Renaissance, qui sorganise autour dune vaste basse cour, se compose de trois corps de bâtiment aux travées de fenêtres croisées à meneaux surmontées de lucarnes sculptées.  La demeure, dominée par une haute tour de pierre et deux larges tours circulaires, sinscrit dans un quadrilatère ouvert côté Est sur une grande cour autour de laquelle sarticulent trois ailes construites au XVIe siècle. On trouve à lOuest, où se situe le portail dentrée principal de la cour du château, la chapelle qui nest autre que le transept dune ancienne église paroissiale du XIIe siècle dédiée à saint Georges. A la croisée du transept sont conservés quatre chapiteaux sculptés aux volutes sommaires disposées aux angles des corbeilles.  Jean,  poursuivit sans doute luvre de son père de 1550 à 1580 : on lui doit notamment les croisées et les remarquables lucarnes Renaissance qui coiffent deux des ailes dhabitation.","habitants":"Famille de Raymond Hébrard\r\n        \r\n        \"","divers":"Château de Couanac","gps":"","images":["../../jctruffet.com/image/image_46/46_Couanac_1.jpg","../../jctruffet.com/image/image_46/46_Couanac_2.jpg","../../jctruffet.com/image/image_46/46_Couanac_3.jpg","../../jctruffet.com/image/image_46/46_Couanac_4.jpg","../../jctruffet.com/image/image_46/46_Couanac_5.jpg","../../jctruffet.com/image/image_46/46_Couanac_6.jpg","../../jctruffet.com/image/image_46/46_Couanac_7.jpg"]},"Consult_chateau_formulairead5d":{"id":"Consult_chateau_formulairead5d","dept":"46","canton":"Luzech","commune":"Bélaye","nom":"Cousserans","type":"Château-fort","periode":"XV-XVI","histoire":"COUSSERANS, il faisait alors partie du domaine de la châtellenie épiscopale de Bélaye. Les chevaliers devant assurer la garde de Bélaye, les milites castri, possédaient une maison au siège de la châtellenie et des maisons-fortes ou repaires sur des terres qui leur étaient attribuées. Pour Jean Lartigaut, il est probable que les Grézels, chevaliers de Bélaye, auxquels la terre appartenait y aient construit une maison forte à la fin du XIIIe siècle. Une fille de la famille de Grézels se marie vers 1389 avec Raymond-Arnaud del Castanhié, seigneur de Hautcastel. Après la fin de la guerre de Cent Ans, en 1472, pour des problèmes financiers, le seigneur de Hautcastel vend à Pons Del Bosc, issu d'une riche famille de marchands de Montcuq, chanoine de la cathédrale de Cahors, « une tour ruinée dite de Cousserans » avec des dépendances. En 1479, la vente devient définitive. Le nouveau propriétaire a mis à bas l'ancien repaire et entrepris de construire le château entre ces deux dates. La construction du nouveau château est achevée avant 1504, quand Antoine Delbosc, seigneur de Cousserans, dénombre au roi et qu'il y habite. Par la suite le château va appartenir à différentes familles : les Del Sorbié, les Durfort, vers 1635, puis, en 1695 les du Mas de Paysac par alliance, et les Gard de Cahors qui achètent Cousserans en 1732. Le nouveau propriétaire est conseiller du roi, son avocat et procureur au sénéchal et présidial de Cahors. Au  XIXe siècle, le château devient la propriété de la famille Lacoste de Fontenilles par alliance. Puis rapidement le château a appartenu aux Roussy. Le dernier descendant est le  baron de Roussy. Le château a fait l'objet d'importants travaux de restauration en 1878 pour augmenter le confort intérieur. En 1955, le château est acheté par M. et Mme Déjean, puis en 1980, par Francesca et Georges Mougin. Le château de Cousserans est inscrit au titre des monuments historiques le 16 mai 1974. Aujourd'hui chambres d'hôtes","architecture":"Le château reprend le plan des châteaux d'Auvergne. Un corps principal de cinq niveaux, rectangulaire de 20 m par 10 m, arrondi aux angles, avec un couronnement de mâchicoulis. Il est flanqué au centre de la façade nord, d'une tour escalier engagée, et, au sud, d'une aile courte de trois niveaux. Sur deux étages du corps principal, de grandes salles avec des plafonds à la française. Sur l'aile sud, la salle voûtée d'ogives est parfois assimilée à une chapelle ou un cabinet.","habitants":"Famille d'Antoine Delbosc\r\n        \r\n        \"","divers":"Château de Cousserans","gps":"","images":["../../jctruffet.com/image/image_46/46_Cousserans_1.jpg","../../jctruffet.com/image/image_46/46_Cousserans_2.jpg","../../jctruffet.com/image/image_46/46_Cousserans_3.jpg","../../jctruffet.com/image/image_46/46_Cousserans_4.jpg","../../jctruffet.com/image/image_46/46_Cousserans_5.jpg"]},"Consult_chateau_formulaire3c88":{"id":"Consult_chateau_formulaire3c88","dept":"46","canton":"Espère","commune":"Montgesty","nom":"Crabrillé","type":"Château","periode":"XVIII","histoire":"CRABRILLE, le château a été construit dans un ancien domaine agricole habité au XVIIIe siècle par les Bonafous, famille bourgeoise. Avec le mariage en 1784 de Jean Bonafous (1757-1822), laboureur à Montgesty, avec Antoinette Murat (1759-1829), sur de Joachim Murat, cette famille est alliée à la famille Murat. Jean Bonafous a alors été nommé aide de camp de Murat, puis colonel avant de devenir le chevalier de l'Empire Jean Bonafous de Cavilliès.  À partir de 1804, madame Bonafous a fait démolir les maisons du hameau pour l'édifier. Il a reçu Caroline Bonaparte et Lannes. À la mort d'Antoinette Murat, le château est abandonné. Il est acquis en 1860 par deux agriculteurs qui l'ont divisé et transformé en ferme. Après la mort sans héritier d'un des propriétaire en 1930, une moitié du château va évoluer progressivement vers la ruine. L'autre moitié est transformée en hangar à tabac.","architecture":"Le château est construit  avec le corps de logis principal encadré de deux pavillons. L'ensemble est couvert d'une toiture à la Mansart.  A la fin du XVIIIe siècle, une partie du hameau est démolie pour permettre la construction du château. L'édifice présente une disposition en U, avec deux ailes en retour donnant sur une terrasse dominant un jardin dont l'accès se fait par un escalier à deux volées. Il est construit sur des salles voûtées, aménagées en chambre ou pièce de réception. Le château est accompagné d'un pigeonnier, d'une grange et d'annexes agricoles, four élevé en pierres placées en encorbellement et poulaillers. Eléments protégés MH : les façades et toitures du château ; four, bergerie et pigeonnier. inscription par arrêté du 1er avril 1993.","habitants":"Famille des Bonafous\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Crabillé à Montgesty","gps":"","images":["../../jctruffet.com/image/image_46/46_Crabille_1.jpg"]},"Consult_chateau_formulaire957c":{"id":"Consult_chateau_formulaire957c","dept":"46","canton":"Martel","commune":"Creysse","nom":"Creysse","type":"Château","periode":"XV","histoire":"CREYSSE, vendu par Guillaume ou Raymond de Brassac les derniers vicomtes entre 1174 et 1183 au vicomte de Turenne. Raymond II de Turenne (1143-1191)) de la vicomté de Turenne. le 30 avril 1244 le roi Louis IX (Saint Louis), sa mère Blanche de Castille et ses trois frères, Charles d'Anjou, Alphonse de Poitiers et Robert d'Artois. En décembre 1303, Philippe IV le Bel, roi capétien qui abolit l'Ordre des Templiers et hérita de leurs biens. En janvier 1324, Charles IV le Bel, fils du précédent, accompagné de sa femme Marie de Luxembourg. En 1404, le chef batelier avait 10 aides sous ses ordres et pendant la semaine sainte il fit passer la Dordogne à 4000 pèlerins ; c'est dire l'importance du port et son péage. En juin 1463, Louis XI qui venait de Toulouse après le grand incendie de Toulouse du 7 mai 1463. Enfin en 1585, le duc de Mayenne et son armée. Puis à la famille Cornil qui s'éteint en 1530 par le mariage de Françoise de Cornil avec Gilbert de Durfort, le fief passe à la famille Vassignac. Gédéon de Vassignac est gouverneur de la vicomté de Turenne en 1625. Leur appartenance à la religion réformée les contraint à l'exil et Creysse passe à la famille d'Arliguie qui occupera les lieux de 1689 à 1740. A cette date, la seigneurie passe par alliance à la famille de Pascal. Durant la Révolution, Jean-Pierre de Pascal émigre. Ses biens sont confisqués, mais son épouse obtiendra de conserver, sous surveillance, la propriété qui passera, par héritage ou par alliance à plusieurs familles jusqu'à nos jours.\r\nLa tour de Guet ou de Cosnac (Guillaume de Cosnac).","architecture":"Creysse,   L'édifice actuel est construit au XVe siècle, sur des substructions plus anciennes qui attestent de la présence d'un château antérieur. L'édifice est composé d'un logis rectangulaire cantonné à son angle sud-ouest d'une grosse tour circulaire coiffée d'une toiture en dôme recouverte d'ardoises. Elle est flanquée sur son côté sud par une petite tour carrée. La vaste terrasse est une construction du XXe siècle. \r\nLe château neuf du XVIIIe siècle (mairie - école).  Le château vieux est une forteresse médiévale dont il ne subsiste que peu d'éléments, des bâtiments dont la grosse tour, y ont été ajoutés à la fin du XIVe siècle. Le château neuf est du XVIIIe siècle, il a été construit sur l'emplacement du donjon médiéval, trois constructions; un gros pavillon carré au nord de l'église qui date du XVIe siècle, un corps de logis classique pourvu à son centre d'un fronton triangulaire, qui abrite la mairie le château proprement dit à l'extrémité du plateau rocheux, dominant le lit de la Dordogne, une sorte de maxi corps de logis quadrangulaire à mi chemin du donjon, épaulé par une grosse tour cylindrique coiffée en dôme du XVe siècle   L'édifice est composé d'un logis rectangulaire cantonné à son angle sud-ouest d'une grosse tour circulaire coiffée d'une toiture en dôme recouverte d'ardoises. Elle est flanquée sur son côté sud par une petite tour carrée. La vaste terrasse est une construction du XXe siècle.","habitants":"Famille Vassignac\r\n        \r\n        \"","divers":"Château vieux et château neuf à Creysse","gps":"","images":["../../jctruffet.com/image/image_46/46_Creysse_1.jpg","../../jctruffet.com/image/image_46/46_Creysse_2.jpg","../../jctruffet.com/image/image_46/46_Creysse_3.jpg","../../jctruffet.com/image/image_46/46_Creysse_4.jpg","../../jctruffet.com/image/image_46/46_Creysse_5.jpg","../../jctruffet.com/image/image_46/46_Creysse_6.jpg"]},"Consult_chateau_formulairefa1e":{"id":"Consult_chateau_formulairefa1e","dept":"46","canton":"Carjac","commune":"Crégols","nom":"Crégols","type":"Château","periode":"XIV-XVII","histoire":"CREGOLS, la terre de Crégols est donnée en 1210 par Fortanier de Gourdon à un Carbonnel dont la famille prend le nom du lieu : un Hector de Crégols teste en 1286 ; la famille est apparentée aux Hébrard de Saint-Sulpice, et plusieurs de ses membres se trouvent à leurs côtés à l'évêché de Coïmbre à la fin du XIIIe siècle et au début du XIVe siècle. En 1504, la seigneurie appartient par moitié à Antoine de Malroux, garde de la monnaie royale de Villefranche-de-Rouergue, et à noble Marguerite de Saint-Amans, veuve de Pierre Durieu, qui l'ont achetée à revendu à monsieur de Puycornet. A une date inconnue, le domaine passe dans les biens des chartreux de Cahors, et il est vendu comme bien national en 1791.","architecture":"L'édifice de Crégols  actuel résulte d'une importante reconstruction, peut-être en plusieurs phases dont une probablement au XVIIe siècle, sur les vestiges d'un état plus ancien qui peut dater du XIVe ou du XVe siècle.","habitants":"Famille d'Antoine de Malroux\r\n        \r\n        \r\n        \"","divers":"Château de Crégols","gps":"","images":["../../jctruffet.com/image/image_46/46_Cregols_1.jpg","../../jctruffet.com/image/image_46/46_Cregols_2.jpg"]},"Consult_chateau_formulaire6240":{"id":"Consult_chateau_formulaire6240","dept":"46","canton":"Carjac","commune":"Cénevrières","nom":"Cénevrières","type":"Forteresse","periode":"XI-XVI","histoire":"CENEVRIERES, au XIe siècle  la famille « La Popie », célèbres seigneurs qui ont donné leur nom au village médiéval de Saint-Cirq Lapopie  commencent  la construction du château. Au XIIe siècle que la famille fondatrice vendit ses biens aux Gourdon, qui devinrent seigneurs du château et propriétaires des terres de Cénevières. En 1580, le jeune roi de Navarre, futur Roi Henri IV rendit visite à son ami Antoine de Gourdon, qui venait de transformer son château en palais de la Renaissance Italienne. En 1612 Louis XIII élève le domaine au rang de marquisat pour Antoine de Gourdon, en 1617 par alliance  sa veuve Isabeau d'Astorg de Montbartier le domaine passe à la famille de la Tour du Pin, Charles marquis de Gouvernet, son descendant Jean-Frédéric de la Tour du Pin constructeur du château de la Bouilh près de Bordeaux secrétaire d'état à la guerre en 1789 avant de monter sur l'échafaud en 1793  il vend  à M. Maurissart député de Limoges, le château passe ensuite à son neveu Jean-Mortimer le Sage qui se transmet en héritage aux Combarel  du Gibanel, puis à la famille de Braquilanges toujours propriétaire de ce lieu unique de la Renaissance en Quercy depuis 1793 a permis au château dêtre classé monument historique et y organise depuis des visites afin de faire perdurer lhistoire de ce lieu, petite et grande. Le Marquis, « fait le guide » et permet dapprécier son château, ses meubles, ses souvenirs, son histoire familiale Patrick, son fils, et sa bru Patricia, ont innové avec les visites nocturnes en costumes, tous les mercredis d'été.","architecture":"Ancienne forteresse médiévale remaniée au XVIe par les seigneurs de Gourdon.   Construit sur les falaises du village dans le Parc Naturel des Causses du Quercy, à 6 km de Saint-Cirq Lapopie, le château de Cénevières,  édifié du XIIIe au XVI e siècle, est l'un des plus splendides monuments de la Renaissance en Quercy. \r\nIl domine la vallée du Lot depuis ses terrasses. Parmi les curiosités, il faut citer, le donjon du XIIIe siècle est percé de larges ouvertures et coiffé d'un toit en pavillon chevauché par des lucarnes à frontons et par une souche de cheminée à pilastres, à sa droite s'élève un corps de logis, relié à un massif pavillon de plan carré dont la porte d'entrée, portée par des consoles supportant l'entablement, est surmontée d'un cadre décoré d'armes et de rinceaux. La partie supérieure de ce pavillon dotée de mâchicoulis  d'un chemin de ronde et de canonnières. Le corps de logis dans la cour central fait face à un autre bâtiment flanqué à son extrémité par la tour de l'horloge, reliés par une galerie à l'italienne à neuf arcades, dont le toit  soutenu par des colonnes  toscanes et orné de lucarnes surmontées  de frontons et de clochetons à colonnettes. Autour de son élégante cour dhonneur, la demeure de style Renaissance, abrite des pièces luxueuses conservant un remarquable plafond peint orné de vues de Constantinople ainsi quune insolite salle dalchimie.","habitants":"Famille de la Tour du Pin\r\n        \r\n        \r\n        \"","divers":"Château de Cénevrières","gps":"","images":["../../jctruffet.com/image/image_46/46_Cenevrieres_1.jpg","../../jctruffet.com/image/image_46/46_Cenevrieres_2.jpg","../../jctruffet.com/image/image_46/46_Cenevrieres_3.jpg","../../jctruffet.com/image/image_46/46_Cenevrieres_4.jpg","../../jctruffet.com/image/image_46/46_Cenevrieres_5.jpg","../../jctruffet.com/image/image_46/46_Cenevrieres_6.jpg"]},"Consult_chateau_formulaire4f96-2":{"id":"Consult_chateau_formulaire4f96-2","dept":"46","canton":"Carjac","commune":"Cabrerets","nom":"Diable","type":"Troglodytiques","periode":"XIV","histoire":"DIABLE, du  XIVe siècle, les Anglais étaient des diables d'envahisseur.  Au Moyen-Age, la rivière était un axe de circulation surveillée par ce château, et durant l'occupation Anglaise, de nombreux bateaux ont été abordés et pillés par les malandrins.  Au VIIIe siècle, le château appartenait à Waîfre, duc d'Aquitaine. Durant 5 siècles le château a de nombreux propriétaires : en 1259 aux Barasc, puis aux Cardaillac-Montbrun.  Pendant la guerre de Cent Ans, il tomba en 1380 aux mains des grandes compagnies au service des Anglais d'Aquitaine, d'où son nom. Dix ans plus tard, Jean d'Hébrard, seigneur de Saint-Sulpice, le reprenait, en débarrassait les brigands et le démolissait. En 1387, Bertrand Basserat nommé aussi la Garénie, capitaines des  Anglais attaque et s'empare de la forteresse.  Vers 1450 , la famille Cabrerets abandonne cette forteresse troglodytique pour un château plus moderne.","architecture":"Accroché à la falaise, ce curieux château du Diable semble imprenable. Il est impossible de faire un travail de sape pour le détruire les courtines par le bas. La haute falaise en surplomb de Rochecourbe domine le village et porte sur sa verticale les ruines d'un château des Anglais, dit aussi château du Diable, accroché à une corniche.\r\nEncore pourvu d'une tour et d'une fenêtre à meneaux, Pour leur défense, le seul point d'attaque semble être la porte d'entrée, mais elle est protégée par des tours rondes devant un sentier peu large.   Ce château ne parait pas être qu'une simple fortification de garde car ses dimensions sont importantes : 5 mètres de large seulement mais 90 mètres  de  long. Dans la partie haute du château, hors de porté des flèches, des ouvertures de confort ont été aménagées.","habitants":"Seigneurs locaux                                                                                  Famille Cabrerets\r\n        \r\n        \"","divers":"Château troglodytique dit du Diable à Cabreret","gps":"","images":["../../jctruffet.com/image/image_46/46_Diable_1.jpg","../../jctruffet.com/image/image_46/46_Diable_2.jpg","../../jctruffet.com/image/image_46/46_Diable_3.jpg"]},"Consult_chateau_formulaire2fee":{"id":"Consult_chateau_formulaire2fee","dept":"46","canton":"Martel","commune":"Carennac","nom":"Doyens","type":"Château","periode":"XVI","histoire":"DOYENS,  le château des Doyens, construit au XVIe siècle, abrita de 1681 à 1685 le célèbre François de Salignac de Lamothe, dit Fénelon, futur archevêque de Cambrai, qui choisit ce  coin de terre pour écrire Les Aventures de Télémaque.  Le château est un des éléments du prieuré-doyen de Carennac, construit pour être un logement prestigieux du Doyens. Salles et galeries sont organisées sur quatre niveaux autour d'un escalier, large et imposant. Le château des Doyens est  construit  pour Alain de Ferrières, doyen de 1529 à 1554. Des aménagements sont réalisés au XVIIe siècle comme l'indiquent les armoiries des Salignac de Lamothe-Fénelon peintes sur le plafond du grand salon.","architecture":"Doyens,  blotti le long des fortifications du monastère, Carennac conserve bien des aspects du Moyen-Âge.  Le château des Doyens est un quadrilatère de 20 m sur 10, datant du XVIe siècle, il s'agit d'une belle demeure privée, construite en pierre de taille, comprenant, avec les combles, trois étages d'appartements. Un escalier à vis dessert toute la hauteur du bâtiment. Au premier étage se trouve la salle d'apparat, la mieux conservée à l'heure actuelle. Le plafond à poutrelles saillantes du XVIIe siècle est peint de rinceaux, de fleurettes, de paniers et de divers sujets mythologiques. Le château abrite à présent l'espace patrimoine du pays d'art et d'histoire de la vallée de la Dordogne. Il présente une exposition permanente en accès libre, qui permet de découvrir la richesse naturelle, patrimoniale et architecturale de ce pays labellisé « Pays d'art et d'histoire » par le ministère de la culture. Le château des Doyens a été classé monument historique le 2 février 1938.\r\nAu XVIe siècle, la construction du château du Doyen est réalisée avec sa façade en pierre blanche du pays, les fenêtres à meneaux, les lucarnes sculptées. Le château est un des éléments du prieuré-doyen de Carennac, est un logement prestigieux du doyen. Salles et galeries sont organisées sur quatre niveaux autour d'un escalier, large et imposant.","habitants":"François de Salignac de Lamothe\r\n        \r\n        \"","divers":"Château de Doyens à Carennac","gps":"","images":["../../jctruffet.com/image/image_46/46_Doyens_1.jpg","../../jctruffet.com/image/image_46/46_Doyens_2.jpg","../../jctruffet.com/image/image_46/46_Doyens_3.jpg","../../jctruffet.com/image/image_46/46_Doyens_4.jpg","../../jctruffet.com/image/image_46/46_Doyens_5.jpg","../../jctruffet.com/image/image_46/46_Doyens_6.jpg","../../jctruffet.com/image/image_46/46_Doyens_7.jpg"]},"Consult_chateau_formulaire6e6f":{"id":"Consult_chateau_formulaire6e6f","dept":"46","canton":"Puy-L","commune":"Duravel","nom":"Duravel","type":"Château","periode":"XVII","histoire":"A Duravel le château de Boutier, de Gineste, de Grimard et  de Rouffiac .                                                                                                    BOUTIER,  le château de Boutier  est partiellement inscrit au titre des monuments historiques. Sa construction date de XVIIe siècle. Un peu avant 1596, la famille Boutier, riches commerçants protestants, acquirent du temporel du prieuré de Duravel plusieurs constructions pour y faire bâtir une nouvelle demeure. \r\n Le château Boutier a été inscrit aux M.H.depuis le 16 septembre 1991.                                                                                               GRIMARD, la famille qui a laissé son nom au château de Grimard apparaît à plusieurs reprises dans les archives du XIVe siècle, avec des biens situés principalement dans la paroisse de Cazes ; dans la première moitié du 14e siècle, un Pierre Grimard est qualifié de donzel. Les Grimard disparaissent peut-être pendant la guerre de Cent ans. En 1504, noble Aldete de Massaut et son fils Antoine Delort, de Cahors, dénombrent pour une maison noble à Duravel, ce qui ne permet pas d'y reconnaître le repaire, mais en 1530, Antoine de Lort est dit seigneur de Grimard : il a épousé en  1529 Marguerite de Pélagrue, d'une famille noble de l'Agenais, et il réside sur ses terres. Le château aurait été saccagé au XVIe siècle par les Lézergues d'Orgueil et les terres données en fief aux Dupuy ou aux Bonafous. Des de Lort de Grimard sont cependant connus du XVIe siècle.\r\nGINESTE, au XVIe siècle, le domaine appartient à la famille de Boutier qui possède également le château du même nom dans le bourg de Duravel. Devenue au XVIIIe siècle la demeure de M. de Monlezun, aristocrate, ce dernier ayant émigré pendant la Révolution, la demeure sera vendue comme bien national  à M. Laguillelmie, fondé de pouvoir de Joseph de Monlezun. Ghislaine et Gérard Dega ont entrepris, en 2002, de restaurer cette magnifique propriété de 13 ha, sur un exceptionnel sous-sol, viticole de Ghislaine et Gérard Dega  et  logis de France                                                                                                        ROUFFIAC, propriété de monsieur Ducoum viticole  et  gîtes de France.","architecture":"Le château Boutier  est le résultat de cet assemblage à partir de la fin du XVIe siècle ou début du XVIIe siècle. Il a subi plusieurs modifications successives, en observant sur les façades, les ouvertures fermées et ouvertes pour faire de cet assemblage un ensemble cohérent avec un toit en pavillon. il est composé dun corps de logis organisé de part et dautre dune tour descalier centrale avec une aile en retour déquerre à l'ouest. Les murs de la tour ont été surélevés au XIXe siècle, Il souvre sur un grand jardin clos au sud par un mur situé au droit des anciens remparts de la ville.\r\nLa tour contient l'escalier qui dessert tous les étages du château.                 Grimard  Les vestiges du premier état de l'édifice peuvent dater de la fin du XIIIe siècle ou du XIVe siècle. Trois culots sculptés en remploi et une cheminée témoignent de travaux réalisés après la guerre de Cent ans, à la fin du XVe siècle. Une importante campagne de restructuration de l'édifice et peut-être d'agrandissement, à laquelle appartient l'escalier, est intervenue au milieu du XVIIe siècle.                                                                Gineste, cette charmante demeure lotoise, aux chais surmontés dun pigeonnier, a été construite sur lemplacement dun relais de chasse remontant à Richard Cur de Lion.                                                                               Rouffiac construit en 1971 dans un style grande bâtisse à deux niveaux avec pavillon saillant sur façade avant et arrière prolongé sur le flanc droit d'un pavillon à un niveau.","habitants":"Famille Boutier\r\n        \r\n        \"","divers":"Château de Boutier gravure 1 et 2, de Gineste gravure  3, 4 et 5,  de Grimard gravure 6 et 7 et Rouffiac gravure 8 et 9 à Duravel","gps":"","images":["../../jctruffet.com/image/image_46/46_Duravel_1.jpg","../../jctruffet.com/image/image_46/46_Duravel_2.jpg","../../jctruffet.com/image/image_46/46_Duravel_3.jpg","../../jctruffet.com/image/image_46/46_Duravel_4.jpg","../../jctruffet.com/image/image_46/46_Duravel_5.jpg","../../jctruffet.com/image/image_46/46_Duravel_6.jpg","../../jctruffet.com/image/image_46/46_Duravel_7.jpg","../../jctruffet.com/image/image_46/46_Duravel_8.jpg","../../jctruffet.com/image/image_46/46_Duravel_9.jpg"]},"Consult_chateau_formulaire5a45":{"id":"Consult_chateau_formulaire5a45","dept":"46","canton":"Figeac","commune":"Espagnac sainte-Eulalie","nom":"Espagnac","type":"Abbaye","periode":"XI","histoire":"ESOPAGNAC, à l'origine de ce « village-monastère », aux toits aigus et ceinturés de falaises blanchâtres, se trouve encore « l'Hébrardie » rencontrée à Cajarc sur le chemin de Compostelle . C'est au XIIIe siècle qu'Aymeric d'Hébrard, seigneur de Cajarc et évêque de Coïmbre au Portugal, finança l'installation au « Val du Paradis » d'un nouveau prieuré, le couvent primitif, plus bas dans la vallée, tant condamnée par l'inondation. Il y eut des nonnes, une centaine de chanoinesses augustines , aussi un « chemin des Dames » longe les vestiges de diverses époques. Il ressort de la documentation que l'église est achevée en 1289, et que le tombeau d'Aymeric d'Hébrard a été érigé avant 1295, dans lesquels il faut reconnaître la nef et le tombeau de l'évêque qui nous ont été conservés. Le chevet résulte en revanche d'une reconstruction, dont la datation repose sur l'identification des armoiries représentées sur une clef de voûte et sur l'écu du gisant d'un chevalier. Edmond Albe donnait ces armoiries aux Calvignac, sans prendre en compte le lion qui à Espagnac, sur la clef de voûte, charge la bande ; Louis d'Alauzier y reconnaissait les armes des Cardaillac-Brengues et le gisant d'Hugues, chevalier, écuyer du pape Jean XXII en 1316-1317, marié à Bernarde de Trian, nièce du pape, et qui hommage en 1321 à l'évêque de Cahors pour la terre de Calvignac, décédé en 1342. Il faut noter que le tombeau de Gaillard de Cardaillac, grand archidiacre de la cathédrale de Rodez mort en 1359, porte les mêmes armoiries, sans le lion. Si l'on retient cette hypothèse, il faut dater la reconstruction du chevet des années 1320-1340.","architecture":"Architecture, ravagé par la guerre de Cent Ans, le couvent se releva de ses ruines et ne fut désaffecté quà la Révolution.","habitants":"d'Aymeric d'Hébrard\r\n        \r\n        \"","divers":"Couvent-prieuré d'Espagnac","gps":"","images":["../../jctruffet.com/image/image_46/46_Espagnac_1.jpg","../../jctruffet.com/image/image_46/46_Espagnac_2.jpg","../../jctruffet.com/image/image_46/46_Espagnac_3.jpg","../../jctruffet.com/image/image_46/46_Espagnac_4.jpg"]},"Consult_chateau_formulaireaad5":{"id":"Consult_chateau_formulaireaad5","dept":"46","canton":"Cajarc","commune":"Espédaillac","nom":"Espédaillac","type":"Maison-forte","periode":"XIV","histoire":"ESPEDAILLAC, la seigneurie est partagée de longue date entre le commandeur de l'Hôpital et un seigneur laïque plus puissant, les Barasc au XIIIe siècle, puis les Cardaillac-Thémines, les Penne et les Lauzières de Thémines. Les étapes de la fondation de la commanderie d'Espédaillac sont cependant mal connues. Cette \"domus\" de l'ordre de l'hôpital de Saint-Jean de Jérusalem apparaît pour la première fois dans la documentation en 1257, dans une sentence arbitrale liée au contentieux qui oppose le commandeur Pierre Martel à Déodat de Barasc, seigneur d'Espédaillac. La maison hospitalière est alors déjà juridiquement instituée : elle est essentiellement documentée durant toute la seconde moitié du XIIIe siècle à travers une série de transactions ou de litiges. Elle abrite en 1299 une petite communauté de frères composée d'au moins quatre religieux et d'un donat, gouvernée par Bernard Mauri.\r\nLes commandeurs quittent Espédaillac pour s'installer dans leur métairie de la Salle Durbans, actuelle commune de Durbans après 1344.  Le logis du commandeur est encore mentionné au XVIIe siècle : en 1666, il est fait état du patus appelé \"la tour de Saint-Jean\", joignant l'église, sur lequel se trouvait autrefois la tour du seigneur commandeur. Est-ce le \"château\" rasé avant 1590 par les huguenots, avant qu'ils ne ruinent l'église. Le seigneur laïque possédait aussi un château à Espédaillac. Lors d'une transaction de 1450, le seigneur se réserve le château et les fortifications du lieu. En 1519, Loys de Lauzières-Thémines hommage pour le lieu et château d'Espédaillac, dans lequel se retire en 1568 Jean de Lagrange, seigneur de Rouffilhac, il lui est permis d'y rester avec le nombre de soldats qu'il voudrait.","architecture":"L'édifice d'Espédaillac  élevé à côté de l'église pourrait être le logis du commandeur. Son état le plus ancien peut dater du XIVe siècle
