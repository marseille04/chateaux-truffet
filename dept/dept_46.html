udhomme a reçu, en 1384, la charge de viguier royal à Figeac. La famille de Prudhomme était une famille de marchands, originaire du Rouergue a reçu la seigneurie du Roc. Antoine de Prud'Homme 1er du nom, écuyer, seigneur du Roc, de Doulan, du Cros et de Las-Cardonnis, il épousa en 1572 noble Catherine de Morlhon, de laquelle il eut deux enfants. Elle s'est installée à Fons dans la seconde moitié du XVe siècle, après la guerre de Cent Ans. La construction du château a commencé en 1570 par Antoine de Prudhomme.  En 1580, il était chargé de la défense de Fons, conjointement avec noble Jean de Boisset de La Salle. Antoine 1er testa et mourut en 1591. Le château va être encerclé par les possessions protestantes. Les Prudhomme ont adhéré à la Ligue. Le 10 mars 1622, le duc de Sully et son fils, François de Béthune, le comte d'Orval, viennent mettre le siège du village. Gilbert François de Cardaillac, seigneur de Lacapelle-Marival, de Saint-Cernin, de Rudelle, qui avait repris le village aux protestants sortit du village pour faire une reconnaissance, il fut pris aux abords du château du Roc, sévèrement blessé, il est transporté au château où il mourut le lendemain. En 1791, des bandes venues de Figeac mirent le feu aux possessions des Prudhomme à Fons.  Le dernier vicomte de Prudhomme émigra à la suite de cette destruction partielle. Il revint vers 1800 pour restaurer le château qui passa ensuite à son neveu, le colonel Bertrand-Marie-Frédéric de Cornély, qui a décidé de moderniser le château. Après avoir détruit des bâtiments de ferme situés à proximité, il fait aménager le parc à partir de 1868. Il a fait construire un haras avec deux tours de l'autre côté de la route. Il servit ensuite de grange et d'étable. Le château a été ensuite la propriété des Dufau de La Roque jusqu'à la Seconde Guerre mondiale. Le château et ses dépendances ont été inscrits au titre des monuments historiques le 7 décembre 1993.                                                                                                                                                       REVEILLAC la construction de la maison aurait été entreprise en 1618 par Pierre Réveillac, notaire royal de Fons.","architecture":"Le château de Roc  fut construit au XVIe siècle est un corps de logis carré cantonné de deux tours dont la toiture a été refaite après la Révolution. En même temps a été ajouté un corps de logis en retour d'équerre. A la fin du XVIIIe siècle, Géraud Louis, vicomte de Prud'Homme du Roc, releva de ses ruines le bâtiment qui avait été la proie des torches révolutionnaires. Le parc a  été créé par le colonel de Cornély après 1868 : parc avec étang romantique, nymphée et série de trois lavoirs alimentés par une source dont l'eau coule chaude naturellement. L'incendie allumé n'a détruit qu'une seule tour. En 1793 le château est de nouveau attaqué. Les mâchicoulis sont démantelés. En 1794, l'ordre est donné de l'araser les deux tours restantes.\r\nRéveillac d'après une inscription qu'on pouvait encore lire sur les murs au début du XXe siècle. La maison était le centre d'un domaine agricole, elle a été construite en deux phases. Dans la première, au début du XVIIe siècle, on a construit le corps de logis qui forme, au premier étage, la salle-cuisine, avec perron d'accès au sud, et un cabinet en encorbellement au nord. Dans un second temps on a plaqué sur la façade sud les avant-corps qui paraît avoir été construite en deux étapes. Primitivement et jusque vers la fin du XVIIIe siècle, elle ne comprenait que le corps de logis.","habitants":"Henry-Victor de Cardaillac                                                        \r\nAntoine de Prud'Homme\r\n        \r\n        \"","divers":"Château du Roc gravure 1 à 6 de Révéillac de 7 à 9 à Fons","gps":"","images":["../../jctruffet.com/image/image_46/46_Roc_Fons_1.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_2.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_3.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_4.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_5.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_6.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_7.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_8.jpg","../../jctruffet.com/image/image_46/46_Roc_Fons_9.jpg"]},"Consult_chateau_formulairedc35":{"id":"Consult_chateau_formulairedc35","dept":"46","canton":"Gramat","commune":"Rocamadour","nom":"Rocamadour","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux à rocamadour  celui des abbaye et les Vieilles-tours                                                                                    ROCAMADOUR, après avoir appartenu à l'abbaye de Marcilhac, le fief de Rocamadour est détenu par l'abbaye bénédictine de Tulle dont les abbés seront, pendant plusieurs siècles, les cadets des seigneurs de Castelnau. En 1211, Philippe Auguste annexe Rocamadour au royaume. En 1244, Saint Louis accomplit le pélerinage en compagnie de sa mère, Blanche de Castille, et de ses trois frères. Pendant la guerre de Cent Ans, la cité sera le seul exemple en Quercy de \"ville ouverte\", le château faisait partie intégrante du système défensif du bourg et de ses sanctuaires. Pendant la Révolution une loi supprime le pélerinage et fait vendre le château en très mauvais état, situé sur le rocher. C'est seulement à la fin du XIXe siècle que l'abbé Caillau, propriétaire du site, fera reconstruire la demeure, dans le plus pur style néo-gothique tel qu'on peut la voir aujourd'hui. Cette restauration comporte 3 parties distinctes le logis de l'abbé, la porte du fort au sud et la partie sud du prieuré bénédictin, à l'ouest.","architecture":"Le château de Rocamadour  est tout en haut du village et ses remparts datent de la fin du XIIIe, début XIVe siècle empêchait d'accéder à la cité par le haut de la falaise,  faisait ainsi partie intégrante du système défensif du bourg et de ses sanctuaires. Les guerres de Religion et la Révolution pillèrent les sanctuaires. Le XIXe siècle apporta son lot de restaurations plus ou moins bien réalisées. Conservant un château en partie du XIVe siècle, on reconstruisit alors le château des évêques en style néo-gothique.                                                                                                       Veilles-Tours, maison forte corps de logis rectangulaire à deux niveaux  toit en croupes accolé de chaque côté de tours rondes toit en poivrière","habitants":"L'abbé Caillau\r\n        \r\n        \"","divers":"Château de Rocamadour gravure de 1 à 7, la maison forte des Vieilles-Tours gravure 8 et 9.","gps":"","images":["../../jctruffet.com/image/image_46/46_Rocamadour_1.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_2.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_3.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_4.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_5.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_6.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_7.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_8.jpg","../../jctruffet.com/image/image_46/46_Rocamadour_9.jpg"]},"Consult_chateau_formulaire4949":{"id":"Consult_chateau_formulaire4949","dept":"46","canton":"Espère","commune":"Saint-Pierre-Lafeuille","nom":"Roussillon_Lot","type":"Château-fort","periode":"XIII","histoire":"ROUSSILLON, le château  a été construit du XIIIe au  XVe siècle, Vers 1360, la seigneurie fut acquise par les Vayrols, anoblis en 1337. En 1355, pendant la seconde guerre de Cent Ans.  Par le mariage de Marguerite en 1430, le fief de Roussillon passa aux Auriole, célèbre famille de caorsins qui sétait enrichie depuis le XIIIe siècle grâce au grand négoce.  le château passa aux mains des Anglais, lorsque Raymond d'Antéjac, seigneur de Roussillon, reconnut au roi d'Angleterre des droits sur la couronne de France. Au XVIe siècle,  propriété de Jean III de Gontaud-d'Auriolle, reçut le roi Louis XIII en 1632.  Le château a aujourd'hui retrouvé une partie de son aspect antérieur. Jean dAuriole, chevalier, baron de Gramat, seigneur de Loubressac, Peyrilles, Masclat et Roussillon, fut sans doute à lorigine de la reconstruction de la forteresse,  sa fille Anne, dame de Roussillon et de Peyrilles, épousa au début du XVIe siècle Raymond de Gontaud, seigneur de Cabrerets, plaçant dans sa lignée les Gontaud qui resteront rattachés à Roussillon jusquà la Révolution. Leur fils Jean, protestant, disparut peu après 1601. Après lui, ses descendants se désintéressent des lieux. Lancienne forteresse et son domaine furent ainsi affermés en 1728 par Antoine-François de Gontaud-dAuriole à une famille de paysans, les Bru. Charles-Armand de Gontaud-Biron hérita de la seigneurie et mourut en 1756. Son héritier Armand-Louis, duc de Lauzun et de Biron, marquis de Cabrerets, fit refaire les toitures des tours de son château. Il mourut, guillotiné en 1793 et sans postérité, ses biens revenant à son père Charles-Antoine, duc de Lauzun qui disparut en 1798, mais au XIXe siècle, il fut utilisé comme carrière de pierres pour les villages environnants. Démantelée et fortement endommagée, la construction fut restaurée à partir de 1958 par la famille Mailhol.","architecture":"Le château de Roussillon bâti à 300 m d'altitude, à l'origine, le château comportait huit tours et trois corps de logis, Il a servi comme forteresse et comme château d'agrément. Il commandait alors la région au nord de Cahors et les vallées des affluents du Lot. Protégé par des douves, le château se compose de trois tours et d'un grand corps de logis encadrant deux cours intérieures.  Un donjon pentagonal, ainsi que des maçonneries appartenant à un logis placé dans la partie sud-est du château actuel, évoquent en effet la présence de cette famille de chevaliers. Un pont-levis remplacé par des arches permettait laccès à la basse-cour  que défendaient les tirs de flanquement des canonnières percées dans deux tours dangle. Le passage dentrée du logis, protégé par le donjon, menait à une cour intérieure étroite autour de laquelle sordonnaient trois corps de bâtiment dont une galerie voûtée. En fond de cour, une tour carrée renferme lescalier à vis desservant les niveaux de la demeure. Des quatre tours qui sélèvent aux angles, la tour de la chapelle est la plus importante ; démantelé, le sanctuaire ne possède plus que sa grande fenêtre à lancettes de style gothique tournée vers lEst.  Leurs ouvertures constituées de fenêtres à traverse sont ornées de bâtons écotés ou plus simplement comme les grandes fenêtres à meneaux des corps de logis de moulures chanfreinées. Abandonné à partir du XVIIe siècle par ses propriétaires, le château de Roussillon fut dès lors livré aux vents et servit même de carrière de pierre jusqu'en 1958.","habitants":"Famille des Vayrols\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Roussillon à Saint-Pierre-Lafeuille","gps":"","images":["../../jctruffet.com/image/image_46/46_Roussillon_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Roussillon_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Roussillon_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Roussillon_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Roussillon_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Roussillon_Lot_6.jpg"]},"Consult_chateau_formulaire822d":{"id":"Consult_chateau_formulaire822d","dept":"46","canton":"Figeac","commune":"Rudelle-St-Simon","nom":"Rudelle_Lot","type":"Château","periode":"XIII","histoire":"RUDELLE, date de la  2e moitié du XIIIe siècle ; 4e quart du XIXe siècle. Auteur de l'oeuvre :Gout Paul (architecte). A lorigine, celle-ci nétait que la chapelle de « lhôpital » de Rudelle, que les troubles de la guerre de Cent Ans imposèrent de fortifier pour servir de refuge à la population lors des passages sanglants des compagnies et des routiers. Vers 1470, à la demande des habitants, la chapelle devint église paroissiale, vouée à Saint Martial, le 1er Evêque de Limoges, vénéré pour ses miracles. Il est fort probable que Rudelle doive son nom au troubadour Jauffré Rudel, originaire de la région. L'église aurait été à l'origine la chapelle de l'hôpital mentionné en 1266 par le testament de son fondateur, Bertrand de Cardaillac ; elle ne serait devenue église paroissiale que dans la seconde moitié du XVe siècle. En 1593, pendant les guerres de religion, le duc de Bouillan, vicomte de Turenne  protestant vint assiéger la tour gardée par les habitants de Rudelle pour le compte du baron de Cardaillac, catholique. Pour éviter la destruction de la tour, le baron demanda aux défenseurs de se rendre.","architecture":"L'édifice, qui peut être daté de la deuxième moitié du XIIIe siècle, aurait été construit peu après la fondation de la bastide vers 1250. L'église a été très restaurée dans les années 1890 par l'architecte Paul Gout, lequel a supprimé la toiture au profit d'une couverture en terrasse et a surtout ajouté les bretèches de son couronnement ; les travaux ont été surveillés par l'architecte de Cahors Achille Rodolosse. Son aspect d'église fortifiée date de la restauration de la fin du XIXe siècle et du début du XXe siècle. l'édifice comportait des créneaux ainsi qu'une toiture à quatre pans qui a disparu malgré le classement comme monument historique en 1886.","habitants":"Bertrand de Cardaillac\r\n        \"","divers":"L'église fortfié de Rudelle et château de Saint-Simon","gps":"","images":["../../jctruffet.com/image/image_46/46_Rudelle_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Rudelle_Lot_2.jpg"]},"Consult_chateau_formulairef25d":{"id":"Consult_chateau_formulairef25d","dept":"46","canton":"Lacapelle-Marival","commune":"Rueyres","nom":"Rueyres","type":"Château","periode":"XVII","histoire":"RUEYRES, le château était propriété de la famille d'Arcimoles à la fin du XVIIIe siècle, celle-ci avait fuit leur demeure de Roumégoux incendiée par les révolutionnaires. La propriété possède également un très beau parc.","architecture":"A la sortie de ce beau petit village typique des vallées du Limargue, possédant une église du XIIe siècle, on tombe sur le château en bordure de route. C'est un manoir confortable construit au XVIIe siècle couvert de lauzes. Il se compose de deux ailes en équerre, dont l'une comprend une tour carrée et une tour ronde. Une haute toiture recouvre chaque corps de logis.","habitants":"Famille de Roumégoux\r\n        \r\n        \"","divers":"Château de Rueyres","gps":"","images":["../../jctruffet.com/image/image_46/46_Rueyres_1.jpg","../../jctruffet.com/image/image_46/46_Rueyres_2.jpg"]},"Consult_chateau_formulaire1a14":{"id":"Consult_chateau_formulaire1a14","dept":"46","canton":"Saint-Céré","commune":"Saignes","nom":"Saignes","type":"Château","periode":"XVI","histoire":"SAIGNES.  est le berceau de la famille de La Garde de Saignes. Cest à Pierre de Lagarde, conseiller au Parlement de Toulouse et  ambassadeur de François Ier, que lon doit la reconstruction dans la première moitié du XVIe siècle de cette grande demeure dominant le territoire de la  seigneurie de Saignes. Louvrage séleva à lemplacement dun premier édifice, nommé \"castrum de Siognâ\", acquis en 1379 par Bertrand de Lagarde originaire dArgentat.  La famille de la Garde, originaire du Limousin, se serait établie à Saignes vers 1379, prenant par la suite le nom de la Garde de Saignes. Lors du dénombrement de 1504, noble Barthélemy de Lagarde est seigneur de Saignes où il possède une maison et une vieille tour, et ses dépendances. Son fils Pierre de Lagarde fait une brillante carrière au service du roi et c'est comblé d'honneurs et de récompenses qu'il se retire dans son château de Saignes où il meurt en 1566. Le dernier représentant de la famille est mort à Saignes en 1923. Au début du XIXe siècle, le château est cependant délaissé et en partie démoli pour en récupérer les matériaux, et dans les années 1870, il est en grande partie en ruines : la comparaison entre les plans cadastraux de 1830 et actuel montre l'étendue des démolitions. Pour l'essentiel, ce qui subsiste de l'édifice paraît dater du XVIe siècle, et aurait donc été construit pour Barthélemy et Pierre de Lagarde.","architecture":"Saignes, le château est agrémenté de 7 belles tours rondes ainsi qu'une chapelle indépendante, avec un clocher à peigne.  Le caractère militaire et défensif, affirmé par la position haute de la bâtisse, est renforcé par la présence des hautes tours armées de mâchicoulis portés par de lourdes consoles de pierre flanquant le corps de logis rectangulaire. Lune imposante est de plan circulaire ; lautre carrée est pourvue dune tourelle circulaire en encorbellement. Au devant, une courtine est bastionnée de deux tours défensives dans  lesquelles souvrent des canonnières.  Lensemble est complété par une chapelle dont la porte figure les armoiries des Lagarde. Des vestiges d'un édifice antérieur pourraient cependant être conservés.","habitants":"Famille de la Garde\r\n        \r\n        \"","divers":"Château de Saignes","gps":"","images":["../../jctruffet.com/image/image_46/46_Saignes_1.jpg","../../jctruffet.com/image/image_46/46_Saignes_2.jpg","../../jctruffet.com/image/image_46/46_Saignes_3.jpg"]},"Consult_chateau_formulaire263e":{"id":"Consult_chateau_formulaire263e","dept":"46","canton":"Martel","commune":"Sarrazac","nom":"Sarrazac","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Sarrazac celui de Chabannes,  de Croze, de Muzac et de Couzenac, pas d'information historique pour ce dernier.                                                                                                                                                             CROZE Le mas de Crozes appartient à partir de 1470 à Étienne de Vieilleschièzes, seigneur du Bastit, procureur de la vicomté de Turenne, à lemplacement dune ancienne maison forte qu'il a acquis des feux nobles Galhard et Jean Paulin. Le pavillon rectangulaire muni de meurtrières situé à l'est du château peut être un vestige du logis primitif attesté au XIIIe siècle. Dans le dénombrement de 1504, le château appartient à Pierre de Vielheschièzes, seigneur du Bastit, qui tient le domaine de Croze, sans la justice, du vicomte de Turenne. Ses descendants ont conservé le fief jusquà la mort de Raymond de Vieilleschièzes, en 1611. N'ayant pas d'héritier direct, le fief passe à Jean de Marqueyssac, son neveu. Les Marqueyssac ont conservé le château jusqu'en 1813.  Les Marqueyssac l'ont vendu  à François de Verninac, attaché de son cousin Raymond de Verninac-Saint-Maur, diplomate et préfet sous le Consulat. Raymond de Verninac, originaire de Gourdon, a épousé en 1798  Henriette Delacroix, fille de Charles-François Delacroix, ministre des Relations extérieures au début du Directoire et préfet du premier empire, et sur dEugène Delacroix. Ce dernier a résidé au château à plusieurs reprises. Il est venu dans leur propriété en 1820 pour achever une convalescence. En 1855, il loge dans une chambre avec vue sur le château de Turenne. Vers 1860 le château a été entièrement restauré dans le style néogothique. L'édifice est inscrit au titre des monuments historiques le 17 mars 1999.                                                                                                                                                   MUZAC, le château a été construit à la fin du XVIe siècle pour la famille des de Montrozier, il fut la propriété au XVIIe siècle de la famille Muzac, issue de la bourgeoisie du Haut-Quercy. Les Tournier occupèrent cette belle propriété au XVIIIe siècle, puis lui succédèrent la famille des Dellac.","architecture":"CHABANNES  le corps principal du château peut dater du XVe siècle,  la partie ouest a été entièrement remontée avec les matériaux d'origine après un effondrement survenu en 1945. Un second corps de bâtiment peut dater de la fin du XVIIe siècle.                                                                  CROZE  le château est cité au IXe siècle au lieu dit de Crosa. Il est construit sur un promontoire dominant la vallée de la Tourmente. Quelques traces d'aménagements médiévaux subsistent, mais le château a été totalement remanié au XIXe siècle dans le goût néo-gothique. Toujours au XIX e siècle, construction d'une ferme modèle, en maçonnerie de moellons actuel a été construit au dernier quart du XVe siècle avec le tour hexagonale de l'escalier à vis en saillie de la façade sud.  Des douves ont été aménagées au XVe et XVIe pour protéger l'édifice. Le château a été réaménagé au XVIIIe siècle en ouvrant de grandes baies et en décorant les pièces de boiseries et de stucs de style rocaille. Une grosse tour ronde à mâchicoulis a été construite au XVIIIe siècle et flanque le bâtiment à l'angle nord-est.                                                                                                              Muzac,  domaine possédant une suite de beaux logis dominant un jardin plein de charme, édifice de plan en équerre à deux niveaux avec série de lucarnes sur toit en croupes accolé  sur flanc d'une tour carrée  toit à quatre pans.","habitants":"Étienne de Vieilleschièzes                                                                  Famille des de Montrozier\r\n        \r\n        \r\n        \"","divers":"Château à Sarrazac gravure 1, de Chabannes  2 et 3, de Couzenac 4 et 5,  de Crozes 6 et 7  et de Muzac 8 et 9.","gps":"","images":["../../jctruffet.com/image/image_46/46_Sarrazac_1.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_2.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_3.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_4.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_5.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_6.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_7.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_8.jpg","../../jctruffet.com/image/image_46/46_Sarrazac_9.jpg"]},"Consult_chateau_formulairef328-2":{"id":"Consult_chateau_formulairef328-2","dept":"46","canton":"Puy-L","commune":"Saux","nom":"Saux_Aix","type":"Château","periode":"XV","histoire":"AIX à Saux,  le château primitif est détruit, en pleine croisade contre les Albigeois, par l'armée de Simon de Montfort en 1212. L'édifice actuel reconstruit au XVe siècle, doit son nom à la famille d'Ays originaire de Fumel. En 1465, l'héritière India d'Ays épouse Amalric de Balaguier, seigneur de Ginolhac. Le remariage d'une veuve Balaguier fera passer le domaine aux Gozon, leurs descendants demeureront dans la propriété jusqu'à la fin du XIXe siècle.","architecture":"Aix, l'édifice se compose de trois corps de logis, dont le principal, situé au centre, comporte quatre niveaux. Le bâtiment nord  ouest est coiffé d'une toiture recouverte de tuiles plates. Une tour ronde est incluse dans la façade nord. Un portail voûté supportant une tour-pigeonnier carrée permettait l'accès à la basse-cour entourée des communs.","habitants":"Famille d'Ays \r\n        \r\n        \"","divers":"Château d'Aix à  Saux","gps":"","images":["../../jctruffet.com/image/image_46/46_Saux_Aix_1.jpg","../../jctruffet.com/image/image_46/46_Saux_Aix_2.jpg","../../jctruffet.com/image/image_46/46_Saux_Aix_3.jpg","../../jctruffet.com/image/image_46/46_Saux_Aix_4.jpg","../../jctruffet.com/image/image_46/46_Saux_Aix_5.jpg"]},"Consult_chateau_formulairee976-2":{"id":"Consult_chateau_formulairee976-2","dept":"46","canton":"St-Germain Bel Air","commune":"Saint-Chamarand","nom":"St_Chamarand","type":"Château","periode":"XV","histoire":"St-CHAMARAND, la seigneurie de Saint Chamarand appartenait à Aymeric et Géraud de Gourdon depuis 961. Les Gourdon conserveront  ce fief  jusqu'en 1311, leur ruine financière les amène à vendre la propriété à Raymond d'Auriole. Le mariage d'Aygline d'Auriole avec Pierre de Vassal fait passer la seigneurie dans cette famille. En 1388, la propriété est vendue à Guy de Peyronnencq, cette famille l'occupera jusqu'au milieu du XVe siècle, les dernières générations ne vivent plus à St Chamarand.    En 1632 Louis XIII, roi de France, déjeuna au château de Roussillon puis alla dormir au château de St-Chamarand, c'était au moment ou il venait châtier à Toulouse le connétable de  Montmorency.  En 1738 Louise de Peyronnencq, héritière de la lignée, épouse Jean de   Calvimont, baron de Saint Martial. Pendant la Révolution, leur fils Jean Auguste Armand émigre, ce qui entraînera la saisie de la propriété. Après le découpage de la demeure, elle connaîtra différents propriétaires, puis un abandon progressif la ruinera.  M. Wood Adrian, chambres d'hôtes de charme et gîtes.","architecture":"Quelques vestiges subsistent encore dans ces murs, une porte surmontée d'un arc en plein cintre, une tourelle en encorbellement des plafonds peints du XVIIe, et une belle fenêtre Renaissance.\r\nEn mauvais état, le propriétaire actuel, M. Wood, a effectué un magnifique travail de restauration de la demeure.","habitants":"Famille de Jean de   Calvimont\r\n        \r\n        \"","divers":"Château de Saint-Chamarand","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Chamarand_1.jpg","../../jctruffet.com/image/image_46/46_St_Chamarand_2.jpg","../../jctruffet.com/image/image_46/46_St_Chamarand_3.jpg","../../jctruffet.com/image/image_46/46_St_Chamarand_4.jpg","../../jctruffet.com/image/image_46/46_St_Chamarand_5.jpg"]},"Consult_chateau_formulairef643":{"id":"Consult_chateau_formulairef643","dept":"46","canton":"Carjac","commune":"Saint-Cirq  Lapopie","nom":"St_Cirq_Lapopie","type":"Vestiges","periode":"X-XIII","histoire":"ST-CIRQ-LAPOPIE, le fort de Saint-Cirq Lapopie dominant le village. C'est tout d'abord Oldoric, vicomte de Saint Cirq, qui, à partir du Xe siècle, y fit construire le premier château. Dès le XIIIe siècle, trois familles seigneuriales se partagèrent le Fort et y construisirent leur château. Tout en rendant hommage au Comte de Toulouse et aux Rois de France, Les Lapopie, Les Gourdon et Les Cardaillac cohabitèrent au sein de ce même ensemble castral.  Il ne reste plus grand chose du château-fort aujourd'hui. Il fut tout d'abord assiégé par Richard Coeur de Lion en 1199. Par la suite, le roi Louis XI ordonna son démantèlement afin de punir le soutien du seigneur de Cardaillac de l'époque au duc de Berry, pendant la guerre du bien public. Charles VIII fit reconstruire l'édifice en dédommagement des préjudices causés par Louis XI. Il fut saccagé et ruiné sous le règne d'Henri IV, au cours des guerres de religion opposant catholiques et protestants. La forteresse ne se relèvera jamais de ses ruines. Ses seigneurs déserteront les lieux. En 1645, Geoffroy de Cardaillac vend à une branche collatérale sa co-seigneurie de Saint-Cirq. En 1672, Michel de Vidéran achète les possessions des de Cardaillac. En 1602, la partie relevant des Hébrard de Saint-Sulpice était passée par alliance aux Crossol d'Uzès.  Leur descendant, Charles-Amable de Crossal, marquis de Montsalès, vendra la totalité de ses biens en 1717 à maître Peyre. Les Gourdon, présents depuis 1196 à Saint-Cirq-La-Popie, s'étaient défaits de leur part en 1420. En aval de Saint-Cirq-Lapopie : Bouziès, ce hameau est dominé sur la rive opposée par une route qui offre des points de vue exceptionnels. On trouve plusieurs châteaux des Anglais dans les rochers bordant le Lot entre Cahors et Figeac, unique voie de communication. Ces fortifications troglodytiques existaient déjà avant la guerre de Cent Ans. Ces constructions servaient des repères de brigands à la solde de lAnglais. Mais ce château ne fut aménagé qu'au XIVe siècle, il se situe au dessus du tunnel percé dans la roche, juste avant le pont qui mène au bourg de Bouziès en venant de Cahors.","architecture":"Saint Cirq Lapopie aujourd'hui, Il subsiste aujourd'hui quelques traces des châteaux des seigneurs. On dénombre une tour du XIIIe siècle, un corps de logis et une enceinte autonome datant de la fin XIIIe siècle au début XIVe siècle.  Le Fort de Saint Cirq Lapopie, ce sont aujourd'hui des vestiges de l'histoire. Sur les traces des seigneurs, montez les marches jusqu'au rocher de La Popie; vous pourrez admirer le village médiéval mais également la vallée du Lot, avec ses moulins, barrages, ports, écluses et le célèbre Chemin de Halage. Le château au cur du village de Saint-Cirq-Lapopie, bénéficie dune situation exceptionnelle.  Les vestiges du château se composent d'une courtine percées de fenêtres, de latrines et de salles qui, sur trois niveaux étagés, viennent s'accoler au rempart. Ces différents états sont en partie masqués par des apports importants de remblais. La salle basse, accessible par une brèche ancienne pratiquée à la base de la courtine sud, a été vidées des remblais d'abandon post-médiévaux qui la comblaient partiellement. D'une superficie de 48 m² et voûtée d'un berceau continu, la salle devait être à usage de cave ou de remise, très peu éclairée au nord par une fenêtre en meurtrière. Elle est desservie dans l'angle nord ouest par un escalier en quart de cercle, dégagé sur les huit côtés.","habitants":"Geoffroy de Cardaillac \r\n        \r\n        \r\n        \"","divers":"Vestiges du château fort de Saint-Cirq-Lapopie.","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_1.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_2.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_3.html","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_4.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_5.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_6.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_7.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_8.jpg","../../jctruffet.com/image/image_46/46_St_Cirq_Lapopie_9.jpg"]},"Consult_chateau_formulairee8bb":{"id":"Consult_chateau_formulairee8bb","dept":"46","canton":"Luzech","commune":"Parnac","nom":"St_Didier_Parnac","type":"Château","periode":"XVI","histoire":"ST DIDIER de PARNAC, c'est au VIIe siècle qu'apparaissent les premiers éléments précis à propos du château, l'histoire de Saint-Didier commence au siècle de Louis XIV. Le premier Rigal du nom, viticulteur de son état, ignorait sans doute qu'il amorçait une merveilleuse aventure qui allait faire de ses descendants, 300 ans plus tard, les leaders reconnus du Cahors. Après bien des tumultes, Jean Guillou, vigneron et marchand acquis  le château en 1798, les vins du château Saint-Didier arrivent en Angleterre et en Russie en 1800. En plein coeur de l'appellation, les 70 hectares de Saint Didier bénéficient d'un terroir à nul autre pareil. Parnac est l'une des seules communes du vignoble de Cahors à posséder des sols aussi variés: galets, quartz et sable ici, un peu plus loings sols graveleux ou encore argilo-calcaire. De père en fils, Jean-Marie Rigal transmet sa passion et sa rigueur à ses enfants Jacques et Franck Rigal, qui assurent à leur tour la relève du vignoble. En 1979, la famille achète le Prieuré de Cénac, à Albas, dans l'ouest de Cahors. En 1987, elle fait l'acquisition du château de Grézels, non loin de Puy-L'évêque.","architecture":"Saint-Didier de Parnac, le château de plan  en équerre  corps de logis rectangulaire avec une tourelle carrée sur angle et prolongement de bâtiment pour dépendances.","habitants":"Famille Rigal\r\n        \r\n        \"","divers":"Château de Saint-Didier de Parnac.","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Didier_Parnac_1.jpg","../../jctruffet.com/image/image_46/46_St_Didier_Parnac_2.jpg","../../jctruffet.com/image/image_46/46_St_Didier_Parnac_3.jpg"]},"Consult_chateau_formulaire759f":{"id":"Consult_chateau_formulaire759f","dept":"46","canton":"Saint-Germain Bel Air","commune":"Saint-Germain Bel Air","nom":"St_Germain_Bel_Air","type":"Château","periode":"XIV","histoire":"Trois châteaux à Sept-Fons le château de Sept-Fons de Frayssinet et de Vignals.                                                         SEPT-FONS, vers 1420, Marguerite de Cazeton, baronne de Salviac, épouse Bernard de Durfort-Boissières et apporte en dot la seigneurie de Septfons dans cette famille. En 1522, un acte est rédigé, attestant de la présence d'une maison noble à Septfons. En 1639, Jacques de Durfort-Boissières, dans le dénombrement de ses biens inclut son fief de Septfons. L'illustre maison des Durfort occupera les lieux jusqu'à la Révolution, mais n'habitèrent pas toujours le château au cours des siècles, le dernier des Durfort Boissières à y résider vers 1780, fut Sarrain-Alphonse-Emmanuel-Louis, Comte de Durfort-Boissières. A la Révolution, il émigre et ses biens seront alors confisqués et pillés pendant cette période. Aujourd'hui exploitation agricole de la famille Bosteen.                                           FRAYSSINET deux kilomètres au nord Est de Saint-Germain,  la seigneurie de Fraissinet est détachée au XIIIe siècle de la baronnie de Gourdon pour être donnée à la famille de Vassal. Cette famille était originaire du château de Vassal situé près de Martel. On trouve aussi une tour de Vassal dans un ancien fort près de Carlux. La tradition leur donne une origine commune avec les anciens barons de Gourdon, ce qui est rendu vraisemblable par la possession des fiefs de Fraissinet et de Vaillac qui ont été détachés de cette baronnie. La seigneurie de Fraissinet a appartenu aux Vassal jusqu'en 1410. Adémar de Vassal est cité en 1178 pour des dons faits à l'abbaye Saint-Pierre de Beaulieu-sur-Dordogne. Il est  mort vers 1230. Il est le père de N. de Vassal, co-seigneur de Vers, Guillaume I de Vassal, seigneur de Vaillac, Bertrand Ier de Vassal, seigneur de Fraissinet, auteur de la première branche des Vassal seigneurs de Fraissinet, Sicard I de Vassal, fondateur de la seconde branche des Vassal de Fraissinet.                                                                          \r\nVIGNALS pas d'information historique","architecture":"Sept-fons, l'édifice est une grande bâtisse en fer à cheval. L'aile gauche date du XVIIIe siècle, l'aile droite a été restaurée à l'intérieur, la tour ronde est récente.                                                                                                     Frayssinet Lamostonie de plan rectangulaire a deux niveaux et attiques flanqué d'une tourelles en angle et à l'opposée une tour carrée  et à l'arrière plein cintre une tour centrale de forme donjon toit à quatre pans.                                                                                                                                             Vignals superbe château féodal, donjon, tourelles l'ensemble  crénelés avec mâchicoulis.","habitants":"Famille des Septfons\r\n        \r\n        \"","divers":"Château de Sept-Fons gravure de 1 à 3, de Frayssinet de 4 et 5, hôtel de ville 8 et Vignals 9 à Saint-Germain de Bel Air","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_1.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_2.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_3.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_4.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_5.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_6.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_7.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_8.jpg","../../jctruffet.com/image/image_46/46_St_Germain_Bel_Air_9.jpg"]},"Consult_chateau_formulaire0c23":{"id":"Consult_chateau_formulaire0c23","dept":"46","canton":"Saint-Céré","commune":"Saint-Céré","nom":"St_Laurent_Tour","type":"Vestiges","periode":"XII","histoire":"SAINT-LAURENT-LES-TOURS, le château, après avoir appartenu aux comtes dAuvergne, passa aux vicomtes de Turenne durant 8 siècles, ils construisirent les deux tours, la première en 1178, la deuxième en 1390,  saccagé en 1586, pendant les guerres de religion, le château est abandonné  jusquen 1738, date à laquelle il revient, en ruine, au roi de France Louis XV.  En 1826, il est offert par son propriétaire au département, qui refuse la donation. Le château est acquis en 1894 par Lafon de Verdier qui fait rebâtir le logis dans un style néo-médiéval. Le peintre et tapissier Jean Lurçat l'achète en 1943 : il y installe son atelier en décorant les murs, les plafonds et les menuiseries des portes et des fenêtres. De nombreuses oeuvres de l'artiste : tapisseries, peintures et céramiques réalisées entre 1943 et sa mort en 1966, y sont conservées et présentées au public. Il eut plusieurs autres propriétaires, et cest Lafon du Verdier qui construisit un manoir néo-médiéval sur lemplacement de lancien logis en 1895.","architecture":"L'enceinte du château des Tours-Saint-Laurent abrite particulièrement deux tours en cours de restauration. Au Sud, la « petite tour », ou « Tour Raimon II », tour militaire érigée en 1178 par le vicomte de Turenne Raimon II. Haute de 28 m, sur une base carrée de 6,75 m, ce donjon roman avait pour but d'illustrer la puissance du château dans le sud de la vicomté de Turenne. Le haut de la tour a  été rénové au XIVe siècle, comme l'atteste la différence entre les murs soigneusement taillés à contreforts plats des trois-quarts de la partie basse et les murs totalement lisses du dernier quart. Le couronnement, dont la façade ouest est tombée avec le temps, laisse subsister quelques mâchicoulis. Les rares ouvertures confirment la destinée exclusivement militaire de cet édifice. Au Nord, la « grande tour », ou « Tour Maîtresse », seconde tour militaire érigée en 1390 par le vicomte de Turenne Guillaume Roger de Beaufort. Haute de 35 m, large de 10,50 m, dépassant la première tour pour culminer à une altitude totale de 500 m, cet autre donjon a été construit une fois que l'occupant anglais eut quitté la région. Bien qu'elle soit mieux aménagée que son homologue, en abritant un sous-sol, une chapelle ornée d'une clé de voûte aux blasons de Beaufort-Turenne, elle n'est guère plus ouverte, de par son caractère militaire. Elle bénéficie en 2011-2012 d'importantes restaurations. Entre les deux tours, le « manoir rénové » par Lafon du Verdier en 1895. Érigé sur les anciens vestiges de l'époque médiévale,   À l'Est, la « petite Tour de la Poterne ». À l'Ouest, la « Tour de l'atelier de Rossanne ». Les remparts, rénovés durant les Guerres de religion par les protestants.","habitants":"Lafon de Verdier et  Jean Lurçat \r\n        \r\n        \"","divers":"Vestiges du château de Saint-Laurent les Tours à Saint-Céré","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Laurent_Tours_1.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_2.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_3.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_4.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_5.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_6.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_7.jpg","../../jctruffet.com/image/image_46/46_St_Laurent_Tours_8.jpg"]},"Consult_chateau_formulaire6032":{"id":"Consult_chateau_formulaire6032","dept":"46","canton":"Martel","commune":"Cavagnac","nom":"St_Palavy","type":"Château","periode":"XIV","histoire":"PALAVY, il existe aussi à Saint-Palavy un château, bon témoin de ce que fut l'aisance de la grande propriété foncière, ayant appartenu à la famille Briat enracinée en ce lieu depuis le XIVe siècle. L'édifice a été remanié dans le goût du XIXe siècle, et la demeure est restée, par alliance, dans la descendance des Briat de Traversat, aujourd'hui la famille de Bisschop.  La paroisse de Saint-Palavy existait déjà avant que les moines de l'abbaye d'Obazine viennent construire une grange au XIIIe siècle, sur ces terres du haut Quercy. Elle porte peut-être le nom de Saint-Pallade, martyre chrétien du VIIIe siècle. Les Briat de Traversat, dont les descendants occupent toujours la propriété, possédèrent ce fief pendant quatre siècles.","architecture":"Le château  de Palavy construit à l'orée du village au XIXe siècle, déploie ses ailes de part et d'autre d'une belle tour carrée restaurée, dont les mâchicoulis ont été reconstitués à la même époque.","habitants":"Famille Briat de Traversa\r\n        \r\n        \"","divers":"Château de Palavy","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Palavy_1.jpg","../../jctruffet.com/image/image_46/46_St_Palavy_2.jpg"]},"Consult_chateau_formulaire0034":{"id":"Consult_chateau_formulaire0034","dept":"46","canton":"Cahors","commune":"Flaugnac","nom":"St_Privat_Flaugnac","type":"Château","periode":"XIII-XVII","histoire":"SAINT-PRIVAT, Il dépendait de la châtellenie de Castelnau-Montratier. Le nom du village vient de celui de la famille de chevaliers qui ont le fief, les Saint-Privat de la Olmière. En 1296, Gaillard de Saint-Privat de la Olmière rend hommage à Ratier III de Castelnau. En 1398, le village constitué de quelques maisons autour de l'église paroissiale et du château était entouré d'une enceinte. La famille de Saint-Privat s'éteignit au XIVe siècle avec Magne qui se maria avec Bertrand de Cas, chevalier de la châtellenie de Caylus. En 1403, c'est Arnaud de Rouzet qui rend hommage pour le fief à l'évêque de Cahors. Les Gontaud de Lalbenque succédèrent aux Cas puis ils vendirent en 1460 le fief à noble Jean de Fenelon de Parisot. Le fief est revendu en 1466 par Jean de Fenelon à Guillaume de Montégut. Il rachète en 1477  la moitié des dîmes. Il apparaît encore dans un acte de 1490. Les Fenelon sont encore seigneurs de Saint-Privat au XVe siècle.  En 1628, un bourgeois de Cahors, Guillaume Baudus, achète le domaine, en 1717, Saint-Privat appartient à ses descendants dont Marie de Baudus (1649-1719), veuve d'Antoine Dadine de Hauteserre. Les Baudus vont conserver le domaine jusqu'à la Révolution. Le château est ensuite acheté comme bien national par un sieur Boncour. Le château a connu plusieurs propriétaires jusqu'en 1958. Les nouveaux propriétaires ont alors décidé de le restaurer.                                                                                                            MONTAIGU, Montaigu aurait été homager par Arnaud de Rozet en 1265, Guiral de Baro en 1283 et Hugues de Campinhac en 1318. Dans la seconde moitié du XVe siècle, Raymond de Montaigu réside tantôt dans son \"château\" de Flaugnac, tantôt dans sa borie d'Escayrac qui deviendra ensuite le château de Montaigu.","architecture":"Le château est à plan rectangulaire avec des façades bâties en bel appareil de moellons calcaires conservent de nombreux vestiges de lancienne maison forte des XIIIe et XIVe siècles, dont deux portes en tiers-points ainsi que des fragments d'impostes et d'appuis appartenant à une fenêtre géminée médiévale. La tour-escalier circulaire a été ajoutée au XVe siècle au milieu de la façade principale.  Les Fenelon ont été à l'origine des embellissements effectués dans l'église et le château à la fin du XVe siècle après la guerre de Cent Ans. On a alors adopté un plan en vogue pour les maisons fortes en ajoutant au milieu de la façade principale une tour circulaire avec un escalier.Le château a été réaménagé au XVIIe siècle. Sur la façade côté sud ont été ouvertes des fenêtres avec croisées en pierre. Deux fenêtres à meneaux ont ensuite été bouchées. Une porte en arc brisé a été ouverte sur cette façade. Une cheminée a été mise en place dans la grande salle du premier étage.                                                                         MONTAIGU, les plus anciennes parties conservées peuvent dater de la seconde moitié du XIIIe siècle, d'après la forme de la fenêtre et le décor sculpté d'un chapiteau. L'édifice a fait l'objet d'une importante campagne de travaux après la guerre de Cent-Ans vers 1500, avec en particulier l'ajout d'une tour d'escalier et la construction d'un second logis. Le premier logis a été arasé au niveau du premier étage peut-être avant la Révolution ; les bâtiments portent également les marques de modifications apportées sans doute au XVIIIe siècle.","habitants":"Famille de Saint-Privat                                                                     Raymond de Montaigu\r\n        \r\n        \"","divers":"Château de Saint-Privat et de Montaigu grav 6 et 7 à Saint-Privat de Flaugnac","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_1.jpg","../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_2.jpg","../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_3.jpg","../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_4.jpg","../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_5.jpg","../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_6.jpg","../../jctruffet.com/image/image_46/46_St_Privat_Flaugnac_7.jpg"]},"Consult_chateau_formulaire76ba":{"id":"Consult_chateau_formulaire76ba","dept":"46","canton":"Lacapelle-Marival","commune":"Théminettes","nom":"St_Simon_Lot","type":"Château-fort","periode":"XV","histoire":"SAINT-SIMON Pas d'information historique.","architecture":"Saint-Simon de plan rectangulaire à trois niveaux flaqué de trois tours carrées dont la centrale plus importantes avec toit à quatre pans.                                                                                                   Le mas Boumegous à Théminettes.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Château de Saint-Simon et le mas de Boumegous à Théminettes gravure 5","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Simon_Lot_1.jpg","../../jctruffet.com/image/image_46/46_St_Simon_Lot_2.jpg","../../jctruffet.com/image/image_46/46_St_Simon_Lot_3.jpg","../../jctruffet.com/image/image_46/46_St_Simon_Lot_4.jpg","../../jctruffet.com/image/image_46/46_St_Simon_Lot_5.jpg"]},"Consult_chateau_formulaire3cff":{"id":"Consult_chateau_formulaire3cff","dept":"46","canton":"Souillac","commune":"Saint-Sozy-Meyronne Meyrac","nom":"St_Sozy","type":"Château","periode":"XV-XVI","histoire":"Quatre châteaux à Saint-Sozy, celui de St-Sozy , de Lachièze, de Meyronne et de Terrasse.                                                                                                                                                   SAINT-SOZY, cité en 1054 dans l'acte d'hommage rendu à l'évêque de Cahors par un certain de Bosc, vicomte de Saint-Cirq de Calvignac, à côté de Brassac, Montvalent, Creysse, Cazillac et Souillac, fief acquis au siècle suivant par le vicomte de Turenne, Aucun texte ne mentionne en revanche le repaire de Lachièze avant le XVIe siècle, sans doute en raison d'un changement de nom après l'installation des nouveaux occupants. Le repaire aurait auparavant appartenu aux Cosnac.                                                                                                                   LACHIEZE, une famille de marchands du Bas-Limousin, venus à Saint-Sozy au service du vicomte de Turenne, font bâtir une chapelle dans l'église paroissiale dès 1470. En 1552, Jean Lachièze fait reconnaissance au vicomte pour le repaire de Lachièze , où la famille se maintient, semble-t-il, jusqu'au XVIIIe siècle, la propriété offre 3 gîtes à la location saisonnière. Réhabilitée en 2016, lautre bâtisse appelée « La Tour des Dames de Mirepoix » abrite le 3ème gîte, qui serait un ancien observatoire fortifié sur la boucle de la Dordogne et la vallée environnante.                                                                                                                                            MEYRONNE, ancienne résidence dété des Evêques de Tulles qui se reflète dans les eaux limpides de la Dordogne.                                                                                                       TERRASSE  le village de Meyronne a gardé toute son authenticité avec ses maisons et son château : ancienne résidence dété des Evêques de Tulles qui se reflète dans les eaux limpides de la Dordogne. Après avoir traversé des siècles, ce château transformé en hôtel restaurant 3 étoiles, situé au cur de la vallée de la Dordogne à deux pas de Rocamadour, Padirac, Sarlat, est le lieu idéal pour vos excursions. Transformé en hôtel restaurant par Françoise et Gilles  Liebus.","architecture":"St-Sozy, jadis ces trois communes n'en formaient qu'une seule. Meyronne et Saint Sozy sont deux villages situés de part et d'autre de la Dordogne à quatre kilomètres à l'Ouest de Creysse. Mayrac est un hameau à trois kilomètres au Nord de la Dordogne. La tour principale peut être datée, d'après ses caractères constructifs, de la fin du XIIe ou du début du XIIIe. Les parties les plus anciennes du logis actuel ne sont pas antérieures au XVIe siècle, avec des adjonctions du  XVIIe siècle.  \r\n Meyronne date du XVe siècle, Saint-Sozy est un village de caractère situé au bord de la Dordogne. Il conserve, un peu à l'écart du bourg, une belle maison forte dont la construction remonte au XIVe siècle. \r\n Mayrac  est un hameau à trois kilomètres au Nord de la Dordogne.  possède  un château du XVe siècle.                                                                                                                      Lachièze château du XIVe siècle, composée de deux bâtisses. Deux sont abrités dans la bâtisse principale qui fut fortifiée par deux tours carrées. Ils sont notamment desservis par une tour ronde comportant lescalier à vis.                                                                                                                      Meyronne date du XVe siècle, le château aujourd'hui transformé en hôtel restaurant \" La  Terrasse\" En devenant Hôtel de collection, le château n'a rien perdu de son charme d'antan. Il a conservé son âme, sa noblesse, et son authenticité. L'architecture, en pierre, à l'âme authentique révèle toute la noblesse de cette bâtisse. D'un très bel escalier en pierre en colimaçon, on rejoint les chambres confortables, dans le respect des traditions.","habitants":"Famille de Jean Lachièze\r\n        \r\n        \r\n        \"","divers":"Château de Lachièze gravure de 1 à 4, de Meyronne grav 3,  la Terrasse de 4 à 8 et le manoir gravure 9","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Sozy_1.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_2.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_3.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_4.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_5.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_6.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_7.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_8.jpg","../../jctruffet.com/image/image_46/46_St_Sozy_9.jpg"]},"Consult_chateau_formulaire8fb7":{"id":"Consult_chateau_formulaire8fb7","dept":"46","canton":"Carjac","commune":"Saint-Sulpice","nom":"St_Sulpice","type":"Château","periode":"XIII-XVI","histoire":"SAINT-SULPICE, château de Saint-Sulpice: imposant château aménagée au XVIe siècle par la Famille Hébrard de Saint-Sulpice construit sur les ruines d'un édifice primitif médiéval. Aujourd'hui disparu, il subsiste les fondations de cette place forte qui a contribué à la prospérité du village et de ses alentours ainsi qu'à la renommée de l'abbaye de Marcilhac-sur-Célé. Originaires de Cajarc, les Hébrard entrent en possession de Saint-Sulpice à la fin du XIIIe siècle, par héritage de Ramond Delpech, puis par achat des parts de la seigneurie que possédait l'abbé de Marcilhac qui en reste le suzerain ; en 1405, Arnaud d'Hébrard recueille l'héritage des Lapopie à Saint-Cirq et Coanac, par son mariage avec Marguerite de Lapopie . Raymond Hébrard, seigneur de Saint-Sulpice et baron de Labastide Froutonière (Labastide-Murat) tient Saint-Sulpice avec toutes juridictions lors du dénombrement de 1504. Son petit-fils Jean III Hébrard de Saint-Sulpice épouse Claude de Biron en 1553 ; quand ils sont en Quercy, ils résident à Coanac ou à Saint-Sulpice  ; Jean III meurt dans son château de Saint-Sulpice en 1581. Vendu comme bien national en l'an II de la Révolution, il fut livré à la démolition par son nouveau propriétaire. Le château que Jean d'Hébrard et Claude de Biron avait transformé en une belle demeure Renaissance, s'enfonça dans l'oubli, pillé puis saccagé. Au XIXe siècle, les descendants d'une branche collatérale des Hébrard de Saint Sulpice reprirent les lieux ruinés. Au début du XVIIe siècle, Saint-Sulpice passe par alliance aux Crussols d'Uzès qui délaissent le château ; un ensemble de peintures est vendu et installé en 1780 au château de la Pannonie. A la Révolution, le château est acheté par divers particuliers qui démolissent les bâtiments pour en vendre les pierres.","architecture":"Le château de saint-Sulpice  fut établi à partir d'un édifice primitif médiéval qui verrouillait, à cet endroit, la vallée du Célé. Cette place forte fut aménagée au XVIe siècle par les Saint Sulpice en une demeure somptueuse réputée. Les constructions en pierre de taille conservées peuvent dater en partie au moins, du XIII e ou au XIVe siècle. Il n'en reste que quelques pans de murs et éléments d'architecture, en effet, la demeure fut rasée au XIXe siècle pour permettre la construction d'une maison de style balnéaire aujourd'hui disparue.\r\n MH : vestiges du château médiéval avec sa salle voûtée, les éléments de remparts restants; la porte d'entrée de la maison d'habitation et la porte située au premier étage Un logis accolé à l'actuelle terrasse avait été édifié en 1904 à la demande du marquis d'Hebrard de Saint-Sulpice par Anatole Bienaimé, architecte qui créa près d'une centaine de villas au Touquet-Paris-Plage. L'édifice, peu après sa construction, a connu de nombreux problèmes structurels. En grand état de vétusté, il a été démoli en 1982.","habitants":"Famille   des Hébrard  \r\n        \r\n        \"","divers":"Château de Saint-Sulpice","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Sulpice_1.jpg","../../jctruffet.com/image/image_46/46_St_Sulpice_2.jpg","../../jctruffet.com/image/image_46/46_St_Sulpice_3.jpg","../../jctruffet.com/image/image_46/46_St_Sulpice_4.jpg","../../jctruffet.com/image/image_46/46_St_Sulpice_5.jpg","../../jctruffet.com/image/image_46/46_St_Sulpice_6.jpg"]},"Consult_chateau_formulaire4512":{"id":"Consult_chateau_formulaire4512","dept":"46","canton":"Lacapelle-Marival","commune":"Terrou","nom":"St_Thamar","type":"Manoir","periode":"XVII","histoire":"SAINT-THAMAR, le château de Saint-Thamar a été édifié au début du XVIIe siècle par les Colomb, famille de maîtres verriers installés à Terrou vers 1510. Ils sont arrivés dans la Quercy en 1469. La branche des Colomb de Saint-Thamar est devenue protestante. Thamar de Colomb, seigneur de Saint-Thamar, marié avec Françoise d'Escayrac de Malaval en 1687, s'est converti au catholicisme. Le corps principal du bâtiment a été en grande partie reconstruit au XVIIIe siècle. Le château a passé la Révolution sans dégâts car François de Colomb de Saint-Thamar est maire de Terrou de 1800 à 1806, puis de 1808 à 1831, et enfin de 1859 à 1870. Jacques Félix de Colomb de Saint-Thamar meurt sans héritier en 1873. Sa sur Marguerite Louise Françoise Adeline s'était marié en 1822 avec Balthazar Joachim de Lachièze de Briance. La famille  a hérité du château en 1873. Jacques de Gaches de Venzac, fils de Pierre de Gaches de Venzac et de Jeanne de Lachièze de Briance (1868-1918), héritier par sa mère du château, est tué en 1918 pendant la Première Guerre mondiale. Le château est vendu par sa sur en 1934 aux Soulié, famille parisienne. La division Das Reich de l'armée allemande y a causé des dommages  avec un début d'incendie pendant la seconde guerre mondiale car le village de Terrou a été une base pour le maquis de la région. Le village a reçu la médaille de la Résistance. Les Soulié ont vendu le domaine en 1956. L'édifice est inscrit au titre des monuments historiques le 17 juin 1975 aujourd'hui propriété du général Pariselle.","architecture":"Saint-Thamar, l'édifice a été bâti pour les Colomb, une famille de gentilshommes verriers, au début du XVIIe siècle, mais le bâtiment ne sera pas habité. Des parisiens durant la seconde guerre mondiale, le château subira des dommages commis par l'armée allemande. La guerre terminée, les Soulié y résideront jusqu'en 1956, date à laquelle les propriétaires actuels achetèrent le domaine. le manoir d'origine dont la pierre à gardé sa belle couleur blonde. La tour ronde actuelle dont la hauteur  ne dépasse pas celle de la façade, à remplacé une ancienne échauguette au sud-Est. Le logis se compose de deux corps en L , le corps principal a été largement remanié au XVIIIe siècle. Les couvertures du château sont en lauzes de schiste, ainsi que celle du pigeonnier, alors que les bâtiments agricoles sont couverts en tuile canal. Le parc, aménagé après 1956, a remplacé un jardin à la française disparu.","habitants":"Famille des Colomb\r\n        \r\n        \"","divers":"Château de Saint-Thamar à Terrou","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Thamar_1.jpg","../../jctruffet.com/image/image_46/46_St_Thamar_2.jpg","../../jctruffet.com/image/image_46/46_St_Thamar_3.jpg","../../jctruffet.com/image/image_46/46_St_Thamar_4.jpg"]},"Consult_chateau_formulaire8f37":{"id":"Consult_chateau_formulaire8f37","dept":"46","canton":"Luzech","commune":"Saint-Vincent-Rive-d","nom":"St_Vincent_Rive_Olt","type":"Château","periode":"XVI","histoire":"ST-VINCENT, maison Guilhou et maison Peindariès, du XVIe siècle                                              famille Guilhou (maison Guilhou du XVIe siècle)\r\nJean-Baptiste Marcenac, acteur de théâtre et de télévision\r\nLéon Lafage, écrivain, né à Saint-Vincent-Rive-d'Olt en 1874\r\nJean-Michel Agar, homme politique du Premier Empire.","architecture":"Le château, comprend deux tours carrées.","habitants":"Famille Guilhou \r\n        \r\n        \"","divers":"Château de Saint-Vincent","gps":"","images":["../../jctruffet.com/image/image_46/46_St_Vincent_Rive_Olt_1.jpg","../../jctruffet.com/image/image_46/46_St_Vincent_Rive_Olt_2.jpg","../../jctruffet.com/image/image_46/46_St_Vincent_Rive_Olt_3.jpg"]},"Consult_chateau_formulaired1fe":{"id":"Consult_chateau_formulaired1fe","dept":"46","canton":"Martel","commune":"Strenquels","nom":"Strenquels","type":"Château","periode":"XIV-XIX","histoire":"Trois châteaux à Strenquels celui de Langlade, de la Garrigue et  de Sainte-Tulle.                                                                       LANGLADE,  en 1404, le vicomte de Turenne, Raymond VIII, anoblit une famille Delmas, alias de Comers, de Turenne, pour services rendus. Giral, fils de Guillaume et de Guillelma de Comers, est sans doute à lorigine du fief et repaire de Langlade. Bernard de Vassignac épouse Antoinette de Comers en 1547 qui lui apporte Langlade, puis en 1571, Marguerite de Vaulx, ils auront dix enfants, dont Pierre, sieur de Langlade, né en 1547, mort en  1632. Le château passe à la famille de la Serre. Dès 1662, Léon de La Serre veuf de Jeanne-Françoise de Cosnac, se dit sieur de Langlade. Son héritier, Jean Louis Ignace de la Serre, sieur de Langlade, vit à Paris, où il mène joyeuse vie. En 1695, ses biens sont saisis. Après la Révolution, le château est la propriété d'une branche des Dunoyer de Ségonzac.                                                                                                                                    Ste-TULLE  une famille de la petite noblesse, les Ratois, sieurs de Lespinasse et possesseurs du moulin de la Tulle. Les Ratois sallient avec les Vassignac de Langlade, les La Boudie de Besse (Louchapt), et les Vayrac.Ces protestants, peut-être mal à laise dans une région catholique, vendent,le 6 juin 1647, une partie de leur seigneurie, à Jean Montmaur, sieur de Lauleyrie, lieutenant particulier de la sénéchaussée de Martel. Cependant, ils habitent encore le château, en 1663. Jean Joseph Tiburce Montmaur vend son domaine de La Tulle, avec le   moulin à Bertrand Labrunie. Les Labrunie traversent la Révolution sans trop dencombre. En 1840, la  propriété est acquise par les aïeux des propriétaires actuels.    L'édifice a subi, à la fin XIXe siècle, une restauration du style Viollet-le-Duc. Un logis surmonté d'une toiture à la Mansard jouxte une tour ronde munie d'une guette en encorbellement. Trois hautes cheminées crénelées ornent la toiture d'ardoise.                                                                                    LAGARRIGUE  Style renaissance du XIXe siècle, Ancien pavillon de chasse néo-classique.","architecture":"manoir de Langlade du XVe siècle après avoir été proche de la ruine, il est composé de 2 ailes en retour d'équerre restaurées au XXe siècle. La façade nord est flanquée d'une tour carrée couronnée de mâchicoulis et son extrémité est cantonnée d'une tour ronde abaissée. Des baies néo-gothiques rythment les deux corps de logis.                                                                           Lagarrigue  château de style néo classique renaissance à trois niveaux avec pavillons sur flanc latéral légèrement saillant , l'ensemble au même niveau avec toit en croupes.                                                                                 Ste-Tulle fut édifié  à la fin du XVIe siècle. L'édifice a subi, à la fin du XIXe siècle, une restauration du style Viollet-le-Duc. Un logis surmonté d'une toiture à la Mansard, jouxte une tour ronde munie d'une guette en encorbellement. Trois hautes cheminées crénelées ornent la toiture d'ardoise.","habitants":"Famille Delmas                                                                                      Famille de Jean Montmaur\r\n        \r\n        \r\n        \"","divers":"Château de Lagarrigue  gravure 1 et 2, de Langlade gravure 3 à 6 , et de Sainte-Tulle 8 et 9 à Strenquels.","gps":"","images":["../../jctruffet.com/image/image_46/46_Strenquels_1.jpg","../../jctruffet.com/image/image_46/46_Strenquels_2.jpg","../../jctruffet.com/image/image_46/46_Strenquels_3.jpg","../../jctruffet.com/image/image_46/46_Strenquels_4.jpg","../../jctruffet.com/image/image_46/46_Strenquels_5.jpg","../../jctruffet.com/image/image_46/46_Strenquels_6.jpg","../../jctruffet.com/image/image_46/46_Strenquels_7.jpg","../../jctruffet.com/image/image_46/46_Strenquels_8.jpg","../../jctruffet.com/image/image_46/46_Strenquels_9.jpg"]},"Consult_chateau_formulaire05b9":{"id":"Consult_chateau_formulaire05b9","dept":"46","canton":"Puy-L","commune":"Soturac","nom":"Ségadènes","type":"Forteresse","periode":"XIV-XV","histoire":"SEGADENES  quatrième quart du XVe siècle, aucune mention du moulin, du repaire ou du fief n'est repérable avant le XVe siècle. Seul indice ténu, le moulin situé  en aval de Ségadènes sur la Thèze (3 km), mais déjà en Agenais, porte le nom singulier de Frésapa, nom que l'on retrouve également près de Saint-Sylvestre sur Lot, associé à un moulin et à un château implanté sur les berges du Lot. Ces deux toponymes pourraient se rapporter au lignage de Jeanne Frésapa, deuxième femme de Pierre Duèze, frère du pape Jean XXII et vicomte de Carmaing. Les de Jas ou d'Ajas, famille de forgerons originaire des Pyrénées, sont les premiers occupants connus. On sait qu'ils s'implantèrent après la guerre de Cent Ans à Ségadènes où ils établirent une mouline à fer (forge). Dans la même fonction de maître de forge, leur succéda au début du XVIIe siècle Pierre Durieu de Séverac, seigneur de Ségadènes, gentilhomme de la chambre du roi en 1622, fils de Marie de Jas de Ségadènes. Cette dernière est sans doute la même qu'une certaine \"Marie de Segadnos\" dont le nom a été relevé parmi les graffiti de la grosse tour du château de Bonaguil. Les Du Rieu puis, au XVIIIe siècle, les Briançon de La Montelle possèdent successivement la seigneurie. Ségadènes est mentionné comme fief dans la seconde moitié du XVIIIe siècle.    Château de Raymond de Saunhac du Fossat sieur de Piles et Anne de Jayan époux de Jeanne de Saunhac de Belcastel Père de Marguerite de Saunhac du Fossat; Jean de Saunhac du Fossat; Jeanne de Saunhac du Fossat et Guy de Saunhac du Fossat  baron, seigneur de Crussol.","architecture":"La tour de Ségadènes possède des fenêtres géminées à trumeau et à décor naturaliste conduisent à placer la construction de la maison forte du XIVe siècle. Une demi-croisée aménagée dans l'élévation sud témoigne de travaux réalisée après la guerre de Cent ans, peut-être dès la fin du XVe siècle, époque à laquelle ont sans doute également étaient mis en place le hourd et la toiture en pavillon ils auraient été refaits vers 1910. L'escalier en charpente a probablement été installé au XVIIe siècle tandis que l'essentiel de la distribution actuelle résulte d'aménagements réalisés au XIXe siècle.","habitants":"Famille de Pierre Duèze\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Forteresse de Ségadènes à Soturac","gps":"","images":["../../jctruffet.com/image/image_46/46_Segadenes_1.jpg","../../jctruffet.com/image/image_46/46_Segadenes_2.jpg","../../jctruffet.com/image/image_46/46_Segadenes_3.jpg","../../jctruffet.com/image/image_46/46_Segadenes_4.jpg","../../jctruffet.com/image/image_46/46_Segadenes_5.jpg","../../jctruffet.com/image/image_46/46_Segadenes_6.jpg"]},"Consult_chateau_formulaire3340":{"id":"Consult_chateau_formulaire3340","dept":"46","canton":"Espère","commune":"Séniergues","nom":"Séniergues","type":"Château","periode":"XVI","histoire":"SENIERGUES du XVIe siècle, remanié au  XIXe siècle, à l'origine un simple mas, la Poujade devient propriété d'une famille gourdonnaise, les d'Albareil, à la fin du Moyen Age, probablement. Ceux-ci en restent propriétaires jusqu'au début du XVIIIe siècle : François d'Albareil, mariée de Jacquette de Beaumont de Pierretaillade en 1535, est seigneur de Lapoujade et autres lieux ; en 1700, noble Pierre-Victor d'Albareil meurt dans son château de Lapoujade.\r\nUn inventaire des biens établi en raison des litiges survenus lors de la succession de François d'Albareil en 1635 fournit une description rapide du château.","architecture":"Le château de Séniergues  se compose d'une basse-cour fermée de hautes murailles, d'un grand corps de logis à deux caves, une cuisine, deux chambres dont les fenêtres sont grillées de fer, au premier étage une salle et une chambre, une tour ronde à un angle. La tour ronde, avec peut-être une amorce du corps principal, appartiennent à un édifice de la fin du XVIe siècle. Le pavillon carré devrait  daté de la seconde moitié du XVIIe siècle. Le corps principal a été en grande partie reconstruit au XIXe siècle. Cest un village typique du Quercy avec ses belles maisons de pierres aux toits de tuiles plates et pigeonniers qui se pressent autour de léglise Saint Martin du XIIe siècle, classée monument historique, et de la tour carrée, dernier vestige de lancien château. Le bourg de Séniergues forme un ensemble exceptionnel à ne pas manquer.","habitants":"Famille de François d'Albareil\r\n        \r\n        \r\n        \"","divers":"Château de Séniergues","gps":"","images":["../../jctruffet.com/image/image_46/46_Seniergues_1.jpg","../../jctruffet.com/image/image_46/46_Seniergues_2.jpg","../../jctruffet.com/image/image_46/46_Seniergues_3.jpg","../../jctruffet.com/image/image_46/46_Seniergues_4.jpg","../../jctruffet.com/image/image_46/46_Seniergues_5.jpg","../../jctruffet.com/image/image_46/46_Seniergues_6.jpg"]},"Consult_chateau_formulaire94b2":{"id":"Consult_chateau_formulaire94b2","dept":"46","canton":"Saint-Céré","commune":"Gintrac","nom":"Taillefer","type":"Vestiges","periode":"XIII","histoire":"TAILLEFER, le village de Gintrac a été assiégé par les Anglais au XIIIe siècle. Il existe très peu d'archives concernant les ruines du château de Taillefer qui domine le village. Il aurait été une commanderie de l'ordre des Templiers, et aurait également fait fonction de léproserie. On raconte que ses habitants communiquaient à l'aide de signaux solaires avec les seigneurs du château de Turenne dans la Corrèze au sud de Brive, et ceux du château de Castelnau-Bretenoux dans la vallée de la Dordogne. Pendant la Révolution française, le village de Loubressac a été rattaché à Gintrac.","architecture":"Les ruines du château de Taillefer, sur le Causse à l'extrémité du cirque de falaises, dominent le village et les rives de la Dordogne.  Depuis ces ruines, on peut « voir trois châteaux et sept clochers » ; les trois châteaux sont Castelnau-Bretenoux, Saint-Laurent-les-Tours, et Montal. Il permettait de surveiller la navigation sur la Dordogne, les mouvements sur les chemins de pélerinages dans la plaine et la circulation sur la route du sel. Il aurait put-être à l'origine un repaire du seigneur de Loubressac, futur baron de Gramat. Il aurait été une ancienne commanderie des Templiers, mais plus probablement une possession des Hospitaliers de Saint-Jean qui y auraient installés une léproserie. Pendant les guerres de religion il a été occupé par les troupes protestantes des capitaines Bessonies et Duras. La tradition locale dit que les religieuses présentes dans ces lieux auraient été mises dans des sacs avec des chats et précipitées dans le vide. Puis le château semble avoir été abandonné","habitants":"Les Templiers\r\n        \r\n        \"","divers":"Ruines du château de Taillefer à Gintrac","gps":"","images":["../../jctruffet.com/image/image_46/46_Taillefer_1.jpg","../../jctruffet.com/image/image_46/46_Taillefer_2.jpg","../../jctruffet.com/image/image_46/46_Taillefer_3.jpg"]},"Consult_chateau_formulaire1992":{"id":"Consult_chateau_formulaire1992","dept":"46","canton":"Biars-sur-Cère","commune":"Teyssieu","nom":"Teyssieu_Tour","type":"Château","periode":"XIII","histoire":"TOUR de TEYSSIEU, en 1232, le vicomte de Turenne a donné à deux de ses chevaliers, Hugues et Bertrand Bonafos, de Saint-Céré, l« Afar de Taishio » la seigneurie de Teyssieu contre l'engagement de ceux-ci à y construire une tour\r\nEn 1371, pendant la guerre de Cent ans, Teyssieu a été occupé par des troupes anglaises. Les Bonafos ont été les seigneurs du lieu jusqu'au début du XVI siècle Gontaut-Cabrerets marié à Françoise, héritière du fief. Leur fille unique et héritière, Jeanne de Gontaut, sur les conseils de François Ier, a épousé en 1540 Antoine de Noailles. Après sa mort, sa veuve, Jeanne de Gontaut a été nommé dame d'honneur de Catherine de Médicis avec la charge de gouvernante des filles du roi, en 1572. Après la mort de la reine mère, en 1589, Jeanne de Gontaud est revenu dans le Quercy, au château de Lentour, à Mayrinhac-Lentour, qui lui avait été donné en dot. Ses héritiers ont conservé le château jusqu'à sa vente, en 1649, à Jacques de Bonnafous, seigneur de Presque, issu d'une branche de la famille Bonafous des premiers seigneurs de Teyssieu. La famille de Bonnafous couverte de dettes a dû vendre le fief à Jean-Baptiste Molin, fermier-général de la vicomté de Turenne, en 1749. En 1876, la commune a acheté le château pour y installer une école. L'édifice a été classé au titre des monuments historiques le 8 juillet 1925.","architecture":"Entreprise peu après 1232, la tour de Teyssieu, en dépit d'une apparente unité, se présente comme un ouvrage composite dont l'édification a pu s'échelonner en de multiples campagnes sur une période assez longue.  Il ne s'agit donc pas d'un ouvrage daté avec certitude. Les différences observées dans le dessin des fentes d'éclairage des niveaux 1 à 3 large chanfrein bien dessiné pour la première, chanfrein maladroit et maigre pour la seconde, arêtes vives pour la troisième dissuadent même d'attribuer ces premiers niveaux à une campagne unique. Le niveau 4, pour sa part, n'est probablement pas antérieur à la fin du XIIIe siècle. Il pourrait être contemporain de l'enceinte fortifiée. La ceinture de mâchicoulis caractérisée par ses consoles à quatre ressauts et son arcature dont subsistent les sommiers, établie en contrebas de l'arase sommitale, incite à n'attribuer le dernier niveau qu'à la seconde moitié du  XIVe siècle, au plus tôt. Encore a-t-il fait lui-même l'objet d'un remaniement au niveau de la voûte sommitale.\r\nLa tour faisait partie d'un château qui comprenait au moins une cour et un logis qui a presque entièrement disparu. Les vestiges de l'enceinte ne paraissent pas antérieurs à la fin du XIIIe siècle ou au début du XIVe siècle.","habitants":"Famille de Bertrand Bonafos\r\n        \r\n        \"","divers":"Tour de Teyssieu","gps":"","images":["../../jctruffet.com/image/image_46/46_Teyssieu_Tour_1.jpg","../../jctruffet.com/image/image_46/46_Teyssieu_Tour_2.jpg"]},"Consult_chateau_formulaire69ed-2":{"id":"Consult_chateau_formulaire69ed-2","dept":"46","canton":"Espère","commune":"Thédirac","nom":"Thédirac","type":"Château","periode":"XIV","histoire":"THEDIRAC, si le nom est d'origine gallo-romaine, la première mention du village apparaît dans un acte de donation de la famille de Luzech datant de 1135 avec un chevalier de Thédirac du nom de Gaucelin. La seigneurie de Thédirac appartient à la famille de Luzech. La guerre de Cent ans, entre 1337 et 1453, fait de nombreux ravages dans le Quercy, même dans les petits villages, en entraînant une dépopulation aggravée par la peste de 1505-1506. L'activité rurale a repris rapidement la paix revenue. La famille de Luzech a conservé la seigneurie jusqu'à la fin du XVIe siècle. En 1566, Jean de Luzech a fait réparer le château de Thédirac pour que sa mère, Claude de Caumont, veuve de Guy de Luzech, puisse y résider.  La seigneurie élevée en baronnie est détachée de celle de Luzech en 1595 par Jean de Luzech pour la donner à sa mère, Jeanne de Prouillac, remariée à Gabriel de Guiscard, seigneur de Cavagnac. Elle a laissé la baronnie aux enfants de son beau-fils Pierre de Guiscard. Pendant les guerres de religion les Guiscard sont devenus protestants. Dans sa lutte contre les protestants révoltés, Louis XIII a commandé à Pierre de Bordeaux d'occuper le château. Son propriétaire, Gabriel de Guiscard, s'est opposé à cette occupation. Devant ce refus, le roi a envoyé une armée de 2 000 hommes avec 2 canons pour réduire le châtelain à l'obéissance. Les Guiscard de Cavagnac sont restés barons de Thédirac jusqu'en 1779, quand ils vendent la baronnie à Marc-Antoine de La Grange-Gourdon, marquis de Floirac et de Lavercantière. Le château est saisi à la Révolution et vendu comme bien national à la famille Delsol qui l'a conservé jusqu'en 1960. Le château a été brûlé en 1796 par les habitants qui sont pris de fureur contre le profiteur qui l'a acheté.","architecture":"THEDIRAC,  l'édifice sur une plateforme composé d'un corps de logis rectangulaire à trois niveaux couverts de toits à inclinaisons différentes, le plus imposant et la tour polygonale à quatre  niveaux à toit incliné  en un seul pan recouvrant également l'échauguette sur encorbellement                                                                                                                  SURGES  Le manoir de Surges du XVIIe siècle en pierre rénové, situé près de \"la vallée du Lot\" et \"Cahors\". Transformé en hôtel restaurant par madame Joélle Delille.","habitants":"Famille de Luzech\r\n        \r\n        \r\n        \"","divers":"Château de Thédirac gravure 1 et 2, l'hôtel de ville et le château de Surges gravure 4.","gps":"","images":["../../jctruffet.com/image/image_46/46_Thedirac_1.jpg","../../jctruffet.com/image/image_46/46_Thedirac_2.jpg","../../jctruffet.com/image/image_46/46_Thedirac_3.jpg","../../jctruffet.com/image/image_46/46_Thedirac_4.jpg"]},"Consult_chateau_formulairead13-2":{"id":"Consult_chateau_formulairead13-2","dept":"46","canton":"Gramat","commune":"Thégra_Padirac","nom":"Thégra","type":"Château","periode":"XVI","histoire":"THEGRA, en 1574, pris par Antoine de Malleville, lieutenant du capitaine protestant Bessonie. Antoine de Gozon est tué dans cette attaque et Jeanne de Valon est obligé d'épouser en secondes noces Antoine de Malleville, ils eurent deux enfants, dont un fils appelé Guyon. Antoine de Malleville a été tué en 1577. Il est remplacé par son lieutenant, Pierre de Lagrange, sieur de La Pannonie, pour garder le château, et s'est marié avec Jeanne de Valon dont il a un fils, avant dêtre tué en 1580. Jeanne de Valon est veuve pour la troisième fois .Elle se remarie alors en quatrièmes noces avec Henri des Ondes, seigneur catholique. Jeanne de Valon transmet la seigneurie de Thégra à sa petite-fille Jeanne de Gozon, dame de Thégra, mariée à Jean Gabriel de Gauléjac, d'où Jeanne Marquèse de Gauléjac, mariée en 1646, à Jacques-Victor de Touchebuf-Beaumond, comte de Clermont, baron de Gourdon, de Gramat, capitaine d'une compagnie de chevaux-légers en 1646, décédée en 1674. De ce mariage est né Anne de Touchebuf-Beaumond, née en 1648, mariée en 1670 avec Armand de Durfort, comte de Boissières et de Puycalvet, baron de Salviac,  après 1737. La seigneurie de Thégra est vendue en 1699 à deux frères, Louis et Jean de Lagarde. Ils l'ont revendu en 1731 à François Niocel, marchand de Saint-Céré. C'est ce dernier qui a fait la reconstruction et le réaménagement au XVIIIe siècle. Le château est vendu à la Révolution comme bien national à M. Lavaur. Il est habité en 1836 par Louis Lavaur. En 1848, il appartient à l'avocat Jean-Jacques Bergues marié à Catherine Fleur Félicie de Certain de la Meschaussée leur fille adoptive  Céline de la Méchaussée, s'est mariée en 1863 avec Gustave Calmels d'Artinsac, descendant des seigneurs de Montvalent. Le château est ensuite la propriété de leur fils, Alain Calmels d'Artinsac dans les années 1930. L'édifice est inscrit au titre des monuments historiques le 29 juin 1960.  Aujourd'hui propriété de monsieur Dartenset.                                                                                                                                                         A deux kilomètres au nord le château de PADIRAC sans information historique.","architecture":"Le château actuel a été bâti sur l'emplacement de l'ancien château après que le Quercy se fut libéré de l'occupation anglaise vers 1443. Thégra est devenu une forteresse protestante de 1574 à 1580.Les ouvertures actuelles, notamment les portes vitrées avec leurs balcons de fer forgé paraissent être de la deuxième moitié du XVIIe siècle, de même que la terrasse qui précède la façade nord, et son perron. La toiture à la Mansard est probablement de cette époque, de même que la suppression de l'étage de mâchicoulis dont il reste des traces sur la tour nord est. Le château de Thégra comprend un corps de logis rectangulaire, flanqué à ses angles nord-est et nord-ouest de deux tours rondes, une troisième contenant l'escalier à vis, est accolée à la façade sud, malgré l'absence de mâchicoulis le volume est séduisant. les fenêtres ont été remaniées dans la seconde moitié du XVIIe siècle. La maison forte de Padirac de plan rectangulaire à deux niveaux  toit en croupe avec une lucarne centrale deux tours rondes aux angles de la façade toit en poivrière et tourelle sur l'arrière.","habitants":"Antoine de Malleville\r\n        \r\n        \r\n        \"","divers":"Château de Thégra gravure 1 à 3 et de Padirac 4 à 6","gps":"","images":["../../jctruffet.com/image/image_46/46_Thegra_Padirac_1.jpg","../../jctruffet.com/image/image_46/46_Thegra_Padirac_2.jpg","../../jctruffet.com/image/image_46/46_Thegra_Padirac_3.jpg","../../jctruffet.com/image/image_46/46_Thegra_Padirac_4.jpg","../../jctruffet.com/image/image_46/46_Thegra_Padirac_5.jpg","../../jctruffet.com/image/image_46/46_Thegra_Padirac_6.jpg"]},"Consult_chateau_formulaire9a1a":{"id":"Consult_chateau_formulaire9a1a","dept":"46","canton":"Puy l","commune":"Touzac","nom":"Touzac","type":"Château","periode":"XV","histoire":"TOUZAC, le château à était transformé en hostellerie par monsieur Bouyou, pas d'autres information historique ni pour les autre édifices présentés.","architecture":"Touzac; le château se présente avec une grosse tour carrée toit à quatre pans accolé à un corps de logis rectangulaire.","habitants":"monsieur Bouyou,\r\n        \r\n        \"","divers":"Château à Touzac","gps":"","images":["../../jctruffet.com/image/image_46/46_Touzac_1.jpg","../../j
