                                                                                                                A quelque kilomètres au sud-est de Pradines le château de  la Roussille chambres d'hôtes.","architecture":"Mercuès, forteresse des XIIIe - XIVe siècles, le château fut bâti sur un promontoire rocheux dominant la vallée du Lot, il occupe un site remarquable d'où l'on découvre un magnifique point de vue. De 1626 à 1637 : l'évêque Pierre Habert, le relève de ses ruines et l'aménage en demeure de plaisance avec parcs et jardins en terrasses. Restauré, il a gardé son caractère défensif avec son chemin de ronde sur mâchicoulis, ses créneaux et ses tours d'angle à toits en poivrière. A partir de 1627, il fut restauré, transformé en château de plaisance.  A la Révolution, le château et le mobilier furent vendus comme biens nationaux.                     La Roussille de plan rectangulaire à trois niveaux avec deux gros pavillons saillants sur les extrémités.","habitants":"Monseigneur Briqueville de la Luzerne\r\n        \r\n        \r\n        \"","divers":"Forteresse de Mercuès et celui transformé en Ehpad gravure 8.","gps":"","images":["../../jctruffet.com/image/image_46/46_Mercues_1.jpg","../../jctruffet.com/image/image_46/46_Mercues_2.jpg","../../jctruffet.com/image/image_46/46_Mercues_3.jpg","../../jctruffet.com/image/image_46/46_Mercues_4.jpg","../../jctruffet.com/image/image_46/46_Mercues_5.jpg","../../jctruffet.com/image/image_46/46_Mercues_6.jpg","../../jctruffet.com/image/image_46/46_Mercues_7.jpg","../../jctruffet.com/image/image_46/46_Mercues_8.jpg"]},"Consult_chateau_formulaire1068":{"id":"Consult_chateau_formulaire1068","dept":"46","canton":"Puy-L","commune":"St-Martin le Redon","nom":"Mescalprès","type":"Tour","periode":"XIV","histoire":"MESCALPRES, la vallée de la Thèze dans laquelle se niche en rond semble avoir été occupée depuis les époques les plus reculées. Les fouilles archéologiques mettent au jour des vestiges des périodes du Paléolithique, du Néolithique et plus récemment, de l'âge de bronze. Une nature qui offre toutes les commodités, terres riches dans la vallée, bois giboyeux sur les coteaux, sources abondantes aux vertus très tôt reconnues  tout ceci explique cette occupation aux époques préhistorique et protohistorique. Cette occupation s'est naturellement poursuivie à l'époque gallo-romaine comme en témoigne la voie romaine qui traverse le village et qui relie Saint-Martin à Duravel. Cette voie romaine devient au Moyen-Âge le chemin des Auvergnats et n'est plus aujourd'hui qu'un sentier de randonnée. Du Moyen-Age subsistent l'église romane dont le clocher-tour a été surélevé à une époque postérieure, les tours du château de Guiral à Cazes-Marnhac, la tour gothique de Mescalprès dans les bois et les parties anciennes de certaines maisons du bourg dont l'aspect général est des XVIIe et XVIIIe siècles. Enfin, c'est de Saint-Martin qui s'étend jusqu'à son pied, que l'on peut le mieux contempler la puissante silhouette du château de Bonaguil, plus bel exemple de l'architecture militaire médiévale.","architecture":"La haute tour de Mescalprès était au XIVe siècle, avec celles de Guiral et   Marnhac, lune des tours construites par les chevaliers qui dépendaient alors du castrum de Pestilhac. La tour, que protégeait une enceinte aujourdhui disparue, forme un quadrilatère bâti en bel appareil de pierres calcaires comptant cinq niveaux. La porte d'accès à lEst, formée dun arc brisé bordé dun chanfrein, est placée au premier étage selon un principe défensif commun aux tours médiévales  desservies par un escalier extérieur amovible. Au niveau supérieur, un autre arc comme celui de la face septentrionale ouvrait sur une galerie en bois.  Les éléments défensifs, constitués darchères cruciformes pattées finement incisées dans la maçonnerie, sont disposés sur les côtés les plus vulnérables, à lOuest et au Sud. On a par contre privilégié à des fins d'habitation lélévation nord, sans doute mieux protégée que les autres, en créant deux fenêtres dagrément ornées darcs trilobés.  Au détour d'un chemin boisé sur une motte dominant St-Martin le Redon, cette tour de guet gothique du XIVe siècle dresse sa haute silhouette solitaire au milieu d'une forêt de chênes et de châtaigniers.   Elle fut sans doute une de ces innombrables tours de chevaliers affiliés au castrum de Pestilhac. Elle semble être le vestige dun imposant château fort dont les ruines émergent du lierre çà et là dans le bois. Un site plein de mystère en ce matin dautomne, une tour sans sommet qui doit être, en toute évidence, le meilleur moyen datteindre enfin le ciel.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"La tour de Mescalprès","gps":"","images":["../../jctruffet.com/image/image_46/46_Mescalpres_1.jpg","../../jctruffet.com/image/image_46/46_Mescalpres_2.jpg","../../jctruffet.com/image/image_46/46_Mescalpres_3.jpg","../../jctruffet.com/image/image_46/46_Mescalpres_4.jpg","../../jctruffet.com/image/image_46/46_Mescalpres_5.jpg"]},"Consult_chateau_formulaire527e":{"id":"Consult_chateau_formulaire527e","dept":"46","canton":"Gourdon","commune":"Milhac","nom":"Milhac","type":"Château","periode":"XV","histoire":"MILHAC, le château de Villeneuve de Milhac fut construit après que « le château Vieux » fut rasé par une offensive anglaise au cours de la guerre de Cent Ans.  Le château de Milhac est le monument le plus remarquable de la commune. Il est situé au bord d'une grande falaise. Milhac a appartenu à la famille de Gourdon. Guillaume de Gourdon, coseigneur de Gourdon, possédait la seigneurie de Salviac. Il avait eu deux filles. La première, Marie, s'était mariée avec le Limousin Aymeric de Malemort. Elle hérita de la seigneurie de Salviac. La seconde, Hélène de Gourdon, s'était mariée avec le Quercinois Gisbert de Thémines. Elle hérita de la baronnie de la Bouriane. La seigneurie passa alors dans la famille de Thémines, au XIIIe siècle. Cet héritage avait amputé du territoire donné aux cisterciens en 1242 pour construire l'abbaye Sainte-Marie de Gourdon, ou abbaye Nouvelle. Le château vieux protégeant Villeneuve, village neuf du XIIIe siècle, a été détruit par les Anglais pendant la guerre de Cent Ans. Guillaume de Thémines décida de la construction du château de Milhac après cette guerre, à la fin du XVe siècle. Le nom du château s'est imposé sur celui de Villeneuve. \r\nComme autour de tous les mythes féodaux et selon la légende, il aurait des passages secrets vers les châteaux de Gourdon, de Rocanadel, Masclat et Fénelon.","architecture":"Le château de Milhac est le monument le plus remarquable de la commune.  La nouvelle forteresse comprenait 10 tours et un logis de 40 pièces sur trois niveaux au sommet de la falaise dominant la vallée de la Relinquière. Devant le logis, une cour protégée par une enceinte entourée de fossés à laquelle on accédait par un pont-levis. Une autre cour, à l'avant du pont-levis était protégée par une enceinte. Malgré un incendie provoqué par la foudre en juin 2006, les anciennes tours sont restées intactes ; seule la partie reconstruite au XXe siècle a été détruite. Le château a été réhabilité et transformé en gîte,  La maison de Pierre de Jacques est construite comme un rempart de la place forte de cette bastide. Certaines maisons furent enjolivées à partir du démembrement et de l'incendie dont le château, comme beaucoup d'autres par ici firent les frais. La maison de Pierre de Jacques est remodifiée autour d'anciennes tours épargnées et qui portent le nom de leur nouveau propriétaire.","habitants":"Famille de Gourdon\r\n        \r\n        \r\n        \"","divers":"Château de Milhac","gps":"","images":["../../jctruffet.com/image/image_46/46_Milhac_1.jpg","../../jctruffet.com/image/image_46/46_Milhac_2.jpg","../../jctruffet.com/image/image_46/46_Milhac_3.jpg","../../jctruffet.com/image/image_46/46_Milhac_4.jpg","../../jctruffet.com/image/image_46/46_Milhac_5.jpg","../../jctruffet.com/image/image_46/46_Milhac_6.jpg"]},"Consult_chateau_formulaire8529":{"id":"Consult_chateau_formulaire8529","dept":"46","canton":"Martel","commune":"Gluges","nom":"Mirandol_Gluges","type":"Château","periode":"XV-XVII","histoire":"MIRANDOL, le château de Mirandol est situé sur la falaise qui domine le cirque,  appelé de Montvalent, bordé par la Dordogne, dans laquelle vient se jeter la Tourmente. Le premier témoignage sur Mirandol, proviendrait de labbaye de Tulle qui prétend être propriétaire de Mirandol, Creysse et Saint Michel. Au XIIe siècle, le vicomte de Turenne est appelé seigneur de Mirandol, il en a la justice et a dù confier la garde à un chevalier. En 1335, la famille de Mirandol va senrichir par le mariage de Guérin II et de Catherine Fabri, bourgeoise, héritière de biens à Martel. Dès le XVe siècle, Étienne Faure, bourgeois de Martel et seigneur de Mirandol, rend hommage pour le château de Mirandol et le repaire de La Fon. Les Faure sont des personnages opulents et ont la plus haute tour de Martel, dans la maison, près de la porte du Sers. Mais le dernier dentre eux, Claude Faure na que deux filles. Lune delles, Marie Pascale, épouse en 1686, Joseph Laporte de Lissac, près de Brive. Puis, Mirandol, tombé dans la part de Marie Pascale, passe à Germain de Meynard, son gendre. La part passée aux Lasteyrie du Saillant, est vendue par le marquis Urbain de Lasteyrie, en 1795, à Etienne Meynard, son cousin. Cest probablement une vente fictive, Urbain de Lasteyrie ayant émigré. Elle est destinée à faire échapper la propriété de Mirandol à la vente des biens des émigrés. Durant la Révolution, les Meynard sont à Mirandol. Gabriel Joseph de Meynard sinstalle à Caupeyre, avec son épouse Elisabeth de Pignol, tandis que Suzanne de Meynard, sa soeur, qui avait épousé en lan IV, Jean Pierre Louradour, sinstalle à Mirandol.","architecture":"Au XVIIe siècle, le château actuel a succédé aux vestiges d'une forteresse dont il ne subsiste que des pans de murailles. Deux ailes sont en retour d'équerre sur le bâtiment central qui est de plan rectangulaire. L'aile nord accolée à une tour carrée contient une vaste cuisine pavée de galets. Une tour demi-ronde flanque l'angle sud-ouest de l'aile méridionale. De l'ancien repaire noble subsiste, au-dessous du niveau actuel du sol, une belle porte en arc brisé.                                                                                 \r\nManoir à Gluges  de plan rectangulaire à trois niveaux avec lucarnes  sur toit en croupes et des tourelles aux angles toits en poivrières.","habitants":"Famille de Meynard\r\n        \r\n        \"","divers":"Château de Mirandol et de Gluges gravure 3-4 à Gluges","gps":"","images":["../../jctruffet.com/image/image_46/46_Mirandol_Gluges_1.jpg","../../jctruffet.com/image/image_46/46_Mirandol_Gluges_2.jpg","../../jctruffet.com/image/image_46/46_Mirandol_Gluges_3.jpg","../../jctruffet.com/image/image_46/46_Mirandol_Gluges_4.jpg"]},"Consult_chateau_formulaire4ac7":{"id":"Consult_chateau_formulaire4ac7","dept":"46","canton":"Saint-Céré","commune":"Saint-Jean-Lespinasse","nom":"Montal","type":"Château","periode":"XVI","histoire":"MONTAL, au début du XVIe siècle, la seigneurie de Saint-Pierre, est acquise par les seigneurs de Balsac dEntraygues. Jeanne de Balsac, épouse du seigneur de La Roquebrou, Amaury de Montal, y entreprend dimportants travaux à partir de 1519. construit entre 1519 et 1534 par Jeanne de Balsac d'Entraygues, dame de Montal. Jamais achevé, ce chef-d'uvre de la Renaissance se distingue par la  richesse de ses sculptures. Au repaire médiéval, succède un château de plaisance, pourvu dune décoration sculptée exceptionnelle. Les deuils successifs qui affectent Jeanne de Balsac, veuve depuis 1510, mettent un terme à ses projets et, dès 1534, les travaux sont suspendus. Le  nouveau château, portant désormais le nom de la dame de Montal, ne sera jamais terminé : deux ailes seulement sur les quatre prévues sont achevées. Les deux fils de Jeanne et dAmaury de Montal disparus avant leur mère, morte en 1559, cest le fils du cadet Dordet, Gilles, qui reçoit la charge de la seigneurie. Celle-ci passe par alliance avec François de Pérusse dEscars, puis à diverses branches collatérales au cours des XVIIe et XVIIIe siècles. En 1771, la seigneurie est vendue au comte de Plas de Tanes.Proposé comme bien national en 1793, le château, abandonné et en fort mauvais état, ne trouve pas dacquéreur. Il est restitué au comte à son retour démigration. Utilisé comme auberge, il est acheté par un banquier de Saint-Céré, puis par un marchand de biens, Macaire du Verdier, en 1879  Maurice Fenaille, réussit enfin à acquérir le château en 1908.  En 1913, en fait don à lEtat, restauré et  meublé, avec une réserve dusufruit pour lui et ses enfants.","architecture":"Le site de Montal sur lequel Jeanne de Balsac fit édifier un nouveau château à partir de 1519 était éloigné de quelques centaines de mètres du bourg de Saint-Jean-Lespinasse, où se trouvait un autre château, dit de Saint-Jean,  la conception architecturale correspond à ce nouvel art de vivre que découvrait la noblesse française au début du XVIe siècle. Même si les façades nord et ouest évoquent encore les châteaux forts, par la présence de trois tours dangles massives avec corbeaux sculptés, dune échauguette desservant la tour descalier, de quelques meurtrières et de douves, cette austérité ne met que mieux en valeur les logis ouvrant sur la cour intérieure, orientés au sud-est et sud-ouest, face au massif des Césarines. les deux corps de logis placés en équerre sont desservis par un escalier monumental placé dans un pavillon rectangulaire dominant les bâtiments. Deux galeries à portiques devaient initialement fermer la cour intérieure, à lest et au sud-est, comme lattestent la présence dune porte sculptée au premier étage de laile nord-est et des pierres dangle en saillie à lextrémité gauche de la façade sud-est. La distribution des pièces, identiques sur les trois niveaux, répond à un souci de confort et dintimité  nouveau, tout en privilégiant la fonction de prestige et dapparat grâce à lescalier somptueusement décoré et largement éclairé. Au rez-de-chaussée et au premier étage, chacun des trois appartements est organisé autour dune grande chambre avec garde-robe et cabinet de retrait placés dans la tour. Deux vastes salles occupent une partie de laile nord-ouest. Celle du premier étage était selon toute vraisemblance la pièce de réception.","habitants":"Famille de Balsac dEntraygues\r\n        \r\n        \"","divers":"Château de Montal","gps":"","images":["../../jctruffet.com/image/image_46/46_Montal_1.jpg","../../jctruffet.com/image/image_46/46_Montal_2.jpg","../../jctruffet.com/image/image_46/46_Montal_3.jpg","../../jctruffet.com/image/image_46/46_Montal_4.jpg","../../jctruffet.com/image/image_46/46_Montal_5.jpg","../../jctruffet.com/image/image_46/46_Montal_6.jpg","../../jctruffet.com/image/image_46/46_Montal_7.jpg","../../jctruffet.com/image/image_46/46_Montal_8.jpg"]},"Consult_chateau_formulaire4eb9":{"id":"Consult_chateau_formulaire4eb9","dept":"46","canton":"Carjac","commune":"Montbrun","nom":"Montbrun_Lot","type":"Vestiges","periode":"XIII","histoire":"MONTBRUN, le château de Montbrun surveille, du haut dun promontoire escarpé, la rive droite du Lot et le petit bourg accroché à ses pentes. Demeure fortifiée des puissantes familles des Gourdon puis des Barasc, il conserve son haut donjon du XIIIe siècle et un logis du XVe siècle ceinturés dun rempart fortifié. En 1223, Bertrand de Gourdon cédait à Dorde de Barasc, seigneur de Béduer, le fief de Montbrun dont la moitié fut ensuite acquise avant 1342 par  les Cardaillac-Brengues. Peu après, la seigneurie fut divisée entre Pierre Duèze, frère du pape Jean XII, et Hugues de Cardaillac, neveu de ce dernier. Le château, pris lors de la guerre de Cent Ans par la compagnie de routiers  commandée par Ramon del Sort à la solde des Anglais, fut délivré par le  comte dArmagnac en 1396.  Château moderne en ruines construit en briques par Jean-Baptiste de Senaux, membre du Parlement de Toulouse (1560) dont les fils et petits fils furent eux aussi membres de ce parlement. Confisqué en 1794, le château changea de propriétaire à plusieurs reprises. Lédifice, relevé de la ruine au lendemain de la guerre, fut incendié en 1578  durant les guerres de Religion. Les Laurency acquirent le lieu en 1616 et aménagèrent au Sud une terrasse  sous laquelle ils créèrent une pièce largement ouverte sur la vallée, sorte de loggia couverte dune voûte darêtes, aux murs ornés de niches en plein cintre. On embrasse dici le large cingle de la vallée et le cirque du Saut de la Mounine sur la rive opposée du Lot.   Les La Prune, qui leur succédèrent par héritage en 1730, conservèrent la  demeure jusquà la Révolution. Après avoir appartenu à la famille de Jean XXII, vendu en 1965  à monsieur Louis Roussilhes architecte à la retraite.","architecture":"Montbrun, château fort en partie du XIIIe siècle, et en ruines qui surplombe un méandre du Lot, classée monument historiques en 1984. Situé au lieu dit Montbrun-le-Vieux, près de l'église Saint-Michel, il appartenait à une famille éponyme qui devint cathare. Le fief a été confisqué et réuni à celui de Roqueville au XIIIe siècle par le roi de France qui les donna à l'évêque de Toulouse qui l'a possédé pendant les siècles suivants. il est abandonné et pillé depuis une cinquantaine d'années,   la forteresse présente de puissantes murailles indiquant un ancien logis médiéval, un corps de logis semi-circulaire édifié au XVe siècle et lancien donjon de plan carré datant de la première moitié du XIIIe siècle. Il ne subsiste de cette imposante tour maîtresse, de tradition romane, que deux grands pans de mur situés au Nord et à lEst. Ces derniers, bâtis en grand appareil de blocs calcaires, possèdent quelques traces situant des aménagements intervenus à lintérieur de la bâtisse aux XVIIe, avant que le château ne soit laissé à labandon.","habitants":"Famille des Laurency\r\n        \r\n        \"","divers":"Château de Montbrun.","gps":"","images":["../../jctruffet.com/image/image_46/46_Montbrun_Lot_1.jpg","../../jctruffet.com/image/image_46/46_Montbrun_Lot_2.jpg","../../jctruffet.com/image/image_46/46_Montbrun_Lot_3.jpg","../../jctruffet.com/image/image_46/46_Montbrun_Lot_4.jpg","../../jctruffet.com/image/image_46/46_Montbrun_Lot_5.jpg","../../jctruffet.com/image/image_46/46_Montbrun_Lot_6.jpg","../../jctruffet.com/image/image_46/46_Montbrun_Lot_7.jpg"]},"Consult_chateau_formulaireb396":{"id":"Consult_chateau_formulaireb396","dept":"46","canton":"Puy-L","commune":"Montcléra","nom":"Montcléra","type":"Château-fort","periode":"XIV","histoire":"MONTCLERA, fut le siège d'une seigneurie créée au début en 1334 par le duc de Normandie, le futur Jean II, offre les terres de Montcléra pour services rendus à Arnaud de Commarque par démembrement de la juridiction royale de Cazals. Arnaud de Commarque a servi les papes Jean XXII et Clément VI. En 1346, par un accord entre le roi Philippe VI et l'évêque de Cahors, la terre de Montcléra est considérée comme la limite des juridictions royales et épiscopales. En 1368, la seigneurie est passé à Amalvin de Commarque dans un hommage à l'évêque de Cahors, qui est identifié comme Amalvin de Gironde  dans un nouvel hommage en 1391. La seigneurie subit des dommages pendant la guerre de Cent Ans. La seigneurie n'est réoccupée par les Gironde qu'en 1446.  En 1504 le château qui appartient à Jean de Gironde est cité pour la première fois dans un dénombrement. François de Gironde fait son testament en 1610 au profit de son fils, Brandelis et son petit-fils François sous la condition qu'ils portent les armes des Gironde et de Moncléra. Brandelis de Gironde est marié en 1605 avec Louise de Gontaut-Biron. La seigneurie de Montcléra et la vicomté de Lavaur sont élevées en marquisat par le roi Louis XIII, en 1616.   Le château reste dans la famille de Gironde jusqu'au XIXe siècle puis il passe à la famille Dupuy.\r\nLe château fait lobjet dune inscription au titre des monuments historiques depuis le 26 octobre 1925 alors que la porte d'entrée est classée depuis le 21 janvier 1929.","architecture":"Le château de Montcléra est un édifice du XVe siècle, remanié à la Renaissance. Au cours du dernier quart du XVe siècle, un nouveau parti architectural simposa en Quercy : un corps de logis rectangulaire, des tours rondes dans les angles et une tour en milieu de la façade abritant un escalier assurant laccès aux étages, mi-engagée sur la façade principale. La couronne de mâchicoulis, aujourdhui partiellement conservée, ceignait à lorigine le sommet de  lédifice afin den assurer la défense.  La cour du château était entourée par un mur denceinte doublé de  douves au Sud et à lOuest ; on les franchissait par un pont-levis installé  dans un châtelet construit au début du XVIIe siècle. Il présente essentiellement un corps de logis rectangulaire flanqué de tours rondes à mâchicoulis, dont une reçoit l'angle d'un imposant donjon carré portant une échauguette carrée et dont le grand comble est ajouré de fenêtres de la seconde renaissance. La façade pourvue de chaînes d'angle, est percée d'une porte cochère et d'une porte piétonne, toutes deux en plein cintre. L'ensemble est entouré d'un beau parc.","habitants":"Famille de Gironde\r\n        \r\n        \r\n        \"","divers":"Château de Montcléra","gps":"","images":["../../jctruffet.com/image/image_46/46_Montclera_1.jpg","../../jctruffet.com/image/image_46/46_Montclera_2.jpg","../../jctruffet.com/image/image_46/46_Montclera_3.jpg","../../jctruffet.com/image/image_46/46_Montclera_4.jpg","../../jctruffet.com/image/image_46/46_Montclera_5.jpg","../../jctruffet.com/image/image_46/46_Montclera_6.jpg"]},"Consult_chateau_formulaire5fc5":{"id":"Consult_chateau_formulaire5fc5","dept":"46","canton":"Luzech","commune":"Montcuq","nom":"Montcuq","type":"Vestiges-Tour","periode":"XII-XIV","histoire":"Plusieurs châteaux à Montcuq   dit aussi de Ventalays, celui de Charry (voir article), de Gayrac (voir article), les ruines du château fort de Penne.                                                                                                              MONTCUQ, Le fief  appartenait au XIIe siècle aux seigneurs de Gourdon de  Castelnau et relevait du comte de Toulouse Raymond VI qui octroya à la communauté sa première charte de coutumes. Durant la croisade des Albigeois, Montcuq fut comme lensemble du Bas-Quercy le siège de sanglants combats au cours desquels les troupes de Simon de Montfort occupèrent et pillèrent le site. En 1229, le traité de Paris obligea Raymond VII, comte de Toulouse, à raser les fortifications de la cité mais on en ignore la véritable issue : la tour fut de toute évidence épargnée de la destruction.  Après la mort en 1271 dAlphonse de Poitiers qui avait reçu le comté de Toulouse en héritage de sa femme Jeanne, Montcuq entra définitivement dans le domaine de la couronne de France.  Ce donjon était à l'origine conçu pour être la résidence des seigneurs de Montcuq ; il était peut-être complété par un logis plus spacieux, mais dont on n'a aucun vestige. Il servit en tout cas à de nombreuses reprises de lieu de refuge et de défense au cours du Bas Moyen-Age.                                                                                           Chateau fort de PENNE, un Pierre de Penne, de la juridiction de Montcuq, est mentionné en 1242. Le château aurait appartenu à la famille de Saint-Geniez, dont l'un des membres devient chapelain du pape Jean XXII avant d'être nommé patriarche d'Aquilée ; après la guerre de Cent ans, il appartient aux Guiscard : avant 1451, Blaise de Guiscard et de Penne, seigneur de Lasbouigues, a donné le fief à des paysans, les Vialar, son repaire de Penne  ; en 1467, le sénéchal du Quercy tente d'imposer aux Vialar de s'armer et de fournir des hommes d'armes sous prétexte qu'ils demeurent dans une maison noble. Pons Guiscard, seigneur des Boigues, dénombre pour Penne en 1504 . Penne passera plus tard par alliance aux Tulle, originaire de Corrèze, et le repaire, ruiné, sera abandonné et ses pierres réutilisées à la fin du XVIIIe siècle pour la construction du château voisin de Janès. Les ruines conservées sont datables du XIIIe ou du XIVe siècle.","architecture":"Patrimoine à Montcuq, bâtiment médiéval Labarthe du XIIIe siècle\r\nHôtel de ville de Montcuq  du XIVe siècle. Couvent des Cordeliers du XIIIe siècle. Manoir de Fontauda du  XVIe siècle.  Manoir de Pleysse du XVIIe siècle(voir article suivant).\r\nBourg castral de Montcuq du XIIIe siècle,  le château de Ventalays ou château de Montcuq est un château bâti à Montcuq,  seul vestige du château de Montcuq, le donjon du château de Vantalays est haut de 24 mètres. Il date du du XIIe siècle est ouvert aux visites en juillet et août. Un escalier taillé dans la pierre mène à l'unique porte, celle de la tourelle-escalier. À travers un mur épais de deux mètres, elle donne accès à la tour où se superposent de grandes salles de 12 mètres sur 8, sur 4 niveaux. La salle basse servait de magasin. Les salles du premier et second étage avaient autrefois une cheminée. Le château de Montcuq est un ancien château fort , en forme de parallélogramme,  seul vestige, le donjon est haut de 24 mètres. Il a été bâti du XIIe siècle. Un escalier taillé dans la pierre mène à l'unique porte, celle de la tourelle-escalier. A travers un mur épais de 2 mètres, elle donne accès à la tour où se superposent de grandes salles de 12 mètres sur 8 mètres, sur 4 niveaux. La salle basse servait autrefois de magasin, celles du premier et second étage avaient une cheminée. La Tour-Donjon est classée aux M.H. depuis 1904.","habitants":"Famille  dAlphonse de Poitiers\r\n        \r\n        \r\n        \"","divers":"Tour de Montcup et vestiges du château de Penne gravure 1et 2","gps":"","images":["../../jctruffet.com/image/image_46/46_Montcuq_1.jpg","../../jctruffet.com/image/image_46/46_Montcuq_2.jpg","../../jctruffet.com/image/image_46/46_Montcuq_3.jpg","../../jctruffet.com/image/image_46/46_Montcuq_4.jpg","../../jctruffet.com/image/image_46/46_Montcuq_5.jpg","../../jctruffet.com/image/image_46/46_Montcuq_6.jpg","../../jctruffet.com/image/image_46/46_Montcuq_7.jpg"]},"Consult_chateau_formulairee53d":{"id":"Consult_chateau_formulairee53d","dept":"46","canton":"Luzech","commune":"Montcuq","nom":"Montcuq_Chateaux","type":"Château","periode":"XIV-XVII","histoire":"PLEYSSE, le manoir de Pleysse est un manoir bâti à Montcuq,   le manoir   milieu du XVIIe siècle : La demeure aurait été élevée en 1650 pour le seigneur du lieu, M. de la Cavalerie.                                                                                                                                                                      GAYRAC L'édifice date pour l'essentiel du XIVe siècle. Il appartient dès le XIVe siècle à la famille de Narcès,  Armand de Narcès nommé archevêque d'Aix en 1329 par le pape Jean XXII, meurt victime de la peste en 1348,  dont l'un des membres est archevêque d'Aix de 1329 à 1348 . D'importants remaniements ont été réalisés au XVIIe siècle, d'après la forme de la croisée de l'élévation ouest. Une pierre armoriée du XVe siècle, qui proviendrait du château de Ventalaÿs , a été placée au-dessus du portail. Une cheminée provient du château de Lastours.  La famille Laboissière, par alliance, sera propriétaire de la demeure jusqu'à la fin du XVIe siècle. Au XVIIe siècle les Puniet, par héritage sont devenus les seigneurs de Gayrac. La demeure verra ensuite plusieurs propriétaires se succéder tout au long du XIXe et du XXe siècle jusqu'à son achat en 1952 par une famille d'antiquaire qui l'occupe toujours. De l'ancien château il ne reste qu'une tour carrée, prolongée par un corps de logis plus récent.","architecture":"Gayrac,  de l'ancien château il ne reste qu'une tour carrée, prolongée par un corps de logis plus récent. On accède à la demeure par une porte cochère.                                                                                                                                 Pleysse , maison forte du XVe siècle le manoir de Pleysse a été construit au XVIIe siècle. Seul vestige du château de Montcuq, il ne reste que son donjon, haut de 24 mètres, qui date du XIIe siècle. Un escalier taillé dans la pierre mène à l'unique porte, celle de la tourelle-escalier. A travers un mur épais de 2 mètres, elle donne accès à la tour où se superposent de grandes salles de 12 mètres sur 8, sur quatre niveaux. La salle basse servait de magasin, celles du premier et second étage avaient une cheminée.                                                                                                                                                                                                                       Demeure Labarthe, le bâtiment médiéval peut être daté de la 2e moitié du XIIIe siècle, d'après le chapiteau de la fenêtre géminée conservée.","habitants":"M. de la Cavalerie\r\n        \r\n        \r\n        \"","divers":"Châteaux de Peysse gravure 1 et 2, château de Gayrac gravure 3-4 et 5 Ventalays gravure 6.","gps":"","images":["../../jctruffet.com/image/image_46/46_Montcuq_Chateaux_1.jpg","../../jctruffet.com/image/image_46/46_Montcuq_Chateaux_2.jpg","../../jctruffet.com/image/image_46/46_Montcuq_Chateaux_3.jpg","../../jctruffet.com/image/image_46/46_Montcuq_Chateaux_4.jpg","../../jctruffet.com/image/image_46/46_Montcuq_Chateaux_5.jpg","../../jctruffet.com/image/image_46/46_Montcuq_Chateaux_6.jpg"]},"Consult_chateau_formulaire09b0":{"id":"Consult_chateau_formulaire09b0","dept":"46","canton":"Martel","commune":"Montvalent","nom":"Montvalent","type":"Château-Tour","periode":"XV","histoire":"MONTVALENT,  Géraud de La Roque est mentionné en 1354 . Les Loubrayrie arrivent dans les lieux  au milieu du XVe siècle Jean de la Loubrayrie hommage au vicomte de Turenne en 1415 pour la \"borie\" de la Sarladie. Pierre Pauc, marchand de Rocamadour, acquiert la borie en 1452, d'Aymar de la Loubrayrie ; son fils épouse Catherine de Caors de Martel, dont il adopte le nom, donnant naissance à la branche des Caors de la Sarladie.   Lors du dénombrement de 1504, le repaire de Laroque est tenu, avec toutes justices, par Antoine de Loubrayrie , et il reste dans la famille jusque dans la seconde moitié du XVIIe siècle, où il passe aux mains des La Serre qui s'y maintiennent jusqu'en 1790 . Ce sont sans doute eux qui font construire, à la fin du XVe siècle ou au début du XVIe siècle, le noyau le plus ancien du château actuel et la chapelle, qui porte les armes des Caors. Un Pierre Pauc, bourgeois de Martel, est cependant seigneur de la Sarladie en 1532 . Les bâtiments présentent des marques de travaux d'aménagement qui pourraient être situés au XVIIe siècle. Jean-Joseph de Caors épouse  en 1752, Marie de Vidal-Lapize ; leur fille, Marguerite-Fleur, mariée à Henry Dulmet, hérite avec sa soeur, Mme de Lunegarde, du domaine de la Sarladie. Le château passe ainsi par alliance, au XIXe siècle, aux familles d'Aupias et Vidal-Lapize de Lunegarde. Au début du XXe siècle, il appartient aux Blaviel.","architecture":"Montvalent; les armoiries placées sur une cheminée qui peuvent dériver de celles des Lapize de Lunegarde conduiraient à attribuer à cette famille la restauration du château et de la chapelle, la construction de la partie droite de la façade sud, probablement réalisées dans la seconde moitié du XIXe siècle. Les parties les plus anciennes de l'édifice actuel ne seraient pas antérieures au XVIe siècle, et une large part date du XVIIe siècle.\r\nLe château a été restauré vers 1965 .","habitants":"Famille des Caors de la Sarladie\r\n        \r\n        \"","divers":"Le château et sa tour de Montvalent.","gps":"","images":["../../jctruffet.com/image/image_46/46_Montvalent_1.jpg","../../jctruffet.com/image/image_46/46_Montvalent_2.jpg","../../jctruffet.com/image/image_46/46_Montvalent_3.jpg"]},"Consult_chateau_formulairebbee":{"id":"Consult_chateau_formulairebbee","dept":"46","canton":"Souillac","commune":"Nadaillac de Rouge","nom":"Nadaillac_Rouge","type":"Château","periode":"XIV","histoire":"NADAILLAC; des seigneurs  relevaient de la châtellenie de Belcastel, sont mentionnés dès le XIe siècle par le cartulaire de l'abbaye de Tulle. En 1360, c'est un de Ricard de Rouffilhac, seigneur de Nozac, qui hommage pour le fief de Nadaillac-de-Rouge. Au milieu du XVe siècle, la seigneurie est aux Manha, ou Manhaniac : Alamande de Manha épouse Guillaume du Pouget, donnant naissance à la branche des du Pouget de Nadaillac,  retient l'origine bourgeoise des Manha, originaires de Gourdon, tandis que Guillaume, notaire de la même ville, appartiendrait à la noblesse de robe, fait au contraire de Guillaume du Pouget, qualifié de \"damoiseau\", le petit neveu du cardinal du Pouget, tandis que Alamande est dite dame de Nadaillac et du Repaire de Laval dans Nabirat. En 1504, le seigneur de Nadaillac est Pierre du Pouget. Dans les années 1960, le château était encore à un du Pouget de Nadaillac. Cette dénomination remonte au moins à cinq siècles. Il en est fait mention, dans l'arrêt fait le 30 novembre 1504 par Alamande de la Magnanie, femme de Guillaume du Pouget, Dame de Nadaillac de Rouges. Les biens nobles de Pierre du Pouget sont ainsi répertoriés : Nadaillac de Rouges relevant de monsieur de Belcastel, avec toutes justices.","architecture":"Château de Nadaillac-de-Rouge, le corps principal de l'édifice actuel conserve des parties d'élévation datables du XIIIe ou du XIVe siècle. Une importante campagne de travaux intervient au milieu du XVIe siècle, à en juger d'après la bouche à feu placée dans l'allège d'une fenêtre, avec en particulier la mise en place de grandes croisées et la construction d'une tour d'escalier polygonale. Les ailes en retour ne semblent pas, en revanche, être antérieures au  XVIIe siècle, tandis que la façade sud est sans doute remaniée au début du XVIIIe siècle, peut-être vers 1711, date inscrite sur l'un des bâtiments de communs, si l'on considère que le travaux peuvent être contemporains. Des pierres en attente dans l'élévation ouest du corps principal indiquent qu'une partie des constructions projetées n'a pas été réalisée.\r\nLe château était en mauvais état en 1961 ; il a été entièrement restauré entre 1968 et 1973. château classée au titre des monuments historiques en 1930. Cet édifice fut rasé par les Anglais au cours de la guerre de Cent Ans, puis reconstruit, développant une architecture Renaissance.\r\nLa tourelle jouxtant le clocher porte sous le toit  les armes de la famille du Pouget de Nadaillac. On remarque les impacts des boulets tirés par les arquebusiers anglais depuis la terrasse du château. Le seigneur de lépoque ayant sorti le vin, pour faire boire les soldats anglais, ceux-ci partirent sans démolir léglise après avoir déchargé leurs arquebuses.","habitants":"Famille des du Pouget de Nadaillac\r\n        \r\n        \r\n        \"","divers":"Château de Nadaillac de Rouge","gps":"","images":["../../jctruffet.com/image/image_46/46_Nadaillac_Rouge_1.jpg","../../jctruffet.com/image/image_46/46_Nadaillac_Rouge_2.jpg","../../jctruffet.com/image/image_46/46_Nadaillac_Rouge_3.jpg","../../jctruffet.com/image/image_46/46_Nadaillac_Rouge_4.jpg","../../jctruffet.com/image/image_46/46_Nadaillac_Rouge_5.jpg"]},"Consult_chateau_formulaireb440":{"id":"Consult_chateau_formulaireb440","dept":"46","canton":"Gramat","commune":"Couzou","nom":"Pannonie","type":"Château","periode":"XVII-XVIII","histoire":"PANNONIE, en 1183, lorsque le prince Plantagenêt Henri le Jeune, second fils d'Henri au Court Mantel, vint piller Rocamadour avant de mourir à Martel. Cette famille de Saint-Cyr se réfugia chez leur suzerain, seigneur de Thégra; et c'est dans ce fief que le jeune  Hugues naquit. D'abord poussé vers une carrière ecclésiastique, il préféra poursuivre une vie de troubadour qui fit sa renommée.  Au cours du XIIIe siècle, l'abbaye d'Obazine  restructura son organisation autour de Rocamadour. En plus de ces granges aux Alix, elle fit bâtir celle de La Pannonie.  Le XIVe siècle voit le causse de Gramat se dépeupler peu à peu. Les mauvaises récoltes ont causé des famines, facilitant les épidémies comme la peste noire. En outre, cette zone frontalière avec l'aquitaine anglaise n'est pas épargnée par les aléas de la guerre de Cent Ans, et  les pillages. Après la guerre, l'abbé d'Obazine préféra  louer ses domaines. La plupart furent choisis par de riches bourgeois qui construisirent là des repaires, sortes de petits châteaux fortifiés. Ce furent les Lagrange, marchands de Rocamadour et propriétaires du château de la Caretta, qui commandèrent la construction du premier château de la Pannonie. Les travaux ont duré de la seconde moitié du XVe siècle jusqu'au début du XVIe siècle. Les de Lagrange gardèrent leur seigneurie jusqu'au XVIIe siècle, où ils durent la vendre pour éponger leurs dettes. Leurs successeurs, les Vidal de Lapize, transformèrent leur château de façon spectaculaire. Ce chantier fut l'un des plus importants du XVIIIe siècle dans le Lot. Des plans, des croquis venus de Paris inspirèrent l'architecture classique avec fronton central, ainsi que les formes du mobilier de \"style Louis XV\", et les gypseries de style rocaille. Heureux dans leur agréable château de La Pannonie, les Vidal de Lapize eurent à souffrir de la période révolutionnaire. Ce sont les filles du seigneur qui réussirent à racheter le château, alors que leur père et leurs frères aînés étaient émigrés. Elles bénéficièrent du soutien matériel et humain de leurs fermiers qui protégèrent le domaine durant leur absence; et bien que sérieusement appauvrie, cette famille parvint à maintenir son bien en état. D'autres travaux d'embellissement et de restauration à la fin du XIXe siècle","architecture":"À la fin du XIXe siècle, Charles de La Pannonie, apporta quelques modifications au château et au parc, faisant notamment installer trois bassins et une grille d'entrée.  D'abord une grange monastique servant au défrichement et à la mise en valeur du causse de Gramat au Moyen-Age, et prieuré, les bâtiments sont détruits au cours de la guerre de Cent ans. Ensuite, les nouveaux censitaires élèvent un repaire qui ne semble pas avoir conservé de trace des constructions cisterciennes du XIIIe siècle. Au XVIe siècle, les guerres de Religion entraînent la construction de tours canonnières et les murs furent percés de chambres de tir pour les couleuvrines. Au XVIIe siècle, le château se composait du repaire du XVe siècle et de deux ailes perpendiculaires, au nord et au sud. Au XVIIIe siècle, une aile ouest est édifiée perpendiculairement aux deux autres, et l'aile nord est détruite. L'intérieur conserve un salon au décor du XIXe siècle, ainsi que du mobilier ayant appartenu au maréchal Soult.","habitants":"Charles de La Pannonie\r\n        \r\n        \"","divers":"Château de la Pannonie à Couzou","gps":"","images":["../../jctruffet.com/image/image_46/46_Pannonie_1.jpg","../../jctruffet.com/image/image_46/46_Pannonie_2.jpg","../../jctruffet.com/image/image_46/46_Pannonie_3.jpg","../../jctruffet.com/image/image_46/46_Pannonie_4.jpg","../../jctruffet.com/image/image_46/46_Pannonie_5.jpg"]},"Consult_chateau_formulaireb0d2":{"id":"Consult_chateau_formulaireb0d2","dept":"46","canton":"Cahors","commune":"Parnac","nom":"Parnac","type":"Château","periode":"XV","histoire":"PARNAC, aucune donnée historique précise n'a été trouvée sur l'édifice. Une famille d'Arnal, dite de Montlauzun ayant succédé au XVe siècle aux del Truffe est signalée dans la juridiction de Parnac vers 1500, sans que l'on connaisse ses possessions. Les Pouzargues sont mentionnés à la fin du XVIIIe siècle ; le comte de Pouzargue vend le domaine à un viticulteur en 1840.Le vignoble est actuellement confié en fermage à un voisin, Georges Delmas.   la propriété appartient depuis 1997 à Alice KUO, dans le cadre dune SCI familiale.","architecture":"Parnac est un quadrilatère composé de trois corps de logis à deux et trois niveaux toit légèrement en croupe avec une tour carré sur façade sud a toit à quatre pans.                                                                                                   Le château de Caminade de plan rectangulaire à trois niveaux  toit à la mansard  avec tour carré et balcon en angle sur arcades. Le vocable château est lié moins à la bâtisse, malgré ses mérites,  quau vignoble, suite à un procès  (vers 1929, avec les voisins Rigal, du Château st-Didier de Parnac) qui attribua au viticulteur Marius Brunet le droit exclusif dutiliser la marque «Château de Parnac».\r\n Il ny a pas  un édifice construit en une seule fois de manière cohérente.  Avant la construction en 1704 de la Tour-pigeonnier, il y avait une tour de guet du 15e siècle (par la suite percée de multiples ouvertures), base de laile Nord coté Ouest, probablement sur le site dune ancienne villa gallo-romaine, sur cette terrasse à la limite des hautes eaux du Lot, au centre du cingle de Parnac, au lieu-dit Régagnac.  La restauration du gros-oeuvre, achevée,  a permis de retrouver léquilibre entre les deux ailes, qui se sont constituées au cours des siècles mais sans quon puisse alléguer dun état historique initial difficile à reconstituer.","habitants":"Famille d'Arnal\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Parnac et de Caminade gravure 3.","gps":"","images":["../../jctruffet.com/image/image_46/46_Parnac_1.jpg","../../jctruffet.com/image/image_46/46_Parnac_2.jpg","../../jctruffet.com/image/image_46/46_Parnac_3.jpg"]},"Consult_chateau_formulairec7a5":{"id":"Consult_chateau_formulairec7a5","dept":"46","canton":"Luzech","commune":"Payrac","nom":"Payrac","type":"Château","periode":"XIV","histoire":"PAYRAC, à lépoque féodale, Payrac appartenait aux seigneurs de Gourdon, ville fortifiée qui reste encore la capitale de la Bouriane. Vers 1279, Payrac devint propriété de la famille Verneuil et le resta environ 500 ans. Cest à cette époque, au XIVe siècle que le château, dont il ne reste que la grosse tour féodale fut construit. Au cours de la guerre de Cent Ans, la population fut pratiquement exterminée ; Payrac c'est repeuplée à partir des régions avoisinantes. Au XVIe siècle, Payrac souffrit des guerres de religion. À la suite d'une défaite en 1580 à Rocamadour les protestants se réfugièrent dans léglise et dans le château de Payrac. Celui-ci fut alors incendié et les protestants, exterminés. À partir de la Renaissance, Payrac prit de limportance en tant que centre postal et relais détape.                                                                                                                                                              A quelques kilomètre à l'ouest à Rouffilhac le manoir des Tuileries chambres d'hôte de Noëla Serin.","architecture":"Payrac, de ce passé si riche, nous navons gardé que quelques bâtiments, dont le château, ancien repaire de la seigneurie de Gourdon, avec sa grosse tour ronde du XVIe siècle. Elle comporte deux étages sur une salle voûtée en demi-sous-sol. Des meurtrières la percent, permettant lusage dune petite artillerie. Le logis date du XVIIIe siècle . Le château a accueilli de 1856 à 1957 les surs de Saint Vincent de Paul, certains habitants de Payrac ont conservé l'habitude d'appeler le château : \"le couvent\".                                                                                                                          L'hôtel de ville, construit en 1911, remplaçant l'ancienne mairie détruite en même temps que l'ancienne église Saint-Pierre car collée à cette dernière, est un bel exemple de l'architecture bourgeoise du début du XXe siècle ; construite en briquettes et pierre blanches, elle se démarque ainsi des autres bâtisses du centre du village. Privé de son campanile (clocheton) depuis 1948   rasé par manque d'entretien par le maire de l'époque, M. Constant  il a été reconstruit à l'identique grâce à de nombreux dons des habitants du village et de quelques sociétés.                                Manoir des Tuileries de plan carré flanqué de tours carrées en angles","habitants":"Famille Verneuil                                                                          \r\nFamille des Chapt de Rastignac\r\n        \r\n        \"","divers":"Le château de Payrac et l'hôtel de ville gravure 5","gps":"","images":["../../jctruffet.com/image/image_46/46_Payrac_1.jpg","../../jctruffet.com/image/image_46/46_Payrac_2.jpg","../../jctruffet.com/image/image_46/46_Payrac_3.jpg","../../jctruffet.com/image/image_46/46_Payrac_4.jpg","../../jctruffet.com/image/image_46/46_Payrac_5.jpg","../../jctruffet.com/image/image_46/46_Payrac_6.jpg"]},"Consult_chateau_formulairea1c8":{"id":"Consult_chateau_formulairea1c8","dept":"46","canton":"St-Germain du Bel Air","commune":"Peyrilles","nom":"Peyrilles","type":"Château","periode":"XV","histoire":"PEYRILLES,  mentionné dans le traité de Gaillon en 1196, c'est une petite perle nichée au creux des collines, ancienne possession des seigneurs de Gourdon-Peyrilles, famille qui se distingua dans la lutte contre les Anglais lors de la guerre de Cent Ans. Au XVe siècle, les d'Oriole devinrent les seigneurs du site. Jean d'Oriole semble être le commanditaire de l'édifice actuel. Cette famille y demeurera jusqu'en 1674, date à laquelle la seigneurie fut vendue à  M. de Saux. Puis, en 1720, le château et tous ses droits furent acquis par Barthélémy Boyer. Sa fille Élisabeth, en épousant François de Clermont Touchebuf en 1723, fera entrer cette famille à Peyrilles, c'est à eux qu'il faut sans doute attribuer la campagne de travaux qui a eu pour résultat de modifier la plupart des percements et d'améliorer les commodités de la demeure. Le château, qui appartient toujours aux Clermont-Toucheboeuf, est pillé en 1790. Dans la seconde moitié du XIXe siècle, il est acheté par la commune et une partie est affectée au presbytère.","architecture":"Dans la seconde moitié du XIXe siècle, le château de Peyrilles est acheté par la commune.  édifice de plan en U avec tour ronde mi hors oeuvre et donjon ou bâtiment carré accolé  Des journées danimation sont menées sur le site, et en parallèle un groupe assidu de bénévoles se réunit périodiquement. La porte du donjon et la porte basse de la tour descalier ont été remplacées. La mise en place de menuiseries au premier étage est prévue avec laménagement de la grande salle.","habitants":"Famille de Jean d'Oriole \r\n        \r\n        \"","divers":"Château de Peyrilles","gps":"","images":["../../jctruffet.com/image/image_46/46_Peyrilles_1.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_2.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_3.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_4.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_5.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_6.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_7.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_8.jpg","../../jctruffet.com/image/image_46/46_Peyrilles_9.jpg"]},"Consult_chateau_formulaire8c6a-2":{"id":"Consult_chateau_formulaire8c6a-2","dept":"46","canton":"Puy-l","commune":"Prayssac","nom":"Prayssac_Chateau","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Prayssac dont celui de Theron( article suivant), de Touzeau et le Camp del Saltre gîtes de France  et Calvagnac pour ses trois derniers voir article suivant.            Plusieurs châteaux cité ci dessous dont je n'ai pas d'image et peu d'information tel que les Grauzils , la Coustarelle.                                                                                                               PRAYSSAC, est la terre de Priscius, un riche propriétaire de l'époque gallo-romaine. La terre de Prayssac fut donnée au XIIIe siècle par l'évêque de Cahors à Arnaud de Béraldi, seigneur de Cessac, pour régler ses dettes. La commune obtiendra sa charte en 1280, ainsi que la création de foires qui existent toujours. Prayssac a vu naître le 6 août 1768 Jean-Baptiste Bessières, futur maréchal d'empire et compagnon de Napoléon 1er. Il trouvera la mort à la veille de la bataille de Lutzen le 1er mai 1813.  En 1953, Maurice FAURE fut élu maire de Prayssac (Il est le signataire du traité de Rome le 25 mars 1957). Mme FAURE lui a succédé.                                                                                                                                        Le Château les  Grauzils est une propriété familiale depuis 4 générations viticole.                                                                               La Coustarelle de Caroline Cassot viticole.                                                                                            CALVAIRAC, centre de vacance.                                                                                                                                                     CAMP Del SALTRE DELBRU est une exploitation familiale et un centre d'hebergement de Delbru Gérard Et Dominique.                                                                                                                                                TOUZEAU, société civile d'exploitation agricole société civile d'exploitation agricole est en activité depuis 7 ans de M Rouqual Rémy.","architecture":"Calvairac, sur un soubassement important  toit semi croupe en tuiles de plan rectangulaire à trois niveaux et attiques.                                                      Camp del Saltre Delbru corps de logis rectangulaire à deux niveaux toit en croupe flanqué sur façade de deux tours carrées à trois niveaux toit à quatre pans.                                                                                                                        Touzeau château de style néo-gothique à deux niveaux  avec tour rondes et carrées et série de lucarnes sur le toit.","habitants":"Arnaud de Béraldi et Maurice Faure\r\n        \r\n        \"","divers":"Château de Calvaignac gravure 1 à 4, de Camp del Saltre gravure 5 et 6, de Touzeau gravure 7 et 8 à Prayssac","gps":"","images":["../../jctruffet.com/image/image_46/46_Prayssac_Chateau_1.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_2.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_3.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_4.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_5.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_6.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_7.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Chateau_8.jpg"]},"Consult_chateau_formulaire3ed9":{"id":"Consult_chateau_formulaire3ed9","dept":"46","canton":"Puy-L","commune":"Châteaux","nom":"Prayssac_Théron","type":"Château","periode":"XIII_XVII","histoire":"THERON  le repaire du Théron  est tenu dans la seconde moitié du XIIIe siècle, et jusqu'au début du XVe siècle au moins, par une famille de chevaliers du castrum de Puy-l'Evêque, les Valgoudou en 1262, la \"bastide\" du chevalier de Valgoudou est envahie par Bertrand de Lézergues et ses frères. Vers 1280, Bernard de Valgoudou hommage à l'évêque pour le Théron, puis on y trouve mention de Bertrand de Valgoudou, peut-être son fils, en 1313, qui apparaît encore en 1336 à l'occasion d'un procès, un fils de Bertrand, Raymond, mort avant 1374, et de son fils Pierre de Valgoudou, seigneur du Théron en 1389, l'un bayle de l'évêque, l'autre de Luzech. Avant 1454, la dernière héritière de lignée, Séguine de Valgoudou épouse Arnal Bénech, donzel de Luzech, et lui apporte ses droits sur le Théron, tandis que Jean de Castelnau-Bretenoux, évêque de Cahors à partir de 1443, donne la maison forte du Théron à Béral de Burbuzon, dont la fille, Saure, est mariée à Jean du Tilhet, seigneur de La Croze, son fils Jean du Tilhet est seigneur de La Croze et du Théron en 1491, et en 1492 il est pourvu de la maîtrise des eaux et forêts de la sénéchaussée de Quercy ; en 1504, son fils Jean dénombre pour le Théron, sans justice, relevant de l'évêque de Cahors.  En 1761, le Théron devient la propriété de Jean Le Franc, seigneur de Caïx, président à la Cour des Aides de Montauban, puis de son neveu Jean-Jacques Le Franc de Pompignan, qui le vend à Louis-Antoine Vidal de La Pize, de Lunegarde. Le château est vendu comme bien national pendant la Révolution à un fermier qui a utilisé le château comme carrière de pierre. Le donjon est détruit. Le château a été acquis en 1970 par un nouveau propriétaire qui a entrepris sa restauration. Pierre Ledoux, propriétaire du château est décédé le 24 juin 2005. Il a fait de la Fondation de France son légataire universel, avec un legs particulier pour le château. L'édifice est inscrit au titre des monuments historiques le 15 mars 1973.","architecture":"Le château de Théron fut bâti sur un plan très irrégulier dû au rocher sur lequel il est assis et dont il épouse les contours. Plan à cinq angles principaux, quatre étant renforcés par des tourelles bâties au XVe siècle. Le donjon, partie la plus ancienne, devait remonter au milieu ou à la fin du XIIIe siècle. De l'ensemble des bâtiments du château, il ne reste que trois salles du début du XIVe siècle, ainsi que la chapelle qui leur faisait suite. Les remparts ont en partie disparu. Seules restent encore visibles les tours nord et ouest. Château sans doute élevé pour Bernard de Valgaudour au milieu du XIIIe siècle.   Une tour de plan carré a probablement été construite par Bernard de Valgoudou au milieu du XIIIe siècle. Les Valgoudou sont une famille de chevaliers du castrum de Puy-l'Evêque. Un Bernard de Valgoudou rend hommage pour ce qu'ils ont à Puy-l'Évêque à l'évêque de Cahors, en 1200. Un logis possédant des archères cruciformes est construit au début du XIVe siècle auquel est associé une enceinte.  L'édifice connu des hôtes de passage qui achèveront de le laisser mourir. La demeure sera sauvée en 1970, par sa propriétaire qui entreprit sa  restauration.","habitants":"Famille de  Bertrand de Valgoudou\r\n        \r\n        \r\n        \"","divers":"Château de Théron à Prayssac","gps":"","images":["../../jctruffet.com/image/image_46/46_Prayssac_Theron_1.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Theron_2.jpg","../../jctruffet.com/image/image_46/46_Prayssac_Theron_3.jpg"]},"Consult_chateau_formulairec977-3":{"id":"Consult_chateau_formulairec977-3","dept":"46","canton":"Saint-Céré","commune":"Saint-Médard de Presque","nom":"Presque","type":"Château","periode":"XV","histoire":"PRESQUE, aux Bonafous , une importante famille de chevaliers issue des Pestilhac. En 1504, Antoine de Bonafous dénombre pour la maison de Presque. Les Bonafous conservent la seigneurie jusqu'à sa vente en 1712 aux Costa de Beaulieu. Le château est laissé à l'abandon et lorsqu'il est vendu à un marchand de biens de Saint-Céré en 1877,  il possèdera plusieurs propriétaires sans qu'il soit entretenu, il n'a plus ni portes ni fenêtres. La dernière descendante des Costa de Beaulieu détruit toutes les archives en 1951.  Mais depuis 1988, son nouveau propriétaire a entrepris sa restauration pour lui redonner son cachet d'antan  Aujourd'hui propriété de monsieur Glowinski.","architecture":"Presque, construit sans doute sur des bases remontant à l'époque romane, le château a été édifié au XVIIe siècle, l 'édifice se compose d'un logis à deux corps en L, bordant une cour fermée. Le corps principal est cantonné de deux pavillons. Une tour circulaire s'élève à l'angle sud-est de la cour, un autre à l'angle sud-ouest de l'aile en retour, l'aile ouest aurait été ajoutée au XVIIIe siècle. Les deux corps du logis sont couverts de lauzes de schiste, la tour de l'angle sud-est de la cour est couverte de tuiles plates. La chapelle est couverte de voûtes d'ogives à liernes et la grange étable est couverte de tuiles creuses sur de longs pans et de tuiles plates sur les brisis.","habitants":"Famille des Bonafous\r\n        \"","divers":"Château de Presque à saint-Médard de Presque","gps":"","images":["../../jctruffet.com/image/image_46/46_Presque_1.jpg","../../jctruffet.com/image/image_46/46_Presque_2.jpg","../../jctruffet.com/image/image_46/46_Presque_3.jpg","../../jctruffet.com/image/image_46/46_Presque_4.jpg","../../jctruffet.com/image/image_46/46_Presque_5.jpg","../../jctruffet.com/image/image_46/46_Presque_6.jpg"]},"Consult_chateau_formulaire56c2-2":{"id":"Consult_chateau_formulaire56c2-2","dept":"46","canton":"Cahors","commune":"Promilhanes","nom":"Promilhanes","type":"Château","periode":"XIII-XV","histoire":"A Promilhanes, trois châteaux, Les Bordes, Laroussilhe, Laumière.                                                                                                                                           BORDES, au coeur du Quercy, le château des Bordes à traversé les siècles, témoin de multiples combats et tribulations, causes de transformations diverses. Les actuels propriétaires ont conservés l'austérité des vieilles pierres et le mobilier haute-époque, parfait écrin pour l'exposition des objets et vestiges témoins de cette longue histoire. Propriété de monsieur  Olivier Millet.                                                                                                    LAROUSSILHE, de Morlhon de Laroussilhe qui s'établirent en Quercy en 1581, seigneurs propriétaires du château du même nom de 1581 à 1864.                                                    LAUMIERE,  nobles de Morlhon de Laumière, seigneurs propriétaires du château du même nom.  Le château a été construit au début du XVIIe siècle sur les terres du causse de Limogne. Le commanditaire de la demeure fut un cadet des Morlhon, famille ancienne originaire du Rouergue. aujourd'hui ferme équestre de Tanya Harrisson, société à responsabilité limitée est en activité depuis 12 ans.","architecture":"Bordes, château du XIIIe et XVe siècle style maison forte corps de logis rectangulaire à deux niveaux toit en croupe reliant à l'équerre une tour carré donjon à cinq niveaux toit à quatre pans,  une tour ronde  de trois niveaux est accolée au corps de logis.                                                                          Laumière, l'édifice se compose d'un gros corps de bâtiment rectangulaire à trois niveaux dont les façades sont régulièrement percées par des fenêtres à meneaux.  l'édifice est flanqué à l'angle nord-Est d'une tourelle en encorbellement surmontée d'une toiture en poivrière et  une tour pigeonnler carrée émerge au milieu de la toiture. Aujourd'hui la ferme du château abrite un centre équestre.","habitants":"Famille d'Olivier Millet\r\n        \"","divers":"Château de Bordes gravure 1 à 4, Laumière de  5 à 7 à Promilhanes","gps":"","images":["../../jctruffet.com/image/image_46/46_Promilhanes_1.jpg","../../jctruffet.com/image/image_46/46_Promilhanes_2.jpg","../../jctruffet.com/image/image_46/46_Promilhanes_3.jpg","../../jctruffet.com/image/image_46/46_Promilhanes_4.jpg","../../jctruffet.com/image/image_46/46_Promilhanes_5.jpg","../../jctruffet.com/image/image_46/46_Promilhanes_6.jpg","../../jctruffet.com/image/image_46/46_Promilhanes_7.jpg"]},"Consult_chateau_formulairefbae":{"id":"Consult_chateau_formulairefbae","dept":"46","canton":"Figeac","commune":"Linac","nom":"Puy_Launay","type":"Château-fort","periode":"XV","histoire":"PUY-LAUNAY,  le château de Linac Il fut édifié par les Narbonnès au cours de la seconde moitié du XVe siècle, à partir dune ancienne tour du XIIIe siècle appartenant aux Guignabert,  en 1504, Eustache II, son fils né vers 1440, dénombre pour Puylaunès, où il habite . Son héritier, Balthazar I de Narbonès est mort avant 1531 ; Balthazar II dénombre au roi en 1543 pour la seigneurie de Puylaunès, avec toutes justices, château, colombier, prés, vignes etc., dont hérite son fils aîné Jean en 1569. Pour défendre Puylaunès, celui-ci obtient dix soldats en 1577. Après sa mort en 1602, le réglement de sa succession est contesté par Balthazar de Cadrieu, fils de Jeanne de Narbonès, qui obtient d'entrer en possession de Puylaunès en 1607. Marc de Cadrieu et son fils Phillippe-Balthazar vendent la seigneurie et le château à Me Guillaume de Dumas, de Figeac, en 1658 . La seigneurie passe ensuite par alliance aux Buisson puis aux Durfort-Boissières, et elle est vendue en 1786 à Etienne de Palhasse de Salgues, mort en 1803 au château de Puylaunès. Vendu par adjudication en 1812, le domaine est démembré, puis le château est acheté en 1834 par Pierre Bel, propriétaire du château vers 1940, l'avait restauré et meublé.","architecture":"PUY-Launay, à LINAC, à lécart du bourg est implanté sur une colline dominant les vallées du Bervezou et de la Burlande. Il fut édifié par les Narbonnès au cours de la seconde moitié du XVe siècle, à partir dune ancienne tour du XIIIe siècle appartenant aux Guignabert, un corps de logis  dont les fondations ont pu être englobées dans celles dun des deux corps de logis édifiés au XVe siècle, une enceinte armée de cinq tours   assurait la défense de la demeure que précédaient deux basses-cours successives. Ses hauts corps de logis sont flanqués de 2 tours rondes arasées après la révolution française. Deux de ces tours aujourdhui disparues, édifiées au début du XVIe siècle, étaient devenues un siècle plus tard, lune un pigeonnier, lautre une chapelle.  Deux corps de logis, lun plus étendu que lautre, comptant trois étages surmontés dun niveau de comble aménagé à lemplacement dun couronnement de mâchicoulis, composent la demeure construite en moellons. Les angles de la façade méridionale sont cantonnés de deux tours rondes, dont une au Sud-Est de grand diamètre. Elles sont percées de fenêtres à traverse et munies danciennes latrines en encorbellement sur des consoles en pierre. Leurs sommets étaient à lorigine armés de mâchicoulis qui furent arasés à la Révolution en 1793. Côté cour, une troisième tour de plan carré renferme un escalier à vis en pierre desservant les étages ; on y accède par une porte au tympan frappé aux armes des Narbonnès. La salle ou aula, située dans le logis oriental, conserve sa cheminée monumentale au large manteau en pierre orné de moulures et dun arc en accolade.","habitants":"Famille de Balthazar de Cadrieu\r\n        \"","divers":"Château de Linac à  Puy Launay","gps":"","images":["../../jctruffet.com/image/image_46/46_Puy_Launay_1.jpg","../../jctruffet.com/image/image_46/46_Puy_Launay_2.jpg","../../jctruffet.com/image/image_46/46_Puy_Launay_3.jpg","../../jctruffet.com/image/image_46/46_Puy_Launay_4.jpg","../../jctruffet.com/image/image_46/46_Puy_Launay_5.jpg","../../jctruffet.com/image/image_46/46_Puy_Launay_6.jpg"]},"Consult_chateau_formulaire3bed":{"id":"Consult_chateau_formulaire3bed","dept":"46","canton":"Puy-L","commune":"Puy-L","nom":"Puy_Lévéque","type":"Château-Tour","periode":"XII-XVI","histoire":"Plusieurs châteaux à Puy l'Evêque  celui de Beauregard, de Cayrou et de Gautoul.           BEAUREGARD, est une ancienne place forte des évêques de Cahors , d'où son nom. A la fin du XIIe siècle elle est contrôlée par le duc d'Aquitaine et roi d'Angleterre qui en fait une forteresse imprenable.  Le castrum de Puy-l'Evêque  est mentionné pour la première fois en 1227, époque à laquelle il est acquis en même temps que celui de Luzech par l'évêque de Cahors. La Guerre de Cent Ans (1337-1453) amena les Anglais, qui tenaient l'Aquitaine depuis Aliénor devenue, par mariage, reine d'Angleterre, et qui remontaient, entre autres, le Lot pour aller combattre les troupes françaises. Combats, résistances, pillages, reconstructions et le même cycle infernal lorsque les Français reprenaient le village. À la fin de la guerre, le Quercy n'était plus qu'un champ de ruines.  Puy-l'Évêque est sorti de l'ombre au Moyen-Âge quand Guillaume de Cardaillac, évêque de Cahors, annexa le village dans le cadre de la croisade contre les Albigeois. Il prit, semble-t-il, pour motif que le seigneur des lieux, probablement le seigneur de Luzech, avait épousé la cause des hérétiques comme son suzerain le comte de Toulouse. Une bulle papale du 25 janvier 1227 confirme l'acquisition  des seigneuries de Luzech et Puy-l'Évêque qui seront rattachées au comte-évêque de Cahors jusqu'à la Révolution.                                                                                                                                                        CAYROU, le château du Cayrou bâti à Puy-l'Evêque, La construction  date du XIVe siècle. Il contrôlait le passage du Lot par un bac, il est devenu depuis une exploitation viticole.                                                                                                           GAUTOUL, est situé face au village médiéval de Puy L'évêque. Le domaine est composé dune magnifique chartreuse qui vit dans ses vignes depuis le XVIIIe siècle. en 1992, Alain Senderens, alors chef du Lucas Carton à Paris, achète le domaine et décide de mettre son énergie et son talent à sa mise en valeur.  Aujourdhui, les propriétaires Eric et Claudine Swenden, poursuivent la conduite du vignoble en collaboration avec Thierry Mèze, régisseur du domaine et son équipe.","architecture":"Puy-L'évêque, les rues pentues de la ville sont bordées de belles maisons médiévales (certaines avec des pans de bois) construites du XIIIe au XVe siècles.  Tout au long de ces siècles, le site de Puy-l'Évêque constituait une position stratégique de première importance. Sur le plan militaire, il dominait la vallée pour détecter tout mouvement à l'ouest et était difficile d'accès.   Puy-l'Evêque est un pittoresque village bâti sur un promontoire rocheux dominant le Lot. Derrière le donjon du XIIIe siècle, dernier vestige du Palais des Evêques, la cité étage de magnifiques demeures médiévales de couleur ocre. Malgré les nombreuses recherches effectuées, on ignore l'histoire de cette maison noble qui dresse sa haute silhouette dans les vieilles rues de Puy-l'Évêque. Sans doute fut-elle la demeure de quelque famille de milites castri locale.                                                                                                                     Beauregard, de forme carré, il est flanquée à son angle sud-est d'une tour circulaire d'escalier, comportant à sa base une porte à accolade du XVIe siècle. Le village s'articulait autour de l'église, du château épiscopal, selon les époques : garnison, couvent, école ou prison dans la tour carrée et de la Cale, le port de la rive droite. Dans ce triangle, se serraient maisons bourgeoises et masures modestes dans un dédale de rues étroites.  La Tour épiscopal, qui était peut-être l'aula de l'évêque est devenu, sans doute au XVIIIe siècle, la chapelle des capucins  avant de devenir l'hôtel de ville. L'architecture de la tour permet d'en situer la construction dans les dernières décennies du XIIIe siècle.                                                                                        Cayrou et Goutoul tous deux de plan rectangulaire à deux niveaux avec une série de lucarne pour Cayrou et de deux pavillons aux extrémités pour Gautoul.","habitants":"Guillaume de Cardaillac\r\n        \r\n        \"","divers":"Château de Beauregard gravure 1 à 5 Tour ancien château épiscopal gravure 6,  la tour gravure 7 et Gautoul la 8 et 9 à Puy l'Evêque.","gps":"","images":["../../jctruffet.com/image/image_46/46_Puy_Leveque_1.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_2.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_3.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_4.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_5.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_6.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_7.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_8.jpg","../../jctruffet.com/image/image_46/46_Puy_Leveque_9.jpg"]},"Consult_chateau_formulaire23a2":{"id":"Consult_chateau_formulaire23a2","dept":"46","canton":"Puy-L","commune":"Lherm","nom":"Péchaurié","type":"Château","periode":"XIV-XV","histoire":"PECHAURIER, les Saint-Gily apparaissent à Péchaurié dès la fin du XIIIe siècle, tenant de l'évêque de Cahors la seigneurie qui ne comprend en fait que le château et ses dépendances du XIIIe-XIVe siècle. Les Saint-Gily apparaissent à Péchaurié dès la fin du XIIIe siècle, tenant de l'évêque de Cahors la seigneurie qui ne comprend en fait que le château et ses dépendances immédiates. Un document de 1462 décrit le repaire avec des \"hostals\", la tour, une mouline, un étang, un moulin à blé et une métairie, le tout d'un seul tenant. En 1504, Jean de Saint-Gily est seigneur \"direct\" de Péchaurié, mais sans aucune justice. Pris en 1344 par Bertrand de Pestilhac et Philippe de Jean, le château est livré aux troupes du duc d'Aquitaine qui l'occupent jusqu'à son rachat en 1351 par Jean de Saint-Gily : il subit alors des dégâts importants. Il est de nouveau pris et en partie démoli en 1562, pendant les guerres de Religion. Par le mariage de Françoise de Saint-Gily en 1670, la seigneurie passe aux Vassal. En 1780, alors que Bertrand de Vassal y habite.","architecture":"En 1780 le château de Pechaurié et ses dépendances sont dans un état général de délabrement, avec des murs effondrés, excepté la chambre neuve. Au début du XXe siècle, le dernier des Vassal fait don du château à la commune qui installe une école dans la chapelle ; le château lui-même est inhabité il est en ruines quand il est acheté en 1978, son nouveau propriétaire s'employant alors à le restaurer. Des vestiges subsistent du château du XIIIe ou XIVe siècle, et l'édifice portent les marques d'une reconstruction réalisée après la guerre de Cent Ans : des peintures subsistent de cette époque. La chapelle, qui daterait de 1618  a été presque entièrement reconstruite en 1837. Le corps principal, au nord, est construit dans la seconde moitié du XVe siècle. Un corps arrière, contenant un escalier qui émerge de la toiture en forme de tour ronde, lui est ajouté à la fin du XVIe siècle ou au début du XVIIe siècle : le décor peint, à pointes de diamant en trompe-l'oeil, conservé au premier étage, date de cette époque.","habitants":"Famille de Jean de Saint-Gily\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Péchaurié avec son pigeonnier (6)et son hôtel de ville à Lherm(7).","gps":"","images":["../../jctruffet.com/image/image_46/46_Pechaurie_1.jpg","../../jctruffet.com/image/image_46/46_Pechaurie_2.jpg","../../jctruffet.com/image/image_46/46_Pechaurie_3.jpg","../../jctruffet.com/image/image_46/46_Pechaurie_4.jpg","../../jctruffet.com/image/image_46/46_Pechaurie_5.jpg","../../jctruffet.com/image/image_46/46_Pechaurie_6.jpg","../../jctruffet.com/image/image_46/46_Pechaurie_7.jpg"]},"Consult_chateau_formulaire02ed":{"id":"Consult_chateau_formulaire02ed","dept":"46","canton":"Gourdon","commune":"Saint-Clair","nom":"Péchrigral","type":"Château","periode":"XV","histoire":"PECHRIGRAL ou Château de Pech Rigal est un château bâti à Saint-Clair.  C'est en 1354 qu'apparaît pour la première fois Pech-Rigal qui semble appartenir à Pierre de Casatou. En 1460 le fief passe à Géraud de Valle, issu d'une famille de magistrats gourdonnais. En 1515, Jean de Valle vend château à Michel de Peyronnenc, seigneur de Saint-Chamarand. Ses héritiers vendront le domaine en 1573, à Guillaume Séguy, d'une famille de marchands gourdonnais, dont le fils accédera à la noblesse. Par alliance, la propriété passe à la famille de Lagrange Gourdon, qui la conservera jusqu'en 1782, date à laquelle le château est vendu à Pierre Glandin, avocat gourdonnais, dont les descendants y habiteront jusqu'au XXe siècle  il est passé à la famille Perie à la famille Louis Lasvignes-Salanié puis aux familles Dreyffus. Léo Ferré les a suivis. Il est ensuite devenu la propriété d'un Américain, John Manchec, qui l'a fait restaurer et transformer en hôtel. Avec une arrivée majestueuse, le château maintenant entièrement rénové peut être loué pour accueillir jusqu'à 300 invités, pour des réceptions de mariage ou pour des réunions de famille. Le jardin bas qui jouit d'une vue magnifique sur le parc du château et sur la campagne avoisinante est un endroit idéal pour le cocktail de bienvenue.  C'est un lieu d'« histoires » parce qu'il a été la propriété et le lieu d'habitation de Léo Ferré. Il a valu à ce dernier sa réputation de châtelain.","architecture":"Pechrigral château de plan en U trois corps de logis à trois niveaux toit en semi-croupes et deux pans en tuiles avec série de lucarnes de chaque côté des pans  accolé de deux tours rondes sur les angles extérieures toit en poivrières, deux tours carrées de différentes dimensions accolés sur le même coté et une tourelle de style tour de guet hors oeuvre sur cour. A l'opposé en prolongement  du bâtiment de gauche une tour arasée mais comporte des créneaux au deuxième étages.","habitants":"Château de Léo Ferré\r\n        \r\n        \"","divers":"Château de Pechrigal à Saint-Clair.","gps":"","images":["../../jctruffet.com/image/image_46/46_Pechrigal_1.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_2.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_3.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_4.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_5.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_6.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_7.jpg","../../jctruffet.com/image/image_46/46_Pechrigal_8.jpg"]},"Consult_chateau_formulaireaa41":{"id":"Consult_chateau_formulaireaa41","dept":"46","canton":"Cahors","commune":"Le Bourg","nom":"Rauze(la)","type":"Château","periode":"XV-XVII","histoire":"LA-RAUZE, les Colomb, famille de gentilshommes-verriers, avaient reçu la terre de La Rauze des Cardaillac de Lacapelle. Ils y possédaient un repaire noble. Ils sont restés à La Rauze jusqu'à la fin du XVI siècle, les descendants prirent le nom de Hug de Larauze.\r\n Le château fut ensuite la propriété de M. Hug, notaire de Lacapelle Marival, dont les fils ajoutèrent par la suite à leur nom celui de La Rauze. Après la Révolution, une famille de marchands, les Rochy font l'acquisition de la demeure.\r\nLe château est inscrit au titre des monuments historiques depuis le 14 novembre 1979.","architecture":"Le château est reconstruit L'édifice actuel a été construit à partir du XVIIe siècle,  ne conservant qu'une tour. Le château est composé de deux corps de bâtiment en L  flanqués de trois tours carrées. Ces deux corps de bâtiment présentent des toitures encore proches de la Renaissance percées de lucarnes à frontons sculptés. Les ouvertures des façades datent de la fin du XVIIe siècle ou du début du XVIIIe siècle. La cour intérieure est fermée par un mur couronné de merlons avec des percements de canonnières.   L'élément architectural le plus ancien est la tour Est dont la partie basse est voûtée et prend le jour par d'étroites meurtrières. C'est le seul témoignage de l'édifice construit par les verriers. Les façades ont un ensemble d'ouvertures datant de la fin du XVIIe ou début du XVIIIe siècle.","habitants":"Famille des Rochy\r\n        \r\n        \r\n        \"","divers":"Château de la Rauze à le Bourg","gps":"","images":["../../jctruffet.com/image/image_46/46_Rauze(la)_1.jpg","../../jctruffet.com/image/image_46/46_Rauze(la)_2.jpg"]},"Consult_chateau_formulaire970f-2":{"id":"Consult_chateau_formulaire970f-2","dept":"46","canton":"Gramat","commune":"Rignac","nom":"Rignac","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Rignac celui de Mordesson, de Roumégouse et la maison aux deux tourelles                                                                                                                                                     MORDESSON, a été construit par Guarin de Castelnau, seigneur de Gramat, pour en faire  une résidence d'été. Il en est question lors de la guerre de cent ans dans la légende concernant le saut de la Pucelle. Les Valon de Thégra en ont été propriétaires pendant plusieurs siècles et l'abbé de Fouilhac y serait né en 1622, descendant par sa mère des de Valon. Il a fait édifier le château actuel, qui fut détruit en partie par un incendie en 1944. La table de dîme, abritée par les pilliers d'un pigeonnier, servait sous l'ancien régime, a déposer les redevances que devaient les paysans au seigneur. En 1949, le château appartenait à M. Ruscassié. Aujoùrd'hui, séparé de sa ferme, le château de Mordesson ces dernières années a souvent changé de propriétaires.                                                                                                                                       ROUMEGOUSE  La baronnie de Gramat aurait cédé le château au chapitre de Cahors en 987; ce devait être un poste avancé des barons de Gramat. Ensuite, il devint une dépendance de la maison de Castelnau. Après la féodalité, il passa dans les mains de plusieurs propriétaires dont les de Delfour au XVIe siècle et par la suite aux Chorrigny de Roc Amadour qui deviennent seigneurs de Roumégouse. Raymond de Fouilhac, baron de Gramat, est donataire universel de ce seigneur en 1732: le revenu du domaine lui avait déjà été donné en 1723, c'est pour éponger des dettes que le seigneur Chorrigny de Roumégouse fait ces donations à son suzerain alors qu'il avait des neveux. Les de Foutlhac sont propriétaires et seigneurs de Roumégouse en 1790. C'est M. Pisier qui fit construire la tour ronde et qui a donné un nouveau cachet au château. Encore aujourd'hui, ce châtelain a laissé le souvenir d'un homme très bon. Hôtellerie  des Relais et châteaux. . Il accueillit ainsi en 1970 le général de Gaulle.","architecture":"Mordesson,  l'ensemble dans un parc quadrangulaire, le logis principal de plan en équerre avec tour rectangulaire donnant sur cour face à des dépendances toit en croupe prolongé par un bâtiment à toit brisé à deux pans, les deux  dépendances toit à deux pans dont un brisés.                                                                                                          Roumégouse dominant le village de Rignac,                                                                  le château de Roumégouse vers 1900, l'édifice fut transformé selon le goût romantique de l'époque. De fausses accolades de pierre furent ajoutées sur les linteaux des baies, de façon à rendre les originales plus perceptibles.                                                                                                                                Rignac  maison aux deux tourelles La base de cette demeure est contemporaine de la reconstruction de l'église, après la guerre de Cent Ans. L'édifice ne devait pas être assez spacieux, puisqu'il fut modifié et agrandi avant 1762. Il reçut alors en façade deux tourelles de section carrée, chacune sur un léger encorbellement. L'ensemble fut enfin restauré au XIXe siècle.","habitants":"Famille de Guarin de Castelnau,                                                Famille de Chorigny\r\n        \r\n        \"","divers":"Château de Mordesson gravure 1 à 3, Roumégouse de 4 à 7 et la maison à deux tourelles Gravure 8 à Rignac","gps":"","images":["../../jctruffet.com/image/image_46/46_Rignac_1.jpg","../../jctruffet.com/image/image_46/46_Rignac_2.jpg","../../jctruffet.com/image/image_46/46_Rignac_3.jpg","../../jctruffet.com/image/image_46/46_Rignac_4.jpg","../../jctruffet.com/image/image_46/46_Rignac_5.jpg","../../jctruffet.com/image/image_46/46_Rignac_6.jpg","../../jctruffet.com/image/image_46/46_Rignac_7.jpg","../../jctruffet.com/image/image_46/46_Rignac_8.jpg"]},"Consult_chateau_formulaire4586":{"id":"Consult_chateau_formulaire4586","dept":"46","canton":"Souillac","commune":"Fons","nom":"Roc_Fons","type":"Château","periode":"XVI","histoire":"Deux châteaux à Fons celui de Roc et celui de Révéillac                                                                 ROC, pendant la guerre de Cent Ans Jean de R
