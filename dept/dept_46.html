const FULL={"Consult_chateau_formulaire3544":{"id":"Consult_chateau_formulaire3544","dept":"46","canton":"Luzech","commune":"Albas","nom":"Albas","type":"Château","periode":"XV","histoire":"Deux châteaux à Albas  celui d'Albas, de Blainie, de Leret-Monpezat S.C.E.A du comte J-B De Monpezat.                                                                                                                                                                         ALBAS, du IXe siècle  a subi de nombreux remaniements, de 1262 à la fin du XVIIe siècle, c'était un château fort au début du millénaire, puis un château féodal au XIIIe - XIVe et XVe siècles. Albas devient la résidence des évêques de Cahors qui s'y succèdent jusqu'au XVIIe siècle. L'évêque de Cahors était alors le plus puissant des seigneurs où il organisa un domaine important autour de points forts comme Mercuès, Luzech, Puy-l'Évêque ou encore Albas. Contrairement à Puy-l'Evêque ou Luzech, les évêques adoraient demeurer à Albas et s'occupaient toujours de veiller à la sûreté de la cité. Pendant la guerre de Cent Ans, Bernard de Cardaillac occupe le siège de l'évêché. Il renforce les défenses de sa résidence. Après le traité de Brétigny qui livre le Quercy aux Anglais, il continue de séjourner à Albas qui a surtout  souffert des guerres de religion : les Huguenots la pillèrent à plusieurs reprises en 1562, en 1570 et en 1620. En 1577, l'évêché de Cahors eut à sa tête un jeune homme de 18 ans, Antoine d'Hebrard de Saint-Sulpice, qui fit accorder à la petite ville par ordonnance royale du roi Henri III.                                                                                                                                                             BLAINIE,  l'intendant général, Étienne Pagès, Inspecteur des Armées sous le Second Empire, gouverneur des états pontificaux, que le pape Pie IX, et l'Empereur Napoléon III, honorent de leur confiance.   Ce château se vend pour un morceau de pain à la déconfiture de la famille Pagès du Port : Gustave Pagès du Port, maire d'Albas, s'était beaucoup endetté.                                                                                                                                        LERET-MONPEZAT, depuis 1965 viticole de Jean-Baptiste de Montpezat qui est attaché à la légende de Jeanne d'Aymet que le Bon Roi Henri IV séduisit près de la Fontaine qui porte encore son nom \"Bois d'Anglars\" et emmena à Paris pour finalement l'abandonner, tout en restant fidèle au Cahors. C'est là l'origine de la chanson populaire \"Ne pleure pas Jeanette\".","architecture":"Albas, cité féodale connut au Moyen-Âge le même sort que celui des villages voisins. Point stratégique sur la rivière Lot qui était la principale voie de communication, la cité était à la fois un port et une place forte. Le village s'embusqua dans des fortifications sur son bastion et installa des tours de guet à proximité. À l'époque féodale, le Quercy était morcelé en une pléiade de seigneuries laïques et ecclésiastiques. L'agglomération qui se forma autour de la redoutable forteresse étala ses masures aux pentes rocailleuses dégringolant vers la rivière. De cette vaste construction au riche passé, émaillé dévénements et de légendes de toutes sortes, il ne subsiste aujourd'hui du château d'Albas que des vestiges remaniés : il ne reste que deux portes qui permettent d'imaginer ce que le château d'Albas fut, au cours des siècles.                                                                                                     Plus manoir que château la Blainie, surplombant le Lot, il est bâti vers 1865 d 'un soubassement  sur un piton rocheux et au cur du village, près de l'église, édifice rectangulaire à trois niveaux  série de lucarne sur toit brisé à la Mansard et accolé sur l'angle gauche d'une tourelle à quatre niveaux toit en poivrière.                                                                                                                             Leret-Montpezat style de la photo construction moderne du XXe siècle.","habitants":"Antoine d'Hebrard\r\n        \r\n        \"","divers":"Le village d'Albas avec sa mairie, ses fortifications, son château , le château de Blainie gravure 7 et 8 et le château de Lerat-Monpezat gravure 9.","gps":"","images":["../../jctruffet.com/image/image_46/46_Albas_1.jpg","../../jctruffet.com/image/image_46/46_Albas_2.jpg","../../jctruffet.com/image/image_46/46_Albas_3.jpg","../../jctruffet.com/image/image_46/46_Albas_4.jpg","../../jctruffet.com/image/image_46/46_Albas_5.jpg","../../jctruffet.com/image/image_46/46_Albas_6.jpg","../../jctruffet.com/image/image_46/46_Albas_7.jpg","../../jctruffet.com/image/image_46/46_Albas_8.jpg","../../jctruffet.com/image/image_46/46_Albas_9.jpg"]},"Consult_chateau_formulaire2675":{"id":"Consult_chateau_formulaire2675","dept":"46","canton":"Gramat","commune":"Albiac","nom":"Albiac","type":"Château","periode":"XVII","histoire":"ALBIAC, le fief est mentionné dès 1312, et en 1314, le seigneur direct du \"mas\" de Lascombes est noble Aymeric de Buffet.   Hugues de Thémines, frère de Girbert I de Thémines, était seigneur dAlbiac en 1263. Girbert I de Thémines avait rendu hommage au Roi de France \"Saint Louis\", en 1242 pour son château d'Albiac. Par la suite une famille qui avait ce château en prit le nom, mais elle avait pris le parti des Anglais et Jean dAlbiac fut condamné. Ses biens furent saisis et vendus aux enchères. La famille dAlbiac dût quitter la France pour l'Angleterre à la fin du XIVe siècle. Bégon de Roquemaurel, qui avait acheté Thémines et des territoires en 1416, transmit les biens à ses fils Aymeric et Bégon de Roquemaurel, il tenait la moitié de la seigneurie dAlbiac où elle avait la justice haute, moyenne et basse, lautre moitié était tenue par le prieuré des Fieux. Les Roquemaurel conservèrent Albiac jusquen 1841, sauf pendant une brève interruption, à la fin du XVIIIe siècle, quand Marie-Anne de Roquemaurel qui en avait hérité en avait fait donation à son mari Roger du Fayet de la tour d'Olliergue quelle avait épousé le 19 mars 1755. Henri de Roquemaurel, petit-fils de Jean Claude, vendit la propriété en 1841 à Auguste Lacarrière, juge de paix à Lacapelle-Marival, dune famille notable du Quercy qui possédait le château de Labro. Cette famille des Lacarrière possède toujours le château d'Albiac, et une de ces  surs a la propriété de Nicoule qui avait été vendue en même temps quAlbiac.","architecture":"Albiac, l'actuel château semble dater du XVIIe siècle, des traces de bâtiments et tours, qui lui étaient accolés subsistent, léglise du village est adossée à l'édifice, une tribune accessible de la demeure permettait aux seigneurs dAlbiac dassister aux offices. La terre dAlbiac était constituée des domaines dAlbiac et de Nicoule. Cette belle demeure repose sur de magnifiques caves voûtées. Le château d'Albiac a conservé une large fenêtre à meneau et une tour carrée couverte d'une haute toiture à deux lucarnes superposées.  Si des éléments sculptés en réemploi témoignent d'un état de la fin du XVe siècle ou du début du XVIe, le logis conservé ne semble pas antérieur au milieu ou à la seconde moitié du XVIe siècle.","habitants":"Famille de Roquemaurel \r\n        \r\n        \"","divers":"Château d'Albiac et mairie gravure 4 et 5.","gps":"","images":["../../jctruffet.com/image/image_46/46_Albiac_1.jpg","../../jctruffet.com/image/image_46/46_Albiac_2.jpg","../../jctruffet.com/image/image_46/46_Albiac_3.jpg","../../jctruffet.com/image/image_46/46_Albiac_4.jpg","../../jctruffet.com/image/image_46/46_Albiac_5.jpg"]},"Consult_chateau_formulaireeec2":{"id":"Consult_chateau_formulaireeec2","dept":"46","canton":"Gramat","commune":"Alvignac","nom":"Alvignac","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Alvignac celui de Cantecort, de Salgues et le grand hôtel.                                                                            ALVIGNAC, d'après la légende, la découverte de la source remonterait au début de l'ère chrétienne. Les premières études la concernant datent du XVIIe siècle, les curistes commencèrent à arriver et parmi eux des personnages célèbres, telle la Marquise de Pompadour, favorite de Louis XV,  d'ou cette grande bâtisse dit le Grand Hôtel.                                                                                                                                             CANTECORT, le  mont Cantecort  est cité en 1441, au XVe siècle, le fief de Cantecort appartient à la famille des seigneurs de Miers, vassaux du vicomte de Turenne. Les seigneurs de Tanes, les De Géniès, les Fontanges s'y succèdent.   Les Géniès vendent Cantecort à Antoine de Fontanges en 1723. En 1787, le château est acheté par Etienne Clédel, médecin des eaux de Miers, député du Lot, qui y réside jusqu'à sa mort en 1820. A la fin du XIXe siècle, Cantecort devient le centre d'une exploitation agricole.                                                                                                                                        SALGUES, un Roger de Salgues figure en 1097 dans un acte de restitution de terres à l'abbaye de Tulle. Un Rigaud de Salgues est mentionné en 1286 à propos de Miers, dont l'un des co-seigneurs est Pierre de Salgues en 1320. Un membre de la famille, Raymond de Salgues, accompagne en Italie Raymond de Gramat, évêque du Mont Cassin, vers 1326, et reçoit la dignité de patriarche d'Antioche en 1364 ; son seul parent connu serait Bertrand de Salgues, damoiseau. La seigneurie, sans doute tenue du baron de Gramat, passe des Salgues aux Bormes, et noble Jean de Bormes est dit seigneur de Salgues en 1360, en 1589 les Plas de Tanes puis les Palhasses qui y resteront jusqu'à la Révolution. En 1806, vendus comme bien national. La paroisse est démantelée, la majeure partie adjointe à celle d'Alvignac, quelques villages à Rocamadour ou à Rignac. Aujourd'hui, le bâtiment appartient toujours aux descendants de la famille Molinier.","architecture":"Cantecort, à la fin du XIXe siècle,  aujourd'hui, rénové, le château de Cantecort a fière allure sur son promontoire avec sa tour ronde et son mur d'enceinte Cantecort devient le centre d'une exploitation agricole, corps de logis en équerre à deux niveaux toit brisé, la tour carré  sur angle droit et tour ronde à l'opposé, toit en poivrière.                                                       \r\nSalgues,   l'édifice est composé d'un corps de logis rectangulaire, avec en retour d'équerre, un pavillon carré surmonté d'une toiture à la Mansart. Une petite tour ronde datant du XIIe siècle flanque l'angle nord-ouest du château qui a subi divers remaniements, ainsi qu'une partie du corps principal du logis qui a connu une importante campagne de reconstruction au XVIe ou au XVIIe siècle, puis de nouveaux aménagements au XIXe siècle.                                                                                   Grand hôtel de plan rectangulaire à cinq niveaux avec série de lucarnes sur un toit en croupes.","habitants":"Famille d'Antoine de Fontanges                                                      Famille de Bertrand de Salgues \r\n        \r\n        \"","divers":"Château de Cantecort à Alvignac, le château de Salgues gravure 5 à 8  et hôtel thermale gravure 9","gps":"","images":["../../jctruffet.com/image/image_46/46_Alvignac_1.jpg","../../jctruffet.com/image/image_46/46_Alvignac_2.jpg","../../jctruffet.com/image/image_46/46_Alvignac_3.jpg","../../jctruffet.com/image/image_46/46_Alvignac_4.jpg","../../jctruffet.com/image/image_46/46_Alvignac_5.jpg","../../jctruffet.com/image/image_46/46_Alvignac_6.jpg","../../jctruffet.com/image/image_46/46_Alvignac_7.jpg","../../jctruffet.com/image/image_46/46_Alvignac_8.jpg","../../jctruffet.com/image/image_46/46_Alvignac_9.jpg"]},"Consult_chateau_formulairea7d2":{"id":"Consult_chateau_formulairea7d2","dept":"46","canton":"Luzech","commune":"Anglars-Julliac","nom":"Anglars","type":"Château","periode":"XV","histoire":"ANGLARS,  du XVe siècle, la première mention connue du fief d'Anglars apparaît en 1330 avec l'hommage rendu à l'évêque de Cahors par Segai de Valsorian, en 1368, l'hommage est rendu par Guilhelme de Trébous  à la femme de Monpila. En 1504, Pierre de Massault, seigneur d'Anglars, dénombre au roi divers lieux qu'il tient de l'évêque de Cahors sans seigneurie, dont une petite maison antique à Anglars. Le château d'Anglars est pris par le seigneur de Cousserans le 24 octobre 1588. Au XVIIe siècle, le château passe aux Malegat, puis en 1679 aux Dablanc, qui le conservent jusqu'à la Révolution. En 1818, il appartient aux Bonafoux-Murat, auxquels il faut peut-être attribuer la création du parc ; en 1880, il est vendu aux Bénestèbe, qui y installent un haras après la première guerre mondiale,  aujhourd'hui propriété de monsieur  Lafage.","architecture":"Château d'Anglars  du XVe siècle, date du XIXe siècle,  la similitude des deux châteaux, distants de 5 km, de Cousserans, qui serait des années 1472-1479, et d'Anglars suppose des dates de construction très proches, avec sans doute une légère postériorité pour Anglars. Est-ce cet édifice qui est dit antique, de plan cruciforme avec fenêtres à meneaux et de mâchicoulis datant du XVIe siècle. Par opposition aux nouvelles constructions faites à la moderne. Qu'un édifice construit moins d'une vingtaine d'années plus tôt soit ainsi qualifié en 1504 paraît surprenant. le corps de logis à trois niveaux rectangulaire a un de ses grands  côtés coupé par une tour ronde accolée, l'autre étant bossué par une sorte d'avancée en forte saillie.   Tous les angles sont arrondies et le chemin de ronde à Mâchicoulis conservé, fit le tour de l'édifice, l'ancienne porte d'entrée est déjà de style Renaissance.","habitants":"Famille des  Dablanc\r\n        \r\n        \"","divers":"Château d'Anglars à Julliac","gps":"","images":["../../jctruffet.com/image/image_46/46_Anglars_1.jpg","../../jctruffet.com/image/image_46/46_Anglars_2.jpg","../../jctruffet.com/image/image_46/46_Anglars_3.jpg","../../jctruffet.com/image/image_46/46_Anglars_4.jpg"]},"Consult_chateau_formulairedb40":{"id":"Consult_chateau_formulairedb40","dept":"46","canton":"Lacapelle-Marival","commune":"Assier","nom":"Assier","type":"Château","periode":"XVI","histoire":"ASSIER, château féodal construit entre 1518 et 1535 dans le style des nouveaux châteaux de plaisance, il est l'uvre de Jacques Ricard de Genouillac -dit \"Galiot\", premier maître d'armes de François Ier. Tacticien militaire de génie, il est à l'origine de l'artillerie de campagne mobile, rapide et précise, invention qui le rendit célèbre lors des guerres d'Italie et de la bataille de Marignan en 1515. Édifié sur l'emplacement d'un château féodal plus ancien qui appartenait déjà à la famille Ricard de Genouillac. Reflet de la réussite exceptionnelle d'un homme, constitue un précieux témoignage de l'architecture de la Renaissance en Quercy. Jeanne, seule héritière de Galiot de Genouillac, se marie à Charles de Crussol, vicomte d'Uzès en 1546. En 1768, le duc d'Uzès, son descendant, réserve à l'aile ouest un usage agricole et vend la majeure partie du château à des démolisseurs et marchands de matériaux. Malgré le classement en 1841 par Prosper Mérimée, l'aile restante est utilisée comme remise agricole jusqu'à ce que l'ensemble des ruines soit acquis par l'État en 1934. Dès 1901, de nombreuses restaurations sont réalisées.","architecture":"Assier, édifice splendide  du début du XVIe siècle se composait d'un vaste plan en quadrilatère de 40 m de côté reprenant les soubassements de l'édifice du Moyen-Age dont il avait conservé les 4 tours rondes massives à chaque angle coiffées de dômes à l'impériale. C'est un bâtiment en pierres à un étage dont la cheminée en pierre de taille de la salle des meules est du XVIe siècle, il ne subsiste que l'aile ouest percée d'un portail spectaculaire à portiques, loggias et frontons qui abritait, dans la niche au premier étage, une statue équestre de Galiot de Genouillac. La façade  extérieure couronnée de faux mâchicoulis et celle sur cour est ornée de travées de fenêtres et de deux larges frises, richement sculptées d'emblèmes qui font référence aux fonctions militaires de Galiot de Genouillac et à la légende d'Hercule. L'ancien colombier à pied, donc de seigneur haut justicier, daté de 1537, est une tour à toiture à lanternon. Les quatre paires de meules et leurs mécanismes datent des environs de 1880. Le moulin hors d'usage depuis 1914 est propriété de l'état depuis 1934.\r\nLe logis nommé grange de Bargues, situé dans l'ancienne basse-cour du château a été mentionné dès 1545 comme la demeure de l'écuyer Murat de Montaï. Ce logis a été inscrit monument historique le 27 décembre 2001. L'intérieur comporte 2500 boulins de terre cuite vernissée, desservis par une échelle de visite tournante. Le moulin a été édifié à l'emplacement d'un moulin médiéval et plusieurs fois transformé. Propriété privée il a été inscrit monument historique le 21 novembre 2005.","habitants":"Famille de Jacques Ricard de Genouillac \r\n        \r\n        \"","divers":"Château d'Assier  avec une tour et hôtel de ville, gravure 8","gps":"","images":["../../jctruffet.com/image/image_46/46_Assier_1.jpg","../../jctruffet.com/image/image_46/46_Assier_2.jpg","../../jctruffet.com/image/image_46/46_Assier_3.jpg","../../jctruffet.com/image/image_46/46_Assier_4.jpg","../../jctruffet.com/image/image_46/46_Assier_5.jpg","../../jctruffet.com/image/image_46/46_Assier_6.jpg","../../jctruffet.com/image/image_46/46_Assier_7.jpg","../../jctruffet.com/image/image_46/46_Assier_8.jpg"]},"Consult_chateau_formulaire4e36":{"id":"Consult_chateau_formulaire4e36","dept":"46","canton":"Castelnau-Montratier","commune":"Aujols","nom":"Aujols","type":"Château","periode":"XIII","histoire":"AUJOLS, la seigneurie d'Aujols semble appartenir à la famille de Cardaillac dès le XIIIe siècle. En effet, en 1252, Bertrand de Cardaillac-Bioule hommageait au chapitre de Cahors pour divers fiefs de la contrée, dont, entre autres, celui dAujols. Il ne semble pas exister dautres seigneurs à Aujols que les Cardaillac : on voit dabord la branche principale de Bioule, puis le rameau de Saint Cirq et Cieurac faire hommage au chapitre de Cahors de nombreuses possessions quelle possède dans la région, notamment à Aujols. En 1543, Antoine de Cardaillac, seigneur de Peyre en Gevaudan, hommage pour Saint-Cirq, Cieurac, Concots et Aujols, au chapitre de Cahors. Son fils, Antoine II fait en 1598 un accord avec les habitants dAujols au sujet des aréages de la rente. La veuve de ce dernier, Antoinette de Paluels, vend aux consuls des rentes sur les paroisses dAujols et de Laburgade. Le château dAujols fut laissé par Bertrand II de Cardaillac-Bioule à sa veuve. En 1631, la moitié de la terre dAujols fut achetée par damoiselle de Vanis de noble Antoine de Fontanges, seigneur de Laroque des Arcs et Charles de Fontanges, seigneur de Saint-Hilaire. Il sagit de la partie de Flaujac et de Hauteserre. Cette partie passa aux Dadine de Hauteserre. La famille de la Popie de Saint-Cirq avait au XIVe siècle dans Aujols un fief de la Raymondie. Aujols avait ses consuls au nombre de trois.","architecture":"Le château d'Aujols sur lemplacement de lancien château des Cardaillac est attesté par le mur crénelé inscrit à lInventaire supplémentaire des Monuments Historiques, et qui se présente sous la forme dun mur surmonté de créneaux dont le caractère défensif est quelque peu contredit par la présence dune claire-voie ouvrant largement lédifice vers lextérieur. Il est de fait probable que cette élévation relève de plusieurs campagnes de travaux attestées notamment par les changements dappareil de maçonnerie.     La claire-voie, qui se distingue par un linteau plat, se compose dune série de quatre baies divisées par un meneau et alternant avec des trumeaux soigneusement appareillés. Les baies s'appuient sur un cordon mouluré et sont surmontées par un oculus orné dun remplage en forme de trèfle. On note la présence dune porte en tiers point et de jours moulurés. On saperçoit dautre part, que des constructions carrées, en saillie, jalonnent ces limites notamment au contact des passages. Il sagit peut-être de dispositifs défensifs associés à des portes. La forme dans son ensemble évoque un castrum mais nulle mention nest faite du castrum dAujols. Le château des Cardaillac est venu occuper une position stratégique dominant dune part la combe de la Valse et commandant dautre part lun des axes vitaux du département.","habitants":"Famille de Cardaillac\r\n        \r\n        \"","divers":"Châteaux d'Aujols","gps":"","images":["../../jctruffet.com/image/image_46/46_Aujols_1.jpg","../../jctruffet.com/image/image_46/46_Aujols_2.jpg","../../jctruffet.com/image/image_46/46_Aujols_3.jpg","../../jctruffet.com/image/image_46/46_Aujols_4.jpg","../../jctruffet.com/image/image_46/46_Aujols_5.jpg"]},"Consult_chateau_formulaire2dea":{"id":"Consult_chateau_formulaire2dea","dept":"46","canton":"Saint-Céré","commune":"Autoire","nom":"Autoire","type":"Vestiges","periode":"XIII","histoire":"ANGLAIS-AUTOIRE,  appelée la Roca dans les textes, la fortification est désignée en 1259 parmi les possessions pour lesquelles Hugues de Castelnau, seigneur de Gramat, rendait hommage à Alphonse de Poitiers, comte de Toulouse. Elle appartenait toutefois avant 1178 à la châtellenie de Saint-Céré, elle-même  dépendante de la vicomté de Turenne. La tradition rapporte que la roque fut occupée en 1378 par Bernard de la Salle, capitaine des compagnies de routiers à la solde du roi dAngleterre qui, durant la guerre de Cent Ans, pillèrent les villes et les campagnes du Quercy. Deux siècles plus tard, un acte du 3 mars 1588 stipule que la \"salle del Roc\" du fort appelé \"la Crose\" était tenue par Jean Mollé, chef protestant connu sous le nom de \"capitaine Vinsou\", auquel Jacques de Mostolac, écuyer et gouverneur  de la ville de Saint-Céré, demandait expressément le retrait au nom du vicomte de Turenne.","architecture":"Le château des Anglais la  partie centrale dune douzaine de mètres est la plus vieille et remonte au XIIIe siècle. En son temps, cette partie comportait deux étages sur rez-de-chaussée, les solives venant sencastrées dans la falaise. La partie nord est venue se rajouter quelques décennies plus tard et comportait également deux étages sur rez-de-chaussée. Contrairement à la partie centrale, ce bâtiment disposait de certaines  commodités, cheminée et latrines, conduisant à linterpréter comme un logis. La tour descalier à vis a été accolée au sud de la partie centrale afin den desservir les trois niveaux vers le XVe siècle.  De nombreux vestiges sont présents à flanc de falaise sur plus de 200 mètres. Des murailles, des portes, une grotte fortifiée, des maisons, et des tours, sont présentes mais cachées en partie par la végétation.                                                                                                                        Manoir à Autoire ferme et forteresse en même temps se présente en un bouquet de tourelles ou un notable de Céré venait se détendre,                                                                                                    Anglais dit de la Roque, ensemble du château mesure 28 mètres de long sur 2 mètres de large et a été établi sur un léger replat protégé par un surplomb du rocher. Les bâtiments qui le composent sont en grande partie ruinés.","habitants":"Jacques de Mostolac\r\n        \r\n        \"","divers":"Vestiges du château des Anglais à Autoire","gps":"","images":["../../jctruffet.com/image/image_46/46_Autoire_1.jpg","../../jctruffet.com/image/image_46/46_Autoire_2.jpg","../../jctruffet.com/image/image_46/46_Autoire_3.jpg"]},"Consult_chateau_formulaire5538":{"id":"Consult_chateau_formulaire5538","dept":"46","canton":"Saint-Céré","commune":"Aynac","nom":"Aynac","type":"Château","periode":"XVII","histoire":"AYNAC,  les seigneurs du lieu était les Beaufort jusqu'en 1399 et à la fin du XIVe siècle la seigneurie d'Aynac revient à une branche bâtarde de la maison de Turenne. Flotard III de Turenne (vers 1600-après 1675), fils de François, baron d'Aynac. Il s'était marié en 1633 avec Claude de Gourdon de Genouillac, dame d'Aubepeyre, sur de Jean-Paul Ricard de Gourdon de Genouillac (1621-1681), comte de Vaillac, premier écuyer de Philippe d'Orléans, fille de Louis II de Gourdon et de Genouillac, maréchal de camp, et de Françoise de Cheyradour, dame d'Aubepeyre. Il a servi comme guidon dans la compagnie de gendarmes du maréchal de Thémines, son cousin. ainsi que dans l'armée qui commandait le maréchal de Thémines en Guyenne pour lutter contre les protestants révoltés. Il a reçu une commission de Louis XIII pour se rendre à Cardaillac pour contenir les protestants du Haut-Quercy qui y tenaient des assemblées. Elevé au rang de marquisat en 1677. Les décors des plafonds du château ont été réalisés par Flotard de Turenne. Son fils, Louis de Turenne, a enrichi la décoration et a ajouté ses initiales avec la couronne de marquis. Pendant tout le XVIIIe siècle le château est délaissé. Il est malmené pendant la Révolution en partie incendié. Le château commence à être restauré à partir du milieu du XIXe siècle. Élisabeth Berthier, princesse de Wagram, se prit de passion pour le château et entreprit de remettre en état la vieille résidence de la famille de son époux. Puis la famille de Turenne d'Aynac vend le château. Il a été acheté par la commune en 1973.  la commune a décidé de le revendre.","architecture":"Le château du XVIIe siècle est constitué de trois ailes flanqués  de quatre  tours d'angles circulaires couronnées de mâchicoulis couvertes  en dôme  recouverte de lauzes façonnées en tuiles plates, de deux corps de logis soudés au centre par la haute tour recevant la cage dun escalier monumental , dit le donjon rectangulaire  de six étages. Les autres toitures en pavillon sont munies de lucarnes surmontées par des frontons ornés de pinacles de pierre. La tour côté nord-ouest est la plus importante, et peut-être la plus ancienne. Elle dispose dailleurs dun plan intérieur carré. Au XIXe siècle, les fenêtres à meneaux et les croisillons dorigine ont été remplacés par de larges baies. Lescalier à rampe droite de style Renaissance permet de monter les six étages de la tour. Il est couvert de voûtes appareillées retombant au niveau des paliers sur des pilastres doriques. Le château comprend au total une soixantaine de pièces. La grande salle du premier étage et le salon, ont conservé leurs dispositions initiales conçues peu après 1633 dans lesquelles se trouvent deux plafonds à la Française ornés de décors peints, ainsi que deux cheminées monumentales, lune sculptée dans la pierre, lautre en bois polychrome avec une dominante de dorure. Les autres pièces de lédifice ayant été transformées au cours du  XXe siècle.","habitants":"Famille de Turenne d'Aynac\r\n        \r\n        \"","divers":"Château d'Aynac","gps":"","images":["../../jctruffet.com/image/image_46/46_Aynac_1.jpg","../../jctruffet.com/image/image_46/46_Aynac_2.jpg","../../jctruffet.com/image/image_46/46_Aynac_3.jpg","../../jctruffet.com/image/image_46/46_Aynac_4.jpg"]},"Consult_chateau_formulaire176a":{"id":"Consult_chateau_formulaire176a","dept":"46","canton":"Gourdon","commune":"Le Vigan","nom":"Barrière","type":"Manoir","periode":"XVI","histoire":"BARRIERE manoir de Corinne et José seront heureux de vous accueillir dans cette  demeure de charme du XVIe siècle, classée monument historique, vous ouvre ses portes et met à votre disposition des chambres et suites pouvant accueillir de 2 à 5 personnes.","architecture":"Barrière ensemble de bâtiment flanqué de trois corps accolés d'un étages toit à deux pans en tuiles un quatrième à deux étages avec une tourelle en façade carrée de cinq étages  toit à quatre pans.","habitants":"Corinne et José\r\n        \r\n        \r\n        \"","divers":"Château de Barrière à le Vigan.","gps":"","images":["../../jctruffet.com/image/image_46/46_Barriere_1.jpg","../../jctruffet.com/image/image_46/46_Barriere_2.jpg"]},"Consult_chateau_formulaireb6ab":{"id":"Consult_chateau_formulaireb6ab","dept":"46","canton":"Souillac","commune":"Lacave","nom":"Belcastel_Lacave","type":"Château","periode":"XV","histoire":"BELCASTEL,  Au XIIe siècle, le cartulaire de l'abbaye indique la présence d'une famille de Belcastel qui s'approprie le nom de la forteresse qu'elle occupe. Au XIIIe siècle la seigneurie est partagée entre les Belcastel, une branche des Cardaillac, une branche des Cosnac. Pendant la guerre de Cent Ans la forteresse ne sera pas épargnée par les troupes anglaises. Le bâtiment sera attaqué et occupé plusieurs fois durant le conflit. Au XVe siècle, la demeure appartient à une famille de co-seigneurs, les Bauze, qui s'installent dans le château. En 1650, des difficultés financières obligent leur descendant à céder l'édifice à Jean Charles de Belcastel, baron de Campagnac, descendant lointain des anciens seigneurs.  Au XVIIIe siècle, le château passe à la famille de Calvimont, dont l'émigration, durant la Révolution, va entraîner la confiscation des biens. Les Grèzes de Saintours sont propriétaires au début du XIXe siècle mais en 1849, des difficultés financières les obligent à vendre la propriété dont les bâtiments ruinés servent d'abri au bétail, à un négociant de Brive, François Firmin Martine, c'est l'une de ses filles, Marie Thérèse Gheerbrant, qui entreprend, vers 1895, la reconstruction du château.","architecture":"Belcastel sur un éperon rocheux trés aigu et trés élevé, ce château médiéval dresse une silhouette pittoresque. Seuls les murs de souténement peuvent correspondre à l'ancienne enceinte, la reconstruction se divisent en 4 parties distinctes, Il comprend un grand corps de logis rectangulaire  percé de fenêtres à meneaux, coupé par une tour ronde engagée. La forteresse comportait aussi un massif  donjon carré,  la chapelle et l'enceinte, la forteresse  est bâti en gros moellons appareillés. Il ne restait, avant sa restauration, aucune trace de son aspect défensif. La chapelle se dresse à l'extrémité Est de la falaise.","habitants":"Famille de Calvimont\r\n        \r\n        \"","divers":"Château de Belecastel à Lacave","gps":"","images":["../../jctruffet.com/image/image_46/46_Belcastel_Lacave_1.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_2.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_3.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_4.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_5.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_6.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_7.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_8.jpg","../../jctruffet.com/image/image_46/46_Belcastel_Lacave_9.jpg"]},"Consult_chateau_formulaire005c":{"id":"Consult_chateau_formulaire005c","dept":"46","canton":"Lacapelle Marival","commune":"Bessonies","nom":"Bessonies","type":"Château","periode":"XVI","histoire":"BESSONIES, en 1789, son propriétaire Jean Joseph de Bessonies, gouverneur du Roi en la ville de Figeac, condamné à la guillotine, est sauvé par la chute de Robespierre. Son fils, Ambert, épouse la cousine germaine de la femme du maréchal Ney (1769-1815). C'est dans  ce château de Bessonies que le maréchal Ney se réfugie, et qu'il est arrêté en 1815 avant d'être ramené à Paris pour y être exécuté.\r\nLe château a été transformé en chambres d'hôtes , est aussi ouvert au public pour des visites.","architecture":"Château de Bessonies est attestée depuis 1555. La construction du château date du XVIe siècle, édifice de plan en équerre à trois niveaux  série de lucarnes en façade dont une centrale importante sur un toit en croupe  en ardoise entre deux tours rondes sur angles de la façade, dont l'une  la plus imposante avec mâchicoulis, toute deux toit en poivrières,  sur l'arrière deux pavillons saillants.","habitants":"Maréchal Ney\r\n        \r\n        \r\n        \"","divers":"Château de Bessonies à Lacapelle-Marival","gps":"","images":["../../jctruffet.com/image/image_46/46_Bessonies_1.jpg","../../jctruffet.com/image/image_46/46_Bessonies_2.jpg","../../jctruffet.com/image/image_46/46_Bessonies_3.jpg","../../jctruffet.com/image/image_46/46_Bessonies_4.jpg","../../jctruffet.com/image/image_46/46_Bessonies_5.jpg","../../jctruffet.com/image/image_46/46_Bessonies_6.jpg","../../jctruffet.com/image/image_46/46_Bessonies_7.jpg","../../jctruffet.com/image/image_46/46_Bessonies_8.jpg"]},"Consult_chateau_formulaire7e23":{"id":"Consult_chateau_formulaire7e23","dept":"46","canton":"Martel","commune":"Vayrac","nom":"Blanat","type":"Château","periode":"XV","histoire":"BLANAT a été construit dans la deuxième moitié du XVe siècle pour Gausbert de Blanat, seigneur du lieu et vassal du vicomte de Turenne.  Les Blanat sont une famille de marchands mentionnée à Martel dans le courant du XIVe siècle. Gausbert de Blanat, marié avant 1451 à noble Guinote de Metge, est co-seigneur de Saint-Michel en 1463. Le château aurait été construit dans la deuxième  moitié du XVe siècle pour Gausbert de Blanat , co-seigneur de Saint-Michel et vassal du vicomte de Turenne, mais la présence des armoiries de Marguerite de Sermur, mariée à Raymond de Blanat en 1554, laisse au moins supposer des travaux d'aménagement dans la seconde moitié du XVIe siècle. Cette famille s'éteint pendant les guerres de Religion. En 1573, Guynot de Blanat et sa femme Gabrielle, née de Rilhac, sont assassinés par une troupe protestante commandée par le capitaine Antoine de Maleville de triste réputation. La seigneurie revient au père de Gabrielle, Jean de Rilhac, baron de Saint Martin Valméroux. L'héritière du baron, ruinée, vendra en 1722 le château à Antoine Chameyrac, ancien officier du Roi. Il lèguera la demeure à Henri Dulmet, coseigneur de Saint-Michel de Bannières, les Dulmet conserveront le domaine jusqu'à la Révolution, puis il passera par alliance à la famille d'Aupias jusqu'à la fin du XIXe siècle. A cette date, le comte de Bernis, gendre de la famille, en hérite.","architecture":"Blanat ancienne forteresse  située à l'extrémité du plateau d'Issolud d'ou elle domine le confluent de la Dordogne et de la Tourmente, mais la dénivellation n'a rien de vertigineux, un corps de logis exigu, un peu trop restauré ce loge entre deux grosses tours rondes aux angles en façade  dont une à conservé ses mâchicoulis  mais à perdu sa toiture et une tour polygonale sur l'élévation arrière. Un beau et grand parc, bien dessiné, agrémente cette propriété pleine de charme.Les fenêtres actuelles de l'élévation ouest témoignent d'une campagne de travaux du XVIIIe siècle. L'édifice a été amplement restauré aux XIXe et XXe siècles.","habitants":"Famille de Gausbert de Blanat\r\n        \r\n        \"","divers":"Château de Blanat à Vayrac","gps":"","images":["../../jctruffet.com/image/image_46/46_Blanat_1.jpg","../../jctruffet.com/image/image_46/46_Blanat_2.jpg","../../jctruffet.com/image/image_46/46_Blanat_3.jpg","../../jctruffet.com/image/image_46/46_Blanat_4.jpg","../../jctruffet.com/image/image_46/46_Blanat_5.jpg","../../jctruffet.com/image/image_46/46_Blanat_6.jpg","../../jctruffet.com/image/image_46/46_Blanat_7.jpg"]},"Consult_chateau_formulaireccaa":{"id":"Consult_chateau_formulaireccaa","dept":"46","canton":"Puy-L","commune":"Le Boulvé","nom":"Boulvé","type":"Château-fort","periode":"XIII","histoire":"BOULVE, le château s'est construit autour d'une tour datant du XIIIe siècle et a connu des transformations du XVe au XVIIe siècle. Ce château seigneurial fut le repaire de la famille des Siguier puis des Orgueil, suite au mariage de Jeanne de Siguier avec Bertrand d'Orgueil. Le château va demeurer possession des seigneurs d'Orgueil jusqu'au milieu du XVIe siècle. En 1543, après la disparition du dernier, Bertrand de Montaigu hérite du domaine. En 1552, Pierre de Montaigu épouse Catherine de Gauléjac, et en 1589, leur fille, Jeanne de Montaigu se marie à Pons de Bécave de Sérignac. Par alliance, les Salignac posséderont le château. Avant la Révolution, en 1780, leur descendant, Safran de Durfort-Boissières, cédera le domaine au sieur Loudès, avocat à Saint Céré. Très délabrée vers 1970, la demeure sera sauvée de la ruine par un artiste-peintre britannique Anthony Gross.                                                                                                                                                                     A 10 Kilomètres au sud ouest à Saux le château de Miraval dit tour de Miraval viticole par Evelyne Demeaux-Levy.","architecture":"Boulvé La transformation du repaire en château, qu'il faut attribuer aux Orgueil, est probablement effectuée après la guerre de Cent Ans, dès la seconde moitié du  XVe siècle ou bien au début du  XVIe siècle. Le château est amplement remanié au XVIIe siècle, époque à laquelle appartiennent la plupart des fenêtres ; l'escalier à vis est remplacé par un escalier rampe sur rampe en élargissant la cage dont la porte est datée de 1668, et un escalier de même forme est installé dans l'aile ouest (aujourd'hui disparue). Au cours de la seconde moitié du XVIIe siècle, et jusqu'en 1780, les seigneurs du Boulvé sont les Durfort-Boissières. Une description de \"l'ancien château\", alors habité par Pergot, notaire à Prayssac : \"présentant à l'extérieur sur sa façade au midi une tour démolie presque au niveau du restant de la bâtisse et recouverte en tuiles canal, avec une grande cour, greniers, écuries, grange, four, fournil, pigeonnier, le tout contigu et joignant\".\r\nTrès délabré, l'édifice a été sauvé de la ruine par le peintre Anthony Cross, qui l'a acheté en 1970.                                                                                         Miraval de plan rectangulaire à deux niveaux flanqué aux extrémité de pavillons rectangulaires saillants avec toit en croupe.","habitants":"Famille des Siguier\r\n        \r\n        \r\n        \"","divers":"Château de Boulvé et Miraval gravure  7 et 8.","gps":"","images":["../../jctruffet.com/image/image_46/46_Boulve_1.jpg","../../jctruffet.com/image/image_46/46_Boulve_2.jpg","../../jctruffet.com/image/image_46/46_Boulve_3.jpg","../../jctruffet.com/image/image_46/46_Boulve_4.jpg","../../jctruffet.com/image/image_46/46_Boulve_5.jpg","../../jctruffet.com/image/image_46/46_Boulve_6.jpg","../../jctruffet.com/image/image_46/46_Boulve_7.jpg","../../jctruffet.com/image/image_46/46_Boulve_8.jpg"]},"Consult_chateau_formulaire4ce1":{"id":"Consult_chateau_formulaire4ce1","dept":"46","canton":"Cahors-2","commune":"Arcambal","nom":"Bousquet","type":"Château","periode":"XI-XIV","histoire":"BOUSQUET,  appartenait à Jean de Bousquet, il remonte au XIe siècle. Un de ses seigneurs fut chevalier de Malte. La connaissance de la famille du Bousquet commence avec Jean du Bousquet, anobli en 1341, frère du cardinal Bernard du Bousquet, archevêque de Naples. Jean du Bousquet pourrait être le constructeur du premier édifice. En 1528, l'héritière du château Catherine du Bousquet épousera un membre de la famille Deslax. Au  XVIIe siècle, la famille Deslax d'Arcambal fit construire les tours de la façade ouest et la terrasse à balustrade. En 1787, complètement ruiné, le marquis Deslax d'Arcambal, maréchal des camps et armées du roi, doit vendre le château. La propriété est vendue en 1804, puis en 1816, aux ancêtres des actuels propriétaires. Le château du Bousquet est inscrit aux M.H.depuis 1979.","architecture":"Bousquet, situé sur un promontoire, il a conservé sa fière silhouette fortifiée, de style médiéval, entouré de tours circulaires irrégulières. Il possède à l'intérieur, un escalier de pierre et une salle voûtée de deux croisées d'ogives dont l'une permet l'accès à une porte proche sa construction date du XIVe au XVIIe siècle.   Son donjon fut brûlé trois fois. C'est à la fin de la guerre de cent ans, entre 1484 et 1525, que débuta la construction de l'imposante tour centrale, ainsi qu'une part importante de l'édifice comme le montre l'usage de motifs de roses et de bâtons écotés.  Le château du Bousquet est un imposant logis composé de plusieurs corps de bâtiments flanqués de tours rondes qui sorganisent autour dune grosse tour circulaire. Des similitudes entre cette tour et celle de la borie de Polminhiac  pourraient laisser penser que les origines du château dArcambal sont peut-être antérieures au XVe siècle.  Des éléments décoratifs issus du vocabulaire ornemental des années 1485 1525, tels que des bâtons écotés, des roses et des monogrammes sculptés sur les baies de la tour et demi-croisées de laile occidentale, attestent d'une phase de reconstruction menée à la fin du XVe siècle. Lédifice fut lobjet de plusieurs campagnes de travaux où lemploi de la pierre alterne avec celui de la brique : fenêtres et balustrades de pierres sont eneffet issus daménagements réalisés au XVIIe puis au XVIIIe siècle.On compléta plus tard au XIXe siècle la face méridionale du château en refermant la cour intérieure dun monumental portail en pierre.","habitants":"Famille   Deslax d'Arcambal\r\n        \r\n        \"","divers":"Château du Bousquet à Arcambal","gps":"","images":["../../jctruffet.com/image/image_46/46_Bousquet_1.jpg","../../jctruffet.com/image/image_46/46_Bousquet_2.jpg","../../jctruffet.com/image/image_46/46_Bousquet_3.jpg"]},"Consult_chateau_formulaire3e90":{"id":"Consult_chateau_formulaire3e90","dept":"46","canton":"Cahors-1","commune":"Mercuès","nom":"Bouysses","type":"Prieuré","periode":"XIX","histoire":"BOUYSSES, en 1232, sur injonction royale, le seigneur de Rassiels, Raymond de Lard, a fait don de sa terre  des Bouysses  à Dame Guillemette, seconde abbesse de Leyme, pour qu'elle y fonde un prieuré cistercien où s'installèrent une douzaine de religieuses.\r\nPendant la guerre de Cent Ans, ces dernières furent expulsées par les anglais de leurs terres qu'elles récupérèrent en 1600. Le domaine, transformé partiellement en vignoble, produisait déjà un cahors. Les religieuses de Leyme le firent prospérer. En 1745, elles autorisèrent même la démolition de leur chapelle pour construire à la place un chai. Devenu bien national avec la Révolution, le domaine est cédé en 1791 à François Agar, maire de Mercuès, négociant en vin à Mercuès et à Paris-Bercy qui fait reconstruire le château sur les anciennes caves. Mis en faillite par l'incendie de ses entrepôts de Paris, François Agar vendit le domaine des Bouysses, en 1823, à l'un de ses cousins, Jean-Michel Agar, comte de Mosbourg. Ce dernier, qui devait son titre à Louis XVIII, avait été ministre des finances du roi de Naples, Joachim Murat. Agar revient dans le Lot après la mort de Murat en 1815, et devint député du Lot de 1830 à 1834, et président du conseil général du département du Lot pendant 14 ans. L'héritage du comte de Mosbourg dont le fils n'avait pas eu d'enfant, passa à la fin du XIXe siècle, aux neveux de ce dernier, les vicomtes de Rougé, descendants de la longue lignée, mentionnée depuis 1045, attestée depuis 1375, de la famille de Rougé. Le dernier vicomte, « inventeur » sans brevet des « queues d'avion » céda peu à peu son domaine. La famille Marre en devient ainsi propriétaire en 1933 toujours dans cette famille.","architecture":"Bouysses, les  Mosbourg fit au XIXe siècle construire ou reconstruire la plupart des bâtiments du château tel que l'on peut le voir aujourd'hui. Notamment un escalier à double volée et un élégant perron de style italien, souvenir de ses voyages. L'orangerie fut construite en 1820. À côté, ont été aussi construites des écuries. Des travaux de réhabilitation du château qui avait beaucoup souffert au cours des ans ont été entrepris. Après avoir été une simple exploitation agricole, il a été décidé de lancer l'opération de réhabilitation du corps du bâtiment. La demeure présente un corps principal flanqué d'une aile formant équerre. Au nord, la façade ouvrant sur la vallée du Lot possède une terrasse abritée à l'ouest, par une aile formant équerre. La façade principale s'orne d'un escalier à double volée à montée convergente à partir d'une première volée droite. Les caves en plein cintre dateraient du XIIIe siècle et seraient le seul vestige de l'ancien prieuré cistercien. La logis d'inspiration italienne construit sur les anciennes caves à la fin du XVIIIe siècle est flanqué d'une aile en équerre. Un escalier à double volée orne la façade.","habitants":"Famille de François Agar\r\n        \r\n        \"","divers":"Château de Bouysses à Mercuès","gps":"","images":["../../jctruffet.com/image/image_46/46_Bouysses_1.jpg","../../jctruffet.com/image/image_46/46_Bouysses_2.jpg","../../jctruffet.com/image/image_46/46_Bouysses_3.jpg","../../jctruffet.com/image/image_46/46_Bouysses_4.jpg","../../jctruffet.com/image/image_46/46_Bouysses_5.jpg"]},"Consult_chateau_formulaire0e82":{"id":"Consult_chateau_formulaire0e82","dept":"46","canton":"Cajarc","commune":"Bouziès","nom":"Bouziès","type":"Château-vestiges","periode":"XII-XV","histoire":"Trois châteaux à Bouziès celui de Bouziès , de Coduché et de Condat                                                                                             BOUZIES; des « châteaux des Anglais » il en existe plusieurs dans les rochers bordant le Lot entre Cahors et Figeac, ces fortifications troglodytiques existaient avant la guerre de 100 ans. Elles étaient des repères de brigands à la solde de lAnglais. Celle-ci a gardé le nom de château des Anglais, même si sa réalisation est datée du XIVe siècle.                                                                                                     CONDUCHE,  il y eut une famille de ce nom, en 1517, Forton de Conduché. De son fils Bertrand de Conduché, marié à Isabelle de Chaumette, naquit Françoise de Conduché qui épouse en 1523 Pierre de Rodorel, seigneur de Frayssinet et de Fargues. Il devait prendre le nom de Conduché. Pierre épouse en seconde noceFrançoise de Leigue. Les Rodorel seront encore seigneurs directs de Conduché au XVIIIe siècle : en 1672, ils achètent la haute justice à noble Pons de Bécave, seigneur de Sérignac et de Saint Cirq. Mais à leur tour, ils vendent la seigneurie de Conduché en 1776. En 1786, Pierre de Malleville est dit seigneur de Conduché et Bouziès.                                                                                                                                                                           CONDAT,  ce dernier appartenait peu avant 1452 à Pierre Cornavi, marchand de Cajarc,qui le louait à bail emphytéotique à noble Antoine de Saint-Géry, fils de Pons de Podio.  A la fin du Moyen-Âge, c'était une exploitation agricole noble appartenant à la famille de Saint-Géry. En 1503, lors du dénombrement, Antoine de Saint-Géry reconnaît posséder, entre autres, le fief de Condat. Puis le château est acquis, en 1776, par M. de Maleville. Eléments protégés MH : les façades et les toitures du château; l'escalier et le pigeonnier: inscription par arrêté du 14 mai 1987.","architecture":"Condat, ce château présente deux corps de bâtiment disposés en angle droit, de volumes différents. Daprès les baies qui percent le bâtiment, celui-ci aurait été construit à la fin  du XVe siècle ou au début du XVIe siècle. Cest un édifice complexe, composé au Nord-Est dun corps principal de plan rectangulaire, associé au Sud-Est à une partie en forme de tour. Un autre corps de bâtiment fut édifié peu de temps après, sur le flanc sud-est des deux entités précédentes.  Par la suite ou dans le même temps que la construction du corps sud-est, on éleva une cage descalier de plan rectangulaire intégrant le portail dentrée.  Il devait s'inscrire dans un ensemble plus important et plus ancien. Le rez de chaussée est occupé par des caves dont une est voûtée. A proximité se trouve un pigeonnier circulaire dépendant du château                                                                                                                      Condouché,  château sans caractère aujourd'hui, ce n'est qu'une fort grande et vieille demeure, avec des fenêtres à meneaux et une tour ronde. Il y avait, avant 1687, et peut-être aussi ensuite, une chapelle à Conduché. Dans un inventaire du XVIIIe siècle, on retrouve la permission de bénir la chapelle du château.                                                                                                                   SOULIAC   À proximité, la chapelle Notre-Dame du Roc-Troucat, le rocher troué, de 1850, en partie troglodytique, est un lieu de pélerinage annuel. Par le chemin en corniche, on longe les ruines d'un château, d'où l'on peut voir sur la rive opposée le château de Géniez du XVIe siècle, dressant sur une sorte d'isthme son logis à la Mansard et sa tour ronde.","habitants":"Famille de Conduché                                                                 \r\nFamille de Saint-Géry\r\n        \r\n        \r\n        \"","divers":"A Bouziès  château dit des  Anglais gravure 1, de Condat gravure 2-3-4 et 5 Conduché gravure 6.","gps":"","images":["../../jctruffet.com/image/image_46/46_Bouzies_1.jpg","../../jctruffet.com/image/image_46/46_Bouzies_2.jpg","../../jctruffet.com/image/image_46/46_Bouzies_3.jpg","../../jctruffet.com/image/image_46/46_Bouzies_4.jpg","../../jctruffet.com/image/image_46/46_Bouzies_5.jpg","../../jctruffet.com/image/image_46/46_Bouzies_6.jpg"]},"Consult_chateau_formulaire6b06":{"id":"Consult_chateau_formulaire6b06","dept":"46","canton":"Cajarc","commune":"Brengues","nom":"Brengues","type":"Château-Troglodytiques","periode":"XII-XIII","histoire":"ANGLAIS-BRENGUES, dit de la Roque de Brengues est une possession des Barasc de Béduer au XIIIe siècle. Elle appartient ensuite à une branche de la famille de  Cardaillac-Brengues. Le haut pan de mur qui subsiste avec des baies et une porte en plein cintre dont les arcs sont constitués de petits claveaux permettent de placer sa construction au XIIe siècle. À quelques centaines de mètres au sud du château on trouve un pan de mur avec une porte ogivale et une archère cruciforme. Elle a dû être ajoutée en 1347 d'après Valérie Rousset. En 1504, d'après le dénombrement du ban et de l'arrière-ban, la seigneurie de Brengues est à Jean de Cardaillac, seigneur . Le château a été inscrit au titre des monuments historiques depuis le 30 octobre 1925.","architecture":"Château des Anglais est un château bâti à Brengues  est l'archétype du château plaqué contre une paroi rocheuse qui se voit dans les vallées du Lot en amont de Cahors et du Célé. Il a été construit du XIIe au XIVe siècle. Le haut pan de mur qui subsiste avec des baies et une porte en plein cintre dont les arcs sont constitués de petits claveaux permettent de placer sa construction au XIIe siècle. A quelques centaines de mètres au sud du château on trouve un pan de mur avec une porte ogivale et une archère cruciforme. Elle a dû être ajoutée en 1347 d'après Valérie Rousset. En 1504, d'après le dénombrement du ban et de l'arrière-ban,  Le château des Anglais est inscrit aux M.H. le 30/10/ 1925","habitants":"Famille de Barasc de Béduer\r\n        \r\n        \"","divers":"Château des Anglais à Brengues","gps":"","images":["../../jctruffet.com/image/image_46/46_Brengues_1.jpg","../../jctruffet.com/image/image_46/46_Brengues_2.jpg","../../jctruffet.com/image/image_46/46_Brengues_3.jpg","../../jctruffet.com/image/image_46/46_Brengues_4.jpg"]},"Consult_chateau_formulairefe3d":{"id":"Consult_chateau_formulairefe3d","dept":"46","canton":"Martel","commune":"Saint-Denis lès Martel","nom":"Briance","type":"Château","periode":"XV","histoire":"BRIANCE,  dit des Termes, ce magnifique château, élevé  par les Pauc, famille bourgeoise de Martel, possédant plusieurs fiefs dans la région. Il passa aux Lagrange qui le cédèrent dans la deuxième moitié du XVIe siècle, à un bourgeois, également de Martel, Pierre Brunet. En 1614, après l'avoir agrandi par l'adjonction d'une tour carrée, Brunet obtient du vicomte de Turenne, l'autorisation de fortifier sa demeure par la construction d'un pont-levis, de mâchicoulis, de guérites et de créneaux. En 1653, la seigneurie fut acquise par François de Lachièze, lieutenant de la sénéchaussée de Martel  noble François Lachièze de la Malvinie, seigneur de Roqueblanque et de Mirandol. En 1672, il rendit hommage au vicomte de Turenne. Pendant la Révolution, le château fut occupé et la famille emprisonnée. Elle récupéra la demeure et ses descendants continuent encore de nos jours à occuper la propriété. Aujourd'hui la famille de Sophie Nadin","architecture":"Briance le moulin établi au XVe siècle au pied de la falaise. La date de 1604 inscrite sur le portail d'entrée signale une première campagne de travaux engagée par le nouveau propriétaire. En 1614, Pierre Brunet obtient du vicomte de Turenne de faire à sa maison de Briance, des ponts-levis, mâchicoulis, guérites et créneaux , le château était entouré de douves dont-il reste un pittoresque miroir d'eau, les corps de bâtiment  se répartissent autour d'une cour intérieure. Le logis a été remanié au XVIIIe siècle. Une galerie sur l'eau caractérise l'édifice qui a conservé la porte de l'ancien pont-levis, elle ouvre sur un porche qui abrite une chapelle dont la porte est ornée des armoiries des Lachièze. L'ensemble des bâtiments fut remanié au XIXe siècle. La galerie de l'aile Est aurait été construite sur la courtine pour Balthazar de Lachièze et terminée en 1829.  Les bâtiments agricoles ne paraissent pas antérieurs au XIXe siècle.                                                                                               Les thermes corps de logis de  plan rectangulaire à deux niveaux, toit brisé à la mansard accolé de pavillon carré  sur flanc droit et gauche toit à quatre pans.","habitants":"Famille de   Pierre Brunet\r\n        \r\n        \"","divers":"Château de Briance à Saint-Denis lès Martel et le château des Thermes gravure 4.","gps":"","images":["../../jctruffet.com/image/image_46/46_Briance_1.jpg","../../jctruffet.com/image/image_46/46_Briance_2.jpg","../../jctruffet.com/image/image_46/46_Briance_3.jpg","../../jctruffet.com/image/image_46/46_Briance_4.jpg"]},"Consult_chateau_formulairedbb7":{"id":"Consult_chateau_formulairedbb7","dept":"46","canton":"Saint-Céré","commune":"Autoire","nom":"Busqueilles","type":"Château","periode":"XVI","histoire":"BUSQUEILLES,   la construction du manoir  de Busqueilles  a dû être construit à la fin du XVIe siècle ou au début du  XVIIe siècle par la famille Cirot. Les Sirot appartiennent à la noblesse,  Jean de Cirot  (1590-1676) et son fils Jacques (1633-1731) ont été conseillers du roi auprès du sénéchal de Martel. La porte d'entrée porte les armoiries des familles Cirot et Lascazes qui étaient alliées au XVIIIe siècle, originaires de Figeac et seigneurs de Saint-Pol, par le mariage de dame Marguerite de Cirot de Busqueilles. Elle épousa en effet en 1765 dans léglise dAutoire Pierre-Louis de Lascazes, chevalier de lOrdre Royal et Militaire de Saint-Louis. Emprisonnée à Carennac à la Révolution, elle disparut en 1802. Les biens que possédaient les de Lascazes, et notamment le château de Busqueilles, passèrent ensuite à la famille dAraquy dEnvergne puis aux Landes-Delprat au  XIXe siècle.  Certains éléments du château de Busqueillles sont inscrits aux M.H. depuis le 8/04/1991.","architecture":"Busqueilles est une demeure aménagée au XVIIe siècle, laile sud comprend deux étages au-dessus dun cuvier ouvrant sur lextérieur par trois grandes arcades,  a été remanié dans la seconde moitié du XVIIIe siècle, les fenêtres percées sur la façade principale ont été mises en place au cours de la seconde  moitié du XVIIIe siècle alors que les de Lascazes étaient propriétaires de la demeure. Le logis nord ne possède par contre quun seul étage, couvert dun comble où deux lucarnes en pierre du XVIIe siècle sont coiffées d'un fronton triangulaire orné damortissements en forme de boule. Les fenêtres du niveau dhabitation sont, comme celles de la partie sud, typiques du XVIIIe siècle avec leur linteau en arc segmentaire.  Le grand portail dentrée est un ouvrage monumental du XVIIIe siècle quencadrent des pilastres\r\nsupportant un beau fronton triangulaire au centre duquel fut placée récemment une pierre armoriée  découverte dans une pièce deau du jardin. Les deux écus accolés et surmontés dune couronne de comte sont ceux des familles de Lascazes et Cirot.","habitants":"Famille Cirot\r\n        \r\n        \"","divers":"Château de Busqueilles","gps":"","images":["../../jctruffet.com/image/image_46/46_Busqueilles_1.jpg","../../jctruffet.com/image/image_46/46_Busqueilles_2.jpg","../../jctruffet.com/image/image_46/46_Busqueilles_3.jpg","../../jctruffet.com/image/image_46/46_Busqueilles_4.jpg","../../jctruffet.com/image/image_46/46_Busqueilles_5.jpg"]},"Consult_chateau_formulaire7f54":{"id":"Consult_chateau_formulaire7f54","dept":"46","canton":"Figeac","commune":"Béduer","nom":"Béduer","type":"Château","periode":"XIV","histoire":"BEDUER, le fief de Béduer est aux Barasc depuis le Xe siècle et restera dans cette famille jusqu'au XVIe siècle. Le premier membre de la famille connu est Dieudonné Ier Barasc, né vers 1030, mort en 1085. Son fils Pierre Ier Barasc, né vers 1055, mort après 1096, il meurt en Terre Sainte. Pierre II Barasc, né vers 1080, père de Guiraud Barasc vers 1110. Dans cette  famille jusqu'en 1599. Après une série de conflits, la seigneurie de Béduer devient en 1594 la propriété de Jean de  Narbonès. Il s'était marié en 1568 avec Jeanne de Luzech. Après la mort de Jean de Narbonès, Jeanne de Luzech décédée en 1610, s'est remariée  avec Louis François de Lostanges , seigneur de Saint-Alvère, devient baron de Béduer,  Louis François de Lostanges se remarie en 1610 avec Jeanne de Marqueyssac de Saint-Pantaly, baronne de Bruzac. Leur fils, Jean Louis de Lostanges, comte de Béduer, marié à Françoise de Gourdon de Genouillac, puis François Louis de Lostanges, marquis de Béduer.  La famille de Lostanges est restée seigneur de Béduer jusqu'à la Révolution. Henri de Lostanges a été le dernier gouverneur et sénéchal du Quercy. Homme affable, il a évité la destruction du château. Les Lostanges résidant peu au château, ils le vendent en 1874 aux surs de la Sainte-Famille qui y ont ouvert une école pour les enfants du village. Ne pouvant assumer la charge financière, les moniales cédèrent le château aux Lostanges qui l'ont vendu en 1886 aux Colrat de Montrozier. Maurice Fenaille s'est marié en 1887 avec la plus jeune de la famille. Ayant fait fortune dans l'industrie pétrolière, il va consacrer une partie de sa fortune à sauver le château de Montal. Maurice Fenaille a acheté le château de Béduer à son beau-père en 1911 et a entrepris de le restaurer. À la mort de Maurice Fenaille, sa veuve vendit le château, en 1939, à une femme de lettres, Jeanne Loviton, mieux connue sous son nom de plume, Jean Voilier.","architecture":"Château médiéval de Béduer, il ne reste pas grand-chose : la tour arasée du XIIIe siècle est le vestige le plus considérable après l'une importante opération de rénovation menée au XVIIe siècle. Le donjon sans contreforts avait une hauteur de 60 m et n'a pu être sauvé à la Révolution qu'en diminuant sa hauteur d'une vingtaine de mètres. Il en subsiste le rez-de-chaussée qui n'avait aucune ouverture à l'origine, surmonté de deux salles. La première est percée de meurtrières, la seconde a une fenêtre ternée sous un arc de décharge. L'ensemble des logis a été modifié ou construit au XVIIe siècle. Ils entourent une cour ouvrant sur la vallée du Célé. La façade sud conserve les éléments les plus anciens de l'édifice, le donjon et l'ancien beffroi à droite de l'entrée. On accède à la cour par un portail qui porte les traces de l'ancien pont-levis. Au-dessus se trouvent des armoiries. À l'intérieur, on peut voir l'ancienne cuisine et la grande salle où se sont réunis, trois fois, les états généraux du Quercy au XIVe siècle avec une belle cheminée du XVe siècle sur laquelle sont sculptés les blasons de Dieudonné de Barasc et d'Antonia de Gimel, de son fils Dieudonné et de Claude de Balzac, son épouse. Le plafond de la salle est décoré de poutres polychromes. Le porche d'entrée est à bossage. Ce porche et les façades ainsi que la toiture du donjon ont été inscrits aux monuments historiques le 25 juillet 1973.","habitants":"Famille de Barsac\r\n        \r\n        \r\n        \"","divers":"Château de Béduer.","gps":"","images":["../../jctruffet.com/image/image_46/46_Beduer_1.jpg","../../jctruffet.com/image/image_46/46_Beduer_2.jpg","../../jctruffet.com/image/image_46/46_Beduer_3.jpg","../../jctruffet.com/image/image_46/46_Beduer_4.jpg"]},"Consult_chateau_formulaire1cf6":{"id":"Consult_chateau_formulaire1cf6","dept":"46","canton":"Luzech","commune":"Bélaye","nom":"Bélaye","type":"Château","periode":"XII-XIV","histoire":"Plusieurs châteaux à Bélaye, le Castrum, de Bellegarde,de Cousserans (voir Article) , de Floiras (voir article), les vestiges de Lalande, le manoir de Cayat.                                                                                                           CASTRUM,   en 1228 au roi par Guillaume de Cardaillac. La famille éponyme occupe en effet une situation éminente dès le premier tiers du XIe siècle : vers 1030, Kalsan de Bélaye fait don de l'église de Pescadoires à l'abbaye Saint-Pierre de Moissac. En 1236, les Bélaye semblent bien affaiblis quand ils sont contraints de céder à l'évêque la moitié de la tour, l'entière salle et tout ce qu'ils avaient dans le réduit central du castrum. Des lignages de chevaliers, dont les plus importants sont les Guiscard, les Séguier, les Grézels et les Floiras, résident dans le castrum aux 13e et 14e siècles.                                                                                                                                                                LALANDE,  Lalande est lié, à celui du Boulvé et à un lignage connu sous le nom de Séguier ou de la Siquayrie. Parmi les membres les plus notables de la famille de Séguier, il convient de noter Guillaume, coseigneur de Bélaye, présent à Avignon en 1325 aux côtés du cardinal Arnaud de Via et, surtout, Pierre Séguier qui fut évêque d'Elne. Vers 1340, Jeanne de la Siquayrie transmit à son mari, Bernard d'Orgueil, les repaires du Boulvé et de Lalande mais, en 1401, leurs héritiers, Bertrand d'Orgueil, dans un hommage fait à l'évêque de Cahors, notait que ses terres étaient encore au pouvoir des \"Anglais\". Le château passe ensuite par alliance aux Montaigu. Le logis a été en grande partie reconstruit dans la seconde moitié du XVIe siècle.                                                                                                                 BELLEGARDE  les évêques de Cahors étaient les seigneurs du lieu. Au XIVe siècle, le château était aux mains de la famille de Guiscard, seigneur de Grézels. En 1594, il passa à sire Antoine Coture dont les descendants le cédèrent en 1710, à la famille Foissac. François Foissac fut secrétaire du Cardinal de Bernis, ministre des Affaires Etrangères de Louis XVI en 1750. Pendant la Révolution, sa fille Henriette sera emprisonnée à Cahors, libérée, elle épouse en 1796 André Guilhou et fait entrer cette famille à Bellegarde.                                                                                                                                                           Manoir de CAYAT, Il pourrait correspondre au repaire vendu en 1225 par Guillaume Séguier à Gausbert de Carrof dans l'honneur de W. R. de Ratnes, qui semble lui-même avoir été un Latour.","architecture":"Castrum,  Après la guerre de Cent ans, le castrum est déserté par ses nobles et connaît le déclin de tous les sites perchés. La place est prise par les protestants en 1579 puis reprise par les catholiques qui en font détruire les fortifications, aujourd'hui se présente par un bâtiment à deux niveaux et  de deux corps de logis accolés avec fenêtres jumenées sur l'arrière.                                                                                                                        Bellegarde  du haut de sa colline domine le paysage et servit de tour de guet pendant la guerre de Cent Ans  La demeure actuelle, avec sa tour ronde écrêtée, date du XVIe siècle, les fenêtres à meneaux ont été reconstituées.                                                                                                                                                                                                                                     Vestiges de Lalande, Le logis a été en grande partie reconstruit dans la seconde moitié du XVIe siècle.                                                                                                     Le repaire de Cayat, la technique constructive de l'édifice médiéval et l'appareil de sa porte à arc brisé, composée de longs claveaux, incitent à l'attribuer à une époque tardive dans le XIIIe siècle ou au siècle suivant. Il est en tout cas antérieur au XVe siècle, époque à laquelle de nouvelles fenêtres ont été percées dans les maçonneries existantes.","habitants":"Famille de Séguier                                                                         Famille de Guiscard\r\n        \r\n        \r\n        \"","divers":"Castrum de Bélayes gravure 1 , château de  Bellegarde gravure 2 et 3 , vestiges  de Lalande gravure 4 et 5 et de Cayat 6","gps":"","images":["../../jctruffet.com/image/image_46/46_Belaye_1.jpg","../../jctruffet.com/image/image_46/46_Belaye_2.jpg","../../jctruffet.com/image/image_46/46_Belaye_3.jpg","../../jctruffet.com/image/image_46/46_Belaye_4.jpg","../../jctruffet.com/image/image_46/46_Belaye_5.jpg","../../jctruffet.com/image/image_46/46_Belaye_6.jpg"]},"Consult_chateau_formulaire0fcd":{"id":"Consult_chateau_formulaire0fcd","dept":"46","canton":"Carjac","commune":"Cabrerets","nom":"Cabrerets","type":"Forteresse","periode":"XIII-XVI","histoire":"CABRERETS,  les Cardaillac vendirent en 1439 leur fief au baron de Gramat, Antoine de Gontaud qui créa la branche des Gontaud-Cabrerets qui entreprit la construction du château actuel. Raymond de Gontaud, chevalier du roi. Il eut dun premier mariage  une fille Jeanne qui fut dame dhonneur de Catherine de Médicis et gouvernante de ses filles. De ses secondes noces avec Anne dAuriole, naquit Jean. Antoine de Gontaud, comte de Cabrerets et baron de Roussillon étant mort sans postérité en 1731, le fief revient à son cousin éloigné Charles-Armand de Gontaud-Biron, fils de François de Gontaud, marquis de Biron, et de Madeleine de Cossé-Brissac. En 1723, Charles-Armand, duc de Biron, comte de Cabrerets et baron de Roussillon, fut nommé Pair de France à lâge de 23 ans ; lannée suivante, il était Maréchal de France et participa aux campagnes de Louis XV jusquà sa mort en 1756. Contrairement à son père qui noccupa jamais Cabrerets, Judith-Charlotte de Gontaud-Biron (1694-1741) à qui lon prêtait une grande beauté vint sy retirer. Son époux, le comte Claude-Alexandre de  Bonneval la quitta rapidement après leurs noces lui préférant une vie aventureuse dans de lointaines  contrées. Il disparut en 1747 et fut enterré sous le nom dAchmet Pacha dans la tour Galatz à Istanbul. Le petit-neveu de Charles-Armand, Armand-Louis, seigneur de Cabrerets et duc de Lauzun fut pendant la Révolution député du Quercy aux états généraux. Accusé de conspiration contre la République il fut décapité le 31 décembre 1793. Son épouse, Amélie, fut guillotinée un an plus tard. Le régisseur du nom de Vialolles acheta, lors de la vente des biens nationaux, lancienne demeure seigneuriale ainsi que les terres quil partagea ensuite avec ses neveux. Joachim Murat, Roi de Naples, voulut un temps acheter le château de Cabrerets pour en faire don à son frère André. Le projet resta sa suite mais les membres de sa famille acquirent peu à peu vers 1850 les différentes parts du château et de son domaine. Lun des descendants de lillustre famille possède aujourdhui  le château.","architecture":"Le château de Cabrerets  sélève sur un escarpement rocheux, placé en position  dominante 30 mètres au-dessus de la vallée du Célé dont il commandait le passage,  Lédifice fut bâti  sur lemplacement dun château primitif sans  doute érigé au cours du  XIIIe siècle.  La construction définitive date du XVIe-XVIIe siècle, avec une terrasse à balustrade et une cour intérieure, flanqué d'une grosse tour d'angle.  Les bâtiments sarticulent autour dune grande cour  intérieure ouverte au Nord, ne fut jamais terminé sans que lon en connaisse les raisons véritables. Comme l'indiquent quelques vestiges, il était en effet prévu de fermer entièrement la cour en bâtissant deux ailes à lEst et au Nord. La demeure seigneuriale se compose donc de deux ailes dinégales longueurs disposées en V. A la jonction entre ces deux corps de bâtiment, une tourelle descalier est  ouverte d'un portail dentrée orné de hautes bases prismatiques et de  pinacles finement ouvragés.\r\nLaile occidentale, formant un grand parallélépipède, est cantonnée au Sud  et au Nord par deux grosses tours circulaires, toutes deux couvertes à  lorigine comme lensemble des constructions dune couronne de  mâchicoulis. Ce bâtiment fut remanié au XVIIe siècle, ses murs surélevés et percés de grandes fenêtres.","habitants":"Famille de Raymond de Gontaud\r\n        \r\n        \"","divers":"Château de Cabrerets","gps":"","images":["../../jctruffet.com/image/image_46/46_Cabrerets_1.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_2.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_3.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_4.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_5.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_6.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_7.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_8.jpg","../../jctruffet.com/image/image_46/46_Cabrerets_9.jpg"]},"Consult_chateau_formulairea38e":{"id":"Consult_chateau_formulairea38e","dept":"46","canton":"Carjac","commune":"Cadrieu","nom":"Cadrieu","type":"Château","periode":"XIII-XVIII","histoire":"CADRIEU, Les premières mentions connues des Cadrieu sont de la fin du XIIIe siècle, avec Hugues de Cadrieu, chevalier, en 1292. On connaît encore Jean de Cadrieu, damoiseau, fils d'Iram Bertrand de Cadrieu, mentionné en 1313 et 1352, puis Hugues II en 1385, et Jean en 1420. En 1504, noble Antoine de Cadrieu est seigneur du repaire de Cadrieu, avec justice basse. La seigneurie, sous la suzeraineté des Barasc, aurait été partagée à l'origine avec les Corn. Les Cadrieu se maintiennent dans les lieux jusqu'au milieu du XVIIIe siècle, la seigneurie passant alors par alliance aux Lostanges.","architecture":"Cadrieu, cest une maison seigneuriale, lédifice fut mis à mal en 1390 pendant la guerre de cent ans. Le château actuel fut reconstruit au XVIIIe siècle. Une vaste terrasse sur cave voûtée et oubliettes datant de l'ancien château domine d'une trentaine de mètres la vallée du lot. Une partie du bâtiment renaissance fut tronquée au moment de la construction de la route et du chemin de fer.\r\nUn grand portail en anse de panier ouvre sur la cour dhonneur. Derrière la haute porte de bois, on aperçoit beaucoup de ruines. Limmeuble semble abandonné,  la tour conservée peut dater du XIVe siècle. Le rez-de-chaussée du corps principal du logis pourrait dater du XVIe siècle. L'aspect actuel est surtout dû à une importante campagne de travaux du XVIIe siècle. l'édifice  de plan en U à quatre niveaux accolé sur la gauche d'un donjon toit en croupe.","habitants":"Famille de Cadrieu\r\n        \r\n        \"","divers":"Château de Cadrieu","gps":"","images":["../../jctruffet.com/image/image_46/46_Cadrieu_1.jpg","../../jctruffet.com/image/image_46/46_Cadrieu_2.jpg","../../jctruffet.com/image/image_46/46_Cadrieu_3.jpg","../../jctruffet.com/image/image_46/46_Cadrieu_4.jpg","../../jctruffet.com/image/image_46/46_Cadrieu_5.jpg","../../jctruffet.com/image/image_46/46_Cadrieu_6.jpg"]},"Consult_chateau_formulaire6ed5":{"id":"Consult_chateau_formulaire6ed5","dept":"46","canton":"Cahors","commune":"Cahors","nom":"Cahors","type":"Château","periode":"XIV","histoire":"Plusieurs châteaux à Cahors dont celui de Famaey viticole, la Rousille, de Luctérius.                                                                                                                                                CAHORS, de la ville antique, il ne reste que l'Arc de Diane vestiges des anciens thermes gallo-romains, le pont Valentré du XIVe siècle  construit par Géraud de Sabanac est le symbole de Cahors, légèrement  en amont,  la fontaine des chartreux origine  de la ville gallo-romaine. l'époque médiévale offre un ensemble de demeures remarquables de l'aristocratie et de la bourgeoisie, la plus étonnante est la maison d'Henri IV ou hôtel de Roaldés,  au bas de la ville quartier de la Daurade, se trouve lhôtel de Roaldès comme dans de nombreuses villes du Sud-ouest, celui-ci y aurait séjourné en 1580. Sur la place Henri IV une magnifique porte renaissance. La cour au sud. On peut dater sa construction de la fin du XVe  siècle. Elle appartint au XVIIe siècle à une famille de notables du Quercy, les Roaldès.                                                                                                                                                      Château du Roi   inscrite en 1925 ainsi que lancien Palais, inscrit en 1996 .                                                                                                                                                                                                                                                                                                                                                                 La ROUSSILLE  à Pradines au porte de Cahors hôtel.","architecture":"Cahors, cet édifice, ancien palais de Via est la plus ancienne prison de France, ce palais, construit au XIVe siècle par Pierre Via, beau-frère du pape Jean XXII, né à Cahors, a été réaménagé au XVIIe siècle où il devient une prison à partir de 1790.   Il offre  trois éléments protégés. Lancien phare qui servait de repère aux bateliers pour les guider au port et qui fut classé en 1922. La tour du château du Roi\r\nvieille de plus de 200 ans d'histoire en tant que prison départementale, elle retenait encore en 2006 une soixantaine de détenus et ferma ses portes en juillet 2012.                                                                                                           Le pont Valentré, emblème de la ville qui franchit la rivière en portant ses trois tours fortifiées. On peut y flâner à pied ou bien l'approcher par bateau au cours d'une balade sur le Lot. Édifice du XIVe siècle, le pont Valentré est inscrit au patrimoine mondial par l'UNESCO, au titre des chemins de Saint-Jacques de Compostelle. Une légende impliquant le diable est associée à ce pont alors levez les yeux pour lapercevoir, Pont-Valentré, du XIVe siècle construit par Géraud de Sabanac premier consul, unique pont fortifié au monde à trois tours il est classé site majeur inscrit au patrimoine de l'Unesco.","habitants":"Famille de Roaldès\r\n        \r\n        \"","divers":"A Cahors le château de Luctérius gravure 1, l'ancien Palais gravure 2, la Barbacane gravure 3, de Farmaey gravure 4, la maison de Queval gravure 5 et le château de la Roussille gravure 6 et 7.","gps":"","images":["../../jctruffet.com/image/image_46/46_Cahors_1.jpg","../../jctruffet.com/image/image_46/46_Cahors_2.jpg","../../jctruffet.com/image/image_46/46_Cahors_3.jpg","../../jctruffet.com/image/image_46/46_Cahors_4.jpg","../../jctruffet.com/image/image_46/46_Cahors_5.jpg","../../jctruffet.com/image/image_46/46_Cahors_6.jpg","../../jctruffet.com/image/image_46/46_Cahors_7.jpg"]},"Consult_chateau_formulaire6175":{"id":"Consult_chateau_formulaire6175","dept":"46","canton":"Cahors","commune":"Cahors","nom":"Cahors_Patrimoine","type":"Patrimoine","periode":"XIII-XVI","histoire":"CAHORS Il fut décidé par les consuls de la ville en 1306, et la première pierre fut posée le 17 juin 1308. Il avait une fonction de forteresse, destinée à défendre la ville contre les attaques en provenance du sud. Toutefois, ni les Anglais, ni Henri IV ne l'attaquèrent. En dos-d'âne, long de 138 mètres, avec six grandes arches ogivales gothiques de 16,50 mètres, ce pont est flanqué d'avant-becs crénelés et surmonté de trois tours carrées à créneaux et mâchicoulis dominant l'eau de 40 mètres. Deux barbacanes protégeaient son accès, mais seule celle du côté de la ville (à l'Est) a été conservée.                                                                                                                                                                   ARCDEDIANE la porte ou arche de Diane située Avenue Charles de Frecinet à Cahors, architecture romaine classique.                                                                                             \r\nARCHIDIACONE  Saint-Jean fut construit par le grand archidiacre Gilibert de Massaut entre 1520 et 1543. Façade à décor Renaissance, escalier rampe sur rampe sous voûtes d'ogives, plafonds à la française, décors peints, oratoire. Siège de la Société des Etudes du Lot                                                                                                                                                                        TOUR-PAPE, la Tour Jean XXII est l'unique vestige du palais qu'habitait Pierre Duèze, le frère du pape Jean XXII, natif de Cahors. Jacques Duèze, né en 1244 à Cahors, était issu d'une famille de la bourgeoisie aisée de Cahors. Il fut élu pape en 1316, sous le nom de Jean XXII.","architecture":"L'Archidiaconé Saint-Jean fut construit par le grand archidiacre Gilibert de Massaut entre 1520 et 1543. Façade à décor Renaissance, escalier rampe sur rampe sous voûtes d'ogives, plafonds à la française, décors peints, oratoire. Siège de la Société des Etudes du Lot.                                                                                                             Tour du Pape Haute de 34 mètres, la tour est percée de 5 étages de fenêtres géminées.                                                                                                                                                                                                         Remparts et porte St-Michel   et maison Henry IV.","habitants":"Archidiacre Gilibert de Massaut\r\n        \r\n        \"","divers":"Dans le  patrimoine de Cahors, le pont Valentré gravure 1-2 et 3, la porte St-Michel gravure 4, les remparts et le Barbacane gravure 5,  l'archidiaconé gravure 6,  Arcdediane gravure 7, Tour des Papes gravure 8, maison Henri IV gravure 9.","gps":"","images":["../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_1.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_2.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_3.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_4.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_5.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_6.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_7.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_8.jpg","../../jctruffet.com/image/image_46/46_Cahors_Patrimoine_9.jpg"]},"Consult_chateau_formulaire9f3d":{"id":"Consult_chateau_formulaire9f3d","dept":"46","canton":"Espére","commune":"Calamane","nom":"Calamane","type":"Maison-forte","periode":"XV","histoire":"CALAMANE, les premiers seigneurs connus de Calamane sont les Béral ou Béraldy, grande famille de banquiers cadurciens. Par le mariage de Delphine de Béraldy avec Raymond de Durfort, en 1328. La seigneurie entre alors dans la famille de Durfort, famille originaire de l'Agenais. Raymond d
