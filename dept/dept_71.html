aise et un potager complètent l'ensemble.","habitants":"Famille de Loisy\r\n        \"","divers":"Château dse Loisy","gps":"","images":["../image/image_71/71_Loisy_1.jpg","../image/image_71/71_Loisy_2.jpg","../image/image_71/71_Loisy_3.jpg"]},"Consult_chateau_formulaire255e":{"id":"Consult_chateau_formulaire255e","dept":"71","canton":"Cluny","commune":"Lournand","nom":"Lourdon_Lournand","type":"Vestiges","periode":"XVI","histoire":"LOURDON, castrum primitif, cité dès le IXe siècle, il devint ensuite siège d'une viguerie, puis fut inclus dans la donation faite en 910 par le comte de Mâcon au moine Bernon pour fonder l'abbaye de Cluny. Au XIIe siècle, il suscita à deux reprises les convoitises des seigneurs laïcs, ce qui entraîna d'énergiques interventions de Louis VII et de Philippe Auguste, protecteurs de l'abbaye, qui posaient ainsi les premiers jalons du rattachement du comté de Mâcon à la couronne. Devenu aux XIVe-XVe siècle refuge des moines et de leurs trésors, Lourdon fut ravagé successivement par les troupes de Louis XI en 1470, puis par celles de Charles le Téméraire de 1471 à 1476, d'où une série de restauration par l'abbé Jean de Bourbon à la fin du XVe siècle. Pris par traîtrise par une petite troupe de protestants en 1574, il était réduit à quatre murailles quand ceux-ci se retirèrent. \r\nIl fut rebâti par Claude de Guise en 1586, le remit en état de défense, et fit construire de nouveaux bâtiments, notamment l'énigmatique jeu de paume, et entoura le domaine d'une longue enceinte. A peine était-il achevé que Claude de Guise affrontait victorieusement une attaque royale, résistance dont le souvenir amena les Etats du Mâconnais à en demander, en 1613, le démantèlement et en fut effectuée à coups de mines en 1632.                                   Dans la commune le château de Chevagny du Xe siècle.","architecture":"Lourdon, castrum primitif, cité dès le IXe siècle, Château rebâti en 1586 entouré d'une grande enceinte dont ils  restent d'importants vestiges. Les ruines du château occupent une plate-forme trapézoïdale d'environ un hectare, il en subsiste une partie des soubassements du mur d'enceinte, flanqué, au sud, d'une tour circulaire à demi détruite, dite tour du Pigeonnier et, au nord, de la tour de la Poudrière, dont l'étage supérieur émerge seul des remblais. Au milieu, se dresse les vestiges de deux bâtiments implantés dans le prolongement l'un de l'autre, une tour ronde demi-hors uvre est adossée à l'extrémité ouest de la muraille du bâtiment oriental, laquelle supporte neuf piliers carrés en maçonnerie, au maximum, de 7,50 mètres. Un cartouche aux armes de Lorraine et la date de 1586 permettent d'attribuer à Claude de Guise cette construction dont on ne sait si elle fut une grange ou un jeu de paume, nom sous lequel on la désigne traditionnellement.\r\nÀ l'est, une avant-cour avec fossé  défendait l'accès du château. Un parc boisé de quinze hectares avec une petite chapelle dédiée à Saint-Étienne, restaurée au XIXe siècle, une vigne et quelques terres ont été entourés au XVIe siècle d'une enceinte de trois kilomètres, défendue par douze tours rondes, dont divers éléments sont encore visibles.\r\nLa tour de gué de Lournand est un édifice dont lorigine remonte au XIIIe siècle, elle constituait un relais défensif entre le château de Lourdon et la Chapelle Saint-Laurent de Cotte, cest-à-dire lAbbaye de Cluny, elle est composée de deux parties superposées, carrée à sa base et transformée en pigeonnier dans sa partie supérieure.","habitants":"Famille de Claude de Guise\r\n        \"","divers":"Vestiges de la forteresse de Lourdon-Lournand","gps":"","images":["../image/image_71/71_Lourdon_Lournand_1.jpg","../image/image_71/71_Lourdon_Lournand_2.jpg","../image/image_71/71_Lourdon_Lournand_3.jpg"]},"Consult_chateau_formulaire542c":{"id":"Consult_chateau_formulaire542c","dept":"71","canton":"Dornes","commune":"Loyére","nom":"Loyere","type":"Château","periode":"XVI","histoire":"LOYERE, la seigneurie de La Loyère, terre noble appartenant à l'abbaye de Saint-Pierre de Chalon, fut acquise en 1580 par Jean-Baptiste Beuverand, d'une ancienne famille bourgeoise installée à Chalon à la fin du XVe siècle, puis anoblie et occupés par ses membres à la chancellerie. A partir de 1580 et jusqu'à la fin du XIXe siècle, l'histoire du château fut celle de la famille Beuverand de La Loyère,Jean Beuverand de la Loyère, maire de Chalon, y reçut le prince de Condé et planta un chêne pour célébrer la victoire de Recroi. Au  XVIIe siècle, le château dut être, sinon reconstruit, tout au moins transformé. \r\nEn 1845, le vicomte Armand de La Loyère entreprit les travaux qui lui donnèrent son aspect actuel. Il appartient, en 1920, à la famille Jeannin-Naltet qui le céda, après la guerre de 1945, à une communauté de Bénédictines.","architecture":"Château de la Loyère de plan rectangulaire, est formé de trois corps de logis en U et cantonné de tours carrées. Le corps central comporte en son centre un pavillon formant, vers le sud, un avant-corps à trois pans précédé d'une terrasse à l'alignement des tours à laquelle on accède par deux escaliers à montées divergentes, la tour à l'angle sud-ouest est flanquée d'une tourelle, également carrée, coiffée d'une haute lanterne, qui renferme un escalier à vis  c'est ce qui reste du château primitif, il y a deux ailes, dans l'aile gauche il y a un donjon. En tout, il y a 54 chambres et dans la forêt juste à côté, il y a le centre de loisirs.","habitants":"Famille Beuverand de La Loyère\r\n        \"","divers":"Château de la Loyère","gps":"","images":["../image/image_71/71_Loyere_1.jpg","../image/image_71/71_Loyere_2.jpg","../image/image_71/71_Loyere_3.jpg"]},"Consult_chateau_formulaire87df":{"id":"Consult_chateau_formulaire87df","dept":"71","canton":"Gueugnon","commune":"Chapelle-au-Mans","nom":"Lucenier","type":"Maison forte","periode":"XV","histoire":"LUCENIER, à la fin du XVIe siècle, Bertrand de Priezac est propriétaire de la terre et de la maison forte, qu'il vend, en 1603, à Jehan de Montmorillon, seigneur d'Essanlé, cette famille conserve le domaine jusqu'à la Révolution. En 1794, Jean Baptiste Perrot, maître des forges à Gueugnon achète la propriété. Au début du XIXe siècle l'ensemble est cédé à Hugues Desplaces. Puis en 1829 Léopold Saladin marquis de Montmorillon, fils de Charles Louis François Saladin, rachète la demeure qui restera désormais propriété de la famille.","architecture":"Lucenier à la Chapelle au Mans, vieille place forte du Moyen-Age, Lucenier (autrefois appeler Lussinié) fut construite au cours du XIVe siècle et faisait partie de la défense du Duc de Bourgogne. À cette époque, le Duc de Bourgogne demandait à ses vassaux de construire des châteaux forts ou des maisons fortes pour protéger les frontières de son duché. La partie résidentielle est formée d'un corps de logis de plan complexe de la fin du XIVe siècle avec deux tours rondes et une aile ajoutée au XVIIIe siècle qui occupent l'angle oriental de l'enceinte, le reste de la cour intérieure est fermé par des bâtiments agricoles modernes avec cependant, à l'ouest, l'ancienne poterne d'entrée convertie en habitation.","habitants":"Famille de Bertrand de Priezac \r\n        \"","divers":"Maison forte de Lucenier","gps":"","images":["../image/image_71/71_Lucenier_1.jpg","../image/image_71/71_Lucenier_2.jpg","../image/image_71/71_Lucenier_3.jpg"]},"Consult_chateau_formulaire72c3":{"id":"Consult_chateau_formulaire72c3","dept":"71","canton":"Lugny","commune":"Lugny","nom":"Lugny","type":"Château","periode":"XV","histoire":"LUGNY, fut au Moyen-Âge le berceau dune maison de chevalerie dont la devise était « Nest oyseau de bon nid qui na plume de Lugny ». Celle-ci séteignit au milieu du XVIe siècle avec Jean de Lugny et la seigneurie passa dès lors, successivement, entre les mains de trois familles. A la maison de Chabot qui en 1558  Françoise de Lugny, fille et héritière, épouse François Chabot. A la maison de Saulx qui en 1579  Catherine Chabot, fille et héritière, épouse Jean de Saulx, vicomte de Tavannes et vicomte de Lugny.  En 1647  Claire-Françoise de Saulx, fille et héritière, épouse Charles-François de La Baume, comte de Montrevel, dont la famille conserve le domaine jusqu'à la fin de l'Ancien Régime.  Au début XVIIe siècle  Charles de Saulx est marquis de Lugny, aux des Polignac de Beaufremont  et au comte de Montravel, ce dernier fut condamné à mort le 7 juillet 1794.                                                                A la Révolution le château fut brûlé et pillé par une bande de 1200 brigands\r\nMaison de La Baume. A la fin du XVIIe siècle Jacques-Marie de La Baume est baron de Lugny. Au  début du  XVIIIe siècle   Melchior-Esprit de La Baume, fils du précédent, est baron de Lugny.  En  1740  Florent-Alexandre-Melchior de La Baume (né en 1736), comte de Montrevel, fils du précédent, est le dernier seigneur de Lugny  il sera mis à mort à Paris en 1794.\r\nRévolution française en 1789, le château de Lugny, devenu au XVIIIe siècle simple relais de chasse des comtes de Montrevel, fut le premier du Mâconnais à être incendié par les « Brigands » des paysans révoltés  lors des troubles qui, à la fin de juillet, pendant la Grande Peur, agitèrent cette petite région (nuit du lundi 27 au mardi 28 juillet 1789). « La flamme était si grande entre une et deux heures de la nuit que jaurais pu lire à ma fenêtre à la lueur du feux» a consigné dans ses registres le curé Dubost de la paroisse voisine de Bissy-la-Mâconnaise.","architecture":"Au Moyen-Âge, le château de Lugny, flanqué de plusieurs tours et doté dun donjon « fort élevé et très beau », était ceint de fossés remplis d'eau par la source de la Bourbonne source dite « des eaux bleues »  qui jaillit au pied de la montagne. Toutefois, de limposant château des seigneurs de Lugny fut  incendié à la Révolution Française, il ne reste aujourd'hui que deux tours rondes à trois étages traditionnellement datées du XIVe siècle et une partie des communs, bâtiments correspondant pour lessentiel à ceux de lancienne basse-cour de la demeure seigneuriale et formant un quadrilatère.\r\nÀ chacune des deux tours dentrée est accolé un étroit bâtiment. Ceux-ci, implantés perpendiculairement lun à lautre, sont couverts de hautes toitures à croupes en tuiles plates, la toiture du bâtiment accolé à la tour dentrée du nord-est est percée dans la croupe dune lucarne dominant une tourelle circulaire dans uvre amortissant langle entre le bâtiment et la tour.","habitants":"Famille de Jean de Lugny \r\n        \"","divers":"Château de Lugny","gps":"","images":["../image/image_71/71_Lugny_1.jpg","../image/image_71/71_Lugny_2.jpg","../image/image_71/71_Lugny_3.jpg","../image/image_71/71_Lugny_4.jpg"]},"Consult_chateau_formulairef16e-2":{"id":"Consult_chateau_formulairef16e-2","dept":"71","canton":"Mâcon","commune":"Mâcon","nom":"Macon","type":"Patrimoine","periode":"XV-XIX","histoire":"MACON, au cours du IVe siècle, la ville se fortifie, au Moyen-Âge, Mâcon est le chef-lieu d'un comté rattaché au duché de Bourgogne, à l'extrémité du pont sur la Saône menant aux domaines de Bresse du duché de Savoie. La ville commandait l'accès à l'actuel Val Lamartinien, où l'extrémité sud de la Côte de Bourgogne rejoint les premiers contreforts des monts du Beaujolais, ouvrant la voie aux riches plaines de la Loire. En 1477, à la suite de la mort de Charles le Téméraire, Louis XI confirme les privilèges de la ville et du comte de Mâcon, par ses lettres patentes. Charles IX, venant de Chalon, sarrête le 3 juin 1564 dans la ville lors de son tour de France royal (1564-1566), accompagné de la cour et des grands du royaume, son frère le duc dAnjou, Henri de Navarre, les cardinaux de Bourbon et de Lorraine. La ville est stratégique, cest une porte dentrée du royaume potentielle pour les Suisses ou les mercenaires allemands dans le contexte des guerres de religion. Il y est accueilli par la reine Jeanne de Navarre, dite la « reine des protestants », et mille cinq cents huguenots. En 1790, la ville devint chef-lieu du département de Saône-et-Loire nouvellement créé. En 1814, la ville fut envahie par les armées autrichiennes puis libérée deux fois par les troupes françaises avant d'être définitivement occupée jusqu'à la chute de l'Empire. Après le retour de Napoléon et les cent-Jours, Mâcon et le Mâconnais furent à nouveau pris par les Autrichiens.","architecture":"Mâcon, château renaissance des Ecots du XIXe siècle, hôtel Sénnécé académie de Mâcon musée de Lamartine.                              Riche patrimoine,  château de Perrière (voir article),  préfecture, hôtel de ville du XVIIIe siècle, le château de la Vallée et le château de Loché.","habitants":"Comte de Mâcon\r\n        \"","divers":"Patrimoine de Mâcon, Hôtel de ville  tour du vieux Saint-Vincent, Hôtel-Dieu, Hôtel Senecey et la maison des Vins","gps":"","images":["../image/image_71/71_Macon_1.jpg","../image/image_71/71_Macon_2.jpg","../image/image_71/71_Macon_3.jpg","../image/image_71/71_Macon_4.jpg","../image/image_71/71_Macon_5.jpg","../image/image_71/71_Macon_6.jpg","../image/image_71/71_Macon_7.jpg","../image/image_71/71_Macon_8.jpg","../image/image_71/71_Macon_9.jpg"]},"Consult_chateau_formulaire79ea-2":{"id":"Consult_chateau_formulaire79ea-2","dept":"71","canton":"Bourbon-Lancy","commune":"Maltat","nom":"Maltat","type":"Château","periode":"XIX","histoire":"MALTAT, le village de Maltat (Maletat), fut habité par une communauté gauloise, le village était situé sur une route romaine le reliant à la ville d'Autun (Augustodunum). Au Moyen-Âge, une léproserie dont il ne reste plus aucune trace et une église furent construites.\r\nEn avril 1164, le Pape, Alexandre III, délivre une Bulle, confirmant toutes les donations faites jadis à l'Abbaye de Saint-Martin d'Autun, dont la cure d'Ecclesiam de \" Meletaco \".\r\nChâteau de la Motte  du XVII-XIXe siècle.","architecture":"Maltat; Blotti aux pieds du Morvan, le village de Maltat possède une église romane aux volumes sobres avec une charpente remarquable à triple faîtage visible depuis la nef.                                                     Château du Breuil ,élégante demeure de la fin du XIXe siècle, de la Motte en direction de Luzy et de Varendeux au sommet de la colline, deux bâtisses de la seconde moitié du XVIIIe siècle.              \r\nChâteau de la Motte du XVII-XIXe siècle.","habitants":"Seigneur de Maltat\r\n        \"","divers":"Château du breuil, de la Motte et de Varendeux","gps":"","images":["../image/image_71/71_Maltat_1.jpg","../image/image_71/71_Maltat_2.jpg","../image/image_71/71_Maltat_3.jpg","../image/image_71/71_Maltat_4.jpg"]},"Consult_chateau_formulairebc2b-2":{"id":"Consult_chateau_formulairebc2b-2","dept":"71","canton":"St-Martin-de-Bresse","commune":"Villegaudin","nom":"Marche_Villegaudin","type":"Maison forte","periode":"XVI","histoire":"MARCHE, un château est attesté au XIIe siècle, Renaud de La Marche fonde en 1317 une chapelle dans sa maison forte,  plusieurs seigneurs de La Marche au XIVe siècle sont baillis et maîtres des foires de Chalon. Philippe de La Marche en 1434, écuyer de Bourgogne, épouse Jeanne Bouton du Fay, leur fils Olivier de La Marche au  XVe siècle, diplomate et chroniqueur, est le plus célèbre de la lignée.\r\nLe fief au  XVIe siècle  passe aux Lénoncourt. Puis vendu en  1636 aux  Fyot, qui font ériger la seigneurie en marquisat. Claude Fyot, abbé commendataire de Saint-Étienne de Dijon, en 1682 fait bâtir une vaste demeure.\r\nA la mort de Claude-Philibert Fyot de La Marche, en 1768 son fils, Jean-Philippe Fyot de La Marche premier président au Parlement de Dijon, lui succède.  Mort de Jean-Philippe Fyot de La Marche, en 1772 sans enfant. \r\nLe château, qui appartient en 1861 à Antoine-Félix de Beaurepaire, dernier marquis de la Marche, est détruit par les flammes. \r\nAujourd'hui propriété de M. Bedoiseau.","architecture":"château de la Marche, construit à proximité d'un étang par l'abbé Claude Fyot, comportait un corps de logis de plan rectangulaire entre deux pavillons en avancée sur chacune des deux façades. Une basse cour précédait ce corps de logis. Le salon était peint de fresques représentant le festin des dieux.\r\nDe nos jours, on découvre, sur le bord de la route, les écuries et une partie des communs. À l'emplacement même du château, il ne reste que les douves, intactes, revêtues de briques et de pierres de taille, deux socles de pierre encadrent quelques marches et, entre deux pilastres en bossage, un portail est surmonté des armoiries en ferronnerie des anciens seigneurs de La Marche et des Fyot.","habitants":"Abbé Claude Fyot\r\n        \"","divers":"Maison forte de la Marche","gps":"","images":["../image/image_71/71_Marche_Villegaudin_1.jpg"]},"Consult_chateau_formulaire374a":{"id":"Consult_chateau_formulaire374a","dept":"71","canton":"Marcigny","commune":"Marcigny","nom":"Marcigny","type":"Château","periode":"XIV-XVI","histoire":"MARCIGNY, au Xe siècle fief des barons de Semur, fondé en 1061 par Hugues, sixième abbés de Cluny et par son frère Géoffroy seigneur de Semur qui fit développer la bourgade en y fondant un monastère.  En 1366 assiégé par le prince Noir;  en 1420 par les troupes du dauphin de France assiègent la ville,  elle sera délivrée par le maréchal de Cottebrune se sont les armées protestantes sous les ordres de Poncenat et Saint-Aubin  qui s'accagent la cité, en 1431 par le comte de Clermont,  en 1438 par le prince de Condé,  en 1576 par le duc de Mayenne,  le prince Casimir et du prince de Condé  s'emparent de la place,  sa richesse attirera les ecorcheurs,  les routiers et les brignads,   en 1582 par le comte de Tavannes, et en 1589 par le marquis de Saint-Martin en 1591. De l'enceinte fortifié  du XIVe siècle il ne reste que la tour du Moulins haute de vingt cinq mètres transformés aujourd'hui en musée municipal.                                                                                      Dans la commune le château de Saint-Georges du XIXe siècle.","architecture":"Marcigny de cette citée qui fut les conflits de guerres de religion eu des remparts et des fortifications pour se protéger dont la tour du Moulin,  éléments d'enceinte de 1409 érigé par les ducs de Bourgogne abrite aujourd'hui un musée de l'histoire locale. Dans le village de belle maisons à pans de bois et des hôtels particuliers. Le château construit par les ducs de Bourgogne  pour s'opposer au duc de Bourbon début XVe siècle presque rasait complètement base d'une ancienne tour  dans l'ancien bras du ruisseau en cours de restauration.","habitants":"Comte de Tavannes\r\n        \"","divers":"Château de Marcigny, de Céron, de Frédières, de Saint-Georges","gps":"","images":["../image/image_71/71_Marcigny_1.jpg","../image/image_71/71_Marcigny_2.jpg","../image/image_71/71_Marcigny_3.jpg","../image/image_71/71_Marcigny_4.jpg","../image/image_71/71_Marcigny_5.jpg","../image/image_71/71_Marcigny_6.jpg","../image/image_71/71_Marcigny_7.jpg"]},"Consult_chateau_formulaire1985":{"id":"Consult_chateau_formulaire1985","dept":"71","canton":"Buxy","commune":"Buxy","nom":"Marcilly_Buxy","type":"Château","periode":"XV","histoire":"MARCILLY-BUXY, au Moyen-âge, Les comtes de Chalon, Hugues IV du Maine, comte du Maine (1036-1051), Hugues IV de Nordgau, comte de Nordgau (1027-1048), Hugues IV de Campdavaine, comte de Saint-Pol (1165-1205), Hugues IV de Rethel, comte de Rethel (1272-1285),  Hugues IV de Bourgogne, duc de Bourgogne (1218-1272), Hugues IV de Lusignan, roi de Chypre (1324-1359). Après la mort de Charles le Téméraire en 1477, le duché tombe entre les mains des rois de France (Louis XI). Leur première décision est de faire disparaître ce qui rappelle la gestion des ducs. Dans la lignée des personnages importants ayant reçu Buxy, citons entre autres Marie de Savoye, marquise de Rothelin, puis la famille de Hochebourg,  En succession, Buxy passa dans la famille de Longueville et par succession à la Princesse de Condé, Françoise d'Orléans suivie par Charles de Bourbon. La veuve de Charles de Bourbon cède la terre de Buxy à Jacques du Blé, marquis d'Uxelles pendant environ un siècle. Les biens de Nicolas du Blé sont attribués au marquis de Beringhem, gouverneur de Chalon. Celui-ci vendit Buxy à François Henrion de Pressey, gouverneur des pages de la chambre du roi et trésorier de France en Bourgogne. Son fils aîné, Camille sera le dernier seigneur de Buxy qu'il quittera, criblé de dettes.\r\nUne milice bourgeoise est créée le 24 juillet 1789. Elle deviendra la Garde Nationale et sera armée jusqu'en 1792.","architecture":"Marcilly les Buxy, le château de Buxy,  corps de logis rectangulaire a deux niveaux,  une tour à l'écart.                                                Le château la tour Badin corps de logis  à deux niveaux et attiques prolongé par deux ailes et deux tours rondes  en façades.                           Château des Raveaux, corps de logis rectangulaire deux niveaux avec toits à la Mansard,  deux tourelles rondes à l'opposée.                           Château de Cray, et le château de Champs Fleury, la tour St-Prive et les remparts de Buxy  l'ensemble du XVe siècle.","habitants":"Famille de Longueville\r\n        \"","divers":"Château de Buxy, tour Badin, tour St-Privé, Ravaux, Champs Fleury avec ses remparts","gps":"","images":["../image/image_71/71_Marcilly_Buxy_1.jpg","../image/image_71/71_Marcilly_Buxy_2.jpg","../image/image_71/71_Marcilly_Buxy_3.jpg","../image/image_71/71_Marcilly_Buxy_4.jpg","../image/image_71/71_Marcilly_Buxy_5.jpg","../image/image_71/71_Marcilly_Buxy_6.jpg","../image/image_71/71_Marcilly_Buxy_7.jpg","../image/image_71/71_Marcilly_Buxy_8.jpg","../image/image_71/71_Marcilly_Buxy_9.jpg"]},"Consult_chateau_formulairea9ff":{"id":"Consult_chateau_formulairea9ff","dept":"71","canton":"Charolles","commune":"Marcilly-la-Gueurce","nom":"Marcilly_Gueurce","type":"Maison forte","periode":"XV","histoire":"MARCILLY, maison forte tenue dès le XIIe siècle par une famille qui en portait le nom, la Motte-de-Marcilly passa par mariages, au XVIe siècle, à Florent de Martel, gentilhomme dauphinois, puis à Jean-Gaspard de Bionnay. Le château, qui avait pris le nom de \"Vieux château\", fut acquis des Bionnay par Etienne Dagonneau vers 1650. En 1764, l'immense fortune de la famille Dagonneau ayant été lapidée, il fut vendu à Jean d'Aoustène, payeur de la cour des monnaies de Lyon, sa fille épousa Claude Voiret, qui appartenait à une vieille famille lyonnaise. Des Voiret de Marcilly il parvint plus tard, par les femmes, à la famille Sarton du Jonchay. \r\nTERZE, la maison forte de Terzé  apparaît pour la première fois en 1340 comme propriété de la famille Colomb, qui la conservera jusqu'au milieu du XVe siècle. Ventes et successions la mettent ensuite entre les mains d'Emilienne de Montmorillon, épouse d'Adrien de la Garde, aux Morelon, à la famille de Martel et finalement, de la fin du XVIIe siècle , des Dagonneau de Marcilly. Terzé est vendu à Jean d'Aoustène, puis à Jean-Baptiste Sampier d'Arena, négociant à Lyon, avant d'échoir à Claude Voiret de Chanay, ancien avocat général du parlement de Dombes, mort en 1823 le domaine appartient à la famille Sablon du Corail.                                 Dans la commune le château Moulin la Cour du XIXe siècle.","architecture":"Marcilly la Gueurce, plusieurs fois modifié depuis le XIIe siècle, le château comprend un gros pavillon rectangulaire, flanqué d'une tour circulaire découronnée à base légèrement taluté. Contre lui s'adosse, à l'alignement de sa façade orientale, un corps de logis édifié au XVIe siècle à l'emplacement d'une cour pavée. Précédé à l'est d'un balcon de pierre reposant sur des arcades, il est flanqué d'une tour circulaire qui a retrouvé son toit conique et d'une tour carrée tronquée. Le donjon a été détruit en 1825, résultant de la transformation d'une ancienne tour circulaire, qui contient un escalier à vis.\r\nTerzé, la maison forte de Terzé au dessus de l'Ozolette a Marcilly la Geurse  aujourd'hui réduit a un simple  bâtiment de plan rectangulaire  à un étage et un demi-étage dépourvu de toute ornementation et couvert d'une haute toiture à croupes, flanqué d'une tour  circulaire coiffée d'un toit conique, et un petit pavillon est relié à des communs, de construction récente prés d'un jardin entouré de murs avec des pigeonniers carrée aux angles. Au\r\nsud se trouve un fossé en eau, partiellement transformé en lavoir.","habitants":"Famille d'Etienne Dagonneau                                                  Famille Colomb\r\n        \"","divers":"Château de Marcilly la Gueurce et de Terzé","gps":"","images":["../image/image_71/71_Marcilly_Gueurce_1.jpg","../image/image_71/71_Marcilly_Gueurce_2.jpg","../image/image_71/71_Marcilly_Gueurce_3.jpg","../image/image_71/71_Marcilly_Gueurce_4.jpg"]},"Consult_chateau_formulaired8bf":{"id":"Consult_chateau_formulaired8bf","dept":"71","canton":"Mont-St-Vincent","commune":"Marigny","nom":"Marigny","type":"Château","periode":"XV","histoire":"MARIGNY, cité en 1104 comme forteresse d'importance secondaire, de construction sans doute récente par Joceran de Marigny chevalier duc de Bourgogne, en 1266 qui était également propriétaire du château  de Baigny. Il appartint à des seigneurs qui en portaient le nom jusqu'en  1366, il fut acheté ruiné par le duc de Bourgogne puis fut l'enjeu d'âpres disputes marquées, entre autres, par sa vente à la criée au marché de Montcenis pour payer les dettes contractées par Guy de Marigny dans l'exercice des fonctions de châtelain de Glennes et Roussillon et par l'annulation du mariage d'Huguette, fille dudit Guy, à qui la seigneurie avait été adjugée sur intervention du duc de Berry et de Jean d'Armagnac. A la fin du XIVe siècle, la maison forte échut à Jean de Veriset, parent par alliance  des Marigny. Au cours du XVe siècle, elle passa aux Vichy. Au début du XVIIe siècle, elle appartenait au président du parlement Benoît Giroux qui la légua à sa fille, Barbe, épouse de Jacques Sayve. Leur petit-fils, Benoît-Jacques de La Croix de Chevrières, en hérita en 1654. En 1759, Marigny fut acquis par Pierre-Marie de Naturel de Valetine.\r\nChâteau du Buissons; cette propriété en 1656 était celle de François de Rochemont, écuyer capitaine d'une compagnie de chevaux légers et maître d'hôtel du roi. Aujourd'hui habitation et lieu de création  d'une famille de sculpteur renommée de Claire et Michel Thian, le château de Blaigny A lorigine en 1266, il appartenait à Joceran de Marigny, chevalier du duc de Bourgogne. La construction néo-gothique actuelle du XIXe siècle est située dans le vallon de la rigole de Marigny sur le trajet dun chemin direct reliant Maumont à lancienne Commanderie des Templiers de Dieulegard.","architecture":"Marigny, motte féodale du Boucansaud. Du château appelé aussi \"Baigny\" de construction gothique actuelle du XIXe siècle, est une ancienne commanderie des templiers de Dieulegard, lenceinte centrée, de dimension beaucoup plus réduite que celle du XIIe siècle, a reçu des flanquements carrés et de précoces meurtrières cruciformes pour armes à feu, puis, elle a été complétée par un flanquement circulaire commandant laccès à une « casemate » et à un archétype de contre-mine, une nouvelle tour et une grande galerie relié les deux corps de bâtiment, un logis seigneurial prend le relais du donjon dans sa fonction résidentielle (ce qui a évité la disparition des fenêtres romanes). Des remaniements dans la première moitié du XVe et le deuxième quart du XVIe siècle ont laissé un répertoire de moulures du gothique flamboyant. Il ne restait plus alors du château, ruiné en 1583, qu'une tour carrée à trois étages. Diverses constructions ont été ajoutées au cours de la deuxième moitié du XIXe siècle.   Dans la commune le Château du Buissons, le corps de logis flanqué d'une tour cylindrique  toits à poivrière, prolongé par une tour barlongue accosté à une tour polygonale étêté et creusé de petites baies rectangulaires, demeure du XVIe siècle actuellement habitation.","habitants":"Famille de Jean de Veriset\r\n        \"","divers":"Château de Marigny","gps":"","images":["../image/image_71/71_Marigny_1.jpg"]},"Consult_chateau_formulaired056":{"id":"Consult_chateau_formulaired056","dept":"71","canton":"Lugny","commune":"Fleurville","nom":"Marigny_Fleurville","type":"Château","periode":"XVII","histoire":"MARIGNY, l'histoire de ce château, situé à moins de 300 mètres du château de Marigny, est très obscure, vers 1600  Zacharie Pelez acquiert la châtellenie royale de Vérizet dont dépend Fleurville, il se peut que ce soit lui qui a fait bâtir le château.\r\nLe château est aménagé en hôtel-restaurant, propriété de France et de Pascal Lehmann.                                                                 Fleurville Le fief est constitué vers 1530 par le notaire Philibert Pelez qui y bâtit une maison entourée de tours et de  murailles. Peu après 1650 le domaine parvient à Girard Perrier, avocat au parlement, et est pillé en 1789, puis vente du bien en 1796. Au XIXe siècle il passe entre les mains des familles Chalot et Pitré.","architecture":"Marigny, le corps de logis principal, de plan carré, est couvert d'une très haute toiture à deux  versants, Il est flanqué dans le même alignement, de deux ailes,à  la façade sur cour de l'aile nord, est adossée une tour hexagonale dans une oeuvre couronnée d'un entablement soutenu par de gros modillons en quart-de-rond.  Les bâtiments d'habitation occupent le côté est d'une vaste cour cernée de murailles, flanquée au nord et à l'ouest  de trois tours rondes  percées de canonnières, à laquelle on accède au sud  par une porte en anse de panier accostée d'une porte piétonne. Des bâtiments à usage agricole s'appuient à la courtine occidentale.                           Fleurville, les bâtiments entourent une cour rectangulaire à laquelle on accède au nord par un portail formé d'une porte charretière en anse de panier et d'une porte piétonne en plein cintre, inscrites chacune entre deux pilastres en bossage vermiculé un sur deux et couronnées de frontons brisés encadrant un cartouche dont les armoiries ont été brûlé, une petite tour carrée flanqué à l'ouest  de ce portail, le corps de logis principal, qui a subi de multiples remaniements, s'étend à l'est, de plan rectangulaire allongé, il comprend un rez-de-chaussée et un étage carré sous un toit à deux versants, il est flanqué sur son angle nord-est d'une tourelle circulaire, contre son pignon sud, s'appuie un gros pavillon carré comportant un étage, un demi-étage et un étage de combles avec lucarnes à frontons triangulaires, surmontés de boules d'amortissement.","habitants":"Famille de Zacharie Pelez \r\n        \"","divers":"Château de Marigny et de Fleurville","gps":"","images":["../image/image_71/71_Marigny_Fleurville_1.jpg","../image/image_71/71_Marigny_Fleurville_2.jpg","../image/image_71/71_Marigny_Fleurville_3.jpg","../image/image_71/71_Marigny_Fleurville_4.jpg"]},"Consult_chateau_formulaire90d7":{"id":"Consult_chateau_formulaire90d7","dept":"71","canton":"Palinges","commune":"Martigny-le-Comte","nom":"Martigny_Comte","type":"Château","periode":"X-XV","histoire":"MARTIGNY, fief des comtes de Chalon, entra en 1237 dans le domaine ducal, en même temps que l'ensemble du comté, mais fut cédé peu après par Hugues IV à une demi-soeur de Jean de Chalon, Marie des Barres, dame de Mont St-Jean demi-soeur du comte de Chalon St-Jean. En 1388, le château était entre les mains de Guillaume Flotte, il passa ensuite à Oudard de Chazeron puis à Jean et Jacques de Chazeron, ces derniers coupables d'avoir épousé la cause du dauphin dans le conflit qui oppose la couronne de France au duc de Bourgogne, fut confisqué  et  en raison de leur dévouement au dauphin le bénéficiaire de la confiscation fut Nicolas Rolin, qui se fit confirmer en 1435 dans la possession de Martigny que son fils dut toutefois restituer aux héritiers des Chazeron en 1477. Ceux-ci le vendirent peu après à Claude de Laguiche dont les descendants en furent propriétaires jusqu'à la fin du XVIIe siècle. A la veille de la Révolution, Martigny appartenait à Louis Hercule Timoléon de Cossé Brissac, dont le duc fut tué par les égorgeurs, et depuis 1878, il a été entièrement restauré  par le comte de Beaumont. Toujours dans cette famille.              Le château de Martigny-le-Comte, il est situé sur une colline dominant le bourg, il fut restauré dans les années 1878-1879 par son propriétaire, le comte Antoine de Beaumont. Il est actuellement habité par la famille De la Guiche Beaumont.","architecture":"Martigny le Comte, fortifié dés le Xe siècle, cité en 1283 domine le village, ruines féodales, la construction se compose d'un édifice de plan en L, flanqué de tours sur ses trois angles extérieurs, deux tours rondes au sud flanqué au logis principal, une tour-porche carrée au nord-est, à l'extrémité de l'aile en retour d'équerre, la tour de l'angle sud-est, plus massive, a été arasée au niveau des murs des logis mais a échappé aux restaurations du XIXe siècle qui ont fait de l'ensemble un édifice néo-gothique, a la façade nord du corps principal, est adossée une tour octogonale dans laquelle s'ouvre une porte en anse de panier, un escalier de pierre en fer à cheval à deux volées relie son rez-de-chaussée à une terrasse, une tourelle d'escalier circulaire est incluse dans l'angle des deux corps de logis, une tourelle polygonale dans celui formé par la tour-porche et le pignon de l'aile, les logis sont couverts de hautes toitures d'ardoise à deux versants.","habitants":"Famille de Guillaume Flotte\r\n        \"","divers":"Château de Martigny le Comte et de Collanges","gps":"","images":["../image/image_71/71_Martigny_Comte_1.jpg","../image/image_71/71_Martigny_Comte_2.jpg","../image/image_71/71_Martigny_Comte_3.jpg","../image/image_71/71_Martigny_Comte_4.jpg","../image/image_71/71_Martigny_Comte_5.jpg","../image/image_71/71_Martigny_Comte_6.jpg"]},"Consult_chateau_formulaired14c":{"id":"Consult_chateau_formulaired14c","dept":"71","canton":"La Guiche","commune":"Pouilloux","nom":"Martrey","type":"Château","periode":"XIX","histoire":"MARTREY, d'une famille portant ce nom.  Pouilloux faisait autrefois partie du Comté du Charolais qui appartenait aux Ducs de Bourgogne. La propriétaire, Marie de Bourgogne, fille de Charles le Téméraire, eut l'idée d'épouser Maximilien d'Autriche. De 1477 à 1684, les habitants de Pouilloux furent Autrichiens et ne payaient pas d'impôts. Une autre époque. Pouilloux tiendrait son nom de sa naissance, au XIVe siècle, sous l'influence d'un prieuré nommé \"Prioratus de Poillyo\". L'usine de céramique du Pont des Vernes, construite au bord du canal du Centre en 1837, participa très largement à la prospérité de Pouilloux.","architecture":"Martrey, château du XIXe siècle corps de logis rectangulaire à trois étages flanqué de tourelles.","habitants":"Famille de Pouilloux.\r\n        \"","divers":"Château de Matrey","gps":"","images":["../image/image_71/71_Martrey_1.jpg"]},"Consult_chateau_formulairea891-2":{"id":"Consult_chateau_formulairea891-2","dept":"71","canton":"Cluny","commune":"Massy","nom":"Massy_Zuble","type":"Château","periode":"XIX","histoire":"MASSY-Zublé, on pourrait encore observer deux lavoirs, celui du bourg, construit en 1910 parce que celui de Zublé (1865) était jugé trop excentré et également la « Tour du blé » ayant appartenu aux anciens propriétaires du château de Cormatin au début du XIIIe siècle et acquise par l'abbé de Cluny en 1409.                                                Le château de Bordes  et ses dépendances XIXe siècle, divers domaines ruraux hameau de Buillet, hameau des Noyers, la Mure, la Grange.","architecture":"Massy, ruines féodales de la tour de Blé.                                     Château de Zublé dit tour de Blé, architecture de Cluny, pigeonnier accolé à la façade.                                                                               Bordes, corps de logis rectangulaire pavillon saillant en façades avec fronton triangulaire.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Massy et de Zublé","gps":"","images":["../image/image_71/71_Massy_Zuble_1.jpg","../image/image_71/71_Massy_Zuble_2.jpg"]},"Consult_chateau_formulaire89a9":{"id":"Consult_chateau_formulaire89a9","dept":"71","canton":"Marcigny","commune":"Melay","nom":"Maulevrier_Melay","type":"Château","periode":"XVI","histoire":"MAULEVRIER, terre de l'abbaye de Saint-Rigaud jusqu'en 1300, Maulevrier passa alors à la famille de Lespinasse qui y bâtit un rendez-vous de chasse ultérieurement transformé en maison forte. Par mariage le domaine échut à Jean de Damas dont le fils, Philippe, y fut assassiné en 1562. Le château fut alors détruit. Sa soeur, épouse de Denys  de Savary, en entrepris la reconstruction.\r\nLa terre fut érigée en marquisat en 1625 pour François de Savary ambassadeur d'Henri IV à Constantinople, frère de Marguerite de Savary. Ils moururent sans postérité, laissant le fief à Camille de Savary qui le vendit dès 1642 à Hector Andrault de Langeron. Celui-ci légua le tout à François de Langeron qui fit aménager la pièce centrale en salle de réception, puis en salle de bal. Aimé-Charles de Langeron en hérita en 1754, le laissa à sa fille cadette, Geneviève, femme de Louis-Stanislas-Kotska de La Trémouille, qui parvint à conserver ses biens pendant la Révolution. Les tours du château furent rasées ou décapitées. A sa mort, en 1829, la propriété revint à ses petits-neveux, Charles-Louis et Léonce-Louis-Melchior de  Vogüé, puis à l'académicien Charles-Jean-Melchior de Vogüé, aïeul des propriétaires actuels.","architecture":"Maulevrier a Melay, la construction consiste en un bâtiment en U formé d'un corps principal de plan rectangulaire et de deux ailes en retour d'équerre d'inégale importance, le corps principal, l'aile gauche, et le massif pavillon carré sur lequel ces deux éléments s'articulent, sont couverts de toits à croupes, les fenêtres primitives, à croisillon de pierre sans moulure, ont été obturées, vraisemblablement au XVIIe siècle, et remplacées par des grandes baies rectangulaires dont plusieurs ont été bouchées ou modifiées. Au centre de la façade, sur cour, s'ouvre une porte encadrée de pilastres surmontés de triglyphes portant un entablement à modillons au-dessus duquel s'arrondit un fronton cintré qu'orne un écu soutenu par deux anges aux ailes déployées. À l'extrémité de cette façade, une porte en plein cintre donne accès à un passage voûté d'arêtes. L'aile droite, encore cernée d'éléments du fossé ailleurs comblé, est de même élévation, mais couverte d'un toit brisé. Elle s'appuie sur une construction plus haute coiffée d'un toit à deux versants, qui semble être un vestige de la forteresse médiévale. Fossés,  pont dormant,  escalier tournant et porte à claire-voie du XVIe siècle. Cet ensemble est séparé de la basse cour qui le précède par un fossé que franchit un pont de pierre aboutissant à une porte charretière sans recouvrement. De l'enceinte de celle-ci, ne subsistent que les bases des murailles et des tours rondes à bases légèrement talutés qui en flanquaient les angles. Les communs, en L, comportent un logis couvert d'un toit brisé, manifestement contemporain de l'aile droite du château, et des locaux à usage agricole percés de larges portes charretières à arc en anse de panier.","habitants":"Famille de Denys  de Savary\r\n        \"","divers":"Château de Maulevier","gps":"","images":["../image/image_71/71_Maulevrier_Melay_1.jpg","../image/image_71/71_Maulevrier_Melay_2.jpg","../image/image_71/71_Maulevrier_Melay_3.jpg"]},"Consult_chateau_formulairee16a-2":{"id":"Consult_chateau_formulairee16a-2","dept":"71","canton":"Cluny","commune":"Mazille","nom":"Mazille","type":"Manoir","periode":"XVII","histoire":"MAZILLE, est un domaine transmis vers 950 par Aquin. Mazille se trouve dans la liste protégée du concile dAnse et la bulle de Grégoire V. Des actes de concessions et échanges signalent un doyen Hugues, puis Guigue, puis Guillaume à la fin du XIe siècle, et enfin un prévôt Geoffroy. Mazille accueille un concile présidé par le légat Milon en 1103, auquel participent les évêques dAutun, Mâcon, Belley et trois évêques anglais. Cela donne à Mazille une importance, expliquant sa prise de contrôle par Ponce de Melgueil au cours de son schisme. Le sire de la Bussière donne aux moines le droit de fortifier le prieuré. On signale un prieur Josseran en 1217. Malgré ses fortifications, ce doyenné-prieuré na jamais eu le nom de castrum en titre, mais celui de domus. Sa situation dans le village et sa structure compacte de bâtiment, en bordure du bourg, en font plutôt un manoir résidentiel, annexe de labbaye lors des réceptions des immenses suites royales et ecclésiastiques du XIIIe siècle.\r\nGilbert Bruys de Charly eut deux filles Marie Eulalie, Guînes en 1777 Antoinette Suzanne Elisabeth, cette dernière épousa son oncle Philibert Bruy des Gardes, frère de Gilbert  Mazille en 1750 dont elle eut un fils Emilien Gilbert Bruys des Gardes en 1793. \r\nUne seconde fille, marié à M. de La Moussaye le 18 octobre 1865.","architecture":"Mazille, dans la commune le château du Colombier, le manoir  de Charly de forme rectangulaire à deux niveaux à deux pavillons saillant en façade avec fronton triangulaire à trois niveaux plein cintre, et de Montvaillant.","habitants":"Gilbert Bruys \r\n        \"","divers":"Château de Mazille et de Charly","gps":"","images":["../image/image_71/71_Mazille_1.jpg","../image/image_71/71_Mazille_2.jpg"]},"Consult_chateau_formulaire1e92":{"id":"Consult_chateau_formulaire1e92","dept":"71","canton":"Toulon-sur-Arroux","commune":"Marly-sur-Arroux","nom":"Mazoncle","type":"Château","periode":"XVI-XVII","histoire":"MAZONCLE à Marly sur Arroux, cette ville possède plusieurs châteaux la ville de Marly  faisait partie de la chaîne des châteaux chargés de protéger la Bourgogne du sud face au royaume de France et au duché du Bourbonnais, son allié, possessions du comte Eccard dans la région de Perrecy-les-Forges. Le 13 juillet 1387 Guillaume de Massoncles reconnaît tenir en fief, de toute antiquité comme ses prédécesseurs, du comte Bernard d'Armagnac, sa maison-forte de Mas Oncles avec les terres qui en dépendent sur les paroisses d'Oudry, de Marly et de Perrecy. Cest en 1559 que fut construit lactuel château. \r\nLes deux châteaux co-existèrent pendant plus de deux siècles, puis lancien fut démoli au XVIIIe siècle.                                      La FAYE, dit petite Faye. Le corps central du bâtiment date du XVIIe siècle, les deux ailes ont été rajoutées à la fin du XVIIe siècle. Sur la façade on trouve deux renforts avec des tirants métalliques qui traversent la largeur du château, un des aïeuls des propriétaires  actuels ayant fait le pari de tirer au canon sur la façade arrière, une glacière existait mais a été comblée, seul un monticule subsiste. De vieux et magnifiques ifs taillés ornent le parc très bien entretenu.                                                          CHATEAU-BOURG, ce château daté de 1723 à connu de nombreux propriétaires. Les propriétaires actuels ont su le restaurer en conservant son style, les nombreuses dépendances ont été remises en valeur, les jardins ont retrouvé une nouvelle jeunesse.","architecture":"Mazoncle a pour origine une exploitation agricole gallo-romaine appelée \"Villa Mansioncula\". Au XIVe siècle, une maison forte avec fossés. Ruines féodales de Montchatel, sa maison-forte de Mas-Oncle avec les terres qui en dépendent sur les paroisses d'Oudry, de Marly et de Perrecy. C'était une construction rectangulaire avec deux tours carrées à ses extrêmités. Elle était située à une trentaine de mètres à l'est de l'actuel château avec, comme protection, un mur et un fossé.\r\nLa première pierre du château actuel  fut posée le 7 août 1559. C'est un gros pavillon  flanqué de 2 tours carrées comportant de larges meurtrières et comme lancien château possède des  tours, un fossé, pont-levis et porte dentrée surélevée, carré et double, dont l'arête faîtière s'élève à 40 mètres au-dessus du sol, le toit seul, girouettes comprises, ayant plus de 20 mètres d'élévation.\r\nDe nombreuses restaurations au cours des ans ont permis au château et aux dépendances d'être actuellement en parfait état.\r\nLes deux châteaux co-existèrent au XVIIIe siècle.                               Dans la commune le château des Rués.","habitants":"Famille de Guillaume de Massoncles\r\n        \"","divers":"Château de Mazoncles, de la Faye, de Châteaubourg et des Ruées","gps":"","images":["../image/image_71/71_Mazoncle_1.jpg","../image/image_71/71_Mazoncle_2.jpg","../image/image_71/71_Mazoncle_3.jpg","../image/image_71/71_Mazoncle_4.jpg","../image/image_71/71_Mazoncle_5.jpg","../image/image_71/71_Mazoncle_6.jpg"]},"Consult_chateau_formulaire0033":{"id":"Consult_chateau_formulaire0033","dept":"71","canton":"Buxy","commune":"Messey-sur-Grosne","nom":"Messey","type":"Château","periode":"XV","histoire":"MESSEY, à partir du XIIIe siècle fief de la famille de Messey, en 1555  Jean de Torcy épouse la dernière représentante des Messey du XVIe siècle au XVIIIe siècle  se succèdent les familles de Lévis, Clermont-Montoison et Bataille de Mandelot. En 1739  Louise de Lévis-Montbrun est inhumée dans la chapelle qui sera détruite en 1766 , peut-être pour utiliser ses pierres à la construction d'un pont sur la Goutteuse.\r\nEn 1789  le château est pillé par les brigands du Mâconnais, une famille exploite les terres au XIXe siècle et les descendants de la famille précédente résident toujours au château, au XXe siècle qui est la propriété de M. Perroche et de Mme Thévenot.\r\nAu XXIe siècle  en 2006 et 2008 les deux parties du château ont été rachetées, et subissent actuellement une restauration de belle qualité.","architecture":"Messey sur Grosne, ce petit château du XVe siècle, bâti en brique, n'a pas subi de restauration. Il comportait encore, au XVIIIe siècle, une enceinte rectangulaire cantonnée de quatre tours. Il n'en reste qu'un corps de logis entre deux grosses tours carrées coiffées de hautes toitures en pavillon. La plus grosse des deux tours est percée d'élégantes fenêtres à croisillons. Certaines baies ont conservé des grillages en fer forgé du Moyen-Âge.\r\nÀ l'intérieur, subsiste une belle cheminée gothique à colonnes jumelées.\r\nDes communs en appareil à pans de bois et une petite tour ronde complètent cet ensemble.","habitants":"Famille de Jean de Torcy \r\n        \"","divers":"Château de Messey","gps":"","images":["../image/image_71/71_Messey_1.jpg","../image/image_71/71_Messey_2.jpg","../image/image_71/71_Messey_3.jpg","../image/image_71/71_Messey_4.jpg","../image/image_71/71_Messey_5.jpg","../image/image_71/71_Messey_6.jpg"]},"Consult_chateau_formulaire371a":{"id":"Consult_chateau_formulaire371a","dept":"71","canton":"Tournus","commune":"Ozenay","nom":"Messey_Ozenay","type":"Château","periode":"XV-XVIII","histoire":"MESSEY, époque de construction du XV-XVIIe siècle, château authentique qui appartient à la même famille depuis 400 ans. Maison forte possédant des éléments du  XVe siècle, tour, donjon du XVIe siècle, aile sud-ouest, cheminée et en grande partie du XVIIe siècle. L' ensemble est couvert de laves et domine un jardin de buis taillés traversé par une rivière canalisée. Le domaine comporte de vastes communs auxquels on accède par un portail du XVIIe siècle.   En contrebas se trouvent la ferme toujours exploitée de mains de maître par Gilles Comte, un moulin le long de la Natouze ainsi que les maisons vigneronnes. Pour pouvoir accueillir au mieux les passionnés de vin, Marc Dumont a fait restaurer ces maisons dans la tradition mais avec tout le confort moderne. Aujourd'hui, ces chambres d'hôtes et gîtes font la joie de tous ceux qui recherchent les qualités d'antan, le calme, l'harmonie.","architecture":"Messey ozenay, à 8 kms de Tournus, sur la commune d'Ozenay, le château de Messey est situé dans un grand domaine dont on retrouve des traces dans les manuscrits du IXe siècle. Dès le XIe siècle, avec la construction d'Abbayes et d'Eglises romanes telles que Tournus, Chapaize et Cluny, cette région connut un essor grandissant. Les Moines de Cîteaux et de Cluny, dont le rayonnement intellectuel, pendant plusieurs siècles est incontestable, cultivent entre autre la vigne et développent en France l'art de faire du vin. \r\nDeux ailes du Château se font face séparées par une belle cour ombragée par trois marronniers centenaires. Les chais et caves voûtées ont retrouvé leurs âmes et leur raison d'être. Caractéristique régionale, cet ensemble est complété par un beau colombier.","habitants":"Famille de Gilles Comte,\r\n        \"","divers":"Château de Messey-Ozenay","gps":"","images":["../image/image_71/71_Messey_Ozenay_1.jpg","../image/image_71/71_Messey_Ozenay_2.jpg","../image/image_71/71_Messey_Ozenay_3.jpg"]},"Consult_chateau_formulaireaa44":{"id":"Consult_chateau_formulaireaa44","dept":"71","canton":"Mâcon","commune":"Milly-Lamartine","nom":"Milly","type":"Manoir","periode":"XVII","histoire":"MILLY, Demeure bourgeoise que le père d'Alphonse de Lamartine, hérite en 1794, Pierre de Lamartine chevalier de Pratz, ce dernier  possédait plusieurs châteaux en Bopurgogne, Alphonse n'avait que sept ans lorsqu'il  habita Milly jusqu'en 1805 puis y séjourna tous les étés, il reçut en cadeau de noces le château de Saint-Point lors de son alliance avec Mary-Ann Birch. En 1830 devient l'unique héritier de Milly de Monceau et de Montculot, il revendra Milly à monsieur Mazoyer en 1860 cette demeure  passera à monsieur Daux ancêtres des propriétaires actuels la famille Sornay.","architecture":"Milly; demeure bourgeoise de forme carrée  à deux niveaux construite vers 1705 par le trisaïeul de Lamartine  au centre d'un vaste domaine viticole.","habitants":"Alphonse de Lamartine\r\n        \"","divers":"Manoir de Milly","gps":"","images":["../image/image_71/71_Milly_1.jpg"]},"Consult_chateau_formulaire6f56-2":{"id":"Consult_chateau_formulaire6f56-2","dept":"71","canton":"Chagny","commune":"Chaudenay","nom":"Mimande","type":"Château","periode":"XVII","histoire":"MIMANDE, en 1229, l'official d'Autun prononce une sentence entre l'Abbaye de Saint-Martin d'Autun et le seigneur de Chaudenay.\r\nDe la fin du XIXe siècle-début du XXe siècle jusque dans les années 1950 aux années 1960, Chaudenay était vraisemblablement un village très actif. De nombreux sabotiers, menuisiers, épiciers, artisans se côtoyaient dans ce petit village avec environ 700 habitants à l'époque, mais aujourd'hui ce n'est malheureusement plus le même cas. Depuis le 1er janvier 2007, Chaudenay fait partie de la communauté d'agglomération Beaune Côte et Sud.","architecture":"Château de Mimande du XVIIIe siècle, de forme rectangulaire à trois niveaux prolongé de chaque côtés d'ailes à deux niveaux, pavillon central en façade d'entrée.\r\nMaison de Xavier Forneret .","habitants":"Seigneur de Chaudenay\r\n        \"","divers":"Château de Mimande","gps":"","images":["../image/image_71/71_Mimande_1.jpg","../image/image_71/71_Mimande_2.jpg"]},"Consult_chateau_formulairead67":{"id":"Consult_chateau_formulairead67","dept":"71","canton":"Lugny","commune":"Montbellet","nom":"Mirande","type":"Château","periode":"XVII","histoire":"MIRANDE, fief des de Mirande, et de Mirande qui en 1560, le petit fief  \"Mirande\" est tenu par Pierre Bedel, mais à la même époque, Pierre Puget est  également seigneur de Mirande. Entre 1621 et 1625, Jean de Buisson est seigneur. Vers 1690, Jacques Bordet, avocat en Parlement détient la seigneurie. Il fut suivi par ses enfants. Au XVIIIe siècle Mirande est acquise par les seigneurs  de Senozan. En 1763 le château appartient à M. Protat, conseiller général, sous-préfet de Rethel et secrétaire de lArdèche et du Maine et Loire. Du fief de Mirande, à cette époque, il ne subsiste quune tour. La gracieuse habitation actuelle est édifiée au milieu dun beau parc de verdure. En 1789, lors des insurrections révolutionnaires, La famille Noly vend en 1808 le bien à Charles-Étienne Legrand  M. Moiroud est propriétaire du château.  En 1944, cest  M.G. de lEpine qui acquiert  le château, le fils vend la demeure en 2011 à la famille Roser. Celle-ci a comme projet de maintenir le bien  dans son esprit original. Pour ce faire, elle va moderniser les bâtiments énergétiquement et les réaménager pour y installer des chambres dhôtes de luxe.   Dans la commune de Montbellet le château de Marfontaine.","architecture":"Mirande, fief des de Mirande en 1760, dont il ne reste qu'une tour, la gracieuse habitation actuelle  édifié au milieu d'un beau parc de verdure. Lhistoire architecturale du château, porterie datant du XVIe ou XVIIe siècle, pigeonnier du XVIe - XVIIIe siècle, aile nord du XVIIIe siècle, les communs des XVIIIe et XXe siècles, aile sud du XVIIIe et XXe siècle, la demeure principale du début XIXe siècle.","habitants":"Famille de Jean de Buisson\r\n        \"","divers":"Château de Mirande","gps":"","images":["../image/image_71/71_Mirande_1.jpg","../image/image_71/71_Mirande_2.jpg","../image/image_71/71_Mirande_3.jpg"]},"Consult_chateau_formulairee1e1":{"id":"Consult_chateau_formulairee1e1","dept":"71","canton":"Cuisery","commune":"Huilly-sur-Seille","nom":"Molaise","type":"Château","periode":"XVII","histoire":"MOLAISE, le village relevant de la baronnie de Loisy, sauf Romaine, Chevreux et Molaise, aux de Berbis seigneurs de Rancy est incendié en 1653 par La Tour-Serville. L'actuel château de Molaise, élevé par la famille de Saint-Seine, date de 1868.                                                    Dans le hameau de Molaise se situe le Moulin de la Folie, belle reconstruction du XVIIIe siècle  et qui était une dépendance du château de Molaise actuellement domaine privé.","architecture":"Molaise, le village de Molaise est rattaché à Huilly en 1803, 1813 ou 1823. Il était constitué du château, de l'église Saint-Laurent détruite en 1812 , du Moulin de la Folie et de 6 fermes dont, du Pin, de Moley,  de Romaine,  du château et  de la Cure. Celle de Romaine a été récemment détruite ainsi que la chapelle. Les vestiges d'une motte castrale en bordure de Seille sont bien conservés. Un tertre circulaire ceint de deux fossés est situé dans la forêt de Molaise, sur la droite, peu avant de sortir de la forêt, lorsqu'on se rend de la ferme de la Cure à celle de Moley. Aucun mobilier n'y a été retrouvé. Il s'agirait d'une vigie destinée à défendre la voie romaine.","habitants":"Famille de Saint-Seine\r\n        \"","divers":"Château de Molaise","gps":"","images":["../image/image_71/71_Molaise_1.jpg"]},"Consult_chateau_formulaire50ee":{"id":"Consult_chateau_formulaire50ee","dept":"71","canton":"Charolles","commune":"Vaudebarier","nom":"Molleron","type":"Château","periode":"XIV-XV","histoire":"MOLLERON, fin XIVe siècle et début XVe siècle, la maison est tenue par Jean, puis Robert de Digoine. Au XVe siècle  le fief passe à la famille Bourgeois  à partir de 1510, ces derniers font construire un château et une maison forte. Au début du XVe siècle  la terre passe à une branche cadette de la famille Thésut par le mariage de Denise Bourgeois avec Henri de Thésut à la fin  du XVIIIe siècle, après les Thésut, le domaine est transmis par mariages et successions à différentes familles, aux de Viard, aux de  Macheco, aux de Chanay, originaire de Bresse. \r\nEn 1830  un Chanay prolonge le logis principal vers le nord, en rehaussant les murs et en flanquant ses angles sud-ouest et nord-ouest de tours carrées primitivement couvertes de terrasses à balustrades dissimulant des citernes, auxquelles on a récemment substitué des toitures en pavillon, au  XXe siècle, propriété de la famille Chanay.","architecture":"Molleron, le corps de logis principal est de plan rectangulaire allongé. La travée centrale de la façade ouest est couronnée d'un grand fronton cintré, dans lequel sont sculptées les armoiries des Chanay et des Macheco, et percée d'une porte en plein cintre précédée d'un porche hors uvre porté par deux paires de colonnes cannelées d'ordre toscan. Ce logis est flanqué, sur sa façade est, d'une tour carrée  qui marque l'extrémité du bâtiment du XVIe siècle, et, sur ses angles nord-ouest et sud-ouest de deux tourelles carrées dont l'une abrite une chapelle.\r\nDans une des pièces, décorées de fresques Renaissance, a été remontée une belle cheminée du XVIe siècle, provenant du château de Moulin-Lacour, à Marcilly-la-Gueurce.\r\nEn retour d'équerre de cet ensemble, les communs, qui lui étaient autrefois rattachés par un élément de bâtiment détruit au XIXe siècle, consistent en un long bâtiment dont les angles sont flanqués de grosses tours rondes et de tourelles en surplomb éclairées par de minuscules oculus encadrés d'entrelacs.","habitants":"Famille de  Robert de Digoine\r\n        \"","divers":"Château de Molleron","gps":"","images":["../image/image_71/71_Molleron_1.jpg","../image/image_71/71_Molleron_2.jpg","../image/image_71/71_Molleron_3.jpg"]},"Consult_chateau_formulaireabc7":{"id":"Consult_chateau_formulaireabc7","dept":"71","canton":"Montchamp","commune":"St-Eusébe","nom":"Monay","type":"Château","periode":"XIV","histoire":"MONAY, la seigneurie de Monay  relevait, au XIIe siècle, de l'abbaye de Cluny qui la céda au duc de Bourgogne,  Hugues V, en 1282. En 1311, celui-ci la donna en fief à Girard de Châteauneuf qui prit le premier le titre de  seigneur de Monay. En 1364, les grandes compagnies s'emparèrent de la maison forte qui fut rachetée par le duc de Bourgogne. La seigneurie de Monay  appartient successivement, jusqu'à la Révolution,  aux familles de Torcy à partir de 1503, Damas de Marcilly à partir de 1600, de Traves, de Ragny et Quarré. En 1805, terre et château furent achetés par la famille Duréault, un des descendants, le général de Montjamont, le possède actuellement.","architecture":"Monay, le donjon a disparu, il reste deux corps de bâtiments en équerre avec, à l'angle, une tour carrée. Les parties les plus anciennes datent du XIIIe siècle, le pont-levis a été remplacé par un pont de pierre mais les fossés subsistent sur la moitié du pourtour du château. À l'intérieur, toutes les pièces, de grandes dimensions, sont couvertes de plafonds à solives apparentes à la française.\r\nLe château est une propriété privée. Il fait lobjet dune inscription au titre des monuments historiques depuis le 10 juin 1931.","habitants":"Famille de Girard de Châteauneuf \r\n        \"","divers":"Château de Monay","gps":"","images":["../image/image_71/71_Monay_1.jpg"]},"Consult_chateau_formulaire0fa5":{"id":"Consult_chateau_formulaire0fa5","dept":"71","canton":"Mâcon","commune":"Prissé","nom":"Monceau_Prisse","type":"Château","periode":"XVI","histoire":"MONCEAU, en 1648, Philippe Moisson, propriétaire engagé de la terre démembrée de la châtellenie de Prissé, fait bâtir un pavillon, le domaine passe à la famille Albert en 1706, Pierre-Françoise Albert, veuve de Jean-Baptiste de Lamartine, hérite de la propriété, en 1834, le domaine parvient entre les mains du poète Alphonse de Lamartine à la suite d'un legs de sa tante Anne-Charlotte, il va l'agrandir,  c'est là qu'il recevait les parlementaires de la région  les membres du conseil général qu'il présida longtemps. Ayant enterré sa fille Julia à Saint-Point, le poète, ne supportant plus dhabiter ce château, sinstalle à Monceau, il y fera de longs séjours, recevant ses collègues du Conseil Général ainsi que George Sand, Honoré de Balzac, Alexandre Dumas, Eugène Sue, dans sa solitude, un petit pavillon au milieu des vignes qui existe encore, il rédige Le Voyage en Orient et travaille à lhistoire des Girondins et à Jocelyn.\r\n1869, après le décès du poète, son héritière Valentine de Cessiat vend le bien à la famille Virey, de Mâcon, pour pouvoir acquitter les dettes de la succession le domaine fut vendu à la fondation de Saint-Vincent de Paul en 1945 maison de retraite.","architecture":"Monceau, se compose d'un bâtiment rectangulaire en U comportant un corps de logis principal et deux ailes en retour d'équerre, le tout étant assez hétéroclite. L'élément le plus ancien est le corps principal, en légère avancée sur sa façade sud, décorées aux angles de pilastres corniers doriques d'ordre colossal, qui encadrent le degré à double volée parallèle donnant accès au rez-de-chaussée surélevé.\r\nAu nord, des communs couverts de toitures de tuiles creuses encadraient une cour ouverte. Ils ont été réunis au château primitif par des constructions à toits plats qui en enveloppent les ailes et qui sont reliées entre elles par une galerie fermée plaquée contre la façade, avec avant-corps à trois pans desservi par un escalier à double montée convergente. Petit pavillon octogonal ou Lamartine se retirait pour écrire.","habitants":"Famille de  Philippe Moisson\r\n        \"","divers":"CHâteau de Monceau-Prissé et de Moutty","gps":"","images":["../image/image_71/71_Monceau_Prisse_1.jpg","../image/image_71/71_Monceau_Prisse_2.jpg","../image/image_71/71_Monceau_Prisse_3.jpg","../image/image_71/71_Monceau_Prisse_4.jpg","../image/image_71/71_Monceau_Prisse_5.jpg","../image/image_71/71_Monceau_Prisse_6.jpg"]},"Consult_chateau_formulaire16da":{"id":"Consult_chateau_formulaire16da","dept":"71","canton":"Mont-St-Vincent","commune":"Mont-St-Vincent","nom":"Mont_St_Vincent","type":"Château","periode":"XV","histoire":"MONT-St-VINCENT, il succéda à un castrum romain, mais fut détruit en 1161, sur ordre du roi Louis VII le jeune, qui incendia le bourg après lavoir pillé, pour punir ses habitants davoir résisté aux troupes royales venues semparer de Guillaume, comte de Chalon, qui avait égorgé et dépouillé les religieux de Cluny. En 1237, Eudes IV, duc de Bourgogne, ayant acquit le comté de Chalon et la baronnie de Charolles, rendait au Roi Louis IX pour Charolles, Mont-St-Vincent et leur châtelaine. Cette châtellenie fut la première des 4 baronnies du Comté de Charolles. \r\nLa place fut de nouveau prise par les Orléanais, ennemis du duc, en 1433, en encore livrée aux flammes pour avoir résisté aux troupes royales.\r\nA la fin du XVIIe siècle, le château était tombé en ruine, et cest Antonin Febvre qui y fit construire cette grande maison dans laquelle habitèrent ses descendants pendant plusieurs générations avant de devenir cet hospice.\r\nChâteau Callard du XVIIIe siècle, la famille Callard était originaire de Montcenis et possédait le fief de Montsarin.\r\nChâteau Leclerc, Philibert Leclerc fut procureur du Roi et Charles Leclerc archiprêtre du lieu.\r\nMaison du Bailli; Reconnaissable aux deux bornes dentrée et à ses deux  flambeaux, signe de justice.                                       La tour de lAssomoire, on raconte que lorsque les huguenots monticinois étaient capturés, ils étaient conduits en haut de la tour doù on les obligeait à sauter sur les piques des soldats postés en bas  sils hésitaient, ils étaient assommés et poussés dans le vide.","architecture":"Mont-Saint-Vincent, c'était une puissante baronnie au Moyen-Age. Du château fort, il ne reste que quelques remparts et les chemins de ronde qui entourent le village château, remparts, puits, ruelles, anciennes maisons, cure, tour de l'assommoir où l'on a une vue à 360°, musée Archéologie.\r\nAncien château féodal, il se dressait à lemplacement de lactuel station météo ainsi que la station de communication. Sur lemplacement du donjon, se dresse aujourdhui lantenne de télécom et sur les prisons lhospice.                                         Les vieilles murailles;  ce vieux mur situé à lentrée sud du village marque la base de la tour qui commandait la porte Bayard. De lautre côté de la route se tenait un corps de garde.\r\nLa maison de retraite « Emmanuel Bardot » date du XVIIIe siècle, elle est construite sur lemplacement du château féodal.","habitants":"Comte de Charolles\r\n        \"","divers":"Château de Mont-St-Vincent","gps":"","images":["../image/image_71/71_Mont_St_Vincent_1.jpg","../image/image_71/71_Mont_St_Vincent_2.jpg"]},"Consult_chateau_formulaire4f64":{"id":"Consult_chateau_formulaire4f64","dept":"71","canton":"Buxy","commune":"Montagny-les-Buxy","nom":"Montagny_Buxy","type":"Château","periode":"XV","histoire":"MONTAGNY les Buxy dès le début du VIe siècle, limplantation du christianisme avait favorisé lextension de la vigne par la création dimportants domaines rattachés aux abbayes. Ce sont les moines des abbayes de Cluny, Tournus, La Ferté et les chanoines de Chalon qui cultivaient les vignes de cette région. Également, il est dit qu'autrefois les vins de la région étaient vendus sous l'appellation Côte de Buxy et pendant plusieurs siècles, ils se produisaient aussi bien du vin rouge que du vin blanc. En 1416, Charles VI fixa par un édit les limites de production du vin de Bourgogne. A  la mort de Charles le Téméraire, le vignoble de Bourgogne fut rattaché à la France, sous le règne de Louis XI.                             Depuis l'achat du château de la Saule et de ses parcelles de vignes, au début du XIXe siècle, à Montagny, en côte chalonnaise, le domaine est resté dans la même famille, pour des vins de qualité, Alain Roy Thevenin attache une grande importance à l'âge de la vigne.\r\nDans la commune le château d'Alleriot, de la Tour de Badin de Ravaux et de la Saule du XIXe siècle, viticole de la famille Roy.","architecture":"Montagny les Buxy, plusieurs châteaux dont celui de la Saule du XIXe siècle, ancienne maison forte du XV siècle, a été remanié, le château de la Tour-Badin corps de logis à deux niveaux et attiques de plan rectangulaire flanqué de deux  tours rondes en façade. Le château des Ravaux; corps de logis rectangulaire flanqué de deux tourelles.","habitants":"Famille de Alain Roy Thevenin \r\n        \"","divers":"Château de Montagny-Buxy, de Ravaux, de Saule, de la Tour-Badin et Alleriot","gps":"","images":["../image/image_71/71_Montagny_Buxy_1.jpg","../image/image_71/71_Montagny_Buxy_2.jpg","../image/image_71/71_Montagny_Buxy_3.jpg","../image/image_71/71_Montagny_Buxy_4.jpg","../image/image_71/71_Montagny_Buxy_5.jpg","../image/image_71/71_Montagny_Buxy_6.jpg","../image/image_71/71_Montagny_Buxy_7.jpg"]},"Consult_chateau_formulaire11d9":{"id":"Consult_chateau_formulaire11d9","dept":"71","canton":"Givry","commune":"Mercurey","nom":"Montaigu","type":"Vestiges","periode":"X","histoire":"MONTAIGU, Le château fut vraisemblablement construit vers 950 à la demande du duc de Bourgogne par Lambert de Valentinois, devenu comte de Chalon par son mariage avec Adélaïde de Vermandois, ceci pour protéger la ville des invasions venant de l'ouest et pour surveiller la voie romaine Lyon, Chalon, Autun, Paris. Il appartient aux comtes de Chalon  jusqu'en 1180, époque à laquelle le dernier comte héréditaire, Guillaume, ayant pillé la Bourgogne, fut dépossédé de ses biens par le roi Louis VII le Jeune, au profit de Hugues III, duc de Bourgogne. C'est alors que Montaigu fut érigé en fief et attribué au second fils de Hugues III, Alexandre qui fut le 1er Montaigu Bourgogne. A la mort d'Henry, le dernier duc de cette branche en 1348, le fief fut partagé entre la famille de Damas et le duc de Bourgogne pour tomber dans le domaine royal à la mort de Charles le Téméraire. Montaigu n'eut un rôle important que pendant les guerres de Religion. Assiégé en 1591, le château fut pris par les troupes de la Ligue, l'enceinte en partie démolie et reconstruite fut démantelée sur ordre d'Henri IV. Utilisé comme logements et  entrepôts par les vignerons des villages voisins, ce qui restait d'habitation fut vendu en 1803 à un maçon qui transforma le tout en carrière. En 1822 le marquis d'Arcelot se rendit acquéreur des ruines qui furent occupées par plusieurs ermites dont l'un, Jean Rougeot fut assassiné, un dénommé Richer soupçonné d'exactions et d'espionnage dut s'enfuir en 1870 tandis que la population détruisait l'oratoire et la cellule.\r\nLes propriétaires actuels sont les membres de la famille de Suremain.","architecture":"Montaigu, ruines féodales et plusieurs châteaux Mercurey Montaigu.  Le deuxième remparts, donjon et de son logis. La partie centrale du château est entourée d'un rempart, étant très arasé, il n'est pas possible de voir archère, crénelage et mâchicoulis, mais il semble évident qu'il en était pourvu,  château de style Haussman situé dans les hauteurs de Mercurey, capitale des vins de la côte chalonnaise, entièrement rénové.                                      \r\nChateau de Champ-Renard et de  Chamirey (voir article).","habitants":"Famille de Lambert de Valentinois\r\n        \"","divers":"Vestiges du château de Montaigu","gps":"","images":["../image/image_71/71_Montaigu_1.jpg","../image/image_71/71_Montaigu_2.jpg"]},"Consult_chateau_formulaireb635":{"id":"Consult_chateau_formulaireb635","dept":"71","canton":"Marcigny","commune":"Montceau-l`Etoile","nom":"Montceau_Etoile","type":"Château","periode":"XV","histoire":"MONTCEAU l'Etoile, la seigneurie de l'Étoile et son château en bordure de l'Arconce, furent donnés en 1248 par Saint-Louis à la famille de Vichy pour leusr faits  d'armes aux croisades. Gaspard III de Vichy-Champrond est au nombre des seigneurs, dont Abel de Vichy-Champrond qui épousa Claudine de Saint-Georges, richement dotée, de la seigneurie de l'Étoile et qui lui donne deux fils. IL reçoit de son père la seigneurie de Montceaux, puis son épouse décède. Il reste en son château, s'occupant des passions de son temps, au château de l'Étoile dont-il  reste aujourd'hui une tour dite tour Cagliostro ou château de l'Étoile. Son malheur sera sa rencontre avec Cagliostro, qui va le ruiner. Il paraît qu'il s'y livrait avec celui-ci à l'observation des astres, à l'alchimie et l'astrologie également. Il est à Londres avec lui lorsque éclate l'affaire du collier. Il est contraint de vendre ses biens. Il quitte les lieux et décédera au siège de Lyon en 1793, fusillé.\r\nCogliostro, les Vichy, pour situer cette famille qui possède un hôtel particulier à Roanne qui fut démoli pour être remplacé par lactuel bureau de poste place Georges Clémenceau, reportons nous au XVIIIe siècle dans la cour du château de Chamrond situé à Ligny en Brionnais près de Saint-Julien-de-Jonzy en Saône-et-Loire,  Abel loue en 1784, une maison à Paris et vient y étudier en 1785 le magnétisme en même temps quil monte un laboratoire de chimie. En 1786, Abel de Vichy-Champrond se rend en Angleterre pour rejoindre Cagliostro,  revint en 1787.\r\nChâteau de Chassagnes du XIXe siècle.","architecture":"Montceau, corps de logis rectangulaire a deux niveaux avec fronton en façade, accolé de deux pavillons aux extrémités, dépendances avec tours carrées à toit en poivrières.                                                   Le village possède une tour à quatre niveaux avec clochetons.","habitants":"Famille d'Abel de Vichy-Champrond \r\n        \"","divers":"Château de Montceau l'Etoile","gps":"","images":["../image/image_71/71_Montceau_Etoile_1.jpg","../image/image_71/71_Montceau_Etoile_2.jpg"]},"Consult_chateau_formulairea07f":{"id":"Consult_chateau_formulairea07f","dept":"71","canton":"Montcenis","commune":"Montcenis","nom":"Montcenis","type":"Château","periode":"XVII","histoire":"MONTCENIS, ancien château des ducs de la première génération, bâti sur la crête d'une montagne, surtout à l'Est et au sud, très-fort par sa situation et ses murailles qui avaient douze pieds d'épaisseur. Il fut rebâti par ordre de Philippe-le-Hardi en 1383, fortifié et muni d'artillerie en 1443 par le duc Jean, et démoli par Henri IV en 1601. Il y a eu des capitaines châtelains distingués, entre autres Hugues de Broisses en 1351, J. de Busseul en 1382, Huguenin de Diède en 1407. Le duc Hugues IV acquit de Hugues de Ruyne les derniers qui nous soient connus sont  les Pelletier d'Escrots, Louis XI avait fait don de cette baronnie, en 1479, au marquis de  Hocheberg pour ses services, fort la foi, hommage, ressort et souveraineté, ce qui lui fut confirmé et à ses hoirs par Louis XlI. François 1er la donna au duc de Longueville en 1543, Françoise d'Orléans, princesse de Condé, en jouissait en 1581, elle passa ensuite dans la maison de Soissons, et fut réunie à la couronne. Par la félonie du comte Charles de Bourbon, tué à la bataille de la Marfée qu'il gagna, en 1641. Ferdinand de Tenarre, marquis de Montmain, en était engagé en 1719 pour sa vie seulement. Le roi l'engagea, en 1747, à Jules-Mathieu de Rochemont, auquel il en fit un bail à rente perpétuelle, des héritiers duquel François de Lachaize, maire de Montcenis, l'a achetée, et à Mercier de la Tour en 1619, dont les lettres sont signées Anne de Montrafier, veuve de Charles de Bourbon, comte de Soissons.\r\nDans la commune le château de Bruel.","architecture":"Montcenis n'était qu'un hameau jusqu'en 1781, date à laquelle il fut décidé d'y débuter la construction de la fonderie royale, première usine métallurgique d'Europe Continentale à produire de la fonte \"au coke\", selon une technique anglaise. En 1785, il est décidé de déménager la \"manufacture des cristaux et émaux de la Reine\" Marie-Antoinette, alors située à Sèvres, près d'un centre de production de houille. Les bâtiments sont construits en 1786. C'est l'embryon de la ville du Creusot, dès 1787, le conseil dÉtat ordonne le transfert de la manufacture des cristaux de la Reine établie à Sèvres, près de Saint-Cloud, au Creusot, près de Montcenis, en Bourgogne. Le site du Vieux-Château est le point culminant du village et des environs. On y trouve une table d'orientation ainsi qu'une antenne de radiocommunications. Le château fut détruit pendant la Révolution Française. Il ne reste plus rien du château sauf quelques morceaux de remparts.\r\nJusqu'à la fin du XVIIIe siècle, on employa indifféremment les noms de Montcenis ou du Creusot pour désigner la houillère et les établissements du Creusot. Depuis, Montcenis est resté un village à la périphérie de la ville du Creusot.","habitants":"Famille de Ferdinand de Tenarre\r\n        \"","divers":"Château de Montcenis","gps":"","images":["../image/image_71/71_Montcenis_1.jpg","../image/image_71/71_Montcenis_2.jpg"]},"Consult_chateau_formulaire1e8a":{"id":"Consult_chateau_formulaire1e8a","dept":"71","canton":"Beaurepaire-en-Bresse","commune":"Montcony","nom":"Montcony","type":"Château","periode":"XIV","histoire":"MONTCONY, la famille de Montcony  est attestée  au XIIIe siècle dès cette époque; elle compte des personnages importants, dans l'entourage des ducs de Bourgogne.  En 1280,  Renaud  seigneur de Montcony fonde une chapelle dédiée à Saint-Eusèbe.\r\nGuillaume de Montcony en 1434, chambellan, reçoit en son château la duchesse Isabelle de Portugal, après la mort de Charles en 1657, dernier baron de Montconis, la terre passe à René de Franay,\r\nle domaine est vendu en 1676 à Antoine Arviset, écuyer, trésorier général de France en Bourgogne et en Bresse.  La propriété est achetée  à la fin  du XVIIe siècle par Jean Jehannin, conseiller au Parlement de Dijon, qui ce dernier le revend  en 1712   à la famille de La Rodde, dont les membres vont se succéder dans la possession de Montcony, Claude de La Rodde, seigneur de Charnay, commandant le régiment de Fontanges, mort en 1734, Charles-Louis de La Rodde en 1737, leur  fils, épouse Nicole-Étiennette de Ganay, il y meurt. Son unique fils Étienne-Charles-Louis de La Rodde émigre en 1792 pendant la Révolution puis revient en France. Ce dernier meurt en 1804.  Marie-Hector de La Rodde, en 1815 fils de Charles-Louis, est élu maire de Montcony, ce dernier est inhumé en 1857 dans la chapelle de Bellefon, sa veuve, Diane de Balathier, se retire à l'Abbaye-aux-Bois à Paris où elle meurt en 1867 n'ayant pas d'héritier direct, le domaine passe au neveu de Diane, Philibert-Gustave Mareschal de Longeville, dont les descendants garderont la propriété jusqu'en 1865, Marie-Louis-Paul Mareschal de Longeville de La Rodde est élu maire de Montcony.  Olivier Mareschal de Longeville de La Rodde,  en 1925 leur  fils, est élu maire de Montcony. Toujours dans la famille de Longeville de La Rodde.","architecture":"Château Montcony du XIIIe siècle remanié au XVe siècle. Vers 1870, le logis est modifié par l'architecte Charles Suisse. Il occupe actuellement une terrasse entourée de douves et cantonnée de quatre grosses tours rondes en briques. Les deux tours nord encadrent un corps de logis rectangulaire, complété au sud par deux  ailes perpendiculaires.\r\nLa tour sud-ouest renferme une chapelle du XVIIIe avec autel, retable et boiseries. Le salon du logis principal est orné de lambris du début du XIXe siècle et un cabinet aménagé dans l'épaisseur de la muraille de une  tour . La demeure est complétée par des communs composés d'un corps de bâtiment, d'un hangar, d'une ferme accompagnée de maisons d'habitation et d'un puits. Construction en briques typiquement  bressane.                                De 2002 à 2005, Anne-Marie et Nicole Mareschal de Longeville de La Rodde, alors en fin de vie, entreprennent avec l'aide de leurs neveux et amis, et du concours du Conseil Régional de Bourgogne, du Département de Saône-et-Loire et du Ministère de la Culture, une réfection majeure des toitures et charpentes d'une des deux plus hautes tours, celle dite \"nord-est\" 41 mètres de hauteur, ainsi que de l'aile est du corps de logis. Ces deux tranches de travaux sont dirigées par Frédéric Didier, architecte en chef des Monuments Historiques.\r\nEn 2006, Leurs neveux et amis, représentés par Guillaume Mareschal de Longeville de La Rodde et Stanislas Mareschal de Longeville de La Rodde sont récompensés pour cette opération.","habitants":"Famille de Guillaume de Montcony \r\n        \"","divers":"Château de Montcony","gps":"","images":["../image/image_71/71_Montcony_1.jpg","../image/image_71/71_Montcony_2.jpg","../image/image_71/71_Montcony_3.jpg","../image/image_71/71_Montcony_4.jpg","../image/image_71/71_Montcony_5.jpg","../image/image_71/71_Montcony_6.jpg"]},"Consult_chateau_formulaire4083-2":{"id":"Consult_chateau_formulaire4083-2","dept":"71","canton":"St-Martin-de-Bresse","commune":"Montcoy","nom":"Montcoy","type":"Forteresse","periode":"XIV","histoire":"MONTCOY, cité en 1080 par Hugues, en 1422 le fief passe  à  Antoine des Granges, appartenant à une puissante maison féodale franc-comtoise, le premier seigneur connu du lieu. Passa par alliance en  1433 à Thomas de Grammont, dont la famille est issue des barons de Granges, possède le fief et toujours par alliance en 1451  à Richard de Dammartin, au milieu du XVIe siècle aux  de Bauffremont,  par alliance  aux de Lugny  jean de Lugny conseiller et chambellan du roi et en 1545 toujours par alliance à la maison de Montcoy qui firent construire la forteresse, passa ensuite par alliance  aux des Jours et en  1661 par alliance à  François de Damas qui revendra en 1670  la seigneurie à Étienne Lantin  de 1610 à 1681, originaire de Chalon conseiller du roi et maître ordinaire en la chambre des comptes de Dijon, ce dernier abandonne le château primitif et fait élever le bâtiment central de l'édifice actuel. Cette famille de militaire garderont le domaine jusqu'au décès d'Antoine Lantin en 1867, dernier baron de Montcoy, à l'âge de 93 ans. Le domaine passera par alliance à sa fille qui deviendra  la comtesse Louis  de Riverieux de Varax, dont les descendants possèdent toujours le château, propriété de la comtesse Régis de Riverieux de Varax.","architecture":"Montcoy, la masse de briques roses  se détache sur la verdure du parc et de la forêt voisine. On pénètre dans une cour d'honneur par un grand pont en pierre à balustrades, au bout duquel deux lions sculptés marquent l'emplacement de l'ancien pont-levis démoli au milieu du XIXe siècle. Les douves subsistent de ce côté, profondes et bordées de parapets, qui épousent les contours de tours disparues.\r\nConstruit en brique avec chaînages d'angle harpés et encadrements de baies en pierre de taille, le château comporte un corps princ
