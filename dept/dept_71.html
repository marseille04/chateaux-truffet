 Pierre André de Charency est connu pour ses bonnes uvres, il fonda en 1768, douze lits à l'hôpital d'Autun, sa ville natale. Ce seigneur avait abandonné sa terre de Charancy, pour l'acquit de ses legs divers, mais son frère André de La Collonge, chevalier de Saint-Louis, en fit retrait au moyen d'une somme de cent mille livres. Elle appartenait au XIXe siècle siècle à la maison de Martenne.","architecture":"St-Didier sur Arroux; plusieurs châteaux; Charancy ou Charency.\r\nC'est le premier nom du bourg, situé à environ 1 kilomètre du bourg actuel, et ou se dresse la carcasse du château de Charency, qui était flanqué de deux pavillons et de deux tours, on y voit une chapelle gothique qui renfermait une belle statue de Saint-Gabriel patron des lieux. Demetry , avec une villa appartenant à Saint-Didier, évêque d'Auxerre. Un chemin dont subsistent quelques vestiges, Elle était, au Xe siècle siècle, une seigneurie dépendante de l'Abbaye de Saint-Martin d'Autun.   Ce hameau était jadis alternatif de Saint-Nizier-sur-Arroux.                                           \r\nLe château de Gissy, qui donnait droit à une partie des dîmes de la paroisse. Jean de La Vallade de Trufin, en était le seigneur en 1720, et son fils en 1737. Cette seigneurie passa ensuite à la maison de Busseul.\r\nJouleaux;   A l'ouest de Démétry, on y voit un petit château avec une tour ronde, datant de la fin du XVe siècle, début XVIe siècle, \r\nPatigny,  appartenait en 1716, à Martin-Elie de Cercey, seigneur de Jeu et de Chaumigny, duquel il passa à François de La Vallade de Trufin qui en jouissait encore en 1736.\r\nLa Ranche, dans l'ancien temps, alternatif avec Poil, Orsa et Patigny, étaient des fiefs en toute justice dans la mouvance de La Roche-Milay. La Ranche et Poil, appartenaient aux XVIIe siècle et au XVIIIe siècle siècles, à la maison de Méru, de Thil Rondeaux Gué sur l'Arroux entre Démétry et Rondeaux.\r\nVarillon; château. La paroisse dépendait jadis de l'archiprêtre de Luzy, elle existait déjà au IXe siècle siècle chef-lieu d'une contrée de perception au XIXe siècle siècle , le seigneur de Gissy et le marquis de Montjeu.","habitants":"Famille de Georges-Lazare Berger de Charency\r\n        \"","divers":"Château de St-Didier sur Arroux et de Charency","gps":"","images":["../image/image_71/71_St_Didier_sur_Arroux_1.jpg","../image/image_71/71_St_Didier_sur_Arroux_2.jpg","../image/image_71/71_St_Didier_sur_Arroux_3.jpg","../image/image_71/71_St_Didier_sur_Arroux_4.jpg","../image/image_71/71_St_Didier_sur_Arroux_5.jpg","../image/image_71/71_St_Didier_sur_Arroux_6.jpg","../image/image_71/71_St_Didier_sur_Arroux_7.jpg","../image/image_71/71_St_Didier_sur_Arroux_8.jpg"]},"Consult_chateau_formulairecbb8":{"id":"Consult_chateau_formulairecbb8","dept":"71","canton":"St-Gengoux-le-National","commune":"St-Gengoux-le-National","nom":"St_Gengoux","type":"Patrimoine","periode":"XII-XVI","histoire":"St-GENGOUX-le National, les Bénédictins de Cluny donnent  en 925 à ce bourg le nom de Saint-Gengoux.  Don de l'Eglise  en 950 aux moines de Cluny pour le repos de l'âme d'Aremburge, donatrice, et de sa famille.\r\nLe bourg se développe dès 1166 l'abbaye de Cluny convient d'un pariage avec le roi de France qui installe une garnison et un prévôt pour protéger les biens d'église contre les entreprises des sires et des comtes de Mâcon et de Chalon. Après de nouvelles attaques des seigneurs régionaux, le roi les soumet et en 1180 crée une ville neuve, qui devient chef-lieu de châtellenie royale. Vestige de la tour ronde qui fut dressée vers 1180 fin du XIIe siècle, devient la résidence pendant environ 73 ans du bailli du roi de France.  La ville est pillée lors des guerres de religion à plusieurs reprises. Les protestants dévastent l'église, brûlent les prêtres. Henri IV, après avoir rétabli l'ordre, ordonne la destruction des fortifications et du château en 1604. A l'emplacement du donjon s'élève le presbytère construit à la fin du XVIIe siècle. Guerre de trente ans, au XVIIIe siècle la peste et les disettes font ravages.\r\nLe 4 mars 1793, Saint-Gengoux deviendra Jouvence d'où le nom des habitants les Jouvenceaux et Jouvencelles. A la Restauration, il reprend le nom de Saint-Gengoux-le-Royal jusqu'en 1882, puis Saint-Gengoux-le-National.\r\nDans la commune, les ruines féodales donjon carrée et  le château de la Rochette, construction féodale du XII et XVe siècle dans la forêt du Gaud propriété de la comtesse  de La Vernette Saint-Maurice.","architecture":"Au Mont Goubot, dominant la ville au nord-est, existait une fortification élevée sur les vestiges d'un poste romain,  ancien château-fort dont-il ne reste qu'une tour.\r\nPlusieurs  villas gallo-romaines ont été repérées à proximité, entre autres à Sercy et Savigny-sur-Grosne.\r\nLe village s'est probablement constitué après les grandes invasions III-IVe siècle, aucune découverte antérieure à l'époque mérovingienne n'a été signalée sur son emplacement.\r\nDe l'époque burgonde, mérovingienne, et jusqu'à l'an mille, un bourg se développa en bordure de la route romaine. Une église est édifiée à l'époque carolingienne dont le cur subsiste au centre du cimetière actuel. Donjon,  reste d'un château construit sous le régime de Philippe-Auguste en 1206, comptait 4 tourelles que Henri IV fit détruire en 1604 seul le donjon subsiste.                                Belle cité médiévale avec les vestiges d'un château. Il reste la tour des archers du XIIe siècle, le donjon du XIIIe siècle. Il fut ensuite céder aux moines pour y faire leur presbytère.  En entrant dans un passage étroit, au bout de la cour, et l'on découvre une des plus vieille tour de la cité. Elle était située sur la première enceinte du début du  XIIIe siècle.","habitants":"Les comtes de Mâcon\r\n        \"","divers":"Château et tour de St-Gengoux","gps":"","images":["../image/image_71/71_St_Gengoux_1.jpg","../image/image_71/71_St_Gengoux_2.jpg","../image/image_71/71_St_Gengoux_3.jpg","../image/image_71/71_St_Gengoux_4.jpg","../image/image_71/71_St_Gengoux_5.jpg","../image/image_71/71_St_Gengoux_6.jpg","../image/image_71/71_St_Gengoux_7.jpg","../image/image_71/71_St_Gengoux_8.jpg","../image/image_71/71_St_Gengoux_9.jpg"]},"Consult_chateau_formulaire2f6f":{"id":"Consult_chateau_formulaire2f6f","dept":"71","canton":"St-Germain-le-Plain","commune":"St-Germain-le-Plain","nom":"St_Germain_le_Plain","type":"Château","periode":"XVI","histoire":"ST-GERMAIN du Plain, à l'origine fief du seigneur de Geoffroy de Frolois qui décéda en 1369, il était marié à Jeanne d'Assuel qui elle décéda en 1385, leur fils Gauthier de Frolois  né en 1354 marié à Marguerite de Vienne fille de Guy de Vienne seigneur de Chevraux décède en 1406 et de Marie de Thoire Villars.","architecture":"St Germain le Plain, du château féodal reste d'un donjon cylindrique du XIIIe siècle en briques, couronné de mâchicoulis du XIIIe siècle un autre château voisin plus récent.","habitants":"Seigneur de Geoffroy de Frolois\r\n        \"","divers":"Château de St-Germain le Plain","gps":"","images":["../image/image_71/71_St_Germain_le_Plain_1.jpg","../image/image_71/71_St_Germain_le_Plain_2.jpg","../image/image_71/71_St_Germain_le_Plain_3.jpg","../image/image_71/71_St_Germain_le_Plain_4.jpg"]},"Consult_chateau_formulaire8bcf":{"id":"Consult_chateau_formulaire8bcf","dept":"71","canton":"St-Gengoux-le-National","commune":"St-Hurugue","nom":"St_Hurugue","type":"Maison forte","periode":"XIII","histoire":"St-HURUGUE, en 1266, le fief, qui se nomme à l'époque Saint-Eusèbe, propriété de Guillaume Sauvage. Au XIVe siècle  le fief appartient aux Trezettes. Antoinette de Trezettes l'apporte en 1440  par alliance à Girard de Bernaud et en 1461  Louise de Bernaud, fille d'Antoinette, apporte par alliance  à Jean de Choiseul-Traves et à la fin XVe siècle, Antoine de Choiseul-Traves, leur fils, les succèdent.\r\nJeanne de Choiseul-Traves, dame de Saint-Huruge, fille  de Louise, s'unit en 1538 à Jean de Foudras (1515 - 1582) et en 1618, les Foudras vendent le domaine à François Savary, qui ces derniers le revend à François de Thibaut, maréchal de camp en 1625.,érigé en baronnie en 1631 et en 1722  par succession collatérale, le bien échoit à Victor-Amédée de La Fage  (surnommée le marquis rouge) en raison de l'amitié qui le liait à Danton pour ses convictions révolutionnaires. En 1801 leur petit-fils, également prénommé Victor-Amédée, dit le marquis de Saint-Huruge, qui dilapide le patrimoine familial. Sa fille, Claire-Sophie échange avec Antoine Chaland  le domaine de Saint Huruge contre une maison à Paris au Palais Royal. Le nouveau propriétaire le revend au général baron de La Houssaye.  En 1818 : le domaine est revendu à Jean Brenot, sa fille Catherine épouse Jacques Adenot et lui apporte Saint-Huruge en dot. C'est à l'époque de Jacques Adenot  combla  les fossés du château, et démolie la tour de l'escalier symétrique du donjon.\r\n Mathilde Adenot, leur fille, épouse en 1843 Eugéne Perraud. Ils auront une fille, Emilie qui épousera Joseph Buffe, d'où Mathilde Buffe leur fille épouse en 1894 André, baron d'Allemagne, arrière-petit-fils du général baron Claude d'Allemagne. Le domaine restera dans la famille jusqu'a 1960. Il est aujourd'hui propriété de Mme E. Nouveau.                                                                                       Dans la commune outre les ruines féodales le château de la Folie.","architecture":"St-HURUGUE, le château fort érigé au XIIIe siècle à gardé intacts ses quatre tours , trois rondes et une carrée                                \r\n   Le château fort, encore évoqué dans le dénombrement de 1625, était un quadrilatère cantonné de tours. L'ensemble a subi au XVIIe siècle et au XIXe siècle d'importantes modifications qui ont laissé intactes les tours. Une tourelle rectangulaire a été accotée à la façade occidentale de la grosse tour, qu'un bâtiment d'habitation rattache à la tour nord-ouest. Un corps de logis de même élévation, sous un toit à deux versants, a remplacé la courtine sud.","habitants":"Famille de  Guillaume Sauvage\r\n        \"","divers":"Chjâteau de St-Hurugue","gps":"","images":["../image/image_71/71_St_Hurugue_1.jpg","../image/image_71/71_St_Hurugue_2.jpg"]},"Consult_chateau_formulaired03f-2":{"id":"Consult_chateau_formulaired03f-2","dept":"71","canton":"Sennecey-le-Grand","commune":"St-Jean-le-Priche","nom":"St_Jean_le_Priche","type":"Château","periode":"XVII","histoire":"St-JEAN-LE-PRICHE, construction du château aux XVII et XVIIIe siècles, aux XIX et XXe siècles propriété des Barbentane, dont Louis Antoine de Robin, comte de Barbentane, député au corps législatif, maire de Saint-Jean et membre du conseil général de Saône et Loire, qui épouse, en 1839, Charlotte de Bongars, fille du colonel  vicomte de Bongars. De nos jours il a été transformé en maison de retraite.","architecture":"St-Jean le Priche, en forme de U trois corps de logis à deux niveaux accolés de pavillons carrés à trois niveaux  aux angles,","habitants":"Familler de Louis Antoine de Robin\r\n        \"","divers":"Château de St- Jean le Priche","gps":"","images":["../image/image_71/71_St_Jean_le_Priche_1.jpg","../image/image_71/71_St_Jean_le_Priche_2.jpg","../image/image_71/71_St_Jean_le_Priche_3.jpg","../image/image_71/71_St_Jean_le_Priche_4.jpg","../image/image_71/71_St_Jean_le_Priche_5.jpg"]},"Consult_chateau_formulaire9df4":{"id":"Consult_chateau_formulaire9df4","dept":"71","canton":"Mâcon","commune":"Charnay-les-Mâcon","nom":"St_Leger","type":"Château","periode":"XV","histoire":"St-LEGER, l'existence de seigneurs de Saint-Léger portant le nom de leur terre est attestée au début du XIVe siècle.  Les Sagié leur succédèrent au cours de la seconde moitié  du XVe siècle. En 1595, la terre passa par alliance à Jean Siraudin, célèbre dans la région pour ses brigandages, qui l'accrut considérablement avant d'être contraint à le vendre en 1642 à Claude de Meaux seigneur de Marbé. La veuve de ce dernier laissa Saint Léger, en 1682, à Salomon Chesnard de Layé. La famille Chesnard de Layé le posséda jusqu'à sa vente, en 1785, à Françoise  Bellon, veuve de Jacques Ratton, seigneur de Condemine. Lucie Ratton, épouse de Louis Aimé Aujas, maire de  Mâcon, parvint à conserver ses biens durant la période révolutionnaire et mourut au château en 1824.","architecture":"St-Leger, la chapelle du château était considérée comme un lieu de pèlerinage, on venait prier st Léger pour la guérison des enfants atteints du carreau, affection tuberculeuse qui donnait le ventre dur comme un carreau, les parents  grattaient la pierre du seuil pour en extraire la poussière quils mélangeaient aux aliments du petit malade, malgré la disparition de la chapelle, détruite à la Révolution, ce pèlerinage était encore vivace en 1870.                         Le château a été restauré au XIXe siècle.","habitants":"Famille de Jean Siraudin\r\n        \"","divers":"Château de Saint-Leger","gps":"","images":["../image/image_71/71_St_Leger_1.jpg","../image/image_71/71_St_Leger_2.jpg","../image/image_71/71_St_Leger_3.jpg"]},"Consult_chateau_formulaire8568-3":{"id":"Consult_chateau_formulaire8568-3","dept":"71","canton":"Mâcon","commune":"St-Martin-Belle-Roche","nom":"St_Martin_Belle_Roche","type":"Maison forte","periode":"XV","histoire":"VIEUX-CHATEAU  à Saint-Martin Belle Roche, cité au XIIIe siècle  sur l'emplacement d'une maison forte  construite par les de Rinsart seigneur du parc, transmis au Pomerol en 1400,  jusqu'aux Talleyrand Perigord, qui le gardèrent jusqu'en  1789. Le 7 et 8 juillet 1504 les ligueurs y firent toutes sortes de désordres en tuant et en assassinant les gens de la campagne. A la Révolution une bande de brigands politiques  saccage le château, il fut sauvé par le fermier qui leur  distribua des écus.","architecture":"Saint-Martin Belle Roche, du XVe siècle, de forme quadrangulaire  à trois niveaux flanqués de tours rondes en angles en façade avant et carrées à l'arrière à toits en poivrières.  Le deuxième château dans cette commune, corps de logis rectangulaire à un niveau  sur rez-de-chaussée flanqué en façade plein cintre d'un pavillon à deux niveaux.","habitants":"Famille de Talleyrand Perigord\r\n        \r\n        \"","divers":"Château de St-Martin Belle Roche","gps":"","images":["../image/image_71/71_St_Martin_Belle_Roche_1.jpg","../image/image_71/71_St_Martin_Belle_Roche_2.jpg","../image/image_71/71_St_Martin_Belle_Roche_3.jpg"]},"Consult_chateau_formulairec74a":{"id":"Consult_chateau_formulairec74a","dept":"71","canton":"St-Martin-de-Bresse","commune":"St-Martin-de-Bresse","nom":"St_Martin_de_Bresse","type":"Maison forte","periode":"XIII XV","histoire":"ST-MARTIN de Bresse, la paroisse de Perrigny en dépendait, ainsi que Collenand, les Osnard, Crémelon, Chassagne, etc., et  Bellefond   toute ces paroisses forment une baronnie avec ancienne forteresse et chapelle bâtie par Robert de Dammartin, qui y fut inhumé en 1400, aux Dammartin succédèrent les Poupet, Chauvirey, trois Bernard de Montessus, deux de Ganay, Charles-Louis de la Rodde de Montconis était seigneur du temps de Courtépée.\r\nA Bellefond, fort ancien, a été détruit par les guerres et les pestes. On croyait que la chapelle de la Madeleine était l'église paroissiale et qu'il y avait jadis un monastère de Bénédictines dépendant du prieuré de Saint Christophe.\r\nGuillaume de la Marche vendit, en 1376, la terre de saint Martin à Jacques Goussay, N. Bataille céda à N. de la Baume, seigneur de Ratte, sa portion de Saint Martin en 1581, les moines de Saint Pierre vendirent l'autre portion en 1603, à N. Galoche, qui acquis les deux autres parts de MM. De Fussey et Bataille, le P. Fyot d'Arbois était coseigneur en 1667, avec N. de Fussey, dont l'abbé Fyot acquit la portion en 1677.  Le château d'Outre Cosne dépendait aussi de Saint Martin et du marquisat de la Marche. La maison forte d'Outre Cosne reconstruite vraisemblablement au tout début du XVIIe siècle, relevait, du marquisat de La Marche et de la seigneurie de Saint Martin. En 1628, la petite seigneurie d'Outre-Cosne, déjà très morcelée, est cédée, en partie, à Pierre Pelley, marchand à Verdun sur le Doubs.","architecture":"St-Martin de Bresse, maison forte de Crémelon, corps de logis rectangulaire à deux niveaux et attiques  flanqués en angles de pavillons carrés  à trois niveaux. La maison forte d'Outre Cosne reconstruite vraisemblablement au tout début du XVIIe siècle C'est peut-être  de cette époque que date  la reconstruction du manoir actuel. Le logis est implanté sur un terre-plein. Deux lourdes  tours carrées flanquent  sa façade postérieure  percée de grandes baies à meneaux. La brique qui constitue le gros-oeuvre du logis n'est visible que sur la corniche à \"modillon\" qui couronne les trois corps de bâtiment. Les façades du corps central  sont identiques : les deux portes d'entrée  qui s'ouvrent sur le couloir axial sont couvertes d'un arc en plein-cintre à impostes, dont les clés ont été martelées. Le bâtiment de dépendance en brique qui fait face au logis n'est pas antérieur au début du XIXe siècle. Il abrite deux granges contiguës qu'encadrent des étables et des écuries. Extrait du livre \"Patrimoine de Bourgogne du Sud.                                         Bellefond il ne reste que des ruines  mais subsiste une splendide chapelle.","habitants":"Famille de Guillaume de la Marche\r\n        \"","divers":"Château de St-Martin de Bresse, de Bellefond et de Cremelon","gps":"","images":["../image/image_71/71_St_Martin_de_Bresse_1.jpg","../image/image_71/71_St_Martin_de_Bresse_2.jpg","../image/image_71/71_St_Martin_de_Bresse_3.jpg","../image/image_71/71_St_Martin_de_Bresse_4.jpg","../image/image_71/71_St_Martin_de_Bresse_5.jpg"]},"Consult_chateau_formulairec590":{"id":"Consult_chateau_formulairec590","dept":"71","canton":"Lugny","commune":"St-Maurice-de-Satonnay","nom":"St_Mauris","type":"Château","periode":"XVI","histoire":"St-MAURIS, le château appartient au  XIIIe siècle à la puissante famille de Chevriers, qui se prétend issue des comtes de Mâcon, Pierre de Chevriers, seigneur de Saint-Mauris en 1270, accompagne Saint-Louis en Afrique.  Au XVIIe siècle, vivait un puissant seigneur Messire Laurent de Chevriers, chevalier de l'ordre du roi la généalogie de cette famille donna  douze générations d'ancêtres paternels à la mort du dernier  de Laurent de Chevriers en 1629,  et de François de Chevriers, en 1641 comte de Saint-Mauris, frère du précédent, premier grand Juge d'Armes nommé en 1615 par Louis XIII,   Honoré de Chevriers, comte de Saint-Mauris, son fils, passe   de 1723 à 1727 à Léonard de Chevriers, comte de Saint-Mauris, fils d'Honoré, est grand prieur d'Auvergne. Les Chevriers lèguent en 1783  l'ensemble à Gabrielle de Musy, veuve de Pierre, comte de Vallin, cousin germain du marquis de Chevriers, puis à François Damas le 24 juillet 1789. Les biens sont séquestrés en 1792.\r\nAu XIXe siècle, le domaine passe entre les mains de propriétaires successifs pour arriver a  M. Cléaud et de Mme Simon.                                  La ville l'acheta pour un centre hospitalier de Mâcon et maison de retraite.                                                                                      Château de Salornay, existait déjà au XIVe siècle, le seigneur Philibert de Musy fit construire un château beaucoup plus important. En 1593, Frontignat tenait le château, il mourut en 1597, le château échut à Marc de Fontanès, seigneur de la Valette en Forez, vendu en 1714  à Eustache Channorier, lieutenant  du Mâconnais acheté, en 1729, par Abel de la Bletonnière, seigneur d'Igé les de Veyssière, nouveaux acquéreurs vers 1850, ont vendu à M. de Ramonet, ancien capitaine de dragons en 1892. Dans la commune le château de  Chevrier.","architecture":"St-Mauris à St  Maurice de Satonnay. D'un enclos presque carré, flanquées de six tours rondes et carrées il ne subsiste que deux côtés, constitués de vieux bâtiments agricoles disposés en L, sur l'angle extérieur desquels se dresse une tour circulaire percée d'une archère-canonnière, une seconde tour flanqué sur  la façade d'un petit logis rectangulaire couvert d'un toit brisé, qui a été aménagé au XVIIIe siècle et au XIXe siècle à l'emplacement de la courtine orientale, cette tour, qui domine nettement l'ensemble des constructions, est couverte d'un dôme de tuiles vernissées à égout retourné, couronné d'un lanternon,  le corps central date du XVe siècle. Le portail monumental, édifié en 1629 par Laurent de Chevriers, dont les montants étaient décorés de douze écussons aux armes de ses prédécesseurs, a disparu à la fin du XVIIIe siècle.","habitants":"Messire  de Chevriers\r\n        \"","divers":"Château de St-Mauris","gps":"","images":["../image/image_71/71_St_Mauris_1.jpg","../image/image_71/71_St_Mauris_2.jpg","../image/image_71/71_St_Mauris_3.jpg","../image/image_71/71_St_Mauris_4.jpg","../image/image_71/71_St_Mauris_5.jpg"]},"Consult_chateau_formulairee3c1":{"id":"Consult_chateau_formulairee3c1","dept":"71","canton":"Mont-St-Vincent","commune":"St-Micaud","nom":"St_Micaud","type":"Château","periode":"XVI","histoire":"St-MICAUD, au XVIe siècle la fief semble avoir été détaché, à cette époque, de la châtellenie de Mont-Saint-Vincent, qui faisait partie du domaine ducal, puis royal et engagée à François Royer qui en prend le titre.  A  la fin de l'ancien régime, Aimé-Bernard de Royer, comte de Saint-Micaud, capitaine de dragons au régiment de Montmorin, est le dernier représentant des Royer à Saint-Micaud \r\nAu  XXe siècle,  propriété de M. E. de Fréminville.","architecture":"St-Micaud, le château, bâti au XVIIe siècle, de style Louis XIII est constitué d'un corps central de plan rectangulaire entre deux gros pavillons carrés en légère avancée sur sa façade occidentale. Il comprend un rez-de-chaussée et deux étages, soulignés par trois bandeaux qui règnent tout autour de l'édifice.","habitants":"Famille de  François Royer\r\n        \"","divers":"Château de Saint-Micaud","gps":"","images":["../image/image_71/71_St_Micaud_1.jpg","../image/image_71/71_St_Micaud_2.jpg"]},"Consult_chateau_formulaire8cf7":{"id":"Consult_chateau_formulaire8cf7","dept":"71","canton":"Tramayes","commune":"St-Point","nom":"St_Point","type":"Château","periode":"XII XIX","histoire":"St-POINT, à l'origine du XIIe siècle dépendait de l'Abbaye de Cluny qui fut rattaché au duché de Bourgogne, en 1482 fut la propriété du seigneur Jean de Saint-Point jusqu'en 1776 à la mort du dernier gouverneur Guillaume de Saint-Point. Le fief passe au marquis de Castellane , il fut racheté par adjudication en 1801 par le chevalier de Pratz Pierre de Lamartine ancien capitaine de cavalerie qui l'offrit à son fils Alphonse pour son mariage en 1820 avec Mary Ann Birch fille d'un officier anglais, c'est dans ce domaine que le poète travailla après son séjour en Italie en tant  de secrétaire d'ambassade, et sera élue en 1830 à l'académie française, il reçut de nombreuses personnalités à Saint-Point. A la mort de son épouse en 1863 ajouté a des difficultés financières il doit se séparer de la maison de Milly et des bois de Saint-Point, malgré tout doit faire face aux dépenses du château de Monceau qu'il a hérité en 1833, il décédera en 1869, il sera inhumé à Saint-Point, le domaine revient à sa nièce Valentine de Cessiat et un petit neveu de Lamartine monsieur de Monterot le rachète passera en héritage à son petit fils René de Noblet d'Anglure toujours dans sa descendance.                                                                       \r\n Dans la commune plusieurs domaines.","architecture":"Saint-Point, dominant la Valouze la maison forte à l'origine du XIIe siècle transformé en grosse gentilhommière du XIXe siècle flanquée de tours rondes qui étaient crénelées, puis  arasées, importantes dégradations à la Révolution dévastaient par les habitants de Saint-Point, restauré en 1801 suite à l'achat des de Lamartine de 1852 à 1855, le château reçut un corps de bâtiment avec terrasse entre les tours rondes charollaises,  vestiges de l'ancien château-fort du Moyen-Age, une galerie et un porche d'entrée de style gothique sur la façade occidentale un donjon carré à mâchicoulis et d'une tourelle couronnée d'un toit à poivrière et percée de meurtrière.","habitants":"seigneur Jean de Saint-Point et de Pierre de Lamartine\r\n        \"","divers":"Château de St-Point","gps":"","images":["../image/image_71/71_St_Point_1.jpg","../image/image_71/71_St_Point_2.jpg","../image/image_71/71_St_Point_3.jpg","../image/image_71/71_St_Point_4.jpg","../image/image_71/71_St_Point_5.jpg","../image/image_71/71_St_Point_6.jpg"]},"Consult_chateau_formulaired40c":{"id":"Consult_chateau_formulaired40c","dept":"71","canton":"Toulon-sur-Arroux","commune":"St-Romain-sous-Versigny","nom":"St_Romain","type":"Château","periode":"XIX","histoire":"St-ROMAIN,  deux châteaux, le premier au Comte de Maigret et l'autre l'ancienne propriété du Comte de la Boulaye.  Au  XVIIIe siècle, la terre appartient à la famille Maublanc de Chiseuil. En 1813  François de Maublanc de Chiseuil  baron d'Empire.\r\nLe château a été bâti vers 1850 par la famille Maublanc de Chiseuil sur une terre qui lui appartenait depuis le XVIIIe siècle. Il a été mis en vente peu de temps après sa construction et a connu divers propriétaires avant d'être  acquit par la famille de Maigret. De 1900 à 1910 des dépendances sont aménagées au nord du parc et deux ailes  sont ajoutées de part et d'autre du corps central. Actuellement il est propriété de M. Yves de Maigret.\r\nDans la commune le château de Martenet du XIVe siècle.","architecture":"St-Romain, château a été bâti vers 1850,  c'est un bâtiment de plan rectangulaire à un étage carré et un étage de comble, flanqué vers le nord de 2 courtes ailes en retour d'équerre et de deux petits pavillons à un seul niveau.  Le corps central et les ailes sont couverts de toits brisés en ardoise, percés de lucarnes à pignon découvert, les pavillons de terrasses à balustrade.  Au centre de la façade nord, un avant corps peu saillant d'une travée est souligné par deux chaînes en bossage. Un bandeau règne au niveau du sol. La façade sud est animée par un avant-corps à trois pans.","habitants":"Famille Maublanc de Chiseuil\r\n        \"","divers":"Château de St-Romain","gps":"","images":["../image/image_71/71_St_Romain_1.jpg"]},"Consult_chateau_formulairebb63":{"id":"Consult_chateau_formulairebb63","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"St-Symphorien-d`Ancelles","nom":"St_Symphorien_Ancelle","type":"Château","periode":"XVIII","histoire":"ST-SYMPHORIEN d'Ancelles, le château de Saint-Symphorien d'Ancelles,  construit  de  1752 à 1753 par l'abbé de Sigorne pour la marquise Du Deffand qui y vécut  quelques années , l'intérieur a gardé ses boiseries et peintures murales de l'époque. Le château fut acquit en 1797 par un aïeul du colonel Rater, propriétaire actuel                   Dans cette commune plusieurs châteaux dont la mairie,  le château du Parc, de la Guicherie et des Barge.  Les Abbés de Tournus en firent le siège de la prévôté est attribué à Nicolas Servé trésorier des états du Mâconais.","architecture":"Saint-Symphorien, château à un niveau et attiques de forme rectangulaire avec fronton saillant en façade côté parc.","habitants":"marquise Du Deffand\r\n        \"","divers":"Château de St-Symphorien d'Ancelles","gps":"","images":["../image/image_71/71_St_Symphorien_Ancelle_1.jpg","../image/image_71/71_St_Symphorien_Ancelle_2.jpg"]},"Consult_chateau_formulaire993d":{"id":"Consult_chateau_formulaire993d","dept":"71","canton":"Buxy","commune":"St-Vallerin","nom":"St_Vallerin","type":"Château","periode":"XVII","histoire":"St-VALLERIN, le château de Collonges dépendait autrefois du domaine de Cluny,  appartient aujourd'hui à un couple de particuliers. L'un des deux étant artiste, vous pourrez admirer dans les lieux de nombreuses uvres inspirées de l'art africain.                                  Dans la commune plusieurs châteaux dont celui de la Tour style médiéval, château de la Pinacle et château de la Marche.","architecture":"Collonges du XVIIe siècle transformé en chambres d'hôtes. En forme de U à deux niveaux, flanqué de tours rondes. Fronton triangulaire sur façade d'entrée.","habitants":"domaine de Cluny\r\n        \"","divers":"Château de Collonges et de St-Vallerin","gps":"","images":["../image/image_71/71_St_Vallerin_1.jpg","../image/image_71/71_St_Vallerin_2.jpg","../image/image_71/71_St_Vallerin_3.jpg"]},"Consult_chateau_formulairef05e":{"id":"Consult_chateau_formulairef05e","dept":"71","canton":"Palinges","commune":"St-Vincent-de-Bragny","nom":"St_Vincent_de_Bragny","type":"Château","periode":"XV","histoire":"ST-VINCENT-DE-BRAGNY, le château féodal,  en 1161, était la propriété de l'évêque de Nevers. En avril 1164, le Pape Alexandre III, réfugié en France, reconnaît  que l'Abbaye de Saint-Martin d'Autun possède bien le patronage de la cure de  \" Ecclesiam Braigniaco \". En 1232, un accord intervient entre Jean, comte de Châlon et l'abbaye de Saint-Martin d'Autun, sur la juridiction de Bragny et de Chenôves.  En 1373, le père abbé, Alexandre de l'Abbaye de Saint-Martin d'Autun, donne aux religieux du Prieuré de Bragny, leur vie durant des terres à Girolles et à Sermizelles. Prieuré dont les bénéfices reviennent à Saint-Martin d'Autun.\r\nVers 1500, le prieur de Bragny, adresse une lettre à l'abbé de Saint-Martin d'Autun, Tristan de Salazar, lui faisant savoir qu'il dépose une requête au roi pour obtenir justice pour lamaison de la Boutière et qu'on y dresse un signe patibulaire à un pilier.              CHASSAGNES, à fin XIXe siècle  le manoir de la Chassagnes est détruit par un incendie. Entre 1893 et 1899, un vaste château est alors bâti au même emplacement pour l'industriel lyonnais Henry Roux de Bézieux; l'architecte serait le lyonnais Paul de Montclos et les jardins sont dessinés par le paysagiste Henri Duchêne, père d'Achille Duchêne. Transformé en hôtel restaurant de Luxe.             Dans la commune plusieurs châteaux dont celui des Angles, de Champeaux, d'Eterne et maison forte du Prieur du XVe siècle.","architecture":"Château de la Chassagnes, inscrit aux monuments historiques. Arrêté du 29 octobre 1926  dépendances , ferme , pavillons, portail, y compris la demi-lune d'entrée nord et la statue de Flore et l'Amour , jardins, y compris les balustrades, les statues et les vases d'ornement, la serre. Le nouveau château, de plan rectangulaire, est inspiré du style \"néo-régence\" de la fin du XVIIe siècle. On y accède par une avenue de chaque côté de laquelle sont situés, ferme et le potager au couchant. La façade nord est flanquée à ses extrémités de deux courtes ailes en retour d'équerre et animée en son centre d'un avant-corps à peine saillant d'une seule travée. Devant la façade, entre les ailes, une terrasse à balustrades est séparée par quelques marches d'un parterre orné d'ifs. Au-delà, quatre statues sont dressées à l'entrée d'une longue allée de tilleuls aboutissant à une grille, entre deux pavillons carrés.                Cette grille s'ouvre sur un hémicycle de tilleuls dans lequel on découvre une statue de la nymphe Pomone.                               Prieuré de Bragny, inscrit aux monuments historiques. dit \"Prieuré Saint-Martin de Bragny\" dont les revenus appartiennent à l'Abbaye de Saint-Martin d'Autun.","habitants":"Abbé Tristan de Salazar\r\n        \"","divers":"Château de St-Vincent de Bragny et de Chassagnes","gps":"","images":["../image/image_71/71_St_Vincent_de_Bragny_1.jpg","../image/image_71/71_St_Vincent_de_Bragny_2.jpg","../image/image_71/71_St_Vincent_de_Bragny_3.jpg"]},"Consult_chateau_formulaired8c7":{"id":"Consult_chateau_formulaired8c7","dept":"71","canton":"Montpont-en-Bresse","commune":"Ste-Croix","nom":"Ste_Croix_Bresse","type":"Château","periode":"XIII-XVI","histoire":"SAINTE-CROIX, cité au XIIIe siècle, le château de Sainte-Croix fut construit par la famille de Vienne.  Philippe de Vienne (1240 - 1303) seigneur de Sainte-Croix, dans cette famille de père en fils  jusqu'en 1450, quand  Jean de Vienne vend à la famille de Hochberg. Au milieu du XVe siècle Marguerite de Vienne porte la seigneurie par mariage à Rodolphe de Hochberg. Au XVe siècle Philippe de Hochberg, le fils Henri II d'Orléans famille d'Orléans-Longueville en devient propriétaire.\r\nAu début du XVIe siècle, cette famille hérite du fief par l'union de Jeanne de Hochberg, comtesse de Neuchâtel, fille de Philippe, avec Louis d'Orléans-Longueville, comte de Tancarville également de père en fils Jusqu'en 1626 quand Henri II d'Orléans-Longueville, duc d'Estouteville,  vend à la famille de Champlécy,  le précédent vend le bien à Charles de Champlécy dont hérite immédiatement sa fille Charlotte de Champlécy, baronne de Sainte-Croix. qui fit passer par alliance a la famille de Batz de Castelmore d'Artagnan en 1659. Ce château eut pour châtelaine, Anne Charlotte de Chanlecy, la femme de d'Artagnan, capitaine des mousquetaires du roi Louis XIV. La précédente épouse, en seconde noce, Charles de Batz de Castelmore d'Artagnan, modèle du héros d'Alexandre Dumas. \r\nLouis II de Batz, en 1709   chevalier, baron de Sainte-Croix, seigneur de Castelmore et de Champlécy, comte d'Artagnan, puis à Louis-Gabriel d'Artagnan, qui vend le château à Jean-François-Joseph de Venant, seigneur d'Iverny qui le restaure.  La seigneurie est érigée en marquisat  en 1744. passe ensuite a la famille de Renouard de Fleury. Le château et son mobilier sont vendus en 1759 à Claude-François de Renouard de Fleury dont les descendants garderont la propriété  jusqu'au XXe siècle qui passera au comte de Varax. \r\nDans la commune château de le Motte du XIXe siècle et de Promby.","architecture":"SAINTE-CROIX-EN-BRESSE, charmant petit village de la Bresse Louhannaise  se distingue par sa grande rue pittoresque, son Eglise gothique du XVe siècle , son château du XVIIIe siècle corps de logis rectangulaire à trois  niveaux,  pavillons de même hauteur aux extrémités et son moulin hydraulique.","habitants":"Famille de Hochberg\r\n        \"","divers":"Château de Sainte-Croix de Bresse","gps":"","images":["../image/image_71/71_Ste_Croix_Bresse_1.jpg","../image/image_71/71_Ste_Croix_Bresse_2.jpg","../image/image_71/71_Ste_Croix_Bresse_3.jpg"]},"Consult_chateau_formulaire1837":{"id":"Consult_chateau_formulaire1837","dept":"71","canton":"Semur en Brionnais","commune":"Ste-Foy","nom":"Ste_Foy_Pagus","type":"Château","periode":"XIX","histoire":"Ste-FOY; Les « pagus » Charolais et Brionnais sont deux anciens bailliages créés sous le règne de Saint Louis. Bien que suivant politiquement des voies très chaotiques (le Charolais sera confisqué au roi dEspagne en 1684, mais annexé à la couronne seulement en 1751, le Brionnais relevant pour certaines paroisses du Parlement de Paris et du bailliage de Mâcon, et pour dautres du Parlement de Dijon et du bailliage secondaire de Semur-en-Brionnais, relevant lui-même du bailliage principal d'Autun) ces deux petits pays se sont forgés une histoire commune où pays, paysans et paysages sont fortement liés.\r\nAu moment de la Révolution, le bailliage de Semur et les paroisses mâconnaises du Brionnais ont intégré le district de Marcigny. Ce district à ensuite rejoint celui de Bourbon-Lancy et de Charolles pour former l'arrondissement de Charolles.\r\nLe Brionnais est actuellement fédéré avec le Charolais et le Bourbonnais au sein du Pays Charolais Brionnais.\r\nDans la commune le château de Launay du XVII-XIXe siècle et le château Reptel.","architecture":"Sainte-Foy;     Château de Launay, reconstruit XIXème siècle : dépendances de l'ancien château XVIIe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"","gps":"","images":["../image/image_71/71_Ste_Foy_Pagus_1.jpg","../image/image_71/71_Ste_Foy_Pagus_2.jpg"]},"Consult_chateau_formulaire088f":{"id":"Consult_chateau_formulaire088f","dept":"71","canton":"Epinac","commune":"Sully","nom":"Sully","type":"Château","periode":"XVI","histoire":"SULLY, le fief de la seigneurie de Sully cité en 1190 qui s'éteindra au XIIIe siècle, le domaine passe aux de Couches et par alliance aux Montaigu issus  d'une branche cadette de la maison ducale de Bourgogne Claude de Montaigu dernier du nom fut tué en 1470 laissant une fille naturelle Jeanne de Montaigu héritière épousa en 1461 Hugues de Rabutin seigneur d'Epiry qui  fit passer le domaine à cette famille  qui le conservera  jusqu'en 1515,  vendu à Jean de Saulx, époux de Marguerite de Tavannes. Leur  fils  Gaspard de Saulx-Tavannes maréchal de France entreprend la reconstruction du château jusqu'à sa mort en 1573  les travaux  seront poursuivis par sa veuve, Françoise de la Baume de Montrevel, le château restera dans cette famille jusqu'à son acquisition en 1716 par Pierre de Morey seigneur de Vianges et par alliance de la veuve de Jean-Baptiste de Morey, Charlotte Le Belin avec un médecin d'Autun  Jean-Baptiste Mac-Mahon d'Eguilly, Sully passe en 1748 à cette famille  qui échouera par héritage à un frère du maréchal  qui fut président de la République (1873-1879) toujours dans cette famille du marquis de Mac-Mahon duc de Magenta.                            Dans la commune le château du Hauts-Puits et le donjon de Grône.","architecture":"Sully, reconstruction de ce château en 1570 sur des bases médiévales, le \"Fontainebleau de Bourgogne\" vaste cour entourée de corps de logis et bordé de douves alimentées par l'eau de la Drée, grand quadrilatère avec pavillon central en saillie à deux niveaux avec attiques, flanqué de quatre tours implantées  légèrement en biais, avec toits à lanternons, façade d'arrivée à deux niveaux avec attiques présente un avant-corps central en saillie avec fronton triangulaire du XVIIIe siècle avec escalier monumental et sur le corps de logis donnant sur cour sur base animée de bossages et petites fenêtres à meneaux à l'étage grandes fenêtres à meneaux entourées de pilastres ioniques.","habitants":"Famille de Gaspard de Saulx-Tavannes \r\n        \"","divers":"Château de Sully","gps":"","images":["../image/image_71/71_Sully_1.jpg","../image/image_71/71_Sully_2.jpg","../image/image_71/71_Sully_3.jpg","../image/image_71/71_Sully_4.jpg","../image/image_71/71_Sully_5.jpg","../image/image_71/71_Sully_6.jpg","../image/image_71/71_Sully_7.jpg","../image/image_71/71_Sully_8.jpg"]},"Consult_chateau_formulairea9ac":{"id":"Consult_chateau_formulairea9ac","dept":"71","canton":"Chalon-sur-Saône","commune":"St-Rémy","nom":"Taisey","type":"Château","periode":"XVII","histoire":"TAISEY, l'existence d'une maison forte est attestée en 1276, le propriétaire était Gaudin de Taisey. Puis le fief est allé dans la famille de Montfaucon et par alliance aux Saint-Clément, jusqu'en 1646, date de sa mise en vente. Il a connu divers propriétaires successifs. En 1595, le château a accueilli les représentants de Mayenne et d'Henri\r\nIV qu'ils ont signés une trêve préliminaire au traité de Folembray.    En 1646, aux Saint-Clément, succède Philippe Bataille, capitaine major de Chalon. La terre est revendue en 1682, à Guillaume Magnien, secrétaire du roi, fils d'un avocat chalonnais. De 1685 à 1690, Guillaume fait bâtir, à côté de l'ancienne forteresse, \"une demeure\" la\r\nréalisation des plans est confiée à l'architecte Convers, et la construction à Marcellin-Martin Lenoir, et de Chalon à partir de 1692. A la mort de Guillaume Magnien, le domaine échoit à ses neveux et ensuite à leurs héritiers les Burgat. La propriété appartient successivement aux familles Meulien et Renaudin au XIXe siècle, puis au XXe, le château appartient au Colonel Mourey.","architecture":"Taisey à St-Rémy, de la maison forte primitive, il ne subsiste qu'une tour carrée, percée au premier étage d'une porte en plein cintre que surmontent les deux rainures d'un pont-levis.\r\nLe château du XVIIe siècle, édifié sur un niveau de soubassement percé de baies en arc segmentaire au-dessus desquelles règne un cordon, comprend un corps principal de plan rectangulaire allongé entre deux ailes en retour d'équerre sur ses deux façades. L'avant corps central, dont la porte est desservie par un escalier en fer à cheval, comporte un étage éclairé par une haute fenêtre passante en plein cintre. Ses angles sont adoucis par des pans concaves en bossages en tables, motif qui se répète aux angles intérieurs des ailes, les angles extérieurs étant soulignés par de simples chaînages. Les grandes fenêtres sont surmontées de tables rectangulaires. Les combles, couverts de toits brisés, certainement remanié au XIXe siècle, sont éclairés par des ils-de-buf et, sur les façades latérales, par des lucarnes à frontons cintrés, tandis que de grands frontons percés d'oculus couronnent les façades des ailes, dans l'aile occidentale, subsiste un escalier tournant en bois à deux noyaux.","habitants":"Famille de Guillaume Magnien\r\n        \"","divers":"Château de Taisey","gps":"","images":["../image/image_71/71_Taisey_1.jpg","../image/image_71/71_Taisey_2.jpg"]},"Consult_chateau_formulaire2a63":{"id":"Consult_chateau_formulaire2a63","dept":"71","canton":"Autun","commune":"Tavernay","nom":"Tavernay","type":"Château","periode":"XVII","histoire":"TAVERNAY, bâti en bordure du Ternin, le bourg de Tavernay a pris la place d'un important habitat gallo-romain. En 1311, Agnès de Magny, vend à Varolles des biens au profit de l'Abbaye de Saint-Martin d'Autun.                                                                \r\n Château de Mourcoux ou Marcoux du XVIIe siècle construit sur l'emplacement d'une maison forte par  monsieur Martille.                                                                                    Le château de Varolles construit sur une maison forte  attestée au XIIIe siècle.                                                                     \r\nChâteau des Panneaux construit sur une maison forte du XIIIe siècle, château  de Chambois du XVIIe siècle, de Morcoux  et  de  Comaille du XVIIIe siècle.","architecture":"Dans la commune de Tavernay de nombreux châteaux. Le Tavernay en longueur a deux niveaux et une tourelles en angle.      Le Marcoux de forme rectangulaire à deux niveaux avec attiques et tour carrée (donjon) et à l'opposée une tour ronde à toits pointu château XVIIe, bâti sur l'emplacement d'une antique maison forte.\r\nLa Cour de Sommant, belle maison du début du XIXe siècle, également bâtie sur fondations beaucoup plus anciennes,\r\nLes Panneaux, construction remontant probablement au XVIIe ou XVIIIe siècle, sur une maison forte attestée au XIIIe siècle.\r\nVarolles, château construit sur une maison forte du XIIIe siècle,\r\nChambois, propriété du XVIIe siècle.\r\nChâteau de  Comaille.","habitants":"Famille de Monsieur Martille\r\n        \"","divers":"Château de Tavernay, des Marcoux et de Varolles","gps":"","images":["../image/image_71/71_Tavernay_1.jpg","../image/image_71/71_Tavernay_2.jpg","../image/image_71/71_Tavernay_3.jpg","../image/image_71/71_Tavernay_4.jpg","../image/image_71/71_Tavernay_5.jpg","../image/image_71/71_Tavernay_6.jpg"]},"Consult_chateau_formulairead3f":{"id":"Consult_chateau_formulairead3f","dept":"71","canton":"St-Bonnet-de-Joux","commune":"Verosvres","nom":"Terreau_Verosvres","type":"Château","periode":"XIV","histoire":"TERREAU, la terre de Terreau du XIIIe siècle a appartenu dans un premier temps à la famille de Lespinasse au XIVe siècle, puis à Pierre Dubois d'Andelot en 1461, ensuite il est devenu la propriété de Pierre Le Roux et ses descendants l'ont gardés jusqu'au début du XVIIe siècle, c'est dans ces lieux que Marguerite Alacoque voit le jour le 22 juillet en 1647.  Il fut ravagé par Coligny reconstruit  en 1784  par le colonel Thibaud de Noblet, ce sont ces derniers qui se l'ont approprié et revendu aux Leroux et aux marquis de la Rocheliralon et vendu comme bien national à la Révolution.  Le château est passé entre les mains de multiples propriétaires, entre autre  passa à Mr Baronnat ensuite à Mr Brouiller puis au marquis de Sommière et à Mr de Péage et au cours du XIXe siècle, Jean-François Prosper de Villars (ancien avocat), qui entreprit des travaux, mais à la fin du XIXe siècle c'est son fils qui a procédé à une rénovation complète.  De nos jours, le château du Terreau est la propriété de la famille Robert.                                                          Dans la commune les ruines du château  des Pierres.","architecture":"Terreau, construit  au hameau de Hautecour au XIIIe et XIVe siècle subsistent deux tours rondes, reliées entre elles par une terrasse à balustrade, qui flanquent la façade ouest,   cerné de fossés asséchés, le château consiste en un corps de logis principal et deux ailes en retour d'équerre encadrant une cour, les bâtiments comprennent un rez de chaussée, un étage percé de baies à linteau en arc segmentaire et un étage de comble éclairé par des lucarnes à pignon découvert.","habitants":"Famille de Lespinasse\r\n        \"","divers":"Château de Terreau et des Verosvres","gps":"","images":["../image/image_71/71_Terreau_Verosvres_1.jpg","../image/image_71/71_Terreau_Verosvres_2.jpg","../image/image_71/71_Terreau_Verosvres_3.jpg","../image/image_71/71_Terreau_Verosvres_4.jpg","../image/image_71/71_Terreau_Verosvres_5.jpg","../image/image_71/71_Terreau_Verosvres_6.jpg","../image/image_71/71_Terreau_Verosvres_7.jpg","../image/image_71/71_Terreau_Verosvres_8.jpg"]},"Consult_chateau_formulaire7eaf":{"id":"Consult_chateau_formulaire7eaf","dept":"71","canton":"Buxy","commune":"Chenoves","nom":"Thil_Chenoves","type":"Château","periode":"XVI","histoire":"THIL, les du Tartre, seigneurs du lieu vers 1300, y bâtissent une maison forte.  Charles VIII, de passage en Bourgogne en 1491 et se rendant en Italie, maintient, par lettres patentes, les du Tartre dans leurs fonctions. \r\nLa maison forte en  1575 est très endommagée lors du passage des  Saxons. En 1593  Moïse de Rymon, seigneur de La Courtine succède aux du Tartre. \r\nA la mort du précédent, en 1622 ses héritiers se disputent le bien qui finit par échoir à Antoine Mercier, capitaine du château de Montcenis, avant 1661 Antoine achève la transformation du château, sans doute ébauchée par Moïse de Rymon. \r\nAprès une période confuse, en 1741 le domaine est acquis par Jacques Perrin de Cypierre, dont les descendants vont bâtir une cave voûtée, une chapelle et la terrasse sud, cette famille compte, parmi ses membres, des intendants de la généralité d'Orléans. \r\nLe château est vendu à J-B. Dumont de Sermaise en 1787, en 1793  le bien est saisi sur le précédent et divisé en plusieurs lots et à partir de 1845  après avoir été laissé à l'abandon, le château est peu à peu remembré.  Passe  en 1875 au  baron Max Bernard de La Vernette Saint-Maurice qui rachète le château et en confie la restauration à l'architecte chalonnais Changarnier Philibert Bernard de La Vernette, fils du précédent, en  1907 acquit des parcelles de terres pour y aménager un parc. En 1947 le précédent, sans héritier, cède la propriété aux Surs Dominicaines missionnaires des campagnes  et en 1973  fondation de lassociation Accueil et Partage.","architecture":"THIL à Chenoves. En 1875, le château consistait en un bâtiment de plan rectangulaire comportant un étage de comble éclairé par des lucarnes à ailerons à frontons cintrés, sous un toit à croupes, les angles nord-ouest et sud-ouest étaient flanqués de tours circulaires coiffées de toits coniques très bas. À l'est de ce corps de logis, des bâtiments hétéroclites entouraient une cour, parmi lesquels on distinguait, à l'angle nord-est, la base d'une tour, une petite tour occupait sans doute l'angle sud-est du quadrilatère.\r\nLa restauration en a fait une construction de plan carré cantonnée de tours rondes, celles-ci sont couvertes de toitures coniques très aiguës, et les logis, de hauts toits brisés en ardoise, à la base desquels on a remonté, sur une corniche en brique, en  changeant la répartition, les lucarnes du XVIIe siècle, un avant-corps de trois travées se détache au centre de la façade sud, les tours occidentales ont conservé leurs petites baies rectangulaires et des archères.","habitants":"Famille Moïse de Rymon\r\n        \"","divers":"Château de Thil,de Bouthières et de valottes","gps":"","images":["../image/image_71/71_Thil_Chenoves_1.jpg","../image/image_71/71_Thil_Chenoves_2.jpg","../image/image_71/71_Thil_Chenoves_3.jpg","../image/image_71/71_Thil_Chenoves_4.jpg","../image/image_71/71_Thil_Chenoves_5.jpg"]},"Consult_chateau_formulaire483c-2":{"id":"Consult_chateau_formulaire483c-2","dept":"71","canton":"St-Leger-sous-Beuvray","commune":"Thil-sur-Arroux","nom":"Thil_sur_Arroux","type":"Château","periode":"","histoire":"THIL-SUR-ARROUX, cette paroisse qui possède deux châteaux est l'une des plus anciennes du Morvan, elle dépendait de l'archiprêtre de Luzy et elle a été longtemps réunie à celle de Saint-Didier-sur-Arroux. Le patronage de la cure, appartenait à l'Abbaye de Saint-Martin d'Autun. En 1469, le duc de Bourgogne, Charles le Téméraire étant en guerre contre Louis XI, il ordonna le 28 mars 1469, aux habitants de la paroisse, de faire nuit et jour, guet et bonne garde.  La terre de Thil fut vendue, comme bien national à la suppression des ordres religieux.","architecture":"Le Château de Thil-sur-Arroux, bâti en 1880 recèle une statue représentant une vierge à lenfant date du XIVe siècle et associé à une fontaine, faisant l'objet d'un culte.\r\nLe Châtelet de Thil-sur-Arroux, camp retranché gallo-romain.\r\nChâteau de Souve.\r\nDans le hameau de Chevigny , Le lieu-dit Le trou du maréchal et le château de Chevigny.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Thil sur Arroux","gps":"","images":["../image/image_71/71_Thil_sur_Arroux_1.jpg","../image/image_71/71_Thil_sur_Arroux_2.jpg"]},"Consult_chateau_formulaire1c26":{"id":"Consult_chateau_formulaire1c26","dept":"71","canton":"Montcenis","commune":"Torcy","nom":"Torcy","type":"Manoir","periode":"XVI","histoire":"TORCY, au XIIIe au XVIIe siècle, le fief de Torcy appartient à une famille qui en portait le nom.  De 1615 à 1743, il passa entre les mains de divers propriétaires avant d'être acquis par le conseiller au parlement Jean Villedieu responsable, vraisemblablement, de la construction du château actuel. Les biens de Vivant Mathias Léonard Raphaël Villedieu de Torcy ayant été saisis, le château fut vendu en l'an IV à la famille Lagoutte. Ventes et partages se succédèrent au cours du XIXe siècle jusqu'à sa cession, en mai 1918, à la famille Schneider, puis à la société Creusot-Loire.","architecture":"Torcy, la construction se compose d'un logis rectangulaire couvert d'un toit à croupes en tuiles plates, au centre de chacune des façades principales, un avant-corps de trois travées est souligné par des chaînes d'angle en bossage en table et couronné d'un fronton triangulaire sculpté de motifs végétaux encadrant les armoiries des Villedieu, percé au rez-de-chaussée de baies en plein cintre, l'avant-corps sud-ouest est relié au parc à l'anglaise par un escalier en U. Des bandeaux plats règnent avec le sol à chacun des étages.\r\nLe bâtiment de la porterie, au nord-ouest, est percé d'un passage couvert d'un plafond à solives apparentes à la française.","habitants":"Famille de Jean Villedieu\r\n        \"","divers":"Château de Torcy","gps":"","images":["../image/image_71/71_Torcy_1.jpg"]},"Consult_chateau_formulaire2fea":{"id":"Consult_chateau_formulaire2fea","dept":"71","canton":"Toulon-sur-Arroux","commune":"Toulon-sur-Aroux","nom":"Toulon_Arroux","type":"Château","periode":"XV-XVII","histoire":"TOULON sur ARROUX, Nicolas de Toulon (de Tholon ou Tolon) du XIVe siècle, chancelier de Bourgogne et évêque d'Autun. Fils d'un pauvre meunier de Toulon, fit des études à Autun puis à Paris au collège d'Harcourt. Chapelain à Notre-Dame (1331) puis Chanoine (1363). Il devient conseiller au Parlement de Beaune puis Chancelier du Duc de Bourgogne (1376-1384). Nommé évêque de Coutances en 1386 puis évêque d'Autun en 1387. Il le restera jusqu'à sa mort en 1400. Il est appelé l'évêque au Geai Blanc. Enfant il aurait dit à sa mère qu'il deviendrait évêque, elle lui aurait promis un geai blanc s'il parvenait à devenir évêque sans y croire!  Il est toujours représenté avec sa mitre et l'oiseau. Une petite rue de Toulon porte toujours le nom de \"Rue du Geai Blanc\". Philibert Commerson, médecin et botaniste rapporte la Bougainvillée du Brésil. Il était né le 18 novembre 1727 à Châtillon-les-Dombes dans le département de l'Ain. Il se fixa en 1760 à Toulon sur Arroux par son mariage avec Mlle Anne-Vivante Beau. Après le décès de sa femme, il partit en 1764 pour Paris. Il fit partie de la troisième expédition de Bougainville dans les terres australes en tant que botaniste et naturaliste du Roi (Louis XV). Il est mort en mars 1773.  André Pourny, né le 30 novembre 1928 à Toulon sur Arroux. Sénateur amiral Émile Miguet, un pétrolier lancé le 12 avril 1937 à Dunkerque, à l'époque le plus grand du monde (22 000 tonnes), a porté son nom et fut coulé par un sous marin allemand, le 12 octobre 1939, dans l'Atlantique au large des Cornouailles. Une place porte son nom dans une commune près de Dunkerque\r\nLe château Giverdy de monsieur Michel de la Boissière.","architecture":"Toulon sur Arroux, est un village dans lequel on peut remarquer quelques maisons anciennes, une maison de bois avec galerie, quelques restes de l'ancien château féodal (XIIIe siècle), un pigeonnier du XVIIe siècle restauré au XIXe siècle.                             Château de Giverdy, corps de logis à deux niveaux rectangulaire du XVII, deux pavillons saillants aux extrémités.                     \r\n Château de Martenet corps de logis en L à trois niveaux et attiques flanqué en façades de deux tours rondes à toit en poivrière sur angles et tour hexagonale hors oeuvre plein cintre.             Dans la commune plusieurs châteaux   de Villers.","habitants":"Famille de Michel de la Boissière\r\n        \"","divers":"Château de Toulon sur Arroux , de Giverdy et de Martenet","gps":"","images":["../image/image_71/71_Toulon_Arroux_1.jpg","../image/image_71/71_Toulon_Arroux_2.jpg","../image/image_71/71_Toulon_Arroux_3.jpg","../image/image_71/71_Toulon_Arroux_4.jpg"]},"Consult_chateau_formulaireef63":{"id":"Consult_chateau_formulaireef63","dept":"71","canton":"Mâcon","commune":"Charnay-les-Mâcon","nom":"Tour_de_Lange","type":"Château","periode":"XVIII","histoire":"TOUR de l'Ange, le château sappela dabord La Tour de Charnay, puis La Tour du Mouton, lorsque Georges et Claude du Mouton (1471) en furent seigneurs, et enfin la Tour de Langes lorsque Jean du Mouton devint seigneur.  En 1471 à 1555  vendirent le fief  à Anne de Thenay, à sa mort  le fief passa à Marc-Hilaire du Thenay chanoine de St-Pierre qui le céda à son frère. En 1703 propriété des Chevriers de St-Mauris qui le vendirent en 1788 à Philibert Derin  et passa par alliance au Baron Buxeuil de Roujoux depuis le XIXe siècle. Le baron de Roujoux fut préfet de Saône-et-Loire de 1802 à 1814. La famille sest illustrée plus tard avec Guillaume et André de Roujoux, qui ont joué un rôle prépondérant dans la Résistance.  Aujourd'hui château viticole de Hervé Dutilleul.","architecture":"TOUR DE LANGE, le château, situé à lemplacement du château médiéval, est une construction datée du XVIIIe siècle et inspirée de larchitecture italienne. Lédifice consistait autrefois en une tour ronde imposante. De ce premier château, il ne subsiste quun colombier, situé dans les dépendances.","habitants":"Famille des Chevriers de St-Mauris\r\n        \"","divers":"Château de la Tour de Lange","gps":"","images":["../image/image_71/71_Tour_de_Lange_1.jpg","../image/image_71/71_Tour_de_Lange_2.jpg","../image/image_71/71_Tour_de_Lange_3.jpg","../image/image_71/71_Tour_de_Lange_4.jpg"]},"Consult_chateau_formulaire4aa2":{"id":"Consult_chateau_formulaire4aa2","dept":"71","canton":"Tournus","commune":"Tournus","nom":"Tournus","type":"Patrimoine","periode":"XV-XIX","histoire":"TOURNUS, ancienne garnison romaine bâtie au bord de la Saône, Tournus devint un centre religieux important grâce à l'influence de l'abbaye Saint-Philibert, chef d'uvre de l'art roman.\r\nEn 858, les Normands revinrent attaquer Déas, les moines s'enfuirent, emmenant avec eux les précieuses reliques de Saint-Philibert jusqu'à Tournus, où ils arrivèrent en 875. Certains revinrent, plus tard, réoccuper Déas, au XIe siècle, et attendirent le retour des reliques, restées alors en Bourgogne, jusqu'en 1937. Louis XI y séjourna le dimanche 14 avril 1482, en effectuant un pélerinage vers Saint-Claude.\r\nJean-Baptiste Greuze, peintre français, né à Tournus le 21 août 1725.\r\nSimone Evrard, compagne de Jean-Paul Marat, née à Tournus le 6 février 1764. Révolution française et XIXe siècle.  En prévision des états généraux de 1789, Me Ducret  curé de St André de Tournus est élu député du clergé.\r\nPendant la retraite après la guerre de Russie, les troupes napoléoniennes sont battues à Mâcon en janvier 1814 par les autrichiens malgré le soutien inattendu de trois cents Tournusiens qui se battent avec courage. Napoléon est exilé à l'île d'Elbe mais il n'oubliera pas le sacrifice des Tournusiens et décernera à son retour la Légion d'Honneur à la ville de Tournus.","architecture":"TOURNUS, des ruines féodales des Plottes, château de Trenont du XIXe siècle et le château de Saint-Autin,  grosse  tour de pigeonnier  d'un ancien château médiéval, hôtel Delaval qui s'ornent d'une échauguette du XIIIe siècle.","habitants":"Famille de Jean-Baptiste Greuze\r\n        \"","divers":"Abbaye, tour du Trésorier, château de Beaufer et de Greuze","gps":"","images":["../image/image_71/71_Tournus_1.jpg","../image/image_71/71_Tournus_2.jpg","../image/image_71/71_Tournus_3.jpg","../image/image_71/71_Tournus_4.jpg","../image/image_71/71_Tournus_5.jpg","../image/image_71/71_Tournus_6.jpg","../image/image_71/71_Tournus_7.jpg"]},"Consult_chateau_formulaired354":{"id":"Consult_chateau_formulaired354","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Toutenant","nom":"Toutenant","type":"Château","periode":"XIV","histoire":"TOUTENANT, le toponyme Toutenant est, selon C. Joannelle, d'origine burgonde. Le territoire de la commune est traversé par la voie romaine du sel, qui reliait le Verdunois aux salines du Jura. Cette voie, dite \"La Vie Gravée\", suit la limite séparant les communes de Sermesse et Toutenant. La plupart des hameaux sont des créations médiévales dont les noms évoquent la topographie , la Coutière signifiant un terrain en pente, Les Plates un terrain plat, Le Péroux un endroit pierreux sans doute dû aux vestiges de la voie romaine et la végétation. La Tuilerie est mentionnée au XVIIIe siècle par Courtépée, elle appartenait aux Gallois d'Auvillars, comte du Perroux. Sennecey-en-Bresse, centre gallo-romain du terroir de Toutenant, fut au Moyen Age un fief des seigneurs de Verdun puis une possession de la famille de Vienne et des marquis de Balincourt. La seigneurie de Sennecey comportait deux dépendances, le Borget de l'ancien français borg qui s'appliquait à une agglomération proche d'un château dont les habitants jouissaient de la protection du seigneur, et le château qui était le siège de l'ancienne seigneurie. A la Révolution, Sennecey fut le siège d'une commune rattachée à Toutenant.                      \r\n  Le Château de Gilly est une demeure cistercienne des XIVe siècle et XVIIe siècle, située sur la route des grands crus entre Dijon et Beaune, face au château du Clos Vougeot, aménagée en château-hôtel de charme.","architecture":"Toutenant,  Haut donjon.\r\nMotte du Bois de la Motte. \r\nChâteau du Perroux entouré de fossés.\r\nCure en brique XVIIIe siècle.\r\nMaisons de village et fermes de caractère bressan, toits à 4 pans, brique et colombage.","habitants":"Famille de Gallois d'Auvillars\r\n        \"","divers":"Château de Toutenant et de Gilly","gps":"","images":["../image/image_71/71_Toutenant_1.jpg","../image/image_71/71_Toutenant_2.jpg"]},"Consult_chateau_formulaire2dab":{"id":"Consult_chateau_formulaire2dab","dept":"71","canton":"Tramayes","commune":"Tramayes","nom":"Tramayes","type":"Château","periode":"XIV-XVI","histoire":"TRAMAYES; apparition de la seigneurie en 1380, constituée par Marguerite de Mailly pour Antoine-Isabeau Villion. Au milieu du XVIe siècle, Jean Bullion, puis Mathurin Bullion, parents de Claude de Bullion, acquièrent les différents élèments du fief. Mathurin Bullion obtient l'autorisation du Roi Henri IV, en 1599, de fortifier sa maison. En 1672 Claude Bullion, seigneur de Tramayes, rachète les droits des quatre foires annuelles. Puis en 1684 la terre passe à Charles de Rymon  mais ce dernier abandonne son bien à Aimé Severt en 1687. A la fin du XVIIe siècle Aimé Severt revend le château à Claude-Hippolyte de Damas, seigneur de Dompierre et Audour, dont la famille conservera la propriété jusqu'à la Révolution.\r\nEn 1807 le marquis de Mailly de Châteaurenaud, veuf d'Alexandrine de Damas d'Audour, vend le domaine à maître Antoine de la Charme, notaire de Matour, qui ne le garde que trois mois et revend la propriété en 1808, à maître Claude Bruys, notaire, maire de Tramayes, ami de Lamartine, le nouveau propriétaire entreprend la restauration du château en 1825, il comble les fossés, rase les murs d'enceinte, modifie les ouvertures et la décoration intérieure et crée un parc. Actuellement propriété de la comtesse Gersende de Sabran-Pontevès.                           Un autre château dans la commune   celui de Rolle du IVe siècle  était relais de chasse qui appartenait  en 1716 à Laurent de Fond de la Rolle conseillé au parlement des douanes. A la Révolution deux cents brigands abattirent les girouettes et mirent les fermiers à contribution.                                                                           Rolle, il existait à Tramayes, au lieu dit « La Rolle », au IVe siècle un château qui servait de rendez vous de chasse aux rois de Provence et de Bourgogne.","architecture":"TRAMAYES, la construction du XIVe siècle fortifié à la fin du XVIe siècle qui s'élevait à l'origine à l'intérieur d'une vaste enceinte rectangulaire, consiste en un corps de logis de plan rectangulaire, flanqué de trois tours carrées à 45°, d'une tour carrée plus élevée que les précédentes et d'une tourelle en surplomb.\r\nLa façade ouest est reliée au parc par un perron à balustrade. La façade orientale, précédée d'un balcon reliant les deux tours, au niveau du rez-de-chaussée, est percée en son centre d'une porte inscrite dans un encadrement en bossage vermiculé un sur deux, que couronne un fronton cintré interrompu par l'unique fente verticale d'un pont-levis disparu. Au-dessus de cette porte, subsiste les trois consoles d'une bretèche. Un bandeau règne tout autour des constructions.","habitants":"Famille d'Antoine-Isabeau Villion\r\n        \"","divers":"Château de Tramayes et de La Rolle","gps":"","images":["../image/image_71/71_Tramayes_1.jpg","../image/image_71/71_Tramayes_2.jpg","../image/image_71/71_Tramayes_3.jpg","../image/image_71/71_Tramayes_4.jpg","../image/image_71/71_Tramayes_5.jpg","../image/image_71/71_Tramayes_6.jpg","../image/image_71/71_Tramayes_7.jpg","../image/image_71/71_Tramayes_8.jpg"]},"Consult_chateau_formulaire7ff1":{"id":"Consult_chateau_formulaire7ff1","dept":"71","canton":"Mesvres","commune":"La Tagnière","nom":"Trelagues","type":"Château","periode":"XV","histoire":"TRELAGUES, famille Doyen vers 1399, Pierre Doyen, seigneur de Montcenis, de Chaumart et de La Tagnière, conseiller du duc de Bourgogne, ayant fait bâtir son donjon de Montcenis par Perrot le Limousin, Jean Syméon et Jehan de la Cahotte, maîtres d'uvre, fait sans doute aussi appel à eux pour la construction du château fort de Trélague. Un inventaire en 1614  révèle que par acte de justice, le seigneur de Trélague, Bénigne Doyen, avait décidé de fermer sa cour pour ne pas avoir à payer le droit de guet et de garde. Famille Bancherau succède aux Doyen puis à la famille Roche de La Rigodière. Camille Roche de La Rigodière en 1614  est propriétaire du domaine, il sera pilote d'avion en 1914 et fondera en 1923 la société lyonnaise de soie artificielle, de 1920 à 1926  son fils confie l'exécution de restauration à l'architecte Laffarge, de Blois et à Édouard André, paysagiste. Au XXe siècle, propriété de M. Charles de Blois                                                                     Dans la commune plusieurs châteaux dont celui de  Trélarques du XVe siècle, de Motfeurton et celui de la Buissière.","architecture":"TRELAGUES, de l'ancien château fort, il reste le donjon de plan carré, flanqué de deux tours d'angles circulaires, dont l'une abrite un escalier à vis. Le tout est agrandi d'un corps de logis à deux ailes bâti certainement au XVIe siècle, l'une des ailes prolonge au nord le donjon et l'autre, en retour d'équerre, ferme la cour d'entrée, sur leurs angles extérieurs, se dressent une tour de plan circulaire, dans leur angle interne, on découvre une tourelle polygonale dans uvre. Le donjon et les tours sont élevés de trois niveaux et couverts respectivement de hautes toitures de tuiles, quant au logis, il comprend deux niveaux, éclairés par des baies à meneaux et croisillons.","habitants":"Seigneur de Montcenis\r\n        \"","divers":"Donjon de Trélargues et château de Montfeurton","gps":"","images":["../image/image_71/71_Trelagues_1.jpg","../image/image_71/71_Trelagues_2.jpg","../image/image_71/71_Trelagues_3.jpg","../image/image_71/71_Trelagues_4.jpg","../image/image_71/71_Trelagues_5.jpg","../image/image_71/71_Trelagues_6.jpg","../image/image_71/71_Trelagues_7.jpg"]},"Consult_chateau_formulairea8c3":{"id":"Consult_chateau_formulairea8c3","dept":"71","canton":"St-Gengoux-le-National","commune":"Chapaize","nom":"Uxelles","type":"Château","periode":"XVII","histoire":"UXELLES, trois châteaux, un du XVIIIe siècle, un du XIXe siècle dans le bourg et celui d'Uxelles, Bernard Ier le Lion, seigneur de Brancion, fait bâtir en 1070 une forteresse.  Landry le Hardi, lui succède vers 1110. Puis à la première moitié du XIIe siècle, de père en fils Bernard II le Preux, lui succède, ensuite en 1147  Jocerand II  et en 1180  Henri Ier.  Josserand III,  Henri II, lui succède vers 1214.\r\nMaison de Bourgogne en 1259  son père s'étant ruiné pour suivre Louis IX en Égypte, Henri II, sans postérité, vend Uxelles au duc de Bourgogne, passa à la famille de Blanot; son fils fait don  en 1263 d'Uxelles au juriste Jean de Blanot, puis à la famille de Saint-Germain.\r\nAu début du XIVe siècle  Arthaud de Saint-Germain devient seigneur d'Uxelles par alliance avec Isabelle de Blanot, a sa mort, en 1375 passe à ses fils Arthaud et Jacques de Saint-Germain qui se le disputent âprement, tandis que le château est laissé à l'abandon.\r\nFamille Magnien en 1489 et 1490  après une série de transmissions par les femmes qui entretiènent une certaine confusion, les divers éléments de la seigneurie sont rachetés par Jean de Sercy qui agit comme prête-nom de Philibert Magnien, conseiller du roi, maître des comptes, élu du Mâconnais famille de Sercy,  passe en 1508  au profit de Jean de Sercy. Au  XVIe siècle  Jacqueline de Sercy, épouse d'Antoine de Semur, reçoit Uxelles de son frère Philippe.\r\nFamille Du Blé en 1560,  Pétrarque Du Blé, seigneur de Cormatin, en échange de Sercy, le fils, Antoine Du Blé, délaisse en  1616 Uxelles pour construire un nouveau château à Cormatin où vont désormais résider les Du Blé. la seigneurie est érigée en marquisat  en 1618. \r\net au milieu du XVIIe siècle  Louis Chalon Du Blé est marquis d'Uxelles. Au décès de Nicolas Chalon Du Blé, marquis d'Uxelles et fils, le domaine change de main en1730.\r\nFamille de La Chapelle 1812, Charles-Hippolyte, vicomte de La Chapelle, chef d'escadron de la garde royale, achète le domaine, il va restaurer une partie du logis principal et abattre les ruines de la cour extérieure et du donjon pour aménager, à leur emplacement, un jardin anglais. En 1835  conseillé par l'architecte versaillais Du Thil, Charles-Henri de La Chapelle fait tout raser et édifie une nouvelle demeure à l'emplacement de l'ancienne cour d'honneur. \r\nAu XXe siècle, propriété de Bernard  vicomte de La Chapelle.","architecture":"UXELLES a Chapaize; Le château se composait de deux enceintes. La première, dont les murailles de 2,65 mètres d'épaisseur avec chemin de ronde défendu par un parapet à créneaux , d'un fossé et d'une contrescarpe et comprenait quatre portes, la porte principale sous une tour carrée hors uvre que précédait un pont-levis, une petite porte sous une autre tour carrée beaucoup moins importante, et deux poternes ouvertes dans la courtine, des communs, reconstruits au XVIIIe siècle, étaient adossés à la muraille de part et d'autre de l'entrée principale; une chapelle dédiée à Saint Georges avait été construite dans la cour, sans doute à la fin du XIIIe siècle.\r\nLa seconde enceinte était flanquée de quatre tours et pourvue, dans sa partie orientale , de mâchicoulis découverts sans contrefort avec parapet sur arcs en plein cintre, une partie des mâchicoulis avait été supprimée au XVe siècle ou au début du XVIe siècle, lorsqu'on avait rehaussé les murs et appliqué contre eux des logis et des communs. Au nord-est, une tour carrée à cheval sur la muraille était percée au rez-de-chaussée d'une porte en plein cintre en bossage rustique, deux tours rondes étaient situées à l'est et à l'ouest, une tour rectangulaire, dite tour du Colombier, au sud-est, cette enceinte était divisée en quatre parties: une première petite cour dans laquelle s'élevait une grosse tour pentagonale de sept étages, la cour d'honneur autour de laquelle s'ordonnait des communs et, au sud, le corps de logis principal flanqué d'une tour d'escalier trapézoïdale, une cour étroite entourée de divers bâtiments que flanquait la grosse tour ronde qui passait pour être le donjon primitif à l'ouest, et enfin une terrasse au sud-ouest.\r\nTout cela a disparu pour faire place à un corps de logis de plan rectangulaire allongé entre deux ailes en retour d'équerre en légère avancée sur ses deux façades, l'avant-corps central est couronné par un fronton cintré. Dans la commune le château de Chapaize, le château du bourg XVIIIe siècle.","habitants":"Famille Magnien\r\n        \"","divers":"Château d'Uxelles et de Chapaize","gps":"","images":["../image/image_71/71_Uxelles_1.jpg","../image/image_71/71_Uxelles_2.jpg","../image/image_71/71_Uxelles_3.jpg"]},"Consult_chateau_formulaire1c90":{"id":"Consult_chateau_formulaire1c90","dept":"71","canton":"St-Pierre-de-Bresse","commune":"Varennes-sur-le-Doubs","nom":"Varennes_71","type":"Château","periode":"XV","histoire":"VARENNES, la seigneurie de Varennes-sur-le-Doubs appartenait au XIIIe siècle à la maison de Vienne, qui la vendit en 1291 aux ducs de Bourgogne, elle passa en 1543 à Elyon de Mailly, seigneur d'Arc-sur-Tille, Charette et Terrans, puis, après divers propriétaires au cours du XVIIe siècle, à Claude de Ragot, seigneur d'Epoisses. Gabrielle de Fourcy, épouse du comte de Mainville, brigadier des armées du roi, la vendit avec la châtellenie de Frontenard et la seigneurie de la Motte-Frontenard, en 1729, à Jean-François de Truchis, seigneur de Terrans, dont la famille possédait déjà des terres à Varennes depuis 1607-1610.  Depuis lors, elle est restée dans la branche aînée de cette famille.  Claude-François Charles de Truchis hérita en 1765 quitta l'armée de Condé restaura le château jusqu'en 1829, son fils William mousquetaire de la garde du roi se fixa à Varennes, son fils Stanislas né en 1857  hérita du château continua le remaniement. La famille de Truchis possède également le château de Terrans et de Lays sur le Doubs, La chanteuse Zazie est issue de la famille de Truchis de Varenne (Isabelle) Transformé en hôtel restaurant.","architecture":"Varennes, du château féodal,  rare en Bourgogne, était protégé par une triple enceinte de fossés particulièrement étendus, une tour encore mentionnée par Claude Courtépée subsista jusqu'à la fin du XVIIIe siècle,  habité rarement, avait été construit non loin de l'ancien donjon, à un emplacement d'où la vue s'étend au-delà de la vallée du Doubs jusqu'aux monts de la Côte-d'Or et du Jura.                                   Il y trouva les traces caractéristiques d'une motte féodale disparue et de sa basse-cour, se trouvait également un premier château datant de 1730 dont malheureusement aucune représentation n'a été retrouvée même si les principaux éléments des bâtisses sont bien lisibles sur le plan du domaine de 1790, lequel plan est encore conservé dans les archives du château.","habitants":"Famille d'Elyon de Mailly\r\n        \"","divers":"Château de Varennes","gps":"","images":["../image/image_71/71_Varennes_1.jpg","../image/image_71/71_Varennes_2.jpg"]},"Consult_chateau_formulairef620":{"id":"Consult_chateau_formulairef620","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Ciel","nom":"Vaulvry","type":"Maison forte","periode":"XIII","histoire":"VAULVRY, la seigneurie de Vaulvry a été démembrée de celle de Verdun-sur-le-Doubs au début du XIIIe siècle au profit de Hugues, fils de Guy V de Verdun. Elle appartient à la fin du XIIIe siècle à Henri, Jean et Isabelle de Vaulvry puis passa, au XIVe siècle à la famille de Vienne, branche des seigneurs de Mirebel. A l'extinction de celle-ci elle fut partagée au début du XVe siècle entre les familles de Rye et de Rougemont. Les Rougemont conservèrent leur part jusqu'au XVIe, tandis que Jean de Rye vendait la sienne dès 1422 à Louis de Chalon, prince d'Orange. Elle fut cédée en 1465 par Guillaume de Chalon à Pierre de Goux, chancelier de Bourgogne, dont hérita Jean de Rupt. Les fils de ce dernier l'abandonnèrent en 1532 à Louise de Rochefort, veuve d'Antoine Bouton. Les Bouton réunirent entre leurs mains l'ensemble de la seigneurie, érigée en baronnie, qui échut, à la mort de Françoise Bouton, au XVIIe siècle, à ses cousins, les Thiard de Bissy. Début du XIXe siècle M. Nivière, trésorier-payeur général du Rhône, acquit Vaulvry du dernier représentant de cette famille, le général Auxonne-Théodore Thiard. Le domaine parvient ensuite entre les mains de la famille de Maistre. \r\nM. Cahuet, exploitant agricole, en est propriétaire depuis 1954. Le château, bâti au XIIIe siècle sur une motte, a été brûlée en partie par les troupes de Gallas en août 1636. Il a été reconstruit au cours de la seconde moitié du XVIIe siècle, vraisemblablement par Claude de Thiard. L'aile ouest a été détruite par un incendie en 1976.","architecture":"Vaulvry; ruines féodales et tour du XIIIe siècle. le château, bâti  sur une motte,  ferme dite château de Merley, à la fin du XVIIIe siècle est située au lieu dit , elle était peut-être la ferme d'un château disparu. En effet, elle se trouve à l'extrémité sud de l'agglomération, non loin du hameau de Merley, ancienne seigneurie acquise en 1514 par le chapitre d'Autun puis vendue, en 1640, à N. Gadagne d'Hostun qui la réunit à la baronnie de Verdun.","habitants":"Famille de Guy V de Verdun\r\n        \"","divers":"Château de Vaulvry","gps":"","images":["../image/image_71/71_Vaulvry_1.jpg"]},"Consult_chateau_formulaire50c2":{"id":"Consult_chateau_formulaire50c2","dept":"71","canton":"St-Leger-sous-Beuvray","commune":"La Grande-Verrière","nom":"Vautheau_Vouchot","type":"Château","periode":"XV-XVII","histoire":"VOUCHOT, Garnier du Vouchot, est une ancienne famille de Bourgogne, qui remonte à Jehan Garnier seigneur du Vouchot vivant en 1486, et un Jean Garnier du Vouchot, seigneur de Glennes en 1470. Jean Garnier châtelain de Glaine et son épouse Pierrette Simonot, début du XVIe siècle.\r\nJean II Garnier, notaire et praticien d'Autun, seigneur de Vouchot 1584  Philibert Garnier, noble écuyer, seigneur du Vouchot  teste en 1607, Jean III Garnier fils de Philibert, époux de Charlotte de Grand Jacques François de l'Etouffe, comte de Pradines, seigneur de Valorges et son épouse Charlotte Garnier du Vouchot  vend en 1680 à Sébastien de Lagoutte et Françoise de Chevigny.\r\nClaude de Lagoutte, fils de Sébastien et seigneur du Vouchot, Claude II de Lagoutte, seigneur du Vivier, et du Vouchot, neveu, et fils d'Antoine de Lagoutte, décédé sans postérité 1720.\r\nCharles-Jean de Lagoutte, écuyer, Sébastien-Marie de Lagoutte, fils de Charles Jean, époux de Marguerite-Charlotte de Girval. Jean-Charles Hubert de Lagoutte, propriétaire du Vivier. François-Xavier de Lagoutte, Lieutenant-colonel, propriétaire en 1866.           VAUTHEAU; La seigneurie est ancienne, Guy de Vautheau en est seigneur au début du XIIIe siècle. Après avoir été partagé entre trois seigneurs, Vautheau est possédé en totalité en 1375 par le duc de Bourgogne qui fait aussitôt réparer la maison forte. Par alliance, celle-ci passe en 1456 à la famille de Choiseul de Traves qui la conserve jusqu'à la vente faite en 1728 à Pierre de Maizière. Louis Thomas de La Vesvre, chevalier de Saint-Louis, fut seigneur de Vautheau en 1760, puis la seigneurie passa en 1866 au comte d'Esterno.","architecture":"Château du Vouchot, près de l'église, au Nord, avec deux tours hexagones sur la façade et deux rondes détachées, connu sous le nom de Château de Vouchot ou Château de Verrière. Son portail est inscrit au titre des Monuments historiques, cette forteresse de plaine à plates-formes quadrangulaires, du XIIe siècle, modifiée au XVe siècle, transformé en château moderne au XVIIIe siècle, logis rectangulaire avec ses deux tours hexagonales en façade arrière et deux tours rondes, détachées de l'ancien château, qui apparaît encore sur l'ancien plan cadastral, au Nord du logis actuel. Avec des traces d'une terrasse le long de la route départementale 3, côté Est, la basse cour. Situé au finage de La Grande-Verrière, au nord de l'église, fait l'objet d'une inscription partielle au titre des Monuments historiques pour son portail Louis XIII, depuis le 27 septembre 1995. Vautheau, ancienne maison forte est en ruine, et son accès est périlleux. Au milieu des arbres et du taillis qui l'ont envahi, on distingue les fossés ainsi que des pans de murs de l'enceinte et d'une tour carrée. Seule reste debout la haute tourelle d'escalier qui flanquait cette tour: sa porte est surmontée d'une accolade qui renferme un écusson.                                             La grande Verrière; Château de Savilly, possession de la famille Desplaces de Charmasse  Le château, perché sur une colline, se trouve dans un domaine de 6 hectares, entouré des vieux arbres    Château de Bouton, en 1670, à Charlotte de Gorris, veuve de Philibert de Lagoutte, reconstruit en 1832.\r\nAncien Manoir, dans le Bourg\r\nChâteau de Glaine, dit Château des Roches de Glenne.","habitants":"Famille de Lagoutte \r\n        \"","divers":"Château de Vautheau de Vouchot de Boisseau de Bouton et de Monthelon","gps":"","images":["../image/image_71/71_Vautheau_Vouchot_1.jpg","../image/image_71/71_Vautheau_Vouchot_2.jpg","../image/image_71/71_Vautheau_Vouchot_3.jpg","../image/image_71/71_Vautheau_Vouchot_4.jpg","../image/image_71/71_Vautheau_Vouchot_5.jpg","../image/image_71/71_Vautheau_Vouchot_6.jpg","../image/image_71/71_Vautheau_Vouchot_7.jpg","../image/image_71/71_Vautheau_Vouchot_8.jpg","../image/image_71/71_Vautheau_Vouchot_9.jpg"]},"Consult_chateau_formulairee1c3-2":{"id":"Consult_chateau_formulairee1c3-2","dept":"71","canton":"Lugny","commune":"Azé","nom":"Vaux_Aze","type":"Château","periode":"XVII","histoire":"VAUX sur AINE dit aussi de  \"Vaux et de Aine\", première moitié du XVIe siècle, Jean de Verrey est seigneur du lieu, ayant organisé un complot contre Charles Quint, il sera abandonné par ses partisans et mourra dans le Charolais. \r\nGilbert Regnaud, 1560 et 1561 juge de Cluny, acquiert une maison noble, de deux propriétaires différents, l'acquisition précédente est mentionnée en  1583 dans un dénombrement. Calvinistes convaincus, les Regnaud se retirent  vers 1600 en Bresse après avoir vendu le bien à V
