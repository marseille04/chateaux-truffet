ps de logis central  à deux niveaux en forme de U deux ailes en retour  munis aux angles  de pavillons carrés légèrement déportés à trois niveaux, l'ensemble avec attiques percés de lucarnes à fronton triangulaires, la façade  avant corps légèrement en sailli avec escalier à double révolution, côté parc, balcon sur piliers sur bâtiment central  portique à deux étages de colonnes axé depuis le XIXe siècle et  jardin à la française flanquée sur les côtés de dépendances.","habitants":"Famille de Charles de Blanquefort de Créqui \r\n        \"","divers":"Château de la Drée","gps":"","images":["../image/image_71/71_Dree_Curbigny_1.jpg","../image/image_71/71_Dree_Curbigny_2.jpg","../image/image_71/71_Dree_Curbigny_3.jpg","../image/image_71/71_Dree_Curbigny_4.jpg","../image/image_71/71_Dree_Curbigny_5.jpg","../image/image_71/71_Dree_Curbigny_6.jpg","../image/image_71/71_Dree_Curbigny_7.jpg"]},"Consult_chateau_formulairecb00":{"id":"Consult_chateau_formulairecb00","dept":"71","canton":"Montpont-en-Bresse","commune":"Montpont-en-Bresse","nom":"Durtal_Montpont","type":"Château","periode":"XVIII","histoire":"DURTAL, du XIVe siècle au XVIe siècle, le fief  de Durtal, sur lequel se trouve une maison forte, est tenu par les seigneurs de Durtal. Propriété en 1673 d'Alexandre de Périeux du Crozet. \r\nLa demeure échoit en  1755  au petit-fils et à la sur d de la descendance des Périeux, François-Florimond du Crozet et Mme de Lassale, cette dernière parvient à conserver pendant l'époque révolutionnaire, le château durant l'émigration de son neveu, à qui elle finit par le léguer. La construction en 1825 menaçant de  ruine, celui-ci la fait en partie raser.  A la mort du précédent en 1830, la propriété revient à sa fille, Marie-Françoise du Crozet, épouse d'Alphonse de Chamouroux. Les enfants des précédents vendent le bien en 1864, une partie est depuis utilisé comme ferme. Le château de Durtal est en cours de rénovation en 2010. Il a été depuis lors totalement utilisé comme ferme.","architecture":"DURTAL, du château du XIVe siècle, perché sur une motte féodale, cantonné de tours carrées et précédé d'une double enceinte avec fossés et pont-levis, il ne subsiste qu'une partie des douves et une grosse tour d'angle en brique, très bien appareillée, que couronnent des mâchicoulis couverts sur consoles, la tour accolée à  un corps de logis rectangulaire du (XVIe siècle), des communs en  brique entourent la cour, corps de logis classique, haut de deux étages, éclairé par deux rangs de fenêtres rectangulaires à linteau supérieur en bois, que sépare un cordon saillant de pierre, deux lucarnes sont ménagées à la base de la toiture, à l'est, ce bâtiment est prolongé, vers l'ouest, par une habitation de type bressan, plus basse, dont un auvent protège la façade principale et l'escalier  extérieur, parallèle, qui donne accès au rez-de-chaussée surélevé.","habitants":"famille d'Alexandre de Périeux du Crozet\r\n        \"","divers":"Château de Durtal","gps":"","images":["../image/image_71/71_Durtal_Montpont_1.jpg","../image/image_71/71_Durtal_Montpont_2.jpg","../image/image_71/71_Durtal_Montpont_3.jpg","../image/image_71/71_Durtal_Montpont_4.jpg"]},"Consult_chateau_formulaire2cb0":{"id":"Consult_chateau_formulaire2cb0","dept":"71","canton":"La Clayette","commune":"Dyo","nom":"Dyo","type":"Vestiges","periode":"XV","histoire":"DYO, le premier qui fut qualifié Sire de Bourbon est Aimard, qui descendait des anciens comtes Palationd de Bourgogne, il vivait sous Charles le Simple, et jeta, en l'année 921, les fondations de la célèbre abbaye de Sonvigny en Bourbonnais, il eut deux fils, Girard et Archambaud ( Archimbaldus ), deuxième du nom  Ancel ou Anceau, fils aîné de ce dernier, fut seigneur de Bourbon-Lancy, auquel il donna son nom, son frère  fut sire de Bourbon-l'Archambaud, le dixième du nom, mourut en Chypre en 1249, il fut le dernier de ce nom, il ne laissa que deux filles, dont l'une, Agnès de Bourgogne, épousa Jean de Bourgogne, comte de Charollais, fils de Hugues IV, duc de Bourgogne. Béatrix de Bourgogne, leur fille, épousa, en 1271, Robert de France, comte de Clermont en Beauvoisis, quatrième fils de saint Louis. Elle fut, disent les historiens, d'une si rare beauté, qu'elle fit naître chez ce prince une violente passion, car il l'épousa contre le gré du roi.\r\n L'occupation du site paraît remonter à l'époque carolingienne.\r\nA la fin du XIe siècle, le fief appartient à la maison de Dyo, par alliance en 1336 de Guyot de Dyo avec Alix Palatin, les Dyo ajoutent à leur patronyme celui de Palatin. \r\n Au milieu du XVIIe siècle, par alliance, Marie-Élisabeth Palatin de Dyo apporte la seigneurie à Louis-Antoine-Hérard  Damas d'Anlezy.  Marie-Angélique de Gassion, veuve de Louis Damas d'Anlezy, en est propriétaire en 1789. \r\nAu XVIIIe siècle, le château tombe en ruines.","architecture":"Dyo, de l'ancien château, déjà ruiné au XVIIIe siècle, il ne reste qu'une partie de l'enceinte qui l'entourait avec les bases des trois tours circulaires qui flanquaient la courtine,  la vaste enceinte ovale qui  entouré autrefois l'ensemble du sommet de la butte, il ne reste aujourd'hui que des pans de la partie méridionale, qui fut peut-être le château proprement dit, à l'ouest se dresse une haute tour-porche de plan presque carré, percée de rares ouvertures et qui paraît avoir été bâtie au XIIIe siècle. Des maisons d'habitation et des granges, certaines étant fondées sur les bases des murailles, ainsi que des potagers occupent l'enceinte.","habitants":"seigneur de Bourbon-Lanc\r\n        \"","divers":"Le château de Dyo et ses vestiges","gps":"","images":["../image/image_71/71_Dyo_1.jpg","../image/image_71/71_Dyo_2.jpg","../image/image_71/71_Dyo_3.jpg","../image/image_71/71_Dyo_4.jpg","../image/image_71/71_Dyo_5.jpg"]},"Consult_chateau_formulaire1587":{"id":"Consult_chateau_formulaire1587","dept":"71","canton":"Sennecey-le-Grand","commune":"Grigny-sur-Saône","nom":"Eperviere","type":"Château","periode":"XVIII","histoire":"EPERVIERE, du XIIIe siècle au XVIIIe siècle, plusieurs châteaux se succèdent en des points différents d'un même enclos. \r\nAu moment de l'acquisition en 1788  de la propriété par le baron François Julien Geramb, magnat de Hongrie et ancien ministre de l'empereur Joseph II, il ne reste que des ruines. \r\nPendant la période révolutionnaire une nouvelle demeure est bâtie par le baron, mais elle est pillée et très vite laissée à l'abandon, les dames de Geramb, mère et fille, sont emprisonnées à Chalon mais reviennent peu après à Gigny sur Saône. Restauration en 1830 par Arnoud de Joux de Ronfaud. Nouvelle restauration en 1966, entreprise par la famille Gay.","architecture":"Grigny sur Saône, motte féodale du XIVe siècle.\r\nLa construction d' Epervière se compose d'un corps principal et de deux ailes en retour d'équerre vers le nord, encadrant une cour close par un parapet de pierre interrompu en son centre par une porte cochère, laquelle donne accès à un pont de pierre jeté sur le fossé qui subsiste sur ce côté et le long de l'aile Est.  Un avant-corps d'une travée, couronné d'un attique, se détache en légère avancée au centre de la façade Est, la façade sud-est très différente, son centre s'arrondit en un avant-corps semi-circulaire. Les ailes abritent remises et greniers.\r\nUne vaste pièce d'eau s'étend au sud dans un parc boisé.","habitants":"Famille du baron François-Julien Geramb\r\n        \"","divers":"Château de l'Epervière","gps":"","images":["../image/image_71/71_Eperviere_1.jpg","../image/image_71/71_Eperviere_2.jpg","../image/image_71/71_Eperviere_3.jpg","../image/image_71/71_Eperviere_4.jpg"]},"Consult_chateau_formulaire7b7d":{"id":"Consult_chateau_formulaire7b7d","dept":"71","canton":"Epinac","commune":"Epinac","nom":"Epinac","type":"Château","periode":"XV","histoire":"EPINAC, première mention en 1209 de la seigneurie dont l'ancien nom était Monétoy. Château d'Épinac anciennement  Château de Monestoy.  Le dernier de la lignée en 1396, Hugues de Monétoy, périt à Nicopolis. Pierre de Bauffremont vend en 1430 la terre à Nicolas Rolin,  chancelier du duc Philippe le Bon, qui fait exécuter  d'importantes reconstructions et sa descendance  va rester possesseur du château. Louis II de Pernes fait substituer en 1656, par lettres patentes, le nom d' Épinac à celui de Monétoy. \r\nLe maréchal Gaspard de Clermont-Tonnerre, seigneur d' Épinac, en 1734 fait les premières recherches de houille, qui vont amener à l'établissement d'une verrerie. \r\n En 1794 le fils de Gaspard,  Jules Charles Henri de Clermont-Tonnerre est guillotiné; les domaines sont confisqués, démembrés et vendus et quelque temps après.  Samuel Blum, ayant acquit  et entrepris de développer l'industrie d'Épinac, arrête la destruction. \r\nAu XXe siècle: le château, morcelé en plusieurs habitations et assez délabré, est restauré.","architecture":"Épinac, enceinte polygonale, château perché de Monetoy du XVe siècle et tour de Malakoff.\r\nDu château de Nicolas Rolin, il reste deux corps de logis et deux des quatre tours, les corps de logis, dont les combles sont très élevés, forment entre eux un angle sur lequel saillie une échauguette, au nord-ouest, le logis se termine par une massive tour carrée en pierres, haute de quatre étages, au sud-est, une tour carrée, plantée de biais, accolée à  la construction, elle devait servir d'entrée et commander le pont-levis, la tourelle polygonale contient un escalier, les fossés n'existent plus, mais, au-delà des terrasses et jardins, subsiste une partie de la vaste enceinte polygonale.","habitants":"Maréchal Gaspard de Clermont-Tonnerre\r\n        \"","divers":"Château d'Epinac et la villa du Fretoy","gps":"","images":["../image/image_71/71_Epinac_1.jpg","../image/image_71/71_Epinac_2.jpg","../image/image_71/71_Epinac_3.jpg","../image/image_71/71_Epinac_4.jpg","../image/image_71/71_Epinac_5.jpg","../image/image_71/71_Epinac_6.jpg","../image/image_71/71_Epinac_7.jpg"]},"Consult_chateau_formulaire1c8f-2":{"id":"Consult_chateau_formulaire1c8f-2","dept":"71","canton":"Couches","commune":"St-Emiland","nom":"Epiry","type":"Château","periode":"XV","histoire":"EPIRY, cité dès le XIIe siècle, fief détenu par les seigneurs d'Épiry, apparentés aux seigneurs de Montbard et à la famille de Saint-Bernard de Clairvaux passe  à partir du XIVe siècle aux Rabutin, Jean de Rabutin seigneur d'Epiry. En 1618  naissance au château du gentilhomme satirique Roger de Rabutin, écrivain (Histoire amoureuse des Gaules) cousin de Mme de Sévigné  comte de Bussy et en 1648  la veuve de François de Rabutin, grand-père de Roger, vend la propriété au comte de la Madeleine de Ragny.  Charles Vernier sera le dernier seigneur d'Epiry vendu comme bien national à la Révolution  racheté par ses anciens propriétaires en 1800, et revendu en 1824  aux Antoine Carrelet de Loisy, ancien président au parlement de Bourgogne et vice président de la  chambre des députés sous la Restauration.","architecture":"EPIRY St-Emiland, le château a conservé de l'époque médiévale quatre tours rondes du XIIe siècle,  coiffées de toits  coniques et percé de rare fenêtres  à meneaux  du XVe siècle et un corps de logis qui indique le plan polygonal de l'ancien château fort ordonné autour de la cour, le mur qui, à l'origine, fermait cette cour, a été remplacé par une grille, encadrée de deux lions de pierre, à laquelle on accède par un pont qui franchit les douves encore visibles, la tour Nord Ouest a conservé trois bretèches en pierre soigneusement appareillées, réparties les unes par rapport aux autres de façon à dominer l'angle d'entrée du château, la tour sud-est renferme la chapelle du XVe siècle, ornée d'une piscine à décor flamboyant et de vitraux anciens et où a été baptisé Roger de Rabutin, en 1717 construction d'un corps de logis qui occupe, entre les deux tours, le côté nord de la cour. La façade extérieure est assez austère, celle de la cour est plus ornée.\r\nVers l'Est, un important corps de logis ferme la cour, face à l'entrée, la date de sa construction est inscrite au tympan de la porte \"1717\" La partie centrale, marquée de toute sa hauteur par des refends, est couronnée d'un fronton triangulaire percé d'un oculus, vers le parc, ce corps de logis offre une large façade de même caractère qui se développe au-delà des tours médiévales, la partie centrale est surmontée d'un fronton triangulaire, il se termine aux extrémités par deux avant-corps peu saillants, dont les angles sont soulignés par des refends.","habitants":"Famille de Jean de Rabutin \r\n        \"","divers":"Château d'Epiry","gps":"","images":["../image/image_71/71_Epiry_1.jpg","../image/image_71/71_Epiry_2.jpg","../image/image_71/71_Epiry_3.jpg","../image/image_71/71_Epiry_4.jpg"]},"Consult_chateau_formulaired677":{"id":"Consult_chateau_formulaired677","dept":"71","canton":"Mâcon","commune":"Verze","nom":"Escolle_Verze","type":"Château","periode":"XIV","histoire":"ESCOLLE, la seigneurie est citée dès le XIe siècle et en 1366 a appartenu aux Chevrier. Le château d'Escolle du  XIVe siècle qui fut pris par les Armagnacs en 1421, puis brûlé par les Huguenots au cours des guerres de religion. En 1522 il a appartenu à Hector de Primbois, puis en 1531 à Etienne Fustailler et , en 1560 à Charles Busseuil, avant d'être adjugé par décret en 1620 à Abraham Vallier.  Le château qui consistait en une maison basse, en fort mauvais état. Abraham-Thomas Vallier (fils du précédent) a entreprit la reconstruction de la maison forte en 1671. Malheureusement, il y mourut en 1676, victime d'une chute de pierre et les travaux ne furent jamais achevé. Puis le château d'Escole est passé entre les mains de différents propriétaires, en 1791 à Brice Barjot de la Combe, puis en 1809 à Pierre-Marie Chapuys de Maubou.                                                                        Dans la commune le château de Vaux.","architecture":"Escolle, château du XIV-XVIIIe siècle avec tour à mâchicoulis. Le château qui consistait en une maison basse, colombier, prison et dépendance, reconstruction de la maison forte en 1671 jamais terminé.","habitants":"Famille d'Abraham Vallier\r\n        \"","divers":"Château d'Escolle et de Vaux","gps":"","images":["../image/image_71/71_Escolle_Verze_1.jpg","../image/image_71/71_Escolle_Verze_2.jpg","../image/image_71/71_Escolle_Verze_3.jpg","../image/image_71/71_Escolle_Verze_4.jpg","../image/image_71/71_Escolle_Verze_5.jpg","../image/image_71/71_Escolle_Verze_6.jpg"]},"Consult_chateau_formulaire1d47":{"id":"Consult_chateau_formulaire1d47","dept":"71","canton":"Mâcon","commune":"Bussières","nom":"Eserteaux","type":"Château","periode":"XV","histoire":"ESSERTEAUX, il y avait aux Esserteaux, en 1368, une tour entourée de murailles, elle était tenue par un dénommé Bechet. En 1423, Etienne de Franc, garde de la porte de La Barre à Mâcon, l'acheta avec la dot de sa  femme, Jeanne de Lugny. Les de Franc conservèrent les Esserteaux jusqu'en 1677, date à laquelle le fief fut vendu aux Noblet d'Anglure qui en furent propriétaires jusqu'à la Révolution. Dévasté en juillet 1789, il fut  mis en vente à diverses reprises et enfin acquis en 1842 par le docteur Philibert dont descend le propriétaire actuel. \r\nDans la commune le château de BUSSIERES, sur les contreforts de la \"Vieille-Montagne\" propriété de monsieur Epinat.","architecture":"ESSERTEAUX à Bussières, construit sur l'emplacement d'un important site romain le château couronné de vieilles tuiles et de lauzes de châtaignier sur certaines tourelles qui possède un bel escalier,  c'est un bâtiment de plan rectangulaire formé de quatre corps entourant une cour, trois des angles extérieurs sont flanqués de tours rondes aveugles à bases légèrement taluté, pourvues de meurtrières du XIIIe siècle. Les vestiges d'une construction carrée, qui fut peut-être un donjon, occupent l'angle Sud-Ouest, le portail d'entrée s'ouvre au milieu du flanc oriental, il est constitué d'une porte charretière accostée d'une porte piétonne, au-dessus de chacune d'elles, règne une frise sculptée de trophées, de combats, de pièces d'équipement militaire et de feuilles d'acanthe, ce décor est complété par un cartouche aux armes des de Franc et des Lugny, ce qui autorise à dater l'ensemble de 1570 environ, à l'exception du tinailler, à droite du portail, les bâtiments qui entourent la cour ont subi au XIXe siècle d'importants remaniements.\r\nAu-delà du flanc Nord, s'allonge une terrasse, portant un jardin à la française, dont les angles Nord sont occupés par deux petites charmilles, de part et d'autre d'un escalier à double volée à montées convergentes.","habitants":"Famille des Le Franc\r\n        \"","divers":"Château d'Esserteaux","gps":"","images":["../image/image_71/71_Eserteaux_1.jpg","../image/image_71/71_Eserteaux_2.jpg","../image/image_71/71_Eserteaux_3.jpg","../image/image_71/71_Eserteaux_4.jpg","../image/image_71/71_Eserteaux_5.jpg"]},"Consult_chateau_formulaire8779":{"id":"Consult_chateau_formulaire8779","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"Créche-sur-Saône","nom":"Estours","type":"Château","periode":"XIV","histoire":"ESTOURS, deux châteaux dans la commune de Crèche, Estours du XIVe siècle, les premiers seigneurs connus sont Duran et Renaud de Feurs, d'origine lyonnaise. Entre 1437 et 1443, malgré l'établissement par les Maconais d'une garnison de douze hommes,  les milices Maconaises pillent  en 1479 et brûlent la place pour se venger d'une reddition aux troupes royales qu'ils jugent trop hâtive. Les descendants de Renaud de Feurs  en 1561 conservent le fief.  Après François de Nanton en 1609 époux de Philiberte de Feurs, la seigneurie passe à Charles Damas. \r\nAu XVIIe siècle, le domaine échoit à des fermiers qui le laissent à l'abandon. Puis en 1713  acquisition par Louis Durret. En 1725  à la demande du précédent, des réparations et des transformations sont effectuées par Michel-Ange Caristie, architecte lyonnais. \r\nEn 1827  mort du propriétaire Louis Charrier de La Roche, alors évêque de Versailles. En 1842  le château est vendu par les héritiers à Emile Devienne en 1845  qui ce dernier fait démolir l'aile sud, faisant ainsi disparaître les traces d'une ancienne entrée depuis longtemps obstruée et la chapelle attestée dès le XVIe siècle. \r\nEn 1974: restauration entreprise par M. Mélinand.                             \r\nTHOIRAT; Le fief de Thoirat à Créches était passée, depuis le IXe siècle, aux mains de multiples seigneurs lorsqu'elle parvint, en 1749, à Antoine-Alexandre de Thy, époux de Christine de La Fage, c'est leur fils, Philibert-Joseph de Thy, qui fit construire, à partir de 1779, un nouveau château à côté de la modeste maison forte médiévale, en fort mauvais état, dont les deux tourelles devaient être en partie démantelées en 1794, prélude à sa définitive disparition. Le nouveau château, dont la construction est parfois attribuée à J-P Caristie, fut achevé avant 1787. En 1794, il fut saisi et vendu à Philibert Vacher, un artisan, qui le céda peu après à Jean Pierre Canard dont descend le propriétaire actuel.","architecture":"ESTOURS, le château occupe un quadrilatère irrégulier cerné de douves en eau, seules subsistent les ailes nord et ouest, l'aile nord est flanquée aux deux extrémités de sa façade donnant sur les douves, les tours carrées demi-hors uvre plus élevées d'un demi-étage, la porte charretière, précédée d'un pont de pierre, s'ouvre sous la tour nord, le passage auquel elle donne accès débouche dans la cour à côté d'une tour hexagonale adossée à la façade sud du logis, l'aile ouest est composée de deux bâtiments implantés dans le prolongement l'un de l'autre, un gros bâtiment rectangulaire à un étage carré, construit vraisemblablement au XVe siècle sur des bases plus anciennes et remanié au cours des siècles suivants, et dont l'un des angles extérieurs est défendu par une échauguette circulaire récemment restaurée, un bâtiment plus étroit, dont le rez-de-chaussée abrite des communs. À l'extrémité sud de cette aile se dresse une grosse tour ronde qui fut peut-être le donjon primitif et dont les murs ont 1,40 mètre à la base, dans l'angle formé par les deux ailes se trouve une haute tour d'escalier hexagonale.\r\nTHOIRAT; Le château consiste en un corps de logis rectangulaire couvert d'un toit à croupes et flanqué à ses extrémités de deux ailes en retour d'équerre en légère avancée sur ses deux façades, au centre de chacune des façades, un avant-corps d'une travée est couronné d'un fronton, sculpté d'un cartouche aux armes des Thy. Le seul autre élément décoratif de cet ensemble austère est le balcon de pierre sur consoles sur lequel donne, au premier étage, une porte-fenêtre. Parmi les communs, assez disparates, se trouve un long bâtiment couvert d'un toit brisé percé de lucarnes à ailerons.","habitants":"Famille de Renaud de Feurs\r\n        \"","divers":"Château d'Estours et de Thoriat","gps":"","images":["../image/image_71/71_Estours_1.jpg","../image/image_71/71_Estours_2.jpg","../image/image_71/71_Estours_3.jpg","../image/image_71/71_Estours_4.jpg","../image/image_71/71_Estours_5.jpg"]},"Consult_chateau_formulaire0b88":{"id":"Consult_chateau_formulaire0b88","dept":"71","canton":"St-Leger","commune":"Etang-sur-Arroux","nom":"Etang_sur_Arroux","type":"Château","periode":"XV-XVI","histoire":"ETANG-sur-ARROUX, au XIIe siècle était le fief de la famille des de \"l'Estang\" qui possédait un château dit château haut ou de la Perrière était un fleuron du patrimoine  du célèbre chancelier Nicolas Rolin. Le fief  passa sous la dépendance des évêques d'Autun et ensuite au comte de Nevers. Les Savigny possédaient  un fief sur la rive droite de l'Arroux.","architecture":"Etang-sur-Arroux du château de la Perriere ou château haut  le plus ancien, il reste quelques vestiges  datant du Moyen-Age, le château bas se composé  d'une tour ronde  à l'Est  et un bâtiment corps de logis à base carrée à l'ouest flanqué de quatre tours rondes en angles, sa destruction remonterait à l'époque  des guerres de religion.                                                                    Le château de Savigny fut probablement ruiné, comme celui de la Perrière, à lépoque des guerres de religion. Les bâtiments de la ferme conservent de nombreux éléments du XVIe siècle.","habitants":"Chancelier Nicolas Rollin\r\n        \"","divers":"Motte féodale, château de la Perrières, de Fougerette, de Savigny, de Grand Cour et le pavillon de Vaux","gps":"","images":["../image/image_71/71_Etang_sur_Arroux_1.jpg","../image/image_71/71_Etang_sur_Arroux_2.jpg","../image/image_71/71_Etang_sur_Arroux_3.jpg","../image/image_71/71_Etang_sur_Arroux_4.jpg","../image/image_71/71_Etang_sur_Arroux_5.jpg","../image/image_71/71_Etang_sur_Arroux_6.jpg"]},"Consult_chateau_formulaireabfa":{"id":"Consult_chateau_formulaireabfa","dept":"71","canton":"Sennecey-le-Grand","commune":"St-Ambreuil","nom":"Ferte","type":"Palais abbatial","periode":"XVI","histoire":"FERTE, l'abbaye de la Ferté a compté parmi les plus importantes abbayes cisterciennes, première fondation  dit fille de cîteaux fondée en 1113,  a la Révolution les moines furent chassés il a été acquis en 1793 par la famille du baron Thenard, toujours dans la même famille depuis. Le baron A. Thenard, descendant du célèbre chimiste Louis Jacques Thenard.","architecture":"Ferté, palais abbatial reconstruit entre 1570 et 1574 restaurés au XVIIe siècle,  sur l'emplacement d'un édifice du XIIIe siècle,  l'église à disparu à la Révolution, mais le somptueux logis, réédifié par Claude petit, est resté intact, bâtiment rectangulaire à deux niveaux et attiques flanqué de deux pavillons aux extrémités et façade au centre un avant corps avec un vaste fronton circulaire encadré de pots à feu.","habitants":"Les moines de Citeaux\r\n        \"","divers":"L'Abbaye de la Ferté","gps":"","images":["../image/image_71/71_Ferte_1.jpg","../image/image_71/71_Ferte_2.jpg","../image/image_71/71_Ferte_3.jpg","../image/image_71/71_Ferte_4.jpg","../image/image_71/71_Ferte_5.jpg","../image/image_71/71_Ferte_6.jpg"]},"Consult_chateau_formulaire59c8":{"id":"Consult_chateau_formulaire59c8","dept":"71","canton":"Lugny","commune":"Fleurville","nom":"Fleurville","type":"Château","periode":"XVI","histoire":"FLEURVILLE (le Vieux), vers 1600,  Zacharie Pelez acquiert la châtellenie royale de Vérizet dont dépend Fleurville, il se peut que ce soit lui qui a fait faire bâtir le château. \r\nL'histoire de ce château, situé à moins de 300 mètres de celui de Marigny, est totalement obscur. Le fief est constitué vers 1530 par le notaire Philibert Pelez qui y bâtit une maison entourée de tours et de murailles. Vers 1600, la châtellenie royale de Verizet dont dépendait Fleurville, peu après 1650 le domaine parvient à Girard Perrier, avocat au Parlement, il est pillé en 1789, La vente des biens en 1796. Au XIXe siècle il passe entre les mains des familles Chalot et Pitré, remaniement important des appartements en 1880. Aujourd'hui  le château est aménagé en hôtel-restaurant , propriété de France et Pascal Lehmann.","architecture":"Fleurville, le corps de logis principal, de plan carré, est couvert d'une très haute toiture à deux  versants il est flanqué, dans le même alignement, de deux ailes, la façade sur cour de l'aile nord, est adossée une tour  hexagonale  couronnée d'un entablement soutenu par de gros modillons en quart-de-rond.  Les bâtiments d'habitation occupent le côté Est d'une vaste cour cernée de murailles, flanquée au nord et à l'ouest de trois tours rondes  percées de canonnières, à laquelle on accède au sud  par une porte en anse de panier accostée d'une porte piétonne. Des bâtiments à usage agricole s'appuient à la courtine occidentale.","habitants":"Famille de  Zacharie Pelez \r\n        \"","divers":"Château de Fleurville","gps":"","images":["../image/image_71/71_Fleurville_1.jpg","../image/image_71/71_Fleurville_2.jpg","../image/image_71/71_Fleurville_3.jpg","../image/image_71/71_Fleurville_4.jpg"]},"Consult_chateau_formulaire5cd6-2":{"id":"Consult_chateau_formulaire5cd6-2","dept":"71","canton":"Tournus","commune":"Prety","nom":"Fourneau_Prety","type":"Château","periode":"XVI","histoire":"FOURNEAU, dit aussi des Tuilleries du XVIe siècle  fut la propriété des Martin Robin de Duretal, à Pierre de Massol, conseiller du roi, président de la chambre des comptes de Bourgogne, à Marie Languet sa veuve en 1674, à Jacques de Thenet bailli de Tournus, aux d'Humbert et enfin aux de Saint-Avoye, au XVIIIe siècle, puis vendu peu avant la Révolution à la famille Gauthier, une partie fut démolie au début du XIXe siècle par des chercheurs de trésors.                                                             Environs de Tournus, château de PRETY, Château moderne bâti par les familles Canat et Boutillon, actuellement propriété de MM. de Canat de Chizy, c'est là que sont  conservées les fameuses collections de documents archéologiques de l'éminent érudit bourguignon Marcel Canat.                                                        Environ de Tournus-Préty. Château des Pendants du XIXe siècle, propriété de Madame Gauthey","architecture":"Fourneau, château construit et fortifié au XVIe siècle fut achevé au XVIIe siècle, une partie fut démoli au début du XIXe siècle  par des chercheurs de trésors, une magnifique charmille abritait jadis la terrasse dominant la vallée de la Saône.                                 Environ de Tournus-Préty. Château des Pendants du XIXe siècle, au dessus de la porte d'entrée, armoiries anciennes de Saulnier de Lanoue, famille de Tournus, originaire du Charollais et qui a donné à l'épiscopal le célèbre Pierre Saulnier, évêque d'Autun, au XVIe siècle, député aux états généraux de 1593.","habitants":"Martin Robin de Duretal\r\n        \"","divers":"Château de Fourneau et de Prety","gps":"","images":["../image/image_71/71_Fourneau_Prety_1.jpg","../image/image_71/71_Fourneau_Prety_2.jpg","../image/image_71/71_Fourneau_Prety_3.jpg","../image/image_71/71_Fourneau_Prety_4.jpg","../image/image_71/71_Fourneau_Prety_5.jpg"]},"Consult_chateau_formulaire3312":{"id":"Consult_chateau_formulaire3312","dept":"71","canton":"Epinac","commune":"Morlet","nom":"Fretoy","type":"Château","periode":"XIX","histoire":"FRETOY a été construit en 1900 par lamant de Cécile Sorel, une actrice célèbre de la Comédie Française. En 1941 le château a été vendu à la Croix Rouge qui la utilisé pendant de nombreuses années comme sanatorium. Pendant la deuxième guerre mondiale on y a soigné des blessés. Sur certaines cartes géographiques, le château est toujours indiqué par une croix rouge. Sur le domaine on trouve également une tour ou était  les  groupes électrogènes  pour son propre approvisionnement en électricité. Dans les années 80, le château de Frétoy a été vendu à \"La Vie Active\", une association qui organise des vacances pour des enfants handicapés et pour des orphelins.","architecture":"Fretoy a été construit en 1900, corps de logis à deux niveaux  avec pavillon à trois niveaux et tour ronde en angles toiture en paraboles, fronton sur façade d'entrée en forme d'arche sculpté.","habitants":"Cécile Sorel\r\n        \"","divers":"Château de Fretoy","gps":"","images":["../image/image_71/71_Fretoy_1.jpg","../image/image_71/71_Fretoy_2.jpg","../image/image_71/71_Fretoy_3.jpg","../image/image_71/71_Fretoy_4.jpg","../image/image_71/71_Fretoy_5.jpg","../image/image_71/71_Fretoy_6.jpg"]},"Consult_chateau_formulaired61e":{"id":"Consult_chateau_formulaired61e","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Gergy","nom":"Gergy","type":"Château","periode":"XV","histoire":"GERGY, au XIIIe siècle, ce village avec la seigneurie appartenait à la famille des Rion Montaigu, puis  Nicolas Rolin y fut seigneur. En 1428, Jean Lebault, crée le fief (futur Château de Gergy) de Meix-Bertaud. En 1462, ce même Jean Lebault fait hommage de son fief au duc de Bourgogne Philippe le Bon. Ce fief revint ensuite à la famille de Verderie puis, en 1640 à Louis Quarré, lieutenant général à la chancellerie de Chalon, c'est lui qui fit édifier le château actuel en 1668. Le corps de passage porte la date 1669 sur la niche. Les boiseries à décor peint du couloir du premier étage datent probablement de la seconde moitié du XVIIe siècle, les lambris et la cheminée du salon de la fin du XVIIIe siècle.  jusqu'à nos jours, après l'extinction des Quarré, dits de Gergy, le domaine passe par succession aux familles Lorenchet de Melonde, Gombault et Perrault de Jotemps.","architecture":"Gergy, on doit distinguer l'histoire de ce château de celle des seigneurs de Gergy qui furent titulaires jusqu'à la Révolution française du fief de Gergy et propriétaires d'un château-fort aujourd'hui disparu, qui dominait la Saône, à quelques centaines de mètres du château actuel.\r\nLe château de Meix-Berthaud  comprend un corps central flanqué en façade de deux avant corps  de plan sensiblement carré, celui de gauche abrite une chapelle, la porte donnant sur le  parc est précédée d'un escalier en fer-à-cheval, on entre dans la propriété par une tour-porche rustique, percée d'un large portail et d'une porte piétonne, ce porche, construit bien avant le château, servait d'entrée à une importante ferme fortifiée, dont ce qui reste des bâtiments d'exploitation constitue les communs du château actuel.","habitants":"Famille de Jean Lebault\r\n        \"","divers":"Château de Gergy,  de Diot et de Morin","gps":"","images":["../image/image_71/71_Gergy_1.jpg","../image/image_71/71_Gergy_2.jpg","../image/image_71/71_Gergy_3.jpg"]},"Consult_chateau_formulairec92a":{"id":"Consult_chateau_formulairec92a","dept":"71","canton":"Givry","commune":"Mellecey","nom":"Germolles_Gorze","type":"Château","periode":"XV-XVIII","histoire":"GERMOLLES, à la fin du XIVe siècle, une des plus puissantes princesses du temps, la duchesse de Bourgogne Marguerite de Flandre Germolle y fut sa résidence. Philippe le Hardi, duc de Bourgogne pour  Marguerite de Flandres fit appel à l'architecte Drouet de Dammartin pour construire le château. Ils reçurent le Roi Charles VI en 1390 passera par héritage à leur fils Jean sans Peur, puis à Philippe le Bon, et c'est  Charles le Téméraire qui transforma cette  demeure de plaisance en maison forte,  à la mort de ce dernier il revient  à la couronne de France avant la Révolution (trois incendies) cette demeure devient   la propriété depuis plus d'un siècle à la famille Pinette qui a restauré le château et aujourd'hui conservateur du musée Rolin a Autun.                      GORZE, en 1511  le fief appartient à Guillaume de Moles. Le domaine échoit au XVIe siècle à la nièce du précédent, Jeanne de Moles, épouse de Jean Berthet, notaire à Beaujeu. Au début de la construction en  1671 du château de Philibert Berthet, sur des plans de l'architecte d'origine provençale Paul de Royers de La Valfenière, auteur des deux ailes du palais Saint-Pierre à Lyon \r\nLa seigneurie est érigée en  1707 en marquisat, avec celles de Nagu, de Combes, de Germolles et de Nay.  Claude-Philibert de la Vernette succède en 1776 aux Berthet. \r\nA fin du  XIXe siècle la propriété passe au comte de Villeneuve et au début  du XXe siècle  le château est en partie démoli, aujourd'hui le domaine est transformé en exploitation agricole.","architecture":"Germolles, construit au XIVe siècle en style plaisance, d'aspect extérieur sobre bâtiment autour d'une cour rectangulaire et flanqué de tourelles couronnées de poivrières malheureusement arasées à la Révolution.  Le corps de logis en forme de L par une partie avancée l'ensemble à deux niveaux.                                       Dans la commune la tour du Clairon et le château de  Gorze, le château primitif comprenait, à l'Est, sur un niveau de soubassement prolongé aux angles par des terrasses talutés, un long corps de logis formé d'un pavillon central, deux ailes, et aux extrémités de celles-ci, deux pavillons. Alors que l'ensemble de la construction était en granit rose et gris, les encadrements des baies et les modillons des corniches soutenant les toits au-dessus d'une série de meurtrières, étaient en bois de chêne. Seuls les pavillons d'angle sont restés intacts, toute la partie centrale ayant été réduite au rez-de-chaussée, ainsi qu'une partie des communs, qui, à l'ouest, cernaient la cour dans laquelle on pénètre encore, au sud, par un portail en plein cintre que surmonte un écusson aux armes des Berthet avec la date de 1707 et la devise \"Qui s'y frotte, s'y pique\".","habitants":"Famille Pinette\r\n        \"","divers":"Château de Germolles et de Gorze","gps":"","images":["../image/image_71/71_Germolles_Gorze_1.jpg","../image/image_71/71_Germolles_Gorze_2.jpg","../image/image_71/71_Germolles_Gorze_3.jpg","../image/image_71/71_Germolles_Gorze_4.jpg","../image/image_71/71_Germolles_Gorze_5.jpg","../image/image_71/71_Germolles_Gorze_6.jpg","../image/image_71/71_Germolles_Gorze_7.jpg"]},"Consult_chateau_formulairee65f":{"id":"Consult_chateau_formulairee65f","dept":"71","canton":"Givry","commune":"Givry","nom":"Givry_Rosey","type":"Château","periode":"XV-XVIII","histoire":"GIVRY, les viticulteurs du village, racontent que le roi Henri IV en aurait fait son vin préféré. A cette même époque, la commune est ravagée par les guerres de religion.\r\nÀ partir du XVIIIe siècle, se construit un très bel ensemble architectural, exceptionnel pour une cité de la taille de Givry. L'hôtel de ville est construite de 1759 à 1771. La Fontaine aux Dauphins est terminée en 1776 sur les plans des architectes Emiland Gauthey et Thomas Dumorey. Pendant ce même siècle, la commune de Givry est considérée comme le centre viticole du chalonnais.                                                                              ROSEY, Antoine Clerguet, capitaine chef du vol de la grande fauconnerie de France, a fait construire cette maison en 1767 à Méloissey, après la mort d'Antoine Clerguet, en 1789, sans héritier direct, le château revient à Vincent-Mathias Villedieu de Torcy. A la Révolution, le propriétaire ayant émigré, le domaine est vendu à Antoine Denis Bottex greffier au tribunal de Chalon, il abat la chapelle et la bibliothèque qui formaient deux courtes ailes d'un seul niveau, couvertes de terrasses à balustrade, de part et d'autre du bâtiment central. En 1819 le château entre dans la famille Vitteaut, puis il est cédé à Mme de La Grandière en 1903, enfin en 1976 acquisition par M. Robert Arnal.","architecture":"Givry, les fortifications de la ville datent du Moyen-Âge du XIIIe siècle.  Située au centre de la ville, est a l'origine un marché aux grains, cet édifice de forme circulaire, dû à l'architecte chalonnais Narjoux, a été édifié de 1825 à 1830.                                       Rosey, château de 1767 à Méloissey, bâtiment de plan rectangulaire, un avant-corps d'une seule travée forme une légère avancée au centre de la façade nord, il comprend, au rez-de-chaussée, une porte en plein cintre entre deux pilastres toscans se détachant sur un encadrement rectangulaire en bossage en table, au premier étage, une porte-fenêtre donnant sur un balcon sur consoles à appui-corps en fer forgé que surmonte une frise de grecques et, au second étage, un oculus ovale.\r\nLe château est précédé au nord d'une cour encadrée de communs, qu'une porte cochère sans couronnements sépare d'une longue allée d'arbres.","habitants":"Seigneurs de Givry\r\n        \"","divers":"Château de Givry et de Rosey","gps":"","images":["../image/image_71/71_Givry_Rosey_1.jpg","../image/image_71/71_Givry_Rosey_2.jpg","../image/image_71/71_Givry_Rosey_3.jpg","../image/image_71/71_Givry_Rosey_4.jpg","../image/image_71/71_Givry_Rosey_5.jpg","../image/image_71/71_Givry_Rosey_6.jpg","../image/image_71/71_Givry_Rosey_7.jpg","../image/image_71/71_Givry_Rosey_8.jpg","../image/image_71/71_Givry_Rosey_9.jpg"]},"Consult_chateau_formulaired4e5":{"id":"Consult_chateau_formulaired4e5","dept":"71","canton":"St-Germains-du-Bois","commune":"Mervans","nom":"Glairans","type":"Château","periode":"XVIII","histoire":"GLAIRANS, le bourg de \"Mervans\", remonte au XIIIe siècle, appartient à la famille d'Antigny jusqu'au XVe siècle. L'ancien château fort,  détruit au XVIIe siècle se trouvait au sud de l'église La baronnie passe à Nicolas Rolin en 1450  élevée au rang de marquisat de La Marche en 1700,  comprend Devrouze, Villegaudin, Diconne et St-Martin. Vers 1770, Michel Lory fait construire un nouveau château,aujourd'hui propriété de monsieur François de Bellenet.","architecture":"Glairans, l'ancien château fort (détruit au XVIIe siècle).                 Construction du nouveau château dans le style de Serrigny du XVIIIe siècle, il est modifié en 1880 corps de logis rectangulaire à trois niveaux  pavillon saillant aux extrémités et pavillon central  plein centre en façade.                                                                          Un nouveau château est édifié à Reure au XVIIIe siècle.","habitants":"Famille de  Michel Lory\r\n        \"","divers":"Château de Glairans","gps":"","images":["../image/image_71/71_Glairans_1.jpg","../image/image_71/71_Glairans_2.jpg"]},"Consult_chateau_formulairee0d0":{"id":"Consult_chateau_formulairee0d0","dept":"71","canton":"Charolles","commune":"Lugny-les-Charolles","nom":"Grammont_Lugny","type":"Château","periode":"XVIII","histoire":"GRAMMONT, la seigneurie du XIIIe siècle au XVe siècle, sera érigée en baronnie, appartient aux Damas de Cousan.\r\nLe fief entre dans la maison de Lévis en 1430 suite au  mariage d'Alix de Damas avec Eustache de Lévis. Le fief est confisquée en 1433 au bénéfice du chancelier Nicolas Rolin. En 1479, Guillaume Rolin, fils de Nicolas Rolin, restitue leurs biens aux Lévis. Marc-Antoine II de Lévis, capitaine aux Gardes Françaises, fait rebâtir le château en 1771. Marc-Antoine II de Lévis, dernier maître du fief, est exécuté en 1794. Le domaine, préservé par ses acquéreurs, est vendu au comte de Croix, en 1843, qui apporte quelques modifications, suppression de l'escalier à vis de la tourelle qui se trouve dans la cour, puis création d'un escalier droit dans le vestibule d'entrée. Par héritage, le bien est transmis au marquis de Grammont au XXe siècle. Aujourd'hui transformé en hôtel restaurant.\r\nDu château de Lugny qui a appartenu  à la maison de Lugny, des Polignac de Beaufremont  aux Tavannes  et au comte de Montravel, (voir article).","architecture":"Grammont, du haut de la falaise dominant la vallée de l'Arconce. La conception du château témoigne de la maîtrise d'un architecte, jusqu'à ce jour inconnu, qui sut faire d'une forteresse médiévale une très belle demeure conforme aux canons du XVIIIe siècle. À partir d'un château polygonal, un nouvel édifice est créé, comportant un corps central et deux courtes ailes en retour d'équerre vers le nord. Sept pans irréguliers constituent les façades ouest, nord et Est, dépourvues de toute ornementation, tandis que les ailes sont implantées en biais, leurs angles extérieurs seuls étant perpendiculaires à la façade principale.  En outre, une tour d'escalier carrée, percée au rez-de-chaussée d'une porte à linteau en accolade aux armes des Lévis et des Damas de Cousan, a été incluse dans l'uvre. Cette façade s'ouvre largement sur une cour dont l'ampleur est accentuée par la présence, de chaque côté d'une avant-cour ouverte, des communs à un seul étage, implantés à l'alignement des murs extérieurs des ailes.","habitants":"Famille de Marc-Antoine II de Lévis\r\n        \"","divers":"Château de Lugny et le chalet château","gps":"","images":["../image/image_71/71_Grammont_Lugny_1.jpg","../image/image_71/71_Grammont_Lugny_2.jpg","../image/image_71/71_Grammont_Lugny_3.jpg"]},"Consult_chateau_formulaire3b97":{"id":"Consult_chateau_formulaire3b97","dept":"71","canton":"Tournus","commune":"Uchizy","nom":"Grenod","type":"Château","periode":"XVI-XVII","histoire":"GRENOD, propriété de la fin du XIVe siècle, une famille comtoise, les Fitigny, le fief de Grenod échut ensuite aux Montrichard, également comtois, puis fut partagé en trois lots en 1575, à la mort de Philibert de Montrichard.\r\nVers 1600, Louis de Mincey parvint à le réunifier avant de le léguer à sa fille Jeanne, épouse de Louis de Franc, en 1620, de ce fait, il passa en 1728, à Marc-Antoine de Lavaur.  Le château fut saisi en 1791 sous Louis-René de Lavaur, puis racheté par Jean-François de Lavaur. Par les femmes, il parvint à la famille Méziat qui le possédait à la fin du XIXe siècle. Aujourd'hui le domaine appartient à la famille Lardy.","architecture":"GRENOD;  quadrilatère jadis entouré de fossés, il reste un corps de logis de plan rectangulaire allongé à un étage en surcroît entre deux pavillons, dont les façades sont de même alignement que les siennes, on accède au rez-de-chaussée par une porte charretière en anse de panier, accostée d'une porte piétonne en plein cintre, l'ensemble paraît avoir été bâti au XVIe siècle et remanié au XVIIe siècle, bien que défiguré, Grenod, sans son décor boisé, conserve encore lair sombre et retiré dun petit repaire féodal avec sa tour et ses quelques vestiges du Moyen-Âge.                                                Dans cette commune de Uchizy plusieurs châteaux celui de Monsieur Guichard le château Butillard, de Chardonnay et des Ecuyers  du XVIIe siècle.","habitants":"Famille de Louis de Mincey\r\n        \"","divers":"Château de Grenod, de Guichard, des Ecuyers, de Butillard et de Chardonnay","gps":"","images":["../image/image_71/71_Grenod_1.jpg","../image/image_71/71_Grenod_2.jpg","../image/image_71/71_Grenod_3.jpg","../image/image_71/71_Grenod_4.jpg","../image/image_71/71_Grenod_5.jpg","../image/image_71/71_Grenod_6.jpg","../image/image_71/71_Grenod_7.jpg","../image/image_71/71_Grenod_8.jpg"]},"Consult_chateau_formulaire0244":{"id":"Consult_chateau_formulaire0244","dept":"71","canton":"Cluny","commune":"St-André-le-Désert","nom":"Gros_Chigny","type":"Château","periode":"XIII-XV","histoire":"GROS-CHIGNY, le château joue un rôle clé, entre 1171 et 1237, dans la soumission des grands féodaux, il subit plusieurs destructions très violentes entre 1361 et 1477. Claudine de Vaux épouse Guillaume de l'Aubépin qui rebâtit l'actuel château, le précédent ayant été démantelé par ordre royal. Gros-Chigny passa alors  dans les mains de plusieurs propriétaires, début XVIIe siècle la terre passe, par les femmes aux Rabutin, en 1666 acquisition par les Champier, il devient la propriété de Claude de Valadoux en 1748. Michel Ducret, officier aux Gardes Françaises, achète le bien en 1767. En 1794, le château est en ruines et vendu aux enchères comme bien national. Un cahier des charges contraint son acheteur à transformer le château en ferme. Un Dauxois échange, avec un Monsieur Ducrot, le château contre des terres. Sous la contrainte et pressée par les révolutionnaires, la famille Ducrot  continue de détruire un peu plus le château. La Révolution s'essouffle et la famille  arrête alors de détruire le château qui sera restauré et remanié aux XIXe et XXe siècles, il est toujours propriété de cette famille.","architecture":"Gros-Chigny, les bâtiments sont groupés en un quadrilatère irrégulier autour d'une cour centrale, l'entrée est située au nord et consiste en une porte charretière accostée d'une porte piétonne, toutes deux précédées jadis de pont-levis, entre deux grosses tours rondes percées à leur base d'archères-canonnières, de part et d'autre de cette entrée, les courtines sont surmontées d'un chemin de ronde garni de meurtrières, à la muraille nord, s'appuie un long bâtiment rectangulaire qui abrite au rez-de-chaussée une salle divisée en trois nefs de quatre travées et qui serait l'ancien auditoire de Saint-André-le-Désert, des communs lui font suite, flanqués à l'extérieur d'une tour carrée hors-uvre, remanié aux XVIIe siècle et XVIIIe siècle, donnant sur des fossés par une petite porte en plein cintre, le corps de logis principal est adossé à la courtine ouest et flanqué sur son angle sud-ouest d'une grosse tour carrée, couronnée de mâchicoulis sur consoles formant chemin de ronde l'extérieur et défendu par une petite bretèche, le logis est flanqué d'une tour d'escalier carrée hors-uvre, dans le mur de laquelle on distingue les fentes des balanciers d'une planchette, cette tour est percée d'une petite porte que surmonte un cartouche armorié daté de 1570, à l'étage du logis, on devine au plafond des éléments peints du XVIe siècle ou du XVIIe siècle, une petite tour carrée accolée au mur ouest.\r\nAu sud, entre le donjon et la tour carrée, se trouve une terrasse soutenue par de puissants contreforts.","habitants":"Famille de Guillaume de l'Aubépin\r\n        \"","divers":"Château de Chigny","gps":"","images":["../image/image_71/71_Gros_Chigny_1.jpg","../image/image_71/71_Gros_Chigny_2.jpg","../image/image_71/71_Gros_Chigny_3.jpg","../image/image_71/71_Gros_Chigny_4.jpg"]},"Consult_chateau_formulaire54e3-2":{"id":"Consult_chateau_formulaire54e3-2","dept":"71","canton":"Gueugnon","commune":"Gueugnon","nom":"Gueugnon_Breuil","type":"Château","periode":"XV","histoire":"GUEUGNON, le sud du val d'Arroux fut longtemps sur la frontière qui séparait le Royaume de France et son Duché de Bourgogne du Royaume d'Aquitaine. Cependant Gueugnon n'a pas possédé, à l'époque féodale, de grands châteaux forts, genre forteresse ou castrum tels que ceux de certaines communes voisines (Bourbon-Lancy, la Motte-Saint-Jean, Les Guerreaux avec Morillon, Grury avec Montperroux et Faulin) bien que le territoire de Gueugnon fût partagé en plusieurs fiefs. Il est par contre riche en mottes féodales (notamment celles du Breuil et des Gachères) et en maisons-fortes. En effet deux forteresses (ou maisons-fortes) furent édifiées au XIVe ou XVe siècle, le Breuil (qui existe toujours) et les Essenleys (qui fut démantelé lors de la Révolution française de 1789).                                                                                     BREUIL, un premier château fut construit au lieu-dit \"Le Breuil\" à la fin du XVe siècle appartenant à la famille Brisejonc. Il fut acquis en 1530 par Nicolas de Chargères, seigneur de la Sapinière, branche du Morvan, à la famille de Brosses qui habitait un château du même nom aux environs de Digoin. En 1616, un incendie détruisit le donjon et le château fut reconstruit dans son état actuel. En 1677, le terrier du Breuil précise que la baronnie du Breuil possédait des vignes sur le coteau de l'Arroux à proximité du château. Vendu par autorité de justice au début du XIXe siècle à un marchand de biens, il fut racheté par la famille Casimir Perrier qui le revendit peu après à la famille de Valence. En 1830, les de Chargères, qui avaient une propriété à Mondemot près de Vendenesse-sur-Arroux, en firent l'échange avec les de Valence, c'est ainsi que le château du Breuil retourna à ses anciens propriétaires. Lors de son importante restauration de 1930, le château du Breuil servait de grenier à grains et ses fenêtres étaient obstruées par des galandages. Le marquis Bernard de Chargères et sa famille y réside aujourd'hui.","architecture":"Breuil, l'aspect originel du château se composait d'un donjon entouré de 13 tours, dont une seule subsiste aujourd'hui en colombier, il était  entouré d'un profond fossé enjambé par un pont-levis, simples et austères, les bâtiments entourent une cour carrée à laquelle on accédait autrefois par un pont-levis aujourd'hui remplacé par un pont de pierre. Bien qu'encore moyenâgeux dans son aspect général, le corps de logis principal est influencé par la Renaissance et flanqué de deux tours d'angles circulaires, deux tours carrées accolées aux autres angles du quadrilatère.\r\nDans la commune le château de Presles  et de Fourier.","habitants":"Famille Brisejonc\r\n        \"","divers":"Le château de Guegnon-Breuil de Presles  et de Fourier","gps":"","images":["../image/image_71/71_Gueugnon_Breuil_1.jpg","../image/image_71/71_Gueugnon_Breuil_2.jpg","../image/image_71/71_Gueugnon_Breuil_3.jpg","../image/image_71/71_Gueugnon_Breuil_4.jpg"]},"Consult_chateau_formulaire12cc":{"id":"Consult_chateau_formulaire12cc","dept":"71","canton":"Mâcon","commune":"Hurigny","nom":"Hurigny","type":"Château","periode":"XVII","histoire":"HURIGNY, en 1357 le châtelain était Joceran Cobuche. En 1471, les troupes de Louis XI détruisirent la maison forte de Salornay dont l'artillerie avait été prêtée à la ville de Mâcon pour leur résister. La châtellenie royale au XIVe siècle et pourvue alors d'une maison forte ceinte de fossés, la terre d'Hurigny fut érigée en fief en 1510 pour Philippe Margot.  Elle appartint ensuite aux Severt qui y résidèrent, le domaine fut  vendue en 1666 aux ursulines de Mâcon, il était peu après cédé à Philippe-Etienne de Lamartine, conseiller-secrétaire du Roi, dont le petit-neveu, Jean-baptiste, fit raser l'ancien château auquel il substitua, en 1783, une aimable demeure.  En 1787 après la mort de Jean Baptiste laissant trois filles, la première Sybille Phillipine par alliance fit passer le domaine à Pierre de Montherod de Montferrand, il fut le dernier seigneur d'Hurigny, ils émigrèrent à la Révolution. Vendu comme bien national en 1794, à Joseph Meziat notaire à Senozan. En 1824, une nouvelle vente fait passer le domaine entre les mains de M. Turin, négociant, sa fille  héritière épousera, le comte Léon de Leusse, celui-ci cède la propriété à la commune en 1988. Le château moderne construit de nos jours un peu au-dessus de la maison des Lomoynés dont l'architecte l'atteste de la fin du XVIIe siècle, la propriété vient  de l'héritage de madame la baronne  d'Arlempdes aieule de l'architecte de Lamoynés, femme de J.B. Bonnetain de Lessaré. Nombreux séjours de Lamartine au château, propriété de son oncle François Louis de Lamartine de Montculot (1750-1827).                                                                         \r\n Dans la commune  de nombreux châteaux, Chazoux propriété de monsieur Michoux, château de Fontaine, de Guerret,de  Leusse, de Pocard, de  Salornay (voir article).","architecture":"Hurigny est un village du Mâconnais. Il s'étend sur un plateau d'environ 300 mètres d'altitude, dominant la vallée de la Saône. Le village est également encadré par les collines du Mont-Rouge et du Gros Mont. Maison forte entouré de fossés à l'origine.                  Village viticole du vignoble du Mâconnais. Le château du XVIIIe siècle de plan rectangulaire à un niveau et attiques avant corps avec fronton.   Maison forte de Salornay reconstruite au XVe siècle, enceinte fossoyée, tour-porte, donjon à meurtrières.\r\nChâteau de Chazoux du  XVIIIe au  XIXe siècle.\r\nChâteau de La Fontaine du XVIIIe siècle.\r\nChâteau de Guerret  du XIXe siècle.","habitants":"Famille de Philippe-Etienne de Lamartine\r\n        \"","divers":"Château d'Hurigny, de Leusse, de Chazaux, de Pocard et le Castel-Moderne","gps":"","images":["../image/image_71/71_Hurigny_1.jpg","../image/image_71/71_Hurigny_2.jpg","../image/image_71/71_Hurigny_3.jpg","../image/image_71/71_Hurigny_4.jpg","../image/image_71/71_Hurigny_5.jpg","../image/image_71/71_Hurigny_6.jpg","../image/image_71/71_Hurigny_7.jpg","../image/image_71/71_Hurigny_8.jpg"]},"Consult_chateau_formulaire9135":{"id":"Consult_chateau_formulaire9135","dept":"71","canton":"Mâcon","commune":"Igé","nom":"Ige","type":"Maison forte","periode":"XV","histoire":"IGE, fief, tenue par Geoffroy de Lugny qui en rendit hommage au roi puis à l'abbé de Cluny. En 1536, il passa par alliance à Guillaume de Maugiron, le dernier des Maugiron, Jean Baptiste Gaston, fit recouvrir, en 1654, le corps de logis et les tours du château avant d'être contraint à le vendre en 1659 à Louis Droyn.  Louis François de Lamartine, chevalier, seigneur de Monceau (Prissé), des Granges, de la Tour Mailly (Igé), de Montculot et de Quemigny, capitaine au Louis 1711-1797, prit  la direction  du château d'Igé. A demi ruiné, il échut ensuite à Louis de La Bletonnière, avocat au parlement, les descendants le possédèrent jusqu'en 1860. Il fut alors divisé en deux lots et vendu à deux acquéreurs différents,  Vers la fin du XIXe siècle, le château fut plus ou moins laissé à l'abandon.\r\nA partir de 1972, le château fut restauré par Henri Jadot et converti en hôtellerie de luxe, depuis 1990, Françoise Fauco-Lieury, actuellement propriétaire.                                                                  Dans la commune le château de Chabotte et le manoir de la Bruyère du XVIe siècle.(Voir Article)","architecture":"Igé, à l'origine maison forte construite en 1368, remanié en 1654, puis au XIXe siècle les bâtiments furent abaissés et les douves comblés, ensuite laissé à l'abandon est restauré en 1972.                                 La Tour de Mailly , nom aujourd'hui disparu, était situé à Igé canton de Lugny, près du chemin de cette paroisse à Berzé. Ce fief dépendait de la seigneurie d'Escole, et consistait un droit d'usage de la forêt de Malessard, domaine royal.","habitants":"Famille de Geoffroy de Lugny \r\n        \"","divers":"Château d'Igé","gps":"","images":["../image/image_71/71_Ige_1.jpg","../image/image_71/71_Ige_2.jpg","../image/image_71/71_Ige_3.jpg","../image/image_71/71_Ige_4.jpg","../image/image_71/71_Ige_5.jpg"]},"Consult_chateau_formulaire3792":{"id":"Consult_chateau_formulaire3792","dept":"71","canton":"Lucenay-L`Evêque","commune":"Igornay","nom":"Igornay","type":"Château","periode":"XV","histoire":"IGORNAY, une famille seigneuriale est attestée dès le XIIe siècle à Igornay, on peut citer Alvis d'Igornay, Guy des Barres, Guyot de Thianges et Guillaume de Sercy, bailli de Chalon de 1451 à 1458, obtint le transfert de l'église paroissiale hors de la cour du château et fit faire d'importants travaux à celui-ci, ses armoiries figurent à la tour nord. Après lui, le seigneur d'Igornay fut Guillaume de Villers-la-Faye dont les descendants vendirent le château en 1541 à Gaspard de Saulx Tavannes. Désormais Igornay suit le sort du château de Sully. Actuellement, le château partagé entre plusieurs familles est occupé par une ferme et plusieurs habitations.","architecture":"Igornay, de plan polygonal, le château fort aurait comporté sept tours, il n'en subsiste que trois avec un corps de logis et des courtines, la tour la plus massive s'élève vers le sud-ouest, elle a été défigurée par un incendie et serait antérieure au XVe siècle, le corps de logis, situé à l'est, date, quant à lui, du XVe siècle comme la tour carrée plantée de biais qui le flanque au sud-est et dont les mâchicoulis portent un étage en encorbellement construit en brique, cette tour rappelle celle d'Épinac.\r\nL'accès au château se faisait vers l'est par une porte dont de gros blocs de pierre appareillés marquent l'emplacement, vers le nord, subsiste la courtine contre laquelle sont venus s'appuyer des bâtiments plus récents, elle est renforcée au nord par une tour ronde qui a conservé archères, cheminées de pierre, coussièges et des latrines logées dans l'angle du mur, on y accède par une porte rectangulaire encadrée d'une accolade et surmontée d'un écu portant les trois faces ondées des Sercy. D'une autre tour subsiste une archère et les restes d'une porte, les fossés, qui entouraient le château, sont visibles surtout vers le nord où l'on voit l'empierrement qui en renforçait le talus extérieur.","habitants":"Famille de Guillaume de Villers-la-Faye\r\n        \"","divers":"Château d'Igornay","gps":"","images":["../image/image_71/71_Igornay_1.jpg","../image/image_71/71_Igornay_2.jpg"]},"Consult_chateau_formulaire0122":{"id":"Consult_chateau_formulaire0122","dept":"71","canton":"Issy-l`Evêque","commune":"Issy-l`Evêque","nom":"Issy_Leveque","type":"Château","periode":"XIV-XVIII","histoire":"ISSY-L'Evêque, village au passé historique très riche, doit sans doute son nom à une ancienne place forte rattachée à l'Evêché d'Autun au Xe siècle Stéphanie Félicité du Crest de Saint-Aubin, par son mariage comtesse de Genlis,  gouvernante des enfants du duc d'Orléans et qui, à ce titre, eut en charge l'éducation du futur Louis-Philippe Ier, roi des Français, elle est née au château de Champcery, à 3 kilomètres d'Issy-l'Évêque dans une famille  originaire de Bourgogne, fille dun ancien capitaine qui portait le titre de marquis de Saint-Aubin.  \r\nLa comtesse de Genlis se chargea également de l'éducation des enfants d'Orléans et notamment de celle du futur roi des Français, qu'elle éleva avec l'idée d'en faire un nouveau saint.  Le duc de Chartres la nomma « gouverneur » de ses enfants, au nombre desquels le futur Louis-Philippe, Roi des Français, qui lui voua toute sa vie une adoration. \r\n Madame de Genlis s'enfuit en Angleterre pendant la Terreur. Son mari ainsi que Philippe Égalité furent guillotinés. Sa fille, Pulchérie,  passa, elle aussi, très près de léchafaud.\r\nEn 1801, Bonaparte lautorisa à rentrer en France, lutilisa comme espionne, et la pensionna. Félicité de Genlis vécut juste assez longtemps pour voir celui quelle avait élevé devenir roi des Français, elle fut inhumée au Père-Lachaise, lors de son enterrement, le 4 janvier 1831, le doyen de la Faculté des Lettres de Paris déclara: « Pour honorer et célébrer dignement la mémoire de Mme de Genlis, ce seul mot doit suffire, son plus bel éloge est sur le trône de France.                                                       MONTRIFAUD;  Château aux influences normandes, il fait partie du patrimoine avec une élégance surprenante, ancien bien de la commune, il est maintenant propriété dun particulier irlandais. Ce propriétaire a donné son aval pour la visite de cet édifice.","architecture":"Issy-l'Eveque, le porche, l'ancienne cure et la tour de Luzy en sont les derniers vestiges, glacière, Le bourg sagrandira toujours autour de cette place forte en conservant jusquà notre époque cet aspect de bourg fortifié. Débutée au XIe siècle, au milieu de la place forte et terminée au XIIe siècle, par son ampleur, indique une population déjà importante. Issy lévêque fut occupé et pillé de nombreuse fois, des fossés entouraient la place forte, ils ont été comblés définitivement vers 1650.\r\nA la fin du XIVe siècle, les écorcheurs brûlent le village, en 1475  la forteresse est brûlée par larmée royale. Au cours des siècles, on signale un couvent de Bénédictines, une léproserie et une filature de coton.\r\nMontrifaut; château ou site historique  de style anglo-normand construit entre 1890 et 1900, glacière du château, unique en Saône et Loire, ouvrage très original construit à proximité du château constitué de  deux cônes superposés de même volume, dont la partie inférieure est totalement enterrée, la partie supérieure est couverte en chaume. L'hiver, les fermiers sciaient la glace sur l'étang proche, celle-ci était empilée dans la glacière jusqu'à 11 mètres au dessus du sol et l'été, on piochait dans ce bloc pour boire frais et conserver les aliments.","habitants":"La comtesse de Genlis\r\n        \"","divers":"Château d'Issy l'Evêque et de Montrifaut","gps":"","images":["../image/image_71/71_Issy_Leveque_1.jpg","../image/image_71/71_Issy_Leveque_2.jpg","../image/image_71/71_Issy_Leveque_3.jpg"]},"Consult_chateau_formulaire2f38":{"id":"Consult_chateau_formulaire2f38","dept":"71","canton":"Bourbon-Lancy","commune":"Chalmoux","nom":"Jarsaillon","type":"Château","periode":"XIX","histoire":"JARSAILLON sur motte féodale de l'ancien château fort. La tour de Chevagnes (pigeonnier de ferme). En 980, Lambert, comte de Chalon  futur fondateur du monastère de Paray-le-Monial, affronte à proximité de Chalmoux les troupes de Guillaume IV d'Aquitaine et refoule la coalition des Aquitains et des Auvergnats. L'odonyme « rue Lambin », qui désigne un modeste chemin communal, tire probablement son origine de cet épisode belliqueux.\r\nSur le territoire de la commune, ancienne concession minière de Chizeuil (pyrites de fer et de cuivre), exploitée jadis par la Compagnie du Creusot, puis par la société Saint-Gobain, jusque dans les années 60.","architecture":"Chalmoux, motte féodale et château de Jarsaillon, construction du XIXe siècle corps de logis rectangulaire à deux niveaux et motte féodale de l'ancien château fort.\r\nTour des Chevagnes (pigeonnier de ferme).","habitants":"Seigneur de Jarsaillon\r\n        \r\n        \"","divers":"Château de Jarsaillon","gps":"","images":["../image/image_71/71_Jarsaillon_1.jpg","../image/image_71/71_Jarsaillon_2.jpg"]},"Consult_chateau_formulaireae92":{"id":"Consult_chateau_formulaireae92","dept":"71","canton":"La Guiche","commune":"Joncy","nom":"Joncy","type":"Château","periode":"XV","histoire":"JONCY, qui faisait partie du comté de Chalon, entra dans le domaine ducal en 1237 avec lui, puis fut cédé à Marie des Barres, dame de Mont-Saint-Jean. Le château et ses dépendances passèrent, en 1387, à Pierre de Thil, époux de Jeanne de Mont-Saint-Jean. Il échut ensuite aux Palatin de Dyo, puis, vers 1475, aux Rochebaron à la suite du mariage de Claude de Rochebaron avec Guy d'Anglure, veuve de Pierre de Dyo. Cette famille s'éteignit  en 1627 en la personne de René de Rochebaron, veuf de Marie d'Aumont. Le duc d'Aumont vendit la baronnie en 1740, à Octave Cottin de La Barre, conseiller au Parlement de Bourgogne, dont le petit-fils, vers 1780, entreprit la transformation de la vieille forteresse qu'un texte du XVIe siècle décrit comme possédant 11 tours et 2 enceintes.\r\nLa tradition veut que les travaux aient été confiés à l'architecte Pierre-Joseph Antoine.  Tout fut vendu en 1794. Un siècle plus tard, le comte de Chérisey restaura les bâtiments qui subsistaient et reconstitua les jardins à la française.                                          Dans la commune le château des Croisettes  du XVIe siècle avec donjon du XIVe siècle.","architecture":"Joncy, c'est un bâtiment de plan en L comportant un corps principal et une courte aile en retour d'équerre, il est flanqué d'une grosse tour carrée, sans doute le donjon primitif, desservie par un escalier à vis inclus dans une tourelle à cinq pans, bâtie vers le XVe siècle, les ouvertures irrégulièrement réparties, les éléments défigurés de ce qui fut peut-être une tour-porche, une tourelle en surplomb sur culot conique, aménagée dans l'angle de cette tour et du bâtiment principal, témoignent des remaniements successifs et des travaux du XIXe siècle, les tours abattues et les fossés comblés quand la Révolution mit un terme aux démolitions . A lest, les communs, sont complétés par un moulin sur la Guye.","habitants":"Famille d'Octave Cottin de La Barre\r\n        \"","divers":"Château de Joncy, de Croisettes et de Marmand","gps":"","images":["../image/image_71/71_Joncy_1.jpg","../image/image_71/71_Joncy_2.jpg","../image/image_71/71_Joncy_3.jpg","../image/image_71/71_Joncy_4.jpg","../image/image_71/71_Joncy_5.jpg","../image/image_71/71_Joncy_6.jpg","../image/image_71/71_Joncy_7.jpg"]},"Consult_chateau_formulaire6cfd-2":{"id":"Consult_chateau_formulaire6cfd-2","dept":"71","canton":"Cuiseaux","commune":"Joudes","nom":"Joudes","type":"Château","periode":"XIX","histoire":"JOUDES, château à Saint-Amour. Le petit-fils de Pierre-Ambroise  Puvis de Chavannes, de Marciat  et fils de François-Antoine-Adolphe Puvis de Chavannes à Bourg (Ain), ancien Conseiller général et député de Saône-et-Loire, Joseph-Camille Puvis de Chavannes, né à Avallon en 1860, devenu propriétaire du château de Reuille et marie de  Cuiseaux, avait épousé Marthe Larcher, née à Chaumont en 1867, les époux sont recensés à Reuille en 1896 avec leurs trois enfants, en 1931, avec Louis né à Beaune en 1895, courtier d'assurances urbaine et seine, et Elisabeth née à Avallon en 1892, venue de M. Vincent de Saint-Bonnet, et mère de Marie-Camille qui naquit à Cuiseaux en 1917. Michel et Bernard, nés, le premier en 1897 à Beaune, le second en 1904  sont eux-mêmes recensés à Reuille en 1911, et  Marie-André, né à Cuiseaux en 1907, est porté en recensement de 1921 Mme Puvis de Chavannes, veuve (son époux était encore maire de Cuiseaux en 1932), était propriétaire du château en 1936.                    \r\n REUILLE, le château de Reuille est une maison bourgeoise de 1891 construite par la famille Puvis de Chavannes. Le bâtiment a été acheté par la commune de Cuiseaux en 1971.","architecture":"Château du XIXe siècle, au bourg.\r\nChâteau \"Les Charmeilles\" à Marciat du XIIe siècle.\r\nChâteau de Joudes  belle demeure du XVIIe et XIXe siècle, corps de logis rectangulaire à deux niveaux et attiques, accolé de deux pavillons surbaissés,  blottie au cur d'un parc boisé de 10 hectares.                                                                              Château des Princes d'Orange, arcades du XVIe siècle, maison natale du peintre Vuillard de 1868, remparts du XIIe siècle, porte du Verger, tour d'angle du  XVIIe siècle.                                          REUILLE,  La maison comporte un rez de chaussée, un rez de jardin et deux étages. Elle est entourée d'un parc fleuri dominant la plaine et donnant sur le Revemont   offrant un environnement pittoresque.","habitants":"Famille de Joseph-Camille Puvis de Chavannes\r\n        \"","divers":"Château de Joudes, de Reuille, de Saint-Amour et de Charmeilles à Marcia","gps":"","images":["../image/image_71/71_Joudes_1.jpg","../image/image_71/71_Joudes_2.jpg","../image/image_71/71_Joudes_3.jpg","../image/image_71/71_Joudes_4.jpg","../image/image_71/71_Joudes_5.jpg"]},"Consult_chateau_formulairea264":{"id":"Consult_chateau_formulairea264","dept":"71","canton":"Mâcon","commune":"Laizé","nom":"Laize","type":"Tour Château","periode":"XV XVIII","histoire":"LAIZE, plusieurs châteaux dans cette commune. Le château de Laizé appartenait aux moines de Cluny  seigneurs justiciers de la paroisse jusqu'à la Révolution, étaient possesseurs des  terres et le château partiellement détruit.                                                  La TOUR-PERCEVAL de Philibert de Perceval élevée au XVI-XVIIe siècle, elle appartenait en 1604 à Philibert de Perceval, en 1656 à Jean-Baptiste de Chambes, écuyer puis à son frère en 1718, à François Olivier de Sénézan en 1776, au comte Talleyrand Périgord en 1803, puis au comte de Noailles actuellement à mademoiselle M.C. Mazot et N. Chavet.                                    BLANY, qui a appartenu au moine de Cluny, puis à la municipalité de Mâcon et aujourd'hui à un particulier.                                         Chazeu ( Voir article).","architecture":"Laizé, château médiéval avec donjon carré du XIIIe siècle, brûlé en 1471 durant les guerres de Louis XI et de Charles le Teméraire, puis saccagé en 1789 par une bande de brigands, le corps de logis remanié au XVIIIe siècle, au-dessus de la porte les armes de Chevriers de Saint-Mauris, il ne présente plus aujourd'hui qu'un très haut donjon carrée  crénelée du XIIIe siècle entouré de bâtiments d'âges  différents.                                                                               La Tour-Perceval de Philibert de Perceval, l'ensemble remonte à la fin du XVIe siècle,  en 1604 un bâtiment rectangulaire de deux étages accolé à une solide tour carrée trois bretèches munies d'archères tout en saillies sur façade.   le petit  château de Blany du XIXe siècle aujourd'hui centre aéré  au service des jardins de la ville de Mâcon.","habitants":"Famille de Philibert de Perceval \r\n        \"","divers":"Château de Laize, de Blany et la tour Perceval","gps":"","images":["../image/image_71/71_Laize_1.jpg","../image/image_71/71_Laize_2.jpg","../image/image_71/71_Laize_3.jpg","../image/image_71/71_Laize_4.jpg"]},"Consult_chateau_formulaire46fa":{"id":"Consult_chateau_formulaire46fa","dept":"71","canton":"Lugny","commune":"Peronne","nom":"Lamartine_Peronne","type":"Château","periode":"XV","histoire":"LAMARTINE, ce château appartenait à la Révolution à Louis-François de Lamartine son fils l'abbé J.II de Lamartine, fut condamné par l'ordre des prêtres à la déportation, expédié à Rochefort, ses parents furent chassés et gardés par deux sans culottes, le déporté fut enfin libéré le 15 décembre 1794, le château passa ensuite à madame de Villars puis revient à Alphonse de Lamartine qui le vendit pendant la période des troubles de 1848.                                 Dans la commune  de Peronne le château de Vaux-sous-Targe du XIXe siècle sur l'emplacement d'une forteresse médiévale, le manoir de la Tour de Penet du XVIIIe siècle et le manoir du Carruge.                                                                            \r\nTOUR-PENNET, ce château semble avoir été bâti au XVIIe siècle, sur une terre dépendant de la seigneurie de Vaux sous Targe, à la fin du XVIIIe siècle, il appartenait à Suzanne de Lamartine du Villars, chanoinesse de Salles, tante  d'Alphonse de Lamartine, à qui elle le légua en 1842. Celui-ci le vendit, ainsi que le domaine de 90 hectares en partie planté de vignes qui l'accompagne, à M. de Contenson en 1850, appartient à monsieur Ferret.","architecture":"Château de Lamartine, dit Tour-Pennet, petit manoir, le corps de logis principal, de plan rectangulaire allongé, est flanqué, sur trois de ses angles, de tours carrées couvertes de toits en pavillon. Un balcon couvert et une véranda ont été plaqués, au XXe siècle, entre les deux tours sud, la tour sud-ouest, pourvue d'une porte rectangulaire, renferme un escalier de pierre tournant à deux volées droites, deux portes en plein cintre s'ouvrent au rez-de-chaussée de la façade occidentale.  Le logis quadrangulaire encadré par deux grosses tours carrées sous toitures pyramidales.","habitants":"Famille de Louis-François de Lamartine \r\n        \"","divers":"Château de Lamartine Perrone de Vaux et la tour Penet","gps":"","images":["../image/image_71/71_Lamartine_Peronne_1.jpg","../image/image_71/71_Lamartine_Peronne_2.jpg","../image/image_71/71_Lamartine_Peronne_3.jpg"]},"Consult_chateau_formulaire225c-2":{"id":"Consult_chateau_formulaire225c-2","dept":"71","canton":"St-Germain-le-Plain","commune":"Lessard-en-Bresse","nom":"Lessard","type":"Maison forte","periode":"XV","histoire":"LESSARD en Bresse, propriété des Chalon au XIIIe siècle, des Montagu au XIVe siècle, puis des Lugny et des Saulx-Tavannes, la baronnie de Lessard en Bresse passa, vers 1700, aux La Baume-Montrevel qui la conservèrent jusqu'à la fin de l'ancien régime.","architecture":"Lessard en Bresse, l'ancien château fort en brique, défendu par quatre tours et cerné de fossés, fut en partie modifié vers 1835. Il subsiste, aux angles nord et sud, deux tours rondes en brique, coiffées de hauts toits coniques, à l'Est, un corps de logis de plan rectangulaire allongé est flanqué vers l'extérieur de deux tours carrées dont une est couronnée de mâchicoulis couverts.","habitants":"baronnie de Lessard \"","divers":"Château de Lessard et de Goudet","gps":"","images":["../image/image_71/71_Lessard_1.jpg","../image/image_71/71_Lessard_2.jpg","../image/image_71/71_Lessard_3.jpg"]},"Consult_chateau_formulairee45a":{"id":"Consult_chateau_formulairee45a","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"Leynes","nom":"Leynes_Correaux","type":"Château","periode":"XVI-XVII","histoire":"LEYNES, mentionné pour la première fois en 1423 pendant les guerres opposant Armagnacs et Bourguignons. Les Anglais, alliés des Bourguignons libèrent le château. Le comte de Clermont, Armagnac, lenlève  en 1432 à nouveau aux Bourguignons. Invasion du Mâconnais en  1471 par les troupes de Louis XI qui font brûler le château à partir de 1562  vente et rachat de la seigneurie de Leynes. Les guerres de religion en 1593 le château est pillé par le Seigneur de Nogent et ses troupes. Pendant plus dun siècle, le château est en état de ruine, retour à labbaye de Tournus en 1708 labbaye fait constater en 1715 létat de ruine et de vétusté des murailles. Après la Révolution, la terre et la seigneurie sont vendues en détail,  le château avec son enclos, ses cuves et pressoir à Jacques Lameyr.\r\nCORREAUX, Jean Bernard est l'héritier d'une longue tradition vigneronne. En effet, ce savoir-faire se transmet de père en fils depuis 1803. C'est un autre Jean Bernard (1768-1833) qui inaugure la filiation. Lui succèderont Antoine, Jean, Philippe, René, Victoire, aujourd'hui Jean, soucieux de perpétuer le vignoble familiale, il a toujours veillé à partager ses connaissances et ses expériences avec sa femme Marie Edith et ses trois fils Philippe, Vincent et Germain. C'est cette transmission à travers les générations qui a permis de constituer et de préserver l'entité d'un vignoble reflétant bien la diversité des climats viticoles de Leynes.       LAVERNETTE, propriété des moines de labbaye de Tournus devinrent la seigneurie de Lavernette en 1596. Les vignes faisaient déjà partie de ses biens et à cette époque, existait un tinailler ouchais, renfermant deux pressoirs et quatre grandes cuves, qui appartenait à la famille de Boissieu descendant de la famille de Lavernette. Depuis Nicolas Bernard de Lavernette né en 1536, Bertrand de Boissieu représente la douzième génération qui produit du vin à Lavernette.                                                                           Dans la commune le château Gaillard et de Creux-Noire.","architecture":"Le vieux château de Leynes, il reste en état de ruine pendant plus d'un siècle avant d'être reconstruit en partie en 1716. Le château est aujourd'hui rénové et a été aménagé en chambre d'hôtes et en gîte.                                                                                       Correaux; le château mêle l'architecture classique au style de la Bourgogne du Sud. Une large galerie mâconnaise typique traverse de part en part le château, son balcon porte le blason du château: \"d'Azur à trois faces d'or\".                                                            Lavernette, de nos jours la propriété de Lavernette, située au carrefour du Mâconnais  du Beaujolais sur les communes de Chaintré et de Leynes, le château est composé d'un corps principal de deux étages couvert d'un toit à la Mansart, à droite, un bâtiment dont le 1er étage est une galerie fermée, sur la gauche, les communs, comportant un ancien four à pain, sur l'arrière, on trouve une ancienne basse-cour entourée de bâtiments dont un cuvage.","habitants":"Comte de Clermont\r\n        \"","divers":"Le vieux château de Leynes, de Correaux, de Lavernette","gps":"","images":["../image/image_71/71_Leynes_Correaux_1.jpg","../image/image_71/71_Leynes_Correaux_2.jpg","../image/image_71/71_Leynes_Correaux_3.jpg","../image/image_71/71_Leynes_Correaux_4.jpg","../image/image_71/71_Leynes_Correaux_5.jpg","../image/image_71/71_Leynes_Correaux_6.jpg","../image/image_71/71_Leynes_Correaux_7.jpg","../image/image_71/71_Leynes_Correaux_8.jpg","../image/image_71/71_Leynes_Correaux_9.jpg"]},"Consult_chateau_formulaireae62":{"id":"Consult_chateau_formulaireae62","dept":"71","canton":"Cuisery","commune":"Loisy","nom":"Loisy","type":"Vestiges","periode":"XIV","histoire":"LOISY, la forteresse primitive,  cité en  1150 aurait été construite par Hugues de Brancion,  Henri de Paigny en 1287  tient Loisy en fief de son neveu Philippe de Vienne, qui lui-même le tient de l'abbaye de Tournus. Au XIIIe siècle, les Seigneurs de Loisy.  Châtellenie de Cuisery aux sires de Bagé. En 1230, les seigneurs d'Antigny sont propriétaires, en fief des de Vienne, en 1287, Henri de Paigny, fief de Philippe de Vienne (neveu de Henri), lui-même en fief de l'abbaye de Tournus. En 1289 entrée dans le duché de Bourgogne- Plusieurs familles dont les Quarré, Jean Quarré, écuyer,  au milieu du XIVe siècle, la terre appartient à la famille de Loisy, la forteresse fut détruite au XIVe siècle. Un nouveau château sera construit au 1556 par  Philibert  Quarré et son père, François Quarré de Verneuil sont dénommés seigneurs de Loisy. En 1565  le château est brûlé et pillé au cours des guerres de religion en 1570, au terme d'une saisie contestée, le bien est acquis par Jean Massol, bourgeois de Beaune et vers 1608  les descendants du précédent cèdent la propriété à Antoine Bretagne, conseiller au Parlement.  En 1633  reconstruction de la bâtisse et en 1650  Pierre Bretagne, premier président au Parlement de Metz, est seigneur de Loisy, les Bretagne revendent  en 1679 le domaine à Claude Bouchu, intendant de Bourgogne. à l'extinction de la famille Bouchu en 1735, Claude Guillaume, veuve de Bertrand de La Michodière, achète le domaine, en 1748  après avoir fait des transformations, le fils des précédents, Claude, conseiller au Parlement de Paris, cède l'ensemble à son neveu, Jean-François-Gabriel-Bénigne Chartraire de Bourbonne, gendre du président Bouhier et qui achèvera sans doute les travaux, le fils du précédent en 1761, Marc-Antoine Chartraire de Bourbonne, lui succède  depuis le XIXe siècle  la famille de La Chapelle possède le domaine  qui le gardera  jusqu'au dernier de la lignée Guy baron de la Chapelle maire de Loisy 1950.","architecture":"Loisy, un premier site d'occupation est attesté à proximité du château aux environs de l'an mille. Selon la tradition, la forteresse primitive aurait été bâtie en 1150 par Hugues de Brancion. L'ensemble s'organise à l'intérieur de deux enceintes.                      Trois châteaux successifs semblent avoir été construits et améliorés. Du deuxième château, détruit en 1565, reste deux tours rondes à archères et canonnières. L'édifice actuel date probablement du XVIIe siècle et fut remis au goût du jour au XVIIIe siècle. L'accès à la terrasse se fait par un portail cantonné de deux pilastres surmontés de vases de fleurs et d'une grille en fer forgé. Le château est formé d'un corps de logis rectangulaire, présentant une façade principale flanquée de deux tours carrées, la façade postérieure présente deux ailes en retour, reliées par un bâtiment couvert en terrasse, l'intérieur a été réaménagé au début du XIXe siècle, mais a vraisemblablement conservé son organisation ancienne, les deux tours bordant la cour au sud contiennent une superposition de trois salles, la tour sud-est conserve des peintures murales et un plafond peint du XVIIe siècle.\r\nUn jardin, un parc à l'angl
