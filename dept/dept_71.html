e, aujourdhui tronquée, a été incorporée dans le château à la fin du XIIIe siècle ou au début du XIVe siècle, elle en forme langle nord-est, le corps du logis se trouve au fond dune cour intérieure, il était prolongé à louest par le donjon et une tour. Durant la Révolution, les seigneurs de Chissey émigrèrent (le propriétaire était alors Nicolas de Fussey) et le château et les terres dépendantes furent vendus comme biens nationaux. Heureusement, il ne fut pas détruit comme beaucoup dautres et notamment comme le second château fort de Chissey qui, lui, a totalement disparu.                                Le Château de La Prée est un manoir du XVIIIe siècle siècle situé sur la rive droite du Ternin, à l'ouest du bourg, possédant des tourelles, ce fief était en 1404 à Andoche de Chissey, qui en fait aveu, il passera à la Maison du Buy.\r\nChâteau du Guidon, au lieu-dit les Goulots\r\nMaison forte de La Mothe-Chissey, ou des Roquets, origine du XVe siècle. \r\nMaison seigneuriale de Vaucheseuil.\r\nMaison seigneuriale de Souvert.\r\nManoir de Vaulsery dit La Grande Maison.","habitants":"Famille de  François de Cléron\r\n        \"","divers":"Château du Buis, de Guirdon, du Hauts Puy et  des Prèe","gps":"","images":["../image/image_71/71_Buis_Chissey_1.jpg","../image/image_71/71_Buis_Chissey_2.jpg","../image/image_71/71_Buis_Chissey_3.jpg","../image/image_71/71_Buis_Chissey_4.jpg","../image/image_71/71_Buis_Chissey_5.jpg","../image/image_71/71_Buis_Chissey_6.jpg","../image/image_71/71_Buis_Chissey_7.jpg"]},"Consult_chateau_formulaireb525":{"id":"Consult_chateau_formulaireb525","dept":"71","canton":"St-Gengoux-le-National","commune":"Burnand","nom":"Burnand","type":"Château","periode":"XV","histoire":"BURNAND; Château du XVe siècle. Une première mention de la seigneurie cité  en 1525 lorsque Philibert Cajod, est le seigneur de Burnand appartenant à une famille de militaires s'étant distingués au service des Saulx-Tavannes, acquiert le domaine. Charlotte de Brie en 1642, veuve de Philibert III Cajod, fait don du château aux Augustins qui y établissent un prieuré qui n'abritera pas plus de quatre à cinq moines. Après la Révolution en 1791 vendu comme bien national  au citoyen Monmessin et le domaine et acheté  en 1865 par M. de la Vernette Saint-Maurice qui effectue des restaurations en utilisant des matériaux prélevés au château de la Serrée.","architecture":"Burnand; bâti sur une terrasse rectangulaire, le château, vers 1835, comprenait deux bâtiments en équerre flanqués de tours rondes de hauteurs différentes, dans l'angle du L s'élevait une tourelle d'escalier, au nord courait une muraille couronnée d'un chemin de ronde, en 1865, une tourelle carrée et des tourelles en surplomb ont été ajoutées.","habitants":"Famille Philibert Cajod\r\n        \"","divers":"Château de Burnand","gps":"","images":["../image/image_71/71_Burnand_1.jpg","../image/image_71/71_Burnand_2.jpg","../image/image_71/71_Burnand_3.jpg","../image/image_71/71_Burnand_4.jpg","../image/image_71/71_Burnand_5.jpg","../image/image_71/71_Burnand_6.jpg","../image/image_71/71_Burnand_7.jpg","../image/image_71/71_Burnand_8.jpg","../image/image_71/71_Burnand_9.jpg"]},"Consult_chateau_formulaireb249":{"id":"Consult_chateau_formulaireb249","dept":"71","canton":"Buxy","commune":"Buxy","nom":"Buxy","type":"Château","periode":"X-XVI","histoire":"BUXY; Au Xe siècle est alors le siège d'une prévôté dépendant des comtes. Les conflits entre le roi de France et les comtes amènent le village à se fortifier à partir du XIIe siècle.  Les templiers s'installent dans la région vers 1185 à la demeure templière de Jully. Dans le procès de 1310, Martin de Buxy, un templier de cette maison, fut entendu comme témoin. En 1204, Béatrix, comtesse de Chalon octroie une charte précisant les droits et devoirs des habitants de Buxy. Les buxynois sauront faire valoir leurs droits. C'est la véritable naissance de la municipalité buxynoise.  En 1237, le chalonnais passe entre les mains du duc de Bourgogne Hugues. \r\nAprès la mort de Charles le Téméraire en 1477, le duché tombe entre les mains des rois de France (Louis XI). Dans la lignée des personnages importants ayant reçu Buxy, citons entre autres Marie de Savoye, marquise de Rothelin, puis la famille de Hochebourg. En succession, Buxy passa dans la famille de Longueville et à la Princesse de Condé, Françoise d'Orléans suivie par Charles de Bourbon. La veuve de Charles de Bourbon cède la terre de Buxy à Jacques du Blé, marquis d'Uxelles pendant environ un siècle. Les biens de Nicolas du Blé sont attribués au marquis de Beringhem, gouverneur de Chalon. Celui-ci vendit Buxy à François Henrion de Pressey, gouverneur des pages de la chambre du roi et trésorier de France en Bourgogne, son fils aîné, Camille sera le dernier seigneur de Buxy qu'il quittera, criblé de dettes.  Buxy n'échappe pas à la tourmente révolutionnaire. Une milice bourgeoise est créé le 24 juillet 1789. Elle deviendra la Garde Nationale et sera armée jusqu'en 1792,","architecture":"Buxy; Les murailles de Buxy sont laissées à l'abandon et les habitants construisent sur les remparts. Après la destruction de ce qui rappelle la féodalité (terriers, titres), vient la période des perquisitions et des ventes des biens du clergé et des émigrés, avec arrestations et réquisitions. Mais la population ne s'engage pas réellement à la suite de quelques révolutionnaires. Buxy participe à l'effort de guerre, ce qui permet à un enfant du pays, Claude Meuziau, de devenir général et baron d'Empire, puis plus tard baron héréditaire.                                                                     Châteaux de Cary Potet, les Raveaux, le Cray, et de la tour Bandin (aujourd'hui sur le territoire communal de Montagny-les-Buxy , anciennes tours denceinte, dont la tour du Roi et la tour Rouge qui abrite un caveau et un restaurant gastronomique.\r\nVestiges des anciennes fortifications.\r\nRuines de lancien château fort des Damas (tour de Tenarre). Tours escalier, tour Perrault (1531), tour Perrussot (vers 1550), tour Saccazand.","habitants":"Famille de Martin de Buxy\r\n        \"","divers":"Château de Buxy, de Cary-Potet, des Raveaux, de Cray et de la tour badin","gps":"","images":["../image/image_71/71_Buxy_1.jpg","../image/image_71/71_Buxy_2.jpg","../image/image_71/71_Buxy_3.jpg","../image/image_71/71_Buxy_4.jpg","../image/image_71/71_Buxy_5.jpg","../image/image_71/71_Buxy_6.jpg","../image/image_71/71_Buxy_7.jpg","../image/image_71/71_Buxy_8.jpg","../image/image_71/71_Buxy_9.jpg"]},"Consult_chateau_formulaire35e4":{"id":"Consult_chateau_formulaire35e4","dept":"71","canton":"Chagny","commune":"Chagny","nom":"Chagny_Bellecroix","type":"Château","periode":"XVII","histoire":"CHAGNY: Moyen Age Le bourg de cette commune fut mentionné en 840 dans une charte de Lothaire Ier. La première mention de Chagny date du règne de Charles le chauve. En 1220, un prieuré de l'ordre de Saint-Ruf fut fondé sur ce territoire. En 1369, Bertrand du Guesclin vient à Chagny pour décider les chefs des \"grandes compagnies\" (ayant leur base au château de Chagny), de partir pour la Castille, où ils participent à la guerre entre les deux compétiteurs au trône, Pierre le cruel et Henri de Transtamare. Ce faisant, il débarrasse la province de ces bandes qui la mettaient en danger.                                                                                  BELLECROIX; ancienne commanderie de l'Ordre de Saint-Jean de Jérusalem. Hôtel restaurant. est abrité dans l'ancien château (XIIe et XVIIIe siècles) situé en plein cur de la Bourgogne. Il allie tradition et confort moderne dans un cadre chaleureux.                    DIOT; construit en 1850 par Antoine Diot constructeur de la ligne Paris-Lyon-Marseille, fut un temps la propriété du colonel Mottet de la Fontaine ce dernier marié  à la veuve d'Henri Diot en 1943 le château fut réquisitionné par les allemands  et depuis 1976 appartient à l'UDOVEP (croix-rouge).","architecture":"Chagny; Le château médiéval est détruit au XVIIIe siècle par le baron de Chagny (famille de Clermont-Montoison), pour faire place à un bel édifice surmonté d'une coupole, achevé une douzaine d'années avant la Révolution. Corps de logis rectangulaire à trois niveaux avec attiques. Le nouvel édifice de l'ancien château médiéval est menacé de vétusté, il est détruit en 1866 sous la municipalité du maire Loydreau. Il fait place en 1889 à une école religieuse tenue par les frères maristes, le pensionnat Sainte-Marie. Le fondateur est l'abbé de Musy, curé de Chagny, qui réalise ainsi un vu fait à Lourdes où il a été miraculeusement guéri de sa cécité.\r\nBelllecroix; belle façade de ce manoir corps de logis encadré de deux tours rondes crénelées à mâchicoulis et toits en poivrières, sur l'arrière du bâtiments autre corps de logis à trois niveaux également accompagné d'une tour ronde à toit en poivrière.                        Chassy, corps de logis rectangulaire à deux niveaux flanqué de quatre tours rondes en angles à toits en poivrières. Diot, corps de logis rectangulaire à deux niveaux avec pavillon saillant accolé d'une tourelle  à toit en poivrière en façade et a l'opposé une tour ronde  avec toiture en coupole.                                                  Montessus, ensemble castral peut être daté du XIVe et du XVe siècle, avec quelques transformations au XVIIe siècle.                                  Au lieu-dit  Rabutin  emplacement d'un ancien château remplacé par une maison bourgeoise.","habitants":"Famille d'Antoine Diot\r\n        \"","divers":"Château de Bellecroix, de Diot et de Chassy","gps":"","images":["../image/image_71/71_Chagny_Bellecroix_1.jpg","../image/image_71/71_Chagny_Bellecroix_2.jpg","../image/image_71/71_Chagny_Bellecroix_3.jpg","../image/image_71/71_Chagny_Bellecroix_4.jpg","../image/image_71/71_Chagny_Bellecroix_5.jpg","../image/image_71/71_Chagny_Bellecroix_6.jpg","../image/image_71/71_Chagny_Bellecroix_7.jpg","../image/image_71/71_Chagny_Bellecroix_8.jpg","../image/image_71/71_Chagny_Bellecroix_9.jpg"]},"Consult_chateau_formulaire14e7":{"id":"Consult_chateau_formulaire14e7","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"Chaintré","nom":"Chaintre","type":"Château","periode":"XVI","histoire":"CHAINTRE; XIIe siècle, le château appartient à la famille de Chaintré, il est vendu en 1516 à Antoine Bernard, bourgeois de Mâcon, acquis en 1661 par Pierre Particelli, trésorier de France, industriel et banquier et après un remaniements qui le ruina le revend en 1679, passera par plusieurs mains, en 1715 il fut restauré par le cardinal Fleury abbé de Tournus, puis revendu en 1746 à Vincent Palerme seigneur de Chaintré, trésorier de France au bureau des finances générales de Lyon, ce dernier entreprit des embellissements du château, puis sera divisé en plusieurs  propriétaires à la Révolution,  en 1845 passe au père maristes et abrite pendant quelques années une école normale de professeurs. Il est acquis en 1868 par les maristes  qui cèdent le domaine à Ladislas-Jules de Beaussier, sa veuve ne le conservera  pas,  le comte de Beaussier qui lui donne l'aspect médiévale malheureusement il resta pendant des années sans entretien ce qui explique son état actuel.","architecture":"Chaintré; attesté en 1422 de ce château qui subit des modification, en 1471 se composait  à l'origine de bâtiments répartis autour d'une tour carrée  qui fut reconstruite en 1765  et c'est a cette époque  que fut établie la grande terrasse du château, divisée en trois sections avec de grosses tours à chaque angle, il n'est plus constitué aujourd'hui que d'un corps  central double et deux ailes en retour, l'aile méridionale, la plus ancienne mais aussi la plus restaurée est encadrée de deux tours rondes crénelées, reliés par des courtines  à l'est, le vieux  donjon crénelé, et à l'ouest, la tour dite de la prison, au centre, un passage voûté autrefois précédé d'un pont-levis s'ouvre dans une grosse tour carrée flanquée de poivrières. Jardin à la française.                                                  Château des Quarts du XIXe siècle quadrangulaire a deux niveaux de style moderne flanqué sur la partie opposée de deux pavillons à toits pointus.                                                                                 Dans la commune l'hôtellerie du château des Barge grosse bâtisse en équerre.","habitants":"Famille de Chaintré\r\n        \"","divers":"Château de Chaintré, des Quarts et des Barge","gps":"","images":["../image/image_71/71_Chaintre_1.jpg","../image/image_71/71_Chaintre_2.jpg","../image/image_71/71_Chaintre_3.jpg","../image/image_71/71_Chaintre_4.jpg","../image/image_71/71_Chaintre_5.jpg","../image/image_71/71_Chaintre_6.jpg","../image/image_71/71_Chaintre_7.jpg","../image/image_71/71_Chaintre_8.jpg"]},"Consult_chateau_formulaire98e6":{"id":"Consult_chateau_formulaire98e6","dept":"71","canton":"Chalon-sur-Saône","commune":"Chalon-sur-Saône","nom":"Chalon_sur_Saone","type":"Patrimoine","periode":"XII","histoire":"CHALON-sur-SAONE,  Jean Ier de Chalon, dit Jean l'Antique ou Jean le Sage, (1190-1267). En 1237, échange avec Hugues IV le Pacifique, duc de Bourgogne, les comtés de Chalon et d'Auxonne contre les seigneuries de Salins, de Bracon, de Vuillafans et d'Ornans, et conserve jusqu'à sa mort (1267) le titre de comte de Chalon qu'il transmet à ses descendants. Au milieu du XIIe siècle, Chalon obtient une charte communale.\r\nUn tournoi en 1273 entre le roi anglais Édouard Ier et le comte de Chalon est appelé « Petite guerre de Chalon ».\r\nLa ville est encore assiégée en 1478 par les troupes de Louis XI, puis revient, grâce à ce dernier prince, à la couronne de France, après avoir appartenu, de 938 à 1237, aux comtes de Chalon et, de 1237 à 1477, aux ducs de Bourgogne.\r\nCette ville joue encore un assez grand rôle comme place forte durant les guerres de religion du XVIe siècle. Charles IX entre dans la ville le 1er juin 1564 lors de son tour de France royal (1564-1566), et y reçoit, accompagné de la Cour et des Grands du royaume, un accueil triomphal.","architecture":"CHalon sur Saône, Ville d'art et d'histoire, possède un important quartier historique avec des vieilles maisons à colombages, de nombreuses ruelles, des tours et des tourelles, tourelle de l'impasse de la Gravière, tour du Beffroi datant du XVe siècle, en brique (cloches XVe et XVIe siècles), tour d'enceinte de l'ancien évêché, tour du Doyenné, hexagonale à cinq étages, du XVe siècle elle est couronnée d'une balustrade flamboyante et surmontée d'une échauguette, remontée sur l'île Saint-Laurent, tour de Saudon, à base romaine, tour de Coco-Louvrier du XVe siècle, tour des Lombards du XVe siècle, tour de l'Évêché médiévale, et tour de Marcilly. La tour de la Chancellerie qui fut la propriété de Nicolas Rolin est aujourd'hui complètement détruite.\r\nLa ville comprend d'autres fortifications avec les bastions du XVIe siècle (Saint-Pierre et Royal) bâtis sous Henri II. des remparts du XVIe siècle.","habitants":"Jean Ier de Chalon,\r\n        \"","divers":"Patrimoine de Chalon sur Saône","gps":"","images":["../image/image_71/71_Chalon_sur_Saone_1.jpg","../image/image_71/71_Chalon_sur_Saone_2.jpg","../image/image_71/71_Chalon_sur_Saone_3.jpg","../image/image_71/71_Chalon_sur_Saone_4.jpg","../image/image_71/71_Chalon_sur_Saone_5.jpg","../image/image_71/71_Chalon_sur_Saone_6.jpg"]},"Consult_chateau_formulairea764":{"id":"Consult_chateau_formulairea764","dept":"71","canton":"Chagny","commune":"Chamilly","nom":"Chamilly","type":"Manoir","periode":"XV","histoire":"CHAMILLY; Au XIIe siècle, les sires de Chamilly habitent vraisemblablement dans un premier château construit en dehors du village actuel. A la fin du XIIIe siècle  l'existence d'une maison-forte est attestée, le château passe en  1388 à Jean de Savianges, ll passe en 1400 à Pierre de Semur, il passe en 1440  à Jean Petitjean, seigneur de Chanceau-les-Marcigny, de Chamilly-en-Chalonnais, de Saint-Martin-du-Lac, époux de Ysabeau de la Porte, et père de Jean Petitjean, abbé de l'Abbaye de Saint-Martin d'Autun.  Vers 1500, il échoit aux Moroges, Claudine de Moroges apporte en 1543 la seigneurie à Jacques Bouton, son époux, et en 1644  Louis XIV érige la seigneurie en comté en récompense des services rendus par Nicolas Bouton, seigneur, puis comte de Chamilly, baron de Montaigu, petit-fils des précédents, ayant défendu Stenay durant quarante-cinq jours, il était devenu maréchal de camp. A la mort de Nicolas  en 1662, Hérard Bouton, son fils, lui succède,  il suit le duc d'Enghien en Espagne où il combat contre la France, est amnistié par Louis XIV après le Traité des Pyrénées et devient maréchal de camp et gouverneur du château de Dijon, son frère, Noël Bouton, est l'auteur des Lettres à une religieuse portugaise. Hérard Bouton meurt  en 1672 pendant la campagne de Hollande, son neveu, Louis-François Bouton, lui aussi maréchal de camp, lui succède en 1776, par Suzanne Martel, petite-fille, le fief échoit à Armand Joseph de Béthune, duc de Chârost, et en  1794, le fils, dernier seigneur de Chamilly, meurt sur l'échafaud. Le château actuellement exploité par Véronique Desfontaine et Fils,","architecture":"Chamilly; ruines sur le mont Garenne. Le château dont la cour est entourée par des bâtiments agricoles et un corps de logis principal comprenant sur la gauche une tour arrondie. Au XVIIe siècle, un bâtiment de style classique et un bâtiment en retour d'équerre ont été ajoutés.  Le domaine est situé à Chamilly, un petit village au nord de la région de Mercurey. Le château a été fortifié au XVIIe siècle hormis la tour qui date du XIVe siècle.","habitants":"Sires de Chamilly\r\n        \"","divers":"Château de Chamilly","gps":"","images":["../image/image_71/71_Chamilly_1.jpg","../image/image_71/71_Chamilly_2.jpg","../image/image_71/71_Chamilly_3.jpg","../image/image_71/71_Chamilly_4.jpg","../image/image_71/71_Chamilly_5.jpg"]},"Consult_chateau_formulairef749":{"id":"Consult_chateau_formulairef749","dept":"71","canton":"Givry","commune":"Mercurey","nom":"Chamirey","type":"Château","periode":"XI-XIX","histoire":"CHAMIREY.  Dans la commune, les ruines féodales et plusieurs châteaux dont celui de  Montaigu. A la fin du 10ème siècle, à la demande du Duc  de Bourgogne, le Comte Lambert de Valentinois fait construire un château pour contrôler la voie Chalon-Lyon. \r\nA la fin du XIIe siècle, Guillaume de Valentinois, Comte de Chalon, réalise des actes de pillages. En 1180, le roi Louis VII le Jeune déshérite Guillaume de Valentinois et cède le château de Montaigu à Hugues III duc de Bourgogne,  le château est propriété de Alexandre Montaigu-Bourgogne.  En 1205, le château appartient à Eudes Montaigu-Bourgogne,  en 1244, son fils Guillaume Montaigu-Bourgogne est le nouveau seigneur, il est le seul héritier à habiter au château.  En 1304, Eudes II Montaigu-Bourgogne est seigneur de Montaigu. A partir de cette date, le château loge des soldats. En 1338, le château appartient à Henri Montaigu-Bourgogne. En 1591, durant les guerres de religions, le château est assiégé par les Ligueurs.  A la fin du 16ème siècle, le Roi de France Henri IV demande la destruction du château. En 1803, le château est vendu à un \"marchand de biens\" qui démantèle le site et revend les pierres. En 1822, le Marquis d'Arcelot achète la ruine. \r\nDurant le XIXe siècle, de nombreux \"ermites\" habitent la ruine. \r\n En 1870, accusé d'espionnage, un dénommé Richer doit fuir la ruine. Les villageois détruisent les rares bâtiments encore habitables dont l'oratoire. Au XXIe siècle, la visite de la ruine est libre et gratuite.                             CHAMIREY, le château vinicole, la propriété passe des mains de la famille Dupaty de Clam à la famille du Marquis de Jouennes d'Herville. Aujourd'hui, Amaury et Aurore Devillard représentent la cinquième génération de Bourguignons, hommes et femmes du vin. En 1934, leur grand-père, le marquis de Jouennes, en précurseur, décide de mettre les vins du château de Chamirey en bouteille au domaine. A sa suite, son gendre, Bertrand Devillard, continue son oeuvre et agrandit le domaine dans les meilleurs terroirs.","architecture":"Chamirey;  Erigé au début du XVIIIe siècle, le château de Chamirey doit son apparence actuelle aux tours qui furent édifiées à la fin du XVIIIe siècle, après qu'un incendie ait détruit la chapelle attenante au château Montaigu,  le 2ème remparts, donjon et  logis, la partie centrale du château est entourée d'un rempart très arasé,                   Dans la commune le château d'Etroyes et de Jamproyes","habitants":"Famille du Comte Lambert de Valentinois \"","divers":"Vestiges féodals et Château de Chamirey","gps":"","images":["../image/image_71/71_Chamirey_1.jpg","../image/image_71/71_Chamirey_2.jpg","../image/image_71/71_Chamirey_3.jpg","../image/image_71/71_Chamirey_4.jpg"]},"Consult_chateau_formulairede53":{"id":"Consult_chateau_formulairede53","dept":"71","canton":"Chalon-sur-Saône","commune":"Champforgeuil","nom":"Champforgeuil","type":"Château","periode":"XIII","histoire":"CHAMPFORGEUIL; De sa construction à la Révolution Française  le château est la propriété des évêques de Chalon, cité en 1268  dans une prestation d'hommage faite par Hugues IV, duc de Bourgogne à l'évêque Guy de Sennecey. \r\nAprès le pillage et la dévastation du château en 1598 pendant les guerres de la Ligue, l'évêque Cyrus de Thiard fait établir un inventaire. \r\nLe château passe aux Musy en 1791. \r\nAu XIXe siècle, il est la propriété des Monnier.  et en 1909  il appartient à la famille Piffaut.","architecture":"Champforgeuil ,en 1598  faisait état d'un donjon, de cinq tours et de différents bâtiments, il ne reste aujourd'hui qu'une tour-porche à laquelle est accolée une tour circulaire sans doute plus récente et un grand corps de logis de plan rectangulaire.","habitants":"Evêques de Chalon\r\n        \"","divers":"Château de Champforgeuil","gps":"","images":["../image/image_71/71_Champforgeuil_1.jpg","../image/image_71/71_Champforgeuil_2.jpg","../image/image_71/71_Champforgeuil_3.jpg"]},"Consult_chateau_formulaire50e5":{"id":"Consult_chateau_formulaire50e5","dept":"71","canton":"Mâcon","commune":"Charnay-les-Mâcon","nom":"Champgrenon","type":"Château","periode":"XIV","histoire":"CHAMPGRENON,  appartenait à Aimé de Rymon de 1573 à 1645, procureur du roi et seigneur,  passa ensuite par alliance à la famille Rambuteau La personnalité du Comte de Rambuteau (1781-1869), chambellan de Napoléon 1er, préfet de la Seine, rayonne sur Champgrenon, deviendra au début du XIXe siècle un domaine très en vue, estimé et visité par lélite locale dont la famille de Lamartine. En 1997, il est acquis par la ville de Charnay-lès-Mâcon.                                                                                  Dans cette commune les château de Condemine et Verneuil ( voir article).","architecture":"Champgrenon;   belle porte du couchant dont le fronton porte linscription latine « Campus Grynaeus Musis et Apolloni Sacer » (Champgrenon, temple des Muses et dApollon). De cette époque date également le pavillon dentrée du domaine aujourdhui restauré  Un nouveau château tourné vers lorient, un parc paysagé réalisé par Jean-Marie Morel.  créateur de nombreux parcs et jardins nationaux, le domaine senrichit encore dune glacière et dune orangerie tout en conservant sa vocation agricole, la ville de Charnay-lès-Mâcon   qui engage  des travaux de restauration du patrimoine existant , porte du couchant, glacière, pavillon dentrée, bâtiments de ferme, puits et en fait un lieu dévénements culturels.","habitants":"Famille d'Aimé de Rymon\r\n        \"","divers":"Château de Champgrenon","gps":"","images":["../image/image_71/71_Champgrenon_1.jpg","../image/image_71/71_Champgrenon_2.jpg","../image/image_71/71_Champgrenon_3.jpg"]},"Consult_chateau_formulaire0184":{"id":"Consult_chateau_formulaire0184","dept":"71","canton":"Mesvres","commune":"La Tagnière","nom":"Champignolles","type":"Château","periode":"XV","histoire":"CHAMPIGNOLLES; Avant 1650 : propriété de N. d'Ecrot qui fut acheté par Charles Lebrun, comte du Breuil en Bourbonnais, qui, par testament, en 1650 crée avec son épouse Henriette de la Tournette un majorat en faveur de leur descendance. Au  XVIIIe siècle  Alexandre Lebrun, époux de Suzanne de Balathier-Lantage, entre en possession de ces terres. Antoine de Villiers-La Faye, gendre d'Alexandre, rejoint  en 1792 l'émigration.  Après la Révolution  Louis-Casimir Lebrun du Breuil fait annuler sa renonciation par la cour de Dijon et prend possession du château alors sous séquestre, et en 1836  fin de l'occupation du château par la famille Lebrun du Breuil. Le château est acheté en 1862 par Benoît-Charles de Maizière. Dans la commune le château de la Bussière et Trélarque (voir article).","architecture":"Champignolles; Le château, succédant à une demeure médiévale dont il a conservé les douves, date vraisemblablement du XVIIe siècle. Il se compose d'un corps de logis allongé complété à chaque extrémité d'un pavillon en saillie. Les communs forment deux ensembles, d'une part un long bâtiment bas terminé à chaque extrémité par une construction carrée et, d'autre part, un pavillon donnant sur la cour d'entrée.","habitants":"Famille de Lebrun\r\n        \"","divers":"Château de Campignolles","gps":"","images":["../image/image_71/71_Champignolles_1.jpg","../image/image_71/71_Champignolles_2.jpg"]},"Consult_chateau_formulaire47c7":{"id":"Consult_chateau_formulaire47c7","dept":"71","canton":"Charolles","commune":"Champlecy","nom":"Champlecy","type":"Château","periode":"XIV","histoire":"VIEUX-CHATEAU à Champlecy;  la famille de Boyer s'implante en 1520 sur cette terre. Jean de Boyer, en 1558 seigneur de Champlecy, est lieutenant général au bailliage de Mâcon. Jean-François de Champlecy obtient en 1602 d'Henri IV la substitution du nom de la terre de Champlecy à celui de Boyer  et au  début XVIIe siècle, le dernier des Champlecy bâtit le château non loin d'une ancienne motte que  son fils, en  1645 également nommé Jean-François de Champlecy, hérite de la seigneurie. Au milieu du XVIIe siècle, la nièce de Jean-François, Charlotte de Champlecy, baronne de Sainte-Croix, lui succède, elle épouse Jean-Éléonor de Damas et, en seconde noces, Charles de Batz de Castelmore d'Artagnan, modèle du héros d'Alexandre Dumas.  Louis II de Batz, en 1683 chevalier, baron de Sainte-Croix, seigneur de Castelmore et de Champlecy, comte d'Artagnan, fils cadet des précédents, leur succède.","architecture":"Champlecy; de l'ancien château fortement endommagé, durant les guerres de Religion, il reste aujourd'hui un bâtiment comportant un soubassement, un rez de chaussée, un étage éclairé de fenêtres à meneaux et croisillons, sous un toit à croupes, et flanqué sur sa façade nord d'une tour d'escalier en sailli défendue par une bretèche.                                                                             Champvigny ; D'une enceinte sans doute rectangulaire, il ne reste que deux tours circulaires coiffées d'un toit conique; la première, qui est aussi la plus importante, est flanquée d'une tour d'escalier; la seconde est flanquée d'une tourelle circulaire. Un parc à l'anglaise donne à l'ensemble un cadre romantique.                      VIEUX  Château à Champlecy, en 1645, le château est décrit comme une maison forte cantonnée de quatre tours, il n'en subsiste qu'un corps de logis de plan rectangulaire comprenant un étage de soubassement, un rez-de-chaussée et un étage couvert d'un toit à croupes, il est flanqué sur sa façade nord d'une tour d'escalier carrée hors uvre sur le pan, coiffée d'un toit en pavillon, que défend au nord, au niveau du second étage, une bretèche sur consoles à ressauts en quart-de-rond, sur le parapet de laquelle sont sculptées les armes de Jean de Champlécy.","habitants":"Famille de Damas de Champvigny\r\n        \"","divers":"Château de Champlecy","gps":"","images":["../image/image_71/71_Champlecy_1.jpg","../image/image_71/71_Champlecy_2.jpg"]},"Consult_chateau_formulaireee02":{"id":"Consult_chateau_formulaireee02","dept":"71","canton":"Epinac","commune":"St-Leger-du-Bois","nom":"Champsigny","type":"Château","periode":"XIII","histoire":"CHAMPSIGNY, au  XIIIe siècle un château est attesté pour la première fois début XVe siècle, propriété des Bréchard  Le fief, tenu au  XIVe siècle de Dracy-Saint-Loup, est entre les mains des seigneurs de Champsigny. A la fin du XVe siècle  il est la propriété de Robert et de Louis de Bournonville.  Au  XVIe siècle. Denis Poillot, président au parlement de Paris, et envoyé en ambassade auprès du roi d'Angleterre par François Ier, est seigneur du lieu, de 1566 à 1574, propriété du maire d'Autun, Jacques Bretagne. Le domaine appartient à la famille Mac-Mahon  au XVIIIe siècle, actuellement  le château est la propriété des descendants du maréchal de Mac-Mahon, duc de Magenta, président de la République française.de 1873 à 1879.  Dans la commune le château de Laly et une maison forte du XVe siècle et les ruines féodales de Champecuillon.","architecture":"Champsigny ; quadrangulaire,  Il ne reste du château d'origine qu'une porte d'entrée et une tour carrée. La porte monumentale, qui commandait un pont-levis, est couronnée de mâchicoulis, deux canonnières ont été aménagées de part et d'autre, dans le prolongement de la porte, la tour, haute d'un étage, comporte une grande salle avec une cheminée, une tourelle carrée lui a été accolée. En 1739, le domaine est décrit ainsi Le domaine seigneurial de Champsigny consiste dans le château exclusivement La partie la plus ancienne semble être une grosse tour barlongue, appareillée en pierres, au nord, le mur  se poursuit de part et d'autre de la tour, formait le mur d'enceinte polygonal du château fort, vers l'est, un bâtiment moderne à usage agricole s'y appuie, vers l'ouest, un corps de logis fait retour d'équerre, des corbeaux de mâchicoulis subsistent à l'angle extérieur.\r\nSt-Léger;  ruines féodales de Champecueillon, dans la cour, une tête noyée dans la maçonnerie et plusieurs fragments de sculptures sont encore visibles. Les anciens fossés  au  nord où se trouvait un petit moulin abandonné. Un bâtiment de commun date du XVIIe siècle.\r\nLaly; château récent, vers l'est, un bâtiment à usage agricole s'y appuie.","habitants":"Famille des Bréchard  et de  Louis de Bournonville\r\n        \"","divers":"Château de Champsigny","gps":"","images":["../image/image_71/71_Champsigny_1.jpg","../image/image_71/71_Champsigny_2.jpg","../image/image_71/71_Champsigny_3.jpg","../image/image_71/71_Champsigny_4.jpg","../image/image_71/71_Champsigny_5.jpg","../image/image_71/71_Champsigny_6.jpg"]},"Consult_chateau_formulairee40b":{"id":"Consult_chateau_formulairee40b","dept":"71","canton":"La Guiche","commune":"La Guiche","nom":"Champvent","type":"Château","periode":"XI-XVII","histoire":"CHAMPVENT; Au  Xe siècle  fut le  siège d'une viguerie. En 1329, Marguerite Choux de Fautrières tient ce fief de Guy de Chaumont. Et en 1350 Guillaume Quatrehuil est seigneur de Champvent. Pierre de Massy en 1372  est seigneur de la Maison-forte de Champvent. Elle est vendu en 1404 à Jean de Vérizet. Construite par Jean de Gouvernin au XVe siècle.  En 1433 maison-forte tenable, spacieuse et défendable contre les ennemis du Duc de Bourgogne. Il appartient au XVe siècle  à la famille de La Guiche, qui préférera faire de Chaumont sa résidence principale. \r\nEn 1646 fin de la construction de château actuel par Francois Martel ou Jean de Gouvernin,  passe  en 1680 à Claude de la Cour, écuyer est seigneur de Champvent\r\nDepuis le XIXe siècle, le château appartient à la famille Noirey puis par alliance aux familles de Franc et des Boscs.\r\nFin du XIXe siècle, construction d'un nouveau château.                       Dans la commune de la Guiche des ruines féodales du XV-XVIe siècle, le château (de Chaumont voir article) de Dravert du XVIIe siècle (chambres d'hôtes).","architecture":"Champvent, Ce château date de la seconde moitié du XIXe siècle. Un peu plus bas, le long du chemin, à létang, se trouvait une maison forte  construite dès le début du XIIIe siècle. . En 1838, on en discernait encore les vestiges.                                               \r\n le château actuel construit sur les ruines de l'ancien château est constitué d'un corps de logis à étage  carré avec fronton central encadré par deux tours rectangulaires et prolongé à son extrémité Est d'un pavillon de même élévation, en façade nord, au pied d'un étang, au milieu du corps central, se dresse une tour d'escalier octogonale, la façade est surmontée de quatre élégantes lucarnes à fronton avec des pots à feu sur la crête, sur une des lucarnes est mentionné le nom de l'architecte et l'année de construction \"François Martel 1646\". En 1838, il ne reste plus que des vestiges du château d'origine. \r\nA la fin du XIXe siècle : construction d'un nouveau château.","habitants":"Famille de Guy de Chaumont\r\n        \"","divers":"Château de Champvent, la tour Grammont et de Dravort","gps":"","images":["../image/image_71/71_Champvent_1.jpg","../image/image_71/71_Champvent_2.jpg","../image/image_71/71_Champvent_3.jpg","../image/image_71/71_Champvent_4.jpg","../image/image_71/71_Champvent_5.jpg","../image/image_71/71_Champvent_6.jpg","../image/image_71/71_Champvent_7.jpg"]},"Consult_chateau_formulairef415":{"id":"Consult_chateau_formulairef415","dept":"71","canton":"Palinges","commune":"St-Bonnet-Vieille-Vigne","nom":"Champvigny","type":"Château-fort","periode":"XV","histoire":"CHAMPVIGNY; à St-Bonnet  Vieille Vigne, cité dès  la fin du XIVe siècle propriété des Damas de Champvigny, en 1399. La maison forte échoit à Philibert de Vaux, fils de Jeanne Damas et de Guiot de Vaux, qui avait accompagné l'amiral Jean de Vienne en Écosse, puis à la  fin XVe siècle il fut la propriété d'Antoine et  de Léonard Germain, au  XVIIe siècle, propriété des Mathieu d'Essertines. Propriété de Georges-Melchior de Champier en 1721 et entre 1742 et 1945 appartient à la famille Quarré qui portait Échiqueté d'argent et d'azur; au chef d'or chargé d'un lion de sable, armé, lampassé et couronné de gueules. cette famille a conservé le château jusqu'à sa destruction  en 1944.                                                               Dans la commune de St-Bonnet de Vieille vigne le château de Gratery, de Velle et la tour Lévêque.","architecture":"D'une enceinte sans doute rectangulaire, il ne reste que deux tours circulaires; la première, qui est aussi la plus importante, est flanquée d'une tour d'escalier, la seconde est flanquée d'une tourelle circulaire.\r\nUn parc à l'anglaise donne à l'ensemble un cadre romantique.","habitants":"Famille de Philibert de Vaux\r\n        \"","divers":"Château de la Gratery, de velle et la tour Lévêque","gps":"","images":["../image/image_71/71_Champvigny_1.jpg","../image/image_71/71_Champvigny_2.jpg","../image/image_71/71_Champvigny_3.jpg","../image/image_71/71_Champvigny_4.jpg"]},"Consult_chateau_formulaire4ea0":{"id":"Consult_chateau_formulaire4ea0","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"Chanes","nom":"Chanes","type":"Château","periode":"XV","histoire":"CHANES. La cité était fortifié dès la plus haute antiquité. En 1601, son château appartenait à Messire Jean de la Chambre et, en 1671, à Louis Charrier de la Roche, seigneur de Crêches et Chânes. Avant la Révolution, son propriétaire était M. Nély, trésorier des Etats du Mâconnais, trisaïeul de M. du Cayla. Forestier.","architecture":"Chanes; château du XVIIe siècle dont la tour se confond avec le clocher de l'église, reste un corps de logis rectangulaire gros pavillon et tour carrée du XVe siècle (Beffroy).","habitants":"Famille de Jean de la Chambre \r\n        \"","divers":"Château de Chanes","gps":"","images":["../image/image_71/71_Chanes_1.jpg","../image/image_71/71_Chanes_2.jpg","../image/image_71/71_Chanes_3.jpg"]},"Consult_chateau_formulaire2752":{"id":"Consult_chateau_formulaire2752","dept":"71","canton":"Sennecey-le-Grand","commune":"Chapelle-de-Bragny","nom":"Chapelle_de_Bragny","type":"Château","periode":"XIV","histoire":"CHAPELLE de BRAGNY; Le château s'est transmis par successions jusqu'en 1466, date à laquelle il apparaît pour la première fois, entre les mains de Thibault de Sampigny. Il échut en 1566 à la famille Simon, qui l'aurait en partie reconstruit vers 1595, sans doute à la suite de dégradations consécutives au passage des troupes calvinistes. Puis en 1623, il passa des Simon aux Beugre, et en 1786 aux Raffin. Des aménagements importants furent exécutés au cours du dernier quart du XIXe siècle. Le domaine appartient de nos jours à la famille de Carmoy.","architecture":"La Chapelle de Bragny; le château du XVe siècle consiste en un quadrilatère irrégulier, flanqué d'une grosse tour ronde, de deux tourelles circulaires, d'une tour carrée, avec une partie de la muraille et le chevet de la chapelle, ces éléments constituent les éléments les plus anciens de l'ensemble, un pont de pierre, enjambant un fossé sec, mène à une tour-porche construite entre un logis, datant vraisemblablement de la fin du XVIIIe siècle, et un pavillon résultant de transformations plus récentes. Des communs occupent le côté nord de la cour. Les restes de l'ancienne enceinte, les façades et les toitures de la tour carrée, des deux tourelles rondes et du bâtiment d'angle, les murs de la nef de la chapelle englobés dans l'enceinte ont été inscrits monument historique par arrêté du 25 février 1974.","habitants":"Famille de Thibault de Sampigny\r\n        \r\n        \"","divers":"Château de la Chapelle de Bragny","gps":"","images":["../image/image_71/71_Chapelle_de_Bragny_1.jpg","../image/image_71/71_Chapelle_de_Bragny_2.jpg","../image/image_71/71_Chapelle_de_Bragny_3.jpg","../image/image_71/71_Chapelle_de_Bragny_4.jpg"]},"Consult_chateau_formulaire4dc0":{"id":"Consult_chateau_formulaire4dc0","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"La Chapelle-de-Guinchay","nom":"Chapelle_de_Guinchay","type":"Château","periode":"XV","histoire":"CHAPELLE de GUINCHAY; Château du Moyen-Âge, sur motte féodale, plusieurs seigneuries sont signalées, les Nuguets, les Paquelet, etc. La plus importante étant celle de Loize, Baronnie, dont la propriété passera en 1662 des Seigneurs aux Chartreux de Lyon qui en font lacquisition.\r\nLes Guerres de Religion, Il semble que la région ait été plutôt protestante. Le Seigneur de Loize, Jean de Lugny est lorganisateur dopérations guerrières contre Mâcon avec les Seigneurs de Chasselas ou de Berzé, il organise des prêches. Le Vicaire de La Chapelle se convertit au Calvinisme.\r\nLa Révolution et lEmpire, après les « brigandages » de 1789, selon Perraud, c'est-à-dire le sac de Loize et de différentes demeures peu dévénements notables en dehors de problèmes liés au réfractaires à la conscription qui semblent avoir été nombreux. En 1814, les autrichiens cantonnent à Pontanevaux.\r\nEn 1876, une religieuse du Saint-Sacrement dAutun crée lAsile Ferret qui porte son nom. De nos jours, la maison de Retraite du Bocage a pris la suite de lAsile Ferret.                           PRUZILLY; appartenait au nobles d'Amancé  dès le XVe siècle, en 1560 a  Antoine de Baldenay-Champvent, ensuite aux de la Porte qui le vendirent aux seigneurs de Vinzelles. A la Révolution, il appartenait à Monsieur J.M. Caillard seigneur de Chasselas, ce dernier  étant emprisonné comme suspect à Autun, ses biens son mis sous séquestre, Caillard  ayant obtenu sa liberté les séquestre furent levé  récupéra ses biens qui appartienne aujourd'hui à monsieur Sarbeck.","architecture":"La Chapelle de Guinchay, le château Bonnet, aux Paquelets, daterait du XVe siècle.\r\nLe château de Belleverne, construit vers 1867 par Jacques Condeminal sur les assises dune ancienne demeure dont il ne subsiste que la tourelle, il est de style Louis XV, très élégant et bien proportionné\r\nLe château de Beauchamps élevé en 1828, à Loyse\r\nLe château des Broyers a appartenu à bien des familles et a été rénové en 2005 afin de la transformer en université d'entreprises et lieu de séminaires.\r\nLe château de Loyse dont la partie nord et lancienne tour carrée remontent au moyen âge. Les autres logis et le pavillon sud ont été reconstruits en 1677. Il a souvent été lenjeu des duels Armagnacs-Bourguignons, et autres châteaux le Combe-Daroux,  le château des Boccards, face au château du cru Chénas.","habitants":"Famille des Nuguets\r\n        \r\n        \"","divers":"Château de la Chapelle de Guinchay, de Broyers, de Beauchamps, de combe Darroux, de Jean Loros, de Loyse et de Pruzilly","gps":"","images":["../image/image_71/71_Chapelle_de_Guinchay_1.jpg","../image/image_71/71_Chapelle_de_Guinchay_2.jpg","../image/image_71/71_Chapelle_de_Guinchay_3.jpg","../image/image_71/71_Chapelle_de_Guinchay_4.jpg","../image/image_71/71_Chapelle_de_Guinchay_5.jpg","../image/image_71/71_Chapelle_de_Guinchay_6.jpg","../image/image_71/71_Chapelle_de_Guinchay_7.jpg","../image/image_71/71_Chapelle_de_Guinchay_8.jpg","../image/image_71/71_Chapelle_de_Guinchay_9.jpg"]},"Consult_chateau_formulaired83f":{"id":"Consult_chateau_formulaired83f","dept":"71","canton":"Montcenis","commune":"Charmoy","nom":"Charmoy_Bost","type":"Château","periode":"XIII-XVII","histoire":"BOST à Charmoy,  fin du XIIIe siècle, les Du Bois, qui font partie de l'entourage des ducs de Bourgogne et comptent plusieurs baillis du Charolais, tiennent le fief. En 1360, pendant la guerre de cent ans, Guillaume du Bois combat grandes compagnies. De 1419 à 1442 Hugues du Bois, fils de Guillaume, est bailli du Charolais, son frère, Jacques du Bois, est seigneur de la Tour du Bost.  De 1477 à 1566, cette famille perd toute influence, lorsque Anathoire du Bois meurt, sans enfant, le domaine est divisé entre la maison de Moroges. A la fin XVe siècle, le domaine est réunifié par Charles de Moroges, puis passe à la famille de Chastellux qui le possède pendant une courte période,  passe à la famille Durand de Chalas. En 1719 après être passé entre plusieurs mains, le fief échoit à Jean-Maurice Durand de Chalas qui vendra au Massin de Maison Rouge. En 1744 Pierre Massin de Maison Rouge devient maître du domaine, ces derniers vendront à la famille Delglat. En  1752, à la suite d'une nouvelle vente, Jean-Paul Delglat, trésorier de France, en prend possession; ses descendants le conservent jusqu'au XIXe siècle. En 1815 la tour est occupée par les Autrichiens.\r\nLa famille de Charrin rachète à la fin du  XIXe siècle, le comte de Charrin fait construire à proximité un château en briques et en pierres, couvert d'ardoise.\r\nAu début du XXe siècle, propriété de F. Burdy, ingénieur au Creusot, la Tour est classée monument historique le 16 septembre 1908, elle est incendié en 1920 et déclassé par le décret du 2 août 1949, elle sera inscrite le 11 septembre 1995 puis à nouveau classé le 14 novembre 1997.\r\nBRUEL; Il fut construit de 1865 à 1868 par le comte J. de Charrin, ami dEugène Schneider, qui lhabita en 1870, lannée où il fut élu maire de Charmoy.","architecture":"Charmoy; Domaine fortifié d'Epoises du XV-XVIe siècle et château de la Tour, à Charmoy  vraisemblablement construite au XIIe siècle, haute de trois étages, fut modifiée et rehaussée de trois autres étages au XIVe siècle, abandonnée à des fermiers dès le XVIe siècle et finalement amputée de la tourelle qui la flanquait et d'une partie des bâtiments annexes qui l'entouraient, vers 1750. Tour rectangulaire de 13,70 mètres sur 11,30 mètres et haute de 43 mètres. Sa base est talutée. Ses deux sous-sols renferment l'un une cave et une citerne reliée aux étages supérieurs par un treuil établi dans l'épaisseur de la muraille orientale. La tour  comporte cinq étages formés chacun d'une seule pièce couverte d'un plafond à poutres apparentes, pourvus de vastes cheminées et de baies inégalement réparties, plus nombreuses et munies de meneaux aux étages supérieurs. L'ensemble est couronné d'une plate-forme que cerne un chemin de ronde aménagé, comme les escaliers qui relient entre eux les différents niveaux, dans l'épaisseur de la muraille, la porte primitive était au premier étage, une porte couronnée d'un fronton été ouverte au rez-de-chaussée dans la façade orientale vers 1640. Les bâtiment ont servit de carrières pour les châteaux de st-Nizier et de Montcenis, cette tour a subit un incendie  en 1920 par des scouts du Creusot qui à détruit planchers et toiture abandonné pendant 70 ans.        Dans la commune le domaine fortifie d'Epoises du XV-XVIe siècle et le château de Bruel du XIXe siècle.","habitants":"Famille de Hugues du Bois                                                          Famille de Charrin\r\n        \"","divers":"Château de Charmoy, de Bost et de Bruel","gps":"","images":["../image/image_71/71_Charmoy_Bost_1.jpg","../image/image_71/71_Charmoy_Bost_2.jpg","../image/image_71/71_Charmoy_Bost_3.jpg","../image/image_71/71_Charmoy_Bost_4.jpg","../image/image_71/71_Charmoy_Bost_5.jpg"]},"Consult_chateau_formulaire37f8":{"id":"Consult_chateau_formulaire37f8","dept":"71","canton":"Givry","commune":"Jambles","nom":"Charnailles","type":"Château","periode":"XV","histoire":"CHARNAILLES;  Agrippé au versant nord de la vallée de Jambles, le hameau de Charnailles, seigneurie autrefois indépendante, possède un château qui a été fortement remanié du XIXe siècle dans un style néo-gothique.  Cité en 1624 par une borne armoriée. Les ducs de Bourgogne offraient volontiers des vins locaux et, pour en assurer la qualité, Philippe le Hardi imposa le pinot noir partout dans le duché. Dès le IXe siècle, Jambles appartient à l'église puis à l'abbaye de Cluny et vers le XIe siècle à l'évêque de Chalon. Un cartulaire de Saint-Vincent de Chalon de 1263, mentionne la présence d'un établissement hospitalier qui reçoit des malades, des sans abris et des voyageurs au lieu-dit \"La maison-dieu\".   Au XVe siècle, les passages de gens d'armes, les intempéries et les épidémies se succèdent dans la commune. Edification du château de Charnailles au XVe siècle et propriété de la famille Ciry.         La « Confrérie Jambloise » voit le jour en 1508, en l'honneur du Saint-Sacrement. Devient la propriété de la famille Marloud au XVIIe siècle, puis de la famille de Jacques de Mucie au XVIIIe siècle.                                  En 1814, les Autrichiens passent et réquisitionnent des produits dans le village. Après le premier empire le château  appartient à Mr Pagan-Thorin.","architecture":"Château de Charnailles au XVe siècle a été rebâti au XIXe siècle, ce château se situe sur une colline, un peu en dehors du bourg de Jambles, sur le hameau de Charnailles, il est constitué avec l'édifice, d'une tour, d'un donjon et des vestiges de remparts.","habitants":"famille Ciry.\r\n        \"","divers":"Château de Charnailles","gps":"","images":["../image/image_71/71_Charnailles_1.jpg","../image/image_71/71_Charnailles_2.jpg","../image/image_71/71_Charnailles_3.jpg","../image/image_71/71_Charnailles_4.jpg"]},"Consult_chateau_formulaire12e8":{"id":"Consult_chateau_formulaire12e8","dept":"71","canton":"S-Germain-du-Bois","commune":"Frangy-en-Bresse","nom":"Charnay_Frangy","type":"Château","periode":"XV","histoire":"CHARNAY; Une villa gallo-romaine a été découverte au Piochet.\"Frangiacum\" est cité dés 1065. C'est une propriété de l'abbaye de Baume en 1111.  Frangy donne son nom à une famille au XIVe siècle. Au XVe siècle la terre est aux Bouton du Fay.  Elle est morcelée au XVIIe siècle et devient propriété des Fyot de la Marche. Clémencey est un point stratégique dominant la route entre Suisse et Saône, près de la Comté. Au Moyen Age les sires de Sainte-Croix contrôlaient le trafic sur cette route et sur la Seille qui devient navigable en ce lieu. Le moulin seigneurial de Clémencey est cité dés 1404, le château de Clémencey édifié par les Fyot est détruit à la Révolution.  Dans la première moitié du XVIIe siècle les Courdier font construire leur maison à l'Abergement, fief dépendant de Montcony, et les de La Rodde font construire leur château à Charnay  en 1825, en remplacement du château fort détruit le 14 avril 1640 par les Comtois,","architecture":"Charnay; Château en brique de plan en L, constitué d'un corps principal flanqué d'un pavillon oblong sur sa droite, deux bâtiments de dépendances en vis à vis étaient situés à l'est du château, perpendiculairement à ce dernier,  la façade du corps principal est symétrique. L'unique porte, axiale, est  surmontée d'un médaillon en pierre dont le blason a été bûché. A la fin du XIXe siècle, il devient un domaine agricole, trois lucarnes sur le versant antérieur du toit  du corps principal et  une sur le toit du pavillon, il n'en restait qu'une en 2006, très détérioré pendant la deuxième moitié du XXe siècle, le château à subi de gros travaux depuis 2006. L'oeil de boeuf percé dans la fenêtre obturée surmontant la porte axiale date de ces derniers.","habitants":"Famille des Fyot de la Marche\r\n        \"","divers":"Château de Charnay","gps":"","images":["../image/image_71/71_Charnay_Frangy_1.jpg","../image/image_71/71_Charnay_Frangy_2.jpg","../image/image_71/71_Charnay_Frangy_3.jpg","../image/image_71/71_Charnay_Frangy_4.jpg"]},"Consult_chateau_formulaire19aa":{"id":"Consult_chateau_formulaire19aa","dept":"71","canton":"Mâcon","commune":"Charnay-les-Mâcon","nom":"Charnay_Macon","type":"Château","periode":"XV-XVIII","histoire":"CHARNAY-les Mâcon; Commune garnie de onze châteaux, l'histoire de Charnay  fut marquée, de 1500 à 1650, par les guerres de religion, dont il reste aujourd'hui un vestige, le Vieux Temple, sur l'ancien fief de la Bâtie, puis, tout au long de la période médiévale, par les luttes franco-bourguignonnes.\r\nCHEVANIERE;  Depuis 1994, lensemble est la propriété dune association, les amis de Médialogue-La Chevanière, qui accueille une vingtaine de personnes adultes handicapées.                    GERARDES; Château  de la famille Gérards puis aux Gonnard-Chartron.                                                                                 MERAC; le château en 1750 est la  propriété de François Rubat de Mérac avocat au parlement, les héritiers sont la famille Chapuis.                    Les NEUF-CLES; Château  appelé aussi  château des  Lutaud construit dans l'ancien domaine  de l'abbaye de st-Pierre de Mâcon limité par neuf bornes portant les clés.                                           PERTHUIS; Château appelé aussi Mirandol, a appartenu aux Ferret au Piat et aux Veber, aujourd'hui à la famille de Schaad et Hugli.                                                                               TOURNACHE; de Ange Henri Vitallis qui construisit ce château en 1855  sa descendance y restera jusqu'en 1907, se succéderont la famille Delfau de Belfort, Hervé de Casiny, Jean Charmont et sera ensuite vendu en 1975 à la famille Calvagrac, il s'en sépare en 2004. Château de ROUJOUX, pas d'article, pour les châteaux  de La Codemine, de Champgrenon, de la Tour de l'Ange, St-Léger et de Verneuil (voir article).","architecture":"Charnay-les-Mâcon. C'est un monument bâti au cours du Moyen-Age mais remanié durant les siècles suivants. Un vestige imposant et raffiné à découvrir,   porte fortifiée Ouest de la Cité.              CHEVANIERE; ce château date du début du XIXe siècle. Il comporte un corps de bâtiment central flanqué de deux pavillons carrés et entouré dun parc décoré de statues à lantique.     GERARDES; Composé dun corps de bâtiment et de deux ailes.                       MERAC du XVIIIe siècle  corps de logis rectangulaire à trois niveaux                                                                             \r\nNEUF-CLEFS; Il a été construit sur le périmètre de lancien domaine de labbaye Saint-Pierre de Mâcon limité par neuf bornes portant les clés, attributs du Saint-Patron. On appelle également la propriété château Lutaud.                                             \r\n PERTHUIS ; corps de logis rectangulaire à deux niveaux flanqués de pavillons saillants aux extrémités avec fronton triangulaire et  tour mirador au centre  sur le toit.                                     TOURNACHE; construit vers 1855 réduit d'un étage suite à un incendie en 1973.\r\nArticle des châteaux Condemine, Champgrenon, St-Léger,la tour de l'Ange et  de Verneuil.","habitants":"Divers seigneurs\r\n        \"","divers":"Les châteaux de Charnay les Mâcon, Chevanière, Gérardes, Mérac, Neuf-Clés, Perthuis, Tournache et de Roujoux","gps":"","images":["../image/image_71/71_Charnay_Macon_1.jpg","../image/image_71/71_Charnay_Macon_2.jpg","../image/image_71/71_Charnay_Macon_3.jpg","../image/image_71/71_Charnay_Macon_4.jpg","../image/image_71/71_Charnay_Macon_5.jpg","../image/image_71/71_Charnay_Macon_6.jpg","../image/image_71/71_Charnay_Macon_7.jpg","../image/image_71/71_Charnay_Macon_8.jpg","../image/image_71/71_Charnay_Macon_9.jpg"]},"Consult_chateau_formulaire9dfc":{"id":"Consult_chateau_formulaire9dfc","dept":"71","canton":"Bourbon-Lancy","commune":"Charnay-Perrigny-sur-Loire","nom":"Charnay_Perrigny","type":"Château","periode":"XV-XVI","histoire":"CHARNAY-PERRIGNY; Le château appartient à la famille de Rumilly au début du XVe siècle. Jean de Rumilly vend la propriété au  début du XVIIIe siècle à Claude Morey de Vianges. Celui-ci transmet la demeure en 1755, à Jean-Baptiste Mac-Mahon, marquis d'Éguilly, écossais, grand-père du maréchal.                                                    Dans la commune le château de la Vallée du XVIIIe siècle et une maison forte dite de Charnay.","architecture":"Charnay-Pérrigny; Les bâtiments d'habitations et  les communs sont disposés autour d'une cour carrée. A l'angle nord est, une tour ronde, flanquée d'une tourelle d'escalier a été construite au XVe siècle, le corps de logis principal, de la même époque, a été remanié au XVIIe siècle et profondément transformé de l'extérieur au XIXe siècle. À l'intérieur, il renferme une cheminée monumentale et les fresques restaurées de l'ancienne chapelle, l'ensemble datant du  XVe siècle.","habitants":"Famille de Rumilly\r\n        \"","divers":"Château de Perrigny","gps":"","images":["../image/image_71/71_Charnay_Perrigny_1.jpg","../image/image_71/71_Charnay_Perrigny_2.jpg"]},"Consult_chateau_formulaire3699":{"id":"Consult_chateau_formulaire3699","dept":"71","canton":"Charolles","commune":"Charolles","nom":"Charolles","type":"Château","periode":"XII-XVI","histoire":"CHAROLLES; siège d'une vicomté dépendant d'Autun au Xe siècle: rattachement au comté de Chalon. Le comte rend hommage en 1166 au roi Louis VII tout en se reconnaissant vassal du duc de Bourgogne, La forteresse entre dans le domaine ducal en 1237 lors de l'achat du comté de Chalon par Hugues IV, établissement d'un bailli. Charolles devient en 1277 la capitale et le siège des états particuliers du comté de Charolais, le comté regroupe six châtellenies et est inféodé à Béatrice de Bourgogne, nièce de Robert II de Bourgogne. La ville reçoit en 1301 sa charte de Robert de Clermont, époux de Béatrice de Bourgogne, par mariage, en 1327 le comté passe à la maison d'Armagnac en la personne de Jean Ier d'Armagnac. Bernard VII d'Armagnac, en 1391 petit-fils, ayant de pressants besoins d'argent, vend le comté à Philippe II de Bourgogne, la ville devient à nouveau le chef-lieu d'un bailliage\r\nA la mort de Charles le Téméraire, en 1477 le comté est rattaché au royaume de France, de 1493 à 1684 restitution à la maison d'Autriche, le prince de Condé en 1684 se voit attribuer le comté en paiement des dettes contractées par les Habsbourg. Rattachement en 1751 aux États de Bourgogne, Louis XV achète en 1761 le comté à Mlle de Charolais et le réunit définitivement à la couronne.\r\nCharolles était, à la veille de la Révolution, la 14e ville de la grande roue des États de Bourgogne, siège du bailliage royal de Charolles, de la maréchaussée et prévôté, du grenier à sel et de la subdélégation de Charolles.                                                FONTENAY; Le château du XVIIe siècle est une propriété privée. La maison forte de Fontenay fut le centre d'un petit fief dont l'histoire reste assez obscure, en 1625 François de Charolles est titulaire du fief et en 1666, la seigneurie est aux mains de Pierre de Rimon.","architecture":"Charolles. Vestiges du château féodal, la tour de Charles le Téméraire du XIVe siècle dominant  la ville, la porte fortifiée encore visible dans ce château des comtes de Charolais est installée aujourd'hui la mairie.                                                                  Château de Corcelles, demeure, 1er quart du XXe siècle, les structures porteuses et les couvertures du château le décor intérieur du grand hall et de la cage d' escalier avec son vitrail, de la salle à manger avec ses vitraux, le puits, les structures porteuses du pavillon d' entrée font  parties de l'inscription par arrêté du 17 août 2005. Château construit de 1905 à 1908 par l'architecte Jean Boirivant.\r\nCouvent des Ursulines (ancien), du 1er quart du XVIe siècle. Les façades et les toitures sur rue et sur cour, inscription par arrêté du 27 septembre 1948.\r\nM.F. de Fontenay, il reste un gros pavillon carré  à deux étages, flanqué sur sa façade ouest d'une tour d'escalier circulaire hors oeuvre à laquelle on accède par une porte rectangulaire encadrée par deux pilastres toscans portant un entablement décoré de triglyphes, au-dessus figure une cartouche dont les armoiries ont été bûchées.\r\nCe type de manoir, qui associe un gros bâtiment carré à une tour d'escalier ronde ou polygonale, est typique du sud du Charolais et de l'ouest du Mâconnais.","habitants":"Famille de Pierre de Rimon\r\n        \"","divers":"Château de Charolles, de Corcelles la tour, et le manoir de Fontenay","gps":"","images":["../image/image_71/71_Charolles_1.jpg","../image/image_71/71_Charolles_2.jpg","../image/image_71/71_Charolles_3.jpg","../image/image_71/71_Charolles_4.jpg","../image/image_71/71_Charolles_5.jpg","../image/image_71/71_Charolles_6.jpg","../image/image_71/71_Charolles_7.jpg"]},"Consult_chateau_formulaire7e15":{"id":"Consult_chateau_formulaire7e15","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"Chasselas","nom":"Chasselas","type":"Château","periode":"XIV","histoire":"CHASSELAS; Le village de Chasselas prend ses racines il y a très longtemps. Le nom de Chasselas vient en effet du latin Caccelacum,  passa ensuite sous l'autorité du seigneur de Chasselas au Moyen-Âge jusquà la Révolution. Chasselas connu  un essor au XVIIe siècle grâce à son vin très apprécié à Versailles par Louis XIV et ses sujets.  Au début XIIIe siècle le fief appartenait  par la famille de Chasselas.\r\nPossession des du Roux, mentionnés de 1485 à 1591; la dernière de la lignée, Judith du Roux, dame de Chasselas et de Pouilly, épouse successivement Lyonnet de Challes, huguenot, décapité pour banditisme à Trévoux, et Philibert de Bellecombe, seigneur de Vinzelles, le fils de Judith et de Philibert, Jacques de Bellecombe, meurt en 1629 de la peste, ainsi que son épouse. En 1654 assassinat de Claude de Bellecombe, fils, suite à cela la famille vend le château  en 1706 en mauvais état, à Thomas Paisseaud, receveur du Mâconnais, ce dernier, ruiné, en 1727  vend la propriété à Laurent Fayard endetté à son tour,  cède le château en 1756 à Laurent de La Fond de La Rolle. A nouveau, en 1774 le domaine doit être abandonné à un créancier, Etienne Cellard d'Estours, dont les armes se composent de trois tours, en mars 1789  le fils ne peut empêcher le pillage et la démolition d'une tour, mais parvient à conserver le reste et en 1971  Mr Reme et son épouse, née de Cuverville (armoiries sur l'oriflamme d'une des tours), rachètent le château à l'abandon et mettent toute leur énergie pour le restaurer.\r\nAujourd'hui Le château appartient à la Société Civile Agricole de Chasselas.","architecture":"Château de Chasselas des XIVe et XVIIIe siècle trône aussi au milieu du village, il s'articule autour d'une vaste cour d'honneur flanquée de trois tours en poivrières recouvertes de tuiles vernissées. Les bâtiments entourent une cour rectangulaire ouverte au nord par un étroit passage aménagé entre des communs. Le corps de logis, à l'est, date du XVIe siècle. Une tour circulaire se dresse à proximité, à l'angle du potager, une seconde tour flanqué à l'angle nord-ouest, elle est reliée à une troisième tour par des constructions à usage agricole, le logis principal, qui date de la fin du XVIIIe siècle, est situé au sud; il comporte un corps central entre deux ailes en retour d'équerre, reste malgré tout une maison forte.","habitants":"Famille de Chasselas.\r\n        \"","divers":"Château du Chasselas","gps":"","images":["../image/image_71/71_Chasselas_1.jpg","../image/image_71/71_Chasselas_2.jpg","../image/image_71/71_Chasselas_3.jpg","../image/image_71/71_Chasselas_4.jpg"]},"Consult_chateau_formulairebf9f":{"id":"Consult_chateau_formulairebf9f","dept":"71","canton":"Gueugnon","commune":"Chassy","nom":"Chassy","type":"Château","periode":"XV","histoire":"CHASSY; Deux seigneuries se sont affrontées au cours des ans, les du Bois et la seigneurie de Pierre de Chassy cité en 1250 de Renaud \"Picoisat\" possédait le fief qui passa au seigneur du Bois en 1316 passa en 1484 au du Choux puis au de Bernaud en 1542 à Antoine de Damas  baron de Digoine Clessy et Chassy, en 1654 toujours par alliance en 1576  à Henri  François de la Guiche comte de Savignon, en 1715 la famille Rousset qui en ont hérité vende aux Cochardet et ces derniers le revendirent à Jean Hector de la Fay  marquis de la Tour-Maubourg fondateur des forges de Guegnon, racheté par les Bédouin de Digoin en 1779,  le revende à Hugues Meyneaud de Bizefranc qui le revende à leur tour aux de Barbaçon qui durent émigré en 1791 furent condamné à mort  mais avait vendu avant à Jean Baptiste Perot marchand de bois à châlons sur Saône  qu'il revendit en 1793 aux Moreton de Chabrillan passa ensuite aux de Montholon qui le garderont jusqu'en 1903 passa à Benoist de Genlissart, de 1910 à 1997 l'actuel château est la propriété de la famille Bernard de Benoist de Gentissart époux de Sabine-Marie-Laurence Orsel des Sagets.  L'autre seigneurie de Chassy les Fontenaille cité en 1262 par Hugues de St-Privat tient Fontenaille de Guichard de Chaumont jusqu'en 1366 passa aux de Choux en 1476 par alliance au Daval, jusqu'en 1645 passa à Sunon de Changy  seigneur de Changy et de Fontenaille, dans cette famille  jusqu'en 1748 passa aux de Meyneaud.","architecture":"Chassy ; Le château  est situé à la sortie Est du village, perché sur le flanc dun petit vallon où naît le ruisseau de Clessy. Laspect actuel date en majeure partie du XVe siècle. Le château est bâti sur une ancienne maison-forte portant la date de 1056,  au-dessus dun robuste corps de logis pointe deux tours rondes, une tour carrée et une tour hexagonale à toit en poivrière. À proximité se trouve une ancienne dépendance et un colombier circulaire massif. flanqué de deux tours d'angles circulaires percées de fenêtres rectangulaires ouvertes au XVIIe siècle, l'étage de comble est éclairé de lucarnes à frontons. On accède à la cour autour de laquelle s'ordonne l'ensemble des bâtiments par un passage voûté en plein cintre. Au dessus de la porte, les fentes du balancier de l'ancien pont-levis, aujourd'hui remplacé par un pont dormant de pierre qui franchit le fossé asséché aux deux autres angles deux tours carrées.","habitants":"Famille d'Antoine de Damas\r\n        \"","divers":"Château de Chassy","gps":"","images":["../image/image_71/71_Chassy_1.jpg","../image/image_71/71_Chassy_2.jpg","../image/image_71/71_Chassy_3.jpg"]},"Consult_chateau_formulaired8c6":{"id":"Consult_chateau_formulaired8c6","dept":"71","canton":"Chalon-sur-Saône","commune":"Chatenoy-en-Bresse","nom":"Chatenoy","type":"Château","periode":"XVI","histoire":"CHATENOY; Le premier propriétaire du château, en 1649, a été Jean Baptiste Brunet. Trois familles se sont succédé à Chatenoy,  en 1650 la famille Brunet,  Jean-Baptiste, 1682 avocat, épouse Anne Bertot,  Paul, son fils, avocat et secrétaire du roi, épouse Marie Brusson. Claude, fils  de Paul, également avocat et secrétaire du roi, épouse Anne Barault.  Jacques Philibert, en 1744 écuyer, fils de  Paul, épouse Jeanne Désir. Louis Charles, en 1777  fils de Jacques, épouse Catherine Denon. \r\nEn 1809  Vivant Jean  (1778 - 1866), général et député de la Saône-et-Loire, est baron d'Empire, il avait épousé Élise Rosalie Lefebvre. Vers 1830 Élise (1814 - 1894), épouse Jean Joseph, baron de La Roche Nully la Carelle qui en 1863. Geneviève Marie Vivantine (1834 - 1921), épouse Édouard, comte Claret de Fleurieu. passera ensuite à la famille Mazenod, dans la seconde moitié du XIXe siècle, Albert, vicomte de Mazenod (1846-1939), achète le château à la famille précédente. Il épouse en première noce Élisabeth Marie Thérèse, fille du marquis de Sainte-Croix, puis, en 1879, Henriette de Virieu, sa fille Catherine obtient la jouissance du château alors que son fils Henri réside dans la maison de garde.\r\nL'ensemble du domaine est acheté par la commune en  1977. Le rez-de-chaussée du château constitue la mairie et le premier étage est aménagé en appartements locatifs. Les communs sont transformés en salle des fêtes et la maison de garde en bibliothèque.","architecture":"Chatenoy, l'ensemble de cette propriété comprenait un grand corps de logis avec un étage et une chapelle, les communs formés d'un important \"chalet\", une maison de gardien, une orangerie et un parc. Tous ces bâtiments datent environ du XVIIe siècle.\r\nLe parc situé en plein cur de Châtenoy est un lieu de détente de 14 hectares comprenant le château (mairie), \r\nLa commune acheta la propriété en 1977, la façade des communs a été restaurée, l'orangerie a été démolie, le parc qui s'étend sur 7 ha est planté de huit cent arbres appartenant à quarante espèces différentes.","habitants":"Famille de Jean Baptiste Brunet\r\n        \"","divers":"Château de Chatenoy","gps":"","images":["../image/image_71/71_Chatenoy_1.jpg","../image/image_71/71_Chatenoy_2.jpg"]},"Consult_chateau_formulaire6a19":{"id":"Consult_chateau_formulaire6a19","dept":"71","canton":"Lugny","commune":"Viré","nom":"Chatillon_Vire","type":"Château","periode":"XIV","histoire":"CHATILLON. Au début XVIe siècle constitution du fief de Châtillon par Pierre de Meaux, bourgeois de Mâcon, qui y aménage une demeure possédant tous les attributs seigneuriaux, notamment une tour-porche précédée  d'un pont-levis. Jusqu'en 1834 le château est la propriété de la famille de Meaux. \r\nVIRE; Château de Vérizet, vestige d'un château fort, propriété des évêques de Mâcon, en 1315, Geoffroy de Berzé.      Dans la commune:  Château des Evêques de Mâcon commune de Verizet.           Manoir de Poiseuil (chambres d'hôtes de Jean-Christophe Robinet à le Haut de St-Albain.","architecture":"Châtillon; Château du XV-XVIIIe siècle, le château est un bâtiment rectangulaire flanqué d'une tour carrée et d'une tourelle circulaire un peu plus élevées que lui et, sur la façade donnant sur la cour  qui le sépare des communs, d'une tourelle d'escalier  polygonale. Deux tours rondes, l'une renfermant un pigeonnier, s'élèvent de part et d'autre des communs. deux corps de bâtiment placés de part et d'autre d'une cour et munis chacun de deux tours d'angle. La commune acheta la propriété en 1977, la façade des communs a été restaurée, l'orangerie a été démolie.                                       Château des Evêques de Mâcon commune de Verizet, commune rattaché à Viré, reste quatre bâtiments disparates entourant une porte fortifiée.","habitants":"Famille de Pierre de Meaux\r\n        \"","divers":"Château de Chatillon, de Viré, de Vérizet et de Poiseuil","gps":"","images":["../image/image_71/71_Chatillon_Vire_1.jpg","../image/image_71/71_Chatillon_Vire_2.jpg","../image/image_71/71_Chatillon_Vire_3.jpg","../image/image_71/71_Chatillon_Vire_4.jpg","../image/image_71/71_Chatillon_Vire_5.jpg","../image/image_71/71_Chatillon_Vire_6.jpg","../image/image_71/71_Chatillon_Vire_7.jpg"]},"Consult_chateau_formulaire9bdf":{"id":"Consult_chateau_formulaire9bdf","dept":"71","canton":"Chauffailles","commune":"Chauffailles","nom":"Chauffailles","type":"Maison forte","periode":"XV","histoire":"CHAUFFAILLES; En 1234 le seigneur Gérard de Villon, allié aux seigneurs de Dun, lègue à son fils Renaud six terres situées sur la paroisse de Saint-André (ancien nom de Chauffailles), Les Combes, Layes, Martin du Moulin, le Montcel, La Renauderie, La Vaure ainsi que des droits sur La Chèse, Mazoncle, Vellon et Ventrigny , et à son fils Hugues, les terres de Villon et Chalaye, lesquelles dépendent de la paroisse de Saint-Germain-la-Montagne. \r\nEn l'absence d'héritier mâle, en 1380 le titre de seigneur de Chauffailles passe à Jean d'Amanzé par alliance avec Antoinette de Villon, fille de Jacques de Villon. Jean d'Amanzé s'installe en 1383 à Chauffailles,  onze générations de cette famille vont s'y succéder. passe en vicomté en 1617 et prennent le titre de vicomte. \r\nPuis par alliance de Marie-Cécile d'Amanzé avec Claude-Marie de Saint-Georges en 1718,  toujours par alliance de Claudine-Marie-Josèphe de Saint-Georges avec Abel-Claude-Marie de Saint-Georges, marquis de Vichy,  Abel-Claude-Cécile de Saint-Georges, en  1800, hérite du château,  peu après, les fossés sont comblés, les deux ailes démolies, les dépendances morcelées et vendues.  Le marquis de Vichy Saint-Georges vend  en 1809 le château au maire de Chauffailles, Pierre Deville. Auguste Goyne, également maire de la commune, achète à son tour le château en  1809, il va y effectuer d'importantes réparations et transformations. \r\nAcquisition par l'industriel Casimir Dumoulin en 1882, filleul du précédent, qui établit une fabrique de tissage dans les communs remaniés, il épouse Elise Reynier, de Saint-Germain-la-Montagne. \r\nEn 1941 Elisabeth Dumoulin, leur  fille, lègue par testament le château à l'hôpital de Chauffailles. \r\nAcquisition  en 1981 par la commune et transformation en centre sportif.","architecture":"Chauffailles; En 1400, construction du château par Jean d'Amanzé. Fait rare dans l'histoire locale de la Révolution de 1789, le château n'est pas séquestré comme bien national,  toutefois, il subit des dommages lourds, deux ailes entièrement rasées, fossés comblés et la dépendance vendue. \r\nLa commune rachète le château en 1981 pour lui donner une vocation publique, un lieu de peinture et d'art, le parc qui s'étend sur 7 ha est planté de huit cent arbres.","habitants":"Seigneur de Chauffailles                                                         Monsieur Auguste Goyne\r\n        \"","divers":"Château de Chauffailles","gps":"","images":["../image/image_71/71_Chauffailles_1.jpg","../image/image_71/71_Chauffailles_2.jpg","../image/image_71/71_Chauffailles_3.jpg","../image/image_71/71_Chauffailles_4.jpg","../image/image_71/71_Chauffailles_5.jpg"]},"Consult_chateau_formulairea86b":{"id":"Consult_chateau_formulairea86b","dept":"71","canton":"La Guiche","commune":"La Guiche","nom":"Chaumont_Guiche","type":"Château","periode":"XIV","histoire":"CHAUMONT; L'ancien château féodal, construit par la famille de Chaumont à l'intérieur d'une grande enceinte fortifiée, avait été cédé au XIVe siècle avec terres et justices aux seigneurs de La Guiche et n'est jamais sorti de cette famille. Entre 1500 et 1514, Pierre de La Guiche, ambassadeur de France, aidé par l'oncle de sa femme, Jacques d'Amboise, en entreprit la reconstruction et édifia l'actuelle façade sud ouest dans le style de la 1ère Renaissance. Les travaux furent achevés en 1584 par Philibert de La Guiche. bailli de Mâcon puis gouverneur du Lyonnais, grand maître de l'artillerie royale, connu pour son refus de prendre part au massacre de la Saint-Barthélémy.  La partie la plus originale du château est le bâtiment des écuries, édifié entre 1648 et 1652 par Henriette de La Guiche, duchesse d'Angoulême.      Dans la commune le château de Croze et le château des Hauts.","architecture":"Chaumont la Guiche. La grosse tour ronde dite \"d'Amboise\" du temps de François Ier, flanque un corps de Logis construit dans la seconde moitié  du XVIe siècle  couronnée de mâchicoulis. Au XVIIe siècle, le château fut complété par deux ailes en retour d'équerre avec pavillons aux extrémités, formant ainsi une cour intérieure qui s'ouvrait vers le nord.  Vers 1805, un autre bâtiment du style Louis XII à remplacer au siècle dernier, une aile de construction classique. Chaumont se signale surtout par ses  écuries non ouverts au public elles  font l'objet d'un classement au titre des monuments historiques, depuis septembre 1982. Armes des La Guiche,  elle furent bâties pour abriter les chevaux de Louis Emmanuel de Valois duc d'Angoulême, fils de Charles de Valois lequel était bâtard de Charles IX et gendre de Phillibert de la Guiche. La façade occidentale fut construite en style néo-gothique au XIXe siècle; elle est agrémentée d'une tourelle et terminée par un pavillon en retour du même style. Deux majestueux escaliers extérieurs avec rampes doubles soulignés de balustrades, deux très hautes souches de cheminées se dressent à l'aplomb du mur de la façade, au centre des écuries, le portail principal \r\nest surmonté d'une niche abritant la statue équestre de Philibert de La Guiche.","habitants":"Famille de Chaumont\r\n        \"","divers":"Château de  Chaumont, de Croze et des Hauts","gps":"","images":["../image/image_71/71_Chaumont_Guiche_1.jpg","../image/image_71/71_Chaumont_Guiche_2.jpg","../image/image_71/71_Chaumont_Guiche_3.jpg","../image/image_71/71_Chaumont_Guiche_4.jpg","../image/image_71/71_Chaumont_Guiche_5.jpg","../image/image_71/71_Chaumont_Guiche_6.jpg","../image/image_71/71_Chaumont_Guiche_7.jpg"]},"Consult_chateau_formulairec266":{"id":"Consult_chateau_formulairec266","dept":"71","canton":"Semur-en-Brionnais","commune":"Oyé","nom":"Chaumont_Oye","type":"Château","periode":"XIII","histoire":"OYE; Dalmace de Semur au  XIe siècle, dit le Jeune, est seigneur du lieu, son fils, Renaud de Semur, lui succède.  Au XIIIe siècle , la baronnie, enclave du Brionnais en Mâconnais, est détachée de celle de Semur pour constituer l'apanage d'un puîné de la famille de Luzy, issue de celle de Semur.  La terre passe en 1566 par alliance à la maison de Breschard, Gabrielle de Ryan,  en 1636 veuve de François de Cugnac, marquis de Dampierre, vend la baronnie aux Andrault de Langeron dont les représentants à Oyé sont:  Hector Andrault de Langeron, seigneur de Maulévrier. François Andrault de Langeron, seigneur de Maulévrier, fils du précédent, mort en 1715, passa à Jean-Baptiste Andrault de Langeron, marquis de Maulévrier, fils  (1677-1754)  passa à Charles-Claude Andrault de Langeron, marquis de Maulévrier, fils  (1720-1792). En 1850 : restauration du logis.                                                        CHAUMONT; Construit en 1638 : domaine de l'abbaye de Cluny, si la seigneurie est vendue à Hector Andrault de Langeron, marquis de Maulévrier (grand-père du maréchal de France Jean-Baptiste Louis Andrault de Maulévrier) qui avait acquis deux ans auparavant la seigneurie d'Oyé la maison ne le fut pas, la propriété appartenait à François Dufour notaire royal à Chaumont dont François Circaud, secrétaire du roi et promoteur avec son cousin Emilliand Mathieu de l'Embouche dont sortira la race charolaise, fera édifier la demeure actuelle. Après 1748, Jean Circaud, secrétaire du roi et promoteur avec son cousin Emilliand Mathieu de l'Embouche, son neveu en héritera et il y apportera des remaniements corps de logis et ailes, ce domaine passera en 1818  par alliance  de Jules du Marais avec Elisa Circaud de Chaumont. La propriété passe à la famille du Marais qui la possède toujours. XIXe siècle le Baron Albert du Marais transforme la grange du XVIe siècle en salle de réception en transportant les cheminées, les fenêtres et la tour d'escalier du château de Moulin l'Arconce.","architecture":"OYE;  Le château de Chaumont, vieux château  flanqué de tours rondes du XVe siècle, à l'origine bâtisse  couverte de tuiles plates et d'une grange couverte de paille, remanié entre 1750 en 1780 rajout d'une aile et communs formant une vaste cour et un corps de logis central accolé à une grange qui sera aménagé plus tard en salle de réception et une chapelle et au XIXe siècle remaniements à nouveaux des ailes en style néogothiques et constructions de deux pavillons formant la cour d'honneur, des éléments de construction ont été récupéré par la démolition du château de Moulin l'Arconce, le corps de Logis de plan rectangulaire sur un étage et attique flanquées de deux tours saillantes  carrées aux angles.                                                                                 Oyé; de la vaste forteresse, il ne reste qu'un logis du XVe siècle avec deux tours rondes coiffées de toits coniques et d'une tour d'escalier octogonale hors uvre, de plan rectangulaire sous un toit à croupes. Les fenêtres du corps de logis sont surmontées de linteaux ornés d'accolades, très restaurés au XIXe siècle, celles de la tour d'escalier, rectangulaires, ont des encadrements et des meneaux et croisillons moulurés, la porte d'entrée de cette tour est couronnée d'un galbe en accolade entre deux pinacles, dans le tympan duquel sont sculptées des armoiries comportant trois bandes qui peuvent être soit celles des Luzy, soit celles des Breschard.                                                                           \r\n Dans la commune d'Oyé  le château de Sancenay  du XVe siècle ruiné,  une maison forte du XVe siècle et le château de Daron.","habitants":"Famille de Dalmace de Semur                                                        Hector Andrault de Langeron\r\n        \"","divers":"Château d'Oyé, de Sancenay et de Daron","gps":"","images":["../image/image_71/71_Chaumont_Oye_1.jpg","../image/image_71/71_Chaumont_Oye_2.jpg","../image/image_71/71_Chaumont_Oye_3.jpg","../image/image_71/71_Chaumont_Oye_4.jpg","../image/image_71/71_Chaumont_Oye_5.jpg","../image/image_71/71_Chaumont_Oye_6.jpg","../image/image_71/71_Chaumont_Oye_7.jpg","../image/image_71/71_Chaumont_Oye_8.jpg","../image/image_71/71_Chaumont_Oye_9.jpg"]},"Consult_chateau_formulairea0b6":{"id":"Consult_chateau_formulairea0b6","dept":"71","canton":"Mesvres","commune":"Laizé","nom":"Chazeu","type":"Vestiges","periode":"XIII","histoire":"CHAZEU; était le siège dune seigneurie dont dépendait  Laizy. La forteresse commandait le passage de la vallée de  lArroux, on trouve sur la rive opposée un lieu-dit,  le Péage, seigneurie,  depuis le début du XIIIe siècle est mentionnée par les de Chazeu, de la branche de la famille de Longwy, qui porte  comme armoirie \"d'azur à la bande d'or\".  Au début XVe siècle, vente de la seigneurie par le mari et les frères de Jeanne de Longwy à Nicolas Rolin, chancelier du duc de Bourgogne. Au 3ème quart du XVe siècle le cardinal Jean Rolin, évêque d'Autun, fils du chancelier, hérite du domaine. \r\nEn 1483 le fils naturel du cardinal, Sébastien Rolin, hérite à son tour du château, au début  du XVIe siècle. En 1651  après avoir été partagée entre deux familles, la seigneurie est à nouveau réunie par l'écrivain Roger de Bussy-Rabutin, qui, ayant hérité d'une moitié, en rachète l'autre à Chrétienne de Chissey, il avait épousé huit ans avant Gabrielle de Toulongeon, petite fille de sainte Jeanne de Chantal. \r\nEn 1659  en disgrâce,  Bussy-Rabutin doit s'exiler sur ses terres de Bourgogne, l'hiver, à Bussy-le-Grand et la bonne saison, à Chazeu, en 1730  le château est vendu par Roger de Langheac, à Jean-Baptiste Rabiot de Meslé. En 1765  nouvelle vente, cette fois à Jean-Baptiste de Mac-Mahon. En 1794  vente par lots  et en 1803  rachat par Maurice-François de Mac-Mahon. En 1840 le fils   vend la propriété après avoir fait démolir le château pour en utiliser les matériaux.  Mme de Sévigné, reç
