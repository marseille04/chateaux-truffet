ipal, de plan rectangulaire allongé, et deux ailes en retour, d'inégale longueur, dont l'étage de comble est éclairé par des lucarnes à fronton-pignon et des oeils-de-boeuf sous des toits brisés. Au centre du corps de logis, s'élève un pavillon dont les façades, sur la cour et sur le parc, sont couronnées de grands frontons cintrés. Un pavillon de même type, couronné d'un fronton triangulaire, flanque l'extrémité de l'aile sud, bâtie au XVIIIe siècle. L'aile nord est prolongée par de petits bâtiments, vestiges du château du XVe siècle. Des bandeaux de pierre ornent la base des fenêtres.","habitants":"Famille de Thomas de Grammont\r\n        \"","divers":"Château de Montcoy","gps":"","images":["../image/image_71/71_Montcoy_1.jpg","../image/image_71/71_Montcoy_2.jpg","../image/image_71/71_Montcoy_3.jpg","../image/image_71/71_Montcoy_4.jpg","../image/image_71/71_Montcoy_5.jpg","../image/image_71/71_Montcoy_6.jpg","../image/image_71/71_Montcoy_7.jpg"]},"Consult_chateau_formulaire9bcd":{"id":"Consult_chateau_formulaire9bcd","dept":"71","canton":"Charolles","commune":"Changy","nom":"Montessus","type":"Forteresse","periode":"XIV","histoire":"MONTESSUS, date du XIVe et du XVe siècle, fief des Montessus, ancienne et puissante famille d'où sont issus Sainte-Jeanne de Chantal fondatrice de l'ordre de la visitation, la marquise de Sévigné et Roger de Bussy-Rabutin.  La maison forte de Fontenay était le centre d'un très petit fief dont l'histoire demeure totalement obscure. Les seuls titulaires que l'ont connait sont François de Charolles en 1625 et Pierre de Rimon en 1666. Il reste un gros pavillon à deux étages, flanqué sur sa façade ouest d'une tour d'escalier circulaire hors oeuvre à laquelle on accède par une porte rectangulaire encadrée par deux pilastres toscans portant un entablement décoré de triglyphes, au-dessus figure un cartouche dont les armoiries ont été brûlés. Ce type de manoir, qui associe un gros bâtiment carré à une tour d'escalier ronde ou polygonale, est typique du sud du Charolais et de l'ouest du Mâconnais.","architecture":"Montessus, monument emblématique de l'architecture militaire médiévale du Charolais. L'ensemble se développe autour d'une cour et se compose d'une haute tour quadrangulaire coiffée d'une toiture en pavillon et flanquée de quatre échauguettes circulaires. Sur la façade Est de la tour maîtresse  est accolé un corps de logis. Au sud de l'enceinte s'élève une tour circulaire abritant une chapelle  et un pigeonnier  dans la pente du terrain vers l'Arconce,","habitants":"Famille de Roger de Bussy-Rabutin\r\n        \"","divers":"Forteresse de Montessus","gps":"","images":["../image/image_71/71_Montessus_1.jpg","../image/image_71/71_Montessus_2.jpg","../image/image_71/71_Montessus_3.jpg","../image/image_71/71_Montessus_4.jpg"]},"Consult_chateau_formulaire3799":{"id":"Consult_chateau_formulaire3799","dept":"71","canton":"Autun","commune":"Chassy","nom":"Monthelon","type":"Château","periode":"XV","histoire":"MONTHELON, fief de l'évêché d'Autun au XIVe siècle, passa aux Pernon de Lee puis de 1456 à 1546 aux Clugny et à Nicolas de la Roque  et fut acquis en 1580  par Guy de Rabutin-Chantal seigneur de Monthelon baron de Chantal son fils en 1592, Christophe de Rabutin-Chantal, baron de Chantal, épouse Jeanne-Françoise Frémyot, fille de Bénigne Frémyot, président au Parlement de Dijon. \r\nLe baron de Chantal en 1601 son mari ayant perdu la vie dans un accident de chasse, Jeanne de Chantal vit au château avec ses quatre enfants dont le fils Celse-Bénigne grand-père de madame de Sévigné et son beau-père. En 1604 Saint-François de Sales lui rendra visite à l'occasion du mariage de son frère Bernard avec Marie-Aimée, une des filles de Jeanne. Jeanne de Chantal  en 1610  quitte le domaine pour aller fonder, à Annecy, le premier couvent de la Visitation; elle sera canonisée en 1767. La fille  en 1630 cadette de Jeanne, Françoise de Rabutin-Chantal, reçoit le château en dot à son mariage avec Antoine, comte de Toulongeon, de vingt-cinq ans son aîné,  le fils de ces derniers étant mort sans enfant, il laisse le domaine à sa nièce, Françoise de Rabutin, fille de Roger de Bussy-Rabutin et épouse de Gilbert de Langeac. \r\nEn XVIIIe siècle  Charlotte de Langeac vend le domaine à un chanoine de Maizière et en 1774  le château appartient à Antoine Chartraire de Montigny, trésorier général des États de Bourgogne. Il entreprit des restaurations et combla les fossés en 1783. Durant la Révolution, arrêté en 1793, il avait revendu le domaine en 1790 à Claude Revel de Montigny qui le garda jusqu'à la fin du XIXe siècle.  Au XXe siècle : propriété de la baronne Pierre  Benoist de Gentissard.","architecture":"Monthelon, cette maison forte, d'aspect assez modeste, remonte au XVe siècle. Elle consiste en un logis rectangulaire flanqué de deux tours rondes qui font saillie sur la façade nord-est. La façade principale a été refaite par Guy de Rabutin. Elle donne sur une vaste cour qui n'a conservé ni mur de défense, ni fossé. Un escalier de pierre et un perron amènent à deux portes jumelles encadrées de deux fenêtres doubles dont le cadre de pierre est mouluré d'une gorge. Au-dessus des portes, un bas-relief sculpté figure les armes des Rabutin-Chantal entourées du collier de Saint-Michel, tenues par deux anges et accompagnées de la devise de Guy de Rabutin : VIRESCIT VULNERE VIRTUS (la vertu s'accroît par les plaies). Au-dessus, le premier étage a été ajouré par une galerie à quatre colonnettes, les portes en bois qui ouvrent sur cette galerie conservent des traces d'un décor renaissance.","habitants":"Famille de Guy de Rabutin-Chantal\r\n        \"","divers":"Château de Monthelon","gps":"","images":["../image/image_71/71_Monthelon_1.jpg","../image/image_71/71_Monthelon_2.jpg","../image/image_71/71_Monthelon_3.jpg","../image/image_71/71_Monthelon_4.jpg","../image/image_71/71_Monthelon_5.jpg"]},"Consult_chateau_formulaired153":{"id":"Consult_chateau_formulaired153","dept":"71","canton":"Palinges","commune":"Oudry","nom":"Monthot","type":"Vestiges","periode":"XIV","histoire":"MONTHOT, la seigneurie du Montot est mentionnée en 1376, puis en 1439 pour des partages dans la famille de Fautrières. En 1491, Pierre de Bazay était seigneur du Montot et il fut maintenu dans cette seigneurie par le duc de Bourgogne jusqu'en 1499. En 1519, Claude de Bazay était seigneur du Montot, sa fille Jeanne l'apporta à Claude de Bresches par son mariage en 1542. En 1581, reprise de fief par Humbert de Bresches. De 1638 à 1667, apparaissent au Montot la famille d'Albon, puis en 1669 la famille du Bois de La Rochette, et jusqu'à la Révolution, leur descendant Antoine-Louis des Champs, baron de La Villeneuve. Mlle des Champs de La Villeneuve le légua à Mlle de Varax vers 1920. Acheté en 1956 par M. Louis Lauferon. Au décès de celui ci, en 1976, la maison et les terres sont alors en indivision entre son épouse et ses cinq enfants. En 2011, La maison est acquise par Bernadette et Claude Pailharey fille et gendre de madame Denise Lauféron.\r\nMOUTOT ou MONTOT, château de la famille de Luyne au XVIe siècle.","architecture":"MONTHOT, en 1764, le château était en partie ruiné et inhabité, mais toujours composé d'un corps de logis et de cinq tours.\r\nActuellement, il ne reste que trois des quatre tours rondes qui cantonnaient le manoir et la tourelle abritant un escalier à vis en pierre, du corps de logis, ne subsiste que l'extrémité sud. Ce fragment de bâtiment au toit aigu semble avoir été édifié au XVIIe siècle. Le reste du corps de logis primitif a été démoli à la fin du XIXe siècle et remplacé par un bâtiment plus petit, légèrement en retrait sur la façade sur cour et ne s'appuyant plus sur les tours d'angle, l'étage a été supprimé et remplacé par un grand grenier dont le toit descend très bas, on a reporté, sur cette nouvelle façade, quelques sculptures, notamment des armoiries au-dessus de chacune des ouvertures et, dans le toit, des têtes médiévales maintenant rassemblées sous l'auvent d'une grande lucarne à deux baies à arcs.","habitants":"Famille de Claude de Bazay \r\n        \"","divers":"Château de Monthot","gps":"","images":["../image/image_71/71_Monthot_1.jpg","../image/image_71/71_Monthot_2.jpg"]},"Consult_chateau_formulairedd1e":{"id":"Consult_chateau_formulairedd1e","dept":"71","canton":"Mesvres","commune":"Broye","nom":"Montjeu_Broye","type":"Château","periode":"XVII","histoire":"MONTJEU, avant le XIVe siècle, fief  des seigneurs de Riveau et d'Ostun qui se succédèrent. Vers 1310, Perrin d'Ostun féal du Duc de Bourgogne devient seigneur de Montjeu-en-Autun. En 1556, le dernier des Montjeu, Hugues III de Montjeu meurt, un Jeannin  originaire d'Autun devient seigneur  acquis Montjeu-en-Montagne. En 1586, Président au parlement de Dijon conseiller d'Henri IV, il fit construire le château de Montjeu en 1606, achevé en 1620. En 1623 Pierre de Castille son gendre fait construire l'escalier du parc et en 1655, Nicolas Jeannin de Castille obtint le marquisat pour ce fief, qu'il garderont jusqu'en 1734. Passera par alliance  à Marie-Elisabeth-Sophie de Lorraine-Harcourt avec Marie-Louise-Christine Jeannin de Castille, mariage effectué par le maréchal de Richelieu. dans ce château décède le 26 février 1716, Louise-Françoise de Bussy-Rabutin. Le 19 janvier 1719, Alphonse-Henri de Lorraine, Prince d'Harcourt y meurt. et en 1735 un incendie endommage le corps de logis central. À la Révolution, la veuve du président Aligré en fait l'acquisition  et fait supprimer les ponts levis, et le domaine sera vendu au XVIIIe siècle au prince de Guise Louis-Michel Lepeletier de Saint-Fargeau, passera ensuite par alliance aux Talleyrand Périgord.\r\nEn 1883, la belle-sur du président Mac-Mahon, la comtesse de Mac-Mahon y décède.  En 1939 le domaine passe à monsieur Roger-Louis Demon industriel du bois, en 1963 un nouvel incendie  détruit le logis central et une aile. Le nouveau propriétaire le docteur Manchot le remit en état et le revendra en 1980 à un millionnaire Franco-Britanique. Sir Jimmy Goldsmith qui décédera en 1997  madame Laure Boulay de la Meurthe en hérite.                                   Dans la commune le château de Mont d'Arnaud construit à la fin du XXe siècle style Chalet, pour Deselligny directeur des usines Schneider du Creusot gendre du célèbre maître des forges.","architecture":"Montjeu, corps de logis avec deux ailes en retour d'équerre avec pavillons carrés aux quatre angles  toitures en pavillons surmontés d'un lanternon chacune, un fronton brisé ouvre sur la cour au centre du logis, des fosses entourent le château dont les pont levis ont été remplacés par des ponts dormants et des canonnières dans les pavillons de chaque côté de l'entrée sont les seuls éléments de défense. Pas de traces des deux incendies du corps de logis central (1735-1963).","habitants":"Famillle de Pierre de Castille\r\n        \"","divers":"Château de Montjeu et de Mont-d'Arnaud","gps":"","images":["../image/image_71/71_Montjeu_Broye_1.jpg","../image/image_71/71_Montjeu_Broye_2.jpg","../image/image_71/71_Montjeu_Broye_3.jpg","../image/image_71/71_Montjeu_Broye_4.jpg","../image/image_71/71_Montjeu_Broye_5.jpg","../image/image_71/71_Montjeu_Broye_6.jpg"]},"Consult_chateau_formulaire5394":{"id":"Consult_chateau_formulaire5394","dept":"71","canton":"Issy-l`Evêque","commune":"Grury","nom":"Montperroux","type":"Château","periode":"XIII-XX","histoire":"MONTPERROUX, la baronnie de Montperroux avait été détachée des terres de l'évêché d'Autun au profit d'un cadet de la famille de Bourbon-Lancy, est attesté depuis le XIIIe siècle. C'était alors une imposante forteresse qui fut remanié au XVIe siècle. Par héritage, elle passa en 1415, aux Palatin de Dyo qui en furent dépossédés à la Révolution. Le château fut vendu comme bien national en 1795 à JB Mathieu maire de Grury.  Au XVIIIe siècle il passa aux mains des comtes de Damas d'Anlezy.\r\nEn 1264 et 1270, Philippe de Bourbon, seigneur de Montperroux rend respectivement hommage à Hugues IV de Bourgogne et Girard de la Roche-Beauvoir  évêque d'Autun pour ce château.\r\nEn 1475, les troupes de Louis XI attaquent le château.\r\nEn 1485, Philippe de Bourbon deuxième du nom sans héritier lègue le château en viager à Jean Palatin de Dyo, seigneur de Vesvres.\r\nDe 1485 à 1732, les Dyo se succèdent. Après avoir échu à Madeleine Angélique de Gassion au moment de la Révolution.\r\nDe 1732 à 1795, dernier aristocrate propriétaire du château.\r\nEn 1795, Jean Baptiste Mathieu, maire de Grury l'achète en tant que bien national. À partir de 1856 jusqu'à la fin du XXe siècle, le château passe d'agriculteurs en agriculteurs, faute d'entretien, il menace de tomber en ruines. En 1980, la propriétaire est madame Polissard.\r\nDu printemps 1980 à 1982, monsieur Pierre Boudeville  en devient propriétaire, un long et patient travail de restauration est entrepris par cette  famille.\r\nDans la commune les ruines du château Faulin et la tour de Brion.","architecture":"Montperroux,  sur un promontoire, dans la vallée de l'Arroux, entre Issy l'Évêque et Grury, la tour de Grury, ce château avec son homologue le château de Faulain, aujourd'hui ruiné contrôlait les voies entre Bourbonnais, Morvan et Bourgogne. En forme de quadrilatère, il possédait un pont-levis détruit et quatre tours dont trois subsistent. Celle circulaire à l'angle sud-ouest, possède un toit conique, les autres tours nord-ouest et sud-est sont quadrangulaires mais incomplètes, celle du nord-ouest est légèrement décalée vers l'est. L'entrée se fait là où se trouvait la tour nord-est. Un corps de logis flanqué d'une esplanade occupe le côté sud, ce corps de logis est assis sur des caves voûtées, les autres ailes regroupent des dépendances. Le château est bordé par des prés sur trois côtés, et à l'est, à petite distance par des bâtiments agricoles. La silhouette pittoresque de cet édifice lui donne un aspect de château fort, mais les murailles médiévales servent d'écrin à un somptueux bâtiment Renaissance.","habitants":"Famill de Monsieur Pierre Boudeville\r\n        \"","divers":"Château de Montperroux, de Chigny, de Grury,de Comelle, de Faulin et la Tour de Brion","gps":"","images":["../image/image_71/71_Montperroux_1.jpg","../image/image_71/71_Montperroux_2.jpg","../image/image_71/71_Montperroux_3.jpg","../image/image_71/71_Montperroux_4.jpg","../image/image_71/71_Montperroux_5.jpg","../image/image_71/71_Montperroux_6.jpg","../image/image_71/71_Montperroux_7.jpg","../image/image_71/71_Montperroux_8.jpg","../image/image_71/71_Montperroux_9.jpg"]},"Consult_chateau_formulairea3d2":{"id":"Consult_chateau_formulairea3d2","dept":"71","canton":"La Clayette","commune":"Gibles","nom":"Montrouan","type":"Château","periode":"XVIII","histoire":"MONTROUAN, le premier seigneur connu fut Guyot-Grandjean qui fit lacquisition du château de Montrouant en 1396. Les familles Grandjean vécurent longtemps à Montrouant mais furent remplacés au XVIIe siècle, par les alliances  et successions, par une famille Chevalier. Les Chevalier régnèrent sur Montrouant  jusquen 1829 et sera succédait par  la famille Perrin de Daron et de Cypierre. Cette famille fait bâtir, entre 1840 et 1850, la demeure telle que nous la voyons aujourdhui. Le Blason des Perrin de Daron et de Cypierre trône au-dessus de la porte dentrée  principale. \r\nPlusieurs propriétaires se sont succédé durant ces 100 dernières années  certains, comme M. de Sermaize,  ont étendu et restauré le domaine, dautres, dans un but souvent spéculatif  lont divisé et morcelé.","architecture":"Montrouan, de vieux murs enterrés et fondations anciennes encore visibles dans les caves, les plans du cadastre Napoléonien  attestent que le château fût plusieurs fois modifié et reconstruit. La partie centrale de la bâtisse ainsi  que laile sud sont construites en lieu et place du château  du XVIIe siècle. La construction de laile nord, certainement prévue pour des raisons de symétrie, na pu être réalisée. Fin  du XIXe siècle Montrouan sétendait sur plusieurs centaines dhectares et comprenait 7 ou 8 fermes agricoles.","habitants":"Famille Perrin de Daron\r\n        \"","divers":"Château de Montrouan","gps":"","images":["../image/image_71/71_Montrouan_1.jpg","../image/image_71/71_Montrouan_2.jpg","../image/image_71/71_Montrouan_3.jpg","../image/image_71/71_Montrouan_4.jpg","../image/image_71/71_Montrouan_5.jpg","../image/image_71/71_Montrouan_6.jpg","../image/image_71/71_Montrouan_7.jpg"]},"Consult_chateau_formulairea793":{"id":"Consult_chateau_formulairea793","dept":"71","canton":"Tramayes","commune":"Clermain","nom":"Montvaillant","type":"Château","periode":"XVIII","histoire":"MONTVAILLANT à Clermain, petit fief à l'histoire obscure, Montvaillant appartint au milieu du XVIIIe siècle à Jean-Baptiste Bridet. Le château a été reconstruit au milieu du XIXe siècle, à l'emplacement d'une ancienne maison forte. Propriété de Florence de Witte épouse Chaintreuil.\r\nDans la commune le manoir du Colombier du XVIII-XIXe siècle.","architecture":"Montvaillant, l'histoire de ce château, situé à moins de 300 mètres du château de Marigny, la construction comprend un corps de logis central à deux étages carrés, flanqué, dans le même alignement, de deux ailes à un seul étage, en léger retrait sur ses deux façades; les ailes sont prolongées chacune par un pavillon dont les façades sont dans l'alignement de celle du corps central. Un perron précède la façade donnant sur le parc  est très obscure.  Les bâtiments entourent une cour rectangulaire à laquelle on accède au nord par un portail formé d'une porte charretière en anse de panier et d'une porte piétonne en plein cintre, inscrites chacune entre deux pilastres en bossage vermiculé un sur deux et couronnées de frontons brisés encadrant un cartouche dont les armoiries ont été brûlés. Une petite tour carrée accolée à l'ouest du portail. Le corps de logis principal, qui a subi de multiples remaniements, s'étend à l'est.  De plan rectangulaire allongé, il comprend un rez-de-chaussée et un étage carré sous un toit à deux versants. Il est flanqué sur son angle nord Est d'une tourelle circulaire. Contre son pignon sud, s'appuie un gros pavillon carré comportant un étage, un demi-étage et un étage de combles avec lucarnes à frontons triangulaires, surmontés de boules d'amortissement.","habitants":"Famille de Jean-Baptiste Bridet.\r\n        \"","divers":"Château de Montvaillant, du Colombier et de la Roche","gps":"","images":["../image/image_71/71_Montvaillant_1.jpg","../image/image_71/71_Montvaillant_2.jpg","../image/image_71/71_Montvaillant_3.jpg","../image/image_71/71_Montvaillant_4.jpg","../image/image_71/71_Montvaillant_5.jpg"]},"Consult_chateau_formulaire337c":{"id":"Consult_chateau_formulaire337c","dept":"71","canton":"Epinac","commune":"Morlet","nom":"Morlet","type":"Château","periode":"XV","histoire":"MORLET, château est attesté dès la fin du XIIIe siècle par les seigneurs de Loges. En 1680, la seigneurie est acquise par Jean Morelet, doyen de Notre-Dame de Beaune, auquel succède son neveu, c'est ce Jean Morelet, écuyer, qui obtint par lettres patentes du 9 juin 1700 de substituer le nom de Morlet à celui de Loges. Puis le château passa aux Bouthier et aux Vogüé avant de parvenir à la famille de Louvencourt.","architecture":"Morlet, la construction du XVe siècle se compose d'un corps de logis entre deux tours carrées inégales, la tour orientale, très massive et coiffée d'un toit élevé, semble la plus ancienne. Les fenêtres à accolades ou à meneaux verticaux de la façade méridionale, des tours sont du XVe siècle, les fenêtres à balconnets de la façade nord ont été refaites au XVIIIe siècle.  Une chapelle a été aménagée au milieu du XIXe siècle dans le pavillon de gauche.","habitants":"Seigneurs de Loges\r\n        \"","divers":"Château de Morlet","gps":"","images":["../image/image_71/71_Morlet_1.jpg","../image/image_71/71_Morlet_2.jpg","../image/image_71/71_Morlet_3.jpg","../image/image_71/71_Morlet_4.jpg","../image/image_71/71_Morlet_5.jpg","../image/image_71/71_Morlet_6.jpg","../image/image_71/71_Morlet_7.jpg","../image/image_71/71_Morlet_8.jpg"]},"Consult_chateau_formulaire407b":{"id":"Consult_chateau_formulaire407b","dept":"71","canton":"Buxy","commune":"Moroges","nom":"Moroges","type":"Château","periode":"XIII-XVI","histoire":"MOROGES,  fief en  1289 appartient à la famille de Moroges, au dernier descendant  de la famille de Moroges, en 1633 succèdent, par les femmes, les Rabutin, puis les Champier, achat du domaine en 1733 par Louis de Thésut du Parc,  les descendants du précédent  en 1920 vendent le château. \r\nA partir de 1945 la  propriété de la famille Remontet et en 1963 de Mme Bernard Tremeau née Remontet, le château est entretenu et conservé avec soin.","architecture":"Moroges,  cet ensemble remonterait aux XIIIe siècle et XIVe siècle, le château comprend actuellement un grand bâtiment dont la façade ouest, garnie de verdure, donne sur une cour à laquelle on accède par un portail, il est flanqué, au nord, d'un donjon imposant, c'est une très grosse tour carrée coiffée bizarrement d'un toit en bâtière que couvrent de petites tuiles plates. À l'autre extrémité du bâtiment, se dresse une tour ronde moins importante.  La façade donnant sur le parc a été remanié dans les années 1850-1855, elle est de style classique.\r\nÀ l'intérieur, de grosses cheminées ont été dégagées, ainsi que des plafonds à solives apparentes à la française. La salle basse du donjon a retrouvé son aspect primitif.","habitants":"Famille de Moroges\r\n        \"","divers":"Château de Moroges et du chalet","gps":"","images":["../image/image_71/71_Moroges_1.jpg","../image/image_71/71_Moroges_2.jpg","../image/image_71/71_Moroges_3.jpg","../image/image_71/71_Moroges_4.jpg","../image/image_71/71_Moroges_5.jpg"]},"Consult_chateau_formulaireffc0":{"id":"Consult_chateau_formulaireffc0","dept":"71","canton":"Chalon-sur-Saône","commune":"Epervans","nom":"Motte_Epervans","type":"Château","periode":"XV","histoire":"MOTTE, au  XIe siècle, l'existence d'une motte féodale est attestée Au Moyen-Age il existait une \"Motte\", qui après, a donné le nom au château actuel.  Cette seigneurie de Saint-Marcel-lès-Chalon pour la justice et appartenait, au XIe siècle, à Hugo des Barres. A la fin du XVIIIe siècle, est cité François Mercier, ancien conseiller au Parlement de Bourgogne, seigneur de Mercey et de La Motte qui, veuf, épousa en secondes noces une demoiselle Sousselier dont descendent les Labrely. Cette famille s'est éteinte à la  mort de Mme Fougeron née Labrely, en 1970, alors le château fut acheté par M. Robert Gehin. Ensuite le domaine est racheté en 1980 et converti en club hippique.\r\nEn 1990, Le domaine est racheté par Monsieur Jean-Marc Royer, actuel propriétaire, qui fait classer les bâtiments restant en tant que monuments historiques et fait procéder à la restauration de la \"Tour-porche\".\r\nPlusieurs châteaux dans la commune dont celui d'Epervans.","architecture":"Motte, à la fin XIXe siècle, la construction consistait en deux bâtiments parallèles, entourant une cour dans laquelle on pénétrait par une tour-porche carrée massive, précédée d'un pont dormant, ayant sans doute remplacé un pont-levis dont on voit encore les traces de fentes verticales sur la tour. Dans le fond de la cour, une petite tour carrée servait de chapelle. Non habité ni entretenu, livré au pillage, le château ne tarda pas à se détériorer. En particulier la tour-porche montrait de graves lézardes compromettant sa solidité. Le propriétaire conserva ce qui restait encore debout, c'est-à-dire la tour-chapelle, une remise à colombage apparent et la grosse tour-porche étayée par de solides contreforts. Cette dernière est de même type que celle de Champforgeuil.","habitants":"Seigneurie de Saint-Marcel-lès-Chalon\r\n        \"","divers":"Château de la Motte d'Epervans","gps":"","images":["../image/image_71/71_Motte_Epervans_1.jpg","../image/image_71/71_Motte_Epervans_2.jpg"]},"Consult_chateau_formulaired937":{"id":"Consult_chateau_formulaired937","dept":"71","canton":"Digoin","commune":"Motte-St-Jean","nom":"Motte_St_Jean","type":"Vestiges","periode":"XII-XVII","histoire":"MOTTE St-JEAN, Thibaud de Chalon en 1065 possède la forteresse. Guillaume, en 1222 seigneur de Morillon et de la Motte-Saint-Jean se dit vassal du seigneur de Bourbon-Lancy. Jean, damoiseau, qui succède en 1274 au précédent, achète des terres à La Motte-Saint-Jean. A la  fin XIIIe siècle son fils Guillaume, lui succède. A la  première moitié du XIVe siècle  Jean, seigneur de la Motte-Saint-Jean,  son frère, lui succède. Sa fille, Catherine de la Motte-Saint-Jean épouse en 1360 Jean de Saligny, seigneur de Randan,  le fief entre dans les possessions de la famille de Saligny. Jean de Saligny, seigneur de la Motte-Saint-Jean,  en  1380 dit Lourdin de Saligny, conseiller, connétable des royaumes de Naples et de Sicile, leur succède. Leur fille en 1437, Catherine, dame de la Motte-Saint-Jean, épouse Guillaume de Coligny, seigneur d'Andelot, prirent le nom de Coligny-Saligny,  et vers 1450  leur  fils, Jacques Lourdin, seigneur de Saligny et de la Motte-Saint-Jean leur succède. A la mort en  1510 de Jacques, son fils, Renaud Lourdin de Coligny, seigneur de Saligny et de la Motte-Saint-Jean, lui succède. Marc Lourdin de Coligny, en  1547 son fils  baron de la Motte-Saint-Jean, lui succède. En  1597  Gaspard de Coligny, en  1597, baron de la Motte-Saint-Jean, fils , lui succède. \r\nUn descendant  en 1676,  Jean de Coligny-Saligny, comte de Saligny, seigneur de la Motte-Saint-Jean, exilé sur ses terres pour avoir pris une part active à la Fronde, met à profit sa retraite pour raser la forteresse et édifier un nouveau château. \r\nFin de l'Ancien Régime, le domaine est propriété du duc de Cossé-Brissac et en 1836, les bâtiments sont rasés.","architecture":"Motte St-Jean, ruines féodales en ce lieu, une vaste enceinte fortifiée. Le château disparu de Jean de Coligny-Saligny comportait un corps central flanqué de deux pavillons, eux-mêmes précédés au nord de deux petits pavillons de même élévation que le corps central. Seule subsiste la terrasse de 95 mètres sur 80 mètres, précédée vers le nord d'une demi-lune large de quarante mètres. Sous la partie sud-est, se trouve la glacière, salle voûtée de 25 mètres sur 9 mètres.\r\nLes habitations des propriétaires sont situées à l'ouest de la terrasse, en contrebas de celle-ci, à l'emplacement des communs qui figurent sur une gravure du XVIIIe siècle.","habitants":"Famille de Jean de Coligny-Saligny\r\n        \"","divers":"Château de la Motte St-Jean","gps":"","images":["../image/image_71/71_Motte_St_Jean_1.jpg","../image/image_71/71_Motte_St_Jean_2.jpg"]},"Consult_chateau_formulairef418":{"id":"Consult_chateau_formulairef418","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Navilly","nom":"Navilly","type":"Château","periode":"XVII","histoire":"NAVILLY, au XIe siècle Navilly est le siège dune seigneurie importante, tenue par une branche cadette de la famille des Milonides à laquelle appartenait le comte Otte-Guillaume, adversaire du roi Robert le Pieux dans la guerre de succession de Bourgogne. En 1434, Isabelle de Portugal duchesse de Bourgogne affranchit Navilly-le-Château et Navilly-la-Ville.\r\nEn 1636, lors de la guerre de 30 ans, le village fut saccagé par les troupes de Gallas qui remontaient le Doubs pour prendre Verdun-sur-le-Doubs. Les Navillois se réfugient à Pontoux.  Limportant vignoble du XVIIIe siècle  a disparu dans la première la moitié du XXe siècle, il produisait des vins rouges dassez bonne qualité.","architecture":"Navilly-le-Château sur les bords du Doubs. Les Montots  situé sur une hauteur dominant la vallée de la Guyotte, cétait le siège d'une seigneurie.\r\nAujourd'hui éco-musée de la Bresse Bourgogne.","habitants":"Comte Otte-Guillaume\r\n        \"","divers":"Château de Navilly et de Terrans","gps":"","images":["../image/image_71/71_Navilly_1.jpg","../image/image_71/71_Navilly_2.jpg","../image/image_71/71_Navilly_3.jpg"]},"Consult_chateau_formulaire2a27":{"id":"Consult_chateau_formulaire2a27","dept":"71","canton":"Tournus","commune":"Chapelle-sous-Brancion","nom":"Nobles","type":"Maison forte","periode":"XV","histoire":"NOBLES, le premier seigneur connu de Nobles est, en 1370, Antoine de Nanton qui appartenait à une famille maconaise citée dès le XIIe siècle.  Il fut alors pillé et en partie détruit. En 1370 Antoine de Nanton, qui appartient à une famille maconaise, est le premier seigneur connu du lieu. Fin du XVIe siècle, veuve de François de Nanton, dernier du nom, Philiberte de Feurs, femme de lettres de la Renaissance, apporte par son remariage la seigneurie à Jean de La Baume dont la famille conservera la propriété jusqu'à la fin de l'Ancien Régime.\r\nLe château est pillé et en partie détruit à la Révolution. Des travaux de restauration entrepris en 1856 firent disparaître ce qui subsistaient des fortifications. Aujourd'hui chambres d'hôtes de madame de Cherisey.","architecture":"Nobles,  chapelle sous Brancion, la construction  du XVe siècle se compose d'un corps de logis couvert d'un toit à croupes et flanqué, à ses deux extrémités, de tours rondes à toits coniques, celles-ci sont percées de canonnières à leur partie supérieure, la façade Est, flanquée d'une tour carrée hors uvre sur le pan, à laquelle est accosté un appentis, donne sur une cour qui est  cernée de divers bâtiments à usage agricole. L'entrée fortifiée de cette cour est au Sud, au-rez-de-chaussée du corps de logis, une porte Renaissance en plein cintre donne accès à un large escalier à vis, elle s'inscrit dans une travée toscane à pilastres cannelés, à sa gauche, une baie jumelée, transformée tardivement en porte, est également très ornementée, par deux courts pilastres à chapiteaux composites, dont les fûts sont sculptés d'écailles, et qui portent un entablement divisé en caissons.","habitants":"Famille de Madame de Cherisey\r\n        \"","divers":"Château de Nobles","gps":"","images":["../image/image_71/71_Nobles_1.jpg","../image/image_71/71_Nobles_2.jpg","../image/image_71/71_Nobles_3.jpg","../image/image_71/71_Nobles_4.jpg","../image/image_71/71_Nobles_5.jpg","../image/image_71/71_Nobles_6.jpg","../image/image_71/71_Nobles_7.jpg","../image/image_71/71_Nobles_8.jpg"]},"Consult_chateau_formulaire36ad":{"id":"Consult_chateau_formulaire36ad","dept":"71","canton":"Matour","commune":"Montagny-sur-Grosne","nom":"Ouilly","type":"Château","periode":"XVII","histoire":"OUILLY, ce château formait un fief qui appartenait à Philippe de Foudres, vers 1614 cette famille le conserva jusqu'en 1765 époque ou il fut vendu au marquis de Castellane, puis passa à Emillien Brays, son fils Léon Brays d'Oully l'ami de Lamartine le reçu en 1832 et en fit une magnifique habitation actuelle.","architecture":"Ouilly, château du XIXe siècle à deux niveaux avec attiques, pavillon saillant en façades et tour octogonale sur l'angle ouest avec tourelle à balustrades, ce château est  transformé en un Aérium.","habitants":"Famiolle de Philippe de Foudres\r\n        \"","divers":"Château d'Ouilly et de myards","gps":"","images":["../image/image_71/71_Ouilly_1.jpg","../image/image_71/71_Ouilly_2.jpg","../image/image_71/71_Ouilly_3.jpg","../image/image_71/71_Ouilly_4.jpg","../image/image_71/71_Ouilly_5.jpg"]},"Consult_chateau_formulaire6d9f":{"id":"Consult_chateau_formulaire6d9f","dept":"71","canton":"Tournus","commune":"Ozenay","nom":"Ozenay","type":"Château","periode":"XV","histoire":"OZENAY, le fief appartenait au Moyen-Age  en grande partie à l'abbaye de Tournus, au chapitre de Saint-Vincent et à celui de Saint-Pierre de Mâcon, qui concèdent en arrière-fief une part de leur domaine, moyennant hommages et redevances à des seigneurs laïcs. En 1267, fief des Chanay,  puis en  1282 passe aux Montbellet  et en  1343 passe aux Chacipol. En 1550 retour à la famille Chanay, Jean de Chanay capitaine de la ville de Tournus, puis passa en 1587 à Claude Barthelot, co-seigneur d'Ozenay et de Gratay, et son épouse, Pierrette de Rymon, sont bienfaiteurs de l'abbaye Saint-Philibert  qui le garda jusqu'à la fin du XIXe siècle,  les Barthelot portent le titre de marquis d'Ozenay. \r\nLe dernier représentant de la famille lègue le domaine en 1860 à son petit-neveu, Amédée de La Barge de Certeau fils de Frédéric de La Barge de Certeau et d'Amélie Barthelot d'Ozenay, qu'il adopte et à qui il transmet son titre en 1891 son fils, Philibert de La Barge de Certeau d'Ozenay, lui succède et en 1939 le marquis d'Ozenay, toujours dans la famille.","architecture":"Ozenay, château qui appartient à la même famille depuis 400 ans. Maison forte possédant des éléments  du XIIIe siècle  incendié par les protestants agrandi au XVIIe siècle corps de logis avec deux ailes courtes en retour et tours aux toits de laves, du XVe siècle tour, donjon, du XVIe siècle aile sud-ouest, cheminée et en grande partie du XVIIe siècles domine un jardin de buis taillés traversé par une rivière canalisée, le décor intérieur date du XVIIe et XVIIIe siècle décor de stucs, boiseries, et papiers peints. Le domaine comporte de vastes communs auxquels on accède par un portail du XVIIe siècle.","habitants":"Famille Chanay\r\n        \"","divers":"Château d'Ozenay et de Chary","gps":"","images":["../image/image_71/71_Ozenay_1.jpg","../image/image_71/71_Ozenay_2.jpg","../image/image_71/71_Ozenay_3.jpg","../image/image_71/71_Ozenay_4.jpg","../image/image_71/71_Ozenay_5.jpg","../image/image_71/71_Ozenay_6.jpg"]},"Consult_chateau_formulaire2809":{"id":"Consult_chateau_formulaire2809","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Palleau","nom":"Palleau","type":"Maison forte","periode":"XIX","histoire":"PALLEAU, doit son origine à la voie romaine de Langres qui traversait la Dheune, puis la Bouzaise à proximité du hameau du port de Palleau. Le village mentionné du temps de Gontran Ier, Roi de Bourgogne au XIe siècle, a donné son nom, aux XIIe siècle et XIIIe siècle à d'anciens illustres seigneurs dont  P. de Paleau, maréchal de Bourgogne et son fils Hugues, connétable de Bourgogne. Le château de Palleau est tenu, en 1005-1006, par le seigneur Liébaud,  vassal du comte Otte-Guillaume et fondateur du prieuré Saint-Pierre.","architecture":"PALLEAU, les communs et les bâtiments annexes, plus ou moins remaniés, vestiges de l'habitation d'origine, datent du XVIIIe siècle, la demeure a été reconstruite dans la première moitié du XIXe siècle. Le château de  Palleau est situé dans le village à l'est. La demeure, à un étage, donne sur un grand parc au sud ouest, son élévation principale comprend 5 travées dont trois, au centre, sont surmontées d'un fronton triangulaire, les façades latérales présentent  deux travées. Une corniche en brique à modillons règne sur l'ensemble et encadre le fronton. Des bâtiments annexes sont adossés à une partie de la façade postérieure, y sont inclus deux corps  qui pourraient être des vestiges de l'ancienne habitation. Il s'agit d'un logis rectangulaire flanqué sur l'angle antérieur gauche d'un pavillon hors-oeuvre, le logis comprend  un rez-de-chaussée et un comble éclairé par  une lucarne cintrée encadrée  de volutes, le pavillon un étage.","habitants":"Famille  P. de Palleau\r\n        \"","divers":"Château de Palleau (mairie)","gps":"","images":["../image/image_71/71_Palleau_1.jpg"]},"Consult_chateau_formulaire8293":{"id":"Consult_chateau_formulaire8293","dept":"71","canton":"Paray-le-Monial","commune":"Paray-le-Monial","nom":"Paray_le_Monial","type":"Patrimoine","periode":"XIII-XVIII","histoire":"PARAY-LE-MONIAL,  trouve ses origines dans la construction au sommet d'une colline des ruines féodales  la tour de Billy  l'actuel quartier de Survaux, dans une vallée broussailleuse alors appelée Val d'Or, d'un prieuré et d'une église consacrée en 977. Cette construction avait été envisagée vers 971 par le Comte Lambert, premier comte héréditaire de Chalon sur Saône, fils de Robert, Vicomte d'Autun et fidèle du Roi Charles le Simple, en accord avec Saint-Maïeul, Abbé de Cluny jusqu'en 994, en \"reconnaissance des bienfaits de Dieu à son égard. Son fils Hugues Ier de Chalon, Chanoine d'Autun, devenu Comte de Châlon sur Saône en 988, fit don de cette Fondation à l'Abbaye de Cluny en 999 lorsqu'il fut sacré Evêque d'Auxerre. Par la suite, Saint Odilon, qui fut Abbé de Cluny jusqu'en 1049, installe  les moines sur les bords de la Bourbince où ils construisirent une nouvelle église. Son successeur, Hugues de Semur, Abbé de Cluny de 1049 à 1109, qui avait fait édifier une nouvelle abbatiale à Cluny, la jugeant alors insuffisante, la fit transformer par les bâtisseurs de Cluny III en une Basilique qui est celle que nous pouvons admirer de nos jours.","architecture":"Paray le Monial, hôtel de ville ancienne maison Jaillet du XVIe siècle. La tour Saint-Nicolas du XVIe siècle.\r\nLe musée Eucharistique du Hiéron, classé musée de France, il est le plus ancien d'art sacré  construit en tant que tel, Il a été édifié au XIXe siècle à l'initiative du jésuite Victor Drevon 1820-1880 et du baron Alexis de Sarachaga 1840-1918. Fermé pendant les années 1990, le musée a été entièrement rénové par la municipalité en 2005. Il présente aujourd'hui une riche collection d'uvres d'art autour du thème de l'Eucharistie, tableaux, sculptures, objets liturgiques\r\nLe musée Paul Charnoz regroupe les vestiges et  témoignages sur l'activité de céramique industrielle de Paray-le-Monial. La tour de Billy Dans la commune le château de Chapelain  et de Colombières.","habitants":"Famille de Hugues de Semur\r\n        \"","divers":"Patrimoine de paray le Monial, château de Chapelain, de Colombières, de St-Nicolas et de Senacle","gps":"","images":["../image/image_71/71_Paray_le_Monial_1.jpg","../image/image_71/71_Paray_le_Monial_2.jpg","../image/image_71/71_Paray_le_Monial_3.jpg","../image/image_71/71_Paray_le_Monial_4.jpg","../image/image_71/71_Paray_le_Monial_5.jpg","../image/image_71/71_Paray_le_Monial_6.jpg","../image/image_71/71_Paray_le_Monial_7.jpg","../image/image_71/71_Paray_le_Monial_8.jpg","../image/image_71/71_Paray_le_Monial_9.jpg"]},"Consult_chateau_formulaire108c":{"id":"Consult_chateau_formulaire108c","dept":"71","canton":"Mâcon","commune":"Sancé","nom":"Parc_Sance","type":"Maison forte","periode":"XIV","histoire":"PARC, le premier propriétaire connu du château du Parc est Jean, panetier du comte de Mâcon en 1231. Puis il a eu de multiples propriétaires tels que la famille de Chevrier en 1366 qui par alliance est passé à la famille de Busseul qui l'a conservé pendant un siècle. \r\nDans la première moitié du XVIe siècle, Françoise Mareschal, fille des précédents, leur succède la famille Mitte-Miolans de Chevrières,  la précédente épouse en 1550  Jean Mitte-Miolans de Chevrières, issu d'une famille du Forez. À partir du milieu du XVIIe siècle en 1659  Pierre Perrachon, seigneur de Senozan, personnage richissime, succède aux Mitte-Miolans, il abandonne le château à des régisseurs, ce que feront aussi ses successeurs.\r\nEn 1778  Madeleine Olivier de Senozan, fille de Jean-François Olivier de Senozan, marquis de Viriville, épouse en 1778  Archambaud-Joseph, comte de Talleyrand-Périgord, frère du célèbre Talleyrand. Au milieu du XIXe siècle la propriété passe à  la famille de Lacretelle et en 1917  la propriété passe à  François Monterrat. En 1948 propriété de René Monterrat et Mélanie Rollet. En 1969  propriété de Suzanne Renoud-Grappin.                                  Dans la commune le château de Lapalus.","architecture":"Parc, le château est construit au XIVe siècle donjon dont les murs de trois mètres d'épaisseur à la base flanqué de deux tourelles miniatures, les murailles extérieures, en partie conservées, décrivent un polygone irrégulier, épaisses d'un mètre et hautes de\r\nsix à sept mètres, elles étaient, jusqu'en 1835, entourées de larges fossés d'eau vive que franchissait un pont-levis.\r\nÀ l'intérieur de cette enceinte, à laquelle sont adossés divers communs, s'élève un donjon circulaire de 18 mètres de hauteur contre lequel s'appuie, au nord, l'ancien corps de logis, lui-même flanqué d'une petite tour ronde, le donjon comprend un rez-de-chaussée voûté dépourvu de toute ouverture, un étage voûté d'arêtes occupé par une chapelle éclairée par trois étroites baies à arc en lancette et un second étage relié au précédent par un escalier pratiqué dans l'épaisseur du mur, que ceinture à l'extérieur une rangée de consoles de pierre destinées à soutenir des hourds auxquels donnaient accès trois ouvertures circulaires, le logis comporte lui-même un rez-de-chaussée pourvu d'une vaste cheminée et un étage avec plafond à poutres apparentes à la française, qu'une petite porte met en communication avec la chapelle. Les divers bâtiments, y compris le donjon, sont couverts de toits plats en tuiles creuses.","habitants":"Famille de Busseul\r\n        \"","divers":"Maison forte de Parc-Sancé et le château de Vallière","gps":"","images":["../image/image_71/71_Parc_Sance_1.jpg","../image/image_71/71_Parc_Sance_2.jpg"]},"Consult_chateau_formulaire60f0":{"id":"Consult_chateau_formulaire60f0","dept":"71","canton":"Mâcon","commune":"Mâcon","nom":"Perrieres","type":"Château","periode":"XVI","histoire":"PERRIERES,  le château a été agrandi probablement à la fin du XVIIIe siècle, à partir d'un important bâtiment central édifié, par l'une des nombreuses familles juives installés dans la région entre le XIVe siècle et le XVIIIe siècle. En 1735, un incendie endommage le corps de logis central.\r\nEntre dans la famille Parseval, en 1828 à la suite du mariage entre Félicité-Berthille Benon de Vosgines 1802 - 1853 et Jules-Alexandre de Parseval-Grandmaison 1795 - 1876, fils du poète François-Auguste de Parseval-Grandmaison et neveu du mathématicien Marc-Antoine Parseval. Par alliance en 1854  de Louise-Henriette de Parseval-Grandmaison 1829 - 1915, fille des précédents, avec Georges de Parseval 1830 - 1896.\r\nLe marquis de Parseval de Foudras vend en 1938 l'ensemble à Marthe Billion du Rousset 1874 - 1960, veuve d'Henri-Pie de Parseval 1874 - 1930.  Propriété de la descendance, Pierre-Georges-Émile de Parseval 1907 - 1989, la comtesse de Hennezel d'Ormois et la baronne de Sancy de Rolland.","architecture":"Perrière,; entre le  XVe siècle et le XVIIIe siècle, un château est édifié, vraisemblablement par l'une des nombreuses familles juives installées dans la région.  La construction comprend un corps de logis encadré de deux ailes en retour d'équerre flanquées aux angles de quatre pavillons carrés. Des pierres appareillées marquent les angles des bâtiments et l'encadrement des fenêtres. Une porte encadrée de bossages et surmontée d'un fronton brisé ouvre sur la cour au centre du logis.\r\nDes fossés autour du château et des canonnières dans les pavillons de chaque côté de l'entrée sont seuls à évoquer des éléments de défense. Dans l'aile sud, se trouve la chapelle revêtue de boiseries et ornée de peintures.","habitants":"Famille Parseval\r\n        \"","divers":"Château de la Perrières","gps":"","images":["../image/image_71/71_Perrieres_1.jpg","../image/image_71/71_Perrieres_2.jpg"]},"Consult_chateau_formulaire31f5":{"id":"Consult_chateau_formulaire31f5","dept":"71","canton":"Pierre-de-Bresse","commune":"Pierre-de-Bresse","nom":"Pierre_de_Bresse","type":"Château","periode":"XVII","histoire":"PIERRE DE BRESSE, cité en 1092 par donation de l'évêque de Chalons au prieur \"Robertus de Petra\" le premier seigneur qui donna son nom.  Au XIIIe siècle à la famille de Vienne, et par alliance  en 1380 à la famille Jean Mypont dont la veuve, Jeanne de Villiers l'apporte à son second époux Jean Bouton de Fay en 1436 jusqu'à la fin du XVIe siècle que Claude Bouton hérita de la Baronnie, ce dernier vend son fief à son beau-frère le poète Pontus de Tyard, le château fut remanié en 1680 par Claude de Tyard comte de Bissy militaire sous Louis XIV  et restera dans cette famille de militaire jusqu'en 1852, la baronnie passe par alliance à Ludovic-Omer Marquis d'Estampes. En 1880, à la mort de la marquise d'Estampes, le second de ses fils, Ambroise-Théodore d'Estampes 1826 - 1889, hérite du château. En 1889, Louis d'Estampes, passe à son cousin germain du précédent, en 1901 sa veuve , Jeanne Bayet, d'origine belge, hérite du domaine. En 1920, Hector d'Estampes et André d'Estampes, le fils  de Louis d'Estampes, héritent du domaine. \r\nEn 1944, un incendie ravage l'aile gauche du château mais le logis seigneurial est épargné et en 1955, décès d'André, comte d'Estampes. En 1956, le département de Saône-et-Loire acquiert le château et transforme les communs en maison de retraite. \r\nEn 1981  le château abrite l'Ecomusée de la Bresse Bourgignonne.\r\nTERRANS, au XVe siècle seigneurie des Terrans, cette famille de ce nom  possédait une maison forte de l'un de ses représentant en 1427 était conseiller de Philippe le Bon. La seigneurie sera morcelée entre plusieurs propriétaires, avant d'être réunifiée à la fin du XVIIe siècle par la famille  de Chatenay, en 1707 par alliance la seigneurie passe à jean François de Truchis, le troisième fils  Guillaume de Truchis comte de Surville lieutenant du roi pour les villes et citadelles de Chalon sur Saône, fit construire le château en 1765 toujours dans la famille des Truchis de Varennes.                                 Dans la commune le château Paillot Transformé en collège.","architecture":"Pierre de Bresse, du château féodal qui fut reconstruit et agrandi en forme de U en 1680, sur l'emplacement d'une  ancienne forteresse entouré de douves, corps de logis principal à deux niveaux possède un avant corps en saillie et fronton trapézoïdal portant l'écusson des Tyard, deux ailes en retour d'équerres flanqués aux extrémités de tours rondes coiffées de dômes à campaniles percées, à l'exception de la tour nord-est, de canonnières, les communs furent construit en 1744 et servent de maison de retraite départementale.                                                                          Terrans, château construit en 1765 de forme rectangulaire le corps de logis comporte un rez-de-chaussée élevé sur un sous-sol, un étage carré et un étage de combles, oeils-de-boeuf sur la base du toits, un avant corps central  avec fronton triangulaire sculpté, les communs identiques le précédent implantés de part et d'autre  de la cour .","habitants":"Famille de Claude de Tyard \r\n        \"","divers":"Château de Pierre de Bresse et de Terrans","gps":"","images":["../image/image_71/71_Pierre_de_Bresse_1.jpg","../image/image_71/71_Pierre_de_Bresse_2.jpg","../image/image_71/71_Pierre_de_Bresse_3.jpg","../image/image_71/71_Pierre_de_Bresse_4.jpg","../image/image_71/71_Pierre_de_Bresse_5.jpg","../image/image_71/71_Pierre_de_Bresse_6.jpg","../image/image_71/71_Pierre_de_Bresse_7.jpg","../image/image_71/71_Pierre_de_Bresse_8.jpg","../image/image_71/71_Pierre_de_Bresse_9.jpg"]},"Consult_chateau_formulaire45d7":{"id":"Consult_chateau_formulaire45d7","dept":"71","canton":"Tramayes","commune":"Pierreclos","nom":"Pierreclos","type":"Château","periode":"XVI","histoire":"PIERRECLOS, ce château  a servit au siège de Philippe le Bon et Charles VII alors Dauphin.  La  Seigneurie cité au XIIe siècle construction du premier donjon en 1132 par Hugues de Berzé,  cette seigneurie passa  en 1403 à Ymbaud de Bletterans don fait par Louis de Savoie prince de Morée passera ensuite par alliance à Humbert de Rougemont en 1434 et en 1665 la seigneurie  fut achetée par Jean Michon qui possédait également le château de Berzé-le-Châtel, le comte de Pierreclos et sa famille furent arrêtés à la Révolution, seule leur fille Jacqueline Marguerite qui parviendra à se cacher et récupère son bien par la suite, les Pierreclos recevront souvent Lamartine qui rencontra Nina Dezoteux futur Nina de Pierreclos et  Laurence,\" l'héroïne  de Jocelyn\".   En 1817 le château fut vendu et passera ensuite dans différentes mains et au XXe siècle deviendra  un centre de vacances pour la ville d'Aubervilliers, passa à la famille de M. Fouilloux et fut ensuite acquit en 1989 par la famille Pidault, aujourd'hui musée de la vigne et du vin.","architecture":"Pierreclos,  sur un monticule dans la vallée  de la petite Grosne origine du XIIe siècle le donjon le prouve qu'il était une demeure fortifiée, le château fort reconstruit en partie au XVIe siècle à subit de nombreux dommages lors des guerres de religion et autres. Dans l'avant cour s'ouvre un passage voûté donnant sur la cour, au sud se dresse la tour du XVe siècle contre cette tour s'adosse un bâtiment rectangulaire suivit d'un autre en équerre à deux étages flanqué d'une tour carrée, dans le prolongement le donjon  du XIIe siècle tour carrée à toits vernissés possédait au XIXe siècle des échauguettes, à gardé sa chapelle romane, ses salles médiévales et classiques et ses immenses caves voûtées, il fut ravagé et pillé et à moitié brûlé par les pillards à la Révolution.","habitants":"Famille d'Humbert de Rougemont\r\n        \"","divers":"Château de Pierreclos","gps":"","images":["../image/image_71/71_Pierreclos_1.jpg","../image/image_71/71_Pierreclos_2.jpg","../image/image_71/71_Pierreclos_3.jpg","../image/image_71/71_Pierreclos_4.jpg","../image/image_71/71_Pierreclos_5.jpg","../image/image_71/71_Pierreclos_6.jpg"]},"Consult_chateau_formulairec03c":{"id":"Consult_chateau_formulairec03c","dept":"71","canton":"Mesvres","commune":"Brion","nom":"Pignon_Blanc","type":"Château","periode":"XVII","histoire":"PIGNON-BLANC, le domaine paraît avoir été constitué par la famille Roux. Durant la seconde moitié du XVIIIe siècle, Pierre Roux, lieutenant en la maîtrise d'Autun, est propriétaire de la terre.\r\nEn 1767, Albert Nivier, cousin du précédent et piqueur au second vol pour Milan de la grande fauconnerie de sa Majesté, acquiert  le domaine, c'est lui, ou peut-être Pierre Roux, qui fait bâtir le château actuel, à la fin du XVIIIe siècle, le domaine revient à Lazare Roux de Bellerue, jusqu'en 1877, la famille de Fussey possède le château.\r\nÀ partir de 1947, Pierre de Brabois le rachète à M. West, époux de Mme née du Noyer de Ségonzac, son fils Philippe en hérite en 1994.                      \r\nCHARMOIS, cette élégante construction, un peu cachée par la végétation, comporte une tourelle d'escalier,  est une propriété du XVe siècle.","architecture":"Pignon-Blanc,  la simplicité de style caractérise ce petit château qui se compose d'un corps de logis encadré de deux ailes peu saillantes. Au centre du logis, la porte est encadrée de moulures, un portail donne accès à la cour bordée de chaque côté par des communs dont les portes cintrées ont remplacés des ouvertures rectangulaires, malgré de nombreuses mutations successives, le château a conservé intact son aspect et son unité.","habitants":"Famille Roux\r\n        \"","divers":"Château de Pignon Blanc","gps":"","images":["../image/image_71/71_Pignon_Blanc_1.jpg","../image/image_71/71_Pignon_Blanc_2.jpg","../image/image_71/71_Pignon_Blanc_3.jpg"]},"Consult_chateau_formulaire36c9":{"id":"Consult_chateau_formulaire36c9","dept":"71","canton":"Mesvres","commune":"La Boulaye","nom":"Plaigne_Boulaye","type":"Château  Temple","periode":"XV-XX","histoire":"PLAIGNE à la Boulaye, le temple des mille Bouddhas siège de la congrégation Dashang-Kagyu-Ling fondée en 1974 par Kyabjé-Kalou-Rimpotché maître tibétain a été inauguré le 22 août 1987 par sa sainteté Kalou-Rimpotché et le vénérable Bokar-Tulkou. En 1977 le seizième Karmapa a béni l'emplacement du temple, ce dernier a été construit sur le modèle du premier,  fondé au VIIIe siècle par un lama tibétain, ce n'est qu'en 1987 que la communauté s'installe officiellement sur le domaine du château de Plaige à Toulon sur Arroux en Bourgogne du sud, ce temple s'élève sur trois niveaux symbolisant, le corps, la parole et l'esprit des Bouddhas. Le centre Bouddhiste est reconnu officiellement comme congrégation religieuse en 1995.   Dans le parc agrandissement d'un ancien chenil après l'incendie du château de la famille de Montmort en 1824.  Adossé à une grande forêt, il est situé dans un cadre champêtre préservé, le vieux bourg de la Boulaye, ferme, église, four à pain, glacière datant des XVII et XVIIIe siècle, à quelques mètres seulement du Temple des Mille Bouddhas.\r\nLa famille Roux emblématique de la région et de son essor industriel.","architecture":"Plaignes, il comporte cinq entités distinctes, la partie centrale, les deux ailes intérieures, les deux ailes extérieures, de plus, le bâtiment même s'il ne présente pas une valeur architecturale significative, comporte une charge symbolique forte puisqu'il a fait partie entre 1894 et 1938 du patrimoine des Schneider,  Château détruit en 1820.                      Dans la commune un autre château et une tour du XVe siècle.","habitants":"Famille Roux\r\n        \"","divers":"Vestiges et château de Plaigne et la Petite Verrière","gps":"","images":["../image/image_71/71_Plaigne_Boulaye_1.jpg","../image/image_71/71_Plaigne_Boulaye_2.jpg","../image/image_71/71_Plaigne_Boulaye_3.jpg","../image/image_71/71_Plaigne_Boulaye_4.jpg","../image/image_71/71_Plaigne_Boulaye_5.jpg"]},"Consult_chateau_formulairee47c":{"id":"Consult_chateau_formulairee47c","dept":"71","canton":"Montcenis","commune":"Blanzy","nom":"Plessis_Blanzy","type":"Château","periode":"XVII","histoire":"PLESSIS, dès le XIIIe siècle le château est signalé sur une butte qui domine l'étang de Plessis, Hugues IV duc de Bourgogne en fit don  en 1348  à  Barthelémy de Champrond qui le revendit  à Girard Damas, se succède Catherine de l'Espinasse en 1374  dont la fille, Isabeau l'apporta en dot en 1397 à Huguenin Damas de Cousan. Le fief fut saisi sous Eustache de Levis et Alix de Cousan  en 1433, au profit de Nicolas Rolin, Chancelier de Bourgogne qui le conserva jusqu'à sa mort. Le fils aîné épousa Marie de Levis, cette famille conserva le domaine jusqu'en 1479, la famille de Levis  parvint alors à se faire restituer le Plessis, qu'elle conserva  jusqu'à sa vente, par Antoine de Levis à Louis Quarré qui le céda en 1744 à son frère Blaise. Avant 1725, il appartenait au Comte Robin de Barbentane, qui logeait dans le château ci-contre, alors Député du Corps Législatif et cette retenue deau servait à lalimentation dun moulin installé en aval de la digue du réservoir. Lors des crues de 1825, une brèche de 50 m sétait produite dans la digue. Celui ci fit construire le grand logis en prolongeant vers l'ouest les bâtiments du vieux château et, ayant fait combler les fossés, aménagea terrasses et jardins,  puis, à demi ruiné, dut vendre sa demeure, en 1770, à Jean-Pierre Delglat, trésorier de France à Lyon, Marie Delglat en 1802, hérite,  La petite-fille de Jean-Pierre épousa en 1812 Etienne Robin, marquis de Barbentane, dont descendent les propriétaires actuels.","architecture":"Plessis, depuis 1744 le château possédait encore un aspect médiéval avec pont-levis et fossés, aujourd'hui l'ensemble restauré dans un style néo-gothique du XIXe siècle à conservé de son passé trois tours du XIVe siècle flanqués de mâchicoulis d'échauguettes et deux d'entre elles à toit pointus,  une tourelle d'escalier fut accolée à la tour de la Madeleine.","habitants":"Famille du Comte Robin de Barbentane\r\n        \"","divers":"Château du Plessis","gps":"","images":["../image/image_71/71_Plessis_Blanzy_1.jpg","../image/image_71/71_Plessis_Blanzy_2.jpg","../image/image_71/71_Plessis_Blanzy_3.jpg","../image/image_71/71_Plessis_Blanzy_4.jpg","../image/image_71/71_Plessis_Blanzy_5.jpg","../image/image_71/71_Plessis_Blanzy_6.jpg"]},"Consult_chateau_formulaire4705":{"id":"Consult_chateau_formulaire4705","dept":"71","canton":"St-Gengoux-le-National","commune":"Cortevaix","nom":"Pommier_Cortevaix","type":"Château","periode":"XVII","histoire":"POMMIER, ruines féodales du pressoir et château du Pommier de la fin du XIVe siècle, le fief est tenu par une famille qui en porte le nom, le seigneur de Pommier prête en 1478 hommage à Louis XI. Les Chemilly possèdent le fief au XVIe siècle et au début du XVIIe siècle  Claudine de Chemilly épouse Philippe de Raffin qui devient seigneur de Pommier et dont les descendants le demeureront jusqu'à la fin de l'Ancien Régime. Succédé au XVIIe siècle par son fils Georges de Raffin et  son  petit-fils François de Raffin, au XVIIIe siècle.\r\nA l' époque révolutionnaire, le citoyen Acquin, habitant de Cluny, achète le bien,  puis vers 1830  l'ensemble est divisé en lots et acquis par plusieurs propriétaires qui vont le défigurer et à la fin XIXe siècle  le capitaine de frégate Cros restaure le corps de logis principal. Est le château est acheté au XXe siècle Par M. Chabrier.","architecture":"Pommier, la construction se dresse au nord d'une cour à laquelle on accède au sud par une porte charretière et une porte piétonne en plein cintre, elle consistait à l'origine en un corps de logis rectangulaire à deux étages carrés, flanqué de deux tours rondes, l'une sur l'angle nord est, l'autre sur sa façade sud, cette dernière possède encore les trois consoles d'une bretèche qui dominait une porte disparue. Des bâtiments annexes ont été plaqués au XIXe siècle contre cette façade sud.","habitants":"Famille de Georges de Raffin\r\n        \"","divers":"Château de Pommier","gps":"","images":["../image/image_71/71_Pommier_Cortevaix_1.jpg","../image/image_71/71_Pommier_Cortevaix_2.jpg","../image/image_71/71_Pommier_Cortevaix_3.jpg","../image/image_71/71_Pommier_Cortevaix_4.jpg","../image/image_71/71_Pommier_Cortevaix_5.jpg"]},"Consult_chateau_formulaire9fd0":{"id":"Consult_chateau_formulaire9fd0","dept":"71","canton":"Buxy","commune":"July-les-Buxy","nom":"Ponneau","type":"Château","periode":"XV","histoire":"PONNEAU, il sera transmis ou cédé depuis le milieu du XIVe siècle jusqu'en 1790 où selon la loi du 10 frimaire an II il reviendra aux domaines publics.\r\nElément du domaine royal, le fief, en 1537 déjà pourvue d'un petit château et d'une chapelle, est transmis à Antoine de Bressey, seigneur de Saint-Germain-des-Bois, aujourd'hui Saint-Germain-les-Buxy.  Françoise de Bressey, au  XVIe siècle fille du précédent, l'apporte en dot à Nicolas de Thyard de Bissy, puis le fief revient à Antoine de Bressey qui la cède à Hugues de Rouvray. \r\nAnne Gallois, en  1620  épouse de Jacques de Mucie, hérite du domaine.  Au milieu du XVIIe siècle, Catherine de Mucie apporte la terre en dot à Jean-Baptiste Pouffier, conseiller au parlement de Bourgogne,  et en 1656  celui-ci revend la propriété à Alphonse et Théophile Joly.  Après être passé en  1731 entre les mains de divers propriétaires, le domaine est acheté par Henri-Louis Jean, dont les descendants se succéderont jusqu'à la Révolution. Puis retour au domaine public, adjudication au bénéfice de M. de La Roque de Champfray et vendu à M. Martin Perret de Davenay  de nouveau vendu le 3 novembre 1843 à M. Alin-Lorandet qui le transmet à son petit-fils M. Paul Adenot propriétaire entre 1880 et 1900. Ce dernier restaura la chapelle en y adjoignant un clocher peigne.\r\nAu XXe siècle le château appartient à Jean Michaud, qui le tenait de son oncle le général Chaillet, mort sans enfant en 1955. Ce général de l'artillerie coloniale commandait l'artillerie de l'armée française devant Monte Cassino.","architecture":"Ponneau à July les Buxy, la construction comprend un bâtiment rectangulaire flanqué de tours d'angle circulaires, l'ensemble paraissant dater du XVe siècle, un portique et une galerie haute, à arcades en plein cintre, desservis par une tour escalier rectangulaire.\r\nA Jully les Buxy motte féodale du XIIIe siècle, le château de la Boutière et le château de la Guiche.","habitants":"Famille d'Antoine de Bressey\r\n        \r\n        \"","divers":"Château de Ponneau, de bouthières et de Guiche","gps":"","images":["../image/image_71/71_Ponneau_1.jpg","../image/image_71/71_Ponneau_2.jpg","../image/image_71/71_Ponneau_3.jpg","../image/image_71/71_Ponneau_4.jpg"]},"Consult_chateau_formulaire0791":{"id":"Consult_chateau_formulaire0791","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Pontoux","nom":"Pontoux","type":"Château","periode":"XVII","histoire":"PONTOUX,   les Clunistes y avaient un prieuré de Saint-Pierre, avec un prieur et  deux moines. Ils y ont encore une maison. Etienne de Neublans, partant pour la croisade, donna ce village à Saint-Marcel en 1116. Le prieuré de Saint-Marcel de Chalon qui dépendait de Cluny devint propriétaire des bois, des prés et tout le territoire dépendant de ce lieu. Le domaine était exploité par des laïcs et des religieux. Les principaux bâtiments actuels, logis et grandes dépendances datent probablement de la fin du XVIIe siècle ou du début du XVIIIe siècle, les porcheries sont des constructions du XIXe siècle. Le logis principal a été remanié au XXe siècle.   Dans la commune,une tour féodale et  le château d'Arlay.","architecture":"PONTOUX,  le château construit au milieu du XVIIe siècle a subi plusieurs remaniements au cours du XXe siècle, dont la réfection du toit qui entraîna la suppression de plusieurs lucarnes. Construit dans le village, sur une vaste prairie, l'édifice se compose d'un logis en U précédé d'une cour  qu'encadrent deux grands bâtiments rectangulaires, le colombier est isolé au nord, les encadrement des ouvertures en pierre de taille exceptées les portes charretières des dépendances qui ont un linteau en bois.  Le logis présente des ouvertures en arc segmentaire et des lucarnes en plein-cintre, le château est couvert  d'un toit brisé à croupes, ainsi que l'ancien bâtiment des communs et des dépendances, à gauche, d'un toit à longs pans, le colombier circulaire a perdu son toit conique.","habitants":"Famille de Pontoux\r\n        \r\n        \"","divers":"Château de Pontoux","gps":"","images":["../image/image_71/71_Pontoux_1.jpg","../image/image_71/71_Pontoux_2.jpg"]},"Consult_chateau_formulaire3f9e":{"id":"Consult_chateau_formulaire3f9e","dept":"71","canton":"Mâcon","commune":"Fuissé","nom":"Pouilly_Fuisse","type":"Château","periode":"XV","histoire":"POUILLY, bâti en 1551 et dans sa septième génération de Propriétaire     Le nom de Pouilly apparaît dans les textes dès le Xe siècle, mais nulle mention n'est faite des maîtres du lieu avant la fin du XVIIe siècle. En 1673, Jean de Macet est seigneur de Davayé, Pouilly et Solutré, puis six an plus tard, en 1679, Philippe de Testenoire, veuve d'Antoine Pollet, reprend le fief. La maison passe ensuite en 1696 à Antoine Pollet, docteur en médecine, en 1728 à son fils Antoine, en 1769 à Jeanne Marie Philippe Pollet, veuve de Hugues Eustache Chanorier.                                             FUISSE, cité au Xe siècle, Jean de Macet en 1673, seigneur de Davayé, Pouilly et Solutré est le premier maître des lieux connus. Dame Philippe de Testenoire en 1679, veuve d'Antoine Pollet, bourgeois de Mâcon, reprend le fief.\r\nLa propriété passe en 1696 à un autre Antoine Pollet, docteur en médecine à Mâcon, le fils d'Antoine en 1728, prénommé aussi Antoine, en hérite  et en 1769  la propriété revient à Jeanne-Marie-Philippe Pollet, veuve de Hugues-Eustache Chanorier. En 1852 Fuissé est la propriété de la famille Vincent , et c'est désormais à Antoine, cinquième génération, que revient la tâche de perpétuer l'excellence du domaine implanté au coeur du Mâconnais.        Dans cette commune riche en viticulture plusieurs châteaux celui de Beauregard de monsieur Burier celui de monsieur Vincent, le château de Lavernette (voir article) et le château de Vitallis","architecture":"Fuissé, au-delà d'une porte cochère en anse de panier, accostée d'une porte piétonne en plein cintre, manifestement remontées au XIXe siècle, le manoir se présente sous la forme d'un gros pavillon de plan carré sous un toit brisé de tuiles plates, flanqué, dans le même alignement, de deux ailes basses couvertes de toits à croupes en tuiles creuses. Une tour d'escalier circulaire demi-hors uvre occupe le centre de la façade sud. Elle est défendue par des canonnières et possède encore les consoles d'une bretèche. Deux autres tours circulaires flanquent la façade nord. À droite de la tour d'escalier, les fenêtres sont partagées par un croisillon. Des corniches à modillons d'un type uniforme règnent à la base de toutes les toitures. L'ensemble doit dater de la fin du XVe siècle.","habitants":"Jean de Macet\r\n        \"","divers":"Châtau de Pouilly et de Fuisse","gps":"","images":["../image/image_71/71_Pouilly_Fuisse_1.jpg","../image/image_71/71_Pouilly_Fuisse_2.jpg","../image/image_71/71_Pouilly_Fuisse_3.jpg","../image/image_71/71_Pouilly_Fuisse_4.jpg"]},"Consult_chateau_formulaire89d1":{"id":"Consult_chateau_formulaire89d1","dept":"71","canton":"Pierre-de-Bresse","commune":"Pourlans","nom":"Pourlans","type":"Château","periode":"XV","histoire":"POURLANS, au XIIIe siècle la maison-forte de Pourlans est propriété des de Vienne, en 1450, celle des Courcelles. Les Jésuites du Collège des Godrans de Dijon prennent possession de la baronnie en 1656 et la gardent jusqu'à  la Révolution. En 1771, le château était entouré de fossés, fermé par une muraille, accessible par  un pont-levis, constitué de trois grands corps de logis avec pigeonnier, de quatre granges, de deux pressoirs et d'une halle, le  tout sur une surface de cinq hectares environ. Lors de la vente des biens nationaux,  le château est scindé en deux parties.  Le cadastre en 1836 montre de nombreux bâtiments détruits, aujourd'hui dont un qui semble être le principal par  sa disposition, l'allée centrale aboutissant au milieu de sa façade. Une grande partie du château a été détruite dans les années 1960 et aujourd'hui il ne reste qu'un des bâtiments d'habitation. Le porche d'entrée a été refait très récemment et on dénombre plusieurs hangars modernes.  Dans la commune le château de Crotte.","architecture":"Château de Pourlans, situé à l'extrémité de la rue principale desservi par une allée centrale, le plan général est en T, la partie la plus large à l'entrée et on voit encore l'emplacement des fossés. Tous les bâtiments sont en brique et percés de jours circulaires. La ferme située à gauche juste après le porche d'entrée est constituée d'une grange flanquée d'un double logis à gauche et d'une étable à droite, elle possède un soubassement et des encadrements de baie en pierre, une porte gerbière à l'aplomb de chacune des deux baies des logis, vestiges du mur de brique à contreforts longeant l'allée centrale à gauche, le seul logis restant est situé tout au fond: il est de plan carré, à un étage, avec un pigeonnier demi hors oeuvre dans l'angle postérieur droit, deux escaliers  d'accès au rez-de-chaussée surélevé, en pierre,  l'un perpendiculaire à la façade, l'autre parallèle au petit pan  droit un chasse-roue accolé à la première marche.","habitants":"Jésuites du Collège des Godrans\r\n        \"","divers":"Château de Pourlans et de Crotte","gps":"","images":["../image/image_71/71_Pourlans_1.jpg","../image/image_71/71_Pourlans_2.jpg","../image/image_71/71_Pourlans_3.jpg","../image/image_71/71_Pourlans_4.jpg"]},"Consult_chateau_formulaired103":{"id":"Consult_chateau_formulaired103","dept":"71","canton":"St-Bonnet-de-Joux","commune":"Pressy-sous-Dondin","nom":"Pressy_sous_Dondin","type":"Château","periode":"XVIII","histoire":"PRESSY sous Dondin, Dondin  aujourd'hui en ruines, Il fut construit au XIIe siècle, au sommet dun vallon dominant la Gande, ce devait être une forteresse imposante, elle fut en partie détruite, et certainement utilisé comme carrière de pierres par les habitants. \r\nPressy, était la propriété  du comte de Châtenet de Puységur ancien officier des dragons, la maison des châtenet de Puységur  originaire de L'Armagnac, compte parmi les plus anciennes  et les plus respectés de cette province, lactuel château de Pressy est très récent, mais il est le résultat dun agrandissement fait par Max de Longueville en 1871 et non dune reconstruction, le château nayant jamais été détruit et démantelé. Les seigneurs de Pressy,  Anthoine de Drompvent et en 1859, et Max de Longeville.         Marchizeuil,  situé légèrement à lécart du hameau de Marchizeuil, il fut saccagé et démantelé à de nombreuses reprises jusquau XVIIIe siècle, ce devait être une construction assez importante, avec douves et fortifications, il fut de nouveau bâti en 1751 par Jean-François de Montel de Buxy qui  fit combler les fossés.\r\nChâteau dit le\" Tinailler du Château\",  lactuel tinailler  fut construit en 1679, avec les deniers personnels de Nicole de la Souche, la jeune épouse du seigneur de Pressy Hugues de Collonge, il remplaça le précédent « construit en terre » qui venait dêtre emporté par un violent orage, il comporte une cave au rez-de-chaussée et un cuvage à létage, la vieille chapelle, le domaine des Henrys, l'église, en 1972, fut tourné au domaine des Henrys le film réalisé par Henri Graziani « Poil de Carotte », avec Philippe Noiret et Monique Chaumette.                                                                   Un autre château dans la commune dit de Truchot.","architecture":"A l'écart des grands axes de circulation, la commune de Pressy-sous-Dondin marque le passage entre le Charolais et le Clunisois, la petite vallée de la Gande marquant la frontière. \r\nSi l'architecture Clunisoise reste omniprésente, avec ses maisons à galerie et pigeonnier carré, la pierre jaune a disparu pour être remplacée par le granit gris. Il n'existe pas de bourg à proprement parler, mais la partie centrale du village qui regroupe la mairie, le château et l'église se divise en deux sections très anciennes, dont on retrouve trace déjà au XVème siècle, le bas de Pressy et le haut de Pressy, auxquelles se greffent les deux hameaux des Thévenins et des Copets. \r\nLes principaux monuments à voir à Pressy sont, le château de Dondin,  de Marchizeuil,  de Pressy,  le château primitif était constitué dun quadrilatère denviron 100 mètres de côté, entouré de douves et formé par des bâtiments dexploitation reliés à lhabitation de taille modeste, puisquelle ne comportait quune quinzaine de pièces.                                                                 Le Tinailler du château. Le domaine des Henrys, le long de la route menant de Pressy-sous-Dondin à Marchizeuil, se trouve un élégant domaine qui semble dater du XIX siècle, lensemble des bâtiments forme un quadrilatère fermé, le logis étant surélevé et ne comportant quun étage, côté cour, laccès se fait par un large escalier en pierre, et côté jardin, le logis souvre sur le vallon formé par le ruisseau de Pressy-sous-Dondin.","habitants":"Comte de Châtenet de Puységur\r\n        \"","divers":"Château de Pressy, de Dondin, de Marchizeuil, de Truchot, la Chapelle et la Tour","gps":"","images":["../image/image_71/71_Pressy_Dondin_1.jpg","../image/image_71/71_Pressy_Dondin_2.jpg","../image/image_71/71_Pressy_Dondin_3.jpg","../image/image_71/71_Pressy_Dondin_4.jpg","../image/image_71/71_Pressy_Dondin_5.jpg","../image/image_71/71_Pressy_Dondin_6.jpg","../image/image_71/71_Pressy_Dondin_7.jpg"]},"Consult_chateau_formulaire12af":{"id":"Consult_chateau_formulaire12af","dept":"71","canton":"Tournus","commune":"Préty","nom":"Prety","type":"Château","periode":"XIX","histoire":"PRETY, château des Pendants du XIXe siècle, au dessus de la porte d'entrée armoiries anciennes des Saulnier de Laroue, famille de Tournus originaire du Charolais et qui a donné l'épiscopat  du célèbre Pierre Saulnier évêque d'Autun au XVIe siècle député des états   généraux en 1593.                                                                         Le château des Pendants appartient depuis le XIXe siècle à la famille de Gauthey.","architecture":"Prety,  le château a remplacé une villa romaine  du temps ou les Romains exploité les carrières de pierres  ce château aujourd'hui s'est éloigné de ses dépendances  dans un style néo-classiques  des années 1850 très remanié précédé par une curieuse maison du XIXe siècle.                                                                                      \r\n Trois manoirs, dont une magnifique propriété du XVIIIe siècle disposant de dépendances louées comme gîtes et chambres d'hôtes.","habitants":"Famille de Tournus\r\n        \"","divers":"Château de Prety et des Pendants","gps":"","images":["../image/image_71/71_Prety_1.jpg","../image/image_71/71_Prety_2.jpg"]},"Consult_chateau_formulaireab34":{"id":"Consult_chateau_formulaireab34","dept":"71","canton":"Mont-St-Vincent","commune":"Gourdon","nom":"Puits","type":"Château","periode":"XVI","histoire":"PUITS, le fief des Puits appartenait du XVIIe siècle jusqu'au début du XVIIIe siècle à la famille de Thésut, il échut ensuite à François Raffin de Sermaise et à Claudine de Beugre, son épouse, qui le laissèrent en 1761 à leur fils, Gabriel Raffin de Sermaise. Le château, qui semble résulter des transformations du XVIIe au XVIIIe et des bâtiments médiévaux, est parvenu par successions familiales au propriétaire actuel M. J. Gauthier de Bellefond.","architecture":"Puits, le logis principal en occupe la plus grande partie du côté Est, couvert d'un haut toit à croupes en tuiles plates, il est flanqué sur ses façades latérales de tours rondes coiffées de toits coniques, la tour nord renferme un escalier à vis qui dessert les différents niveaux de l'habitation, la partie supérieure de la tour sud, soulignée à l'extérieur par un bandeau, est occupée par un pigeonnier.","habitants":"Famille de Thésut\r\n        \"","divers":"Château du Puits","gps":"","images":["../image/image_71/71_Puits_1.jpg"]},"Consult_chateau_formulaire2ae9":{"id":"Consult_chateau_formulaire2ae9","dept":"71","canton":"Bourbon-Lancy","commune":"Bourbon-Lancy","nom":"Puzenat_Vignault","type":"Château","periode":"XVII","histoire":"PUZENAT, au XVIIIe siècle  était  la propriété de la famille Pinot. De janvier 1757 à décembre 1834, de Jean-Marie Pinot, médecin du roi à Charles Repoux, puis de Jacques Repoux fils de Charles officier de Louveterie à Gaspard Pinot, médecin comme Jean-Marie, son père, puis de Marie-Rose Pinot, fille de Gaspard et épouse de Jean Alban Marion, médecin à Lormes, à son frère Antoine Pinot, médecin à Bourbon-Lancy. En 1860, par le biais de Louis Antoine Jean Marie Pinot, maire de Bourbon-Lancy de juillet 1856 jusqu'en août 1865, successeur de Lazare Compin, la fille de Louis épouse Emmanuel Carrelet de Loisy en juillet 1877, ils auront trois fils. A la mort de Mme de Loisy, les descendants  vendent ce qui est devenu une superbe propriété et dont   la maison d'habitation est appelée \"château\". L'acte de vente du 7 août 1905 à Claude Amable  et acheté par la ville de Bourbon-Lancy en 1969 un incendie criminel en 1995 cause d'importants dégâts  reconstruit à l'identique.                                                                             \r\n Le manoir de Sornat du XIXe siècle dans un style anglo-normand à proximité d'un champ de course désaffecté, transformé en hôtel restaurant.                                                                           VIGNAULT, l'existence d'une maison forte est attestée dès le XIIIe siècle, propriété d'Anceau-li-Orgens, on la retrouve en 1474 aux mains de Guichard Breschard, avant qu'elle n'échoit à la famille d'Ambly, en 1578, le domaine fut vendu à Denis de Gévaudan, bailli, quelques années plus tard, de Bourbon-Lancy, son neveu, Jean Boullery, céda le tout en 1640 à Nazaire Challemoux. En 1756, Marguerite Charlotte de Challemoux apporta le Vignault  en dot à Jean-Baptiste de Folin, président à la Cour des Comptes de Dole, ils firent  détruire l'ancien château et confièrent à l'architecte Guizot, la construction d'une demeure  dont les plans sont attribués à Edme Verniquet. Confisqué  comme bien national à la  Révolution, durant leur émigration, le domaine changea  plusieurs fois de propriétaires  avant d'être acquis en  1930 par M. Claude Puzenat qui remit en état le château et ses abords.","architecture":"Puzenat, ce qui n'était au départ qu'un jardin, à l'angle des rues du Tourniquet et Touchebuf, s'est bâti une imposante habitation et de dépendances dont une loge de concierge et divers abris, s'est agrandi de jardins, vignes, en direction de St-Léger demeure bourgeoise aujourd'hui centre de loisir pour enfants.                                 Vignault, maison forte du XVIIIe siècle sur les bases d'une ancienne construction du XIIIe siècle, une terrasse, précédée à l'ouest par un canal qu'enjambe un pont de pierre à deux arches, s'étend devant la façade principale du château, un corps de logis de plan rectangulaire comprenant un rez-de-chaussée, un étage carré et un étage de comble éclairé par des ils-de-buf, sous un toit à croupes en ardoise, au centre de la façade occidentale, se détache un avant-corps de trois travées, percé au rez-de-chaussée de trois portes-fenêtres en plein cintre et à l'étage de trois portes fenêtres rectangulaires donnant sur un balcon de pierre sur consoles cannelées à appui-corps en fer forgé, cet avant-corps est couronné d'un fronton, celui de la façade orientale est d'une seule travée à peine dégagée de l'alignement de celle-ci, une porte en plein cintre s'ouvre au rez-de-chaussée dans une embrasure rectangulaire, une lucarne à ailerons en plein cintre la couronne. Un petit bâtiment carré, dont la façade est surmontée d'un grand fronton.                                                                           \r\n Château Sarrien aujourd'hui centre d'animation social et culturel.   \r\nEn 1778, Gauthey, un élève de Soufflot dessina les plans de la Mairie elle est toujours l'Hôtel de Ville de Bourbon-Lancy, de superbes demeures furent construites.","habitants":"Famille Pinot\r\n        \"","divers":"Château de Puzenat, de Vignault et de Sarrien","gps":"","images":["../image/image_71/71_Puzenat_Vignault_1.jpg","../image/image_71/71_Puzenat_Vignault_2.jpg","../image/image_71/71_Puzenat_Vignault_3.jpg"]},"Consult_chateau_formulaireda68":{"id":"Consult_chateau_formulaireda68","dept":"71","canton":"Charolles","commune":"Ozolles","nom":"Rambuteau_Crary","type":"Château","periode":"XVIII","histoire":"RAMBUTEAU, ce domaine fut acquit par les Barthelot qui portent le titre de comtes de  Rambuteau en 1545, originaires de la région de Montauban, famille de militaire de père en fils, Claude de Rambuteau  procureur du roi depuis 1537 à Bois-Sainte-Marie dont sa descendance ont fourni de nombreux  lieutenants et des conseillers au parlement de bourgogne, a épousé Mlle de Laveiville-Vignancourt, en 1722 un Claude de Barthelot épouse Marguerite de Rotrou,  comme son père qui s'est illustré lors des guerres de succession d'Espagne  combat avec le prince de Condi lors de la guerre d'Autriche 1740-1748 et fait édifier le château actuel. Les membres de la famille furent emprisonnés lors de la Révolution mais le château n'a pas souffert, récupèrent leur domaine qui fut endommagé plus tard, de 1815 à 1827 Claude-Philibert Barthelot de Rambuteau épouse la fille du comte de Narbonne ministre de la guerre, deviendra  préfet nommé par Louis-Philippe. Lors de la seconde guerre mondiale  le comte et la comtesse de Rambuteau  et leur fils sont déportés à Buchenwald en 1944 et ils laisseront leur vie mais le château est resté dans la descendance.                            CRARY; était un fief mouvant de la châtellenie royale de Bois-Sainte-Marie et propriété de la famille de La Souche, originaire du Bourbonnais et dont furent Antoine, Seigneur de Crary en 1462, Pierre, major au régiment d'Aligny en 1682, Gilbert, mousquetaire du roi en 1736, et François de Neuville, duc de Villeroy, gouverneur de Lyon, héritier des Lesdiguières. Il fut ensuite vendu,  à Louis de Foudras, comte de château Thiers, à Matour. En 1771, Pierre Emmanuel Dumyrat seigneur de la Malinière en Forez devient acquéreur de Crary, le Coté et du Colombier. Au milieu du siècle dernier, par alliance fait passer les châteaux de Crary et Ozolles à la famille des Tournelles puis à la famille de Boisset.
