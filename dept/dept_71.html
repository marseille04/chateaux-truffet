ge/image_71/71_Villeneuve_1.jpg"},{"id":"Consult_chateau_formulaire8e8d","nom":"Vinzelles_Laye","commune":"Vinzelles","type":"Château","img":"../image/image_71/71_Vinzelles_Laye_1.jpg"},{"id":"Consult_chateau_formulaire2ada","nom":"Visigneux","commune":"Visigneux","type":"Château","img":"../image/image_71/71_Visigneux_1.jpg"},{"id":"Consult_chateau_formulaire934c","nom":"Vitry_sur_Loire","commune":"Vitry-sur-Loire","type":"Château","img":"../image/image_71/71_Vitry_sur_Loire_1.jpg"}];const FULL={"Consult_chateau_formulaire8e05":{"id":"Consult_chateau_formulaire8e05","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Allerey-sur-Saône","nom":"Allerey","type":"Château","periode":"XIX","histoire":"ALLEREY; Cité au XIIIe siècle, au XIVe siècle passe par alliance à Hugues de Mailly, il avait épousé Béatrice d'Allerey, en 1444 Jean de Lugny en devient propriétaire. En 1636 le château  fut brûlé par les troupes de Gallas (Croates). Denis Lauquet seigneur des lieux dans la deuxième moitié du XVIIe siècle en était propriétaire, au XVIIIe siècle le château fut de nouveau endommagé, Pierre Espiard-Humbert qui en hérita  entreprit de transformer la forteresse et en 1830 il prit la forme actuelle.","architecture":"Allerey; possède une motte féodale du XIVe siècle qui fut cité en 1321 actuellement en ruines, le château fut reconstruit au XIXe siècle, de forme rectangulaire accolé de deux pavillons carrées a trois niveaux  aux extrémités toits à la Mansard et un avant corps à fronton triangulaire sur le centre de la façade, le corps de logis à deux niveaux.","habitants":"Famille de Pierre Espiard-Humbert\r\n        \"","divers":"Château d'Allerey","gps":"","images":["../image/image_71/71_Allerey_1.jpg","../image/image_71/71_Allerey_2.jpg"]},"Consult_chateau_formulaire107d":{"id":"Consult_chateau_formulaire107d","dept":"71","canton":"Marcigny","commune":"Anzy-le-Duc","nom":"Anzy_le_Duc","type":"Château","periode":"XVI","histoire":"ANZY-le-DUC;  on sait peu de chose sur l'installation des premiers habitants sur le site d'Anzy-le-Duc. C'est sans doute de cette villa que le seigneur Letbalde fit don en 876 à l'Abbaye de Saint-Martin d'Autun pour y fonder un établissement bénédictin. Son premier prieur, Hugues de Poitiers fut choisit pour édifier ce monastère dès 880.Une certaine importance au prieuré dans le Brionnais. Mais c'est à sa mort qui finit de donner une grande notoriété à cet établissement, il devint en effet un important lieu de pèlerinage au Xe siècle et XIe siècle siècle où les reliques de Saint-Hugues de Poitiers étaient exposées. Ce pèlerinage apporta de nombreuses richesses à ce monastère et une population s'installa rapidement à l'ombre du prieuré. \r\nLe Hameau Le Lac dit aussi Saint-Martin du Lac, appartient au XVe siècle  à la famille Petitjean, qui donnera son dernier abbé à l'Abbaye de Saint-Martin d'Autun. Le fief passera vers 1550 à la famille de Massenet, Guillaume de Massenet étant le mari de Jeanne de Digoine, la sur du doyen de la collégiale de Saint-Hilaire de Semur.\r\nDans la commune plusieurs châteaux.","architecture":"Anzy-le Duc,  cette commune possède plusieurs châteaux dont celui d'Anzy avec une tour carrée attenant à un rempart avec porte.                               Le château du Lac bâtisse à deux niveaux tour ronde centrale accolé de deux pavillons à toits pointus reliant le corps de logis sur l'arrière, ces deux pavillons sont également accolés de deux autres rectangulaires à toit à poivrières.","habitants":"Famille de Massenet.\r\n        \"","divers":"Château d'Anzy et du Lac","gps":"","images":["../image/image_71/71_Anzy_le_Duc_1.jpg","../image/image_71/71_Anzy_le_Duc_2.jpg","../image/image_71/71_Anzy_le_Duc_3.jpg","../image/image_71/71_Anzy_le_Duc_4.jpg"]},"Consult_chateau_formulaire34df":{"id":"Consult_chateau_formulaire34df","dept":"71","canton":"Marcigny","commune":"Vindecy","nom":"Arcy_Vindecy","type":"Château","periode":"XIII","histoire":"ARCY; cité avant le XIIIe siècle et dépendait de la Baronnie de Semur en Brionnais dont une branche cadette de la famille de Semur en était propriétaire des lieux et firent construire le château, à  la mort de Lancelot de Semur, sa nièce Béatrice de la Bussière marié à Antoine le Viste  qui en hérite,  de 1500 à 1547 Claude le Viste héritière de Jean épouse de Geoffroy de Balzac, subirent des pillages des huguenots et un incendie en 1591. En 1616 Marie Robertet et André de Guillard en héritent, entreprennent d'importants travaux surtout sous l'occupation de Marie Raguier veuve de Louis Ier le Grand et par le petit fils Paul de Guillard. Le château passe par adjudication  en 1682 à Antoine de Valadoux qui le  fera agrandir  et ériger le domaine en marquisat, ruiné, le vendit en 1719 à Pierre Larcher président à la chambre des comptes de Paris, son fils Michel fit également de nouveaux  travaux de 1725 à 1735, passa par alliance dans différentes mains avant d'arriver à Georges Thomé de St-Cyr époux de la dernière des Larcher qui vida le château des ses biens mobiliers, Passa ensuite aux Fontenilles de Juigué, puis à Jacques Meniaud en 1912 et en 1923 à Henri Rollin.","architecture":"Arcy-Vindecy.  L'ancien château consistait en un quadrilatère cantonné de tours circulaires en grès gris auxquelles s'adossait à l'ouest un corps de logis de plan rectangulaire allongé et au nord une galerie aujourd'hui disparue ; une tour d'escalier est adossée à la façade du corps de logis, de l'ancienne basse-cour, il reste deux petits bâtiments flanqués au sud et au nord de deux tours rondes. Les fossés ont été comblés sous la Révolution.\r\nle corps de logis du château sur  l'aile en retour,  la tour, le portail d'entrée et les deux bâtiments qui l'encadrent fait lobjet dune inscription au titre des monuments historiques depuis 1983.","habitants":"Famille de Semur\r\n        \"","divers":"Château d'Arcy","gps":"","images":["../image/image_71/71_Arcy_Vindecy_1.jpg","../image/image_71/71_Arcy_Vindecy_2.jpg","../image/image_71/71_Arcy_Vindecy_3.jpg"]},"Consult_chateau_formulairedded":{"id":"Consult_chateau_formulairedded","dept":"71","canton":"Sennecey-le-Grand","commune":"Boyer","nom":"Arvolot_Puymont","type":"Château","periode":"XVI","histoire":"ARVOLOT; cité au XIIe siècle, fief du chapitre de Saint-Vincent de Chälon au XVIe siècle, transmit  à la famille de Grenelle de Puymont, passa par alliance en 1666 à Jean Baptiste Larme pour aboutir en 1719 à Antoine Chapuis de Tournus dont descend le propriétaire actuel, ce château subit des transformations en 1810 et en 1842 le baron Ducret de Lange fait construire un logis en retour d'équerre de l'habitation et en 1869 construction de la chapelle utilisant une tour ronde pour le clocher, en 1900 devient la propriété de la famille de la Forest Divonne.                                        PUYMONT; Famille de Vienne du XIIIe siècle par Hugues de Vienne, seigneur de Puymont, tient le château primitif Jusqu'en 1486 à la mort de Gérard de Vienne le château passa en 1515 à Humbert Lapyrat. En 1530, Jeanne de Verjus porte le fief par alliance à Philibert Quarré, puis à l'avocat mâconais Jean Pelez, puis passa à la famille de Grenelle par acquisition.\r\nAu XVIIe siècle, le château est rebâti par la famille Aubel de la Genète. En 1741,  Jeanne de Grenelle reçoit le domaine en dot lors de son union avec Antoine Aubel de la Genète et vers 1870, le petit-fils des précédents, ami de Lamartine, ajoute une aile de style néo-gothique. Passa aux de Rivérieulx, à la  fin XIXe siècle, Marie-Suzanne Aubel épouse Marie-Jules de Rivérieulx de Varax. La première moitié du XXe siècle, Henri de Rivérieulx de Varax, leur fils, succède au  XXe siècle. aujourd'hui propriété de M. de Goussencourt.                                                                     VERNIERE; Étienne de Barrin de Champrond est propriétaire des lieux en 1408 et en 1568  la terre échoit aux Galland, le domaine est cédé comme bien national à un nommé Passaut. Au  XIXe siècle, les héritiers du précédent revendent l'ensemble à Claude-Jules-Émile de Franc. En 1862  le précédent démolit le château et fait édifier la demeure actuelle qui passera par alliance en 1895  à la famille de Froissard de Broissia. La propriété passe toujours par alliance en 1956  à la famille des Boscs-Verneuil.","architecture":"Arvolot. Dans la commune de Boyer, trois châteaux du XIIIe, du XIV et du XIXe siècle dont celui de Venière, de Puymont et une maison forte de St-LOUP du XIII-XVe siècle.                         Arvolot; Le château consiste en un édifice de plan en L  formé d'un corps principal et d'une aile en retour d'équerre face à laquelle se trouve une construction rectangulaire à trois niveaux, des bandeaux règnent avec le sol des étages, un entablement couronne les façades et dissimule des toits très plats. Face à l'aile de 1810, se trouve une construction rectangulaire dont les murs sont légèrement talutés à leur base. Elle est percée d'une porte en plein cintre à encadrement en bossage rustique que surmontent, au-dessus d'armoiries ecclésiastiques martelées, les consoles à ressaut d'une bretèche.                                                                   Le château de Venière à Boyer était composé de pavillons de diverses hauteurs, couverts de toits aigus, et entouré de jardins dont il reste une belle allée de tilleuls et un puit.\r\nLe corps principal du château actuel, de plan rectangulaire, est flanqué de deux tours plus élevées d'un demi-étage, mais dépourvues d'étage de comble, elles sont coiffées de hautes toitures coniques.","habitants":"Famille de Grenelle de Puymont\r\n        \"","divers":"Château d'Arvolot, de Puymont et de Vernière","gps":"","images":["../image/image_71/71_Arvolot_Puymont_1.jpg","../image/image_71/71_Arvolot_Puymont_2.jpg","../image/image_71/71_Arvolot_Puymont_3.jpg","../image/image_71/71_Arvolot_Puymont_4.jpg","../image/image_71/71_Arvolot_Puymont_5.jpg"]},"Consult_chateau_formulaire6ff6":{"id":"Consult_chateau_formulaire6ff6","dept":"71","canton":"Chagny","commune":"Aluze","nom":"Aubigny_71","type":"Château","periode":"XVI","histoire":"AUBIGNY; Le château  se trouve dans une petite vallée. A l'origine métairie de l'abbaye de Maizières d'origine cistercienne cité en 1132. A était fondé en 1098 avec l'abbaye de Citeaux  par Robert de Molesne, cette dépendance d'Aubigny une des plus anciennes appelé \"Grange\", puis métairie ou de nombreux moines y vécurent  jusqu'à la Révolution ou tout ses biens furent vendu aux enchères  à monsieur  François Duchesne transformé en ferme biologique appelé \"château d'Aubigny\" avec hôtel.","architecture":"Aubigny; Une maison de maître, bâtie sur une cave voûtée, deux autres maisons datant du XVIIIe siècle ou encore plusieurs granges, deux chapelles (XVIe et XVIIe siècles), une ancienne sellerie et une magnanerie destinée à l'élevage des vers à soie, qui est un ensemble de dépendances autour d'une bâtisse à deux niveaux l'ensemble est en cours de rénovation pour un site à fin commercial.","habitants":"Famille de Robert de Molesne\r\n        \"","divers":"Château d'Aubigny","gps":"","images":["../image/image_71/71_Aubigny_1.jpg","../image/image_71/71_Aubigny_2.jpg","../image/image_71/71_Aubigny_3.jpg","../image/image_71/71_Aubigny_4.jpg","../image/image_71/71_Aubigny_5.jpg"]},"Consult_chateau_formulairea787":{"id":"Consult_chateau_formulairea787","dept":"71","canton":"Matour","commune":"Dompierre-les-Ormes","nom":"Audour_Dompierre","type":"Château","periode":"XVII","histoire":"DOMPIERRE les ormes;  cette commune possède plusieurs châteaux dont celui de Larmatine qui fut la résidence de l'écrivain Louise de Villemorin, le château des Terreau et les restes du château de la Faye;                                                                        AUDOUR; cité au XIIe siècle dont une construction effectué par la famille de Riz ou Ris;  une deuxième fut construite au XVe siècle par les Fautières qui en deviennent propriétaires par alliance de Guy de Fautières qui ce dernier paya sa fidélité à Charles le Téméraire de la prise et de la dévastation de leur place et maison forte appelés Odour par les troupes de Louis XI en 1470, passa ensuite en 1590 a Jean de Lestouf de Pradines qui décédera sans postérité. En 1660 Pierre Damas  en hérite par sa mère Jeanne Austrien qui avait épousé en seconde noce  Pierre de Lestouf de Pradines, Jean de Damas épousa en 1705 Claude Berthelot de Rambuteau, ils eurent un fils, Claude Mathieu de Damas dAudour, mousquetaire du Roi,  puis général.  En 1749  Jean Pierre Carista architecte  fit construire le nouveau château pour les Damas, une de ses filles épousa en 1769 le comte Charles François de Dortan, Roselyne, née de cette union, épousa le Comte de Forbin la Barben, directeur des musées de France et comte de Marcelus  par cette  alliance passa a Louis-Nicolas-Philippe-Auguste de Forbin directeur des musées royaux puis passa a son gendre le  comte de Marcellus, un neveu de Marcellus hérita dAudour et sa petite fille épousa un de Villemorin, de la famille des graines Villemorin, cest cette union qui permit la création en 1903 de larboretum de Pézanin, propriété de létat et géré par lONF.  Le château passera par legs à la famille Gaudifry de Dortan en 1886 qui le laisseront à l'abandon  et sera vendu en 1791 à la commune de Dompierre les Ormes dont la gérance est faite par madame Claire Beygo.","architecture":"Dompière les ormes;  Audour; le château actuel, importante bâtisse en pierre de taille et en schiste rougeâtre construit au  XVIIe par la famille de Damas sous la direction de larchitecte italien Carista, comprend une façade  de 42 mètres de longueur, 12 mètres 50 de largeur, trois étages et 180 portes et fenêtres, corps de logis central avec avant corps à fronton triangulaire saillant  deux avancées accolées au corps de logis et deux pavillons aux extrémités, l'ensemble à deux niveaux et attiques sur la partie centrale.                                                                                   Le château des Terreau de style du XVe siècle, corps de logis encadré de tours rondes à toits en poivrières.","habitants":"Famille de Larmatine                                                                 Famille des Fautières                                                                    Famille de Villemorin\r\n        \"","divers":"Château d'Audour et de Terreau","gps":"","images":["../image/image_71/71_Audour_Dompierre_1.jpg","../image/image_71/71_Audour_Dompierre_2.jpg"]},"Consult_chateau_formulaire799b":{"id":"Consult_chateau_formulaire799b","dept":"71","canton":"Montagny-sur-Aube","commune":"Autricourt","nom":"Autricourt","type":"Château","periode":"XIII","histoire":"AUTRICOURT; de la famille d'Autricourt, daterait du IXe siècle. La propriété fut cédée en 1299 au duc Robert II, puis à Isabelle de Saulx et à Gérard de Rougemont en 1366. En 1372 c'est Gérard de Meix, puis fin XIVe siècle, c'est Jean de Rupt qui réuni les différentes parties de la seigneurie d'Autricourt et ses descendants qui en restèrent maîtres jusqu'en 1510. Elle échut aux d'Anglure qui la conservèrent jusqu'en 1673. En 1698, elle fut racheté par Lemoine, et c'est Charles Louis de Vallois qui en hérite en 1718. En 1769, Autricourt passa au marquis de Crillon. Jacques Alexandre Gauthier de Vinfrais, seigneur de Villeneuve le Roi et d'Ablon, décide de vendre son important domaine foncier en 1794 et de racheter le château d'Autricourt où il s'installe en 1795. Ses enfants Louis Gauthier de Vinfrais et Charlotte, baronne de Pardailhan en héritent lors de son décès en 1809. Ruinée, obligée en 1829 de vendre son domaine de Pardailhan dans l'Hérault, \r\nCette dernière s'y réfugie alors. Le château passe dans les mains de son fils Alexandre, baron de Pardailhan  puis de son petit-fils Arthur, après le décès de ce dernier en 1909, son fils René doit céder le château à son cousin au 4ème degré François de Treil de Pardailhan, représentant la branche cadette.","architecture":"Autricourt; Dans la commune deux châteaux dont un du XVe siècle style d'architecture militaire du XIIIe remanié au  XVIIIe siècle, il conserve encore ses douves et plusieurs tours rondes.","habitants":"Famille d'Autricourt\r\n        \"","divers":"Deux châteaux à Autricourt","gps":"","images":["../image/image_21/21_Autricourt_1.jpg","../image/image_21/21_Autricourt_2.jpg","../image/image_21/21_Autricourt_3.jpg"]},"Consult_chateau_formulaire90a5":{"id":"Consult_chateau_formulaire90a5","dept":"71","canton":"Autun","commune":"Autun","nom":"Autun_Chateau","type":"Château","periode":"XV-XVI","histoire":"AUTUN; Dans la commune plusieurs châteaux; Rollin, Petit-Montjeu, Bouton, celui de Montjeu sur Broye ( Voir article). Rolin, Nicolas  Rolin ou Rollin  (Autun, vers 1376 - 1462), seigneur d'Aymeries, de Raismes (1406-1457), de Rugny, de Châlons (1444-1462), est une grande figure politique de la Bourgogne et de la France du XVe siècle. Il est chancelier de Philippe le Bon, duc de Bourgogne durant quarante ans. Il est connu pour être le fondateur, avec sa femme Guigone de Salins, de l'Hôtel-Dieu de Beaune.\r\nMont-d'Arnaud, ressemble plus à une villa du XXe siècle créée par une famille de ce nom.                                                                 Petit-Montjeu; Le château a été commandité par le président du Parlement de Bourgogne  et le château d'Eschamps.","architecture":"Les châteaux d'Autun; Bouton; château du XVIIIe siècle corps de logis rectangulaire, a deux niveaux fronton sur la partie centrale  deux pavillons saillants en  façade également.                        \r\n Haut-Puits; château du XIXe siècle de forme rectangulaire avec donjon et une tourelle hexagonale en angle.                                        Mont-d'Arnaud, corps de logis rectangulaire avec en façade des portes saillantes sous toits avec balcon et tourelles en angles.                 Petit-Montjeu, petit manoir en forme de U avec les pavillons dont-un surélevé accolé a l'avant d'une échauguette et d'une tourelle à l'angle arrière.                                                                  \r\nChâteau Rollin un des plus ancien  avec tour crénelée et toits pointu.                                                                                    Jeannin. Il subit deux campagnes de construction, de 1615 à  1669. Tour néogothique édifiée entre 1858 et 1866. Eléments protégés MH, les façades et les toitures du château, le porche avec son escalier, les façades et toitures des communs.","habitants":"Divers seigneurs\r\n        \"","divers":"Château de Rollin de petit-Montjeu du Mont d'Arnaud, du Hauts Puits","gps":"","images":["../image/image_71/71_Autun_Chateau_1.jpg","../image/image_71/71_Autun_Chateau_2.jpg","../image/image_71/71_Autun_Chateau_3.jpg","../image/image_71/71_Autun_Chateau_4.jpg","../image/image_71/71_Autun_Chateau_5.jpg","../image/image_71/71_Autun_Chateau_6.jpg","../image/image_71/71_Autun_Chateau_7.jpg","../image/image_71/71_Autun_Chateau_8.jpg"]},"Consult_chateau_formulaire14ad":{"id":"Consult_chateau_formulaire14ad","dept":"71","canton":"Autun","commune":"Autun","nom":"Autun_Ville","type":"Patrimoine","periode":"X Av Jc","histoire":"AUTUN; Cité  fondé par les romains au Ier siècle avant J.C.  Auguste cité Augustodunum de l'empereur Romain  et  Dunum pour les Gaulois, au quatrième siècle subit les invasions  des Germains, puis occupé par les Burgondes et les Francs, à l'époque mérovingiennes  est dotée de grands monastères. Pillé par les Sarrasins au huitième siècle.                                                     \r\nLe  duché  de Bourgogne y fit une forteresse,  occupé par le Bailli, de 1318 à 1675  dix baillis se sont succédé et de 1620 à 1754,  cinq gouverneurs  la famille de Coligny-Saligny, d'Aligny et de Ganay. Au Xe siècle, la ville devint prospère  sous l'épiscopat  du cardinal Rollin, chancelier de Bourgogne ( hôtel particulier) occupée de 1647 à 1789.  Napoléon Bonaparte  passa au lycée du XVIIIe et lui a donné son nom, l'hôtel du marquis de Fussay construit au XVIIIe siècle devient la sous préfecture en 1820.                                   La tour dite des Ursulines, élevée au XIIe siècle sur des bases antiques, elle servit de prison elle fut occupée de 1647 à 1789  par les religieuses de l'ordre des Ursulines puis par les Visitandines à partir de 1838.  Elle faisait partie du château de Rivault qui fut construit par le roi qui servait de forteresse et de prison. Tour néogothique édifiée entre 1858 et 1866.","architecture":"Autun ; possédait quatre portes deux restantes, Porte St-André qui commandait l'entrée  à l'est de la ville,  La porte Arroux construite sur le même plan au nord consolidé au XIXe siècle conserve une de ses tours de garde, cette tour actuellement temple protestant. La tour Saint-Léger, donjon du XIIe siècle au sud de l'évêché du XVIIIe siècle et reste d'un palais médiéval des ducs de Bourgogne restauré en 1483 Tour des Marchaux ou de l'Horloge reste de l'ancien Hôtel de Cluny.  Le temple de Janus porte ce nom depuis le XVIe siècle, vaste ruine de 24 m de haut 16,5 de côté (stella d'un sanctuaire). Tour des Ursulines tour octogonales du XIIe siècle construite sur des remparts romains, elle servit de prison.                       La pierre de Couhard serait une pyramide romaine, elle mesure 27 mètre à l'époque de la carte (environ 1900/1920) et daterait de Vespasien au premier siècle, une médaille d'or marquée de \"GLoria Aedorum Druidumque\" semble la dédier à Divitiacus, druide Eduen.","habitants":"Empereur Romain Auguste                                                         Famille de Coligny-Saligny\r\n        \"","divers":"Patrimoine d'Autun","gps":"","images":["../image/image_71/71_Autun_Ville_1.jpg","../image/image_71/71_Autun_Ville_2.jpg","../image/image_71/71_Autun_Ville_3.jpg","../image/image_71/71_Autun_Ville_4.jpg","../image/image_71/71_Autun_Ville_5.jpg","../image/image_71/71_Autun_Ville_6.jpg","../image/image_71/71_Autun_Ville_7.jpg","../image/image_71/71_Autun_Ville_8.jpg"]},"Consult_chateau_formulaire00e9":{"id":"Consult_chateau_formulaire00e9","dept":"71","canton":"Sennecey-le-Grand","commune":"Etrigny","nom":"Balleure","type":"Château","periode":"XV","histoire":"BALLEURE;  Cité en 992 propriété des ducs de Brancion qui durent le céder au duc de Bourgogne  lesquels le donnèrent  au milieu du XIIIe siècle à la famille de Sauvament. Hugues de Sauvament châtelain de Ciry le Noble, Balleure appartenait également aux Beauffremont, aux Tavannes  Le château passera au XIVe siècle aux Rabutin d'Epiry   au début du XVe siècle,le château change de famille connu comme fief de la famille de Saint-Julien.  Un Claude de Saint-Julien, page de Louis d'Orléans est témoin en 1407 de l'assassinat de son maître par les hommes de Jean le Bon duc de Bourgogne. Gabriel Claude de Saint-Julien sera  page de Charles VIII un autre plus célèbre en 1519 naissance au château de Pierre de Saint-Julien de Balleure, historien. \r\nEn  1613  il échoit à Charles de Naturel et reste dans sa famille jusqu'à la Révolution française. En 1767  François-Emmanuel de Naturel entreprend une restauration partielle. et au  XIXe siècle,  partage entre plusieurs propriétaires.                                                                       Dans la commune le château de Boulaye.","architecture":"Balleure; Dans la commune  d'Etrigny une maison forte de Saugerée cité en 1380 et le château de Balleure   du XIV-XVe siècle dont aucun plan d'ensemble ne préside à la répartition des différents corps qui sont agglutinés les uns aux autres dans une sorte d'architecture spontanée cinq bâtiments construit en hauteur de plan rectangulaire cantonné de tours circulaires et comprenant à l'est un corps de logis  rectangulaire, au nord une tour-porche, une grosse tour carrée et une seconde tour carrée de moindre dimension et, à l'ouest, un haut corps de logis flanqué d'une tourelle d'escalier. Il est inscrit à l'inventaire supplémentaire des monuments historiques depuis décembre 1941, château très restauré.","habitants":"Famille de Saint-Julien de Balleure\r\n        \"","divers":"Château de Balleure","gps":"","images":["../image/image_71/71_Balleure_1.jpg","../image/image_71/71_Balleure_2.jpg","../image/image_71/71_Balleure_3.jpg"]},"Consult_chateau_formulairee23a":{"id":"Consult_chateau_formulairee23a","dept":"71","canton":"Bourbon-Lancy","commune":"Ballore-Cronat","nom":"Ballore","type":"Château","periode":"XV","histoire":"BALLORE; Début XIIIe siècle, fief de la famille de Ballore qui  s'éteignit en 1336, à la mort de Marie de Ballore, épouse de Jean de Rabutin d'Epiry. Puis en 1576  la maison seigneuriale est ravagée par les Calvinistes. En 1578  le domaine  fut saisie a Louis de Rabutin d'Epiry au profit de Léonor de Chabot, comte de Charny.  Il échoit en 1581 à Melchior de Bernard de Montessus, gouverneur de Chalon, qui en entreprend la reconstruction. En 1614 Melchior lègue la terre à son petit-fils, à charge pour lui de terminer le corps de logis et la tour qui en est proche. Ce dernier fit d'importantes restaurations. \r\nNaissance de Guy-René Bernard de Montessus en 1945, qui sera le dernier propriétaire du nom puisqu'il le vendra à sa nièce vingt ans après qu'il le lui aura transmis. \r\nEn 2008  les actuels propriétaires, descendants de la famille Montessus, continuent la restauration de cette propriété.                                 A la Guiche au hameau de Cronat le château de la Baulme construit en 1858 à 1863, il comprend un corps de logis flanqué de deux ailes en retour d'équerre château de style Louis XIII possédant à l'intérieur un décor Louis XVI.                             Château des  HAUTS  le château est construit par Ernest Siraudin en 1855.                                                                                         Dans la commune le château de   CRONAT  et  BROUILLAT du XVIIIe siècle,.","architecture":"BALLORE; de ce château fort perché du du XV-XVIe siècle  remanié XIX-XXe siècle, subsiste un corps de bâtiment  de style renaissance,  de plan rectangulaire remanié au XVIe siècle flanqué d'une tour circulaire couronné de mâchicoulis et Logis ; tour ronde au nord-ouest.\r\nLe château aujourd'hui est une propriété privée et n'est pas ouvert au public. Il est en cours de restauration.\r\nUn pigeonnier isolé d'environ 800 cases servait de garde.                        BAULMES du XIXe siècle situé à 234 mètres d'altitude, en brique et pierre construit entre 1858 et 1863, il comprend un corps central flanqué de deux ailes en retour d'équerre, de style néo-Louis XIII, possédant à l'intérieur un décor néo-Louis XVI                            HAUTS; La construction comprend un corps de logis rectangulaire à un étage carré et un étage de comble entre deux ailes en retour d'équerre, de même élévation, en avancée sur ses deux façades, propriété privée .","habitants":"Famille de Ballore                                                                       Famille Montessus\r\n        \"","divers":"Château de Ballore, de Cronat, de Baulme, de Pont et des Hauts","gps":"","images":["../image/image_71/71_Ballore_1.jpg","../image/image_71/71_Ballore_2.jpg","../image/image_71/71_Ballore_3.jpg","../image/image_71/71_Ballore_4.jpg","../image/image_71/71_Ballore_5.jpg","../image/image_71/71_Ballore_6.jpg","../image/image_71/71_Ballore_7.jpg","../image/image_71/71_Ballore_8.jpg","../image/image_71/71_Ballore_9.jpg"]},"Consult_chateau_formulaire2166":{"id":"Consult_chateau_formulaire2166","dept":"71","canton":"Chauffailles","commune":"Châteauneuf","nom":"Banchet_Chateauneuf","type":"Château","periode":"XIV","histoire":"BANCHET dit la Magdelaine,  possible des ducs de Bourgogne, la construction initiale date vraisemblablement de l'époque carolingienne, à la fin du Xe siècle, le fief appartient aux Le Blanc, famille sans doute issue de celle, du même nom, de Semur-en-Brionnais.  Au XIIIe siècle, rattachement au domaine royal et chef-lieu d'une châtellenie qui fut  donné successivement au comte Amédée IV de Savoie, à l'archevêque de Lyon Pierre IV de Savoie puis aux sires de Beaujeu, et en 1369  le château revient définitivement à la couronne  est confié à un châtelain.\r\nIl fut  mis à mal par les Armagnacs en 1420 et  définitivement détruit par les écorcheurs en 1445. Engagé à Girard de la Madeleine en 1519, qui possède la petite seigneurie voisine du Banchet et dont les ancêtres, les Perrières, ont exercés les fonctions de châtelains, il s'emploie à rebâtir leur logis, en y répandant ses armoiries, la propriété passe aux La Madeleine et en alliance en 1642 de Anne de La Madeleine avec François de Bonne de Créquy, duc de Lesdiguières. Étienne de Drée, qui acquiert le château en 1748, fait de grands travaux et y découvre un trésor de vaisselle d'argent et de monnaie d'or. Après les Drée, le château change plusieurs fois de propriétaire en 1848 et en 1863, propriété d'un avocat de Lyon, qui restaure la façade, puis en 1872, acquisition par André-Paul Gensoul et en 1896, rénovation totale entreprise par l'architecte Rotival.","architecture":"Banchet; Du château primitif reste que des  vestiges, détruit en 1445, se présente dans le parc sous forme d'une motte et de ruines d'une enceinte. Le château actuel est bâti par Girard de la Madeleine sur le flanc nord de l'ancienne enceinte, comporte deux bâtiments en équerre. Le corps de logis principal est flanqué de deux tours circulaires, d'une grosse tour carrée et d'une tourelle d'escalier à quatre pans, en 1896, l'édifice est restauré, il se compose d'un corps de logis flanqué d'une aile en retour et de tours d'angle, l'intérieur comprend des pièces avec cheminées des XVe et XVIIIe siècle, un salon empire et des décors néo-gothiques de style troubadour.","habitants":"Famille de  Girard de la Madeleine                                           \r\nFamille de François de Bonne de Créquy\r\n        \"","divers":"Château du Banchet","gps":"","images":["../image/image_71/71_Banchet_Chateauneuf_1.jpg","../image/image_71/71_Banchet_Chateauneuf_2.jpg","../image/image_71/71_Banchet_Chateauneuf_3.jpg","../image/image_71/71_Banchet_Chateauneuf_4.jpg","../image/image_71/71_Banchet_Chateauneuf_5.jpg","../image/image_71/71_Banchet_Chateauneuf_6.jpg","../image/image_71/71_Banchet_Chateauneuf_7.jpg","../image/image_71/71_Banchet_Chateauneuf_8.jpg","../image/image_71/71_Banchet_Chateauneuf_9.jpg"]},"Consult_chateau_formulaire0b11":{"id":"Consult_chateau_formulaire0b11","dept":"71","canton":"Lucenay-L`Evêque","commune":"St-Martin-de-Lixy","nom":"Barnay","type":"Manoir","periode":"XV","histoire":"BARNAY; Seigneurie la plus ancienne du Brionnais en 1066  Richilde veuve d'Arduin de Barnay entre au couvent la propriété passe à Pierre Valdo fondateur de la secte des vaudois. Jean de Charlieu le tenait en fief en 1368 Antoine de la Palu seigneur de Genosse (Loire) en 1478 François Thurins écuyer  panetier de la reine mère  est seigneur de Barnay Villerest et Jarnosse en 1560, en 1573 donation  à son fils Philibert de Thurins  conseiller au parlement de Paris. Le fief passe par alliance à Christophe de Damas seigneur de Vertpré et Barnay, toujours par alliance passe aux Austrein seigneur  de Jarnosse président au parlement des Dombes  et par alliance à nouveau en seconde noce à Lestouf de Pradines seigneur d'Andan, Frouges et la Motte. Gilbert de Damas  écuyer-colonel d'infanterie hérite en 1703, sans enfant  il léguera ses biens à son neveu  Etienne de Drée  écuyer passe le fief en dot à Gilbert de Drée son fils lieutenant de la garde française  et chevalier de Saint-Louis. Le domaine passera après la Révolution à Julien Lacroix, à Monsieur Augand, à Jean-Marie- Alexis Bret à Imbert, Dugrave et à Bransia puis à l'institut des frères de l'école chrétienne de Calluire et à la famille Rochigneuse jusqu'en 1970 conseillé général de Chauffailles.","architecture":"Barnay; Château construit face à la vallée, reconstruit au Moyen -Age puis successivement au XVI et XVIIIe siècle de forme rectangulaire à trois niveaux assez court flanqué de trois tours rondes, coiffées en poivrières.","habitants":"Famille de Pierre Valdo                                                            Famille de Gilbert de Damas\r\n        \"","divers":"Château de Barnay","gps":"","images":["../image/image_71/71_Barnay_1.jpg","../image/image_71/71_Barnay_2.jpg","../image/image_71/71_Barnay_3.jpg"]},"Consult_chateau_formulaire2473":{"id":"Consult_chateau_formulaire2473","dept":"71","canton":"Gueugnon","commune":"Neuvy-Grandchamp","nom":"Beauchamps","type":"Château","periode":"XVIII","histoire":"BEAUCHAMP,  Nicolas Rolin posséda la seigneurie de Beauchamp mais y vécut sans doute peu, ce fief avait la particularité de posséder une usine de fer (ainsi que la mine qui l'alimentait) à proximité de son château, aujourd'hui disparu. Le domaine fut vendu comme bien national en 1799, il fut racheté en 1802 par Michel Ramus (fondateur de la Fonderie royale de Montcenis) qui le modernisa et le développa, faisant de cet établissement l'un des plus compétitifs de la régions. Sa mort l'empêcha de créer une annexe à Saint-Agnan. Rachetée par le Comte de Dormy, l'usine périclita rapidement et cessa définitivement ses activités en 1834. La mine quant à elle fut fermée pour son manque de rentabilité vers la fin du XIXe siècle mais rouvrit pendant la seconde guerre mondiale pour servir de refuge aux réfractaires du STO. L'exploitation fut définitivement arrêtée en 1948.Le monument \"  Château de Lavault de Neuvy-Grandchamp\" est une propriété d'une personne privée. Ce monument fait partie du recensement immeubles MH.","architecture":"Lavault : les façades et les toitures du château et du bâtiment des communs,deux portails","habitants":"Nicolas Rolin\r\n        \"","divers":"Château de Beauchamps et de Lavault","gps":"","images":["../image/image_71/71_Beauchamp_1.jpg","../image/image_71/71_Beauchamp_2.jpg","../image/image_71/71_Beauchamp_3.jpg"]},"Consult_chateau_formulaire01e8":{"id":"Consult_chateau_formulaire01e8","dept":"71","canton":"Sud-Mâcon","commune":"Varennes-les-Mâcon","nom":"Beaulieu_Varennes","type":"Château","periode":"XV","histoire":"BEAULIEU; Au XVe siècle propriété de la famille de Chaintré, qui passa au XVIe siècle à Philippe Margot  bourgeois de Mâcon, passa ensuite par plusieurs mains pour être acquis en 1662 par Jacques Ray procureur au bailliage qui fit construire le château en quatre ans, mais vu les frais ruiné le revend en 1686 à Claude Bessac seigneur de Varennes, le château passa en 1696 par lègue aux Mathurin de Fontainebleau, le domaine passera  en 1791 à Adam-Philibert d'Origny-Dampierre, acquis en 1885 par le comte Marc de Maubou. Dans la commune de Varennes château quadrangulaire flanqué de tours rondes et carrées  cour d'honneur avec porte à tourelles carrées. le château d'Aubigny du XIV-XVe siècle.","architecture":"Beaulieu; construction du XVIIe siècle de style Louis XIII, le corps principal de plan rectangulaire est couvert d'une haute toiture à croupes percée de lucarnes à ailerons et frontons, il est flanqué à ses extrémités de deux ailes un peu plus élevées en légère avancée sur chacune de ses façades, elle comporte un comble à surcroît éclairé par des lucarnes pendantes à croisillon de pierres couronnées de frontons cintrés et sont coiffées de toitures à croupes  au même niveau que celui du corps central, les deux façades principales sont rythmées par de grandes fenêtres à meneau et croisillon, au centre de chacune d'elles, s'ouvre une petite porte donnant accès à un escalier de pierre rampe sur rampe à deux volées droites, celle de l'ouest est surmontée d'un fronton cintré, celle de l'est d'un fronton triangulaire. Vers 1812, comblement des fossés, ultimes vestiges de la maison forte primitive, et au XIXe siècle de nouvelles restaurations.","habitants":"Famille de Chaintré\r\n        \"","divers":"Château de Beaulieu, de Varennes et d'Aubigny","gps":"","images":["../image/image_71/71_Beaulieu_Varennes_1.jpg","../image/image_71/71_Beaulieu_Varennes_2.jpg","../image/image_71/71_Beaulieu_Varennes_3.jpg","../image/image_71/71_Beaulieu_Varennes_4.jpg","../image/image_71/71_Beaulieu_Varennes_5.jpg"]},"Consult_chateau_formulairee584":{"id":"Consult_chateau_formulairee584","dept":"71","canton":"Beaurepaire-en-Bresse","commune":"Beaurepaire-en-Bresse","nom":"Beaurepaire_en_Bresse","type":"Maison forte","periode":"XV","histoire":"BEAUREPAIRE en Bresse; le premier propriétaire connu de la maison forte est Hugues d'Antigny en 1275. A la fin du XIIIe siècle, elle passe à Hugues de Vienne  dans cette famille jusqu'au XVe siècle, passe ensuite à la famille de Beaurepaire, jusqu'au milieu du XVe siècle. Le château est peut-être rebâti par Thibaud de Beaurepaire. En 1503 Jean de Beaurepaire  possède  la terre  jusqu'au début du XXI e siècle. Paul-Ivan Lefebvre de Saint-Germain épouse Anne, fils d'Odile Lefebvre de Saint-Germain, née Beaurepaire, reprend la propriété. De nombreux travaux de restauration sont fait et le château reprend son aspect d'origine qui fait la fierté du village.","architecture":"Beaurepaire; Le château se présente sous la forme d'un long corps de logis de plan rectangulaire, un pont de pierre donne accès à un passage aménagé dans un pavillon, a l'angle sud-ouest, un gros pavillon correspond peut-être à la tour de la maison forte.                    Clos de murs, le château, tel qu'il est aujourd'hui, a été construit sur les caves d'une forteresse médiévale, il est entouré de fossés et l'on y accède par un pont dormant.","habitants":"Famille de Beaurepaire\r\n        \"","divers":"Château de Beaurepaire et de Clos de Murs","gps":"","images":["../image/image_71/71_Beaurepaire_en_Bresse_1.jpg","../image/image_71/71_Beaurepaire_en_Bresse_2.jpg","../image/image_71/71_Beaurepaire_en_Bresse_3.jpg"]},"Consult_chateau_formulaire891f":{"id":"Consult_chateau_formulaire891f","dept":"71","canton":"Cluny","commune":"Berze-le-Chatel","nom":"Berze_le_Chatel","type":"Forteresse","periode":"XIII","histoire":"BERZE-ville Le prieuré, dépendance de l'abbaye de Cluny, fut créé sous l'impulsion d'Hugues de Semur, saint abbé de Cluny de 1049 à 1109. La construction attenante dite « château des moines » date du XVIe siècle, soit environ un siècle avant le départ des moines chassés par la Révolution. En 1791, la chapelle est transformée en habitation. Classée monument historique dès 1893, mise en vente et menacée, elle est rachetée en 1947 par miss Joans Evans.            BERZE-le CHATEL; La seigneurie de Berzé attestée en 911 par les écrits de Cluny, elle est tenue par Geoffroy de  Berzé. Au XIIe siècle, le dernier des Berzé, Gauthier légue son fief à son beau-père Arthaud de Sampiero qui le transmet à sa fille qui a  épousé  Roland Bressentis, leur fils de ces derniers, Hugues relève le nom de Berzé, cette famille s'éteindra en 1320, puis passa au XIVe siècle par alliance à Jean de Frolois, à Jean de Thil connétable de Bourgogne, en 1350 à Edouard de Beaujeu et à Jacques de Savoie prince de Morée. Au XVe siècle, la guerre civile entre les Armagnacs et les Bourguignons, la forteresse fut occupée par Pierre de Beauffremont  puis par les Armagnacs en 1420 et le perdirent peu de temps après, le duc Philippe le Bon le transmet à son écuyer  en 1453 à Macé de Rochebaron, dont le fils  Antoine épousa une bâtarde du duc, les Rochebaron capitulèrent en 1591 et en 1600 érigé en comté par Heni IV qui le transmettra à l'héritier et neveu de Françoise de Rochebaron, Antoine duc d'Aumont gouverneur en Bourbonnais et maréchal de France qui ne l'habita pas, neveu héritier de Rochebaron vend en 1713 à Alexandre-Antoine Michon de Pierreclos qui  gardera  le comté jusqu'à la Révolution, et racheté par Michon de Pierreclos en 1802 qui s'en sépare passa au marquis de Maubou puis acquit en 1817 par monsieur Antonin Gérentet bisaïeul du comte Thy de Milly qui entreprend la reconstruction suite aux dégâts de la Révolution (pillé et incendié) et restera dans cette famille par le comte Thy de Milly.                                Dans la commune le château de Roche-Coche.","architecture":"Berzé; face à la Roche de Solutré domine la vallée de la petite Gosne importante forteresse médiévale du XIIIe siècle, la plus conservé  de la Bourgogne a su conserver treize tours dont deux donjons et ses trois enceintes consécutives dont la plus anciennes l'hexagonale remonte au temps carolingiens, la plus proches cinq tours  percées d'archères canonnières qui englobe aujourd'hui jardins vergers potagers, l'ensemble des tours du XIIIe siècle plus une du XIe siècle deux tours carrées appelée Montgirard du XVe siècle aux extrémité du corps de Logis. Au XVe siècle renforcement des défenses châtelet de la  porte fortifié avec pont-levis aujourd'hui supprimé et les fossés remblayés,  du château possède deux corps de logis en équerre autour d'une cour avec une tour.","habitants":"Famille de Geoffroy de  Berzé                                                  Famille de Pierre de Beauffremont\r\n        \"","divers":"Forteresse de Berzé  et de Roche-Coche","gps":"","images":["../image/image_71/71_Berze_le_Chatel_1.jpg","../image/image_71/71_Berze_le_Chatel_2.jpg","../image/image_71/71_Berze_le_Chatel_3.jpg","../image/image_71/71_Berze_le_Chatel_4.jpg","../image/image_71/71_Berze_le_Chatel_5.jpg","../image/image_71/71_Berze_le_Chatel_6.jpg","../image/image_71/71_Berze_le_Chatel_7.jpg","../image/image_71/71_Berze_le_Chatel_8.jpg"]},"Consult_chateau_formulaire1e35":{"id":"Consult_chateau_formulaire1e35","dept":"71","canton":"St-Gengoux-le-National","commune":"Bonnay","nom":"Besanceuil_Chassignole","type":"Château","periode":"XVI","histoire":"BESANCEUIL; le fief cité au XIIIe siècle appartenant à la famille de Tenay qui y firent bâtir une maison forte, par alliance passa  en 1586 à Jean de Mincé et en 1645 à Jean Baptiste  de Prisque, cette famille le gardera jusqu'à la Révolution.                              CHASSIGNOLE; Au XVe siècle, époque vraisemblable de la construction du château qui est en 1464 la possession de Louis de Glorienne, et vers 1560 le fief est acquis par François Dormy, président au Parlement de Paris que son fils Pierre Dormy, vend le château à Robert de Belleperche en 1592. A la fin du XVIIe siècle, remaniement,  la propriété passe a des descendants de Louis-Hugues de La Porte, seigneur de Saint-Nizier-d'Azergues en 1777.        Dans la ville de BONNAY château en composite du XI-XVIIIe siècle.","architecture":"BESANCEUIL comprend un corps de logis de plan rectangulaire flanqué de tours carrées, une tour à quatre pans est adossée au centre de la façade avec fenêtres à croisillons couverte d'une terrasse abritée par un belvédère à toit de tuiles. La maison forte possède une tour ronde, de l'ensemble construit vers 1383-1385 ne subsiste que le corps de logis rectangulaire flanqué de trois tours quadrangulaires et d'une tourelle de la première enceinte, une tourelle d'escalier en vis fut accolée au corps de logis en 1466. A partir de 1647, le château est mis au goût du jour, démolition et abaissement des murailles que d'étroits chemins de ronde reliaient aux tours de ronde, construction du portail de pierre à bossages de la grande cour. A la fin du 17e siècle, des aménagements intérieurs sont réalisés, notamment la grande chambre du premier étage, faisant disparaître les fenêtres à meneaux. Vers 1778, à l'emplacement du cimetière, est construite une nouvelle aile et toutes les dépendances. Trois bâtiments de communs complètent l'ensemble, ainsi qu'un pigeonnier .                                    CHASSIGNOLE; Le plan du bâtiment est proche d'un carré, flanqué sur deux de ses angles de tours circulaires, sur le troisième, d'une grosse tour carrée accostée d'une tourelle également carrée et, sur son quatrième angle, d'une petite tour, une galerie, qui supporte une terrasse à balustrades, relie l'une des tours rondes à la tour carrée. Remanié au siècle dernier.","habitants":"Famille de Jean de Mincé                                                         Famille de Louis de Glorienne\r\n        \"","divers":"Château de Besanceuil et de Chassignole","gps":"","images":["../image/image_71/71_Besanceuil_Chassignole_1.jpg","../image/image_71/71_Besanceuil_Chassignole_2.jpg","../image/image_71/71_Besanceuil_Chassignole_3.jpg","../image/image_71/71_Besanceuil_Chassignole_4.jpg","../image/image_71/71_Besanceuil_Chassignole_5.jpg","../image/image_71/71_Besanceuil_Chassignole_6.jpg","../image/image_71/71_Besanceuil_Chassignole_7.jpg","../image/image_71/71_Besanceuil_Chassignole_8.jpg"]},"Consult_chateau_formulaireac07":{"id":"Consult_chateau_formulaireac07","dept":"71","canton":"Lugny","commune":"Clessé","nom":"Besseuil","type":"Château","periode":"XIII-XVII","histoire":"BESSEUIL; le fief seigneurie des Chanoines de Saint-Pierre de Mâcon et en 1595 le seigneur en était Antoine de l'Aubépin passa en 1620 à François de Rébé prévôt de St-Pierre, peu de temps après passe à Pierre de Sagie de Mâcon qui y fit construire une première habitation son gendre Archambaud de Chanuet hérite du domaine étant receveur de Mâcon y fit construire le château et cette famille le conservera jusqu'à la fin de l'ancien régime, domaine viticole et restaurant par Jean Thevenet.                   \r\nDans la commune  de Clessé il reste des ruines castrales de Germolles du XIIIe siècle.","architecture":"Besseuil;  A Clessé les ruines castrales de Germolles du 13-16e siècle Le château de Besseuil commencé au XVIe siècle par une première habitation, construit au  milieu du XVIIe siècle, remanié au XVIIIe siècle donnat l'aspect actuel, au XIXe siècle qualifié de \"petit bijou\" par Viollet le Duc et au XXIe siècle restauration complète de 2005 à 2007 par l'architecte suisse André Meillant. Le château corps de logis rectangulaire flanqué à ses deux extrémités de pavillons de même hauteur au centre de la façade s'élève une tour d'escalier, l'ensemble précédé d'une cour  entourée de communs accés par une porte cochère.","habitants":"Famille de  Pierre de Sagie de Mâcon\r\n        \"","divers":"Vestiges féodales et château de Besseuil","gps":"","images":["../image/image_71/71_Besseuil_1.jpg","../image/image_71/71_Besseuil_2.jpg","../image/image_71/71_Besseuil_3.jpg","../image/image_71/71_Besseuil_4.jpg"]},"Consult_chateau_formulairec5d4":{"id":"Consult_chateau_formulairec5d4","dept":"71","canton":"Bissy-sur-Fley","commune":"Bissy-sur-Fley","nom":"Bissy_Tyard","type":"Forteresse","periode":"XIV","histoire":"BISSY-sur-FLEY;  cité en  1350 par le mariage de Claude de Tyard, écuyer, avec Françoise de Bissy qui lui apporte en dot le fief de Bissy, le château est habité par Etienne de Tyard en 1478, seigneur de Bissy  et au  début XVIe siècle, propriété de son fils  Jean de Tyard, lieutenant général au bailliage de Mâcon épouse une fille du seigneur de Brancion, passe  en 1521 à Josserand petit-fis  écuyer de Philippe le Bon duc de Bourgogne et de Charles le Téméraire. Naissance à Bissy de Pontus de Tyard, poète de la Pléiade, évêque de Chalon, astronome et conseiller du roi, fils de Claude V et de Jeanne de Ganay.\r\nC'est au milieu du XIe siècle, à la mort de ses frères, Pontus de Tyard hérite du domaine, en 1605 à la mort de Pontus de Tyard  au château de Bragny, ses neveux conservent le fief qui est érigé en comté au XVIIe siècle. Le domaine est converti en ferme au  XIXe siècle,  vendu comme bien national à la Récvolution. A partir de 1950, Madame de la Poix de Fréminville se consacre à la sauvegarde de l'édifice qui fut acquis par la famille de Fernehem de Bournonville. \r\nCréation de l'association en  2001 \"Renaissance du château Pontus de Tyard\" dont l'objectif est de le restaurer.","architecture":"Le château de Bissy du XIIIe siècle maison forte édifié entre le XIV et XVIe siècle comportant des tours carrées et rondes a conservé une enceinte de plan rectangulaire allongé, percée à ses deux extrémités de portes charretières, la porte sud est flanquée d'une tour carrée, le logis, de plan rectangulaire, est flanqué d'une tour circulaire à l'angle nord-ouest, d'une tour barlongue à l'angle sud-est, d'une tour carrée à l'angle sud-ouest et d'une tourelle d'escalier en façade.","habitants":"Famille de Tyard\r\n        \"","divers":"Château de Bissy","gps":"","images":["../image/image_71/71_Bissy_Tyard_1.jpg","../image/image_71/71_Bissy_Tyard_2.jpg","../image/image_71/71_Bissy_Tyard_3.jpg","../image/image_71/71_Bissy_Tyard_4.jpg","../image/image_71/71_Bissy_Tyard_5.jpg","../image/image_71/71_Bissy_Tyard_6.jpg","../image/image_71/71_Bissy_Tyard_7.jpg"]},"Consult_chateau_formulaire4a6e":{"id":"Consult_chateau_formulaire4a6e","dept":"71","canton":"Bourbon-Lancy","commune":"Bourbon-Lancy","nom":"Bourbon_Lancy","type":"Château","periode":"XIII-XVI","histoire":"BOURBON-LANCY; seigneurs de Bourbon de la famille de Dampierre (1196-1296), auraient pu être octroyées à la ville par Eudes de Bourgogne (1230-1269), comte de Nevers, dAuxerre et de Tonnerre, duc héritier de Bourgogne, époux à partir de 1248 de Mathilde II de Bourbon   (1234-1262), dame de Bourbon. En 1260, Jean de Châteauvillain, ayant épousé Jeanne de Semur, était devenu seigneur de Bourbon-Lancy. Faute de descendance directe, la baronnie de Bourbon-Lancy alla, vers 1378, à la famille de la Trémoille, qui la garda environ un siècle. Ferdinand Sarrien qui fut maire, député, ministre et président  du conseil donna son nom au château Sarrian, du XVIIIe siècle construit par le baron Dormy de Neuvy occupe un centre d'animation sociale et culturelle.                              Au XIXe siècle, le marquis Étienne Jean-François d'Aligre fait bâtir un hôpital, une statue du marquis et de son épouse ainsi que des armoiries dispersées rappellent leur don.","architecture":"Bourbon-Lancy: Au sommet de l'un des rochers qui dominent la ville, reste d'un château fort, qui fut bâtit durant le Moyen-Âge  orné de sept tours démantelés en 1775.                                                La ville compte comme patrimoine médiéval un beffroi, qui auparavant était garnie d'un pont-levis et d'une grille Dans le Beffroi XIe siècle, se trouve un drôle de personnage appelé \"le Bredin\" (prononcer \" Beurdin\" qui signifie innocent, simplet). Cet automate créé par Georges Kursch tire la langue aux passants en sonnant les heures.\r\nUn château à deux tours, le vieux quartier et un rempart, du patrimoine la porte de l'éperon faisant partie des remparts.                               Le manoir de Sornat construit au XIXe siècle dans un style anglo-normand assez insolite pour la région.                                               Le château Sarrien du XVIIIe siècle au parc hôtel des salins du XVIe siècle remparts avec tours et échauguettes la porte de l'éperon et la maison de Tournel du XVIIe siècle.                          Dans la commune le château de Puzenat, (voir article),  demeure bourgeoise aujourd'hui centre de loisir pour enfants, de Vignault  du XVIIIe siècle et de Sarrien.","habitants":"Famille de Dampierre                                                             \r\n Famille de Ferdinand Sarrien\r\n        \"","divers":"Château de Bourbon-Lancy, de Puzenat, de Sornat et de Sarrien","gps":"","images":["../image/image_71/71_Bourbon_Lancy_1.jpg","../image/image_71/71_Bourbon_Lancy_2.jpg","../image/image_71/71_Bourbon_Lancy_3.jpg","../image/image_71/71_Bourbon_Lancy_4.jpg","../image/image_71/71_Bourbon_Lancy_5.jpg","../image/image_71/71_Bourbon_Lancy_6.jpg","../image/image_71/71_Bourbon_Lancy_7.jpg","../image/image_71/71_Bourbon_Lancy_8.jpg","../image/image_71/71_Bourbon_Lancy_9.jpg"]},"Consult_chateau_formulaire5017":{"id":"Consult_chateau_formulaire5017","dept":"71","canton":"St-Leger-sous-Beuvray","commune":"St-Leger-sous-Beuvray","nom":"Bouthiere","type":"Château","periode":"XVI","histoire":"BOUTHIERE; Le fief de la Boutière (puis La Bouthière) relevant de la châtellenie de Glenne. Au Moyen Âge  le fief, le plus important de la paroisse de Saint-Léger-sous-Beuvray, relève de la châtellenie de Glenne. \r\nAu XVIe siècle passe par alliance, et héritage successivement aux Vichy, aux Chargères, aux Arlay de la Boulaye, aux Limenton de la Goutte et aux Costa de Beauregard. Depuis 1969: il est aménagé en habitation particulière  de la famille Britsch.","architecture":"Bouthière; Le château a été transformé depuis longtemps en bâtiments agricoles et au milieu du XXe siècle, il a été aménagé en habitation particulière tout en conservant deux corps de bâtiments flanqués de deux tours rondes et un pavillon d'entrée.                    Dans la commune plusieurs châteaux, le Boursons, corps de logis à deux niveaux corps de logis rectangulaire flanquait de deux tours rondes en façades et fronton.  Le Corlou,  corps de logis rectangulaire à deux niveaux.                                                     \r\n  Le Foing corps de logis rectangulaire à deux niveaux et attiques deux pavillons saillant aux extrémités.                                          le Jeu, corps de logis rectangulaire a deux niveaux et attiques flanquait en façades de deux tourelles rondes et deux pavillons aux extrémités.                                                                                               Le Lavaux, quadrilatère  à trois niveaux pavillons carrés en angles.             Le Montaugé, corps de logis rectangulaire à deux niveaux et attiques flanqué de pavillons d'angles et en façade une tour semi-saillante.                                                                                             Le Vivier, le Bois Roux, et le Melet.","habitants":"Seigneur de Glenne\r\n        \"","divers":"Château de Bouthière, de Foing, de Lavaux, de Boursons, de Courlou et de Montauge","gps":"","images":["../image/image_71/71_Bouthiere_1.jpg","../image/image_71/71_Bouthiere_2.jpg","../image/image_71/71_Bouthiere_3.jpg","../image/image_71/71_Bouthiere_4.jpg","../image/image_71/71_Bouthiere_5.jpg","../image/image_71/71_Bouthiere_6.jpg","../image/image_71/71_Bouthiere_7.jpg","../image/image_71/71_Bouthiere_8.jpg","../image/image_71/71_Bouthiere_9.jpg"]},"Consult_chateau_formulaired28b":{"id":"Consult_chateau_formulaired28b","dept":"71","canton":"Cluny","commune":"Cortambert","nom":"Bouttavant","type":"Maison forte","periode":"XIV","histoire":"BOUTTAVANT; Cité au  XIe siècle, construction du château par les Gros de Brancion pour mieux défendre leurs domaines face à la puissance grandissante de Cluny. En 1237, Cluny obtient le château de Joceran Gros en échange de Beaumont-sur-Grosne. A la  fin du XIIIe siècle, l'abbé Yves II fait élever de nouveau bâtiments. En 1470  le château est pris par les troupes de Louis XI. De 1471 à 1476  occupation par Claude du Blé, au nom de Charles le Téméraire, en Juillet 1789  le château échappe aux pillages des brigands.  Le château est vendu  en 1790 comme bien national, ayant appartenu à monsieur Goin ancien élève de Grignon ancien président au conseil agricole de Charolles, membre de la société des agriculteurs de France, ancien maire de Saint-Yan propriété actuelle de monsieur Gelpy et de monsieur de Valence.","architecture":"Bouttavant dit \"Butte à Vent\" est situé sur une butte dominant une vaste étendue, du quadrilatère cantonné de deux tours rondes, il subsiste un corps de logis de plan rectangulaire flanqué d'une tour ronde à l'angle sud-ouest, d'une tourelle circulaire (façade ouest) et d'un bâtiment (extrémité nord).","habitants":"Famille de Gros de Brancion\r\n        \"","divers":"Château de Bouttavent et de Cortambert","gps":"","images":["../image/image_71/71_Bouttavant_1.jpg","../image/image_71/71_Bouttavant_2.jpg","../image/image_71/71_Bouttavant_3.jpg","../image/image_71/71_Bouttavant_4.jpg","../image/image_71/71_Bouttavant_5.jpg","../image/image_71/71_Bouttavant_6.jpg","../image/image_71/71_Bouttavant_7.jpg"]},"Consult_chateau_formulaire8817":{"id":"Consult_chateau_formulaire8817","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"Bragny-sur-Saône","nom":"Bragny","type":"Château","periode":"XVII","histoire":"BRAGNY; Dans la commune le domaine de la Barre de Bragny du XVIIIe siècle, Pontus de Tyard (ou de Thiard), seigneur de Bissy, est un ecclésiastique, écrivain et poète français, né le 20 avril 1521 à Bissy-sur-Fley dans le chalonnais et mort le 23 septembre 1605 au château de Bragny-sur-Saône. Il devient évêque de Chalon-sur-Saône en 1578, et sa vie prend alors un nouveau tournant puisqu'il se consacre entièrement à sa nouvelle charge. Député aux États de Blois en 1588, il défendit l'autorité royale contre les ligueurs.  Il abandonnera sa charge d'évêque en 1589 pour se retirer dans ses terres, où il restera jusqu'à sa mort. En 1594 il publia Extrait de la généalogie de Hugues Capet.                                                          Dans la commune une maison forte du XII-XVe siècle et la Barre de Bragny domaine du XVIIIe siècle.","architecture":"Bragny,  château construit à la fin du XVIIIe siècle ou au début du XIXe siècle. Le logis, en maçonnerie enduite,  est situé entre cour et parc, il est composé d'un corps principal, couvert d'un toit en ardoise à croupes, flanqué de deux corps latéraux couverts  de terrasses bordées de balustrades, les encadrements en pierre des ouvertures   ont des linteaux délardés en arc segmentaire, les combles sont éclairés en façade par trois lucarnes à ailerons, la lucarne centrale, plus importante, est couronnée  d'un fronton cintré brisé, les bâtiments des communs, aux  toits de tuile plate  à croupes, bordent les côtés de la cour, l'élévation est du bâtiment droit est prolongée par  les porcheries et un colombier de plan carré, couvert d'un toit en pavillon, les communs et les dépendances  sont couronnés de corniches composées de trois rangs en  briques, le deuxième disposé en dents-de-scie.","habitants":"Pontus de Tyard \r\n        \"","divers":"Château de Bragny","gps":"","images":["../image/image_71/71_Bragny_1.jpg","../image/image_71/71_Bragny_2.jpg"]},"Consult_chateau_formulairefcb1":{"id":"Consult_chateau_formulairefcb1","dept":"71","canton":"Tournus","commune":"Martailly-les-Brancion","nom":"Brancion","type":"Forteresse","periode":"XIII","histoire":"BRANCION; cité avant le Xe siècle par les Garoux,  puis aux Gros et fut la capitale des sires  de Brancion seigneurs  d'Uxelles et de Brancion qui y firent construire le château médiéval au XIIIe siècle,  suite aux conflits avec les moines de Cluny parti en croisade  en 1250 Josserand de Brancion le plus illustre  de la lignée décédera dans la bataille de Mansourah  en 1259.  Son fils ramena le corps de Josserand mais ne put faire face au dépense de la croisade dut se défaire de cette forteresse qui devient la propriété des ducs de Bourgogne (Charles le Téméraire y séjourna régulièrement) qui tiendront le siège d'une châtellenie ducale pendant deux siècles pour cela il durent remanié la forteresse et la maison forte de Beaufort. Après la réunion du duché de Bourgogne à la France, Brancion devient châtellenie royale, un premier seigneur fut nommé Jean de Lugny en 1548 auquel succède Jean de Saulx-Tavannes le château devient un centre militaire de la ligue durant la guerre de religion 1562-1598. Assiégé par les troupes royales d'Alphonse d'Ornano  est partiellement démantelé. Le fief passe en 1701 à la famille de la Baume-Montrevel, la châtellenie à pour seigneur René Moulineau en 1759 avocat au parlement de Dijon succédé par les Prost de Royer puis les Narboud jusqu'à la Révolution, transformé en bien national en partie détruit  passa à différents propriétaires avant d'être acquis en 1860 par le comte de Murard de Saint-Romain ses descendants les Morierre-Bernadotte, le possèdent toujours.","architecture":"Brancion; Sur une hauteur dominant la route de Cluny, l'ensemble médiéval de Brancion   construit au IXe siècle, renforcé au XIV siècle il reste le donjon carré du XIe siècle dont le pied est aveugle, deux tours, des murs en arêtes de poisson, aujourd'hui en partie ruiné ainsi que le village qui se tenait à ses pieds dans une première enceinte flanquée de plusieurs tours, une deuxième enceinte  dont l'accès  est défendu par deux tours rondes pourvues d'archères à étrier, les tours du manoir de Beaufort et de Chaul encadrent la maison forte de Beaufort construite par Eudes IV  au XIVe siècle, dix-neuvième duc de Bourgogne mort en 1350  qui commande l'accès à la seconde enceinte, le corps de logis  fut réaménagé du temps de Philippe le Hardi. La forteresse fut restauré par le comte de Murard.                                                       Sur la commune le manoir de Beaufort.","habitants":"Seigneurs Gros de Brancion\r\n        \"","divers":"Forteresse de Brancion et le manoir de Beaufort","gps":"","images":["../image/image_71/71_Brancion_1.jpg","../image/image_71/71_Brancion_2.jpg","../image/image_71/71_Brancion_3.jpg","../image/image_71/71_Brancion_4.jpg","../image/image_71/71_Brancion_5.jpg","../image/image_71/71_Brancion_6.jpg","../image/image_71/71_Brancion_7.jpg","../image/image_71/71_Brancion_8.jpg"]},"Consult_chateau_formulaire56dc":{"id":"Consult_chateau_formulaire56dc","dept":"71","canton":"Couches","commune":"St-Pierre-de-Varennes","nom":"Brandon","type":"Château","periode":"XIV","histoire":"BRANDON; le fief des seigneurs de Brandon, placé sous le contrôle des ducs de Bourgogne qui firent au XIIIe siècle  renforcer les défenses existantes  vraisemblable d'une tour fortifiée, ils confièrent la garde à des capitaines. Le fief est confié en 1365  à Robert d'Essertenne qui en devient seigneur héréditaire. Le duc Philippe le Hardi en 1376 élève le fief en baronnie au profit de Philippe de la Roche, petit-fils de Jean d'Essertenne. La seigneurie passa aux Lugny en 1423,  après des successions complexes au sein de la maison de Lugny, le château est acquis définitivement  en 1528 par Hugues-Bernard de Montessus, son fils  Charles de Montessus en fut dessaisi, en 1633 arrière-petit-fils, puis en 1638 il est acheté par Claude de Grenelle mais le véritable propriétaire est son beau-frère  Alphonse de Chaumelis, deux filles qui le firent  passer  ensuite par alliance  aux Lacoste en 1670 et en 1729  aux Beaurepaire qui laisseront la demeure en mauvais état un logement pour fermier,  Joseph  de Beaurepaire n'ayant pas émigré conserva le fief et le transmet en dot a sa fille qui épousa Louis Pelletier de Cléry.   Le fief échoit à Nicolas Tripier en 1826, avocat, député, pair de France,  sa fille, Émilie, épouse en 1813 l'avocat Antoine Mala qui devient plus tard propriétaire du château, leur fille Pauline-Caroline Mala épouse Ferdinand de Jouvencel (1804-1873), député, président du Conseil d'État.\r\nEn 1920  d'importants travaux de restauration sont réalisés par Madame de Jouvencel, veuve de Ferdinand de Jouvencel. En 1922  à la mort de Madame de Jouvencel, le vicomte de Masin, son petit-fils, hérite du domaine. Le château appartient encore à cette famille.","architecture":"Brandon; Dressée sur une colline pour surveiller le pays d'Autun, la forteresse fut  construite sur un camp gallo-romain jusqu'au XVIe siècle participait à la défense du duché de Bourgogne, de construction militaire du Moyen-Age, enceinte polygonale sur plan centré on y pénètre par une tour porte qui commandait un pont-levis les bâtiments se répartissent autour d'une enceinte de forme irrégulière divisée en deux par un mur séparant la basse-cour de la cour du logis des maîtres, celui-ci, de forme rectangulaire allongé, est flanqué aux angles nord-ouest et nord-est de tours carrées, une aile en retour d'équerre occupe le flanc est, elle est reliée par un pan de muraille à une troisième tour carrée, cette forteresse fut aménagée en résidence au XVIIe siècle.                                      A la Révolution à l'état de ferme par les Beaurepaire a permit de passer cette période sans problème. Château construit de 1897 à 1899 par l'architecte René Moreau, à l'emplacement d'un ancien, détruit. L'édifice s'inspire du style Louis XIII, formé d'un corps de bâtiment, en briques et pierres, avec un pavillon central et deux latéraux. Salons à décor néo-Louis XV. Parc paysager avec dépendances et orangerie.                                                       Dans la commune le château des Eymards.","habitants":"Famille de Robert d'Essertenne                                               \r\nFamille de Hugues-Bernard de Montessus\r\n        \"","divers":"Château de Brandon et d'Eymards","gps":"","images":["../image/image_71/71_Brandon_1.jpg","../image/image_71/71_Brandon_2.jpg","../image/image_71/71_Brandon_3.jpg","../image/image_71/71_Brandon_4.jpg"]},"Consult_chateau_formulairef021":{"id":"Consult_chateau_formulairef021","dept":"71","canton":"Sennecey-le-Grand","commune":"Bresse-sur-Grosne","nom":"Bresse_sur_Grosne","type":"Forteresse","periode":"XIV","histoire":"BRESSE sur Grosne; Cité en 950 fief des Achar. Le château est mentionné  en 1180 par le pape Alexandre III  qui  y régna de 1158 à 1180, les occupants une famille noble les Brecis où les Bressis. En 1263 Guillaume de Bresse fonde l'église paroissiale, aujourd'hui chapelle privée du château.    \r\nIl passe vers 1450 par alliance à la famille Palatin de Dyo, puissante maison du Charolais. La propriété est vendue en 1617 à Réméré aux moines de l'abbaye cistercienne de La Ferté.              Les Palatin de Dyo récupèrent en 1689 la propriété.                               Le château passe en 1760 par alliance de Marguerite Palatin de Dyo avec Mr de Cambis, gentilhomme famille originaire de Provence, neuf ans plus tard monsieur de Cambis qui revend  le domaine  à Philibert Reine Chiquet, riche bourgeois de Chalon, ce dernier lègue en 1799 le domaine à sa petite-nièce Claudine-Marguerite qui  par alliance, l'apporte a Benoît-Rose de Murard de Saint-Romain qui  le remaniera  et achètera progressivement toutes les maisons du village.\r\nLa restauration du château est confiée en 1870 à Sanson, architecte parisien. La propriété toujours dans la famille du comte de Murard.","architecture":"Bresse sur Grosne; le premier château antérieur au XIIe siècle, il ne reste plus rien l'élément le plus ancien date du XIVe siècle est le donjon à l'angle nord de la cour d'honneur,  le château actuel de style renaissance, le corps de logis central du XVe-XVIe siècle près d'un donjon du XIIe siècle est flanqué de deux ailes disposées en retour, un quatrième bâtiment ayant été abattu au sud pour former une cour ouverte sur le parc, l'aile Est comprend le donjon, une entrée à pont-levis et, au sud, un prolongement ajouté au XIXe siècle, le pavillon carré est flanqué de deux échauguettes d'angle, une tourelle est accolée au donjon, une tour ronde à l'angle nord-ouest, l'aile ouest comprend quant à elle une partie ancienne reliée au château par un corps de bâtiment du XIXe siècle au décor néo-renaissance.    Le château a conservé une chapelle du XIIe siècle,  importantes dépendances à usage vinicole du XVIIe siècle et une ferme modèle, dans le parc, restes d'une orangerie, d'une glacière et d'un pigeonnier.                                                                        Dans la commune le château du Colombier le Bas dit aussi de la Colombiére.","habitants":"Famille Palatin de Dyo\r\n        \"","divers":"Château de Bresse sur Grosne","gps":"","images":["../image/image_71/71_Bresse_sur_Grosne_1.jpg","../image/image_71/71_Bresse_sur_Grosne_2.jpg","../image/image_71/71_Bresse_sur_Grosne_3.jpg","../image/image_71/71_Bresse_sur_Grosne_4.jpg","../image/image_71/71_Bresse_sur_Grosne_5.jpg","../image/image_71/71_Bresse_sur_Grosne_6.jpg"]},"Consult_chateau_formulaired715":{"id":"Consult_chateau_formulaired715","dept":"71","canton":"Le Creusot","commune":"Le Breuil","nom":"Breuil_Creusot","type":"Château","periode":"XVII","histoire":"BREUIL; Fief  en 1365  à Guinard de Thélis,  Guy de Rochefort en est propriétaire en 1375. Un premier château fut bâti au lieu dit Le Breuil à la fin du XVe siècle appartenant à la famille Brisejonc. Un incendie détruisit le donjon, en 1616, et le château fut reconstruit dans son état actuel. Le domaine passe au XVe siècle aux Chargères qui prennent le titre de marquis du Breuil.  Acquisition du domaine par les Beaudinot en 1569, au décès en 1718 du dernier représentant  de la famille, Claude-Palamède Beaudinot, capitaine de la Grande Fauconnerie de France, sa fille hérite du domaine ; elle épouse Abraham de Thélis.\r\nRestauration en 1779 du château par Antoine-Palamède, petit-fils d'Abraham. Antoine-Palamède rejoint l'émigration en 1793. Après la Révolution française, rachat du domaine par le comte de Genest Saint-Didier, neveu d'Antoine-Palamède.\r\nIL fut acquit au XVIIe siècle par la famille Lhuillier d'Orcières. Puis en   1910 achat par la famille Schneider et en 1931, le château abrite un centre de formation des scouts de France.  Le village du Breuil fut acheté par le noble seigneur Nicolas de Chargères, seigneur de Sapinières, au noble seigneur Charles de la Brosse. Les Essenleys furent démantelé lors de la Révolution française de 1789.                                                                                   Dans la commune le château de Montvaltin aujourd'hui gîte de France et centre équestre.","architecture":"Breuil, le sud du val d'Arroux fut longtemps sur la frontière qui séparait le Royaume de France et son Duché de Bourgogne du Royaume d'Aquitaine, cependant Gueugnon n'a pas possédé, à l'époque féodale, de grands châteaux forts, genre forteresse ou castrum tel que ceux de certaines communes voisines Bourbon-Lancy, la Motte-Saint-Jean, Les Guerreaux avec Morillon, Grury avec Montperroux et Faulin bien que le territoire de Gueugnon fût partagé en plusieurs fiefs, il est par contre riche en mottes féodales notamment celles du Breuil et des Gachères et en maisons-fortes, bâtiment de plan rectangulaire flanqué à l'extrémité nord-ouest d'une aile en légère avancée sur les deux façades, en façade, nord-est, les ornements de l'avant-corps consistent en deux pilastres de style ionique et un fronton triangulaire avec oculus, en façade sud-ouest, on trouve deux pilastres toscans et un fronton cintré avec oculus, des communs ont été disposés à l'entrée du parc boisé.","habitants":"Famille Brisejonc\r\n        \"","divers":"Château du Breuil","gps":"","images":["../image/image_71/71_Breuil_Creusot_1.jpg","../image/image_71/71_Breuil_Creusot_2.jpg"]},"Consult_chateau_formulaire0c6e":{"id":"Consult_chateau_formulaire0c6e","dept":"71","canton":"Mesvres","commune":"Broye","nom":"Broye","type":"Château","periode":"XVIII","histoire":"BROYE; Dans la commune, outre Montjeu, le château de MONT-d'ARNAUD  construit en 1869 (style Chalet) pour Alfred de Deseilligny directeur des usines Schneider du Creusot gendre du célèbre maître des forges.                                                         Un autre château  \"PRELAY\" construit en 1913 par Paul de Desseilligny toujours  par  la famille des Deseilligny dont la soeur aînée d'Alphonse et Eugène Schneider Anne-Madeleine-Catherine  (dite Clémence) en 1827 avait épousé Amable Perrot professeur au lycée Louis le Grand qui deviendra fondateur de la dynastie des Deseilligny.                                                                          MONTJEU; fut au Moyen Âge le siège dune puissante châtellenie des ducs de Bourgogne. Pierre Jeannin, président de cour au parlement de Dijon, ministre dHenri IV, puis de Louis XIII, y fit bâtir à la fin du XVIe siècle un magnifique château, sur les plans de larchitecte Etienne Martellange. Les travaux durèrent de 1585 à 1595. Ses jardins furent dessinés par Le Nôtre. (Voir article complémentaire sur Montjeu.)","architecture":"Broye; Le château  et son parc entièrement clos de murs sont situés au sommet de la montagne séparant Autun de la vallée du Mesvrin.                                                                                   Le château de Prelay, construit en 1913 en forme de rectangle, corps de logis central rectangulaire à deux niveaux avec attiques et escaliers en fer à cheval plein centre,  deux pavillons saillants rectangulaires également à deux niveaux avec tours rondes à trois niveaux  à mâchicoulis et toits plats accolées en angles des deux pavillons; sur la façade arrière deux grands pavillons carrés à trois niveaux en angles.                                                                     Le château du Mont-d'Arnaud construit en 1869   ressemble  à une construction  de style chalet.","habitants":"Famille d'Alfred de Deseilligny \r\n        \"","divers":"Château de Broye, de Prelay et de  Mont-d'Arnaud","gps":"","images":["../image/image_71/71_Broye_1.jpg","../image/image_71/71_Broye_2.jpg","../image/image_71/71_Broye_3.jpg","../image/image_71/71_Broye_4.jpg"]},"Consult_chateau_formulairedd69":{"id":"Consult_chateau_formulairedd69","dept":"71","canton":"Mâcon","commune":"Igé","nom":"Bruyere","type":"Château","periode":"XV","histoire":"BRUYERE; Le château s'élève sur une légère éminence placée entre deux montagnes avec échappée de vue au midi, c'est un petit fief  situé sur la commune d'Igé, dans l'ancienne paroisse de Dommange, depuis sa reprise par M. Paul-Henry Borie en 1995, de nombreux investissements ont été effectués, tant au niveau des caves que de la vigne, du matériel et des bâtiments, afin que la propriété retrouve ses lettres de noblesses, ce vignoble du Mâconnais est situé sur des coteaux calcaires et très ensoleillés. Vieilles vignes et rendements limités garantissent des vins de qualité.                                                                                     Le château d'Ige transformé en hôtel restaurant et maison forte  de la tour de Mailly du XV-XVIe siècle.","architecture":"Bruyère; Il se compose de deux corps de logis adossés l'un contre l'autre, corps de logis rectangulaire entre deux tourelles carrées dominant le corps de logis d'un étage, tour ronde arasée sur l'arrière relié par galeries .          Dans la commune le château d'Ige (voir article) du XIIIe-XIVe siècle remanié  au XIXe siècle flanqué de tours rondes dont la centrale est prolongé entre deux corps de logis transformé en hôtel restaurant.","habitants":"Famille de Paul-Henry Borie \r\n        \"","divers":"Château de Bruyère","gps":"","images":["../image/image_71/71_Bruyere_1.jpg","../image/image_71/71_Bruyere_2.jpg","../image/image_71/71_Bruyere_3.jpg","../image/image_71/71_Bruyere_4.jpg"]},"Consult_chateau_formulaire37d6":{"id":"Consult_chateau_formulaire37d6","dept":"71","canton":"Lugny","commune":"Montbellet","nom":"Buffieres","type":"Château","periode":"XV","histoire":"BUFFIERES;  Un premier château, siège d'une des quatre anciennes baronnies du Mâconnais au XIIe siècle, est tenu par la maison de Montbellet. Mais il fut rasé au XIIIe siècle par une décision du parlement de Paris, suite aux exactions d'Alard de la Tour, son propriétaire, à l'égard de ses vassaux et des voyageurs traversant ses bois. \r\nMONTBELLET a été bâti au XVe siècle au hameau de Buffiéres et en à pris le nom. La famille de Montbellet le revendit ensuite aux Maugiron au XVIe siècle, en 1685, le domaine est vendu à des fermiers par la famille de Maugiron, pourvue de multiples fiefs. Au XVIIIe siècle la baronnie est acquise par Jean-Baptiste Giraud, issu d'une famille lyonnaise, dont la famille conservera la propriété durant près de deux siècle.                                                              Dans la commune le château de MERCEY du XVe siècle, cité pour la première fois et qui relève de la baronnie de Montbellet, appartient à la famille de Saint-André.  Au début du XVIe siècle il est vendu et passa entre les mains de différents propriétaires.  En 1808 à Charles Etienne Legrand  baron de Mercey à François Bureteau, échevin de Tournus. Par alliance, la propriété passe à Pierre Chesnard, grainetier au grenier à sel de Mâcon, la petite-fille  de François passe  le domaine par alliance à Émilian Noly, trésorier des États du Mâconnais.","architecture":"Buffières; à Montbellet Pierre de St-Julien de Balleure, restauré après avoir longtemps abrité une exploitation agricole, grand corps de logis allongé avec à son centre un donjon rectangulaire qui présente sous son toit les traces de créneaux, une tour modeste, dans la façade une ouverture en arc polylobé du XVIe siècle.                             Mercey; Le corps principal, de plan rectangulaire sous un toit à croupes, est flanqué sur ses angles occidentaux de deux tours rondes, vestiges d'une maison forte antérieure et, sur ses angles orientaux, de deux pavillons de même élévation que lui, une porte, encadrée de pilastres toscans portant un entablement horizontal, s'ouvre au centre de la façade orientale que précède une pièce d'eau.                                                                                                Un autre château dans la commune le château de Mirande (voir article).","habitants":"Famille de Montbellet                                                                      Famille de Saint-André\r\n        \"","divers":"Château de Buffières, de Montbellet, de Mercey, et de Mirande","gps":"","images":["../image/image_71/71_Buffieres_1.jpg","../image/image_71/71_Buffieres_2.jpg","../image/image_71/71_Buffieres_3.jpg","../image/image_71/71_Buffieres_4.jpg","../image/image_71/71_Buffieres_5.jpg","../image/image_71/71_Buffieres_6.jpg"]},"Consult_chateau_formulaire0ee9":{"id":"Consult_chateau_formulaire0ee9","dept":"71","canton":"Lucenay-L`Evêque","commune":"Chissey-en-Morvan","nom":"Buis_Chissey","type":"Château","periode":"XVI","histoire":"BUIS; Ce fief appartenait au XIIIe siècle siècle à la famille de Geoffroy de Buy, avait épousé Jeanne de Thy, dont on ne connait pas la descendance. Guillemette des Meloisses, le passa par alliance à Guy des Charnaux, en 1398. Claude des Charnaux, leur fille, fut mariée à Jean de Clugny, fils de Huguenin de Clugny et de Jeanne de Digoine, ils eurent un fils Aubert de Clugny. Hugues de Clugny qui en 1537  de son union avec Louise de Foissy, un fils, Antoine de Clugny, de 1575 à 1586, en faveur de Louise d'Andelot, son épouse et en celle de François de Cléron, seigneur de Posanges, ce dernier eut deux fils, Philibert de Posanges, l'aîné, acquit, le 3 juin 1619, la portion de son frère Xavier de Posanges. Il décéda en 1645, laissant à Marguerite de Cléron son épouse, une fille du même prénom, qui épousa en 1649, Frédéric de Loisey, seigneur de La Salle, veuve Marguerite de Cléron, se remaria avec François de la Coste, sieur de Versey. Marguerite de Cléron, n'ayant pas eu d'enfant de ses deux mariages, fit donation en faveur de Charlotte Damoseau, sa nièce, qui épousa en 1686, Alexandre de La Coste. Leur fils, Louis-François de La Coste, reprit le fief après leurs décès survenus en 1737. Il épousa Jeanne-Baptiste-Claude Chifflot d'Autfort, qui décéda à 27 ans, sans postérité. Il se remaria à Éléonore Drouas, qui lui donna un fils  Jean-Jacques de La Coste, celui-ci vendit le fief  en 1772, à Claude Levite de Flacellière, conseiller du roi et procureur de la maréchaussée d'Autun, son épouse Antoinette Mériager, lui donna deux fils, Pierre, propriétaire de Buy et  des Latois,  Étienne  hérita de Vaucheseuil et de Lionge, d'où il tira son surnom de Liongeau, Pierre, dont on voyait encore la tombe en 1866, dans le cimetière de Chissey, avait épousé Philippine Lévesque, qui lui donna un fils Ferdinand-Valentin de Flacellière, qui épousa Philippine de Montrond, il était le propriétaire du château en 1865.","architecture":"Le château du Buis date dans son état actuel  du XVIIIe siècle. Sous la féodalité cette seigneurie, était une terre en toute justice. L'ancienne maison seigneuriale fut démolie en 1781 et remplacée par celle que l'on voit de nos jours, sa haute justice, qui comprenait, Buy, la Prée, Ruisselles, Chaumien, s'exerçait à Saulieu, par emprunt de territoire, en 1732.                                    Chissey  bâtie an XIIe siècle. Cette tour rond
