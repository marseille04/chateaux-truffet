incent Bernard, capitaine de Mâcon. Jean-Christophe Bernard, en 1679 conseiller-maître en la Chambre des comptes de Dijon, fonde une chapelle dans son château. \r\nAu  XVIIIe siècle  la propriété passe entre les mains de la famille Patisser de la Forestille, puis de la famille de Murard et au début  du XXe siècle à M. Testot-Ferry, descendant direct du général Baron Claude Testot-Ferry et fils de l'archéologue Henry Testot-Ferry, achète le domaine à la famille Murard, passa ensuite a  M. Joseph Chervet, C'est seulement au XVIe siècle que l'on mentionne l'existence du Château de Vaux à Azé.                                  Le château d'Azé propriété de la ville de Mâcon avec parc.","architecture":"AZE, château de Vaux sur  Aine  au hameau de Vaux du XVI-XVIIe siècle, logis de plan rectangulaire flanqué sur sa façade orientale d'une tour d'escalier carrée hors-uvre et, sur trois de ses angles, de trois autres tours carrées de dimensions diverses. Au rez-de-chaussée, une baie est surmontée d'un arc en accolade. La porte d'accès à la tour d'escalier, qui semble avoir été remanié,  au XIXe siècle, est en plein cintre et flanquée de pilastres cannelés d'ordre toscan portant un entablement décoré de triglyphes et de gouttes. À l'ouest, une terrasse règne tout le long de la façade, entre les deux tours, elle est desservie par un degré droit, un beau parc de 17 ha aménagé dès le XIXe siècle comprend une pièce d'eau avec une belle collection d'arbres. La chapelle était située au nord   du Château d'Azé quadrilatère à deux niveaux flanques de deux tours carrées en angles et de deux tourelles rondes à l'opposée, corps saillant plein cintre en façade et fronton sculpté en cercle sur les façades de côtés.","habitants":"Famille de Vincent Bernard\r\n        \"","divers":"Château de Vaux et d'Azé","gps":"","images":["../image/image_71/71_Vaux_Aze_1.jpg","../image/image_71/71_Vaux_Aze_2.jpg","../image/image_71/71_Vaux_Aze_3.jpg","../image/image_71/71_Vaux_Aze_4.jpg","../image/image_71/71_Vaux_Aze_5.jpg"]},"Consult_chateau_formulaired4b4":{"id":"Consult_chateau_formulaired4b4","dept":"71","canton":"Lugny","commune":"Peronne","nom":"Vaux_sous_Targe","type":"Château","periode":"XIX","histoire":"VAUX-sous-TARGE, fin XVe siècle,  la famille de Mincé possède une forteresse médiévale, flanquée de tours rondes et cernée de douves.\r\nEn 1651  par mariage, la seigneurie passe à Jacques de La Fage, en 1809  mort de Victor Amédée de La Fage, marquis de Saint-Huruge début du XIXe siècle.  Jean-Raphaël Loustauneau, armateur basque qui avait épousé une lyonnaise, acquiert le bien, la forteresse est alors rasée, bien qu'étant encore en assez bon état. En 1830, un nouveau château est construit à l'emplacement de la forteresse, le domaine appartient aux descendants des héritiers, actuellement viticole.","architecture":"Vaux sous Targe, château bâti en 1830 sur l'emplacement d'une ancienne forteresse médiévale dont il ne subsiste que les douves sur  une partie à l'est,  de style néo-classique avec des références italiennes. La construction comprend un bâtiment de plan en H couvert de toits plats et formé d'un corps central et de deux ailes en retour d'équerre sur les deux façades principales, la façade sud du corps central est précédée, au rez-de-chaussée, d'une galerie de sept arcades en plein cintre qui relie les deux ailes et supporte une terrasse bordée d'une balustrade. L'arcade centrale, plus large et soulignée par des pilastres, dessert la porte d'entrée. Des entablements horizontaux surmontent les linteaux des fenêtres du premier étage qu'une corniche sépare du second étage. Les ailes sont couronnées de frontons, le corps central d'une balustrade. Des pilastres corniers soulignent les angles. Au nord, une galerie sur colonnes règne au second étage.\r\nLe château, a été décoré par des peintres italiens. Dans les appartements, subsistent de beaux papiers peints panoramiques et un mobilier de style restauration.Des communs s'étendent à l'est.\r\nLes douves de la forteresse initiale, qui avaient été conservées lors de la seconde construction, ont été ultérieurement asséchées et transformées en jardins..","habitants":"Famille de Jean-Raphaël Loustauneau\r\n        \"","divers":"Château de Vaux sous Targe","gps":"","images":["../image/image_71/71_Vaux_sous_Targe_1.jpg","../image/image_71/71_Vaux_sous_Targe_2.jpg","../image/image_71/71_Vaux_sous_Targe_3.jpg"]},"Consult_chateau_formulaire03b2":{"id":"Consult_chateau_formulaire03b2","dept":"71","canton":"Mâcon","commune":"Charnay-les-Mâcon","nom":"Verneuil","type":"Château","periode":"XVII","histoire":"VERNEUIL, fief cité au XIe siècle, son nom à plusieurs familles dont on ne peut dégager les liens et l'histoire.  On mentionne en 1369 un Pierre de Verneuil, capitaine châtelain de Mâcon. Deux siècles plus tard, le château servira de refuge aux protestants. Il aurait alors été habité par lamiral de Coligny.  Parmi leurs membres figurent un châtelain de Mâcon, fidèle serviteur du roi Charles V, et un capitaine châtelain de la ville. Les Verneuil s'éteignirent au début du XVe siècle, succédé par Antoine de Vergisson,  en 1440, les Cheminant de 1480 à 1626, les Garnier de 1626 à 1712, Claude Bernard de Châtenay, connu pour son érudition, puis son gendre François Laurent d'Ozenay, et le fils de ce dernier, qui conserva Verneuil jusqu'en 1804. Le domaine fut vendu à diverses reprises et finalement morcelé en 1894.  Il a été partiellement restauré par les Lombard de Buffières à partir de 1895.   Il passe ensuite entre plusieurs mains et se morcelle à nouveau, vers 1929, lévêché de Saône-et-Loire y héberge les enfants des colonies de vacances, puis pendant la Seconde Guerre mondiale, le château reçoit le centre daccueil de la Croix-Rouge. Revendu en 1957 à la famille Chevalier, propriétaire viticole.","architecture":"Verneuil,  remonte au XVe siècle, il consistait en un quadrilatère défendu par un pont-levis et précédé d'une basse-cour. Le morcellement de 1894 n'a laissé subsister que le corps de logis principal, flanqué à ses extrémités de deux tours circulaires percées de meurtrières, et l'aile sud des communs auprès de laquelle se trouve une petite chapelle du XVIIIe siècle. Le logis, de plan rectangulaire allongé, comprend un rez-de-chaussée, un étage et un comble à surcroît sous un toit à croupes très bas couvert de tuiles creuses, un grand fronton triangulaire, élevé au XVIIIe siècle, couronne les cinq travées centrales de chacune des façades.","habitants":"Famille de Pierre de Verneuil\r\n        \"","divers":"Château de Verneuil","gps":"","images":["../image/image_71/71_Verneuil_1.jpg","../image/image_71/71_Verneuil_2.jpg"]},"Consult_chateau_formulairebee6-2":{"id":"Consult_chateau_formulairebee6-2","dept":"71","canton":"Creusot","commune":"Creusot","nom":"Verrerie_Creusot","type":"Château","periode":"XVIII","histoire":"La VERRERIE, un château fut construit vers 1780, en 1790  la commune présente une importante activité industrielle, en 1786 manufacture des cristaux de la reine Marie-Antoinette, c'est en 1836  que les frères Adolphe et Eugène Schneider achètent la verrerie ancien siège de la cristallerie  qui deviendra en 1845 la résidence principale d'Eugène,  président du corps légitime sous le Second Empire. Quatre générations de cette famille des Schneider passeront dans ce château qui sera ensuite racheté par la ville du Creusot en 1971.                                                                            Dans le canton du Creusot, la commune de Saint-Sernin du Bois un donjon édifié au XIVe siècle par un prieur Jean de Saint-Privé, le dernier prieur Jean Baptiste de Salignac de Fénelon y résida de 1745 à 1778. A la Révolution saisi comme bien national  vendu, passera par divers propriétaires dont les Schneider les maîtres des forges  qui y stokèrent leurs archives de l'usine. Il fut acheté par la commune  en 1976 pour en faire un lieu culturel et musée.","architecture":"La Verrerie, château construit en 1780 le château fut remanié au XXe siècle les bâtiments de la cristallerie furent construits sur une croupe surplombant la plaine des Riaux  à un étage sous un toit à la Mansard le château servit de siège de la cristallerie, corps de logis en forme de U un étage sous un toit  percé de lucarnes et d'oeils-de-boeuf avant corps couronné d'un attique reçoit un fronton percé d'un oculus. Les ailes encadrant une vaste cour comportent chacune un avant corps surmontées d'un fronton, les deux fours coniques  qui datent de la cristallerie l'un transformé en théâtre et l'autre en chapelle. Le corps central du château transformé en musée de l'homme et de l'industrie.                                                          Le donjon de Saint-Sernin  de forme rectangulaire à quatre niveaux.","habitants":"les frères Adolphe et Eugène Schneider\r\n        \"","divers":"Château  et usine de la Verrerie","gps":"","images":["../image/image_71/71_Verrerie_Creusot_1.jpg","../image/image_71/71_Verrerie_Creusot_2.jpg","../image/image_71/71_Verrerie_Creusot_3.jpg","../image/image_71/71_Verrerie_Creusot_4.jpg","../image/image_71/71_Verrerie_Creusot_5.jpg"]},"Consult_chateau_formulaireea65":{"id":"Consult_chateau_formulaireea65","dept":"71","canton":"Lucenay-L`Evêque","commune":"La Celle-en-Morvan","nom":"Vesvres_Celle","type":"Château","periode":"XIV","histoire":"VESVRES, en 1364  armes des  de Ganay, la maison forte est occupée par les Routiers dont le capitaine Perrot Callain, en principe subordonné à Arnaud de Cervole, refuse d'évacuer le château, les compagnies pillent les environs, occupent temporairement Chissey et menacent Autun, leur départ est obtenu par le paiement de 2500 francs or. En 1365, le 28 juin, à la demande des habitants, le duc de Bourgogne Philippe le Hardi ordonne la destruction du château, fin XVe siècle, la terre appartient à la famille de Ganay qui possède également le château de la Vaivre, à Rigny-sur-Arroux. En 1584  Claude de Fougère possède la seigneurie. En 1627, la Vesvres passe à la famille de Choiseul-Traves, qui fait sans doute construire le château actuel, en 1926  des travaux modifient l'aspect du château.","architecture":"Vesvres-Celle; Des constructions médiévales, il ne subsiste que deux tours isolées au nord du château actuel. À la fin du XVIe siècle, le château reconstruit comportait une maison forte fossoyée à l'entour, garnie de deux corps de logis, cinq tours flanqué l'une à l'autre avec un pont-levis. \r\nEn 1926, les portes sont refaites ainsi que les fenêtres séparées par de petites niches circulaires. La façade est encadrée d'ailes peu saillantes et précédée de chaque côté d'un petit pavillon de plan arrondi formant terrasse dont les angles sont décorés de refends et surmontés d'une boule. La façade orientée vers le sud, dont la partie centrale est limitée par des refends et couronnée d'un fronton triangulaire, appartient aussi aux travaux de 1926. Vers l'ouest, un corps de logis central et deux ailes perpendiculaires forment la façade qui domine la rivière. On accède au rez-de-chaussée, surélevé en raison de la pente du terrain, par un escalier de pierre dont les rampes sont parallèles à la façade; les portes cintrées et la niche qui les séparent ont été refaites en 1926. Les lucarnes sont surmontées d'un fronton triangulaire.\r\nLa façade du château est précédée d'une terrasse qui domine une vaste cour fermée par une grille en encadrée par les bâtiments des communs. Un petit jardin à la française se trouve devant la façade sud. vers l'ouest, le château domine la rivière toute proche: d'étroites terrasses, où buis taillés et ifs dessinent de petits parterres ordonnés autour d'une vasque, amènent jusqu'au bord de l'eau.","habitants":"Famille d'Arnaud de Cervole\r\n        \"","divers":"Château de Vesvres","gps":"","images":["../image/image_71/71_Vesvres_Celle_1.jpg","../image/image_71/71_Vesvres_Celle_2.jpg"]},"Consult_chateau_formulairee145":{"id":"Consult_chateau_formulairee145","dept":"71","canton":"Gueugnon","commune":"Rigny-sur-Arroux","nom":"Vesvres_Vaivre","type":"Château","periode":"XV","histoire":"VESVRES-Vaivres, deux châteaux  celui de la Faule et le  Vesvre  du XVe siècle. Claude de Ganay, grand-père de Pontus de Tyard et époux de Denise Courroy, est seigneur la Vaivre, au XVIe siècle, un château est bâti par François de Ganay, bourgeois de Charolles. Claude Berthaud est seigneur de la Vaivre vers 1569 \r\nLa famille Pérard effectue des remaniements au XVIIe siècle. Par alliance, le domaine passe au début XVIIIe siècle à Bénigne-Germain Le Goux. La propriété est vendue en 1728 à Jacques Maublanc, de Digoin, écuyer et époux d'Anne Delatroche, en 1768  à la mort de Jacques, son fils, Jacques-Marie Maublanc, écuyer, capitaine au régiment d'Anjou, lui succède; il avait épousé Marie Charlotte Ducret-Devillaine. \r\nLe vieux château est abandonné au XIXe siècle à un fermier et une nouvelle résidence est bâtie à la lisière de la forêt voisine. \r\nAprès diverses successions, le château  passe au début du XXe siècle  au baron Antoine de Ponnat et au XXe siècle, le baron P. de Ponnat, son petit-fils , est propriétaire du domaine et  en 1584  Claude de Fougère possède la seigneurie. En 1627 :la Vesvre passe à la famille de Choiseul-Traves, qui fait sans doute construire le château actuel. En 1926  des travaux modifient l'aspect du château.","architecture":"Vesvres,  des constructions médiévales, il ne subsiste que deux tours isolées au nord du château actuel. À la fin du XVIe siècle, le château reconstruit comportait une maison forte, garnie de deux corps de logis et des fossés, cinq tours flanqué l'une à l'autre avec un pont-levis. subsiste du château deux tours rondes, l'ancien château a été détruit par Philippe le Hardi au XIVe siècle.  Le logis, de plan rectangulaire, comprend un rez-de-chaussée, un étage carré et un étage de combles coiffé d'une haute toiture à croupes en tuiles plates. Il est flanqué d'une tour carrée à un étage et un demi-étage. Au centre de la façade sud, s'ouvre une porte rectangulaire entre deux pilastres d'ordre toscan portant un linteau à triglyphes. Les piédroits des lucarnes à fronton sont en bossages rustiques un sur deux. Un bandeau règne avec l'appui des fenêtres de l'étage.\r\nLe château moderne, édifié au XVIe siècle, remanié au XIXe siècle en faisant construire une nouvelle demeure sur une colline subsiste du château deux tours rondes, est formé d'un corps central à un étage carré et un étage de combles sous un toit à croupes en ardoises, entre deux ailes, dans le même alignement, couvertes à l'ouest de terrasses à balustrade. Le chevet à trois pans d'une chapelle de style flamboyant émerge du pignon sud. Les ouvertures du rez-de-chaussée du corps central sont en plein cintre.","habitants":"Famille de François de Ganay\r\n        \"","divers":"Château de Vesvres et de Rigny","gps":"","images":["../image/image_71/71_Vesvres_Vaivre_1.jpg","../image/image_71/71_Vesvres_Vaivre_2.jpg"]},"Consult_chateau_formulaire9700":{"id":"Consult_chateau_formulaire9700","dept":"71","canton":"St-Germain-de-Blain","commune":"Abergement-ste-Colombe","nom":"Villargeau","type":"Château","periode":"XV","histoire":"VILLARGEAU, reste des ruines féodales du château. Le fief appartient à Jeanne de Tenarre en 1319. Guillaume de Sercey vend en 1371 la seigneurie à Guillaume de La Marche, dont le fils épousera Flore de Sercey. Le château appartient au début XVIe siècle à Jacques Arbaleste. Jean de Ferrière en est propriétaire en 1550, la seigneurie passe en seconde moitié du XVIe siècle aux Clugny.\r\nLes précédents lèguent la terre en 1655 à François de Montet, dont les descendants vont le conserver un peu moins d'un siècle. Le domaine est acquis en 1737 par Étienne de Ganay, seigneur de Bellefond, et au milieu du XVIIIe siècle  sa fille  apporte le bien en dot à Charles-Louis de La Rodde.\r\nLe château brûle accidentellement avant la Révolution, et  les ruines sont abattues.\r\nUn petit château est bâti sur la motte primitive en 1888 qui sera au XXe siècle la propriété de M. Arnoul de Pirey. En 2003 propriété de la famille Alex Willms, maître sellier, écuyer, cavalier de concours et de spectacles équestres internationaux.","architecture":"Villargeau, reste des ruines féodales du château, cernée de fossés encore en eau sur trois côtés, la motte, de plan ovale, ne porte plus qu'un logement de garde à l'est et au sud-ouest, une demeure en brique couverte d'ardoises, consistant en un corps central de plan rectangulaire sous un toit brisé, entre deux pavillons constituant vers le nord deux courtes ailes en retour d'équerre. Dans les angles qu'ils forment au sud avec le corps central, s'élèvent deux tourelles d'escalier circulaires. Une terrasse à appui-corps en fer forgé règne devant la façade méridionale. Au sud-est, se trouve une belle ferme  à pans de bois bâtie au XVIIe siècle.","habitants":"seigneurie de Guillaume de La Marche\r\n        \"","divers":"Château de Villargeau","gps":"","images":["../image/image_71/71_Villargeau_1.jpg"]},"Consult_chateau_formulaire7b54":{"id":"Consult_chateau_formulaire7b54","dept":"71","canton":"Cuisery","commune":"Genête","nom":"Villeneuve","type":"Château","periode":"XVII","histoire":"VILLENEUVE, au XIVe siècle : la terre est dotée d'une maison forte, le fief en 1366 est la propriété des Saint-Trivier, il passe en 1503  à Gabriel de Seyssel, baron d'Aix et au milieu du XVIe siècle, la seigneurie échoit à la branche cadette de Seyssel-La Chambre,  la terre est confisquée en 1640 à Jean Bouchin, conseiller au bailliage et chancellerie de Beaune, au profit de Jacques Bretagne, par alliance en 1680 avec Marie-Bernarde Bretagne, le domaine passe à Nicolas Deschamps, seigneur de Riel-Dessus dont les descendants possèdent toujours le château à la veille de la Révolution. Propriété  au XXe siècle des Mlles J. Mayer et Y. Lamberet.                                                           \r\n  Dans la commune ancienne commanderie de Saint-Jean de Jérusalem du XVe siècle.","architecture":"Villeneuve, dotée d'une maison forte citée au XIVe siècle, au XVIIe siècle, il est mentionné un beau pavillon entouré de fossés franchis par un pont-levis et un pont dormant, seul subsiste, le long du flanc sud de la terrasse carrée qui portait la maison forte, un bâtiment de plan rectangulaire allongé, couvert d'un toit à deux versants, flanqué à son extrémité ouest d'un pavillon en légère avancée sur ses deux façades, couvert d'un toit à croupes. Il comprend un sous-sol, un rez-de-chaussée surélevé, un étage carré, un demi-étage et vers la cour, un étage de comble éclairé par des lucarnes, bâti en briques et pierres recouvertes d'un crépi ocre et percé de grandes baies, il paraît dater du XVIIe siècle. L'une des pièces est décorées de boiseries peintes du XVIe siècle, provenant d'un hôtel de Valence.\r\nUn pigeonnier carré dans l'angle nord-est de la cour et une grange en appareil à pans de bois hourdé de brique sous un vaste toit à croupes complètent l'ensemble.Les fossés sont comblés.","habitants":"Famille de Gabriel de Seysse\r\n        \"","divers":"Château de Villeneuve","gps":"","images":["../image/image_71/71_Villeneuve_1.jpg","../image/image_71/71_Villeneuve_2.jpg","../image/image_71/71_Villeneuve_3.jpg"]},"Consult_chateau_formulaire8e8d":{"id":"Consult_chateau_formulaire8e8d","dept":"71","canton":"Mâcon","commune":"Vinzelles","nom":"Vinzelles_Laye","type":"Château","periode":"XV","histoire":"VINZELLES, le fief de Vinzelles appartenait aux XIIe et XIIIe siècle à la famille de Vinzelles, seigneurie qui faisait parti du comté de Mâcon, puis a intégré le royaume de France en 1226, au milieu du XVe siècle, Vinzelles a appartenu à la famille de Saint-Amour, puis est passé  par alliance à la famille de Germolle, qui a du faire face  dans son château solidement fortifié aux troupes de Louis XI qui s'en  emparent. Sa fille par alliance l'apporte à Jacques de Bellecombe en 1499  et a été conservé au sein de cette famille jusqu'en 1587. Ensuite il est passé  dans les mains de la famille Dormy, de la famille Chesnard  qui l'a abandonné à des fermiers. Il a été saisi en 1796 et attribué à Pierre-Marie Canot, un négociant mâconnais. Au cours du XIXe siècle, les ventes se sont succédé jusqu'à l'achat de Vinzelles et de Layé, en 1852, par le comte de Dormy de Thoisy.\r\nLAYE; construit par la famille de Layé, passa au Bullion cette famille le gardera jusqu'en 1688 et passera à Emmanuel Chesnard secrétaire du roi le gardera jusqu'à la Révolution ou ils durent émigrés, les deux châteaux regroupés en 1780 vendu comme bien national acquit par Pierre-Marie Canot passera dans différentes mains tel que  les Joannon, aux Garempel de Bressieux comte de Panisse puis à son gendre le comte de Grille, aux Humbert, aux Taperin  et aux Maubou. En 1852 le comte de Dormy de Toisy récupère les châteaux, ancêtre des propriétaire actuel les Lostende.","architecture":"Vinzelles, la particularité du domaine de Vinzelles consiste en la présence de deux châteaux distants de quelques mètres, la maison forte du XIe siècle et la maison noble des XIIIe et XVIIe siècles. La maison forte de Vinzelles  cerné sur trois côtés par des fossés précédés au sud d'une avant cour dont la grille d'entrée rejoint deux tours rondes.                                                                            Laye; Reconstruit au XVIIe siècle dans l'enceinte de la vieille maison forte de Vinzelles édifiée au Moyen-Age quadrilatère à trois corps de logis à deux niveaux et attiques  cantonnés de quatre tours carrées percées de canonnières.","habitants":"Famille de Vinzelles                                                                        Famille de Layé\r\n        \"","divers":"Château de Vinzelle de Laye et de Mirande","gps":"","images":["../image/image_71/71_Vinzelles_Laye_1.jpg","../image/image_71/71_Vinzelles_Laye_2.jpg","../image/image_71/71_Vinzelles_Laye_3.jpg","../image/image_71/71_Vinzelles_Laye_4.jpg","../image/image_71/71_Vinzelles_Laye_5.jpg","../image/image_71/71_Vinzelles_Laye_6.jpg","../image/image_71/71_Vinzelles_Laye_7.jpg","../image/image_71/71_Vinzelles_Laye_8.jpg","../image/image_71/71_Vinzelles_Laye_9.jpg"]},"Consult_chateau_formulaire2ada":{"id":"Consult_chateau_formulaire2ada","dept":"71","canton":"Lucenay-L`Evêque","commune":"Visigneux","nom":"Visigneux","type":"Château","periode":"XIX","histoire":"VISIGNEUX,  mention de la maison-forte de Visigneux  au XIIIe siècle. Guillaume de Brazey, en 1302 sire de Visigneux, meurt.\r\nAu milieu du XVIe siècle Odot Desmolins (ou Dumoulin), procureur du roi, est seigneur de Visigneux, passa ensuite à la famille de Ganay, le château, après avoir souvent changé de main, parvient à Nicolas de Ganay, dont la famille conservera le château jusqu'à nos jours. Paul-Louis de Ganay en 1750 , marquis de Ganay,  il est officier royal des vaisseaux et gouverneur d'Autun.  Antoine-Charles de Ganay en 1802 , marquis de Ganay,  il est maréchal de camp des armées du roi et député de Saône-et-Loire. Charles-Alexandre de Ganay, en 1849 marquis de Ganay,  il est ministre plénipotentiaire en Toscane. Louis-Charles-Maurice de Ganay, en 1881 marquis de Ganay, fils du précédent.  Anne-Étienne de Ganay, en 1893 marquis de Ganay et frère . Charles-Anne-Jean de Ganay en 1903 marquis de Ganay,  il est président du Conseil général de Seine-et-Oise et officier de cavalerie. Octave-Marie-Hubert de Ganay, en 1948 marquis de Ganay, chevalier de la Légion d'honneur et Croix de guerre 1914-1918,  Jean Louis Sébastien Hubert comte de Ganay, lui succède en 1974.","architecture":"Visigneux, au XIIIe siècle, on trouve mention de la maison forte de Visigneux et de son enceinte, avec fossés, colombier, garenne, étang, moulin.   Il appartient depuis cette date à la famille de Ganay qui a fait bâtir en 1885, par l'architecte Ernest Sanson un grand château en avant de l'ancien bâtiment.\r\nLe château édifié au XIXe siècle est de plan rectangulaire, cantonné d'une tour ronde et de deux tours carrées, s'ordonne autour du vestibule central qui contient l'escalier. C'est une construction à deux étages entièrement en granit,  au-dessus d'un socle saillant, le petit appareil irrégulier des murs est ponctué entre chaque étage d'un bandeau saillant et les angles sont appareillés en harpe, un corps de logis rectangulaire flanqué au nord d'un pavillon de deux étages constitue l'ancien château semblent dater du XVIIe siècle ou du XVIIIe siècle. À la façade ouest, les ouvertures ont été modifiées mais le socle saillant à la base du mur et le fossé en avant de ce mur paraissent être les restes de la maison forte du Moyen Âge. Le plan rectangulaire cantonné d'une tour ronde et de deux tours carrées s'ordonne autour du vestibule central qui contient l'escalier.","habitants":"Famille des de Ganay\r\n        \"","divers":"Château de Visigneux","gps":"","images":["../image/image_71/71_Visigneux_1.jpg","../image/image_71/71_Visigneux_2.jpg","../image/image_71/71_Visigneux_3.jpg","../image/image_71/71_Visigneux_4.jpg","../image/image_71/71_Visigneux_5.jpg","../image/image_71/71_Visigneux_6.jpg","../image/image_71/71_Visigneux_7.jpg"]},"Consult_chateau_formulaire934c":{"id":"Consult_chateau_formulaire934c","dept":"71","canton":"Bourbon-Lancy","commune":"Vitry-sur-Loire","nom":"Vitry_sur_Loire","type":"Château","periode":"XIX","histoire":"VITRY-sur-LOIRE, Ansender 1er de Bourbon en  968, jusqu'au XIIIe siècle puis par les la Trémoille jusqu'en 1377 , passe à Jean de Lestinois de Vienne jusqu'en  1524, Bénigne de Granson, baronne de la Ferté-Chaudron, Montaigu-sur-Billon, Chatelledon, Montgilbert, Le Boeil-au-Donjon, Vitry-sur-Loire, Arc-en-Barrois, veuve de François de Vienne, baron de Vitry et seigneur de Lestinois. Louis, seigneur de La Fayette et de Monteilgelat, époux d'Anne de Vienne, fille de François de Vienne, seigneur de Listenois. Ils eurent deux enfants  François seigneur de La Fayette, tué en 1557 dans cette famille  jusqu'en 1585, passa à  Gaspard de Saulx, Antoine de Vienne dit « de Bauffremont », seigneur de Lestinois, Claude et Jean de Bauffremont, tous frères ou beaux-frères, sont également co-barons de Vitry. Henri de Saulx, mort en 1646 sans héritier, laissa  en 1685 à sa nièce Melchior de Bueil de Grimaldi la moitié de ses biens, parmi lesquels la baronnie de Vitry,    Melchior de Bueil de Grimaldi, dame du Donjon, épouse de Broccard de Gyannis, marquis de Sully et comte de Rispe. Elle fit don en 1686 de la baronnie de Vitry à sa cousine issue de Germaine Marguerite-Henriette de Saulx-Tavannes. Marguerite-Henriette de Saulx-Tavannes, veuve de Louis Eustache de Montsaulnin, en 1696  marquis de Montal.\r\nEn 1714 Pierre Bruneau, chevalier dhonneur du Châtelet de Paris, seigneur de Champlevrier et autres lieux.  Marguerite de Jarsaillon, en 1728 veuve de Pierre Bruneau, dame de Vitry. Denis Robert Bruneau de Vitry, en 1737 baron de Vitry.Pierre Etienne Bruneau, chevalier, en 1773 marquis de Vitry.","architecture":"Vitry sur Loire, château de Fraise du XIXe siècle , le vieux château de Fraise du XVIIIe siècle et le château de Salnay maison bourgeoise.","habitants":"Famille de  Melchior de Bueil de Grimaldi\r\n        \"","divers":"Château de Vitry sur Loire","gps":"","images":["../image/image_71/71_Vitry_sur_Loire_1.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','71 — Saône-et-Loire'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
