                        Dans cette commune plusieurs châteaux dont le château de Beauregard.","architecture":"Rambuteau, à l'origine maison forte qui sera  reconstruit en 1710-1720 d'un corps de logis à deux niveaux avec attiques de forme rectangulaire avec des tours rondes sur la cour à toits à  forme de bulbes  et deux pavillons rectangulaires saillants dont un  avec fronton triangulaire, construction de la chapelle en 1840 et remaniement de la façade au XIXe siècle.                              Crary; château construit au XIXe siècle de forme rectangulaire a deux niveaux et attiques accolée de deux pavillons aux extrémités rectangulaires également sur la partie opposée deux ailes en retour à un niveau deux tours rondes  insérées dans les angles intérieurs.","habitants":"Famille de Claude de Barthelot                                                          Famille de La Souche\r\n        \"","divers":"Château de Rambuteau, de Crary et de Beauregard","gps":"","images":["../image/image_71/71_Rambuteau_Crary_1.jpg","../image/image_71/71_Rambuteau_Crary_2.jpg","../image/image_71/71_Rambuteau_Crary_3.jpg","../image/image_71/71_Rambuteau_Crary_4.jpg","../image/image_71/71_Rambuteau_Crary_5.jpg","../image/image_71/71_Rambuteau_Crary_6.jpg","../image/image_71/71_Rambuteau_Crary_7.jpg","../image/image_71/71_Rambuteau_Crary_8.jpg","../image/image_71/71_Rambuteau_Crary_9.jpg"]},"Consult_chateau_formulairefe6b":{"id":"Consult_chateau_formulairefe6b","dept":"71","canton":"Buxy","commune":"St-Maurice-des-Champs","nom":"Rochette_Buxy","type":"Château","periode":"XV","histoire":"ROCHETTE, en 1406 et 1407 d'importantes réparations sont réalisées par le chapitre de Saint-Vincent de Chalon. En 1592  après les ravages infligés par les calvinistes, les chanoines vendent le fief à Louis de Rymon et François Royer, le premier procède à une reconstruction presque totale,  il édifie quatre tours, rénove les murailles et y établit des canonnières. \r\nAu début du XVIIe siècle  Claude, nièce de Louis de Rymon et épouse de Charles de Hénin-Liétard, hérite du domaine et en 1659  Gabriel de Hénin-Liétard, seigneur de la Rochette, lieutenant du roi de la citadelle de Chalon assiste à Paris, en présence de Louis XIV et de Mazarin, à la signature du contrat de mariage de sa sur  Charlotte, baronne de Sainte-Croix avec Charles de Batz-Castelmore, dit \"d'Artagnan\". \r\nEn 1750, cette famille vend le château à Claude-Philibert de La Vernette, dont les descendants le conserveront durant deux siècles. Restauration totale en 1880  devient la propriété de l'école Saint-Benoît, puis le château de La Rochette appartenait au chapitre de Saint-Vincent de Chalon qui y fit faire d'importantes restaurations, ils utilisèrent ce château pendant quarante ans, racheté en 1958 par la famille Surleau qui viennent de le revendre en 2010 à Luigi Castiglione éditeur italien.\r\nDans la commune  ruines féodales.","architecture":"Rochette, actuellement propriété de l'école Saint-Benoît, la construction consiste en un bâtiment de plan rectangulaire \r\nformé de trois corps en U et cantonné de tours, une tour carrée et trois tours rondes. Les communs flanqués de deux petites tours rondes s'alignent au sud. Un vaste parc boisé entoure l'ensemble, visible de l'extérieur  Les communs flanqués de deux petites tours rondes s'alignent au sud.","habitants":"Famille de Louis de Rymon\r\n        \"","divers":"Château de Rochette","gps":"","images":["../image/image_71/71_Rochette_Buxy_1.jpg","../image/image_71/71_Rochette_Buxy_2.jpg","../image/image_71/71_Rochette_Buxy_3.jpg","../image/image_71/71_Rochette_Buxy_4.jpg","../image/image_71/71_Rochette_Buxy_5.jpg","../image/image_71/71_Rochette_Buxy_6.jpg","../image/image_71/71_Rochette_Buxy_7.jpg"]},"Consult_chateau_formulaire06ec":{"id":"Consult_chateau_formulaire06ec","dept":"71","canton":"La Chapelle-de-Guinchay","commune":"Romanèche-Thorens","nom":"Romaneche_Thorens","type":"Château","periode":"XVI-XVII","histoire":"TOUR-ROMANECHE, le château a été construit vers 1450 et à la fin du XVIe siècle devient possession de la famille de Chabeu, est vendue par Étienne de Rébé, mari de Françoise de Chabeu, à Claude de Noblet, elle passe ensuite, par mariage, aux Thibaut, qui relèvent le nom de Noblet.\r\nEn 1717 la propriété est vendue à Abel-Michel Chesnard et ses descendants fondent une chapelle en 1751. Le bien est vendu à un jeune suisse, Jean-Frédéric Schalleimer en 1791 puis acquis par Clément Carra vers 1840. En 1928 il appartient à Barmont et depuis les années 50 à la famille Veille.                 \r\nGUIMARET; Les traces du château des Gimarets remontent au XVIle siècle, Le château a été édifié pour recevoir un notable en charge de la commune proche de Romanèche sur le lieu dit les Gimarets ou Gimarais à lemplacement dune villa romaine.\r\nSuite à un incendie, le château est détruit en 1780. Monsieur Louis Chaumet, Procureur de la République à Mâcon, acquiert la propriété et reconstruit en 1810 une bâtisse bourgeoise dans le style romantique  Aujourd'hui viticole le domaine, appartient à la famille Boyer,  Eric Boyer  depuis 2007, qui le rénove et exploite les vignes attenantes à la propriété.\r\nDans la commune plusieurs châteaux dont celui du Moulin à Vent et de Jacques.                                                                                     Le château Portier, jusque là propriété de la famille Gaidon  a été repris par Denis Chastel-Sauzet en 2006.","architecture":"TOUR  Romanèche-Thorins, entouré sur trois côtés de fossés d'eau vive, restes d'une enceinte que précédait une basse cour, le château se compose d'un corps principal et de deux ailes en retour d'équerre, les deux angles extérieurs sont flanqués de deux tours rondes, le tout est couvert de toitures basses en tuiles creuses.\r\nGuimaret  avait brûlé et à été reconstruit sous forme de grande maison bourgeoise, les traces du château  remontent au  XVIle siècle,  de forme carrée, située dans un parc dun hectare aux arbres centenaires, la bâtisse est orientée, face à son vignoble, vers le moulin-à-vent tout proche.sous le règne de Louis XIV. Cest lépoque des mousquetaires du roi, des jardins de Le Nôtre, du théâtre de Molière, de la musique de Lully et des peintures de Georges de la Tour, Rembrandt.                                                   Château Portier est une demeure bourgeoise édifiée en 1879 dans le prolongement des bâtisses âgées des XVIe et XVIIe siècles. Il est à limage des châteaux du Beaujolais, clos de mur, terrasses de platanes ombragées, tours bourguignonnes de tuiles vernissées, et de belles pièces de réception voluptueuses et richement décorées de stuf.","habitants":"Famille de Chabeu\r\n        \"","divers":"Château de Romanèche-Thorens, la Tout et de Guimaret","gps":"","images":["../image/image_71/71_Romaneche_Thorens_1.jpg","../image/image_71/71_Romaneche_Thorens_2.jpg","../image/image_71/71_Romaneche_Thorens_3.jpg","../image/image_71/71_Romaneche_Thorens_4.jpg","../image/image_71/71_Romaneche_Thorens_5.jpg","../image/image_71/71_Romaneche_Thorens_6.jpg","../image/image_71/71_Romaneche_Thorens_7.jpg","../image/image_71/71_Romaneche_Thorens_8.jpg"]},"Consult_chateau_formulaire0bc4":{"id":"Consult_chateau_formulaire0bc4","dept":"71","canton":"Tournus","commune":"Romenay","nom":"Romenay","type":"Château","periode":"XV","histoire":"ROMENAY, l'histoire du château est liée à la mémoire de Guy Coquille, historien du Nivernais et juriste  (1523-1603). Les communs et dépendances ont été édifiés au XVIIe ou XVIIIe siècle et n'ont pas subi de modifications,  serait certainement d'origine romaine. L'acte le plus ancien où figure Romenay est la donation faite par le roi burgonde Gondran, petit-fils de Clovis à l'église Saint-Vincent de Mâcon, lieu de résidence de l'évêque de l'époque qui était un certain Nizier, canonisé par la suite.\r\nDepuis cette époque lointaine, la paroisse de Romenay appartenait donc aux évêques de Mâcon, seigneurs de Romenay, le dernier en date est  monseigneur Moreau qui fut destitué pendant la période révolutionnaire de 1789 à 1794. Un magnifique tableau  est visible au musée des Ursulines de Mâcon. L'actuelle mairie est installée dans l'ancien château de l'évêque.","architecture":"Romenay,  les façades et toitures; l'escalier à balustres en bois; les deux pièces avec boiseries au rez-de-chaussée, les restes de peintures murales de la pièce du premier étage, les douves, les trois ponts dormants; les bassins de retenue et leur système de vannes,  le mur de clôture,  le portail avec sa grille, les quatre corps de logis constituant les dépendances du château.  Ville fortifiée avec comme vestiges féodaux deux portes du XVe siècle à l'extrémité de la grande rue.                                                          Dans cette commune le château de Serve 1830, de Saint-Roman  1890 et le château des évêques de Mâcon aujourd'hui mairie.","habitants":"Evêques de Mâcon\r\n        \"","divers":"Château de Romenay, des Evêques, de Gerves et de St-Romain","gps":"","images":["../image/image_71/71_Romenay_1.jpg","../image/image_71/71_Romenay_2.jpg","../image/image_71/71_Romenay_3.jpg","../image/image_71/71_Romenay_4.jpg","../image/image_71/71_Romenay_5.jpg"]},"Consult_chateau_formulaire2be9-2":{"id":"Consult_chateau_formulaire2be9-2","dept":"71","canton":"Givry","commune":"Rosey","nom":"Rosey","type":"Château","periode":"XVI","histoire":"ROSEY,  Antoine Clerguet, capitaine chef du vol de la grande fauconnerie de France, a fait construire cette maison  en 1767, ce dernier  organisait les chasses de Louis XV puis Louis XVI et qui décida d'édifier le château actuel plus digne de son rang, sur le modèle du petit Trianon.  Après la mort d'Antoine Clerguet, en 1789, sans héritier direct, le château échoit  à Vincent-Mathias de  Villedieu de Torcy.  A la Révolution, le propriétaire ayant émigré, le domaine est vendu à Antoine Denis Bottex  greffier au tribunal de Chalon, il abat la chapelle et la bibliothèque qui formaient deux courtes ailes d'un seul  niveau,  terrasses à balustrade, de part et d'autre du bâtiment central. En 1819 le château entre dans la famille Vitteaut, puis il est cédé à Mme de La Grandière en 1903, enfin en 1976  acquisition par M.   Robert Arnal.                             Aujourd'hui chambre d'hôtes.","architecture":"Rosey, Le Château de Rosey  a été construit à la fin du XVIIIe siècle. Vers 1767 commencèrent les travaux. Il est de style Louis XVI et bâti sur le modèle classique de Versailles avec deux étages nobles et un demi-étage. Il fut édifié sur l'emplacement d'une place forte datant du XVIe siècle, c'est un bâtiment de plan rectangulaire, un avant-corps d'une seule travée forme une légère avancée au centre de la façade nord,  il comprend, au rez-de-chaussée, une porte en plein cintre entre deux pilastres toscans se détachant sur un encadrement rectangulaire, au premier étage, une porte-fenêtre donnant sur un balcon sur consoles à appui-corps en fer forgé que surmonte une frise de grecques et, au second étage, un oculus ovale. Prolongeant de part et d'autres des baies la ligne verticale des pilastres, des tables fouillées montent du balcon à la corniche, qui supporte un fronton cintré décoré d'un cartouche ovale entouré de motifs végétaux.\r\nLe château est précédé au nord d'une cour encadrée de communs, qu'une porte cochère sans couronnements sépare d'une longue allée d'arbres. Un jardin inspiré des jardins à la française l'entoure au sud et à l'est.","habitants":"Antoine Clerguet\r\n        \"","divers":"Château de Rosey","gps":"","images":["../image/image_71/71_Rosey_1.jpg","../image/image_71/71_Rosey_2.jpg","../image/image_71/71_Rosey_3.jpg","../image/image_71/71_Rosey_4.jpg","../image/image_71/71_Rosey_5.jpg","../image/image_71/71_Rosey_6.jpg"]},"Consult_chateau_formulaire1520":{"id":"Consult_chateau_formulaire1520","dept":"71","canton":"Lucenay-L`Evêque","commune":"Roussillon-en-Morvan","nom":"Roussillon_Morvan","type":"Château","periode":"XVIII","histoire":"ROUSSILLON, la commune de Roussillon en Morvan  tient son nom de celui de ses seigneurs qui s'y établirent à la fin du XVe siècle après l'abandon d'une première résidence, située sur la commune d'Anost, encore indiquée a Lucenay-l'Evêque, sous le nom de \"Vieux château, vestiges du château de Roussillon\". Avant ce transfert, le village portait le nom de Blain. Ce nom persiste encore dans celui du hameau de Blain-le-Vieil. Quant au nom même de Roussillon, il est fort possible qu'il ait un lien avec le Roussillon, au pied des Pyrénées, car aux VIIIe et IXe siècles, les comtes d'Autun eurent des liens étroits, matrimoniaux et patrimoniaux avec le Languedoc. Thierry, comte d'Autun en 755, eut un fils, Guillaume au-Court-Nez, qui devint duc de Toulouse et marquis de Septimanie. L'un de ses fils ou petit-fils, Bernard de Septimanie, fut comte de Roussillon. Jusqu'à la fin du IXe siècle, plusieurs de leurs descendants portèrent simultanément des titres en Bourgogne et dans le Roussillon. Au XIIe siècle à la noble maison de Chinon dont-un membre porte le nom Girard de Roussillon, Hugues de Tenan,  en 1240 seigneur de Cussy,  puis à Guillaume de Cruix puis à nouveau Eudes de Roussillon comte de Nevers,   en 1298 Odon de Roussillon qui fera passer par alliance de sa fille Isabelle à Jean II de Chaugy dont cette famille gardera le nom jusqu'en 1772 à la mort du dernier de ce nom Nicolas  Etienne de Chaugny qui céda tous ces biens au comte Philippe-Louis de Châtellux.","architecture":"Roussillon,  château médiévale avec deux tours quadrangulaires de tailles différentes. En 1473, l'un des descendants des Armagnacs, Michel de Chaulgy, ou Chaugy, conseiller et chambellan du duc de Bourgogne, se fit construire un « vaste château flanqué de cinq grosses tours ». Vendu comme bien national, il fut démoli à la Révolution. Il ne reste que quelques ruines d'une tour comprise dans la construction de la ferme voisine,  et d'autres ruines éparses dans les taillis avoisinants. Une riche demeure lui succéda, dont il ne reste que l'orangerie, au lieu-dit « Le Château ». Il était situé entre le bourg de Roussillon et le hameau de Chézet.   Démolition du château et violation des sépultures de l'église, le corps de Nicolas-Etienne de Chaugy fut jeté à la voirie et son cercueil de plomb servit à faire des balles. Le manoir du Monceau ou de Roussillon, fut vendu le 13 mai 1794 et démoli en 1800, par Chassey qui en dispersa les matériaux. Il n'en reste plus au XIXe siècle que l'orangerie et les remises qui était d'une élégance quasi royale, nous dit l'Abbé Jacques-François Baudiau.  C'est aujourd'hui une construction à usage de colonie de vacances.","habitants":"Famille d'Odon de Roussillon\r\n        \"","divers":"Château de Rossillon","gps":"","images":["../image/image_71/71_Roussillon_Morvan_1.jpg","../image/image_71/71_Roussillon_Morvan_2.jpg"]},"Consult_chateau_formulaire1f47":{"id":"Consult_chateau_formulaire1f47","dept":"71","canton":"Mâcon","commune":"Davayé","nom":"Rozan_Davaye","type":"Château","periode":"XVI","histoire":"ROZAN, au  XIVe siècle, le château est le centre de la châtellenie royale de Davayé qui regroupe les paroisses de Charnay, Saint-Léger et Vergisson, en 1522 , la châtellenie est engagée à Hector de Primbois, seigneur d'Escole,  un nouvel engagement en 1547 met le château entre les mains de Jean de Mouton,  la terre en 1555  entre dans le domaine royal,  le bien est adjugé en  1595 à Jean Chandon, premier président à la cour des aides de Paris, qui en 1642  Jean de Macet acquiert la propriété des créanciers du dernier des Chandon, Hugues, chanoine de Mâcon, qui avait entrepris la reconstruction du château qui sera achevée par les Macet,  c'est en  1713  que Jean de Macet  vend le domaine à Pierre Desvignes, maire de Mâcon. \r\nPuis en 1880  fin de la possession du château par les descendants de Pierre Desvignes, auxquels on doit la façade sud, le grand escalier et le décor intérieur, en particulier les boiseries du salon.","architecture":"Rozan,  un long bâtiment rectangulaire et une petite tour circulaire, le château est de plan rectangulaire formé de quatre corps principaux et cantonné de tours carrées dont deux sur la façade nord, appuyée au coteau, sont plus trapues et coiffées de toits moins aigus que celles qui flanquent la façade sud, remanié au XVIIIe siècle de façon à composer un ensemble comprenant un corps central, couronné d'un fronton, entre deux pavillons. Les bâtiments s'ordonnent autour d'une cour centrale qu'un passage voûté d'arêtes relié au tinailler. L' aile sud renferme un escalier à vis du XVe siècle, une pierre portant la date de 1630 et un cadran solaire celle de 1753.","habitants":"Famille de Jean Chandon\r\n        \"","divers":"Château de Rozan","gps":"","images":["../image/image_71/71_Rozan_Davaye_1.jpg","../image/image_71/71_Rozan_Davaye_2.jpg","../image/image_71/71_Rozan_Davaye_3.jpg","../image/image_71/71_Rozan_Davaye_4.jpg","../image/image_71/71_Rozan_Davaye_5.jpg"]},"Consult_chateau_formulaire6cf0-2":{"id":"Consult_chateau_formulaire6cf0-2","dept":"71","canton":"Sennecey-le-Grand","commune":"Sennecey-le-Grand","nom":"Ruffey","type":"Château","periode":"XIII-XV","histoire":"RUFFEY, vraisemblablement bâti dès le XIIIe siècle par la famille de Brancion à l'emplacement d'un ancien poste romain, le château après être passé entre les mains de la famille de Nanton et à la famille d'Essertenne, Agnès d'Essertenne le passa à son frère  Claude de Lugny, ce dernier n'ayant pas de descendance le passa à Jean de Beaufremont   qui le passa ensuite à la famille de La Chambre qui le vendit à la fin du XVIe siècle aux Bauffremont de Sennecey.\r\nEn 1714, le fief de Ruffey fut détaché de la baronnie de Sennecey pour le duc de Lauzun époux de la Grande Demoiselle, qui le laissa a Charles-Armand de Gontaut-Biron pair et premier maréchal de France. Vendu en l'an VI à monsieur Jacquemot sa veuve madame de Danneville le cèda à monsieur Cellier qu'héritèrent ses deux filles, il fut partiellement détruit vers 1825 puis laissé à l'abandon jusqu'à sa restauration par JB.Virey à partir de 1875. Après être passé en diverses mains, le château a été vendu à une oeuvre de bienfaisance  qui en fit un centre de vacances pour jeunes handicapés. Les propriétaires actuels l'ont achetés à cette association en 2007.                                                                       Dans la commune ruines féodales anciens châteaux fort ou est installé la mairie  reste médiévaux du château de la Tour et  de la Tour de Vers du XVIIIe siècle.","architecture":"Ruffey,  édifié au XIe siècle grand château en forme de U, fut en partie rasé début XIXe siècle a conservé deux  grosses tours rondes en angle du Xe siècle, dite romane accolé à un corps de logis rectangulaire, tour carrée à l'opposé dépendances en forme de U également avec mini-tour carrée sur l'arrière, le château primitif était de plan  rectangulaire, cantonné de tours circulaires.                              Au XVe siècle, il avait été renforcé de deux grosses tours flanquant la porte d'entrée, qui ne disparurent qu'au début du XIXe siècle. Les travaux du XVIe siècle, quant à eux, portèrent essentiellement sur le percement de hautes fenêtres et la transformation de la disposition et du décor du grand corps de logis appuyé contre la courtine nord. Ils furent complétés par l'aménagement, après comblement des fossés, d'une vaste enceinte cernée de courtines crénelées, cantonnée de bastions et environnée de douves d'eau vive, qui englobait l'ancienne basse cour où était située la chapelle et était précédée au nord d'un pont de pierre aboutissant à un corps de logis flanqué de pavillons à toits aigus que couronnaient des statues de Jupiter, Vénus et Junon. Les façades étaient couvertes de sculptures. Tout a disparu à l'exception des quatre pavillons d'angle, des bases des murailles, d'une partie des douves, de deux ponts de pierre et des communs, seuls les créneaux des courtines sont démantelés  à la Révolution.","habitants":"Famille de Nanton\r\n        \"","divers":"Château de Ruffey","gps":"","images":["../image/image_71/71_Ruffey_1.jpg","../image/image_71/71_Ruffey_2.jpg","../image/image_71/71_Ruffey_3.jpg","../image/image_71/71_Ruffey_4.jpg","../image/image_71/71_Ruffey_5.jpg","../image/image_71/71_Ruffey_6.jpg"]},"Consult_chateau_formulaire7842":{"id":"Consult_chateau_formulaire7842","dept":"71","canton":"Chagny","commune":"Rully","nom":"Rully","type":"Château","periode":"XVI","histoire":"RULLY, cité en 853 par Constantin faisait don à l'abbaye de  Saint-Benigne de Dijon, puis en  920  Rully fait partie des domaines de la puissante maison de Vergy. A la mort du dernier  de cette famille donation au Rully, le château appartient en 1194  à Hugues de Rully, celui-ci fait bâtir le donjon, tour carrée. En l'absence d'héritier  dans la famille de Rully, le château passe aux Saint-Ligier avec la mariage d' Isabelle de Rully et Robert de Saint-Ligier bailli de Mâcon et conseiller du duc de Bourgogne Philippe II le Bon. \r\nAu XVe siècle la famille de Saint-Ligier rend le château habitable en y réalisant des aménagements intérieurs et en 1578 le château passe aux Tintry et en 1619,  par héritage, le château échoit à la famille de Bernard Montessus, dont les descendants en furent propriétaires. \r\nA la Révolution, la marquise de Rully veuve de Charles François,  mort en 1776 un certificat de la commune de Rully, à propos de la marquise de Montessus, détenue quelque temps à la prison de Chalon, atteste que les malheureux ont toujours trouvé en elle une mère, l'opprimé un soutien, elle fit donation du domaine à son petit fils Patrice Gabriel de Montessus comte qui rentra d'émigration en 1815. Au XXe siècle le château passe par alliance de Edith de Montessus à Jacques  d'Aviau de Ternay, devient la propriété du comte Raoul d'Aviau de Ternay, qui le possède toujours.                              bLe château de St-Michel viticole du XIXe siècle, aujourd'hui propriété du comte et de la comtesse de Ternay, et château d'Agneux.","architecture":"Rully  à l'origine une maison forte transformé en  forteresse médiévale édifiée à partir du donjon carré du XIIIe-XIVe siècle, et de trois tours rondes d'angles,  Au XIVe siècle construction du château actuel. le château présente une intéressante architecture  militaire, fossés, pont- levis, chemin de ronde, créneaux, mâchicoulis et archères. Les corps de logis sont du début de la Renaissance. La cuisine voûtée du donjon possède une cheminée monumentale et une importante batterie de cuisine. Les communs du XVIIIe siècle ont la plus grande toiture de pierres en Bourgogne. Planté au coeur d'un domaine viticole.","habitants":"Famille de Hugues de Rully et de Saint-Ligier\r\n        \"","divers":"Château de Rully  et de Saint-Michel","gps":"","images":["../image/image_71/71_Rully_1.jpg","../image/image_71/71_Rully_2.jpg","../image/image_71/71_Rully_3.jpg","../image/image_71/71_Rully_4.jpg","../image/image_71/71_Rully_5.jpg","../image/image_71/71_Rully_6.jpg","../image/image_71/71_Rully_7.jpg","../image/image_71/71_Rully_8.jpg","../image/image_71/71_Rully_9.jpg"]},"Consult_chateau_formulaire78bb":{"id":"Consult_chateau_formulaire78bb","dept":"71","canton":"St-Gengoux-le-National","commune":"Sailly","nom":"Sailly","type":"Château","periode":"X","histoire":"SAILLY, en 1846, il succède à la demeure seigneuriale des Sailly, famille connue depuis le Xe siècle, Le village a donné son nom à une famille de Sailly, dont Jocerand cité en 1203, puis Odet cité en 1315 et 1334 comme seigneur du Vaux de Chizeul.","architecture":"SAILLY,  placé au sommet d'une petite éminence dans un parc arboré, le château de Sailly est une construction composite, rehaussé, agrandi et très remanié dans un style italien, en 1846 et se compose d'un rez-de-chaussée surélevé accessible par un perron et d'un pavillon de deux travées sur la droite du corps principal. La façade très sobre comprend de simples bandeaux et moulures décoratives.","habitants":"Famille de Sailly\r\n        \"","divers":"Château de Sailly","gps":"","images":["../image/image_71/71_Sailly_1.jpg","../image/image_71/71_Sailly_2.jpg","../image/image_71/71_Sailly_3.jpg"]},"Consult_chateau_formulaire5a58":{"id":"Consult_chateau_formulaire5a58","dept":"71","canton":"Lugny","commune":"La Salle","nom":"Salle_Senozan","type":"Château","periode":"XII-XVII","histoire":"La SALLE, le château de La Salle a été édifié au XIIe siècle pour surveiller un péage établi sur la Saône à hauteur du confluent de la Mouge. Le fief a connu divers propriétaires, tels que Girard de Vers qui partageait le péage avec Catherine de La Salle. Puis à la famille de St-Point au début du XVe siècle.      Dans la première moitié du XVIIe siècle, Melchior Mitte de Miolans, seigneur de Chevrières, marquis de Saint-Chamond, lieutenant général  des armées du roi et époux d'Isabeau de Tournon, devient propriétaire du domaine. Henry Mitte de Chevrières, marquis de St Chamond, fils de Melchior, vend le domaine vers 1659, à Pierre Perrachon, seigneur de Senozan  qui parvient à réunir les éléments dispersés de la seigneurie, puis par mariage, le bien passe en 1675 à Gabriel de Briord, futur ambassadeur de France en Hollande. Gabriel de Briord a réussi à obtenir en 1691, l'union de la baronnie de Sennozan à La Salle, et ce statut est resté jusqu'à la fin de l'ancien régime.  A la Salle un autre  château  fut construit en 1870 par larchitecte lyonnais Tranchet,  le propriétaire-Joseph de Talleyrand Périgord, frère du diplomate bien connu voulait en faire don à sa fille et à son gendre Edmond de la Chesnais installés à Marseille, mais qui venaient passer leurs vacances à La Salle.                                    Dans la commune un donjon du XIIe siècle.","architecture":"La Salle, au Moyen-Age, il existait sur la Sâone un péage situé au confluent de la Mouge. Aux XIe siècle et XIIe siècle, un château féodal est érigé. Cest une forteresse importante, ses murs sont en pierre de taille dun mètre cinquante dépaisseur, chargée de défendre la ville de Mâcon au nord et de surveiller le péage sur la Sâone, de cette  forteresse médiévale du XIIe siècle tombé en ruine, il ne subsiste quune tour quadrangulaire assez remarquable, elle est percée à lest de quelques fenêtres à meneaux et était bordée de mâchicoulis de bois au sommet, ainsi quune chapelle gothique du XIIe siècle insérée dans les bâtiments agricoles jouxtant la tour. Le reste de lancien château a été détruit lors de la Révolution de 1789. Ces deux vestiges ont été classés monuments historiques en 1988;                                                     Du château moderne construit  au milieu du siècle dernier s'élève à l'ouest dans le parc ombragé transformé en auberge.","habitants":"Famille  de La Salle\r\n        \"","divers":"Château de Senozan et vestiges à la Salle","gps":"","images":["../image/image_71/71_Salle_Senozan_1.jpg","../image/image_71/71_Salle_Senozan_2.jpg","../image/image_71/71_Salle_Senozan_3.jpg","../image/image_71/71_Salle_Senozan_4.jpg","../image/image_71/71_Salle_Senozan_5.jpg","../image/image_71/71_Salle_Senozan_6.jpg","../image/image_71/71_Salle_Senozan_7.jpg","../image/image_71/71_Salle_Senozan_8.jpg","../image/image_71/71_Salle_Senozan_9.jpg"]},"Consult_chateau_formulaire43dd":{"id":"Consult_chateau_formulaire43dd","dept":"71","canton":"Mâcon","commune":"Hurigny","nom":"Salornay","type":"Forteresse","periode":"XII-XV","histoire":"SALORNAY, la famille de Salornay, cité pour la première fois en 1291, a possédé le château jusqu'en 1614.  En 1471, Philibert de Salornay, considérant la forteresse comme inapte à résister aux armées royales, l'abandonna à celles-ci, qui la détruisirent en partie, et prêta son artillerie et ses hommes de guet à la ville de Mâcon. Elle fut ensuite remise en état. La dernière des Salornay, Georgette, veuve de Guy de Faultrières, vendit le fief à Claude Botton.\r\nPuis il passa par succession en 1652 à Pierre Chesnard qui loua la terre et le château, que cernaient des fossés remplies d'eau, à des fermiers, les Chesnard conservèrent Salornay jusqu'à sa vente, en 1760, à François-Charles Albert de la Bletonnière, seigneur d'Igé, qui aménagea les appartements, modifia les ouvertures, bâtit un vaste tinailler sur caves en 1801, à l'emplacement du fossé sud. Sa petite fille, Catherine Regnault de Parcieux marié à Guillaume-Gustave de Morangiés, vendit le château vers 1838 à un Lyonnais.","architecture":"Salornay,  représente une masse formidable avec deux corps de bâtiments en fausse équerre  qui occupent trois côtés d'un quadrilatère irrégulier ouvert au sud, flanqués de plusieurs tours rondes et carrées. A l'est un énorme donjon crénelé et au sud une pointe fortifiée dans laquelle s'ouvrait le pont-levis, a l'angle sud-est, se trouve une tour carrée, desservie par une tourelle d'escalier circulaire, au rez-de-chaussée de laquelle s'ouvre un passage voûté précédé d'un pont de pierre à deux arches qui a remplacé le pont-levis, encore cité en 1644, reliant le château à la basse-cour. À l'angle nord-ouest, s'élève une haute tour carrée, à la base taluté, qu'éclairent des baies très étroites. Un beau pavillon  du XVIIIe siècle plantée à l'orée d'un immense parc fut construit pour remplacer un vieux manoir par Philippe de Lamartine ancien capitaine du régiment d'Orléans ancêtre du poète.","habitants":"Famille de Salornay\r\n        \"","divers":"Château de Salornay","gps":"","images":["../image/image_71/71_Salornay_1.jpg","../image/image_71/71_Salornay_2.jpg","../image/image_71/71_Salornay_3.jpg","../image/image_71/71_Salornay_4.jpg","../image/image_71/71_Salornay_5.jpg"]},"Consult_chateau_formulaireca7e":{"id":"Consult_chateau_formulaireca7e","dept":"71","canton":"Buxy","commune":"Sassangy","nom":"Sassangy","type":"Château","periode":"XVIII","histoire":"SASSANGY, cité en 1218 le château est mentionné en 1473 car il appartenait aux Messey et aux Saulx. La famille de Messey a réunit les différents éléments de Sassangy et en particulier une tour proche de l'église et les ont transmis par alliance de Catherine de Messey à Jean III de Damas de Marcilly en 1584. Ceux-ci conservèrent Sassangy jusqu'à la fin de l'Ancien Régime. Antoine-François Damas a fait bâtir un nouveau château vers 1740, qui est resté dans la famille jusqu'en 1792. le dernier de la lignée un cousin vend le  domaine et au début du XIXe siècle par la famille de La Roche Nully La Carelle qui l'a conservé jusqu'à la fin du siècle. Il est passé ensuite dans la famille de Fleurieu. En 1923, le château est vendu à Jean Louis Bonnot géomètre à Chalon, qui fait abattre en 1925-1926 les pavillons latéraux pour y monter une tour à l'est. M.  Albert Bourgeon en hérité en 1960. Aujourd'hui transformé en hôtel restaurant par la famille Marceau.","architecture":"Sassangy, le château, de plan rectangulaire, est élevé sur le bord d'une terrasse naturelle qui en constitue le soubassement.\r\nAu centre de la façade sud, se détache en légère avancée un avant-corps de trois travées surmonté d'un fronton triangulaire à oculus, couronné d'un clocheton. La façade nord présente la même disposition. De part et d'autre du corps central, des bandeaux règnent avec les appuis des fenêtres. A l'origine, le bâtiment était flanqué de deux pavillons, dans le même alignement,  et qui furent détruit entre 1925 et 1926. Contre le pignon Est, fut alors édifié une petite tour carrée à toit très aigu. Le château est relié au parc, en presque totalité transformé en pâtures, par un escalier en fer à cheval à deux doubles volées, dont le palier est porté par une voûte d'arête retombant sur des piles carrées et des colonnes.","habitants":"Famille de Messey  et de Damas\r\n        \"","divers":"Château de Sassangy","gps":"","images":["../image/image_71/71_Sassangy_1.jpg","../image/image_71/71_Sassangy_2.jpg","../image/image_71/71_Sassangy_3.jpg","../image/image_71/71_Sassangy_4.jpg"]},"Consult_chateau_formulairefbb0":{"id":"Consult_chateau_formulairefbb0","dept":"71","canton":"Chalon-sur-Saône","commune":"Sassenay","nom":"Sassenay","type":"Château","periode":"XII-XVII","histoire":"SASSENAY, le premier seigneur connu en est Girard de Rion qui tenait le château à la fin du XIIe siècle. Sa fille Béatrix, épousa vers 1193 le second fils du duc Hugues III, Alexandre, dont est issue la famille de Bourgogne Montaigu.\r\nSassenay passa à Guillaume puis à Odard de Montaigu qui se fit confirmer la possession de la maison forte par le duc Eudes IV en 1326. Son fils Henry étant mort en 1347 sans héritier, la terre de Sassenay revint à sa  soeur Isabelle, femme de Robert Damas de Marcilly. A la mort de celui-ci, en 1365, Sassenay fut partagé entre\r\nses fils Hugues et Philibert, puis échappa définitivement à la famille de Damas dès le milieu du XVe siècle. Un  siècle plus tard le titulaire en était François de Montmorency. En 1540 il vendit le fief à Denis de Pontoux qui en fit don, en 1570, à sa fille Anne lors de son mariage avec Bénigne Tisserand. Par héritage, il parvint ensuite  aux mains d'Edme Régnier de Montmoyen sur la succession duquel il fut confisqué et vendu en 1656 à Bernard, président au parlement. Les Bernard firent ériger la terre en marquisat et rebâtirent le château, depuis longtemps laissé à l'abandon, qu'ils conservèrent jusqu'en 1840, bien qu'il ait été pillé, dépouillé de ses grilles durant l'émigration en Amérique d'Henri Bernard.                                                                                                     Dans la commune vestiges féodal, un ancien château du XII-XVIIe siècle fonction mairie école.","architecture":"Sassenay,  la construction est précédée au sud d'une terrasse en terre-plein bordée d'un garde-corps dont les contours, de part et d'autre d'une rampe d'accès centrale en pente douce, dessinent un pan concave entre deux angles droits.\r\nLe château est formé d'un corps central de plan rectangulaire, flanqué de deux ailes en légère avancée sur chacune de ses façades, la saillie étant nettement plus prononcée au sud qu'au nord. Le toit de tuiles du corps central, à deux versants, s'appuie à ses deux extrémités sur les toits à croupes des ailes. L'ensemble comprend un rez-de-chaussée et un étage percé de grandes baies rectangulaires et un étage de combles éclairé par des ils-de-buf et, sur les façades latérales, des lucarnes à ailerons couronnées de frontons.","habitants":"Famille de Damas\r\n        \"","divers":"Château de Sassenay","gps":"","images":["../image/image_71/71_Sassenay_1.jpg","../image/image_71/71_Sassenay_2.jpg"]},"Consult_chateau_formulaire13c3-2":{"id":"Consult_chateau_formulaire13c3-2","dept":"71","canton":"Toulon-sur-Arroux","commune":"Ciry-le-Noble","nom":"Sauvement","type":"Château","periode":"XVI","histoire":"SAUVEMENT, cité  au XIIIe siècle  le château primitif est le chef-lieu de l'une des principales châtellenies du Charolais, ce château est rasé au  XVe siècle sur ordre de Louis XI. Le logis, transformé au XVIe siècle par Palamède Gonthier, secrétaire de François Ier, prend le nom de château Gonthier.  Aux descendants du précédent, succède en 1676 Antoine-Bernard Gagne, président au parlement de Dijon, et en 1766 Jeanne-Claude-Bernardine Gagne de Perrigny, petite-fille d'Antoine-Bernard, apporte le bien en dot à Louis-Barnabé de Beaudéan de Parabère qui ne le conservera que peu de temps. Pendant la Révolution, la famille Carré vend la propriété à un sieur Sauvage. et par  héritages successifs, le château passe à la famille Regnauld de Bellescize, puis aux familles Salmon de Loiray et Arminjon, qui en sont toujours propriétaires au XXIe siècle.                                                                                             Dans la commune le château de Limand.","architecture":"Sauvement,  la démolition du château primitif laissa une chapelle, visible sur des plans du XVIIIe siècle, et quelques pans de murs dont un est encore en place.\r\nLa construction actuelle résulte de l'aménagement, au XVIe siècle, du logis des gens d'armes du château situé sur une butte voisine.\r\nDes logis de différentes hauteurs sous des toits de tuiles plates à deux versants, entourent sur trois côtés une cour intérieure. Au centre du quatrième côté, s'élève une haute tour-porche percée au rez-de-chaussée d'une porte charretière et d'une porte piétonne en plein cintre, que surmontent les fentes des balanciers d'un pont-levis et d'une passerelle et, au-dessus de celle-ci, deux échauguettes sur consoles. Des bandeaux en bossage  règnent entre les niveaux, des pilastres en bossage rustique  un sur deux en encadrent la façade et séparent les portes du rez-de-chaussée.\r\nDeux petites tours rondes aux  angles extérieurs de l'aile nord, une troisième tour circulaire, qui défendait l'angle sud-est, a disparu à la fin du XIXe siècle, une grosse tour carrée à base talutée occupe l'angle sud-ouest du quadrilatère. Pourvue au nord d'une échauguette percée d'une archère-canonnière, elle est accostée vers la cour d'une tour d'escalier à sept pans coiffée d'une flèche torse, elle-même accostée d'une tourelle en surplomb sur culot conique mouluré. Tour et tourelle sont percées de baies à linteaux en accolade. Les fossés qui entouraient le château au nord et à l'est ont été comblés. Au sud, une terrasse est flanquée d'un pigeonnier carré que borde une charmille taillée en arcade.","habitants":"Famille de  Palamède Gonthier\r\n        \"","divers":"Château de Sauvement","gps":"","images":["../image/image_71/71_Sauvement_1.jpg","../image/image_71/71_Sauvement_2.jpg","../image/image_71/71_Sauvement_3.jpg","../image/image_71/71_Sauvement_4.jpg"]},"Consult_chateau_formulaireea8b":{"id":"Consult_chateau_formulaireea8b","dept":"71","canton":"Buxy","commune":"Savianges","nom":"Savianges","type":"Château","periode":"XV","histoire":"SAVIANGES, en 1363  la maison forte est tenue par Hugues de Lespinasse. En 1374  le fief passe à Girard de Damas, époux de Catherine de Lespinasse. En 1618  le château échoit à Élisabeth de Damas, mariée à Charles de Senailly.  En 1664 la propriété est léguée à Jean-Nicolas de Fuligny-Damas dont la femme le cède à Claude de Thyard, après que celui-ci a tenté pendant deux ans d'obtenir un rabais en raison du mauvais état du château.\r\n An XI de la République (1804). Les Thyard conservent le domaine jusqu'à sa vente à Antoine Delavaivre et Antoine Dulac, puis la propriété passe à  MM Jean Pirou, François Anthouard et Geneviève Wagner.","architecture":"Savianges,  la structure générale du château pourrait remonter au XIIIe siècle. L'ensemble des bâtiments a été remanié à maintes reprises, notamment au XVIe siècle et au XIXe siècle. Précédé d'une basse-cour, en partie transformé en terrasse, le côté sud  et une partie du côté ouest  sont occupés par des communs, le château est formé d'un  ensemble de bâtiments entourant sur trois côtés une petite cour rectangulaire. Cette cour était autrefois séparée de la basse cour par un mur percé d'une porte flanquée d'une tour carrée, encore en place. Une tour d'escalier circulaire dessert les galeries sur portique à arcades en plein cintre, de même type que celles des maisons vigneronnes de la région, qui s'appuient sur les façades des trois corps de logis. Une tour circulaire flanqué sur la muraille extérieure est, dont le tracé arrondi reprend celui, entouré de fossés, de la motte primitive.","habitants":"Famille de Damas\r\n        \"","divers":"Château de Savianges","gps":"","images":["../image/image_71/71_Savianges_1.jpg","../image/image_71/71_Savianges_2.jpg","../image/image_71/71_Savianges_3.jpg","../image/image_71/71_Savianges_4.jpg"]},"Consult_chateau_formulaire64f0":{"id":"Consult_chateau_formulaire64f0","dept":"71","canton":"Autun","commune":"Curgy","nom":"Savigny_le_Vieux","type":"Château","periode":"XVI","histoire":"SAVIGNY le Vieux, château, le donjon du XIVe siècle ayant appartenu à la famille de Drée dès 1350 puis au puissant seigneur Jean du Roussay, chambellan du roi Charles VI, à ses frères Louis d'Orléans et de Louis de Guyenne, grand maître d'hôtel de la reine Isabeau de Bavière et conseiller du duc de Bourgogne Jean Sans Peur. Il construit le château du Roussay à Clomot et fut seigneur de Savigny le Vieux. Puni pour crime de félonie le duc de Bourgogne lui confisqua la terre du Roussay. Jean du Roussay offrit en 1410 la seigneurie de Savigny le Vieux (250 ha de terres) au chapitre d'Autun qui resta propriétaire jusqu'en 1791 où la seigneurie fut vendue en bien national. \"Le Bréviaire d'Armangnac\" a appartenu à Jean du Roussay, il est représenté agenouillé devant St-Jean l'Evangéliste et une autre représentation de lui et de son épouse Jeanne de Chepoy agenouillé devant St-Saturnin, Jean du Roussay et son épouse Jeanne de Chepoy offrirent également un magnifique reliquaire à St-Jacques de Compostelle datant d'avant 1418. Ce reliquaire en argent représentant Saint Jacques fait parti du trésor de la cathédrale de Saint-Jacques de Compostelle. Une reproduction de cette statue vous sera présentée au cours de la visite. Le château \"Donjon\" est actuellement une propriété privée qui appartient au consul de Malte, de Strasbourg et du Grand-Est, Eric Mayer-Schaller.","architecture":"SAVIGNY le vieux; château, donjon du XIVe siècle à toit pointu","habitants":"Famille de Drée\r\n        \"","divers":"Château de Savigny le Vieux","gps":"","images":["../image/image_71/71_Savigny_le_Vieux_1.jpg"]},"Consult_chateau_formulaireaae7":{"id":"Consult_chateau_formulaireaae7","dept":"71","canton":"St-Gengoux-le-National","commune":"Savigny-les-Grosne","nom":"Savigny_sur_Grosne","type":"Château","periode":"XIV","histoire":"SAVIGNY sur GROSNE,  reste les ruines féodales, le château est mentionné en 1560 lors de reprise du fief par Antoine de Colombier. En 1669, il est devenu la propriété de Michel Le Tellier, fils du ministre Louvois, le domaine lui ayant été apporté par son épouse, Anne de Souvré. Magdeleine Charlotte le Tellier de Louvois soeur de Michel Le Tellier, apporte en 1679 en dot le domaine à François de la Rochefoucauld, c'est sa fille Émilie de la Rochefoucauld, qui apporte en 1725 en dot le domaine à Charles-Emmanuel de Crussol, duc d'Uzès. La propriété échoit en 1755 à Charlotte-Émilie de Crussol d'Uzès, fille des propriétaires. Elle épouse en 1758 Louis Marie Bretagne de Rohan Chabot, duc de Rohan. \r\nCette succession de propriétaires prestigieux, qui ont fait gérer leur terre sans jamais y résider, finit par devenir néfaste au château, laissé à l'abandon.  Au XIXe, il a été morcelé entre plusieurs propriétaires qui ont aménagés des logements, des granges et des remises.","architecture":"Savigny sur Grosne, le château a vraisemblablement été bâti au XIIIe siècle, puis remanié au XVIe siècle. Sa structure générale est encore visible dans les pans de murs et bases de tours qui subsistent, il s'agit d'un grand quadrilatère cantonné de grosses tours rondes. Il semble que l'entrée, précédée d'un fossé, était située au nord, entre deux gros pavillons, de plan presque carré, appuyés à la courtine. Le pavillon situé à l'ouest de cette entrée est percé de grandes fenêtres à meneau et croisillon et flanqué, dans l'angle qu'il forme avec la courtine, d'une petite tour rectangulaire renfermant un escalier à vis auquel on accède par une porte dont le linteau, orné d'un arc trilobé, porte des traces d'un écusson peint. Un escalier à plafond peint, encore cité au début du XXe siècle, semble avoir disparu dans l'effondrement des planchers intérieurs du pavillon.","habitants":"Famille d'Antoine de Colombie\r\n        \"","divers":"Château de Savigny sur Grosne","gps":"","images":["../image/image_71/71_Savigny_sur_Grosne_1.jpg","../image/image_71/71_Savigny_sur_Grosne_2.jpg","../image/image_71/71_Savigny_sur_Grosne_3.jpg","../image/image_71/71_Savigny_sur_Grosne_4.jpg","../image/image_71/71_Savigny_sur_Grosne_5.jpg"]},"Consult_chateau_formulaireb199":{"id":"Consult_chateau_formulaireb199","dept":"71","canton":"Paray-le-Monial","commune":"St-Yan","nom":"Selore_St_Yan","type":"Château","periode":"XVII","histoire":"SELORE à St-Yan, le fief  en 1563 appartient à Guillame Baudinot,\r\non le retrouve en 1642  entre les mains d'Isaac Baudinot.  Palamède Baudinot, conseiller au Parlement de Dijon, y fonde en 1675 une chapelle dédiée à Saint Maurice, il est peut-être également le constructeur du château,  Marie Lenet, veuve du précédent, fait en 1702  don de la propriété à Henri Lenet, abbé commendataire de Notre-Dame de Châtillon-sur-Seine. L'abbé lègue en 1711 l'ensemble à son neveu, Louis-Bernard Duprat et en 1713  à sa mort, le précédent laisse le château à Antoine Lenet.  Antoine-Ignace Lenet vend en 1754 à Philibert Verchère, conseiller au Parlement de Dijon, puis en 1777  Gabrielle Le Cocq, veuve de Philibert, cède le domaine et le château entièrement meublé à Joseph de Monteynard,  comte titulaire de Diois par ancienne substitution, marquis de Montfrin en Languedoc, comte de Souternon en Forez, baron de La Pierre en Dauphiné, seigneur de Meynes, de Théziers, de Saint-Germain, de Nolieu, de Saint-Julien et autres lieux, conseiller du roi, grand sénéchal de Beaucaire et de Nîmes. A l'époque révolutionnaire  Henri-Juste-François de Monteynard, est propriétaire.                                                                                 Aujourd'hui le château, propriété privée, appartient au baron Pfetten-Iseux.","architecture":"Selore, la construction comprend un corps central de plan rectangulaire sous un haut toit à croupes, flanqué à ses deux extrémités d'étroites ailes en légère avancée sur ses deux façades. La travée centrale de chacune des façades principales est percée, au rez-de-chaussée, d'une petite porte carrée entre deux pilastres en bossage en table et couronnée d'un fronton cintré. Celui du nord est interrompu par le cadran d'une horloge, tandis que celui du sud, plus volumineux, encadre des armoiries. Des bandeaux plats règnent avec les appuis des fenêtres. Le château est précédé au nord d'une cour close par un mur crénelé, interrompu par une porte cochère sans couronnement dont les piliers en bossages arrondis sont surmontés de boules d'amortissement.\r\nAu sud, une vaste terrasse, portée par un mur de soutènement, sépare la demeure d'un petit ruisseau.\r\nRépartis de part et d'autre du château, des communs et un pigeonnier circulaire complète l'ensemble.\r\nUn château ancien aurait été détruit pendant les guerres de Religion. L'édifice est construite ou embelli au XVIIe siècle. Il comprend un corps central rectangulaire, flanqué à ses extrémités d'ailes étroites en légère avancée sur ses deux façades. La travée centrale de chaque façade est  percée d'une porte flanquée de deux pilastres et couronnée d'un fronton cintré.","habitants":"Famille de Guillame Baudinot\r\n        \"","divers":"Château de Selore","gps":"","images":["../image/image_71/71_Selore_St_Yan_1.jpg"]},"Consult_chateau_formulairef5aa":{"id":"Consult_chateau_formulairef5aa","dept":"71","canton":"Semur-en-Brionnais","commune":"Semur-en-Brionnais","nom":"Semur_Brionnais","type":"Forteresse","periode":"XIII","histoire":"SEMUR,  dans ce château est né Saint-Hugues rénovateur de l'abbaye de Cluny.  Joceran de Chamelet, seigneur de Semur, fait bâtir un donjon; le château dépend sur le plan religieux de la paroisse de Saint-Martin-la-Vallée. Geoffroy Ier, son fils  seigneur de Semur (950-1015). Dalmace Ier, baron de Semur, passe aux  Châteauvillain. Jean Ier, petit-fils de Simon Ier, et époux de Jeanne de Semur, fille de Simon II, reçoit en 1262  la baronnie de Semur de sa cousine Héloïse de Semur, fille d'Henri, qui précède la Maison d'Albon, Jeanne de Châteauvillain, fille et héritière, épouse en en 1320 Guichard VI, sire de Beaujeu. Dans cette famille jusqu'en 1400, puis passe dans la maison de Bourbon et de Bourbon-Montpensier.  Louis II de la Trémouille, entre 1400 et 1477, les familles qui se succèdent ayant laissé le château à l'abandon, le duc de Bourgogne y installe des capitaines, le donjon est fortifié, le mobilier et l'artillerie soigneusement entretenus.. Gabrielle de Bourbon (1447-1516), sa fille, apporte en 1485 la baronnie en dot à Louis II de La Trémouille Seigneurs. Jacques de Chabannes, seigneur de La Palice (1470-1525) la famille Coligny, dont Gaspard-Alexandre de Coligny (1662-1694) Jean du Puy, à qui le précédent donne le château, se fait construire une nouvelle demeure. Jacques-Nicolas du Puy, son fils, fait bâtir, vers 1760, la maison du geôlier et en 1775, l'auditoire du bailliage sur des plans de l'architecte Guillemot. En 1793, il est en partie dépossédé de ses biens, la baronnie étant restituée à l'état comme bien national.","architecture":"Semur,  de la forteresse subsiste des vestiges de remparts, le donjon carré roman le plus ancien de Bourgogne du début du XIe siècle. Il sagit dun rare et précieux spécimen de donjon roman haut de 22 mètres et divisé en quatre niveaux apparents. Au devant, deux tours en demi-lune du XIIe siècle, légèrement talutés et percées de rares archères, protégeaient la porte dentrée à pont levis et herse. La tour nord comporte une salle de garde avec peintures, une oubliette dune dizaine de mètres voûtée en coupole et un silo, la tour sud conserve un escalier dans lépaisseur du mur  et deux salles de gardes. Le donjon garde une partie de sa muraille accolée aux tours. \r\n A la veille de la Révolution, les tours sont aménagées en prisons. Lédifice au devant des tours est alors bâti pour abriter dautres cellules, dont lune est consacrée à St-Hugues  avec un grand arbre généalogique des Semur, ainsi  que la maison du geôlier occupée aujourdhui par une importante collection daffiches de la période révolutionnaire.                                                             St-Hugues, construit au sommet dun éperon rocheux pour arrêter les Normands, le château fort Saint Hugues, plus ancien château de Bourgogne, est un modèle d'architecture militaire des X, XI et XIIe siècle conservant un rare spécimen de donjon roman. Au début  du XIXe siècle, on a tenté d'abattre le donjon en pratiquant des brèches à sa base. La paternité revient à la puissante seigneurie des Semur dont est issu St-Hugues, grand Abbé de Cluny, bâtisseur de labbaye. La visite propose une exposition permanente d'affiches imprimées et manuscrites de la Révolution française à Semur.                                                               \r\nDans la commune le château de Saint-Martin et de la Vallée.","habitants":"Famille des Châteauvillain  et de Gabrielle de Bourbon\r\n        \"","divers":"Château de Semur en Brionnais","gps":"","images":["../image/image_71/71_Semur_Brionnais_1.jpg","../image/image_71/71_Semur_Brionnais_2.jpg","../image/image_71/71_Semur_Brionnais_3.jpg","../image/image_71/71_Semur_Brionnais_4.jpg","../image/image_71/71_Semur_Brionnais_5.jpg","../image/image_71/71_Semur_Brionnais_6.jpg","../image/image_71/71_Semur_Brionnais_7.jpg","../image/image_71/71_Semur_Brionnais_8.jpg"]},"Consult_chateau_formulaire6326":{"id":"Consult_chateau_formulaire6326","dept":"71","canton":"Mâcon","commune":"Sennecé-les-Mâcon","nom":"Sennece_Macon","type":"Château","periode":"XVI","histoire":"SENNECE, le fief de Sennecé les Macon appartenait aux nobles de Véré,  vers le XVIe siècle puis  à Brice Bouderas en 1601 qui le restaura,  son arrière petit fils Antoine y composa de nombreuses piéces, en 1762 il appartenait  aux Berthet de Guerze et en 1784 il fut attaqué par les brigands.","architecture":"Sennecé les Macon, de forme quadrangulaire a deux niveaux, fronton triangulaire en façade plein cintre flanqué d'une tour ronde en angle  à toit  pointu.","habitants":"Famille de Brice Bouderas\r\n        \"","divers":"Château de Sennecé","gps":"","images":["../image/image_71/71_Sennece_Macon_1.jpg"]},"Consult_chateau_formulaire3615":{"id":"Consult_chateau_formulaire3615","dept":"71","canton":"Sennecey-le-Grand","commune":"Sennecey-le-Grand","nom":"Sennecey_le_Gd","type":"Château","periode":"XIV","histoire":"SENNECEY le GRAND, un bastion du XIIe siècle, fief de Tibert de Sennecey,  à l'extinction de la famille de Sennecey en 1400, le fief passe par héritage à Jean II de Toulongeon, baron de Sennecey, futur maréchal de Bourgogne qui fit en 1423  rebâtir le château, après la prise et la ruine de celui-ci par les troupes de Bernard d'Armagnac,  après la mort de Jean, son fils, Jean III de Toulongeon, achève  en 1427 les travaux, son fils lui succède en 1462 et à sa mort en 1479  sans enfant, la baronnie revient à la sur de Jean III, Clauda de Toulongeon, qui cette dernière avait épousé   Jean de Bauffremont. Nicolas de Bauffremont, grand prévôt de l'hôtel du roi, agrandit en 1550 la chapelle entre 1580 et 1592  son fils, Nicolas de Bauffremont, transforme complètement le château . Le domaine passa en 1641 à Jean-Baptiste Gaston de Foix, par son mariage avec Marie-Claire, unique héritière des Bauffremont. Guillaume-Alexandre, marquis de Vieux-Pont et de Sennecey, nouveau propriétaire en 1714 et également seigneur de Saintines dans l'Oise, passe à Pierre-Louis d'Ailly et  à Louis-Joseph que  ce dernier vend en 1777 le bien à Madeleine Olivier de Senozan de Viriville, marié peu après à Archambaud de Talleyrand-Périgord. En 1824, le comte de Noailles vend le château, presque intact, dont il a hérité, à la commune qui va le démolir pour construire une église paroissiale. \r\nLATOUR, propriété de la famille Gallois d'Arlay, qui l'a gardé jusqu'au XIVe siècle, pour le vendre à la famille de Vuillafans. Au XVIe siècle, cette famille s'est éteinte, et le domaine a été vendu en 1576 à Claude de Bauffremont qui démantèle les fortifications de la maison forte et englobe l'ensemble dans le vaste parc de sa demeure de Sennecey.  Tour de Vers du XVIIe siècle qui appartenait au nobles de Véré, vers la fin du XVe siècle à Brice Bauderon  qui le restaura, son arrière petit-fils Antoine y composa une gracieuse pièce de vers en 1712 il appartenait aux Berthet de Gueuse.","architecture":"Sennecy le Grand, dans la commune le château des Tourelles  du XIe siècle transformé au XIXe siècle en un manoir à deux niveaux avec attiques rectangulaires avec un  avant corps saillant et  des tourelles carrées accolés et une tourelle ronde, transformait en un  hôtel restaurant.                                                                            Château de Ruffey (voir article), ruines féodales, ancien château fort ou est installé la mairie.                                                       Château de la Tour, un corps de logis, flanqué de 2 tours du XVe siècle et des communs percés de portes en plein cintre sont disposés en U autour d'une cour ouverte à l'Est  isolée, à l'angle nord-est, se dresse une grosse tour carrée appartenant peut-être à la construction primitive qu'entourait une muraille de ceinture avec un profond fossé. Elle était jadis couronnée de merlons régnant autour d'une terrasse qui ont disparu à la fin du XVIIIe siècle pour faire place à une toiture en pavillon. À l'est, dans l'axe de la cour, une demeure comprenant un sous-sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble sous un toit d'ardoise a été bâtie au XIXe siècle, sur une légère éminence.    Latou, l'ancien château de Sennecey date du XIe siècle, il était situé à quelques mètres de l'actuel château  probablement  bâti au XIIe siècle.","habitants":"Famille  de Toulongeon\r\n        \r\n        \r\n        \"","divers":"Château de Sennecey le Grand et des Latour","gps":"","images":["../image/image_71/71_Sennecey_le_Gd_1.jpg","../image/image_71/71_Sennecey_le_Gd_2.jpg","../image/image_71/71_Sennecey_le_Gd_3.jpg","../image/image_71/71_Sennecey_le_Gd_4.jpg","../image/image_71/71_Sennecey_le_Gd_5.jpg","../image/image_71/71_Sennecey_le_Gd_6.jpg","../image/image_71/71_Sennecey_le_Gd_7.jpg","../image/image_71/71_Sennecey_le_Gd_8.jpg","../image/image_71/71_Sennecey_le_Gd_9.jpg"]},"Consult_chateau_formulaire57dc":{"id":"Consult_chateau_formulaire57dc","dept":"71","canton":"Verdun-sur-le-Doubs","commune":"St-Gervais-en-Vallière","nom":"Sercy","type":"Forteresse","periode":"XIV-XVI","histoire":"CERCY ou Sercy, cité en 1067 fief de la famille de Sercy grande famille noble du plus riche écuyer de la Bourgogne, en 1264 Améric de Sercy épouse Aluis de Brianion et rachète  Uxelles une des places fortes et cette puissante seigneurie. Jean de Sercy est tué à la bataille de Poitiers en 1356. C'est au XVe siècle que la famille atteint son apogée  Josserand II est bailli du Charolais et Guillaume de Sercy  seigneur de Champalement et d'Igornay commença a agrandir est transforma la maison forte en château. A la mort de Guillaume le château passa par alliance à Jacques de Villiers de La Faye qui avait épousé Marguerite de Sercy soeur de Guillaume, les travaux se termineront en 1520 par  son neveu, Jean de Villiers de La Faye héritier de Sercy, passa  en 1770 par alliance au Semur qui sera vendu ensuite en 1771 à Antoine Viard lieutenant général du Baillage de Mâcon qui le cédera en 1784 à Claude Perroy de la Foretelle conseiller à la chambre des comptes de Dijon. Saccagé et pillé à la Révolution, Claude fut guillotiné à Dijon. Le château passera par alliance au baron de Bessey de Contenson qui épousa la petite-fille  de Claude Peroy de Foretelle en 1806 toujours dans la descendance de la famille de Contenson.","architecture":"Sercy, forteresse médiévale, au XIIe siècle une maison forte avec double enceinte  au bord d'un étang alimenté par la Grosne. Au XVe siècle Guillaume déplace l'entrée principale sur le front Est, et installe une tour porche  un pont dormant à deux arches. La seconde enceinte comprise entre deux cours triangulaires dont seule celle du sud à échappé à la destruction, comprend le château les bâtiments entourent la cour intérieure forme un quadrilatère irrégulier cantonné de tours, une grosse tour ronde au sud-ouest tour avec hourd en bois du XVe siècle, le donjon couronné de mâchicoulis accolé d'une tourelle d'escalier et une tour carrée formant poterne, l'angle nord-est est flanqué d'une tour ronde qui à perdu son toit lors de l'incendie. Des travaux importants effectués entre 1811 et 1815 malheureusement un incendie en 1929 endommage les toitures.","habitants":"Famille de Guillaume de Sercy \r\n        \r\n        \r\n        \"","divers":"Château de Sercy","gps":"","images":["../image/image_71/71_Sercy_1.jpg","../image/image_71/71_Sercy_2.jpg","../image/image_71/71_Sercy_3.jpg","../image/image_71/71_Sercy_4.jpg","../image/image_71/71_Sercy_5.jpg"]},"Consult_chateau_formulairec6fb":{"id":"Consult_chateau_formulairec6fb","dept":"71","canton":"Sennecey-le-Grand","commune":"Laives","nom":"Sermaisey","type":"Maison forte","periode":"XV","histoire":"SERMAIZEY, cité au XVe siècle, existence d'un château dont-on ignore le propriétaire. La seigneurie appartient en 1590 à François-Abraham Nyod. Le bien est vendu en 1628 à Louis Mercier, fermier de Ruffey, dont la famille va agrandir le domaine et transformer le château. Après l'extinction des Mercier, le fief passe en 1683 entre divers  propriétaires. L'ensemble est vendu à la fin du XVIIIe siècle à Charles de Châteauneuf de Randon, marquis d'Apcher, dont le père s'était illustré pour avoir organisé la chasse dans laquelle aurait été tué la bête du Gévaudan. A l' époque révolutionnaire  les biens sont confisqué.","architecture":"Sermaizey,  un plan du XVe siècle montre un château composé d'un corps de logis et d'une grosse tour ronde coiffée d'un toit conique. Il subsiste aujourd'hui le corps de logis occidental, composé de plusieurs bâtiments, tous implantés dans le même alignement et dont la façade ouest, flanquée à son extrémité sud d'un pavillon carré, est percée d'ouvertures régulières sur deux niveaux, les combles étant éclairés par des lucarnes à fronton. Au centre de sa façade orientale, est adossée une tourelle d'escalier hors uvre à six pans irréguliers, percée de baies à linteaux en accolade dont les parties hautes ont été remanié au XVIIe siècle. L'angle nord-est est flanqué d'une tour carrée demi-hors uvre dont le second étage, encore percé d'une fenêtre en plein cintre, abritait une chapelle. Une toiture en pavillon a été substituée au dôme qui la couvrait jadis et les bas-reliefs qui la décoraient, lesquels évoquaient tous des scènes de la vie de la Vierge, ont été dispersés, à l'exception d'une Pietà encore encastrée dans le mur de l'ancienne sacristie.\r\nUn pigeonnier circulaire s'élève à quelque distance au sud-est, au-delà des communs.","habitants":"Famille de  François-Abraham Nyod\r\n        \"","divers":"Château de Sermaisey","gps":"","images":["../image/image_71/71_Sermaisey_1.jpg","../image/image_71/71_Sermaisey_2.jpg","../image/image_71/71_Sermaisey_3.jpg","../image/image_71/71_Sermaisey_4.jpg"]},"Consult_chateau_formulairef500":{"id":"Consult_chateau_formulairef500","dept":"71","canton":"St-Gengoux-le-National","commune":"Curtil-sous-Burnand","nom":"Serree","type":"Château","periode":"XV","histoire":"SERREE, ruines féodales de la forteresse de la famille du Boys, qui la  possédé  au XVe siècle, cette famille s'éteignit au début du XVIe siècle, la dernière de la lignée ayant épousé, en 1522, Philibert de Drée, dont la famille était originaire de l'Auxois. Le domaine resta aux Drée de Gorze jusqu'en 1713, puis aux de Mucie,  au marquis d'Autume, à monsieur. de Jotemps  passa ensuite entre les mains de E. Perrault de Jotemps puis vendu à plusieurs reprises et finalement acheté, en 1763, par Claude Philibert Bernard de La Vernette dont la famille le possédait à nouveau au début du XXe siècle, ces derniers firent  de nombreuses transformations. Aujourd'hui à M. de La Vernette-Saint-Maurice.","architecture":"Serrée, ancienne forteresse qui gardait le chemin entre Mont-Saint-Vincent et  Saint-Gengoux, la  construction du château remonte au XVe siècle. Malheureusement  les de la Vernette avait démoli le donjon à quatre pans irréguliers qui occupait le centre de la cour, ainsi que trois des huit tours, avait installé une chapelle dans la plus grosse des tours restantes et aménagé les bâtiments habitables. Des bâtiments entourent sur trois côtés une cour rectangulaire à laquelle on accède au nord par une tour-porche, flanquée d'une tour ronde et d'une tourelle d'escalier. Ce château, jadis entouré de fossés larges et profonds, était flanqué de huit tours irrégulières, liées entre elles par de fortes murailles supportant des terrasses ; cinq de ces tours subsistent encore avec leurs mâchicoulis. La porte principale, qui a conservé ses mâchicoulis, est, comme l'ensemble de ce vieil édifice féodal, d'un aspect assez  remarquable.","habitants":"Famille du Boys\r\n        \"","divers":"Château de Serrée","gps":"","images":["../image/image_71/71_Serree_1.jpg","../image/image_71/71_Serree_2.jpg","../image/image_71/71_Serree_3.jpg","../image/image_71/71_Serree_4.jpg"]},"Consult_chateau_formulaire9650":{"id":"Consult_chateau_formulaire9650","dept":"71","canton":"St-Gengoux-le-National","commune":"Sigy-le-Châtel","nom":"Sigy_le_Chatel","type":"Vestiges","periode":"X","histoire":"SIGY-le-Châtel, origine du Xe siècle, ruines féodales du château  qui est cité pour la première fois à la  famille de Luzy.  Renaud de Luzy est seigneur du lieu en 1203 et au XIIe siècle une reconstruction est entreprise, le château de Sigy appartenait en 1266 à  Archambaud de Chanay. Il passa ensuite à la famille de Trezettes. En 1560 il était la propriété de Philibert de La Guiche, dont la fille Henriette de la Guiche le porta à Louis Emmanuel de Valois, fils de Charles de Valois, duc d'Angoulême. Dès cette époque la vieille forteresse semble avoir été abandonnée. Par le jeu des successions elle revint ensuite à la famille de La Guiche à la Révolution, le dernier seigneur en fut Charles-Amable de La Guiche, exécuté en 1794.                                                                 Dans la commune le château de Hautecourt.","architecture":"Sigy le châtel, sur une colline dominant le village, le  château est l'un des plus anciens du Mâconnais du XIIe siècle remanié au XIVe siècle   avec une enceinte irrégulière. L'entrée, au nord, vers le plateau, était flanquée de deux tours hémicylindriques de maçonnerie pleine. Il ne subsiste plus que des pans de muraille, les bases de deux grosses tours circulaires percées d'archères-canonnières et, à l'extrémité occidentale, l'angle d'un bâtiment construit en moyen appareil auquel s'accroche une échauguette, sur une butte voisine  siège un ancien prieuré qui fut transmit a l'abbaye de Cluny  par le duc de Bourgogne en 1279.","habitants":"Famille de Luzy\r\n        \"","divers":"Château et vestiges à  Sigy le Châtel","gps":"","images":["../image/image_71/71_Sigy_le_Chatel_1.jpg","../image/image_71/71_Sigy_le_Chatel_2.jpg","../image/image_71/71_Sigy_le_Chatel_3.jpg","../image/image_71/71_Sigy_le_Chatel_4.jpg","../image/image_71/71_Sigy_le_Chatel_5.jpg","../image/image_71/71_Sigy_le_Chatel_6.jpg","../image/image_71/71_Sigy_le_Chatel_7.jpg"]},"Consult_chateau_formulaire377b":{"id":"Consult_chateau_formulaire377b","dept":"71","canton":"Cluny","commune":"Flagy","nom":"Sirot_Flagy","type":"Château","periode":"XIII","histoire":"SIROT à Flagy, cité au XIIe siècle, fief  tenu par l'abbé de Cluny Joceran sire de Brancion en 1234.  Au XIVe siècle à Henri de Sirot et à Henri de Moles en 1485, puis à Claude de Saint-Romain que sa fille fit passer par alliance   en 1516 Guillaume de L'Estouf-Pradines, le fief restera dans cette famille d'origine napolitaine jusqu'à  la Révolution,  le baron de Sirot Claude L'Estouf (1600-1652) militaire de carrière ainsi que sa descendance, ces derniers habitaient dans un hôtel particulier à Cluny. Le château était dans les mains d'un fermier les Roberjot jusqu'à la vente en 1789, il est acheté par Etienne Mayneaud de Laveaux chef d'escadron au régiment d'Orléans. Envoyé au colonie de Saint-Domingue devenu gouverneur général rentre en France en 1797 député de la colonie, accède à la présidence du conseil des anciens, écarté de la politique par le 18 Brumaire, de retour à Sirot en 1801 participe au conseil municipal et se met au services des gens de la commune, vend Sirot en 1809 à Louis Furtin bourgeois maire de Cluny  rachète bois et terrain pour construire la grande ferme Répin. En 1840 la propriété passe à Louis-Théodore Coste jusqu'à sa mort en 1876 par héritage à Paul Lauras et aujourd'hui à la famille Gentien.","architecture":"Château de Sirot,  la grosse tour cylindrique de l'ancien  château (ancien donjon) date du XIIIe siècle est occupé par une ancienne chapelle. Le château est composé d'un patrimoine riche, un ancien moulin, une forge d'autrefois équipée par l'ancêtre du marteau pilon, un grand four à pain détruit durant la deuxième moitié du XXe siècle, des écuries ainsi qu'une ferme équipée de deux tinaillers sur cave voûtée, dont le plus imposant était au XIXe siècle une ancienne magnanerie.","habitants":"Famille d'Henri de Sirot\r\n        \"","divers":"Château de Sirot","gps":"","images":["../image/image_71/71_Sirot_Flagy_1.jpg","../image/image_71/71_Sirot_Flagy_2.jpg","../image/image_71/71_Sirot_Flagy_3.jpg","../image/image_71/71_Sirot_Flagy_4.jpg","../image/image_71/71_Sirot_Flagy_5.jpg"]},"Consult_chateau_formulairedea5":{"id":"Consult_chateau_formulairedea5","dept":"71","canton":"Lucenay-L`Evêque","commune":"Sommant","nom":"Sommant","type":"Château","periode":"XVI","histoire":"SOMMANT, c'est en avril 1164, que le pape Alexandre III, réfugié en France, donne une Bulle à l'Abbaye de Saint-Martin d'Autun lui confirmant le patronage de la cure de l'église paroissiale. En 1260, Jean de Châtillon, surnommé de Roussillon, fait aveu pour ses fiefs de la vallée de La Celle-en-Morvan et Sommant, à Jean d'Aligny, fait de même, pour une partie du bourg en 1293 et Jean de Sommant, par suite de ces diverses concessions, les moines de Saint-Martin d'Autun, devinrent seigneurs hauts-justiciers de la paroisse dans sa presque totalité. La justice y était rendue en leur nom, dans une prévôté, ou bailliage qui fonctionna jusqu'à la fin du XVIIIe siècle. C'est a cette époque que Sommant passa dans la Maison de Fontenay, Anne-Paul de Fontenay, écuyer, seigneur de Sommant et de Souvert, ancien mousquetaire de la seconde compagnie, du roi, fut en 1766, lieutenant général des bailliages d'Autun, de Montcenis, et de Semur-en-Brionnais, puis président au siège royal et présidial d'Autun. Il mourut âgé de 90 ans et laissa entre autre son fils Jean-Paul Andoche de Fontenay, chevalier de Saint-Louis, officier au régiment des chasseurs des Vosges et dernier seigneur de Sommant. Il émigra et servit dans l'Armée des Princes. Il fut nommé membre du conseil général de Saône-et-Loire et élu député en 1824, et se retira de la vie publique lors de la chute de Charles X, refusant de prêter serment. Son fils Paul-Alexandre-Gabriel de Fontenay, était propriétaire de Sommant en 1865, il avait épousé Marie-Augustine-Herminie de Bèze, issue d'une très ancienne famille du Nivernais.","architecture":"Sommant, dit de Vallogne, (Vallis longa) vaste parallélogramme, orné d'un fronton, l'ensemble de style néogothique de la fin du XIXe siècle  à toits colorés malheureusement très abîmé par un incendie récent, à cause de sa situation et des deux domaines qu'il a sous sa dépendance, il ne reste que le colombier,  il est positionné au couchant du bourg, dans une vallée ombragée. C'est tout ce qu'il reste du manoir construit à Vareilles, près du bourg, par Alfred de Comeau dont les dépendances composées de deux domaines, formaient le fief de Champcourt. Cette terre mouvante de l'Abbaye de Saint-Martin d'Autun, appartenait au XVIe siècle, à une famille qui en prenait le nom de Philiberte de Saint-Clément, veuve de messire de Champcourt, en fit aveu en 1567. Elle passa ensuite à Pierre Cornillat, qui en était le seigneur en 1622. François André de Champcourt, sieur du lieu, en 1722, était parent de Pierre André de Charancy et de la Dame de La Cour. Françoise Rabyot porta Champcourt dans la famille de Comeau, à la fin du XVIIIe siècle.\r\nMaison seigneuriale de Enost, au hameau de Maiziere, ruiné, reste une partie du donjon du principal corps de bâtiment et des tours rondes en angles.                                                                 \r\n Dans la commune le château de Vareille du XVIIIe siècle transformé en chambres d'hôtes et le manoir de Champcourt.","habitants":"Famille de Fontenay\r\n        \"","divers":"Château de Sommant","gps":"","images":["../image/image_71/71_Sommant_1.jpg","../image/image_71/71_Sommant_2.jpg","../image/image_71/71_Sommant_3.jpg","../image/image_71/71_Sommant_4.jpg"]},"Consult_chateau_formulaire93fa":{"id":"Consult_chateau_formulaire93fa","dept":"71","canton":"Louhans","commune":"Sornay","nom":"Sornay","type":"Château","periode":"XVIII","histoire":"SORNAY, le Seigneur des lieux en était le Sire de Sainte-Croix. Mentionné en 1155 Le nom de Sornay apparaît en 1225, biens d'Antoine de Mailly, marquis de Châteaurenaud. \r\nChateau du Bas-Redy, depuis 1844, le bâtiment des dépendances, situé en vis à vis à l'ouest, a été remplacé ou transformé en habitation. Le colombier de plan circulaire, situé à mi-distance de la Seille et du château, a disparu. Sur la façade antérieure l'extrémité des tirants métalliques indique la date \"1792\", sur  la façade postérieure  le nom du fondateur \"Joly\", qui était le régisseur des biens d'Antoine de  Mailly, marquis de Châteaurenaud.","architecture":"Château de Sornay  figurant sur le cadastre ancien. Depuis 1844, le bâtiment des dépendances, situé en vis à vis à l'ouest, a été remplacé ou transformé en habitation. Le colombier de plan circulaire, situé à mi-distance de la Seille et du château, a disparu. Château implanté perpendiculairement à la route Louhans Tournus à l'entrée de Sornay, au bord de la Seille. Bâtiment en brique  sur soubassement  de pierre, à chaînage d'angle  en pierre. La façade est percée de dix  baies à encadrement en pierre et à linteau rectiligne. La plupart sont surmontées d'un arc de décharge en  brique. Un escalier droit à 7 degrés  mène à l'esplanade  du rez-de-chaussée, bordée de balustres en pierre.  La base du toit est soulignée par une corniche à cinq rangs, le deuxième et le quatrième étant posés pointes \r\nen avant. Sur le versant antérieur du toit une lucarne en bois surplombe la travée axiale.","habitants":"Famille d'Antoine de  Mailly\r\n        \"","divers":"Château de Sornay, de Granod et de Lusigny","gps":"","images":["../image/image_71/71_Sornay_1.jpg","../image/image_71/71_Sornay_2.jpg","../image/image_71/71_Sornay_3.jpg","../image/image_71/71_Sornay_4.jpg"]},"Consult_chateau_formulaire17eb":{"id":"Consult_chateau_formulaire17eb","dept":"71","canton":"Bourbon-Lancy","commune":"St-Aubin-sur-Loire","nom":"St_Aubin_sur_Loire","type":"Château","periode":"XVIII","histoire":"SAINT-AUBIN sur Loire, en 1429, Antoine de Toulongeon, chambellan du duc de Bourgogne, Philippe le Bon reçoit la terre de Saint Aubin.  La famille de Toulongeon garda Saint Aubin plus de cent cinquante ans.\r\nEn 1579, Saint Aubin devint la propriété de Claude dAmbly, descendant dune famille bourgeoise originaire de Bourbon- Lancy. La fille de Claude dAmbly épousa Louis de Ramilly, qui releva le nom dAmbly et devint Louis dAmbly de Ramilly, seigneur de Saint- Aubin, Perrigny sur Loire, Sommery et dautres lieux.\r\nLes Ramilly vendirent la terre de Saint Aubin en 1652 à Charles Le Gendre, seigneur de la Faye, issu dune famille de la bourgeoisie parisienne et établit à Moulins, qui épousa cette même année, Marie du Buisson, fille dAndré du Buisson, seigneur de Beauregard, président trésorier de France en la généralité de Mouli. Leur petit-fils, Gilbert-Charles obtint du Régent en 1718, passa  la terre de Saint Aubin en marquisat ainsi que laliénation à son profit de la baronnie de Bourbon-Lancy.\r\nMalheureusement, Gilbert-Charles Le Gendre se jeta dans la spéculation éperdue sur les actions de la Compagnie des Indes établie par Law et tous ses biens furent engloutis dans la fameuse banqueroute de ce dernier. Il mourut en 1746 et ses créanciers firent vendre ses biens. La seigneurie de Saint Aubin fut adjugée le 31 juillet 1751 à Pierre-César Du Crest, père de la fameuse madame de Genlis gouverneur des enfants du duc de Chartres puis duc dOrléans et enfin Philippe Egalité qui passa son enfance à Saint Aubin dans le vieux château-fort des Toulongeon, construit au bord de la Loire.\r\nLe nouvel acquéreur et sa famille y menèrent une vie de fêtes et de réceptions qui les mena à la ruine.\r\nLeur situation désespérée les conduisit à vendre le marquisat de Saint Aubin en 1757 à Charles-Guillaume Le Normand dEtiolles, fermier général des postes et mari de la marquise de Pompadour.\r\nIl ne vint jamais à Saint Aubin et vendit la seigneurie en 1771 à Charles Jean Baptiste des Gallois de la Tour, seigneur de Dompierre, Chézelle et autres lieux, qui était que le petit fils du premier Charles Le Gendre, seigneur de Saint Aubin.","architecture":"St-Aubin,  construit entre 1771 et 1777 par larchitecte bourguignon Edme Verniquet, pour lIntendant de Provence et premier président du parlement dAix, Charles Jean-Baptiste des Gallois de la Tour,  demeure seigneuriale et résidence de campagne, le château de Saint-Aubin sur Loire inscrit dans un environnement de verdure et d'eau, constitue un ensemble architectural d'une grande harmonie. Surprenant par un audacieux contraste entre un corps de logis en pierres blondes couvert d'ardoises et d'immenses communs de briques et de tuiles.  Corps de logis rectangulaire à deux niveaux et attiques avec fronton triangulaire plein cintre, aux extrémités deux pavillons à deux niveaux surbaissés en  retour d'équerre sur partie avant.                                                                                                                  Dans la commune le château de Genlis enclos muré de quatre tour d'angles et le château de Lambeys.","habitants":"Famille de Gilbert-Charles Le Gendre\r\n        \"","divers":"Château de St-Aubin et de Genlis","gps":"","images":["../image/image_71/71_St_Aubin_sur_Loire_1.jpg","../image/image_71/71_St_Aubin_sur_Loire_2.jpg","../image/image_71/71_St_Aubin_sur_Loire_3.jpg","../image/image_71/71_St_Aubin_sur_Loire_4.jpg","../image/image_71/71_St_Aubin_sur_Loire_5.jpg","../image/image_71/71_St_Aubin_sur_Loire_6.jpg","../image/image_71/71_St_Aubin_sur_Loire_7.jpg"]},"Consult_chateau_formulaire7e0b":{"id":"Consult_chateau_formulaire7e0b","dept":"71","canton":"Montcenis","commune":"St-Berain-sous-Sanvignes","nom":"St_Berain","type":"Château","periode":"XVII","histoire":"St-BERAIN sous Sanvignes, le village de St Bérain a eu son mot à dire dans l'histoire bourguignonne. Preuve en est la tour de la Motte Loisy, seule au milieu des champs, qui atteste d'une présence médiévale aux riches heures des ducs de Bourgogne. Construit au XIVe siècle, vestige d'un château qui vit s'affronter des armées au temps de la guerre du Charollais. Une association a été créée pour restaurer ces pierres séculaires qui ont désormais retrouvé un toit et une intégrité qui va leur permettre à nouveau de franchir les années.  La Croix du Chemin, héritée du XVe siècle et, plus proche de nous, le château de la Coudraye, noble demeure du XIXe siècle, attestent aussi de la marche en avant du temps. L'architecture contemporaine a également sa place, aux «trois chênes». La Coudraye; cest entre 1120 et 1150, alors que la Bourgogne appartenait à la Hollande, en 1710  monsieur Carrelet, hollandais demeurant à Dijon au château dEpiry à St Emiland marchand en gros de « toile de Hollande », très riche, a permis à sa descendance dacheter la propriété de la Motte Loisy, se dressait une ruine dun château fort non habité dont il ne reste aujourdhui que la tour restaurée de la Motte Loisy.                                               A cette époque, un  monsieur Carrelet ,  le vendit au marquis de Rabutin Chantal qui était le père de madame de Sévigné, cest là quelle a été élevée.","architecture":"St-Berain, dans la commune,  la tour médiévale de la Motte Loisy, château des Brosses du XVII-XVIIIe siècle; château de la Coudraye du XIXe siècle.","habitants":"Marquis de Rabutin Chantal\r\n        \"","divers":"Plusieurs châteaux cité ci-dessus","gps":"","images":["../image/image_71/71_St_Berain_1.jpg","../image/image_71/71_St_Berain_2.jpg","../image/image_71/71_St_Berain_3.jpg","../image/image_71/71_St_Berain_4.jpg"]},"Consult_chateau_formulaire620e":{"id":"Consult_chateau_formulaire620e","dept":"71","canton":"St-Leger-sous-Beuvray","commune":"St-Didier-sur-Arroux","nom":"St_Didier_sur_Arroux","type":"Château","periode":"XVI","histoire":"ST-DIDIER sur ARROUX, Chevannes-d'Azon, une famille de ce nom y possédait au XVe siècle. Hugues de Chevannes, chevalier, reprit de fief à La Roche-Milay, en 1444, Jean son fils renouvela ce devoir en 1495, cette seigneurie entra dans la famille de Berger de Charency. Jean de Marry, chevalier fit hommage pour Chevannes, en 1555 et Jeanne de Digoine, veuve de Jean de Barvaud, en 1579, moulin à eau avec roue en fer sur La Braconne.\r\nCharancy ou Charency. Le fief, formait autrefois, une seigneurie en toute justice, dans la mouvance de l'évêché d'Autun. Hervé de Donzy, comte de Nevers, dont elle relevait en arrière-fief, à cause de la châtellenie de Luzy, en fit aveu, à l'évêque Gauthier Ier, en 1209. Elle comprenait le bourg de Saint-Didier, où se rendaient les exploits de sa haute justice. Jean de Charency, seigneur du lieu pris part au siège de Château-Chinon, et laissa ce fief à Huguenin, son fils aîné, qui en jouissait en 1449. Le fief passa ensuite à la famille de Berger d'Autun, qui en prenait le nom.. René de Berger en était seigneur en 1706. Cette terre entra plus tard, dans la maison André dont une branche en portait aussi le nom.
