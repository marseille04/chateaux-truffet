u en 1677 par son cousin Roger de Bussy-Rabutin, déclare \"sa situation est admirable, j'en ai le paysage dans la tête et je le conserverai soigneusement\".","architecture":"Le château de Chazeu, est en ruines, les arbres poussent dans les fossés et la cour est un pré. Le château médiéval était de plan pentagonal, avec quatre tours rondes et une tour carrée à l'entrée. Au début du XXe siècle, on distinguait encore une grande tour carrée. Les restes de cheminées monumentales date de l'époque du chancelier Rolin. On ne peut imaginer la splendeur passée du château qu'au travers des réflexions de ceux qui l'ont approché avant sa démolition.\r\nDans la commune la tour de Perceval du XVIe siècle.","habitants":"Famille de Longwy\r\n        \"","divers":"Vestiges du château de Chazeu","gps":"","images":["../image/image_71/71_Chazeu_1.jpg","../image/image_71/71_Chazeu_2.jpg"]},"Consult_chateau_formulaire4756":{"id":"Consult_chateau_formulaire4756","dept":"71","canton":"Couches","commune":"Cheilly-les-Maranges","nom":"Cheilly_Maranges","type":"Forteresse","periode":"XIV","histoire":"CHEILLY les Maranges; En 1253, Gautier, sire de Chaulleio, chevalier, tient en fief du duc Hugues IV de Bourgogne ce qu'il a aux villes de Cheilly et de Santenay et dépendances, tant en forteresses qu'en justice. En 1291, Pernel de Montenteaume, damoiseau, fils de Pierre de Montenteaume, chevalier, tient en fief du duc Robert II de Bourgogne, la maison forte de Marceium (Mercey), paroisse de Cheilly. En 1300, Robert Fusot, baron de Chaudenay, qui meurt dans l'année, il laisse tous ses biens à son beau-frère Jean Pitois, seigneur de Monthelie, Couchet, Chaudenay, Chassagne, Cheilly et Cromey. La maison forte de Cheilly lui appartient. Il s'en dessaisit en faveur de Guillaume de Sampigny qui devient ainsi seigneur de Cheilly.\r\nEn 1366, Guillaume de Sampigny, écuyer, tient du duc Philippe II le Hardi ce qu'il a à Santenay, ainsi que la moitié de la muraille de la maison forte avec ses dépendances et droits de justice, l'autre moitié de la muraille et dépendances de la Motte de Cheilly est tenue en fief par Marguerite de Navilly, dame de Tailly, à cause de son douaire et au nom de ses enfants, Robert et Jehan de Bichey.\r\nDe même, Étienne dit Ruffin, damoiseau, tient du duc sa maison fortifiée située à Mercey, paroisse de Cheilly.\r\nEn 1372, Guillaume de Sampigny vend terre et droits à la grand-mère de Nicolas Rolin qui ultérieurement en héritera. Après lui les terres et droits de Cheilly et autres lieux, vont se transmettre aux descendants par alliance. Seront successivement seigneurs des lieux, les familles d'Epinac, de Pernes, Touloujon, et enfin Choiseul. Le 27 avril 1462, un accord est passé entre les héritiers de Nicolas Rolin pour sa succession, et Guillaume Rolin, sire de Beauchamp, reçoit ainsi les maisons et seigneuries de Cheilly.","architecture":"Maison forte de Mercey.\r\nForteresse de Cheilly, propriété du chancelier Nicolas Rolin, corps de logis rectangulaire à trois niveaux flanqués de pavillons rectangulaires aux extrémités.","habitants":"Famille de Guillaume de Sampigny\r\n        \"","divers":"Forteresse de Cheilly et M.F. de Mercey","gps":"","images":["../image/image_71/71_Cheilly_Maranges_1.jpg","../image/image_71/71_Cheilly_Maranges_2.jpg","../image/image_71/71_Cheilly_Maranges_3.jpg","../image/image_71/71_Cheilly_Maranges_4.jpg"]},"Consult_chateau_formulairef93a":{"id":"Consult_chateau_formulairef93a","dept":"71","canton":"Cluny","commune":"Salornaye-sur-Guye","nom":"Chevagny","type":"Maison forte","periode":"XV","histoire":"CHEVAGNY, les Chevrières du  Moyen-Âge, la terre de Chevagny est une simple dépendance de la seigneurie de Salornay. Au  XVe et XVIe siècles, construction du château, et à la  fin du XIXe siècle  aménagements destinés à l'installation d'une pouponnière.","architecture":"Chevagny, On trouve à l'origine une solide maison forte flanquée d'une tour carrée et complétée de communs. À une époque plus récente, des pavillons de même élévation que le logis furent accostés de part et d'autre de la façade sud, à l'alignement de celle-ci, la façade Nord présente des fenêtres, flanquées de pilastres toscans, celles du premier étage sont à meneaux et croisillons, les deux étages sont desservis par un escalier de pierre à vis. Il existait encore au XVIIIe siècle trois tours, dont deux étaient situées à l'entrée «du jardin du château cultivé par les vignerons», la tour Est a disparu.  Au XVIIIe siècle, la façade est complétée d'un portique de deux travées à arcades en plein cintre portant une terrasse à balustrade desservie par un escalier parallèle au bâtiment, le portail qui, à l'ouest, donne accès à la cour jadis cernée de constructions, comporte une porte charretière et une porte piétonne en plein cintre à entourage en bossage rustique.","habitants":"Seigneurie de Salornay\r\n        \"","divers":"Château de Chevagny","gps":"","images":["../image/image_71/71_Chevagny_1.jpg","../image/image_71/71_Chevagny_2.jpg","../image/image_71/71_Chevagny_3.jpg"]},"Consult_chateau_formulaire4969":{"id":"Consult_chateau_formulaire4969","dept":"71","canton":"La Clayette","commune":"St-Racho","nom":"Chevannes","type":"Maison forte","periode":"XVI","histoire":"CHEVANNES; Au  XIIe siècle, fondation du château en 1180 donné en 1181 par Philippe Auguste à un sire d'Anglure. En 1478, la seigneurie de Chevannes (ou Chavannes) appartient à Antoine Gachet, à la  fin du  XVIe siècle, construction du château actuel. \r\nEn 1645  Antoine de Sermant et Barbe de Lestouf y résident et en 1677 est la propriété de son frère, Laurent de l'Aube, en 1682 son  fils,  Philibert-Hubert, en hérite, celui-ci vend  en 1727 la propriété à Claude de Brosses qui sera en 1789  à Claude-Barthélemy de Brosses, petit-fils. A la Révolution,  acquit en 1970 par Mme Colette Du Barry, marquise Bernard de Noblet d'Anglure, qui en entreprend la restauration.\r\nDans la commune château de Dun ruiné remanié au XIXe siècle avec chapelle.","architecture":"CHEVANNES, à ST-Racho. Le corps de logis, de plan rectangulaire allongé, est flanqué de deux tours rondes qui semblent n'avoir jamais eu de rôle défensif, deux ailes en retour d'équerre s'appuient aux deux extrémités de la façade est, l'aile sud est constituée de deux galeries ouvertes superposées, l'aile nord renferme une grange, des étables et un four à pain.","habitants":"Seigneurie de Chevannes\r\n        \"","divers":"Château de Chevannes","gps":"","images":["../image/image_71/71_Chevannes_1.jpg","../image/image_71/71_Chevannes_2.jpg","../image/image_71/71_Chevannes_3.jpg"]},"Consult_chateau_formulairee945":{"id":"Consult_chateau_formulairee945","dept":"71","canton":"Paray-le-Monial","commune":"Nochize","nom":"Chevenizet","type":"Château","periode":"XIV","histoire":"CHEVENIZET, au XIV siècle  la maison forte appartenait  à Jean et Hugues de Marcilly, enfants de Robert de Marcilly, elle passa au début du XVe siècle à la famille de Vichy-Chamrond qui la rebâtit. Une chapelle, dédiée à Notre Dame y fut fondée en 1422 par Antoine de Vichy. Au début du XVIIIe siècle la terre fut vendue à Marc Antoine de Lévis. \r\nDans la commune le manoir de Pancemont transformé en ferme.","architecture":"Chevenizet, des bâtiments du XIXe siècle englobent un ensemble datant des XVe siècle et XVIe siècle comprenant, une façade donnant sur la rivière flanquée de deux tours rondes, une tour d'escalier polygonale incluse dans l'angle des deux ailes dont est constitué le château, quelques éléments de murs très épais, un petit oratoire et la moitié d'une cheminée, le corps de logis de plan rectangulaire est flanqué d'une aile en retour d'équerre.\r\nÀ une centaine de mètres, se trouve une chapelle, de style gothique flamboyant, totalement restaurée au XIXe siècle. C'est un petit bâtiment presque carré avec abside en hémicycle.","habitants":"Famille de Vichy-Chamrond\r\n        \"","divers":"Château de Chevenizet","gps":"","images":["../image/image_71/71_Chevenizet_1.jpg","../image/image_71/71_Chevenizet_2.jpg","../image/image_71/71_Chevenizet_3.jpg"]},"Consult_chateau_formulaire482b":{"id":"Consult_chateau_formulaire482b","dept":"71","canton":"Mâcon","commune":"Davayé","nom":"Chevignes_Davaye","type":"Château","periode":"XVII","histoire":"CHEVIGNES, la villa est donnée en  931  à l'abbaye de Cluny par Raoul, duc de Bourgogne, en 950  fondation d'une chapelle consacrée à Saint-Taurin, au Xe siècle  augmentation du territoire grâce à des donations, et culture de la vigne. \r\n Son territoire s'accrut rapidement grâce à des donations et la culture de la vigne y fut pratiquée au Xe siècle. Les moines y bâtirent une demeure fortifiée et en firent une obédience gérée par un moine, puis concédée à bail à partir du XVIe siècle, ils ne cessèrent pas de se réserver la possibilité d'y résider.\r\nLe diplomate Jean Mabillon en 1682 y fait étape lors de son voyage en Bourgogne, en juillet 1789  le domaine est pillé et ravagé, en 1791  Jean-Baptiste Mure, originaire du Dauphiné, acquiert la propriété et en 1870  acquisition des Protat, famille d'imprimeurs.\r\nLa commune de Davayé avant la Révolution siège d'une châtellenie créé par Philippe le Bel, était également  un fief qui a appartenu successivement aux Chaudon, aux de Meffet et aux Devigne de Devaye, le château actuel de la fin du XVIIe siècle,  la commune possède aussi le château de Rossan du XVIIe siècle.(voir article).","architecture":"Chevignes; La construction actuelle date du milieu du XVIIe siècle, la façade est, précédée d'une terrasse, comprend, à ses deux extrémités, des avant-corps de faible avancée, au centre, un balcon à appui-corps en fer forgé est relié à la terrasse par un terre-plein, une partie du mur de la chapelle subsiste dans la paroi sud de l'aile méridionale des communs.","habitants":"Famille de Jean-Baptiste Mure\r\n        \"","divers":"Château de Chevignés","gps":"","images":["../image/image_71/71_Chevignes_Davaye_1.jpg","../image/image_71/71_Chevignes_Davaye_2.jpg"]},"Consult_chateau_formulairee2c9":{"id":"Consult_chateau_formulairee2c9","dept":"71","canton":"Digoin","commune":"Digoin","nom":"Chiseuil","type":"Château","periode":"XVIII","histoire":"CHISEUIL, la seigneurie de Chiseuil, qui appartient aux Belleperche et aux Cochardet, fut achetée vers 1720 par les Maublanc, négociants  enrichis par le commerce et la navigation sur la Loire, ils ont été faits barons d'Empire par Napoléon Ier qui ont légué Chiseuil à un neveu, Henri de Billy. Le château aurait été reconstruit en 1763, à la place d'un château plus ancien dont il subsiste des éléments dans le bâtiment d'entrée, la cuisine, la façade ouest et les communs. Il a été très remanié au XIXe siècle. Un neveu des Maublanc, Henri de Billy  hérite du domaine au XXe siècle.","architecture":"CHISEUIL, le bâtiment d'habitation est constitué d'un corps central et de courtes ailes en retour d'équerre, de même élévation et reliées entre elles, en avant du corps central, par une galerie couverte en terrasse, de construction postérieure et surmontée par une balustrade, derrière le château, s'étend  un jardin et un parc avec pièce d'eau qui auraient été dessinés avant la construction.","habitants":"Famille d'Henri de Billy\r\n        \"","divers":"Château de Chiseuil","gps":"","images":["../image/image_71/71_Chiseuil_1.jpg"]},"Consult_chateau_formulaire46d1":{"id":"Consult_chateau_formulaire46d1","dept":"71","canton":"Lucenay-L`Evêque","commune":"Chissey-en-Morvan","nom":"Chissey_Morvan","type":"Maison forte","periode":"XV","histoire":"CHISSEY, en 1250 baronnie de Hugues de Châtillon en Bazois dans cette famille jusqu'en 1385  à Hugues de Ternan dit de Chissey, en 1401 Adolphe de Chissey jusqu'en 1447 passa ernsuite à Michaut de Chaulgy et c'est en 1530  que Jacques de Chaulgy  fils de Claude qui fit construire le château et le vend à Claude de Crécy, revendu en 1558 à Claude Reynier de Montmoyen, son fils  Odinet de Montmoyen en hérite suite au décés de son père en 1591, ce dernier deux filles dont Chrétienne de Chissey mariée à Jean de Senailly-Damas, baron de Villers, et  Marie de Chissey, qui épouse Nicolas de Sercey, seigneur du Jeu. Le fief restera à Marie françoise de Sercey fille de Marie de Chissey qui en 1685 épouse Claude-Joseph de Fussey. Elle décède le 3 février 1744, au château d'Esbaugis.  François de Fussey, fils de Marie-Françoise de Sercey, seigneur du lieu du chef de sa femme Marie Nuguet reprend le fief en 1745. En 1777  Nicolas-Antoine-François-Xavier de Fussey fait limiter sa justice, du côté de Buy, il émigre pendant la Révolution  et meurt en exil.  Le château vendu comme bien national à Alexandre-Henri Hubinet et à Joseph-Alexandre Brochot. En 1815  Napoléon fait étape au château ou il passe la nuit du 16 mars 1815, à son retour de l'Île d'Elbe, afin de prendre contact avec les braves du Camp des Latois et d'aller décorer l'abbé Rasse au relais de poste de Pierre Écrite.                                                                                      Le Château de La Prée est un manoir du XVIIIe siècle situé sur la rive droite du Ternin, à l'ouest du bourg, possédant des tourelles. Ce fief était en 1404 à Andoche de Chissey, qui en fait aveu, il passera à la Maison du Buy.","architecture":"Chissey en Morvan, le château  avait quatre tours aux angles, chacune pourvue de deux meurtrières, était entouré d'un fossé large et profond, suivi d'un talus, cette architecture défensive, hérissée de mâchicoulis, en rendait l'accès difficile. Aujourd'hui la tour du Sud-Ouest n'existe plus, autrefois prolongé à l'ouest par le donjon et une tour, il ne subsiste du château fort initial que trois tours rondes, une massive tour carrée et deux corps de logis bâtis à angle droit, les fossés  alimentés comme le moulin par la rivière, ont été comblés, la construction la plus ancienne semble être la tour carrée, il a été réaménagé au XVIIIe siècle. En 1868 réfection de la charpente de la grosse tour carrée.                                       Dans la commune de Chissey en Morvan plusieurs châteaux, château de Buis, reconstruit en 1781\r\nChâteau du Guidon, au lieu-dit les Goulots\r\nMaison forte de La Mothe-Chissey, ou des Roquets, origine XVe siècle\r\n Maison seigneuriale de Vaucheseuil\r\n Maison seigneuriale de Souvert\r\n Manoir de la Prée\r\n Manoir de Vaulsery dit La Grande Maison.","habitants":"Famille de Chaulgy\r\n        \"","divers":"Château de Chissey, le vieux château, le Buis et le Guidon","gps":"","images":["../image/image_71/71_Chissey_Morvan_1.jpg","../image/image_71/71_Chissey_Morvan_2.jpg","../image/image_71/71_Chissey_Morvan_3.jpg","../image/image_71/71_Chissey_Morvan_4.jpg","../image/image_71/71_Chissey_Morvan_5.jpg","../image/image_71/71_Chissey_Morvan_6.jpg","../image/image_71/71_Chissey_Morvan_7.jpg"]},"Consult_chateau_formulairebada":{"id":"Consult_chateau_formulairebada","dept":"71","canton":"Lugny","commune":"St-Albain","nom":"Choiseau","type":"Maison forte","periode":"XV","histoire":"CHOISEAU; En 1561, Claude Prisque, bourgeois de Mâcon, élu, donna l'aveu de sa maison noble de Choiseau, ayant rentes et servis. En 1582, Pierre Desbois, également avocat au bailliage, reçu Choiseau par son mariage avec Marie Leirat, héritière de Claude Prisque.\r\nEn 1600 le château de Choiseau était une seigneurie qui passa des Prisque aux Desbois de Choiseau, dont les trois derniers furent de père en fils Baillis d'épée du Mâconnais.\r\nEn 1679, le 21 Avril, Gabriel Desbois, écuyer, fils de Pierre, seigneur de Choiseau, dont il repris le fief, en 1696 le 3 décembre, Antoine Desbois, fils de Gabriel, écuyer, capitaine de cavalerie, bailli d'épée du Mâconnais (1694-1736), reprit le fief de Marie de Gise, sa mère.\r\nEn 1769  mort du fils et successeur, Pierre Salomon Desbois, chevalier, bailli d'épée, seigneur de Choiseau et la Cailloterie. \r\nen 1772 le 9 Avril, Marguerite Fabre, veuve et héritière de Pierre Salomon Desbois, reprit le fief de Choiseau et la Cailloterie.\r\nAujourd'hui le château de Choiseau appartient à la famille de Monsieur Aidou.\r\nST-ALBAIN, village qui possède des vestiges féodaux et le château dit de St-Albain construit vers le XIVe siècle il eut à soutenir le siège des calvinistes en 1592 le château fut menacé par les royaux de Verdun les bateaux chargés d'ennemis  furent  arrêtaient sur la Saône, malgré cela il fut saccagé en 1789 par les brigands de Mâcon deux ans plus tard il fut vendu aux Boiraux.","architecture":"Choiseau,  le château de Choiseau date de la fin du XIe siècle, mais privé de ses deux ailes de côté, gros bâtiment rectangulaire du XVIIe siècle avec un avant corps en légère saillie, l'ensemble particulièrement entourés de murs percés de meurtrières , dans lesquels on observe la petite base d'anciennes tours rectangulaires du XVIe siècle.","habitants":"Famille de Pierre Desbois\r\n        \"","divers":"Château de Choiseau","gps":"","images":["../image/image_71/71_Choiseau_1.jpg","../image/image_71/71_Choiseau_2.jpg","../image/image_71/71_Choiseau_3.jpg","../image/image_71/71_Choiseau_4.jpg"]},"Consult_chateau_formulaire01b1":{"id":"Consult_chateau_formulaire01b1","dept":"71","canton":"La Clayette","commune":"La Clayette","nom":"Clayette","type":"Forteresse","periode":"XIV","histoire":"CLAYETTE, cité au XIIIe siècle par une maison forte  tenu vers 1380 par Philibert  de Lespinasse qui entreprit de transformer cette demeure en un château qui passera par héritage aux de Chantemerle dont certains représentants occuperont d'importantes charges auprès des ducs de Bourgogne, ce château passera en 1632 à Paul de Damas seigneur de Digoine, légataire et cousin d'Alice-Eléonore  de Chantemerle héritière de cette famille.  Après la mort de Jean-Léonard de Damas passe par héritage  à Palatin de Dyo et en 1713 acquis par Hector de Fay  marquis de Maubourg, passera ensuite dans différentes mains tel que Pierre Larcher, Joachim de Faye de Rochepierre et enfin en 1722 à Bernard de Noblet d'Anglure lieutenant des maréchaux de France toujours dans sa descendance.                                                          Dans la commune le château de la filature Plassard, aujourd'hui musée de l'automobile                                                                     Dans une commune voisine qui était relié auparavant à la Clayette \"AMANZE\"   de Roger d'Amanzé  en 1060 officier du roi Philippe, propriété aujourd'hui de Monsieur Lapierre.                       VAREILLES; dans cette commune le château du Montet et la tour de Montrigaud du XVIIe siècle.","architecture":"La Clayette, beau château entouré de douves bâti  en 1380 sur l'emplacement d'un ancien poste de Péage était à l'origine une maison forte, a conservé la parti-médiévale, malgré les percées réalisées au XVIIIe siècle ainsi que les adjonctions néo-gothiques. Le château cantonné en angles de quatre  tours rondes d'une vaste basse-cour puis un édifice comprenant donjon et corps de logis. D'importants remaniements au XVIIIe et XIXe siècles donna l'aspect actuel, ont gardé  la tour ronde coiffée d'un dôme couronné d'un lanternon et à laquelle s'accole une tourelle d'escalier.                               Amanzé; Dépendance de l'ancien château, sans doute du XVe siècle offre une partie de tour avancée où se trouve l'escalier à vis.                                    Vareilles; dans le parc naturel régional du Morvan, château du XIXe, vue panoramique, parc de 7 ha. Mobilier dépoque louis XV.","habitants":"Famille de Philibert  de Lespinasse \r\n        \"","divers":"Château de la Clayette, d'Amanzé et de Vareilles","gps":"","images":["../image/image_71/71_Clayette_1.jpg","../image/image_71/71_Clayette_2.jpg","../image/image_71/71_Clayette_3.jpg","../image/image_71/71_Clayette_4.jpg","../image/image_71/71_Clayette_5.jpg","../image/image_71/71_Clayette_6.jpg","../image/image_71/71_Clayette_7.jpg","../image/image_71/71_Clayette_8.jpg","../image/image_71/71_Clayette_9.jpg"]},"Consult_chateau_formulaire3fa5":{"id":"Consult_chateau_formulaire3fa5","dept":"71","canton":"Gueugnon","commune":"Clessy","nom":"Clessy","type":"Château","periode":"","histoire":"CLESSY-D'ARTAGNAN, le mousquetaire bien connu, y a séjourné, par héritage de sa mère, Eléonore du Palatin de Dio-Montpeyrous, il est seigneur de Clessy et d'une partie de la ville de Gueugnon. Les lieux étant propices par la présence de forêts (combustible) et d'une rivière, il y fonde les Forges de Villefay. Les travaux d'installation, commencés en 1719 se prolongent jusqu'en 1740.   Les forges occupent différents corps de métiers aussi bien à l'intérieur qu'à l'extérieur.  L'usine comprend deux hauts fourneaux et trois feux de forges et produit environ 1 000 tonnes par an.\r\nÀ la mort du maréchal de la Tour-Maubourg, les forges passent dans la famille du comte de Barbançon, elles sont revendues à un conseiller de Louis XVI puis à Pierre Joseph Championnet en 1845. Les forges de Gueugnon ont fait la renommée de la ville, au niveau national et international.                                                                    Dans la commune le château de la Tuilerie.","architecture":"Clessy, il existe deux ruines et plusieurs châteaux ;                     Le château  de Clessy qui est  situe dans le  centre d'un parc  de 18 hectares de chênes principalement, parsemé d'allées traversières et périphériques, sert à des tournage de film, cet environnement se prête aussi bien au tournage de scènes  campagnardes (deux étangs à 2 kilomètres du château ) que \"villageoises\", des dépendances importantes existant à l'orée du parc. Le château de Clessy est bâti sur une ancienne maison-forte portant la date de 1056.","habitants":"Famille de Palatin de Dio-Montpeyrous\r\n        \r\n        \"","divers":"Château de Clessy et vestiges","gps":"","images":["../image/image_71/71_Clessy_1.jpg","../image/image_71/71_Clessy_2.jpg","../image/image_71/71_Clessy_3.jpg","../image/image_71/71_Clessy_4.jpg","../image/image_71/71_Clessy_5.jpg","../image/image_71/71_Clessy_6.jpg"]},"Consult_chateau_formulaire0e97":{"id":"Consult_chateau_formulaire0e97","dept":"71","canton":"Cluny","commune":"Cluny","nom":"Cluny","type":"Forteresse","periode":"XV","histoire":"CLUNY, l'abbaye de Cluny fut fondée en 903 ou 910 par le duc d'Aquitaine et comte d'Auvergne Guillaume Ier. Cluny est le symbole du renouveau monastique en Occident, l'abbaye fut un foyer de réformation de la règle bénédictine et un centre intellectuel de premier plan au Moyen-Âge. Les bâtiments de l'abbaye abritent depuis la fin du XIXe siècle l'un des centres de l'école d'ingénieurs Arts et Métiers ParisTech. La commune de Cluny adhère à la fédération des sites clunisiens, association européenne qui s'occupe de la promotion des sites historiques qui dépendaient de l'ordre de Cluny éteint à la Révolution.  Guillaume Ier le Pieux fut lié à la commune.","architecture":"Cluny, le château abbatial et grand donjon rectangulaire du XIV-XVe siècle\r\nAu pied de l'abbaye se situe le haras de Cluny, l'un des haras nationaux français.\r\nCorbette, le château, fin XVIIIe siècle, début XIXe siècle, sur 3 niveaux est composé dun corps central avec 2 ailes, la toiture est en tuiles vernissées, typique de la région de Bourgogne.       La maison est donc essentiellement romane, du XIIe siècle. Ainsi les murs font 60 à 70 cm dépaisseur, il y a des « corbeaux » pour soutenir les poutres. Le prieuré de Charolles est l'ancien château des sires de la Magdelaine, au XIe siècle dont il subsiste qu'une tour octogonale et quelques bâtiments,  propriété de la ville.  En face de l'hôpital ancienne maison seigneuriale des sires de la Magdelaine dont il subsiste qu'une tour du XVe siècle et quelques restes d'arcatures et colonnes tour du Tronages, enceintes vestiges des fortifications, et hôtel de la Monnaies du XIIIe siècle.","habitants":"Abbaye de Cluny\r\n        \"","divers":"Patrimoine de Cluny, château de Corbette, du Haras, tour du Moulin et de Zaronde","gps":"","images":["../image/image_71/71_Cluny_1.jpg","../image/image_71/71_Cluny_2.jpg","../image/image_71/71_Cluny_3.jpg","../image/image_71/71_Cluny_4.jpg","../image/image_71/71_Cluny_5.jpg","../image/image_71/71_Cluny_6.jpg","../image/image_71/71_Cluny_7.jpg","../image/image_71/71_Cluny_8.jpg"]},"Consult_chateau_formulaire48f6":{"id":"Consult_chateau_formulaire48f6","dept":"71","canton":"Charolles","commune":"Collanges","nom":"Collanges","type":"Manoir","periode":"XVI","histoire":"COLLANGES; hameau de la commune de Vendenesse les Charolles, ancien château des Damas, ruiné par les bandes d'écorcheurs fut reconstruit par les Ragny au XVIe siècle et XIXe siècle, il a conservé un escalier  à vis et des cheminées anciennes propriété de la comtesse de Lurs-Saluces.                                   Château de Collanges remonte au XVe siècle  du XI au XIVe siècle, il appartenait aux Damas  puissante famille de Semur, puis aux Essertines.  En mai 1478, les écorcheurs pillent et détruisent le château, le grand prieur de Cluny  J. de la Magdelaine  acheta collanges à Hugues de Laye, en 1500 pour son neveu Girard de Ragny, dont il fit rebâtir le château en style renaissance  tel qu'on le voit aujourd'hui.  Le comte de Lur-Saluces devient propriétaire en 1933, puis la comtesse  Xavier de Varax en 1994.","architecture":"Chateau de Collanges: le château semble remonter au XI siècle, il a subi au cours des siècles de nombreuses transformations,; corps de logis central rectangulaire à trois niveaux, sur les côtés sont  accolés quatre pavillons à niveaux différents et une tour octogonale plein cintre côté parc.","habitants":"Famille Châteaux des Damas\r\n        \"","divers":"Château de Collanges","gps":"","images":["../image/image_71/71_Collanges_1.jpg","../image/image_71/71_Collanges_2.jpg"]},"Consult_chateau_formulairecabe":{"id":"Consult_chateau_formulairecabe","dept":"71","canton":"Mâcon","commune":"Prissé","nom":"Combe_Prisse","type":"Château","periode":"XVI","histoire":"COMBE; le château d'origine  fut construit  par Aymond évêque de Macon au XIIIe siècle, une forteresse dont-il était le seigneur, le domaine au XVIIe siècle  est érigé en fief, sans doute pour François Barjot dit de \"la Combe\", avocat au parlement de Paris, en 1712, son fils, Jacques-Marie Barjot en hérite, ce dernier, alors maire de Mâcon, en 1750 y fait bâtir un château, qui passera dans la seconde moitié du XVIIIe siècle  à Brice Barjot, successeur du précédent, qui y réside rarement. Brice-Alexis Barjot, qui avait réussi à conserver la demeure intacte durant la période révolutionnaire, en 1811 le vend à son gendre, Pierre-Marie Chappuis de Maubou,   Le précédent revend le domaine au baron des Tournelles en 1822,  et en  1901, acquisition par M. de Boisset-Clavière.\r\nDans la commune de Prissé, outre le château de la Combe et de Monceau (voir article).  Le château de Prissé fut construit pour se défendre contre Jean de Braise comte de Mâcon avec lequel il avait des difficultés contradictoires.  Le manoir de la Grande Vigne hôtel, château de Mauhy hôtel de Mr Jantzen, le château Neuf à l'est de la Combe élevé en 1845 par le baron des Tournelles encadré de deux pavillons à toits en carène.","architecture":"Combe; Construit en 1750  sur  la forteresse du XIIIe siècle constitué de deux séries de bâtiment accolées l'un à l'autre.  Précédé d'une vaste cour limitée par des écuries et  des communs, le château est formé d'un corps central rectangulaire entre deux ailes en légère avancée sur la façade occidentale, la travée centrale, couronnée d'un fronton triangulaire, est percée d'une porte qui surmonte un édicule encadrant un oculus ovale. De part et d'autre du château, se dressent, isolés, deux pavillons carrés coiffés de toitures à l'impériale surmontées de lanternons. Celui du sud abrite une chapelle.","habitants":"Famille de François Barjot\r\n        \"","divers":"Château de la Combe, de Collonge et de la Grande Vigne","gps":"","images":["../image/image_71/71_Combe_Prisse_1.jpg","../image/image_71/71_Combe_Prisse_2.jpg","../image/image_71/71_Combe_Prisse_3.jpg","../image/image_71/71_Combe_Prisse_4.jpg","../image/image_71/71_Combe_Prisse_5.jpg","../image/image_71/71_Combe_Prisse_6.jpg","../image/image_71/71_Combe_Prisse_7.jpg","../image/image_71/71_Combe_Prisse_8.jpg","../image/image_71/71_Combe_Prisse_9.jpg"]},"Consult_chateau_formulaireb040":{"id":"Consult_chateau_formulaireb040","dept":"71","canton":"Palinges","commune":"Martigny-le-Comte","nom":"Comune","type":"Château","periode":"XV","histoire":"COMUNE, au Xe siècle  de cette époque datent vraisemblablement les premières fortifications.  En 1316 dans les textes d'une maison forte tenue par Guillaume de Comune,  Agnès de Comune apporte en 1368 cette maison en dot à Guillaume du Bois. Au passage des troupes en 1477 de Louis XI réduit peut-être le château à son état actuel. \r\nAu milieu du XVIe siècle, il échoit par mariage à Claude de Damas, et confisqué au profit de Nicolas Rolin  et au XVIIe siècle,  le fief est définitivement réuni à celui de Martigny, abandonné, le château passe entre les mains des Laguiche. \r\nA la fin du XVIIIe siècle  acquisition par Louis Hercule Timoléon de Cossé-Brissac, commandant en chef de la garde constitutionnelle du roi.  Période actuelle, propriété du cultivateur qui possède le pré sur lequel le château a été construit.","architecture":"COMUNE à Martigny le comte ; maison forte en 1316. Il ne subsiste du château que les vestiges de son enceinte qui forme un quadrilatère irrégulier, cantonné de trois tours rondes beaucoup plus hautes que les courtines et d'une tour carrée qui fut sans doute le donjon. L'ensemble, vraisemblablement bâti au XIIIe siècle, était autrefois entouré de fossés aujourd'hui comblés.\r\nLe château, propriété privée. Depuis 2002, le château ainsi que le colombier, les fossés et l'ensemble du terrain sont inscrits à l'inventaire supplémentaire des monuments historiques.            Dans la commune le château  de Martigny le Comte (voir article).","habitants":"Famille de Claude de Damas\r\n        \"","divers":"Château de Comune","gps":"","images":["../image/image_71/71_Comune_1.jpg","../image/image_71/71_Comune_2.jpg","../image/image_71/71_Comune_3.jpg","../image/image_71/71_Comune_4.jpg"]},"Consult_chateau_formulaire0f0a":{"id":"Consult_chateau_formulaire0f0a","dept":"71","canton":"Mâcon","commune":"Charnay-les-Mâcon","nom":"Condemine","type":"Château","periode":"XVI","histoire":"CONDEMINE; du XVIe siècle: le fief  apparaît à la suite d'un démembrement de la châtellenie de Davayé dont bénéficie François Grattier échevin de Mâcon, lequel semble avoir immédiatement bâti un château.\r\nEn 1614, Suzanne Grattier, épouse Gratien Bauderon, fils du médecin Brice Bauderon (vers 1540 - 1623) de Sennecé-lès-Mâcon, la propriété passe ensuite à  l'archéologue Brice Bauderon (1613 - 1688).\r\nEn 1688, Antoine Bauderon de Sennnecé, fils,  poète, premier valet de chambre de la reine Marie-Thérèse. En 1741  leur  fils  se brise la jambe en posant la première pierre du nouveau château et meurt des suites de cet accident.  En 1763  le domaine est acquit par Jacques Ratton, issu d'une famille dauphinoise ayant fait fortune au Portugal, secrétaire du Roi qui y donnera des fêtes somptueuses,  La propriété échoit en 1800 à Anne-Adélaïde Ratton, en 1820  le mari Jean-Baptiste de Mure revend le château en 1873, le domaine est acquis par la famille Pitrat, En 1981  le domaine viticole est pris en charge par Roger Luquet, à Fuissé, en 1998  vente du domaine par la famille Pitrat, époque actuelle propriété de la famille Prettre.                                                       Dans la commune le château de Saint-Léger du XIV et XIXe siècle (voir article) et le château de Verneuil  XV et XVIIIe siècle (voir article également)","architecture":"Condemine, le château dorigine a été reconstruit, tel que nous le voyons aujourdhui, entre 1741 et 1744, il présente un corps central, flanqué de deux pavillons à toitures en carène qui sont dune époque postérieure du XIXe siècle. Le château de Condamine consiste en un corps central entre deux ailes en retour d'équerre, au centre de la façade orientale, un portique de quatre colonnes toscanes soutient un fronton, devant la façade occidentale, on découvre une terrasse à appui-corps en fer forgé, reliée au parc, de part et d'autre, dans le même alignement mais isolés, se trouvent deux petits pavillons.","habitants":"Famille de Gratien Bauderon\r\n        \"","divers":"Château de Condemine","gps":"","images":["../image/image_71/71_Condemine_1.jpg","../image/image_71/71_Condemine_2.jpg","../image/image_71/71_Condemine_3.jpg","../image/image_71/71_Condemine_4.jpg"]},"Consult_chateau_formulairef657":{"id":"Consult_chateau_formulairef657","dept":"71","canton":"Tramayes","commune":"Bourgvilain","nom":"Corcelles_Bourgvilain","type":"Château","periode":"Xv","histoire":"CORCELLES, cité en 984, La maison-forte de Corcelles était tenue en 1366 par le dernier descendant de la famille qui en portait le nom  Corcelles, puis l'obscurité se fait sur l'histoire de cette maison. Jean de Verrey XIVe siècle, Guillaume de Verrey XVe siècle, dans cette famille jusqu'en 1520, construction du château.  Le fief passe à la famille de Busseul Saint-Sernin en 1642, vente du château à Laurent de Laube, Philibert de Busseul Saint-Sernin (milieu du XVIe siècle jusqu'à la première moitié du XVIIe siècle) érigé en baronnie. Par alliance en 1780 avec Jeanne-Antoinette de Laube, il passe à Louis de Leusse en 1794 Passe à Laurent de Laube, baron de Corcelles (milieu du XVIIe siècle), qui le garderont jusqu'à la mort de Jeanne-Antoinette de Laube, (1744 -1831) qui avait épousée Louis de Leusse, époux de la précédente passa ensuite à la famille Martinot, en 1794 après que le précédent ait été décapité, sa veuve vend le bien aux frères Martinot, dont l'un est maire de Bourgvilain et fermier général seigneurs et propriétaires.\r\nDans la commune le château du Puits  du XIXe siècle.","architecture":"Corcelles, de plans et d'élévations divers, les bâtiments du château s'ordonnent autour d'une cour intérieure rectangulaire et sont reliés entre eux par des éléments de courtines; ils sont ceints sur trois côtés de fossés en partie comblés, ce quadrilatère est flanqué de tours rondes sur les angles NE et SO, appuyé à la courtine orientale, le corps de logis principal est flanqué sur sa façade Est, donnant sur la basse-cour, d'un petit corps de bâtiment rectangulaire, une porte charretière en plein cintre accostée d'une porte piétonne en anse de panier donne accès à la basse-cour.","habitants":"Famille de Jean de Verrey\r\n        \"","divers":"Château de Corcelles","gps":"","images":["../image/image_71/71_Corcelles_Bourgvilain_1.jpg","../image/image_71/71_Corcelles_Bourgvilain_2.jpg","../image/image_71/71_Corcelles_Bourgvilain_3.jpg","../image/image_71/71_Corcelles_Bourgvilain_4.jpg","../image/image_71/71_Corcelles_Bourgvilain_5.jpg"]},"Consult_chateau_formulairec9ba":{"id":"Consult_chateau_formulairec9ba","dept":"71","canton":"Charolles","commune":"Charolles","nom":"Corcelles_Charolles","type":"Maison forte","periode":"XV-XVIII","histoire":"CORCELLES  à Charolles, La maison-forte était tenue en 1366 par le dernier descendant de la famille qui en portait le nom depuis le XIVe siècle, à sa mort,  la propriété  fut partagée entre ses trois filles, épouses respectivement de Jean Sachet, d'Etienne de Saligny et de Jean Bocquillon. On la trouve ensuite, pendant tout le XVIIe siècle, entre les mains de la famille Mottin, en 1643, Guy Mottin, avocat au bailliage de Charolles, acquiert de sa soeur Jeanne et du mari de celle-ci, Jean Baudinot, avocat à Paray, la part qui lui en était échue dans la succession de leur père, Philibert Mottin. En 1694, Claude Mottin est seigneur de Corcelles, puis l'obscurité se fait totale sur l'histoire de cette maison. Vers 1770, elle appartenait à Blaise Quarré, seigneur du Plessis.\r\nDepuis 1906, propriété de la famille Meaudre.","architecture":"Corcelles, château construit de 1905 à 1908 par l'architecte Jean Boirivant, de style néo-régionaliste. maison-forte de Corcelles, XIVe siècle; XVIIe siècle. Au bout d'un chemin que longe une terrasse plantée d'une double rangée de tilleuls, la maison-forte rassemble des bâtiments hétéroclites autour d'une cour rectangulaire, qu'enveloppe, côté Ouest, une seconde cour cernée de bâtiments agricoles, on y pénètre par une porte en plein cintre défendue par des canonnières et une tour carrée, aménagée en chapelle au XVIIe siècle, entre l'arc de la porte et les mâchicoulis, ont été incrustées les armoiries de Guy Mottin et de son épouse, les côtés de la cour sont occupés par un bâtiment rectangulaire, un second logis de même plan et des communs, le second logis, construit en 1905, est également inscrit comme monument historique, les structures porteuses et les couvertures du château, le décor intérieur du grand hall et de la cage d' escalier avec son vitrail, de la salle à manger avec ses vitraux, les façades et les toitures des deux tours carrées et le portail d' entrée.","habitants":"Famille Mottin\r\n        \"","divers":"Château de Corcelles","gps":"","images":["../image/image_71/71_Corcelles_Charolles_1.jpg","../image/image_71/71_Corcelles_Charolles_2.jpg","../image/image_71/71_Corcelles_Charolles_3.jpg"]},"Consult_chateau_formulaireef90":{"id":"Consult_chateau_formulaireef90","dept":"71","canton":"St-Bonnet-de-Joux","commune":"Beaubery","nom":"Corcheval","type":"Château","periode":"XVII","histoire":"CORCHEVAL, au XIIe siècle, du château, dont-il ne reste que des ruines féodales dites des cornes d'Artus, qui a appartenu, pendant cinq siècles à l'illustre famille de Fautrières, Girard de Fautrières  fit le voyage de la Terre Sainte avec Josserand de Brancion,  Michel lieutenant du roi en charollais eut de nombreux membres de sa famille tués à la guerre sous Louis XIV, Jeanne d'Urfé femme de Mahieu  de Fautrières fit hommage au duc de Philippe le Hardi de ses terres  à l'exception de la tour carré de Corcheval. Le domaine   passera aux mains de leurs parents, la famille de Sommièvres. \r\nAu XVIIe siècle, rebâti après avoir été en partie détruit  par les Écorcheurs, puis par les troupes de l'amiral de Coligny,  la marquise de Fautrières recueille et héberge celle qui deviendra Sainte Marguerite Marie Alacocque, à l'origine du renouveau du Sacré Cur de Jésus; cette dernière se donnera à Dieu dans la chapelle qui se situe dans le parc du château. Marguerite de saint-Amour épouse Claude de Fautrières. La propriété appartient à la famille des barons de La Chapelle. \r\nDans la commune le château de la Clauze.","architecture":"Corcheval, au sommet de la colline dite de la \"Corne d'Artus\" se dresse un monument d'aspect druidique, ce sont en fait les ruines du château fort d'Artus, qui était une des quatre Châtellenies primaires du Charolais, et dont un pan de tour resté debout a inspiré le nom des lieux.\r\n La Motte du Camp de César.\r\n Le Château de Quierre.\r\n Le château de Corcheval, XIIe siècle et XVIIe siècle, flanqué de tours d'angle circulaires, tour carrée du XVe siècle, construite à partir des ruines du château d'Artus. Jardin à la française de la fin du XIXe siècle, communs du XVIIIe siècle.","habitants":"Famille de Fautrières\r\n        \"","divers":"Vestiges féodal, château de Corcheval et de la Clauze","gps":"","images":["../image/image_71/71_Corcheval_1.jpg","../image/image_71/71_Corcheval_2.jpg","../image/image_71/71_Corcheval_3.jpg","../image/image_71/71_Corcheval_4.jpg","../image/image_71/71_Corcheval_5.jpg","../image/image_71/71_Corcheval_6.jpg","../image/image_71/71_Corcheval_7.jpg"]},"Consult_chateau_formulaire3191":{"id":"Consult_chateau_formulaire3191","dept":"71","canton":"St-Gengoux-le-National","commune":"Cormatin","nom":"Cormatin","type":"Château","periode":"XVII","histoire":"CORMATIN, cité au XIIIe siècle par une maison forte  qui sera remplacé par un château qui prit le nom du village  en 1600 par Antoine du Blé, baron d'Huxelles gouverneur de Châlon, qui embrasse une carrière des armes au service du duc de Mayenne sa descendance de militaire très proche de la royauté par Marie de Médicis dont Louis XIII érigea le fief en marquisat,  le dernier baron Jacques ou Nicolas Blé  fut nommé maréchal de France en 1703  gouverneur d'Alsace et de Starsbourg en 1713 il décédera en 1730, le fief  passe à Henri-Camille, marquis de Berrnghem, écuyer et gouverneur de Chalon propriétaire du château de la Muette et de Madrid ensuite fut acquis par Gabriel Verne conseiller et secrétaire du roi qui le laissa à sa fille Mme Viard qui cette dernière épousa en seconde noce  Pierre Dezoteux \"Baron de Cormatin\" participa à l'indépendance américaine avant de devenir le chef de la chouannerie pendant la Révolution, emprisonné  sept ans libéré en 1802  décéda en 1812, sa femme Sophie Verne avait vendu après son divorce le château à Etienne Maynaud de Lavaut qui le revendit aussitôt à Joseph Salavin industriel lyonnais qui transforma une partie du château en usine mais dut abandonner reprit en 1815 par Maynaud de Lavaut  qui le laissa à son gendre  Charles Brosses, sa fille hérite en 1843 et en épousant Pierre Henri de Lacretelle lui transmet Cormatin, son fils Jacques de Lacretelle  écrivain académicien naquit au château. En 1898 la propriété est acquise par Raoul Gunzbourg directeur de l'opéra de Monte-Carlo qu'il finira par le laisser à l'abandon et racheté en 1984 par trois historiens d'art.  Aujourd'hui le château appartient à monsieur James Plain, récemment à Marc Simonet-Lenglart, c'est dans ce château que Lamartine a aimé Nina de Pierreclau. Dans la commune  le château de Chazelles qui à appartenu à la famille Percet Albert qui était conseiller du roi contrôleur au grenier de sel à Mâcon à la fin du XVIIIe siècle, aujourd'hui habité par ses descendants et le château  de la Garenne.","architecture":"Cormatin,  construit dans la vallée de la Grosne au début du XVIIe siècle, demeure en forme de U  flanquée d'un corps de logis principal  percé de fenêtres à meneaux  pavillon central  d'escalier  et deux gros pavillons latéraux à deux niveaux  en angles aux quels sont accrochés d'archaïques échauguettes, actuellement les deux corps de logis une aile au sud  s'est effondré lors de la transformation de cette dernière en usine, il reste la base d'un pavillon à gardé ses fenêtres à meneaux, et repose sur un soubassement important entouré de douves, des remparts qui feraient la cour d'honneur  ont été détruit à la fin du XVIIe siècle ainsi que le pont-levis.                                                         Chazelles, maison-forte, quadrilatère à corps de logis rectangulaire à deux niveaux  flanqué de pavillons  carrés  en angles.","habitants":"Famille d'Antoine du Blé\r\n        \"","divers":"Château de Cormatin et de Chazelle, de garenne, de la tour et de Tarzé","gps":"","images":["../image/image_71/71_Cormatin_1.jpg","../image/image_71/71_Cormatin_2.jpg","../image/image_71/71_Cormatin_3.jpg","../image/image_71/71_Cormatin_4.jpg","../image/image_71/71_Cormatin_5.jpg","../image/image_71/71_Cormatin_6.jpg","../image/image_71/71_Cormatin_7.jpg","../image/image_71/71_Cormatin_8.jpg","../image/image_71/71_Cormatin_9.jpg"]},"Consult_chateau_formulaire5aff":{"id":"Consult_chateau_formulaire5aff","dept":"71","canton":"Couches","commune":"Couches","nom":"Couches","type":"Forteresse","periode":"XV","histoire":"COUCHES, dit \"château de Marguerite de Bourgogne\".  Au Xe siècle le fief  relève des comte de Chalon, au XIe siècle première construction d'un massif donjon carré par Gaudry seigneur, passa ensuite au XIIe siècle à Hugues seigneur de la Roche-Nolay qui accroîtra considérablement la surface du château  et y maria sa petite fille Marie de Bauffremont à Etienne de Montaigu, descendant direct du duc de Bourgogne Hugues III.  Marie de Bauffremont  donna asile à Marguerite de Bourgogne épouse  de Louis X  le Hutin.  Au XVe siècle Claude de Montaigu le dernier du nom, chevalier de la toison d'or en 1468 avec son épouse  Louise de la Tour-d'Auvergne firent de nombreuses transformations, en 1470 à la mort de Claude tué au combat à Buxy le château passe à son cousin Claude de Blanzy s'opposant au duc de Bourgogne en 1477 le château est assiégé par les troupes du roi de France le duché de Bourgogne est rattaché à la couronne  et  c'est au XVIe siècle que le château passe aux Rochechouart et aux  d'Aumont au XVIIe siècle, à ces derniers se succèdent, les Siry et les Montagu après la Révolution et en 1946 par M. Léonard Cayot toujours dans sa descendance.                                                     Le château de MARDOR, à Couches, fait partie de ces bâtiments au destin bien particulier. Résidence des Montagu, il est donné en 1919 à la société de secours aux blessés militaires qui le transforme en sanatorium. Il deviendra ensuite le centre Croix-Rouge de médecine physique et de réadaptation que nous connaissons aujourdhui.\r\nSt-GERVAIS sur Couches; Forteresse de Sautrone ou de Sauturnes, forteresse de plaine à plates formes quadrangulaire ou ovalaires, fortifiée au XVe siècle et ayant appartenue au chancelier Nicolas Rolin.                                                                                   Dans la commune plusieur châteaux viticole dont celui de Montpatey et le domaine de Bouthenet.","architecture":"Couches, sur un monticule rocheux, la forteresse de Marguerite de Bourgogne; enceinte médiévale avec  un donjon massif carré du XIIIe siècle,  les bâtiments sont  doublés au XIIe siècle avec pont levis, au XIIIe siècle l'assise du château est élargie, de nouveaux remparts  avec tours de défense quinze au départ  avec passages souterrains, deux tours rondes en angles de la première enceinte, Des remaniements au XVe siècle le donjon reçoit des mâchicoulis et une tourelle pour des escaliers à vis, et la chapelle du XIe siècle est remplacée. Au XVIe siècle les ravins sont comblés place à des terrasses. Ce château subit plusieurs assauts pendant les guerres de religion et des destructions à la Révolution qui entraînèrent de nouveaux remaniements et un bâtiment d'habitations. \"La Tour Bajole\" bâtie au XIIe siècle pour servir de monastère.","habitants":"Marguerite de Bourgogne\r\n        \"","divers":"Château de Couches, de mardor, de Monpatay, des templiers, la tour Bajole et la tour Guerrin","gps":"","images":["../image/image_71/71_Couches_1.jpg","../image/image_71/71_Couches_2.jpg","../image/image_71/71_Couches_3.jpg","../image/image_71/71_Couches_4.jpg","../image/image_71/71_Couches_5.jpg","../image/image_71/71_Couches_6.jpg","../image/image_71/71_Couches_7.jpg","../image/image_71/71_Couches_8.jpg","../image/image_71/71_Couches_9.jpg"]},"Consult_chateau_formulairef2fd":{"id":"Consult_chateau_formulairef2fd","dept":"71","canton":"Charolles","commune":"Ozolles","nom":"Crary","type":"Château","periode":"XVIII","histoire":"CRARY, en Mâconnais, était un fief mouvant de la châtellenie royale de Bois-Sainte-Marie et propriété de la famille de La Souche, originaire du Bourbonnais et dont furent Antoine, Seigneur de Crary en 1462, Pierre, major au régiment d'Aligny en 1682, Gilbert, mousquetaire du roi en 1736, François de Neuville, duc de Villeroy, gouverneur de Lyon, héritier des Lesdiguières. Il fut ensuite vendu, au prix de 90 000 livres à Louis de Foudras, comte de Château Thiers, à Matour. En 1771, Pierre Emmanuel Dumyrat, seigneur de la Malinière en Forez devient acquéreur de Crary, le Coté et Colombier moyennant 350 000 livres.\r\nAu milieu du siècle dernier, un mariage fait passer les châteaux de Crary et Ozolles à la famille des Tournelles puis à la famille de Boisset.\r\nAujourd'hui, Crary est un haut lieu de réceptions en Bourgogne du Sud.","architecture":"A la frontière de la Bourgogne Sud et du Haut Beaujolais, le Château de Crary est un endroit privilégié pour magnifier chaque instant de votre réception, privée ou professionnelle, dans un cadre chaleureux et verdoyant, le domaine de Crary révèle une nature exaltante dans un domaine de 10 hectares de prairies, de bois et de lacs, le parc offre une vue panoramique sur le lac du château et les Monts du Brionnais, le potager du château, sa cour et son jardin à la française en font un domaine au charme authentique.","habitants":"Famille de La Souche\r\n        \"","divers":"Château de Crary","gps":"","images":["../image/image_71/71_Crary_1.jpg","../image/image_71/71_Crary_2.jpg","../image/image_71/71_Crary_3.jpg","../image/image_71/71_Crary_4.jpg"]},"Consult_chateau_formulaire24e4":{"id":"Consult_chateau_formulaire24e4","dept":"71","canton":"Toulon-sur-Arroux","commune":"Génelard","nom":"Croix_Genelard","type":"Château","periode":"XVIII","histoire":"CROIX-GENELARD; un premier château, situé au Nord du village, au lieu-dit Laugères, en 1435 appartient à Jean-Aymard de Busseul, originaire de Moulin-l'Arconce.\r\nFrançoise de Laubespin, veuve de Charles-Antoine de Busseul, épouse en 1613 Jean IV d'Amanzé, gouverneur du château de Bourbon-Lancy, au début du XVIIIe siècle, les d'Amanzé vendent la propriété à Jean-David de Ganay son fils , Étienne de Ganay, cède en 1730  le château à Paul-Étienne Mayneaud de la Tour qui va raser la vieille forteresse et bâtir un nouveau château sur un autre emplacement, achèvement de la construction  en 1744.\r\nAdèle Mayneaud de Pancemont apporte en 1811 la propriété en dot à Camille, comte de Tournon, chambellan de l'Empereur.\r\nAgrandissements du château  a partir de 1822 et à la mort du comte en 1835, sa fille, Amélie de Tournon, épouse Charles-Philippe de Croix dont les descendants ont conservés la propriété jusqu'à nos jours  achèvement des travaux en 1841,  à la même époque, plantation d'un parc à l'anglaise vers 1875 , les décors extérieurs et intérieurs sont refaits, des communs sont construits pour abriter un élevage de chevaux, un pigeonnier et un moulin. Aujourd'hui propriété de monsieur de Croix comte, a été signé dans ce château le traité de Tilsitt.","architecture":"Croix au Génelard, le château  du  début  du XXe siècle bâti en pierre jaune et couvert d'ardoise, est formé d'un corps central de plan rectangulaire flanqué de deux ailes en légères avancées  sur chacune des façades, au centre se détache, précédé d'un degré de quelques marches, un avant-corps de trois travées couronné d'un fronton triangulaire qui orne les façades.\r\nLes communs en  L sont précédés, à l'est, par un pavillon de plan presque carré, à l'aile ouest, en retour d'équerre, est adossé un portique qui donne accès aux écuries, dans un angle de la cour, encadré sur deux côtés par les communs, se dresse un petit pigeonnier polygonal. Dans le parc subsiste une tour circulaire dite pavillon, des travaux de restauration furent effectués de 1901 à 1905.","habitants":"Famille de Paul-Étienne Mayneaud de la Tour\r\n        \"","divers":"Château de la Croix-Génelard et de Laronze","gps":"","images":["../image/image_71/71_Croix_Genelard_1.jpg","../image/image_71/71_Croix_Genelard_2.jpg","../image/image_71/71_Croix_Genelard_3.jpg","../image/image_71/71_Croix_Genelard_4.jpg"]},"Consult_chateau_formulairea928":{"id":"Consult_chateau_formulairea928","dept":"71","canton":"Lugny","commune":"Chatenoy-le-Royal","nom":"Cruzille","type":"Château","periode":"XIV","histoire":"CRUZILLE, un château cité en 1366  dont le propriétaire est Ardouin de Nanton, passe en 1457 par alliance de la maison de Nanton à la maison de Saillant, il est vendu en 1557 à Françoise de Rubys, veuve de Claude Patarin. Dans la seconde moitié du XVIe siècle,  Denise Patarin, fille de Claude, apporte le château en dot à son mari, Nicolas de Bauffremont, seigneur de Sennecey. \r\nLa terre est érigée  en 1583 en comté pour Georges de Bauffremont,  et gouverneur de Mâcon  ayant terrorisé la contrée pendant les guerres de religions, et s'étant rallié très tôt à Henri IV, ce dernier dut affronter deux sièges et le château de Cruzille en sortit très endommagé. La terre est vendue en 1630  à Anne de Saulx, épouse d'André de Grimaldi. Au milieu du XVIIe siècle, le comté échoit à Claire de Saulx-Tavannes, épouse de Charles-François de La Baume-Montrevel, dont la famille restaure le château et construit des terrasses. La propriété passe en 1820 à une parente des de La Baume, Marie-Charlotte-Alexandrine de Lannay, épouse d'Hercule-Dominique de Tulle de Villefranche, député de l'Yonne et pair de France. Dans ce château est installé le quartier général des maquis de Saône-et-Loire  pendant la dernière guerre.  Aujourd'hui, il  abrite un institut médico éducatif, propriété de  la Fédération des Oeuvres Laïques.","architecture":"Cruzille, le château primitif était un quadrilatère cantonné de tours rondes en bossages et logis du XVe siècle, l'aile occidentale et la tour Sud-Ouest ont sans doute disparu dans les combats de la fin de XVIe siècle, l'aile orientale subsiste, flanquée de deux tours rondes. La tour du Nord-Est repose, de même qu'une partie du bâtiment, sur une base taluté, l'aile Nord, comprise entre cette tour et une troisième, découronnée, a subi bien des outrages, elle conserve un bel escalier de pierres à volées droites et est percée d'un portail en plein cintre.                                                                 Dans la commue le château du Bois de Brais.","habitants":"Famille d'Ardouin de Nanton\r\n        \"","divers":"Château de Cruzille, de Chareconduit et l'orangerie","gps":"","images":["../image/image_71/71_Cruzille_1.jpg","../image/image_71/71_Cruzille_2.jpg","../image/image_71/71_Cruzille_3.jpg","../image/image_71/71_Cruzille_4.jpg","../image/image_71/71_Cruzille_5.jpg","../image/image_71/71_Cruzille_6.jpg","../image/image_71/71_Cruzille_7.jpg"]},"Consult_chateau_formulaire55cb":{"id":"Consult_chateau_formulaire55cb","dept":"71","canton":"Cuiseaux","commune":"Cuiseaux-Champagnat","nom":"Cuiseaux","type":"Château","periode":"XIV","histoire":"CUISEAUX, Champagnat possédait la baronnie de Clairvaux. Renaud de Cuiseaux, chevalier, il était le témoin en 1131 de la fondation de l'abbaye Notre-Dame du Miroir par Humbert de Coligny.\r\nPonce Ier qui suit, Henry, religieux de l'abbaye d'Abondance en 1172, sire de Cuiseaux, de Clairvaux, de Branges et de Vire-Châtel, il engageait en 1172  Burchard, abbé de l'abbaye d'Abondance, à recevoir Henry, son frère, comme religieux,  Ponce II de Cuiseaux, sire. En 1204 il faisait plusieurs dons à l'abbaye de Balerne, en particulier le moulin de Mont-Olivet.  En 1207 il approuvait les dons  fait par son père à l'abbaye d'Abondance, il reprenait en fief en 1227 Mont-Saint-Sorlain, Clairvaux et Vire-Châtel et en rendait hommage à Gaucher Ier de Broyes-Commercy, Il épousait Laurence de Senecey, dame de Bar-sur-Seine, son petit-fils Ponce III,  fondait la branche de Clairvaux, Alix, femme d'Amédée II de Coligny.\r\nHugues de Cuiseaux, chevalier, il faisait plusieurs donations à l'abbaye Notre-Dame du Miroir,  il épousait Agnès, fille de Ponce de Mont-Saint-Jean, seigneur de Charny, leur fils Jean de Cuiseaux, sire  En 1255 il confirmait les aumônes que Ponce de Cuiseaux avait fait à l'abbaye de Balerne, il épousait Catherine de Montluel, fille d'Humbert de Montluel, ils eurent  Jean II de Cuiseaux, sire de Cuiseaux et de Branges, damoiseau, il mourrut vers 1317 sans postérité.\r\n Dans la commune de Champagnat  les vestiges du château de Chevreaux, le château de Brouhcy , la Croix d'Arignat, des loges, de Charmeilles à un parc aménagé en village de vacances.","architecture":"CUISEAUX; Des anciens remparts donnant  vers le sud avec la présence d'une porte du verger, des fenêtres à meneaux et des croisillons gothiques les bâtiments, la maison de l'aumône, le château des princes d'Orange, des maisons à arcades  et l'hôtel Puvis de Chavannes à échauguettes, les vestiges du château de Chevreaux qui surplombent le bourg  ou tout les ans se passent  des représentations chevaleresques. Depuis son origine, en 1789, le parc a été sensiblement agrandi, puis remanié à plusieurs reprises et il est encore aujourdhui en cours de réaménagement. A partir de 1865 il couvre 4 ha avec une partie à la française, une partie à langlaise, une zone arborée protégée plantée de nombreux arbres centenaires dont un magnifique cèdre, et un vaste potager.","habitants":"Famille de Cuiseaux\r\n        \r\n        \"","divers":"Château des prince d'Orange, de Brouchy, de Carignat, de Chevreaux (39) et les remparts de Chermailles","gps":"","images":["../image/image_71/71_Cuiseaux_1.jpg","../image/image_71/71_Cuiseaux_2.jpg","../image/image_71/71_Cuiseaux_3.jpg","../image/image_71/71_Cuiseaux_4.jpg","../image/image_71/71_Cuiseaux_5.jpg","../image/image_71/71_Cuiseaux_6.jpg","../image/image_71/71_Cuiseaux_7.jpg","../image/image_71/71_Cuiseaux_8.jpg","../image/image_71/71_Cuiseaux_9.jpg"]},"Consult_chateau_formulairee20b":{"id":"Consult_chateau_formulairee20b","dept":"71","canton":"Cuisery","commune":"Cuisery","nom":"Cuisery","type":"Château","periode":"XV","histoire":"CUISERY, dès le XIe siècle, les sires de Bagé, puissants seigneurs de la région en furent les châtelains.  En 1272 suite à un mariage d'une demoiselle de Bagé avec Amédée V de Savoie, la ville devient savoyarde. Mais en 1289, châtellenie relevant du comté de Savoie, rattachée au duché de Bourgogne au XIIIe siècle.\r\nSaccagée en 1478 par Craon, lieutenant de Louis XI, en 1568 par les protestants, en 1652 par les soldats de Condé. Elle redevient bourguignonne suite à un échange de terre. Marie-Guillaume Daumas (1763-1838), général des armées de la République et de l'Empire.\r\nJules Bourcier (1797-1873), ornithologue.\r\nOn retrouve aux XVIe siècle et XVIIe siècle siècles des « capitaines-châtelains » portant le nom de « De Gaulle » à Cuisery, en particulier Nicolas et Gaspard De Gaulle, ce dernier fut qualifié par le roi Charles IX de « chevalier » et délégué du bailliage de Châlon-sur-Saône, aux états généraux de Blois en 1576. Leurs descendants émigrèrent en Champagne et furent les ancêtres du Général De Gaulle, (Selon la généalogie officielle du Général De Gaulle qui reste cependant à vérifier)\r\nFrançois L'Huillier de Hoff (1759-1837), militaire, le château passe  à la famille  Tupinier  de père en fils, Jean Tupinier (1753-1816)  homme de loi et juge-bailli de Tournus, membre du Directoire du Département.\r\nJean Tupinier, baron, (1779-1850) après l'École Polytechnique, il entre dans le Génie maritime et sera ministre de la marine sous Louis-Philippe Ier.\r\nGaston Bussière, peintre symboliste et illustrateur, notamment de Balzac, Gautier et Flaubert y séjournèrent.","architecture":"Cuisery, Bourg sur un promontoire, tour circulaire ruinée de l'ancien château fort du XIIIe siècle.\r\nChâteau de Montrevost remanié XIXe siècle, aile Renaissance et au XVIIe siècle, six tourelles.  La foudre a incendié une tour du château de La Motte du  XIXe siècle.\r\nChâteau de La Bâtie à Fontaine Couverte du XIXe siècle.\r\nChâteau de La Villeneuve, ancien grenier à sel du XVe siècle.\r\nLa Tour, ruine du château féodal des seigneurs de Bagé.","habitants":"Famille de Marie-Guillaume Daumas\r\n        \"","divers":"Vestiges féodals deu château de Cuisery, de la tour, de la Bâtie et de Montrevost","gps":"","images":["../image/image_71/71_Cuisery_1.jpg","../image/image_71/71_Cuisery_2.jpg","../image/image_71/71_Cuisery_3.jpg","../image/image_71/71_Cuisery_4.jpg"]},"Consult_chateau_formulaire64ac":{"id":"Consult_chateau_formulaire64ac","dept":"71","canton":"Cluny","commune":"Curtil-sous-Buffieres","nom":"Curtil_sous_Buffieres","type":"Château","periode":"XVII","histoire":"CURTIL-sous-Bouffières, lorigine féodale est déjà citée dans les chartes de Cluny entre 1049 et 1100 où apparaissent un certain Bernard de Curtillis, chevalier, et son fils Robert. De plus au nord du cimetière on croit reconnaître une motte castrale, il y aurait eu un seigneur à Buffières, même si nulle trace ne subsiste d'un château fort. était habité autrefois par des moines espagnols, comme l'indique l'inscription du grand portail HVESPES-Y-PECE-ALLOS-TRES-DIAS-HYEDE. traduction  (les hôtes  comme les poissons, au bout de trois jours  sentent mauvais). Cest dans la cour du château que les eaux de Saint Genest ( Saint patron de léglise paroissiale ) aux propriétés bien heureuses jaillissent  limpides, outre de guérir de la fièvre, des rhumatismes et du rhume, elle donnait du lait aux nourrices. Ces eaux furent lobjet dun culte particulier le 15 août jusquau début du XXe siècle.","architecture":"Curtil-sous-Bouffières,  le château est composé dune bâtisse datée de 1624 et dun manoir moderne de la fin XIXe siècle. Lélégance des vestiges de la construction, visibles depuis la route de Charolles, vient des lucarnes à fronton triangulaire et de la tour ronde au toit en poivrière.\r\nLoriginalité anecdotique de lédifice réside surtout dans le prolongement de la tour par un portail en plein cintre  gravée en vieil espagnol.","habitants":"Famille de Bernard de Curtillis\r\n        \"","divers":"Château de Curtil et de Savignon","gps":"","images":["../image/image_71/71_Curtil_sous_Buffieres_1.jpg","../image/image_71/71_Curtil_sous_Buffieres_2.jpg","../image/image_71/71_Curtil_sous_Buffieres_3.jpg"]},"Consult_chateau_formulaire69b2":{"id":"Consult_chateau_formulaire69b2","dept":"71","canton":"Paray-le-Monial","commune":"Volesvres","nom":"Cypierre","type":"Château","periode":"XV","histoire":"CYPIERRE, une maison forte cité  en 1262 possédée par Guillaume de Cypierre qui la tient en fief, au début  du XVIe siècle, la terre échoit par alliance à Pierre de Marcilly, qui ajoute à son nom celui de Cypierre. \r\nAu milieu  du XVIe siècle, le fils de Pierre, Philibert de Marcilly, bailli d'Autun, acquiert de son frère, Pierre de Marcilly, évêque de cette cité, le château et la baronnie de Thoisy et devient gouverneur du futur roi Charles IX. \r\nÀ l'extinction de la lignée des Marcilly  en 1628, le château est vendu aux Legoux de La Berchère,  en 1639  ceux-ci le revendent à Jean Boyveau ,  au  début XVIIIe siècle  la seigneurie passe aux Perrin, Marguerite Perrin de Cypierre épouse en 1849  le fils du général de Caulaincourt duc de Vicence, dans la seconde moitié du XIXe siècle  leur fille s'unit à Pierre de Kergolay, aujourd'hui propriété de la Baronne D. de Bastard.","architecture":"Cypierre, la construction comprend quatre parties, un donjon de plan massé, en grande partie du XIVe siècle, élevé sur une motte forte, une tourelle d'angle du XVIe siècle, de plan carré loggia renaissance et comprenant un escalier à vis, un corps de bâtiment élevé au XVIIIe siècle compris dans l'angle formé par la tourelle et le donjon, un autre corps de bâtiment, de plan barlong, daté de 1823, accolé en partie au donjon et à  la tourelle qui a été endommagé en 1944 par les maquisards. Une terrasse et un escalier à deux volées droites avec repos desservent la façade est du premier bâtiment, ces ajouts successifs ont peu à peu entamé la motte du XIe siècle.\r\nDes dépendances s'élèvent à l'est autour d'une cour ouvrant au nord par un portail à porte charretière supportant un pigeonnier datant de 1831, une tourelle supportant deux bretèches est enclavée dans les bâtiments d'exploitation, avec le donjon, elle constitue le seul vestige du système de défense du château.","habitants":"Famille de Guillaume de Cypierre\r\n        \"","divers":"Château de Cypierre","gps":"","images":["../image/image_71/71_Cypierre_1.jpg","../image/image_71/71_Cypierre_2.jpg"]},"Consult_chateau_formulaireb437":{"id":"Consult_chateau_formulaireb437","dept":"71","canton":"Chagny","commune":"Demigny","nom":"Demigny","type":"Château","periode":"XVIII","histoire":"DEMIGNY, en 1254 fief d'Hugues IV duc de Bourgogne qui en fit don à l'un de ses chevaliers Guy de Vacheret, ce dernier fit construire une maison forte sur un terrain quadrilatère cantonné de tours est restera dans cette famille jusqu'en 1431. Guillaume de Vienne seigneur de Demigny en prend possession, qui sera partagé ensuite entre les familles de Vienne et de Malain et sera réunifiée au début du XVIIe lorsque les Foissy héritent la part des Vienne et rachèteront les part à Esme de Malain seigneur de Lux,  l'ensemble passe par alliance lors du mariage de Jeanne de Foissy à Philippe d'Andelot,  toujours par alliance passera à Louis de Foudras avec Anne d'Andelot en 1669 que sa descendance gardera le château jusqu'au XIXe siècle. Louis de Foudras colonel de cavalerie dans l'armée des princes dut émigrer à la Révolution, en Silésie il épousera en seconde noce Marie-Antoinette de Schlengenberg veuve du comte de Frakenstein qui lui apporte en dot une importante fortune, ils eurent un fils Théodore-Louis-Auguste qui  prendra le titre de marquis de Foudras et fera reconstruire le château en 1805, puis il cédera la propriété en 1839 à Monsieur Brémond qui lui s'en défait en 1853, le vendit à monsieur Jean-Baptiste Guimet inventeur et industriel lyonnais, dont leur fils Emile Guimet célèbre orientaliste, le château est vendu aux Leflaive  et en 1952 aux Malibran-Santibanez aujourd'hui madame Boilard née Malibran en est toujours propriétaire.","architecture":"Demigny, il ne reste plus rien de la première maison forte le château fut complètement reconstruit en 1805 dans un style classique, corps de logis principal de plan rectangulaire à trois niveaux , deux pavillons rectangulaires en saillit sur façade aux extrémités, un avant corps surmonté d'un fronton à oculus  et d'un balcon reposant sur des consoles.","habitants":"Famille de Guillaume de Vienne\r\n        \"","divers":"Château de Démigny","gps":"","images":["../image/image_71/71_Demigny_1.jpg","../image/image_71/71_Demigny_2.jpg","../image/image_71/71_Demigny_3.jpg","../image/image_71/71_Demigny_4.jpg"]},"Consult_chateau_formulaire2561":{"id":"Consult_chateau_formulaire2561","dept":"71","canton":"Couches","commune":"St-Martin-des-Communes","nom":"Digoine","type":"Château","periode":"XIV","histoire":"DIGOINE, le château de Digoine fut construit vers 1233 par le seigneur Thibaut, et ses descendants réussirent à résister aux différentes attaques du duc de Bourgogne, Charles de Montago. Le duc qui contrôlait alors le village voisin de Couches, ne pouvait accepter la résistance du château de Digoine. Vers 1400, le château devint la propriété du seigneur Guillaume de Damas. En 1446, pour combler d'énormes dettes, le Petit Digoine fut vendue  à l'homme noble Oudot de Malain. Cette date 1359, figurant sur le manteau d'une cheminée des cuisines, est le seul élément permettant actuellement de situer la construction du château.  Au  début  du XVe siècle, possession des seigneurs de Damas, vers 1548, la terre appartient aux Malain. Au XVIIe siècle et XVIIIe siècle , René de Loriol et son épouse Livie de Chandieu acquièrent le domaine. \r\nPar alliance en 1732 avec Marie-Nicole de Loriol-Chandieu, fille de Paul de Loriol-Chandieu, comte de Digoine, et petite-fille des précédents, le château passe au marquis Jean Prosper de Falletans.  Au début du  XIXe siècle, ruinés, les Falletans, vendent à un de leurs parents, le comte de Musy, qui va entreprendre des restaurations \r\nau  XXe siècle, le domaine échoit au petit-fils du précédent, le comte de Prunelé.","architecture":"DIGOINE-St-Martin des Communes  était à l'origine complètement entouré de douves. La construction comprend deux corps de logis en équerre, l'un, de plan rectangulaire allongé, est flanqué de deux grosses tours carrées et garni à l'angle Sud-Ouest d'une échauguette de style troubadour, l'autre, relié au premier par une tour polygonale, est de plan presque carré. Ce dernier bâtiment, qui résulte peut-être de l'aménagement au XIXe siècle d'un ancien donjon, est flanqué, sur son angle Sud-Ouest, d'une tour polygonale.                                                                              Les ruines féodales dans cette commune sont certainement celle du château cité il existe une maison forte du XIVe siècle.","habitants":"Famille de  Guillaume de Damas\r\n        \"","divers":"Château de Digoine","gps":"","images":["../image/image_71/71_Digoine_1.jpg","../image/image_71/71_Digoine_2.jpg","../image/image_71/71_Digoine_3.jpg","../image/image_71/71_Digoine_4.jpg","../image/image_71/71_Digoine_5.jpg","../image/image_71/71_Digoine_6.jpg"]},"Consult_chateau_formulairec187":{"id":"Consult_chateau_formulairec187","dept":"71","canton":"Palinges","commune":"Palinges","nom":"Digoine_Palinges","type":"Château","periode":"XVIII","histoire":"DIGOINE, à l'emplacement du château actuel existait au X-XIe siècle une forteresse des seigneurs de Digoine, le premier connu Liebaud de Digoine qui épousa en 1040 une fille de la maison de Beaujeu, dans la descendance  Robert de Digoine chambellan du duc de Bourgogne son frére Guillaume participèrent  aux croisades avec son fils furent tué  en 1356 au côté du roi de France Jean II le Bon à la bataille de Poitiers. Chrétien de Digoine conseiller et Chambellan périt décapité en 1481 sur ordre de Louis XI pour avoir pris parti  de Marie de Bourgogne. La seigneurie passera au XVe siècle par alliance  de  Robert de Damas  seigneur de Marcilly en épousant Anne de Digoine fille unique  de Chrétien de Digoine et la descendance conserveront le château jusqu'en 1707, le château  sera  vendu à François de Reclesne des Regards qui termineront  la construction dans les années 1770. Dans la moitié du XVIIIe siècle la comtesse de la Coste-Messelière fit élever la façade d'entrée avec deux pavillons latéraux en saillie et un avant corps central à fronton sculpté. Ce château passe au XIXe siècle au comte aimé de Chabrillan  officier d'ordonnance  de Napoléon Ier,  la comtesse de Moreton-Chabrillan  qui, fit édifier en 1842 dans un pavillon du parc un petit théâtre à l'italienne de 1844 à 1923 la tragédienne Sarah Bernhardt y donna des représentations. La propriété passe en héritage à la famille Borgone d'Ideville et en 1908  vendu au comte Pierre de Croix ancêtre des propriétaires actuels, les d'Amarzit.                                                          \r\nDans la commune plusieurs châteaux dont celui de Beauregard et de Montet.","architecture":"Digoine, la forteresse fut remplacé par le château actuel  en plusieurs étapes une partie (façade nord) en 1710 et une autre partie (façade sud) en 1770 reconstruit malgré un incendie, corps de logis rectangulaire conservant sur la façade nord les deux tours cylindriques du château médiéval coiffées de dômes à lanternons, deux ailes  reliées aux tours un avant-corps au centre comportant un portique à colonnes ioniques au rez-de-chaussée et corenthien à l'étage entre ailes par un corps de logis à deux niveaux avec attiques  et un avant corps centrale en saillit avec fronton sculpté  et deux pavillons latéraux en saillit également.","habitants":"Famille de Chrétien de Digoine\r\n        \"","divers":"Château de Digoine-Palinges, de Poujoux et de Beauregard","gps":"","images":["../image/image_71/71_Digoine_Palinges_1.jpg","../image/image_71/71_Digoine_Palinges_2.jpg","../image/image_71/71_Digoine_Palinges_3.jpg","../image/image_71/71_Digoine_Palinges_4.jpg","../image/image_71/71_Digoine_Palinges_5.jpg","../image/image_71/71_Digoine_Palinges_6.jpg","../image/image_71/71_Digoine_Palinges_7.jpg"]},"Consult_chateau_formulaire6e78":{"id":"Consult_chateau_formulaire6e78","dept":"71","canton":"Givry","commune":"Dracy-le-Fort","nom":"Dracy_le_Fort","type":"Château","periode":"XVI","histoire":"DRACY-le-FORT; présence attestée dès le XIIe siècle d'un château fort. Succession de nombreux propriétaires  jusqu'au XVIIIe siècle.\r\nAcquit en 1740 par Jacques-Philippe de Fyot de Neuilly qui transforme le château, son fils devient en 1754 comte de Dracy, et en 1777  Voltaire envisage d'acquérir le domaine.","architecture":"Dracy le Fort, à l'est motte sur laquelle subsistaient les restes d'un donjon au début du XIXe siècle.\r\nLa construction du château comprend un grand corps de bâtiment flanqué à ses extrémités de deux tours carrées, au centre de la façade Ouest, se dresse une tour-porche rectangulaire en forte saillie et de même hauteur que les tours d'angle, cet ensemble a sans doute été bâti au XVIe siècle sur des fondations antérieures. Au XVIIIe siècle, en avant de la tour-porche, a été installé un large portail surmonté d'un fronton,\r\nun  passage voûté donne accès à une cour intérieure qui a presque entièrement conservé son aspect d'origine, elle est limitée par deux bâtiments parallèles implantés en retour d'équerre à partir des tours d'angle, l'un renferme au sous-sol une salle comprenant cinq travées de voûtes d'ogives reposant sur quatre piliers ronds et qui devait être le cellier, l'autre se prolonge jusqu'à une tour d'angle en ruines, reste probable de l'ancien donjon.\r\nDevant la façade, une grande allée de tilleuls donne au château une allure seigneuriale.","habitants":"Famille de Jacques-Philippe de Fyot de Neuilly \r\n        \"","divers":"Château de Dracy et de Villard","gps":"","images":["../image/image_71/71_Dracy_le_Fort_1.jpg","../image/image_71/71_Dracy_le_Fort_2.jpg","../image/image_71/71_Dracy_le_Fort_3.jpg","../image/image_71/71_Dracy_le_Fort_4.jpg"]},"Consult_chateau_formulaire7e92":{"id":"Consult_chateau_formulaire7e92","dept":"71","canton":"Couches","commune":"Dracy-les-Couches","nom":"Dracy_les_Couches","type":"Château","periode":"XVIII","histoire":"DRACY-les-COUCHES, le Château de Dracy est un château fort construit au XIIIe siècle, en 1298, dans le village de Dracy-lès-Couches, situé au sud-est de la côte de Beaune. De nombreuses familles se sont succéder à Dracy. En 1298 construction d'une forteresse  et en 1368  existence d'une seigneurie.  En 1402 Mort de Robert de Dracy.  En 1424 possession des seigneurs de Lugny . En 1462 La terre passe aux seigneurs de Monjeu. Morin de Cromey reconstruit le château en 1547.  La place en 1593, défendue par le maréchal Gaspard de Saulx-Tavannes, est assiégée et prise par le seigneur de Marnay. Possession en 1680  du marquis de Berbis.\r\nLa seigneurie passe en 1717 au marquis de Grammont.  Construction en 1728 de la cave par Jacques Bouchet, chapelain de Dracy. Ferdinand de Grammont en 1794, qui avait été emprisonné, est relâché à la suite d'une requête des habitants.\r\nLa propriété passe en 1830 aux comtes de Villers La Faye.                        A la fin du XIXe siècle, acquisition par le marquis de Laubespin, et en 1910 du comte Yvert de Saint-Aubin, puis  en 1965 du baron Joseph de Charette. Le domaine  viticole sétend sur 17 hectares et produit plusieurs appellations, y compris Pommard, Monthelie, Hautes Côtes de Beaune, Bourgogne rouge et Bourgogne blanc.","architecture":"Dracy les Couches, le château primitif comprenait un vaste quadrilatère de bâtiments entourant un donjon carré, les flancs Nord et Est ont été abattus ou fortement diminués à la fin du XIXe siècle, la cour d'honneur est ainsi largement ouverte sur le parc, mettant en valeur le donjon et la tour ronde du XVe siècle qui termine le long bâtiment du cellier demeuré intact. Les autres bâtiments formant l'aile Ouest ont été transformés extérieurement en accord avec les critères de goût en vogue au XIXe siècle, d'où une profusion de bâtiments d'élévations diverses, de tours, de tourelles, de toits de toutes formes et de lucarnes à hauts pignons.","habitants":"Famille du marquis de Grammont\r\n        \"","divers":"Château de Dracy les Couches","gps":"","images":["../image/image_71/71_Dracy_les_Couches_1.jpg","../image/image_71/71_Dracy_les_Couches_2.jpg","../image/image_71/71_Dracy_les_Couches_3.jpg","../image/image_71/71_Dracy_les_Couches_4.jpg"]},"Consult_chateau_formulairee48d":{"id":"Consult_chateau_formulairee48d","dept":"71","canton":"Autun","commune":"Dracy-St-Loup","nom":"Dracy_St_Loup","type":"Maison forte","periode":"XVII","histoire":"DRACY-ST-LOUP, les Noyers sont au XIIIe siècle seigneurs de Dracy. Dans la seconde moitié du XIIIe siècle, Jean Ier de Vergy devient seigneur de Dracy par alliance avec Marguerite de Noyers, fille de Mille de Noyers, Jean de Vergy vend la terre à Pierre d'Ostun, bailli d'Auxois, \r\nla terre, en 1377 confisquée a Symon d'Ostun, est acquise par Guy de La Trémoille, favori du duc de Bourgogne et chambellan du roi de France. Le précédent, en 1386 désormais baron de Dracy, fait rétablir la vieille maison forte. Etienne de Romans en 1529, fils de Philippe de Romans, écuyer, seigneur de Romans et de Planes sur Arroux, près de  Dracy-Saint-Loup, en Bourgogne, possède le château, il épousa en 1495, demoiselle Antoinette de Charamande, un descendant des La Trémoille en 1611, Tanneguy  Le Veneur, comte de Tillières vend le domaine au président Jeannin,  à partir de cette époque, la succession des propriétaires devient identique à celle des propriétaires du château de Montjeu. \r\nDe 1619 à 1622, construction du château entreprise par Pierre Jeannin et achevée par son gendre Pierre de Castille, ambassadeur de France, qui achète des terrains pour l'entourer de jardin. Au XVIIIe siècle, le château est affecté à un usage agricole par les Talleyrand.                                                                            Le château de La ROCHETTE  appartenait au chapitre de Saint-Vincent de Chalon qui y fit faire d'importantes réparations en 1406 et 1407. Les ravages que lui infligèrent les calvinistes amenèrent les chanoines à vendre ce fief, en 1592, à Louis de Rymon  et  François Royer. Louis de Rymon procéda  à une reconstruction presque totale. Sa nièce, Claude, ayant épousé Charles de Hénin-Liétard, le château resta entre les mains de cette  famille jusqu'en 1750, date à laquelle  il fut vendu à Claude-Philibert de La Vernette dont les descendants en furent propriétaires durant deux siècles. Il a été totalement restauré vers 1880.","architecture":"DRACY St-LOUP, maison forte de 1454 transformée en ferme. Les deux principales tranches de la construction, de 1619 et  de 1622, ont été dirigées par l'architecte Mercier. Il ne reste plus qu'un pavillon très délabré et  les deux bâtiments qui prolongeaient les pavillons et le portail, le corps de logis central et l'autre pavillon ont disparus, les fossés, formant aux angles des sortes de bastions, entouraient l'ensemble, et la cour était fermée par un mur, un pont de pierre donne accès au portail.","habitants":"Famille de Pierre Jeannin\r\n        \"","divers":"Château de Dracy-st-Loup","gps":"","images":["../image/image_71/71_Dracy_St_Loup_1.jpg","../image/image_71/71_Dracy_St_Loup_2.jpg","../image/image_71/71_Dracy_St_Loup_3.jpg","../image/image_71/71_Dracy_St_Loup_4.jpg"]},"Consult_chateau_formulaired680":{"id":"Consult_chateau_formulaired680","dept":"71","canton":"La Clayette","commune":"Curbigny","nom":"Dree_Curbigny","type":"Château","periode":"XV","histoire":"DREE, ce fut d'abord le fief  de la grande famille bourguignonne de Damas. Puis sous le règne de Louis XIII,  Charles de Blanquefort de Créqui  maréchal  et duc de Lesdiguières, ambassadeur à Venise en 1634 qui avait épousé Madeleine de Lesdiguières fille du Maréchal François de Bonne connétable de France, fit construire en 1620 le château sur des terres qu'il acheta  appelé  la \" Bazolle\" appartenant à Girard de la Magdeleine de Ragny.  A la mort de Charles en 1638 lors d'une campagne au fort de Brême en piémont, la construction s'arrêta et fut reprise dans la seconde moitié du XVIIe siècle par François de Créqui comme son père maréchal et duc de Lesdiguières, en 1703 sans postérité mâle le château passe à sa petite-fille Catherine de Villeroy qui avait épousé le prince Louis  de Lorraine comte d'Armagnac, à sa mort en 1743, ses héritiers vendent en 1748 le château au comte Etienne de Drée, qui fit érigé les terres en marquisat, le domaine restera dans cette famille jusqu'en 1837 et sera acquit par la famille de madame de Tournon Simiane, puis par héritage, passa aux Croix puis au Croÿ-Roeulx  et depuis 1995 à la famille Prouvost.","architecture":"Drée; cor
