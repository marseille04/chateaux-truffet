 fort de Louis d'Arpajon céda en 1670. A la place fut construite l'église actuelle qui subit les dernières transformations vers 1880. Puis le château des seigneurs dont il nous reste une tourelle accolée à un corps de logis à deux niveaux, située au centre du village.","habitants":"Famille de Séverac \r\n        \"","divers":"Maison forte d'Espeyrac","gps":"","images":["../image/image_12/12_Espeyrac_1.jpg","../image/image_12/12_Espeyrac_2.jpg","../image/image_12/12_Espeyrac_3.jpg","../image/image_12/12_Espeyrac_4.jpg"]},"Consult_chateau_formulaire623e":{"id":"Consult_chateau_formulaire623e","dept":"12","canton":"La Cavalerie","commune":"Rebourguil","nom":"Esplas_Rebourguil","type":"Maison forte","periode":"XIII","histoire":"ESPLAS,  ce château commande le village dEsplas qui est construit tout autour. En 1261, aux Brenguiers de Malemort il appartenait à la famille du Pont de Camarès, Esplas devint une baronnie comme celle de Camarès. une fille lapporta dans la maison de Malemort; elle le vendit en 1349 à Bernard de Martrin; cette famille en demeura propriétaire jusquen 1712. Après avoir appartenu successivement aux Béziat puis aux de Gaujal de Montalègre, la seigneurie passa, en 1759 dans la famille de Cambiaire qui conserva la propriété jusquen 1952, date à laquelle elle entra dans la famille dAlexandry. En 1952, le château est entré dans la famille d'Alexandry par le mariage de Henriette de Cambiaire avec le baron Osmen d'Alexandry.","architecture":"Le château d'Esplas qui fut assiégé vers 1375 par les Anglais, mais résista au siège, il est constitué dune enceinte carrée cantonnée de trois tours circulaires et dune tour carrée. Trois des quatre faces sont occupés par des bâtiments résidentiels, se présente sous la forme dun ensemble de quatre corps de logis liés par des tours, la tour nord, véritable donjon de forme carrée, présente des murs construits en dalles de 1,70 m dépaisseur. Les trois autres tours, cylindriques, sont de moindre dimension et furent tronquées à leur niveau actuel en 1793; elles étaient défendues, chacune, par 12 fusils, mais certaines meurtrières indiquent lusage antérieur darbalètes. Autrefois, il existait des fossés qui ont été comblés ; ils sont couverts aujourdhui darbres centenaires, Le donjon remonte au XIe ou XIIe siècle, trois des corps de logis au XIIIe siècle et, le quatrième, à la Renaissance. Cest au milieu de cette aile méridionale qua été percée, en 1618, la porte donnant accès à lintérieur du château; on pénètre dans la cour intérieure après être passé sous trois voûtes romanes en pierres rouges. En 2000, les actuels propriétaires ont entrepris des restaurations pour conforter les structures. Les éléments architecturaux propres à chaque époque seront également mis en valeur. Les fenêtres à meneaux du XVe siècle et les toitures en lauzes retrouveront leur état d'origine.","habitants":"Famille de Brenguiers de Malemort\r\n        \"","divers":"Maison forte d'Esplas","gps":"","images":["../image/image_12/12_Esplas_Rebourguil_1.jpg","../image/image_12/12_Esplas_Rebourguil_2.jpg","../image/image_12/12_Esplas_Rebourguil_3.jpg","../image/image_12/12_Esplas_Rebourguil_4.jpg","../image/image_12/12_Esplas_Rebourguil_5.jpg","../image/image_12/12_Esplas_Rebourguil_6.jpg","../image/image_12/12_Esplas_Rebourguil_7.jpg"]},"Consult_chateau_formulaire4e52":{"id":"Consult_chateau_formulaire4e52","dept":"12","canton":"Espalion","commune":"Estaing","nom":"Estaing","type":"Château","periode":"XIII","histoire":"Dans la commune trois châteaux, le château d'Estaing du XIII-XVe siècles, d'Hauterives du XVe siècle et le manoir  de Fabrègues du XIV-XIXe siècle.                                                                        ESTAING, château construit par les générations successives des comtes d'Estaing du XIe-XVIIIe siècle, puis maison-mère des religieuses Saint-Joseph d'Estaing de 1836  à 2000. Exposition permanente \"Valéry Giscard d'Estaing, un homme au service de la France et de l'Europe\". Un acte de Pierre d'Estaing archidiacre de Rodez en 1270 était scellé de cet écu d'azur à trois fleurs de lys, armes adopté par la dynastie de Valois un siècle plus tard. Le cardinal Pierre d'Estaing, ou encore François, évêque de Rodez et Charles-Henri, amiral de France, commandant de la flotte française envoyée pour soutenir la guerre d'indépendance des États-Unis, seraient également nés dans cette demeure, sous la première République, il fut saisi comme bien national et vendu par lots après que l'amiral d'Estaing (Ravel 1729-Paris 1794), dernier membre de la branche comtale de la famille d'Estaing, eut été guillotiné. En 1836, les religieuses de Saint-Joseph achetèrent le château pour en faire une maison  de retraite pour religieuses, une école et un lieu d'édification spirituelle. En 2000, elles décidèrent de le vendre. Olivier Giscard d'Estaing ayant été maire de cette de la commune de 1965 à 1977, les surs refusèrent une offre d'achat des deux frères Giscard d'Estaing. Les religieuses préférèrent vendre le château à la commune, qui fut contactée parallèlement par l'ancien président de la République, Valéry Giscard d'Estaing, et son frère, et qui la leur revendit cinq ans plus tard, en 2005. La population du bourg, comme le conseil municipal, était favorable à l'acquisition par les Giscard d'Estaing.     \r\nHAUTERIVES château du XVe siècles   pas d'information historique.                                                                                    HÔTEL LE MANOIR DE LA FABRÈGUES, authentique demeure du XVIe siècle située entre Estaing et Espalion, transformée en petit hôtel de charme complice de son environnement, dans l'esprit d'une maison d'hôtes de Laurent et Eric Petry.","architecture":"Estaing, le château est constitué de bâtiments de hauteurs différentes organisés autour d'une terrasse. Il est composé de plusieurs bâtiments remanié des XVe siècle, XVIe siècle et XVIIe siècle construits autour d'un ancien donjon carré coiffé d'une bulbe et flanqué de hautes échauguettes en surplomb, dont le sommet est cantonné de cinq tourelles et d'une couverture en forme de lanterne et d'une terrasse qui domine le Lot. Le pavillon d'entrée, le château et les terrasses sont les parties classées monument historique.                                                                                 Fabrègues, Authentique demeure du XV et XVIIIe siècle aux portes de l'Aubrac le long de la vallée du Lot, le manoir de  Fabrègues est aujourd'hui une grande maison de caractère qui garde de nombreuses traces du passé :  corps de logis à deux niveaux  en forme de S par deux autres  bâtiments en équerres, avec toitures de lauzes.                                                                            Hauterives château du XVe siècles corps de logis rectangulaires à deux niveaux et attiques  flanqué en façade d'une tour carrée imposante  ainsi qu'une tourelle carrée,","habitants":"Comtes d'Estaing\r\n        \"","divers":"Château d'Estaing, d'Hauterives et de Fabrègues","gps":"","images":["../image/image_12/12_Estaing_1.jpg","../image/image_12/12_Estaing_2.jpg","../image/image_12/12_Estaing_3.jpg","../image/image_12/12_Estaing_4.jpg","../image/image_12/12_Estaing_5.jpg","../image/image_12/12_Estaing_6.jpg","../image/image_12/12_Estaing_7.jpg","../image/image_12/12_Estaing_8.jpg"]},"Consult_chateau_formulaire0842":{"id":"Consult_chateau_formulaire0842","dept":"12","canton":"La Cavalerie","commune":"Mounès -Pohencoux","nom":"Falgous","type":"Manoir","periode":"XV","histoire":"FALGOUS,  du Moyen-Age, les périodes historiques anciennes sont mal connues, quelques sarcophages pourraient indiquer une présence durant le haut Moyen-Age, mais la plupart sont probablement datables du bas Moyen-Age vers le XIIe siècle. Plusieurs châteaux  ou demeures seigneuriales, Prohencoux, Frègeville, Falgous furent construits par les seigneurs locaux.  Seuls subsistent de nos jours ceux de Falgous dit de Prohencoux.  Appelé aussi château de Falgous est un château bâti à Mounes-Prohencoux, était habité au début du XVIIe siècle. Le château est privé et fermé au Public.","architecture":"Falgous ou Prohencoux. Le château du XVIIe siècle, a été construit sur les vestiges dun ancien château du XIIe siècle et fut partiellement démoli durant la Révolution, corps de logis quadrangulaire, flanqué de deux tours, l'une circulaire, l'autre carrée. La porte d'entrée est surmontée de trois corbeaux qui devaient supporter une bretèche. Devant cette façade s'étend une cour bordée à l'ouest par une aile coupée par des écuries, les  communs et chambres sont reliés par un porche en plein-cintre, le pigeonnier de plan carré et couvert de lauzes. Le rez-de-chaussée du château se compose de pièces voûtées. Les anciennes cuisines conservent leur aspect du XVIIIe siècle avec four à pain. Au premier étage, une pièce est ornée d'un décor en stuc.","habitants":"Seigneurs de  Falgous \r\n        \"","divers":"Château de Falgous","gps":"","images":["../image/image_12/12_Falgous_1.jpg","../image/image_12/12_Falgous_2.jpg","../image/image_12/12_Falgous_3.jpg","../image/image_12/12_Falgous_4.jpg"]},"Consult_chateau_formulaireb62a":{"id":"Consult_chateau_formulaireb62a","dept":"12","canton":"Saint-Geniez d","commune":"Saint-Geniez d","nom":"Falque","type":"Couvent","periode":"XVII","histoire":"FALQUE,   Situé à Saint Geniez d'Olt, le château de la Falque, érigé au XVIIe siècle est un ancien couvent. Le château de la Falque a connu plusieurs destinées,  au départ, cétait un hameau formé par trois propriétés et appelé « Les Mazes ». Pierre Falq a réussit à réunir les trois maisons et leur donna son nom : La Falque. Ensuite, un couvent fut fondé sous le nom de Bénissons-Dieu de la Falque et les religieuses ouvrirent un pensionnat déducation pour les demoiselles de grandes familles.\r\nEn 1678, le cloître  fut construit et en 1713 la chapelle. Survint la Révolution et les religieuses nétaient plus que quatre à vivre au couvent. Une nouvelle loi les chassa de leur asile et leurs biens furent attribués à la nation et ainsi disparut le monastère de la Bénissons-Dieu. Racheté ensuite par un particulier, ce domaine de la Falque est passé par les mains de plusieurs maîtres.\r\n Aujourd'hui  hôtel,   cette demeure a été restauré avec simplicité et modernité.                                                                                   Château Ricard, cette résidence de caractère est une ancienne demeure du XVIIe siècle, entièrement rénovée hôtel restaurant.","architecture":"Cet hôtel de charme de Saint-Geniez-dOlt, à 45 km de Rodez, est un ancien couvent du XVIIe siècle dont il a conservé le cloître, la chapelle.  Entièrement rénové,  le château de la Falque réussit Aujourdhui lheureux mariage de lancien et du contemporain. La beauté et le luxe de cet hôtel  raviront tous ses hôtes en recherche de calme et de nature.","habitants":"Famille de Pierre Falq \r\n        \"","divers":"Château de la Falque et de Ricard","gps":"","images":["../image/image_12/12_Falque_1.jpg","../image/image_12/12_Falque_2.jpg","../image/image_12/12_Falque_3.jpg","../image/image_12/12_Falque_4.jpg","../image/image_12/12_Falque_5.jpg","../image/image_12/12_Falque_6.jpg"]},"Consult_chateau_formulaire95e7":{"id":"Consult_chateau_formulaire95e7","dept":"12","canton":"Sévérac le château","commune":"Lavernhe","nom":"Favars","type":"Château","periode":"XVII","histoire":"FAVARS, le château se situe au hameau de St-Privat à 2km au sud ouest de Lavernhe, dans l'angle des deux monts. Elle était la propriété de la famille de Sigaud noble origine et présente depuis plusieurs générations avant la Révolution. Gaspard De Sigaud était juge royal à Lavernhe mais acquis aux idées révolutionnaires. Il fut tué lui et son frère par les Chouans de l'Aveyron en 1793.   La famille De Sigaud s'allia ensuite à la maison de Lescure puis à la famille Montély.  Aujourd'hui transformé en chambres d'hôtes par Richard Focken.","architecture":"Chateau de Favars, était en ruines et à l'abandon, remanié. De plan d'équerre avec corps de logis rectangulaire à deux niveaux et attiques  accolé d'un donjon à l'angle intérieur à toit pointu et  deuxième corps de logis à deux niveaux avec retour en équerre de dépendance.","habitants":"Famille De Sigaud\r\n        \"","divers":"Château de Favars","gps":"","images":["../image/image_12/12_Favars_1.jpg","../image/image_12/12_Favars_2.jpg","../image/image_12/12_Favars_3.jpg","../image/image_12/12_Favars_4.jpg","../image/image_12/12_Favars_5.jpg","../image/image_12/12_Favars_6.jpg","../image/image_12/12_Favars_7.jpg"]},"Consult_chateau_formulaire7a93":{"id":"Consult_chateau_formulaire7a93","dept":"12","canton":"La Cavalerie","commune":"Fayet","nom":"Fayet_Roque","type":"Château","periode":"XVI","histoire":"Deux châteaux au Fayet,  Fayet du XVIe siècle et  de la Roques du XVIe siècle.                                                                             FAYET,  c'est durant la première moitié du XVIe siècle que Tristan II de Clermont-Lodève ou l'un de ses fils fit construire le château de Fayet, en remplacement du château du Brusque, conçu comme résidence d'agrément occupant une place plus centrale dans les importantes possessions familiales. La baronnie de Brusque fut érigée en marquisat de Brusque-Fayet en 1610. Elle fut achetée peu avant la Révolution par François de Nougarède qui portera le titre de baron de Fayet. Bâti sur un tertre, le château de Fayet domine la vallée, position militaire en arrière du Rance et en contact direct avec lAlbigeois. Les premiers seigneurs de Brusque et Fayet furent les vicomtes dAlbi au XIe siècle, les vicomtes de Béziers et Carcassonne au XIIe siècle, les comtes de Toulouse au XIIIe siècle, puis les seigneurs de Castelnau Bretenoux au XIVe siècle. Vingt cinq ans plus tard, la fille de Guy de Castelnau, Jacquette de Clermont, épousa Jean V dArpajon, à la Révolution le château sort de la descendance de la famille d'Arpajon par une branche de la famille de la Rochefoucauld, passa ensuite à l'épouse du maréchal de Biron qui le revend peu de temps après à André-Simon de la Nougarède et s'en défait au profit des messieurs Soulas et Roques  qui sera racheté en 1930 par monseigneur Cabanel qui en fait un orphelinat  et colonies de vacances et  de nos jours le château de Fayet reprend vie, grâce à l'impulsion donnée par Pierre et Sophie Dussert  de Rougemont avec l'aide de l'association \"les amis du château de fayet\", au travers de nombreuses manifestations.\r\nROQUES,  appartient au mouvement de constructions castrales que connut le Rouergue au XVe siècle. appartient au cours des XVe et XVIe siècles aux Clermont-Lodève puis aux Comeilhan.","architecture":"Fayet est une résidence de plaisance où a séjourné Henri IV. Beau puits sculpté et armorié.  La dot servi à des travaux de restauration et dembellissement, en particulier la balustrade de pierre, ornée de deux harpes. Henri de Navarre, le futur Henri IV, a séjourné au château de Fayet.                                                                                                           Château de la Roque-Fayet,la construction s'échelonnent du XIIe au XVIIe siècles. L'origine de celui de la Roque semble remonter au XVe siècle, après la fin des hostilités de la guerre de Cent Ans. la demeure n'a quasiment rien conservée de ses origines médiévales. Autour de 1577, le bâtiment a été agrandi et remanié avec des fenêtres à meneaux et des défenses. Aux XVIIIe et XIXe siècles, le bâtiment est réaménagé et décoré pour en faire une demeure familiale. Il ne demeure que quelques restes de l'ancien château du XIIIe siècle et surtout sa tour cylindrique qui faisait donjon. Ce château date du XVIe siècle. Il n'a quasiment rien conservé de ses origines médiévales. Le château actuel fut bati sur les anciens bâtiments vers la fin du XVIIIe siècle. Le bâtiment d'origine semble réduit à une salle avec une tour et un escalier à vis, en saillie, formant un éperon, mais se terminant en forme carrée dans le haut. La canonnière porte la date de 1577,  l'ajout des éléments défensifs qui flanquent la façade Ouest comme la bretèche, l'élégante échauguette qui domine une douve entourant l'édifice sont de la même époque.","habitants":"Famille de   Clermont-Lodève                                                                Famille de  François de Nougarède \r\n        \"","divers":"Château du Fayet et de la Roques","gps":"","images":["../image/image_12/12_Fayet_Roque_1.jpg","../image/image_12/12_Fayet_Roque_2.jpg","../image/image_12/12_Fayet_Roque_3.jpg","../image/image_12/12_Fayet_Roque_4.jpg","../image/image_12/12_Fayet_Roque_5.jpg","../image/image_12/12_Fayet_Roque_6.jpg","../image/image_12/12_Fayet_Roque_7.jpg","../image/image_12/12_Fayet_Roque_8.jpg"]},"Consult_chateau_formulairea764-2":{"id":"Consult_chateau_formulairea764-2","dept":"12","canton":"Decazeville","commune":"Flagnac","nom":"Flagnac","type":"Château","periode":"XII-XX","histoire":"Deux château à Flagnac celui de la Griffoulière du XIXe siècle et les vestiges  de Pagax du XVe siècle,                                 GRIFFOULIERE,  le domaine appartenait au XVIIIe siècle à la famille Destruels. Le château de la Griffoulière est un édifice moderne de la fin du XIXe siècle dont les tours d'angle ont été rajoutées en 1886 par Louis Cardonnel de la Bessonie qui en était le propriétaire. Celles-ci sont couvertes en poivrières.\r\n PAGAX, la plus ancienne mention qui soit faite du château de Pagax remonte à 1259. Il fût érigé pour fixer l'autorité royale en cette région. Il faisait partie du patrimoine de la noble et puissante famille De Montarnal puis passa ensuite par héritage dans la famille de Moret. Jusquau début de XXe siècle, date à laquelle il appartenait à la famille Solanet. Il passa ensuite dans la famille Campargue vers 1925 à la suite dune vente aux enchères. C'est aujourd'hui la propriété de Christian Dessalles qui a entrepris des travaux de rénovation, dès 2005, année de son acquisition.","architecture":"Griffoulière, corps de logis  de plan carré à trois niveaux à toiture en croupes flanqués  de quatre tourelles en angles à toits en poivrières.                                                                                    Pagax, son architecture est typique des forteresses des XIIe et XIIIe siècles, avec un corps de logis de plan carré élevé sur 3 étages au-dessus d'un rez-de-chaussée aveugle, flanqué de 4 tours d'angles massives reliées par des mâchicoulis. À la Renaissance, cette forteresse fût remanié, et de grandes fenêtres à meneaux furent percées. Un imposant bâtiment annexe est de type défensif et comportait deux tours de guet opposées ainsi qu'un chemin de ronde. Il possédait un étage de plus qu'aujourd'hui. Accolée à ce bâtiment, existait jusque dans les années 1960 une chapelle dite « Saint Pierre » fondée en 1327. Cette dernière devint très importante dans le Rouergue et le Gévaudan proche et elle était connue par ses vastes possessions, par ses services et emplois militaires, par ses alliances distinguées qui lui donnaient des parentés avec les premières maisons du royaume.","habitants":"Famille De Montarnal                                                                         Famille Destruels\r\n        \"","divers":"Château de la Griffoulière et de Pagax","gps":"","images":["../image/image_12/12_Flagnac_1.jpg","../image/image_12/12_Flagnac_2.jpg","../image/image_12/12_Flagnac_3.jpg","../image/image_12/12_Flagnac_4.jpg","../image/image_12/12_Flagnac_5.jpg"]},"Consult_chateau_formulaire0b82":{"id":"Consult_chateau_formulaire0b82","dept":"12","canton":"Luc la Primaude","commune":"Flavin","nom":"Flavin","type":"Château","periode":"XIV-XVI","histoire":"Cinq châteaux à Flavin celui de Bouissou du XIVe siècle, de Brianne du XIXe siècle, de Gamarus du XIVe siècle avec donjon, celui de Veil-Vayssac du XVIe siècle et celui des Hyars( voir article).                                                                                   BOUISSOU,  ce château a appartenu à d'anciens seigneurs de Flavin. tenus ensuite  par les Méjanès, originaire du Rouergue, est une maison d'origine chevaleresque qui a formé plusieurs branches. Elle prouve depuis 1100, et a fourni constamment des officiers distingués au service de nos rois. Sous Louis XIV, elle comptait vingt-deux officiers de son nom dans les armées. Elle a fait ses preuves pour les pages, pour les divers chapitres et écoles militaires ou maisons royales de Saint-Cyr, et pour le chapitre de Lyon. Au XIVe siècle, Alric de Méjanès est juge-mage du sénéchal. Il assiste comme noble aux États de la province du Rouergue assemblés à Rignac en 1382. Nobles Pierre, Bertrand et Jean de Méjanès sont cités en 1433. Au XIXe siècle, Paulin de Méjanès est aumônier du roi Charles X puis vicaire-général du diocèse de Rodez.                                                                                          BRIANNE; Construit en 1880 par la famille Cazottes.\r\nGAMARUS Pas d'information historique.\r\nVIEIL-VAYSSAC,  le château de Viel-Vayssac a été construit au XVIe siècle, un écusson surmontant le porche en voûte porte la date de 1523. Le parc du château est classé et inscrit jardin d'agrément. La seigneurie de Flavin ne comprenait que le bourg et quelques terres autour; elle était resserrée entre Hyars, Garrigous, Junelles, La Garrigue, La Vayssière, Espessergues, Le Bouyssou et Viel-Vayssac, toutes possessions qui avaient leur seigneur direct.  Principales seigneuries : Méjanès, Larguiez, Flavin et Bouyssou, Randan, Veillac, Combettes, Trappes, la Raffatie, Junelles, la Vayssière.","architecture":"Au coeur d'un domaine de plus de 100 hectares, le château du Bouyssou a perdu ses tours d'angles et son caractère seigneurial d'autrefois. Sur une porte d'escalier intérieur on peut lire : 1619. Corps de logis rectangulaire à trois niveaux  toitures en croupes  accolés d'une tour ronde toitures en poivrières.\r\nBriane Construit en 1880 par la famille Cazottes : c'est une grande maison bourgeoise, corps de logis rectangulaire à deux niveaux et attiques avec une tour ronde à chaque aile toits en poivrières. Gamarus s'élève un donjon carré à mâchicoulis, seul vestige du château du XIVe siècle, avec au rez de chaussée des fresques murales remontant au XVIIe siècle.                                          Viel-Vayssac quadrangulaire à trois niveaux  flanqué de tourelles d'échauguettes sur encorbellement et d'une tour carrée. Un écusson au-dessus du porche en voûte porte la date de 1523.","habitants":"Familles des Méjanès\r\n        \"","divers":"Château de Bouissou, de Brianne, de Garamus, Veil-Vayssac et des Hyars","gps":"","images":["../image/image_12/12_Flavin_1.jpg","../image/image_12/12_Flavin_2.jpg","../image/image_12/12_Flavin_3.jpg","../image/image_12/12_Flavin_4.jpg","../image/image_12/12_Flavin_5.jpg","../image/image_12/12_Flavin_6.jpg","../image/image_12/12_Flavin_7.jpg","../image/image_12/12_Flavin_8.jpg"]},"Consult_chateau_formulaire9a1e":{"id":"Consult_chateau_formulaire9a1e","dept":"12","canton":"Rodez","commune":"Onet le château","nom":"Fontanges","type":"Château","periode":"XVI","histoire":"FONTANGES est connu comme un fief noble dès le début du XIIIe siècle. des droits seigneuriaux, dont jouit encore Géraud dEscorailhes, alors quil concède la seigneurie à Brenguier de Balaguier. Les descendants de ce dernier conservent Fontanges durant le XIVe siècle mais en partagent la possession avec la famille de Salles. Au début du XVe siècle, un certain Guillaume Aubert possédait le domaine de Fontanges et rend hommage au compte de Rodez en 1408 pour cette terre. De nouveau partagée à la décennie suivante, Fontanges revient pour un tiers au seigneur de Belcastel, Alzias de Saunhac, et pour deux tiers au chapitre de Rodez. Au milieu du XVIe siècle, la seigneurie appartient à Jacques dAustry, marchand de Rodez, qui la met en fermage auprès dAnthoine Guibert. Il semble que Jacques est remanié un logis à Fontanges au milieu du XVIe siècle, le contrat de fermage faisant référence en 1564 à une métairie déjà cossue. Ses successeurs, Raymond puis Jean en rendront hommage au comte de Rodez, jusquà la fin du XVIIe siècle. Cest à Raymond, fils de Jacques, que lon doit le château de Fontanges tel quil nous apparaît aujourdhui. Marchand drapier du bourg de Rodez, Raymond dAustry semble avoir pour résidence le domaine de Canaguet, contigu à celui de Fontanges qui était revenu à son frère. Cest à la mort de celui-ci que Raymond entreprend des travaux pour sinstaller à Fontanges. En 1654, la veuve de Jean d Austry qui fut président du présidial de Rodez, affermera le domaine et se réserva lhabitation. L'exploitation passa aux Chartreux puis aux Jacobins de Rodez qui laffermèrent régulièrement. Le domaine fut vendu comme bien national le 11 mars 1791. Aujourd'hui hôtellerie de monsieur Charrié.","architecture":"Fontanges du XVI-XVIIe siècles, existaient à la fin du XV et au début du XVI siècle dont la cuisine avec une cheminée en stuc. En 1564, séleva une bâtisse avec tour quon appela » la maison neuve de Fontanges ». Le château actuel fut bâti à la fin du XVI et au début du XVII. Austry y fit dresser la tour de cinq niveaux, tour conçue par le maître duvre Pierre Radegonde, dont le fils pose la première pierre le 22 janvier 1590.  Délaissant Canaguet que la peste avait durement touché, il détruit la « maison vieille » de Fontanges, bâtit un nouveau logis et remanie lensemble. La campagne de travaux à Fontanges entre 1590 et 1605,  la construction de plusieurs tours, de communs et de dépendances, dun logis et finalement dune petite maison du côté des communs, les importants remaniements qui transformèrent le château au XIXe siècle et surtout à la fin du XXe, limitent lobservation de létat  conservé du logis, de ses dépendances et de son environnement.  Les bâtiments, logis et dépendances, sont organisés au nord de la propriété, selon un plan en H, bordant les côté nord et sud dun quadrilatère divisé en deux espaces : lavantcour à lest et la cour, à louest. Lavant cour est bordée dune aile côté sud, dans la prolongation du logis et dune aile de communs au nord. Une haute tour de cinq étages marque bien le passage à la cour.","habitants":"Famille de Salles\r\n        \"","divers":"Château de Fontanges","gps":"","images":["../image/image_12/12_Fontanges_1.jpg","../image/image_12/12_Fontanges_2.jpg","../image/image_12/12_Fontanges_3.jpg","../image/image_12/12_Fontanges_4.jpg","../image/image_12/12_Fontanges_5.jpg","../image/image_12/12_Fontanges_6.jpg","../image/image_12/12_Fontanges_7.jpg"]},"Consult_chateau_formulaired60f-2":{"id":"Consult_chateau_formulaired60f-2","dept":"12","canton":"Espalion","commune":"Nayrac","nom":"Frayssinet","type":"Manoir","periode":"XVI","histoire":"FRAYSSINET, a été occupé en 1387, en même temps que le château de La Garinie, par les compagnies de routiers, mais ayant été repris par le comte de Rodez, il aurait été rendu à Arnaud Izarn. Catherine de Poujols, dame de Freyssinet, épouse Arcambal Izarn, damoiseau d'Entraygues qui meurt en 1389 en laissant pour fils Arnald. Arnaud Izarn, co-seigneur de Frayssinet, se marie en 1409. François Yzarn, qui épouse le 19 janvier 1494 Anne de Séguy, fille de Jean et de Marie de Corn de Sonnac, qui lui donne au moins un fils :  Antoine Yzarn, seigneur du Frayssinet, qui épouse le 25 janvier 1531 Gabrielle d'Hérail, fille de Vital, seigneur de Lugan et de Marquise de Morlhon, qui lui donne six enfants: Madeleine d'Yzarn de Freissinet, mariée à Antoine d'Arzac le 5 mai 1556,\r\nVital d'Yzarn, seigneur de Frayssinet, de Comac, de Golinhac, du Nayrac, de Pruignes, et de Servières, qui épouse le 29 janvier 1564 Jeanne de Thézan, fille d'Antoine, seigneur de Montcairols, et de Marquèze de Combret, qui lui donne huit enfants. Il fait reconstruire en 1582 le logis renaissance. Jeanne d'Yzarn, qui épouse Jean de Pouzols, Jean d'Yzarn, dit le capitaine Frayssinet, chef calviniste, Marie Marguerite d'Yzarn, Geneviève d'Yzarn, Tristan d'Yzarn de Freissinet, François Godefroi d'Yzarn de Freissinet (1663 - 1737), comte de Valady, baron de Servières, seigneur de Gonilhac, de Saint-Saturnin, de Saint-Laurens, de Muret, est fait marquis de Frayssinet en 1705. Il épouse le 26 février 1705 au château de Cropières Marie Elisabeth de Scorailles, fille d'Annet et de Charlotte de Pestels de Caylus.  Le château est pillé en 1793, son propriétaire est fusillé par les Jacobins.","architecture":"Frayssinet, logis renaissance qui a été construit en 1582 , sur des plans de Jacques Salvaing, maître d'uvre de la cathédrale de Rodez. Leurs armoiries se trouvent sur le linteau de la porte d'entrée de la grande salle, corps de logis en équerre toitures en croupes à deux niveaux flanqué d'échauguettes en angles toitures en poivrières, un second bâtiment, adossé au premier, a été construit au XVIIe siècle. Le château possédait une chapelle qui a été détruite pendant la Révolution, mais dont le très beau retable se trouve dans l'église paroissiale. La tour du château est tombée en ruine et l'état du bâtiment se dégrade depuis plusieurs années.","habitants":"Famille de Vital d'Yzarn de Freissinet\r\n        \"","divers":"Château de Frayssinet","gps":"","images":["../image/image_12/12_Frayssinet_1.jpg","../image/image_12/12_Frayssinet_2.jpg"]},"Consult_chateau_formulaireb092":{"id":"Consult_chateau_formulaireb092","dept":"12","canton":"Sébazac-Concourés","commune":"Gabriac","nom":"Gabriac_Thollet","type":"Château fort","periode":"XII","histoire":"Deux châteaux à Gabriac, celui de Ceyrac du XIIe siècle vestiges, celui de Tholet du  XIIIe siècle et celui de Perrières.                  CEYRAC,  pas d'information historique.\r\nTHOLLET, au XIe siècle, construction  au XIe siècle d'un château fortifié. il appartient à une famille de Thollet. Le château appartenu à la famille de Solages, et entre autres à Guillaume de Solages (1350-1418), qui en a été un des personnages marquants, combattant les Anglais et conseillant le Connétable d'Armagnac durant la guerre de Cent Ans. Au XVe et au XVIe siècle, les Barons de Thollet, successivement François de Solages I, II et III furent des personnages importants du Rouergue, et portèrent le titre de Sénéchal du Comté de Rodez. Le château change de propriétaires  durant six siècles : après les Solages  en 1626   Grolée-Viriville-Montbreton de Peyre. En 1665, le château est attaqué puis pillé. En 1679, le château est vendu à Jean François de Bessuéjouls-Roquelaure et en 1748, Hugues Albanque achète le domaine. Au XVIIIe siècle, par manque d'entretien puis à cause d'un incendie, le château est détruit. En 1764, dans le donjon, des consolidations et aménagements sont effectués. Une cheminée garde la trace de la date. En 1768, le château est possession de Marc Antoine de Gaujal, avocat, conseiller à la Cour de cassation et historien réputé du Rouergue a été propriétaire du château de Thollet au XIXe siècle, par héritage de son grand père qui l'avait acquis en 1768  seigneur de la Blaquière. Au XXe siècle, le château est possession de la famille Souyri.","architecture":"Le château du Thollet est une ancienne forteresse du Rouergue. Ce nom d'origine pré-celtique signifie \"petite hauteur\", est édifié dès le XIIe siècle et s'est achevée au XVIe siècle. Il conserve au sud-est une ancienne tour d'époque renaissance  Les étages sont desservis par un escalier de bois dans l'ancienne tour renaissance ainsi que par un large escalier à vis en pierre, logé dans une tour hexagonale, cette tour est élégamment percée par 3 fenêtres à traverses et meneaux.  En 1568, le château est partiellement modifié pour plus de confort, et un logis attenant remanié au fil du temps,  Il sera modifié deux siècles plus tard afin de lui donner plus d'importance. A quelques mètres du logis principal qu'elle protège au nord, une tour carrée du XIIIe siècle de style donjon s'élève à 27 mètres, malgré la dépose du parapet et des mâchicoulis intervenue dans la première partie du XXe siècle. Ce donjon, d'organisation classique avec six niveaux plus un chemin de ronde abrite au 4e niveau une salle seigneuriale avec sa cheminée médiévale, ses fenêtres géminées sont ouvertes sur 2 niveaux, et sa haute voûte en croisée d'ogives. Les niveaux 5 et 6 ont perdu leur plancher. Au XVIIIe siècle, par manque d'entretien puis à cause d'un incendie, le château est très détruit. En 1764, dans le donjon, des consolidations et aménagements sont effectués. Une cheminée garde la trace de la date.  En 1872, destruction volontaire des charpentes aux étages et de la galerie au sommet du donjon. Puis construction au rez de chaussée de la sépulture de Charles de Gaujal.                                                                                          Ceyrac  les vestiges du château, tour donjon remontant au XIIe siècle, sont situés à Ceyrac,  ce petit bourg possède également une église du XVe siècle avec deux clochers, la chapelle de la Salette, la croix de Saint-Hippolyte datant du XIVe siècle, les fontaines, les lavoirs et un pont médiéval sur le Dourdou.","habitants":"Famille de Marc Antoine de Gaujal\r\n        \"","divers":"Château de Ceyrac, detollet et de Perrières","gps":"","images":["../image/image_12/12_Gabriac_Thollet_1.jpg","../image/image_12/12_Gabriac_Thollet_2.jpg","../image/image_12/12_Gabriac_Thollet_3.jpg","../image/image_12/12_Gabriac_Thollet_4.jpg","../image/image_12/12_Gabriac_Thollet_5.jpg","../image/image_12/12_Gabriac_Thollet_6.jpg","../image/image_12/12_Gabriac_Thollet_7.jpg"]},"Consult_chateau_formulaire1eae":{"id":"Consult_chateau_formulaire1eae","dept":"12","canton":"Saint-Giniez d","commune":"Pierrefiche-d-Olt","nom":"Galinières","type":"Forteresse","periode":"XIV","histoire":"GALINIERES, était une \"Grange\" du monastère cistercien de Bonneval, et faisait partie d'une zone de domaines qui traversait tout le Causse Comtal et au delà. Le 13 avril 1168 l'évêque Hugues de Rodez, frère du comte de Rodez, fit donnation de sept mas d'exploitation sis au terroir de Galinières,  dont ceux de Versièges et Pérols. Le point de départ de la construction se situe au temps de la guerre de Cent Ans. l'abbé de Bonneval Rigal de Gaillac obtient du comte  d'Armagnac l'autorisation de fortifier Galinières  qui  joua un rôle important au moment des Guerres de Religion. La place parut suffisamment sûre pour que les Etats du Rouergue puissent s'y réunir en 1576 et décidèrent une trêve d'un mois avec les protestants du sud du Rouergue. il y eu de nombreux fermiers riches propriétaires terriens tel que  Clausel de Oussergues, Ignace Girou, Jean pierre de Séguret, famille Baldit. A la Révolution, le domaine fut nationalisé comme bien écclésiastique, et rapporta à l'état une somme record pour l'Aveyron. Les propriétaires actuels furent en 1791 la famille  Ayral du Bourg, en 1870 à  la famille de Glandy, à Emmanuel Payrac  et aujourd'hui à monsieur et madame Denoual.","architecture":"Visite guidée du château de Galinières. Cet château, ancienne grange monastique de l'Abbaye de Bonneval, conjugue trois architectures : militaire, religieuse et civile.  L'édifice est un bâtiment des XIVe et XVe siècle,  très bel exemple d'architecture militaire qui reproduit trois fois le modèle du château seigneurial du Moyen-Age, avec salle et tour. La construction du donjon, une tour-grenier de plan carré, débute dès 1371, comprend une salle et une grande tour à contrefort  réunit une salle et une autre tour carrée avec archère et mâchicoulis. Au deuxième étage, se trouve la chambre dite de lAbbé où subsiste un décor peint évoquant des sarments de vigne. Le troisième, parallèle au premier, est du XVIe siècle. La tour ronde, qui protège l'escalier, n'a plus ici qu'une fonction symbolique. Ces trois ensembles sont quasi inchangés depuis leur origine. Dans la basse-cour, le logis du garde-bois est adossé aux fortifications; on y remarque une porte en arc brisé, une fenêtre gothique et des baies à cour-sièges.  Le bâtiment qui abrite la bergerie est composé darcs diaphragmes.  Laire de battage date du début du XVIIe siècle. Des fontaines, des maisons destinées au personnel de la ferme complètent lensemble.","habitants":"Evêque Hugues de Rodez\r\n        \r\n        \"","divers":"Forteresse de la Galinières","gps":"","images":["../image/image_12/12_Galinieres_1.jpg","../image/image_12/12_Galinieres_2.jpg","../image/image_12/12_Galinieres_3.jpg","../image/image_12/12_Galinieres_4.jpg","../image/image_12/12_Galinieres_5.jpg","../image/image_12/12_Galinieres_6.jpg","../image/image_12/12_Galinieres_7.jpg"]},"Consult_chateau_formulaire3408":{"id":"Consult_chateau_formulaire3408","dept":"12","canton":"Capdenac-Gare","commune":"Montbazens","nom":"Garinie","type":"Forteresse","periode":"XIV","histoire":"GARINIE,  Guillaume  Adhémar reçut la seigneurie par alliance avec souveraine de Salgues fille de Jean seigneur de Salgues et  de la Garinie qui aurait appartenu  à Cébilie de la Barrière dame de Firmy René d'Adhemar  épousa en 1680  Jeanne de Séguy un fils  Pierre d'Adhémar seigneur de la Garinie 1674-1744  épousa Anne de Bonne en 1691  eurent Louis d'Adhémar, chevalier de l'Ordre de Saint-Louis  de 1725-1786 garde du corps du roi, compagnie de Noailles,  épousa Marie-Rose de Lavaur de Charry ( 1761-1789) dame de la Garinie.  Le mariage de leur fille  le 18 février 1798, avec Jean Balthazar Joulia de La Salle, né le 1er août 1772  à Vialarels, décédé le 22 avril 1855  à lâge de 82 ans, rentier.  Léon Marcellin Joulia de La Salle, propriétaire de La Garinie (1808-1885)  marié le 17 juillet 1835 avec Marie Henriette du Pouget (1813-1876 ), dont   Léon Joulia de La Salle, propriétaire de La Garinie (1836-1892) marié le 15 juin 1863, Villefranche-de-Rouergue , avec Noémie de Campmas de Saint-Rémy (1843-1902) dans cette famille jusqu'en 1888 . Dont le fils aîné Léon Joulia de la Salle  qui habité encore au château en 1921,  Léon aura une fille Fernande qui conservera la demeure et cette dernière épousa en 1905 Philippe-Honoré-Claude-Sylvain de  Turenne et en 1957  le château est cédé à monsieur Bousquet minotier à Montbazens. Aujourd'hui propriété de monsieur Sherrif.     \r\nVALZERGUES .La paroisse a été détachée de celle de Galgan àprès le Concordat, la commune a été créée en 1868. Le château XVe siècle , appartient à la famille d'Albin de Valzergues et à un noble Begon Delmas en 1389. Une chapelle domestique y fut construite en 1666. Le château est au trois quarts détruit et la porte a les armoiries des Albin et Naussac, ainsi qu'une tour en forme de casque. Avant 1914, la seigneurie servait à une ancienne exploitation de chaux.","architecture":"Garinie  au XIVe siècle maison forte  possède  un  corps de logis flanqué d'une haute tour cylindrique d'un style médiéval, renforcé par une rangée de corbeaux qui soutenaient des mâchicoulis, des modifications furent apportés rajout d'autre corps de logis,  le chemin de ronde mais une partie dissimulée par la charpente et les ouvertures de fenêtres ont étaient modifiées refaites et réduites.                                  Valzergues, des aménagements ont été  réalisés à partir de l'ancien château du XVe siècle et plusieurs fois remanié !\r\nLa tour-pigeonnier ci dessous, restaurée est coiffée d'un toit d'ardoise en forme de casque.","habitants":"Famille de  Pierre d'Adhémar \r\n        \"","divers":"Château fort de Garinie et de Valzergues","gps":"","images":["../image/image_12/12_Garinie_1.jpg","../image/image_12/12_Garinie_2.jpg","../image/image_12/12_Garinie_3.jpg","../image/image_12/12_Garinie_4.jpg","../image/image_12/12_Garinie_5.jpg","../image/image_12/12_Garinie_6.jpg","../image/image_12/12_Garinie_7.jpg","../image/image_12/12_Garinie_8.jpg","../image/image_12/12_Garinie_9.jpg"]},"Consult_chateau_formulaire09a1":{"id":"Consult_chateau_formulaire09a1","dept":"12","canton":"Decazeville","commune":"Saint-Parthem","nom":"Gironde","type":"Château","periode":"XIII-XVII","histoire":"GIRONDE, cette première famille devait se maintenir à Gironde jusquen 1330, cest elle qui à lintérieur du château a fondé la première chapelle. Cest le seigneur du Bec dAmbez Arnaud IV de Gironde qui au début du XIIIe siècle fut pressenti par le Roi dAngleterre pour départager les riverains de la Dordogne et de la Gironde, se disputant pour savoir comment devaient se nommer le château se trouvant sur lestuaire  à la réunion des deux rivières. Il ne trouva pas dautres choix que de lappeler Gironde. Vers 1330, la dernière héritière des Gironde épousa Bertrand de Bégon le bailli de Rodez. Leur fils, Bégon II allait être chassé de Gironde par les troupes durant la guerre de Cent-Ans et contraint daller combattre pendant huit ans en Italie comme mercenaire.\r\nVers 1580, la veuve du dernier des Bertrand de Bégon épouse Gaspar de Felzins, fils cadet du seigneur de Monmurat, qui porte le titre du premier baron du Quercy. Ces Felzins demeurent à Gironde jusquen 1907. Ce sont eux qui ont reconstruit le château entièrement détruit par un incendie le 12 Août 1676. La Révolution a ruiné sans retour la famille de Gironde: en 1907, les deux dernières comtesses vendent le domaine à Hugues Panassié né en 1860 à Decazeville. Son fils, Hugues Panassié lègue la chapelle à lévêché de Rodez et en 1952 vend le château aux oeuvre sociales de la ville de Constantine. Ensuite, le château de Gironde a été offert à la Troussel moyennant leur départ dAlgérie, ce sont Madeleine et Henri Troussel qui le revendent à la famille Desprat, lactuel propriétaire.","architecture":"Le 10 Octobre 1970, la foudre sabat sur les toitures et les embrasent. La demeure détruite, fut reconstruite grâce à lobstination du propriétaire, Roger Desprat, qui après quelques semaines de résidence dans ce château de Gironde Saint-Parthem lieu, sest pris dun fort attachement pour l'édifice. Corps de logis en équerre, le corps principal rectangulaire à quatre niveaux toitures en croupes, ailes en retour à deux niveaux et attiques accolés au rez- de-chaussée d'un pavillon, l'ensemble est accolée en angles d'une tourelle toit en poivrière.  En 1971, cest au tour de la chapelle de subir loutrage du feu, elle se trouve légèrement en retrait remanié depuis.","habitants":"Famille de Bertrand de Bégon\r\n        \"","divers":"Château de Gironde","gps":"","images":["../image/image_12/12_Gironde_1.jpg","../image/image_12/12_Gironde_2.jpg","../image/image_12/12_Gironde_3.jpg","../image/image_12/12_Gironde_4.jpg","../image/image_12/12_Gironde_5.jpg","../image/image_12/12_Gironde_6.jpg","../image/image_12/12_Gironde_7.jpg"]},"Consult_chateau_formulaire4430-2":{"id":"Consult_chateau_formulaire4430-2","dept":"12","canton":"La Cavalerie","commune":"Gissac","nom":"Gissac_Montaigut","type":"Forteresse","periode":"XII-XVI","histoire":"Deux châteaux à Gissac celui de Gissac et le château fort de Montaigut du XII  siècle.                                                                   GISSAC, domine toute la région de Camarès. Ses origines remontent à 1280 où il était propriété des Arnaud, seigneurs du Pont de Camarès, il fut vendu ensuite aux Jourdain de Montlaur, aux Cahuzac et aux Narbonne en co seigneurie qui fut ensuite rassemblé par Guillaume de Pomarède. Puis ensuite vendu à la famille Michel. La ferme couvrait 370 ha, elle fut vendue à M. Gaubert de Rodez et le château aux surs de Saint-Vincent-de-Paul qui en ont fait un aérium. Vincent Auriol y a séjourné en 1942, en résidence surveillée chez le maire de l'époque M. Michel avant de rejoindre la résistance. Aujourd'hui hôtels.\r\nMONTAIGUT, en 1192 appartient à la famille de Marie de Caylus. En 1206, ses enfants, Déodat et Pierre, sont seigneurs de Montaigut. En 1248, Déodat de Caylus participe à la septième croisade au côté de Saint-Louis. Au XIIIe siècle Damoiseau  Pelfort vend à Pons de Tréboulou. Au XVe siècle appartient à la famille Peyre par alliance passa à la famille de Blanc,  En 1479, Raymond de Blanc, Seigneur de Montaigut, assassine son oncle, Jehan Jourdain, seigneur de Montlaur et de Gissac dans son château de Gissac.  En 1574, Guillaume de Blanc, seigneur baron de Montaigut, gouverneur protestant de Saint-Affrique, est tué par ses serviteurs au château de Montaigut. En 1515  Isabeau de Blanc vend à la famille Abis, puis  aux Annat. Au XVIIe siècle le seigneur dAnnat cède le château à Jean de Rouvellet,  en 1602 à Marc de la Valette et le vend en 1639 au comte de Caylus Jean de Morlhon, en 1780 à la famille Lavit de saint-Gervais et à la Révolution le château est vendu à monsieur Olivier, fermier, il le rachète en 1826 le conserve jusqu'en 1946, appartient en 1950 à Emile Bousquet cultivateur qui l'exploite depuis 1918 mais n'habite pas le château ce dernier se dégrade, monsieur Simonin l'achète en 1972  pour le restaurer, puis reprit par une association de sauvegarde, il renaît pour des manifestations.","architecture":"Gissac, fort médiéval du Xe siècle, remanié au XVIe siècle Il ne subsiste que la partie centrale de l'ancien château corps de logis à trois niveaux accolés d'échauguettes en angles. Deux ailes ont été ajoutées avec une terrasse flanquée de tourelles. Deux tours rondes entourent la demeure.                                                     Montaigut, au XVe siècle, de plan rectangulaire, l'extrémité nord fermé par le donjon.  La famille De Blanc est propriétaire du château,leur présence va durer près de 200 ans et le transformer profondément : construction des voûtes, cheminées gothiques, portes en accolade, mâchicoulis, échauguettes, il devient un château défensif.  Au XVIIe siècle , il était en piteux état donc le nouveau propriétaire va faire de nouvelles transformations : agrandissement des baies, murs enduit de plâtre, disparition de certaines voûtes remplacées par des planchers, mise en place dun toit à deux pans recouvert de lauzes. en 1946. La dégradation continue et laile sud-est sécroule vers 1965. En 1968, lAssociation des Amis du château de Montaigut achète le château et commence sa restauration, dans le cadre de lunion Rempart.","habitants":"Famille Michel                                                                                      Famille de Blanc\r\n        \"","divers":"Château de Gissac et de Montaigut","gps":"","images":["../image/image_12/12_Gissac_Montaigut_1.jpg","../image/image_12/12_Gissac_Montaigut_2.jpg","../image/image_12/12_Gissac_Montaigut_3.jpg","../image/image_12/12_Gissac_Montaigut_4.jpg","../image/image_12/12_Gissac_Montaigut_5.jpg","../image/image_12/12_Gissac_Montaigut_6.jpg","../image/image_12/12_Gissac_Montaigut_7.jpg","../image/image_12/12_Gissac_Montaigut_8.jpg"]},"Consult_chateau_formulaire5c12":{"id":"Consult_chateau_formulaire5c12","dept":"12","canton":"Decazeville","commune":"Grand-Vabre","nom":"Grand_Vabre","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Grand-Vabre celui du Bac du XVIIIe siècle, celui de Pélies du XVIIIe siècle et celui de Selves du XVI-XVIIIe siècles.                                                                                                    SELVES, Il était anciennement possédé par la famille de Selves après l'avoir été par celle de Gausserand seigneurs de la Vinzelle et de Lamothe. Vers la fin du XVIIe siècle, il passa, par alliance, dans la maison des Cambefort, puis dans celle des Trédolat. Un juge de paix de Maurs, en devint propriétaire par adjudication et le céda, en 1913, à M. Julien Poujade. Il est actuellement propriété de la famille Poujade.                                                                        PELIES manoir transformé en  chambres d'hôtes, datant en partie du XVe siècle, tout proche du village de Conques et qui domine le Lot qui coule  le long du jardin. est situé au bord du Lot.  Pas d'informations historiques.                                                                       BAC, pas d'information historique.                                             VINZELLE,  son nom viendrait de vinum (vin) et de cella (cave), d'où vincella en bas latin. Le village qui possédait « haute justice et château terrible », était important au Moyen Age. Ancienne terre des comtes de Toulouse,  un puissant château occupait l'emplacement actuel du clocher et de l'église. Il disparut au XVIe siècle lors des guerres de religions. En 1643, Louis XIII remis le Carladès au Prince de Monaco, en compensation des pertes qu'il avait subies durant la Guerre de Trente pour son soutien à Louis XIII.","architecture":"Selves, Le château est mentionné pour la première fois en 1522. L'édifice de plan carré devait être cantonné d'une tour à chaque angle. Celle du sud-est contient l'escalier à vis et est la seule à avoir conservé un mâchicoulis et sa toiture d'origine. La tour sud-ouest a conservé ses corbeaux. Chapelle de 1625. Décor intérieur du XVIIIe siècle, composé de lambris peints.                                                          Vinzelles reste d'un bâtiment de forme d'une tour accolé à l'église.","habitants":"Famille de Selves                                                                                      Prince de Monaco                                                                              Famille des Gausserand\r\n        \"","divers":"Châteaux de Grand-Vabre; du Bac, de Piliès, de Vinzelle et de la Selves","gps":"","images":["../image/image_12/12_Grand_Vabre_1.jpg","../image/image_12/12_Grand_Vabre_2.jpg","../image/image_12/12_Grand_Vabre_3.jpg","../image/image_12/12_Grand_Vabre_4.jpg","../image/image_12/12_Grand_Vabre_5.jpg","../image/image_12/12_Grand_Vabre_6.jpg","../image/image_12/12_Grand_Vabre_7.jpg","../image/image_12/12_Grand_Vabre_8.jpg"]},"Consult_chateau_formulaire1a69":{"id":"Consult_chateau_formulaire1a69","dept":"12","canton":"Villefranche de Rouergue","commune":"Villefranche de Rouergue","nom":"Graves","type":"Château","periode":"XVI","histoire":"GRAVES, château renaissance, fut construit entre 1543 et 1555.  fut construit par Guillaume de Lisorques de Bournazel à partir de 1545 par Jean Humbert Dardennes, riche bourgeois de la ville et consul de Villefranche qui tirait sa fortune de l'exploitation des mines de cuivre des environs, et complété en 1553 passa aux Maritan et aux Pomairols et un court séjour de la famille  du poète Scarron. En 1846, le château est vendu aux missionnaires de l'ordre de Picpus, qui seront expulsés en 1905. Aujourd'hui, c'est une élégante silhouette se détachant sur l'une des collines qui surplombent la bastide d'Alphonse de Poitiers. Elle symbolise la réussite de son commanditaire, Jean Imbert Dardenne, bourgeois et magistrat de Villefranche. Il abrite aujourd'hui un foyer de jeunes.","architecture":"Graves, rares sont, en France, les témoignages architecturaux, caractérisant la deuxième Renaissance, parvenus à notre époque en un si bon état.  Se compose de quatre  corps de bâtiments cantonnés de deux tours cylindriques coiffées d'un dôme de lauzes en accolade, de plan carré délimite une cour intérieure. L'aile nord, inhabitable, est constituée de trois galeries superposées auxquelles est adossé le portail triomphal à deux baies et ouvertures latérales, les façades sont ornées d'un décor sculpté et superposent des ordres Renaissance. Deux escaliers desservent le château, l'un à vis dans la tour nord-ouest, l'autre monumental dans l'aile Est, avec colonnes cannelées à chapiteau dorique, ionique et corinthien. Dans la grande salle du rez-de-chaussée, cheminée monumentale avec, au centre de la hotte, un cartouche figurant un personnage nu tenant un fouet et un masque symbolisant la comédie flanqué de cariatides engainées. Les piédroits sont décorés d'atlantes engainés. Des bâtiments du XIXe siècle flanquent le château.","habitants":"Famille de Guillaume de Lisorques de Bournazel\r\n        \"","divers":"Château de Graves","gps":"","images":["../image/image_12/12_Graves_1.jpg","../image/image_12/12_Graves_2.jpg","../image/image_12/12_Graves_3.jpg","../image/image_12/12_Graves_4.jpg","../image/image_12/12_Graves_5.jpg"]},"Consult_chateau_formulaire8190":{"id":"Consult_chateau_formulaire8190","dept":"12","canton":"Luc la Primaude","commune":"Sainte Radegonde","nom":"Hyars_Inières","type":"Fort-Abbaye","periode":"XIII-XIV","histoire":"INIERES, au début du XVe siècle, considérant que les villageois d'Inières ne possèdent pas de fort pour se protéger, l'évêque de Rodez autorise l'aménagement de fortifications pour l'église. En 1555, située à l'étage supérieur de l'église, une \"chambre\" est vendue. En 1462, un capitaine est nommé par l'évêque de Rodez. En 1468, une tour de défense est ajoutée à l'église. En 1587, il semble que des chambres dans la tour soient toujours louées. En 1671, certaines chambres sont toujours louées. Au XXIe siècle, la découverte de l'extérieur de l'église est dédiée à Notre Dame de la Nativité est libre et gratuite. \r\nHYARS  château seigneurial du XIVe siècle, relevait de l'évêque, seigneur de Sainte Radegonde, et formait une communauté dans les terres du comte. En 1330 et 1529 des actes mentionnent une famille Bozinhac, possédant la seigneurie du même nom. En 1613 Catherine de Sabatery et Guillaume de Masnau sont seigneur de Bozinhac. Leurs enfants, Guillaume, Bertrand, Géraud et Ignace leur succéderont. En 1789, la seigneurie de Bozinhac est réunie à celle d'Hyars pour former une seule commune.","architecture":"l'église d'Inières fortifiée est une surprenante église gothique du XIIIe siècle qui reçut des fortifications au cours des XIVe siècle et XVe siècle.     La façade Ouest comporte deux échauguettes sur culots. Elles complètent un système défensif basé sur des mâchicoulis. Au dessus un chemin de ronde couvert est identifiable. Il est aujourd'hui protégé par un grillage anti-oiseaux. La façade Est est dépourvue d'échauguette.  Dans la partie supérieure des quatre façades, de nombreuses ouvertures ont été aménagées.  Ces ouvertures sont évidemment des fenêtres pour amener la lumière dans les nombreuses salles nommées : Les chambres. L'extérieur était si sobre et très militaire. Hors, l'intérieur est lumineux, coloré, multiple. Le choeur évidemment est lumineux grâce aux fenêtres.\r\nHyars  Il porte la date de 1737, bien qu'à peine distant de 1 km de Flavin, il est situé sur la commune de Ste-Radegonde le château seigneurial d'Hyars du XIVe siècle, la voie romaine, du petit patrimoine bâti dispersé composé d'un corps de logis en forme de U avec des bâtiments à deux niveaux et une tour carrée à mâchicoulis toitures presque plate légèrement à l'écart, de fontaines, vestiges de dolmens, murs, croix.","habitants":"Famille Bozinhac\r\n        \r\n        \"","divers":"Château d'Inières et de Hyars","gps":"","images":["../image/image_12/12_Hyars_Inieres_1.jpg","../image/image_12/12_Hyars_Inieres_2.jpg","../image/image_12/12_Hyars_Inieres_3.jpg","../image/image_12/12_Hyars_Inieres_4.jpg","../image/image_12/12_Hyars_Inieres_5.jpg","../image/image_12/12_Hyars_Inieres_6.jpg","../image/image_12/12_Hyars_Inieres_7.jpg"]},"Consult_chateau_formulaire7f5f":{"id":"Consult_chateau_formulaire7f5f","dept":"12","canton":"Rieupeyroux","commune":"Morlhon le Haut","nom":"Kermaria","type":"Château","periode":"XIX","histoire":"KERMARIA Marie Dubrueil (1855-1938) était la fille aînée de Jean François \"Ferdinand\" Dubrueil (1818-1884), receveur des finances très fortuné, et de Louise Cousin. Elle était originaire de l'Aveyron (Morlhon-le-Haut), tandis que son mari, Raymond de Butler (Paris 1839-Morlhon-le-Haut 1907), était le sixième enfant du vicomte Pantaléon de Butler (1781-1842) et de Pauline de Verteuil. Il était d'une vieille famille irlandaise qui avait fui les persécutions anglaises contre les catholiques à l'époque de Cromwell et fait souche en France au milieu du XVIIe siècle.Raymond était général de cavalerie, commandeur de la légion d'honneur et avait plusieurs frères, tous militaires :Maurice Charles de Butler (1840), père d'un autre Enguerrand de Butler (1886-1914), officier de la légion d'honneur. Ils ont eu sept enfants, qu'ils ont élevés à Kermaria, dont quatre garçons officiers, Gaston de Butler (1880-1975), lieutenant de cavalerie, marié à Germaine Boisse de Black, sur de la géologue Yvonne Boisse de Black 1891-1984, et père de treize enfants, dont Richard de Butler (1913-1982), général, commandeur de la légion d'honneur. Maurice de Butler (1885-1914), lieutenant au 4° Cuirassiers, mort pour la France, père de Patrice de Butler (1912-1948), capitain de goum, et dÉlisabeth de Butler (1914-2009) mariée à Jehan de Frayssinet (1903-1984), lieutenant-colonel d'aviation.Yves de Butler (1891-1978), officier de la légion d'honneur, croix de guerre, Jean de Butler (1893-1984), général de brigade, commandeur de la légion d'honneur, croix de guerre.","architecture":"Château de Kermaria, construit au XIXe siècle en bordure du domaine de Berals. Son nom Kermaria, vient du prénom de Marie Dubreuil, épouse du général Raymond de Butler, qui en a fait elle-même le projet et les dessins. Demeure composée de deux ailes articulées en équerre.  Ils décident de s'installer et font construire un château où ils élèveront leurs enfants.","habitants":"Famille de Raymond de Butler \r\n        \"","divers":"Château de Kermaria","gps":"","images":["../image/image_12/12_Kermaria_1.jpg","../image/image_12/12_Kermaria_2.jpg"]},"Consult_chateau_formulairedb52":{"id":"Consult_chateau_formulairedb52","dept":"12","canton":"Rodez","commune":"Onet le château","nom":"Labro_Onet","type":"Château","periode":"XVI","histoire":"LABRO, l'histoire du château et de sa seigneurie remonte au XVIe siècle avec la famille de Créato, enrichie par le commerce. A la fin du XVIIe siècle, il entrera dans la famille de Patris, qui a compté dimportants personnnages, labbé Guillaume de Patris, lieutenant du Cardinal dArmagnac, sillustra durant les guerres de religion, en déjouant un complot protestant pour prendre Rodez. Lassassinat du procureur Fualdès en 1817, marquera profondément lhistoire de lAveyron avec ses mystères et ses aspects sordides. Au XIXe siècle, Labro appartiendra à la famille de Maynier,  Joseph de Maynier, magistrat et militant royaliste, contribuera avec dautres à dissimuler lexistence dun complot qui aboutira à lexécution dinnocents, affaire célèbre qui mobilisera toute la France entière et retentira aux delà des frontières. Tombés sous le charme du château, Jean et Nizou Rouquet lachetèrent en 2001. Jean Rouquet est à lorigine des centres audition-conseil présents désormais dans toute la France. Il a racheté le château de Labro à Onet le château près de Rodez, il y a 12 ans.  Le rachat du château  correspond à une volonté de « retour au pays » bien sur mais aussi et surtout dy apporter sa créativité et son énergie. Situé à 7 minutes de Rodez, proche de la gare et de l'aéroport,  a tout pour devenir le nouveau rendez-vous des businessman, soucieux d'allier travail et détente.","architecture":"L'histoire du château de Labro et de sa seigneurie remonte au XVIe siècle Tombés sous le charme du château, de plan en U à deux niveaux et attiques flanqué de deux échauguettes sur flan Est et d'une tour hexagonal sur côté ouest de la façade à toit pointu, les deux ailes en retour une plus basses est à l'origine du château l'autre plus récente sert de dépendances  et vient s'ajouter aux autres, bâtiment rectangulaire à deux niveaux toit en croupes   . Depuis 2001, Jean aidé de son épouse, font des travaux de restauration dans les règles de lart, pour redonner vie à cette demeure longtemps délaissée.","habitants":"Famille de Patris\r\n        \"","divers":"Château de Labro","gps":"","images":["../image/image_12/12_Labro_Onet_1.jpg","../image/image_12/12_Labro_Onet_2.jpg","../image/image_12/12_Labro_Onet_3.jpg","../image/image_12/12_Labro_Onet_4.jpg","../image/image_12/12_Labro_Onet_5.jpg","../image/image_12/12_Labro_Onet_6.jpg"]},"Consult_chateau_formulaire34ac":{"id":"Consult_chateau_formulaire34ac","dept":"12","canton":"Laguiole","commune":"Lacroix Barrez","nom":"Lacroix_Barrez","type":"Vestiges","periode":"XII-XVII","histoire":"Deux châteaux à Lacroix-Barrez  celui de Vilherols du XVIIIe siècle et les vestiges du château fort de Valon du XIIe siècle.                                    VALON sur Truyére,  il fut remis en 1150 à Raymond Béranger III, comte de Barcelone. Bertrande d'Avallon est considérée comme la mère naturelle d'Henri de Rodez, fils d'Hugues de Rodez, vicomte de Carlat qui est né vers 1175.  Les hommages de cette famille se succèdent en 1267, la seigneurie passe dans la famille de Peyre, des seigneurs de Pierrefort, En 1265, Philippus de Valon et Stéphane, frères, ainsi que Bérenger de La Gleiziole, Pistors de Muro donnent reconnaissance pour le château et mandement de Valon au vicomte de Carlat. Aymeric Rolland, seigneur de Cromières, à Raulhac, épouse en 1341 Haladie de Peyre. Plus tard, les anglais l'occupèrent avant d'en être délogés par \"Les Routiers\" vers 1378. En 1387, le château revint aux comtes d'Armagnac, comtes de Rodez. Au XVI siècle, le château a appartenu à la famille Chaumeil de Dienne (Jean de Dienne), avant de revenir en 1587 à Louis de Fontanges d'Auberoques.  Marie-Charlotte de Fontanges (1670-1738), dame d'honneur de la duchesse du Maine, hérite de Valon. Elle se marie en 1695 à Henri-Joseph de La Garde de Chambonas, Joseph de La Garde de Chambonas, brigadier d'armées, qui revend en 1745 les château et le domaine de Valon à Jérôme de Verdier, trésorier de France de la généralité de Montauban, général des finances. Puis à  Philippe de Bancarel d'Hyars (1784-1857), conseiller général de l'Aveyron en 1812, devient propriétaire de Valon. Il se marie deux fois. Ensuite, Valon appartient à la famille Delrieu, de Pleaux, qui le donne à Antoine Delmas, de Taleyssac. la communauté de communes du Carladez a acquis le château en 1998.","architecture":"Vallon fut bâti à partir du XIIe siècle,  conscient de l'intérêt de préserver le site de Valon et les vestiges de son château. Les vestiges du château féodal autour duquel s'accroche le village à l'habitat typique, solidement accroché à son promontoire rocheux dominant les gorges de la Truyère, constituent un ensemble harmonieux qui en fait l'un des sites enchanteurs du nord-Aveyron.\r\nAu milieu de nulle part, dominant les gorges profondes et sauvages de la Truyère, Valon est un site surprenant où le passé reste encore aujourd'hui très présent.  Depuis le début du XIX siècle, il n'était plus habité et fut partiellement détruit. Subsiste aujourd'hui, pour l'essentiel, le donjon carré du XIVe siècle avec ses mâchicoulis et échauguettes. Il abrite plusieurs salles voûtées en croisées d'ogives. Vilherols  Cette belle maison du Carladez se dresse au milieu d'une vaste pelouse bordée d'arbres et entourée d'un muret de pierres. La pièce de jour, spacieuse, est un bel ensemble alliant les matériaux bruts de la cheminée traditionnelle à la modernité de la cuisine et l'originalité du spa dont les parties vitrées donnent à la fois vers l'intérieur et sur le jardin.","habitants":"Famille d'Henri de Rodez\r\n        \"","divers":"Château de Vilherols  et vestiges du château fort de Valon","gps":"","images":["../image/image_12/12_Lacroix_Barrez_1.jpg","../image/image_12/12_Lacroix_Barrez_2.jpg","../image/image_12/12_Lacroix_Barrez_3.jpg","../image/image_12/12_Lacroix_Barrez_4.jpg","../image/image_12/12_Lacroix_Barrez_5.jpg","../image/image_12/12_Lacroix_Barrez_6.jpg"]},"Consult_chateau_formulaire811c":{"id":"Consult_chateau_formulaire811c","dept":"12","canton":"Laguiole","commune":"Laguiole","nom":"Laguiole","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux à Laguiole; de la Boissonnade du XVe siècle avec donjon , d'Oustrac du XVIIIe siècle, de Montmatton  vestiges du XVIIIe siècle et du Bousquet (voir article ), de Nayrolles et Bouet.                             LAGUIOLE, en 1208, les Albigeois occupèrent Laguiole et sy fortifièrent, dépendant du comté de Rodez jusquen 1271, Laguiole passa à cette date sous la seigneurie directe du Roi de France Ils en furent chassés par Jean de Beaumont, Seigneur de Thénières.\r\nEn 1370, Charles V, Roi de France, cède les châtellenies du Rouergue  à son vassal Jean dArmagnac, comte de Rodez, pour le récompenser davoir battu les anglais. Ces châtellenies ne redevinrent définitivement royales quen 1589 sous le règne dHenri IV.  Mais en 1735 le château nexistait plus.                               OUSTRAC ; pas d'information historique,  mis à part de 1737 à 1840 aux Baduel d'Oustrac.                                      BOISSONNADE, c'était à l'origine un repaire, qui servait d'habitation et de refuge au seigneur des lieux, sa famille et ses domestiques, pour se protéger des bandes de routiers qui sévissaient pendant les temps troublés qui ont précédé et accompagné la guerre de cent ans.  L'édifice a perdu son rôle défensif, mais continue d'être, comme à son origine, une demeure familiale et le centre d'une exploitation agricole consacrée à l'élevage de bovins de la race \"Aubrac\".                             BOUET, petit château du XVIIe siècle, chambres d'hôtes d'Evelyne et Michel Chayrigues.","architecture":"Laguiole, chaque châtellenie du Rouergue possédait un fort ou un château fortifié, gardé aux époques troublées par quelques soldats et servait de refuge à la population menacée. Le Fort si les archives témoignent du mauvais état dans lequel il se trouvait, au XIVe siècle, suite à la prise et à lembrasement de celui-ci par les Anglais aux environs des années 1350.                                 Bouet   est construit en basalte et granit au XVIIe siècle, situé en contrebas de la route. La demeure possède un beau clocheton central et un toit en carène. A l'intérieur, escalier central et cheminée monumentale.                                                          Oustrac, le domaine comprend deux entités : une maison de maître construite au XVIIIe siècle, transformée et complétée au XIXe siècle; et un domaine agricole. Cet ensemble présente un intérêt ethnologique et historique pour l'histoire de l'Aubrac.  Les bâtiments qui l'entourent avec la grange-étable située à l'entrée de la ferme transformé en Gaec.\r\nBoissonnade est un somptueux édifice des XIVe et XVe siècles, se présente sous la forme d'un logis rectangulaire, flanqué d'un côté par un donjon carré surmonté de mâchicoulis et de l'autre par une tourelle ronde d'escalier date du XIIIe siècle. Il est édifié sur un plan défensif, sa façade carrée est quasiment inchangée depuis 700 ans. Comme le reste du bâtiment qui lui est postérieur, cette tour est bâtie d'orgues de basalte, débitées dans leur longueur. Une bretèche, ou peut-être des latrines, reposait sur des corbeaux.  Au XVe siècle, le bâtiment a été agrandi d'une aile plus spacieuse, défendue sur ses façades nord et sud par deux tours rondes. Celle au sud abrite une chapelle, consacrée en 1456. Au XIXe siècle, des travaux d'agrandissement avec l'ajout d'un deuxième  étage au corps de logis.","habitants":"Famille de Jean dArmagnac,\r\n        \r\n        \"","divers":"Château de la Boissonnade, d'Oustrac, de Montmatton, du Bousquet, de Nayrolles et de Bouet","gps":"","images":["../image/image_12/12_Laguiole_1.jpg","../image/image_12/12_Laguiole_2.jpg","../image/image_12/12_Laguiole_3.jpg","../image/image_12/12_Laguiole_4.jpg","../image/image_12/12_Laguiole_5.jpg","../image/image_12/12_Laguiole_6.jpg","../image/image_12/12_Laguiole_7.jpg","../image/image_12/12_Laguiole_8.jpg","../image/image_12/12_Laguiole_9.jpg"]},"Consult_chateau_formulaire2961":{"id":"Consult_chateau_formulaire2961","dept":"12","canton":"Sévérac le Château","commune":"Lapanouse de Sévérac","nom":"Lapanouse_Loupiac","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Lapanouse; celui de Lapanouse, de Belvezet tour du XVIIe siècle, de Bessodes du XVIe siècle et de Loupiac du XIVe siècle avec  tour.                                                           LAPANOUSE, fondée au Moyen-Age par une congrégation de moines panetiers.  La localité est le berceau de la famille de Lapanouse, connue depuis le XIIe siècle. Vers 1250, les Lapanouse vendirent leurs biens à Guy de Sévérac et devinrent seigneurs de Loupiac. Les barons de Sévérac y percevaient un péage au XVe siècle. Lapanouse était une petite ville avec trois portes et quatre faubourgs. Il y avait une léproserie dans les environs. Lapanouse est fière dêtre le village où naquit en 1713 lillustre philosophe labbé Guillaume-Thomas Raynal.\r\nLOUPIAC, il sagit de la seconde résidence de la famille de Lapanouse. Le château actuel a été construit en 1443 par Guy, évêque de Mende. Pendant les Guerres de Religion, Le château fut pris par les catholiques en 1562 et par les calvinistes en 1576. En mars 1793, lors du camp de Lapanouse, le général révolutionnaire Viton en fit le siège, brûla et abattit les parties hautes.  Les seigneurs de Séverac contestèrent en permanence cette propriété, l'édifice eut un rôle très important au cours des guerres de Religion où il fut pris et repris par les deux camps. Il fut également pris pendant la Révolution, puis incendié. Il est désormais propriété de la famille Gransaigne d'Hauterive depuis 1963.                        BELVEZET, pas d'information historique, château du XVIIIe siècle.              BESSODES,   fut bâti par la famille Bessodes, bien connue depuis le XIIIe siècle et dont les membres sillustrèrent dans leurs fonctions de notaires, prêtres, médecins, marchands, etc.","architecture":"Lapanouse  Le château a disparu. La Vallée du Haut Aveyron, en particulier, recèle nombre de ces petits châteaux bâtis à lombre des barons de Sévérac. Beaucoup de ces seigneurs locaux furent les protégés de la famille dArpajon. Toutefois, les seigneurs de Sévérac nétaient guère enclins à voir ces familles de chevaliers sémanciper. Ainsi par exemple, le repaire de Loupiac  fut élevé en en 1443 près des ruines dun ancien château (granges du XIIe siècle) par Guy de la Panouse, évêque de Mende, mais les Sévérac engagèrent une procédure, terminée en 1512, sur la basse justice et le droit de fortifier, cest une bâtisse carrée munie de quatre tours rondes avec des murs très épais.                                 Le château de Bessodes  a disparu.  La grande période des manoirs et maisons-fortes correspond, entre Guerre de Cent Ans et de Religion (1450-1550), à une époque où le nombre de nobles est en pleine croissance. La Vallée du Haut Aveyron recèle un grand nombre de ces petits châteaux bâtis à lombre des barons de Séverac.                                                                                    Loupiac, Il sagit de la seconde résidence de la famille de Lapanouse. Le château actuel, qui aurait fait suite à un château établi à lOuest dans la plaine,  Cest une bâtisse carrée munie de quatre tours rondes aux angles  à toitures style asiatique. Le bâtiment de grange date des XIe et XIIe siècles.","habitants":"Famille de Lapanouse                                                                         Famille Gransaigne                                                                        Famille Bessodes\r\n        \"","divers":"Château de Lapanouse, de Belvezet, de Bessodes et de Loupiac","gps":"","images":["../image/image_12/12_Lapanouse_Loupiac_1.jpg","../image/image_12/12_Lapanouse_Loupiac_2.jpg","../image/image_12/12_Lapanouse_Loupiac_3.jpg","../image/image_12/12_Lapanouse_Loupiac_4.jpg","../image/image_12/12_Lapanouse_Loupiac_5.jpg","../image/image_12/12_Lapanouse_Loupiac_6.jpg","../image/image_12/12_Lapanouse_Loupiac_7.jpg"]},"Consult_chateau_formulairec1dd":{"id":"Consult_chateau_formulairec1dd","dept":"12","canton":"Pont de Salars","commune":"Salles Curan","nom":"Larguiès","type":"Château","periode":"XIII-XVI","histoire":"LARGUIES, en 1344 propriété des évêques de Rodez, passa aux Albert de 1500 à 1525 et ensuite à Pierre Alazard, jusqu'en 1524 Il a pour fils  François, cette famille  qui se qualifiait seigneur de Gaillac et aussi de Larguiès, il a pour fille : Isabeau Alazard, mariée à Salles-Curan avec Jean de Fournols, seigneur d'Artel, fils de Jean, capitaine du château de Calmont d'Olt et de Marie d'Artalh. Ils ont  un fils, François, et deux filles, dont : Marie de Fournols, mariée le 9 mai 1576 à Espalion avec Antoine de Guitard, procureur du roi à la cour de M. le Sénéchal de Rouergue à Villefranche, dont plusieurs enfants. Gabrielle Mazières paraît avoir apporté le château de Larguiès par son mariage avec Arnaud de Méjanès, fils de Jean seigneur de Méjanès et d'Hélix de Labro, capitaine du château de Creissels où des habitants s'étaient réfugiés vers 1565 pour échapper aux persécutions des calvinistes. De cette union sont issues au moins trois filles, Marguerite, Anne et Françoise. Marguerite de Méjanès, apporte Larguies à Louis de Cassagnes, fils d'un bâtard de Jean de Cassagnes, seigneur du Cayla-Moyrazès. un fils Bernardin de Cassagnes de Larguiès marié le 14 août 1678 à Rodez avec Jean de Bonnafos de Scorailles, seigneur d'Aignac, fils d'Henri, seigneur du Bourran, et de Rose de Laparra. Bernard Albert de Gaston (1692 - 1787), fils de Bernard de Gaston, juge de Salmiech, et de Barbe Rech, est avocat, conseiller de l'élection de Rodez,  seigneur de Larguies. Il épouse le 21 septembre 1716 Jeanne de Balzac, fille d'Antoine de Balzac, sieur de Vialatelle, qui lui donne neuf enfants, dont: Antoine de Gaston de Pollier (1718 - 1797), avocat en parlement, marié le 28 février 1748 à sa cousine Marie-Thérèse de Balzac de Firmi. En 1771, pierre de Rudelle marchand à Salles Curan achète au marquis de Lignerac la baronnie  qui le transmet en héritage aux Molinier qui s'en sépareront au XIXe siècle  qui passera  à messieurs Jeanjean, Marquès et Roland, aujourd'hui propriété de monsieur Roussel.","architecture":"Larguiès, une maison forte est mentionnée à la fin du XIIIe siècle, la construction du château actuel débute à la fin du XVIe siècle.\r\nC'est un grand logis rectangulaire de trois niveaux, flanqué de deux tourelles rondes coiffées en poivrière aux angles opposés en diagonale, et sur les deux autres angles avec deux échauguettes carrées en encorbellements sur consoles à triple ressauts. Une  fine et élégante tourelle carrée dotée d'un toit à quatre pans La tour nord-ouest contenait l'escalier à vis disparu. L'édifice conserve quelques éléments en pierre sculptée: porte d'entrée de la tour nord-ouest, lucarnes des combles et cheminées intérieures.\r\nL'intérieur a dû être, en grande partie, transformé au XIXe siècle.","habitants":"Seigneur de Gaillac\r\n        \r\n        \"","divers":"Château de larguiès","gps":"","images":["../image/image_12/12_Larguies_1.jpg","../image/image_12/12_Larguies_2.jpg","../image/image_12/12_Larguies_3.jpg","../image/image_12/12_Larguies_4.jpg","../image/image_12/12_Larguies_5.jpg"]},"Consult_chateau_formulaireab2a":{"id":"Consult_chateau_formulaireab2a","dept":"12","canton":"La Cavalerie","commune":"Mamhagues et latour","nom":"Latour_Sorgues","type":"Château","periode":"XV","histoire":"LATOUR sur SORGUES, Sénégonde fait don de la moitié de sa demeure, une partie du territoire ancien est alors concédé à deux frères, l'un évêque de Cahors du nom de Frotaire, l'autre, Bernard, comte d'Albi, frère du prélat, de la puissante famille des Trencavel. Ces biens leur sont donnés  en 957. Au fil des décennies, le fief de Latour a pour suzerain, l'Aragon, mais surtout le comte de Toulouse surnommé le roi du midi. Les Trencavel viennent au-dessous et inféodent la région d'Albi à Béziers en passant par le Camarès, à de petits seigneurs dont les sires de Latour. Au XIIIe siècle détenu pour moitié à la famille de Saint-Maurice, au XVe siècle  la seigneurie réunifiée au mains des Roquefeuil-Versols, à la famille Bonald  au milieu du XVIIe siècle qui la conserveront jusqu' à la Révolution. le château fut vendu comme bien national racheté par Etienne Cannac ancien fermier du domaine jusqu'en 1989 et l'année suivante la commune le rachète. Une association (AACL) organise toute l'année les \"soirées au château\": musique classique, lyrique, chanson française, conte etc.","architecture":"Depuis le Xe siècle, le château de Latour sur Sorgues est assis sur ce rocher qui domine la rivière Sorgues et le village de Latour. Reconstruit au XVe siècle C'est une grande bâtisse de plan carré avec cour intérieure, flanquée à l'origine de quatre tourelles  et  d'originales échauguettes polygonales à sommets plats. L'édifice fut remanié sans cesse au cours des siècles, chaque seigneur l'adaptait aux besoins de sont temps. La seigneurie de Latour est issue du démembrement d'une vicaria gallo-romaine en formation avant ou dès le Xe siècle.  château de Latour est actuellement en cours de restauration. il abrite la reconstitution d'une cellule de moniale cloîtrée et chaque année des expos temporaires.","habitants":"Famille des Trencavel\r\n        \"","divers":"Forteresse de Latour sur Sorgues","gps":"","images":["../image/image_12/12_Latour_Sorgues_1.jpg","../image/image_12/12_Latour_Sorgues_2.jpg","../image/image_12/12_Latour_Sorgues_3.jpg","../image/image_12/12_Latour_Sorgues_4.jpg","../image/image_12/12_Latour_Sorgues_5.jpg","../image/image_12/12_Latour_Sorgues_6.jpg","../image/image_12/12_Latour_Sorgues_7.jpg","../image/image_12/12_Latour_Sorgues_8.jpg"]},"Consult_chateau_formulairea5fb":{"id":"Consult_chateau_formulairea5fb","dept":"12","canton":"La Cavalerie","commune":"Laval_Roquecezière","nom":"Laval_Roquecezière","type":"Maison forte","periode":"XV","histoire":"LAVAL-ROQUECEZIERE  en Juin 1112, Raimond Béranger III, comte de Barcelone reçoit en alleu (terres libres exemptes de toute redevance, ne relevant d'aucun seigneur, par opposition au fief)  le château de Laroquecézière et  de Gaujal,  appartient aux seigneurs de Roquecézière. En 1252, Bertrand de Roquecézière meurt sans descendance et lègue la propriété de ses biens à l'Abbaye de Bonne-Combe. Le fief est légué aux comte de Toulouse. En 1271, le chateau de Roquecézière revient par héritage au roi de France.  En 1369 Roquecézière, occupé par les anglais, est repris par le comte de Vendôme. Roquecézière est a nouveau réuni à la couronne, et donné en fief au Comte de Vendôme. En 1446, la Seigneurie de Roquecézière est donnée par Charles VII à Agnès Sorel, dame de Beauté sur Marne et de La Roquecézière (acte concernant la redevance signé par Agnès Sorel, au musée de Saint-Crépin). En  octobre 1587 les catholiques reprennent Roquecézière aux protestants et y mettent le feu. le 17 Août 1587 cette place catholique se rend au comte de Montgomery chef protestant, ainsi que le château de la Bastide, et le fort de La Verdolle. En 1625, le duc de Rohan s'en empare à nouveau au nom des protestants. Le 6 mai 1628, le prince de condé la reprend aux protestants. En 1629, Richelieu, après la paix d'Ales (fin des guerres de religion) fait démolir le château et le village pour plus de sécurité.","architecture":"La démolition aurait duré 3 ans et n'aurait épargné qu'une maison du village.1789, la Révolution à Roquecézière sera surtout subie par les paysans, qui en déplorent davantage les effets qu'ils n'apprécient les avantageuses réformes. en 1800, Montfranc est réuni à la commune de Roquecézière jusqu'en 1816. La même année, Combret est également rattaché, et ceci jusqu'en 1832 . En 1849, le 4 juin, création de la paroisse de Roquecézière. Patrimoine de Laval-Roquecezière du château féodal il ne reste plus rien, sinon des maisons fortes dans les environs  tel  que Camalières et de Py.","habitants":"Famille de Roquecézière\r\n        \r\n        \"","divers":"Château de laval roquecézière, de Camalières et de Py","gps":"","images":["../image/image_12/12_Laval_Roqueceziere_1.jpg","../image/image_12/12_Laval_Roqueceziere_2.jpg","../image/image_12/12_Laval_Roqueceziere_3.jpg"]},"Consult_chateau_formulaireb68f":{"id":"Consult_chateau_formulaireb68f","d
