réze du XIVe siècle. AMBEYRAC,  était le siège dune seigneurie appartenant aux Balaguier, puis aux Grèze, avant de passer dans la maison ducale des Crussol dUzès, la tour seigneuriale du XIV siècle.            CAMBOULAN,  seigneurie appartenant à la famille éponyme, sorganise autour de ses deux places et de ses deux châteaux. Lensemble est entouré déléments du paysage du Causse du Quercy . Camboulan; chambres d'hôtes de Michel et Nadine Prayssac                                                                                       GREZE, pas d'informations historiques  chambres d'hôtes  par  Mme Chapeau Marie-Thérèse .                                                      A quelques kilomètres au sud à Montsalès une tour médiévale du XIVe siècle, située dans un village perché comportant des vestiges médiévaux dont un remarquable mur d'enceinte longeant l'ancien chemin d'accès.","architecture":"Ambeyrac se situant au bord du Lot, était autrefois rattaché à Montsalès, de leur ancien château ne subsiste qu'une tour carrée et massive, agrémentée de mâchicoulis. A deux kilomètres en aval, le village de Camboulan abritait lui aussi une seigneurie. Le château, partiellement conservé, est constitué  d'un logis à mâchicoulis et une tour carrée, couronnée d'un chemin de ronde monté sur mâchicoulis, flanqué d'une tour circulaire XIV-XVe siècle. Par héritage, la seigneurie fut liée à celle des Grèze dont le château s'élève à une centaine de mètres plus loin, partiellement détruit et restauré.  Château de La Grèze : logis à mâchicoulis, tour  circulaire du XIVe siècle.","habitants":"Famille  Balaguier\r\n        \r\n        \"","divers":"Château de Camboulan, de Gréze et la tour de Montsalès","gps":"","images":["../image/image_12/12_Ambeyrac_1.jpg","../image/image_12/12_Ambeyrac_2.jpg","../image/image_12/12_Ambeyrac_3.jpg","../image/image_12/12_Ambeyrac_4.jpg","../image/image_12/12_Ambeyrac_5.jpg","../image/image_12/12_Ambeyrac_6.jpg","../image/image_12/12_Ambeyrac_7.jpg","../image/image_12/12_Ambeyrac_8.jpg","../image/image_12/12_Ambeyrac_9.jpg"]},"Consult_chateau_formulaire0b55":{"id":"Consult_chateau_formulaire0b55","dept":"12","canton":"Réquista","commune":"Arvieu","nom":"Arvieu","type":"Château","periode":"XVI-XIX","histoire":"A Arvieu trois châteaux, celui d'Arvieu féodal du XIVe siècle,  de Saint-Louis du XIXe siècle hôtel de Ville et de Montfranc du XVIIIe siècle.                                                                                        ARVIEU, château féodal, Sainte-Famille ancien couvent construit par les seigneurs de Landorres. En 1741, à la famille de Vigouroux du Barry. A la Révolution le chevalier de Vigouroux et son neveu sont prisonniers, la demeure est pillée, le reste de la tour ronde est désormée tronquée. En 1854, la famille de Vigouroux est ruinée. Dès 1855, les religieuses s'y installent et le château est transformé en école jusqu'en 1989. \r\nMONTFRANC, l'édifice a été bâti en 1787 pour Léonard Bonnefous, né au Roube d'Auriac-Lagast, marié à Marie Blanc Paulhy d'Arvieu. Le mot château apparaît en 1840 au mariage de sa petite-fille, Marie Bonnefous avec Jean Massou de La Teule. La dernière habitante est Marie Louise Claire Bonnefous, célibataire décédée en 1961. Sa sur Marie-Clara Gabrielle Bonnefous, mariée en 1925 avec Victor de la Trémolières, décéda en 1980 à Asprières. Elles marqueront la vie arvieunoise sous le nom des Dames de Montfranc. Sans descendance, le château revient à la famille Auréjac de la Tieule de Lunel, famille de Marie Françoise Bonnefous. L'exploitation agricole est vendue à M. Pouget.                       St-LOUIS, à l'origine l'étang, le château et le moulin appartenait à la famille de Vigouroux qui habitait dans l'ancien couvent. la famille Bonnefous rachète le domaine et construit une maison bourgeoise à 2 tourelles pour Marie-Louis Hippolyte Bonnefous. En 1882, M. Bonnefous revendit l'ensemble du domaine à M. Gaubert. Le château fut revendu à la commune en 1928. Il abrite la Mairie depuis les années 1960.","architecture":"Arvieu  L'édifice actuel n'est qu'une partie remaniée du château au cours des siècles et des différents propriétaires,  château féodal de 1389 : aujourd'hui appelé ancien couvent puisqu'il est utilisé par les religieuses avant de devenir propriété de la Mairie.  le château féodal fut reconstruit avec une bâtisse imposante, le clocher de l'église qui servait de donjon est un des rares vestiges authentiques du château féodal.  Il s'agit du donjon du château fort des Landorre, disparu depuis longtemps, haut de 22 mètres, il s'agit d'une tour rectangulaire de 9.20 mètres de long et 5.40 mètres de large. Dans l'épaisseur du mur, 1 mètre 28, s'élève un escalier. En 1574, il est attaqué par les Anglais, durant les guerres de religion. On peut remarquer les restes d'une gargouille ainsi que des contreforts et meurtrières. Auiourd'hui, la demeure fait parti intégrante des nouvelles technologies aveyronnaises, elle accueille le pôle culturel et la société Laëtis.  Montfranc  Corps de logis rectangulaire à trois niveaux  accolé d'un donjon à quatre niveaux toiture en croupe. Dans les documents d'époque, il est dit maison au mas près d'Arvieu. Le mot de château apparaît seulement en 1840. Le château tomba dans l'oubli depuis la disparition de sa dernière propriétaire en 1961, connue sous le nom de Dame de Montfranc. Il reste inhabité durant de nombreuses années avant d'être racheté par des particuliers .                                                      Saint-Louis, sur le mont des Capelettes, la construction débute en 1830  de plan triangulaire mais elle est arrêtée par le guerre contre les Prussiens. On reprit le chantier en septembre 1871 et il se termina en décembre 1872, le château Saint Louis est une maison bourgeoise à deux niveaux et attique avec deux tourelles.","habitants":"Famille de Vigouroux\r\n        \"","divers":"Château d'Arvieu, de Montfranc, de Saint-Louis et la tour féodal","gps":"","images":["../image/image_12/12_Arvieu_1.jpg","../image/image_12/12_Arvieu_2.jpg","../image/image_12/12_Arvieu_3.jpg","../image/image_12/12_Arvieu_4.jpg","../image/image_12/12_Arvieu_5.jpg","../image/image_12/12_Arvieu_6.jpg"]},"Consult_chateau_formulaire9a76":{"id":"Consult_chateau_formulaire9a76","dept":"12","canton":"Aubin","commune":"Aubin","nom":"Aubin","type":"Fort","periode":"XI","histoire":"AUBIN, appelé à l'époque Albin. La tour de défense, le logis seigneurial, des habitations, ainsi que léglise furent construites,entre le Xe et le XIVe siècle, la garnison sinstalle au sommet du site appelé Haute-Cour. Le seigneur souhaitant organiser autour de lui la population, elle vint sinstaller au pied du fort Basse-Cour. Les habitations entourèrent le piton rocheux, formant ainsi un bourg castral.  Au Xe siècle possession de Raymond II comte de Rodez, passa aux Frotard au XIIe siècle et au milieu du XIIe siècle  à la famille d'Estaing, à la fin du XIIIe siècle plusieurs copropriétaires se partagent le château et les terres dont le comte de Rodez et la famille de Fabrefort, puis par alliance de l'héritière  Hélène qui l'apporta en dot en 1323 à Jean de Morlhon. En 1590  pendant les guerres de religion le château est défendu par le  commandant  sieur Richard de Poux   et la garnison quitte le château au milieu du XVIIe siècle,  la présence militaire devient inutile et le fort fut abandonné par les derniers coseigneurs. Devenu  bien national vendu à la Révolution Française à  Guillaume Bergougnon, prête nom pour  Jean-Antoine-Marie Brassat Saint-Parthem, il fut en partie démantelé sur ordre du 1er maire dAubin. Le déclin de la vieille ville, qui prendra le nom Aubin.","architecture":"Juché sur son promontoire rocheux, le fort d'Albin veille depuis longtemps sur la cité.   La légende raconte que c'est un général romain, Claudius Albinus, qui installa sur le piton rocheux une garnison, vers 193 ap. JC.  Au Moyen-Age, les seigneurs d'Albin édifient une forteresse militaire. Au pied de la forteresse érigée sur le piton rocheux se développera la ville d'Aubin, une situation dominante facilitant le contrôle de la vallée et un site défensif imprenable avec des parois rocheuses naturelles de 10 mètres de haut et un fossé creusé qui en font lun des premiers « cap barrés » du Rouergue. De nombreux escaliers, taillés dans l'escarpement du rocher conduisent au sommet du site. En 1394 renforcements  des défenses du château. Au début de la guerre de religion les riches bourgeois  se font construire des habitations dans l'enceinte fortifiée. A l'entrée, le buste de la Vierge à l'enfant accueille le visiteur.  Au XVIIe siècle le fort n'est plus entretenu, reste deux tours encore visibles. A proximité, belles maisons à colombages.","habitants":"les seigneurs d'Albin\r\n        \"","divers":"Vestiges du fort d'Aubinreste d'une tour","gps":"","images":["../image/image_12/12_Aubin_1.jpg","../image/image_12/12_Aubin_2.jpg","../image/image_12/12_Aubin_3.jpg","../image/image_12/12_Aubin_4.jpg","../image/image_12/12_Aubin_5.jpg"]},"Consult_chateau_formulairec719":{"id":"Consult_chateau_formulairec719","dept":"12","canton":"Pont de Salars","commune":"Saint-Rome du Tarn","nom":"Auriac","type":"Vestiges","periode":"Xe siècle","histoire":"AURIAC, ce château  antérieur au Xe siècle, lors de l'évangélisation du Rouergue par Saint-Amans, prélat de Rodez, en 1065, les fiefs d'Auriac et de Saint-Rome dépendaient de Raymond de Saint-Gilles qui les monnaya à Bérenger II, fils de Richard, vicomte de Millau, pour partir avec sa femme et ses enfants à la première croisade.  Auriac, de par sa position stratégique au-dessus du Tarn, comprenait deux châteaux et plusieurs coseigneurs. Le plus important, le château supérieur avec le donjon dénommé Le Bournahou , appartenait à la famille d'Auriac. Le seigneur le vendit  en 1364 à Dieudonné de Gozon, seigneur de Mélac. Le second château inférieur, au bas du piton, appartenait aux De Bernard qui le cédèrent aussi en 1364 aux de Mostuéjouls et à Guillaume Jourdain, seigneur de Tournemire.","architecture":"Ce château dominait le pont de Saint-Rome de Tarn à 1 km au nord est de Saint Rome de Tarn.  L'histoire connue du village remonte au Ve siècle, Auriac, de par sa position stratégique au-dessus du Tarn, comprenait deux châteaux; le donjon rectangulaire, aujourd'hui restauré, domine le village où il n'était qu'une tour refuge qui fut transformée en château féodal en deux parties. \r\nAu Xe siècle, la population doit soutenir les assauts des envahisseurs, construire un château fort dit \"de la Tour grosse\", des remparts dont ils subsistent de nos jours une série de portes fortifiées. Les vestiges du pont du XIe siècle sont encore en parties visibles. Ruiné lors des guerres de religion, le bourg est peu à peu reconstruit, gardant ses enceintes fortifiées mais s'ouvrant aussi sur les faubourgs où logeait tout un petit peuple d'artisans.  Le tout fut entouré d'un mur d'enceinte avec tours devenant une forteresse importante.","habitants":"Famille d'Auriac\r\n        \"","divers":"Vestiges d'un donjon du château d' Auriac","gps":"","images":["../image/image_12/12_Auriac_1.jpg","../image/image_12/12_Auriac_2.jpg","../image/image_12/12_Auriac_3.jpg","../image/image_12/12_Auriac_4.jpg","../image/image_12/12_Auriac_5.jpg","../image/image_12/12_Auriac_6.jpg","../image/image_12/12_Auriac_7.jpg","../image/image_12/12_Auriac_8.jpg","../image/image_12/12_Auriac_9.jpg"]},"Consult_chateau_formulaire0647":{"id":"Consult_chateau_formulaire0647","dept":"12","canton":"Saint-Flour","commune":"Auriac-l","nom":"Auriac_Eglise","type":"Vestiges","periode":"XII-XIV","histoire":"A Auriac le château de La Gironde (restes XIVe siècle, remanié au XVIIIe siècle) ou encore les ruines du château fort de Pouzac.                                    GIRONDE, sous la dépendance de la Baronnie de Saint-Santin.   Arnauld de Gironde, le nom de Gironde se lit dans une charte sans date du Cartulaire de Conques, mais dont la teneur lui assigne la fin du XIe siècle ou le début du XIIe. Le moine Gaucelme et à Bégon abbé de Conques, élu en 1087 et remplacé par Boniface en 1107 un emprunt de 422 « sous Melgoriens » dont il se porte garant et dont se portent caution Hugues, Bernard et Rigaud de Moret,  Arnauld de Gironde, Dieudé Pierre et son fils,    La famille Escaffre. La famille de Bertrand. Bégon de Bertrand était, en 1363, seigneur du château de Murat-la-Rabe  Begon II, fils de Pierre et de Jeanne de Cornac devait, à leur mort, posséder la seigneurie de Gironde.    La famille de Felzins.                                                                              Château fort de Pouzac ruiné.","architecture":"Les châteaux féodaux caractérisent assez bien le régime social des Xe, XIe et XIIe siècles. Pour se défendre, il faut d'abord se fortifier. Du haut de sa montagne rocheuse aux pentes escarpées et parfois inaccessibles, presque isolé des hauteurs voisines, le château de Gironde donne une idée de ces nids d'aigle, d'où les seigneurs de jadis étendaient leurs autorités sur les contrées d'alentour, dans ces temps de luttes fréquentes où l'on avait à se garantir contre des attaques souvent imprévues. L'expression castrum que lui donnent les vieux documents, désigne Le domaine relevant du château et englobe les demeures groupées sous sa protection. Le guetteur surveillait au loin les  brigands ou ennemis, au son de la cloche il donnait l'alarme, et chacun de se réfugier dans l'enceinte murée du château.","habitants":"Arnauld de Gironde\r\n        \r\n        \"","divers":"Vestige d'Auriac l'Eglise","gps":"","images":["../image/image_15/15_Auriac_Eglise_1.jpg"]},"Consult_chateau_formulaire8f9e":{"id":"Consult_chateau_formulaire8f9e","dept":"12","canton":"La Cavalerie","commune":"Balaguier sur Rance","nom":"Balaguier","type":"Château","periode":"XIII","histoire":"BALAGUIER, ce château aurait été occupé pendant plusieurs années par les sarrasins. La demeure actuelle était la propriété commune des comtes de Toulouse et de la famille de Roquecézière. La bâtisse fut cédée par moitié au monastère de Bonnecombe. L'édifice passa successivement aux familles de Vassal, de Saint Maurice, de Brandouin, de Frégémont et à la famille de Méjean de Marmande.","architecture":"Balaguier-sur-Rance, l'actuel château  sur la rive droite remonte au XVIIe siècle et a été bâti en partie sur les restes d'un château du XIIIe siècle. Il existait en outre un bâtiment du XIIIe siècle, situé sur un roc dominant le village et la rive gauche, est divisé en deux parties situées de part et d'autre de la rivière, le Rance. Balaguier le Maigre (ou le Vieux), sur la rive droite, avec ses maisons accrochées sous un éperon rocheux qui a porté un ouvrage fortifié dont il ne reste aucune trace. Sur la rive gauche, Balaguier le Gras, avec son église, la mairie et un château des XVe et XVIe siècles. Les deux rives sont reliées par un pont en pierre du XVe siècle.","habitants":"Famille de Roquecézière. \r\n        \"","divers":"Château féodal de Balaguier","gps":"","images":["../image/image_12/12_Balaguier_1.jpg","../image/image_12/12_Balaguier_2.jpg","../image/image_12/12_Balaguier_3.jpg","../image/image_12/12_Balaguier_4.jpg","../image/image_12/12_Balaguier_5.jpg"]},"Consult_chateau_formulaire2bcc":{"id":"Consult_chateau_formulaire2bcc","dept":"12","canton":"Marsillac-Vallon","commune":"Balsac","nom":"Balsac","type":"Château","periode":"XII-XVI","histoire":"BALSAC, en 1150 une famille noble de Balsac ou Balzac apparaît, portant son nom de son lieu dorigine, on trouve ainsi un Hélias de Balsac en 1184, un Bernard-Hugues de Balsac en 1268, un Pierre Brenguier de Balsac en 1320; mais dès 1333 la féodalité entraîne sûrement des regroupements et apparaissent plusieurs coseigneurs de Balsac, Géraud dArjac et Guillaume de La Roque deviennent, en même temps que Hugues Pons de Balsac, coseigneurs de Balsac, il sagit dune maison forte proche de Balsac, nommée Lozières, qui servira ensuite de métairie au château. Le château a subi un incendie, en 1570 et reconstruit par Bertrand de Glandières et son fils Louis de Balsac (1561-1601), passe ensuite dans la famille de Framond dont le dernier Auguste Alexandre de Faramond, baron de Jocqueviel, seigneur de Balsac,  capitaine au régiment de Vexin, chevalier de Saint-Louis, épouse Charlotte de Michaud dont il n'a pas d'héritier; il vend le château de Balsac en 1779 et meurt à Albi en 1795. Guillaume Grailhe, achète le 28 septembre 1779 le château,Rose Grailhe (1766-1847), héritière de Balsac, qui épouse en 1786 Antoine Villa, négociant puis juge à Rodez, qui n'a pas d'héritier et lègue toute sa fortune en 1860 au cousin de sa femme Armand Grailhe; Pierre-Édouard Grailhe marié avec Agathe Delpech-Delpérié, fille de Jean-Antoine Delpech de Frayssinet (1785-1858).\r\nArmand Grailhe, juge de paix à Salles-Curan, vend le château en 1867 à Louis-Léon Mouly, avoué à Rodez, qui le revend en 1882, Jean-Pierre Gabriac, qui le revend à son tour en 1896 à Ernest Mercadier (1836-1911), ingénieur électricien, inventeur, directeur des études à l'école polytechnique.\r\n Un petit musée dédié à la dynastie des capétiens, hommage à l'union exemplaire d'une famille et d'un pays pendant plus de 800 ans.","architecture":"Le château de Balsac est constitué de plusieurs bâtiments qui sont disposés autour d'une cour et qui ont été transformés entre le XVIe siècle et le XVIIe siècle. Le corps de logis principal, qui est percé de fenêtres renaissances à meneaux, est flanqué de tours circulaires et d'un donjon. La porte d'entrée est encadrée de pilastres soutenant un fronton. Ce château fondé au XIIe siècle, est aujourd'hui constitué d'un corps de logis Renaissance, d'un donjon carré et de tours rondes. La visite est complétée par un petit musée dédié à la dynastie des capétiens.  Le corps de logis principal est flanqué de tours circulaires et d'un donjon. Le bâtiment principal est percé de fenêtres Renaissance. Porte à pilastres toscans soutenant un fronton.","habitants":"Louis de Balsac\r\n        \"","divers":"Château de Balsac","gps":"","images":["../image/image_12/12_Balsac_1.jpg","../image/image_12/12_Balsac_2.jpg","../image/image_12/12_Balsac_3.jpg","../image/image_12/12_Balsac_4.jpg"]},"Consult_chateau_formulaire0517":{"id":"Consult_chateau_formulaire0517","dept":"12","canton":"Sébazac-Concourés","commune":"Bozouls","nom":"Barriac_Bozouls","type":"Château","periode":"XVIII","histoire":"Quatre châteaux sur la commune de Barriac Masmajou  celui de Crespia, de Paumes,  de Ledenac et de la Grange-Seyvèrac (voir article)                                                                                                      ROQUEFEUIL,   Antoine de Goudal, sieur de La Coste, capitaine de Barriac, demeure à Masmajou. Sa petite fille Françoise, en épousant en 1637 le noble Jacques de Roquefeuil, sieur dArcisse, va faire entrer Masmajou dans les biens de la famille. On sait cependant que le domaine de Masmajou est resté dans la famille de Roquefeuil jusquà la Révolution.                                                 CRESPIAC, construction de Jean-Joseph Trédolat-de-Maymac, conseiller en la Sénéchaussée, juge présidial à Rodez, recensé en 1811 parmi les plus imposés du département.                               PAUMES, le domaine de Paumes a connu des ecclésiastiques aveyronnais de premiers plans. Denis Affre y côtoyait son oncle, labbé Boyer, né à la « grange » de Lioujas. Vers le milieu du XVIe siècle, une famille Boyer était déjà établie sur le domaine de Paumes. En 1811, Antoine Boyer faisait partie de la fameuse liste des six cents plus imposés du département. Depuis 1962, le domaine de Paumes, servait de centre aéré pour les uvres Laïques. Auparavant, en 1947, une colonie de vacances des P.T.T. sy était installée.                                                                           LEDENAC Le domaine de Lédénac appartenait à lorigine à la famille Azémar et ce, depuis le début du XVIIIe siècle, période de sa construction. En 1849 Henri Rivière, propriétaire de Paumes acheta Lédénac. Le 10 Mai 1927 Henri de Lanzac de Montlogis acquit lensemble du domaine à son cousin avec le bénéfice de la vente du château du Bousquet près de Laguiole. La famille de Lanzac de Montlogis témoigne de huit cents ans d'histoire jalonnée de faits dignes d'intérêts dont la participation de lun de ses ancêtres Jean de Chaunac  à la troisième croisade de 1189 à 1192,  le duel victorieux du seigneur de Montlogis en 1782, lincendie du château de Montlogis en 1792 et larrivée au château du Bousquet en 1903 à la suite des Montpeyroux et Roquefeuil.","architecture":"Roquefeuil, château datait du XVIe siècle, aujourd'hui à disparu, seules quelques pierres et une partie souterraine subsiste. Cependant, on peut encore identifier, en bord de route, ce que fut le colombier du château. Transformé en refuge pour le bétail, puis en logis dhabitation, il conserve un rez-de-chaussée voûté.                      Crespiac, la maison de maître elle-même est typique du Causse Comtal. Une tourelle carrée à toit pavillonnaire en accolade abrite le traditionnel pigeonnier et domine lensemble de la bâtisse rectangulaire. Lorigine  remonte pour lessentiel aux années 1780. Elle sappuie sur une plus ancienne à usage dhabitation pour le fermier.                                                                                          Paumes Cest vers cette époque que les bâtiments furent transformés. Ils le seront encore plus tard pour satisfaire aux exigences des groupes de jeunes. Aujourdhui, habitation particulière, la bâtisse garde le souvenir des grands ecclésiastiques pour certains, et des images de colonies de vacances, pour dautres.                                                                                         Ledenac construit au XVIIIe siècle, de plan rectangulaire à deux niveaux accolés d'un donjon carré à toit pointu.","habitants":"Famille de Roquefeuil                                                                            Famille Azémar\r\n        \"","divers":"Château à Barriac, de Crespia , de Paumes, de Landenac et de la Grange-Seyvèrac.","gps":"","images":["../image/image_12/12_Barriac_Bozouls_1.jpg","../image/image_12/12_Barriac_Bozouls_2.jpg","../image/image_12/12_Barriac_Bozouls_3.jpg","../image/image_12/12_Barriac_Bozouls_4.jpg"]},"Consult_chateau_formulaired463":{"id":"Consult_chateau_formulaired463","dept":"12","canton":"Salles la Source","commune":"Neuviale","nom":"Belcaire","type":"Vestiges","periode":"XII","histoire":"BELCAIRE, cité au XIIe siècle, ancienne place forte appartenant à la maison d'Armagnac mais le château est déjà construit, il est occupé par les seigneurs de Panat qui rendent hommage à lévêque de Rodez. Pourtant le lieu de Nova Vila qui sétale aux pieds du château est attesté avec son église dès le X e siècle. Le fief passe ensuite aux mains des puissants seigneurs de Sévérac. Puis vers 1427, suite à l'assassinat du Maréchal de Séverac, c'est la famille d'Armagnac qui prend possession de Belcaire. Sen suit une période trouble ou le château passe sous domination royale sous le roi Charles VII avant de retrouver son propriétaire. Puis en 1469, le nouveau roi Louis XI fait saisir Belcaire et lattribue à sa fille Jeanne, reine de France et épouse de Louis XII. Vers 1586, après que la propriété en fut attribuée à la famille dArpajon par le parlement, le château est endommagé pendant la période des guerres de religion opposant catholiques et protestants. En 1714, le château est vendu à Jean Forestier, seigneur, qui le cède par la suite à son neveu Jean François Jouéry. Vers 1800, le château passe par voie testamentaire, à la famille de Bournazel qui le vendra par la suite. Vers 1820, cest le début de la démolition des bâtisses, les pierres serviront à construire les maisons de Nauviale. Vers 1900, deux modestes ménages habitent encore les ruines, puis vers 1920 lensemble est rasée pour donner la forme actuelle du site, construit au XVIe siècle et restauré au XIXe siècle. Fondée en 1053, Villeneuve d'Aveyron possède une église romane.","architecture":"Belcaire est fondée en 1053, le château dit de Belfort  fut construit sur une hauteur au confluent des vallées du créneau (provenant de Marcillac) et du dourdou provenant de Villecomtal, ce château au temps de sa splendeur : Il se développait sur une enceinte polygonale flanquée de 8 tours rondes dont-il ne reste que les soubassements, couronnées de mâchicoulis, qui protégeait le corps du logis principal. Lintérêt stratégique et économique du site, le pont sur le Dourdou et péage, explique le choix de la place, . A lépoque romaine, le site de Belcayre est très certainement un camp dobservation commandant la vallée du Dourdou. du château :  Au XVIe siècle, le château est partiellement détruit durant les guerres de religion.","habitants":"Famille d'Armagnac \r\n        \"","divers":"Vestiges du fort de Belcaire","gps":"","images":["../image/image_12/12_Belcaire_1.jpg","../image/image_12/12_Belcaire_2.jpg","../image/image_12/12_Belcaire_3.jpg"]},"Consult_chateau_formulairef67d":{"id":"Consult_chateau_formulairef67d","dept":"12","canton":"Aubin","commune":"Belcastel","nom":"Belcastel_Aveyron","type":"Forteresse","periode":"XIIIe","histoire":"BELCASTEL dès 1040, les seigneurs  ont érigés cette forteresse non seulement pour se protéger des invasions qui sévissent encore à cette époque, mais pour affirmer leur puissance, aussi pour protéger les villageois, en 1251 Raymond de Belcastel   le cède au  comte Hugues de Rodez. Le XIIIe siècle est fatal aux seigneurs de Belcastel car ils vont participer aux croisades en Orient, se ruinent, pour finalement y disparaître. Le château est ensuite livré à lui-même, à des bandes de pillards appelés « routiers », pillant les campagnes lorsquils nont pas dactivité, assiégeant les forteresses et sy repliant avec leur butin (les boulets découverts fichés dans les murailles attestent de ces assauts). En 1378, les états du Rouergue rachètent le château aux routiers puis le revendent à Jean II dArmagnac qui lutilise comme bastion militaire. Il en fait don en 1386 à Guy de Saunhac, plus tard, à lun de ses valeureux chevaliers, Guillaume de Saunhac. Avec lui, apparaît le deuxième nom important dans la vie de ce château. Un de ses descendants, Alzias, va lembellir au XVe siècle, et jouera un rôle important de bâtisseur dans le village en construisant le pont sur lAveyron et léglise sur lautre rive. Au XVIe siècle, le château est déserté, puis abandonné. Au XIXe siècle, il sert de carrière et tombe définitivement en ruine. Il est redécouvert dans les années 1970 par le célèbre architecte français Fernand Pouillon qui décide de le restaurer, château de Belcastel est depuis 2005 la propriété privée.","architecture":"La forteresse se présente sous forme dune enceinte polygonale, flanquée de cinq tours rondes, entièrement construit sur le rocher, se  présente par dimposantes murailles qui se dressent en à-pic au dessus du village au sud. La seule entrée possible était la même que celle empruntée aujourdhui par les visiteurs et conduisait à un étroit pont-levis à flèches, flanqué du corps de garde. Les douves, indestructibles, ont été directement creusées dans le rocher et la pierre extraite a servi à la construction du château. Franchi le pont-levis, le visiteur se trouve face à deux enceintes successives pour finalement aboutir à un donjon carré de 38 m de haut.   A l'intérieur une voûte présente encore les vestiges dune très belle fresque. Coiffant celle-ci, se dresse une seconde chapelle, dont les formes élégantes et détails soignés démontrent quelle fut véritablement conçue au XVe siècle pour les nobles de la région et le seigneur du lieu. Comme la citerne et la chapelle préromane, la salle des gardes a été en partie creusée dans le rocher et présente une intéressante voûte darête et un rare appareillage de pierre baptisé « arête de poisson ». La prison, du XVe siècle, conservait encore des oubliettes, définitivement condamnées lors de la réhabilitation.","habitants":"Famille de Belcastel\r\n        \"","divers":"Vestiges de la forteresse de Belcastel","gps":"","images":["../image/image_12/12_Belcastel_1.jpg","../image/image_12/12_Belcastel_2.jpg","../image/image_12/12_Belcastel_3.jpg","../image/image_12/12_Belcastel_4.jpg","../image/image_12/12_Belcastel_5.jpg","../image/image_12/12_Belcastel_6.jpg"]},"Consult_chateau_formulaireb7f5":{"id":"Consult_chateau_formulaireb7f5","dept":"12","canton":"Saint-Geniez d","commune":"Bertholène","nom":"Bertholène","type":"Vestiges","periode":"XIII","histoire":"Trois châteaux à Bertholène, celui de Bertholène du XIIIe siècle, de Bourines  du XIIIe siècle (voir article) et celui de Planques du XVIIIe siècle.                                                                                         BERTHOLENE, les premiers occupants connus sont des Brenguier, qui doivent l'hommage à la fois au comte de Rodez et au seigneur de Sévérac, mais les membres de cette famille n'apparaissent dans les textes comme seigneurs du lieu qu'à la fin au XIIIe siècle, ils y resteront jusqu'au XVIe siècle. Point de résistance huguenote, il a été assiégé et mis à sac en 1556 par les troupes catholiques et en partie incendié.                                               PLANQUE, pas d'informations de ce château du XVIIIe siècle .","architecture":"Bertholène datant du XIIIe siècle, est situé sur une position stratégique de la haute vallée de l'Aveyron, surplombe le bas bourg créant une surprenante impression de relief par leur situation stratégique. Il fut l'objet dun programme de restauration par la commune qui le reçut en don en 1992, le château et son enceinte haute de plusieurs mètres datent du XIIIe siècle. Les dégagements opérés par les archéologues, ont permis de mettre à jour un des ensembles mobiliers les plus riches jamais découvert dans le Rouergue. Ils sont visibles au musée archéologique de Montrozier. Attenante au château, léglise ornée de fresques modernes, a été reconstruite en 1839. Il était notamment un lieu où la justice était donné (arbitrage). Il fut assiégé lors des guerres de religion et en partie détruit. La façade actuelle a conservé ses fenêtres à meneaux de style Renaissance.   Ruines d'un château dont il ne reste qu'un logis du XVIIe siècle, une tour d'angle circulaire et une tourelle carrée.","habitants":"Seigneur de Sévérac\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Bertholène","gps":"","images":["../image/image_12/12_Bertholene_1.jpg","../image/image_12/12_Bertholene_2.jpg","../image/image_12/12_Bertholene_3.jpg","../image/image_12/12_Bertholene_4.jpg","../image/image_12/12_Bertholene_5.jpg"]},"Consult_chateau_formulaire1638":{"id":"Consult_chateau_formulaire1638","dept":"12","canton":"Salles la Source","commune":"Salles la Source","nom":"Billorgues","type":"Manoir","periode":"XIV","histoire":"BILLORGUES, au XIIIe siècle, Salles la Source possède vingt co-seigneurs répartis entre quelques grandes familles: les Calmont, Panat, de la Tour, de la Roque, des Ondes, Saint Paul, les Ratier ou Saunhac. Le château de Billorgues fut construit au XVe siècle, il a été rendu célèbre par deux agronomes, Moly de Billorgues puis le général républicain Tarayre qui y mène a dintéressantes expériences agricoles. Conseiller de Bonaparte en Hollande, il va essayer dappliquer sur son domaine les pratiques agricoles.\r\nEn 1461, le \"repaire\" de Billorgues appartient à la famille Laborme.\r\nEn 1485, Pierre Raymond Laborme fait construire en ce lieu une fénial (en patois local signifie le \"grenier à foin\"). En 1534, le site appartient à Antoine Seguy. Au milieu du XVIe siècle, Antoine vend la construction et les terres à Jean Daymes.  En cette fin de XVIe siècle, le château appartient successivement , à la famille Cat,  à une branche de la famille Dardenne. En 1617, le site est possession de Raymond de Neuffles. En 1678, noble François de Collonges est seigneur de Billorgues.  Au début du XVIIIe siècle, le site appartient à la famille Moly. Ses propriétaires réalisent de nombreuses expériences agricoles. Vers 1792, les révolutionnaires ne semblent pas s'intéresser à la construction ni aux terres.  Durant la première moitié du XIXe siècle, le château est profondément remanié sur la demande de son propriétaire : Le général Tarayre. Ce site aurait été l'une des plus belles exploitations agricoles de l'Aveyron.","architecture":"Billorgues, derrière des hangars modernes une haute construction rappelle les donjons habitables du Moyen-Age. Après quelques secondes d'observation, cette construction est un manoir fortifié. La construction parallélépipédique semble être entourée par un mur extérieur très arasé. qui servait de rempart. Elle possède 4 étages sur rez-de-chaussée. Les combles semblent aménagés. Chaque angle possède une échauguette, mais les traces de système défensif ont été supprimés par des fenêtres.","habitants":"Famille Laborme\r\n        \"","divers":"Manoir de Billorgues","gps":"","images":["../image/image_12/12_Billorgues_1.jpg","../image/image_12/12_Billorgues_2.jpg","../image/image_12/12_Billorgues_3.jpg"]},"Consult_chateau_formulairee67a":{"id":"Consult_chateau_formulairee67a","dept":"12","canton":"Aubin","commune":"Camjac","nom":"Bosc_Lautrec","type":"Château","periode":"XII-XIV","histoire":"BOSC,  forteresse féodale du XIIe siècle, fut la demeure familiale de Toulouse-Lautrec. Né en 1864 à Albi, le peintre y passa sa jeunesse et de nombreuses vacances. Ce château médiéval n'a jamais quitté la famille pendant 800 ans. Henri de Toulouse-Lautrec étant l'arrière petit-fils d'Amédée Imbert du Bosc.  A la famille de Béranger du Bosc chevalier du roi puis des seigneurs de Miramont au XVe siècle, il appartient ensuite aux Imbert et aux Faramond coseigneurs du lieu et enfin aux Imbert seuls depuis 1651. Le château fut rebâtit et reprit plusieurs fois jusqu'au XIXe siècle. En 1592, Il fut pillé par les protestants. Le 14 février 1790, le château du Bosc subit une attaque de révolutionnaires, mais fut défendu par des paysans. Au XIXe siècle, les héritières, Gabrielle et Louise d'Imbert du Bosc épouseront respectivement Raymond Casimir de Toulouse de Lautrec et Léonce Tapié de Céleyran, leur alliance avec les Toulouse Lautrec explique les nombreux séjours que le peintre fit dans le pays pendant son enfance. Henri de Toulouse Lautrec a vu construire la chapelle.  Ce château qui n'a jamais été vendu appartient au Tapié de Céleyran,  en 1878  Henri de Toulouse de lautrec effectue une chute qui entravera   sa croissance, ce dernier décédera au château de Malromé en 1901, que sa mère avait acquis, c'est d'ailleurs une descendante du peintre qui en assure encore aujourd'hui la visite. Puis au XIXe siècle par la grand-mère maternelle du peintre, cette demeure est ouverte au public toute lannée depuis 1954. Propriété aujourd'hui de Nicole  Tapié de Céleyran.  Fait exceptionnel, de père en fils ou doncle à neveu,  sy marient habilement génie du lieu et lieu de génie.","architecture":"Bosc, situé sur la commune de Camjac, ancienne forteresse féodale du XIIe siècle, les deux tours du château datent du XIIe siècle, au temps où Le Bosc était une forteresse. Construction au XIVe siècle, deux bâtiments de plan en U séparé par une cour, celui de l'arrière à deux  niveaux, inférieure au château qui lui est de quatre niveaux et flanqué des deux tours rondes, l'ensemble remanié au XVIe siècle, comme latteste les fenêtres à meneaux aux angles en façade, au XVIIIe siècle destruction du donjon. Bibliothèque, la grande salle, ou salle des gardes qui sorne dune cheminée Renaissance portant la date de 1521, un oratoire du XIIe siècle, le grand salon et ses tapisseries dAubusson du XVIIIe siècle, la chambre denfant du peintre et un musée où sont rassemblés uvres de jeunesse, lithographies et affiches.","habitants":"Famille de Béranger du Bosc.                                                                    Henri de Toulouse Lautrec\r\n        \"","divers":"Forteresse féodale du Bosc","gps":"","images":["../image/image_12/12_Bosc_Lautrec_1.jpg","../image/image_12/12_Bosc_Lautrec_2.jpg","../image/image_12/12_Bosc_Lautrec_3.jpg","../image/image_12/12_Bosc_Lautrec_4.jpg","../image/image_12/12_Bosc_Lautrec_5.jpg","../image/image_12/12_Bosc_Lautrec_6.jpg"]},"Consult_chateau_formulaire1381":{"id":"Consult_chateau_formulaire1381","dept":"12","canton":"Capdenac","commune":"Bouillac","nom":"Bouillac","type":"Maison forte","periode":"XV","histoire":"BOUILLAC, le dernier survivant au XVIIIe siècle est Gilles de La Roque Bouillac, de la branche aînée des \"La Roque Bouillac\" ne laissant ni héritier ni fortune, le château fut vendu. \r\n Le donjon et la tour ont été détruits par ses propriétaires en 1925, à cause des impôts calculés à lépoque sur le nombre de fenêtres, de cheminées et de tours. Létat actuel dabandon fait craindre à court terme, la perte dune belle page dhistoire.","architecture":"Ce château de Bouillac est aujourdhui en létat dabandon, il est formé de deux ailes perpendiculaires, la plus ancienne est adossée à la colline. Une grande partie aurait été détruite par le tracé de la nationale dans les années 60,  dorigine médiévale, sa façade fut percée à la Renaissance de larges fenêtres, reprises au XIXe siècle. Il se déploie sur deux ailes perpendiculaires dont la plus ancienne est adossée à la colline. L'aile du XVIIIe siècle est occupée par toute une série de pièces en enfilade, renfermant des boiseries de la même époque (lambris, portes, décors de stuc de style rocaille, cheminées de marbre).","habitants":"Famille de La Roque Bouillac\r\n        \"","divers":"Maison forte de Bouillac","gps":"","images":["../image/image_12/12_Bouillac_1.jpg","../image/image_12/12_Bouillac_2.jpg","../image/image_12/12_Bouillac_3.jpg","../image/image_12/12_Bouillac_4.jpg","../image/image_12/12_Bouillac_5.jpg","../image/image_12/12_Bouillac_6.jpg","../image/image_12/12_Bouillac_7.jpg"]},"Consult_chateau_formulaire261b":{"id":"Consult_chateau_formulaire261b","dept":"12","canton":"Saint-Genièz d","commune":"Bertholène","nom":"Bourines","type":"Forteresse","periode":"XIII","histoire":"BOURINES, le fief  appartenait à la famille Séveyrac au XIIIe siècle, en 1289  le baron de Séverac cède les Bourines aux moines de l'ordre militaire et religieux placés sous l'autorité des Doms d'Aubrac, les prieurs de la famille d'Estaing peu d'années après prise de possession, propriété du cardinal  Georges d'Armagnac, de l'abbaye d'Aubrac. A la fin du XVe siècle, la tour de défense Nord-Ouest est aménagée. Elle porte les armes de la famille d'Estaing. En 1547, le portail d'entrée  est modifié possède le nom gravé  du cardinal évêque de Rodez, Georges d'Armagnac,. En 1562, le château est gardé par le chevalier  de Montpeyroux. En 1565, attaque du  château pris par 300 soldats sur l'ordre du prieur de Caudelz.  En 1574, durant les guerres de religion, les huguenots assiègent le site. En 1791, les révolutionnaires forcent la vente des Bourines qui appartenait aux moines d'Aubrac, à Antoine Marcillac et Louis Gineste. En 1794, le site et les terres appartiennent à une association composées des familles : Granier, Dupin, Mourgues. En 1936, la famille Aubaret habite le château. A la fin du XXe siècle, le site est la possession de la famille Delmas.   En 1981, le château a servi de cadre au tournage du film Malevil de Christian de Chalonge,et en 2003, Gérard Krawczyk y tournait Fanfan la Tulipe.","architecture":"Bourines architecture différente est certainement causé par des aménagements sur plusieurs siècles. D'ailleurs, les différences de pierres sont évidentes. Une imposante tour carrée sur la droite, peut être servait elle à la défense de la porte actuelle, ne comporte aucune archère ni ouverture de tir.  A gauche de la tour, le mur est soutenu par quatre contreforts à larmier. un d'entre eux bouche partiellement une ouverture Romane,  Au dessus, plusieurs constructions en encorbellement. Au bout du long mur parsemé de latrines haut perchées,  une tour  ronde est visible. Elle possède quelques éléments médiévaux. Au sommet, un chemin de ronde couvert pour le guet et la défense, les classiques et efficaces mâchicoulis.  Des fenêtres de confort prouvant que des salles d'habitation  existaient. A mi-hauteur, une pierre sculptée, une tour médiévale,  au rez-de-chaussée, une porte, habituel pour une tour de défense au Moyen-Age.  Deux tours médiévales à la toiture très différente, une autre tour ronde plus haute à toiture élevée, avec archères du XIIe siècle.  Au bout de la longue façade une  tour ronde  identique à la première avec  quelques détails différents:   Au centre du quadrilatère, un puissant donjon. La grange ou ferme fortifiée  des Bourines, terme toujours employé en Rouergue au Moyen-Age, pour désigner ces possessions rurales dépendant des monastères, devait consister presque uniquement dans l'énorme donjon aujourd'hui encore la partie principale et la plus remarquable du château, celle qui, écrasant les autres constructions, donne à l'ensemble tout son caractère et révèle sa première et véritable destination.","habitants":"Famille Séveyrac                                                                                    Famille Aubaret \r\n        \"","divers":"Forteresse de Bourines","gps":"","images":["../image/image_12/12_Bourines_1.jpg","../image/image_12/12_Bourines_2.jpg","../image/image_12/12_Bourines_3.jpg","../image/image_12/12_Bourines_4.jpg","../image/image_12/12_Bourines_5.jpg","../image/image_12/12_Bourines_6.jpg","../image/image_12/12_Bourines_7.jpg"]},"Consult_chateau_formulaire6798":{"id":"Consult_chateau_formulaire6798","dept":"12","canton":"Aubin","commune":"Bournazel","nom":"Bournazel","type":"Château","periode":"X-XVI","histoire":"BOURNAZEL, érigé sur l'ancienne forteresse médiévale, s'inscrit dans la lignée de la Renaissance Ligérienne. Au Xe siècle baronnie, en 1341   fief du seigneur  de Pradelle de Rignac puis vendu à la famille de Mancip l'un de ses descendants Hugues de Mancip est nommé en 1641 par le roi Louis XI sénéchal de Toulouse, l'héritière de Bournazel Charlotte de Mancip apporte par alliance à Jean de Buisson , seigneur de Mirabel, originaire d'Aubin, riche commerçant toulousain ce dernier entreprend la construction du château en conservant les tours de l'ancien. Malgré les ravages causés par la révolte paysanne de 1790, le charme de cet édifice, reste authentique. Restauré en 1860 par Viollet-le-Duc, et en 1951 vendu aux charbonnages de France. L'architecte Guillaume de Lissorgues y aurait perdu la vie lors de sa construction. Celui-ci voulut en effet orner lui-même d'un gigantesque pélican de plomb (ou d'un phénix doré à la feuille selon les témoignages) la crête d'un pavillon du château. L'édifice resta alors inachevé. Le château de Bournazel deviendra un centre de repos et de convalescence pour les mineurs du bassin de Decazeville avant d'être racheté dans les années 2000 par l'un des dirigeants d'AXA. Ce dernier a financé de grands travaux de réaménagement.","architecture":"Bournazel était une ville fortifiée au Moyen-Age, le château de Bournazel, dont la construction remonterait au Xe siècle, a été entièrement remanié au XVIe siècle Ses remparts étaient percés de portes dont deux subsistent aujourd'hui  au travers des campagnes de la Renaissance l'aile nord commencée vers 1442-43 est terminée en 1545  sur les vestiges d'une forteresse médiévale dont deux tours subsistent, fleuron de la Renaissance, L'aile orientale (1550-55) est un inestimable chef d'uvre qui témoigne d'une vaste culture architecturale.  Il est aujourd'hui considéré comme l'un des plus beaux exemples de l'architecture de la Renaissance en Rouergues.\r\n La façade qui possède une parfaite maîtrise des ordres, est orchestrée par la travée rythmique qui développe une profondeur et une monumentalité inattendues qui évoquent la galerie sur cour du palais Venezia à Rome. \r\nUn porche à deux tours tronquées marque l'entrée du château, il est un vestige de l'ancienne enceinte du premier château médiéval. Cette enceinte couvrait une surface bien supérieure à celle du château actuel. \r\n Après, il vous faudra encore passer deux tours monumentales ouvrant sur la cour d'honneur. Jean de Buisson fait reconstruire dans un style Renaissance, selon le modèle du château d'Assier dans le Lot. Les travaux débutent en 1542. Le château s'ordonne autour de sa cour d'honneur : un grand bâtiment central de style français, attenant l'aile orientale d'inspiration italienne et l'aile sud qui ne fut jamais achevée.","habitants":"Charlotte de Mancip\r\n        \"","divers":"Château de Bournazel","gps":"","images":["../image/image_12/12_Bournazel_1.jpg","../image/image_12/12_Bournazel_2.jpg","../image/image_12/12_Bournazel_3.jpg","../image/image_12/12_Bournazel_4.jpg","../image/image_12/12_Bournazel_5.jpg","../image/image_12/12_Bournazel_6.jpg","../image/image_12/12_Bournazel_7.jpg"]},"Consult_chateau_formulaire8347":{"id":"Consult_chateau_formulaire8347","dept":"12","canton":"Laguiole","commune":"Montpeyroux","nom":"Bousquet_Esparrou","type":"Forteresse","periode":"XIV","histoire":"BOUSQUET est certainement la plus puissante et la plus belle des forteresses féodales du Rouergue. Vers la fin du XVIe siècle, l'arrivée des Roquefeuil déclenche des aménagements nouveaux afin de le rendre habitable. Les Roquefeuil de la branche aînée résideront au Bousquet jusqu'au début du XXe siècle. De leur temps, datent les bâtiments annexes, grange-étable, écuries et communs. A la Révolution, le Bousquet est épargné, le mobilier est vendu sur place à l'exception d'un grand calvaire et un fonds d'archives, trois propriétaires se succèdent.  Pierre-Dijols châtelain du Bousquet, depuis 1980 quand il s'est installé définitivement au Bousquet. Achat du Bousquet à Gabriel Gaston en 1951.                                      ESPARROU, habité au XIe siècle par les seigneurs de Montpeyroux. A l'est du hameau de Saint Rémy. Guillaume d'Esparrou qui appartenait à la noble et ancienne famille d'Esparrou, tirant son nom du lieu d'Esparrou vivait en 1285. Il fut père de Souveraine, mariée au commencement du XIVe siècle avec Guillaume de Solages, chevalier, baron du Tholet et de Ricarde, femme de Yves de Montpeyroux. Il eut aussi pour fils Guillaume II, qui dans un acte de 1352 est qualifié co-seigneur de Montpeyroux.","architecture":"Bousquet  datant de la fin du XIII ou du début du XIV siècle, six tours, créneaux et mâchicoulis, deux étages de chemins de rondes, comme on l'imagine dans les contes,  ancienne châtellenie royale. Le Bousquet,  comme le gardien de cet ancien itinéraire issu de Saint-Urcize qui mène directement à Entraygues et à Conques.  Pendant quelques années avec laide de lEtat des travaux de restauration ont été entrepris. La toiture principale , ainsi que celles des six tours. Un cadre idéal sans doute pour un roman de Chevalerie. Au centre de la façade Est une tour carrée en position centrale. Ce monument est une des forteresses médiévales le mieux conservé dans l'Aveyron.  Le site aussi est un musée d'art ancien du Moyen Âge à nos jours.\r\nEsparrou,  le château fut détruit sur ordre de Richelieu vers 1630,  le château d'Esparrou élevé au XIVe siècle, corps de logis ce qui en reste rectangulaire à trois niveaux toitures en croupes accolés d'une tour ronde toiture à deux pans, était entouré d'une muraille et d'un fossé.","habitants":"Famille  Roquefeuil                                                                                         Famille d'Esparrou\r\n        \"","divers":"forteresse du Bousquet et château d'Esparrou.","gps":"","images":["../image/image_12/12_Bousquet_Esparrou_1.jpg","../image/image_12/12_Bousquet_Esparrou_2.jpg","../image/image_12/12_Bousquet_Esparrou_3.jpg","../image/image_12/12_Bousquet_Esparrou_4.jpg","../image/image_12/12_Bousquet_Esparrou_5.jpg","../image/image_12/12_Bousquet_Esparrou_6.jpg"]},"Consult_chateau_formulaire5ec7":{"id":"Consult_chateau_formulaire5ec7","dept":"12","canton":"Sébazac-Concourés","commune":"Bozouls","nom":"Bozouls","type":"Château","periode":"XVII","histoire":"Quatre châteaux à Bozouls dont celui de Bozouls, la maison forte de la Moulinières du XVIIe siècle, de Seveyrac et le château des Brunes du XVIIIe siècle.                                                                BOZOULS, au XIIIe siècle, le château appartient à la famille Brenquier, avant de passer au comte de Rodez. En 1375, les Routiers s'emparent de la ville de Bozouls et de son château. En 1470, après que les vassaux nobles de Jacques d'Armagnac aient prété serment au Roi de France, Louis XI  récupère les biens  et donne le château à Louis de Crussol. En 1482, le fils de Louis de Crussol échange, avec le roi Louis XI, le château de Bozouls contre les rentes du comté de Pézenas. A la fin du XVe siècle, le roi de France Louis XII donne les revenus du château de Bozouls à une fille du Comte d'Armagnac. En 1500, le château est occupé par Pierre d'Armagnac. Au XVIe siècle, châteaux et terres appartiennent au Roi de France. Il semble que le château ne soit plus entretenu. Vers 1600, un Baron de Bozouls  existe mais ne semble avoir aucun droit sur le château.                                        MOULINIERES, du XVe siècle  beaux bâtiments et tours construites en 1632, appartenait à Alboy de Peyrelade, en 1624 aux de Malhac en 1695 aux de Caissac en 1729  à Raymond de Jouery par alliance et des Fléres au XVIIe siècle passe en 1737 à la famille De Maillac de Vessac en 1809 à Louis Souques rachetée en 1835 par Louis Natte, en 1854 à la famille Donadieu en 1858 à Benjamin Laur en 1876  à Henri Arnal.                                           SEVEYRAC,  le comte Hugues de Rodez donne en 1165  le site à l'Abbaye de Bonneval.    Le domaine  en 1664, est dirigé par Séguy de Dalmérac. En 1667, le fermier Antoine Souquet de Barriac.  En 1688, Antoine Bézamat et Antoine Mirabel sont les fermiers. Le fermage est tenu par Gabriel Monteil en 1728, et  en 1765, Pierre Geniez est cité.  Les révolutionnaires en 1792,  s'emparent du site et le vendent comme bien national à Jean Antoine Frayssinoux. A la fin du XIXe siècle, la dernière héritière de la famille Frayssinoux apporte en dot le site à Bernard d'Armagnac. La propriété appartient en 1924, à Claude Desjoyaux. En 1935, Pierre Rieucau achète le domaine.","architecture":"Bozouls, Le château fort n'existe plus.  Il reste les vestiges dun rempart barrant laccès au promontoire côté Sud, seul côté ne bénéficiant pas des protections naturelles de lescarpement des falaises sont composé de grandes pierres correctement taillées, les tours: elles sont situées de part et dautre du goulet détranglement par lequel le ravin de lAlrance débouche dans les gorges du Dourdou.  Quelques pans de mur reconvertis et les 2 minces tours en sont le souvenir. Les traces d'une courtine avec contreforts  montrent la grandeur théorique du château.\r\nLes Brunes, petit château de J.G. Bonenfan (1789) agrandi au XIXe siècle. Moulinières ; beaux bâtiments et tours construits en 1632. en 1672 maison forte remanié et incendié en 1714 . Au  XXe siècle destruction du donjon.                                                               Seveyrac,dit la grange. L'extérieur du site a la forme d'un polygone irrégulier.  le site est fortifié au XIVe siècle, l'enceinte comporte des hauteurs de mur différentes qui n'est point logique pour un système défensif. En réalité, ce sont des bâtiments formant \"rempart\",  imposante tour, égal à un donjon de 4 niveaux.  La partie basse est aveugle. L'entrée s'effectuait au 1er étage  par une passerelle.   La construction avancée comporte l'escalier.  Des fenêtres modernes de confort se sont ouvertes durant les siècles.  L'étage d'habitation médiéval est visible par la baie surmontée d'un arc de décharge. Au même niveau, les vestiges de latrines en encorbellement. Aux angles, des culots rappellent la présence d'échauguettes. Ayant été arasé, le bâtiment ne comporte plus d'étage défensif. Un chemin de ronde couvert avec hourdage ou mâchicoulis existait.  En 1796, un portail \"moderne\" est aménagé.","habitants":"Famille d'Armagnac                                                                       Famille de Crussol                                                                             Famille Donadieu                                                                              Famille Frayssinoux     \r\n        \"","divers":"Vestiges du château de Bouzouls, maison forte de la Moulinières et la forteresse-grange de Séveyrac","gps":"","images":["../image/image_12/12_Bozouls_1.jpg","../image/image_12/12_Bozouls_2.jpg","../image/image_12/12_Bozouls_3.jpg","../image/image_12/12_Bozouls_4.jpg","../image/image_12/12_Bozouls_5.jpg","../image/image_12/12_Bozouls_6.jpg","../image/image_12/12_Bozouls_7.jpg","../image/image_12/12_Bozouls_8.jpg","../image/image_12/12_Bozouls_9.jpg"]},"Consult_chateau_formulaire1cf3":{"id":"Consult_chateau_formulaire1cf3","dept":"12","canton":"Laguiole","commune":"Brommat","nom":"Brommat","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Brommat, celui de Brommat du XV-XVIIIe siècle avec tourelles, d'Albinhac du XVIe siècle et de Castel-Noël du XIV-XIXe siècle avec enceinte .                                                           BROMMAT, le château, qui appartenait à labbaye de Conques, fut démoli en 1760. C'était la résidence du Prieur, c'est à dire du curé et de ses auxiliaires. A la fin du XVIe siècle, ce château devint le \"Fort\" de Brommat. C'est là que pendant les guerres de religions, en novembre 1581, se réfugièrent avant d'être massacrés les catholiques du village lors de l'invasion des huguenots. C'est sur une des cheminées que l'on retrouva les armoiries de la commune. Le château a été racheté par la commune et a subi de très importants travaux de restauration en 2006. Aujourd'hui, il abrite un magnifique retable du XVIIIe siècle, avec un tableau retraçant le martyr de Saint-Saturnin patron de la paroisse.      \r\nALBINHAC, manoir prieural construit dépendant de l'abbaye de Conques construit au XVe siècle et XVe siècle. pas d'autres informations historiques.  CASTEL-NOEL, il était autrefois appelé Calhac. Il a longtemps appartenu aux vicomtes de Carlat. Il apparaît peu après 1010 dans le testament d'Agnès de Carlat.  Longtemps propriété du comte de Carlat,  il était autrefois appelé Calhac. Il a longtemps appartenu aux vicomtes de Carlat.  A quelques kilomètres à l'ouest le château de Taussac dit de \"GO\" pas d'informations historiques  Au XIVe siècle, le seigneur de Cayrac Aujourd'hui se consacre aux Joutes et combats, démonstrations dartisans médiévaux, vie de camp, banquet et musique.","architecture":"Brommat, il subsiste encore prés de léglise une maison forte, bâtisse tour en forme de trapèze avec des ouvertures du XVe siècle. château fort, cette imposante bâtisse fut construite au XVe siècle. Le château a été construit suivant un plan en équerre. Les extrémités côté cour sont munies de poivrières sur culot. Du côté extérieur, les ailes sont flanquées de tours rondes.  Le château, ancien prieuré, est un important bâtiment flanqué de tourelles en poivrière.                                                                                     Albinhac est un château situé à Brommat. Le château a été construit suivant un plan en équerre. Les extrémités côté cour sont munies de poivrières sur culot. Du côté extérieur, les ailes sont flanquées de tours rondes.                                                            Castel-Noël, le corps de logis actuel remonte au XVe siècle et le donjon au XIVe siècle mais a été modifié au XIXe siècle et le dernier donjon daterait du XIVe siècle mais fortement remanié au milieu du XIXe siècle en perdant sa toiture conique et un tiers de sa hauteur A la même période ont été détruites les deux tours qui flanquaient le corps du logis. Le donjon était pourtant resté intact durant la Révolution, seulement ses armoiries avaient été détruites.","habitants":"Vicomtes de Carlat.\r\n        \"","divers":"Château de Brommat de L'Albinhac, de Castel-Noël et maison du Xve siècle","gps":"","images":["../image/image_12/12_Brommat_1.jpg","../image/image_12/12_Brommat_2.jpg","../image/image_12/12_Brommat_3.jpg","../image/image_12/12_Brommat_4.jpg","../image/image_12/12_Brommat_5.jpg","../image/image_12/12_Brommat_6.jpg"]},"Consult_chateau_formulaire1d7b":{"id":"Consult_chateau_formulaire1d7b","dept":"12","canton":"Pont de Salars","commune":"Brousse le Château","nom":"Brousse","type":"Forteresse","periode":"IX","histoire":"BROUSSE, fier vaisseau perché sur son roc le château de Brousse domine les vallées du Tarn et de l'Alrance, protégeant orgueilleusement son village classé parmi les plus beaux villages de France. Au XIIe siècle propriété des comtes de Rodez, en 1204 à la famille dArpajon, avec Bernard I, celui-ci s'installe avec sa femme au château,  S'ensuit le règne de Bernard II qui est surtout célèbre pour avoir fondé une chapelle en la cathédrale de Rodez. Puis Hugues I et Béranger I dominent le château de Brousse. restera dans cette puissante famille d'Arpajon pendant près de 500 ans, Louis d'Arpajon mena dans les armées du roi  Louis XIII une brillante carrière militaire. En 1700  Catherine-Françoise d'Arpajon  vend le château aux Grandsaigne épargné à la Révolution.   Il appartient depuis 1839 à la commune qui en fit un presbytère. Aujourd'hui, c'est le foyer rural de Brousse le château qui en assure la gestion et l'animation (exposition de peintures, outils anciens tapisseries et photos).","architecture":"Brousse le Château : fier vaisseau perché sur son roc dominant les vallées du Tarn et de l'Alrance, protégeant  son village,  sur son éperon rocheux,  le château fort fut construit au IXe siècle. C'est une des forteresses les mieux conservées du Rouergue, avec son enceinte complète, les tours encore toutes visibles. Le chemin de ronde prend appui sur des arcs reposant sur des corbeaux. A l'intérieur, l'escalier Louis XIII ou fin Renaissance Lenceinte fortifiée, le chemin de ronde et les 5 tours de défense sont dorigine et ont traversés toutes les époques depuis le Moyen-Age. Depuis 1960 un groupe à entrepris la restauration du château et des maisons afin de préserver ce bel ensemble architectural. Ce site exceptionnel comprend une église, un oratoire, des maisons de caractère et un pont de style roman. Le château a conservé son enceinte fortifiée ainsi qu'une grande partie de son chemin de ronde.","habitants":"Famille dArpajon\r\n        \"","divers":"Forteresse de Brousse le château","gps":"","images":["../image/image_12/12_Brousse_1.jpg","../image/image_12/12_Brousse_2.jpg","../image/image_12/12_Brousse_3.jpg","../image/image_12/12_Brousse_4.jpg","../image/image_12/12_Brousse_5.jpg","../image/image_12/12_Brousse_6.jpg","../image/image_12/12_Brousse_7.jpg","../image/image_12/12_Brousse_8.jpg","../image/image_12/12_Brousse_9.jpg"]},"Consult_chateau_formulaire7cf0":{"id":"Consult_chateau_formulaire7cf0","dept":"12","canton":"La Cavalerie","commune":"Brusque","nom":"Brusque","type":"Vestiges","periode":"XIII","histoire":"Deux châteaux au Brusque dont le château-fort du Brusque  et le Castelnouvel.                                                                            BRUSQUE,  On ignore à quelle date, antérieure à 1316, Brusque fut inféodé par le roi à la famille des Clermont-Lodève. La seigneurie restera dans les mains de leurs descendants jusqu'à la veille de la Révolution. Elle sera érigée en baronnie en 1367. Les Clermont-Lodève remettront parfois la gestion de Brusque à des vassaux. En 1328, le roi Philippe VI concède aux habitants de Brusque le droit de tenir une foire. Après la bataille de Poitiers en 1356, Brusque avec tout le Rouergue passe sous obédience anglaise. La victoire de Bouchard VII de Vendôme à la bataille de Montlaur, en 1369, fit repasser la ville dans le giron français. Dans la première moitié du XVIe siècle Tristan II de Clermont-Lodève ou l'un de ses fils fit construire le château de Fayet, conçu comme résidence d'agrément occupant une place plus centrale dans leurs nombreuses possessions.  Il devint marquisat en 1610 et propriété de Jacquette de Clermont en 1633 qui y décéda en 1659. Son mari le duc d'Arpajon le vendit au début du XVIIIe siècle. En 1789, il appartenait à Françoise de la Rochefoucault femme du maréchal de Biron. Tous ces seigneurs résidaient maintenant habituellement à Paris. Peu avant la Révolution, la veuve de Louis Antoine vendait le marquisat de Brusque-Fayet à François de Nougarède.\r\nCASTELNOUVEL est situé à 3 km de Brusque. Son origine et son histoire ne sont pas connues. Il apparaît en 1630, propriété de Jean Boutes puis il devint propriété de la famille Fuzier.","architecture":"Le Brusque est bâti sur un énorme rocher cubique et domine Brusque et la vallée du Dourdou, chef lieu d'une viguerie, il fut identifié ensuite lors de la fondation du monastère de Vabres. La baronnie de Brusque passe sur ses entrefaites par mariage à la famille dArpajon-Sévérac, qui semble avoir voulu garder une certaine neutralité en matière religieuse. Il fut abandonné à la Révolution  et il n'en subsiste plus aujourd'hui que des ruines et une tour romane.                                                                    Castelnouvel,  bien que cité en 1630 le  bâtiment est remanié du XIXe siècle, corps de logis  de plan rectangulaire à deux niveaux, le pavillon saillant et plus élevé sur la partie central du bâtiment toiture en croupes.","habitants":"Françoise de la Rochefoucault\r\n        \"","divers":"Vestiges du fort du Brusques et château de Castelnouvel.","gps":"","images":["../image/image_12/12_Brusque_1.jpg","../image/image_12/12_Brusque_2.jpg","../image/image_12/12_Brusque_3.jpg","../image/image_12/12_Brusque_4.jpg","../image/image_12/12_Brusque_5.jpg","../image/image_12/12_Brusque_6.jpg","../image/image_12/12_Brusque_7.jpg"]},"Consult_chateau_formulaire72be":{"id":"Consult_chateau_formulaire72be","dept":"12","canton":"Séverac le Château","commune":"Buzeins","nom":"Buzeins","type":"Château","periode":"XIV","histoire":"A Buzeins deux châteaux celui de Buzeins du XVIe siècle et celui de  Buzareingues du XIVe siècle.\r\nBUZAREINGUES, les anglais venant de Figeac prirent Buzareingues en 1372. En 1586, un parti huguenot, aux ordres des capitaines Seguin et Aubin de Marvejols, sen emparèrent et ne lévacuèrent plus tard  en 1586. Au début du XIXe siècle, Charles Girou de Buzareingues se consacra aux progrès agricoles. En effet, souhaitant transformer ses terres en ferme modèle, il importa en Aveyron des moutons mérinos, des vaches suisses, le premier étalon arabe ainsi que des vaches sans cornes venues dAsie.\r\nBUZEINS, situé au centre du bourg, a été construit au XVIe siècle et possède une très belle tourelle gothique. Actuellement nous ne possédons pas d'historique sur ce château de Buzeins.","architecture":"Buzeins possédait son château défensif à lépoque féodale, aucun vestige ne permet den déterminer avec exactitude la disposition et limportance.\r\n Ce château fut détruit pendant les guerres de religion et il nen reste que les premières pierres dune tour près de léglise. Cet édifice semblait se présenter comme une grande bâtisse en quadrilatère avec des tours dangles rondes ou carrées. Le château actuel situé sur la place centrale du village, il est relativement récent et comporte une tourelle gothique à la base et Renaissance au sommet. Il fut  construit avec les matériaux de lancien château. Dans le village  les maisons du XVI et du XVIIe siècles.\r\n L'une delles porte encore une fenêtre à meneaux et dispose dune porte avec une tête sculptée sur linteau. Une autre se remarque par ses armoiries et sa tour d'escalier.","habitants":"Famille de Charles Girou de Buzareingue\r\n        \r\n        \"","divers":"Château de Buzeins et de Buzarinques","gps":"","images":["../image/image_12/12_Buzeins_1.jpg","../image/image_12/12_Buzeins_2.jpg","../image/image_12/12_Buzeins_3.jpg","../image/image_12/12_Buzeins_4.jpg","../image/image_12/12_Buzeins_5.jpg","../image/image_12/12_Buzeins_6.jpg"]},"Consult_chateau_formulairee65b":{"id":"Consult_chateau_formulairee65b","dept":"12","canton":"Espalion","commune":"Coubissou","nom":"Cabrespines","type":"Château","periode":"XIII-XVII","histoire":"A Cabrespines le château fort de Touruol du XII-XIVe siècles et le Cabrespines à Coubissou.                                                        CABRESPINES; appartenait déjà au comte de Rodez, Guy d'Estaing y avait des droits. Le Baron de Gaujal mourut en 1303 dans le château de Gages qu'il avait fait bâtir , et fut enterré à Bonneval, Cécile, sa fille, fut son héritière, et étant mariée, avec Bernard d'Armagnac, elle ajouta le comté de Rodez, aux nombreux domaines possédés par la puissante famille de son mari. La succession de Henri II fut cependant contestée. Isabelle, soeur aînée de Cécile, après la mort de Cécile, pendant plus de quatre-vingt année ; et il fallut, pour faire désister de ses prétentions, Renaud, sire de Pons, petit-fils d'Isabelle, que le comte lui remit la jouissance du château de Cabrespines, à laquelle on réduisit les droits de ce descendant de la soeur de Cécile. Sous l'Ancien Régime, Coubisou a plusieurs annexes : Nadaillac, Esparou et Engalenq. En 1790, Nadaillac est rattaché à Coubisou. Le 5 messidor an VIII, sur le plan administratif, la commune de Coubisou s'accroît des communes d'Anglars-Saint-Jean, du Causse, du Cayrol, de Briounès et de Cabrespines.","architecture":"Château de Tourruol, sur un éperon rocheux, se devinent les ruines du château fort du XIIIe siècle. Le château actuel a été construit avec des pierres de lancienne forteresse réputée alors imprenable. Le château de Tourruol est un château bâti à Coubisou,  Il était réputé pour être imprenable. Sur léperon du Tourruol, il ne reste que les ruines du château. \r\nCabrespines est un château bâti à Coubisou, Il est classé aux M.H. depuis 1987. La construction du château de Cabrespines date du IIe quart du XVIIe siècle, en utilisant les pierres de lancienne forteresse, détruite en 1628, sur l'ordre du Prince de Condé. Les différences d'appareil dans la construction de la tour et du bâtiment effondré, laissent supposer qu'il existait une première tour dont  la base se poursuivant par un mur d'enceinte. Détruits en partie, ils furent remontés et le mur d'enceinte servit de base à la construction d'un corps de bâtiment reliant la tour à un deuxième corps de bâtiment parallèle à celle-ci. Tous les bâtiments s'ordonnent autour d'une cour trapézoïdale dont le centre est occupé par un escalier à deux volées menant au premier étage.","habitants":"Baron de Gaujal\r\n        \"","divers":"Château de Cabrespines et le fort de Touruol.","gps":"","images":["../image/image_12/12_Cabrespines_1.jpg","../image/image_12/12_Cabrespines_2.jpg","../image/image_12/12_Cabrespines_3.jpg","../image/image_12/12_Cabrespines_4.jpg","../image/image_12/12_Cabrespines_5.jpg","../image/image_12/12_Cabrespines_6.jpg","../image/image_12/12_Cabrespines_7.jpg"]},"Consult_chateau_formulaire2221":{"id":"Consult_chateau_formulaire2221","dept":"12","canton":"Millau","commune":"Aguessac","nom":"Cabrières -Compeyre","type":"Forteresse","periode":"XII-XIV","histoire":"Dans le village de COMPEYRE Il ne reste rien de ce château dont on trouve la trace au XIIIe siècle dans la propriété des comtes de Millau et les de Séverac. Il fut occupé par les anglais au XIVe siècle puis subit les outrages des guerres de religion avec les occupations successives des catholiques et des protestants.\r\nCABRIERES,   R. Ricard, damoiseau, tient cette forteresse du comte Alphonse de Poitiers, comte de Toulouse.   Amfor de Cabrières le tient du Roi de France, un simple château « de vanité » dont lutilité est de flatter la vanité de son propriétaire. Le Roi de France lui même ne lui reconnaît aucune utilité dordre militaire ou stratégique, il en néglige même le fief puisque en 1341, le château de Cabrières passe au cours des siècles entre les mains de différentes familles. On sait quune chapelle dédiée à Saint-Georges et Saint-Antoine fut fondée au château de Cabrières par Louis de Montvalat, seigneur de Cabrières, le 13 octobre 1499, suivant un acte reçu par Pierre Maurin notaire de Compeyre. Il semble bien que le château de Cabrières est perdu toute son importance en tant que château de route, fut la résidence d'Emma Calvet chanteuse d'opéra en 1894 y installa un salon de musique le garda jusqu'en 1926. aujourd'hui propriété de monsieur Lombard.","architecture":"Cabrières domine la vallée très encaissée, depuis le rocher où il est établi, surveillant ainsi toute la vallée qui permet daccéder au Sévéragais et au Laissagais.                                                                  Le château de Cabrières semblerait être constitué de deux parties distinctes. Elle est constituée dun corps de logis encadré de deux tours rondes. La deuxième partie de ce château est constituée dune énorme tour carrée et crénelée au sommet, cette partie semble la plus récente et semble avoir été remanié à plusieurs reprises.  Le château de Cabrières est donc composé de deux hautes tours ceinturées de mâchicoulis, à droite et à gauche dun corps de logis rectangulaire datant du XIIe siècle, flanqué dun donjon carré. Ces tours remonteraient pour les uns au XIIe et pour dautres aux XIV-XVe siècles. Le bâtiment principal est composé dun donjon carré, flanqué de deux grosses tours cylindriques surélevées qui sapparentent à celles du château de Loupiac, commune de Sévérac-le-Château, et dAnjony dans le Cantal.","habitants":"Comte Alphonse de Poitiers\r\n        \r\n        \"","divers":"Forteresse de Cabrières à Compeyre.","gps":"","images":["../image/image_12/12_Cabrieres_Compeyre_1.jpg","../image/image_12/12_Cabrieres_Compeyre_2.jpg","../image/image_12/12_Cabrieres_Compeyre_3.jpg","../image/image_12/12_Cabrieres_Compeyre_4.jpg","../image/image_12/12_Cabrieres_Compeyre_5.jpg","../image/image_12/12_Cabrieres_Compeyre_6.jpg"]},"Consult_chateau_formulaire0119":{"id":"Consult_chateau_formulaire0119","dept":"12","canton":"Salles la Source","commune":"Salles la Source","nom":"Cadayrac","type":"Château","periode":"XIV","histoire":"CADAYRAC,  à la fin du XIVe siècle, le château et les terres sont apportés en dot par Richarde de Saint-Paul à la famille Moret. En 1420  à Raymond de Murat de Lestang et en 1467, Jean Pilos demeure au château. A la fin du XVe siècle, le château est échangé contre le domaine de Vayssette. C'est ainsi que Cadayrac entre dans le domaine Royal. En 1485, Hugues Masnau est gardien du château. En 1523, Antoine Branguier est seigneur de Cadayrac. ensuite en 1551, Jean de Branguier. En 1584, Antoine de Moret  vend le château à Vital d'Izarn. En 1587, Antoine de Moret rachète le château. Au milieu du XVIIe siècle, le château passe par alliance d' Isabeau de Séneterre mariée à François de Tullier. Durant le XVIIe siècle, après son veuvage, Isabeau épouse Arnaud de Cadrieu. En 1678, elle vend le château à la famille Moly des Ondes. Vers 1792, les Révolutionnaires s'emparent du château et le vendent comme bien national. il fut vendu à plusieurs propriétaires ce qui entraîna des dégradations.","architecture":"Cadayrac, le bourg tire son nom d'un ancien domaine gallo-romain. Au Moyen-Age, la co-seigneurie de Salles a édifié là une maison-forte éloignée où elle a pu affirmer son indépendance à l'égard du Comte de Rodez.   Le château a été construit au XIVe et XVe siècles, puis il fut rattaché au domaine royal au XVe siècle et connu par la suite plusieurs propriétaires, l'ensemble du bâtiment formant un carré avec cour intérieure a été remanié au cours des siècles : tours rondes aux angles extérieurs, créneaux des chemins de ronde. Les tours d'angle ont été arasées, Elles ont perdus leur système défensif, La courtine aussi a été modernisée, Le sommet comporte des lucarnes à fronton, Mais les mâchicoulis avec le chemin de ronde sont encore visibles. Une autre tour, une autre courtine avec mâchicoulis et à son extrémité gauche, une puissante tour en parallèle.  Bien que les pierres des cotés ne soient pas irréprochables en type de taille et dimensions, les parements d'angle sont presque parfaits. Je ne distingue aucun système défensif mais il semble évident que la tour a été arasée.Le portail, même s'il n'a point gardé son vantail, sa herse et peut être un pont-levis  d'une entré fortifiée.\r\nLes bâtiments encerclent une cour intérieure. Sur la gauche, le bâtiment accolé à une tour possède des mâchicoulis intérieurs. A sa droite, le bâtiment d'habitation est plus sage avec ses fenêtres à meneaux en croix.   Au XVIe siècle, les bâtiments sont aménagés pour plus de confort. Des lucarnes sont construites au dernier étage.","habitants":"Famille Moret\r\n        \"","divers":"Château de Cadayrac","gps":"","images":["../image/image_12/12_Cadayrac_1.jpg","../image/image_12/12_Cadayrac_2.jpg","../image/image_12/12_Cadayrac_3.jpg","../image/image_12/12_Cadayrac_4.jpg"]},"Consult_chateau_formulaire35b2":{"id":"Consult_chateau_formulaire35b2","dept":"12","canton":"Saint-Affrique","commune":"Calmels et le Viala","nom":"Calmels_Viala","type":"Maison forte","periode":"XVII","histoire":"A Calmels de Viala deux châteaux celui de Granet du XVI-XVIIe siècle et le château fort du Viala vestiges.                                                     Mas Granet fut construit aux XVIe-XVIIe siècles par la famille de Corcoral. Aujourd'hui c'est une exploitation agricole de monsieur  Rémy Sagnes,                                                                                                Domaine de Sermet; chambres d'hôtes de Philippe et Suzanne Schmal.","architecture":"le château de Mas Granet fut construit aux XVIe-XVIIe siècles, c'est un bâtiment de plan carré à un étage, il possède à un angle une fine tour circulaire renfermant un pigeonnier.                                                    Domaine Sermet est une ferme rénovée avec des matériaux écologiques","habitants":"Famille de Corcoral\r\n        \"","divers":"Château fort Tour de Viala de Granet et de Sermet.","gps":"","images":["../image/image_12/12_Calmels_Viala_1.jpg","../image/image_12/12_Calmels_Viala_2.jpg","../image/image_12/12_Calmels_Viala_3.jpg","../image/image_12/12_Calmels_Viala_4.jpg","../image/image_12/12_Calmels_Viala_5.jpg","../image/image_12/12_Calmels_Viala_6.jpg","../image/image_12/12_Calmels_Viala_7.jpg"]},"Consult_chateau_formulairea0ad":{"id":"Consult_chateau_formulairea0ad","dept":"12","canton":"Espalion","commune":"Espalion","nom":"Calmont_Olt","type":"Vestiges","periode":"XI","histoire":"CALMONT, vers  l'an mille la famille de Calmont d'Olt jusqu'en 1278. En  1214 Bégon III de Calmont d'Olt participe à l'hommage que rend Hugues, comte de Rodez, à Simon de Montfort, en 1278  Raimond de Calmont d'Olt, évêque de Rodez, et seigneur de Calmont d'Olt pose la première pierre de la cathédrale. En 1298 Pierre Ier Pelet, seigneur d'Alès, hérite de le baronnie, vers 1315 Raimond Pelet  par la succession de Pierre, son fils, époux d'Alixent de Calmont fille de Bégon IV. En 1345 Hugues III de Castelnau-Bretenoux, baron de Calmont dOlt. En 1350 Jean Ier de Castelnau, baron de Calmont dOlt, fidèle du roi de France il reçoit successivement les titres de gouverneur en Guyenne et de capitaine général en Languedoc. En 1374 Charles V cède à Jean II d'Armagnac la baronnie de Saint-Geniez-de-Rive-dOlt.  En 1455 le 5 juillet, confirmation du consulat et des privilèges d'Espalion par Antoine de Castelnau Caylus, baron de Calmont dOlt. En 1621 Alexandre de Castelnau-Clermont, baron de Calmont dOlt assassiné à Espalion. En 1627  le 28 mai, Gabriel Aldounce de Castelnau traite avec Jean Sabatier, maçon de Saint-Côme d'Olt « pour la reconstruction de la grande tour du château de Calmont, côté ouest, en grande partie ruinée ». En 1649, le Vicomte d'Arpajon sempare du château sans combat. En 1679 François Moulorze de Villehaux, capitaine du château de Calmont dOlt. \r\nEn 1987  monsieur Plume acheta les ruines et entreprit la restauration.","architecture":"Le château est constitué d'une enceinte haute avec donjon, corps de logis,  deux  tours et d'une enceinte basse à huit tours ouverte au XVe siècle. Dès le XIe siècle, le château  de Calmont a une vocation purement militaire. Une première enceinte est construite. Puis au XVe siècle, une deuxième enceinte fut érigée avec huit tours.  Le site commandait la route allant de Rodez à Aubrac.   Lédification du château fort actuel commença au XIe siècle par la construction dun donjon carré en basalte, puis dune enceinte polygonale enserrant une cour, ensuite dans la cour apparut au XIIIe siècle, un corps de logis, un puits, une citerne, une seconde tour en grés rose et enfin les portes et pont-levis, dont on voit apparaître aujourdhui les superstructures.  Il faudra attendre la guerre de 100 Ans pour assister à la création dune deuxième enceinte dotée de huit tours ouvertes, de 32 archères arbalétrières canonnières, dune porte et de deux poternes. Au XVIIe siècle, abandonné par ses propriétaires, qui lui préfèrent les demeures plus confortables de la vallée du Lot, il se ruinera. Depuis 1984 il est l'objet de dégagements archéologiques, de restaurations, détudes sur la vie dun château fort, ainsi que danimations sur le thème de la défense et du siège dune place forte au Moyen-Age.\r\nAujourd'hui les manifestations son autour des vestiges du château fort, un siège est reconstitué, les \"machines infernales\" grandeur nature.","habitants":"Famille de Calmont d'olt\r\n        \"","divers":"Vestiges du château-fort de Calmont","gps":"","images":["../image/image_12/12_Calmont_Olt_1.jpg","../image/image_12/12_Calmont_Olt_2.jpg","../image/image_12/12_Calmont_Olt_3.jpg","../image/image_12/12_Calmont_Olt_4.jpg","../image/image_12/12_Calmont_Olt_5.jpg","../image/image_12/12_Calmont_Olt_6.jpg"]},"Consult_chateau_formulaire6633":{"id":"Consult_chateau_formulaire6633","dept":"12","canton":"Salles la Source","commune":"Salles la Source","nom":"Calmontie","type":"Château","periode":"XI","histoire":"CALMONTIE, au Moyen-Age, le village était fortifié de quatre châteaux. Le château Majeur,  le plus ancien, le moins connu, appartenait au comte de Rodez puis de  Rodez et dArmagnac, doù son nom ancien de « château dArmagnac ». Du fait de sa totale destruction et des nombreuses légendes, Le château de la Tour. Le château de la Calmontie. Le château Mineur, pour ce dernier, nous savons quaux alentours du XIe siècle, il appartenait à la famille des Ondes. Les Roquemaurel  ont bâti en ce lieu. Notamment en 1382, où ils ont fait ériger la tour qui se trouve près de léglise et du château. La Vieille Tour. Les Roquemaurel avaient aussi des villages et des terres dans les paroisses dAynès, Espeyrac et Saint-Félix de Lunel, avec toute la justice et juridiction, haute, moyenne et basse. Ce qui veut tout simplement dire quils avaient plein de droits sur les habitants de leurs domaines.  Au XIIIe siècle, on a déjà vingt co-seigneurs à Salles-la-Source, répartis entre quelques grandes familles : les Calmont, Panat, de la Tour, de la Roque, des Ondes, Saint Paul ou encore Ratier ou Saunhac. Salles-la-Source est situé au bord du Causse Comtal, riche terre à blé qui rapporte. Les Panat sont probablement les premiers seigneurs de Salles-la-Source qui au tout début sappelait \"Salles Panadaises\".","architecture":"Salles-la-Source est composé de trois agglomérations sont le Bourg, Salles et Saint-Laurent qui du fond du val escalade les gradins du cirque. Le château Majeur,  le plus ancien, le moins connu, majeur non par sa taille mais par la puissance politique quil représent
