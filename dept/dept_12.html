ept":"12","canton":"Capdenac","commune":"Lugan","nom":"Lugan_Cderie","type":"Commanderie","periode":"XII","histoire":"LUGAN, posséde une commanderie  du XIIe siècle,  édifiée par l'ordre des Hospitaliers de Saint-Jean de Jérusalem et dépendait de la commanderie d'Auzits, actuellement Ordre de Malte. Pendant 428 ans, la commanderie fût rattachée à celle dAuzits.  A partir de 1623, elle eut ses propres commandeurs dont certains portaient de grands noms de France comme Annibal de Castellane dAluys (1639-1667). La Révolution Française éclate. Tous les biens de lOrdre sont considérés comme biens nationaux. La commanderie est vendue le 13 thermidor de lan III (1er juillet 1795) et devient la propriété dun luganais Jean-Pierre Amouroux du village de la Joulinie. En 1886, celle qui est devenue Sainte Émilie de Rodat y fonde sa cinquième école de filles dans le bâtiment. En 1960, les religieuses de la Sainte famille ferment lécole et abandonnent la bâtisse.  En 1962, deux religieuses franciscaines rachètent la commanderie et fondent une maison de retraite En 1990, elles cèdent pour le franc symbolique limmeuble à la commune de Lugan à charge pour elle de poursuivre leur mission sociale.  Aujourdhui, la commanderie construite par lOrdre de Saint-Jean de Jérusalem est la seule en France à accueillir une uvre sociale.","architecture":"Commanderie hospitalière du XIIe siècle où vous découvrez l'univers de l'Ordre de Malte et le quotidien des hommes du Moyen-Age. Aménagée en partie en foyers logements, elle est la seule en France à avoir conservé sa vocation hospitalière, édifiée par l'ordre des Hospitaliers de Saint Jean de Jérusalem, c'était à l'origine un corps de logis carré flanqué de quatre tours circulaires, une partie a abrité jusqu'à l'an passé, des logements pour personnes âgées, perpétuant ainsi sa vocation hospitalière.\r\n Une exposition avec vidéo qui propose l'histoire des hospitaliers, est présentée dans une magnifique salle voûtée qui était la citerne de la commanderie, l'église a été insérée dans le bâtiment dont elle forme le front sud ouest, le coeur du XIIIe siècle a un chevet de plan rectangulaire avec une abside intérieure en cul de four (rare en Rouergue et unique dans l'ordre de Saint-Jean de Jérusalem). Le clocher octogonal date de 1848 et possède un escalier a vis en bois.","habitants":"Annibal de Castellane dAluys \r\n        \"","divers":"Commanderie de Lugan","gps":"","images":["../image/image_12/12_Lugan_Cderie_1.jpg","../image/image_12/12_Lugan_Cderie_2.jpg","../image/image_12/12_Lugan_Cderie_3.jpg","../image/image_12/12_Lugan_Cderie_4.jpg","../image/image_12/12_Lugan_Cderie_5.jpg"]},"Consult_chateau_formulaire8a90":{"id":"Consult_chateau_formulaire8a90","dept":"12","canton":"Saint-Geniez d","commune":"Gaillac d","nom":"Lugans","type":"Château","periode":"XIII","histoire":"LUGANS, château du XIIIe siècle, quand ils ont acquis le domaine, Laurent  Bessou et Kaethe, tous deux amoureux des vieilles pierres, ont tenté à leur manière de sublimer le site. \"Nous navons pas eu beaucoup de travaux à faire à lintérieur du château, si ce nest les combles qui étaient en grand bazar\".","architecture":"Le château de Lugans est connu dès le XIIIe siècle. Bâti sur un plan quadrangulaire enfermant une cour intérieure oblongue et étroite, selon une disposition assez commune dans les demeures de cette partie du Rouergue, le château a été très remanié au cours des siècles : fossés comblés, mâchicoulis démantelés, baies élargies, restauration du décor intérieur. Une tour ronde cantonne l'angle sud-ouest. La façade nord est flanquée d'une tour carrée à demi engagée. Deux tourelles cantonnent l'angle nord-est. A l'angle sud-ouest s'élève un pavillon en saillie, sans doute les restes de l'ancien donjon. L'entrée, à l'origine sur la face Est, a été réaménagée au XVIIe siècle : porte en anse de panier entre deux pilastres, escalier tournant à droite.","habitants":"Laurent  Bessou\r\n        \"","divers":"Château de Lugans","gps":"","images":["../image/image_12/12_Lugans_1.jpg","../image/image_12/12_Lugans_2.jpg","../image/image_12/12_Lugans_3.jpg"]},"Consult_chateau_formulaired27a":{"id":"Consult_chateau_formulaired27a","dept":"12","canton":"Rieupeyroux","commune":"Lunac","nom":"Lunac","type":"Maison forte","periode":"XIII","histoire":"LUNAC, situé sur un promontoire,  la chambre « du seigneur d'Audigier» (seigneur et poète, proche de la Reine Margot).  Les Amblard entreprennent l'édification d'un château. Pons et Guillaume Ysson de Najac, au XVe siècle achètent le château. Ils construisent un nouveau château, il se déplace de quelques mètres et s'éloigne de la douve. C'est une demeure très haute avec une aile en potence qui s'aligne avec le couvert, et des poivrières aux angles orientées vers la place du castrum. Pierre Ysson, héritier de Pons, succède à ce dernier, mais sans héritier le château revient à la famille Audiguier de Najac. Bertrand Montlauzeur, fils de notaire, achète le château en 1664, il consacre sa vie à la rénovation de la demeure et construit la tour renaissance avec escalier à vis. Vers 1749, doublement de la surface habitable vers l'ouest.\r\n Le château demeure dans cette famille pendant la Révolution Française. En 1824, le Baron de Chazelle vend le château à maître Granier, notaire.  Cette demeure, ancien château de défense du bourg (fortifié) de Lunac, date du XIIIe et XVIIIe siècles. Les nouveaux propriétaires, M. et Mme Revalor, lui ont donné l'aspect actuel leurs enfants Michel et Marie-Chantal, propriétaires du château de Lunac,  chambres d'hôtes et gîte.\r\n Château de Chazelles-Lunac : château privé appartenant à la descendance de Henriette, comtesse de Chazelles.                              La Borie, ancien manoir qui appartenait au XVIIe siècle à Margueritte de Montlauzur, veuve de Pierre Delpuech, procureur du roi en la viguerie de Najac, et à son fils Joseph Delpech, seigneur de Frayssinet, bachelier en droit, qui le vendit à Pierre-Jean Loupias, notaire royal de 1747 à 1777.\r\nLa Mothe, ancien fief, à l'entrée du bourg qui appartenait à la famille de Monlauzeur.","architecture":"Lunac au XIIIe siècle  construit des fortifications : château avec quatre tours aux angles,                                                                                     La Borie, ancien manoir \r\nLe Méjanet, ancien fief avec château disparu.\r\nLes Mazières, hameau avec église , ancien château en ruines.","habitants":"Famille Audiguier de Najac\r\n        \"","divers":"Château de Lunac, de Chazelles , de la Borie, de Méjanet,  vestiges des Mazières et de la Mothe","gps":"","images":["../image/image_12/12_Lunac_1.jpg","../image/image_12/12_Lunac_2.jpg","../image/image_12/12_Lunac_3.jpg","../image/image_12/12_Lunac_4.jpg","../image/image_12/12_Lunac_5.jpg"]},"Consult_chateau_formulaire5fd1":{"id":"Consult_chateau_formulaire5fd1","dept":"12","canton":"Decazeville","commune":"Livinhac le Haut","nom":"Marcenac","type":"Château","periode":"XI-XVI","histoire":"MARCENAC,  propriété de monsieur Le Matayer, la branche directe des Marcenac. Mais au début du XVIe siècle, l'unique survivant de cette lignée, Antoine, épousa demoiselle Isabeau de Peyronnec de Saint-Chamaran, n'ayant pas eu d'enfant, les De Peyronnec héritèrent du domaine mais portaient expressément le nom et les armes de Marcenac. A la Révolution, c'était dame Marie de Naucaze, héritière des Peyronnec, qui habitait le château. La «dame de Marcenac», comme on l'appelait alors, était très secourable et faisait beaucoup de bien. Aussi, était-elle très estimée des populations voisines.\r\nSa fille unique, veuve du baron Batz de Trincalléon, vendit, en 1822, la terre de Marcenac à Henri Laromiguière, neveu du célèbre philosophe Pierre Laromiguière. Cette famille ne conserva pas longtemps la propriété puisqu'en 1864, elle fut vendue à M.-Etienne Goudal, qui devint peu après maire de Livinhac. \r\nAu XXe-siècle, en grand danger d'abandon, le château devint la propriété de M. le comte des Allées. Depuis 1971, le château appartient à M.-Pierre Huget, demeurant à Biergues, en Belgique. Le cap du XXIe-siècle.","architecture":"Marcenac construit au XIe siècle, Il ne ressemble pas à un château. Les siècles l'ont transformé et son aspect débonnaire tient plutôt de la gentilhommière que du manoir féodal.  Il retrouve facilement les indices de son glorieux passé. Ces lieux riches d'histoire furent le berceau d'une famille d'ancienne chevalerie. Le château de Marcenac, tout comme ses voisins de Gironde ou de Boisse, a subi de nombreuses transformations au cours des siècles. On peut, en effet, admettre que son rupestre piédestal supporta d'abord un oppidum celtique, puis un castrum gallo-romain, transformé par la suite en château féodal. Bien plus tard, lorsque les luttes féodales furent éteintes et les invasions définitivement endiguées, les seigneurs de Marcenac jugèrent inutile d'entretenir et de conserver l'attirail défensif de leur château. Petit à petit, Marcenac fut démantelé et découronné pour en arriver au stade actuel de maison d'habitation.","habitants":"Famille de Le Matayer\r\n        \"","divers":"Château de Marcenac-Livinhac","gps":"","images":["../image/image_12/12_Marcenac_1.jpg","../image/image_12/12_Marcenac_2.jpg","../image/image_12/12_Marcenac_3.jpg"]},"Consult_chateau_formulaire1244":{"id":"Consult_chateau_formulaire1244","dept":"12","canton":"Salles la Source","commune":"Marcillac","nom":"Marcillac_Vallon","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux à Marcillac, celui de Cougousse, de Curlande du XVe siècle, de Malvies et de Cruou.                                                      CURLANDE, le château Patris Cougousse, est une gracieuse demeure de la fin du XVe  siècle.  Dans lune delles était installée une chapelle où Mgr de Péréfixe a procédé, plusieurs fois, à des ordinations quand il était lhôte de son vicaire général, François Pons de Patris, propriétaire du château.  La seigneurie de Cougousse a appartenu à lantique famille Vigouroux, de Rodez , puis à la famille dEscarlhan. Isabeau dEscarlhan fut mariée, en 1587, à noble François de Patris .                                   COUGOUSSE, aux allures flamandes, a abrité lune des fines plumes du Rouergue en la personne de Bernard Combes de Patris (1884-1965), écrivain, historien et juriste, il nous a laissé de précieuses études dhistoire locale, il a également présidé la « société des lettres de lAveyron » de 1953 jusquà son décès, en 1965.                                                                                             MALVIES, dont les fortifications ont été détruites au XVII° siècle, à la suite dun fait darmes, a abrité latelier de Monique Bonicel, artiste peintre, sculpteur et restauratrice doeuvre dart.                                     CRUOU, après la seconde guerre mondiale et jusquau années 1960, a accueilli latelier des « Porcelaines dart du château de Cruou » qui a produit des pièces remarquables. Aussi est-ce, tout naturellement, à lui que le conseil général a passé commande du vase que le département a offert au président Charles de Gaulle lors de sa visite officielle, en 1961.                                                        A quelques kilomètres au sud ouest à Valady le château de Servarie.","architecture":"Cougousse, appuyé à la base dun coteau aux pentes raides, flanqué de tours carrées à clocheton à chaque extrémité dune sorte de fronton formant pignon d'inspiration flamande dans laxe. Cette très jolie maison de maître, maintenant convertie en ferme, en partie ruinée, et desprit Renaissance et agrémentée par ses tourelles dangles en encorbellement. Corps de logis principal étant disposé perpendiculairement et se présentant en équerre, à la jonction des bâtiments, une tour octogonale à mâchicoulis, coiffée à quatre pans à mis hauteur avec coupole, abrite lescalier. Le grand bâtiment secondaire est prolongé, au delà de la façade principale, par une aile de dépendances comprenant des chambres au 1er étage. Les deux tourelles dangle terminées en coquille ont été ajoutées plus tard, au début du XVIIe siècle. Il ouvre largement ses fenêtres Renaissance au soleil et à la lumière, sur le bord de la route dominant la vallée. Sans toutefois présenter rien de spécifiquement Rouergat, ce château-gentilhommière est intéressant, en ce sens quil fut une des importantes maisons de vigne » vignoble de la région.  Ce petit castel (moulin de la Roque), depuis longtemps dans la famille Périé, na pas dhistoire. On sait quun incendie fut cause de sa cruelle mutilation. Ce quil garde encore de son passé fait apprécier le goût de ses constructeurs et montre ce quil représentait de charme au commencement du XVIe siècle »","habitants":"Famille Vigouroux.                                                                                              Bernard Combes de Patris \r\n        \"","divers":"Château de Cougousse, de Curlande de Malvies et de Cruou","gps":"","images":["../image/image_12/12_Marcillac_Vallon_1.jpg","../image/image_12/12_Marcillac_Vallon_2.jpg","../image/image_12/12_Marcillac_Vallon_3.jpg","../image/image_12/12_Marcillac_Vallon_4.jpg","../image/image_12/12_Marcillac_Vallon_5.jpg","../image/image_12/12_Marcillac_Vallon_6.jpg","../image/image_12/12_Marcillac_Vallon_7.jpg"]},"Consult_chateau_formulairea592":{"id":"Consult_chateau_formulairea592","dept":"12","canton":"Capdenac","commune":"Naussac","nom":"Marinesque","type":"Château","periode":"XI-XIV","histoire":"MARINESQUE, a appartenu dès le XIe siècle à l'abbaye de Conques pour passer ensuite sous la dépendance de l'abbaye de Loc-Dieu. L'édifice, dans la catégorie des granges monastiques ou fortalisses, a une relation avec le château d'Orlhonac. Le château subit deux pillages des protestants en octobre 1568 et en mars 1570 et fut même incendié par les troupes de monsieur d'Assier. L'église connut également l'épreuve du feu. Au XVIIIe siècle, les abbés de Loc-Dieu ayant renoncé à cette résidence et à sa chapelle, l'évêque en ordonna la démolition qui n'eut point lieu.","architecture":"Château de Marinesque XIVe siècle  est privé et fermé au Public. Au XIe siècle, il appartenait à l'abbaye de Conques. Puis il est passé sous la dépendance de l'abbaye de Loc-Dieu. Le château de Marinesque est doté d'un  donjon rectangulaire, tour accolée circulaire, sans cour intérieure élevé de quatre étages, flanqué  au milieu de la façade d'une tour  cylindrique qui servait d'escalier. Un chemin de ronde avec des mâchicoulis et des créneaux ceinture le château. Fut restauré vers le XIV-XVe siècle.","habitants":"les abbés de Loc Dieu\r\n        \"","divers":"Château de Marinesque","gps":"","images":["../image/image_12/12_Marinesque_1.jpg","../image/image_12/12_Marinesque_2.jpg","../image/image_12/12_Marinesque_3.jpg","../image/image_12/12_Marinesque_4.jpg","../image/image_12/12_Marinesque_5.jpg","../image/image_12/12_Marinesque_6.jpg"]},"Consult_chateau_formulaireea92":{"id":"Consult_chateau_formulaireea92","dept":"12","canton":"Villeneuve","commune":"Martiel","nom":"Martiel_Loc_Dieu","type":"Abbaye-Château","periode":"XV-XVI","histoire":"A Martiel l'ancienne abbaye et le manoir d'Aliberts du XVIe siècle.              LOC-DIEU,  ancienne abbaye cistercienne dont la première pierre a été posée en 1124 par Amelius Ier. De 1409 à 1411, l'abbaye est envahie par les Anglais, saccagée et pillée. En 1470, reconstruction du cloître et de la salle capitulaire. En 1791, elle est vendue comme bien national à Joseph Moulinier juge du tribunal du district de Villeneuve de Rouergue.  Elle est cédé en 1812 à Louis Cibiel qui la transforma en château avec son neveu Alfred député de l'Aveyron et à Jean Darcel  époux  de Marguerite Cibiel, ingénieur des ponts et chaussées, ces derniers se sont installée progressivement dans les étages sans effacer la présence des moines, passera en héritage à la famille d'Ussel, puis aux Montalivet.\r\n ALIBERTS, ce manoir dexception, construit au XVIe siècle repris au début du XIXe siècle et entièrement rénové au XXIe siècle, vous accueille avec tous le confort au sein d'un cadre historique prestigieux. Ancienne demeure du Baron Jean-Louis Aliberts,  père de la dermatologie française.  Aujoiurd'hui chambres d'hôtes de Jean-Fabrice Pietri.","architecture":"Loc-Dieu; Incendié en 1409 par les partisans du roi dAngleterre, les bâtiments du XIIe siècle sont rebâtis en forteresse et pourtant toujours abbaye. Exemple unique d'abbaye cistercienne du XIIe siècle, fortifiée au XVe siècle.  La partie nord des  bâtiments formant un quadrilatère  dessine un T  orientée est-ouest, la nef haute de 20 mètres est flanquée de deux étroits collatéraux, porte un clocher carré  percé de fenêtres géminées en plein cintre, baies à meneaux sur façades  tour ronde à toit à poivrière et chemin de ronde faisant le tour couvert avec couronne de mâchicoulis et grosse tour carrée du XIXe siècle. Transformée en parc et château, elle a conservé ses parties monastiques et son domaine d'origine.\r\nLoc-Dieu est un rare exemple d'un domaine cistercien transformé en parc romantique au XIXe siècle, autour des bâtiments monastiques intégralement conservés et familialement habités. La visite permet, à partir du domaine monastique et de son évolution, de découvrir le monumental vestibule du château, puis le cloître, la salle du chapitre et enfin l'abbatiale. \r\n Le Manoir Les Aliberts, de plan en équerre  à trois niveaux flanqué d'une tour ronde  à toit en poivrière et lendroit idéal pour vivre des instants exceptionnels.","habitants":"Famille de Louis Cibiel                                                                          Baron Jean-Louis Aliberts\r\n        \"","divers":"Abbaye de Loc-Dieu et le manoir d'Aliberts","gps":"","images":["../image/image_12/12_Martiel_Loc_Dieu_1.jpg","../image/image_12/12_Martiel_Loc_Dieu_2.jpg","../image/image_12/12_Martiel_Loc_Dieu_3.jpg","../image/image_12/12_Martiel_Loc_Dieu_4.jpg","../image/image_12/12_Martiel_Loc_Dieu_5.jpg","../image/image_12/12_Martiel_Loc_Dieu_6.jpg","../image/image_12/12_Martiel_Loc_Dieu_7.jpg"]},"Consult_chateau_formulairead50":{"id":"Consult_chateau_formulairead50","dept":"12","canton":"La Cavalerie","commune":"Martrin","nom":"Martrin","type":"Commanderie","periode":"XII","histoire":"MARTRIN, le territoire de la commanderie qui, au XIIe et au XIIIe siècles, nexcède guère les limites de la paroisse de St-Laurent, comprend, dans la première moitié du XIVe siècle, deux groupes importants de possessions nouvelles : dune part le village de Martrin et dautre part la seigneurie du Cayla et la co-seigneurie de Farreyrolles qui était une ancienne commanderie Templière.  Au début du XVe siècle, Martrin est administré directement par le commandeur de St Félix de Sorgues. Le territoire de la commanderie saccroît toujours. En 1491, un rapport de visite nous apprend que la commanderie et en particulier la tour qui la défendait spécialement sont mal en point, seul léglise et le clocher-forteresse sont en bon état. En 1503, avec Tristan du Salès, commence la troisième période de lhistoire de Martrin, qui verra la construction du nouveau château résidentiel, dont les bâtiments ont été conservés pour lessentiel jusquà nos jours et où séjourneront régulièrement les commandeurs de St Félix, En 1775, les habitants de Martrin font le serment solennel \"de bien et loyalement garder le château dudit seigneur audit Martrin, den être les portiers en temps de guerre, de garder de même la tour servant aujourdhui de clocher dans lenceinte dudit château joignant léglise, den tenir létage haute couverte et boisée à leurs frais et dépens. De ce fait, grâce à cet entretien attentif, le patrimoine de Martrin a traversé les siècles sans trop de mal.","architecture":"Martrin était une commanderie des Hospitaliers de Saint-Jean de Jérusalem.\r\nLes habitants de Martrin, en 1392, ont demandés au Commandeur Pons de Panat la permission de bâtir une tour contre l'église où ils pourraient se retirer en temps de guerre et y mettre leurs biens en sûreté. \r\nLe château,  donjon accolée à l'église, reconstruit au XVe siècle et surnommé la commanderie, a conservé la majeure partie de ses pièces de plan carrée, une tour ronde hors oeuvre pour les escaliers, mâchicoulis  chemin de ronde à toit presque plats.","habitants":"Famille de Tristan du Salès\r\n        \"","divers":"Tour de Martrin","gps":"","images":["../image/image_12/12_Martrin_1.jpg","../image/image_12/12_Martrin_2.jpg"]},"Consult_chateau_formulaire6d1a":{"id":"Consult_chateau_formulaire6d1a","dept":"12","canton":"Millau","commune":"Millau","nom":"Millau","type":"Patrimoine_Chateaux","periode":"XII-XVI","histoire":"Cinq châteaux à Millau, dont la tour de Millau du XIIe siècle, Cadenèdes du XIIIe siècle, Creissels, Montmaton du XVIIIe siècle, la Musardière hôtel de la famille Roux et les vestiges de Pégissou (Pour les châteaux voir article suivant).    MILLAU,  donjon intégrée à l'enceinte de la ville.  En 1187, le Roi d'Aragon et Comte de Barcelone et seigneur de Millau. A la fin du XIIIe siècle, la tour est inféodée en 1292,  à la famille Bertrand. En 1347, la tour est achetée par Raymond de Voncx. En 1382, la tour appartient à la famille Pellegri. En 1613, achetée par le consul de Millau à un héritier de la famille Pellegri. En 1614, début des travaux de la tour octogonale confiés à Jehan Farrières. En 1617, fin de construction de la fine tour. En 1795, \"les révolutionnaires\" font voter la suppression de la girouette à fleur de lys .  Pour remplacer les échelles intérieures en bois, un escalier extérieur en pierre est aménagé.                                                                     CADENEDES,restaurée, chargée dhistoire pas d'informations historiques, aujourd'hui gîtes de France de Philippe Malaval.                                   CREISSELS, au IXe siècle un certain Leutade possède la viguerie qui appartient au XIIIe siècle à la famille de Roquefeuil vicomtes de Creyssel, puis celle-ci passe par alliances en 1230 à la famille de Rodez. Henri II fait construire le château. De 1283 à 1403, il appartient aux vicomtes d'Armagnac, jusqu'à confiscation par le roi qui réunit la viguerie à la couronne. Le château, appartient ensuite aux Montcalm, d'Alençon, d'Albret et Vendôme, Crozat, puis de Gualy. En 1814, le château de Creissels est détruit au 2/3 par les flammes. Remanié et transformé en hôtel restaurant.                                PEPISSOU,  la première famille connue y est attestée en 1110 par une donation faite par \"Rainelmi Raimundi de Castro Molnar\" en faveur de l'abbaye de Saint-Guilhem. A la fin du XIIe siècle et jusqu'au XIVe siècle, il devient une co-seigneurie dont les co-seigneurs sont assez mal connus. Le château semble abandonné avec la disparition de cette famille.","architecture":"Beffroi de Millau sur le vieux donjon la masse de pierres en partie basse est un donjon de forme carrée mesurant presque 11 mètres de coté pour une hauteur de 21 mètres, est composé de deux parties correspondant à deux époques différentes. La Tour carrée fut construite au XIIe siècle à l'emplacement du château primitif des comtes de Millau. Le clocher de l'église s'effondre. L'administration consulaire décide de construire une tour au dessus du vieux donjon pour installer une cloche. En 1614, début des travaux de la tour octogonale. Elle comporte une cloche et une horloge communale. Les étages sont séparés par un plancher en bois. Des échelles en bois permettent la montée. En 1790, accolée à l'hôtel de ville, le vieux donjon sert de prison.   Les travaux sont confiés à Jehan Farrières.   Il assurait la sécurité de l'enceinte fortifiée dans son angle sud-ouest. La Tour carrée servira de prison du XVIIe au XIXe siècle et notamment pendant la période révolutionnaire. L'édifice est aujourd'hui privé de sa flèche, incendiée par la foudre le 29 juillet 1811. Après avoir monté les 210 marches, on dispose d'une vue à 360°.                                                Cadenèdes  est une ancienne ferme fortifiée de lépoque templière. La Tour Carrée existait déjà en 1289. Aujourdhui restaurée,                                 Creissels du XIIe siècle Les terrasses sont situés sur le chemin de ronde.                                                                                          Pépissou; vestiges du Xe siècle, construction probable du premier château fortifié. Durant les siècles suivants, il semble que certains systèmes défensifs soient améliorés.  Un texte affirme que le château est en ruine en 1383. Pépissou; les vestiges qui subsistent, une tour quadrangulaire élevée sur un rocher abrupt, ainsi que la forme des baies.  Le château apparaît ainsi ruiné à la fin du XIVe siècle, d'après un acte notarié précisant la situation d'un bois \"sous le château ruiné de Pépissou\". Il est sans doute concurrencé par le château voisin du Monna (en amont).","habitants":"Seigneur de Millau                                                                                Famille Pellegri                                                                                 Famille de Roquefeuil                                                                           Famille de Sambucy \r\n        \"","divers":"Patrimoine de Millau et château de Creissels, vestiges de Pépissou, manoir des Ondes, de la Musardière, de Pégairolles et de Cadenèdes","gps":"","images":["../image/image_12/12_Millau_1.jpg","../image/image_12/12_Millau_2.jpg","../image/image_12/12_Millau_3.jpg","../image/image_12/12_Millau_4.jpg","../image/image_12/12_Millau_5.jpg","../image/image_12/12_Millau_6.jpg","../image/image_12/12_Millau_7.jpg","../image/image_12/12_Millau_8.jpg","../image/image_12/12_Millau_9.jpg"]},"Consult_chateau_formulaire4fed":{"id":"Consult_chateau_formulaire4fed","dept":"12","canton":"Decazeville","commune":"Sénergues","nom":"Montarnal","type":"vestiges","periode":"XII","histoire":"MONTARNAL, au Moyen-Age linsécurité générale en Rouergue conduit les seigneurs à édifier des forts et des mottes castrales, qui deviendront ensuite des châteaux. Cest le contexte de lorigine du château de Montarnal, propriété de la puissante famille de Montarnal dont la présence est attestée depuis lan 962. Sous le règne de Philippe 1er, Gauzfred de Montarnal, est allé en pèlerinage en Terre Sainte, doù il a ramené le modèle de grilles en fer forgé de la chapelle de Montarnal. Ce personnage aurait également participé à la bataille de Hastings en 1066, aux côtés de Guillaume le Conquérant, doù la présence des reliques de St-Brandan sur les rives du Lot.  Le château qui avait titre de baronnie est un des plus anciens qui subsistent en Aveyron. L'appareillage de ses murs justifie son appartenance à une époque romane primitive, qui ferait remonter son existence avant le XIe siècle. Propriété de la famille de Montarnal jusquau XIVe siècle, il changea plusieurs fois de maître pour nêtre plus quun titre porté par François Figeagol de la Grange trésorier de France à Montauban et baron de Montarnal à la Révolution. Le château fut divisé à cette période. Il a fallu 30 ans de tractations et de transactions au propriétaire actuel pour réunifier lensemble après deux siècles dabandon. Les travaux de restauration  sont  entrepris.","architecture":"Montarnal, vestiges, ce donjon cylindrique fait partie des sept tours rondes sur les 50 recensées en Rouergue. Cest un exemple de tour refuge en cas de danger : la tour et la salle seigneuriale sont totalement indépendantes. Elle est construite avec le matériau local, le schiste, excepté les archères en pierre de taille en granit. La présence de quelques assises en « épi » a pu conduire certains spécialistes à la dater à tort des XIe ou XIIe siècle. Mais le plan circulaire, postérieur aux tours carrées, et les archères en étrier ne permettent pas de remonter au-delà du XIVe siècle. La restauration en cours sous la conduite de larchitecte départemental auprès des bâtiments de France respecte laspect ruiniforme de lensemble.  \r\nLe donjon présente un plan rond, rare en Rouergue. Au 1er étage, il possédait une archère à étrier, également rare en Rouergue, ainsi qu'au deuxième étage une archère à étrier à double croisillon, seul spécimen connu en Rouergue. Le mur d'enceinte est percé d'une porte à l'ouest.","habitants":"Famille de Montarnal \r\n        \"","divers":"Vestiges du château de Montarnal","gps":"","images":["../image/image_12/12_Montarnal_1.jpg","../image/image_12/12_Montarnal_2.jpg","../image/image_12/12_Montarnal_3.jpg","../image/image_12/12_Montarnal_4.jpg"]},"Consult_chateau_formulaire87dc":{"id":"Consult_chateau_formulaire87dc","dept":"12","canton":"Rieupeyroux","commune":"Monteils","nom":"Monteils","type":"Château-Temple","periode":"XII","histoire":"COUBIERES,  dit château du pic de Rigaud, ce beau château, qui se relève de la ruine depuis les années 70, occupait une position doublement stratégique. Accroché de manière inexpugnable sur les pentes de la vallée de lAveyron, il contrôlait des mines dargent toutes proches, qui furent exploitées jusquau XVIe siècle. Daprès « Les châteaux de lancien Rouergue ». Le château de Courbières fut successivement occupé par les familles de Villevayre au XIIIe siècle , les Donat au XIVe siècle, de Lescure-Callès au XVe siècle, de La Roque-Sénézerges au XVIIe siècle et de Cadrieu. Aujourd'hui Courbières société civile immobilière est active depuis 21 ans  par  Erica Vanhoorebeek. \r\n MONTEILS, Le château, dont il reste des éléments du XIIIe au XVe siècle, passa successivement de la famille Monteils aux Murat de la Valette, puis aux La Valette-Cornusson et aux Mialet de Fargues au XVIIIe siècle. Le Couvent construit de 1886 ,  abrite une communauté dune vingtaine de surs Dominicaines du Très Saint-Rosaire. Le cardinal François Marty (1904-1994), ancien archevêque de Paris), dont le nom est indissociable de Monteils et de son lycée agricole privé, sy retira les treize dernières années de sa vie. Son appartement peut être visité sur demande (musée du souvenir François Marty. En partie détruit par un incendie, puis reconstruit en 1952.","architecture":"Vestiges de lancien  château  de Monteils, autrefois situé au centre du bourg, a disparu. Subsiste seulement un corps de bâtiment flanqué d'une une tour carrée, élément du système de défense, munie de plusieurs bouches à feu et de mâchicoulis.  Ceci peut expliquer la richesse de sa construction et sa puissance défensive. On pénètre dans la cour intérieure par une porte ouverte dans la grosse tour de défense. Sur la gauche, un bâtiment en schiste, plus récent, empiète  sur lespace dorigine. Lédifice primitif devait se situer en bordure de là-pic donnant sur la rivière. Face à lentrée se trouve le corps de logis, dont certaines larges fenêtres comportent encore leurs meneaux. Subsiste encore une belle salle voûtée. Au coeur du village  était située la première église qui fut brûlée par les Huguenots en 1561. Elle fut ensuite rebâtie hors des murs.                                                                    Monteils  en bordure du pays caussignol « Monticellus », le petit monticule de la rive droite de lAssou se développe dès les IXe et Xe siècles et achève de se fortifier aux XIIIe et XIVe siècles, autour de la maison seigneuriale.\r\nLe Couvent, du XIXe siècle , quadrangulaire à quatre corps de logis à cinq niveaux, celui d'entrée à trois niveaux et à toit plats.","habitants":"Famille Monteils\r\n        \"","divers":"Vestiges de Courbière et le château de Monteils et couvent","gps":"","images":["../image/image_12/12_Monteils_1.jpg","../image/image_12/12_Monteils_2.jpg","../image/image_12/12_Monteils_3.jpg","../image/image_12/12_Monteils_4.jpg","../image/image_12/12_Monteils_5.jpg"]},"Consult_chateau_formulaire296e":{"id":"Consult_chateau_formulaire296e","dept":"12","canton":"Sévérac le Château","commune":"Montjaux","nom":"Montjaux","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Montjaux celui de Montjaux du XVe siècle et le château fort de la Roquetaillade avec donjon du XIIIe siècle.                                   MONTJAUX, fut bâti fin XVe siècle par Raymond de Prévinquières issu dune puissante maison féodale rouergate originaire de Recoules. En 1578, pendant les guerres de Religion, une compagnie y fut cantonnée.  Montjaux passa par alliance, au début du XVIIIe siècle, à la famille des chevaliers de Raymond. Vendu durant la Révolution comme bien démigré, il fut racheté par  les habitants et restituée sous la Restauration à Philippe Antoine de Raymond, ancien garde du corps de la reine Marie-Antoinette. Depuis lors le domaine sest toujours transmis par mariage et est aujourdhui propriété de la famille Guibal. L'accès se fait à la base du donjon par une porte à bossages. Il conserve de beaux plafonds à la française, des cheminées du XVIIe siècle et est entouré dun parc de buis taillés en forme de pyramide. Il fut vendu ensuite aux de Roch, fit l'objet d'un long procès, puis parvint aux Vernhières dont il serait toujours la propriété d'un descendant. \r\nROQUETAILLADE appartenait à la maison de Mandagot, il fut revendiqué par le comte Antoine dArmagnac qui lassiégea en 1502, mais sans succès. Il fut pris par les catholiques en 1574 et son seigneur assassiné. Il fut repris par les protestants en 1574. Il passa ensuite dans les familles de Lescure, de Dupuy Montbrun et de Julien. En 1789, son propriétaire Jean François de Julien fut attaqué par les paysans des environs.","architecture":"Montjaux;  au XIIIe siècle, les hauteurs du village étaient occupées par un château occupant les positions défensives déjà utilisées par les Romains. Délaissé au XVIe siècle, le château tomba en ruine. Lactuel château de Montjaux fut bâti fin XVe siècle.  L'édifice se présente sous la forme dun quadrilatère construit en grès rose du Levezou flanqué par quatre épaisses tours et couronné dun donjon carré.   Au début du XVIIe siècle, après que les tours et le donjon eussent été rabaissés sur ordre du cardinal de Richelieu, la demeure fut agrémentée dun porche Renaissance coiffé dun fronton brisé portant les armes des Prévinquières et la disparition des fenêtres à meneaux.  L'accès se fait à la base du donjon par une porte à bossages. Il conserve de beaux plafonds à la française, des cheminées du XVIIe siècle et est entouré dun parc de buis taillés en forme de pyramide.                   Roquetaillade  se situe à 3 km à l'Est du XVe siècle, avec des restes de mâchicoulis. Un incendie a détruit tout le reste, a ses cotés, existe une maison du XVIIIe siècle et un presbytère. Les ruines du château primitif datant du XIIIe siècle sur le sommet dominant le village, à proximité de la table d'orientation.","habitants":"Famille de Raymond                                                                                        Famille de Lescure\r\n        \"","divers":"Château de Montjaux, la maison Bermont et de Roquetaillade","gps":"","images":["../image/image_12/12_Montjaux_1.jpg","../image/image_12/12_Montjaux_2.jpg","../image/image_12/12_Montjaux_3.jpg","../image/image_12/12_Montjaux_4.jpg","../image/image_12/12_Montjaux_5.jpg"]},"Consult_chateau_formulaire5136":{"id":"Consult_chateau_formulaire5136","dept":"12","canton":"Sébazac_Concourés","commune":"Montrozier","nom":"Montrozier_Alboy","type":"Château fort","periode":"XIV-XV","histoire":"Deux châteaux à Montrozier celui d'Alboy du XIVe siècle et celui de Montrozier du XVe siècle.                                                               ALBOY, a été cédé en 1394 au comte de Rodez contre le château de Montrozier, puis donné par Henry IV à sa soeur Catherine de Bourbon. Les galeries dune concession minière de charbon, creusée en 1820, sont situées à 300 mètres de profondeur sétendent au pied du château. Le château d'Alboy à Gages qui aurait servi de résidence à Jeanne d'Albret.                               MONTROZIER; Au XIIIe siècle à Guillaume comte de Rodez, en 1394 Jean Ier d'Alboy. Au XVIIIe siècle Henriette d'Alboy apporta par alliance à son mari François de Tullier, qui obtint en 1761 la nomination en marquisat légué à sa nièce  Louise  qui l'apporta   en 1792 à Charles de Cobrat  et en 1881, à Maurice Fenaille, entré dans l'entreprise quelques années plus tôt, part travailler aux Etats-Unis dans la filiale de Fenaille et Despeaux installée à New York. Lorsque son père décède en 1883, il revient en France et il lui succède à la tête de l'entreprise;  Il épouse en novembre 1887 Marie Colrat La forteresse, meublée avec raffinement, fut ensuite habitée par leur fille, la comtesse de Billy. Entre 1908 et 1913, Fenaille, dont la belle-famille était propriétaire du château de Montal (Lot).  Le château a reçu en son temps la visite de personnalités prestigieuses comme le Général de Gaulle. Montrozier est dominé par un château du XIIIe siècle, restauré au XVI et XVIIe siècles. Il fut, au Moyen-Age, la résidence préférée des comtes de Rodez.  Aujourd'hui, le château appartient toujours à la famille Fenaille.","architecture":"Le château actuel de Montrozier, construit sur les bases  du XIIIe est attribuable principalement à la seconde moitié du XVIe siècle. C'est une construction défensive ancienne avec des mâchicoulis peu utilisables dont l'appareil régulier et les fonds en arcades sont très soignés. les énormes pavillons carrés juxtaposé aboutissent à une tour rondes coiffée en poivrière un chemin de ronde sur mâchicoulis couronne les constructions. Quelques fenêtres, l'escalier et la porte  du XVIIIe siècle.  On peut y voir le corps de logis de la Renaissance avec ses tours et un donjon rectangulaire à mâchicoulis. \r\nAlboy du XIVe siècle,  corps de logis rectangulaire à trois niveaux et attiques  flanqué sur sa façade plein cintre d'une tour carrée saillante avec toiture surélevé d'un étage. Il ne reste qu'une tour et les fossés, le domaine d'Alboy, avec des lotissements, un tissu associatif dense et dynamique et la mairie.","habitants":"Famille d'Alboy                                                                                  Famille Fenaille\r\n        \"","divers":"Château de Montrozier et d'Alboy","gps":"","images":["../image/image_12/12_Montrozier_Alboy_1.jpg","../image/image_12/12_Montrozier_Alboy_2.jpg","../image/image_12/12_Montrozier_Alboy_3.jpg","../image/image_12/12_Montrozier_Alboy_4.jpg","../image/image_12/12_Montrozier_Alboy_5.jpg","../image/image_12/12_Montrozier_Alboy_6.jpg"]},"Consult_chateau_formulaireba94":{"id":"Consult_chateau_formulaireba94","dept":"12","canton":"Rieupeyroux","commune":"Morlhon le Haut","nom":"Morlhon_Haut","type":"Château","periode":"XII","histoire":"Cinq châteaux à Morlhon le Haut, le château des Anglais, site de l'ancien château, à 472 mètres d'altitude ; le donjon a subsisté jusqu'en 1825. Dans les décombres du château, un fragment de dalles couvert d'inscriptions latines a été retrouvé.  Le château de Galdou, le  château de Garriguet, qui a un jardin d'agrément remarquable comprenant un bassin, un escalier et des terrasses construites au  XVIIe siècle par la famille de Raynaldi. le château de Grilières, appartenait à la famille Campmas de Saint-Rémy ; et le château de Kermaria, construit au XIXe siècle en bordure du domaine de Berals (voir article).                                                     MORLON, fort berceau de la famille de Morlhon  celui-ci fut détruit et brûlé en 1214 par une petite troupe envoyée par Simon IV de Montfort. Le château fut occupé par les Anglais de 1360 à 1368, puis par les Routiers. Remis en état en 1466, puis à nouveau en 1562, il subit, semble-t-il, un nouvel incendie au XVIIe siècle et fut abandonné en ruine. \r\nLe fort de MORLHON,  En 1224, son héritier Pons de Morlhon, chevalier, transigeait avec Milon, évêque de Rodez, au sujet de la juridiction du château de Morlhon, en présence de Géraud de Balaguier, Raymond de Belcastel, Arnaud de Cardaillac, Guillaume Gasc, Aimeric de Cassagnes, chevaliers. En 1249, son fils Milon de Morlhon, reconnaît tenir en fief de l'évêque de Rodez le château de Morlhon. Puis, dans le même acte, il vend ledit château pour 12 000 sous rodanois à l'évêque Vivian qui n'en prendra possession que plusieurs années après. En 1260, lévêque de Rodez était devenu le seul propriétaire du site et du château.                                           Château des Alauzets hôtels.","architecture":"Le fort de Morlhon, est situé près de l'ancienne route royale, sur une élévation au rebord du plateau rocheux du Ségala, dominant la vallée de lAveyron et sa faille nord-sud, face au soleil couchant.\r\n De ce vieux château des Anglais, on ne voit plus aujourdhui que les décombres qui couvrent le sol : des masures couvertes de lierre désignent seules lemplacement quil a occupé autrefois. Lépaisseur des murailles qui restent font croire que cet édifice a du résister pendant bien des siècles aux ravages du temps, et quil a été construit à une époque fort reculé. La position du château était magnifique. La façade était tournée du coté de la vallée. Le château fut occupé par les anglais de 1360 à 1368, puis par les routiers. Remis en état en 1466, puis à nouveau en 1562, il subit, semble-t-il, un nouvel incendie au XVIIe siècle et fut abandonné en ruine.","habitants":"Famille de Morlhon                                                                                       Famille de Raynaldi\r\n        \"","divers":"plusieurs châteaux à Morlhon le haut; celui des Anglais, d'Alauzets, de Galdou, de Garriguet, de la Grilières, de Kermaria et le domaine de Bérals","gps":"","images":["../image/image_12/12_Morlhon_Haut_1.jpg","../image/image_12/12_Morlhon_Haut_2.jpg"]},"Consult_chateau_formulairefe7d":{"id":"Consult_chateau_formulairefe7d","dept":"12","canton":"Sévérac le Château","commune":"Mostuéjouls","nom":"Mostuéjouls","type":"Forteresse","periode":"XIII","histoire":"MOSTUEJOULS,  appartenant dès le XIe aux Mostuéjouls, vassaux des barons de Séverac. \r\nLe château de Mostuéjouls, construit au XIe siècle, fut plusieurs fois remanié par la famille, dont le berceau originaire était le château troglodyte de Saint-Marcellin. les de Mostuéjouls sont venue sinstaller dans un fort construit sur la butte.  Les Mostuéjouls, vassaux du roi d'Aragon, puis du comte de Toulouse, se soumettent à l'évêque de Mende en 1268, ce dernier étant intéressé par la position qu'occupe le château face à ceux de Peyreleau, de Capluc et Peyrelade.  Au XIIe siècle, le causse noir devient l'apanage du roi d'Aragon, vicomte de Millau et du Gévaudan, et le causse Méjean celui de la famille d'Anduze-Roquefeuil.","architecture":"Villages pittoresques de Mostuéjouls et de Liaucous.  Le plan actuel du château remonte au XIIIe siècle les premières mentions d'une forteresse à trois angles et quatre tours. L'édifice comporte trois parties reliées les unes aux autres. L'aile principale est cantonnée par deux grosses tours carrées. A l'opposé se trouve la partie la plus ancienne du château avec le vieux donjon. Enfin, à l'ouest entre les deux se trouve l'aile reliant les deux parties précédentes et faisant face à l'esplanade d'arrivée. Le donjon conserve des peintures murales médiévales.\r\nChâteau troglodytique de Saint-Marcellin,  se situe à 4 km au nord-est de Mostuéjouls sur la rive droite au dessus du village de Liaucous. Il est construit à la base de la montagne et adossé au roc. Il est toujours bien conservé. Au dessus, sur une saillie du rocher, il y a une structure en maçonnerie de 2 m² qui serait le tombeau du Saint, seul le mur de façade est de la main de lhomme. Il a constitué très longtemps un lieu de pèlerinage attirant toute la région. Saint-Marcellin était la propriété de la famille de Mostuéjouls.\r\nAncien château de Bombes.","habitants":"Famille de Mostuéjouls\r\n        \r\n        \"","divers":"Château de Monstuejouls  et le château troglodytique de Saint-Marcellin","gps":"","images":["../image/image_12/12_Mostuejouls_1.jpg","../image/image_12/12_Mostuejouls_2.jpg","../image/image_12/12_Mostuejouls_3.jpg","../image/image_12/12_Mostuejouls_4.jpg","../image/image_12/12_Mostuejouls_5.jpg","../image/image_12/12_Mostuejouls_6.jpg"]},"Consult_chateau_formulaire8927":{"id":"Consult_chateau_formulaire8927","dept":"12","canton":"Baraqueville","commune":"Moyrazès","nom":"Moyrazès","type":"château fort","periode":"XII-XVI","histoire":"CAYLA château fort   La construction du château fort a été lancée, à une date incertaine, par la famille de Cassagnes, seigneurs du Cayla-de-Moyrazès, qui en est originaire. cité en  1062, qu'évoque les frères Hugues et Rigald de Cassagnes, fils de Raymond et de Richilde. La famille de Cassagnes de Beaufort, Marquis de Miramont, seigneurs du Cayla-de-Moyrazès,\r\nAntoine de Cassagnes de Beaufort, seigneur du Cayla, était gentilhomme de la chambre du roi Henri IV. La famille de Cassagnes quitta le château du Cayla et le Rouergue, au début du XVIIe siècle, pour s'installer dans le château de Pesteils (Haute-Auvergne).\r\nAu siècle suivant, l'édifice fut vendu par les Cassagnes à Antoine Rous qui se qualifiait en 1754 de seigneur du Cayla. Lors de la Révolution Française, le château devint la propriété de la famille de Rodat qui affermait le domaine au notaire du lieu.\r\n Aujourdhui, le château fort est en la possession de la famille Mazenq depuis la fin du XIXe siècle. Pierre Mazenq en est lhéritier daprès lacte notarié du 22 janvier 1870 qui couche le testament de Jean Mouli, son oncle, alors propriétaire du château.","architecture":"Le château du Cayla construit au sommet des coteaux escarpés qui bordent lAveyron, près de Moyrazès, fut le plus ancien patrimoine de la maison de Cassagnes. situé sur une éperon aménagé au bord d'un petit plateau cultivé, avec une enceinte polygonale dont il reste deux tours rondes, le reste d'une courtine et d'un châtelet. reconstruit au XVIe siècle et XVIIe siècle, comporte plusieurs corps de bâtiments rustiques.  Le logis est un bâtiment haut de trois étages carrés sur rez-de-chaussée, avec une tour carrée semi-engagée de même hauteur en façade et une aile formant courtine jusqu'à une tour d'enceinte ronde. De l'autre côté, un grand bâtiment de communs s'articule en équerre sur la cour. Les armes de la maison de Cassagnes, dont certaines sont encore visibles sur les linteaux de quelques cheminées.","habitants":"Famille de Cassagnes \r\n        \r\n        \"","divers":"Château de Cayla à Moyrarès","gps":"","images":["../image/image_12/12_Moyrazes_1.jpg","../image/image_12/12_Moyrazes_2.jpg","../image/image_12/12_Moyrazes_3.jpg","../image/image_12/12_Moyrazes_4.jpg","../image/image_12/12_Moyrazes_5.jpg","../image/image_12/12_Moyrazes_6.jpg"]},"Consult_chateau_formulaireeaa8":{"id":"Consult_chateau_formulaireeaa8","dept":"12","canton":"Laguiole","commune":"Mur en Barrez","nom":"Mur_Barrez","type":"Château","periode":"XIV","histoire":"Plusieurs patrimoines à Mur en Barrez, la porte de la tour de Monaco, le château de Marcillac et le monastère Sainte-Claire. MUR en BARREZ, la Tour de Monaco, témoignage d'un temps après 1643, était devenu avec tout le Carladez la propriété des princes de Monaco. La maison consulaire actuellement la  mairie, résidence au XVIe siècle de la famille Barthélémy \"bienfaitrice de la ville\", gendarmerie au XIXe siècle et couvent des surs Franciscaines de 1870 à 2000. Monastère Sainte-Claire, fondé en 1651 par François d'Humières sieur de Calsade. Après la Révolution de 1789 il fut vendu à la municipalité de Mur-de-Barrez comme bien national, il servit de prison. En 1804 il devint collège Impérial. Incendié en 1809. En 1868 retour des surs Clarisses. Il est toujours occupé par ces dernières.    \r\nMaisons Renaissance du XVIIIe siècle, la Tour de Monaco au château, hôtel de Mandilhac, construction en 1768 par M. de Verdier de Mandilhac (trésorier de France à Montauban). En 1863, ouverture dune école tenue par les frères des écoles chrétiennes. Cette école périclite à la fin du XIXe siècle. En 1962, Le docteur Montheil de Septfons cède limmeuble et ses dépendances à la société des écoles libres de Rodez. L'établissement scolaire Saint Pierre a accueilli des élèves jusquen 2000.\r\nMaison Montheil de Septfons, construction en 1776 par la famille Gaches de Venzac dont elle porte le blason. La Maison Fualdès, aurait appartenu au procureur du roi Louis XVIII, assassiné à Rodez en 1817 et donnant lieu à une sombre machination judiciaire « Laffaire Fualdès ».                                                                          Taussac, château fort du XIV-XVII-XVIIIe siècle,  au XIVe siècle des seigneurs de Cayrac.","architecture":"Tour-porche, c'était la principale porte d'entrée de la ville, c'est l'un des rares éléments subsistants de la fortification  qui comprenait un rempart flanqué de quatre tours de défense . Ruines du château-fort, la destruction des fortifications et du château est décidée par Henri IV en 1607 mais sera exécutée sous Louis XIII par ordonnance du 12 juin 1620,  n'a laissé sur place que quelques soubassements.                                                                        La maison consulaire  est de style Renaissance  (1575), avec passage sous voûtes. Mur-de-Barrez  avec ses ruelles étroites, ses toits tout en lauzes  a une fière allure médiévale. A l'origine réduites au château fort, les habitations sont venues se masser au pied des remparts. La ville était alors enserrée entre quatre murs. Aux quatre coins une tour ronde et, à la façade du midi, une grande tour carré, entrée de la ville.  \r\nLe château fut fortifié par le comte d'Armagnac et, en 1555, un hôtel-Dieu accueillait les pèlerins de Saint-Jacques-de-Compostelle. Devenue une place forte huguenote,                                Le portail de la Berque: porte nord des fortifications de la ville. \r\nLe Monastère Sainte- Claire et la visite de la chapelle : sa croix de St Damien, peinte à la façon des icônes.","habitants":"princes de Monaco\r\n        \"","divers":"Patrimoine de Mur en Barrez, château de Marcillac, monastère de Sainte-Claire","gps":"","images":["../image/image_12/12_Mur_Barrez_1.jpg","../image/image_12/12_Mur_Barrez_2.jpg","../image/image_12/12_Mur_Barrez_3.jpg","../image/image_12/12_Mur_Barrez_4.jpg","../image/image_12/12_Mur_Barrez_5.jpg","../image/image_12/12_Mur_Barrez_6.jpg","../image/image_12/12_Mur_Barrez_7.jpg","../image/image_12/12_Mur_Barrez_8.jpg"]},"Consult_chateau_formulaire5cf6":{"id":"Consult_chateau_formulaire5cf6","dept":"12","canton":"Sébazac-Concourés","commune":"Muret le Château","nom":"Muret","type":"Château","periode":"XVI-XVIII","histoire":"châteaux à Muret le château dit de la Vayssade,                                 MURET, jusqu'à la Révolution le château dit de la Vayssade fut le siège de la seigneurie de ce nom et devient ensuite la propriété des comtes de Rodez, on peut noter que Muret le château est un fief. L'ancien château domine le village en contrebas, de la place forte subsiste le donjon construit au XVe siècle comme un  éperon.","architecture":"Muret le château est un site superbe, une balade au sein du village et vous serez charmés par ses multiples maisons restaurées à l'authentique,  les nombreuses maisons anciennes avec colombages, fenêtres à meneaux, vieilles portes, témoignent de lactivité importante que connut jadis le village.  l'ancien château des évêques de Rodez, l'église Saint Vincent achevée en 1781, et un peu plus loin la cascade, domine le village construit en contrebas. De la place forte subsiste un remarquable donjon, construit en forme déperon au XVe siècle.","habitants":"Comtes de Rodez\r\n        \"","divers":"Château de Muret","gps":"","images":["../image/image_12/12_Muret_1.jpg","../image/image_12/12_Muret_2.jpg","../image/image_12/12_Muret_3.jpg","../image/image_12/12_Muret_4.jpg","../image/image_12/12_Muret_5.jpg","../image/image_12/12_Muret_6.jpg"]},"Consult_chateau_formulaire4f47":{"id":"Consult_chateau_formulaire4f47","dept":"12","canton":"Saint-Affrique","commune":"St-Rome de Cernon","nom":"Mélac","type":"Maison forte","periode":"XIV","histoire":"MELAC, repaire du sud Rouergue construit entre le XIVe et XVIe siècle par la famille Gozon,  passa ensuite à la branche aînée de la famille Gozon qui s'installe définitivement à Mélac , c'est le souvenir d'une des plus noble et des plus ancienne famille féodale du sud Rouergue, les Gozon, dont l'un des membres, Dieudonné, devint grand maître de l'Ordre des Hospitaliers de Saint-Jean de Jérusalem de 1346 à 1353. Du XIVe siècle, lon remarquera la salle des gardes à voûtes dogives en tuf. Les clés de voûtes portent les armes de la famille de Gozon. Lorsque la branche aînée des Gozon séteint en 1654, Mélac entre dans la famille Montcalm qui sen désintéresse et le donne en ferme en 1685. Son déclin est engagé, il samplifie à partir de la Révolution Française lorsquil sera vendu comme bien national.","architecture":"Le château de Mélac, maison seigneuriale fortifiée. Il est en réalité établi sur une assise rocheuse dominant le ravin du ruisseau du Lessude qui, au Moyen Age, surprenante et vaste cour intérieure avec arcades soutenant des galeries sur deux niveaux, tour de guet carré du XIVe avec ses bouches à feu originales. Le château est de plan rectangulaire de 32 m par 22 m et il était, à la fin du XVe siècle, doté de quatre tours reliées par quatre corps de logis délimitant intérieurement une cour. lon perçoit toute la complexité de son évolution du XIVe au XVIe siècle. Sappuyant sur un mas,  constitué de trois corps de logis formant un U flanqués de deux tours.  Du XVIe siècle, haute de ses 17 mètres, la tour sud est remarquable par ses trois étages en coupole. Le premier étage est éclairé par une fenêtre Renaissance. Le deuxième étage comporte quatre petites fenêtres sur sa circonférence qui étaient autant de postes dobservation.   La cour était fermée au sud par un mur couronné de mâchicoulis. Lon construit donc au XVe siècle le corps de logis sud-ouest, puis sy ajoutent les arcades et galeries des bâtiments nord-ouest et nord-est. La tour nord du XIVe siècle, par sa situation à laplomb du ravin du Lessude et lexiguïté de ses pièces, était destinée au guet et à la défense. Ce nest quau XVIe siècle qu'est construite, simplement plaquée aux bâtiments existants, la tour Renaissance sud. Les corps de bâtiment sud-est du XIVe siècle et sud-ouest du XVe siècle constituaient, la partie noble du château comme en atteste la présence de fenêtres à  meneaux donnant sur la cour intérieure et sur les façades extérieures.","habitants":"Famille Gozon\r\n        \r\n        \"","divers":"Château de Mélac","gps":"","images":["../image/image_12/12_Melac_1.jpg","../image/image_12/12_Melac_2.jpg","../image/image_12/12_Melac_3.jpg","../image/image_12/12_Melac_4.jpg","../image/image_12/12_Melac_5.jpg","../image/image_12/12_Melac_6.jpg","../image/image_12/12_Melac_7.jpg","../image/image_12/12_Melac_8.jpg","../image/image_12/12_Melac_9.jpg"]},"Consult_chateau_formulaireff17":{"id":"Consult_chateau_formulaireff17","dept":"12","canton":"Rieupeyroux","commune":"Najac","nom":"Najac_Mazerolles","type":"Forteresse","periode":"XIII","histoire":"Quatre châteaux à Najac, , de Cornussson,  le Mazerolle du XIII-XVIIe siècles, le Pic de Rigaud du XIV siècle et le fort de Najac.                 NAJAC, en 1226, suite au mariage de Jeanne  de Toulouse, mariage arrangé par Blanche de Castille, mère de saint Louis, fille de Raymond V avec Alphonse de Poitiers frère du roi Louis IX hérite.  Coseigneur  de 1229 à 1231: Géraud de Cadolle de 1333 à 1345: Raymond de Lescure, Bertrand II de Lescure 1364, Antoine du Rieu, marié en 1527 avec Isabeau Audouy, il était maître de la monnaie de Villfranche. Jean de La Valette en 1599 Etienne d'Audiguier, seigneur de Najac,et de Lunac. Philippe de Gineste 1630-1694  Charles II de Morlhon (1677) Etienne de Gineste 1714-1790  Antoine de Gineste 1755   Après cette période, le château de Najac n'est plus utilisé, on le laisse dépérir, se délabrer, et ce n'est qu'à la Révolution Française qu'il reprend un rôle assez important. Vendu comme bien national en 1794, le château est racheté par un aubergiste du pays qui s'en sert comme carrière de pierre pour construire des maisons. Le château est ensuite laissé à l'abandon. Le château a été sauvé de la ruine par la famille Cibiel député de l'Aveyron et restaurateur de l'abbaye de Loc-Dieu. À la fin du XIXe siècle, le château est rénové en partie par l'abbé Brunis qui le revend à la famille de Montalivet.\r\nMAZEROLLES, construit au XIIIe siècle puis remanié au XIXe siècle par son propriétaire, Bernard d'Armagnac Castanet (1837-1924),   aujourd'hui viticole. \r\nCORNUSSON pas d'information historique.","architecture":"Najac, forteresse royale, elle est construite en 1253 par Alphonse de Poitiers, frère de saint Louis, sur les bases d'un ancien château (tour carrée) construit en 1100 par Bertrand de Saint-Gilles, fils de Raymond IV, comte de Toulouse.Ce joyau du Moyen Âge, associe un donjon quadrangulaire, un donjon circulaire et une enceinte rectangulaire flanquée de quatre autres tours. L'ensemble forme un rectangle de 36 par 24m, entouré d'un mur d'enceinte.   Le donjon circulaire, était défendu par des archères de près de 7 mètres de hauteur, les plus hautes de France ! Les amateurs de mystères apprécieront le couloir étroit barré de plusieurs portes, aménagé dans la muraille qui conduit du nouveau donjon à lancien, un véritable passage secret. le XIIe siècle,la base de la Tour Carrée, construite par les comtes de Toulouse qui possèdent le comté de Rouergue ; un donjon de plus de 40 mètres de haut avec des archères de 6 m 80. C'est ainsi que pendant plus d'un siècle, aucune révolte n'est à signaler et ce, jusqu'à la guerre de cent ans, lorsque le bourg tomba entre les mains des Anglais.\r\nCourbières-Monteils; Le château, dont il reste des éléments du XIIIe au XVe siècle, vestiges de lancien  château :  L'ancien château, autrefois situé au centre du bourg, a disparu. Subsiste seulement un corps de bâtiment flanqué d'une  tour carrée, élément du système de défense, munie de plusieurs bouches à feu et de mâchicoulis.","habitants":"Alphonse de Poitiers\r\n        \"","divers":"Vestiges du château de Najac, château de Cornusson du Mazerolles et du Pic-Rigaud","gps":"","images":["../image/image_12/12_Najac_Mazerolles_1.jpg","../image/image_12/12_Najac_Mazerolles_2.jpg","../image/image_12/12_Najac_Mazerolles_3.jpg","../image/image_12/12_Najac_Mazerolles_4.jpg","../image/image_12/12_Najac_Mazerolles_5.jpg","../image/image_12/12_Najac_Mazerolles_6.jpg","../image/image_12/12_Najac_Mazerolles_7.jpg","../image/image_12/12_Najac_Mazerolles_8.jpg","../image/image_12/12_Najac_Mazerolles_9.jpg"]},"Consult_chateau_formulaire8568-2":{"id":"Consult_chateau_formulaire8568-2","dept":"12","canton":"Millau","commune":"Nant","nom":"Nant","type":"Château","periode":"XII-XVII","histoire":"Quatre châteaux à Nant, Beauvoisin  du XIIIe siècle, donjon carré ruiné, de Castelnau du XVII siècle ferme auberge, des Cuns et le château fort d'Algues du XIIe siècle ruiné.                                       NANT,   en 1135, le monastère est érigé en abbaye par le pape Innocent. Antérieur du XIIIe siècle, il est le berceau de la famille de Roquefeuil, Le bourg fut du XIIe au XVIIIe siècle la possession de la puissante famille de Roquefeuil-Anduze. En 1367, il fut assiégé par les routiers et défendu avec succès par Arnaud de Roquefeuil. Arnaud de Roquefeuil négocia également le rattachement à la France et  de Millau  jusque là sous protectorat anglais  en 1369. Ainsi le baron Bérenger de Roquefeuil, constructeur du château de Bonaguil, rendait hommage au roi le 16 avril 1484 en mentionnant au premier rang son titre de Comtor de Nant.\r\nChâteau de Roquefeuil dit aussi d'ALGUES. Ensemble fortifié dominant le bourg de Nant et Saint-Jean-du-Bruel.  Ancien chef lieu de la famille Anduze Roquefeuil avant son transfert à Meyrueis. \r\nLes calvinistes sy réfugièrent lors des guerres de religion et Richelieu le fit détruire en 1629. \r\nBEAUVOISIN, Guillaume Ier de la branche de Versols de RoquefeuilL, seigneur de Cournonsec 1283  marié avec Ricarde plutôt de Bonvoisin  de Bonnevoie dont \r\n Jean Ier de Roquefeuil, seigneur de Versols marié avec Adélaïs alias Alazaïs.\r\nAujourd'hui scea de Monsieur de Chattelard  plus gites de France. CASTELNAU, Ferme installée dans le château de Castelnau, ancienne demeure du marquis d'Assas du XVIIe siècle.","architecture":"Nant , vestiges  du château fort,  hôtel Ayrolle des Angles, vaste demeure construite vers 1762-1765. Propriété de la commune de Nant depuis 1912, le bâtiment abrite aujourd'hui la mairie, la poste, et la trésorerie, halle aux marchés et foires, actuellement débit de boissons.\r\nChâteau de Roquefeuil dit aussi d'Algues, antérieur au XIIIe siècle. Le château fut détruit, comme quantité d'autres, sur ordre du cardinal de Richelieu pour mettre fin aux guerres de religion.  Il ne reste que quelques murs.\r\nBeauvoisin château en équerre, deux corps de logis  à trois niveaux,   toitures en croupes l'ensemble avec cour intérieure est accolé d'un donjon et d'une tour carrée inférieure au donjon à toit pointu.\r\nCastelnau, corps de logis rectangulaire à trois niveaux toiture en croupes flanqué en façade de deux tours rondes à toits en poivrières, tour carrée sur entrée arrière.","habitants":"Famille de Roquefeuil\r\n        \"","divers":"Vestiges du château d'Algues, château de Beauvoison,hôtel Ayrolles et la ferme château de Castelnau","gps":"","images":["../image/image_12/12_Nant_1.jpg","../image/image_12/12_Nant_2.jpg","../image/image_12/12_Nant_3.jpg","../image/image_12/12_Nant_4.jpg","../image/image_12/12_Nant_5.jpg","../image/image_12/12_Nant_6.jpg","../image/image_12/12_Nant_7.jpg","../image/image_12/12_Nant_8.jpg"]},"Consult_chateau_formulaire90d5":{"id":"Consult_chateau_formulaire90d5","dept":"12","canton":"Baraqueville","commune":"Naucelle","nom":"Naucelle","type":"Château","periode":"XVI","histoire":"A Naucelle village fortifié avec le château de Vézes à Tauriac.              NAUCELLE,  Nova Cella (son ancienne nomination),  fut créée par les moines de l'abbaye cistercienne de Bonnecombe . Il s'installèrent dès le XIIIe siècle à Bonnefon dont la grange rayonna sur le Bas Ségala pendant 6 siècles. L'essor de Naucelle fut longtemps freiné par la proximité de la Bastide Royale de Sauveterre de Rouergue qui concentrait tous les pouvoirs . Cette situation perdura jusqu'à l'arrivée de la voie de chemin de fer qui laissa Sauveterre de côté, pour établir une gare à 2 kilomètres du centre de Naucelle au lieu dit la baraque de Merlin aujourd'hui Naucelle-Gare.        \r\nVEZES sur un domaine de trois hectares avec son parc, son bois et ses deux piscines. Dans une grande bâtisse du XVIe siècle en pierres et lauzes,  a été visité par le peintre Toulouse Lautrec.","architecture":"Village fortifié, autour du bourg on peut encore admirer quelques vestiges des fortifications détruites au XVIIIe siècle avec la porte des anglais du XVe siècle. L'aspect médiéval du village demeure à travers la place aux arcades et des maisons à colombages du XVe siècle dans la rue du four. L'essor de Naucelle fut longtemps freiné par la proximité de la Bastide Royale de Sauveterre-de-Rouergue qui concentrait tous les pouvoirs.                                                                   Vézes  de plan quadrangulaire à deux niveaux pour le corps de logis  et pavillon d'entrée plein cintre avec fronton haut sur toit surélevé, transformé en hôtel.","habitants":"les moines de l'abbaye\r\n        \"","divers":"Village fortifié de Naucelle et le château de Vézes","gps":"","images":["../image/image_12/12_Naucelle_1.jpg","../image/image_12/12_Naucelle_2.jpg","../image/image_12/12_Naucelle_3.jpg","../image/image_12/12_Naucelle_4.jpg","../image/image_12/12_Naucelle_5.jpg"]},"Consult_chateau_formulaire6789":{"id":"Consult_chateau_formulaire6789","dept":"12","canton":"Pont de Salars","commune":"Saint-Rome du Tarn","nom":"Nayac","type":"Maison forte","periode":"XIV","histoire":"NAYAC, appartenait à la famille noble des Tubières. Catherine de Capluc, veuve de Pierre de Tubières, donna Nayac à son fils Jean en 1543. Jean fit son testament le 24 mars 1562 dans lequel il mentionne le château et fit don de la métairie de Nayac avec ses appartenances, à sa femme Jacqueline de Bonnes. En 1573 Nayac fut incendié par les \"Anglais\". En 1585, saccage et incendie du château par le capitaine Desmazels, de Millau. En 1586, l'armée du sieur de Châtillon, chef protestant, pilla le domaine.  Au XVIIe siècle, Jean de Tubières dit Grimoard, baron de Verfeuil, procéda à des réparations, il fit réparer deux pièces du château, situées à l'étage et desservies par une galerie couverte et donnant sur la cour intérieure. L'une d'elles s'appelait anciennement la \"chambre du chevalier\". Le 2 avril 1607, Jean de Tubières épousa Anne de Pestels, fille et héritière de Jean-Claude de Pestels et de Jeanne de Lévis, comtesse de Caylus et de Privezac. Le château et la métairie de Nayac reste dans la famille Tubières jusqu'à  la seconde moitié du XVIIIe siècle. Le dernier héritier et le plus illustre de cette famille, Anne Claude Philippe de Tubières-Grimoard de Pestels de Lévis, chevalier, comte de Caylus, marquis d'Esternay, baron de Brassac, mourut le 5 septembre 1765, sans postérité. Il légua tous ses biens à son cousin le marquis Achille Robert de Lignerac. Charles Alexandre de Neirac, avocat au parlement fit l'acquisition du domaine de Nayrac par contrat du 13 mai 1770. Son fils Charles Antoine de Neirac, héritier, transmit Nayac à son fils adoptif Pierre Marie Jérôme Léon de Courtois député de l'Aveyron. Celui-ci le vendit vers 1905 à Adrien François Bonnefous, fabricant-gantier de Millau et Nayac restera entre les mains des descendants d'Adrien François Bonnefous jusqu'en 2001.","architecture":"Le domaine de Nayac a une histoire dans la vie de Saint Rome de Tarn ; c'est un ancien château, aujourd'hui, c'est une ferme qui fonctionne sur un mode très moderne, vente  directe en particulier, visite du domaine, mais aussi panneaux voltaïques sur tous les bâtiments agricoles. En 1602, la bergerie du domaine fut refaite. Elle possédait six arcades et deux portes au rez-de-chaussée et six autres arcades et une porte à l'étage. En 1603, la cuisine du château subît des modifications importantes les deux voûtes furent démolies et remplacées par un plancher, la galerie qui la desservait fut réparée, sa couverture était supportée par des piliers dont on retrouve des vestiges dans les murs.","habitants":"Famille de Jean de Tubières \r\n        \"","divers":"Domaine de Nayac","gps":"","images":["../image/image_12/12_Nayac_1.jpg","../image/image_12/12_Nayac_2.jpg","../image/image_12/12_Nayac_3.jpg","../image/image_12/12_Nayac_4.jpg","../image/image_12/12_Nayac_5.jpg"]},"Consult_chateau_formulaire0933":{"id":"Consult_chateau_formulaire0933","dept":"12","canton":"Luz la Primaube","commune":"Olemps","nom":"Olemps","type":"Château","periode":"XVI-XVIII","histoire":"Quatre châteaux à Olemps dont celui d'Olemps du XVIIe siècle, de Castel-Gaillard  du XVIe siècle, de Malan du XVIIIe siècle, le Manoir  et le château de Rodat du XVIe siècle.OLEMPS   Au XVIe siècle, Olemps était une co-seigneurie. A la fin de ce siècle, Charles Foucras le Noir la vend à Hugues Caulet. Issu dune famille de marchands, Hugues Caulet habite le bourg, possède un moulin au monastère et plusieurs seigneuries. Endetté auprès des jésuites de Mauriac, ses biens lui seront saisis, dont le château dOlemps quil venait de faire édifier en subtilisant une partie des matériaux destinés au collège des jésuites de Rodez.                         CASTEL-GAILLARD,  situé à la Mouline sur la commune d'Olemps, fut construit au XVIe siècle et a connu plusieurs restaurations et remaniements jusqu'au XIXe siècle. En contrebas, chapelle moderne. Dans le vieux bourg d'Olemps on peut voir une maison du XVIe siècle dite \"la maison des Dames\", avec une tour et un portail surmonté d'un blason.\r\n MALAN, actuellement nous ne possédons pas d'historique sur le château de Malan construit au XVIIIe siècle au hameau de Malan.                                     RODAT;  Antoine de Rodat, seigneur d'Olemps 1662-1745 , château de Bouyssou, Flavin, à Gabrielle de Méjanés  dans cette famille de 1678 à 1751.  L'un des députés du tiers-état de la sénéchaussée de Rodez et bailliage de Millau pour les états-généraux de 1789, membre de la loge de la parfaite union Pierre Antoine Amans Rodat dit Amans Rodat, l'un des agronomes les plus influents du département de l'Aveyron au XIXe siècle, secrétaire perpétuel de la société d'agriculture de l'Aveyron, conseiller de préfecture, chevalier de la légion d'honneur, mort à Olemps le 10 février 1846.","architecture":"Olemps dépendait au Moyen-Age du Bourg de Rodez, du comte pour le pouvoir temporel, le château est un bel exemple de larchitecture de style Louis XIII, dont la caractéristique la plus évidente est le jeu de polychromie. Lardoise et le grès rouge, comme la brique dans le reste du royaume, contrastent avec la blancheur du calcaire. Autres références au style, la recherche dhorizontalité, les fenêtres, allégées de leurs meneaux et croisillons, et lordre attique, cher à larchitecture française.             Manoir; construction moderne pas d'information.                            Castel-Gaillard, de plan en équerre à deux niveaux  accolée d'une tour ronde à toit en poivrière.                                                                       Malan, corps de logis rectangulaire a deux niveaux et attiques, pavillon d'entrée saillant sur partie centrale de la façade se terminant au niveau du toit par deux pans formant un triangle avec oeil-de-boeuf central au dessus des fenêtres. Bâtiment flanqué aux extrémités de tours rondes toitures en poivrières.                                Rodat, de plan rectangulaire à deux niveaux flanqué aux extrémités de pavillons carrées et  au centre pavillon  d'entré saillant dépassant d'un niveau avec toiture en croupes.","habitants":"Famille de Hugues Caulet                                                                     Famille d'Antoine de Rodat\r\n        \"","divers":"Plusieurs châteaux à Olemps, château d'Olemps de Castel-Gaillard de Malan , le Manoir et de Rodat","gps":"","images":["../image/image_12/12_Olemps_1.jpg","../image/image_12/12_Olemps_2.jpg","../image/image_12/12_Olemps_3.jpg","../image/image_12/12_Olemps_4.jpg","../image/image_12/12_Olemps_5.jpg","../image/image_12/12_Olemps_6.jpg","../image/image_12/12_Olemps_7.jpg"]},"Consult_chateau_formulaired3ca":{"id":"Consult_chateau_formulaired3ca","dept":"12","canton":"Salles la Source","commune":"Salles la Source","nom":"Ondes","type":"Maison forte","periode":"XIII","histoire":"ONDES, au XIIIe siècle, il était la résidence dune branche de la famille de Salles dites des Ondes.  Il aurait hébergé le comte dArmagnac et de Rodez, comme suzerain, et accueilli en 1315, les états provinciaux du Rouergue convoqués par Bernard comte dArmagnac et de Rodez à la demande du roi de France, Louis le Hutin, qui appela la noblesse à partir faire la guerre dans les Flandres.  Fin XVIIe siècle, la seigneurie est vendue à Jean Tullier, trésorier de France puis revendue, trente ans plus tard, au seigneur Antoine de Moly, conseiller du roi et trésorier de France par ses prétentions, relayées par ses héritiers, se mis a dos les consuls et habitants de Salles-Comtaux : perception des rentes du roi, exercice de la justice, interdiction de la chasse, revendication dhonneur à léglise. Peu avant la Révolution, le château devient la propriété de la famille Lenormand de Busy ce qui, lui évita dêtre entièrement rasé par la vindicte populaire vouée aux de Moly. Depuis cette propriété est transmise par héritage.","architecture":"les Ondes du XII-XVe Siècle est situé sur le palier supérieur du cirque de salles-la-Source, dominé par de hautes falaises. La mention la plus ancienne de ce lieu remonte à 910 où est cité un Richard de Super-Undas, de dessus les Ondes, ce qui désigne bien le site du château des ondes dominant le créneau et les cascades. Le bâtiment est constitué par deux corps de logis perpendiculaires flanqués de trois tours rondes, dont lune possède encore une couronne de mâchicoulis. La façade sur cour est éclaircie de croisées renaissance. Lensemble sélève sur quatre niveaux : Le premier, au trois quarts enterré, est voûte en berceaux.  Le deuxième est un rez-de-chaussés surélevé, ou subsistent deux voûtes en plein centre et une voûte dogives. Le troisième niveau comporte une vaste pièce, avec plafond à caisson, qui passe pour avoir abrité plusieurs sessions des états généraux du Rouergue.\r\nLe quatrième et dernier niveau est occupé par des galetas qui ont servis de magnanerie dont subsistent deux mûriers sur la place.\r\nAvant la Révolution, le bâtiment comportait une quatrième tour formant un quadrilatère cerné sur deux côtés par les corps de logis, sur les deux autres par un mur denceinte doté dun chemin de ronde protégeant une cour.\r\nAu XIXe siècle, un corps de bâtiment a été adossé côté nord rompant ainsi lharmonie de lensemble.","habitants":"Famille de Salles                                                                                 Famille Lenormand de Busy\r\n        \"","divers":"Maison forte des Ondes dit de Bucy","gps":"","images":["../image/image_12/12_Ondes_1.jpg","../image/image_12/12_Ondes_2.jpg","../image/image_12/12_Ondes_3.jpg"]},"Consult_chateau_formulaire2d52-2":{"id":"Consult_chateau_formulaire2d52-2","dept":"12","canton":"Rodez","commune":"Onet le Château","nom":"Onet","type":"Forteresse","periode":"XII","histoire":"Huit châteaux à Onet le Château dont celui d'Onet du XIIIe siècle, de Canac du XVI (voir article), de Floyrac du XVII domaine agricole ,  de Labro du XVII chambres d'hôtes (voir article) , de Vabre du XVIII (voir article),  de Fontanges du XVI hôtellerie (voir article), de Roquette et de la Vialatelle tour du XVe siècle.                                    ONET-le-Château, qui faisait alors partie du comté de Rodez, démarre en 1589 lorsque ce même comté est rattaché à la couronne de France. Construit vers 1200 par le chapitre de Rodez pour protéger les possessions qu'il venait d'acquérir, Onet fut donné à l'abbaye de Bonnecombe par B. Enjalbert. Puis échangé, par les moines de Bonnecombe, en 1292, contre des terres appartenant au chapitre de la cathédrale. En 1360, les dominicains de Rodez récupérèrent une partie de ces biens. Le château fut vendu à son tour aux enchères le 5 Messidor An IV (23 juin 1796, à Léonard Chivaille et Antoine Chabbert receveur de l'enregistrement, deux ruthénois, appartient désormais à la commune d'Onet-le-Château.","architecture":"ONET,  construit vers 1200 par le chapitre de Rodez pour protéger les possessions qu'il venait d'acquérir, le château flanqué de quatre grosses tours servait d'asile et de retraite à six chanoines pendant les guerres. Plus tard, ils en firent leur maison de campagne, la porte ogivale de l'entrée s'ouvre entre deux tourelles coiffées de poivrières de pierre. Les façades sont munies de meurtrières. L'accès à la demeure se fait par une porte du XVe siècle. Une porte ogivale, ornée de deux tourelles coiffées de poivrières en pierre, devait être munie d'une herse de bois dont il ne reste aujourd'hui que les rainures de coulissage. La façade est munie de meurtrières ou de canonnières, le logis et sa chapelle gothiques étaient ornés de tours dont la plupart ont disparu à la Révolution, comme la haute tour-donjon. La demeure canoniale est munie d'une porte du XVe siècle en très bon état. Derrière, on peut découvrir un escalier en pierre à volées droites. On remarquera les larges marches et les voûtes d'arêtes.","habitants":"Chapitre de Rodez\r\n        \"","divers":"Plusieurs châteaux à Onet le château, celui d'Onet, de Canac, de Floyrac, de Labro, de Vabre, de Fontanges de la Roquette  et de Vialatelle","gps":"","images":["../image/image_12/12_Onet_1.jpg","../image/image_12/12_Onet_2.jpg","../image/image_12/12_Onet_3.jpg","../image/image_12/12_Onet_4.jpg","../image/image_12/12_Onet_5.jpg","../image/image_12/12_Onet_6.jpg","../image/image_12/12_Onet_7.jpg","../image/image_12/12_Onet_8.jpg"]},"Consult_chateau_formulaire180c":{"id":"Consult_chateau_formulaire180c","dept":"12","canton":"Rodez","commune":"Onet le Château","nom":"Onet_Chateau","type":"Château","periode":"XV-XVIII","histoire":"Onet Suite;  FLOYRAC  En 1233, Floyrac fut, le domaine agricole de Hugues de Mandaviale. On retrouve trace de biens appartenant aux Mandaviale au XVe siècle. En 1490, Guy de Lugans sest assuré de la propriété de la seigneurie. En 1545, la famille Cassan, fermier, deviendra propriétaire. En 1617, Pierre de Jouéry, receveur du comté de Rodez est propriétaire du château de Floyrac. En 1886, le domaine fut mis aux enchères, avec des installations pour la fabrication du fromage. Pendant l'occupation allemande, l'association d'aide sociale à l'armée installa dans le château un centre de vacances pour les enfants des militaires de la zone occupée. La direction des uvres de colonies de vacances de lAveyron y organise des stages.  Appartenant au conseil général et qui y a installé le foyer  de lenfance.  La belle grille d'entrée porte les armes de la famille Cassan de Floyrac.\r\nROQUETTE, pas d'informations historiques.                              VIALATELLE, la famille de Rességuier, seigneurs de Ladels et bourgeois de Rodez, possédait des droits sur le domaine de Vialatelle, il les vendirent en 1553 au chapitre de Rodez. En 1733, l'édifice appartenait à la famille Balsa-Vialatelle. Beaucoup plus tard, Les Lacas, prirent la succession. Il subsiste encore une maison qui porte la date de 1767. En 1854, ont trouva une stèle dédié à Junia Tertiola.","architecture":"Floyrac,  il fut détruit par un incendie en 1617. Le château actuel fut construit en 1670  d'un corps de logis rectangulaire, flanqué de trois pavillons deux aux extrémités et un central saillant, toitures en calottes impériales.                                                                        Roquette, corps de logis rectangulaire à deux niveaux, deux pavillons rectangulaires saillant aux extrémités, l'ensemble accolée d'une tour carrée à six niveaux toitures en coupole avec clocheton, et un exemple exceptionnel de larchitecture du XVIIIe siècle. Une restauration intérieure a été réalisée afin de rénover les magnifiques plafonds voûtés du rez-de-chaussée et les plafonds peints à la main du premier étage. Le château est entouré d'un remarquable parc et un jardin irrégulier.\r\nVialatelle, le corps du bâtiment  en tour de garde, pour surveiller la route. Le château édifié au XVIIIe siècle, est composé d'une tour carrée centrale et de deux ailes. Un passage voûté enjambe la cour d'un bâtiment de style Renaissance qui a conservé une fenêtre à meneaux.","habitants":"Famille Cassan                                                                                       Famille de Rességuier\r\n        \"","divers":"Onet le Château","gps":"","images":["../image/image_12/12_Onet_Chateau_1.jpg","../image/image_12/12_Onet_Chateau_2.jpg","../image/image_12/12_Onet_Chateau_3.jpg","../image/image_12/12_Onet_Chateau_4.jpg","../image/image_12/12_Onet_Chateau_5.jpg","../image/image_12/12_Onet_Chateau_6.jpg","../image/image_12/12_Onet_Chateau_7.jpg"]},"Consult_chateau_formulaire3861":{"id":"Consult_chateau_formulaire3861","dept":"12","canton":"Salles la Source","commune":"Clairvaux d","nom":"Panat","type":"Château fort","periode":"XI-XVII","histoire":"PANAT, berceau de la famille du même nom, voit son existence attestée dès le XIe siècle. Il est alors le siège d'une des princi
