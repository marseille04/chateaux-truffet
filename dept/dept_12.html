pales baronnies du Rouergue médiéval et le chef-lieu d'un petit pays : le Panadès. La famille de Panat étend son influence jusqu'à Marcillac et Salles-Comtaux. Mais en 1238, le comte de Rodez contraint le vicomte de Panat de lui céder ses fiefs du Vallon contre notamment les châteaux de Coupiac et Peyrebrune. Tout au long du Moyen-Age, la seigneurie de Panat se voit partagée entre différents co-seigneurs, jusqu'à ce qu'elle soit rachetée dans son intégralité par Charles de Buscaylet en 1617. Celui-ci devient alors seigneur de Panat, Bruéjouls et Capdenaguet. Par mariage, le château passe ensuite à une branche de la famille provençale d'Adhémar. Cette branche rouergate prend dès lors le nom d'Adhémar de Panat.  Fortement délabré, le bâtiment fait depuis l'objet d'une importante campagne de restauration. François-Louis d'Adhémar, vicomte de Panat, né au château de Panat en 1715, il accomplit une brillante carrière dans l'armée royale. Il est fait commandeur de l'ordre de Saint-Louis par le roi en 1779, nommé maréchal de camp en 1780. En 1789, la noblesse de la sénéchaussée de Rodez le désigne comme son représentant aux états généraux convoqués par Louis XVI. Après les premiers événements révolutionnaires, il quitte la France pour Coblence et devient commandant dans l'armée des émigrés. Il meurt en avril 1792, à Limbourg. Le château est resté la propriété de la famille d'Adhémar de Panat jusqu'au milieu des années 1990.","architecture":"Panat à Clairvaux,  château du XIIe siècle, il ne reste aujourdhui quune seule tourelle circulaire sur les quatre dorigine. À lintérieur, on trouvait 3 autres bâtiments, une basse cour, un colombier, une grande fontaine et 2 chapelles, dont celle de Notre-Dame de LIsle qui se trouve toujours sur le site.\r\nLe château aurait été incendié en 1637 en même temps que le Bourg. La tour restante du château a ensuite été utilisée de différentes manières : au XIXe siècle, elle servit de prison, alors quau XXe siècle elle servit dhabitation pendant une longue période. C'est de cette époque que date l'essentiel du château actuel, composé d'un corps de logis rectangulaire flanqué d'une tour ronde et auquel est adossée l'église paroissiale dédiée à Saint-Julien.\r\nDe l'enceinte construite au XIVe siècle, il reste la porte d'entrée principale, surmontée d'une tour à mâchicoulis, ainsi que deux portes secondaires.\r\nL'angle de cette façade est muni d'une échauguette dont ne subsiste que la base . Au pied de cet angle, un escalier mène à un petit jardin qui lui-même conduit à la terrasse sur laquelle s'ouvre les façades principales.","habitants":"Famille de Panat\r\n        \"","divers":"Château de Panat","gps":"","images":["../image/image_12/12_Panat_1.jpg","../image/image_12/12_Panat_2.jpg","../image/image_12/12_Panat_3.jpg","../image/image_12/12_Panat_4.jpg","../image/image_12/12_Panat_5.jpg"]},"Consult_chateau_formulairee389":{"id":"Consult_chateau_formulairee389","dept":"12","canton":"Millau","commune":"Comprégnac","nom":"Peyre","type":"Château","periode":"XVII","histoire":"PEYRE, au point de vue seigneurial, Peyre faisait partie du patrimoine de la maison de Lévézou, dont Castelmus était la résidence habituelle. Antoine de Lévézou de Vesins aliéna plusieurs terres de sa maison, notamment Saint-Christophe-de-Peyre et Thérondels, vers la fin du XVe siècle  lacquéreur fut  Odon de Bonamy, seigneur de Peyre dans son contrat de mariage, en 1515, avec Françoise de Mont-Cairn. Son fils, François de Bonamy, épousa Colette de Sorgues qui résidait au Monna, y mourut en 1555, laissant deux filles : Alix et Anne. Alix, héritière, épousa Pierre de Chalendier, co-seigneur de Luzençon, qui devint seigneur de Peyre et du Monna, et vivait encore en 1624. Anne de Chalendier, issue de ce mariage, épousa Jean dAlbis, de Millau, dont deux filles; Anne qui sunit à Durand de Bourzès-Dourdou, et Claire, mariée à Jacques dAlbignac, de Béziers, qui fit hommage au roi pour la place de Peyre en 1627.  Nous ne pouvons établir comment la terre de Peyre sortit de la maison dAlbignac. Toujours est-il quelle la posséda fort peu de temps, puis  aux des Granges,et à  Etienne de Crozat, sieur de la Croix, capitaine et gouverneur pour le roi des villes, qui fit construire le château. Le nouveau château fut construit vers le XVIIe siècle par les Tiquet vicomté de Creissels, est qualifié seigneur de Creissels et de Peyre dans son contrat de mariage du 8 février 1646 avec Suzanne de Gualy. Marie-Antoine de Crozat de la Croix, seigneur de Creissels et de Peyre, maria Julie de Crozat, sa fille unique et héritière, le 8 juillet 1706, à Pierre Lévy de Gualy fut propriétaire et  ensuite aux de Gualy, puis des de Gissac qui le détiennent toujours.","architecture":"Château à Comprégnac. On ne trouve plus de trace de ce château qui a été incendié lors des guerres de religion. Les sujets du seigneur de Comprégnac n'étaient taxés que dans cinq cas : si le seigneur partait à la croisade, s'il devait racheter un château, s'il était captif, s'il mariait sa fille ou sa sur, et s'il était armé chevalier. Le château a en permanence était rattaché à la famille de Luzençon.                                                                                   Château de Peyre, de plan troglodyte, Il y avait deux châteaux au village de Peyre, lancien château dont une haute tour subsiste blottie sous le rocher à la sortie du village et le nouveau situé dans la plaine à 300 m de là. Vers le XVe siècle, il fut cédé aux de Bonamy qui devinrent seigneurs du village. Le château actuel,  fut construit vers le milieu du XVIIe siècle, par Étienne de Crozat, dans le style noble et sévère du temps de Louis XIV.","habitants":"Famille de Crozat\r\n        \"","divers":"Château de Peyre troglodytique à Comprégnac","gps":"","images":["../image/image_12/12_Peyre_1.jpg","../image/image_12/12_Peyre_2.jpg","../image/image_12/12_Peyre_3.jpg","../image/image_12/12_Peyre_4.jpg","../image/image_12/12_Peyre_5.jpg","../image/image_12/12_Peyre_6.jpg"]},"Consult_chateau_formulaire2b17":{"id":"Consult_chateau_formulaire2b17","dept":"12","canton":"Pont de Salars","commune":"Alrance","nom":"Peyrebrune","type":"Tour","periode":"XIV","histoire":"PEYREBRUNE, on trouve la trace de Peyrebrune dès l'époque Carolingienne au IXe siècle  de la vicomté de Petra Bruna. Au XIIIe siècle l'héritière des Peyrebrune, épouse le seigneur de Panat dont le fief s'étend alors à travers tout le Rouergue. La guerre de Cent Ans annonce une période plus trouble ; la région est cédée aux anglais et les troupes du Prince Noir, fils du Roi Edouard III, ravagent le pays, cachent un butin, origine de la légende du Veau d'Or de Peyrebrune. Après ces faits, les Panat participent à la reconquête du Rouergue pillé par des bandes de routiers. Les familles seigneuriales se succèdent sur le site jusqu'aux guerres de Religion, puis quittent progressivement le château. En 1465, les habitants reconstruisent la tour endommagée. Richelieu fait démanteler le château de Peyrebrune en 1630, la tour est épargnée, mais elle se détériore. A la fin du XIXe siècle, l'abbé Hippolyte Amouroux, curé de la paroisse, l'achète, la restaure et la transforme en lieu de culte.","architecture":"La tour de Peyrebrune rectangulaire du XIVe siècle sélève sur un sommet granitique, elle témoigne de la présence passée du château des seigneurs de Panat du XIe-XVe siècles.  De plan rectangulaire, elle possède 5 étages voûtés. Au XVIIe siècle, le cardinal Richelieu fit détruire murailles et châteaux forts du midi afin de châtier les chefs calvinistes. Peyrebrune ne fut pas épargnée. La dernière tranche de travaux, engagée début 2000 par la commune, avec le soutien des bâtiments de France, permet de conserver la tour qui reste un lieu de rencontres et d'échanges privilégié des habitants d'Alrance. Il ne reste que cette tour de cinq étages voûtés de vingt mètres de haut. L'intérêt défensif de la demeure se lit dans son architecture ; présence de meurtrières et porte d'accès décalée au premier étage.","habitants":"Abbé Hippolyte Amouroux\r\n        \"","divers":"Tour de Peyrebrune","gps":"","images":["../image/image_12/12_Peyrebrune_1.jpg","../image/image_12/12_Peyrebrune_2.jpg","../image/image_12/12_Peyrebrune_3.jpg","../image/image_12/12_Peyrebrune_4.jpg","../image/image_12/12_Peyrebrune_5.jpg"]},"Consult_chateau_formulairea531":{"id":"Consult_chateau_formulairea531","dept":"12","canton":"Sévérac le Château","commune":"Peyreleau","nom":"Peyreleau","type":"Château fort","periode":"XII","histoire":"Deux châteaux à Peyreleau dont celui de Peyreleau tour du XIIe siècle et celui de Triadou  du XVIe siècle (voir article). PEYRELEAU  fut la propriété successive des Montferrand, de la famille de la Chapelle, en 1427 à Alphonse de Poitiers, comte de Rouergue et frère de Louis IX, puis de la très riche famille de Sévérac au XVe siècle. C'est au cours de cette dernière période que la famille d'Albignac occupa les lieux mais sans en être propriétaire. C'est François II d'Albignac, petit-fils de Simon d'Albignac, qui, au début du XVIIIe siècle, racheta le château ainsi que la seigneurie de Peyreleau. Néanmoins, en vendant, le marquis de Sévérac se réserva un droit de rachat . Les pierres utilisées pour la construction de la nouvelle résidence des seigneurs d'Albignac  et comtes d'Albignac, seigneurs de Montlebous, marquis de Triadou et de Saint-Gervais, vicomtes de Creyssel et de Castelnau, barons d'Arre et de Mandagout. Philippe-François d'Albignac de Castelnau (1742-1814), évêque d'Angoulême, député du clergé en 1789, natif de la commune. Philippe François Maurice d'Albignac (1775-1824), général de brigade au service de Jérôme Bonaparte, ministre de la guerre en Westphalie, commandant de l'école militaire de Saint-Cyr (1816-1821), natif de la commune.","architecture":"Peyreleau, l'ancien château féodal fut érigé au cours du XIe siècle. Ce château fort eut un important rôle défensif dans la protection du vicomté de Millau lors du rattachement de Mostuéjouls, aux évêques de Mende après que le titre de vicomte de Millau ait été cédé par Jacques Ier d'Aragon à Louis IX le 11 mai 1258 en application du traité de Corbeil faisant de cette terre un domaine royal.  Cette forteresse disparue, dont il subsiste néanmoins quelques vestiges de remparts dans le village, Peyreleau était alors dominé par une forteresse détruite en 1427. Ceint d'une double fortification dont la première était munie de trois canonnières et la deuxième comportait quatre tours, et dont deux surmontaient les portes d'accès à cet ensemble défensif. La Tour Carrée telle qu'elle existe aujourd'hui a été édifiée en 1617  sur les fondations de l'ancien château féodal érigé au cours du XIIe siècle. Cette forteresse disparue, dont il subsiste néanmoins quelques vestiges de remparts dans le village. On trouve au pied du dernier vestige du château-fort la tour crénelée de lHorloge (reconstruite en 1624).","habitants":"Famille d'Albignac\r\n        \"","divers":"Château de Peyreleau et de Triadou","gps":"","images":["../image/image_12/12_Peyreleau_1.jpg","../image/image_12/12_Peyreleau_2.jpg","../image/image_12/12_Peyreleau_3.jpg","../image/image_12/12_Peyreleau_4.jpg","../image/image_12/12_Peyreleau_5.jpg","../image/image_12/12_Peyreleau_6.jpg","../image/image_12/12_Peyreleau_7.jpg"]},"Consult_chateau_formulaire3d70":{"id":"Consult_chateau_formulaire3d70","dept":"12","canton":"Capdenac","commune":"Peyrusse le Roc","nom":"Peyrusse","type":"Vestiges","periode":"XII","histoire":"Quatre châteaux à Peyrusse le Roc, celui de Peyrusse tours du XII-XIIIe siècle, celui du Bousquet XVIIe siècle de la Bégonie du XVe siècle et de la Caze tour du XVIIIe siècle (voir article).    PEYRUSSE, cité en 1095 et en 1229 première mention d'un château et d'un village fortifié.  XIIe siècle : L'Antique Pétrucia joua un rôle politique et militaire au Moyen-Age. Elle fut une place forte des ducs d'Aquitaine et des comtes de Toulouse avant que le roi de France Philippe III le Hardi ne mette la main sur elle après la mort d'Alphonse de Poitiers en 1270 et de sa femme Jeanne en 1271. En 1369, Peyrusse adhéra à l'appel du comte d'Armagnac pour soutenir le roi de France contre les Anglais. Des compagnies anglaises venues du Quercy prirent la ville vint ans plus tard en 1390.  Peyrusse est sous l'autorité de l'abbaye de Figeac et des comtes de Toulouse, en 1269, Peyrusse reçut dans ses murs Alphonse de Poitiers auquel le comte de Rodez vint rendre hommage. En 1270 la châtellenie passe sous le contrôle du roi de France. Peyrusse devient alors le chef-lieu d'une circonscription administrative et un second château est construit pour le bailli royal.  Le 11 février 1369, une charte de privilèges a été accordée à la commune par Charles V et signée entre les consuls de la ville et le comte de Rodez au nom du duc d'Anjou et du Roi. C'était le chef lieu du plus grand bailliage du Rouergue  et il abritait dans ses murs 187 hommes en armes et 4 chevaliers.                                 BOUSQUET, cette ancienne place forte des ducs dAquitaine et des comtes de Toulouse a joué un rôle politique et militaire au moyen âge.                                                                                        BEGONIE pas d'information historique ni architecturale.","architecture":"La forteresse de Peyrusse subit un premier siège en 761, et  prise par les Anglais en 1163, puis occupée par Simon de Montfort. La ville perd son importance à partir de la fin du XVIe siècle. En 1668, le château royal est déjà en ruines, il ne reste que deux tours ; la tour nord servait de tour de guet . Les vieux remparts du XIe siècle, la tour de la Barbacane, le Beffroi, l'hôpital des Anglais, Notre-Dame de Laval, et une église qui semble aujourd'hui démesurée avec ses 12 absides, les impressionnantes tours du Roc de Thaluc, la synagogue, nous laissent deviner l'importance stratégique de Peyrusse le Roc à son apogée. L'Hôpital des Anglais rappelle que le site appartint aux ducs d'Aquitaine, nos voisins d'outre manche, après l'annulation du mariage de la belle Aliénor avec le Roi de France Louis VII et son remariage avec Henri Plantagenêt  lequel monte sur le trône d'Angleterre, sous le nom de Henri II, en 1154. Porte du château du roy; donjon, avec sa tour de garde, et sa prison et oubliettes.   Le château du Bousquet a été construit au XVIe siècle, pas d'historique sur cette demeure située sur la commune de Peyrusse le Roc, magnifique cité médiévale qui date du XIIe siècle. Corps de logis rectangulaire à deux étages toit en croupes.","habitants":"Comte de Rodez \r\n        \"","divers":"vestiges des tours et  château de Peyrusse, du Bousquet et de Bégonie","gps":"","images":["../image/image_12/12_Peyrusse_1.jpg","../image/image_12/12_Peyrusse_2.jpg","../image/image_12/12_Peyrusse_3.jpg","../image/image_12/12_Peyrusse_4.jpg","../image/image_12/12_Peyrusse_5.jpg","../image/image_12/12_Peyrusse_6.jpg","../image/image_12/12_Peyrusse_7.jpg","../image/image_12/12_Peyrusse_8.jpg"]},"Consult_chateau_formulaire9717":{"id":"Consult_chateau_formulaire9717","dept":"12","canton":"Sauveterre","commune":"Pradinas","nom":"Planque","type":"Château","periode":"XIV","histoire":"La PLANQUE, situé entre les villages de Castanet et de Pradinas et occupé depuis le XIVe siècle. A la fin du XVIIe siècle, la famille sappauvrit, vend des terres. Des alliances avec les familles nobles voisines comme Morlhon ou Reboul sont fréquentes mais également avec des familles de lAlbigeois tout proche.  Cette belle demeure a été réaménagée à plusieurs reprises : lors du mariage, en 1703, de Victor de La Raffinie avec Catherine de Pruines, la dot de cette dernière doit servir en partie à payer les ouvriers pour réparer le château qui est menacé de ruine. Au XVe siècle la famille Bertran Martini par alliance de Héléna Martini en 1450  à la famille Garnier dans cette famille jusqu'en 1583 et par alliance de la descendance Sobirane Garnier le transmet  aux Azémar qui le passera par alliance de Juliette Azémar à la famille de Soltages dont une fille  Anne épousera en 1599  Marc Antoine Dulac passera par alliance d'Anne Dulac  à  Jacques  de la Raffinie dans cette famille jusqu'en 1773  passera par alliance à Foy de Morlhon, sans descendance leur héritier sera un neveu de Foy de Morlhon, fils de Jean-Louis Rogery et Eléonore de Morlhon, dEspeillac, qui suit Alix Rogery, propriétaire de La Planque, qui fera héritier son petit-neveu  Marcel Roques, décédé à 47 ans, marié avec Colette Luc, de Nancy. Gérard Roques-Rogery, maire de Pradinas depuis 1969, marié avec Odile Henrion, de Sedan et à  Geneviève Rigal-Saurel.","architecture":"château de la Planque bien restauré, depuis le XIVe siècle,  corps de logis en forme de U  avec deux niveaux  et pavillons en angle à trois niveaux porte d'entrée  flanqué de chaque côté de tours rondes à quatre niveaux avec sur face avant de fenêtres jumelées, le pavillon d'entrée  grande porte avec fronton.  Grande baie à meneaux au dessus  se terminant par un triangle sous toit avec oeil-de-boeuf plein cintre.  Au XIXe siècle, il a subi dimportantes restaurations  est actuellement la propriété de M. Gérard Roque-Rogery, maire de Pradinas.","habitants":"Famille Bertran Martini \r\n        \"","divers":"Château de la Planque","gps":"","images":["../image/image_12/12_Planque_1.jpg","../image/image_12/12_Planque_2.jpg","../image/image_12/12_Planque_3.jpg","../image/image_12/12_Planque_4.jpg","../image/image_12/12_Planque_5.jpg","../image/image_12/12_Planque_6.jpg"]},"Consult_chateau_formulaireeed9":{"id":"Consult_chateau_formulaireeed9","dept":"12","canton":"Luz la Primaube","commune":"Luz la Primaube","nom":"Planèzes","type":"Château","periode":"XV","histoire":"PLANEZES, bâti lui aussi au XVe siècle, et appartenant à la famille de La Malène. La seigneurie de Planèzes existait au XIIIe siècle. Elle était alors aux mains de la famille de Cros, qui en resta détentrice jusqu'au XVIIe siècle. Au début du XIXe siècle, le château de Planèzes était aux mains de la famille de Costa qui possédait aux alentours de nombreuses parcelles agricoles.  Ce château  appartient aujourd'hui, à la famille de La Malène.","architecture":"Le château se situe dans le hameau de Planèzes, sur une colline, entre Luc et la Primaube. Etabli à plus de 667 mètres d'altitude au point culminant d'un piton boisé, le château apparaît au centre d'une parcelle concentrée, comme le site seigneurial à vocation défensive qu'il était déjà au XIIIe siècle. Le logis semble dater du XVe siècle et ne témoigne pas, du moins à l'extérieur, d'une quelconque mise au goût du jour à la période moderne. Les dépendances qui l'entourent, semblent par contre avoir été largement remanié à la fin de la période moderne. De plan massé le corps de logis est flanqué de deux tours circulaires à l'ouest et d'une tour semblable avec un tourillon au centre de sa façade arrière. Les façades comme les tours sont ouvertes par des fenêtres à demi-croisées, seuls les appuis bénéficient  d'un décor d'architecture, mais très rudimentaire puisqu'il s'agit d'un simple tore. La tour nord-ouest  percée d'une pierre d'envol servait de pigeonnier.","habitants":"Famille de La Malène\r\n        \r\n        \"","divers":"Forteresse de Planèzes","gps":"","images":["../image/image_12/12_Planezes_1.jpg","../image/image_12/12_Planezes_2.jpg","../image/image_12/12_Planezes_3.jpg","../image/image_12/12_Planezes_4.jpg","../image/image_12/12_Planezes_5.jpg"]},"Consult_chateau_formulaire93e7":{"id":"Consult_chateau_formulaire93e7","dept":"12","canton":"Saint Geniez d","commune":"Pomayrols","nom":"Pomayrols","type":"Château","periode":"X-XV","histoire":"POMAYROLS, la présence du château remonterait au Xe siècle. L'édifice est attesté dès 1261 dans l'acte de mariage de Guillemette sur de Pons de Cayrodes.  En 1404, Marquès de la Romiguière avait épousé Guise de Melhac. Ils eurent deux filles Loïse et Isabelle. Isabelle la cadette, épousa en 1437 Jean de Balaguier, seigneur de Montsalès  Gabrielle de La Romiguière : héritière de Pomayrols, du Cambon, de La Roque-Sainte-Marguerite, de Bozouls en Rouergue ainsi que de Montamat près de Raulhac en Auvergne. En 1425, toujours pendant la guerre de Cent Ans, au début du règne de Charles VII de France, Loïse de la Romiguière l'aînée, épousa Aymeric de Montamat de la maison de Benavent qui prit le nom et les armoiries de La Romiguière. En 1452, Gabrielle leur fille unique, épousa Bérard Murat de Lestang qui s'engagea pour lui et sa postérité, à garder les armoiries de La Romiguière  Bérard Murat de Lestang, écuyer, maître d'hôtel et chambellan du roi Louis XI. Il fut nommé par le roi au commandement de la forteresse militaire d'Usson en Auvergne. François Murat de Lestang ,épousa en 1541, Anne, la fille d'Antoine, le seigneur d'Albin de Valzergues et de Naussac, ils léguèrent Pomayrols à Antoine leur fils. Le 5 octobre 1687, Anne Murat de Lestang épousa Jean Baptiste de Roux de La Loubière, ainsi s'acheva la lignée des Murat de Lestang à Pomayrols,  dans cette famille jusqu'en 1754, les du Pont de Ligonnès jusqu'en 1808. En 1754, Jean Baptiste de Roux de la Loubière, écuyer du roi, testa le domaine de Pomayrols en faveur de son neveu Jean Baptiste du Pont de Ligonnès qui avait épousé le 6 mars 1745 Catherine de Serre. En 1808, Charles-Gabriel du Pont de Ligonnès vendit le château à M. Aymar de Jabrun. Au cours du XIXe siècle, Aymar de Jabrun vendra la bâtisse à M. Xavier Fournier qui le vend en 1905 à la commune la partie située à l'Est et la tour attenante.","architecture":"Pomayrols,  restes d'une enceinte quadrangulaire formée de logis en équerre autour d'une cour, autrefois à flanquement cylindrique d'angles (hauts de 28 mètres et de 19 mètres de circonférence). Le château a été reconstruit vers 1446, gravement endommagé et en partie rasé après la Révolution.   Après le passage des huguenots, les parties saccagées ne furent pas toutes relevées et les Murat de Lestang qui avaient des fonctions à la cour de Versailles ne séjourneront plus au château. Le château résulte donc de remaniements et d'agrandissements au cours de l'époque médiévale dont les derniers remontent en 1446. Le château de Pomayrols  conservera son aspect d'origine jusqu'en 1568. En cette fin de Moyen-Age, le souvenir des pillages, commis des décennies auparavant, était toujours présent dans les esprits et justifiait le maintien de cette construction pour la protection des biens et des personnes. C'est un édifice sans entretien, livré au mauvais temps et aux pillards.  Dans le bâtiment sud, il y aménagera des ateliers au rez de chaussée et des appartements aux étages. En 1905, il vend à la commune la partie située à l'Est et la tour attenante. Elle y aménagera une école publique au rez de chaussée. Une pièce d'angle abrite un musée. Aujourd'hui, malgré les cicatrices de l'histoire puis les remaniements successifs, l'ensemble à toujours bonne allure, le château de Pomayrols, avec ses deux hautes tours, reste un témoin toujours debout de l'histoire du Haut-Rouergue.","habitants":"Famille de La Romiguière                                                                         Famille du Pont de Ligonnès\r\n        \"","divers":"Château féodal de Pomayrols","gps":"","images":["../image/image_12/12_Pomayrols_1.jpg","../image/image_12/12_Pomayrols_2.jpg","../image/image_12/12_Pomayrols_3.jpg","../image/image_12/12_Pomayrols_4.jpg","../image/image_12/12_Pomayrols_5.jpg","../image/image_12/12_Pomayrols_6.jpg"]},"Consult_chateau_formulairecf38":{"id":"Consult_chateau_formulairecf38","dept":"12","canton":"Pont du Salars","commune":"Pont du Salars","nom":"Pont_Salars","type":"Château","periode":"XII-XVII","histoire":"Quatre châteaux à Pont de Salars, celui de Camboulas vestige du XIIe siècle, de Camboularet du XIVe siècle, de Veilhac du XIV-XIXe siècle et le manoir de Crespiaguet.                         CAMBOULAS,  est une des anciennes vicomtés de Rodez.  Elle pourrait avoir donné naissance à cette localité comme relais ou gîte d'étape.  Le roi, successeur des comtes de Rodez, y nomme encore un capitaine en 1646. le sieur de Montel. Au XVIIIe siècle, il ne restait que des ruines.\r\nVEILHAC  Le château de Veilhac a été construit au XIVe siècle, situé dans un  beau site boisé, il fut restauré au XIXe siècle. Sous le second empire, il fut la résidence de Calmet-Rognat, député de l'Aveyron.                                                                                     CAMBOULARET et CRESPIAGUET, pas d'information historique.","architecture":"Pont de Salars tire son nom du pont qui enjambe le Viaur non loin de Salars, autour duquel un village se développa. Les voyageurs prirent l'habitude d'y marquer l'étape au Moyen-Age.           Camboulas  Surplombant un méandre du Viaur se dressent les ruines d'un ancien château fort, à quelques encablures de Pont de Salars, les vestiges du château de Camboulas sont les témoins de la riche histoire de ce site autrefois siège d'une vicomté du Comte de Rodez. On peut encore voir un \"cap-barré\" taillé dans le roc et des restes des mûrs, témoignant de son rôle stratégique.\r\n Le château du Camboularet ou petit Camboulas, possède une tour d'angle qui constitue un vestige du château élevé au XIVe siècle et situé sur la rive droite du Viaur. Pont de Salars tire son nom du pont qui enjambe le Viaur non loin de Salars, autour duquel un village se développa. Les voyageurs prirent l'habitude d'y marquer l'étape au Moyen-Age, ainsi que l'attesterait la mention au XIIIe siècle, de l'hôpital du Pont susceptible de servir de refuge.","habitants":"Comtes de Rodez\r\n        \"","divers":"Vestiges de Camboulas, château de Veilhac, de Camboularet et de Crespiaguet","gps":"","images":["../image/image_12/12_Pont_Salars_1.jpg","../image/image_12/12_Pont_Salars_2.jpg","../image/image_12/12_Pont_Salars_3.jpg","../image/image_12/12_Pont_Salars_4.jpg","../image/image_12/12_Pont_Salars_5.jpg","../image/image_12/12_Pont_Salars_6.jpg","../image/image_12/12_Pont_Salars_7.jpg","../image/image_12/12_Pont_Salars_8.jpg"]},"Consult_chateau_formulaire8c32":{"id":"Consult_chateau_formulaire8c32","dept":"12","canton":"Salles la Source","commune":"Pruines","nom":"Pruines","type":"Château","periode":"XIII","histoire":"deux châteaux à Pruines , celui de Pruines et celui de Combettes du XVIIIe siècle pas d'informations historiques pour ce dernier.                  PRUINES, au XIIIe siècle existé un fort ou château tenu par une famille du nom de la terre de Pruines en 1395 Aymeric de Mercato acheta le fief aux Pruines, il le garde jusqu'au XVe siècle, puis à Guillaume de Solages en 1402 seigneur de Pruines passa par alliance  à la famille dArjac jusqu'en 1506 , date de passage dans la famille de Marcenac qui lengage en 1543 auprès de Jean Imbert Dardenne fils du maire de Villefranche-de-Rouergue, receveur général des rentes de Toulouse qui l'habitat dans l'attente de la construction de son château de Graves et en 1567, le château est vendu  au chanoine de Rodez Antoine de Frédault jusqu'en 1573, le vicomte de Gourdon s'en empare avec sa troupes  de protestants qui le dégrade. La propriété passe  à Yzarn de Freissinet, aux Fleury et retour aux Marcenac, puis acquis  en 1620  par François de Bancalis baron dont les héritiers le conserveront jusquau début du XIXe siècle. Au début du XXe siècle, il est vendu à la municipalité qui y installe la mairie et lécole publique de 1917 à 1954. En 1974, revendu à monsieur Frank Gineste. Il a été depuis largement rénové et restauré. Il a hébergé  une auberge de jeunesse, des stages de sculpture, de tissage et de fonderie dart et plus récemment une collection de 600 poteries populaires du Sud Ouest de la France du XVIIe au XIXe siècle.","architecture":"Le château de Pruines avec sa belle façade du XVIIe siècle et sa tour du  XVe siècle, il est bâti en grès rose local et est constitué d'un bâtiment principal, s'ouvrant sur un grand escalier Louis XIV conserve de belles cuisines voûtées à cheminée monumentale  et des plafonds du XVIIe siècle une tour et lécurie. Au XVIe siècle des travaux daménagement intérieurs furent entrepris. Au XVIIe siècle  les Bancalis font détruire la totalité du bâtiment existant à l'exception du donjon  et font construire  le corps de logis actuel  de plan rectangulaire de quatre niveaux dont un de comble,  les façades sont percées de grandes baies à petits carreaux et sa porte d'entrée est surmontée d'un fronton cintré, des lucarnes passantes, sommées d'un fronton se détachent du toit à la Mansart. Les travaux restèrent inachevés par la mort brutale de Jean de Bancalis assassiné. Un plafond, datant du XVIIe siècle, possède un décor peint et sculpté très coloré, actuellement visible dans une pièce du premier étage de la tour, curiosité rare en Rouergue.","habitants":"Famille dArjac\r\n        \"","divers":"Forteresse de la Pruine et château de Combettes","gps":"","images":["../image/image_12/12_Pruines_1.jpg","../image/image_12/12_Pruines_2.jpg","../image/image_12/12_Pruines_3.jpg","../image/image_12/12_Pruines_4.jpg","../image/image_12/12_Pruines_5.jpg","../image/image_12/12_Pruines_6.jpg","../image/image_12/12_Pruines_7.jpg"]},"Consult_chateau_formulaire71c4":{"id":"Consult_chateau_formulaire71c4","dept":"12","canton":"Laguiole","commune":"Curières","nom":"Puech","type":"Château","periode":"XVI","histoire":"PUECH, situé à Curières, sur les flancs du plateau de l'Aubrac, appartenait à la famille de Frayssinous  Jean Baptiste Frayssinous, né en 1742 au Puech de Curières, issu d'une vieille famille de l'Aubrac. En 1679, un certain Jean Aymard Frayssinous est l'Abbé de Bonneval. En 1785, Jean Antoine Frayssinous est fermier général de Bonneval (donc de Séveyrac). Il est le frère de Jean Baptiste le nouvel acquéreur.  Mgr Denis Frayssinous (17651841), évêque d'Hermopolis  et ministre de lInstruction publique (1824-1827), membre de lAcadémie Française. le château du Puech est une maison d'hôtes. Il vous accueille au coeur d'un domaine d'élevage de chevaux de saut d'obstacles et possède un grand parc. En 1806, Jean-Antoine Frayssinous, le fils de Jean-Baptiste lui succède, et il entreprend de grands travaux. En 1873, Aimable Frayssinous meurt, sa fille unique qui a épousé Bernard d'Armagnac, hérite de Séveyrac. C'est donc le Vicomte d'Armagnac qui gère désormais le domaine et l'afferme cette même année à Adrien Dauban.\r\nChâteau du Puech de Nadège de Lachaumette.","architecture":"Le château du Puech est  bâti au Lieu-dit Le Puech, à Curières, sur les flancs du plateau de l'Aubrac.   Jean-Baptiste Frayssinous entreprend de grands travaux. Il transforme la tour et la rend plus habitable. Il aménage l'unique fontaine du corps de ferme. Il modifie enfin les bâtiments d'exploitation, grenier, écurie des juments et la maison de la ferme. De plan en U corps de logis rectangulaire à trois niveaux flanqué d'un pavillon d'entré de quatre niveaux sur la partie centrale, deux pavillons saillants aux extrémités, et deux petites tours rondes à toit en poivrière sur les murs du parc.","habitants":"Famille de Frayssinous\r\n        \"","divers":"Château du Puech","gps":"","images":["../image/image_12/12_Puech_1.jpg","../image/image_12/12_Puech_2.jpg","../image/image_12/12_Puech_3.jpg","../image/image_12/12_Puech_4.jpg"]},"Consult_chateau_formulairefcca-2":{"id":"Consult_chateau_formulairefcca-2","dept":"12","canton":"Villeneuve","commune":"Savignac","nom":"Péze","type":"Château","periode":"XIV","histoire":"PEZE,  le château de la Pèze est cité pour la première fois en 1311 : il s'agissait alors de la Tour des Gaubert. En 1480 Raymond de la Pèze construit à proximité une maison-forte. La demeure est acquise par la famille de Pomairols au XVIe siècle. Le poète Charles de Pomairols y vécut de 1835 à 1916.","architecture":"Le château est cité pour la première fois en 1311 : il s'agissait alors de la Tour des Gaubert. En 1480, Raymond de la Pèze construit à proximité une maison forte.  La tour, qui tenait lieu de citerne, a été aménagée en bureau au XIXe siècle. Elle communique avec l'étage supérieur par l'escalier aménagé dans l'épaisseur du mur. Le corps de logis a été remanié aux XVIIIe siècle par l'ajout, notamment, d'une construction qui vient combler le vide entre la tour et le corps de logis en 1845. Au cours du XIXe siècle, les caves voûtées de la tour ont été aménagées en salon et salle-à-manger. Ce château possède, malgré certains remaniements, la disposition habituelle des repaires rouergats, soit un donjon auquel s'ajoute ultérieurement et à proximité, un corps de logis.","habitants":"Famille de Pomairols\r\n        \r\n        \"","divers":"Château de Péze","gps":"","images":["../image/image_12/12_Peze_1.jpg","../image/image_12/12_Peze_2.jpg","../image/image_12/12_Peze_3.jpg"]},"Consult_chateau_formulaireb6ef":{"id":"Consult_chateau_formulaireb6ef","dept":"12","canton":"Sévérac le Château","commune":"Recoules_Provinquières","nom":"Recoules_Varés","type":"Château fort","periode":"XV","histoire":"Trois châteaux à Recoules, celui de Recoules-Provenquières du XVe et XIXe siècle, de Méjanel du XV-XVIe siècles et de Varés du XVe siècle.                                                                                RECOULES, le château de Recoules est attesté dès le XIIIe siècle, la seigneurie, qui appartient à la famille de Garceval, passa par mariage, en 1761, à la famille de Lastic-Saint-Jal, puis en 1753 aux Vezins. il fut acheté en 1853 par le baron de Gaujal qui lui donna son aspect actuel. \r\nPROVINQUIERES, pendant la période féodale, Prévinquières était la demeure de puissants seigneurs. Le plus illustre dentre  eux, Bernard de Prévinquières, sacré évêque de Lodève en 1065, participa au fameux concile de Clermont au cours duquel fut prêchée la première croisade. Il prit la croix et partit pour la Terre Sainte avec Raymond IV, comte de Toulouse et du Rouergue.                  MEJANEL,  Il appartint  aux familles du Claux (ou Duclaus), Micheau de Cabanes, Morel et Bonnefous.                                   VARES est situé à 2 km à gauche de la route au nord ouest de Recoules. Cette demeure fut construite  par la famille de Prévinquières qui disposait déjà dun mas. Son régisseur Carrier dit \"Laissac\" prit une part active aux mouvements royalistes lors de la Révolution. Il fut incarcéré à Rodez et échappa à lexécution grâce à laction de quatre chouans renommés venus le délivrer avec Cablat. Le château passa ensuite entre divers propriétaires pour devenir actuellement centre de colonie de vacances de la sncf.","architecture":"Recoules, il  sagit dune grande bâtisse en quadrilatère avec des tours d'angles, selon un modèle fréquent dans le pays au XVIIIe siècle : portail du XVIIe siècle à fronton brisé, donjon remanié par le baron de Gaujal sur le modèle de celui de Tholet (XIXe siècle), escaliers extérieurs et terrasse du XIXe siècle. Provenquières, la demeure déploie quatre corps de logis cantonnés de tours autour d'une petite cour. Elle abrite une série de pièces intéressantes par leur décor: toiles peintes, parquets marquetés, décors muraux peints.                                                                                                    Méjanel, bâti semble-t-il au XVIe siècle, est un parfait exemple des « repaires » construits à cette époque en Rouergue. Peu ou pas modifié, il a conservé, en particulier, ses éléments de défense : ses meurtrières, ses bouches à feu, ses canonnières situées sur ses tours et ses murailles et la bretèche surmontant sa porte dentrée. Construit avec des matériaux calcaires et dolomitiques du secondaire (Lias) affleurant à proximité, il sintègre parfaitement, ainsi que les maisons anciennes du hameau qui lentourent, dans le paysage de cette bordure du Causse de Sévérac.                             Varés, cette demeure fut construite au cours du XVe siècle.","habitants":"Famille de Garceval                                                                             Famille de Prévinquières \r\n        \r\n        \"","divers":"Château de Recoules Provenquières  de Méjanel  et de Varés","gps":"","images":["../image/image_12/12_Recoules_Vares_1.jpg","../image/image_12/12_Recoules_Vares_2.jpg","../image/image_12/12_Recoules_Vares_3.jpg","../image/image_12/12_Recoules_Vares_4.jpg","../image/image_12/12_Recoules_Vares_5.jpg","../image/image_12/12_Recoules_Vares_6.jpg","../image/image_12/12_Recoules_Vares_7.jpg","../image/image_12/12_Recoules_Vares_8.jpg","../image/image_12/12_Recoules_Vares_9.jpg"]},"Consult_chateau_formulairea51d":{"id":"Consult_chateau_formulairea51d","dept":"12","canton":"Sévérac le Château","commune":"Rivière sur Tarn","nom":"Rivière_sur_Tarn","type":"Forteresse_vestiges","periode":"XII-XV","histoire":"Quatre châteaux à Rivière sur Tarn, celui de Fontanelles du XIXe siècle de Lugagnac du XIV-XVIe siècles, de Vignals  du XVIIIe siècle et le fort de Peyrelade du XII-XVe siècles.                        PEYRELADE, les vestiges du château fort de Peyrelade fut l'une des forteresses les plus importantes du Rouergue par sa situation stratégique pour le contrôle des gorges du Tarn.  Il existait au XIIe siècle, en 1402 le château est pris et pillé par Bernard VII comte d'Armagnac et de Rodez, reconstruction de certaines parties du château au XVe siècle. Henri IV rattache Peyrelade et son mandement  à la couronne. Il fut le théâtre de luttes et de sièges incessants jusqu'en 1633, où il fut démantelé sur ordre de Richelieu. Il appartient à la commune de Rivière-sur-Tarn qui depuis 1977 entreprennent la première campagne de restauration.   FONTANELLES, pas d'informations historiques.                              LUGAGNAC, sa construction remonte vers 1363 par Pierre de Guitard, il fut ensuite propriété des de Montvalat, des  Pélamourgue et de Vailhausy. Chambres d'hôtes dans un château du XIVe siècle, remanié au XVIe  siècle.                                                                VIGNALS, construit vers 1664 sur une très ancienne demeure appartenant à la famille Gaspard de Peyrelade.","architecture":"PEYRELADE, majestueuse forteresse médiévale du XIIe siècle bâtie sur un éperon rocheux dominant l'entrée des Gorges du Tarn, constituait au Moyen-Age l'une des plus importantes forteresses du Rouergue, grâce à la position de son rocher-donjon naturel qui lui permettait de contrôler la vallée du Tarn. Ses ruines donnent une idée de ce que fut la forteresse : Ses ruines donnent une idée de ce que fut la forteresse :  enceinte extérieure de plus de 250 mètres de long pour une hauteur de 10 mètres et une largeur de 2, 10 mètres. L'ensemble est dominé par le rocher-donjon de plus de 50 mètres de haut, accessible grâce à une tour ronde qui lui est adossée. Le château a conservé tous ses dispositifs défensifs du XVe siècle. Une triple enceinte l'entourait au Moyen-Age. La première enceinte était accessible par deux portes. L'autre protégeait la place d'armes et le corps de logis; la 3ème entoure le donjon, qui était haut de 50 mètres. On accédait au donjon par un pont-levis, qui donnait sur une terrasse. Le donjon contenait une citerne, un four et un beffroi dont la cloche carillonnait pour avertir les gens d'un danger. Architecture très particulière, ainsi que les nombreux travaux de restauration et de fouilles entrepris depuis 30 ans. \r\nFontanelles, maison de retraite.  Lugagnac; de style féodal, corps de logis de plan carré à quatre niveaux toits en croupes sur chemin de ronde à mâchicoulis, flanqué  d'échauguettes sur façades avant et de deux grosses tours rondes avec chemin de ronde à mâchicoulis toiture en poivrière.","habitants":"Famille Gaspard de Peyrelade\r\n        \r\n        \r\n        \"","divers":"Château de Fontanelles, de Lugagnac, de Vignals, et le fort de Peyrelade","gps":"","images":["../image/image_12/12_Riviere_sur_Tarn_1.jpg","../image/image_12/12_Riviere_sur_Tarn_2.jpg","../image/image_12/12_Riviere_sur_Tarn_3.jpg","../image/image_12/12_Riviere_sur_Tarn_4.jpg","../image/image_12/12_Riviere_sur_Tarn_5.jpg","../image/image_12/12_Riviere_sur_Tarn_6.jpg","../image/image_12/12_Riviere_sur_Tarn_7.jpg"]},"Consult_chateau_formulairecf61":{"id":"Consult_chateau_formulairecf61","dept":"12","canton":"Sébazac-Concourés","commune":"Rodelle","nom":"Rodelle","type":"Château","periode":"XVI","histoire":"Rodelle outre les vestiges du château , château  de Dalmayrac, du XVI-XVIIIe siècle , de la Goudalie du XVIIIe siècle et de Sanhes du XVIIIe siècle.                                                                                DALMAYRAC, pas d'information historique.                                   GOUDALIE, le château de La Goudalie a été construit au XVIIIe siècle. On l'appelait Rodelle le petit Rodez, Rutenula, mais le nom se perdit et l'on ne garda que celui de Rodelle. Viguerie aux temps carolingiens, les lieux devinrent place forte des comtes de Rodez. Transformé en hôtel restaurant par Alain Bousquié.                       SANHES, jardin d'agrément dit parc du château de Sanhes. Le jardin irrégulier et en pente comprend une allée, une pièce d'eau, un jardin potager et un massif d'arbres.","architecture":"Dalmayrac,  le corps de logis du XVIIIe siècle se déploie  à partir d'une tour rectangulaire. La tour ronde qui devait constituer le noyau initial de l'édifice date du XVIe siècle.  Le corps principal de logis est très caractéristique du XVIIIe siècle. Belle ordonnance autour d'un grand escalier à balustres transformé au XIXe siècle, il possède charpentes et couvertures d'origine d'une facture exceptionnelle. On remarquera particulièrement les combles en accolade mansardé de la tour centrale et des lucarnes. A l'angle ouest de la façade à gauche on a adjoint au XIXe siècle un corps d'angle à fenêtres à meneaux. A l'arrière du bâtiment subsiste une haute tour, vestige des bâtiments du XVIe siècle ainsi qu'une bâtisse transformée en habitation du régisseur dont la qualité d'ordonnance un  escalier à double révolution est intéressante. La Goudalie a été construit au XVIIIe siècle.  Le site s'y prêtait car le village s'étire sur une arête qui surplombe le Dourdou. Les comtes édifiérent un château à l'extrémité du promontoire, comme le rappelle de gros blocs de roche. De plan rectangulaire\r\nSanhes; jardin d'agrément dit parc du château de Sanhes. Le jardin irrégulier et en pente comprend une allée, une pièce d'eau, un  potager et un massif d'arbres. Le bourg est situé en plein Causse Comtal et s'étale sur une arrête rocheuse sculptée par les méandres du Dourdou. Le village possède une église du XVe siècle, ainsi que des ruines féodales.","habitants":"Comtes de Rodez\r\n        \"","divers":"Vestiges du château de Rodelle, château de Dalmayrac, de la Goudalie et de Sanhes","gps":"","images":["../image/image_12/12_Rodelle_1.jpg","../image/image_12/12_Rodelle_2.jpg","../image/image_12/12_Rodelle_3.jpg","../image/image_12/12_Rodelle_4.jpg","../image/image_12/12_Rodelle_5.jpg","../image/image_12/12_Rodelle_6.jpg","../image/image_12/12_Rodelle_7.jpg","../image/image_12/12_Rodelle_8.jpg","../image/image_12/12_Rodelle_9.jpg"]},"Consult_chateau_formulaire3694-2":{"id":"Consult_chateau_formulaire3694-2","dept":"12","canton":"Rodez","commune":"Rodez","nom":"Rodez","type":"Patrimoine","periode":"XIV-XVI","histoire":"RODEZ, l'histoire de la ville resta marquée durant longtemps par une intense rivalité entre les comtes de Rodez maîtres du Bourg et les évêques de Rodez maîtres de la Cité. Une muraille délimitait les deux secteurs. Chaque communauté avait un hôtel de ville, ses consuls, une administration propre ; chacune rivalisant de puissance, de rayonnement. Au bourg, la célèbre dynastie des comtes d'Armagnac et de Rodez, finit par acquérir des privilèges régaliens : battre monnaie à la tour Martelenque, porter la couronne comtale et persister à reconnaître un temps l'antipape Benoît XIII et ses héritiers Bernard Garnier et Jean Carrier. Cela amena inévitablement l'affrontement avec le roi de France en 1443. Le dauphin, futur Louis XI, vint occuper Rodez et soumettre le comte Jean IV. Plus tard son fils aura une idée séditieuse en essayant de trahir Louis XI. Cela lui vaudra d'être massacré à Lectoure, avec sa famille, lors de sa fuite.  Au début du XVIe siècle, Rodez fut marquée par l'évêque François d'Estaing . Il termina les travaux de construction de la cathédrale Notre-Dame de Rodez, culminant à 87 mètres, surmonté d'une Vierge, encore aujourd'hui le plus haut clocher plat de France. Les travaux furent achevés en quinze années de 1510 à 1526 et ce malgré la peste qui ravageait la ville. En 1589, Henri IV, comte de Rodez, attache la destinée du comté de Rodez à la Couronne. L'histoire de Rodez se calque alors sur celle de la France. Au long des XVIIe et XVIIIe siècles, Rodez devient une cité marchande prospère.\r\n L'hôtel a été bâti dans la première moitié du XVIIIe siècle par François Le Normant d'Ayssènes, conseiller du roi et son receveur dans l'élection de Rodez. Il abrite aujourdhui la préfecture de l'Aveyron.  Hôtel de Bonald,   maison d'Armagnac, de Guitard, de l'annonciation et de nombreux bâtiments renaissance.                    St-FELIX, vers 1606, les Jésuites du collège de Rodez firent construire cette maison des Vignes comme résidence d'été. L'édifice est vendu comme bien national en 1793 durant la Révolution.","architecture":"Rodez, la plupart des édifices importants de la ville sont situés dans ce que l'on appelle le Vieux-Rodez. De plus, de nombreux édifices, maisons, places, lieux de cultes, châteaux sont inscrits et protégés par l'État,  patrimoine bâti autour de la cathédrale du XIIIe-XVIe siècle, dautres édifices religieux tels que l'église romane  de Saint-Amans du XIIe-XVIIIe siècles, chapelle baroque dite des Jésuites du XVIe et XVIIIe siècles, chapelle royale, palais épiscopal du XVII-XIXe siècles, maisons canoniales hôtel Molinier et Cambon, l'évêché avec son palais et  donjon sur angle. La ville ancienne est aussi riche danciennes résidences privées : hôtels de Bonald, Séguret, Lenormand-dAyssènes, maisons dArmagnac, de Benoît et de Guitard, la tour d'angle de l'hôtel Delauro, la tour de Corbières. À voir aussi et à visiter les haras nationaux. Saint-Félix; c'est un bâtiment rectangulaire de trois niveaux sur cave. Au centre de la façade nord est accolée une tour. Sur la façade nord de la tour, un bâtiment de plan en U, renferme les communs et est doté à l'est d'un four à pain semi-circulaire. La tour carrée contient un escalier tournant à quatre volées desservant les pièces du corps de bâtiment. La décoration des pièces a presque entièrement disparu. Les quatre cheminées du rez-de-chaussée et du premier étage ont conservés le décor stuqué de leur manteau.","habitants":"Les roi de France\r\n        \"","divers":"Patrimoine de Rodez et son Evêché","gps":"","images":["../image/image_12/12_Rodez_1.jpg","../image/image_12/12_Rodez_2.jpg","../image/image_12/12_Rodez_3.jpg","../image/image_12/12_Rodez_4.jpg","../image/image_12/12_Rodez_5.jpg","../image/image_12/12_Rodez_6.jpg","../image/image_12/12_Rodez_7.jpg","../image/image_12/12_Rodez_8.jpg","../image/image_12/12_Rodez_9.jpg"]},"Consult_chateau_formulairea85b-2":{"id":"Consult_chateau_formulairea85b-2","dept":"12","canton":"Villefranche de Rouergue","commune":"Villefranche de Rouergue","nom":"Romiguière","type":"Château","periode":"XV","histoire":"ROMIGUIERE, les premiers seigneurs de La Romiguière furent les comtes de Toulouse.  Jean de Saluste de la Ribe, achète des terres près dArnac en 1273, cet acte passé à la Romiguière a pour témoins Guillaume de Puy-Cervier.  Or les Bringuier ne prirent possession de la Romiguière quen 1362 et en 1471 on affirme que les ancêtres de Raymond de Bertholène ont donné la Cazote à Guille de Bringuier. Raymond II de Bringuier,  fils dAmalric, épousa Bonne de Montvalat qui était encore en vie en 1482. Un acte du 14 juillet 1440 nous fait savoir que Raymond était alors seigneur de la Romiguière.  La Cazote, Le Truel et Les Ribes.  Cest peut-être vrai pour les Saluste et les Puy-Cervier ; mais les Bringuier étaient une famille bien distincte qui vint à la Romiguière par héritage. Raymond III de Bringuier, fils et successeurs des précédents, épousa Hélix dHérailh et mourut entre les années 1471 et 1475. François de Bringuier, fils de Raymond III et dHélix est qualifié seigneur de la Romiguière le 12 avril 1495. Il était mort le 9 février de lannée suivante. Sa femme, Hélix de Ligonés lui donna : Gaillard de Bringuier encore en vie le 8 avril 1517. Guillaume de Bringuier   fils de Gaillard et fut père de : Gaillard II dont la femme, Claude de la Fare, ne lui donna que deux filles, Marie de Bertholène qui épousa François dHébles, seigneur des Ribes et Delphine mariée à Dorde de Ribier, seigneur de la Cazote. La Cazote, Le Truel et Les Ribes. Un acte dhommage rendu par Jacques de Faramond en 1684  Ce quartier fut donné en apanage à un Guille Bringuier par le mariage de Marie de Bertholène avec François dHébles, les terres des Bringuier passèrent dans la famille dHébles. Aujourdf'hui  son propriétaire Bernard Vernet.","architecture":"Château de Romiguière de plan rectangulaire à trois niveaux, toitures en croupes avec lucarnes, et accolées plein cintre de la façade d'une tour ronde à quatre étages, toit en poivrières et échauguettes flanquées sur les angles du bâtiment.","habitants":"Famille de Bringuier\r\n        \r\n        \"","divers":"Château de Romiguière","gps":"","images":["../image/image_12/12_Romiguiere_1.jpg","../image/image_12/12_Romiguiere_2.jpg"]},"Consult_chateau_formulaire294d":{"id":"Consult_chateau_formulaire294d","dept":"12","canton":"Saint-Geniez d","commune":"Lassouts","nom":"Roquelaure","type":"Château fort","periode":"XII","histoire":"ROQUELAURE, les seigneurs de Lassouts, sous lancien régime, se partageaient des droits sur lactuel territoire de la commune de Lassouts. Le village est une grande partie de la paroisse de Lassouts appartenaient au domaine du chapitre de la cathédrale de Rodez. Depuis 1310, la justice appartient au roi en paréage avec le chapitre. \r\n Roquelaure et la paroisse de Notre-Dame dAlbillac dépendait de la famille de Roquelaure de Bessuéjouls, cette seigneurie était suzeraine de la puissante baronnie de Calmont dOlt près dEspalion. En 1326 Lassouts était nommé Castri de Sudibus qui pourrait se traduire par « le Fort de Lassouts », en effet en ces temps-là Lassouts était entouré de murailles à lintérieur desquelles sappuyaient les maisons. Le château du XIe siècle  fut la résidence de la famille de Roquelaure. Cette famille s'allia à la famille de Bessuéjouls en 1592.  En 1786, le roi céda ses droits sur Lassouts aux Roquelaure de Bessuéjouls. Depuis 1966 il est restauré par son actuel propriétaire.","architecture":"La demeure de Roquelaure, remanié plusieurs fois. Pendant la Révolution le château fut vendu par lÉtat, peu à peu abandonné, il servit de carrière. Il finit par sécrouler dans les années 50. Le château est de plan rectangulaire, le coeur étant en hémicycle, l'ensemble est couvert en ardoises du pays, taillées en écailles. On peut maintenant observer sur le côté de la bâtisse, un logis carré du XIe siècle flanqués de deux tours rondes coiffées d'un toit pointu et une troisième recouverte d'une terrasse d'où on peut admirer une superbe vue. La chapelle romane ruinée, a été voûtée sur croisées d'ogives à l'époque gothique, la qualité de son architecture du XIIe siècle est remarquable par ses proportions, son appareil, ses chapiteaux, les modillons de la corniche et  ses baies. Depuis 1981, classée monument historique, elle possède une mise au tombeau datant du XVIe siècle.","habitants":"Famille de Roquelaure\r\n        \"","divers":"Château de Roquelaure, d'Albinhac et de Lassouts","gps":"","images":["../image/image_12/12_Roquelaure_1.jpg","../image/image_12/12_Roquelaure_2.jpg","../image/image_12/12_Roquelaure_3.jpg","../image/image_12/12_Roquelaure_4.jpg","../image/image_12/12_Roquelaure_5.jpg","../image/image_12/12_Roquelaure_6.jpg","../image/image_12/12_Roquelaure_7.jpg"]},"Consult_chateau_formulaire44fb":{"id":"Consult_chateau_formulaire44fb","dept":"12","canton":"Rieupeyroux","commune":"La Salvetat-Peyrales","nom":"Roumégous","type":"Vestiges","periode":"XII","histoire":"ROUMEGOUS, les seigneurs de Cadoule abandonnant leur forteresse auraient construit un château à Roumégous vers 1250, il   fut donc originairement possédé par les Cadolle, famille dancienne chevalerie qui contribua au XIIe siècle à la fondation du monastère de Bonne Combe, et dont une branche subsistait encore en Languedoc, au milieu du XIXe siècle. Aux Cadolle, succédèrent les De Bar, jusque vers la fin du XVIe siècle, en 1432 son propriétaire Jean Guitard le rend en hommage au comte d'Armagnac.  Le château fut occupé ensuite par la famille Malause et il fut vendu en 1608 par Bourbon-Malause. En 1655, il cessa dêtre habité. Roumégous passa à la maison de Revel. Puis, à lépoque de la Révolution, Auguste Truel de la Garde habitant au domaine de Revel vendit le château de Roumégous à Jean-Pierre Blanquet.  Ce bâtiment était qualifié de manoir de Roumégous. En thermidor an II, date fort connue pour la chute de Robespierre (1794) la demeure est vendue à un roturier, Pierre Blanquet, alors qu'elle appartenait jusque là à des familles nobles qui se succédaient. De Pierre Blanquet lacheteur de 1794, mort en 1822, le château passa à son fils François et ensuite à son petit fils, Jean Baptiste Blanquet dont la fille Marie Lucie Nathalie Blanquet épousa en 1920 Alfred-Achille Gargaros. \r\nOn trouve mention du château de Peyrolles dès le XIe siècle. Situé dans une boucle du Lézert, non loin de La Salvetat-Peyralès, Il donna son nom à la région du Peyralès. Il ne reste que peu de choses de ce château hormis les ruines du donjon.","architecture":"Roumégous domine la vallée du Viaur. Edifié au XVe siècle, il sélève sur une colline escarpée . Il domine la chapelle préromane de Murat, à 400 m au dessus du lit du Jaoul. Cest un château repaire  formé dune masse quadrangulaire avec quatre grosses tours rondes. Cétait une forteresse imprenable, dans un site difficile daccès. Les tours sont percées de quelques meurtrières, mais sur la partie du bâtiment central correspondante à lentrée, on naperçoit pas une seule ouverture. Les fenêtres navaient été installées aux étages supérieurs que du côté du précipice, là où lescalade était impossible. Le corps du logis est démantelé, mais on voyait encore en 1860 la base des arcades géminées à plein cintre qui soutenaient les voûtes de chaque étage. Le château défendu de trois côtés par des précipices, sabritait du côté du village sous deux lignes assez rapprochées de fortes murailles et de fossés profonds. Les ouvrages extérieurs ont disparu ; il ne reste plus du corps du logis que la carcasse. Les tours sont encore debout. Toutefois, le sommet de celle du Sud sest effondré. Le côté Nord de louvrage est lézardé et semble se maintenir debout grâce à un énorme lierre qui sagrippe à ses flancs et monte jusquau sommet. A langle de la jonction de deux de ces tours avec lédifice central, se trouvait à chaque façade, une tourelle présentant des escaliers étroits à vis pour la communication des étages entre eux. Toutes les pierres de taille en granit jaune tendre de cet édifice ont été enlevées, de sorte que cet important et lugubre château présente un délabrement complet. Au début du siècle, lune des 4 tours sest écroulée.","habitants":"Famille de Cadolle\r\n        \r\n        \"","divers":"Vestiges du château de Roumégous et le château de Ronel","gps":"","images":["../image/image_12/12_Roumegous_1.jpg","../image/image_12/12_Roumegous_2.jpg","../image/image_12/12_Roumegous_3.jpg","../image/image_12/12_Roumegous_4.jpg","../image/image_12/12_Roumegous_5.jpg"]},"Consult_chateau_formulaireda0c":{"id":"Consult_chateau_formulaireda0c","dept":"12","canton":"Villefranche de Rouergues","commune":"La Rouquette","nom":"Rouquette","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à la Rouquette, celui de la Rouquette du XIII-XVe siècles, celui d'Orlhonac donjon du XVe siècle  et celui de la Bastide Nandel du XIVe siècle ancienne maison forte.               ROUQUETTE, du château il ne subsiste que la tour, voisine du lavoir. Si le château de la Bastide Capdenac a été détruit, évoqué aujourdhui par son \"champ du donjon\" son mur denceinte est visible grâce à une association locale. Théâtres daffrontements au XIVe siècle avec les anglais puis au XVIe siècle entre catholiques et huguenots, beaucoup de hameaux offrent encore le spectacle magnifiques de fours à pain et lavoirs.                                        ORLHONAC, le château domine la plaine depuis de XIIIe siècle. Réaménagé vers 1830, il nenglobe plus léglise mais offre un paysage attrayant depuis les rives de lAveyron. En 1301, Raymond de Pierrefort, damoiseau, et Alasacie sa femme firent hommage à l'évêque de Rodez pour le château d'Orlhonac. Aujourd'hui l'édifice appartient au général de Chergé, frère du père Christian de Chergé, religieux trappiste qui fit partie des sept moines de Tibhirine vivant en Algérie pris en otage et assassinés en 1996.                                                                                     La BASTIDE NANDEL pas d'information historique.","architecture":"Du château de La Rouquettte, il subsiste la tour, voisine du lavoir, tandis que celui dOrlhonac domine la plaine depuis le XIIIe siècle. Réaménagé vers 1830, il nenglobe plus léglise mais offre un paysage attrayant depuis les rives de lAveyron.\r\nSi le château de La Bastide Capdenac a été détruit, évoqué aujourdhui par son « champ du donjon », son mur denceinte est encore visible grâce à une association locale.                                    Orlhonac forteresse corps de logis de plan rectangulaire à cinq niveaux  flanquées d'un chemin de ronde avec mâchicoulis, accolé d'une tourelle toit en poivrière et prolongés sur flan gauche  d'un bâtiment à deux niveaux et attiques  toiture en croupe ce dernier possède des échauguettes en angles et une tour  à toit pointu dans le prolongement.","habitants":"Famille de Raymond de Pierrefort\r\n        \"","divers":"Château de la Rouquette, d'Orlhonac et la maison forte de la bastide Nandel","gps":"","images":["../image/image_12/12_Rouquette_1.jpg","../image/image_12/12_Rouquette_2.jpg","../image/image_12/12_Rouquette_3.jpg","../image/image_12/12_Rouquette_4.jpg","../image/image_12/12_Rouquette_5.jpg","../image/image_12/12_Rouquette_6.jpg","../image/image_12/12_Rouquette_7.jpg","../image/image_12/12_Rouquette_8.jpg"]},"Consult_chateau_formulairec9f1-3":{"id":"Consult_chateau_formulairec9f1-3","dept":"12","canton":"Rieupeyroux","commune":"La Bastide L","nom":"Réquista","type":"Château","periode":"XIV-XVI","histoire":"A la Bastide l'Evêque deux châteaux, de Réquista des XVIe et XVIIe siècles, et de  Villelongue. Plus la maison forte de Lincou et la tour de Cayla\r\nREQUISTA, une première construction fut réalisée au milieu du XIVe siècle, à l'emplacement d'un ancien village racheté par Jean de Patras au début du XVIe siècle. Lédifice a été construit vers 1530 par les Patras, une famille de marchands de cuivre de Villefranche-de-Rouergue, qui possédait le tiers des Martinets du Lezert. En 1654, il passa par mariage aux Dadenne de Tizac, famille descendant qautres marchands de cuivre  qui possédaient une autre tiers des Martinets.\r\nLINCOU, transformé en  restaurant, propriété de Sébastien et Nathalie Costa de souche aveyronnaise,  La grande capacité d'accueil du château lui permettra de servir des banquets, des grands repas de famille, des repas d'affaires.                                VILLELONGUE,  ancien fief qui appartenait à la famille Adhémar de Monteil, puis à la famille de Raffin.","architecture":"Le Château de Réquista est un château bâti dans le hameau de Cabanes, à La Bastide-l'Évêque. Sa construction date du XVIe au XVIIe siècle. Le château de Requista est inscrit aux M.H. depuis 2007.   Lédifice, agrandi au XVIIe siècle, puis remanié au XIXe siècle, a été récemment restauré, cette construction toujours visible, comportait un élément du corps méridional limité par deux tours coiffées à la polonaise. En 1630, fut ajoutée l'autre partie du corps méridional et la tour d'angle sud-ouest. Dans la seconde moitié du XVIIe siècle, construction de l'aile en équerre, située dans le prolongement du bâtiment précédent et vers 1880, rajout d'une quatrième tour crénelée, démolie en 1958. Tour du Cayla : De longue date, le village du Cayla était un lieu habité : 15 à 20 familles vivaient au cur du village. Le château, dont il reste quelques ruines, assurait le guet en aval et en amont de la rivière. Une tour ronde encore visible se trouvait dans l'enceinte du château, qu'occupèrent les anglais durant la guerre de 100 ans. Il y avait même une église et selon la légende, la cloche aurait été jetée dans la rivière au moment des guerres anglaises.                                LINCOU, maison forte du XVIe siècle pas d'historiques du château.","habitants":"Famille de Patras\r\n        \r\n        \"","divers":"Château de Réquista, de Villelongue, de Lincou et la tour de Cayla à la Bastide L'Evêque","gps":"","images":["../image/image_12/12_Requista_1.jpg","../image/image_12/12_Requista_2.jpg","../image/image_12/12_Requista_3.jpg","../image/image_12/12_Requista_4.jpg","../image/image_12/12_Requista_5.jpg","../image/image_12/12_Requista_6.jpg","../image/image_12/12_Requista_7.jpg","../image/image_12/12_Requista_8.jpg","../image/image_12/12_Requista_9.jpg"]},"Consult_chateau_formulairedda0":{"id":"Consult_chateau_formulairedda0","dept":"12","canton":"Pont de Salars","commune":"Salles Curan","nom":"Salles_Curan","type":"Château","periode":"XIV","histoire":"Deeux châteaux à Salle-Curan celui de Lavezou dit des évêques et celui de Larguiès.                                                                           LAVEZOU, château des évêques va avoir plusieurs co-seigneurs à la suite de partages. En 1227, le fils du comte de Rodez Hugues II, Jean, donne à ses frères ses parts dans Salles-Curan. L'évêque de Rodez achète les parts possédées par les seigneurs de Séverac et du Lévézou. En 1237, l'évêque est devenu le seul seigneur de Salles-Curan. Le premier évêque de Rodez qui se dit seigneur de Salles-Curan est Vivian (1247-1274). L'évêque peut alors nommer bayle, juge et autres agents lui permettant d'administrer, assurer la sécurité du village et rendre la haute et moyenne justice. En 1429 se produit un affrontement entre deux évêques de Rodez. Le premier, Guillaume de La Tour d'Oliergues a été choisi par le pape Martin V le 16 mars 1429, le second, Pierre d'Estaing, a été élu par le chapitre de la cathédrale vers la fin de 1428. Ce conflit va durer jusqu'en 1432. Guillaume de La Tour a, pendant cette période, choisi de s'installer à Salles-Curan. Bien que confirmée par le pape, la nomination de Guillaume de La Tour à l'épiscopat de Rodez est restée contestée par une partie du chapitre. Celui-ci va alors faire de Salles-Curan un des sièges de son administration ce qui va entraîner le développement du village. En 1441, Guillaume de La Tour est de retour du concile de Bâle auquel il participait depuis 1433. Il décide de faire construire un château à Salles-Curan. Le contrat de construction est passé le 15 septembre 1442 avec le maître maçon de Saint-Beauzély Pierre Combettes. Il s'engage de bâtir un château à trois portes et trois tours avec fenêtres, portes et lucarnes.                                                         LARGUIES (voir article).","architecture":"Château des  évêques, demeure de l'édifice du XVe siècle à la fin de la guerre de Cent-Ans, le bourg apparaît entouré d'une enceinte continue faite de maisons fortes  des fossés l'entourent. Guillaume de la Tour adosse son château aux murailles de la ville. Trois tours le renforcent,  les mâchicoulis consolident ses murs,  l'escalier à vis, les salles voûtées et leur cheminée, la salle dite des gardes. Les armes de l'évêque de La Tour d'Oliergues, l'oeil de la garde, la herse et la porte, forment un ensemble classé parmi les monument historiques. Le château est désormais réhabilité en chambres d'hôtes de caractère,  de monsieur Bouviala.","habitants":"Evêque Guillaume de La Tour\r\n        \"","divers":"Patrimoine de Salles-Curan et château de Lavezou et celui de Larguiès","gps":"","images":["../image/image_12/12_Salles_Curan_1.jpg","../image/image_12/12_Salles_Curan_2.jpg","../image/image_12/12_Salles_Curan_3.jpg","../image/image_12/12_Salles_Curan_4.jpg","../image/image_12/12_Salles_Curan_5.jpg","../image/image_12/12_Salles_Curan_6.jpg"]},"Consult_chateau_formulairec656":{"id":"Consult_chateau_formulairec656","dept":"12","canton":"Salles la Source","commune":"Salles la Source","nom":"Salles_la_Source","type":"Château","periode":"XV-XVI","histoire":"Onze châteaux à salles la Source, le manoir de Fontcousergue du XVI-XVIIe siècle, de Billorgues  du XVIe siècle (voir article), de la Calmontie donjon du XVIIe siècle (voir article), le Colombier du XV-XVIe siècle (voir article),  la Courgousse du XVI et XVIIe siècle, de la Garde avec tours du XVIIe siècle , de la Tour du XIVe siècle, de l'Esclouzades du XVII-XVIIIe siècle, des Ondes avec  tour du XIIIe siècle, de Peyrinhac   du XV-XVIe siècle et de Vayssière du XIII-XVe siècle (voir article).                                                                                   La GARDE, les seigneurs se succèdent depuis le XIIe siècle. L'édifice actuel remonte sans doute au début du XVIIe siècle. Un fronton triangulaire surmonte le portail d'entrée. Le château possède des fenêtres à meneaux, une tour carrée à l'angle nord-est avec corbeaux, un escalier intérieur à rampe droite et une cheminée en pierre au premier étage.\r\nCOURGOUSSE, en 1316, Jean et Pierre Vigouroux, marchands de Rodez, deviennent propriétaires de lédifice qui se compose alors dune maison et dune tour. La propriété passe aux mains de la famille dEscarlhan. Par le mariage entre Isabeau dEscarlhan et François de Patris en 1587, Cougousse devint la propriété de la famille de Patris dans laquelle elle résida jusqu'au XXe siècle. Le château était aux \"Temps Modernes\" un bien noble et bénéficiait à ce titre de l'exemption de taille. Aussi, le cadastre de la commune de Salles-la-Source de 1564, n'apporte pas d'élément nouveau concernant le château mais révèle cependant l'environnement riche du lieu, le village de Cougousse abrite parmi ses propriétaires, au milieu du XVIe siècle, des personnalités intéressantes qui font du village le repère aux champs d'une petite élite ruthénoise. Sept propriétaires originaires de Rodez y sont recensés. Le bâtiment, les gîtes et les chambres d'hôtes ont  conservé leur caractère historique par la famille Yvette et Jean-Marc Pelletier,\r\n Pas d'information historique sur les châteaux de Fontcousergue, de la Garde, de la Tour, d'Esclouzades et des Ondes de peyrinhac.","architecture":"Calmontie, à Saint-Laurent, caractérisé par sa grande tour ancienne, accolée à un logis du XIIIe siècle. Dautre tours existaient et ont été détruites pendant la Révolution.                       Courgousse, est un exemple d'architecture de maison de vignes des XVIe et XVIIe siècles. La façade percée possède de belles fenêtres à meneaux. Lédifice aurait existé déjà au XIVe siècle sous le nom de Cogossa.  Ancien couvent de la fin du XVe début XVIe siècle, rénové en 1998 au milieu d'un parc de 2 ha, bordé d'un ruisseau.\r\n Ondes, situé à Salles le Haut, a réuni en 1315 les états généraux du Rouergue. On y a retrouvé en 2012 une inscription très ancienne de 1209, probablement, lune des plus anciennes du Rouergue. Il a gardé une tour ancienne avec mâchicoulis, la façade est de style Renaissance. Il est aujourdhui partagé entre deux propriétaires.","habitants":"Famille dEscarlhan\r\n        \"","divers":"Plusieurs châteaux à Salles la Source; la Garde , courgousse,la Calmontie, les Ondes","gps":"","images":["../image/image_12/12_Salles_la_Source_1.jpg","../image/image_12/12_Salles_la_Source_2.jpg","../image/image_12/12_Salles_la_Source_3.jpg","../image/image_12/12_Salles_la_Source_4.jpg","../image/image_12/12_Salles_la_Source_5.jpg","../image/image_12/12_Salles_la_Source_6.jpg","../image/image_12/12_Salles_la_Source_7.jpg","../image/image_12/12_Salles_la_Source_8.jpg","../image/image_12/12_Salles_la_Source_9.jpg"]},"Consult_chateau_formulairebe70":{"id":"Consult_chateau_formulairebe70","dept":"12","canton":"Villeneuve","commune":"Salvagnac-Cajarc","nom":"Salvagnac_Cajarc","type":"Forteresse","periode":"XV","histoire":"SALVAGNAC, architecture fortifiée médiévale, « Le château appartient aux familles de Balaguier de Saint-Géry du XVe siècle. Puis de La Prune-Montbrun.  Avec Jacques de Laurency, gentilhomme ordinaire de la chambre du Roi, conseiller du Roi en ses conseils d'état et privés, conseiller près de la reine mère, viguier de Figeac de 1608 à 1625, c'est une famille noble,  son fils unique, Jean Louis, époux de Marie Thérèze Fleuriot, lui succède et voit Montbrun érigé en marquisat par lettres patentes en Septembre 1681. Sans enfant, sa soeur Marie Eléonore mariée en 1662 à François de La Prune, d'une famille noble tarnaise, propriétaire depuis peu du château voisin de Salvagnac-Cajarc sera l'héritière.","architecture":"Salvagnac,  architecture fortifiée médiévale, se compose du château et de sa chapelle castrale devenue église paroissiale.  Plusieurs corps de logis enserrent une cour intérieure avec tours rondes et carrées. La tour la plus ancienne est le donjon carré, situé au centre de la façade Ouest. Au premier étage une pièce voûtée est ornée d'un décor floral peint. En arrière de la façade ouest s'élève un corps de bâtiment rectangulaire ouvert de fenêtres Renaissance, et dont l'accès se fait par une tour contenant une vis en pierre et donnant sur une galerie aux premier et deuxième étages. Escalier et galeries sont ornés de peintures. La tour carrée de la façade nord est accolée à l'église du village, ancienne chapelle castrale. Une galerie y donnait accès depuis la cour intérieure, l'ensemble est unifié par les consoles des mâchicoulis qui soutenaient un chemin de ronde autour du château. \r\n Eléments protégés: les façades et les toitures du château; tour ronde et son escalier; cour intérieure et murs qui la délimitent; salle voûtée et peinte du second étage.","habitants":"Famille de Balaguier\r\n        \"","divers":"Château fort de Salvagnac-Cajarc","gps":"","images":["../image/image_12/12_Salvagnac_Cajarc_1.jpg","../image/image_12/12_Salvagnac_Cajarc_2.jpg","../image/image_12/12_Salvagnac_Cajarc_3.jpg","../image/image_12/12_Salvagnac_Cajarc_4.jpg","../image/image_12/12_Salvagnac_Cajarc_5.jpg"]},"Consult_chateau_formulaire50c4":{"id":"Consult_chateau_formulaire50c4","dept":"12","canton":"Millau","commune":"Millau","nom":"Sambucy","type":"Château","periode":"XVII","histoire":"SAMBUCY, l'hôtel, dit château de Sambucy,  construit entre 1672 et 1674 pour Jacques Duschène,  la famille de Sambucy l'acquiert assez rapidement, par le mariage de la petite fille de Jacques Duschène avec Marc-Antoine de Sambucy, avocat au parlement de Toulouse.   Antoine de Sambucy, capitaine de cavalerie en 1696, chevalier de Saint-Louis.  Marc Antoine de Sambucy, avocat au parlement de Paris et nommé capitoul de la ville de Toulouse en 1745. Il se marie en 1720 avec Antoinette de Laverne, fille d'Edme de Laverne, comte de Gamache, et de demoiselle Duchesne. La branche de Luzençon, qui na jamais cessé depuis le XVe siècle dhabiter Saint-Georges, sest éteinte en 1895 dans Félix de Sambucy de Luzençon, comte palatin, mainteneur des jeux floraux, dont la fille unique Aurélie épousa Antoine du Bourg.","architecture":"Sambucy,  l'hôtel, dit château de Sambucy, élément majeur du patrimoine millavois, a été élevé à la demande du maître des eaux et forêts en Rouergue, Jacques Duschene. Il est alors bâti hors les murs, échappant aux ruelles étroites et encombrées de la ville. Commencé dans les années 1672, il est achevé vers 1679. C'est un hôtel entre cour et jardin, comprenant un corps de logis et deux ailes en retour. La création d'un jardin à la française équipé d'un bassin agrémenté d'un jet d'eau (récemment restaurés) fait immédiatement suite à l'achèvement des travaux, donnant un caractère remarquable à l'édifice. D'importants travaux sont alors réalisés dès 1787, et notamment l'adjonction du dôme sommital couvrant le corps de logis principal et ses décorations intérieures, d'inspiration italienne. Puis le XIXe siècle voit le château s'agrandir : les ailes latérales sont surélevées et une orangerie édifiée, en 1853, par l'architecte départemental Boissonnade, à qui l'on doit également la construction du Palais de Justice. Le jardin est remis au goût du jour et remodelé autour d'une grande pièce d'eau aux contours courbes.","habitants":"Famille de Sambucy \r\n        \"","divers":"Château de Sambucy","gps":"","images":["../image/image_12/12_Sambucy_1.jpg","../image/image_12/12_Sambucy_2.jpg","../image/image_12/12_Sambucy_3.jpg"]},"Consult_chateau_formulaire3f90":{"id":"Consult_chateau_formulaire3f90","dept":"12","canton":"Rieupeyroux","commune":"Sanvensa","nom":"Sanvensa","type":"Maison forte","periode":"XV","histoire":"SANVENSA, les dîmes de cette église primitive étaient inféodées au XIIe siècle par l'évêque de Rodez à Jean de Morlhon dont les descendants furent seigneurs de Sanvensa jusqu'à Charles III, marquis de Sanvensa et baron de de Castelmary, dont le mariage fut cassé pour impuissance en 1718. Son château fut pris en 1369 par un capitaine anglais, attaqué, repris et pillé l'année suivante par une expédition des habitants de Najac. Il fut reconstruit au XVIe siècle par Jean de Morlhon, sénéchal du Rouergue, mort assassiné en 1595 à Villefranche. Son donjon avait été rabaissé au niveau des  deux tours rondes. Le vieux village, dont la forme est ovoïde, s'est développé autour de la basse cour du château.","architecture":"le château de Sanvensa se compose d'un corps de logis flanqué de deux grosses tours rondes face à l'ouest. La couverture de la tour nord-ouest a été foudroyée en 1963. Au 1er étage de cette tour, une inscription mentionne la date de 1573. L'édifice comporte trois étages sur des caves voûtées, le donjon carré est le seul vestige du château antérieur. Sur la façade Est une grande porte d'entrée donne accès à un escalier du XVIe siècle. Le tracé des fossés a quasiment disparu. Au nord, une étroite terrasse construite vers 1905 longe la demeure.","habitants":"Evêque de Rodez\r\n        \"","divers":"Château féodal de Sanvensa","gps":"","images":["../image/image_12/12_Sanvensa_1.jpg","../image/image_12/12_Sanvensa_2.jpg","../image/image_12/12_Sanvensa_3.jpg","../image/image_12/12_Sanvensa_4.jpg","../image/image_12/12_Sanvensa_5.jpg"]},"Consult_chateau_formulaire2ba5-2":{"id":"Consult_chateau_formulaire2ba5-2","dept":"12","canton":"Sévérac le Château","commune":"Sévérac le Château","nom":"Sermeilhets","type":"Château","periode":"XIV","histoire":"SERMEILHETS, les Séverac en étaient les maîtres dans la seconde moitié du XIVe siècle,  cité en 16 février 1372, Guy VIII de Sévérac . La construction du château paraît remonter vers cette époque, fin du XIVe ou début du XVe siècle. Les Guirard jouissaient de la seigneurie de Sévérac au plus tard dans les premières années de XVIe siècle. Jean de Guirard, seigneur de Sermeilhets, épousa Marceline d'Hugonet, dame d'Engayresque, sa toute proche voisine. Echu dans un partage de famille à Mlle Marie Talon, le domaine fut légué par elle à ses neveux, messieurs Frédéric Talon, industriel, et Léon Talon, ancien sous-préfet. Ceux-ci cédèrent Sermeilhets par un acte en date du 1er août 1868, en échange avec des terres situées à La Rouvière, à monsieur Antoine Aigouy, propriétaire actuel, qui exploite lui-même cette propriété.","architecture":"Le château  de Sermeilhets ouvre ses deux ailes en équerre, élevées de deux étages, jointes à leur intersection par une tour ronde à quatre étages, renfermant un élégant escalier de pierre. Une fenêtre de la tour, celle  au-dessus de la porte, a conservé seule son encadrement et son meneau: au-dessous d'elle, la séparant de la porte un peu basse, la place béante de l'écusson seigneurial arraché aux jours de la Terreur, Les autres ouvertures ont vu briser leur unique meneau ou la croix qu'elles encadraient. L'étage supérieur n'était et n'est éclairé que par de petites ouvertures carrées. Les façades nord et ouest ont conservé tout leur caractère et leur aspect primitif: trois tours rondes en flanquent les angles; dans les hautes murailles quelques ouvertures, encore closes par les mêmes grilles de fer, donnant au nord sur une rue étroite bordée de bâtiments, dépendants et contemporains du château, réunis à celui-ci par des arcs-boutants voûtés, dont l'un constitue un passage entre les bâtiments bordant les deux côtés de la rue. De ce point le manoir frappe par son aspect rude et imposant, une sorte de sévérité monastique évoquant l'architecture religieuse et militaire des Templiers. La vaste cour sur laquelle ouvre actuellement la façade sud du château bordée de bâtiments ruraux neufs, n'a rien laissé subsister de l'antique basse cour qui devait certainement couvrir de ses communs fortifiés l'unique entrée du manoir; les besoins d'une importante exploitation agricole ont fait éclater la ceinture trop étroite qui avait pendant des siècles.","habitants":"Famille de Sévérac\r\n        \"","divers":"Château de Sermeilhets","gps":"","images":["../image/image_12/12_Sermeilhets_1.jpg","../image/image_12/12_Sermeilhets_2.jpg","../image/image_12/12_Sermeilhets_3.jpg","../image/image_12/12_Sermeilhets_4.jpg","../image/image_12/12_Sermeilhets_5.jpg"]},"Consult_chateau_formulaire82db":{"id":"Consult_chateau_formulaire82db","dept":"12","canton":"Salles la Source","commune":"Mouret","nom":"Servayrie","type":"Forteresse","periode":"XII-XIV","histoire":"SERVAYRIE,  en 1271 le comté du Rouergue est rattaché au domaine royal en 1290, Philippe le Bel abandonne ses droits sur Mouret au profit d'Eustache de Beaumarchais réunissant les droits entre les Jourdain  et les Sévérac,  Mouret  village fortifié avec divers seigneurs et châteaux,  château de la Mage seigneurs dominant, le château de Reilhac était à la famille de Sigald passera au  XVIe siècle aux Sanhac  de Talesques  et au XVIIIe siècle aux Cadieu, au nord  du plateau s'élevait Castelviel berceau de l'antique famille de Mouret entre  Reilhac et Casteviel deuxième  château de la Servayrie, En 1292 Bernard d'Entraygues premier seigneur, en 1405 Guillaume  d'Entraygues fils de Raymond fait hommage à Bernard  comte d'Armagnac et de Rodez et en 1522 Pierre d'Entraygues épouse Antoinette de Felzins fille de Jean seigneur de Montmurat et barons de Felzins. La Servayrie revient à leur fille laquelle épouse antoine de Résigade de Cabanes, leur fille unique épouse Jean de  Selves  sans enfant et veuve en 1649 fait donation à François  de la Roque-Senezergues seigneur de Mouret  auquel  succèdera la famille de Cadrieu propriétaire du château de Reilhac. A la Révolution les quatre châteaux du plateau sont vendus à un seul propriétaire monsieur Bonnet de Jalenques la plupart sont en ruines, la Servayrie le seul en état est acquis  en 1993 par monsieur Roger Fabry.","architecture":"Présence des quatre châteaux des co-seigneurs (Castel-Vieil, Servayrie, Tour de Reilhac , Mage), reliés entre eux par une ligne circulaire de murailles et de fossés.  Servayrie le seul encore debout, est composé d'un donjon du XIIe siècle, agrandi aux XVe et XVIe siècles à l'un de ses angles  une échauguette carrée reposant sur des corbeaux et à une autre extrémité un escalier à vis  dont la partie inférieure s'arrondit en tr
