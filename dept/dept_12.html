elieu et une autre incendiée durant la Révolution. Le donjon carré, en granit, possédait trois étages intérieurs desservis par un escalier en colimaçon. Un conduit pratiqué dans lépaisseur du mur denceinte servait de canal acoustique entre le chemin de ronde et les étages inférieurs. Au sommet sont toujours visibles deux créneaux et trois piles sur lesquelles sappuyait une toiture à quatre pans et des traces dun chemin de ronde extérieur sur mâchicoulis Le profil des corbeaux atteste la fin du XIVe siècle                                                           Bessière, style maison forte du XVe siècle à trois niveaux  accolée de deux tours rondes à toitures en poivrières.  La Guarigue Le château a brûlé deux fois au XIXe siècle et le 16 décembre 1989, ce qui explique son état actuel, corps de logis rectangulaire à un niveau, trois tours dont deux arasées.","habitants":"Famille de Sénergues                                                                              Famille de Pradines\r\n        \r\n        \"","divers":"Château de Sénergues avec tour, de Bessière de la Garrigue et de Montarnal","gps":"","images":["../image/image_12/12_Senergues_1.jpg","../image/image_12/12_Senergues_2.jpg","../image/image_12/12_Senergues_3.jpg","../image/image_12/12_Senergues_4.jpg","../image/image_12/12_Senergues_5.jpg","../image/image_12/12_Senergues_6.jpg","../image/image_12/12_Senergues_7.jpg","../image/image_12/12_Senergues_8.jpg","../image/image_12/12_Senergues_9.jpg"]},"Consult_chateau_formulaire1712-2":{"id":"Consult_chateau_formulaire1712-2","dept":"12","canton":"Séverac le  Château","commune":"Séverac le  Château","nom":"Séverac_Auberoques","type":"Maison forte","periode":"XV","histoire":"AUBEROQUES,  a été construit au XVe siècle à Séverac le château,  la maison de Jeanne,  la fontaine romane réaménagée vers 1412 par Amaury de Sévérac, dernier de la famille, maréchal de France était un des chefs darmées les plus éminents de son époque. Aujourd'hui   Gaec, en activité depuis 28 ans. Créée en juillet 1986 . Elle est actuellement dirigée par Patrick Rozières, Bertrand Martin, Jérôme Michel, Jean-Louis Rozières et Geneviève Augustine et Lucette Debru.","architecture":"Auberoques du XVe siècles corps de logis en équerre à trois niveaux et attiques flanqué d'un donjon à quatre niveaux toitures en croupes en ardoises.","habitants":"Famille de Séverac\r\n        \r\n        \"","divers":"Château d'Auberoques","gps":"","images":["../image/image_12/12_Severac_Auberoques_1.jpg","../image/image_12/12_Severac_Auberoques_2.jpg","../image/image_12/12_Severac_Auberoques_3.jpg"]},"Consult_chateau_formulaire335d":{"id":"Consult_chateau_formulaire335d","dept":"12","canton":"Séverac le Château","commune":"Séverac le Château","nom":"Séverac_chateau","type":"Vestiges","periode":"X-XII","histoire":"Quatre châteaux à Séverac le château dont celui de Séverac vestiges du XIIIe siècle, celui d'Auberoques du XVe siècles, de d'Engayresque du XVe siècle et de Sermeilhets ( voir article pour les trois).                                                                                      SEVERAC, au Xe siècle à la famille de Sévérac, Gui de Sévérac, seigneur, rend hommage à l'évêque de Mende, en 1244, pour les châteaux de Lévéjac, Dolan, ainsi que la forteresse des Roces. Il est armé chevalier, le 25 décembre 1244, par le comte Raymond VII de Toulouse. Son père, Déodat de Caylus se convertit et part même à la croisade en 1248. Toute sa vie Sévérac va lutter même contre lévêque de Rodez pour retrouver ses droits et augmenter le nombre de ses châteaux et fiefs. Motet de la Panouse, en mai 1259, lui vend tout ce qu'il possède au château de La Panouse et dans son mandement. En 1270, avant de partir à la croisade, Gui IV accorde des allègements et des franchises d'impôts importants aux habitants de Sévérac. La famille de Séverac qui s'éteint au XIIIe siècle mais relevé par les Caylus issus du mariage d'Irdoine de Sévérac avec Déodat de Caylus. Jean d'Armagnac  vaincu privé de ses biens le château est confié  aux Chabannes -Dammartin, en 1508 la baronnie  revient à la famille d'Arpajon, en 1634 Jean V d'Arpajon avant sa mort métamorphose Séverac  en fait une résidence digne de son nom. En  1689 François II de la Rochefoucault comte de Roucy et de Roye Françoise-Pauline leur petite fille femme de Louis Antoine de Gontaut duc de Biron sera la dernière à exercer ses droits sur Sévérac, elle sera guillotinée en 1793. En 1799 vendu comme bien national aux marquis de Las Cases en 1825, puis acheter par la commune en 1966 qui le restaure assisté par une association des amis du patrimoine du château.","architecture":"Séverac, forteresse en palais de style Renaissance  par un architecte italien qui réalisa aussi la mise au style Renaissance du palais royal de Prague, dont on peut encore voir la façade sud. La visite permet de découvrir les remparts, courtines, tours de guet, chapelle et cuisine. Au Xe siècle construction du château primitif par les Sévérac sur le sommet d'une butte à 800 mètres d'altitude,  le château est ruiné au nord et nord-est  subsiste des vestiges de la constructions primitive comprenant plusieurs tours découronnées, restes de courtines; reste d'une enceinte  flanquée d'une succession de tours rondes  percées d'archères  qui complète le dispositif défensif de la forteresse, en 1607 construction d'un nouveau corps de logis rectangulaire comptait à l'origine trois étages porésente un aspect majestueux avec sa façade de 85 mètres de long enceinte avec pont levis et corps de garde la cour d'honneur et construit deux pavillons en saillie  flanquent le corps central ainsi que la tour carrée de sept étages qui s'élèvent à l'angle ouest, au centre de la façade escalier monumental à double révolution menant au deuxième étages et galerie permettant de communiquer aux deux pavillons et en 1932 début des travaux de restauration. La cité médiévale, bâtie sur le versant sud-est de la butte , était jadis protégée par un rempart et quatre portes fortifiées dont deux subsistent encore, celle du Peyrou et celle du Latazou  Elle abrite de belles demeures avec tour-escalier, colombages et encorbellements. Parmi les bâtiments remarquables : la maison des Consuls, la maison de Jeanne, le Sestayral qui est un marché aux grains, la fontaine romane et l'église Saint-Sauveur.","habitants":"Famille d'Arpajon\r\n        \r\n        \"","divers":"vestiges du château de Séverac, château d'Engayresques","gps":"","images":["../image/image_12/12_Severac_Chateau_1.jpg","../image/image_12/12_Severac_Chateau_2.jpg","../image/image_12/12_Severac_Chateau_3.jpg","../image/image_12/12_Severac_Chateau_4.jpg","../image/image_12/12_Severac_Chateau_5.jpg","../image/image_12/12_Severac_Chateau_6.jpg","../image/image_12/12_Severac_Chateau_7.jpg","../image/image_12/12_Severac_Chateau_8.jpg","../image/image_12/12_Severac_Chateau_9.jpg"]},"Consult_chateau_formulairefc9a":{"id":"Consult_chateau_formulairefc9a","dept":"12","canton":"Séverac le château","commune":"Séverac le château","nom":"Séverac_Engayresque","type":"Château","periode":"XV","histoire":"ENGAYRESQUE, le premier  seigneur ayant habité la battisse fut Jean Hugeneau au XVe siècle. En 1870, l'ensemble du manoir a été surélevé. Ainsi, cette belle terre est restée dans la famille. Il fut la  propriété des familles Hugonet, puis de Guirard, des Vignolles.  Le château fut plus tard acheté par la famille Talon, industriel à Saint-Geniez d'Olt l'acquit en 1835 et le restaura de façon importante. Sa famille en est toujours propriétaire à ce jour. Depuis peu, une équipe tourne un film d'horreur consacré au château appelé \"La Maison du mauvais rêve\" car celui-ci est plutôt effrayant et cache de nombreux mystères.","architecture":"Le château d'Engayresque est situé dans le hameau de Novis à 7 km au sud de Séverac le Château. Il s'agit d'un petit château de trois étages, avec deux tours circulaires. Sa couverture est en ardoise pour les parties hautes en pente forte et en lauzes traditionnelles pour les communs. Son origine n'est pas connue, mais il pourrait être du XVe siècle période où il était rattaché au château de Séverac.  En 1870, l'ensemble du manoir a été surélevé.","habitants":"Jean Hugeneau\r\n        \"","divers":"Château d'Engayresque","gps":"","images":["../image/image_12/12_S%c3%a9verac_Engayresque_1.jpg","../image/image_12/12_S%c3%a9verac_Engayresque_2.jpg","../image/image_12/12_S%c3%a9verac_Engayresque_3.jpg","../image/image_12/12_S%c3%a9verac_Engayresque_4.jpg"]},"Consult_chateau_formulaire20fb":{"id":"Consult_chateau_formulaire20fb","dept":"12","canton":"Baraqueville","commune":"Centrés","nom":"Taurines","type":"Forteresse","periode":"XIII","histoire":"TAURINES,  du XIII-XIVe siècles, fin du XVe siècle propriété des Guitard qui deviennent seigneurs de Taurines. En juin 1574, le château qui était le fief des protestants est assiégé, pris et incendié par les catholiques. La seigneurie de Taurines passa en 1612 aux mains de la famille des Tubières-Grimoard qui entreprit dès 1616 des travaux de restauration du château avec la mise en place de nouveaux mâchicoulis et d'un parapet. \r\n De la fin du XVIIe à la Révolution, affermage du château et de la seigneurie de Taurines. En 1718, nouvelle restauration du château par Anne-Claude-Philippe de Tubières-Grimoard. La famille ne résidait plus à Taurines. En 1765,  le château est légué à Achille-Robert, marquis de Lignerac, ce dernier vend en  juillet 1770 le château et la seigneurie à Joseph-François-Régis de Séguret, président du Présidial de Rodez.\r\nLa moitié du monument est démolie en 1830 , les pierres sont utilisées pour la construction de léglise de Taurines. Le château a appartenu  de 1852 à 1981  à plusieurs familles, dont une artiste lyrique américaine, entre les deux guerres. En 1981, la commune de Centrès l'achète, pour une association de sauvegarde.","architecture":"Château fort de Taurines au XIIIe siècle, puis remanié au XVe siècle. En 1621, de nouveaux travaux concernèrent deux tours et leurs mâchicoulis. Par la suite les seigneurs de Taurines qui évoluaient parmi les plus hautes strates de la société délaissèrent le château. le château avait une vocation défensive, tours cylindriques à chacun des angles, enceinte, fossés (les derniers furent comblés au milieu du XXe siècle), pont-levis, mâchicoulis, créneaux et meurtrières protégeaient ce bâtiment qui servait dhabitation et de refuge.  Ce fut le début d'un lent abandon qui s'accéléra avec la ruine partielle et les pillages des XIXe et XXe siècles. Saignée aux quatre vents, dépouillée de sa porte, exportée outre Atlantique par lune de ses propriétaires, bâtisse imposante, l'architecture actuelle du château de Taurines témoigne des divers remaniements dont ce bâtiment a fait l'objet.  C'est un édifice a base carrée avec quatre tours, fossés et pont levis. L'escalier en vis date de cette époque.  Au XVIe siècle, l'édifice est transformé en résidence Renaissance, ruines et étable, place forte de lart contemporain. En 1830, la moitié du château est démolie et ses pierres sont utilisées pour bâtir l'église de Taurines.","habitants":"Famille des Tubières-Grimoard \r\n        \"","divers":"Château de Taurines","gps":"","images":["../image/image_12/12_Taurines_1.jpg","../image/image_12/12_Taurines_2.jpg","../image/image_12/12_Taurines_3.jpg","../image/image_12/12_Taurines_4.jpg","../image/image_12/12_Taurines_5.jpg","../image/image_12/12_Taurines_6.jpg"]},"Consult_chateau_formulairec996":{"id":"Consult_chateau_formulairec996","dept":"12","canton":"Mur en barrez","commune":"Taussac","nom":"Taussac","type":"Maison forte","periode":"XV","histoire":"TAUSSAC, au Moyen-Age, la juridiction de Taussac était partagée entre le doyen de Rieupeyroux, patron de l'église, et le comte de Rodez (accord en 1295). Un fort existait en ce lieu au XIIIe siècle. C'est à l'origine du château qui relevait des vicomtes de Carlat. Jean de Séguy, seigneur de Taussac, y résidait à la fin du XVIIe siècle. La bâtisse actuelle, en cours de rénovation, comporte des éléments datés de 1731 (belles pierres à l'entrée de l'étable) et de 1780.\r\nCuernegre : château de Michel de Laparra (qui y fit son testament le 9 mars 1601, après avoir reçu quatre coups d'épée su sieur Jean Chaumel).","architecture":"Taussac, la bâtisse actuelle, en cours de rénovation, comporte des éléments datés de 1731 (belles pierres à l'entrée de l'étable) et de 1780.La belle demeure du XVIIIe siècle, le château de Taussac vient d'ouvrir ses portes pour notre plus grand bonheur. Au départ, un esprit libre, Mr Cezac, épaulé par son épouse, découvre un patrimoine oublié de tous. À force d'énergie, de patience, de travail et de beaucoup de passion, renaît un bel endroit, un lieu vénérable. Non seulement le patrimoine est sauvé mais il est installé dans un écrin verdoyant à plusieurs visages, plusieurs surprises et découvertes. La roseraie du XVIIIe et sa cour d'amour, le jardin romantique inspiré par l'orientalisme.","habitants":"Famille de Jean de Séguy\r\n        \"","divers":"Château de Taussac et de Cuernegre","gps":"","images":["../image/image_12/12_Taussac_1.jpg","../image/image_12/12_Taussac_2.jpg","../image/image_12/12_Taussac_3.jpg","../image/image_12/12_Taussac_4.jpg"]},"Consult_chateau_formulaireb82a-2":{"id":"Consult_chateau_formulaireb82a-2","dept":"12","canton":"Laguiole","commune":"Saint-Symphorien de Thénières","nom":"Thénières","type":"Vestiges","periode":"XII","histoire":"THENIERE, mis à part  Rodez,  il était le centre dune des plus grandes et des plus anciennes baronnies du Rouergue. Le seigneur le plus important était le baron de Thénière  de Séverac-Bédène, Le quié, Ste Geneviève, Gabriac et lAlbaret étaient sous sa dépendance. Les barons de Thénière ont dominé et commandé toute la région. Au début du XII siècle le château appartenait à la famille de Beaumont.  Entre 1210 et 1236, cette terre passa à la maison dAurillac. Elle passa ensuite entre les main des dUnfé baron dAurillac : leur successeurs furent les Sermur, vers 1500. Les Fontanges furent ensuite les propriétaires. Jean de Soulages devint baron de Thénière en 1666.  De 1695 à la Révolution, le château resta dans les mains de la famille de Roure. Dautre historiens donnent pour cette période la Garde Chambonas, Baron de Thénière. Il semble en fait que la seigneurie soit passée avant 1767, ou vers cette date, aux Beauvoir de Grimond. Quoi quil en soit, à la Révolution, le château appartenait à Victor Scipion Louis Joseph de Lagarde, marquis de Chambonas, ancien ministre des affaires étrangères, qui émigra.","architecture":"Le château est situé à 3km au Nord Est de St-Symphorien, entre Valcaylès et Graissac, à la limite du canton de St-Amans des côts et à lextrémité dun promontoire granitique qui coupe en deux le plateau de la Viadène à 933 m daltitude.  Le château a du être abandonné au XVIII siècle puisquil fut pillé en 1772. A cette occasion le jugement prévotal mentionne la porte de la basse-cour, celle du château et du grenier de celui-ci. Le plan au sol de Léon Desiny est une reconstruction hypothétique où le vrai se mêle avec le faux, ce qui est exact c'est le donjon circulaire dans lenceinte du château, la seule partie aujourdhui rénovée, un des rares du Rouergue et du nord Aveyron isolé dans lenceinte du château et non en position tangentielle, le corps de logis rectangulaire actuellement ruiné devait être comme sur le plan. Côté cour, il ny avait quune tourelle descalier. Desiny en a certainement dessiné deux par soucis cartésien de symétrie.","habitants":"Famille de Beaumont\r\n        \r\n        \r\n        \"","divers":"Vestiges du château fort de Thénières","gps":"","images":["../image/image_12/12_Thenieres_1.jpg","../image/image_12/12_Thenieres_2.jpg","../image/image_12/12_Thenieres_3.jpg"]},"Consult_chateau_formulaire3090":{"id":"Consult_chateau_formulaire3090","dept":"12","canton":"Villeneuve","commune":"Villeneuve d","nom":"Toulongergues","type":"Maison forte","periode":"XV","histoire":"TOULONGERGUES, faisait partie des domaines des seigneurs de Morlhon, propriétaire de toute la contrée. Ils étaient  les descendants des \"Maires du Palais\", institués en dynastie héréditaire. En 1051 le seigneur en titre, Odil de Morlhon et son épouse Cécile viennent prier dans léglise de Toulongergues avant de partir en pèlerinage à Jérusalem.  En 1281 le prieuré de Toulongergues dépendait de l'évêque de Rodez, à la suite d'un litige entre l'évêque Raymond de Calmont et labbé de Moissac, dont dépendait le prieuré voisin de Villeneuve ; Toulongergues fut rattaché à ce dernier et, par conséquent, devint une possession de la grande abbaye moissagaise. À la fin du Moyen-Age, le premier prieur de Villeneuve se fixa à Toulongergues, puis le lieu de sa sépulture, fut dans la deuxième moitié du XVe siècle, noble Pons de Cardaillac. Il était prieur mage de l'église cathédrale de Saint-Pons-de-Thomières et prieur de Villeneuve. C'est lui qui fit construire le manoir sur les bases d'une maison prieurale du XIIIe siècle. Au XIXe siècle divisés en trois propriétés ce qui accéléra sa dégradation en 1995. Monsieur Poujade acquiert l'ensemble des parties  constituant le prieuré.","architecture":"Le château du XVe siècle relié autrefois par un passage en hauteur à la paisible église qui lui fait face, dresse ses hautes murailles percées de rares ouvertures, sévère bâtisse à l'aspect de forteresse, dont tous les angles ont été parfaitement arrondis. Le caractère militaire donné ici à cet édifice religieux ne saurait surprendre, car il allait constituer pendant plus d'un siècle,  le fief dévolu aux cadets d'un même et puissant lignage chevaleresque. Pons de Cardaillac était noble et militaire, les armes laïques qu'il fit sculpter à l'entrée du château au-dessus de la porte percée dans la grosse tour où s'enroule l'escalier à vis, en atteste. Les Cardaillac, seigneurs de Varayre, formaient le rameau rouergat d'une maison des plus anciennes et des plus considérables de Guyenne.\r\nEn ruine à la fin du XXe siècle, le château de Toulongergues est aujourd'hui restauré. Ils forment avec l'église, propriété de la commune un ensemble harmonieux, architecture rare et exceptionnelle.\r\nLe château autrefois relié à l'église pré-romane par une passerelle en hauteur, est une maison forte percée de rares ouvertures à l'aspect de forteresse dont tous les angles sont arrondis. \r\nA noter que le manoir était en ruine dans les années 1990  toitures effondrées et qu'il vient d'être entièrement restauré après 20 ans de travaux!","habitants":"Famille d'Odil de Morlhon\r\n        \"","divers":"Château féodal de Toulongergues","gps":"","images":["../image/image_12/12_Toulongergues_1.jpg","../image/image_12/12_Toulongergues_2.jpg","../image/image_12/12_Toulongergues_3.jpg","../image/image_12/12_Toulongergues_4.jpg","../image/image_12/12_Toulongergues_5.jpg"]},"Consult_chateau_formulaireb815":{"id":"Consult_chateau_formulaireb815","dept":"12","canton":"Villeneuve","commune":"Toulonjac","nom":"Toulonjac","type":"Château","periode":"XV","histoire":"TOULONJAC, les origines du château de Toulonjac remontent au XVe siècle,  Le poète Charles de Pomairols y passa son enfance.  Géraud de Rouget, fils de Jean de Rouget, 1er du nom, et de Yolande de Molières, religieux du monastère de Saint-Sauveur de Figeac en 1421, était prieur de Toulonjac et de Mayrinhagues Les armoiries qui figurent à la clef de voûte de lauvent étant celle de Valette-Toulonjac, il peut en découler que la construction du clocher a été réalisée après 1500.  À la fin du XIXe siècle, monsieur Vincent Cibiel, député de Villefranche et généreux mécène, a financé la restauration de léglise et permis de mettre en valeur les belles nervures des arceaux de la voûte. Antoine de la Valette, qui avait épousé en 1487, Bertrande de la Valette, fille unique de Pierre de la Valette, seigneur des Oliviers et co-seigneur de Ginouillac, fit son testament en 1517 et un codicille en 1518, fonda une chapellenie dans l'église de Toulonjac où il fut enterré. Les deux mariés sont arrière petits cousins et les deux gerfauts pourraient marquer l'alliance des deux familles.","architecture":"Château du XVe siècle édifice reconstruit en 1421 et fortifié en 1442 puis fortement modifié aux XVIIe et XIXe siècle. La cuisine possède une cheminée du XVe siècle. La partie Est a été rajoutée au XIXe siècle. Un décor de papiers peints ayant pour thème l'histoire de Don Quichotte est daté des années 1840. Le château présente un plan rectangulaire allongé adossé à la tour rectangulaire abritant l'escalier à vis. Donjon quadrangulaire aux angles arrondis, à l'ouest, relié à la tour par une construction intermédiaire où se trouve, au 1er étage, le décor de papiers peints. Cuisine avec cheminée monumentale et four, l'escalier à vis, ainsi que le salon du premier étage et ses papiers peints de 1840.","habitants":"Charles de Pomairols\r\n        \"","divers":"Château de Toulonjac","gps":"","images":["../image/image_12/12_Toulonjac_1.jpg","../image/image_12/12_Toulonjac_2.jpg","../image/image_12/12_Toulonjac_3.jpg","../image/image_12/12_Toulonjac_4.jpg","../image/image_12/12_Toulonjac_5.jpg"]},"Consult_chateau_formulaire0fa5-2":{"id":"Consult_chateau_formulaire0fa5-2","dept":"12","canton":"Saint-Affrique","commune":"Tournemire","nom":"Tournemire","type":"Château","periode":"XIII","histoire":"TOURNEMIRE, au XIIIe siècle il existait un château construit sur l'emplacement de l'édifice actuel, reconstruit par la famille de Jourdain de Creysseils et au XVe siècle agrandi   par les de Montcalm originaire du Rouergue, Louis Joseph marquis de Montcalm  général Français chargé de défendre la nouvelle France mortellemet blessé dans la bataille décède le lendemain de la capitulation, cette famille des de  Montcalm  conserveront le château jusqu'en 1800 vendu à monsieur de Nougayrolles, il  en fit don ainsi que  ses dépendances  en septembre 1823 aux  religieuses  de Notre-Dame . Transformé en couvent. A compté parmi ses élèves Emma Calvé, célèbre chanteuse d'opéra. Vers 1930, le château de Tournemire subit des agrandissements avec ses nouveaux propriétaires, la famille Montcalm. Pendant la guerre de 1914-1918 la demeure servit d'hôpital.","architecture":"Tournemire château du XIIIe siècle; corps de logis rectangulaire à trois niveaux et lucarnes avec pinacles plus clocher au centre de la toiture en croupe flanqué  d'un pavillon d'entré à deux niveaux et sur les flans du corps de logis de deux ailes à trois niveaux.","habitants":"Famille de Montcalm\r\n        \"","divers":"Château de Tournemire","gps":"","images":["../image/image_12/12_Tournemire_1.jpg","../image/image_12/12_Tournemire_2.jpg","../image/image_12/12_Tournemire_3.jpg","../image/image_12/12_Tournemire_4.jpg"]},"Consult_chateau_formulaire8287":{"id":"Consult_chateau_formulaire8287","dept":"12","canton":"Sévérac le Château","commune":"Peyreleau","nom":"Triadou","type":"Château","periode":"XV","histoire":"TRIADOU, cette demeure fut construite à partir de 1470 et habitée dès 1479 par Pierre II d'Albignac, seigneur de Triadou, et son épouse Flore de Capluc. En 1510, Guillaume de Capluc décède et l'ensemble de ses terres reviennent à la famille d'Albignac. Son fils, Louis de Capluc ayant en effet choisi d'entrer dans les ordres en devenant curé d'Auzits, c'est Flore de Capluc qui hérite des biens et donc par le jeu des alliances, Pierre d'Albignac, son époux. Pierre d'Albignac décèdera le 4 avril 1517.  En 1559, Pierre III d'Albignac (1529-1596), petit-fils du précédent, avait pour projet d'agrandir la résidence familiale.   À l'occasion du passage entre Meyrueis et Millau des troupes protestantes menées par le capitaine Arnaud de Méjanès, Pierre d'Albignac reçut l'ordre de leur couper le passage. Il mena donc une attaque au niveau du Mont-Fraysse dans le but personnel de s'emparer du trésor de guerre transporté. François Ier d'Albignac (1600-1696), fils de Simon d'Albignac, profita également de cette période de prospérité pour apporter des modifications à la résidence familiale avec la construction en 1669 des communs, de la chapelle octogonale dédiée à la Vierge ainsi que de la tour carrée attenante au château. Cet important apport financier permit en 1607 à Simon d'Albignac (1560-1644), fils de Pierre III d'Albignac, d'étendre le domaine familial, les terres et les titres de Capluc et de Veyreau à Jean de Tubières-Grimoard, autre descendant par son épouse de la famille de Capluc. Avec cette acquisition, Peyreleau devint le siège d'un important domaine. Le dernier seigneur d'Albignac à occuper les lieux s'exilera vers l'Angleterre via Dieppe le 28 novembre 1792. Évêque d'Angoulême en 1784 puis député du clergé lors des états généraux du 5 mai 1789, Philippe-François d'Albignac de Castelnau était un farouche opposant à la constitution civile du clergé faisant de lui un réfractaire parmi d'autres.  Emile Maruéjouls, ministre radical qui fut député et ministre de la IIIe République, propriétaire du Triadou. Annexé par la commune, le château servit un temps de mairie au village de Peyreleau jusqu'à la construction d'un nouveau bâtiment en 1893.","architecture":"Château féodal, corps de logis rectangulaire à trois niveaux avec une aile en équerre sur l'arrière  à  trois niveaux et un pavillon plein cintre côté entrée à quatre niveaux décalés en rapport du corps de logis toit à un pan. A l'arrière donjon carré à mâchicoulis avec chemin de ronde pris dans la charpente de tuiles, l'ensemble toit à fronton en tuiles. Beau parc à la Française avec petite tour polygonale sur angle. Classé monument historique le 12 mai 1944, il est maintenant partagé entre plusieurs propriétaires.","habitants":"Famille de Pierre II d'Albignac\r\n        \"","divers":"Château féodal de Triadou","gps":"","images":["../image/image_12/12_Triadou_1.jpg","../image/image_12/12_Triadou_2.jpg","../image/image_12/12_Triadou_3.jpg","../image/image_12/12_Triadou_4.jpg","../image/image_12/12_Triadou_5.jpg"]},"Consult_chateau_formulaire4bb0":{"id":"Consult_chateau_formulaire4bb0","dept":"12","canton":"Rodez","commune":"Onet le Château","nom":"Vabre","type":"Château","periode":"XVIII","histoire":"VABRE, seigneurie connue depuis le milieu du XVe siècle, Vabre était alors détenue par la famille de Cardaillac, une des plus anciennes maisons de France, originaire du Quercy. Elle passe ensuite dans le giron de la noblesse locale.  La construction de ce château est attribuée à la famille de Balsa puis celle de Guirbaldi famille de notaires de Salles-Comtaux. Au début du XVIIe siècle, le château aurait appartenu à la famille de Balsa.  En 1704, il appartiendra à la famille Guirbaldi, puis vers le milieu du XVIIIe siècle, il sera aliéné à la famille Tustet. Au début du XIXe siècle, les de Coignac en firent l'acquisition, jusqu'à ce que Mme veuve de Coignac le vende à M. Campergue, agent de change qui le revendit à Mme de Séguret-Saincric. Celle-ci fit restaurer le château et clôtura le parc avec un portail et une grille en fer forgé. En 1910, Mme de Séguret-Saincric légua la propriété à la ville de Rodez qui en est toujours propriétaire. Afin de respecter les dernières volontés de la donatrice, la ville de Rodez transforma le château en orphelinat, en 1959, on ne dénombrait plus qu'un seul pensionnaire.","architecture":"Vabre,  la construction de ce château est attribuée à la famille de Balsa puis celle de Guirbaldi,   construit au XVIIIe siècle,  de plan allongé, flanqué de pavillons en avant-corps,  l'édifice, de type manoir, se compose d'un vaste corps de logis, entre deux pavillons débordant légèrement. L'ensemble de type méridional est coiffé d'une toiture à la Mansard, illuminée par de grandes lucarnes, grille en fer forgé. L'édifice est séparé du parc par une grille armoirié qui ne date que de la seconde moitié du XIXe siècle. Le vaste parc est clos d'un côté par des grilles, tandis qu'une haute muraille, flanquée à l'angle sud-ouest d'une tour-pigeonnier,  les autres côtés sont clos.","habitants":"Famille de Guirbaldi\r\n        \"","divers":"Château de Vabre","gps":"","images":["../image/image_12/12_Vabre_1.jpg"]},"Consult_chateau_formulaire5a28":{"id":"Consult_chateau_formulaire5a28","dept":"12","canton":"Sallas la Source","commune":"Valady","nom":"Valady","type":"Château","periode":"XV-XVII","histoire":"VALADY,  en 1552, Valady comptait plusieurs seigneuries. Le fief de Valady acquis avec le mariage en 1604 d'Antoine d'Izarn de Freyssinet, fils de Vital et de Jeanne de Thézan, avec Anne de Pestels de Caylus, fille de Jean-Claude de Pestels, seigneur de Branzac, et de Jeanne de Lévis-Quélus. Ils ont construit le château. Jacques d'Izarn de Freissinet de Valady, dernier marquis de Freissinet, en 1766. En 1793, Périgueux, fils de Louis-Joseph et de Marie-Anne de Montjézieu, marié contre le consentement de son père en 1783 à Paris avec Charlotte Rigaud de Vaudreuil, admis aux honneurs de la Cour en 1787, député de l'Aveyron à la convention nationale en 1792, siège parmi les girondins, condamné à mort et exécuté en 1794 par le tribunal criminel de la Dordogne\r\nHenry d'Yzarn de Freissinet de Valady, dit Henry de Valady (1814, Rodez - 1897, Golinhac, château de La Vernhette, représentant (1871-1876) puis député de l'Aveyron (1871-1877), conseiller général, historien du Rouergue. Sous Louis XIV, la seigneurie de la famille de Valady sétendait jusquau territoire de Salles et de Marcillac.  Les deux châteaux de Frayssinet et de Valady ont été dans les mains de cette famille jusqu'au XVIIIe siècle, les trois hameaux de Valady, de Cropières et de Laguépie se sont réunis en 1784 par le mariage de Marie-Jeanne d'Izarn de Frayssinet, héritière de Cropières, avec Claude Alexande Izarn de Frayssinet, baron de Laguépie.","architecture":"Valady, limplantation des hommes dans le val dAdy sest faite au Moyen-Age. A cette époque le village de Valady est entouré dune enceinte délimitée par le fort, le château Thémines et la porte dentrée encore existante. Lextension du village hors des remparts sest faite en fonction de la localisation des sources, fort nombreuses. Le bourg de Valady possède trois édifices majeurs : le manoir, léglise et la mairie. Le manoir, ancien château de Cardaillac est quelque peu inachevé. En effet, la transformation douvrage de défense en habitation fut interrompue en 1772 à la mort de la marquise Marguerite de Valady. De ce fait, la bâtisse fut longtemps désignée par les habitants comme un casthelas, nom péjoratif signifiant  château sans grâce. A partir de 1964, une association entama sa restauration,  le Club du Vieux Manoir , avec le soutien des différentes municipalités, et ce jusquen 1999. Aujourdhui, cet édifice communal sert de salle danimation. Corps de logis en forme de U à deux niveaux accolée sur flan d'une tour ronde toit en poivrière et à l'opposé une tour carrée toit  en coupole.","habitants":"famille de Valady\r\n        \"","divers":"Château de Valady","gps":"","images":["../image/image_12/12_Valady_1.jpg","../image/image_12/12_Valady_2.jpg","../image/image_12/12_Valady_3.jpg","../image/image_12/12_Valady_4.jpg","../image/image_12/12_Valady_5.jpg"]},"Consult_chateau_formulaire6fe4":{"id":"Consult_chateau_formulaire6fe4","dept":"12","canton":"Salle la Source","commune":"Salle la Source","nom":"Vayssière","type":"Donjon","periode":"XIII","histoire":"VAYSSIERE, le château de La Vayssière fait partie des mas dépendants des terres de la commanderie des Templiers de Cras ; il prend ensuite le nom des Gironde qui l'occupent au 14e siècle, une famille de riches marchands cadurciens anoblis en 1339 par Philippe VI. Au siècle suivant, la seigneurie est passée aux d'Auriole : Antoine d'Auriolle se réserve les environs de la borie de La Vayssière, en 1450, en se réservant le droit d'occuper la Borie en cas d'épidémie à Cahors: le logis est-il encore habitable à cette époque, le château est dit en mauvais état en 1504, lorsque Jean d'Auriole, évêque de Montauban, dénombre pour le château de Gironde qu'il tient du commandeur du Bastit et de Cras, avec toutes justices. En 1508, Aymar d'Auriole, seigneur de Roussillon, lègue Gironde à sa femme ; Antoine de Reganhac est maître des lieux en 1577, et la suzeraineté passe par alliance des d'Auriole aux Gontaud de Cabrerets qui la conserve jusqu'à la Révolution.","architecture":"Vayssière, construit vraisemblablement aux XIIIe et XIVe siècles, et restauré au XXe siècle, est situé sur la commune de Salles-la-Source en Aveyron, région Midi-Pyrénées, au hameau de la Vayssière et à deux kilomètres du célèbre tindoul de la Vayssière, gouffre dans les bois, lun des plus grand puits naturel du Causse.   Les vestiges conservés peuvent être datés du XIIIe siècle d'après la forme de la fenêtre géminée.\r\nLes deux corps de bâtiments construits à l'arrière sont modernes, du XVIIIe siècle ou peut-être de la première moitié du XIXe siècle, l'un d'entre eux porte l'inscription  de 1830.","habitants":"Famille d' Aymar d'Auriole\r\n        \r\n        \"","divers":"Forteresse de Vayssière","gps":"","images":["../image/image_12/12_Vayssiere_1.jpg","../image/image_12/12_Vayssiere_2.jpg","../image/image_12/12_Vayssiere_3.jpg","../image/image_12/12_Vayssiere_4.jpg","../image/image_12/12_Vayssiere_5.jpg","../image/image_12/12_Vayssiere_6.jpg"]},"Consult_chateau_formulaireeb56":{"id":"Consult_chateau_formulaireeb56","dept":"12","canton":"Laguiole","commune":"Mur en Barrez","nom":"Venzac","type":"Château","periode":"XVI","histoire":"VENZAC.  en 1491, Barthélémy Jacques du Mur-de Barrez. En 1514 Jean de Sedaiges, fils d'Hugues, seigneur de Vacheresses, à Marmanhac Auguste Gaches, sieur de Venzac, se marie à Jeanne de Laroche dont il a un fils: En 1589, Guillaume Gaches, docteur en droits, notaire à Mur, son héritier Claude de Gaches de Venzac, Guillaume Gaches, sieur de Venzac, conseiller au présidial d'Aurillac, épouse Madeleine de Greil de la Volpilhère, fille d'Antoine et de Marguerite de Garceval qui lui donne six enfants Louis de Gaches de Venzac, sieur de la Gacherie, de Vezil, de Belmon, conseiller du roi au siège d'Aurillac Jean Guillaume de Gaches de Venzac (1697-1766), seigneur de Venzac, marié à Charlotte Viale (1706-1736) qui lui donne aussi deux filles et deux fils: Louis-Balthazar de Gaches (1731-1782), sieur de Neuville, lieutenant aux grenadiers de France, marié le 19 janvier 1761 avec Jeanne-Crispine de Verdier (1736-1790), Pierre de Gaches de Venzac (1769-1825), reçu à l'école militaire en 1784 en même temps que Bonaparte, sert à la guerre d'Amérique jusqu'en 1792, puis devient receveur de l'Enregistrement à Chaudes-Aigues. Il a plusieurs enfants, dont  Louis de Gaches de Venzac (1813-1882), receveur de l'enregistrement après lui, marié le 11 octobre 1856 à Saint-Simon avec Eudoxie Colinet de Labeau (1832-1914), fille de Jean-Antoine Colinet (1803-1854), propriétaire de Labeau. Aujourd'hui hôtel.","architecture":"Venzac, château  édifié à la fin du XVIe siècle, la structure d'un mas médiéval. Les temps troublés (guerres de Religion) apparaissent dans une architecture faite de tours rectangulaires et de bouches à feu. Par la suite, ajout au nord d'un escalier à volées droites dont la paroi centrale s'orne de pilastres avec chapiteaux ioniques, sans doute à la place d'une tour ronde. Les communs (bâtiments horizontaux avec une tour ronde) et la chapelle sont typiques du Carladez.","habitants":"Famille de  Guillaume Gaches de Venzac\r\n        \"","divers":"Château de Venzac","gps":"","images":["../image/image_12/12_Venzac_1.jpg","../image/image_12/12_Venzac_2.jpg","../image/image_12/12_Venzac_3.jpg","../image/image_12/12_Venzac_4.jpg"]},"Consult_chateau_formulaire1941-2":{"id":"Consult_chateau_formulaire1941-2","dept":"12","canton":"Espalion","commune":"Golinhac","nom":"Vernhettes","type":"Château","periode":"XIV","histoire":"GOLINHAC,  appartient à M. de Chefdebien, propriétaire du château des Vergnettes, descendant des seigneurs de Golinhac. En 1328  noble de Garin, damoiseau, procureur fondé de Guillaume de Balaguier, damoiseau, seigneur de Vabres et de Golinhac, fils et héritier de feu Bertrand de Balaguier seigneur des mêmes lieux, demandait une requête qui fut présentée le 3 avril 1328 devant le sénéchal de Rouergue à Villefranche, pour établir que ledit Guillaume de Balaguier avait servi dans la guerre de Flandres et quil était réellement seigneur de Vabres et de Golinhac.  Raymond-Pierre de Combret, baron de Broquiès, seigneur de Golinhac, qui épousa Hélène de Clermont vers 1374.\r\nPierre II de Combret, baron de Broquiès, seigneur de Golinhac, qui épousa le 13 juillet 1426 Flours de Cenaret,  Guion II de Combret, seigneur de Golinhac qui neut que des filles, marquise de Combret, mariée avec Antoine de Thézan, seigneur de Poujols, déjà allié en 1305 avec les de Combret, apporta la seigneurie de Golinhac dans la famille de Thézan.  En 1576, Antoine de Gineste, était coseigneur de Golinhac, Antoine II, fils aîné de Vital dYzarn de Frayssinet ayant épousé en seconde noce le 2 octobre 1604 Anne de Pesteils, En 1630, Pierre de Lapanouse, était coseigneur de Golinhac. Jean-Claude fils ainé dAntoine, seigneur de Golinhac, Frayssinet, Servières, Gaillac, épousa le 6 avril 1633 Jeanne de Corneilhan, nièce de lévêque de Rodez. En 1643, il était capitaine de chevaux-légers, en 1667 Jean-Claude de Frayssinet, de Servières, seigneur de Golinhac. En 1631, François de Bancalis, coseigneur de Golinhac, vend sa part à Olivier dYzarn de Frayssinet de Valady, coseigneur, qui devient seigneur de Golinhac à part entière, et propriétaire du château des Vernhettes. Ces biens resteront dans cette famille.","architecture":"Golinhac un château existait à Golinhac au XIVe siècle,  sil a été nécessaire à la fin du XIVe siècle de construire des fortifications, il est peu vraisemblable quun château existait, tout au plus sagissait-il dune maison fortifiée destinée à abriter le seigneur mais qui navait probablement rien à voir avec les châteaux- forts, à labri desquels hommes et bêtes trouvaient refuge. Plan en équerre deux corps de logis à deux étages toitures en croupes  et lucarnes reliés  au centre d'un pavillon à trois niveaux  et d'un autre pavillon décalé carré à l'extrémité droite à quatre niveaux, à l'opposé un pavillon  avec toit en coupole avec clocheton. Vers 1900, on apercevait ses ruines, près de léglise romane, certains pensent que le château couvrait le centre du bourg.","habitants":"Famille de Raymond-Pierre de Combret\r\n        \"","divers":"Château de Vernhettes à Golinlhac","gps":"","images":["../image/image_12/12_Vernhettes_1.jpg","../image/image_12/12_Vernhettes_2.jpg","../image/image_12/12_Vernhettes_3.jpg"]},"Consult_chateau_formulairec08c":{"id":"Consult_chateau_formulairec08c","dept":"12","canton":"Saint-Affrique","commune":"Versols et Lapeyre","nom":"Versols_Montalègre","type":"Forteresse","periode":"XV","histoire":"MONTALEGRE  est connue depuis 1268. Au XVe siècle, elle appartenait à la maison de Rodez, et passa ensuite entre les mains de différents représentants de la noblesse rouergate et limousine. La seigneurie de Montalègre est connue depuis 1268 mais les premiers possesseurs semblent être au XVIe siècle un rameau de la famille des comtes Rodez qui en portait le nom : Bernard de Rodez, seigneur de Montalègre, fils de Bringuier de Rodez et de Béatrix de Roquefeuil de Versols qui lui a peut-être apporté cette terre. Il épouse Catherine de Ricard, fille d'Hugues et de Catherine de Montjaux, dont il a au moins un fils et trois filles. Jeanne de Rodez, fille héritière de Guillaume, seigneur de Montalègre et de Jeanne de La Jugie, apporte Montalègre par son mariage le 13 août 1553 avec Magdalon de Corneillan, fils puîné de Jean, vicomte de Corneillan et de Florette de Montesquiou. Puis la famille de Marcilhac et la famille d'Yzarn de Valady en deviendront les propriétaires successifs. Récemment, le château a été aménagé  depuis 1988 hôtel.\r\nVERSOLS  En 1132, le seigneur de Versols partant pour Jérusalem, fait don de sa propriété à Sylvanès. En 1256 l'ensemble est racheté par une famille d'origine rouergate, il s'agit alors d'un moulon fortifié autour d'une grande cour intérieure. Le château de Versols est un château bâti à Versols-et-Lapeyre,  Il date du XIVe siècle. Sont protégés  ses façades et toitures, le Tinel gothique avec sa cheminée et ses vestiges de peintures murales, qui datent des XVe siècle et XVIe siècle, a appartenu durant de longues années par la famille de Roquefeuil-Versols. Le château de Versols est inscrit aux M.H. depuis 1988. Gîte et chambres d'hôtes de  Harmony Valet.","architecture":"Montalègre de la fin du Moyen-Age, plusieurs fois remanié, mais qui conserve des vestiges architecturaux intéressant notamment une tour et ses corbeaux, est constitué d'un corps de logis presque carré à deux étages, flanqué de quatre tours rondes. L'accès aux étages se fait par un escalier à vis situé au centre de la façade sud où il constitue une saillie  traduisant la présence de l'escalier à vis central. La tour sud-est possède au premier étage une chapelle à décor du XIXe.  A chaque étage, une porte donne accès à une petite pièce dans chacune des tours. Le deuxième étage conserve trois cheminées gothiques et une porte moulurée. Le troisième et dernier étage, autrefois consacré à la défense, les mâchicoulis ont disparu, a été transformé en grenier.                                               Versols, le château a conservé sa disposition d'origine ainsi que d'intéressants vestiges. Au Xe siècle, un castrum existe à l'emplacement d'un ancien oppidum gallo-romain. Vers 1365, le village est à nouveau fortifié contre les anglais avec poterne, trois tours d'angle, deux échauguettes extérieures. Des aménagements postérieurs dénaturent l'aspect du castellum . Le bätiment actuel conserve, son aspect défensif, le soubassement repose sur un ensemble de caves voûtées allant du Xe au XIVe siècles imbriquées les unes dans les autres. De l'ancien édifice ne subsiste en élévation que l'aile sud-est et l'aile sud-ouest du rectangle.","habitants":"Famille de Bernard de Rodez                                                                  Famille de Roquefeuil-Versols\r\n        \r\n        \"","divers":"Château de Versols et de Montalègre","gps":"","images":["../image/image_12/12_Versols_Montalegre_1.jpg","../image/image_12/12_Versols_Montalegre_2.jpg","../image/image_12/12_Versols_Montalegre_3.jpg","../image/image_12/12_Versols_Montalegre_4.jpg","../image/image_12/12_Versols_Montalegre_5.jpg","../image/image_12/12_Versols_Montalegre_6.jpg","../image/image_12/12_Versols_Montalegre_7.jpg","../image/image_12/12_Versols_Montalegre_8.jpg","../image/image_12/12_Versols_Montalegre_9.jpg"]},"Consult_chateau_formulairef642-2":{"id":"Consult_chateau_formulairef642-2","dept":"12","canton":"La Cavalerie","commune":"Viala du pas de Jaux","nom":"Viala","type":"Forteresse","periode":"XV","histoire":"VIALA, le Viala du Pas de Jaux a été donné aux Templiers en 1150 par le seigneur de Tournemire. Aux XIIe et XIIIe siècles, le Viala, comme on dit alors, est constitué de quelques mas, c'est à dire d'exploitations agricoles. Lorsque les hospitaliers prennent possession des biens du Temple, après 1312, ils décidèrent de créer en ce lieu un village et pour cela construisent les bâtiments d'une exploitation agricole qui sera gérée par les frères de l'ordre. Ils élèvent pour eux en 1315, le logis des chevaliers et construisent une église dédiée à Saint Jean Baptiste. Jusqu'en 1430 les habitants du Viala et de ses alentours, se réfugiaient à Sainte-Eulalie de Cernon lors des périodes de grande insécurité régnant sur le Larzac. Compte tenu de la distance élevée pour rallier le village voisin, les habitants demandèrent l'autorisation au grand prieur de Saint-Gilles, Bertrand d'Arpajon de construire une haute tour fortifiée pour pouvoir s'y réfugier. C'est la première fortification bâtie sur le plateau.","architecture":"Tour rectangulaire  avec chemin de ronde avec mâchicoulis, haute de 27 mètres, avec un rez-de-chaussée voûté, des planchers portant les quatre autres niveaux et un chemin de ronde. prolongé par un bâtiment rectangulaire à trois niveaux flanqué sur l'angle ouest d'une tour ronde à toiture presque plate et bretèche. Construite pendant la guerre de cent ans pour protéger la population, c'est la plus haute tour fortifiée de lAveyron. Construite au XVe siècle par les hospitaliers de Saint-Jean de Jérusalem à côté du logis des Chevaliers, elle est destinée durant les périodes d'insécurité à protéger la population et est utilisée comme grenier. Des expositions permanentes vous plongent dans l'histoire du site et de ses habitants. Du haut de la tour, admirez toute l'immensité du Causse. Animations toute l'année.","habitants":"Prieur Bertrand d'Arpajon \r\n        \"","divers":"Forteresse de Viala","gps":"","images":["../image/image_12/12_Viala_1.jpg","../image/image_12/12_Viala_2.jpg","../image/image_12/12_Viala_3.jpg","../image/image_12/12_Viala_4.jpg","../image/image_12/12_Viala_5.jpg","../image/image_12/12_Viala_6.jpg","../image/image_12/12_Viala_7.jpg","../image/image_12/12_Viala_8.jpg"]},"Consult_chateau_formulaire6cbf":{"id":"Consult_chateau_formulaire6cbf","dept":"12","canton":"Espalion","commune":"Villecomtal","nom":"Villecomtal","type":"Château","periode":"XV","histoire":"Village fortifié à Villecomtal et château du Puech et de la Guizardie.  VILLECOMTAL, ce village fut fondé vers 1295 par Henri II, comte de Rodez  Henri II et Bernard d'Armagnac. Au début du  XIVe siècle, par mariage le château est possession de la famille, De La Tour d'Auvergne. En 1327, le château est vendu à Aymeric Rolland, seigneur de Vallon. Durant la première moitié du XVe siècle, le nouveau site est fortifié, sous la protection du château. Au milieu du XVIe siècle, le château est possession d'Audouin de Guirard. En 1568, durant les Guerres de Religion, des troupes Protestantes attaquent le bourg et exécutent des prêtres. En 1586, le château appartient à Guion d'Apcher. Vers 1611, François de Rességuier est seigneur de Villecomtal. Au milieu du XVIIe siècle, la famille de Natte récupère le château suite au mariage avec Marie de Rességuier. Vers 1792, les révolutionnaires s'emparent du château. Il semble qu'ils le détruisent ou le vendent pour démantellement .\r\n PUECH, qui a appartenu à la famille del Puech et auparavant à la famille de Pruines, puis Goudal, de Roquefeuil et Gauthier de Savignac .\r\nGUIZARDIE, qui a appartenu à la famille de Guizard du XIIe siècle, puis de Blanc de Guizard jusquau XVIIe siècle. La maison de Guizard rendait hommage à Henri, comte de Rodez. Cette lignée s'éteint avec le décès de Louis de Guizard en 1550. Jean de Blanc, 2éme du nom, seigneur de la Mothe, épouse par contrat du 15 mars 1541 Louise de Guizard, fille de Louis, seigneur de la Guizardie  et de Anne de Nogaret, avec la clause express que le premier enfant mâle qui naîtrait, succéderait aux biens de la maison de Guizard et en prendrait le nom et les armes.Ce fut Jean 3éme, qui pris le nom de Blanc de Guizard avec le titre de seigneur de La Mothe et de la Guizardie (1542-1609). Son descendant Jean François Louis de Blanc de Guizard (1751-), seigneur de la Guizardie, Louis de Blanc de Guizard, préfet de l'Aveyron en 1830 et 1839, député de l'Aveyron en 1834.","architecture":"Le château de Villecomtal situé dans le bourg, au XVe siècle, il fut entouré d'une muraille avec comme vestige « Le Portal Bas ». Ce porche fermait l'extrémité nord de la rue principale appelée « la rue droite ». Dominant le village, le château se compose dune tour carrée datant du XVe siècle, dont lescalier à vis, toujours en place, chemin de ronde et mâchicoulis et dun corps de logis du XVIIIe siècle donnant sur une cour fermée qui fut lancienne cour dhonneur.\r\n le château del Puech, possède deux corps de logis à deux niveaux,  celui de l'arrière est surélevé, toitures en croupes avec lucarnes, accolé côté ouest d'un donjon de forme arrondie à cinq niveaux  et d'une tour ronde côté Est sur angles avec une tourelle, toiture en poivrière\r\n Le château de la Guizardie en grès rouge, de plan en U deux corps de logis  rectangulaire séparé au centre par un porche d'entée à fronton avec un  donjon sur côté Est de cinq niveaux, terrasse sur arcade en façade et accolé d'une tour carrée, prolongée d'un bâtiment à deux niveaux reliant la chapelle, à l'opposé retour en équerre d'un autre bâtiment.","habitants":"Famille d'Audouin de Guirard                                                                    Famille del Puech                                                                                      Famille de Blanc de Guizard \r\n        \"","divers":"Château de Villecomtal du Puech et de la Guizardie","gps":"","images":["../image/image_12/12_Villecomtal_1.jpg","../image/image_12/12_Villecomtal_2.jpg","../image/image_12/12_Villecomtal_3.jpg","../image/image_12/12_Villecomtal_4.jpg","../image/image_12/12_Villecomtal_5.jpg","../image/image_12/12_Villecomtal_6.jpg","../image/image_12/12_Villecomtal_7.jpg","../image/image_12/12_Villecomtal_8.jpg","../image/image_12/12_Villecomtal_9.jpg"]},"Consult_chateau_formulaire0d0b":{"id":"Consult_chateau_formulaire0d0b","dept":"12","canton":"Villefranche de Rouergue","commune":"Villefranche de Rouergue","nom":"Villefranche_Rouergue","type":"Château","periode":"XIV-XVII","histoire":"Châteaux à Villefranche de Rouergue;  les châteaux cités, certains n'existent plus ou on changeait de nom ; le Laverdoles du XVIe siècle, le Bernussou du XVIIIe siècle l'histoire du domaine de Bernussou remonte au XVIIe siècle. Ce domaine a été la propriété de grandes familles jusqu'à la Révolution : un trésorier du roi, un conseiller à la cour, un visiteur des gabelles, un avocat. Elle s'est ensuite poursuivie avec d'autres familles jusqu'à son acquisition en 1966 par la Chambre d'Agriculture de l'Aveyron,aujourd'hui centre de formation. Le Castepeyrousse du XVIIIe siècle, le Garriguet, qui a un jardin d'agrément remarquable comprenant un bassin, un escalier et des terrasses construites au XVIIe siècle par la famille de Raynaldi , de Graves du XVIe siècle (voir article), de Malirat , de Pesquières  ou de Pesquiès du XVIIIe siècle, de PY du XIVe siècle, de Veuzac du XIVe siècle, de Louvière du XVIIe siècle et de Romiguière du XVe siècle (voir article), le Triadou (voir article)            VEUZAC, château de l'ancienne branche de la famille de Morlhon établie à Villefranche-de-Rouergue, les Morlhon-Veuzac. L'autre étant celle de Sanvensa. En 1256, ce château passe des seigneurs de Morlhon aux évêques de Rodez, et, quoique changeant de maître il ne change pas de nom. Vivian, évêque de Rodez, possesseur du château de Veuzac, placé dans une plaine et peu fortifié, et le seigneur de Morlhon, dont le château était imprenable. Déclaration de l'hommage de Pons de Morlion, écuyer, seigneur d'Asprières et de Veuzac, pour son château de Veuzac, près Villefranche et autres fiefs, en la sénéchaussée de Rouergue. En 1789, le château de Veuzac appartenait à M. Jean-Claude Granier, dit Granier de Veuzac, correcteur à la cour des comptes de Montpellier. Tiers-Etat, et sous le nom de Granier de Veuzac, que Jean-Claude Granier fut, de 1779 à 1789, membre de l'Assemblée Provinciale de Haute-Guyenne. Il était qualifié de noble, seigneur de Veuzac et Saillac, et fut présent à l'assemblée primaire de la noblesse du Rouergue.\r\n MARTY   ROMIGUIERE château de la Romiguière par son propriétaire Bernard Vernet. société civile immobilière monsieur Christophe Marty.","architecture":"A Villefranche de Rouergues de ses quatorze châteaux article sur Veuzac et Graves,   pour les autres pas d'information historique.              Veuzac, donjon isolé composé d'une tour carrée de cinq niveaux, couronnée de mâchicoulis, avec des fenêtres à meneaux, et d'une tour escalier ronde accolée. À côté se trouvent d'importants bâtiments de communs qui ont été utilisées par une congrégation religieuse. Le donjon de Veuzac est le seul reste du château des Morlhon restauré au XVIIe siècle.\r\n Louis Lempereur, rapprochait le château de Bournazel et celui de Veuzac, près de Villefranche-de-Rouergue, datant en grande partie de la même époque et en grande partie de la fin du gothique, où on observait le couronnement d'oves d'une tour et une colonne dorique surmontée de son entablement.","habitants":"Famille de Morlhon                                                                                 Famille de Jean Humbert Dardennes\r\n        \"","divers":"Château de Villefranche du Rouergues;  le Laverdoles, de Bernussou, le Castelpeyrousse, le Garriguet, le de Graves, de Malirat, de Pesquiès, de Py, de Péze, de Veuzac, de Louvière de Romiguière et de Triadou","gps":"","images":["../image/image_12/12_Villefranche_Rouergue_1.jpg","../image/image_12/12_Villefranche_Rouergue_2.jpg","../image/image_12/12_Villefranche_Rouergue_3.jpg","../image/image_12/12_Villefranche_Rouergue_4.jpg","../image/image_12/12_Villefranche_Rouergue_5.jpg","../image/image_12/12_Villefranche_Rouergue_6.jpg","../image/image_12/12_Villefranche_Rouergue_7.jpg","../image/image_12/12_Villefranche_Rouergue_8.jpg","../image/image_12/12_Villefranche_Rouergue_9.jpg"]},"Consult_chateau_formulairecb56":{"id":"Consult_chateau_formulairecb56","dept":"12","canton":"Villeneuve d","commune":"Villeneuve d","nom":"Villeneuve_Aveyron","type":"Patrimoine","periode":"XI-XIV","histoire":"Cinq châteaux à Villeneuve; de Ginals du XIVe siècle,de Mahac, de Mérinhaques, de Toulongerques (voir article), et de Neuviales.                                 VILLENEUVE, le prieur Déodat, en accord avec lévêque de Rodez Pierre Bérenger achevait la construction du monastère et les deux autorités saccordèrent pour édifier léglise dédiée au Saint-Sépulcre. Lévêque de Rodez, agissant en seigneur du lieu allait y instituer un marché et créer une sauveté pour favoriser le développement du peuple. Après les péripéties de la Croisade des Albigeois, Simon de Monfort dépouillait la famille de Morlhon de tous ses droits et donnait Villeneuve à lévêque de Rodez. En 1231, Raymond VII, comte de Toulouse et de Rouergue, réussit, après échange, à reprendre le contrôle de ce fief, qui allait alors devenir une bastide comtale. Villeneuve est la première bastide du Rouergue. Construite à l'initiative du comte de Toulouse, elle est venue se greffer, en 1231, autour du monastère du XIe siècle fondé par Ozile II de Morlhon depuis Jérusalem. À la mort de Raymond VII, elle passa sous l'influence d'Alphonse de Poitiers en 1249. D'abord bastide comtale, elle devient bastide royale. Ce bourg, issu dun simple prieuré de Moissac, va devenir bientôt une ville importante, siège dune viguerie. Mais, la création, quelque temps plus tard, de la bastide de Villefranche et surtout le fait que celle-ci devienne le siège de la Sénéchaussée de Rouergue, va lui porter un coup fatal, en même temps quà Peyrusse et Najac.\r\nGINALS du XIVe siècle XVIIIe siècle. Un des domaines de la famille des Pomairols, les grands parents maternels de Ste Emilie. Emilie a vécu là une partie de son enfance et de son adolescence. Nous sommes ici en pleine campagne et Emilie appréciait la simplicité du paysage. Sainte-Emilie de Rodat y passa son enfance, et y eut la révélation de sa vocation religieuse.","architecture":"La ville de Villeneuve  fut fortifiée au XIVe siècle et conserve de cette époque deux vestiges importants, la Tour-porte Cardalhac encore appelée Tour Savignac, un des derniers vestiges des fortifications du XIVe siècle, et la Porte haute. La place centrale de la bastide, place des Conques, nous montre encore ses arcades et de très belles maisons, témoins de larchitecture du XIVe siècle, Deux tours de garde, une place aux couverts, un réseau de rues pavées introduisent le visiteur dans une cité médiévale intacte.  Place à arcades, des maisons du XIIIe, XVe et XVIe siècle. Porte de ville à mâchicoulis. Porte de ville carrée. Vestiges du manoir d'Algouze XIVe siècle.\r\nChâteau de Ginals du XIVe siècle, remanié au XVIIIe siècle, quadrilatère flanqué d'un donjon carré et d'une tour circulaire du XIVe siècle, escalier à vis, décor de gypseries, cheminée en pierre. De cette époque subsiste le donjon carré avec fenêtres à croisillons. L'aile qui lui fait suite a été remaniée aux XVIIe et XVIIIe siècles. Un deuxième corps de bâtiment en équerre est rattaché au premier avec un escalier à vis du XVe siècle.\r\nChâteau de Mayrinhagues : logis carré flanqué d'un donjon et échauguettes.\r\nChâteau de Neuviale, Renaissance, restauré.                           Château de Manhac. pas d'information.","habitants":"Famille des Pomairols\r\n        \"","divers":"Patrimoine de Villeneuve, porte et château de Ginals, de Mahac, de Mérinhagues de Toulongergues et de Neuviales","gps":"","images":["../image/image_12/12_Villeneuve_Aveyron_1.jpg","../image/image_12/12_Villeneuve_Aveyron_2.jpg","../image/image_12/12_Villeneuve_Aveyron_3.jpg","../image/image_12/12_Villeneuve_Aveyron_4.jpg","../image/image_12/12_Villeneuve_Aveyron_5.jpg","../image/image_12/12_Villeneuve_Aveyron_6.jpg","../image/image_12/12_Villeneuve_Aveyron_7.jpg","../image/image_12/12_Villeneuve_Aveyron_8.jpg","../image/image_12/12_Villeneuve_Aveyron_9.jpg"]},"Consult_chateau_formulairec923":{"id":"Consult_chateau_formulairec923","dept":"12","canton":"Saint-Geniez d","commune":"Vimenet","nom":"Vimenet","type":"Village fortifié","periode":"XIII","histoire":"VIMENET est un ancien village fortifié du XIIIe siècle. La communauté de Vimenet est attestée en 1258, elle dépendait de la baronnie de Sévérac. Une famille bourgeoise, nommée « de Vimenet », résidait dans la commune du XIIe siècle au XIVe siècle. Le fort a été occupé par les Anglais de 1360 (traité de Brétigny) à 1368. Une riche famille d'agriculteurs, les Costy, résidait dans leur manoir à Aguès (hameau de la commune). Leur généalogie s'étendait de 1290 à 1909.","architecture":"Le fort de Vimenet était en place en 1360. Il a une forme de quadrilatère irrégulier. De ce fort il reste l'emplacement des remparts, deux tours rondes d'angle et deux portails.","habitants":"Famille de Vimenet\r\n        \"","divers":"fortification et château de Vimenet","gps":"","images":["../image/image_12/12_Vimenet_1.jpg","../image/image_12/12_Vimenet_2.jpg","../image/image_12/12_Vimenet_3.jpg","../image/image_12/12_Vimenet_4.jpg","../image/image_12/12_Vimenet_5.jpg"]},"Consult_chateau_formulaire554b":{"id":"Consult_chateau_formulaire554b","dept":"12","canton":"Decazeville","commune":"Viviez","nom":"Viviez","type":"Château","periode":"XIII","histoire":"VIVIEZ , le château , à deux pas de la Vallée du Lot, en région Midi-Pyrénées, a été construit en 1208 par les Comtes de Toulouse. Stéphanie, Michel et leur fille Léna vous ouvrent les portes du château de Viviez, l'établissement chambres d'hôtes.","architecture":"Corps de logis rectangulaire à deux niveaux toit à deux pans avec lucarnes  accolé sur flan sud d'une tour carrée à mâchicoulis et terrasse fermé toit à six pans en poivrières à l'opposé une tour ronde  à créneaux et mâchicoulis  toit en  terrasse, dans le prolongement de l'édifice un pavillon d'entrée dans le centre toit à deux pans.  Au coeur du petit village de Viviez, il est entouré dun parc de 10300 m² sans vis à vis.","habitants":"Comtes de Toulouse\r\n        \"","divers":"Château féodal de Viviez","gps":"","images":["../image/image_12/12_Viviez_1.jpg","../image/image_12/12_Viviez_2.jpg","../image/image_12/12_Viviez_3.jpg","../image/image_12/12_Viviez_4.jpg","../image/image_12/12_Viviez_5.jpg","../image/image_12/12_Viviez_6.jpg"]},"Consult_chateau_formulaire25dd":{"id":"Consult_chateau_formulaire25dd","dept":"12","canton":"Pont de salars","commune":"Vézins du Lévezou","nom":"Vézins","type":"Château","periode":"XII-XVII","histoire":"Vezins du Lévezou la tour dit Tour templière de la Clau  du XIIe siècle  et la commanderie Templière du XIII siècle, le château de Vézins du XII-XVIIe siècle. COMMANDERIE du temple, réunie à celle de Sainte Eulalie du Larzac fut fondée en 1234   suite à une donnation de Grimal de Salles et de sa femme Aygline. Il existait déjà à cet endroit une bastide fortifiée avec des loges refuges, et un château qui fut complété en 1381 par une tour. La commanderie fut unie à celle des Canabières, après la suppression de l'ordre du Temple en 1302.  Mais cest la famille de Lévézou de Vézins qui aura le plus contribué à la construction de lidentité de la commune, née de fusion avec celles de La Clau et du Ram. Le lieu dépendait de la paroisse de Saint Amans d'Escoudournac. La Clau était le siège d'une commanderie des hospitaliers de Saint-Jean-de-Jérusalem et la communauté du Ram appartenait au domaine royal hérité des comtes de Rodez. \r\nVEZINS du XIIe siècle, fief de Vézian de Vézins constructeur de la première forteresse, en 1446, le fils de Bringuier de Luzençon et de Félice, Jean de Luzençon seigneur du Lévezou épouse Catherine d'Estaing la descendance de cette famille occupera les lieux pendant six siècles, les terres sont élevés au rang de comté lors de la visite d'Henri IV en 1600, un incendie ravage les étages du château en 1642 reconstruit  aussitôt et élevé au rang de Marquisat. Les portraits de famille Monseigneur de Vezins 1793-1867 père de cinq enfants entra dans les ordres après son veuvage et fut évêque d'Agen. Portrait du maréchal Oudinot duc de Réggio 1767-1847 dont la fille épousa en 1845 Ludovic de Vézins.  La famille de Lévézou est une des plus anciennes de France et une des plus prestigieuses du Rouergue.  Issus de ces rangs, les chevaliers, les croisés, les prélats, les gentilshommes proches des cours royales, les officiers et les hommes politiques.  Le château est toujours habité par la même famille.","architecture":"La Clau : commune de Vézins situé au pied du Pal, ce village , au bord de la Cami Ferrat, est une ancienne bastide fortifiée possédant des loges refuges. En 1234, une commanderie des Templiers y fut fondée. Cette commanderie fut dans un premier temps rattachée à celle de Saint Eulalie du Larzac, puis à celle des Canabières ordre de Saint-Jean de Jérusalem, en 1302 le château fut complété en 1381 par une tour appelée alors Tour des Templiers.  Le bourg centre de Vézins se caractérise par son château dominant le village. Cette immense demeure inscrite aux  monuments historiques appartient à la famille de Lévézou de Vézins.                                                                                             Le château du Vézins  fut dabord une forteresse au XIIe siècle et peut-être même avant, en 1642,  reconstruit en respectant le plan primitif et remanié à plusieurs reprises, au XVIIe et au XIXe siècles notamment. De style moyenâgeux important ensemble de bâtiments en forme de fer à cheval autour d'un puissant donjon haut de 8 mètres, les bâtiments coiffées de toits en carènes sur trois côtés et une cour qui  ferme  le mur fortifié, les jardins dagrément en lieu et place des anciens fossés et fortifications de lantique demeure seigneuriale et, comme le souligne Jacques Miquel, « le château est constitué dune série de logis formant un arc de cercle fermé à larrière par un mur crénelé, le tout formant un plan circulaire plutôt inhabituel. Ce tracé semble correspondre à celui dun très ancien château, du type de la motte féodale, et serait alors antérieur à lan mille. Cela en ferait un des plus anciens châteaux du département et le seul de ce type dans la route des seigneurs du Rouergue. La façade extérieure du château est la plus belle.","habitants":"Famille de Jean de Luzençon\r\n        \r\n        \"","divers":"Patrimoine et commanderie de Vezins","gps":"","images":["../image/image_12/12_Vezins_1.jpg","../image/image_12/12_Vezins_2.jpg","../image/image_12/12_Vezins_3.jpg","../image/image_12/12_Vezins_4.jpg","../image/image_12/12_Vezins_5.jpg","../image/image_12/12_Vezins_6.jpg","../image/image_12/12_Vezins_7.jpg","../image/image_12/12_Vezins_8.jpg","../image/image_12/12_Vezins_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','12 — Aveyron'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';

}

document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
