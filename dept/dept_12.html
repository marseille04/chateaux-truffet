e. Il était situé autour du « Roc du Comte » à Saint-Laurent En bas le Bourg, avec sa vieille église Saint-Paul et son château flanqué de tourelles. A louest, Salles se prolonge  par Saint-Laurent avec sa vieille tour du château de la Calmontie, son antique église, ses ruines du château dArmagnac, et renommé par la qualité de ses vins.  On constate sur la commune que à chaque château est rattaché une église, c'est ainsi que le château de la Calmontie est \"associé\" à l'église de Saint Laurent. Le château de La Calmondie se caractérise par sa grande tour ancienne, accolée à un logis du XIIIe siècle. Dautres tours existaient et ont été détruites pendant la Révolution.","habitants":"Famille des Ondes\r\n        \"","divers":"Château de la Calmontie","gps":"","images":["../image/image_12/12_Calmontie_1.jpg","../image/image_12/12_Calmontie_2.jpg","../image/image_12/12_Calmontie_3.jpg","../image/image_12/12_Calmontie_4.jpg","../image/image_12/12_Calmontie_5.jpg","../image/image_12/12_Calmontie_6.jpg"]},"Consult_chateau_formulaire40e3":{"id":"Consult_chateau_formulaire40e3","dept":"12","canton":"La Cavalerie","commune":"Camarès","nom":"Camarès","type":"Château","periode":"XI_XVI","histoire":"Trois  châteaux à Camarès celui de Camarès de Cazel, le manoir de Rougiers et de Laur.                                                                   CAMARES, il appartenait, au Xe siècle, au comte de Toulouse, puis au vicomte d'Albi, et à la maison Du Pont. Elle passa ensuite aux De Caylus et aux Arpajon. Il fut exposé aux guerres de religion et pris par les calvinistes de Millau en 1563, les catholiques revinrent en 1570, En 1586, la ville redevint calviniste. Enfin en 1685, l'intendant de Montauban intervint pour imposer la religion catholique et provoqua la fuite de tous les habitants.\r\nCAZELLES Pas d'informations historiques\r\nLAUR, il remonte au XVIe siècle comme propriété de la famille de Buf qui le céda en 1748 à Jean Durand. Actuellement, le château appartient toujours à une descendance de la famille Durand.\r\nDomaine des RIVES. Ce domaine se situait sur les rives du Dourdou, entre Camarès et Saint Pierre. Il appartenait à la famille de Mathieu jusqu'au XVIIe siècle, un jeune officier bourguignon de la famille de Noyé tomba amoureux de la fille du domaine et s'installa dans la région.                                                                     Manoir de Rougiers chambres d'hôtes.","architecture":"Camarès,  Ce château très vaste dominait la ville de Camarès et la vallée du Dourdou. Il était environné de plusieurs enceintes fortifiées qui ont disparues.  Chef lieu d'une viguerie carolingienne mentionnée en 883. La cité fut édifiée sur un mont escarpé dont les vestiges constituent la ville haute. La porte d'entrée encore visible conduisait au château du seigneur Arnaud du Pont.  ce château très vaste dominait la ville  et la vallée du Dourdou. Il était environné de plusieurs enceintes fortifiées qui ont disparues. En 1586 Camarès était compté parmi les quatre principales villes fortes des protestants du Rouergue. Le temple protestant fut élevé en 1825 au quartier du Barri, l'hôtel de ville est de 1896, le pont vieux réputé du XIe siècle. Camarès les vestiges constituent la ville haute. La porte d'entrée encore visible conduisait au château du seigneur Arnaud du Pont.                                                                 Château de Cazelles, Il est situé à 1 km au sud est de Camarés en face du carrefour de Prugnes. Une plaque de marbre porte la date de 1151, et une pierre celle de 1667. C'est désormais le siège d'une exploitation agricole.","habitants":"Seigneur Arnaud du Pont\r\n        \r\n        \"","divers":"Château de Camarès de Cazel le manoir de Rougiers  et le château de Laur","gps":"","images":["../image/image_12/12_Camares_1.jpg","../image/image_12/12_Camares_2.jpg","../image/image_12/12_Camares_3.jpg"]},"Consult_chateau_formulairedc78":{"id":"Consult_chateau_formulairedc78","dept":"12","canton":"Rodez","commune":"Onet le château","nom":"Canac","type":"Manoir","periode":"XVI","histoire":"CANAC, du XVIe siècle,  n'aurait pas déplu à Henri d'Albret, roi de Navarre et comte de Rodez, le futur roi Henri IV, qui y passa une nuit en 1535, accueilli par le constructeur de cet édifice, le consul Blaise Sicard. \r\nAujourd'hui maison dhôtes tenue par Henri Busset, actuellement en rénovation, vous accueillera au sein de ses 5 chambres dhôtes à partir du printemps 2015.","architecture":"Canac, doté d'un plan médiéval, avec ses quatre tours d'angle et sa tourelle d'escalier, l'édifice comprend un bâtiment principal à deux corps et une aile en retour d'équerre. La façade du premier corps de bâtiment possède deux croisée au même aplomb, semblable aux six de la face Est de ce même corps de bâtiment, disposées elles aussi, deux à deux au même aplomb. Ces 8 croisées sont caractérisées par le chambranle orné de pilastres à chapiteaux reposant sur des culots sculptés. Le 2ème et 3ème corps de bâtiment s'ouvrent de croisées à pilastres et chapiteaux sensiblement différents de ceux du premier corps de bâtiment. Le château de Canac mêle influences gothiques, Renaissance française et italienne. L'édifice a été restauré au début du XXe siècle par Henri Pons.","habitants":"Famille Henri Busset\r\n        \"","divers":"Manoir de Canac","gps":"","images":["../image/image_12/12_Canac_1.jpg","../image/image_12/12_Canac_2.jpg","../image/image_12/12_Canac_3.jpg","../image/image_12/12_Canac_4.jpg","../image/image_12/12_Canac_5.jpg"]},"Consult_chateau_formulaire3e4d":{"id":"Consult_chateau_formulaire3e4d","dept":"12","canton":"Capdenac","commune":"Capdenac-Gare","nom":"Capdenac","type":"Tour-Château","periode":"XIV","histoire":"Deux châteaux à Capdenac le château du Parc  et de Saint-Julien d'Empare du XVe siècle.                                                                      CAPDENAC-GARE , en 1291, une charte des immunités et des privilèges définit les relations entre les seigneurs de Capdenac et les consuls représentant la population. cette charte est confirmée par les rois de France : Philippe le Long en avril 1320, Jean II en juillet 1361 et Charles VI en octobre 1393. Durant la guerre de Cent Ans, Capdenac résista farouchement à lennemi anglais, au cours de plusieurs sièges. A la fin du XIVe siècle la famille d'Armagnac, se rendit propriétaire de la place, avant d'en être chassée par Louis XI, alors dauphin du royaume de France. Galiot de Genouillac, grand maître d'artillerie du royaume de France, en fut également le seigneur au cours du XVIe siècle. Les guerres de religions népargnèrent pas la petite cité, qui fut longtemps tenue par les protestants, Sully, venant même s'y retirer après la mort d'Henri IV.       ST-JULIEN-EMPARE; construit au XIVe siècle, il fut par la suite propriété des seigneurs d'Empare durant plusieurs siècles.  Fut reconstruit en 1762 dans le style Renaissance, puis confisqué à la Révolution et revendu comme bien national. Le château et la ferme furent acquis en 1795 par Martial Bataillou. cette famille exploita la ferme comme magnanerie et le château fut longtemps utilisé comme annexe agricole. Le bâtiment a fait lobjet, depuis 1970, dimportants travaux de restauration.\r\nPARC pas d'informations historiques","architecture":"L'histoire de la ville de Capdenac-Gare débute en 1857, lorsque Charles de Morny, demi-frère de l'empereur Napoléon III qui règne alors à Paris, est à la tête de la Compagnie d'Orléans. C'est lui qui est à l'origine du tracé de la voie ferrée et du choix du lieu-dit Tinsou dans la commune de Saint-Julien-d'Empare pour l'emplacement de la gare. La compagnie d'Orléans authentifiera la dénomination de Capdenac-Gare en 1859.                                 Saint Julien-d'Empare a été bâti au Moyen-Age, avec un corps central, entouré de 4 tours dangle, dont 3 subsistent, de nos jours. Ces tours portent encore des éléments architecturaux qui rappellent leur caractère fortifié avec des corbeaux, des meurtrières. Le château de Saint-Julien était entouré, autrefois, de fossés, dont la trace subsiste encore à louest.                                  \r\nChâteau de La Coste Il ne reste que des ruines.\r\nChâteau du Parc pas d'informations","habitants":"Famille d'Armagnac\r\n        \"","divers":"Fortifications et tour de Capdenac et le château de Saint-Julien d'Empare","gps":"","images":["../image/image_12/12_Capdenac_1.jpg","../image/image_12/12_Capdenac_2.jpg","../image/image_12/12_Capdenac_3.jpg","../image/image_12/12_Capdenac_4.jpg","../image/image_12/12_Capdenac_5.jpg","../image/image_12/12_Capdenac_6.jpg","../image/image_12/12_Capdenac_7.jpg","../image/image_12/12_Capdenac_8.jpg"]},"Consult_chateau_formulaire2092":{"id":"Consult_chateau_formulaire2092","dept":"12","canton":"Rioupeyroux","commune":"Castelmary","nom":"Castelmary","type":"Vestiges","periode":"XI","histoire":"CASTELMARY,  le château fut d'abord la possession des Castelmary du XI au XIVe siècles seigneurs importants qui furent bienfaiteurs de Loc-Dieu et de Bonnecombe au XIIe siècle. La forteresse passa ensuite entre les mains des Vergnes et des Morlhons et fût prise par les Anglais. Par la suite, Jean d'Armagnac l'assiégea en 1369 mais semble t-il sans succès. Il est vrai que le village, établi en avant de l'isthme, constituait lui-même une première défense, avec une tour d'accès carrée, et que l'ensemble était solide.\r\n  les Puel de Parlan vicomte furent les derniers seigneurs de Castelmary. Ces derniers avaient acheté la baronnie de Castelmary  à la famille de la Garde en 1774.  Son destin mouvementé se poursuivit à la fin du XVIIIe siècle , en février 1789 lors de l'explosion de violence que connut le Ségala huit mois après la Grande-Peur.","architecture":"Castelmary, Le château de Castelmary témoigne encore aujourd'hui de la riche histoire et du rôle militaire important de ces lieux au Moyen-Age. Posé sur un éperon rocheux, surplombant la gorge étroite et profonde du Lézert, entouré de bois et de rochers, ses défenses naturelles, ainsi que sa situation géographique près du Rouergue expliquent grandement le rôle militaire que joua le château lhistoire de la commune est lié à celui du château. Ainsi, plusieurs familles sy succédèrent au gré de mariage et des ventes du XIe jusquà la Révolution. En 1790, le château fut pillé et brûlé par les paysans. De nos jours, il ne reste que quelques pans de murs. Lemplacement sexplique tant par les défenses naturelles du relief, laccès à leau que par sa proximité avec le Rouergue, faisant de lui un lieu stratégique dun point de vue militaire. Aujourd'hui, il ne reste plus que quelques pans de murs qui sont désormais du domaine privé. Les vestiges de l'église servent maintenant de passage au chemin qui contourne l'entrée du village et la tour principale Le site était entouré d'un rempart, d'un fossé et une seule porte nommée « la porta Barrieyra » offrait un passage et servait sans doute aussi de clocher à l'église. Celle-ci renfermait des retables et des sculptures sur bois, ainsi qu'une piéta en bois doré du XVIIe siècle et une belle porte de sacristie que l'on peut actuellement voir à l'église de Lavernhe.","habitants":"Famille Lagarde\r\n        \"","divers":"Vestiges et tour de Castelmary","gps":"","images":["../image/image_12/12_Castelmary_1.jpg","../image/image_12/12_Castelmary_2.jpg","../image/image_12/12_Castelmary_3.jpg","../image/image_12/12_Castelmary_4.jpg"]},"Consult_chateau_formulaire79a9":{"id":"Consult_chateau_formulaire79a9","dept":"12","canton":"Saint-Geniez d","commune":"Castelnau de Mandailles","nom":"Castelnau_Mandailles","type":"Forteresse","periode":"XI","histoire":"CASTELNAU de Mandailles; château implanté sur un étroit éperon rocheux dominant la vallée du Lot, dont l'origine primitive remonte au XIe siècle.  Les seigneurs successifs étaient des vassaux des puissants seigneurs de Calmont d'Olt d'Espalion. Au XIIe siècle propriété de la famille Senhorel, en 1165, Hugues Senhorel devenant moine, apporte le site à l'abbaye d'Aubrac. En 1243, Bernard de Calmont est le principal seigneur de Castelnau. En 1299, Pierre Aton est seigneur de Castelnau. Au XIVe siècle, élevé au titre de baronnie pour  le seigneur de Castelnau qui  portera le titre de Baron. Vers 1620, Jean de Castelnau donne la seigneurie à Raymond de Castelpers. En 1642, le site appartient à François de Crussol, Baron de Saint Santin. A la fin du XVIIe siècle, le château appartient à la famille Curières. En 1757, le \"nouveau\" château est acheté par le juge Bernard d'Argouy. En 2012, le château est racheté par monsieur Stéphane Cahors qui s'évertue à lui redonner sa splendeur d'antan. D'origine féodale, le petit château de Mandailles a été  restauré à l'ancienne chambres d'hôtes.","architecture":"Castelnau de Mandailles, du XIe siècle, époque à laquelle le village primitif de Mandailles, le donjon et le château ne faisaient qu'un au sein d'une petite fortification. Le château fut abandonné après la Révolution et partagé en lopins de terres ou de ruines entre les villageois, le village s'est rebâti au XVIIIe siècle au dessus du château. Son délabrement s'accentua , jusqu'à ce que la bâtisse fut détruite.  Des fortifications primitives du château de Mandailles, Au XVIIIe siècle, le château est démoli, il ne subsiste désormais que de rares vestiges, si ce n'est la façade d'entrée qui en faisait  partie  de l'enceinte. Subsistent en grande partie les vestiges du donjon et bien que dépourvu de tout planchers intérieurs, cette tour fait désormais partie de la propriété voisine, il ne subsiste désormais que quelques rares ruines éparses du village primitif,  le château a été restauré en 1972.    Le \"Château-Neuf\" selon l'étymologie est un village de type montagnard aux toits pittoresques et demeures anciennes. Château remanié, et vestiges de fortifications : trois tours dont deux sont reliées par une haute muraille percée de fenêtres. Très joli site avec des demeures du XVIe siècle, possédant des fenêtres à meneaux. Restes du château au bas du village.","habitants":"François de Crussol\r\n        \"","divers":"Vestiges de tour et château de Castelnau de Mandailles, la maison d'Assezat et le manoir de Vennac","gps":"","images":["../image/image_12/12_Castelnau_Mandailles_1.jpg","../image/image_12/12_Castelnau_Mandailles_2.jpg","../image/image_12/12_Castelnau_Mandailles_3.jpg","../image/image_12/12_Castelnau_Mandailles_4.jpg","../image/image_12/12_Castelnau_Mandailles_5.jpg","../image/image_12/12_Castelnau_Mandailles_6.jpg","../image/image_12/12_Castelnau_Mandailles_7.jpg","../image/image_12/12_Castelnau_Mandailles_8.jpg"]},"Consult_chateau_formulaire6298":{"id":"Consult_chateau_formulaire6298","dept":"12","canton":"Baraqueville","commune":"Albagnac","nom":"Castelnau_Peyralès","type":"Vestiges","periode":"XI-XVI","histoire":"CASTELNAU-PEYRALES,  la seigneurie fut donnée par Alphonse de Poitiers à Guillaume de La Barrière, avec Villelongue,  puis passa après 1300  à la famille de Solages-Tholet au XVIe-XVIIe siècle, puis aux Paynaldi, et enfin aux Teulat de Sardières, J-B de Teulat de Sardières, avocat en Parlement, dit baron de Castelnau en 1765.                                                                                JALENQUES. Jalenques appartenait, en 1243, à la famille de La Barrière.  Le château de Jalenques, bien que pillé en 1790, fut habité jusquen 1812, date de la mort de son dernier propriétaire, Pierre-Jean Bonnet.    \r\nTOURENE, vers 1420, Tourène accueillit le vicaire général de l'antipape Benoît XIII, poursuivi par les troupes du pape Martin V. C'est là qu'à la mort de Benoît XIII, Jean Carrier, nommé cardinal par le pape mourant, fit élire pour lui succéder sous le nom de Benoît XIV, Bernard Garnier. Tourène  Un des plus zélés partisans de Benoît XIII était le rouergat Jean Carrier, archidiacre de Saint-Antonin chanoine de la cathédrale de Rodez. Il était le vicaire général dans les états du comte dArmagnac. Déclaré schismatique, il se réfugia dans le château de Tourène commune de Crespin dans les gorges du Viaur. \r\nVERDUN,  était jadis le siège d'une des douze principales baronnies du comté de Rodez. la famille Vernhes. Avant 1386, Verdun faisait partie du patrimoine de la maison de Castelmary.  \r\nCABANES, ruines du château de Villelongue attaqué puis incendié en 1790 par les paysans.","architecture":"Castelnau Peyralès vestiges du château entouré de plusieurs enceintes. la forteresse cessa d'être habitée à la fin du XVIIe siècle, quand la seigneurie dont elle dépendait fut démembrée. A l'angle Nord s'élève une grosse tour ronde, l'ancien donjon du château.                                                                                        Jalinques, ruine , aujourd'hui perdue dans une vallée boisée est tout ce qui reste de la seigneurie de Jalenques. Il était composé d'une enceinte quadrangulaire flanquée de tours rondes, certaines d'entre elles sont toujours debout , étouffées par la végétation. L'une d'elle possède encore , comme par miracle , une petite salle toujours voutée , avec ses élégantes ogives. Vestiges du château est situé dans une vallée sauvage au-dessous du bourg de Naucelle. Il  reste que quelques ruines. Durant la guerre de Cent Ans, ce château fut occupé par les routiers. La juridiction de Jalenques comprenait les paroisses de Frons, Salan, Carcenac, Quins et Naucelle.  Le château est cité en 1243. Tourene  Les ruines de ce château, insignifiantes, existent encore à mi-côte.                         Verdun, château et chapelle de Verdun est situé à 1 km au Nord de Quins. L'édifice était déjà en ruine vers le milieu du XIXe siècle.                              Villelongue : belles façades de maisons paysannes du XVIIIe pour les plus anciennes, avec leurs huisseries et enduits anciens, cadran solaire, moulin avec passerelle.","habitants":"Lamille de La Barrière\r\n        \r\n        \"","divers":"Vestiges  de l'ancien château de castelnau Peyralés, de  Jalenques, de Touréne et de Villelongues, château de Verdun dit du Gouverneur","gps":"","images":["../image/image_12/12_Castelnau_Peyrales_1.jpg","../image/image_12/12_Castelnau_Peyrales_2.jpg","../image/image_12/12_Castelnau_Peyrales_3.jpg","../image/image_12/12_Castelnau_Peyrales_4.jpg"]},"Consult_chateau_formulairede74":{"id":"Consult_chateau_formulairede74","dept":"12","canton":"Sévérac le Château","commune":"Castelnau-Pégayrolles","nom":"Castelnau_Pégayrolle","type":"Château","periode":"XII","histoire":"Trois châteaux à Castelnau Pégayrolles dont le château de Castelnau du XI-XIIIe siècle, le Castelmus du XIV-XIXe siècle et de Bruel.                                                                                                     CASTELNAU, du XIe au XVIIe siècles date de la fin des guerres de religion en Rouergue,  ne changea qu'une seule fois de maître, par la force des armes. passa à  la famille de Lévézou,  en 1289, Bernard de Lévézou et Hugues d'Arpajon sont en conflit pour la possession de Castelnau. Un duel judiciaire a lieu le 3 mai 1289. A l'issue du combat Lévézou doit céder la place à Arpajon. La maison d'Arpajon deviendra peu à peu la plus puissante famille du Rouergue, mais Castelnau n'est pas sa résidence principale. Les Arpajon de Castelnau deviennent chefs de guerre du parti protestant dont Millau est l'un des plus actifs bastions. En 1759, à Versailles, Louis XV crée le marquisat de Pégayrolles, dont Castelnau devient le chef-lieu et le confère à Étienne Hypolite de Pégayrolles, président au parlement de Toulouse. Contrairement aux Arpajon, le président de Pégayrolles réside dans son château à Castelnau, qu'il remet au goût du jour.                                         CASTELMUS PEGAYROLLES ,  En 1238, Bernard de Lévézou était seigneur de Castelnau-de-Lévézou, de Saint-Beauzély de Lévézou, de Castelmus, de Roquetaillade, de Marzials et de Comprégnac. Et fut cédé à Brenguier de Luzençon. Castelnau-de-Lévézou appartiendra à cette puissante famille  de 1289 à 1758.   Au XVIIIe siècle, il sera acheté par Jacques-Julien de Pégayrolles qui donnera son nom à cette localité. Il est  la propriété aujourd'hui de la famille Arlabosse de Millau.\r\nBRUEL  pas d'information historique.","architecture":"Castelnau,  le château féodal, l'un des plus anciens châteaux forts du Rouergue,  situé sur un contrefort du Lévézou,  château-fort ou \"château neuf\", dont l'existence est attestée dès le XIème siècle. De plan quadrangulaire à trois niveaux. En 1360 avec la fin de la guerre de cent ans, Castelnau, comme tout le Rouergue, vit une période de relative prospérité et s'entoure de remparts.  Castelmus,   village bâti sur la crête d'un promontoire face à Castelnau sur la rive opposé de la Muse. Les origines de ce château de Castelmus sont indéterminées, il domine le hameau du même nom à deux kilomètres à l'est de Castelnau Pégayrolles. Quadrilatère à trois niveaux, Il fut comme d'autres châteaux tour à tour aux mains des catholiques et des protestants, à charge de garder le nom de Lévézou puis à celui de Vezins.                                                           Bruel, corps de logis  de plan carré à à trois niveaux  avec pavillon saillant en façade dépassant la toiture et flanqué d'échauguettes en angles.","habitants":"Famille de Lévézou\r\n        \r\n        \"","divers":"Château de Castelnau, de Castemus Pégayrolles et de Bruel","gps":"","images":["../image/image_12/12_Castelnau_Pegayrolle_1.jpg","../image/image_12/12_Castelnau_Pegayrolle_2.jpg","../image/image_12/12_Castelnau_Pegayrolle_3.jpg","../image/image_12/12_Castelnau_Pegayrolle_4.jpg","../image/image_12/12_Castelnau_Pegayrolle_5.jpg","../image/image_12/12_Castelnau_Pegayrolle_6.jpg","../image/image_12/12_Castelnau_Pegayrolle_7.jpg","../image/image_12/12_Castelnau_Pegayrolle_8.jpg","../image/image_12/12_Castelnau_Pegayrolle_9.jpg"]},"Consult_chateau_formulaire9fe7":{"id":"Consult_chateau_formulaire9fe7","dept":"12","canton":"Baraqueville","commune":"Saint-Juste de Viaur","nom":"Castelpers","type":"Prieuré","periode":"XV","histoire":"Dans la commune de Castelpers deux châteaux dont je n'ai peu d'informations. CASTELPERS, le village abrite de beaux bâtiments notamment un prieuré qui domine le Viaur et qui dépendait autrefois des religieuses du Monastère-sous-Rodez. Château féodal qui ne serait pas resté vivant dans lhistoire sans lexistence du grand schisme dOccident qui se produisit après la mort du pape Grégoire XI dernier pape dAvignon en 1378. Ce bâtiment qui fut remanié au XV et XVIe siècles fut livré aux enchères en 1793 . La seigneurie, puis la baronnie, appartient à la famille de Castelpers puis au Castelpers-Panat du XIIIe au XVe siècle. Site rasé au temps des guerres de religion. Hôtel restaurant, gîtes ruraux, chambres d'hôtes.\r\nAujourdhui, le hameau de Castelpers, situé au confluent du Céor et du Giffou est reconnu pour son manoir du XVe siècle. Il fut restauré au XIXe siècle.\r\n Aujourd'hui hôtel restaurant de monsieur Saint-Palais.","architecture":"Le Château de Castelpers daté du XVe siècle, restauré au XIXe siècle.Des fenêtres à meneaux et une corniche à ondes du XVIe siècle contribuent à embellir cet ensemble. Vieux lieu fortifié, il est mentionné dans le livre de Ste-Foy de Conques (miracle de lévasion dun prisonnier).\r\nLa Calmésie : ancien camp gallo-romain ou l'on trouve dans les environs des traces de fortification, des débris gallo-romains (statue, poteries) et 5 meules de grès incorporées dans un mur de grange. En ces lieux aurait exister une ville appelée Pontoise.","habitants":"Famille de Castelpers\r\n        \"","divers":"Château de Castelpers","gps":"","images":["../image/image_12/12_Castelpers_1.jpg","../image/image_12/12_Castelpers_2.jpg","../image/image_12/12_Castelpers_3.jpg","../image/image_12/12_Castelpers_4.jpg","../image/image_12/12_Castelpers_5.jpg","../image/image_12/12_Castelpers_6.jpg","../image/image_12/12_Castelpers_7.jpg"]},"Consult_chateau_formulaire2bde":{"id":"Consult_chateau_formulaire2bde","dept":"12","canton":"La Cavalerie","commune":"Roquefort","nom":"Cavalerie","type":"Forteresse","periode":"XII","histoire":"CAVALERIE : lorsquil est mentionné lexistence de léglise dans le village fondé par lOrdre. Après lédification de cette église, les Templiers érigeront un « château » comme ils lont fait à Sainte Eulalie. De ce château, il ne reste rien. Celui-ci se trouvait sur la petite place située à côté de léglise. Seules quelques maisons dont une possédant une tourelle descalier en saillie se trouvant sur cette place ont des vestiges de ce château dans leurs structures et fondations. Tout comme La Couvertoirade et Sainte-Eulalie, La Cavalerie fur fortifiée vers 1435, sans doute par le même maître maçon, Daurde Alaus, qui érigea les murailles de Sainte Eulalie. La Cavalerie n'a pas été épargnée par les Guerres de religion, qui furent très odieuses en Sud-Aveyron. Ainsi, en 1568, des bandes de soldats protestants l'investissent et n'hésitèrent pas à griller les paysans du cru.","architecture":"La cavalerie du XIIe siècle, édifiée par l'ordre des chevaliers Hospitaliers de Saint Jean de Jérusalem, actuellement Ordre de Malte. C'était à l'origine un corps de logis carré flanqué de quatre tours rondes  à proximité immédiate du grand viaduc de Millau. Les premières mentions de linstallation des Templiers à La Cavalerie datent de 1180  possède une tour carrée de la porte est ornée de mâchicoulis. A l'intérieur de l'enceinte des maisons du XVe siècle et des hôtels particuliers du XVIIe siècle.  Les Templiers y ont développés un village, après y avoir bâti un château disparu depuis longtemps. Les Hospitaliers ont construit une muraille en grande partie conservée aujourd'hui : tours rondes rue du Portalou et des Remparts. \r\n Belles portes du XVIIe siècle, de petites échoppes. Son église du XVIIIe abrite les vestiges de l'ancienne église templière bâtie après que l'Ordre du Temple ait pris possession de ce nouveau fief en 1154.\r\nCes fortifications formaient une sorte de trapèze avec une tour à chaque sommet. Le clocher de léglise faisait partie de ces tours et fermait le quadrilatère au sud est. Vers 1580, les murailles, à lexception des tours, furent démantelées.","habitants":"les Templiers\r\n        \"","divers":"Commanderie de la Cavalerie","gps":"","images":["../image/image_12/12_Cavalerie_1.jpg","../image/image_12/12_Cavalerie_2.jpg","../image/image_12/12_Cavalerie_3.jpg","../image/image_12/12_Cavalerie_4.jpg","../image/image_12/12_Cavalerie_5.jpg","../image/image_12/12_Cavalerie_6.jpg","../image/image_12/12_Cavalerie_7.jpg","../image/image_12/12_Cavalerie_8.jpg","../image/image_12/12_Cavalerie_9.jpg"]},"Consult_chateau_formulaire966c":{"id":"Consult_chateau_formulaire966c","dept":"12","canton":"Capdenac-Gare","commune":"Peyrusse le roc","nom":"Caze","type":"Château","periode":"XIV-XV","histoire":"LA  CAZE, Jacques de Peyrusse, seigneur,  c'est à lui que l'on doit la construction et reconstruction du château en 1420, il s'est marié vers 1410 avec Galienne d'Albin, fille de Bégon, seigneur du lieu, et de Gauzide de Monestiès. On leur connaît deux filles et un fils : Antoine de Peyrusse, qui suit ; Catherine de Peyrusse, mariée avec Flotard, seigneur de Bar et de Peyrusse-le-Roc, a eu trois enfants : Laure de Peyruse, mariée le 10 février 1426 au château de Carlat avec Jean de Sales, capitaine de Carlat, fils d'Aymar, seigneur de Cordès et de Catherine de Cajarc.  Antoine de Peyrusse, fut capitaine gouverneur de Carlat à la suite de son beau-frère ; Bégon de Peyrusse, seigneur du « repaire de Las Caze », succède à Antoine comme gouverneur de Carlat. Claire de Peyrusse, mariée avec Raymon Azemar, seigneur de La Garinie, fils de Guilaume Adhemar et de Souveraine de Selgue, dame de La garinie. Antoine de Peyrusse, fut officier du roi Louis XII par brevet du 15 juillet 1498, marié à Marie de Nogaret, fille d'Amans, il meurt le 11 juin 1534 en laissant deux enfants : Jacques de Peyrusse, seigneur de La Caze,  Guion de Peyrusse, auteur de la branche des seigneurs de Bonnegarde établie près de Bordeaux En 1698, Jean de Peyrusse était seigneur de Lacaze. De son mariage vers 1665 avec Gabrielle de Lavayssière, il laisse deux enfants : Jean de Peyrusse, qui suit ; Isabeau de Peyrusse, mariée par contrat le 13 février 1700 à Rignac avec Michel d'Arnal, fils de Guyon d'Arnal et de Marguerite de Ricard. Jean de Peyrusse, seigneur de La Caze, épouse en 1669 Madeleine Dintilhac, dont une fille : Passa  à la famille Ricard de La Caze, puis à  la famille d'Armagnac de Castanet toujours dans cette famille.","architecture":"La construction du château de Lacaze aurait été entreprise vers 1420.  Le  château a été incendié par les Huguenots à la fin du XVIe siècle et reconstruit par Jacques de Peyrusse.  Logis rectangulaire de trois étages sur un entresol, flanqué de deux tours rondes, l'une à demi engagée au milieu de la façade principale, l'autre plus haute et couverte en dôme dans l'angle Ouest. L'ensemble est couronné de mâchicoulis au même niveau de la tour avant. Au XVIIIe siècle, les fenêtres ont été repercées et une aile basse d'un étage sur entresol et de quatre travées a été accolée. Combles à forte pente couverts en lauzes. On entre dans le château par un perron de neuf marches qui donne accès à un portail ouvert dans la tour ronde de façade.","habitants":"Famille de la Peyrusse\r\n        \"","divers":"Château de La Caze","gps":"","images":["../image/image_12/12_Caze_1.jpg","../image/image_12/12_Caze_2.jpg","../image/image_12/12_Caze_3.jpg"]},"Consult_chateau_formulaire9bb6":{"id":"Consult_chateau_formulaire9bb6","dept":"12","canton":"Murat","commune":"Cheylade","nom":"Cheylade","type":"Château","periode":"XVI","histoire":"A la Cheylade deux châteaux, celui d'Escorolles, de Mouleyres.                                                                                                                               CHEYLADE, fut complètement rasé en 1884,   (historiques) Les évêques de Clermont gardèrent la terre de Cheylade jusqu'en 1592, époque où Jean d'Estaing , seigneur du Sailhans, l'acheta   aux d'Estaing, commandeur de Courbines, qui donna cette terre, en 1657, à son neveu, le marquis de Sailhans; elle passa, en 1729, dans la famille de Montboissier, par le mariage de Claire d'Estaing avec Gaspard de Montboissier, dans la descendance duquel cette terre resta jusqu'en 1768.                                                                                                                                   ESCOROLLES  village avec un petit château situé presqu'à   l'embranchement du ruisseau de Chamalières avec la Rhue. Il a donné son nom à une ancienne famille qui se fixa à Aurillac vers la fin du XIVe siècle. Le château consiste en une tour ronde très élevée qui appartient aujourd'hui à la famille Amadieu.                                                                                                                                                       MOULEYRES, où se trouve un petit château à tour ronde, qui a appartenu à la famille Commolet. Pierre Commolet fut garde-sel, en 1524, pour les trois prévôtés.","architecture":"Cheylade un château qui a été habité par ces diverses familles et qui n'est pas encore entièrement détruit; mais longtemps avant 1788 il tombait déjà en ruines, et les fermiers même ne pouvaient plus l'habiter.                                                                                                                                                   Escorolles,  propriété privée agricole, il reste la tour du XVe siècle, avec ses corbeaux soutenant le sommet portant la poivrière couverte de lauzes. Elle est attenante au logis du XVIIIe siècle, remanié au XIXe siècle.                                                                                                                                 Mouleyres corps de logis rectangulaire à trois niveaux flanqué hors oeuvre en façade d'une tour ronde de quatre niveaux et toit en poivrières, prolongement de dépendance sur la gauche d'un corps de logis  d'un niveau et de lucarnes.","habitants":"Famille Amadieu\r\n        \"","divers":"Château d'Escorolles et de Mouleyres à la Cheylade","gps":"","images":["../image/image_15/15_Cheylade_1.jpg","../image/image_15/15_Cheylade_2.jpg","../image/image_15/15_Cheylade_3.jpg","../image/image_15/15_Cheylade_4.jpg","../image/image_15/15_Cheylade_5.jpg","../image/image_15/15_Cheylade_6.jpg","../image/image_15/15_Cheylade_7.jpg","../image/image_15/15_Cheylade_8.jpg"]},"Consult_chateau_formulairedd10-2":{"id":"Consult_chateau_formulairedd10-2","dept":"12","canton":"Salles la Source","commune":"Clairvaux-d","nom":"Clairvaux_Aveyron","type":"Village fortifié","periode":"XII","histoire":"Deux châteaux à Clairvaux , le monastère et le château de Panat  du XVI-XVIIe siècle  (voir article).   \r\nCLAIRVEAUX monastère En 1060, un prince anglais, nommé Alboin, fils présumé du roi Harold II d'Angleterre, traverse le Rouergue à l'occasion d'un pèlerinage vers les lieux saints. Dans la vallée de l'Ady, il est ému par les ruines d'un monastère détruit par les Arabes au VIIIe siècle. Il se recueille longuement et décide de recréer un monastère dédié à Saint-Pierre. Il réussit à obtenir l'adhésion de l'évêque de Rodez et des seigneurs rivaux de Panat et Cassagnes qui abandonnent tous leurs droits seigneuriaux aux religieux. Alboin choisit de confier le monastère à l'abbaye Saint-Pierre de Brantôme en Périgord, qui l'avait accueilli au cours de son pèlerinage.","architecture":"Le village de Clairvaux s'est développé autour d'un monastère dont la fondation est relatée par le cartulaire de l'abbaye de Conques. En 1062, le monastère est cédé à l'abbaye de Conques, plus proche. Au XIVe siècle, il ne s'agit plus que d'un prieuré auquel est désormais rattaché le prieuré voisin de Bruéjouls. Toutefois, témoignant de l'importance passée du monastère, le prieur de Clairvaux a droit au port de la crosse. Il bénéficie également d'un rang de préséance élevé aux États du Rouergue.\r\nLa présence du monastère, puis du prieuré, a favorisé le développement du bourg de Clairvaux qui bénéficie d'une charte d'affranchissement en 1390. Celle-ci l'autorise à se doter d'une administration municipale. Les consuls engagent alors la fortification du village qui est cependant envahi par les Anglais durant la Guerre de Cent Ans.\r\nVestiges des fortifications du village de Clairvaux; de l'enceinte construite au XIVe siècle, il reste la porte d'entrée principale, surmontée d'une tour à mâchicoulis, ainsi que deux portes secondaires. À l'intérieur du vieux village, les ruelles étriquées sont bordées d'anciennes demeures comportant des éléments architecturaux intéressants : des encorbellements, des tourelles d'escalier ainsi que des fenêtres à meneaux.\r\nDifférentes enquêtes conduites aux XVIe, XVIIe et XVIIIe siècles évoquent tout le village de Clairvaux comme un bourg prospère d'une relative importance. Le patrimoine bâti du vieux village en témoigne encore aujourd'hui.","habitants":"Le Prince Alboin\r\n        \"","divers":"Village fortifié de Clairveaux, monastère et château de Panat","gps":"","images":["../image/image_12/12_Clairvaux_Aveyron_1.jpg","../image/image_12/12_Clairvaux_Aveyron_2.jpg","../image/image_12/12_Clairvaux_Aveyron_3.jpg"]},"Consult_chateau_formulaire6ba0":{"id":"Consult_chateau_formulaire6ba0","dept":"12","canton":"Salles la Source","commune":"Mondalazac","nom":"Colombier_Aveyron","type":"Forteresse","periode":"XIV","histoire":"COLOMBIER, repaire élevé au XIVe siècle le comte de Rodez accorde   la famille de Salle l'autorisation de construire le château sur ses terres, sur un  site du domaine gallo-romain. Le château devient, par alliance, propriété de La Panouse par le mariage de Marguerite de Salles avec Amalric de La Panouse-Loupiac en 1437.  lequel devenu veuf convolera quelques années plus tard avec Bertrande des Ondes, fille de l'un des seigneurs de Salles la Source, le château est resté dans la famille de La Panouse, devenu par alliance propriétaire du château de Thoiry qui avait délaissé le colombier en exploitation agricole, mais grâce à Paul de La Panouse  et à son épouse Annabelle d'origine américaine  qui créa en 1960 un parc animalier. Vendu comme bien national en 1792  et racheté par La Panouse.","architecture":"le Colombier construit  au XIVe siècle  site du domaine gallo-romain. Le donjon primitif carré daterait de cette période avait fonction défensive comme l'atteste ses petites fenêtres, ses mâchicoulis ses archères et canonnières. De plan carré, l'édifice organise  ses différents bâtiments autour d'une cour intérieure, l'ensemble est dominé par un donjon rectangulaire pourvu d'une couronne de mâchicoulis, reposant sur des corbeaux, une bretèche à mi-hauteur avec logette formant saillie pour surveiller les abords de la demeure. Dans sa partie inférieure le donjon est percé d'une canonnière et d'une modeste fenêtre munie d'une grille. Dans la courtine qui le prolonge une porte fortifiée donne accès à la cour et sur le côté  gauche de l'ensemble s'élève un corps de logis percé de rares ouvertures, baies ogivales et fenêtres à meneaux certaines  agrandies, la façade nord-est est flanquée d'une tour ronde coiffée d'un toit en poivrière.","habitants":"Famille de Salle                                                                                        Famille de la Panouse\r\n        \"","divers":"Château du Colombier","gps":"","images":["../image/image_12/12_Colombier_Aveyron_1.jpg","../image/image_12/12_Colombier_Aveyron_2.jpg","../image/image_12/12_Colombier_Aveyron_3.jpg","../image/image_12/12_Colombier_Aveyron_4.jpg","../image/image_12/12_Colombier_Aveyron_5.jpg","../image/image_12/12_Colombier_Aveyron_6.jpg","../image/image_12/12_Colombier_Aveyron_7.jpg"]},"Consult_chateau_formulaired756":{"id":"Consult_chateau_formulaired756","dept":"12","canton":"La Cavalerie","commune":"St-Sernin sur Rance","nom":"Combret","type":"Vestiges","periode":"XIII","histoire":"Quatre châteaux à Combret  sur Rance dont celui de Combret,  des Camps, de Hauterives et de Belloc.                                              COMBRET, les Roquefeuil en  1404, les Arpajon en 1460, Le 8 juin 1460, la seigneurie de Combret fut vendue à la maison d'Arpajon par Jean de Roquefeuil, suivant acte de Guitard , notaire à Saint-Sernin. Les La Rochefoucaud en 1775, seigneurs dominants successifs. C'est vers l'année 1760 que la baronnie de Combret fut acquise par Pierre de Serres de St-Roman qui tenait jadis cette vallée du pays de Roquefort, située à 9 km de Saint-Sernin sur Rance. M. le comte de Saint-Roman, qui était pair de France sous la Restauration depuis 1815 jusqu'à 1830 , fut donc le dernier seigneur de Combret.                                                               CAMPS de la famille  de Molas de 1742 puis aux Glavenas château d'Escamps qui était la propriété de noble Achille de Glavenas, sieur de Corbon , le château la Ferrandié appartenant à Sébastien de Penne. Ce dernier  n'existe plus, c'est à peine s'il en reste quelques vestiges. Non loin de ce château existait autrefois un petit village appelé Montbressous. Une tradition populaire raconte que la peste ayant fait invasion dans le village , il fut livré aux flammes avec ses habitants pour arrêter la propagation du fléau dans le voisinage. Triste épisode de nos calamités publiques.                BELLOC ce château aurait existé au Ran à 3 km au nord de Combret. Il appartenait à la famille De Pène.                       HAUTERIVES le hameau du même nom à 5 km à l'est de Combret. Il était la  possession de François de Saint-Juéry au XVIIe siècle. Sa famille le garda jusqu'au XVIIIe, il fut vendue en 1747 à M. Massier curé de Bétirac qui en fit don à sa nièce.","architecture":"Combret,  est composé d'une tour dont la construction remonte au XIIe siècle et d'un corps de logis XVII-XVIIIe siècle, On compte plusieurs châteaux pendant la période du Moyen-Age à proximité et dans le bourg. Combret avait trois châteaux, le plus élevé sur le rocher qui domine le village et dont il reste encore une tour massive, le deuxième était bâti sous le premier et était la résidence des seigneurs de Combret. Le troisième était situé un peu plus loin au Serre. Ils ont cessé d'être habités dés la fin du XVIe siècle.  Cette pittoresque place forte, perchée sur les hauteurs de la rivière Rance, Tout en haut de ce village de pierres rouges, on aperçois, au sommet de la crête rocheuse, les vestiges de ce qui fut autrefois le château. Ce sont les ruines du donjon carré construit au XIIIe siècle, proche de l'église mi-romaine, mi-gothique de Saint-Jean-Baptiste.\r\n Belloc ce château aurait existé au Ran à 3 km au nord de Combret.                                                                                          Camps,  petit château situé à 4 km à l'est de Combret prés de Notre-Dame de Bétirac.","habitants":"Comte de Saint-Roman                                                                       Famille  de Molas\r\n        \"","divers":"Vestiges du château de Combret, de Camps, de Belloc et d'Hauterives","gps":"","images":["../image/image_12/12_Combret_1.jpg","../image/image_12/12_Combret_2.jpg","../image/image_12/12_Combret_3.jpg","../image/image_12/12_Combret_4.jpg","../image/image_12/12_Combret_5.jpg","../image/image_12/12_Combret_6.jpg","../image/image_12/12_Combret_7.jpg"]},"Consult_chateau_formulaireaf6a":{"id":"Consult_chateau_formulaireaf6a","dept":"12","canton":"Salles la Source","commune":"Nauviale","nom":"Combret_Nauviale","type":"Château","periode":"XIII","histoire":"COMBRET appartenait aux XIIIe et XIVe siècle au seigneur de Beaucaire, celui-ci en faisant hommage à l'évêque de Rodez. Aux XVIe et XVIIe siècles le château appartient  à deux familles du Patriciat Ruthénois, les Caulet et les Tullier. La première est issue de la bourgeoisie commerçante de Rodez, la seconde de la noblesse de chevalerie ; au début du XVIIe siècle, elles sont toutes deux représentantes de la nouvelle noblesse de robe. Les Caulet dans la seconde moitié du XVIe siècle et au début du XVIIe siècle, puis les Tullier en suivant, feront du château médiéval de Combret une demeure aux champs dans laquelle les exploitations agricoles, notamment la viticulture, garderont une place considérable. A la fin du XVIIIe, Jean Hilarion Viguier de Grun acquiert le château. Au début du XXe siècle, alors que le château est passé par mariage cette fois dans la famille d'Yzarn Freissinet de Valady, seul l'aspect de villégiature est conservé de l'ancienne maison aux champs, société civile immobilière, a débuté son activité en novembre 2008. Marguerite Charvet est associé et gérante . Le siège social de cette entreprise est  situé au château de Combret.","architecture":"Combret, du XIIIe siècle subsistent un logis de plan allongé partiellement conservé avec une tour de plan carré. D'importants remaniements mettent la demeure au goût du jour au milieu du XVIe siècle. C'est certainement lui qui procède à une nouvelle transformation de l'édifice, consistant en l'arasement de sa tour centrale et sans doute la surélévation du corps de logis, seul l'aspect de villégiature est conservé de l'ancienne maison aux champs, celle-ci ayant perdu ses fonctions agricoles. Le décor d'architecture et l'ornement figuré témoignent par leurs styles des formes alors à la mode, par l'iconographie des valeurs largement répandues à cette époque. Au-delà de ces deux siècles, le château porte les traces d'un état ancien comme celles des remaniements opérés au tournant du XIXe siècle. Le château de Combret retrace ainsi l'évolution du château seigneurial, dont la première partie est défensive vers la maison aux champs, déclinant les différents aspects de celle-ci.","habitants":"Famille d'Yzarn Freissinet de Valady\r\n        \"","divers":"Château de Combret-Neuviale","gps":"","images":["../image/image_12/12_Combret_Nauviale_1.jpg","../image/image_12/12_Combret_Nauviale_2.jpg","../image/image_12/12_Combret_Nauviale_3.jpg","../image/image_12/12_Combret_Nauviale_4.jpg"]},"Consult_chateau_formulairec085":{"id":"Consult_chateau_formulairec085","dept":"12","canton":"Decazeville","commune":"Conques","nom":"Conques","type":"Château-Palais abbatial","periode":"XIII-XIV","histoire":"A Conques diverses constructions anciennes tel que Cambelong, St-Cyprien.  CONQUES, bâti autour dun oratoire primitif, devenu monastère bénédictin, puis lune des étapes essentielles sur la route de Compostelle, Conques brilla sur toute la chrétienté jusquau XIIIe siècle, avant que ne se manifestent les premiers présages dune décadence morale et spirituelle. Conques était déjà sensible à lépoque où le roi François Ier avait accepté la sécularisation des moines. Les guerres de religion  se transforment en véritable déroute, et la ruine fut consommée quand les protestants, en 1568, tentèrent dincendier la basilique. Mais celle-ci devait, à son tour, être miraculeusement sauvée. Abandonnée après la Révolution, et promise à une prochaine destruction, elle fut redécouverte par Prosper Mérimée, qui, en 1833, avait obtenu le poste dinspecteur général des Monuments historiques.                               HUMIERES  Le château a été construit par Guy dHumières au XVe siècle,  avant de rejoindre les armées du Roi en Piémont, la guerre ayant repris entre Charles-Quint et François Ier.  Il mourut, le 30 septembre 1536 des suites d'une rixe avec les frères Etienne et Guillaume de Poey, seigneurs de Poey, peu après avoir rejoint les armées du Roi François Ier. Bourg classé plus beau village de France, préservé au cours des âges des destructions, Conques se caractérise par la diversité des matériaux utilisés : le schiste bleuté, le grès du domaine de Cambelong, aujourd'hui hôtel quatre étoiles.","architecture":"Conques, le village a conservé son caractère architectural primitif, avec ses antiques demeures lourdement couvertes de lauzes, les vestiges des remparts qui, jadis, protégeaient le bourg.  Conques le fut aussi religieusement par lordre de Prémontré, en 1873, la sollicitude dont ce village  fut lobjet au cours de son histoire est à la fois la cause et la raison pour lesquelles il est un des plus beaux et des plus émouvants que lon puisse visiter.                                  Humières, c'est une bâtisse du XIVe siècle avec des consoles sculptées, et une haute tour d'escalier. On remarquera une curieuse fenêtre à meneau qui épouse l'arrondi de l'angle du mur, au nord-ouest  rose et le calcaire mordoré se côtoient dans une étonnante alchimie de couleurs, les pans de bois rythment les façades des demeures en encorbellement. Le château dHumières représente un magnifique exemple darchitecture civile des XVe et XVIe siècles. Intégré à l'espace urbain, il se compose d'un corps de logis principal dont limposante façade est rythmée par trois niveaux de croisées, lune delles, au nord-ouest, épousant larrondi de langle du mur, est venue saccoler une tour descalier, remarquable par son couronnement de plan octogonal, qui rappelle la tour lanterne de labbatiale. Les toitures en lauzes, sont ici tout simplement dune beauté singulière. A visiter absolument dans ce charmant village: l'abbatiale Sainte Foy, la chapelle du Rosaire, le musée Joseph Fau, la porte et la fontaine du Barry, le four à pain, la porte de la Vinzelle, le Couvent des soeurs de lUnion, la chapelle Saint-Roch, la résidence Dadon, le pont romain. A droite de la porte de la Vinzelle, subsiste une tour ronde de l'ancienne enceinte. Un peu plus loin, l'oratoire de la Capelette, renferme dans sa niche une gracieuse Vierge et l'Enfant du XVIIe siècle.","habitants":"Seigneurs de Poey                                                                                 Famille de Guy dHumières\r\n        \"","divers":"Patrimoine de Conques, château d'Humières, St-Cypriens","gps":"","images":["../image/image_12/12_Conques_1.jpg","../image/image_12/12_Conques_2.jpg","../image/image_12/12_Conques_3.jpg","../image/image_12/12_Conques_4.jpg","../image/image_12/12_Conques_5.jpg","../image/image_12/12_Conques_6.jpg","../image/image_12/12_Conques_7.jpg","../image/image_12/12_Conques_8.jpg","../image/image_12/12_Conques_9.jpg"]},"Consult_chateau_formulairef745":{"id":"Consult_chateau_formulairef745","dept":"12","canton":"La Cavalerie","commune":"Coupiac","nom":"Coupiac","type":"Forteresse","periode":"X-XII","histoire":"COUPIAC, du IXe au XIIIe siècle, le château va être la possession commune des comtes de Rodez.  En 1238, Hugues III comte de Rodez échange ses fiefs contre d'autre seigneurie, Coupiac  passe dans la famille de Panat, Archambaud  vicomte de Panat   Cependant, cette famille qui possède dautres propriétés, et notamment le château de Peyrebrune, leur résidence principale, près de Villefranche de Panat, ne va pas venir y habiter. Le château-fort est restée dans la famille des Panat puis des Levis Castelpers-Panat jusquen 1778.  Dominique  de Brunet, comte de Panat vend la forteresse devenue inhabitable au gouverneur de Saint-Sernin  Izarn de Méjanel, gouverneur de Saint-Sernin,    ce dernier  fait refaire les toitures ce qui entraîne  la disparition des mâchicoulis.  le château devient la propriété d'un notaire qui le revend en 1872 à l'abbé  Souyris qui veut y faire une école privée.  En 1905, lors de la séparation de l'église et de l'état et afin de le soustraire aux inventaires des biens de l'église il est vendu à la famille Genieys de La Calmette. En 1981 la famille Genieys le cède à la commune et il est géré depuis 1982 par une association « Los Amics del Castel de Copiac » qui a pour but la restauration et l'animation de l'édifice.","architecture":"Coupiac, a une forme parallélépipédique dont une tour et un pan de courtine ont disparu fortifié au XVe siècle de plan quadrangulaire flanqué  aux angles de  quatre tours rondes massives, les murs épais perçés de meurtrières dans leur partie les plus haute et couronnés de part en part de galeries extérieures avec mâchicoulis, aujourd'hui, une des tours a disparue  Sur une tour, présence d'une archère droite. Sur une courtine, une belle archère cruciforme à croix pattée.  A mi-hauteur, une arquebuse ou couleuvrine. Puis une canonnière.  Et enfin, en haut de courtine, les vestiges de mâchicoulis et seule une petite partie du chemin de ronde est toujours visible vers la tour sud,   au XVIIIe siècle de nombreuses modifications : les toitures, démonte le chemin de ronde, les mâchicoulis, la galerie, agrandit les fenêtres, construit la façade. l'état actuel du  château qui n'a pas été détruit à la Révolution, seul des blasons ont été martelés comme le blason de la porte d'entrée. Dans le village la maison Marty avec tourelle et fenêtre à meneaux.","habitants":"Famille des Panat\r\n        \"","divers":"Châteaufort de Coupiac","gps":"","images":["../image/image_12/12_Coupiac_1.jpg","../image/image_12/12_Coupiac_2.jpg","../image/image_12/12_Coupiac_3.jpg","../image/image_12/12_Coupiac_4.jpg","../image/image_12/12_Coupiac_5.jpg","../image/image_12/12_Coupiac_6.jpg","../image/image_12/12_Coupiac_7.jpg","../image/image_12/12_Coupiac_8.jpg"]},"Consult_chateau_formulaire43f6":{"id":"Consult_chateau_formulaire43f6","dept":"12","canton":"La Cavalerie","commune":"Couvertoirade","nom":"Couvertoirade","type":"Forteresse","periode":"XII","histoire":"COUVERTOIRADE, fut une place forte dont la fondation remonte aux Templiers et commanderie hospitalière  propriété de l'abbaye de Nant, fondé en 1113 par Gérard Tenque et  fut donné, entre 1159 et 1200 aux templiers qui devinrent guerriers y édifièrent un château, une chapelle et un système de défense. En 1158, avaient été mis en possession du Larzac par Raymond Bérenger, comte de Barcelone et roi d'Aragon. En 1182, la donation au Temple fut confirmée. Après dissolution de l'ordre du Temple plusieurs biens passèrent aux Hospitaliers en 1312 qui fortifièrent le village. En 1562, la place résiste à un assaut des protestants. En 1566, elle est prise par le capitaine huguenot Sausset, puis reprise peu après par l'évêque Claude Briconnet de Lodève. L'accès au château se fait par une rampe protégée par une barbacane. L'entrée se fait par une porte en arc brisé surmonté d'un assommoir. A gauche de la porte se dresse le donjon du XIIe siècle garni de contreforts. Auprès de la porte, la muraille est percée de baies du XVe siècle.                                   BELVEZET, maison forte, était la propriété à l'époque de la famille de Belvezet, membre de la famille de la Valette, en 1732 à noble Etienne de la Valette afferme sa métairie à Pierre Fabreguetes, en 1827 passe à Charles -Auguste de Barral d'Arènes, puis à Victor de Bonald qui le revend à à la vicomtesse  d'Izarn de Freissinet se manoir fera retour dans la famille de Freissinet.","architecture":"Couvertoirade, village fortifié remparts heptagonaux cantonnés de quatre tours rondes et de deux carrées, le château des templiers en ruines  à perdus deux de ses étages, contre le donjon, un escalier taillé dans le roc donne accès aux étages, la partie basse se compose d'une salle  voûtée en berceau et éclairée par deux meurtrières, les salles hautes sont voûtées en plein cintre et éclairées par des baies à redents. Sur l'avant dernière terrasse s'ouvrent deux salles voûtées. Dans l'une d'elle se trouve l'orifice de la citerne d'eau. A l'extrémité sud, la terrasse supérieure s'appuie sur un rocher. Sous cette partie reprend le mur d'enceinte. Au sud ouest de ce mur d'enceinte, deux courtines renforcées de tours, permettent d'arriver à la grosse tour ronde du nord-ouest.              Belvezet, maison forte du XVIIe siècle dans une enceinte flanquée de deux tours rondes placées aux angles  Nord-Est et Sud-Est, ces deux tours sont  arasées étaient reliées par une courtine dans laquelle s'ouvrait le porche d'entrée, le corps de logis à deux niveaux.","habitants":"Gérard Tenque \r\n        \"","divers":"Commanderie de la Couvertoirade et lamaison forte de Belvezet","gps":"","images":["../image/image_12/12_Couvertoirade_1.jpg","../image/image_12/12_Couvertoirade_2.jpg","../image/image_12/12_Couvertoirade_3.jpg","../image/image_12/12_Couvertoirade_4.jpg","../image/image_12/12_Couvertoirade_5.jpg","../image/image_12/12_Couvertoirade_6.jpg","../image/image_12/12_Couvertoirade_7.jpg","../image/image_12/12_Couvertoirade_8.jpg"]},"Consult_chateau_formulaire582f":{"id":"Consult_chateau_formulaire582f","dept":"12","canton":"Millau","commune":"Creissels","nom":"Creissels","type":"Château","periode":"XII-XIX","histoire":"Trois châteaux à Creissels le château des comtes de Rodez du VIIIe siècle, de Pris  et celui  de Roquebelle du XIXe siècle. CREISSELS,   au IXe siècle un certain Leutade possède la viguerie qui appartient au XIIIe siècle à la famille de Roquefeuil vicomtes de Creyssel, puis celle-ci passe par alliances en 1230 à la famille de Rodez, Henri II fait construire le château et l'habite. De 1283 à 1403, il appartient aux vicomtes d'Armagnac, jusqu'à confiscation par le roi qui réunit la viguerie à la couronne. Le château avec la simple seigneurie sans la haute justice, appartient ensuite aux Montcalm, d'Alençon, d'Albret et Vendôme, Crozat, puis de Gualy.   Il est désormais propriété de la famille  Austruy, aujourd'hui hôtel-restaurant.                                                          PRIS se situait sur le rocher du même nom à Saint Martin de Pris à 2 km au sud ouest de Creissels, à proximité de la grotte de Boudoualou, et appartenait au monastère de Conques. On trouve sa trace dés 801 transformé en couvent vers le XII ou XIIIe siècle et qui devient propriété du chapitre de Rodez.                   ROQUEBELLE  dans la famille de Gualy, au comte de Villefort et  maintenant dans la famille de la Lande.","architecture":"Creissels domine le village et les méandres du Tarn depuis le VIIIe siècle. Il eut à subir des sièges mémorables qui sont passer à la postérité : occupation par les anglais au XIVe siècle, enjeu important lors des guerres de religion. Les protestants échouèrent en 1559 la prise de la place commandée par Arnaud de Méjanes, mais réussirent en 1562. Les catholiques reprirent la place en 1569. Le conflit le plus mémorable demeure le siège du château défendu par le duc de Rohan en 1628. Ce sont 80 assiégés catholiques qui tinrent tête à une armée importante munie de canons. L'arrivée d'une armée commandée par le prince de Condé sauva les assiégés. Pour remercier le duc de Rohan, le roi lui donna l'ensemble du château mais fit démolir, cinq années plus tard, les fortifications. En 1814, un incendie eut lieu qui détruit les deux tiers du château. \r\nPris se situait sur le rocher du même nom à Saint Martin de Pris à 2 km au sud ouest de Creissels, à proximité de la grotte de Boudoualou.                                                                                                Domaine de Roquebelle construit par le peintre Théodore Richard au XIXe siècle. Il fit également creuser un tunnel à fromage sans succès mais qui engloutit une grande part de sa fortune.","habitants":"Famille de Roquefeuil                                                                         Famille de Gualy\r\n        \"","divers":"Château de Creissels, de Pris et de Roquebelle","gps":"","images":["../image/image_12/12_Creissels_1.jpg","../image/image_12/12_Creissels_2.jpg","../image/image_12/12_Creissels_3.jpg","../image/image_12/12_Creissels_4.jpg","../image/image_12/12_Creissels_5.jpg","../image/image_12/12_Creissels_6.jpg","../image/image_12/12_Creissels_7.jpg"]},"Consult_chateau_formulaire37ee":{"id":"Consult_chateau_formulaire37ee","dept":"12","canton":"Saint-Geniez d","commune":"Cruejouls","nom":"Cruéjouls","type":"Château féodal","periode":"XV","histoire":"deux châteaux  à Cruéjouls, celui de Cruéjouls du XVe siècle et celui de Caylaret du XV-XVIIIe siècle .  CRUEJOULS, au XIIIe siècle dépend de  la baronnie de Calmont dOlt, mais changea de nombreuses fois de propriétaire au fil des siècles.   Le  château est construit au XVe siècle.  En 1478,  la famille de Cruéjouls abandonne le château au profit des La Panousse  en 1478.  Au XVIe siècle, durant les guerres de religions, les protestants souhaitent que le seigneur de Cruéjouls participe à leur révolte, mais il ne se laisse pas convaincre.  En 1581, le site est exploité par Antoine Salving, marchand à Espalion. La famille La Panousse est toujours propriétaire du château et des terres. En 1600, la famille La Panousse vend la seigneurie à Claude de Nogaret, vicomte de Trélans.  En 1725, le site appartient à Pierre de Bonhomme, trésorier général à Montauban. En 1779, le château est vendu à Jean Viguier de Grun, ancien gouverneur des pages des grandes écuries du Roi.  En 1788, le marquis de Pégayrolles baille le site à un avocat, Pierre Gervais. Au milieu du XIXe siècle, le marquis vend la seigneurie. A la fin du XIXe siècle, le site est possession de Sylvain Gervais. Vers 1930, le château est occupé par une école libre de jeunes filles  propriété de la communauté religieuse des surs minimes du Saint-Cur de Marie. CAYLARET;  en 1600 propriété de  la Panousse et  en 1788, le marquis de Pégayrolles baille le site à un avocat, Pierre Gervais, habitant à Caylaret.","architecture":"Cruéjouls, avant cette  construction, il y a un petit muret. Sa hauteur n'en fait pas une protection efficace, et son  épaisseur me laisse douter qu'il fut construit au Moyen-Age.  Dans ses formes généreuses, possède pas de système défensif. Les parois sont borgnes ou possèdent en étage de petites ouvertures de lumière rectangulaires qui ne sont point défensives.   Au sommet, la toiture en faible pente avec des épaisses tuiles calcaires ne laisse point entrevoir un chemin de ronde ni des mâchicoulis.  Entre 2 tours, la petite courtine comporte :  En partie basse, une fente verticale dont je ne peux affirmer si elle fut défensive ou éclairante.  Une ancienne porte d'accès sur la partie basse.  Le bâtiment comporte : un sous-sol,  un rez de chaussée,  un étage.  Chaque niveau est séparé par une voûte en berceau.  Les murs ont une épaisseur de 1,5m à 2,5m.\r\nCaylaret(ou Cayla) date du XVe et XVIe siècle. Il a été restauré en 1920. On remarque le donjon rectangulaire à mâchicoulis, la tourelle circulaire de lescalier  a été édifié aux XVe et XVIe siècles. Il possède un donjon à cinq niveaux rectangulaire à mâchicoulis et une haute tourelle cylindrique qui renferme l'escalier  accolé en façade d'un pavillon rectangulaire à deux niveaux. Il a été restauré au début du XXe siècle vers 1920. C'est une propriété privée.","habitants":"Famille La Panousse\r\n        \r\n        \"","divers":"Château de Cruéjouls et de Caylaret","gps":"","images":["../image/image_12/12_Cruejouls_1.jpg","../image/image_12/12_Cruejouls_2.jpg","../image/image_12/12_Cruejouls_3.jpg","../image/image_12/12_Cruejouls_4.jpg","../image/image_12/12_Cruejouls_5.jpg","../image/image_12/12_Cruejouls_6.jpg","../image/image_12/12_Cruejouls_7.jpg"]},"Consult_chateau_formulaire96ff":{"id":"Consult_chateau_formulaire96ff","dept":"12","canton":"Decazeville","commune":"Decazeville","nom":"Decazeville","type":"Château","periode":"XVII-XIX","histoire":"Cinq châteaux à Decazeville celui de Decazeville hôtel de ville, celui de Firmi , du Clots, et de Pagas vestiges.                         DECAZEVILLE, manoir construit en 1892 face à la statue  du duc de Decazes fondateur de la citée.  La Salle produisait du charbon dès le XVIe siècle, exporté par le Lot vers Bordeaux, mais en petites quantités. Louis XIV et ses successeurs, malgré les protestations de la paroisse, dotèrent leurs maîtresses de mines. Le duc Decazes (1780-1860) qui hérita des mines, créa en 1826, avec laide du polytechnicien Cabrol, les Houillères et Fonderies de l'Aveyron qui allaient faire de ce village-rue un grand centre sidérurgique. Au début de la monarchie de Juillet, la cité prit le nom de Decazeville. Les actes d'état civil de cette commune commencent en 1835. L'apogée fut atteinte au début du XXe siècle avec une population active de 9 000 travailleurs et une production d'un million de tonnes de fonte par an. Cette activité, aujourd'hui déclinante, a amené Decazeville à se diversifier et a développer d'autres industries : métallurgie, industrie du bois, chaudronnerie, production de tubes en acier.                                                    FIRMI; pas d'information historique.                                                                  CLOTS;   pas d'informations historiques                                       PAGAS; Vestiges, pas d'information historique.","architecture":"Decazeville château faisant fonction d'hôtel de ville construit en 1892 rectangulaire à deux niveaux et attiques surmonté d'un clocheton.                                                                                    Pagas vestiges de trois tours et d'un corps de logis rectangulaire.        Firmi quadrangulaire  à trois niveaux  corps de logis toiture en croupe flanqué d'une tour ronde à toit en coupole et d'une tour carrée toiture en poivrière  et tourelle.                                                Clots à Firmi en  forme de U deux tours rondes à l'entrée  prolongé de corps de logis avec donjon carré sur angle à l'arrière.","habitants":"ducs de Decazes\r\n        \"","divers":"Château de Decazeville , de Firmi, du Clots et les vestiges de Pagas","gps":"","images":["../image/image_12/12_Decazeville_1.jpg","../image/image_12/12_Decazeville_2.jpg","../image/image_12/12_Decazeville_3.jpg","../image/image_12/12_Decazeville_4.jpg","../image/image_12/12_Decazeville_5.jpg"]},"Consult_chateau_formulairee6e9":{"id":"Consult_chateau_formulairee6e9","dept":"12","canton":"Laguiole","commune":"St_Chély d","nom":"Domeries_Aubrac","type":"Tour","periode":"XIII","histoire":"DOMERIES AUBRAC (les), vers le XIIIe siècle, le Dômerie se détache de l'abbaye de Conques et devient rapidement \"autonome\", riche et puissante, il semblerait que l'Ordre du Temple ainsi que les chevaliers de Malte s'intéressent à cette riche Dômerie. En 1353, durant la guerre de Cent Ans, la tour dite des Anglais est construite. En 1437, la Domerie d'Aubrac tombe en commende\" bénéfice aux abbayes \". La commende de l'hôpital est d'abord donnée aux nobles du Rouergue à  Pierre d'Estaing, Jean-Pierre d'Estaing et Antoine d'Estaing, puis aux cardinaux Georges d'Armagnac, François d'Escoubleau de Sourdis, Jules Mazarin, Octave de Bellegarde, à l'archevêque de Bourges Anne de Lévis de Ventadour, et au cardinal Louis Antoine de Noailles. En 1695, ce riche bénéfice passe aux mains de Gaston de Noailles, évêque de Châlons. Pour lutter contre le relâchement des religieux, Gaston de Noailles fait appel aux Génovéfains mais ces derniers abandonnent, ne s'adaptant pas au rude climat de l'Aubrac. En 1697, Gaston de Noailles entre en pourparlers avec Jean III de Valbrune de Bélair, abbé de Chancelade. L'accord établi entre le dom d'Aubrac et l'abbé de Valbrune est approuvé par lettres patentes du roi en décembre 1698. Elles sont enregistrées par le parlement de Toulouse en 1699. Le 23 juin 1699, l'évêque de Rodez donne son consentement et permet aux religieux de Chancelade de prendre possession de la Domerie d'Aubrac. Les religieux sont comme leurs prédécesseurs des chanoines réguliers de Saint-Augustin, mais ont continués comme eux à être appelés hospitaliers. Au milieu du XXe siècle, la tour des Anglais assume la fonction d'auberge de jeunesse. A la fin du XXe siècle,  devient un gîte d'étape. Au XXIe siècle, la découverte de l'extérieur est libre et gratuite en respectant le silence du lieu.","architecture":"La tour des Anglais évidemment ceci est dû à son époque de construction et à \"l'occupation\" de notre Royaume par les troupes anglaises, après le mariage d'Eléonore d'Aquitaine avec le futur Roi d'Angleterre. Mais cette tour ne fut point construite par ces vils ennemis de notre Royaume, elle a pour fonction de lutter contre l'envahisseur qui harcèle le site. Cette construction du XIVe siècle a perdu son aspect défensif suite aux trop nombreuses modifications, mais avec ses 30 mètres de haut, sa fonction défensive est évidente. La tour de Bonnefon  a été construite au XVe siècle pour assurer la défense de la grange des moines de la Domerie d'Aubrac dite Bonnefon. Vers 1792, les révolutionnaires détruisent le monastère et chassent les religieux. Une partie des bâtiments est mise en vente.   En plus des Domeries, le château de Griffuelhe à Saint-Chély style maison forte à deux niveaux toiture en croupe  accolés de tours rondes à toits pointus pas d'informations historiques.","habitants":"Jean-Pierre d'Estaing \r\n        \"","divers":"Les Domeries en Aubrac; Bonnefond, tour des anglais, de Ruffepeyre etc.","gps":"","images":["../image/image_12/12_Domeries_Aubrac_1.jpg","../image/image_12/12_Domeries_Aubrac_2.jpg","../image/image_12/12_Domeries_Aubrac_3.jpg","../image/image_12/12_Domeries_Aubrac_4.jpg","../image/image_12/12_Domeries_Aubrac_5.jpg","../image/image_12/12_Domeries_Aubrac_6.jpg","../image/image_12/12_Domeries_Aubrac_7.jpg"]},"Consult_chateau_formulaire4696":{"id":"Consult_chateau_formulaire4696","dept":"12","canton":"Rodez","commune":"Druelle","nom":"Druelle","type":"Manoir","periode":"XV-XVI","histoire":"Deux châteaux à Druelle dont celui de Druelle et celui d'Ampiac.              DRUELLE, appartenait en 1171 à la famille de Saint-Paul. Bonnecombe y avait des droits. Au XIIIe siècle, les  la Barrière en étaient seigneurs. De la fin du XIIe au XVe siècle, les Rossinhol et les Bournazel, du Bourg de Rodez, en furent co-seigneurs. Les Viguier  en 1565. Les Girard ou Guisard y eurent des droits de 1520 à 1578. Les Rossinhol se maintinrent jusqu'à la fin de XVIe siècle. Pierre Rodat receveur des décimes, acquit la terre avant 1614. En 1634, Guillaume Rodat y acheta une métairie à Jean Salvan, d'Espalion, qui l'avait reçue d'Antoine Salvan, architecte de la cathédrale de Rodez, son grand-oncle  qui l'avait acquise en 1510. Sainte-Emilie de Rodat naquit à Druelle le 6 septembre 1787, quelle a vécu jusquà lâge de deux ans.                           AMPIAC: Prieuré de Saint-Christophe, à la nomination de l'évêque.  Résidence de la famille d'Ampiac citée en 1205, siège d'une baronnie. Brenguier d'Ampiac, en 1324 et Hector d'Ampiac, damoiseau, mentionné en 1343. Béatrix, seule descendance d'Hector, porta la seigneurie d'Ampiac à la famille de Saunhac, par son mariage avec Alzias de Saunhac de Belcastel, chevalier, en 1396. Plus remanié, le logis sud présente encore des témoignages de l'état du château du XIIIe siècle. Un partage de la justice fut décidé en 1323 entre le comte de Rodez et Dalmas de Vezins, dont la famille garda la seigneurie jusqu'à la fin du XVIe siècle. Avant 1470, par suite du mariage de Félice de Vezins, celle-ci passa aux Saint-Maurice. Au XVIIe siècle, elle appartenait à Jean de Portal, baron d'Ampiac. Castan et Toizac  l'avait achetée en partie le 16 mai 1658  et à Guyon de Saunhac, seigneur de Villelongue. A la veille de la Révolution, la seigneurie d'Ampiac est toujours détenue par la famille de Saunhac. Les actes de justice font alors état d'un \" vieux château en ruine \", et le logis sud est occupé par des domestiques.","architecture":"Druelle, corps de logis rectangulaire à trois  niveaux et attique prolongé en angle optique par un autre corps de logis à deux niveaux et  une tourelle à l'angle intérieure  du XVIe siècle toiture en poivrières. \r\nAmpiac : c'est un bâtiment carré avec une cour au milieu, flanqué d'une grosse tour du côté  nord, le mur denceinte rejoignait léglise qui n'est séparée du château que par une étroite ruelle, et de tourelles aux autres angles. Les murs, d'une grande épaisseur, sont en moellon noyé dans un ciment fort dur. La façade au levant donne sur la place du lieu. On y remarque aux combles d'élégantes croisées à fronton, construction évidemment postérieure au reste de l'édifice, dont le style semble annoncer le XIIIe siècle. Des mâchicoulis suivent la tête des tours, et les murs sont percé çà et là par des meurtrières dont la bouche béante donnait passage à l'arquebuse. Un écusson incrusté sur les murs de la grosse tour porte trois pommes de pin, posées deux et une, armes parlantes de la maison d'Ampiac.\r\nPradels : Au bord de l'Aveyron, château de Bernard Ségalar en 1450, puis des Brossinhac en 1484-1541. Il passa à une branche de la famille de Gozon au XVIIe siècle et aux Adhémar au XVIIIe siècle. Restes de sculptures Renaissance. Sagnes : Seigneurie et château des Urre de Mézérac de la fin du XVIIe siècle vendus en 1780 à M. Constans de Séguy.","habitants":"Famille dez Rodat                                                                                Famille d'Ampiac \r\n        \"","divers":"Château de Druelle, d'Ampiac de Pradels  et de Sagnes","gps":"","images":["../image/image_12/12_Druelle_1.jpg","../image/image_12/12_Druelle_2.jpg","../image/image_12/12_Druelle_3.jpg","../image/image_12/12_Druelle_4.jpg"]},"Consult_chateau_formulaire923d":{"id":"Consult_chateau_formulaire923d","dept":"12","canton":"Espalion","commune":"Entraygues-sur-Truyères","nom":"Entraygues","type":"Château","periode":"XIII","histoire":"ENTRAYGUES, dit de Montvallat, construit par Henri II, comte de Rodez entre 1278 et 1290.  frappé par l'importance que présentait pour la défense ce haut lieu de passage. Henri de Monvallat, nouveau seigneur d'Entraygues. En 1463, Jean V d'Armagnac, vicomte de Rodez, La famille Yzarn de Freissinet habitait le château d'Entraygues dans la première moitié du XIVe siècle. En 1406, Guillaume de Solages, seigneur de Tholet, portait aussi le titre de seigneur d'Entraygues, la seigneurie avait été concédée au XIVe siècle à : Guillaume de Balsac, fils de Ruffec de Balsac, sénéchal de Nîmes et de Cebili de Gozon.   En août 1588, au cours d'un épisode douloureux des guerres de religion, un capitaine huguenot nommé \"gentil\" parvint à s'emparer par ruse du château ce dernier est repris par les bandes calvinistes et détruit en 1587. Entraygues est ensuite donné à Pierre Prunhaut, seigneur de Moissy, Paule Vilallard, dame d'Entraygues épouse Henri de Montvallat, lieutenant de la compagnie de gendarmes de Noailles, sénéchal du Rouergue, qui fut tué devant Millau en 1629.  Plusieurs générations de Montvallat  de pères en fils se succèdent comme seigneurs d'Entraygues, jusqu'à 1789:  Entre 1654 et 1658, le nouveau propriétaire, Henri de Montvallat, fit reconstruire la partie centrale du château, les deux tours carrés ayant été préservées. Il fut alors vendu comme bien national en 1796 à Jean-Joseph Saury, officier de santé. Il changea ensuite plusieurs fois de propriétaire et appartient aujourd'hui à une communauté religieuse diocésaine, les soeurs de St-Joseph de Clairvaux. Il abrite l'école St Joseph ainsi que l'internat du collège.","architecture":"Entraygues, dès la fin de la construction du château fortifié, en 1290, on entreprit les remparts de la ville avec créneaux, tours de défense et portes d'entrée, il y aurait eu un pont levis de chaque côté, le tout entouré d'un fossé. Entraygues constituait un point stratégique au carrefour des voies de communication, au croisement des routes de l'Auvergne et de la Vallée du Lot. Les tours rondes de l'enceinte furent rasées par arrêté du parlement de novembre 1604. Des vestiges du XIIIe siècle il ne reste que les 2 tours, la cage d'escalier, la salle voûtée gauche du rez-de-chaussée.  Le château fut pillé et dévasté en 1587. Rasé en partie en 1604, un nouveau corps de bâtiment fut reconstruit au XVIIe siècle  fit bâtir 3 grosses tours séparées, surmontées de créneaux. Avec des corps de bâtiment rectangulaires à deux étages, l'ensemble formait un magnifique édifice. Loin d'un château de plaisance, il était une véritable forteresse militaire. Les tours, dont la base mesurait 2 mètres d'épaisseur ne comportaient d'ouverture qu'au troisième étage : les meurtrières. Il y avait également des tours rondes dans l'enceinte du château et dans l'une d'elle se trouvait la chapelle romane. Pour accéder au château, il fallait emprunter l'un des deux ponts-levis qui seuls permettaient de franchir les fortifications. la tour Farnal (du côté du Lot), la tour Panadèse (côté Truyère), qui remontent aux XIIIe siècle-XIVe siècle et d'un corps de logis qui a été édifié au XVIIe siècle.","habitants":"Famille d'Henri de Monvallat\r\n        \"","divers":"Château d'Entraygues","gps":"","images":["../image/image_12/12_Entraygues_1.jpg","../image/image_12/12_Entraygues_2.jpg","../image/image_12/12_Entraygues_3.jpg","../image/image_12/12_Entraygues_4.jpg","../image/image_12/12_Entraygues_5.jpg","../image/image_12/12_Entraygues_6.jpg"]},"Consult_chateau_formulairee562":{"id":"Consult_chateau_formulairee562","dept":"12","canton":"Espalion","commune":"Espalion","nom":"Espalion","type":"Palais_tour","periode":"XII-XVI","histoire":"A Espalion quatre châteaux, celui d'Espalion du XVIe siècle palais de Justice aujourd'hui, la Garde du XVIe-XVII siècles, de Masse du XVe siècle et le château fort de Calmont d'Olt du XIIIe siècle (voir article).                                                                                 ESPALION, la ville était du Xe siècle à la Révolution dominée par le château de basalte des seigneurs de Calmont d'Olt, dont subsistent, au sud, les ruines. Sans doute descendaient-ils d'un lieutenant mis en place par Charlemagne.                                    Le VIEUX PALAIS, édifié en 1572 par les soins de Bernardin de la Valette, seigneur de Coppadel,  gouverneur d'Espalion. A sa mort la demeure passa à sa fille Jeanne de la Valette et Bernardin de Bessuèjouls. Aprés 1599 géré par des consuls qui l'utilisent comme maison de la commune pour une école et mairie et prend le nom de \"Vieux palais\" le tribunal reste en ce lieu jusqu'en 1861, racheté en 1936 par la caisse d'épargne  qui le conserveront jusqu'en 1992,  il fut classé monument historique en 1912 et aménagé résidence d'artiste en 1992.\r\n MASSE, vers 1160, cité dans une donation. Au XIIe siècle, appartient à l'abbaye de Bonneval. En 1453, la tour est construite. en 1792 bien national l'abbaye  le récupère comme bien national. Après 6 siècles de possession,  la   tour appartient  à l'ancien fermier des terres de Bonneval : Pierre Constant Sagnes du Seguis. Au début du XIXe siècle, Benoît Jalabert, son gendre, devient le propriétaire. En 1848,  appartient à monsieur Bonald. En 1864, est vendu à Etienne Poulenc  Au XXe siècle, est toujours possession des héritiers de E. Poulenc. société civile immobilière est active depuis 1 an, elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers. Aujourd'hui également  en chambres d'hôtes.","architecture":"Espalion, vu du Pont-Vieux, ce château datant de la Renaissance, édifié entre le XIe siècle et le XVe siècle  de style renaissance en 1572, ses deux tours avaient une rôle défensif, avec ses tours et ses tourelles, prend tout son charme, dans le décor quasi théâtral qu'offrent le Lot et les maisons des tanneurs.   Le corps de logis éclairée par de larges fenêtres à meneaux est flanquée d'une tour coiffée d'un dôme, une autre tourelle plus élancée est couverte d'une toiture en poivrière.                                                                  Masse, la tour mesure à la base : 15m par 12m. Elle a une hauteur de 25m. Elle possède 4 étages.   protégé par un fossé, aujourd'hui comblé. L'accès se faisait par un pont levis, disparu aujourd'hui. La porte d'entrée est recouverte de fer. Un chemin de ronde couvert est visible sous le toit. En dessous, les mâchicoulis impressionnent. Ils sont portés par de larges arcatures, posées sur des consoles quadruples. Aux angles, les échauguettes facilitent la surveillance et la défense.","habitants":"Famille de Calmont d'Olt\r\n        \"","divers":"Espallion et son Vieux-Palais et le château  de Masse","gps":"","images":["../image/image_12/12_Espalion_1.jpg","../image/image_12/12_Espalion_2.jpg","../image/image_12/12_Espalion_3.jpg","../image/image_12/12_Espalion_4.jpg","../image/image_12/12_Espalion_5.jpg","../image/image_12/12_Espalion_6.jpg","../image/image_12/12_Espalion_7.jpg","../image/image_12/12_Espalion_8.jpg"]},"Consult_chateau_formulaire26c9":{"id":"Consult_chateau_formulaire26c9","dept":"12","canton":"Espalion","commune":"Espeyrac","nom":"Espeyrac","type":"Maison forte","periode":"XIII","histoire":"ESPEYRAC, Au XIIe siècle, fut le siège dune baronnie. Le château dont on fit léglise, appartint à une branche de la famille de Séverac du XIIIe et XIVe siècles,  Espeyrac fut la résidence des seigneurs de Panat. Au XIIIe siècle elle passa dans les mains des Sévérac. Le célèbre maréchal de France, Amaury de Sévérac était seigneur d'Espeyrac. En 1416, le maréchal Amaury de Séverac veillait à leur exploitation. Après sa mort, en 1427, les Armagnac qui régnaient sur 7 départements de notre midi possédaient le château d'Espeyrac. En 1508, par arrêté du parlement, Gui d'Arpajon entre en possession de l'héritage de Sévérac. A cette époque apparurent les Viguier, en 1502, Hugues Lagarrigue, prêtre rend hommage à Viguier, seigneur d'Espeyrac. Les Condamines dont la présence est signalé en 1681, prendront la succession des Viguier, comme seigneurs d'Espeyrac et occuperont le château jusqu'en 1816. Ils le vendront par lots à plusieurs personnes aux de La Roque-Sénergues, Bernardin de Frayssinet, comte de Valady, Marie Dayga, J Condamine,  Annat et Gaspard Nolorgues,  Joseph de Condamine, héritier dun de ces acquéreurs, possédait le château en 1787.","architecture":"Espeyrac possédait deux châteaux; la maison forte d'Espeyrac corps de logis  carrée de deux niveaux entre deux tours rondes à toits en poivrières.                                                                                               Le château
