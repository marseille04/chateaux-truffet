ompe. Le sommet conserve des consoles qui supportaient des mâchicoulis. La porte d'entrée est située au premier étage. Le logis est adossé à l'ouest, possédant trois niveaux éclairés de baies à meneaux. Une tour de section carrée cantonne l'angle sud-ouest et est couronnée de corbeaux. A l'est une porte en plein cintre inscrite entre deux pilastres supportant un bandeau surmonté d'un linteau triangulaire, donne accès à un escalier à vis. A l'intérieur, se trouvent deux cheminées du XVIIe siècle.  Rare donjon roman du XIIe siècle parfaitement conservé surélevé à la guerre de cent ans et  se visite aujourd'hui dans son état restauré du  XIVe siècle.","habitants":"Famille de Mouret\r\n        \"","divers":"Château de la Servayrie","gps":"","images":["../image/image_12/12_Servayrie_1.jpg","../image/image_12/12_Servayrie_2.jpg","../image/image_12/12_Servayrie_3.jpg","../image/image_12/12_Servayrie_4.jpg","../image/image_12/12_Servayrie_5.jpg","../image/image_12/12_Servayrie_6.jpg"]},"Consult_chateau_formulaire628e":{"id":"Consult_chateau_formulaire628e","dept":"12","canton":"La Cavalerie","commune":"Cornus","nom":"Sorgues_Aveyron","type":"Château","periode":"XIII","histoire":"Deux châteaux à Cornus celui de l'Aiguillon et celui de Sorgues du XVe siècle chambres d'Hôtes.                                                   SORGUES, érigé en l'an mille par le seigneur de Montpaon,  Sorgues, hameau niché à la résurgence de la rivière Sorgue, entre Cornus et Fondamente, était livré aux outrages du temps. Au départ manoir, construit par le seigneur de Montpaon, il est devenu château au travers de divers mariage et de son agrandissement au XIIIe siècle. Cornus joua un rôle important au temps de la réforme, la place embrassa la religion protestante, L'ancien château apparaît dés le XIe siècle par une famille de Cornus qui a été ensuite intégrée dans celle de Creissels. Cétait un fief important dés le XIIIe siècle où il appartenait aux de Maurice, il appartient ensuite aux du Pont de Camarès, aux de Saint-Beaulize, aux de Maureilhan puis aux Sambucy  tire son nom de la baronnie de Sorgues, achetée en 1774 par Auguste, Jean-Baptiste de Sambucy. La terre de Cornus et le château devint propriété de Richard de Rodez, puis du vicomte de Creissels, puis de la maison de Moncalm, de celle de Saucède, et de la maison d'Izarn.  Ce village possède dans la partie haute du bourg aux rues étroites des vestiges de fortification.Il était la propriété  des Bruguière et il a été repris en 1998 par la famille Giansily pour en faire des chambres d'hôtes. \r\nAIGUILLON, il sagit dune tour qui était située prés du Viala. Sa base toujours existante sert de signal trigonométrique sur le Larzac.","architecture":"Vestiges de la tour d'Aiguillon.\r\n Cornus, Il y avait deux châteaux, l'ancien château qui avait été fortifié au XVIe siècle, et sur lequel l'église a été bâtie sur son emplacement et le château actuel qui est en fait une grande maison dans la rue qui va vers cette église.\r\nCornus était entourée d'enceintes murés et d'ouvrages de défenses, elle devint ainsi une des places fortes des calvinistes durant les guerres de religion et eut des démêlés constants avec ses voisins.\r\n Sorgues, manoir du XVe siècle, restauré est situé à proximité de la rivière du même nom à 3 km au sud-est de Cornus.","habitants":"Famille de Cornus\r\n        \"","divers":"Château de Sorgues et celui de l'Aiguillon","gps":"","images":["../image/image_12/12_Sorgues_Aveyron_1.jpg","../image/image_12/12_Sorgues_Aveyron_2.jpg","../image/image_12/12_Sorgues_Aveyron_3.jpg","../image/image_12/12_Sorgues_Aveyron_4.jpg","../image/image_12/12_Sorgues_Aveyron_5.jpg","../image/image_12/12_Sorgues_Aveyron_6.jpg","../image/image_12/12_Sorgues_Aveyron_7.jpg","../image/image_12/12_Sorgues_Aveyron_8.jpg"]},"Consult_chateau_formulaire513c":{"id":"Consult_chateau_formulaire513c","dept":"12","canton":"Saint-Affrique","commune":"Saint-Affrique","nom":"St_Affrique","type":"Château","periode":"XIII-XIV","histoire":"Il y a plusieurs châteaux situés à Saint-Affrique et autour, dont celui de Caylus, au lieu-dit du « Rocher de Caylus » mais il n'en reste que quelques ruines, Bournac du XIII-XIXe siècle, Le mas de Rougier tour du XIVe siècle de Vailhauzy du XIXe siècle, de Roquefort-sur-Soulzon, et de  Versols.\r\nBOURNAC , est très ancien et est situé à 8 km de Saint Affrique sur la rive droite du Dourdou de Camarés qui va à St-Izaire. On en trouve la trace à la fin du XIIIe siècle où il appartenait aux maisons de Caylus, Combret et d'Ayssènes puis à Guillaume Bernard d'Olargues et à la famille de Panat jusqu'à la révolution. Il était à la limite du Comté de Millau face au domaine rouergat des anciens Comtes de Toulouse. En 1362, il fut occupé par les anglais et reconstruit en 1473. Il servit de presbytère aux XIXe et XXe siècles.\r\n VAILHAUZY   Bâti sur la rive sud, le château de Vailhauzy appartenait au XIIIe siècle à la famille de Naucoules. La demeure fut la propriété au XVIe siècle de la famille Blanc de Montaigut puis elle passa dans la famille de Solages, par le mariage en 1594, de Charles de Solages de Saint Jean d'Alzac avec Delphine de Blanc. Les Solages y firent longtemps leur résidence. En 1740, Antoine Paulin de Solages, marquis de Carmaux, vendit le château  à M. de Peyrot, de Millau, président trésorier de France à Montauban. Celui-ci fut père de Jean-François, baron de Brousse, seigneur de Vailhauzy et de Luganhac, conseiller au parlement de Toulouse, victime du tribunal révolutionnaire de Paris.                           ROQUEFORT et  VERSOLS pas d'information historique.","architecture":"Château de Bournac (XIIIe siècle, XVe siècle) restauré XIXe siècle. \r\nRuines du château de Caylus sur le rocher de Caylus qui domine la ville. \r\nChâteau du Mas Rougier: possède un logis rectangulaire, tour circulaire, tour carrée, meurtrières, et des mâchicoulis.\r\nMas-Rougier Edifice rectangulaire possédant une tour cylindrique à l'angle nord-ouest, une tour carrée en façade sud, une tourelle à l'angle nord-est. Plusieurs fenêtres à meneaux. Galerie voûtée d'arêtes sur la façade sud. Une chapelle fut installée au château en 1645, mais il n'en reste plus de trace.                                  Le château de Vailhauzy qui, dès l'année 1700, était fort délabré, et n'offrait plus que des ruines, a été reconstruit au XIXe siècle. Deux corps de logis en parallèle avec corbeaux et toitures en croupes sur cour fermée  par une tour ronde accolée  d'une échauguette en encorbellement, la cour est fermé par un mur munit d'un chemin de ronde à mâchicoulis et flanqué aux angles de trois tours rondes crénelées  et mâchicoulis, l'une d'elle accolée au corps de logis élevée au niveau de l'ensemble possède des corbeaux et  une toiture en poivrière.","habitants":"Famille de Panat                                                                                 Famille de Naucoules\r\n        \"","divers":"vestiges du château de Caylus, du Mas-Rougier, de Bournac, de Vailhauzy, de Roquefort et de Versols","gps":"","images":["../image/image_12/12_St_Affrique_1.jpg","../image/image_12/12_St_Affrique_2.jpg","../image/image_12/12_St_Affrique_3.jpg","../image/image_12/12_St_Affrique_4.jpg","../image/image_12/12_St_Affrique_5.jpg","../image/image_12/12_St_Affrique_6.jpg","../image/image_12/12_St_Affrique_7.jpg","../image/image_12/12_St_Affrique_8.jpg"]},"Consult_chateau_formulairec3d7":{"id":"Consult_chateau_formulairec3d7","dept":"12","canton":"Sévérac le Château","commune":"Saint-André de Vézines","nom":"St_André_Vézines","type":"Vestiges","periode":"XII-XIV","histoire":"Deux châteaux à Saint-André de Vézines celui de Marlavagnes du XIVe siècle, celui de Montméjean.                                                  MARLAVAGNES,   est situé à 3 km au sud est de la commune Saint-André de Vézines. Il possède une chapelle qui fut utilisée comme refuge par des prêtres réfractaires lors de la Révolution. On trouve l'origine de ce domaine au XIVe siècle où il était propriété des Vicomtes de Creissels, puis il passa  aux familles Gache,  aux Julien, aux de Malhac et de Bion qui pu prendre à cette occasion, le nom de Bion de Marlavagne. Un descendant de cette famille fut archiviste de l'Aveyron et écrivit une remarquable histoire de la cathédrale de Rodez. \r\nMONTMEJEAN, en 1133 appartient à Hugues, évêque de Rodez.   La famille de Montméjean posséda ce château du Xe au XVIe siècle, époque où elle s'éteignit, passa par alliance dans celle de Granger, toujours est-il que cette dernière possédait la seigneurie directe de Montméjean en 1576, qui comprenait dans son ressort Saint-André-de-Vézines et Brussac. Sur la fin du XVIIe siècle, Paule de Granger unique héritière de sa famille épousa Paul Dupuy-Montbrun et par ce mariage, tous les biens de Montméjean et Granger passèrent dans la maison Dupuy-Montbrun, jusqu'à la Révolution.  En 1808, Dupuy-Montbrun vend la plupart de ses biens de Montméjean  à Antoine Pargeul et Joseph Jory. Au XVIIe siècle, affirme l'abbé Delpal, habitait une famille riche du Causse Noir, la famille Ducros qui achètera en 1812 une des propriétés des seigneurs de Montméjean. Vers 1825, Hector Dupuy-Montbrun vendit le château de Montméjean aux familles du village. Melle Dupuy-Montbrun qui habitait encore Saint-Affrique en 1927 fut le dernier rejeton de cette famille qui s'est éteinte.","architecture":"Vestiges de la forteresse du château de Montméjean noblement bâtie sur un grand rocher composé de salles, chambres, cuisines, fours, citerne avec une grande tour carrée et une autre ronde avec mâchicoulis, gabions, à l'entrée avec un pont-levis et au devant de celui-ci une grande terrasse avec grange, écurie, jardin, volaille, et sur une des pointes dudit rocher un pigeonnier carré. On ne sait pas à quelle époque fut bâti le château de Montméjean, mais il paraît fort ancien et ce ne serait point exagéré de remonter son origine au Xe siècle ou XIe siècle.   Il ne reste du château qu'une tour ronde couronnée d'un encorbellement et ceinte de deux cordons de pierre à section carrée. En arrière est un jardin d'un tiers d'hectare. Deux murs le ferment en unissant les extrémités du rocher-assiette du château à la montagne. C'est par là que la forteresse était attaquable.   Le vieux village s'abrite sous un château millénaire qui s'élevait jadis et dont il ne reste actuellement qu'une tour ronde à encorbellement, perché sur un rocher abrupt qui domine de 400 mètres la vallée de la Dourbie et le village de La Roque-Sainte-Marguerite.","habitants":"Famille de Montméjean                                                                              Famille de Bion de Marlavagne\r\n        \r\n        \"","divers":"Vestiges du fort de Montméjean et le château de Marlavagnes","gps":"","images":["../image/image_12/12_St_Andre_Vezines_1.jpg","../image/image_12/12_St_Andre_Vezines_2.jpg","../image/image_12/12_St_Andre_Vezines_3.jpg","../image/image_12/12_St_Andre_Vezines_4.jpg","../image/image_12/12_St_Andre_Vezines_5.jpg","../image/image_12/12_St_Andre_Vezines_6.jpg"]},"Consult_chateau_formulaire8337":{"id":"Consult_chateau_formulaire8337","dept":"12","canton":"Séverac le Château","commune":"Saint-Beauzély","nom":"St_Beauzély","type":"Forteresse","periode":"XV-XVI","histoire":"deux châteaux à Saint-Beauzély, de Malboissière du XVIe siècle, manoir d'Azinières tour du XVe siècle et le château de Saint-Beauzély du XVIIe siècle.                                                              Saint-BEAUZELY, en 1238 à Bernard de Lévezou, passe aux de Combret XIIIe siècle par alliance, aux de Roquefeuil du XIVe siècle par alliance, vendu aux dArpajon du XV-XVIe siècle, puis aux de Castelpers-Panat-Combret (XVIe siècle) qui tentèrent de constituer une grande seigneurie protestante. Aux de Tauriac (1598-1621) , et aux de Grégoire des Gardies , aux  de Pégayrolles Julien de Pégayrolles qui acquirent la seigneurie au début du XVIIIe siècle, les biens des héritiers Grégoire des Gardies ayant été mis sous séquestre en 1716, pour dettes  En 1759, la famille de Julien qui a acquis les seigneuries de Castelnau  et de Saint-Beauzély, obtient le titre de Marquis de Pégayrolles couvrant ces deux seigneuries. Les seigneurs de Saint-Beauzély, étaient barons mais aucun na porté ce titre exclusif. Le château et la porte de la Madeleine, après 1789, il est vendu comme bien national à Poujade de La Devèze. Mélanie Poujade, sa sur, épouse Saint Maur de Gaujal, qui le donne alors,  aux surs de la Sainte Famille de Villefranche. Mère Émilie de Rodat, qui deviendra par la suite Sainte-Émilie, y installa une communauté religieuse et y fonda une école pour les jeunes filles. Les surs ont quittés le couvent en 1961. Elles ont vendu leur demeure à la municipalité qui reprendra le nom de  château, une association de bénévoles se met au travail dans le château et crée un musée.                                                                  MALBOISSIERE, pas d'information historique.                               manoir d'AZINIERES  chambres d'hôtes.","architecture":"Saint-Beauzély, de style Renaissance, état actuel date du XVIIe siècle, son existence est mentionnée en 1189.  Le fort primitif est devenu une construction massive  spacieuse et bien éclairée. Dans son état actuel, le bâtiment est composé de deux ailes, dont les murs sont couronnés de mâchicoulis, chemin de ronde et dun toit en lauzes. Le château fut reconstruit aux XVI-XVIIe siècle. Les armes des Tauriac  sont sculptées au-dessus de deux portes dont lencadrement classique (pilastres, arcs et clés en saillie, frontons et cartouches) est similaire à un porche de la rue Guilhem-Estève de Millau. Très massif, le château intègre une partie des remparts du bourg, mais ses façades sont ajourées par de très grandes fenêtres à meneaux qui lui confèrent un aspect plus palatial et moins défensif. Très belle taille de pierre et magnifique escalier à volées droites rampe sur rampe, avec arcatures, claire-voie et balustres. \r\nLe musée et la salle de classe du VIIIe siècle. Un rez-de-chaussée aux salles voûtées, trois étages de vastes salles desservies par un grand escalier central à double arcature et balustres centrales, un semblant de donjon dominant laile centrale lui donnent un modeste cachet de noblesse. Des fenêtres à croisées ajourent lintérieur. Deux belles portes dentrée à fronton triangulaire donnent accès au château. Lune souvre à lintérieur du bourg sur la rue de la Madeleine, surmontée dune échauguette surplombant la rue, ancienne porte dentrée de la ville à lépoque des remparts. Lautre débouche à lextérieur du bourg, coté nord sur le Subremur.","habitants":"Famille  de Pégayrolles \r\n        \r\n        \"","divers":"Château de Saint-Beauzély","gps":"","images":["../image/image_12/12_St_Beauzely_1.jpg","../image/image_12/12_St_Beauzely_2.jpg","../image/image_12/12_St_Beauzely_3.jpg","../image/image_12/12_St_Beauzely_4.jpg","../image/image_12/12_St_Beauzely_5.jpg"]},"Consult_chateau_formulaire1ba5":{"id":"Consult_chateau_formulaire1ba5","dept":"12","canton":"Saint-Geniez d","commune":"Saint-Côme d","nom":"St_Come_Olt","type":"Château","periode":"XIII-XIV","histoire":"Quatre châteaux à Saint-Come d'Olt; de Levinhac du XIIIe siècle, de Saint-Come du XIVe siècle 2 tours sur l'hôtel de ville, manoir de la Borie du XIVe siècle et le manoir du Colombier du XIVe siècle. Saint-COME, depuis le XIIIe siècle était érigé par 4 consuls élues chaque année. En 1528, Jean de Castelnau-Bretenoux, baron de Calmont d'Olt, concède des privilèges aux habitants. Antoine de Castelnau-Caylus, né après 1401, décédé en 1465, lieutenant général du roi Charles VII en Quercy, en 1442, résidence des  seigneurs de Castelnau de Bretounoux, puis des Curières de Castelnau,   grande et puissante lignée comptait, parmi ses descendants et alliés de prestigieux chefs de guerre et des princes de lEglise. En 1914, le général Edouard de Curières de Castelnau, né à Saint-Affrique, fut lun des plus fameux stratèges qui simposèrent au cours de la grande guerre, après avoir eu la douleur de voir ses fils fauchés au combat.   Transformé en pensionnat religieux en 1891, en 1970 les héritiers de la famille de Curières de castelnau ont cédé le manoir à la commune qui y installèrent la mairie.                                                                                 Pas d'information du château de Levinhac,  de la Borie  et du manoir du Colombier.","architecture":"Manoir des sires de Calmont prés de l'église construit au XIIe siècle restauré au XVe siècle façade Renaissance, les deux tours du XIVe siècle percées d'archères avec doubles étages de défense.                                                                                        St-Come, Le plan primitif obéissait aux contraintes qui lui étaient imposées par le rempart circulaire à lintérieur duquel il était clos et protégé. Quand, vers le milieu du XVIIe siècle, cette enceinte fut affranchie, de sa fonction défensive, dimportants fragments en furent conservés, aménagées et restaurées, ces antiques murailles sont devenues les façades de maisons individuelles. Le rempart ayant imposé au bourg quil enfermait le plan dun cercle autour du château qui en occupe le centre, cette disposition relativement originale et sensible sans quil soit nécessaire den avoir une vue densemble, communique à ce village une allure exceptionnelle, dailleurs confirmée par larchitecture  de certaines maisons dont les toitures présentent laspect de carène de vaisseaux renversés.   Au Moyen-Age, quand le rempart était encore une fortification, trois portes protégés chacune par un pont-levis et une tour qui enjambait le fossé permettait seules daccéder à lintérieur de la cité, porte  de la Barrieyre au sud porte du Théron à l'ouest et la porte neuve à l'est. Deux dentre elles subsistent encore, mais elles ont perdu la fonction de défense et de clôture pour lesquelles elles avaient été conçues par ses propriétaires,  les fossés remplacés par un boulevard au XVIIe siècle.","habitants":"Famille de Castelnau-Bretenoux\r\n        \"","divers":"Château de Saint-Come d'Olt, de Lévinhac et le manoir de la Borie et du Colombier","gps":"","images":["../image/image_12/12_St_Come_Olt_1.jpg","../image/image_12/12_St_Come_Olt_2.jpg","../image/image_12/12_St_Come_Olt_3.jpg","../image/image_12/12_St_Come_Olt_4.jpg","../image/image_12/12_St_Come_Olt_5.jpg","../image/image_12/12_St_Come_Olt_6.jpg","../image/image_12/12_St_Come_Olt_7.jpg","../image/image_12/12_St_Come_Olt_8.jpg","../image/image_12/12_St_Come_Olt_9.jpg"]},"Consult_chateau_formulaire1358":{"id":"Consult_chateau_formulaire1358","dept":"12","canton":"Millau","commune":"Saint-Georges de Luzençon","nom":"St_Georges_Luzencon","type":"Forteresses","periode":"XIII-XVI","histoire":"Cinq châteaux à Saint-Georges de Luzençon; de Brouzes, de Cabenous du XVIe siècle, les ruines des  comtes de Toulouse du XIIIe siècle, de Saint-Geniez-Bertrand du XIVe siècle  et de Vergohac du XVIIIe siècle.                                                                  Saint-Georges de Luzençon portait auparavant le nom de Saint-Georges de Valserena. Les révolutionnaires, voulant effacer tous les noms de Saints, l'appelèrent la Vallée Pure. Vallée dans laquelle coule le Cernon, de la ville on peut apercevoir, le château des comtes de Toulouse.\r\nBROUZES, famille de notables millavois connue depuis des siècles. Carbon : le nom de famille Carbon est connu comme nom de notaire à Creissels, au XVIIe siècle. Il est néanmoins vrai que nous sommes dans une région productrice de lignite et quil est possible que lon ait affaire à une ancienne exploitation de charbon.\r\nST-GENIEZ-BERTRAND, premier propriétaire la famille de Creissels. Prieuré et château qui appartient à l'évêque de Rodez, puis à celui de Vabres. En 1389, les routiers s'emparèrent du château. Celui-ci fut reconstruit aux XIVe et XVe siècles par les nobles  Montjaux, Ricard, Garceval , par alliance aux Lastic Saint-Jal, toujours par alliance  à François de Lavezou de Vezins. A la Révolution, Saint-Geniez fut appelé Lavencou. L'église du XVe siècle a été en partie refaite à la fin du siècle dernier. Des mines de charbon et de couperose furent exploitées à partir du XVe siècle par les Vezins (1517), puis les Tubières, seigneurs de Luzençon.\r\nCABANOUS, du  comte Mathias du Bourg de Luzençon, château construit en 1563 par Charles de Tubières, seigneur d'Arbussel, gouverneur protestant de Saint-Rome de Tarn. Sa fille le vendit à Jacques Joly, ministre protestant.                                            VERGONHAC, château des Valettes du XVIIIe siècle, qui aurait abrité quelques temps sous la Révolution, Marc-Antoine Charrier, chef des chouans de l'Aubrac.\r\nPas d'information des autres châteaux.","architecture":"St-Geniez Bretrand,  la bâtisse actuelle est la plus importante des seigneurs de Saint-Geniez, cette construction, est typique du château repaire, cest-à-dire une maison seigneuriale fortifiée mais non entourée dune enceinte propre et construite dans un site dépourvu de défense naturelle. Les bâtiments sordonnent autour de la cour centrale. En façade, la tour de gauche remplit la fonction symbolique de donjon, mâchicoulis avec reliefs trilobés et tourelles d'angles. C'est au XVe siècle qu'il faut dater le splendide corps de logis, long de 10 mètres en façade et profond de 23 mètres, qui forme l'aile du repaire; Le château Saint-Geniez Bertrand est un édifice militaire, dont la partie supérieure a été rasée, possédant des échauguettes, des mâchicoulis et des fenêtres à meneaux. Une petite cour intérieure possède une galerie avec voûtes d'arêtes. L'escalier, la porte et la cheminée remontent à la fin de la période gothique. La chapelle se trouve au sud.                                 St-Georges Il trouve ses origines au XIe siècle, les ruines du château des comtes de Toulouse du XIIIe siècle (les remparts et la tour de défense) ainsi que la chapelle en témoignent. Au sommet du village, la vue à 360° rend stratégique ce lieu pour les seigneurs de lépoque. Brouzes  ferme fortifiée sur le Larzac avec galeries et grandes voûtes, classée monument historique du XVIIe siècle.  Vergonhac, forteresse corps de logis rectangulaire à cinq niveaux  toits en croupes flanqué d'un pavillon d'entrée saillant toit à la Mansard flanqué d'une grande baie redondante avec balcon et donjon carré côté droit.","habitants":"Famille Carbon                                                                                  Famille de Creissels\r\n        \"","divers":"Vestiges du château de st-Georges, château de Saint-Geniez Bertrand, de Brouzes et de Vergonhac","gps":"","images":["../image/image_12/12_St_Georges_Luzencon_1.jpg","../image/image_12/12_St_Georges_Luzencon_2.jpg","../image/image_12/12_St_Georges_Luzencon_3.jpg","../image/image_12/12_St_Georges_Luzencon_4.jpg","../image/image_12/12_St_Georges_Luzencon_5.jpg","../image/image_12/12_St_Georges_Luzencon_6.jpg","../image/image_12/12_St_Georges_Luzencon_7.jpg","../image/image_12/12_St_Georges_Luzencon_8.jpg","../image/image_12/12_St_Georges_Luzencon_9.jpg"]},"Consult_chateau_formulairedff0-2":{"id":"Consult_chateau_formulairedff0-2","dept":"12","canton":"Saint-Affrique","commune":"Saint-Izaire","nom":"St_Izaire","type":"Château","periode":"XIV","histoire":"ST-IZAIRE, le château est construit par Guillaume Rotlindes (ancêtre des actuels Rollinde de Beaumont) qui en fait don à l'Abbaye de Vabres. En 1317, le prieuré et la coseigneurie de Saint-Izaire deviennent propriété des  évêques de Vabres. Pendant la guerre de Cent Ans, Étienne de Vassignac, 7e évêque, prend le parti des anglais qui installent une garnison au château. Elle sy maintient jusquen janvier 1370. Guillaume de Bastidos, 9e évêque, entreprend la restauration des remparts. Au XVe siècle, les évêques sinstallent à Saint-Izaire. Les chanoines de Vabres réclament le retour de Jean de Pierre, 10e évêque. À lépoque de la Réforme, les crises ramènent les évêques à Saint-Izaire, notamment après 1568, année où la cathédrale et le palais épiscopal de Vabres sont incendiés par Antoine de Crussol. François Ier de la Valette-Cormusson, 17e évêque, doit payer une rançon et se réfugie à Saint-Izaire.\r\nFrançois III de la Valette-Cornusson, 20e évêque, commence la réalisation de nouveaux appartements en 1639 et 1644 qui se poursuit jusquà Louis de Baradat, 23e évêque et filleul de Louis XIV. Ce dernier réunit des synodes diocésains au château,  en 1679. En 1710, le château tombe en ruines. Jean de la Croix de Castries, 25e et dernier évêque, le fait déclarer « en vétusté », ce qui le dispense de son entretien. En 1791, le château est mis en vente comme bien national; il est acquis par un ancien fermier de lévêque. En 1819, une nouvelle vente a lieu; des lots sont constitués. En 1845, la partie occupée par le presbytère est acquise par la commune. En 1852, les surs de Saint-Joseph de Lyon achètent le reste du château pour y diriger une école et un pensionnat; les surs dEstaing leur succèdent. En 1988, la commune devient propriétaire de la totalité du bâtiment qu'elle loue à lassociation « Vie et Château », qui y crée un petit musée à la mémoire du passé du village et des habitants de Saint-Izaire. En 2004, le château accueille les locaux de la mairie.","architecture":"Cet édifice de Saint-Izaire, massif en pierre rouge, de plan quadrangulaire, était gardé au milieu de l'aile sud par une haute tour-donjon démolie de moitié au XIXe siècle. On y retrouve des fresques murales dans le donjon datant du XIVe siècle, des escaliers à vis et un plafond dans la chambre des évêques de style baroque datant du XVIIe siècle. Les bâtiments  déterminent la cour intérieure dont l'entrée s'effectue a l'ouest par une porte qui s'ouvrait autrefois dans un avant corps montant jusqu'au toit,  sur la façade sud , au centre sur laquelle se dresse un donjon dont les parties hautes crénelées  ont été abattues au XIXe siècle. Les échauguettes aux angles une seule subsiste et une tourelle en bois et en  torchis. Son imposante masse ne laisse pas deviner le raffinement de certains éléments de son décor intérieur. Cet édifice conserve en effet des traces de lépoque où les évêques avaient le même mode de vie que les grands seigneurs. Ses grandes salles abritent des expositions permanentes dart rural et doutillage artisanal, une salle de classe ainsi quun remarquable musée de larcherie traditionnelle. Au rez-de-chaussée une grande salle toute en voûtes accueille noces et banquets toute lannée.","habitants":"Guillaume Rotlindes\r\n        \"","divers":"Château de Saint-Izaire","gps":"","images":["../image/image_12/12_St_Izaire_1.jpg","../image/image_12/12_St_Izaire_2.jpg","../image/image_12/12_St_Izaire_3.jpg","../image/image_12/12_St_Izaire_4.jpg","../image/image_12/12_St_Izaire_5.jpg"]},"Consult_chateau_formulairecd0c-3":{"id":"Consult_chateau_formulairecd0c-3","dept":"12","canton":"La Cavalerie","commune":"Saint-Jean et Saint-paul","nom":"St_Jean_Aclas","type":"Fort","periode":"XII","histoire":"FORT DE SAINT-JEAN D'ACLAS, cité en 1153  appartient à l'abbaye de Nonenque en 1170. Au XIV-XVe siècle, Le village est autorisé à se fortifier pour se défendre contre les pillards (routiers) qui sévissent dans la région. En 1573 : Pendant les guerres de religion, l'abbesse  cistercienne  de Nonenque et ses religieuses doivent se réfugier à Saint-Jean-d'Alcas suite au pillage de l'abbaye. Puis elles iront se réfugier dans le château de Saint-Izaire. Au XIIe siècle , les terres sont la possession de l'abbaye de Nonenque. Entre 1440 et 1445, l'abbesse ordonne la construction d'un puissant fort ayant aussi la fonction de grenier pour les récoltes.  En 1572, lorsque l'abbaye de Nonenque est attaquée par les Huguenots, l'abbesse et les religieuses se réfugient à Saint-Jean d'Alcas. Vers 1792, les révolutionnaires réquisitionnent le fort.","architecture":"St-Jean d'Aclas;  au XIIe siècle, le petit hameau dAlcas se transforme en village dépendant de labbaye cistercienne de Nonenque. Le fort s'offre au visiteur d'aujourd'hui dans sa conception du XVe siècle. Entouré de remparts puissants qui le protègent, le château flanqué de deux tours, le tout crénelé,  même si son enceinte et la presque totalité de ses maisons sont contemporaines de luvre des hospitaliers du XVe siècle, St-Jean-dAlcas nest pas une fondation templière ou hospitalière.  Avec la guerre de Cent ans, les préoccupations défensives apparaissent. Entre 1439 et 1445, fut construite une enceinte parfaitement régulière de 62.5 mètres sur 37, incluant léglise et flaqué de tours circulaires à chaque angle.  Lentrée dans le fort se fait par une grande porte à arc brisé, sommée dune rangée de mâchicoulis. Les maisons, assez semblables entre elles, sappuient pour la plupart à la muraille.  Enceinte quadrangulaire  défendue par quatre petites tours d'angle, ce fort de plan rectangulaire mesurant 87m x 37m. L'épaisseur du rempart atteint par endroit 1 mètres.   La hauteur des murs varie de 18  à 20 mètres. Les 4 angles sont pourvus d'une tour ronde. Au Sud, la portanelle a la même fonction qu'une poterne. De nombreuses archères sont encore visibles. Les tours comportent aussi de petites archères. Des latrines à encorbellement s'affichent encore fièrement.","habitants":"Abbaye de Nonenque\r\n        \"","divers":"Vestiges de la forteresse de Saint-Jean d'Aclas","gps":"","images":["../image/image_12/12_St_Jean_Aclas_1.jpg","../image/image_12/12_St_Jean_Aclas_2.jpg","../image/image_12/12_St_Jean_Aclas_3.jpg","../image/image_12/12_St_Jean_Aclas_4.jpg","../image/image_12/12_St_Jean_Aclas_5.jpg","../image/image_12/12_St_Jean_Aclas_6.jpg","../image/image_12/12_St_Jean_Aclas_7.jpg","../image/image_12/12_St_Jean_Aclas_8.jpg","../image/image_12/12_St_Jean_Aclas_9.jpg"]},"Consult_chateau_formulaire2161":{"id":"Consult_chateau_formulaire2161","dept":"12","canton":"Millau","commune":"St-Jean du Bruel","nom":"St_Jean_du_Bruel","type":"Vestiges","periode":"XV","histoire":"Vestiges et châteaux à St-Jean du Bruel, le château d'Algues dit  château de Roquefeuil, berceau de la famille de ce nom.\r\n BRUEL, du Moyen-Age au XVIIIe siècle, l'histoire de Saint-Jean-du-Bruel est liée à celle de la famille des Roquefeuil d'Anduze dont le fief se trouvait au château d'Algues.  la famille de Roquefeuil possédait  dans la plaine le château de Saint-Jean, d'abord appelé Saint-Jean-de-Roquefeuil, est devenu Saint-Jean-du-Bruel durant le haut Moyen-Age et le château de Nant et de Castelnau, régnèrent plus de 600 ans.  En 1625 le duc de Rohan, chef des calvinistes, soulève les Cévennes contre le cardinal de Richelieu, et établit son quartier général à Saint-Jean où il tient une assemblée. Sur ordre de Richelieu, le château d'Algues est brûlé. Après la Révocation de l'Edit de Nantes en 1685, les Saint-Jeantais se convertissent peu à peu au catholicisme. En 1789 st-Jean de Bruel devient la Sentinelle, reprit son nom en 1792.      \r\nVIALA,  ancien chef lieu de la famille Anduze, Roquefeuil avant son transfert à Meyrueis. En 1367, il fut assiégé par les routiers et défendu avec succès par Arnaud de Roquefeuil il négocia également le rattachement à la France de Millau en 1369 jusque là sous protectorat anglais. Les calvinistes sy réfugièrent lors des guerres de religion et Richelieu le fit détruire en 1629.","architecture":"Ce château-fort, de Roquefeuil, berceau de la famille de ce nom, dont il reste des ruines sur les hauteurs, antérieur au XIIe siècle, est situé sur un pic dominant le village de Saint-Jean au dessus du confluent de la Dourbie et du Roubieu à lest de Nant,  détruit en 1629 et dont on peut voir encore quelques ruines. Ce lieu est chargé d'histoire : croisade des Albigeois, guerre de religion, conflits avec les Templiers.  Les possessions des seigneurs de Roquefeuil étaient immenses et s'étendaient du bas Languedoc à la ville de Meyrueis. \r\n St-Jean du Bruel est une cité marquée par les guerres de religion. En  1560, le village adopte la réforme calviniste en quasi-totalité, contrairement à Nant la cité voisine située à 6 kms qui reste catholique. La guerre éclate entre les 2 bourgades. Pillages et massacres réciproques se multiplient jusqu'à l'Edit de Nantes de 1598.  Sur ordre de Richelieu, le château d'Algues est brulé. Après la Révocation de l'Edit de Nantes en 1685, les St-Jeantais se convertissent peu à peu au catholicisme.","habitants":"Famille des Roquefeuil \r\n        \"","divers":"Vestiges du château de Saint-Jean de Bruel dit d'Algues  château du Viala et de Castelnau","gps":"","images":["../image/image_12/12_St_Jean_du_Bruel_1.jpg","../image/image_12/12_St_Jean_du_Bruel_2.jpg","../image/image_12/12_St_Jean_du_Bruel_3.jpg","../image/image_12/12_St_Jean_du_Bruel_4.jpg","../image/image_12/12_St_Jean_du_Bruel_5.jpg","../image/image_12/12_St_Jean_du_Bruel_6.jpg","../image/image_12/12_St_Jean_du_Bruel_7.jpg","../image/image_12/12_St_Jean_du_Bruel_8.jpg"]},"Consult_chateau_formulaire2288":{"id":"Consult_chateau_formulaire2288","dept":"12","canton":"La Cavalerie","commune":"Saint-Juery","nom":"St_Juery","type":"Maison forte","periode":"XVI","histoire":"ST-JUERY,  outre son château du XVIe siècle encore aujourd'hui habité, Saint-Juéry a le privilège de posséder 2 églises, la plus récente datant du début du siècle et la seconde, plus ancienne et de style roman, daterait du XIIe ou XIVe siècle. Aujourd'hui exploitation agricole à responsabilité limitée est active par monsieur Xavier Delmas. Avant dériger son église, Saint-Juéry eut jadis un château de la possession de la famille de Fontanges et de Marie-Angélique, une des maîtresse de Louis XIV.\r\n Mais cet édifice fut brûlé lors de la seconde guerre mondiale par les allemands. La reconstruction ajoutera, en ce même lieu, une tourelle et un clocher à flèche.","architecture":"la maison forte de St-Juéry dit château corps de logis rectangulaire à deux niveaux toitures à deux pans accolé de quatre tours rondes à toit presque plats  dont sur une tour le toit est d'un seul pan incliné.","habitants":"M Xavier Delmas\r\n        \"","divers":"Maison forte de Saint-Juery","gps":"","images":["../image/image_12/12_St_Juery_1.jpg","../image/image_12/12_St_Juery_2.jpg","../image/image_12/12_St_Juery_3.jpg","../image/image_12/12_St_Juery_4.jpg"]},"Consult_chateau_formulaireee1e":{"id":"Consult_chateau_formulaireee1e","dept":"12","canton":"Sévérac le Château","commune":"Saint-Laurent d","nom":"St_Laurent_Olt","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Saint-Laurent d'Olt, les Hermeaux  du XVIIIe siècle  et Perrier pas d'information historiques .                        HERMEAUX,  domine toujours Saint-Laurent et est connu également sous le nom du château des Ormeaux. Antoine Alexis Valette était propriétaire en 1781, sa famille le possédait encore en 1878. En 1884, les derniers Valette des Hermaux, comtesses de Verthamar et de Perpignan vendirent le château et ses dépendances à la société civile des orphelinats agricoles d'Algérie dont le siège social était à Maison Carrée (Alger). Après la dissolution de la société en 1906, le château fut vendu aux enchères en 1910, et adjugé à monsieur Henri Bazire, avocat à Paris. Ce dernier le vendit en 1919 à monsieur Marc Au, missionnaire d'Afrique habitant Saint-Laurent pour y établir un noviciat de Pères Blancs. Sous l'impulsion du cardinal Lavigerie, on y ouvrit une école. En 1948, ils y installèrent une maison de retraite. En 1955, ils furent contraints de vendre le château, qui servit de cadre pendant quelques années, à des colonies de vacances du Bassin Houiller. Puis la CAF de l'Aveyron l'acheta pour le transformer en maison de vacances pour familles. Ce fut l'Opepa qui l'acheta en 1962.","architecture":"Le château est connu sous le nom de château des Ormeaux (devenu château des Hermaux). L'édifice actuel date du XVIIIe siècle et du début du XIXe siècle. C'est un bâtiment allongé, encadré de deux pavillons rectangulaires. Un étage est enterré à flanc de montagne et comporte un escalier pour monter au premier étage. Il arbore des fenêtres ovales, une grande porte dans le même style, avec sur la clé de voûte un motif sculpté en forme de palmes, s'encadrant dans la façade du pavillon central, surmontée au niveau du toit d'un fronton triangulaire dans lequel s'ouvre une petite fenêtre. Il est bâti sur l'emplacement de l'ancien château féodal de Saint-Laurent, dont quelques vestiges subsistent dans les parties basses de l'aile en retour, face à l'ouest , ainsi qu'une petite tour ronde appartenant jadis, aux défenses de la porte principale de l'enceinte.  Maison forte d'Estables,  le hameau  se situe à 1 km à l'est de St-Laurent. On retrouve sa trace en 1435 lorsque P. de la Roue demanda l'autorisation de construire à Estables une forteresse.","habitants":"Famille Antoine Alexis Valette \r\n        \"","divers":"Château de Saint-Laurent d'Olt dit des Hermeaux","gps":"","images":["../image/image_12/12_St_Laurent_Olt_1.jpg"]},"Consult_chateau_formulaire3cf1":{"id":"Consult_chateau_formulaire3cf1","dept":"12","canton":"Pont de Salars","commune":"Saint-Léons","nom":"St_Léons","type":"Château","periode":"XV","histoire":"St-LEONS,  château du XVe siècle date de la construction de 1445 à 1455, édifié pour les seigneurs-prieurs de Saint-Léons. Il fut construit par le prieur Amblard Paulin sur lemplacement dune ancienne église. Le village de Saint Léons était aux mains des routiers en 1389. Le prieur Guyon de Combret opta pour le calvinisme et prit les armes, le monastère fut transformé en forteresse. Les catholiques assiégèrent la place, bombardèrent le village et détruisirent léglise. Après les Guerres de Religion, il demeura la résidence seigneuriale du prieur jusquà la Révolution. Il fut mis en vente comme bien de la nation en 1792.\r\nChâteau Aujourd'hui abrite un centre de formation professionnel.","architecture":"Saint-Léons, le château de Saint Léons domine le village et  toujours habité et en état,  on voit sur son mur nord deux ouvertures qui devaient servir de passage des chaines du pont-levis. Situé sur une très forte pente, la propriété comporte une succession de bassins,  d'autres ouverts servant à recueillir les eaux des sources. il semble qu'il existe un souterrain entre le château et la partie basse du village ou se situait le prieuré. Epargné lors des sièges de Saint-Léon, il conserve l'essentiel de son architecture originale, de plan rectangulaire à six niveaux  couronné de mâchicoulis toitures en croupes et flanqué  de trois tours rondes avec toitures assez plates.","habitants":"Prieur Amblard Paulin\r\n        \r\n        \"","divers":"Château fort de Saint-Léons","gps":"","images":["../image/image_12/12_St_Leons_1.jpg","../image/image_12/12_St_Leons_2.jpg","../image/image_12/12_St_Leons_3.jpg","../image/image_12/12_St_Leons_4.jpg","../image/image_12/12_St_Leons_5.jpg","../image/image_12/12_St_Leons_6.jpg"]},"Consult_chateau_formulaire276b":{"id":"Consult_chateau_formulaire276b","dept":"12","canton":"Saint-Affrique","commune":"St-Rome de Cernon","nom":"St_Rome_Cernon","type":"Château","periode":"XIII-XV","histoire":"A Saint-Rome de Cernon, au  Moyen-Age a aussi laissé sa trace avec cinq châteaux : Mélac du XIIIe siècle ( Voir article), Montclarat, donjon carré, logis du XVe siècle, arasé sous Richelieu, Saint-Rome du XIVe siècle, et de Laumière du XVII- XIXe siècles. \r\n MONTCLARAT,  se situe à 3 km au sud est de Saint-Rome de Cernon, en 1360 le noble damoiseau  Jean de Gozon y fit construire un manoir qui  fut la  propriété de la famille de Gozon, puis il passa  à la famille Tubières, aux Morlhon de Laumière, et aux Montcalm-Gozon. La demeure fut prise en 1595 par une troupe de brigands commandé par le capitaine du Vigan qui réclamèrent 4000 écus pour le rendre. Monsieur d'Arpajon obtint la restitution de ce bien après avoir rassemblé une troupe.\r\nLAUMIERE, on trouve trace de l'ancien château en 1322, où il était habité par Raymond de Vanco de Banc d'Anglars, puis au XVe siècle où il était propriété de la maison d'Armagnac, il passa ensuite à la maison de Morlhon, au Vernhet de Grandval et au Sambucy de Sorgue. La seigneurie de Laumière fut cédée aux Vernhet au XVIIIe siècle qui devinrent Vernhet de Laumière. Un général Vernhet de Laumière s'illustra en commandant l'artillerie de la garde impériale au Second Empire. Il mourut au Mexique au siège de Puebla en 1863. Au XIXe siècle, Maria de Sambucy l'apporta en dot au comte de Toulza.    Aujourd'hui, location de logements par monsieur Didier Bessou.","architecture":"Le château de St-Rome de Cernon est du XIIIe siècle. Il est situé sur les hauteurs au cur de la ville. Il est privé et en cours de restauration. Il fut fortifié en 1372 sur injonction du vicomte de Creissels. Il ne reste aujourd'hui que des vestiges  sur le mamelon au dessus du village.                                                                   Montclarat reflète tout le passé de la commune de Saint-Rome-de-Cernon. Celui-ci a été construit vers le XVe siècle. Cétait un château fort réalisé au temps des rivalités féodales et les diverses guerres. Plus maison forte que château à plusieurs éléments de construction à différents niveaux, le plus élevé et le bâtiment central.                                                                                        Laumière, le château se situe à 3 km au sud est de Saint-Rome, il a été reconstruit depuis la Révolution.","habitants":"Famille de Gozon\r\n        \"","divers":"Vestiges du château de Montclarrat, château de Laumière et de Mélac","gps":"","images":["../image/image_12/12_St_Rome_Cernon_1.jpg","../image/image_12/12_St_Rome_Cernon_2.jpg","../image/image_12/12_St_Rome_Cernon_3.jpg","../image/image_12/12_St_Rome_Cernon_4.jpg","../image/image_12/12_St_Rome_Cernon_5.jpg","../image/image_12/12_St_Rome_Cernon_6.jpg","../image/image_12/12_St_Rome_Cernon_7.jpg","../image/image_12/12_St_Rome_Cernon_8.jpg","../image/image_12/12_St_Rome_Cernon_9.jpg"]},"Consult_chateau_formulaire8cda":{"id":"Consult_chateau_formulaire8cda","dept":"12","canton":"Pont de Salars","commune":"Saint-Rome du Tarn","nom":"St_Rome_Tarn","type":"Château","periode":"XIV","histoire":"Quatre châteaux à Saint-Rome de Tarn, dont  Saint-Rome de Tarn du XIXe siècle hôtel de ville,    Brousse du XIVe siècle  (voir article) de Nayrac du XIVe siècle,  et le château-fort d'Auriac vestiges donjon du XIe siècle (voir article).                                  St-ROME-du-TARN . Au Xe siècle, un château fort, dit « de la tour grosse », est construit. Lactuel château de Saint-Rome de Tarn fut construit par Alphonse Dejean en 1866. Il demeure dans le village plusieurs maisons seigneuriales intéressantes, mais dont lhistorique nest pas connu et dont une aurait été lHôtel particulier de ces seigneurs. Saint-Rome de Tarn relevait de la vicomté de Creissels, et aurait appartenu à la famille de Saint-Maurice, qui lapporta ensuite aux dAuriac et aux de Mostuéjouls. En 1392, la communauté du bourg racheta tous les droits familiaux, Saint-Rome devint domaine des Rois de France avec la maison de Gozon. Les guerres de religion y furent très virulentes. Baudinet, calviniste, prit Saint-Rome de Tarn en 1568 et passa toute la garnison au fil de lépée, la ville fut reprise trois mois plus tard et dArbussels de Tubières fut mis à mort par Vezins son propre cousin germain.                                                                           AURIAC ,  le château supérieur avec le donjon (Bournahou) propriété de la famille d'Auriac et le château inférieur prés de l'église Saint Martin, propriété de la famille de Bernard. Le tout fut entouré d'un mur d'enceintes avec tours devenant une forteresse importante.                                                                                              NAYRAC(voir article)","architecture":"L'histoire connue de St Rome de Tarn remonte au Ve siècle. Au Xe siècle, la population doit pour soutenir les assauts des envahisseurs construire un fort dit « tour grosse» des remparts dont il subsiste encore une série de portes fortifiées. Les vestiges du pont du XIe siècle sont en partie visibles de nos jours. Ruiné lors des guerres de religion, au XVIe siècle, le bourg est peu à peu reconstruit, gardant ses enceintes fortifiées, mais s'ouvrant sur les faubourgs  où logeait tout un petit peuple d'artisans, tandis que le centre du bourg était pratiquement réservé à la noblesse, au clergé et aux notables.\r\nSous la Révolution, St Rome prit un temps le nom de « Pont-Libre ». C'est dans cette période que naquit Denis Auguste Affre (27 septembre 1793), élu Archevêque de Paris en 1840, tué lors de la Révolution de 1848 sur les barricades où il était allé porter des paroles de paix.  L'enceinte du village médiéval avec ses portes fortifiées, ses rues étroites et ses fenêtres à meneaux.  du château servant d'hôtel de ville corps de logis carré à trois niveaux et de deux lucarnes sur chaque côté  et échauguettes polygonales sur chaque angles toitures très effilés polygonales également avec donjon carré au centre.                                                                    Auriac, ce château dominait le pont de St Rome de Tarn à 1km au nord est de Saint Rome. Il est antérieur au XIe siècle, où il n'était qu'une tour refuge, il fut transformé en château féodal en deux parties : le château supérieur avec le donjon (Bournahou)  actuellement en ruines.","habitants":"Famille d'Alphonse Dejean                                                                     Denis Auguste AFFRE\r\n        \"","divers":"Village fortifié  avec son château, château de Brousse , de Nayrac et d'Auriac","gps":"","images":["../image/image_12/12_St_Rome_Tarn_1.jpg","../image/image_12/12_St_Rome_Tarn_2.jpg","../image/image_12/12_St_Rome_Tarn_3.jpg","../image/image_12/12_St_Rome_Tarn_4.jpg","../image/image_12/12_St_Rome_Tarn_5.jpg"]},"Consult_chateau_formulaire8639":{"id":"Consult_chateau_formulaire8639","dept":"12","canton":"Villeneuve","commune":"Saint-Rémy","nom":"St_Rémy_Aveyron","type":"Château","periode":"XIII","histoire":"Saint-REMY, le château de Saint Rémy a été construit au XIIIe siècle. Appartenant aux évêques de Rodez, sa vente aurait permis de payer une partie de la rançon de François Ier en 1525.  Plus tard il appartiendra à la famille de Campmas. Ce château possédait sans doute une tour refuge pour les habitants. Elle seffondra en 1784. Le village de Saint-Rémy était également entouré de fortifications.","architecture":"Le château de Saint Rémy a été construit au XIIIe siècle, il possède un logis carré et une tour dangle circulaire. Il a été remanié ultérieurement. Le village occupe un petit vallon sur les rives de lAlgousse, au cur du sentier botanique du moulin de Ricard, avec 22 essences naturelles et 20 autres replantées. La belle église romane avec son clocher du XIIe siècle a subi quelques remaniements au XVe siècle.","habitants":"Famille de Campmas\r\n        \r\n        \"","divers":"Château féodal de Saint-Rémy","gps":"","images":["../image/image_12/12_St_Remy_Aveyron_1.jpg","../image/image_12/12_St_Remy_Aveyron_2.jpg","../image/image_12/12_St_Remy_Aveyron_3.jpg","../image/image_12/12_St_Remy_Aveyron_4.jpg","../image/image_12/12_St_Remy_Aveyron_5.jpg","../image/image_12/12_St_Remy_Aveyron_6.jpg","../image/image_12/12_St_Remy_Aveyron_7.jpg"]},"Consult_chateau_formulaire448a-2":{"id":"Consult_chateau_formulaire448a-2","dept":"12","canton":"Séverac le Château","commune":"Saint-Saturnin de Lenne","nom":"St_Saturnin_Lenne","type":"Château","periode":"XII-XVII","histoire":"trois châteaux à Saint-Saturnin de Lenne, celui de Grun du XVe siècle, chambres d'hôtes de la Roque de Valzergues du XII-XXIIIe siècles et  de Saint-Saturnin du XIXe siècle                               ROQUE-VALZERGUES, c'était l'une des quatre châtellenies et celle qui passait pour la plus sure et la plus considérable. Il fut la propriété des seigneurs de Calmont d'Olt puis du comte de Toulouse et du Rouergue, entra et sorti à plusieurs reprises du domaine royal, Simon de Montfort y séjourna. Il entra dans la maison d'Armagnac, puis dans celle d'Arpajon, fut pris par les anglais durant la guerre de cent ans puis libéré.\r\nSt-SATURNIN  construit en 1806 par Buré de Lamothe qui se tua en inspectant le travail de ses ouvriers.  Après 1918 le château changea de propriétaire qui le fit aménagé. Il était jusquà une période récente la propriété dune association de protection de la jeune fille.   Aujourd'hui chambres d'hôtes de la famille Lenton.\r\nGRUN; ancienne construction qui appartenait à la maison de Chirac puis aux La Roque. La possession de ce château de Grun donna lieu à une guerre fratricide impressionnante en 1608 entre les descendants issus de deux mariages différents. Marie de La Roque de Grun avait épousé dans un premier temps Gammeville, veuve elle se remaria à de Bénaven. Les enfants issus des deux mariages se disputèrent la succession à partir de 1608. En 1610, le sieur de Gammeville s'empara du château . Un peu plus tard, en décembre 1612, ce sont les frères Bénaven qui reprirent le château. En 1613, Villeveyre le reprit .Enfin, en 1645, le vice sénéchal Jean de Viguier assiégea le château détenu par de Bénaven et le força à le restituer aux Boissonade. Finalement, l'héritière Boissonade épousa Jean de Viguier, qui par la suite s'allia aux Valady. Un des descendants, Marie-Joseph-Gabriel-Déodat de Valady fut tué par la foudre à l'age de vingt ans en 1841. Le château appartient aujourd'hui à la famille Chassaly.","architecture":"La Roque de Valzergues. le château était bâti sur l'énorme rocher qui domine le village, il en reste quelques ruines.  Il s'agissait d'une des plus puissantes forteresses du Rouergue féodal, dont le rôle était de défendre la frontière du Gévaudan tout en servant de prison, celle dont le château passait pour le plus considérable et le plus sûr. Des vestiges des anciens remparts subsistent encore ainsi qu'une poterne dans laquelle a été aménagé un petit musée.  présentant des outils anciens,  Il faut voir également quelques belles demeures anciennes et bien sûr l'église romane, autrefois chapelle du château. Le château fut rasé en 1622 à la demande des habitants qui ne voulaient plus en assurer l'entretien.                    Grun, sa construction remonterait au XIVe siècle sur une ancienne bâtisse  de plan rectangulaire à quatre niveaux toits en croupes pavillon d'entrée hors oeuvre au milieu de la façade toitures en dôme.                                                                                                 ST-Saturnin  Les travaux furent arrêtés et le château demeura sans escalier intérieur pendant tout le XIXe siècle. La demeure est située au milieu du village et fut un temps lécole des garçons de plan rectangulaire à deux niveaux à sept travées toitures en croupes.","habitants":"Famille de Buré de Lamothe\r\n        \"","divers":"Château de Saint-Saturnin, de Grun  et de la Roque de Valzergues","gps":"","images":["../image/image_12/12_St_Saturnin_Lenne_1.jpg","../image/image_12/12_St_Saturnin_Lenne_2.jpg","../image/image_12/12_St_Saturnin_Lenne_3.jpg","../image/image_12/12_St_Saturnin_Lenne_4.jpg","../image/image_12/12_St_Saturnin_Lenne_5.jpg","../image/image_12/12_St_Saturnin_Lenne_6.jpg","../image/image_12/12_St_Saturnin_Lenne_7.jpg","../image/image_12/12_St_Saturnin_Lenne_8.jpg"]},"Consult_chateau_formulaire0733":{"id":"Consult_chateau_formulaire0733","dept":"12","canton":"La Cavalerie","commune":"Saint-Sernin sur Rance","nom":"St_Sernin_Rance","type":"Vestiges","periode":"XII","histoire":"Château fort de Saint-Sernin a été  la propriété des Templiers puis des chevaliers de Saint-Jean de Jérusalem. Il fut par la suite propriété dune famille de Saint-Paul puis du comte dArmagnac et de Jean de Bérizac. Une tradition orale dit que ce château fut détruit à une époque indéterminée par le peuple qui sétait mutiné. Un chapitre fut fondé en 1442 par le pape Eugène IV en raison du nombre important de bourgeois installés dans la ville. C'est ainsi qu'a été construite l'église collégiale à nef à quatre travées.","architecture":"Saint-Sernin est une très ancienne cité. Le bourg était fortifié : Il se dressait au centre de Saint-Sernin entre léglise et la place, à son point culminant. Il disposait de tourelles, de poternes et dun pont-levis. Il fut pris et repris par les deux parties durant les guerres de religion. Il avait quatre tours et quatre portes qui existaient encore à la fin du XVIIIe siècle. Bien qu'il ne reste que peu de vestiges de ces fortifications, le village a conservé son aspect médiéval. L'ancienne maison du prévôt, hôtel particulier du XVe siècle, abrite aujourd'hui la mairie.","habitants":"Famille de Saint Paul \r\n        \"","divers":"Patrimoine de Saint-Sernin","gps":"","images":["../image/image_12/12_St_Sernin_Rance_1.jpg","../image/image_12/12_St_Sernin_Rance_2.jpg","../image/image_12/12_St_Sernin_Rance_3.jpg","../image/image_12/12_St_Sernin_Rance_4.jpg","../image/image_12/12_St_Sernin_Rance_5.jpg"]},"Consult_chateau_formulaire87b1-2":{"id":"Consult_chateau_formulaire87b1-2","dept":"12","canton":"La Cavalerie","commune":"Saint-Sever de Moustier","nom":"St_Sever","type":"Château","periode":"XIV","histoire":"St-SEVER-château dit de LINAS, Jean-Jacques de Goudon, seigneur de Linas, co-seigneur de St-Sever, puis seigneur de Senaux, épouse par contrat du 10 mai 1663 Françoise de Maillan de Lustrac, fille de Jean de Maillan de Solages de Tholet seigneur de Joux, et de Magdeleine de Lustrac.  Françoise de Maillan appartenait à la famille de Gilibert de Maillan, écuyer, seigneur de Granlac, Pessades, Maleville et autres places, qui testa le 9 septembre 1572, soit seize jours après la Saint-Barthélemy, devant Me Maynadier, notaire, en déclarant notamment; \"proteste vouloir vivre et mourir en l'union de la foy telle que nous l'avons par la Sainte parole de Dieu\". Jean-Jacques de Goudon rendit hommage de la terre de Senaux, au diocèse de Castres, et de celle de St-Sever, en Rouergue, devant les trésoriers de France de la généralité de Toulouse le 23 juillet 1667. Il fut tué en duel en pleine rue de Castres le lundi 5 mars 1668, à la pointe du jour, par son jeune beau-frère Jean de Maillan, cornette au régiment de Nanteuil, qui lui disputait le haut du pavé. \r\n Il eut de son mariage un fils. Jean de Goudon, seigneur de Senaux, de Saint-Sever et de Rouquette, né le 22 août 1666, épousa par contrat de mariage du 22 juin 1698 Esther de Puech de Longuevergne, fille de Jean de Puech, et d'Anne de Franc de la Sautié, qu'il avait épousée après la mort de sa première femme Jeanne de Cabrol. C'est lui qui, avec son oncle Jonathan, fut confirmé dans sa noblesse en 1699 par M. Le Pelletier de La Houssaye puis par M. de Barville. Il fit son testament le 4 août 1711 et mourut le 27 septembre 1718 laissant de son mariage plusieurs enfants : dans cette famille jusqu'en 1944 .","architecture":"Mairie de Saint-Sever  telle qu'elle fut construite en 1846 ne différait pas fondamentalement de la version que nous en connaissons aujourd'hui (bâtiment moins haut, toit nu et sans ouvertures). C'est en 1902, sous le mandat d'Ernest Pillon, que la mairie acquiert son aspect moderne.                                                                                      Château de Linas aujourd'hui exploitation agricole par Jean-Jacques Houles","habitants":"Famille de Jean-Jacques de Goudon\r\n        \"","divers":"Patrimoine de Saint-Sever","gps":"","images":["../image/image_12/12_St_Sever_1.jpg","../image/image_12/12_St_Sever_2.jpg","../image/image_12/12_St_Sever_3.jpg"]},"Consult_chateau_formulaire53c9":{"id":"Consult_chateau_formulaire53c9","dept":"12","canton":"Pont de Salars","commune":"Saint-Victor de Melvieu","nom":"St_Victor_Melvieu","type":"Tour Château","periode":"XIII","histoire":"Château de Gozon, les ruines du château s'élèvent sur un pic à 1,5 km au nord ouest des Costes-Gozon. La famille de Gozon l'habita jusqu'au début du XIVe siècle, époque où il fut pris par une bande de routiers. Les habitants du village les expulsèrent et le château fut détruit et abandonné à cette occasion. Les ruines du château furent vendues comme biens nationaux en 1794 avec une châtaigneraie. Elles furent rachetées ultérieurement par le marquis de Montcalm-Gozon.Tour et ancien château de Montcalm à Saint-Victor, situé dans le village.  Visite du Centre d'Interprétation de l'Art Mural et de la Fresque. Dans le château des Montcalm de Gozon, un aménagement de 300 m2 de visites vous permettront de découvrir l'art mural de la haute antiquité à nos jours.\r\n Ancienne seigneurie des Montcalm-Gozon, famille du célèbre Dieudonné de Gozon. C'est là que Dieudonné de Costes-Gozon grand maître des chevaliers de Saint-Jean de Jérusalem aurait exercé ses chiens pour délivrer ensuite l'île de Rhodes du fameux dragon.","architecture":"A quelques distances du village, les ruines du château et de la chapelle des Gozon, bâtis sur une hauteur à 678 m d'altitude, offrent des points de vue remarquables sur les alentours. Se trouve sur place une table d'orientation. Le village aux maisons serrées les unes contre les autres ne manque pas de charme.\r\nDonjon du château crénelé chemin de ronde et mâchicoulis échauguettes accolés à cette dernière.","habitants":"Famille de Gozon\r\n        \"","divers":"Tour du château de Gozon à Saint-Victor de Melvieu","gps":"","images":["../image/image_12/12_St_Victor_Melvieu_1.jpg","../image/image_12/12_St_Victor_Melvieu_2.jpg","../image/image_12/12_St_Victor_Melvieu_3.jpg","../image/image_12/12_St_Victor_Melvieu_4.jpg"]},"Consult_chateau_formulaire5606":{"id":"Consult_chateau_formulaire5606","dept":"12","canton":"Sévérac le Château","commune":"Roque-Sainte-Marguerite","nom":"St_Véran","type":"Vestiges","periode":"XI-XVIII","histoire":"Saint-VERAN,  est le berceau de la famille de Montcalm. Raymond de Saint-Véran vend en 1288 au comte de Rodez la moitié  du château et toutes ses fortifications. De 1362 à 1369, le château est occupé par les anglais. Il est pris, en 1402, par le connétable Bertrand VII d'Armagnac. C'est en 1425, que Raymond de Montcalm ancien chirurgien-barbier du comte Jean IV d'Armagnac, lui rend hommage selon l'usage féodal pour la terre de Saint-Véran et la moitié de son château. Mais ce n'est qu'en 1661 que Louis III de Montcalm en rachetant l'autre moitié deviendra effectivement à part entière seigneur de Saint-Véran. La famille conservera alors ce fief jusqu'à la Révolution.  Le comte de Rodez Jean IV, fait en 1447, renforcer l'ensemble des défenses du château. Charles d'Armagnac, vicomte de Creissels, baron de Roquefeuil s'en empare par surprise alors qu'il était sous séquestre royale. Siège de la forteresse, de 1470 à 1475, par Guillaume de Sully, sénéchal du roi de France, pour mettre fin aux exactions commise par Charles d'Armagnac. Louis Joseph de Saint-Véran, marquis de Montcalm, nommé par le roi Louis XV général en chef de ses troupes en Amérique septentrionale y fera un ultime séjour juste avant son départ pour le Canada en février 1756.  La restauration du château est actuellement effectuée par la famille Savarin de Marestan.","architecture":"les vestiges du château avec son mur d'enceinte et la tour ronde, au hameau de Saint-Véran, accroché aux rochers, un donjon existerait depuis le XIe siècle sur le rocher.Du château dont la construction remonte au tout début du XIe siècle ne subsiste aujourd'hui qu'une partie du logis seigneurial ainsi que son donjon cylindrique.  Adaptation des défenses à l'usage des armes à feu de 1442 à 1444. La forteresse est démantelée à partir de 1485. Les pierres récupérées servent alors de matériau de construction pour les habitations du village, restauration de certaines défenses du château majeur en 1563, après le saccage de Saint Véran par les protestants. En 1670, le château majeur est en ruine, seul le corps de garde a encore une toiture. En 1956, le château majeur est dépouillé de certains éléments utilisés pour la restauration du château mineur, ce qui accentue son délabrement.  Du château dont la construction remonte au tout début du XIe siècle ne subsiste aujourd'hui qu'une partie du logis seigneurial ainsi que son donjon cylindrique.","habitants":"Famille de Montcalm\r\n        \r\n        \"","divers":"Vestiges du château fort de Saint-Véran dit de Montcalm","gps":"","images":["../image/image_12/12_St_Veran_1.jpg","../image/image_12/12_St_Veran_2.jpg","../image/image_12/12_St_Veran_3.jpg","../image/image_12/12_St_Veran_4.jpg","../image/image_12/12_St_Veran_5.jpg","../image/image_12/12_St_Veran_6.jpg","../image/image_12/12_St_Veran_7.jpg","../image/image_12/12_St_Veran_8.jpg","../image/image_12/12_St_Veran_9.jpg"]},"Consult_chateau_formulaire32c0":{"id":"Consult_chateau_formulaire32c0","dept":"12","canton":"Villeneuve","commune":"Sainte-Croix","nom":"Ste_Croix_Aveyron","type":"Château","periode":"XVIII","histoire":"Sainte-CROIX, la commune est formée de trois villages : Cénac, Marin et Sainte-Croix qui ont chacun leur histoire et leur patrimoine : La première mention qui est faite de Sainte-Croix date de 852. Dès le XIIe et XIIIe siècles, un certain nombre de familles puissantes apparaissent dans les textes : les Balaguier, les Mirabel, les Rouget, les Molières et  les Saumade. Des alliances se nouent entre ces familles qui possèdent les grands domaines de la commune , Molières, la Pauze, etc.  Le Baron Alibert, médecin de Louis XVIII et Charles X, également lun des fondateurs de la dermatologie y avait un domaine ou il fut enterré en 1838.\r\nMARIN situé au sud-ouest était une seigneurie de lévêque de Rodez au XIIe et XIIIe siècle.  De Colonges, conseiller, garde des Sceaux à la Cour du sénéchal pour Cénac\r\n Les Morlhon et les Balaguier pour le manoir de Molières, aujourd'hui propriété de la famille Coluche.\r\nCENAC au sud-est est un petit hameau avec un château à proximité. On y trouve également une église du XVe et XVIe siècle avec un sanctuaire de plan carré de type roman. Le village conserve une porte des anciennes fortifications. La belle résidence du XIXe siècle du baron Alibert, fondateur de la dermatologie, se situe sur cette commune.                                                           SEMBEL, Ernest Constant, ambassadeur à Constantinople, ministre de l'Intérieur de 1889 à 1892, propriétaire du château de Sembel.                                                                                        GOUZOU, pas d'information historique.","architecture":"Sainte-Croix est un ancien bourg fortifié de murailles et entouré de fossés qui sont encore visibles. Le village est dominé par une grande tour carrée à mâchicoulis qui sélève à 25 mètres de hauteur, bâtie sur le chur de léglise, elle jouait le rôle dabri fortifié pour les habitants.                                                              Château du Gouzou; de plan en U  à deux niveaux  lucarnes et attiques pavillon d'entrée polygonale, l'ensemble est accolée de tour ronde et tourelle sur les angles. Aujourd'hui utilisé pour le commerce de gros par Gilles Delperie\r\nTrioulou,  Jardin d'agrément dit parc du château du Trioulou, patrimoine classé, étudié ou inscrit dit Jardin d'agrément .\r\n Château de Sembel, corps de logis rectangulaire, toiture à la Mansart avec lucarnes à deux niveaux deux pavillons à toits pointus avec oeil de boeuf en lucarnes sur la surface avant avec escalier. \r\n Château de Cénac conserve une porte de fortification et un sanctuaire de plan carré de type roman.","habitants":"Le Baron Alibert\r\n        \"","divers":"A sainte Croix d'Aveyron, Tour du château, le château de Marin, de Cénac, de Trioulou de Sembel et de Gouzou","gps":"","images":["../image/image_12/12_Ste_Croix_Aveyron_1.jpg","../image/image_12/12_Ste_Croix_Aveyron_2.jpg","../image/image_12/12_Ste_Croix_Aveyron_3.jpg","../image/image_12/12_Ste_Croix_Aveyron_4.jpg","../image/image_12/12_Ste_Croix_Aveyron_5.jpg","../image/image_12/12_Ste_Croix_Aveyron_6.jpg"]},"Consult_chateau_formulairee1bf-2":{"id":"Consult_chateau_formulairee1bf-2","dept":"12","canton":"La Cavalerie","commune":"Ste-Eulalie de Cernon","nom":"Ste_Eulalie","type":"Forteresse","periode":"XII","histoire":"COMMANDERIE, l'histoire Templière de Sainte-Eulalie débute en 1152. LOrdre du Temple va ensuite bénéficier de multiples donations, notamment celle de Raymond Bérenger, roi d'Aragon et héritier des vicomtes de Millau qui lui donne toutes ses possessions dans la région ainsi que lautorisation de la fortifier. Les Templiers vont devenir les principaux propriétaires du Larzac et Sainte Eulalie de Cernon leur commanderie dont dépendent, la Cavalerie et La Couvertoirade.   En 1158, Raymond Bérenger, roi dAragon et comte de Barcelone, en sa qualité de tuteur de Raymond Bérenger II, vicomte de Millau, donne à Élie de Monbrun, la ville de Sainte-Eulalie, et la terre dite \"Larzac\" qui lentoure, avec permission dy construire des villas et des places fortes. En 1312, après la dissolution de lordre du temple, les hospitaliers vont à leur tour marquer de leurs empreintes l'architecture de Sainte-Eulalie de Cernon.    À partir de Sainte-Eulalie, les Templiers organisent le territoire du Larzac, et construisent à Sainte-Eulalie une grande commanderie, qui deviendra une des plus puissantes du sud de la France. A la fin de lordre du Temple, la ville passe sous domination hospitalière en 1312. En 1377, pendant la nuit du 11 juillet, François de Roquefeuil, un seigneur voisin issu de la puissante maison de Roquefeuil, incendie le château et pille la ville. De 1442 à 1450, les remparts de la ville sont alors construits par Déodat Alaus, maître maçon de Saint-Beauzely.  A la Renaissance, la ville sembellit : le château devient villégiature de commandeurs comme Jean-Antoine Riqueti de Mirabeau,  et se pare de fresques remarquables. En 1575, la ville est pillée par les protestants lors des guerres de religion. A la Révolution Française, une grande partie de la splendeur de Sainte-Eulalie est détruite, et la commanderie est démantelée en 8 lots vendus aux enchères. Depuis 1970, les lots  sont réunis à nouveau et lensemble monumental mis en valeur.","architecture":"Les Hospitaliers au XVe siècle, font construire les remparts autour du village. Ils apportent le charme et l'agrément du Sud avec des aménagements au XVIIe siècle visant à transformer la Commanderie en \"Résidence d'été\" du Commandeur.  Dans les années 1970  la commune de Sainte Eulalie achète le bâtiment communautaire pour le restaurer et louvrir à la visite. Actuellement, elle restaure les appartements privés du Commandeur.\r\n Plongez dans lhistoire templière et hospitalière, découvrez le cadre de vie de ces moines soldats en visitant léglise romane, la cour intérieure et le bâtiment communautaire avec la salle des fresques, léchauguette et ses graffitis, le dortoir et le réfectoire. Commanderie L'austérité architecturale est atténuée au XVIIe par le percement d'ouvertures et par la \"décoration\" intérieure. On y retrouve toutes les influences méridionales : Provence, Italie, Malte. Les murailles de la ville mesurent entre onze et douze mètres de hauteur tandis que les tours ont elles une hauteur de vingt mètres et sont couronnées de mâchicoulis. Sur la place, à l'emplacement de l'ancien cimetière des Templiers se tient la fontaine qui est l'uvre du commandeur Jean de Bermouy-Villeneuve au milieu du XVIIe siècle.","habitants":"Les Templiers et  les Hospitaliers \r\n        \"","divers":"Commanderie de Sainte-Eulalie","gps":"","images":["../image/image_12/12_Ste_Eulalie_1.jpg","../image/image_12/12_Ste_Eulalie_2.jpg","../image/image_12/12_Ste_Eulalie_3.jpg","../image/image_12/12_Ste_Eulalie_4.jpg","../image/image_12/12_Ste_Eulalie_5.jpg","../image/image_12/12_Ste_Eulalie_6.jpg","../image/image_12/12_Ste_Eulalie_7.jpg"]},"Consult_chateau_formulaireccec":{"id":"Consult_chateau_formulaireccec","dept":"12","canton":"Saint-Giniez d","commune":"Sainte Eulalie de Cernon","nom":"Ste_Eulalie_Cernon","type":"Château","periode":"XII-XV","histoire":"Trois  châteaux à Sainte-Eulalie, de Castelsarazin du XIIe siècle vestiges, château fort de Cornalach du XVIe siècle vestiges et le château fort de ste-Eulalie commanderie du XIIe siècle (voir article), chateau de la Barraque hôtel restaurant .  \r\nCASTELSARAZIN, ce château portait aussi le nom de Cornalaitz. Il se situait dans le bois de la Motte, sur la commune de Ste-Eulalie à proximité de l'église de St Etienne du Larzac en allant vers la Cavalerie. Pas d'informations historiques.                     CORNALACH  Divers possesseurs, dont l'abbé de Conques se partageaient son mandement  Château construit vers 1562 par un notaire de Sainte Eulalie d'Olt, il fut restauré en 1968 par M. Boubal, également propriétaire du café de Flore à Paris.                                     PUECH  est une maison d'hôtes occupant un château du XVIe siècle.","architecture":"Castelsarazin Il aurait été construit par les sarrasins au IXe siècle. On mentionne son existence au XIe siècle. Il aurait été abandonné après la croisade des albigeois. Ses ruines sont encore visibles mais très difficile d'accès.   Cornalach commandait la vallée du Cernon jusqu'à son confluent avec le Soulzon et défendait l'église de Saint-Estève. Château fort  avec tours carrées sans crénelage mais avec les vestiges des mâchicoulis, des rondes, mais toujours sans créneau, certaines comportent des ouvertures obstruées, ancien souvenir du chemin de ronde, d'autres, en plus de l'accès bouché au chemin de ronde, possèdent des vestiges de latrines en encorbellement.  Hôtel Renaissance, construit au XVIe siècle, abrite un escalier à vis desservant les trois étages dissimulés dans sa tour d'angle. Il est de même style que le château de Curières, se composant de quelques fenêtres à bords chanfreinés. Sa porte d'entrée ornée de clous ciselés nous cache mystérieusement les somptuosités de l'intérieur, à trois étages.","habitants":"Evêque de Rodez\r\n        \"","divers":"Château de Castelsarazin, de Baraque, de Cornalach et du Puech","gps":"","images":["../image/image_12/12_Ste_Eulalie_Cernon_1.jpg","../image/image_12/12_Ste_Eulalie_Cernon_2.jpg","../image/image_12/12_Ste_Eulalie_Cernon_3.jpg","../image/image_12/12_Ste_Eulalie_Cernon_4.jpg","../image/image_12/12_Ste_Eulalie_Cernon_5.jpg","../image/image_12/12_Ste_Eulalie_Cernon_6.jpg","../image/image_12/12_Ste_Eulalie_Cernon_7.jpg"]},"Consult_chateau_formulaired8f5":{"id":"Consult_chateau_formulaired8f5","dept":"12","canton":"La cavalerie","commune":"Saint-Eulallie d","nom":"Ste_Eulalie_Olt","type":"Château","periode":"XV","histoire":"SAINTE-EULALIE-OLT, maison-forte du XVe siècle qui appartenait à la famille de Curières, dont les chevaliers firent la première croisade avec Saint Louis.  CURIERES de Castelnau fut construit au XVe siècle sur les vestiges des grandes écuries de l'ancien château médiéval. Le château médiéval, bâtit par l'évêque de Rodez, était avant tout un ouvrage lié à la défense du territoire. A l'origine de l'existence de Sainte Eulalie d'Olt, il couvrait la majeure partie du bourg actuel et s'étendait jusqu'au Lot. Ce village était un Oppidum, c'est-à-dire un verrou militaire défendu par une place forte. Mais aujourd'hui, il n'en reste rien.  Le château des Curières de Castelnau est privé. Ancienne résidence de la famille de Curières de Castelnau.","architecture":"Le château de sainte-Eulalie d'Olt, primitif tomba en ruine et fut remplacé, à la fin du XVe siècle, par l'édifice actuel. De plan  rectangulaire, avec une légère avancée et une tour d'escalier hors oeuvre côté jardin. La façade sur la place comporte un porche et une fenêtre à meneaux gothique. La façade sur jardin est animée par le volume demi circulaire de la tour d'escalier. A l'intérieur une cheminée renaissance dans le bureau et une cheminée gothique portant des traces de peinture dans le séjour, et plafonds à la française dans les trois étages. Cest au Moyen-Age que naquit Sainte-Eulalie-dOlt. Les remparts rehaussés de tours qui labritent valent à la petite cité le nom de \"Castrum\". Malgré de nombreux changements au cours des siècles, son bourg organisé en arcs de cercles successifs autour de sa place centrale, lui a permis de conserver  son authenticité. Jadis, ces maisons aux toits de lauze, construites sur deux ou trois étages, recouvertes de crépi, cachaient un formidable trésor. En effet, celles-ci étaient construites en galets du Lot avec ou sans colombage.  Hôtel Renaissance, construit au XVIe siècle, abrite un escalier à vis desservant les trois étages dissimulés dans sa tour d'angle. Il est de même style que le château de Curières, à trois étages, se composant de quelques fenêtres à bords chanfreinés. Sa porte d'entrée ornée de clous ciselés nous cache mystérieusement les somptuosités de l'intérieur.","habitants":"Famille de Curières \r\n        \"","divers":"Château de Curières","gps":"","images":["../image/image_12/12_Ste_Eulalie_Olt_1.jpg","../image/image_12/12_Ste_Eulalie_Olt_2.jpg","../image/image_12/12_Ste_Eulalie_Olt_3.jpg","../image/image_12/12_Ste_Eulalie_Olt_4.jpg","../image/image_12/12_Ste_Eulalie_Olt_5.jpg"]},"Consult_chateau_formulaire546f":{"id":"Consult_chateau_formulaire546f","dept":"12","canton":"Laguiole","commune":"Sainte Geneviève","nom":"Ste_Geneviève","type":"Manoir","periode":"XVI","histoire":"Chateaux de l'Albaret, de Bénavent, de Beauregard, de Gabriac.                  Sainte Geneviève fut fortifiée par un fossé et une muraille et au-delà de l'Argence se trouvait un château-fort appelé la Calmontie, dont il reste le souterrain qui passe sous le ruisseau et vient aboutir au couvent.La commune de Sainte-Geneviève possédait de nombreux châteaux .                                                                          ALBARET; a été transformé par les Treillard, style 1930.                 BEAUREGARD, actuellement dirigée par Vincent Roquette, groupement forestier a été fondée en juin 1972.              BENAVENT, se trouve un éperon rocheux qui domine de plus de 200 mètres le cours de la Truyère et où ne subsiste  qu'un cimetière et les restes d'une église castrale. C'était le site de l'ancien château et le chef-lieu de la seigneurie de Bénavent, qui a donné son nom à une branche de la famille des comtes de Rodez qui possédait aussi le château fort de Vic-en-Carladez.                          GABRIAC, pas d'information historique.","architecture":"Châteaux de l'Albaret; de style 1930, corps de logis rectangulaire de trois niveaux flanqué d'une tour ronde plein cintre en façade  avec mâchicoulis et toit en poivrière, le bâtiment est prolongé de chaque côté par des dépendances dont celle de droite à deux niveaux.                                                                                   Bénavent, l'église site de l'ancien château.                                   Beauregard, corps de logis rectangulaire à trois niveaux flanqué d'une tourelle carrée à toit pointu.                                                 Gabriac, constitué d'un  corps de logis en équerre à deux niveaux toitures en croupes avec lucarnes et échauguettes, flanqué d'un donjon carré  à toit pointu et tour ronde sur l'arrière du bâtiment toit incliné à un seul pan.","habitants":"Famille des Treillard\r\n        \r\n        \"","divers":"Chateaux de l'Albaret, de Bénavent, de Beauregard, de Gabriac.","gps":"","images":["../image/image_12/12_Ste_Genevieve_1.jpg","../image/image_12/12_Ste_Genevieve_2.jpg","../image/image_12/12_Ste_Genevieve_3.jpg","../image/image_12/12_Ste_Genevieve_4.jpg","../image/image_12/12_Ste_Genevieve_5.jpg"]},"Consult_chateau_formulaire786f":{"id":"Consult_chateau_formulaire786f","dept":"12","canton":"Sébrazac-Concourés","commune":"Sébrazac","nom":"Sébrazac","type":"Château","periode":"XVII","histoire":"Deux châteaux à Sébrazac celui de Beauregard du XVIIe siècle et celui de la Verrières du XVIIe siècle.                                                                        BEAUREGARD,  nous ne possédons pas de renseignements et d'historique sur ce château situé à Sébrazac au lieu-dit Les Camps. \r\nVERRIERES, le château de Verrière a été construit au XVIIe siècle. Propriétaire, M. Lapeyre de Cabanes,  pas d'information historique.","architecture":"Le bourg de Sébrazac  est entièrement construit en grès rouge. Belles maisons anciennes, plusieurs châteaux renaissance.   Beauregard, corps de logis rectangulaire à deux niveaux et attiques  toitures en croupes accolé d'un donjon à trois niveaux  flanqué  sur façade d'échauguettes sur encorbellement partant du premier étage.                                                                                             Château de Verrières du XVIIe et château de Beauregard de la même époque. corps de logis rectangulaire à quatre niveaux et lucarnes, accolés de tours rondes, deux frontons Renaissance, l'architecture des XVe et XVIIe siècles, les quatre tours, la cour intérieure et la chapelle Saint-Michel.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Beauregard et de Verrières","gps":"","images":["../image/image_12/12_Sebrazac_1.jpg","../image/image_12/12_Sebrazac_2.jpg","../image/image_12/12_Sebrazac_3.jpg","../image/image_12/12_Sebrazac_4.jpg","../image/image_12/12_Sebrazac_5.jpg","../image/image_12/12_Sebrazac_6.jpg"]},"Consult_chateau_formulaired378":{"id":"Consult_chateau_formulaired378","dept":"12","canton":"Decazeville","commune":"Sénergues","nom":"Sénergues","type":"Tour Châteaux","periode":"XI-XV","histoire":"Quatre châteaux à Sénergues, celui de Sénergues  du XI- XIIe siècle, de Bessière du XV-XVIe siècles celui de La Guarrigue du XVe siècle et celui de Montarnal du XI-XVIe siècles (voir article)                                   SENERGUES, La  famille de Roquemaurel apparaît dès le XIIIe siècle comme co-seigneur de ce fief tenu par Géraud de Saint-Geniez.  La tour près de léglise et du château a été construite en 1382 par Aymeric de Sénergues qui avait épousé Ricarde Aymare de Roquemaurel. En 1863, Réginette de Sénergues, dernière du nom, épouse Casimir Benazech, conseiller général, depuis le château et les dépendances sont toujours propriété de cette famille.\r\nBESSIERE, a été édifié en 1464 par noble Jean de Pradines, et fut agrandi par Hélion de Pradines en 1561. Par mariage, la demeure devînt propriété de la famille de La Tour Saint-Igest originaire de la région de Villeneuve dAveyron et apparentée à celle de Sénergues par alliance. Une rivalité avec la famille Madrières de La Garrigue se termina tragiquement le 10 octobre 1731 avec lassassinat de Charles Benoît Madrières de La Garrigue par Marc Antoine de La Tour Saint-Igest, ce qui entraîna le bannissement des deux familles de la région. Depuis le domaine a changé plusieurs fois de mains. Il est aujourdhui la propriété agricole de la famille Bony. \r\n LA GARRIGUE, la construction  de Lagarrigue remonte à la fin du XIVe ou au début du XVe siècle, par lépoux de Catherine La Garrigue, Pierre Madières, et appartient à cette famille jusquà la fin du XVIIIe siècle. Par mariage, il passa à la famille des seigneurs de Balzac apparentée à Honoré de Balzac. Depuis 1920, le domaine est propriété de la famille Gaillac. A noter sous un hangar agricole une magnifique fenêtre à meneaux avec les armoiries de la famille Madières.","architecture":"Sénergues; la construction de l'édifice remonte au XIe siècle pour le donjon et au XIIe pour le reste du château. Le bâtiment actuel est incomplet.  Il est composé de deux édifices : une tour, qui avait été construite en 1385 pour défendre les habitants des invasions anglaises, les créneaux et les mâchicoulis ont su être conservés durant toutes ces années et le logis castral, qui est plus récent puisquil a été édifié à la fin du XVe siècle. Une partie fut rasée sous l'ordre de Rich
