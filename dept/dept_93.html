e1906","nom":"Sevran","commune":"Sevran","type":"Château","img":"../image/image_93/93_Sevran_1.jpg"},{"id":"Consult_chateau_formulaire2450","nom":"St_Ouen_Sevran","commune":"Sevran","type":"Château","img":"../image/image_93/93_St_Ouen_Sevran_1.jpg"},{"id":"Consult_chateau_formulaire4e81","nom":"Terrasse_Clichy","commune":"Clichy sous Bois","type":"Château","img":"../image/image_93/93_Terrasse_Clichy_1.jpg"},{"id":"Consult_chateau_formulaire1bdc","nom":"Tournelles_Tremblay","commune":"Tremblay","type":"Château","img":"../image/image_93/93_Tournelles_Tremblay_1.jpg"},{"id":"Consult_chateau_formulaire9880","nom":"Vaujours_93","commune":"Vaujours","type":"Château","img":"../image/image_93/93_Vaujours_93_1.jpg"},{"id":"Consult_chateau_formulaire9788","nom":"Villemomble","commune":"Villemomble","type":"Château","img":"../image/image_93/93_Villemomble_1.jpg"}];const FULL={"Consult_chateau_formulaire4a85":{"id":"Consult_chateau_formulaire4a85","dept":"93","canton":"Aulnay sous Bois","commune":"Aulnay sous Bois","nom":"Aulnay_Sous_Bois","type":"Château","periode":"XVI-XVII","histoire":"AULNAY, En 1676, les héritiers de Jacques Coitier déclare . Un château avec pont-levis, entourés de fossés, et auquel les habitants devaient faire le  guet aux portes ; un manoir situé dans la basse-cour du château, avec granges, étables, colombiers, représentant une superficie de 5 arpens environ ; Deux étangs, lun de quatorze, lautre de cinq arpens, et dans lequel le seigneur, dans un but dempoissonement, a droit de faire entrer leau du ruisseau des Rideaux ; Deux moulins à eau ; Une garenne de 4 arpens ; Vingt arpens de terre et prairies ; 185 arpens de bois dépendant des forêts de Bondy et Livry\". Il est par ailleurs fait mention de 107 maisons. Le château fait lobjet dimportants travaux en 1696. Vers 1700, Armand Jacques de Gourgues déclare posséder un château moitié ancien, moitié neuf ; deux ponts, lun de pierre, celui du côté du jardin de bois, qui se lève en bascule. Une orangerie est construite en 1728.                                                                                                              Chateau Chansonnia  ; Annexe du commissariat de police.","architecture":"AULNAY,en 1328, il est fait mention dun \"château fort, en bonnes réparations et suffisances, environné de bons fossés en largeur et profondeur, pleins deau, laquelle vient actuellement audits fossés, du ru venant de Savigny au moulin dAulnay,   ancien château féodal du marquis de Gourgues\" La carte de Delagrive en 1740 figure deux bâtiments parallèles, de plan  symétrique, disposés sur les grands côtés dune plate-forme entourée dun fossé deau. Les bâtiments sont longs de 37 m, larges de 7, et font retour à angles droit de part et dautre de lentrée de la cour. La plate-forme est large de 30 m ; la largeur des fossés qui lentourent varie de 7-8 m à 12 m. Les deux ponts sont situés au milieu des petits côtés. Le plan dintendance en 1782  figure un troisième pont, au milieu du grand côté nord. Le site ne semble guère modifié sur le plan cadastral de 1819, si ce nest le comblement du fossé ouest et la disparition du pont nord. Selon Lecourtier en  1899, des conduites souterraines amenaient leau de la fontaine des Prés au château. Delagrive figure également, au nord du château, deux corps de ferme disposés sur les grands côtés dune cour. Le plan dintendance de 1782 figure un nouveau bâtiment sur le petit côté nord. Lagencement général de lensemble demeure le même sur le plan de 1819 qui figure toutefois une cour trapézoidale et non rectangulaire ; celle-ci est longue de 65 m et large de 32 à 45 m. Un colombier est accolé au bâtiment ouest. Une chapelle est fondée dans le château en 1701. Le château est restauré en 1869 et démoli au début du XXe siècle.\nDes caves voûtées en plâtre ont été visitées sous la maison située à langle de la rue Marceau et de la rue Jacques Duclos, cest à dire à lemplacement de lun des bâtiments de la ferme seigneuriale.","habitants":"Famille de Armand Jacques de Gourgues\"","divers":"Château à Aulnay sous bois  Chansonnia grav-4","gps":"","images":["../image/image_93/93_Aulnay_Sous_Bois_1.jpg","../image/image_93/93_Aulnay_Sous_Bois_2.jpg","../image/image_93/93_Aulnay_Sous_Bois_3.jpg","../image/image_93/93_Aulnay_Sous_Bois_4.jpg"]},"Consult_chateau_formulaire0c3b":{"id":"Consult_chateau_formulaire0c3b","dept":"93","canton":"Livry-Gargan","commune":"Clichy sous Bois","nom":"Clichy_Sous_Bois","type":"Château","periode":"XVI-XVII","histoire":"CLICHY, c'est devenu la Mairie de Clichy-sous-Bois. Cet ancien château a été construit au XVIe siècle. Il a été acheté, en 1645, par Robert de Bragelongne, Surintendant des Finances du roi Louis XIV. Il le cèdera ensuite au Comte Jean-Antoine d'Avraux, ami de Madame de Sévigné, qu'il accueille régulièrement lors de ses séjours. Le château de Clichy est modifié, en 1807, au style néoclassique, très en vogue, à l'époque. Le château présente un corps de logis rectangulaire avec un porche néo-classique, encadré de deux courtes ailes. Un pavillon rectangulaire est accolé au mur sud de l'aile méridionale. Le parc autrefois à la française, fut redessiné sous l'Empire à l'anglaise avec une pièce d'eau par Alexandre-Théodore Brongniart, selon les principes de son ami le peintre Hubert Robert. Le parc abrite également une orangerie de style Louis XVI, édifiée à partir de 1740. L'ensemble fut acquis en 1930 par la municipalité. Le château de Clichy-sous-Bois, son parc et son orangerie sont classés aux M.H. depuis 1972.","architecture":"CLICHY, chateau de la mairie à clichy sous bois construit en 1645, sur l'emplacement d'un ancien rendez vous de chasse, le château de la mairie sera saccagé, en 1670, par l'Armée Prussienne. Il sera rénové puis cédé à la ville de Clichy-sous-Bois, en 1930, par la famille Lindet-Girard, afin d'y abriter la mairie de Clichy-sous-Bois. Le château de Clichy-sous-Bois, son parc et son orangerie sont classés aux M.H. depuis 1972.","habitants":"Famille de Robert de Bragelongne\"","divers":"Clichy grav-1   Puységur grav 2-3                                              GPS : 48° 54' 38,94\" Nord, 2° 32' 47\" Est","gps":"48° 54' 38,94\" Nord, 2° 32' 47\" Est","images":["../image/image_93/93_Clichy_sous_Bois_1.jpg","../image/image_93/93_Clichy_sous_Bois_2.jpg","../image/image_93/93_Clichy_sous_Bois_3.jpg"]},"Consult_chateau_formulaired06c":{"id":"Consult_chateau_formulaired06c","dept":"93","canton":"Tremblay-en-France","commune":"Montfermeil","nom":"Cèdres","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Cèdres et Petit-Château                       CEDRES, cest Denis Néret, procureur à la chambre de Paris qui fait édifier ce château vers 1640. Ses héritiers le conservent près dun siècle après sa mort. Au moment de la construction du bâtiment, larchitecture répond aux règles du classicisme. Les artistes de cette période, correspondant au règne de Louis XIII, interprètent librement, comme à la Renaissance, lart antique gréco-romain. En 1812, la propriété appartient à Madame de Fleurieu. Philippine Calixte Sanson de Sansal, est lépouse séparée de Jean Jacques Claret de Fleurieu, neveu du ministre de la Marine de Louis XVI. Madame de Fleurieu occupe une place importante à la cour impériale, elle est dame de compagnie auprès de Madame Mère, Marie Letizia Bonaparte, mère de lEmpereur. Philippine de Fleurieu est connue pour être une femme de goût mais très dépensière. Cest elle qui fait remanier le parc dans lequel on peut voir la mise en valeur dune source et un vase ornemental au décor sculpté daté de la fin du XVIIIe siècle. En 1994, la propriété est achetée par la commune. Lensemble constitue un domaine de 3,5 ha despaces verts. Éléments protégés MH : les façades et les toitures, y compris le portail d'entrée, sauf les communs ; l'escalier intérieur avec sa rampe en fer forgé ; le vestibule Nord-Ouest, la grande salle centrale, la salle Est avec décor de gypseries : inscription par arrêté du 17 décembre 1976.","architecture":"PETIT CHÄTEAU, alors que Montfermeil n'est encore qu'un bourg médiéval, une léproserie est construite sur les terres appartenant à Jean Deslyons. Par déformation, le domaine devient le fief des Lions. La léproserie se situe sur l'emplacement de l'actuelle rue de la Fontaine-Jean-Valjean. Au XVIIe siècle, les propriétaires du domaine, la famille Bourlon, remplacent la léproserie par un château. En 1742, Jean Hyacinthe II Hocquart, trésorier de la marine puis Fermier général, seigneur de Montfermeil et propriétaire du grand château depuis 1735, réunit les deux propriétés, comme le grand et le petit château appartient au domaine érigé en marquisat, son propriétaire devient le premier marquis de Montfermeil, de Coubron et de Gagny. Après avoir été confisqué comme bien national pendant la Révolution française, Madame Hocquart, qui a déjà racheté le grand château en 1804, acquiert la maison des Bourlon en 1815, réunissant à nouveau l'ensemble du domaine. Émile Hovelaque le propriétaire du château des Cèdres, achète le Petit château en 1925. Entre 1935 et 1942, le propriétaire, Robert de Quatrebarbes,  transforme les bâtiments en institution scolaire privée, lécole Saint-Paul. Le Petit Château est finalement rachetée par le conseil général de la Seine Saint Denis qui fait réhabiliter le bâtiment.\nÉléments protégés MH : le portail d'entrée ; les façade sur cour et les toiture ; les façades et les toitures des communs ; la façade arrière de la ferme et sa toiture : inscription par arrêté du 3 avril 1984.  Propriété de la commune.  Établissement Public Autonome.","habitants":"Cédres; Madame de Fleurieu                                Petit château; famille Bourlon\"","divers":"Deux châteaux dans cet article; Cèdres grav 1_2  et Petit Château grav_3                                                                 Cèdres  GPS : 48° 53' 55\" Nord, 2° 34' 02\" Est                                                Petit château GPS : 48° 53' 55,8\" Nord, 2° 33' 50,83\" Est","gps":"48° 53' 55\" Nord, 2° 34' 02\" Est","images":["../image/image_93/93_C%c3%a8dres_1.jpg","../image/image_93/93_C%c3%a8dres_2.jpg","../image/image_93/93_C%c3%a8dres_3.jpg"]},"Consult_chateau_formulaire05ef-2":{"id":"Consult_chateau_formulaire05ef-2","dept":"93","canton":"Épinay-sur-Seine","commune":"Epinay sur seine","nom":"Epinay_sur_Seine","type":"Château","periode":"XVIII-","histoire":"EPINAY,  construit pour le marquis du Terrail entre 1756 et 1760, cet hôtel fut occupé par Dom François d'Assise de Bourbon, roi d'Espagne en exil à la fin du XIXe siècle. Des travaux ont été réalisés par l'architecte Bouwens de 1881 à 1889 avec notamment l'adjonction de marquises. De son état initial, l'hôtel a conservé son plan en T, une partie de l'ordonnance des façades et des décors intérieurs. Après la mort de Dom François d'Assise en 1906, le château est acheté par la commune qui y installe la mairie (décor de la salle du conseil de 1911), propriété de la commune, hôtel de ville. Voir également le château du marquis de Terrail à Epinay-sur-Seine.  Éléments protégés MH : les deux salons avec leur décor ; la salle du conseil avec son décor ; l'escalier et sa cage : inscription par arrêté du 21 janvier 1987.","architecture":"EPINAY,  la mairie occupe, depuis le 19 juillet 1908, l'ancien hôtel seigneurial du fief d'Ormesson. Depuis la disparition du château de la Briche en 1870, c'est le seul survivant des anciens châteaux d'Épinay. L'existence d'une demeure à cet emplacement est mentionnée dès 1306  les seigneurs du village y résident alors. Reconstruit en 1760 par le marquis du Terrail, fils d'un riche financier, en forme de « T » qui rappelle son nom, c'est une élégante construction caractéristique du XVIIIe siècle. Les fenêtres de l'aile ouest sont ornées de mascarons sur les clefs de voûte représentant les quatre continents. De 1881 à 1889, d'importants travaux furent réalisés par l'architecte Bouwens. A la mort du Roi d'Espagne François d'Assise de Bourbon, le château d'Epinay et son parc sont rachetés, en 1906, par le maire Mr Georges Thibout, à titre personnel. Il revendra le château d'Epinay et la moitié du terrain (1 hectare) à la commune, et offrira les communs du château, à la commune d'Epinay-sur-Seine, pour en faire une école maternelle publique. La commune installe la mairie dans le château (décor de la salle du conseil de 1911 à 1934, antérieurement implantée dans une petite maison de deux étages située près de l'église Saint-Médard, rue de Paris. La maison du concierge fut mise à disposition des anciens combattants d'Epinay par Georges Thibout et, après la seconde guerre mondiale, donnée à la commune pour agrandir le parc de la mairie.","habitants":"le marquis du Terrail\"","divers":"Epinay  GPS : 48° 57' 6,7\" Nord, 2° 18' 48,12\" Est","gps":"48° 57' 6,7\" Nord, 2° 18' 48,12\" Est","images":["../image/image_93/93_Epinay_sur_Seine_1.jpg","../image/image_93/93_Epinay_sur_Seine_2.jpg","../image/image_93/93_Epinay_sur_Seine_3.jpg","../image/image_93/93_Epinay_sur_Seine_4.jpg"]},"Consult_chateau_formulaire95f9":{"id":"Consult_chateau_formulaire95f9","dept":"93","canton":"Bagnolet","commune":"Bagnolet","nom":"Ermitage","type":"Château","periode":"XVII","histoire":"ERMITAGE, il est la dernière folie parisienne de style Régence. Sur un terrain acheté le 12 mars 1719, le pavillon fut construit, vers 1720, pour la duchesse d'Orléans par l'architecte Serin. Il existait à l'origine 3 pavillons. Seul celui de l'Ermitage est le dernier encore debout. Il a appartenu au Baron de Batz, qui s'en servit comme « petite maison », puis dès 1792, comme lieu de réunion politique pour préparer la libération du roi Louis XVI. C'est là que fut arrêtée la maîtresse du Baron, la Grandmaison, qui fut guillotinée. En 1820, le pavillon appartenait à François Pomerel, dont les initiales sont gravées sur la façade. En 1887, son gendre le revendit à l'Assistance Publique. Un hospice de vieillards fut fondé en 1884 sur l'emplacement du château de Bagnolet. Il porte le nom d'hospice Alquier-Debrousse et existe encore. Le pavillon a appartenu jusqu'en 1972 à l'hospice Debrousse, avant d'être rattaché au Centre dAction Sociale de la Ville de Paris et d'être restauré en 1987. En 2005, il a été ouvert au Public grâce à l'action de lassociation des Amis de lErmitage.","architecture":"ERMITAGE,  non chauffé, le bâtiment n'est qu'un pavillon d'agrément utilisable lors des chaudes saisons. Il était couvert d'un toit plat avec une balustrade, à l'italienne. Les deux fenêtres latérales de l'avant-corps sur jardin sont des ajouts. Il est orné de peintures de Jean Valade représentant la Tentation de saint Antoine. En 1761, les lieux sont redécorés par Louis-Philippe, petit-fils de la duchesse d'Orléans, dans un style à la grecque , encore visible sur les peintures murales du salon) inaugurant le néo-classicisme. De nos jours subsistent trois peintures murales en grisailles dans le salon, représentant des ermites. Lors du morcellement du domaine en 1769, l'Ermitage, entouré de 11 600 m2 de terrain, constitua un lot.","habitants":"Famille du Baron de Batz\"","divers":"Ermitage GPS : 48° 51' 43\" Nord, 2° 24' 23\" Est","gps":"48° 51' 43\" Nord, 2° 24' 23\" Est","images":["../image/image_93/93_Ermitage_1.jpg","../image/image_93/93_Ermitage_2.jpg","../image/image_93/93_Ermitage_3.jpg"]},"Consult_chateau_formulairedadf":{"id":"Consult_chateau_formulairedadf","dept":"93","canton":"Livry-Gargan","commune":"Livry-Gargan","nom":"Forêt_Livry_Gargan","type":"Château","periode":"XVII-XVIII","histoire":"La FORET, des terres de Garlande, il ne reste quun vaste parc de plus de vingt hectares quand Madame Lefevre Perdonnet lacquiert au XIXe siècle. La propriété comprend alors un jardin anglais, un potager avec une pièce deau et un grand parc. Elle y fait construire, en 1864, un château de style Louis XIII, en briques et en pierres de taille. Dans une autre partie de la propriété se trouvent deux maisons de gardiens, des granges, des remises et des jardins. La municipalité rachète lensemble en plusieurs étapes, une première partie en 1956 puis, le reste en 1963. La municipalité de Livry-Gargan a pu disposer du château et des annexes en 1976. A la place des deux jardins dhiver ont été bâties deux ailes latérales basses dans le même style que le château. A loccasion de la restauration du bâtiment, plusieurs pièces ont été réaménagées dans le style Empire. Le château abrite  le Musée dHistoire locale de Livry-Gargan et la bibliothèque depuis 1979.","architecture":"La FORET,  le château de la Forêt est de style Louis XIII. Il a été construit en 1864, pour le Docteur Lefèvre. La commune en est devenue propriétaire en 1956. Il abrite aujourdhui le musée dhistoire locale, le musée de la Marquise de Sévigné (qui expose lettres et portraits de lintéressée lors de son séjour à Livry), la salle du conseil municipal et des salles dexposition. Son parc, de 20 hectares à lorigine, n'en mesure plus que la moitié, aujourdhui il est devenu le parc municipal  à Livry-Gargan.","habitants":"Famille du Docteur Lefèvre\"","divers":"Forêt  GPS : 48° 55' 09\" Nord, 2° 32' 10\" Est","gps":"48° 55' 09\" Nord, 2° 32' 10\" Est","images":["../image/image_93/93_For%c3%aat_Livry_Gargan_1.jpg","../image/image_93/93_For%c3%aat_Livry_Gargan_2.jpg","../image/image_93/93_For%c3%aat_Livry_Gargan_3.jpg"]},"Consult_chateau_formulaire75d5":{"id":"Consult_chateau_formulaire75d5","dept":"93","canton":"Gagny","commune":"Gagny","nom":"Gagny","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article; Gagny, Montguichet et la Maison Blanche.                                                                                                                 GAGNY Cet immeuble de deux étages a été construit en 1715 pour François Normand, avocat au Parlement de Paris. La famille Laugier-Villars en devint propriétaire de 1803 à 1880. Elle est ensuite la propriété de Henri-Nicolas Peretmère, un négociant parisien, jusqu'en 1888. A la fin de 1880, la commune Gagny racheta le bâtiment et y installa la mairie.                                                                                                              MONTGUICHET , ce bâtiment du XVIIIe siècle est l'un des deux derniers châteaux encore visibles à Gagny après les destructions successives du château de Maison Rouge démoli en 1956, celui de Gagny qui sélevait à lemplacement de lactuel boulevard Saint-Dizier et du château du Chenay rasé en 1967. Il semblerait que le château de Montguichet ait été édifié sur lemplacement dune ancienne forteresse construite au Moyen-âge, mais aucun document ne latteste vraiment. En 1729, le domaine est acquis par Jean Baptiste Silva, lun des médecins de Louis XV. Au XVIIIe siècle, Jean Hyacinthe Hocquart, lun des fils de la famille des seigneurs de Montfermeil prend possession du domaine. Ses descendants loccupent jusquà la Révolution française. Vendu comme bien national, il passe entre les mains de différents propriétaires. Vers 1893, il est acquis par le baron de Laumont qui le lègue à sa fille, la comtesse Marquiset. Le fils de celle-ci, Armand Marquiset, est le fondateur des Petits Frères des Pauvres. Il fait don du domaine à l'association et le château est, depuis lors, un établissement de bienfaisance.","architecture":"MAISON bLANCHE, la construction du château de Maison-Blanche date du XVIIIe siècle. C'est un château de style Louis XVI. La première mention du lieu-dit de Maison-Blanche remonte à 1523, dans les documents des bénédictins de Saint-Maur. Il sagissait alors dune ferme. Le domaine fut légué en 1623 à Nicolas de la Pome, proche dun trésorier du roi, à la suite du décès de son oncle Nicolas Le Boindre, contrôleur des finances. En 1710, Philippe II dOrléans dit le Régent acquiert la propriété puis la cède, à son valet de chambre Ponce Coche. En 1719, le domaine de 53 hectares est clos de murs dont il reste quelques traces. Le château de Maison-Blanche ira ensuite à larchevêque de Cambrai, tout en restant inféodée au chapitre de Saint-Maur. Cest dans ce château quAngélique de Froissy, fille illégitime de Philippe II dOrléans, épousa le comte Henri-François de Ségur, en 1718, après avoir été élevée avec les autres enfants naturels. Le pavillon de chasse et la chapelle édifiée tout près du château, nexistent plus. Le belvédère, utilisé par le maître des lieux pour entreposer les produits de ses chasses, fut déplacé et sélève, aujourdhui, sur la presquîle du lac de Maison-Blanche. Le château de Maison-Blanche à proprement fut bâti à une époque inconnue, mais on peut le dater à la fin du XVIIIe siècle, à partir dun bâtiment déjà existant: orné dun fronton cintré, il connut de nombreux propriétaires avant dêtre transformé en un Hôtel-Restaurant, à lépoque de la mise en vente et du lotissement du domaine, en 1929. Le château accueille les collectionneurs de Gagny Association Philatélique jusquà sa rénovation en 2011 (réfection du ravalement avec un enduit à la chaux et réfection de sa verrière), grâce à laquelle, on découvre, depuis, ses splendeurs dantan.","habitants":"Gagny   Famille Laugier-Villars                      Maison Blanche; Nicolas de la Pome\"","divers":"deux châteaux Gagny et Maison -Blanche grav -1-2-3                           Montguichet grav 4-5-6                                                    Gagny GPS : 48° 53' 6,23\" Nord, 2° 32' 10,09\" Est                                                      Maison Blanche GPS : 48° 53' 00\" Nord 2° 32' 00\" Est","gps":"48° 53' 6,23\" Nord, 2° 32' 10,09\" Est","images":["../image/image_93/93_Gagny_1.jpg","../image/image_93/93_Gagny_2.jpg","../image/image_93/93_Gagny_3.jpg","../image/image_93/93_Gagny_4.jpg","../image/image_93/93_Gagny_5.jpg","../image/image_93/93_Gagny_6.jpg"]},"Consult_chateau_formulaire096b":{"id":"Consult_chateau_formulaire096b","dept":"93","canton":"Noisy-le-Grand","commune":"Gournay sur marne","nom":"Gournay_sur_Marne","type":"Château","periode":"XVII","histoire":"GOURNAY, après la destruction de lancienne forteresse, Louis Ancelin, frère de lait de Louis XIV fait construire en 1680, un château aux lignes classiques qui a subi très peu de modifications. Lensemble architectural semble plus proche du style Henri IV que de celui de Louis XIV, époque à laquelle le château a été édifié.  Après le décès de son épouse, Louis Ancelin se défait de la demeure qui passe entre les mains de plusieurs propriétaires jusquà ce que le vice-amiral Claude Elysée de Court lacquiert. La décoration intérieure qu'il entreprend et laménagement du parc laissent lempreinte profonde de son passage. Après sa disparition, le château subit des dégradations liées à linstallation dans ses murs dune manufacture de transformation de soie de chardons en soie textile. Il est à nouveau endommagé durant le conflit de 1870. Puis la famille Nast acquiert la demeure et la transmet par alliance, à Roger Ballu, le fils de l'architecte Théodore Ballu, hôtel de ville aujourd'hui.","architecture":"GOURNAY, cest un bâtiment sévère qui allie la brique à la pierre de taille. Lordonnance de la façade est dune grande régularité soulignée par des travées dégales largeurs et flanquée de deux pavillons répondant à la tradition de larchitecture à la française du XVIe siècle. La façade donnant sur la Marne, ornée de deux travées centrales et dun fronton classique, est plus élaborée. Un balcon en fer forgé rappelant la décoration intérieure est supporté par des consoles sculptées, la construction du château de Gournay date du XVIIe siècle. Il a été bâti en 1680 et est proche du style Henry IV. Il allie la brique à la pierre de taille. En 1925, la commune a racheté le château de Gournay aux enfants de Roger Ballu, ancien maire de Gournay. Le château de Gournay-sur-Marne est devenu l'hôtel de Ville de Gournay. Éléments protégés MH : le château de Gournay en totalité : inscription par arrêté du 16 octobre 1945.","habitants":"vice-amiral Claude Elysée de Court\"","divers":"Gournay GPS : 48° 51' 52,2\" Nord, 2° 34' 21,94\" Est","gps":"48° 51' 52,2\" Nord, 2° 34' 21,94\" Est","images":["../image/image_93/93_Gournay_sur_Marne_1.jpg","../image/image_93/93_Gournay_sur_Marne_2.jpg","../image/image_93/93_Gournay_sur_Marne_3.jpg"]},"Consult_chateau_formulaire5022":{"id":"Consult_chateau_formulaire5022","dept":"93","canton":"Drancy","commune":"Drancy","nom":"Ladoucette","type":"Château","periode":"XVI","histoire":"LADOUCETTE, il fut construit pour le seigneur Pierre Séguier en 1553, la Famille Séguier reste propriétaire du château pendant plus de 200 ans. Au milieu du XIXe siècle, il devient la propriété du baron Louis-Napoléon-Loetitia-Charles de Ladoucette et de sa femme Émilie-Victorine Thibault, devenue baronne de Ladoucette. La Baronne qui est Présidente de « l'uvre des patronages de jeunes filles » décide de créer l'Asile de Drancy, un orphelinat. À la suite du décès de son mari en 1869, la baronne reste au château mais est obligée de le quitter au début de la guerre en 1870, fuyant devant l'avancée prussienne. Quelques mois après la bataille du Bourget de 1870, le château est détruit et  ensuite reconstruit par la baronne. Il devient un centre de convalescence durant la première guerre mondiale pour les militaires blessés au Front. Le nouvel édifice est lui-même victime de multiples destructions durant les deux guerres mondiales. Le château de Ladoucette devint ensuite un lieu d'accueil pour des enfants atteints de troubles psychiques et, en 2009, la ville de Drancy le rachète, afin de développer des activités culturelles et d'agrandir le parc ouvert au public. Le château de Ladoucette fut détruit lors de la guerre de 1870 et reconstruit ensuite par la baronne. Il sera un centre de convalescence durant la première guerre mondiale pour les militaires blessés au Front. Le nouvel édifice sera lui-même victime de destructions durant les 2 guerres mondiales. Il fut le dernier châtelain du château de Drancy qui avait appartenu à une Mme d'Argenlieu qui le vendit par la suite à un nommé Kirpatrick.","architecture":"LADOUCETTE, ce château fut construit en 1553 par Pierre Séguier dont la famille resta propriétaire pendant plus de deux siècles. Il était l'époux dÉmilie-Victorine née Thibault devenue baronne de Ladoucette qui fonda en 1857 une école de filles avec ouvroir et cours d'adultes, dont le personnel enseignant était des surs de Saint Vincent de Paul. Elle mourut le 9/12/1897 à Cannes. Elle avait fait un testament et don de tous ses biens en faveur de l'asile de Drancy, pour parachever ainsi son entreprise caritative que géraient les Surs de Saint-Vincent de Paul. Ces dernières héritèrent du château de Drancy et de son parc de 5,5 Ha ainsi que de la Villa des Ladoucette à Cannes. Le baron et la baronne de Ladoucette eurent une fille, Berthe de Ladoucette, née en 1844 devenue, la comtesse Robert de Mun et décéda le 24/02/1865, à l'âge de 21 ans. Elle avait collaboré aussi dans les uvres de charité de sa mère. Ayant perdu leur fille unique de bonne heure, ils léguèrent également par testament la plus grande partie de leur fortune aux départements de la Moselle et des Hautes-Alpes pour être employée à des uvres d'utilité publique. Allez redécouvrir le château de Ladoucette, à Drancy qui vient d'être restauré. En travaux depuis fort longtemps, il a été racheté par la Ville de Drancy, en 2009 et rouvre ses portes au public.","habitants":"Famille de Pierre Séguier\"","divers":"Ladoucette GPS : 48° 554 24\" Nord, 2° 26' 42\" Est","gps":"48° 554 24\" Nord, 2° 26' 42\" Est","images":["../image/image_93/93_Ladoucette_1.jpg","../image/image_93/93_Ladoucette_2.jpg","../image/image_93/93_Ladoucette_3.jpg"]},"Consult_chateau_formulaire059a":{"id":"Consult_chateau_formulaire059a","dept":"93","canton":"Montreuil","commune":"Montreuil","nom":"Montreau","type":"Château","periode":"XV-XVI-XVII","histoire":"MONTREAU, emplacement d'un ancien fief, la seigneurie de Montreau, dépendant de la paroisse de Montreuil. Parmi les propriétaires successifs figurent le chevalier de Saint-Etienne, l'abbaye de Sainte-Geneviève, le marquis de Ménilglaise, M. Vassel. Au XVIe siècle, le château de Montreau appartient à MM. Desjardins, conseillers au Châtelet et échevins de Paris. A la fin du XVIIIe siècle, cette partie du parc est boisée. Le château est reconstruit à plusieurs reprises. Sur le cadastre de 1819, l'ensemble des bâtiments forme un quadrilatère avec un pigeonnier dans un angle ; sur le plan de 1847, un des bâtiments a disparu. Le domaine est ensuite acheté par la communauté des dames de la Visitation en 1850, puis par Théophile Sueur en 1860, qui installe une fabrique de cuirs vernis dans les communs ; deux des trois pièces d'eau du domaine servent à refroidir le cuir travaillé. Le château est démoli en 1870 car il gêne les tirs du fort de Rosny ; en même temps sont rasés les murs d'enceinte et la plupart des arbres du domaine. Le parc et la propriété sont acquis par la municipalité en 1932 ; en 1939 est inauguré le musée d'histoire vivante. La superficie est alors de 17 hectares. La partie extra-muros, située derrière le parc, est constituée de terrains en partie plantés d'arbres fruitiers.","architecture":"MONTREAU, l'édifice consiste en une demeure bâtie sur un plan en L et comportant un étage carré et un étage de comble éclairé par des lucarnes ; le corps principal comprend 15 travées régulières en façade ; l'aile en retour d'équerre comprend cinq travées sur la façade sud. Le domaine comprend également une chapelle et un vaste parc composé de parterres et d'allées en étoiles. La ville a fait clôturer les parties lui appartenant ; plusieurs chemins existants sont devenus viables. En 1956, des projets d'extension sont à l'étude par les architectes communaux Audra et Marme ; ils édifient la grille monumentale sur la rue du Parc. Vers 1935, le parc reçut des statues en pierre réalisées en 1878 pour le jardin de l'ancien Trocadéro : l'Eau ou nymphe à la source de Le Vau et l'Air ou nymphe au poisson ailé de Gabriel Jules Thomas. Une réplique en marbre de l'Air se trouve dans le jardin public de Montélimar. Une autre statue en pierre calcaire, la Jeune femme au lévrier, par Louis Henri Nicot, subsiste à l'état de fragments. En 1959, un an après la mort de Daniel Renoult, compagnon de Jean Jaurès, maire de Montreuil de 1944 à 1958, le parc est rebaptisé \"Parc Montreau-Daniel Renoult\" en commission des sites du département de la Seine. Un monument à Daniel Renoult, réalisé par le sculpteur René Collamarini, est installé sur la pelouse centrale devant le château. Le parc actuel, d'une surface d'environ 15 000 mètres carrés, est inscrit à l'inventaire supplémentaire des sites. Il comprend un relief très vallonné offrant une large perspective sur les communes de Bry-sur-Marne et Villemomble, une roseraie, un centre horticole, des aires de jeux. En 1972, les anciennes écuries sont aménagées en foyer et en centre de séjour, puis en centre de santé. Musée.","habitants":"Famille  Desjardins\"","divers":"Montreau GPS : 48° 51' 37\" Nord, 2° 26' 35\" Est","gps":"48° 51' 37\" Nord, 2° 26' 35\" Est","images":["../image/image_93/93_Montreau_1.jpg"]},"Consult_chateau_formulaire9278":{"id":"Consult_chateau_formulaire9278","dept":"93","canton":"Noisy-le-Grand","commune":"Noisy le grand","nom":"Noisy_le_Grand","type":"Château","periode":"XVIII-XIX","histoire":"Trois édifice à Noisy le Grand l'hôtel de ville,  la villa Cathala et le fort Villiers. NOISY le GRAND;   l'hôtel de ville, ancien château Périac, et son extension récente moderne, avec jardin \"Jean-Machet\", au centre-ville.  Le duc de la Vallière acheta la seigneurie, puis après la Révolution française le domaine fut à nouveau mis en vente. Au XIXe siècle la vigne dominait dans la région puis, décimée par le phylloxéra, elle disparut. La première mairie fut inaugurée en 1841, puis une école maternelle vers 1860. Durant l'invasion prussienne de 1870, la population noiséenne se réfugia dans la capitale. Vers 1878 eut lieu la construction du fort de Villiers.\nJusqu'au début du XXe siècle, la ville était un village rural. L'arrivée du tramway en 1901 (Chemins de fer nogentais) transforma la ville. En effet, ce moyen de transport permit le transport des ouvriers travaillant à Paris. Dans l'autre sens, les Parisiens profitèrent de cette nouveauté pour venir se promener à la campagne le dimanche. L'arrivée du tramway permit à la ville de Noisy de passer de village campagnard à petite ville touristique avec ses guinguettes en bord de Marne, et ses rendez-vous de chasse.","architecture":"NOISY le GRAND,     la loi du 27 mars 1874 relative aux nouveaux forts à construire autour de Paris autorise Adolphe Thiers à ériger une ceinture fortifiée autour de Paris sous la direction du général Raymond Adolphe Séré de Rivières. La partie Est de la défense est constituée du fort de Villiers, du fort de Champigny et du fort de Sucy.  Le fort de Villiers, propriété communale, laissé à l'abandon pendant de nombreuses années, actuellement en cours de restauration, au Montfort,« La Villa Cathala », maison des arts, municipale, au centre-ville. l'ancienne demeure de Joséphine-de-Beauharnais, actuel groupe scolaire Cabrini;  \nl'hôtel de ville, ancien château Périac, et son extension récente moderne, avec jardin \"Jean-Machet\", au centre-ville. « La Villa Cathala », maison des arts, municipale, au centre-ville,  Le fort de Villiers est un ancien fort du système défensif de Paris, situé sur la commune de Noisy-le-Grand. Construit à la fin du XIXe siècle, il faisait partie du système Séré de Rivières, destiné a établir un rideau défensif autour de Paris. En forme de trapèze, il est entouré d'un fossé très profond bordé par deux murs. Le fossé fait 800 mètres de périmètre et n'est franchissable que par une seule passerelle d'accès. Les fossés sont protégés par trois caponnières aux angles du mur d'escarpe. Les déblais du fossé ont servi à couvrir les parties maçonnées du fort pour le rendre plus solide.  Douze plateformes, séparées par des buttes de terre couvrant les casemates à munitions, servent à placer l'artillerie. Une cour intérieur rectangulaire, bordée de casernements, se trouve à l'intérieur du fort.  Ses façades sont réalisés en pierre de taille et en moellons.","habitants":"duc de la Vallière \"","divers":"Trois édifice à Noisy le Grand l'hôtel de ville grav-1,  la villa Cathala  grav-2 et le fort Villiers grav-3 . Noisy  48° 50' 52? nord, 2° 33' 10? est                                                              le fort 48° 50' 01? nord, 2° 33' 18? est","gps":"","images":["../image/image_93/93_Noisy_le_Grand_1.jpg","../image/image_93/93_Noisy_le_Grand_2.jpg","../image/image_93/93_Noisy_le_Grand_3.jpg","../image/image_93/93_Noisy_le_Grand_4.jpg"]},"Consult_chateau_formulaire13b0":{"id":"Consult_chateau_formulaire13b0","dept":"93","canton":"Bagnolet","commune":"Romainville","nom":"Romainville","type":"Château","periode":"XVI-XIX","histoire":"ROMAINVILLE, ses premiers seigneurs apparaissent au XIIIe siècle. En fait, la seigneurie ne se constitue véritablement quavec larrivée de Nicolas Le Quelen. En 1630, celui-ci fait construire derrière léglise, au cur du village, le château de Romainville entouré dun grand parc. De style Louis XIII, le château sera remanié au XIXe siècle. Le pavillon est, ce qui subsiste du château de Romainville. Le château de Romainville appartiendra à la Famille de Ségur, de 1723 à 1791.","architecture":"ROMAINVILLE, le parc du château a été transformé en carrière de gypse. Le bâtiment, après avoir été acquis par la ville en 1988, a été racheté par la Région. Très délabré, il a malheureusement encore subi un incendie au mois d'août 2010. (La toiture sest effondrée en son centre, il n'est plus hors d'eau) Peut-il encore être réhabilité ? Très délabré, il ne subsiste plus qu'un pavillon du château de Romainville.","habitants":"Famille de Ségur\"","divers":"Romainville  GPS : 48° 53' 10\" Nord, 2° 26' 06\" Est","gps":"48° 53' 10\" Nord, 2° 26' 06\" Est","images":["../image/image_93/93_Romainville_1.jpg"]},"Consult_chateau_formulaire2538":{"id":"Consult_chateau_formulaire2538","dept":"93","canton":"Sevran","commune":"Villepinte","nom":"Rouge","type":"Château","periode":"XVII","histoire":"ROUGE, la famille Bignon fait construire le château au début du XVIIe siècle. La bâtisse fut rachetée à cette époque par la société immobilière anonyme de l'uvre de Villepinte afin d'accueillir des jeunes filles « poitrinaires », dirigée par une congrégation religieuse, les surs de Sainte-Marie Auxiliatrice. Larchitecture des vestiges du bâtiment laisse percevoir des similitudes avec celle édifiée à Balleroy, vers 1626-1630, par François Mansart, comme on peut le voir également au château de Maison-Blanche à Gagny. Le domaine reste dans la famille Bignon jusquen 1790, date à laquelle il est vendu au sieur Lavalette de Layes et à Mademoiselle Hatry. Après plusieurs changements de propriétaires, il est acquis par la société Immobilière anonyme de luvre de Villepinte qui installe au château une pension pour jeunes filles poitrinaires et il devient, en 1881, le premier sanatorium de France, pour jeunes filles.","architecture":"ROUGE, en 1888, le domaine s'agrandit d'un jardin d'hiver relié au château, où les jeunes filles pouvaient recevoir leurs familles sans mettre le pied à l'extérieur.  A lorigine, il est composé de trois corps de bâtiments dont il ne subsiste que la partie centrale amputée de ses deux tourelles dangle. Lenduit de sa façade constitué dun mélange de pierre de taille et de fausse brique caractéristique du style Louis XIII, lui vaut son surnom de château Rouge. Il ne reste, aujourd'hui, que la partie centrale amputée de ses deux tourelles dangle. Lenduit de sa façade est constitué dun mélange de pierre de taille et de fausse brique, caractéristique du style Louis XIII, lui vaut son surnom de château rouge, est devenu aujourd'hui un établissement hospitalier de moyen séjour médical géré par une association. La chapelle du château fut édifiée de 1890 à 1892, en même temps qu'un corps de bâtiment.  Le passage des châtelains est un passage suspendu reliant le château à l'église. Il permettait aux seigneurs d'assister à la messe sans devoir passer par l'extérieur. Un panneau situé à droite de l'entrée de l'église bloque actuellement l'entrée de ce passage. Le château Rouge est devenu, aujourd'hui, un établissement hospitalier.","habitants":"La famille Bignon \"","divers":"rouge GPS : 48° 58' 00\" Nord, 2° 32' 00\" Est","gps":"48° 58' 00\" Nord, 2° 32' 00\" Est","images":["../image/image_93/93_Rouge_1.jpg"]},"Consult_chateau_formulaire1906":{"id":"Consult_chateau_formulaire1906","dept":"93","canton":"Sevran","commune":"Sevran","nom":"Sevran","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Fossés et Fayet.                                  FOSSES appelé le bâtiment Louis-Armand, le château de la Fossée est cité dès 1552. Le Domaine de la Fossée comprend un château, du début du XIXe siècle, qui fut reconverti en maison de convalescence pour accueillir les gardiens de la paix, blessés dans l'exercice de leur fonction, dans les années 1930. Puis, le château de la Fossée fut transformé en conservatoire municipal de musique. Il fut ensuite désaffecté en attente de réhabilitation et partiellement détruit par le feu lors des émeutes de novembre 2005.                                                                                                 FAYET ou SEVRAN Il est surnommé à tort le château du Fayet. En 1875, Alfred Nobel s'installe à Paris et entreprend des recherches pour installer, dans la région parisienne, ses laboratoires. Son choix se porte sur Sevran, à l'époque en Seine-et-Oise, actuellement en Seine-Saint-Denis. En 1865, Napoléon III, décrétera de la construction d'une nouvelle poudrerie : appelée la poudrerie impériale de Sevran-Livry, dont les travaux débuteront après la libération du territoire national en 1873. Le choix de Nobel pour ce petit village, proche de la poudrerie et des laboratoires du Service des poudres et salpêtres, n'était certainement pas innocent : cela lui sera reproché quelques années plus tard. Il achètera, vers 1880.","architecture":"FOSSES, la mairie de Sevran est maintenant installée, dans ce bâtiment, après une belle rénovation. Des murs immenses, entièrement peints, avec l'accord du maire de Sevran. Ce bâtiment fait partie des locaux de la mairie de la ville. Il sera bientôt détruit, parce qu'il est très vieux mais en attendant, le voilà recouvert de couleurs. Parmi les formes représentées sur le mur de la mairie : un drapeau français, sur lequel les noms des 600 habitants de Sevran ont été écrits, ainsi que le visage de Marianne.                                                                                                                                                    FAYET  une belle propriété composée d'une belle maison bourgeoise entouré, d'un grand parc, appelé à tort le « château » du Fayet dans lequel il installe ses laboratoires dans des dépendances. Le « château » du Fayet est l'ancienne mairie de Sevran jusqu'à l'inauguration du nouvel hôtel de ville le 19 septembre 2015. Les laboratoires existent toujours mais servent de remises aux services municipaux, et de local pour un club de radioamateurs (Radio-club de Sevran). Le château de Sevran est appelé depuis la maison de résidence d'Alfred Nobel.","habitants":"Famille d'Alfred Nobel\"","divers":"Deux châteaux dans cet article; Fossés et Fayet grav-2.                                                          Sevran GPS : 48° 56' 20,6\" Nord, 2° 31' 43,18\" Est\nFossée GPS : 48° 56' 00\" Nord, 2° 32' 00\" Est","gps":"48° 56' 20,6\" Nord, 2° 31' 43,18\" Est","images":["../image/image_93/93_Sevran_1.jpg","../image/image_93/93_Sevran_2.jpg","../image/image_93/93_Sevran_3.jpg"]},"Consult_chateau_formulaire2450":{"id":"Consult_chateau_formulaire2450","dept":"93","canton":"Sevran","commune":"Sevran","nom":"St_Ouen_Sevran","type":"Château","periode":"XVII-XVIII","histoire":"St OUEN, au XVIIe siècle, Joachim Seiglières de Boisfranc se fait construire un château sur son domaine de Saint Ouen en faisant appel à larchitecte Antoine Lepautre. Les travaux du château de Joachim Seiglières sétalent de 1664 à 1669. Il nen demeure aujourdhui que la grille en fer forgé de la terrasse. En 1820, Louis XVIII rachète le château. Il réalise lui-même des croquis et charge larchitecte Jean-Jacques Marie Huvé dédifier, en partant de ses esquisses, un bâtiment qui demeurera lun des rares témoins de larchitecture de la Restauration. Le château terminé, Louis XVIII le cède à sa dernière favorite, la comtesse Zoé du Cayla. A la mort de la comtesse du Cayla, en 1852, sa fille, la princesse de Beauvau-Craon, hérite du château de Saint-Ouen, et s'en défait en 1881 La propriété est louée à une société hippique, puis vendue à la société industrielle Thomson Houston en 1917 qui laisse  l'édifice à l'abandon occupé par  par les allemands et les chantiers de jeunesse, le château menace ruine, La municipalité acquiert le château et une partie du parc en 1958 et le bâtiment est restauré entre 1963 et 1965. Aujourdhui le musée des Beaux-Arts.                                                                                                                                   CLIPPIACCUM, c'est une ancienne villa royale. Depuis le Moyen Age, l'ancienne Villa Clippiacum de Saint-Ouen est un lieu de résidence royale. Au XIIIe siècle, Guillaume de Crépy y fait construire un manoir quil cèda ensuite à Philippe de Valois. Dans le château construit au XVIIe siècle par l'architecte Antoine Le Pautre, Louis XVIII signe le 2/05/1814, la Déclaration qui restaure le trône et institue certaines libertés constitutionnelles. Il fit bâtir à son emplacement, le château actuel, en 1821.","architecture":"St OUEN,  fut reconstruit de plan carré  de 1821 à 1823, pour Jean-Jacques-Marie Huvé. Le château est construit en pierres de taille. L'intérieur comporte un vestibule central sur lequel s'ouvre une cage d'escalier monumental ; sur la gauche, une salle à manger a conservé son décor ancien et ses portes en loupe de noyer ; la salle de billard contient des cheminées et des consoles de marbre blanc ; le salon d'angle a conservé un beau décor de pilastres et de cheminées ; les plafonds sont décorés de patisseries formant caissons. On accède à létage par un escalier à la rampe sculptée dans de lacajou de Cuba et aux balustres ornés de gueules de lions dorés. La salle de billard est probablement la plus belle pièce du château.  Le château de Saint-Ouen est inscrit et  classé aux M.H. C'est un exemple très soigné d'architecture de la Restauration. Le mobilier qui occupait ce château, jusqu'à son transfert en Lorraine, au château d'Haroué au milieu du XIXe siècle, est également d'une qualité exceptionnelle. Racheté par l'État, il pourrait, à l'avenir, être exposé, à nouveau, dans le château de Saint-Ouen.                                                                                                                                    CLIPPIACCUM En 1821, le roi Louis XVIII (1755-1824) ordonne la démolition de l'ancien château et en commande un autre à Huve, pour loffrir à Zoé Talon, comtesse de Cayla, qui était sa maîtresse. C'est un pavillon carré à lItalienne, rare exemple des demeures de plaisance de la Renaissance, qui comporte de très beaux décors intérieurs. Le château de Saint-Ouen sera restauré en 1963. Installé dans le château depuis 1958, le musée municipal de Saint-Ouen possède une belle collection de meubles anciens, disposée dans la salle à manger, le petit salon et la salle de billard. Le premier étage, quant à lui, expose des toiles modernes, des cartes postales et des souvenirs de Mme de Pompadour (1721-1764) jusqu' à lessor industriel du XIXe siècle.","habitants":"Famille de Joachim Seiglières de Boisfranc et  Philippe de Valois \"","divers":"St Ouen GPS : 48° 54' 59,5\" Nord, 2° 19' 46,12\" Est                     Clippiacum GPS : 48° 54' 44\" Nord, 2° 20' 03\" Est                                          st ouen  GPS : 48° 55' 01\" Nord, 2° 19' 44\" Est","gps":"48° 54' 59,5\" Nord, 2° 19' 46,12\" Est                     Cl","images":["../image/image_93/93_St_Ouen_Sevran_1.jpg","../image/image_93/93_St_Ouen_Sevran_2.jpg","../image/image_93/93_St_Ouen_Sevran_3.jpg","../image/image_93/93_St_Ouen_Sevran_4.jpg"]},"Consult_chateau_formulaire4e81":{"id":"Consult_chateau_formulaire4e81","dept":"93","canton":"Livry-Gargan","commune":"Clichy sous Bois","nom":"Terrasse_Clichy","type":"Château","periode":"XV-XVIII","histoire":"La TERRASSE, ravagée lors de la guerre de cent ans, lancienne commanderie des Templiers est reconstruite en 1491. Mal entretenue, la forteresse se dégrade lentement jusquau XVIIIe siècle. Elle appartient alors au grand prieur de France des Hospitaliers de Saint-Jean-de-Jérusalem. En 1778, la réfection dont ils font lobjet, laisse les bâtiments dans leur intégralité pour la dernière fois. Lors de la vente des biens de lEglise, comme biens nationaux, pendant la Révolution française, les nouveaux propriétaires, les banquiers Mallet de Genève, font édifier un château plus au nord que la commanderie. Au début du XIXe siècle, un propriétaire illustre, le maréchal Kellermann, duc dEmpire et connu comme le vainqueur de Valmy, en fait lacquisition. Il subit de sérieuses détériorations pendant loccupation prussienne de 1870. Au milieu du XXe siècle, le propriétaire, monsieur Grampa, refait la décoration du double salon. Suite aux remaniements dont il a fait lobjet, le château a considérablement été réduit et ne présente plus rien de laspect massif de la commanderie de lordre du Temple.","architecture":"VICOMTE DE PUYSEGUR, le vicomte de Puységur fait élever son château au début du règne dHenri IV. La tradition veut que la favorite du roi, Gabrielle dEstrées y passe pour y retrouver son royal amant. Le surintendant des Eaux et Forêts de Louis XIV, Robert de Bragelongne, acquiert le château en 1645. Il y apporte quelques transformations puis le cède au comte Jean-Antoine dAvraux. Le financier Charles Gayler, séduit par le parc, prend possession de la propriété et agrandit le domaine. Gayler désire supprimer le jardin à la française du domaine et charge Alexandre Théodore Brongniart de la réorganisation du parc, son projet sinscrit dans le goût des jardins anglais à la mode en France à la fin du XVIIIe siècle. Entre les mains de Brongniart, le visage du jardin prend forme avec des rocailles et de fausses ruines entourant un étang au contour sinueux. Au XVIIIe siècle, le Bas de Gourmont fermier général et maire de Clichy de 1791 à 1794 fait édifier une orangerie. Sa façade est ponctuée darcades séparées par de grands pilastres ioniques supportant une corniche. En 1807, le château entre dans les possessions du banquier Barmont. Il y apporte plusieurs transformations dont celle de la façade, elle est refaite dans le style néo classique avec lajout du fronton, du portique de lentrée et des balcons, lui donnant sa physionomie actuelle. En 1930, la municipalité devient propriétaire du château.\nÉléments protégés MH : les façades et les toitures , mairie, et de l'orangerie, actuellement salle des fêtes; le parc : inscription par arrêté du 22 septembre 1972. Hôtel de Ville.","habitants":"Famille de Mallet de Genève et  le maréchal Kellermann\"","divers":"Terrasse  grav-1-2 GPS : 48° 55' 00\" Nord, 2° 33' 00\" Est                                                     Puységur  grav 3-4                                             GPS : 48° 55' 00\" Nord 2° 33' 00\" Est","gps":"48° 55' 00\" Nord, 2° 33' 00\" Est","images":["../image/image_93/93_Terrasse_Clichy_1.jpg","../image/image_93/93_Terrasse_Clichy_2.jpg","../image/image_93/93_Terrasse_Clichy_3.jpg","../image/image_93/93_Terrasse_Clichy_4.jpg"]},"Consult_chateau_formulaire1bdc":{"id":"Consult_chateau_formulaire1bdc","dept":"93","canton":"Tremblay-en-France","commune":"Tremblay","nom":"Tournelles_Tremblay","type":"Château","periode":"XVIII","histoire":"TOURNELLES, situé à lentrée du Petit Tremblay, le château doit son nom à son toit dardoise qui se distingue des toits de tuile et de chaume spécifiques à la région. On retrouve le même type de couverture dans lancienne folie construite au XVIIIe siècle au Bourget. A lorigine, le château Bleu porte le nom de château des Tournelles. Ce sont des tours flanquant de part et dautre lentrée du château, des tourelles appelées autrefois \"tournelles\", que lui vient ce nom. Jusquen 1980, une ferme demeure en activité sur les terres de lancien fief des Tournelles. Mais, au début des années 1990, le projet de création dun complexe hôtelier de mille chambres menace le site. La municipalité lachète en 1992 sauvant ainsi le château de la destruction. Larchitecte Massimiliano Fuksas a été chargé de sa réhabilitation. Celle-ci a consisté à reconvertir les bâtiments dans le respect du patrimoine originel, afin dy abriter le centre équestre avec, notamment, quatre manèges couverts.","architecture":"TOURNELLES, les tourelles du château sont, comme létaient la demeure principale et le pavillon bleu, couvertes dardoises. Le corps de logis principal se compose dun rez-de-chaussée offrant de nombreuses pièces décorées de boiseries, dun étage et dun grenier. La façade, encadrée par deux pavillons, est surmontée dun large fronton triangulaire. Le portail date du XVIIe siècle. Partant de chaque côté de la grille du portail un mur en demi lune dessine une courbe entre les deux tourelles de la propriété seigneuriale  dit Le château bleu est une ancienne propriété des abbés de Saint-Denis. Le château fut vendu par le Cardinal de Retz, dernier abbé de Saint-Denis. A la fin du XIVe siècle, il deviendra la demeure des seigneurs du château des Tournelles jusquà la Révolution Française, en 1789.","habitants":"Seigneur local abbé de Saint-Denis.\"","divers":"Tournelles  GPS : 48° 51' 00\" Nord, 2° 21' 18\" Est","gps":"48° 51' 00\" Nord, 2° 21' 18\" Est","images":["../image/image_93/93_Tournelles_Tremblay_1.jpg"]},"Consult_chateau_formulaire9880":{"id":"Consult_chateau_formulaire9880","dept":"93","canton":"Tremblay-en-France","commune":"Vaujours","nom":"Vaujours_93","type":"Château","periode":"XVI-XVIII","histoire":"VAUJOURS,  la tradition veut que le château  ait été habité par la marsquise de Pompadour,  le seigneur de Vaujours, depuis le XVIe siècle  le baron Jean-Philippe de Maistre, fait édifier une demeure moderne du XVIe, telle quon les conçoit au XVIIIe siècle, réalisé dans le pur style néo-classique, le corps central au fronton cintré, côté cour, et attique, côté jardin, est flanqué de deux pavillons. Réalisée au siècle suivant et seul vestige de cette demeure qui sélevait rue de Coubron, la surabondance de son décor témoigne du goût dominant du Second Empire. Celle du baron de Maistre répond, au contraire, à la sobriété du XVIIIe siècle.","architecture":"VAUJOURS, le château Mathieu se situe rue de Coubron à Vaujours. C'est un édifice en brique et pierre, encadré de tourelles qui datent du XIXe siècle. L'ancien Château de Vaujours accueille depuis dans ses murs l'école Fénélon. Il appartient à une société privée. datant de la fin du XVIIIe siècle est reconverti en lycée privé horticole depuis 1839. Il fait lobjet dune inscription aux M.H. depuis le 15.10.1974 pour ses décors en ferronnerie (rampe d'escalier en fer forgé), ses sculptures et ses peintures.  La décoration intérieure du château de Vaujours, de style Louis XVI, est dorigine. Au rez de chaussée, un vestibule à colonnes toscanes dessert deux salles ornées de bas reliefs, tandis quun escalier monumental donne accès à létage. La famille de Maistre conserve cette demeure jusquen 1839, date à laquelle le lycée Fénelon en prend possession. Parfaitement entretenu, il présente un ensemble exemplaire de larchitecture du XVIIIe malgré les constructions du XIXe siècle et nécessitées par lextension de lécole.  Éléments protégés MH : le vestibule et l'escalier intérieur avec sa rampe en fer forgé ; les façades et les toitures ; le salon et la salle à manger avec leur décor : inscription par arrêté du 15 octobre 1974.","habitants":"famille de Maistre \"","divers":"","gps":"","images":["../image/image_93/93_Vaujours_93_1.jpg","../image/image_93/93_Vaujours_93_2.jpg","../image/image_93/93_Vaujours_93_3.jpg"]},"Consult_chateau_formulaire9788":{"id":"Consult_chateau_formulaire9788","dept":"93","canton":"Villemomble","commune":"Villemomble","nom":"Villemomble","type":"Château","periode":"XVIII","histoire":"VILLEMOMBLE, lorsquil acquiert le domaine pour y installer mademoiselle Le Marquis, le duc dOrléans fait disparaître la vieille demeure et la remplace par une propriété de style Louis XV, ceinte dun vaste parc inspiré par celui du Raincy, aprés les Rostaing le domaine passe par les femmes jusqu'a son achat  en 1676  aux Ragois de Bretonvilliers, la marquise  de Montmirail descendante de Bretonvillers vend le domaine en 1760 Jean-Baptiste Paulin d'Auguesseau du Fresnes  conseiller d'état qui fait démolir l'ancien château, cest Alexandre Brongniart qui est chargé de réaliser cette nouvelle demeure. Piètre, décorateur du duc dOrléans se charge de laménagement dun intérieur destiné à servir de cadre à des fêtes somptueuses. Mme de Villemomble ( Etiennette Le Marquis) vend ses terres et son château, en 1800, à Bourelle de Sivry, payeur général de la guerre. A lorée du XIXe siècle, le domaine sétend sur 320 hectares. Après avoir changé plusieurs fois de propriétaires, le château est acheté par René François Papin en 1837. Sa fille, Julie Outrebon associée à Louis Constantin Detouche, maire de Villemomble de 1871 à 1879, lotissent le domaine en 1875. Le château et les 7000 m² de terrain sont cédés à la municipalité.","architecture":"VILLEMOMBLE, date du XVIIIe siècle. Le château de Villemomble, conçu comme une \"folie\" très en vogue au XVIIIe siècle, le bâtiment se compose dun corps central flanqué de deux ailes semi-circulaires. De la façade principale, on y pénètre par une porte cintrée encadrée de deux colonnes ioniques et surmontées dun balcon en pierre de taille. Au sommet du bâtiment, le fronton est orné dun soleil entouré de cornes dabondances, de trompes et de chiens, rappelant la vocation du domaine servant de relais de chasse à François 1er.  Il  a servi d'hotel de ville, durant plusieurs années puis, a été utilisé à des fins culturelles. Entièrement restauré, depuis 2003, le château de Villemomble est devenu un musée, ouvert au Public, éléments protégés MH : les façades et les toitures ; les décors intérieurs suivants : le vestibule, la salle des mariages et le salon ovale : inscription par arrêté du 10 décembre 1986.","habitants":"Mme de Villemomble\"","divers":"GPS : 48° 53' 04\" Nord, 2° 30' 40\" Est","gps":"48° 53' 04\" Nord, 2° 30' 40\" Est","images":["../image/image_93/93_Villemomble_1.jpg","../image/image_93/93_Villemomble_2.jpg","../image/image_93/93_Villemomble_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','93 — Seine-Saint-Denis'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
