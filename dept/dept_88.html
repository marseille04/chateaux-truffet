a banquier May il est racheté en 1829 des suites de la faillite de son propriétaire par la famille Plumerel. Il est vendu par l'un des descendants Alexandre Chapier qui investit le produit de la vente dans la station thermale de MARTIGNY LES BAINS (88) aujourd'hui en sommeil. Plus tard le château est racheté par Maurice Chapier, le fils du précédent. La famille conservera les lieux jusqu'en 1988.","architecture":"LANDAVILLE, aujourd'hui le château est partiellement loué et les jardins ont été réorganisés. C'est une propriété privée qui ne se visite pas.  Château fort de Landaville Il a été bâti en 1732. La construction date du XVIe, 2eme quart du XVIIIe et du XVIIIe siècle. Le château date du 1823), avec son colombier et sa gloriette. \r\nL'édifice actuel correspond en partie au logis féodal. Il subsiste une tour ronde à l'angle d'une dépendance, deux colombiers et un pressoir.\r\nLe château et une partie de ses dépendances sont visibles depuis la rue.","habitants":"Famille Du Hautoy\r\n        \"","divers":"Tour à Landaville et château de Feyel grav 2-3                                                                        GPS : 48° 17' 21\" Nord, 5° 44' 40\" Est","gps":"48° 17' 21\" Nord, 5° 44' 40\" Est","images":["../../jctruffet.com/image/image_88/88_Landaville_1.jpg","../../jctruffet.com/image/image_88/88_Landaville_2.jpg","../../jctruffet.com/image/image_88/88_Landaville_3.jpg"]},"Consult_chateau_formulaire1a26":{"id":"Consult_chateau_formulaire1a26","dept":"88","canton":"Darney","commune":"Relanges","nom":"Lichecourt","type":"Château","periode":"XV-XVII","histoire":"LICHECOURT, le premier possesseur de cette terre fut le romain Ligiscus donnant son nom au lieu devenu Ligecourt. Jehan de Thyssac bâtit en 1413,  Nicolas de Thysac mort, ce sont ses deux gendres: Nicolas de Dardenet (écuyer, seigneur de Gourey, capitaine de la ville de Clermont-en-Argonne) et Philippe le Brun (écuyer, Seigneur de Mons-en-Quercy, capitaine de la ville et du château de Capdenac) qui se partagent le château de Lichecourt et le pavillon sud. succéderont par alliance  aux Massey. Puis aux Hennezel le Grandmont,  Anne Salomé  Hennezel de Grandmont fait reconstruire le corps de logis de 1703 à 1732 en 1705 le château passe à la famille Fleury  Joseph Alexandre de Fleury en 1821 leur descendant Joseph-Richard de Fleury et sa femme  Françoise-Josephine de Stack habite le château qui le garderont jusqu'en 1841,  ils échangeront le château contre un domaine foncier de Valleroy- le-Sec,  appartenant à Léopold de Finance. La ferme, à côté du château de Lichecourt à la famille Labat, accueille, depuis 2000, une maison de retraite pour des chevaux, appelée \"Crins Blancs\", pour assurer une fin de vie de qualité aux chevaux âgés, prématurément usés, accidentés, maltraités ou abandonnés. Le propriétaire actuel du château de Lichecourt est Mr Yves Champy, qui en a fait un musée ouvert au public. Le château de Lichecourt est inscrit aux M.H,  le 19/12/1986.","architecture":"LICHECOURT, la maison forte est incendiée et reconstruite à plusieurs reprises pour des gentilshommes verriers. Originaire de Bohême, les verriers sont appelés en Lorraine par le duc, au XVe siècle.  C'est le fils de Nicolas de Thysac qui la fit reconstruire, au milieu du XVIe siècle, ainsi que le pavillon sud qui lui est accolé, le château, la tour nord, une enceinte, il  sera partagé entre les descendants des fondateurs. Ce régime reste en place du milieu du XVIe siècle jusqu'à la Révolution Française. Lichecourt vera construire différentes habitations secondaires autour du château, habitées par plusieurs familles différentes qui se partagent le domaine. Au cours de la guerre de trente ans, l'enceinte fut détruite, en 1635, par les français et les suédois. Une grande partie du château actuel fut reconstruite, entre 1703 et 1732.  Avec sa tour de défense, cette maison fortifiée était un bastion pendant la guerre entre la Lorraine et la Bourgogne. La tour de gauche a été préservée. La façade actuelle, avec ses pierres de taille en gré des Vosges donnant un camaïeu de beige, rose et gris,  La tour de droite date du XIXe siècle.   Au XIXe siècle, un étage sera rajouté, dans un style néogothique, à la tour nord. La façade principale, la tour sud-est, la tour nord-est à l'exclusion du dernier étage et du couronnement, et les deux pavillons dont un sert de chapelle sont inscrits aux M.H. en 1973. La maison du verrier de Thysac, collée au pavillon sud, a été inscrite aux M.H. le 19/12/1986.  Éléments protégés MH : le château. La maison du verrier de Thysac : inscription par arrêté du 19 décembre 1986.   Le château est une demeure de gentilshommes verriers qui a conservé une belle allure seigneuriale, de style Renaissance. Initialement, c'était une maison forte.","habitants":"famille Fleury\r\n        \"","divers":"Manoir de lischourt   Grav-1-2-3                                           gps : 48° 05' 53\" Nord, 5° 59' 57\" Est","gps":"48° 05' 53\" Nord, 5° 59' 57\" Est","images":["../../jctruffet.com/image/image_88/88_Lichecourt_1.jpg","../../jctruffet.com/image/image_88/88_Lichecourt_2.jpg","../../jctruffet.com/image/image_88/88_Lichecourt_3.jpg"]},"Consult_chateau_formulaire122b":{"id":"Consult_chateau_formulaire122b","dept":"88","canton":"Darney","commune":"Ville sur Illon","nom":"Lobstein","type":"Château","periode":"XIX","histoire":"LOBSTEIN, c'est une ancienne maison de maitre, bâtie en 1940. Son premier propriétaire était Jacques Jacques Lobstein. L'architecte était François Clasquin. Le château Lobstein doit son nom à son propriétaire initial, Jacques Lobstein (1847-1931), fils de tonnelier, né à Brumath en Alsace. Il quitte sa région après l'annexion de l'Alsace-Lorraine en 1871 par l'Empire allemand. Il est alors engagé à la \"Brasserie de la Cense\" à Xertigny comme garçon brasseur où il apprend le métier, puis devient propriétaire de la \"Brasserie de L'Hôte\" à Ville-sur-Illon en 1877, réputé pour la pureté de ses eaux qui est indispensable à la production de la bière. Les premières fabrications de bière dans le village dataient de 1627. La brasserie nouvellement acquise se révélant trop petite pour se reconvertir au brassage industriel, il crée \"la Grande Brasserie et Malterie Vosgienne\" en 1887, pour produire la bière et le malt industriellement, avec de nouvelles techniques (la production s'arrêtera en 1956 pour la bière, en 1966 pour le malt et en 1975 pour les boissons gazeuses). En 1904, Jacques Lobstein fait construire une maison de maître à proximité de sa brasserie, sur des plans de l'architecte départemental François Clasquin. En 1931, son fils René Lobstein hérite de la brasserie et du château jusqu'à son décès en 1964. Le château Lobstein a été inscrit aux M.H. le 29/06/1993.    Jacques Lobstein (1904-1931). René Lobstein (1931-1964), son fils. famille Reichart, famille Cordier;, Walter Gross, propriétaire actuel.","architecture":"LOBSTEIN maison de maître de plan rectangulaire  dont le corps principal de logis est insérer entre deux pavillons à trois niveaux, l'ensemble toit en croupe. Le château est d'un style éclectique de la fin du XIXe siècle avec l'influence de l'art nouveau dans ses décors intérieurs : les verrières ont été créées dans les ateliers du maître verrier Charles Champigneulle et les décors peints à thèmes floraux sont de G. Destin.","habitants":"Famille de    Jacques Lobstein\r\n        \"","divers":"Manoir de Lobstein grav 1-2-3-4                                                         GPS : 48° 10' 55 Nord, 6° 12' 25\" Est","gps":"48° 10' 55 Nord, 6° 12' 25\" Est","images":["../../jctruffet.com/image/image_88/88_Lobstein_1.jpg","../../jctruffet.com/image/image_88/88_Lobstein_2.jpg","../../jctruffet.com/image/image_88/88_Lobstein_3.jpg","../../jctruffet.com/image/image_88/88_Lobstein_4.jpg"]},"Consult_chateau_formulaire40da":{"id":"Consult_chateau_formulaire40da","dept":"88","canton":"Darney","commune":"Martinvelle","nom":"Martinvelle","type":"Château","periode":"XVII","histoire":"MARTINVELLE,  la construction du château date du XVIIIe au XIXe siècle. Son propriétaire initial était la famille Esmez-Deutout, elle était au service des ducs de Lorraine. François Esmez, colonel du régiment dÉpinal, est anobli par le duc Charles IV de Lorraine en 1651 pour ces faits d'armes au siège dÉpinal le 9 octobre 1650. Ses armoiries sont les suivantes : porte d'azur à l'épée flamboyante d'argent mise en pal, surmontée de trois étoiles d'or mise de rang. Il avait été avant un des défenseurs de La Mothe-en-Bassigny face aux armées françaises de Louis XIV jusqu'en 1645. Au début du XIXe siècle, Jacques-Alexandre Esmez-Deutout (1777-1856), 1er Baron Esmez-Deutout, colonel de hussards, maire de Martinvelle, décide d'agrandir certains bâtiments existants de l'époque pour créer les pièces principales du château, il sera fortement remanié. il  n'est pas inscrit ni classé aux M.H. Mme Laure Esmez Deutout Pigache habite depuis le château. C'est une descendante de la famille Esmez Deutout et de la famille Pigache qui se sont unies. Elle est à la tête d'une exploitation agricole de culture de fruits à pépins et à noyaux.","architecture":"MARTINVELLE, le domaine du château est situé en contrebas du village dans un vallon boisé. Il est entièrement entouré par un mur de pierre.\r\nLe château en U se dresse au fond de la cour d'honneur et se compose en un bâtiment principal, avec deux tours carrées, auquel il faut ajouter deux ailes de chaque côté. Le bâtiment principal a quatre niveaux d'élévation, le 3e étage étant sous le toit, alors que ses deux ailes n'en ont que deux. Le rez-de-chaussée surélevé du bâtiment principal est mis en valeur par un perron et une terrasse bordée par une rampe en fer forgée.\r\nÀ droite du château se trouvent la ferme et les communs dont une pièce abrite un four à pain.","habitants":"Famille du Baron Esmez-Deutout\r\n        \"","divers":"Manoir de Esmez grav 1 et château de Martinvelle grav-2 GPS : 47° 58' 20\" Nord 5° 59' 47\" Est","gps":"47° 58' 20\" Nord 5° 59' 47\" Est","images":["../../jctruffet.com/image/image_88/88_Martinvelle_1.jpg","../../jctruffet.com/image/image_88/88_Martinvelle_2.jpg"]},"Consult_chateau_formulaire985a":{"id":"Consult_chateau_formulaire985a","dept":"88","canton":"Vittel","commune":"Valfroicourt","nom":"Maugiron","type":"Château","periode":"XVI-XIX","histoire":"MAUGIRON  Il appartenait à Pierre de Maugiron. La construction du château de Maugiron date du XVIe au XIXe siècle. Pierre de Maugiron, Grand écuyer de Lorraine, fait construire le premier château au début du XVIe siècle. Les fondations de ce premier édifice se voit toujours aujourd'hui. En 1720, Valfroicourt sera intégré au comté d'Hoffelize (Bainville-aux-Saules actuellement), et les comtes habiteront le château. Le dernier seigneur de Valfroicourt, Charles Georges d'Hoffelize, chambellan de l'empereur et maréchal de camp du roi de France, fit reconstruire le château dans le goût du XVIIIe siècle. Mais à peine achevé en 1789, le comte dut fuir, dès le début de la Révolution française, par un souterrain à l'Abbaye Notre-Dame de Bonfays car son château fut assiégé par des paysans en colère qui y mettront le feu. Les ruines calcinées sont incorporées dans une nouvelle construction plus modeste au XIXe siècle, pour être transformée en exploitation agricole. L'ensemble est sauvé par M. et Mme Peiffer dans la seconde moitié du XXe siècle. Le château de Maugiron est inscrit aux M.H.le 31 août 1990 (façades, toitures et jardin)","architecture":"MAUGIRON Les super positions successives de l'histoire donnent au manoir un caractère étrange. Seule une moitié du château conserve des ouvertures XVIIIe siècle avec de beaux balcons en fer forgé. L'intérieur conserve encore quelques boiseries et cheminées restaurées par M. et Mme Peiffer. À l'arrière du château se trouvait un parc à la française, manquant d'entretien actuellement.","habitants":"Famille de  Charles Georges d'Hoffelize\r\n        \"","divers":"Château de Maugiron gra 1-2-3                                                          GPS : 48° 11' 52\" Nord 6° 05' 49\" Est","gps":"48° 11' 52\" Nord 6° 05' 49\" Est","images":["../../jctruffet.com/image/image_88/88_Maugiron_1.jpg","../../jctruffet.com/image/image_88/88_Maugiron_2.jpg","../../jctruffet.com/image/image_88/88_Maugiron_3.jpg"]},"Consult_chateau_formulaire3b18-2":{"id":"Consult_chateau_formulaire3b18-2","dept":"88","canton":"Mirecourt","commune":"Mirecourt","nom":"Mirecourt","type":"Château","periode":"XV-XVI-XVIII-XIX","histoire":"MIRECOURT, MANDRE, possède encore une jolie tour médiévale.     JOLY disparu. Le domaine de BEAU JOLY est privé, mais le site du château est visible depuis la route qui le longe en direction de l'hôpital de Ravenel.                                                                                  TOUR RAVENEL, la Tour de Ravenel est ce qui reste d'un ancien château fort, construit du XVIe au XVIIIe siècle. Plusieurs châteaux existent à Mirecourt à découvir : Le château épiscopal (XVe siècle, la conciergerie et la tour de l'ancienne porterie sont inscrites aux M.H. 23/06/1988.                                                                                                       CAPUCINS le château des Capucins, construit à la limite du XVIIIe et du XIXe siècle à l'emplacement de l'ancien couvent des Capucins, les façades et toitures du château, de l'orangerie et des dépendances, la salle voûtée souterraine, ainsi que les sols et clôtures de la cour et du parc inscrits depuis le 29/06/2004.                                                   BOUZILLON du XVIIIe siècle), le château de Sainte-Lucie (XIXe siècle), le château de la FORGE  du XIXe siècle) et l'hôtel de ville de Mirecourt (XVIe siècle), classé par liste de 1900.  Charles Georges d'Hoffelize","architecture":"MANDRES ce château est tout ce qui reste de l'ancien village de MANDRE AUX TROIS TOURS ainsi nommé pour ne pas le confondre avec \r\nLe château qui apparaît au XIVe siècle. il est tenu par la famille de Mandre, puis par celle de Mirecourt. La vie du village allait prendre fin avec le massacre de toute sa population au cours de la guerre de Trente-Ans. A cette époque de château appartient à la famille d' Haraucourt qui le vendent aux Prémontrés de Parey puis à Jean Baptiste de Ravenel en 1684.                                                                                                                                          Les RAVENEL sont d'influent membres de la cour du duc Léopold. Jean Baptiste décide alors de rebaptiser l'endroit Ravenel. En 1759 le domaine est en fort mauvais état. Il revient au marquis Claude Antoine de Choiseul la Beaume en 1774. Le marquis préférant vivre à la cour de France donne la jouissance du domaine à des fermiers. En 1789 ce fermier est Charles Maucotel. Le marquis de Choiseul est guillotiné le 15 floréal de l'an II.En 1829  le domaine est  la propriété de la famille Buffet qui s'en sépare en 1898. C'est alors que le domaine va être transformé en hôpital psychiatrique départemental.\r\nLe principal vestige médiéval du château de Mandre est une tour ronde double présentant des canonnières à tir croisé. Un manoir du XVIII° siècle lui est accolé.","habitants":"Famille de Mirecourt\r\n        \"","divers":"Château de Mirecourt grav 1-2 Halle  grav -3-4 tour grav 5-6-7","gps":"","images":["../../jctruffet.com/image/image_88/88_Mirecourt_1.jpg","../../jctruffet.com/image/image_88/88_Mirecourt_2.jpg","../../jctruffet.com/image/image_88/88_Mirecourt_3.jpg","../../jctruffet.com/image/image_88/88_Mirecourt_4.jpg","../../jctruffet.com/image/image_88/88_Mirecourt_5.jpg","../../jctruffet.com/image/image_88/88_Mirecourt_6.jpg","../../jctruffet.com/image/image_88/88_Mirecourt_7.jpg"]},"Consult_chateau_formulairecbc6":{"id":"Consult_chateau_formulairecbc6","dept":"88","canton":"Darney","commune":"Monthureux sur saone","nom":"Monthureux","type":"Vestiges","periode":"XI","histoire":"MONTHUREUX sur SAONE, Il ne reste plus du château que des vestiges de cet ancien château fort et des habitations semi-troglodytes. Le château médiéval fut construit au XIVe siècle par les comtes de Monthureux. Au IXe siècle, le prieuré de Monthureux était une manse ou tenure de l'abbaye de Luxeuil. Hugues le Noir, fils de Richard le Justicier, s'empara par la force des terres du monastère. Afin de défendre ses conquêtes, il bâtit des forteresses sur les territoires conquis. Le château de Monthureux daterait de cette époque. A la fin du XIe siècle, il est bien installé sur le point culminant du plateau de grès enserré par les méandres de la Saône. Finalement Luxeuil revendiquera et obtint des droits sur Monthureux. Actuellement, il ne reste plus que les vestiges de 2 tours \"rue du château\". L'unique pont du faubourg facilitait alors les communications avec l'Abbaye de Luxeuil.","architecture":"MONTHUREUX sur SAONE; Un prieuré dépendant de l'abbaye de Luxeuil est accaparé par Hugues le Noir au IXe siècle, il est plausible que le château ait été construit à cette période. Il fut cité au XIe siècle et est repris par l'abbaye de Luxeuil, il relève d'un ensemble de forteresses érigées aux limites de la Lorraine et du Barrois mouvant relevant du roi de France. La place est prise à partie par les suédois et anéantie. Les ruines ont servi de carrière de pierre.  Il ne reste que trois tours et un mur dissimulant des habitations troglodytiques. Le prieuré est devenu un amas de pierre.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château et vestiges de Monthureux                                                      GPS : 48° 01' 50\" Nord 5° 58' 23\" Est","gps":"48° 01' 50\" Nord 5° 58' 23\" Est","images":["../../jctruffet.com/image/image_88/88_Monthureux_1.jpg","../../jctruffet.com/image/image_88/88_Monthureux_2.jpg","../../jctruffet.com/image/image_88/88_Monthureux_3.jpg"]},"Consult_chateau_formulaire3d8b":{"id":"Consult_chateau_formulaire3d8b","dept":"88","canton":"Neufchâteau","commune":"Neufchâteau","nom":"Neufchateau","type":"Château","periode":"XIV-XVI","histoire":"NEUFCHATEAU, château fort, position stratégique des ducs de Lorraine aux limites du duché, face aux prétentions du roi de France, cité en 1252. Chapelle dédiée à Notre-Dame et à saint Julien fondée en 1344, par le duc Raoul. Château conforté par le duc Jean en 1390, puis en 1395. Travaux aux fossés et construction d'une poterne en 1412. Nouveaux travaux en 1466. Réparations en 1570 après visite de Claude Villon, maître maçon du duché de Lorraine. Travaux en 1577, après visite de Florentin de Belleau qui fortifia la Mothe.                                                                                           Le Fort d'Aubin-Neufchâteau, un ouvrage de la ceinture fortifiée de Liège, se trouve à l'est du village.","architecture":"NEUFCHATEAU, travaux en 1582 à la suite de la visite de Florentin Drouin, maître maçon du Duc. En 1586, fourniture de fers pour le pont-levis par les forges de Dainville. En 1633, alors que le château se compose de cinq tours, donjon porte, corps de garde intérieur, deux écuries, grange, greniers, salle d'armes, chapelle, colombier, pressoir, moulin à bras, arsenal, four et puits, ordre de démolition est donné par le prince de Condé. Travaux entrepris en 1634 par réquisition. En 1661, chapelle rebâtie en planches. Vers 1725, site du château acensé à des particuliers par le duc de Lorraine. , il ne subsiste que les vestiges d'une tour ronde qui semble du XIVe siècle et des murs de soutènement.","habitants":"Florentin de Belleau \r\n        \"","divers":"Château de grandvoir grav 1-4\r\ngps 50° 43' nord, 5° 46' est\r\nBourlemont grav 5 et tour de Nideck grav 2-3","gps":"","images":["../../jctruffet.com/image/image_88/88_Neufchateau_1.jpg","../../jctruffet.com/image/image_88/88_Neufchateau_2.jpg","../../jctruffet.com/image/image_88/88_Neufchateau_3.jpg","../../jctruffet.com/image/image_88/88_Neufchateau_4.jpg","../../jctruffet.com/image/image_88/88_Neufchateau_5.jpg"]},"Consult_chateau_formulaireedf8":{"id":"Consult_chateau_formulaireedf8","dept":"88","canton":"Le Val-d","commune":"Plombières les bains","nom":"Plombières_Bains","type":"Château","periode":"XIX-XX","histoire":"PLOMBIERE les Bains, surnommée la « Ville aux mille balcons », est une station thermale très à la mode à différentes époques et notamment au XIXe siècle, sous Louis-Philippe Ier et Napoléon III. Ses habitants sont appelés les Plombinois. Joséphine de Beauharnais, Napoléon III, Berlioz, Lamartine ou encore Alfred de Musset et même le peintre espagnol Goya vinrent séjourner à Plombières. La cité thermale de Plombières-les-Bains mise aujourd'hui non seulement sur le thermalisme, la remise en forme, et son casino, mais également sur le tourisme vert (jardins en terrasses, parc miniature) et les évènements culturels.","architecture":"Le Pavillon des Princes  est construit vers 1820 pour servir de lieu de résidence à la famille royale. Il a accueilli l'entrevue de Plombières entre Napoléon III et Camillo Cavour en 1858. Il accueille aujourd'hui une salle de cardio-training et une salle de massages et d'esthétique pour le Calodaé. Le pavillon des Princes est inscrit monument historique par arrêté du 14 avril 1930.                                                                       Le CASINO actuel est installé depuis 2001 dans le bâtiment voyageurs de l'ancienne gare. Celle-ci était une gare terminus de la ligne venant d'Aillevillers en Franche-Comté. Elle est construite en 1878 devant le parc Impérial au sud de la ville pour recevoir le Train des Eaux qui desservait plusieurs stations thermales et amenait les curistes directement depuis Paris. La gare ferme définitivement ses portes cent ans plus tard en 1978, mais le casino a conservé la structure métallique de la verrière qui protégeait le quai et a installé des rails et un wagon pour un service de restauration. En 1858, Napoléon III fait construire à cet endroit des écuries pour son équipage, qu'il donne dès 1861 à la commune pour le transformer en hôpital thermal. Ceci est fait dès l'année suivante et est destiné aux étrangers. Il est complété en 1894 par un hôpital annexe, appelé hospice des deux Augustin, destiné aux infirmes et vieillards de la commune, réalisé grâce aux dons d'Augustin Husson et d'Augustin Grillot. En 1925,  la ville construit un pavillon d'isolement et un laboratoire de recherches scientifiques subventionné par l'institut d'hydrologie de Paris. La maison de retraite de la ville s'y installe dans les années 1980 jusqu'en 2009.","habitants":"Joséphine de Beauharnais,\r\n        \"","divers":"Plombi5res les bains therme Napoléon grav-1-2-3 pavillon des Princes grav-4, gd hôtel-grav-5, Hospice des deux Augustins grav-6. Office du tourismes grav-4","gps":"","images":["../../jctruffet.com/image/image_88/88_Plombi%c3%a8res_Bains_1.jpg","../../jctruffet.com/image/image_88/88_Plombi%c3%a8res_Bains_2.jpg","../../jctruffet.com/image/image_88/88_Plombi%c3%a8res_Bains_3.jpg","../../jctruffet.com/image/image_88/88_Plombi%c3%a8res_Bains_4.jpg","../../jctruffet.com/image/image_88/88_Plombi%c3%a8res_Bains_5.jpg","../../jctruffet.com/image/image_88/88_Plombi%c3%a8res_Bains_6.jpg"]},"Consult_chateau_formulaire823e":{"id":"Consult_chateau_formulaire823e","dept":"88","canton":"Neufchâteau","commune":"Pompierre","nom":"Pompierre","type":"Château","periode":"XVIII","histoire":"POMPIERRE Il a été construit, en 1741, à la demande de Jean-Baptiste de Lavaulx, seigneur de Pompierre, Sartes, Courcelles et Dolaincourt. Il date du XVIIIe siècle. La date de sa construction est gravée, dans la cave du château, sur une pierre de fondation. C'est une imposante maison seigneuriale, avec un jardin rempli d'arbres. Les armoiries des comtes de Lavaulx sont présentes sur le cartouche à droite de la porte d'entrée, avec comme devise \"Tout par amour\". La famille de Lavaulx est présente en Lorraine depuis le XVe siècle. Ses membres possédaient en effet les terres de Vrécourt, de Saint-Ouen-lès-Parey et de Sommerécourt. Ils émigreront à la Révolution française et le château de Pompierre sera racheté par un maître de forges il n'est pas inscrit ni classé aux M.H.","architecture":"POMPIERRE Le château est de forme rectangulaire sur quatre niveaux avec un sous-sol, un rez-de-chaussée et deux étages, dont le second se trouve sous le toit. La façade principale est orientée vers l'ouest. Une dépendance rectangulaire est accolée au bâtiment principal sur sa façade nord.","habitants":"Jean-Baptiste de Lavaulx\r\n        \"","divers":"Château de Pompierre                                                                       GPS : 48° 15' 20\" Nord, 5° 40' 22\" Est","gps":"48° 15' 20\" Nord, 5° 40' 22\" Est","images":["../../jctruffet.com/image/image_88/88_Pompierre_1.jpg"]},"Consult_chateau_formulairec048":{"id":"Consult_chateau_formulairec048","dept":"88","canton":"Saint-Dié-des-Vosges","commune":"Rambervilliers","nom":"Rambervilliers","type":"Château","periode":"XVIII-XIX","histoire":"Quatre châteaux à Rambervilliers; Capucin, ste-Lucie, tour Angelvin et Bouzillon.                                                                                                      BOUZILLON,  le château fut construit en 1675, pour son propriétaire initial, sur l'emplacement d'un ancien château datant du XVe siècle, dont il subsiste le portail d'entrée, les parties arrières ont été ajoutées aux XIXe siècle et XXe siècle.                                                                                                    CAPUCINS, le château des Capucins doit son nom à ces religieux, il a été construit, en 1785, pour Antoine Gérard, directeur d'une importante faïencerie, il fait construire également l'orangerie et les dépendances. Il est inscrit aux M.H. le 29/06/2004.                                                                                                                                                                                                                        SAINT- LUCIE, sa construction date du XIXe siècle. Son propriétaire initial était le Vicomte de Bolémont. Le château de Sainte-Lucie fut construit en 1876, et offert en cadeau de mariage, à sa future épouse, il compte 3 étages d'élévation, un haut toit en ardoise et 2 tours carrées. L'entrée se fait par le balcon et un escalier monumental, il  n'est pas inscrit aux M.H. ni classé.","architecture":"BOUZILLON, il  est de forme rectangulaire, du XVIIe siècle. Il a 4 niveaux d'élévation, 3 sur les façades et 1 sous-toiture. Les ajouts des XIXe siècle et XXe siècle donnent à l'ensemble une forme de L. A l'intérieur, le grand salon est décoré de peintures de style et d'époque Louis XVI, avec des médaillons sur les murs représentant des contes pour enfants et pour adultes, et une fresque sur le manteau de la cheminée figurant la famille Collinet de La Salle sur la terrasse du château. Une pièce attenante possède des boiseries rocaille. Le château de Bouzillon n'est pas inscrit ni classé aux M.H. Il se situe à l'écart de la ville, à 3 km au sud du centre ville. On y accède depuis la départementale 46 par un petit chemin de 500 m passant sur le Padozel.                                                                                            CAPUCINS, est de forme rectangulaire, avec quatre étages d'élévation dont un sous le toi, les deux façades de la fin du XVIIIe siècle, début XIXe siècle, ont un traitement décoratif propre, mais d'expression néo-classique. C'est un précieux témoignage de l'architecture civile aux lignes pures de cette époque. La façade avant, d'époque Louis XVI, a des proportions harmonieuses, des éléments gréco-romains avec des colonnes ioniques et une rambarde sculptée pour cacher le toit. Elle domine une cour d'honneur entourée de chaque côté par l'orangerie (XIXe siècle) et les dépendances. La façade arrière au nord-est (côté jardin), d'époque premier Empire, possède un fronton triangulaire central. Des petites abeilles sculptées entourant certaines fenêtres rappellent cette époque. Tout se décline autour du chiffre « 7 » sur les deux façades principales. Le site actuel est occupé dès 1620 par un couvent de frères mineurs capucins, dont il subsiste aujourd'hui qu'une salle voûtée, un ancien bassin de réception des eaux (1728), et partiellement la canalisation.","habitants":"Capucin  Antoine Gérard,                                                             Ste lucie  le Vicomte de Bolémont.                                  Boouzillon;Gabriel-François de Paule-Antoine Collinet de La Salle, \r\n        \r\n        \"","divers":"Deux châteaux à Rambervilliers; Capucins grav 3   et Bouzillon Capucins GPS : 48° 21' 01\" Nord, 6° 38' 01\" Est                                                                Bouzillon GPS : 48° 19' 27\" Nord, 6° 37' 25\" Est                                                  Tour Angelemien grav 1    GPS : 48° 12' 03\" Nord 6° 10' 03\" Est                                                                                       Forges  grav-2gps \r\n48° 20' 13\" nord, 6° 38' 24\" est                                                       Sainte-Lucie GPS : 48° 21' 23\" Nord, 6° 37' 52\" Est","gps":"48° 21' 01\" Nord, 6° 38' 01\" Est","images":["../../jctruffet.com/image/image_88/88_Rambervilliers_1.jpg","../../jctruffet.com/image/image_88/88_Rambervilliers_2.jpg","../../jctruffet.com/image/image_88/88_Rambervilliers_3.jpg","../../jctruffet.com/image/image_88/88_Rambervilliers_4.jpg"]},"Consult_chateau_formulaire7b13":{"id":"Consult_chateau_formulaire7b13","dept":"88","canton":"Saint-Dié-des-Vosges","commune":"Rambervilliers","nom":"Rambervilliers_II","type":"Château","periode":"XIII-XIX","histoire":"TOUR D'ANGLEMEIN,  c'est la dernière tour d'angle de l'enceinte de fortification médiévale de Rambervillers, située à l'extrémité Est de la cité. La Tour d'Anglemein faisait partie du système de fortification, dressé au XIIIe siècle, par l'évêque de Metz, Jacques de Lorraine, afin de protéger et faire le guet sur la partie septentrionale de Rambervillers. Elle faisait partie des 24 tours de défense de l'enceinte de la ville fortifiée. Construite vers 1255, elle servait à faire le guet jusqu'à la guerre de 1870. Elle est inscrite aux M.H. La Tour d'Anglemein a été restaurée en 2005. La Tour d'Anglemein se visite et appartient à Mr et Mme Leroy.","architecture":"FORGES, est construit par l'industriel Hubert Velin à la fin du XIXe siècle.    Le château est occupé par un foyer d'accueil spécialisé.   Le château de la Forge est une grande bâtisse rectangulaire surmontée de deux tourelles. Les éléments remarquables sont la cage d'escalier, les ferronneries et la grille d'entrée d'époque et de style école de Nancy. Une maison de retraite spécialisée est accolée au château sur sa façade sud-est.  L'immense parc de la Forge de plusieurs hectares, traversé par la Mortagne et agrémenté de deux étangs, complète l'ensemble de la propriété. Le château de la Forge n'est pas inscrit ni classé aux M.H. Il est devenu un foyer de vie.","habitants":"Tour  Jacques de Lorraine                                                             Forges Hubert Velin\r\n        \"","divers":"trois châteaux dans cet article  ste-Lucie ,Forge et la tour d'Angelmien    GPS : 48° 12' 03\" Nord 6° 10' 03\" Est                                                              Sainte-Lucie  grav 2-4-5.  GPS : 48° 21' 23\" Nord, 6° 37' 52\" Est                                                                                                               Forge  grav1  GPS : 48° 20' 13\" Nord, 6° 38' 24\" Est","gps":"48° 12' 03\" Nord 6° 10' 03\" Est","images":["../../jctruffet.com/image/image_88/88_Rambervilliers_II_1.jpg","../../jctruffet.com/image/image_88/88_Rambervilliers_II_2.jpg"]},"Consult_chateau_formulairef720-2":{"id":"Consult_chateau_formulairef720-2","dept":"88","canton":"Vittel","commune":"Hagneville Roncourt","nom":"Roncourt","type":"Château","periode":"XVIII","histoire":"RONCOURT, cette maison de maître date du XVIIIe siècle. La seigneurie appartenait, depuis 1583, à la famille Menu de Roncourt. Le premier représentant est Etienne Menu, anobli par le duc Charles III de Lorraine, le 16 juillet 1583 et seigneur de Roncourt, par donation du 25 septembre 1583, de René d'Anglure, seigneur de Lignéville, de Bourlémont et gouverneur de La Mothe. Cette donation est faite en récompense des services rendus. La famille Menu prend le nom de Roncourt à partir de cette date et conserve la seigneurie jusqu'au milieu du XVIIIe siècle.  Vers 1760, Nicolas Hennequin (1728-1819), comte de Fresnel devient le seigneur de Roncourt. Il est le fils de Nicolas-François Hennequin (1662-1740), comte de Curel et de Fresnel. Il a fait bâtir l'hôtel des Loups à Nancy, et de Catherine-Élisabeth de Roncourt (1709-1763), qui se sont mariés en 1727. Nicolas Hennequin vend en 1784, la seigneurie de Roncourt au sieur de Stack (ou Stach), originaire d'Irlande, dont les descendants occuperont le château, du XIXe et XXe siècle. Suite à un mariage, le domaine passe à la famille de Fleury lorsque Françoise-Josèphe-Pauline de Stack, une des filles du sieur de Stack, épouse Joseph-Richard de Fleury (1761-1839). Deux générations plus tard, le château passe dans les mains de la famille de Bigot avec le mariage, en 1864, de Victoire-Marie-Thérèse-Amélie de Fleury (1831-1922) et de Louis de Bigot.","architecture":"RONCOURT, ses armoiries sont : porte d'azur, à la face d'argent, chargée de 3 merlettes de fable, membrées de gueules, et accompagnée en chef d'une croix pommetée et fichée d'argent, et pour cimier, un homme sauvage au naturel tenant une masse de fable. En 2006, le château de Roncourt est racheté par les illustrateurs et hommes politiques Yann Wehrling et Marc Tournier. L'édifice sert aujourd'hui de tables d'hôtes, certains soirs et, depuis 2011, de chambres d'hôtes, dans une belle demeure du XVIIIe entourée d'un grand parc de 2 ha et à proximité des villes thermales de Vittel et Contrexeville De forme rectangulaire, le château de Roncourt est sur 3 étages. Il n'est pas inscrit ni classé aux M.H.  Le château de Roncourt appartient actuellement à Yann Wehrling et Marc Tournier.","habitants":"Famille Menu de Roncourt\r\n        \"","divers":"Château de roncourt à Hagneville                                                GPS : 48° 14' 07\" Nord, 5° 45' 19\" Est","gps":"48° 14' 07\" Nord, 5° 45' 19\" Est","images":["../../jctruffet.com/image/image_88/88_Roncourt_1.jpg"]},"Consult_chateau_formulaire41c4":{"id":"Consult_chateau_formulaire41c4","dept":"88","canton":"Neufchâteau","commune":"Sionne-Midrevaux","nom":"Rorthey","type":"Maison-forte","periode":"XIII-XVIII","histoire":"RORTHEY, est un ancien château fort dont la construction date du XIe au XIIIe siècle, se situe, à Sionne et Midrevaux, sur un éperon  qui domine la Vallée de Rorthey. Propriété de l'évêché de Toul, les Evêques Bertholde et Hermann construisent une maison-forte dès le début du XIe siècle. Hermann de Toul combat les seigneurs laïcs qui essaient de spolier les biens de léglise. Pour la maison-forte de Rorthey, il dut composer avec Étienne de Vaux, seigneur de Joinville, en lui donnant l'investiture de celle-ci. Dès 1057, des chevaliers vassaux de l'évêque de Toul prirent le nom de Rorthey, puis le fief alla aux seigneurs de Brixey. Le château passe ensuite par mariage dans plusieurs familles : les Bauffremont au XIVe siècle, les seigneurs de Manonville et de Beauvau aux XVe et XVIe siècles. A la fin du XVIe siècle, le propriétaire est René II de Beauvau, Baron de Rorthey, sénéchal du Barrois et chevalier de l'ordre du roi. son épouse Guillemette des Salles, fille du seigneur de Gombervaux Jean des Salles, a été élevée dans la foi protestante calviniste. Cette dernière donnait asile aux protestants de la région lors des guerres de religion, ce qui provoqua le siège et la prise du château par les troupes de la ligue catholique de Charles III de Lorraine. Guillemette des Salles fut chassée de son château et n'en obtiendra la restitution qu'après sa soumission au duc de Lorraine le 15 juillet 1592.","architecture":"RORTHEY, au XIIIe siècle, le nouveau propriétaire Joffroy de Bourlémont fit reconstruire l'ensemble, en château-fort, pour être un avant-poste de défense de son propre château de Bourlémont, Il possède les critères défensifs de l'époque, comme ces murailles hautes de 7 m, un donjon, des tours à poivrière, un logis seigneurial, et une porte avec bretèche, mâchicoulis et herse. Le 18/11/1604, la Baronnie de Rorthey est mise en vente par les créanciers et c'est Henri des Salles, comte de Coussey, qui s'en porta acquéreur par adjudication, Il doit également payer annuellement 1000 livres de douaire à sa tante Guillemette des Salles, veuve de René II de Beauvau. En 1637, il sert de refuge aux moines prémontrés de l'abbaye Notre-Dame de Mureau, à 5 kms, qui fuient une bande de pillards croates pendant la guerre de Trente Ans. A la Révolution française, il est acheté par plusieurs maîtres de forges et retrouve le domaine de Bourlémont en 1862, après en avoir été séparé pendant plus de cinq siècles. En effet, le marquis Simon-Gérard d'Alsace-Hénin-Liétard (1832-1891), seigneur de Bourlémont s'en porte acquéreur. Devenu aujourd'hui une ferme, le château de Rorthey a conservé de nombreux éléments de fortification féodale. Il n'est pas inscrit ni classé aux M.H.","habitants":"Joffroy de Bourlémont\r\n        \"","divers":"Château de Rorthey grav 1-2-3                                                       GPS : 48° 23' 27\" Nord, 5° 37' 18\" Est","gps":"48° 23' 27\" Nord, 5° 37' 18\" Est","images":["../../jctruffet.com/image/image_88/88_Rorthey_1.jpg","../../jctruffet.com/image/image_88/88_Rorthey_2.jpg","../../jctruffet.com/image/image_88/88_Rorthey_3.jpg"]},"Consult_chateau_formulaire2d68":{"id":"Consult_chateau_formulaire2d68","dept":"88","canton":"Golbey","commune":"Taon les vosges","nom":"Rotonde","type":"Palais","periode":"XIX","histoire":"ROTONDE, c'est un ancien foyer social de lancienne usine textile qui se trouvait juste à côté la BTT   Blanchisserie et Teinturerie Thaonnaise. La Rotonde accueille aujourdhui de nombreuses manifestations culturelles et artistiques. La Rotonde a été créée, en 1925, par Armand Lederlin, comme foyer social et salle de partages de lancienne usine textile qui se trouvait juste à côté, la BTT (Blanchisserie et Teinturerie Thaonnaise). Au XXe siècle, elle rassemblait, à l'occasion de plusieurs fêtes, les familles douvriers qui travaillaient à lusine. Ses murs sont encore empreints dhistoire et si vous fermez les yeux, vous pourrez peut-être entendre encore les rires des ouvriers, les acteurs des années folles répéter leurs textes dans les coulisses du théâtre aujourdhui rénové, ou encore le ruissellement de leau des balnéum.","architecture":"ROTONDE,  pour la petite anecdote, le théâtre de 864 places est une réplique du célèbre Châtelet, en plus modeste, et l'ensemble du bâtiment, vu d'avion, a la forme de la Croix de Lorraine ! Aujourdhui, La Rotonde se positionne comme le ôle Culturel de la Lorraine du Sud et accueille de nombreuses manifestations. L'entité \"Scènes Vosges\" y propose un programme culturel ambitieux et très abordable, basé sur la chanson Française, le cirque, le spectacle pour enfants, le théâtre. Les animaux ne sont pas acceptés.","habitants":"Armand Lederlin\r\n        \"","divers":"La rotonde à Taon les Vosges                                                                         GPS : 48° 14' 46,54\" Nord, 6° 25' 38,91\" Est","gps":"48° 14' 46,54\" Nord, 6° 25' 38,91\" Est","images":["../../jctruffet.com/image/image_88/88_Rotonde_1.jpg"]},"Consult_chateau_formulaire17c5":{"id":"Consult_chateau_formulaire17c5","dept":"88","canton":"Raon-l","commune":"Senones","nom":"Salm_Senones","type":"Château","periode":"XVIII","histoire":"SALM, ces deux châteaux des princes de Salm du XVIIIe, datent de lépoque de la principauté de Salm-Salm. Ancien hôtel de Bilistein (côté place Clémenceau), premier château des princes de Salm.   Le premier château fut celui de Pierre Percée qui fut  acquit par le mariage d'Hermann II avec Agnès de Bar   veuve du comte de Langstein et sur d'Etienne de Bar. Cet édifice qui concrétise le nom de Salm dans les  Vosges sera connu pour son puit creusé dans la roche  soutenant le château d'où son nom.   Hermann II fut un grand chef de guerre, ce qui lui permit   d'agrandir ses domaines et d'étendre son autorité, il fut tué  malheureusement lors du siège du château par la coalition   de sa belle famille, les Bar, et les ducs de Lorraine. Ses descendants continuèrent les annexions territoriales,  mais plus pacifiquement soit par héritages soit par mariages. Au cours des XIII et XIVe siècle,   les comtes Henri III et IV puis Jean I à III y séjournent souvent.","architecture":"SENONES, même si elle n'existait pas à l'origine, le premier château à  Senones est remarquable par sa voûte percée en 1781 pour  permettre le passage de l'abbaye.  Arrivée du 1° chasseur à pied, au  second château.  Le second incendie , ne laissera plus que la structure   du bâtiment avec des risques sécuritaires importants.  Sa toiture fut ravagée par un violent incendie en 1994. Après  des travaux de première urgence, dites mesures conservatoires,   son état actuel, très préoccupant, est dû à l'absence de toiture,   ce qui le dégrade.  depuis près de 20 ans, ne laissera plus que la structure  du bâtiment avec des risques sécuritaires importants. Après   des travaux de première urgence, dites mesures conservatoires,  son état actuel, très préoccupant, est dû à l'absence de toiture,  Marie Louise Eléonore de Hessen, épouse de Maximilien Ernest prince de Salm, fut régente de son beau frère et de son fils. C'est elle, qui fit construire le second château à Senones.  Le prince Louis Charles Othon s'y installe peu de temps avant son décès.  Constantin Alexandre Joseph fit richement aménager les intérieurs, alors que les extérieurs ne seront jamais terminés.   Vue du village de Pierre Percée et les ruines du château des princes de Slam, au château de Pierre Percée. Ses façades, ses toitures et le passage du charretier ont été classés MH en 1997.","habitants":"Princes de Slam\r\n        \r\n        \"","divers":"Vestiges et nouveau château à Senones   Grav 3-4-                          GPS : 48° 23' 44\" Nord, 6° 58' 59\" Est","gps":"48° 23' 44\" Nord, 6° 58' 59\" Est","images":["../../jctruffet.com/image/image_88/88_Salm_Senones_1.jpg","../../jctruffet.com/image/image_88/88_Salm_Senones_2.jpg","../../jctruffet.com/image/image_88/88_Salm_Senones_3.jpg","../../jctruffet.com/image/image_88/88_Salm_Senones_4.jpg"]},"Consult_chateau_formulairea0ea":{"id":"Consult_chateau_formulairea0ea","dept":"88","canton":"Mirecourt","commune":"Châtenois","nom":"Sandaucourt","type":"Château","periode":"XVI-XVII","histoire":"SANDAUCOURT,   la construction date du XVIe - XVIIe siècles, a été construit, pour Aloff de Beauvau ou par son demi-frère Claude, seigneur de Sandaucourt, de 1549 à 1553. À la mort de ce dernier, en 1553, le château passe dans l'indivision et devient la propriété de deux de ses gendres, Claude de Reinach (conseiller et chambellan du duc Charles III de Lorraine, sénéchal du Barrois) et Jean de Damas, qui se partagent le château. Le 3 novembre 1672, le cardinal de Retz (1613-1679) rend visite à ses amis les 2 coseigneurs de Sandaucourt : Louis des Armoises et Jean Nicolas de Fulligny-Damas. En 1715, le château est vendu au marquis espagnol d'Amenzuaga de Riscal d'Alègre, époux de la baronne Suzanne de Chauviray. Il est revendu en 1735 au fermier général de Lorraine Sigisbert Richard qui le cède à son tour en 1770 à François de Saint-Ligier, un maréchal de camp anobli par Louis XV. Le château est remis au goût du jour au XVIIIe siècle. François de Saint-Ligier ne s'entend guère avec son épouse Agnès de Bry d'Artois,  une ancienne dame de compagnie de la reine Marie Leszczynska. Lorsque la Révolution française éclate, il a déjà quitté le château et c'est seule que son épouse l'occupe  avec ses deux fils, avant d'émigrer à son tour. Par mariage, le château échoit aux Scitivaux de Greische, les derniers nobles à l'occuper, il est racheté en 1931 par la société Paul Couillard et Cie de Nancy, qui le transforme en fromagerie. Les caves servent alors à l'affinage du fromage.  En 1969, il est revendu à la société Breuil Girardel qui le transforme en foyer d'accueil pour les immigrés, travaillant à l'usine Manuest manufacture de l'Est de la France, une filiale de fabrication de Vogica à Châtenois.","architecture":"SANDAUCOURT;   c'est un château de style Renaissance. Les travaux de restauration débutent en 1976, lorsque le docteur Kirsch et son épouse Marthe-Odile Lersy rachètent le château. En 2000, le docteur Kirsch souhaite en faire don au musée lorrain qui le refuse. Finalement c'est Matthieu Cognet, le propriétaire du château de Thuillières, qui en fait l'acquisition et qui poursuit luvre de restauration initiée par le docteur Kirsch. Sa restauration sera achevée grâce à son nouveau propriétaire Matthieu Cognet, propriétaire aussi du château de Thuillières. Le château de Sandaucourt est inscrit et classé aux M.H. depuis 1980, il  est bien conservé dans son gros-uvre. Il appartient actuellement à Matthieu Cognet. Le château de Sandaucourt est ouvert au public et se visite du 1/07 au 15/08/2017","habitants":"Aloff de Beauvau \r\n        \"","divers":"Château de Sandaucourt grav 1-2 et deux château  Sanddaucour à Châtillon sur Saone grav 3-4                                      GPS : 48° 15' 49\" Nord, 5° 50' 52\" Est","gps":"48° 15' 49\" Nord, 5° 50' 52\" Est","images":["../../jctruffet.com/image/image_88/88_Sandaucourt_1.jpg","../../jctruffet.com/image/image_88/88_Sandaucourt_2.jpg","../../jctruffet.com/image/image_88/88_Sandaucourt_3.jpg","../../jctruffet.com/image/image_88/88_Sandaucourt_4.jpg"]},"Consult_chateau_formulaire9222":{"id":"Consult_chateau_formulaire9222","dept":"88","canton":"La Bresse","commune":"Saulsures-sur Moselotte","nom":"Saulsures","type":"Château","periode":"XVIII-XIX","histoire":"SAULSURES sur MASELOTTES,  construit sous le second Empire par un richissime industriel du textile, il était surnommé le Versailles vosgien ou le petit Versailles, mais il sera abandonné en 1972. Pour l'actuel propriétaire, François Vandamme, les coûts de restauration et d'entretien étaient devenus faramineux, plusieurs projets de reprise avaient vu le jour mais aucun n'a abouti. Il était prévu d'y transférer la maison familiale de la commune en 1972 mais les collectivités locales ne subventionnaient que les constructions neuves à l'époque. Finalement, la toiture du château s'est effondrée et les plafonds aussi. Les intempéries ont achevé le travail. Les grilles ont disparu. Le pillage et le vandalisme ont dépouillé l'édifice de tout ce qui était précieux à l'intérieur. Il y a quelques années le maire avait dû prendre un arrêté de péril contraignant le propriétaire à fermer l'accès au site.   L'inévitable démolition de la demeure est désormais une question de mois. Signez et faites signer la pétition par vos amis et vos connaissances, site les amis du château de Saulsures.","architecture":"SAULSURES,  fut construit entre 1854 et 1861 sur les plans de l'architecte Charles Perron. Sa construction a été commandée par Élisabeth Géhin, née Mathieu, veuve du premier industriel textile de la commune Jean-Thiébaut Géhin, durant lâge dor de l'industrie textile et l'expansion industrielle de cette partie des Vosges au XIXe siècle, en hommage à son mari, prématurément, disparu. Le château est aujourdhui à labandon et a même été menacé de démolition. Le château de Saulsures est, depuis, en partie, ruiné. Les façades, toitures et dépendances sont inscrites sur lInventaire supplémentaire des M.H. depuis le 21/12/1984.","habitants":"François Vandamme,\r\n        \"","divers":"Chaâteau de Saulsures avant et après                                            GPS : 47° 56' 51\" Nord, 6° 46' 04,08\" Est","gps":"47° 56' 51\" Nord, 6° 46' 04,08\" Est","images":["../../jctruffet.com/image/image_88/88_Saulsures_1.jpg","../../jctruffet.com/image/image_88/88_Saulsures_2.jpg","../../jctruffet.com/image/image_88/88_Saulsures_3.jpg"]},"Consult_chateau_formulaire71d3-2":{"id":"Consult_chateau_formulaire71d3-2","dept":"88","canton":"Darney","commune":"Serecourt","nom":"Serécourt_Deuilly","type":"Château","periode":"XII-XIV-XVII","histoire":"SERECOURT, DEUILLY, les vestiges du château se situent sur la commune de Sérécourt à 310 mètres d'altitude. C'est un château fort ancien qui semble avoir existé avant l'an 1000. En 1072, le château est occupé par un seigneur indépendant dont l'histoire n'a pas retenu le nom. Deuilly c'est aussi un prieuré et un village disparu qui se trouvait à proximité du château, sur une esplanade au nord. Ce franc alleu échoit aux Vaudemont au début du XII° siècle. Il s'agit là d'une enclave de leurs possessions en limite des terres bourguignonnes. Hugues Ier de Vaudemont  fondera l'abbaye de Flademont  située  à Tignecourt, soit à environ un kilomètre du château. Suite à un mariage Deuilly va dépendre partiellement du comte de Champagne. Au XIV° siècle Jean de Deuilly est vassal du roi de France. Le duc de Bar entre en conflit avec les Vaudemont et soutiendra deux sièges en 1364 et 1367. Le château sera démantelé. Rapidement restauré il est à nouveau habité en 1382. Une nouvelle fois ruiné, la forteresse sera relevée au XVIIe siècle. C'est alors une possession de la famille du Châtelet, puis du comte Charles de Torniolles. Devenu un repaire de brigand le roi Louis XIII ordonne de raser le château en février 1636.","architecture":"DEUILLY, Il ne subsiste que de rares vestiges des fossés, d'une tour et de l'enceinte extérieure ainsi qu'une excavation qui fut voûtée sur le plateau et qui aurait pu être soit une citerne, soit une cave.  Du château de Deuilly, en ruine, il ne subsiste que ses belles caves voûtées. On aperçoit une très grande basse-cour, protégée par une forte levée de terre, et des fossés secs, le tout précédant le château de Deuilly, qui est, lui-même, protégé par un fossé taillé dans le roc, au sud-est du village, est cité pour la première fois en 1124. Assiégé, pris et démantelé 2 fois par le duc de Bar, dans le courant du XIVe siècle, il ne fut définitivement détruit quau cours de la guerre de trente ans par les troupes du duc de Lorraine Charles IV, afin de ne pas être occupé par les troupes franco-suédoises.","habitants":"famille du Châtelet\r\n        \"","divers":"châteaux du Laboureur grav 3-4 et de Deuilly  grav 1-2                GPS : 48° 03' 19\" Nord 5° 50' 39\" Est","gps":"48° 03' 19\" Nord 5° 50' 39\" Est","images":["../../jctruffet.com/image/image_88/88_Ser%c3%a9court_Deuilly_1.jpg","../../jctruffet.com/image/image_88/88_Ser%c3%a9court_Deuilly_2.jpg","../../jctruffet.com/image/image_88/88_Ser%c3%a9court_Deuilly_3.jpg","../../jctruffet.com/image/image_88/88_Ser%c3%a9court_Deuilly_4.jpg"]},"Consult_chateau_formulaire09f4":{"id":"Consult_chateau_formulaire09f4","dept":"88","canton":"Darney","commune":"Saint-Baslemont","nom":"St_Baslemont","type":"Château","periode":"XVII","histoire":"SAINT-BASLEMONT, construit au XIIIe siècle par les seigneurs de Baslemont, de cette famille  l'héritière épouse en 1355  Thierry de Graux et passera un siècle plus tard par alliance à la famille  de Montreux, au XVIe siècle appartient aux Reinach, Claude de Reinach bailli des Vosges et grand gruyer  de Lorraine conseiller et chambellan du duc Charles III. A la mort de Claude sa fille Elisabeth hérite du château et de la seigneurie qu'elle apporte à son époux Jacob de Haraucourt dont leur fils Jean-Jacques en hérite époux de Barbe-Alberte  d'Ernecourt, la guerre de trente ans l'invasion étrangère amène aux châteaux les suédois, puis les croates et les français.  Presque entièrement détruit en 1676. Louis des Armoises époux de Marie-Claude d'Haraucourt, depuis le décès  d'Antoine Bernard des Armoises, sont acquis en 1761 par Jean-Baptiste Alexandre conseiller du roi, passe ensuite à sa fille qui épouse  Charles -Antoine- Joseph Reignaud de Baulecourt qui sera maire de Nancy sous la restauration. Vendu en 1847 à un notaire de Thuillières, il changera par la suite plusieurs fois de propriétaires, au début du XXe siècle le château passe à la fille de la célèbre comédienne Eve Lavallière. Transformé en hôtellerie en 1922, nouvel incendie en 1975, aujourd'hui  en cours de restauration.","architecture":"Saint-BASLEMONT,  il se présente aujourd'hui sous la forme d'un L avec le corps de logis principal entouré de deux tours d'un côté et les dépendances de l'autre.  Le corps de logis principal possède une haute façade sud qui a été percée à la fin du XVIIe et début XVIIIe siècles pour remettre au goût du jour le château féodal. La façade nord donne sur la cour d'honneur qui date de la fin du XVIIe siècle. Le corps de logis symétrique a une élévation de trois niveaux d'ouvertures à encadrement de grès rouge. À l'origine les fenêtres étaient munies de croisées. La toiture à croupes couverte de tuiles en écaille a entièrement été refaite après l'incendie de 1975. À l'intérieur, le château abrite des salles voutées, des silos et des oubliettes de l'époque médiévale. Un escalier d'apparat permet d'accéder au jardin en contrebas.  Les deux tours rondes du XIVe siècle sont à toits coniques couverts de bardeaux mais sont d'inégale grosseur (à l'origine, le château était entouré de quatre tours). La plus petite tour, située au sud-est, est percée de trois meurtrières à sa base ; la plus grosse tour, celle du sud-ouest, est percée d'une meurtrière-canonnière à mi-hauteur de plusieurs canonnières à redents placées sous le toit. Toutes ces ouvertures défensives sont placées du côté sud. En effet, côté nord, face aujourd'hui à la cour d'honneur, les anciens canonnières parfois encore visibles ont été bouchées.Les dépendances forment la deuxième partie du L. Elles sont situées à l'ouest de la cour d'honneur et datent de la renaissance. Elles possèdent des ouvertures contemporaines et quelques croisées, plus anciennes, bouchées depuis longtemps.  Un haut mur d'enceinte clôture la cour d'honneur, avec un portail monumental en demi-lune, et sa grille en fer forgé du XVIIIe siècle. La grille est entourée de deux pilastres polygonaux à bases impostes et fûts moulurés, surmontés de vases ciselés (un vase est tombé en 2015).","habitants":"Louis des Armoises\r\n        \"","divers":"Château de Saint-Baslémont    Grav 1-2\r\ngps 48° 09' 06\" nord, 5° 59' 38\" est","gps":"","images":["../../jctruffet.com/image/image_88/88_St_Baslemont_1.jpg","../../jctruffet.com/image/image_88/88_St_Baslemont_2.jpg"]},"Consult_chateau_formulaireef3e":{"id":"Consult_chateau_formulaireef3e","dept":"88","canton":"Vittel","commune":"St-Ouen le Parey","nom":"St_Ouen_Parey","type":"Château","periode":"XVI-XVII","histoire":"St-OUEN,   il appartient aux sires de l'Espine puis aux comtes de Lavaux, qui y résident, à la belle saison. En 1775, il passa par mariage au baron Canon de Ville, un ancien capitaine de l'Empereur du Saint-Empire. Ce dernier ayant refusé, en 1791, d'enlever les armoiries surmontant la grille d'entrée, les habitants du village viennent les abattent avec la protection de la milice armée. L'intérieur porte la marque des aménagements réalisées à la veille de la Révolution française. Au rez-de-chaussée, le grand vestibule est surplombé par une vaste loggia, dont la balustrade sert d'appui à six colonnes corinthiennes, soutenant le plafond. En 1775, il passe par mariage au baron Canon de Ville, un ancien capitaine de l'empereur du Saint-Empire.","architecture":"SAINT-OUEN-LES-PAREY, se trouve sur la commune du même nom, à proximité de la mairie du village à environ 340 mètres d'altitude.Le château, de forme carrée, est flanquée de quatre tours carrées également à ses quatre angles. il est de style Renaissance et date du XVIe siècle. La construction  date des XVIe et XVIIe siècles. Haut d'un étage, il allie la simplicité à la sobriété.  A l'époque gallo-romaine, Ode sur de Saint-Elophe, est martyrisée dans le village. Le château voit le jour au cours du XIVe siècle, il est une possession de la famille de Saint-Ouen. Transformé en manoir au cours des XVIe et XVIIe siècle, l'édifice devient la propriété de la famille des comtes de Lavaux qui en font leur résidence estivale. En 1791, le châtelain refuse d'enlever ses armoiries qui surmontent les grilles du château. Les villageois protégés par une milice armée détruisent les grilles.  C'est un château carré à un étage autrefois flanqué de quatre tours. Une tour carrée en mauvais état subsiste dans la cour prés de la mairie.","habitants":"Comtes de Lavaux, \r\n        \"","divers":"Château à St-Ouen-Parey                                                            GPS : 48° 10' 48\" Nord, 5° 45' 42\" Est","gps":"48° 10' 48\" Nord, 5° 45' 42\" Est","images":["../../jctruffet.com/image/image_88/88_St_Ouen_Parey_1.jpg","../../jctruffet.com/image/image_88/88_St_Ouen_Parey_2.jpg","../../jctruffet.com/image/image_88/88_St_Ouen_Parey_3.jpg"]},"Consult_chateau_formulaire4c7b":{"id":"Consult_chateau_formulaire4c7b","dept":"88","canton":"Darney","commune":"Les Thons","nom":"Thons","type":"Château","periode":"XVIII","histoire":"THONS ; pendant le XVIIIe siècle, il fut délaissé par ses propriétaires successifs, ceux-ci semblant plus intéressée à vivre de leur charge de gouverneur de Vincennes, quà entretenir un château de province lointain. La famille du Châtelet vend le domaine en 1763 à un jeune officier, Jean Baptiste Toustain de Viray (1769). Il avait épousé la fille du châtelain de Valfroicourt, Marie-Nicole dHoffelize (1812), avec qui il a 3 enfants : François-Etienne, Louis-Gabriel et Rose. Jean Baptiste Toustain de Viray meurt prématurément, 6 ans après l'achat du château et c'est sa veuve qui poursuit luvre de restauration de son époux même si luvre de Jacques Gentillâtre en est dénaturée. Durant la Révolution, les 2 fils devenus officiers émigrent : François-Etienne sert dans l'armée du prince Louis V Joseph de Bourbon-Condé et Louis-Gabriel est atteint d'aliénation mentale, puisqu'il fut enfermé en 1790, dans un asile à Hambourg où il décèdera, 11 ans plus tard. Sans doute à cause de l'émigration des deux fils, le château des Thons fut mis sous séquestre et la châtelaine et sa fille Rose sont enfermées aux Cordeliers de Nancy. Marie-Nicole dHoffelize est libérée, en 1794, et doit lutter pour retrouver ses droits et ses biens. À sa mort en 1812, ses 3 enfants étant morts sans héritier avant elle, le château des Thons passe à son neveu Joseph-Gaspard d'Hoffelize (1849), puis à son fils François-Joseph Ernest (1856). En 1857, le domaine est vendu en parts. Les familles Lévylier, Gadel, Morel, Barras se succèdent comme propriétaires. A l'époque, la richesse des terres est plus importante que les qualités architecturales des bâtiments. Commence alors un lent délabrement. Pendant la 1ère guerre mondiale, en 1917, le village des Thons accueillent des soldats américains. Le château des Thons servira de logis aux officiers américains.","architecture":"THONS , Un des officiers américains séduit une dame du village pendant que son époux est encore mobilisé. De retour dans son foyer lors d'une permission, le mari trompé est mis au courant de son infortune et décide de se venger en tuant l'amant d'un coup de fusil, au château. On annonce la nouvelle aux parents de l'officier américain, habitant à Long Island, et on leur fait croire tout simplement que leur fils est mort en combattant l'ennemi allemand. La guerre terminée en 1918, le château des Thons ayant été vendu à des marchands de bien de Langres, les parents américains décident alors de racheter \"le lieu où leur fils a été tué\". Le père était le financier multi-millionnaire Ashbel Barney (de Salomon Smith Barney). Grâce à une dispense spéciale du gouvernement français, l'aile droite et la partie droite du corps central sont démontées, pierre par pierre, entre 1924 et 1926. Chaque pierre, brique, tuile et panneau de bois sont individuellement marqués et numérotés. Le tout est chargé sur un bateau à vapeur privé et prend la direction de l'Amérique. Le mobilier, les sculptures et les ornements intérieurs de tout le château sont également embarqués. L'architecte français Charpentier est chargé de remonter le bâtiment à Long Island, en 1927, avec l'aide d'une centaine de maîtres artisans et de tailleurs de pierre de tous les coins de France, pour en faire un \"manoir à la française\". Celui-ci porte le nom de château des Thons, comme son jumeau resté en Europe, il ne reste plus que l'aile gauche et la partie gauche du corps central. L'édifice continue de se délabrer à la recherche d'un généreux mécène pour le restaurer. Il y a aussi le plus grand colombier circulaire des Vosges. Le château des Thons n'est pas inscrit aux M.H.","habitants":"famille du Châtelet \r\n        \"","divers":"Château des Thons à Thons                                                                 GPS : 47° 59' 40\" Nord, 5° 53' 39\" Est","gps":"47° 59' 40\" Nord, 5° 53' 39\" Est","images":["../../jctruffet.com/image/image_88/88_Thons_1.jpg","../../jctruffet.com/image/image_88/88_Thons_2.jpg"]},"Consult_chateau_formulairec63b":{"id":"Consult_chateau_formulairec63b","dept":"88","canton":"Vittel","commune":"Thuillieres","nom":"Thuillieres","type":"Château","periode":"XVII","histoire":"THUILLIERES, le château de Thuillières et son pigeonnier, datent de 1720, pour Germain Boffrand, architecte aussi du château de Lunéville. Il existait au pied du village un château médiéval construit par Simon de Thuillières en 1328. Au début du XVIIIe siècle, ce château appartient au marquis Marc de Beauvau-Craon, gouverneur et grand écuyer de Lorraine, mais la bâtisse n'est plus habitable. Le marquis qui était couvert de dettes, voit sa propriété mise en saisie et c'est l'architecte Germain Boffrand qui la rachète en 1722.  Le château de Thuillières et son potager. Germain Boffrand souhaite avoir une résidence en Lorraine où il séjourne souvent pour ses nombreux chantiers de l'époque (le château d'Haroué, la cathédrale de Nancy, l'hôtel de la Monnaie de Nancy, le château de la Favorite). Il décide de raser l'ancien château féodal et de se servir des matériaux de celui-ci pour construire le nouveau château entre 1722 et 1725. Il soigne la façade donnant sur les jardins. Mais Germain Boffrand en conflits permanent avec les habitants du village et les seigneurs locaux, et après la mort de son mécène lorrain, le duc Léopold Ier en 1729, revendit sa propriété, en 1736. Le château est racheté par Jean-François d'Hablenville, écuyer du duc de Lorraine. A la Révolution française, il appartient à la famille Randenrodt. En 1874, il est acheté par Charles de Finance, issu d'une famille de gentilshommes verriers, qui vivra dans la partie sud du château et louera la partie Nord à des agriculteurs. En 1973, il est acheté par Bernard Diné qui restaure la toiture à l'ancienne et certaines pièces d'apparats, détruit les bâtiments parasites de la cour d'honneur qui ont été ajoutés au cours des décennies successives et aménage le parc.","architecture":"THUILLIERES , en 1985, Matthieu Cognet devient le nouveau propriétaire (il possède également depuis 2000 le château de Sandaucourt). Il ouvre le château à la visite à la période estivale. Le ministère de la culture inscrit le château et le pigeonnier aux M.H. le 25 juin 1986 puis classe ses façades et la toiture aux M.H. le 28 août 1989. Le château fait face au château de Saint-Baslemont situé sur la commune voisine. Depuis l'été 2012, les visites guidées du château sont agrémentées par des saynètes écrites et mise en scène par Martin Poirot et interprétées par la troupe des A.J.T. de Monthureux le Sec.  Cet édifice se compose d'un corps de logis à deux niveaux,  unique rectangulaire sur soubassement coiffé d'un haut toit couvert de tuiles plates en écaille. Côté cour, sa façade s'ordonne autour d'un avant corps central en faible saillie souligné par une chaîne de refend aux angles et sommé d'un grand fronton triangulaire, un bandeau de pierre marquant la séparation des niveaux. Côté jardin la façade en grès roses des Vosges repose sur un important soubassement rattrapant la déclivité. Au centre se déploie un avant-corps en demi-rotonde à bossages, coiffé d'un curieux fronton en chapeau de gendarme couvert  d'un petit toit arrondi. Aujourd'hui résidence de monsieur et madame Cognet                                                                                                                    BOFFRAND Le château de Thuillières et son pigeonnier, construit en 1725 par Germain Boffrand, architecte par ailleurs du château de Lunéville. Il date du XVIIIe siècle avec son colombier du XIVe siècle. Le château des Thuillières a été construit pour le grand architecte du duc de Lorraine, sur les ruines dun ancien château du XIVe siècle. Le château de Bofrand est classé aux M.H. depuis 1989.","habitants":"Germain Boffrand, et le marquis Marc de Beauvau-Craon, \r\n        \"","divers":"Château de la Thuillières                                                               GPS : 48° 09' 17,87\" Nord, 6° 00' 30,34\" Est","gps":"48° 09' 17,87\" Nord, 6° 00' 30,34\" Est","images":["../../jctruffet.com/image/image_88/88_Thuillieres_1.jpg","../../jctruffet.com/image/image_88/88_Thuillieres_2.jpg","../../jctruffet.com/image/image_88/88_Thuillieres_3.jpg"]},"Consult_chateau_formulaire20be":{"id":"Consult_chateau_formulaire20be","dept":"88","canton":"Darney","commune":"Tollaincourt","nom":"Tollaincourt","type":"Château","periode":"XVIII","histoire":"TOLLAINCOURT,  il appartient actuellement à la commune de Tollaincourt et à des propriétaires privés. A la veille de la Révolution française, la famille de Tillaincourt, originaire de la Meuse, habite le château. Henry de Tillaincourt, seigneur, est arrêté, en 1793, puis il est à nouveau arrêté, en 1794, et ses biens mis sous séquestre, relâché, il retrouvera ceux-ci en piteux état, le château ayant été pillé dont sa bibliothèque. Actuellement, la moitié gauche du château de Tollaincourt est occupée par la mairie.","architecture":"TOLLAINCOURT,  C'est sur la hauteur du village que se trouve ce château, Un portail d'entrée toujours présent accueille le visiteur qui pénètre dans une cour d'honneur bordée à gauche par les anciens communs, ne fait l'objet d'aucune inscription ni classement aux M.H. En face, le château se présente sous une forme rectangulaire, avec deux niveaux d'élévation sur la façade principale nord. La porte d'entrée est surmontée d'une croix chrétienne. A l'intérieur, se trouvent de belles boiseries et un escalier monumental. Un grand parc en pente se situe à l'arrière du bâtiment, du côté de la façade Sud.","habitants":"Famille de Tillaincourt,\r\n        \"","divers":"Château de Tollaincourt                    \r\nGps 48° 05' 45\" nord, 5° 44' 06\" est","gps":"","images":["../../jctruffet.com/image/image_88/88_Tollaincourt_1.jpg"]},"Consult_chateau_formulaireea76-2":{"id":"Consult_chateau_formulaireea76-2","dept":"88","canton":"Darney","commune":"Lamarche","nom":"Trinité_Lamarche","type":"Château","periode":"XVIII","histoire":"TRINITE, LAMARCHE  la construction du château de la Trinité date du XVIIIe siècle. C'est un ancien couvent de l'ordre des Trinitaires. Il est devenu un château, lors de sa vente, en 1791, lors des événements de la Révolution Française. À partir de 1840, le château devient successivement un pensionnat, un orphelinat agricole, puis devient la propriété du brasseur Léon de Bourgogne (1839-1889) et de son épouse Jeanne de Maussabré (1844-1915). Devenue veuve, celle-ci se remarie à Théophile Aubertot comte de Coulanges (1827-1898). À sa mort en 1915, le château passa dans les mains de son fils Philippe de Bourgogne (1873-1939). Il se situe aujourd'hui dans une exploitation agricole (GAEC des Trinitaires créé en 2007 par Bernard et Nicolas François) . Le château de la Trinité n'est pas inscrit ni classé aux M.H. il appartient à Mrs Bernard François et Jacques François.","architecture":"TRINITE, LAMARCHE, l'ensemble architectural se dégrade un peu plus chaque jour, les communs et la petite chapelle du parc sont déjà en ruines (le toit de la chapelle s'est effondré au cours de l'année 2017). Les dates de naissance et de morts des membres de la famille de Bourgogne sont dans la chapelle funéraire située dans premier cimetière communal de 1843, juste à côté de la propriété du château.","habitants":"Famille; Léon de Bourgogne\r\n        \"","divers":"Château de trinité à Lamarche                                                             GPS : 48° 04' 07\" Nord, 5° 46' 30\" Est","gps":"48° 04' 07\" Nord, 5° 46' 30\" Est","images":["../../jctruffet.com/image/image_88/88_Trinit%c3%a9_Lamarche_1.jpg"]},"Consult_chateau_formulaire2f0b":{"id":"Consult_chateau_formulaire2f0b","dept":"88","canton":"Golbey","commune":"Uxegney","nom":"Uxegney_Fort","type":"Fort","periode":"XVIII-XIX","histoire":"FORT D'UXEGNEY, ce fort plat fut construit de 1882 à 1884. C'est un fort à crête unique. Le Fort d'Uxegney fut brièvement rebaptisé Fort Roussel, en 1887. C'est une fortification faisant partie de la place forte d'Épinal. Sa garnison était composée de 318 hommes puis de 350 hommes en 1900. Le fort d'Uxegney est situé sur une hauteur de 379 mètres au-dessus de la vallée de l'Avière. Il avait pour mission de contrôler l'axe Épinal-Mirecourt, la voie ferrée Épinal-Nancy, le canal de l'Est et le sud de la trouée de Charmes. Par le décret du 21 janvier 1887, le ministre de la guerre Georges Boulanger fit renommer tous les forts, batteries et casernes avec les noms des anciens chefs militaires. Pour le fort d'Uxegney, son « nom Boulanger » est en référence au général Nicolas François Roussel d'Hurbal : le nouveau nom est gravé au fronton de l'entrée. Dès le 13/10/1887, le successeur de Boulanger au ministère, Théophile Ferron, abrogea le décret. Le fort reprit officiellement son nom précédent, puis le nom Boulanger fut recouvert sur son fronton. L'organe cuirassé était composé de 4 pièces. L'armement de flanquement comptait 10 canons et 2 mortiers. Il est inscrit au M.H. depuis le 21/12/1984. Le fort d'Uxegney est ouvert au public et se visite.","architecture":"Uxegney : balade autour dun fort Séré de Rivières resté intact\r\nLassociation pour la restauration du fort dUxegney et de la place dÉpinal (Arfupe) organise de nombreuses visites du fort également bordé par un chemin de rando balisé où lancienne voie ferrée Decauville a été récréée, ce qui  permet la jonction avec les forts voisins.","habitants":"général Nicolas François Roussel d'Hurbal \r\n        \"","divers":"Fort d' Uxegney                                                                                      GPS : 48° 12' 06\" Nord, 6° 23' 03\" Est","gps":"48° 12' 06\" Nord, 6° 23' 03\" Est","images":["../../jctruffet.com/image/image_88/88_Uxegney_Fort_1.jpg"]},"Consult_chateau_formulaire1bf0":{"id":"Consult_chateau_formulaire1bf0","dept":"88","canton":"Le Val-d","commune":"Xertigny","nom":"Xertigny","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article de Xertigny: Brasseurs et Semouse.                                                                                             BRASSEURS, le château a été construit en 1888 sous la direction de Mr Clasquin, architecte départemental à Épinal. Cette construction, pour deux ménages, est élevée sur un plateau étroit, entouré de coteaux boisés ; le centre de l'édifice est occupé par un vestibule et un grand escalier commun aux deux parties. A droite et à gauche sont distribués des logements distincts pour les deux ménages. A gauche, et faisant face, un jardin d'hiver prolonge le bâtiment. Un escalier en pierre à trois rampes donne accès à une allée de charmilles séculaires, de cent mètres de longueur. En 1956, la famille Trivier, descendante de Victor Champion et propriétaire du château quittait son terroir pour habiter à Paris et en Côte d'Or. Le château fut alors vendu à la compagnie générale des eaux qui transforma cette demeure en colonie de vacances. La commune s'en rendit acquéreur en 1977 et en 1979, les bureaux de la mairie furent transférés au château qui devint alors la mairie. Architecture monumentale de la fin du XIXe siècle, embrasures de portes et fenêtres en pierre de taille avec motifs décoratifs sculptés, toiture à la Mansart avec clochetons, cheminées monumentales et boiseries murales, plafonds à moulures ou à caissons, dans les pièces de réception...","architecture":"BRASSEURS, la construction du château des Brasseurs date de 1888. Il a été construit, pour le brasseur Victor Champion, sur les fondations de lancien presbytère de lOrémus. C'est un château de style Renaissance. Les plans sont de larchitecte des beaux-arts, François Clasquin. A l'arrière, un vaste parc abrite un arboretum, des étangs et une aire de pique-nique (la Faisanderie).                                                                                                         SEMOUSSE C'est un château de type Néo-Renaissance. Sa construction date de 1885. Son premier propriétaire était Victor de Pruines. C'est un château d'habitation. Son nouveau propriétaire est la commune de Xertigny. Le château de Semouse ou de Bruines fut construit au XVIIIe siècle pour le maître de forges et fermier général Georges Puton (1679-1737 qui avait aussi dirigé la manufacture royale de Bains-les-Bains de 1733 à 1737. A ce jour, le château de Semouse ne fait l'objet d'aucune inscription ou classement au titre des monuments historiques.","habitants":"famille Trivier\r\n        \r\n        \"","divers":"Deux châteaux dans cet article Brasseurs grav 2 et Semouse grav 1.        GPS : 48° 02' 38,88\" Nord, 6° 24' 10,71\" Est                                                           Semouse   GPS : 47° 59' 01\" Nord, 6° 23' 56\" Est","gps":"48° 02' 38,88\" Nord, 6° 24' 10,71\" Est","images":["../../jctruffet.com/image/image_88/88_Xertigny_1.jpg","../../jctruffet.com/image/image_88/88_Xertigny_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','88 — Vosges'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
