const FULL={"Consult_chateau_formulaire8eb9":{"id":"Consult_chateau_formulaire8eb9","dept":"88","canton":"Darney","commune":"Gelvecourt-et Adompt -","nom":"Adompt","type":"Manoir","periode":"XV","histoire":"ADOMPT,  les Ville-sur-Illon furent les premiers seigneurs d'Adompt. C'est un château de la Renaissance. La famille d'Adompt, lui succéda entre 1235 et 1434. Ensuite, le manoir  alla dans les mains des Ally ou Esley qui le conserveront jusqu'à la fin du XVIe siècle.","architecture":"ADOMPT,   accolé à l'église, le manoir d'Adompt est composé d'un logis de forme rectangulaire. Il date du XVe siècle, avec des ajouts postérieurs, comme sa tour carrée et sa tour ronde d'escalier, dont le linteau de la porte a conservé la date de \"1560\" et des armoiries martelées. La tour ronde était défendue, autrefois, par une bretèche dont seuls subsistent les consoles. La façade du manoir d'Adompt, côté rue, présente les vestiges de fenêtres à meneaux en partie murées. La façade, côté jardin, possède des ouvertures modernes.","habitants":"Famille d'Ally\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Manoir d'Adompt à Gelvécourt","gps":"","images":["../../jctruffet.com/image/image_88/88_Adompt_1.jpg"]},"Consult_chateau_formulaired266":{"id":"Consult_chateau_formulaired266","dept":"88","canton":"Neufchâteau","commune":"Neufchâteau","nom":"Autigny_la_Tour","type":"Château-Tour","periode":"XVIII","histoire":"AUTIGNY la TOUR, le château  de la Tour  fut construit au XVIIIe siècle pour le comte de Gondrecourt. Placée sous lapanage du frère du duc de Lorraine Ferri III, le domaine d'Autigny passe dans les mains de lillustre famille du Châtelet, jusquau XVIe siècle. Jean-Blaise de Mauléon édifie alors une nouvelle demeure, dont il ne reste que le portail dentrée et deux tours dangle. Ce n'est qu'en 1711, que les comtes de Kinig et de Gondrecourt, aménageront le château, tel quon le voit, de nos jours. Sous la restauration, le duc de Clermont-Tonnerre y passa sa jeunesse. Durant la Première guerre mondiale, le duc dYork, futur roi, Georges VI dAngleterre, vient y séjourner et y installa lEtat Major de la Royal Air Force. Entre 1723 et 1772, le nouveau château apparaît à quelques mètres de lancien sous la direction de Louis de Barbarat, seigneur de Mazirot et de Bazoilles. Fermier général du duc Léopold Ier de Lorraine et maître de forges, installe son fermier Jean Michel dans le château. Le château change de main au XIXe siècle avec larrivée dune famille dorigine écossaise, leurs ancêtres ont accompagné le roi Jacques II dAngleterre en exil en France (1689). Louis-Charles Drummond de Melfort (1790-1880) et son épouse Eudoxie Saulnier des Cherriers (1807-1879) deviennent propriétaires du château.","architecture":"AUTIGNY,  Ils décident dy apporter des modifications architecturales à la propriété située au milieu du village. Les transformations du château se déroulent entre 1873 et 1879. La façade centrale est rehaussée avec un monumental fronton sur lequel est inscrit le blason familial entouré de deux lions.  Le bâtiment de lancienne entreprise éponyme de meubles figure toujours à proximité du château. Le chirurgien et ancien patron de presse engage alors une restauration importante de 20 pièces réparties sur 3 niveaux. Vous découvrirez aujourd'hui, le mode de vie des classes aristocratiques des XVIIe et XVIIIe siècles. Il se situe à l'entrée du village, dans un cirque creusé par le Vair. Le château d'Autigny domine un parc, de 2 hectares, arboré et clos. Un canal de dérivation vient remplir un bassin conçu dans l'esprit du Canope de la Villa Adriana à Tivoli en Italie.\r\nÉléments protégés MH : le château constituant un ensemble enclos de murs comprenant le logis principal de plan en L et les dépendances avec la cour pavée à l'ouest du bâtiment principal et la terrasse à l'est; les murs terrassant l'ensemble bâti au sud, ainsi que l'escalier accolé à ce mur; l'ensemble des jardins et les pièces d'eau, la fabrique et la glacière au sud et à l'est du château : inscription par arrêté du 12 décembre 1991. Le salon dit de compagnie, avec son décor : classement par arrêté du 12 décembre 1991, le château est démoli et le village pillé et brûlé.","habitants":"Famille  de Jean-Blaise de Mauléon\r\n        \"","divers":"Château d'Antigny la Tour                                                                         gps : 48° 23' 54,67\" Nord, 5° 45' 34,4\" Est","gps":"48° 23' 54,67\" Nord, 5° 45' 34,4\" Est","images":["../../jctruffet.com/image/image_88/88_Autigny_la_Tour_1.jpg","../../jctruffet.com/image/image_88/88_Autigny_la_Tour_2.jpg","../../jctruffet.com/image/image_88/88_Autigny_la_Tour_3.jpg"]},"Consult_chateau_formulaire67a5":{"id":"Consult_chateau_formulaire67a5","dept":"88","canton":"Le Val-d","commune":"Bains les bains","nom":"Bains_les_Bains","type":"Château","periode":"XVIII-XIX","histoire":"La Voge les Bains, elle est issue du regroupement des trois communes de Bains-les-Bains, Harsault et Hautmougey le 1er janvier 2017, qui deviennent communes déléguées. Son chef-lieu est fixé à Bains-les-Bains.                                                                            CHATELET  La propriété est localisée dans un écart de l'ouest balnéen, sur le site d'un ancien oppidum gaulois  domainant les deux cours d'eau du Côney et du Bagnerot. Il est édifié dans la seconde moitié du XIXe siècle  par Léon Demazure4 (1828-1905), frère dÉdouard Demazure. En 1906, Madame Léon Demazure loge l'abbé Constant Olivier qui vient de se faire exclure du petit séminaire de Châtel-sur-Moselle. La maison passe ensuite à plusieurs propriétaires au cours du XXe siècle dont la famille Dieudonné. Il ne fait actuellement l'objet d'aucune inscription ou classement au titre des monuments historiques.                                                                                                        JUMELIERES et MANUFACTURE ROYAL, dans le château de la Manufacture Royale, les suites au décor XVIIIe offrent un accès direct au parc et à la piscine. Elles accueillent une clientèle internationale. Les Italiens apprécient la suite Cavour car le fondateur de l'Unité Italienne y a séjourné en 1839.","architecture":"CHATELET,  de style Tudor, revu par le XIXe siècle, l'aile centrale à quatre pans est complétée de chaque côté par une tourelle ronde, des pavillons carrés et une serre.Les communs et l'écurie sont construits devant l'édifice de chaque côté, formant une cour d'honneur. Un grand parc à l'arrière complète l'ensemble architectural.                                                                       MANUFACTURE-ROYAL  Bains, est une Ferblanterie qui a été autorisée le 18 juin 1733 par le Duc François III au bénéfice de Georges Puton (maître de forge), Jean-François et Claude Coster et Jean-Baptiste Villiez. La majorité des bâtiments furent construits entre 1733 et 1737 : le château, la chapelle, les logements douvriers puis en 1779, la halle au charbon. En 1764, 600 ouvriers travaillent et logent à la Manufacture Royale. En 1777 Claude Thomas Falatieu rachète lusine et ajoute le canal, la fonderie, les ateliers de fabrication et la nouvelle étamerie. En 1792, Joseph Falatieu donnera un essor important à la Manufacture de fer blanc. Au cours du XIX° siècle, le fer blanc est abandonné au profit des clous à chevaux, puis devient une saboterie. La première bachelière de France, Julie Victoire Daubié est née sur le site en 1824, elle était la fille du caissier de la Manufacture Royale ! De nombreux personnages célèbres ont séjourné à la Manufacture, parmi eux, Camille de Cavour, fondateur de lunité italienne en 1839.Devenu gîtes de Groupe.","habitants":"Chatealet famille Dieudonné\r\n        \r\n        \"","divers":"Château de Bains et du Chatelet grav 1\r\ngps 48° 00' 11\" nord, 6° 15' 51\" est\r\nchateley grav 1","gps":"","images":["../../jctruffet.com/image/image_88/88_Bains_les_Bains_1.jpg","../../jctruffet.com/image/image_88/88_Bains_les_Bains_2.jpg"]},"Consult_chateau_formulaire9156":{"id":"Consult_chateau_formulaire9156","dept":"88","canton":"Saint-Dié-des-Vosges","commune":"Lusse","nom":"Bazelaire_les_Lesseux","type":"Château","periode":"XIII-XIX","histoire":"BAZELAIRE les LESIEUX, un château-fort est construit au XIIIe siècle. En 1485, il est tenu par Thiébaut de Jussey pour le compte du duc de Lorraine. Le 26 janvier1573 , le duc Charles III autorisa le châtelain Nicolas de Bilistein co-seigneur avec Claude de Jussey, à élever des bois patibulaire et à effectuer les actes de haute justice. La guerre de trente Ans aura raison du château féodal. Les ruines deviennent la propriété de la famille de Bazelaire de Lesseux. Un incendie ravage le vieux château en 1822 et il faut attendre 1880 pour qu'un descendant de cette très ancienne famille, William de Bazelaire de Lesseux , décide de construire un château de campagne pour la belle saison sur l'ancien emplacement féodal.  Parmi ces alliances, se trouvèrent des descendants de la famille du Lys et c'est pourquoi la statue de Jeanne d'Arc figure à la place d'honneur. Au milieu de l'entablement, sont sculptées les armoiries des Bazelaire, qui se trouvent encore sur la taque, accostées de celles des de Warren, dernière alliance, soutenues par une merlusse et entourées d'emblèmes divers. Un des descendants de cette très ancienne famille Octave de Bazelaire, de Saint-Dié, fit construire, en 1880, sur l'ancien emplacement féodal, un château de campagne qu'il venait habiter durant l'été.","architecture":"BAZELAIRE les LESIEUX,  le château comporte deux étages carrés, un étage de comble et un étage de soubassement. Le toit en ardoise est à longs pans inversés sauf pour les tours qui sont en pavillon. La façade principale orientée au sud comporte cinq ouvertures en longueur. Le logis central possède une porte précédée d'un double-escalier, entourée par deux fenêtres, elles-mêmes entourées par deux tours à une fenêtre chacune. Devant la façade principale s'étend un parc aménagé en jardin anglais. Une cheminée exécutée par Louis Majorelle d'après le plan de M. Schuler est un véritable monument artistique, de cinq mètres de hauteur, qui occupe le milieu de la paroi d'une immense salle plafonnée à poutrelles.   L'édifice présentait une enceinte quadrangulaire flanquée de deux tours disposées en diagonale. Cette forteresse surveillait la vallée de la Fave avec les châteaux voisins de Spitzemberg et de Provenchères,  à la partie supérieure, dans une niche ogivale surmontée d'un gable, se trouve une statue équestre de Jeanne d'Arc, tenant sa bannière, l'épée en main et se retournant pour appeler ses fidèles au combat ; cette sculpture est rehaussée d'or. Au-dessous se trouvent les armoiries des alliances de la famille de Bazelaire de Lesseux, propriétaire du château.                                                                La construction du Château de Bazelaire de Lesseux date de 1880 (XIXe siècle). A l'Ouest de Lusse et au pied de la colline, se trouvait autrefois un vieux château à tourelles, devant ce château, s'étendait une vaste prairie et sur la droite, un côteau qui a été, depuis, transformé en un Jardin anglais.","habitants":"Famille de William de Bazelaire de Lesseux\r\n        \"","divers":"Manoir de Bazelaire les Lesseux                                                        GPS : 48° 17' 37\" Nord, 7° 05' 56\" Est","gps":"48° 17' 37\" Nord, 7° 05' 56\" Est","images":["../../jctruffet.com/image/image_88/88_Bazelaire_les_Lesseux_1.jpg"]},"Consult_chateau_formulaire5e34":{"id":"Consult_chateau_formulaire5e34","dept":"88","canton":"Neufchâteau","commune":"Bazoilles sur meuse","nom":"Bazoilles_Meuse","type":"Château","periode":"XVIII-XIX","histoire":"BAZOILLES, il date du XVIIIe et XIXe siècle.Un château fort existait à Bazoilles-sur-Meuse au XIVe siècle, appartenant à la famille du Fay.  le château est démoli et le village pillé et brûlé. Julienne de Poitiers, veuve d'Henri du Fay, demanda au Duc de Lorraine une indemnité comme compensation des dommages,  Le duc lui accorde une indemnité de 2500 francs dans un acte daté du 12 juillet 1423. La famille de Saint-Rémi, descendante de la famille du Fay, céda la Seigneurie de Bazoilles, en 1710, à Louis de Barbarat. Un nouveau  bâti entre 1723 et 1772, pour Louis de Barbarat (1656-1746), seigneur, fermier général du duc Léopold Ier de Lorraine. Il y fit loger son fermier Jean Michel mais Louis de Barbarat n'habita pas au château ,  fut endommagé durant la guerre en 1423, ruiné avant 1723 et remanié pour la Famille Drummond de Melfort entre 1873 et 1879. Dépendances en partie du XVIe siècle. Ce petit château ou grand manoir, se caractérise par une beauté architecturale à taille humaine.  Transformée en une résidence confortable et tranquille.  Le châtelain Francis Boileau,  propriétaire,  à lépoque, se livrent les ducs Charles II de Lorraine et Édouard III de Bar, le château est démoli. Entre 1723 et 1772, le nouveau château apparaît à quelques mètres de lancien sous la direction de Louis de Barbarat, seigneur de Mazirot et de Bazoilles, installe son fermier Jean Michel dans le château. Le château change de main au XIXe siècle avec larrivée dune famille écossaise, leurs ancêtres ont accompagné le roi Jacques II dAngleterre en exil en France (1689). Louis-Charles Drummond de Melfort (1790-1880) et son épouse Eudoxie Saulnier des Cherriers (1807-1879) deviennent propriétaires du château. En 1984, Francis Boileau et son épouse rachètent le château de Bazoilles à la famille Didelot.","architecture":"BAZOILLES, ils décident dy apporter des modifications architecturales à la propriété située au milieu du village. Les transformations du château se déroulent entre 1873 et 1879. La façade centrale est rehaussée avec un monumental fronton sur lequel est inscrit le blason familial entouré de deux lions. Linscription en latin « Dei Dono Sum Quod Sum ». (par la grâce de Dieu, je suis ce que je suis), est visible aux visiteurs. Le bâtiment de lancienne entreprise éponyme de meubles figure toujours à proximité du château. Le chirurgien et ancien patron de presse engage alors une restauration importante de 20 pièces réparties sur 3 niveaux. Les dépendances du XVIe siècle ont été rénovées. Doté de nombreuses et grandes cheminées, le château possède un chauffage central au fuel performant pour les longues soirées dhiver. Successivement kommandantur, hôpital militaire, épargné par les guerres, les conflits religieux, le château de Bazoilles a traversé les siècles dans une relative quiétude. Si ce nest le château fort qui a précédé lexistant au XVe siècle rayé de la carte en raison dune guerre entre les ducs de Bar et de Lorraine. Une piscine et un terrain de tennis ont été construits derrière le château. En 1984, Francis Boileau et son épouse rachètent le château de Bazoilles à la famille Didelot.","habitants":"Famille du Fay                                                                                    Louis de Barbarat \r\n        \"","divers":"Château de Bazoilles sur Meuse:                                                      Gps  48° 18' 25\" Nord, 5° 39' 33\" Est","gps":"","images":["../../jctruffet.com/image/image_88/88_Bazoilles_Meuse_1.jpg","../../jctruffet.com/image/image_88/88_Bazoilles_Meuse_2.jpg","../../jctruffet.com/image/image_88/88_Bazoilles_Meuse_3.jpg","../../jctruffet.com/image/image_88/88_Bazoilles_Meuse_4.jpg"]},"Consult_chateau_formulairea289":{"id":"Consult_chateau_formulairea289","dept":"88","canton":"Neufchâteau","commune":"Beaufremont","nom":"Beaufremont","type":"Vestiges","periode":"XIII XV","histoire":"BEAUFREMONT, le château de Beaufremont est un château fort du XIIe siècle, propriété de la famille de Bauffremont. Il est cité pour la première fois en 1157. Il subit plusieurs transformations successives au cours des siècles : courtines reconstruites aux XIIIe, XIVe et XVe siècles, les vestiges au nord sont les plus anciens. Le logis seigneurial, appelé « maysonement neuf », est reconstruit à la fin du XVe ou au début du XVIe siècle,  pour Claude d'Arberg. Le colombier, situé à l'extérieur des murs d'enceinte, est construit en 1607 (date portée par un bandeau).","architecture":"BEAUFREMONT, le château est démantelé en 1634 (datation par travaux historiques) lors de la guerre de Trente Ans. Un corps en retour d'équerre du logis seigneurial est construit au début du XIXe siècle, en même temps que les dépendances de la basse-cour (aujourd'hui en ruines également). Un corps dans le prolongement du logis seigneurial est construit au XXe siècle. Le colombier est transformé en chapelle Saint-Joseph.Les vestiges de l'enceinte et du logis seigneurial ainsi que la totalité du sol avec les fossés et la contrescarpe sont classés au titre des monuments historiques par arrêté du 30 septembre 1994.","habitants":"Famille de  Claude d'Arberg.\r\n        \"","divers":"Vestiges de Beaufremont                                                                  gps 48° 15' 29\" nord, 5° 45' 21\" est","gps":"","images":["../../jctruffet.com/image/image_88/88_Beaufremont_1.jpg","../../jctruffet.com/image/image_88/88_Beaufremont_2.jpg","../../jctruffet.com/image/image_88/88_Beaufremont_3.jpg"]},"Consult_chateau_formulaire236c":{"id":"Consult_chateau_formulaire236c","dept":"88","canton":"Raon-l","commune":"Le Saulcy","nom":"Belval_Moussey","type":"Château","periode":"XIX","histoire":"BELVAL, il a été terminé en 1904, initié par Louis-François Nansé (1847 1902) et son épouse Marie Julie Louis (1858 1926), industrielle originaire de Senones (Vosges). La famille Nansé s'installe dans cette vallée des Vosges au lendemain de la guerre de 1870, construisant des usines textiles, le château, des dépendances, profitant de cet âge d'or du textile vosgien. Au lendemain de la Première Guerre mondiale, la crise économique et des différends familiaux font péricliter l'affaire. Pendant la Première Guerre mondiale, le front se situant en amont, le château est occupé par l'armée allemande. La Caisse Régionale d'Assurance Maladie du Nord-Est, gestionnaire du site, y accueillait jusqu'en 2006 des retraités bénéficiaires des minima sociaux pour des séjours de vacances. Mis à la vente, le château resta pendant longtemps sans trouver preneur. En 2014, le château a trouvé un acquéreur privé.   MOUSSEY  Le château de Moussey est de style néo-gothique. La construction du château date de 1858, 1861. Il est attenant à l'ancienne filature de Moussey. Il est inscrit partiellement aux M.H. depuis le 17/05/1988 pour le chateau, les façades et toitures du château et de la glacière ainsi que le bassin, pour les façades et toitures du bâtiment crénelé dit l'Atelier. Il appartient à une société privée. Le château de Moussey est fermé au Public.","architecture":"BELVAL,  le château qui présente une toiture sensiblement différente de l'actuelle, à la suite d'un incendie. Le château est repris par une autre famille d'industriels du textile, les Laedrich. Les résistants des villages alentour y furent enfermés pour interrogatoire, voire torturés en 1944. Un monument attenant relate le souvenir des malheureux habitants qui furent déportés dans les camps. « Passant souviens-toi que d'ici sont partis les malheureux habitants de Moussey, la Petite-Raon, Le Saulcy, Belval,  Le Puid, le Vermont, déportés par la Gestapo dans les bagnes nazis pour y souffrir ou y mourir.  Déportations août septembre 1944 »Le château servit aussi aux enfants des usines André Citroën qui venaient en colonie de vacances dans les années 1960. Pendant cette même époque l'usine de textiles qui flanquait le château à l'est fut entièrement rasée, aujourd'hui remplacée par des prés qui le laissent rien voir de ce passé industriel.","habitants":"Famille Nansé\r\n        \"","divers":"Château à Saulcy ; Moussey          grav 2-3-4                                           GPS : 48° 25' 51\" Nord 7° 01' 25\" Est                                                     Belval grav-1  .GPS : 48° 24' 37\" Nord, 7° 02' 42\" Est","gps":"48° 25' 51\" Nord 7° 01' 25\" Est","images":["../../jctruffet.com/image/image_88/88_Belval_Moussey_1.jpg","../../jctruffet.com/image/image_88/88_Belval_Moussey_2.jpg","../../jctruffet.com/image/image_88/88_Belval_Moussey_3.jpg","../../jctruffet.com/image/image_88/88_Belval_Moussey_4.jpg"]},"Consult_chateau_formulairefaab":{"id":"Consult_chateau_formulairefaab","dept":"88","canton":"Neufchâteau","commune":"Frebécout","nom":"Bourlémont","type":"Château","periode":"XII","histoire":"BOURLEMONT, le château fut construit aux XIIe siècle   pour Joffroy de Bourlémont  et appartient à Pierre et Léon de Brixey qui prennent le nom de Bourlémont. Aux XIIe et XIIIe siècles le château est \"modernisé\". Au XVIe siècle, la propriété est divisée entre les frères Jean et Hanry et le château est ceint en deux parties.","architecture":"BOURLEMONT, le château de Bourlémont fut construit en 1242. C'est un château de style Médiéval.. Le château conserve son aspect féodal sur le front Est, avec quatre tours rondes à toit en poivrières. Il y en avait plus d'une dizaine au XIVe siècle. De l'autre côté du château s'adosse les corps de logis du XVIe siècle. Ceux-ci bordent une cour intérieure et une aile sud agrémentée d'une galerie en arcades cintrées. L'intérieur du château de Bourlémont porte la marque de plusieurs époques. Certains salons conservent leur plafond d'origine, et la chapelle Saint-Vincent abrite les tombeaux seigneuriaux. Le château de Bourlémont est, sans conteste, le plus beau château du département des Vosges mais il est privé. Seul, le parc est parfois accessible au cours des 2 Journées Européennes du patrimoine le 3ème W.E. de septembre. Le château de Bourlémont a été inscrit aux M.H. en 1977.   Éléments protégés MH : les façades et les toitures de l'ensemble des bâtiments ; la chapelle ; le plafond à la française du salon du premier étage, inscription par arrêté du 15 juin 1977.","habitants":"Famille de Bourlémont\r\n        \r\n        \r\n        \"","divers":"Château de Bourlémont                                                                   GPS : 48° 23' 24\" Nord, 5° 39' 42\" Est","gps":"48° 23' 24\" Nord, 5° 39' 42\" Est","images":["../../jctruffet.com/image/image_88/88_Bourl%c3%a9mont_1.jpg","../../jctruffet.com/image/image_88/88_Bourl%c3%a9mont_2.jpg","../../jctruffet.com/image/image_88/88_Bourl%c3%a9mont_3.jpg","../../jctruffet.com/image/image_88/88_Bourl%c3%a9mont_4.jpg"]},"Consult_chateau_formulaire73ad":{"id":"Consult_chateau_formulaire73ad","dept":"88","canton":"Remiremont","commune":"Remiremont","nom":"Bruyères","type":"Château","periode":"XVIII","histoire":"Deux châteaux dont le palais abbatial et Bruyères.                                      Palais ABBATIAL, il est organisé des visites guidées du centre historique de Remiremont (église abbatiale Saint-Pierre du XIIIe, maisons canoniales et palais abbatial du XVIIIe). Accolé à léglise, lancien palais abbatial, de style classique, édifié par labbesse Anne Charlotte de Lorraine, fille du duc Léopold Ier, présente une belle façade. Aujourdhui, ce palais abrite lhôtel de ville de la commune. Il a également abrité le Tribunal d'Instance de Remiremont jusqu'en fin 2009. Lensemble des façades et toitures, sol de la cour, sol du jardin et sol du passage jusquaux murs de léglise ont été inscrits sur linventaire supplémentaire des M.H. le 31 mai 1965.                                                                                                                                                                                       PALAIS  le Palais Abbatial a été bâti à Remiremont, il a été édifié, de 1752 à 1756, sur les plans de l'architecte nancéen Jean-Nicolas Jeannesson, pour l'Abbesse Anne-Charlotte de Lorraine, abbesse moderne de Remiremont, sur de l'empereur François Ier , entreprit, en 1751, de faire bâtir un nouvel hôtel abbatial à Remiremont, plus vaste et plus magnifique que l'ancien, qui tombait en ruine. L'ancienne chapelle des Abesses dut être démoli. On y retrouva quelques tombeaux. L'intérieur du Palais Abbatial de Remiremont a été restauré, après un incendie, en 1871. L'ancien palais accueille aujourd'hui l'hôtel de Ville, le Tribunal d'Instance et le Temple protestant.","architecture":"BRUYERES,  c'était autrefois une demeure construite au XVIIIe siècle. Suite au don de son légataire, la demeure est devenue un musée historique, où sont regroupés de nombreux souvenirs de l'abbaye et du chapitre noble qui rendirent la ville de Rémiremont célèbre. C'est aussi un Musée des Beaux-Arts, renfermant de riches collections de peintures. le château de Bruyères datait du Xe siècle. C'était un château fort, fondé par le Duc de Lorraine. Il semblerait que Henri XI y séjourna en 1196. Le château de Bruyères fut incendié en 1715. Il ne reste depuis que des vestiges de l'ancien château de Bruyères.","habitants":"Abbesse Anne-Charlotte de Lorraine,\r\n        \r\n        \"","divers":"Deux châteaux à Remiremont dont le palais abbatial et Bruyères.  grav 2-3  GPS : 48° 12' 47\" Nord, 6° 43' 04\" Est                                                                           Palais GPS : 48° 01' 03\" Nord, 6° 35' 26\" Est  GPS : 48° 0' 55,84\" Nord, 6° 35' 29,62\" Est","gps":"48° 12' 47\" Nord, 6° 43' 04\" Est","images":["../../jctruffet.com/image/image_88/88_Bruy%c3%a8res_1.jpg","../../jctruffet.com/image/image_88/88_Bruy%c3%a8res_2.jpg","../../jctruffet.com/image/image_88/88_Bruy%c3%a8res_3.jpg"]},"Consult_chateau_formulaire0811":{"id":"Consult_chateau_formulaire0811","dept":"88","canton":"Charmes","commune":"Chatel sur Moselle","nom":"Chatel_sur_Moselle","type":"Vestiges","periode":"XI-XIII-XV","histoire":"CHATEL sur MOSELLE ,Edifié à la fin du XIme siècle par les Comtes de Vaudémont, de la famille des ducs de Lorraine, au XIIIe siècle on voit un important agrandissement, grâce au soutien financier du comte de Bar, La riche et puissante famille de Neufchâtel hérite de la forteresse par mariage en 1373, puis lenceinte du château est renforcée par Thiébaut VIII, puis par son fils Thiébaut IX, dans la période de 1430 à 1450, afin de ladapter au mieux à se défendre contre la nouvelle artillerie.A la mort de Charles le Téméraire en 1477, devant les murs de Nancy, la forteresse reprend son identité Lorraine, et elle ne sera vaincue quau siècle de Louis XIV, par les troupes du Maréchal de Créqui. Au cours de lhiver 1670, elle est détruite puis entièrement rasée.Tombées par la suite dans loubli, les ruines de la forteresse, qui sétendent sur plus de 5,5 hectares, sont depuis 1972 soumises à dimportantes campagnes de travaux, grâce à lAssociation du Vieux Châtel et à la Communauté dAgglomération dEpinal, propriétaire actuel du site. Enfin, depuis 1988, le site est classé au titre des Monuments Historiques, et les travaux sont suivis et contrôlés par la Direction Régionale des Affaires Culturelles. De cette forteresse, nont été conservées que les galeries souterraines datant des XIIIe et XVe siècles, les ruines de lancien donjon carré datant du XI, lemplacement du pont levis, le système de déchargement des chariots, la double enceinte, construite au Nord du site et le large fossé de 57 mètres qui la borde.","architecture":"CHATEL sur MOSELLE  l'ancienne forteresse a été construite du XIe au XIIIe et au XVe siècles.  le premier château comprend une enceinte qui entoure un grand donjon carré qui sert de logis seigneurial. qui permettra dajouter plusieurs tours à la forteresse, notamment le long de la rivière Moselle, et de construire un logis seigneurial à lécart du donjon.C'est l'un des plus grands châteaux forts dEurope, construit sur un promontoire au-dessus de la Moselle, pour les Familles de Vaudémont et de Neufchâtel. La forteresse couvre 5 hectares, compte 22 tours et a 1,4 km de remparts, 3 étages de galeries et de salles souterraines. Le site de Châtel est un témoin remarquable de ladaptation à lartillerie dun château du XI-XIIIe siècle. Cette transformation, encore visible aujourdhui, est luvre des sires de Neufchâtel qui ont tenu une place éminente à la cour des Ducs de Bourgogne au XVe siècle. Malgré le démantèlement de la place sous Louis XIV, la visite vous conduira du pont-levis à la double enceinte et ses larges fossés en passant par les trois étages de galeries souterraines, larsenal et la boulangerie. Ne manquez pas non plus le rare bâton à feu, ancêtre de larquebuse, et les poteries culinaires exposées au musée. Grâce à ses connaissances en matière darmement, Thiébaut IX, alors Maréchal de Bourgogne, fait construire une barbacane pour protéger lentrée, une double enceinte au nord de la forteresse, mais aussi un mur bouclier le long de la Moselle. La forteresse est tellement bien protégée quelle sera imprenable jusquau début du XVIIe siècle.","habitants":"Famille de Vaudémont\r\n        \"","divers":"Vestiges et musée à Châtel sur Moselle                                               GPS : 48° 18' 45\" Nord, 6° 23' 42\" Est","gps":"48° 18' 45\" Nord, 6° 23' 42\" Est","images":["../../jctruffet.com/image/image_88/88_Chatel_sur_Moselle_1.jpg","../../jctruffet.com/image/image_88/88_Chatel_sur_Moselle_2.jpg","../../jctruffet.com/image/image_88/88_Chatel_sur_Moselle_3.jpg","../../jctruffet.com/image/image_88/88_Chatel_sur_Moselle_4.jpg"]},"Consult_chateau_formulaired0ca":{"id":"Consult_chateau_formulaired0ca","dept":"88","canton":"Darney","commune":"Chatillon sur Saone","nom":"Chatillon_sur_Saone","type":"Patrimoine","periode":"XV-XVI","histoire":"CHATILLON, début XVIe siècle : constitution du fief de Châtillon par Pierre de Meaux, bourgeois de Mâcon, qui y aménage une demeure possédant tous les attributs seigneuriaux, notamment une tour-porche précédée d'un pont-levis.   Jusqu'en 1834 : le château est la propriété de la famille de Meaux. Le château, propriété privée, ne se visite pas. La première mention officielle du village date de 1234, dans le comté de Bar. En 1348, les comtes de Bar installent un siège de Prévôté et c'est à cette période que remontent les premiers travaux de fortification englobant la ville et la joignant au château.\r\nLes XIVe et XVe siècles sont marqués par les troubles : Guerre de Cent Ans et guerre entre les duchés de Lorraine et de Bourgogne. En 1484 le village est détruit et devient lorrain.  De 1500 à 1600, le village se reconstruit, des nobles s'établissent et font construire des hôtels particuliers. Châtillon devient un carrefour stratégique à l'entrée de la Bourgogne, de la Champagne et de la Franche Comté à la fin du Moyen-age et durant toute la Renaissance. En 1618, la Guerre de 30 ans embrase l'Europe, le village est occupé, rasé et déserté en juin 1635.   C'est à partir de 1660 que des paysans réinvestissent les lieux, et l'ancienne place forte se transforme en agglomération rurale avec des agriculteurs et des viticulteurs.","architecture":"CHATILLON sur Saône, en juin 1635, les troupes françaises de Richelieu s'en prennent à Châtillon-sur-Saône, en l'assiégeant  et en la détruisant partiellement, lors de la guerre de Trente Ans.   Les troupes suédoises de Bernard de Saxe-Weimar l'occupèrent en décembre 1636 et la quasi-totalité de la population disparut, victime de la guerre, de la peste, sauf ceux qui avaient pu fuir. Le bourg fut abandonné puis reconstruit partiellement à partir de la fin du XVIIe siècle et redevint le chef-lieu dune prévôté ducale de Lorraine puis royale. Cependant, la reconstruction du XVIIIe siècle épargna nombre de maisons Renaissance qui furent simplement transformées en granges ou fermes. La restauration de ces maisons s'appuya sur plusieurs classements en 1984 grâce à l'action de l'association Saône-Lorraine  au XIXe siècle : époque supposée de la disparition de la tour-porche.  Le château est un bâtiment rectangulaire, flanqué d'une tour carrée et d'une tourelle circulaire un peu plus élevées que lui et, sur la façade donnant sur la cour qui le sépare des communs, d'une tourelle d'escalier polygonale. Deux tours rondes  l'une renfermant un pigeonnier  s'élèvent de part et d'autre des communs.                                                              L'hôtel du Gouverneur et celui du Faune ; au-devant, une fontaine à la cuve octogonale  a été placé ici dans la seconde moitié du XIXe siècle.                                                                                             L'Hôtel de Sandrecourt (XVIe siècle) avec sa tourelle d'escalier à vis et ses fenêtres à croisillons.","habitants":"Famille de Meaux\r\n        \r\n        \r\n        \"","divers":"Vestiges et château à Chatillon sur Saone","gps":"","images":["../../jctruffet.com/image/image_88/88_Chatillon_sur_Saone_1.jpg","../../jctruffet.com/image/image_88/88_Chatillon_sur_Saone_2.jpg","../../jctruffet.com/image/image_88/88_Chatillon_sur_Saone_3.jpg","../../jctruffet.com/image/image_88/88_Chatillon_sur_Saone_4.jpg","../../jctruffet.com/image/image_88/88_Chatillon_sur_Saone_5.jpg"]},"Consult_chateau_formulaire850e":{"id":"Consult_chateau_formulaire850e","dept":"88","canton":"Le Val-d","commune":"Bains les bains","nom":"Chesnois","type":"Château","periode":"XVIII","histoire":"CHESNOIS   c'est un château de la Renaissance. Le Chesnois est une ancienne propriété de la famille Demazure. Il est construit en 1864 pour Édouard Demazure (1827-1892), puis passe par héritage à son fils André Demazure (1869-1938), qui fut maire de Bains-les-Bains de 1907 à 1921 et de 1929 à sa mort en 1938. La propriété est occupée successivement entre 1940 et 1944 par l'état-major des Eaux et Forêts, les Allemands puis les Américains. Le château accueille, depuis, dans ses murs, l'administration du Lycée Professionnel.","architecture":"CHESNOIS, c'est à la fin de l'année 1944 que les premiers éléments du Centre de Formation Professionnelle (CFP) de Remiremont, qui se trouvait sans locaux à cause des évènements créés à la Libération, vient s'installer au Chesnois. Des bâtiments en préfabriqués servent les premières années d'internat, de salles de classes, d'ateliers ; la cuisine et les réfectoires prennent place au château. En 1948, il est entièrement converti en centre d'apprentissage masculin (CA). En 1960, un grand internat et des ateliers seront construits, en même temps que létablissement devient un collège d'enseignement technique (CET). En 1969, le collège d'enseignement général du canton s'installe à proximité, transformant le secteur du Chesnois en une cité scolaire. En 1975, le collège d'enseignement technique devient un lycée d'enseignement professionnel, simplifié en lycée Professionnel, en 1985. Le château du Chesnois n'est pas inscrit actuellement aux M.H.","habitants":"Famille Demazure\r\n        \r\n        \"","divers":"Château  du Chesnois à Bains les Bains                                                             GPS : 48° 00' 08\" Nord, 6° 14' 48\" Est","gps":"48° 00' 08\" Nord, 6° 14' 48\" Est","images":["../../jctruffet.com/image/image_88/88_Chesnois_1.jpg","../../jctruffet.com/image/image_88/88_Chesnois_2.jpg"]},"Consult_chateau_formulairea927-2":{"id":"Consult_chateau_formulairea927-2","dept":"88","canton":"Le Val-d","commune":"Le Clerjus","nom":"Clerjus","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Clerjus ; Bellevue et Puton.                                                     BELLEVUE, il servit de château d'habitation. La construction du château de Bellevue date du XIXe siècle, pour M de Buyer. Le château est construit dans la seconde moitié du XIXe siècle, par un maître de forges de la famille de Buyer. Le château de Bellevue a une forme rectangulaire, avec un toit à quatre pans, à 600 mètres du château Puton, un château construit par un autre maître de forges au siècle précédent. A ce jour, le château ne fait l'objet d'aucune inscription ou classement au titre des monuments historiques.","architecture":"PUTON, la construction du château Puton date du XVIIIe siècle, pour Geores Puton (1679-1737) (maître de forges et fermier général. Celui-ci avait dirigé la manufacture royale de Bains-les-Bains de 1733 à 1737. A ce jour, le château Puton ne fait l'objet d'aucune inscription ou classement au titre des M.H. D'autres maîtres de forge ont construit des châteaux au XIXe siècle. On peut citer, le château de La Chaudeau de la famille de Buyer, situé en Haute-Saône, au sud du Clerjus et le château de Semouse de la famille de Pruines sur la commune de Xertigny. Tous ces châteaux furent bâtis durant la période la plus florissante des forges de la Vôge. Le château Puton est bâti en forme de U, enserrant une cour fermée par une grille et un portail, comporte un rez-de-chaussée et deux étages.","habitants":"Bellevue; famille de Mr  Buyer                                                      Puton ; Famille de  George Puton \r\n        \"","divers":"Deux châteaux à Clerjus ; Bellevue\r\ngps 47° 57' 53\" nord, 6° 18' 26\" est, pas d'image\r\n et Puton grav-1.   GPS : 47° 58' 00\" Nord, 6° 18' 49\" Est","gps":"47° 58' 00\" Nord, 6° 18' 49\" Est","images":["../../jctruffet.com/image/image_88/88_Clerjus_1.jpg"]},"Consult_chateau_formulaire7435":{"id":"Consult_chateau_formulaire7435","dept":"88","canton":"Vittel","commune":"Contrexéville","nom":"Contrexéville","type":"Palace","periode":"XVIII","histoire":"CONTREXEVILLE  Le nouveau propriétaire des eaux minérales Duperrier-Dumouriez annonce une centaine de buveurs d'eau autour de la fontaine minérale que l'on commence à appeler la source du pavillon, parce qu'un petit édifice octogonal en bois la protège, de chaque côté une galerie fermée en fer à cheval la relie au bâtiment des bains d'une part, et à l'hôtel de l'Établissement d'autre part. Construit en 1900 en plein coeur du parc thermal, le casino de Contrexéville est un univers unique de jeux et animation faisant partie du groupe Partouche.  François Louis Bouloumi. C'est en 1850, qu'un curiste qui deviendra célèbre par la suite est venu boire pour la première fois à la source, il s'agit de Louis Bouloumié le fondateur du domaine thermal de Vittel.   En 1881, la voie ferrée dessert la station, mettant Paris à moins de 6 heures de Contrexéville, c'est ainsi que se déverse une foule de curistes de plus en plus nombreux.\r\nEn 1885, un nouveau pavillon des sources est construit par l'architecte Schertzer, sur le style du pavillon Baltard, où sont utilisés le fer la fonte et le verre.                                                           Manoir transformé en hôtel \" la souveraine\" dirigé par monsieur Paris 7 hôtels sont édifiés dont deux palaces : le \" Continental \" et le \" Cosmopolitain \".","architecture":"CONTREXEVILLE, le casino.   Le parc est agrandi, un temple protestant est bâti ainsi qu'une chapelle orthodoxe. Le casino est inauguré en juin 1900, c'est l'uvre de l'architecte François Clasquin. Une nouvelle industrie vient de naître, pour répondre à la demande croissante d'eau en bouteille, une usine moderne est construite pour embouteiller l'eau minérale, la conditionner et l'expédier. À nouveau le domaine thermal est modifié, l'architecte Charles Mewès qui avait construit l'hôtel Cosmos, en est le concepteur ; il utilisera le béton qu'il habillera ensuite de céramiques. Après la démolition des bâtiments à la fin de la saison 1909, on entreprend la reconstruction d'un nouveau pavillon, d'une longue galerie à péristyles et d'un établissement de soins thermaux.   Le nouveau pavillon (la Rotonde) et les galeries.Des personnalités se côtoient dans ce Contrexéville mondain, le Shah de Perse qui par trois fois viendra boire les eaux (1900, 1902 et 1905), la grande-duchesse Wladimir avec toute une colonie de russes et une foule de diplomates.","habitants":"Famille de François Louis Bouloumi\r\n        \"","divers":"A Contrexéville ; le Casino grav 1 La Souveraine grav -3-4 la Rotonde grav-2","gps":"","images":["../../jctruffet.com/image/image_88/88_Contrex%c3%a9ville_1.jpg","../../jctruffet.com/image/image_88/88_Contrex%c3%a9ville_2.jpg","../../jctruffet.com/image/image_88/88_Contrex%c3%a9ville_3.jpg","../../jctruffet.com/image/image_88/88_Contrex%c3%a9ville_4.jpg"]},"Consult_chateau_formulairefd72":{"id":"Consult_chateau_formulairefd72","dept":"88","canton":"Neufchâteau","commune":"Harchéchamp","nom":"Couvonges","type":"Château","periode":"XII-XVIII","histoire":"COUVONGES,  Harchéchamp a une butte fortifiée dominée par deux constructions : le château construit en 1578 pour la famille du châtelet, date portée par un cartouche en remploi dans le couloir d'accès à la tour sud ; aménagement intérieur refait en partie au XVIIIe siècle et le château de Couvonges construit au XVIIIe siècle qui appartient au général-baron dEmpire Marie-François Rouyer. L'ensemble est composé d'un château, pavillon d'entrée, tour du côté du village construits sans doute dans la deuxième moitié du XVe siècle ; ferme construite ou restaurée en 1650, date portée par un aisselier de charpente; baies du château repercées au XVIIe ou au XVIIIe siècle; baies de la ferme en partie repercées aux XVIIIe et XIXe siècles.","architecture":"COUVONGES,  la construction date du XIIe au XVIe siècle, est une maison bourgeoise, qui ressemble à un petit château. La construction  date du XIXe siècle, dominant les deux cours d'eau , le château est construit à l'intérieur de son enceinte médiévale sur une hauteur dominant le Vair. De plan rectangulaire, le bel édifice renaissance est adossé à deux tours carrées. La façade ouest donnant sur le parc conserve ses larges fenêtres à meneau et son haut toit percé de lucarnes.\r\nQuelques éléments intérieurs ont été conservés comme la grande cheminée de la cuisine, la chapelle seigneuriale avec ses fresques, et un escalier à vis.  A part le château proprement dit, le mur d'enceinte entourant la propriété enserre un pavillon d'entrée au nord, une maison-forte dite château de Couvonges du XVIIe siècle, il a servi de prison avant la Révolution française et a appartenu au général d'Empire Marie François Rouyer ; il accueille actuellement un petit musée africain, une ferme (construite ou restaurée en 1650, date portée par un aisselier de charpente), une tour du côté du village du XVe siècle et d'un grand garage semi-enterré (un petit musée automobile privé y est logé, visitable seulement aux journées européennes du patrimoine.","habitants":"famille du châtelet et la  famille de Bassompierre.\r\n        \r\n        \"","divers":"Château et Remparts à Couvonges","gps":"","images":["../../jctruffet.com/image/image_88/88_Couvonges_1.jpg","../../jctruffet.com/image/image_88/88_Couvonges_2.jpg","../../jctruffet.com/image/image_88/88_Couvonges_3.jpg","../../jctruffet.com/image/image_88/88_Couvonges_4.jpg","../../jctruffet.com/image/image_88/88_Couvonges_5.jpg"]},"Consult_chateau_formulaire6cbe":{"id":"Consult_chateau_formulaire6cbe","dept":"88","canton":"Epinal","commune":"Le verger de Vaudeville","nom":"Crevecoeur_88","type":"Château","periode":"XVI-XVII","histoire":"CREVECOEUR, c'est un château de style renaissance. La construction de ce château seigneurial date du XVIe siècle. Dans la seconde moitié du XVIe siècle, le goût pour la symétrie venant de l'extérieur commence par  le duché de Lorraine.","architecture":"CREVECOEUR,  C'est le cas du château de Crèvecur, dessiné selon un plan carré et entouré de quatre tours carrées à ses quatre angles (c'est également le même plan que suit le château de Sandaucourt, mais avec quatre tours rondes). Un étang se trouve dans la propriété, derrière le château, alimenté par un ruisselet. Le château de Crèvecoeur est inscrit aux M.H. depuis le 25/02/1974, concernant ses façades, ses toitures, les boiseries du petit salon et les cheminées intérieures. Un étang se trouve dans la propriété, derrière le château, alimenté par un ruisselet. Le château de Crèvecoeur est actuellement un château privé, fermé au public. Il est inscrit aux M.H. depuis le 25/02/1974.","habitants":"seigneur local\r\n        \r\n        \"","divers":"Château et chatelet d'entrée à Crévecoeur                                     GPS : 48° 13' 42\" Nord, 6° 32' 30\" Est","gps":"48° 13' 42\" Nord, 6° 32' 30\" Est","images":["../../jctruffet.com/image/image_88/88_Crevecoeur_88_1.jpg","../../jctruffet.com/image/image_88/88_Crevecoeur_88_2.jpg"]},"Consult_chateau_formulairebfe7":{"id":"Consult_chateau_formulairebfe7","dept":"88","canton":"Darney","commune":"Darney","nom":"Darney","type":"Château","periode":"XV-XVII","histoire":"DARNEY, le château originel est construit au Xe siècle par les seigneurs de Darney. Plus tard, il sert de résidence aux ducs de Lorraine qui construisent les remparts de la ville. On surnomme la ville la \"cité aux trente tours\" et elle devient une importante place militaire. La ville est détruite au Moyen Âge, démantelée en 1634, ravagée par les troupes franco-suédoises de Bernard de Saxe-Weimar lors de la guerre de Trente Ans, et le château est rasé en 1639. En 1725, cest sur les fondations dun château en ruine que la municipalité de Darney décide de construire un nouvel édifice pour loger la nouvelle prévôté. Les architectes de lépoque sinspirent des plans de lancien donjon en construisant un escalier à vis dans une tourelle collée au bâtiment. Une grande salle dauditoire est installée au deuxième étage, décorée des blasons des familles de gentilshommes verriers venus de Bohême pour sinstaller dans la forêt de Darney au XIVe siècle avec les secrets de leur industrie. Du château originel, il reste quelques vestiges sur létage inférieur. Le château sert dhôtel de ville aux XIXe et XXe siècles. À la suite du rassemblement des volontaires tchèques et slovaques à Darney pendant la première guerre mondiale, et à la suite de la reconnaissance officielle du conseil national tchécoslovaque par la France en juin 1918.","architecture":"DARNAY,  sa construction date de 1725 pour les seigneurs de Darney. Le château de Darney (ancien hôtel de ville) abrite, le musée Franco-Tchécoslovaque, depuis 1938, par le maire André Barbier. Il a conservé la déclaration de l'indépendance de l'ancien état tchécoslovaque. Le nouvel hôtel de ville est situé sur le site de l'ancien couvent des Récollets. Sa construction date du XVe, XVIIIe et XIXe siècle. Il reste encore aujourd'hui quelques vestiges des anciens remparts du château de Darney. Éléments protégés MH : les remparts (vestiges) : inscription par arrêté du 28 décembre 1984. L'hôtel de Ville (ancien château): inscription par arrêté du 28 décembre 1984, propriété de la commune, mairie et musée.","habitants":"Seigneurs de Darney\r\n        \"","divers":"Château de Darney                                                                           GPS : 48° 05' 06\" Nord 6° 02' 50\" Est","gps":"48° 05' 06\" Nord 6° 02' 50\" Est","images":["../../jctruffet.com/image/image_88/88_Darney_1.jpg","../../jctruffet.com/image/image_88/88_Darney_2.jpg"]},"Consult_chateau_formulaire9f90":{"id":"Consult_chateau_formulaire9f90","dept":"88","canton":"Golbey","commune":"Darnieulles","nom":"Darnieulles","type":"Vestiges","periode":"XII-XIV","histoire":"DARNIEULLES,  Jean Pillelipille, bâtard de Lorraine, fut seigneur de Darnieulles. Il était le fils naturel du duc de Charles II de Lorraine et de sa maîtresse Alison Dumay. Il reçut de son père un héritage qui lui permit d'acquérir la seigneurie de Darnieulles dont il prit le nom et dont les seigneurs du lieu descendent jusqu'à la Révolution.","architecture":"DARNIEULLES, le château des seigneurs de Darnieulles a été construit du XIIe siècle AU XIVe siècle. Il ne subsiste depuis que son donjon et quelques murailles. Des fouilles importantes en 2013 ont apporté quelques informations complémentaires à ce château : Cette tour dhabitation édifiée par les sires de Darnieulles est datée par la critique historique du début du XIIe siècle. De plan quadrangulaire (15 x 11 m), ses murs font 1,25 m dépaisseur. La face ouest mesure encore 12 m de hauteur. Le bâtiment présente trois niveaux. Le rez-de-chaussée était aveugle et devait être réservé à une fonction de stockage. Son niveau de sol nest pas reconnu. La tour dhabitation de Darnieulles présente certaines caractéristiques techniques et stylistiques qui se rapprochent de donjons plus imposants, tels Vaudémont (54), Salives (25) ou Langeais (37). Ces comparaisons, les analyses physico-chimiques et la mise en uvre des matériaux font repenser la période dédification du bâtiment, en lélargissant au XIe siècle.","habitants":"Famille de Jean Pillelipille, \r\n        \"","divers":"Vestiges du château de Darnieules                                                         GPS : 48° 11' 59\" Nord 6° 21' 11\" Est","gps":"48° 11' 59\" Nord 6° 21' 11\" Est","images":["../../jctruffet.com/image/image_88/88_Darnieulles_1.jpg","../../jctruffet.com/image/image_88/88_Darnieulles_2.jpg"]},"Consult_chateau_formulairef084":{"id":"Consult_chateau_formulairef084","dept":"88","canton":"Vittel","commune":"Dombrot-le-sec","nom":"Dombrot_Bouzey","type":"Château","periode":"XVI-XVIII","histoire":"DOMBROT, la première mention de la seigneurie date du XIIe siècle, et était possédée par le famille d'Epinal. Elle passe ensuite aux nobles de Dombrot qui la conserve de 1212 à 1346. il était habité par les comtes de Bouzey. Cette famille a rendu de grands services au duché de Lorraine, en lui fournissant de nombreux serviteurs, dès le XVe siècle.  En 1639, le château est incendié par les Suédois suite aux méfaits de la guerre de trente ans. Le nouveau château rebâti est la propriété de Claude-Renée de Ligneville, comtesse de Monchat. Le duc Léopold de Lorraine élève la seigneurie de Bouzey au rang de comté en 1715. En 1751, le château dépend du bailliage de Darney. Vers 1790, les comtes de Bouzey transforment l'intérieur sans toucher à son aspect extérieur. Sous le second Empire, le château est habité par le comte de Tolède, oncle de l'impératrice Eugénie. Au cours des XIXe et XXe siècles le château a subit des transformations malheureuses comme l'arasement du corps de logis principal au niveau du deuxième étage. Avec le XXIe siècle, les actuels propriétaires ont commencé à redonner vie et faste aux bâtiments mutilés. Derrière des grilles ornées d'une porte en fer forgé provenant du parc thermal de Contrexéville, se dresse le corps de logis principal.","architecture":"DOMBROT;  la construction  date du XVIe siècle. Au XVIIIe siècle,  En signe de gratitude, le duc Léopold Ier donna le nom de Bouzey au village de Dombrot (par Lettres patentes de 1715), nom qui subsista jusqu'en 1790. Les comtes de Bouzey firent transformer l'intérieur du château de Dombrot, dont le grand salon ou la salle d'honneur, sans modifier l'aspect extérieur du siècle précédent. Le dernier membre de cette famille, Adrien-Gabriel de Champagne-Bouzey, revendit le château de Dombrot, par lots à partir de 1818. Il reste découpé, entre plusieurs propriétaires, jusqu'en 1917, date à laquelle Henri Citel le réunit de nouveau, à l'exception de l'aile du nord, dite aile des cuisines, qui est toujours actuellement séparée du château. Le château de Dombrot fut habité par José Alvarez de Toledo y Dubois (1779-1858), comte de Tolède et l'oncle de l'Impératrice Eugénie, pendant les dernières années de sa vie, au milieu du XIXe siècle. Il subit de nombreuses dégradations et transformations malheureuses, au cours des XIXe et XXe siècles, dont un corps de logis avec ses tourelles tronquées, au second étage. Son propriétaire actuel, Guy Pierron a racheté le château de Dombrot, en 2006. Depuis 2011, il a fait entreprendre une importante restauration.  Un bâtiment annexe présente sur sa façade ouest des murs qui rappellent un certain caractère médiéval.","habitants":"Claude-Renée de Ligneville  et le comte de Tolède\r\n        \"","divers":"Château de Dombrot                                                                                              GPS : 48° 08' 43\" Nord 5° 54' 47\" Est","gps":"48° 08' 43\" Nord 5° 54' 47\" Est","images":["../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_1.jpg","../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_2.jpg","../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_3.jpg","../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_4.jpg","../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_5.jpg","../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_6.jpg","../../jctruffet.com/image/image_88/88_Dombrot_Bouzey_7.jpg"]},"Consult_chateau_formulaire5a70":{"id":"Consult_chateau_formulaire5a70","dept":"88","canton":"Mirecourt","commune":"Dommartin sur Vraine","nom":"Dommartin_Vraine","type":"Château","periode":"XV-","histoire":"DOMMARTIN sur VRAINE , château reconstruit au début du XVe siècle, Au XIXe siècle, affirmation de la vocation agricole de l'ancien château qui connaît alors des restructurations.  Son front sud est en majeure partie conservé, intégrant le portail et d'importants restes du logis. Il en est de même pour la grange du XVe siècle ainsi que pour le logis en retour sur la cour d'origine XVIe siècle. Si la tour nord-est a disparu, les bases de la tour nord-ouest sont en partie conservées à la charnière du grand corps de ferme du XIXe siècle.","architecture":"DOMMARTIN sur VRAINE, c'est un ancien château fort de style médiéval. Il se situe juste à côté de l'église Saint-Martin, son ancienne chapelle castrale a été reconstruit au début du XVe siècle, c'était autrefois une enceinte carrée cantonnée de 4 tours circulaires. Au XIXe siècle, il a été réutilisé en grange. Les vestiges du château de Dommartin-sur-Vraine font l'objet d'une inscription au titre des monuments historiques depuis le 14 avril 20041. Cette protection concerne les façades et les toitures, y compris la cheminée et l'escalier de logis central, mais à l'exception des adjonctions du XIXe siècle. Le château de Dommartin-sur-Vraine est inscrit aux M.H. depuis le 14/04/2004. se visite qu'en été, sur RdV  éléments protégés MH : les façades et les toitures, y compris la cheminée et l'escalier de logis central, à l'exception des adjonctions du XIXe siècle :  propriété de la commune.","habitants":"seigneurs locaux\r\n        \"","divers":"Château de Dommartin sur Vraine\r\ngps  48° 20' 11\" nord, 5° 54' 06\" est","gps":"","images":["../../jctruffet.com/image/image_88/88_Dommartin_Vraine_1.jpg","../../jctruffet.com/image/image_88/88_Dommartin_Vraine_2.jpg","../../jctruffet.com/image/image_88/88_Dommartin_Vraine_3.jpg"]},"Consult_chateau_formulaireb39a":{"id":"Consult_chateau_formulaireb39a","dept":"88","canton":"Epinal","commune":"Epinal","nom":"Epinal_Patrimoine","type":"Château","periode":"XIII-XVIII","histoire":"EPINAL  situé sur une colline dominant la ville, ce grand ensemble fortifié médiéval (datant du XIIIe siècle) fut commandité par Jacques de Lorraine, évêque de Metz, qui fit bâtir un rempart composé de dix-huit tours et sept portes, les murs étaient précédés d'un fossé. Aujourd'hui subsistent des vestiges de tours au cur d'un parc à l'anglaise de 26 hectares comprenant un jardin médiéval, une vigne et un parc animalier.                                                                                    JEUXEY à quelques K.M. au nord-est d'Epinal , FAILLOUX  'est une maison de maître qui servait de logis seigneurial. Sa construction date du XVIIIe siècle. Le château de Failloux possède deux pigeonniers reliés les uns aux autres par une série de piques et une grille ornementée signée par les ateliers Jean Lamour, réalisateurs des grilles de la place Stanislas de Nancy. Cette bâtisse du XVIIIe avec son jardin à la française, est doté d'un bassin. Le château de Failloux vous propose 4 chambres d'hôtes, dont 2 suites.                      Le Fort SANCHEY, Ouvert au public, visite libre, entrée de la batterie de Sanchey, un des quinze forts datant des années 1880.","architecture":"EPINAL   la construction du château d'Epinal date au XIIIe siècle. Il est classé aux M.H. depuis 1992. Il ne reste que des vestiges de ce grand château fort fortifié de style médiéval, datant des XIIIe-XVIIe siècles, dans un parc boisé, qui savance jusquau cur de la ville. Cette ancienne forteresse servait de logis seigneurial au seigneur Jacques de Lorraine. Il fut détruit sur l'ordre de Louis XIV en 1670. Les ruines du château d'Epinal ont été rachetées par la commune. Même si Épinal est moins concernée par le conflit que les régions françaises plus au nord, elle fut l'enjeu d'un combat le 12 octobre 1870. Les combats pour défendre la ville ont eu lieu dans les environs à Deyvillers, vers le château de Failloux, au bois de la Voivre et dans la tranchée de Docelles. À lentrée des soldats par le faubourg Saint-Michel, sillustre le spinalien Sébastien Dubois qui, se plaçant un genou à terre avec son fusil au milieu de la rue, abat deux soldats avant dêtre lui-même tué.  La ville est occupée jusquau 30 juillet 1873.   Éléments protégés MH : les vestiges archéologiques échelonnés d'Ouest en Est entre la tour de la Vouerie et les ouvrages de la tour de Lespinoux ; les éléments construits du XIXe siècle : le pavillon chinois, le chalet, les fabriques, la laiterie ; les façades et les toitures des bâtiments de la ferme  ; Le parc du château : inscription par arrêté du 26 mai 1992 propriété de la commune.","habitants":"Jacques de Lorraine\r\n        \"","divers":"St-Maurice grav -1 GPS : 48° 10' 31\" Nord, 6° 27' 20\" Est   vestiges du chapitre grav 2-3_4-\r\n48° 10' 28\" nord, 6° 27' 04\" est\r\nFalloux grav 9  GPS : 48° 11' 09\" Nord 6° 29' 03\" Est                                           Forteresse de rivière grav 8                                                    Grav-5-6-7 divers patrimoine d'Epinal","gps":"48° 10' 31\" Nord, 6° 27' 20\" Est   vestiges du chapitre grav","images":["../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_1.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_2.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_3.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_4.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_5.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_6.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_7.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_8.jpg","../../jctruffet.com/image/image_88/88_Epinal_Patrimoine_9.jpg"]},"Consult_chateau_formulairea2a5":{"id":"Consult_chateau_formulairea2a5","dept":"88","canton":"Le Val-d","commune":"Fontenoy-le-Château","nom":"Fontenoy_Chateau","type":"Château","periode":"X-XIV","histoire":"FONTENOY le CHÂTEAU, cest en 1050 quon trouve pour la première fois mention de Fonteniacum Castellum. Le site est fortifié quelques décennies auparavant afin de protéger ce lointain franc-alleu que possèdent les évêques de Toul. Une grosse tour carrée surveille et contrôle le passage de la vallée du Côney. Cest une des premières forteresses répertoriées au sud des Vosges, avec Epinal et Remiremont. Ainsi commence lhistoire médiévale de Fontenoy-le-Château.","architecture":"FONTENOY le CHÂTEAU ,  Il fut construit au début du XIVe siècle. C'est un château -fort, de style Médiéval. La forteresse protégeait la frontière entre la Bourgogne et la Franche-Comté. Il avait un but défensif. A la fin du Xe siècle, les évêques de Toul, qui possèdent ce franc-alleu, firent édifier une grosse tour carrée, afin de protéger leur domaine et verrouiller la Vallée du Côney. C'est une des premières forteresses des Vosges du Sud avec Épinal et Remiremont. Signe de cette appartenance à l'évêché de Toul, l'église paroissiale de Fontenoy porte le nom de Saint Mansuy de Toul. Le château de Fontenoy-le-Château résista pendant 6 siècles, puis fut anéanti lors de la guerre de 30 ans. Le château de Fontenoy-le-Château est, depuis, en ruines. Le château de Fontenoy-le-Chateau est ouvert au Public et se visite, librement     Démantelé à la guerre de Trente Ans, le château et son donjon servent de carrière de pierres de taille. Exposé depuis quatre siècles aux intempéries, le blocage du donjon, seffondre un peu plus chaque année. Grâce aux bonnes volontés et aux chantiers de jeunes bénévoles, lassociation a pu maintenir ou restaurer les murs denceintes, mais elle est restée impuissante, à la lente mais inexorable érosion du donjon, monument symbolique de lorigine de cette cité.\r\nÉléments protégés MH : la tour des Lombards : inscription par arrêté du 23 décembre 1981. Vestiges, il y a trente ans naissait lAssociation des Amis du Vieux Fontenoy dans lespoir de sauver le château de la ruine.","habitants":"les évêques de Toul\r\n        \"","divers":"Vestiges du château de Fontenoy                                                              GPS : 47° 58' 23\" Nord 6° 12' 01\" Est","gps":"47° 58' 23\" Nord 6° 12' 01\" Est","images":["../../jctruffet.com/image/image_88/88_Fontenoy_Chateau_1.jpg","../../jctruffet.com/image/image_88/88_Fontenoy_Chateau_2.jpg"]},"Consult_chateau_formulaire7b0c":{"id":"Consult_chateau_formulaire7b0c","dept":"88","canton":"Saint-Die-des-Vosges","commune":"Saint-Die-des-Vosges_","nom":"Galaziere_Palais","type":"Palais","periode":"XIX","histoire":"GALAZIERES, vivement désirée par les ducs de Lorraine, la création d'un quatrième évêché en territoire ducal fut un enjeu majeur pour le duché de Lorraine de 1552 jusqu'à 1737. Longtemps envisagé à Nancy, qui abrite depuis 1602, la primatiale de Lorraine, puis, en lieu et place du prestigieux chapitre collégial de Saint-Dié. C'est finalement à la suite de l'annexion par le Royaume France du duché de Lorraine, en 1766, qu'est tranchée la création d'un diocèse à Saint-Dié en 1777, à la suite d'un démembrement notable de l'antique diocèse de Toul qui y perd ses prestigieuses abbayes vosgiennes (Étival, Moyenmoutier, Senones). Si l'ancienne et élégante collégiale romane et gothique était depuis 1717 déjà pourvue d'une majestueuse façade classique édifiée par Giovanni Betto, il fallut édifier un palais de la dignité épiscopale. Ce fut Jean-Michel Carbonnar qui fut chargé d'édifier ce palais, en 1782, agrémenté d'une élégante colonnade.","architecture":"GALAZIERES,  en 1944, à la suite du dynamitage du chur de la cathédrale, le palais attenant est également soufflé sauf la majestueuse façade dont la colonnade fut sauvée et restaurée après-guerre, le reste du palais ne sera jamais reconstruit. Le transfert du siège du diocèse fut décidé par Mgr Henri Brault, en 1953, pour Épinal, préfecture départementale. Pour le bicentenaire de la création du diocèse est inauguré en 1977 le musée Pierre-Noël du nom du maire à l'initiative du musée, est à la fois un musée archéologique et historique de la région ainsi des Beaux-Arts. Le musée permet de découvrir certains éléments conservés de l'ancien palais épiscopal dont son vaste escalier d'honneur datant du XVIIIe siècle. Le palais de la Galazières est classé aux M.H. depuis le 18/07/1933.","habitants":"Musée Pierre-Noël \r\n        \"","divers":"Palais de Galazières                                                                          GPS : 48° 17' 19,44\" Nord, 6° 57' 3,69\" Est","gps":"48° 17' 19,44\" Nord, 6° 57' 3,69\" Est","images":["../../jctruffet.com/image/image_88/88_Galazi%c3%a8res_Palais_1.jpg"]},"Consult_chateau_formulaire7ad5":{"id":"Consult_chateau_formulaire7ad5","dept":"88","canton":"Vittel","commune":"Gemmelaincourt","nom":"Gemmelaincourt","type":"Château","periode":"XVIII","histoire":"GEMMELAINCOURT, c'est un château de style manoir. Sa construction date de 1778 pour en faire une demeure seigneuriale. Sur des vestiges dun ancien relais de chasse, le seigneur de Bassompierre édifie le château actuel dans la seconde moitié du XVIIIe siècle. On peut lire encore aujourd'hui la plaque de fondation qui porte la date de 1778. Le seigneur de Bassompierre est à l'époque copropriétaire avec les chanoinesses de Remiremont. Le château de Gemmelaincourt est la propriété du marquis Léopold de Hennezel de Francogney pendant la Révolution française. Il est issu d'une famille de verriers de la région de la forêt de Darney. Pendant cette période, le marquis a quelques soucis avec le maire du village devenu procureur, emprisonné en 1793 à Mirecourt, il parvient à senfuir en Suisse juste avant qu'on ne le conduise à l'échafaud, pour ensuite servir dans l'armée de Condé. Il revint à la Restauration et devint maire de la commune.","architecture":"GEMMELAINCOURT, aux XIXe siècle et XXe siècle, le château sert de presbytère à la commune. Vers le milieu des années 1980 l'abbé Antoine, qui était le dernier curé du village, est à la retraite et n'a plus l'usage du château en tant que presbytère. La municipalité décida alors de récupérer le bâtiment, mais il était en mauvais état par manque d'entretien. La commune refit faire le toit, amena des réflexions pour faire usage du château, mais aucune n'aboutissant, finit par le vendre. Le propriétaire suivant déposséda alors le château de Gemmelaincourt de ses boiseries, parquets et cheminées, qui furent revendus à part. Le peintre et graveur nancéien Franck Hommage entreprit alors de le restaurer mais la bâtisse fut partiellement détruite dans un incendie le 25/01/2015. Le toit fut reconstruit en 2016. Le château de Gemmelaincourt n'est pas inscrit ni classé aux M.H.   il est de forme rectangulaire avec 3 niveaux d'élévation (rez-de-chaussée et deux étages). La façade principale du château est orientée vers le village à l'ouest, la façade côté jardin étant orientée à l'Est, vers la Vraine. Deux agrandissements ont été accolés au nord, au sud du château de Gemmelaincourt.","habitants":"marquis Léopold de Hennezel de Francogney\r\n        \"","divers":"Château de Gemmelaincourt                                                      GPS : 48° 16' 33\" Nord, 5° 58' 06\" Est","gps":"48° 16' 33\" Nord, 5° 58' 06\" Est","images":["../../jctruffet.com/image/image_88/88_Gemmelaincourt_1.jpg"]},"Consult_chateau_formulaire22a7":{"id":"Consult_chateau_formulaire22a7","dept":"88","canton":"Bruyères","commune":"Girecourt-sur Durbion","nom":"Girecourt","type":"Château","periode":"XVI-XIX","histoire":"GIRECOURT sur DURBION,  le château de Girecourt est construit au XVIe siècle, vers 1540. Dans le corps de logis sud, subsiste un beau plafond du XVIe siècle. Aménagement du parc et transformation du château dans le premier quart du XIXe siècle. Croix du XVIe siècle aux abords du château. Mémorial de Crillon élevé en 1781.","architecture":"GIRECOURT sur DURBION  la construction date de 1540. En 1540, Pierre de Haraucourt, chevalier, seigneur de Paroye fit bâtir une une maison forte avec 4 tours, entouré de hautes murailles. Il meurt en 1546, le nouveau propriétaire fut Antoine de Lenoncourt, primat de Nancy. Les Lenoncourt comme les Haraucourt faisaient partie des \"quatre grands Chevaux de Lorraine\", l'une des 4 plus vieilles familles de l'ancienne chevalerie. En 1639, durant la guerre de 30 ans, le propriétaire Pierre de la Porte résista au siège des suédois.\r\nLa propriété revint, en 1705, à Jean François Humbert, juriste et chef du conseil des finances du duc Léopold I. Il fut fait baron puis comte de Girecourt, en 1737. Le château de Girecourt-sur-Durbion fut confisqué, à la Révolution, à sa fille Marguerite Suzanne, vandalisé puis racheté par un prête-nom, pour la famille par alliance de celle-ci, les Bourcier de Villers   il sera entièrement restauré en 1994  a été classé aux Monuments historiques, se visite et il est ouvert au public.   Éléments protégés MH : le domaine en totalité, à l'exception de l'aile du début du XXe siècle doublant l'aile nord-ouest du château : inscription par arrêté du 13 février 1997.","habitants":"Famille de Pierre de Haraucourt \r\n        \"","divers":"Château de Girecourt                                                                                     GPS : 48° 14' 48,77\" Nord, 6° 36' 03,43\" Est","gps":"48° 14' 48,77\" Nord, 6° 36' 03,43\" Est","images":["../../jctruffet.com/image/image_88/88_Girecourt_1.jpg","../../jctruffet.com/image/image_88/88_Girecourt_2.jpg","../../jctruffet.com/image/image_88/88_Girecourt_3.jpg"]},"Consult_chateau_formulaire210f":{"id":"Consult_chateau_formulaire210f","dept":"88","canton":"Neufchâteau","commune":"Harchéchamp","nom":"Harchéchamp","type":"Château","periode":"XVI","histoire":"CHATELET, son propriétaire initial était Thierry le Diable,a appartenu à la Maison du Châtelet et aux Bassompierre. Détruit par les Suédois pendant la Guerre de Trente Ans, le village fut reconstruit au pied des 2 anciens châteaux féodaux surplombant Harchéchamp, son parc y accueille une maison-forte du XVIIe siècle appelée le château de Couvonges a été fréquenté par Voltaire, au XVIIIe siècle, d'où la rue principale du village qui porte son nom. Justin Mouton (1843-1905), Maître de forges, fut le propriétaire du château de Couvonges. . A la Révolution française, il a appartenu à la Famille de Bassompierre. Le  Châtelet n'est ni inscrit ni classé aux M.H. Il accueille dans ses murs un musée Africain, une ferme construite ou restaurée en 1650, une Tour, du XVe siècle, du côté du village et un grand garage semi-enterré (un petit musée automobile privé y est logé, visitable seulement aux 2 Journées Européennes du Patrimoine.","architecture":"CHATELET, dit aussi Couvonges; la construction du château de Châtelet date du XIIe au XVIe siècle, est une maison bourgeoise, qui ressemble à un petit château. La construction du Le Châtelet date du XIXe siècle. Le Châtelet dominant les deux cours d'eau du Côney et du Bagnerot. Il est édifié dans la seconde moitié du XIXe siècle, par Léon Demazure (1828-1905), le frère dÉdouard Demazure qui fit construire le château du Chesnois, tout proche, il passera ensuite à plusieurs propriétaires au cours du XXe siècle dont la famille Dieudonné. De style Tudor, revu par le XIXe siècle, l'aile centrale à quatre pans est complétée de chaque côté par une tourelle ronde, des pavillons carrés et une serre. Les communs et l'écurie sont construits devant l'édifice de chaque côté, formant une cour d'honneur. Un grand parc à l'arrière complète l'ensemble architectural. Il n'est pas inscrit aux M.H. ni classé aux M.H. Il ne doit pas être confondu avec le château Renaissance du Châtelet, situé à Harchéchamp, C'est un château de la Renaissance. Surplombant Harchéchamp. Son parc y accueille une maison-forte du XVIIe siècle appelée le château de Couvonges. Le château de Couvonges fut fréquenté, au XVIIIe siècle, par Voltaire. La rue principale du village porte son nom. Justin Mouton (1843-1905), maître de forges, propriétaire du château de Couvonges.","habitants":"Chateley; Famille de Bassompierre et Couvonges Voltaire\r\n        \"","divers":"Château du Chatelet  à Harchéchamp                                                          Horche  GPS : 48° 23' 08\" Nord, 5° 46' 33\" Est                                                                                                  Chatelet GPS : 47° 59' 47\" Nord, 6° 14' 10\" Est","gps":"48° 23' 08\" Nord, 5° 46' 33\" Est","images":["../../jctruffet.com/image/image_88/88_Harch%c3%a9champ_1.jpg","../../jctruffet.com/image/image_88/88_Harch%c3%a9champ_2.jpg","../../jctruffet.com/image/image_88/88_Harch%c3%a9champ_3.jpg","../../jctruffet.com/image/image_88/88_Harch%c3%a9champ_4.jpg"]},"Consult_chateau_formulaireb724":{"id":"Consult_chateau_formulaireb724","dept":"88","canton":"Darney","commune":"Isches","nom":"Harcourt_Isches","type":"Château","periode":"XVI-XVII","histoire":"HARCOURT,  son propriétaire initial était la famille de Choiseul-Aigremont. On l'appelait à l'origine \"le château d'en Bas de Isches\" ou \"le Vieux Château\", appellation encore usitée, aujourd'hui. Construit aux XVIe et XVIIe siècles par la famille de Choiseul-Aigremont, il était l'une des 3 forteresses du village, avec les châteaux de Choiseul et de Chauvirey qui ont aujourd'hui disparu, détruits pendant la guerre de Trente Ans. Au cours de cette guerre terriblement dévastatrice pour la Lorraine, Antoine III d'Isches, gouverneur de La Mothe pour le duc de Lorraine Charles IV, se couvrit de gloire en défendant héroïquement la forteresse ducale contre l'armée du maréchal de La Force, avant d'y être tué par un boulet de canon le 21 juin 1634. En 1636, les suédois épargnèrent le vieux château d'Isches car son héritier de l'époque, Henri de Choiseul ( 1649), avait fait soumission au roi de France Louis XIII.","architecture":"ISCHES-HARCOURT  la construction date du XVIe au XVIIe siècle. Il est de style Renaissance  est l'oeuvre de la famille de Choiseul-Agremont. Edifié au XVIe siècle, il ne s'agit nullement d'un site féodal, même s'il présente une enceinte avec tours de flanquement et une porterie fortifiée qui eut un pont-levis et qui lui donne un aspect de maison forte,  il est épargné lors de la guerre de trente-Ans, le château échoit par mariage à la famille Aneffe en 1720, puis à la famille d'Harcourt. En 1779 Charles Hector d'Harcourt-Olonge vend le château à Jean-François le Duchat de Rudange. Ce dernier émigre à la Révolution. Vendu comme bien national, Harcourt devient une ferme durant 150 ans. Durant cette période, l'enceinte fortifiée est démantelée et ses pierres vendues pour l'édification de l'établissement thermal de Bourbonne les Bains, lui même aujourd'hui remplacé. Château d'Isches ne fait actuellement l'objet d'aucune inscription ou classement aux M.H. C'est une propriété privée, qui reste fermée au public. Depuis avril 2015, le château d'Harcourt a été mis en vente.","habitants":"Harcourt Famille de Choiseul-Aigremont                                     Isches ,  familleJean-François le Duchat de Rudange \r\n        \r\n        \"","divers":"Château de  Harcourt    GPS : 48° 01' 02\" Nord, 5° 49' 36\" Est","gps":"48° 01' 02\" Nord, 5° 49' 36\" Est","images":["../../jctruffet.com/image/image_88/88_Harcourt_Isches_1.jpg","../../jctruffet.com/image/image_88/88_Harcourt_Isches_2.jpg","../../jctruffet.com/image/image_88/88_Harcourt_Isches_3.jpg"]},"Consult_chateau_formulaireb006":{"id":"Consult_chateau_formulaireb006","dept":"88","canton":"Mirecourt","commune":"Houecourt","nom":"Houecourt","type":"vestiges","periode":"XIV","histoire":"HOUECOURT  Il se situe à proximité de l'église, à 310 mètres d'altitude. La construction du château de Houecourt date du XIVe siècle. Il appartenait aux seigneurs de Houecourt.  Le village qui va naitre autour du château portera leur nom. A l'extinction des seigneurs de Houecourt, le château ira dans les mains de l'importante famille de Ligneville. Le château est réaménagé aux XVIe et XVIIe siècle. Le 21/03/1719   le comté d'Houecourt est élevé au rang de marquisat. A La moitié du XIIIe siècle, le château échut à la famille de Choiseul. Un caveau accolé à l'église du village, contient les corps de plusieurs membres de la famille de Choiseul. Etienne François de Choiseul est le neveu du ministre. Il épousa le 6/10/1778 à Amboise, Marie-Stéphanie de Choiseul, fille du Maréchal de France Jacques Philippe de Choiseul-Stainville. Il va participer à l'évasion du roi de France Louis XVI mais sera arrété à Verdun.  Il passera l'essentiel de son temps à Houescourt, devenant président du conseil départemental des Vosges, jusqu'en 1836. Il sera aussi gouverneur du Louvre.","architecture":"HOUECOURT La seigneurie de Houécourt fut érigée en comté le 20 janvier 1719 et en marquisat le 21 mars 1721. Houécourt appartenait au bailliage de Neufchâteau. La famille de Lignéville a longtemps possédé la terre de Houécourt et plusieurs membres de cette famille y furent enterrés. Le duc de Choiseul, pair de France et maire du village, y fut également inhumé après son décès à Paris en 1838.  Bien qu'intact au XXe siècle, la première guerre mondiale va provoquer son anéantissement. Il ne subsiste depuis\r\nque son vaste parc et son enceinte. La porte d'entrée monumentale avec son pavillon, l'enceinte du parc flanquée de tours sont les principaux édifices encore debout. Le château de Houecourt est privé, fermé au public.","habitants":"Famille de Ligneville\r\n        \"","divers":"Château de Houecourt                                                                      GPS : 48° 17' 58\" Nord, 5° 53' 40\" Est","gps":"48° 17' 58\" Nord, 5° 53' 40\" Est","images":["../../jctruffet.com/image/image_88/88_Houecourt_1.jpg"]},"Consult_chateau_formulaire0e22":{"id":"Consult_chateau_formulaire0e22","dept":"88","canton":"Darney","commune":"Isches","nom":"Isches_Choiseul","type":"Château","periode":"XIII-XVI","histoire":"CHAUVIREY, CHOISEUL et HARCOURT à  ISCHES se trouvent sur la commune du même nom respectivement à 380 et 370 mètres d'altitude. Le premier à disparu. Le deuxième constitue le centre du village et le troisième se trouve en contrebas de la colline sur laquelle le village est construit.                                                                                  CHAUVIREY  Létymologie du nom d'ISCHES est celtique. Ce nom constitue avec celui de la commune vosgienne d'Escles , les seuls nom de localité françaises a posséder la racine celtique \"ISC\" ou \"ESC\" qui signifie \"EAU\". A l'époque gallo-romaine le village est édifié en bordure d'une route romaine en partie réutilisée de nos jours.  Un premier château construit en bois et sans doute réaménagé au cours des siècles est tenu au XII° siècle par la famille de Chauvirey. Il aurait disparu absorbé par l'édification du deuxième château.","architecture":"ISCHES CHOISEUL est édifié vers le XIII° siècle en lieu et place du château de Chauvirey. Il est tenu par la famille de Choiseul-Aigrdemont dont les membres ont le titre de marquis d'Isches, vassaux des ducs de Lorraine. ISCHES connaîtra de nombreux conflits entre son suzerain et ses voisins Bourguignons et Champenois. En 1556 le village fut incendié et une grande partie de sa population massacrée. Antoine de Choiseul appelé monsieur d'Isches sera gouverneur de la place forte de la Mothe sous le règne de Charles IV. Il affrontera les français et sera tué par eux le 21 juin 1634. La Lorraine est envahit. Charles IV fait démanteler le château afin que les français ne l'utilise pas. En 1645 après la chute de La Mothe, le cardinal de Mazarin fait occuper Isches. La cohabitation semble s'être bien passée. \r\nLa famille de Choiseul allait connaître un bel avenir au sein de la France. Le château lui ne sera pas reconstruit mais diverses parties seront converties en maisons habitation.  Il subsiste la chapelle romane fortifiée devenue l'église paroissiale (XIIe siècle) récemment restaurée, elle expose des fresques du XIVe siècle représentant le jugement dernier, ainsi qu'une tour d'escalier à archère. L'édifice est classé M.H.. Plusieurs maisons conservent des tours médiévales. L'une à côté de l'église est constituée par le donjon et la barbacane du châtelet d'entrée en constitue une autre.Au bord de la rivière face au lavoir, sous le troisième château subsiste l'hôtel de l'intendant, lui aussi maison d'habitation.","habitants":"la famille de Choiseul-Aigrdemon\r\n        \"","divers":"Deux châteaux de Isches Choiseul","gps":"","images":["../../jctruffet.com/image/image_88/88_Isches_Choiseul_1.jpg","../../jctruffet.com/image/image_88/88_Isches_Choiseul_2.jpg"]},"Consult_chateau_formulaire184e":{"id":"Consult_chateau_formulaire184e","dept":"88","canton":"Neufchâteau","commune":"Landaville","nom":"Landaville","type":"Vestiges","periode":"XIV","histoire":"LANDAVILLE, le château dit du Feyel se trouve sur la commune du même nom dans la partie basse du village aux abords d'un étang à 320 mètres d'altitude. La forteresse apparaît sur divers documents en 1345. C'est une propriété des princes de Beaufremont. Le château subira plusieurs destructions, notamment au XVe siècle. Reconstruit, il est tenu par la famille Du Hautoy .A nouveau reconstruit en 1732 il est habité par le comte Jean-Jacques de Taxis  et son épouse Charlotte de Ligniville. Vendu comme bien de la nation durant la Révolution, le château est partiellement détruit au XIX° siècle. Réaménagé en 1823 par l
